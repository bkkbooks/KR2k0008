body:
  text: 明一統志卷十一明李賢等撰鎮江府東至常州府宜興縣界七十五里西至應天府句容縣界四十五里南至常州府武進縣界一百一十七里北至揚子江二里自府治至南京一百八十里至京師三千二百里糧三十一萬五千石零二建置沿革禹貢揚州之域天文斗分野春秋時為吳地後屬越越敗屬楚秦屬會稽郡漢初為荆國後屬江都國國除復屬會稽郡東漢屬吳郡三國吳初都於此及遷都秣陵乃置京口鎮晉屬毗陵郡東晉僑置徐兖二州號為北府劉宋以南徐州治京口又置南東海郡隋廢州及郡為延陵鎮屬蔣州開皇中置潤州大業初州廢以其地屬江都郡唐初復置潤州治丹徒天寶初改丹陽郡乾元初復為潤州又升丹陽軍建中初改號鎮海軍南唐以為重鎮宋開寶末改鎮江軍政和中升鎮江府元改鎮江路屬江浙行省本朝初為江淮府後改鎮江府直𨽻京師領縣三丹徒縣附郭本吳朱方邑後又名谷陽秦時望氣者言其地有王氣始皇使赭衣徒三千鑿京峴山為長坑以敗其勢因名丹徒漢為丹徒縣屬會稽郡後屬吳郡三國吳改武進縣晉復為丹徒置毗陵郡宋為南徐州治所隋省入延陵縣唐復置屬潤州宋元屬鎮江本朝因之編户二百四十里丹陽縣在府城東六十四里本秦雲陽縣始皇鑿北岡使其阿曲改名曲阿縣漢屬會稽都後屬吳郡三國吳復改雲陽晉復改曰曲阿屬毗陵郡梁屬蘭陵郡隋屬江都郡唐武德初於縣置雲州又改簡州尋廢州以縣屬潤州天寶初改名丹陽縣宋元仍舊本朝因之編户一百四十四里金壇縣在府城東南一百三十里本秦曲阿縣之金山鄉漢屬會稽郡東漢屬吳郡隋初屬蔣州大業末置金山縣唐初屬茅州尋屬蔣州又併入延陵縣後復置又以東陽郡有金山縣改此為金壇宋元仍舊本朝因之編户一百四十里郡名京口三國吳名南徐劉宋名丹陽唐名形勝因山為壘緣江為境爾雅云絶髙為京以其城因山為壘緣江為境故謂之京口東通吳會南接江湖隋志西接漢沔北拒淮泗宋曾改潤州集序三吳襟帶之邦百越舟車之會寰宇記內連天塹外蔽日畿鎮江志序用武之地郡志自吳孫權置都建鄴而鎮江實形勝用武之地浙西門戶宋知府劉寧止奏言京口控扼大江為浙西門户風俗小人習戰君子尚禮隋志人性禮遜謙謹寰宇志雜吳夏語音同上承泰伯之髙蹤存季子之遺意蓋英賢之舊壤雜吳夏之語音山川日精山在府學內上有日觀遺址塘塠山在府城中舊名塘頺山上有五通廟北固山在府治北下臨長江其勢險固梁武帝嘗登此山又名北顧山唐竇常詩山趾北來固潮頭西去長宋王安石詩天木海門橫北固煙中沙岸似西興壽丘山在府治南即宋武帝宅基釡鼎山在府城東南與京峴山相連京峴山在府城東五里即秦所鑿泄王氣處吳謂之京口京鎮以此金山在府城西北七里江中宋周必大筆録此山大江環繞每大風四起勢若浮動名浮玉山唐有裴頭陀於此開山得金賜名金山山有裴公洞龍王池妙空巖善財石山後有孤峯鶻棲其上曰鶻山宋髙宗詩崒然天立鎮中流雄跨東南二百州狂虜每登須破膽無勞平地戰豼貅金黨懷英詩金山勝概冠吳楚萬礎盤峙江中流石排山在金山西相傳山上有郭璞墓盛夏有大蛇莫知其數盤結於木隂間焦山在府城東北九里江中後漢焦先隱此因名旁有海門二山金焦相望十五里上有羅漢巖宋理宗書三大字揭之下有磨崖石刻瘞鶴銘李仲殊詩海門礙日山雙聳江北行人樹幾行花山在府城東三里一名東山唐皇甫冉詩北固多陳迹東山復勝逰宋蘇舜欽詩寺襄山因花得名花今不見草縱橫黃鶴山在府城西南三里一名黃鵠山宋武帝微時嘗逰息於此上有鶴林寺銀山在府城西壁立數丈舊名堅土山唐劉禹錫詩上山京口峻即此元時建寺其上以與金山對峙易名曰銀山蒜山在府城西五里大江岸上山多澤蒜因名或云吳周瑜與蜀諸葛亮議拒曹操於此籌算又曰算山東晉木劉裕大破孫恩于此南唐徐知詰賞逰此山會僚屬宋蘇軾詩蒜山幸有間田地著此無家一房客今淪入江西津渡口水中孤峯是也磨笄山在府城西南五里劉宋戴顒女於此磨笄誓不適人因名靈山在府城南其山雲出天必降雨唐顧况有詩送郭生歸靈山讀書即此招隱山在府城西南七里一名獸窟山劉宋隱士戴顒居此相傳梁昭明太子亦嘗於此讀書石案尚存下有招隱寺寺內有虎跑鹿跑真珠三泉及玉蕊亭唐李德裕玉蕊花詩刻石在焉石公山在府城東北八里瀕江與焦山相對上有送江亭汝山在府城東南一十里上出藥物齊苨白兔山在府城東南一十五里宋刁約葬此有白兔躍出長山在府城南二十里上有靈泉其流與練湖通溉田甚多五州山在府城西五十里相傳山絶頂望見五州宋曽布詩天際林巒壓夀丘夾江旁瞰兩三州又云海門西北起崇丘極目參差見五州馬迹山在府城東南三十五里上有靑童君馬迹又有靈洞二曰靑龍曰黃龍潛通華陽及抱朴子丹井在焉曹山在府城西四十里洪武三十五年車駕嘗駐蹕于此覆船山在府城西南五十里一名酒罌山圌山在府城東北六十里宋張世傑與元兵戰于江中不利退奔圌山即此今山上有東霞寺髙驪山在府城西南七十里一名句驪山相傳昔高句驪國女來此海神乘船致酒醴聘之女不從海神撥船覆酒流入丹陽宋蔡肇詩城中十月雨濛濛遙看句驪半山雪繡毬山在丹陽縣東北三十里三山相連有似繡毬陳山在丹陽縣東北三十五里上有玉龍泉宋朱彥章詩巨靈擘兩山飛泉擬白龍繚繞陳山路蕭踈兩岸風經山在丹陽縣東北三十五里昔有異僧講經於此故名一名金牛山山有古杏一株相傳晉時所植沈山在丹陽縣東北四十里南唐沈彬嘗居此因名九靈山在丹陽縣東北四十里九峯相連下有仁靜觀唐時魏法師嘗居此嘉山在丹陽縣東北四十五里上有龍池及龍祠隨駕山在丹陽縣北五十里相傳秦始皇嘗過此故名顧龍山在金壇縣南五里前望白龍蕩故名又名土山上有大聖塔五聖廟大坯山在金壇縣南長蕩湖中屹然孤秀望之若浮青龍山在金壇縣南五十五里山形如龍龍尾山在金壇縣西六十里自大茅峯蜿蜒而來勢如卧龍茅山在金壇縣西六十里一名句曲山即華陽第八洞天也山之西屬句容縣界方山在金壇縣西一百里下有布金寺及喜客泉雙峰在海門宋韓維詩一帶分江紀雙峯照海門金牛洞在丹陽縣東北三十五里洞皆石壁洞口僅容一人其中甚廣大江在府城西北六里即揚子江也一名京江東注大海北距廣陵魏文帝將南征臨此江見波濤洶湧嘆曰天所以限南北也賦詩云觀兵臨江水水流何湯湯戈矛成山林玄甲耀日光猛將懷暴怒膽氣正縱橫誰云江水廣可以一葦航龍目湖在京峴山下相傳梁武帝望京峴山盤紆似龍故於山前開此湖以龍目名之練湖在丹陽縣北一名練塘水經云晉陳敏引水為湖周一百二十里號曰曲阿後湖唐永泰中刺史韋損復修以溉田李華作頌序云是湖納長山諸水凡七十二流古語云湖水寸渠水尺許渾有重遊練湖懷舊詩長蕩湖在金壇縣東南三十里一名洮湖通大岯山舟楫往來多有風濤之險伊婁河在府城南唐開元中刺史齊浣以州北隔江舟行繞瓜步回逺六十里多風濤乃於京口埭下直趍渡江二十里開此河二十五里渡揚子立埭嵗利百萬舟不漂溺海鮮河在府城西北宋郡守史彌堅開西北通京江東南接漕渠夢溪在經山東宋沈括嘗夢至一小山花如覆錦喬木蓊鬱山之下有水甚樂之後謫居潤得此地宛如夢中遂築室居焉因以夢名溪林希詩夢溪謫仙人松菊繞新宅荆溪在金壇縣北一名白鶴溪源出古荆城流入常州界南唐潘佐詩荆溪百里水涵空秦潭在府城鐡甕門外唐陸龜蒙詩松門穿戴寺荷徑繞秦潭潤浦在府城東南二里一名東浦隋置潤州其名取此西浦在府城西異苑記晉阮明泊舟西浦見一靑衣女子彎弓射之女即軒雲而去明尋被害義井在府治南其水甚甘郡有疾者禱飲即愈慶封井在丹徒縣治南春秋齊慶封奔吳吳與朱方聚其族而居之富於其舊此井在所居之地唐陸龜蒙詩今歌此井示吳人斷綆沉瓶自兹始葛洪井在丹徒縣東南三十里相傳晉葛洪於此煉丹鰻井在甘露寺內昔有僧妙機者棲禪於此乏水浚井於山得鰻魚二因名雙井在丹陽縣東南二里其井最古二井相去數尺南者色赤北者色黃沸井在丹陽縣南四十四里井有四二清二濁騰涌滚沸晝夜不絶靈泉在長山上與練湖通中泠泉在金山寺內唐李德裕嘗使人取此水雜以他水輒能辨之水經品第天下水味此為第一宋蘇軾詩中泠南畔石盤陀古來出沒隨濤波玉乳泉在丹陽縣治東唐劉伯芻論水以此為天下第一真珠泉在招隱山西其泉圓濺若貫珠然宋蘇軾詩巖頭匹練兼天淨泉底真珠濺客忙鹿跑泉在招隱山西即梁昭明太子井唐蔣防有銘喜客泉在方山下客至泉即湧故名元凱烈拔實詩春水澄澄緑滿池圓漚顆顆湧琉璃江妃解佩珠零亂淵客當盤淚滿垂石墨池在金壇縣西相傳漢費長房學道於此書符滌硯澗石悉為墨色金鶯池在丹陽縣治內宋夏竦為主簿時一日侍母燕坐見黃鸝雙舞俱沒於地發之得金鶯二其母命瘞之竦因築亭其上後人發地求之不得遂鑿為池鳯凰池在北固山下蓮池在金壇縣雲陽驛中唐許渾詩心憶蓮池秉燭逰葉殘花敗尚維舟煙開翠扇淸風曉水泛紅衣白露秋漕渠在府城內齊志丹徒水入通吳會六朝都建康凡三吳船避京江之險自雲陽西城鑿運瀆徑至都下隋大業末詔穿江南河自京口城南至餘杭八百餘里西北通大江即此謝塘在丹徒縣治南塘二灌田千餘頃梁謝德威唐謝元超所築因名萬束坡在金壇縣東三十里圖經陂冝稻百畝可收萬束故名白龍蕩在金壇縣南一十里與長蕩湖接相傳有白龍見于此因立龍祠禱雨多應萬頃洋在丹陽縣南四十五里溉田甚博土産香草丹陽縣出薺苨鱘魚俱丹徒縣出公署鎮江衛在府城內渌水橋南學校鎮江府學在府治東宋太平興國中建本朝永樂中重建于定波門外姚廣孝記景泰中建于此丹徒縣學在縣治南夀丘山舊在縣治西宋紹興建本朝嘉靖初徙此丹陽縣學在縣治東宋慶厯中建本朝洪武初重建金壇縣學在縣治東宋紹興初建本朝洪武中重建書院淮海書院在丹徒縣治西宋南渡淮土多寓京口因建書院以為講學之所因名濓溪書院在丹徒縣治東南宋周敦頥依舅氏鄭向嘗居此後人因建書院舊在黃鶴山下本朝正統中移建于此景賢書院在郡城內嘉靖二年建祀宋郡守栁開周敦熙龔基申義書院在金壇縣治西宋太府丞張鎬創家孰教族人子弟取申之以孝弟之義為名龍山書院在金壇縣南顧龍山宋咸淳間立茅山書院在金壇縣西茅山宋初建後廢紹定中知縣孫子秀因其故址新之以待逺方逰學之士宫室萬嵗樓在府城上西南隅晉刺史王恭建唐皇甫冉同客登樓詩髙樓獨上思依依極浦遙山合翠微江客不堪頻北望塞鴻何事復南飛宋紹興中太守劉岑即其地新之為月觀汪藻記芙蓉樓在府城上西北隅與萬歲樓相對宋林文節詩江入海門通百越樓橫鐵甕跨三山僧皎然詩夜驚潮沒鸕鷀堰朝看日出芙蓉樓北固樓在北固山上梁武帝詩南城連地險北固臨水側深潭下無底高低長不測唐李白詩丹陽北固是吳關畫出樓臺雲水間宋范仲淹詩北固髙樓海氣寒使君應此憑欄干春山雨後靑無數借與淮南仔細看多景樓在甘露寺內宋曾鞏詩欲收嘉景此樓中徙倚欄干四望通雲亂水光浮紫翠天含山