反良善得安其業焉省志陳輝撫州府同知為政明達勤敏凡所興作俱節羡餘不勞民力省志張睿通判撫州妻不曳帛子不挾纊廉慎之操始終如一卒于任囊無棺衾之資省志劉忠器成化間知崇仁縣和易雅重清介自持役志於民留心學校士民懷之今祀於遺愛堂省志包裕撫州府推官仁恕公廉郡無寃獄時稱為小包云省志張間𢎞治初撫州府學訓導嚴飭教條為諸生解經懇懇必其透徹而後己省志葉天爵𢎞治間任崇仁縣知縣剛明勤慎擲伏如神崇尚鄉賢興復水利以政迹著最今崇祀于遺愛堂有去思記省志流寓丁奉廬江人仕孫吳為冠軍將軍計略過人能斷大事孫休時遷大將軍休薨奉與丞相共迎立孫皓有毀之者皓徙奉家于臨川虞汲本蜀仁夀人允文之後父㠭知連州以文學知名汲仕宋為黃岡尉宋亡僑居臨川崇仁與吳澄為友澄稱其文清而醇家貧教授後以翰林院編修官致仕李貞本山東蒲臺人樂安主簿厲清操貧不能歸遂家焉人物宋樂史宜黃人母夢異人授五色珠而生史力學有文南唐進士第一人宋復登甲科纍官兩浙巡撫使釋逋負賑飢民轉都官員外郎出知商州後判西京留臺所著有太平寰宇記等書樂黃目史子淳化初進士纍官右諫議大夫知荆南府後知亳州卒黃目面柔簡默為吏處劇亦無廢事所著有集五卷又撰學海搜竒等書其兄黃裳弟黃庭並進士及第官至太常博士晏殊臨川人七歲善屬文真宗召見與進士並試援筆立成賜同進士出身為館職仁宗時為相善知人范仲淹孔道輔歐陽修等皆出其門富弼楊察皆其壻卒諡元獻有文集四十卷又有類要二府集臨川集李陽孫崇仁人慶厯初為封州簿官滿徒步而歸晏殊深器重之贈以詩曰不忍與君别憐君仁義人三年官滿後依舊一家貧仕至殿中丞侯叔獻宜黃人有志節舉慶厯進士纍官兩浙常平使者兼都水監建議置提舉淤田司相地利引樊山水灌地四十萬頃遷河北水陸轉運判都水監治水尤得其性有詔奬諭王安石臨川人父益歷官州縣有聲安石生有異質長博覽強記善辨不屈所為文淵源出於典誥擢進士上第神宗朝拜相封荆國公卒諡曰文王安禮安石弟嘉祐中舉進士為著作郎因災異上疏言大臣有乘權射利者進翰林學士知開封府事至立斷時稱神明歷轉尚書左丞元祐中落職知舒州安禮偉風儀議論明白常以經綸自任云王安國安禮弟自幼為文驚人數舉進士茂才賜對帝問卿兄秉政如何曰恨知人不明聚斂太急爾時吕惠卿諂事安石行新法安國深惡之嘗諷其兄遠佞人惠卿以為恨乃因鄭俠獄陷之放歸田里歲餘復除大理寺丞卒有文集行世蔡元導臨川人博聞強記家貧無書有市書者過之輒留數部經宿還之曰吾己默記擢嘉祐初進士仕至南劍州推官子承僖少力學行己孤峻與父同擢第除監察御史吕惠卿怙權任私承僖面陳其罪纍遷集賢校理卒贈太中大夫謝逸臨川人自號溪堂先生所著有春秋廣微樵談其他詩啓碑志數百篇淳熙中祠于學弟邁有英氣修身勵行與兄俱能詩時稱二謝亦有文集周袞金溪人嘉祐末舉進士王安石竒其才行新法之時以袞鄉人必附己欲用之議不合以員外郎出知滕州孫珩靖康初上書論事不用歸隱麻姑山自號足翁劉蒙宜黃人治平初舉進士歷平陽武城霍丘三縣令淮甸大飢霍丘民賴以全活者甚衆纍官至廣西憲為人清潔不可于以私所得補官先二弟而後二子鄒極宜黃人治平中舉進士纍遷至湖南漕時掌鹽法者爭以羡餘希進極條其不便遂罷歸後擢度支員外郎見執政議不合丐外除江西憲親喪服除曰吾讀書丐祿以娛親耳今既孤可復仕乎力請致仕饒子儀臨川人九歲能詩力學不倦王安石多所論薦子儀獨不為屈崇寧中以經明行修錫命於朝司諌陳瓘閲其所著編年史要為之序又有周易論語解及詩文甚多鄒餘臨川人元豐進士調通城令邑多豪滑餘至乃服化哲宗時為侍御史所陳十餘事皆切大體其一辨析元祐黨人大臣不樂其言遂奉祠歸汪革臨川人性孝友家貧好學試禮部第一分教長沙卒年四十生平深厚不伐賙親友之急解衣推食無難色嘗謂人常咬得菜根則百事可做所著有青溪類藁及論語直解鄧考甫臨川人嘉祐中舉進士歷官提照開封府界河渠坐事去官元符末應詔上書言新法必亂天下坐貶高安卒所著有卜世大寶龜伊周素藴太平策要等書凡二百五十餘篇吳沆崇仁人幼孤事母孝政和間獻書於朝不用歸隱環溪後舉不求聞達郡以沆應詔所著有易論語發微老子解環溪集郡縣學皆祠之聶昌臨川人本名山大觀初進士欽宗謂其有周昌抗節之義改名昌拜周知樞密院奉使金國至綘州遇害建炎中贈觀文殿大學士諡忠敏崔縱臨川人政和中進士纍官至承議郎二帝北狩高宗欲遣使通問廷臣咸畏避不行縱毅然請往乃授試工部尚書比至責以大義金人怒徙之窮荒縱不少屈竟握節而死詔録其兄子延年為後歐陽徹崇仁人慷慨尚氣憂國閔時出於天性靖康初條敝政陳安邊禦敵十䇿高宗即位徹徒步走行在伏闕上封事極詆用事大臣遂見殺所著有飄然集六卷後贈祕閣修撰范應鈴為立祠學中晏敦復殊曾孫少學於程頥第進士官至吏部尚書秦檜入相敦復獨有憂色曰姦人相矣後以寶文閣學士知衢州卒敦復立朝論事無所避高宗嘗曰卿可謂無忝汝祖矣李浩臨川人早有文名尤深理學紹興中登第除吏部郎應詔直言無所避忌知台州軍士謀亂浩一語而定孝宗特用為廣西帥轉吏部侍郎吳曾崇仁人高宗時獻所著書纍官史部郎奉祠久之起知靖州志在去貪吏部安邊人後知嚴州致仕平生苦學為文竒偉所著有得間文集能齋謾録諸書陸筠金溪人紹興中進士平生篤好孟子注翼孟音解九十一條周必大稱其嗜古著書有益後學何異金溪人紹興中進上纍官右正言奏疏多峻切又纍遷權禮部侍郎太廟有芝草生韓托胄以為祥瑞異獨以為兵妖後遷工部尚書丐祠致仕饒延年崇仁人居鄉樂施歲遇艱糴一夕露禱米斗之直舉斗槩量得錢六十五立為定直終身行之積米之家多怨延年曰爾家歲入可計若以其餘出糶高價亦不過數十千遂計數還其直由是鄉黨無敢貴糶者咸以長者稱之吳澥崇仁人隆興中進士以朝臣薦召對孝宗壯之除大學録改西外宗教所著有宇內辨疆域志等書蔡孝恭元導四世孫博聞強記以賢良薦上批鱗十三策至京師或謂合謁當道孝恭曰以嫵媚取科第吾不能也遂歸不仕嚴思義臨川人乾道初進士誨人以踐履為先朱熹薦之仕至寧國府倅全活淮民流徙者甚衆老歸故里卒年四十九曾幼度樂安人乾道進士仕至太守以文章鳴有緣督集行世晚年無意仕進築室以詩酒自娛何穀贊之云不夷不惠斯道之魄不歐不蘇斯道之脈外容萬象中無一物世以為名言李郛宜黃人文學浩博嘗著比事罪言三十篇欲遷都建康為興復計不遇退而著書人號為書厨著文集數十萬言有緯文瑣語陸九韶金溪人與朱熹同時隱居山中講學其學淵粹晝之言行夜必書之自號梭山老圃遺戒不得銘墓所著有梭山文集陸九齡九韶弟乾道進士為全州教授嘗與弟九淵講學鵝湖有詩文傳世沒贈直祕閣諡文達陸九淵生三四歲問其父天地何所窮際父笑而不答遂深思至忘寢食乾道中進士官至荆州軍居象山教授生徒數十百人有詩文語録傳世沒諡文安劉迂宜黃人隱居不仕文章敏贍自成一家諸子百家皆精窮逮朱陸諸儒會鵝湖嘗以詩請益於理學有所得年八十餘無疾沐浴焚香而卒有文集黃去私臨川人氣槩豪爽著屯田議為朱子所知學專行確守師訓不變執親喪行古禮黃幹嘗曰問學之士雕零殆盡江西則甘吉甫黃去私數人爾張英甫臨川人性孝友受學陸九淵講學窮理有易書詩語孟中庸口義五十餘篇名曰尊經誘掖後進士論歸重所著又有要言渾象原意雜詩章節夫臨川人少從陸九淵學博通諸經深造自得嘗取象山晦菴辭異旨同處而疏之曰修和管見晚年所守益固自號從軒著書數萬言曾極臨川人志氣豪放聲名四起朱子得其書及詩大異之所為文有㫪陵小雅金陵百詠傅子雲金溪人學以明善知本為先言行動中規矩嘗主甌寧簿決訟必傳經義人服其學有易傳論語集傳中庸大學解孟子指義離騷經解并文集行世鄒斌臨川人博記敏識見陸九淵問平日何學以求放心對一語契合制置使趙方嘗委經理三關形勝措置有方至決魚湖訟平反漢陽獄皆當人心所著有南塘藁羅點崇仁人六歲能文淳熙初廷試第二人嘗以薦對䇿切中時病纍官端明殿學士僉書樞密院事卒諡文恭點端介有守無矯激之行或謂天下事非才不辦點曰當先論其心心茍不正才雖過人何取哉危稹臨川人淳熙中進士以詩名著歷屯田郎官上言國家治亂之故忤用事者出知漳州奏罷經總制錢無名者後請祠歸與鄉老為真率會所著有巽齋集及諸經講義弟和開禧初進士知德興縣有蟾塘文集曹錫宜黃人嘉定進士性剛直文典雅歷官至屯田郎奏對推廣真德秀祈天永命敬德愛民之説奉祠歸德秀嘗謂其文采可為辭誥剛直宜在言路敏決可作監司楊掞臨川人少能詞賦以薦參淮閫杜杲幕杲凡治法征謀多咨於掞安豐被兵掞以竒策解圍未幾參孟珙幕大將來謁珙坐受其拜掞嘆曰信兜鍪不如毛錐子也於是復業進士遂登第官至潭州節度推官謝公旦崇仁人性孝友簡淡嘉定中進士官至福建漕考覆鹽課民甚便之卒于官自號野航弟琳以廉稱官至左右司出知徽州過家哭兄一慟而逝饒應子崇仁人紹定進士官至監察御史兼崇政殿説書時江西湖南北皆受兵詔淮兵赴援應子上疏淮不可弛偹又言洪天錫有犯無隱監學小臣如徐庚金輩叩閽去國宜旌異之纍疏丁大全及董宋臣等罪陳元桂臨川人淳祐中進士知臨江軍開慶初元兵奄至元桂力疾登城門督戰吏卒勸之避去不從兵至元桂叱罵遂遇害諡正節立廟死所初親戚有勸其移治者元桂曰時事如此與其死於飢饉疾病盜賊孰若死於守土之為光明俊偉哉吳名揚金溪人咸淳中進士歷官浙西制幹文天祥招徠天下士名揚與焉後奏除兵禮二部架閣踴躍赴義意氣感激傾動一時元危復之撫州人宋末為太學生博覽羣書好讀易尤攻於詩元元帥郭昂薦為儒學官不就至元中屢以幣徵之皆不起隱於紫霞山中士友私諡曰貞白先生何中樂中人宋末舉進士以古學自任其學𢎞深該博與門弟子講易詩書春秋吳澄揭傒斯皆推服之元至順初江西行省聘為龍興郡學帥卒所著有易象類書傳補遺通鑑網目測海知非堂集等書孫轍臨川人學行純篤事毋甚孝家居教授與人言一以孝弟忠信為本未嘗幾微及人過失屢辭皆不就轍善為文章吳澄嘗敘其集曰所謂仁義之士其言藹如也吳澄崇仁人自幼知用力聖賢之學著述有易春秋禮記尚書纂言學基學統私録支言集易外翼孝經章句諸書又校正皇極經世書并大小戴記老子莊子太玄經樂律及八陳圖郭璞葬書仕至翰林學士學者稱草廬先生卒封臨川郡公諡文正本朝詔從祀孔子廟庭虞集臨川人汲子三歲即知讀書稍長從吳澄遊歷官翰林學士兼國子祭酒經筵官命修經世大典成謝病歸自號邵菴卒追封仁壽郡公諡文靖平生詩文殆萬餘篇存藁有道園集弟槃歷官湘鄉州判治巫之亂人皆驚服善解經義為人方正吳當澄孫精通經史百家仕至翰林直學士時江南兵起授江西廉訪使募民兵殱建昌渠凶鄭天瑞又平撫州劇寇胡志學等後為撫州路總管退歸豫章杜門著書所著有學言周禮纂言若千卷葛原哲金溪人生而頴異幼時已有能文名公卿執政皆重之至正中舉進士官至行省經歷及卒學者搜其遺藁得詩文彚為十卷平生經律皆博所至政治有能聲黃冔金溪人博學明經善屬文尤長於詩仕至翰林院待制兼國史院編修官京城既破冔嘆曰我以儒致身纍蒙國恩今縱無我戮我何面目見天下士乎遂赴井死所著有詩文傳世劉傑金溪人至正中進士歷官延安路總管尋為中書舍人改監察御史升工部尚書集賢院學士致仕制行甚高本朝危素金溪人少穎悟工詩字有能聲登吳澄門為高第仕元纍官至嶺北行中書省右丞本朝重其文學纍擢𢎞文館學士時備顧問論説經史後謫居和州卒周忠金溪人少穎悟既長通舉子業國初召見青龍殿奏對稱旨寵賜優渥從征湖廣特命參謀左右後欲大用之屢辭不就洪武初復詣闕獻太平十六策遣使沙漠不知所終熊鼎臨川人家世業儒洪武初任山東僉事得大體歷擢翰林學士授東宮尚書未幾改岐寧衛經歷受害于都勒巴事聞遣官致祭葬黃羊川仍立廟祀之吳伯宗金溪人生而頴悟十歲通舉子業先達見其文嘆曰玉光劒氣終不可掩洪武四年廷對擢第一授禮部員外郎性剛直不屈忤胡惟庸坐謫未幾召還纍遷國子司業武英殿大學士所著有南宮藁使交集成均藁玉堂藁揭軌臨川人傒斯之後洪武初以明經舉任清河簿遷知縣事民懷其德已而謝歸教授生徒嘗考江西鄉試士服其公召定書傳會選數承顧問所著有新河集吳漙崇仁人洪武庚辰進士歷官翰林編修修撰永樂初遷國子司業為人清慎嚴重造次以禮其教學者必致力本源居官二十餘年操守如一日家雖貧常分俸以給親故及卒無以為斂喻德昭臨川人洪武初父以户無田移種鳳陽時德昭六歲父母俾所親鞠之年十四詣鳳陽尋弗得遂酒肉間關十年得見於漢中屯所而毋已沒乃扶歸病卒廬於墓所哀慟常如初喪竟卒墓傍鄉人俱服其孝省志黎希䑔臨川人洪武中由明經博學薦除南賓主簿有能聲時鄰郡近夷獠難治部使以健吏奏詔希䑔為知州至則救偏整弊流氏四歸夷獠解散歲餘戎州賊至希䑔率民兵與戰遇害民葬而祠之省志孫伯恭洪武中歷官武庫員外郎以薦升四川左參政寬平不苛吏民德之纍官至鴻臚寺左少卿省志黃紹烈臨川人洪武甲戌進士知瑞安縣民無逋租奏白寃獄免歸教授生徒成就後學有歸田類藁傳于世省志董琰樂安人洪武間歷官翰林院編修遷國子司業轉長史時稱賢輔所著有幼誦詩省志袁旭樂安人永樂乙未進士授江津知縣嘗出俸代貧民逋租坐免復起知寧國府去郡民祠祀之為人甘淡薄見義如不及然疾惡太甚故卒以誣終省志吳餘慶宜黃人性清雅善詩文永樂間以薦歷官右邇政直祕閣致仕在任三十餘年忠謹無過動省志吳昌衍臨川人永樂辛丑進士歷官監察御史劾都御史陳智廷論偉之時議欲移邊城衍奏以勞民傷財後必致患事遂寢致仕家居不妄交接卒年八十有餘省志王英金溪人永樂甲申進士入翰林纍官侍講學士春坊大學士為經筵講官國史總裁修實録成進禮部侍郎升南禮部尚書卒諡文安英為人寬洪樂易詩文古雅尤善草書自號泉坡有泉坡文集若干卷行世鄒良樂安人永樂乙未進士任松溪邵武知縣境內大治松有銀礦中貴主持為民患奏罷之升衡州知府政善民安致仕居鄉正身率物時稱古人君子省志何自學金溪人宣德初進士纍官陜西安察使讞鞠明允民喜不寃省志薑洪樂安人宣德進士召試便殿大加稱賞修實録成進官修撰洪為文舂容贍雅詩有唐人風歸卒于家有文集及筆府詳述行于世省志吳與弼溥子生八歲侍親遊京師從楊漙學見伊洛淵源輒有尚友之志以聖賢為必可師收斂身心倡鳴道學天順間聘至授以左春坊左諭德力以疾辭歸為文清明峻潔曲折紆徐讀之自使人興起及門受業者千數百人省志謝輔樂安人性聰敏讀書過目成誦正統己未第進士纍官浙江左參政金華盜聚入其壘諭以禍福賊感泣扣地遂散輔為人與物無忤操履端方始終如一省志伍福臨川人領正統甲子鄉薦歷官陜西督學副使致仕卒為人風格峻整言動有法詩文典雅世推服之兄禮歷官曹州知州有善政省志黃矩金溪人自幼英邁警敏孝弟根于天衷無意進取斟酌冠婚喪祭四禮行于家賙貧恤孤惟恐或後郡邑屢以材德薦皆以母老辭論者謂其古心古德可與黃叔度陳太丘並稱省志王常臨川人登正統進士除監察御史巡歷居庸時沙漠有警常固城守葺要以勤能稱受璽書白金之賜復巡南畿風裁茂著劉儼為作兩甸觀風記以紀其績省志楊貢樂安人正統己未進士歷監察御史按治蘇松歲大飢以便發兌軍米數十萬石以賑民賴更生升蘇州知府輕徭薄斂民謂之楊青天省志黃會臨川人景泰初登進士授行人司左司副持身不汚奉使不辱升南京屯田郎中綽有能聲官至苑馬寺少卿卒省志胡九韶崇仁人性重厚刻苦學問動循規矩少從吳康齋遊以道自任為文務典實不樂浮躁孝弟之聲聞於鄉井卓為一代之醇儒省志羅明崇仁人少有美質登景泰甲戍進士任御史巡浙江廣西風采凜然以才力著尋以僉事專理廣西軍務蠻獠寇賓州明募兵格戰俘馘甚衆生擒賊首仕至副使歸省志謝綬輔子景泰甲戌進士歷官四川左參議平崇彭寇改廣西適荔浦猺獞稱亂綬乘禨帥師圍於桂山岩同事者欲屠之賴綬以全活者萬計請置永安州治轉陜西參政賑飢民築引流隄立橫渠祠士民樹碑以紀其績纍升刑部侍郎南京禮部尚書卒于官省志徐瓊金溪人天順初廷試第二除翰林院編修預修大明一統志英廟實録寵賚甚隆官終太子太保禮部尚書省志陳勉臨川人登成化己丑進士除工部主事提督遵化鐵厰痛革宿弊升刑部郎中屢平反大獄出知泉州捕海寇禁水火葬親澆俗漸還以憂去士庶相與立愛民碑官終河東運使長子威次嬰俱進士第省志吳哲臨川人成化壬辰進士任嘉定知縣築堤四十里以捍海潮酌兩京歲額費立小婁塘以便民呼為吳公市升監察御史人莫敢撓以私巡兩淮鹽課鬻餘鹽二千餘萬引開各場運河九十八道再巡畿內權寵家侵據民地若干悉復之簡刑興利民免流離論者謂其得激揚之體省志洪鍾崇仁人幼有異質稱神童甫七歲隨父之京有以其所著書進憲廟召見嘉嘆命讀中祕書年十八登進士除中書舍人升禮部員外郎卒清材不夀士林惜之省志謝緝樂安人成化中進士授醴陵知縣有善政歷刑部主事治獄明慎升工部郎中治水徐州漕運軍民德之升知處州府宅心寬厚政尚平易有古循良風年未六十即乞去士民作去思録弟紳以孝行聞詔旌表其門省志吳世忠金溪人生而穎英𢎞治庚戌進士歷官給事中以謇諤名天下擢湖廣參議升延綏僉都御史選將練兵羌人不敢犯以疾歸卒于家所著有學庸通旨洪範考疑矜菴詩蠢遇録省志王萱金溪人幼超穎書過目即成誦登𢎞治壬戌進士改庶吉士授刑科給事中條陳多所采用嘗視師四川兩平蜀寇擢通政司右參議以疾卒于京邸省志列女陳氏臨川縣人塗端友妻宋紹興中盜起被驅迫之不從乃幽之壁屋居數日族黨齊金帛來贖其孥賊引陳令歸陳曰吾聞貞女不出閨閣今吾被驅至此何面目登塗氏堂復罵賊不絶竟死之梁氏臨川人歸夫王氏家才數月會元兵至與夫約曰吾必死若後娶當我告頃之夫婦俱被掠有軍千户強使婦從己婦紿曰夫在情不忍乞歸之而後可千户從之約夫行遠即拒罵奮摶乃被殺越數年夫謀更娶議輒不諧因告故妻夜夢妻云我死後生某氏家後當復為君婦明日遣人聘之一言而合詢其生與婦死年月同云鄧氏名柔玉臨川人適章宗原甫再歲而宗原死于紅中室無期功親鄧往依父母踰月子惠生惠數歲鄧携歸故廬勤女事以為家洪武間事聞旌表命下卒省志劉氏名順慶吉水人元國史院編修劉楚竒女臨川饒伯振妻未亡守節永樂間旌表省志黎氏臨川黎友和女吳彥升妻守節自誓清儉謹畏能處人所難處吳康齋為立傳省志黃氏名季貞崇仁王仲高妻仲高以尸役死于郡黃年二十四父母欲嫁之黃曰使吾兄弟或亡其外父奪父新婦以嫁父豈欲乎寧忍飢寒以奉舅姑不可違禮父母知不可強從之正統間旌表省志熊氏樂安丘咨疇妻夫故無子舅姑且沒哭曰妾不幸如此尚何用此生乃自縊以殉正統間同臨川聶同文妻胡氏旌表省志葉氏臨川朱希軾妻軾亡纍奉姑以孝子升以明經為儒官景泰中旌省志許氏臨川進士何書女適宜黃李時傑傑死許年十九守志不二訓孤有法天順初旌省志貝克寬妻黃氏崇仁人夫亡守節成化間旌表省志董氏名官貞樂安王表之妻年二十二夫卒斂訖即入室自經死楊貢為作烈婦傳成化間事聞旌表省志聶氏名妙真樂安人年十五納同邑王所聘未嫁而所聘亡訃聞涕泣欲往弔父母不可聶曰兒雖未入王門然既以身許之不可再醮遂闔户自經死以其喪歸王氏與所聘合葬焉羅倫取其事而傳之成化中詔特旌表省志元氏樂安王德修妻德修卒元年二十有五遺腹三月而生子家特貧勤紡績以事舅姑撫孤子至成立邑令陳世良為立傳稱其孝慈節義俱盡焉成化間受旌表省志郭氏崇仁李賢妻年十九歸于賢賢病足伏床者三年旦暮湯藥久而彌謹比卒棺斂畢乃大慟曰妾望夫以終其身夫亡無子妾將焉托遂潛縊于後園之木間尋被旌省志萬氏崇仁羅元方妻夫亡守節𢎞治間旌其門省志胥氏李氏皆臨川人李胥之嫂也正德壬申盜突至其里姑嫂走避之正舍傍有湖盜追之將及二女相携投湖而死省志詹氏樂安洪立妻正德辛未流賊犯邑執詹與男去行至東隅杏村井乃紿賊求水密謂男曰記母在此井遂投之賊退收其尸面如生時同邑志傅愈銘妻易氏詹崇妻潘氏俱被執不從遇害省周氏東鄉陳忠妻正德七年盜起忠率族人與戰不格潰圍走周被執自投于沼其伯母王氏揭氏嬸張氏饒氏王氏女金玉俱溺水後皆旌表時同邑季貫五妻張氏梁氏元五妻周氏梁伯一妻晏氏俱被執不屈遇害省志仙釋黃華姑臨川人姓黃名令微修道於井山行年八十餘顔如處子時人號曰黃華姑唐開元中尸解刺史顔真卿撰仙壇碑載其事鄧紫陽名思壦臨川人隱麻姑山中唐開元末感虎駕雷車之異奄忽而化歸殯本山靈昌太守李雍作碑記其事王文卿臨川人解呼雷致雨役使鬼神之術宋宣和初召見時將有事明堂雨不止上呼禱晴天忽開霽禮成復雨詔封沖虛通妙先生後歸老紹興一日謂其徒曰西北有黑雲起當速報我移時果然即入室解化乾道初人有見之於成都者白陽禪師號仙林姓王氏臨川人唐元和中出家於白陽院修行勤苦歲旱鍤地即泉湧出民得資以灌溉一日忽依鍤而化人推之仆地折齒尸自起立里人投其尸于水三日沂流故處衆異之塑其骨而祠之祈禱多應明一統志卷五十四
