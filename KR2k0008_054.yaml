body:
  text: 明一統志卷五十四明李賢等撰撫州府東至饒州府安仁縣界一百二十里西至吉安府永豐縣界三百二十五里南至建昌府南城縣界九十里北至南昌府進賢縣界九十里自府治至南京二千四十里至京師五千四百八十五里糧三十一萬石零建置沿革禹貢揚州之域天文斗分野春秋時為吳境後屬越戰國屬楚秦屬九江郡漢為豫章郡地三國吳以豫章東部置臨川郡𨽻揚州晉𨽻江州齊臨川郡徙治南城梁復治臨汝隋罷郡置撫州治臨川大業初改為臨川郡唐初復為撫州後改臨川郡乾元初復為撫州五代時楊吳置昭武軍節度宋仍為撫州𨽻江南西路元置撫州路本朝改為撫州府領縣六臨川縣附郭本漢豫章郡南城縣地東漢永元中分置臨汝縣吳又分置西平縣晉改曰西豐梁分臨汝北境置定川縣隋省西豐定川入臨汝改曰臨川縣為撫州治唐宋元仍舊本朝因之編户四百四十八里崇仁縣在府城西一百二十里本東漢豫章郡臨汝縣地吳分置新建縣晉屬臨川郡梁改曰巴山縣置巴山郡隋初郡縣俱廢置崇仁縣屬撫州唐宋元仍舊本朝因之編户二百二十五里金溪縣在府城東南一百一十里本唐臨川縣之上幕鎮南唐於鎮立金溪場宋初升場為縣屬撫州又割臨川四鄉并饒州安仁三鄉地入焉元仍舊本朝因之編户一百八十里宜黃縣在府城西南一百一十里本東漢臨汝縣地吳分置宜黃縣以水出黃上嶺故名晉屬臨川郡隋省入崇仁唐初復置尋省南唐置宜黃場宋初升為宜黃縣屬撫州元仍舊本朝因之編户六十五里樂安縣在府城西南二百四十里本撫州崇仁縣西南三鄉及吉州永豐縣一鄉宋紹興中割置樂安縣因有樂安鄉故名元仍舊本朝因之編户二百八十八里東鄉縣在府城東七十里本臨川金溪進賢餘干安仁之遠鄙正德八年東鄉盜平置縣以地在撫州府治之東故名編户一百一十六里郡名臨川吳名形勝瀕汝水以為郡宋謝逸文集序臨川在江西瀕汝之水以為郡而靈谷銅陵諸峰環列于屏障與兩粵七閩犬牙其疆唐獨孤及撫州新亭記居山川風雲之會宋郡守家坤翁云地方千里介江湖之表元虞集撫州譙樓記風俗俗同豫章隋志豫章之俗君子善居室小人勤稼穡臨川之俗同豫章風流儒雅宋謝逸文集序其俗風流儒雅喜事而尚氣有晏元獻王文公為之鄉人故其人樂讀書而好文詞民樂耕桑宋曾鞏擬峴臺記其民樂於耕桑以自足故牛馬之牧於山谷者不收五穀之積於郊野者不垣冠冕一路宋周必大進士題辭曰此邦非特地大人庶冠冕一路而人物盛多亦異他邦民秀而能文剛而不屈宋黃幹云獄訟淸簡元撫州推官廳題名記山川仙臨山在府城南一十五里工有集仙觀王郭二仙嘗至此故名英巨山在府城東二十三里山巖內有石人坐磐石上人體有塵穢則興風潤則致雨晴日遍體清瑩如玉井山在府城南二十五里即黃華姑修真之所有明真觀丹井在上故名龍會山在府城西四十里雙峰聳立上有曾真君仙壇中有四冗如馬蹄其泉清冽人呼為馬蹄泉舊傳雙峯高者為陽南五里有溫湯低者為陰北五里有冷水靈谷山在府城南四十里中有石室靈像臨川記云懸崖半岫有瀑飛流分於木杪映日望之如掣練宋王安石靈谷詩序吾州之東南有靈谷者江南之名山也龍蛇之神虎豹翬翟之文章梗楠豫章竹箭之材皆自山出而神林鬼冢魑魅之冗與夫仙人釋子恢譎之觀咸附託焉至其淑靈清和之氣盤礴委積於天地之間萬物之所不能得者乃屬之於人峨峯山在府城西四十六里本名銅山唐天寶中改今名山巔有仙壇絶頂有龍泉觀筆架山在府城西北五十里諸峯排立如筆架然免水山在府城西北六十里相傳唐堯洪水時人登此山者免害故名唐天寶間改名堯山雷公山在府城南七十里舊號大鹿山山外有池生碧蓮南隅有井魏末居人李天明禱雨至古樹下遇五老人云吾姓雷久處此井或云天明禱雨霹靂從井出因號雷公山上有靈泉觀戚姑山在府城南六十五里舊傳長安戚文秀女修道於此乘雲而升後人亦稱為凌雲山上有仙壇觀宋李梅亭詩踏翻碧澗泉中石飛透丹霞洞裏天更問戚姑無恙否約渠東去看桑田界山在府城東南九十里接建昌府南城縣界羅首山在府城東九十里跨臨川安仁之境望仙山在府城北九十里世傳王郭二仙望華蓋浮丘仙處朝真山在崇仁縣治南相傳王郭二仙尋真至此聖寶山在崇仁縣西南一十里上有仙祠祠傍有石光瑩紅潤故名玉華山在崇仁縣南一十五里上有玉華仙壇盤龍山在崇仁縣南二十五里地勢盤回自華蓋山而來寶蓋山在崇仁縣南三十里勢如寶蓋天寶山在崇仁縣東南三十里峭拔森聳為郡中竒觀仙華山在崇仁縣東三十里乃華蓋三仙道場士庶多丐福於此招仙山在崇仁縣東南三十五里茂林修竹流水映帶真羣仙所都之地沸湖山在崇仁縣東南四十里唐杜光庭煉丹之所宋紹興中山頂夜有光旦冗其處得古陶器上有沸湖二字感應山在崇仁縣東五十五里上立仙壇祀王郭二仙水旱疾疫禱之輒應巴山在崇仁縣南六十里有欒巴祀故名唐改曰臨川山宋邑宰孫懋避欒仙諱又改曰相山舊傳巴山有四仙曰梅欒鄧葉梅即漢梅福欒即欒巴隱此山鄧葉俱南城人芙蓉山在崇仁縣南一百里秀麗如菡萏出水狀頂有葛仙翁祠傍有龍潭華蓋山在崇仁縣南一百里形如華蓋又號江南絶頂昔王郭二仙超升于此上有仙祠下有紫玄洞傍又有雷洞天將雨則雲氣如爐煙直上須臾雷聲殷殷而出宋末有望氣者言華蓋臨川二山之間當産異人已而生吳文正公澄於山麓之咸口里寶唐山在崇仁縣西南一百五里跨樂安之境寶唐水出焉翠雲山在金溪縣南四里岡巒環合上有瀑布宋治平中儒士胡采發榛莽而出之有躍馬試茗鳴玉三泉及月石亭皆有王安石題詠金窟山在金溪縣東五里即前代採金之所故名有仙人麻鞋迹明山在金溪縣西一十里山巔有井隨江清濁謂之通江井銅斗山在金溪縣西南二十五里西南有芙蓉山上有神仙修道處宋曾鞏記曰銅斗山能出雲雨弭災害為一郡之望雲林山在金溪縣東四十里崒嵂數百仞界撫信建昌三郡其形勢為金溪之巨鎮上有三十六峯疏山在金溪縣西北五十里唐有何仙舟棄官隱居讀書于此因號書山其書堂遺趾尚存中和中創為禪剎賜額白雲南唐改為疏山柘岡山在金溪縣西六十里上有王安石讀書堂赤松山在宜黃縣西一十里有龍福寺有穗珠泉小簾泉昔鄒度支隱此號赤松子故名雲華山在宜黃縣南一十里亦名西華山又名馬山曹山在宜黃縣北三十里舊名荷王山山巔曰羅漢峯昔本寂禪師因禮曹溪六祖回此遂易名曹山山前有回龍亭其下有泉昔白眉禪師結庵山中時其水一日三潮鼇頭山在樂安縣治前山有兩峯一峯特秀山麓有巨石下瞰溪流狀若靈鼇赴海象眠山在樂安縣治東勢如象眠縣之主山也上砆山在樂安縣東北一十五里山石圓白色如碔砆金華山在樂安縣西北三十里形如覆瓢舊志云昔王郭二仙登此山以望華蓋相顧云此山絶似婺女金華但無白石為羊耳杯山在樂安縣北八十里遠望形如覆杯豐材山在樂安縣北八十里舊名麻山唐改今名荀伯子記云登之者望廬嶽彭蠡皆在其下五峯臨川志城中有五峯三市或謂青雲嶺逍遙嶺鹽嶺蕭家嶺與慶嶺而五宋曾子固贈撫州錢郎中詩翠幕管絃三市晚畫堂煙雨五峯秋即此青雲嶺在其最高結頂處謂之青雲第一峯狀元峯在府城西四十五里挺然秀麗世傳山下居人嘗有出狀元者金峯在府城北五十五里形如金字桃花峯在府城東六十里禱疫必應雄嵐峯在府城東七十里舊傳為王郭二仙修煉之所有茶竈丹爐遺迹上有靈泉鄉人抱疾者飲之多愈梅仙峯在崇仁縣南五十里相傳漢梅福煉丹於此元危索詩諌疏當年奏漢宮至今名迹遍諸峯經臺半掩三花樹丹臼橫遮五粒松近水衣裳清露濕並巖芝术白雲封因君更憶非非子杖屨登臨得屢從卓筆峯在金溪縣東二里形如卓筆下有硯池高峙于縣治之右梅峯在金溪縣南一十五里舊傳劉仙師嘗吹鐵笛呼雨上有遺迹百歲峯在金溪縣西二十五里上有周仙王廟明珠峯在金溪縣西北四十里相傳為周仙王遺迹有廟在焉仙女峯在樂安縣南六十里舊傳王郭二仙飛升之時嘗有仙女執幡其上萬歲嶺在府城西四十里舊傳宋隆祐太后經過指問此山之稱人以萬歲嶺對故名樟原嶺在府城西四十里石路高險元豐城人陸祥叔傭上鑿平側有雙黃井小門嶺在府城北六十里世傳王郭二仙尋浮丘經此上有三仙行祠雲蓋嶺在宜黃縣東北五十里其山常有雲氣盤繞故名金鼓嶺在樂安縣南一十五里其狀如鼓黃仙姑巖在府城東三十里其巖有三元虞集詩鐵色陰崖積石屯玉顔窈窕鎮乾坤上池降液作靈響左角出雲成曉暾手扶風雷穿月窟坐當星斗直天門昔人政有懷仙地為挹清泉注一尊金雞巖在崇仁縣西南一百二十里相傳浮丘養雞之所雞皆金色現則稔樵者於巖口嘗拾得雞糞其堅如石仙巖在宜黃縣北五里昔王郭二仙嘗問道寓此有朝真石拂霓洞遺迹宋周夢若有記香城莊燕洞在崇仁縣南五十里巖上有二佛迹泉流石罅中其石白如鍾乳浮雲洞在崇仁縣南一十五里洞冗不可深入相傳田家黃氏子夜寐驚魘見偉丈夫自稱回巖客令語世人曰此浮雲洞也得名以此紫玄洞在華蓋山昔浮丘王郭三仙隱此中有石屏石座石棋局錦繡谷在金溪縣治後宋王安石詩還家一笑即芳辰好與名山作主人邂逅五湖乘興往相邀錦繡谷中春羊角山石在府治譙樓前俗傳有人自西蜀青城山來尋羊角山郡人指示之其人扣石云青城山有書石忽開書入復合人亦不知所往鯉石在崇仁縣西一十五里舊傳琴高先生於此修煉所乘之鯉化而為石虎迹石在崇仁縣西南四十里昔王郭二仙跨虎憩其上遺迹尚存汝水其源上接旴江流經金溪縣南曲折行百餘里東流合豫章水其上流之分派自千金陂西流至郡城東抱城而北合宜黃崇仁二縣溪水流至南昌界合豫章水入鄱陽湖連樊水在府城西北五里源出連樊山流至郡城西抱城而北合于汝水荀伯子臨川記曰東興人以木甑浸井中後於連樊溪甘渚獲之可見其源之遠一云此水比他水獨重郡取充刻漏無差失臨水在府城西一十里源出崇仁縣臨川山下流至西津與汝水合夢江水在府城南三十里源出佛容山下注汝水西寧水在崇仁縣西五里源出華蓋山下流曲折五百餘里至西津與汝水合寶唐水在崇仁縣西一百二十里源出寶唐山下流合巴水福水在金溪縣南一十里源出於閩經南城梅峯至鼓樓岡下會石門港水淸江水在金溪縣南三十里其水清冽宜漚楮故土人造紙以清江著名苦竹水在金溪縣北四十五里乃汝水之上流也三港水在金溪縣東五十里源出崖山歷白蓮港至黎盆渡與青田港水合金溪水在金溪縣上幕嶺東水色如金縣因以名宜黃水源出宜黃縣黃土嶺流四百七十里至西津與汝水合鼇溪水在樂安縣治南源出芙蓉山東流至縣又西流與贑水合鼇山在其南昔嘗有人作釣鼇亭於溪上因以名溪大溪源水在樂安縣西北七十里源出大盤山北流至蛟湖合臨水縣南又有大溪水源出華蓋山西流至烏水流入永豐河遠溪水在樂安縣南一百八十里分三派至招携合烏水白鱓潭在府城北一百里相傳宋晏殊之先葬其祖掘地得雙白鱓一奔入潭故名青水潭在崇仁縣西北一十里源發七都流至縣西驢陂與大溪水合虎頭洲在