葬故名人嘗秉燭入塜第見一石室石壁間隠若有碑刻圖畫之文胡瑗墓在何山歐陽修撰墓表趙孟頫墓在徳清縣北一十八里東衡村商彭祖墓在孝豐縣西南二十里廣苕鄉彭宅里古蹟防風國在武康縣東二十里封禺二山即其所守者故菰城在府城南二十里楚春申君黄歇立菰城起樓連延十里秦併楚改置烏程縣晏子城在長興縣西南一百二十里齊晏子娶呉女築此城三城三圻在長興縣東臨太湖乃呉王屯戍之地步騎列於三城水軍列於三圻城與圻相接畛呉王城在長興縣即縣郭也呉王夫槩所築晉因其城狹而長故取以名縣曰長城故鄣城在長興縣西南一百二十里秦滅楚置故鄣縣為鄣郡治漢屬丹揚郡王莽改曰候望東漢復舊晉屬呉興郡故長州在長興縣隋大業末沈法興置此州後廢故綏州在長興縣唐武徳中置因古綏定縣為名又更名雉州後廢故安州在武康縣唐志云李子通立安州又曰武州唐初因之尋廢廢東遷縣在府城東四十一里晉太康初分烏程東鄉置隋平陳併入烏程廢原鄉縣在長興縣漢中平初分故鄣縣置晉屬呉興郡後廢唐武徳中復置屬雉州尋併入長城廢長城縣在長興縣東南十八里晉武帝分烏程西鄉立長城縣於富陂村即此廢永縣在府城西北漢興平初太守許貢奏分烏程置此縣伍子胥宅在府城西伍林村昔子胥避難築室於此謝𤣥宅在烏程縣亦名謝車騎宅王祥宅在安吉州東三十里梅溪鄉傍有卧冰池相傳晉王祥嘗寓此子昂别業在徳清縣元趙孟頫所居有懐徳清别業詩陽林堂下百株梅傲雪凌寒次第開杖上山禽曉啁哳定應喚我早歸來南園在府城安定門内宋寶元二年知州滕宗諒建五亭鑿二池慶厯中知州馬尋常宴客於此酒酣賦詩胡瑗作序刻石於園中石林在府城西北二十八里宋尚書左丞葉夢得居此當時堂亭不一今所存者惟石林精舎煙霞塢在武康縣東七里寳溪昔劉頴士之别墅林麓之勝號洞天中有龜巖巖上有亭曰藏天巖前瀑泉聲激如雷有橋亭名掛雲最為勝㮣谷口梅花綿亘數十里孝鵞塜在長興縣東蔣灣唐天寳末邑人沈氏畜一母鵞將死其離悲鳴不復食母死啄敗薦覆之又啣芻草列前若祭奠狀向天悲呌而死沈氏異之凾二鵞埋此後人因呼為孝鵞塜名宦三國駱統呉孫權領㑹稽太守統年二十試為烏程相民戶過萬咸嗟其惠理權嘉之晉周玘呉興太守有威惠百姓愛之朞年之間境内寧謐以功封烏程縣侯賀循武康令俗多厚葬及有拘忌停喪不葬者循皆禁之政教大行風俗丕變王羲之呉興太守雅好養性在郡盡山木之游子獻之亦嘗為呉興太守謝安呉興太守在官無當時譽去後為人所思弟萬子琰皆嘗為呉興太守虞􅔎呉興太守王導嘗曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎官木達而喪時人惜之陸納呉興太守至郡不受俸禄頃之召拜左民尚書領州大中正臨發止有被襆而已餘並封還官張𤣥之呉興太守以才學顯與㑹稽内史謝𤣥齊名時稱為南北二𤣥孔愉呉興太守封餘不亭侯從子坦為呉興内史以嵗饑運家米以賑貧乏百姓賴之謝邈呉興太守孫恩之亂為賊所執逼令北面邈厲聲曰我不得罪天子何北面之有遂被害孔嚴愉從子太和中呉興太守善於宰牧甚得人和又甄賞才能之士論者美馬殷康呉興太守聞荻塘溉田千餘頃王藴呉興太守甚有徳政屬郡饑藴輙開倉賑恤全活者十七八朝廷以違科免藴官士庻詣闕訟之孔靜呉興太守先是呉興頻喪太守俗謂項羽神為卞山王居郡㕔事二千石常避之靜居㕔事竟無害陶囘呉興太守年饑穀貴三呉尤甚詔欲聽相鬻賣以拯一時之急囘上疏不待報輙閒倉及割府郡軍資數萬斛救之由是一境獲全南北朝禇淵宋呉興太守好甄㧞士類嘗謂人曰郡中才士惟丘靈鞠及沈勁爾遂薦用之張岱宋時先為東遷令後兩為呉興太守晚節尤以寛恕著名張永宋呉興太守顧況湖州刺史㕔壁記云鴻名大徳在宋則謝莊張永朱齡石宋武康令邑民姚係祖豪横專事刼掠郡縣不能討齡石至偽與之厚掩殺之㓕其黨屬由是一郡得清傅琰宋武康令涖政明敏邑人稱為傅聖賜爵新亭侯張瓌南齊呉興太守以既封侯有國秩不取郡俸髙帝勑上庫别藏俸以表其清何敬叔南齊長城令有能名在縣清㢘不受禮饋夏節至忽牓門受餉數日中得米二千餘石他物稱是悉以代貧人輸租袁昂南齊呉興太守梁武帝起兵州郡望風皆降昂獨拒境建康平武帝勑曰袁昂世有忠節天下須共容之使者宣㫖昂亦不請降但撤備而已論者義之謝覽梁呉興太守郡境多盜覽下車肅然強横者不得肆在任以㢘㓗稱蕭暎梁呉興太守郡累嵗不稔大通三年野穀生武康凡二十二處自是豐稔張稷梁呉興太守下車存問遺老引其子孫置之右職政稱寛恕子嵊亦呉興太守遇侯景之亂守節不屈闔門遇害何逺梁武康令厲㢘節除淫祀正身率職雖上官亦無所謟人甚稱之蔡撙梁呉興太守在官惟飲郡井齋前自種蔬菜為常餌詔褒其清夏侯亶梁呉興太守在郡有惠政吏民圖其像立碑頌美殷不佞梁承聖初為武康令時兵荒饑饉百姓流移不佞詢撫招集襁負至者以千數呉明徹陳呉興太守文帝謂曰呉興雖郡帝鄉之重故以相授陳仲舉陳長興令政號㢘平後為尚書右僕射唐韋承慶儀鳯中烏程令政化流行民為刻石頌徳顔真卿湖州刺史招致名儒著韻海鑑源三百六十卷徳政洽於千里邦人仰之慶澄廣徳初以左兵曹㕘軍兼武康徳清二縣令邑經兵燹澄於瓦礫荆棘之塲創置宇舍城郭未及期年悉復其舊越嵗繁庻過半于頔貞元中湖州刺史部有湖陂異時溉田三千頃久廢頔行縣命修復堤塘嵗獲利萬計民頼以安杜牧大中間湖州刺史有惠政公退之餘登臨賦詠而已令狐綯湖州刺史宣宗間令狐楚有子乎白敏中曰子綯今守湖州其為人宰相器也召入知制誥五代髙彦仕呉越為湖州刺史居職十餘年政甚簡便下民愛之錢偡呉越湖州刺史有妖巫登大樹恣為鬼神語州人驚畏偡曰妖由人興命注弩而射巫果請命因鞭之州人咸服宋刁衎太祖時通判湖州上疏請定天下酒稅額修郡縣城隍條約牧宰除兩浙身丁錢禁汴水流屍凡五事許遵皇祐初知長興縣賑饑民興水利邑人疏其善政於石戴融天聖中知歸安縣未朞大治先是邑人困於茶賦融乃第戶豐乏而均之以絶追捕之苦又澤居者不務力穡融教之業農遂有恒産鄉民立祠祀之滕宗諒寶元初知湖州問民疾苦省視風俗尤屬意學校請胡瑗為教授邦人徳之胡瑗教授湖學四方之士雲集受業設為經義治事等齋時學者方尚辭章而湖學獨以經義時務聞慶厯中興太學下湖州取其法著為令胡宿康定中知湖州築石塘百里捍水患民號曰胡公塘又興學校儒風遂盛學者為生立祠滕甫英宗時通判湖州時孫沔守杭見而異之曰竒才也後當為賢將授以治劇守邊之畧後又知湖州孫覺熙寧中知湖州嵗饑賑濟甚博沿湖隄沒水為民患覺易以石髙丈餘長百里隄下化為良田蘇軾元豐中知湖州以事不便民者不敢言以詩託諷甫三月而去郡人懐之毛滂元符間知武康縣慈惠及下政平訟簡時隣邑多歉惟武康豐稔林槩知長興縣闢庠序置生徒躬自誨飭邑人登第者接踵嵗大饑富人閉糴以邀價槩出俸粟倡率富民輸數千石以飼饑者王彀政和初知徳清縣時括茶租甚嚴徳清山間茶最盛彀使盡剪伐之自後徳清茶租遂輕陳吉老宣和初知長興縣為政有風力當方㓂擾攘縣境竊發吉老身任其責誅鋤強暴民頼以安俞俟宣和中知歸安縣凡事處之以公朱勔請括諸路隠匿田縣獨不與鹽法屢變私販者罪甚重縣獨寛之趙嵎知徳清縣青溪盜起嵎聚保甲邀擊擒其二將獲兇徒二百餘人邑頼以安趙子嶙建炎初知湖州時金人南侵子嶙親率將士禦敵人皆感勵死守事甫定遽罷去民攀戀涕泣御史達於上詔還郡後人祠之葛勝仲知湖州時羣盜縱横聲摇諸郡勝仲修城郭作戰艦閲士卒賊知有備引去嵗大饑發官廩賑之民頼以濟其後子孫遂居湖州汪藻知湖州以顔真卿盡忠唐室嘗守是邦乞表章之陳之茂紹興中知湖州為政嚴肅時金人㓂邊之茂修城治器械聚糧食東南士大夫挈家依之余端禮孝宗時知烏程縣民間賦丁絹錢率三氓出一縑不輸絹而折其估一縑千錢後增至五千民不勝苦端禮以吿於府事得上聞嵗蠲緡錢六萬王十朋乾道中知湖州崇儒重道以教化為先禁強横恤小民又以已貲營貢院郡學士人徳之顔度乾道中知長興縣聽訟能於純樸之中時出智巧以探其情由是政稱神明楊長孺嘉定間知湖州夙夜盡瘁清獄訟折強横境内晏然稱為神明治聲聞於四海程九萬知武康縣下車首訪儒術頑民姦宄繩之以法境内肅清秩滿去任邑人攀餞閭巷為空袁甫通判湖州考常平弊原以增積貯核隠産增附嬰兒局甚有惠政趙與懽嘉定中知安吉州郡計仰𣙜醋禁綱峻宻與懽首捐以與民設銅鉦縣門欲愬者擊之寃無不直有富民愬幼子者開以天理遂欣然感悟又嫠媪二子吿以不孝留之郡㕔日給饌俾親饋未周月母子如初孫子秀浙西提刑冒暑周行郡縣獄為之清安吉州有婦女愬人殺其夫與二僕逮繋者考掠莫得其實子秀密訪之乃婦女略宗室子殺其夫僕救之并殺以㓕口一問即伏遠近稱神明李芾知徳清縣屬浙西饑芾置保伍賑民活數萬計縣有妖人扇亂命芾討之盜聞之立散趙艮淳知安吉州日為守禦備時嵗饑民聚為盜或請以兵擊之良淳曰時艱故剽掠茍活耳民豈樂為盜哉乃以義諭之衆皆散歸及元兵陷城自經死元史樞安吉州安撫使時新附之初猶依險自保樞以威信招懐之復業者以千萬計鄧文原浙西廉訪僉事呉興民夜歸為巡邏者所執遁去有追及者刺之仆地比死兄問殺者何人曰白帽青衣長身者兄愬有司執直初更者使服械繋三年文原行部録之疑焉鞠之果得真殺人者曹宗輔至順中知徳清縣修令示人而人自避之有仁惠之政愛民如子既去邑人惜之為立去思碑沈拱辰至元間安吉尹抑強鋤暴姦豪歛迹事至立决吏受成而已魏信歸安尹涖事嚴而有法人莫敢干以私姦民點吏不敢欺隠民皆悦服仇治徳清尹清獄訟禁冗濫門無私謁上下肅然本朝楚岳洪武初知湖州府有惠政郡中多所修造題扁尚存蘇從善知長興縣廉介明敏躬行教化民皆懐之張桂知安吉縣居官廉介所得俸禄悉以養親自奉不過蔬食而已何淵洪武中知歸安縣清慎孚於民同官疾其能以事誣繋御史臺邑民詣闕陳狀願以身代朝廷即日釋之使復其官張士良知安吉縣為人有氣節臨民有儀凡文廟壇塲修整一新髙彬任歸安縣丞以事連坐耆民詣闕言彬公廉不擾民民得安業乞加寛宥遂釋之梁材𢎞治末知徳清縣平易正直清介絶俗興利除弊薄賦輕徭後知嘉興杭州二府在有徳政陞本省叅政轉按察使縛中官録畢真絶宸濠援應浙人恃以安名臣劉天和正徳中知湖州府正直忠厚練達精明以古良二千石自待先時平孝豐湯毛九之亂見三功祠省志流寓錢林本徐州人漢建平中為諫議大夫元始中王莽専政林遂棄爵來長興隠陂門里不干名利子孫因家焉裴子野河東人好學善屬文仕梁為著作即寓居呉興著宋畧或問其為文速者子野云人皆成於手我獨成於心張志和唐金華人擢明經肅宗時待詔翰林尋以親喪不復仕自號煙波釣徒顔真卿刺湖州獨重之又號𤣥真子觀察使表其所居曰𤣥真坊陸羽問孰與往來曰太虚為室明月為燭與四海諸公共處未嘗少别何有往來陸羽唐復州人初未知生長以易筮之得蹇之漸曰鴻漸于陸其羽可用為儀因曰陸羽上元初隠苕溪自稱桑苧翁又號竟陵子闔門著書或獨行野中誦詩擊木裴囘不得意或慟哭而歸羽嗜茶著經三篇陳舜俞嘉興人嘗寓烏程舉進士又舉制科第一宋熙寜初知山隂縣青苗法行上書力詆其非責監南康軍鹽酒稅何彦猷髙唐人宋紹興中為大理丞時秦檜誣岳飛下獄彦猷言飛無罪万俟卨劾其撓法罷黜寓徳清餘不溪檜死髙宗欲召用而彦猷已卒蔡洸仙遊人徙居霅川以父伸䕃補將仕郎又中法科累官户部尚書知寧國府去朝之日囊無餘資人服其清潔牟子才井硏人宋嘉定進士累官權工部侍郎時丁大全與宋臣表裏濁亂朝政子才累疏辭歸以御史誣劾罷官居安吉州四壁蕭然人知其清弟子方客死公安亦葬安吉子巘大理少卿敖繼公福州人寓居湖州䆳通經術動循禮法元趙孟頫師事之平章髙顯卿薦於朝授信州教授命下而卒所著有儀禮集説人物漢丘滕烏程人光武朝歴官公卿二千石退居鄉邑乃於先人故塋與其弟子築室而居沈瑜烏程人與弟儀少有志行瑜十嵗儀九嵗父亡居喪毁瘠過於成人外祖盛孝章撫慰之曰汝並黄中通爽終成竒器何遽逾制自取滅性耶瑜早卒儀篤學有雅才以儒素自業守道不移費汎呉興人以孝友聞歴官至蕭令在邑多善政蝗不入境子鳯言不失典術行不越矩度安帝時舉孝廉拜郎中義行卓然施延呉興人歴太尉鴻臚卿魏黄初中詔曰故漢先賢太尉施延等二十四人並立忠貞之節咸修清白之行邪佞所䜛禍及其身若有遺嗣宜顯舉之三國朱治安吉人隨孫堅征伐有功歴官都尉孫權建國稱帝封治毘陵侯拜安國將軍徙封故鄣恩敬極隆治薨子才嗣為人精敏善騎射權亦異之朱然治甥本姓施年十九為山隂令呉吕䝉病篤大帝問卿如不起誰可代者䝉以然對䝉卒假節鎮江陵蜀漢攻宜都然與陸遜拒破之後封永安侯子績為建中都尉隨潘濬討五溪以膽力稱然卒績嗣爵呉粲烏程人仕呉為曲阿長治有名迹黄武初與吕範等拒魏將曹休於河口值天大風諸船綆絶軍多溺水攀粲船請援左右以為船重必敗粲曰船敗當俱死爾奈何棄之所活甚衆官至太子太傅王談烏程人年十嵗父為隣人竇度所殺談有復讐志密市利鍤俟度卒殺度而歸罪有司太守孔巖義其孝勇列上宥之呉元興中舉孝廉不應終於家晉丘昂呉興人家貧好學織畚以自給與弟給事中夷太守矩並以孝行著聞當時謂之三丘沈勁呉興人守洛陽城陷不屈為慕容恪所害神色自若恪曰今定洛陽而殺沈勁實有愧於四海施彬呉興人歴官尚書左丞信安義興二郡太守封中蠲侯子平畿官至尚書潘綜烏程人孫恩之亂綜與父驃共走避驃困乏綜迎賊叩頭曰父年老乞賜生命賊斫驃綜抱驃賊斫綜凡四創有一賊謂曰殺孝子不祥父子俱得免後以薦累官遂昌縣長宋元嘉中改其里曰純孝蠲租布三世南北朝沈田子武康人宋武帝北伐田子領别軍從武關入屯據青泥秦姚泓數萬奄至田子所領數百奮擊秦兵大敗斬首萬餘授咸陽始平二郡太守沈道䖍武康人性仁愛好易老隠居北石山下困不改節有人竊其屋後大筍令人止之曰惜此筍欲令成林乃買大筍送與之盜者慚不取宋文帝徴之不起以琴書自樂子慧鋒修父業不就州辟沈慶之武康人少有智畧躬畊壟畝年四十未知名宋元嘉中雍州諸蠻大擾以為建武將軍進討威震諸蠻後贈侍郎司空諡曰襄公子文李寛雅正直由秘書監出為吳興太守風采稜厲累遷侍中左僕射沈巑之吳興人性疎直仕宋為丹徒令在縣自以清廉不事左右浸潤日至遂鎖繋上方嘆曰一見天子足矣武帝召問曰復欲何言答曰臣坐清所以獲罪帝問清何以獲罪曰無以承奉要人帝曰要人為誰巑之以手板四面指後知其無罪重除丹徒令沈懐文武康人少好𤣥學善為文章仕宋歴官至侍中遇事敢諫犯忤甚多鯁介正直不為謟容有文集弟懷逺撰南越志子三人淡深沖皆有名譽沈演之武康人沈氏家世為將而演之折節好學宋元嘉中累官尚書吏部郎後歴位吏部尚書領太子右衛率兄子坦之仕南齊至都官郎吳逵宋烏程人嘗值饑荒合門疾疫死者十三人逵病愈家貧晝則傭賃夜則伐木燒磚為生常夜行遇虎虎輙避之朞年葬十三棺太守張崇之三加禮命皆不就舉為孝廉沈憲宋武康人少有局幹仕為烏程令甚著政績太守禇淵嘆美以為方圓可施卒官廣陵太守沈麟士武康人祖膺明晉大中大夫父岳宋樂安令麟士博通經史居貧織簾誦書不息隠居吳羌山講經教授從學者數百人宋齊梁屢徴不起著周易兩繫莊子内篇訓註易禮記春秋尚書論語孝經喪服老子要畧數十卷丘靈鞠烏程人少好學善屬文仕齊累官員外郎參掌詔䇿入梁為東觀祭酒嘗曰人居官願數遷使我終身為祭酒不恨也子遲八歳能屬文官至中書侍郎從孫仲孚亦好學為山隂令有能聲丘寂之宋烏程人年十七為州西曹兼直主簿刺史王彧行夜還前驅已至而寂之不肯開門待墨㫖然後開彧嘆曰不意郅君章近在閣下即轉為主簿遷鄣令専以廉潔御下有能名丘冠先烏程人少有節義仕南齊為給事中使蠕蠕國蠕蠕逼令拜冠先執節不從曰能殺我者蠕蠕也不能以天子使拜夷狄者我也遂見殺武帝以冠先不辱命賜其子雄錢布雄不受沈約武康人博通羣籍善屬文仕梁累官至中軍將軍丹陽尹尚書僕射著晉齊梁書及文集數百卷呉均呉興故鄣人文有古氣時謂之呉均體梁天監中自呉興主簿召入待詔著作累遷奉朝請撰齊春秋註東漢書太史叔明梁烏程人呉太史慈之後少善莊老兼通孝經論語每講說聽者嘗數百人為國子助教邵陵王好其學及出為江郢州皆攜叔明之鎮所至輙講授士皆傳其學沈崇傃武康人父懐明宋兖州刺史崇傃六嵗喪父哭踊過禮及長事母至孝母喪既葬廬墓三年梁武帝遣使慰勉令釋服權補太子洗馬旌表其門沈文阿梁武康人父峻好學不輟仕為國子助教博士文阿少習父業研精章句累官國子博士尋領步兵校尉兼掌儀禮一時斟酌裁撰禮度皆自已出所撰有儀禮八十餘條及春秋禮記孝經論語義疏等書沈浚武康人少有材幹仕梁累遷御史中丞侯景逼臺城簡文遣浚詣景景横刄瞋目叱之浚正色曰沈浚六十之年且天子使也何用見脇徑去不顧沈重武康人専心儒學博覽羣書仕梁為五經博士卒年八十四隋文帝遣使祭以少牢贈開府儀同三司所著有三禮義毛詩音等書沈瑀武康人仕梁為尚書右丞以母憂去官後累遷潯陽太守瑀性剛嘗忤刺史蕭穎達在道為人所殺衆謂穎達害之子續累訟不白布衣蔬食終身沈洙武康人父梁國子博士洙精識強記五經章句諸子史書問無不答仕梁為尚書祠部郎陳武帝入輔除國子博士累官尚書左丞沈烱武康人少有俊才為時所重仕梁為呉令侯景之亂呉郡守入援以烱監郡景將據呉興使召烱辭以疾及景東奔至呉郡獲烱妻子並殺之梁元帝憫之封烱原鄉侯胡頴呉興人偉姿容性寛厚從陳武帝征伐屢建功業武帝受禪累官呉興太守卒諡曰壯錢道戢長城人父任梁漢夀令道戢少以孝行著聞及長有才幹陳初從文帝平張虎於㑹稽以功封永安縣侯天嘉初為始興内史以討賊功累官都督郢州刺史卒諡曰肅沈恪武康人深沉有幹局陳武帝起兵以功封東興侯歴官呉興太守䕶軍將軍特進金紫光禄大夫卒諡曰光章昭達武康人輕才尚氣少時遇相者曰卿容貌甚善湏小虧則富貴及拒侯景中流矢𦕈一目陳文帝為呉興太守因委以將帥累功除都督江州刺史封邵陵郡公進位司空沈君理呉興人美風儀博涉有識鑒仕陳為呉興太守以幹理見稱太建中遷吏部尚書官至侍中右僕射卒諡貞憲沈不害武康人博通經典陳天嘉初為嘉徳殿學士仕梁季喪亂國學未立不害上書請崇建儒官又表定樂章仕至尚書左丞陳仲舉武康人仕陳以著作郎出為長興令政號廉平官至尚書僕射隋姚察武康人父僧坦梁大醫政察幼有至性六嵗誦書萬餘言勵精學業十二能屬文梁文帝在東宫時即引於宣猷堂聽講論難後仕隋為秘書丞修梁陳二史及刪定朝式子思㢘仕唐為名臣施世瑛安吉人勇斷有才氣大業中天下擾攘乃率宗族鄉隣子弟聚糧自守聞唐髙祖起兵領衆歸附拜桃州刺史賜賚優厚沈光呉興人少驍捷善戲馬為天下最常慕立功名煬帝時應徴從攻遼東以衝梯繫城竿長十五丈光升其端臨城與賊戰短兵接殺數十人帝壯異之以為折衝郎將江都之難戰死呉嶠霅溪人精明天文袁天剛師事之煬帝時嘗過鄴中吿其令曰中星不守太微主君有嫌而王氣流萃於秦地子知之乎令不之信及唐髙祖即位始知其言之不誣唐錢九隴長城人善騎射累官右武衛將軍從平洛陽佐皇太子建成討劉黒闥有功封郇國公改巢國卒諡曰勇陪葬獻陵徐𥅆長城人八嵗能文太宗召試賜所佩金削刀累官至西臺舎人在職多進讜言子堅舉秀才官至集賢院學士孫嶠中書舎人三世相繼為文翰侍從時人榮之沈伯儀呉興人武后時為太子右諭徳嘗議郊丘配祀禮歴官祭酒修文館學士陸龜蒙長興人嗜茶置園於顧渚山中有别業在松江時往來耕種自號天隨子江湖散人孟郊武康人少隠嵩山性介少合為詩有理致最為韓愈所稱登進士調溧陽尉後隨鄭餘慶鎮興元為叅謀卒張籍諡曰貞曜先生錢起長興人工於詩天寳中舉進士與郎士元齊名時語曰前有沈宋後有錢郎大厯十才子起其一也沈𫝊師徳清人舉進士登制科儒學文藝為一時之冠仕至翰林學士吏部侍郎包融呉興人有才名制科擢第官至集賢學士子何起居舎人佶刑部侍郎沈景筠烏程人性至孝母懼雷及卒葬宅西每雷鳴則奔至墓所號哭云某在此賀知章為撰孝徳傳沈韜文呉興人父攸常州刺史韜文性介潔好學能屬文呉越時為元帥府典謁叅畫軍務有所禆益後命牧鄉郡以為湖州刺史甚有清名宋葉參烏程人宋初州人業儒者寡㕘卓然自立咸平中登第累官兵部郎中出守鄉郡子清臣天聖初舉進士踐西掖北門之選詞章炳蔚馳譽當時呉可幾安吉人好右博雅與弟知幾同登景祐初進士可幾仕至太常少卿知幾為郎官守其父屯田墓三年平地出泉時號孝子泉張先烏程人康定初進士詩格清麗尤長於樂府有雲破月來花弄影浮萍破處見山影無數楊花過無影之句時號為張三影官至都官郎中莫君陳歸安人少從安定胡瑗學嘉祐間登第御家嚴整如官府子砥知永嘉民立生祠孫伯虚知常州有甘露嘉禾之瑞沈括湖州人嘉祐中進士累官太子中允提舉司天監置象器新厯轉太常丞時籍民車禁蜀鹽括論止之使契丹圖其山川風俗上之拜翰林學士後謫秀州卒括博學無所不通凡律樂醫卜諸家皆有論著盧革徳清人少舉童子年十六登進士慶厯中知龔州後累官福建湖南轉運使復請外神宗謂其廉退宜與嘉郡遂為宣州以光禄卿致仕子秉帥渭州乞解官終養帝數賜詔慰勉劉述歸安人舉進士累官為侍御史熙寧初論新法謫知江州曽孫岑倜儻有髙義官至戶部侍郎姚祐長興人元豐末進士徽宗時為左司諫建議置輔郡以拱大畿歴知江寧府鄭秦州累遷工部尚書加龍圖閣學士為大名尹進延康殿學士卒諡文僖俞汝尚烏程人為人温温有禮議論不茍澹於勢利聞人善言善行記之不忘擢進士歴簽書西川判官與蜀守趙抃最相得王安石當國欲薦為御史汝尚力辭得免以屯田郎中致仕歸優游數年卒孫侔紹興中為敷文閣直學士劉誼長興人為江西提舉熙寧中上疏極論新法不便坐廢黜後隠於茅山子燾元祐間進士文章典麗尤善書黄庭堅嘗稱之謂羊欣復生被命修閣帖十卷有遺文五十卷號見南山集朱服烏程人父臨為秘書丞服熙寧進士為監察御史裏行章惇嘗遣袁黙見服道薦引意服舉劾之紹聖中除禮部侍郎後坐與蘇軾游貶興國軍劉珏長興人崇寧間登第累官中書舎人陳十開端之戒遷吏部尚書建炎中同知三省樞密院事奏行追復元祐黨人故官及録用子孫未盡者所著有呉興集及集議若干卷盧知原徳清人為梓州轉運副使後改江西過闕入奏徽宗勉之曰卿在蜀道功效甚休遂賜三品服卒官徽猷閣待制弟法原自知雍丘縣積官至吏部尚書後為川陜宣撫副使賈安宅烏程人大觀三年狀元累官至戶部侍郎歴仕三朝屢司文柄其所選掄皆得成材徽宗嘗手詔奬諭之莫濛君陳曾孫兩魁法科累官大理評事理獄多得其情後遷直寳文閣學士假工部尚書使金賀正旦錫宴濛以本朝忌日不肯簮花聽樂金人不能奪施鉅武康人政和間登第累官叅知政事清約自持無聲色之好卒年九十一史祺孫安吉人政和間登第以刑部郎官出典贑興國二郡初秦檜謀誅岳飛命祺孫蒐索其家交游書劄祺孫悉焚其書曰誣人以求榮吾不忍為也遂引年而歸沈與求徳清人政和間進士累官御史中丞知無不言前後幾四百奏辭皆切直遷吏部尚書兼翰林學士金人入㓂贊髙宗親征進知樞密院事卒諡忠敏沈畸徳清人第進士累官殿中侍御史時蔡京興蘇州錢獄欲䧟章綖兄弟白遣畸往代張茂直且啖以美官畸至即釋左證者七百人嘆曰為天子耳目司而可附㑹權要殺人以茍富貴乎遂閲實平反以聞京大怒削三秩貶信州監酒劉一止述族孫宣和間登第為秘書郎遷給事中封駁不避權貴紹興中以敷文閣直學士致仕有類藁五十卷從弟寧止亦中第官至吏部侍郎進徽猷閣學士知秀州論疏多剴切有教忠堂類藁十卷沈琯徳清人仕為燕山府提舉金兵犯邊為郭藥師所執以河臨之終不能屈遣同李鄴赴闕議和琯首陳虚實乞邀擊之不用著南歸經世二録以攄忠憤葉夢得叅族人舉進士累官翰林學士建炎中遷戶部尚書除左丞以崇慶軍節度使致仕所著有易書春秋傳及奏議文集成無玷武康人舉進士調江山令宰相李網薦其文武才畧召對除刪定官紹興初金人犯順吕頥浩復薦守鄂州兼鄂岳安撫使修築城壘教閲士伍皆祖諸葛亮遺法髙宗兩賜御劄褒美時論多之芮曄烏程人與弟暉力學起家號二芮紹興間同登進士第曄任國子司業學者稱為得師暉累官兵部尚書沈該歸安人紹興間為禮部侍郎出知䕫府召還除叅知政事復大拜該䆳於易嘗撰小傳六卷上之髙宗降詔褒美刻石於其私第李彦頴徳清人少端重強記覽紹興間登第累官叅知政事論事激烈披露忠蓋以觀文殿學士致仕卒贈少保諡忠文周淙長興人父需由進士官至左中奉大夫淙幼警敏力學累官直龍圖閣除兩浙轉運副使知臨安府所至有成績封長興縣男沈樞安吉人舉進士調彭澤丞用葉義問薦賜對首論君子小人之辨髙宗嘉之除監察御史坐不附楊邦彦獲譴貶端州尋起知温州沈复徳清人舉進士乾道初為太常簿賜對稱㫖除宗正丞累遷知樞密院事所著有四益齊集奏議真徳秀嘗序其文謂其議論不少詘有古大臣之體趙彦博武康人舉進士守郡持節俱以能稱孝宗朝累官工部侍郎倪思歸安人乾道初進士累遷禮部侍郎論疏剴切悚動人主且屢觸權臣韓侂胄三黜不變其風槩卒官寳文閣學士歿諡文節沈作賔歸安人為紹興府通判帥守丘崈政尚剛嚴作賔濟之以寛邦人恱之知平江府得節制之宜海道無警官至權戶部尚書以顯謨閣學士致仕卒趙與􅊸太祖十世孫居湖州嘉定中進士歴知嘉興慶元紹興府後權揚州兩淮安撫制置使以知平江府致仕特贈少師葛邲歸安人祖勝仲知湖州父立方官至侍從邲舉進士累官刑部尚書紹熙中拜左丞相以少保致仕卒諡文定邲在言路論疏皆切中時弊居相位能守法度進人才處已以不欺為本有文集二百卷錢選烏程人舉進士善詩畫論者以選畫趙孟頫字馮應科筆為呉興三絶魯伯能安吉人博學強記九嵗通五經日讀萬言家貧無油夜乘月光誦讀達旦歴官處州太守生平無所嗜好惟以翰墨自娯有文集三百餘卷游汶徳清人咸淳中歴江西江東福建提刑俱有能聲賈似道當國汶與論事忠誠懇切國亡隠居元叅政浦大全薦為福建路緫管固辭不就嘗大書衣背云前宋提刑今為百姓服之以出入焉朱泰武康人家貧鬻薪養母一日入山為虎所攫暝眩稍醒厲聲曰恨母無托爾虎忽棄泰走不顧如人疾驅狀遂匍匋歸養母鄉里聞其孝感率金帛遺之陳存湖州人累官至殿中侍御史宋亡元遣使七徴不起遂却醫絶粟旬有四日卒章鑄烏程人累官修職郎讜直敢言宋亡元俾故臣納誥勑鑄終不肯以世食宋禄坐未嘗北向宋士有仕元者鑄皆深惡絶之人多其節徐俊徳清人太學進士嘗率六館生抗疏乞斬賈似道三上不報元至元中累徴不起卒於家門人私諡曰安節先生元趙孟頫歸安人宋宗室博通經史工詩能文善書畫舉進士為潤州録事叅軍國亡家居益力於學至元間以薦入朝世祖見其神采煥發甚竒之授兵部侍郎累官翰林學士承㫖卒諡文敏追封魏國公夫人管氏亦能書畫子雍善屬文能書畫仕至海州知州牟應龍湖州人父巘宋大理少卿應龍當補京官盡讓諸從弟擢咸淳進士對策忤賈似道調定城尉宋亡不仕父子自為師友討論經學於經皆有成說以文章大家稱於東南號隆山先生倪淵烏程人從學於敖繼公動必以禮為湖學教授著易圖說二十卷宇文公諒歸安人通經史百民言有操行累官國子監丞嶺南㢘訪僉事平居雖暗室必正衣冠端坐晝有所為夜則書之其不可書即不敢為所著有折桂等集門人私諡曰純節先生張復烏程人為泰州同知與趙孟頫姚式䡗皆以文學知名當時號為呉興八俊沈夢麟歸安人勤學勵行年十七即以詩鳴為婺州學正遷武康尹所至有聲入本朝五司閩浙文衡一考㑹試人皆服其公卒年九十三所著有花溪集本朝張羽烏程人讀書一覽不忘為詩文俊逸典雅洪武初舉明經為郡學訓導與髙啓楊基徐賁齊名號髙楊張徐歴官翰林待制太常寺丞王升徳清人洪武初坐事繫刑部獄時升子瑱為平涼知縣升寄瑱書戒以居官廉㓗撫民仁慈報國忠勤處已謙敬買附子川椒經税而後寄來獄吏捜得其書以聞朝廷嘉歎下詔褒美賚白金百兩絹十匹附子五枚椒五斤免其所坐復其家嚴震直烏程人器宇宏偉洪武初以税戶授布政司叅議累官工部尚書轉右都御史所至能聲綽著嘗出使安南不辱君命朝廷特加寵眷詔優其家丁役以旌表之陳援烏程人性廉介博學能文洪武間由長興學訓導遷刑科給事中累官大理寺丞讞獄多所平反嘗陳治平十疏子寔閩縣主簿贈翰林編修聞良輔徳清人才行超卓洪武中為監察御史累遷大理少卿出使暹羅國官至廣東按察使温祥卿長興人通隂陽家學洪武中由人材薦累官兵部尚書四川布政使潘長夀長興人恬靜好學洪武中由人材舉任右僉都御史歴南雄潯州知府楊復長興人刻苦問學為詩文尚竒古日抄唐韻數過得字義之精永樂初浙江鄉試第一登進士拜監察御史累遷大理少卿决獄判案人服其能凌晏如歸安人精六書之學永樂初以楷書選授給事中奏對凱切累官至右僉都御史張翼歸安人永樂初第進士歴任福建雲南僉事所至不失憲度累官至河南左叅政柴震烏程人永樂間由給事中累選大理寺少卿㢘介有為綽著能聲列女徐氏長城人名惠八嵗能文父甞使擬離騷為小山篇曰仰幽巖而流盻兮撫桂枝以凝想將千齡兮此遇荃何為兮獨往父大驚唐太宗聞之召為才人太宗討四夷徐上疏極諫後為惠妃郎氏安吉人宋進士朱甲妻甲仕浙東以郎氏從元至元間朱歿郎䕶喪還至玉山里留居避盜勢家栁氏欲強聘之郎誓不從死拒得免家居事姑甚謹姑嘗病郎禱天刲股肉進啖而愈後姑喪以哀聞元大徳中旌其門沙氏主事郎理妻安吉人也洪武初從夫官京師理死沙哭曰夫為忠臣妾獨不得為烈婦乎遂自經事聞賜祭馳驛歸葬省志徐氏烏程人年十六嫁未朞而夫病篤顧徐曰我母老爾年少奈何徐泣下即引刀斷左小指以死誓夫死遂布衣長齋卒年七十六省志倪氏歸安人許聘陳閔八陳從征不返遥以死聞倪守志不嫁踰五十年而陳歸竟成婚姻之禮俱年六十嵗有竒號白髪新婚省志石門丐烈婦湖州人莫詳姓氏正徳初湖饑婦與其夫及姑走崇徳石門市乞食婦有殊色市人欲挑之與之食不顧與之財亦不顧寓東髙橋上同夫與姑不至及二日聚觀者益衆婦乃從橋躍入水中以死省志王氏呉忠妻安吉人家甚貧正徳初夫疫死婦無依有欲收之者婦不應乃為麥飯瘞夫塜前痛哭良久以草蔶裹身自沉溪而死省志仙釋莫月鼎歸安人名起炎初習舉子業三試有司不利乃着道士服更號月鼎入青城山見徐無極授五雷法用是召雷雨破鬼魅動無不驗雖嬉笑怒罵皆若有神物從之者元世祖遣御史中丞崔彧求異人於江南得之賞賚優厚卒年六十九金華宋濂為之傳沈野雲本朝烏程人名道寧幼習外學通列仙傳朝廷累召禱雨皆驗深悅之賜三品誥封為至道髙士明一統志卷四十
