body:
  text: 明一統志卷四十明李賢等撰湖州府東至直隸蘇州府呉江縣界六十里西至直隸廣徳州界一百三十里南至杭州府仁和縣界一百二十里北至蘇州府呉縣界一十八里自府治至南京七百二十里至京師四千三百里糧四十七萬石零建置沿革禹貢揚州之域天文斗牛分野古為防風氏之國春秋時屬呉後屬越戰國時屬楚為菰城秦置烏程縣介於㑹稽鄣兩郡之間漢初屬荆國景帝時屬江都國元狩初為㑹稽丹揚二郡地東漢屬呉及丹揚郡三國呉始分置呉興郡治烏程縣梁兼置震州陳罷州仍為呉興郡隋初郡廢以其地屬蘇杭二州仁夀初置湖州取太湖為名大業初州廢復分屬呉餘杭二郡唐復於烏程置湖州天寳初改呉興郡乾元初復為湖州屬江南道乾寧中陞忠國軍節度五代呉越奏改宣徳軍宋改昭慶軍又改州曰安吉屬浙西路元置湖州路本朝改為湖州府領州一縣六烏程縣附郭秦置烏程縣屬㑹稽郡因烏氏程氏善釀故名漢永建中改屬呉郡孫呉於此置呉興郡隋罷郡以縣屬蘇州尋置湖州宋屬安吉州元屬湖州路本朝因之編戶二百六十七里歸安縣附郭本烏程縣地宋太平興國中析其東南境置歸安縣以呉越王歸土故以歸安為名元仍舊本朝因之編戶三百五里長興縣在府城西七十里秦為障郡地漢為烏程故障縣地晉分置長城縣屬呉興郡隋初省入烏程尋復置屬蘇州大業中屬呉郡唐初置綏州又改名雉州尋廢州以縣屬湖州五代時呉越改為長興縣宋屬安吉州元陞為長興州本朝改名長安尋復舊洪武二年改為縣編戶二百三十六里徳清縣在府城南九十里本漢烏程縣地孫呉為永安縣地晉以後為武康縣之東境唐析置武源縣屬湖州景雲初改曰臨溪天寶初改為徳清縣宋元仍舊本朝因之編戶二百一十四里武康縣在府城南一百七十里本漢烏程縣餘不郷之地孫呉析置永安縣屬呉興郡晉改武康縣隋初縣罷尋置屬餘杭郡後屬湖州隋末李子通置安州又改武州唐廢州以縣屬湖州五代時屬杭州宋屬安吉元屬湖州路本朝因之編戶六十三里安吉州在府城西北一百二十里本漢丹陽郡故鄣縣地東漢析其南境置安吉縣仍屬丹陽晉屬呉興郡梁陳屬陳留郡隋入綏安縣屬宣州後復置唐初屬桃州尋省入長城復置屬湖州宋元縣仍舊本朝初因之正徳二年陞為州編戶六十七里領縣一孝豐縣在府城西南九十里本安吉縣地𢎞治元年析置孝豐縣後安吉陞州因屬焉編戶五十三里郡名呉興呉名霅川以川名形勝江表大郡呉興為一唐顧況刺史㕔璧記山澤所通舟車所㑹雄於楚越同上南國之奥宋張方平湖州學記五湖之表郡國志山水清逺宋蘇軾墨妙亭記江外佳郡宋司馬光詩江外饒佳郡呉興天下稀州在呉江之南震澤之隂元志蒼峰北峙羣山西迤元趙孟頫呉興賦風俗人性敏柔而慧三朝國史志儒風盛於東南自湖學始舊志自江左而後清流美士餘風遺韻相續宋張方平湖州學記其民足於魚稻菱蒲之利寡求而不爭宋蘇軾墨妙亭記其人夀其風信實宋李方直白蘋堂記土風淳厚習俗歸美元長興州志家有詩書之聲戶習㢘耻之道元趙孟頫呉興賦山川峴山在府城西五里本名顯山晉太守殷康建亭於上名顯亭唐改曰峴山山多石草木疎痩宋蘇軾詩苕水如漢水粼粼鴨頭青呉興勝襄陽萬瓦浮青㝠我非羊叔子愧比峴山亭山在府城東北五里東臨大溪西帶長犢山上有亭浮玉山在府城南七里玉湖中巨石如積坡陀磈礧不以水盈縮為髙卑故名此山之南兩小峰參差曰上下釣魚山元趙孟頫詩玉湖流水清且聞中有浮玉之名山千帆過盡暮天碧惟見白雲時往還毘山在府城東九里山最近城取毘為名言其近也唐桞渾嘗建亭於上元趙孟頫記謂逺樹微茫中突若覆釡仁王山在府城西北九里舊名鳯凰山世傳昔人以山有王氣遂鑿其頸通舟為小河車蓋山在府城南九里上有車蓋亭晉太守殷康建何山在府城南一十里舊名金蓋山晉太守何楷嘗居此讀書因名宋蘇軾詩今古何山是勝遊亂峰縈轉繞滄洲雲含老樹明還滅石礙飛泉咽復流元趙孟頫有雪後遊何山詩道塲山在府城南一十二里唐時有僧寓此因名道塲宋蘇軾詩道塲山頂何山麓汪藻云遊道塲山者如入王侯之家過何山者如造髙人𨼆士之居元趙孟頫有詩别鮮山在府城東一十三里爾雅曰小山别大山鮮註曰不相連此山孤秀不相連屬故名西余山在府城東一十八里元趙孟頫記越玉湖而東與車蓋對峙者曰上下河口山又東四小山衡視則散布不屬從視則聯若鱗曰沈長曰西余曰蜀山曰烏山衡山在府城南一十八里左傳襄三年楚子伐呉克鳩茲至於衡山即此一名横山以其山形横立故名山舊有項羽祠法華山在府城西北一十八里亦名石斗山晉王羲之嘗遊此卞山在府城北一十八里髙六千丈非晴天爽月不見其頂山有似玉之石因名亦名弁山其下有玲瓏山石皆嵌空有唐人詩刻又有别峰號西陵山呉主孫皓葬父處元趙孟頫詩出郭聞鶯語穿林散馬蹄磵松何欝欝春草又萋萋白石那堪煑丹崖尚可梯平生愛髙興只合此幽棲昇山在府城東二十一里亦名烏山以古烏巾氏所居一名歐餘山又名歐亭山昔越王無疆之子蹄封於歐餘山之陽為歐陽亭侯子孫因以為氏晉太守王羲之嘗登此山顧謂賔客曰百年之後孰知王逸少與諸卿至此乎後人因名昇山西塞山在府城西二十五里唐張志和詩西塞山邊白鷺飛桃花流水鱖魚肥湖趺山在府城東南二十五里漢薊子訓𨼆於餘不卿卒葬於此山側有湖廣二百頃名湖趺漾白鸐山在府城西北二十六里連亘長興縣東南昔鄉人姚紾化鸐來此後因名孺山在府城東二十八里三呉地記漢徐孺子哭友人冀州刺史姚元起於此後人慕之因以名山杼山在府城西南三十里陸羽記昔夏后杼廵狩之所後人因名今山下有夏王村石城山在府城西南三十里昔烏程人嚴白虎於此壘石為城與吕䝉戰至今山上有弩臺烽樓走馬將臺遺址九乳山在府城西南三十一里下有九峰其形如乳黄蘖山在府城西南三十五里梁光禄卿江淹賦詩之所小雷山在府城北三十六里太湖中有大雷小雷二山相距六十里小雷乃洞庭東山屬烏程大雷乃洞庭西山屬長興二山間多出美石葛仙山在府城南五十里晉葛洪嘗𨼆此山職方圖志葛仙煉丹處天下十有三烏程居其一又有菁山與此相連世傳乃洪種黄菁之地東抺山在府城西南五十四里突兀如在菰蒲溪泊之中峰巒蓊秀上有浮圖呉疁山在府城西南六十六里疁燒田也昔有呉氏於此燒山為田因名三山在府城東北七十二里太湖中白波四合三點黛色晉陸雲贈顧彦先詩我家五湖隂君住三山陽謂此馬鞍山在府城西南七十六里以形似名連屬武康北境銅山在府城西南九十五里一名銅峴山括地志呉采鄣山之銅即此山之西屬安吉縣其南屬武康縣前溪發源於此含山在府城東南一百八里張𤣥之山墟名云震澤東望蒼然茭葦烟蔚之中髙丘卓絶謂此莫干山在府城西南一百五十里上有鑄劒池旁有磨石世傳為呉王鑄劒之所包山在烏程縣境呉都賦指包山而為期謂此或云即古夫椒山史記越王勾踐棲呉王夫差於夫椒之上戍山在長興縣西三里一名夫㮣山昔呉王夫㮣於此築戍城故名梁呉興太守張嵊與御史中丞沈俊亦於此築城以捍侯景本朝初元帥耿炳文嘗於此點軍今為點軍山雉山在長興縣北五里梁武帝時有童謡曰烏山出天子故江左以烏名山者皆鑿之惟此山不經鑿陳髙祖此處人果應其謡藝香山在長興縣北一十五里相傳為西施種香之所又名湖陵山吕山在長興縣東南二十里呉將吕䝉屯營於此故名亦名程山飛雲山在長興縣西二十里山南有風穴故雲霧不得靄鬰於其間劉宋置飛雲寺有石泉沙渚松門竹巖葅中山在長興縣西北二十五里忻湖山墟名云昔呉王於此山取蔬為葅後因以名夏駕山在長興縣東南三十六里夏后杼南巡至此因名上有石鼓又名石鼓山方山在長興縣西南四十里以其頂方故名昔陳文帝為信武將軍自長城縣遣二千人夜下方山津即此地堯市山在長興縣西北四十里堯時洪水民避難於此成市今山上有池廣一畝山下有堯廟呉山在長興縣南四十三里昔呉王送女至此山梁呉均卜宅於此唐呉筠復居之因名八座山在長興縣西南四十五里唐呉珙呉頊呉崧皮光業林鼎羅𨼆韓必何肅居此號八友後人因名八座西顧山在長興縣西北四十九里亦名呉望山昔呉王闔閭嘗登姑蘇望五湖見山因名烏瞻山在長興縣北五十里昔有烏子瞻望此山上曰可以避難養道為𨼆者所居故名鳯亭山在長興縣西北五十里相傳昔有鳯棲於此白鹿山在長興縣西五十里舊名嵓山呉王闔閭時有白鹿見此因名義鄉山在長興縣北六十里晉太守周玘舉義兵平石􅖅陳敏等賊立義鄉縣因以名山西噎山在長興縣西北六十里有澗水北流西向峻狭其聲嗚咽因名近此有赭石懸日二山青山在長興縣南六十里山有石竇通太湖及洞庭山冬月常煖色如黛青浮雲山在長興縣西南六十里上有七十二墩久旱山頂生浮雲即兩四安山在長興縣西南八十里山四面平廣故名四安有水流㑹苕溪亦名四安溪又名周瀆九龍山在長興縣西南一百二十里山有隴悉作龍形因名即石墩山之隂也呉憾山在徳清縣治西南昔呉王憾越王傷父之足進軍征之於此築壘又唐李光弼偏將辛孜嘗築城於此平朱覃姚廷等賊故又名城山呉羌山在徳清縣治東南漢髙士呉羌避王莽之亂𨼆此東主山在徳清縣東北三里梁侯景圍臺城右將軍沈恪主此山晝夜拒戰以功封東興侯因名今呼為百僚山山之東有五子石相傳有仙人嘗弄石於此徳清山在徳清縣東四里一名烏山昔有烏巾者居此山其家能美釀宋鮑照有登烏山詩唐天寳中改今名金鵞山在徳清縣西北五里後漢海昏侯沈戎葬其上有金鵞飛集三鳴而去其後沈氏通顯諺云金鵞鳴沈氏興蠡山在徳清縣東北一十五里舊傳有范蠡故居因名茅山在徳清縣東北一十五里相傳三茅君嘗𨼆此山葛山在徳清縣東北一十八里上有葛仙翁遣跡金紫山在徳清縣北一十八里郡城丁氏葬此山後贈金紫光禄大夫因名敢三山在徳清縣東北二十一里以山在敢村南有呉丞相故居望洛山在徳清縣南二十九里晉永嘉中洛人過江多登此山以望洛囚女山在徳清縣北三十里東漢青州刺史姚恢與海昏侯沈戎過江卜居柯田山恢女密報戎戎先居之恢囚女於此後又因名烏囘山在武康縣北三里平田間突起一峰古人多登髙於此石城山在武康縣西南三里漢末赤眉之亂邑人壘石城以禦冦因名石嶠山在武康縣西南四里山頂有石嶠甚峻滑亦名七里嶠水安山在武康縣西五里舊永安縣以此山名亦名銀山獨孤山在武康縣西北五里唐獨孤及宰是邑作亭於上因名此山之西有几山形如几案招賢山在武康縣西北七里又縣北十五里有郭林山相傳皆晉郭文舊𨼆處響應山在武康縣西八里人經此山随語有應聲故名山下有龍湫號碧玉潭白鵠山在武康縣西一十里亦名鵲山獅子山在武康縣東一十餘里首枕大溪盤跼如狻猊形其東北接歸安縣界銅官山在武康縣西北一十五里唐改名武康山世傳呉王濞采銅於此山下有二坎號銅井傍有石鷰洞燕之𨼆見以春秋分與巢鷰同沈壁山在武康縣東北一十五里山有九峰迤邐相接昔沈氏自東陽徙永安居此故名仙臺山在武康縣東北一十八里世傳黄初平煉