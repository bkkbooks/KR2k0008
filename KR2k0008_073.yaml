body:
  text: 明一統志卷七十三明李賢等撰天全六畨招討使司東至雅州界五十里西至長河西宣慰司界一百四十里南至雅州榮經縣界六十里北至董卜韓胡宣慰司界一百五十里自司治至南京七千八百四十里至京師一萬一千二百九十里建置沿革禹貢梁州之南境天文井鬼分野古蠻獠之地西魏為始陽縣地屬蒙山郡隋初郡廢屬雅州唐為羈縻州𨽻雅州都督府宋𨽻雅州元置碉門黎雅長河西寧逺等處宣撫司属土蕃等處宣慰司後改六畨招討司又分置天全招討司本朝併天全六畨招討使司𨽻四川都司形勝東連雅州西控乾溪南接榮經北抵靈闗新志抵接黎雅控帶夷落圖經南詔咽喉西志長河居其西韓胡在其北司蜀之襟帶南詔之咽喉風俗男不習工藝婦不事紡績惟以耕種為業新志山川禁山在司治西兩崖對峙峭拔險隘龍頭山在司治北以形似名玉堡山在司治西其山積雪如玉故名泥山在司治東雲頂山在司治北四里多功山在司治東五十里昔禹治水鑿此山用功甚多故名和水在司治南四十里源出蠻界羅巖州下流入雅州平羌江東注岷江土産氊氁麝麂蠟烏茶嘉魚錦雞闗梁禁門闗在司治西紫石闗在司治西七十里以上二闗俱有雅州千戸所戍守承宣橋在司治東三里仙人橋在司治西三十里龍安橋在司西三十五里以竹索為之寺觀大悲寺在司治東四十里宋淳祐八年建天王寺在司治南三十里元至正七年建黎州安撫司東至沖天山八十里西至雜道長官司界一百三十里南至越嶲衞界九十里北至榮經縣界二十里自司治至南京七千九百九十里至京師一萬一千四百四十里建置沿革禹貢梁州之西境天文井鬼分野古西南夷筰都地漢定西南夷以筰都為沈黎郡尋罷郡置兩部都尉一治旄牛主外羌一治青衣主漢民並𨽻蜀郡東漢西部都尉領蜀郡属國晉時李雄據蜀以漢嘉蜀二郡地分置沈黎漢原二郡後復為晉有廢漢原沈黎而置南陰平晉原寧蜀始寧四郡宋齊並為沈黎郡後周兼置黎州及沈黎縣尋廢隋復置縣及登州大業初廢州以縣属臨卭郡後省唐復置南登州尋廢後割雅嶲二州地置黎州神龍中州廢開元初復置天寳初改為洪源郡尋改曰漢源乾元初復為黎州治漢源縣五代時前後蜀繼有其地宋属成都路元属土蕃等處宣慰司本朝洪武八年省漢源縣改為黎州長官司十一年陞黎州安撫司郡名沈黎漢名漢源唐名形勝州城三面並臨絶澗唐元和志處越嶲卭蜀之中唐通望鎮碑記蜀之西門宋王已盤陀寨記南隣六詔西接吐蕃樊柔直侯寳堂記風俗俗混夷漢郡志地處極邉俗混夷漢氊裘椎髻宋余授朱櫻堂記蠻商越駔氊裘椎髻交錯於闤闠中博易不用錢寰宇記每漢人與蕃人博易不用見錢漢以細絹茶布蕃以紅椒鹽馬蠻俗尚鬼宋史黎州諸蠻其俗尚鬼謂主祭者鬼主故其酋長號都鬼主山川邛崍山在司城北五里邛人自蜀入度此山故名一名邛筰山蓋邛人筰人界也其道至險有長嶺弄棟八渡之難楊母閣路之峻登髙山在司城西五里峯巒髙聳俯瞰城中通衢官舎民居一一可數上一小阜曰望州坡聖鍾山在司城東北五里昔有人聞山中有鐘聲及見五色光現異人云此地當有巨鐘取之果得白崖山在司城西北二十里一名風穴山其傍有風穴間有氣出騰空為白雲須㬰風起號怒如雷寳蓋山在司城東南二十里山形如盖俗名凉繖山山溪中嘗有光彩見盤陀山在司城南三十里大田山在司城西南三十里下有大井水田笋筤山在司城西北五十餘里曰前筤又行數十里曰後筤山多笋故名又多林木樵蘇者以為衣食之源號曰錢筤試劒山在司城南八十里嶄然髙聳上列三峯中峯又析為二狀如劒削故名沖天山在司城東八十里山極髙峻勢若參天牛心山在司城西八十里上有小阜形如牛心避瘴山在司城南九十里近大渡河嵐瘴夏秋最多土人移居此山避之和尚山在司城東南一百里其峯矗立盤紆十餘曲方至其上晴日常有五色光現千態萬狀極為奇觀獅子山在司城東北一百里以形似名乃陶道人得道之地通望山自大渡河南與衆山相連入嶲州朝陽山在司城北一百里隋唐於其下嘗置朝陽縣城址尚存飛水山在司城東北二百五十里與榮經縣接界險惡不通人蹟畫崖山在司城西北二百五十里山勢險峻不通人蹟山外即生蕃界飛越山在司城西北兩面與羌戎接界為沈黎西境之要害唐於下置飛越縣靈應洞在邛崍山有巨蛇蟄其中碗蜒錦紋又號為靈應將軍洞仙人洞在白崖山北穴如車輪欲入者必匍匐方能過其中空濶行數十步泉聲琮琤石髓溜結幽致萬狀乾濕洞在避瘴山有二洞一空澗髙燥一有水出其中有床坐竈突之類皆崖石自生不假人為凡瘴欲動時飛鳶皆集此山瘴已乃出土人欲知無瘴以鳶為候然鳶出必在立冬前後古謂飛鳥得氣之先於鳶亦可見也彈琴谷在司城西北一十里水出溪中聲如彈琴盤龍谷在漢源鎮東北大渡河源出吐蕃經于城南九十里東注嘉定入于岷江兩澗水司之東西各有澗至登髙山下合為一漢源之田皆仰此灌溉𣑽音水在司城南一十五里俗傳唐僧三藏至此持梵音而泉湧出故名色如米瀋味甘宋政和間太守宇文侯過而飲之曰佳泉也易名粲玉泉泉南數十步有二巨石一號袈裟石五色相間一號曬經石皆三藏遺蹟漢水源出飛越山流經城南二十里東入岷江一名流沙河羅目溪在司城東通望廢縣北琉璃溪在司城西南國百里接蠻羌界渥洼池在蠻部内産馬其前後之田皆膏腴昔首領亦號鬼王有印篆文曰武犍水軍莫究所自龍池在司城東一十里池口有龍祠内有枯楂三株如龍形觸之則風雨暴至海棠池在司城西北五里環池皆海棠郡守與賓僚遊宴之地白雲泉在司城東北五里馬跑泉在和尚山俗傳肉齒和尚創菴山上乘白馬至山半馬渴而跑地泉為之湧土産牛黄麝香升麻筇竹杖花椒天南星公署大渡河守禦千户所在司城西北隅洪武十五年建書院玉淵書院在舊黎州城内宋開禧初知縣薛紱建於崇徳祠西宫室静鎮堂在司治舊黎州正堂之東偏後改曰君子堂堂之左右有藏春留香二亭及思仙臺三山堂在静鎮堂東與試劒山三峯相直故名澄心堂在司治舊小㕔東喚魚亭在司治舊州圃東湖湖方廣十丈芙蓉萬盖錦鱗千尾架橋其中掲亭橋上曰喚魚摇香亭輿地紀勝在兵馬司前有茶䕷芙蓉之勝闗梁黒崖闗在司城西二十里洪武十六年建清溪關在大渡河外唐韋皋鑿之以通羣蠻號曰南道為重鎮天漢橋在司城南九十里宋紹興間建叱馭橋在司境宋太守李石有記寺觀崇寧寺在司城北四里永興寺在司城東古龍興故址本朝永樂元年建祠廟王尊祠在邛崍山靈應祠在古沈黎城北漢越嶲太守任貴祠也宋薛紱記任侯殺王莽郡守枚根自領太守任彭伐蜀遣使迎降及劉尚繫益州恐任分其功乃誣害之任以寃死史臣不為力辯使其附漢之志未明為可哀也武侯廟在司城北三里宋紹興中郡守邵溥因舊鼎新榜曰天威廟又作二室塑唐韋臯及李徳裕像武威廟在司城内祀蜀漢將軍馬忠姜維廟在司城外西坡山頂有趙雲祠在安靖埧維雲皆蜀將飛越廟在司治西二百餘里地属雜道長官司陵墓三王墓在故漢源縣東五里唐史載邛黎之間有三蠻王使伺南詔其初劉志遼為恭化郡王郝全信為和義郡王楊清逺為遂寧郡王然莫知所封始卒葬於此古蹟沈黎城在漢源鎮附近十餘里漢武帝置郡後周黎州隋唐登州皆置于此或云在古嶲州之域舊黎州城在聖鍾山下古城又在河外武侯城在舊黎州城外三里諸葛亮所築壕塹故壘存焉又有武侯戰蕩在安靖新寨三交城在飛越山下唐時所築舊名三琱後訛為三交琉璃城在大渡河南唐太和中節度使李徳裕築陽山城在大渡鎮西唐初置陽山縣属登州後属黎州銅山城在司城東一百八十里定蕃城在司城東南二百二十里二城俱唐貞元間韋皋築仗義城在司城南九十里唐太和五年李徳裕築以制西蕃其在境内者又有廓清肅寧大定潘倉等城要衝城在司城南一百里臨大渡河唐貞元初韋臯築俗呼炒米寨王建城在司城北十五里地名木𤓰園蜀王建時築漢源廢縣在司城南三十里隋大業初置唐徙治於州郭縣改為鎮通望廢縣在司城東南九十里本陽山縣唐初属登州天寳初改為通望縣属黎州宋省入漢源縣飛越廢縣在廢漢源縣西北一百里唐儀鳳初置属雅州開元初属黎州宋省入漢源大渡廢縣在司城北一百里唐置属雅州後廢為鎮入飛越縣三藏梨在舊黎州治小㕔東世傳唐三藏遊西域經行植棃杖于此云他日州治在此後果遷如其言其後梨成株髙五丈圍九尺宋天聖間州治火人取其枝以接他株夜义博物志蜀南沈黎山有物似猴長七尺能人行名曰玃路見婦人則盜之入穴西蕃部落最畏之寰宇記穴在慶厯鄉山峽有一洞石壁間有夜义像土人祀之號穿崖將軍洞名宦唐韋臯西川節度使於黎州築要衝等城與東蠻共擊吐蕃前後斬首至五萬餘級善撫士及卒蜀人徳之見其遺像必拜李徳裕西川節度使自南詔入冦民無聊生徳裕置雄邉子弟築仗義城以制大渡清溪闗之阻作禦侮城以控榮經犄角勢作柔逺城以扼西山吐蕃復邛崍闗徙嶲州治臺登以奪蠻險逺民以安宋許仲宣四川轉運使開寳中西南夷冦鈔邉境仲宣親至大渡河諭以逆順示以威福夷人率服曹光實義軍都指揮王全斌平蜀殘冦猶據沈黎光實討平之以知黎雅州安集勞來蠻部懷服遷黎州刺史侍其曙大中祥符初黎州夷亂詔曙乗驛往招撫其酋首納欵曙與殺牲為誓所至皆降孫構知黎州夷年墨數擾邉構用間殺之蜀帥吕公弼上其事權知真州蕭定基明道間知黎州有善政歲大熟活旁郡饑民不可數計始無舉進士者得甯誠誨之踰年以文貢禮部裴子良皇祐間知黎州儂智高反聲言入南詔犯蜀州人危懼裴能鎮撫安堵孫侯嘉祐末知黎州戮邛部川鬼王而立其弟范鼎臣治平初知黎州督戌卒治湟塹再歳畢功民不知役成者以上五人進士鄧復亨為作循吏傳郭綸黎州都監官滿貧不能歸權嘉州監税蘇軾詩河西猛士無人識日暮津亭閲過船路人但知驄馬痩不知鐡槊大如椽因言西方久不戰截髪願作萬騎先我嘗慿軾與寓目看君飛矢謝蠻氊孫偉宣和間知黎州飲食外不市一物比去謂人曰吾所愧古人者囊中有十星金耳先是偉之官丞相張方平笑曰沈黎亷者不往往者不亷偉黙然不荅後竟以亷稱宇文常政和末知黎州有上書乞於大渡河外置城邑以便互市者詔訪常常言太祖觀蜀地圖畫大渡為境歴百五十年無夷患今若於河外建城邑邉隙寖開非中國之福也乃止虞允文紹興間權知黎州有㫖下制司買絶等珎珠蓋秦檜意也帥閫奉承唯謹督公市之蕃蠻允持之不下㑹檜没而止牛大年知黎州兼節制黎雅屯戍軍馬以亷潔自將清操凜然何充通判黎州攝州事元兵破邛崍闗充自刺不死為元將所執許以不殺誘之降充曰吾三世食趙氏禄為趙氏死不憾遂死之妻陳罵不絶口亦死於是上下感泣願同死者四十餘人仙釋陶道人黎州卒也宋紹聖間入獅子山採薪遇異人得道與王畫龍同時所畫龍有神異必有所闕不然則隨雷雨變化每見王輒以杖擊之曰此龍妖也後俱不知所終思曩日安撫司領青川守禦千户所建置沿革闕山川大雄山在青川守禦千户所城北一十里山形峻峭夐出羣山東山在青川守禦千户所城東三十里白水江在青川守禦千户所城東三百四十里魏鄧艾伐蜀嘗作浮橋於此公署