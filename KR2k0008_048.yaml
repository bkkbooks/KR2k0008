body:
  text: 明一統志卷四十八明李賢等撰溫州府東至海岸九十里西至處州府青田縣界九十里南至福建福州府福寧縣界四百九十里北至台州府黃巖縣界三百三十里自府治至南京一千八百九十里至京師四千六百九十里糧十萬五千一百石零建置沿革禹貢揚州之域天文斗牛女分野春秋戰國時並屬越秦屬閩中郡漢初為東甌王國後為會稽郡之回浦縣地東漢為章安縣地又分置永寧縣三國吳屬臨海郡晉置永嘉郡治永寧隋初廢郡改縣曰永嘉屬處州大業初屬永嘉郡唐置東嘉州後廢以縣屬括州上元初置溫州以其地恆燠少寒故名天寶初改永嘉郡乾元初復為溫州建靖安軍五代時吳越建靖海軍宋為應道軍建炎初仍為溫州咸淳初升瑞安府元改溫州路本朝改為溫州府領縣五永嘉縣附郭本東漢章安縣東甌鄉地屬會稽郡永和中析置永寧縣吳晉屬臨海郡隋初改為永嘉縣屬處州後屬永嘉郡唐宋為溫州治元仍舊本朝因之編户二百八十六里瑞安縣在府城南六十里本章安縣地吳析置羅陽縣後改曰安陽晉改安固屬臨海郡隋省唐復置屬溫州天寶初以縣有白烏之祥改瑞安縣宋因之元升為州本朝洪武二年復改為縣編户一百三十九里樂清縣在府城東北六十里本東漢永寧縣地屬會稽郡晉析置樂成縣隋省唐復置五代梁時改樂清縣宋元仍舊本朝因之編户一百三十四里平陽縣在府城西南一百五十里本晉臨海郡安固縣地太康初析置始陽縣尋改曰橫陽隋省唐復置乾元中改平陽縣宋因之元升為州本朝洪武二年復改為縣編户二百三十一里泰順縣在府城西南三百七十里本瑞安平陽二縣地本朝析置泰順縣編一十八里郡名東甌漢名永嘉晉名東嘉唐名形勝城當斗口郡志始議建城郭璞登山相地有數山錯立如北斗因曰若城于山外當驟致乎富盛然不免干戈水大之虞若城繞其巔冦不入斗則安逸可以長守於是城于山且鑿二十八井以象列宿東南巨都會藝文類聚控山帶海利兼水陸實東南沃壤一巨都會浙東極處宋趙㞦壁記溫之為州最浙東極處冬無祁寒夏無甚署東界巨海西際重山元志俯瞰大海江出郡城之後東與海合元黃溍重修海堤記風俗少爭訟尚歌舞隋志婦勤紡績同上婦人勤於紡績有夜浣紗而旦成布者俗謂之雞布俗喜競渡郡志舊俗以端午日競渡於會昌湖里人遊觀彌岸綺翠綵艦鱗集數里華麗為他郡最鄉會以齒永嘉志每嵗旦於郡學飬源堂上交拜敘賀鄉曲聚會以齒不以爵自許景衡始器用備而粳稻足同上地不宜桑而織紝工不宜漆而器用備不宜粟麥而粳稻足賢哲相踵宋張九成云永嘉道德之鄉賢哲相踵前輩雖往風流尚存山川華蓋山在府城東一名東山遙望似華蓋道書為第十八洞容成太玉之天積穀山在華蓋山南兩峯相聫形圓如髙廩故名又名飛霞山松臺山在府城西一名西巖山巔有高塔為一城標的海壇山在府城東北古語云海壇沙漲溫州出相宋咸淳間沙漲陳宜中應之郭公山在府城西北下臨大江舊志晉郭璞登山相此州故名巽吉山在府城東南三里當府治之巽位黃土山在府城南三里土色純黃仁王山在府城南五里一名臣山靈官山在府城南五里宋林靈素葬此故名世傳永嘉為北斗城以華蓋松臺郭公海壇四山為斗魁積穀巽吉仁王三山為斗杓黃土靈官二山為左右輔弼孤嶼山在府城北有東西二峯峯上各有塔劉宋謝靈運詩江南倦歷覽江北曠周旋懷新道轉逈尋異景不延亂流趨正絶孤嶼媚中川雲日相輝映空水共澄鮮表靈物莫賞藴真誰為傳想懷崑山姿緬邈區中緣始知安期術得盡飬生年羅浮山在府城北五里一名密羅山瑞鹿山在府城西五里舊志昔有人於此山見白鹿因名西山在府城西六里為永嘉登覽勝處謝靈運詩遙望城西岑即此北山在府城北一十里郡之主山也瞿嶼山在府城東二十里相傳吳義士瞿素所居吹臺山在府城南二十里山頂平正如臺相傳為王子晉吹笙處地産椅桐梁太守丘遲常採以製琴唐張又新詩吹簫臺下緑煙凝日落雲收疊翠層岷岡山在府城西三十五里其間深潭邃谷勝概無窮五峯山在府城西南三十五里俗稱丁公山瞿溪山在府城西三十五里謝靈運過瞿溪詩清霄揚浮煙大羅山在府城南四十里一名泉山漢朱買臣言越王居泉山一夫守險萬人不得進即此金丹山在府城西上有三峯赤色逺望如丹霞映水石鼓山在府城西六十里山有石如鼓擊之有聲永寧山在府城北相傳梁陶𢎞景棲遁處破石山在府城北臨江壁立石形如帆石門山在府城北謝靈運詩疏峯抗高館對嶺臨回溪長林羅户庭積石擁階基連巖覺路塞密竹使徑迷石室山在府城東七十里上有石夫人及瀑布泉天臺山在府城北一百五十里山形如甑旁有十三峯環列先後中有傅巖及瀑布泉石匱山在府城北一百五十里上有方石狀如匱西峴山在瑞安縣治西舊志昔有仙人馬湘居此白巖山在瑞安縣治東一名龍山又名白鹿巖篔簹山在瑞安縣東八里一名篔簹谷山多産竹岑踦山在瑞安縣東一十里有巨人迹旁有乳泉集雲山在瑞安縣北一十里縣之主山也五公山在瑞安縣西三十里世傳梁時高僧志公等五人居此陶山在瑞安縣西三十里梁陶𢎞景隱居之所仙巖山在瑞安縣東四十里道書為二十六福地上有三皇井唐姚揆銘曰維仙之居既清且虛一泉一石可詩可圖福全山在瑞安縣西四十五里梁陶𢎞景隱居處道書為第三十三福地帆逰山在瑞安縣北四十五里唐張又新詩漲深海嘗從此地流千帆飛過碧峯頭君看谷為陵後翻覆人間未肯休五雲山在瑞安縣西一百里唐時嘗有五色雲現雲頂山在瑞安縣東山有齊雲洞漱玉潭瀑布泉黃帝池九牛山在樂清縣治東上有九大石橫列逺望若九牛然山之南謝靈運曾遊又名謝公山丹霞山在樂清縣治西一名白鶴山常有白鶴棲鳴山上晉張文君煉丹于此以餘藥擲水中至今溪石有金星點李建中詩玉簫峯下仙君宅千樹巖花幾百春當日會稽王內史如何不見竹間人蓋竹山在樂清縣西三里中有洞號寶光長耀洞天洞舊有八今存其六白石山在樂清縣西三十里一名白石巖其山極高宋王十朋詩路從飛鳥頭上過人在白雲高處行宋錢氏婦文婉詩霜月天邊清興逺金鍾雲裡夢魂間左源山在樂清縣東三十五里羣峰環繞中有田二千畝山有四景曰梅溪蓴湖左嶺小鴈蕩王十朋有四景詩赤水山在樂清縣西六十里一名赤巖山所出之水色赤故名盤嶼山在樂清縣西六十里一名盤石山鴈蕩山在樂清縣東九十里此山天下竒秀谷邃峯疊行者不能遍分東西谷立十八寺始有駐足之地山中景致非一王十朋詩鴈山門户從此入南北兩峯相對高靈府山在樂清縣俗傳山恆有雲霧登者誠敬則為澄霽仙壇山在平陽縣治東上有平石方十餘丈號仙壇其旁有竹林風來成韻垂掃壇上殊無塵籜號掃壇竹相傳昔有道人却粒於此又名仙石昆山在平陽縣治西南絶頂有巨巖俗稱古巖山有二老木冬夏常青下有穴空洞可容數十人鳴山在平陽縣治北山腹有大穴洞常有聲玉蒼山在平陽縣西南八十里亦名一面山跨峙八面獨高諸峯古碑云玉蒼之山虎踞龍蟠南鴈蕩山在平陽縣西南一百里山有明王峯峯頂有池五代時僧願齊尋訪名山至此曰此山水盡處龍鴈所居豈非西域書所謂諾矩羅震且鴈蕩龍湫者耶因結茅其間白雲山在平陽縣西南高插雲漢行人援藤而上號曰藤道四溪山在平陽縣西南一百里山有四十二峯下有四水合流沿山而南飛龍山在泰順縣治南形如龍飛舞鳯山在泰順縣治北形如鳯舞分水山在泰順縣南泉發山隴東西分流宋陳與義詩行盡江左路初過浙東村春在花無迹潮歸岸有痕香爐峯在府城西四里宋周行已詩紛紛兒女休相笑不是人間金博山許峰在瑞安縣西四十里許旌陽煉丹於此其峯高數千仭海艘每視為凖玉甑峰在樂清縣西四十里世傳為白玉洞天上有升仙壇屑玉泉列玉洞連珠潭藏真塢應天洞登此峯頂者五更見日出如紅爐鑄丸文峰在樂清縣東形聳如筆宋紹興中祥雲現其上識者以為有文魁之應次年王十朋果廷對第一白雲嶺在瑞安縣西四十五里陶𢎞景隱此答梁使者詩云山中無所有嶺上多白雲只可自怡恱不堪持贈君謝公嶺在樂清縣東八十里謝靈運有越溪遊行詩此嶺即其所經者丹芳嶺在樂清縣東八十里自此入鴈蕩山有四十九盤昔人詩嶺號登山七七盤登危涉險到雲端白若嶺在樂清縣東謝靈運渡江而上從斤竹澗過白若嶺即此謝客巗在積穀山下謝靈運題詩石崖間今已蕪沒唐姚揆詩不見古君子空餘舊林巒翠色媚車馬爽氣儼衣冠天水影交碧松林聲相寒宋許景衡詩出守雖云逺登臨不厭頻五言多好句千載獨斯人風月樓長在池塘草自春超然高世意遺像日埃塵大若巗在府城北一百五十里道書為第十二福地上有石室可容千人又名石室山説法巖在堆蕩山昔有異僧于此説法醉翁巗在平陽縣南二十五里王十朋詩兩石如翁醉格清兀然相對坐巖扄啼春山鳥日相勸滿地落花猶未醒容成洞在華蓋山下相傳乃黃帝時容成子修道之地宋仁宗嘗三遣使訪之中有三生石五粒松今無元建道院於此黃溍有記飛霞洞在積穀山舊志有仙人劉根隱此嘗乘霞至天台白石洞在樂清縣西四十里相傳十二真人所治之地王十朋詩謝公好山水得郡古東甌造物惜佳境雅志多不酬松蘿蔽鴈蕩煙霧迷龍湫行田經白石不到仙山頭寥寥數百年天付黃冠流巍然萬仞崖壁立東南州誰將補天手化作白玉樓兩龕藏洞府中有羣仙遊上連尺五天下接三神洲飛泉落巖腰碧澗鳴山陬羣峯直培塿滄海為渠溝隘視人間世萬象同蜉蝣石洞在平陽縣南二十五里石上有八分書似魏晉間人筆迹動石在大羅山其石特立觸之則動升仙石在大若巖相傳三國時朱孺子於此升仙永寧江在府城北舊名慎江一名永嘉江東自大海西通處州青田溪唐元和中刺史韋宥於江滸沙上獲筝絃引之蜿蜒舒展投之江中化為白龍騰空而去故又名蜃江孟浩然宿永嘉江寄友詩我行窮水國君使入京華相去日千里孤帆天一涯卧聞海潮至起視江月斜借問同舟客何時到永嘉安陽江在瑞安縣南一名安固江又名飛雲江有飛雲渡渡之西有中洲橫陽江在平陽縣西二十五里一名始陽江又名前倉江西湖在府城西謝靈運詩側聽既窈窕環洲亦玲瓏仰視喬木杪俯吟大壑淙南湖在府城南宋仰欣詩酒旗翻野色漁棹弄秋光會昌湖在府城西南唐會昌中郡守韋庸所築永豐湖在瑞安縣西七十里相傳有龍居其中遇旱水將竭則雨人以為龍所致楠溪在府城東北一十五里流入永寧江梅溪在平陽縣西三十里宋郡人林堯民種梅其旁因名又樂清縣東亦有梅溪王十朋因取為號浣沙潭在府城中一名蜃川舊志城中五水合乎五行雖旱不竭五水謂此及石龜潭鴈池氷壺潭潦波潭也龜巖潭在大若巖上有石如龜首瀑泉出其下梅雨潭在瑞安縣東四十五里上有飛瀑數十尺分流四道而下又名仙巖瀑布玊函潭在瑞安縣東四十五里潭上之山狀如石函七星潭在瑞安縣西六十五里潭有七故名邑人禱雨于此百丈潭在樂清縣西四十里一名百濟潭花栁塘在府城南宋楊蟠詩寒食城南過晚來風雨狂更無覔花去蜂蝶一時藏採香澗在府城內楊蟠詩驅來一𣲖水激上四飛泉醉後逐花去桃源尋二仙斤竹澗在樂清縣東七十五里謝靈運詩猿鳴誠知曙谷幽光未顯巖下雲方合