勢家穴塘引河溉田度命窒之復請增置斗門設水平度曰若溉不足將不顧水平而塘如故窒之便嵗大疫乃嚴巫覡之禁挾醫遍巡四鄉給以藥劑多賴全活元夏若水溫州路總管初至郡值嵗歉廣招米艘民賴以濟雪寃獄革宿弊民咸德之趙鳯儀溫州路總管初重儒道興創廟學延明師以教後進一時文教翕然吏民向化後名其所寓曰親民坊本朝吳廣洪武初為溫州衛指揮僉事時南溪人嘯聚為冦廣討平之誅其首三人餘悉遣還鄉里廣嘗受學于余闕故其在衛尤尚儒術張礎洪武中知平陽縣時金鄉衛因造軍器侵擾縣民礎執法不從具其事以聞遣行人齎勑嘉奬賜以上尊楮幣黃信中溫州知府有亷介名屬邑姦民至京告其鄉人嘯聚為非都臺檄布按官詣府治之信中力抵其誣脫者三百餘人又盜殺一家三人者詞連無辜纍年信中至乃具文虔告城隍遂得其情王全溫州府同知立心愛民遇事敢為處賊犯境大將統兵至府且欲縱殺闔郡震恐全獨告曰不可將怒欲斬之全曰良民不從叛挈妻子來此境者甚衆可縱殺乎將意乃解不殺何文淵知溫州府減陸田稅革軍倉弊利民者興之害民者除之政聲大振去任民為像於祠祀焉王約成化末知平陽縣和易近民待士有禮庶務畢舉而民不知勞省志人物晉張文君永嘉人隱居丹霞山郡守王羲之往訪焉即遁去不與相見其介如此宋陳侃永嘉人至道中以孝行聞五世同居無間言太宗嘉之詔旌表其門王景山永嘉人性敏悟書過目成誦慶厯初進士當時伊洛諸儒未作景山獨能發明經藴嘗作儒志一編學者宗之周行已永嘉人風儀秀整語音如鐘師事程伊川元祐初第進士為本州教授發明中庸之旨邑人始知有伊洛之學蔣元中永嘉人元豐中作新太學與郡人周行已等八人皆學術修明為四方學者矜式劉安節永嘉人天資近道敏于為學師事程伊川以文行推重登元符進士第官至太常少卿弟安上亦從程氏學登紹聖中進士官至中書舍人給事中有文集戴述永嘉人為文操筆立就元符中進士嘗從程伊川求成已之學仕至臨江太守弟迅亦以文學稱宋之才永嘉人政和間從楊龜山學得程氏正脈性恬靜操履潔白難進易退自號雲海居士有雲海弊帚五十卷錢文卿樂清人方數嵗執父喪如成人時三舍法行文卿方冠領郡學政諸生肅然欽之奉母居白石山闔族同居三十餘年無間言許景衡瑞安人兄景亮嘗上治説二十篇不報遂歸隱景衡從學于程伊川元祐中進士高宗時為尚書左丞金人南侵景衡請幸建康黃潛善等惡其異已譛罷之卒于京口諡忠簡景衡志慮忠純遇事敢言既沒高宗思之林石瑞安人時王安石新經盛行石獨以春秋學教授鄉閭學者稱塘奧先生薛良顯瑞安人崇寧初進士纍官大宗正丞出為江東轉運使江寧軍校作亂良顯聞變率衆與戰斬十餘級力不勝死之贈恤甚渥黃友平陽人初入太學曰大丈夫不能為國家立功亦造化中贅物耳崇寧中登進士自檀州通判召問邊事進直徽猷閣從种師中解太原圍兵敗被執敵曰降則赦汝友厲聲曰男兒死耳遂遇害仰欣永嘉人力學篤行執母喪躬自負土廬墓側致慈烏白竹之祥郡守表其里曰孝亷坊大觀初以八行取士郡以欣應詔未幾卒特贈將仕郎吳表臣永嘉人大觀初進士高宗時纍官右書政言條陳時政多見用纍遷吏部尚兼翰林學士秦檜欲使金議地界指政事堂曰歸來可坐此表臣不答坐罷復起知婺州尋進直學士晚號湛然居士鄉論推其清約婁寅亮永嘉人政和初進士為上虞丞投匭上書乞選太祖諸孫有賢德者使牧九州以係天下望高宗感悟擢為監察御史張輝永嘉人天資修飭喜問學雖老儒莫能逮政和初進士官至吏部尚書敷文閣待制陳桶平陽人政和初進士第纍官太常少卿權禮部侍郎賜三品服桶寬洪醖藉以誠接物而恬于榮利自號無相居士有文集子汝楫汝賢汝諧孫峴俱以詞學擢第薛弼永嘉人政和中進士金人冦汴李綱定議堅守衆不悅弼同綱意圍解遷光祿丞後為湖南通判畫䇿贊嶽飛討平羣冦纍遷敷文閣待制林季仲永嘉人宣和初進士髙宗時趙鼎薦為臺官纍遷吏部郎後秦檜主和議季仲引勾踐事爭之罷去張闡永嘉人博涉經史善屬文宣和中進士紹興中為祕書郎秦檜曰君久次欲以臺中相處如何闡謝曰得老死祕書幸矣檜默然後官至工部尚書卒贈端明殿學士闡數上疏指陳時事無不剴切朱熹曰知和議之非者惟胡銓張闡耳賈如規樂清人靖康之變責太學諸生逃出城者曰久被教育乃求茍免後為興國軍司理不上徜徉鹿巖之下讀書自終重義好施人稱為賈司理薛徽言永嘉人建炎初進士紹興初以監察御史宣諭湖南後遷起居舍人時秦檜與金人議和徽言上疏與檜反覆固爭于帝前子季宣博覽精思纍官大理正知湖州所著有經書訓義陳鵬飛永嘉人紹興中進士其學不為章句新説必本人倫正論而趨于深厚為崇政殿説書以講春秋忤秦檜謫惠州卒有羅浮集十卷王十朋樂清人幼穎悟日誦數千言紹興中廷對忠鯁高宗親擢為第一纍官太子詹事以龍圖閣學士致仕卒諡忠文有梅溪集行世凡歷四郡每有所禱久旱即雨久雨即霽蓋至誠所感朱熹嘗稱之曰光明正大磊磊落落君子人也子二人皆篤學自立聞詩知光州聞禮知常州徐履瑞安人倜儻有大志紹興中省試第一秦檜欲以女妻之及廷對乃佯狂不答一字遂置甲末後官至朝請郎不染于秦氏時人高之劉鎮樂清人紹興中進士與季父祖向及兄銓先後登第俱有才名時號三劉木待問永嘉人隆興初進士第一為太子詹事纍官至禮部尚書卒贈少師許及之永嘉人隆興初進士為右拾遺使金不屈遷太常少卿朱熹常為林栗所誣及之為上疏伸之後知樞密院兼參知政事薛叔似永嘉人乾道中進士為補闕首陳建中用中執中之説欲躋斯民於三代之隆官至兵部尚書卒諡文節陳傳良瑞安人乾道中進士為中書舍人時光宗以疾不朝重華宫傳良抗疏忠懇至引帝裾言與淚俱後官至寶謨閣待制卒諡文節傳良與張栻吕祖謙為友文擅當時所著有詩解詁周禮説春秋後傳左氏章旨學者稱止齋先生陳謙永嘉人乾道中進士纍官寶謨閣待制著易菴文集中秋解永寧編諸書蔡幼學瑞安人乾道中進士初欲置首選以所對䇿切直不果歷官校書郎後直學士院草制醇雅得體纍轉寶謨閣召權兵部尚書卒諡文懿幼學器質凝重早以文鳴所著有編年政要諸書百餘篇徐誼平陽人乾道中進士纍官至吏部侍郎有定䇿立寧宗功卒諡忠文葉適永嘉人淳熙中登進士第雄文奧學推重當世雅以經濟自負紹熙中遍歷華選嘗密助趙汝愚定䇿上疏辨朱熹之誣官至寶謨閣學士卒諡忠定所著有水心進卷諸書戴溪永嘉人淳熙中進士歷官太子詹事進權工部尚書以龍圖閣學士致仕卒諡文端所著有通鑑筆議將鑑論斷諸書學者稱岷隱先生族子栩亦有學行著東都事略等書湯建樂清人天文地理古今制度考核精詳所著有詩衍義諸書學者稱藝堂先生葉味道溫州人刻志古學師事朱熹嘉定中進士調鄂州教授理宗訪問熹之徒使者以味道聞授太學博士兼崇政殿説書開導引翼切於治道所著有四書説大學講議經筵口奏故事曹叔達瑞安人少學於陳傳良紹熙初登進士纍官禮部侍郎隨事獻替多所禆益嘗編永嘉譜識者謂其有史才卒諡文肅子孫郡皆登進士第林略永嘉人慶元中進士纍遷左司諌兼侍講告于帝曰虛心以為從諫之本言論剴切擢同簽書樞院事以資政殿學士致仕蕭振平陽人舉進士官至敷文閣學士知成都府兼安撫制置使振好奬善類在蜀威行惠孚死之日民老稚皆聚哭于道家居瀕江微時見過客多溺死自造大舟傭工以濟人感其德名曰蕭家渡有文集二十卷錢文季樂清人為成都漕運判官善屬文義士楊巨源死於非命文季為作哀詞蜀人高之終宗正少卿周端朝永嘉人為太學生時趙汝愚為姦臣所攻罷相端朝與同舍生楊宏中等六人上疏救之時稱六君子終吏部侍郎陳埴永嘉人從學朱文公所著有禹貢辨木鍾集學者稱潛室先生埴與兄增弟止善俱登進士第時人號所居為森桂坊曹豳叔違族子嘉泰初進士為左司諌與王萬郭磊卿徐清叟俱負直聲時號嘉熙四諫遷禮部侍郎不拜以寶章閣待制致仕卒諡文恭子愈老亦登進士第朱熠平陽人端平初武舉第一纍官至侍御史彈刻甚多景定初知樞密院事兼參知政事徐儼夫平陽人淳祐初進士第一歷官館閣因忤丁大全終其用事杜門不出後大全敗儼夫始出官至禮部侍郎侯畐樂清人三貢于鄉兩試轉運司皆第一以武舉授合浦尉寶祐中通判海州李松夀冦漣泗畐鏖城下死之闔室遇害海州及其鄉皆立廟賜額旌忠諡節毅所著有霜崖集戴慶炣永嘉人淳祐進士歷校書正言司諌侍御史纍遷同知樞密院事兼參知政事卒贈特進資政殿大學士陳宜中永嘉人宋末為宰相時幼主歸元乃擁二王由海道趨閩廣已而不支遂遁占城中焉劉黻樂清人以太學生上書言朝廷進退大臣當以禮忤執政送南安軍安置既還復極言政治得失官至吏部尚書二王泛海陳冝中迎黻共政至羅浮以疾卒所著有蒙川集徐臻溫州人德祐初臻以父官湖南往省會文天祥勤王往依之以筆札典樞密小心精練天祥被執臻脫難復來願從北行扶持患難備殫忠欵繆主一永嘉人為太學生嘗上書攻賈似道宋亡隱居教授所著有易精藴論學軌範等書元章仕堯平陽人元時科舉方尊程朱之學仕堯研精覃思發明四書旨意嘗曰時之治亂由人心之邪正人心之邪正由學術之醇疵識者以為名言李孝光樂清人少博學篤志復古隱居教授至正中徴授祕書監丞以文章負名當時有文集行世史伯璿平陽人精究四書得朱子之旨所著有四書管窺及外編行世彭庭堅瑞安人舉進士為崇安縣尹民服其威信後升福建都帥遇害賜諡忠愍桂完澤永嘉人仕為平江路管軍鎮撫坐事免官會賊攻昱嶺關從行省官討賊再戰皆勝尋與其妻弟金德皆被執賊臨以白刃脅之降完澤語德曰男子漢即死不可聽德曰此言最是因大罵賊怒剖腹而死周樂瑞安人通經能文海賊拘其父日成欲沉於水樂請以身代不從遂抱父同死本朝孔克表平陽人孔子五十五世孫博學篤行尤精于史學洪武中薦為翰林修撰黃淮永嘉人洪武丁丑進士授中書舍人永樂初首選入翰林歷升編修侍讀預內閣機務每侍左右以備顧問升右春坊大學士每巡狩必命淮同尚書蹇義居守後官至少保户部尚書兼武英殿大學士宣德初以疾致仕後復來朝特命主考會試得人甚多優遊田里十餘年夀八十三卒諡文簡所著有介菴省愆集歸田稿子采精筆札善詩文官至太常少卿卒湯宗平陽人由太學生擢河南按察僉事歷山東按察使左遷刑部郎中蘇州知府轉大理寺丞時外夷貢使病死從者謂醫殺之獄成宗曰夷人與醫素無仇怨寧有故殺之情卒辨其寃官至大理卿趙新樂清人博通經史洪武初舉任本縣訓導升開封知府入為國子助教尋升山西右布政使後以翰林修撰致仕卒年八十一所著有四書説約行素稿卓敬瑞安人洪武中登進士為給事中纍升户部侍郎文皇入京執敬命繫獄遣人諷之仕不屈而死省志楊景衡瑞安人永樂中領鄉薦擢兵部主事升吏部郎中勤于職務進升福建布政司左參政致仕卒有詩文周文褒永嘉人學行卓越尤善楷書永樂中登進士第擢河南左布政使惠政及人聲譽赫然韓偉瑞安人永樂中太學生擢監察御史巡歷有聲升河東鹽運使以清慎見稱後卒于官黃飬正瑞安人七嵗善書永樂初徴授中書舍人纍官太常少卿凡朝廷碑刻多其所書為人謹厚尤善詩畫卒贈太常寺卿周旋永嘉人正統元年擢進士第一授翰林修撰官至春坊庶子旋為人性直尚義作詩文操筆立就卒于官人多惜之章綸樂清人正統初進士景泰中為儀制郎中時英廟别居南宫憲皇乃易儲位兩宫嫌隙災異荐臻綸特陳修德弭災十四事疏上忤旨下錦衣獄榜掠慘酷體無完膚明年偕南京大理卿廖莊御史鍾同杖于闕廷至百綸絶復蘇禁錮詔獄越二載英廟復辟憲皇還儲首録其忠出之于獄擢禮部右侍郎省志列女浣紗女永嘉人居蜃川家貧踰笄不嫁事母孝常紡績為養人每見其夜浣紗而旦成布日豐甘旨未嘗或嗇母卒葬畢抱石投水中里人憐之為立祠盧氏女永嘉人居盧奧一日與母同行遇虎將噬母女即以身當之虎得女母乃免後有人見其跨虎而行里人建祠于永寧鄉宋理宗朝封曰孝佑何氏永嘉人王木叔妻初歸王氏家事落落乃甘淡泊佐夫起家資用遂饒一日語夫曰子可出仕奈子之弟妹貧寒何槖中餘資久蓄奚益夫歎曰此吾素志旦日盡散簮珥不遺木叔既出仕又曰子之弟尚困有田若干曷不畀之夫曰此尤吾志也遂以田與弟時號為賢婦劉文淑㮤陽教諭黃應發妻應發無子鞠其娣之子通誓不再適舅垂老孝事甚謹舅卒撫其子通令就學得狂疾文淑慮黃氏絶祀急與婚配生子性通卒乃抱性育之就學成名後文淑臨終謂性曰我為汝家婦不幸二世短命今保汝成立吾可以下見汝祖矣俞姻奴永嘉人父沒家貧隨母入繼父家居無何母亦喪繼父之前子欲犯之不從一日繼父外出其子持入室迫脅俞堅不屈遂毆殺之繼父歸即捕其子幽閉空室餓死為葬姻奴省志仙釋朱孺子永寧人三國時師道士王玄真居大若巖下嘗于溪畔見二花犬逐之入枸杞叢下遂與玄真劚叢下得枸杞根類花犬堅如石煮之孺子先取飲之俄而飛立前峯謝玄真而去玄真後亦不知所至張無夢永嘉開元觀羽士宋真宗召對講易謙卦上問曰獨説謙卦何也無夢對曰方大有時宜守之以謙復命講還元篇敷對詳明真宗大悅宸翰特賜以詩寵其還山林靈素宋永嘉人以方術得幸徽宗賜號金門羽客一日侍宴太清樓下見元祐黨碑靈素稽首上怪問之對曰碑上姓名皆天上星宿臣敢不稽首因為詩曰蘇黃不作文章客童蔡翻為社稷臣三十年來無定論不知姦黨是何人宿覺瑞安人居帆逰山訪道于曺溪六祖一見語契而去世謂六祖而下著見者三人南嶽懷護青原行思永嘉宿覺唐賜諡無相大師塔名淨光元布袋此菴禪師景元永嘉人參蔣山圓悟有得悟曰我這裏師禪都被元首座作一布袋盛去了也衲子遂呼為元布袋明一統志卷四十八
