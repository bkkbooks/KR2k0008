髙帝征黥布時張良送至此槐市漢元始間太學中列槐數百行諸生朔望㑹市各持其土物及經書買賣議論栁市漢時長安街閣各有豪俠萬章在城西栁市時號城西萬子夏子夏章字也狠石在秦始皇陵東南二里状如龜甚大初始皇已葬逺採此石將致之驪山至此不復動元時劉斌脩覇橋斵而用之星石在興平縣東北晉穆帝時有星隕縣西南汙澤化為石色黄白形如甕髙五尺鴈塔在慈恩寺中唐時進士題名于上韋曲在樊川唐韋安石别業有林泉花竹之勝杜曲在府城南下杜本杜岐公别墅杜牧又増之名樊水園與韋曲相埒故當時語云城南韋杜去天尺五輞川别業在藍田縣西南輞谷唐王維置别業於此其遊止有孟城坳華子岡茱萸沜辛夷塢木蘭柴等二十景與裴廸閒暇各賦以詩云陳希夷菴在華隂縣南一十里菴前有睡洞遺像在焉歴代石刻在府學有晉王羲之筆陣圖隋智永真草千文唐所刻石經明皇八分書孝經張旭草書千文僧懐素草聖母帖及宋脩廟記等碑宋向拱鎮長安嘗督匠摹打得石本三千餘民以為害往往鑱鑿其字後韓縝脩覇橋督工急民磨碑石以供之長安石刻經此二厄存者遂鮮六駿石刻在醴泉縣昭陵六駿曰青騅曰什伐赤曰特勒驃曰颯露紫曰拳毛􅚷曰白蹄烏皆唐太宗平竇建徳王世充宋金剛劉黒闥薛仁杲及東都時所乘者像各有賛甘亭在鄠縣即書所謂啟與有扈戰于甘之野是也戯亭在新豐縣及幽王舉烽燧徴諸侯以悦褒姒處雨金堡在富平縣東南三十里秦獻公時櫟陽雨金後因名堡按其地古櫟陽縣界也穆公砦在浦城縣東北三十里晉穆八七兵處近有秦白起寨章臺街在舊長安城内漢京兆尹張敞罷朝㑹走馬章臺街即此華陽街在舊長安城内劉屈氂妻梟首于華陽街洗頭盆在華山上杜甫詩安得仙人九節杖拄倒玉女洗頭盆净土樹在鄠縣南八里俗傳西域鳩摩羅什憇此覆其屨土中生兹樹三月開如桃花八月結實狀如小栗殻中皆黄土明一統志卷三十二
