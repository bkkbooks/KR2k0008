  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0008_WYG_032-1a, image: WYG0472/WYG0472-0803c.png}
body:
  text: 明一統志卷三十二明李賢等撰陜西布政司陜西古雍州地漢都於此置司隸校尉領三輔置凉州部刺史察舉隴西北地等郡而不常所治東漢司隸如故凉州治隴唐貞觀中置關内道開元中置京畿等四道採訪處置使而京畿道治京城關内道以京官領隴西道治西平山南西道治漢中後改採訪為觀察其治仍舊宋初置陜西路後置永興鄜延環慶秦鳯涇原熙河六路經畧安撫司並以守臣兼領又置提點刑獄司治鳯翔元置陜西等處行中書省于安西置陜西漢中道肅政廉訪司于鳯翔又置甘肅等處行中書省及河西隴北道肅政廉訪司于甘州本朝置陜西等處承宣布政使司領西安鳯翔平凉慶陽延安鞏昌臨洮漢中八府置陜西都指揮使司領西安左西安前西安後固原平凉慶陽延安綏徳榆林鞏昌臨洮漢中秦州蘭州洮州岷州河州寧夏寧夏中寧夏前寧夏後寧夏左屯寧夏右屯寧夏中屯寧羗二十五衛鳯翔金州靈州鎮羗四千户所又置陜西行都指揮使司領甘州左甘州右甘州中甘州前甘州後肅州山丹永昌凉州鎮畨莊浪西寧十二衛及鎮夷古浪二千户所置陜西等處按察司分關内二關南隴右西寧河西六道兼察諸府州衛所三司並治西安而行都司則分治甘州以控制邊境云西安府上東至山西蒲州黄河界三百五十里西至鳯翔府扶風縣界二百四十里南至漢中府金州界六百八十里北至延安府宜君縣界三百五十里自府治至京師二千六百五十里至南京二千四百三十里糧八十六萬五千石零建置沿革禹貢雍州之域天文井鬼分野周為王畿地秦置内史以領關中漢初置渭南郡尋罷郡復置内史景帝分置左右内史此為右内史武帝改京兆尹與左馮翊右扶風為三輔東漢於此置雍州尋罷三國魏改尹為守晉置雍州理京兆未㡬為劉石符姚所據後魏仍置雍州西魏後周皆置京兆尹隋初置雍州尋改為京兆郡唐初復為雍州又改京兆郡尋復雍州開元初改京兆府自周秦漢晉西魏後周隋唐並都於此唐末為佑國軍五代梁改永平軍後唐復為京兆府晉改曰晉昌漢改曰永興宋仍京兆府屬永興軍路金屬京兆府路元改安西路後改奉元路本朝洪武初改為西安府領州六縣三十長安縣附郭秦因古地名曰長安漢都關中始置為縣屬京兆尹王莽改常安東漢復舊隋遷都始徙縣治于此唐因之五代梁改大安縣後唐復曰長安縣宋元仍舊本朝因之編户五十五里咸寧縣附郭漢置萬年縣在廢櫟陽縣東北後周始别置萬年縣於長安城中取漢舊縣以為名隋初改大興縣唐初復曰萬年天寳中始改為咸寧縣後仍曰萬年五代梁改為大年縣宋改為樊川縣金復為咸寧縣元仍舊本朝因之編户六十六里咸陽縣在府城西北五十里本秦舊縣孝公徙都此其地在山南水北山水皆陽故名咸陽漢初曰新城縣元鼎初改渭城縣東漢省晉時石勒于此置石安縣後符秦置咸陽郡隋郡廢唐復為咸陽縣屬京兆郡宋金仍舊元省入興平尋復置本朝因之編户一十里興平縣在府城西一百里本周太丘地後名廢丘漢初置槐里縣後析置茂陵平陵二縣三國魏改平陵曰始平晋置始平郡領槐里始平等縣後魏省始平郡以縣属扶風郡唐改始平曰金城縣至徳初置興平軍尋改為縣宋金元仍舊本朝因之編户一十五里臨潼縣在府城東七十里周為驪戎國秦為驪邑漢置新豐縣後魏周隋徙治不一唐武后改為慶山縣神龍初復為新豐天寳初析置㑹昌縣於温泉宫後改曰昭應省新豐入焉宋大中祥符間始改曰臨潼以水為名金元仍舊以櫟陽縣省入本朝因之編户四十里涇陽縣在府城北七十里本秦舊縣故城在平凉府界以居涇水之北故名漢初屬安定郡惠帝改池陽縣屬左馮翊後魏徙咸陽郡治此後周省縣隋罷郡復置涇陽縣屬雍州唐屬鼎州尋復屬雍州宋金仍舊元省入髙陵縣尋復置本朝因之編户四十四里髙陵縣在府城北八十里本秦舊縣為左輔都尉治所漢隸左馮翊後漢左馮翊自長安出治髙陵三國魏屬京兆郡唐初析置鹿苑縣尋省宋金元仍舊本朝因之編户一十五里鄠縣在府城西南七十里本夏時扈國殷為崇國秦為鄠甘亭漢始置鄠縣屬右扶風郡晉屬始平郡後魏屬京兆郡唐宋金元皆仍舊本朝因之編户二十三里藍田縣在府城東南九十里本秦舊縣周禮玉之次美者曰藍此縣山出玉故以名縣漢屬京兆尹晉因之後魏初省後復置後周析置玉山白鹿二縣以三縣置藍田郡後省郡以玉山白鹿入藍田縣屬京兆唐初又析置白鹿玉山縣尋省宋金元仍舊本朝因之編户二十里盩厔縣在府城西南一百六十里本漢舊縣屬右扶風山曲曰盩水曲曰厔故以名縣東漢省晉復置後周徙縣於鄠縣西北而於此置恒州後置周南郡隋廢郡以縣屬京兆唐改宜壽縣至徳初復為盩厔縣天復初屬鳯翔府宋因之金置恒州元省州以縣屬安西路本朝因之編户四十里三原縣在府城南九十里本漢池陽縣地晉時符秦置三原䕶軍以其地在清酆原孟侯原白鹿原間故名後魏改為三原縣屬北地郡後周屬馮翊郡隋初屬雍州唐初改為池陽縣又改華池縣仍置三原縣屬北泉州貞觀初廢三原縣改華池為三原屬雍州五代唐屬耀州宋金元仍舊本朝改今屬編户二十里渭南縣在府城西五十里本漢新豐縣地符秦始置渭南縣屬京兆府後魏改南新豐縣及置渭南郡西魏復為渭南縣後周屬雍州唐初屬華州尋復屬雍州五代周屬華州宋熙寧中省入鄭縣元豐初復置金元仍舊本朝改今屬編户五十六里商州在府城東南二百六十里本契始封地周為豫州之境春秋屬晉後屬秦漢於此置上洛縣屬𢎞農郡晉置上洛郡後魏置洛州後周改洛州為商州取古商於地為名隋復為上洛郡唐初復為商州天寳初為上洛郡乾元初復為商州屬闗内道宋屬永興軍路元屬安西路本朝改州為縣尋復陞為州編户二十八里領縣四鎮安縣在州城南二百五十里本商州豐陽縣地唐析置安業縣屬雍州乾元初改為乾元縣屬京兆尋又屬商州五代漢改乾祐縣宋因之元廢本朝于廢縣北二十里始置鎮安縣編户一十八里洛南縣在州城南二百里春秋時晉上洛地漢為上洛縣地晉析置拒陽縣尋省復魏復置隋初屬商州尋改曰洛南縣以在洛水之南故名唐宋金元仍舊本朝後屬商州編户二十一里山陽縣在州城東南一百二十里本朝析置編户二十里商南縣在州城東六十里本朝析置編户一十二里同州在府城東北二百八十里周為大荔國秦為内史地漢初置河上郡後為左内史武帝時改左馮翊三國魏為馮翊郡後魏兼置西華州西魏改為同州取禹貢澧水攸同之義隋罷州復置馮翊郡唐初復為同州治馮翊縣天寳初復為馮翊郡乾元初復為同州後改匡國軍五代梁改忠武軍後唐復舊宋改定國軍屬永興路金屬京兆府元仍為同州以馮翊縣省入本朝因之編户三十五里領縣五朝邑縣在州城東三十里春秋時為蒲闗戰國魏築城于此漢為臨晉縣地晉為馮翊郡治後魏分置南五泉縣西魏改朝邑縣以據朝坂故名唐改河西縣屬河中府大歴初復曰朝邑屬同州五代宋金元仍舊本朝因之編户六十五里郃陽縣在州城東北一百二十里古莘國地漢始置郃陽縣屬左馮翊以在郃水之陽故名後周屬澄城郡隋屬馮翊郡唐初屬西韓州貞觀間州罷屬同州五代梁屬河中府唐復舊宋復屬同州以夏陽縣省入金屬禎州後復屬同州元初屬禎州後仍舊本朝因之編户四十七里澄城縣在州城北一百二十里春秋時晉北徴地後屬秦漢始置徴縣後誤徴為澄東漢省後魏置澄城郡隋初罷郡以縣屬同州唐初析置長寧縣後省長慶中割入奉先縣五代梁屬河中府後唐復里屬同州宋金元仍舊本朝因之編户四十白水縣在州城西北一百二十里春秋時名彭衙秦置白水縣以南臨白水故名漢為粟邑縣又為衙縣地晉省衙縣後魏廢粟邑縣後析置白水縣及白水郡隋初罷郡以縣屬同州唐割入奉先縣宋復置属同州金元仍舊本朝因之編户二十九里韓城縣在州城東北二百二十里古韓梁二國地晉為少梁邑秦更名夏陽縣漢為夏陽縣地属馮翊郡隋始析置韓城縣以古韓城為名唐初置西韓州貞觀間州罷以縣屬同州五代梁属河中府後唐復舊宋因之金改禎州元初州罷復為韓城縣尋復置禎州後罷以縣屬同州本朝因之編户三十六里華州在府城東二百里周時鄭桓公始封於此其地亦名咸林秦為内史地漢魏晋並為京兆𢎞農二郡地後魏置華山郡又改東雍州西魏改為華州隋省後置華山郡唐復為華州埀拱初改太州天寳初改華隂郡後復為華州乾寜中陞興徳府又為鎮國軍五代梁改威化軍唐復為鎮國軍宋改鎮潼軍金改金安軍元復為華州後以鄭縣省入本朝因之編户四十一里領縣二華隂縣在州城東七十里戰國屬魏為隂晉地秦改曰寕秦漢始置華隂縣以在華山之隂故名唐分置潼津縣尋省入華隂垂拱初改仙掌縣神龍中復曰華隂寳歴中改太隂縣後復為華隂宋金元仍舊本朝因之編户三十里蒲城縣在州城北一百二十里本漢重泉縣地屬馮翊郡後魏於此置南白水縣西魏始改蒲城縣隋屬同州唐改奉先縣屬京兆府天祐間復屬同州五代時屬京兆宋初屬同州尋復蒲城縣元仍舊本朝因之編户五十四里耀州在府城北一百八十里秦為内史地漢為祋祤縣地東漢置三國後魏置北雍州西魏改宜州隋為宜君郡治華原縣唐廢置不一天祐初置耀州建義勝軍五代梁改曰崇州及改静勝軍唐復為耀州名順義軍宋初為感義軍改感徳軍金仍為耀州元以華原縣省入本朝因之編户一十四里領縣二同官縣在州城北七十五里本漢祋祤縣地晉為頻陽縣地符秦置銅官䕶軍以川為名後魏罷軍為銅官縣屬北地郡後周改曰同官縣屬宜州隋屬京兆郡唐初屬宜州後屬京兆府五代梁屬同州唐屬櫂州宋金元仍舊本朝因之編户一十三里富平縣在州城東南七十五里本漢舊縣屬北地郡治靈州迴樂縣界東漢徙寧州彭原縣界晉又徙徳懐故城西魏復徙舊治後周屬馮翊郡隋初屬雍州唐又徙治義亭城即今治五代梁屬耀州宋金元仍舊本朝因之編户四十里乾州在府城西北一百八十里秦為内史地漢為左馮翊之池陽縣地晉屬扶風郡後魏為咸陽郡寧􅊂縣地隋改寧􅊂為醴泉属京兆郡唐析醴泉等五縣地置奉天縣又置乾州以郡在長安乾隅故名五代梁為威勝軍唐復為乾州屬鳯翔府宋罷政和中復置改為醴州金元仍為乾州本朝因之以奉天縣省入編户二十七里領縣四醴泉縣在州城東七十五里本漢左馮翊谷口縣地東漢及晉為池陽縣後魏改寧􅊂縣隋改醴泉縣因後周醴泉宫為名唐初析置温秀縣後省入醴泉宋割屬醴州金元仍屬乾州本朝因之編户一十八里武功縣在州城西南六十里古邰國后稷所封地秦孝公始置武功縣以武功山水為名舊在郿縣境東漢徙治古婺城晉属始平稷後魏改美陽縣又置武功郡後周俱省尋復置武功縣唐置郡州尋廢以縣屬京兆府五代唐時屬鳯翔府元仍武功縣本朝因之編户十五里長武縣在州城西北百二十里新設編户里永壽縣在州城北九十里古豳國地漢為右扶風之漆縣地後魏置廣夀縣後周改永壽縣隋省入新平縣唐復析置属邠州神龍初属京兆府景龍初復属邠州宋屬乾州金屬邠州元復屬乾州本朝因之編户一十里邠州在府城西北三百五十里古西戎地後公劉所居為豳國地秦屬内史漢為右扶風圵地安定三郡地東漢置新平郡治漆縣後魏置南豳州後廢北