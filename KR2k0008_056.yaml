body:
  text: 明一統志卷五十六明李賢等撰吉安府東至撫州府樂安縣界二百里西至袁州府宜春縣界一百八十里南至贑州府贑縣界二百八十五里北至臨江府新淦縣界一百四十里自府治至南京二千一百一十里至京師五千五百五十五里糧四十四萬石零建置沿革禹貢荆揚二州之域天文斗分野春秋屬吳戰國屬楚秦屬九江長沙二郡漢屬豫章郡及長沙國東漢興平初始分豫章立廬陵郡三國吳又分置安成郡治平都縣晉廬陵郡屬揚州安成郡屬荆州元康初俱屬江州隋廢二郡以廬陵縣置吉州大業初復為廬陵郡唐改吉州天寶初改廬陵郡乾元初復為吉州屬江南西道宋屬江南西路元初為吉州路後改吉安路本朝改為吉安府領縣九廬陵縣附郭本漢舊縣屬豫章郡東漢末孫䇿於縣置廬陵郡晉徙郡治石陽縣隋廢郡置吉州改石陽為廬陵縣唐永淳初州徙今治縣亦隨徙宋元仍舊本朝因之編户六百三里泰和縣在府城南八十里本漢廬陵縣治東漢改西昌縣隋改安豐縣開皇間又以東昌縣省入改為太和縣屬吉州唐置南平州尋廢仍以縣屬吉州宋因之元升為州本朝復為縣改太曰泰編户二百五十里吉水縣在府城北四十里本漢晉吉陽石陽二縣地屬廬陵郡隋以二縣省入廬陵縣屬吉州南唐割廬陵置吉水縣宋因之元升為州本朝復為縣編户四百三十二里永豐縣在府城東一百三十里本漢廬陵縣地三國吳析置陽城縣晉太康中改為陽豐縣隋省入廬陵宋至和間始置永豐縣元仍舊本朝因之編户三百二十五里安福縣在府城西一百二十里本漢安平安成二縣地安平屬豫章郡安成屬長沙國東漢改安平曰平都屬廬陵郡吳置安成郡治平都晉改安成為安復縣隋廢安成郡併安復入平都復改為安成縣屬吉州開皇中又改曰安復唐初改為安福縣置頴州尋廢以縣屬吉州宋因之元升為安福州本朝復為縣編户二百二十里龍泉縣在府城西南二百七十里本漢廬陵縣地三國吳置新興縣晉改曰遂興隋省入太和五代時楊吳析置龍泉場南唐始置龍泉縣宋宣和中改泉江縣紹興初復曰龍泉屬吉州元仍舊本朝因之編户六十七里萬安縣在府城南一百八十里本吳新興縣地晉為遂興縣地隋省入太和五代時南唐析置萬安鎮宋熙寧中始改鎮為萬安縣屬吉州元仍舊本朝因之編户九十三里永新縣在府城西二百里本漢廬陵縣地三國吳始析置永新縣屬安成郡隋省入太和唐初復置永新縣屬南平州尋又省入太和顯慶初復置永新縣治禾山東南屬吉州宋因之元升為州本朝復為縣編户一百八十四里永寧縣在府城西二百八十里本唐宋吉州永新縣地元至順間始分置永寧縣本朝因之編户四十二里郡名廬陵安成俱漢名螺川郡有螺山故名形勝環地幾二千里宋劉弇送吉州太守序南接贑江北竟淦水東西控臨川長沙環地幾二千里據江上流宋朱晞顔修城狀江山映帶宋劉彥登譙門記咽喉荆廣唇齒淮浙江山映帶在眉宇間五峰相次頗類五老方輿勝覽東挹蒙岡之秀南據牛嶺之雄安福地理志風俗人厖淳多壽考隋地理志藝文儒術為盛杜氏通典衣冠所萃藝文儒術斯之為盛雖閭閻賤品力役之際吟咏不輟文風盛于江右宋周必大詠歸亭記士大夫秀而文細民險而健宋黃庭堅江西道院賦家有詩書人多儒雅宋楊炎正州學上梁文由六一公之鄉里家有詩書以數萬户之井廛人多儒雅序孰相望絃誦相聞宋王陶撰太和公廳記山川仁山在府治西梁書天監五年髙昌之仁山獲銅劔二廬陵在梁以前為髙昌銅劔之獲即此山也吉水縣東北亦有仁山以山形似仁字故名瑞華山在府城北五里上有瑞華觀真君山在府城北五里相傳許旌陽嘗到此上有髙明宫螺山在府城北一十里山南臨贑江宛委如螺或云昔有漁人遊此忽遇風雨見神螺光彩五色取而懷之至山下涉水螺失所在俗呼為螺子山神岡山在府城南一十里與螺山對峙青原山在府城東南一十五里中有駱駝峰鷓鴣嶺勢甚喬聳宋王廷圭詩異時黃魯直嘗賦青原詩至今青原山名與北斗垂金鳯山在府城南二十里其形如鳯龍須山在府城西四十里上有法雲庵唐代宗時土人龍須舍地築庵因名香城山在府城南四十里中一峰尤竒秀俗謂文筆山胡氏世居其下至宋忠簡公銓遂以直節名震當世觀山在泰和縣西一十五里下有觀山寺石壁上有飛泉宋黃庭堅詩觀山千尺夜泉冷金華山在泰和縣西一十五里自武山發脈蜿蜒至此武山在泰和縣西三十里一名新山傍出一山最髙大名武婆岡又有陶皮石室步虗壇禮斗石珍珠泉虎鼻峰石鼓丹井古迹本朝劉嵩詩武山千尺石為城縹眇西來紫翠橫蟠龍山在泰和縣北三十三里山勢宛轉如蟠龍禾山在泰和縣西北五十里嘗生嘉禾因名傳擔山在泰和縣西五十里山極髙峻路甚隘窄攀援轉置而後可過其西南又有石筍峰尤峻拔下有通天聖巖旱則於此禱雨潮山在泰和縣西五十里唐武德間四祖禪師飛錫至此結庵庵成之初水逆流至庵前奔湍迅急其聲若潮因名三顧山在泰和縣南五十里正當縣治三峰宛如筆架屹然相顧山下有龍祠禱雨多應相傳盧度隱此上有護國寺本朝劉嵩詩我思昔人有盧仙冥栖乃在三山顛後來乘雲去不返荒壇委絶成千年雙鳯山在泰和縣南五十里兩峯相連秀拔如鳯大唐山在泰和縣南六十里勢如羣馬交馳上有大唐寺因名髙湖山在泰和縣西六十里峻絶竒聳頂有盤石其平如砥非緣石捫蘿不可到王山在泰和縣東八十里舊名義山晉永嘉中有王子瑶者修煉於此道成仙去唐因改曰王山貞觀初又有匡智者與姪大郎求仙至廬山遇異人曰此隂山也不如南求陽地二人南求入此山修煉得仙故又名匡山甘露山在吉水縣東二里舊名虎丘山宋紹興初有甘露降其上因名太平山在吉水縣東三里上有許旌陽道場賽禱者無虗日鳯山在吉水縣東五里上有鳯凰巖瀑布自巖而下逹于江相傳昔有彩鳯飛鳴其上因名中華山在吉水縣東衆山中一峰秀出如懸鍾有王郭二仙壇禱雨多應東山有二一在府治東南上有東山寺一在吉水縣東漢劉智請移郡謂東通大山即此山之陽有瀑布直下數百丈頂上有楊仙師壇天獄山在吉水縣南五十里一名黃原嶺相傳此山鎮伏姦宄上有地方廣丈許履之覺下虗如鼓聲俗謂之鬼監故曰天獄朝元山在吉水縣西北五十里有方石亂點如金名黃金臺上有詩云落落萬古石悠悠千載心人間不相遇白雲深處尋或傳楊仙師留題南山在吉水縣西北六十里山阿有數石屹如人立號石人峰西山在吉水縣西南八十里重岡疊巘若屏障然其間一峰獨尖秀曰望火樓下有溪東流為朗溪崆洞山在吉水縣西北九十里山多黑石能化白每石化白其年輒有擢科者龍華山在永豐縣南五里晉有龍華真人於此得道西華山在永豐縣南一十里巍然特出狀若覆鍾陽山在永豐縣西北一十里仙人葛玄嘗于此煉丹有水流出謂之丹泉寶山在永豐縣西三十里聳秀可愛巘山在永豐縣北三十里上有五峰如圓廩有石峙立如碑香爐山在永豐縣東四十里以形似名雞籠山在永豐縣東北四十里四面皆田疇此山獨蹲其中郭山在永豐縣東八十里連屬三縣之境由崎嶇棧道行七八里其地坦然有田數百頃鳳凰山在永豐縣南一百六十里蒙岡山在安福縣治東林木森秀城中望之蔚然一名秀峰上有東嶽行祠北華山在安福縣北二里舊有道觀時有遊人登覽劉用礪詩山亭小憩水潺潺步入松蘿陟翠巒黃鳥不知春色晚白雲長鎖石潭寒􅊻石山在安福縣東一十五里臨江有山輪囷特起狀若漁罾山腰有二石髙數丈其一俯首若將壓焉其一壁立勢相支柱中可往來浮岡山在安福縣西南二十里石壁光明五色望之如龍虎狀下有浮山洞虗觀西山在安福縣西南二十五里林壑幽險有溪出兩山之間溪旁有龍窟嵗旱禱雨多應宋乾道間賜廟額曰靈祐新茨山在安福縣西五十里漢豫章太守賈萌與安成侯張普戰于新茨之野疑即其地龜山在安福縣西六十里有石屹然望之如伏龜旁有巨石如人狀鴿湖山在安福縣北六十里上有鴈峰白鶴峯石人峯三渡橋桃花澗景物幽絶有唐人留題武功山在安福縣西一百里根盤八百餘里跨吉袁二郡相傳葛玄煉丹於此亦名葛仙峰上有仙翁壇壇傍有石塔時或見火焰若金燈然月山在安福縣西一百里山巔有石如月下有月山寺髙峰山在安福縣西二百二十里山徑峭險人罕遍歷上有龍潭三所嵗旱禱雨必應更生山在安福縣西南一百五十里輿地志吳時有女子居樟木下木大數十圍孫皓造宫室令人伐木斧斤莫克丁夫苦之女祝之曰汝今且去他時更生故山及水皆以是得名山下有更生夫人廟蹲山在安福縣西南一百四十里上有風窟繚繞百餘步無草木每有風出飛沙揚塵盧蕭山在安福縣西二百二十里相傳有道士姓蕭者結廬山下因名盧水出焉金山在龍泉縣治西形如金字與銀山夾峙隂陽家以縣名龍泉二山為龍之雙角銀山在龍泉縣治東山巔有塔錢塘山在龍泉縣東南六里山壤衍沃山麓有徑路通南康玉泉山在龍泉縣東南一十里亂山中有泉出石罅潔白如玉西龍山有龍泉縣西二十里頂有風穴相傳昔有異僧以杖擉山頂冷風自穴中出俗呼西龍風遇霜夜則怒號尤甚至辰卯始定隂雨則息有樵者以十石窒其穴風乃自山下潭中出波濤洶湧久乃復故石含山在龍泉縣西一百五十里山延袤數百里跨永新桂陽茶陵三縣境芙蓉山在萬安縣西五里山形秀麗超出衆山龍頭山在萬安縣東二十里山如几案又名案山上有仙壇嶺相傳葛仙翁煉丹之所又有仙聖羅漢二巖巖有仙人迹巖前臨溪溪中有大小石鑊蕉源山在萬安縣東四十里山形尖峭樹木深茂山産鐵一名東溪山韶山在萬安縣西四十里相傳虞舜南巡嘗奏九韶之樂于此金牛山在萬安縣南六十里東瞰大江中有石如牛下有金牛廟西平山在萬安縣東八十里巉巖懸峭惟西南平坦梁水出焉五馬山在萬安縣西南八十里五峰相連如五馬狀義山在永新縣東南二十里峯巒相顧若有長幼之序故名一名龍頭唐天寶初嘗改名永新山有雙巽文筆二峰下有聰明泉宋劉沆詩義山山下有靈泉泉號聰明自古傳秋山在永新縣西四十里亦名禾山上有七十一峰及五老峰溪水出其間甚清駛旁有石崖顔真卿題其上曰龍溪本朝解縉詩龍門溪水聲珊珊魯公大筆雲綵間憑君多借幾隻鹿待我重來騎看山綏原山在永新縣南四十里勢連鵝嶺其址六十里許上有阿育王塔玉笥山在永寧縣治西狀若篋笥南唐時湖湘孟賔于隱此自號羣玉峰叟迎岡山在永寧縣西北五里中有石潭嵗旱禱雨于此漿山在永寧縣西三十里峯巒峻峭松林蓊鬱有泉味甚甘上有蜀先生行祠拐湖山在永寧縣東南六十里上有泉自山腰湧出直瀉山麓蕩為深湖雲騰嶺在府城西三里山勢屛列于長岡之外上有雲騰廟廖岡嶺在府城西南六十里嶺麓盤旋又曰曲山蕭氏世居其下登科嶺在泰和縣西北五里舊名燈窠宋劉廷雋居其下擢第改今名有應夢閣往時赴科者多預宿其上求夢皆驗城頭嶺在泰和縣四十里上有獅子寨下有蛟潭相傳嘗有龍見于此韓相嶺在吉水縣東六十里世傳南唐韓熙載遊此因名穹嶺在吉水縣南八十里與西山對峙又名東山羣山連亘獨此嶺拔出如卓筆然聖嶺在永豐縣南三十里上有井深廣數丈前有峰曰仙人臺相傳五代時嘗夜有神人震動其上及旦視之忽有土城周數里宋紹興中鄉人