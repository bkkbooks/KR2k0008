body:
  text: 明一統志卷三十八明李賢等撰浙江布政司浙江古揚州地漢會稽郡兼統二浙𨽻揚州部刺史唐貞觀中𨽻江南道開元中增置江南東道採訪處置使而兩浙諸州並𨽻焉宋初以兩浙為一路後分浙東西為兩路而浙西安撫使治臨安浙東安撫使治紹興並以守臣兼領元置江浙等處行中書省及江南浙西道肅政亷訪司于杭州又置浙東海右道肅政亷訪司于婺州又置浙東道宣慰司于慶元本朝置浙江等處承宣布政使司領杭州嘉興湖州嚴州金華衢州處州紹興寧波台州溫州十一府置浙江都指揮使司領杭州前杭州右紹興寧波台州處州溫州海寧昌國松門臨山金鄉海門定海盤石觀海十六衛湖州嚴州金華衢州海寧五所置浙江等處提刑按察司分浙東浙西二道兼察諸府衛所而三司皆治于杭州府云杭州府東至赭山海口六十里西至嚴州府桐廬縣界一百三十五里南至紹興府蕭山縣界四十五里北至湖州府德清縣界四十五里自府至南京九百里至京師四千二百里糧二十三萬四千二百石零建置沿革禹貢揚州之域天文斗分野春秋時屬吳越戰國時屬楚秦為會稽郡地東漢屬吳郡三國吳分置東安郡治富春尋罷晉屬吳興及吳郡陳置錢塘郡隋廢郡置杭州治餘杭未幾移治錢塘大業初改州為餘杭郡唐初復為杭州天寶初又為餘杭郡乾元初復為杭州景福初號武勝軍光化初移鎮海節度治於杭置大都督府五代時為吳越國宋為杭州髙宗南渡遷都於杭升為臨安府元立兩浙都督府尋改杭州路本朝改為杭州府領縣九錢塘縣附郭秦置錢塘縣屬會稽郡漢為會稽西部都尉治所東漢縣省晉復置屬吳郡陳於此置錢唐郡隋為杭州治唐改唐為塘宋元仍舊本朝因之編户一百六十里仁和縣附郭本唐錢塘鹽官二縣地五代梁時錢氏始割二縣地置錢江縣宋大平興國中改仁和元仍舊本朝因之編户三百六十里海寧縣在府城東一百二十里本漢海鹽縣地屬會稽郡吳王濞於此立鹽官三國吳因置鹽官縣屬吳郡隋屬餘杭郡唐初屬東武州尋併入錢塘後復置屬杭州宋因之元升鹽官州後更名海寧本朝洪武初改州為縣編户三百五十六里富陽縣在府城西九十里本漢富春縣屬會稽郡東漢屬吳郡三國吳置東安郡治富春尋廢郡仍屬吳郡晉改為富陽縣隋屬杭州唐宋元仍舊本朝因之編户七十五里餘杭縣在府城西北七十里本秦舊縣屬會稽郡漢因之東漢屬吳郡三國吳屬吳興郡隋屬杭州府宋元仍舊本朝因之編户七十三里臨安縣在府城西一百里本漢餘杭縣地東漢分置臨水縣屬吳郡晉改為臨安縣屬吳興郡隋省唐復置臨水縣屬潛州尋省入於潛縣後復置臨安縣屬杭州五代梁改安國縣唐置衣錦軍宋復為臨安縣又置順化軍尋廢軍復為元縣仍舊本朝因之編户四十八里於潛縣在府城西一百七十里本漢縣屬丹陽郡吳屬吳興郡陳屬錢塘郡隋屬餘杭郡唐置潛州尋廢以縣屬杭州宋元仍舊本朝因之編户一十二里新城縣在府城西一百四十里本漢富春縣地吳置新城縣屬安郡尋廢晉復置宋齊梁俱屬吳郡陳屬錢塘郡隋初省入錢唐縣後復置唐又省入富陽復置屬杭州五代時錢氏改為新登縣宋復名新城元仍舊本朝因之編户一十五里昌化縣在府城西二百一十里本漢於潛縣地唐析置紫溪縣又析置武隆縣神龍初更武隆為唐山大厯初二縣俱省長慶初復置唐山縣五代梁改曰金昌唐復為唐山晉改曰橫山尋改曰吳昌宋更名昌化元仍舊本朝因之編户一十里郡名錢塘陳名武林因武林山而名古杭隋名形勝湖山映帶宋歐陽修有美堂記邑屋華麗十餘萬家環以湖山左右映帶而閩商海賈風帆浪舶出沒於江濤浩渺煙雲杳靄之間山川秀麗宋葛澧帝都賦據東南之都會號繁盛之樂土其山川秀麗井邑浩穰左浙江右具區北大海南天目宋朝無咎文龍山據其首西湖蟠其腹天竺聳其膺東山卧其背西征記外帶江海內抱湖山宋秦觀雪齋記外帶濤江漲海之險內抱湖山竹林之盛水陸之會宋蘇軾云蟠幽宅阻面湖背海宋王阮禮部對策臨安蟠幽宅阻面湖背海膏腴沃野足以休養生聚其地利於休息風俗以船楫為車馬吳越春秋水行山處以船為車以楫為馬吳越尚勇漢志吳越之君皆尚勇故其民好用劍輕死易發俗尚侈靡臨安志尚禮厚龎隋志其人君子尚禮庸庶厚龎故風俗澄清而道教隆洽人性敏慧宋史地理志人性敏柔而慧尚浮屠厚滋味急進取習俗工巧宋歐陽修有美堂記山川吳山在府治東南吳人憐子胥以諫死立祠其上又名胥山上有寺觀左臨大江右瞰西湖為一郡勝概瑞石山在府治南北接吳山下有紫雲洞元薩天錫詩天風吹我登鰲峯大山小山石玲瓏赤霞日射紫瑪瑙白露夜滴青芙蓉飄飄雲氣穿石屋石上涼風吹紫竹挂冠何日賦歸來煮石篝燈洞中宿寶山在府治南吳山之西宋蘇軾同秦仲二子雨中遊寶山詩平明已報百吏散半日來陪二子間立鶴低昂煙雨裏行人出沒樹林間鳳凰山在府治南二里下俯大江直望海門山勢若鳯凰欲飛之狀元黃溍詩滄海桑田事渺茫行逢遺老色荒涼為言故國遊麋鹿漫指空山號鳯凰春盡緑莎迷輦道雨多蒼薺上宫牆遙知汴水東流畔更有平蕪與夕陽本朝徐賁詩荒山欲逐鳯凰騫誰搆浮圖壓寢園土厚尚封南渡骨月明不照北歸魂海門有路雙龍去沙溆無潮萬馬屯莫向秋風重惆悵梵王宫殿易黃昏石甑山在府城南三里上有石如甑又名巨石山南屏山在府城西三里怪石聳秀中穿一洞其上石壁若屏孤山在府城外西湖上獨立一峯為湖山勝絶處上有林逋祠唐張祐詩樓臺聳碧岑一徑入湖心不雨山長潤無雲水自隂斷橋荒蘚合空院落花深猶憶西窗夜鐘聲出北林宋蘇軾詩孤山孤絶誰肯廬道人有道山不孤包家山在府城東南一十里多桃花春時遊人勝賞於此秦望山在府城南一十里輿地志秦始皇東遊登此欲渡會稽故名吳越史唐咸通中望氣者言錢塘有王氣命侍御史許渾等賚璧瘞此山以壓之山東南有羅剎石橫截江濤唐白居易詩嵌空石面名羅剎壓捺潮頭敵子胥後更名鎮江石五代開平中為潮沙漲沒龍山在府城南一十里一名卧龍山晉郭璞謂龍飛鳯舞者即此武林山在府城西南一十五里漢地理志注武林山武林水所出亦曰靈隱曰靈苑曰仙居或謂本名虎林唐因避諱改虎為武五雲山在府城西南二十五里上有真際院院有井大旱不竭臯亭山在府城東北二十五里髙百餘丈雲出則雨山半有桃花塢宋敖陶孫詩樵路縈紆入翠微清泉白石可忘機雲中犬吠劉安過樹杪春深望帝歸白鶴曽留華表語蒼官合受錦衣圍珠襦玉柙今何許一笑人間萬事非元巴延入宋臨安時嘗駐兵此山下龍珠山在府城東北三十五里形圓如珠一名巧山黃鶴山在府城東北三十八里寰宇記舊有黃鶴樓在佛日山之北髙百餘丈山半有黃鶴仙洞浮山在府城東南四十里宋蘇軾守杭奏狀云潮水自海門東來勢如雷霆而浮山峙於江中與漁浦諸山犬牙相錯洄洑激射其怒百倍砂磧轉移為至險處定山在府城西南四十里突出浙江中數百丈潮至此輒抑聲過此則雷吼霆怒石姥山在府城東北四十二里烏頭山東赤岸嶺之西上有宋劉正夫墓桐扣山在府城東北五十里下有石鼓湖晉武帝時岸崩出一石鼓扣之無聲張華取蜀桐木刻魚形扣之聲聞數里故名佛日山在府城東北五十四里中有佛日淨惠寺臨平山在府城東北六十里上有龍洞山頂有井方二丈深可八尺旱亦不涸山下唐時置臨平監宋蘇軾詩餘杭門外葉飛秋尚記居人挽去舟一别臨平山下路三年雲夢澤南洲紫微山在海寧縣東北六十里唐白居易嘗登此山望硤石湖審山在海寧縣東北六十里上有漢審食其墓金牛山在海寧縣東八十里接海鹽縣界寰宇記昔吳楚間有金牛自毗陵來奔至此而沒因名山側有洞深不可測宋建炎初黃灣居民嘗避兵於此觀山在富陽縣治東孤峯髙拔橫截大洞山頂有道觀因名一名石頭山小隱山在富陽縣治北為縣治鎮山宋謝絳遷居於此其子景初景溫築書室於山之半故基雙松尚存范仲淹詩小徑小桃深紅光隱翠隂是非不到耳名利本無心筍迸饒當户雲歸半在林何須聽絲竹山水有清音赤松子山在富陽縣東九里俗傳赤松子駕鶴嘗至此山形孤秀羣峯環拱望之如華蓋故又名華蓋山劉宋謝靈運詩宵濟魚浦潭旦及富春郭定山緬雲霧赤松無淹薄白龍山在富陽縣北二十里山勢如屏山側一小沼有白蛇往來其中樵者偶見蛇吐珠捕而食之舉家斃後珠歸里人楊氏數年有羽衣至其家紿取視之忽去不見西巖山在富陽縣北三十里巖下有洞洞口有池早晚與潮應山麓有石扣之鏗然人號石鼓世傳葛仙翁煉丹於此唐白居易詩巖前寶磬傳松韻洞口靈池應海潮安樂山在餘杭縣東二里相傳吳越王錢氏之子嘗於此築庵養疾而愈故名岑山在餘杭縣南一十五里風土記吳步兵校尉諸葛起字岑世居山傍宗族蕃盛皆葬於此大滌山在餘杭縣西南一十八里中有日月分精金堂玉室或言此山清幽大可以洗滌塵心遂名大滌中峯之上有許邁升天壇及丹竈瓦甓尚存又有大滌棲真龍蛻三洞皆有仙迹在焉天柱山在餘杭縣西南一十八里四隅陡絶聳翠參天為道家第五十七福地記云天柱在中國者有三一在壽陽一在龍舒此其一也宋吳昌裔詩柱天嶪斷鼇根卧草蒙茸伏虎痕想見山中明月夜有人長嘯抱崑崙黃山在餘杭縣西南二十五里左大滌右天柱髙出衆山之表伏虎巖在焉由拳山在餘杭縣南二十五里髙峻為最傍有由拳村出藤紙一名餘杭山舟航山在餘杭縣西北二十五里山頂有石穴即夏禹治水維舟之處因以舟航名衣錦山在臨安縣治南本名石鏡山東峯有圓石徑二尺七寸其光如鑑錢鏐幼時遊此顧其形服皆冠冕如王者狀其後唐昭宗改鏐所居營為錦衣營又升為衣錦城并封此山為衣錦山鏐宴故老山林皆覆以錦號其幼時所戲木曰衣錦將軍宋蘇軾賦將軍木詩阿堅澤畔菰蒲節蜀帝牆頭羽葆桑不會世間間草木與人何事管興亡獨山在臨安縣東四里山側有石覆大溪上下有潭深不可測吳越王錢氏封其神而祀之今石刻猶存九仙山在臨安縣西一十二里相傳葛洪許邁煉丹之地蘇軾詩玉室金堂餘漢士桃花流水失秦人臨安山在臨安縣西南十八里縣因此山為名晉書郭文自餘杭來臨安結茅山中及蘇峻之亂破餘杭而臨安獨全人以文為知幾天目山在臨安縣西五十里為道家第三十四洞天山下兩湖若左右目故名元和志云天目有兩峯峯頂各一池左右相對郭璞地記天目山前兩乳長龍飛鳳舞到錢塘杭都賦山雖多矣莫若天目之為大其髙也凡三萬九千尺仰太虛兮日月低坐絶頂兮乾坤窄徑山天目之東北峯有路可通天目故名徑山五峯周抱竒勝特異唐時吳郡僧法欽至此結菴有獵師告曰此神龍所據願無往欽不聽忽有素衣老人拜於前曰我龍也自師至此吾類不安願讓為卓錫之所欽有靈雞嘗隨法會今靈雞冡存焉岝崿山在於潛縣西二里峭聳清絶下浸碧溪傍環翠岫遙望天目為醒心豁目傑特之觀宋洪咨夔詩驟暖揠芳意薄遊烘軟塵亂山雲氣曉啼鳥杏花春人物少催老物華陳换新一聲鏗爾瑟沂水緑粼粼石柱山在於潛縣東五里上有石天然成柱髙二丈圍一丈有古篆十數字或云秦時所刻今剝落不可辨西菩山在於潛縣西一十三里九鎖交陳雙峯對峙上有明智寺宋僧參寥子居此蘇軾詩人未放歸江北路天教看盡浙西山生仙山在於潛縣南三十里漢天師張道陵生於此山之西因名浪山在於潛縣西南三十五里山有三池相接髙崖絶壁間泉奔流如瀑相傳神龍所宅每隂翳潭中浪與山連又名波山武勇山在於潛縣南四十七里上有寺相傳寺僧佛圖澄與鄉人習武於此後人以上已迎引尚存習武之遺意白山在於潛縣南五十三里下臨深潭上有浮石色純白有患氣疾浮腫者搗石服之多愈仙坑山在新城縣西二十里相傳晉咸和中有七仙圍碁石上因名宋咸平初有獵者至此見三鶴沖天而去石上有碁局未收及獵回不知所之青牛山在新城縣西七十里舊名寶福山蘇軾詩暮歸走馬沙河塘青煙裊裊十里香秋行曳杖青牛嶺寒泉咽咽千山靜武隆山在昌化縣治西北唐武后以山名應圖纎乃分紫溪縣别置武隆縣百丈山在昌化縣西三十里亦名潛山相傳堯時洪水惟此山潛水中不沒者百丈故名上有太公澤千頃山在昌化縣西北六十里上廣千頃宋參寥子有兹山差峩冠天半之句山有龍湫魚皆金銀色禱雨多應西有莎蘿花一株初夏花開香聞數里又新城縣西北六十里亦有千頃山相傳為許由故居有許由洗耳灘巢父飲牛灘並在山下大鵠頭山在昌化縣西北六十里或以為山類鵠頭或以為鵠棲其上故得名上勢山凌霄漢上有龍池濶三百畝傍有葑田歲旱鄉人攀援禱雨其上雷峯在西湖上淨慈寺前一名中峯宋林逋詩拂石玩林壑曠然山色秋歸雲滯層巘疏葦際滄洲固自堪長往何為難久留庶將濠上想聊作剡中遊南髙峯在府城西一十二里上有古塔下有石屋杭都賦南北髙峯獨秀羣嶺之表北髙峯在府城西北二十三里上有塔髙七層宋楊蟠詩杳杳孤峯上寒隂帶遠城不知山下雨奎斗自分明郭祥正詩翠出諸峯上湖邊正北看夜深雲霧散獨卧斗杓寒月桂峯在武林山宋僧遵式序云相傳月中桂子嘗墜此峯生成大木其花白其實丹或云天聖中天降靈實於此山狀如珠璣識者曰此月中桂子也天竺峯在府城西一十七里九域志天竺山葛仙翁得道之所宋郭祥正詩誰從天竺國分得一峯來占盡湖山秀最宜煙雨開飛來峯在府城西二十里晏殊地志晉咸和中西天僧慧理登此山歎曰此是中天竺國靈鷲山之小嶺不知何年飛來因號其峯曰飛來一曰鷲嶺宋梅詢詩竺慧指此峯飛來自靈鷲猿鳥曽未知煙嵐尚依舊興亡謾千古天地豈關紐祇恐舟壑移他年却西走黃鶴峯在府城東北六十五里佛日寺前蘇軾詩佛日知何處臯亭有路通鐘聞四十里門對兩三峯萬松嶺在府城南夾道栽松唐白居易詩萬株松樹青山上十里沙隄明月中慈雲嶺在府城南八里帝都賦云其嶺有若慈雲郭祥正詩峻極分南北見湖仍見江麥嶺在府城西一十里舊多種麥故名宋蘇軾同王渝楊傑張璹遊三竺過此刻石題名風篁嶺在府城西一十二里修篁怪石風韻蕭爽因名宋蘇軾探梅詩有問信風篁嶺下梅介亭詩有丹青明滅風篁嶺之句棲霞嶺在西湖上一名劍門嶺舊多桃花開時爛然如霞故名上有棲霞洞樟嶺在富陽縣北五里髙出衆峯有樟木故名一曰橫山西北有穴起霧即雨青衣洞在吳山上三茅觀後相傳昔人行至洞口有青衣童子逐之不見但聞風雨聲毛髮悚栗而出雪峯洞在瑞石山紫陽菴之右金星洞在鳯凰山介亭下生金星草因名宋蘇軾有銘呼猿洞在武林山宋僧遵式白猿峯詩序云西天僧慧理畜白猿於靈隱寺月明長嘯清音滿室梅詢詩古澗飛白猿寂歷不知處風激石上泉僧疑月中樹微茫認松雪倣佛橫樵路寫望增爾思蒼蒼奈煙霧龍泓洞在天竺山理公巖之北梅詢詩矯矯淵下龍潛神在靈府靈卧雖有時泥沙可長處隂崖寒氣腥峭壁煙痕古何當救旱暵奮起為霖雨煙霞洞在府城南一十六里洞中舊有石刻羅漢六吳越王别刻十二共成十八羅漢至今猶存風水洞在府城南二十里宋蘇軾詩風轉鳴空穴泉幽㵼石門虛心聞地籟妄意覔桃源落星石在府城西巨石山頂有二圓石在西湖中望之若星墜然纜船石在西湖相傳秦始皇東遊泛海艤舟於此舊傳西湖本通海海在海寧縣南一十里東連海鹽西境浙江潮汐往來衝激不常舊有捍海塘二後又添築鹹塘本朝胡斗南詩元氣洪濛混太虛天吳簸蕩撼坤輿千年木石勞精衛百谷波濤會尾閭月下明珠鮫女淚雲中飛觀羽人居秋風吹老珊瑚樹不見麻姑錦字書海潮錢塘江通海海潮每晝夜再至卯酉之月為隂陽之交氣以交而盛故潮潮獨大於餘月朔望之後為隂陽之變氣以變而盛故獨大於餘日小則水漸漲不過數尺大則湧濤髙數丈每年八月十八日郡人聚觀舟人漁子泝濤觸浪謂之弄潮至今俗尚有之往往有沉沒者有司雖嘗禁止然舊俗終不能遇宋蘇軾詩江神河泊雨醯雞海若東來氣吐霓安得夫差水犀手三千強弩射潮低仇仁近詩一䀶初見海門生頃刻長驅作弩聲萬馬突圍天鼓碎六鼇翻背雪山傾遠朝魏闕心猶在直上嚴灘勢始平寄語吳兒休孟浪天吳罔象正縱橫浙江在府城西三里舊志出歙縣玉山其水經建德合婺溪過富春為浙江入於海江口有山居江中潮水投山十折而曲故云浙江盧肇曰浙者折也蓋取潮水出海屈折倒流也富春江在富陽縣南即浙江之上流鼉江在新城縣吳越史云舊常有二氣亘于江上晝夜不滅及杜建徽羅隱生而二氣不復見議者以為文武秀氣焉西湖在府城西周回三十里其源出于武林泉山川秀發景物華麗自唐以來為東南遊賞勝處舊稱西湖有十景曰平湖秋月蘇隄春曉斷橋殘雪雷峯落照南屏晚鐘麯院風荷花巷觀魚栁浪聞鶯三潭印月兩峯插雲至今湖中四時邦人士女嬉遊歌鼓之聲不絶唐白居易詩湖上春來似畫圖亂峯圍繞水平鋪松排山面千重翠月點波心一顆珠碧毯線頭抽早稻青羅裙帶展新蒲未能拋得杭州去一半勾留是此湖宋林逋詩混元神巧本無形匠出西湖作畫屏春水淨於僧眼碧晚山濃似佛頭青欒櫨粉堵搖魚影蘭杜煙叢閣鷺翎往往鳴榔與橫笛斜風細雨不堪聽蘇軾詩水光瀲灔晴方好山色空濛雨亦竒若把西湖比西子淡粧濃抹總相宜像光湖在府城東北一十五里唐神龍中湖有五色光明掘地得石佛像因立佛剎而名其湖曰像光御息湖在府城東北一十八里相傳秦始皇東遊暫憩於此故名臨平湖在府城東北六十里舊名鼎湖自漢末壅塞晉咸寧中復開父老相傳云此湖開天下平故名臨平唐張祐詩三月平湖草欲齊緑楊分映入長隄田家起處烏尨吠酒客醒時謝豹啼山檻正當蓮萊渚水塍新擘稻秧畦人間謾説多岐路咫尺神仙路欲迷陽陂湖在富陽縣北一十里唐貞觀中縣令郝其開湖並造水閘可溉田萬畝上下湖在餘杭縣縣南五里有上湖縣西二里有下湖漢嘉平間縣令陳渾所開築隄蓄水唐寶厯中令歸珧重修又縣北三里有北湖乃珧所開其溉重千餘頃查湖在餘杭縣北三十五里源出諸山溉田甚廣九溪在府城西南一十二里衆山泉水所出自徐村入大江西溪在武林山西宋楊蟠詩為愛西溪好長憂溪水窮山源春更落散入野田中苕溪在餘杭縣治前圖經云發源天目山由於潛臨安東流至餘杭經錢塘入湖州而滙於具區故老相傳夾崖多苕花每秋飄散水上如飛雪因名仇溪在餘杭縣東北二十里其源有二一出臨安之髙陸山一出本縣之獨松嶺皆至仇山合流而去溪蓋因山得名云錦溪在臨安縣治東南一名石鏡溪交溪在於潛縣西一十五里以浪山栁源二水合流故名溪上有村曰山村紫溪在餘潛縣南三十里源出天目山龍湫通昌化栁源兩溪合流入分水縣界溉田四千餘頃唐貞元中縣令杜泳開又鑿渠三十餘里以通舟楫有石在溪南屹立其聲清越名響石葛溪在新城縣西七里相傳葛仙翁煉丹於此宋許廣淵詩稚川仙化後溪以葛為名水激翻空白潭澄到底清山多晴倒影雨過夜添聲月滿寒光入魚龍患太明雙溪在昌化縣治南溪中有洲水分南北過縣復合湍聲澎湃巖谷響應宋范成大詩翠染南山擁縣門一洲橫截兩溪分長官日永無公事卧聽灘聲看白雲晚溪在昌化縣西七里溪有灘名洗耳蓋以晉許邁嘗隱於此宋鄭作肅詩灘聲洶湧幾春秋洗耳還須一枕流耳畔是非無有盡故應流水不知休濯纓潭在石柱山北潭上有招隱亭參寥子所建唐僧靈一詩石根寒碧潄泠泠百尺溪潭徹底清誰在山中賦歸隱滄浪孺子有遺聲大公澤在百丈山左古傳泰伯采藥南來嘗陟此山飲泉而甘因名百尺浦在海寧縣西四十里輿地志越王於此起百尺樓望海因名十八澗在府城西南一十二里龍井山西東出錢塘江義澗在昌化縣西四十里自唐以來為放生池每春水緑波巨魚浮遊人多觀焉吳山井在吳山北迸溢清甘汲之不竭六井杭瀕海水泉鹹苦唐刺史李泌始引西湖作六井以便民汲白居易為刺史復開治之宋沈遘陳襄相繼知杭州益加修浚民獲其利蘇軾記云長源六井其最大者在古清湖為相國井其西為西井少西而北為金牛池又北而西附城為方井為白龜池又北而東至錢唐縣治之南為小方井龍井在西湖上舊名龍泓相傳有龍居之宋元豐中僧辨才即其處為亭率其徒環而咒之俄見大魚自泉中躍出觀者異焉秦觀記金沙井在孤山下唐白居易嘗酌此泉甘美可愛視其地沙光燦如金因名煉丹井在天竺山下天竺寺晉葛洪嘗煉丹於此宋梅詢詩仙翁道天泯棲神在巖石酌彼山下泉窮年煉金液烏龍井在海寧縣東南七十里冬夏不竭故老相傳昔臯蘇將陳之黑馬跑地得泉遂名宋邑令胡堅常恕元州判申繼賢以旱禱皆獲雨杜公井在新城縣唐乾寧中董昌圍急城中乏水穿土及百尺不得泉都將杜稜至誠禱之泉立至人德之目為杜公井稜建徽之父也涌泉在府城北三里霍山清心院前泉從石罅中流出味極清甘宋紹興間髙宗日遣人取之以瀹茗虎跑泉在府城西南虎跑寺舊傳性空禪師嘗居大慈山無水忽有神人告曰明日當有水是夜二虎跑地泉湧出故名參寥泉在西湖智果寺泉甘冷宜瀹茗蘇軾在黃州時夢參寥子賦詩覺而記兩句云寒食清明都過了石泉槐火一時新後七年守錢塘而參寥子已居智果院軾於寒食之明日泛湖謁參寥子汲泉鑽火烹黃蘗茶忽悟所夢詩作應夢記六一泉在孤山之趾蘇軾名泉並序其事云歐陽文忠公將老自謂六一居士豫昔通守錢塘見公於汝隂而南公曰西湖僧惠勤甚文而長於詩豫到官三日訪勤於孤山之下抵掌而論人物曰公天人也人見其暫寓人間而不知其乘雲馭風歷五嶽而跨滄海也此邦之人以公不一來為恨公麾斤八極何所不至雖江山之勝莫適為主而竒麗秀絶之氣嘗為能文者用故吾以為西湖蓋公几案間一物耳勤語雖幻怪而理有實然者明年公薨豫哭於勤舍又十八年豫為錢塘守則勤亦化去久矣訪其舊居則弟子二仲在焉畫公與勤之像事之如生舍下舊無泉豫未至數月泉出講堂之後乃取勤舊語推本其意名之曰六一泉玉泉在府城西九里松北唐白居易詩湛湛玉泉色悠悠浮雲身間心對定水清淨兩無塵冷泉在武林山蘇軾詩靈隱寺前天竺後兩澗春淙一靈鷲不知水從何處來跳波赴壑如奔雷無情有意兩莫測肯向冷泉亭下相縈回丹泉在大滌山其源最髙歷天柱山而下始聞殷殷若雷聲至大滌洞西乃出甘冽不竭有方池瀦焉天宇清明則有赤光四傍苔蘚皆為紫暈撫掌泉在大滌山洞霄宫前舊傳錢武肅王至宫有雙鶴飛舞其上因撫掌招之鶴下而泉湧因以撫掌名泉深可三尺清冷似鑑古詩却疑三尺底别是一壺天東坡泉在昌化縣治南蘇軾始尋溪源得之人因鑿石為泓石刻東坡泉三字於泉