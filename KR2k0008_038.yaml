歌此曲水光山色不勝悲陳剛中墓在府城西北龍井山剛中閩人宋建炎中任大府寺丞上封事議恢復忤秦檜與胡銓等七人同謫剛中知虔州安遠縣殁其子扶柩葬於此鄒濟墓在餘杭縣東南五里濟歷官至詹事本朝洪熙初勑葬於此仍建祠墓左命有司春秋致祭于肅愍公墓在三人山古迹周赧王城在餘杭縣北三十里宋晏殊類要此城周赧王南遊所築餘杭縣舊城在苕溪南漢熹平中徙溪北尋復溪南宋雍熙初復徙溪北今溪南舊城基問有存者元至正中築城守禦號營盤城東安郡城在富陽縣北一十八里吳董武中郡守全琮築潛州城在於潛縣東七里唐武德中築置州並臨水縣尋廢今其地名城嶺紫溪縣城在於潛縣南三十里唐垂拱初析於潛置紫溪縣後改曰武隆尋廢宋大內在鳯凰山之東本梁安國寺地故吳越王宫也宋為杭州治髙宗南渡以州治為行宫增築皇城大廟宋紹興四年建在府城內瑞石山之東十三年又建景靈宫以奉祖宗神御在城內西北隅十五年又建神御殿朔望節序生辰帝親酌獻行香用家人禮在大內今俱廢圜壇在府城南八里紹興十三年築三歲一郊天壇四成壇及內壝凡五十步中壝外壝共二十五步壇側有熙成殿社稷壇在府治北紹興十三年築先農壇在府城東南一十里紹興十五年築髙禖壇在府城東南一十里紹興十六年築歲祀青辛以伏羲髙辛配九宫壇在府治東故青門外紹興十八年築歲祀太乙等九宫神以上皆廢間存遺址玉津園在龍山之北紹興十七年建舊為燕射之所孝宗嘗臨此講射禮聚景園在府治西五里宋髙以孫詩翠華不向苑中來可是年年惜露臺水際春風寒漠漠官梅却作野梅開俱久廢雷峯塔在西湖南山之南皮園吳越王錢氏所建尚存六和塔在府城南十三里開化寺前宋開寶中建塔有九層後廢紹興間復建七層而止林逋廬在西湖之孤山逋初放遊江淮間久之歸杭結廬於此二十年足不及城市宋真宗賜粟帛詔長史歲時勞問杭州守李及輩嘗造其廬清談終日而去有梅花詩云疏影橫斜水清淺暗香浮動月黃昏為世所稱畜二鶴嘗泛小艇於湖中客至廬童子縱鶴飛去逋即歸東坡菴在錢塘縣西北六里東坡為郡守時嘗止此後人鑿岩為室名東坡庵嶽飛宅在府治北郡人即其地立廟祀之廟有井相傳飛被害時有女尚幼挾銀瓶投井而死故廟並祀焉葛塢在武林山吳葛孝先偕葛洪居此仙母墩在府治西五里神女傳云王方平過蔡經家以千錢與餘杭姥求沽酒須臾得酒五升又世傳有農姥居此採衆花醖酒後有三仙人至飲酒因授藥數丸姥餌之遂仙去宋王安石詩緑淨堂前湖水緑歸來正復有荷花花前若見餘杭姥為道仙人憶酒家仙人棊在府城西五十里山上以丹砂為棊局路黑白棊子皆在鐵井欄在六和寺南昔有蛟龍自井而出攻損江岸錢氏鑄鐡井欄以鎮之刻八卦於上以象八方名宦漢陳渾嘉平間為餘杭令築南湖塘鑿石門以禦水患民立祠祀之三國陸遜吳孫權為將軍時遜仕幕府出為海昌都尉並領縣事時縣連年亢旱且多盜賊遜開倉以賑飢民勸督農桑率所募兵以討賊所向皆服百姓賴焉南北朝劉道真宋錢塘令又劉道錫為餘杭令元嘉中詔遣沈演之行郡表云道真道錫為二邦之首最治民之良宰張祐宋歷臨安錢塘令並著能名宋世言長吏者以祐及傅僧祐陳珉三人為首蕭赤斧宋錢塘令治政為百姓所安時議推重焉孫謙南齊錢唐令御煩以簡獄無繫囚及去官百姓載縑帛追送之辭不受時稱循吏劉允恭陳餘杭令治事詳明臨下清簡田野開闢囹圄屢空民為立德政碑唐李濬登封初為富陽今築陽陂湖隄以捍水患貞元中令鄭早又增修之裴惓以清德為巡察使所薦遷杭州刺史蒞政有美譽宋璟中宗時為杭州刺史居官清毅人無敢犯者丁表麟德中為於潛令有政績邑人立德政碑袁仁敬開元中杭州刺史時玄宗自擇諸司長官以仁敬刺杭詔宰相諸王御史以上祖道洛濵賜詩親書以寵其行仁敬治郡之暇嘗種九里松劉晏天寶末假守餘杭會永王璘事晏因發義兵堅壁以待璘聞晏有備遂自晉陵西走晏終不言功召遷彭原太守陳允升上元間為餘杭令有李復繼之俱有政績民為立碑頌德李泌大厯中為杭州刺史有風績郡中鹵水不可飲泌乃引湖水入城為六井大為民利杜泳貞元中為於潛令嘗開紫溪河溉田又鑿渠以通舟楫民蒙其利白居易長慶初為杭州刺史始築隄捍錢塘湖鍾泄其水溉田千頃復浚李泌六井民賴其利歸珧寶厯間為餘杭令因漢陳渾故迹置上下湖溉田千餘頃又築甬道通西北大路髙廣徑直百餘里行旅無山水之患周寶僖宗時為杭州刺史羣盜蜂起寶募諸縣鄉兵討之民賴以安宋翟守素太宗時錢氏獻其地詔守素為兩浙兵馬都監安撫諸郡人心甚悅即以知杭州范旻知杭州錢氏據兩浙民苦其政旻既至悉條奏請蠲除之太宗從其請張詠咸平初知杭州遇歲歉民私鬻鹽者輒寬之民有子與壻訟家財者壻言妻父臨終命掌資産此子才三歲遺書令異日三分付子七分與壻詠曰汝婦翁智人也若以七分與子則子死汝手矣亟命以七給子三給壻時皆服其明決薛映知杭州臨政敏鋭庭無留事吏不能欺以治最稱夏侯嶠咸平中江浙飢以嶠為巡撫使所過疏理刑訟存問耆老務從寬簡人以為便王濟景德間知杭州吳越俗尚華靡濟以質素矯之濬錢塘湖增置斗門以防潰溢之患民賴其利馬亮大中祥符間知杭州先是江濤大溢調兵築隄未就亮既至處以方略隄遂成百姓賴焉李及乾興元年知杭州治尚簡嚴惡杭人風俗輕靡未嘗事晏遊一日冒雪出郊獨造林逋清談至暮而歸居官數年未嘗市吳中物比去惟市白樂天集一部俞獻卿景祐間知杭州一日暴風江潮溢決隄獻卿鑿西山石作隄數十里民用便之司馬池寶元間知杭州時江鈞張從革為兩浙轉運使惡池誣以事條奏之降知虢州池未謫時吏有盜官銀稱為鈞償私費而從革之姻犯稅或謂可以此報之池忍不較人以為長者鄭戩慶厯初知杭州浚治西湖民賴其利事聞詔本郡歲治如戩法楊偕知杭州忽大風驅潮江岸齧去大半偕急督人斷防卒免墊溺於是條上全築方略詔發江淮之役遂成新隄張去華知杭州兩浙自錢氏賦民丁錢有死而不免者去華建議除之范仲淹皇祐初知杭州時郡中大飢殍殣枕路仲淹發粟及募民存餉為術甚備又諭諸寺工作貿易飲食以惠貧者自是兩浙惟杭州晏然民不流徙張方平知杭州言畿內稅賦之重及請減定刺配刑名等法久之拜翰林學士再知杭州孫沔再知杭州明敏果敢有吏材卒著能迹仁宗嘗解御帶賜之李兊皇祐間知杭州仁宗飛白書安民字賜之兑介靜簡嚴年老而精明有所舉措要使民便安之梅摯嘉祐間知杭州仁宗賜詩以寵其行摰以詩首章名堂曰有美王琪知杭州政尚簡靜每疾俗吏飾厨傳以沽名譽故待賔客頗簡略間造飛語起謗終不自恤余良肱知杭州江潮善溢漂官民廬舍良肱纍石隄障之潮不為害時屬官王陶負氣府帥挾憾欲按之良肱不可曰使陶以罪去是以直不容也蔡襄治平間知杭州為政精明吏不能欺陳堯佐為兩浙轉運副使錢塘江篝石為隄隄再歲輒壞堯佐請下薪實土乃可堅久丁謂不以為是後卒如堯佐議胡宿知杭州清儉謹默內剛外和臨民篤恭不略細故人多愛之趙抃熙寧間知杭州歲旱民病朝廷議欲築城抃曰民未可勞罷之杭故多盜聞抃性寬盜益甚抃取其情重者配他州餘遂散去境內以清陳襄知杭州能撫循其民以唐李泌六井久廢命工討其源流泄而甃之井乃可食雖遇旱歲民用沛然蘇頌知杭州時吳越荐飢一日出遇百餘人遮道訴轉運司責逋錢甚苦頌釋之期以歲月使償官轉運使怒欲奏頌而償者竟先期至嘗宴有美堂聞將兵結集郡人恐懼頌談笑自如密諭兵官捕為首者逮夜會散而坐客不知崔遹元豐間為於潛令有遺愛嘗興元豐塘為邑人利至今呼為崔長官塘蘇軾通判杭州時行新法軾每因法以便民元祐初知杭州值大旱飢疫軾請免本路上供米三之一及得賜度僧牒易米又減價糶常平米以濟之仍遣使督醫分坊治病全活者甚衆民為立生祠楊時為餘杭令以教化為先務不為煩苛臨事剸裁未嘗形之顔色後去官民懷其惠立祠祀之張閣大觀中知杭州杭久闕守郡事廢弛閣經理有敘首去惡少之為民害者郡人為立生祠韓瓘政和初為於潛令興利除弊嘗遊憩於岝崿山之東軒後人因目為昌黎館以寓去思江帙宣和間為餘杭令政稱神明有水利記以紀其績章誼通判杭州建炎初陳通作亂誼聚七縣弓兵以張聲勢賊平旋加撫定人皆德之劉誨建炎中金烏珠軍至杭州守臣康允之棄城退保赭山時誼自楚州赴召在城中軍民推之以守後死於難增直龍圖閣朱蹕為錢塘令金兵至杭州蹕領士卒迎戰欵敵使民得為逃死計蹕中流夫傷甚猶叱左右負已擊敵後數日遇害李光知臨安府髙宗欲移蹕臨安光經營撙節不擾而辦奏減兩浙積負及九邑科配以示施德自近之意吕頤浩知臨安府處事有緒豪右莫敢犯禁始置監渡官定舟人多寡自是少風濤之厄梁汝嘉臨安闕守火盜屢作命汝嘉攝事汝嘉修火政嚴巡徼盜發輒得火災亦息遂命為知府邵文炳紹興間知於潛縣興水利減山鄉折米之直後登中書民懷其德政與葉衡同祠縣南號二賢祠葉衡紹興間知於潛縣户版積弊富民多隱漏貧弱困於陪輸衡定為九等貧者頓蘇徵科為期限榜縣門不遣一吏而賦自足歲災蝗不入境治為諸邑最張杓淳熙中再知臨安府撫良戢姦恩威並用時有外戚犯罪夤緣求免杓曰吾官可去法不可屈權要多畏憚之周淙知臨安府上言自古風化必自近始陛下躬履節儉以示四方而貴近奢靡殊不知革乃條上禁革十五事上嘉納之徐誼知臨安府宰相趙汝愚雅器誼除授建明多咨訪而行時韓托胄恃功􅔵望誼言宜飽其欲而遠之汝愚不聽後果為國患袁韶嘉定中知臨安府幾十年理訟精簡平反寃獄甚多道不拾遺里巷呼為佛子吳潛理宗時以吏部尚書兼知臨安府上論艱屯蹇困之時以反身修德以求亨通之理乞遴選近族以係人心而俟太子之生帝嘉納之趙希磐紹定中知餘杭縣政尚清淨邑里安謐撤新縣治不勞民而成元戴表元臨安府學教授宋末文章氣萎而辭骩骳表元慨然以振起斯文為己任遂以文章大家名重一時慶通以平章鎮海寧州州距杭百里地瀕海磽瘠民甚貧居二年盜息而民阜在任七年勞績甚著臧夢解至元中知海寧州剛直亷慎門無私謁差役皆當其富貧而吏無所預以致户增田闢政平訟簡為諸州最庫庫浙江行省平章以重望居髙位雅愛儒士甚於飢渴而四方文人翕然宗之張思明兩浙運使歲課羡餘僚屬請增數上之思明曰盈縮不常萬一以增為額是我希一已之榮遺百世之害也王都中兩浙運使舊制竈户三年一推排任事者久不舉行都中請於行省遍詣諸場驗其物力髙下以損益之公私皆便王克敬兩浙運使減民食鹽有逮犯私鹽者以一少婦至克敬怒曰豈有逮婦人千百里外與吏卒雜處者汙教甚矣自後不許著為令李廷佐兩浙運使嚴明有才幹悉心鹽策之事凡亭民不便者罷之吏胥黷貨者斥之暇則與儒生講論經史聲譽赫然趙孟俯江浙等處儒學提舉博學多聞操履純正以詩文鳴世陳旅江浙儒學提舉資稟穎異於書無所不讀翰林學士虞集雅愛重之黃溍江浙等處儒學提舉天資頴悟博極羣書以文學名四方梁曽杭州路總管户口復者五萬四千餘又請禁暮夜鞫囚遊街酷刑朝廷是之著為令蘇天爵江浙行省參政江浙財賦居天下十七事務最煩劇天爵條分目别細巨不遺趙璉杭州路總管強毅明敏吏民咸服其明決嘗集議均徭役之法民以為便吳元圭皇慶初為江浙行省左丞江淮漕臣言江南殷富蓋由多匿腴田請再檢覆元圭言江南平已久户有定籍田有定畝一有動搖其害不細執論不見聽遂移疾去王昌延祐初為餘杭尹政績著聞惠及傍邑後轉徽州路推官及卒還葬餘杭觀國山下民思之立石頌其功且塑像祀之樊執敬浙江行省參政時徽饒冦犯杭執敬引兵拒之與賊遇射死七人賊衆擁至呼降執敬怒叱之曰恨不碎汝乃奪刀砍賊因中槍而死詔封魯國公董摶霄浙東宣慰副使時徽饒賊陷杭州乃進兵迎賊夾擊之賊敗遂復杭州據要路追殺大破之復於潛昌化其功甚偉本朝王興福洪武初知杭州府為政明於大體不尚苛刻民賴以安去任民遮道送之興福謝曰非我之政能惠爾民實爾民能奉教條以成我也尋升吏部尚書王德宣洪武初知杭州府約己以亷勞於撫字崇儒道作興士類捐俸置書藏於學王鈍洪武初為浙江布政使持身亷介涖政勤敏吏胥懾服嘗伐石以捍江濤民免墊溺歲旱禱雨即應憂民之心不遑寢食民咸德之黃信中洪武中為錢塘知縣為政不苛民皆信服官滿當去民相率乞留命為杭州知府丘子強洪武中為餘杭縣丞簡重有威賞罰明信公庭肅然吏胥無敢虐鄉民者王玘洪武末浙江按察司僉事振肅風紀務詢民瘼屬司畏憚民受其惠時稱得風憲體辛彥博洪武末為浙江按察使永樂中遷浙江左布政使在任有善政不尚苛暴得吏民心易英洪武末為浙江布政司參政政尚寬平明於大體奬勵儒生務期成效尤嗜詩書公務之暇手不釋卷王良洪武末左遷浙按察使靖難聞變其妻自投於池良為殮畢遂舉火閻室自焚死省志虞謙永樂初知杭州府鋤強扶弱涖政嚴明姦吏畏服豪黠屏迹勸學興禮士知勵行尋升右副都御史葉宗行永樂初以言事稱旨擢知錢塘縣清白自持令民自占甲乙第其髙下書之於册用是賦役均平詞訟亦簡李素永樂中浙江按察司副使在任發姦擲伏深知民隱聽訟折獄下無遁情執法平而吏民服戴同吉宣德初浙江布政司右參議旬宣勞來務盡職業省志許銘宣德初為浙江按察司副使持憲嚴明豪貴人不敢干以私而興利除害民莫不感服省志陳鎰宣德初為浙江按察司副使用決寬平民甚信愛省志軒輗宣德中浙江按察使俸資之外一毫不取纍官尚書清操始終一致省志胡軫宣德末左遷浙江鹽運同知持身亷儉風裁凜然尋升本省副使督學士人宗之省志陳復正統初知杭州府公正亷明濟以簡靜憂去民保留之起復特命再任省志孫原貞正統間巡撫浙江平處州寇亂奏置泰順雲和宣平景寧四縣經理之功到今稱之省志韓雍以兵部侍郎出為浙江參政素望服人且興利除害靡不允當省志陶成正統間浙江僉事不激不隨獄多平反後死於金衢劇盜蘭溪龍遊皆立祠祀之省志余子俊天順初浙江左布政以承流宣化為己任尤留心於水利農田民多受益焉省志張悅天順中浙江按察司提學僉事士人帖服諸所奬拔往住取髙第為聞人省志楊繼宗天順中浙江按察使軍民愛之如父母官吏畏之如神明省志林同天順中浙江參政督糧均賦恤民浙人德之省志邵寶成化初浙江按察使尋轉右布政兩有政聲省志楊瑄成化初浙江按察司副使繕緝墩候修築海塘尋升本省按察使尤力持憲度云省志似鐘成化中巡按浙江民隱官邪無不洞悉彰疸所及贓吏望風解印而民間晏然省志劉大夏成化末浙江左布政勤撫字緩催科移檄郡縣務在節用愛人提調𢎞治二年鄉試得王守仁胡世寧孫燧諸人省志張敷華𢎞治初浙江右參議撫定景寧礦盜不假兵力尋升本省右布政風采愈凝重省志戴珊𢎞治中浙江按察使肅清憲度不為物撓而意常近厚事多反平軍民感戴省志彭澤𢎞治中浙江按察司副使持憲嚴明好善疾惡一洗脂韋軟媚之習君子謂其得於理學者為多省志李遜學𢎞治中以僉事督學浙江寬而有制甄别不爽教人以敦行尚實為本士習亦為少變云省志席書𢎞治末浙江按察使服御儉約寮屬多所感化公餘惟喜論學嘗著鳴寃録以明陸象山之寃學者多所開悟省志何塘正德中浙江提學副使古貌古心文章粹然一出於正浙士人師尊之許讚正德中浙江左布政使不激不隨甚多惠政省志李承勛正德中浙江按察使持憲易弊上下帖然問學多所自得省志流寓干寶本新蔡人徙居鹽官博覽書記著晉紀二十卷直而能婉時稱良史作搜神記三十卷人謂鬼之董狐仕晉為始安太守裴覺本長安人唐光啓中為杭州刺史屬董昌作亂兵興道阻覺遂留家於杭子堅仕吳越錢氏纍官至丞相鮮于樞其先涿郡人後居杭樞風流文雅善為詩歌尤工行草吳興趙孟俯以能書名世亦推重之為元江浙行省都事遷太常典簿致仕蘇爾約蘇哈雅元功臣阿爾哈雅之孫生而神彩秀異膂力絶人及長欣節讀書吐辭為文出人意表仕為翰林侍讀學士稱疾辭還江南賣藥錢塘市中詭姓名易服色人無有識之者自號酸齋鄧文原綿州人父漳徙錢城因家焉至元中辟為杭州路儒學正纍遷至浙西江東湖南亷訪使所至多所平反仕止國子祭酒翰林侍講學士為人內嚴外恕博學能文卒諡文肅張翥元晉寧人父為饒州安仁縣典史又為杭州鈔庫副使翥少時豪放不羈好蹴踘喜音樂父憂之翥一旦翻然易業閉户讀書在安仁受業大儒李存未幾留杭又從仇遠先生學遂以詩文知名後纍官翰林學士承旨封潞國公人物漢張儼餘杭人好學有賢德遭漢末之亂嘗開圃種瓠以所售錢造橋不樂營利鄉人重之孫鍾富春人性至孝以種瓜為業一日有三人來鍾設瓜及飲三人曰示子葬地下山百步勿反顧鍾不六十步回看見三白鶴飛去遂葬其母鍾後生堅堅生䇿權權後建國為吳稱帝傳亮休皓凡四世三國全琮錢塘人父柔漢末舉孝亷補尚書郎右丞纍官桂陽太守嘗使琮將米數千斛入吳市易琮悉以賑貧不及歸報柔更竒之後仕吳為奮威校尉領東安太守治富春招集流竄數月得萬餘人加右大將軍凌統餘杭人父操從孫策討江夏中流夫死統年十五攝父兵從吳孫權征討有功拜偏將軍在軍旅親賢接士輕財重義有國士風郭成富春人夙著節義乘扁舟泛五湖以書劍自娛吳黃武中徵拜武義校尉遷黃門侍郎後封永興富春二縣侯丁諝錢唐人出於役伍顧卲拔而友之為立聲譽揚其善以並陸全之列仕吳至典軍中郎世以卲為知人晉褚陶錢塘人聽慧清談年十三作鷗鳥水磑二賦見者竒之張華謂陸機曰君兄弟龍躍雲津顧彥先鳯鳴朝陽謂東南之寶已盡不意復見褚生後官至中尉范平錢唐人研窮典墳吳時舉茂才纍官臨海太守有異政太康中召不起卒賜號文正先生三子奭咸泉並以文學至顯官克世其家郭文臨安人居大滌山嘗有猛獸張口向文文視其中有橫骨乃以手探去之明旦獸置一鹿於室前王導聞其名遣人迎置之西園朝士咸往觀之文頽然箕踞傍若無人居導園七年後歸臨安山中時頗尚其風致南北朝卜天與餘杭人善騎射有勇力容貌嚴毅宋文帝擢為廣威將軍太子劭入弒事變倉卒諸將望風屈謝天與獨射擊之臂斷乃遇害吳喜臨安人少知書兼習戰陳宋時領兵征計屢建大功仕至都督豫州諸軍事朱謙之錢唐人數歲父昭之為族人幼方焚死不勝哀戚長即手刃殺幼方自詣縣獄令上其事南齊世祖嘉其義赦之顧歡鹽官人年六七歲父使之田中驅雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止貧無以受業每於舍後聽人誦書無遺忘者夕則燃松節讀書有孝行母亡水漿不入口者七日廬於墓遂隱不仕南齊髙帝召為太學博士不就范元琰錢塘人性嗜學博通經史家貧以園疏為業嘗出行見人盜其菘遽退走母問其故對曰畏其愧恥故也或涉溝盜其笋元琰因伐木為橋以渡自是盜者大慙一鄉無復鼠竊齊梁之間纍徵辟皆不就范述曽錢唐人仕南齊官太子步兵校尉為人謇諤多所諫諍尋拜永嘉太守詔褒美其政後仕梁為太中大夫生平所得俸祿盡以分施卒之日家無餘資戚衮鹽官人仕梁為太學博士簡文在東宫召衮及諸儒講論令中庶子徐摛質難摛辭辨縱橫諸儒懾氣袞精采自若領答如流衆皆服其博識所著冇禮記義四十卷顧越鹽官人祖道望父仲成俱顯於齊梁越自幼承家學於書無所不讀仕梁為參軍嘗侍讀議論宏遠武帝深重之侯景之亂避難東歸賊數授以爵位不受卒年七十七所著有毛詩等疏義四卜卷杜之偉錢唐人少精敏有逸才十五遍觀文史及儀禮故事仕梁為中書侍郎領大著作陳髙宗即位加鴻驢卿遷太中大夫為文溫雅博贍有文集十七卷杜稜錢唐人少落泊不為時知頗涉書傳仕陳監義興琅琊二郡文帝嗣位以預建立功封永成縣侯仕止侍郎護軍卒諡成配享武帝廟庭駱文牙臨安人年十二相者云此郎容貌非常必將遠致陳文帝初避地臨安文牙母知非常人賔待甚厚文帝立封臨安縣侯位越州刺史仕至散騎常侍入直殿省隋陸知命富陽人好學識大體以正介自持大業初拜侍御史侃然正色百僚敬憚卒贈御史大夫許善心新城人讀書萬卷文帝曰我平陳國惟獲此人大業中為禮部侍郎後為宇文化及所害子敬宗曽孫遠顧彪餘杭人大業中為祕書學士所著有古文尚書義疏二十卷魯仲逵餘杭人大業中為國子助教所著有毛詩章句義疏四十二卷唐褚亮錢唐人自少警敏博通圖史陳後主召見賦詩江總諸詞人皆服其工後仕唐為𢎞文館學士官至散騎常侍卒年八十八贈太常卿陪葬昭陵褚遂良亮子博涉文史工楷𨽻貞觀中歷官諫議大夫兼起居注太宗曰朕有不善卿亦記耶對曰臣職在載筆君舉必書遷黃門侍郎參綜朝政尋受顧命輔髙宗遷尚書右僕射帝將立武后遂良力諌不納乃置笏殿階叩頭流血曰還陛下笏乞歸田里後纍貶愛州刺史竟以憂卒褚無量鹽官人家臨平湖有龍出人皆走觀無量尚幼讀書若不聞衆異之擢明經遷司業中宗將南郊詔以皇后為亞獻無量極諫之玄宗即位遷左散騎常侍許逺新城人祖敬宗為文學館學士遠寬厚長者安祿山反與張巡同守睢陽城陷不屈死宣宗時圖像凌煙閣章成緬於潛人家貧篤學事親著至行喪母廬墓烏鵲來巢麋鹿共處貞元中表其門人以章孝標稱之凌凖富陽人有謀略尚氣節讀書為文章擢校書郎朱泚之亂以謀畫佐元戍有大功纍遷殿中侍御史進翰林學七後謫連州卒所著有後漢書春秋二十餘萬言錢鏐臨安人黃巢亂鏐以鄉人破走之劉漢宏遣兵屯西陵鏐以八都兵討之遂破越州以奉董昌而自居於杭及昌反鏐遣人執之歸杭昭宗拜為鎮海鎮東兩軍節度使梁封吳越王傳子文穆王元瓘孫忠獻王仁佐至忠懿王俶納土於宋吳公約餘杭人黃巢之亂公約以鎮遏使從董昌敗巢於西鄙徐寇據姑蘇授北面諸軍行營招討使禦之摧鋒破鋭日有聲稱纍官至秋曹民部二尚書尋遷左執法公約薄於進取為將三十年家無長物馬綽餘杭人嘗從董昌於越州及昌僭叛遂棄家奔錢鏐纍官兩浙行軍司馬後表授雄武軍節度使同平章事杜建徽新城人少勇強大有志從錢鏐征伐輒單衣入陳屢立大功歷官自武安都將纍遷昭化軍節度使吳越國丞相封鄖國公卒諡威烈羅隱新城人有能詩名嘗説錢鏐舉兵討朱溫曰縱無成功猶可退保杭越奈何交臂事賊為終古之羞乎唐光啓中鏐表為錢塘令辟為掌書記後為給事中遷發運使所著有江南甲乙集等書成及錢塘人父貞國子博士及以篤厚為鄉里所重乾符中代聞人宇掌八都兵劉漢宏作亂與錢鏐同討平之纍官兵部尚書充常州防禦使遷檢校太師兼侍中阮結錢塘人中和間以征劉漢宏功授散騎常侍後又征常潤二州纍遷户部尚書五代薛溫錢塘人漢乾祐中吳越王俶遷廢王倧於衣錦軍私第遣溫將兵衛之胡進思屢語於俶殺倧不許文謀於溫溫拒之進思乃夜遣方安等二人踰垣而入溫率衆救之斃安等於庭中倧獲全後纍官鎮國都指揮使睦州刺史卒諡正顯曹圭仁和人家臨平少有膽氣唐末仕吳越為嘉興都將準人圍嘉禾圭與其族人師魯守之淮人望氣曰此雖孤城中有貴人不可圍也嘉禾平圭以功授蘇州刺史子仲達性仁厚仕吳越纍官至丞相卒諡安成師魯形短而多智人號為曹晏嬰宋錢惟演俶子幼有俊才能文章咸平中獻其所為文拜翰林學士仕至兵部尚書樞密使卒贈侍中諡文僖錢易惟演族子年十七舉進士御試三題日中而就太宗嘗詔蘇易簡曰朕恨不與李白同時易簡曰有錢易者李白才也後舉進士甲科纍遷翰林學士易及其子彥遠明遠孫協族孫藻並中賢良方正科孫承祐錢塘人初仕吳越王俶纍官鎮海鎮東兩軍節度副使後從俶克常州有功為平江軍節庭使及俶納土徙泰寧軍節度崔仁冀錢塘人事吳越錢俶為通儒學士太祖嘗諭俶使入朝仁冀告俶曰主上英武所向無敵保族全名上䇿也俶然之太宗時俶與仁冀決䇿納土且薦其才能於是擢衛尉卿楊大雅錢塘人十歲作雪賦以文行知名咸平中上書自獻所為文二十餘萬言召直集賢院歷右諫議大夫集賢學士知亳州所著有大隱集三十六卷子洎濬泳漸沆渢歐陽修其壻也林逋錢塘人少孤刻志為學性恬淡好古弗趨榮利善行書喜為詩多竒句不存藳或勸録之逋曰吾方晦迹林壑安用名世仁宗時卒賜諡和靖先生賻以粟帛居西湖二十年未嘗履城市逋不娶無子教兄子宥登進士宥子大年英宗時為侍御史郎簡臨安人幼孤貧嗜書景德間登進士第知福清縣邑人為立生祠調隨州推官及引對真宗曰簡歷官無過而無一人薦是必恬於進者特改祕書省著作佐郎以工部侍郎致仕卒年八十九唐肅錢塘人七歲誦五經登進士為奉州司理有人夜宿逆旅而同宿者殺人亡去旦起血汚其衣為吏所執不能明遂自誣服肅為白其寃數日果得真殺人者仕至龍圖閣待制三司度支副使盛度餘杭人端拱初進士歷官翰林學士拜參知政事遷知樞密院事後以太子少傅致仕家居圖書未嘗釋手卒諡文肅元絳錢塘人天聖中進士為江西轉運使儂智髙反嶺南而肅軍雍州絳供軍餉有功纍遷翰林學士工於文辭一時名人皆推許之拜參知政事後以太子少保致仕卒諡章簡有文集數十卷謝絳富陽人父濤有文行進士起家纍官至太子賔客絳舉進士甲科為兵部員外郎為人修潔醖藉以文學知名嘗歷州縣所至大興學舍有文集五十卷四子皆仕於時謝景初綘子慶厯間登進士第知餘姚縣有政績以屯田郎致仕博學能文尤長於詩弟景溫皇祐初進士纍官寶文閣直學士知開封府景平亦登皇祐中進士好學著詩書傳説數十篇仕終祕書丞李用和杭州人章懿皇太后弟也纍官彰信軍節度使檢校侍中卒贈太師封隴西郡王初仁宗以太后不逮養故於外家褒寵特厚用和列位將相能小心靜默推遠權勢論者以此稱之子璋瑋珣皆至大官能守其家法唐詢肅子登進士除尚書工部員外郎遷江南轉運使擢起居注出知蘇杭青三州拜翰林學士有集三十卷子坰熙寧中為監察御史強至錢塘人為文簡古不徇俗舉進士宰相韓琦屢薦充館閣不果終祠部郎卒贈金紫光祿大夫子浚明淵明陟明皆登進士淵明歷禮部尚書翰林學士承旨終資政殿學士諡文憲沈遘錢塘人仁宗朝進士第二歷知杭州為人疏俊博達明於吏治遷知開封府每蚤作視事逮午而畢庭無留人官至翰林學士弟遼好學尚友趣操髙爽官奉禮郎攝華亭縣為文雄竒峭麗尤長於詩周邦彥錢塘人涉獵書史性落魄不羈元豐中獻汴都賦萬餘言多用古文竒字神宗異之自諸生召為太學正有文集二十四卷世傳其詞調最工仕至徽猷閣待制知順昌府陸詵餘杭人第進士有禦邊才熙寧中鎮撫西夏復靖交址之難仕至天章閣待制知諫院虞策錢塘人嘉祐間登進士第哲宗時為監察御史進右正言數上書言事多見施行仕至吏部尚書樞密直學士弟奕元豐間進士歷官光祿卿户部侍郎卒贈龍圖閣學士唐恪錢塘人以蔭登第纍官户部侍郎徽宗時京師暴水至汴再溢付恪治之浹旬水平因上疏願謹天戒後拜少宰兼中書侍郎金人陷汴立張邦昌逼取百官推戴狀恪既書名仰藥而死沈晦遘孫徙居崇德博覽強記善綴文宣和中進士第一人授著作佐郎後歷守數郡終徽猷閣直學士孫鼛錢塘人以父任補官纍遷屯田員外郎鼛微時與蔡京善嘗曰蔡子貴人也然德不勝才恐貽天下憂至是與京不協京怒使言者誣以他謗提舉鴻慶宫起知單州卒諡通靖吳師禮錢塘人太學上舍賜第徽宗時為開封府推官治蔡王獄不使誣及王人服其公纍遷右司員外郎以直祕閣知宿州卒兄師仁篤志勵學有孝行官太學博士滕茂實臨安人靖康初以工部侍郎副路允迪出使為金人所留即自為哀辭且篆宋工部侍郎滕茂實墓九字取奉使黃幡裹之以授其友董詵欽宗至北茂實具冠幘拜伏號泣請隨行金人不許迫令易服且欲大用茂實力拒不從憂憤成疾卒詵歸上其事贈龍圖閣直學士官其家三人張九成錢塘人年十四鄉貢辟雍從楊時學紹興初以直言對䇿上及兩宫下及閹寺忠憤激烈無所顧避仕至禮部侍郎以與秦檜議論不合謫居南安軍後起知溫州理宗時贈太師追封崇國公諡文忠凌景夏餘杭人紹興初進士擢祕書正字言和議之非秦檜憾之後歷官中書舍人知襄陽府遷吏部侍郎多所建明樊光逺錢塘人紹興中省試第一除祕書正字上疏極詆時弊出為閬州教授後召為祕書丞遷監察御史何鑄餘杭人政和中進士紹興中拜御史中丞秦檜陷嶽飛命鑄鞫之鑄白其寃檜不悅鑄曰鑄豈區區為一嶽飛者強敵未滅無故戮一大將失士卒心非社稷之長策檜語塞諷万俟卨使論鑄私嶽飛欲竄嶺表帝不從仕止資政殿學士卒諡恭敏黃黼餘杭人乾道問第進士遷太常博士論對稱旨進祕書郎尋除兩浙轉運副使時毗陵民飢取粳粃雜草根為食郡縣不以聞黼取民食以進乞損僧牒緡錢濟之全活甚衆仕至權刑部侍郎趙汝談餘杭人淳化中進士嘗定疑義數十條朱熹異之佐丞相汝愚定大策纍獻備邊計歷官江西提舉後入對言多剴切兼直學士院權吏部侍郎復疏邊事楮法上稱歎之進權刑部尚書卒汝談天資絶人自少至老無一日去書册所著有經注趙汝讜汝談弟少倜儻有軼材折節讀書與兄齊名上言乞斬韓托胄坐廢後登嘉定初進士為太社令徙湖南遷知溫州錢端禮俶六世孫祖景臻尚仁宗公主父忱髙宗時拜檢校少保嘗御書忠孝之家四字賜之後封榮國公端禮纍官知臨安府嘗建明用楮為幣孝宗朝參知政事孫象祖嘉定初為左丞相洪咨夔於潛人嘉定初進士歷官監察御史論權歸人主政出中書天下未有不治又言講明聖學六條遷吏部侍郎進刑部尚書拜翰林學士知制誥為人鯁亮忠慤馳騖藝文所著有內外制奏議詩文集金淵臨安人嘉定中進士歷官右正言兼工部侍郎國子祭酒遷諫議大夫禮部尚書進端明殿學士簽書樞密院事李宗勉富陽人開禧初進士嘉熙中纍遷至左丞相兼樞密使守法度抑僥幸不私親黨尤樂聞讜言身居台輔家若貧儒卒贈少師諡文清葉時仁和人操履端凝與朱文公相友善纍官至龍圖閣學士卒諡文康所著有禮經會元竹野詩集趙景緯於潛人少勤學恨不及遊朱文公之門淳祐初登進士第官至禮部侍郎卒贈中奉大夫諡文安景緯天性孝友雅志沖淡親歿無仕進意史稱為醇儒葉李杭州人少有竒質為人剛直不阿理宗時為太學生上書攻賈似道竄漳州宋亡歸隱富春山元世祖素重其名屢召授以官不就一時大政事皆參決之後特授中書右丞卒諡文簡元楊戴其先浦城人徙杭因為杭人少孤博涉羣書年四十為國史院編修官延祐中舉進士歷寧國路推官載為文以氣為主而詩尤有法常曰詩當取材漢魏而音節以唐為宗每詩出學者傳誦之吾衍杭州人性簡傲嘗自比郭忠恕工𨽻書小篆尤精為詩效李賀清麗無塵土氣所著有尚書要略九歌譜説文續解等書本朝胡禎錢塘人洪武中仕至刑部尚書蒞政嚴明獄無留滯瞿佑錢塘人洪武中為宜陽縣學教諭遷國子助教永樂初推周府長史致仕卒佑博學能文有集數卷鄒濟餘杭人為人和易不見崖岸舉明經授本縣訓導薦入翰林與修洪武實録總裁永樂大典纍遷左春坊左庶子寵賚甚厚尋升少詹事卒之日家無餘資惟藏書數千卷而已贈太子少保諡文敏姚肇富陽人性聰敏有孝行洪武中舉孝亷試太常寺丞以勤慎稱升雲南右參議論楮幣塞鹽井皆切時弊官至福建布政使致仕卒年八十四方賔錢塘人洪武中太學生歷官郎署有聲永樂中纍升兵部侍郎終本部尚書才識通敏名重一時云于敬錢塘人洪武中領鄉薦歷任監察御史春坊中允纍升江西布政使才能著稱士林重之王洪仁和人學博才敏於人少許可年十八舉進士授行人歷官吏科給事巾翰林院檢討與修永樂大典為副總裁升侍講三典文衡公於取士所著有毅齋集柴車錢塘人永樂中纍官兵部侍郎正色率下人畏敬之宣德間將兵征元戎有功升本部尚書纍受制敕褒奬蔣驥錢塘人洪武末登進士第授行人出使以清謹稱尋入翰林為檢討宣德初升侍講與修兩朝實録成進升侍講學士尋拜禮部侍郎卒蔣暉錢塘人工六書永樂初被薦授中書舍人宣德間升禮部郎中兼翰林侍書致仕卒沈升海寧人永樂初登進士第入翰林為庶吉士授刑部主事與修五經四書性理大全仕至太僕寺少卿卒于官徐琦錢塘人徙寧夏永樂中登進士第纍官兵部侍郎正統間升南京兵部尚書以根本重地特受委托卒諡貞襄孫子良海寧人永樂間登進士第為翰林庶吉士與修永樂大典擢兵部郎中謫交址召還授交址參議尋升山東參政所著有螺城集吳登錢塘人永樂中以文學薦擢禮科給事中日侍宸翰終鴻臚寺丞于謙錢塘人永樂末登進士授御史纍升兵部右侍郎景泰初進本部尚書力拒南遷妄議京師賴之以安英皇復位石亨等誣以迎立外藩賜死成化初贈少保諡肅愍名臣録陳信仁和人以推擇為吏即知守亷宣德間以陽武侯薦録擢大理評事改南京西城兵馬副指揮以亷能升蘇州府通判雖蘇治煩劇而信裁剸無留事且持以確守民甚愛之尋乞致仕行李蕭然行路稱嘆省志項麒仁和人正統丁卯舉人除南京吏部司務升工部員外改南京刑部尋升郎中未幾以疾乞歸文學亷孝卓冠時俗家居三十餘年閉户以終省志鄭環仁和人天順初進士及第第一授翰林編修歷司經局洗馬太常少卿亷介方正不妄取與家居不踐公府一時翰林鮮見其儔云省志方銓新城人天順壬午鄉舉任安陸州學正以身為教恩義兼盡成就之士甲于一時從子源由貢三歷訓導教諭所至以善教稱溥以舉人知婺源龍溪二縣有賢名當時稱善教善政者必曰方氏省志江瀾仁和人成化中登進士第入翰林為庶吉士授編修歷侍讀學士吏部侍郎知自守畏清議升南京禮部尚書子曉暉俱舉進士省志李旻錢塘人成化末登進士廷對擢第一授修撰歷兩京國子祭酒明習典禮振舉師模仕至南京吏部侍郎省志胡世寧仁和人𢎞治初登進士授德安府推官有政聲升南京刑部主事員外不屈劉瑾黨劉琅纍官江西按察副使上疏極論宸濠反狀戍遼東濠誅起湖廣按察使至南京兵部尚書諡端敏省志邵鋭仁和人正德初舉禮部第一登進士入翰林為庶吉士後督學江西福建抑浮崇雅士習丕變歷湖廣參政河南按察使廣東山東左右布政使咸有惠政進太僕卿引疾歸平生不立門户暗然日章卒諡康僖省志列女姚氏元餘杭人居山谷間夫出刈麥姚居家執爨母何氏往汲澗水久而不返俄聞覆水聲亟出視則虎銜其母姚倉卒往逐之即以手毆虎脅鄰人執器械以從虎置之而去姚負母歸求藥療之朱氏杭州人黃仲起妻至正十六歲張士誠寇杭驅諸婦至其門責令監守期日暮且至朱懼受辱遂與女俱縊死妾馮氏歎曰我生何為亦自縊既而仲起弟妻蔡氏抱其幼子與乳母湯氏皆自殺畏吾氏三女家錢塘諸兄逺仕不歸母思之疾三女欲慰母意乃共斷髮誓終身不嫁以養母同力侍護四十餘年以壽終平氏仁和人年十九歸同里何富五年而富沒越五月生男誓不再適事舅姑惟謹撫孤至成人四十年如一日有司以聞洪武間表其閭省志仙釋許邁晉永和間入臨安西山登巖茹芝悠然自得遂更名元字逺遊著詩十二首論神仙事莫測所終皆謂之羽化云閭丘方逺其先齊人幼辨慧學於廬山道士陳玄悟又傳法録於天台葉藏質尤好儒學詮太平經為十三篇景福中始居餘杭大滌洞吳越王錢氏厚加禮遇奏請賜紫又奏號玄同先生重建天柱宫以居之一日入齋中作控鶴坐怡然而逝有異香滿室馬自然其先鹽官人世為小吏自然獨好經史工文學嘗遍遊方外至湖州醉墮霅溪經日而出衣不沾濕指溪水能令逆流宋大中祥符間卒葬於其家東園明年東川奏梓潼縣有道士馬自然白日上升杭州發其冢止存竹杖鄧牧錢塘人能通莊列諸書下筆追古作者嘗居餘杭洞霄宫之超然館經月不出四方名勝以文字請者交至非其人雖購之弗與元大德間無疾而逝所著有洞霄志文藁張天雨元杭州人宋崇國文忠公九成之裔早從方外學風裁凝峻工書善詩歌與吳興趙孟俯浦城楊載蜀郡虞集諸公為文字交嘗居茅山著茅山志自號句曲外史黃公望富陽人聰敏絶倫通百氏説尤工畫山水運思落筆出人意表元至元中浙西亷訪使徐琰辟為書吏未幾竟棄去更名堅號一峯又自稱大癡道人放浪江湖年八十餘卒周思得錢塘人少頴悟從四十三代天師張宇初讀道家書本朝永樂初召至京嘗扈從北征寵賚優厚宣德正統間纍封崇教𢎞道髙士領道録司事卒年九十二贈通靈真人道潛於潛人通內外典能文章尤善為詩蘇軾守杭日卜智果精舍居之又為作參寥泉銘蘇轍稱其詩無一點蔬筍氣體製絶似儲光羲非近世詩僧比惠勤餘杭人嘗從歐陽修遊三十餘年修稱其為人聰明才智有學問尤長於詩蘇軾有贈錢塘勤上人詩序明本號中峯杭州人幼聰悟博涉書史為文未嘗搆思援筆立就四方從遊者甚衆元仁宗賜號廣慧禪師及殁文宗賜諡智覺元統中詔以其廣録刻梓命揭徯斯為序慧日天台人軀幹修偉眉長三寸目睛射人嘗從柏子庭講台衡之學元至正間住上下天竺本朝洪武初召至京師寵賚甚厚以其年最髙有戒行命為學佛者師一夕夢青蓮花生方池中謂弟子曰此生淨土之祥也頃之書頌而寂明一統志卷三十八
