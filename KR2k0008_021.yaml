body:
  text: 明一統志卷二十一明李賢等撰大同府東至直𨽻保安州深井界三百六十里南至太原府代州鴈門關二百九十里西至大同右衛黃土山墩二百三十里北至本府舊宣寧縣貓兒莊一百二十里自府治至京師九百里至南京三千五百里糧一十二萬六千石零建置沿革禹貢冀州之域虞周屬并州天文昴畢分野春秋時北狄所居戰國屬趙秦為雲中鴈門代郡地東漢末郡廢三國魏屬新興郡晉改屬鴈門後魏徙都平城置司州牧及置代尹又置北恆州後周並廢隋以其地屬代朔雲三州唐初復置北恆州治雲中縣尋廢開元中置雲州天寶初改雲中郡乾元郡復為雲州五代唐以雲州置大同軍節度遼升為西京府曰大同金因之元改置大同路本朝改為大同府領州四縣七大同縣附郭周大同川地戰國趙置雲中縣漢為鴈門郡平城縣地東漢末廢曹魏復置屬新興郡晉屬鴈門郡後魏屬代尹北齊置雲中縣隋初改為雲內縣屬朔州後屬馬邑郡唐初廢貞觀中置定襄縣尋廢開元中復置改縣曰雲中為雲州治遼析雲中置大同縣金元仍舊本朝因之編户二十六里懷仁縣在府城南七十里本秦雲中縣地漢置沙南縣屬雲中郡後魏時廢隋初為雲州地大業初置大利縣屬定襄郡唐屬雲州遼始析雲中縣地置懷仁縣因阿保機與晉王李克用面會東城取懷想仁人之義故名金升為雲州元復為懷仁縣屬大同路本朝因之編户八里渾源州在府城東南一百二十里戰國時屬趙代郡秦屬鴈門郡漢為平舒崞二縣地屬鴈門代郡東漢末廢後魏屬神武郡隋屬鴈門郡唐置渾源縣以川為名屬應州遼因之金以縣置渾源州元初改縣曰恆陰至元初省入州本朝因之編户一十四里應州在府城南一百二十里古唐國地戰國屬趙為代郡地秦為陰館縣地屬鴈門郡漢因之東漢末廢後魏屬神武郡北齊改屬大平郡後周郡廢置陰城隋廢唐置金城縣以縣置應州以龍首鴈門二山南北相應故名五代時唐置彰國軍節度遼金仍舊元仍為應州本朝因之以金城縣省入編户二十里領縣一山陰縣在州西六十里秦為鴈門郡陰館縣地東漢末廢後魏置平齊郡隋為神武縣地屬馬邑郡唐廢遼置河陰縣屬應州金改山陰縣置忠州元併入金城縣後復置本朝因之編户七里朔州在府城西南二百八十里戰國時地屬燕秦為代鴈門二郡地漢為馬邑縣地屬鴈門郡東漢末廢魏置新興郡晉改新昌郡後魏置桑乾及神武二郡又於定襄故城置朔州北齊改神武曰太平改桑乾曰廣寧後周郡罷以朔州置總管隋大業初改州為馬邑郡治鄯陽唐復改朔州天實初改馬邑郡乾元初復為朔州五代時唐升鎮武軍遼為順義郡宋改朔寧府金仍為朔州元屬大同路本朝以鄯陽縣省入編户八里領縣一馬邑縣在州東四十里本秦縣漢屬鴈門郡北齊屬廣安郡隋初郡廢以縣省入鄯陽縣屬朔州唐復於大同軍城置馬邑縣建中間嘗徙朔州治此五代時唐置寰州及寰清縣遼罷為馬邑縣金置固州元州廢縣存本朝因之編户四里蔚州在府城東南三百五十里春秋時屬晉戰國屬趙秦置代縣屬代郡漢封代王於此為代國東漢末廢後魏於此置靈邱郡後周兼置蔚州隋郡廢州存大業初州廢唐復置蔚州治靈邱至德初改安邊郡後復為蔚州遼置忠頥軍金為蔚州元至元初省州為靈仙縣屬宏州尋復為州屬宣德府本朝洪武四年改今屬編户一十五里領縣三廣靈縣在州西六十里本漢代郡延陵縣地東漢廢唐為安邊縣地後改安邊曰興唐屬蔚州五代時唐置廣里靈縣遼屬蔚州金元仍舊本朝因之編户八廣昌縣在州南一百五十里古為飛狐口漢置廣昌縣屬代郡東漢屬中山國晉屬代郡後周治五龍城隋仁夀初改曰飛狐縣屬易州唐初僑治易州之遂城遙屬蔚州貞觀中復故地宋升為飛狐軍遼復為飛狐縣金元仍舊本朝復改廣昌縣編户四里靈丘縣在州西南一百五十里本漢縣屬代郡因趙武靈王葬此地故名東漢省後魏復置屬靈丘郡隋初郡罷以縣屬蔚州大業初州罷以縣屬鴈門郡唐復屬蔚州五代時遼因之金置成州元復為靈邱縣屬蔚州本朝因之編户一十里郡名雲中代郡俱戰國時名形勝北臨廣野寰宇記自代北至雲朔等州北臨廣野封略之內南北錯居綿亘千里同上大同以西紫河以東橫亘而東至碣石以來綿亘千餘里用武之地通鑑前代以來用武之地寄任之者必文武兼資焉平坡峻坂宋朱辨應州記南山之麓平坡峻坂林木深秀焉勝槩所聚朱辨朔州利涉橋記東距馬邑西直鄯陽南接天池北連洪濤此勝槩所聚柏梯竒觀朱辨渾源州記柏梯凌峙於南山之北南山層巒疊巘林木深鬱而香爐峯孤起屹立此柏梯之竒觀也古道極嶮元志蔚州廣靈有隘口山層崖刺天古道極嶮京師藩屏郡志東連上谷南達并恆西界黃河北控沙漠實京師之藩屏也三面臨邊最號要害同上風俗質直朴野漢志俗尚武藝郡志俗尚武藝風聲氣習自昔而然墾田為生應州圖經人民淳厚墾田為生淳厚守業渾源州圖經四民氣稟淳厚各守所業而不變遷以勤儉相能節用恭謙元志朔州其民敬老慈幼節用恭謙勤於耕耘務於牧養去華從儉同上蔚州之民性質無諂去華從儉以耕織為生山川白登山在府城東七里上有白登臺即胸奴冒頓單于圍漢髙帝處梁元帝橫吹曲云朝跋青陂道暮上白登臺謂此雷公山在府城西北一十里有雷公廟及龍亭每旱禱之輒應武州山在府城西二十里武州川水出焉峪中有石窟寺魏孝文帝嘗幸焉山下有耿氏三冢金皇統間建塔上有志云父曰光祿子曰銀青孫曰昭勇七峯山在府城西南四十五里紇真山在府城東北五十里紇真猶漢言千里其山冬夏積雪故諺曰紇真山頭凍死雀何不飛去生處樂亦名紇干山方山在府城北五十里山頂有拓跋魏二陵及方山宫故基奚望山在府城北九十里俗曰岐王山神山在府城北四百里七寶山在府城北四百餘里故豐州境山下有古城相傳即漢五原郡或云金築此以屯兵黑山在府城西北四百五十里古豐州境與雲內州夾山東西相連石碌山在府城西北五十里故平地縣東四十里山出石碌官山在府城西北五百餘里古豐州境山上有九十九泉流為黑河清涼山在懷仁縣西二十里山有磚塔及有利國鐵冶錦屏山在懷仁縣西南二十五里山舊有瓷窑及鐵冶金龍山在懷仁縣西南三十五里有泉與馬邑金龍池脈相通故名恆山在渾源州南二十里即北嶽也水經謂之元嶽其山髙侵雲漢舜北巡狩至於恆山即此山有天峯嶺大茂山安王石龍泉觀及通元谷步雲路望仙嶺碧峯嶂虎風口集仙洞白雲堂紫芝峪潛龍泉琴基臺會仙府聚仙臺得一菴夕陽巖白虎峯古老嶺石脂圖白龍洞柏山在渾源州南與恆山形勢相連東有惠嶺秀麗可愛翠屏山在渾源州恆山之南其秀麗如翠屏然五峯山在渾源州東五峯如削晝錦山在渾源州西北二十五里元孫公亮由御史仕至尚書而還故名封龍山在渾源州西南四十五里金末李冶元好問張德輝嘗遊此山時號龍山三老又有劉京叔麻信之諸人題詠玉泉山在封龍山東北五里形勢相連上有泉潔如玉龍首山在應州北山之南跨雲中鴈門山在應州南山之北與龍首山相望故州以應名雲山在應州東南四十里翠從山在應州境龍灣山在應州南四十里亦名南山山有龍池遇旱禱之多應香峰山在應州南四十里復宿山在山陰縣南三十五里金王拱碑云文殊大師經行留宿處黃花山在山陰縣北四十里一名黃瓜堆龍門山在山陰縣亦名隘門上有御射臺後魏文成帝嘗射於此刻碑陰有從臣姓名翠峯山在朔州西南七十里東連石碣峪北接馬騣山南通寧武軍山口西至陀羅臺山盤踞二百餘里山陽有石洞中有石佛蔣山在朔州西南八十里燕京山在朔州南一百二十里一名管涔山有天池在山上汾水出焉東靈山在朔州西舊武州境金初蕭融為武州刺史嘗於此山建臺亭以備遊觀神武尖山在朔州即武州山之別峯也賀拔氏宗族居於此元姬山在朔州後魏道武侍姬李姓善謳卒葬此山故名牟那山在朔州北三百里隋大同城舊墟在此山近有耳觜城及秦長城天德山在朔州北漢李陵自居延行至天德山遼太祖平黨項遂破天德掠吏民以東皆此地來山在朔州北三百四十里遼主天祚避女真奔夾山即此洪濤山在馬邑縣西北一十里一名纍頭山灅水出焉俗名洪濤泉山下有桑乾河神廟碑刻具存紫金山在馬邑縣南髙二十里連亘數百里九宫山在蔚州東三十里金章宗曽避暑於此因號九宫山有九宫口過通易州金置巡檢司過東有永寧等口五臺山在蔚州東三十里峯巒秀出上有金河等十餘寺詳見太原府玉屏山在蔚州西北六十里西接襄山金李純甫自號玉屏山主髙是山在蔚州西北七十里滋水出焉其東三十八里有枚回嶺山麓相接倒刺山在蔚州東七十里一名雪山俗傳靈仙所居襄山在蔚州北八十里西接應州千夫山在廣靈縣西北五里相傳前代遣千人取花斑石祭禱而後取今神祠尚在縣民祈福於此加斗山在廣靈縣東南十五里上有圮城形迹猶存天井山在廣靈縣西南二十里有天井寺故址寺有井深五六尺雖旱不竭舊嘗引此水入厨九層山在廣靈縣北二十五里山出花斑石香山在廣昌縣西南一十里上有古寺松柏蔥鬱號為勝境白石山在廣昌縣東南三十里山多白石有白石口路通保定府唐縣過東冇浮圖峪口太白山在靈邱縣南一十里山有鍾乳穴穴中乳滴如懸穗然隘門山在靈邱縣東南二十里壁立直上極險隘後魏於此置義倉宋設關防以譏禁行旅玉華峯在渾源州南峯巒秀麗形如削玉故名雙化嶺在府城西三十里盤踞百有餘里嶺西有古寺遺迹世傳有二僧共化於此故名本朝王達善詩樺樹亭亭立澗隈兩僧遺迹已來成灰夜深風響崖前葉疑是雙笻步月牛皮嶺在府城東六十里有牛皮關黃花嶺在山陰縣北四十里太和嶺在馬邑縣東南六十里嶺北口西山上有佳吉寨雕窩崖在廣昌縣東六十里舊有銀洞今塞奄遏下水海在府城西北二百里水潮無常納大􅚡小􅚡大滙小滙四河及銀海水諸細流海子在懷仁縣東一十五里周回三十里其西北有泉深不可測遇旱禱雨輒應黃河北自古東勝州界而來歷廢武州西北二百五十里南流入太原府保德州界桑乾河在府城南六十里源出馬邑縣北洪濤山下與金龍池水合流東南入盧溝河金河在古雲內州東南一百五十里西流入天瑞泊其泥色紫故名紫河自古豐州西北黑峪口發源西流至雲內州東合黑河黑河在府城西北四百里古豐州界源出官山西流入雲內州界至東勝州入黃河又有大鹽沒越二濼俱在豐州界灰河在朔州南三里源出寧武軍山口北流至洪崖村伏流十五六里南出經城南至馬邑入桑乾河嘔夷河在蔚州境寰宇記出靈邱縣西北髙是山周職方曰并州川曰嘔夷謂此今名唐河葫蘆河在蔚州城北其水上槽狹下流濶有似葫蘆然發源自廣靈縣豐水而來下流入安定縣西界武州川俗曰合河出武州山西白羊山溪谷中流至府城南十五里東南流注如渾水渾源川在渾源州西南源出嘆士峪分流至州西北滙為大澤西流入神溪溪中有孤石方一畝髙一丈餘上有律吕神祠祠下水曲折而西北入桑乾河崞川在渾源州東北發源至應州西安鎮折而北流注桑乾河居延川在朔州北雲內州境一名居延澤漢蘇武嘗困於此澤如渾水一名街河其水雨源合為一歷府城東而南流與武州川水會注桑乾河御水在府城東上有石橋橋下有金大定中所立邊元忠