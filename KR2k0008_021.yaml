中大同府學教授軌範嚴肅士子多所造就省志雷縉正統中為大同府通判以均徭興學著績受敕推封省志耿信正統中知蔚州以治行稱考績升慶陽知府省志桂琳天順中廣靈知縣有惠政及去民塞道攀留省志王越天順末巡撫大同修築諸邊城堡邊防賴以永固省志流寓朱辨宋徽州人建炎初借吉州團練使使金以通問兩宫至雲中見尼瑪哈説甚切及言用兵講和利害甚悉尼瑪哈不聽使就館守之以兵乂迫仕劉豫不屈紹興中和議成得歸有聘遊集四卷髙瑛臨海人正統間隨父謫寓大同尋舉山西鄉試登進士第纍官四川按察使省志人物漢范升代郡人九嵗通論語孝經長習梁邱易教授生徒光武徴拜議郎遷博士有大謀議輒見訪問後還鄉里復起為聊城令三國吕布九原人以驍武為并州騎都尉屯河內董卓甚親愛之卓為亂布誅卓以功封溫侯布長御良馬曰赤時人語云馬中有赤人中有吕布後為曹操所害張遼馬邑人有武力漢末并州刺史丁原召為從事後歸曹操文帝立封晉陽侯嘗攻孫權於合肥以步卒八百破敵十萬晉魯勝代郡人元康初為建康令到官著正天論後稱疾去徴辟皆不就其著述多遺失惟著墨辨上下經四篇各有説南北朝衛操代人少通俠有才略晉衛瓘以操為牙門將後歸魏桓帝任以國事始操所與宗室鄉親入國者衛勤衛崇衛清衛沈等皆為桓帝所表授也叔孫建代人魏初賜爵安平公嘗為廣阿鎮將威名甚著太武時纍功封丹陽王建沈敏多智雅尚人倫禮愛賢士鎮平原十餘年南方憚其威略卒諡曰襄燕鳯代人博綜經史明習陰陽讖緯魏昭成待以賓禮拜代王左長史參決國事道武即位歷行臺尚書長孫嵩代人事魏纍著軍功進爵北平王司州中正大武征伐嵩以元老多留鎮京師卒諡曰宣五世孫儉方正有操行仕後周纍官荆州刺史卒諡曰文長孫道生嵩從子忠厚廉謹魏道武使掌機密纍功除司空封上黨王卒諡曰靖道生廉約身為三公而衣不華飾食不兼味曽孫冀歸聰敏有才藝纍官揚州刺史于栗磾代人能左右馳射魏明元時纍遷外都大官平刑折獄甚有聲稱卒贈太尉栗磾自少總戎迄於白首臨事善斷加以謙虛下士其卒也太武甚悼惜之古弼代人少忠謹善騎射仕魏以功賜爵靈夀侯歷位吏部尚書弼雖事務殷湊而讀書不輟口不言禁中事太武嘗曰有臣如此國之寶也伊馛代人少勇健走及奔馬善射力拽牛却行仕魏為侍郎太武欲以為尚書馥辭後賜爵河南公拜司空清約自守為政舉大綱不為苛碎薛彪子代人為魏內行長當官正直獻文時纍官徐州刺史多惠政卒諡曰文子琡形貌瓌偉為典客令宣武謂曰卿風度峻整後何以處官琡答曰宗廟之禮不敢不敬朝廷之事不敢不忠此外非庸臣所及陸俟代人父突以戰功位離石鎮將俟襲父爵太武征赫連昌詔俟督諸軍鎮以備蠕蠕拜翼州刺史治為第一後封東平王卒諡曰成子馛有父風賜爵為聊城侯陸凱俟孫謹重好學仕魏為給事黃門侍郎以忠厚見稱出為正平太守號為良吏卒諡曰惠二子暐恭之並有時譽俟十世孫卬博覽羣書纍官中書侍郎卭子又博學有文才待詔文林館于什門代人魏明元時使喻馮跋聲氣厲然被拘留衣裳敗壞跋遺以衣服拒不受歷二十四年後馮宏上表稱臣乃送什門歸拜侍御史太武褒美比之蘇武朱長生代人魏孝文時為員外散騎常侍與同郡于提俱使髙車其王阿伏至羅以兵脅之降長生與提厲聲曰我為魏鬼不為汝臣拘三嵗始放還孝文以其守節拜長生河內太守提隴西太守並賜男爵尉元代人魏太和初為內都大官既而出為鎮西大將軍開府統萬鎮都將甚得夷人心進爵淮陽侯後進位司徒孝文時拜為三老獨孤信雲中人美容儀善騎射從西魏孝武八關纍官大宗伯封魏國公信雅有竒謀大略為時所重其三女一為周明帝后一為隋文帝后一為唐髙祖母樊子鵠平城人初為晉州刺史纍官封西陽郡公兼尚書左僕射東南道行臺都總管為髙歡所害張綦平城人北齊時參丞相軍事為行臺右丞終護軍將軍北史論曰有齊之良臣也張華原平城人少明敏有器度仕北齊歷官兖州刺史獄有罪徒數十給假歸依期畢至州境猛獸為暴忽有大駮食之人咸以為化感所致及卒州人號慕為樹碑立祠賀拔允尖山人北齊神武與參定大䇿纍官領尚書令進爵為王弟拔嶽少有大志能左右馳射驍果絶人與兄勝俱鎮恆州纍功遷左廂大都督斛律金朔州􅎁部人性敦直善騎射行兵用胸奴法仕至汾州刺史北齊時以功封咸陽郡王卒諡曰武子光襲爵忠勇有謀纍封清河郡公為祖挺譛死後周武帝入齊指光名曰此人在朕安得至此于謹粟磾子仕周纍官大都督封燕國公謹位重謙抑功臣中始終無間保定中以為三老固辭卒諡曰文次子翼仕周為渭州刺史其兄實先蒞此州有惠政翼又推誠布信逺近咸悅比之大小馮君翼弟義歷數州刺史尉遲迥代人有大志好施愛士仕周封西都侯任兼文武頗允時望周文命率兵取蜀以為益州刺史綏輯新邦夷人懷而歸之後為相州總管隋于仲文謹孫初仕周為東郡太守尉遲逈作亂誘仲文不從奔隋進位大將軍煬帝時掌文武選事嘗撰漢書刋繁并略覽各三十卷房兆代人剛毅有武略開皇中為邊將名顯當時嘗為行軍總管擊胡以功官至柱國徐州總管杜彥雲中人性勇果善騎射初仕周以功拜隴州刺史隋初封公與韓擒虎平陳進位柱國賜其子寶安爵昌陽縣公大業中以彥素為突厥所憚拜雲州總管唐尉遲恭朔州鄯陽人隋末歸唐從討竇建德王世充劉黑闥等戰功居多恭善避矟每單騎入賊羣刺之不能傷以功纍封鄂國公侯仲莊蔚州人為定武將軍擒安太清有功纍封冠軍將軍僕固懷恩叛仲莊訓兵自守德宗幸奉天遷左衛將軍留鎮奉天者幾二十年五代周德威馬邑人勇而多智望塵知敵數唐莊宗時纍官至平章事盧龍軍節度使後與梁軍戰死郭崇韜代人明敏有才幹唐莊宗朝為樞密使莊宗嘗問曰昔吾與梁對戰河上雖盛暑被甲不以為勞今居深宫不勝其熱何也崇韜對曰陛下昔以天下為心今以一身為意願常如河上則可使煩暑坐變清涼莊宗默然尋為招討使平蜀以讒見殺安重誨應州人唐明宗時官至中書令時有獻嘉禾及白鸞白者皆却而不獻務盡忠補過人皆稱焉安重榮朔州人善騎射晉髙祖即位拜成德軍節度使重榮雖武夫而曉吏事時髙祖與契丹約為父子重榮以謂詘中國以尊夷狄此萬世之恥也折從阮雲中人世為大族仕後唐為府州刺史歷周漢為永安宣義保義靜難四鎮節度卒贈中書令子德扆為周永安軍節度使甚得蕃情周密應州神武川人事晉歷鄜延晉三鎮節度事周初以太子太師致仕子廣仕周纍功為眉州刺史入宋從征太原纍遷右屯衛大將軍史彥超雲中人後周為虎捷都指揮使與敵戰陷陳先登以功拜感德軍節度使後以戰沒郭崇應州金城人重厚寡言有方略初仕後唐為應州都校晉割應州入契丹崇恥事之遂南歸後仕周以功纍遷侍中兼中書令其次子允恭女為宋仁宗后宋陸萬友靈邱人仕周纍官安州防禦使宋討江南造舟采石磯以濟師命萬友守之江南平為和州防禦使終河陰兵馬都監萬友始業圬鏝既貴達以銀為圬鏝器示子孫李漢超雲中人仕周為殿前都虞侯宋初為齊州防禦使在郡有善政吏民愛之太宗時遷應州觀察使漢超善撫士卒沒之日軍中殞涕折御勳從元孫德扆子初權知府州事太祖以為永安軍留後開寶初改秦寧軍節度使弟御卿嗣知府州從太祖征河東拜永安軍節度使嘗大敗契丹後契丹來侵御卿力疾出戰卒於軍黨進馬邑人開寶中從征太原以功歷官至中武軍節度卒贈侍中進形貌魁岸每環甲胄毛髮皆竪宋制掌禁兵者悉書其數於挺上記焉太祖問進所掌幾何進不識字但舉挺以示曰盡在是矣上以其朴直益厚之李重誨金城人初仕契丹潘美與戰重誨被擒太宗召見補鄧州都指揮使雍熙初為欣州都巡檢緣邊十八寨招安制置使弟重睿歷官鄧州團練使折惟昌御勳從子父卿卿卒以兄惟正知府州事惟正歸朝惟昌繼之趙保吉冦麟州弟惟信戰死惟昌中流矢突圍出再與戰敗之纍遷興州刺史弟惟忠嗣知府州纍遷雲麾將軍畢士安雲中人乾德中進士纍官參知政事進同平章事真宗時與冦凖同決策北伐却契丹於澶淵平生以名節自勵天下稱其清子世長慶長皆仕於時曽孫仲衍仲遊仲愈尤著時名折繼閔惟昌弟惟忠子嗣兄繼宣知府州事慶厯中趙元昊攻府州繼閔固守拒之弟繼祖嗣知州事奏乞書籍仁宗賜以九經後加解州防禦使折克行繼閔子嗣知府州善附士卒每戰必勝夏人畏之在邊三十年戰功最多官至秦州觀察使卒子可大嗣知府州事折可適克行從子馳射不習而能從种諤出塞屢敗夏人嘗圍夏靈州有功纍遷武安軍節度觀察留後後知渭州子彥質紹興中官至僉書樞密院事姚兕五原人父寶戰死定川兕力學兵法為環慶巡檢屢敗夏人擒鬼章積官至通州團練使兕幼失父事母孝凡圖畫器用皆刻仇讐未報字弟麟亦有威名纍官至定武軍節度時號二姚姚雄兕子少勇鷙有謀佐父征伐立功歷知岷會河熙州遷至武康節度使卒諡武憲弟古亦以邊功纍官熙河路經略靖康中總兵援太原與金人戰种師中敗死古兵潰詔安置廣州遼陳昭衮雲中人勇而善射為敦睦宫太保遼帝嘗射虎虎怒奮左右辟易衮捨馬捉虎兩耳騎之虎駭且逸昭衮終不墮地伺便拔佩刀殺之帝慰勞燕賞纍遷歸義軍節度使邢抱朴應州人父簡刑部郎中抱朴好學博古與弟抱質俱受經於母陳氏保寧中抱朴纍官翰林學士承旨參知政事嘗按察諸道黜陟守令大協人望官至南院樞密使抱質亦官至侍中金劉撝渾源人舉進士仕至石州刺史自號南山翁其所著賦為時楷範子汲亦舉進士為翰林供奉自號西巖老人有文集曾孫從益舉進士為監察御史後為葉縣令有古良吏風虞仲文武州寧逺人仕遼為相後歸金為平章政事封秦國公程震東勝人與其兄鼎俱擢第興定初震為陳留令治為河南第一召拜監察御史剛直有材幹忘身徇國及為御史臺綱大振王元節宏州人祖山甫父詡皆仕遼元節天德初進士雅尚氣節仕為密州判官既罷即以詩酒自娛號曰遁齋弟元德亦登進士為南京提刑使有能名孫國綱纍官監察御史雷思渾源人舉進士纍官大理寺持法寬平後同知北京轉運使事嘗注易有易解子淵至寧初進士甲科纍官翰林修撰為文喜新竒嘗以御史循行河南豪猾望風遁去程輝蔚州靈仙人皇統初進士纍官磁州刺史户部尚書大定末拜參知政事多所建明卒諡忠簡輝性倜儻敢言喜雜學尤好論醫云楊伯通宏州人大定初進士歷官吏户二部尚書承安初拜參知政事御史路鐸劾其引用鄉人詔同知大興府事賈鉉詰之鉉奏所劾不當乃責鐸而慰諭伯通以尚書左丞致仕康公弼應州人中進士第纍官至乾州節度使卒贈侍中封道國公諡忠肅李完馬邑人以經童出身復登詞賦進士第纍官至南京路按察使長於吏治所至姦惡屏迹民皆便之康元弼雲中人幼敏學善屬文登正隆初進士第纍官至尚書刑部侍郎兼惲王傅遷南京路轉運使致仕蘇保衡渾源人纍官至參知政事進右丞以疾致仕素忠直為其主所稱楊沃衍朔州靜邊人少嘗為北邊屯田小吏宣宗南遷用為武州刺史纍官元帥左監軍中京留守與烏庫哩哈勒罕死節田琢定安人明昌進士調寧邊茌平主簿纍官至山南東路轉運使權知益都府事行六部尚書宣差便益招撫使卒于兵髙汝勵金城人大定中進士為石州刺史蒞官有能聲相宣宗十年才量渾厚慎密亷潔號為良相卒追封榮國公元趙瑨蔚州人自幼不羈習武事事太祖以功授冀州行軍都元帥瑨讓其兄圭改授軍民總管纍遷河南道提刑按察使卒追封定國公諡襄穆子秉溫受學劉秉忠纍官昭文館大學士孟攀鱗雲內人幼時日誦萬言時號竒童金大定中進士元授翰林待制嘗陳七十事世祖悉嘉納之卒追封平原郡公諡文定楊惟中宏州人知讀書有膽略事太宗奉使西域三十餘國宣暢國威歸從伐宋凡得名士數十人收伊洛諸書送燕都建太極書院延儒講授慨然欲以道濟天下拜中書令纍遷江淮京湖宣撫使卒諡忠肅魏璠宏州順聖人金進士補尚書省令使宣宗求直言璠首論將相非人授翰林修撰使武仙比還金已亡璠還鄉里元世祖徵璠訪以當世之務璠條陳三十餘事舉名士六十餘人以疾卒於和林賜諡靖肅髙定渾源人好學敦信尚氣節仕為雲中招討使都元帥永安軍節度使定謂諸子曰吾蒙國思致位侯伯布衣之極曷敢久貪爵寵乎遂致仕而去孫公亮渾源人世業造甲元初授諸路工匠總管公亮少有志練習國興後拜監察御史纍官江西等處行工部尚書致仕趙世延雲中人究心儒者之學世祖時為監察御史劾丞相僧格後纍遷翰林學士承旨加奎章閣大學士中書平章政事預纂修經世大典封魯國公世延揚歷省臺五十餘年卒諡文忠崔斌馬邑人魁岸雄偉善騎射尤工文學而達政術世祖時纍官江淮行省左丞危言讜論無有所諱嘗行省湖南潭人為立生祠及卒追封鄭國公諡忠毅崔彧宏州人剛直敢言世祖器重之纍官御史中丞刑部尚書上疏言時政多見施行成宗時官至平章政事卒追封鄭國公諡忠肅程思廉東勝人父恆解州鹽使思亷至元中為監察御史劾權臣阿哈瑪特繫獄後為雲南行臺御史中丞思亷纍任風憲剛正疾惡好薦達人物或以為好名思廉曰若避好名之譏人不復敢為善矣卒諡敬肅雷膺思孫淵子幼孤篤學以文章稱中統初為監察御史首以正君心正朝廷百官為言纍遷至江南浙西道按察使致仕徴拜集賢學士卒諡文穆趙璧懷仁人世祖為王時召見命習國語譯大學衍義時聽陳説辭旨明貫憲宗朝纍官河南經略使中統間拜平章政事卒諡忠亮謝仲溫豐州人略涉書史見世祖於野狐嶺命備宿衛中統間擢平陽太原兩路宣撫使遷順德路總管歷湖南淮東宣慰使所至有政績魏初璠從孫以為後好讀書為文簡而有法中統間拜國史院編修官擢監察御史疏時政帝欣納之官至南臺御史中丞子必復集賢侍講學士吳明大同人纍官國子助教嘗獻定本萬言䇿今行於世吳思達蔚州人仕為開平主簿兄弟六人嘗以父命析居延祐間父卒治葬畢泣告其母曰吾兄弟别處十餘年今多破産以一母所生忍使苦樂不均耶即以家財代償其逋更復共居事聞表其閭賈進大同人大德中地震居民多傷且乏食進給酒藥炭米濟之每嵗冬製木綿裘數百襲衣寒者買地為義阡使無墓者葬之有司以聞旌其門張文顯懷仁人至正間纍官吏部尚書李伯述應州人至正間為河南省左丞卒於兵追封魏國公諡忠愍本朝田炯大同人洪武中由太學生歷職勤慎官至吏部左侍郎曹得懷仁人由燕山左護衛總旗從平內難攻城破敵率勇鋭前奮以一當百纍升中軍都督同知守德州為人謹實御下不苛王孜蔚州人永樂中由太學生擢户部主事􅊩事勤能官至通政司右通政李彞渾源人永樂中由舉人擢監察御史才名著稱尋升江西按察使治獄平恕秩滿以績最升浙江左布政使卒于官武達大同縣人永樂中鄉舉擢吏科給事中以才職老成薦升浙江布政使參議有惠政及民尋遷廣西參政致仕卒石應州人宣德末進士授禮科給事中仕至禮部尚書省志宋弼蔚州人正統戊辰進士以南京户部員外致仕子經成化己丑亦第進士官御史有直聲省志焦鑑大同人充府學生父喪廬墓成化六年旌為孝子省志列女班氏大同人宋堅童妻堅童死班氏不忍獨生以死從夫事聞宋朝褒表之田氏渾源知州劉仲亨妻生一子彬年七嵗至正間仲亨卒田氏年未三旬遂自經喪側事聞旌表其門華氏大同人張思孝妻元季為貊髙兵所執以不受辱見殺其婦劉氏僵壓姑尸大罵不已兵併殺之後家人驗其尸婦始之手猶相持不捨劉氏靈丘人張文德妻年二十五而夫歿子政賢甫一嵗劉矢志守節撫子有立洪武十八年旌異焉省志楊氏大同左衛指揮使范安妾居常克敦婦道宣德中夫陳亡楊即自諡以殉家人止之不從竟潛自縊死事聞詔贈淑人省志吳氏大同人王玘妻玘卒吳年二十六養舅姑無違禮育遺孤令就學中永樂庚子鄉舉正統間旌表其門省志柳氏蔚州人王福海妻夫歿柳年二十七子僅二嵗柳勤女紅以育幼守節無玷天順初旌表其門省志焦氏大同人齊景才妻年二十四夫亡子幼守節不渝成化六年旌表其門省志仙釋李溥光大同人號雪菴幼為僧讀書工詩善書法一時宫城殿宇扁額皆出其手元授昭文館大學士有雪菴長語大字書法行於世潞安府東至河南彰德府林縣界一百七十里西至平陽府嶽陽縣界一百五十里南至澤州髙平縣界七十五里北至遼州界二百里自府治至京師一千三百里至南京二千二百六十里糧二十萬三千八百石零建置沿革禹貢冀州之域天文參井分野商時為黎國書曰西伯戡黎即此後為赤狄潞子國晉滅潞子嬰兒復立黎國戰國初為韓之別都後屬趙秦置上黨郡治長子晉徙治潞縣後周始置潞州領上黨襄垣二郡隋初郡廢大業初改州為上黨郡併置上黨縣唐復為潞州天寶初改上黨郡乾元初復為潞州後置昭義軍節度屬河東道五代時梁改匡義軍唐改安義軍晉復昭義軍宋改昭德軍後升為隆德府