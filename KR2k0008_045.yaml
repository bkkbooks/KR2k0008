body:
  text: 明一統志卷四十五明李賢等撰紹興府東至寧波府慈溪縣界二百里西至杭州府富陽縣界一百三十五里南至金華府東陽縣界二百五十里北至海口三十里自府治至南京一千二百一十三里至京師四千六百五十八里糧三十三萬八千九百石零建置沿革禹貢揚州之域天文牛女分野禹㑹諸侯於此計功命曰㑹稽少康封少子無餘於㑹稽以奉禹祀號曰於越春秋戰國時為越國後為楚所併秦滅楚置㑹稽郡治於吳此地屬焉東漢順帝時始以吳置吳郡而徙㑹稽郡治山隂晉為㑹稽國咸和中改㑹為鄶劉宋置東揚州領㑹稽等五郡隋初郡廢改東揚為吳州治㑹稽縣大業初改越州尋為㑹稽郡唐初復置越州天寶初改㑹稽郡乾元初復為越州置浙東觀察使治於越廣明初升義勝軍乾寧中改鎮東軍五代錢氏以越為東都宋仍為越州紹興初始升紹興府元改紹興路本朝復為紹興府領縣八山陰縣附郭本越王勾踐國秦置山陰縣屬㑹稽郡以邑在山之陰故名漢為郡都尉治東漢徙㑹稽郡治此隋初廢入㑹稽縣唐初復置宋元仍舊本朝因之編户二百一十里㑹稽縣附郭本秦山陰縣地漢晉以後因之陳析置㑹稽縣隋以山陰縣省入唐復置山陰縣屬越州宋會稽與山陰二縣並治郭下元仍舊本朝因之編户二百二十一里蕭山縣在府城西北九十三里本漢㑹稽郡餘暨縣孫吳改永興縣隋省入㑹稽郡唐儀鳯初復置天寶初改蕭山縣宋元仍舊本朝因之編户一百四十里諸暨縣在府城南一百二十里本越王允常所都地秦置諸暨縣屬㑹稽郡漢以後皆因之隋唐皆屬越州宋初析置義安縣後復省入諸暨元升為諸暨州本朝初為諸全州尋復改諸暨縣編户一百五十里餘姚縣在府城東一百八十里舜後支庶所封以舜姓姚故名秦為縣屬㑹稽郡漢晉以後皆因之隋初省入句章縣唐初復置又於縣置姚州尋廢州以縣屬越州宋仍舊元升為餘姚州本朝復改為縣編户二百四十六里上虞縣在府城東一百二十里舜封支庶於會稽故邑有上虞秦為縣屬㑹稽郡東漢順帝時分置始寧縣隋初以上虞始寧二縣廢入㑹稽縣唐貞元初復置上虞縣屬越州宋元仍舊本朝因之編户一百二十八里嵊縣在府城東南一百八十里本漢剡縣地屬㑹稽郡唐初置嵊州并析置剡城縣後州廢仍為剡縣屬越州宋改為嵊縣取四山為嵊之義元仍舊本朝因之編户八十二里新昌縣在府城東南二百二十里本漢剡之東鄙五代梁開平中吳越王始析十三鄉為新昌縣治石牛鎮宋元仍舊本朝因之編户三十里郡名會稽東漢名東揚劉宋名形勝會稽佳山水晉史千巖競秀萬壑爭流宋顧凱之傳膏腴土地宋書帶海傍湖良疇數千萬頃膏腴土地畝直一金浙東勝處郡志鑑水環其前卧龍擁其後稽山出其東秦望直其南自浙以東最為勝處襟海帶江為東南一大都會圖經東南山水越為首剡為靣沃洲天姥為眉目唐白樂天沃洲山真覺寺記勝遊珍觀宋秦觀倡和集序會稽為鎮豈惟山川形勢之勝其勝逰珍觀相望乎楓柟竹箭之上枕𢃄乎荇藻芙蕖之濵亦非他州所及風俗以舟楫為車馬越絶書民性敏柔而慧宋書食物常足漢志火耕水耨民食魚稻果蓏螺蛉食物常足俗重犯法郡志有陂湖灌溉之利故歲多順成有絲布魚鹽之饒故俗重犯法不以奢侈華麗為事㑹稽志商賈工作之徒皆著本業不以奢侈華麗為事士好學篤志敦師擇友郡志山川卧龍山在府城內盤繞回抱如卧龍形越大夫種葬此故又名種山宋蘇軾詩卧龍蟠屈半東州萬室鱗鱗枕其股龜山在府治東南二里一名飛來山又名寶林山唐徐季海詩兹山昔飛來逺自琅琊臺孤岫龜形在深泉鰻井開唐方干詩邃巖喬木夏藏寒床下雲溪枕上看臺殿漸多山更重却令飛去即應難蕺山在府治東北六里吳越春秋越王嗜蕺常採食之因以名山晉王羲之居於此遇老姥持扇賣羲之為題其扇人競買去他日姥又持扇求書羲之笑而不答即此處火珠山在府治東按察分司後上有稽山堂尚存蛾眉山在府治東狀如眉黛因名彭山在府治東北舊經昔彭祖隱居之地陳音山在府城西南四里舊經越范蠡進善射者楚人陳音於王王使音教士習射三月軍士皆能用弓弩之巧死葬於此因名侯山在府城西南四里逈在湖中亦名九里山土城山在府城東六里吳越春秋越王使相者求美女於國中得之苧蘿山採薪之女曰西施鄭旦飾以羅縠教以行步習于土城教於都巷三年而獻吳王一名西施山葛山在府城東一十里勾踐種葛於此使一女治布獻吳王棌葛人歌曰嘗膽不苦味若飴令我採葛以作絲少微山在府城東一十二里宋職方郎齊唐晚年居此為山水竒觀華鎮詩湖邊一點翠光稀人指齊家舊少微㑹稽山在府城東南一十二里揚州之鎮山也史記注禹到大越上苖山爵有德封有功更名會稽越絶書勾踐與吳戰大敗以甲楯五千棲於其中山海經曰㑹稽山上多金玉下多瑛石白玉上經云山周回三百五十里有陽明洞一名極𤣥太元之天即三十六洞天之第十一也石帆山在府城東一十五里遙望如張帆臨水唐宋之問詩石帆來海上天鏡出湖中射的山在府城南一十五里山半有石室乃仙人射堂東峯有射的遙望山壁有白點如射侯諺云射的白米斛百射的𤣥米斛千宛委山在府城東南一十五里遁甲開山圖禹開宛委山得赤圭如日碧圭如月長一尺二寸石匱山在府城東南一十五里山形如匱相傳禹治水畢藏書於此麻林山在府城西南一十五里越絶書一名多山昔勾踐伐吳種麻以為弓弦使齊人守之越謂齊人曰多故名梅里尖山在府城西南一十五里後有梅仙塢相傳梅子真居此白鶴山在府城南一十六里一名箭羽山漢鄭𢎞微時採薪得仙人遺箭於此詳見樵風涇法華山在府城西南二十五里山有十峯其下有雙澗唐李紳詩十峯掛碧落雙澗縈清漣外山在府城西三十里寶山在府城東南三十里一名上臯山宋攢宫在此雲門山在府城南三十里晉王獻之居此舊有子敬山亭永禪師臨書閣久廢元白雲有自靈峯入雲門記赤堇山在府城東三十里一名鑄浦山歐冶子為越王鑄劍之地越絶書赤堇山破而出錫若耶溪涸而出銅獨婦山在府城西北三十五里越絶書勾踐將伐吳置婦人於山上以邀軍士又舊經山自蜀飛來帶兒婦二十餘人善織美錦自言家在西蜀故一名蜀阜山秦望山在府城東南四十里為衆峯之傑史記始皇嘗登此以望東海因名唐李白詩東海橫秦望西陵拱越臺湖清霜鏡曉濤白雪山來若耶山在府城東南四十五里舊經葛𤣥學道於此塗山在府城西北四十五里舊經禹㑹萬國之所又鳳陽重慶皆有塗山稷山在府城東五十里越絶云稷山者勾踐濟戎臺舊經越王種菜於此銅牛山在府城東南五十八里舊經昔冇銅牛見於靈泛橋人逐之奔入此山掘地得銅屑或云越王鑄錢處穀米山在府城東南七十里十道志舜嘗耕於此天降嘉穀故名刻石山在府城西南七十里一名鵝鼻自諸暨入㑹稽此山最髙秦始皇刻石頌德其上越王山在府城西北一百二十里昔越王棲兵於此上有走馬岡伏兵路洗馬池支更樓故址蕭山在蕭山縣治西漢書注云潘水所出東入海晉許詢嘗登此山憑林築室蕭然自放一名蕭然山去虎山在蕭山縣北五里山有猛虎常傷人一夕負子渡江西去宋令杜守一因名其山城山在蕭山縣西九里吳王闔閭侵越勾踐保此山山麓有泉多産嘉魚王意其乏水以鹽米來餽越取雙鯉報之吳兵夜遁即此處宋華鎮詩兵家制勝舊多門贈答雍容亦解紛緩報一雙文錦鯉坐歸十萬水犀軍翠璋山在蕭山縣西二十五里一名夏駕山舊經山出苮草織為席甚細密洛思山在蕭山縣東四十三里㑹稽志漢洛下人隨朱雋來㑹稽三年不得還乃登山北顧而嘆故名峽山在蕭山縣南六十里其山八靣皆向江有雞籠石紅影略如雞形俗云金雞影山鳯凰山在蕭山縣西南七十里山形如鳯龍門山在蕭山縣西南七十里兩山對峙上有龍湫元張庭蘭詩何年鑿此混沌胎赤鯉躍出龍門開千尺髙崖宿牛斗一泓碧水藏風雷歊陽六月焦下土河伯飛來共龍語願將一滴㵼天瓢明日人間三尺雨佳山在蕭山縣西南八十里張庭蘭詩㑹稽之山天下無宛如碧海浮蓬壺佳山一朵更竒絶半空湧出青芙蕖長山在諸暨縣治山頂平博有石室可坐百人苧蘿山在諸暨縣南五里下有方石舊經西施曬紗處烏帶山在諸暨縣北四十五里一名烏笪山出紫石英晉謝敷居此夜夢神人語曰當以珍寶相贈至明視床下有異石而瑩乃紫石英也勾乘山在諸暨縣南五十里國語越臣於吳吳更封越南至勾乘即此五泄山在諸暨縣西五十里上有泉水飛沫如雪沿歷五級下注溪壑俗名小鴈蕩祕圖山在餘姚縣治北舊經上有石匱夏禹藏靈祕圖之所元劉仁本於此作續蘭亭㑹龍泉山在餘姚縣治西一名靈緒山姚江繞其南山趾有泉未嘗竭唐方干詩未明先見海底日良久逺雞方報晨古樹含風常帶雨寒巖四月始知春中天氣爽星河近下界時豐雷雨均前後登臨思無盡年年改換往來人羅壁山在餘姚縣南一十八里山有漢虞國墅襟帶溪山巖谷大勢具體金谷晉郗愔為會稽內史因卜居焉宋華鎮詩郗家池館雖蕪沒金谷形容宛自然歷山在餘姚縣北四十里按史記注歷山在河東今越有歷山舜井象田者蓋餘姚舜支庶所封其子孫思舜之鄉取象於此縣又冇姚丘山云舜母握登感虹生舜之地虞山為舜避丹朱之處大抵皆此類姜山在餘姚縣西北五十里上有五峯之勝白水山在餘姚縣南六十里上有瀑布屏風潭三台峯太平山在餘姚縣南七十里山形如傘孔稚圭詩陰澗落春榮寒巖留夏雪客星山在餘姚縣東北舊名陳山漢嚴子陵居此蘭芎山在上虞縣西北二十五里一名蘭風圖經葛洪嘗隱於此有石井汲之不竭東山在上虞縣西南四十五里晉太𫝊謝安居此中丞髙嵩嘗戲安曰卿髙卧東山人言安石不出將如蒼生何蒼生亦將如卿何今絶頂有謝公調馬路白雲明月二亭遺跡又謝靈運嘗於此讀書有石壁精舍檀燕山在上虞縣西南五十里舊經神仙燕集之所絶頂有十二方石悉如坐席行列覆巵山在上虞縣南五十里與太平山相連宋謝靈運嘗登此山飲罷覆巵山上今存一石竅大旱不涸呼為龍眠窟剡山在嵊縣治西始皇東遊使人鑿此山以泄王氣一名鹿胎山昔有獵士陳惠度射鹿此山鹿孕而傷既産以舌䑛子乾而母死惠度遂投寺為僧後鹿死處生草名曰鹿胎草餘糧山在嵊縣北一十五里一名了山山産禹餘糧石下有了溪嶀山在嵊縣北四十里兩岸峻絶臨水最為竒勝王元琳謂嶀山及嵊山皆謂之神明境宋王十朋有賦嵊山在嵊縣東北四十五里水經帶山臨江松嶺森翠石門山在嵊縣北五十里宋謝靈運詩躋險築幽居披雲卧石門太白山在嵊縣西六十里山極髙峻吐雲含景與小白山接乃魏末趙廣信錬丹登仙之處俗稱西白山丹池山在嵊縣東七十二里舊名桐柏山上有金庭洞道書以為第二十七洞天下有丹池赤水唐天寶六載改今名宋晏殊類要越有桐柏之金庭養真之福地南明山在新昌縣治南俗稱槖駝卸寶山又名石城山晉支遁葬於此南巖山在新昌縣西南二十里宋張浚祖印院記大禹治水東注積沙成巖是為海門即此山也世傳任公子釣魚處莊子所謂任公子以五十犗為餌蹲於㑹稽投竿東海是也又㑹稽縣亦有任公子釣臺沃洲山在新昌縣東三十五里與天姥對峙道書以為第十五福地晋支遁居之有養馬坡放鶴亭唐劉文房詩莫買沃洲山時人已知處天姥山在新