治南等慈寺在上虞縣治東智度寺在諸暨縣北二里以上三寺皆宋時建實性寺在嵊縣西舊名實性院長春觀在㑹稽縣治東陳永定中建元賜今名金庭觀在嵊縣東南七十二里相傳晋王羲之讀書樓捨為觀唐賜名金庭洞天千秋鴻禧觀在㑹稽縣治東北三里即唐賀知章宅置為觀名千秋宋改今名為祠官典領之地前有鑑湖一曲亭懷賀亭廣福觀在餘姚縣東乾明觀在諸暨縣南三十里二觀俱宋紹興中建明德觀在上虞縣東二里宋嘉定中建龍瑞宫在府城東南二十里道家謂黃帝時嘗建候神館於此有龍瑞壇唐建龍瑞宫祠廟南鎮廟在府城南一十三里祀南鎮會稽山之神周禮職方氏揚州鎮山曰㑹稽自唐至元皆封神以爵號本朝革去封號載在祀典詳見山東濟南府東嶽廟禹廟在㑹稽山禹陵側越絶書夏少康立祠於禹陵宋紹興間廟前一夕忽光熖閃爍即其處斸之得古圭璧珮環藏於廟然今所存非其真矣本朝祀典有祭馬臻廟在府城東南三里祀漢太守馬臻以其開創鏡湖有功及民劉寵廟在蕭山縣東祀漢郡守劉寵冇司春秋致祭曹娥廟在府城東七十二里漢元嘉中建邯鄲子作碑文蔡雍題云黃絹幼婦外孫韲曰廟側有墓宋治平以來又有孝女朱娥配春秋致祭本朝因之旌忠廟在㑹稽縣治南三里宋髙宗航海越州守臣李鄴以城降巴拜時有衛士唐琦袖石擊巴拜被執巴拜詰之琦曰欲碎爾首死為趙氏鬼耳又大罵鄴遂遇害後帥傅嵩請為立廟賜額旌忠愍孝廟在山陰縣治東祀孝子蔡定宋建炎初定以父革坐法願以身贖吏持不可乃赴河死父得釋守臣請為立廟賜額愍孝王貞婦祠在嵊縣北三十里清風嶺貞婦臨海人事見台州府列女下以上二廟一祠有司俱春秋致祭忠烈祠在餘姚縣南泉山南麓祀本朝贈禮部尚書孫燧嘉志靖二年建省陽明先生祠在餘姚縣龍泉山祀本朝新建伯王公守仁嘉靖十四年建省志陵墓夏禹王陵在㑹稽山禹廟側舊志禹巡狩江南崩而葬焉宋乾德中嘗復㑹稽縣五户奉禹陵禁樵採宋徽宗陵髙宗陵孝宗陵光宗陵寧宗陵理宗陵度宗陵以上諸陵皆在㑹稽縣東南寶山初宋紹興初隆祐太后崩朝議以為今陵寢在河南太后山陵宜名􅑼宫後易􅑼為攢惟孝宗理宗二陵本朝遣官致祭靈文園在山陰縣境漢文帝母薄太后之父㑹稽人卒葬於此追封靈文侯故置園越大夫種墓在山陰縣治南種山越王勾踐既霸范蠡去之大夫文種未能去或譖於王乃賜種劍以死葬於是嚴光墓在餘姚縣東北一十五里虞翻墓在蘿壁山下謝安墓在上虞縣西南四十里王羲之墓在苧蘿山舊志墓碑孫綽文王獻之書謝靈運墓在府城南三十五里賀知章墓在府城東南九里曹娥墓在曹娥廟側墓所有翁仲對峙魏文靖公墓在蕭山縣湘湖山謝遷墓在餘姚縣杏山王陽明墓吕孝子墓在新昌縣杜王山孝子名升古蹟越王城在府城東南一十里越王勾踐棲兵處越絶曰勾踐小城山陰是也吳越春秋勾踐築城已成怪山自至怪山者琅琊海中山也一夕自至故名怪山又蕭山縣西九里亦有越王城嵊州城在嵊縣西南一十五里唐武德四年置八年廢西陵城在蕭山縣西一十二里五代梁乾化初吳越王築宋王安國有送客至西陵詩禹穴在㑹稽山史記太史公上㑹稽探禹穴按舊經穴在龍瑞宫側宋呂祖謙云大石中斷成罅殊不古殆非司馬子長所探也王十朋詩好古貪竒司馬遷胸中史記越山川如今禹穴無尋處洞鎖陽明石一拳窆石在禹陵舊經云禹葬㑹稽山取此石為窆上有古𨽻不可讀今以亭覆之宋魏了翁詩禹穴元從一罅通禹陵元在亂山中飲泉窆石皆如此誤却東遊太史公梅梁在禹廟梁時修廟忽風雨飄一梁至乃梅梁也又按四明圖經鄞縣大梅山頂有梅木伐為㑹稽禹廟之梁張僧繇畫龍於其上夜或風雨飛入鏡湖與龍鬪後人見梁上水淋漓始駭異之以鐡索鎖于柱然今所存乃他木猶絆以鐡索存故事耳雷門即今府城五雲門漢書王尊傳毋持布鼓過雷門㑹稽志雷門上有大鼓圍二丈八尺聲聞洛陽晉孫恩亂軍人砍破有雙鶴飛出後不鳴梅市在府城西三十里相傳以梅福得名陳囂宅在㑹稽縣治東二里漢陳囂與紀伯為鄰伯修藩籬侵其地囂不爭復益地與之伯慙還所侵乃為大路後人刻石號曰義里俗稱長簷街孟嘗宅在上虞縣西南漢合浦太守孟嘗所居今縣東一里有孟宅橋宋華鎮詩溪上還珠太守家小橋斜跨碧流沙春風不共門墻改長與寒泉起浪花王右軍宅在山陰縣治東北六里後為戒珠寺西園在府治西宋郡守蔣堂置中有曲水閣流觴亭荗林亭後人又作望湖樓飛蓋堂漾月堂王公池流杯巖右軍祠修竹塢敷榮門清貞軒蕙風閣列翠亭華星亭小隱園在府城西南鏡湖中四面皆水舊名侯山宋守楊紘始與賔從遊而名之中有勝奕忘歸翠麓三亭及擷芳徑捫蘿磴百花頂山之外有鑑中倒影二亭刻石記之歲久淪於湖矣白塔在府城東四十五里俗號八仙冢魏嵇康過越宿傳舍遇古伶官之魄得廣陵散曲終自指其葬處穴今猶存筆倉在五雲山顯聖寺後晉王獻之筆倉今一眢井耳鳯凰窠在寶山東七里巨石有竅相傳鳯生雛於此今山下有上下鳯凰二村琵琶圻在上虞縣西南四十五里水經圻有古冢墮水甓上有隱起字云筮吉龜凶八百年落江中宋謝靈運取甓詣京咸傳觀焉尚書塢在府城東南三十三里齊孔稚圭之山園今園廢塢存石室在上虞縣南五里室廣數丈髙丈餘相傳葛稚川石室又縣西南八里有石窟五俗云葛仙翁藥臼名宦漢第五倫㑹稽太守躬自斬芻養馬妻執㸑受俸止留一月糧餘以與貧民後召赴闕老少攀車叩馬相呼相隨日行數里張霸㑹稽太守郡中習經以千數道路但聞誦聲不絶馬臻㑹稽太守始開鏡湖周廽二百里溉田九千餘頃至今會稽立廟祀之劉寵㑹稽太守郡中大化徵為將作大匠山陰縣有五六老叟自若耶山谷間出人賫百錢以送寵且曰自明府至狗不夜吠民不見吏寵勞之為人選一錢受之度尚上虞長為政嚴明發姦擲伏吏人謂之神明三國顧雍吳上虞令有治迹孫權領㑹稽太守不之郡以雍行太守事討除冦賊郡界寧靜吏民歸服陸凱吳永興諸暨長所在有政績晉江統山陰令有善政嘗作徙戎論數千言乞杜其萌時不能用紀瞻會稽內史時有詐稱大將軍府符收諸暨令者瞻執使者訊之果伏詐人稱其明諸葛恢會稽太守太興初以政績第一增秩中二千石顔含上虞令簡而有威明而能斷南北朝顧凱之宋山陰令能御繁以約縣用無事盡日垂簾門階間寂自宋世為山陰者莫能尚卞延之宋上虞令有剛氣會稽太守孟顗以令長裁之延之脫幘投地曰我所以屈卿者正為此幘耳今已投之拂衣而去羊𤣥保宋會稽太守廉素寡欲為政雖無殊績而去後常見思江秉之宋山陰令民户三萬政事繁擾秉之御繁以簡常得無事以善政著名劉𤣥明宋山陰令有吏能政為當時第一沈瑀宋餘姚令縣大姓虞氏千萬家請謁如市前後令長莫能絶自瑀到非訟訴無所通以法繩之權右屏跡傅琰宋山陰令嘗有二野父爭雞琰問何以飼雞一人云豆一人云粟破雞得粟罪言豆者其明斷類此沈憲南齊山陰令治聲大振孔稚圭曰沈令斷事皆有天才丘仲孚南齊山隂令居職甚有聲稱百姓謡曰二傅沈劉不如一丘蓋前傳琰父子沈憲劉𤣥明相繼宰山隂並有政績而仲孚皆過之陸慧南齊會稽內史清介正立不雜交遊同郡張緒稱之曰江東裴樂也江革梁行會稽府事人安吏畏百城震恐革素清貧及歸至西陵取石十餘片以鎮舸櫓唐姚崇越州刺史人德其惠政楊於陵浙東觀察使越人饑請出米三十萬石以贍貧李俊開元中為會稽令增修防海塘百餘里以畜水溉田後觀察使皇甫溫縣令李左次又增修之皇甫政貞元初為浙東觀察使置越王山堰以畜泄水利孟簡元和中為浙東觀察使於山隂縣北開新河又於縣西北開運道塘其後陸亘又置新徑斗門元稹浙東觀察使所辟幕職特稱妙選薛戎浙東觀察使先是州觸酒禁者罪死橘未貢先鬻者死戎弛其禁民懷之金堯恭寶厯中為上虞令於縣西北置任嶼湖及黎湖溉田二百餘頃王式浙東觀察使時裘甫亂越州式討擒之甚有威略惠政宋杜守一蕭山令先是縣有虎守一為政二年虎負子渡浙江而去蔣堂知越州鏡湖溉田八百頃食利者萬家多為豪右所據堂奏復之任布知宿州冦凖曰越州有職分田嵗入且厚非亷士莫可豫乃徙布越州至郡以純約自守范仲淹知越州有惠政嘗作清白堂記以見意後去越州人為立祠祀之曾公亮知會稽縣民田鏡湖旁每患潮溢公亮立斗門泄水曹娥江民受其利郭源明知蕭山縣置宿豪於法嫁孤女以禮州守刁景純聞之曰郭蕭山厭民望矣曾鞏嘉祐中通判越州嵗饑度常平不足贍諷富人自實粟視常平價稍增以豫民民得從便受粟不出田里而食有餘王存慶厯中知上虞縣豪姓殺人久莫敢問存至按以州吏受財豪賂他官變其獄存反為罷去張友直仁宗時知越州州民每春斂財大集僧道士女謂之祭天友直下令禁絶取所斂財建學以延諸生趙抃知越州吳越大饑疫抃救荒有方療病埋死而生者以全下令修城使得食其力程師孟知越州為政簡而嚴罪非死者不以屬吏發隱摘伏如神所部肅然越人為立生祠游酢蕭山縣尉嘗受學二程以文行知名近臣薦其賢召為太學録楊時知蕭山縣有惠政民思之不忘陳瓘僉書越州判官守蔡卞察其賢每事加禮而瓘則知其心術常欲遠之屢引疾求歸鄭穆元豐中知越州先是鑑湖旱乾民因田其中延袤百里官籍而稅之既而連年水溢民逋官租積萬緡穆奏免之張詵通判越州民患苦衙前役詵科别人户籍其當役者以差入錢為雇人充皆以為便劉韐知越州鑑湖為民侵耕官因收其租嵗二萬斛後租太重而督索嚴多逃去勒鄰伍取償民告病韐奏蠲之翟汝文知越州奏減本州和預買絹三等以下减半四等以下權罷及身丁錢鹽只令納見直民甚德之綦崇禮知紹興府劉豫導金人入侵揚楚震擾崇禮繕城屬兵簡舟艦以扼海道疚心夙夜殆廢食寢張守髙宗時知紹興府會朝廷遣三使者括諸路財賦所至以鞭撻立威守求入覲為上言之詔追還三使熊克紹興中知諸暨縣越帥課賦頗急諸邑率督趣以應克曰寧吾獲罪不忍困吾民部使芮輝謂克曰曩知子文墨而已今乃見古循吏為表薦之王十朋紹興府簽判既至或以書生易之十朋裁決如神吏姦不行時以四科求士帥王師心謂十朋身兼四者獨以應詔吳芾知紹興府會稽賦重而折色尤甚芾以攢宫在奏免支移折變鑑湖久廢會歲大饑出常平米募饑民浚治之趙鼎知紹興府事恤吏愛民不以故相自奉葉顒紹興中知上虞縣值歲饑白部使者請發常平粟不報顒即發廪賑之新帥令諸邑預納夏租顒以往嵗無秋乞少緩其期帥怒及麥熟顒約民相率輸租反為諸邑最汪綱知紹興府究心便民百廢俱興時稱循吏及卒越人聞之多墮淚王信知紹興府奏免逋官錢築漁浦隄禁民不舉子買學田立義冢山陰境有湖四環皆田歲告潦信創斗門築埧化匯浸為上腴民繪像以祠更其名曰王公湖楊簡乾道中紹興司理犴獄必親臨端默以聽使自吐露公平無陂惟理之從常平使者朱熹薦之改知嵊縣葛邲以觀文殿大學士判紹興府簡稽期會錢穀刑獄必親或問大臣均佚有禮邲曰崇大體而簡細務吾不為也沈作賔通判紹興府帥守丘崈遇僚吏剛嚴作賔從容禆贊每濟以寬後知府事黃震通判紹興府後又提舉浙東常平居官恆末明視事事至立決能鎮安饑民折盜賊萌芽吳潛知紹興府兼浙東安撫使有政績召同知樞密院事常㮊浙東安撫使值水災捐萬楮以賑之又以諸暨被水尤甚給二萬楮付縣折運民食不至乏絶民各祀於家會稽山隂死者暴露與貧無以為殮者造棺以給之元台哈巴哈至元初為紹興路總管革吏弊除沒官牛租行鄉飲酒禮教民興讓越俗大化宋文瓉紹興路總管恩威並施事無不理及去任越人為立去思碑黃溍諸暨州判官巡海官舸例以三載一新費出於官而責足於民有餘則總其事者私焉溍撙節浮蠧以餘錢還民歡呼而去陳思濟同知紹興路總管府事承檄讞獄桐廬有囚嬴瘠將死縱遣還家候期來決囚拜請曰聞公名久矣若不早决恐終不可保為聞其案而釋之貢師泰泰定中紹興路推官邵有疑獄悉為詳讞剖决民自以不寃治行為諸郡第一宇文公諒至順中為餘姚州同知夏不雨禱輒應民頌為别駕雨嘗攝會稽縣申明寃滯所活者衆穆爾古蘇元末紹興路録事司逹嚕噶齊尋遷行臺鎮撫治紹興時盜起浙東西郡縣多殘破獨紹興有保障境內晏然民愛之如父母本朝張熙洪武初紹興知府為政平易百姓宜之時府治公宇及什器不可缺者皆熙所創置人咸稱其恪勤公務唐鐸洪武初紹興知府御下以誠人不能欺時徵賦有非土産者鐸竟奏罷之餘姚上虞二縣爭夏蓋湖水利經嵗不决鐸斷以至公民皆感悅李慶洪武間紹興知府器量宏遠威信兼濟庭無滯獄吏民畏而懷之時照磨侯籥守職清貧每分俸資給幕僚皆知所自勵戴鵬洪武初會稽知縣器度宏深清慎自守時軍駐四明鵬往供餽餉期限嚴急率民步行日晡饑甚從者進餅却不受掬道旁水飲之職滿民不忍其去脫履以為遺跡王宗仁洪武初會稽知縣蒞政亷能吏畏民懷滿去父老擁馬幾不得行崔東洪武初山陰知縣賦均訟簡有治聲民至今思之王谷器洪武間蕭山知縣蒞政明敏長於治才果決如流事無壅滯賈驥洪武間新昌知縣廉謹自守九載滿去民擁道涕泣挽留不已彭誼天順初左調紹興知府民告饑不待請而發倉賑之明年秋民爭委輸嘗均官糧築白馬閘志以障鹵水郡人永賴之省劉希賢𢎞治中由吏員授餘姚主簿性狷介不以家纍自隨遇事顧義可否不拘勢俯仰卒於官縣為殮其喪歸之省志流寓孫統晉太原人與弟綽及從弟盛避亂過江家於會稽統善屬文歷官餘姚令弟綽亦善屬文嘗著天台賦友人范榮期云卿試擲地當作金聲纍遷散騎常侍領著作郎子騰亦博學位至廷尉謝安陽夏人少有重名寓居會稽雖放情丘壑而有公輔之望晉太元中録尚書事進拜太傅卒諡文靖弟萬工言論善屬文纍官豫州刺史萬子韶少有名時謝氏尤彥秀者稱封胡羯末皆其小字也謝石安弟仕晉為將軍征討大都督與兄子𤣥琰破符堅時童謡云誰謂爾堅石打碎後遷尚書令封南康郡公王羲之琅琊臨沂人寓居會稽司徒導之從子父曠淮南太守羲之幼訥於言及長辨贍善書為古今之冠仕至右軍將軍會稽內史子七人其知名者𤣥之凝之徽之操之獻之也戴逵晉譙國人居剡縣性髙潔常以琴書自娛太宰武陵王晞聞其能琴遣人召之逵對使者破琴曰不能為王門伶人太康中纍徵不至子顒亦隱居不仕有髙名嘗述莊周大㫖著通選論孔淳之本魯人居會稽剡縣性好山水每有所遊或旬日忘歸會稽太守苦要之不能致使謂曰茍不入吾郡何為入吾郭淳之笑曰潛逰者不識其水巢棲者非辨其林終不肯往宋元嘉初徵為散騎常侍不就程迥寧陵人靖康之亂徙紹興之餘姚隆典初第進士官至上饒令迥嘗授經學於嘉興聞人茂德嚴陵喻樗所著冇古易章句易傳外編春秋傳顯微例日論語傳孟子章句文史評等書子絢仕為巴陵尉孫仲熊亦有名韓肖胄相州人琦曾孫徽宗時賜同上舍出身建炎初為工部侍郎條奏戰守計千餘言纍遷簽書樞密院事後以資政殿學士知紹興府尋奉祠與其弟膺胄寓居於越事母以孝聞卒諡元穆邵伯正先世汴人宋南渡居楊之髙郵洪武初徙嵊縣伯正由鄉舉為南京户部員外尋謝事歸杜門好書敦族明志宗剡俗為之歸厚省人物漢鄭吉會稽人以卒伍從軍數出西域習外國事宣帝時攻破車師降日逐威振西域纍官衛司馬為西域都護以功封安逺侯嚴光餘姚人少冇髙名與光武同學及帝即位披羊裘釣澤中聘至除諌議大夫不屈去耕於富春山鍾離意山隂人舉孝亷纍官至尚書交址太守張恢坐贓籍其資物詔賜羣臣意得珠璣悉以委地明帝問故曰贓穢之寶誠不敢拜帝嘆曰清乎尚書之言乃更賜以庫錢王充上虞人師事班彪好博覽而不守章句家貧無書嘗遊洛陽書肆閲所賣書一見輒能記憶肅宗時詔公車徵病不行嘗著論衡及飬性書黃昌餘姚人居近學宫遂就經學又曉習文法拜宛令能發奸伏皆稱神明遷蜀郡太守斷理七百餘訟莫不得所密捕盜帥使條諸縣强暴之人姓名居處掩討無有遺脫宿惡大奸皆奔走他境鄭𢎞山陰人舉孝亷纍遷淮隂守春出行早有鹿方道夾轂而行主簿賀曰三公車轓畫鹿明府必為宰相元和初拜太尉孟嘗上虞人少修操行仕為郡功曹辨孝婦之寃後遷合浦太守去珠復還興利革弊人稱神明朱俊上虞人好義輕財鄉閭敬之纍官諫議大夫黃巾起拜為左中郎將與皇甫嵩討平之以功封西鄉侯後拜河南尹董卓議徙都長安俊輒止之卓惡其異己俊懼棄官奔荆州趙曄山隂人詣杜撫授韓詩究竟其術舉有道嘗著吳越春秋詩說歷神淵蔡雍見之嘆息以為長於論衡魏朗上虞人詣太學授五經初辟司徒府遷彭城令後為九真都尉奬勵吏兵破賊斬首二千級桓帝美其功拜議郎頃遷尚書陳便宜冇補益後以黨被徵自殺三國虞翻餘姚人少好學有髙氣魏曹操辟不就吳孫權用為騎都尉嘗以所著易示孔融融曰聞延陵之理樂覩吾子之治易及知東南之美者非特竹箭也孫潭清慎冇儉操後仕晉官至侍中賀齊會稽人少為郡吏守剡縣長擊破山越後守太末長誅惡飬善期月盡平纍官威武中郎將又從孫權征合肥與陸遜討平鄱陽賊魏使曹休來伐齊往新市為拒休憚之遂引還領徐州牧鍾離牧會稽永興人躬自墾田種稻臨熟縣民冇識認者牧遂以稻與縣人仕吳遷中書令嘗為南海太守操行清純冇古人風及卒家無餘財駱統會稽人父俊有文武才統年二十試為烏程相孫權召為功曹後為濡須督數陳便宜前後書數十上所言皆善官至建忠將軍吳範上虞人治歷數知風氣孫權起於東南範委身服事每災祥輒推數言狀其術多效初權為將軍時範嘗曰江南有王氣亥子之間冇大福慶權曰若終如言以君為侯後論功行封以範為都亭侯夏方會稽永興人家遭癘疫死者十三人方年十四躬自負土十冇七載葬送得畢因廬於墓吳時拜仁義都尉纍遷五官中郎將賀邵會稽人孫皓時遷中書令領太子太傅皓凶暴驕矜政事日弊邵上疏切諫皓深恨之邵奉公貞正為親近所憚乃共譖邵被詰責竟遇害晉嵇康其先上虞人康美詞氣有風儀性絶巧而好煆恬靜寡欲與阮籍等為竹林之逰世號竹林七賢仕至中散大夫夏統會稽永興人隱身不仕母病篤詣洛市藥遇賈充與語其應如響因問會稽風俗統曰其人循循猶有大禹之遺風太伯之義讓嚴遵之抗志黃公之髙節勸之仕俯而不答賀循會稽山隂人操尚清厲建武初拜太常朝廷疑滯皆咨之元帝渡江宗廟制度皆循所定為當時儒宗虞􅔎㑹稽人冇素行纍官光祿大夫王𨗳常謂􅔎曰孔愈有公才而無公望丁潭冇公望而無公才兼之者其在卿乎官未達而卒時人惜之丁潭會稽人雅冇時望與同郡孔愈張茂齊名潭字世康愈字敬康茂字偉康時人號曰會稽三康虞預餘姚人兄喜博學好古仕為散騎常侍著書數十萬言預少好學冇文章庾亮等薦其才行太興中遷祕書丞著作郎著晉書四十餘卷會稽典録二十篇孔愈會稽人從父奕明察過人仕為全椒令愈幼孤飬祖母以孝聞後隱新安山中以稼穡讀書為務建興初始出應召以功封餘不亭侯遷侍中太常蘇峻反愈朝服守宗廟卒年七十五諡曰貞從弟羣志尚不羈官至中丞從子坦有雅望官至侍中謝𤣥會稽人安姪與從兄朗俱為安所器重𤣥監江北諸軍破苻堅於淝水以勳封康樂縣公從弟琰為輔國將軍從𤣥陷陳以勳封望蔡公琰子混風華為江左第一歷尚書左僕射王徽之羲之子家於會稽性卓犖風流冠於一時嘗雪夜泛舟剡溪訪戴逵性愛竹嘗寄居空宅中使令種竹曰何可一日無此君官至黃門侍郎王獻之徽之弟髙邁不羈雖閒居終日容止不怠幼時學書父羲之從後掣其筆不得嘆曰此兒後當復冇大名太元中為中書令南北朝孔靖愈孫宋初從平關洛以為尚書令辭乃拜侍中解事東歸武帝餞之戲馬臺百僚咸賦詩以述其美子靈運位著作郎賈恩諸暨人少有至行母亡未葬為鄰火所逼恩救棺燒死宋元嘉中贈天水郡顯親左尉孔覬山隂人從祖琳之善草𨽻仕宋纍官御史中丞覬孝建中為長史不媚權幸醉日居多而明曉政事醒時判決無壅弟道存從弟道徽請假東還輜重四十餘船皆綿絹紙席覬曰汝輩忝預士流何至作賈豎耶謝方明本陽夏人父沖家於會稽劉穆之嘗曰謝方明可謂名家駒仕宋為㑹稽太守除比伍之坐判久繫之獄東土稱之子惠連十嵗能屬文族兄靈運嘉賞之謝靈運𤣥之孫家於上虞少好學博覽羣籍文章為江左第一仕宋為永嘉太守襲祖父封爵故世稱謝康樂孫超宗好學有文辭嘗作殷淑儀誄孝武帝嗟賞曰超宗殊有鳳毛仕為義興太守虞願餘姚人宋明帝時為晉安太守郡有越王石常隱雲霧中惟清亷太守乃見願往觀清徹無所蔽郡産蚺蛇膽可為藥冇遺願蛇者願放之蛇歸者再仁心所致也虞悰會稽人祖嘯父晉左户尚書悰仕南齊為太子中庶子纍遷豫章內史武帝以悰布衣之舊嘗從容謂曰我當令卿復祖業轉侍中遷祠部尚書孔稚圭山隂人仕南齊纍遷都官尚書圭風韻清疏好文詠飲酒七八斗門庭內草萊不剪中有蛙鳴嘗笑謂客曰我以此當兩部鼓吹孔琇之靖孫有吏能仕南齊為吳令後遷廷尉卿出為臨海太守在任清約隆昌中纍遷江夏內史曾孫奐為晉陵太守清白自守所得俸秩隨即分贍孤寡郡中號曰神君虞荔餘姚人年九嵗陸倕問五經事荔對無遺失及長善屬文梁武帝置士林館命為學士弟寄少聰敏及長志於棲遁嘗作瑞雨頌武帝見之謂荔曰此頌典裁清拔卿之士龍也孔休源山隂人晉尚書沖之八世孫舉秀才為太學博士梁大通中行荆徐州事晝決詞訟夜覽墳籍聚書盈七千卷賀瑒循𤣥孫梁天監初為太常丞召見說禮義武帝異之初開五館以瑒兼五經博士時方創定禮樂瑒所建議多見施行二子革季弟子琛並傳瑒業琛有學業仕梁纍官尚書左丞王琳會稽人體貌閒雅雖無學業而强記內敏仕梁纍官湘州刺史輕財愛士得將卒心討破侯景與杜龕功俱第一後授都督廣州刺史賀德基梁會稽人世傳禮學少逰學都下積年不歸衣資罄乏嘗於白寺前逢一婦人脫白綸巾以贈曰君方為重器不久貧寒德基後位至尚書弟德仁以文辭稱人為語曰學行可師賀德基文質彬彬賀德仁兄弟八人時比漢荀氏太守王伯政改所居里為髙陽里唐初仕為祭酒隋虞綽餘姚人姿儀甚偉博學有俊才尤工草𨽻陳傳繹見其詞賦嘆曰虞郎之文無以尚也隋大業初為祕書學士與虞世南等撰長洲玊鏡等書十餘部唐虞世南荔子少與兄世基同受學顧野王貞觀中為𢎞文館學士太宗每稱其五絶一德行二忠直三博學四文詞五書翰孔若思山隂人唐初擢明經歷庫部郎中嘗曰仕官至郎中足矣座右置止水一石明自足意後遷禮部侍郎弟仲思遷給事中三任並與兄同府時人榮之若思子至歷著作郎賀知章越州永興人為祕書監開元中遷禮部侍郎兼集賢學士晚年號四明狂客天寶初乞歸田里為道士詔賜鏡湖剡川一曲時同郡山隂嚴維仕為祕書郎與知章俱以文章揚名康子元越州人開元初詔張說舉治易老莊者集賢學士侯行果薦子元於說說以聞得侍讀𤣥宗將之太山說引子元裁封禪儀官至宗正卿以疾致仕徐浩㑹稽人擢明經有文辭仕為集賢校理肅宗立授中書舍人四方詔令多出浩手纍官吏部侍郎德宗時進會稽郡公始浩父嶠之善書以法授浩益工尤工草𨽻五代鮑君福餘姚人性淳厚有膽氣能馬上舞雙劒五代梁時從錢鏐征伐有功奏授衢州刺史纍遷浙西行軍司馬保順軍節度使檢校太尉兼侍中卒諡忠壯吳程山隂人父蛻唐大順中進士纍官右拾遺程起家校書郎吳越王承制授金部郎中提舉諸司公事文穆王時奏授職方郎中知睦州拜丞相後為威武軍節度使卒諡忠烈宋杜衍山隂人厲操篤學擢進士甲科歷州縣皆有政迹慶厯中為相與富弼韓琦范仲淹同革弊事衍性清介為相百日而罷後以太子少師致仕封祁國公卒諡正獻孫沔會稽人跌蕩自放而材猛過人舉進士纍官樞密副使仁宗追冊張貴妃為溫成皇后沔不肯讀冊遂求罷職卒諡威敏顧臨㑹稽人通經學長於訓故皇祐中舉說書科為國子直講元祐初拜天章閣待制河北都轉運使後歷刑兵吏三部侍郎兼翰林學士紹聖中以龍圖學士知定州終知歙州齊廓㑹稽人舉進士纍官江西淮南轉運使初同時奉使者競為苛刻邀聲名獨廓奉法如平時終祕書監弟唐學識該博嘗舉制科仁宗時為職方員外郎所著冇學苑精英少微集陸佃山隂人居貧苦學映月光讀書擢進士嘗受經王安石而不以新法為是纍官鄆州教授歷知數州徽宗時為尚書右丞所著有埤雅春秋後傳禮象等書二百餘卷石公弼新昌人登進士纍官左司諌大觀初為御史中丞劾蔡京章數十上京罷官至述古殿直學士弟公揆為髙宗朝御史論秦檜亦章十餘上並以剛直名黃汝楫諸暨人家頗富宣和中方臘犯境汝楫以財物二萬緡贖賊所掠士女千人夜夢神告曰上帝以汝活人多賜五子科第其後子閣閚聞闓皆登科陳槖餘姚人登政和上舍第歷新昌令知台州冇古循吏風纍遷權刑部侍郎時秦檜主和議槖言不可檜憾之後知廣州民夷悅服改婺州致仕槖博學剛介不事産業既謝事歸僑寓僧寺王十朋論近世㑹稽人物謂杜祁公之後有陳德應云胡沂餘姚人父宗伋號淳儒沂頴異六嵗誦五經皆畢紹興初進士陸沉州縣三十載孝宗時為吏部侍郎進禮部尚書兼領詹事沂資性恬退無所依附卒諡獻肅陳過庭山隂人舉進士纍官御史中丞兼侍讀欽宗時為尚書右丞議遣大臣割兩河地與金耿南仲辭過庭願效死及汴京陷金人拘之軍中後卒於燕建炎中諡忠肅蔡定山隂人父革傭書以生資定使學革坐法被繫時年七十餘法當免繫鞠胥持不可定詣府請代弗許定知父終不可贖也仰天呼曰父老而刑定生何益自赴河而死府帥聞之驚曰真孝立命出革厚為定其棺斂事而撫周其家李光上虞人崇寧中進士師事劉安世欽宗時權右司諫髙宗時為吏部尚書參知政事力詆秦檜誤國謫瓊州安置子孟傳纍官太府丞終直寶謨閣所著冇磐溪宏辭藁左氏說雜志九十餘卷王佐山隂人紹興十八年與朱熹同榜進士第一纍官至户部尚書陸游佃孫早有文名為秦檜所嫉檜死始為寧德主簿孝宗時擢編修官後知夔嚴二府皆有令聞以寶章閣待制致仕遊才氣超逸朱熹言其能太髙迹太近恐不得全其晚節云俞宗亨山隂人知漳州罷溪港津渡之𣙜減去經總制錢苛取者著述有山林思古録羣經咸發等書共四十餘卷石􅗐新昌人與朱熹為友號克齊冇大學中庸輯略行世詹騤㑹稽人淳熙二年進士第一纍官至侍從冇文聲治政黃度新昌人隆興進士除監察御史光宗不過重華宫度纍疏諌之及論韓托胄之奸寧宗時纍官煥章閣學士知隆興府度嘗知建安救荒有法活民百萬為立塵祠所著有詩書問禮說及史通諸集楊次山上虞人少好學能文補右學生以恭聖仁烈太后兄霑恩纍封至㑹稽郡王能避權勢時論賢之子谷封新安郡王石封永寧郡王谷之子蕃孫節度使蕃孫子鎮尚理宗女周漢公主劉漢弼上虞人嘉定中進士知嘉興府纍官侍御史兼侍講以戶部侍郎致仕漢弼學明義利之辨為正字時應詔言事極論致災弭災之道其他建明甚多卒諡曰忠唐震㑹稽人少居鄉介然不茍交有言其過者輒喜登第為小官所至以公亷稱咸淳中通判臨安府歷知信饒州元兵略饒震城守通判萬道同風震降震呪之曰我忍偷生負國邪城破不屈而死孫子秀餘姚人紹定中進士性沉毅遇事敢為嘗知衢州冇善政奏立孔氏家廟如闕里纍官浙西提刑周行郡縣獄為之清遷太常少卿王爚新昌人嘉定中進士纍官左丞相兼樞密使德祐初進平章軍國重事辭不許以言者罷平章授觀文殿學士充醴泉觀使㷍為人清修剛徑以元老入相值國勢危亡之際天下所屬望也卒與陳宜中不協而去元韓性紹興人宋相琦八世孫天資警敏讀書日記萬言及長博綜羣籍為文自成一家四方學者多受業其門隱居不仕而卒諡莊節先生所著冇禮記說詩音釋書辨疑及文集石永夀新昌人性淳厚事親至孝元末兵亂其父謙孫年老被執兵欲殺之永夀亟抱父請代兵遂殺永夀其父獲免鄉人哀之陸思孝山隂人性至孝母老病痢醫禱久不效思孝方欲刲股肉為糜以進忽夢寐間憂若冇神人者授以藥劑思孝得而異之即以奉母其疾遂愈石明三餘姚人家貧喪父獨與母居一日以事出母為虎害明三歸慟哭持斧求虎殺之凡殺五虎明三亦死僵立不仆張目如生所執斧牢不可拔王艮諸暨人尚氣節讀書務明理以致用初為建德縣尹以亷能稱纍官淮東道宣尉副使政績甚著楊維禎諸暨人舉進士博學長於詞賦仕至江西儒學提舉元亡遂不仕寓居松江冇鐵崖等文集行世本朝趙謙餘姚人博覽古書尤精字學所著冇六書本義及聲音文字通行世唐肅山隂人洪武初為翰林應奉文字號丹崖博學善詞翰與姑蘇髙季迪楊孟載並稱於時劉履上虞人洪武中隱居不仕嘗效朱文公詩傳補注選詩為風雅翼行世胡粹中山隂人博通經史尤長春秋洪武中聘為儒學訓𨗳所著有元史舉要行於時王儼山隂人通詩書禮記三經洪武初舉授紹興府教授為人方直以禮自束後進多遵式之趙俶山隂人博通經史為文遒健洪武初以儒士薦為國子司業名重當時謝肅上虞人學問該博洪武中以明經舉授福建按察司僉事所著有密菴稿與唐肅齊名時號㑹稽二肅黃珏餘姚人號菊東極研性理之學洪武間以尚書試有司不利遂絶進意喜玩邵子皇極經世著指趣精妙有以自樂錢宰㑹稽人洪武初國子博士嘗病近代新聲既繁克意古調擬漢魏而下諸作反古詩十九首且各補其未純者冇臨安集陳性善山隂人洪武末登進士授行人歷升禮部左侍郎靖難師起敗績于白溝河被執以歸悉縱遣之性善獨朝服躍志馬入河以死省吕升山隂人永樂間以儒學教授薦升江西按察司僉事深得憲體調福建按行建寧有螟傷稼升向天祝之俄雷雨大作螟盡死官至南京大理少卿章敞㑹稽人永樂甲申進士入翰林為庶吉士績學中祕與修永樂大典五經性理大全諸書授刑部郎中屢辨寃獄人服其明官至禮部左侍郎王鈺諸暨人永樂壬辰進士及第歷官翰林編修修撰以疾致仕正統丙辰起為江西按察僉事提督學政鈺為人文學篤實行己方正所至公於勸懲士心悅服既三載復致仕去魏驥蕭山人宣德初由訓𨗳召修永樂大典升書太常博士纍進本寺少卿以南京吏部尚致仕卒諡文靖省志成器餘姚人正統間聞侍講劉球劾中官王振下錦衣獄死乃即邑中龍泉山頂為壇祭球祭畢以班頒諸同志其祭文歷述古今忠權奸之禍凡二千餘言人謂之祭忠文今其地為祭壇志省毛吉餘姚人景泰初進士授刑部主事轉廣東按察僉事時劇賊楊輝據程鄉三峒攻掠郡邑吉督死士破之以㓛升副使賊餘衆攻河源吉屢敗之衆遁於陽江我師狙勝突入失利吉死焉事聞贈廣東按察使諡忠寰録其子科入太志學後科舉進士冇名官終提學副使省蕭昱山隂人性至孝母喪明昱以舌䑛之復冇見以易詩三禮教授生徒天順間魁鄉試授貴溪知縣簡易慈愛為政丁母憂復補髙密以水耕法教民農立徭役九等例為一省定式卒于官二縣立祠祀之子鳴鳳登進士歷官御史副使三督學政文章行業為世所宗省志司馬垔山隂人成化初進士授御史提督南京學政校文日閲千卷評品次第如衡鑑然升福建副使致仕歸里襟度清灑大節磊磊蓋逹士云省志謝遷餘姚人成化間進士及第第一授翰林修撰與修憲廟實録升少詹事轉詹事纍升東閣大學士㑹典成加太子太保禮部尚書武英殿大學士孝皇大漸遷等受顧命正德初疏乞致仕去時焦芳劉瑾擅權欲甘心於遷而遷處之裕如瑾誅詔復原職致仕卒年八十三贈太傅諡文正子丕進士及第仕至禮部侍郎省志王鑑之山隂人成化中進士纍官刑部尚書時逆瑾擅權六卿見者皆長跽鑑之獨與抗禮且責同列曰大臣而可屈體於宦堅乎瑾不悅遂謝病歸鑑之清介剛毅自縣令歷官上卿僅能立門戶云省志孫燧餘姚人𢎞治初進士纍官巡撫江西副都御史時逆濠不軌燧死之贈禮部尚書諡忠烈官其長子堪堪舉武試第一歷都督季子升進士及第第二官南京禮部尚書諡文恪升子鋌順天領解第進士礦萬歷甲戌舉禮部第一登進士文章政事為海內宗云省志王守仁餘姚人父華狀元及第官至禮部尚書守仁恪遵家訓登𢎞治中進士授刑部主事改兵部以論救戴銑忤瑾謫貴州龍場馹丞瑾誅始擢知盧陵縣尋進吏部主事員外郎郎中升南京鴻臚寺卿歷僉都御史鎮撫南贑時宸濠變作守仁起兵勤王獲濠獻俘加尚書封新建伯尋以憂歸未幾奉詔平廣西思田之亂事竣歸卒於途守仁天資絶志倫力任斯道所學直究堂奧云省王文轅山隂人勵志力行隱居獨善鄉人薰其德者皆樂親之每志讀書多所自得王守仁與之友善焉省董玘㑹稽人𢎞治乙丑舉禮部第一登進士及第第二授翰林編修歷諭德詹事嘉靖初與修武宗實録官至吏部右侍郎兼翰林學士以憂制歸不復出省志徐愛餘姚人正德初進士授主事即引疾乞歸講學於陽明山麓愛少即溫文敏逹從王先生守仁遊為髙第弟子及卒先生重惜之省志列女曹娥上虞人父旴能絃歌為巫祝漢安初五月五日於縣江泝濤迎神溺死不得尸娥年十四乃沿江號慟晝夜不絶聲旬有七日遂投江而死其後縣長度尚改葬焉朱娥上虞人朱回女母早亡飬於祖媪里中朱顔與媪競持刀欲殺媪娥年十嵗號呼突前手挽顔衣曰寧殺我媪得脫娥連被數十刀以死事聞賜其家粟帛宋㑹稽令董偕為娥立像曹娥廟歲時配享焉周如砥女如砥為新昌典史女年十九未適人至正中鄉民作亂如砥與女避於邑西客僧嶺女被執賊曰吾未娶當以汝為妻女曰我周典史女死即死豈能從汝耶賊遂殺之蔡氏諸暨人王琪妻元至正中張士誠陷諸暨蔡氏避之長寧鄉山中兵猝至有造紙鑊方沸遂投其中而死韓氏紹興人張正䝉妻正䝉仕為德清稅務提領至正中紹興兵變正䝉曰吾為元臣於義當死韓氏曰爾果能死於忠吾必能死於節遂俱縊死其女池奴年十七泣曰父母既死吾何以獨生亦投崖而死潘氏山隂人徐允讓妻元末兵變允讓與潘氏奉其父安避山谷間遇寇斫安傷頸允讓大呼曰汝寧殺我勿殺吾父寇捨安殺允讓將辱潘氏潘紹曰吾從必矣若能焚吾夫則吾無憾焉寇為聚薪焚其夫火方烈潘赴火死安始獲免本朝洪武初旌其門為孝節孟貞女名藴諸暨縣民女初許嫁縣學生蔣文朂未成婚文朂充貢入監為御史病卒藴年才二十聞喪號慟歸蔣氏執喪三年飬其舅姑盡孝宣德中旌表其門舒貞紹典諸仕俊之妻也年十八歸仕俊數月仕俊死于商其姑念貞年幼謀嫁之貞以死自誓慕貞者乃重賂其父母私盟之貞知不免紿父母治齊薦仕俊齊畢乃沐浴衣麻衣自縊省志竇烈婦餘姚姜榮之妾也京師人榮判瑞州護郡符時華林賊攻陷其城突入郡堂竇匿其符而榮未之知也賊競虜竇以去行數里賊中有一郡民求歸賊許焉竇乃密語以符之所在俾歸以告榮再行見道旁有井佯渴求飲遂投井死省志張氏蕭山陳曙妻也聘後陳貧不能娶父謀改嫁之張引刀自刎母力奪得不死後歸陳未幾而夫亡張哭之哀未三月即自縊於寢所焉省志孫氏蕭山人許聘葉氏未幾葉氏子病篤將不起孫即潜製斂其囑父母令納葉棺尋忽自盡時守浮梁戴珊躬臨其家以旌之志省莫潤妻沈氏紹興人歸潤家貧甚潤復暴悍不能治生沈勤苦紡績卒善事之飬其姑甚孝而身則凍餒既生子益不給潤脅以非義沈不從潤乃隂與富者約改嫁之沈懼不免自縊省志吳江妻李氏餘姚人舅與夫俱大疫死姑幸存有澄水黃姓者謀娶之李誓死不從黃乃通其父詐稱母暴病遣輿逆李令肩輿者輿至黃氏出輿則非母家姑亦徐至李度不可脫乃從容請湯沐湯具求如厠久之不出闢厠志户視之則已經矣省徐氏山隂包慎妻徐歸慎七年而慎死無子同邑右族欲强娶之徐髠髮毁形以相拒既而知不免竟自縊死時余亨妻朱氏亨死朱年二十三無子亨既葬辭墓慟絶亦投河而死省志馬德真山隂朱偉妻也家病疫舅與夫偕亡姑張氏亦病篤德真艱難萬狀待其姑疾少愈而母家乃欲奪其志德真斷指為誓屹不肯從及姑殁德真撫膺大慟翌日死之志省李氏蕭山徐黼繼室也黼任晉江學訓導妻亡就彼娶李指揮女未幾黼卒于官李時年十九父母憐其少戒勿隨行不從百計懇留之乃求自盡父母縱之扶櫬歸葬毁容荆布計子成立苦節至老不怠事聞志旌表其門省孫妙吉山隂農家女適同里吳善慶慶死孫尚艾無子鄰邑人有謀為婚者乃厚賄其尊長令奪而嫁之孫知有盟紿以供佛飯僧為亡夫福始行既其齊孫乃沐浴更衣禮佛甚恭頃之竟走志縊夫墓木而死省徐氏鄭翰卿妻山隂儒家女也嫁未逾月而翰卿出逰山右十年不返徐奉舅姑極敬順姑疾劇籲天自代疾果愈後翰卿歸甫旬日有病卒徐營葬畢遂絶粒七日而死省志仙釋苖龍唐初人失其名能畫龍人以苖龍呼之後得道仙去今龍瑞宫東南一峯上平如砥相傳苖龍上升處嚴青㑹稽人居貧常於山中作炭忽遇神人授書一卷曰汝骨可長生并教服石髓法青受之即見左右常有數十人侍之嘗夜行都巡呵問何人青亦呵問都巡怒叱從兵收之青亦叱從神録之青徑去而都巡等人馬不能動明旦鄉人曰必嚴公也報其家往謝青乃放去青後斷穀一年仙去介象㑹稽人學道得度世禁氣之術能隱形變化入山谷見一美女曰汝食氣未盡可斷榖三年來此象如期而往乃授以還丹術吳主聞之召至武昌尊敬之試其術種瓜菜百果皆立生有種黍于山中苦獮猴食之戒曰吾告介君猴即去象化後人復見吳主發棺視之惟一符耳武元照蕭山人方在女孩母或茹葷即終日不乳及萊食乃乳母異之後長議適人女不樂忽夜夢神人告曰汝本玊女坐纍暫謫塵世可絶食及覺欲不食母强食之又夢神怒曰違吾戒也剖腹滌之因授靈寶法自是以符水療人疾一日詣數十家聚話後往其家訪之云已死矣驗其詣之日即尸解之日時宋紹興十一年也支遁晉名僧嘗住㑹稽能仁寺時王羲之作郡遁往訪之因與論莊子逍遙篇遁作數千言才藻新竒如花爛發羲之披襟解帶留連不能捨智永王右軍七代孫名法極住㑹稽嘉祥寺常居閣上臨書三十年所退筆頭置之大竹簏簏受一石餘而五簏皆滿人來求書如市戶限為之穿穴因鐵裹之人謂之鐵門限靈徹唐人㑹稽洪氏子雖為釋尤好吟詠嘗從嚴維學一時名鄉巨公多賔禮之終于定州開元寺門人遷之建塔山隂天柱峯有詩二十卷劉禹錫為序明一統志卷四十五
