冦邊使者使可按視即以數十騎涉夏境猝遇之遇亟分其騎為三四令建旗幟旋山徐行夏人疑以為誘騎不敢擊范祥通判鎮戎軍元昊圍城急祥率將士拒退之請築劉璠堡定川寨從之劉謙涇原路總管兼知涇州會賊寇鎮戎軍謙引兵深入賊境破其聚落而還假少連知涇州改知渭州有能名事無巨細剖决如流人以方張詠王堯臣仁宗時趙元昊叛詔堯臣安撫陜西又遣安撫涇原路招降得勝寨叛兵程戡知渭州陜西有保毅軍人苦其役戡奏已𨽻保捷兵而保毅籍如故州縣以供力役率破財産因詔私役保毅者以計傭律坐之曹琮知秦州兼涇原路兵事琮請自關以西籍民為義軍遂簡鄉兵弓箭手數萬人李復圭知涇州始時二稅之入三司移折已重轉運使又復折之復圭為奏免民立生祠陳貫知涇州督察盜賊禁戢不肖子弟簿書完庫賦租出入皆自檢核嘗謂僚屬曰視縣官物如己物容有奸乎韓琦以經略安撫招討使屯涇州秦增土兵以代戍兵建德順軍以蔽蕭關鳴沙之道琦與范仲淹在兵間久名重一時朝廷倚以為重尹源通判涇州時趙元昊圍定川堡大將葛懷敏救之源遺懷敏書宜駐兵瓦亭見利而動懷敏不聽果敗死王㳂涇州觀察使元昊入冦葛懷敏率兵出捍㳂教其背城為寨以羸師誘賊懷敏不從果為所敗賊乘勝犯渭州㳂城守為疑兵賊遂引去滕宗諒知涇州葛懷敏軍敗諸郡震恐宗諒集農民數千戎服乘城又募勇敢諜知冦逺近檄報旁郡使為備又籍定川戰殁者祭酹之厚撫其孥於是邊民稍安尹洙知涇州徙渭州涇原自葛懷敏之敗傷痍殘缺千罅百漏洙夙夜撫葺一道以完狄青涇原路副都總管每以寡當衆出竒制勝賊衆大敗种世衡環慶路鈐轄羌人常為原州患范仲淹命世衡募戰士于古細腰城晝夜興築旬日而城成任福康定中以都虞侯詣涇原計事適趙元昊入冦渭州韓琦命福統諸將擊賊涇原都監桑懌鎮戎軍巡檢劉肅俱戰沒或勸福自免福曰吾當以死報國遂挺身决鬬而死王圭涇原都監趙元吳入冦圭從任福戰好水川諸將皆敗任福陷圍中圭誓以死報國復入戰援福殺數十百人鞭撓掌裂奮擊自若矢中目乃還夜中卒王仲寶涇原路總管任福與夏人戰兵敗别將朱觀被圍于姚家堡仲寶以兵救之拔觀出圍時諸將皆沒獨仲寶與觀得還耿傅涇原等路行營參軍遺書任福戒以持重及賊大至福戰殁或以其無軍責勸令避去傅不顧亦死之安俊涇原鈐轄因條上禦戎十三事俊久在邊羌人識之知環州种世衡嘗得俘虜問之曰若屬於吾將孰畏曰畏安太守武英涇原行營都監與任福合諸將戰張義堡斬首數十百敵僞遁諸將皆趨利英謂必有伏衆不聽伏發福等既敗英猶力戰矢盡遇害劉滬渭州瓦亭寨監押權靜邊寨擊破党留等族時任福敗邊城晝閉居民畜産多被掠滬獨開門納之邊人呼為劉開門章楶知渭州奏城胡盧河川以據形勝及敗夏人於平夏城楶在涇原四年創州一城寨九立邊功為西方最游師雄德順軍判官鄜延將劉琯欲自延安入安定師雄以地薄賊境懼有伏請由他道既而諜報夏伏精騎黑水傍琯謝曰微君言吾不返矣張守約知涇州涇水善暴城每春必增治隄堰費不資適歲饑罷其役或曰如水害何守約曰歉歲勞民甚於河患禱於河神一夕雷雨明日河徙而南其比遂為沙磧張亢涇原路總管知渭州馭軍嚴明凡燕犒皆過厚人樂為之用景泰知原州趙元昊入寇泰率兵遇敵彭陽城西依山而陳張旗幟為疑兵其戰斬首千餘級劉仲武涇原路第一將夏人欲犯天聖寨主帥檄仲武㑹兵約過某日不來即分屯去仲武乞緩分屯不聽賊果至獨戰禦之賊遁去蔡挺神宗時知渭州挺熟兵法教陳甚善諜告夏人集胡蘆河挺出竒兵迎擊夏人潰分諸將躡而討之蕩其士族周永清渭州鈐轄訓兵以李靖法蔡挺嘉其整圖上之詔推于諸道又知德順軍夏衆入寇擊擒其酋劉舜卿知水洛城神宗經略西邊召問狀對曰自元昊稱臣秦中不復戒嚴今宜先自治帝善之後又歷知原渭二州善於料敵吕大忠紹聖初知渭州奏言關陜民力未裕非假之歲月未易枝梧為章惇所嫌坐降待制毛漸以陜西轉運使攝帥涇原日夜治兵乘夏人犯邊遣將搗其虛遂破沒烟寨進直龍圖閣知渭州折可適知渭州及鎮戎軍有武略守邊威惠兼用夏人不敢入冦姚雄以涇原將駐甘谷城後又知通逺鎮戎軍勇鷙有謀纍立戰功种詁知原州羌人犯塞詁禦之斬首數百後知鎮戎軍熙河師十萬道境上須芻糧詁皆給之盧秉知渭州五路大出西討惟涇原有功夏境胡蘆川恃險逺不設備秉遣將襲擊之俘斬萬計姚麟以涇原副總管從副都總管劉昌祚出戰勝于磨􅗹隘轉向鳴沙趨靈州奪門幾入王恩涇原副都總管城西安臨羌天都十餘壘後知渭州括隱地二萬三千頃分弓箭士耕屯以省餽餉种師道通判原州後又知渭州督諸道兵城席葦坪賊坌至據胡蘆河師道陳於河滸陰遣姚平仲以精甲要擊之賊大潰斬首五千級卒城而還劉昌祚知鎮戎軍為涇原副總管有保障功後又知渭州復牧馬地耗馬復初李嚞建炎中知彭陽縣與民移治境上令執之以獻金人欲官之固拒不受後死于原州王庶知保定縣時方改錢法平物價郡縣奉行過當官吏逃竄涇州四邑惟此邑無一譁者朱友恭涇原路第一副將捍金人有功㑹金兵大集友恭力戰被獲以不降遇害金任天寵明昌中為威戎令縣故堡寨無文廟學舍天寵以廢署建有兄弟訟田者天寵諭以義理委曲周至皆感泣而去持嘉紐勒歡興定中以右都監行平凉帥府事上言鎮戎土肥沃平衍臣禆將所統幾八千人若授以荒田使耕且戰則可以禦備一方縣官省費而食亦足矣金主嘉納元趙思明鎮原州判官惠及於民孫勉華亭縣尹興學勸農政聲流聞本朝顧佐洪武末知莊浪縣在邑廉能邑民頌德守將初以不間武藝易之㑹端陽聚射佐從容據禮持弓矢連發三中守將大竒之尋擢監察御史何士英永樂初知平凉府有亷能幹濟之譽郡人感其德久而不忘李顯宣德中鎮原縣丞亷謹有為勤于撫字民多復業向侃宣德中靜寧州判官潔已愛民不避難苦尋升監察御史人物漢梁統安定烏氏人性剛毅而精法律更始拜為酒泉太守更始敗統與竇融起兵保境建武中與融俱詣京師拜太中大夫統在朝廷數陳便宜以功封高山侯後出守九江有治績吏民畏愛之梁松統子為虎賁中郎將博通經書明習故事與諸儒修明堂辟雍郊祀封禪禮儀子扈永初中為長樂少府梁竦松弟嘗濟沅湘感悼屈原作賦繫石沉之後還閉門自養以經籍為娛著書名曰七序嘗嘆曰大丈夫生當封侯死當廟食不然閒居可以養志州縣之職徒勞人耳後辟命交至皆弗就三子素樂羊侯雍東氏侯翟單父侯梁商竦孫永建初襲乘氏侯纍進大將軍自以戚屬居大位每存謙抑虛已下賢遇饑饉輒載租穀賑貧餒御門族不以權盛干法子冀嗣李恂安定臨涇人少習韓詩教授諸生仕為侍御史持節使幽州能宣布恩澤章帝嘉之拜兖州刺史清約率下後歸鄉里潜居山澤間詣洛陽時歲荒公卿餽糧悉不受王符安定臨涇人少好學有志操與馬融張衡崔瑗友善時人務游宦而符獨耿介隱居著書以譏當時得失不欲彰顯其名號曰潜夫論皇甫規安定朝那人延熹中上疏論羌事三公舉為中郎將討平先零詩種後黨人染建時賢規自以西州豪傑不得與上疏自言前亦附黨坐繫廷尉會赦歸家後舉為𢎞農太守皇甫嵩規兄子父節鴈門大守嵩少有文武志介好詩書習弓馮靈帝時為北地太守以破黃巾功領冀州牧拜太尉時號名將三國皇甫謐嵩曽孫居貧躬稼穡帶經而農遂博綜典籍以著述為務後得風痺疾猶手不輟卷魏晉時屢徴舉並不就號𤣥晏先生胡奮臨涇人魏陰密侯遵之子從司馬懿伐遼東以功封夏陽子纍遷散騎常侍奮晚節好學居邊有威惠兄廣弟烈並知名廣子一仕至凉州刺史烈為將與鍾㑹伐蜀㑹反諸將皆被閉烈子世元時年十八與士卒攻殺㑹晉皇甫重朝那人性沉果有才用為司空張華所知仕至新平太守張軌烏氏人少好學有器望以時方多難永寧初求為凉州刺史威著西州化行河右在州十三年寢疾遺令將佐盡忠報國以安百姓南北朝鄧彥海安定人祖羌符堅車騎將軍父翼冀州刺史彥海性貞素言行可復博覽經書長于易筮魏道武時擢著作郎與尚書崔宏參定朝儀律令音樂及國軍文記詔策多其所為賜爵下博子韓茂安定人父耆魏常山太守卒諡成茂善騎射後從太武討赫連昌征蠕蠕纍功拜散騎常侍殿中尚書爵安定公卒諡曰桓子備爵行唐侯次子均襲爵歷定青冀三州刺史甚有聲譽皇甫和魏朝那人幼孤母夏侯氏才明有禮親授經書及長深沉有雅量尤明禮儀卒於濟陰太守弟亮九歲喪父哀毁若成人為齊大行臺郎中子聿道隋大業初為比部郎以幹局知名席法友安定人仕魏為豫州刺史封苞信縣伯宣武末刺濟州以亷和著稱終光祿大夫諡曰襄金祚安定人性驍勇尚氣俠仕魏以軍功至太中大夫歷東雍州刺史討仇池氐楊紹先於百頃還封安定縣公胡國珍臨涇人魏靈太后之父少好學雅尚清儉太和中襲父爵為武始侯孝明即位封安定郡公進位中書監與侍中崔光俱授帝經侍直禁中又上表陳刑政之宜詔皆行之席闡文安定臨涇人幼孤貧涉獵書史仕南齊為雍州刺史梁武帝受禪除都官尚書封山陽伯出為東陽太守在郡有能名冬至悉放獄中囚依期而至改封湘西侯卒諡曰威梁士彥烏氏人少任俠好讀兵書頗涉經史周武帝聞其勇决自扶風郡守除為九曲鎮將進位開府齊人甚憚之後平齊以功封郕國公梁睿安定烏氏人父禦西魏太尉睿少沉敏有行檢周太祖時襲爵廣平郡公進蔣國公歷敷州刺史凉安二州總管俱有惠政後平代王謙之亂威振西川隋文帝受禪顧待彌厚隋皇甫績安定朝那人祖穆魏隴東太守父道周雍州都督績專精好學略涉經史初仕周封義陽縣男隋初轉晉州刺史言陳可滅狀文帝從之陳平纍拜信州總管卒諡曰安梁毗安定烏氏人祖越魏涇豫洛三州刺史封郃陽縣公父茂周滄兖二州刺史毗性剛謇頗有學識隋初拜治書侍御史遷雍州贊務直道而行出為西寧州刺史諸蠻酋長以金遺之一無所納徴為大理卿處法平允官終刑部尚書牛𢎞鶉觚人本姓尞父允後魏侍中賜姓牛𢎞性寬裕好學博聞隋初為祕書監請開獻書之路修五禮立明堂帝善之拜吏部尚書選舉甚稱弟弼􅒬酒嘗射殺𢎞駕車牛妻屢言之𢎞不以為意但曰作脯其性度如此梁彥光烏氏人七歲時父遇篤疾藥用紫石英求不得彥光憂瘁忽于園中見一物不識怪而持歸即紫石英也高祖時為岐州刺史有惠政轉相州發姦擲伏如神皇甫誕烏氏人剛毅有器局仕為比部郎中有能名纍遷尚書左丞漢王諒在并州作亂誕時為司馬力諫且勉以忠義諒怒囚之主簿豆盧育出誕于獄相與拒諒並遇害追封𢎞義公唐皇甫無逸誕子在長安聞并州變即號慟人問故曰吾父重節義必無茍免訃至果然高祖即位以無逸隋勳舊拜刑部尚書遷御史大夫後為益州大都督府長史吕向涇州人學通古今尤工草𨽻書𤣥宗召入翰林兼集賢校理向始生時父岌客逺方存亡莫知訪索纍年不得他日自朝還道見一老人問之乃父也向抱足號慟帝聞之咨嘆官岌朝散大夫向官至工部侍郎牛仙客鶉觚人纍官河西節度使能勤職業𤣥宗擢拜同中書門下三品仙客為相謹身無他唯唯恭願而已後封豳國公牛僧孺鶉觚人𢎞之裔第進士憲宗時以賢良方正對策條指失政纍官御史中丞穆宗時同平章事敬宗立封竒章郡公終太子少師諸子蔚叢皆第進士蔚子徽亦舉進士纍官刑部尚書致仕家于樊川皇甫鏞臨涇人舉進士纍官河南少尹兄鏄為相權寵大盛每極言之鏄不悅鏞時慟哭于家謂鏄必滅族後鏄果敗朝廷賢之授國子祭酒太子少保鏞寡言正色不屑世務所交皆知名士著書數十篇宋胡順之原州臨涇人舉進士知休寧縣民有汪姓者豪橫順之械送州置之法為青州從事高麗入貢中貴人使州官旅拜于郊順之獨不拜嘗再上宰相書乞太后還政仁宗嘉其忠遷尚書屯田員外郎其後數論朝廷事范仲淹愛其才曲珍隴干人世以才武稱珍忠朴好義善騎射從劉溫潤討羌有功纍遷懷州防禦使後為環慶路副總管破夏人於涇原進忠州防禦使向寶鎮戎軍人為涇原秦鳳鈐轄積勞歷真定鄜延副總管纍遷嘉州團練使寶善騎射年十四與敵戰斬首兩級及壯以勇聞有虎距五原卑邪州東西百里斷人跡寶一矢殪之神宗稱其勇以比薛仁貴云郭執中華亭人纍官樞密承㫖建中靖國初應詔言事切直忤蔡京籍為元祐黨入邪等斥居同谷二十餘年因家焉紹興初金人犯乾州執中乃集鄉豪守禦敵以兵脅遣人來招執中立斬其使郭成德順軍隴干人仕為供奉官元豐中王師趨靈武成將涇原兵出竒奮擊斬敵將及築平夏城章楶擇成為第十將駐平夏升統制成輕財好施名震西鄙劉惟輔涇州人為熙河馬步軍副總管金人陷秦州惟輔迎戰殺傷大當又刺殺其將黑鋒敵為奪氣金人略熙河惟輔出焚積粟匿山寺中為金人所執誘之不言遇害張浚承制贈昭化軍節度使官其子孫十二人郭浩成子為渭州都監擊敗夏人建炎初知原州與金人戰有功纍官永興路經略安撫使歷知秦利金等州後拜檢校少保樞密院都統制屯金州建帥府卒贈少師諡恭毅郭滸德順軍中安堡人從軍積官至武經即為涇原第八副將金人犯陜西渭帥以下叛降獨滸不許帥傳致以罪下之獄滸奮呼曰大丈夫今得死所矣終不能受汚叛逆大惡天地所不容衆醜其言殺之建炎中贈忠州刺史曲端鎮戎人父渙任左班殿直戰死端警敏知書善屬文有將略歷秦鳳路隊將夏人入冦力戰破之建炎初金婁宿攻陜西端遣副將吳玠與戰大破之纍官涇原路經略安撫使吳玠隴干人少有志節日誦書史凡往事可師者録置座右用兵决機變化如神建炎中以戰功纍遷涇原路副總管徙秦鳳張浚承制用為都統制與弟璘戮力協心據險抗敵卒保全蜀後纍加檢校少師四川宣撫使孝宗時追封涪王吳璘玠弟從玠攻戰積功擢秦鳳路經略安撫使歷知熙秦二州節制陜西安撫利路時和議方堅而璘治軍經武常如敵至孝宗時拜太傅後封新安郡王及卒追封信王代兄守蜀二十年隱然為方面之重楊政原州臨涇人崇寧初夏人入冦父忠戰殁建炎間政從吳玠破金烏珠等於箭栝關和尚原諸處纍官涇原路經略安撫使知渭州守漢中十八年後拜太尉卒諡襄毅本朝張諒華亭人永樂中以才幹歷任工部營繕司員外郎克勤所務官至貴州布政司左參議列女皇甫規妻不知何氏女善屬文能草書規卒董卓以厚禮聘之妻乃詣卓門自陳卓俾侍者拔刀圍之妻知不免罵曰君羌胡之種毒害天下猶不足邪皇甫氏文武上才為漢忠臣君其走吏敢行非禮卓乃引車庭中以其頭懸軛鞭朴交下妻謂持杖者曰速盡為惠遂死車下倪氏女後魏涇州人許嫁彭老生居貧常自答汲以養父母老生往逼之女曰未及成禮何敢擅陵辱不從老生怒而刺之女曰我所以執節自固者正欲奉君耳今反為君所殺言終而絶老生持女衣服至叔宅叔執以告遂論死詔旌其墓曰貞女仙釋朱有涇州人少竄名五符宋元豐初瀘賊犯塞詔起秦卒征之軍次資中郡有醮壇山李阿試仙臺有往來臺上俄二烏飛鳴爭食墜地若松肪者有取食之即䐜脹且渴求池水飲焉遇一道士指松日食此葉可療也忽不見如其言渴遂止自覺心爽神清有始不知書不飲酒至是高吟劇飲脫五符而神去鞏昌府東至鳳翔府隴州界五百五十里西至臨洮府渭源縣界七十五里南至漢中府鳳縣界一千三百里北至平凉府固原州界六百里自府治至京師三千六百二十里至南京三千六百三十里糧十五萬九千石零建置沿革禹貢雍州之域天文井鬼分野春秋戎羌所居秦屬隴西郡東漢靈帝時分立南安郡三國魏隴西郡治襄武南安郡治豲道晉仍舊後魏為隴西南安安陽三郡兼置渭州後周併為南安郡隋廢後復置隴西郡唐置渭州天寶初改隴西郡寶應後陷於吐蕃宋皇祐中以渭州地置古渭寨熙寧中改通逺軍崇寧中改鞏州金始為鞏昌府元初改鞏昌路本朝洪武三年改為鞏昌府領州三縣十四隴西縣附郭本漢隴西郡之襄武縣唐為隴西縣宋立古渭寨元祐中復置隴西縣金元仍舊本朝因之編户三十二里安定縣在府城北一百八十里本唐渭州西市貿馬之所五代時淪於先零宋元豐中始築定西城屬通逺軍金大定中改為定西縣屬鞏州貞祐中升為定西州領西安通西二縣元省二縣入州後因地震改安定州本朝改為縣編户一十九里㑹寧縣在府城北二百二十里本隴西郡地後魏置㑹寧縣西魏置㑹州尋廢後周併廢縣隋復置㑹寧縣屬平凉郡唐于縣置西㑹州後改㑹寧郡又改㑹州金時陷于河西僑治會川城名新㑹州又升西寧縣為州金廢元復置西寧縣以㑹州徙治于此尋省縣入州本朝改為㑹寧縣編户一十二里通渭縣在府城東北六十里本唐隴西縣地至德初陷于吐蕃宋置通渭縣熙寧初廢為寨金復升為縣屬鞏州元以甘谷雞川二縣省入本朝因之編户一十六里漳縣在府城南七十里漢舊縣隋屬隴西郡唐陷於吐蕃宋立鹽川寨後改為鎮金屬鞏州元初併入隴西縣至元中置漳縣復漢舊名本朝因之編户五里寧逺縣