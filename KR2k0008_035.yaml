body:
  text: 明一統志卷三十五明李賢等撰平凉府東至西安府邠州界二百二十里南至鳳翔府隴州界二百四十里西至鞏昌府㑹寧縣界四百一十里北至慶陽府環縣界二百九十里自府治至京師三千四百里至南京三千一百八十里糧一十五萬石零建置沿革禹貢雍州之域天文井鬼分野春秋為朝那故地秦屬北地郡漢析置安定郡治高平晉徙治臨涇後魏於潘原縣置武州屬太平郡後周屬原州隋安定郡治安定縣又析置平凉郡治平高唐初屬原州元和中以原州平凉縣置行渭州後陷于吐蕃中和間復置宋為涇原路經略安撫使治所政和中置平凉軍金元皆為平凉府本朝因之領州三縣七平凉縣附郭本漢朝那涇陽二縣地屬安定郡東漢省涇陽入朝那晉因之後魏廢為長城縣地後周復置朝那縣隋改平凉縣屬平凉郡唐屬原州宋沒于金金於縣置平凉府元以潘原縣省入本朝因之編户二十三里崇信縣在府城東南八十里唐貞元間李元諒始築城屯軍名崇信宋初始置崇信縣屬鳳翔府淳化初改屬儀州後州廢以縣屬渭州金屬平凉府元仍舊本朝因之編户四里華亭縣在府城南一百二十里本秦隴西郡地後魏始築城置鎮隋置華亭縣屬安定郡唐省入隴州汧源縣又為神䇿軍五代唐時以廢縣置義州後周復置華亭縣宋改義州為儀州熙寧中廢州以縣屬渭州金屬平凉府元以化平縣省入本朝因之編户八里鎮原縣在府城北一百三十里本秦北地郡地漢為安定郡之高平縣東漢永初間廢後魏置高平鎮後為太平郡兼置原州隋初廢郡州如故大業間廢州為高平郡唐初為原州後改平凉郡乾元初復原州宋置鎮戎軍金改為州屬平凉府元改為鎮原州屬鞏昌路以臨涇彭陽東山三川四縣省入本朝改州為縣及改今屬編户二十里固原州在府城西北一百三十里本朝那地秦屬北地漢郡為高平縣地屬安定郡後魏置平高縣屬高平郡隋屬平凉郡唐初屬原州後廢宋置開逺堡屬鎮戎軍金屬鎮戎州元立開成路領開成縣至治中降路為州本朝初廢州為開城縣復改為固原州編户一十里涇州在府城東一百五十里秦屬北地郡漢晉皆屬安定郡後魏始置涇州取涇水為名隋大業初改安定郡治安定縣唐復為涇州改縣為保定縣天寶初改州為安定郡後復為涇州宋改彰化軍金復為涇州改縣曰涇川屬平凉府元仍舊本朝因之以涇川縣省入編户一十七里領縣一靈臺縣在州城南九十里古密須之國漢為北地郡鶉觚縣地晉為鶉觚陰密二縣地屬安定郡隋析置靈臺縣取文王伐密作靈臺義後省入鶉觚唐復置宋金仍舊元初省入涇川後復置以良原縣省入本朝因之編户二十里靜寧州在府城西二百三十里本渭州隴干城宋慶厯中置德順軍屬秦鳳路元祐中又置隴干縣為附郭金改軍為州元初因之後省隴干改為靜寧州屬鞏昌路本朝改今屬編户一十四里領縣二莊浪縣在州城東南九十里秦屬北地郡漢晉皆屬安定郡隋唐屬平凉郡元初置莊浪路大德中改為州本朝洪武八年改為縣及改今屬編户七里隆德縣在州城東九十里本漢安定郡地宋天禧初置羊牧隆城寨慶厯中改曰隆德寨金升為縣屬德順州元屬靜寧州本朝因之編户五里郡名安定漢名涇原宋名形勝山川秀拔國經秦隴之地以山立郭平凉山川最為秀拔中華襟帶文獻通考鎮戎軍山川險阻旁扼夷落為中華襟帶水土雜於河西人烟接於北地寰宇記外邊羌夏原州㕔壁記郡介于涇原環慶之間而外邊羌夏襟帶西涼咽喉靈武宋鄭文宅城蕭關議左控五原右帶蘭會黃流在其北崆峒阻其南元開成志控制西垂實為要地金胥鼎云隴水環流繞帶河渭德順州志風俗婚姻喪葬頗近古風郡志平涼民俗醇厚不尚侈靡專業耕種不為冦盜其婚姻喪葬頗近古風士尚氣略人以騎射為先同上質朴尚勇穴處者多鎮原志女工機織男多游手開城志好獵務農民淳易化靜寧州志被文王之化而風俗媺方輿樞要涇州古密須之國被文王之化而風俗媺山川天壇山在府城北五里亦名臥虎上有朝元宫可藍山在府城西南二十里亦名都盧山赫連據平凉嘗屯兵此山寰宇記赫連定畋于凉州登可藍山望統萬城泣曰先帝若以朕承大業豈有今日事俄而有羣狐鳴于定旁命射之竟不得一定乃嘆曰此亦怪事也崆峒山在府城西三十里上有問道宫莊子謂黃帝學道于廣成子蓋在此山宋游師雄詩崆峒一何高崛起乾坤闢峻極倚杳冥峥嶸亘今昔勢將玉繩齊位據金野窄笄頭山在崆峒山西以形似名史記黃帝西至于崆峒登笄頭山即此游師雄詩笄頭舊傳名關塞會控扼翠屏山崆峒峯之最高者俗呼屏風山上有圓石如珠一名垂珠峯游師雄詩最高翠屏山舉手星可摘珠石信團圍羣峯森劍㦸大統山在崆峒山東又崆峒山西北有望家山游師雄詩大統失崔嵬望家漸岝峉斷萬山在崇信縣西四十里五馬山在崇信縣西南四十里狀如五馬王母山在華亭縣治南義山在華亭縣東二里縣西北二里又有鏵尖山齊山在華亭縣西一十三里樺嶺山在華亭縣東五十里山多樺樹皛然山在華亭縣西北七十里飛鳳山在華亭縣西北一百里形如飛鳳潜夫山在鎮原縣治北東漢王符隱此東山在鎮原縣東三里玉山在鎮原縣東山多白石陰雨之後明艷如玉雉頭山在鎮原縣西三十里狀如雉頭又縣西五十里有雞頭山隗囂嘗使其將王孟塞雞頭道以拒漢兵大壟山在鎮原縣西七十里六盤山在固原州西二十里曲折高峻元世祖嘗於此駐蹕後安西王於此建避暑樓馬屯山在固原州西前秦苻登與姚萇戰敗奔於此回中山在涇州西五里上有王母宫漢武帝幸雍道回中遂北出蕭關即此筆峰山在涇州南五里又東有山三峰峭峻俗呼米麵山蒼山在靈臺縣南二里林木蒼翠故名隱形山在靈臺縣東北二里臺山在靈臺縣東北一十里山多奇木異禽甘泉秀石又固原州南三里亦有臺山以上有烽火臺而名保巖山在靈臺縣東三十里山勢峭拔回旋百折其顛有涇臺下常有雲霧兼山在靈臺縣西九十里乃涇州主山也橫山在靜寧州北一十里蕃部所居隴山在靜寧州南一百五十里以近隴州之地故名盤龍山在莊浪縣南四十里狀如盤龍襟山在隆德縣南一十里狀如衣襟美高山在隆德縣東南二十里香爐峰在崆峒山一名香爐臺游師雄詩却升香爐臺俯瞰倒插石注云自香爐臺望倒插石上巨下鋭尤為竒怪皂鶴洞在崆峒山東巖之半上有皂鶴每見必主兵革游師雄詩皂鶴有時出振迅擊天翮廣成子洞在東巖北别峯之陰有穴曰廣成子洞游師雄詩復聞廣成子不為外慮役軒后屈至尊稽穎請所益至今洞猶存峭壁宛遺跡青龍洞在翠屏山上雨晴雲輒歸洞中一名歸雲洞游師雄詩相傳雷雨收片片歸雲白碧泉洞在涇州廢臨涇縣境其中水皆青色四時長流味苦不堪食雕窠峽在府城南三十里宋蔡挺詩既有雕窠峽何須㑹盟壇朔風吹戌雲言之淚澘澘金佛峽在府城西六十里上有金粧佛三宋王素詩來觀金佛峽如入玉門關彈筝峽在府城西一百里風吹流水音韻鏗鏘如彈筝聲唐儲光羲詩達士憂世務鄙夫念王程晨過彈筝峽馬足凌競行雙璧隱靈曜莫能知晦明皚皚堅氷白漫漫陰雲平始信古人言苦節不可貞石門硤在靜寧州南一百五十里山石如門其路斬截即隴山北垂也桃坡在鎮逺縣治西其地有桃萬株故名臥龍原在靈臺縣東一十里和戎原在臨涇廢縣南二十五里白石原在靈臺縣西北其原首起廢良原縣西南三十里東下三十里分為兩原一更名良原一更名良杜原望兒原在靈臺縣廢良原縣東三十里涇河自府城西南白巖發源至涇州又東南至邠州界又東北至西安府高陵縣界㑹于渭橫河在府城西三十里源出華亭縣流至此與境內大岔南谷諸水俱入于涇河胡盧河本名蔚茹河源出鎮原西南頽沙山下流入涇河唐志白草軍在蔚茹水之西謂此閣川河在涇州西南三里流入涇河汭水自隴州流經本府崇信華亭兩縣境至涇州又東流入涇河武村水在華亭縣南一十里武村策底水在華亭縣北三十里流入涇河肥水在鎮原縣西北四十里與自延水俱注高平川蒲水在鎮原縣北五十里發源南蒲谷與靈臺細川水合三水在鎮原縣東北六十里水流三𣲖㑹歸一川又有水五源俱出隴山合而為一又名一水陽晉水在西蕃界東流至鎮源縣又流入涇州界大黑水在固原州北一百五十里流入黃河旁有小黑水流入焉三香水在靈臺縣東五十里源出麟遊縣東亦名三交川水苦水在莊浪縣西二十里其水味苦又靜寧州西五里有苦水河好水在隆德縣西二里源出六盤山西流合苦水底堡水在隆德縣西二里源出美高山其西有堡故名胭脂川在華亭縣西北一百里東流入涇河高平川在鎮原縣治南源出大壟山若水谷又名若水三川在鎮原縣西北三十里其源本一流而為三入高平川南川有二大南川在固原州東六十里小南川在州東南五十里乾川在固原州東北一百六十里達溪川在靈臺縣南二里流達涇河妲己川在靈臺縣西七十里威戎川在靜寧州南四十里宋於此築威戎堡金置威戎縣因名通遍川在靜寧州東一百五十里以道路四通故名水洛川在靜寧州南一百五十里源出隴山西南流合櫝奴水又經石門峽流入秦州界曹務川在莊浪縣北三十里川旁有姓曹名務者居之故名陽三川在莊浪縣西南七十里山陽有三川故名孤樹川在隆德縣北三十里旁有孤樹武延川在隆德縣西北七十里昔有武延者居此川之旁故名宋曹瑋知渭州日與陳興秦翰破章埋族于武延川即此桞湖在府城北三十里湖畔桞數千株朝那湫在固原州湫有二俱出山間一在縣東十五里一在縣西北三十里土人謂之東海西海方四十里水停不流冬夏不增减不生草木靈湫在隆德縣東北四十里其水四時常溢旱禱有應有元天厯中碑記琉璃泉在崆峒山游師雄詩陽麓湧泉飛㶁㶁逗甘液西巖泉在崆峒山泉甚甘美游師雄詩西巖水泓澄沮洳緣罅隙擕爐就煮茗爽徹滌肝膈暖泉在府城北二里其水湧出四時溫然又涇州西五里亦有暖泉石泉在鎮原縣治西水從石孔中出四時不涸百泉在涇州西三十五里泉眼極多四時不涸甘泉在靈臺縣東北一十里水味甘美溫冷泉出保巖山之陰半溫半冷有疾者於此洗滌即愈馬跑泉在靈臺縣西一百三十五里俗傳秦王至此馬跑泉出官泉在隆德縣治東源出于山四時不涸土産黑瓷器平凉華亭二縣出甘草鎮原縣靜寧州出秦芁蓯蓉俱平凉縣出天南星崇信華亭二縣出欵冬花苦參俱靜寧州及莊浪縣出藩封韓王府在府城中洪熙元年建襄陵王府樂平王府通渭王府褒城王府四府俱在府治西高平王府西德王府寧逺王府長泰王府永福王府建寧王府長洲王府崑山王府長樂王府慶陽王府高淳王府休寧王府通安王府俱府城內公署陜西行太僕寺在府治東洪武三十年建陜西苑馬寺在府治東永樂四年建領長樂靈武威逺同川熙春順寧六監開城安定弼隆廣寧清平萬安慶陽定邊武安隴陽保川泰和天興永康嘉靖安勝康樂鳳林香泉㑹寧雲驥升平延寧永昌二十四苑俱在本府及慶陽鞏昌府地界正統三年又併甘肅苑馬寺入焉固原衛在州城中平凉衛在府治東南舊在府治東洪武三年建永樂六年移治於此安東中護衛在府治東洪熙元年為韓府置學校平凉府學在府治東洪武四年建固原州學在州治南舊開城縣學洪武六年建正統五年重修涇州學在州治西洪武三年建二十六年重修靜寧州學在州治