道真破之文帝又遣方明討之大捷乃以道真為雍州刺史方明為梁南秦二州刺史張彞魏秦州刺史務尚典式考訪故事羽儀赫然可觀羌夏畏服憚其威整一方肅靜號為良牧邢巒魏持節梁秦二州刺史開地定境東西七百南北千里獲郡十四二部護軍及諸縣戍獨孤信周隴右大都督秦州刺史在州事無壅滯示以禮教勸以耕桑數年之中公私富實流人願附者數萬家唐裴守真成州刺史其政不務威嚴吏民懷之五代郭瓊唐階州刺史時蜀人屢冦瓊徙城保險民乃無患王𢎞贄漢階州刺史到任添户三千餘復請置將利福津二邑詔褒之焦繼勳周秦州觀察使推恩信設方略以招誘諸部酋長相率奉牛酒請盟邊境以安宋宋璫太宗時知秦州有善政擢陜西轉運使代以韋亶未幾亶坐事命璫再知州事安集諸戎部內清肅田况知秦州以威惠守邊羌人不敢近塞吏畏民信治最著聞曹瑋知秦州有德澤于民秦人請立碑紀功弟琮亦知秦州以恩信懷生羌多請內屬張整利文州都巡檢使邊夷歲鈔省地吏習不與校整密募死士時其來掩擊幾盡吳元載太宗時知秦州民李益者恣橫害民奏捕誅之民皆飯僧相慶馬知節咸平初知秦州嘗質羌酋子弟二十餘人踰二紀矣知節曰羌亦人爾豈不懷歸悉遣之羌懷其德訖終更不犯塞劉熙古知秦州州接蕃部多冦患熙古諭以朝廷恩信取酋豪子弟為質邊鄙以寧高防知秦州州與夏人雜處罔知教養防齊之以刑舊俗稍革雷有終知秦州契丹入冦真宗幸澶淵有終入援威聲大振既而契丹修好命還州李及知秦州為人詳厚將吏頗易之㑹有禁卒犯法吏執以來及方坐觀書召前略問其人服罪亟命斬之觀書如故於是將吏驚服王隨知秦州秦卒有負罪逃入蕃部者戎人輒奴畜之小不如意復執出求賞前此坐法當死隨下令能自歸者免死由是多來歸者溫仲舒知秦州先是羌戎為民患仲舒諭其酋以威信諸部獻地內屬民感其惠畫像祠之梁適知秦州古渭初建寨間為屬羌所鈔益兵拒守羌復驚疑適召諭其種罷所益兵羌不為患秦人為立生祠吕公綽知秦州安逺寨古渭諸羌來獻地公綽曰天下之大豈利尺寸地却之弓箭手馬多闕公綽諭諸寨户凡十丁為社秋成募出金帛市馬給之宇文之邵曲水令轉運以輕縑高其價使縣鬻於民之卲言縣地狹人貧歲歉饑羌夷數入冦不可復用之以求利咈轉運意遂乞致仕張方平帥秦州諜告夏人將壓境方平料簡士馬聲言出塞已而冦不至吕公孺知秦州為政亷明內侍李憲以詔出兵欲盡駐原渭公孺不可與憲相諭奏坐徙相州吕公弼以宣徽使判秦州羌董氊輒治書稱敕公弼郤之曰藩臣安得妄稱敕董氊自是不復敢唐肅秦州司理參軍有商人寓逆旅而同宿者殺之亡去血沾商人衣為捕吏所執州趣具獄肅探知其寃持之後數月得殺人者李公璹知階州郡東北隅河水為害公璹命鑿山回河俾入于江由是水不為害郡人稱之家願通判文州郡守鄭行純憑內使勢自恣罷蕃夷互市啓邊隙願爭之不從徑下令復其舊守怒交章互奏俱報罷而願以曽入黨籍謫英州酒稅韓琦知秦州兼秦鳳路經略招討使增廣州城招集屬户厲兵待賊訖琦去賊不敢入冦薛奎知秦州州宿重兵經費常不足奎務為儉約教民水耕謹商算歲中積芻粟數十萬徙知益州秦民與夷落數千人列奎治狀請留尹洙通判秦州韓琦薦其材可用詔加直集賢院文彥博知秦州在邊二年有威名夏人不敢犯塞王拱辰秦州帥威惠並用羌人信服不敢擾邊余靖知秦州有操略條教精明未踰年以治最聞李參知秦州蕃酋藥家族作亂討平之居鎮閲歲未嘗以邊事聞英宗使問故對曰將在邊期於無事不敢妄以寇貽主憂馬仲甫知秦州得箄栗城故址自雞川寨築堡北抵南谷環數百里為內地詔賜名甘谷堡張詵知秦州前此將吏貪功多從羌地獵射因起邊患詵至申令毋得犯得一人斬諸境上羣羌感悅蔡抗通判秦州居官清約家人有得龍鬚席為臥具者斥還之蒲卣通判文州有獻議者欲開文州徑路達陜西卣言異時鬼章欲從此窺蜀為其阻隘而止夏人志此久矣可為之通乎議遂塞工博文知秦州初沿邊軍民逃入蕃部有能擒至者得重賞由是間有自歸而為舊部所得者亦皆執以坐斬博文乃遣人密持信紙往招至則貸其死由是自歸者衆吕大忠知秦州時郡糴民粟豪家因之制操縱之柄大忠選僚宷自旦入倉雖斗升亦受不使有壅閼民喜爭運粟於倉弟大防亦知秦州大鈞秦州右司理參軍謝良佐秦州教授州守吕大忠每過之聽講論語必正襟斂容曰聖人言行在焉吾不敢不肅錢明逸知秦州講明武備䆒心民政吏民懷服李師中知秦州前此多屯重兵於境師中簡善守者列塞上而使善戰者中居約束既熟常以取勝葉康直神宗時知秦州夏人侵甘谷康直戒諸將設伏以待殱其二酋自是不敢犯塞孫永知秦州王韶以布衣入幕府建取熙河策永折之曰邊陲方安靜無故騷動恐變生不測蘇寀利路轉運使文州歲市羌馬羌轉買蜀貨猾駔上下物價肆為姦漁宷議置折博務平貨直以易馬宿弊頓絶蔡延慶秦鳳路都轉運使王韶進兵河州賊邀其歸路延慶救解之㑹上元觀燈賊伏兵北闕下遣使僞請內屬延慶知之斬首以狥伏兵遁去姚祐知秦州或請調熙河弓箭士徙邊以省更戍祐謂人情懷土重遷丐以二年為更發之期滿歲樂業而願留者乃聽從之何常知秦州諜告夏人多築堡柵朝議出兵牽制常言羌人生長射獵今困於版築違所長用所短可拱手以待其敵也從之种師道權知同谷縣縣吏有田訟彌二年不决師道翻閲案牘其所訟止毋及兄而已師道又引吏詰曰母兄法可訟乎吏叩頭服罪趙鼎徽宗時調兩當尉自初仕有大志後為名相王淵知鞏州寧逺寨諸羌入冦經略司討之表淵總領岷山蕃兵將城澤州羌衆來爭淵奮擊大破之劉宥知天水縣後致仕而金騎犯天水木門掠宥行槖禮其誥命曰隨我去官北朝宥罵曰我為南朝鬼不為敵國官遂遇害劉韐知隴城縣有亷稱子子羽參議張浚軍事駐秦州有方略及富平之敗復單騎至秦召諸亡將張浚紹興初以川陜宣撫等使置幕府於秦川至即出行關陜訪問風俗罷斥姦贓以搜攬豪傑為先務吳璘以秦鳳路經略安撫使知秦州常以疊陳法敗敵雖和議方堅而治軍經武常如敵至陳寅紹定初知西和州元兵圍城寅率民兵晝夜苦戰城陷妻子先死寅亦伏劍而死賓客同死者二十有八人劉鋭知文州嘉熙初元兵至鋭與通判趙汝嚮相誓死守更迭出戰被圍旬有五日汲道絶兵民水不入口者半月卒無叛志城陷汝嚮被執以死鋭先殺其妻父子三人登文王臺自刎死賈子坤西和州推官攝通判關外被兵子坤與郡守陳寅誓死守城城陷子坤朝服與其家十二口死之劉祿文州守將䝉古按竺邇破宕昌殘階州攻文州祿固守數月不可䝉古諜知城中無井乃奪其汲道率勇士梯城城破祿死之金愛申定西州刺史有治蹟本朝楊忠洪武初為秦州知州守已愛民政聲著聞尋升臨洮知府徐矩洪武初文縣知縣存心愛民嘗作詩云願天賜豐年稍蘇民力疲常禦蕃邊靜安居樂雍熙陳敏洪武中知鞏昌府亷能勤慎政無過舉吏民恱服李貴永樂初知伏羌縣在任公勤人不敢干以私尋升吏部考功司主事解原永樂初任階州知州孜孜勸民生理奉公守法民皆感慕張璞永樂中為徽州同知盡心撫字未嘗少倦民感其惠孫亶永樂中知鞏昌府仁恕端恪役均刑省吏民畏愛宣德初官滿當去民上章乞留復任政績益著王澤永樂初知㑹寧縣公勤愛民邑人稱頌至今不忘流寓杜甫襄陽人唐天寶末為華州司功屬關輔饑亂乃棄官之秦州寓居成州同谷負薪採橡栗以自給不盈月遂入蜀趙翺唐長安人徙居天水母沒廬墓刺血以寫佛書及父沒益毁瘠後翺死子光遠毁瘠如其父詔表其門墓文彥博宋汾州人微時嘗客兩當縣富民郇氏之館教授生徒李彥仙寧州人徙鞏州宋建炎中金人陷陜州彥仙復之授寧州觀察使守陜再踰年大小二百戰金人不得西彥仙以信義治陜與其下同甘苦故士樂為用至城陷民無二心人物周石作蜀成紀人孔子弟子唐贈石邑伯宋封成紀侯漢紀信成紀人項羽圍漢王於榮陽急信請誑楚乃乘王車出東門日食盡漢王出降楚皆之城東觀漢王乃得出西門去羽燒殺信李廣隴西成紀人其先李信秦時為將廣世受射文帝時擊胸奴以功為散騎常侍數從獵格殺猛獸文帝曰惜廣不逢時當高祖世萬户侯何足道哉歷上谷隴西北地鴈門雲中太守武帝時為北平太守胸奴畏之號飛將軍從弟蔡及三子曰當户曰叔曰敢皆為郎孫陵亦為將趙充國隴西上邽人良家子善騎射沉勇有方略武帝朝拜中郎將車騎將軍與霍光定冊立宣帝又屯金城討平西羌封營平侯卒年八十六諡曰壯侯成帝時圖形麒麟閣假㑹宗天水上邽人好大節竟寧中以杜陵令舉為西域都護騎都尉西域諸羌伏其威信後遣入烏孫安輯其國賜爵關內侯未幾以疾卒諸羌為發喪立祠焉隗囂天水成紀人季父崔素豪俠聞王莾兵敗謀起兵應漢咸謂囂素有名好經書共推為上將軍稱漢復元年據天水更始敗士大夫皆歸囂囂素謙恭下士由此名震西州建武初鄧禹承制以囂為西州大將軍囂將王元勸其據險自守後光武西征囂奔西城而死子純降趙一漢陽西縣人體貌超羣恃才倨傲元和間舉至京師名動一時士大夫想望其風采未幾西還十辟公府皆不就終于家所著有賦頌針誄書論及雜文十六篇龎德南安豲道人初平中從馬騰擊反羌有功纍官中郎將封都亭侯任棠漢陽上邽人隱居教授有竒節太守龎參初到先候之棠不與言但以薤一大本水一盂置户屏前自抱兒孫伏户下參思其微意良久曰水者欲吾清也拔大本薤者欲吾擊强宗也抱兒當户欲吾開門撫孤也嘆息而還姜岐漢陽人守道隱居名聞西州大守橋𤣥欲召以為吏岐稱疾不就𤣥怒敕督郵尹益逼致之曰岐若不至趣嫁其母益固爭不能得遽曉譬岐岐堅臥不起張恭天水人為燉煌功曹㑹太守馬艾卒郡人推行長史事恩信甚著遣子就詣曹操至酒泉為賊黃華所執恭遣從弟攻酒泉而自為首尾之援黃華遂詣金城太守蘇則降後賜恭爵關內侯楊阜天水冀人為安定長史後去官察孝亷辟丞相府言於曹操曰馬超得西羌若不嚴為之備隴上非國家有操善之後與戰超敗隴右平纍官武都太守趙趙昂天水人㑹馬超攻冀城昂與楊阜尹奉戮力討超功聞朝廷遷昻益州刺史奉燉煌太守三國閻溫天水人仕魏以凉州别駕守上邽㑹馬超奔上邽郡人舉迎之溫不能禁乃還州超復圍之溫夜潜出欲告急夏侯淵賊執之詣超超曰若謂城中無救則貸汝溫僞許之及詣城下大呼曰大軍不過三日至勉之超怒殺之姜維天水人居鐵堂峽初在魏為郎中後入蜀漢詣諸葛亮纍遷征西將軍亮卒還成都與費褘共録尚書事封平襄侯遷征西大將軍晉彭祈襄武人仕為州别駕從事歷西郡酒泉𢎞農略陽四守纍官封侯所至忠以衛上清以守已威以克敵恩以惠下朱冲南安人少有志行鄰人失犢認冲犢以歸後得犢大慚以還冲竟不受有牛犯其禾稼冲屢持芻送牛而無恨色主愧乃不復為暴咸寧中召補博士不應冲居近夷俗羌戎奉之若君冲亦以禮讓為訓邑里化之路不拾遺姚弋仲南安赤亭羌人纍遷冠軍將軍石虎召弋仲擊梁犢弋仲輕騎至鄴貫錍跨馬于庭中遂滅梁犢嘗遣子襄討冉閔戒曰汝才十倍於閔若不梟擒不須復見我襄大敗閔而歸王嘉安陽人外若不足而內聰明清虛服氣隱于東陽谷鑿崖穴居弟子受業者數百人遂棄其徒隱于終南山楊軻天水人好易弟子受業至數百人後趙徴之固辭逼之乃發既見不拜與語不言命舍之既而上疏求還歸秦乃教授不絶姜平子天水人為秦州别駕符堅饗羣臣皆賦詩平子詩內丁字直而不屈堅問其故對曰屈下者不正之物未足以獻也堅笑擢上第尹緯天水人每覽書至宰相立勳之際常輟書而嘆符堅敗緯輔翼姚萇萇遣緯請堅堅問緯曰卿於朕何官緯曰尚書令史堅嘆曰卿宰相材王景略之儔而朕不知卿亡也不亦宜乎南北朝焦度南安郡氐祖文圭避難仇池宋元嘉中父明與千餘家隨居襄陽度少有氣幹便弓馬沈攸之反度守郢城有功嘗于城樓上罵辱攸之後人呼其樓為焦度樓官終游擊將軍尹正天水人梁蕭察蒞雍州正為府參軍擒張纘獲杜彥皆正之力察稱帝除正護軍將軍封新野縣侯卒諡曰剛後配食察廟趙知禮天水人涉獵文史善書翰初為陳武帝書記及武帝征侯景上表於梁元帝與王僧辨論軍事其文並知禮所製景平授中書郎封始平縣子武帝受命拜散騎侍郎太府卿李叔仁隴西人驍健有武力仕魏前後數從征討有功梁王超宗侵魏叔仁為統軍𨽻揚州刺史薛真度討破之纍遷洛州刺史封陳郡公官終大都督楊機天水冀人祖伏恩徙居洛陽機少有志節為士流所稱魏永熙中除度支尚書方直之心久而益厲家貧無馬多乘小犢車時論許其清白趙善天水人好學涉獵經史初仕魏纍督長史加都督征虜將軍後仕西魏進爵為公從征邙山為敵所獲卒於東魏詔贈大都督諡曰敬趙貴天水人少頴悟有氣慨魏孝昌中討元皓有功纍遷大都督孝武時以功遷太保大宗伯封南陽郡公周閔帝初遷太傅進封楚國公趙昶天水人少聰敏有志節魏孝昌中拜都督積功封章武縣伯加驃騎大將軍開府儀同三司時氐酋羌反昶悉平之後仕周進爵長道郡公賜姓宇文李逺成紀人兄賢少志于學仕魏為原州刺史恭帝初賜爵西河郡公卒諡曰恆逺仕西魏纍官大將軍尚書左僕射周閔帝踐祚進位柱國李穆成紀人倜儻有竒節從宇文泰撫定關中進位大將軍原州刺史穆以二兄賢逺並為佐命功臣而子弟布列清顯深懼盈滿辭不拜不許數年進位上柱國并州總管兄子崇隋幽州總管權景宣天水顯親人曉兵權有智略仕西魏為南陽郡守郡臨敵境舊制發人防守多廢農業景宣至唯修起城樓多備器械人為立碑頌德後周時纍授荆州刺史爵千金郡公卒諡曰恭李弼隴西成紀人初仕魏封石門縣伯後歸周與齊神武戰河東以功進封趙國公弼每征討朝受命夕上路性沉雅有深識故能以功名終曾孫密志氣雄逺少襲父蒲山公爵隋末兵亂自稱魏公辛威隴西人慷慨有志略西魏時以功封白土縣伯為鄜河二州刺史頗得人和後仕周拜大將軍爵抱罕郡公威性持重有威嚴歷官數十年未嘗有過其家五世同居時以此稱之趙文表天水人纍世為二千石文表少修謹好讀春秋能左右射纍功至大將軍爵為公子仁海襲其爵董純隴西成紀人父升周柱國純少有膂力便弓馬從武帝平齊拜儀同爵大興縣侯隋開皇末進封公趙煚天水人深沉有氣局嘗從宇文泰破洛陽後事周武帝纍官大將軍賜爵金城郡公趙芬天水人少有辨智頗涉經史仕周纍官內史時朝事疑不能决者芬輒為評斷隋初拜尚書左僕射與王誼修律令兼內史令未幾以老病出為蒲州刺史隋權武天水人勇力絶人以平陳功拜豫州刺史進位大將軍李充成紀人慷慨有英略開皇中擊突厥有功拜上柱國武陽郡公朔州總管為突厥所憚或譛其謀反上譴怒之憂憤而卒李景天水人容貌竒偉驍勇善射開皇中以行軍總管從王世積代陳有功進位開府姜謨秦州上邽人為晉陽長吏唐公李淵引為司空參軍薛舉冦秦州以謨安撫隴外拜秦州刺史謨至邊撫以恩信盜賊衰止人喜曰不意復見太平官府卒諡曰安唐姜晦謨弟仕為蒲州參軍纍遷長安令人畏愛之擢御史中丞改吏部侍郎處事精明皆以為神後貶春州司馬姜寶誼秦州上邽人父逺後周秦州刺史封朝邑縣公寶誼嘗游太學受書以積勞遷鷹揚郎將從高祖督盜太原及起兵歷右武衛大將軍與宋剛戰被害贈幽州總管諡曰剛子協善篆籕歷夏州都督封成紀縣侯姜確謨子貞觀中為將作少監以幹力稱高昌之役為行軍副總管高昌平拜金城郡公帝將征高麗而確諫不從至蓋牟城中矢卒帝賦詩悼之贈郕國公諡曰襄尹愔秦州天水人父思貞明春秋擢高第愔博學尤通老氏書𤣥宗召對喜甚厚禮之拜諫議大夫集賢院學士卒贈左散騎常侍姜皎上邽人初為尚衣奉御𤣥宗即位授殿中少監尋遷太常卿監修國史後坐泄禁中語流欽州病死世以為寃李白隴西成紀人唐宗室性倜儻善詩歌才思飄逸天寶初召見金鑾殿論當世事詔供奉翰林𤣥宗愛其才欲官之㑹髙力士以脫靴為耻譛於貴妃輒為所沮遂浮游四方寓情詩酒有詩集三十卷李揆隴西人性警敏善文章乾元中進禮部侍郎後拜中書侍郎同平章事揆美風儀善奏對帝曰卿門地人物文章當世第一信朝廷羽儀時稱三絶族孫訓亦有賢稱趙昌天水人初拜南安都護夷落嚮化後還朝以裴泰代之未幾州將逐泰德宗召昌問狀昌年踰七十占對精明復拜安南都護詔書至人相賀叛兵即定憲宗時為工部尚書遷太子少保趙憬渭州人德宗時李泌薦其志行拜給事中未幾進同平章事精於治道每以國本在選賢節用薄賦斂寬刑罰懇懇為帝言之李中敏隴西人元和中第進士性剛峭與杜牧李甘善其文辭氣節大抵相上下太和中旱中敏上疏指陳時政得失文宗嘉納之李讓夷隴西人性亷介不妄交武宗時拜相位雖顯劇以儉約自持為世咨美五代王仁裕天水漢陽人唐廢帝時召令隨駕一時詔書皆出其手漢初充翰林承㫖兼知貢舉為兵部尚書周初遷太子少保所著有紫泥集西江集入洛集共百卷唐景思秦州人周世宗戰高平得漢降兵數千以景思為指揮使戍淮上有功領饒州刺史後遷濠州戰傷重卒贈武清軍節度使宋尹崇珂秦州天水人初事周世宗以謹厚稱為殿前都指揮使宋初出為淄州刺史有善政民詣闕請刻石頌德太祖命李穆撰文後征嶺表録功遷保信軍節度使李士衡成紀人後徙家京兆進士及第歷知數州纍遷刑部侍郎嘗為三司使真宗作寬財利論以賜之仁宗即位拜尚書左丞子丕緒纍官司農卿知華州致仕居官亷靜不為矯激家多圖書集歷代石刻為數百卷藏之董湜天水人家多田未嘗親治稼穡好讀書以教子為樂住京師以錢萬緡買監書以歸後其子經四登能書綬緯同擢第而約繼之王君萬秦州寧逺人以殿侍為秦鳳指揮使積功擢熙河路鈐轄洮西羌叛圍河州君萬以計解之纍官副總管子瞻立戰功積官榮州防禦使知鄯州劉願天水人天資耿介時王安石新書盛行學者靡然向風願獨不喜穿鑿附㑹之說潜心伊洛之學後以八行舉趙隆成紀人從王韶收復熙河為涇原將戰平夏川功最多每戰勝不矜嘗知西寧州羌豪信服纍遷棒日天武都指揮使卒徽宗自篆碑額曰旌忠張覺民文州人游大學元祐間第進士後與馬涓等上書忤權貴坐黨錮退居成都與張正已等游號草堂先生所著有歌詩雜著百餘篇劉仲武秦州成紀人資貌雄偉纍官東上閣門使知河州吐蕃叛命仲武擊敗之纍遷瀘川軍節度使再帥熙河卒贈少保諡威肅子鍚為閣門祗候劉錡仲武第九子徙德順軍美儀狀善射聲如洪鍾宣和間授閣門祗候高宗即位差知岷州紹興中召還為江東路副總管金人圍順昌錡大敗之以計令終夜自戰積尸盈野後烏珠自來錡又大敗之死者數萬纍官至太尉帥荆南府卒諡武穆張俊成紀人好騎射負才氣咸和中以討河朔羣冦為都指揮使靖康中以隊將擊金人於太原金人圍汴俊勒兵勤王高宗即位擢後軍統制平苗劉之變後又拒金烏珠於明州及討平諸盜纍遷太傅封益國公進封清河郡王王德通逺軍熟羊寨人欽宗末以武勇應募時號王夜叉建炎初以勤王兵從劉光世與金人大小百戰未嘗敗北南渡後屢平劇賊積功封隴西郡侯後為荆南副都統制卒贈少傅牛皓福津人仕為川陜宣撫後軍中部將紹興初金人冦秦川吳玠遣諸校分伺皓至瓦吾谷遇金將乃與所部下馬戰金人見皓異欲招之皓力戰而死時承信郎高萬熙河步將任安隊官秦元薛琪張亨皆死于陳張子蓋俊從子父宏從俊軍河上金人破開德府宏戰死子蓋初從韓世忠討苗𫝊又從俊擊劉猊又大敗金人於柏臯海州纍官安德軍節度鎮江都統孝宗初立授檢校少保淮東招撫使卒贈太尉諡恭莊張威成州人仕為利州副都統制屢立竒功嘉定中官終揚州觀察使威初在行伍以勇見稱進充偏禆每戰輒克每臨陳戰酣則精采愈奮金人聞其名畏憚之丁焴福津人為人剛直不受私謁纍官至大府少卿嘉定間為利州路安撫使兼知興元府决事明白吏民信服魏了翁嘗曰丁晦叔武階一人而已晦叔其字也曹友聞同慶栗亭人彬十二世孫少有大志登寶慶初進士授天水軍教授時城已被圍友聞單騎夜入與張維共城守後權知沔州元兵入興元制置使趙彥呐檄友聞控制大安友聞曰吾重兵在此敵必不能越沔入蜀彥呐不從友聞馳至雞冠隘與敵殊死戰及弟萬俱死之事聞贈龍圖閣學士賜廟褒忠諡曰節楊堯兩當人少刻志于學仕為進武副尉金虞仲文寧逺人七歲能詩十歲能文日記千言刻苦學問第進士纍仕州縣以亷能稱官終翰林侍講學士卒諡文正正隆二年贈特進濮國公張邦憲秦州人正大中進士為永固縣令天興初避兵徐州元卓翼率兵至城邦憲被執將驅之北邦憲罵曰我進士也誤䝉朝廷用為邑長可從汝曹反耶遂遇害元汪世顯鞏昌鹽川人仕為都總帥開拓西蜀有功纍遷鞏昌便宜都統帥後追封隴右王子七人忠臣鞏昌便宜副總帥德臣都統帥直臣都統領良臣中書左丞翰臣奧魯兵馬都元帥佐臣左翼都總領清臣四川行樞密院副使纍世廕封李庭玉隴西人中統初以功授鞏昌後元帥及將兵赴成都還守章廣平山寨與宋兵每戰輒勝纍遷四川南道宣慰使至元末以老乞歸授陜西行中省右丞卒諡襄敏汪惟正世顯孫幼頴悟藏書二萬卷喜從文士論議古今治亂尤善談兵纍官中書左丞行秦蜀中書省事改陜西行省左丞卒諡貞肅二子嗣昌成都管軍副萬户壽昌江南行臺中丞楊大淵天水人與兄大全弟大楫皆仕宋大淵總兵守閬州元憲宗至閬遣使來招大淵殺之憲宗怒督諸軍力攻大淵懼乃降後為管軍總管有戰功世祖數奬諭之及卒追封閬中郡公諡肅翼子文粲仕為閬蓬等路都元帥楊文安大淵兄子父大全守叙州元兵入蜀大全戰死贈眉州防禦使諡愍忠官其長子文仲文安方二嵗依大淵於閬州中統初授監軍遷閬州䕫東路安撫使積功甚多再遷參知政事行四川南道宣慰使子艮之厯湖南宣慰副使嶽州總管本朝門克新秦州人洪武中由儒士任州學訓導生徒多至成效秩滿升左春坊左贊善未幾升禮部尚書曹銘㑹寧人由進士任兵科給事中才名顯著進升都察院左都御史汪壽世顯之後廕襲指揮同知守鞏昌永樂中升指揮使宣德初升都指揮僉事正統中歷升都指揮使復以靖邊功升署都督僉事協副總兵官守備凉州為人恭謹敬禮士大夫名重一時楊仕敏隴西人由舉人拜監察御史在任端謹用薦者進升太平知府平易近民官至山西布政司左參政仙釋尹喜天水人周康王時為函谷關令東見紫氣乃占風知有神人過老子果至授喜鍊氣吐納之術三宫正一之法復求著書於是為道德經以授之後仙成復與老子相㑹於蜀賜號文始先生山圖隴西人少好乘馬馬踶之折其腳遇山中道人教令服地黃苦參散服之一歲病愈身輕復遇道士言能隨吾使汝不死圖即隨之遍遊名山踰六十年一旦歸家以母死葬畢復去莫知所之封衡隴西人幼學道得真訣服黃連五十年入山採藥百餘年還鄉里聞病者輒以腰間竹筒藥與之立應復周遊天下駕一青牛鬼物遇之莫不竄避魏武帝召問飬性大略衡曰减思慮節嗜欲而已所著有養氣術隱形法衛生經數十卷法冲隴西成紀人幼而秀異遂發心出家入武都山修業唐貞觀初敕私度者處死于是僧多逃嶧陽山避難冲憫其饑詣州宰曰如有死事冲身當之但施道糧終獲福祐守宰嘉其烈乃濟之山有虎冲詣告曰今窮客相投可見容否虎皆避去明一統志卷三十五
