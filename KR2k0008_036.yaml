body:
  text: 明一統志卷三十六明李賢等撰臨洮府東至鞏昌府隴西縣界一百三十五里西至河州衛界八十里南至洮州衛界二百五十里北至莊浪衛界二百七十里自府治至京師四千六十里至南京三千八百四十里糧四萬四千石零建置沿革禹貢雍州之域天文井鬼分野春秋戰國時西羌所居秦置隴西郡漢因之晉析置狄道郡劉宋置武始郡後魏置臨狄郡後周廢隋復置武始郡屬蘭州後改金城郡唐天寶初置臨州久視中置臨洮軍寶應初陷于吐蕃號武勝軍宋復改為鎮洮軍尋改熙州治狄道縣金改熙州為臨洮府元仍為臨洮府本朝因之領州二縣三狄道縣附郭漢置縣為隴西郡治晉屬狄道郡後魏至隋縣不改唐析置臨川縣屬蘭州又别置安樂縣後廢宋熙寧中始置狄道縣金元仍舊本朝因之編户二十五里渭源縣在府城東一百二十里本漢首陽縣後魏改渭源縣屬渭州唐陷于吐蕃宋收復置渭源及慶平通谷三堡屬熙州金仍舊元升渭源堡為縣而慶平通谷𨽻焉本朝因之編户四里蘭州在府城北二百一十里秦為隴西郡地漢置金城郡東漢省入隴西郡魏晉時為重鎮後魏後周並為武始郡隋初廢郡為蘭州大業初廢州置金城郡唐復置蘭州天寶初改金城郡乾元初復為蘭州宋治蘭泉縣金廢蘭泉元屬鞏昌路本朝改州為縣及改今屬編户六里金縣在州城東九十里本宋蘭州龕斧寨及定逺城地金大定間升為龕谷定逺二縣屬會州正大間置金州治龕谷而以定逺為屬邑元省二縣入金州屬鞏昌路本朝改州為縣及改今屬編户一十里河州在府城東南二百七十里景泰中置州編户三十一里郡名隴西秦名武始宋名金城隋名形勝境接巴嶲宋張舜民收復熙河頌考河隴西之故地嬴秦之舊封其民則徙關東之下平其境則接巴嶲之襟裔地控邊陲蘭州學記蘭于隴右號雄郡地控邊陲南得鍾存北阻大河方輿勝覽土地肥美南得鍾存以廣其衆北阻大河因以為固中原迤西山川厄塞本朝諭徐達文地勢平夷金城志有長城之險臯蘭峙其南黃河經其北俱舊志界接羌戎其山峻聳元城隍廟記風俗徑悍質木宋志被邊之地以鞍馬射獵為事其人徑悍而質木好勇喜獵圖經人性質朴好勇喜獵番漢雜處各從其習民俗質朴尚武務農俱元志山川嶽麓山在府城東以上有東嶽廟故名西平山在府城西五里寶鼎山在府城西一十里以峯似香爐故名夏牟山在府城西五十里卧龍山在府城西與夏牟山相近山勢蜿蜒如龍偃卧故名抹邦山在府城南二十五里宋神宗時王韶征西羌屯兵于此碧井山在府城南二十五里幞頭山在府城西南三十里以形似名龜山在府城北五十里蓮華山在府城南一百五十里山聳數峯宛如蓮華常家山在府城西南六十里與西傾山相連宋神宗時夏人寇邊羌酋鬼章等駐兵于此黎紫山在府城西北八十里馬寒山在府城北九十里其山綿亘數百里勢極髙峻雖炎夏氷雪不消黑石山在府城西北一百里西傾山在府城西南一百五十里即禹貢所謂西傾是也洮水所出崆洞山在府界內鳥鼠山在渭源縣西二十里俗呼為青雀山渭水經其下其地鳥與鼠同處于穴爾雅鳥鼠共穴其鳥名鵌其鼠名鼷禹貢導渭自鳥鼠同穴是也南谷山在渭源縣西二十五里酈道元云渭水出南谷山在鳥鼠山西北禹只自鳥鼠同穴導之耳五竹山在渭源縣西南三十里龍尾山在蘭州南三里山形如龍尾落黃河之壖臯蘭山在蘭州南五里為州之主山隋置州取此為名山下地勢平夷可屯百萬兵漢霍去病擊胸奴至此董文起詩溪聲逺近生秋籟山色蒼涼上客衣重憶蘭州舊遊地眼中華髮故人稀九川臺山在蘭州黃河北五里其形峭拔直上如臺登之可以望逺黃峪山在蘭州西南二十五里天都山在蘭州南三十里宋宦者李憲遣苗授伐西夏嘗踰此山燒南牟屯次葫蘆河而還樺林山在蘭州南三十里與馬寒臯蘭二山並峙白石山在蘭州東南八十里昔周將梁暉至此為羌所圍迫於無水暉以青羊禱於山神飛泉湧出兵士取給今呼梁泉水北流注於河琵琶山在蘭州西一百三十里以形似名石門山在蘭州西南水經灕水東北經石門口山髙峻險絶對岸如門嵻㟍山在蘭州南一百七十里一名可狼山俗呼熱薄汗山昔西秦乞伏乾歸太子熾磐築城於此龕山在金縣南二十里宋元豐四年置寨於此尖山在金縣西南二十五里駝項山在金縣東南三十五里以形似名豬觜山在金縣西北四十里金于此置鎮亂山在金縣東北八十里其山相連數百里參差亂如列戟平頂峯在蘭州東北六十里胭脂嶺在府城西三十里俗傳漢吕布所乘胭脂馬産於此分水嶺在渭源縣西十五里其水自此嶺分流東者入渭西者入洮秀峰巖在渭源縣南三十里五竹山內有古佛像尚存夜雨巖在蘭州西南一十里有泉自山巔而下夜深露氣重而泉溜愈多聽之如雨聲鎖林峽在府城南六十里洮水所經諸峯聳削兩崖懸絶林木森鬱宛似封固故名石井峽在府城北一百二十里中有泉水四時不竭石嶮口峽在蘭州東二十五里兩崖懸立黃河至此東流入金縣亂山二百餘里始瀉落巨川如瀑布然土人沿山引水灌田甚多􅗠砂洞在蘭州南四十五里洞産􅗠砂麝香坡在府城西南與夏牟山相近中産麝香東岡坡在蘭州東二十五里相傳唐太宗為秦王時獲褚亮於此通谷在府城西六十里宋熙寧中嘗置堡其谷東西出入中可容千百人往來不踰數十步上有大竅可見天日女遮谷在蘭州東三十五里宋李憲與苗綬城蘭州遇賊數萬於此谷綬與戰破之榆谷在蘭州西一百里有大小榆谷漢西羌居此緣山濵水以廣田畜故致強大常雄諸種李麻峪在蘭州西四十里通甘州路峨眉灣在蘭州東南三十里臯蘭山後董家灣在金縣東北三十里黃河