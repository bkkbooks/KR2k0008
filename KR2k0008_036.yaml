食吾餘矣死不敢奉教似賢而薦之徐徽言靖康中知晉寧軍時河東盡陷獨晉寧死守金人攻圍益急屢戰敗之城陷先自焚其妻子仗劔欲自擬左右號救為金人執去竟不降而死兵馬都監孫昂亦不屈死之金盧克忠同知保大軍節度使綏德州卒過鄜城求宿民家是夜有賊剽主人財而去有司執假宿之卒繫獄榜掠誣服克忠察其寃獨不肯署未幾果得賊假宿之卒遂釋圖克坦喀齊喀延安尹關陜以西初去兵革百姓多失業合喜守之以靜民多還歸元黎公真甘泉令有仁政後去任民思之圖其像于學舍畢浩知葭州恤孤賑乏州人為立政績碑李德源至正中安定縣尹興學校勸農均役息訟民為立遺愛碑本朝張著洪武三年知膚施縣邑民頻年被兵竄匿山谷著招諭撫循修舉廢墜民始知有太平之樂嘗有鄒二者不孝著召諭激之二遂改行為孝子黃琮洪武初中部知縣公正愛民政務興舉民頌其德秦紘景泰中以進士知府谷縣日與將官講兵法料虜情民卒以無擾流寓杜甫唐襄陽人祿山之亂甫避兵三川肅宗立復自鄜奔行在拜右拾遺時所在寇奪甫家寓鄜彌年艱窶孺弱至餓死人物南北朝秦族後周洛川人性至孝父喪哀毁過禮以母在抑割哀情以慰母心與弟榮先篤友愛母沒終喪之後不入房室者二十年鄉里感歎詔旌表之唐張平髙綏州人隋末為鷹揚府校尉戌大原從唐髙祖平京城纍授左領軍將軍封蕭國公貞觀初為丹州刺史卒追封羅國公贈潭州都督宋李繼周延州金明人祖計都父孝俱為金明鎮使太宗時繼周率衆敗番落纍遷殿直後以討西夏功纍遷成州刺史王文郁新秦人為府州巡檢韓琦薦其材加閣門祗候麟府都監嘗破夏人纍遷知麟州後為冀州觀察使楊畋新秦人舉進士纍官殿中丞討平湖南徭賊後纍遷龍圖閣直學士知諌院性清介家無餘資卒贈右諌議大夫張岊府谷人慶厯初為麟府路巡檢使有膽略善騎射時西夏阿遇背約岊徑造帳中諭以逆順阿遇語屈因撫其背曰真男子也歸所掠如故約楊偕中部人少從种放學舉進士性剛而忠朴在官數上書論時政郭皇后廢偕與孔道輔等力爭元昊入寇詔偕選強壯策應麟府偕奏請以軍法從事於是軍政肅然纍遷翰林侍讀學士以工部侍郎致仕有兵書十五卷文集十卷李浩綏州人務學通兵法以破儂智髙功為廣西都監嘗著安邊策神宗時又以討黔江蠻纍官知河州後歷鄜延太原永興環慶路副都總管劉紹能保安軍人以父懷忠與夏冦戰死録為右班殿直纍遷鄜延路兵馬都監後統軍進討夏人設疑以間之神宗手詔曰紹能忠勇第一此必夏人畏忌間之耳紹能捧詔感泣守邊四十七年大小五十戰終簡州團練使髙永能青澗人勇力善射种諤取綏州永能先驅入囉兀五戰皆捷後纍進榮州團練使永樂之役獻謀不用城陷戰而死永能撫部曲有恩遇敵則身先之下有傷者載以已副馬故能得士死力及死邊人無不痛惜劉延慶保安軍人雄豪有勇嘗從西伐屢立戰功纍遷泰寧軍留後徽宗時破夏人有功拜保信軍節度使李翼麟州新秦人宣和末為代州西路都巡檢使屯崞縣金人取代翼堅守統領崔忠夜引金兵入城翼摶戰不敵被執尼瑪哈欲臣之怒罵不屈而死劉光世延慶子以討河北賊有功拜鎮海軍節度使後從髙宗南渡纍立戰功封楊國公卒諡武僖後追封鄜王韓世忠延安人目瞬如電鷙勇絶倫以應募立功擒方臘討河北盜賊從髙宗南渡平苗劉之亂大破金烏珠于江中纍遷橫海武寧安化三鎮節度使以不主和議忤秦檜解樞柄奉朝請後封咸安郡王卒諡忠武為中興名將張宗顔延安人父吉為涇原將解宣威城圍死之宗顔補官纍遷崇信軍承宣使劉豫入冦宗顔自泗州為張俊繼遇劉猊大破之卒贈節度諡壯敏韓彥直世忠子登進士第調太社令纍官工部尚書兼知臨安府屢進讜言後以龍圖閣學士提舉萬壽觀卒封蘄春郡公嘗托宋朝事分為類目名水心鏡凡百六十七卷解元保安軍德靖寨人猿臂善騎射從韓世忠平苗劉之亂後以戰功纍官保信軍節度使卒贈檢校少保李永竒青澗人世襲蘇尾九族巡檢金人陷延安授永竒及其子顯忠官永竒泣曰我宋臣也乃為彼用耶會劉豫令顯忠率兵赴汴永竒密戒曰汝得乘機即歸本朝毋以我故二其志及豫廢金授顯忠知同州顯忠以計執金帥薩里罕急遣人告永竒挈家出城為金人所及家屬二百口皆遇害李顯忠永竒子年十七即隨父出入行陳及歸朝屢敗金兵授殿前都指揮使顯忠生長邊陲熟悉敵情每用兵必先計而後戰時稱為真關西將軍嘗為浙東副總管孝宗召除威武軍節度竒其狀貌魁傑命繪像閣下卒諡忠襄朱昭府谷人為震威城兵馬監押金人入寇昭以死守城將陷召諸校謂曰大丈夫暴骨境內一生之事畢矣苐妻子不可為敵所汙因令盡殺之乃與敵戰殺獲甚衆馬蹶墜塹仗劍罵敵而死折可適其先世為府州刺史因家焉可適未冠有勇馳射不習而能郭逵薦為鄜延路經略司屬官有戰功纍遷淮康軍節度使子彥質紹興中僉事樞密院書金龎迪延安人少倜儻喜讀兵書學推步孤虛之術應募有功纍官臨洮慶陽尹以治最聞終絳陽軍節度使迪天性孝友父病刲股作羮以進即愈昆弟析家財盡分與之官爵之廕必先諸姪鄉人義之楊仲武保安人除知寧州關中薦飢境內盜賊縱橫仲武悉平之後遷同知臨洮終陜西西路轉運使元何從義洛川人祖父母亡從義廬于墓側旦夕哀慕帷啖疏食事父母孝養尤至伯叔祖父母叔父母皆無子比亡從義咸為治葬祭奠以禮時人義之劉思敬宜君人事繼母孝父八十喪明會兵亂思敬負避岩穴中兵至欲殺之思敬曰我死不足惜父老無目何所依乎兵憐其孝而全之王思聰安塞人性孝父病思聰憂甚禱于天額膝皆瘡得神泉飲之愈父從失明思聰舐之即能視縣上狀詔旌異之張閏延長人八世不異㸑家人百餘口無間言無私藏閏兄顯卒即以家事付姪聚聚辭曰叔父行也叔宜主之閏曰姪宗子也姪宜主之相讓既久卒以付聚縉紳之家自謂不如袁榮甘泉縣人延祐間仕至昭武大將軍後為雲南諸道行御史臺中丞其同郡安塞張允恭亦仕為雲南亷訪使趙溉甘泉人明于儒術至正間纍官吏部尚書王士𢎞中部人父摶有疾士𢎞傾資求醫遍禱諸神額叩成瘡父殁哀毁廬墓有竒鵲來巢甚相狎終喪復建祠墓前朔望必往奠雖風雨不廢事聞旌表之本朝郭永道安塞縣人有學行初為本縣儒學訓導洪武中以賢良方正纍官户部尚書王思吳堡縣人洪武中以國子生擢嘉興府同知調揚州府所至有聲後升四川布政司右參政宋詡膚施縣人洪武中舉孝亷歷官有聲後纍遷應天府尹丘野鄜州人洪武中以國子生擢廣東道監察御史激揚得體永樂初升湖廣按察司副使髙懷敬延川人洪武中舉人材歷官有能名後纍遷湖廣按察司副使張綱米脂縣人以國子生擢江西南康府照磨盡心於職後纍遷四川按察司副使列女孟氏宋延安人父戍永樂城夏人攻圍城陷父死女呼號徒步亟往潛入城中獲其父尸大慟而卒夏人憐之並其父瘞焉李氏顯忠族妹顯忠南歸家屬悉遇害李氏國色也金人欲私之不從乃縛于樹下命左右射其臍遂大罵不已而死康氏金鄜州人夫蚤亡服闋父取之歸家許嚴沂為妻康氏誓死弗聽欲還夫家不可得乃投崖而死事聞命有司致祭其墓張氏元洛川人夫賀敏年二十四病篤謂張曰我若不諱汝年少無嗣可更適人張泣以死自誓敏尋卒張即自縊遂同穴而葬焉仙釋白雲片鶴金明縣人為道士自稱白雲片鶴宋宣和初遊汴見趙鼎大呼曰中興名相人驚異之他日又遇鼎曰吉陽相逢後鼎紹興五年為相有重名晚竄吉陽忽與白雲相見白雲曰憶疇昔之言乎公將歸矣未幾鼎果卒雒道人不知何許人嘗遊洛交遇異人得祕訣預知休咎劉延慶敬重之靖康二年春忽大哭于市别鄰里去及汴梁陷二帝北狩乃哭之日也法天本中天竺摩伽陀國僧也來至鄜州與河中梵學僧法進共譯經義始出無量壽尊勝二經七佛贊知州王龜從潤色之法天獻于闕下宋太祖召見賜紫方袍王嵩宋青澗縣僧趙元昊以其將野利王為腹心种世衡謀有以去之察嵩堅朴可用誘與冠帶充指揮使致令富貴忽怒之掠治不勝其苦嵩惟感恩不怨乃召嵩曰吾有事使汝雖苦甚於此能不言否嵩曰誓以死報尚敢辭乎乃草一書遺野利王置嵩衲衣內戒曰非濵死不得泄並以蔀棗及畫龜為信至則投之野利度嵩别有書索之嵩答以無有野利乃封其信上元昊數日召嵩詰責命曵出誅之嵩大號且曰始將軍遣嵩遺野利王書不得妄泄今不幸不了將軍事元昊急使人追問嵩具以對乃褫衲衣取書以入元昊于是始疑野利釋嵩送還嵩既還而野利已報死矣嵩後命以官不受仍為僧以壽終明一統志卷三十六
