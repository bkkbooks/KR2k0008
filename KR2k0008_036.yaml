不食而卒南北朝辛慶之狄道人少有文學魏時徴至洛陽對策第一除祕書郎纍官南荆州刺史位遇雖隆其率性儉素志量寬和有儒者之風宗欽金城人少好學有儒者風仕魏為著作郎封卧樹男髙允以詩贈答甚相褒美李禮成魏狄道人祖延實為司徒父彧為侍中禮成以戰功纍官至絳郡公襄州都督有惠政于民梁覽魏金城人世為西羌部落曽祖穆以抱罕城歸魏封臨洮公祖顯為尚書封南安公父釗河華二州刺史封新陽伯覽以軍功官至太傅封安德郡公劉雄周臨洮子城人少有大志為宇文泰親信拜中大夫泰重其才謂曰古之人富貴不歸故鄉如衣錦夜行以雄為河州刺史鄉里榮之辛昂慶之族子周尉遲迥伐蜀表為龍州長史威惠洽著纍遷驃騎大將軍辛德源周狄道人少有重名纍官考功郎中隋髙祖受禪不調隱于林慮山著幽居賦以自寄隋李安狄道人父蔚事後周為朔燕恆三州刺史安與弟惁俱仕隋平陳時安率軍夜襲其功最多髙祖手詔褒奬官至寧州刺史柱國趙郡公子孝恭最有名惁官至衛州刺史順陽郡公王傑金城人以戰功纍官至張掖郡公辛彥之狄道人為太常少卿帝令與沈重議論禮文重不能抗後除隋州刺史時州牧皆貢珍玩惟彥之所貢皆供祭之物帝善之遷潞州刺史辛公義狄道人為岷州刺史有善政民呼為慈父遷并州刺史至嶽露坐驗囚決斷咸宜人服其明時山東霖雨皆苦水災境內獨無所損尋轉為黜陟使所至多政績李襲志狄道人為始安郡丞大業末盜起襲志傾私財募士拒之煬帝崩或勸為尉他自立襲志曰江都雖淪宗社尚有主諸君當相與戮力尉他不足法也遂固守唐初髙祖賜書命其子元嗣召之襲志歸國以為桂州都督守桂二十八年政尚清省南荒便之薛舉金城人容貌魁岸武敢善射殖産巨萬好結納邊豪為長雄大業末與子仁杲起兵自號西秦霸王仁杲多力善騎射軍中號萬人敵唐李襲譽襲志弟通敏有識度髙祖召授大府少卿擢江南巡撫使為政嚴肅祿分給宗親以餘資寫書及歸惟載書數車嘗謂諸子曰吾性不喜財遂至窶乏然負京有賜田千頃能耕之足以食河內桑千株事之可以衣江都書力讀可以進求官吾殁後能勤此無資於人矣辛雲京蘭州金城人有膽決以擒生斬馘常冠諸軍積功授開府儀同三司右僕射同平章事渾釋之蘭州人有才武世為本州都督從朔方軍戰功居多纍遷開府儀同三司封寧朔郡王與吐蕃戰殁渾瑊釋之子年十一善騎射隨釋之防秋節度張齊丘戲曰與乳媪俱來耶是歲立跳蕩功尋從破賀魯部勇常冠三軍後從李光弼定河北又從郭子儀復西京討安慶緒積功官至檢校尚書右僕射同平章事宋王淵熙州人善騎射應募擊夏國屢有功纍遷熙河等路部將靖康初為真定府總管討平叛寇從宣撫范訥勤王髙宗即位為御營司都統制扈從渡江拜簽樞密院事為苗傳劉正彥所害贈少保諡襄愍淵為將輕財好義家無宿儲髙子孺狄道人知蘭州龕谷寨金人陷熙河子孺聞副總管劉惟輔戰死力窮莫支先刃其家與軍將韓清皆罵敵不屈而死金馬慶祥本名賽音濟蘇先世自西域入居狄道以馬為氏太安初以尚書省譯史使元慶祥智辨通六國語還稱旨授開封判官後移鳳翔元兵來攻慶祥率兵殊死戰矢盡被執竟不屈而死贈恆州刺史諡忠愍馬正卿慶祥子好學負氣由斷事官纍遷至禮部尚書卒贈梁郡侯諡忠懿曽孫祖常博學能文章仕元為翰林待制包長壽臨洮人貞祐初與夏人戰有功賜姓烏庫哩纍官至通逺軍節度使夏人嘗攻定西執其弟世顯至城下謂長壽曰若不速降即殺汝弟長壽不顧奮戰破之元趙昌狄道人亦名阿克展父巴莽富甲諸族昌偉貌有兼人力金貞祐中以軍功為熙河節度金亡歸元為疊州安撫使卒子阿克盤事親以孝聞從憲宗入蜀有戰功纍官臨洮府元帥後以戰死諡桓勇孫重喜纍官鞏昌宣慰使卒諡桓襄祈望芳狄道人以巨家擢守臨洮偉績著于邊陲本朝石執中蘭州人長身美髯永樂中為刑部主事讞獄平允纍官山東右布政使直而不華勤而能慎後官至浙江左布政使以老致仕卒趙安狄道人謀勇過人永樂中屢立戰功歷升指揮宣德正統中守鎮涼州數平羌寇升右軍都督同知充副總兵又征北敵進封會川伯王竑河州人由進士仕終兵部尚書竑性剛毅少豪雋尚氣槩義所當為奮勇直前嘗廷擊馬順所至令行禁止名滿天下卒諡莊毅彭澤蘭州衛人𢎞治庚戌進士歷官工部主事刑部郎中升浙江副使純誠直諒持憲嚴明一洗脂韋軟媚之習君子謂其得于理學者為多仕至少保兵部尚書列女辛氏晉狄道人嫁散騎常侍梁緯西都陷緯為劉曜所害辛氏有殊色曜將妻之辛氏據地大哭仰謂曜曰妾聞女不再醮乞就死下事舅姑遂號泣不止曜曰貞婦也任之乃自經死曜以禮葬之仙釋玄暢金城人少為胡人所獲其帥曰此兒目光外射非凡童也遂釋之乃往涼州出家復避虜達于揚州洞曉經律深入禪要占記吉凶無有不驗遊成都止大石寺入齊后山結草為庵弟子見神人乘馬繞山一匝指示造塔之處乃建剎焉齊太子遣使徴迎曰吾數盡矣至京而卒寶志金城人七歲出家長修禪業止江東道林寺忽知僻異言若讖記或一身三處宿焉齊武帝召之著三重布帽以見俄而帝崩梁武即位下詔曰志公神遊冥寂勿禁出入嘗與白鶴道人爭得灊山麓武帝以二人俱靈通俾各以物識其地已而鶴飛去至麓忽聞空中錫飛聲遂卓于山麓鶴止他所皇子生志曰寃家亦生後知與侯景同日生天監十三年無疾而終程守善狄道人含真養素禱雨立應所居萬壽觀枯槐復茂至正中無疾而逝賜號通真子慶陽府東至延安府鄜州界二百五十里南至西安府邠州界五百里西至平涼府鎮原縣界一百五十里北至古鹽州七百里