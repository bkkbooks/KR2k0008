body:
  text: 明一統志卷八十七明李賢等撰景東府東至楚雄府楚雄縣界三百二十里西至大侯州界三百六十里南至威逺州界四百里北至楚雄府定邉縣界二百里自府治至里南京八千一百八十里至京師一萬一千六百建置沿革古柘南也漢時未有其地唐時南詔蒙氏為銀生府之地舊為濮落雜蠻所居後金齒白蠻侵奪其地宋時大理段氏莫能復元中統初討平之以其所部𨽻威楚萬户至元中置開南州𨽻威楚路本朝洪武中改為景東府親領編户八里郡名開南元名形勝荒僻之地元史開南州徼外荒僻之地莊蹻王滇池漢武開西南夷諸葛孔明定益州皆未嘗涉其境控扼之所郡志東有邦泰山之秀南有孟沼山之雄景董山峙其西蒙樂山聳其北地接極邉是亦控扼之所水城繞郡雲南志風俗民多百夷田皆種秫郡志不通漢書惟用緬字同上山川量董山在府治西昔為酋寨今立衛地其上邦泰山在府治東髙聳延長土官世居其麓鶴籠山在府北三十里一峰突兀其頂盤圎蒙樂山在府北九十里一名無量山髙不可躋連亘三百餘里中有石洞深不可測一峯特出狀若崆洞蒙氏封為南嶽其南有泉為通華河其北有泉為清水河俱東入于大河瀾滄江俗名浪滄源出金齒流經府西南二百餘里南注車里大河源出定邉縣阿茊村合三岔河經府治東南入馬龍江龍潭在府北九十里嵗旱禱南有應筧泉源出蒙樂山以竹筧引入衛城鑿池瀦之上覆以亭公署景東衛在府北衛城中洪武二十三年建學校景東衛學在衛城泰安門外正統七年建關梁母瓜關在府南一百里安定關在府北一百五十里景闌關在府東南一百二十里通華橋在府治北跨通華河寺觀開化寺在府治南龍泉寺在府治東真武觀在府治西廣南府東至廣西泗城州界一百二十里西至廣西府維摩州界一百五十里南至古器野界六十里北至泗城州界二百四十里自府治至南京七千九百九十里至京師一萬一千四百三十里零糧一千石建置沿革宋時名特磨道儂智髙之裔居之元至元間立廣南西道宣撫司領路城等五州後來安路奪其路城上林羅佐三州惟領安寧及富二州本朝洪武中置廣南府親領編户六里領州一富州在府城東二百里元至元中置冨州及安寧州本朝初因之後以安寧州省入焉編户四里郡名廣南元名形勝山崖髙峻郡志山崖險峻道途﨑嶇一夫當隘百夫莫入其地險固若金城湯池風俗習俗儉約郡志其地多儂人沙人習俗儉約男女皆事犁鋤服短衣長𥚑構樓而居好食百蟲大鼠病不服藥惟務祭鬼而已嚚訟好鬬安寧州舊志州有鹽井之利嚚訟好鬬蠻俗之常山川牌頭山在府城西北五里峰巒起伏其右小山連峙如盾土民築寨其上蓮花山在府城東北二十里五峯連聳諸小峯參差傍峙形如蓮花祛丕山在冨州治西形如石獅昔土人結屋以避兵名獅頭寨玉泉山在冨州西北七十里山頂有泉飛流如素練下有石池清碧回旋溢流于西洋江者鷂山在冨州東南九十里髙可一百仞怪石槎丫西寧山在冨州東北一百一十里下有巖洞深邃土人隱遁其中西洋江在府城南八十里源出本府板郎山速部山木玉山三流相合東南入于田州府右江南水溪在冨州東三十里源出花梁山其水尚溫南汪溪在富州治西源出麻卯山暨僻令山流至州南合南水溪東行至石洞伏流十五里復出入于右江廣西府東至廣南府界四百五十里南至臨安府阿彌州界一百六十里西至臨安府寧州界一百八十里北至曲靖府羅雄州界五十里自府治至南京七千五百二十里至京師一萬九百六十五里石糧二千一百七十零建置沿革禹貢梁州之界古滇國東南境漢為益州牂牁郡地蜀漢屬興古郡晉郡屬寧州隋屬牂州唐時東㸑烏蠻等部所居為羈縻州𨽻黔州都督府大和間南詔蒙氏并其地宋時析為師宗彌勒二部大理段氏莫能制元憲宗時內附𨽻落蒙萬户府至元中置廣西路屬臨安廣西元江等處宣慰司本朝改為廣西府領州三師宗州在府城北八十里宋時㸑蠻居宕浪甸其後師宗者據匿弄甸號師宗部元初𨽻落蒙萬户府至元中以本部為千户總把領阿寧豆勿阿盧豆吳四十户屬廣西路後改置師宗州本朝因之編户一十六里彌勒州在府城西九十里宋時些麼徒蠻之裔據其地號彌勒部元初𨽻落蒙萬户府至元中以本部為千户總把領吉輸裒惡步籠阿欲四千户屬廣西路後改置彌勒州本朝因之編户一十六里維摩州在府城東南三百六十里元立維摩千户𨽻阿迷萬户至元中以本部為千户總把領維摩屈中二千户𨽻廣西路後改維摩州本朝因之編户五里形勝山谷幽阻雲南志東瞰廣西南距交趾舊志風俗質野富強雲南志生蠻四種曰黑㸑曰𤏡曰土獠曰白子其俗質野民強家富山川發果山在府治北培塿相接環于府治阿盧山在府城西三里延亘四十餘里南接彌勒州北跨師宗州舊有阿盧部吉輸山在府城東南五里恩容山在師宗州之五里三峯峭拔鍞北門山在師宗州北一十二里二峯髙聳經行其間如門英武山在師宗州東八十里峯巒峭拔髙可千仞祿德山在師宗州東一百二十里一峯尖秀髙來山在師宗州東三百里髙三百仞其西南三十里有馬者籠山髙如之卜龍山在彌勒州南五里峯巒重疊環于州治阿欲部山在彌勒州西一十里岡巒森列下有溫泉盤亘七十餘里東接北傾山盤江山在彌勒州東南一百二里東西兩山相峙盤江流其中東抵師宗州南界阿迷州其東有石竅深廣丈餘濁水湧出入盤江曲部山在維摩州治西中峯髙聳下有泉為溪流經州南數里入石竅萬年龍山在維摩州東北一百里下有泉成溪流入廣南府界小維摩山在維摩州東北八十里髙可千仞阿母山在維摩州東南九十里髙餘千仞寶寧山