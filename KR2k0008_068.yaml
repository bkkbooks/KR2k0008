脫衰麻黜陟使韋􅍬奏劔南孝子十六人讃諦為首宋羅承之巴州清化人幼雄特好兵略乾德中文協率衆攻閬巴承之竭資募士擒文協太祖召見賜感義軍節度使兼之巴州曽孫士堯事母以孝聞家産盡遺姪之孤者陳省華閬中人智辨有吏幹初事孟昶為西水尉蜀平歸宋纍官光祿卿拜諌議大夫卒贈太子少師袁廓劔州梓潼人為上蔡令課最擢太子右贊善好詆訐太祖以為竒士纍官鴻臚少卿被誣憤死上聞追悼之録其子丘賀為奉禮郎陳堯叟省華長子端拱三年進士第一纍官同平章事後以右僕射知河陽卒諡文忠堯叟偉姿貌奏對明辨久典機密軍馬之籍悉能周記所著有請盟録三集陳堯佐省華次子進士及第官至參知政事同平章事以太子太師致仕卒諡文惠為人寬厚儉約好學不輟善古𨽻尤工詩自號知餘子所著有文集三十餘卷陳堯咨省華季子咸平中進士第一纍官翰林學士後以武信軍節度使知天雄軍卒諡康肅為人性剛戻以氣節自任工𨽻書善射世號小由基子𫐠古篤學能文官至館閣校勘陳漸堯叟從子少以文學知名太宗時嘗與父堯封同廷試漸中第辭不就願擢其父許之後纍官耀州節度推官有文集十五卷自號金龜子王省劔州普安人召對稱㫖辭爵不受賜號清虛山人文同梓潼人以學名世操韵髙潔善詩文篆𨽻行草飛白又善畫竹蘇軾輩咸重之舉進士稍遷太常博士集賢校理歷知陵洋湖州所著有丹淵集四十卷蒲宗孟閬州新井人曾祖頴士聚書百餘家以訓子弟宗孟皇祐中進士纍官遷尚書左丞後以資政殿大學士知河中卒宗孟趣向嚴整而性甚侈汰蘇軾嘗勸其慈儉蒲卣南部人毋任知書里中號任五經卣幼開敏元豐中進士歷提舉京湖常平及提點潼川刑獄議稅𣙜不便朝廷從之纍官中大夫鮮于侁叔明裔孫性莊重力學舉進士嘗為利州路判官時方行新法諸路搔動侁獨公心處之蘇軾以為上不害法中不傷民下不廢親為三難後以集賢殿修撰知陳州子綽太學博士馬㳙南部人其父從政初未有子買一妾詢知其父母死不克葬故自鬻遂歸妾不責所負後夢一翁謝曰我妾父也聞之上蒼矣願君家富貴㳙㳙不絶及生㳙因以夢中語為名元祐中登進士第一人何求閬中人以宋涉隆苑記踈略乃裒次三十卷號閬苑記其後同縣曹無忌又增二十六卷雍孝聞閬中新井人元符末力詆紹聖用事者未幾廷試時相誣以詆毁先烈亟加流竄入元祐黨籍宇文百之新井人性孝友數世不異居庭前六燕同巢紫荆異本合幹人以為孝友之應蒲叔獻南部人舉進士為成都漕百姓歌曰運使姓蒲民力可蘇召為宗正卿韓托胄用事遂請去時論偉之黃裳劔州普城人幼能屬文乾道中進士纍遷禮裳部尚書兼侍讀卒贈資政殿大學士諡忠文端純孝友每講讀隨事納忠所著有春秋講義及兼山集嚴大猷閬州蒼溪人吳䂀僣蜀大猷詩云笏未到身難擊泚兵如入手易擒吳後以特奏名授隆慶府司理恭軍著補闕蜀都賦有方山集四卷楊巨源益昌人倜儻有大志善騎射誅叛將吳䂀功第一補承事郎後為安丙殺之贈寶謨閣直學士諡忠愍子履正為四川制置使本朝申克敬昭化人洪武中由太學生入仕才能著稱練達老成纍官河南右布政使徐璋劍州人洪武中由太學生擢貴州鎮逺府同知勤於政務遷河南按察司僉事烈女韓氏保寧人年十七元末遭明玉珍兵亂慮為所掠乃僞為男子服混處民間既而被虜居兵伍七年人莫知其為女子也後從玉珍兵掠雲南還邂逅遇叔父贖歸成都以適尹氏稱為韓貞女云仙釋張道陵初入蜀居鶴鳴山煉丹修道感老君授以祕録遂領弟子趙升王長來雲臺治復煉大丹服之漢永夀二年自以功成道著乃於半崖舉身躍入石壁中自崖頂而出因成二洞崖半曰峻仙洞崖上曰平仙洞是年九月九日將諸品祕録斬邪二劔玉册玉印授其長子衡乃與夫人雍氏登雲臺峯白日升天時年一百二十三嵗羅晏閬州人兒時牧山下見二道人奕晏捨牧觀之道人出囊中餅與之晏食已歸家覺腹中如燎因發狂纍日自是惟飲水數日不一食稍稍預言禍福無不驗宋宣和中賜靜應處士張浚延致軍中晏曰相公勿恐明日敵退果然加號太和冲夷先生蜀人相傳夀至一百七八十云順慶府東至䕫州府梁山縣界六百二十里西至潼川州鹽亭縣界一百四十里南至重慶府定逺縣界一百三十里北至保寧府南部縣界一百一十里自府治至南京五千五百六十里至京師八千八百二十五里糧七萬二千石零建置沿革禹貢梁州之域天文參井分野周為雍周之地春秋戰國時為巴子國地秦屬巴郡漢為充國安漢等縣地仍屬巴郡漢末劉璋分墊江以上仍為巴郡治安漢晉屬巴西郡劉宋析置宕渠郡隋省宕渠入巴西唐初地屬隆州尋析置果州治南充天寶初改南充郡乾元初復為果州大厯中又改充州尋復舊五代蜀置永寧軍節度宋初以州𨽻梓州路寶慶間升順慶府元置東川府又改為順慶路本朝改順慶府州二縣八南充縣附郭本漢巴郡充國縣地東漢析置南充國縣晉屬巴西郡劉宋置宕渠郡隋初郡廢改縣曰南充唐以縣立果州宋寶慶中為順慶府治元併漢初縣入焉本朝因之編户一十里西充縣在府城西七十五里本漢巴郡安漢縣地晉析置西充國縣屬巴西郡梁以縣置木蘭郡西魏廢郡改縣曰晉城隋因之後廢唐初復置改西充縣屬果州宋仍舊元併流溪縣入焉本朝因之編户八里蓬州在府城東北一百四十里本漢巴郡宕渠縣地晉屬巴西郡梁置伏虞郡治宣漢縣後周又置蓬州治安固縣隋州郡俱廢唐復置蓬州治大寅縣天寶初改咸安郡又改蓬山郡乾元初復為蓬州宋以蓬池縣為州治元初置蓬州路後復為蓬州治相如縣本朝以相如縣省入編户十里領縣二營山縣在州東