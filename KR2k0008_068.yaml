等得釋及曄代還太宗謂曰爾能活吾平民深可嘉也賜錢五萬冦瑊蓬州軍事推官李順餘黨謝才盛等復起為盜瑊設方略擒送京師王旦知蓬州清節著聞民被其澤崔立真宗時果州推官役兵輦官物道險乃率衆錢傭舟知州姜從革論如率斂法當斬三人立曰此非私己罪杖爾從革不聽卒論奏詔如立議凌䇿廣安軍判官勤於吏職處事精審有治迹李修孺知果州有治狀時稱善人蘇軾作詩以美之葛宫知南充縣有惠政時東川饑民艱食部使者檄宫守資昌兩州亦以惠政聞龔鼎臣知渠州渠故僻陋無學者鼎臣建廟學選邑子為生日講說立課肄法人大勸始有登科者郡人繪像祀之李大臨知廣安軍清整有守嘗上言青苖法有害無益王安石甚惡之陳咸知南充縣有能名嵗旱帥司免下户兩稅轉運使安節以為虧漕計咸言苟利於民違之不可安節從之邵伯溫知果州請罷嵗輸瀘南諸州綾絹絲綿數十萬以寬民力民受其惠裴德谷知蓬州有能政平居議法必以仁恕為本孔思齊知果州號為循吏郡人為立良牧碑馮澥知廣安軍有政判聲其後家願通果州有直名澥時為左丞薦偹諫列吳幾復知蓬州滿去父老拜庭下曰鄉民被使君之政久矣今聞還朝故來相别且歌曰使君來兮父母鞠我禮化行兮民無寒餓使君去兮不可復留人意悵悵兮淚雙墮虞允文知渠州州地埆民窶常賦之外又行加斂允文奏罷之逺民鼓舞劉儀鳯知果州初儀鳯為是州掾起居郎趙逵薦其富有詞華恬於進取及為知州有政績劉光世知果州嘗為東川節度推官召對論恢復事請以太祖用人為法及知是州趙汝愚薦之擢殿中侍御史李道傳蓬州教授開禧用兵金人窺散關急而吳曦復叛道傳痛憤見於形色密遺書安撫楊輔論曦必敗冝舉義討之曦黨來脅道傳道傳折之以義抗節不撓棄官而歸蘇植嘉定中知廣安軍建修壇廟政教畢舉軍治為之一新元馬䝉古岱至正間西充縣主簿時羣盜蜂起䝉古岱率合邑民於岷山築堡壘以障之民賴以全後為立祠祭之本朝富好禮洪武初為順慶府同知開立大小街衢布置郡邑坊巷核實户口清理田糧至今人頌其德菅時中洪武間西充知縣勸課農桑作興士類民有去後之思費文質洪武間營山知縣招流民闢田野存心公亷吏民不敢欺蔡彬永樂間大竹知縣初至誓于城隍神後果忠勤亷潔不負所誓民皆悅服嚴升永樂間為順慶府同知凡遇賦役必躬親審驗民無橫擾以亷著聞民皆慕之帥用昌永樂間南充知縣愛民如子藹然有豈弟慈良之化人物漢紀信安漢人為將軍事髙帝誑楚為項羽所殺宋時加封信誥詞云以忠狥國代君任患實開漢業使後世知君為重身為輕雖糜捐不避者侯有力焉馮緄巴郡宕渠人少學春秋司馬兵法安帝時舉孝亷纍官車騎將軍平長沙武陵蠻有功推於從事中郎賜錢十萬不受官至廷尉終于家鄉人立廟祀之弟允清白有至行子鸞舉孝亷為郎中元賀宕渠人嘗為九江沛郡太守所在著德吏民涕泣送之遷大司農為名卿陳禪巴郡安漢人仕郡為功曹舉善黜惡為邦內所畏後為漢中太守夷賊素聞其名即時降服順帝時拜遼東太守胸奴憚其威彊退還數百里禪遣吏卒往曉慰之單于隨使至郡禪為說道義單于懷服遺以胡中珍貨而去三國張嶷巴西南充國人漢昭烈定蜀嶷為都尉將兵討平山賊叛羌除越嶲太守及徴還夷民戀慕扶轂泣涕後拜蕩冦將軍與魏將戰殁越嶲民夷聞嶷死悲泣立廟祀之譙周巴西安漢人耽古篤學研精六經仕蜀漢至光祿大夫周有文武全才志在恢復所著有仇國論五經論定法訓古史考百餘篇子秀躬耕山藪桓溫薦之不應王平巴西宕渠人蜀諸葛亮征隴西平以牙門屬馬謖謖違亮指大敗於街亭惟平所領不敗纍遷漢中太守封安漢侯子訓嗣爵平同郡漢昌句扶忠勇寬厚數有戰功功名爵位亞於平官至左將軍封宕渠侯晉陳夀巴西安漢人少好學師事同郡譙周張華愛其才舉孝亷除著作郎撰三國志六十五篇時人稱其善叙事有良史之才又著耆舊傳十餘篇行於世閻纘巴西安漢人祖團為張魯功曹勸魯降魏封平樂侯父璞牂牱太守纘博覽墳典慷慨有大節仕晉以功封平樂鄉侯五子皆開朗有才力長子亨遼西太守李特巴西宕渠人其祖將五百家歸魏遷於略陽晉元康中關西擾亂特隨流人入蜀太安初自稱益州牧子雄遂稱帝雄寬厚簡刑約法時海內大亂而蜀獨無事百姓冨貴傳至孫勢為晉桓溫所平龎雄宕渠人始討荆揚亂賊有功永初二年南單于擅與烏桓反殺遼東太守耿䕫遣雄討之大破單于遷大鴻臚封都亭侯南北朝侯瑱西充人梁時纍平蜀賊後敗侯景有功遷南豫州刺史鎮姑熟又鎮豫章歷進司空太尉率兵敗王琳軍詔都督五州鎮益城尋以功封零陵郡公卒贈大司馬諡莊肅宋成象渠州流江人以詩書訓授里中事父母孝淳化中李順據郡縣象父母驚悸死象號泣營葬廬墓側日篩土三斗於墳上每慟聞者感愴虎豹環廬而卧燕百餘集廬中禾生墓側生九穗服終未還家知禮者諭之始歸教授彭任廣安軍嶽池人慶歷初冨弼使遼任與偕行道次語弼曰朝廷所為書詞萬一與口傳異將何以對啓視果不同弼即馳還朝更書而去何羣果州西充人慶厯中石介在太學羣自蜀至受業介館羣於其家使弟子推為學長羣愈自刻厲著書數十篇與人言未嘗下意曲從同舍目為白衣御史後歸不復出嘉祐中賜號安逸處士何涉南充人讀書晝夜刻苦自六經百家及山經地志醫卜之術無所不學一過目終身不忘舉進士纍官知合州遷司封員外郎卒涉長厚有操行未嘗談人過惡所著有春秋本㫖廬江集七十卷黎錞廣安軍渠江人慶厯中進士嘗為直講英宗以蜀士問歐陽修對曰文學有蘇洵而經術有黎錞雍鈞南充人治平中舉進士為御史臺主簿時章惇用事朝士滿門鈞獨不往惇怒出鈞知蓬州張天珏嶽池人嘗讀書於羊山之角竹洞元豐中舉進士纍官至諌議大夫彭戢渠州鄰水人元豐中舉進士第為兩浙提舉奉祠常蓄雙鶴江左士大夫送行有扁舟載雙鶴萬卷貯羣書之句張庭堅廣安軍渠江人元祐間進士調成都府推官韓忠彥薦為左正言踰月章數上訟司馬光吕公著之寃論蔡京章惇之罪薦蘇軾蘇轍之賢忤執政意謪官卒贈直徽猷閣諡節愍鄭修蓬州人年七嵗日誦萬言游太學登元祐進士知梁州軍祿有餘悉為小民代輸未及引年翻然而歸所居結茅扁曰飯牛菴卒年八十七何麗天南充人宦游中都久未得歸賦懷親十三篇如毛詩體隨表上進以求補外朝廷嘉其志詔嶺南逺官皆許迎養姚邦基嶽池人舉進士知開封府尉氏縣滿秩而劉豫僣竊邦基遂棄官去聚徒教授於家紹興中以薦改秩安堯臣渠江人宣和初上書論宦寺權臣唱議北伐臣恐唇亡齒寒徽宗嘉納詔補承務郎後又上書論女真不可結燕雲不可取書極抗直纍官至南平太守遊仲鴻南充人淳熙初進士知中江縣制置使京鏜等薦之召赴闕宰相趙汝愚甚重之時光宗以疾久不朝重華宫仲鴻遺汝愚書陳宗社計及孝宗登遐遂贊定大䇿後知嘉定有政績卒諡曰忠安丙渠江人淳熙間進士知大安軍吳曦叛丙設䇿誅之進資政殿大學士四川制置使纍遷至少傅卒贈少師封魯國公諡忠定所著有皛然集子癸仲知果州游似仲鴻子嘉定中進士纍官吏部尚書入侍經幄帝問唐太宗貞觀治效何速如是似推原以對淳祐中為右丞相兼樞密使自南充伯進爵國公卒贈少師諡清獻元文如玉順慶人少嗜學舉進士官至東路太守政平訟理禁暴戢奸吏民畏之號石山巴圖順慶人嘗受業於馮伯藥舉進士纍官四川都轉運使袁岱渠人幼聰敏博記能文延祐中舉進士為䕫州路大寧州判官有能名陳繼賢廣安人刻意為學寒暑無少間延祐中進士判懷逺府有亷勤公謹之稱本朝羅茂英儀隴人洪武中由太學生歷官勤慎聲譽著聞終河南按察司副使范循南充人永樂中進士擢監察御史能持憲體薦升貴州按察司僉事致仕王鐸嶽池人宣德中進士擢刑科給事遇事敢言升順天府丞卒于官烈女趙萬妻宕渠人名娥漢末鄉邑避黃巾冦走萬有足疾不能行娥扶之萬為賊所殺賊欲汙娥娥不從賊以矛擬之娥竦身刃貫心達背而死仙釋謝自然唐書貞元十年以女冠於金泉山白晝上升是夕郡郭有虹霓雲氣之狀萬日共覩爾朱洞少遇異人得道唐懿僖間抵蓬州客安漢館張氏十二年郡刺史以為惑衆命縛沉於江二漁人得之釋其縛三人白日升天而去明一統志卷六十八
