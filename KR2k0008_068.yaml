body:
  text: 明一統志卷六十八明李賢等撰保寧府東至䕫州府達縣界七百三十里西至龍安府界七百里南至順慶府蓬州界一百七十里北至陜西漢中府沔縣界五百九十里里自府治至南京五千九百里至京師一萬三百糧二萬石零建置沿革禹貢梁州之域天文井鬼分野春秋為巴國地秦惠王滅巴置巴郡漢巴郡治江州縣東漢末劉璋改為巴西郡晉巴西郡徙治閬中縣梁為北巴郡兼置南梁州西魏改南梁曰隆州又改北巴郡曰盤龍郡隋初郡廢州存大業初復改州為巴西郡唐復為隆州先天中改閬州天寶初改閬中郡乾元初復為閬州五代時唐置保寧軍宋初改安德軍元至元間升保寧府尋改為保寧路後復為府本朝因之領州二縣八閬中縣附郭本秦舊縣漢屬巴郡晉宋以來為巴西郡治以閬水迂曲繞縣三面故名隋改縣曰閬內唐復為閬中宋元仍舊其治舊在城東二十里本朝洪武七年移于此編户一十里蒼溪縣在府城北四十里本秦宕渠縣地東漢置漢昌縣屬巴郡晉析置蒼溪縣屬巴西郡劉宋併蒼溪入漢昌隋復改漢昌為蒼溪唐宋元仍舊本朝因之編户六里南部縣在府城南七十里本漢巴郡充國縣地晉屬巴西郡梁置南部縣以縣居巴西郡南故名西魏於縣置新安郡後周郡廢隋屬巴西郡唐宋俱屬閬州元省新井新政西水三縣入焉本朝因之編户九里廣元縣在府城北三百五十里秦為葭萌縣漢屬廣漢郡蜀漢改為漢夀縣晉改晉夀縣後魏改興安縣置晉夀郡及益州梁改黎州西魏復曰益州又改利州隋初郡廢後改縣曰綿谷州為義成郡唐復為利州又改益昌郡五代時唐改益州宋置寧武軍後置利州路元為廣元路本朝洪武九年改路為州以綿谷縣省入後復改為縣編户三里昭化縣在府城北四百里本漢葭萌縣地屬廣漢郡劉宋置益昌縣隋屬義城郡唐屬利州宋改為昭化縣元屬廣元路本朝改今屬編户二里巴州在府城東三百五十里古巴國地秦為宕渠縣漢屬巴郡後魏置巴州梁改縣曰梁廣及置歸化郡後周又改縣曰化城隋初郡廢後改州為清化郡唐復為巴州宋元仍舊本朝洪武九年改州為縣以化城縣省入尋復升為州編户一十四里領縣二通江縣在州城東北一百一十里本漢巴郡宕渠縣地後魏置諾水縣屬萬州隋為巴州始寧縣地唐析置通江縣又於縣置壁州宋省壁州以縣屬巴州元省入曽口縣後復置本朝改今屬編户六里南江縣在州城南六十里本朝新建屬巴州編户四里劔州在府城北三百二十里本漢廣漢郡梓潼縣地梁置安州西魏改為始州及置普安郡隋初郡廢州存後改州為普安郡唐復為始州後改劔州宋置普安軍紹熙初升隆慶府元復改劔州屬廣元路本朝以附郭普安縣省入改今屬編户三里領縣一梓潼縣在州南二百五十里本漢舊縣廣漢郡治此蜀漢置梓潼郡西魏改為潼川郡移縣於郡南三十里改安夀縣隋廢郡移縣於舊治改名梓潼屬普安郡唐屬劔州宋元仍舊本朝因之編户二里郡名巴西晉名閬中唐名形勝棧道千里通於蜀漢史記井絡坤垠界山為門唐栁宗元劔閣銘䦘中在劔南巴峽羣山磽確中宋董丕思政堂記郡在梁洋梓益之衝宋馮忠恕正㕔記前界關表後處劔北寧武志益昌於蜀最為都㑹宋陳恢題名記控蜀之吭四集之國綿谷驛記梁山之險蜀所恃以為外户劉儀鳯劔閣記風俗質直好義土風淳厚巴志其民質直好義土風淳厚有先民之流風地險民豪蜀檮杌民淳事簡宋李獻卿南樓記地大俗阜振文堂記山川錦屏山在府城南三里江南岸上峙兩峯花木閒雜故名一名閬中山一名寶鞍山宋陸游詩城中飛閣連危亭處處軒忩對錦屏涉江親到錦屏上却對城郭如丹靑蟠龍山在府城東三里望如龍蟠之狀後魏以此山名郡唐貞觀中侯氣者言西南千里外有王氣太宗令人入蜀次閬中果見山氣色葱蔚遂奏聞鑿破山脉水流如血今號為鋸山咸亨初嘗徙閬中縣於此山之側繖蓋山在府城北五里府之鎮山也中高而四下若繖然玉臺山在府城北七里唐杜甫詩閬州城北玉臺碧是也靈山在府城東一十里唐天寶中賜名仙穴其山一峯峭拔界嘉陵宋江之兩間杜甫詩所謂閬州城東靈山白者是也青崖山在府城東南一十里宋淳熙間有僧鑿佛像于青石間一名千佛崖文城山在府城東三十里峯巒聳列林木葱蒨中一峯拔出名𤣥都壇相傳漢張道陵授其徒符籙之所馬頭山在府城東南六十里以形似名重錦山在府城東一百三十里兩峯相對秀麗如錦天目山在府城東一百五十里相傳葛洪修煉之所山有二洞一曰天目一曰天溪唐杜光庭詩盤空躡翠到山巔竹殿雲樓勢逼天古洞草深微有路舊碑文滅不知年九州物像分簷外萬里煙霞在目前自是人間輕舉地何須蓬島訪真仙東龕山在巴州東又有南龕山在州南西龕山在州西北龕山在州北俱去州五里山上俱有寺王望山在巴州治北唐𤣥宗至此望宫闕故名又名王䝉山米倉山在巴州北五里平梁山在巴州西二十五里上平四圍石壁如城宋末嘗徙巴州治于此登科山在已州西五十里昔有人讀書于此而登科者因名小巴山在巴州東北二百九十里唐人詩最恨巴山裏清猿惱夢思卧龍山在劔州東二里山形蟠繞有如卧龍漢陽山在劔州北二里峯巒髙峻上插霄漢普翠山在劔州治西鶴鳴山在劔州東二里後人磨崖刻唐元結中興頌於其上大劔山在劔州北二十五里一名梁山山海經髙梁之山西接岷崌東引荆衡劉儀鳯劔閣記云梁山之險蜀所恃以為外户即此其山峭壁中斷兩崖相嶔如門之闢如劔之植故又名劔門山小劔山與大劔山相屬秦欲伐蜀而道不通乃作五石牛以金置尾下言能糞金欲以遺蜀蜀王負力而貪乃令五丁開道引之秦因滅蜀大劔雖號天險徑路頗夷小劔則鑿石架閣有不容越者五子山在劔州西北五十里五峯竒秀如拱立然南山即南部縣之主山蜿蜒鬱蒼環繞縣治一名跨鼇山宋端平以來厄於兵縣無定治寶祐中始移縣治於此隆靈山在南部縣南二十里其山面嘉陵背西江絶頂有七曲祠禹跡山在南部縣東三十里舊傳禹治水經此故名山有寺因崖斫石為重佛像層樓覆之泉出其趾清泠可愛山頂平衍有小石泉龍樓山在南部縣西南五十里峯頂峭拔衆山拱揖洴溪環繞其下離堆山在南部縣東南五十里蜀有三離堆此其一也唐顔真卿磨崖記謂此山斗入嘉陵江直上數百尺形勝縮矗上峥嶸而下洄洑不與衆山相連屬是之謂離堆東面有石堂故京兆尹鮮于仲通所鑿堂北磐石上有九曲流杯池蘭登山在南部縣西八十里三面峻絶俯臨西江漢嚴君平嘗隱此山有君洞洞有君平像又有觀曰崇福觀思依山在南部縣西北一百四十里中有東西二觀東觀有峻仙洞搗藥臺浴丹井煉丹爐西觀有平仙洞搗藥曰卓劔穴圍棋局相傳漢羅冲霄張道陵依此山修道故名小錦屏山在蒼溪縣南與府城南錦屏山頗相似故名大獲山在蒼溪縣東南三十五里髙四百下宋淳祐中閬州嘗徙洽於此雲臺山在蒼溪縣東南三十五里高四百丈山峯峻峭插天一名天柱即漢張道陵升仙處宋建永寧觀有洞曰麻姑芙蓉平仙峻仙池曰浴丹玉魚巖曰松根蟠桃乂有九轉亭丹竈尚存山多榕柏有一絶大者中空可坐數人旁有亭名魁柏紫陽山在蒼溪縣東三十五里一峯屹峙髙入青雲方山在蒼溪縣東八十五里逺望如几案之狀古方州城也馬鞍山在蒼溪縣東一百五十里以形似名壁山在通江縣治西古壁州以此為名秋錦山在通江縣治南隔江望之如錦歌籟山在通江縣治東山上舊有石鼓擊之聲聞數里連擊即雨得漢山在通江縣東一百二十里其上石壁如城中平可容數百人牛頭山在昭化縣西二十五里以形似名長寧山在昭化縣西南九十里九曲山在昭化縣西九十里山勢盤回九曲龍門山在昭化縣西一百四十里一名葱嶺石穴髙數十丈如門故名烏奴山在廣元縣治西嘉陵江峭壁如削昔有李烏奴于此修寺因名其山石燕山在廣元縣西北八十里山極高峻梯格乃能登之獠人恃此為阻潭毒山在廣元縣北九十里鳯凰山在梓潼縣治東峯巒起伏狀若鳯凰長卿山在梓潼縣治西南舊名神山唐明皇幸蜀見山有司馬相如讀書之窟因改名長卿山五婦山在梓潼縣北一十二里相傳秦惠王遺蜀王美女五人蜀王遣五丁力士迎之至此五丁踏地大呼五女並化為石故名七曲山在梓潼縣北一十五里山腹有路盤轉七曲兜鍪山在梓潼縣東南二十里羣峯列勢有如兜鍪之狀葛山在梓潼縣北二十里漢諸葛亮嘗屯營此山因名鴈門山在梓潼縣南三十里東西起兩峯鴈從中過馬閣山在梓潼縣北一百二十里峻峭崚嶒極為艱險魏鄧艾伐蜀懸車束馬由此出江田因名大巴嶺在通江縣東北五百里與小巴嶺相接世傳九十里巴山是也白衛嶺在昭化縣西南五十里與劔門相接唐𤣥宗幸蜀登此漫天嶺在廣元縣東北三十五里山極髙聳有大漫天小漫天二山唐羅隱詩西去休言蜀道難此中危峻已多端到頭未㑹蒼蒼色爭得禁他兩度漫一名藁本山朝天嶺在廣元縣北六十里七盤嶺在廣元縣北一百七十里一名五盤嶺唐杜甫詩五盤雖云險山色佳有餘仰淩棧道細俯映江木踈地僻無網罟水清反多魚好不妄飛野人半巢居喜見淳朴俗坦然心神舒東郊尚格鬬巨猾何時除故鄉有弟妹流落隨丘墟成都萬事好豈若歸吾廬雪峰在巴州東二十五里衆山之中此峰特出十二峯在巴州北四百里馬盤灣巉巗聳秀大小十二峰最為竒觀有題云插立翠峰屏十二為君喚作小巫山南巖在府城南錦屏山後一名台星巖宋陳堯叟兄弟肄業之所又城東有東巖城北有北巖俱去城五里靈城巖在府城東六十里比他巖最深邃巗上有滴乳為水珠石上有雙竹痕長尺許仰觀枝節儼然停雲巗在南部縣北二里宋李燾詩路轉層岡二里餘武陵傳者亦難如昔年煉藥仙人室今日餐霞道士居洞外蟠桃開錦繡巖前丹溜潄瓊琚猗歟靈氣為時雨可惜圖經闕不書秀巗在劔州城西有泉清潔可愛龍巖在劔州北七十里洞穴可坐百人蜿蜒如龍盤之狀州治西亦有龍巖可坐百人書巖在蒼溪縣雲臺東乃葛稚川讀書之所有稚川像在焉靈雲洞在南部縣東北外邃中廣冬暖夏涼入三丈許踏之有聲如鍾叩之亦然龍洞在王望山之巖腹間世傳太守景箎以旱禱雨有應作靈甘洞記尚存西逰洞在巴州北一百八十里嵌嶔竒怪嘉陵江源出陜西鳯縣嘉陵谷經廣元昭化過劔州至保寧府其曰閬水巴水渝水漢水皆此江之異名唐杜甫詩嘉陵江色何所似石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童蕩槳欹側過水雞㗸魚來去飛閬中勝事可腸斷䦘州城南天下稀宋江源出陜西漢中府舊亷水縣經蒼溪縣東流入嘉陵江巴江源出大巴山至巴縣東南分為三流而中央橫貫勢若巴字流二十里合清水江至合州與嘉陵江合又名字江唐李逺詩巴江學字流清江源出廣元縣前通平鎮歷舊思陽縣至巴縣與巴江合白水江源出陜西階州亂山中至昭化縣北合嘉陵江唐溫庭筠詩淡然空水帶斜暉曲島滄江接翠微清水江源出清川縣至安昌合白水入嘉陵江涪江源出西羌從漁溪寨南經江油至劔州南入綿州界清漪江源出落叢山至龍鼻山㑹六溪水至彰明縣會于涪江潼江水源出莒溪經梓潼縣西南入涪水小潼水源出劔州武連廢縣北七十里經梓潼縣流入嘉陵江揚帆水在劔州隂平廢縣西四十里與潼水合流泛漲奔注望之有如揚帆之勢龍灘在通江縣東二十里俗傳嘗有龍出水為馬躍今石上有