body:
  text: 明一統志卷八十明李賢等撰南雄府東至江西贑州府信豐縣界二百四十里西至韶州府曲江縣界一百四十里南至贑州府龍南縣界三百里北至江西南安府大庾縣界八十里自府治至南京三千三百里至京師六千七百四十五里糧三萬五千石零建置沿革禹貢揚州之域天文牛女分野戰國地属楚秦属南海郡漢兼属桂陽郡三國呉置始興郡治曲江此地属焉劉宋属廣興郡齊復属始興郡隋属廣州唐初属韶州南漢置雄州宋為南雄州𨽻廣南東路宣和中錫郡名保昌元改置南雄路本朝洪武初改路為府領縣二保昌縣附郭本晉始興縣地属始興郡隋属廣州唐属韶州光宅初割置湞昌縣南漢以縣置雄州宋改保昌縣為南雄州治元仍舊本朝因之編戸四十四里始興縣在府城西一百一十里本漢南海郡地呉置斜階縣属始興郡齊改為正階縣梁更名始興隋属廣州唐属韶州南漢属雄州宋属南雄州元仍舊本朝因之編戸七里郡名淩江因淩皓得名詳見名宦保昌宋名形勝東廣要區圖經眷始興之列壤實東廣之要區控帶羣蠻重脩城記州獨以雄名蓋以其控帶羣蠻襟㑹百越傑然峙於一隅兩路喉襟宋通判題名序南雄古郡兩路之喉襟由東度嶺而南由南度嶺而東足跡所接舟車所㑹其地望甚重焉山川明麗元重脩路學記風俗俗雜夷夏雄州題名序鑄銅為鼓通典欲相攻擊則鳴此鼓到者如雲家有鼓者號為都老婚娶以檳榔為禮郡志人强吏懦寰宇記南方遐阻人强吏懦豪富兼并役属貧弱俘掠不忌工無巧技商無厚資圖經青紫相属宋洪勲學記本朝以来操翰墨以取青紫者比比相属病不服藥郡志病則不服藥止祭鬼求福雖傾貲亦不惜山川府案山在府治南今山川壇在其下三峰山在府城西一十里又名筆架山巾山在府城北三十里府之主山也其形如巾青嶂山在府城東南四十里翠阜屹立松檜隂翳有神仙隠几一鍋似玉琢成瀑布潺湲相傳有石鍋龍王居此嵗旱有禱輒應馬鞍山在府城東八十里有馮氏一姓居其下僅百餘室登仕版者甚衆人以為兹山靈秀所鍾天峰山在府城北八十里其形陡峻髙插霄漢元季鄉民多避兵其上龜湖山在府城東南一百二十里山上有湖云有五色靈龜生其中嵗旱禱雨有應油山在府城東一百二十里髙數千仞其勢突兀傍有一小穴出油人多取以為利洪崖山在保昌縣東上有洪崖庵元彭菊莊詩脩竹茂林山上寺瘴烟炎日嶺南秋丹鳯山在始興縣西北五里相傳梁天監中有鳯翔其上因名謝公山在始興縣南三十里峯蠻聳拔視他山為獨髙昔有姓謝者脩道其間故名白牛山在始興縣東南三十里其勢昻然與謝公山連脈九姑山在始興縣東六十里下有九姑廟凡水旱疾疫民皆禱焉桂山在始興縣北一百里唐張九齡故宅傍陵谷深邃桂樹森列清香襲人天柱峰在始興縣西二十里峭秀竒拔無支峯贅阜屹然撑天相傳梁天監中九鳯翔集峯上又名九鳯山大庾嶺在府城北八十里漢兵擊吕嘉有禆将姓庾者戍此故名以其多梅亦曰梅嶺蒼翠疊巘壁立峻峭往來艱於登陟唐張九齡開鑿成路行者便之上有雲封寺傍有白猿洞小庾嶺在保昌縣東楊歴巖在府城西北二十里山顛方廣百餘丈前後皆竒峯怪石飛泉㵼空巖畔有龍祠仙女巖在府城東北二百里闞象山杉檜鬱翳泉石潺湲中有二仙像謂秦時二女子避地於此得道飛昇龍王巖在府城東一百一十里其巖方廣二丈詩古詩云坐石不知地出巖方見天玲瓏巖在始興縣南一十里平地石峯髙聳中有三石室相傳葛洪嘗煉丹於此羅漢洞在府城東梁天監中有羅漢現像踰旬忽不見放鉢石在雲封山側髙數尺相傳唐僧盧能放鉢其上宋章得象詩石上曽經轉鉢盂石邉南北路﨑嶇行人見石空嗟嘆還識西来意也無淩江水在府城西源出百順都丈山下流合昌水至城西合湞水宋天禧中保昌令淩皓建陂其間故名章得象詩淩江清淺遶城流庾嶺南邉第一州湞水在府城南又名保水源出上朔都至峸西南合淩江水環抱郡邑如襟帶鰱水在府城西一十里源出淩江其流㑹于保水春多鰱魚故名脩仁水在府城南三十里齊范雲為始興守至此酌水而飲因賦詩云三楓何習習五渡何悠悠長圃水在府城東北四十里源出梅嶺流合湞水昌水在府城北六十里合淩江水流入于海肥水在始興縣西南一十五里源出曲江縣雲溪嶺下東北合斜階水墨江水在始興縣西一十五里源出韶州府翁源縣界下流與湞水合官石村水在始興縣西一十五里源出翁源縣界下流合清化水又合大江而注之海涼水在始興縣東南二十七里自贑州信豐縣界竹嶺分流合階水杜安水在始興縣東北三十八里源出信豐縣深窖鐵子源至縣界西流合保水朔水在始興縣東一百里源出江西贑州龍南縣界下流與清化水合月朔即漲至晦即減因名朔水躍溪水在始興縣東一百里源出龍南縣流合湞水斜階水在始興縣南一百三十里源出韶州丹桂嶺流至縣西與湞水合清化水在始興縣南一百五十里源出翁源縣界下流與朔水合龍鬚潭石鑊潭在府城東五十里二潭相望其深莫測世傳有龍蟄其下嵗旱禱雨輒應温泉有三一在府城西北一十五里一在府城南三十里一在府城東南五十里雖嚴冬水亦熱人多浴焉霹靂泉在大庾嶺下雲封寺東其泉湧出石穴甘冽可愛相傳昔大鑒禪師得法南歸卓錫于此又名卓錫泉宋張士遜詩靈蹤遺㡬載卓錫在髙岑妙法歸何地清泉流至今苔花生細細雲葉暎沈沈桂魄皎清夜分明六祖心洗鉢泉在始興縣西連城寺相傳傅大士雲逰至此滌鉢因名白蓮池在種玉亭下五雲瀧在府城西四十里羣峯險峻泉水潺湲飛流曲折髙下成潭深不可測葉陂在保昌縣北知府葉景瀧開土産鍾乳石斛蒸紗布蕉布嫰石琢之可以為釡單竹土人練為麻可以為布石墨出始興縣南五里小溪中長短巨細似墨人或取以畫眉故又名畫眉石公署南雄守禦千戸所在府治西洪武元年建學校南雄府學在府城東門外宋建本朝洪武二十年重建保昌縣學在府學前元建本朝洪武三年重建始興縣學在縣治西本朝洪武二十四年建書院孔林書院在府城東一百里唐憲宗時曲阜孔戣為嶺南節度使因家焉後孫振玉始建書院宫室叱馭樓在大庾嶺上宋余靖詩層巔突兀與雲平賢者新題叱馭名為要澄清歸治道不辭艱險表忠誠梁太子書堂在始興縣南相傳梁昭明大子往尋傳大士聽講因寓此張九齡書堂在始興縣南一百里九齡未仕時所建其地山明水秀凡几席之類皆琢石為之至今遺址尚存瑞相堂在府治内宋守章公得象入相時有瑞蓮之異故名後守李著景慕之改曰景郇堂堂之西有秀野亭四并堂在府治内宋郡守潘俠作公謹清通四箴因以名堂推官張頊有記靜春堂在瑞相堂東宋郡守李著建取程伊川静則萬象同春之義望逺亭在府治西北宋章得象建外有凝紫拄笏捲雨三軒郭祥正詩城角危亭四面開塵侵丞相舊時牌淩江欲轉鯨魚活荔子成隂玉樹埋種玉亭在府治内章得象建對峙淩江旁有一小池環植白蓮為一時逰玩之所其北有挹翠亭來鴈亭在大庾嶺北宋余靖詩南方舊説無鴻鴈嵗序嚴凝亦暫来天外每隨寒雨過春前先逐暖風回通越亭在大庾嶺南余靖詩嶠嶺古来稱絶徼梯山從此識通津望安亭在府治東五里章得象詩惟有梅花報春早雪中傳信過江干八卦亭在瑞相堂後池中宋章得象建後改為聽雨亭三松臺在府城東三里其地隆然髙阜上有松三株蒼翠如蓋淩江館在府城南市舊為社壇宋郡守宋价建以延往来士夫於此關梁秦闗在府城東北四十里南康記大庾嶺横浦有秦時闗後為懷化驛梅闗在大庾嶺上兩崖壁立最髙且險宋章穎詩兩州南北䕶梅闗盡日人行石壁間元巴延詩馬首曽經庾嶺歸王師到處悉平夷擔頭不帶江南物只插梅花一兩枝太平橋在府城南湞江上亦名萬夀橋清泰橋在府城西二里淩江上駟馬橋在府城東三十里邑人顧希甫與子衮相繼登科後同還鄉經過此橋故名鳯凰橋在府城東北四十里宋景徳中有鳯凰集于溪岸故名青石橋在始興縣西二里水口橋在保昌縣東五里竹笪橋在始興縣西南三十里元泰定中建寺觀仁夀寺在府治東三里前有古榕一株隂覆數畆延祥寺在府城東二里殿西有塔嘗現三影雲封寺在梅闗側宋張士遜漕廣東過此有詩百越回轅度翠㣲全家還憩白雲飛白雲知我帝鄉去旋拂征鞍也要歸連城寺在始興縣西南三十五里上封寺在始興縣東南三里即古興國院花林院在府城東八十里元劉淵詩落花春已暮門開白雲来階前一片石風雨留莓苔𤣥妙觀在府城東三里鶴鳴觀在府城東九十里宋元豐中有白鶴翔集故名祠廟張文獻祠有三一在府學西一在大庾嶺雲封寺前一在始興縣學西宋元間建祀唐宰相張九齡何公廟在府城東三十里亡其名後周時為廣東叅軍徃征南海死于賊鄉人為立祠宋熈寧間贈侍御清海軍使五忠侯廟在府城西北一里宋紹定中建五侯謂周劉張及二鍾亡其名俱洪州人嘉定中李原竊發郡守趙善偰禱祠下賊遂遁境賴以安賜額曰孚應本朝正統十一年重修四先生祠在府城東二里宋寳慶中教授三山陳應龍建以祀周子二程子朱子真徳秀作記忠孝祠在保昌縣治後宋嘉定中江西洞冦犯境郡守趙善偰提兵督戰其子汝振與司法黄樞俱死後人為立祠梁侯祠在保昌縣東一百里地名黄團宋嘉定中洞冦犯境摧鋒將梁滿戰死提刑廖徳明謂其忠勇可尚立祠祀之嚴塘廟在府城北六里後周時陳將軍討南海賊戰死人為立廟洪武中重建陵墓鼻天子墓在始興縣不知何代相傳昔有人掘之見銅人數十擁笏列侍器飾皆金銀俄聞墓内擊皷大呼懼弗敢取而返間口重往掩封如故地出鉛銅銅有毒鉛可為藥古蹟六祖塔在大庾嶺上凡七級相傳為六祖大師塔二仙壇在大庾嶺上舊傳劉許二仙煉丹於此今壇側有仙茅大庾嶺嫗家宋盧多遜南遷度大庾嶺憩一小家其嫗頗能言因問之則曰我中州仕族有子官亦顯為宰相盧多遜挾私竄以死多遜中懷毒螫當犯法禁我且留此嶺俟其過嫗固不識多遜而多遜之行甚窘即倉皇避去畦桑園在保昌縣東洪武中知府左孟誠築名宦漢楊僕武帝時為樓船將軍擊南越出豫章下湞水今保昌縣有樓船水即其地宋查陶太宗時知南雄州地當衝險民雜夷夏陶至風俗為之丕變淩皓天禧時知保昌縣興水利開導江水民感其徳至今號曰淩江張士遜真宗時以江南轉運使徒廣東至南雄奏除苛政蠲戸役十餘事蕭渤皇祐中知南雄州預築城以禦儂冦渤精敏過人不撓於劇民安其政及代民借留之鮑軻廣東提刑皇祐中儂智髙反軻駐南雄擊賊有功范處厚大觀中知南雄州時舉八行廣東十五郡無應者惟處厚切意搜求得譚煥歐陽珏許孜三人以其行聞黄庶嘉定間知南雄州詢民疾苦増修淩連二陂邦人利之及去民不忍釋黄宬紹定間知南雄州敦尚教化初乆旱宬至禱而有感雨三日嵗大熟民苦賦役之重奏蠲之邦人為立生祠元張搏霄南雄路總管為政清慎有為興修學校民懷其惠楊益南雄路總管為政安祥務禁淫祀興利剔蠧不受私謁父老悦之孫三寳至正間同知南雄路事㢘介愛民既代父老擁馬留之咸埀泣焉本朝左孟誠洪武中知南雄府因城東隙地築桑園十畝教民種桑自是民皆知以養蠶為業葉景龍洪武初南雄知府見城西河塘村地乾旱築陂引淩江水漑田民受其惠號曰葉公陂宋玒永樂中知南雄府為政公嚴吏民敬畏邑苦