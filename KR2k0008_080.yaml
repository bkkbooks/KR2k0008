之帥此豈非叅天地關盛衰浩然而獨存者乎又云公之精神能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鏄李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上蓋公之所能者天也其所不能者人也始潮人未知學公命進士趙徳為之師自是潮之人皆篤於文行延及齊民至于今號稱易治信乎孔子之言君子學道則愛人小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉二相祠在府城北唐相李徳裕宋相趙鼎俱謫於此後人慕其徳望因立祠九賢祠在湖山宋慶元間建以祀趙徳林巽之許申盧侗劉允呉復古張䕫王大寳凡八人後増姚宏中為九賢宋廖徳明有讃馬侯祠在金山祀宋死節臣馬發元周伯琦作記賢守祠在府學祀曹登黄定丁允元陳宏規林㟽沈杞黄自求曽噩孫叔謹陳圭常禕陵墓王大寶墓在府城東北四十里劉昉墓在韓山後陸秀夫墓在府城南八十里海中嶼上石碑尚存秀夫宋宰相立衛王於崖山及崖山破乃仗劒驅妻子入海即負王赴海死古蹟廢梅州在程鄉縣南漢置恭州宋改梅州元因之本朝省越王走馬埒去府五里其上平坦可容數百人熙春園故址在西湖山北拙窩在文惠堂下舊名遙碧宋廖徳明更今名朱文公書扁并周濓溪拙賦刻巖石間左右多前賢刻字名宦唐李臯為衡州刺史法成令脩觀察使誣奏貶潮州刺史常衮潮州刺史建學校勸農桑士民化之風俗一變韓愈潮州刺史問民疾苦皆曰惡溪有鱷魚食民畜産且盡愈令其属秦濟以一羊一豚投溪水為文而告之是夕暴風震雷起溪中鱷西徙六十里民賴以安又命進士趙徳為師以教學者自是潮人皆篤於文行鄭餘慶由宰相貶潮州司馬以詩自娯不以逺謫介意李德裕由宰相貶潮州司馬過惡溪有詩風雨瘴昬蠻海日烟波魂斷惡溪時嶺頭無限相思淚泣向寒梅近北枝宋陳堯佐通判潮州脩孔子廟作韓文公祠以風示潮人以鱷魚食人命吏督漁者網而得之鳴鼓告其罪戮之於市人皆驚異王滌知潮州凡養士治民一以韓愈為師民心悦服乃出令新愈廟民讙趨之劉安雅紹興中知梅州䖍賊陳顒等圍城安雅命取人吻草研汁投酒散於民居賊遣人齎牒索金銀安雅遽碟之盜入民居縱飲死者百數賊疑懼遁去圍遂解方漸知梅州所至以書自隨積至數千卷皆手自竄定就寢不解衣林光朝質之荅曰解衣擁衾㑹有所檢討則懷安就寢矣増四壁為閣以藏其書榜曰富文洪天錫潮州司理居官清介臨事是非不可回折州有勢家奪民田者天錫言於守還之牟卿濚知潮州脩學養士除盜去奸邦人徳之祠于學宋敦書知潮州一日溪流洶湧隄決而西乃築隄八十餘里民免其患林㟽知潮州愛民如子州有白丁錢民坐是失産㟽奏罷之又置田得税以充養士之費構濟川橋以便人之往来惠政甚多孫叔謹知潮州公勤自勵創橋築堤又嘗奏罷貧民鹽役人懷其惠為立生祠祀焉許應龍知潮州時盜起贑州漸逼境上應龍亟調兵分扼要害明間諜謹闗隘㫁橋開塹區畫有方盜不敢犯旣而僚属以盜平請上功應龍曰守職扞城保民何功之云謝去日闔郡遮道泣送元安通潮州路同知嘗溪水暴漲沒民居安通黙禱願以身代民死湏臾水息民賴以全又嘗曝於炎日中禱雨雨遂大至其精誠感格如此馮惟吉梅州知州百廢具興民歌其徳政本朝梁觀廣東僉事分巡潮州幾一載㢘介剛果決獄如神㑹天乆旱齋沐禱神雨下如注沒於官潮人哀思之塑像於韓山書院裘賢潮州通判為政勤愛民篤民退則杜門以絶私謁嘗出勸農釋冠帶執農具以耕其妻饁之其年大熟人皆以為勸農所致㑹伯良永樂中知海陽縣視篆後立牌於城隍廟曰有外施仁義内藏禍心者神必殛之又書清白傳家四字于寢室民愛之如父母及滿去父老持禮幣贐之一毫不取艾彭潮州同知㢘潔如水處心公恕嚴課學校嵗旱禱雨即應滿去民皆擁道至今潮人思之流寓劉安世大名人宋諌議大夫言事無顧避紹聖初貶徙梅州章惇蔡卞必欲置之死諷使者脅使自裁又擢一土豪為轉運判官使殺之將至梅人皆懼安世色不動對客飲酒談笑又徐書數紙付其僕皆經紀同貶當死者忽報判官嘔血而斃安世得免凡投荒七年逺惡地無不歴之蘇軾以為鐵漢趙鼎解州人紹興中名相為秦檜所惡出知泉州及歸上書言時政檜諷中丞王次翁劾鼎累責清逺軍節度副使潮州安置在潮五年杜門謝客時事不掛口有問者但引咎而已林興祖本朝三山人洪武初從父宦逰遂家海陽為人簡重少有大志苦學不輟事母至孝後以才行舉歴官工部郎中廣西叅議調交阯卒所著有棠隂清趣集人物南北朝程敀南齊程鄉人或云隋人為人悃愊無華性嗜書不慕榮達人服其行義有不平者不詣官輒質成於敀縣之得名自敀始唐趙德潮州人舉進士沈雅專静通經有文章能知先王之道其論説排異端而宗孔子韓愈刺潮請置鄉校命徳為師邦人知學自此始今郡學韓愈廟皆祀之號天水先生宋許申潮陽人大中祥符間陳堯佐倅潮與語竒之及觀所為文益器重其才真宗東巡獻賦頌召試學士院擢第一授校書郎知鄴縣歴官廣西等路轉運副使嘗言事極詆時弊有直臣風所著有髙陽集許族居官者三十有八人申其始云林從周潮州人登進士第累官浙東提點刑獄林之族列於衣冠者十有七人從周其始也及卒其婿余靖銘其墓林巽海陽人天聖中應材識兼茂明於體用科對䇿鯁切忤權貴有司不敢収慶厯中投匭論事仁宗異之官以徐州儀曹不就南歸讀易自著一書曰卦𤣥卦緯易辭卦經起律吹管範餘叙和凡八篇號草範先生盧侗海陽人蔡抗以經學薦之授國子監直講熙寧初上封事力論王安石新法害民請補外出知栁循二州以太子中舎致仕侗行實樸茂學術優深為鄒里推重云陳希伋掲陽人未第時薦太學生馬錫有文武才乞擢用錫後立功人以希伋為知人嘗上書陳利害數萬言皆切時病元佑中以經明行脩舉第一擢知梅州奏免供應州人徳之劉允海陽人登紹聖進士為循州户曹悉革宿弊遷程鄉令止民折納舉知化州能辨呉川民寃獄後除循新二州不就允於諸書靡不該貫所著文二百餘篇子昉仕至龍圖閣學士張䕫海陽人政和中進士為茂名令辨民寃獄太守致疑䕫投告身去太守勉留之諸司列薦謂南中清介惟䕫一人髙宗賜璽書勉勵後通判亷州秋毫無取其子昌裔亦通判容州父子並以清節聞王大寶海陽人㳺太學有文名建炎初廷試第二差監登聞皷院奉祠趙鼎謫潮大寳日從講學後知連州張浚亦謫居命子栻與講學尋改知袁州召為國子司業孝宗時遷禮部侍郎諫議大夫上疏劾宰臣湯思退主和誤國罪改兵部侍郎後竄思退復召為禮部尚書李關海陽人早喪父事母至孝通春秋餘經諸子皆知其大畧隠居不仕以教授郡邑子弟貧者助其筆札尤精醫術鄉人賴之號北源先生有文集馬發海陽人徳祐中為摧鋒寨将署州事州人稱為安撫使元兵逼潮城守令懼走發獨慰勞士卒堅守不屈戰敗服鴆死後人哀其忠節立祠祀之本朝周彦器潮陽人㓜孤母憫其聰慧自訓之暨長精通經史洪武中以才學舉赴京師擢大理評事遷河南布政司叅議卒林祖潮陽人家貧讀書早孤遇冦亂失母弟所在遍歴郡縣訪覔至梅州山中得見為獠人所阻祖乃潛赴梅州訴之得還相離十有四年矣人以為孝誠所感洪武中有司上其事賜衣九套鈔千貫官終河間府通判蘇福潮陽人㓜頴悟絶人出口成章若有神助年八嵗時嘗賦月詩其初一夜月詩云氣朔盈虛又一初嫦娥底事半分無却於無處分明有恰似先天太極圖他作皆稱是年十四卒薛侃揭陽人正德丁丑進士授行人以言落職徙王陽明逰雖處困講學不怠兄俊舉于鄉弟僑舉進士俊子宗凱亦舉進士擢給事中所著有研幾録志畧楊士德潮人偕弟士鳴俱受學於王陽明篤志聖賢毅然任道之器志略仙釋大顛姓楊氏初居羅浮山後歸潮陽靈山唐韓愈云潮州有一老僧號大顛頗聰明識道理故自山召至州郭留十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自胸中無滯礙以為難得因與来往及祭神海上遂造其廬及来留衣服與别慧元姓倪氏潮州人削髮至京師有法嚴圓明法師者見而異之臨終升座説偈云五十五年夢幻身東西南北孰為親白雲散盡千山外萬里秋空片月新明一統志卷八十
