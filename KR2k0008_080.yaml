民何卒死其難邑人哀之立祠祀焉趙善譩知循州禮士䘏民病涉者為之架梁屋茅者易之以瓦凡可以為循人利者靡不究心邦人徳之立生祠宋詡知循州始知勞軍平冦簡徭薄征通商裕民流移復業開渠建橋美績大著循人立生祠于學趙彦班知循州為政平恕時省檄敷糴彦班為申減五千斛轉輸之費斂不及民學宫圯捐金錢新之民困於役者悉𨽻于學以供營繕咸得其蘇去之日士民留像祠之朱挺知循州行鄉飲而習民以禮舉課試而勉士以學新蘇陳祠宇以勸郡人適外冦過循挺指麾兵卒捕而俘之殆盡元羅敬甫元統中監博羅縣事為政本於愛人重脩學宫討平冦賊民徳之本朝萬迪洪武初惠州知府在任興廢舉墜不受私謁有利於下郡人莫不思慕之陳敬洪武初龍川知縣時盜起為患民不聊生都司官欲統兵来勦敬與邑人謀請先圖之密遣人誘其首下山擒之不費升粮不損一卒民賴以安林和洪武中博羅知縣為政寛恕不尚鞭朴増脩蘇村堤以防水患民受其利孟成洪武中河源知縣梗介亷勤賞罰明信尤留心於學校暇日考校諸生優劣多底于成鄧文張河源知縣奉公守法勇於有為先是草冦作耗人民流移土地荒蕪文張奏除田米六千餘石由是流民復業咸獲其安葉允吉洪武中博羅縣主簿亷静寡欲人不敢干以私雖菓菜亦無所受流寓趙師雄隋開皇中遷羅浮一日天寒日暮於酒肆旁舎見美人淡粧素服出迎時月色㣲明師雄與語言極清麗芳香襲人因與扣酒家門共飲少頃一緑衣童子笑歌戲舞師雄醉寢乆之東方已白起視在大梅花樹下有翠羽嘈啾相顧月落參横但惆悵而已張錫唐武后時為相請召還廬陵王不為張易之所容流循州梁悦唐富平人以報讎殺人韓愈議不許殺人則傷孝子之心許之則人將倚法顓殺乃流悦循州韓紃宋紹興中任澧州推官上書排和議知州李紹祖得其副本繳納秦檜以為動搖國是謫循州蘇軾眉州人宋紹聖初御史論軾掌内外制日詞命譏訕遂以寧逺軍節度副使惠州安置居三年泊然無所蔕芥人無賢愚皆得其歡心蘇轍軾第累官門下侍郎紹聖初李清臣鄧閏甫復用言熙豐事轍上疏論諫哲宗不悦落職雷州安置移循州嘗著龍川志其鄉人巢谷徒步訪二蘇至循轍驚喜曰子非今世人古之人也陳次升興化人徽宗時為侍御史極論章惇㑹布蔡京蔡卞之惡崇寧中落職除名編管循州政和中用赦恩復舊職唐庚眉州人善属文以張商英薦提舉常平商英罷相庚亦謫惠州㑹赦復官歸蜀陳鵬飛永嘉人仕至侍講嘗以言事忤㫖謫惠州所居面湖吟咏自適有羅浮集十卷留正本泉州人歸善處士徐敦實以女妻之正因留家焉後舉進士官至丞相封魏國公呉潛宣州人宋理宗時拜相忤賈似道謫循州先是有袁炎焱嘗學于潛至是往從之人或止其行炎焱曰豈可使巢谷專美於前哉潛在循預知死日語人曰吾將逝矣夜必雷風大作已而果然作詩頌端坐而逝陳知柔宋永春人罷賀州歸留惠陽三年泛豐湖登白鶴峯追和東坡詩陶冩羅浮風物殆盡人物唐軒轅集博羅人隠居羅浮山年百餘嵗宣宗召問長生之術集對曰徹聲色去滋味哀樂不過徳刑無偏自然與天地合徳日月齊明堯舜禹湯之所以登上夀者用此道也宋羅孟郊興寧人累官至諫議大夫翰林學士古成之河源人簡静力學時嶺嶠文風未振每取士合一路以一人薦雍熙初成之充賦督府勸駕詩云寰中有道逢千載嶺外觀光只一人後登端拱初進士第為漢州綿竹令而終張宋卿博羅人以春秋魁南省擢紹興初進士第除秘書省正字遷校書郎正色立朝權貴欲納交者謝絶之由是名重縉紳終肇慶守潘預博羅人好學淹貫經史以古文為鄉黨推重三山林東負時名少許可及抵羅浮見預論易遂為之屈乾道中以特科授宜州司法叅軍廣帥龔茂良聘至番禺訓迪諸生南州經學自是日盛易青惠州人為都督行府摧鋒軍効用經畧使連南夫與統制韓京㑹于惠州督諸兵討廣賊曽衮募死士夜劫衮營而青被執賊佯呼曰汝大軍為我所擒者甚衆青大呼曰勿信所擒者我耳賊又言吾不汝殺第令經畧持黄榜来招安青又呼曰勿聽任賊殺我我惟以一死報國賊怒焚之青死罵不絶口事聞贈保義郎官為薦祭仙釋單道開燉煌人常衣麄褐吞細石子晝夜不臥石季龍時從西来一日行七百里至秦州送至鄴佛圖澄與語不能屈也南入羅浮山後卒以尸置石室袁宏為南海太守登羅浮山至石室見道開形骸如生葛洪晉句容人開交阯出丹砂求為勾漏令將子姪俱行至廣州為刺史鄧嶽所留乃止羅浮山煉丹優㳺閑養著述不輟自號抱樸子因以名書後兀然若睡而卒世以為尸解云黄野人葛洪弟子或云葛洪之𨽻洪旣仙去留丹於羅浮山柱石間野人得一粒服之遂為地行仙常在人世人或有遇之者又有王野人者名靚亦脩道此山魚肉道人成都人生於宋大觀中手足攣縮不能言遇異人以藥一粒納口中遂能言語動作知隠匿事遇武當孫坦先生曰羅浮山王野人五代時惠州刺史棄官學道宜往拜之道人至羅浮緣藤上崖見野人踞坐拜而拱立野人曰子可教取魚肉與之道人自此能食生肉紹興末召封達真先生僧惠越隋開皇中人有戒行居羅浮能引虎枕其服今伏虎巖乃其宴息之所藍喬龍川人宋時舉進士不第乃隠于霍山常吹鐵笛賦詩云大一寧前是我家滿床書史作生涯春深帶雨不歸去老却碧桃無限花一日飛昇而去後有人見之洛陽潮州府東至海岸一百五十里西至惠州府海豐縣界二百五十里南至海岸一百五十里北至福建汀州府上杭縣界三百一十五里自府治至南京六千五百八十里至京師九千七百四十七里石糧十六萬四千零建置沿革禹貢揚州之域天文牽牛分野古為閩越地秦属南海郡漢