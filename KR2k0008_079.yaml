人或裒金以贈辭曰吾自性分不易非畏人知也劉齡之廣州都督時嶺南官多用土人齡之言其不便下詔禁斷蠻俗便之盧奐天寶初為南海太守贓吏斂手中人領市船者亦不敢干以私時謂自開元後治廣有清節者宋璟李尚隱盧奐三人而已李勉德宗時嶺南節度使性廉潔不飾車服器用召還至石門盡搜其家人所畜珍物投之江中杜佑嶺南節度使開大衢疏析㕓閈以息火災權德輿稱其有善政以及民有盛德以化惡韓愈德宗時貶陽山令有愛在民民生子多以其姓字之楊於陵元和初嶺南節度使辟李翶在幕府咨訪得失教民陶瓦易蒲屋以絶火患孔戣廣州刺史嶺南節度使至鎮節財用貸逋負戒貪吏凡流落士族戣用其才良廩其無告嫁遣其女子舊例蕃舶始至餉以犀琲海商既死沒遺其資戣皆還之鄭絪文宗時嶺南節度使守道寡欲所居不為烜赫事世以耆德稱之其後節度使崔珙亦有治聲盧鈞宣宗時嶺南節度使商舶珍異悉無所取别異華獠息其爭訟仕宦流落者恤其子孫李逮僖宗時嶺南節度使黃巢陷廣州執之使草表逮曰腕可斷表不可草巢殺之宋潘美開寶初率師征嶺南長驅至廣州執其主劉鋹送京師餘悉討平之嶺表遂安以美知廣州兼嶺南轉運使向敏中淳化中知廣州至荆南市南藥以往在官一無所需以清德著聞李符知廣州兼轉運使在任有善政民為立生祠李惟清知廣州就拜右諫議大夫太宗聞其廉申詔奬之張鑑咸平初知廣州居二年民條其政績上請刻石馬亮知廣州鹽户逋課質其妻子於富家悉取還之海舶久不至使招來之至者倍於初朝廷遣中使賜宴以勞焉陳世卿代邵曄知廣州奏免州人計口買鹽之害人歌曰邵父陳母除我二苦孔勗通判廣州以清潔聞真宗東封時召知曲阜縣勗被召蕃酋爭持寶貨以獻勗皆慰遣之黃震廣東轉運使廣南嵗進異花數千本至都下枯死者十八九道路苦其煩擾震奏罷之李兑知廣州為政簡嚴人誦自劉氏納土之後獨兑尤著清節魏瓘皇祐間知廣州儂智髙反瓘築城鑿池穿井作大弩預為守備賊來攻城甚急斷流而井不竭發弩輒中賊力屈而退王罕以轉運使駐潮州聞儂智髙攻廣州即統精兵至廣與都監侍其淵乘城拒守人心稍安賊退乃還蕭注番禺令募兵三千與儂智髙格鬬焚其戰艦掩兵入城人始有生意狄青儂智髙圍廣州仁宗以青為宣徽南院使經制廣南盜賊事大破智髙于崑崙關下余靖皇祐間以廣南安撫使經制盜賊擒儂智髙母及其弟送闕下在任立法戒官吏不得市南藥及歸不持南海一物劉湜知廣州時儂賊初平湜練土兵葺器械有盜據山招之不下湜知並山民資之食即徙民絶其餉盜遂降民安之楊覃知廣州勤于吏事南海有蕃舶之利前後牧守或致謗議惟覃以廉著聞逺人懷之程師孟知廣州州城為儂冦所毁師孟在廣六年作西城及交址陷雍管聞廣守備固不敢東陳從易知廣州以清德聞比還不市南物所持俸金而已仁宗嘉之飛白書清字以賜蘇緘仁宗時南海主簿州領蕃舶每商至則擇官閲實其資商大家樊氏入見緘遽升階就榻緘怒而杖之州將責緘專決緘曰主簿雖卑邑官也舶商雖富部民也邑官杖部民烏得為専州將慰而謝之林槩知連州康定初上封事請行唐府兵之法又請選蠻籍土民為兵柵要衝購猺人使守禦周敦頥廣東提點刑獄以洗寃澤物為己任行部不憚勞苦雖瘴癘逺險亦必緩視徐按張田熙寧初知廣州築城外郭兩旬而成臨政以清嘗與女弟書云南海富諸物犀珠亦可市但身為市舶使不欲自汙爾作欽賢堂繪古昔清刺史日夕師拜之盧士宏知廣州或傳安南舟數百泊海中將為冦嶺徼驚搖士宏灼其非是日從賓客宴逰作樂民賴以安蔣之竒知廣州妖人岑探謀據嶺表之竒先事致討生擒之南海饒寶貨為吏者多貪聲之竒取前代牧守有清節者十人祀之冀變其習陶節夫廣州録事參軍楊元冦暴捕繫獄不承纍年節夫詰以數語即吐服將適市與諸囚訣曰陶公長者雖死可無憾後又知新會縣太守章楶重其才連南夫髙宗時知廣州金人歸河南地南夫賀表云虞舜之十二州昔皆吾有商於之六百里當念爾欺秦檜怒其言罷之王大寶紹興中知連州時張浚亦謫居俸不時得大寶以經制錢給之又減月輸免行錢民稱便葉顒紹興初南海主簿攝尉盜發州檄巡尉同捕巡檢獲盜十餘人歸勞於顒顒曰掠美欺君幸賞三者皆罪不忍為也楊萬里提舉廣東常平茶鹽盜沈師犯南粵帥師討平之孝宗稱為仁者之勇龔茂良知廣州建州縣學行釋奠鄉飲禮又建海會浮圖中原衣冠沒於南而暴露者皆掩藏無遺陳橐知廣州兵興後盜賊無寧嵗十年九易牧守橐盡革弊政以恩先之民夷悅服留正乾道初清海軍節度判官有善聲經略使龔茂良深器重之以相才薦于朝自此進用林光朝廣東提刑茶冦薄嶺南其鋒鋭甚光朝自將郡兵檄統制路海等擊敗之賊驚懼宵遁方信孺番禺縣尉盜劫海賈方聚分鹵獲信孺捕之盜惶駭欲趨舟而信孺已使人負盜舟去矣乃悉縳盜不失一人楊長孺嘉定間知廣州在任蠲苛政之非法者於是官知愛民而一道肅然及代去有俸錢七千緡盡以代下户輸租有詔奬諭廖德明廣東提刑彈劾不避權要嵗當薦士朝貴多以書託之德明曰此國家公器也悉封還之後又知廣州有惠政洪天錫寶慶初為廣州司法長吏盛氣待下天錫糾正為多後為廣東運判決疑獄劾貪吏治財賦皆有法劉應龍南海冦作乃以應龍知廣州兼經略安撫冦聞應龍至即遁去南海大治元吕恕至元間廣東道宣慰使時廣中多冦盜水陸不通民皆缺食恕發粟賑之又為粥以食飢民全活甚衆民立碑頌之卜天璋廣東廉訪使先是豪民瀕海堰專商舶以射利纍政以賂置不問天璋至發卒決去之嶺南地素無水天璋至始有水人謂其政化所致云趙謙元貞初廣東廉訪使廉公有風力所在寃獄多平反縣令王夔者憾其民雒公輔因訟者誣公輔殺其僕袁二獄成謙以無尸為疑未幾果有獲袁二至者遂祗夔以法人以為神本朝鄭金洪武初廣東按察司僉事公正有守敏於政事凡獄牘至前一覽洞然人服其明尋遷按察使郭郁鄰洪武初東管縣丞剛介有守専務愛民而身之飢寒不恤時隆冬縣民何原璉等以生魚被服饋之郁鄰不受潘伯庸洪武中廣東按察使力持憲度風節凝峻獄訟不寃而黠傲者為之馴服王溥洪武中廣東右參議性廉謹弟惟信自鄉來省有以布袍遺之者溥怒曰一衣甚微汚身甚大命亟還之先是廣運舵木由海道入京屢致漂沒溥相其地通庾嶺挽運遂絶漂沒之患道同洪武中番禺知縣性亷潔視民如子時永嘉侯朱亮祖城廣東縣民羅氏者納女於亮祖兄弟怙勢嘗以事干同同不聽仍按以法花茂洪武中任廣東都指揮使奏東管香山等縣逋逃蛋户附居海島遇官軍則稱捕魚遇畨賊則同為冦盜殊難管轄請徙其人為兵庶革前患從之侯禮永樂初知連州州有劇賊劫掠鄉村經年不能制禮往諭之向化又有賊三百餘人據髙良鄉又招來之悉為編氓州遂無患劉永清宣德間廣東右布政使公廉殊衆政簡民安去之日士民泣留之不果歌詩以頌其德張琰宣德間廣東右參政持身廉謹庭無私謁民有戎籍者誣其同姓琰察而釋之人服其明王清正統初廣東都指揮僉事協鎮髙肇等府賊衆攻廣城清率兵逆戰被執遇害朝廷憫之加子爵二級彭逺正統間廣東右布政使廉能勤慎專尚德化廣民喪葬尚浮屠務華侈或有傾産至十年不葬者逺嚴令革之彭琉正統中廣東按察僉事提督學校以成賢化俗為己任增修黌舍二十餘間書籍缺者求善本刻之士風丕變楊信民正統間廣東左參議不事刑威民深德之時黃蕭養作亂以信民為僉都御史巡撫廣東賊多降附丁璣廣東提學副使毅然以守道自任學校一新潘稹成化間巡按廣東振揚風紀兩劾柄兵者之不律貪吏悚然宫安廣東按察司僉事持憲嚴明人不敢欺以姦韋斌廣東提學副使藻鑑精明士類咸服流寓虞翻吳孫權時騎都尉數直諫權不能容坐徙丹陽涇縣又徙交州雖處罪放而講學不倦門徒常數百人崔仁師定州人唐貞觀中纍遷中書侍郎參知機務被遇甚渥會有伏閣訴者仁師不時上太宗怒流連州王定保唐末劉隱據嶺表中朝士人多往依之辟定保置幕府後劉龔欲僣號定保不從龔遣定保使荆南乃建國云姚鉉廬州人雋爽頗尚氣宋咸平中為兩浙轉運使時薛映知杭州鉉與映不協映托鉉罪數條密以聞詔使劾之除名貶連州張浚蜀人紹興中以彗出極論時事秦檜惡之令臺諌論浚以特進提舉江州太平興國宫居連州子栻隨侍鄧光薦廬陵人宋末為禮部侍郎寓居香山陸秀夫在海上時記二王事為一書甚悉以授光薦曰君後死幸傳之其後崖山平光薦以其書遷廬陵人物漢董正番禺人漢末纍徴不起操守清白志趣髙尚晉南海太守袁彥伯奏旌其門唐何昌期陽山人天寶間與安祿山將髙秀巖戰有功拜千牛衛將軍封寧國伯區册南海人德宗時韓愈為陽山令册往見之及歸愈為文以送之略曰有區生者誓言相好自南海拏舟而來升自賓皆儀觀甚偉坐語與文義卓然如斯人者豈易得哉劉瞻連州人懿宗時舉博學宏詞科纍官翰林學士相僖宗制云安數畝之居仍非己有却四方之賂惟畏人知子贊為梁崇政院學士五代黃損連州人梁龍德初舉進士仕南漢官至尚書左僕射有桂香集行於世與宋齊丘桑維翰善每論天下事二人自以為不及何澤廣州人仕唐為洛陽令好直言莊宗出獵踐民田澤叩馬諫曰陛下未能一天下以休兵而恣畋遊害稼穡使民何以出租賦莊宗為之罷獵明宗欲幸鄴澤又伏閣諫止仕終太常少卿孟賓于連州人仕終水部員外郎能詩有金鼇集陳堯佐為序稱其如百丈懸流灑落蒼翠間清雄奔放望之竪人毛骨五代詩人未有過之者宋李廷珙連州人開寶間從潘美平南漢以武功纍遷刑部尚書馮元南海人雍熙初進士纍官翰林學士性簡重非慶弔未嘗私謁公卿多識古今臺閣品式以易學見知仁宗嘗作太玄釋文卒諡章靖邵曄連州桂陽人祖崇德道州録事參軍父簡連山令曄幼嗜學恥從辟署太平興國八年進士纍官右諫議大夫知廣州卒廣州城瀕海每蕃舶至岸常苦颶風曄鑿內壕通舟颶不能害黃勳南海人家貧好學凡聖賢格言躬自抄録紹興初舉進士知新昌縣有政聲階至朝散大夫馬持國新會人紹興間張浚胡銓皆嘗辟為屬官持國嘗著中興自治萬全策略愚忠録獻于孝宗周必大楊萬里稱其文深宏偉傑切中時病終容州守子晞驥仕終雷州守孫宜祖終英德守崔與之增城人父世明博學精于醫貧者療之不受其直與之紹興中舉進士纍官四川安撫制置使威惠兼濟兵民悅服召為禮部尚書又除參知政事進右丞相皆辭不就卒追封南海郡公諡清獻羅威番禺人事母至孝遇寒先以身溫席鄰家牛犯其稼威刈芻納其門牛家相諭莫犯每見老者負於途率代其任令異其行除吏不就遂與母遁居增城母殁盡哀有白鹿止其基側李昴英番禺人寶慶初舉進士纍官右正言時趙與知臨安府罔利奉上昴英劾其聚斂害民理宗難之至牽裾力諫又劾中宫董宋臣與之俱罷仕終吏部侍郎諡忠簡郭閶番禺人淳祐間舉進士纍官監察御史右正言論事鯁直無所依阿及卒家甚貧幾無以為斂鄉人以崔與之李昴英及閶三人共祀之張鎮孫番禺人博學強記咸淳庚午進士第一除正字遷校書郎宋末為廣東經略安撫使有復城之功吳英南海人理宗時以武功著贈官至節度使子宗道宗達宗遇皆為武職有功伍隆起新會人三世仕宋宋末隆起率義兵從帝昺于崖山與元將張𢎞範力戰不屈其麾下謝文子殺隆起以首降𢎞範宋相陸秀夫惜之刻木為首以葬又募人執文子戮以祭墓李用東管人少孤事母孝棄舉業究周程之學著論語解以薦授校書郎不就咸淳間祠於學本朝何真東管人少英偉好書劒元末歷河源縣務副使嶺海騷動棄官歸鄉里率衆保障遂併有循惠二州廣民賴以為安本朝初歸附授江西行省參知政事纍官四川布政使所至有聲加封東管伯致仕卒關敏南海人本朝初王師下嶺南全城歸附授巡檢後為餘冦攻陷死舉家二十口皆被害事聞贈兵馬副指揮命有司立廟嵗祭之陳璉東管人洪武中起家桂林府學教授纍官南京禮部侍郎致仕卒璉孝友和厚博通經史以文學知名于時所著有琴軒集羅亨信東管人永樂甲申進士授給事中纍官為副都御史歷巡西北二邉愛軍恤民邉人至今思之翟溥福東管人永樂甲辰進士知青陽縣時邑有虎患齋沐檄神捕之患遂息調新淦德政尤著後知南康府致仕去郡人思之請配享于白鹿洞之三賢祠志略陳獻章新會人年二十舉于鄉從吳聘君逰聞伊洛之緒後歸白沙多所自得以薦授翰林檢討母疾乞歸不辭而去有詩云相思道逺無由寄此味年來只獨嘗七十三卒世稱白沙先生志略林光由舉人為杭州府學教授造詣純正從學白沙深為所重白沙嘗贈之以詩有白首金石交視我南川子句志略張詡舉進士受學白沙白沙甚稱許其完養心氣臻極和平志略湛若水增城人𢎞治中進士纍官翰林侍講國子祭酒吏禮兵三部尚書從學白沙自是隨處體認天理深得白沙勿忘勿助之間之旨平生著述甚富有古易訓測春秋正傳三禮訂疑白沙詩教格物通文集行于世云志略列女劉氏二女南海人母病一女割股一女割肝以救之鄉閭感動宋經略使龔茂良上其事詔旌表其門倍給粟帛萬氏南海人王受祖妻洪武中蘇友輕作亂萬氏為官軍所獲獻于南海衛指揮盧諸諸愛其才美欲納之萬氏號泣投衣於火諸怒以刃擬之萬氏唾罵不輟就死于南門外聞者為之流涕仙釋安期生秦時賣藥海邉人言其千嵗李少君遇之食以棗大如瓜蒲澗所産菖蒲一寸九節生採而服之其隱居有十蒲澗其一也葛洪晉咸和間為散騎常侍聞交址出丹砂求為勾漏令將子姪俱行至廣州刺史鄧嶽留不聽去洪乃止於羅浮山煉丹成道妻鮑氏南海太守靚之女行灸於南海唐崔煒者遊開元寺有丐嫗謂煒曰吾善灸贅疣今有艾少許奉子煒受之莫知為誰後始知為洪妻云何仙姑增城人生而頂有六毫所居地産雲母忽夢異人教之餌服唐景龍中仙去慧能唐時居廣之法性寺會有二僧論風動幡者一云風動一云幡動能曰非風非幡由心動爾寺主印宗聞之悚然遂邀能入室執弟子禮白于衆曰此肉身菩薩也能即僧家所謂六祖者韶州府東至南雄府始興縣界一百五十里西至廣州府陽山縣界四百五十里南至廣州府清逺縣界三百七十里北至湖廣郴州桂陽縣界二百二十里自府治至南京三千五百九十里至京師七千三十五里糧五萬石零建置沿革禹貢荆州之域天文牛女分野春秋為百粵地戰國屬楚秦為南海郡地漢初屬南粵武帝平南粵置曲江湞陽二縣𨽻桂陽郡統於荆州東漢置始興都尉三國吳分置始興郡治曲江縣劉宋改唐興郡齊復為始興郡隋平陳郡廢以其地屬廣州唐置畨州治曲江尋改東衡州貞觀初改為韶州屬嶺南道天寶初改為始興郡後復為韶州五代時屬南漢宋仍置韶州屬廣南東路元改置韶州路本朝洪武初改為韶州府領縣六曲江縣附郭漢置屬桂陽郡吳為始興郡治隋廢郡以縣屬南海郡又廢湞陽縣入焉唐於縣置畨州貞觀初改韶州又以臨瀧良化二縣省入宋元仍舊本朝因之編户四十里樂昌縣在府城西北八十里本漢曲江縣地梁置梁化縣又分置平石縣隋開皇中以平石縣省入梁化尋改曰樂昌屬畨州唐宋元俱屬韶州本朝因之編户一十三里仁化縣在府城東北八十里本曲江縣地唐垂拱中置仁化縣屬廣州後屬韶州宋初省入樂昌縣咸平中復置元仍舊本朝因之編户六里乳源縣在府城西一百里本曲江樂昌二縣地宋乾道初以韶州諸縣不通水道遂於洲頭津置乳源縣元仍舊本朝因之編户六里翁源縣在府城東南九十里本漢桂陽郡湞陽縣地梁置翁源縣陳又置清逺郡隋廢郡以縣屬廣州唐屬韶州元改屬英德路本朝仍屬韶州府編戶十里英德縣在府城西南二百二十里秦為南海郡地漢置湞陽縣屬桂陽郡隋省入曲江縣唐初置洭州領含洭湞陽二縣尋廢州以縣屬廣州南漢於湞陽縣置英州宋州仍舊慶元初升英德府元改為路本朝改州為英德縣及改今屬編户十里郡名始興吳置廣興劉宋名韶陽在府韶石山南故名形勝北嶺峭險南谷平易唐徐浩張文獻公碑始興比嶺峭險巉絶大庾南谷坦然平易嶺南屬州韶為大唐皇甫湜朝陽樓記越之北門宋潘美歸奏辭控扼五嶺韶為交衝唇齒江湘咽喉交廣俱宋余靖修州衙記溪山稱最余靖湧泉亭記嶠南溪山之勝曲江稱最江山秀麗元韶州譙樓記風俗習尚淳朴圖經其習朴而不雜淳而不漓不事逰宴同上商不富賈不巨工不良技不巧嵗時不事逰宴農不力耕郡志為農者不力於耕而運販鹽鈔嵗月可以致富珍竒不售同上惟簡質是安而市井貿易自日用飲食之外珍竒之貨不售焉士多願慤宋朱熹濓溪祠堂記韶故名邦士多願慤可與進於道者蓋有張九齡余靖之遺風土曠人稀圖經英州號小法場土曠人稀為農者擇沃土以耕而於磽地多不用力藤葉嚼檳榔宋楊萬里英德縣詩人人藤葉嚼檳榔戶户茅簷覆土床只有春風不寒乞隔溪吹度柚花香萬室通釀酤宋梅堯臣翁源縣詩越林多蔽天黃柑雜丹橘萬