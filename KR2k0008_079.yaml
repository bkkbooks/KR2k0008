都巡檢使捕逐羣盜海隅以寧許申知韶州愛民勤政有甘露之祥遷張曲江廟於城中栽松榕數萬株遂成茂林王益知韶州初夷越男女無别益一切窮治未幾男女之行别於塗翁源多虎益下檄捕之五虎自斃郡人德之榮諲廣東轉運使廣有板步古河路絶險林箐瘴毒諲開湞陽峽至洸口古徑作棧道七十間抵清逺趨廣州遂為夷塗周敦頤提點刑獄行部不憚瘴癘荒蹊絶島皆緩視遍歷以洗寃澤物為己任蘇緘知英州時儂智髙冦廣州緘搜部兵募壯勇數千人赴難有功唐介以御史論文彥博仁宗怒謫英州别駕直聲動天下抵任數月洲人畏仰敬重之陸起真陽令有村巫以銀甕貯二蛇惑民觀者塞路起斬蛇捕巫逺近駭伏稱為神明陳曄提點刑獄以落南士夫流徙遺孤不能歸建屋六七十楹籍本州官田及買民田嵗得米二千石以養之廖德明韶州教授嘗講學于朱子先是乾道中知州周舜元作祠堂以祀周子二程子祠久摧剝德明增廣而作新之楊萬里提舉廣東常平會賊犯南粵萬里合諸郡兵直抵循梅賊懼就擒孝宗稱為仁者之勇就除提點刑獄請於潮惠築外寨以扼賊路林光朝提點刑獄茶冦作亂簿嶺南光朝目將郡兵以摧其鋒賊懼宵遁孝宗喜曰光朝儒生乃知兵耶元覃榮韶州路通判有古君子風在任六事修舉四民樂業善政甚多郡人為立去思碑敏珠爾韶州路同知以廉介聞至正間郴冦陷樂昌邁珠率義兵敗賊遂復樂昌乳源諸縣又督兵出勦餘黨時方寢疾竟死軍中郡人義而祀之張鳯儀韶州路經歷領孤軍追賊兵潰被執不屈死子萬里獲首賊張韶卿剖其腹劈肝生啖之尋捕父官及贑賊冦城率兵與鬬身被數創罵賊而死王方貴韶州路經歷學博識髙為政有惠澤及民公餘纂曲江志人多稱之本朝王世安韶州知府為政公平民皆悅服尤謹於事神凡祠廟嵗久皆重新之以張余二公為之韶陽先哲請于朝春秋祀黃榮韶州知府守己廉行事公信古愛民尤惓惓于學校躬自考課勉勵生徒多底成材郡人至今思之索彥勝洪武初樂昌知縣時縣無城池百姓散處山林彥勝築城開池均賦役招流移民為立政績碑熊本誠翁源知縣治公事如家事恤民若子教之植苧麻民獲其利後纍升福建參政史彬永樂中樂昌知縣政務興舉愛民如子時山賊為患彬及主簿吳政討平之民始安業流寓劉軻唐沛人流離郴湘至韶家焉博學無所不通詣長安為馬植所竒遂登第歷官至侍御史所著有春秋指要翼孟子諸書數十卷托言稱其文章與韓栁齊名云鄭俠福州人仕宋監安上門進流民圖坐謗訕編管英州英人無貧富貴賤皆加敬爭遣子弟從學為築室以居哲宗立始得歸元符中再竄於英徽宗初赦還孔平仲臨江人知衡州提舉董必劾其不推行常平法乃徙韶州又坐前上書之故責惠州别駕安置英州劉安世大名人仕為諫議大夫吕惠卿復用安世爭以為不可章惇用事黜安世知南安軍纍貶至新州别駕英州安置朱翌安慶人紹興中為中書舍人秦檜惡其不附己諷言者論其黨趙鼎謫居韶州十四年名山勝景逰覽殆遍所著詩文有相江集吕祖儉婺州人以大府丞通判台州右正言李沐論罷右相趙汝愚祖儉上書訴汝愚之忠尋有旨送韶州安置祖儉在謫所讀書窮理賣藥以自給洪皓饒州人紹興中使金歸秦檜忌之謫居英州凡九年檜死復官卒諡忠宣人物南北朝侯安都始興曲江人善騎射為邑里雄豪侯景之亂陳武帝入援臺城安都引兵從之遂平侯景以功授南徐州刺史後進爵清逺郡公威名甚重羣臣無出其右唐鄧文進始興人唐初為本州刺史移治水西蕭銑發兵攻樂昌文進堅守纍立戰功沒贈鷹揚上衛將軍廟食樂昌本朝追諡忠襄張九齡曲江人七嵗能屬文後擢進士又以道侔伊吕科髙第為左拾遺玄宗千秋節上金鑑録以伸諷諭纍遷中書侍郎嘗抑李林甫請誅安祿山以薦周子諒坐貶荆州長史久之封始興伯卒諡文獻開元後天下稱曰曲江公而不名云張九皋九齡仲弟歷宋襄廣三州刺史季弟九章亦歷溫吉曹三州刺史天寶中為嶺南節度使九臯子抗為侍御史抗之子仲方擢進士為諫議大夫祕書監卒贈禮部尚書諡曰成五代薛崇譽曲江人善孫子五曹算仕南漢纍官至開府儀同三司簽書點檢司事宋太祖遣師克廣州崇譽義不降後被執死之宋余靖曲江人少以文學稱天聖初登進士第及試書判拔萃擢集賢校理歷遷右正言與歐陽修王素蔡襄為四諫官時論重之屢言邉情三使契丹後以儂智髙叛經制南事纍遷集賢院學士官至工部尚書卒諡忠襄王式曲江人唐宰相圭之裔初圭之子敬直貶嶺南子孫遂家曲江式耿介自立以孝行稱天聖初登進士第纍官大理丞歷知梅州卒子陶天聖中進士官至京東提刑度支郎中妻朱氏尤賢淑善教子五子相繼登第蕭雄樂昌人與兄雅弟維俱肄業上庠雄中蔡薿榜維中賈安宅榜雅中莫儔榜起自白屋連掇髙科梅鼎臣翁源人天聖初進士官至殿中丞子佐天聖五年進士官至藤州守談必樂昌人天聖間王益守韶州時必應童子科日誦萬言引試稱旨舉慶厯進士調雍州推官交址破雍沒於王事纍贈金紫光祿大夫本朝追諡忠愍鄧戡乳源人博通經學天聖五年進士官至殿中丞子堂登皇祐初進士孫弼亮登元祐初進士三世登科有聲南土李渤樂昌人嘉祐初進士世業儒郡人尊之稱為夫子嘗試南昌作伯夷風賦中魁時有詩云嶺北嘗聞夫子號江西曽振伯夷風弟岩以上書召見賜同進士後渤知白州岩知象州侯晉升曲江人元豐中進士為程卿令與蘇軾往還軾與一帖云蒙示新論利害炳然文亦溫麗歎服不已仕終南恩太守鄭敦義真陽人知韶陽縣官市黃牛革峻急乃上書言黃牛善耕農視之如子哲宗下令止之徽宗即位上書陳成周所以長久者在於得民心暴秦所以短促者在於失民心詔遷一階為來者勸鄧孝廉曲江人讀書自得尤深於春秋建炎中進士為韶州教授通判雍州攝州事適嵗飢發廩賑之不足繼以俸金全活甚衆遷知德慶府元鄧可賢乳源人至正中郴冦圍乳源甚急可賢率寨民并其子弟死守遣其子一源間道趨韶上方略同知買住遂率兵破賊賊復悉衆來攻凡兩月糧盡可賢奮身出戰被執并其子弟七人皆死寨破日民無一人降者本朝鄧顒樂昌人舉進士擢廣信永豐知縣時閩寇犯境顒伏兵大破之冦遂悉衆至顒力戰被害事聞贈光祿寺少卿諡忠毅列女談氏真陽人為曲江村士人吳琪妻宋紹興五年英州飢盜起攻剽琪竄去談與其女被執談有姿色盜欲妻之談怒罵曰我良家女豈爾賊輩偶耶賊害之張氏樂昌人龔自立妻嘉定中冦至夫妻襁負二稚竄匿為賊所得脅以行張與夫訣曰妾死無憾所憐者二子幸善撫之中道詒賊曰吾渴欲就飲可暫解我縛賊從之遂竄江中邑人立祠以旌之仙釋慧能姓盧氏唐新州人得法於黃梅五祖忍大師傳其衣鉢在廣州宗印師席披度法性寺受戒後歸曹溪大興佛法今南華寺即其道場宋熙寧十年賜真空大鑒禪師即曹溪六祖也明一統志卷七十九
