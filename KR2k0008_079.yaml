body:
  text: 明一統志卷七十九明李賢等撰廣東布政司廣東古百越地漢置交州部刺史察舉南海等郡而不常所治東漢末交州遷治番禺唐貞觀中置嶺南道開元中置嶺南道採訪處置使治南海後分為嶺南東道仍舊治宋置廣南東路經略安撫司以廣州守臣兼領又置提點刑獄司治韶州元置廣東道宣慰司及肅政廉訪司於廣州又置海北海南道宣慰司及肅政廉訪司於雷州𨽻江西行中書省本朝改置廣東等處承宣布政司領廣州韶州南雄惠州潮州肇慶髙州廉州雷州瓊州十府置廣東都指揮使司領廣州左廣州右廣州前廣州後南海廣海清逺惠州碣石肇慶雷州海南神電潮州廉州十五衛增城新會新興陽江德慶韶州南雄七守禦千户所置廣東等處提刑按察司分嶺南嶺東嶺西海南海北五道兼察諸府州衛所三司並治廣州云廣州府東至惠州府博羅縣界二百二十里西至肇慶府髙要縣界二百二十里南至海岸三百四十里北至韶州府英德縣界三百五里自府治至南京四千三百九十里至京師七千八百三十五里糧三十二萬石零建置沿革禹貢揚州之南境天文牛女分野春秋為南越地秦於此置南海郡後趙他據其地漢武帝時討平之復為南海郡屬交州刺史東漢末遷交州治番禺三國吳又遷交州治龍編而於此置廣州梁陳並置都督府隋置總管府後改廣州曰番州大業初又改南海郡唐復置廣州總管府升大都督府天寶初改州為南海郡乾元初復為廣州唐末置清海軍節度宋為廣州清海軍大觀初升為帥府元置廣州路本朝改廣州府領州一縣十五南海縣附郭本秦南海郡番禺縣地隋文帝分置南海縣為番州治唐為廣州治南漢分南海置咸寧常康二縣宋初併咸寧常康俱入南海元仍舊本朝因之編戶二百七十八里番禺縣附郭秦置縣為南海郡治因縣有番禺二山故名漢以後皆因之劉宋析置熙安懷化二縣隋初廢入番禺唐屬廣州宋初併番禺入南海皇祐中復置元仍舊本朝因之編戶一百四十里順德縣在府城西八十里本隋南海縣地唐以後皆因之本朝景泰三年始析其地置此縣編戶一百五十七里東管縣在府城東南二百五十里本番禺縣地晉成帝始置寶安縣屬東官郡隋初省郡以縣𨽻廣州唐至德初改為東管縣宋初省入增城縣尋復置元仍舊本朝因之編戶一百八十里從化縣在府城東北一百五十里本朝嘉靖中析置編戶一十八里龍門縣在府城西南三十里本朝嘉靖中析置編戶一里新寧縣在府城西一百一十里本朝嘉靖中析置編戶二十五里增城縣在府城東一百九十里本秦番禺縣地漢末析置此縣屬南海郡晉於縣置東官郡隋初廢郡以縣屬廣州唐宋元仍舊本朝因之編戶八十里香山縣在府城南一百五十里本唐廣州東管縣香山鎮宋紹興末升為縣仍割南海番禺新會三縣瀕海之地益焉元仍舊本朝因之編戶三十六里新會縣在府城西南二百三十里本漢南海郡地東晉分置新會郡縣隋郡廢以縣𨽻岡州大業初州罷以縣屬廣州唐初復以新會義寧二縣置岡州開元中州廢復以縣𨽻廣州宋元仍舊本朝因之編戶一百三十八里清遠縣在府城北二百五十里本漢南海郡中宿縣地吳晉並𨽻始興郡梁於此置清逺郡隋罷郡置清逺縣屬廣州仍以故中宿縣為政賓縣唐初以政賔縣省入清逺宋元仍舊本朝因之編戶一十里三水縣在府城西南一百四十里本朝隆慶中析置編戶五十三里新安縣在府城東二百一十里本東管縣地本朝萬厯元年析置治于東管新城編户五十六里連州在府城西北五百六十里本秦長沙郡南境之地漢為桂陽縣吳屬始興郡劉宋屬廣興郡齊復屬始興梁分置陽山郡治桂陽隋廢郡置連州大業初改熙平郡唐為連州天寶初改連山郡乾元初復為連州元置連州路𨽻湖南道大德中降路為州𨽻英德路本朝洪武初省十四年復置𨽻廣州府編戶二十里領縣二陽山縣在州東北二百里本漢舊縣屬桂陽郡東漢省入含洭縣晉復置屬始興郡梁屬陽山郡隋屬熙平郡唐屬連州元屬桂陽州本朝初因之洪武二年省桂陽州以縣屬韶州府十四年改屬連州編戶七里連山縣在州西二百九十里本漢桂陽縣地梁分置廣德縣屬陽山郡隋改曰廣澤仁夀初改曰連山𨽻熙平郡唐宋元並𨽻連州本朝初因之洪武二年屬韶州府尋省縣入陽山十四年復置屬連州編戶四里郡名羊城古名南海秦名形勝負山險阻南北數千里漢書南粵傳包山帶海晉書吳隱之傳廣州包山帶海珍異所出南海一都會隋志自嶺以南二十餘郡南海一都會也地總百越山連五嶺史通夷夏奧區仙靈窟宅唐王勃廣州寺碑連山隔其隂巨海敵其陽韓文荒服善部炎裔涼墟唐劉禹錫連州記北距五嶺南負重溟宋史南漢世家五嶺峙其北大海環其東宋蔣之竒廣州學記山秀水清卓有可愛宋歐陽知誨連州宣詔堂記北接九疑南連衡嶽宋歐陽經連州雲開亭記山川緬邈土野沃饒郡志風俗質直尚信隋志人性輕悍椎髻箕踞乃其舊風其俚人則質直尚信民俗得華風之雜唐王勃廣州寺碑室皆塗塈家撤茅茨唐張説撰宋璟遺愛碑室皆塗塈俗革則華風可觀家撤茅茨夜作而災火不發俗雜五方宋余靖羅漢院記番禺大府節制五嶺秦漢以來號為都會俗雜五方婚禮用檳榔以當委禽番禺志人物富庶商賈阜通宋陳若沖連山縣記喪葬必盛肴饌以待送客元志刀耕火種元志清逺地無曠原沃壤刀耕火種最為辛勤無長溪洪河肩擔背負最為勞苦典禮無異中州新志雖海濱遐陬冠婚喪祭悉遵典禮藹然無異於中州山川越秀山在府城內稍北聳拔二十餘丈上有越王臺故址昔趙他因山為之唐韓愈詩樂奏武王臺是也諸名賢題詠甚富本朝永樂初都指揮花英於山巔起觀音閣山半建半山亭土人嵗時逰覽其中番山禺山在府城內東南番山在南禺山在北相聫屬如長城南漢劉龑鑿平之就番山積石為朝元洞禺山今布政司譙樓址也席帽山在府城北雙井街相傳上有南漢劉氏郊壇遺址浮丘山在府城西四里相傳為浮丘丈人得道之地羅浮記云浮丘即羅山朱明之門戶先在水中若浮丘然四面篙痕宛然宋初有陳崇藝者年百二十嵗自言兒時見山根舟船數十今去海已四里矣坡山在府城內西南洪武初創鍾樓於其上萬松山在府城南二里上有乾明菴宋蘇軾扁其額西竺山在府城西北四里上有廣果寺雙女山去府城十里宋乾德四年潘美伐南漢次瀧頭劉鋹遣使請和美乃挾鋹使速渡諸險至馬徑寨於雙女山下鋹請降即此堯山一名淩山在海中嶤然而髙故名荆州記堯山赭巖疊起冠以青林郡國志云髙四千丈自番禺迄交趾見之又府城東北十五里亦有堯山馬鞍山在府城北一十里南越志秦始皇時望氣者言南海有五色氣遂發人鑿此山其鑿處形類馬鞍一云漢馬援嘗駐兵於此每風雨晦冥嘗聞人馬之聲亂石山在府城北二十里與白雲山相連唐杜審言詩懸危悉可驚大小都不類上聳忽如飛下臨仍欲墜又云萬尋挂鶴巢千丈垂猿臂皆狀其髙也白雲山在府城北二十里常有白雲覆其上相傳為安期生飛升之地上有水廉洞白雲洞鶴舒臺宋轉運使陶定於山半建龍果寺其軒題曰千峯紫翠亭曰天南第一峯石門山在府城西北二十里江中兩山對峙如亭漢樓船將軍楊僕討南越駐兵於此九曜山在府城西海中羅列如九星宋郭祥正詩番禺城西偏九石名九曜危根插滄浪古魄鎮臨眺靈洲山在府城西六十五里其山平原彌望晉郭璞謂南海之間有衣冠之氣者斯其地也山舊有寶陀院宋蘇軾詩靈洲峯上寶陀院白髮東坡又到來抱旗山在府城南八十里海中勢如抱旗其東二里有文筆峯西樵山在府城西南一百二十里山半地平可為民居峯巒回合千態萬狀若雲谷莊雙魚陂寶鴨池尤為竒絶金榜山在順德縣治傍華蓋山在順德縣治後以形似名金牛山在東管縣西二里山勢岧嶤下瞰海水有亭在絶頂名曰海月竒觀石鼓山在東管縣西南二十里上有石如鼓南越志其土有亂則鼓鳴昔盧循來冦時隱然有聲石船山在東管縣西三十里上有大白石如船故老云有村婦浴於石船後石為雷擊作三段石涌山在東管縣東四十里水中石如涌出居民多種香木于上虎頭山在東管縣西南五十五里大海中有大虎小虎二山俗號虎頭門外夷入貢及使外夷者皆道此武山在東管縣南五十里突起海中有武勇狀每潮汐消長髙低可辨宋余靖嘗候潮于此曹幕山在東管縣西北八十里林隂蓊蔚大者合抱農隙採山如織百材於此取辦寶山在東管縣東南百餘里山有二石甕飛瀑注之其聲如雷嵗旱居民刑白鵝禱雨於此參里山在東管縣東南一百里昔土人黃舒者以孝聞華戎慕之如曽參因以名山杯渡山在東管縣南一百九十里上有滴水巖一名屯門山唐韓愈詩屯門雖云髙亦映波浪沒即此大奚山在東管縣南四百里海中有三十六嶼周回三百餘里居民以魚鹽為生宋慶元間嘗作亂提舉徐安國討滅之地遂丘墟猊山在增城縣東南二十三里産婆娑羅竹圍三四尺性至堅土人取以為弓白水山在增城縣西四十里山巔有瀑布如白練故名靈山在增城縣北六十里山有溫泉又有仙女石嵗旱禱雨輒應虎獅山在增城縣北二百一十里山形若虎獅對踞上有飛泉㵼入蛟穴又有路名虎獅徑陳洞山在增城縣北二百五十里其脈自庾嶺而來勢如卓旗山側有小阜突出有石菴石佛像其上又有仙迹羅浮山在增城博羅二縣之境本名蓬萊山一峯在海中與羅山合其上有洞通句曲又有璇房瑤室七十二所詳見惠州府南臺山北臺山在香山縣南五十里兩山相對如臺故名筆架山在香山縣南二里三峯森立若筆架然又其南六十里海中有山尖秀名文筆峯髙出筆架之上自郡學視之正當其前三洲山在香山縣東五十里三山並立海中又號為三洲石甑山在香山縣南一百六十里山有石如甑土人號為南山橫琴山在香山縣南二百里海中形如橫琴三竈山在香山縣南三百里海中周回三百餘里林木蔥翠中有三石如竈龍山在新會縣西二里山有龍窟東西相望僅百步東山數穴窅不可窺西山則玲瓏下屬表裏洞開故老云神龍出入地黃雲山在新會縣北相傳一行禪師來遊有雲自出色如金馬山象山在新會縣馬山在縣治東象山在縣西二里俱以形似名緑屏山在新會縣北一十里周回八十餘里環獲縣治若屏風然崑山崙山俱在新會縣西北六十餘里二山相連而世俗合稱為崑崙山上有白龍池仙湧山在新會縣西北六十里地名羅坑本無山一夜風雷震怒湧出數峯因名崖山在新會縣南八十里海中延袤八十餘里宋末帝昺駐蹕于此為元將張𢎞範等所迫丞相陸秀夫朝服抱帝赴海死山巔有石刻𢎞範等功湯瓶觜山在新會縣南八十里以形似名山最髙峻文禽異木多出其中上川山下川山在新會縣西南一百四十里海中上川石山而下川土山二山皆産香蠟竹藤之屬而上川為優居民以賈海為業洪武中遷之今為荒壤峽山在清逺縣東三十里一名中宿峽崇山峻峙中通江流舊傳黃帝二庶子採崑崙竹為黃鍾之管隱于此山祠在廣慶寺東廡名人登此者多有題詠唐李翶詩一水逺赴海兩山髙入雲許渾詩水曲巖千疊雲重樹百層宋蘇軾詩岸逼鳥聲合水平山影交堂空泉潄玉砌淨笋遺包回岐山在清逺縣西南八十里髙聳數十仞逶迤環抱有回顧縣治之狀觀音山在清逺縣東二百五十里髙出諸山峯巒層疊巖中有觀音像大羅山在清逺縣西二百五十里其脈自陽山而來西抵廣西懷集