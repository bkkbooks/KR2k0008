body:
  text: 明一統志卷八十六明李賢等撰雲南布政司雲南古梁州之南境為徼外夷地漢置益州郡領於益州部刺史自唐至宋為蒙氏段氏所據元置雲南諸路行中書省及肅政亷訪司于中慶又置曲靖等路慰宣司于曲靖臨安等處宣慰司于臨安大理金齒等處宣慰司都元帥府于金齒本朝改置雲南等處承宣布政使司領雲南大理臨安楚雄澄江廣西廣南鎮沅䝉化景東永寧順寧一十二府曲靖姚安鶴慶武定尋甸麗江元江永昌八軍民府北勝新化二州者樂甸一長官司禦夷孟定孟艮二府孟養軍民指揮使司車里木邦老撾緬甸八百大甸大苦刺麓川平緬底馬撒八宣慰使司干崖南甸隴川三宣撫司鎮康灣甸大侯威逺四州芒市鈕几孟璉茶山麻里五長官司置雲南都指揮使司領雲南左雲南右雲南中雲南前雲南後廣南大理臨安曲靖景東楚雄洱海平夷越州䝉化陸凉永昌大羅一十八衛瀾滄騰衝二軍民指揮使司宜良易門安寧馬隆楊林堡十八寨木密關七守禦千户所置雲南等處提刑按察司分普安臨元金滄洱海四道監察諸府州衛所三司並治于雲南府云雲南府東至澄江府邑市縣界一百八十里南至澄江府河陽縣界一百二十里西至臨安府廣通縣界三百五十里北至尋甸軍民府界二百一十里自府治至南京七千二百里至京師一萬六百四十六百四十五里糧三萬四千二百石零建置沿革禹貢梁州之界天文井鬼分野周以前為徼外西南夷僰鳩獠慓裸毒獹咢烏蠻所居地楚莊蹻略地西至滇池因王其地號滇國秦常頞通五尺道頗置吏焉漢武帝遣將臨滇滇王舉國降遂置益州郡治滇池蜀漢改益州郡為建寧郡又分建寧置雲南郡晉因之兼置寧州宋齊並為建寧郡隋置昆州後廢唐初復置後為南詔蒙氏所據改為善闡府歷鄭趙楊三氏至大理段氏以髙智深領善闡牧遂世有其地元初置善闡萬户府至元中改置中慶路本朝洪武中改雲南府領州四縣九昆明縣附郭漢為滇池縣地隋為昆州之境唐為晋寧縣地元初立二千戶所後改置善州領昆明官渡二縣後州廢縣存尋又省官渡入焉本朝因之編户二十七里富民縣在府城西北九十里唐初為西寧州地貞觀中改西寧曰梨州烏蠻酋些門些未始築馬舉籠城號梨灢甸元至元初立梨灢千户所後改為富民縣本朝因之編户二里宜良縣在府城東南一百五十里昔蠻酋囉氏築城號囉裒籠唐貞觀中置匡州領匡川等縣元初立宜良匡城及大池千戶所至元中改置宜良州領大池大赤二縣後改州為縣併二縣入焉本朝因之編户四里嵩盟州在府城東北一百二十里古滇國地烏蠻車氏等居此後為枳氏所奪因名枳磑昔有漢人築金城于此曰長州因築臺與蠻盟故名其地曰嵩盟唐時䝉氏置長城郡宋時屬大理段氏改嵩盟郡元初立嵩盟萬户府至元中改為長州尋升為嵩盟府後復為州領楊林邵甸二縣本朝初因之洪武中省邵甸縣入州成化間楊林縣亦併入編戶九里晉寧州在府城東南一百里漢滇池縣地晉隆安初置晉寧州唐武德初置昆州及晉寧縣後䝉氏段氏皆為陽城堡部元初立陽城堡萬戶府至元中復為晉寧州本朝因之編戶五里領縣二歸化縣在州北二十里安江城昔有吳氏居之因名大吳籠後為些莫徒蠻永偈所據元初𨽻呈貢千所至元中分置歸化縣本朝因之編户三里呈貢縣在州北六十里有故城曰呈貢城世為烏白些門些莫徒門茶僰五種蠻所居元初立呈貢千户所至元中改為晟貢縣本朝改呈貢縣編戶四里安寧州在府城西南八十里古滇國螳螂川也漢為益州郡之連然縣晉屬建寧郡隋屬昆州唐武德初置安寧縣𨽻昆州䝉閣羅鳳叛唐以蘇閉阿裒治之大理以髙氏守之元初𨽻陽城堡萬戶府至元初立安寧千戶所後改為州本朝因之編戶一十里領縣二羅次縣在州八九十里古壓磨目村本烏蠻羅部農落彈所居地大理時髙量成令高白連慶治其地元至元中因羅部置羅次州𨽻中慶路後改為縣屬安寧州本朝因之編戶三里祿豐縣在州西一百八十里古祿琫甸白村昔烏僰蠻居之以其地瘴熱遷徙不常大理時髙智升子義勝治其地元初𨽻安寧千户所至元中置祿豐縣屬安寧州本朝因之編戶三里昆陽州在府城南一百五十里地在滇池南漢屬益州郡晉屬寧州梁時為土人爨瓉所據隋南寧夷爨玩拜昆州刺史唐開元前置河東等二十二州𨽻嶲州改𨽻黎州都督後沒于南詔宋時大理以髙氏治之名巨橋城元立巨橋萬戶府至元中改為昆陽州本朝因之編戶四里領縣二三泊縣在州西北七十里昔僰獠蠻所居之地後為大理所有以善善闡元初𨽻巨橋萬戶府至元中於那龍城置三泊縣以溪為名本朝因之編戶二里易門縣在州西一百五十里昔烏蠻酉仲磨由男所居之地大理時高福世守其城元初立洟門千戶所𨽻巨橋萬戶府至元中改易門縣本朝因之編户三里郡名滇國春秋時名益州漢名益之為言隘也言其地險隘亦曰疆壤益大故曰益建寧蜀漢名晉陵晉名形勝接吐蕃際黔巫唐書東距爨東南屬交址西摩伽陀北接吐蕃東北際黔巫西南重鎮元儒學提舉何𢎞佐禮樂記會要之地蹇郁修學記山川明秀大德橋記風俗種類非一習俗不同雲南志諸處之夷種類非一曰僰人曰爨人即羅羅有黑白二種曰麼㱔曰禿老曰㱔門曰蒲人曰和泥蠻曰白夷又有小百夷曰土獠曰羅舞曰撒摩都曰摩察曰濃人曰山後人曰哀牢人曰峨昌蠻曰蠻曰魁羅蠻曰傳尋蠻大扺滇南之夷皆此數種其所習俗各不相同男女勇揵不鞍而騎善用矛劎唐書勤耕務實敬釋誦經嚚訟好鬭俱郡志俗無禮儀死不葬祭元史賽典赤傳俗無禮儀男女自相配偶死則火之不為葬祭臘月祀祖嵗以臘月二十四日祀祖如中州上塜之禮食貴生猪牛雞魚皆生醢之和以蒜食交易用貝貝俗呼作􅖝以一為莊四莊為手四手為苗五苗為索雖租稅亦用之椎髻編髮男子披氊椎髻婦人不塗澤髮以青紗分編繞首盤繫處子孀婦出入無間情通私耦然後成婚首戴次工製如漁笠覆以黑氊親故雖久别無拜跪唯取次工以為禮以上俱方輿勝覽山川五華山在府城內上有佛寺螺山在府城北舊名盤坤山有巨石色皆深碧如螺髻下有潮音洞洞門有盤瓠廟基商山在螺山北連峰叠巘丹崖翠壁若鸞停鵠立下有冷泉土人云浴之可去風疾石鼻山在府城西一十里山有白石狀如人鼻進耳山在府城西二十里許上有廟俗傳有漢使卒于此土人祠之春秋祭祀則豐稔聚仙山在府城西二十里一名筆架山北有神魔洞下有泉流入鴛鴦池抹葱山在府城東二十里樂錯半山在府城北二十里玉案山在府城西二十五里一名列和蒙山秀麗多泉石石有碁盤山北平坡中有三泉如盆池郡人春日遊賞于此山中有玉案蘭若文殊山在府城北二十五里一名䝉滯雄山上有文殊堂及文殊泉金馬山在府城東二十里西對碧雞山中隔滇池山不甚髙而綿亘西南數十里上有長亭下有金馬關碧雞山在府城西南三十里東瞰滇澤蒼崖萬丈緑水千尋月印澄波雲橫絶頂雲南一佳景也漢宣帝時方士言益州有金馬碧雞可祭祀而致遣王褒往祀至蜀而卒顔師古謂金形如雞碧形如馬未知果否元張雄飛詩北闕辭丹鳳南雲看碧雞紫苔移玉座瑤草濕金泥雨霽龍歸洞風生虎渡溪尋梅穿竹徑採藥躡松梯太華山在碧雞山西北靈芝山在富民縣西南二里舊名赤晟化山洞口山在富民縣東南三里下有洞水從中流出經縣南西北入安寧河顛臥山今名滇和山嚕臥山今名魯和山䝉課卧山今名無怯和山俱在富民縣西十餘里黃弄山在富民縣北十五里客爭容山在宜良縣東一十里為縣鎮山今名犁摩山觀音山在宜良縣西一十里山頂有泉今名水井山其南有岩泉山北樂山在宜良縣北三十里一名播雄山今名保紅山笮箐山在宜良縣西五十里蛇山在嵩盟州治北山小而竒形如盤蛇羅錦山在嵩盟州東北一十五里岩石峭立紋彩若羅錦下有泉亦名羅錦有灌溉之利秀嵩山在嵩盟州東二十里聳秀插霄漢環州之山此為最彌雄山在嵩盟州北三十里蒼崖疊出望之蔚然土壤肥饒蔬果繁夥今名彌秀山欶雺山在盟州東四十里世傳䝉世隆征烏蒙得四女歸至此山四女遙望故鄉俯仰歎息忽山顛霧結三峰蠻謂三為欶注為雺其山􅍶崒獨峻登眺則雲南悉在目中又名峻葱山抹摐山在嵩盟州西五十里春月開三色聚八仙花布滿山澗土人謂之登花東葛勒山在嵩盟州故邵甸縣西北髙三十里為南中之名山竹雄山在嵩盟州故楊林縣舊治南楊林山在嵩盟州故楊林縣治東羣峰立屏列如畫山麓有石狀狀如羊烏納山在嵩盟州故楊林縣西南一十里有石如馬頭土人以烏納名之山周百餘里西距呈貢東接宜良水草宜牧萬松山在晉陵州東五里中有萬松盤龍羅漢三寺金砂山在晉寧州西五里産砂石其色如金五龍山在晉寧州南五里山多雲氣上有五龍泉一名小石屏山光長山在晉寧州西南一十里北瞰滇池上有二竒石腹中空洞叩之如鐘鼓聲三台山在呈貢縣治北三山相屬如台星一名萬福山象兔山在呈貢縣西南一十五里舊有蠻寨羅青山在安寧州治西上有羅青廟廟前泉極甘美呀嵕山在安寧州西北五里州之主山山有煎鹽水及産仙茅花木洛陽山在安寧東一十里昔段氏于上鑿十六羅漢建法華寺下有泉流經東橋灌田三千餘畝岱晟山在安寧州北一十五里昔嘗産仙女稻今名筆架山葱山在安寧州西北二十里髙聳冠諸山其北復起為鳳城山玉龍山在羅次縣東三里中有碧石竇湧泉如玉龍吐水之狀九戍山在羅次縣舊治南五里又名九峯今名九湧穹蕩山在羅次縣南一十五里烏蠻謂之崛嵕峰上有穹蕩庵苴麼崱裒山蠻語譯云子望母之山有二一在羅次縣舊治東北四十里一在縣西三十里䝉答縳山在緑豐縣西五里勢如翠屏今名三次和山南平山在豐祿縣西一十五里三面陡峻惟南稍平故名姚陵山在祿豐縣東北三十里舊名驥琮籠山群山中一峰聳拔山頂有泉及古寨長松山在昆陽州西五里上多松石仙卧山在昆陽州滇池之側一名白鳥山望州山在昆陽州北一十里其勢昂聳回顧州治珊䝉果山在昆陽州西一十里山如翠屏頂秀三峯竒分八面寶應山在昆陽州東南一十里雲龍山在三泊縣西北一十五里岡巒秀聳四時蒼翠將雨則雲凝其上葱䝉臥山在三泊縣舊治北一十五里上有漢人舊城及王仁求碑白鶴山在三泊縣西南一十四里相傳有鶴巢其上故名滑光嶍山在三泊縣舊治西南三十里岩上有一小城娘當山在易門縣北舊名戈晟智桶山三峯聳秀可愛蒙低梨巖山在易門縣舊治南五十里髙插雲漢下有坪谷宜牧祿益惡危山在易門縣舊治西一百里上有依依主城昔善關邉戍之所響石在富民縣東八里石色青白狀如馬鞍擊之有聲如磬滇池在府城南一名昆明池一名滇南澤周廣五百餘里合盤龍江黃龍溪諸水滙為此池中産衣鉢蓮花盤千葉蘂分三色下流為螳螂川中有大小卧納二山史記滇水源廣末狹有似倒流故曰滇漢武帝欲伐滇國於長安西南穿昆明池象之以習水戰螳蜋川源自滇池縈回安寧州治過昆陽州冨民縣下入金沙江渠濫川在昆陽州東南五里東北流入滇池大池江一名盤江一名大河從澄江府邑市縣北入宜良縣境八十里出縣界大城江源自陽宗縣明河流經宜良縣東下入盤江盤龍江一名滇池河源自嵩盟州故郡甸縣之東山西山凡九十九泉合流經府城東又南入滇池龍巨江一名龍濟溪源出尋甸果馬山流經