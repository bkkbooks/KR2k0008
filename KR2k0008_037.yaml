卿善教子矣唐李大亮西北道安撫大使詔欲貯糧磧口以賑西突厥大亮言勞費無益不如罷之其或自立君長求內屬者羈縻受之使居塞外為中國藩蔽此乃施虛惠而收實利帝從之唐璿涼州都督時吐畨寇涼州璿率衆擊之六戰皆克郭震涼州都督先是突厥吐畨常逼城下震始控其衝要寇不復至又令涼州刺史李漢通墾置屯田積粟數千斛軍用以足夷夏畏慕王方翼髙宗時肅州刺史烽邏精明河西蝗獨不至方翼境而他郡民或餒死方翼治下全活甚衆芝産其地杜希望玄宗時鄯州都督時軍屢興府庫虛寡希望居數歲芻粟金帛豐餘張守圭開元中為瓜州刺史虜奄至衆失色守圭置酒城上會諸將作樂虜疑有備不敢攻引去守圭縱兵擊敗之遷瓜州都督宋髙永年知西寧州時夏人寇涇原賖羅撒合兵逼城永年出禦之被執不屈而死元巴圖延佑初甘肅行省平章政事時米價騰湧陸挽一石費二百緡乃為經畫計所省至四百餘萬緡自是諸倉充溢歲飢則發粟賑之春缺種則貸之於是兵餉既足民食亦給本朝濮瑛涼州衛指揮使洪武中修葺城樓倉庫措置有方士卒不勞而事集郡稱智能尋以擒叛賊功升右軍都督僉事掌陜西行都司事劉林涼州衛百户洪武中土官額森特穆爾等逃叛攻掠涼州林擊賊至城西土臺力戰而殁事聞上嘉其忠勇遣祭于臺下宋晟洪武中討哈密有功永樂初又遣都指揮史昭出兵擒火者厮通西域貢道加封晟至西寧侯鎮守甘肅子琥襲父爵亦在甘肅鎮守蔣貴正統初敵人犯邊貴充總兵至甘肅擊敗敵衆以功升定西伯鎮守甘肅邊境寧謐流寓馬援茂陵人少有大志王莽末避地涼州隗囂以為綏德將軍後歸漢纍功拜伏波將軍人物漢金日磾張掖人休屠王子沒入官武帝竒其壯貌拜為侍中賜姓金氏嘗欲納其女於後宫日磾不肯後為車騎將軍與霍光同受遺詔輔政著忠勳之節封秺侯卒諡曰敬二子賞建昭帝時居為侍中賞嗣侯爵金倫日磾弟惇篤有智仕為侍中封侯四子常敞岑明敞元帝時為侍中與蕭望之周堪劉向同心謀議敞之子涉成帝時拜侍中涉從弟欽平帝時為京兆尹以家世忠孝遷光祿大夫張奐燉煌酒泉人父惇為漢陽太守奐舉賢良對策第一為安定屬國都尉正身修德威化大行拜武威太守長子芝以善草書知名段頻武威姑藏人少便習弓馬尚遊俠輕財長乃折節好古學舉孝亷為司𨽻校尉與皇甫規張奐並顯名於時蓋勳燉煌廣至人初舉孝亷為漢陽長史後領漢陽太守時人飢相漁食勳榖廩之存活者千餘人拜討虜校尉及董卓廢少帝自公卿以下莫不卑下於卓唯勳長揖爭禮三國龎淯酒泉福祿人初以涼州從事守破羌長會武威太守張猛反殺刺史邯鄲商淯聞之棄官奔哭喪所訖徐詣猛門衷匕首欲殺猛猛知其義士敕遣不殺後太守徐揖請為主簿郡人黃昂反圍城淯冒圍出告急於張掖燉煌二郡軍未至而城陷揖死淯乃收斂揖喪送還本郡曹操聞之辟為掾屬文帝時賜爵關內侯賈詡武威人少時人莫知惟閻忠異之謂其有良平之竒察孝亷為郎歷平津都尉魏文帝即位以為太尉卒諡敬侯晉賈匹武威人詡曽孫愍帝時為雍州刺史封酒泉郡公嘗擊敗劉曜襲蕩仲殺之後為蕩仲子夫護所害匹勇略有志節以匡復晉室為已任不幸顛墜時人咸痛惜之索靖燉煌人纍葉宦族善草書仕晉為尚書郎初與鄉人汜衷張彪索紒索永同詣大學馳名海內稱燉煌五龍四人並早亡惟靖纍官尚書郎後為遊擊將軍與賊戰被傷而卒祁嘉酒泉人少清貧好學年二十餘西至燉煌依學宫誦書貧無衣食為諸生都養以自給遂博通經傳精究大義徵為儒林祭酒性和裕教訓不倦門生受業獨拜牀下者至二千餘人宋纎燉煌人少有逸操隱居酒泉南山弟子受業者三千餘人時太守馬岌具威儀造焉纎拒不見岌銘詩于壁曰丹崖百丈青壁萬尋竒木蓊鬱蔚若鄧林其人如玉為國之琛室邇人遐實勞我心卒年八十諡曰玄虛先生索綝靖子少有逸羣之量靖每曰綝廊廟之才非簡札之用州郡吏不足汚吾兒也仕晉纍官至尚書左僕射後為劉聰所獲遇害南北朝賈彞武威姑臧人父為苻堅巨鹿太守坐訕謗繫獄彞年十歲詣長安訟父獲伸逺近嘆之弱冠為慕容垂遼西王農記室參軍魏道武聞其名常遣使求彞及即位拜為尚書左丞參預國政劉延明後魏燉煌人父寶以儒學稱延明年十四就博士郭瑀受業瑀妻以女後隱居酒泉不應州郡命弟子受業者五百餘人涼武昭王徵為儒林祭酒從事中郎遷撫夷護軍雖有政務手不釋卷宋繇燉煌人少以孝聞隨妹夫張彥至酒泉追師就學晝夜不倦博通經史事涼武昭王歷位通顯家無餘財雖兵革間講誦不輟後入魏拜河西王相賜爵清河公宋遊道繇曽孫事母以孝聞後魏時為殿中侍御史臺中語曰見惡能討宋遊道孝莊即位除左兵中軍後入北齊為尚書左丞源賀西平人偉容貌善風儀事魏太武賜爵西平侯以功進平西將軍太武征涼州以為鄉導纍官冀州刺史封隴西王嘗上十二陳圖卒贈侍中諡曰宣子思禮謙恭寬雅有大度文成末為侍御中散詔持節巡行北邊鎮恆燕朔三州上事宜三十餘條皆見嘉納段榮姑臧人祖信以豪族徙家五原郡榮好厯術專意星象後魏正光中謂人曰吾今觀玄象察人事不及十年當有亂矣及齊神武起兵榮贊成之論功封姑臧縣侯厯相濟秦三州所至百姓愛之段韶榮子有將領才略以武明皇后甥齊神武益器愛之韶襲父爵事神武文襄加廣平郡公出總軍旅入參帷幄功髙望重又教訓子弟閨門雍睦事後母以孝聞齊代勳貴罕有及者隂鏗武威人善五言詩為梁湘東法曹參軍嘗與賔友宴飲以酒炙授行觴者衆皆笑鏗曰吾儕終日酣醉執爵者不知其味非人情也後遇侯景亂被賊擒或救免之乃前行觴者隋隂壽武威人少果烈有武幹文帝嘗遣韋孝寬擊尉遲迥命壽監軍時孝寬有疾不能親總戎事三軍綱紀皆決於壽以功進位上柱國拜幽州總管封趙郡公隂世師壽子性忠厚多武藝以功臣子拜儀同煬帝即位拜張掖太守甚為戎狄所憚後遷左翊衛將軍與代王留守京師唐軍至世師自以世荷隋恩拒守不下見殺唐薛萬均本燉煌人與弟萬徹等客幽州事唐從李靖討吐谷渾又副侯君集討髙昌皆有功貞觀中封潞國公萬徹及萬淑萬備俱以戰功顯為時名將萬淑封梁國公萬備有志行居母喪廬墓太宗詔表其門後仕至左衛將軍趙武孟甘州張掖人少遊獵以所獲饋其母母泣曰汝不好書而敖蕩吾安望哉不為食武孟感激遂力學淹該書記自長安丞為右臺御史著河西人物志十篇子彥昭少豪邁風骨秀爽及進士第景龍中纍遷中書侍郎同平章事烏承玼張掖人開元中與族兄承恩皆為平盧先鋒沈勇而決號轅門二龍後破奚契丹從戰捺祿走可突于渤海擾海上吏民逃徙失業承玼以兵塞要路塹原纍石綿四百里寇不得入其後又説史思明降官至檢校殿中監封昌化郡王段平仲武威人擢進士第為監察御史有氣節嗜酒敢言德宗春秋髙躬自聽斷平仲對及由是坐廢元和初為諫議大夫再遷尚書左丞朝廷有得失未嘗不論奏李抱玉本安興貴曾孫世居河西為人沉毅有謀李光弼引為禆校有戰功安祿山亂抱玉上言世居涼州恥與逆臣共宗詔賜姓李官至司空兼兵部尚書加山南西道副元帥卒贈太保李抱真抱玉從弟沈慮而斷抱玉屬以軍事代宗時授澤潞節度副使抱真以澤潞兵所走集乃籍户丁給弓矢習射三年皆為精兵田恱反抱真戰走之又説王武俊共破朱滔纍官檢校司空烏重胤承玼子少為潞牙將兼左司馬節度使盧從史奉詔討賊隂與賊連重胤乃縛從史帳下叱兵士曰天子有命違者斬士斂手還部無敢動者憲宗嘉其功擢河陽節度使封張掖郡公重胤善撫士待官屬有禮其在河陽名士如溫造石洪皆辟致幕下人多稱之五代李琪燉煌人舉進士博學宏辭事梁為翰林學士梁兵征伐四方詔書皆琪所為下筆輒得太祖意梁亡仕唐纍官至右僕射琪少以文章知名既貴乃刻牙板為金字曰前鄉貢進士李琪常置坐側元劉容其先西寧青海人父海川徙云京後遂為云京人容喜讀書亦善騎射中統初入侍皇太子每退直即詣祭酒許衡遊後纍官太子司議出為廣平路總管有治聲昂吉爾張掖人世為西夏將家父堪布率所部歸元為千户及卒昂吉爾領父軍從征諸國有功又略地淮南世祖時纍官行尚書省右丞時欲征日本昂吉爾疏諫不從既而師果無功昂吉爾屢為直言帝雖怒甚其辭不少屈余闕武威人徙廬州少喪父授徒以養母元統初賜進士及第授同知泗州事歷翰林修撰待制至正中盜起以闕為都元帥府僉事分兵守安慶俄升都元帥論保障功拜淮南行省參政仍守安慶羣盜四集以孤軍血戰城陷自剄妻子皆赴井死本朝吳允誠涼州人永樂中纍立戰功歷升左都督進封恭順伯吳管者允誠子歷官都指揮同知效勞於國洪熙初進封廣義伯吳克忠允誠子襲恭順伯洪熙初加封恭順侯太子太保能以忠節自勵從征邉寇力戰而沒追封邠國公諡壯勇弟克勤為都督與兄克忠同沒於陳諡僖敏列女趙娥酒泉人父安為同縣李壽所殺娥兄弟三人同時病死壽家防備懈弛娥自傷父讎不報乃幃車袖劔白日刺壽於都亭前徐詣縣顔色不變曰父讎已報請受戮縣長尹嘉欲弛法縱娥娥不肯去遂強載還家會赦得免州郡歎賞刋石表閭子即龎淯也明一統志卷三十七
