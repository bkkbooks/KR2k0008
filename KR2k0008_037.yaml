body:
  text: 明一統志卷三十七明李賢等撰寧夏衛東至省嵬墩二百里西至賀蘭山一百里南至慶陽府界三百六十里北至西瓜山二百九十里自衛治至京師三千六百四十里至南京三千八百四十里建置沿革禹貢雍州之域天文井鬼分野春秋時羌戎所居秦為上郡地漢置朔方郡晉亂赫連夏建都於此後魏始置夏州西魏置𢎞化郡後周改懷逺郡隋為朔方郡唐置夏州或為朔方郡唐末拓跋思恭鎮夏州遂世據其地宋天禧間其孫德明城懷逺鎮為興州以居後升興慶府又改中興府元置寧夏路本朝初改寧夏府後府廢洪武九年改置寧夏衛𨽻陜西都司後又增置寧夏前寧夏後及寧夏左屯寧夏右屯寧夏中屯凡六衛郡名朔方漢名懷逺後周名形勝背名山而面洪流左河津而右重塞赫連夏京都頌黃河繞其東賀蘭聳其西新志西陲巨屏宋劉綜議靈州民淳土沃為西陲巨屏所宜固守以為扞蔽西北以山為固東南以河為險衛志風俗篤信禨鬼尚詛祝宋史夏國傳強梗尚氣敢戰鬭金史夏國贊尚釋重巫風俗不純寧夏志土人性勇鋭善畜牧尚釋重巫本朝徙其民於陜西而居此土者皆五方之人是以風俗不純人以支技藝趨利畜牧為資衛志山川賀蘭山在衛城西六十里丹崖翠峯巍然峻大盤踞數百里寧夏倚以為固唐韋蟾詩賀蘭山下果園成塞北江南舊有名莎羅模山在衛城南一百里峽口山在衛城西南一百四十里兩山相夾黃河經其中一名青銅峽上有古塔一百八座省嵬山在衛城東北一百四十里金積山在衛城南二百里山多赭土日照其色如金山北崖石板下有水亂滴如雨天旱禱雨有應黃草山在衛城北二百二十里其上草色多黃石觜山在衛城東北二百里山石突出如觜黑鷹山在衛城南二百五十里昔人嘗於此獲黑鷹居中山在衛城東南二百六十里蠡山在衛城南二百六十里層巒蒼翠其峯如蠡又東北有小蠡山西瓜山在衛城東北二百八十里以形似名狼山在衛城東南二百九十里其山多狼麥垜山在衛城東三百里山勢髙聳如麥垜琥八山在衛城西南三百四十里夷名琥八猶華言色駁雜也鹿山在衛城西南與琥八山相近其山多鹿三山在衛城東南三百六十里三峯列峙子山在三山南溪澗險惡豺虎所居人迹罕到山出子木平山在靈州城東北八十里以山頂平而名黃河在衛城東南四十里流至西南臨洮府蘭縣經寧夏中衛南過峽口至本衛境居人疏渠溉田數萬頃乂經衛境東北過東勝州復由綏德州境南流黑水河在衛城東番名哈喇烏蘇河西流注于黃河清水河在衛城南三百五十里故鳴沙州城南即古葫蘆河也河流甚狹自平涼界來注于黃河金波湖在衛城北三塔湖在衛城東北三十里巽湖在衛城東南三十五里觀音湖在衛城西九十五里賀蘭山大水口月湖在衛城北七十五里以形似名長湖在衛城西北一百二十里蒲草湖在靈州千户所東南一十里草場湖在靈州千户所南三十里東湖在故韋州城東三十里鴛鴦湖在東湖北三里漢延渠在衛城東南支引黃河水繞城溉田可萬頃歲無旱潦之虞唐來渠在衛城西南亦引黃河水繞城西溉田萬餘頃新渠在衛城南分唐來渠水溉田數百頃紅花渠在衛城南五里分唐來渠水東流溉田七百餘頃乂引入城中民汲甚便秦家渠在黃河東南分河水溉田數百頃漢伯渠在黃河西南分河水溉田二百餘頃滚泉在金積山東麓水自池湧出髙一二尺如沸湯之狀清潔可飲富泉在蠡山水甚甘冽鹽池有二大鹽池在衛城北四百里小鹽池在衛城東南二百七十里其鹽皆不假人力自然凝結土産鐵麥垜山出鉛􅈨俱賀蘭山出鹽有池胡麻青稞蓯蓉枸杞青木香楸子暖木羱羊絨褐紅花藩封慶王府在衛城內本朝洪武三十四年建安化王府在衛城內澄清坊俱正統八年建安塞王府在衛城內東景泰四年建真寧王府在衛城內東鎮安坊平涼王府在衛城內天順初建𢎞農王府豐林王府壽陽王府延川王府俱同城以後建公署寧夏中護衛洪武中為慶府置靈州千户所在衛南九十里洪武中建興武營守禦千户所在衛城西南二百里學校寧夏衛學在衛城西北洪武二十九年建為寧夏中屯等衛學永樂三年改為寧夏等衛學宫室元昊宫在賀蘭山之東昔趙元昊據有夏地居興州阻河依山為固建宫於此宫墻尚存髙臺在衛城東一十五里地勢崇髙登眺極山河之偉觀趙元昊於此建寺久廢關梁靈武營在衛城北一百里正統十一年建黑山營在衛城北二百四十里永樂元年建清水營在衛城東南一百二十里黃河東南正統七年建興武營在衛城東南三百二十里黃河東南正統九年建花馬池營在衛城東南三百五十里正統九年建守備參將分居於此河西寨在黃河西岸河東寨在黃河東岸潘昶堡在衛城東二十五里自是而東南又有金貴李祥張濟魏敬王信王貴任春葉誠凡八堡俱屬寧夏衛王景堡在衛城西南四十里自是而西南乂有李俊邵剛瞿靖林臯蔣鼎陳剛凡六堡俱屬寧夏左屯衛王澄堡在衛城東北三十五里自是而東南又有張政魏政二堡俱屬寧夏左屯衛楊顯堡在衛城西南三十五里自是而西北乂有陶容雷福桂文常信洪廣髙榮姚福凡七堡俱屬寧夏右屯衛謝保堡在衛城北十五里自是而北又有張亮李信丁義周澄凡四堡俱屬寧夏前衛官橋在衛城南二十八里跨漢延渠永通橋在衛城南跨紅花渠昌寧橋在衛城南八里跨新渠賀蘭橋在衛城西跨唐來渠寺觀承天寺在衛城西宋時夏人建後廢獨存一塔本朝慶府重建報恩寺在衛城內之西元建寧靜寺在衛城東南正統十年建三清觀在衛城東南永樂四年建陵墓慶靖王墓在衛城南二百二十里悼莊王墓在衛城南三百一十里二王俱本朝宗室李王墓在賀蘭山下數塜巍然皆夏國主李繼遷等墓古迹靈州城在衛城南本漢靈州縣後魏為靈州隋置靈武郡唐肅宗即位於靈武即此宋改翔慶軍元仍為靈州本朝州廢置守禦千戶所保靜城在衛城西南八十里漢築後魏置𢎞靜鎮隋為𢎞靜縣唐改名保靜屬靈州夏為靜州元廢本朝屯軍居焉夏州城在衛城東黃河岸側晉時赫連據此稱大夏後魏置夏州省嵬城在黃河東定州城在衛城北六十里本唐定逺城趙元昊改為定州雄州城在靈州城西南一百八十里本承天堡唐中和間徙雄州治此韋州城在衛城東南三百六十里夏為韋州靜塞軍田州城在衛城北六十里欣都城在衛城東北五百里名宦唐張仁願朔方軍總管於河北築三受降城絶虜南寇路自是朔方無冦歲損費億計減鎮兵數萬崔知溫靈州司馬境有渾斛薩萬帳數擾齊民農皆釋耒習騎射以扞賊知溫表徙河北自是人得就耕王方翼夏州都督屬牛疫民廢田作方翼為耦耕法張機鍵力省而見功多百姓賴焉魏元忠靈武道行軍大總管以禦突厥馭軍持重雖無赫然功而亦未嘗敗裴識靈武節度使靈武地斥鹵無井識誓神而鑿之果得泉杜希全朔方節度使軍令嚴整士畏其威奉天之狩引兵赴難賊平遷靈鹽豐夏節度使五代張希崇唐明宗時為靈武節度使開屯田教耕種軍食足而轉饋省馮暉晉天福中以義成節度使鎮靈武推以恩信部族懷惠止息侵奪廣屯田以省轉餉民不加賦管內大治宋董遵誨靈州路巡檢豁達多方略武藝絶人夏人畏之秋毫不敢犯段思恭知靈州綏撫夷落訪求民病有勤績侯贇太宗時知靈州按視藩落宴犒以時得邊士心部內大治在朔方者凡十餘年安守忠太平興國初知靈州在官七年後移夏州每西戎犯邊戰無不捷王昭逺至道中李繼遷擾西鄙絶靈武糧道命昭逺為靈州路都部署護二十五州芻粟竟達靈武繼遷不敢犯尹憲雍熙初知夏州攻破李繼遷之衆于地斤澤繼遷遁走俘獲四百餘帳田紹斌靈州馬步軍都部署領衆入蕃討賊斬首二千級獲羊馬槖駝二萬計以給諸軍捷聞手詔嘉諭之郭密吳州兵馬都部署訓練士卒號令嚴肅夏人畏服邊境賴以寧謐楊瓊靈慶路副都部署捍寇有功導黃河溉民田數千頃後又充靈環十州軍副都部署兼安撫使元袁裕中統間為中興等路勸農使時徙鄂民萬餘於西夏多流離顛沛裕與安撫使獨吉請于朝計丁給地立三屯使耕官民便之張文謙以中書左丞行省西夏中興等路變其鄙野之俗及浚渠溉田人蒙其利郭守敬以河渠副使從張文謙至西夏濬漢延唐耒等渠溉田萬餘頃董文用中興等路行省郎中自琿塔哈之亂民間相恐竄匿山谷文用鎮之以靜民乃安始開唐來漢延等渠墾水田若干於是民之歸者四五萬悉授田種頒農具本朝張麟永樂中以陜西都指揮使鎮守寧夏固守封疆控制外夷邊境賴以無虞金濓正統中以右副都御史鎮守寧夏勸民出粟置預備倉以賑荒軍民賴之人物漢傅燮靈州人仕為議郎諒直不避權貴每公卿有闕為衆議所歸晉傅亮靈州人父瑗以學業知名仕晉位至安成太守兄迪宋初官至五兵尚書亮博涉經史尤善文辭義熙中纍官中書黃門侍郎宋武帝受禪封建城縣公入直中書省專典誥命南北朝傅昭靈州人七世祖咸晉司𨽻校尉昭初仕南齊為學士梁武帝素重昭以為給事黃門侍郎歷左户尚書安成內史昭蒞官常以清淨為政居朝廷門無請謁博極古今世稱為學府傅琰靈州人父僧祐宋山隂令有能名琰歷武康山隂二縣令並著能名二縣皆謂之傳聖賜爵新亭侯傅縡靈州人七歲誦古詩賦至十餘萬言長好學能屬文居母喪哀毁骨立仕陳為祕書監右衛將軍兼中書通事舍人掌詔誥下筆輒成未嘗起草唐韓遊環靈州靈武人始為郭子儀禆將安祿山反遊瓌赴難功第一李懷光叛誘遊瓌為變遊瓌白發其書帝曰卿可謂忠義矣京師平論功與渾瑊皆第一纍官邠寧節度使卒諡曰襄康日知靈州人祖植玄宗時以功封天山縣男日知為趙州刺史拒李惟嶽叛德宗美之擢深趙觀察使封會稽郡王子志睦資趫偉工馳射以功封會稽郡公承訓亦以功封會稽郡男楊懷賔夏州朔方人為韓遊瓌將李懷光反懷賔斬賊黨張昕及同謀者告行在德宗勞問授御史中丞子朝晟為懷光所縶懷光平帝原朝晟父子皆開府御史中丞軍中以為榮戴休顔夏州人家世尚武志膽不常郭子儀引為大將諭平黨項羌以功封咸寧郡王兼朔方節度副使朱泚反休顔率兵馳奔行在與渾瑊等扞禦有勞破泚偏師以功加檢校尚書右僕射卒贈楊州大都督弟休璿封東楊郡王休晏封彭城郡公史敬奉靈州人為朔方軍牙將元和中吐蕃數犯塞敬奉白節度使請兵三千深入虜地由間道繞出虜後大破之獲馬牛數萬賜實封五十户敬奉走逐奔馬矛矢在手前無強敵以雄邊名宋周美靈州回樂人少𨽻朔方軍以材武稱真宗幸澶淵常令宿衛纍遷鄜延副都總管在邊前後十餘戰平簇帳二百復城堡甚多每邊書至未嘗辭難所向輒克諸將服之孫永清熟李靖兵法纍平賊官至東上閣門使斡道沖靈武人其先從夏主遷興州世掌夏國史道沖通五經為蕃漢教授譯論語注别作解義二十卷又作周易卜筮斷以其國字書之行於國中後官至其國中書宰相元李楨西夏國族子金末以經童中選既長入為質子以文學得近侍元太宗嘉之後從伐金及下淮甸纍官廣陽軍馬萬户髙智耀河西人世仕夏祖良惠為右丞相智耀登本國進士夏亡隱賀蘭山元太宗召見將用之遽辭歸後入見憲宗言儒者宜蠲徭役世祖時又言儒術有補治道拜翰林學士遷西夏中興等路提刑按察使卒追封寧國公諡文忠髙睿智耀子年十六授符寶郎出入禁闥詳雅恭謹歷嘉興路總管浙西淮東亷訪使所至有政績兩為南臺御史中丞務持大體有