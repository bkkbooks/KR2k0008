帝立徴入朝百姓攀留不得出境詣闕上書者數百人帝謂曰卿昔為名將今為良二千石可謂兼羙矣張𤣥素景城縣户曹叅軍竇建徳䧟景城執將殺之邑人千餘號泣請代曰此清吏殺之是無天也大王即定天下無使善人解體釋之唐薛大鼎武德中滄州刺史浚治無隶溝屬之海商賈流行郡民歌頌又䟽長蘆漳衡二渠泄汙潦水不為害鄭徳本瀛州刺史有治行與滄州薛大鼎冀州賈敦頤齊名故河北稱為鐺脚刺史賈敦頤貞觀中瀛州刺史州瀕滹沱􅋤二水嵗湓溢壊室廬浸洳數百里敦頤為立堰庸水不能暴百姓利之殷侑滄州行軍司馬以仁惠為治吏民安其政王遵鄚縣令浚陂溉田民甚徳之遵字子貢人號曰子貢陂魚思賢開元初任丘令開通利渠以洩陂淀入滱水得地二百餘頃百姓利之號其陂為魚君陂穆寧鹽山尉安禄山反署劉道𤣥為景城守寧募兵拒之檄州縣并力捍賊成功宋王晋卿莫州刺史在郡謹斥堠善撫循士卒皆樂為之用邉民按堵靳懷徳太宗時莫州刺史又徙知滄州悉心為治克著政績人多稱譽之李斌知滄州人服其清慎及代吏民不忍其去鄰境亦上其善狀詔書褒羙之何承矩僉書滄州事修飭邉備境内肅然又築隄瀦水以防要害後知是州安守忠端拱中知凔州改瀛州兼髙陽闗駐泊部署遷瀛州防禦使所至治尚簡静後又再知滄州康保裔咸平初知瀛州契丹入境諸將戰河間援不至保裔率精銳徃敵凡數十合矢盡力窮死之李延渥咸平中知瀛州契丹大兵来攻延渥率州兵拒守契丹遁去擊死者三萬餘傷者倍之張美自定關節度移鎮滄州持身㢘謹以政績聞在滄十年世謂之滄州張氏李允則真宗時知滄州汲汲葺營壘開井泉言者以為授未㡬遼㓂圍滄州郊外民皆入城堡飲不乏水始感其有備又以氷代砲成深泥遼兵解去張綸知瀛州又再知滄州所至興利除害有循吏風程戡仁宗時知瀛州契丹使過稱疾求着㡌見戡使謂曰冇疾可毋相見見當如禮使者語屈冠而見吕公弼慶厯中知瀛州治尚寛弟公儒亦嘗知是州包拯河北都轉運使知瀛州諸州以公錢貿易積嵗所負十餘萬悉奏除之孟元知滄州民鬻鹽為生嵗荒鹽多不售民無以自給元度軍食有餘悉用易鹽由是民不轉徙彭思永知瀛州兼河北都轉運使時將惰兵驕思永以軍法從事驕兵大戢河北舊以桑麻為彥藉髙下民懼不敢植思永奏更其法民頼其利唐介知任丘縣適塘水嵗侵民田而實中貴主之介不避勢要募民自髙陽起隄十餘里蔽之其患遂息後又知瀛州張亢知瀛州增廣州城馭軍嚴明有風迹民圗像祠之髙繼勲知瀛州嵗饑募富人出粟以給貧者明年大稔木生連理者四郡人上治狀請留後再知是州李參知鹽山縣嵗饑諭富室出粟平其直子民不能糴者給以糟籺所活數萬後又知瀛州時稱為能吏張景憲知瀛州上言比嵗多不登民積逋欠今方小稔而官督使併償道路流言其禍乃甚於凶嵗願以寛假神宗從之張問熈寧末知滄州自新法行問獨不阿時好嵗饑為帝言民茍免常平助役之苦反以得流亡為幸䛇切直驚人韓贄知滄瀛二州政簡而治遷河北都轉運使河决商胡而北議者欲復之贄言不可詔遣使相視如其言孫永知瀛州河决於貝瀛冀尤甚民租以災免者州縣徴催如故永連章論止神宗從之仍命發廩粟以賑蔣之竒河北都轉運使知瀛州遼使耶律廸道死所過郡守皆再拜致祭之竒曰天子方伯柰何為之屈膝邪奠而不拜髙賦知瀛州程昉欲於境内開西流河繞州城而北注三塘泊賦曰滄城近河嵗増隄防猶懼奔溢矧妄有開鑿乎昉執不從後功竟不成王漢之知瀛州言自何承矩規塘濼之地屯田東逹于海其後又修保塞五州為隄道種所宜木至三百萬本此中國之利也今寢失其道願講行之韓忠彦知瀛州時用兵西方神宗命忠彦奉使遼語及西事忠彦曰此小役也何問為何灌知滄州有治城障功許運粟三十萬石於並塞三州灌言沿邉方登麥願以運費増價就糴奏上報可唐恪知滄州河決水犯城下恪乗城救理水去城得全乃上䟽請暫免保甲保馬及復諸縣租未報悉便宜罷行之民大恱陳遘徽宗時為河北都轉運使知河間府毎出行郡邑必焚香祈天願不逄貪濁吏金韓錫同知河間府事金主引見誡之曰聞皇族居彼者縱甚卿當以法䋲之錫下車宣布詔言後無有撓政害民者李完河間府治中習法律有治劇才在郡姦惡屏跡軍民無間語元李世和寧津令摧抑豪强矜貸困窮搜索隱匿得戸三萬餘謝讓河間路運鹽經厯先是竈户差役軍民未均讓悉均之逃亡逋負皆責見在豪猾率以計免讓亦均之王思誠河間路總管磁河水瀕溢决鐵燈竿思誠集民丁作隄期月而塞嵗用大稔又嘗建董仲舒毛萇書院髙源河間等路都轉運副使撫治有條竈户逃者皆復業常賦外羡餘㡬十萬緡吕思誠天厯初蓚縣尹清勤無私臨事明决均徭役毁滛祠立社學每嵗春行田樹畜勤敏者賞以農器否則有罰境内大治本朝葉好文交河知縣為政專尚德化故刑不用而民畏初以一牸牛駕車之任後産三犢比徴去留犢與貧民為耕縣民至今頌之朱逄吉洪武初寧津知縣專尚德化士民懷之所著有牧民心鑑崔衍永樂初河間知府幹濟有力善政著聞居民樂業召為刑部右侍郎劉深永樂末為景州知州善于撫字民感其德毎秩滿輒保留之在任㡬三十年姜濤宣德中河間府同知尋陞知府在任剛直謹幹撫字勤勞郡内大治召為順天府尹許侃正統初知河間府為政知大體惠及小民修舉廢墜厯有成績廖謨正統中為河間同知才識優長為政簡静尋陞本府知府聲譽益著卒于官民咸悼之王清成化間交河知縣居官清慎不事逢迎民甚安之喻茂堅正德問知河間府時畿内荒賑救所活萬餘人流寓家鉉翁眉州人宋末累官僉書樞宻院事使元被留聞宋亡哭泣不食飲元髙其節欲官之不屈改館河間教授弟子數為諸生談宋故事或流涕太息成帝即位放還賜號處士人物漢董仲舒廣川人少治春秋下惟講授三年不窺園圃以賢良對䇿勸武帝勉强學問行道設誠於内等語帝嘉之以為江都相仲舒學有源委正誼明道之言度越諸子為漢醇儒雋不疑渤海人治春秋為郡文學進退必以禮武帝末以暴勝之表薦徴拜青州刺史昭帝時擢京兆尹京師吏民敬其威信每行縣錄囚徒還其母聞有所平反則喜否則怒故不疑為吏嚴而不殘霍光欲妻以女固辭後以病免劉輔河間人漢宗室舉孝㢘懼諫大夫成帝欲立趙倢伃為后召封倢伃父臨為列侯輔上書言腐木不可以為柱卑人不可以為王書家奏繋秘獄辛慶忌等悉上書乃減死論為鬼薪終于鮑宣渤海髙城人好學明經舉孝㢘為郎累官諫大夫董賢用事抗論不已哀帝以宣名儒優容之後地震宣復上書言災異拜為司𨽻校尉尋以罪下廷尉太學諸生千餘人守闕上書乃減罪王莾秉政宣遇害張敏河間鄚人建初時舉孝㢘四遷尚書多所建明和帝時遷汝南太守清約不煩用刑平正有能理名再遷頴州太守徴拜司空劉淑眀樂城人明五經教授諸生數百人舉賢良方正辭不就桓帝聞其治切責州郡使輿病詣京師淑明起赴洛陽對策第一拜議郎又陳時政得失災異之占事皆驗遷尚書納忠建議多所禆益張超鄚人良之後有文行靈帝時從車騎將軍朱雋討黄巾有功為别部司馬著賦頌箋檄等文凡十九篇又善草書世多寳之巴肅渤海髙城人為議郎與竇武陳蕃等謀誅閹宦武等遇害肅亦坐黨禁錮肅自載詣縣令解印綬與俱去肅曰為人臣者有謀不敢隠有罪不逃刑遂被害三國張郃河間鄚人魏拜偏將軍從攻鄴㧞之文帝即位封都鄉侯與諸葛亮戰中流矢死謚壯侯邢顒河間人舉孝㢘司徒辟皆不就從田疇游積五年曹操辟為冀州從事顒字子昻時人稱曰徳行堂堂邢子昻後仕魏除行唐令累遷尚書僕射晉石苞渤海南皮人雅曠有智而容儀偉麗累官大司馬子崇為修武令有能名累遷荆州刺史後拜衛尉崇財業豐積室宇宏麗庖膳窮水陸之珍刁恊渤海饒安人少好經籍博聞强記累官尚書左僕射元帝南渡初朝廷草創憲章未立恊諳練舊章凡所制度皆諮于恊王敦搆逆恊出督大軍至江乗為人所殺南北朝邢祐鄚人少有學尚知名于時仕魏為平原太守䁑爵成平男子産舉秀才除著作郎從子虯尚書殿中郎孝文因公事與語問朝覲燕享禮虯以經對虯二子臧為樂安内史有吏政邵為黄門侍郎邢巒祐從孫少好學守貧勵節博覽書史有文才幹畧仕魏累官散騎常侍兼尚書終殿中尚書弟偉尚書郎中晏博渉經史官至滄州刺史晏初例得一子解褐乃舉弟之孤慎為朝請兄之孤昕為通直常侍髙允渤海蓚人漢太傅裒之後少有竒度崔宏異之曰髙子黄中内潤文明外照必為一代偉器既長博通經史天文術數尤好春秋公羊仕魏累官中書令爵咸陽公允雖寵貴家貧自如武帝嘗幸其第惟草屋數間布被緼𫀆厨中鹽菜而已帝曰古人清貧豈有此邪加光禄大夫卒年九十八髙祐允從祖弟博渉經史好文字雜說性通放不拘小節仕魏累官中書侍郎孝文嘗問祐比水旱不調何以止災祐曰旌賢佐政則災消穰至矣又問止盗之方曰湏守宰貞良則盜賊止矣孝文皆善之李叔彪蓚人好學博聞有識度魏太和中三遷至國子博士以公平見重於時歴遷中書侍郎尋除假節行華州事為吏民所稱吳遵世渤海人少以易筮知名魏孝武時有所筮無不應文襄即位除中書舍人所著有易林雜占百餘卷刁廱恊曽孫父暢晉右衛將軍晋相劉裕時負社錢二萬違時不還兄逵執而徴焉及誅桓𤣥以兵先誅刁氏廱與暢故吏奔姚興後歸魏以建威將軍討裕徙鎮濟隂賜爵東安伯卒年九十五謚曰簡子遵洛州刺史封回渤海蓚人曾孫懿有才器能屬文官至封侯回仕魏歴度支都官二尚書冀州大中正鄭雲謟事長秋卿得為安州刺史詣回問安州興生何事為便回曰卿荷國寵靈位至方伯宜思方畧以濟百姓如何問興生乎雲慙失色封軌回族弟通覽經藉儀容甚偉後魏清河王懌表修明堂辟雍軌與議累官廷尉少卿軌以務德慎言修身之本奸回讒佞世之巨害乃為務徳慎言逺佞防姦四戒髙岳蓚人深沉有氣量嘗寓洛陽北齊神武每使入洛必上岳舎岳母山氏嘗夜起見神武室中無火而有光詣卜者筮遇乾之大有占者曰貴不可言山氏歸報神武神武後起岳於信都封清河王馬敬徳河間人好儒術北齊時舉選至都授國子助教遷愽士武成為後主擇師傅入為侍講兼國子祭酒終瀛州大中正封隆之回長子寛和有度量首叅神武經畧竒謀皆宻以啓開手書削藁罕知於外隆之歴事五帝凡四為侍中再為吏部尚書一為僕射四為冀州刺史每臨冀部州中舊齒咸曰我封公復来其得物情如此卒贈太保諡宣懿李鉉渤海南皮人家素貧常春夏務農秋冬乃入學從浮陽李固仁受毛詩尚書章武劉子猛受禮記又與州里楊元懿河間宗恵振等結友詣大儒徐遵明受業嘗撰定孝經論語毛詩及三傳異同周易義例合三千餘卷北齊時累遷國子博士髙昻佑從父弟翼之子性俶儻膽力過人龍唇豹頸姿態雄異開莊帝遇害遂與父兄據信都齊神武至信都開門奉迎以戰功累官西南道大都督後與周文帝戰敗于芒隂死之神武聞之如䘮肝膽信都芳北齊河間人少明筭術兼有巧思嘗云算歴之妙機巧精㣲我毎一沉思不聞雷霆之聲嘗集五經筭事為五經宗及古人樂事為樂書又聚渾天欹器地動銅烏漏刻刻候風諸巧事并圖畫為器凖楊慶河間人祖𤣥父剛並以至孝知名慶美姿儀頗涉書記郡察孝㢘以侍養不行其母有疾不解襟帯者七旬及居母憂哀毁骨立負土成墳北齊表其門賜粟帛隋髙祖受禪版授平陽太守卒年八十五髙勵岳之子㓜聰敏美風儀以仁孝聞襲爵清河改封樂安王性剛直有才幹甚為時人所重仕周終洮州刺史豪猾屛迹路不拾遺在職數年稱為治理張羡河間鄚人少好學多所通涉仕周累官司成中大夫典國史周代公卿類多武將惟羡以素業自通甚為當時所重後年老致仕隋髙祖徴至賜以几杖羡上表勸以儉約優詔荅之卒年八十四謚曰定所撰有老子莊子義名曰道言五十二篇黎景熈河間鄚人性强記以學行聞其從祖廣善古學嘗從清河崔賔受字義又從崔浩學楷篆景熈皆傳習之仕周拜著作郎進車騎大將軍儀同三司隋劉炫河間景城人眸子精明視日不眩閉户讀書十年不出隋開皇中奉勅與王劭同修國史俄直門下省以待顧問煬帝時又修律令後歸鄉里以教授為業終于家公孫景茂河間阜城人愽涉書史時稱書庫初仕周官濟北太守入隋遷息州刺史法令清靜教化大行後徙伊州以疾徴吏民號泣于道終淄州刺史前後歴職皆有徳政卒謚曰康張煚羡子好學有父風初仕周歴膳部大夫進爵為伯隋髙祖受禪拜尚書右丞進爵為侯丁父憂柴毁骨立累遷民部尚書煚性和厚有識度甚有時譽後拜冀州刺史稱為良二千石王伽河間章武人開皇末為青州叅軍嘗送流囚季彦等七十餘人詣京師至中途悉釋其縲紲戒如期至流人感恱無敢違者髙祖聞而驚異之召見稱善悉赦其罪擢伽為雍令政有能名髙熲蓚人父賔都州刺史熲有器局善詞令文帝伐陳熲為元帥以功封齊國公熲嘗為左㒒射引進忠良當朝將二十年朝野推服物無異議論者以為真宰相尹式河間人愽學解屬文少有令聞仁夀中官至漢王記室王甚重之及漢王敗式自殺其族人正卿彥卿俱有儁才名顯於世劉善經河間人愽物洽聞尤善詞筆歴著作郎太予舍人著酬德傳三十卷諸劉譜三十卷四聲指歸一卷盧太翼河間人本姓章仇氏七嵗日誦數千言州里號曰神童及長博綜羣書尤善占候隠林慮山中受業者自逺而来文帝將避暑仁夀宫太翼固諫帝怒將斬之及疾將崩命太子釋之煬帝即位賜姓盧氏其所言天文事應驗者不可勝數唐李綱觀州蓚人少慷慨尚風節事隋為太子洗馬唐初拜禮部尚書兼太子詹事甚有匡益後太子寢狎無頼綱頻諫不見聴遂乞骸骨髙祖曰知公直士幸卒輔吾兒乃拜太子少保貞觀中復為少師發言陳事毅然不可奪卒謚曰貞髙儉勱之子敏慧有度量觀書一見輒誦武德中為右庶子進益州大都督長史設條教督勵風俗又興學校决渠溉田入為吏部尚書封許國公進右僕射儉三世居此官世榮其貴所著有氏族志封倫觀州蓚人初仕隋官至内史舎人後歸唐累遷檢校吏部尚書進封宻國公隱刺之亂數進忠策太宗即位拜尚書右僕射卒贈司空張士衡瀛州樂夀人九嵗䘮母哀毁過制博士劉思軌授以詩禮隋末兵起諸儒廢學唐興士衡復講教鄉里太子承乾迎致謁太宗擢崇賢館學士太子嘗問事佛對曰事佛在清浄仁恕如君仁臣忠子孝則福祚永反是而殃禍至及承乾廢罷歸子大隠髙宗時為太常博士沉正不詭從有大臣體劉君良瀛州人四世同居門内斗粟尺帛無所私隋末荒饉妻以計勸之異居君良因斥去召兄弟復同居天下亂鄉人共依之衆築為堡號義成堡其家六院共一庖子孫皆有禮節貞觀中旌其門髙季輔徳州蓚人居母䘮以孝聞貞觀初拜監察御史彈劾不避權要轉中書舎人數上書言得失太宗賜鍾乳一劑曰而進藥石之言朕以藥石相報後為吏部侍郎善銓叙人物又賜金背鏡一況其清鑒卒諡曰憲袁恕己滄州東光人歴官司刑少卿與誅二張又從相王統南牙兵備非常以功封南陽郡王後貶流環州遇害諡曰貞烈孫髙擢進士為給事中徳宗欲起盧把髙極論杞當國矯誣隂賊汙忠誼傲明徳卒贈禮部尚書髙適滄州人𤣥宗時舉有道科官至諌議大夫負氣敢言權近側目出為蜀彭刺史卒適尚節義以功名自許政寛簡所莅人便之年五十始為詩即工每一篇已好事者輒傳布王晙滄州景城人擢明經第歴除殿中侍御史景龍末授桂州都督築羅郛罷戍卒埭江間屯田以息轉輸百姓刻石頌徳累遷朔方行軍大都督討平蘭池胡封清源郡公晙氣貌偉特感慕節義有古人風卒諡曰忠賈耽滄州南皮人天寳中舉明經遷汾州刺史政有異績後拜尚書右僕射同平章事卒耽嗜觀書老益勤尤悉地理家人近習不見其喜愠世謂淳德有常者邢君牙瀛州樂夀人以戰功歴果毅折衝郎將徳宗出狩奉天君牙率兵赴難封河間郡公李晟在鳳翔數行邉常以君牙守晟入朝代為節度使劭耕講戰吐蕃不能侵髙瑀冀州蓚人少沉邃喜言兵嘗治陳蔡有善狀王沛死詔瑀領之自大歴後擇帥悉出宦人所輸貨至巨萬及瑀有命士相告曰韋處厚裴度作相天下無債帥瑀居官寛和無赫然譽所至利治士人懷之封敖冀州蓚人元和中進士累官翰林學士屬辭贍敏語切而理勝武帝使作詔慰邉將曰傷居爾體痛在朕躬帝善其意賜以官錦進尚書右僕射髙元裕渤海人第進士仕至吏部尚書封渤海郡公性勤約通經術敏於為吏岩岩有風采自侍講為中丞文宗難其代元裕表言兄少逸才可任因命之少逸既代稍遷給事中出為陜虢觀察使後以兵部尚書致仕張濬河間人汎知書史喜髙論累官度支員外郎黄巢亂僖宗召拜諌議大夫為都統判官時王敬武在平盧軍已臣賊濬諭以君臣大義敬武愧謝召諸將佐謂曰今勤王之師滿天下賊平將安徃何不其誅大賊迎天子諸將曰諌議言是也敬武即引軍從濬而西賊平以户部侍郎判度支後拜中書門下同平章事五代馮道瀛州樂夀人少以孝謹聞唐莊宗時始貴歴仕晉漢周官皆將相不擇可否為人簡儉寛宏滑稽多智後封瀛王宋張昭河間人十嵗誦書數十萬言及長愽洽經史太祖時拜吏部尚書嶺南平遣使就卧疾處問獻俘禮昭口舌以對皆有證據當時服其該博李璘河間縣人晉開運末契丹犯邉有陳友者乗亂殺璘父及家屬三人乾德初璘𨽻殿前散秪侯友為軍小校相遇於道璘手刄友而不遁去自言復父讎案鞫得實太祖壯而釋之皇甫繼明冀州蓚人父濟汾州令繼明性謹愿善騎射有膂力宋初累官至捧日軍都指揮使後領鄆州觀察使充環慶馬步軍都部署御下嚴肅士卒頗畏憚之嘗力疾護送軍餉而卒楊信瀛州人以武功累官至殿前都指揮使鎮寧軍節度卒贈侍中質實自將御軍有紀律太祖嘗稱之為真忠臣弟嗣以功累官保州團練使久居北邉以善戰聞賈黄中耽四世孫年六嵗中神童十五第進士太宗時知昇州按行故府庫得南唐寳貨十櫝悉表上之太宗嘉其潔召還知制誥遷翰林學士兼掌吏部選品藻精當官至參知政事索湘滄州塩山人開寳中進士釋褐鄆州司理叅軍齊州有大獄逮及者千五百人湘受詔案鞫事隨以白歴河北轉運使經度供餉世號幹辦及興利革弊民甚便之後為右諌議大夫知廣州張凝滄州人少勇武倜儻太宗時為殿前都虞候寧州防禦使善撫士卒賞賜多以犒師家無餘貲京師無居第卒贈章徳軍節度邢昺鄚人應九經廷試日召至外殿講比師二卦又取羣經發題太宗嘉之擢上第真宗朝授翰林侍讀學士尋遷刑部尚書及卒真宗以宫邸舊僚臨䘮隕涕張知白滄州清池人㓜篤學中進士累官河陽節度判官時西北未寧中外多言兵事獨知白奏疏謂當茂農功省刑罰及取士之制真宗異之仁宗時官至中書門下平章事知白在相位慎名器無毫髮私雖貴顯約如寒士卒謚文節田京滄州人後徙居洛邑舉進士調蜀州司法叅軍累遷京西陕西轉運使嘗兩知滄州拜諫議大夫卒京喜議論為人尚氣節以倜儻聞通兵戰歴算雜家之術著天人流術通儒子十數書又有奏議十卷王昭逺繼升子形質魁偉絶異有膂力善騎射為殿前都指揮使累立戰功數見勞賞卒贈太尉謚忠和弟昭懿為捧日都虞候昭遜為西京作坊使子懷普平州刺史懷一供備庫副使懷正内殿承制懐英内殿崇班盧懷忠瀛州河間人少有膂力善騎射累官内酒坊使平荆湖有功遷判四方館事知江陵府及卒錄其子熙為校書郎周瑩瀛州景城人左領軍衛上將軍景之子習知水利累官杭州都監後遷知樞宻院事卒贈侍中諡忠穆録用其二子二孫皆京秩劉摰永靜軍東光人嘉祐中進士為監察御史神宗勵精求治摯請辨君子小人之分又論常平免役法陳十害司農難詰之摯曰臣待罪言貴今與之爭口舌是辱耳目之任矣官至僕射兼中書侍郎出知鄆州卒諡忠肅李之純滄州人舉進士熈寧中累官成都路轉運使成都嵗發官米六千石損直與民言者謂恵下損上之純言蜀人恃此為生柰何奪之事遂止累遷御史中丞後出知單州卒從弟之儀登第㡬三十年乃從蘇軾于定州幕府累官提舉河東常平之儀能為文尤工尺牘軾謂入刀筆三昧龔夬瀛州人少有重名清介自立舉進士累官殿中侍御史言章惇蔡京罪章累上因言修五朝寳訓不可増損以濟奸說時論韙之後削藉編管化州赦歸卒謚節肅張慤河間樂夀人元祐中進士累遷龍圖學士計度都轉運使髙宗為大元帥諸道勤王慤飛輓踵道以便宜為北京留守馬步軍都總管聞二帝北狩極論中原不可一日無君建炎初同知樞宻院事建言募民聮以什伍使合力抗敵謂之廵社尤善理財在朝諤諤有大臣節及卒上念之曰古之遺直也賜謚忠穆權邦彦河間人崇寧中上舎登第調滄州教授紹興初累官簽書樞宻院事嘗獻十議以圖中興又言宜乗機者三尋兼權參知政事有遺藁十卷號瀛海殘編劉甲摯之裔徙居龍游淳熈初進士累遷國史院編修使金伴宴完顔者名犯仁宗諱甲力辭完顔更名修歴知興元府金立吳曦為蜀王甲上書告變上覽之稱忠臣者再後拜寳謨閣學士甲嘗謂吾無他長惟足履實地晝所為夜必書之名曰自鑒為文平淡有奏議十卷卒謚清恵遼劉景河間人好學能文積官翰林學士景宗知其忠實可倚用乃書其笏曰劉景可為宰相後以節度使兼侍中致仕子慎行為北府宰相時帝多即宴飲行賞罰慎行諌止之金師安石清州靖海人為人輕財尚義舉進士補尚書令史從宣宗遷汴擢樞宻院經歴官累遷御史中丞官至尚書右丞正大間嘗上書陳自古興衰之理名曰萬年龜鏡録許安仁獻州交河人㓜孤自刻苦讀書善屬文登大定中進士調河間主薄以㢘平見稱累遷翰林修撰後為澤州刺史嘗作無隠論十篇上之卒謚文簡安仁質實無華澹然有古君子風劉守真河間人名完素早遇陳希夷服仙酒醉覺得悟素問𤣥機著原病式一卷宣明論五卷許古安仁子明昌中詞賦進士貞祐初自左拾遺拜監察御史時宣宗遷汴信任髙琪無恢復之謀古上疏甚切遷侍御史哀帝即位遷左司諌未㡬致仕陳岢滄州人大安初進士天興間為右司諫遇事敢言無少隱及汴京被兵屢齊上封事言得失請戰一書尤為剴切為時相持嘉喀喀等所沮識者惜之元鄭義河間人初事太宗為山東路都元帥兼景州軍民長官從伐金戰于歸徳死之弟徳温從攻徐州䧟陣而死子澤江皆立戰功顯于時張榮清州人後徙鄢陵歸䝉古太祖授元帥左都監從征西域諸國及河西闗西累功遷輔國大將軍世祖時從阿珠侵宋加鎮國上將軍砲水手元師後兼海道運糧事劉正清州人讀書習吏事至元中累官吏部尚書侍御史武宗時為中書右丞仁宗即位正詣闕言八事終平章政事卒謚忠宣子秉德歴兵工二部侍郎秉仁累官工部尚書致仕陳顥清州人㓜頴悟日記誦千言以薦入宿衛尋為仁宗潜邸說書日開陳古聖賢居艱貞之道仁宗即位拜集賢大學士後辭禄家居文宗立復起為大學士卒謚文忠顥樂談人善而惡聞人過士大夫因其薦至顯列有終身莫知所自者李京河間人為烏撤烏䝉道宣慰副使㑹羣蠻不靖按行調發盡心鎮撫周履雲南嘗為雲南誌及鳩窠集學士虞集元明善為序魏禮肅寧人篤信好學庚子廷試第一授翰林修譔陞禮部侍郎本朝李遜景州人登洪武甲子鄉試學行卓然官至翰林院學士吳盛景州人洪武丁丑科進士才識過人累官至刑部侍郎大獲時譽蘇瓉河間人洪武末授崇明縣丞永樂中陞工部主事累遷工部右侍郎才能著稱李玉交河人永樂初由戍卒守邉克勞勤勩屢立戰功累陞真定指揮使宣德初陞中軍都督僉事封新建伯李祥河閒人由太學生歴官有能聲仕至陕西布政使名重一時李翔河間人由太學生歴宦仕途以才能著稱陞至廣東布政使有恵政及人左傑滄州人以才能薦勤於職務官至江西布政使王愚滄州人力學通經由儒士登仕途官至河南按察使陸矩阜城人宣徳中進士歴刑部郎中正統中從征福建之沙尤以賛畫功陞右僉都御史叅賛延綏軍務卒于官所至以㢘介自守士林推重云王翺鹽山人由進士累官吏部尚書平生剛果孤介歛華就實所到刑清政舉境内晏然卒謚忠肅勲業為一代名臣馬昻其先河南祥符人後徙滄州遂家焉昻中順天鄉試正統間除鴻臚寺序班歴監察御史右副都御史廵撫山西終户部侍郎太子少保李楘任丘人由進士歴官光禄少卿同知夀州擢知莱州府招流移葺學舎民為刻石頌之仕終山東右叅政于大節任丘人由進士終按察使有風裁卒于官吏民攀號送者塞道列女桓氏漢渤海人字少君為鮑宣妻宣嘗從少君父學父竒其清苦以女妻之􅑽送甚厚宣不恱桓氏曰大人以先生修徳守約故使賤妾侍執巾櫛惟命是從宣笑曰能如是吾志也乃著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之封氏蓚人殷保誨妻保誨仕唐為校書郎避黄巢亂同封氏入長安匿蘭陵里保誨偶出賊欲犯封氏固拒不從賊怒曰從則生不然膏我劒封罵曰我名家子守正而死猶生也遂遇害保誨歸聞之哀號而絶仙釋俞靈璝河間人入衡山九真觀修道十餘年南岳赤君授以回風術行之二十年能坐見天下事如在掌中然自晦不為異以驚俗唐憲宗元和中彬州官吏見其談説始驚異之即曰我偶然爾非有知也遂閉闗不出後入九疑山絶粒石坦渤海人遊趙魏諸名山遇異人得道能分身同時詣十餘家已而各家皆云坦於某時到所言各異後不知所往明一統志卷二
