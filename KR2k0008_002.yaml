免此吾效死日也大呼决戰兵盡矢窮而死髙繼勲知雄州契丹獵燕薊候卒報有兵入鈔邉州皆警繼勲料其不然已而知渤海人叛契丹行剽兩界也張凝髙陽闗副都部署善訓士卒所得賞賜多以犒師家無餘貲蔚昭敏鎮定髙陽闗三路先鋒契丹入冦昭敏與范廷召追斬萬餘級擒生口甚衆契丹委器甲遁去李允則知雄州民居惟結茅允則教以陶瓦覆屋時已罷兵猶修城浚壕有隙地令悉種榆栁人頼以安楊延昭真宗時知保州時駐遂城契丹攻之甚急延昭悉集丁壯登陴護守㑹大寒汲水灌城上旦悉為氷堅滑不可上契丹遂潰去獲其鎧仗甚衆邉人呼為楊六郎張利一知保州徙雄州遼人刺兩属民為兵民不堪其辱利一綏徕之有大姓舉族南徙慕而来者至二萬利一發廩賑恤之耿全斌真宗時知安肅軍嘗繪山川險易為圖以獻契丹来侵遣兵擊走之張元知安肅軍因入對曰契丹嵗享金帛甚厚今其主孱嵗歉萬一倍約臣請擐甲為諸軍先王漢忠咸平中為鎮定髙陽闗都部署契丹掠中山漢忠率諸將陣于野契丹遁追斬甚衆獲其貴將張知白安肅州推官明斷果决庭無留訟清白有守吏民懐之任布安肅軍判官刺間契丹事上䟽請飭邉備仍條奏河北利害未㡬果有澶淵之役真宗竒之張昭逺知雄州㑹大雨陂塘大溢昭逺勒兵築長隄以捍其衝葛懷敏知保州徙雄州恩威孚洽賊不敢犯後改滄洲士民遮留數日始得去何承矩知雄州推誠御衆同其甘苦邉民有告機事者與之款接無所猜忌故契丹動息皆能前知後拜雄州團練使吴奎廣信軍判官宦者楊懷敏増廣北邉屯田奪民榖地奎上書切言其害懐敏使人訟保州守王果不法奎力辯其誣得免王果知保州寛和多善政時宦者楊懐敏廣屯田奪民地果上書爭之民頌其徳李格非元祐中通判廣信軍有道士說人禍福或中出必乘車甿俗信惑格非遇之塗叱左右取道士窮治其奸杖而出諸境趙滋知安肅軍又知保雄二州强力精悍有吏能繕治城櫓至於簿書米鹽皆有法所至稱治契丹憚其威劉兼濟知雄州先是邉民避罪逃者契丹輒納之守將畏事不敢詰兼濟悉移檄責還楊應詢知保定軍後又知雄州善於料敵徽宗以歸信容城兩縣弓手為契丹所憚欲増為千人或恐生事應詢曰吾欲備他盗彼安能禁我卒増之劉舜卿知雄州善料敵或告契丹游騎大集不為動在雄六年恩信周浹著名北州和詵知雄州在雄十年能偵敵上制勝强逺弓式能破堅於三百歩外邉人號為鳯凰弓遼楊佶開泰中知易州治尚清簡徴發期㑹必以信馬人望知新城縣縣與宋接境驛道所從出入望治不擾吏民畏愛蕭文夀隆末知易州務農桑崇禮教民皆化之時大旱文禱之而而属縣蝗文反躬自責蝗盡飛去㑹淫雨不止文隨禱而霽郡勒石頌之金劉仲洙深澤縣令縣近滹沱河時秋成水忽暴溢仲洙極力護塞竟無害後為祁州刺史以六善為教民化之劉公弁唐縣令治事之暇率吏民决唐河水灌田㡬千畝又𨗳而東以溉鄰縣田四十餘里馬諷歸信令境有河曰八尺口每秋潦漲溢害民田諷視地髙下䟽决之其患遂息徒單航至寧初安州刺史㑹元兵大至與民死守城危先縊其妻拏尋自縊城中人猶力戰曰太守既死我軰不可獨降死者甚衆王子昌守保定元太祖定河朔子昌堅守不下及兵逼其城子昌戰死元孫拱至元中為保定路治中嵗饑議開倉賑民或曰宜請於朝拱曰若得請則民餒死多茍見罪吾自任遂發粟賑之耶律伯堅至元中為清苑縣尹縣西有塘水溉田勢家據以為磑民失利伯堅命毁磑溉田凡賦役有重者輒曰寧得罪於上不可得罪於下必詣府力爭之在清苑四年民親戴之如父母馬可慕知易州均井田平徭役修城池興學校德恵大洽呂榮知易州政尚寛簡訟至立决及代民爭留之不果為立去思碑月彦明保定路逹嚕噶齊郡嵗輸糧數萬石於新鄉苦弗便彦明請輸京倉以便之俄除吏部尚書保定父老詣闕乞留遂命以尚書仍知郡事本朝劉傑洪武初唐縣知縣百廢具舉勤於撫字百姓安業張忠洪武中為大寧都司都指揮使精熟武藝勤練士卒兵威大振民咸安堵云譚廣洪武中保定後衛指揮使勇畧過人尋陞都指揮僉事永樂初轉大寧都司嚴整武備一方寧靜孟善洪武中以都督同知守禦保定府號令嚴明軍民畏服卞禮洪武中定興知縣為政公平撫民有方凡廨舍壇場學校皆所建置王思祖洪武中安州同知後改州為縣遂轉知縣為政公平撫民寛厚經營學校壇廟植栢數十章至今民覩其樹而思之王讓洪武中保定知府存心正大撫民以仁民至于今稱之楊理永樂初安肅知縣為政㢘平撫民寛恵嘗坐事去耆老率衆為白之得終其任髙楫永樂中束鹿知縣勤以奉公仁以愛下平徭均賦百姓徳之秩滿耆老率衆詣闕乞留復任陳哲博野知縣有善政得民心宣德初以舊官代還縣民訴於廵按御史乞留之御史以聞朝廷謂哲能得民如此即令復任周監宣徳間保定知府寛厚㢘明以秩滿陞山東左叅政仍知府事盛顒景泰中知束鹿縣有善政以内艱歸服除束鹿民相率詣闕乞還從之時里巷有水鏡之謡李森天順間束鹿知縣㢘能公平敎化興舉張才成化初淶水縣學教諭心啓廸以身範物先時學舎傾圯才募貲於衆創建一新且區畫裁制具有方而民不為擾羅綺成化中知易州為政以愛民為先嘗奏減柴炭夫十之五改編驛逓夫馬以便民及修葺廟學作興士風設施措注無不宜於百姓李福嘉靖中知易州易距廣昌二百餘里民苦於神器銀鞘轉輸之難福為建議止覔夫銀且送紫荆闗而止百姓便之他如均驛役於二十州縣葺學校修公署鋤强植善恵政之及民者尤多比代老㓜遮道泣送流寓劉好禮汴梁人元初徙家完州㓜有志知讀書通國言世祖時累官澧州路總管入歴刑禮吏三部尚書出為北京路總管再入為戸部尚書子晸河西隴右道㢘訪使郝經陵川人父思温避地河南之魯山金亡徙順天經㓜家貧晝則負薪米為養暮則讀書居五年為守帥張柔賈輔所知延為上客元世祖在潜邸召經諮以經國安民之道條上數十事大恱遂留王府及即位以為翰林侍讀學士充國信使使宋被留不屈居十六年而歸為人尚氣節為學務有用所著書及文集凡數百卷人物周郭隗戰國時燕人昭王卑辭厚幣以招賢者隗曰王必欲致士先從隗始况賢於隗者豈逺千里哉昭王遂改築宫師事之未㡬樂毅鄒衍劇辛之儔歸燕遂併强齊隗之力也田光燕人不慕仕進為人智深而勇沈太子丹聞其賢願與之交以圖國事光曰臣聞騏驥盛壯之時一日而馳千里至其衷老駑馬先之今太子聞光盛壯之時不知臣精已消亡矣因薦荆軻太子曰願先生勿泄也光曰諾出而嘆曰夫為行而使人疑之非節侠也遂自刎以明不言漢趙廣漢蠡吾人舉茂材為陽翟令有治行遷京兆尹發奸摘伏如神威制豪彊小民得職劉祐安國人為河東太守時令長多中官子弟祐黜其權强平理寃結三轉大司農時中常侍蘇康管覇占民田業民多困窮州郡䘮氣祐依科品沒入之其不避權貴如此王尊涿郡髙陽人累遷益州刺史至九折坂曰此非王陽所畏道邪叱其馭曰驅之王陽為孝子王尊為忠臣居部二嵗徼外服其威信遷東平相王所為不中度者輒諫止之王商蠡吾人父樂昌侯武薨商哀毁踰禮悉推財以分異母諸弟累官至丞相成帝甚尊重之單于来朝見商於未央廷中仰視大畏之却退帝聞而嘆曰真漢相矣晉祖逖范陽遒人博覽書記慷慨有志節元帝時為豫州刺史渡江擊楫誓曰不清中原而復濟者有如此江遂部兵與石勒相持由是黄河以南盡為晉土卒之日豫州士女如失父母南北朝祖冲之范陽遒人祖台之晉侍中冲之博學明歴法造指南車欹器有巧思入神之妙宋初累官長水校尉所著有老莊論語孝經解數十篇子暅仕梁為列卿孫皓有文武才畧累官廣陵太守祖瑩遒人年八嵗能誦詩書時呼為聖小兒及長好属文與陳郡袁翻齊名時人語曰京師楚楚袁與祖洛中翩翩祖與袁仕魏累官祭酒秘書監許彥髙陽人少孤貧好讀書尤精於易魏太武召令卜筮頻驗遂留左右叅與謀議彥質厚慎宻與人言不及内事帝以此益親重之陳竒魏河北人少孤奉母至孝博通諸經于易尤邃常非鄭𤣥馬融解經失㫖因作注釋與河間邢佑同赴召補秘書太尉髙允曰竒通識逺致非凡學所及其為名流見知如此許惇彥五世孫清識敏速逹於從政仕東魏為司徒主簿眀斷果决時號鐵主簿後遷殿中尚書惇羙鬚下垂至帯省中號長髯公孟業安國人仕北齊補河間國王郎中令清貧自守累遷東郡太守以寛厚著名隋許善心髙陽北新城人性聰敏博學多聞家有書萬卷無不徧覽時稱為神童仕至禮部侍郎所撰有述父志史志百餘卷子即敬宗許智藏髙陽人少以醫術自逹文帝以為員外散騎侍郎使詣楊州㑹秦王俊有疾上馳召之智藏至為俊診胍曰疾已入心即當發癎不可救也俊數日果如其言而薨文帝竒其妙賚物百叚唐張行成定州義豐人才局方正為富平主簿有能名召補殿中侍御史凡國有大政必預議焉累遷尚書左僕射卒謚曰定齊澣定州義豐人少開敏李嶠稱其有王佐才景雲初姚崇引為御史劾奏常先風教號善職累官中書舎人朝廷大政必咨之崇避位舉宋璟自代出其謀也張興束鹿人性忠勇為饒陽禆將不肯從史思眀亂且責之思明怒鋸解之興罵不絶口軍中為之改容陽城定州北平人世為宦族性孝友敏而好學於書無所不讀及第進士乃隱中條山栁谷之北德宗召為諌議大夫言裴延齡不可為相遷國子司業及出為道州刺史太學生何蕃等二百餘人伏闕請留城至州治民如治家州嵗貢侏儒奏罷之齊映瀛州髙陽人舉進士中博學宏詞補河南叅軍事德宗幸奉天授御史中丞貞元中累官中書侍郎封河間縣男與崔造劉滋並輔政卒謚曰忠宋孫行友莫州清苑人嘗聚衆郎山屢敗契丹仕漢周累官定州留後宋初加同平章事累遷至左龍武軍大將軍郭進深州博野人倜儻任氣初仕周累官洺州團練使有善政太祖親征澤潞遷本州防禦使充山西廵檢御下嚴毅太宗將征太原先命進控石嶺闗契丹果犯闗進大破之程羽博野人五代晉時歴虞鄉醴泉新都令皆冇政績歴開封府判官太宗尹京以長者待之及即位拜給事中知開封府出知成都府累遷文眀殿學士以兵部侍郎致仕後朝廷錄其曽孫珦即二程父也盧之翰祁州人曽祖𤣥暉鴻臚卿祖知誨天雄軍掌書記父宏蔡州防禦判官之翰少篤學家貧太宗朝登第歴遷殿中丞通判洺州㑹契丹入㓂之翰决漳御河以固城壁敵不能攻召還歴西京轉運副使建議𨗳潩河合于淮逹許州以便漕運孫全照行友姪父方進徳州刺史全照以廕補殿直雍熙中從田重進擊賊有功加京西作坊使知威虜軍真宗幸澶淵全照擊敗契丹後加檢校工部尚書劉文質保州保塞人父審琦虎牢闗使從討李重進戰死文質太宗時累官靈州清逺軍都監真宗時遷連州刺史再知代州卒文質以簡穆皇后從孫又父死事故前後賜予異諸將劉渙文質子有才氣遇事敢為天聖中章獻明肅皇后同聽政渙上䟽請太后還政不報尋通判磁州累官工部尚書弟滬沉厚有智畧為水洛城主遷西路都廵檢張玉保定人𨽻狄青麾下善用鐵簡仁宗稱為真勇將從征儂智髙有功擢廣西鈐轄王韶開熈河玉為副都總管河北置三十七將以玉為第一將入為馬步軍都虞侯程琳羽從孫舉服勤詞學科累官三司使出納尤謹内使奏琳専琳曰三司貢賦皆朝廷有也臣為國惜于臣何有帝然之後拜尚書左丞出判大名府魏人愛之為立生祠卒謚文簡齊恢蒲隂人唐宰相映之裔第進士通判陳州臨政簡約州人愛之韓琦薦其賢擢太子左諭德神宗時以天章閣待制知相州召紏察在京刑獄趙振雄州歸信人景徳中為隰州兵馬監押積功累遷龍神四廂都指揮使歴知數州終左神武軍大將軍振剛强自負喜謀畫輕財尚氣衆樂為用子珣瑜皆工騎射仕至顯官瑜弟璞亦知名董元亨深州束鹿人累官國子博士通判貝州王則據城叛元亨坐㕔事賊黨排闥而入左右皆奔潰賊脅元亨索軍資庫鑰元亨據案叱厲聲張目罵賊遂被害事聞仁宗曰守法之臣也贈太常少卿遼王棠新城人博古善属文鄉貢禮部廷對皆第一累官至南府宰相法度修明臨事不怠且老成練逹時人稱之金時立愛新城人第進士累官至中書令元帥宗望取燕山立愛謀畫居多封陳國公未㡬致仕改鄭國公張通古易縣人該綜經史善属文舉進士第官左丞海陵内懐覬覦欲除熙宗親弟胙王誣以謀逆熙宗命特思鞠之衆欲附成獨通古以為不可遂止後熙宗信海陵譛殺胙王及特思同軰謂通古曰為君所誤今必死矣通古曰以正獲罪死賢於生通古天資樂易不為表襮雖居相位自奉如寒素焉魏道明易縣人少工詩有名舉進士累官至安國軍節度使居近雷溪因號雷溪子所著有鼎新詩話王擴中山永平人明昌中進士累官同知横海軍節度事貞祐中上書陳河東守禦策後權陕西東路轉運使行六部尚書致仕擴博學多才梗直不容物興定中卒謚剛毅髙有鄰遂城人大定三年進士累官至戸部尚書履正奉公時人稱之子岩第進士劉炳葛城人性倜儻有氣節每讀書遇古忠臣烈士輒嘆息景慕恨不與之同時貞祐三年第進士即日上十䇿大要任諸王結人心廣儲人材擇賢守令褒忠義務農桑崇節儉去冗食修軍政繕城池章上宣宗嘉納之擢補御史臺令史劉秉德容城人性安靜恬退與物無競貞祐間避地豫之許封山以教授為業興定二年第進士累官至鄭州防禦判官甚有能聲揚果祁州蒲隂人性聰敏尤工詞章正大中進士歴偃師蒲城陜令所至以㢘能稱金亡歸元世祖時累官叅知政事出為懐孟總管致仕卒謚文献有西菴集元張柔易州定興人慷慨尚氣節善騎射金末盗起柔聚族保西山東流寨後歸元留戌滿城移守順天營建城市廬舎百廢具舉拜河北路都元帥戰勝攻取威震河朔世祖時以勲封蔡國公卒追封河南郡王謚忠武茍正甫保定人弱冠從郝經使宋被留儀真經授以學遂以儒名家仕至國子祭酒詩文書畫皆有晉唐風致趙柔涞水人有膽畧善騎射金末避兵西山柵險以保鄉井眀號令嚴約束為衆所服太祖破紫荆闗柔以衆歸授涿易二州長官後羣盜並起柔單騎說降其衆以功累遷真定涿二路都元帥卒追封天水郡公謚莊靜曽孫世安江西行省左丞何伯祥易州易縣人從張柔歸太祖定河朔攻汴梁拔洛陽圍歸徳破蔡州論功授易州等處軍民總管世祖南伐伯祥叅預軍事多所獻納卒追封易國公謚武昌焦用雄州人逺祖賛宋時鎮瓦橋闗用初仕金為束鹿令陞千戸守雄州北門元兵至州人開南門降用猶力戰被獲太祖以其忠北釋之復其舊官狥山東未嘗妄殺一人卒贈中書左丞謚正毅賈輔祁州蒲隂人初仕金為祁州刺史以衆歸太祖時張柔開府滿城命輔行元帥府事於祁州從定山東遷左副元帥柔將兵在外輔常居守累功領順天河南等路軍民萬户史弼蠡州博野人曽祖彬率衆歸元弼通國語膂力絶人從攻宋樊襄至陽羅堡率衆先登南岸論功第一累官黄州等路宣慰使徙浙西淮東遷福建行省平章政事封鄂國公焦徳裕用子通左氏春秋有才辯善騎射金將武仙敗走其黨保仙故壘太宗使徳裕招降并擒殺之其地遂平累陞都元帥府㕘議後從征鎮江焦山寺僧誘居民叛阿珠既誅其魁欲盡阬其黨徳裕諫止之卒追封恒國公謚忠肅子簡餘姚知州潔信州治中賈文備輔子襲父左副元帥嘗領所部屯亳州攻武機堡以戰守有功累遷湖廣行省㕘知政事追封武威郡公謚莊武解誠易州定興人善水戰多謀畧為水軍萬户從攻安豐夀復泗亳取大理有功世祖嘉奬之卒追封易國公諡武定子汝楫襲從平宋卒亦追封易國江公謚忠毅孫特爾格廣東道宣慰使曽孫世英山南北道僉事鞏彦暉易州人與兄彦榮俱以武勇稱初彦榮以百夫長累立戰功及老彦暉代之從伐宋次武昌宋援兵四集彦暉逆戰被傷度不免遂投水中敵援之載歸江州不屈竟死子信以功累官千户張𢎞範柔子為鎮國上將軍平宋有功卒贈平章政事謚武烈宏範英襟偉度有古良將風子珪官至中書左丞封蔡國公尚文祁州深澤人㓜頴悟負竒志至元中劉秉忠言於世祖詔文與諸儒採定朝儀後出守輝州有政績累遷中臺侍御史守正不阿拜中書左丞致仕武宗仁宗之世屢延致之訪以國事賜燕及金帛甚厚何瑋伯祥次子始以平宋功歴遷御史中丞嘗陳當世要務十條成宗嘉納京師孔子廟成瑋奏建國學於側成宗崩丞相阿固台奉皇后㫖集議祔廟及攝政事瑋難之阿固台曰中丞獨不畏死耶瑋曰畏不義耳茍死於義何畏卒追封梁國公謚文正張𢎞畧柔第八子有謀畧通經史善騎射嘗從柔鎮把徙亳屢著戰功遷淮東道宣慰使世祖特命為河南行省叅知政事卒追封蔡國公謚忠毅王昔刺保定人有勇畧從攻釣魚山及征李璮皆有功累官東川行樞宻院同僉鎮萬州卒于軍子二曰宏中衛都指揮使曰寧右衛親軍總管宏子處恭官至侍御史王恂唐縣人父良明理數之學恂讀書過目能成誦仕為太子賛善每侍講讀必發眀三綱五常之道及歴代治忽興亡之故嘗與許衡郭守敬等定授時厯累官至太史令卒贈司徒追封定國公諡文肅敬鉉易州人祖嗣徽金㕘知政事父子淵樂陵令兄鑑嵩州同知皆以進士起家鉉亦第進士初為中都儒學提舉愽通經史文章鳴世所著有春秋備志四十卷學者稱為太寧先生韓若愚滿城人仁宗時歴户刑二部尚書以㢘勤見稱後拜河南行省左丞文宗平内難若愚畫䇿中機累遷淮南江北道㢘訪使卒封南陽郡公謚貞肅郭貫保定人博學精于篆籀有才行至元中為監察御史累官集賢大學士當時冊寳碑額多出其手致仕歸㤗定初遷學士承㫖不起卒追封蔡國公謚文憲王夀涿州新城人頴敏嗜學大徳中累官集賢侍讀學士俄擢侍御史論事剴功後遷御史中丞集賢大學士卒封薊國公謚文正劉因容城人父述讀書無所不通因天資頴悟絶人而留心性理之學家雖貧非其義一介不取隱居教授至元間徴公授右賛善大夫卒贈翰林學士謚文靖封容城郡號靜修先生所著有四書精要三十卷詩文二十二卷尚野保定滿城人志趣正大文詞典雅一本於理事繼母以孝聞至元間徴為國史院編修累官集賢侍講學士兼國子祭酒卒追贈上黨郡公謚文懿子師奎章閣侍書學士敬儼鉉從孫父元長有學行官至太常愽士儼嗜學善属文用郭良弼薦大徳中為監察御史累官平章政事卒諡文忠有詩文若干卷郝天挺安肅州人英爽剛直有志畧累官中書左丞卒諡文定其所論建嘗以惜名爵抑浮費止括田久任使論好事奬農務本勵學養士為言皆見采納又註唐詩鼓吹及修雲南實錄子祐為殿中侍御史以㢘直著名王結易州定興人少聰頴讀書數行俱下從太史董朴受經深于理學累官翰林學士中書左丞卒封太原郡公諡文忠故相李珪曰王結非聖賢之書不讀非仁義之言不談時以為名言所著有易說及文集十五卷張珪宏範子少能挽强命中至元中宏範平廣海宋禮部侍郎鄧光薦将赴水死宏範救而禮之命珪受學焉延祐中累官至中書平章政事丞相拜珠嘗問以相體何先珪曰莫先於格君心莫急於廣言路後拜翰林學士承㫖董珪祁州人童時讀書即曉文義日記數千言父母未之竒也一日隨父出道見古碑使視之一覽輒記父大驚遣就明師學遂成其業登至治辛酉第授定州路同知丁好禮蠡州人精律筭累官户部侍郎京畿漕運使立漕運成法人皆便之尋陞户部尚書好禮善撙節浮費以足國家之用拜叅知政事後以論議不合謝政天兵入京城或勸其謁大將好禮叱曰我以小吏致位極品所以報國者惟一死耳大將召好禮不行㫒至齊化門抗辭不屈而死本朝何禮清苑人洪武初以才行異等舉用歴任勤能物論推重官至兵部尚書薛郁清苑人洪武初由國子生歴官有守累陞陕西左布政使李彥名安州人洪武中以通經儒士薦送于朝歴官勤慎進陞禮部尚書李得成涞水人母張氏避兵度不能脫自投于河後得成夣母在河氷下卧氷七日致河氷俱釋洪武中以孝㢘舉授光禄寺署丞遷尚寳司丞永樂間歴陞陕西右布政使顧仲禮保定人㓜孤事母至孝遇嵗凶負母就養他郡七年始歸見蝗起食其田苖仲禮泣曰吾將何以為養乎俄疾風蝗盡去苖得不傷毋卒廬墓三年哀慟如初䘮洪武中事聞旌其門楊澤定興人起戎行有勇畧以靖難功累陞山西都指揮僉事永樂中從北征有功陞右軍都督僉事洪熙初陞都督同知邉靖慶都人由太學生為廣寧經歴自㓜以孝聞父友諒卒靖哀毁㡬絶及𦵏負土成墓廬於側環植以樹嵗旱不雨靖旦暮汲水灌之俄有泉湧出道傍足以灌溉人以為孝感所致事聞詔旌其門武周文慶都人博通五經精明六藝儒名大振永樂初召入文淵閣修書歴官翰林院侍讀學士後引年致仕賞賚甚厚送還鄉里李友直清苑人為北平布政司叅議陞刑部侍郎洪熙初陞户部尚書宣徳初改工部為人坦夷闓敏不與物競與人言必歸於忠厚人有急必赴之有犯者不校人皆稱其寛厚長者郭璡新安人永樂初由太學生擢户部主事以勤能著稱尋陞福建布政司叅議歴遷吏部右侍郎兼少詹事宣徳中陞吏部尚書為人寛洪簡重得大臣體甄别士類人服其當云王玘安肅人永樂中由太學生任河南按察司僉事歴轉鴻臚寺少卿後陞山西按察使王哲清苑人永樂中由鄉舉入太學擢監察御史累陞山東㕘政後以學士楊溥薦陞湖廣左布政使所至㢘正嚴明人不敢干以私王敏新安人永樂中由太學生歴官廣西布政司叅政清謹著稱後陞陕西布政使操履益堅卒于官王驥束鹿人早有大志永樂中登進士第拜給事中持正不撓累官兵部尚書率兵勦滅西陲虜宼以功兼大理寺卿後總督軍務平麓川叛宼進封靖逺伯卒年八十三追封靖逺侯諡忠毅為人兼資文武遇事敢為以身狥國好賢樂善望重士林云王文束鹿人登永樂辛丑進士累官吏部尚書少保卒諡毅愍張榘涞水人父彛洪武中進士榘宣徳中舉進士第授兵部主事有聲張鵬榘子景泰辛未進士授監察御史立朝蹇諤有才名時石亨恃寵作威福鵬率同列極詆其罪亨憾之竟被誣謫戍憲廟即位召還擢福建按察使累官兵部尚書太子少保引年致仕卒賜祭𦵏謚懿簡平生剛直貞介險夷一致敡歴内外所至竭盡心力百務臻寳效云李敏新安人景泰甲戌進士累官户部尚書性㢘潔政尚慈所至得人心楊禮易州人天順初進士任刑部郎中持法平允多所平反陞寧國府知府德政所及人懐慕之王甫易州人頴敏過人讀書五行俱下天順初進士任南京禮部郎中恭儉謙抑不屑富貴鄉人至今慕之傅珪清苑人成化丁未進士累官禮部尚書為世名臣卒諡文毅王中正易州東邵社人沉毅有勇畧愽渉書史成化二十年自保定衛指揮調掌茂山衛事𢎞治初大臣交章薦之陞河州守禦子鼎襲仍掌衛事張甫眀易州南隅社人父在時與其叔鏞既異彥三十餘年後鏞食不自支貸帛以給甫眀曰我家自足給又何貸他人物乎遂去墻垣盡以家資匙鑰簿