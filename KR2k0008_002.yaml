body:
  text: 明一統志卷二明李賢等撰保定府東至河間府靜海縣界三百里西至山西大同府廣昌縣界三百里南至真定府安平縣界一百二十里北至順天府涿州界一百里自府治至京師三百五十里至南京三千一百里糧一萬千石零建置沿革禹貢冀州之域天文尾箕兼昴畢分野戰國時屬趙秦為上谷鉅鹿二郡地漢為涿郡及信都中山國地晉屬范陽髙陽中山安平河間國後魏為樂浪北平上谷郡地隋屬上谷博陵河間三郡始於此置清苑縣唐時其地屬莫定滿瀛等州五代晉割屬契丹於此置㤗州後移州治滿城而舊州仍為清苑縣宋即縣置保塞軍太平興國中陞為保州政和初號清苑郡保塞軍節度金天㑹中改順天軍初屬河間路後改屬中都路元初為保州尋改為順天路至元中又改保定路本朝洪武元年改為保定府初屬北平布政司今直𨽻京師領州三縣十七清苑縣附郭本漢樊輿縣屬涿郡北齊省入永寧軍後置樂鄉縣隋改為清苑縣屬河間郡以境内有清苑河故名唐屬莫州五代因之宋改為保塞縣金復為清苑縣元仍舊本朝因之編户二十四里滿城縣在府城西北四十里本漢北平縣地屬中山郡國後魏析置永樂縣及置樂浪郡北齊屬黎隋初罷郡以縣屬易州唐天寳初改為滿城縣五代晉時徙泰州治此後廢入清苑縣金復析置滿城縣元仍舊本朝因之編户二十里安肅縣在府城北六十里本易州遂城縣地五代唐置宥􅞯鎮周為梁門口寨宋置靜􅞯軍景徳初改安肅軍金為安肅縣屬中都路天㑹中陞為徐州後改為安肅州元時縣廢州存本朝洪武二年改州為安肅縣編户一十六里定興縣在府城北一隋百二十里本范陽縣地金大定中始置定興縣屬涿州元屬易州本朝初仍舊洪武六年改今屬編户二十一里新城縣在府城東北一百五十里本漢新昌侯國屬涿郡東漢於郡北置北新城唐太和中以故督亢地置新城縣屬涿州五代遼金因之元陞為新泰州後復置新城縣至元初屬雄州本朝初因之洪武六年改今屬編户三十六里唐縣在府城西一百一十里堯為唐侯國於此春秋為鮮虞邑漢置唐縣屬中山國北齊省入安喜縣隋復置屬定州唐因之五代梁改為中山縣晉改為博陵縣漢復為唐縣宋金元仍舊本朝因之編户二十二里博野縣在府城南九十里本漢涿郡蠡吾縣地東漢末分置博陵縣屬中山國晉屬髙陽國後魏改為愽野縣齊以蠡吾省入隋屬髙陽郡唐初屬滿州後改屬不一五代周屬定州宋屬寧邉軍元省尋復置本朝初屬祁州洪武六年改今屬編户二十一里慶都縣在府城西南九十里本漢望都縣属中山國晉因之北齊省入北平縣唐初復置属定州宋属武定軍金改為慶都縣属中山府元初属真定府尋改属保定本朝因之編户一十里容城縣在府城東北九十里本漢舊縣属涿郡東漢省晉復置属范陽國北齊省入范陽唐初属北義州貞觀初属易州聖歴初改全忠縣天寳初復名容城後廢宋初復置属雄州金改属安肅州元因之本朝改今属編户六里完縣在府城西七十里本秦曲逆縣地漢置北平縣属中山國後魏属北平郡北齊省隋初復置属定州唐改為狥忠縣神龍初復為北平縣五代時唐改為燕平縣後復曰北平属易州宋属定州陞北平軍金改為永平縣属中山府後陞完州元復為永平縣尋復完州本朝洪武二年改為完縣編户一十八里蠡縣在府城南九十里本漢蠡吾縣属涿郡北齊省入博野縣隋初属髙陽郡唐初属滿州武徳中置蠡州宋置永寧軍金改為寧州後仍改蠡州元仍舊本朝洪武八年改州為縣編户二十七里雄縣在府城東北一百二十里本漢易縣属涿郡後漢属河間國晉改為易城縣後魏属上谷郡北齊省入鄚縣隋属河間郡唐初于此置北義州貞觀六年州廢八年復置歸義縣属幽州五代初置瓦橋闗周為雄州宋置歸信縣政和中號州為易陽郡金陞永定軍元復為雄州本朝省歸信縣改州為雄縣編户一十七里祁州在府城南一百二十里本漢中山國安國縣地晉属博陵郡北齊省隋置義豐縣属愽陵郡唐改為立節縣神龍初復曰義豐属定州景福初於此置祁州宋改為蒲隂縣景徳初以州為蒲隂郡金天㑹中復為祁州元以蒲隂縣為附郭本朝省蒲隂入州編户一十四里領縣二深澤縣在州城南二十里本漢舊縣属涿郡東漢属安平國晉属愽陵國後魏属愽陵郡北齊省隋復置属定州唐因之宋熈寧中省入鼔城縣元祐初復為縣元省入束鹿縣尋復置属祁州本朝因之編户一十里束鹿縣在州城南一百二十里本漢縣地属鉅鹿郡東漢以為鄡北齊改曰安國縣隋於此置安定縣属定州開皇中改為鹿城縣唐初属深州天歴中改為束鹿縣宋金仍舊元省入深澤縣尋復置属祁州本朝因之編户一十七里安州在府城東七十里本唐武興縣属易州後更為唐興縣属莫州五代廢属瀛州宋於此置唐興寨淳化中陞為順安軍金為安州治髙陽縣後徙治渥城縣元省入髙陽縣尋復置安州本朝洪武七年降為縣以葛城省入十四年復為州編户一十四里領縣二髙陽縣在州城南四十里本漢涿郡髙陽縣地東漢属河間國三國置髙陽郡隋罷郡以縣置滿州尋罷唐初復置滿州貞觀初州罷以縣属瀛州宋熈寧中省為鎮尋復為縣金属莫州後属安州元仍舊本朝因之編户一十四里新安縣在州城東二十里本漢涿郡容城縣地宋属雄州金析置新安州及渥城縣元俱廢改為新安鎮属歸信縣尋置新安縣属保定路本朝洪武七年省入安州後復置編户五里易州在府城西北一百二十里秦為上谷郡地漢為涿郡故安易縣地隋置易州大業初罷州置昌黎郡尋改為上谷郡唐初復為易州天寳初改上谷郡乾元初復為易州遼置髙陽軍宋號遂武郡金属中都路元復為易州初属大都路後改属保定本朝因之以附郭易縣省入編户三十八里領縣一涞水縣在州城東四十里本漢涿郡遒縣地晉属范陽國後魏属范陽郡後周省入涿郡尋置永陽縣後改為涞水縣隋改為故安縣尋復為永陽縣後仍改為淶水縣唐属易州宋併入易縣遼復置涞水縣金元仍舊本朝因之編户二十五里郡名上谷秦名清苑宋名形勝臨城四野地址坦平圖經二川交流夾繞州治元志易水在東孔山在北水經三闗重地以控幽薊古雄圖經風俗稍事詩書之業畧無僥競之風宋劉渙記輕生而尚義有荆軻之遺風圖經民質樸勁勇不以浮華為習而以耕織為生郡志山川郎山在府城西北五十里一名狼山其峯尖銳如削皎然玉立元劉因逰郎山雜言山之靣背一無異不待風煙變化神已迷危闗度雪嶺亂石臨荒蹊林間小草不識風日自太古我行終日仰羡木杪幽禽啼但見雨色来雲物䬃以凄忽然長嘯得石頂痛快如御駿馬蹄萬里来長風五色開晴霓長劍倚天立皎㓗瑩鸊鵜平地㧞起不傾倒物外想有神物提松山在府城西北七十里山多松樹每風雨撼之若笙簧然林尖山在完縣北二十里峰巔髙聳壇山在完縣西北二十里大嵬山在完縣西二十五里其山嵯峨故名五雲泉水所出馬耳山在完縣西三十里工峰髙聳揷天若馬耳其間有桃花洞嵗旱禱雨屢應元劉因詩雙峰何年聳雙耳叱之不動煩風雷今朝向我効神駿翠色欲逐神鞭来浮世浮名酒一杯我欲駕此觀蓬萊只愁日暮三山上黄塵回首令人哀伊祁山在完縣西三十里堯母所居白崖山在完縣西北四十里峰巒秀聳四靣多白石故名栢山在完縣北四十里山平濶五百餘歩周廻居民甚衆唐山在唐縣北八里一名唐嵒漢書張晏曰堯山在北堯母慶都山在南登堯山可見都山鑼鼓山在唐縣西北一十三里粟山在唐縣西北一十五里羅喬山在唐縣北一十五里舊傳羅喬二仙所居故名孤山在唐縣東北一十五里四靣平坦不與他山相接又名望都山靈源山在唐縣東北一十五里中冇夀聖寺唐上元二年刻碑銘尚存又金明昌中冀國公主以中元日来逰有留題驀山溪詞刻石龕于寺壁育山在唐縣北一十五里山之陽有漢髙祖廟旁有龍祠旱禱即應父子山在唐縣西北三十五里上有浮圖相傳昔有父子共建故以名山神和山在唐縣西北二十五里與父子山相接舊名石河山居民因避兵得免改今名白合山在唐縣西北三十五里與父子山相望栢巖山在唐縣西北四十里下有栢巖院葛洪山在唐縣西北七十里山之中宫觀甚多惟中巖有宫曰上清虛最竒勝相傳葛洪修道於此大茂山在唐縣西北一百八十里石門村太史公曰北嶽之名有五其五曰太一宫或云即此山也陵山在滿城縣治西眺山在滿城縣東二里其山巍然特立勢若来潮以其可以登眺故名抱陽山在滿城縣西南一十里山勢南拱故名上有聖教寺寺中有龍潭元郝經詩孱顔蒼玉抱幽村突兀雙龍窟宅尊回首萬山東盡處冷煙平逺半乾坤釡山在安肅縣西四十五里其形若釡又涞水縣西北三十里亦有釡山圍道山在安肅縣西四十五里班妃山在安肅縣西五十里上有班妃廟龍山在安肅縣四五十里上有神龍廟大雄山在雄縣治西其山髙峙數十丈峰頂廣濶小雄山在大雄山之左山多竒峰石罅有甘泉出焉窮獨山在易州城北三十里一名馬頭山龍跡山在易州城西南三十里石上有僊人及龍跡西麓谷有一坑大如車輪中有四穴春則風出東夏出南秋出西冬出北嘗有僧法猛入其東穴見石堂石人欲窮諸穴忽聞有人厲聲云其餘三穴皆如東者不宜更入猛乃止孔山在易州城西南五十里山有三孔因名大寧山在易州城西五十里中有大寧寺駿牛山在易州城西北一百里武山在涞水縣西北九里石龜山在涞水縣西北二十里山巔有巨石其狀如龜紫涼山在涞水縣西北三十里髙百餘丈龍宮山在涞水縣西北三十里中有石洞洞出泉滙而不流潜通石井井在洞門外尺許樂平山在淶水縣西北三十里其山髙聳龍安山在涞水縣西北四十五里白楊嶺在易州城西北四十里竒峰嶺在易州城西北四十里官座嶺在易州城西北五十里五迴嶺在易州城西南一百二十里委折五迴下望層山若蟻蛭然唐有五迴縣以此為名俗訛為五虎嶺又按方輿記有武夫闗武水所出疑即此也紫荆嶺在易州城西一百里嶺上有闗路通山西大同星月巖在易州城西六十里山頂有崖出二穴望之隱然可見彎者如月圓者如星束鹿巖在束鹿縣北外隘内廣可容千餘人又名三丘古洞老姑峪在葛洪山西南隅宋時有一老姑不知名氏嘗謂人曰貧道住世二百年矣言畢投崖下不墜飛昇而去後人名其崖曰捨身崖百花嶼在府城西北九十里髙數仞廣數十丈百花繁盛石獸岡在易州城西南六十里上有石似虎亦名石虎岡清苑河在府城西二里源自雞距泉至此分流遶城南北至東合流入黄狗窊石橋河在府城南自滿城縣方順河東流經清苑縣南二十里入黄狗窊梁河在府城東三十里源自唐河分流東過安州入于海土尾河在府城東南九十里源自蠡縣唐河經縣境至安州合易水龍泉河在慶都縣北源出縣西龍泉滙而為河東流溉田三百餘頃徐河發源五迴嶺流經滿城縣北一十里名大冊河又流經清苑縣北十五里名徐河入安州境方順河在滿城縣南五十里自完縣界流至縣境逹清苑縣界長流河在新安縣西五里源自鮑河過安肅縣經縣界東南至雄縣入瓦濟河温義河在新安縣南八里源二一出安肅縣南三十里曰曹河一出安肅縣西一十里曰徐河俱流至縣南相合曰温義河又南流與長流河合至雄縣南入瓦濟河馬村河在新城縣西北四十里源出淶水經縣境入拒馬河紫泉河在新城縣東北源自縣西北龍堂上有泉湧出本朝學士胡