沆通判舒州有大獄厯嵗不決沆數日即決之人服其能王安石通判舒州時文彥博為相薦其恬退乞不次進用以激奔競之風召試館職安石不就黃庭堅知舒州政暇即吟詠以文學推重於時吕溱知舒州精識過人辨訟立斷游酢知舒州以道學為政士知理學民德善政孫之衛舒州通判時劇盜劉忠驅掠城邑之衛被執不屈為盜所啖食後朝廷官其二子沈煥舒州通判政暇不廢讀書嘗以善類凋零為憂及卒丞相周必大傷之曰不能推賢揚善豫有愧於叔晦黃幹知安慶府時金人破光山安慶震恐幹築城閲士卒㑹僚佐講究防禦之計城成有老嫗百嵗二子諸孫輿之至府拜曰老婦為一郡生靈謝是嵗大旱幹祈輒雨其後金人破黃州淮東西皆震獨安慶安堵舒人德之相謂曰生我者黃父也張德興當宋季起兵屯太湖縣司空山以拒元兵者十餘年國亡猶死戰不降夏椅通判安慶府元兵至安慶知府范文虎降椅義不屈仰藥而死元韓建至正中守安慶群盜四起攻城建屢戰却之與民效死以守卒完其城翟居仁太湖縣尹居官勤政民稱頌之為立碑余闕至正間為淮西宣慰副使分治安慶號令嚴而信與下同甘苦議屯田嚴守備時冦兵環布四外闕屢却之屹然為江淮保障後陳友諒大㑹兵攻城闕以孤軍血戰自刎墮清水塘中妻子皆赴井死追贈豳國公諡忠宣李宗可元末義兵萬户佐余闕守安慶城陷闕死宗可先殺其妻子遂自刎死時又有從事帖木補化助闕守城贊畫備禦有方城陷亦不屈而死本朝趙好德洪武初知安慶府時草創之初修理公宇均定賦役民咸便之陳希文洪武中懷寧縣丞時有指揮畢寅妄奏奪民地希文執法不允寅躬詣縣凂希文希文叱出之事聞就令希文鞫其事朝廷嘉其剛直升青州府知府胡儼洪武末知桐城縣賦役必驗丁産勾攝公事止遣信牌行移公文必於日中決之暇日輒詣學宫勸督儒生後桐城人才獨盛者皆其餘教所及錢性永樂初知安慶府亷能勤慎志在恤民王升永樂初為桐城縣丞時黃蘖山虎白晝噬人升禱城隍神三日虎忽自斃邑人至今傳之邵彧永樂中知安慶府德性寬厚未嘗疾言色事皆辦集六縣之民無不愛戴嚴頥知桐城縣識達大體每以正風俗興學校為己任均徭役革私斂奬善懲惡一惟至公故桐人至今以胡儼並稱畿志賀懋太湖知縣寬恕公明人愛敬之稱為賀青天秩滿保留在任凡十二年政績愈茂畿志常信潜山縣丞以亷幹稱縣西豪民侵官地百餘畝信按籍復之以處貧民凡百家堯年地高田五萬餘畝小旱輒不收信率其民鑿河三十餘里引吳塘水以溉之頻嵗有收民立廟祀之畿志袁慶祥嘗上書闕下杖幾死來知潛山勸農興學平賦息訟去之日行李蕭然民有去後之思畿志孫衍知宿松縣亷介嚴肅百廢興舉鋤强扶弱民賴以安田地多荒而出有常賦衍奏免之去後是思畿志陳勉桐城知縣勤政恤民豪右多不便而小民頌德有陳勉再來天有眼之謡畿志張冕知安慶府嚴於惡惡樂善善宿弊釐革殆盡吏畏民懷安慶治郡稱冕為第一畿志楊茂元𢎞治末知安慶府文章政令炳然可觀勤恤民隱小歉則賑小沴則禱嵗甲子旱甚憂形於色遍祀百神天乃大雨嵗大熟民感之畿志張䕫望江縣學教諭興學作士日課諸生寒暑不輟立企德堂於學祀諸先賢以倡諸生邑人尚佛乃教以家禮民俗丕變畿志姚嶽𢎞治間知宿松縣愛民禮士一出於誠豪民逋賦繩之以法秋毫無犯民戴之如父母及移署懷寧政聲愈著後卒兩邑之民罷市巷哭遺愛在民至今不忘畿志郭絍以參政知安慶府冰藥之操終始不二後致仕去行李蕭然且減於來日至今稱亷士云畿志李一寧知懷寧縣淳實溫厚志在愛民不事矯飾冠服敝垢人疑其詐及卒於官囊無數金笥無新衣可殮士民哀慟之畿志晏殊潛山知縣以清苦自勵布衣糲食自處如寒士德政及民既去士民紀其大者於愛碑祀於名宦祠畿志張文錦知安慶府時值宸濠來攻出府庫金縣於城上謂守備楊鋭曰師行號令出於君而信賞係於我鋭喜曰戎可以即矣故卒能致濠敗績城以完論功進太僕轉副都御史畿志楊鋭南京羽林指揮守備安慶知宸濠妄作寓意江防及濠至圍城衆戴板木掘城鋭用布一方裼以紙束火藥散於所戴木上一時火發盡棄去寇夜成橋接城甚急鋭用大銃僞實以石金鼓迎至城上寇望之奔散即遣人由水穴出燒絶梁相守二十餘日知濠卒已懈乃使善泅者入水次聞舟中鼾聲即刺殺斬纜放舟於江中岸頭發火鋭城上震喊相接命指揮崔文縱殺之寇失錯而返論功拜都督僉事畿志崔文安慶衛指揮宸濠之變攻圍安慶二十餘日後開門縱殺實文之功事平進署都督畿志流寓畢諴河南偃師人常寓郡中讀書主簿山仕唐為翰林學士號禁中頗牧後拜相舒雅本宣城人好學善屬文自江南歸宋出知舒州雅恬於榮官以州之潛山靈仙觀有神仙勝迹郡秩滿即請掌觀事在觀纍年優遊山水吟咏自樂遂家於舒王罕本成都人徙家於舒以䕃知宜興縣纍遷户部度支副使知潭明州皆有政績以光祿卿卒即王琪之父圭之季父也徐俯本洪州人黃庭堅甥也從庭堅寓同安與洪駒父胡少汲相與賦咏甚適宋紹興中賜進士纍官參知政事楊萬里本吉水人嘗愛潛山水遊寓於舒人物漢文翁舒人少好學通春秋景帝時為蜀郡守崇尚教化興學校以變風俗由是蜀文風可比齊魯武帝時天下皆建學自文翁始後終於蜀蜀人祀之朱邑舒人少為桐鄉嗇夫亷平後舉賢良遷北海太守以治行第一召為大司農為人惇厚天性亷正不可交以私自處節儉祿賜以供族黨而家無餘財及卒天子惜之曰大司農退食自公無疆外之交可謂淑人君子賜其子黃金百斤以奉祭祀晉何充潛人風韻淹雅文義見稱王導與庾亮並言於成帝曰何充器局方槩有萬夫之望臣死之日願引充內侍則社稷無虞矣及導卒遂參録尚書事充性好釋氏以此獲譏於世卒贈司空何凖充之弟高尚寡欲州府交辟不就初充為驃騎將軍勸令仕凖曰第五之名何減驃騎凖兄弟中第五故云充居宰輔權傾一時而凖敢帶衡門不及人事唯誦佛經而已其女為穆帝后南北朝何尚之潛人仕宋官至中書令立身簡約愛尚文義老而不休卒贈司空諡簡穆何昌寓尚之從子獨立不羣所交皆當世名士仕宋厯郡以清白稱後為吏部尚書有姓閔者求官自言子騫之後昌寓笑曰遙遙華胄其子敬容亦為吏部尚書銓序明審號為稱職出守吳郡政為天下第一何點尚之孫容貌方雅博通羣書宋齊纍徵不起梁武帝與點有舊及踐祚召見尋辭疾歸兄求弟𦙍皆隱遁世謂何氏三高何佟之潛人好學三禮師心獨學仕南齊為國子助教後為記室參軍當時國家吉凶禮則皆取决焉唐張鎮周舒人武德間為本州都督到郡就故宅召親戚酣宴十日既而分贈金帛泣與之别言今日鎮周猶得與故人歡飲明日則舒州都督治百姓耳自是境內肅然徐仲源望江人事母至孝母疾割股為縻母食而愈貞元間旌表其門改鄉曰孝感曹松舒州人光化中登第時已七十餘矣同榜五人皆年相上下號五老榜授校書郎而卒所著有詩集五代周本宿松人瑜之後少勇敢嘗獨格猛虎從楊行密每戰先登䝉犯矢石身無完膚唐莊宗入洛聞其名召為雄武統軍出為夀州節度使拜太尉封西平王本雖不知書而愛重儒士賔禮僚屬吏民愛之子鄴官至廬州刺史宋王琪舒州人兒童時已能詩歌舉進士調江都主簿上時務十二事仁宗嘉之性孤介數臨東南諸州政尚簡靜每疾俗吏飾厨傳以沽名譽故待賔客頗闊略間造飛語謗終不自恤以禮部侍郎致仕王圭琪從弟弱嵗竒警出語驚人慶厯初舉進士甲科通判揚州纍遷至翰林學士承㫖元豐中拜左僕射封岐國公卒贈太師諡文恭圭為文闔侈瓌麗自成一家當時朝廷大典策多出其手李公麟舒州人元佑進士為泗州録事參軍公麟好古博雅長於詩多識竒字自夏商以來鍾鼎尊彛皆能考定世次辨别款識為考古圖善丹青妙絶冠世黃庭堅謂其風流不減古人弟公權公寅亦舉進士有名李亮工舒州人舉進士以文名縉紳間與蘇軾黃庭堅遊有詩唱和李元中舒州人舉進士工書翰追蹤鍾王與李公麟李亮工同時登第號龍眠三李張漢卿桐城人監興國軍管庫與太守論事不合即和陶潛歸去來辭歸隱三十年後宰相趙汝愚特薦之王日休舒人誨誘後學尤為諄切嘗撰速成模楷一書元馮三竒懷寧人至順初進士為光山尹遷國史編修預修遼金宋三史王幼學望江人篤志力學嘗讀朱子通鑑綱目苦其援引幽邃句讀疑難乃博采經傳著為綱目集覽以便學者陳道夫懷寧人余闕辟為懷寧尹助闕守城屢挫强敵城陷死之本朝栁升懷寧人洪武永樂中從征纍立戰功封安逺侯卒追封融國公諡裏愍井霖懷寧人舉鄉貢擢監察御史革除間靖難兵起被執抗言死之汪善潛山人由太學生厯官勤慎有才辨纍升大理寺左少卿吳升懷寧人登宣德癸丑進士第拜工科給事中有直氣遇事敢言尋升浙江布政司參議政績著聞姚旭桐城人正統辛未進士刑科給事中敷奏詳明直聲動朝端謫判鄭州清慎自勵擢南安知府盡心民事而猶以學校為先雨暘愆期每禱輒應擢雲南參政致仕畿志劉鈺懷寧人凝重簡靜不妄言笑居家孝友有古人風景泰丙子鄉貢任紹興通判誠心愛民民不忍欺租稅㦄期無敢後者平餘姚巨賊民尤德之祠以祀焉南畿志韓隆桐城人國子生知永安縣縣初建隆至築城建學創公署新祀典除虎患息巨寇造浮梁民甚德之借留厯十二年卒民立祠祀之畿志方佑桐城人天順間進士授監察御史風采凝峻人不敢干以私凡所巡厯目為真御史廣西全城之功最竒為忌者中傷出知攸縣縣稱治擢桂林知府甫八月致仕歸結屋萬松間足不及城市超然自得為皖中人望畿志葉華懷寧人天順丁丑進士知沂州民苦逋賦疲於轉輸華奏請釐革咸得其宜至今民猶賴之卒立祠祀焉畿志程亨懷寧人天順間以國子生擢監察御史所巡厯有聲轉江西按察司僉事平南贑巨盜尋督學校品士精審人服其明畿志江𢎞濟桐城人成化丙戌進士清豐知縣有善政擢監察御史風采凜然人莫敢犯卒於雲南舊衣僅數襲人服其清畿志王瑞望江人成化間進士厯吏科都給事中正色立朝多所建白嘗抗言內寵滋甚詞氣激切又劾幸進者若干人降黜有差京城地震上疏詆權貴或危之瑞曰苟有利於國死生非所計也升湖廣布政司右參政致仕卒畿志李璡懷寧人成化間進士蘭溪知縣惠法兼濟治行著聞被召入京民有來何暮去何速之謡拜太僕寺丞擢贑州知府時大水且疫璡百方拯救多所全活愛民禮士政化大行閩廣盜入境我師失利勢甚猖獗璡築屬邑城凡五督師深入備嘗劬勩二年擒滅論核功罪因被讒謫判大同卒畿志余順安慶衛人成化間進士知安吉縣創學建倉鋤强扶弱政有便於民者攘臂為之竟以介忤當道落職及歸杜門足跡不入公府雖宴㑹亦不赴畿志李淳太湖人𢎞治間進士刑科給事中抗直敢言多所禆益忤逆瑾下獄重罰淳不少沮言時政六事首及儲二不報擢浙江按察司僉事平浙東劇盜調廣西平府江土猺卒於官畿志周璽太湖人從戍廬州𢎞治問進士任給事中纍官順天府丞逆瑾柄國錦衣指揮楊玉附之勢甚薰灼文移乖式璽峻拒之瑾怒杖於朝者三竟卒瑾誅賜祭畿志余珊桐城人正德間進士授監察御史執法敢言以鹽法忤中貴杖幾死謫判安陸知灃州政號亷平擢江西僉事弭湖西大盜升四川兵備副使區處畨夷邉境寧謐轉按察使尋卒畿志魯敏懷寧人領鄉貢厯臨江府教授行誼著聞居官模範端凝訓迪有法餽遺一無所受貧者周之士多成就既去諸士戀戀不舍及卒有過皖者嘗哭祀其墓畿志列女黃氏女千金潛山人許嫁張生大中未嫁而大中卒父意欲改議千金曰天有二日乎父卒事母孝邑中有求聘者母許之千金再拜而起伏父木主前號泣以簮刺目逾三月而卒時年十九事聞旌表其門畿志胡氏望江人錢某妻也早寡至正問以守節旌其門翰林承㫖歐陽𤣥為題匾畿志錢時妻孫氏桐城人時任刑部主事有罪當刑孫與之訣拔髮為縷繫臂自矢時有詔問死者之婦安歸孫伏地請曰臣有寡姑願賜不死歸養許之乃收尸骸骨以歸既七月乃生遺腹子惠守節四十三年年七十而卒畿志張氏懷寧人嚴文昌妻文昌蚤卒張為守節事聞旌表畿志陳氏宿松人年二十夫卒陳日夕奠哭守節終身雖親戚亦罕見事聞旌表畿志王寬妻張氏太湖人適望江王寬寬卒張年少家貧紡績以養其姑姑憐其苦欲嫁之張嚙指剪髮以誓姑乃止守節二十六年事聞旌表畿志陶氏四節婦桐城人陶鏞妻鍾氏鏞子繼娶方氏繼子亮領景泰癸酉鄉薦妻王氏妾吳氏鏞繼俱蚤喪鍾方各守節亮亦蚤卒妻妾共處一室抗節終其身有司上其事詔表其門曰陶氏三世四節畿志汪世衡妻戴氏桐城人正德間遇流賊欲驅掠之戴抱栁樹不動賊以刀厲其頸戴厲聲曰何不速殺我賊怒遂殺之畿志仙釋白鶴道人梁武帝時方士愛舒州濳山竒絶時有浮屠寶志者亦欲之武帝命二人各以物識其地得者居之道人以鶴止處為記寶志以卓錫處為記已而鶴先飛去忽聞空中錫飛聲遂卓於山麓而鶴止他處遂各以所識築室焉閭丘方逺宿松人初居廬山學修真出世之術唐昭宗纍詔不起賜號妙有大師景福中居餘姚大滌洞錢鏐奏號𤣥同先生天復中尸解後有見之仙都山者崔之道舒城人為真源宫道士嘗見二仙人對奕與一奕子令吞之自此言禍福輒應後尸解李斯立居東山靈隱觀嘗從蘇軾遊年逾八襄作詩不凡如巖溜連雲凍溪梅帶雪香有意峯巒千嶂出無名花草百般香皆佳句也燦禪師自達摩入中國以衣鉢相傳至燦為三祖講法於舒州之皖公山卒葬山谷寺明一統志卷十四
