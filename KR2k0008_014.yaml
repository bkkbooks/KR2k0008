body:
  text: 明一統志卷十四明李賢等撰廬州府東至和州含山縣界一百九十里西至河南汝寧府固始縣界三百五十里南至安慶府桐城縣界一百八十里北至鳯陽府定逺縣界一百八十里自府治至南京五百一十里至京師三千六百七十七里糧九萬三千九百石零建置沿革禹貢揚州之域天文斗分野周以前為廬子國春秋時屬舒戰國時屬楚秦為九江郡地漢立廬江國東漢為合肥侯國仍隸九江郡三國屬魏為重鎮晉為淮南廬江二郡地宋齊兼屬南汝隂郡梁置南豫州治合肥後改合州北齊因之兼置北陳郡隋初始改合州為廬州太業初改廬江郡唐初為廬州天寶初改廬江郡乾元初復為廬州屬淮南道楊吳置昭順軍節度南唐改保信軍宋因之屬淮南西路建炎初為本路安撫司治所元初置淮西總管萬戶府尋改廬州路總管府屬河南行省本朝洪武初改廬州府直隸京師領州二縣六合肥縣附郭本漢舊縣屬九江郡晉屬淮南郡劉宋改為汝隂縣屬汝隂郡齊屬廬江郡隋復為合肥縣屬廬州唐宋元仍舊本朝因之又併梁縣地入焉編户六十里舒城縣在府城西南一百二十里本舒國春秋時舒人叛楚即此地秦屬九江郡漢為龍舒縣地屬廬江郡宋齊為舒縣唐開元間於故舒城置舒城縣屬廬州宋元仍舊本朝因之編户四十五里廬江縣在府城南一百八十里本漢龍舒縣地屬廬江郡晉因之梁始置廬江縣及置相州隋屬廬州宋割屬無為州元仍舊本朝改今屬編户二十里無為州在府城東南二百八十里商時巢國地漢為廬江郡居巢臨湖襄安三縣地隋以襄安省入巢縣置無為鎮宋置無為軍又增置無為縣元置無為路後改無為州夲朝因之以無為縣省入編户四十五里領縣一巢縣在州城北九十里本古巢伯國書成湯放桀于南巢春秋時楚人圍巢皆此地秦為居巢縣漢晉因之梁為蘄縣隋省入襄安縣唐初置巢州尋改巢縣宋初廢為鎮尋復為縣又置鎮巢軍元升為州後復為縣屬無為州本朝因之編户二十里六安州在府城西一百八十里本古六國禹封臯陶之後於此春秋為六蓼國地漢為六安國治六縣後為盛唐縣屬廬江郡晉改為六安縣隋改霍山縣唐置霍州復廢州改霍山為盛唐縣五代晉改來化縣後復為盛唐縣宋為六安縣政和中升六安軍初屬夀春府後屬安豐軍元為六安州屬廬州路本朝洪武中割屬鳯陽府以六安縣省入後改今屬編户五十里領縣二英山縣在州城西南四百里本蘄州羅田縣東鄉地宋淳祐間立鷹山寨咸淳初更名英山因立為縣屬六安軍元屬六安州本朝因之編戶二十四里霍山縣在州城西北一百七十里本六安州地故埠鎮𢎞治間析置縣賜名霍山屬六安州編户一十里郡名廬江合肥俱漢名金斗舊志合肥號金斗以其分野入斗度獨多故也形勝南臨江湖北達夀春魏滿寵云淮西重鎮宋鄭集文廬為淮西重鎮封疆三百里户口亦數萬計龍眠蟠其前紫荆跨其北廬州新城記淮右襟喉之地江北視為脣齒同上一道都㑹地大以要宋葉祖洽三至堂記腹巢湖控渦頴膺濡須枕潜皖宋韓元吉風鶴亭記南聨舒蘄北接和廬無為州秀溪驛記臨濡水上源誠淮江津要寰宇記風俗人性躁徑風氣果決隋地理志尚淳質好儉約同上其俗頗尚淳質好儉約喪祀婚姻率及於禮人物語音風土茂明皆勝淮左諸郡廬江志人性淳厚好學務本無為圖䇿人性淳厚好學務本畏犯法而少鬪訟無吳楚徑悍之風俗尚氣力人習戰鬭晉伏滔正淮論稍事詩書多業農賈元廬州志尚勇力文辭巧而少信元六安志山川大蜀山在府城西二十里爾雅釋云蜀者獨也此山孤立卓秀無岡阜聫屬故名宋董淳有賦山之西又二十里有山差小名小蜀山雞鳴山在府城西北四十里肥水所出上有龍井又英山縣治後亦有雞鳴山石佛山在府城西五十里山頂有三石佛像青陽山在府城東六十里巢湖西北元余關嘗讀書山中題其室曰青陽新安程文作記方山在府城東六十里山頂四平故名又舒城縣南五十里亦有方山相傳宋方統制嘗避兵其間龍泉山在府城東六十里山出泉四時不涸紫蓬山在府城西南七十里上有漢李陵廟又名李陵山四頂山在府城東南七十里俯瞰巢湖上有四峯特起亦名四鼎山相傳魏伯陽煉丹之所丹成以白犬試之即仙去唐羅隱詩勝境天然别精藍在畫圖一山分四頂三面瞰平湖張彥修詩翠巒齊聳壓平湖晚緑朝紅畫不如寄語商山閒四皓好來各占一峯居姥山在府城東南一百里巢湖中居合肥巢廬江三邑之間一名聖女山上有太姥廟孤山在府城東一百里巢湖中其山突然孤起浮槎山在府城東八十里俗傳此山自海上浮來昔有梵僧過而指曰此耆闍一峯也梁武帝女為尼於山建道林寺釋用孫詩云山為浮來海莫沉蕭梁曽此布黃金梵僧親指耆闍路帝女歸傳達磨心地控好峯排萬仞澗餘流水落千尋靈蹤斷處人何在日夕雲霞望轉深山頂有泉極甘美宋嘉祐中郡守李不疑飲之甚甘以遺歐陽修作記云浮槎山或曰浮闍山或曰浮巢山其上有泉自前世論水者皆弗道余嘗讀茶經愛陸羽善言水後得張又新水記載劉伯芻李季卿所列水次第以為得之于羽然以茶經考之皆不合及得浮槎山水然後益以羽為知水者浮槎與龍池山皆在廬州界中較其水味不及浮槎逺甚而又新所記以龍池為第十浮槎之水棄而不録以此知其所失多矣黃山在府城東一百二十里接巢縣界山有三百六十峯周回約二百里四時泉出不涸俗呼為龍泉山蓮花山在府城西一百里絶頂有鑿成石蓮花故名龍穴山在府城西一百三十里上有張龍公祠宋歐陽修集古録載張龍公碑云張路斯潁上人唐景龍中為宣城令生九子嘗語其妻石氏曰吾龍也蓼人鄭祥逺亦龍也吾屢與戰未勝明日取決可令吾子射繫鬛以青綃者鄭也絳綃者吾也遂射青綃者鄭怒投合肥西山以死今龍穴山是也蓋山之東南隅有穴土人以山有一池又呼為龍池山張又新水記以此池水為天下第十池旁有廟鄉人嵗旱於此禱雨春秋山在舒城縣南三十五里相傳唐貞元中有二禪子脫解於此遺骨嘗存其來也實春秋之月遂以名山上有宋李公麟讀書堂洗硯池又有望湖尖鳯凰臺仙人峯仙人跡絶頂有洞可容數十人王姥山在舒城縣南三十里昔有王姥修行於此白鹿銜花以獻近此有栲姥山鹿起山在舒城縣東南三十里昔有名僧過此一鹿自山出僧即其地以化山有南嶽行祠祠前有試心臺洗劔池響山在舒城縣南二十五里相傳過其下者嘗聞山中有聲如鼓馬鞍山在舒城縣南三十五里以形似名梅福山在舒城縣西七十里亦名梅山舊傳梅福尉南昌棄官隱於此上有梅仙洞鼓樂山在舒城縣南八十里與法華山相對舊傳梁武帝未有嗣寶志云有髙人隱此山中三生前乃伶官作樂可致後生昭明太子以是得名龍眠山在舒城縣西南八十里形若卧龍宋龍眠居士李公麟以此山為號元燮理溥化嘗繪為圖虞集詩燮侯起髙科得邑舒水上民淳事稀簡田野甚夷曠戰爭遺迹泯山水良足賞幽棲南昌尉英爽赤壁將古仙家白雲美人化黃壤岧岧龍眠山一士獨可尚高懷托千載妙畫極羣象向來讀書處春雨草木長夷猶昔賢逺瑤席共來饗彈琴坐終日微泉散清響來者安可期徘徊以怊悵畫圖記倣佛聊以慰遐想三角山在舒城縣西一百二十里峯有三角故名又名多智山以其水清潤飲之能使人聰明博敏百藥山在廬江縣南一十里相傳唐李百藥嘗到此冶父山在廬江縣東北一十里舊為冶鑄之所山勢峻峭峯巒森密自麓至顛幾五里餘有三百六十四凹上有羅漢壇金牛山在廬江縣西北三十里相傳有金牛裂土而出其坑尚存崑山在廬江縣南四十里産礬又名礬山栭山在廬江縣西四十八里栭小栗也山多小栗因名山頂有井曰天井福泉山在廬江縣南五十里山下有泉飲之可以愈疾故名紫芝山在無為州城西南山本土岡宋皇祐間生紫芝三百五十夲郡守茹孝標獻於朝舊有平山堂及紫芝亭已廢朝喜山在無為州西北四十里值嵗旱晨有雲氣是日必雨吕泉山在無為州西北四十里舊名石膏山上有泉世傳吕洞賔於此插劔泉忽湧出軒車山在無為州西北五十里宋王藺退居之别墅銀瓶山在無為州西北五十里一峯特起狀如銀瓶故名白石山在無為州西北五十里上有龍湫毛公山在無為州西六十里山之陽有毛公洞石壁盡刻毛詩然不知何時所刻胡避山在無為州西六十里舊名孤鼻山宋紹興初郡人王之道保聚其上羣冦不能破天井山在無為州西九十里山頂二泉左曰黃龍右曰白龍故又名雙泉山下有楚雲洞三公山在無為州西南一百二十里接廬江縣界山有三峯宋楊傑詩白雲鎖斷三山峯九卿山在無為州西南一百二十里接廬江縣界山有九峯上有仙人煉丹臺卧牛山在巢縣治後以形似名相傳巢父許由嘗隱於此半湯山在巢縣東北一十五里有二泉名半湯池一冷一熱合流其初冷熱仍異數里之外始相混魚自冷泉觸熱則亟回唐羅隱詩飲水魚心知冷暖濯纓人足識炎涼八公山在巢縣西北一十八里上有漢淮南王廟王名安好神仙有八公鬚眉皓白詣門希見門人曰吾王好長生先生無駐衰之術未敢聞八公咸變為童白日升天遺藥在器雞犬䑛之皆飛去宋王安石詩淮山但有八公名鴻寶燒金竟不成身與神仙守都厠何能雞犬得長生七寶山在巢縣東南三十里曹魏時濡須山為東關七寶山為西關上有烟霞亭唐杜甫詩蘭若山髙處烟霞障幾重大秀山在巢縣南三十里峯巒秀麗宋楊傑詩水入平湖千里逺山橫大秀一峯高踟蹰山在巢縣南三十七里左傳楚子觀兵於坻箕山又陳荀朗破郭元建於踟蹰山蓋坻箕踟蹰音相近居巢山在巢縣南六十里其溪谷中有石研之如墨舊名墨山唐改今名亞父山在巢縣東八十里亞父范增也增居此山之陽故名金庭山在巢縣北九十里舊名紫微山即道書所謂第十八福地乃王子喬登仙處上有金庭洞下有紫微玉蘭二洞上相連又有杏花泉宋阮美成詩蕭蕭葉下曉風寒日金庭恰一竿行遍杏花泉畔路紫雲深處見星壇武陟山在六安州西二十里漢武帝南巡至灊山樅陽作歌而回登封霍嶽道經此山洪家山在六安州東南七十里有寨四圍石崖險峻宋紹興中嘗有洪氏率里民保聚於此通光山在六安州東南七十里山有穴穿透如月之狀九公山在六安州西南七十里山頂有九石柱其狀如人三洄山在六安州西南一百里又名三曲山中有小港通故步鎮山隨水勢縈回三灣東北二十里名梅子嶺可容數十萬人董靖原山在六安州南一百二十里有寨山原平敞周圍有小徑相傳宋紹興間里民董靖避兵於此祖家山在六安州西南一百三十里形勢髙昻宋紹興間民多避兵於此文家山在六安州西南一百四十里亦居民避兵之所甄家山在六安州西南一百六十里相傳有甄氏女於此得道白日飛升陶成忠山在六安州西南一百七十里山有古徑﨑嶇而上傍多林木藤蔓掩蔽相傳有陶鐡鎗者嘗屯於此不知何時人天人山在英山縣北三十里險峻有寨宋鄉民嘗避兵於此英山在英山縣東五十里其山峯巒峭拔秀麗上有井井上常有雲氣望之罕見見之其年必豐樓子山在英山縣東北七十里上有山寨多雲山在英山縣西北一百里接羅田縣界山有九井嵗旱居民禱雨雨可立俟霍山在霍山縣西北五里一名衡山一名天柱漢武帝南巡至盛唐以南嶽衡山逺阻乃移嶽神於霍而祀馬又名南嶽山山頂有天池龍湫風洞嶽井試心崖凌霄樹又有渌水池旱不乾潦不溢宋曹