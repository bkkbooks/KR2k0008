六安縣在故六安州治東今即其址為州治濡須塢在無為州東北五十里接巢湖湖東南有石渠鑿山通水名東關口相傳夏禹所鑿一名東興又名濡須塢其地髙峻險狹實守扼之所吳諸葛恪於東關作大隄遏巢湖左右依山挾築兩城使全端守之魏人圍東關圖壞其堤不克昔人詩僣僞分三國雄豪挫二關曹公從北下吳主未東還戰伐千年外興亡一夢間巢湖何浩渺今古屬漁開回車巷在巢縣西北一十五里相傳孔子至此回車文翁莊在舒城縣治西南文翁舒人嘗讀書於此歸來宅在舒城縣治縣尉㕔東南宋李公麟歸隱處二石牛在府城內相傳昔人濬肥河得之土中形製甚精對峙為角抵狀名宦漢劉馥獻帝時為揚州刺史單馬造合肥空城建州治立學校廣屯田又興堰以溉稻田數年恩化大洽子靖亦為廬江太守三國張遼魏蕩寇將軍屯合肥吳主率衆十萬來攻圍遼敗之乃還朱桓吳濡須督魏曹仁步騎數萬來侵桓諸將有懼心桓曰彼人心罷困以逸待勞為主制客此其時也乃外示虛弱誘致仁大敗之駱統吳濡須督數陳便宜前後書數十上所言皆善吳主權行之顧雍吳合肥長有恩惠州民懷之晉郗鑒以安西將軍都督揚州諸軍事鎮合肥南北朝裴邃梁豫州刺史加督鎮合肥居身方正為政寬明能得士心及卒淮肥間莫不流涕夏侯亶梁南豫州刺史輕刑薄賦務農省役唐朱敬則廬州刺史代還無淮南一物所乘止一馬子豐步從而歸劉佑廬州刺史在任寬信亷慎嵗㑹課第甲於他州路應求元和中廬州刺史韓愈為作神道碑及同食館記鄭綮廬州刺史黃巢掠淮南綮移檄請無犯州境巢笑為斂兵州獨完嵗滿去贏錢千緡藏州庫後他盜至終不敢犯鄭使君錢盧潘大中間廬州太守嘗作廬江盜辨五代馬仁瑀南唐廬州節度使政甚亷平大得民心宋劉筠知廬州臨事明達治尚簡嚴刁衎知廬州政績甚優真宗即位衎上疏言事甚切直吕夷簡以茶鹽場兼無為軍通判有美聲子公孺知廬州以亷儉聞陳堯佐三守廬州以方嚴肅下使人知畏之而重犯法至其過失多保宥馮京知廬州安於治郡甚得利民心張田知廬州臨政以清治有善跡嘗作欽賢堂繪古清刺史像日夕師拜之劉攽通判廬州歐陽修稱其辭學優贍操履清慎孫覺知廬州為政明恕先是覺為合肥主簿嵗旱州課民捕蝗輸官覺言民方艱食若以米易之必盡力守悅推行其法楚建中知無為軍事清淨不擾去後民為立祠米芾知無為軍風韻蕭逺趣向髙潔凡郡中亭館寺觀之額皆其書也性僻好石初入公廨見一石狀竒大喜具衣冠拜之呼為兄在郡蝗飛入境不傷禾稼人皆異之傅堯俞知廬州熙寧初至京王安石素與之善方行新法將處以諫官曰舉是朝紛紛俟君來久矣堯俞曰新法世以為不便誠如當極論之安石大不悅朱服知廬州廬人饑便宜振護全活十萬餘口明年大疫又課醫持善藥分拯之賴以安者甚衆周邦彥廬州教授文章博洽表著一時嘗作汴都賦萬餘言以獻神宗異之陳瓘知無為軍蓋以右司諫彈蔡京被責在任為政亷平人皆思之張宗顔知廬州金人冦城下以騎百餘禦之敵退有至目淮北者傳金人言曰此張鐵山弟也王蘧知無為軍事嘗為民興三墟開十二井築北嶺以捍水至今蒙其利王希吕知廬州兼安撫使修葺城守安集流散兵民賴之為立生祠趙汝談知無為軍以光州守柴中行安豐守陸峻俱稱循吏時金人內變汝談獻料敵禦邉二䇿陳規知廬州兼淮西安撫既至疾作有㫖修郡城規力疾治事著攻守方略胡舜陟髙宗時知廬州時淮西盜賊充斥廬人震恐舜陟至修城治戰具人心於是始安仇悆以淮西宣撫知廬州僞齊合金兵大入民情洶懼統制張琦欲乘危為亂擁甲士數千突入露刃先脅悆出悆堅不為動神色不少變琦等錯愕解散人心遂定趙康直紹興中知廬州酈瓊之叛與判官呂祉同死於職郭振乾道中以都統制帥淮西淳熙間嘗展合肥城居民便之杜杲廬州推官又知六安縣民有嬖其妾者治命與二子均分二子謂妾無分法杲書牘云父令子違不可以訓然妾守志則可或去或終當歸二子部使者季衡稱為縣令之最杜庶淮西提刑浚城濠增守備修學宫踰年兼廬州安撫副使人歡仰如慈父治績甚多夏貴紹定間淮西安撫制置大使兼知廬州目能夜見人呼為夏夜眼纍立戰功元羅璧淮西道宣慰司同知請荒閒之田給貧民耕墾三年而後量收其入從之嵗得米數十萬斛姚天福淮西按察使凡兩任將吏有豪猾為民害者悉剷除之民大悅政化大行塔爾海廬州路總管時飛蝗北來民患塔爾海禱於天蝗引去亦有墮水死者人皆以為異民乏食開廩減直俾民糴之所活甚衆本朝蘇敏洪武中知廬州府蒞政八載吏民肅然州縣德之雖童稚亦皆稱頌卒於官闔郡之人為之垂涕唐元亨洪武中知無為州招士撫民教化有方深得人心以課最升太僕寺卿樂瓉洪武中知無為州剛毅忠直吏民畏服初知臨淮已得人心升知是州德政益著及升知荆州府起行日父老垂泣舉留鄒以信永樂初知無為州在任處事精詳政尚德教不事苛虐郡人感化以博學能文稱之曰文章太守王仕錫永樂中知無為州處已公平慮事周密尤注意學校興舉廢墜州人稱其有循吏風陳善永樂中無為州同知文學優長存心平恕人皆德之陸愈永樂中知六安州興學校敦禮義盜息民安九載郡人不釋詣闕保留遂復任始終如一劉顯宣德間知舒城縣單車赴任興學勸農增開水利民甚德之立祠祀焉畿志朱鏞知廬州府愛民好士以文章政事稱於時畿志李崙成化間知廬州府古朴簡易人不敢千以私首興學校人才多所成就滿去百姓遮道乃留革履以慰去思及卒無以為斂朝廷嘉之畿志孫佐𢎞治中任廬州府學教授性敦厚寡言笑授生徒以經學寒暑不倦有貧乏者分俸周之畿志胡暘𢎞治中知廬江縣亷威明直抑強扶弱重築邑城民永賴之畿志人物秦范增居巢人年七十居家好竒計秦末輔項羽霸諸侯後羽信反間不能用其計增怒曰天下事大定矣君王自為之願乞骸骨歸未至彭城而死先儒謂增在羽不亡增亦人傑矣哉漢英布六安人少時客相之曰當刑而王及壯坐法黥因改姓黥秦末以兵屬項梁項羽封為九江王歸漢髙祖封淮南王周榮廬江人章帝時舉明經辟司徒袁安府及安與竇憲有隙或謂榮曰子為袁公腹心之謀排奏竇氏竇氏刺客滿城謹備之榮折之以正理而不懼及竇氏敗名遂顯毛義廬江人家貧以孝行稱南陽張奉往候之坐定而府檄適至以義為安陽令義捧檄而入喜動顔色奉心薄之及母亡遂不仕奉曰往日之喜乃為親也三國周瑜廬江人英達夙成有文武籌略與吳孫策相友善取荆州以瑜為中護軍程普嘗告人曰與公瑾交若飲醇耐不覺自醉瑜字公瑾後孫權用瑜計大破曹操於赤壁瑜少精音律或有缺誤必顧諺曰曲有誤周郎顧年三十六卒於巴丘子𦙍以功封都鄉侯陳武廬江人征討有功孫吳拜部司馬所向無前從擊合肥奮命戰死子表少知名士皆樂附領新安都尉廣間降納封都鄉侯家財盡於養士死之日妻子露立丁奉廬江人仕吳為冠軍大將軍領徐州牧數從征伐每斬將搴旗計略過人能斷大事王蕃廬江人博覽多聞仕吳為常侍後為嬖臣譛死時論寃之唐任瓌合肥人年十九仕陳為衡州司馬陳亡瓌葉官去後謁唐髙祖於汾晉承制署河東縣户曹尋擢招討使數立戰功纍官至徐州大總管陕州都督封管國公羅珦廬州人仕為本州刺史捐己俸給藥濟貧禁淫祀修學勸士務崇其本三年政化大治有芝草白雀之瑞節度使杜佑上治狀賜金紫服遷京兆尹封襄陽縣男子讓官至江西觀察使萬敬儒合肥人三世同居親亡廬墓大中間詔表其門州改所居曰成孝鄉宋大中祥符中又旌異之楊行密合肥人唐末刺史鄭綮竒其貌以功補隊長後纍官至諸道行營都統檢校太師中書令封吳王行密仁恕善御衆持身節儉淮南人多歸之第四子溥稱帝國號吳朱延夀舒城人昭宗擢奉國軍節度使敵至撒門扃不設備逡巡自去用兵常以寡擊衆臺濛合肥人善戰唐末楊行密表為檢校太保宣州觀察使田頵合肥人壯果有大志楊行密表為馬步軍都虞侯纍官至太保同中書門下平章事袁人傑無為人唐末盜賊充斥人傑以土豪招集强壯保障一方賊大人人傑挺身血戰度不去人傑仰天大呼自刎而死尸僵立者纍日賊驚異舍其境遁去鄉人收葬立廟祀之五代王景仁合肥人從楊行密起淮南驍勇剛悍臨敵常以身先之後仕梁為寧國軍節度使加同中書門下平章事陶雅合肥人楊行密用為將討定鄉盜後為江南都招討使歙婺衢陸四州都團練觀察處置等使李章廬江人初事楊行密為騎將後事南唐纍遷雄武軍都虞侯善撫士卒勤於職務出為䖍州節度使能禁戢左右賔禮僚屬移鎮廬州加中書令卒年九十王安廬州人初事楊行密為親兵行密嘗升髙望敵安捧巵器侍側忽陳旁有執槊者疾趣行密安置巵於地取弓射之一發而殪徐納弓韜中捧器如初行密竒之因加奬拔纍遷袁州刺史厯典數邵皆以沉默寬厚為理南唐初為神武統軍伍喬廬江人性嗜學渡江入廬山國學苦節自勵南唐時舉進士第一命勒喬程文於石以為永式署宣州幕府滿考遷考功郎中郭師從合肥人仕吳越為浙東馬步都虞侯從文穆王瓘破廣德征無錫皆有功纍遷浙西營田副使忠獻王時以其纍勳拜同參相府事卒年八十四宋徐行周舒城人數世同居朝廷旌表其門賜粟帛州縣存問復其賦稅姚鉉合肥人太平興國中進士直史館厯右司諫京東轉運使後坐事貶連州鉉文辭敏麗有文集二十卷又采唐人文章為文粹百卷楊察合肥人舉進士纍官至户部侍郎充三司使察美風儀敏於為文其為制誥若不用意及藁成皆雅緻有體遇事明決勤於吏職卒贈禮部尚書諡宣懿弟置舉進士第一通判潤州以母憂不赴毁瘠而卒時人傷之王光濟廬州人喪母因刻像日夕奉事如平生孝道純篤州以聞咸平中旌表之馬亮合肥人登進士纍官至西川都轉運使時王均反初平之主將肆意誅戮亮救免者千數及械送詿誤者九十人至京師亮請於朝悉宥免之亮嘗兩典鄉郡人以為榮官終太子少保卒諡忠肅馬仲甫亮子舉進士厯知登封縣拜天章閣待制知瀛秦亳許揚五州所至興利除害時稱能吏云茹孝標舒城人天聖中進士少負氣節吏治有聲嗜學不倦仕至都官員外郎出知江州雙漸廬江人慶厯進士博學能文為職方郎中嘗知同州以和易為政所至見思若古循吏包拯合肥人舉進士嘗守鄉郡不少屈法以徇鄉曲吏事推為第一為御史時危言鯁論烈如秋霜尹開封權貴斂迹㩴樞莞為名執政人以其笑比黃河清童稚婦女亦知其名京師語曰關節不到有閻羅包老卒諡孝肅有奏議十五卷胥致堯合肥人少力學為文辭初為三班借職官至左班殿直歐陽修志其墓子流以才能稱焦蹈無為人四首鄉薦元豐中因禮部貢院火别試蹈為第一時有詩云不因南省火安得狀元焦張肅舒城人以直諒稱仕為廣東轉運判官後為江東提點刑獄自司馬光而下七十有四人分韻作詩以贈其行皆一時名流官終都官其後三世登第鍾離瑾合肥人舉進士知德化縣將嫁女市婢得前令女遂與已女同嫁夜夢緑衣丈夫拜謝且曰請命於帝奉十任有土官後厯十郡太守終江淮發運使子孫衣冠不絶楊傑無為人舉進士元豐中官太常者數任一時禮樂之事皆預討論元祐中為禮部員外郎自號無為子所著有文集二十餘卷樂記五卷阮美成舒城人元豐中進士知巢縣為政豈弟喜吟詠時號阮絶句賈易無為人元祐進士為侍御史上書言天下大勢可畏者五一上下相䝉二政事苟且三經費不充四人材廢闕五刑法失中官至吏部侍郎以待制知鄧州王之道無為人剛直尚風節宣和間舉進士與兄之義之深同科名其堂曰三桂有桐山文集嘗夢帝命之曰以爾有功當録其後子十人仕者九人瀟至户部侍郎王綰合肥人紹興初為淮西路提點刑獄有平反之譽陳相合肥人紹興末為吏部侍郎有賢能之譽王蘭之道子乾道中進士纍官至參知政事樞密使李宗嘗曰磊磊落落惟卿一人光宗時嘗應詔上疏願先定聖志條列八事以聞蘭盡言無隱然嫉惡太甚以故同列多忌之所著有奏議束元嚞合肥人調通城簿毀淫祀正風俗攝縣令以政最聞後知秦州值嵗饑賑濟有法全活甚衆纍官樞密都承㫖引老歸年九十猶課諸孫讀書至夜分不倦汪立信六安人舉進士纍官端明殿學士㳂江招討大使咸淳間襄陽陷立信移書抵賈似道請用三策不從後過淮似道出師遇之撫其背哭曰悔不用公言至此元將巴延聞其名欲迎取之立信撫案大哭曰吾幸得在趙家地上死竟扼吭而卒巴延曰宋有是人求其家厚恤之曰忠臣之家也子麟為內寫機宜文字在建康不肯降元卒走閩以死密佑廬州人宋末為江西都統率衆與元帥逆戰於進賢坪矢下如雨面被矢拔之復戰身被四矢三鎗遂為所執不屈而死元羊仁廬江人有母及兄弟因兵南下皆為人所掠仁時年七嵗賣汴人李子安家為奴力作二十餘年子安憐之遣歸踪蹟母及兄弟所在仁至其鄉求貸親故厯遍諸家贖之六年乃得二十餘口復聚孝友甚篤大德中旌其家葛聞孫合肥人舉進士為翰林編修有文名朱可與舒城人通書經隱居教授文行兼備況逵廬江人少讀書有用世志泰定未為光澤令下車之日冨强民素為長史信從畏憚者悉不聽入謁獨延見諸生與講學建雲巖書院後為高安令平反寃獄有去思碑余闕合肥人天資英邁博學能文至順中進士為泗州同知擢翰林應奉纍官至浙東亷訪司僉事至正壬辰權淮南宣慰副使分守安慶以孤軍血戰死節事聞贈淮南行省平章政事諡文忠本朝諡忠宣命有司立祠祀之所著有青陽集本朝俞通海巢縣人洪武初從征有功纍升中書平章政事為人性沈機簡重出言合宜勞不矜能和不踰節故其征伐所向成功出鎮廬州卒追封虢國公張德勝合肥人才略豪邁沈毅剛果洪武初領兵歸附平荆楚定江浙纍立戰功授總管復命攻南臺鎮江宣州俱下之進樞密僉院攻陳友諒於采石斬獲甚衆沒於陳追封蔡國公諡忠毅廖永安巢縣人元季起義兵保巢湖後以兵來歸從征渡江纍官同知樞密院事領兵與僞吳戰於太湖水淺舟膠遂陷於吳卒追封楚國公諡武敏朱亮祖六安人元末為義兵元帥被天兵戰敗擒詰之對曰生則盡力死則死耳乃壯其言而釋之纍從征伐以功封永嘉侯周顯合肥人精悍有膽氣驍勇過人初充帶刀先鋒升帳前都先鋒又以奇功升驍騎左衛指揮洪武中從副將軍李文忠進兵阿魯渾河與敵戰沒迎柩賜葬徐明合肥人國初為百户陳友諒攻洪都之新城門從指揮薛顯開門突戰被執死男之明有膽略善修飾軍中號為胎裏謊追封合肥縣陳清巢縣人性勇悍善戰元季兵起率衆來歸纍立戰功升都督僉事卒追封合浦侯諡崇武金朝興巢縣人元季兵起集衆保鄉里尋以兵來歸以功纍升都督僉事西平羌戎屢著勳績封宣德侯征雲南卒於㑹州追封沂國公諡武毅楊璟合肥人儒家子讀書不事章句元季聚衆保鄉里率衆來歸授管軍萬戶以從征纍功官至平章政事封營陽侯卒追封芮國公諡武信瞿通合肥人元末江淮兵起通善長鎗號長鎗千户後來歸積功至鳯陽指揮使以大都督府僉事致仕卒贈右都督子能嗣陳文合肥人早喪父奉母至孝元季挈家來歸纍官都督僉事南收吳越北定中原東征西討所向克捷卒追封東海侯諡孝勇桑世傑無為州人自少慷慨有大志元末率舟師來歸為樞密院判官攻張士誠元帥欒瑞於石碑世傑奮戈誓必克其城躍馬陷陳遂死之追封永義侯王圭合肥人慷慨有大志少為淮西亷訪司𨽻卒見官長儀衛尊崇輒慨然嘆曰將相無種在人為耳元末兵亂募集鄉民守廬州自稱萬户尋來歸從征渡江克復太平仍命為萬户守之積功升右軍都督僉事韋權合肥人少好騎射喜兵法元季從軍淮西為列校復來歸從克太平纍功升都督僉事吳復合肥人有勇略洪武初以戰功纍升都督僉事進封安陸侯卒追封黔國公諡威毅孫世巢縣人少有勇力屢立戰功洪武初為中軍都督府僉事卒贈都督同知追封雷春侯諡忠勇郭奎巢縣人少穎敏元季從余闕學博學能文尤工於詩所著有望雲藁朱文無為州人洪武初開國功臣守太倉後升後軍都督府都督徐忠合肥人父用洪武初任河南衛千戶忠少精武藝從征有功厯升都督僉事洪武末復以功進封永康侯郭亮合肥人洪武中克效勤勞厯轉武職後封成安侯王英合肥人洪武中纍立戰功升後軍都督僉事永樂初命掌陕西都司事安靜不擾勤於訓練卒賜葬祭陳瑄合肥人父聞洪武初任指揮同知瑄以䕃纍功厯升右都督進封平江伯卒贈平江侯諡恭襄為人爽英毅喜閲載籍尤精騎射嘗督理漕運築管家湖髙郵湖隄開白塔河通大江自淮至臨清建閘四十七所舟楫利之薛祥無為州人洪武初為京畿都漕使遷工部尚書出為布政復為工部尚書鄭亨合肥人洪武中厯任武職以功封武安侯出鎮山西邉冦遁迹孫鎮合肥人洪武中以才能授户部度支主事克盡厥職後升知河南衛輝府有政聲寧仲英合肥人纍以軍功升前軍都督僉事卒子福嗣以功封建平伯李讓舒城人為駙馬都尉封冨陽侯卒追封景國公諡恭敏張禮巢縣人初為遵化千户從平內難纍升山西都指揮同知命署中都留守在任十有六年軍律嚴明人皆畏服錢敏舒城人幼喪父家貧力學事母至孝及中進士乞還鄉侍母患瘡侍湯藥未嘗離側母沒廬墓三年事聞詔旌表之先處良六安人洪武初以謹慎才幹聞於朝廷每加奬諭歷官辰州府通判後升平陽知府卒於官賜以葬祭蔚綬合肥人秉心淳實履行端方洪武中擢户部主事尋遷員外郎克著能聲舉升山西右參議永樂初召拜禮部侍郎益勵恭勤洪熙初進升夲部尚書宣德中致仕卒遣官諭祭為營葬事巫凱合肥人洪武中襲父懿百户才能著稱洪熙中以功升都督同知掛征虜前將軍印鎮守遼東邉方安靖陳懷合肥人嫻習兵法永樂宣德中以軍功纍升左都督正統中進封平鄉伯率兵征勦邊冦沒於陳追封侯爵諡忠毅邢寬無為州人永樂甲辰進士第一授翰林修撰升侍講遷南京翰林院侍講學士湯鼎無為州人居祖母喪三年未嘗見齒宣德間舉進士授吏科給事中時交趾叛纍擾疆上命鼎往撫之鼎至敷宣聖德指陳利害夷人懾服乃歸侵地奉貢表謝凡私餽金幣一無所受中外重之畿志李春無為州人正統間進士任兵科給事中有直聲擢福建參議有汀盜親抵巢穴諭降之升江西左參政時洞酋作亂亦諭使馴服厯在三籓著績畿志髙興合肥人性至孝父殁哀毁骨立廬墓三年歸有白鵲數百隨集於宅良久方去人以為孝感事聞旌表畿志潘􅍬六安州人登天順庚辰進士授御史直節為流輩所推按廣東振揚風紀兩劾柄兵者之不律時論壯之所著有缶鳴集藏於家畿志秦民悅舒城人天順間登進士擢知廣平府公平亷威吏畏民懷立祠祀之官至兵部尚書畿志薛逺無為州人進士授主事成化間王師討兩廣蠻獠逺督兵餉賊平擢左侍郎進尚書卒南畿志張淳合肥人舉進士厯官知吉安府以清節惠政著聞士民思之不置終都御史畿志沈廬州人舉進士知萊陽縣時縣治皆為賊殘毁居民流竄者過大丰俊露居視事以撫流亡不朞年居民安堵如故擢御史按山西湖廣去奸黜慝時咸服之畿志曹琥巢縣人任户部主事時言官有獲罪者琥疏請擴天恩榮忠直以全治體出為雲南尋甸軍民府通判遷鞏昌知府卒嘉靖改元臺臣白其忠賜贈光祿寺卿仍諭祭焉畿志列女崔氏宋合肥人包拯子繶妻繶為潭州通判卒拯意崔不能守使左右嘗其心崔蓬垢涕泣見拯曰妾生為包婦死為包鬼誓無他也母吕欲誘崔嫁其族人崔曰倘以不義見逼必絶於尺組之下卒不嫁張氏女元廬江人嫁為髙垕妻母病目喪明張氏歸省抱母泣以舌䑛之目忽能視州縣以狀聞褒美之方氏合肥人陳順妻夫蚤卒方抱節自守終其身事聞旌表畿志何氏舒城人孔詢妻詢卒何理詬髮為繩繫臂以見志或奪之厲聲曰必斷吾臂甘貧誓死後以疾終畿志周氏無為州人倪景四妻景四蚤喪周矢志自守事聞旌異之畿志盧聰妻朱氏霍山人夫死妯娌多誘之嫁朱誓死不二事聞旌表南畿志趙氏巢縣人葉榮妻夫亡守節有司上其事詔旌表之畿志周氏六安州人趙軏妻正德壬申為賊所掠紿還至家攜子女赴水死南畿志王氏合肥人正德辛未賊衆至王恐辱抱子女赴塘水死嵗癸巳御史聞人詮大書王烈婦家四字於其門南畿志失名女六安州人為賊所掠欲犯之以帕䝉其頭復被以錦衣女輒褫碎之强擁上馬復投地大罵遂遇害賊嘆曰真烈女畿志仙釋左慈廬江人於天柱山中精思學道得石室中丹經尤明六甲能使鬼神坐致行厨變化萬端曹操召見閉一室斷穀朞年出之顔色如故操嘗宴賔曰所少者松江鱸耳慈令銅盤貯水以竿釣之即得鱸操曰恨無蜀薑慈曰易得操恐近取即曰前使買錦可報增二十段慈曰諾須臾袖中出薑後買錦者回果云是日得報增錦操出近郊慈攜酒一升脯一斤百官皆醉飽操惡其怪欲殺之忽不知所在終不能害慧滿唐貞觀間於大蜀山誦經二十餘年忽有白衣造門曰我東海王之少子聞師誦經故此聽受時苦旱慧滿令其降雨答曰水旱上帝司之若盜布天澤罪當殛死慧滿曰汝捨身救民我誦經救汝白衣唯而去須臾膏澤隨至白衣死於山慧滿收而葬之民為立祠三刀禪師唐末居廬江顯寧院黃巢之亂為賊所執砍之三刀無血世號三刀禪師義了合肥人姓鍾離嘗為進士去從浮屠學名所著為昨夢齊吳正仲為之作詩云不受塵網纒祝髮趨幽屏回視真夢事超然得深省寂然涵虛空夢覺等前境崔自然巢縣人少好道服松脂法後隱於城南洞中辟穀修煉冬雪寒嘗於溪中澡浴海入山虎豹見之皆馴服一日謂其徒曰我為仙官所召語訖而逝有人自豫章來者見之於道今石牀藥鼎見存畿志安慶府東至廬州府無為州界三百七十里西至湖廣黃州府黃梅縣界二百一十里南至池州府東流縣界五里北至廬州府舒城縣界二百一十里自府治至南京七百四十五里至京師四千一百八十五里糧一十三萬一千八百石零建置沿革禹貢揚州之域天文斗分野春秋時為皖國亦為舒桐二國地戰國時屬楚秦屬九江郡漢屬廬江郡三國初屬魏後屬吳為重鎮東晉始以廬江分置晉熙郡宋齊因之梁置豫州後改晉州北齊改江州陳復為晉州隋初改熙州大業初改同安郡治懷寧唐初為東安州尋改舒州屬淮南道天寶初復為同安郡至德初改盛唐郡乾元初復為舒州五代時初屬楊吳後屬南唐宋初仍為舒州政和間置德慶軍紹興中改安慶軍慶元初升為安慶府元改為安慶路屬河南行省本朝初改寧江府後復為安慶府直隸京師領縣六懷寧縣附郭本漢廬江郡皖縣地三國吳為皖城東晉始置懷寧縣隋熙州唐舒州皆治此宋元仍舊夲朝因之編户四十二里桐城縣在府城東北一百五十里夲春秋時楚之附庸桐國漢置樅陽縣屬廬江郡東漢省梁改置樅陽郡隋初改為縣後復改為同安縣唐至德