南唐髙安令築羅城濬溝洫於縣治創虛窗疊閣邃廡深庭宋蘇轍元豐中謫監筠州酒稅所居東軒有記云晝則坐市區爭尋尺以自效暮歸筋力疲廢旦復營職不能少安蕭服知髙安縣尉獲凶盜獄已具服審其辭疑之且視其刀室不與刃合頃之果得真盜囚乃平民得釋李懷道元豐中知上髙縣謀建學執經而至者數十百人其為政不苛而民肅柳子儀元祐中知筠州時江西之俗多訟惟筠獨不嚚於訟故筠州太守號為守江西道院子儀至乃新燕居之堂榜曰江西道院以鼓舞其國風百姓恱馬崔鶠筠州推官時日蝕詔求直言鶠上書極論章惇奸邪徽宗覽而善之李公彥大觀中知上髙縣誠心愛民凡嵗旱禱雨輒應禾必大熟民刻其事於巖石程全筠州都監金人犯江西守臣遁全攝州事有盜祝生者劫掠至郡全領兵拒之兵少力罷遂敗賊生得之刳其腹而去雷孚紹興中攝上髙縣事居官清白好德尚義時出雙頭蓮作詩紀其瑞馮椅紹興中攝上髙令聽訟斷獄以教化為先風俗為之一變至今言賢尹必稱之楊萬里淳熙中知筠州視民如子刑清訟簡正奉外一無所取周堯卿知髙安縣有善政居官祿雖薄必以周宗族朋友罄而後已徐應龍知髙安縣寬而不縱明而不苛正經界之籍新狴犴之規後人深賴之呂祖儉謫死髙安應龍為經紀其喪黃輔之乾道中知上髙縣適旱閲視民田凡災甚者悉蠲之且曰寧得罪州郡毋得罪吾民抗章自劾朝廷從其請劉清之髙安縣丞時江右大侵郡檄視旱徒步阡陌親與民接凡所蠲除具得其實又請均境內地為八俾有粟者賑其鄉民甚賴之黃伯固嘉定中知上髙縣抑强扶弱姦豪屏迹詭寄隱匿搜抉無遺去之日有餘鏹二千緡悉留縣庫陳有聲嘉定中為上髙尉時嵗豐訟簡吏民安之前此邑士罕尋聲律有聲選賦體百餘篇詳加批點俾知作賦之法上髙詞賦遂甲三邑曽塤瑞州録事參軍以郡命賑恤饑民值元兵至被擒誘之以利不從且詈之遂死贈秩官其一子趙汝笈嘉定末知上髙縣清嚴明恕治狀為諸邑最除教練之害重彈壓之權以戢寨卒之橫陳登淳祐間知新昌縣秉燭聽政鎮之以靜撫之以寬有豈弟之意由是政平訟理民懷其德立祠祀之董楷咸淳中知瑞州政暇刋周易解韓文易簡方元張圭知髙安縣理政清明斷獄無滯勸富室出粟以活飢民邑人立祠祀之本朝沈秩洪武中髙安知縣操行清慎撫循有方獄無寃滯何晏洪武中髙安典史持身亷謹案牘精通撫字有方民多德之後擢監察御史魏希哲洪武末知上髙縣以老成廉明為吏民所服尤能燭奸有殺人謀財者悉捕之豪猾屏迹唐嶽永樂初知瑞州府政尚簡靜民皆樂業郡人德之省志陳道曽宣德末由進士教授瑞州府學持已以正教人有方雖隆寒酷暑不爐不扇有古人風至今士林雅重之省志陳璣正統初知髙安縣長才暗修應酬如響先是邑之逺民不附璣至示以恩信弗率者繩之以法境內翕然士論歸之省志夏昶正統中知瑞州府事刑清獄簡政有餘閒尋升大理寺少卿省志吳繹天順間同知瑞州府事端重簡潔為政不茍凡便民者身任之涖學教諸生忘倦纍官浙江布政使省志劉羽成化初由舉人同知瑞州府事恬淡寡欲為政知所務常俸外秋毫不染終年食蔬素瑞人呼為青菜劉省志諸觀成化間瑞州知府威加暴橫惠及小民常自誓曰貪墨之吏猶不廉之女一有點汚何以見人時有訟者暮夜餽金卒置之法省志顧純成化間知髙安縣政在恤民不事苛刻嵗飢純力請蠲租多方賑貸民賴以全活省志龔伯寧成化間知新昌縣植弱鋤强勤民平政正疆界興水利邑人被其澤省志袁珤正德初任髙安縣主簿善騎射時建昌徐賊聚亂凶焰甚熾珤承檄統兵分勦以衆寡不敵死于陳事聞贈知縣從祀節愍祠省志流寓滕元發東陽人仕宋纍官翰林侍讀學士屢言新法之害後貶居筠州或以為復有後命元發談笑自若曰天知吾直上知吾忠吾何憂哉因上章自訟曰樂羊無功謗書滿篋即墨何罪毁言日聞神宗悟即以知湖州蘇轍眉州人仕宋為翰林學士以上疏忤㫖落職知汝州居數月再責知袁州未至降少府監筠州居住呂祖儉夷簡五世孫仕宋纍官太府丞韓托胄諷言者論罷趙汝愚祖儉上封事坐朋比罔上安置韶州後遇赦移髙安祖儉在謫所讀書窮理賣藥自給出必草履徒步為踰嶺之備從弟祖泰徒步往省居月餘語其友曰自吾兄之貶諸人箝口我必以言報國遂上書言事謫欽州人物晉黃輔建城人有髙行事親以孝聞州郡舉孝廉穆帝時仕至御史清直有節操以晉政不綱權臣擅命遂隱遁焉子仁覽仕至青州從事唐應智頊建城人性剛毅遭難不懼隋末蕭銑林士𢎞攻掠江南智頊召義兵保靖一方唐興李大亮宣慰江南智頊歸之因表置靖州命為刺史功德及民民愛之如父母幸南容髙安人貞元中舉進士纍遷國子祭酒後有神異百姓呼為龍王立廟祀之鄧璠髙安人元和中權知袁州興崇學校有古循吏風詔令再任宋練髙安人為長沙掾四世同居以孝行聞咸通中觀察使裴休上其行義詔旌表其門賜束帛同邑又有鄧文瑞者四世同居五百餘口亦旌表其門鍾傳髙安人仕至南平節度使廣明後州縣不鄉貢惟傳嵗薦士行鄉飲酒傳少射獵醉遇虎與鬭虎摶其肩而傳亦持虎㑹人斬虎然後免既貴悔之乃畫圖以戒諸子任濤髙安人纍舉不第而工於詩李隲廉察江西特免郡役濤詩清婉人多傳誦有援例訟者隲判曰為詩及濤者即與免役蔡劔新昌人以平黃巢功為左散騎常侍江南西道節度副使鍾傳割據洪州求婚於劒劔曰吾家世為唐忠臣肯以女事賊乎歐陽持髙安人天復中進士為太學博士昭宗遷洛持察朱全忠有異志遁歸西山楊行密奏除左拾遺未幾復歸五代沈彬髙安人讀書能詩屬亂離隱雲陽山楊吳辟致之授校書郎以尚書郎致仕南唐時絶不求進李璟甚見優禮彬嘗手植一樹命諸子曰吾死葬此及彬卒發之得石槨一因就葬焉子憐性至孝父死廬墓感慈烏集廬之異易延慶上髙人父贇南唐雄州刺史延慶涉獵經史仕周世宗以大理丞出知臨清縣宋開寶間父喪棄官廬墓産紫芝玉芝州將表其事延慶懇辭母歿復廬墓母平生嗜栗樹二栗樹於墓側二樹連理子綸大中祥符初進士宋蔡用之新昌人天禧初進士嘗獻萬言書及碑贊論誄序雜文百萬言真宗覽之驚喜出其文以示諸學士七世孫汝揆時號愚泉先生所著有希賢録貫道集友議雜書劉渙筠州髙安人志尚髙潔精詳史學天聖中進士仕為潁上令以剛直不能事上官棄去家於廬山歐陽修髙其節作廬山髙詩以美之渙居廬山三十餘年環堵蕭然饘粥以為食自號西澗居士劉恕渙子讀書過目成誦未冠舉進士歷官至祕書丞博學强記篤好史學司馬光修資治通鑑奏請同編修王安石與有舊欲引置三司條例恕不肯附新法固辭且言其失卒年四十七所著有十國紀年通鑑外紀等書劉羲仲恕子長於史學平居厲節操有祖父遺風後以蔡京薦召為修史檢討至京師時宰以下並不造謁忤京不復仕卒於廬山所著有太初厯弟和仲有超軼材作詩清奧刻厲欲自成家為文慕石介有俠氣亦蚤死龔端新昌人元符初進士歷官自建昌户曹以至立朝未嘗隨世俯仰欽宗時極論時事危言讜論欽宗謂其凜凜有直臣節後奉使河東路聞二帝北狩憤惋而卒雷孝友新昌人乾道中以詞賦魁南省開禧末為御史中丞嘉定中除知樞密院事兼參知政事卒贈太師幸元龍髙安人嘉泰初進士通判郢州上書雪濟邸之寃攻時相史彌逺之惡言甚痛切亦與彌逺書救魏了翁真德秀洪咨夔胡夢昱竟忤彌逺遭劾屏廢而卒所著有松垣集陳仲微髙安人嘉熙初進士調莆田尉歷官海鹽丞知崇陽縣皆有政聲除吏部尚書兼給事中崖山兵敗走安南卒仲微涵飫六經於諸子百家靡不搜獵自號遂初有文溪集六十五卷劉應龍髙安人嘉熙中進士歷官户部侍郎廣東安撫以討賊功進封開國男入為寶章閣學士兵部尚書辭歸九峯號實齊姚勉髙安人少頴敏寶祐初以詞賦擢第廷對萬言理宗親擢第一後除正字時奸臣丁大全用事勉上封事歷詆時弊尋除校書郎兼太子舍人所著有雪坡集胡仲雲髙安人幼通經史百家入太學率諸生伏闕上書論京尹余晦不法寶祐初登進士第歷官樞密院編修執法剛正出為浙東提刑所著有六經蠡測周易見一四書管窺歷代遺論宋朝政論總百餘卷劉元髙應龍長子幼有異質一目十行既長每與姚勉胡仲雲論天下事輒慷慨激烈時號髙安三俊後登淳祐進士第歷官至御史所著有漢史意抄書史續抄貴華録三劉家集山居藁黃夢炎新昌人景定初進士官至贑縣尉少與姚勉胡仲雲劉元髙齊名號錦江四俊嘗相與詣書庫借其籍一覽而焚之各具紙默疏纎悉無遺夢炎後與姚龍起俱守義以終胡希是仲雲仲子八嵗悉誦諸經為文有西漢風元革命家居著述為人方嚴有守一介不茍取豫所著有洪範考訂大學稽疑太極圖說史傳集論及於山集陳元亮仲微從子博學尚氣節咸淳中進士為國子學録時洪燾為臨安府尹倚賈似道勢作威元亮率諸生伏闕上書歷數其奸遂被黜官至御前軍器所幹辦官弟志道著真德秀政經并文集行世元李明德上髙人讀書有志操孝行篤志至正中兵陷袁州因抄掠上髙執其父欲殺之明德泣告曰子豈不能代父乎願勿害吾父兵遂殺明德而免其父本朝胡璉髙安人直諒忠信議論英偉博學尤邃於易洪武初纍官句容教諭尋以疾歸乃杜門不出觴詠自樂鄉人咸敬之所著有易學㑹通及諸史百子手筆百餘卷王綱上髙人永樂中進士擢監察御史纍官至山西右布政使為人行止端方執法不撓所至有聲致仕卒陳鑑髙安人永樂中進士歷官監察御史有聲遷河南布政使右參議為人廉介敦厚卒于官朱益髙安人永樂末進士授刑部主事獄多平反升郎中尋卒廉靜寡欲宦游不挈妻拏卒時唯一僕侍命之曰未能報吾君親歸以忠孝二字語吾子孫省志楊潤髙安人永樂末進士授御史善持法人不敢干以私纍升四川布政司參議時重慶旱飢潤發官廩全活甚衆歷官三十年囊槖蕭然家居唯務讀書而已天順間進中憲大夫嵗給祿米五石年九十一而逝省志況文上髙人登進士擢監察御史纍官廣東布政司左參政歷官每大書平恕二字于治第故所至深得民心省志况暹上髙人由舉人歷萊陽漢川歸安教諭勑封光祿寺署正平生制行純潔文章典雅周旋禮度俱可為法閒居三十年以讀書自娛而已卒祀鄉賢祠省志賈信髙安人初為臬椽郎以廉介自守正統間辦事南京以薦授刑部主事歷工部貟外郎中升廉州知府有友自家視之者首問曰一年所入幾何信叱出之不與交一語其清正類如此省志陳政新昌人天順末進士授工部主事歷升本部侍郎有營建茂陵功屢荷優勞𢎞治初張秋河決政總理之尋卒事聞諭祭治葬如禮省志朱漢髙安人成化初進士授太常博士升南京監察御史彈劾不避纍官陜西按察司副使風裁凜然奸貪縮首至今懷之嵗時報祀省志王相新昌人成化初進士授監察御史文行重一時未幾以親老歸養二十餘年日與羅一峰遊𢎞治間起復為御史升廣東按察僉事省志黃山髙安人成化末進士授行人屢奉使不以毫髮自汚尋擢監察御史巡按浙江湔宿弊懲奸貪雖親故無所假借風采動一時升廣東按察僉事省志傅興髙安人性至孝父疾感夢百里外徒跣求醫得撫州絶嶺古井水調藥愈祖母曹氏孀居為華林賊所掠欲殺之興渡水以救賊以巨凳壓之凳忽斷賊驚異釋之事聞詔冠帶表其門省志謝麟髙安人應例監生正德初華林賊劫其家麟負母以避賊追尋益迫家人速之走麟曰母在安可棄乎既而賊劫其母麟奮力奪之母獲免麟竟死于賊省志列女陳氏女名若瑛髙安人年十三舒敬為子璉聘璉死若瑛聞之亦自經事聞表其門曰貞節游貞女名奴貞上髙人許適盧節雍未醮而節雍客死奴貞紡績自守父母欲其改適不從鄉閭重之時以米帛贈焉呼之為姑年七十餘而卒詔旌表之省志蕭氏髙安張榮一妻年二十七孀居誓不他適正德初為華林賊所執且罵曰我誓不為賊狗辱乃斬之數斷事聞旌表其門省志熊烈女名貴貞髙安熊竒雅之女年十八為華林賊所執女投河以死事聞受旌異時同死節于華林猖獗之時而後被旌表者比比姑記其一二云省志劉節婦江氏新昌人劉習恭妻夫死江年甚少乃撫遺腹子守節終其身正德間奉詔旌表其門省志仙釋黃仁覽晉時人居郡城東北二十里從學許旌陽後得道仙去即其地為祥符觀明香真人蜀江志云李八百之妹也初修道於華林元秀峯後於峯南五龍岡設壇道成冲舉唐天寶中即其地為元陽觀趙吉髙安人狂而落魄兩目皆翳自言生一百二十七年矣宋元豐中蘇轍謫居髙安吉往見曰吾知君好道而不得要陽不降隂不升故肉多而浮面赤而瘡教轍挽水以溉百體經旬諸疾皆愈後尸解于興國軍僧惠洪新昌人字覺範俗姓彭氏禪學最深注金剛楞嚴經傍通書史能文尤工於詩與陳了翁黃山谷友善所著有甘露集林間録冷齊夜話天厨禁臠袁州府東至臨江府新喻縣界一百五十里西至湖廣長沙府醴陵縣界二百四十里南至吉安府安福縣界一百二十里北至瑞州府上髙縣界三百四十里自府治至南京二千六百三十里至京師六千七十五里糧二十三萬石零建置沿革禹貢揚州之域天文斗分野春秋屬吳戰國屬楚秦屬九江郡漢屬豫章郡地孫吳及晉兼屬安成郡隋於宜春縣置袁州因袁山為名大業初改為宜春郡唐初復置袁州屬江南道開元間屬江南西道天寶初復為宜春郡乾元初仍為袁州宋因之元改置袁州路本朝改為袁州府領縣四宜春縣附郭漢置屬豫章郡吳屬安成郡晉避鄭太后諱改為宜陽縣隋復改宜春縣為袁州治唐以後俱仍舊本朝因之編户一百二十六里分宜縣在府城東八十里本宜春縣地宋雍熙初析置分宜縣仍屬袁州以其地分自宜春故名元仍舊本朝因之編户一百八里萍鄉縣在府城西一百四十里本宜春縣地孫吳析置萍鄉縣屬安成郡以楚昭王渡江得萍實於此故名隋屬袁州元升為萍鄉州本朝仍為縣編户一百二十七里萬載縣在府城北八十里本漢建城縣地屬豫章郡吳析置陽樂縣晉改康樂縣仍屬豫章劉宋初因之後省唐初復置陽樂縣屬靖州州廢省入髙安五代時楊吳置萬載縣南唐屬筠州宋割𨽻袁州元仍舊本朝因之編户一百五里郡名宜春隋名宜陽晉名形勝秀水東奔萍川西注唐袁皓詩秀水東奔彭蠡浪萍川西注洞庭波翠疊羣峯回環千里李問仰山賦山水秀麗寰宇記江右奧區輿地紀勝風俗賦稅及時閭里無事唐韓愈袁州謝表州小地狹賦稅及時人安吏循閭里無事士大夫秀而文細民險而健宋黃庭堅云知廉恥好儉嗇宋阮閲無訟堂賦士力學而知廉恥民樂耕而好儉嗇儒風之盛甲於江西宋張九成袁州學記事簡民醇輿地志山川袁山在府城東北五里峯巒秀拔昔有髙士袁京居此故名有大袁山小袁山唐人詩袁山大小雙螺並秀水東西一帶橫坤長山在府城西南七里山自坤方來連亘甚逺因名震山在府城東一十里一名馬鞍山下有巖幽瞑深險唐彭雲隱釣于此郡守嘉其行因名其鄉曰詔君鄉巖曰詔君釣臺盧肇有震山巖記湖岡山在府城南一十五里亦名湖岡臺晉鄧表家於此山山有煉丹臺養丹池朝斗石鵰山在府城東二十里鵰多集其上雞籠山在府城東二十里以形似名書堂山有二一在府城西南三十里唐盧肇讀書於此一在萬載縣西八十里相傳晉習鑿齒因秦苻堅陷襄陽避地于此石屋山在府城西北三十餘里洞深百餘丈內有石柱石鍾石鼓小仰山在府城南三十里晉鄧表修煉於此又號鄧表峯上有泉壇石臼藥竈宋蕭昞詩萬丈青山插碧天真人煉藥石依然功成自此飛㫒去屈指如今八百年蟠龍山在府城南五十里自大路至山頂凡三十六曲上有蟠龍寺唐末南平王鍾𫝊建寺四面皆峭壁湍瀑飛瀉前有龍門閣平挹雲峯蓋勝境也王雲詩經夏地無暑未寒泉有氷仰山在府城南六十里周回數百里髙聳萬仞絶髙處可仰不可登因名山有集雲峯嵗旱人望其峯雲勢濃盛雨即至宋李冲元詩孤雲欲作人間雨流水空傳物外聲老柏倚岩髙轉瘦寒花著雨墜還生老山在府城西南六十里崇髙峻拔山巔飛瀑下注清瀝江北流入秀江石門山在府城南六十里石峭如壁中有小徑通行寶山在府城西北六十里世傳昔有肅禪師過其山遇訟者勸云欲出輪回道先回自己心訟者以此言為寶遂息訟因名木平山在府城南七十里山有妙慶瑞光慈雲三峯又有興化禪寺寺中有飼龍亭嘯月亭景物清絶不減仰山宋李冲元詩窄徑隨溪轉懸崖帶蘚斑望鳯山在府城西北七十里中有一峯逺觀似鳯故名仙臺山在分宜縣南五里羣山環抱一峯髙聳相傳昔有牧羊者登山遇兩仙對奕語曰子下界人何為來此今名其村曰下界鍾山在分宜縣東一十里裴子野宋略云永嘉元年因水有大鍾從山流出驗其銘乃秦時所造因名山有巨石臨江如峽故又名鍾山峽輿地紀勝云曽有漁人釣得一金鎖長數百尺又得一鍾如鐸狀舉之聲如霹靂山川震動漁昔亦沉于水或曰此秦驅山鐸也昌山在分宜縣西二十里舊名傷山後改今名崇山對峙下瞰秀江中有巨石橫流激湍故乂名昌山峽元歐陽𤣥詩水潄樹根龍露爪石排江岸虎交牙又顧野王輿地記晉永嘉四年羅子魯於山峽堰為陂灌田四百頃銀山有二一在分宜縣南二十里山巔多白石一在萬載縣西十五里山有巨石石下有洞避冦者多居之清風山在分宜縣南三十里有寶應觀西晉時黃仙姑嘗修煉于此有煉丹池光子山在分宜縣西四十里晉李琳字光子封喻川侯卒葬于此因名毛仙山在萍鄉縣東五里昔有人過此山逢一人遍體有毛言詞異常後不復見宋朱熹嘗問驛吏云狐魅所為遂題詩云人言毛女住青冥散髮吹簫夜夜聲却有郵童解端的向儂說是野狐精石姥山在萍鄉縣西五十里有石屹立如姥瞻望宋周兊詩石貌蒼顔迥不殊天工偶爾賦形軀頑然本是無情物應誤行人指望夫九嶷山在萍鄉縣東七十里連帶九峯因名晉時三真人得道之所山側有二山秀拔若雙鶴飛舞狀名曰仙鶴嶺楊岐山在萍鄉縣北七十里世傳為楊朱泣岐之所山下傍有玉女殿內有九石房相映如屏風世傳為仙人所居楚山在萍鄉縣北九十里相傳昔楚昭王經此山頂有昭王臺遺跡下有昭王祠武功山在萍鄉縣東一百二十里宋紹興間洞冦猖獗路分趙扆領兵勦捕于此因名武功餘見吉安府羅霄山與武功山相連下有石潭嵗旱以木長三四丈者投水中即雨木浮出雨即止金雞山在萬載縣北有巨石在山下遇夜金雞現故名龍山在萬載縣後以龍江經其下因名白塔山在萬載縣東南三里舊有明真院及白將軍墓紫蓋山在萬載縣西北一十五里舊名雲蓋相傳仙人謝仲初嘗游此有紫雲上覆因名湯周山在萬載縣西三十里相傳晉安帝時有湯周二仙修道于此上有觀觀後有棊盤石試劍石峯頂山在萬載縣西南三十五里相傳為馬祖修道之所山頂舊有上中下三塔今唯中塔存焉有泉清冽嵗旱禱雨輒應清泉山在萬載縣東北四十五里絶頂有瀑布泉飛下甚清冽謝山在萬載縣北七十里山因劉宋康樂公謝靈運得名或云謝仲初修真之所上有仙壇丹井試劔石及履跡存焉聳翠峯在府城西三十里峭壁孤峙平原之上唐盧肇詩巍巍直上插青天逺疑似與天相連登臨下視羣山小千里平鋪在目前羊角峯在府城東一十里雙聳如羊角玉女峯在萍鄉縣東六十里一名玉女堆輿地志天將雨有五色雲氣湧出石間謂之玉女披衣相傳昔有一女子修道於此因名宋洪炎詩曽折山花獻阿魔茫茫仙意果如何千年舊迹今蕪沒惟有長松掛蔦蘿神岡嶺在府治南嶺髙數丈凡祀仰山皆由此故名大軍嶺在府城西北九十里舊傳隋煬帝時戰場故名山下有水漿湖仰嶺在分宜縣南六十里嶺極髙峻登之可逺瞰吉安城相傳唐時有尚雅祖師騎虎抵此山因建寺焉聖岡嶺在萍鄉縣東五十里衆山迤邐望之蒼翠晉甘卓嘗築壘其上又有聖岡廟即甘卓廟也馬跡嶺在萍鄉縣南七十里平夷修逺晉甘卓經此石上有馬跡仙女嶺在府城西三十五里地名清歷宋孝宗成恭夏皇后家於此化成巖在府城西北五里下瞰秀江唐長史李德裕嘗寓此後人因立祠絶頂有塔宋郡守王古所立又有軒曰倚巖翠靄有亭曰振鷺容安仰髙覽勝潄石嵌空皆在巖上宋李若水詩翠石黏雲濕寒巖帶蘚深樹函懷古意水印讀書心仙遊巖在萬載縣西一十五里有石鍾扣之清越又有石如道士狀居人稱為仙人石龍成巖在萬載縣西九十里巖深九房有石如列仙者以萬數有石鍾扣之有聲有石硯巖溜注之墨橫硯上筆在硯傍皆石也萬勝岡在府城東五里世傳楊吳柴再用敗劉景崇于此因名鈐岡在分宜縣南三里山勢特出登之則舉一邑皆在目前上有仰山行祠祠側有泉民有病者求飲即愈唐張景修詩江抱羅村蟠玉帶地開石井湧銀濤牛欄峽在府城東二十里左有金雞山右有銀瓶山相對若欄玉溪洞在府城東洞中有種花處名曰錦繡谷石乳洞在府城東三十里深一里許滴乳堅凝成觀音羅漢像人或游宴其中肴核狼籍經宿如掃宋教授鄭王賔記其事鐫于石洪陽洞在分宜縣西一十五里相傳葛洪及婁陽所居洞中深邃嘗有人至其邃處聞昌山渡篙聲胡徽詩天窗通月影地穴透江津靈仙洞在分宜縣北三十里洞中有丹爐又有一石如磨或以為爐之蓋云桃源洞在分宜縣北一百二十里石室虛曠有石鍾石磬扣之有聲直北一里天窗虛明傍有池四時泓澄石龍夭矯其上雲峯洞在萬載縣西九十里洞內有澗水産石燕里人祈雨嘗窮其源以辰巳時入出則日西矣盧石在東湖上相傳為唐狀元盧肇家石竒秀可愛宋祖無擇徙置湖上無擇詩云選置東湖最佳處四面澄波映天碧倚空突兀無與鄰頓覺亭臺增氣色響石在府城南三里獅子嶺後聲傳響答故名望夫石在分宜縣西一十里相傳唐有太守鄭望夫於此修堰溉田後人思之因名其石或云有婦人于此望夫不至化為石謝仙石在萬載縣西四十里一名麻鞋石上有鞋痕相傳以為謝仙遺跡秀江在府城北門外源發羅霄山流經府城西十五里為稠江至此為秀江下經分宜縣入臨江府境合章江龍江在萬載縣北五里源出縣西一百二十里為金鍾湖下流入瑞州府境東湖在府城東宋祖無擇嘗於湖上建亭榭為游觀之所張栻書扁李覯詩萬象城東雅入詩半湖雲靄卷殘暉老龍惜雨慵離蟄幽鳥依人慣不飛岸僻自宜安釣石水清誰擬濯塵衣使君公退便游此却恐吾皇急詔歸落星湖在分宜縣西五里舊有小祠在湖之側嵗旱禱焉相傳唐白氏居此一夕見巨星流于屋遂成湖宜春水在府城西四里又有靈泉其水甘美堪作酒晉道地記云縣有美酒隨嵗舉上貢九曲水在府城南五里其流瀠洄二十里仰山水在府城南六十里源發仰山側下流入秀江夢水在府城東八十里舊傳鍾儀欲於此村置縣夜乞夢果符所祝及寤因名其水泉江水在萍鄉縣東三十里有泉出江中故名水産絲花菜