房琯德銘於石栁宗元書其碑隂疏泉亭在府治內宋天禧間袁延慶倅是州民罹火災延慶疏李渠以備火民甚便之因名疏泉且築亭于上自為之記徐仙亭在萍鄉縣西三里世傳有徐仙人修道于此宋紹興間縣丞卓津建亭壁間題詠甚多去思亭在府治東嘉靖初郡守羅輅有惠政移贑郡民思之故建都御史劉琬為之記省志宜春臺在府城內東南隅髙五十丈郡人登覽之地宋建炎中郡守即此立祠以奉仰山之神李覯詩謫官誰住小蓬萊唯有宜春有古臺千里待看毫末去萬家攢作畫圖來鳯凰臺在府城內枕城為臺樓觀突兀松竹交翠上有鳯臺觀讀書臺在分宜縣北二十里臺西有車書巷後有石倉前有洗硯池相傳唐羅隱嘗讀書于此鍾山側又有盧肇讀書臺鄧廷聞詩鍾山髙髙鍾水緑昔有佳人在幽谷臺荒只見草萋萋萬卷不留誰更讀黃真人臺在分宜縣南五十里臺有巨石夷坦相傳晉時有黃大古者修煉於此關梁畫舫橋在府城外跨秀江元至正間建本朝洪武初重修湛郎橋在府城東十里舊名赤板唐貞觀初宜春人彭伉登第其妻與郡吏湛賁之妻姊妹也妻族賀伉坐上皆名士獨飯賁於後閣賁自是力學一舉擢上第伉方過此橋聞之失聲墜驢故袁人謔曰湛郎及第彭伉落驢又名落驢橋化龍橋在分宜縣治東宋淳祐間建尚書章穎書額謝恩橋在分宜縣西七里宋承事郎夏侯績每受宸命必於橋上謝恩其後姪公錫孫士章相繼登第皆拜恩於此故名元虞集詩雨過雙虹舉風生駟馬馳淮因橋下水重見拜恩時通濟橋在分宜縣南一十五里舊名登龍榜本朝正統十四年重修改今名萍實橋在萍鄉縣治西楊吳時建以楚昭王渡江得萍實為名本朝洪武初重建宗濓橋在萍鄉縣東五十里宋周濓溪建後人慕之因名妙濟橋在萍鄉縣東五十里宋建南浦橋在萬載縣治南元大德間建三橋俱本朝洪武初重修錦江橋在萬載縣北三十里元邑人敖玉溪建歐陽𤣥為記香水渡在萍鄉縣西北七十里醴陵縣界相傳即楚昭王渡江獲萍實處寺觀崇勝寺在府治北唐建內有竹尊者軒及白蓮菴太平興國寺在仰山宋賜碑記并三塔記慈化寺在府城北一百二十里寺常聚僧千人以上皆本朝重建福勝寺在分宜縣西三里吳寶鼎初建宋黃庭堅記寶積寺在萍鄉縣治南舊名星居唐建宋黃庭堅為記永昌寺在萍鄉縣治西唐建崇信寺在萬載縣治南舊名廣慧唐建以上三寺俱本朝洪武初重建崇福觀在府治東晉建靖嚴觀在府治北舊名龍興晉建洞靈觀在分宜縣南五十里晉建以上三觀俱本朝重建崇真觀在萍鄉縣東九十里晉建因易退陳耽楊惠三真人修煉于此而名唐改為通元本朝改今額廣報觀在萬載縣治西宋建元燬本朝重建祠廟楚昭王廟在萍鄉縣北七十里世傳楚昭王當吳入郢時駐於楚山之巔後人因立廟祀之然山甚陡峻上無水一夕風雨徙于山下境內行祠有五皆靈異甘卓廟在萍鄉縣東五十里晉甘卓從元帝渡江有功拜豫章太守嘗領兵萍鄉東死于王敦之難廟食于此靈應顯著本朝重建有司春秋祭祀冊岡廟在萍鄉縣南一十里晉末邑人潘徽羅藪傅康三人糾民兵捍寇及卒邑人立廟祀之宋祖無擇嘗禱雨有應本朝重建閲城君廟在分宜縣西二十五里相傳有閲城人溫姥者産龍伯有靈異閲城祠之唐大和間盧㠋常夢龍伯謂曰君將為江西縣令㠋後果宰分宜為立廟盧肇記天符廟凡三所一在萍鄉縣南二里山頂有井人疫乞井水飲即愈一在縣西三十里一在縣東七十里皆靈異仰山祠在仰山相傳昔有邑人徐璠舟行過大孤山有二蕭生云居宜春仰山遂同載而歸至浦東告别期至石橋相訪後徐至其處見二龍乃知為仰山神唐㑹昌中一夕雷雨移廟于郡南文明鄉宋賜祠額曰孚惠元重修袁人事二神至謹禱無不應本朝封大仰山之神春秋祀之又分宜縣鈐岡有行祠即神維舟處韓昌黎祠在府學右唐昌黎韓愈嘗刺袁州宋祖無擇為立祠鄭都官祠在府城北七里宋郡守祖無擇建祀唐都官郎中鄭谷祖無擇祠在府學無擇治袁有美政郡人祀之忠烈祠在府治北舊為東嶽廟嘉靖初改祠祀嶽武穆王及其將王貴報功祠在府治南舊為龍王廟嘉靖初改祠祀唐刺史李將順嵗時致祭黃太常祠在分宜縣治右正德末建祀太常子澄因其故第創祠云陵墓宜春侯墓在府城東南侯漢長沙定王子成也舊呼為定王冢習鑿齒墓在分宜縣北八十里鑿齒襄陽人仕晉為治中避秦苻堅居萬載縣卒葬于此袁璞墓在府城東北三里璞梁人墓前有石翁仲石獸湛陀墓在府城東三十里陀梁宣猛將軍鄭谷墓在府城北二十里宋陳侁詩榛蕪四尺土風雅三百篇李憲墓在分宜縣西南三十里憲唐李晟第三子為袁州刺史卒葬于此徐鉉墓在萬載縣北五十里夏協墓在府城南蟠龍山協宋孝宗后父也追封信王古蹟萍鄉古城在萍鄉縣東五十里晉元帝渡江使甘卓領兵抵此一名甘卓壘康樂城在萬載縣東二十里晉舊縣劉宋封謝靈運為康樂侯即此地北墅在府城北七里宋鄭居仁創為游觀之所中有悠然等亭葛仙壇在萍鄉縣羅霄山顛即晉葛洪修煉處壇生二竹風動如掃人謂之掃壇竹盧肇宅在宜春縣學中有洗硯池産緑毛龜昔有數龜遊池上未幾與計偕者多髙薦石室在萍鄉縣東五十里數室相連素壁如雪石鍋在萬載縣南七十里巨石中有泉天欲雨則雲氣自水中起如炊烟故名石筍在萬載縣南十五里相傳為唐鍾傳故宅宅傍有石如筍屹立因呼其地為石筍坑三絶碑在府學內叢桂堂前宋郡守祖無擇建學旴江李覯記京兆章友直篆額河南栁淇書世號三絶元修廟學碑出塵土中置于此名宦唐應智頊武德間袁州刺史時大亂之後智頊與民休息鎮以清淨民安樂之房琯天寶間宜春太守首立學宫建文宣王廟改創州治李華撰其德銘曰昔撫宜春列邦是式閻瑜廣德末袁州刺史當兵革後専務教化招集叛亡四民復業及改撫州袁民蟻從吏莫能止蕭定袁州刺史勸桑稼均賦稅集徠游口大厯初考察天下刺史治最定為第一栁渾大厯間袁州刺史酌古良牧之政宜于今者奉而行之崔倕建德初德宗求可當良二千石者以倕權為袁州刺史朞月有成詔書顯揚就加真秩韓愈元和中袁州刺史州人以男女為𨽻過期不贖則沒入之愈悉計傭得贖所沒歸之父母者七百餘人因為定禁奏推之天下遂著為令鄧璠元和中攝袁州刺史興崇學校民皆樂於從事有古循吏之風詔令再任李將順元和間袁州刺史引仰山水入城以通舟楫郡人利之目曰李渠李德裕大和間為袁州長史奬掖士類暇則吟咏自若不以遷謫介意五代韋建南唐袁州刺史清靜自處無所侵撓郡中大治既去百姓思之史公銖南唐袁州刺史亷明直幹民皆安堵時稱為文武刺史宋王懿至道間知袁州時州多火災懿疏唐李渠以備之民歌之曰李渠塞王君開四民惠利絶火災張希顔景德間知萍鄉縣時張詠問殿直范延貴曽見好官貟否延貴乃稱希顔詠問何以知之答曰昨過其境驛傳橋道皆修葺野無惰農士無賭博市易不喧夜宿邸中更鼓分明以是知其為好官貟也詠乃薦于朝祖無擇皇祐間知袁州自慶厯詔天下立學十年間徒文具無命教之實無擇首建學官置生徒郡國弦誦之風自此始盛程師孟江西轉運使盜發袁州州吏為耳目久不獲師孟械吏數輩送獄盜即成擒張補之治平間知宜春縣政尚仁愛民懷其德邑人朱景陽作詩榜于道頌之徐師閔熙寧間知袁州時江西劇賊詹遇所過屠劫袁獨有備賊不敢犯且有瑞粟嘉禾之異百姓歌之鄭民瞻紹聖間知袁州發奸摘伏如神值連嵗荒歉乃量民户口多寡及富民積榖幾何均數約直以給告糴者闔四境為一圖置之座隅而間遣人按視民賴無流亡之患陳烯紹興間知袁州慕韓愈為人於州治立景韓堂尤注意興修學校教育士類沈昭逺紹興間知袁州初民輸義倉米倉吏違法倍斂昭逺力為減其半時四邑嵗以羡餘錢米上邑不下數十萬昭逺曰此非天降地出無非虐取于民盡郤之民皆感恱王大寶知袁州進詩書易解髙宗謂執政曰大寶留意經術其書甚可采時經筵闕官遂除崇政殿說書謝諤紹興末知分宜縣縣積負於郡數十萬嵗常賦外又征緡錢三萬餘諤疏其弊於諸監司請免之曽伋紹興末知袁州悉心愛民隆興王江西皆和糴伋奏不可朝廷從之袁州得免和糴伋之惠也汪應辰通判袁州凡所豫奪人無異詞始至或以其書生易之已乃知吏師所不能及羅克開知袁州事至立斷無留滯洞冦李元勵猖獗羽檄交馳克開靖以安之民不驚擾鄭自成知袁州政先撫字賙恤困急去之日民攀轅塞途滕强恕知袁州以節用愛人為本修橋梁立儲倉無一毫過取於民潘友文淳熙間為萍鄉尉值嵗飢賑濟有方民德焉已而諭邑士鍾詠輩立社倉為經久計朱文公記之何異知萍鄉縣丞相周必大參政留正以院轄擬異孝宗問有無列薦正等以萍鄉政績對乃遷國子監主簿趙師虙淳熙間知宜春縣逋賦浩穰師虙用心撫字催科不苛遇貧病者輒收撫之過客之資皆輟已俸為之備及卒衣衾皆不能具張栻孝宗時知袁州暇日召諸生告語民以事至庭必隨事開曉具為教滌斥異端毀淫祠而崇社稷山川古先聖賢之祀弟枃亦知是州崇尚儒雅學校大興張洽嘉定間袁州司理參軍有盜點甚辭不能折㑹獄有兄弟爭財者治諭以全手足之愛辭氣懇切訟者感悟盜聞之自伏林景達知萬載縣感民以誠民不忍欺其卒也百姓甚哀悼之朱貔孫知袁州至郡宣布德義興學以勸士尤以戢暴禁貪為先務郡倉受租舊倚斛面取贏吏加漁取貔孫悉榜除之許民自槩量宿弊頓革趙䈣夫嘉定間知袁州待士恤民一出於誠理宗嘗問亷吏真德秀以䈣夫對首賜御札褒寵曹叔逺寶慶間知袁州減秋苖斛面米七千四百餘斛浚李渠興學校懲嚚訟郡稱大治葉夢鼎淳祐中知袁州轉運司和糴三萬斛夢鼎言袁山多田少朝廷免和糴已百年自今開之百姓有無窮之怨從之又毀萬載旗筒村淫祠塞其妖趙逢龍知袁州日具蔬飯坐公署事至即面决遣為政務寬恕撫諭惻怛一以天理民彛為言民是以不忍欺程公許知袁州請蠲和糴之半改命郡吏部總所綱運而厚其責免募平民民甚便之新周敦頥祠葺張栻書院聘宿儒胡安之為諸生講說潘𫝊寶慶間通判袁州攝州事聽斷精明風采振厲庭無留訟吏不敢欺其待士尤加意冷應澄寶慶間知萬載縣大修學舍招俊秀治業旌其通經飭行者以勸嵗歉棄孩滿道乃下令恣民收養全活甚衆徐瑑紹定間通判袁州值嵗歉極力賑濟全活甚衆民深德之為立生祠本朝束清洪武初知萬載縣性亷介儉以自奉民或逋租自鬻衣帶以代償其愛民如此何正永樂初知萍鄉縣值鄰境冦李法良作亂湘潭醴陵間正導袁軍討平之又築陂灌田數十頃民為歌曰冦至侯禦之民飢侯食之至今頌焉周鐸永樂中知袁州府剛毅正直亷潔有為興學校革姦弊郡人恱服姚文正統中知袁州府亷正有威吏不敢欺興利除害民皆稱便卒于官囊槖蕭然王矩景泰初知袁州府政尚寬愛訟平務簡以憂去民思慕之省志劉懋天順間袁州府知府清慎得民心以循良著稱省志陳瑶成化間知萬載縣革諸弊悉民情以興學勸農為務二年之間刑清訟簡庭無重辟升御史去歷通政轉都御史卒省志曹忠𢎞治間知分宜縣愛民興士日孜孜焉部使交薦仕至工部郎中民愛而思之省志徐澤宜春縣學教諭有文譽得士心嘗著有禦虜安邊䇿省志梁奎正德間通判袁州時姚源洞賊猖獗奎領兵勦捕奮勇力戰歿于陳士民哀之省志流寓陳瓘南劔人宋徽宗朝為右司貟外郎以書抵曽布論日録及國用事布怒罷知泰州尋除名編管袁州知浹宋汾州人知書通春秋左傳好直言嶽飛以賔客待之飛初下吏浹上書聲其寃流袁州人物漢陳重宜春人少與鄱陽雷義為友時人語曰膠漆自謂堅不如陳與雷後舉孝亷為郎有同署郎負息錢數十萬責主日至重密為代還終不言惠後與義俱拜尚書郎義黜重亦以病免復舉茂才為細陽令政有異化遷㑹稽太守彭翼宜春人獻帝時歷官建平長沙北海三郡太守封宜春侯晉施游宜春人仕為太常博士安南將軍九江太守封宜春侯唐彭雲宜春人自幼力學通隂陽圖緯隱居不求聞達𤣥宗遣使者以蒲輪召之至再始行命之官不就辭歸孫伉貞元間舉進士歷官石泉令嶽州録參以能稱盧肇宜春人自幼頴拔不羣㑹昌間中進士第一纍官集賢學士歷歙宣池吉四州刺史所至有治聲有文標集三卷子文秀咸通間登進士官至𢎞文館學士廖洪萬載人家貧養親至孝大中初二親亡捧土成塋結廬於側哀慟不絶有青蛇白獸之異咸通中縣令朱邵以聞詔加旌表袁皓宜春人博學能文章咸通間舉進士纍官吉撫二州刺史集賢殿圖書使自號碧池處士有碧池書三十卷集道林寺詩二卷鍾傳萬載人少好射獵僖宗時討王仙芝有功官至檢校太保中書令進爵潁川郡王尋徙南平王鄭谷宜春人七嵗能詩光啓間舉進士乾寧間以都官郎中退居仰山其詩清婉明白為薛能輩所稱賞時僧齊己亦以能詩名及見谷深敬服焉其詩鷓鴣詩尤工世號鄭鷓鴣有雲臺編宜陽集各三卷五代李徴古萬載人南唐進士仕為袁州刺史五季時刺宜春者二十有九皆武夫勳臣徴古獨以儒術治之雖四方雲擾而弦誦不衰宋齊丘萬載人好學善屬文仕南唐拜相乞歸九華山賜號九華先生著化書理訓各十卷宋盧絳肇族子磊落有大志上書南唐後主極陳備禦䇿纍遷沿江都部署及宋已平金陵諸郡皆下綘獨不順宋數遣使諭㫖久之乃降宋太祖問何久不降對曰臣知事李氏而已太祖義之朱彥博萍鄉人嘉祐間進士通判順州上神宗書極言當時利害歷知䖍虢解三州所至有聲嚴而不苛明而不察官吏畏之如神孫億分宜人舉進士知吉州吉民嵗市縑六萬餘匹主外計者收帑錢以供他費給鹽以償民縑億發其弊吉租嵗收四十萬斛曹臣意在聚斂戒庾吏收什二以充羡餘億拒臺命出納一用倉式同邑有孫汲者以本州倅攝吉州守事不踰月境內稱治湯夢觀萍鄉人崇寧間舉進士知循州時蠻寇劫掠傍郡不敢入其境自相戒曰切莫犯此老子朝廷聞而嘉之夏執中宜春人曽祖令吉吉水簿父協生女有異光穿室及長為孝宗后后始貴協已亡訪得執中補官纍遷奉國軍節度加至少保卒執中工大字善騎射髙宗行慶夀禮近戚爭獻珍玩執中獨大書一人有慶萬夀無疆以獻孝宗將召用之謝曰他日無纍陛下保全足矣人以此益賢之趙善堅宋宗室家於袁乾道間舉進士嘗通判婺州朱熹為常平使者深器重之時大旱奉行荒政全活甚衆後五典名藩所至以亷能稱官至户部尚書孟浩宜春人乾道間知武寧縣有聲纍遷知湖州以忤權貴罷後復起官至直祕閣為人亷介一毫不妄取豫為文章有法度所著有鼯技集彭俞分宜人精易學自號連山子紹熙間舉進士知澧陽縣雪寃甚多帥臣監司交薦之後又應詔舉官至朝散郎元彭繼凱分宜人至正間歐普祥寇陷袁城繼凱募義士迎戰大敗之適安福義士袁明東等亦引兵來㑹遂并力克復袁城乃下令禁殺掠修城池繕甲兵弔死恤孤民賴稍安遣人詣贑迎舊守寶童歸寶童嫉其功令刺客殺之城中驚擾義士潰散本朝劉仲質分宜人自幼好學博通經書洪武初舉為宜春訓導選入翰林階文林郎官至禮部尚書劉迪簡宜春人幼通經學國初徴授尚賔館副使屢陳時務進皇王大學通㫖使交址卒于南寧所著有尚賔文集黃伯竒分宜人性資純篤好禮尚義洪武間以才行老成舉授金華知府涖政嚴謹吏服其能黃子澄分宜人洪武中㑹試第一舉進士授翰林院編修纍官太常卿靖難師渡子澄倡義死守禍及三族子孫變姓名逃荆楚纍經赦宥乃復姓今已有顯榮者省志易節萬載人永樂中進士擢行人歷官郎署才能著稱纍升貴州左布政使有惠政夷人化服卒于官郭瑾萬載人永樂末進士擢刑科給事中持身端謹官至刑部右侍郎致仕蕭義宜春人成化間進士試政工部奉命往營代藩葬事集而不擾授吏部主事卒義操履端慎為時所重問學典實文詞雅暢袁士多思之所著有葵菴集省志歐陽汶分宜人以經明行修舉授開封府學訓導改永康不受士贄師範嚴整進國子學録嘗上疏論事幾得禍祭酒丘文莊公器之遷周府長史改伊府致仕家居足跡不造城府時論服其清介省志郭紳宜春人成化進士授寧海令擢御史進襄陽守纍升刑部右侍郎所在有聲平生端嚴清介待人不設城府有長者風省志張鳯宜春人成化中進士由知縣歷官雲南府知府所至以勤能著聲升廣西參政進僉都御史巡撫蘇松政有不便民者力革除之尋以副都御史致仕卒省志列女袁氏分宜人陳九淵妻元季兵亂邑萬户王同者聞袁美姿容殺其夫謀娶之袁哭曰夫為我死我當以死報夫遂自刎識者義之省志敖氏萬載人張鼎實妻元末舅姑及夫俱歿于寇敖年二十餘無子撫兄子為嗣撫訓成立洪武中旌表之省志楊節婦周氏宜春人年十九歸楊伯憲未幾伯憲以同知蔚州卒于官周護喪歸葬撫遺腹子成立年八十三卒正統初旌表其門省志蕭氏宜春人適庠士劉顒顒早卒蕭年二十五矢志守節撫二孤成立𢎞治間事聞旌表其門省志歐陽節婦鄧氏安福人父授湖廣僉憲鄧年十九歸府學生分宜歐陽鳯鳯沒無子守節自誓𢎞治間旌省志鄧氏萬載人甘希魯妻年二十適魯魯卒遺腹一子家貧苦織撫其孤人稱其有清白操省志仙釋謝仲初萬載人修煉於閣皂山得道而歸過縣西見其無水拔劔刺地湧泉甘潔過江無舟以竹葉渡之後登謝山冉冉飛去羅升宋宜春人少貧業屠狗晚乃貨藥市中遇異人授以方術年幾百忽一日辭親戚奄然而逝時政和二年也後有客見其在瀏陽市貨藥有書寄鄉人驗其日乃其沒之明日也惠寂韶州滇昌人姓葉學佛有戒行唐開成中入彬州王莽山見山神告以宜往處袁之仰山惠寂行抵仰山遂創菴以居後有僧乘空而下相講論大有所契且示以貝多葉梵書仍騰空而去江西觀察使韋宙奏請賜號普菴宋宜春人姓余住慈化寺常讀華嚴經豁然大悟作偈曰捏不成團撥不開何須南嶽與天臺六根門首無人用惹得胡僧特地來後果有異僧至與相詰難一旦遂能默識旁通知未來事法普宋仁夀人幼不茹葷精勤踐履苦行卓然居仰山四方緇流多從之宰相張商英聞于朝賜以紫方服後杖鍋雲遊久之復歸思居靜惠室有僧在其中夜夢神告曰此非汝所覺即遷别舍明日法普至而居之宣和初召住嶽麓辭不往作頌而逝德一宋宜春人九嵗出家詣仰山參簡禪師後雲遊四方禱雨輒應有云震法雷擊法鼓布慈雲兮灑甘露又云竚看長空垂雨澤直教四海盡豐登紹興末忽作頌擲筆而逝牧菴宋鄞人性專靜出家參佛眼禪師造次不忘提撕一日縱步水磨有悟撫掌成偈云轉大法輪目前包裹更問如何水推石磨後登廬阜遊衡嶽結茅棲焉四方衲子聞風而至樞密栁仲古鎮長沙以衆望起之不得已往領住持又遷南木轉黃龍叢王勃興紹興己巳方丈白光上騰索筆書偈而卒明一統志卷五十七
