body:
  text: 明一統志卷五十七明李賢等撰瑞州府東至南昌府新建縣界五十五里西至袁州府萬載縣界一百八十里南至臨江府清江縣界六十里北至南昌府奉新縣界三十五里自府治至南京一千七百里至京師四千九百六十五里糧二十二萬五千石零建置沿革禹貢揚州之域天文斗分野春秋屬吳戰國屬楚秦屬九江郡漢為豫章郡之建城縣地唐初置靖州領髙安等五縣尋改為米州又改為筠州後州廢省四縣入髙安屬洪州南唐復置筠州宋紹興間賜名髙安郡寶慶初改為瑞州屬江西道元至元中升為瑞州路本朝改為瑞州府領縣三髙安縣附郭本漢建城縣東漢時以上蔡民分徙於此析置上蔡縣孫吳又析置陽樂宜豐二縣晉改上蔡曰望蔡陽樂曰康樂隋廢三縣入建城屬洪州唐改曰髙安縣為靖州治後屬洪州宋瑞州治此元仍舊本朝因之編户三百一里上髙縣在府城西南一百里本漢豫章郡建城縣地晉為望蔡縣隋省入建城唐以故望蔡縣地置上髙鎮南唐易鎮為場尋升為上髙縣宋元仍舊本朝因之編户一百六十七里新昌縣在府城西一百二十里本漢建城縣地吳析置宜豐縣隋省入建城縣唐復置尋省入髙安南唐以宜豐舊地為鹽步鎮宋以地廣勢嶮又於宜豐故城置新昌縣元元貞初升為州本朝仍為縣編户一百二十三里郡名髙安唐名瑞陽宋名形勝負鳯山面錦水蜀江志大江之西其地僻絶宋曽鞏筠州學記郡居溪山之間宋蘇轍聖夀院記斷崖深壑宛若洞府蜀江志䝉山左峙末山右聳上髙縣志山環若城水繞如帶新昌縣志風俗不嚚於訟宋黃庭堅江西道院賦序云江西之俗其細民險而健以終訟為能惟筠州獨不嚚於訟樂鬬尊巫同上吳楚之君好勇故其民樂鬭而輕死江漢之俗尚鬼故其民尊巫而淫祀吏民朴野宋蘇轍聖祖殿記君子知務本小民勤稼穡郡志山川鳯凰山在府治後一名五龍岡相傳唐武德時應智頊作守鳯凰集於此山宋蘇轍詩山川蟠曲偶成形逍遙山在府治西北即鳯凰山餘脈上有宋所建妙真宫大愚山在府治東行春門外上有真如寺宋蘇轍詩東郊大愚山自古薝蔔林呂祖儉上書忤權臣安置瑞州寓寺中因號大愚叟小洞山在府治西北有清居寺宋蘇轍與太守毛維瞻嘗遊此探菊有詩龍化山在府城西上蔡門外舊傳東晉時有龍乘雲化去故名荷山在府城南二十五里山中有池多紅蓮故名豫章記仙人王子喬駕白象來遊此象化為石今山巔有丁王二仙壇下有棲霞觀米山在府城北二十五里豫章記此山四面流泉土地膏沃生禾香茂為米精美鈞山在府城南三十里有宋劉渙故宅山北有劉恕讀書堂遺址山巔有劉仙洞飛霞山在府城西七十里相傳吳真人煉丹之地每齊醮常有鶴數百棲息於此旬口復去多綵霞覆山上故名鳯嶺山在府城西七十里唐靖州刺史應智頊屯兵之地嶺勢峭拔逺望如鳯華林山在府城西北七十里相傳西王母第九子𤣥秀真人於此築壇以祭靈仙唐應智頊遣義軍羅武於壇西立三將軍廟至今俗號羅武廟旱禱必雨白雲山在府城西北七十里下有超果寺寺東西有澗皆有瀑布栁州教授孫伯溫有記謂之小麻姑白鶴山在府城西北七十里世傳東晉時丁仙姑騎鶴白日飛升故名有白鶴觀遺址敗伏山在府城南一百里陳武帝於此破賊伏軍故名謝山在府城西北一百里上有竒峰怪石謝仙君煉丹之地丹竈履跡猶存鏡山在上髙縣東二里其山有三端圎如鏡相對而峙中有徑可通人行說者謂為上髙縣之後照屏山在上髙縣東五里其勢連亘若屏白馬山在上髙縣北一十五里舊傳嘗有白馬齕草于山頭人至輒沒鄉人異之因名寶雲山在上髙縣南二十五里嵌巖岌嶪靄翠瓏葱中有僧廬曰寶雲院靈峯山在上髙縣南二十五里舊傳每風雨晦𡨕之夜山有赤光其大如斗號曰金雞山人以為神即其頂立靈峯廟䝉山在上髙縣南三十五里峭壁橫嶮常有白雲青靄蒙其上末山在上髙縣西六十里東連九峯唐人云韞映回合回出雲末故名宋阮閲往知袁州道經此有詩斜陽騎馬末山隈淡碧晴空鴈字回一片愁懷似黃葉晚風吹送九峯來三峯山在新昌縣西五里其脈自十五里嶺過藍田結為縣治右客山前起鹽臺山止鹽州石臺山在新昌縣南二十里宋蘇軾蘇轍嘗遊此有詩吉祥山在新昌縣北五十里一名瑞雪山唐務本禪師居此中有泉曰聰明下有吉祥院尉山在新昌縣東七十里舊傳漢梅子真為南昌尉上書言事不報遂攜妻子隱此黃岡山在新昌縣西八十里山勢磅礴聳秀為新昌諸山之祖八疊山在新昌縣西北九十里以疊嶂縱橫故名黃蘗山在新昌縣西一百里唐宣宗微時遊方至此與黃蘗僧同觀瀑布僧得一聮云千岩萬壑不辭勞逺望方知出處髙宣宗續云溪澗豈能留得住終歸大海作波濤一名鷲峯山五峯山在新昌縣西北一百里山有歸雲積翠羅漢月桂佛岩五峯宋倪思詩千岩萬壑爭獻狀秀色寒先奪人目九峯山在上髙縣西五十里其峯有九曰雲末飛雲香爐翠霞蒼玊芙蓉清流蛾眉天竺宋蔣之竒詩緣澗攀崖入翠霞寺僧猶記舊鍾家芙蓉秀出天河外我欲名為小九華多寶峯在上髙縣南三十五里宋慶元間有銀鉛發泄故名折桂峯在新昌縣東門外其峯竒古聳秀俗呼火焰山每嵗郡中多火後平其頂其災遂息琴嶺在府城南荷山之前形如琴上有仙人足跡及井龍珠嶺在府城西北四十里山下有石光圎如珠雞籠嶺在府城西南六十里以形似名髙數百仞石壁下有壇并洞嵗旱禱雨有應銅釘嶺在上髙縣西靈峯山側一名銅精嶺舊傳晉許旌陽以銅釘釘蛟於此敖嶺在上髙縣北三里又名敖峯方輿記云即晉敖真人得道之所煉丹之跡猶在上有磨劍石天嶺在上髙縣西二十里其嶺最髙行者若登天因名寶珠嶺在上髙縣南三十里世傳道明禪師自庾嶺來卓錫夜以寶珠光照十方故名謝君嶺在上髙縣西六十里髙數百仞舊傳萬載縣人謝仲初嘗尋真躡其巔蓬萊嶺在上髙縣西北七十里草木叢茂盛於他所黃鳯嶺在上髙縣西九十里俗傳昔有黃鳯集此鹽嶺在新昌縣治南髙出羣山下瞰邑市鱗鱗可數三聖嶺在新昌縣東北五十里昔雪峯欽山岩頭三禪師所居之地因名西嶺在新昌縣東北六十里望東山兀起蹲伏若拜舞狀又名拜龍山北嶺在新昌縣東北七十里峯巒萬疊中有瀑布旺賢岡在上髙縣北二里一名黃田岡舉子岡在上髙縣西六十里唐進士易重居此因名迷仙洞在府治後圃即李八百洞也閉塞不可入宋蘇轍有詩䝉山洞在上髙縣南三十里有兩洞上洞不可遊下洞可遊深不可究又有石立巖間上下無所附謂之無根石慈光洞在上髙縣西四十里緣梯而下始有門可入昔有民逃於此壁間有云唐乾符二年黃巢作亂在此逃避鄧敖洞在上髙縣西四十里舊傳鄧敖二真人於此修煉仙聖洞在上髙縣西五十里中有石佛石鍾等類䝉山洞四溪洞在上髙縣西八十里棲真院側前有一石佛洞深數里後有穴可出火石在府治北其石色黑碎之若炭金石在上髙縣蜀江中上有三丫地鈐云金石開口丞相出葫蘆石在上髙縣南一十里豐下鋭上狀若葫蘆仙人石在新昌縣北四十里上有仙人足跡蜀江源出袁州府萬載縣龍河渡流至上髙凌江合新昌滕江歷郡城而東匯于南昌之象潭而入章江世傳許遜為蜀旌陽令有竒術晉末人皆疫癘多詣遜請救遜與器水投於上流疾者飲之無不愈邑人以所投器水即蜀濯錦江之水故名蜀江亦曰錦水古語云錦水入市河朱紫蒲城多錦水市河連瑞州出狀元鍾口江在府城南三十七里源發荷山入蜀江梁時人於此獲古鍾清湖在府城東一十五里其水四時清瑩珠湖在府城南一十八里世傳丁王二仙遺珠於此藥湖在府城西南二十五里昔呂洞賔棄藥於此濯湖在新昌縣東二里世傳許旌陽嘗濯衣於此至今水清徹不受汚濁曲水在府城南六十里源發蒙山流出潦許口東入贑江其勢回環縈曲故名鳴水在府城西北六十里北流合奉新江華陽實録云碧澗飛流空谷振響絶頂有石髙數丈以物扣之其聲如鼓故名龍口水在府城西六十里一名談口水源發蛟湖北流至花園埠入蜀江華陽水在府城西南一百里源發新喻縣界流入蜀江斜口水在上髙縣西一十里源發䝉山入蜀江鹽溪水在新昌縣西一名若耶溪自分寧縣界發源入上髙東流入蜀江務農溪在府城東三十里源發新建縣界至髙安南流入蜀江章樹潭在上髙縣治西淵靜澄徹為巨鱗窟宅漁人善沒者亦不能窮其底幸龍王潭在府治西五里世傳唐幸南容為祭酒托跡汴都嘗致書於鄉人曰城北門數里有潭傍有古木即吾家也叩之必應持書者如所戒果有二童子出俄一丈夫繼之宛如汴都所見邑人異之為立廟嵗旱禱雨輒應鸕鷀洲在上髙縣羅漢石之東正當縣之水口地鈐云鸕鷀洲合狀元生仙姑洲在上髙縣西六十里相傳有仙女嘗遊於此八疊川在上髙縣境小斜川在新昌縣治西南景物幽勝有亭丹井有五一在府治後圃仙人李八百煉丹之所一在府城東南四十里許旌陽煉丹之所一在城西七十里晉丁義君女秀英煉丹之所一在城南七十里許丁王三仙煉丹之所一在上髙縣南二十五里許旌陽投丹之所聖水井在府治南蜀江觀以許旌陽咒水投此有愈疾之效故名醴泉井在府治舊三皇廟前甘潔如醴白龍井在府城東一十五里相傳昔有白龍出此靈井在上髙縣西相傳有疾者禱飲之即愈噴雪泉在府城西六十里相傳仙人呂洞賔遊憩於此以劍卓地泉水噴湧如雪武泉在上髙縣北一十里按舊治東晉敗將皇甫武以家屬投此普潤泉在上髙縣西一十五里章岡又名貫珠泉自石竇出復經行地中乳泉在新昌縣西一十里其水五色光瑩白者如乳羅漢泉在五峯山石崖飛瀑有橋上有羅漢像橫卧水際虎跑泉在新昌縣北一百二十里黃蘖寺相傳昔有虎跑地裂泉水湧出進龍池在府治東南流入蜀江世傳昔風雨晦𡨕龍進於中故名鳯池在府治南鳯凰山之傍宋時作澄碧亭于上劔池在府治後圃相傳仙人李八百淬劍於此宋有白蓮宋黃庭堅賦所謂裂劍池之菡萏以為裳者是也又新昌縣北七十里亦有劔池乃晉許旌陽磨劍之所星落池在新昌縣南三十里相傳昔有星墜于此遂成池旱不涸潦不盈洗墨池在新昌縣東二十五里晉陶淵明嘗於此洗筆硯池上又有淵明讀書堂飲馬池在府城北五十里浮雲山相傳應智頊義兵屯駐山下飲馬於此土産銀上髙縣出久無石青石碌黃丹俱上髙縣出久無茶芽紫竹小而徑直俱府境出學校瑞州府學在府治西宋紹興間建本朝重建髙安縣學在府治東宋建于郡庠講堂右本朝改建於此上髙縣學在縣治西新昌縣學在鳯凰臺下舊在縣治南俱宋建本朝重建成化末遷於此書院西澗書院在府治西鳯凰山左宋劉渙家髙安渙子恕恕子羲仲三世一節世稱三劉端平初知州張韔創書院立祠以渙號西澗因名樂善書院在府治南瑞陽門外宋郡守王淹以郡中宗姓實繁乃創書院置田以教育宗子之孤幼者文溪書院在府城南四十五里文溪上宋陳仲微建為讀書之所正德書院在上髙縣南三十里元提舉姜榮建趙孟俯書扁刻于石石溪書院在新昌縣東北四十里元提舉胡俊孚建宫室秀文樓在府學宋建取黃庭堅賦士大夫多秀而文之義本朝重修化成樓在府學洪武十六年建今貯書籍登春樓永豐樓俱在府城南賞心樓在上髙縣治南齊雲樓在上髙縣治西俱宋建凌雲閣懷仙閣俱在府治雙清閣在上髙縣治三閣俱宋建棲真堂在府治仙人李八百故居遺址蜀春堂凝香堂