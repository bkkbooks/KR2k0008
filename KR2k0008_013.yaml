body:
  text: 明一統志卷十三明李賢等撰淮安府束至海岸二百三十里西至鳯陽府虹縣界三百一十里南至揚州府寶應縣界六十里北至山東青州府營州界四百五十里自府治至南京五百里至京師三千一十里糧四十萬二千八百石零建置沿革禹貢揚州之域天文斗牛分野春秋屬吳後屬越戰國屬楚秦屬九江郡漢屬臨淮郡及廣陵國東漢屬廣陵郡及下邳國三國屬魏為臨淮廣陵二郡地晉分淮北為北徐州南為徐州又分廣陵置山陽郡僑立兖州於此劉宋失淮北乃於此立州鎮為北兖州東魏復為山陽郡隋置楚州大業初併入江都郡唐為東楚州後改楚州天寶初改淮隂郡乾元初復為楚州五代時南唐升順化軍宋仍為楚州建炎中置楚泗承州漣水軍鎮撫使尋罷紹定初於此置淮安軍端平初升為州元升為淮安路屬河南行省本朝改為淮安府直隸京師領州二縣九山陽縣附郭夲漢臨淮郡射陽縣地東漢屬廣陵郡晉末立山陽郡以境內有地曰山陽故名南齊仍為射陽縣地屬臨淮郡隋置山陽縣為楚州治宋置淮安軍縣亦改名淮安元以馬羅軍寨置山陽縣後以淮安縣省入夲朝因之編戶一百十五里鹽城縣在府城東南二百三十里本漢鹽瀆縣屬臨淮郡東漢屬廣陵郡或屬臨淮郡晉因之北齊置射陽郡陳改為鹽城縣隋屬江都郡後為韋徹所據置射州及射陽新安安樂三縣唐廢射州省三縣入鹽城縣屬楚州五代時南唐屬泰州宋屬楚州紹興初屬漣水軍元屬淮安路夲朝因之編户八十九里清河縣在府城西五十里本宋泗州清河口地紹典初屯重兵於此咸淳末始置清河軍及縣元至元中廢軍以縣屬淮安路本朝因之編戶二十里安東縣在府城東北九十里後魏為襄賁縣置東海郡東魏改曰海安隋初郡廢改為漣水縣唐置漣州貞觀初州廢以縣屬泗州宋置漣水軍尋改為縣屬楚州元祐初復為軍紹興中廢為縣沒於金歸宋屬寶應州端平初復為漣水軍景定初改安東州治漣水縣元省縣以州屬淮安路本朝改為縣編戶六十一里桃源縣在府城西北一百六十里本唐宿遷縣之桃園鎮宋屬淮陽軍後沒於金興定初始置淮濵縣屬泗州後廢元初復置桃園縣屬淮安路後訛園為源本朝因之編戶四十八里沭陽縣在府城北一百七十里本漢厚丘縣地劉宋始置僮縣屬南彭城郡梁屬僮陽郡東魏改為沭陽郡仍於郡東置懷文縣後周改縣曰沭陽隋屬海州唐總章初屬泗州後復屬海州宋南渡沒於金尋復歸宋屬海州元仍舊木朝因之改今屬編戶八十一里海州在府城北三百七十里春秋時郯子國地秦始置朐縣屬薛郡後分為郯郡漢為東海郡東漢為東海國三國魏為郯縣劉宋於此僑立青冀二州梁改東海郡為北海郡東魏改青冀二州為海州北齊徙海州治琅邪隋徙治朐山後改州為東海郡唐改為海寧州天寶初改東海郡乾元初復為海州宋屬淮東道景定初置西海州元為海州至元中升海州路未幾改海寧府後復為海寧州𨽻淮安路本朝仍為海州以朐山縣省入𨽻淮安府編戶六十里領縣一贑榆縣在州城北一百一十里本秦鬱洲地漢置東海縣屬琅邪郡東漢屬東海國魏省晉復置尋省隋復置唐初析置贑榆縣尋省入東海縣南唐置懷仁縣宋屬海州金復改為贑榆縣金亡宋以縣寓治東海軍後李璮侵海州併縣入焉元仍置縣屬海寧州夲朝因之編戶五十六里邳州在府城西北四百五十里本夏邳國後屬薛又為齊所併秦置下邳縣屬郯郡漢屬東海郡東漢為下邳國晉宋梁為下邳郡置武州後魏改州曰東徐後周又改邳州隋為下邳郡唐復置邳州宋置淮陽軍金復改為邳州元屬歸德府本朝以下邳縣省入改今屬編戶四十七里領縣二宿遷縣在州城南一百二十里春秋時鍾吾子國亦宿國所遷地秦置下相縣漢又置􅤌猶縣晉省下相置宿豫縣及宿豫郡後魏屬南徐州東魏屬東楚州後周屬泗州隋下邳郡治此唐始改為宿遷縣屬徐州宋屬邳州元省後復置本朝因之編户五十九里睢寧縣在州城南六十里古睢陵地漢屬臨淮郡東漢置睢陵縣晉屬下邳國東魏屬臨潼郡隋廢金復置改睢寧縣屬泗州尋屬邳州後廢元復置屬邳州本朝因之編户三十四里郡名淮隂古名山陽晉名形勝水陸交通晉荀羡北征議水陸交通易以觀釁沃野有開殖之利方舟漕運亦無他阻西至淮畔東届海隅南齊志俯臨淮海控制山東宋繫年録山陽要地屏蔽淮東同上淮南控扼之地宋吳表臣云連山阻海金侯摯奏云海州連山阻海與沂莒邳密皆邊隅衝要之地南北襟喉江淮要衝元董摶霄淮安議大江前流長淮却阻記室新書長淮奧壤表海名邦輿地紀勝北控齊魯南蔽江淮海州圖志風俗人多勇悍習戰爭晉伏滔正淮論淳實尚義務勤耕耨圖經俗多輕剽士任氣節隋志書軌新邦英雄舊里宋蘇軾淮隂侯廟記銘漸漬聖化綽有儒風圖册俗尚朴實力農務漁海州志山川鉢池山在府城西一十五里形如鉢盂故老云昔仙人王喬錬丹於此山中一方土赤草木不生是其驗也韓山在沭陽縣東北六十里世傳韓信追項羽於此南有楚王廟建陵山在沭陽縣西北一百里山形南北狹長上多陵阜漢立建陵縣取此白虎山在海州治西南形如虎踞朐山在海州城南四里上有雙峯如削俗呼馬耳峯傍有龍潭水極清冽秦始皇東巡至朐山界即此又有石棚山即朐山東北嶺有巨石覆巖上其山如棚嶺甚髙峻了無花木宋石曼卿判海州使人以泥裹桃李為彈拋擲其上數年間花若錦繡又名曰錦巖宋蘇軾有詩鬱洲山在朐山東北海中有大洲謂之鬱州又名郁洲一名郁鬱山一名蒼梧山或云昔從蒼梧飛來孔望山在海州城東五里輿地要覽孔子問官於郯子嘗登此山以望東海一名古城山上有龍洞銀山在海州城南石湫鎮東其山近海多白石日出照耀色如鋪銀巨平山在海州城北三十里一名由吾峯其山南接東海北抵墟溝又有棲雲山即巨平之東嶺舊有僧結棲雲精舍以居朱紫山在海州城東北四十里山有紅壁丹崖自相輝映望之若朱紫然南墮星山在海州城南六十里舊傳商時有星墮此又有北墮星山在州東五十里盧石山在海州城東南六十里山多黑石漢書韓信為楚王鎮於三盧即此宋張耒有詩溪雲山在海州城東北六十里其山清幽秀麗雲氣蓊鬱故名伊盧山在海州東南八十二里以境內有伊盧鄉也一名大伊萊山蠣山在海州城東南一百里海中四靣平坦潮上沒其半山多蠣因名大伊山小伊山俱在海州城南一百里南北相向相距可二十里東陬山西陬山俱在海州城外百餘里一在海中一在海隅東西對峙嚶遊山在海州城東北百餘里其山周回浮海中羣鳥翔集嚶嚶然自相喧聒唐人有詩北望山在海州城西南一百六十里上有二石臼俗傳秦始皇東巡時洗頭盆懷仁山在贑榆縣北四十里漢立懷仁縣取此吳山在贑榆縣西北四十里昔有吳姓者居此山上有廟廟後有土阜俗傳為吳山神塜水旱禱之輒應羽山在贑榆縣西北八十里即舜殛鯀處禹貢羽畎夏翟曽氏注云山雉具五色出於羽山之畎名山曰羽者以此唐崔國輔詩羽山一點青海岸雜花碎日暮千里帆楚色有微靄葛嶧山在邳州城西北六里古文以為嶧山禹貢嶧陽孤桐謂出此山之南者俗名距山以其與沂水相距也磬石山在邳州城西南八十里與泗水相近山有石其聲清亮可為磬禹貢泗濵浮磬即此山所出者黃石山在邳州城北百餘里上有黃石公廟艾山在邳州北百餘里接山東沂水縣界地志云沂水出泰山郡蓋縣艾山即此鐡佛山在邳州城北一百五十里上有三鐡佛馬陵山在宿遷縣北二里其山髙阜狀若馬陵㟃峿山在宿遷縣北七十里上有石洞鐫七真像洞口鑿石為螭水自螭口噴出四時不涸宋紹興末首領張榮屯此山以拒金人仙掌山在睢寧縣西七十里石上有掌跡隱見不常世傳仙跡云劉胡山在睢寧縣西北七十二里父老相傳昔有劉胡將軍出此故名鳯凰山在睢寧縣西北七十里形如鳯凰金牛岡在山陽縣西北一十里昔周世宗宿兵於此岡上亦時出甘羅錢如淮隂者鐡柱岡在鹽城縣北二里海岸故老相傳秦王繫馬柱也或云瀕海多蛟龍龍畏鐵作此鎮之獅子巖在海州城北二十五里舊傳有徐生學道於此一日忽化去葬山中後人見之於泰山下因付履東歸其徒視之乃葬時物人謂之尸解大小二島在海州城東北五十里濵海海兩山對峙潮生則沒于髙公島在海州城東八十里舊傳有高公漁於此海在海州城東二十八里南接朐山北接贑榆西趨州往來所渡廣二十餘里渡此者必擇日致祭非七日內不得渡若有公務急迫亦豫先祭請管家湖在府城望雲門外宋嘉定間郡守應純之開鑿以練習舟師為戰守之計射陽湖在山陽縣東南七十里與寶應鹽城分湖為界漢廣陵王胥有罪其相勝之奏奪王射陂即此石濩湖在安東縣治西北一名灌湖與海州贑榆沭陽接境湖靣約三萬四千五百餘頃傅湖在安東縣東北八十里湖面約一百三十餘頃碩項湖在安東縣西北一百二十里一名大湖西連桑墟湖東南各有小河逹於淮神異傳秦時童謡云城門有血城當陷沒有一老姆憂懼每旦往窺門者知其故以血塗門姆見之即走須臾大水至城果陷姆走至伊萊山得免今山有神姆廟髙齊時湖嘗涸西南隅城址猶存繞城古井數十處乃知城沒非虛桑墟湖在海州城西南九十里上接沭河下流入海淮河在府城北五里自泗州龜山北流入府界縈回府城東入于海周禮職方氏青州其川淮泗謂此老鸛河在府城西周世宗至北神堰齊雲艦大不能前遂開此以通其道故沙河在府城西北一十里宋轉運使喬惟嶽所開以避山陽灣清河口風濤之患後蔣之竒又開漕渠至洪澤入閘其後遊塞本朝永樂初平江伯陳瑄因其舊渠開河置閘易其名曰清江浦復於浦旁置倉積糧以備轉運至今公私便利云新河在山陽縣磨盤口宋乾道中開清河在清河縣治西即泗水之下流也源自泰安州經徐州流至邳州東境曰直河西境曰沙河又南下至縣西北三汊河口分為大小二清河南逹于淮漕河在安東縣舊名漕渠南通淮唐垂拱開以通海沂密等州沭河在沭陽縣東南源自青州西北馬脊固諸澗㑹流至縣界東入桑墟湖周禮職方氏青州其浸沂沭謂此舊黃河在邳州城南門外上連徐境下入淮河沂河在邳州城西自山東沂州西流至下邳西南入泗河達於淮武河在邳州城西北二里上連泇河下入黃河泇河在邳州城西北九十里南流入舊蘭陵縣界小河在睢寧縣治北源自汴水經宿州入縣界合黃河漣水在安東縣自沭水分流南入縣境在沭陽者曰南漣水入安東者曰北漣水堯水在贑榆縣西南八十五里源自沂州東流經縣界入海劔水在贑榆縣西南八十五里源自沂州三嶢山東流入縣界泛水在宿遷縣界泗水出山東泗水縣陪尾山源有泉四四泉俱導因以為名西南過徐州又東南過邳州入淮濉水在睢寧縣西源自靈璧縣東流經縣界又東北至宿遷縣入泗水濁水即古䢴溝南自寶應縣北流入淮俗謂之山陽濁春秋時吳於䢴溝築城穿溝通射陽湖至末口入淮以通糧運舊水道屈曲隋大業初發淮南民十萬開䢴溝自山陽至揚子入江即此羽潭在羽山下左傳鯀為黃能入于羽淵即此又郡國志鍾離昧城南有羽泉亦謂舜殛鯀處其水常清牛羊不飲洪澤在山陽縣界郡有閘宋隆興中魏勝守海州調發兵糧由運河至洪澤出閘入淮即此枸把井在開元寺內旁有枸把樹唐劉禹鍚詩僧房藥樹依寒井井有香泉樹有靈枝繁夲是仙人杖根老新成瑞犬形古井在府治西故老云泗州