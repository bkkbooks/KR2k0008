麟畫猴戲馬馬驚而圍人鞭之時稱為竒筆陳師道詩沭猴自戲馬自驚圉人未解猴馬情猴其天資馬何罪意欲防患猶傷生異類相宜亦相失同類相傷非所及志行萬里困一蹶吐豆齕荄甘伏櫪名宦漢汲黯後元中為東海太守治尚清淨凡事擇丞史任之責大指而已卧閣不出郡中大治尹翁歸地節中為東海太守為政精敏吏民賢不肖及奸邪罪名盡知之每罰一而警百皆改行自新東海大治于公為東海郡決曹決獄平罹文法者于公所決皆不恨郡中為之生立祠其辨孝婦之寃事見祠廟張禹下邳相北界有蒲陽陂久湮廢禹為引水灌溉遂成良田數百頃大收穀實鄰郡貧者歸之千餘户黃浮桓帝時東海相時中官兄子為下邳令强奪故汝南守女歸舍殺之浮收其家屬按法悉棄市蘇章武原令嵗饑開倉賑濟全活者三千餘戶鄭𢎞淮隂太守消息徭役政不煩苛嵗大旱𢎞行春雨隨車而至孫堅熹平間為鹽瀆丞吏民親附後徙旴𣅿下邳凡三邑所在有聲徐璆獻帝時為東海相威化大行徵詣京師道為袁術所劫璆守之以死術不敢逼晉荀羡永和中以徐州刺史鎮淮隂始營立城池祖逖建興初屯兵淮隂嘗誓清中原威著逺近南北朝袁粲宋東海太守清整有風操自處甚髙嘗著妙德先生傳蕭僧珍宋元嘉末為山陽太守㑹魏人入冦僧珍蓄陂水令滿待其至決以灌之魏人至山陽不敢攻隋髙勱楚州刺史民安其政先是城北有子胥廟其俗敬鬼祈禱者必以牛酒至破産業勱曰子胥賢者豈宜損百姓乎乃告諭所部自此遂止百姓賴之張孝徵東海令嘗築堤捍海堰自是民免水患元曖東海令于縣境西南接蒼梧山東北至巨平山築兩堰以捍海潮內以貯山間流水民獲灌溉之利唐杜令昭海州刺史值海漲軍民漂溺令昭築永安隄以防之民免其患閭里歌之宋璟開元中與姚崇奏請出太平公主以弭國患出為楚州刺史雖左遷而賢名聞於天下李聽憲宗討李師道以為楚州刺史聽振勵軍士掩賊不虞遂取海州攻朐山降之懷仁連海望風送款王光謙淮隂令務清淨之化而去其煩苦推誠明之本而教以亷愧生殖阜滋楚風丕變薛珏楚州刺史初州有營田宰相遙領使而刺史得專達俸及他給百餘萬珏至悉條去之租入贏富異時觀察使惡其潔誣以罪五代張彥能南唐楚州守將周世宗攻淮南諸郡皆降獨楚不下圍四旬守益堅城破彥能與其副鄭昭業戰死所部千餘人皆死誓無降者何敬洙南唐楚州刺史常親出巷里察人疾苦有白事者隨其所言親加剖析無不厭服宋喬惟嶽雍熙初為淮南轉運使聞故沙河凡四十里創二斗門于西河設懸門以蓄泄水利自是漕舟無滯後又權知楚州蔣堂楚州團練推官後又通判是州遇事毅然不屈有政績張傅真宗時知楚州㑹嵗饑貽書發運使求貸糧不報因歎曰民轉死溝壑矣報可待乎乃發上供倉粟振貸所活以萬計因拜章待罪詔奬之吳中甫江淮發運使嘗自洪澤鑿渠六十里以避長淮漕運之險梁適知淮陽軍奏減京東預買紬百三十萬又論景祐赦書不當録朱梁後仁宗記其名張奎知楚州治身有法度風力精强吏不敢欺沈括沭陽縣主簿縣依沭水括疏水為百渠九堰以播節原委得工田七十頃李清臣通判海州以儉自持居官奉法無敢撓以私王宗望江淮發運使楚州沿淮至連州風濤險舟多溺宗望開支氏渠引水入運河為公私利孫長卿知楚州糧料院郡倉積米五十萬陳腐不可食主吏皆懼法無敢輕去長卿為酌新舊均泄之史罪得免李宣知楚州治官如家有民迫於輸賦殺牛鬻之里胥白於官宣但令與杖人以其決事明稱為照天燭張綸江淮制置發運副使時鹽課大虧乃奏除楚通泰三州鹽戶宿負官助其器用鹽入優與之直由是嵗增課四十萬石米芾知連水軍治民有道不事淫祀時人以龍王誕日為祭芾止之後任滿歸舟至赤岸風濤大作舟人甚恐芾以詩投水風濤遂息孫洙神宗時知海州免役法行常平使者欲加斂緡錢洙力爭之方春旱發運使調民濬漕渠洙奏止其役旱蝗為害致禱朐山徹奠大雨蝗赴海死劉彛知朐山縣治簿書恤孤寡作陂池教種藝平賦役抑姦猾凡所以惠民者無不至邑人紀其事目曰治範陳師鍚元祐中知宿遷縣蘇軾三上章薦其學術淵源行已潔素議論剛正器識靖深入為校書郎石公弼連水丞供奉髙公備綱舟行淮以溺告公弼曰數日無風安有是使尉核其所載錢失百萬呼舟人物色之乃公備竊官錢竊詭為此說即收捕窮治皆伏辜田畫徽宗時知淮陽軍嵗大疫日挾醫問病者藥之後遇疾卒淮陽人祀以為土神趙立建炎中知楚州先是劉豫遣人賫書來誘立不撤封斬之又遣故人劉偲招立立曰吾知為國豈問故人趣令焚死市中忠義之聲聞於天下韓世忠紹興中以京東淮東路宣撫處置使屯楚州撫集流散通商惠工山陽遂為重鎮在楚十餘年金人不敢犯李大性孝宗時知楚州郡守欲撤城移他所大性謂城實晉時所築最堅持不可後遂不移李孟傳楚州司戶參軍單車赴官公退閉戶讀易郡守部使者不敢待以屬吏加葺境內涂積墓修復陳公塘有灌溉之利陳敏以都統制守楚州建議城楚州北使過者觀其雉堞堅新號銀鑄城後再知是州趙善湘紹定中為江淮安撫制置使復泰州淮安州鹽城淮隂縣四城及䇿應京湖皆有功賈涉知楚州治邉有方金人不犯界李全畏其威名歸附涉撫綏之應純之知楚州崇儒術興學校修城池民賴其德趙仲知楚州修築城池節制屯營軍馬州人便之黃師雍寶慶初為楚州官屬出盜賊白刃之衝不畏不懾李全反狀已露師雍密結忠義圖之謀泄師雍不為動全亦不加害余介淮東提刑兼知淮安州淳祐初提兵應援安豐有功耿世安淮東副總管初諜報北兵至制置使賈似道調往漣水軍增成衆方猶豫世安徑迎至漁溝以三百騎鏖擊身被七創猶能追殺潰兵收兵還至數里沒事聞贈官立廟淮安賜額忠武侯畐通判海州李松夀據山東突出漣泗畐鏖戰城下死之闔門遇害詔即海州立廟賜額旌忠元許維禎至元中為淮安路判官屬縣鹽城及丁溪場有二虎為害維禎默禱於神祠一虎去一虎死祠前境內旱蝗禱而雨蝗亦息謝處信安東知州興學課農存恤鰥寡嘗作訓詞俾民誦習沂川沭陽尹規制縣治招徠流民教之樹藝興學崇師民俗以變本朝陳天瑞吳元年為鹽城知縣政清刑簡創縣治興學校篤好詩書民迄今思之汪仁洪武初為桃源知縣時縣宇俱燬仁鼎新之及建神祠壇社政由愷悌民甚懷仰束贄洪武初為安東知縣開置公署分設街巷遷鄉民以實縣治恤孤勸農俱有條緒孔克勳洪武初清河知縣勸農興學修舉廢墜不勞民不傷財吏民悅服黃珏洪武初為鹽城知縣勸農興學愛養斯民革夙弊懲貪吏鋤奸抑頑百廢俱舉馬希顔洪武八年為沭陽知縣專務德化不施威刑學舍壇壝皆其修葺趙思本洪武末為安東知縣量民産力定賦役等則立籍紀載勸課農桑優恤貧匱吏事不憚勞勩去任人甚思之梁孟嶽永樂初為宿遷知縣為政有方賦均訟平使民婚姻死葬貧富相恤四民懷之李信圭洪熙改元為清河知縣存心以公勸善懲惡士民敬服秩滿當代邑民詣京乞留特升知州攝縣事不替初志民尤感頌焉陳瑄宣德中以平江伯鎮守淮安總督漕運開清江浦以利舟楫往來自淮安至臨清建閘四十餘所嵗漕恆倍國用以充彭逺宣德中為淮安知府奉宣德化不尚威嚴嵗癸丑遭歉饑民四歸擇隙地搆席舍以居之勸殷民出粟為飦粥人日給二餉賴全活者數十萬計農缺牛具為之借貸教之以時耕種民受其惠陳葵邳州知州興學校勸農桑有遺愛百姓思之張端正統初桃源知縣公平亷介分毫不苟為南畿志王麟正統間山陽教諭言行威儀皆可師法詩文楷書絶妙一時擢四川山東提學僉事南畿志王竑景泰初以左僉都御史總督漕運有懋功徐州大饑竑嘗發倉以賑民至今能道之南畿志徐有貞景泰間以右都御史總理漕運有經濟才河決張秋既塞後作沙灣一路河防功甚偉焉南畿志孫忱景泰間知沭陽縣濟寬以猛教民力學務農敦本尚儉訟簡盜息民賴以安南畿志楊昶安東教諭日必端坐教授雖祁寒盛暑不廢又捐俸以廣堂齊不干有司士論偉之南畿志楊昶天順初知淮安府政績卓異纍為當道旌奬秩滿官民交章乞留升河南參政仍知府事南畿志鄭同天順間知安東縣政教兼施德威並著內艱去民立一清坊以表之南畿志史珍天順間知宿遷縣持已嚴御衆寬尤作興士類政厯三考如初民至今傳頌南畿志陳濓成化間副都御史督漕運嘗治邵伯湖石堤至今無坍漫之患南畿志馬文升成化間以右都御史總督漕運門無私謁時漕卒之亡者皆歸焉南畿志韓邦問成化間知淮安府端謹亷平庶事修舉士民至今稱頌之南畿志郭珏成化間知邳州亷勤愛民大興學校南畿志郭進成化間山陽知縣剛明果斷不避權貴減夫役省公費悉心為民以疾卒民痛悼之南畿志王㒜成化間鹽城知縣宅心公恕持已清勤粗衣糲食九年不變南畿志張淮成化間山陽知縣清介不阿有十竒惠政民間為歌以思之志南畿林瑄成化間宿遷教諭富於學問教人有方一時人才多所造就南畿志劉大夏𢎞治初河決張秋大夏以副都御史往治之河平改張秋為安平鎮南畿志邊憲𢎞治中知淮安府持已嚴肅一言笑不假於人吏民畏服南畿志楊戬𢎞治中同知淮安府剛方嚴毅人不敢干以私在任四年清謹如一南畿志姚鵬淮安府學訓導博學多才詩文古雅操行不二勤于教人擢監察御史南畿志羅循知淮安府時流賊甫定民厭煩擾循至沈靜簡默為政公平吏畏民懷南畿志曽鈞嘉靖中以工部侍郎督治運河綽有成績南畿志流寓張良本韓人秦滅韓良為韓報讐募得力士為鐡椎狙擊秦始皇於博浪沙中誤中副車索之急乃亡匿下邳嘗逰圯上有一老父墮履圯下命良取履良因跪進老父與良期後五日夜半至其所授書一編乃太公兵法後佐髙祖取天下封留侯因謝病辟榖六嵗薨諡曰文成陳瓘南劔人仕宋為諌官因劾蔡京謫居令浦著尊堯集益加竄逐最後移楚州卒諡忠肅人物漢韓信淮隂人少寄食漂母初事項羽羽不能用乃歸漢拜大將軍定三秦擒魏取代仆趙脅燕破楚下齊立為齊王將兵㑹陔下滅項羽漢取天下大抵皆信功後徙為楚王高祖僞逰雲夢至楚擒信赦為淮隂侯家僮上變吕后殺之枚乘淮隂人為吳王濞郎中王有異謀切諫不納去而之梁景帝時拜𢎞農都尉以病免武帝即位以安車蒲輪徵之道卒子臯亦能文召見詔賦平樂館帝善之拜為郎受詔所賦凡百二十篇孟卿東海人事蕭奮以其業授后倉倉說禮數萬言以授梁人戴德戴聖沛人慶普普為東平太傅德號大戴為信都太傅聖號小戴以博士論石渠由是禮有大戴小戴之學嚴延年東海下邳人少學法律為郡吏舉侍御史宣帝初即位劾奏霍光擅廢立亡人臣禮朝廷肅然憚之後為涿郡太守務擢折豪強扶助貧弱令行禁止遷河南太守威震傍郡嚴彭祖延年少弟以春秋公羊名家宣帝時為博士厯河南東郡太守入為左馮翊拜太子太傅亷直不事權貴人或勸其少自勉強彭祖曰凡通經術固當修行可委曲從俗苟求富貴乎翼奉東海下邳人少篤學不仕治齊詩尤精律厯隂陽之占元帝初以諸儒薦徵待詔宦者署數言事宴見天子敬焉上封事必採究經史窮極隂陽官至博士諫議大夫陳球下邳人少涉儒學善律令舉孝亷纍官侍御史桂陽李研聚衆為冦命球為零陵太守朞月盜息遷南陽太守後為廷尉姪圭少與袁術逰術有異謀遺書與圭圭曰自當戮力漢室營私阿附吾不能也圭子元龍忠亮有大略時稱為湖海豪士周紆下邳人少好韓非之術永平中補行唐長遷洛陽令下車先問大姓吏數閭里豪強以對紆厲聲曰夲問貴戚爾豈能知此賣菜傭乎後免官又徵為御史中丞終將作大匠臧旻廣陵射陽人有才幹厯任揚州刺史太尉袁逢見其文奇之嘆曰雖班固作西域傳何以加此子洪舉孝亷補即丘長倡義誅董卓與術紹結好紹憚其能以為東郡太守後為紹所害陳容射陽人隨臧洪為東都丞洪被執於袁紹將死容曰將軍舉大事而先殺忠義可乎紹慙使人牽出容顧曰仁義豈有恆所蹈之則君子背之則小人今日寧與臧洪同死不與將軍同生遂見殺陳琳射陽人博學能文長於書檄曹操嘗苦頭風一日疾作讀琳所作檄草起而嘆曰此愈我病麋竺東海朐人世貨殖資産巨萬吕布襲下邳虜先主妻困匱日甚竺進妹為夫人奴客二十金銀貨幣以給軍資賴以復振後益州平拜安漢將軍竺雍容敦雅而幹翮非其所長故先主待之雖厚而未嘗有所統御三國步隲淮隂人避難江東種瓜自給孫權為討虜將軍召為主記權稱尊號纍遷驃騎將軍領冀州牧前後薦達屈滯救解患難多所濟益後為丞相被服居處如書生時南北朝王諶東海人宋明帝時為司徒參軍兼中書舍人有學義甚見親遇帝所行慘僻屢諫止之後拜中書侍郎鮑泉東海人博涉史傳有文筆少事梁元帝為國常侍後為通直侍郎纍遷信州刺史隋包愷東海人兄愈明五經愷悉傳其業大業中為國子博士於史記漢書尤稱精究學者以為宗教授嘗數千人及卒門人為起墳立碣焉唐王義方泗州漣水人事母謹淹究經術性謇特不肯造請貴勢太宗時補晉王府參軍魏徵欲妻以妻之姪辭及徵卒乃娶人問故曰初附宰相今感知己故也高宗時擢侍御史後以論李義府貶官徐有功東海人武后時為司刑卿纍斷大獄全活者甚衆起居舍人盧若虛曰當雷霆之震能全仁恕千載未見其儔吳通𤣥海州人與弟通微皆博學善文章始通𤣥舉神童又擢文詞清麗科德宗立弟兄踵召為翰林學士並知制誥徐溫海州朐山人剛毅寡言唐末從楊行密起兵以功封齊國公鎮潤州溫客嚴可求善籌畫駱知祥知財利溫信任之及吳建國拜溫大丞相都督中外諸軍事封東海郡王孫魴淮人性聰敏好學善吟詩楊吳據有江淮文雅之士駢集魴遂與沈彬李建勳為詩社仕為宗正郎卒有詩百篇五代沈斌下邳人仕晉為祁州刺史契丹犯祁以兵邀擊之不利虜將趙延夀招斌降斌罵不屈城陷死之劉崇俊楚州山陽人祖全父仁規相繼為濠州刺史有能名崇俊仕南唐亦為濠州刺史有仁惠南唐升濠州為定逺軍就以崇俊為節度使移夀州卒贈太尉諡曰威魚崇諒楚州山陽人徙陜州幼能屬文仕晉漢至周時為翰林學士書詔繁委皆崇諒為之後表陳母病歸陜州就養宋太祖朝不起太宗即位授尚書兵部侍郎致仕宋劉福徐州下邳人魁岸有膂力以功纍官雄州防禦使福至部按行城壘調鎮兵以給繕完出私錢以資宴犒冦雖大至恃以無恐淳化初遷涼州觀察使福雖不學而御下有方略為政簡易人甚德之趙師旦山陽人皇祐初知康州時儂智高反攻康州力不能敵左右咸請避之師旦曰走將安之血戰而死詔贈光祿卿張耒淮隂人十二嵗能文弱冠第進士厯官太學録遷史館檢討顧義自守淡如也紹聖初以直龍圖閣知潤州坐黨謫官徽宗召為太常少卿復出知潁汝二州又坐黨籍落職耒有雄才筆力絶健誨人作文以理為主謂六經諸子百氏皆寓理之具學者以為至言徐積山陽人三嵗父殁事母至孝以父名石終身不用石器母亡廬墓三年雪夜伏墓側哭不絶聲時甘露降木成連理積初從胡瑗學惡衣惡食不以為恥應舉入都載母以從比登第同年共致百金為夀却之後廷臣薦其孝亷為楚州教授卒諡節孝王資深山陽人第進士纍官尚書郎初擢御史首論在廷大臣草具將上蔡京遣所親謂曰慎勿言當以此位相處不答翌日出知揚州尋改明州嘗著周書及方言子洋中甲科纍官直徽猷閣厯三郡有異政所著有東年集胡松年海州懷仁人政和初上舍釋褐纍遷中書舍人在朝每有所言皆切時政髙宗時拜吏部尚書後權參知政事所薦引一以至公權勢莫能奪以疾提舉洞霄宫孫傅海州人登進士中詞學兼茂科厯監察御史欽宗即位拜尚書右丞俄同知樞密院金人圍都城欽宗詣金營以傅輔太子留守及金邀太子去傅願以死從金人召之去死于朔庭紹興中贈官諡忠定魏勝宿遷人多智勇善騎射紹興末金人南侵勝聚義士取漣水軍及海州廣募兵以圖收復與金人戰俘馘甚衆或當危迫中輒叱曰魏勝在此人皆辟易嘗冒圍突出人不能近又嘗造如意車行則載輜重止則為營金人來犯極力禦之援兵不至墜馬死事聞贈保寧節度使諡忠壯扈再興淮人有膂力善機變每戰被髮肉袒徒跣揮雙刃奮呼入陳人馬辟易金人犯棗陽設伏掩擊金人大敗授神徑統制繼是接戰屢捷斬其將從義又獲其副統軍納塔達以病卒子世達亦以名將稱官至都統制米立淮人三世為將從陳奕守黃州奕降元立潰圍出江西制置使黃萬石署為帳前都統制元兵略江西立迎戰被執不降遣萬石諭之立曰侍郎國家大臣立一小卒爾何足道但三世食趙氏祿趙亡何以生為竟不屈遂遇害陸秀夫楚州鹽城人景定初進士李庭芝鎮淮南辟置幕中每宴集坐尊俎間矜莊終日不未嘗少有希合德佑初以禮部侍郎使軍前議和就二主走溫州秀夫追從之益王立于福州進端明學士僉書樞密院事時君臣播越海濵每朝㑹秀夫儼然正笏立如治朝王殂又立衛王以秀夫為左丞相至元中崖山破秀夫驅妻子入海中尋負王赴海死張孝忠淮人德佑初呂文煥導元兵東下吕師䕫與武萬戶分定江東地知信州謝枋得走入安仁調孝忠逆戰團湖坪矢盡揮雙刀擊殺百餘人前軍稍却後軍繞出孝忠後衆驚潰孝忠中流矢死黃文政淮人戍蜀軍潰間道走靜江馬塈邀與同守城破文政被執大呼不屈元軍斷其舌以次劓刵之文政含糊叱咄比死不絶聲元杜祐邳州人河南行省署為三義水馬站提領父成病于家祐忽心驚舉體沾汗即棄職歸父病始三日遂禱求代且嘗糞以驗疾父卒廬墓盡哀有馴兔之瑞史彥斌邳州人嗜學有孝行至正中河溢鄰邑墳墓多壞彥斌母卒葬時嘗為厚棺刻銘其上及墓為水漂彥斌縛草人浮水中仰天呼曰母棺不知其處願天矜憐假此芻靈指示所在乃乘舟隨草人所之行三百里果得母柩歸葬本朝倪寬邳州人精武藝丙午年收集民兵歸附本朝纍立戰功進升後府都督僉事陳政邳州人洪武初集兵從征驍勇過人所向有功纍升中府都督劉江桃源人洪武中任燕山中護衛百戶後從兵靖內難纍立戰功進升中府都督楊靖山陽人洪武乙丑進士才識出衆纍官户部左侍郎升刑部尚書轉左都御史李􅊹山陽人由國子生任考功監令有幹濟才洪武中升兵部尚書楊泰山陽人洪武間擢給事中尋遷北平按察司僉事永樂中召為通政司左通政進刑部右侍郎卒于官張士彬山陽人洪武中以才行車異薦授江寧知縣尋遷江西道監察御史有直氣特升河南按察使在任風紀振揚劉榮宿遷人勇略過人襲父職永樂中以從征靖難有功纍贈祿秩進封廣寧伯卒追封侯爵諡忠武錢貴海州人洪武中父祖以戰功纍升府軍右衛指揮使永樂中貴襲職謀略過人宣德中升都指揮僉事委管京營操練有法士卒悅服正統中以外戚升中軍都督府都督同知為人謙恭小心不以富貴驕人卒賜葬祭成均鹽城人永樂中由國子生授監察御史端厚勤慎升江西按察副使再升南京刑部右侍郎轉户部右侍郎金濓山陽人永樂中由進士任御史有風裁升陕西按察副使轉右僉都御史分鎮寧夏尋升副都御史召拜刑部尚書時閩中盜起命將討之濓參贊軍務竣事進太子太保兼户部尚書卒追封沭陽伯諡榮襄濓嚴明剛果獄無淹囚善於籌策國計以充羅銓山陽人宣德中由進士拜監察御史才能著稱進升湖廣按察使克振風紀未幾卒於官沈翼山陽人宣德中舉進士厯户部主事郎中升戶部右侍郎再升南京户部尚書致仕卒翼有心計持已清介蒞政慎勤屬官懼其威無敢廢事者子瑶舉進士官至太僕寺少卿丁泰海州人舉鄉貢授户部主事立朝以剛正自持人呼為鐡面丁後謫判興化清慎愛民賑嵗饑弭虎患綽有善政莆民到今思之畿志葉淇山陽人舉進士厯官廣西按察僉事奉敕襄定土官莫必勝升陕西副使遏岷州胡寇擊殺二賊首繼平洮州進僉都御史巡撫山西修築城堡罷土兵戍邉之不便者拜户部尚書沮內竪莊田之請終太子太保從子贄登進士第厯官刑部侍郎畿志李瓉山陽人進士改庶吉士任吏科給事中封駁彈劾不避權貴時負剛直之稱以浙江布政使致仕畿志陳讓山陽人纍官杭州知府海近寧海內徙人甚危之讓請城開河築堤以捍海果徙至堤外止居民德之為立生祠然剛正疾惡卒以此去位畿志宫安山陽人纍官廣東按察司僉事持憲嚴明致仕歸囊槖蕭然家居十餘年不入城府都御史王竑雅重之畿志楊理山陽人由進士厯官大理少卿進副都御史巡撫河南值嵗歉河決乃增築汴堤水不為害又以民流入永寧者甚多不俟奏發倉賑之汴賴以安拜工部侍郎卒畿志張素山陽人授河隂令五年有清操致政歸民思之為立遺愛碑畿志陳秉彛沭陽人進士任四川忠州知州厲操愛民吏民畏服及卒忠人特祀於陸宣公祠畿志岑義邳州人事父母自幼以孝聞問安必拜跪飲食湯藥必親調母肓義朝夕餂之目復明父母卒義苫塊幾毁及葬負土成墳廬墓三年甘露降墓樹有司上其事旌其門閭畿志張崙宿遷人八世同居成化七年有司上其事詔旌之逮今同居十餘世二百餘口畿志蘇勤安東人六世同居宗族和睦成化間有司上其事以聞畿志沈麒沭陽生員正統中山東盜起掠至淮安郡守被執至沭陽民皆逃匿麒以母病不去俄聞守見執徑趍賊壘諭以大義賊感動既釋郡守復贈麒米肉而歸之御史張惟恕大書忠義表其閭焉畿志孫清睢寧縣學生少孤事母正德七年母卒時流賊入境清守柩不移賊竟不入其門鄰亦賴以不擾事聞立石褒之畿志列女嚴延年母下邳人延年為河南太守母從東海來臘到雒陽適見報囚母大驚止都亭不肯入府因數責延年延年因頓首謝迎母歸府舍母又謂曰天道神明人不可獨殺我不意當老見壯子被刑戮也遂去歸郡後嵗餘果敗東海莫不賢智其母北神烈婦少有美色夫為小商載之同行夫死貧無以殮同行富商為畢其喪事自恃有德日逼欲亂之既葬歸婦抱其嬰兒呼天號慟赴淮死宋徐積嘗記其事復作詩哀之曰海水猶可泛君身不可犯淮水猶可瀦君身不可汚鸞鳯猶可馴君身不可親不是雲間月即是月邉雲陳公緒妻海州朐山人姓劉氏宋紹興末金人犯山東公緒倡義歸宋偶劉歸寧不得與偕惟挈其子以行宋授以官劉留北方音問不通或勸之改適劉曰吾知守吾志而已遑恤乎他公緒亦不他娶子庚浸長輒思念涕泣後迎母以歸劉在北二十五年嘗緯蕭以自給趙氏張禮妻沭陽人洪武初禮任廣州同知卒於官未殮趙自經死事聞官為歸葬畿志韓氏山陽人名惟秀耶律養正妻養正為元鹽司令卒於官韓無子終喪還父母家適其弟敏與妻繼卒獨居養父母初弟生二子曰肅曰寬肅娶楊氏蚤卒楊年十九守節寬官戶部侍郎晚娶丁氏寬卒丁年三十生子立與楊同節立娶金氏亦蚤卒金年二十四亦守節一家四節婦實由韓氏作法於前也各旌表畿志韓寧妻孫氏山陽人嫁僅八月夫亡撫植遺腹子守節終身宣德間旌表畿志胡氏鹽城人顔遂妻年二十一夫亡舅姑為其貧而無子潛以許人聘禮至門悲號幾絶其夜遂縊死畿志顧剛妻周氏清河人剛鐵工家貧無資周處之裕如年二十夫死號慟幾絶俟家人就寢遂自縊死因合葬焉畿志范氏清河李政繼室政知胙城及子元夫婦相繼死遺孫男女俱在襁褓時范年十八杜門紡績撫養二孤有求娶者厲聲叱之曰汝勿為我少變其所守何以見夫于地下有司上其事畿志莊尚妻胡氏桃源人年二十九夫亡撫棺號哭絶而復蘇久之自縊而死畿志孫氏海州人潘裕妻年二十有八夫喪越月始生一子養老守孤守節四十餘年𢎞治中旌表之畿志樊氏宿遷人髙暹妻夫亡時年二十有七養成遺腹男堅守志節𢎞治末旌表畿志孝子劉炯女贑榆人許嫁邑人張森未行而森卒女告父母欲往送葬許之至期衰麻往哭守節終身正德間旌表畿志邵氏安東人蘇正二妻夫卒邵年二十有二兄欲奪其志不從守節終其身畿志州判徐儀女睢寧人名雪梅年十五為流賊所執義不受辱罵賊死事聞旌表畿志何氏泗川人年十五父沒母病娼家誘買為子婦後徙居淮逼使為娼何遂自刎是年旱甚或言何寃郡佐求其尸刲冢設祭天果大雨具奏建祠墓側賜額貞烈併祀徐氏更名雙節畿志王氏鹽城人劉存仁妻存仁苦學成疾比殆王謂姑曰夫病無妨姑信之為就寢存仁命終王遂自縊嘉靖初旌表畿志展濬妻索氏邳州人年十九其夫病劇索知其必不可生遂先自縊嘉靖十三年事聞旌表畿志仙釋孫賣魚不知其名嘗賣魚楚州市極暑中遇一道士謂曰汝魚餒矣能飲我可使魚活遂飲以斗酒因與談論自是言禍福輒應宋宣和中召至京師賜號塵隱處士復還楚州靖康初嘗于亳州太清宫號咷大哭而去人莫之喻有記其時日者乃汴京陷之日也後不知所在莎衣道人淮陽軍朐山人姓何祖執禮仕至朝議大夫道人避亂渡江嘗舉進士不中紹興末來平江身衣白襴久之衣益敝緝以莎嘗臨池見影豁然大悟人無貴賤問休咎罔不竒中㑹有瘵者乞醫命持一草去旬日而愈求而不得者或遂不起逺近異之孝宗連召不至賜號通神先生賜衣數襲皆不受聖僧宋人往來乞食海州人有疾呪之即愈事多前知時安撫使丁公守城僧一日左持斧右持丁行擊于市大呼曰丁壞我斧人無解者踰數日丁果叛僧示寂州人葬之成一髙阜水旱禱之感應婁道者漣水軍人生有異相掌中一目中指七節長為承天寺僧有大智慧能逆知吉凶宋真宗嘗召問禁中事仁宗初生晝夜啼不止道者摩其頂曰莫呌莫呌何似當初莫笑啼遂止後歸鄉有新知軍雅不喜道者遂告祴徒曰緣盡當滅乾興元年正月右脅側卧而化知軍疑其詐死命焚之凡三日衣械不動忽雷雨驟作薪火皆滅口中出白烟自焚立盡獨留目睛與舌根不壞舍利無數邦人葬之淮岸賜號證因大師明一統志卷十三
