聞善環府百里之人皆愛慕之見旼于路輒歛祍以避葬其父廬墓三年卧破棺中日食米一溢壁間生紫芝數十本州以行義聞特賜旌表崔鶠陽翟人宋進士為筠州推官徽宋初立以日食求直言鶠上言後蔡京藉上書人免鶠官久之調績溪令移病居郟城治田百畆為婆娑園屏處十餘年無貴賤悉尊師之范祖述成都人仕宋累官知台州主管西京御史臺靖康多難避地汝州汝守趙子邀與共守於是旁郡盡陷汝獨全累官朝請大夫人物漢臧宫頴川郟人從光武征戰以勇稱初為偏將軍從破群賊復將兵徇江夏拜輔威將軍擊諸郡平之後平蜀拜廣漢太守徴還封朗陵侯卒謚愍侯宫謹信質檏故常見任用銚期頴川郟人父猛為桂陽太守卒期喪三年鄉里稱之期容貌絶異矜嚴有威光武畧地頴川召署掾從徇薊後為鄧禹禆將所至有功封安成侯後拜衛尉期重信義自為將有所降下未嘗鹵掠在朝憂國愛主能犯顔諌諍卒謚忠侯子丹統俱為侯唐孫處約汝州郟城人貞觀中為齊王祐記室祐多過失處約數諫太宗咨嘆之擢中書舍人後以小司成致仕孟詵汝州梁人登進士第累官鳯閣舍人轉春官侍郎拜同州刺史神龍初致仕詔河南春秋給羊酒以終其身元結魯山人少聰悟宏達倜儻不覊天寳中進士歴官監察御史節度叅軍以功改著作郎遂家武昌起為道州刺史撰大唐中興頌刻于浯溪大歴初拜御史中丞馬燧汝州郟城人兄炫以儒學聞歴連閏二州刺史以清白稱燧姿度魁傑沉勇多筭李抱玉守鳯翔表為隴州刺史從抱玉入朝代宗雅聞其才授商州刺史後屢立大功封北平郡王王䖍休汝州梁人有材武信義李抱真以幣招之授兵馬使累功封同昌郡王後為昭義留後號令撫循軍中大治嘗得繼天誕聖樂以獻以宫為均後中和樂本此五代張仁謙汝州人仕晉為北靣行營兵馬都監匈奴不敢犯塞漢祖即位授西上閤門副使入宋平李繼筠以功授象州刺史宋冦瑊汝州臨汝人舉進士授遂州推官徙永州討平漢蠻為梓州運使又討平瀘蠻累遷給事中仁宗時河决徙知滑州河平擢樞宻直學士吳㡬復汝州人登進士第皇祐中為太學直講朝廷知其賢内試省府外委以監司郡守之寄後鎮荆南殁子夀寜孫長吉俱仕至直祕閤沈宣汝州梁人母亡既葬不塞墓門三十有六月畫負土夜附棺而卧為墳廣百尺妻髙氏亦有孝行元豐中甞褒賜粟帛牛皋汝州魯山人初為射士戰敗金人累遷蔡唐州信陽軍鎮撫使後為岳飛部將復隨州襄陽擒楊么以功最除捧日天武四廂指揮使馬步軍副總管金宗端脩汝州人好學喜名節金大定中進士累官監察御史大理丞屢上書言事端脩以直道不振於時自守愈篤妻死不更娶獨居二十年汝州司侯游彦哲嘗問為政端脩曰治氣養心而已心正則不私氣平則不暴為政之術在是矣元鄧順魯山人舉進士博學有治才仕至禮部侍郎本朝安徳汝州人幼警敏涉獵經史習詞賦舉元進士𨼆居授徒洪武初郡守舉為州學訓導兵燹之餘家無藏書徳手録以授生徒後以明經徴起入對稱善擢湖廣左叅政李希顔郟縣人博通經史窮極根抵洪武初被徴為左春坊賛善大夫進講經筵多所禆益嘗註大學中庸心法又同邑張叔廉亦以儒行卓異徴為國子學正王政汝州人少有器局練曉時務洪武初入太學累官兵部侍郎以才幹敏速奏對便㨗為時所稱陳立汝州人家貧力學用志懇篤寡言笑尚信義以太學生髙等洪武初授江西左參議廉介自持遇事明決後入為應天府治中王澤汝州人由進士歴官太僕寺丞河間知府子佐進士王預汝州人由進士累官陕西副使袁愷郟縣人由進士累官副都御史總督南京糧儲列女王氏二婦宋汝州人建炎初金人至汝州二婦為所掠擁置舟中遂投漢江以死屍皆浮出不壞時人收葬城外江上為雙塜以表之袁氏汝州醫士馬元吉妻永樂初元吉卒千京師袁氏携㓜子負骨歸葬養舅姑以天年終子亦成立守節四十餘年正統間旌其門曰貞節王粉兒汝州王通女許嫁同里張得山未行而得山殁粉兒即柩旁慟哭㡬絶既葬復至墓所奠哭遂自縊青楊樹下仙釋張元化葛𤣥弟子嘗寓汝州有前知之明一日召道士周元亨戒之曰吾化之後母損吾軀既化元亨遵其命葬于城北二里後五年汝卒戌蜀者逢一道士于山峽間謂曰我新去汝若為我持書與胡司馬周尊師達之無遺卒反投書二人開緘乃元化親札謝二人葬之厚也遂率郡人發塜視之惟空棺有故履存焉宋政和中封冲妙先生明一統志卷三十一
