body:
  text: 明一統志卷三十一明李賢等撰汝寧府東至直隸鳯陽府頴州界二百三十里西至南陽府裕州舞陽縣界一百四十里南至湖廣黄州府黄陂縣界四百五十里北至開封府陳州西華縣界一百十五里自府治至京師二千三百里至南京二千二百五十里糧十二萬一千七百石零建置沿革禹貢豫州之域天文角亢氐分野春秋沈蔡二國地秦屬潁川郡漢置汝南郡劉宋立司州號其城曰懸瓠後魏改為豫州東魏置行臺後周置總管府後改舒州尋復曰豫州又改為溱州後改蔡州汝南郡如故隋初廢郡大業初廢州復為汝南郡汝陽縣唐初置豫州天寶初改汝南郡乾元初復為豫州寶應初仍改蔡州宋為淮康軍節度使金改鎮南軍元為蔡州後陞汝寧府本朝因之領州二縣十二汝陽縣附郭周為沈國地漢置汝陽縣屬汝南郡劉宋屬汝陽郡隋初屬豫州尋改為溵水縣屬陳州又析上蔡縣地别置汝陽縣省溵水入焉即今縣也唐為蔡州治金仍舊元省平輿入焉本朝因之編户三十三里真陽縣在府城南八十里本漢慎陽縣地東魏置義陽郡北齊省入保城縣隋廢保城置真丘縣後改曰真陽唐改曰淮陽尋復舊元省入息州本朝初因之𢎞治中復置編户一十五里上蔡縣在府城北四十五里古蔡國周武王封弟叔度於蔡成王封其子蔡仲即此漢置上蔡縣屬汝南郡後魏改臨汝縣北齊省隋初置武津縣大業中復曰上蔡唐屬蔡州宋金元並仍舊本朝因之編户三十六里新蔡縣在府城東五十里古吕國春秋時蔡平侯徙都此故曰新蔡漢置新蔡縣屬汝南郡晉屬汝隂郡劉宋屬新蔡郡南齊置北新蔡郡東魏置蔡州北齊為廣寧郡隋初為舒州及廣寧縣尋改汝北縣大業初州廢縣復舊名唐屬蔡州宋因之金屬息州元省入息州本朝洪武四年復置改今屬編户一十二里西平縣在府城西北一百三十里古栢子國漢置西平縣屬汝南郡東漢末廢後魏復置并置襄城郡北齊改文城郡隋初郡廢以縣屬蔡州大業初縣廢唐初復置貞觀初省入郾城開元間再置屬蔡州宋金元仍舊本朝因之改今屬編户二十二里遂平縣在府城西九十里本春秋房子國漢為吴房縣屬汝南郡後魏改遂寧縣屬襄城郡隋復為吴房縣屬汝南郡唐貞觀初縣廢尋復置屬蔡州元和中改遂平縣屬唐州長慶初還屬蔡州宋金仍舊元初省入汝陽大徳間復置屬汝寧府本朝因之編户二十八里信陽州在府城西南二百七十里周申伯所封秦屬南陽郡漢為平氏縣地三國魏析置義陽縣及義陽郡劉宋置宋安郡南齊置司州梁曰北司州後魏改郢州後周改申州隋改義州尋復為義陽郡唐初為申州後仍曰義陽郡宋改義陽軍又改信陽軍屬鄧州元改信陽州本朝初降為縣改今屬成化十一年復陞為州編户一十七里領縣二羅山縣在府城南一百四十里春秋時蔡地戰國時為楚地秦屬潁川郡漢為鄳縣屬江夏郡晉屬汝南郡北齊置髙安縣隋初罷後復置改為羅山縣唐初置南維州尋罷州以縣屬申州宋初省入義陽復復置屬信陽軍元屬信陽州後遷州于故縣以縣治移於西南即今所也本朝因之編户二十里確山縣在府城西五十里本春秋江國漢為安昌縣地屬汝南郡東漢末置朗山縣晉改曰安昌梁屬陳州後魏移縣治朗陵故城屬初安郡隋初復移縣治今所屬豫州仍改為朗山縣唐屬蔡州宋改為確山縣金元因之本朝初省入汝陽洪武十四年復置編户二十一里光州在府城東三百里本禹貢揚州之域春秋為弦黄蔣三國地戰國屬楚秦屬九江郡漢屬汝南江夏二郡三國魏析置弋陽郡晉屬弋陽汝隂二郡宋齊屬光城弋陽新蔡三郡梁末置光州治光城縣隋改弋陽郡唐復為光州徙治定城天寳初改弋陽郡後復為光州宋陞光山軍節度後改蔣州尋復光州元屬汝寧府省定城縣入焉本朝初改屬鳯陽府洪武十三年仍屬汝寧府編户二十二里領縣四光山縣在州西四十五里春秋為弦國漢為西陽縣地屬江夏郡晉置光山縣劉宋改為光城縣尋置光城郡梁置光州隋改縣曰光山唐改郡為光州徙治定城縣宋改光山為期思縣尋復舊元屬光州本朝因之編户三十一里固始縣在州東一百四十里春秋為蓼國漢為寢縣屬汝南郡東漢初改曰固始晉屬汝隂郡梁改蓼縣北齊復名固始置北建州尋廢州置新蔡郡後周改置澮州隋初州郡並廢以縣屬弋陽郡唐屬光州宋以殷城縣省入元仍舊本朝因之編户四十九里息縣在州西北九十里春秋為息侯國漢置息縣屬汝南郡後徙於東改曰新息晉為汝南郡治後魏置東豫州梁改曰西豫州又改曰淮州東魏復曰東豫州後周改息州隋廢唐復置貞觀初廢以縣屬蔡州金復置息州元屬汝寧府本朝改州為息縣初屬潁州後改屬光州編户二十八里商城縣在州北一百里春秋時為黄國戰國屬楚秦屬九江郡西漢屬汝南郡東漢屬淮陽國晉屬汝隂郡劉宋置殷城縣唐初改置義州尋廢以地屬弋陽郡宋復置商城縣尋省入固始縣金元仍舊本朝初因之成化十一年復置改今屬編户二十六里郡名汝南秦名淮康宋名形勝水若垂瓠水經汝水屈曲形若垂瓠然其水洄曲其地平舒北史圖經面山負野限淮為圻光州賞心堂記隱然巨屏端若長城輿地紀勝襟帶長淮控扼潁蔡光州圖經四方最中元志豫州於四方最中汝南於豫州又最中北接陳汝控帶許洛寰宇記信陽北接陳汝控帶許洛宋齊以來嘗為邊鎮九塞之一輿地記羅山九塞之一三關之塞新唐志義陽有三闗之塞風俗剽輕寡積史記汝南其俗剽輕易發怒地薄寡於積聚夸奢尚氣力好商賈寰宇記人性躁勁風氣果決隋志尚淳質好儉約同上自平陳之後其俗頗變尚淳質好儉約喪紀婚姻率漸於禮多事農桑不尚華麗信陽圖志民性勁直多事農桑不尚華麗以儉相尚俗