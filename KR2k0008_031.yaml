侯言於王徙下蔡作脩刑辟命曰甫刑端木賜春秋時為魏信陽宰將行辭孔子孔子曰勤之慎之吾聞知為吏者奉法以利民不知為吏者枉法以侵民漢鄭當時武帝時汝南太守有善財聲數歳以官卒家亡餘張敞宣帝時豫州刺史數上事有忠言召信臣上蔡長視民如子所居見稱冦恂建武初汝南太守討平盜賊郡界清净乃大脩學校教生徒聘能為左氏春秋者親受業焉杜詩建武初自沛郡都尉轉汝南都尉所至稱治馬宫汝南刺史以寛大為政閭里巨細無所不燭治聲流聞鄧晨建武中汝南太守興鴻郤陂數千頃汝土以􅎋魚稻之饒流衍他郡歐陽歙建武間汝南太守推用賢俊政稱異迹歙傳尚書學在郡教授數百人鮑昱永平中汝南太守郡多陂池歳决壊昱乃上作方梁石洫水常饒足溉田倍多人以􅎋富張敏建初中汝南太守清約不煩用刑平正有理能名何敞和帝時汝南太守以寛和為政顯孝悌有義行者及斷寃獄郡中無怨聲百姓化其恩禮又脩理鮦陽舊渠百姓頼其利吏民共刻石頌徳王龔延光初汝南太守政崇温和好才愛士引進郡人黄憲陳蕃等後進知名之士莫不歸心鐔顯安帝時豫州刺史時天下饑荒競為盜賊州界收捕且萬餘人顯愍其困窮自陷刑辟輙擅赦之因自劾奏王堂汝南太守搜才禮士委誠求當不茍自專郡内稱治胡廣順帝時汝南太守有安静之政周景桓帝時豫州刺史好賢愛士其㧞才薦善常恐不及賈彪延熹中新息長小民貧窶多不養子彪嚴為之制數年養子千數僉曰賈父所長生男曰賈子女曰賈女楊秉豫州刺史計日受俸餘禄不入私門以廉㓗稱治為當時最宗資桓帝時汝南太守委任功曹范滂推功於滂不伐其美任善之名聞於海内尹勲汝南太守上書解釋范滂袁忠等黨禁士論多之楊竒靈帝時汝南太守持身㢘介專以慈祥為政郡中稱治黄琬中平初豫州牧時冦賊陸梁州境彫殘琬討擊平之大震政績為天下表王允豫州刺史奏除禁黨討擊黄巾别帥大破之降數十萬人巴肅察孝廉厯頓縣令以郡守非人辭去改貝丘長三國滿寵魏汝南太守時袁紹盛於河朔而汝南紹本郡門生賔客擁兵拒守寵討平之領豫州刺史有徳政後徙都督揚州汝南兵民戀慕多奔随道路賈逵魏黄初中豫州刺史考績二千石以下不如法奏免文帝稱為真刺史布告天下以豫州為法州與吳接逵脩軍旅内理民事造為陂渠及卒吏民追思為刻石立祠田豫魏朗陵令遷弋陽太守有治政後汝南聞其卒為畫像立碑晉王沈以尚書監豫州諸軍事豫州刺史至鎮下教百姓稱頌又按賈逵以來諸施行擇其善者而從之於是九郡之士咸悦道教移風易俗謝萬豫州刺史王羲之與桓温箋曰謝萬處廊廟叅諷議故是後來偉器而今屈其邁往之氣以俯順荒餘近是違才矣劉毅豫州刺史初桓𤣥於南州起齋悉畫盤龍於其上號為盤龍齋毅小字盤龍至是遂居之南北朝張萇年後魏汝南太守郡人有兄弟分一牛争訟不能決者萇年賜以已牛一頭使均之於是境中相戒咸至敬讓司馬悦後魏豫州刺史汝南有董毛奴者齎錢五千死於道疑張湜刼殺湜懼掠誣服悦引見毛奴兄靈之詢當時所遺曰惟一刀鞘召刀匠詢之知為董及祖刀收及祖詰之果伏罪王肅後魏太和中豫州刺史嘗於四望陂築城以禦梁於是梁刺史羊鴉仁以粮運㫁絶棄懸瓠歸義陽辛穆後魏汝陽太守遇水澇人飢表請輕租賦勑聽以小絹為租曹世表後魏東豫州刺史有威愛臨官省約百姓安之張普惠後魏東豫州刺史奸盜不作治聲流聞夏侯䕫梁豫州刺史立堰溉田境内頼之夔兄亶先經此任有恩惠百姓歌曰我之有州頼得夏侯前昆後弟布政優游隋公孫景茂息州刺史法令清净徳化大行屬平陳之役征人多病景茂减俸為粥藥賑濟頼全活者以千數髙祖嘉之詔宣示天下梁洋息州刺史有徳政叅軍裴洋與州人建塔作碑唐狄仁傑豫州刺史時越王兵敗支黨餘二千人論死仁傑宻䟽申理詔悉謫戍邊囚出寧州相與哭碑下齋三日乃去至流所亦為立碑盧從愿𤣥宗時豫州刺史為政嚴簡奏課為天下第一璽書勞問姚崇與宋璟謀出太平公主貶申州刺史崇雖被黜而聲名自此昭著潘好禮上蔡令有治最後遷豫州刺史勤力於治清㢘無所私柴再用吳楊光州刺史天祐初朱全全忠攻淮南抵光州再用嚴設守備俟其度淮而北抄其後軍斬獲萬計宋栁開雍熈中上蔡令㑹王師北征部送軍糧至涿州因上書願效死邊鄙遂除殿中侍御史吕端太宗時知蔡州有善政及代吏民列奏借留辛仲甫雍熙中知光州善於聽斷遇事立決待民以寛大御軍以威嚴兩盡其道史珪光州刺史㑹歳飢淮蔡民流入州境珪不待聞即倉減價以糶所全活甚衆吏民詣闕請植碑頌徳者數百人司馬池天禧中知光山縣於民有信事不俟催促而集王堯臣天聖初知光州歳旱盜發民倉法當死堯臣曰此飢民求食荒政所當恤遂以減死論袁廓西平縣主簿勾稽漏籍得民丁萬餘州將薦其勤職就遷上蔡令又以課最擢太子右賛善大夫吳育知蔡州設伍保法以檢制盜賊時有告妖人千數聚確山者詔遣中使往捕育曰此特鄉民用浮屠法相聚利錢財爾一弓手召之可致頃之召千人至械送闕下皆無罪釋之而告者伏辜富弼以大學士徙知蔡州不以名位自驕專意民事有情必達魯有開知確山縣大姓把持官政有開治其最甚者遂以無事興廢陂溉田數千頃富弼守蔡薦之以為有古循吏風後又知信陽軍歐陽脩知蔡州初鎮太原自請易蔡州大畧曰時多喜新竒而臣惟守拙衆方興功利而臣惟循常孫瑜知蔡州毀吳元濟像以其祠事裴度大水縁城隙入瑜使囊沙數千扞其衝城得弗壊劉敞通判蔡州鑿池開河以利灌溉其弟攽亦知是州文章政事侔古循吏丁諷治平中知蔡州設法賑飢活者六十萬人籍為兵者又數千詔移知亳州蔡人攀慕號呼事聞復還任及代去閉城拆橋不得行者累日王質知蔡州清浄慈惠為政不苛毀吳元濟廟更立狄仁傑李愬像祠之蔡人號為雙廟吕公著治平中知蔡州釀水泉灌田易軍營草舍以瓦脩孔子廟薦舉孝行善政為多范純仁神宗時知信陽軍以治行著吏民悦服劉安世元祐中知信陽軍有治行傅堯俞知新息縣清而不耀直而不激司馬光稱其賢歐陽棐知蔡州蔡地薄賦重轉運使又為覆折之會有詔禁止佐吏憚使者不敢從棐曰若憚而不行何以為長吏命即日行之盧士宏知信陽軍官捕為妖術者餘黨懼及羣聚山谷間士宏請减其罪招之即相率歸向宗回徽宗時知蔡州擒劇賊并其黨類歳飢發廩興役飢者得濟而官舍帑廩一新劉紹先靖康初京城失守紹先以兵數千屯光州故是時諸郡多破而光得獨全葛宻光州推官豪民李新殺人嫁其罪於邑民葛華獄具宻得其情出之法當賞宻白州使勿言王聞詩知光州盡心民事能守其父十開家法去官民思慕之不忘柴中行嘉定中知光州嚴保伍精閱習増闢屯田城壕營砦器械糗糧百爾具備治行為淮右最王霆知光州時北兵至民奔遁相屬霆分遣問探整飭戰守之具大戰于謝令橋光人遂安元張昇至大中知汝寧府民有告寄束書於其家者踰三年取閲有禁書一編且記里中大家姓名於上昇亟呼吏焚其書曰妄言誣民且再更赦矣勿論李不作西平縣尹化民以徳不尚威嚴民興禮讓暇日聚徒親為講授人皆以不學為耻汝水泛溢率民築防補罅其患遂息和元恕西平縣尹勸農興學折節好賢不為表襮民有訟不厪鞭朴惟諭以曲直人知改悔在任五年公無負租蝗不入境本朝萬孟雅洪武初汝寧知府㢘公威厲吏民畏服奏清天下户口禁除奸弊時稱其能詹俊洪武初汝寧通判公勤正直以興學勸農為先務嘗役所部築墻得錢一窖以獻俊不納曰汝民貧幸得此宜各分去後以疾告歸耆民遮道登舟挽留涕泣不忍别沈義洪武間確山知縣操守㢘介好尚儒雅興學勸農愛民如子不一年風氣和洽風俗淳美胡壽安洪武間信陽知縣飭謹有幹才嘗暴風連日傷禾稼阻漕運壽安齋戒禱之即日止息數年在官不以家隨張庸遂平知縣持身㢘潔處心正大自蒞政以來邑無墮業之民歳無飢寒之患生理日廣遂臻富庻李興邦永樂初知汝寧府知吏弊民艱凡催辦公務不遣人下屬惟發信牌皆依期完集政譽赫然及滿去民挽留不忍釋蔣良輔羅山知縣凡有科差量户貧富多寡適均民有争訟以至公㫁之脩舉廢墜不勞民傷財政聲口振宜仲庸息縣知縣優於政事凡有科辦必誓於神是以官無墮事民無怨辭尤留心學校勉勵生徒多底成材唐亨永樂初知光州練達政体勤謹自勵綽著能聲省志申達永樂中知汝寧府練達時政善革奸弊吏畏民懐汝民素勤耕稼不通貿易創立集塲軍民便之志省甘鏞永樂中西平縣典史政宜于民用薦陞監察御史省志李敏宣徳間汝寧知府有善政陞去汝民追送者萬餘人挽留不忍舍省志殷謙天順初知汝寧府政宜于民憂去汝之父老擁其馬不能行争取鞭鐙懸于治門省志王敬天順初西平知縣剛果有為吏畏民服志省侯源天順末主固始縣薄在任五年以績著省志紀振正統間汝寧府儒學教授制行端㓗理學優長造就生徒咸底于成省志胡如𤾉成化初信陽州知州愛人以徳喜怒不形民至今思之省志桂榮成化中固始縣丞慈愛得民因名之曰桂惜民因省志流寓楊愔𢎞農人其伯父椿津遭爾朱榮之難愔變姓名自稱劉士安之光州以講誦為業北齊神武遺書慰諭仍令光州刺史奚思業以禮資送後為名相穆脩宋鄆州人㓜嗜學徙寓汝陽嘗受易於种放真宗東封以經行之士賜進士出身調泰州理掾恃才忤監郡得罪遇赦敘潁州文學㕘軍時學者從事聲律脩獨以古文為倡一時士大夫翕然稱之任諒宋眉山人徒汝陽九歳而孤舅欲奪母志諒挽衣泣曰豈有為人子不能養其親者乎母為感動而止力學自奮累官龍圖閣直學士知京兆府初朝廷將有事於燕諒曰中國豈有憂乎後果如其所言馬祖常西域人父潤同知漳州路家于光州祖常七歳知學延祐初廷試第二授應奉翰林文字累官御史中丞卒贈魏郡公謚文貞祖常立朝多所建明工文章務去陳腐自成一家言詩尤圓宻清麗有文集文宗謂中原碩儒唯祖常云張桓藁城人父木知汝寧府因家焉桓以國子生累官陜西行臺御史以言事不合去汝寧盜起恒避居確山賊知其名羅拜請為帥弗聽囚六日乃擁至渠魁前桓與抗論逆順賊刺殺之後語人曰張御史真鐡漢害之可惜事聞贈禮部尚書謚忠潔曹翼本湖廣蘄州人永樂甲辰進士累官副都御史占籍光州子珣進士仕至江西右㕘議省志人物周曹䘏春秋蔡人孔子弟子樂道明義唐𤣥宗贈曹伯宋真宗加封上蔡侯漆雕開春秋蔡人孔子弟子孔子嘗使之仕對曰吾斯之未能信其器不安於小成孔子悦之唐𤣥宗贈滕伯宋真宗加封平輿侯秦冉春秋蔡人孔子弟子徳藝有成唐𤣥宗贈彭衙伯宋真宗加封新息侯孫叔敖春秋楚人嘗見兩頭蛇殺而埋之歸曰聞見兩頭蛇者死恐他人又見已埋之矣母曰有隂徳者天報以福比長虞丘相進之於楚莊王以自代為楚相而莊王卒以伯其子封於寢丘四百戸以奉其祀後十世不絶黄歇戰國楚人事楚考烈王封春申君既相楚與孟嘗君等方争下士招致賔客以相傾奪食客至三千餘人陳勝汝南陽城人少時嘗與人傭耕秦二世發閭左戍漁陽勝與陽夏吳廣度失期法當斬乃謀舉事行至陳據之勝自立為王號張楚廣為假王監諸軍山東兵皆起卒以亡秦漢吳公汝南上蔡人文帝時為河南守治平為天下第一徴為廷尉周燕汝南安成人為郡決曹掾太守欲枉殺囚燕諌不從囚家守闕稱寃詔遣覆考燕見太守曰願謹文書皆著燕名府君但言時病而已乃收燕繫獄遂不食而死五子皆至刺史太守桓寛汝南人博通經傳推衍鹽鐡之議著數萬言以成一家之法翟方進汝南上蔡人以射策甲科為郎累遷丞相司直舉劾旬歳間免兩司隸朝廷憚之永始中拜相以儒雅縁飾吏事號通明相封髙陵侯子義元始中為東郡太守王莽簒弑義起兵討之周防汝南汝陽人師事徐州刺史盖豫受古文尚書舉孝㢘拜郎中撰尚書雜記三十二篇太尉張禹薦為博士遷陳留太守蔡順汝南人以至孝稱嘗出求薪母噬指順即心動馳歸王莽末人相食順拾桑椹赤黒異器賊問故順曰黒者奉母赤者自食賊遺米受而不食母終未葬火逼其舍順伏棺號哭火遂越他舍母平生畏雷震順輙圜塜泣曰順在此舉孝廉不就年八十終於家鄭敬汝南人與同郡郅惲隠於弋陽山中惲志在從政喟然嘆曰天生俊士以為人也子從我為伊吕乎將為巢由而父老堯舜乎敬曰吾足矣惲告别而去郭憲汝南人事光武為光禄勲帝自將征隗囂憲諌曰東方初定車駕未可逺征㧞佩刀㫁車靮帝不從遂上隴其後潁川兵起乃還歎曰恨不用郭憲之言郅惲汝南西平人舉孝廉為上東門侯光武嘗出獵夜還惲拒闗不納乃囬從東中門入明日惲上書諌奏八賜布百匹貶東中門候為尉後授皇太子韓詩侍講殿中遷長沙太守子夀以亷能稱官至尚書僕射髙獲汝南新息人游學京師與光武有素師事司徒歐陽歙歙下獄當斷獲帶鉄鑕詣闕為請光武謂曰朕欲用子宜改常性獲對曰臣受性於父母不可改之於今出即辭去三公争辟不應獲善天文遁甲能役鬼神所言多驗周嘉燕四世孫仕為郡主簿王莽末羣賊入汝陽嘉從太守何敞討賊白刄交集嘉以身捍敞後舉孝廉拜尚書郎光武問以遭難之事稱為長者遷零陵太守及卒吏民立祠從弟暢為河南尹歳旱乆禱無應暢收葬客死骸骨凡萬餘人應時澍雨位至光禄勲戴憑平輿人習京氏易舉明經徴拜侍中建武中正旦朝賀帝令羣臣能説經者更相難詰義有弗通輙奪席以益通者慿遂重坐五十餘席故京師語曰解經不窮戴侍中王琳汝南人年十餘歳父母俱喪遭亂鄉隣迯竄唯琳兄弟獨守塚廬號泣不絶弟季出遇赤眉將殺之琳自縳請先季死賊矜而放遣後辟為司徒府薦士而退張劭汝陽人與范式為友式謂劭曰後二年當過拜尊親至期劭白母具鷄黍待之至曰式果至升堂拜母盡歡而别劭死見夣於式曰吾以某日死式即素服會葬式至棺起世謂之死生交鍾興汝南汝陽人從丁恭受春秋光武召拜左中郎將詔定春秋章句以授皇太子文使宗室諸侯從興受章句封闗内侯興自以無功不敢受帝曰教訓太子及諸王侯非大功耶興讓其師丁恭於是復封恭而興遂固辭袁安汝南汝陽人祖父良習孟氏易平帝時舉明經官至成武令安傳父學嘗客洛陽值大雪僵卧不出舉孝亷除平隂長任城令永平中拜楚郡太守歳餘徴為河南尹未嘗以贓罪鞠人累遷司徒子敞孫湯曽孫逢四世三公周磐汝南安成人好禮有行居貧養母和帝末就孝亷舉拜謁者除任城長遷陽夏重合令後思母棄官還鄉里母没哀毀服終廬冢側教授生徒以終其身薛包汝南人喪母以孝聞及父娶後妻憎包分出之包日夜號泣旦入灑掃父母慚而還之後弟子求分財異居包不能止乃中分其財弟子數破産輙復賑給後拜侍中稱疾不起有詔賜告歸家禮如毛義周爕汝南安成人燕之後生有醜狀駭人母欲棄之父不聽在髫鬌知廉譲十歳通詩長精禮易不讀非聖書非身所耕漁不食舉孝廉賢良方正安帝又以𤣥纁羔幣聘之皆以疾辭陳蕃汝南平輿人年十五閑處一室無穢不治父友薛勤曰何不灑掃曰大丈夫當掃除天下安事一室後舉孝亷累官樂安太守郡有髙士周璆蕃為置一榻去則懸之為豫章太守待徐穉亦然累遷光禄勲後為尚書僕射遷太尉竇后臨朝復為太傅錄尚書事黄憲汝南慎陽人安帝朝舉孝廉不就陳蕃周舉常相謂曰時月之間不見黄生鄙吝之萌復存於心郭泰曰叔度汪汪若千頃陂澄之不清淆之不濁不可量也叔度憲字天下號曰徴君戴良慎陽人曽祖遵平帝時為侍御史王莽簒位稱病歸里家富好施尚俠時稱為闗東大豪良才既髙達而議論尚竒舉孝亷不就再辟司空府不至州郡迫之遂迯入江夏山優游不仕以壽終周舉防子􅐾貌短陋而愽學洽聞為儒者所宗順帝時舉茂才為平丘令尚書言當世得失帝置章御坐以為規戒遷并州刺史革其禁火風俗陽嘉中徴拜尚書後拜光禄大夫周勰舉子少尚𤣥虚時梁冀貴盛被徴命者莫敢不聽唯勰前後三辟竟不能屈常隠處杜絶人事巷生荆棘十有餘歳至延熹初乃開門延賔及秋而梁冀誅應劭汝南人慱覧洽聞刪定律令著漢官儀又撰風俗通以辯物類名號獻帝朝拜軍謀太尉袁閎安𤣥孫少厲行苦身脩節累徵不應居處窄陋以畊學為業延熹末黨事起閎潜土室十八年黄巾賊起攻没郡縣相約不入其鄉里人就閎避難者皆得全免弟忠𢎞袁忠閎弟初平中為沛相以清亮稱及天下亂棄官居㑹稽孫策破㑹稽遂浮海投交趾獻帝都許徴為衛尉未至而卒子祕從太守趙謙擊黄巾與功曹封觀等七人皆死詔旌祕等門曰七賢蔡𤣥汝南人學通五經門徒千人其著錄者萬人徴辟不就順帝時徴拜議郎講論五經同異遷侍郎出為𢎞農太守郭亮朗陵人童年游洛陽時太尉李固以忤梁冀被誅冀告戒有敢收尸者加其罪往亮以固弟子自提鈇鉞詣闕上書乞收固尸不許因臨哭守喪不去太后聞而憐之乃聽禭歛歸葬由是顯名于時袁紹安四世孫有姿貌威容愛士養名既累世台司賔客所歸加傾心折節莫不争赴其庭士無貴賤與之抗禮輜軿柴轂填接街陌袁術汝陽人紹從子曾祖陽司徒太尉父逢累遷司空術舉孝廉累官至河南尹董卓謀廢立術奔南陽劉表上術為南陽太守術又表孫堅領豫州刺史率兵破董卓後為曺操所敗許劭汝南平輿人少峻名節好覈論鄉黨人物每月輙更其品題故汝南俗有月旦評初為郡功曺太守徐璆甚敬之府中聞劭為吏莫不改操飭行司空楊彪辟舉方正敦樸焉徴不就劭兄䖍亦知名汝南人稱平輿淵有二龍三國許靖劭從兄少與劭俱有人倫臧否之稱舉孝㢘除尚書郎典選舉尚書周毖與共謀議董卓誅毖靖走會稽後徙交州劉璋在蜀招致為巴郡太守昭烈克蜀以靖為左將軍長史累進至太傅為司徒郭憲西平人建安中署郡功曺韓約失衆從𦍑中還依憲衆人多欲取約以邀功憲曰人窮來歸我云何厄之後約病死田樂等就斬約頭送之魏王操欲條疏憲名憲不肯操嘆其忠義併與樂等賜爵闗内侯來敏義陽人涉獵書籍善左氏春秋尤精於倉雅訓詁昭烈定益州以為典學校尉遷光禄大夫以耆宿學士見禮於時雖屢廢而復起費禕江夏縣人在益士與董允齊名蜀漢後主時為黄門侍郎後代蔣琬為尚書令當國功名畧與琬比吕䝉汝南富波人少依姊夫鄧當擊賊孫策召見引置左右當死張昭薦䝉代當拜别部司馬從征黄祖有功又與周瑜程普等破曺操於南郡數進竒計大敗蜀兵定荆州封零陵侯胡綜固始人仕吳為鄂長後典軍國宻事蜀漢聞孫權踐祚遣使申前好綜為盟文文義甚美官至偏將軍兼左執法自權統事諸文誥策命隣國書符畧皆綜所造晉和嶠西平人父逌魏吏部尚書嶠有盛名庾顗嘆曰嶠森森如千丈松有棟梁之用武帝時為給事黄門侍郎遷中書令惠帝即位拜太子少傅嶠家産豊富而性至吝杜預以為有錢癖周浚汝南安成人性果烈以才理見知仕晉為揚州刺史隨王渾伐吳吳平以功封成武侯鎮秣陵遷侍中三子顗嵩謨武帝嘗問浚卿宗後生稱誰為可答曰臣叔父子恢稱重臣宗從父子馥稱清臣宗武帝並召用之周顗浚子少有重名神采秀徹元帝鎮江左請為軍􅖴祭酒累遷尚書左僕射為䕶軍將軍王𨗳甚器重之逮王敦構逆顗以忠義折之遂被害弟嵩累官御史中丞干寳新蔡人徙嘉興祖統吳奮武將軍寳博覽書記為著作郎平杜弢有功賜爵闗内侯累遷散騎常侍著晉記三十卷咸稱良史著搜神記三十卷劉惔曰卿可謂鬼之董狐又為春秋左氏外傳註周官周易凡數十篇孟嘉江夏縣人永和中為桓温府叅軍九日温宴龍山風吹嘉㡌落初不自覺温使賔佐為文嘲之嘉為文以解之敏妙超羣出人意表遷長史畢卓汝隂鮦陽人少希放達太興末為吏部郎常飲酒廢職卓嘗謂人曰得酒滿四百斛船右手持酒盃左手持蟹螯拍浮酒船中便足了一生矣及過江為温嶠平南長史與阮孚等為八達周訪汝南人少沉毅周窮振乏家無餘財元帝渡江㕘鎮東軍事領兵屯潯陽鄂陵討華軼杜弢二寇遷荆州刺史長子撫有父風撫子楚楚子瓊有將畧三世皆為將軍瓊子虓領梓潼太守朱序義陽人寜康初拜梁州刺史鎮襄陽是歳苻堅遣其將苻丕等率衆圍序序母韓自登城履行謂西北角當先受敝遂領百餘婢并城於其角斜築城賊果攻破西北角衆守新築城丕遂引退李充汝南人兄弟六人易衣而出竟曰而食其妻竊欲分異充請呼隣里親戚共訣妻信之既召至充乃前跪以妻言白母出之南北朝周顒顗七世孫善老易清貧寡欲隐於建康之鍾山每賔客㑹同顒虚席晤語辭韻如流聽者忘倦終日長蔬王儉問曰卿山中何所食顒曰赤米白塩緑葵紫蓼後起為國子博士著四聲切韻朱脩之汝南義陽人仕宋隨右軍劉彦之北侵留戍滑臺為魏所攻城陷被軌太武嘉其節以為雲中鎮将妻以宗室女脩之潜謀南歸泛海至東萊宋以為黄門侍郎累遷雍州刺史加都督政在寛簡士庶悦附董紹鮦陽人起家四門博士累遷兼中書舍人為魏宣武所知豫州城人白早生以城南叛紹慰勞為賊鎖送江東梁武使勞之云忠臣孝子不可無之今當聽卿還國紹還申梁武之志欲以宿豫還魏魏以漢中見歸魏不許楊纂廣寧人少慷慨有志畧勇力兼人徙北齊神武起兵信都以功遷武州刺史後入闗周文授以征南將軍累封隴東郡公進柱國大將軍纂性質樸不識文字但推誠信吏人懐其忠恕子睿位至上柱國漁陽郡公周炅汝南安成人有將帥才仕陳累遷都督江州刺史進爵為侯田隴叔以江北叛入于齊炅討斬之盡復江北之地號平北將軍隋周法尚炅次子果勁有風槩始讀兵書為定襄大守煬帝幸榆林内史令元壽請御容外分二十四軍法尚曰結為方陣四面外抵六宫及百官家口並在其門車騎為壁壘此與據城何異若戰而㨗抽騎追奔㦯戰不利屯營自守帝善之唐周允元豫州安成人武后時為御史中丞同鳯閣鸞臺平章事後宴宰相詔陳書傳善言允元曰耻其君不如堯舜武三思劾奏語指斥后曰聞其言足以戒安得為過袁滋蔡州朗山人陳侍中憲之後强學博記建中初起授試校書郎累遷尚書右丞拜中書侍郎同平章事封淮陽郡公周墀汝南人第進士為監察御史集賢殿學士長史屬辭髙古文宗雅重之累遷中書侍郎議河湟事不合罷為劔南東川節度使鄭顥言于帝曰世謂墀直言相亦以直言免帝悟加拜檢校尚書右僕射卒贈司徒劉仁安上蔡人仕為潮州刺史因家嶺表生子謙累官封州刺史謙生隐唐末為留後梁開平初兼静海軍節度使封南海王王潮光州固始人與弟審邽審知並以材氣知名僖宗時舉兵畧定閩地昭宗假潮福建觀察使乃作四門義學還流亡定賦歛遣吏勸農人皆安之後為威武軍節度使審邽為泉州刺史審知梁以為閩王五代王延嗣光州人唐亡唐太祖拜王審知中書令封閩王延嗣力諌曰義不帝秦此其時也時强藩巨鎮僣號審知有效顰之意延嗣極諌審知雖不樂其言然終其身不失臣節延嗣之力也宋王彬固始人淳化中進士為雍丘尉通判筠州歴知撫州徙潭州所至能推恩行刊剗煩去蠧後歴京西河北京東河東陜西轉運使遷至太常少卿宗翼蔡州上蔡人父為虞城主簿因家焉翼篤孝恭謹負米養母好學强記經籍一見即能黙寫學歐陽顔栁書背得其楷法能屬文隐而不仕家無斗粟怡怡如也戚同文謂其有古人風卒年八十餘子度舉進士官至西京轉運使孫何汝陽人篤孝嗜古十五能屬文與丁謂齊名時號孫丁舉進士禮部廷試俱第一通判峽州遷右司諌真宗數訪以邊事景徳初知制詰何樂名教勤接士類有詞藝者必為稱揚所著有駁史通十餘篇文集四十卷孫僅何弟咸平初進士第一兄弟連魁天下時人榮之累官集賢院學士知開封府後領審刑院進給事中卒僅性端慤中立無競篤於儒學士大夫推其履尚弟侑亦登進士第官至殿中丞祖無擇上蔡人進士髙第累官直集賢院出知袁州首建學官置生徒郡國絃誦之風始盛入為龍圖閣學士歴知開封府鄭杭諸州所至治行著聞後知信陽軍無擇為人好義以政事文章為時名卿與王安石不合放棄不振士論惜之謝良佐上蔡人學於程門記問該贍對人稱前史至不差一字與程頤别一年來見問其所進曰但去得一矜字頤嘆其善學謂朱光庭曰是子力學切問而近思者也所著有論語説朱勝非蔡州人以上舍登第靖康初為東道副總管建炎初以中書舍人權直學士院草制辭氣嚴重上疏論仁義大柄髙宗嘉之累官尚書右僕射兼御營使平苗劉之亂保䕶之力居多卒謚忠靖元髙興蔡州人少慷慨多大節力挽二百弓嘗步獵遇虎跳踉大吼發一矢斃之從丞相巴延累立戰功官至右丞相商議河南省事嘗召入悉獻江南所得珍寶世祖曰何不少留對曰臣今幸富貴皆陛下所賜何敢𨼆俘獲之物卒追封梁國公諡武宣後加封南陽王劉秉文汝陽人始為廣東道廉訪使後拜監察御史遷吏部員外郎改萬户都總府副使范谷英上蔡人至正間任河中知府遷户部尚書集賢院學士龔友福光山人仕為翰林學士拜中書㕘政兼丞相事號淮南夫子本朝何徳光州人元季江淮兵起徳委身歸本朝屢立戰功陞至左軍都督府都督僉事北征還卒追封廬江侯諡莊毅趙好徳汝陽人博學多才器宇宏敞有志民事洪武初以儒士扈從車駕渡江授陜州同知尋遷安慶知府召為吏部尚書改陜西行中書省㕘知政事徐理西平人國初從諸將征伐有功積官營州中屯衛指揮僉事洪武末從靖内難大小數十戰皆賈勇争先所向克捷累官都督僉事封武康伯命還守北京理馭下寛厚得士卒心趙毅好徳子性孝甘布素善屬文工草書輕財下士以儒士舉授工科都給事中官至工部右侍郎兼詹事府少詹事子寛監察御史敏吏部郎中房安汝陽人幼聰辯性剛勁洪武中由太學生歴官江西按察使轉福建右參政召為工部右侍郎未幾出為山東右參政所至有能聲孫顯信陽人性聰敏遇事能果决鄉里推重之洪武丁夘科領鄉舉授工科給事中累官工部尚書王禮固始人貌魁偉性明敏果勁有風槩洪武間以太學生初授福建按察副使累官户部右侍郎孟禎息縣人聰敏力學處事知大體洪武中以儒士舉累官四川左布政使王平息縣人有髙才善辯説以清白自持剛明果决而勇於義洪武中以國子生釋褐拜監察御史累官左僉都御史擢交趾左布政使梁銘汝陽人洪武中以䕃補燕山前衛百户北平被圍銘戰鬬甚力累建竒功積官後軍都督僉事後陞都督同知鎮寧夏封保定伯銘處心坦夷臨事寛簡而勇敢精悍能撫恤軍士時論重之毛鵬霄西平人中永樂乙酉科鄉試除陜西邠州知州子祥山進士仕終雲南叅政祥子二鳴成化戊子舉人鳯來進士第省志尹聰西平人永樂辛夘科鄉舉除户部主簿累犒邊賑荒陞郎中尋奉勅整飭兵務斬俘邉冦布功歴官山東左叅政省志葉清信陽人由進士除監察御史後以斬俘邉冦功陞叅議省志徐廷璋羅山人由進士除工科給事中言論侃侃不避權貴累官右副都御史省志劉進光州人由貢中順天鄉試除太平府通判連遭父母喪哀毁骨立結廬墓側負土成墳手植栁栢數百株致鳥雀鷗鷺馴集之異有司請旌為孝子陞太僕寺丞子廷璽舉人廷瓉進士官監察御史省志許逵固始人正徳戊辰進士授樂陵知縣以斬流賊功陞山東僉事後轉江西副使值宸濠之變不屈被害贈禮部尚書謚忠節省志列女周顗母李氏字絡秀汝南人顗父浚為安東將軍出獵遇雨過絡秀家㑹其兄弟不在絡秀與一婢於内宰猪羊具數十人饌甚精辦而不聞人聲浚恠使覘之獨見一女子甚美浚因求為妾其父兄初不許絡秀曰門户殄瘁何惜一女父兄許之遂生顗及嵩謨由此李氏得為方雅之族髙氏五節婦俱固始人髙希鳯妻劉氏希鳯在遼東與劉氏俱被掠希鳯死劉氏被擄罵不絶口被殺仲弟藥師努妻李氏早寡携子姪避亂髙麗本朝初復挈家歸守夫墓誓不再適季弟巴延布哈妻郭氏巴延為納克楚所殺郭氏自縊死巴延達實丹妻金氏逹實丹為父讐誣死金氏與姑邢氏義不受辱俱自縊事聞詔旌之鄭氏羅山人元太尉中書平章政事李思齊妾元末汝潁兵起思齊率義兵屢復郡縣授汝寧知府後以太尉守闗陜天兵入闗思齊走臨洮後内附授江西行省左丞陞中書平章政事卒鄭氏自經死事聞追贈淑人謚曰貞烈范氏汝陽縣民莊十一妻夫亡范年二十七姑舅老子㓜家貧所親嘗勸他適遂截髪自誓縫績以養舅姑恪守婦道年八十事聞詔旌為貞節李氏上蔡人吳景和妻景和疾李毎夜頓顙北辰願以身代吳竟卒哀毁踰禮家雖艱窘極力營𦵏遺腹生子李呼天矢曰不幸夫逝今幸有子吳氏宗祀可托守節不移且事舅姑以孝著