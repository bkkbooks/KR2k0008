宋蘇軾詩屈原古壯士就死意甚烈世俗安得知眷眷不忍決南賔舊屬楚山上有遺塔應是奉佛人恐子就淪滅東坡在忠州治白居易詩何處殷勤重回首東坡桃李種新成又有西坡亦居易故迹東坡有移政種花二亭西坡有極目亭荔支園在江津縣廳西北相傳唐時所植每熟士大夫會聚於園食之塞樂園在南川縣西郭宋太守封固以邉境寧靜營治為遊宴之地內有風月賞心二亭及渌漪軒狼峱鄉在重慶山谷中俗構屋髙樹謂之閣欄不解絲竹唯坎銅鼓視木葉以别四時父子同諱夫妻共名祭鬼祈福范鎮村在江津縣西樓臺山之麓宋范鎮常寓此後人慕之因以名村赤甲戌在涪州寰宇記漢末為赤甲兵所聚金注子在江津縣北五里昔有僧憩於此有鳥㗸僧衣袖牽而上見注子隱石縫中手不能及折石畔苦檀枝桃出之遺迹尚存金叉影在江津縣西一百五十里周溪上石磧中有淺水一灣周回五六尺隱隱見雙金叉影海棠香國在大足縣海棠無香此地産者獨有香舊郡治前有香霏亭花亭俱廢江心石魚在涪州鑑湖上流江心有石刻雙魚皆三十六鱗一㗸萱草一㗸蓮花有石稱石斗在傍魚現則年豐石鏡在合州涪江有石立水心正圓如月水落時出髙可三丈俗謂石鏡名宦漢王堂永初中巴郡太守搜才禮士有善政吏民生為立祠張汭巴郡太守有德政及民吏民為之立頌德碑嚴顔劉璋使守巴郡為張飛所擒顔曰有斷頭將軍無降將軍飛怒命斬之顔色不變曰斫頭便斫頭何怒耶飛壯而釋之三國龐肱蜀漢涪陵太守有德政肱統之子也李嚴蜀漢時以禆將銃巴郡修郡城又鑿南山欲會汶涪二水使城在孤洲上晉王濬巴郡太守巴人生子多不舉濬嚴其科條寬其徭役所活數千人及後伐吳所活者皆堪為兵父母戒之曰王府君活汝汝必死之唐張柬之合州刺史故事嵗以兵五百戍姚州地險瘴到屯輒死柬之論其弊田洄渝州刺史能盡平劇賊誠信亷潔罷任之日其家甚貧趙延之大厯中巴川令時資瀘夷賊寇掠縣境延之領兵襲破之以功升合州刺史兼渝合資瀘經略巡撫使劉晏坐與元載有仇貶忠州刺史雖以罪斥然在唐為計相人不加賦而國用以饒陸贄忠州别駕以論裴延齡姦佞貶此在州十年避謗不著書集古今名方五十卷號集驗方白君易忠州刺史政治之美吟詠之富忠人傳誦至今李吉甫忠州刺史初為陸贄所擬出補明州刺史及為忠州贄貶州别駕吉甫置怨結歡人重其量南承嗣涪州守捕蜀道窮寇晝不釋刃夜不釋甲甚有忠烈譽桞子厚為序送之趙國珍黔南節度使有德政人為立碑馬植自南安都護徙黔州觀察使入川時舟泊峽中夜見白衣隄上吟曰截竹為筒作笛吹鳯凰池上鳯凰飛勞君更向黔南去即是鈞陶萬彚時不久拜相栁玭渝州刺史嘗有訓戒子弟之書可為世範李萆忠州臨江令有中官被旨奉御容還闕乃挈西州一妓而下所在肆橫毆吏取庸箄徑入其舟取娼縳岸上草奏自劾其人怖栗遜謝士夫壯之張濬光啓中涪陵刺史郡故少井泉濬窮山泉之源以竹𨗳其流民賴其利作引水碑宋張君平黔州指揮使獠兵入寇君平引兵擊破之胡旦太宗時守忠州以論事切直而出後召入史館李惟清涪陵尉蜀民尚淫祠病不療治聼於巫覡惟清擒大巫箠之民以為及禍他日又加箠焉民知不神然後教以醫藥稍變風俗周敦頥嘉祐中僉書合州判官事未經手吏不敢決雖下之民不肯從趙尚寬皇祐初知忠州俗畜蠱殺人尚寬揭方書市中教人服藥募索為蠱者窮治置於獄大化其俗單煦知昌州時詔城蜀治煦以蜀地負山帶江一旦毁籬垣而興版築其費巨萬非民力所堪請但築子城轉運使如其議沈省言巴川令慶厯間有奬諭詔碑刻尚存劉舜卿昌州駐泊都監諭降瀘水蠻八百人誅其桀驁者吕陶嘉祐中銅梁令民龐氏姊妹三人冒隱幼弟田弟壯訴官不得直貧至庸奴於人及是又訴陶一問三人服罪弟泣拜願以田半作佛事以報陶曉之曰三姊皆汝同氣與其捐半供佛曷若遺姊弟又拜聼命姚渙知涪州賔化夷多犯境渙施恩信撫納酋豪爭羅拜廷下訖渙去無警景希孟知巴川縣二年滿秩常有詩二載巴川縣誰知是與非還鄉何所有載得一清歸張啇英熙寧中知南川縣章惇經制夔洛狎侮州縣商英隨機折之落落出其上惇大喜延為上客屈堅忠州防禦使建炎初金人圍陜府堅引兵救之圍解金人執堅堅曰吾來為解圍也城茍全吾死何憾叱金人使速殺之石恕靖康之難金人踐􅏳中原恕時總潼關夔路兵馬欇南平軍事聞二帝北狩率勤王兵徑抵南京髙宗以軍事付之恕凡三守兹土甚得民情胡交修知合州却私請免上供以萬計孫安國通判南平軍喜功者誘溱潘二州納貢興版築安國極言無益乞省罷之李承約黔南節度使以恩信撫諸夷落勸民農桑興起學校居數年當代黔南人詣京師乞留詔許留一年茹孝標知南州時夷獠數為患孝標請置郡縣以統制之轉運使沮其議朝廷繼得其詳卒建軍壘自是逺人安之安丙淳熙間調大足主簿秩滿詣闕陳蜀利病十五事言皆凱切陳仲酋紹定間知昌州政事一以愛民為務嘗立義倉以備凶嵗民懷之余玠四川安撫制置使兼知重慶府大更敝政遴選守宰任都統張實治軍旅安撫王惟忠治財賦監簿朱文炳接賔客皆有常度又興學養士輕徭薄征蜀既富饒乃罷京湖之餉邉關無警自寶慶以來蜀閫未有能及之者趙汝廪知涪州勸農興學民為立生祠于學宫以配程黃尹譙四賢曹叔逺通判涪州有善政後徙守遂寧時營卒相率稱亂勢張甚叔逺入境輒戢其徒無肆暴曰此江南好官員也曹豳重慶府司法參軍郡守度正欲薦之豳辭曰章司祿母老請先之正敬嘆焉張珏以都統制守合州珏出竒設伏算無遺䇿其治合士卒必練器械必精賞罰明信人人用命元兵攻之不克遂引去然自開慶受兵民凋弊甚珏外以兵護耕內教民墾田積粟公私兼足德祐初命知重慶府王仙以蜀都統守涪州元兵攻圍無虛日勢孤援絶宋亡之二年城始破仙自刎斷其吭不殊以兩手自摘其首墜死曹琦知南平軍元兵來攻被執脫身南歸制置辟主管機宜文字聞都統趙安以城降就守禦地自經死馬坤以六郡鎮撫使守咸淳府元兵攻城楊文安與坤同里開諭之使降不從既而城陷坤悉力巷戰力屈就擒死之本朝潘賢洪武初知重慶府在任公勤亷謹吏民畏服豪橫屏迹任毅洪武間知重慶府有幹濟才事雖繁劇舉無遺滯以亷能著聞邢冕永樂初任巴縣知縣後升重慶府知府禁約橫科袪除宿弊政績甚多張瑛永樂中榮昌知縣居官六載門無私謁飲食惟蔬菜而已至今民思慕之沈定永樂中知涪州亷能有為興學校課農桑孜孜不怠吏胥畏威而民樂其業胡靖永樂中知重慶府亷明耿介有守有為吏畏其威民懷其德卒之日無不流涕者饒伯純永樂中任巴縣丞亷幹勤愼民懷其德邑民謡曰井井鄉鄉絶呌嚻桑麻盈野黍盈郊如何百姓相安好縣有清官説姓饒蔣誠宣德中知巴縣亷愼公勤興學勸士邑民謡曰卓魯芳聲自古聞千年之後有斯人董狐再著循良傳定有吾巴蔣牧民後擢御史升廣西按察副使民至今懷德王溵景泰中以國子生授巴縣知縣為政慈祥節儉以愛民為主越三年卒于官邑人為賻以歸其柩復立祠祀之陳秉彛成化中知忠州勵操愛民興學勸士凡政有禆於百姓者即以身當之利害非所計也蒞任以來吏畏其威民懷其德張黻成化中知涪州清介公明愛民如子流寓長孫無忌洛陽人纍官太子太傅同中書門下三品唐髙宗時諌立武后後許敬宗誣奏無忌反削官爵謫黔州卒蕭遘蘭陵人仕唐自右史竄黔州南逰三峽夢神人曰險不足懼公詰之曰我紫極宫黃魔神也將佑助明公出境後遘拜相劉彛福州人仕宋纍官直史館知桂州禁與交人互市交址陷欽連等州坐貶官安置隨州又除名為民編𨽻涪州程頥河南人宋哲宗時擢崇政殿説書紹聖間削籍竄涪州頥至涪寓居北巖注易所漸皆為名士涪人祠頥於北巖黃庭堅洪州人以修實録謫涪州别駕黔州安置自號涪翁與秦太虛書曰某屏棄不毛之鄉以禦魑魅耳目昏塞舊學廢忘是黔中一老農耳王充果州人遊黔南太守髙請以訓黔之學者時黃庭堅被謫於州相愛二嵗書以頌王之德曰南充王子美其質粹溫久與之逰見其循理而不競誠心而不疑尹焞洛人少師事程頥宋靖康初以薦召至京師不欲留賜號和靖處士次年金人陷洛焞闔門被害焞死復蘇後劉豫以禮聘焞不從乃自商州奔閬紹興四年止於涪涪頥讀易地闢三畏齋以居後以范沖舉召充崇政説書以疾辭沖奏命漕臣至涪親遣始就道祭頥而後行人物周巴蔓子巴國人仕為將軍周末國亂蔓子請師于楚許以三城楚已救巴遣使請城蔓子曰藉楚之靈克濟禍難誠許楚王城可持吾頭往謝城不可得也乃自刎使者以蔓子首報楚王王曰使吾得臣如蔓子者用城何為乃以上卿之禮葬其首巴亦舉其尸以上卿之禮葬於施州漢譙君黃合州人仕為諫議大夫後避王莽又不仕公孫述國人作詩美之尹珍南川人桓帝時從汝南許慎學受五經還牂牁以教授其鄉於是南域始知學嚴舉巴郡人延熹中為父行喪踰禮過恩旌表門閭舊有嚴孝子碑在郡儀門謁渙江州縣人仕為汝南太守有公直之稱其同邑又有司𨽻校尉程焉度遼將軍譙章皆有名於時然溫江州人仕為度遼將軍守桂陽長於治民能得其心杜孝巴郡人善事母以孝稱母喜食魚膾杜役於成都買魚盛以竹筒以草塞之投於中流祝曰願母得此食婦汲於江忽見竹筒橫來觸岸異而取之見二魚曰吾夫所寄熟以進姑聞者嘆其孝感三國甘寧巴郡臨江人仕吳嘗獻計謂先敗黃祖鼓行而據楚關可漸窺巴蜀孫權深納其説以戰勝為名將晉李驤涪人與城都杜軫俱為尚書郎與軫齊名每有論議朝廷莫能踰之時號蜀有二郎文立巴郡人少在蜀時遊太學師事譙周門人以立為顔回治毛詩三禮兼通羣書仕晉至尚書郎時西域獻馬武帝問立馬何如對曰乞問大僕帝善之母雅巴郡江州人學宗四科貢於朝除涪陵漢平令忠義著於奉上𢎞毅彰於接下西南夷跋扈以為夜郎太守殊俗感其惠化致仕而歸卒年八十二唐李文素漢初人光啓間喪母廬墓墓生芝虎鹿馴其傍刺史戴竒以聞賜粟三百石張武石照人仕王建為破浪都頭大破髙季昌於夔州為武鎮軍節度使宋張弦江津人舉進士召對直言纍仕至湖廣總領精神滿腹長於鞭算譙定涪陵人少喜學佛析其理歸於儒後至汴學易於程頥遂得聞精義造詣愈至後頥貶涪定又從之遊靖康初召為崇政殿説書以論弗合辭不就髙宗即位定猶在汴詔津遣詣行在將用之會金兵至定復歸蜀隱青城山蜀人敬之稱曰譙夫子云郝仲連昌元人建炎初金人犯河中時仲連為貴州防禦使節制河東軍馬屯河中就權府事金將羅索以重兵壓城仲連率衆力戰外援不至度不能守先自殺其家人城陷不屈及其子皆遇害後贈明州觀察使馮時行巴縣人紹興初召對以斥和議除知萬州秦檜風使者捃拾其罪坐廢所著有縉雲集趙性合州赤水人紹興中入對集英其䇿有曰以括囊為深計臣知其人矣主和議者當之以首鼠為圓機臣知其人矣杜言路者當之考官大驚以為劉蕡無以過秦檜欲捃拾之會檜卒而止楊載涪陵人以功名自負金人立劉豫載白張浚願得白刃橫行敵中當手刃劉豫并金兵以報丞相浚壯其言遂遣之載偕十士至金偽降金任之官行反間豫果廢及欲行謀而十士已亡其八遂決歸計浚以其名聞時賜從事知逹州永睦縣羅志沖合州人潛心六經最精於易作解發明程氏為多度正合州人紹興初進士早從朱文公誨以正心誠意之學歷官國子監丞上疏極言李全必反且獻斃全之䇿有三纍遷禮部侍郎致仕所著有性善堂文集李興宗臨江人舉進士早有雋聲仕至國子博士以清節著號謙齋所著有論孟俗解吳甲臨江人少苦學有文名仕為祕書監兼侍讀石公恕江津人以武功大夫知威州有能名嘗作文刻碑戒子孫不得分異有御製八行碑刻于學趙卯發昌州人以上舍登第為遂寧州司户咸淳中權通判池州元兵渡江池守王起宗遁卯發攝州事為守禦備明年大兵至卯發知不可守乃置酒與親友飲訣謂其妻雍氏使先出走雍曰君為忠臣我獨不能為忠臣婦乎及兵薄池卯發與雍同縊從容堂而死事聞贈官諡文節雍贈順義大夫趙立重慶人第進士以上書忤賈似道被謫德祐初起為大杜令湖北提刑使蜀趣諸將入衛至重慶則咱萬夀已降元張與方城守為後圖立無以復命還至涪沈水死本朝陳志巴縣人為燕山護衛指揮僉事資性謹實有謀勇洪武末從靖難戮力戰陳始終不懈永樂初封遂安伯蹇義巴縣人洪武乙丑進士授中書舍人尋擢吏部右侍郎永樂初轉左侍郎進升尚書兼詹事府詹事洪熙改元升少保兼吏部尚書宣德中纍進少師特賜第一區卒贈太師諡忠定官其長子為尚寶司丞義深沈簡靜貴而能謙有獻納匡翼之功郭璲巴縣人洪武中由太學生歷仕仕途有能聲纍遷湖廣布政司左參政石溫江津人洪武中領鄉薦擢陜西鳯翔府同知才能著稱尋升交址布政司參議王鐸江津人洪武中由舉人授遂寧教諭學識過人纍官至浙江布政司參議王鐸榮昌人洪武中由太學生擢蘇州府嘉定縣丞政績著聞纍官交址布政司右參政莫仲昭銅梁人洪武中以國子生入仕才能超異纍升浙江布政司所至有惠政李琳定逺人洪武末由鄉舉擢監察御史持憲得體升福建按察司副使謝庸忠州人永樂初由鄉舉擢監察御史巡歷有能聲升山東按察司副使蹇賢巴縣人永樂中由鄉舉擢監察御史持憲公平纍官湖廣右布政使有氷檗聲蔣勉涪州人永樂中進士擢刑部主事練逹刑名歷升本部右侍郎能聲著聞江淵江津人宣德庚戌進士纍官尚書太子少師有名于時張清巴縣人宣德中進士歷官中外有聲稱鄒智合州人生而頴敏過人十二嵗能文章領成化丙申鄉薦第一登進士授庶吉士以直言謫死慷慨忠愛為理學名臣牟俸由進士入仕歷官纍升副都御史端嚴冇守奮發敢為竟以是賈禍卒于戍所家無寸資識者惜之喻茂堅榮昌人正德辛未進士授銅陵知縣擢御史巡歷有聲出守真定河間政成升貴州參政福建按察使浙陜左右布政使陟右副都御史入為刑部侍郎進尚書致仕歷官四十年清苦一節時論歸之贈太子少保諭葬祭子祐溧陽丞祐黎平知府孫應龍寶慶經歷應豸尋旬通判應台貴陽知府曽孫思恪户部員外郎仙釋王方平前漢時棄官隱遁在太尉陳耽家尸解魏青龍初於平都山升天杜成先生為作神仙傳隂長生後漢延光初從馬明生求仙法乃得長生於青城山中取太清神丹經授之遂别去後於平都山升天爾朱洞其先出於元魏爾朱族遇異人得道唐僖懿間落拓成都市中於江濵取白石投水衆莫測後自果至合賣丹於市價十二萬刺史召問其直更增十倍以其反覆盛以篾籠棄諸江至涪州漁人姓白石得之授以丹二人俱仙去張商英為作傳蘭沖虛涪州人居於精思觀唐神龍乙巳秋一夕乘雲而升王帽仙出入闤闠為人修弊冠號王帽子暮則卧於涪州天慶觀一夕尸解而去道士為葬之月餘自果山貽書致謝韋昉蜀人夜泊涪陵江忽遇龍女遣騎迎入宫後昉登第十年知簡州龍女復遺書相迎敕命昉充北海水仙顯嵩銅梁人姓李住巴川之宣密院餘三十年足迹不出鄉里宋紹興中集衆告以將逝作頌曰八十年中常浩浩宏開肆貨摩尼寶也無一個共啇量不是山僧收鋪早端坐而寂淨業石照人姓文少業屠有羊既乳將殺之二羔㗸刀伏門後業感嘆棄家為僧忽大悟作頌曰昨日羅剎心今朝菩薩面羅剎與菩薩不如一條線宗璉石照人姓董嗣潭州大溈山善果有僧過其家指燈示之曰燈照汝汝照燈耶答曰燈亦不照我我亦不照燈扁其室曰窮谷劉錡鎮荆南問窮谷何義璉曰心盡曰窮性凝曰谷隨嚮應聲不疾而速明一統志卷六十九
