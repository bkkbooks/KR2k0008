body:
  text: 明一統志卷六十九明李賢等撰敘州府東至瀘州江安縣界一百四十里西至馬湖府平夷長官司界六十里南至鎮雄府界四百七十里北至嘉定州榮縣界二百五十里自府治至南京六千三十五里至京師九千二百五十里糧十萬石零建置沿革禹貢梁州之域天文井鬼分野古為𤏡國漢犍為郡治此東漢徙犍為治武陽南齊復為犍為郡治梁武帝立戎州又置六同郡於南廣縣隋初廢六同郡而存戎州大業初改州為犍為郡唐武德初復為戎州移治南溪貞觀初復移治僰道天寶初改州為南溪郡乾元初復為戎州宋初州治冝賔政和間改為敘州取西戎即敘之義元升敘州路以敘南等處宣撫司治此本朝洪武初改為敘州府領縣十宜賔縣附郭本漢犍為郡僰道縣後周改外江縣隋復為僰道縣唐為義賔縣宋始改宜賔縣元仍舊本朝因之編户二十八里慶符縣在府城南一百二十里本漢犍為郡南廣縣地宋政和間始置慶符縣及置祥州宣和中州省以縣屬戎州元仍舊本朝因之編户六里冨順縣在府城東北一百八十里本秦巴郡地漢置江陽縣屬犍為郡東漢末劉璋於縣立江陽郡後周改洛源郡治富世縣隋省郡以縣屬瀘州唐改冨義義縣宋初置富義監太宗時改為富順監治平初置冨順縣元升為州屬敘州路本朝復改為縣編户九十二里南溪縣在府城東一百二十里本漢犍為郡南廣縣地晉屬朱提郡後廢梁復置南廣縣及六同郡隋初郡廢仁夀初改為南溪縣屬戎州唐宋元縣仍舊本朝因之編户一十九里長寧縣在府城東南二百七十里本漢犍為郡漢陽江陽二縣地隋為瀘州瀘川縣地唐置長寧州宋初為羈縻州熙寧中始置洧井監屬瀘州政和中建為長寧軍元屬馬湖路本朝改為縣并改今屬編户一十七里髙縣在府城西南一百五十里古夜郎之地唐置髙州宋初為羈縻州後屬長寧軍元屬敘州路本朝改為縣編户一十三里筠連縣在府城西南二百五十里古西南夷部漢置定川寨唐為定川州宋為羈縻筠連二州元初立筠連州及定川縣屬永寧宣撫司尋廢縣存州本朝改為縣并改今屬編户四里珙縣在府城南三百三十里古西南夷部唐始置珙州元初為下羅計長官司尋復為珙州本朝改為縣編户六里興文縣在府城東南三百四十里古夜郎之地號大壩都唐始置晏州元改戎州屬馬湖路本朝初改為戎縣及改今屬萬厯甲戌以平蠻後改今名編户一十二里隆昌縣在府城西一百五十里新置編户十里郡名犍為漢名南溪唐名敘南元名形勝東距瀘水西連大峨南通六詔北接三榮圖經地枕大江當舟車之衝譙樓記負山瀕江地勢險阻張鼎修忠利廟記鈎連三江宋黃庭堅重修戎州舍利塔記地當衝要元史宋以長寧州地最當衝要用升為軍立安寧縣風俗夷夏雜居風俗各異寰宇記其士靜而有文其民朴而易治宋李宗丞園記民力於穡士競於文富順志州以涪翁重詩禮之澤漸漬至今宋黃庭堅祠堂記俗慤而願且知禮遜錢士開富順泮水巷記俗不知醫宋史周湛傳山川仙侣山在府治西北産仙茅上有真武宫竹木森翠山腰有清泉一石洞四其一曰楊仙洞相傳宋楊道人升仙之地翠屏山在仙侣山後四時常青因名七星山在府治東七峰圓秀狀若連珠故名小梁山在府治東方輿勝覽云四時常雨霖霪不止俗呼為大漏天小漏天寰宇記謂之大梨山小梨山東山在府治東北上有報恩寺桂叢山在府治北其上多桂因名赤崖山在府治西北崖岸壁立瞰大江色若綺霞師來山在府治西相傳昔有人浮舟於此忽見一道人飄然自空而下止於峰頂即之不復見土人呼道士為師故名一名書樓山朱提山在府城西五十里山出銀漢諸葛亮書漢嘉金朱提銀採之不足以自食唐韓愈贈崔立之詩我有雙飲盞其銀得朱提乳洞山在府城西南六十里有泉如乳一名浮洞山可峰山在府城北七十里一名梯雲嶺夷牟山在府城南一百里宋蘇轍詩岸濶山盡平連峰逺飛漢定誇山在府城西一百里山坡荔枝連袤多屬廖氏宋黃庭堅詩廖致平家緑荔枝即此山所出洞山在定誇山後下有洞容數十人上有一覽亭登眺為勝石城山在府城西南一百里髙峻環列如城隋史萬嵗詩石城門峻誰開闢更鼓誤聞風落石界天白嶺勝金湯鎮壓西南天半壁石門山在慶符縣治南下瞰石門江其林薄間多蘭有春蘭秋蘭鳯尾蘭素蘭石蘭竹蘭春蘭花生葉下素蘭花生葉上黃庭堅幽芳亭記一幹兩三花而香有餘者蘭一幹十數花而香不足者蕙一名蘭山興慶山在慶符縣南一十五里迎祥山在慶符縣東二十里宋置祥州以此山名漢陽山在慶符縣北八十里諸葛亮平西南夷駐軍此山山腰有洞神龍居焉禱旱輒應同心山在富順縣治東一名東山宋邦人吕震吕造讀書其上俱以文顯故名凌雲山在富順縣治西大江前橫一峰突兀邦人以為登眺之地龍山在富順縣治北下有西湖馬腦山在富順縣與凌雲山相接西北諸山唯此最髙有二巖一曰中巖唐咸通間依巖鐫大佛像宋僧自悟架屋三百楹天聖初藏兩朝宸翰林靈素毁佛法欲毁其像寺僧以泥塗之後罷禁始以水洗滌一曰北巖下有羅漢洞內有石佛五百洞前有水簾廳祿來山在富順縣治東與學宮相對宋蒲侯津以此山秀異因闢學宮向之相連有桂子山亦勝峰也養秀山在富順縣治西一峰聳秀一名積草山勸農山在富順縣治南宋太守黃商卿嘗勸農於此上有洗馬池清泉洞嘯臺聖燈山在勸農山南上有聖燈院嘗有燈出煙霧中初為一炬忽三忽五俗謂之聖燈見則封域寧謐年嵗豐稔山之西有石峰峭拔髙數丈如佛像俗呼為聖佛傍有二石如侍者蓋天成也神龜山在富順縣治北下有湖當湖之西嘗有巨龜出小龜從之不可勝數故名山後有洞宋里人李見讀易於此今名讀易洞兜子山在富順縣南三十五里聳拔髙峻有巨石若兜輪之形故名虎頭山在富順縣西南六十里髙六十餘丈形如虎踞故名宋咸淳初嘗徙縣治此山龍騰山在南溪縣東二里下瞰大江其北有石橫空長四丈許世呼為龍橋舊有黃庭堅大書涼暑亭三字平蓋山在南溪縣西一十五里有三山九隴惟此山一峰特出頂圓而平故名一名牛心山一名瑪瑙山漢真人劉景鶴隱此煉丹有石洞深邃上有石穴圓如盞有水出焉往時遊人憩此掬水飲之取之不竭又有木葉紛如篆謂之符葉龍透山在南溪縣東北二十里山腹有洞穴深廣十餘丈可盧山在南溪縣南五十里山多笻竹龍磨角山在南溪縣西六十里其山巉巖有劃破迹相傳龍嘗于此磨角桂輪山在南溪縣西七十里石壁上有黃庭堅所書大桂輪山四字雲臺山在南溪縣北八十里元廖蜀望詩雲臺突出衆山低小徑縈紆上石梯古寺獨存人寂寂斷碑惟覆草凄凄滿空香散春蘭綻萬壑煙生曉樹迷為愛其間風景好登臨幾度杖青藜牛心山在長寧縣治東山形崒嵂如牛心然筆架山在長寧縣治西山分數峰狀如筆架故名宋王象之云能興雲雨觀此山之顯晦以驗天隂晴金龜山在長寧縣治南以形似名寶屏山在長寧縣治北其山如屏舊有登雲亭為遊賞之地越王山在長寧縣南二十里相傳因有越王墓而名佛來山在長寧縣北一百五十里相傳時有佛現於此閣梯連珠山在髙縣治南其山峭壁如閣其路盤旋如梯故名亭臺山在筠連縣南二十五里髙聳如亭臺芙蓉山在珙縣北三十里衆峰聮秀形如芙蓉摩旗山在興文縣治東形如旗南夀山在興文縣治西南萬松嶺在長寧縣治西宋趙史君詩清溪狹徑小橋東春入桃花處處同我為日長無一事偶然來此聼松風鳯嶺在長寧縣治西其形如鳯虞公峽在長寧縣治東昔有石閉塞水道不通舟楫宋嘉定間故相虞允文子斻孫來為郡守開鑿大石舟楫始通至今賴之水簾洞在府城北一十五里瀑布如簾下垂數尺宋黃庭堅嘗置竒觀亭於傍楒子洞在長寧縣北三十里內乳結遍洞如楒故名又有朝真洞在絶頂樓真洞在山谷之拗寧真洞尤亢爽有樓閣堂奧之象郡守舊嘗勸農於此名勝宦逰皆有題詠海棠洞在長寧縣治西昔郡人王氏環植海棠春時花開郡守宴僚屬於其下乞子石在府城南有石夾青衣江對立如夫婦相向俗云人無子禱之有應大江在府城東一名蜀江又名都江圖經云水出茂州岷山下因名岷江亦名汶川蓋岷汶聲訛也流與馬湖江合馬湖江在府城南源出沈黎實大渡之支流亦名瀘水一名金沙江諸葛亮五月渡瀘即此江之上流也鎖江在府城北兩岸大石屹立昔人因置鐡絙橫截其處控扼夷羌故名石門江在府城西南一百三十里俗呼橫江又名小江源出烏蒙蠻部經本府境與馬湖江合中有灘其水常若鐘鳴名曰鐘灘青衣江在南溪縣南一十五里古有青衣國與敘州相鄰其人因賈至蜀見漢衣冠遂求內屬江因以名金川在富順縣治東一名中江又名中水線水珠江源自漢州流過縣西至瀘州入大江其在富順中流有石堆髙出水面分布兩層前三後七世傳為三台七曜石西湖在富順縣治西方廣二頃水潔魚美菱芡蒲荷充滿其中宋程驤詩飽聼西湖似輞川有懷無處問長年四山攢翠爭為地一水涵空為補天介湖在長寧縣治西植荷其中傍舊有鬱藍樓蘇溪在府城西北有前後潭瀑布千尺懸崖而下涪溪在府城北一十里宋黃庭堅遷涪州别駕號涪翁後安置戎州乃逰是溪而樂之故名馬鳴溪發源慶符縣西會馬湖江逹于蜀江昔士人鄭氏牧溪上馬産龍駒四蹄利爪朱騣頳尾髙可七尺將以為貢至溪口忽振鬛長鳴躍於水故名鰲溪在富順縣治東合金川宋李文淵築室臨溪後登進士人謂之占鼇頭故名榮溪在富順縣西二十里發源成都府仁夀縣過榮縣合金川流入于蜀江福溪在南溪縣治西北舊名覆溪唐劉崖為郡都督改今名九盤溪在南溪縣治南相傳昔有童子遇龍翁于此冷水溪在長寧縣治西北發源筆架山下東溪在長寧縣治東發源白崖山下流與嘉魚泉合西溪在長寧縣治西發源越王山流與桃源合硯石溪在長寧縣牛心山後峰石如磬可以為硯復寧溪在髙縣治東自珙縣發源下抵慶符縣可通舟楫定川溪在筠連縣治西亂流自山而下成溪唐定川州以此為名荔枝灘在慶符縣北二十里古崖傍多荔枝樹故名石笋灘在南溪縣西三十里江灘險甚窮冬水落岸有石長數丈如笋銅鼓灘在南溪縣學東學舊未利近世灘之上流有石磧生髙十數丈壅水自巽方而去自是文物稍振小桃源在長寧縣冷水溪側發源筆架山下宋嘉定間張太守市民田植桃李創置亭榭軒堂之類又掘地得銅牌曰小桃源詩云綽約去朝真仙源萬木春要知竊桃客定是會稽人黑水在府城東南一十五里即南廣溪輿地志謂此水即禹貢之黑水按禹𨗳黑水至於三危南流入于南海今此水則自西南夷界流至南廣洞入于江名同處異也五龜潭在富順縣治西其崖上有突出如龜形者五每隂雨則水面湧沸若有物焉禱旱有應涇灘瀑布在長寧縣東七十里自山頂飛流而下數十丈其下有潭怖心駭目俗呼為一匹絹金魚井在府城南黃庭堅寓居時酷喜茶令人遍汲井泉試之惟此水品為第一月岩井在凌雲山下清泠芳列煮茗尤佳龍女井在長寧縣治東昔人見小女出入井間坐石上以理髮故名淯井在長寧縣治北泉有二脈一鹹一淡取以煎鹽塞其一則皆不流又謂之雌雄井葫蘆井在南溪縣西北五十里劉景鶴嘗取此水煉丹鑿井口如葫蘆故名天池在府城西二十里一名滇池又名波淩池唐韋臯詩春暖魚拋水面梭晚晴鷺立波心玉復魚池在府城東宋張俞有記銅鼓池在慶符縣西三十里周回四十餘丈四時不涸中有一