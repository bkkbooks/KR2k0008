孤及作記稱其善政焉遊茂洪開元中南豐縣令恩威並行截溪水為五陂溉田四千餘頃又鑿石渠以溉枯田迄今民祠之獨孤及寶應初為南豆令聞長安失守作詩寄所親藹然忠義之氣為政簡靜暇則以琴書自怡宋慎釴康定初知建昌軍治尚大體明而不苛威惠並行民咸戴之曹觀皇祐中知建昌軍李覯有詩送之云要知賢者善居官法自嚴明性自寬周旻慶厯初南城主簿取豪猾尤難治者一二人繩以法餘皆斂迹不敢犯李秠兀豐中知南城縣政平訟理吕南公作詩以美之曰不馳幹𨽻擾租輸更秉公心憫鹽課陳繹元豐中以翰林學士出知建昌軍賔禮郡人吕南公為諸儒倡每謂人曰吾不以左官為不可意而榮於獲灌園先生灌園南公號也蘇緘知南城縣值嵗凶里中藏粟者固閉以待價緘籍得其數先發常平穀定中價糶於民揭榜於道曰某家有粟幾何令民用官價糴有勒不出及出不如數者撻於市以是民無艱食管師仁紹聖中知建昌軍有善政力行教化表其行義人戴其德為立生祠承敷紹興中知廣昌縣為政寬和儒而好禮首建學校以興賢才推誠勞來民樂從之胡舜舉紹興中知建昌軍政行俗變既代去民作遺愛亭以頌之趙公旦紹興初知南城縣剛果有為去惡如讐愛民如子創建學校士民為立生祠復立碑頌其德趙公輔知新城縣政尚寬和不用鞭朴推誠勞來民樂從其令李維芑紹興中知新城縣以愛民為本民之利病纎悉洞究省徭役興學校以儒術飾吏事民立生祠祀之崔與之知新城縣嵗適大歉有強發民廩者執其首折手足以徇盜為止勸分有法貧富安之徐鹿卿知建昌軍寬賦斂禁掊克汰贓濫抑強禦恤寡弱黥黠吏訓戍兵創百丈寨擇兵官城屬縣治行大孚田里歌誦楊應亷紹定中知南豐縣時縣遭冦燬民方飢饉而重兵屯戍應亷究心荒政酬應有方軍無擅興而民不告病鍾季玉淳祐中知建昌軍會有旨江西和糴李玉至郡才半年屬嵗旱度其經賦不能辦請於朝和糴得減三之一黃賅孫淳祐中知南豐縣政尚平易毫髮不私有西漢循吏風去任父老兒童遮道泣别者數千人饒應孫景定初知建昌軍嘗修軍學及龜湖浮橋庶政畢舉時稱其能陳處久景定中知南豐縣絶私謁著公亷條綱整飭四野肅清人以為可繼黃賅孫曰黃以寬平陳以嚴明方演孫咸淳初知建昌軍以鹽酒息鐵錢代納民稅於街道橋梁無不修葺而民不告勞政化大行元趙仁政至元中建昌總管首興學校振作士習選吏勸農嘗修城東橋以免病涉民甚便之程巨夫為記夏瓊至元中守建昌府剸繁治劇庭無弊政蒞事嚴明吏民畏服逺近稱之胡長孺元貞初建昌教授攝録事問學宏博為政得體民安其業風俗丕變聶從政大德中守南豐州其巡行境內必自齎糧清苦而能持久夙興晏罷修水利盡地力旱飢有備本朝林永齡洪武初知廣昌縣在官清慎蕭然如布衣愛民如子惟恐失所民亦愛之如父母焉張文琮洪武中新城知縣持已亷慎作興學校嵗飢不待請報輒發粟賑之遇旱必盡誠敬齋戒禱神大雨即應邑人賴之馮堅洪武末為南豐縣典史均賦曰稅鋤姦黠民作德政謡歌之山市晴山鳥鳴商旅行農夫耕老瓦盆中村酒盈呌囂隳突不聞聲尋擢為監察御史于濳永樂初為建昌知府性亷介不避權勢待吏卒甚嚴撫黎庶以恩不踰年政平訟理百廢具興郡人懷之潘同南豐知縣臨政嚴密公庭肅靜刑清弊革盜賊屏息三載之間家給人足劉敬永樂中建昌府通判以亷勤勵已以誠信待人均差役公賞罰吏民畏服四邑仰戴廬坦南城知縣剛果善斷庶事畢集時閩盜攻劫鄉村坦率兵勦捕無遺縣境翕然服其恩威周思敬永樂中知南城縣明於吏事通乎民情故剖決詳允而不為深文繩下縣稱治焉省志陳宣德初知建昌府時民多鴛鷔至治最強者十餘始知畏法復布教條施德意而郡內治荆府內竪蕭韶擅作威福以聞置之法於是官校之屬斂袵畏服四境晏然省志衡嶽宣德中以知府謫南豐知縣清操介然不以顛仆易節存心制行動以古循良為法祿薄不足養常於官舍種蔬以自給省志楊喧宣德間知建昌府亷明公恕史畏民懷至於平役雪寃興學厚俗修廢舉墜政績尤多焉省志陳員韜宣德中知新城縣心存惠愛政宜於民省志江浩正統初知廣昌縣不任刑罰專尚德化清節雅量人莫能及且維新化理惠養黎元無志不愛戴而稱頌之省黎忠正統中建昌推官閩冦攻陷鄰境忠選驍勇屢出奇謀以摧賊鋒議者謂非忠則生民罹害不可勝言省志楊清正統末建昌所千户閩寇煽亂廣昌告急清統兵勦襲瀕行用鳯仙花染足指囑家人曰他日尋吾尸以此為識後與敵戰死之省志周禮景泰初建昌同知恬靜寡欲蒞事公勤撫綏民庶若慈母之於赤子時稱為君子省志詹靖景泰中知廣昌縣存心忠厚處事安詳言論正大衣食詹如省志陳升景泰中知南城縣性介而人不敢干以私家濵于滸治民商遊者必經其門而不敢入其廬竟未能齎一私書以見亦未嘗委以挾一鄉物至家也志人以是益憚之省陳勉景泰中知南豐縣招逃移恤窮困鋤豪猾扶良善百廢具舉政聲大著未三載以憂去民歌之曰大尹志陳政事新抑豪強撫良民男耕女織歌陽春省汪澤景泰中知南豐縣忠厚之心施於有政清亷之志守持以臨民卒于官行李蕭然幾不能還省王儀景泰間以御史謫南豐典史鋤豪強恤困乏拒請托蘇寃滯境內肅然省志謝士元成化中知建昌府興禮樂清獄訟大新學宫作樂器行射法搆書萬卷貯講堂建祠以祀李覯繼表黃孝子談節婦之門為敦化表忠勸諸生生祠之為立碑頌其德省志嚴賔成化中知南城縣愛民甚切而自奉甚薄人目之曰嚴豆腐省志李麟成化中知建昌性亷介家人無肉食者卒于官倒囊無鮮綺可殮止遺俸銀半錠僚佐敬服而民至今懷之省志謝瑶成化中南城教諭學術醇正師範端嚴而啓迪生徒拳拳奬掖今祀于學宫教澤入人之深如此省志秦夔成化中知建昌府清慎有為文章政事見稱於時首建南豐祠堂省志袁仕鳯成化中知廣昌縣亷介風厲擲伏如神鋤擊豪強姦黨禠魄省志胡贊成化中知建昌府清約如寒士不為赫赫名而事有條理若素定坐屬邑殘於冦謫官得報從容賦詩曰人於方寸求清白官在朝廷任去留識者以是窺其襟度非以得喪為意也省志段敏𢎞治初知新城縣亷惠明果察政之疵以為民之病者皆剔而撫摩之凡有興作民不勞而事集羣情感悅省志沈景𢎞治中建昌同知亷靜寡欲才克佐理省志王佑正德中知廣昌縣閩廣冦至民皆逃散勢絶援孤乃引刀自刲其腹曰有城郭不能死守何以生為左右驚奪其刀後以援至寇稍退越七日復突入佑倉皇赴敵遂死之省志鄧俊正德間建昌所千户嘗隄備廣昌有盜至并令夜去浹旬盜逼挾百出卒不屈環女色誘之亦不亂獲全歸焉姚源盜熾俊奮欲自效凡戰數合皆利盜隂識之百弩惟攻俊馬忽陷淖泥中盜磔殺之當道上其事優給其子省志人物唐危全諷南城人豪勇任氣乾符末所在寇亂全諷聚衆保鄉里中仁間詔以全諷為撫州刺史招懷亡叛百廢具興危妤昌全諷弟同聚衆保鄉里歷官新撫饒信四州刺史後為陽氏所敗奔杭州子德昭居家孝友事吳越掌文翰用兵於閩機務悉以委之纍遷至丞相德昭厚重多謀有輔弼才性嗜酒雖沉醉無怠事易姓元氏孫元絳為宋參知政事宋曽致堯南豐人五代時潔身不仕宋太宗時舉進士官至吏部郎中犯顔敢言所著文集百餘卷子易占舉進士知如臯玉山兩縣嘗著時議三十篇致堯以孫布拜相追封密國公易占追封魯國公危拱辰南城人性純孝十四五代父為吏題初月詩令尹異之令專儒業淳化間舉進士纍官至光祿卿陳彭年南城人博聞強記年十三著皇綱論萬餘言真宗時上表獻針詳練儀制真宗器重之纍官兵部侍郎卒贈右僕射諡文禧黃曉南城人大中祥符間進士流落銓調二十年嘗謂大丈夫立世當自奮拔豈能碌碌出人門下通判廬州轉運使陳杲以威懾下吏有訟杲者朝廷遣曉鞠之人皆危曉謂屬部勢不可問曉治之以理略不為意識者歎服纍官至職方貟外郎危祐南城人天禧間舉進士出知邵州使者按治有所求祐告以民情不從因置笏曰某不敢擾民以固位請遂歸百姓遮道留之尋遷太學博士以言事詆宰相謫守亷州子固以善詩名鄧希顔南豐人咸平間舉進士纍官大理司直兼侍御史以危言讜論為真宗所崇信江白南城人父禹錫有節義髙年不仕躬自教授真宗時獻東封詩十五篇有詔嘉美賜以粟帛嵗時遣使存問白景德初進士為鄞縣尉父卒罷還負土營葬廬於墓側晝夜號泣將終制猶然有甘露乏異事聞賜粟帛過昱南城人景祐間進士官至都官郎中性至孝母沒刻木為像事之父沒水漿不入口者纍日慕之終身蔡冠卿南城人父充天聖間進士纍官羣牧判官冠卿慶厯中進士為原武主簿遷下邽令歷知鄢陵縣所至有惠愛遷大理少卿出知饒州後以河東飢又敵爭地出為晉守民賴以安李覯南城人通五經生徒常數百人曽鞏鄧潤甫皆其髙弟為文章自成一家天下知其名皇祐間范仲淹薦試太學助教後除太學説書既沒潤甫上其退居類藁皇祐續藁并後集詔官其子參魯許抗南城人皇祐間進士嘗知郴州鑿湖千餘頃民賴其利官至福建轉運使鄧潤甫新城人舉進士真宗時知諌院嘗極諌中人將兵及禁民耕墾前代陵寢纍官端明殿學士盛有文名哲宗初進尚書左丞卒諡安惠王無咎南城人嘉祐初進士纍官天台令棄官從王安石逰好書力學所在學者師之後安石薦為國子直講命未下而卒有文集行世吕南公南城人熙寧中一試禮闈不偶退築室灌園益肆力文學絶意進取曽肇稱其讀書為文不事俗學安貧守道志希古人一時廷議欲命以官未及而卒所著有灌園先生集曽鞏致堯孫幼警敏數千言一覽輒記嘉祐間舉進士歷知齊襄洪福明亳滄州所至務去民疾苦入為中書舍人文章與歐陽修齊名世稱南豐先生族兄叔卿舉進士官至著作郎曽肇鞏弟自幼力學為文溫潤有法治平間舉進士歷事三朝更十一州所至有聲入為中書舍人遷翰林學士與兄布同時居翰苑人以為榮龜山楊時稱其立朝端嚴有大臣體卒諡文昭朱軾南豐人嘗從曽鞏學性寬夷輕財急義悉以祖業讓弟軫獨取故居曰此先人廬不可失也鄉民熊禧饒革負官逋欲自裁軾傾囊濟之得不死仕為房州司戶朱京軾子博學淹貫登進士甲科為太學録神宗數召見論事擢監察御史彈劾無所回奪官至國子司業弟彥纍官刑部侍郎褒為屯田貟外郎襄知韶州皆有時名符授南豐人元豆間進士性恬退不事干謁纍官中奉大夫卒子行中政和進士歷官知成都府所至有政績所著猥稿四十卷曽紆鞏弟布之子以詞翰名世有志節建炎間嘗力勸湖州郡將梁端會起兵勤王後官至真寶文閣知衢州曽怘鞏孫補太學內舍纍官通判溫州須次于越建炎中金人陷越被執怘見金酋辭氣不屈責以大義金人殺之肇孫悟舉進士為亳州上曹金人破亳州悟被執抗辭慢罵衆刃劘之李涓南豐人其先居上黨駙馬都尉遵朂曽孫也仕為鄂州崇陽令靖康之難奮然募兵以應勤王詔至蔡州與金人戰死之髙宗録其忠官其子蔡延世南城人靖康中以父武全材舉建炎中為建昌軍兵馬監押金騎猝至守倅皆遁延世紏集士卒嬰城固守斬其使金人怒挑戰延世擊却之遂領軍事李浩建昌人早有文稱紹興中進士調饒州司户纍官直寶文閣知靜江府兼廣西安撫浩質直渾厚立朝忠憤激烈言切時弊人不敢干以私後徙居臨川張大經南城人紹興中進士知龍泉儀真俱有善政孝宗召拜御史嘗論中人不宜薦士以傷士風言皆切直風采振揚官至禮部尚書諡簡肅劉虢瑞南城人紹興中進士學問優贍風義凜然官至刑部侍郎龍圖閣學士遊少遊南豐人隆興間進士攝永興令郡吏督賦語侵少遊少遊呪曰剝民之政吾不忍為命杖之又取宗室武斷者繩以法豪猾斂迹遷知廬陵縣通判南安軍背有善政官至朝散大夫何坦廣昌人少貧好學淳熙中進士歷官提刑廣東杜絶請托洗寃澤民斷獄得情以亷平為嶺南首稱曽漸南城人紹熙中進士官至工部侍郎立朝有風節卒贈少師諡文莊聶子述南城人紹熙中進士官至吏部侍郎尋以制置使出師西蜀勳名益著已而致政歸適有盜殺郡守朝廷遣將欲屠城子述單騎至麾下力陳民寃乃止殺其渠魁民賴以安卒諡文定鄧均一名埛建昌人嘉定中進士官至吏部侍郎踐履純粹政事寬平所至以鄧佛稱之卒諡清惠包恢南城人世父約叔父遜從朱熹陸九淵學恢少為諸父門人嘉定中舉進士歷仕郡縣所至破豪猾去姦利政聲赫然官至僉書樞密院事卒贈少保諡文肅趙崇嶓南豐人嘉定間為石城令時冦賊橫虐崇嶓以恩信結將士討除元惡改淳安縣上疏極論儲嗣末定及中人專橫官至朝散大夫有奏議曰雲藁陳宗禮南豐人少貧力學淳祐中舉進士纍官至端明殿學士僉書樞密院事兼參知政事以直言清節著卒贈旴江郡公諡文定陳堯舉南豐人淳祐中進士官至通判臨江軍嘗承江西運司檄考試廬陵士子拔擢文天祥人謂其知人居官甘淡泊無一毫妄取學者尊為鳯岡先生趙與稙南豐人幼敏祐悟工詞章淳中舉進士知醴陵縣嚴州兵變命往知其州單易車入郡平冦亂擢知臨安府清介簡約臨民平蕭雷龍新城人景定中進士通判衢州權知府事元兵薄縣城于勢不可支將趨入閩為同安武人獲送縣權劉聖仲素與雷龍有怨殺之後聖仲北來泊舟小孤山有巨艦衝前建大旗書曰蕭知府兵繼見雷龍坐船上聖仲大呼有頃不見遂驚死元程巨夫南城人元初見知於世祖官至翰林學士承旨每有章疏言民間利病及請搜訪賢才世祖皆嘉納之卒諡文憲追封楚國公有雪樓文集子大本克承家學歷官著作郎黃覺經南城人五嵗因亂失母稍長誓天誦佛書願求母所在乃渡江涉淮行乞而往衝風冒雨備歷艱苦凡三十八年至汝州梁縣得之至治中旌表其門江學庭南城人仕至國子祭酒文章事業推重當時後進仰之若山嶽然卒贈莒國公諡文正髙必逹建昌人五嵗時父明大忽棄家逺逰莫知所之必達既長晝夜哀慕乃娶妻以養母而歷往四方求其父十餘年始得之黃州全真道院中學道三十年矣必逹叩頭哀號乞歸父不得已乃還家孝養篤至鄉里稱之吳德新建昌人工醫留京師久之常往寧夏會盜至被執脅使降德新厲聲我生為元人死作元鬼誓不從爾賊賊乃曵之井上陽欲擠之德新偶得寬即自投井中仰罵賊下射矢貫其頂罵益力賊以土埋井而去本朝吳毅南城人性敏學贍學者尊稱為學海先生洪武初徴拜博士典籖預修大明律令尋致仕歸教授鄉里為文古雅不事雕琢有學海集朱大中新城人博學能文洪武初為國子助教侍從講書多所禆益後致仕歸仍給俸尋復徴聘而大中已沒詔賜楮幣以營葬官其一子程新新城人洪武中由鄉舉歷官勤慎練逹政務纍升兵部侍郎李永年南城人性敏學慱洪武中入郡庠專業春秋永樂初登進士第為庶吉士歷遷吏部貟外郎才能茂著官至山東布政司參政鄭誠南城人永樂間為國子生選擢吏部司務端慎勤謹歷遷文選貟外郎中掌選精密宣德初進升本部右侍郎儀矩修整奏對明辨事上接下恭而有禮士類咸推重之饒禮南城人自幼敏學識者知為偉器永樂中為國子生授浙江道監察御史秉道疾邪得風憲體纍遷河南左布政使為政寬恕惠澤及人一方黎庶咸愛戴之鄧棨南城人永樂間進士擢監察御史舉清軍伍有能聲特遷陜西按察使清譽益彰進升右副都御史扈從北征卒于師詔贈右都御史官其一子程南雲南城人永樂間以能書徴起與修永樂大典授中書舍人纍官太常卿尤精篆𨽻為時所尚甘霖南豐人永樂丙戌進士為御史執法不阿有黃主事者鄉人也失律笞殺之不少貸衆愕然曰張鎮周不過如此才敏甚與李立齊名省志趙禮南豐人永樂壬辰進士嘗校兩浙士極稱姚夔既而夔魁南省旋魁天下其明於知人若此歷官提學副使省志李立南豐人永樂乙未進士為監察御史亷重剛正不輕許豫發姦擲伏風紀肅然貪墨者望風避去金壇縣民被誣為叛五里餘亷得其情為平反之上目為小李而不名仕終按察使省志賴巽廣昌人永樂己未進士為監察御史亷正有威執法不撓官吏敬憚嘗出使廣東待占城使臣私相語曰此御史嚴肅威斷不可犯纍官按察使省志饒晞南城人由監生歷官工部時營建北京公務繁劇晞以練歷幹濟事充集署大司馬事得大臣體九載遷廣西恭議自始至終以亷慎持巳以志剛直臨政及卒衣衾僅以為殮囊篋蕭然省賴瑛廣昌人永樂戊戌進士為監察御史剛明直亮遇事敢言激揚善惡允愜輿情憲度肅清獄無寃滯纍官至參政省志何文淵廣昌人永樂戊戌進士為監察御史考察四川風紀振肅時久旱輒兩人謂御史雨經貴州楊宣慰謁以銀器文綺笑而却之嘗有以鄉誼遣子間道遺金詞曰行必贐禮也且道逺地僻無知者文淵正色拒之愧而退後名其館為却金館進吏部尚書甄别精當嘉猷讜論布滿朝廷而流被天下真所謂一代之能臣也省志揭稽廣昌人永樂辛丑進士居臺官正色立朝介然有守出外治亷恕忠勤赫然有聲海南天妃廟靈應使者過必祭焉稽當考察時渡此惟投一詩云秉心玉潔與氷清黜陟亷貪佐聖明若載苞苴并土物任教沉在此滄溟仕至兵部侍郎省志饒秉鑑廣昌人正統中鄉舉狀貌古臞若不勝衣然才氣鋭甚於天下事無不可為者當官苦心焦思晝夜不息官至亷州太守及退休尤惓惓於厚俗濟人又倡為義倉修水利所著春秋提要省志俞泰南城人正統中由監生為御史激濁揚清有聲于時孜孜以正綱紀去貪理寃抑是務風紀肅然豪猾不敢肆至於處巳待人斷獄應事皆敬慎詳密官至廣西僉事省志左贊南城人天順丁丑進士歷吏部郎中豪邁不羈至其為文謹繩尺崇禮致讀之溫然可愛尤精於𨽻端重奇古得二蔡筆意為憲宗所稱善官至右布政使而卒省志黎崇南城人居父喪哀毁踰禮啜糜飲水三日不進鹽菜旦夕哭臨不輟及葬結廬墓側三年不櫛沐不留意於家事惟以文公家禮自究終喪猶縞衣糲食每遇談日輒嗚咽流涕與同邑潘烈新城余永夀皆以孝行重於鄉國省志何喬新景泰甲戌進士歷刑部郎中福建按察副使河南按察使湖廣布政右副都御史巡撫山西終刑部尚書致仕卒喬新性剛介寡與筮仕即誓不營私不阿權貴不以愛憎為賞罰守其誓終身不渝掌刑曹屬吏畏其嚴明拒絶請託或脅以禍福皆不顧所著有周禮注解左傳擷英宋元史臆見椒丘集贈太子少傅諡文肅省志張升南城人成化己丑狀元任翰林修撰歷左春坊左贊善左庶子兼侍講因災異陳言劾奏大學士劉吉詞甚激直左遷南京工部員外郎後以薦復原秩升少詹事兼侍講學士尋升禮部侍郎尚書宦業益懋凡周祀典擇賢才禁奢靡重名器省供應可身任者次第行志之致仕卒贈太子太傅諡文僖所著有柏崖集省江澄南城人成化辛丑進士歷知黟建平寧海三縣所至亷靜有聲其行政能以三代井田經界為重奏行親為履畝定賦湮圯者悉罷其征且致麥秀兩岐之瑞升松江同知改淮安節愈厲聲愈馳擢四川僉事清理屯田鹽法公私皆便三載墾乞致任省志羅玘南城人少負才氣成化丁未進士選翰林庶吉士進編修升侍讀與修大明會典進南京太常少卿公直自持人不敢千以私釐正數十年宿弊遷南京吏部右侍郎正體統慎交接署國子監事以端風化為本凡陳謨皆大本急務建儲二疏尤剴切不畏斧鉞竟謝病歸足不履城府逆濠嘗遣內使餌以金錠織錦覺而逃之深山濠叛時方病亟得知府曽璵約共討賊書猶毅然力疾答之遂卒諡文肅賜祭葬蔭敘其子所著有圭峯文集行世省志夏泉南城人任蘇州府通判蒞政亷勤平海冦有功乞休進階奉訓大夫致仕卒郡表其治狀列名宦祠省志廖秉綏廣昌人性友愛五世同堂婦入門無敢言分異者衣製無專有隨便長短服之羅一峯倫髙其誼乃造其廬言于有司旌其門曰雍睦復為文以揚之省志列女侯氏宋南豐人謝泌妻家貧事姑孝謹盜起逺近逃避姑疾篤不能去侯號泣姑側盜逼之侯寧死不從盜刃之仆溝中賊退漸蘇見一篋在側發之皆金珠族婦以為己物侯悉歸之後夫與姑俱亡子幼父母欲更嫁之侯不從曰寧忍貧養子雖餓死亦命也樂氏二女宋南豐人父以鬻果為業紹定初盜入境其父買舟挈家走建昌盜掠其舟將逼二女俱不從一赴水一見殺危氏南城人寧顔孫妻稟性貞潔夫亡時年二十七誓不二志翁姑老而子幼危氏勤紡績以資養翁姑歿營葬盡禮守莭四十四年而卒洪武二十四年旌表其門省志黃氏新城人適凃欽登進士任乳源丞覆舟死黃氏聞訃哀毁骨立誓不改莭教子順登甲申進士官禮部主事姆儀在人間至今言及之省志劉氏南城人張孺文妻孺文逝時年二十六姻戚憐其子幼家貧咸勸改適劉氏以不活為誓朝夕號泣喪明守莭三十餘年正統三年旌表其門何文淵詩云海水隂雲日枯桑嵗晚時四序有推遷寸心無改移省志朱氏南豐人謝勝華妻年二十六而夫卒子幼家貧躬織絍以養老姑壬辰兵亂歷艱危不少變姑沒號哭遂喪志明正統三年旌表其門省劉氏廣昌人陳希妻夫亡劉年二十五甘貧守志誓不再適有司以其志行卓異奏聞旌表其門省志劉氏廣昌人年十九適張世昌生二子俱亡世昌病二年不起劉侍湯藥不離左右世昌旌卒劉拔髮納于棺中誓不改節卒踐其言景泰三年表其門省志聶氏廣昌人年十六配何本容相守十年生子三女一而容病連月不起聶買藥刲股救治極力至忘寢食身雖疲而事之尤謹及容卒聶伏尸以哭聲常哽咽聞者悲哀終身無玷足為鄉閭之法景泰三年旌表其門省志談氏南豐人年十九適傳志華閲九月而志華卒居孀守莭事舅姑益謹父娶繼母捍戾譛逐諸子談因規諌憾之謀奪其志密聘鄉人威姓者而談不覺一日誘之歸寧見威備粧具請期意必為已哭謂父曰夫死肉末寒何忍為禽獸之行乎事亟遂潛匿樓復壁中水漿不進者纍日知府謝士元為之傳省志揭氏廣昌人髙宏妻宏以較藝卒建昌家僮歸之揭迎于邑之東門外哭拜畢遂自肩輿襯若男子素歷者然既殯朝夕哀哭屢絶而蘇越月餘以鎖鑰納兒袖中誘之出户遂自縊死年二十八邑令袁士鳯上其事旌表復其家省志李氏廣昌人何永孚妻嬪時年十四越二年孚卒何弛容釋粧每欲與俱柩前設一木凳兀坐而哭凳為之刓事姑如事母姑病朝夕祝告請以身代姑病勿興李哭曰吾所以不亟死者為姑在也姑既逝吾何生為哀慟嘔血不一月而死志省儲氏南豐人丘宏妻正德間流賊倅至宏方臥病度不能免自赴水死儲隨之牽裳而溺省志李氏廣昌人黃某妻正德辛未流賊破縣李出亡于牛鼻嘴賊執欲汚之罵曰我儒家婦不幸被汝執欲殺即殺豈從汝耶賊復持其子劫之李亦不顧仆地求死賊遂刃之邑令梁榮作詞哀之遣祭于其墳省志揭氏廣昌人劉敏妻年十六歸敏閲七月敏疾革囑揭改適揭號泣曰脫有不幸當相從于地下但念公姑垂老妾誓死無他敏終毁幾滅性舅卒夫之姊文黃文顯規謀鬻産之利百計用窘圖改其操揭忿詈欲自經操執益勵縣令江上其事詔有司旌其門卒年七十有六省志何氏廣昌人魏寵妻年二十有五喪所天居孀守節正德五年流賊猝至家人各奔竄何不知所從乃携幼孩走伊母家途遇賊掠之行何義不受汚大慟賊奪子而刃之何遂投水死明旦見其尸若生省志仙釋麻姑王方平之妹修道得仙嘗與方平降吳門蔡經家麻姑手爪似鳥蔡經見之心中念背癢時好以此爪爬之方平即知乃鞭經曰麻姑神人也何敢如是宴畢命駕升天而去後居建昌山中因號麻姑山唐開元中立廟壇側纍封虛寂沖應真人饒廷直唐南城人第進士嘗過武昌遊黃鶴樓忽遇異人授以祕訣自是不邇妻妾修然端居後為鄧州通判卒其柩還鄉舁者覺甚輕蓋尸解云景祥禪師南城人少警敏削髮參禮名師受戒後進明湘真如法席心法益明四方迎請之書踵至俱辭之會泐潭鍾陵帥必欲得之使者三往返不得已乃行宋宣和中浩然歸老秀峯之下未幾為范丞相奏居浮山久之跏趺而逝行保南城人幼慕禪教入慈真院為僧戒行老成言訥心明洪武中住持演法寺又住持天寧寺大振宗風叢林歸之後舉天下髙僧十一人行保與焉永樂初無疾端坐而逝明一統志卷五十三
