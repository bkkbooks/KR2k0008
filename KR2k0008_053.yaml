body:
  text: 明一統志卷五十三明李賢等撰建昌府東至福建邵武府光澤縣界二百一十里西至撫州府宜黃縣界四十里南至贑州府石城縣界三百四十里北至撫州府臨川縣界四十里自府治至南京二千三百八十里至京師五千八百二十五里糧十萬石零建置沿革禹貢揚州之域天文斗分野春秋時為吳南境戰國屬楚秦屬九江郡漢為豫章郡之南城縣地吳分豫章東部置臨川郡治南城隋罷郡置撫州治臨川縣而南城屬焉唐因之南唐以南城縣置建武軍宋改為建昌軍元置建昌路本朝初為肇昌府尋改建昌府領縣五南城縣附郭本漢舊縣以在豫章郡城南故名三國吳於此置臨川郡又析置東興南豐永城三縣晉改為新南城東晉復舊隋初省三縣入焉屬撫州唐初復析置東興永城二縣尋省宋元縣仍舊本朝因之編户二百五十八里新城縣在府城東南九十里本南城縣地宋紹興間析南城五鄉置新城縣元仍舊本朝因之編户七十八里南豐縣在府城南一百二十里本漢南城縣地三國吳析置南豐縣隋初併入南城唐復置宋因之元升為州本朝復為縣編户一百二十二里廣昌縣在府城西南二百四十里本南豐縣之南境宋紹興中析南豐三鄉置廣昌縣以道通二廣而屬建昌軍故名元仍舊本朝因之編户二十二里瀘溪縣在府城東南一百二十里即南城縣瀘溪巡檢司地萬厯七年置為縣編户二十里郡名旴江以水名建武南唐名形勝與兩粵七閩相犬牙唐獨孤及新亭記地勢殊異江山炳靈唐顔真卿麻姑仙壇記據五嶺之咽喉控三吳之襟帶宋胡斡化云江西佳郡地界閩粵宋陳起云據江南一道東南上遊宋朱熹建昌進士題名記山清水秀冠於江表宋鄭文寶江表志左臨旴水右瞰麻源輿地紀勝風俗學冨文清唐刁尚能南城羅城記林竒谷秀水透川環學富文清清慧而文唐劉禹錫云無土山無濁水民乘是氣往往清慧而文風氣和平宋曽肇軍山廟碑民氣剛而才武士以經術議論文章致大名朱熹進士題名記比屋絃誦宋張允修平逺臺記建昌佳山水比屋絃誦與鄒魯同風人物秀麗傑特宋劉岑前賢遺像記性悍好爭訟宋史其俗性悍而急尤好爭訟山川登髙山在府城內一名黃家山與郭家陳家三山相連雖不甚髙而登之可俯視周城逺矚江山之勝鳯凰山在府城北二里郡之主山也相傳鳯嘗降于此因名山側有李泰伯書堂宋太守黃師道建翔鳯曦光望仙凌雲朝真五亭於其上仙山在府城西五里絶頂有王郭二仙祠宋太守陳繹與郡人劉光道同遊賦詩云佳山多在郡城西草莽煙雲望眼迷章山在府城東北五里喬松修竹森列交蔭山中舊有永夀寺從姑山在府城南五里上有玉泉玉洞天梯天柱等竒勝又有伏虎洞麻姑山在府城西南一十里周迥回四百里即道書三十六洞天之一山有五老萬夀等峯山麓有桃花源尋真亭山半有半山亭其前第二谷水飛流而下稍上二里許有瀑布飛下三百餘尺旁有雙練枕流湧雪雲關垂玉諸亭山門榜曰丹霞小有洞天門內有忘歸亭旁有水簾巖碧蓮池會仙亭又有仙都觀觀內有澗長流世傳麻姑於此山得道故名唐劉禹錫詩曽遊仙迹見豐碑除却麻姑更有誰雲蓋青山龍卧處日臨雲洞鶴歸時芙蓉山在府城東一十里髙五里餘上有三仙祠有禱多應垜甲山在府城西十餘里麻源山之嶺北粗石層疊如垜甲形東界山在府城東二十里宋元祐癸酉冬甘露降于山之松柏逾月而釋大守王敷創神液亭於其上又城北七十里有北界山與臨川分界席帽山在府城東五十里上鋭下闊如席帽半山有石如人立太平山在府城東北五十里其勢寬平上有栖真石昔劉仙師好乘驢踏石今有迹存龍門山在府城東六十里山上有天井廪山在府城西六十里髙百餘丈上有大石如禾廩雲山在府城西南六十五里山常出雲唐時有虎巖師遷化于此楊傑詩白雲隨師來師逐白雲止山空師何在木末白雲起禪山在府城東七十里逺望端聳如坐禪狀魚蜦山在府城東八十里髙數百仞山腹有龍潭嵗旱禱雨於此劒山在府城東八十里髙數百仞延袤數十里大旭山在府城東八十五里山勢髙聳日出先見故名白馬山在府城東北九十里山有出雲峯絶頂有龍潭石笋山在府城東北一百三十里髙聳有石圓直如笋南城山在府城東南一百四十里日山在新城縣治西隔溪形勢峭拔日初出先見其頂有井深不可測鄉人呼為日岫海門東巖山在新城縣東四十里疊嶂排空與日山相望福山在新城縣西四十里舊名覆船山唐懿宗更名福船宋大中祥符中錫今名山有七佛澗軍山在南豐縣治南又名南山縣之望也舊傳吳芮攻南粵駐軍山下其將梅鋗祭馬禮成有雲物如士騎麾甲之狀今其上有三仙祠王母池其西趾有山茶洞桃花源山之西又有屏嶂山宋蔡柟詩逺岫回環碧四圍一峯岑絶萬峯低華蓋山在南豐縣西八十里金嶂山在南豐縣西南一百里根盤百餘里髙十餘里石龍山在南豐縣西一百二十里前山如遊龍繚繞數百丈天堆山在廣昌縣東南溪中宋紹興間一夕雷雨大作聞砂礫聲旦視之屹然髙丈餘童謡曰天雷飛石頭一夜成汀洲五十年內興公侯中華山在廣昌縣東二十里其山獨秀上有浮丘王郭真君之祠金華山在廣昌縣西南四十里夜有神光如金華色華表峰在府治西平地崒起鍾臺峰在府城西二十七里昔有僧懷震遇一虎蹲視震叱之且祝曰欲伴吾修行可隨我所至虎乃緩步隨之至此峯隱焉銅斗峰在府城東北九十里秦人峰在麻姑山西南相傳昔秦人逃難於此後有樵者見之面黎黑迫之則疾如飛鳥李泰伯吕南公皆有詩峯下有虎跑泉泉側有玳瑁芙蓉峰在府城東七十里狀如芙蓉簫曲峰在新城縣西南四十里相傳有靈禽飛翔其聲如簫因名筆架峰在南豐縣西一十五里三峯如筆架狀香爐峰在南豐縣西南八十里有石峯如香爐狀蓮花峰在南豐縣西北四十里狀如蓮花上有雷公石華子岡在府城西一十五里麻山第三谷相傳華子期者甪里弟子得仙翔集于此故名宋謝靈運詩銅陵映碧澗石磴㵼紅泉指此岡也駝鞍嶺在府城西一十里以形似名宋呂南公詩溪田橋畔駝鞍嶺猶記當年志未平望州嶺在府城東二十餘里嶺顛有巨石可登陟俯瞰郡城如在几席下仙君嶺在南豐縣揖仙門外宋曽致堯讀書之地一日忽有羽衣七人被髮自外至環坐室中故名百丈嶺在南豐縣東南八十里陳平嶺在南豐縣西八十餘里相傳陳平過此止於山上因名小合嶺在新城縣東二十里嶺有陳髙祖霸先祖墳墳西有東山嶂飛猿嶺在新城縣東七十里嶺西有山如張旗每興南必自旗山始宋謝靈運詩朝發飛猿嶠即此處血木嶺在廣昌縣南一百二十里旴水所出五藏巖在府城東五十里地僻而幽前層後疊宛然一石洞洞有溪流縈帶而出仙人巖與五藏巖相近臨溪峭壁數百仞天氣晴明巖中光彩動搖隱隱若一童子出沒其間舊傳望巖中有仙骨存焉故宋安時留題有仙骨留來不記春仙巖石欲化為塵之句石仙巖在南豐縣西一十五里即冷真人委蛻之所巖有漢張道陵十八世孫張洞宣冡壷公巖在南豐縣紫霄觀後有懸壺先生者不知何許人委蛻此巖巖極髙峻人迹罕至中有一榻其木堅如沉香又有石函丹竈在焉鑄錢巖在府城東五十里在平石之際中有石座如佛龕背有小竇深下以瓦石擲之聲震如撞巨鍾移時方息故老云數十年前巖中多有破壞古錢片因名丹霞洞在麻姑山西七里乃二十八小洞天有出雲山在其側宋紹興中郡人避冦登其上行半日見坡下草菴甚小一道人兀坐觀書字畫奇怪似非世間書菴前有一穴常有風氣自穴中出梯雲洞在南豐縣西南六十里有石磴百餘級紅屏石在府城西五里其石髙百仞赤色郡治目為印山曬禾石在府城東四十里每秋穫鄉人曬禾其上宋紹興間雷震石裂成四大字縱橫交錯不可曉摹鏤板傳世有道人視之曰此介我黍稷字也衆熟視之率以為然自是郡境屢豐龍石在府城東北八十里舊有龍驤首暴鬐逰其上人嘗見之故名方石在南豐縣治東古諺云沙洲到方石前南豐出狀元宋黃元明詩南山古相出方石為誰存仙人石在飛猿嶺下水岸相傳春月神仙嘗來遊人或見之有石方廣三尺餘上有腳指模全其迹倍於常俗呼為仙人足迹黿曬石在廣昌縣東二十餘里有黿潭潭北有巨石天晴黿矖其上宋時潭畔居民萬氏其家堂甓發一竅極深或謂黿穴其下坐禪石在新城縣東南二十里地名菖蒲塘其石大數圍上有巨履迹二鼓倒石在南豐縣東北一百里其形似鼓髙闊四尺餘欹側在石灘上石腰有䀶回旋若繩縈之狀金龜湖在府城東五藏巖湖深可五七尋中有一石宛然如龜故名萬嵗湖在南豐縣東二十里天井湖在南豐縣西南二十里衆山環簇一山最髙而頂平有天池圓闊十畝中不知其深龜湖在府城東五里又名蟜湖地鈐云龜湖衝破狀元生宋時水決龜湖張淵微擢狀元蛤湖在府城西南三十里有石磜百丈瀑淙飛下入湖湖中多蟹蛤故名蛟湖在府城東五十五里宋時一日雷電晦冥湖中有聲人以為蛟蜃相鬪龍溪在廣昌縣東北八十里山川佳勝李山甫號龍溪釣翁即此處也旴水源出血木嶺流六十里為旴水又二十里為巴溪又十五里為小勳溪又七十里至廣昌縣前又三十里入南豐縣境東北流百餘里至府城東南會新城縣飛猿水又東北流二百餘里入撫州府境九曲水在新城縣西北三十里水流九折又南豐縣西南九十里亦有九曲水水壷水在新城縣西四十里源出福建泰寧縣界水之西有神山飛鳶水在新城東七十里一云飛猿港岸有石穴世傳仙人換骨在其內麻源在府城西一十五里循溪而入多茂林修竹土田沃衍鶴源在新城縣北三十里前有澄瀾後有廣阜昔有靈鶴翺翔水上因名南潭在南豐縣東南臺之下古諺云南潭沙上南豐出相九龍潭在南豐縣西一十五里嵗旱水有聲必雨麈落潭在福山東五里相傳有物如牛墜死其中人勾引得之識者曰塵也因名西池在府城西舊有清暉水心冉香碧圓垂絲漣漪六亭環列其上宋許抗清暉亭詩云亭號清暉闞碧漣半兼村落半神仙青山剩得雲間日明月饒分水底天龍池在府城東一十五里世傳池嘗出龍濯纓池在新城縣治內白蓮池在廣昌縣西南五十里唐儀鳯間居民曽延種紅蓮數嵗變為白蓮於花中得金範觀音像因捨宅為寺後白又變為碧墨池在南豐縣南宋曽鞏洗硯之所上有讀書巖丹井有二一在府城南一十五里乃洪崖丹井一在麻姑山仙都觀世傳為葛洪煉丹井九龍井在府城南四十里有九井旱輒禱於此冷水井在南豐縣西一名醴漿源味甘冽仁平泉在府城內宋紹興中司理沈敘立石鳯山泉在府城西其泉甘冽用以釀酒其味醇美神功泉在麻姑山清而甘美宜於釀酒故旴江有麻姑酒紅泉在南城縣麻源第三谷自砂中流出色紅劉宋謝靈運賦訊丹砂於紅泉宋李秠詩一𣲖寒泉下翠巒彩虹飛出亂雲端紅流傳是靈砂液深處應藏九轉丹溫泉在新城縣東四十里溫暖有硫黃氣患疥癬者浴之多愈土産銀南城縣出宋時有太平等埸今無菜麻姑酒葛金絲布唐時貢銀珠米宋時太守沈造嘗獻籓封益王府在府治南因荆王府舊基而廣之𢎞治五年建崇仁王府在府治北正德十年建金溪王府在府治東正德十三年建玉山王府在府治西嘉靖元年建公署建昌守禦千戶所在府治南舊在府城內東南隅宣德間以其地入荆王府故建學校建昌府學在府治東北宋慶歷中建本朝洪武初重建南城縣學在府治南宋紹興間建本朝重建新城縣學在縣