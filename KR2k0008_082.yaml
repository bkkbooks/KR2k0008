之丕變在仕著聲音文字通學範等書徐鑑永樂中知瓊州府在仕㢘靜寡欲孜孜愛民有古循吏風恵政興行一郡治安方向成化間瓊州知府以循吏稱流寓蘇軾眉州人宋紹聖間貶瓊州别駕居昌化初僦官屋以居有司猶謂不可軾遂買地築室儋人運甓畚土以助之獨與幼子過處著書以為樂時時從其父老游若將終身徽宗立移㢘州任伯雨眉州人崇寧間為右正言甫半嵗上百餘疏黨事起削籍編管通州尋徙昌化軍居三年始歸李綱邵武人建炎初累官尚書左僕射為汪伯彦黄潛善所譖安置澧州移萬安軍至瓊甫三日以赦得歸折彦質府州人建炎初為樞密副使謫居昌化軍與儋士許庭恵輩效司馬光真率㑹為鄉約每五日一集太守李行中與焉後移郴趙鼎絳州人髙宗朝為相為秦檜所陷連貶吉陽軍在軍三年潛居深處廣西帥張宗元時饋醪米檜知之令本軍月申存亡鼎先得疾自書墓中石至是書銘旌云身騎箕尾歸天上氣作山河壯本朝遂不食而死天下聞而悲之李光越州人髙宗時叅知政事為秦檜所惡責授建寧軍節度副使瓊州安置居八年坐與胡銓賦詩倡和移昌化軍論文考史怡然自適又三年始放歸自便胡銓廬陵人紹興間為樞密院編脩官以排和議忤秦檜連貶吉陽軍檜死量移衡州楊煒越州人與李光同郡光為叅政而金人議和煒以書責光後為黄巖令有詆時相秦檜語謫居萬安軍白諤紹興間為右武大夫自金從太后歸宣言洪皓名聞華夷而不見用秦檜奏繫諤大理寺諤客張伯麟題太學壁譏訕乃流諤萬安軍伯麟吉陽軍王士熙元致和間以吏部侍郎中書叅政坐事安置吉陽軍人物宋姜唐佐瓊山人從蘇軾學文軾嘗贈以詩云滄海何曽斷地脈白袍端合破天荒蘇轍亦云瓊士姜唐佐從吾兄遊氣和而通有中州士人之風王公輔儋州人俗呼王六翁世傳天文蘇軾甚重之後折彦質亦與相厚一日具冠帶賀折曰夜來見天象公當内遷未幾彦質果㑹赦移郴公輔年一百三嵗而卒王霄儋州人以貢士住璧雍者三年建炎初歸鄉潜徳不仕年九十六嵗衆推為鄉先生其妻呉氏亦年九十餘郡守以聞霄授初品官呉封孺人陳孚瓊山人嘗從郡守建陽宋貫之學得官以歸由是鄉人慕之始喜習進士業瓊人舉進士自孚始王進慶澄邁人性至孝紹興間其母陳氏病瞽而疾且殆進慶刲股為粥以奉母疾愈瞽目復明元雲從龍文昌人仕為行省叅政撫綏有方兵民悦服蔡微瓊山人通經史善文詞元末隠居不仕李思廸叙其文謂海南儒者未能或之先也本朝王惠其先合肥人徙瓊山嘗從趙謙學愽學能文洪武末用大臣薦至京以三喪未舉力辭歸隠所著有截山詠史等詩集唐舟瓊山人永樂甲申進士初授江西新建知縣未三年陞按察司僉事左遷衢州府通判未幾以事去用大臣薦為監察御史致仕卒王克義瓊山人永樂丙戌進士授崇仁知縣大臣薦其才有愽學宏詞等語至則増減宋詞科出題試之果中式陞都官未幾出為建昌府推官所至㢘能丘濬瓊山人少孤力學天資過人六嵗能詩登景泰甲戌進士仕至國子祭酒少保戶部尚書大學士贈太傅諡文莊所著有大學衍義補世史正綱志畧海瑞瓊州人由舉人仕至南京都察院右副都御史剛勁自持不畏彊禦士論髙之列女林氏文昌人陳道安妻元末寇亂道安陷於中欲宻圖賊謀泄被殺林氏瘞道安泣盡哀自啖土梗腸死韓氏二女文昌韓良可女長年十八次年十六俱有姿色元至正癸巳鄉民搆亂母兄俱死二女避草莽中姊顧其妹曰寇至且逼吾寧死不受辱妹泣曰姊誓不生我將焉往乃擕手赴水死唐丑妹瓊山唐伯夀女至正甲辰陳子瑚寇乾寧丑妹及從小妹被獲載舟中丑妹時年十八紿賊曰乞釋我縛永以相從賊信之解其縛急赴水死小妹乃得歸仙釋葛長庚宋瓊山人號白玉蟾年十二應童子科後隠居脩道於武夷山工於詩所著有上清武夷二集行於世劉遁宋丁謂與道士劉遁名相往來一日遁作詩贈謂有他時駕鶴游滄海同看蓬萊島上春之句謂莫曉其意及南遷遁見之於崖山謂方悟其詩意乃知遁異人也與之泛舟海上而飲且曰成子之詩意也交阯道士萬州城南有道士年九十九自言交阯人因渡海船壊結菴于此養一雞大如倒掛子日置枕中啼即夢覺又畜一胡孫小於蝦蟆以線繫几案間道士飯已即登几食其餘又有龜狀如錢置合中時使出戲衣褶間僧恵洪見之戲曰公小人國中引神道也陳仁嬌父玘南海人仁嬌嘗夢為逍遥遊及寤每思舊游不可得忽八月望丙夜有仙數百從空招之仁嬌超然隨衆朝謁于帝遂掌蓬萊紫虛洞宋元祐中降於廣州進士黄洞家者再時雞窠小兒錢易洞微志云李貟為承㫖奉使過海至瓊道逢一翁自稱楊避舉年八十一其父叔皆年一百二十餘又見其祖宋卿年一百九十五次見雞一小兒出頭下視宋卿曰此九代祖忌不語不食不知其年嵗月林澄邁人幼穎悟入山苦行脩習後住持普明寺元文宗賜金楮幣甚夥未嘗私用悉留寺帑年五十湼槃作偈曰昔不曽生今何曽滅月過長空清光皎潔趺坐而化焚時有五色舍利明一統志卷八十二
