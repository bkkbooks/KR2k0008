body:
  text: 明一統志卷八十二明李賢等撰㢘州府東至化州石城縣界一百三十里西至廣西上思州界三百三十里南至海崖八十里北至廣西南寧府横州界二百六十里自府治至南京五千六百二十里至京師九千六十五里糧二萬六千石零建置沿革古南粤地天文翼軫分野秦為象郡地漢武平南粤置合浦郡三國吳改珠官郡未幾復為合浦郡劉宋於郡置越州隋初郡廢州存大業初改曰祿州尋改為合州又廢州為合浦郡治合浦縣唐初罷郡復置越州貞觀中改為㢘州因郡有大㢘洞故名天寶初復為合浦郡乾元初又復為㢘州宋徙州治長沙改置太平軍咸平初復為㢘州元置㢘州路本朝洪武初改為㢘州府又改為㢘州屬雷州府十四年復為府領州一縣二合浦縣附郭本漢舊縣属合浦郡隋属合州唐属㢘州宋開寶間省封山蔡龍大㢘三縣入焉元仍舊本朝洪武初省入石康縣十四年復置編户三十里欽州在府城西一百四十里本秦象郡地漢為合浦縣地劉宋置宋夀郡梁兼置安州隋罷郡改安州曰欽州治欽江縣大業初又改州為寧越郡唐復為欽州宋属廣西路元置欽州路治安逺縣本朝洪武二年立欽州府八年改為州属㢘州府以安逺縣省入編户九里領縣一靈山縣在州北二百一十里本漢合浦郡地隋置南賔縣属欽州唐貞觀中改為靈山縣宋開寶中廢遵化欽江内亭三縣入焉天聖初自欽江徙州治於此元徙州治安逺以靈山為屬縣本朝因之編户二十二里郡名合浦漢名珠官吳名形勝南轅窮途欽州天涯亭代荅云瀕海而郡宋張栻州學記鑿山為城門威服蠻夷元志大㢘峙於東巨海環於南郡志風俗以匏笙銅鼓為樂寰宇記夷人多採珠及甲香為業㑹親友以匏笙銅鼓為樂以臘月為嵗首同上别有夷人名髙梁人不事耕稼以入海捕魚為業婚娶不避同姓用臘月為嵗首郡無耕稼所資珠璣圖經以亥日聚市同上俗以亥日聚市黎蜑壮稚以荷葉包飯而往謂之趂墟病不求醫惟事巫祝同上俗有四民同上俗有四民一曰客户居城郭解漢音業商賈二曰東人雜處鄉村解閩語業耕種三曰俚人深居逺村不解漢語惟耕墾為活四曰蜑户舟居穴處亦能漢音以採海為生人性儉朴詞訟簡稀郡志山川黄稻山在府城北凡十里州人多於山下種稻北峨山在府城西北一百里以峯勢嵳峩而名夫人山在府城東一百二十里劉宋陳伯紹葬妻於此因名亦名殯山糠頭山在府城西北一百四十里相傳昔人舂穀積糠如山今呼狼頭山又名軍頭山盖尉佗嘗駐軍於此姜山在府城東北一百四十里遶山居人多姜姓故名五黄山在府城北一百五十里相傳昔有樵者迷路遇五人黄冠朱顔相與談笑指示迷者得歸大㢘山在府城東一百五十里上有大㢘洞州以此名畫山在府城東一百五十里峯巒秀麗如畫百良山在府城東一百五十里多産大木良材文筆山在欽州南二里又石鎮安峰山巒峭拔狀若文筆横山在欽州東南二十里一名鷄鳴山其形延逺横拱州治那懷山在欽州北三十里那懷村大墓山在欽州東三十里相傳唐諫議大夫甯悌原𦵏於此銅魚山在欽州西北六十里相傳山下有巨石陂下鑄一大銅魚以為水竇羅浮山在欽州西北六十五里形若惠州羅浮故名又名安京山十萬山在欽州西北一百里峯峦髙聳甲於衆山登髙山廢石康縣治東毎遇重九士民登眺於此白石山廢石康縣東三十里山石皆白三山廢石康縣東四十里三峯峭立綠蘆山在靈山縣南二十里其山多産蘆竹龍牙山在靈山縣北一十餘里洪牙山在靈山縣北二十五里愽嶺山在靈山縣東四十里流洞山在靈山縣西南五十里中有洞水經流西靈山在靈山縣西百餘里唐貞觀中移靈山縣治於此黄樓山在靈山縣西一百里石六峯山在靈山縣西其峯有六因名林冶山在靈山縣西南一百三十里古金坑之所昔人詩云天涯亭下有龍窟林冶山頭出碎金龍門嶺在府城東八里龍門村冠頭嶺在府城南八十里形勢穹窿山石皆黒如冠三山嶺在欽州南五里三峯特立山中多孔雀又名孔雀山望海嶺在欽州北一十五里可登以望海分茅嶺在欽州西南三百六十里漢馬援征交阯立銅柱其下與之分界山頂産茅草頭南北異向至今猶然峰子嶺在靈山縣東北二十五里縣之主山也三海巖在靈山縣西三里有三岩曰錢巖月巖龜巖宋郡守陶弼改今名有詩序云一呀雲際天光内通如月破一若巨龜殻側倚崖下一中窪上隆狀如覆鼎盖于竈上下有盤石螺蚌負之予疑上古時海漸於此僊巖在靈山縣西八十里地名陁令村蔡龍洞在合浦縣界内唐武徳中置蔡龍縣以此為名楠石在靈山縣治東珠母海在府城東南八十里巨海中有平江楊梅青嬰三池中出大蚌剖而得珠即古合浦也㢘江在府城北三十里即合浦江又名南流江或名晏江源出廣西容縣大容山南至本府地名州江口分為五江曰州江陳屋江白沙塘江大橋江新村江環流郡城西南入于海欽江在欽州東源發洪牙山南入于海如洪江在欽州西二十里源發羅浮山南流入于海南岸江在靈山縣東舊州江在靈山縣西六十里源出流洞山西㑹南岸江入欽江注于海鴈湖在府城西北七十里毎秋冬有雙鴈遊于其間為其罕有故名銅船湖舊石康縣相傳漢馬援鑄銅船五隻一留於此四隻將過海征林邑五湖在欽州城外有東西南北中五湖宋陶弼築亭於其上毎湖各有詩龍門水在府城東二里源出龍門嶺西流分二支曰源頭曰龍門環城北入于江晏水在府城北源出石康縣界内思鄉水在石康縣發源思洞山出武利江復回本縣界入晏江以其去而復還故名金雞水廢石康縣東二十里相傳昔有金雞浴于水傍石欄水在欽州西五里水底有石欄横生羅浮水在欽州南四十里即羅浮發源之水也巢溪在府城北七十里明月溪在府城北八十里清夜湛然如月色綠雲溪在府城北一百七十里張沭溪在府城東北八十里昔有隠士張沭居此鍾灣在府城南七里有灣接江通海相傳宋政和間靈覺寺鐘一夕飛去既明懸空而下鐘猶濕灣旁居人言灣中毎夜有鐘聲謂必與龍戰寺僧鑿去頂上龍角乃止至今灣中風起有一物大如車輪藍色湧出波心瀑布灣在欽州那容村瀑自石頂飛激下成深灣嵗旱鄉人祈雨于此圍洲在珠母海中周回一百里昔有野馬渡此又名馬渡廟前井在府治東元壇廟前清泉湧出一方用之未嘗枯竭土産銀欽州出翡翠羽玳瑁鼊皮瀕海縣出珍珠合浦縣東海中有平江等池産珠蜑人採之極難毎以長繩繫腰擕竹籃入水拾蚌置籃内則振繩令舟人汲取之不幸遇惡魚一線之血浮于水面則已𦵏魚腹矣甲香鹽髙良薑州縣俱出孔雀欽州出公署海北鹽課提舉司舊在雷州府洪武初遷于石康縣西領白沙等十五鹽課司㢘州衞在府治東洪武二十八年建永安守禦千戶所在合浦縣東六十里洪武二十七年建欽州守禦千户所在欽州城内洪武二十八年建守鎮靈山千户所在靈山縣東正統六年建已上三所俱𨽻㢘州衞學校㢘州府學在府城東門外宋紹興間建本朝洪武二年重建欽州學在州城東門外宋紹興間建本朝洪武七年重建合浦縣學在府學東洪武十四年建靈山縣學在縣治東洪武四年建宫室簡靜堂喜豐堂俱在欽州治宋建海角亭在府城南昔人詩騎馬客來驚路斷採魚人去喜帆輕還珠亭在府城東漢孟嘗守合浦去珠復還後人慕其㢘建亭以表之宋陶弼詩合浦珠還舊有亭使君方似古人清沙中蚌蛤胎常滿潭底蛟龍睡不驚天涯亭在欽州東江岸上宋余靖守欽州為直鈎軒于亭左偏即江濵三石命曰鈎石醉石臥石令狐震有記陶弼詩霧雨昬昬風益驕天涯亭上覺魂消一家生意付秋瘴萬里歸心隨暮潮三山亭在三山嶺上宋陶弼詩商誇合浦珠胎賤民樂占城稻米豐火炬影沈江岸北潮聲流過郡城東五湖亭在欽州東江岸上關梁如昔寨在欽州西一百六十里交阯界上寨據大山之巔勢甚險阻宋置管轄如昔等七洞天禧間嵗調兵守之鹿井寨在合浦縣龍津橋在府城東龍門水上登雲橋在府學前白石橋在故石康縣東大庵橋在欽州東北四里龍門橋在靈山縣西南六十里寺觀東山寺在府城東北元至正間建本朝永樂中重修龍興寺舊石康縣西洪武中建崇寧寺在欽州東門外永樂中建元妙觀在府治東宋元祐間建本朝永樂初重脩天慶觀在府城東北洪武末建淨行院在興㢘村宋蘇軾南謫時宿此有詩荒涼海南北佛宇如雞棲忽此榕林中跨空飛拱枅當門列碧井滌我兩足泥髙堂磨新磚洞戶分角圭倒床便甘寢鼻息如虹霓僮僕不肯去我為半日稽晨登一葉舟醉兀十里溪醒來知何處歸路老更迷祠廟孟太守祠在合浦縣界内太守即漢孟嘗也陳王祠在府城東北三十里劉宋刺史陳伯紹有恩惠于民民為立祠陳覇先稱為叔父及受禪尊為帝伏波將軍廟州縣皆有漢馬援征交阯時經此土人至今祀之有禱即應諫議廟在欽州北二里祀唐諫議大夫郡人甯悌原烏雷廟在欽州南五里自唐以來碑記尚存本朝永樂初重修楊梅廟在府城東南六十里相傳昔有盤石浮海而至漁人以為神因祝曰若得魚副所祈當立祠以報果如所祝遂舁石至楊梅山繩斷即其處立祠凡水旱札瘥禱之輒應惠澤廟在府城東龍門水上嵗七八月致祭凡旱官民取其水禱雨多有應平江廟在合浦縣東南七十五里本朝洪武末建古蹟㢘州故城在府城東北七十五里蓬萊鄉唐州治此越州城在府城東一十里一名青牛城劉宋置越州時見三青牛圍之即其處置城故名欽州故城在欽州東三十里隋唐州治此廢常樂州在石康縣治南漢置宋太祖按嶺南圖籍命潘美王明并省遂廢此州及省愽雷等三縣廢玉山州在欽州境本梁安平縣置黄州及寧海郡隋廢郡改州曰玉州後廢唐復置玉山州領安海玉山二縣後廢廢南亭州在欽州境唐初置領内亭遵化二縣貞觀初廢廢太平軍在府城西南三十五里海門鎮宋太宗時置咸平初廢廢欽江縣在靈山縣境劉宋於此置宋夀郡隋罷郡改曰欽江縣為欽州治宋併入靈山廢封山縣本漢合浦縣地南齊置封山郡隋罷郡為縣寰宇記云在舊㢘州南一百二十里唐武徳中以縣置姜州後州廢以縣属㢘州廢遵化縣在靈山縣境隋置屬欽州唐屬南亭州宋省入靈山廢内亭縣在靈山縣境劉宋置宋廣郡隋廢郡改置新化縣又改曰内亭唐初於此置南亭州後廢宋省縣入靈山廢蔡龍縣在舊㢘州北一百五十里唐初置屬姜州貞觀中改屬㢘州後廢廢珠池縣在合浦縣境唐貞觀中置廢入合浦廢東羅縣唐初置属姜州貞觀中州廢属㢘州後省廢大㢘縣在舊㢘州東南一百里唐初置後廢入石康廢髙城縣在舊㢘州境貞觀中省入蔡龍縣廢石康縣在府城北三十里宋置本朝省廢安海縣在欽州境唐置属玉山州後改曰寧海廢安逺縣在欽州梁置安京郡隋廢郡為縣唐改曰保京宋改曰安逺元因之俱属欽州本朝省入州銅柱在分茅嶺下漢馬援立以界欽州安南或云柱在安南安南人過其下毎以石培之遂成丘陵援有誓云銅柱折交阯滅培之懼其折也銅皷古蠻人所用欽州村落土中時有掘得者相傳馬伏波所餘又云諸葛孔明征蠻之具石室在靈山縣西唐甯悌原讀書之所有石室石壁石門門外有石橋有兩石人夾侍媚川都在合浦縣初南漢劉鋹置此都令人入海採珠溺死者衆宋開寶五年詔廢之三石在欽州東欽江水中宋守陶弼常遊憩名其首曰釣石次曰醉石次曰吟石名宦漢費貽公孫述時漆身為癩佯狂避世後仕為合浦太守孟嘗合浦太守郡不産穀實而海出珠寶常