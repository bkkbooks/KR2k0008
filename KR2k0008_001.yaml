body:
  text: 明一統志卷一明李賢等撰京師古幽薊之地左環滄海右擁太行北枕居庸南襟河濟形勝甲於天下誠所謂天府之國也我太宗文皇帝龍潛於此及纘承大統遂建為北京而遷都焉于以統萬邦而撫四夷真足以當形勢之勝而為萬世不拔之鴻基自唐虞三代以來都㑹之盛未有過焉者也城池京城元志至元四年建大都城本朝洪武初置北平布政司於此永樂七年為北京十九年營建宫殿成乃拓其城周回四十里立門九正南曰正陽南之左曰崇文右曰宣武北之東曰安定西曰德勝東之北曰東直南曰朝陽西之北曰西直南曰阜成皇城在京城之中宫殿森嚴樓闕壯麗邃九重之正位邁往古之宏規允為億萬斯年之固壇廟天地壇在正陽門之南左繚以垣牆周回十里中為大祀殿丹墀東西四壇以祀日月星辰大祀門外東西列二十壇以祀嶽鎮海瀆山川太嵗風雲雷雨歷代帝王天下神祗東壇末為具服殿西南為齊宫西南隅為神樂觀犧牲所山川壇在天地壇之西繚以垣牆周回六里中為殿宇以祀太嵗風雲雷雨嶽鎮海瀆東西二廡以祀山川月將城隍之神左為旗纛廟西南為先農壇下皆藉田社稷壇在皇城內南之右中為方壇四面有門壇之周垣各依方色南有前門北有行禮具服二殿太廟在皇城內南之左正殿兩廊楹室崇深昭穆禮制法古從宜親王及功臣配享左有神宫監文廟在國子監彞倫堂之東正為大成殿東西翼以兩廡前有㦸門外有櫺星門殿前舊有元加封孔子碑本朝正統中有御製新建太學碑文立於殿前庇之以亭山陵長陵在京城北天夀山正中獻陵在長陵之右景陵在長陵之左苑囿西苑在皇城內中有太液池瓊華島池周圍深廣波光澄徹緑荷芳藻含香吐秀游魚浮鳥競戲羣集島皆竒石巉巖磊砢下瞰池水上有廣寒殿棟宇翬飛金碧交映復閣危榭左右拱向喬松古檜烟雲繚繞𨼆然蓬萊仙府也京師八景有曰太液晴波曰瓊島春雲謂此又苑之東北有萬嵗山髙聳明秀蜿蜒磅礴上插霄漢𨼆映宫闕皆禁中勝境也本朝胡廣太液晴波詩渺渺晴波漾碧池清風時動緑漪漪銀潢星斗垂天派方丈龜龍陋漢儀玉鏡光搖瓊島近錦紋流出御溝遲從知涵浸由開闢長映西山影不移楊榮瓊島春雲詩山島依微近紫淸春光淡蕩暖雲生乍驚樹杪和烟濕輕拂花枝過雨晴每日氤氲浮玉殿有時縹眇護金莖從龍處處施甘澤四海謳歌樂治平南海子在京城南二十里舊為下馬飛放泊內有按鷹臺永樂十二年增廣其地周圍凡一萬八千六百六十丈乃域養禽獸種植蔬果之所中有海子大小凡三其水四時不竭汪洋若海以禁城北有海子故別名曰南海子御馬苑在京城外鄭村壩等處牧養御馬大小二十所相距各三四里皆繚以周垣垣中有厩垣外地甚平曠自春至秋百草繁茂羣馬畜牧其間生育蕃息國家富强實有賴焉文職公署宗人府在長安左門南經歷司附焉吏部在宗人府南其屬文選驗封稽勳考功四淸吏司并司務㕔附焉户部在吏部南其屬浙江福建江西湖廣四川山東山西廣東廣西河南陜西雲南貴州十三清吏司并司務㕔照磨所附焉禮部在户部南其屬儀制祠祭主客精膳四清吏司并司務㕔鑄印局附焉外有僧録司道録司教坊司亦𨽻之兵部在宗人府後其屬武選車駕職方武庫四清吏司并司務㕔附焉外有典牧所㑹同館大勝關亦𨽻之刑部在貫城坊內其屬浙江福建江西湖廣四川山東山西廣東廣西河南陜西雲南貴州十三清吏司并司務㕔照磨所司獄司附焉工部在兵部南其屬營繕虞衡都水屯田四清吏司并司務㕔附焉外有文思院營繕所寶源等局亦𨽻之都察院在刑部南所轄浙江福建江西湖廣四川山東山西廣東廣西河南陜西雲南貴州十三道并經歷司司務㕔照磨所司獄司附焉翰林院在長安左門外玉河西岸四夷館𨽻焉國子監在安定門內文廟西有彞倫堂堂左右有繩愆博士二㕔率性修道誠心正義崇志廣業六堂典簿㕔附焉太常寺在後府南典簿㕔附焉外有神樂觀犧牲所各祠祭署亦𨽻之通政使司在太常寺南經歷司附焉大理寺在都察院南其屬左寺右寺并司務㕔附焉詹事府在玉河東岸主簿㕔附焉光祿寺在東安門內其屬大官珍羞良醖掌醢四署并典簿㕔附焉太僕寺在萬寶坊主簿㕔附焉鴻臚寺在工部南其屬司賓署司儀署并主簿㕔附焉欽天監在鴻臚寺南主簿㕔附焉外設司天臺於朝陽門城上太醫院在欽天監南生藥庫附焉外有惠民藥局亦𨽻之行人司在長安右門外朝房西上林苑監在文德坊玉河橋西典簿㕔附焉外有蕃育嘉蔬水監川衡林衡良牧左典察右典察前典察後典察十署亦𨽻之今存蕃育嘉蔬林衡良牧四署餘皆裁革五兵馬司中兵馬司在城內仁夀坊東城兵馬司在城內思城坊南城兵馬司在城外正陽街西城兵馬司在城內咸宜坊北城兵馬司在城內教忠坊武職公署中軍都督府在長安右門南經歷司附焉在城留守中神䇿和陽應天四衛牧馬千户所亦𨽻之左軍都督府在中府南經歷司附焉在城留守左瀋陽左右驍騎鎮南龍虎六衛亦𨽻之右軍都督府在左府南經歷司附焉在城留守右虎賁右武德三衛亦𨽻之前軍都督府在右府南經歷司附焉在城留守前龍驤豹韜三衛亦𨽻之後軍都督府在中府後經歷司附焉在城武成中前後神武左右後忠義左右前後義勇左右中前後大寧中前蔚州左留守後㑹川富峪寬河興武鷹揚二十四衛亦𨽻之錦衣衛在通政司南經歷司上下鎮撫司并各所司附焉旗手衛在通政司後府軍衛在時雍坊府軍左衛在保大坊府軍右衛在咸宜坊府軍前衛在保大坊府軍後衛在仁夀坊羽林左衛在保大坊羽林右衛在明時坊羽林前衛在時雍坊金吾左衛在保大坊金吾右衛在仁夀坊金吾前衛金吾後衛虎賁左衛已上三衛俱在保大坊燕山左衛在安富坊燕山右衛在思城坊燕山前衛在鳴玉坊大興左衛在日照坊濟陽衛在居賢坊濟州衛在金城坊武驤左衛武驤右衛騰驤左衛騰驤右衛已上四衛俱在崇教坊彭城衛在萬寶坊永清左衛在西城坊永清右衛在日中坊武功左衛武功右衛武功中衛已上三䘙俱在明時坊長陵衛獻陵衛景陵衛已上三衛俱在天夀山永安城內順天府東至永平府灤州界三百九十里南至河間府任丘縣界三百五十里西至山西大同府蔚州界三百五十里北至延慶州界一百六十里自府治至南京三千四百四十五里糧一萬四千石零建置沿革禹貢冀州之域天文尾箕分野髙陽氏謂之幽陵陶唐曰幽都虞為幽州夏殷省幽入冀又為冀州地周復置幽州武王封堯後於薊封召公奭於燕即此秦為上谷漁陽二郡地漢初為燕國又分置涿郡元狩中改燕國為幽州元鳯初改為廣陽郡本始初更為廣陽國東漢省廣陽合上谷永元初復立廣陽郡後罷郡立幽州治薊三國魏為燕國晉改范陽國後魏於薊立燕郡又於郡置幽州北齊於幽州置東北道行臺後周改置燕及范陽二郡兼立總管於幽州隋開皇初郡廢州存後省州入涿郡唐武德初改為幽州總管府開元間改州為范陽郡乾元初復為幽州遼升幽州為南京幽都府後改幽都為析津府宋宣和中改名燕山府尋復入金稱燕京改號中都以析津府為大興府元初為燕京路號大興府至元初建中都後改為大都路本朝洪武初改為北平府永樂初改為順天府領州五縣二十二大興縣附郭本秦薊縣地屬上谷郡漢至唐皆仍舊朝名遼改為析津縣金改為大興縣元仍舊本因之編户三十八里宛平縣附郭秦漢至隋皆薊縣地唐析西界置幽都縣屬幽州遼改為宛平縣取釋名云燕宛也宛宛然以平之義金元仍舊本朝因之編户五十里良鄉縣在府西南七十里春秋時燕中都地漢為良鄉縣屬涿郡晉屬范陽國後魏屬燕郡北齊省入薊縣尋復置隋屬涿郡唐屬幽州後改固節縣尋改良鄉遼金元仍舊本朝因之編户二十二里固安縣在府西南一百二十里本漢方城縣屬廣陽國後屬涿郡後魏省隋置固安縣屬幽州唐屬北義州貞觀初復屬幽州金屬涿州元屬霸州後升為固安州本朝洪武初改為固安縣編户三十七里永清縣在府南一百五十里本漢益昌縣屬涿郡東漢廢隋置通澤縣唐改為武隆縣乂改㑹昌縣天寶初改為永清縣取邊境永清之義遼金元仍舊本朝因之編户一十二里東安縣在府南一百五十里本漢安次縣初屬燕國後屬渤海郡晉屬燕國隋屬涿郡唐屬幽州元初屬霸州後升為東安州𨽻大都路本朝洪武初改為縣編户一十八里香河縣在府東南一百二十里本武清縣地遼於新倉置𣙜鹽院因居民聚集遂置香河縣屬析津府金屬大興府元初因之後屬漷州本朝改今屬編户一十里通州在府東四十五里秦屬漁陽郡漢置潞縣後魏置潞郡隋廢入涿郡唐置元州尋復為潞縣五代及遼皆因之金升為通州取漕運通濟之義元仍舊本朝以潞縣省入編户二十六里領縣四三河縣在州城東七十里本漢臨泃縣地唐析潞縣地置三河縣屬幽州以地近七渡鮑邱臨泃三水故名後𨽻薊州遼仍舊金元俱𨽻通州本朝因之編户二十里武清縣在州城南五十里漢雍奴縣𨽻漁陽郡晉屬燕國隋屬涿郡唐屬幽州天寶初改為武清縣五代宋金皆因之元初屬大興府尋割𨽻漷州本朝改屬通州編户二十里漷縣在州城南四十五里漢泉州縣地屬漁陽郡晉屬燕國後廢遼於漷河之南置漷陰鎮後改為漷陰縣元初屬大興府後升為漷州𨽻大都路本朝改為縣屬通州編户一十里寶坻縣在州城東南一百二十里本漢泉州縣地後唐於此置鹽倉金初為新倉鎮大定間始置寶坻縣以境內産鹽故名尋升盈州後復為寶坻縣元𨽻大都路本朝𨽻通州編户三十里昌平州在府北九十里漢為軍都縣屬上谷郡東漢屬廣陽郡晉屬燕國後魏改為昌平縣屬平昌郡後屬幽州後周州縣皆廢隋以其地屬涿郡唐復置昌平縣五代唐改為燕平縣石晉復為昌平縣遼金元仍舊本朝因之景泰初移治於縣東八里永安城尋升為州編户二十七里領縣三順義縣在州東北六十里本秦上谷郡地漢及魏晉皆為范陽之境北齊始置歸德郡隋改為順州唐初為燕州天寶初改歸德郡乾元初復為順州遼初為歸寧軍後改歸化軍宋置順興軍金復為順州元仍舊本朝洪武初改為順義縣𨽻北平府尋改今屬編户二十七里密雲縣在州東北一百二十里秦漢時為漁陽郡地後魏置密雲郡領白檀要陽密雲三縣兼置安州北齊廢郡以二縣併入密雲縣後周改安州曰元州隋置檀州後改安樂郡唐為檀州遼為武威軍宋號橫山郡金復為檀州元仍舊本朝洪武初改為密雲縣𨽻北平府尋改今屬編户一十九里懷柔縣在州東北一百里本密雲昌平二縣地唐貞觀中置懷柔縣天寶初改歸化縣乾元初復舊名遼屬順州金改為溫陽縣元廢入順州本朝洪武中分密雲昌平地復置懷柔縣編户一十四里涿州在府西南一百四十里春秋戰國皆燕之涿邑秦為上谷郡地漢置涿郡曹魏改為范陽郡晉改為范陽國後魏復為范陽郡隋為涿郡唐初廢郡為范陽縣屬幽州大歷中又於縣置涿州遼置永泰軍宋改涿水郡金復為涿州元升涿州路尋為涿州本朝以范陽縣省入編户四十六里領縣一房山縣在州城西北四十里本良鄉宛平范陽三縣地石晉以其地遺遼未有縣金析置萬寧縣以奉山陵後改奉先縣元改房山縣屬涿州本朝因之編户一十一里霸州在府南二百一十里本秦上谷郡地漢屬渤海郡後漢屬廣陽郡晉屬章武國隋初屬瀛州後屬涿郡唐屬幽州後改為永清縣即益津關也後周克復益津關始