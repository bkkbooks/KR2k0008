史為石勒兵所敗乃著朝服持節見石季龍曰我受國恩志在滅汝不幸至此不能為汝敬及見勒又不為禮卒遇害南北朝裴延雋魏明帝時幽州刺史修復督亢渠溉田百萬餘畝百姓賴之于翼周明帝時幽州總管素有威武兼明斥堠逺人不敢犯塞百姓安之隋郭絢煬帝征遼東拜絢涿郡贊務吏人悅服遂遷通守及山東盜起諸郡無復完者獨涿得全唐狄仁傑昌平令有老媪泣訴虎害其子仁傑為文籲神未幾虎伏階下乃告於衆而殺之後又為幽州都督有功賜紫袍龜帶武后自製金字十二以旌其忠宋璟幽州都督甚有威聲張守圭幽州良杜府果毅刺史盧承泰器之曰不十年當節度是州後果為幽州長史能守邊破賊朝廷嘉之詔立碑紀功李光弼范陽節度使時史思明拒王師諸將驚潰獨光弼一軍整肅遂兼幽州大都督長史溫造德宗時署節度參謀使幽州說劉濟率先諸侯效死節穆宗時又為幽鎮宣諭使喻劉濟總籍所部州縣入朝張徹幽州節度判官至任遇府軍怨其從事盡殺之而囚其帥且相約獲徹置之帥所徹出門罵衆曰汝何敢反不絶口而死事聞贈給事中談忠憲宗時為燕牙將嘗為燕使魏適朝廷出禁兵越魏伐趙魏牧田季安欲興兵忠說曰若興兵是抗王師則罪大矣季安然之及歸燕又說燕牧劉濟出軍佐朝廷伐趙遂拔饒陽束鹿時皆服其善斷宋丁罕淳化中知霸州㑹河溢壤城壘罕以私錢募築民咸德之李邈知信安軍徙知霸州時童貫將連金人夾攻契丹呼邈以語動之使附已邈不從上書言契丹不可滅茍誤幾事願誅臣以謝邊吏黃友通判檀州㑹金人敗盟郭藥師以常勝軍叛燕土響應友獨領數千人與戰躬冒矢石破裂唇齒欽宗召見稱歎之賚豫甚渥遼耶律休格南京留守均戍兵立更休法勸督農桑修武備及南北和好休格省賦役恤孤寡戒戍兵無犯宋境雖馬牛逸於北者悉還之逺近向化境內大治耶律和卓涿州刺史曉暢戎政久任邊防務鎮靜不妄生事以邀近功屬部乂安鄰壤敬畏耶律仁先南京留守恤孤惸禁姦慝宋人畏之議者以為自裕悅休格後惟仁先一人而已金瓜爾佳衡范陽主簿世宗謂宰臣曰進士中才傑之士蓋亦難得如瓜爾佳衡有用材也焦旭歷大興良鄉兩縣令練達時政世稱其能宰相石琚薦之伊喇益霸州刺史時嵗飢益首出俸粟以食餓者於是倅以下及郡富家遞出粟佐之多所全活郡東南有隄久頽圮水屢為害益增修之民以為便為立祠元趙柔涿州長官號令嚴明為衆所服時羣盜並起柔單騎遍入諸柵說降其衆張惠燕京宣慰副使為政寬簡奏免分數錢罷硝碱局俄遷侍中桑節順帝時為大都路總管府達嚕噶齊時權幸肆橫法滯不跡行桑節振其紀綱令行禁止奸宄屏丁好禮元主北遁命好禮以中書平章政事與郭庸留守京師大兵入城或勉其謁大將好禮叱曰我以小吏致位極品今老矣恨無以報國所缺惟一死耳後數日大將召之舁至齊化門抗辭不屈而死郭庸中書省參政與好禮同為留守城破大將召至衆叱之拜庸曰人各為主死自吾分何拜之有遂遇害蘇耀素至正間平谷縣尹操守亷潔民有善詞律挾害善良者耀素召至取其情狀書諸粉壁其人遂改行由是政聲日著不數年拜內臺御史本朝徐達洪武初以大將軍率師至都城元主開北門遁去不戰而克達籍府庫收版圖寶器禁飭軍士人民安業市肆不易逺近悅服人謂曹彬下江南巴延入臨安不是過也劉嵩洪武初為北平按察副使止携一童赴任每夜焚一鐙坐一榻讀書不輟五鼓即起待旦視事時當兵革後招徠逋逃慰安反側務寬厚以存大體民甚賴之馬從隆洪武初霸州知州律己以亷撫民以仁興學校勸農桑州民至今頌之盛本初洪武初永清知縣撫民以寬為政有方經營有度縣民至今不忘鄭賜洪武間北平布政司參議謹厚有為其善政民稱之不置方必夀洪武間北平知府明敏果斷甚有善政郡邑翕然稱頌之許好問洪武中昌平知縣亷以律己寬以撫民考最升山西參議髙進洪武中大城知縣持身亷潔撫字有方黠吏畏威細民感德王翥洪武中平谷知縣勸課農桑均平徭役刑賞得宜奸頑斂跡趙貴洪武末遵化知縣處已端方御下嚴肅門無私謁民獲安居賀銀洪武末宛平知縣剛毅果斷材略兼優永樂中以守城功纍遷工部右侍郎韓約永樂初通州知州有學有守為政有方吏不能欺民懷其德吳萬里永樂初薊州判官有政事能文章卒于官百姓痛哭之劉瑾永樂中文安知縣持己亷而公處事明而敏愛民寬而惠張貫永樂中順天府尹政尚寬平獄無壅滯吏民愛之稱為長者楊思恭永樂中宛平知縣政尚寬簡縣民至今慕其德王賢永樂中順天府尹府故以柴炭夫役為民病與工部力辨遂為減其十之七時中貴怙寵有縱其下非法凌虐府屬者賢執之奏置於法一時京兆肅然汪溥景泰中知薊州先是龍池河壅塞為患溥蒞官後河忽自東注粟有一本數穗者鄰境盛蝗入薊自殺人謂過魯恭之異政云馮續天順間先以兵部主事守山海關劾巡撫之不職者竟奪其官聲動邊塞升郎中總督薊東邊務政令修明軍民悅服自總戎而下以都憲薦留者章凡數上唐忠天順中知密雲縣忠信願慤不修邊幅為政以便民為先民亦率于教化行俗美時以賢令著聞張海成化初順天府丞時中要用事勢歘薰灼人海以公事往謁務以禮自持不少為屈雖以此竟坐外補海處之泊然若分所當得者張憲成化中任順天府尹望讋權豪德孚士庶稱京兆之賢能者必歸之云畢亨成化間丞順天府時畿內旱蝗百姓荒甚亨奉命往捕蝗遂滅朝廷嘉奬之李瓚成化間以副都御史整飭薊州等處兵備兼巡撫順天保定等府地方提督紫荆等關經略東西二路築長峪堡城募兵設隘勞績著聞賜白金文綺進尚書楊繼宗成化間以左僉都御史巡撫順天等處地方性不茍合人多憚其方嚴歷官以愛民為務時外戚宦官莊田多占民間地土繼宗亷得其實悉奪而還之一時權貴為之斂迹舒向宏治間任順天府通判明介負氣恬於仕進蒞官則慷慨激烈敢於為民事所當為雖勳戚權璫勢不能動是以惠政之及民者多民亦愛戴之如父母魏富宏治初以右僉都御史巡撫順天等府畿內地中貴人多操利匿亡將領守臣怙寵者亦倚以為援富至則部分將領授以成算一時將領守臣及貴人皆無敢犯者風采赫然震動中外洪異宏治間任通州學正正以率人勤以誨士貧者濟之勤者誘之惰者警之士未公見者不許私覿且待諸生有恩義以德行文藝示賞罰士益知勵故及其門者多所造就至今稱道之不忘汪循正德初通判順天府時瑾擅權勢傾中外循奮然曰是將不利吾社稷者安忍坐視而莫之言乎乃一月三抗疏於朝請裁抑中官及上內修外攘十䇿言甚剴切雖為瑾所忌弗恤也秦僎正德間涿州知州居官清慎崇教道敦俗化文廟及諸祠壇多所創葺修廢舉墜百度具興且學識該博尤勤吏事比秩滿民安其政相率借留不獲允號泣攀援於道者馬為之不行周臣正德間任薊州同知持己清亷悉心輔佐勤於撫字吏畏民懷時徭役無常重為小民困臣至乃按籍清審立為定則百姓安之流寓關羽河東解人美鬚髯慷慨尚義喜閲左氏春秋以亡命奔涿郡㑹先主於鄉里合徒衆而羽與張飛為之禦侮先主與二人恩若兄弟及定巴蜀拜羽為前將軍鎮荆州威振華夏世號虎臣宇文虛中蜀人仕宋纍官資政殿大學士建炎初使金為祈請使㑹金人方議禮儀制度愛其才學遂留不遣後卒於金吳激建州人工詩能文字畫後逸得婦翁米芾筆意後使金以知名被留為翰林待制未幾卒於金所著有東山集耶律楚材遼東丹王托雲之後王子隆科為燕京留守遂寓居於燕七傳而生履履生楚材謂必成偉器當為異國用因取左傳楚雖有材晋實用之以為名字楚材年十七無書不讀至於陰陽卜筮律厯之學靡不精究詩文肆筆而成元太祖定燕召見甚喜遂任以國政凡立綱陳紀軍旅之事皆所經畫居相位三十餘年以天下安危寄於一身知無不言晚號玉泉老人卒追封廣寧王諡文正所著有湛然文集皇極經世義厯說乙未元厯回鶻厯趙復元德安人皇子庫楚征江南俘得之㑹姚樞奉命搜訪人才見復與語大悅與之北上楊惟中請建太極書院遂延復為師復乃録其所記程朱之書以教學者由是河朔始知道學後竟不受官學者稱曰江漢先生髙克恭本西域人因其先世居燕遂占籍房山仕元官至刑部尚書博學能詩文善山水墨竹時輩罕及人物周左伯桃羊角哀戰國燕人二人為友聞楚王善待士乃同入楚值雨雪糧少伯桃乃併糧與哀令往事楚自餓死於空樹中哀至楚為上大夫乃言於楚王備禮以葬伯桃秦衛滿燕人秦末中原多故滿起義擊破朝鮮遂自立為王都王險城再傳至孫右渠國滅蔡澤燕人戰國時宏辨智士嘗入秦說應侯曰四時之序成功者去應侯因是謝病昭王召見與語大悅拜客卿尋拜為相後事始皇風燕太子丹入質於秦號綱成君漢蒯徹范陽人楚漢時說士有權變武信君嘗用其䇿降燕趙三十餘城韓信用其計遂定齊地自序其說號曰雋永凡八十一首韓嬰燕人文帝時為博士推詩人之意作內外傳數萬言亦推易意為之傳武帝時與董仲舒論於上前仲舒不能難也孫商亦為博士徐樂燕郡無終人武帝時上書其略曰賢王獨觀萬化之原銷未形之患其要期使天下無土崩之勢而已武帝召見曰何相見之晚也拜為郎中韓延夀燕人昭帝時以父義諫而死宜賞其子遂擢延夀為諌大夫歷淮陽潁川東郡太守延夀為吏崇禮義好古教化所至令行禁止為天下最周堪文安人宣帝時論經石渠惟堪最髙元帝時與蕭望之並領尚書以師傅見尊重尋為石顯所譖皆免官望之自殺帝後悟乃擢堪為光祿勳遷太子太傅冦恂上谷昌平人光武時偏將軍及定河南以恂有牧民御衆之才拜河內太守行將軍事復為潁川太守後潁川盜起恂從帝出征賊平百姓遮道曰願復借冦君一年乃留鎮撫封雍奴侯卒圖形雲臺蓋延漁陽要陽人始與吳漢歸光武拜虎牙將軍從平河北有功纍封安平侯自是拔擊攻戰皆捷增封安食萬户卒圖形雲臺王梁漁陽要陽人初為郡吏彭寵以梁守狐奴令與蓋延將兵從光武拜偏將軍後擢大司空擊赤眉有功入為河南尹封阜成侯陽球漁陽泉州人舉孝亷補尚書侍郎遷司𨽻校尉時中常侍王甫等姦虐弄權扇動中外球奏收甫等送獄盡誅之盧植涿郡涿人剛毅有大節師馬融通古今官至尚書時董卓凌虐朝廷議欲廢立植獨抗議不同卓將誅之議郎彭伯曰盧尚書海內大儒人之望也今先害之天下震怖卓乃止免植官遂隱於上谷田疇無終人董卓之亂疇率宗族及附從者數百人入徐無山中躬耕養親百姓翕然服其威信魏曹操北征署為司空户曹椽後論功行封疇固讓終不屈文帝即位髙疇德義賜其從孫關內侯三國田豫漁陽雍奴人仕魏自弋陽太守遷南陽盜賊屏迹郡內肅清後徴為衛尉屢辭位不聼乃曰年髙七十而居位譬猶鐘鳴漏盡而夜行不休是罪人也因稱疾焉盧育植子少以學行見稱仕魏以黃門侍郎左遷典農校尉躬為民擇居美田百姓賴之遷安平廣平太守所在有惠化入為侍中擢吏部尚書選舉務先性行而後才藝後封容城侯卒諡成張飛涿州人與關侯事漢昭烈嘗領巴西太守拜將軍封西鄉侯飛雄壯威猛與羽匹時稱萬人敵卒諡桓侯徐邈薊人魏文帝時歷譙相平陽安平太守所在著稱後為凉州刺史風化大行遷司𨽻校尉百僚敬憚拜司空卒諡穆侯簡雍涿郡范陽人性跌宕風儀優游少與昭烈善昭烈至荆州雍為從事中郎力勸取成都遂為說劉璋歸命後拜昭德將軍孫禮涿郡人仕魏纍遷大將軍揚州刺史所歷七郡五州皆有威信遷司空封大利侯卒諡景晉霍原廣陽人少有志力嘗詣京師貴游子弟皆求一見同郡劉岱將舉之疾革敕其子沈曰霍原慕道清虛汝當薦之山居積年門徒數百及沈為國火中正進原為司徒不就後與王褒以賢良徴亦不就劉沈薊人博學好古仕至侍中在位敦儒道愛賢能嘗薦用里人霍原及申理張華為時所稱重張華范陽方城人學業優博圖緯方技之書莫不詳覽贊伐吳功成封廣武侯華於儀禮憲章多所損益一時詔誥多所草定進為侍中中書盡忠匡輔卒之日家無餘資惟文史溢機篋耳所著有博物志盧欽育子篤志經史仕至吏部尚書進封大梁侯鎮沔北寬猛得中入為僕射加侍中清貧髙潔卒贈開封諡曰元所著詩賦論難數十篇姪孫諶善屬文為司空從事中郎嘗撰祭統注莊子陽騖無終人父耽仕慕容氏官至東夷校尉騖器識沈逺始為平州別駕屢獻安時疆國之術後以太尉致仕性儉約常乘敝車瘠馬及死無殮財南北朝盧𤣥范陽涿人魏太武辟召天下儒雋以元為首授中書博士卒諡曰宣孫昶景明初以黃門侍郎出為徐州刺史善於撫綏人庶稱之五世孫潛事北齊為揚州刺史大樹風績陳主戒其邊將曰盧潛猶在卿宜深備之祖鴻勳范陽人父慎仕魏歷鴈門咸陽二郡太守有能名鴻勳幼有文思神武初徴作晉祠記纍官至髙陽太守在官清素時議髙之張𢎞素范陽方城人幼以孝聞遭母喪三年不食鹽菜梁武帝以為輔國將軍郢城平帝乘勝直指建業𢎞䇿與帝意合城平遣封檢府庫秋毫無犯後封洮陽縣侯成景雋范陽人祖興魏五兵尚書父安樂淮陽太守梁天監中常雍和殺安樂景雋謀復讐購人刺殺雍和及其子弟武帝義之不罪後每思報效為北豫州刺史時推其智勇兼有政績州人樹碑紀德卒諡忠烈平恆薊人祖視父儒並仕慕容為通宦恆耽勤讀誦不以屢空改操嘗撰略注合百萬餘篇徴為中書博士出為幽州别駕亷貞寡欲衣食常不足後遷祕書丞一時文儒皆推讓其博洽卒贈都昌侯諡曰康酈道元涿郡人魏時為御史中尉執法清刻為時所忌遂遣為關右大使平生好學歷覽羣書注水經四十卷髙閭漁陽雍奴人博通經史下筆成章魏自中書侍郎為中書令給事中凡詔令頌贊之類皆出其手其文章與髙允相上下時稱二髙陽尼北平無終人博通羣籍仕魏為幽州中正孝文臨軒令諸州中正各舉所知尼與齊州大中正房千秋各舉其子帝曰昔有一祁名垂往史今有二奚當聞來牒平鑒燕郡薊人祖延魏安平太守父勝安州刺史鑒少聰敏有豪俠氣以軍功纍遷襄州刺史齊神武起信都遷懷州築城以防冦城內井竭鑒衣冠而祝泉即湧溢卒贈司空諡曰文子盧辨范陽涿人博通經籍後周舉秀才為太學博士注大戴禮其兄景裕為當時碩儒謂辨曰昔侍中注小戴今汝注大戴庶纂前修矣纍遷太子少保凡朝廷憲章乘輿法服金石律吕晷刻渾儀辨皆創制之悉合軌度張曜上谷昌平人仕北齊以清白稱歷官尚書右丞文宣近出令曜居守至夜還曜不開門催迫急甚須火至識面方開帝嗟賞之曜奉職恪勤性節儉祿賜輒散宗族好讀左傳卒贈右僕射諡曰貞簡盧思道涿人仕北齊官至武陽太守操行文學為時所重文宣帝崩朝士皆作挽歌擇其善者用之時魏收祖孝徴輩止得一二首惟思道獨八首時稱為八采盧郎周惠達文安人後周文帝時纍進爵為公兼尚書僕射時關右草創禮樂缺然惠達損益舊章儀軌稍備雖居顯職而謙退下人喜拔良士當時重之鮮于世榮漁陽人沈敏有器幹仕北齊為太子太傅周武帝入代遺以瑪瑙酒鍾世榮得即碎之周兵入鄴諸將皆降獨被執不屈而死隋慕容三臧燕人父紹宗北齊尚書左僕射三臧聰敏多武略仕為廓州刺史州人多逃逸三臧至招納綏撫百姓襁負日至子遐為澶水丞漢玉諒反抗節不從以誠節聞盧愷范陽人父柔魏中書監愷性孝友能屬文仕至吏部侍郎攝尚書左丞每有敷奏侃然正色雖逢喜怒不改其常榮毗無終人自少剛鯁有局量仕為殿內監時華陰多盜揚素薦毗為華州刺史素田宅多在華陰左右放縱毗以法繩之無所寬貸後為侍御史在朝正色百僚憚之盧昌衡涿人思道從兄沈靜有才識博涉經史開皇初以尚書祠部侍郎出為徐州總管長史甚有能名吏部尚書蘇威稽其績曰德為世表行為士則後纍遷至儀同三司祖君彥范陽人父孝徴北齊尚書左僕射君彥有才學大業末為東平郡舊佐郡陷於翟讓因為李密所得密甚禮之署為記室凡軍書羽檄皆出其手盧楚范陽人祖景祚魏司空丞楚性鯁直有才略仕至尚書左丞時與元文都同心輔政及王世充為亂或呼楚同去楚曰僕與王公有約社稷有難誓以俱死令捨去不義後被害唐魯炅薊人仕至襄鄧節度使時襄漢賊起炅扼其衝南夏賴以完封岐國公盧承慶思道孫范陽郡公赤松之子學博才辨纍官至户部侍郎太宗問歷代户版承慶引據以對後為兵部尚書卒諡曰定弟承業為尚書左丞承泰為太子詹事盧照鄰幽州人髙宗時與王勃楊烔駱賓王四人以文章齊名天下號為四傑盧景亮涿州范陽人博學善屬文其文多根於忠仁有經國志舉進士官至右補闕以直諌名後遷中書舍人卒贈禮部侍郎張知謇幽州涿人兄弟五人知元知晦知泰知默皆登明經髙第武后朝俱為顯官曉吏治清介有守知謇歷十一州刺史尤見重於時盧藏用幽州范陽人善屬文舉進士不利隱終南山長安中召授左拾遺武后作興泰宫上疏切諫歷官黃門侍郎尚書右丞左遷黔州長史藏用精蓍龜工草𨽻琴奕士貴其多能云劉怦幽州昌平人初為范陽禆將積功至雄武軍使廣墾田節用度以辦治稱遷涿州刺史得衆心擢御史中丞封彭城郡公卒諡曰恭盧鴻幽州人博學善書與其弟隱嵩山元宗强之授諌議大夫不就李白詩二盧徴不起萬乘髙其風盧粲幽州人仕為給事中武崇訓死詔墓視陵制粲固執以為不可遂出為陳州刺史粲曰茍所論得行雖逺何憚李寶臣范陽人善騎射肅宗時歸命封密雲郡公史朝義平擢禮部尚書封趙國公遂有六州地雄冠山東卒贈太傅蔡廷玉昌平人德宗時朱泚為幽州節度使謀不軌廷玉在幕府不從被囚嵗餘出之泚曰爾亦悔乎廷玉曰導以為逆即悔勉以忠義何悔之有復繫之問曰能省過否不爾且死對曰不殺我公得名殺我我得名泚不能屈待之如初盧羣范陽人仕為御史郭子儀家被訟德宗促按之羣奏子儀有大功請赦勿問人謂其識大體卒贈工部尚書陳利貞幽州范陽人初為平盧將從李光弼征安祿山纍遷太子賓客封靜戎郡王李希烈叛利貞出竒兵橫搗賊鋒朱泚反麾下欲從亂畏其勇乃止德宗嘉之擢汝州防禦使髙崇文幽州人七世不異居旌表門閣憲宗時崇文為左神䇿行營節度使劉闢以蜀叛卒討平之紀功於石子承簡為溵州刺史有惠政將吏立石頌功髙霞寓幽州人五世不異居以孝義聞嘗從髙崇文擒劉闢有功拜彭州刺史李景略幽州良鄉人李懷光為朔方節度使景略為大理司直時懷光欲襲東渭橋召幕府議景略曰殺朱泚仗䇿詣行在此轉禍為福之機也懷光不聽遂痛哭而出後拜豐州刺史威令肅然回紇畏之卒贈工部尚書賈島范陽人初為浮屠游東都韓愈教為文遂捨浮屠舉進士為長江簿有詩名㑹昌初以普州參軍遷司户劉蕡昌平人明春秋能言古今興亡事擢進士第文宗時應賢良方正對䇿専論親近嬖幸言極切直遂被黜後昭宗因羅衮上言贈蕡右諫議大夫李全忠范陽人仕為杕州司馬有蘆生其室一尺三節怪之以問别駕張建建曰蘆茅類生於宅茅土兆也𫝊節者其三世乎後果為衆推為留後拜節度使卒子匡威嗣之未幾次子匡籌奪之尋敗張允伸范陽人宣宗時為節度使纍進中書平章封燕國公時徐州反出米五十萬斛鹽二萬斛佐國用詔嘉之賜玉帶寶器進兼侍中卒贈太尉諡忠烈張仲武范陽人㑹昌初為雄武軍使習戎事性忠義遷檢校工部尚書以破回鶻功進兵部尚書詔李德裕撰紀功碑以告後世纍官檢校司徒中書平章卒諡曰莊五代趙玉漁陽人嘗客滄州依節度使吕兖劉守光破滄州盡戮兖親屬兖子琦年十四玉負之以逃至太原變姓名丐衣食以給琦琦仕後唐至兵部侍郎當時燕趙間以玉能存吕氏之孤翕然稱之趙鳯幽州人少以儒學知名仕後唐為門下侍郎同平章事奏論皆切時弊時有僧獻佛牙鳯請驗其真僞以斧破之應手而碎時宫中施物已及數千因鳯碎之乃止李承約薊門人後唐明宗拜為涇州節度使見邠州節度毛璋諭以禍福璋從之明宗大喜遷黔南節度使勸農桑興學校及去任黔人乞留之纍官至左衛上將軍王思聞幽州人後唐明宗時為京兆尹西京留守潞王從珂叛檄諸郡思聞執其使後為從珂所執責曰罪可逃乎思聞曰非不知從王得生恐終死不能見光帝於地下從珂愧竟害之盧導范陽人後唐諫議大夫潞王叛以兵犯京師宰相馮道請導草箋勸進導固拒之張希崇薊人少好學通左氏春秋仕後唐纍官靈武節度使在官不喜聲色善撫士卒招集夷落明宗屢詔褒嘉之劉審交幽州人仕晉為三司使時有議者請檢天下民田以益租審交曰租有定額天下比年無閒田遂止民賴以不擾尋遷陳州防禦使視民耕器薄陋乃取河北耕器為範為民更鑄之扈蒙幽州安次人自少以文學名仕周為右拾遺直史館知制誥時其從弟載為翰林學士兄弟並掌內外制時號二扈宋初蒙為學士承旨卒贈右僕射所著有鰲山集扈載䝉弟好學善屬文舉進士仕周為校書郎直史館嘗次歷代廢興治亂之迹為運源賦世宗善之拜為知制誥翰林學士竇禹鈞漁陽人祖遜玉田令父思恭媯州司馬禹鈞仕周纍官諫議大夫嘗建書院延名儒以教逺近士及在官四方賢士賴以舉者甚衆由其門登貴仕者接踵劇可久范陽人能明法令仕周為太子庶子與侍御史張湜等刪定刑統三十卷尋拜大理少卿在廷尉四十年用法平允以仁恕稱宋初以光祿卿致仕李瓊幽州人祖傳正涿州刺史父瑛涿州從事瓊幼好學涉獵史傳仕周纍官太子洗馬嘗為安州防禦使為治寬簡民立石頌德宋初召為太子賓客以右驍衛上將軍致仕卒贈太子少師趙逺范陽人祖光鄴鄂州録事參軍父簡章涿州司馬逺美風儀負才任氣仕周纍官吏部侍郎有公輔器宋初起為尚書右丞有詩集二十卷子曮舉進士官至殿中丞亦有文集十卷張藏英范陽人後唐末舉族為賊孫居道所害藏英襲殺居道以祭其父母時稱為孝子仕後周以刺史領邊任屢擊敗契丹世宗褒美之宋初為瀛州團練使并護關南軍邊歸讜幽州薊人父退思檀州刺史歸讜弱冠以儒名仕周歷禮刑兵户侍郎世宗聞其亮直擢為尚書右丞樞密直學士宋初以户部尚書致仕子定雍熙初進士宋張暉幽州大城人初仕後周治郡有狀從世宗征淮甸以功為都指揮使太祖時從征澤潞陷陳先登後征蜀督兵開大散關路躬撫士卒人忘其勞髙彥暉漁陽人仕周為耀階二州刺史太祖時從王師伐蜀為歸州路先鋒全師雄作亂彥暉討之力戰而死太祖聞而痛惜之劉載范陽人父昭下蔡令載博通史𫝊善屬文後唐進士仕周纍官至給事中太宗時知襄州尋以工部侍郎致仕嘗著五論曰為君為相為將去讒納諫為士流所稱子二宗言比部郎中宗望景德二年進士吕餘慶幽州安次人父琦石晉兵部侍郎餘慶重厚簡易事太祖以幕府舊僚參預大政歷知數州開寶中為尚書左丞卒贈侍中趙普幽州薊人父逈徙洛陽普沈厚寡言事太祖初為掌書記後拜相能以天下之事為已任又相太宗拜太師及卒追封韓王諡忠獻普初寡學術太祖勸以讀書自是手不釋卷每歸私第啓篋取書讀之乃論語二十篇也弟安易官至宗正卿子承宗歷知數州馬全義幽州薊人十餘嵗學劍擊善射騎初仕周以功纍遷殿前指揮使後從太祖討李筠飛矢貫臂全義拔鏃臨敵士氣益奮遂克澤州纍官至江州防禦使卒贈檢校太保竇儀禹鈞子學問優博風度峻整纍官禮部尚書太祖欲相之趙普忌其剛直沮之及卒太祖憫然曰天何奪我竇儀之速耶弟儼侃稱僖與儀皆登第侃官至起居郎稱參知政事僖左補闕子諲諹誥俱登第諲都官員外郎諹祕書丞竇儼儀弟幼能屬文性夷曠好賢樂善纍官禮部侍郎當時祠祀樂章宗廟諡號多其撰定初以主客員外郎知制誥適儀自閣下入翰林兄弟同日拜命分居兩制時人榮之劉審瓊范陽人初為殿直從太祖平澤潞纍遷軍器庫使太宗時知澤州有便民之政徙知河陽年八十餘筋力不衰髭髮黳黑孫爽進士及第為祕閣校理董遵誨范陽人太祖以西域近邊俾守通逺軍番漢悅附太祖嘗解所服盤龍衣賜之謂其外弟劉總曰吾委以方面故也趙贊幽州人初仕周纍功授保信軍節度盡去苛政居民便之太祖時加檢校太師改鎮延州太宗立進封衛國公卒贈侍中贊知書喜吟詩容止間雅接士大夫以禮御衆使下咸有方略為時賢帥宋琪幽州人舉進士初仕漢周皆為幕官太祖時為左補闕太宗時纍遷同平章事進右僕射卒諡惠安琪有文學尤通吏術為相日有求請者多面折之田重進幽州人形質竒偉有武力太祖時纍官至靖難軍節度使為人朴願太宗在藩邸愛其忠勇使人遺以酒炙不受謂使者曰為我謝王我知有天子耳太宗即位謂其無私交終委遇之李懷忠涿州范陽人纍官殿前都指揮使從太祖征太原中流矢力疾戰益奮太宗時纍遷侍衛步軍都指揮使卒贈侍中吕端餘慶弟事太祖纍官大理少卿太宗時為相歷官僅四十年至是始大用持重識大體卒諡正惠子藩蔚藹皆仕于朝孫誨居開封登進士纍官御史中丞宋雄幽州人纍官光祿少卿在官職務修舉公私倚任且涉獵經史負氣節與同郡宋琪齊名燕薊間時號二宋云馬知節全義子以蔭補官真宗時為樞密副使遇事敢言時王欽若為使知節薄其為人每廷議得其不直輒面詆之聞其風者皆知為正直云張鑑藏英孫本將家能嗜學舉進士太宗時為侍御史真宗朝以工部侍郎出知廣州民條其政績上請立石子士亷士宗士程皆仕於時張佶燕人父昉殿中少監佶少有志節涉獵書史善騎射有方略太宗時為利州轉運副使真宗時為益州鈐轄甚有威惠子宗象兵部員外郎許驤薊州人風骨秀異十三能文善詞賦初詣貢部與吕蒙正齊名擢進士官歷御史中丞用法寬恕時稱仁厚長者子宗夀殿中丞石延年幽州人為人跌宕任氣節為文徑健於詩最工善書仕至太子中允時天下不識戰者三十餘年延年請為二邊之備不報及元昊反始思其言楊崇勳薊州人祖守斌父全美在官至指揮使崇勳知兵法及前代興廢事真宗時為羣牧使仁宗時拜同平章事判定州卒諡恭毅邵雍范陽人年三十從父古徙居河南雍髙明英邁於書無所不讀每尚友古人及見李之才聞性命之學乃自探賾索隱洞見天地運化古今事變萬物性情遂衍宓羲先天之㫖著皇極經世諸書程子稱為振古之豪傑也張世傑范陽人少從張柔戍杞有罪遂奔宋吕文德召為小校纍官至保康軍節度使知平江召入衛元兵至臯亭山遣使說降世傑斬其使及衛王駐崖山元將張宏範得世傑甥韓使招之世傑不聽宏範攻崖山陸秀夫抱衛王投水死世傑以小舟奉楊太后脫去欲求趙氏立之遇颶風世傑仰天呼曰天不欲存趙祀則風覆吾舟舟遂覆遼耶律儼析津人父仲禧為南院樞密使封韓國公仲禧本姓李遼主賜以國姓儼好學能詩且性亷介由進士纍官參知政事後封淶水郡王卒贈尚父韓延徽安次人少英邁涉獵經史纍官崇文館大學士政事令中機務悉令裁决為佐命功臣封魯國公子德樞官至侍中封趙國公韓知古玉田人善謀有識量仕至中書令時國初禮文疏濶知古援據故典參酌國俗為之由是遼國禮文可觀子匡嗣終西南招討使卒贈尚書令室昉析津人幼謹厚篤學不出外户者二十年會同初登進士纍官翰林學士遼主數延問治亂得失奏對稱旨後拜相整革蠧弊知無不言以故法度修明朝無異議張儉宛平人端思清儉不事外飾統和中進士第一為雲中幕官聖宗召訪世務儉條奏三十餘事纍官至左丞相封韓王楊佶析津人弱冠聲名籍甚統和中進士第一纍官翰林學士文章號得體遷吏部尚書中書門下平章事以進賢為已任事總大綱人人樂為之用所著有登瀛集韓德讓知古孫重厚有智略明治體為政事令賜姓名耶律隆遇後代室昉為北府宰相拜大丞相封齊王馬得臣祈津人博古能文尤長於詩纍官翰林學士承旨時聖宗擊鞠無度得臣乃疏唐貞觀開元間事可法者數條以諫聖宗嘉納之卒贈太子太保牛溫舒范陽人剛正尚節義遼進士為户部使國民兼足遷侍郎拜參知政事後使宋無忝國命還加中書令楊晳安次人幼頴悟通五經大義太平中擢進士為著作佐郎纍遷南院樞密使命總朝政請謁不行後封遼西郡王楊績良鄉人舉進士纍官南院樞密使遼主嘗召見論及古今治亂人臣邪正績曰何代無賢遇亂世則獨善其身遇明主則兼濟天下陛下銖分邪正升黜分明天下幸也後封趙王趙徽析津人舉進士纍官翰林學士承旨嘗為武定軍節度使及代去民上章請留後以南府宰相門下侍郎致仕卒諡文憲劉伸宛平人少以詞翰聞登進士纍官大理卿明法而恕人以不寃一日奏獄遼主與近臣語不顧伸進曰自古帝王重民命願省臣奏道宗驚異後拜參知政事王鼎涿州人博通經史時馬唐俊有文名適上已與鼎祓禊水濱因飲索鼎賦詩鼎援筆立成唐俊驚其敏妙舉進士纍官翰林學士當代典章多出其手楊遵朂范陽人第進士纍官北府宰相遵朂一目五行俱下决事如流其在樞府政無填委卒諡康懿金韓企先知古九世孫纍官尚書右丞相博通經史知前代故事一時禮制咸折衷得宜専以培植奬勵後進推轂士類甄别人物為已責世稱賢相卒封齊國公諡簡懿程宷析津個第進士纍官至翰林侍講學士嘗上疏言事以追崇宗祖慎選賢才舉巡狩立紀綱為務平生剛介不諂權貴有古君子之風韓昉燕京人天慶初進士第一官至翰林學士禮部尚書參知政事封鄆國公昉性仁厚善屬文長於詔冊嘗作太祖睿德神功碑當時稱之子汝嘉第進士纍官翰林侍讀學士有詩名梁斗南良鄉人第進士纍官至河南都運性頴悟讀書精熟尤喜作詩有幹局長於吏事能剖繁治劇時輩服其通敏二子敬恭敬左司郎中恭仕元為中書平章政事劉仲誨宛平人父彥宗纍官平章事仲誨官至太子少師兼御史中丞立朝峻整容色莊重世宗嘗曰朕見劉仲誨常若將切諌者其以剛嚴見重如此劉徽柔安次人第進士為洪洞令明敏善聽斷秩滿縣人遮戀不得去者彌日為立生祠刻石頌德後遷同知河東南路轉運使以亷第一入為大理少卿孫即康析津人八代祖延應遼涿州刺史曾祖克構檢校太傅即康大定中第進士纍遷吏部左司郎中後拜平章政事封崇國公賈少冲通州人勤學日誦數百千言第進士纍官左補闕嘗使宋宋方有祈請金主諭以意少冲曰臣有死無辱宋别致珍異少冲笑曰行人受賜自有常數寧敢以賂辱君終不受使還世宗嘉之遷右諌議大夫子益亦舉進士纍官太常卿丁暐仁宛平人冲淡寡欲好學無倦舉進士調武清縣丞立學校召俊秀子弟教之遷和川令先是羣小越法暐仁申明法禁奸吏屏息纍遷陜西轉運使巨構平谷人第進士纍遷橫海軍節度使寬厚亷慎所治以鎮靜稱世宗嘗曰巨構外淳質而內明悟鮮有及之者閻公貞宛平人第進士為朝邑主簿以察亷升同知亳州防禦使纍遷翰林侍讀學士公貞居大理幾十年詳審周密未嘗有過舉被命校定律令多所是正金人以為法家祖云王翛涿州人第進士歷知霸州及大興府性剛毅臨事果斷吏民憚其威纍遷至户部侍郎承安間大興知府缺金主諭宰臣曰可選極有風力如翛者為之髙昌福宛平人父履遼御史中丞昌福辟河南元帥府令史時宗弼復元帥治汴人有疑似被獲皆目為宋諜者殺之昌福讞得實釋去者甚衆纍遷東京留守事治最遷山東西路轉運使工部尚書王蔚香河人性通敏曉析吏事皇統進士調良鄉丞治績優等超拜河東北路轉運使亷察為時第一後以尚書右丞致仕馬惠迪漷陰人天德中進士調昌邑令察亷第一纍遷左司直郎中世宗稱其聰明朴實拜參知政事馬琪寶坻人正隆進士為永清令以治聞纍遷户部尚書世宗稱其明敏上不欺國下不害民後拜參知政事韓玉漁陽人曾祖錫濟南尹玉以經義詞賦兩科進士入翰林為應奉應制一日百篇文不加點嘗作元勳傳章宗歎曰勳臣何幸得此後以建言開潞水漕渠船運至都升同知陜西東路轉運使王寂玉田人父璴金初名士官至歸德府判官寂第進士官至中都路都轉運使文學政事為時所稱卒諡文肅所著有拙軒集北遷録髙士談燕人家富圖籍與宇文虛中友善仕至翰林直學士所著有䝉城集王師楊大興人父啔纍官吏部尚書師楊南渡時居嵩山博涉羣書終日閉户默坐雖同輩罕見其面時號閉户先生傅霖玉田人第進士纍官至崇義軍節度副使行部臨潢沒於兵子輔之亦第進士授滎陽令元兵壓境抗節不屈而死馬肩龍宛平人少有能賦聲初在太學嘗辨名將從坦殺人之寃時論義之後德順受圍州將假肩龍鳯翔判官守禦一委任之受攻百日食盡乃陷遂遇害詔配食褒忠廟杜時升霸州信安人博學知天文宰相薦其可大用時升察天文時事有亂亡兆遂隱居嵩洛山中以伊洛之學教人子瑛亦隱緱氏山盡讀諸書教授汾晉間元初屢聘不就所著述甚富卒贈魏郡公諡文獻李霆寶坻人粗知書善騎射輕財好施貞祐間與弟雲率義兵巡邏固安永清間充義兵都統纍立功遷防禦使賜姓完顔後為京兆安撫使王毅大興人第經義進士纍官東明令貞祐末東明圍急毅率民兵願戰者數百人拒守城破率衆抗戰力窮被執縣人王八欲降之毅厲聲曰忠臣不佐二王驅毅者以刀斫其脛不屈而死張天綱霸州益津人纍官監察御史以鯁直聞後遷御史中丞權參知政事從哀宗遷蔡蔡城破為宋所獲轞車械至臨安有司令供狀迫書虜主天綱曰殺即殺焉用狀為竟書故主而已有司不能屈元張子良涿州范陽人金末四方兵起燕薊間耕稼已絶子良聚州人阻水治舟筏取蒲魚自給從之者衆乃部勒就食東平時金受重圍於汴有國用安者圖入投子良為入汴達意金君臣以為自天降也及金亡乃歸元太宗時纍官大名路總管兼府尹卒追封清河郡侯梁陟良鄉人金進士入元以名儒徴領燕京編修所事卒諡通獻先生石天麟順州人好學不倦習諸國書語初事太宗為斷事官佐耶律楚材釐正庶務憲宗時遣使海都被拘二十八年始得還世祖加以官以奉使無狀固辭後纍官至平章政事卒年九十二追封冀國公諡忠宣子圭官至南臺御史中丞次子懷都刑部尚書王伯勝文安人為遼陽等處行中書省平章政事治懿州增郡學弟子員擇師教之又度閒田募民耕種以廩餼之召拜大都留守遼陽民乞留不報皆涕泣而去及卒追封薊國公子恪官至兵部尚書王利用通州潞人世祖徴為太子賓客首以敬天法祖孝親仁民十餘事為勸帝嘉納之亷希憲嘗語人曰方今文章政事兼備者利用其人也梁德圭良鄉人仕至參知政事奏對無不稱旨世祖嘗怪州郡囚數過多德圭對曰當國者急於徴索蔓延收繫以致此耳世祖感悟因大赦史天倪永清人少好學仕至兵馬都元帥每受命征伐皆不戰而克子楫為真定路總管有善政民皆德之季子權為河南等路宣撫使纍陳征南之策世祖壯之史天祥天倪從兄仕世祖朝纍官副都元帥每征伐不嗜殺人憂國憂民之心老而不忘子彬為江東提刑按察副使史天澤天倪弟纍官光祿大夫右丞相平居若無能為者及臨大節論大事毅然以天下之重自任出入將相踰五十年主上不疑下民無怨人以方郭子儀曹彬云子格樟杖杠杞梓構皆拜顯官朱國寶寶坻人仕至海北海南宣慰使所至立官程更弊政訓兵息民俱有條制夷民咸畏服之世祖慰勞再四進輔國上將軍都元帥張世澤昌平人祖巴圗率衆附太祖留備宿衛屢立戰功父䝉古台從憲宗入蜀又從征襄樊為行軍千户冒犯矢石屢挫而不沮世澤從巴延南征大小十餘戰皆有功又從平廣西纍遷副萬户李德輝通州潞人性極孝友操履清慎仕為太原路總管凡可以阜民者皆力為之後為安西行省左丞招降羅施鬼國及卒蠻夷聞訃哀哭之如私親至為位而祭及立廟祀之張九思宛平人以工部尚書兼詹事府丞力舉名儒上黨宋道保定劉因曹南夾谷之竒東平李謙分任東宫官屬時稱得人纍官平章政事加大司徒子金界奴河南省右丞張禧東安州人父仁義為管軍元帥攻歸德戰歿禧從大將南征世祖時纍官至都元帥時議征日本禧即請行子宏綱從父攻城徇地屢有功官至左丞及卒追封齊郡公諡武宣郝彬霸州信安人仕至户部尚書嘗以天下轉輸商旅市易之不如法者著為定制請行便益天下仁宗時為大司農劉德溫大興人仕為大都路總管府事時輦轂之下供給浩繁德溫措置有法民用不擾後轉永平路總管為政二年户口增倉廩實興學育材為時良吏張榮實霸州保定人父進金季封北平公守信安城榮實從大將南征斬宋吕文信平李璮擒密祐皆有功纍官湖北道宣慰使諸路水軍萬户及卒子玉襲職討叛賊有功加都元師曾德漁陽人宗聖公五十七代孫母早亡父仲祥再娶左氏擕游襄陽居馬時兵陷襄陽失左氏德遍求南土得於廣海奉迎歸養終身吳鼎燕人仕至禮部尚書至大初為保定路總管時太后欲幸五臺言者請開保定西五回嶺以取捷徑鼎言其不便乃止後為京畿漕運使卒追封薊國公諡孝敏盧摯涿州人仕至翰林學士博學有文思元初稱能詩者必以劉因盧摯為首所著有踈齊集鮮于樞漁陽人官至太常典簿能詩文尤精書翰所著有困學齊集虞集嘗云大德延祐間漁陽吳興巴西翰墨擅一代謂鮮于樞趙孟俯鄧文原也王倚宛平人讀書務躬行不事章句世祖選倚侍東宫有詔皇太子裁决天下事凡時政民瘼倚知無不言後拜工部尚書以疾辭職給太子家丞祿優養之及卒追封太原郡侯諡忠肅李衎薊邱人號息齊道人博學多通官至浙江行省平章政事卒諡文簡衎善竹石窠木所著竹譜今傳子士行官至黃巖知州竹石得家學尤善山水趙師魯文安人祕書少監趾之子初補中書省掾典章法度無不練習及典銓選人服其公泰定間拜監察御史勸帝修舉郊廟大禮元夕帝命有司張鐙山為樂師魯力諌止之卒諡文清梁曾燕人纍官淮安路總管兩使安南國能宣布威德其君贐以金幣竒物悉却不受還仍任淮安能興學厲俗籍籍有聲後既致仕復起為集賢侍講學士國有大政悉令裁决宋本大都人少肆力於學至治初進士第一纍官集賢院學士兼國子祭酒嘗指言朝廷政事之失詔悉罷之所著有至治集弟褧泰定初進士纍官翰林直學士其文學與本齊名所著有燕石集宗杞大都人年十九父卒號泣絶而復蘇水漿不入口者三日過哀成疾杞有繼母自度不起囑其妻楊氏曰汝善守志事吾母遂卒楊遺腹生一男人謂孝感天不絶其嗣泰定中旌其門李士瞻東安人為翰林學士承旨封楚國公嘗使適海酋據福州城王師攻之不下士瞻諭以禍福酋遂出降閩人立祠祀之有經濟集子守成官至翰林檢討有德望河朔學者多師之有一山文集曹鑑宛平人纍官禮部尚書在官三十餘年以清介見稱天性純孝通五經為詩賦尚騷雅為文法西漢每篇成學者爭相傳誦何失昌平人負才氣能詩文至正間名公交薦之以親老不就揭傒斯嘗推重云心事巢由上文章陶阮間虞集見其所作歎曰當序而傳之使後之作者亦知世有斯人本朝董倫宛平人端厚質實能詩文洪武中為右春坊大學士久之出為河南參政坐纍謫雲南洪武末召還授禮部侍郎兼翰林院學士禮遇甚厚劉英寶坻縣人洪武中仕為山西繁峙知縣亷能守法深得民心後秩滿縣人詣闕乞留詔復任仍命禮部書其政績超羣以曉示天下畢汝舟武清人洪武中領鄉薦擢監察御史振揚風紀有聲纍升廣東布政司右參政郭習中三河人洪武丁卯科舉人擢河南府教授以成材績最升山西沁州知州歷刑曹郎中官至江西布政司左參政張克誠房山人洪武中以明經舉任本縣訓導教誨有方人材多所造就官至都察院左僉都御史盧祥房山人洪武中歷官刑部郎中才能著稱從征有功升本部侍郎卒於官付吉大成人以通經領鄉薦永樂中擢監察御史剛直有為升陜西按察司副使王得中昌平人洪武中以才能舉用歷任勤能纍官江西布政司參政劉士原昌平人洪武中以才能薦舉擢山西潞州知州有惠政及民官至陜西布政司參政紀諄東安人洪武中由太學生擢監察御史持法敢為永樂初升山東按察使終任交址李季鼎大興人永樂初以國子生拜為春坊贊善講授經書深見禮待為人博學强記當時號為書庫及致仕猶訪以時政宣德初以輔導功録其子李嘉宛平人幼立志事父母盡孝始為奉祠所禮生永樂初以守城功授鴻臚序班升通政司參議官至禮部侍郎嘉持身端謹剛方嚴毅人不敢干以私李慶順義縣人由國子生署都察院右僉都御史纍官兵部尚書兼太子少保安逺侯柳升征交址慶參督軍事至交址卒慶剛直敢為不畏强禦遇事有未便侃侃爭論當時嚴憚之甄庸宛平人為户部主事有聲遷松江知府在任政平訟簡坐纍降右軍都督府經歷尋薦為監察御史出巡廣西卓有風裁召還拜工部右侍郎尋升尚書致仕庸性凝重言若不出口遇事處之綽有餘裕薛貴昌平人永樂中從征有功纍升都督僉事進封安順侯卒追封濱國公諡忠壯薛斌昌平人永樂中纍立戰功進封永順伯子綬襲伯爵以從北征沒於陳諡武毅毛勝其先幽薊人勝以父廕本朝宣德中升都指揮使正統以來纍平賊冦歷升左都督鎮守邊方進封南寧伯卒賜葬祭劉中敷大興縣人性恬淡忠厚永樂初以守城功授陳留縣丞纍遷江西左參政山東左布政使所至以愛人稱正統初召拜户部尚書未幾罷歸後起為户部左侍郎兼太子賓客卒李斆涿州人永樂中為户部主事歷江西四川參議纍升四川布政使在官亷敏鋤奸撫善威惠並行性剛直人有犯法繩之不少貸蜀人稱為鐵面李正統中召為吏部左侍郎以疾卒奈亨香河縣人以守城功永樂初授修武縣丞歷升左通政光祿寺卿所在以勤慎能幹名後以户部左侍郎致仕卒楊善大興縣人永樂初以守城功歷官鴻臚鳴贊纍升本寺卿禮部右侍郎扈從北征進升右都御史尋因奉使有功升左都御史天順改元封興濟伯兼禮部尚書善練習朝章歷官恭勤卒加封興濟侯諡忠敏張敏永清人宣德中進士擢工科給事中在任以勤慎稱正統末升工部右侍郎致仕卒楊鐸薊州人由進士授給事中以言事出為知縣亷明有為撫字不倦歷官廣東參政韓雍宛平人登正統初進士授御史歷廣東山西按察副使僉都御史升兵部右侍郎坐事出為浙江參政以平廣賊功升右都御史卒諡襄毅劉繼仁涿州人歷官蒲臺知縣時兵亂之後乃極力撫存民有前劉後劉之頌後以事忤中貴左遷無錫丞卒嶽正漷縣人正統戊辰進士及第纍官翰林修撰天順初命入文淵閣預機密重務尋以言得罪謫戍邊成化初復起為修撰出知興化府尋去性豪邁不羈文章詩詞才氣飄逸亦似其為人家計蕭然濱於貧困人服其居官有清操云馮傑涿鹿人歷官臨清知縣民有去思碑升刑部員外郎仕至四川按察副使征冦被執不屈死之武成通州人初為泉州衛千户有勇略善騎射正統天順間纍立戰功歷升福建都指揮僉事性孝友又能禮賢下士不類行伍中人尚義涿州人歷官池州府通判有善政升萊州府同知以質直忤當道遂致仕李麟順天人由進士歷官知府性亷介家人無肉食者卒於官倒囊無鮮綺可殮時論偉之列女盧氏范陽人少好讀書造次必以禮盛年寡居親教授諸子漢將基良略山東以其子務光為記室及良敗慈州刺史上官政簿籍務光家見盧氏逼之盧氏以死自誓政凶悍以燭燒其面盧氏竟不屈宋氏元翰林學士褧之女嫁永平王宗仁永平受兵宋氏夫婦被虜有窺宋氏欲害宗仁者宋氏顧謂夫曰我不幸至此必不以身纍君言訖投井死劉氏名翠哥房山人李仲義妻至正末縣大饑官兵執仲義欲烹之劉氏奔救流涕伏地乞貸其生不從劉曰吾聞婦人肥黑者味美願就烹以代夫死兵遂釋其夫而烹劉氏聞者莫不哀之嶽氏大都人元末兵入城嶽氏告其夫徐猱頭曰我等恐被驅逐將奈何夫曰事急惟死耳何避也遂火赴其居夫婦赴火以死其母王氏及二女一子皆抱持火死李氏名賽兕房山人王士明妻至正末竹貞軍至縣李氏及其女安奴皆被執士明隨至軍軍怒逐之李氏謂其女曰與其受辱不若死女曰母先殺我李氏即以軍所遺刀殺其女而自殺王氏燕人張買奴妻也年十六買奴官錢塘病歿葬城西十里外王氏每自被髮往奠伏墓大慟久而致疾舅姑謂曰新婦尚少宜自圖終身計王氏泣曰父母命妾歸張氏此足豈可更履他人門乎㷀居三十年無少玷事聞旌其門栁氏薊州人許嫁户部主事趙野未成婚而野卒栁誓不再嫁其兄將奪其志固不從後寢疾不肯服藥曰我年二十六而寡今已逾半百得死幸矣遂卒惠士元妻王氏大都人士元疾革囑曰我必不起前妾所生子汝善保護之待其稍長從汝自嫁士元卒王氏遂蓬首垢面居墓側以妾子置左右撫養之嵗餘妾子亦死乃哭曰無復望矣經死於樹劉氏薊州李彥賓妻年二十四而彥賓沒家貧子幼劉氏誓不更適子既長娶婦楊氏未幾子亦死姑婦相依以貞節自持至老不渝本朝洪武中旌為雙節之門梅氏安東人年十八適士人謝黑貌夫疾篤度不可生囑梅曰爾年尚少勿為我慮梅泣下遂欲自盡以隨姑覺止之曰汝志固如此但吾夫婦偕老無他兄弟備養况汝娠未娩倘得一子以續吾家宗祀豈不重乎梅遂悟後果生子梅夙夜勤於紡織以奉舅姑及卒復脫簮珥以襄大事其子俊亦撫育成立孀居四十餘年有司以其事聞宣德中詔旌表其門胡海妻王氏豐潤縣人嫁興州前屯衛千户胡海海歿王氏年少無子誓不再適奉舅姑甚恭父母欲奪其志王氏嘆曰若事二姓曷若從夫於地下乎遂自縊正統中旌表其門費隱妻王氏良鄉縣人隱有疾王氏數嘗其糞及疾篤囑王氏曰我一子一女雖妾生無異汝生我死汝善撫之夫沒王氏居喪以撫子女未幾子亦死服除謂其親囑曰今夫已死妾生何為乃執女手謂之曰汝今稍知人事管鑰在此汝自司之相抱痛哭是夜遂縊死周氏良鄉民魏成妾也成年五十乏嗣娶周氏生一子後成得疾周氏事之甚勤及成歿時周氏年二十服闋親戚或勸之再適周氏曰常聞列女不更二夫妾雖愚婦豈肯事二姓乎於是服勤耕織事姑三十餘年事聞詔旌其門孔氏東安縣人適縣學生陳璉璉以嵗貢入太學留孔氏奉姑越三年璉客死孔氏躬迎櫬還葬姑憐其無子欲嫁之孔氏曰夫既早逝姑老且疾婦若嫁之姑將何依哭而不從時遇兵荒人咸奔竄孔氏事姑甚謹姑卒盡賣衣服葬之孀居五十八年正統中旌其門仙釋寇謙之昌平人少遇仙人成功興與之逰嵩華食仙藥遂隱嵩陽元魏貞元中召至闕謙之一日謂弟子曰昨夢功興召我於中嶽仙官遂羽化有青氣如烟從口中出天半乃消其體漸縮織者謂尸解後東郡沈猷見謙之在嵩山身作銀色光明如日始知其為仙矣薛昌幽薊人為進士唐天寶間棲止於蜀之青城洞天觀忽得商陸酒飲之耳鼻血流死經三日蹶然而蘇身輕目明勢欲飛舉洞見逺近節度使延置賓館欲送至京師忽失所在邱處機登州人九嵗從重陽祖師逰金世宗召問以持盈守成之難為對居萬寧宮後還終南元太祖請至作醮焚簡飛空五鶴翔舞每有咨訪以清淨慈孝為對請住太極宫賜以虎符凡適家事一委處置卒年八十餘封長春演道主教真人梅志仙檀州人戒行嚴峻修道黑山二十餘年遂能出神逺逰郡國人莫能測有無根柏一株使其徒栽之即見茂盛卧於石嵓浹辰不食虎馴擾其側年九十餘端坐而化嶽真人涿州人其母一日夢老人皓首長身冠劒莊偉告之曰我今當寄母家矣明日州人見有青氣西北起自天而下奔往視之止於嶽家真人乃生自幼不嗜酒肉長即辭親學道師事大元真人卒得其祕元至元中封崇元廣化真人丞相安圖病真人視之即愈大德初升仙而去曇無竭姓李氏幽州人幼為沙彌修苦行嘗聞法顯等躬踐佛國慨然有志乃入流沙經龜兹沙勒諸國進至罽賓國禮拜佛鉢學梵書梵語求得觀世音受記經梵文一部後西入月氐國天竺界惟齎石蜜為糧後隨舶泛海達廣州而歸不知所終洪源潁州人幼聰秀為親鍾愛忽夜夢釋迦佛自上而降入坐堂中口誦法華經洪源敬仰久之而覺遂辭父母出家初居西峯寺後卧錫靈巖院一日出遊眠於沙灘上有虎繞其身至曉而去人皆異之常在遼重熙間在寶坻縣城南隅渠水之陰建彌陀佛舍結廬其傍持經侍佛棲心入道淡然而居其中後趺坐而化茶毗之日火身不灰徒僧以其身立於佛側已而髮再生焉踰月則削之後有女子以手捫其頂髮遂不生明一統志卷一
