body:
  text: 明一統志卷八十三明李賢等撰廣西布政司廣西古百粤地漢領於荆交二州刺史唐以其地𨽻嶺南道後分為嶺南西道廣徳初置桂管都防禦觀察等使宋屬廣南西路置經畧安撫司以靜江守臣兼領又置提點刑獄司治象州元置廣西兩江道宣慰司及嶺南廣西道肅政㢘訪司于靜江俱𨽻湖廣行省至正末始於靜江置廣西等處行中書省本朝置廣西等處承宣布政使司領桂林柳州慶逺平樂梧州潯州南寧太平思恩田州思明鎮安十二府江州泗城奉議思陵利州龍州向武都康八州置廣西都指揮使司領桂林右桂林中南寧柳州慶逺潯州馴象南丹奉議九衞及全州灌陽平樂遷江富川梧州容縣懷集賀縣鬱林十守禦千戶所置廣西等處提刑按察司分桂林蒼梧左江右江四道兼察諸府州衞所三司並治于桂林云桂林府東至湖廣永州府道州界六百里西至潯州府南平縣界三百五十里南至柳州府馬平縣界二百六十里北至湖廣寳慶府武岡州界三百八十里自府治至南京四千二百九十五里至京師七千四百六十二里糧十二萬五千石零建置沿革禹貢荆州之域天文翼軫分野古百粤地戰國時為楚粤之交秦為桂林郡地漢屬零陵蒼梧二郡東漢為始安侯國三國吳置始安郡屬荆州晉屬廣州宋改為始建國南齊復為始安郡梁兼置桂州隋初郡廢大業初州廢復置始安郡唐復為桂州治臨桂縣天寳初改始安郡至徳間又改建陵郡乾元初復為桂州光化間陞靜江軍節度五代時屬南漢宋仍為州紹興間陞靜江府元改置靜江路本朝改桂林府領州二縣七臨桂縣附郭本漢零陵郡始安縣地晉屬始安郡唐析置福祿縣貞觀初省入更名臨桂宋以慕化縣省入元仍舊本朝因之編戶一百八十四里興安縣在府城北一百三十里本漢始安縣地唐武徳中置臨源縣大厯中土將搆逆縣人守義不從遂改為全義縣晉時以縣置溥州宋初州廢太平興國初改曰興安縣元仍舊本朝因之編戶十四里靈川縣在府城西北五十二里本始安縣地唐龍朔初析置靈川縣宋元仍舊本朝因之編戶四十八里陽朔縣在府城南一百四十里本始安縣地隋析置陽朔縣屬桂州取陽朔山為名唐初析置歸義縣貞觀初省入宋元仍舊本朝因之編戶一十三里永寧州在府城西一百五十里本始安縣地唐析置純化縣永貞初改慕化縣乾寧初又析慕化置古縣屬始安郡宋屬融州後屬靜江府元因之本朝初改為古田縣隆慶五年陞為州以永福義寧二縣屬焉編戶一十里領縣二永福縣在州城西南一百里本始安縣地唐初析置永福縣因鄉為名屬桂州宋元因之本朝省理定縣入焉改今屬編戶九里義寧縣在州城西北八十里本唐靈川縣地五代晉時馬氏置義寧鎮後陞為義寧縣宋開寳中省尋復置元仍舊本朝因之編戶六里全州在府城東北二百五十里秦屬長沙郡漢為零陵郡之洮陽零陵二縣地三國屬呉隋置湘源縣𨽻永州五代晉時改為清湘縣置全州宋𨽻荆湖路元改置全州路本朝洪武初改路為府九年改為州省清湘縣入焉𨽻湖廣永州府二十八年改今屬編戶八十五里領縣一灌陽縣在州南九十里本漢零陵縣地呉析置灌陽縣因灌水為名隋省入湘源縣大業末蕭銑復置𨽻全州唐初省後復置屬永州五代時馬氏属全州宋元仍舊本朝因之編户五里郡名桂林秦名始安呉名建陵唐名八桂其名本出仙經後人因植八桂於堂前故又以名郡靜江唐名形勝東控海嶺右扼蠻荒唐白居易行嚴謨知桂林制居五嶺之表控兩越之郊唐蕭昕送刺史序交廣之衝唐呉武陵記東制邕容交廣之衝南扼賔蠻嚴象之隘水環湘桂山類蓬瀛唐李義山文桂嶺摩天灕波經地桂林志被山帶江宋唐弼記五管之地桂為大被山帶江控制數千里西南㑹府宋李彦弼記桂為西南㑹府所以為襟蠻帶海用兵遣將之樞山水重天下宋楊萬里全州記衡湘以僻左自逺于中州而亦以山水重天下風俗風俗與中國同桂林志嶺南地氣卑下民多瘴癘惟靜江與湖湘接民風習俗與中國同氣候與江浙同嶺外代荅雨下便寒晴便熱不論春夏與秋冬此盖南方之氣候桂林與江浙頗類過桂林而南則大異矣習俗醇古宋范成大虞衡志序風氣清淑桂林志靜江風土和平有中州清淑之氣雪霜時舉疾疫不興號為樂土俗尚質朴同上八桂之俗尚質朴不事浮靡婚姻慶弔以㯽榔為禮襍以石灰㗖之或簇之合盤寘之懷袖以為恭先否則謂之鮮禮或曰可辟瘴氣士知經術宋李彦弼八桂堂記民俗篤信隂陽多尚巫卜病不求醫藥士知經術雖家貧未嘗廢學不漁則樵宋李之儀全州記清湘間山深水濶生理不漁則樵取足於目前得一温飽更不他圖民訟甚簡宋王禹偁云民訟甚簡兵賦甚鮮山川桂山在府治東三峰連屬城中望之前峰拔起如獅子昻首狀有巖桂生其巔次峯宛轉横亘一方俗號北山從峰巃嵸鬱積是為叠綵巖舊號越王山頂有石壇世傳五代時馬殷所築獨秀山在府治北直聳五百餘丈如卓筆然環頫諸峰獨為雄秀唐張固詩孤峰不與衆山儔直入青雲勢未休㑹得乾坤融結意擎天一柱在南州伏波山在府治東北又名伏波巖突起千尺與獨秀山相望下有洞可容二十榻石如蒼玉旁有懸石如柱俗號馬伏波試劔石巖上有巨人跡復有紫白二紋長數丈蜿蜒相向有圎暈直其首如二龍戲珠舊名玩珠洞宋張維易曰還珠張孝祥大書於石洞前石脚揷入灕江章峴詩江瀾洄洑嚙山根山裂巖開石室存溺鬼夜呼千嶂黒蟄龍晨起一川渾七星山在府城東二里舊名七星巖七峰列如北斗旁有小峰如輔星縁磴而上山半有亭曰簮帶絶頂有道院超出塵表宋張孝祥詩朝遊七星巖暮上千山觀東西兩竒絶勢畧嶺海半彈丸山在府城東二里下有泉奔流迅激東注于灕江山之西北及溪中有石如彈丸故名西山在府城西三里一峰峻拔如立魚狀俗號石魚峯餘峰環列唐戎昱詩登髙西山上髙處更堪愁野菊他鄉酒蘆花滿眼秋隱山在府城西三里唐李渤出鎮見石門大開有水泓澈乃芟薙蕪穢跡通巖穴石林磴道若天造靈府不可窮究因號隠山上有朝陽夕陽南華北牖嘉蓮白雀六洞呉武陵韋宗卿有記灕山在府城東南三里灕水之陽一名雉山又名沈水山其山孤拔下有澄潭旁有洞穴南北直透上有怪石欹危藤蘿縈茂土人嘗避亂其中華景山在府城北三里下有洞深廣如厦屋中多唐人遺刻宋李師中詩詩翁仙去舊壇荒雲滿空山花自香老盡遊人春不問杜䳌聲裏幾斜陽寳積山在府城北三里與華景山相連多詭石怪木山東隅有巖石乳融結舊名吕公巖元梁遺詩松涵雲景竹生煙松竹深藏小洞天讀罷黄庭觀鶴舞更於何處覓神仙舜山在府城北五里一名虞山層巖臨江有舜祠并唐人磨崖刻記祠後有韶音洞宋張栻記云虛明以長石色青潤可愛而地之勝有若天成焉穿山在府城東南五里山巔有穴通透望之如月輪掛空南溪山在府城南七里聳拔千尺煙翠凌空下臨南溪辰山在府城東北一十里山有三巖下巖曲折而入石室穹然中巖乳石多竒怪上巖有一亭可眺望中隠山在府城西一十里山有三巖下巖深廣如積大艘中巖明爽有乳石凝結上巖差小舊有寺懸崖製屋恍然非人境元郭思誠詩訪隠尋幽緩著鞭梅花初試小春天孤峰上下分三洞一水縈紆溉萬田堯山在府城東北一十五里環桂之山皆石此獨積土中有堯祠按史傳堯封履不到蒼梧以西與舜山相對人慕堯舜之風因名元吕思誠詩堯山絶秀嶺南天雪壓林嵐飄素煙髙倚暮雲屏掩翠半消晴日玉開田侯山在府城西一十五里髙聳如公侯端冕之狀普安山在府城南三十里山勢蜿蜒回繞有泉湧于山頂四時不涸旁有一廟禱雨輒應本朝封為龍泉春秋祀之駮鹿山在府城東五十里相傳唐時有僧元康居此元宗賜白鹿嘗出入騎之故名一名駮樂山又號福祿山臥石山在府城南五十里天柱山在永寧州故古田縣西南一百里湘山在全州西二里中有寺絶頂有亭土人以為遊覽之所宋折彦質湘山留别詩寓久渾忘客臨行似别家途窮身更去秋老鬢先華生計黄茅合歸期碧海賒湘山今夜雨留我意無涯書堂山在全州北二里宋柳開為守愛其泉石之勝築室讀書因名書堂又名柳山舊有秋髙曲水二亭元陸垕詩何年柳使君開此讀書林天地三江逺煙雲一逕深髙山仰聖道流水靜人心伊昔從游樂遺風尚可尋覆釜山在全州西四十六里以形似名下有定光寺文山在全州北五十里其下洮水所出龍蟠山在興安縣東一十五里山下有石洞洞門數重遊者秉燭而入水中有魚四足而有角人不敢傷恐致風雨爾雅云鯢似鮎四足聲如小兒今商州溪中亦有此魚謂之魶魚即其類也鳯鳴山在興安縣北三十七里俗呼雞爬山宋淳熙間山側土人蔣来叟登甲科縣令羅震因易今名海陽山在興安縣南九十里舊名陽海山湘灕二水所自出山下有巖幽深行數百歩至水泉處濶不盈尺其深叵測鳳凰山在靈川縣北聳秀可觀又古田縣北三十里亦有鳳凰山半雲山在靈川縣西南其山發基平地四畔孤髙百丈山在靈川縣北一十三里又名把仗山重巒叠嶂綿亘數里靈巖山在靈川縣西北三十里下有巖南北相通若堂殿水灌其中色如藍山谷百源輻湊其下可通舟楫宋王安中詩鑿破巔崖透碧流小舟輕泛入深幽石鱗暎水玻瓈皺山勢凌空翡翠浮雲䕶淵泉時欲雨寒生洞府夏成秋停橈峭壁題名姓醉墨淋漓記此遊陽朔山在陽朔縣北隋因以名縣龍頭山在陽朔縣北下有曹鄴讀書堂今為慈光寺白鶴山在陽朔縣東南相傳嘗有白鶴翔集頂上因名舊有白鶴觀西人山在陽朔縣西七里有石如人東向而坐縣東南二十里又有東人山其形如人拱揖西向威南山在陽朔縣西一十五里下有晉征南將軍薛翊墓廟見存畫山在陽朔縣北五十里桂江上屹立千仞丹崖蒼壁望之如畫鳳巢山在永福縣治北舊名華盖山隋有雙鳳來巢宋時復至守臣以聞朝廷遣使鑿巢下石得美玉因改今名王子宣詩古邑荒涼瞰小溪青山髙與白雲齊鳳凰飛去巢阿閣未肯重來覓故棲欄蠻山在永福縣西南宋陶弼詩西去萬重山茲峰獨限蠻天生賊多計民賴汝為關設險數州地防危一日間守邉須以道絶頂可躋攀鎮南峰在府城北旁有石崖唐大厯中刻平蠻頌宋狄青平儂智髙勒碑于左巖千秋峰在靈川縣東北獨立聳秀俗呼為文筆峰狀元峰在興安縣東二十里其峰聳秀特立宋侍郎唐則家於其旁鄉人以則父子相繼登甲科因名碧蓮峰在陽朔縣西一十五里唐沈彬詩陶潜彭澤五株柳潘岳河陽一縣花兩處爭如陽朔好碧蓮峰裏住人家膏澤峰在陽朔縣治西天將雨雲氣油然嵗旱以為候宋陶弼詩石壁含天澤南山第一重旱時先出雨隂穴必藏龍雲影搖諸壑雷聲起半峰滲成泉脈大滴處土膏濃雲翁峰在陽朔縣南其峰獨秀聳羣峰環列若子孫列侍然故以翁名翠眉峰在永寧州故古田縣北始安嶺在府城西一里圖册云秦時開五嶺此其一也唐李白詩桂水分五嶺杜甫詩五嶺皆炎熱越城嶺在興安縣北三里即五嶺之最西嶺也讀書巖在獨秀山下有石榻石牖如環堵之室可坐十客劉宋太守顔延之曽讀書其中後人因以其五君詠刻于石側宋沈晦有詩曽公巖在七星山下石門唅呀中有澗水左旋東流伏於石下舊名冷水巖宋曽布帥桂跨澗為石橋榜以今名孫覿詩相君千里目渺渺孤鴻送披雲覷天功鑿翠出巖洞中空貫長虹側立剖大甕宛宛臥石梁欲起特地控屏風巖在府城東北五里一名程公巖斷山屹立髙百餘丈中有平地可容百