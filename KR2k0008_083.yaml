鍾吕二仙所留者名宦唐韋挺貞觀間以忠直獲罪貶象州刺史柳宗元柳州刺史不鄙夷其民動以禮法民咸化服凡令之期民歡趨之無有後先民業有經公無負租流逋四歸樂生興事嫁娶𦵏送各有條法又大脩孔子廟城郭巷道皆治使端正樹以名木民皆悦喜及卒建祠祀之程异柳州司馬精于吏治身没家無留貲世重其㢘劉蕡蕡自對䇿後有甘露之難令狐楚牛僧孺節度山南皆表蕡幕府以師禮禮之而中人深嫉蕡誣以罪貶柳州司戶宋楊居政開寳中知賔州築城禦寇賊不敢犯以前守䝉延氷與其弟延錫為賊所害創田宅使其二子居之後延氷之孫傳登第實居政之力焉王舉咸平中知賔州開古漏關路鑿崖燒石舊時人迹不到由是可通車馬陶弼乾興間弼之父知賔州嘉祐中弼繼之元符中其姪達又繼之一門三人出守是郡皆有政術弼尤長於賦詠狄青宣撫廣西時儂智髙守崑崙關青至賔州駐十日值上元節令大張燈饗軍校夜二鼓忽起至曙巳破崑崙關矣張守約歐陽脩薦其有智畧知邉事擢知融州峒將呉儂恃險為邉患捕誅之脩復薦其可任將軍魏瓘提點廣西刑獄减柳州無名役四百人民徳之畢君卿元祐間知柳州郡初無城君卿始築之民頼以安李拱知融州領兵入援京城死于敵建炎間賜其家銀帛百匹兩錢百千陳大和紹興初知象州政平事簡脩黌宇建行館為郡之壯許申紹興間知柳州増脩學宫奏置教授立劉蕡祠以勵士風本朝蘇銓洪武初柳州衞指揮僉事謀畧過人首創公署操兵有法賊攻刼融縣銓率兵奮擊賊敗散後復聚衆摽掠銓設法擒之自此畏服不出民賴以安于海洪武中柳州衞指揮僉事性氣雄勇守大藤峽洞蠻聚衆攻刼海率兵奮勇長驅殺賊潰散搜勦殆盡一方遂安劉燾洪武中柳州知府寛厚不苛有欲私殺牛者牛奔入府堂前悲鳴若訴燾召其人詰之諭以禮法牛賴以生張霖洪武中馬平知縣愛民如子有虎咥人告於城隍設檻捕之明日即獲二虎峒賊為患都督韓觀統兵撫捕賊據險不服曰若張知縣來即投順霖乃衣冠入峒賊皆感悦隨霖出降姚宣洪武中象州判官㢘平不苛撫字有方民懐之流寓薛仁貴龍門人唐咸亨中以大非川之敗貶象州後召為都督擊突厥突厥問唐將為誰曰薛仁貴突厥曰聞薛將軍死象州矣安得復生仁貴脱兠鍪見之皆相顧失色因進擊大破之范祖禹成都人宋紹聖初言者論其脩實錄詆誣又摭其諫禁中顧乳媪事謫永賀二州又移賔州賔人推重皆稱為范太史張庭堅廣安軍人宋紹聖中為右正言坐劾蔡京謫象州雖以此獲罪天下多之許徳言宋宣和間以顯謨閣待制南遷至賔州嘗與韋旻論治心養性守氣安神之説甚詳范正平蘇州人元祐名相純仁子純仁卒有表言宣仁被誣事後蔡京當國小人附㑹妄言純仁遺表乃正平與門人李之儀撰正平坐羈管象州王安中中山人仕宋為尚書右丞靖康初謫象州館于謝氏之扶疎堂得郡人熊氏園植桃百本號小桃源折彦質雲中人宋紹興中為僉書樞密院事後謫居柳州以方直得名孫覿宋紹興中以尚書謫象州文學著聞雖在貶所作文不輟劉洪道宋岳飛重其才辟為叅謀金人犯明州有戰功紹興中飛死洪道謫柳州髙頴宋紹興中叅福建安撫司坐從岳飛謫象州固窮守節剛直之性始終不渝傅自得懐州人宋知興化軍謫融州杜門讀書無復仕進意宰相陳康伯奏得徙自便乾道間復故官胡夢昱宋寳慶中以大理評事上書言濟邸事忤時相史彌逺御史李知孝附㑹彌逺劾去之羈管象州卒後人過其處指曰忠直之居人物唐韋厥上林人武徳間持節壓服生蠻開拓化外詔領澄州刺史後隠于智誠洞厥與諸子皆封侯廟食白聳馬平人仕為義勝都將光啓中寇入郡境盡驅其民掠其財帛聳率所部敗賊奪而歸之郡人為之立祠宋覃光佃融州人愽學能文開寳六年登進士第累官至光祿大夫檢校太子賔客栗大用武宣人年九嵗大中祥符間以通五經應童子舉至汴京入見真宗竒之特補登仕郎後仕至南雄太守韋旻上林人閉門讀書無所不通鄉人以書樓目之元祐間應舉不第遂隠于羅洪洞據山林泉石之勝尤善導養之術號白雲先生梁仲保賔州人忠義勇敢慶厯間儂賊犯邉率衆力戰死之郡人為之立廟宋士堯馬平人皇祐中儂智髙寇廣南士堯領兵至邕州極力與戰已而敗北賊斷其首尸不仆猶犇馬而還後贈屯衞大將軍張亞卿洛容人種學績文瀕老不衰皇祐初擢第廷對見黜後不預計偕郡守鮑安丘竒其才以遺佚薦㝷登鄭獬榜進士官至朝議郎㢘州通判王之才洛容人與張亞卿齊名慶厯間登第歴官至朝議大夫工部侍郎謝洪武宣人與弟澤俱博學有文人號謝家二鳯宣和中相繼出仕凡中朝士夫遷謫於此州者多館其家仙釋武志士脩煉於来賔之武禪山每出赴齋供即架青布幕為橋去五七里逺至市㕓人見而竒之越數年道成宋皇祐初白日上昇佛日禪師來賔縣金華峰第一代祖有戒行宋紹興中於獅子山文殊菴端坐而逝留偈云落落托托上無把捉出沒太虚無繫無縛鐵馬倒地誰人摸索甘大將五代時象州人名佃家富有窘乏告者皆滿其所欲而去性特靈異鄉人决以禍福者無不竒驗一日聚鄰里告曰吾已厭世矣因教衆以脩身事親大節言訖即瞑目而逝鄉人因建廟設像祀之屢着應驗盧六上林縣人生不食肉忽一日往樵大山見二白衣對奕六旁立良久曰汝且去十日可再來言訖白衣者不見六還至家如約而往至大山之巔有平石方丈乃坐其上而化鄉人以為仙去建祠祀焉李仙宋融州人名賤子傭于柳城縣龍氏家為耕牧性喜眠龍氏常責之賤子乃結草為人驅使耕耘龍氏驚遣之歸賤子凡驅逐邪魅不假符咒嘉泰中化去杜應然宋武林人隨父宦遊流寓廣西專心慕道寄跡黄冠中遍遊天下名山嘉定間始來融州歴數十年甚有功于岩觀為羽流中之卓然者夀八十餘卒明一統志卷八十三
