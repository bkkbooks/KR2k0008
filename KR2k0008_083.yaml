賊迎降懷古知其誠乃輕騎至壁撫諭倩等大喜盡歸所掠出降諸洞亦相率歸附嶺外悉平禇遂良髙宗時以諫立武昭儀貶桂州刺史張九齡桂州刺史仁政善聲流於嶺嶠王晙景龍中為桂州都督築羅郛罷戍卒埭江開屯田數千頃以息轉漕百姓賴之刻石頌徳邢濟乾元初為桂管經畧使時西源蠻叛濟擊平之擢為防禦使李昌䕫大厯中為桂管觀察使建學宫於獨秀山嘗平西源賊州人刻石頌徳裴行立貞元中為桂管觀察使善政及民盜遁奸革民懐其徳立祠祀焉呉武陵桂州防禦判官為政尚文雅柳宗元賢其為人謂可以興西漢文章韓佽元和中為桂管觀察使所部二十餘州自叅軍至縣令無慮三百員吏部所補纔十一餘皆觀察使辟置一時多有用之才時詔置五管監兵盡境賦不足充其費佽處以儉約遂為定制衆以為難李渤寳厯中為桂管觀察使治尚文雅時灕江渠壊舟楫不通渤為疊石造隄民受其利魚孟威咸通中為桂州刺史脩靈渠以石為鏵隄延亘四十里植大木為斗門十八重舟楫乃通大為民利宋許仲宣開寳中為廣西轉運使時孫全興征交阯士卒死瘴癘者十七八仲宣奏乞罷其兵未報而以兵屯湖南醫療人或難之仲宣曰若待報將積屍横野矣誅一族活萬夫吾何恨哉太宗詔褒之柳開端拱初知全州時西源洞蠻粟氏聚族五百久為邉患開至選勇辯吏入諭之粟氏懼服擕老幼來歸乃遣其酋入朝邉患遂息淳化初移知桂州陳堯叟咸平初為廣西轉運使嶺外地氣蒸暑為植樹道旁鑿井置亭舍民免暍死其俗病者禱神不服藥堯叟以集驗方刻石桂州驛自是始有服藥者矣曹克明景徳間知桂州嶺外居民結茅為屋嵗多火克明教以陶瓦又引水入城火患遂息陶弼慶厯中知陽朔縣課民植木官道旁行者無暑暍之苦攝興安令移書説桂帥蕭固浚靈渠以通漕不聴至李師中卒浚之師征安南餽餉於是乎出大為民利馮伸巳仁宗時知桂州兼廣西鈐轄㑹安化蠻犯邉趣伸巳討之伸巳嘗知宜州有善政至是單騎出陣語酋豪曰朝廷撫汝甚厚乃自取滅亡耶衆仰泣羅拜曰不圖今日再見馮公率衆降軍門蕭固皇祐初為廣西轉運使知儂智髙凶狡條上羈縻之策於樞府不果用智髙後果叛王世行全州都廵檢使時儂智髙入寇率民堅守進知州事樂易明白順民之欲除其所惡而州以大治及卒民為立廟祀之余靖桂州經帥時儂智髙叛交阯請助討詔不許靖曰邕與交阯接境今不納必助智髙乃以便宜趨交阯㑹兵及智髙入邕州遂無外援靖又遣人入特磨襲取智髙母以獻於朝黄逵皇祐間儂智髙叛狄青薦逵為全州駐泊都監戰于歸仁鋪逵為先鋒擊賊大敗之朱夀隆提點廣西刑獄嶺外新經儂寇老稚婦女遭亂不能自還者檄所在資送其還舊制溪蠻侵暴羈縻州雖殺人無得讎報夀隆請聴相償蠻始畏戢李師中嘉祐間為廣西提刑桂州靈渠舊通漕嵗久石窒舟滯師中積薪焚石鑿而通之民受其利其他善政甚多邉人化其徳多畫像立祠陸詵嘉祐中知桂州交阯使者來議邉事從者五百人偃蹇用故態詵倨見之問所欲言彼果爭漢地詵折其辯莫不懾服徐勣桂州教授王師討交阯轉運使檄勣從軍餉民多避役捕得千餘人使者使勣杖之勣謂民皆飢羸不勝杖姑湼臂示戒亦可巳使者怒勣力爭不變使者不能奪蕭注熙寧中知桂州始至種酋皆來謁注延訪山川曲折老幼安否均得其歡心故交阯動息必知之然有獻征南䇿者輒不應熊本元豐中知桂州諭溪洞酋長戒邉吏勿生事時蔡寳扇龍蕃與洞戶相仇殺欲引兵致討以為功本質之色動縛而投諸海蠻夷以為神胡舜陟紹興間廣西經畧使吕源以書抵秦檜言其非笑朝政檜遣袁柟往劾之不服而死先是舜陟知靜江多恵愛聞其死者為之哭丐者亦斂錢致祭其得人心如此沈晦紹興間為廣西經畧兼知靜江府時南州蠻酋旁結諸洞蠻為邉患晦選將戍邉招誘諸酋諭以威信皆詣府請降結誓而去自是不復犯邉張栻淳熙中知靜江府兼經畧安撫時所部荒殘多盜栻至簡州兵汰冗補闕申嚴保伍法諭溪洞酋豪弭怨睦鄰于是羣蠻帖服李浩知靜江府兼廣西安撫有尚書郎入對論及擇帥事孝宗曰如廣西朕已得李浩矣郡舊有靈渠通漕運及灌溉嵗久不治浩疏而通之民賴其利李椿廣西提點刑獄獄未竟者一以平决之釋所疑數十百人奏禁仕者毋市南物趙崇憲知靜江府兼廣西經畧安撫屬邑地肥磽異等而陽朔脩仁荔浦賦獨倍張栻嘗奏減之人猶以為病崇憲請再加蠲減詔逓損有差三縣民立祠刻石詹體仁知靜江府居官涖民務盡心平心嘗曰盡心則無愧平心則無偏世服其確論髙登知古縣廣西帥沈晦問登何以治縣登條十餘事告之晦曰此古人之政今人詐疑不可行對曰忠信可行蠻貊謂不能行誠不至爾范成大紹熙中知靜江府廣西窘匱專籍鹽利漕臣盡取之于是屬邑有増價抑配之敝成大奏禁之在郡善政著聞李曽伯淳祐中知靜江府兼廣西轉運使陳守邉之宜五事後又節制廣南治靜江姚希得知靜江府兼轉運判官署舊以錦為帟幕希得曰吾起身書生安用此命以繒纈易之應孟明知靜江府兼廣西經畧安撫初廣西鹽易官盤為客鈔客戶無多折閲逃避遂抑配於民公私交病孟明條具驛奏除其弊楊大異提點廣西刑獄兼漕庾二司所至姦吏屏息寇盜絶迹凡可以為民興利除害者必奏行之廣海間道不拾遺董槐淳祐間知靜江府兼廣西經略安撫使時交阯及諸蠻數寇邉槐與約無相侵推赤心遇之皆感服馬塈宋末守靜江元兵攻城三月塈前後百餘戰城破率死士巷戰被殺斷其首猶奮立踰時始仆塈死部將婁鈐轄猶以二百餘人守月城不下皆自焚死無降者元吕思誠至元間為廣西㢘訪僉事廵行郡縣土官有于姓者恃勢魚肉人恐事覺隂遣其子迓思誠于道思誠縛之痛懲其罪一道震肅臧夢解至元末為廣西㢘訪副使故事煙瘴地行部者多不躬至而夢解咸遍歴焉平反獄貪官姦吏多寘於法石亨祖全州路總管時蠻獠入寇城邑民居焚掠殆盡亨祖至築城郭籍民兵以禦寇於是民得安生不三年間百廢興六事備舉民皆頌其徳章伯顏元統間為廣西宣慰使擒殺諸溪洞酋長招撫其衆廣民由是樂生安業咸頌其徳虞集為作平猺記刻于石謝麟元祐中知桂州融江有夷警麟以計平之戍兵從北來不能水土麟部土人使極南而北兵止屯近郡賴以全者甚衆本朝丁玉洪武初任廣西等䖏行中書省叅政兼都衞指揮使以仁恵為政軍民悦服韓觀洪武初授廣西都衞指揮僉事威懾蠻夷邉境寧謐後奉議南丹土官作亂觀討平之以功陞右軍都督同知㝷适洪武初為廣西按察使㢘謹清恪風節凝峻獄訟剖决如流民無有稱寃者公餘以吟咏自適章復洪武初全州府同知為政寛仁吏民徳之未幾陞本府知府周砥洪武初靈川縣典史以清㢘受賞榜示諸郡以旌之周吉成洪武中為陽朔知縣勸農桑脩學校有古循吏風山雲宣徳初以都督僉事鎮守廣西時柳州慶逺忻城諸蠻為寇雲親率將士討平之累陞右都督以疾卒人思其徳立廟祀之流寓唐承裕其先中原人父旻唐光化中為永州刺史為湖南馬氏所據掠城陷死節承裕避地于桂因家焉宋開寳初仕至銀青光祿大夫擢知象州政聲著聞璽書屢加奬異吕好問河南人仕宋為尚書右丞靖江之變委曲為存社稷計累遷資政殿學士封東萊侯紹興初貶靜江程佑之河南人宋紹興間避地寓居于桂後帥五羊今其子孫墳墓俱在桂林陳南賔元舉進士優於經術善屬文任全州路學正因家于全本朝洪武初聘為國子助教嘗侍講經筵後陞蜀府長史及致仕特賜半俸以優養胡純平陽府人元翰林應奉本朝初以耆儒碩學徵至京授以官不就謫居桂林閉户却掃潜心性理之學都督韓觀嘗造其宅終不報謝再至謂曰先生於觀似無情者純曰將軍知我我固如此所謂士伸於知己者觀歎息而去人物唐曹鄴陽朔人大中間舉進士累官至吏部侍郎有詩名趙觀文臨桂人乾寧二年舉進士第一是年試以觀人文化成天下賦内出白鹿宣示百寮詩放進士二十五人觀文第九被黜者詣闕訴不當重試觀文遂魁多士宋王世則永福人舉進士第一淳化初以右正言使交州還朝條事迹及山川形勢上之進直史館未幾以言儲貳事黜知象州唐則興安人少以學行稱舉進士歴官至侍郎晩歸築館授徒以身率後進雖極寒盛暑不少倦經史皆訓詁成一家言二子叔夏叔獻相繼登科朱道誠全州人幼喪父事母至孝母卒廬於墓側感冬笋生瑞竹覆其墓州以聞詔賜絹米比卒郡守趙昕揭其墓曰朱孝子墓其子揚善孝亦如之至和中詔賜絹米如父恩蔣炳文興安人大觀間通判融州以兵入援京師為程不器所沮遂罷官後上書言時事丞相趙鼎是其説薦為中都官炳文願補外職自試除瓊管安撫唐諫全州人政和五年舉進士歴官朝奉郎子孝頴先膺里選次受世賞周必大梁克家皆器重之官至朝請郎知陜州李珙永福人少以功名自奮㑹宜州蠻獠入寇攻禦有功累官至武功大夫後金人犯闕召天下兵珙謂蔣炳文曰主憂臣辱主辱臣死豈可以道逺便自營乎選州兵募死士凡三千人倍道兼行至復州與賊將薛廣祝遇力戰死之詔贈忠州防禦使黄齊臨桂人紹興間舉進士調富川尉迎父就養時曹成寇起齊懼遺親憂自奮擒獲七十輩縣以安堵累遷知昌化軍賜對其言桂林多俊秀而賔興之數狹地瘠民貧而折納之輸重詔増鄉貢減軍輸邦人利之蔣允濟興安人紹興間為新化縣令除革弊政民多徳之後為賔州倅攝昭州先是官出錢二百予民輸布一疋復折布為錢十倍取之允濟疏聞竟減其半嘗按問平南廵檢祝尚賢奪其官後允濟卒尚賢哭甚哀或問之曰罪在我如公之賢安得不哭石安民臨桂人紹興間舉進士為象州判官决獄平恕嘗分教㢘藤有文風晚知吉陽軍未赴而卒安民蚤從沈晦胡寅游尤受知於張浚其後張孝祥榜其堂曰瑞文弟安行安持與兄齊名人號三石唐俊乂興安人少刻意於學愽通經史紹興間第進士廷對以直言無𨼆被黜朝廷尋悔悟命以官自柳州司理歴仕知㢘州皆以㢘靜聞陶崇全州人嘉泰中舉進士理宗在潜邸時崇為講讀官及即位被召首陳保業謹微慎獨持久之說擢知信州卒贈特進謚文肅有澈齋文集本朝唐耕臨桂人洪武間由訓導擢知廣東河源縣未幾陞監察御史以㢘能著稱後為國子監司業劉淵臨桂人洪武中領鄉薦拜監察御史激揚有聲遷湖廣按察司副使黄驥全州人洪武中領鄉薦為沙縣教諭後陞禮科給事中三使西域嘗上疏論外夷貢馬及官軍下蕃之弊詞甚剴切上嘉納之命為定制自是陜右之民少蘇尋陞右通政奉命撫諭南交使還卒所著有黄門奏章列女文氏靜江人唐斗輔妻元大徳中斗輔任賔州幕官卒時文氏年方二十餘哀慟幾絶執義自誓孝養舅姑舅姑既殁葬祭無遺憾其子明蚤世婦蔣氏慕姑之義亦自誓靡他至治中詔旌其門曰貞節仙釋雷隱翁名本少磊落不羣既長業進士再試即棄去黙坐終日俗子或誚其癡隠翁笑曰終不以吾癡易汝黠一日以術授其子因出遊不返宋元祐間有朝士遊羅浮山見其坐于松下自道姓名云雷隠翁石仲元桂人號桂華子為道士於七星山於詩妙究精微宋天禧中將殆謂門人曰謝當然未喪之文子其嗣之盡出平生所作詩三百餘篇授之曰凡吾所得子之所知必傳之旬浹而殁有桂華集全真柳州人唐至徳初來游湘源剏淨土院永州刺史韋宙遣使禮請翌日即至四門各見其入宙出道迎惟見其一其神變不可具述卒年一百三十二五代時因全