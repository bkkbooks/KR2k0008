body:
  text: 明一統志卷四十三明李賢等撰衢州府東至金華府蘭溪縣界一百二十二里西至江西廣信府府山縣界一百一十五里南至福建建寧府浦城縣界二百一十里北至嚴州府遂安縣界九十五里自府治至南京一千五百七十里至京師四千六百四十里桹九萬二千二百石零建置沿革禹貢揚州之域天文牛女分野春秋為越西鄙姑蔑之地秦立太末縣屬㑹稽郡東漢分立新安縣仍屬㑹稽三國吳以二縣屬東陽郡隋廢太末入金華屬婺州唐始析婺州信安縣置衢州天寳中改信安郡乾元初復為衢州宋屬兩浙東路元改為衢州路本朝改龍游府尋改為衢州府領縣五西安縣附郭本秦㑹稽郡太末縣地東漢置新安縣晉改曰信安屬東陽郡隋初屬婺州唐初置衢州治此咸通中始改西安宋元仍舊本朝因之編户一百六十八里龍游縣在府城東七十里本秦太末縣東漢末孫吳分置豊安縣又改太末曰龍丘晉省龍丘以豊安屬東陽郡隋省豊安入金華縣屬婺州唐初復置太末縣置縠州尋俱廢貞觀中復置龍丘縣屬衢州五代唐改龍游宋改盈川縣紹興初復名龍游元仍雋本朝因之編户一百八十四里常山縣在府城西八十里本太末縣地隋初析置定陽縣尋廢入信安唐咸亨中復析置常山縣以其地有常山得名初屬婺州乂屬信州後屬衢州宋咸淳末改為信安縣元復名常山本朝因之編户一百一十里江山縣在府城西南七十五里本信安縣之南川唐置湏江縣尋省永昌初復置屬衢州五代時吳越改江山縣以其地有江郎山故名宋咸淳末改禮賢縣元復為江山本朝因之編户一百二十九里開化縣在府城西北二百里本常山縣西境宋乾徳初置開化塲太平興國中陞為縣屬衢州元仍舊本朝因之編户一百五十三里郡名姑蔑春秋時名三衢元和志以州有三衢山故名吳㑹湏知以路通三越故名信安唐名形勝姑蔑之墟太末之壤宋毛幵超覽堂記郡即姑蔑之墟太末之壤東望九峯西瞻靈石南臨樵谷僊聖之所遊神靈之所隩有道者之所隱也四通五逹江浙閩廣之所輻輳衢州學記得山水之勝宋錢顗云浙江而東環郡皆山惟信安得山水之勝而三衢山又信安之絶境東南孔道閩越之交宋毛幵和風樓記其山邃以麗其水清以駛宋程俱保安院記據浙江上游川陸所㑹郡志風俗其民輕死易發漢志吳越之習好勇其地邉楚戰闘兼并是以其民輕死易發其俗悍以果其君子耿耿好氣敏於事宋程俱保安院記有古遺風超覽堂記君子多亢言而厲行易知而難狎冇古之遺風民淳事簡風俗敦厚信安志山川龜峯山在府治後其形如龜昂首垂足與峥嶸山相連唐羅隱有詩崢嶸山在龜峯山西北吳遣征虜将軍鄭平以千人守峥嶸鎮即此唐孟郊詩䟽鑿順髙下臨搆横烟霞坐嘯郡齋對玩竒石路斜古樹浮綠氣髙門結朱華始見峥嶸狀仰止逾可嘉巖山在府城西一十里四靣壁立絶頂平曠可數十里爛柯山在府城南二十里一名石室下有石橋道書謂此山為青霞第八洞天爛柯福地晉樵者王質入山伐木見二童子對奕質置斧於坐而觀童子與質一物如棗核食之不饑局終童子指示之曰汝斧柯爛矣質歸鄉閭已及百嵗無復時人矣唐孟郊詩仙界一日内人間千嵗窮雙棋未變局萬物皆為空宋錢顗詩春郊雜遝擁紅旌共訪仙蹤笑傲行雲徑直從深崦入石橋宛在半空横巖邉瑶圃新開出洞裏芝田舊種成羽客一枰無復見青山留得爛柯名九龍山在府城南二十里相傳邑人有客死括蒼者其子以筏載棺歸抵山下為風波所覆後求棺得諸石穴中紫蔓紏結已合斧而鑿之潭水盡赭是夜雷雨有物飛出視之葢九龍故名九龍山屹石山在府城西二十里平地五峯㧞起下臨溪水響谷山在府城南二十一里崖壁峭立水環其趾崖之半有石穴風噓之則鳴故名響谷山烏巨山在府城東三十五里兩山連亘其西山竹樹薈蔚烟雲出没一塵不到尤為竒絶疊石山在府城南四十里其石層出若累疊狀中有巖穴名仙游洞可容十客烏石山在府城西四十里巨石周匝若城有門可入中有水田項山在府城北四十里其内有洞山上有項王廟鵝籠山在府城東五十里一名繡峯上有三塢一池江山縣東南亦有鵝籠山紫微山在府城東南五十里一名迷茨中有懸崖泉滴不休旱則禱焉東華山在龍游縣東二里下有姑蔑子墓岑山在龍游縣南一十五里其山自金華望之正當其靣故號婺女照臺山邑中視之如筆架又呼為筆架山鷄鳴山在龍游縣南三里宋嘉祐术邑人吕防講學于此時登山見鷄鳴叢棘中羅得白金數十鎰輸之官後防三子皆髙科人以為祥又西安縣東十五里亦有雞鳴山三疊山在龍游縣東三十里中有石室又名相嚴方山在龍游縣東四十里山形方正如冠産茶味絶勝靈山在龍游縣南四十里舊名徐山下有溪溪外有徐偃王廟龍丘山在龍游縣東四十里東陽記山有九石特秀休表色丹白遠望之狀肖芙蓉故一名九峯巖山漢龍丘萇隱居于此與嚴子陵友善終年百嵗山際有三疊巖穴外如牕牖中有石床唐徐安貞讀書處宋趙抃詩龍丘石室人難繼安正書堂世莫登欲識松蘿最髙處九峯排列一層層元焦鼐詩萬山堆裏九峯青中有三賢著隱名龍現石形千古異虎跑泉眼四時清白石山在龍游縣南四十五里山有圓石聳二十餘丈其色純白故名唐嘗以此山名縣唐臺山在龍游縣里北四十五下有臺山寺宋王介詩天地鑿開混沌國鬼神剜鎪驪龍窟不知發秘是何年欲叩山靈無處得我來一見快平生不覺清風生兩腋乗鸞歸去夢魂消白雲依舊埋蒼石三衢山在常山縣北二十五里昔有洪水暴出派兹山為三道故名峭峯竒石玲瓏紺碧夭矯槎牙不可名狀上有巖洞名曰碧玉中冇石室旁通二門榜曰玉龍容車山在常山縣北二十五里下有碧玉蓮花二洞又有石如僧趺坐鄉人相與架堂事之名石僧院今院廢而石僧存石門山在常山縣北二十五里山巔有竅毎旦出雲過東則雨驗之多應元江孚詩石門有佳氣横亘如長蜺朝為白雲出暮作清風歸歛散開雨暘此理無足疑何時着謝屐更願凌雲梯常山在常山縣東三十里又名長山絶頂有湖廣可數畝嚴谷山在常山縣北三十八里多窟穴産靈草嘉木山腹有靈眞洞中有三石人西山在江山縣治西邑人常擇勝為亭宋縣令黄汝嘉扁曰江山竒觀騎石山在江山縣西二里與景星山相向宋蒋之竒詩突星疑落星騎石如騎馬景星山在江山縣南五里一名突星宋楊萬里詩山頭孤立玉伶俜天上何年墜景星四向刀峯非不峻如何只是一峯青漸山在江山縣東二十里俗呼大靈山上有泉三泓旱暵必禱宋徐存刻石記其騐今不存江郎山在江山縣南五十里俗傳嘗有江氏兄弟三人登山巔化為石故名山頂有池産碧蓮金鯽宋王禹偁詩三茅遺躅在金陵又見江家有弟兄謝眺門前山色好一時分付與嚴扄周雲叟詩巨靈一夜擘山開三石推從天外來仙客研開修月路化工築作挽河臺浮葢仙山在江山縣南一百里中冇仙洞石壇石屏竒恠百出又多紅桃花而不實宋汪藻詩浮空髙展神仙葢列障長開水墨屏覷星山在江山縣南一百一十里巋然為衆山之宗登此可覩星辰因名泉山在江山縣南一百三十里山周圍數百里皆髙崖深谷漢書朱買臣言閩越王所保是也金錢山在開化縣治東世傳有金錢二仙於此煉丹故名元蔚彦明詩不見煉丹人空遺石壇井風勁鶴唳清露重丹光冷文塔山在開化縣治東一名文筆峯元魯貞詩天低雲有影日午塔無隂極目三秋望登髙萬里心蟠桃山在開化縣東北五里昔人多種桃花逺近望之如蒸霞元蔚彦明詩飛湍激雷雨老樹藏雲烟相逢荷鋤翁疑是武陵仙石耳山在開化縣西八十里周圍三百里連亘婺源徳興二縣界中有三仙祠古田山在開化縣西八十里山中虎不齧蛇不螫中有靈湫毎旦有雲一縷浮空而出所向之方輙雨小峨眉峯在府治前舊志唐乾符間刺史季彀因置砦龍山得二石長六尺許取置文㑹閣前宋淳化間郡守慎知禮移植於此積土為峯嵗乆遂訛傳為郭璞墓有傳璞言五百年後太守為吾守墓紹聖中郡守孫賁知非璞墓發之得此二石移置堂中宣和中郡守髙至臨復移歸故處相傳峨眉峯正對府治謂不利於郡故置此石以厭之因培土為峯而名以小峨眉云梧桐峯在府城北七十里與紫微峯對號南北髙峯文筆峰在常山縣治東南宋縣令蘇玭於此建浮圖直上如筆其後邑人相繼登第賢良峰在常山縣北一十五里宋王介讀書其下後舉賢良科第一故名廌峯在常山縣北二十里狀如獬廌宋侍御史江躋故宅在焉本朝王逹詩石脊崚嶒畵裏成翠雲披拂勢縦横月明一夜松濤吼百獸深藏不敢鳴獨秀峰在江山縣東南五十里特出衆山之間故名温峰在江山縣南一百里嵓石倒垂如雞咮然出泉不絶禱雨多應仙霞嶺在江山縣南一百里宋史浩帥閩過此募人以石甃路三百六十級趙汝騰詩鷄鳴秣馬渡仙霞鳥道迢遥望去賖暗水盡從荒磵落好山剛被暝雲遮鴉金嶺在開化縣東二十五里山半有靈湫名攝龍洞芹嶺在開化縣西南三十里與遯嶺相連並峙其髙切雲九仙巖在西安縣東五十里狀如屏倚當其中凹處撑柱上下為屋數間唐徐安貞讀書於此翠光巗在龍游縣北五里縠溪之次宋鄭得彛詩縠皺晴瀾翠欲回春光摇動亂雲推石崖無限臨流興留與舟人訪草萊元張止道詩鑿開混沌翠光濕分破鴻濛元氣寒玉溜半泓垂急雨縠波千尺起狂瀾趙公巖在常山縣北二十五里有石洞可容百人宋趙抃嘗讀書其間白巗在江山縣東四十五里山巔有池飛瀑如白練登眞巖在江山縣西北十五里唐女冠詹妙容於此學登仙故名宋村巖在開化縣南四十五里有石人及石龍首水出龍口不絶下有石臺承之皆自然無斧鑿痕元徐子正詩􅚱砑紫雲涸鏗鍧神鼔石機杼有時鳴雷電常虩虩下方乆旱暵斯民亦孔亟何當作霖雨枯槁回春碧太眞洞在府城北六十里洞門廣五尺内有玉泉或傳洞穴通太乙泉禹迹洞在常山縣南一十里洞前有石刻唐刺史陸仁璨文白龍洞在常山縣治西相傳其地草木蒙宻疑神所宅一夕大風雨有白龍凌虚而翔視其處乃二洞也一當山腹傴而入莫窮其奥一當山趾澗溜潺潺莫識其源宋徐似道詩後洞白雲前洞出上池紅葉下池流水花照眼明金鯽石髪藏春䕶玉虬攝龍洞在常山縣北二十五里洞前有石竇常乾禱雨者致其誠則水溢有異物出焉靈龜洞在常山縣南八十里中有石龜三其像逼真烟蘿洞在江山縣南五里相傳昔有煙蘿子者於此修道故名青雲洞在江山縣南二十五里相傳其中有龍宋乾道間邑人鑿石得其穴蛻骨甚多左坑洞在江山縣北二十里洞凡六七所中冇石佛石乳石田之類彭湖在府城東一十五里俗傳里人彭氏竈下忽㒼雙荀斸之流血即大雷雨因䧟為湖西湖在龍游縣治西南宋馬天驥儗杭之西湖開此以備遊覽五百人湖在龍游縣北三十里俗傳昔冇五百人於此竭水取魚得異魚及銅缶既而水暴長五百人皆没因名凡溉田五百餘頃信安溪在府城西二里一名西溪環城西北東流入龍游縣界號盈川溪至縣北五里乂名縠溪東流與東陽江合歴嚴逹杭入於海定陽溪在府城東九里一名東溪源出處州遂昌縣之周公源東北流入本縣界至鷄鳴山下與信安溪合其分派自石室横溪築堰導流迤北溉田五萬六千餘畝柘溪在府城西一十五里一名檫溪諺云檫溪通相公出宋時水通郡人余端禮果拜相縠溪在龍游縣北五里漢志太末縣有縠水唐置縠州以此宋汪佖詩波紋端與縠紋同正倚䦨干