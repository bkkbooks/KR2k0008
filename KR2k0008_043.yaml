拱中建永年寺在常山縣東北二十里一名黄岡寺宋趙鼎魏矼范沖嘗寓居於此有黄岡三賢酬唱集汪應辰亦嘗寓居此寺以修身講學為事一室蕭然處之裕如靈山寺在開化縣治西宋皇祐中建𤣥妙觀在府治南唐天寳間建集仙觀在爛柯山下相傳宋真宗嘗賜玉斧劍紫薇觀在江山縣西南隅集眞觀在常山縣治南崇仙宫在龍游縣東梁大同中建相傳即鄷去奢昇仙處集善宫在龍游縣治西梁大同中建頥眞宫在開化縣治北宋建炎中建祠廟徐偃王廟在龍游縣西四十里徐山下刺史徐放重修唐韓愈撰碑謂衢州民多姓徐氏支縣龍江有偃王遺廟或曰偃王之逃戰不之彭城之越城之隅棄玉几研於㑹稽之水或曰徐子章禹既執於吴徐之公族子弟散之徐揚二州間即其居立先王廟云項王廟在府城北項山下祀西楚覇王項羽按史記羽少與叔梁避仇吳中及舉兵時梁為㑹稽守羽為裨将徇下縣衢之有廟以此靈石廟在江郎山北相傳山下有湛氏子仕晉永嘉之亂不得歸其母禱於三石之神致其子歸遂立祠祀之孔氏家廟在府治西宣聖四十八代孫襲封衍聖公端友従宋髙宗南渡賜居衢州紹興六年詔權以衢州學為家廟賜田奉祀開平忠武王廟在府治北本朝洪武初建祀忠武王常遇春以嘗有功於衢州故也大義祠在常山縣通衢門内祀正莭先生徐應鑄本朝正徳末建舒芬記陵墓姑蔑子墓在龍游縣東東華山下宋慶元間為人所發併誌石擊碎之趙抃墓在府城東北四十五里宋景定間林存為潭州帥罷歸道衢調千夫荷擔經墓旁疲甚因相與語趙清獻公抃一琴一鶴那有許耶或聞之題詩驛舍曰千夫倚擔在山阿膏血如何有許多不若扁舟徑歸去休從清獻墓前過趙鼎墓在常山縣北二十五里鼎本解州聞喜人宋南渡後寓居衢州兩相髙宗為中興名相後貶吉陽軍卒歸葬於此初鼎䘮過袁州通判汪應辰為文祭之曰惟公兩登上宰皆値艱危之時一斥南荒遂為生死之别事已定於葢棺恩特容於歸骨范冲墓在常山縣北二十五里冲蜀人祖禹之子宋建炎中請祠寓衢卒塟於此古蹟姑蔑城在龍游縣縠溪之南左傳魯哀公十三年越伐吴王孫彌庸觀見姑蔑之旗杜預註姑蔑越地今東陽太末縣也相傳此地即其故城廢豊安縣在龍游縣境孫吴置縣隋省廢盈川縣在府城南九十里唐析龍游縣置尋省入西安殷浩宅在府城南六里浩仕東晉建元間北伐為姚襄所敗廢為庶人貶信安居此其址猶存號曰殷墻孝弟里在府城北五里宋趙抃居此初抃䘮繼母與弟拊廬墓縣令過煦榜其里曰孝弟築闕立表樓鑰為書忠孝之家處士孫侔為作孝子傳及子㞦執父䘮而甘露降墓木㞦卒子雲又以毁死人稱其世孝名宦唐李褘吴王恪次子封信安郡王絫為衢州刺史治嚴辦子峴亦刺衢薛戎衢州刺史以亷正寛大見稱宋髙賦知衢州衢民好巫鬼有世蓄蠱毒者賦至捕之伏辜者數人蠱毒遂絶郡人為立生祠趙師旦知江山縣㫁治出已吏不能得一錢棄物道上無敢取者後死儂智髙之難於封州其䘮歸至江山吳人祭哭於路數百里不絶張憲紹聖初以武力絶倫中選時睦冦作亂部使者檄使募兵為援憲出貲百萬得勇士千餘人聲勢甚張賊大恐不敢窺江左憲益勵士卒晝夜兼進遂復衢州宗澤知龍游縣民未知學澤為建庠序設師儒講論經術風俗一變自此擢科者相繼胡唐老知衢州叛將苗傅犯衢唐老據城拒之矢石俱發賊不能攻遂遁去陳康伯衢州通判攝郡事盗發白馬原康伯督州兵濟王師進討克之翁蒙之常山尉時趙鼎䘮自嶺表歸郡守章傑檄䝉之取其私書將以媚執政䝉之不從士論多之元朱霽衢州路搃管有惠政嘗修信安志白景亮衢州路總管有徳政嘗膺寵錫之榮孔淮江山縣尹廉勤為吏民所服弟灝繼之亦有政聲淮灝宣聖五十七代孫也楊居仁開化尹饒兵䧟縣治仗義不屈罵賊而死本朝劉利用洪武初知常山縣有豪猾圉人財者即捕寘之法邑内讋服造浮橋以濟病渉其為政有足稱焉唐鐸洪武初為西安縣丞以徳化民聲譽大振後累官兵部尚書畢貞洪武中知衢州府以禮法自持羣吏敬憚公庭肅然姜仲能洪武中知西安縣性剛果臨事有為縣有戍卒數人肆暴不悛仲能悉執送京師戮之民頼以安郭敦永樂初知衢州府時郡中旱蝗敦齋戒率僚屬遍禱於神夜大雨蝗湮没以死民獲有秋其妻勤儉躬事蠶桑繭成多白獨於楣間結成金縷如帯未幾詔為禮部侍郎夏昇永樂初知開化縣有政績陞衢州知府盡去宿弊籍丁糧之數定為等則賦役均平民咸戴之流寓孔端友宣聖四十八代孫宋襲封衍聖公靖康之變與子玠隨髙宗南渡因賜地居衢終宋之世皆襲爵封元初封宣聖後疑所立或言孔氏子孫寓衢者乃其宗子召孔洙赴闕洙遜於居曲阜者世祖曰寧違榮而不違道眞聖人之後也拜國子祭酒本朝凡孔氏子孫居衢者悉復其家趙令衿宋太祖五世孫靖康初論事被謫髙宗時召見令衿奏乞留張浚召趙鼎以言不合罷寓居三衢後襲封安定郡王子子覺號雪齋居士有文名馬伸東平人靖康初居言路有直聲建炎初隨髙宗南渡寓家龍游伸抗疏劾黄潜善汪伯彦責監濮州酒稅死道中後胡安國訟其寃請錄用其子孫人物漢龍丘萇太末人隱居山中義不降辱王莾連辟不至更始初任延為㑹稽都尉掾吏白請召萇延曰龍丘生躬徳履義有伯夷原憲之節遣功曹奉謁使相望於道嵗餘乃詣府拜議曹祭酒三國徐陵龍游人東漢末為吏虞翻一見即與友善仕吳歴二縣長所在著稱遷零陵太守子平亦仕吳為武昌左部晉毛璩西安人祖寳世為廬江太守自寳至璩凡三葉俱擁節麾南北朝徐伯珎龍游人少孤貧以箬葉學書積十九年遂究經史南齊辟召不起兄弟四人俱白首時呼為四皓鄭灼信安人勵志儒學尤明三禮仕陳至中散大夫唐徐安貞龍游人應制科一嵗三上俱及第累官至工部侍郎封東海子卒贈尚書祝尚丘江山人中制科為大學博士徐珏江山人五嵗能誦易禮二經召對稱㫖賜衣絹中童子科宋慎知禮信安人父溫其有詞學仕錢俶終元帥府判官知禮年十八獻書從俶歸宋累官鴻臚卿知興元府以老母懇求歸養退處十年搢紳稱其孝知禮好學自㓜至白首嵗讀五經周而後止愼從吉知禮子歴官太子詹事遷給事中權知開封府臨事敏速勤心公家天禧中以光祿卿致仕從吉喜為詩時有警語子孫登仕者甚衆第進士升朝者數人趙抃西安人景祐初進士累官殿中侍御史彈劾不避權倖京師號鐡靣御史帥蜀以一琴一鶴自隨後拜參知政事與王安石不合求知杭州請老加太子少保卒諡清獻子㞦累官監察御史所言皆切時務出提㸃京東刑獄歴鴻臚太僕少卿周沂江山人少與趙抃友善抃嘗稱其為天下士視軒冕為儻來又西安人任大中老於儒學作詩寒苦亦為趙抃所喜程天民開化人㓜時日誦數千言屬文操筆立就熈寧中進士官至大學博士弟宿舉端拱初狀元仕至職方員外郎吕防龍游人熈寧中進士有學行龍游士子發舉自防始累官至太中大夫王介常山人性强記負直氣舉制科累官至秘閣校理與王安石遊甚欵然未嘗降意相下初安石屢召不起後受學士之命介以詩寄之有云草廬三顧動春蟄蕙帳一空生曉寒葢有所諷云毛維瞻西安人以詩鳴與趙抃同里相得為山林之樂元豊中出知筠州政平訟理時蘇轍謫筠州監酒相與倡和有鳯山八咏山房即事十絶王渙之介子兄漢之舉進士累官兵部侍郎龍圖閣直學士渙之元豊初進士累官大學博士遷吏部侍郎以寳文閣直學士知中山府毎云乗車常以顚墜處之乗舟常以覆溺處之仕宦常以不遇處之則無事矣毛㮚江山人為歙州士曹方臘攻城城䧟官吏皆遁㮚坐府中賊脅之使降不屈罵賊而死妻錢氏掖其姑不忍去俱遇害事聞贈朝請郎毛滂江山人元祐中蘇軾守杭州滂為法曹軾得其所為文深器重之後薦於朝擢知秀州所著有東堂集十二卷毛注西安人第進士累官至侍御史凡抗十六章攻蔡京京罷未去國㑹星變注請謫京於外已而星果退舍累遷諫議大夫毛漸江山人第進士累官兩浙轉運使疏濬水患嘗帥涇原破夏人於没烟進直龍圖閣知滑州卒有詩文世譜及古三墳書傳世馮熈載西安人元符初進士累官中書侍郎與時相王黼不協罷知亳州劉正夫西安人未冠入太學有聲與范致虚吳材江嶼號四俊仕為左司諌徽宗方究蔡邸獄正夫入對徐引淮南斗粟尺布之謡上意遂解謂正夫曰兄弟之間人所難言卿能及此必為公輔後果致位兩府封開國公徐存江山人受業於楊時隱居敎授號逸平翁從學者至千餘人所著有五經講義等書徐徽言西安人泛渉書傳有竒志大觀中以武舉絶倫及第靖康初知晉寧軍隂結汾晉土豪欲𢷬金太原取雁門㑹朝議和事中沮後金人䧟晉寧罵敵而死事聞髙宗撫几嘆曰徐徽言忠貫日月過於顔真卿叚秀實遠矣贈彰化軍節度使諡忠壯江少虞常山人政和中進士歴建饒吉三州守治狀皆第一所著有宋朝類苑等書程俱開化中宣和中進士累官中書舍人兼侍講後以徽猷閣待制提舉江州太平觀俱在掖垣命下有不安於心者必反覆言之不少畏避其為文典雅閎奥所著有北山集徐揆西安人靖康初游太學試開封為舉首㑹欽宗詣金營不歸揆率諸生以書抵敵營責其敗盟請還二帝敵人載揆至軍中詰難揆厲聲抗論遂遇害後贈宣敎郎而官其後毛晃江山人閉門著書留意字學増註禮部韵傳於世劉章龍游人少警異日誦數千言紹興中廷試第一居館職秦檜惡其不附已諷言者劾出之檜死召還累官禮部尚書兼給事中章容狀魁碩以周宻自守出入兩朝被顧遇未嘗泄禁中一語以資政殿學士致仕卒謚靖文劉頴西安人紹興末進士調溧陽主簿張浚知其賢遣子斌與游講明禮學頴常言士以不辱身為重在從班日韓侂胄舊與歡好及侂胄用事頴謝絶之累遷刑部侍郎以寳謨閣直學士致仕鄭仲熊西安人累官僉書樞宻院事兼權參政秦檜俾臺諌交攻之落職寓居僧寺二十年後復端明殿學士致仕余端禮龍游人少讀書一過目即成誦累官左丞相封郇國公在相位恪守法度務行故事鄒補之開化人淳熈中舉進士累官通判江寧府所著有兵書解宋朝職畧等書馬天驥衢州人紹定二年進士歴官秘省假司馬光五規之名條上時弊辭㫖切直仕至端明殿學士同僉樞宻院事封信安郡侯徐霖西安人年十三有志聖人之道研精六經以探其要淳祐初試禮部第一授沅州敎授上疏言史嵩之姦狀凡遷官輒辭後知汀州卒霖嘗家居講道從遊之士至三千餘人所著有太極圖説及遺稿五十卷何新之西安人仕至樞宻院編修官嘗採唐宋詩為詩林萬選行世後知忠安軍死節徐應鑣江山人居太學元兵至臨安應鑣誓不降屈作文祭岳飛祠與其子𤦺崧女元娘自焚於梯雲樓為諸僕救免復投祠前井中死益王立贈秘閣修撰後同舍生私諡曰正節先生元鄭介夫開化人號鐡柱性剛直敢言著韻海至大間上太平䇿一綱二十目頗行其言仕終金溪縣丞汪文璟常山人泰定初進士累官廉訪副使以國難憂憤不食卒所著有居朝稿明農稿張宗元開化人至順初進士髙古博雅罕與俗交仕為秘書少監至正間部使者余闕行縣為立興賢坊以旌異之汪林常山人㓜孤奉母至孝嘗嵗歉以財貸貧不責其償至正中余闕廉問浙東察其行義舉之不就魯貞開化人隱居不仕所著有春秋按斷中庸解易註余闕薦之不起本朝徐恢常山人博學有才識洪武初累官户部尚書何初常山人博通經史洪武中知仁化縣遷巴東敎諭召修書傳㑹選書成調開化造就人才士風為之益振吾紳開化人風度俊偉永樂初登進士第為翰林庶吉士授刑部主事陞郎中文學政事為時所稱仕至禮部右侍郎金寔開化人有文行尤長於詩歌大學士楊溥深重之永樂中歴官翰林春坊陞衛府左長史卒有文集行世列女夏氏三節夏應保妻王氏文逹妻袁氏文質妻邵氏俱龍游人青年䘮夫相繼守節歴元末亂離中無少玷缺本朝洪武初旌其門為夏氏三節婦蔣全娘西安人夏顯七妻也夫死時年二十二子在襁褓直元末兵亂備嘗艱志險誓不改節本朝洪武中旌其門省魏氏衢州人時文壁妻也年二十二嵗而夫亡子嵩尚在襁褓魏養姑育㓜誓不再適年七十餘志莭如一吳紳陳敬宗皆以詩哀之省志程氏衢州潘仲岳之妻永樂間仲岳戍遼東觧戍者見程色戯之程怒觧戍者遂以軍政挾與偕行法不能阻程恐在途遭辱入室自經死省志何與適妻范氏衢人年二十夫亡撫孤兒奉舅姑雖極貧窘終無二志正統間旌其門省志楊氏衢州鄭儼妻儼早卒子憺甫周歳守志養姑雖百艱不變成化間詔旌表之省志董貴珍衢州董世疇女也年二十適勞載是未三月而載是卒服闋姑憐其少無子勸改適貴珍剪髪自誓姑不復强孀居三十七年事聞詔旌之省志汪氏徐泗妻衢州人年十九而夫亡遺孤德升年甚㓜而家甚貧汪苦節守志奉舅姑育㓜子孀居二十餘年苦節愈貞焉省志仙釋鄷去奢龍游崇仙宫道士鄷宋初隱於楚之卯山一夕天神謂曰石下有天師佩劍去奢修煉三年果得之乃得道仙去大徹信安人姓祝氏唐貞元中行化閩越西安明果寺其道塲也憲宗嘗召見問法今明果有大徹禪師殿毛維瞻記明一統志卷四十三
