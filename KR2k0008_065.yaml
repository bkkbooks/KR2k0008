然省志楊紳正德間任漵浦知縣遇訟立斷皆中情理嘗五日一視學課試諸生由是咿唔滿城無間寒暑卒之日無以為殮邑人哀之省志流寓假成式唐臨淄人文昌之子也博學強記素有文名嘗宦遊至辰著酉陽雜俎書數十篇王躍宋知全州參政李光以忤秦檜被謫過全躍饋之檜聞之怒甚下廷尉誣躍與光謀叛貶辰州檜死得還王廷圭宋吉州安褔人其郡人胡詮以排和議謫過海廷圭送以詩曰癡兒不了公家事男子要為天下竒秦檜怒流辰州武將馬羽攝郡事待之甚厚廷圭謝曰某罪人也將纍公羽曰由公獲譴其榮多矣更遣子受業後遂登科人物宋秦再雄辰州猺人也武健多謀在周行逢時屢以戰鬪立功蠻黨伏之太袓既下荆湖思得通蠻情習險厄智勇可任者以鎮撫之召再雄至闕下擢辰州刺史官其子為殿直賜豫甚厚仍使自辟吏屬豫一州租賦再雄感恩誓死報效至州日訓土兵得三千人皆能被甲渡水歷山飛塹捷如猿猱又選親校二十人分使諸蠻以傳朝廷招懷之意莫不從風而靡終太袓世邉境旡患向真麻陽人為峽州軍牙頭指揮使時蠻寇叛真被虜罵賊不屈遂遇害事聞詔立廟贈內殿崇班夲朝劉有年沅州人洪武中以明經為州學訓導當道者竒其才薦升監察御史激揚有聲擢太平府知府永樂中上儀禮逸經十有八篇未幾轉交址按察司僉事時黃褔以尚書掌司事重其為人俄以疾卒褔哭而祭之曰江淮胸次洙泗規模文希韓栁學袓程朱宋以方黔陽人進士厯知瑞州府逆濠中之繫獄濠反械赴彭蠡不屈且憤罵為濠所殺嘉靖初贈官録其子祀節祠省志鄧顯芳辰州人補邑庠弟子員正德七年鎮筸苖叛侵掠村寨衆皆逃避芳以母柩在堂固守勿去人怵以禍患芳曰棄母而逃心實不忍况平生讀書所學何事苖至使芳為鄉導芳不從遂遇害支解于母柩之前聞者憐之省志吳勛辰州衛指揮正德間督兵征流賊行至德安應出與賊遇奮勇前驅冒矢陳亡事聞于朝遣官諭祭加子官一級省志蕭璆辰州衛人嘉靖癸未進士有才華精文翰家貧克自振勵授吏部主事擢貴州提學僉事教範嚴正後乞告歸日與門人論學不倦無疾而卒省志唐愈賢沅陵人嘉靖丙戍進士知寧海縣政教兼舉擢御史疏劾姦黨抗言時政遂乞休歸省志列女張氏字妙真上元人辰州衛指揮舍人王泰妻泰未廕襲卒妙真時年十九生子英始逾嵗遂不薰飾剪髮以誓親族莫得奮其志事舅姑甚謹成化三年事上聞旌表其門其後子英以軍功纍官至都指揮使其母誥封夫人陳氏張𢎞道妻沅人無子堅志守節洪武中旌賈氏潘耀卿妻沅陵人耀卿為諸生正德中挈賈省父于南京至湖口卿卒賈即赴水女奴持之既見舅姑入室自縊以救免自是減食凡四十餘日絶食者纍日竟自刎遺詩曰拋棄殘生思不禁可憐死别倍傷心雙魂杳杳今何在化作啼鵑返故林應天尹以事上聞被旌陳氏馬祥妻沅人夫亡時年十九子在襁褓有武臣以媒通欲娶之陳痛哭詬媒誓死不他志撫子成立嘉靖中旌仙釋瞿夫人豫章人隋末兄為辰州刺史有黃元仙者亦自豫章來見瞿君高其行以夫人妻之復薦其才德以自代隋亡乃棄官與夫人隱于州西之羅山貧甚為人傭織以飬其姑如此者十年一日忽謂元仙曰昨日聞帝命當與汝别俄頃化為青氣數丈騰空而去瞿柏廷辰溪人自幼聰慧靈異稱為瞿童唐大厯間奉母避寇入武陵師事法師黃洞源巳而得道又云幼時因戲躍入井中後自大酉華妙洞中出依善卷祠修道功成越桃川宫久之升仙而去刺史溫造刻石記其事永州府東至衡州府常寧縣界二百里西至廣西桂林府全州界一百四十里南至廣西平樂府富川縣界四百二十里北至寶慶府邵陽縣界一百七十里自府治至南京三千四百三十五里至京師六千八百八十里糧六萬八千石零建置沿革禹貢荆州之域天文翼軫分野春秋戰國為楚南境秦為長沙郡地漢置零陵郡屬荆州三國屬吳晉屬湘州又分零陵置營陽郡劉宋改零陵郡為國南齊改國為郡梁改營陽為永陽郡隋罷二郡置永州治零陵縣大業初改為零陵郡唐初復置永州屬江南道天寶初改零陵郡宋復為永州屬荆湖南路元為永州路夲朝改為永州府領州一縣六零陵縣附郭夲漢泉陵縣屬零陵郡東漢郡治於此晉以後因之隋改泉陵為零陵縣以應陽永昌祁陽三縣省入屬永州唐宋元仍舊夲朝因之編户二十八里祁陽縣在府城北一百里夲漢泉陵縣地三國吳析置祁陽縣晉以後不改隋初省入零陵縣唐復置宋元皆仍舊夲朝因之編户一十三里東安縣在府城西九十里夲零陵縣地自漢以來置驛於此五代時馬氏置東安場宋雍熙初置東安縣屬永州元仍舊夲朝因之編户八里道州在府城南一百五十里春秋戰國皆為楚南境秦屬長沙郡漢屬零陵郡吳分為營陽郡梁改為永陽郡隋廢郡併入永州唐初置南營州治營道縣貞觀間始改道州屬江南西道天寶初改江華郡宋仍為道州元改為道州路夲朝洪武初改為府九年改為州屬永州府編户二十五里領縣三寧逺縣在州東七十里夲漢零陵郡冷道縣地隋省入營道縣屬永州蕭銑析置梁興縣唐改曰唐興移治冷道故城屬道州後又改曰延唐五代時梁改為延昌後唐復曰延唐石晉改為延熹宋始改曰寧逺元仍舊夲朝因之編户六十二里永明縣在州西七十里夲漢零陵郡營浦縣地齊置營陽縣梁改曰永陽并置永陽郡隋廢郡以營浦縣省入屬永州唐省入營道縣尋復置屬道州後改曰永明宋廢縣為鎮後復置元仍舊夲朝因之編户十八里江華縣在州南七十里夲漢馮乘縣地屬蒼梧郡晉屬臨賀郡隋屬永州唐武德中析置江華縣屬營州後改雲溪縣神龍初復為江華屬道州宋元仍舊夲朝因之編戶四里郡名零陵漢名營陽晉名形勝南接