body:
  text: 明一統志卷六十五明李賢等撰辰州府東至常德府桃源縣界一百四十里南至寶慶府新化縣界三百二十里西至貴州鎮逺府界六百五十里北至永順宣慰司界九十里自府治至南京三千五百里至京師七千里糧五萬一千三百石建置沿革禹貢荆州之域天文翼軫分野夲古蠻夷之地春秋屬楚秦屬黔中郡漢為長沙武陵二郡地屬荆州東漢仍舊三國時或屬吳或屬蜀漢晉東齊並為武陵郡地陳分置沅陵郡治沅陵郡縣隋開皇中廢置辰州大業初復為沅陵郡唐初復為辰州尋置都督府天寶初改為盧溪郡乾元初復為辰州屬江南道宋屬荆湖北路元升為辰州路夲朝改為辰州府領州一縣六沅陵縣附郭夲秦黔中郡地漢為長沙國下雋縣地後置沅陵縣屬武陵郡晉因之陳為沅陵郡治隋辰州治此唐宋元仍舊夲朝因之編戶五十八里盧溪縣在府城西六十里夲漢晉沅陵縣地梁置盧州隋末為蕭銑所據唐武德中置盧溪縣屬辰州宋元仍舊夲朝因之編户一十二里辰溪縣在府城西南一百二十里夲漢武陵郡辰陽縣梁析置建昌縣陳省入辰陽隋改辰陽曰辰溪屬夀州大業初州廢以縣屬辰州唐宋元仍舊夲朝因之編戶八里漵浦縣在府城南二百七十里夲漢武陵郡義陵縣地隋為辰溪縣地屬沅陵郡唐初析辰溪置漵浦縣屬辰州宋元仍舊夲朝因之編户三十四里沅州在府城西二百七十里秦為黔中郡地漢屬武陵郡晉宋齊梁皆因之陳為沅陵郡地隋屬辰州唐置巫州尋改沅州又改為潭陽郡後改為敘州宋復為沅州治盧陽縣元初置沅州路又降為州𨽻辰州路夲朝初改為沅州府尋復為州省盧陽縣入焉編户二十七里領縣二黔陽縣在州城東南八十里夲漢鐔城縣地屬武陵郡梁置龍檦縣隋屬辰州唐析置朗溪縣屬敘州後廢宋為黔江城元豐中升為黔陽縣屬沅州元仍舊夲朝因之編戶一十二里麻陽縣在州城北一百三十里夲隋沅陵辰溪二縣地唐初置麻陽縣屬辰州又析置龍門縣尋省宋析置招諭縣熙寧間以招諭省入麻陽𨽻沅州元仍舊夲朝因之編户七里郡名沅陵陳名盧溪唐名酉陽圖經以在酉水之陽而名形勝內控諸蠻咽喉外為武陵障蔽風土記重岡復嶺截然險峻同上溪山阻絶非人迹所履元和志地連溪洞控邉面甚廣宋志險要固塞之地郡志環山聳翠帶水縈迥回鄂西南險要固塞之地也風俗巴渝同俗隋地理志嗜好居處頗與巴渝同俗信巫鬼重淫祀風土記寨窳偷生而無積聚信巫鬼重淫祀少鬪訟寡盜賊山谷間頗雜猺俗郡邑志居城市者衣服言語皆華人而山谷間頗雜以猺俗刀耕火種圖經州介山溪俗雜蠻獠以刀耕火種為業山川怡容山在府城沅陵縣治東南大酉山在府城西北四十里道書為第二十六大酉華妙洞天上有龍湫甚靈禱雨即應山之巔有善卷墓小酉山在府城西北五十里山下有石穴其中舊有書千卷相傳昔人避秦隱學於此梁湘東王繹賦云訪酉陽之逸興謂此壷頭山在府城東一百三十里以山頭與東海方壷相似故名漢建武問武陵蠻叛遣馬援等征之進營壷頭會暑甚士卒多疫死援穿山為室以避炎氣今山邉有石穴即援所居室也明月山在府城東二百三十里山下有明月池三峿山在府城東二百四十里辰水出焉連竭提山在盧溪縣南四十里居住山在盧溪縣西八十里無時山在盧溪縣西一百四十里山多茶樹鄊俗當吉慶之時親族聚會歌舞於此思門山在盧溪縣西一百五十里武山在盧溪縣西一百八十里後漢書南蠻傳昔高辛氏有犬戎之患乃募有能得犬戎吳將軍頭者賜金千鎰邑萬家又妻以少女時帝有畜狗其毛五彩名曰槃瓠遂入山御人首赴闕下果吳將軍頭也帝大喜槃瓠畜類不可妻且不可封欲他報之女聞以為信不可失因請行帝不得巳從之槃瓠得女負入南山石室中踰三年生六男六女槃瓠死男女自相配偶其母後歸以狀白帝使迎置諸子衣裳斕斑言語侏􅍣好居山壑帝順其意其後滋蔓今長沙武陵蠻是也山有石室遙見一石似狗形槃瓠像也土俗至今不食犬肉有槃瓠廟時住山在辰溪縣東三里蜀漢諸葛亮行師駐此熊頭山在辰溪縣北二十里以形似名五城山在辰溪縣東南三百六十里楚威王使將軍莊蹻定黔中因山造城大溆山在溆浦縣西三十里過西二十里又有溆溪山嵯峨山在溆浦縣西北六十里又名磨嵯山明山在沅州城北二十里周回二百餘里為州之主山岡巒重復環抱州城浮嵐積翠望如圖畫宋熙寧中封其神為順應侯花山在沅州城東北三十里石色青赤相映如繡又謂之繡崖瀑布山在沅州城東南五十里上有飛泉埀如匹布雙髻山在沅州府西南五十里古鎮江寨二峯並聳如髻保牢山在沅州城東一百里昔人保聚其中以其牢險因名高明山在沅州城東一百三十里高峻為諸山之冠又漵浦縣東南四十里亦有高明山山上有洞雞翁山在黔陽縣北四十里山形如雞七寶山在黔陽縣南一百里産楠木及七里香花羅公山在黔陽縣東南一百六十里周回五百里四面險絶山有鵂鶹鳴即雨至昔有羅姓者隱此山有道術民祈請輒驗今謂之羅公王即此神也絶頂有池廣數十里夜隂霾或有物如明月遊水上南有砂溪與武陽江合北流分為兩溪宋熙寧間土豪舒光民等起寨於此為猺人所破人以為神助山西北有地平廣數百畝嵗大旱此處獨稔號曰熟平青紅山在麻陽縣治東南一十里巖嶺幽竒花竹掩映青紅如畫􅙈迷山在府陽縣西二十里相傳昔有􅙈出其上西晃山在麻陽縣南五十里峯巒秀拔儒學縣治皆面之為邑之鎮山齊天山在麻陽縣東南五十里峯巒髙出雲表天睛則秀色愈盛故又名霽添山石梯山在麻陽縣西一百一十里石磴如梯苞茅山在麻陽縣東一百四十里上有三脊茅可以縮酒