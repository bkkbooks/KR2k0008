宅刻銘漫郎宅在浯溪上即唐元結故居宋曹輔詩峿臺倚溪雲唐亭枕溪石小石競竒麗中有漫郎宅濂溪宅在濂溪上即宋周敦頥故居元延祐間州人唐道舉重修歐陽玄記麓牀三級在寧逺縣南簫韶峯東北宋乾道間汪秦二道人修煉於此第一麓牀有石長一丈六寸人迹髣佛第二麓牀有二石鑑寒光清圓第三麓牀有巨石在路傍號述術石龜修真四壇在九疑山下第一壇有茜草長丈餘如虎鬚古人鍊丹鐺釡猶存第二壇有清池東流齊永明中所鑄鐡磬十二枚第三壇有石牀筀竹圍大者幾二尺第四壇有石盆水出不竭蕩冦將軍壘在寧逺縣東六十里齊時以李道辨為南道開拓南蠻大使築城於此名宦漢召信臣零陵太守視民如子民甚德之龍述零陵太守馬援嘗稱其朴厚周謹口無擇言張羡零陵太守在郡十年甚得江湖間民心楊璇零陵太守時蒼梧桂林賊相聚來攻璇乃製馬車載石灰囊繫布索於馬尾又為兵車載弩剋期會戰馬車順風鼓灰賊不得視以火燒布布燃馬驚奔突賊陳弓弩亂發羣賊駭散南北朝范雲梁零陵內史在任潔巳省煩苛去遊費百姓安之孫謙梁零陵太守吏民安之先是郡多虎暴謙至絶迹及去官之夜虎即害民隋公孫景茂道州刺史悉以秩俸買牛犢雞豚散惠孤弱不自存者常單騎巡人家閲視産業有修理者褒揚稱述如有過惡隨即訓導由是人行義讓有無均通唐李峴天寶中零陵太守為政得人心時京師米翔貴百姓相與謡曰欲粟賤追李峴元結道州刺史奏免百姓所負租稅十三萬緡作舂陵行以為諸使求符牒二百餘通又作賊退示官吏一篇以為苦裒斂杜甫覽結二詩亦志之曰今盜賊未息知民疾苦得結輩十數公參錯天下為邦伯萬物吐氣天下少安可待矣崔敏永州刺史修整部吏黜侵陵牟漁者數百人以付信于下而征貢用集擒戮妖師毁焄蒿淫昏者千餘室薛存義零陵令至任逋租匿役期月辨理宿蠧藏姦披露首服由是民之逃遁者復還愁痛者笑歌門不施胥吏之席耳不聞鼕鼓之召能聲聞于荆楚間栁宗元貞元間王叔文引與計事俄坐貶永州司馬因自放山澤問其湮厄感鬱一寓諸文而永之山水從此顯著韋宙永州刺史俗不知法多觸罪宙為書制律并種植為生之宜户給之築常平倉罷冗役及督賦吏民貧無牛者為置社月會錢以市牛立學官取仕家子弟教之李廙道州刺史元結撰刺史廳壁記惟取履道與廙二人而巳吕溫道州刺史治有善狀遷衡州卒二州人哭者逾月薛伯高道州刺史除穢革邪敷和于下考民風禁淫祀黜非類斤象祠明罰行於鬼神愷悌逹於蠻夷薛景晦道州刺史居郡大理至于無事劉夢得書云兄出中臺守江華人咸曰函牛之鼎以烹小鮮陽城道州刺史治民如治家賞罰惟冝不以簿書介意州産侏儒嵗貢諸朝城奏罷之州人感其德以陽名子賦稅不時觀察使誚責課當上考功城自署曰撫字心勞催科政拙考下下五代蕭結祁陽令不畏強禦方暮春時有州符下取競渡船刺史將臨觀結怒批其符曰秧開五葉蠶長三眠人皆忙迫划甚間船守為止宋李琯知永州時承五季後纍政廢弛琯以身率下奉行詔條綱領大振王繼勳永州刺史州境與廣南接劉鋹屢引兵入冦繼勳上言嶺表可圖之狀李建中通判道州性簡靜恬於榮利柴成務領漕運薦為太常博士時言事者多以權利進建中表陳時政太宗嘉賞之寇凖天禧間罷相謫道州司馬素無公宇百姓競荷瓦木不督而會公宇立成歐陽觀通判道州以廉能稱觀修之父也劉芮永州司理鞠獄為法家疏駁芮謂今觀疏駁者之設意大與古人用心不同從古惟聞死中求生不聞生中求死托疾而歸徐處仁哲宗時東安令有惠政時蠻人叛處仁入洞開示恩信蠻感泣誓不復反吳輔道州推官會蠻獠騷動郡僚欲毁橋梁輔曰自橋而南者皆吾民也安可先棄民邪聞者壯其言冦卒不至楊萬里零陵丞有惠政既去民立祠祀之盧子文知永州大興學校後除廣西運判永民艱食又運米賤糶以濟之許泂江華令新學校增生徒數年之間民安盜息人為立碑頌德元樊炳永州路總管戢貪鋤強拯民興學毁淫祠八百餘區驅巫祝以代民役政化大行烏庫哩澤永州路判官討平賊盜一郡以安丞相僧格建議考校錢榖澤上計行省平章約蘇穆爾怒曰郡國錢糧旡不增羡永州何為獨不然亟拘繫之會僧格敗始得釋劉潛永州録事有惠政能鋤強去暴後攝祁陽縣令民多逋亡作還鄊歌詩招來安集民皆感泣而歸林興祖道州路總管洞獠竊發以手牒諭之皆曰林總管廉而愛民不可犯也三年不入境春旱蟲食苖禱之大雨二日蟲死而麥稔又廢興作賑貧乏輕徭薄斂郡中大治考課為最鄧祖勝以右丞守永州時國初平章楊璟兵圍其城屢戰屢屈食盡自殺吳芾至正中道州路判官重建路學有善政吏畏民安夲朝蓋恆弼洪武初道州府同知時兵變之餘郡民多流徙外境聞恆弼廉明寬恕咸歸焉民以寧謐百廢具興秩滿升夲府知府張原湜洪武初道州府通判廉能有聲時郡境賊冦猖獗原湜率衆擒其魁降其餘黨境遂以寧余彥誠洪武間永州府知府勤慎公平時洞猺劫掠郡邑彥誠諭以威信率皆畏服民賴以寧坐事繫獄耆民以其善政旡闕陳請詔嘉之賜襲衣靴鈔使還任劉敏永樂間道州知州百廢具興撫字有方逋逃者相率復業陳盛永州府知府廉慎有才能宣德中特加敕兼理茶賦吉嶽洪武初知公安縣時縣治及公署並為洞賊所燬嶽蒞任寄居民間安集黎庶百凡創建有方而民不告勞郡志陳褔山由進士知零陵縣居官清謹修築堰塘溉田二百餘頃民賴其利號曰陳公堰郡志李應庚以給事中知永州政尚寬平所居官舍止可庇風雨奏革黑石湘口大橋三關用通啇旅民甚德志之郡戴浩由進士任永州知府謹權量明禁約錢法大行物價以平時苖賊竊發浩設法招撫之賊不敢肆民賴以不擾政教兼舉卓為時稱郡志唐吉祥由進士任祁陽知縣撫民有方考績為天下最賜宴禮部郡志賔禮慶永州府推官公平寬大有訟者喻以禮義使自悔悟人多化之獄無繫囚郡志沈孟儀東安知縣敦實有文寬嚴有體視民如子儉素自甘至于建橋鑿井修學宫葺壇壝皆視如家事嵗值荒凶賑撫安集民無流移郡志錢昕由進士知永州府立心平易蒞政精勤平賦役審獄訟民咸愛慕郡志余岱零陵縣縣丞不畜妻孥公退一室瀟然惟圖書而巳郡志吳永裕東安知縣政尚簡易清操一節民為立生祠祀之郡志盛祥知道州頴敏博學耿介不阿時州有虎患祥禱于鼻亭祠二虎渡河一虎斃死祠下及卒州人合祀于陽刺史祠郡志楊崇由舉人知永州府首興學校課試生徒親視渠堰自是山田有秋民享其利築祁陽城減貴州餉行九等均徭之法嚴校尉害人之禁又約婚嫁不得論財貧甚者給以布帛一時婚配九千有竒長沙限借官銀二萬力陳民貧減四之三在任五年除吏弊惜民財自租庸之外民無一毫之擾郡志何詔以進士知永州府先恤民隱政體寬大按丁田之籍為經制嵗辦賦役之法白諸臺司著為令自是徭役均平宿蠧書剔吏無售姦流移遂定後有去思碑郡志吳允禎知永州府存心愷悌敷政優遊興利剗弊務在以德化民民有弗率者先教而後威終不加苦民至今有遺思郡志張鑑永明縣知縣施政有方廉介自守勸課農桑作興學校民到于今稱之郡志熊汲由進士任永州知府飬粹用和操嚴施恕勤恤民隱以文學飭吏治有古循吏風郡志白思義同知永州府單車至任處巳剛方旁郡有滯獄不決者當道委鞠無虗日讞獄詳明譽望籍甚郡志樂汝剛知江華縣復逋逃至六百餘户民甚德之郡志范之針由進士知永州知府存心蒞政有古循吏風調漢陽民多詣任候起居尋升夲省參政民益懷之郡志黃翰由進士知永州府勤慎清苦愛民好士遇旱禱雨輒應尋以直道不容去郡志周諒嘉靖中知寧逺縣時嵗大旱徒步拜禱雨隨以澍搗山賊巢冗捕江華苖舉有成績居民賴之郡志楊鏊東安縣儒學教諭器宇明逹行止端莊嘗以饋贈資貧生士類賴之郡志流寓范純仁蘇州人宋哲宗時知陳州因上疏忤章惇意貶武安軍節度副使永州安置時疾失明聞命怡然就道每戒子弟毋得怨惇江行舟覆扶純仁出衣盡濕顧諸子曰此豈章惇為之哉徽宗即位名還蘇轍眉州人仕宋為御史中丞紹聖初李清臣鄧潤甫復用稍復言熙豐事以激怒哲宗轍上疏諌貶化州别駕循州安置徽宗即位徙永州范袓禹成都人仕宋為翰林學士哲宗時請補外知陜州言者論其修實録詆誣又托其諌禁中顧乳媪事連貶昭州别駕安置永州吕希純河南人公著子宋哲宗時為起居舍人張商英憾之紹聖初商英為諌官力攻希純遂責舒州團練副使道州安置張浚漢州人仕宋以和國公奉朝請時彗星出浚上疏言事秦檜大怒令臺諌論浚謫居連州徙永州金人憚浚復用每使至必問浚安在王庶慶陽人宋紹興中樞密副使秦檜主和庶力詆出知潭州為中丞勾龍如淵劾罷歸巴江御史胡汝明又論其譏訕朝政責三德軍節度副使道州安置卒於貶所人物漢鄭産泉陵人為白土鄊嗇夫時民凡産子一嵗輒出口錢人多不舉子産勸百姓勿殺子口錢當自代出郡縣為表上言錢因得除改白土日更生鄊曾談泉陵人舉孝廉拜尚書郎有文武才官終太常熊尚零陵人拜綏民校尉又領曲江居五年去官尋詔拜騎都尉灌陽長蔣晉泉陵人靈帝時舉孝廉拜尚書郎後除汝南太守遷交州刺史入奏事應對不滯拜尚書在位清直為羣僚所服劉優零陵人其父綽夲彭城人為零陵太守因徙家焉優少有雋聲舉孝廉獻帝時為侍御史遷御史大夫再遷尚書右僕射朝綱無所不總臺閣為之肅然三國劉巴優長子劉表辟舉茂才不就漢昭烈定益州諸葛亮薦巴後代法正為尚書令躬履清儉不治産業昭烈嘗曰子初才智絶人亮曰運籌帷幄之中吾不如子初逺矣子初巴字也劉敏優孫善草書舉孝廉帝禪時除侍御史紏察名實不枉無辜為揚威將軍魏遣曹爽侵蜀敏率兵迎敵會費褘至魏軍退以功封雲亭侯後加中書侍郎出入禁掖見者改容拜成都大尹政行化洽唐諶泉陵人少有志操魏咸寧初舉茂才拜武騎常侍南平吳楚還授零陵太守境內清晏道不拾遺百姓樂業黃蓋泉陵人吳孫堅舉義兵蓋從之凡有冦難之縣輒用蓋為守長所在平定善於飬衆每所征討士卒爭先用命嘗從周瑜拒曹操於赤璧建火攻之䇿大破之國人繪像祠焉晉葉談零陵人清簡有節操至洛陽舉孝廉王濟謂談曰君吳楚之人也亡國之餘有何秀異而應斯舉談曰君不聞明珠大貝生於江海之濵乎武子無以對後除郎中拜太子舍人遷祕書監唐宏泉陵人幼頴悟永嘉初舉孝廉拜殿中郎纍遷至尚書大司徒薦舉賢能朝野多之臧榮緒泉陵人博聞強記有良吏風康帝即位拜著作郎修晉書三十卷纍官至御史大夫鄧璨泉陵人少髙潔與劉璘之劉尚公友善不應州郡辟會荆州刺史桓沖辟為别駕璨乃應召璘之謂璨曰卿忽改節吾失所望矣璨笑曰足下可謂有志於隱而未知隱之道夫隱在我而不在物是以朝市亦可隱璘之無以難之南北朝唐獻之泉陵人南齊時舉秀才官至廣州都督嚴毅公清臨事能斷嶺表肅然唐史青零陵人博聞強記開元初自薦云聞曹子建七步成章陛下若試臣願五步之內可奉詔日試萬言臣願足矣試昭君怨嵗除詩明皇大稱賞屈隱之祁陽人少好經史尤精易莊舉秀才為廣州判官兼攝司馬後攝韶州刺史居官清儉請託不行李季芳道州人代宗時處士刺史元結請于朝曰季芳介直目全退守廉遜文學為業不求人知乞令州縣造舍給田免其户役從之季芳卒結又表其所云李郃延唐人太和初擢進士第一同榜者三十四人而簫倣崔慎由崔鉉後並為相或謂郃與劉蕡同應賢良方正科者今縣有李狀元祠五代史萇零陵人善屬文吳王恪鎮宋州辟為判官謂萇曰逆冦未殄君有濟物才若垂顧黎元有望矣萇嘉其意乃應召多所裨贊境內肅然何仲舉營道人母嘗夢挾仲舉入月尋與范質同登後唐長興間進士因賜所居鄊曰進賢里曰化龍仕終天䇿府學士宋歐陽程營道人少貧為郡吏郡後有池常淬鐡為戎器名鐡作池植亭其旁一日太守於吏牘間得副紙紀池亭之勝有寒影倒吞凌漢樹冷光髙浴半天星之句問之為程語大驚異之與之金使歸為學登進士第纍官屯田員外郎陶嶽祁陽人纍官太常博士知端州余靖過端訪諸父老言前後刺史不求硯者惟包孝肅及公二人歷官四十餘年五為郡守有文集行世路振祁陽人唐相巖四世孫巖以貶死嶺外子孫因家焉振幼頴悟淳化初舉進士試巵言日出賦獨知所出太宗嘉之以大理評事通判邠州後遷左司諌知制誥嘗采五代史九國君臣事作世家列傳子綸為奉禮郎周輔成道州人世居營道之濂溪登大中祥符八年進士歷官多善政終於桂陽令纍贈諌議大夫子敦頥周敦頥以舅龍圖閣學士鄭向恩補官調分寧主簿移桂陽令治績尤著纍官至廣東轉運判官提點刑獄以洗寃澤物為巳務尋因疾求知南康軍為學不由師傳默契道體二程子從父宦逰因受學焉所著有通書太極圖説卒追封道國公諡曰元從祀孔子廟庭子燾官寶文閣侍制周堯卿永明人警悟強記以學行知名登天聖初進士積官至太常博士范沖淹薦其經行可為師表未及用而卒有詩春秋説各三十卷文集二十卷子諭鼎州司理參軍説歸安主簿陶弼祁陽人嘗學兵法能持論縱橫尤長於詩慶厯中提刑楊畋被旨討湖南猺致弼幕下用其䇿平之儂智高叛畋復辟弼參軍謀畋還朝曰吾平賊湖外所得者一陶弼而巳嘗知賔雍欽容辰順六州建中靖國編次勳臣弼亦預焉有書奏十八卷周世南祁陽人少好學遊上庠巳定聘董氏女未婚而女失明女父請改婚世南父貽書問之世南曰人生配偶有定分始全終廢天也既第成婚士論髙之纍官至駕部郎中以少卿致仕唐績零陵人少警敏嗜學能文登元符進士為衡山令復通判鼎州擢褔州運判帝諭之曰卿久歷州縣知民疾苦當遍察風俗以聞績天姿修潔蒞事有方接人以義士論多之何齍營道人後更名棄登政和進士第性剛介議論不屈倅隨守廉俱擅聲稱後守雅州亦以最聞纍官朝請大夫蔣湋零陵人少辭家入太學既無遇棄而歸隱黃庭堅在宜州病革湋往見焉庭堅委以身後事及卒為棺斂具舟送歸鄒浩謫永州湋從之遊浩有昭州之行湋又為經紀其家陳遘零陵人登進士徽宗時歷知中山河間金兵內侵遘悉力拒守欽宗初又徙知中山冒圍入城堅守時詔康王為天下兵馬大元帥遘副之京師陷割地求和遘弟光祿卿適至中山臨城論旨遘遙語曰吾兄弟當以名義自處適泣曰兄當盡力勿以弟為念遘呼總管使擊敵總管辭斬以徇復呼部將沙振往振懼潛刃殺遘城降金人見其尸曰南朝忠臣也殮而葬之適被執死于雲中唐開江華人建炎初第進士通判廉州治績著稱于時叔父貢嘗被誣憤死于獄開詣京師頌寃鄊人髙其義歐陽言營道人建炎初登第性廉退任遷江令嘗獲冒爵人陳椿以賞合改秩固辭不受後宰劇邑鞠制獄愈有聲稱尋倅賔陽遷員外郎致仕故廬蕭然僅庇風雨唐傑東安人生兩嵗即知孝繼袓母蔣病日失明傑以舌舐之目遂有見劇賊孔彥舟犯邑傑號泣負蔣冒賊以出賊義而捨之母病刲肉和藥以進即愈父亡以舌舐尸廬墓三年哀動山谷紹興間郡守以聞詔付史館賜以束帛李長庚寧逺人登紹興進士第歷仕五十年廉潔有守不事生業惟畜書數千卷號其讀書之室曰氷壷卒年八十六有氷壷集吳庸營道人登淳熙特科為容州陸川簿尉李接倡亂庸與司郡徐邦直唐捷俱以鄰郡尉紏合弓兵禦賊凡六戰衆寡不敵庸歿于陳徐唐被執罵賊而死帥劉焞上其事俱贈承事郎仍官其子吕陟零陵人與張栻遊楊萬里為丞時因督租過其里往見之郡守問萬里曰所過知有文才否答曰青桂里得一吕升卿飽學之士即招致鄊校領袖諸生後為常德府録參纍官監司有直聲升卿陟字也唐容零陵人博學強記與唐麟樂韶共學俱有大志人號城南三傑後舉進士宰豐城政聲為諸邑最尋知雍州交址入寇容提兵討之後隱於建昌麻姑山自號雲壑老人元張韶道州人以明易經舉於鄊仕至朝列大夫海北海南道宣尉司都元帥府僉事夲朝田子仁寧逺人元未隱居耕讀與劉三吾友善三吾徴赴行在首薦子仁徴授夲縣儒學教諭敦尚教化儒風大振郡志吳友遜道州人弱冠能武藝略涉書史元未盜賊競起民無所倚友遜仗義有為充萬户能保障地方人賴以安洪武紀元以夲州户藉獻于楊平章而歸附焉郡志雷復寧逺人性質純頴博洽經史任行人升監察御史七轉至右都御史歷官公正廉能臺綱振肅宦履無間言鄉邦仰而敬之郡志寧良祁陽人賦性爽愷好學善文任行人擢員外郎中升按察使布政使厯任有聲郡志趙𢎞道州人授刑部主事上疏言廣西邉事轉員外郎預典會試升山西僉事復補廣東屢決大獄人服其公歷巡海副使親平畨冦事聞賜以金帛郡志張鑑永州衛人少頴異刻苦問學事親至孝治家有法歷任主事員外郎尋升僉事副使隨任輒有治績郡志黃鍾江華人由行人升御史廉足以風人才足以應變公足以服衆明足以稽疑為士類所傳誦郡志吳禋零陵人任監察御史振肅風紀茂著激揚之聲尋升參議參政克修厥職不畏權勢卓為特稱郡志熊繡寧逺衛人由進士拜行人擢御史直朝蹇諤有器識議論務持大體歷布政進副都御史升兵部侍郎時孝廟以繡行尚書事衆推為右都御史總督兩廣逆瑾矯令致仕尋論定官其後諡莊簡郡志于材寧逺人由翰林檢討升編修學問該博以文學名于時郡志程溫祁陽人由進士任南京吏部郎中黜陟明允升通政司參議逆瑾用事部議擢太僕少卿內批致仕郡志唐慎零陵人正統間由舉人任監察御史出按廣西有淫祠民云著赭衣過廟門皆降災慎即著緋衣往焚其像廬其廟邪慝竟息後擢按察司僉事郡志李敷寧逺人由工部郎出補知府居官清慎待物溫直自歷任並無公過言行政事皆可法師郡志何天衢道州人初知嘉興縣擢御史纍官工部侍郎當逆瑾專柄宸濠不軌多所建明樹立卒于官志郡胡節零陵人由行人授御史巡按山東振肅風紀適逆瑾檀權怒節獨無所饋捕下錦衣獄捶死嘉靖改元賜祭贈光祿少卿郡志周卿江華人任兵部主事調刑部又調吏部行誼文章為時推重尤清苦自勵病劇僚友視之不囑後事卒後無辨喪之資唯書籍數百卷而巳郡志朱衮永州衛人選翰林庶吉士改南道御史升雲南副使左參政幼性警敏博洽羣書以詩文著名大學士西涯李公器之性剛介弗容歷官藩臬大振風紀姦宄望風斂迹居家撰白房集續郡十三志郡志沈良佐零陵人直心忠厚行事光明由進士任南京户部主事終廣西左參政所至皆有治績郡志列女郝氏祁陽張伯通妻年十七歸不五載伯通殁誓不再譙其舅姑繼殁無伯叔子嗣依父家守節四十九年貞潔無瑕洪武十六年下詔旌其門郡志尚氏零陵鄧璉妻年十九璉故孀居六十四年絶無瑕玷嘉靖改元收入武宗實録郡志趙氏寧逺趙龍之女為賊所執欲犯之大罵曰我身如玉可碎不可汚也賊奴我有死而巳賊怒殺之郡志成氏祁陽蔣克恭妻恭卒氏年二十三誓死守孤有司以聞旌表其門郡志曹氏東安林德賔妻年二十四夫故矢志撫孤年踰九十嘉靖改元下詔賜米帛郡志仙釋屈處靜漢祁陽人楚白公之後幼而悟道絶迹人表凡十二年一旦駕鶴而去魯妙典太平廣記妙典九疑山女冠也有麓林道士授太洞黃庭經入九疑山十年白日升天何仙姑幼遇異人與桃食之遂不飢能逆知人禍褔宋類苑云潭州夏鈞過永州問何曰世多言吕先生今安在何笑曰今日在潭州興化寺設齋鈞到潭日取寺中齋歷視之其日有華州回客設供懷素唐零陵人覩二王真迹及二張草書而學之書漆盤三面俱穴贈之以歌者三十九人皆當世名流顔真卿作序李白詩有少年上人號懷素草書天下稱獨步之句明一統志卷六十五
