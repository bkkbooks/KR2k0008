九龍巖在東安縣北一百里山形斗起竒石錯立物象古怪相傳嘗有樵者遇黃衣九士謂曰吾九龍居此久矣語訖莫知所在宋王觀詩山寒蟄龍眠忽醒黃衣九老巖下行手持屈曲千嵗藤慮驚世人藏姓名穿巖在道州西四十里形如圓廩中可容數萬斛東西兩門通道其間望之若城門又如偃月巖前有石如走猊伏􅙈其狀不一斑竹巖在道州南五十里多小斑竹相傳舜葬九疑二妃從至此以手拭淚把竹遂成斑色唐劉長卿詩蒼梧在何處斑竹自成林點點留殘淚枝枝寄此心陽華巖在江華縣東南六七里有回山南面峻秀下有大巖巖當陽故名唐元結撰銘瞿令書玉琯巖在寧逺縣南古舜祠側漢哀帝時零陵郡文學奚景得玉琯十二於此今祠後石室是也高士巖在寧逺縣南舜祠之西舊名野豬巖亦名嘯父後改曰高士昔有獵者見羣豕逐入巖不見因得樂器一部無為觀道士獻之於朝龍巖在寧逺縣丹桂鄊相傳若聞巖有龍吟之聲則其鄊有登賢書者龍洞在府城西南七十里乃唐世旻所居地唐昭宗時盜起世旻團結鄊兵保里閭劉建鋒舉為永州刺史光化初馬殷攻之不屈而死後或聞鉦鼓聲且數晝見嘗有一木自洞流出止於石荆岸人送之中流詰旦復還如是者數四適天旱禱而雨遂取其木像而祀之今石荆岸尚有廟承平洞在府城西一百里林嶺深邃相傳中有野人宋咸平間有一雌者突入田中擒一少年負去置洞巖中與之卧起既而逃歸含暉洞在道州南五里唐劉禹錫記薛君景晦為道州得異境有石室穹然如厦屋因名其室曰含暉紫虗洞在寧逺縣治南古木蒼煙石田棋布巖竇中深必炬而入唐薛伯高名曰斜巖宋郡守張觀名曰紫虗內有寇凖題名碧虗洞在寧逺縣南亦名嘉魚洞唐元結名曰無為洞上有李嶠篆刻中有水通碧橋南注舜溪化石在府城南八十里有石狀如人郡國志昔淮南王兵敗被逐至此化為石窊樽石在道州東唐元結集州東左湖湖東有小石山山巔有窊石可以樽乃作亭樽上又詩巉巉小山石數峯載窊亭窊石堪為樽狀類不可名五如石在道州城東唐元結序涍泉之陽得怪石焉左右前後及登石巔皆相似故名之曰五如石并建五如亭於此彭袓石在寧逺縣地名彭袓有池池內有石若釣磯上有人迹世傳彭袓嘗至此暖谷在江華縣南寒亭之側宋治平中縣尉李伯英得之邑大夫蔣褀命名蔣之竒作記謂方盛寒入此谷中其氣溫然雖挾纊熾炭不若也獅子垘在祁陽縣治南湘江之側有巨石狀如獅子古讖云獅子銜毬出狀元小丘在鈷鉧潭西栁宗元記丘有竹樹其石之突怒偃蹇負土而出爭為竒狀者殆不可數由其中以望則山之高雲之浮溪之流魚鳥之飛遊舉熙熙然回巧獻技以效兹丘之下湘江在府城北一十里源出廣西興安縣陽海山流經郡界至湘口與瀟水合水至清雖十丈見底輿地紀勝云湘水中有穴名大濩不知通何許每春夏江漲數百步外皆奔入穴中有聲如雷宋開寶中有崑崙沉水視之但見歷年所沉板木縱橫其間兩蚌大如車輪盧洪江在東安縣治東東南流出江口入於湘天湖在九疑山麓中有禽大如鴈錦羽尾長六尺又有石洞門外左右有石人如冠劍而立瀟水在府城外源出九疑山南流至三江口東北與沱水合又東北流至此北流至湘口會於湘永水在府城南九十里源出永山流入湘江祁水在祁陽縣治北源出寶慶府邵陽縣界地名餘溪東北流九十里縣北入湘營水在道州西源出營山東流與沱池水合經冝陽鄊與舜源水瀟水合又轉注單江至夲府入湘舜源水在寧逺縣南六十里源出舜源峯流至縣東西折而北與沱瀟二水合流至夲府入湘舂水在寧逺縣北八十里源出舂陵山東南流至此下流經桂陽州籃山縣境入湘遨水在永明縣源出廣西富川縣木馬山流入縣界掩水在永明縣治西源出大掩山下有石掩冗口故名東流與沱水合經三江口與瀟水舜源水合沱水在江華縣治東源出九疑山石城峨皇二峯流至縣别為二又十里合為一經三江口合瀟水舜源水北流至府入湘砯水在江華縣東南源出九疑山女英峯流與沱水合其水多石湍急有聲故曰砯秦水在江華縣源出吳望山南流與冬冷水合水聲鳴咽如秦隴故名愚溪在府城西一里源出鴉山舊名冉溪唐栁宗元改今名其詩序有云灌水之陽有溪焉東流入于瀟水或曰冉氏嘗居也故曰冉溪或曰可以染也謂之染溪余以愚觸罪謫瀟水上家是溪故更之為愚溪愚溪之上買小丘為愚丘東北得泉而又買居之為愚泉合流屈曲而南為愚溝遂負土纍石塞其隘為愚池愚池之東為愚堂其南為愚亭池之中為愚島於是作八愚詩紀于漢石上都溪在府境水經注云都溪水出舂陵縣西縣有五色山山有一溪五水皆會於其間故曰都溪黃溪在府城東七十里蓋九疑山之西境栁宗元記永之治百里北至于浯溪西至于湘之源南至于壠東門東至于東屯其間名山水而村者以百數黃溪最善高溪在府城北九十里有唐叟者世居溪上宋乾德中一旦厭喧雜登舟而去往來垂釣伏臘則暫歸受子孫謁見如此者三十年浯溪在祁陽縣南五里流入湘江唐元結自道州歸愛其山水因家焉作大唐中興頌顔真卿大書刻于岸江結又為峿臺唐亭石室諸銘宋陳衍云元氏始命之意因水以為浯溪因山以為峿山作室以為唐室三吾之稱我所自也制字從水從山從唐我所命也三者之目皆自吾焉我所擅而有也濂溪在道州西二十餘里宋儒周敦頥所居張栻為撰祠堂記云濂溪里名也先生家世其間及寓於他郡而不忘其所自故亦以是名溪朱文公江州祠堂記云家舂陵而老於廬山之下因取故里之號以名其川曰濂溪故九江府亦有濂溪云鈷鉧潭在西山之西栁宗元記冉水自南奔汪抵山石屈折東流其顛委勢峻蕩擊益暴齧其涯故旁廣而中深畢至石乃止流沫成輪然後徐行有樹環焉有泉懸焉使豫忘故土者非兹潭也歟小石潭在小丘西栁宗元記水尤清冽泉石以為底近岸卷石底以出為坻為嶼為嵁為巖青樹翠蔓披拂潭中魚可數百尾皆若空逰坐潭上竹樹環合淒神寒骨悄愴幽邃不可久居以其境過清也石馬潭在府城北五十里湘水中有石狀如馬蒲州在府城東一十里瀟水之傍栁宗元有詩吕虎井在府城東山上吳孫權遣吕蒙取荆州嘗駐兵於此插劍泉湧以其威力如虎故名紫巖井在府治北玄妙觀前五龍井在道州城西北相傳龍之所居七泉在道州東郭唐元結銘序有泉七穴命其五曰潓􅪙涍汸淔欲飲者有所感發一曰漫泉自旌漫郎一出山東命曰東泉垂流特異結詩云問吾常宴息泉上何處好獨有潓泉亭令人可終老知時泉在道州城望仙門內鑿石象龍以導其流夏至則盈秋分則涸宋紹興間都守辛公創亭而扁之甘泉在祁陽縣治西北其山前後對峙泉出其間極清冽袁家渴在朝陽巖東南栁宗元記楚越之間方言謂水之反流者為渴其中重洲小溪澄潭淺渚小山美石青藂蔚然嘉木香草轇轕搖揚其狀無窮南池在府子城東栁宗元逰宴序云連山倒垂萬象在下浮空泛景蕩若無外橫碧落以中貫凌太虗而徑度誠遊觀之佳麗者愛蓮池在道州學西濂溪書院之北石渠在袁家渴西南栁宗元記渠之廣或咫尺或倍尺其長可十許步其流抵大石伏出其下踰石而往有石泓菖蒲被之青蘚環周又折西行又北曲行其側皆詭石怪木竒卉美箭可列位而庥焉青澗在九疑山王韶之神境記九疑山半其路皆植松竹下夾路有青澗澗中生黃色蓮花香氣盈谷石澗在石渠西北其水之大倍石渠之三亘石為底逹于兩涯水平布其上流若織文翠羽之木龍鱗之石均蔭其上澗之可窮者皆出石城村東南以上峭險道狹不可窮也石牌灘在府城北四十里其石皆片假聨綴狀如簰筏或云秦始皇造橋於海上有異人乘牌往助之始皇死遂棄去垂幔灘在府城西南水行百里枕湘江之岸峭壁倚空遙望如帷幔之狀下有灘因名垂幔煙塘在府城東北一百餘里其深莫測相傳昔有民得一白鱔將烹之有老叟曰此湘江之龍恐禍及民怒以為虗誕排之翌日一村俱蹈土産錫江華縣出鐡零陵祁陽江華永明寧逺五縣出石燕青碌俱祁陽縣出綄線剋絲俱零陵祁陽二縣出石磬零陵縣出亞於徐州石屏白鶴山出香茅山川記永州野有香茅貢以縮酒春秋楚貢苞茅不入即此零陵香生湘源所生處香聞數十步異蛇栁子厚捕蛇者説云黑質而白章觸草木盡死臘之以為餌可以已大風攣蜿樓厲去死肌殺三蟲藩封南渭王府在府東成化十五年于此自武岡州岷府遷建公署永州衛在府治西夲朝洪武初建寧逺衛在道州治西舊為道州守禦千户所洪武二十九年改為衛枇杷守禦千户所在永明縣東南三十里桃川守禦千户所在永明縣西南四十里守鎮寧逺縣千戶所在寧逺縣治西守鎮江華千户所在江華縣南門外守鎮錦田千戶所在江華縣東二百里俱洪武二十九年建𨽻寧逺縣守鎮東安百户所在東安縣治西洪武二十九年建𨽻永州衛學校永州府學在府治東唐大中間建道州學在州治西門外唐建二學俱夲朝重建零陵縣學在縣治南宋嘉定初建於縣治西後移縣治東夲朝改建於此祁陽縣學在縣治東宋舊學元移於縣治北夲朝洪武初復建於此東安縣學在縣治東宋建元燬寧逺縣學在縣治東唐建永明縣學在縣治西宋建以上三學俱夲朝洪武初重建江華縣學在縣治東唐舊學宋移建於縣治北夲朝洪武初復建于此書院浯溪書院在祁陽縣治南元縣尉曾圭與其子堯臣創中為大殿以奉先聖殿左立祠以祀唐元結顔真卿濂溪書院在道州學西祀宋周敦頥理宗賜額宫室南樓在府治子城東下臨東湖湖上有紅渠堂唐泰和中刺史李衢所建又道州亦有南樓唐吕溫有南樓換柱詩瀟湘樓在府治子城西瀟湘二水合流于前萊公樓在道州治西北宋寇凖嘗貶此州司馬既去人為建樓樓下扁曰勝槩後又有燕堂稽古閣在府學內宋汪藻記妙觀閣在道州城內紫極宫新堂在府治內唐刺史韋宙建栁宗元記公之蠲濁而流清豈不欲廢貪而立廉公之居高而望逺豈不欲家撫而戶曉然則韋公之立是堂豈獨草木土石水泉之適山源林麓之觀歟將使繼公之理者視其細知其大也思賢堂在府學宋建繪周濂溪范純仁范袓禹鄒浩張浚像共為一堂榜曰思賢清源堂在府治宋知州胡寅建三省堂在府城內宋張浚寓居時建仍為記平易堂在道州治其通判廳又有楚富堂皆宋時建萬石亭在府城北唐刺史崔能建栁宗元記公以御史中丞來涖是州政暇登城見怪石特出乃伐竹披奧以入其墟皆大石林立渙若奔雲錯若置棊於是闢壤翦榛立亭于中以其石多名曰萬石三亭在府城東山麓泉側唐零陵令薛存義建一曰讀書林亭二曰相秀亭三曰俯清亭栁宗元記謂氣煩則慮亂視壅則志滯君子必有遊息之物高明之具使之清寧平夷恆若有餘然後理逹而事成也九巖亭在府治巖出池中者凡九跨池為橋而創亭於池上先賢題識甚多此亭之後又有鑑亭衆樂亭在府治子城東宋陶弼罷雍守還家太守蘇袞邀至東湖坐新亭上而觴之俾陶敘衆樂之實粲粲亭在道州治後宋時建取杜詩舂陵行粲粲元道州之意時又有三亭曰欣欣亭取白居易道州民歌老者幼者何欣欣之意曰肅肅亭取杜甫餞裴道州肅肅秩初筵之意曰振振亭則取栁文廟碑振振薛公之意寒亭在江華縣南隔江唐瞿令開棧道入洞冗作亭石上元結當大暑登之疑天時將寒故名玩鷗亭在府城西宋汪藻謫居日建自為記云客有過而問焉者曰子之鷗信可玩乎豫曰我與物同見於天地之間者以形而