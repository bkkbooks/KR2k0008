  text: 明一統志卷八十五明李賢等撰潯州府東至梧州府藤縣界一百六十五里西至南寧府宣化縣界五百一十八里南至梧州府容縣界一百八十八里北至桞州府武宣縣界一百八十里自府治至南京五千五百里至京師八千五百四十五里糧三萬六千石零建置沿革古百粤地天文翼軫分野秦為桂林郡地漢屬鬱林蒼梧二郡梁分鬱林於此置桂平郡隋廢桂平郡為縣屬鬱林郡唐屬鷰州貞觀間始置潯州治桂平天寳初改潯江郡乾元初復為潯州宋省尋復置元至元中改置潯州路本朝洪武元年以貴横二州及永淳縣来屬三年改路為府改貴州為貴縣九年以横州永淳縣割屬南寧府今領州一縣三桂林縣附郭本漢布山縣為欝林郡治所梁置桂平郡隋廢郡於布山縣地置桂平縣屬尹州後屬欝郡郡唐屬鷰州貞觀中於縣置潯州後省陵江縣入焉宋開寳中州廢以縣屬貴州尋復置州元仍舊本朝因之編户一十七里平南縣在府城東一百三十里本漢猛陵縣地屬蒼梧郡晉置武城縣劉宋改置武林縣屬永平郡隋初屬藤州唐貞觀中分置平南縣後自武林移龔州治此領陽川武林隋建大同四縣宋省四縣入平南後又以思明州之武郎縣省入紹興中州廢以縣𨽻潯州元仍舊本朝因之編户二十四里貴縣在府城西一百四十里本漢桂林郡之南境漢為欝林郡之廣欝縣吳改陰平縣晉改欝平縣仍屬欝林郡梁置定州改南定州隋初郡廢改曰尹州大業初又改欝州治欝林縣尋改欝林郡唐初改南尹州貞觀中改貴州仍舊治天寳初改懐澤郡乾元初復為貴州宋改欝平縣曰欝林縣為州治元仍舊本朝廢欝里林縣改州為縣及改今屬編户三十四武靖州在府城西一百二十里本朝隆慶中改置編户一十二里郡名桂平梁名潯江唐名形勝封域廣袤實有三州之地潯江志南北限以二江同上左黔右欎合于山之麓曰潯水故云二江鍾釜秀峙映帶州宅顯惠廟記江山氣象之秀宋李邦彥題白石云潯江窮瘴嶺之南郡雖僻傍與都嶠勾漏為鄰而白石近在境上江山氣象之秀有足嘉者山水竒秀地理寛廣府志風俗椎髻箕踞乃其舊風隋志民淳訟簡潯江志潯雖古荒服沃壌頗多山水竒秀民淳訟簡人多業儒其民從化潯江學記欎江東注土無氛惡蠻溪獠洞不際其境民之從化豈間然哉並服禮儀圗經自大唐中以後並服禮儀衣服巾帶如中國焉人物純和風土記力耕為業不產蠶絲人物純和無行諂詐土風尚朴懐澤志土風尚朴不事華飾不機巧趍利山川思靈山在府城西五里又名西山秀峙穹窿映帯府治上有三清巖鳳巢山在府城西五十里下有龍潭祈雨多應石鹿山在府城北五十里上有石如鹿白石山在府城南六十里兩峯並立下有巖洞即道書第二十一洞天通容縣勾漏洞世傳葛洪煉丹嘗往来其間洞之上㑹仙巖有煉丹竈及八仙石存焉宋張志道詩山似遊龍勢欲奔山中有路透天閽峰巒長帯烟霞色洞穴渾無斧鑿痕楊子春詩曉㪺沆瀣夕餐霞更挽天漿嚥月華日午道人猶未起香風吹老古松花羅影山在府城北七十里雞棲山在府城北八十里吉盤山在府城北九十里閬石山在府城北一百六十里峰巒競秀如列旌旗下有讀書巖五代時状元梁嵩嘗讀書于此鷰石山在平南縣東南一十二里山有石鷰唐置鷰州取此古崙山在平南縣北大峽山在平南縣北一十五里甕山在平南縣西六十里磨雲山在平南縣南一百里山頂常有雲霧南山在貴縣南一十里上有二十四峰峭拔異秀甲於一郡宋俞括詩二十四峰尖參差列郡南半空擎梵宇絶頂寄僧龕東山在貴縣東二十里峰巒秀特相傳唐時有何特進履光二人隐此山化為石今山頂有石狀如二人並立西北一峰望之如婦人搭帔簮花俗呼為新婦巖北山在貴縣北二十七里又名宜貴山上有瀑布千仭禪僧羽客多棲止焉山有石牛毎旱則殺牲取血和泥塗牛背以䁍鹵塗牛口歌牧牛詩以樂之祀畢則雨泥盡乃晴西山在貴縣西三十里五峰並立山多躑躅花銀山在貴縣東北上有石函望之如銀俗呼為仙人函龍山在貴縣北五十里山有茶樹邑中人賴之地道記曰龍山合水所出龍影山在貴縣南石壁上有五色彩畫出龍影馬嶺山在貴縣西北七十里一名龍馬又名馬度山多虺其毒殺人惟泠石可以解之屑着瘡内即活俗傳有馬嘶及奔踶聲則人多疫癘横嶺在府城北五里舊志云在貴平縣南九十里三鼎嶺在府城東三十里寶子嶺在府城南三十里山勢磊落如聚寶玉稜層嶺在府城西南七十五里南頓嶺在府城南一百二十五里仙女嶺在貴縣北七十里獨秀峰在白石山之側孤翠飛騫百里所瞻會仙巖在白石山上磴道險峻攀縁而上其廣可容數十人中有葛仙翁丹竈羅叢巖在府城西南六十里其巖明爽可容二三百人内有三教殿殿東西有碧虛靈源二洞實潯之勝槩每嵗重九郡人登高于此高陽巖在平南縣與思鵝巖對峙巖宇高曠而明豁前瞰平野又有湖叟巗在此巖之陰有宋治平中名賢題跋思鵝巗在平南縣舊經謂之思鵝石状若八角樓暢巖在平南縣西北三十里一名姚公巖宋郡守姚嗣宗詩石作洞房勢水隨人意流兩巖嘗濺雨五月便驚秋此境有深趣無心真樂遊山公中宿酒欲醉更重投登仙崖在北山路傍接仙女嶺山上或聞宴皷聲即嵗豐人安聞戰皷聲即兵戈起獅子岡在府城西五十里状如獅子崑崙岡在府城西七十里蛇黄岡在平南縣北四里岡勢盤紆出蛇黄每嵗九月邑人掘深七八尺始得之大者如雞子小者類弹丸其色紫磨之可傅腫毒顯朝岡在貴縣北二十里郡志云陸續為太守嘗登此岡制渾天儀大藤峽在府城西北一百五十里大山夾江綿延數百里山勢險峻中多猺人金雞峽在貴縣西六十里潯江在府城北乃欎黔二江至城下