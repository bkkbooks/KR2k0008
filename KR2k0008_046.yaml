body:
  text: 明一統志卷四十六明李賢等撰寧波府東至海岸一百四里西至紹興府餘姚縣界一百二十里南至台州府寧海縣界一百四十六里北至慈溪縣界海岸六十二里自府治至南京一千三百八十五里至京師四千六百四十里糧一十七萬四千四百石零建置沿革禹貢揚州之域天文牛女分野夏商周皆為越地秦置鄞鄮句章三縣屬㑹稽郡漢因之三國吳及晉宋齊梁陳皆仍舊隋以鄞鄮省入句章縣𨽻吳州後𨽻越州唐武德初析句章縣置鄞州尋廢為鄮縣仍屬越州開化中以鄮縣置明州天寶初改餘姚郡乾元初復為明州屬江南道五代時錢氏於此置望海軍宋初改奉國軍屬浙東路紹興初置沿海制置司於此紹熙中升州為慶元府元至元中改置慶元路本朝吳元年改明州府洪武十四年又改寧波府領縣五鄞縣附郭古越之東境秦置鄞縣屬㑹稽郡漢因之王莽改為謹縣東漢復舊名隋並入句章縣屬吳州唐初折句章置鄞州尋廢州為鄮縣屬越州開元中復改為鄞縣屬明州宋元仍舊本朝因之編戶四百四十八里慈溪縣在府城西北六十里本秦漢㑹稽郡句章縣地自晉至隋皆因之唐為鄮縣地開元中始析置慈溪縣屬明州宋元仍舊本朝因之編戶二百里奉化縣在府城南八十里本秦漢鄞縣地屬㑹稽郡隋省其地入句章縣唐初為鄮縣地開元中析置奉化縣屬明州宋因之元元貞初升為州本朝洪武二年復為縣編戶一百四十七里定海縣在府城東六十五里本秦句章縣地唐為鄮縣望海鎮地五代時錢氏更名靜海鎮尋置望海縣又改定海縣宋元仍舊本朝以昌國縣省入編户九十里象山縣在府城南二百七十里本漢鄞縣地晉為寧海縣地屬臨海郡唐神龍初於海寧縣界海曲中象山東麓置象山縣屬台州廣德初屬明州宋初仍舊本朝因之編户三十里郡名甬東史記越滅吳欲置吳王於甬東即此地四明唐以山名州慶元宋名形勝東南要㑹四明圖經云海道輻湊之地南則閩廣東則倭人商船往來物貨豐衍東出定海有蛟門虎蹲天設之險亦東南之要㑹東漸巨海西通五湖南暢無垠北渚浙江吳虞翻云負溟渤控扶桑倚巨鎮通長江九經堂記抱負滄海枕山臂江圖經四明據㑹稽之東抱負滄海枕山臂江重阜崇嶺連亘數千里水陸並通晉陸雲答車茂安書直東而出水陸並通西有太湖廣縱千頃北有名山南有林澤東冇巨海往往無涯放船長驅一舉千里太湖漫其西南大江帶其東北宋楊䝉引水記風俗君子尚禮庸庶淳龎隋志川澤衍沃風俗澄清海陸珍異所聚蕃漢商賈並湊君子尚禮庸庶淳龎人雜五方俗類京口隋書其俗不雜其人易治宋王安石慈溪縣學記無遊販之民故其俗一而不雜有以自足故其人慎刑而易治衣冠文物甲於東南諸郡郡志詩書之鄉王應麟鄞縣學記是邦為詩書之鄉逸民之黃純孝之董丈士之任自漢以來為美談山川府山在府治後宋郡守胡矩取五方土積成此山以鎮府城陶公山在府城東三十里世傳陶朱公嘗隱於此故名山有釣魚磯鄮山在府城東三十六里舊志嘗冇海商貿易於此後人因加邑從貿以為山名赤堇山在府城東四十里山上有草名赤堇縣因此山故加邑名鄞霞嶼山在府城東四十里東錢湖中山上有霞嶼寺翠巖山在府城西四十五里上有秦皇石板弓箭洞響巖山在府城西南四十五里壁立千仞下瞰流水每冇聲響相答世傳唐賀知章隱居於此動石山在鄞縣境寰宇記山有竪石髙五六丈下有小石攴之暴風雨則石自動行於山者聞隆隆作聲它山在府城東五十里唐縣令王元緯築堰於山下石臼山在府城西南五十里山坡有石穴如臼世傳葛仙翁煉丹處山下有溪天井山在府城西南五十里上有五井相傳為神龍所宅嵗旱祈之得金線蜥蝪蛇蟹之類雨隨應阿育王山在府城東五十里舊名鄮山晉太康中并州人劉薩訶得阿育王塔於此因名陽堂山在府城東五十里四面懸絶下冇鮑郎墓天童山在府城東六十里山冇虎跑泉玲瓏岩反天童寺宋王安石逰山詩溪水清漣石老蒼行穿溪樹踏春陽溪深樹密無人處惟冇幽花渡水香太白山在府城東六十里其山視諸山為最髙上有龍池雲氣蓊勃生於水而不絶灌頂山在府城西南七十里上有馬跡石瀑布泉宋舒亶詩萬松偃蹇插雲根四面諸山盡子孫大梅山在府城東南七十里相傳漢梅子真隱於此石洞仙井藥罏丹竈遺跡猶存山頂冇大梅木唐時伐為禹廟及它山堰梁金峨山在府城南八十里府治之案山也四明山在府城西南一百五十里周回八百里跨紹興台州之境二百八十峯其巔五峯絶髙形如芙蓉道書謂是山為丹山赤水之天上有石忩四冗通日月星辰之光故曰四明山又有石樓石鼓之類竒異非一唐施肩吾詩半夜尋幽上四明手攀松桂觸雲行相呼已到無人境何處玉簫吹一聲赭山在慈溪縣南一十里土色正赤故名元曹漢炎詩江流曲似陽氷篆山色丹如葛令砂雞鳴山在慈溪縣西二十五里一名仙雞山上有石井石床石瓶之類旁有石雞云是扶桑烏飛下因名扶桑雞三過山在慈溪縣西南二十里山勢臨江潮水縈紆舟人憚于經過雖一過猶三過焉故名蘆山在慈溪西南二十五里其山青翠為一方之勝驃騎山在慈溪縣東三十里舊名靈山因東漢驃騎將軍張意之子齊方隱於此故名虎胛山在慈溪縣西三十里形如伏虎隋大業中嘗鑿此山西南斷迹猶存香山在慈溪縣東北三十五里産香草故名上冇巖名大蓬其形如削又有穴深三丈及三巨人跡戍溪山在慈溪縣西南三十五里晉劉牢之嘗屯兵於此下有戍溪大隱山在慈溪縣南三十七里晉虞喜嘗隱於此山三召不起唐末閩人林無隱亦僑居於此有詩名車廄山在慈溪縣西南四十里昔越王勾踐停車秣馬於此鳳凰山在慈溪縣西四十五里山形如鳯本朝桂彥良詩鳯凰山下路縈紆老衲幽棲雪滿顱三十六池春水活年來還有鳯雛無句餘山在慈溪縣西南四十里以其在句章西餘姚東故名山海經云其山多金玉無草木五磊山在慈溪縣北四十五里五峯如聚米所成鶴鳴山在慈溪縣北四十五里宋翁仲德詩滄海東頭鶴阜髙仙人騎鶴下林坳一聲唳起揚州去華表空餘月下巢九峯山在慈溪縣東六十里上有靈鷲寺又故昌國縣北六十里亦冇九峯山上有吉祥院唐開成中髙僧惠超居之埋馬山在慈溪縣西六十里舊志秦始皇逰海至此山馬斃寶化山在奉化縣南三里相傳山上有古松如卧龍及有杜鵑花如翔鳯宋樊圃作鳯花詩山僧取巧蟠珍叢九苞占盡千葩紅倚欄精彩欲飛動百鳥不敢啼春風孝感山在奉化縣東北一十里相傳昔有孝子盧墓於此感甘露之降草木花皆白故名梅山在奉化縣西南三十五里旁有丹井水隨潮上下號海眼宋樓鑰詩峯頭丹井隨潮信僧下禪床據祖關蓬島山在奉化縣南四十里宋劉次髙詩雨從半嶺巖窩出雲在行人腳下生橫山在奉化縣南四十里有石文若篆旁有石臺丹小山在奉化縣西五十里山下冇洞洞上冇丹霞二字又有石洞風自中出名風洞鮚崎山在奉化縣東五十五里漢志鄞有鮚崎亭即此地顔師注鮚蚌也長一寸廣二分有一小蟹在其腹中崎曲岸也其中多鮚故名天門山在奉化縣南六十里梁陶𢎞景所謂天門在鄞縣之南寧海之北即此山宋舒嶽祥詩煙樹連天逺漁樵兩地分仙舟滄海路僧錫石橋雲落日人行少空村犬吠聞誰知隱淪者絶迹在人羣雪竇山在奉化縣西北六十里中有雪竇寺千丈巖瀑布泉藤龕錦鏡池含珠林隱潭形勝非一桃花坑山在奉化縣西北六十里山色紅白相映如桃花然中冇平田數百畝石樓山在奉化縣西南六十里有石如屋兩崖夾澗飛瀑亂下梨洲山在奉化縣西一百里舊志晉孫興公弟承公逰此獲仙梨食之成仙故名鎮亭山在奉化縣西南一百里漢志所謂鄞有鎮亭即此梓䕃山在定海縣治東山下峻石大刻懲忿窒欲四字尚存招寶山在定海縣東五里一名候濤山山半有碁子坪凡欲取棊子者先以白飯撒之翌日可得白子以黑豆撒之翌日可得黑子宋吕祖儉有逰山記巾子山在定海縣東五里與招寶山對峙為潮水之障蔽虎蹲山在定海縣東五里屹立海口狀如虎蹲蛟門山在定海縣東四十里一名嘉門山出此即大海洋古人稱蛟門虎蹲天設之險即此地伏龍山在定海縣西北八十里山跨東西兩海門狀如卧龍內有千丈崖海眼泉石壇乳井施公山在定海縣西九十里元有巡檢司以禦海寇今置烽堠於上瑞巖山在定海縣東南九十里上有青松峯宋大中祥符間峯下嘗産紫芝五本守臣以聞因名山下有芝草詔碑澤山在㝎海縣西北九十里舊名櫟山宋吏部郎官黃震歸隱居此進士黃翔龍訪黃震詩主人何往客來觀一鏡湖光半壁寒閒蝶自專花富貴幽禽似語竹平安桃花山在定海縣東北故昌國縣東南相傳昔安期生以醉墨灑於池上遂成桃花滃洲山在定海縣東北故昌國縣世傳徐偃王所居春秋所謂甬東即此地補陀落迦山在定海縣東北故昌國縣海中佛書所謂海岸孤絶處也往時髙麗日本新羅諸國皆由此取道以候風信一名梅岑山象山在象山縣治北形如伏象煉丹山在象山縣治西南一名蓬萊山相傳梁陶𢎞景煉丹於此山上冇峯如掌名仙人巖鼓吹山在象山縣東八里上有峯萃然特髙天欲隂雨冇聲轟轟如鼓吹聖娘山在象山縣南一十里舊志昔冇一女子在此隱現若神珠巗山在象山縣東北三十里世傳自海中見此山有寶氣故名絶頂有金蛤潭三蕚山在象山縣南海中六十里其山有三峯亦名三仙島至春雜花盛開綺鹿可觀東門山在象山縣南一百二十里海中其狀如門下有橫石如閾漢志所謂天門山也闞峯在慈溪縣東二里吳太傅闞澤居此故名雙峯在慈溪縣西北五十里兩峯秀特對峙妙髙峯在奉化縣西北六十里宋樓鑰詩一峯髙出白雲間俯瞰東南千萬山鎮明嶺在府治南宋郡守李夷庚以土增之髙數十丈今平聖公嶺在府城西七十里壁立千仞其中石室虛明宋朱彥誠嘗遇仙於此杜湖嶺在慈溪縣西北五十里栅墟嶺在奉化縣西北六十里宋建炎間立寨於此守戍亦海道一要衝也禪巖在府城西南五十里中可容百人雖暑月猶清涼新婦巖在奉化縣西北一十里上有危石肖人形其石五色望之是女粧花鈿然因名舊冇石夫人廟佛頭巖在象山縣東二十五里髙十餘丈狀類婦人首故名姜山洞在府東南三十里洞冇三其大者可容數十人中冇冗形如月仰可以窺天謝家洞在奉化縣東三十里其中虛圓可容十數人夏月猶寒俗傳有大白蛇藏其中隱顯不常龍洞在象山縣東南二十五里洞中冇石室廣可數丈天將雨水如雷鳴聞十餘里嵗旱禱雨輒應台明嶼在象山縣西南一百五十里乃台明二郡分界之處海鄞慈溪定海象山四縣皆濵海日本諸蕃航海朝貢者皆抵此登陸灌門海在定海縣東北故昌國縣海中有砥柱屹立中流望之如人拱立水匯於此旋涌若沸舟行必投以物殺其勢而後過風雨將作有聲如雷鄞江在府城東其源冇二一自奉化江合它山之水東流一自上虞縣經餘姚慈溪縣境東流俱至縣東三港口㑹而東注至定海縣大浹江入于海奉化江在奉化縣北四十五里俗名北渡江流入鄞江大浹江在定海縣治南東晉末劉裕與孫恩戰退還浹口即此地又冇小浹江管山河在慈溪縣東五里宋吳潛開浚以通水利鄞慈定三縣皆賴之市河在奉化縣東五里溉田三萬七千畝元袁桷有記瑞龍河在象山縣南二十里慈溪在慈溪縣西南三十里舊名大隱東漢董黯因母疾思飲此溪水築室溪濵以便取汲故後人以慈名溪文溪