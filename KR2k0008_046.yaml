秋時為甬東唐開元中置翁山縣宋改曰昌國元升為州本朝復為縣洪武中以其地瀕海招寇徙其民於內地縣廢千人壇在慈溪縣西南一十五里相傳秦始皇東逰㑹稽望秩以求神仙立壇於此上可容千人石忩在四明山唐陸龜䝉云四明山有峯最髙四穴在峯上每天色澄霽望之如户牖相傳石忩四明之目也石筍在四明山山有雙石如筍髙數丈野花叢生其頂春時爛若雲錦宋時每遇遏密之時輒三年不榮齊唐嘗為之贊范鎮詩鼎湖龍去蒼髯斷三載叢花不記春石硯在慈溪縣西南五十里白巖山崖罅間冇石硯可見而不可得人異之名宦唐房琯慈溪縣令尚德化興常利流民懷歸黠吏引去嘗鑿湖溉民田數千頃人甚德之王元緯開元中鄮縣令築堰浚湖灌溉甚博民立祠祀之陸南金天寶初鄮縣令開廣東錢湖田八百頃民至于今賴之李吉府明州長史䆒知閭里疾苦孔戣明州刺史州貢蚶蛤淡萊水陸勞費戣奏罷之嵗免役夫四十餘萬人任侗貞元中明州刺史增修廣德湖溉田四百餘頃王密明州刺史冇德政民為立碑吳謙大厯間明州刺史有善政郡民歃血祠之于季友太和中明州刺史於州城西南四十里築仲夏堰溉田至數千頃裴警明州刺史逃逋復田疇闢興學化民風俗丕變郡人立碑紀其政績五代錢傳吳越明州刺史有善政及卒吏民感其遺愛為之立祠宋錢億奉國軍節度使內和民兵外固封守市無二價道不拾遺張頴端拱中知慈溪縣亷潔自持太宗賜敕書奬諭有勤以奉公亷以守道之語楊紘知鄞縣鄞濵海惡少販魚鹽者羣居洲島或掠商人財物入海紘設方略使識者質惡少船及歸始給還且戒諭之由是不敢為盜錢公輔仁宗時知明州有善政時衙前法以三等差次勞勤應格者聼指酒場以自補富者足欲而貧者日困公輔取酒場官鬻之分輕重以給役者不復調民陳襄知明州務興學校以講求民間利病為急王安石仁宗時知鄞縣讀書為文率二日一治事起堤堰決坡塘為水陸之利貸穀與民立息以償俾新陳相易興學校嚴保伍邑人便之後行新法本於此韓晉卿元祐初知明州時差役法復行諸道處畫多倉卒失叙獨晉卿視民所宜而不戾法指曾鞏熙寧中知明州務去民疾苦急奸强盜賊而寬弱貧每曰為人害者不去則吾民不寧燕肅知明州民俗喜鬬肅下令獨罪先驅者其風遂息作蓮花漏以候昏曉又為海潮圖著海潮論二篇虞大寧熙寧中知鄞縣興水利繕治堰碶溉田五千五百餘頃李夷庚知明州浚治廣德東錢二湖毁淫祠興學校有功於民傅堯俞元祐中知明州有惠政清直一節始終不變于房知奉化縣守正不回懲惡勸善興利祛害以厚風俗林旦為象山令以文學為政邑人安之嘗病民有割股肉以療之者其得人心如此程大昌紹興初知明州又為浙東提刑㑹嵗豐酒稅踰額有挾朝命請增額者大昌力拒之曰大昌寧罪去不可增也陳瓘通判明州州職田之入厚瓘不取盡棄於官以歸在郡嘗著四明尊堯集仇悆紹興初知明州抑豪强奬善良作興學校行鄉飲酒禮嵗歉發官儲賑糶全活甚衆范成大知明州當魏王為守之後成大奏魏王國之懿親故得以時節奉貢海物於兩宫臣外朝臣也不敢效尤孝宗命停貢胡矩寶慶中知慶元府措置有方於水利尤盡心立水則刋平字於石為啓閉之準民皆德之吳潛寶祐中判慶元府事郡綗振飭海道肅清於水利尤盡心姚希得知慶元府兼沿海制置使廣募水軍造戰艦蓄糧食蠲舊逋一百萬甚有善政林大中知慶元府城南民田潮溢不可種大中捐公帑治石築之民不知役而䝉其利郡訛言夜有妖大中謂此必黠賊所為立捕黥之人情遂安孫子秀通判慶元府主管浙東鹽事先是諸場鹽百袋附五袋名五釐鹽未幾提舉官以為正數民困甚子秀奏蠲之劉黻以沿海制置知慶元府事建濟民莊以濟士民之急資貢士春官之費備郡庠耆老緩急之需葉夢鼎知慶元府兼沿海制置使肅清海寇罪止首惡建濟民倉以備饑嵗造驛舍以待賔旅陳塏知慶元府兼沿海制置副使興學好士以名義為重軍民愛戴之元諤勒哲圗以江浙行省左丞鎮慶元凡二十年臨政一以公道有司畏憚不敢毫髮厲民王元恭至元六年慶元路總管下車問民疾苦馭吏卒有威興葺學宫舉鄉飲立義阡建石橋考詢水利平反寃獄政治大洽胡閏祖至元初慶元路推官初積囚滿獄淹至十年閏祖至則朝夕審録不憚寒署洗寃澤物甚於饑渴自是訟無滯者郡人為立去思碑寧玉至元中以萬户鎮慶元智勇沉雄紀律嚴明以戡定綏靜為務民皆安堵海道晏然于文傳同知昌國州事長於治劇有善政始至州以恩信柔下海島之民雖頑獷不易治亦為之變俗丁濟奉化尹凡公論所在一判不復移民至今稱之曰丁相公一字判王克敬汇浙行省都事往四明監倭人互市先是往監者懼夷情叵測必嚴兵自衛如待大敵克敬悉去之撫以恩意皆帖然無敢譁者貝降慶元路治中嵗大饑狀纍上行省不報貝降曰民饑如是而不賑之豈為民父母意耶即躬詣行省力請得發粟四萬石民賴全活何槐孫至元初慶元路推官申明科條雪寃禁暴首除奸惡吏民畏服郡人為立政績碑本朝王璡洪武間知寧波府亷介儉約杜私謁尤以學校為先務嘗毁淫祠民有信神靈恐罹殃咎璡曰如有靈宜祻於我毋汝纍後去任行李蕭然父老追贐堅却不受民至今稱之梅應魁洪武間為寧波府推官惟務寬恤不事苛刻鞫獄善察情僞民有邵觀奴驅其妻陸氏陸濳之母家母匿之誣觀奴打死久不決應魁鞫之繫其母少女來饋紿之曰姊何不出女遂漏言亟獲陸氏邦人服其明魏宗永樂間知寧波府政尚寬恕有幹濟才詢民情察利病而興革驗民丁稅以均其役揭示通衢猾胥莫售其奸由是訟牒遂息而公庭閴然胡敏宣德初知鄞縣操已端方臨事剛果盡革宿弊民無科擾尤以興學為念邑人慕之楊最正德初知寧波府甚有惠政省志人物周文種春秋時越大夫也吳王夫差敗越兵于夫椒越王勾踐使種行成于吳勾踐既歸國屬政於種及滅吳種謀居多後以范蠡遺書稱疾不朝或譖種將作亂王賜以屬鏤之劍遂伏劒死秦夏黃公鄞久避秦匿商山中蓋四皓之一也漢任奕句章人御史中丞朱育稱其為文章之士立言燦盛燁若春榮嘗著任子十卷董黯句章人董仲舒六世孫事母孝比鄰王寄之母以黯能孝諷寄寄忌之伺黯出辱其母黯恨之後母死斬寄首以祀母自陳于官和帝詔釋其罪且旌異行召拜郎中不就張齊方句章人父意為驃騎將軍齊方歷中書郎隱居靈山之下邑人賢之三國闞澤句章人家貧好學為人傭書所書既畢讀誦亦遍兼通歷數舉孝亷除錢唐長吳嘉禾中為中書舍人纍官至太子太傅每朝廷大議經典所疑輒咨訪之封都鄉侯唐張無擇句章人性篤孝父死七日絶漿三年不櫛廬墓有醴泉芝革之瑞官至中散大夫遷和州刺史賀知章四明人性夷曠善談說證聖初擢進士纍官禮部侍郎兼集賢學士晚節尤誕放遨遊里巷自號四明狂客及祕書外監天寶初請為道士還鄉里詔賜鏡湖剡川一曲卒年八十六孫邰奉化人博學髙才天祐間守左拾遺所作冇卜世論春秋論其後孫沔仕宋官至樞密副使五代黃晟鄞縣人時盜賊蜂起授晟為散騎常侍明州刺史討平鄰寇保護鄉井境內以安晟尤能禮士江東儒彥多依之築其居號曰措大營林鼎慈溪人夜讀書每達曙善屬文能書得歐虞法所聚圖書悉由手抄仕吳越自鎮海軍節度判官纍遷至丞相性讜正政事冇不逮者必亟言之所著有文集卒諡貞獻宋沈起鄞縣人進士髙第嘗監真州轉般倉因父疾棄官歸侍為有司所劾仁宗謂輔臣曰觀過知仁今以赴父疾而致罪何以厚風俗而勸為人子者耶釋之官至天章閣待制知桂州王致鄞縣人時與郡人楊適杜醇為友以道義化鄉里時稱三先生王安石謂四明之大夫士立言以垂世者自致始樓郁奉化人慶厯中詔立學舉郁為教授郡人翕然師之後登進士官大理評事楊適慈溪人年七十餘以行義聞仁宗嘗賜以粟帛遣官捧詔具袍笏以起之辭不受號大隱先生杜醇慈溪人經明行修不求聞逹慶厯中鄞始立學縣令王安石請為師逮卒安石作詩以哀之俞充鄞縣人嘉祐進士第熙寧中為都水丞沿汴淤泥溉田為上腴者八萬頃擢天章閣待制知慶州嘗欲面陳攻討西夏方略未及行而卒袁轂鄞縣人嘉祐中進士纍官至朝奉大夫轂博貫羣書所著有韻類百卷豐稷鄞縣人嘉祐中進士為穀城令以亷明稱嘗使髙麗海中大風舟幾覆衆惶擾稷神色自若元符中拜左諫議大夫御史中丞擢禮部尚書稷有至行議論正大卒諡清敏周師厚鄞縣人皇祐中進士仕至轉運判官不肯奉行新法二子鍔銖皆登進士知名當世樓异奉化人元豐進士為鴻臚卿直祕閣後改知本州墾廣德湖為田七百二十頃官至徽猷閣待制陳禾鄞縣人元符中進士纍官殿中侍御史遷左正言立朝有風操嘗奏對論童貫反覆不已徽宗欲起禾引帝衣願畢其說衣裾落帝曰正言碎朕衣矣禾言陛下不惜碎衣臣豈惜碎首以報陛下帝變色曰卿能如此朕復何憂卒諡文介陳之翰明州人殿中丞翊之子少有志操好學能文鄉人貸其金携以償之適在舟紿曰金墜於水中之翰不疑後數年其人自悔病且死遣其子來償之翰受之不拒徐以其償助其喪葬崇寧初衆論薦於朝官之王庭秀慈溪人政和中進士庭秀嘗與黃庭堅楊時游操尚堅正文辭宏逹歷官州縣纍遷殿中侍御史論罷黃潛善後為左司郎中林保鄞縣人政和初進士嘗知興國軍家居十餘年安貧著書司諫陳公輔薦其賢仕至戶部侍郎寶章閣待制楊慶鄞縣人父病貧不能召醫乃刲股肉啖之良已其後母病不能食慶取右乳焚之以灰和藥進焉入口遂差久之乳復生郡守樓异名其坊曰崇孝詔旌其門鄭覃鄞縣人靖康中貢於鄉建炎四年春全人陷朗川覃與兄章避難山谷俱被執既而見釋而金人相屬覃謂兄曰萬一不得脫覃豈事異國者未幾乂被劫去覃罵不屈躍入水中妻董哭曰夫亡矣與其受辱以生不如死亦自沉髙閌鄞縣人八嵗通經史大義弱冠登第髙宗召為國子司業諭之曰太學興復欲得學問淵深德行純正者為師表故以命卿官至禮部侍郎所著有春秋集傳髙文虎閌從子紹興中進士纍官中書舍人國子祭酒翰林學士丈虎聞見博洽多識典故嘗與修國史後除文華閣學士知建寧府趙敦臨奉化人紹興五年進士任為承議郎所著有三禮發微春秋正宗等書陳居仁鄞縣人紹興中進士歷仕州縣號稱循吏纍遷華文閣直學士有奏議制藁詩文子卓紹熙初進士歷知江州寧國府後為簽書樞密院事卒年八十六諡清敏樓鑰奉化人興隆初進士纍官中書舍人遷禮部尚書抗疏論韓托胄遂投劾去後召為參知政事卒贈少師諡宣獻鑰質直而和粹所薦多名士號攻愧主人有文集百餘卷袁升鄞縣人初為郡吏五旬無子其妻付資往臨安買妾既得妾察其有憂色且以麻束髮問之泣曰妾乃趙知府女也家四川且貧母鬻妾為歸葬費耳升即送還母泣曰財已破用升曰願相送復以索中資贈之而歸妻迎問曰妾安在遂告其故妻曰君設心如是不患無子明年生子韶後至顯官汪思溫鄞縣人政和初進士纍官至大府少卿鄉之士族冇喪不能舉孤女不能嫁者思溫割田給助為鄉里倡汪大猷思溫子紹興中進士為吏部侍郎兼權尚書是時法度數變更吏得以髙下大猷上疏論其事定其格式後為江西安撫使卒諡莊靖所著有適齊存藁偹忘訓鍳等書史浩鄞縣人紹興中進士纍官至丞相薦用人材不以私害公卒贈會稽郡王諡丈惠子彌逺淳熙中進士纍官至太師左丞相兼樞使卒諡忠獻封衛王舒璘奉化人從陸九淵遊與沈煥友乾道中進士嘗為徽州教授一以正人心講道學明經㫖自任丞相留正稱為教官第一後知平陽縣通判宜州卒諡文靖沈煥定海人居太學從陸九齡學乾道中進士嘗為太學録出倅舒州煥人品髙明嘗曰晝觀妻子夜卜夢寐兩者無愧始可言學後追贈直華文閣諡端憲楊王休象山人初拜業僧舍雪積其背而不自覺乾道中進士仕為黃巖尉鉏治奸豪人稱鐵面少府纍遷至禮部侍郎子燁官至工部尚書楊簡慈溪人師事陸九淵自為一家之學乾道中進士嘉定初授祕書郎出知溫州纍遷寶謨閣學士學者稱為慈湖先生所著有甲乙藁冠婚記易啓蔽等書史彌大浩子乾道中進士纍官禮部侍郎浩在相位彌大勸其引退浩主和彌大主攻守父子異議所著有朴語數篇袁韶升子淳熙中進士為左司郎中嘗接金使其人索歲幣語慢甚韶曰昔聞兩國誓約止輸幽州不聞在汴使者語塞後為浙西制置使卒贈太師越國公孫洪邵武路同知袁燮鄞縣人淳熙中進士纍官國子祭酒禮部侍郎學有師承文氣醇厚每言人心與天地一本精思以得之兢業以守之則與天地相似卒諡正獻三子肅甫商俱有學問知名于時樓昉鄞縣人紹熙中進士昉與弟昞俱以文名少從吕祖謙學號迂齊其文汪洋浩傳從學者凡數百人嘗集古今文名曰崇古文訣張虙慈溪人慶元初進士官至國子司業兼工部侍郎嘗上疏言立國冇大經人主當以靜制天下之動帝嘉納焉桂萬榮慈溪人慶元初進士歷興州郡所至有聲終直祕閣著棠隂比事行世趙善湘鄞縣人宗室也慶元初進士纍官資政殿大學士封天水郡公後為沿海制置使兼知慶元府卒贈少師所著有周易約說春秋三傳通議等書及詩詞共百餘卷蔣峴奉化人慶元中進士官至殿中侍御史嘗自誓曰勿欺心勿負主勿求田勿問舍號四勿居士鄭清之覃之孫少從樓昉學嘉泰中進士理宗潜邸教授凡四登相位端平間召用正人多淸之之力纍遷太傅保定軍節度使封齊國公致仕卒追封魏郡王諡忠定所著有安晚集六十卷宣繒鄞縣人嘉定中拜參知政事以觀文殿大學士致仕後以嘗預定策功追贈太師諡忠靖劉厚南慈溪人嘉定初進士為國子博士嘗應求言詔上疏略曰副求言之詔者當伸敢言之氣宏受言之規者當盡用言之實帝嘉納之史彌鞏彌大從弟好學强記嘉定中進士纍官提興江東刑獄歲大旱活饑民百餘萬後知婺州卒年八十真德秀嘗稱其㬭然不汚五子長肯之刑部郎官能之有之胄之俱進士肯之子䝉卿咸淳進士為學淹博著書立言以朱熹為法史嵩之浩孫嘉定間進士冇將才纍官右丞相兼樞密都督江淮京湖四州軍馬薦士三十有二人其後董槐吳潛嘗號賢相後授觀文殿大學士卒贈少師追封魯國公袁甫燮子嘉定中進士第一學於楊簡簡曰學以自得為貴由是慨然以斯道自任纍官國子祭酒吏部尚書卒諡正肅所著冇孝說孟子解及文集行世兄肅知臨安府弟商纍官至兵部尚書范楷鄞縣人嘉定初進士纍官至寶謨閣直學士在經筵知無不言應㒡昌國人嘉定中進士仕為翰林學士知制誥長於儷偶每制誥出人爭覩之一夕帝召㒡草麻夜四鼓五制皆就帝竒其才官至參知政事封臨海郡侯余天錫昌國人嘉定中進士理宗微時天錫識之於全保長家引以見史彌逺遂召入理宗即位纍官參知政事卒贈太師諡忠惠弟天任兵部尚書兄弟友愛貧時率更衣以出從子晦歷官尚書出帥全蜀陳塤鄞縣人嘉定中進士敏於為文頃刻數千言為人明白洞逹一言之出終身可復仕宋終國子司業子䝉年十八上萬言書論國事仕為淮東總領官趙逢龍鄞縣人刻苦自修為學淹貫嘉定末進士纍官至宗正少卿兼侍講揚歷日久泊然不知富貴之味或問何以裕後逢龍曰吾憂子孫學行不進不患其饑寒也家居講道四方從逰者皆為巨公名士在朝奏疏甚衆藁悉焚棄孫夢觀慈溪人寶慶初進士歷官至國子祭酒權吏部侍郎終知建寧府重名節特立不阿始終一致義所當為勇往直前其居敗屋數間布衣疏食而已王應麟鄞縣人九歲通六經學問該博為文敏捷淳祐初進士官至翰林學士禮部尚書所著有地理考困學紀聞玊海等書行世弟應鳯亦知名寶祐中中博學宏辭科黃震慈溪人寶祐中進士仕為史館檢閲以直言出判廣德軍為人清介自守獨崇朱氏學所著有日鈔百卷卒門人私諡曰文潔先生戴表元奉化縣人七嵗能屬文咸淳中進士為建寧教授表學博而才膽尤自祕重不妄許與以文章大家名重東南元大德間有以修撰博士二職論薦而老疾不不可起矣所著有剡源集袁鏞鄞縣人咸淳進士尚氣節元兵至鄞鏞往軍前責以大義遂遇害孫士元薦為翰林國史檢閲官不就所著有書林外藁元臧夢麟鄞縣人宋末第進士仕元纍官至廣東亷訪使嘗著座右四銘以自警其為人博學洽聞為時名儒而敏於政事操守尤為介特所著有周官考等書自號魯山袁桷韶曽孫仕至翰林侍講學士長於論史悉䆒前代典故人叩之舋亹不倦朝廷制冊多出其手所著有易春秋說及淸容居士集卒追封陳留郡公諡文清程端禮鄞縣人年十五能記誦六經晚析大義慶元自宋季皆尊尚陸氏學端禮獨從史䝉卿逰以傳朱子明體適用之指學者及門甚衆所著有文集及讀書日程仕為衢州路學教授程端學端禮弟通春秋至治中進士仕為國子助教動冇師法剛嚴方正學者嚴憚之遷太常博士所著冇春秋本義辨疑等書俞述祖象山人纍官翰林國史院編修出為沔陽府推官至正中蘄黃賊迫州境述祖以民兵捍禦兵力不攴城陷為賊所執械至其僞主徐夀輝所誘使降述祖罵不輟賊怒支解之事聞贈禮部郎中象山縣男本朝桂彥良慈溪人洪武初應薦召見命作香几贊特授太子正字錫賚有加召問治道彥良對以正心為本而正心之要又在懲忿窒欲上善之擢晉王府右傅一以正大之學輔𨗳既致仕條陳十二事名曰萬世太平治要策以進所著有和陶詩淸節等集鄭真慈溪人博極羣書在鄉里恂恂然不以才藝矜人嘗取諸家格言著為集傳集說集論洪武初試浙闡居首選授廣信府教授號榮陽外史傅淳慈溪人家世業儒父時偕以道學鳴于鄉淳能傳其家學鄉人稱為退密先生冇洪範敷言性理叢說大學補略視志藁藏於家鄭本忠鄞縣人自號安分生以明經舉為秦府教授本忠問學純正言行敦卓有安分集藏于家子復言雍言俱登進士第雍言官至太常少卿鍾朂慈溪人幼孤力學洪武初教授郡庠舉任廣東番禺知縣有惠政官至兵部侍郎子永亦以明經舉官至户部侍郎陶鑄鄞縣人少孤貧倜儻不羈洪武間授監察御史正直不避權貴劾奏刑部尚書開濟不臣升福建按察使綽有亷明聲後以劾奏布政使薛大方貪墨事偕召至京民為之詩曰陶使再來天有眼薛公不去地無皮已而果復任民皆喜躍陳逺鄞縣人自幼頴敏讀書過目成誦工書法冇晉人風度洪武間召寫御容賜豫金帛授文淵閣待詔卒年八十七為人意度閒雅鄉閭以為楷範焉張海慈溪人洪武末由太學生擢户部主事歷兵部員外郎郎中官至山東右布政使才能著稱于時金忠鄞縣人從靖難有功永樂中為兵部尚書兼詹事府事為人慷慨濶達負氣義每被顧問知無不言尤博於史學以疾卒袁珙鏞孫號栁莊為人剛毅直方不泛交人嘗遇異僧别古崖授以相術永樂初以潜邸之相有驗召拜太常寺丞賞賚殊厚賜歸子忠徹傳其術亦善相仕至尚寶司少卿陳敬宗慈溪人永樂初進士選為翰林庶吉士與修永樂大典擢刑部主事遷翰林侍講尋轉南京國子監司業進升祭酒師範嚴重威儀端整士林重之致仕卒張得中鄞縣人永樂初登進士第授刑部主事改江寧知縣以亷能稱與修永樂大典所著有江朴吟藁思牧齊集陸瑜鄞縣人宣德末進士授刑部主事歷員外郎郎中超升山東右布政使轉左尋以台臣薦超升刑部尚書瑜平恕寬厚明于法律屢辨寃獄成化中以疾致仕省志王來慈溪人由舉人授江西新建縣學教諭召為御史巡按蘇松歷官山西參政河南布政轉副都御史巡撫河南景泰初貴州苗賊作亂升來右都御史往平之進南京工志部尚書天順初致仕省楊守陳鄞縣人景泰初進士授翰林編修歷洗馬官五品十有六年泊然自處未嘗求進仕至吏部右侍郎卒贈尚書賜諡文懿弟守隨守址子茂仁皆舉進士有賢名省志楊子器慈溪人成化末進士先後知崑山常熟二縣亷介之操神明之政逺近想慕士民至今思之官至布政省志姚鏌慈溪人𢎞治初進士授禮部主事進員外郎升廣西僉事福建副使兩督學政各以五經分教人丈丕振纍官按察使左右布政使所至以政事聞遷副都御史巡撫延綏冇破敵功升工部右侍郎改兵部尋以事落職歸復起為本部尚書以老致仕子淶進士及第第一官翰休侍讀學士卒省志張邦竒鄞縣人𢎞治末進士改翰林庶吉士授檢討歷任湖廣提學副使南京國子祭酒端重典雅所至卓冇師範仕至南京兵部尚書卒所著有芝園集省志列女童八娜鄞縣通逺鄉人虎銜其大母女手拽虎尾祈以身代虎為釋其大母銜女以去宋時郡守林粟以聞於朝祠祀之范氏奉化人江文鑄妻年二十一歸於江及門末合卺夫忽以癎疾卒范曰我既入門即江氏婦也遂居江氏家撫諸姪如己子卒年九卜五金氏鄞縣人程徐妻父端學仕元為詳定使京城既破謂其女曰汝父出捍城我三品命婦汝儒家女又進士妻不可受辱抱二嵗子及女赴井死金良女鄞縣人名汝安父母多疾汝安侍飬惟謹及笄里中大家爭來聘汝安自謂父母老且病雖有兄弟驅馳門戶事朝夕乏飬奈何自是絶葷茹夜則焚香籲天祈親夀後父母俱八十餘而殁汝安居喪六年遂不嫁鄉人以孝稱前太史危素為之贊仙釋布袋和尚在奉化縣嶽林寺常皤腹以杖荷一布袋凡供身之具盡貯袋中隨處偃卧時號長汀子天將雨即著濕草履途中驟行遇亢陽即曵髙齒木屐竪膝而眠梁貞明三年於寺中東廊石上端坐而逝智覺名延夀周廣順三年居雪竇寺吳越錢氏崇信之著宗鏡一百卷陳忠肅公瓘贊其像曰宋之興也錢氏重民輕土捨别歸總用師之勸誨也宋耕號雪溪先生世家雙流遷崇慶宋紹興中為閬中令以仙去後其孫德之聞其在四明親往訪焉至雪竇山冇蜀僧言聞諸耆老云山後冇爛平山有二居士焉其一宋宣教也德之躋攀至爛平果見丹竈而仙蹤不可復尋矣乃置祠其上而歸元照錢唐人自幼出家博䆒羣宗初居天台移抗之東藏學徒爭從之復徙新城又愛餘姚之姜山因駐錫焉法行益髙凡禱雨輒應藥疫多效所撰冇資持記濟緣記行宗記應法記住法記報恩記及刪定尼戒本金剛疏之類尤工楷𨽻吟詠得風騷體一日聞空中笙簫聲遂歸寂焉明一統志卷四十六
