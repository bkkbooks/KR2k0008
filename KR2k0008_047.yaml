巖琬潜登白龍奧舍於民家絶糧不食人勸之食輒瞑目郤之七日而死本朝范明敬洪武初為台州知府有亷能聲海盜陳敬仲肆掠鄉邑一境騷動僚佐皆失措明敬曰毋恐吾當自行即至括蒼募民兵𠞰平之民賴以安王士𢎞洪武初寧海知縣有惠政時山路多虎人被傷士𢎞設陷穽以除其害嵗旱禱雨輒應如響邑人歌曰打虎得虎祈雨得雨豈弟君子民之父母王輝洪武中台州知府不携家獨父與俱𨽻僕給薪水之餘不留于舍為政亷明嚴毅吏畏其威民懷其惠至今論郡守之明者必以輝為首稱芮麟洪武間台州知府明於政體吏民信服嘗詿誤被逮父老泣送境外多遺之金一無所受吳仲勝洪武間台州府推官貌恭而言訒郡守高璞初甚易之旬日間淹獄悉理人皆服其明恕時僚佐競為奢靡仲勝獨以虀鹽自甘公退唯讀書璞每以君子稱之龎惟方洪武間臨海知縣為政平恕民有爭訟必從容以理諭之民自悅服時督造海船徭役咸有條理民不知擾江恕永樂初台州知府有惠政嘗建言水利及軍衛儲糧之弊民甚便之張誠永樂初以天台丞來知臨海縣事熟知民隱下車之初去奸剔蠧政平賦均吏不敢欺康彥民永樂初知天台縣罷官家居宣德初縣民乞復召為縣御史以聞上召用之志省謝恂宣德初知臨海縣一介不取于民民以事至庭諄諄戒諭一切興利去蠧雖沮以權力弗顧也省志顧璘𢎞治中歷台州府知府浙江左布政使為政持大體不屑小節勤學好書雖官冗不廢省志流寓庾肩吾新野人南齊庾信之父隱居天台故信作哀江南賦云少微真人天台逸民虞似良宋人寓居黃巖自號橫溪老樵有篆𨽻韵書行世王以寧太原人仕宋為京西南路制置使遷台州酒官欽宗御劄有云知卿忠義徇國俟邊事少寧當召卿赴闕不次擢用陳瓘南劔人上疏辨宣仁太后誣謗及著尊堯集坐謫台州且命凶人石悈知州事窘辱百端終不能害在台五年乃得自便卒贈左諌議大夫紹興中特諡忠肅石公弼新昌人為御史中丞以劾蔡京誤國謫居台州從弟公孫亦寓台不求聞達時論高之王之望襄陽人後寓居台州父鋼元符進士官至通判徽州之望紹興中進士有文藝幹略纍官參知政事兼同知樞密院事乾道中以資政大學士知溫州豐稷鄞縣人嘗為御史中丞首論蔡京之惡貶睦州别駕台州安置綦崇禮濰州人高宗時為翰林學士後退居台州卒崇禮為文氣格渾然天成端方亮直不憚强禦秦檜罷政崇禮草詞顯著其惡檜深憾之及再相矯詔下台州就崇禮家索其稿會崇禮沒乃止范宗尹襄陽人高宗時纍官尚書右僕射宗尹有才智當北敵肆行之衝毅然自任建議分鎮未幾出知溫州退居天台楊棟眉州青神人進士第一纍官至參知政事台州守王華甫建上蔡書院言于朝乞棟為山長詔從之因卜居臨海棟之學本諸周程時號平舟先生史䝉卿元明州人號果齊寓居臨海有文名志高行卓有靜清集及小學紺珠行世台哈布哈白鹿山人父塔布台為台州録事判官遂居于台哈布哈家貧好讀書年十七江浙鄉試第一中進士纍官禮部尚書後以台州路達嚕噶齊招捕方國珍遇害泰不華尚氣節不隨俗浮沉善篆𨽻嘗重類復古編考正訛字人物三國屈晃天台人吳志作汝南人仕吳為尚書僕射時孫權欲廢和立亮晃諌叩頭流血權不納斥還鄉里後皓即位封其子緒為東陽亭侯弟韓恭為立義都尉唐項斯臨海人擢進士第仕為丹徒尉為人清竒雅正尤工於詩故楊敬之有平生不解藏人善到處逢人說項斯之句宋郭琮黃巖人少喪父事母極孝絶飲酒茹葷者三十年以祈母夀母年百有四嵗耳目不衰鄉黨異之至道中詔旌表門閭母無疾而終琮哀號幾乎滅性杜誼黃巖人事親至孝敦厚尚信義有大志康定中繼喪二親晝夜號慟負土成墳廬於墓側時大水夜至民居廬墓田畜牧多漂沒而獨不及誼事聞詔嘉奬事族父衍甚謹誼嘗知永城縣甚有惠政後通判梓州楊蟠臨海人舉進士為密和二州推官通判揚州歐陽修稱其詩蘇軾知杭州蟠通判州事與軾倡和居多終知夀州卒所著詩文數千篇號章安集徐中行臨海人少從胡瓊學父死廬墓躬耕養母推其餘力葬親里貧無後者十餘喪晚年教授學者循循有序崇寧中州舉八行不就客有詰以要名者中行曰使吾得以八行應科彼不被舉者非人類歟吾正欲避此名非要名也羅適寧海人舉進士歷知五縣提㸃兩浙京西刑獄終朝散大夫有易說赤城集行世江仲眀台州人宣和冦亂載老母逃山澗中猝遇冦於東城之岡逼使就降仲眀義不辱奮起罵賊卒死之丞相吕頥浩嘗誄以文蔣煜仙居人有文學宣和中方臘起冦欲以女妻煜煜拒之脅以拜亦不從冦曰吾戮汝矣煜伸頸就刀詈聲不絶而死王卿月台州人敏悟多藝能自號醒菴居士官至朝請大夫嘗權中書舍人直學士院草胡銓制云吾寧身蹈東海獨仲連不肯帝秦至今名重泰山微相如何以彊趙時論多之陳公輔臨海人政和三年上舍及第調平江教授纍官至禮部侍郎端方之操始終不渝為諌官論事剴切疾惡如仇晚居田里著書自樂有文集二十卷奏議十二卷子夷行登進士第治行高潔陳騤臨海人紹興中試春官第一纍官將作少監厯知贑秀太平袁州光宗時為吏部侍郎兼侍讀應詔疏二十條皆切時病寧宗時知樞密院事兼參知政事後知婺州卒贈少傅諡文簡陳良翰公輔族子蚤孤事母孝資莊重為文恢博有氣紹興五年進士知瑞安縣有惠政纍官左司諌疏論湯思退奸邪張浚精忠出知建寧府後以敷文閣直學士奉祠良翰在朝論諌純正多見嘉納卒諡獻肅吳芾仙居人舉進士纍官侍御史有直聲遷禮部侍郎以龍圖閣直學士致仕芾前後守六郡各因其俗為寬猛吏莫容奸民懷惠利嘗曰視官物當如己物視公事當如私事與其得罪於百姓寧得罪于上官為文豪傑峻整有表奏五卷詩文三十卷謝深甫臨海人刻志為學乾道初登進士纍官端明殿學士簽書樞密院事後拜右丞相封魯國公深甫為相守法度惜名器能扶持朱熹蔡元定正學寧宗時以少傳致仕其後孫女為理宗后追封信王諡惠正商飛卿臨海人淳熙初舉進士纍官工部郎官時韓托胄氣焰薰灼飛卿未嘗一造請為監察御史以言事忤托胄罷後為司農卿以身率儉糧餉稍充開禧中擢户部侍郎弟逸卿官至朝請郎賈偉天台人嘗守開江貽書丞相趙雄極論武興守吳挺之橫他日陛對又乞裁抑郭隸郭杲兵權孝宗嘉納之後反為所擠以沒樓觀台州人舉進士與兄覺皆知名當時號二樓官至大理少卿王居安黃巖人幼有異質淳熙中舉進士為右司諌首論韓托胄竊弄威柄冝肆諸市朝以謝天下又疏言古今治本亂階更為倚伏遷起居郎兼崇政殿說書後以龍圖閣直學士知福州卒贈少保居安宅心空明待物不二所著有方巖集彭春年黃巖人博貫經史纍遷樞密院編修官後領教國子黜浮崇雅文風一變賈涉偉子幼好讀書慷慨有大志以父任高郵尉纍官淮東制置使綏撫逺近甚得人心後涉亡淮人思之有泣下者卒贈龍圖閣學士光祿大夫子似道董楷臨海人為積溪簿直寃獄賑饑饉修城捍水遷知洪州有惠政官至吏部郎中有克齊集程朱易行世杜範黃巖人從祖􅏎受學朱熹至範益著嘉定初進士調金壇尉纍遷監察御史知無不言後拜右丞相連上十二事盡革舊弊以身徇國卒贈少傅諡清獻所著有古律詩歌雜文奏橐外制經筵講義共三十餘卷葉夢鼎寧海人以上舍釋褐授信州推官歷知袁吉贑三州隆興建寧府皆有善政纍遷至兵部尚書簽書樞密院事封臨海郡公咸淳中拜少傅右丞相兼樞密使與賈似道不合引疾辭去戴亨臨海人教人以毋自欺為第一義嘗銘於座曰莫見乎隱莫顯乎微欲人不知莫若弗為自號蠢物有太極圖說人心道心說近思録補注杜滸範從子德祐初滸宰縣紏民兵勤王從文天祥于平江及天祥北行客無敢從者滸獨請行至京口以計脫天祥偕走淮甸由海道達永嘉益王立授廣東招討副使逮崖山兵潰被執以憂憤卒陳天瑞公輔之後師事金華王柏明性理之學志潔而行亷為金華令有能名宋末隱遁林壑詩文極高古效淵明書甲子文集五十卷楊明復臨海人操履純正博通經籍著述有周易㑹粹尚書暢㫖詩學發微冠昏喪祭圖號浦城先生林表民臨海人博物治聞嘗修赤城志及自為續志三卷車若水黃巖人與同郡周敬孫楊珏陳天瑞黃超然朱致中薛松年俱師事金華王柏講明性理若水博學工古文自號玉峯山民所著有宇宙略紀玉峯冗稿元趙與􅝾黃巖人宋宗室嘗登進士為鄂州教授元巴延渡江與􅝾詣軍門上書勸以不嗜殺人且乞全其宗黨巴延至京以與􅝾薦纍官至翰林學士卒追封天水郡侯諡文簡黃超然黃巖人師事王柏精於易學所著有周易通義自號夀雲卒諡康敏陳孚臨海人天材過人博學有氣節至元中以布衣獻大一統賦署上蔡書院山長纍官國史院編修官攝禮部郎中副梁曽使安南詰責安南世子日燇不庭之罪往復三書宣布天子威德辭正氣直名重當時後為台州路治中所著有文集子遘江浙行省員外郎周仁榮臨海人父敬孫宋太學生師事金華王柏受性理之㫖嘗著易象占尚書補遺春秋類例仁榮承其家學治易禮春秋而工為文章泰定初由處州美化書院山長召拜國子博士纍遷集賢待制弟仔肩延祐中進士纍官惠州路判官黃宏黃巖人博覽羣經尤長於詞賦有以史才薦者不就落魄江湖幾三十年文章流播四方有穀城藳孟夢恂黃巖人師事楊珏陳天瑞夢恂講解經㫖體認精切以薦署台州學録至正中設䇿禦冦救鄉郡以功授冝興州判官未受命而卒賜號曰康靖所著有性理本㫖四書辨疑漢唐㑹要七政疑解及筆海雜録翁森仙居人隱居教授從逰者前後八百餘人著述有一瓢稿舒嶽祥天台人以文學師表一代奉化戴表元從而受業大德間表元為東南大家者其學得於嶽祥為多周潤祖臨海人與達兼善為友精性理之學為一時折推重至正中被召以老謝歸有紫巖稿十餘卷本朝楊大中臨海人博學洽聞仕元為祕書著作郎致仕家居洪武中遣行人齎楮幣聘之留文淵閣數月以老瞶歸所著赤城志及隨手録三十卷戚存心黃巖人洪武中登進士第擢行人以才行見稱升陜西布政司參政未幾召為禮部侍郎賀銀黃巖人洪武中領鄉薦纍官宛平知縣有能聲厯升通政司右參議奏對詳明進工部右侍郎尋以事左遷本部主事復升通政使盧信黃巖人洪武末由鄉薦歷官句容縣丞轉刑部主事恪勤不怠纍遷員外郎中官至山東布政司左參議鄭恕仙居人由訓導升蕭縣知縣靖難師至力拒焉被擒而死其二女亦死之省志方孝儒寧海人少從宋濓逰濓深器之洪武中被召授漢中教授後為翰林博士尋進侍講革除之際不屈而死省志王叔英黃巖人洪武中辟訓導升知縣革除間召為翰林修撰與修高廟實録靖難師起奉命募兵廣德知事不可為乃沐浴衣冠書絶命辭自經而死所著有靜學齊稿省志鄭華臨海人洪武末由貢士任行人謫東平州通判將赴任聞靖難師起馳至東平力疾戰死省志葉惠仲臨海人洪武末擢知縣尋充史官革除間升知府永樂元年死之省志東湖樵夫未詳何郡人亦遺姓名壬午七月樵夫鬻薪臨海東湖上見里巷傳相語曰新即位詔至矣樵夫瞪視久之舍擔奮擲于水而死省志趙季通天台人由教官知永豐龍溪二縣寬厚愛民與修洪武實録纍擢博士司業與司業董子莊同被選為趙府左右長史二人皆端平有操守隨事規益每侍講讀多所開悟當時論親藩輔導之良以二人為極選云徐善述天台人由教官纍擢春坊司直贊善為人素有學識耿介恬靜不為阿附因事啓沃每見聼納卒贈太子少保賜諡文肅立祠墓側以春秋祭之李茂𢎞黃巖人永樂中進士擢刑部主事尋升吏部考功司貟外郎在任亷慎安詳僚友咸推重之善吟詩志尚淡薄不慕榮進方六十餘即乞致仕優遊十載而卒魯穆天台人永樂間進士纍官都察院右僉都御史為人剛正清慎內恕外嚴介然有守執法不回揚歷中外三十餘年被服一如寒士所著有葩經或問禮記日抄藏于家王一寧仙居人永樂中進士擢工部主事以文學優長與修實録轉翰林侍講未幾進升禮部侍郎兼翰林學士卒於官林鶚太平人景泰初進士授御史歷知鎮江蘇州府江西按察使纍升刑部侍郎卒家無儲積産唯舊業而已士人賢之省志黃孔昭太平人年十四遭父職方主事彥俊母金氏相繼歿于京師扶喪歸選葬哀毁骨立既長日唯讀書舉天順初進士歷官文郎中執持選法最慎仕至南京工部右侍郎雖老且貴如未仕時所著有定軒集省志陳選臨海人父負韜由進士仕終福建布政選服父教澄天順初進士權御史巡按江西尋督學南畿纍升河南按察副使恣掊學政進按察使轉廣東布政時市航中官韋眷縱權上克選上疏劾之眷乃誣托他事逮選赴京卒于道𢎞治初詔復官禮葬正德中追贈光祿卿諡恭愍省志謝鐸太平人天順末進士選庶吉士授翰林編修嘗奉詔校勘通鑑綱目升南國子祭酒轉北國子尋升禮部右侍郎自憂制後遂無意仕進居嘗蔬食飲水泊如也卒贈尚書諡文肅省志龎泮天台人成化中進士歷刑科給事中時武岡知州劉遜以事忤岷王王訐奏之逮繫錦衣獄泮率同列論救并下獄直聲大著以徐溥救免仕至廣西布政以疾歸省志夏鍭天台人成化末進士授南大理評事時翰林庶吉士鄒智兵部主事李文祥以言事逺謫鍭上書論救不報遂謝病歸省志王爌黃巖人𢎞治末進士為給事中以論劾忤時謫倅惠州歷升應天府尹甚有惠政仕至南京都察院右都御史省志列女杜氏二貞女臨海仙居人隋大業末二女家鬻湯餅甫笄喪父母庖人挑之二女憤激殺庖人去之盂溪𨼆焉㑹溪溢俱死陳節婦宋臨海人貢士朱伯履妻年少夫亡有欲奪其志者陳氏拊膺慟絶既蘇歎曰吾寧速死忍聞此言引刀欲自剄姑亟奪之乃免事父母舅姑至孝詔封安人旌其門王貞婦夫家臨海人宋德祐初元兵入浙東舅姑與夫被執皆死主將見婦質美欲內之婦欲自殺而防守甚嚴師還挈至嵊縣青風嶺婦待守者少懈囓指出血書字山石上南望慟哭投崖而死後其血皆漬入石間天且隂雨即墳起如始書時元至正中旌曰貞婦陶宗媛元台州人儒士杜思絅妻歸杜四載而夫亡矢志守節台州被兵宗媛忍死護姑柩為遊軍所執迫脅之宗媛曰吾若畏死豈留此耶任汝殺我遂遇害其妹宗婉弟妻王淑皆赴水死徐氏元天台人狄恆妻恆早歿徐年十八守節不再醮至正末避亂牛囤山為賊所執驅迫以前徐紿之曰吾渴甚欲求水一杯賊令自汲即投井而死季氏名添寧海人歸同邑許瑜瑜為盜所害季抱幼兒從舅氏董仲載走慈溪仲載欲再嫁之季泣訴欲歸自盡仲載不敢復言後盜敗季歸治田廬資其孤從學為名士年七十卒宋濓作傳志省陳氏名真黃巖程有德之妻洪武間以軍坐纍至京鎮撫陸林見其美欲汚之不從百方脅之陳愈嚴厲遂被毆而死其夫訴於朝林枅罪誅省志盧津奴黃巖趙叔民妻洪武中叔民被誣以黨卒于京明年籍其家盧聞官軍至邑遂題詩壁上飲藥而絶省志張璩奴黃巖人適徐宗谷宗谷為仇人所害張負姑匿巖穴中間道逹姻家既而遺娠生女幸妾生男張撫之若巳出明年仇以姑訴受顯戮張始還家招夫魂而葬之誓死不二年五十四卒省志林汝殷妻王氏黃巖人年二十歸林未幾汝殷卒里人欲娶之王斷髮以死自誓其父母防之且勸之力王徉許焉既而防者稍懈乃隂囑侍女分其嫁時服一歸其母一豫其妹一以為殯殮之具遂自經而死省志陳氏名小奴臨海人適王三狗一日其夫為虎所攖即攘奮悲號而往虎驚駭舍之而去負以還而夫死矣未幾有欲納為妾者陳不從乃強致聘娶之物促迫以歸陳度不免亟走姜巖自投而死省志真奴黃巖符松妾地松既死其妻鐘氏歸母家欲有他志真奴泣諌鐘怒捶之必逼以去真奴潜歸慟哭遂縊于松柩上省志丘鏘妻謝氏台州人鏘卒謝年二十二止一女其母欲改嫁之謝以死誓諸妯娌母敢有勸之者家特貧惟紡績以自給考功李茂𢎞高其節行求其女為子謨婦省志仙釋劉晨阮肇漢永平中二人入山採藥失故道行數里至溪滸二女迎歸食以胡麻飯後求去指示元路至家子孫巳七世矣天台縣西北三十里有劉阮廟茅盈茅濛傳云神仙得者茅初成駕龍上并入太清時下𤣥州戲赤城繼世而往在我盈濛字初成盈之高祖言盈自華陽洞天徙治赤城司馬承禎隱居桐柏山構層軒於壇上號白雲子唐則天時屢召不起睿宗廷問治身治國之術答以為道日損與物自然之言睿宗嘉歎欲加寵位固辭而歸先期告終忽若蟬蛻弟子斂空衣葬之王逺知台州人善易知人死生禍福作易總十五卷世祕其本一日曝其書忽卧內雷殷殷然赤電造室一老人下叱逺知怒曰所泄者書何在上帝令吾追取逺知曰青丘老人以臣不逮故傳授焉老人頥領頃曰上帝敕下汝仙品已及子夀度期二十四年逺知拜命所取將書乃易總耳杜光庭天台人號東瀛子為時巨儒唐懿宗時與鄭雲叟賦萬言不中遂入道從僖宗入蜀隱青城山有文集百卷張用成宋台州人嘗入城都遇劉海蟾得金丹術歸以所得著成祕訣八十一首號悟貞篇授扶風馬默曰平生所學盡在是矣元豐中年九十九趺坐而化有尸解頌智顗姓陳氏潁川人居天台佛壠山隋賜號智者大師嘗著止觀十卷緇流至今宗為天台教云寒山隱天台始豐縣西寒巗幽窟中時來國清寺人以為風狂之士或呌噪凌人或望空漫罵寺僧不耐以杖遂之翻身撫掌大笑太守閭丘訪問見而拜之寺僧驚曰大官何禮風狂夫耶閭丘復詣寒巖送衣物即縮入石穴縫泯無跡後僧道翹抄録人家壁上所題頌偈得二百餘首編成一集拾得初豐于禪師見赤城道側兒啼乃携至國清寺後稍長令知食堂即對像盤餐復令滌器即斷竹為筒投殘食於內寒山來必負去又護伽藍廟為烏鳥取其供拾得以杖擊神首罵曰汝食不能護安護伽藍乎是夕闔寺僧夢神曰拾得打我一日驅牛曰此知僧事者即呼亡僧牛各應之衆皆愕然偈詞附於寒山集中宗泐姓周氏臨海人元末從欣笑隱學佛凡經書過目輒成誦寓情詞章尤精𨽻古本朝常命往西域取佛經還授僧録右善世有奉詔注心經金剛楞伽三經及所著全室集行世妙淨臨海人性聰慧十五出家聞了堂和尚居四明大興宗教即往參之得其奧㫖時左菴為浙東叢林第一延妙淨主之衆皆敬服洪武初退休巾峯尋移雲峯見山水幽勝曰此可居矣足不至城市者三十六年法門大振年八十餘端坐而逝所著有方便録百忍圖文謙福州人幼穎悟絶人好誦佛書十一出家逰吳楚歷金陵諸山住台之鴻福寺振揚宗教洪武初召至京師言論稱大㫖居久之忽謂其徒曰吾將去矣援筆書偈云有世可辭是衆生見無世可辭是如來見踏倒須彌廬空虛無背面遂端坐而化明一統志卷四十七
