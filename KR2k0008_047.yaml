body:
  text: 明一統志巻四十七明李賢等撰台州府東至海岸一百八十里西至處州府縉雲縣界二百一十九里南至温州府樂清縣界二百三十九里北至紹興府新昌縣界一百四十五里自府治至南京一千八百三十三里至京師五千七百七十八里糧一十二萬五千八百石零建置沿革禹貢揚州之域天文牛女分野春秋戰國時為越地秦屬閩中郡漢初屬東甌國後東甌内徙以其地置回浦縣屬㑹稽郡南部都尉治此東漢改回浦曰章安三國吳以㑹稽東部為臨海郡治臨海縣徙治章安梁改赤城郡尋廢陳置章安郡隋罷唐置海州尋改台州因天台山為名天寳初改臨海郡乾元初復為台州至德初移治始豐陞徳化軍宋仍為台州屬浙東路元改為台州路本朝改為台州府領縣六臨海縣附郭本漢回浦縣地屬㑹稽郡東漢為章安縣地吳置臨海縣屬臨海郡隋屬永嘉郡唐於此置海州改台州宋元仍舊本朝因之編户一百四十九里黄巖縣在府城東南六十里本東漢章安縣地永和中置永寜縣吳屬臨海郡隋改永寜曰永嘉又分其地入臨海縣屬永嘉郡唐復析置永寜縣屬台州天授初改黄巖縣以山為名宋因之元陞黄巖州本朝仍改為縣編户七十九里天台縣在府城北九十里本東漢章安縣地吳析置南始平縣晉改為始豐縣屬臨海郡陳徙郡治此隋罷郡以縣省入臨海縣屬永嘉郡唐復置更名唐興縣屬台州五代梁時改天台縣晉時改曰台興宋復為天台元仍舊本朝因之編户三十六里仙居縣在府城西九十里本晉始豐縣地永和中析置樂安縣屬臨海郡宋以後皆因之隋省入臨海縣唐復置屬台州五代時錢氏奏改永安縣宋改仙居縣元仍舊本朝因之編户七十八里寜海縣在府城東北一百八十里本漢㑹稽郡回浦鄞二縣地晉析置寜海縣屬臨海郡隋省入臨海縣唐初復置尋省入章安永昌初復置屬台州宋元仍舊本朝因之編户一百四十里太平縣在府治東南一百四十里本黄巖縣地成化五年割南三郷建為縣十二年又析樂清下山六都以益之治百千山南編户六十六里郡名赤城梁名章安陳名天台唐因山名州形勝雙闕雲竦瓊臺中天晉孫綽天台山賦雙闕雲竦以夾路瓊臺中天而垂居窮山海之瓌富盡人神之壯䴡同上川澤沃衍有海陸之饒圖經藐彼天台嵯峨崔嵬下臨滄海遥望蓬萊唐崔尚桐栢山碑風俗其人樸靜其俗儉約宋吳子良臨海縣學記閭閻興禮遜宋陳襄詩閭閻興禮遜囹圄長榛蕪山川大固山在府城内西北蜿蜒磅礴如屏障之狀舊經晉孫㤙作亂刺史辛景休於此掘塹守之恩不能犯因以名山宋紹興間道士費徳風劚地得晉㫁碑有龍顧山字故又名龍顧山小固山在府城内東南與大固山相望亦以辛景休禦冦得名巾子山在府城東南連小固山兩峯如帢幘其頂雙塔塔之南有翠㣲閣北有廣軒下瞰城郭郊藪山水之勝又有曲肱齋蹙雲軒息菴乆廢唐任翻詩絶頂新秋生夜凉鶴飜松露滴衣裳前村月照半江水僧在翠㣲開竹房日山在府城西五里以其面東朝日視諸山獨高故名靖江山在府城東七里舊傳辛景休破孫恩於此白鶴山在府城東二十里寰宇記上有深湖中有盤山石前有石鼓昔有白鶴飛入㑹稽雷門鼓中擊之聲聞洛陽又郡國志漢末有徐公於此成道控鶴騰空而去清潭山在府城西二十五里曹太尉莊畔舊有坡廣十餘里宋洪邁夷堅志淳熈間大水推一山納陂中山之大小正與陂等林木宛然盖竹山在府城南三十里一名竹葉山有洞名長耀寳光之天洞淵集以為第十九洞天抱朴子言此山可合神丹漢末有陳仲林軰四人得道于此上有香爐天門二峯最為逰覧之勝石塘山在府城西三十里上有石峽飛瀑注塘中木底有石柱日朗即現俗呼龍盤石真隱山在府城西南四十里高一萬六千丈周迴三百里與仙居韋羌山接本名括蒼王方平居崑崙徃來羅淨括蒼山即此唐天寳中改今名東掖山在府城東北四十五里以其䖏天台左掖故名上舊有隔塵寺許孝山在府城北四十五里舊傳山下有許姓者居喪至孝每號慟則羣鳥悲鳴故以名山常風山在府城西五十里山有石穴常出風宜山在府城西六十里其顛平衍良疇可十頃有潭瀑沾溉旱不能災白鵠山在府城西北六十里有水傾注如倒掛白鵠臨海記云中有深湖有魚大如舟盖龍也燈壇山在府城西六十里山有石壇每隂雨望之其上有光如燈石新婦山在府城東南七十里山旁有竒石如婦人狀宋文帝嘗遣畫工模冩山狀時人盛圖於白團扇九盤山在府城東南七十五里以其路縈回九轉故名絶頂可眺大海東刋山在府城東九十里盖以禹隨山刋木而名山極高逺又名天柱亭山在府城南一百里由郡泛舟入黄岩者多候潮於此石鼓山在府城東一百五里上有石似鼓兵興則鳴玊峴山在府城東一百九里舊名黄石唐天寳中改今名山洩水九層沿崖注落如白練東南有鍾乳穴有伏翼如鵝大金鰲山在府城東南一百二十里東有小洞昔有人夜㬢舟山下見波間光彩近視之乃一金色巨鰲因名宋建炎四年金人入冦高宗航海嘗泊此山留四十日始還紹興海門山在府城東南一百二十六里相對如闕在海北岸東枕海赤山在府城東南一百三十里絶頂有古塔塔之下有石函盛小銅塔内有銀囊盛舍利俗傳梁蕭詧所施合旗山在府城東一百三十里舊傳僧灌頂居此㑹有海冦至灌頂講經自若冦見旌旗耀日有神皆丈餘惧而遁因以名山高相山在府城東北一百三十五里有穴無際或云與海通崛門山在府城東一百五十里海中山腹有一孔上達於頂有聲則風起水湧且有兵吳将亡孔内有聲逺聞十里東麂山在府城東一百五十七里又有西麂山與此相近龍符山在府城東一百七十里吳越春秋夏王登此得龍符又名覆釡山上有巨人足蹟相傳夸父遂日所踐者大雄山在府城東二百里海中芙蓉山在府城東二百里出海口望之竦若紅蓮始開唐天寳六年改名秀麗臨溪山在府城北二百四十里有二水合成溪名臨溪山因溪名白山在府城東南二百五十里望之如雪其上有湖舊傳金鵝於此集焉下有溪其水金色高麗頭山在府城東南二百八十里自此山下分路入高麗國其峯突立宛如人首故名委羽山在黄巖縣南一十里山東北有洞世傳仙人劉奉林於此控鶴輕舉鶴嘗墜翮故名道書以此山為第二洞天號大有空明之天地産石無小大百碎皆方正宋范宗尹詩當年孤鶴知何䖏遥想天風墜羽翰永寜山在黄巖縣東五里因古縣而名一名方山大仁山在黄巖縣東一十五里山顛有二池水澄徹大旱不涸上有大仁寺三童山在黄巖縣西南一十七里上有三峯各高数丈狀如童子岱石山在黄巖縣西一十七里傍有巨石如人形俗呼為石大人山鷄籠山在黄巖縣南二十五里世傳每星月晦冥有光燭天人以為怪不敢居一日晶彩畫見或視之金玊滿山徃取輒㓕一名許公藏鳴山在黄巖縣西二十里旁有龍湫每遇旱致禱必聞飄風驟雨之聲又有龍鳴山在縣南一百二十里亦有龍湫盤山在黄巖縣西南四十里宋王十朋詩一嶺迢迢十里賖行人半日踏煙霞青山遮莫盤千匝歸夢何曾不到家丹崖山在黄巖縣西四十五里崖石俱赤有金銀星世傳仙人煉丹於此有池深可尺餘名煉丹井靈石山在黄巖縣西四十五里山有寺晉孫恩叛時毀其材木為船舸石忽從空中自落賊有所傷故名瑞巖山在黄巖縣西北四十五里昔有僧師彦入山坐盤石上自言主人翁惺惺着後遂名惺惺石宋楊傑詩巖谷連天嶺杉松徹象山路從雲外入人自海邊還石壁山在黄巖縣南八十里上有石壁揷水中宋虞仲房刻詩于石野草閒花洞口春碧潭如鑑浄無塵江山好景移不得漾入酒樽和月吞黄巖山在黄巖縣西一百二十里山頂有黄石一名仙石山俗傳仙人王方平居此上有王公客堂東鎮山在黄巖縣東二百四十里山産海藻甲香等物塵山在黄巖縣西三百里山多塵壒故名赤城山在天台縣北六里土皆赤色狀似雲霞望之如雉堞然故名晉孫綽賦赤城霞起以建標即此東横山在天台縣東一十里唐許渾宿東横瀬詩孤舟路漸賖時見碧桃花溪雨灘聲急巖風樹勢斜九峰山在天台縣西北山有九峰昔王羲之與支遁嘗㳺覧焉鳯凰山在天台縣東一十一里晉孫綽賦覿翔鸞之裔裔聴鳴鳯之嗈嗈桐栢山在天台縣西北二十五里唐周朴詩東南一境清心目有此千峯挿翠㣲人在下方衝月上鶴從高䖏破煙飛瓊臺山在天台縣西北三十里又有雙闕山兩峯萬仭屹然相向孫綽賦雙闕雲聳而夾道瓊臺中天而懸居即此唐方干詩積翠千層一徑開白雲行盡見瓊臺瀑布山在天台縣西四十里一名紫凝天有瀑布水陸羽記天下第十七水盖與福聖國清二瀑為三其山産大葉茶蒼山在天台縣東四十里接寜海縣界其山凌暎桐栢以其蒼蒼接漢故名石橋山在天台縣北五十里傍有方廣寺有小石橋架兩崖間其下有澗合流於橋下橋勢峭峻過者目眩心悸晉孫綽賦跨穹窿之懸崖臨萬丈之絶溟即此宋趙湘詩白石峯猶在橋横一徑㣲多年無客過落日有雲歸寒石山在天台縣西北七十里一名寒巖上有仙人㓊唐寒山子居之有詩云登陟寒山道寒山路不窮谿長石磊磊澗闊草濛濛苔滑非關雨松鳴不假風誰能超世累共坐白雲中天柱山在天台縣西九十里南有黄水峯天台山在天台縣西一百一十里道書是山上應台星超然秀出有八重視之如一㠶高一萬八千丈周迴八百里山去天不逺路由福溪水險而清前有石橋廣不盈尺長数十丈下臨絶澗惟忘其身然後能濟濟者梯岩壁援藤葛始得平路見天台山蔚然竒秀雙列於青霄上有瓊楼玊闕天堂碧林醴泉仙物畢具也大盆山在天台縣西一百八十里西接東陽南界遥望形如覆盆乃婺江之發源也福應山在仙居縣東二里宋皇祐間縣令陳襄名之隂陽家謂其邑治得龍首之勝居人建浮圖於上自是取青紫代不乏人安洲山在仙居縣東南五里舊名管山又名九旬山上有潭唐武徳中僧灌頂講經于此漁者甚衆灌頂勸止之忽一夜風雨旦視之則為洲矣故更今名紫籜山在仙居縣北三十里舊名竹山唐明皇夢一人紫服自稱竹山神來獻瑞鳯翌日果有鳯翔遂改今名上有棲鳯亭乆廢韋羗山在仙居縣西四十里絶險不可升盖衆山之最高者上有石壁刋字如斜斗宋陳襄詩云去年曾覧韋羗圖云有仙人古篆書千尺石巖無路到不知科斗是何如水簾山在仙居縣西南四十里山有瀑若簾垂四時不竭昔人畱題有今古長垂地晨昏不上鈎之句萬竹山在仙居縣西南四十五里絶頂曰新羅九峯回環叢薄敷秀宋薛昂避冦于此嘗有詩萬竹山中数十家重重流水遶桑麻飽餐鼓腹成何事桃李春風任自華運羗山在仙居縣西六十里亦名天姥山卧龍山在寜海縣治東南一名應家山山勢蜿蜒如龍偃卧白嶠山在寜海縣東五里晉武帝初置寜海縣於此石臺山在寜海縣東六里上有数石屹立如臺雷山在寜海縣西三十里葛𤣥煉丹䖏其山有三十六峯柯僊山在寜海縣西四十里此地産牡丹特盛天門山在寜海縣北六十里漢地理志鄞縣之南寜海之北天門山水入于海盖此山從嵊剡發足繚繞三百餘里盖倉山在寜海縣東北九十里瀕大海一名茶巖上有石刻真逸二字相傳陶𢎞景嘗居此王城山在太平縣西北一十三里又名方城山上有漁翁巖石柱峯仙人濯足灘鷄母石棋盤牛脊隴水簾谷皆其勝䖏金山在太平縣北十二里上銳下闊宛若金字宋侍郎王居安築室面之號金山堂屏山在太平縣東五里上有東西二石聳立如屏屏有古藤纒