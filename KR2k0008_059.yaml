body:
  text: 明一統志卷五十九明李賢等撰湖廣布政司湖廣古荆州地漢置荆州部刺史領南郡江夏長沙武陵桂陽零陵等郡國而不常所治東漢荆州初治漢夀後治江陵唐貞觀中領以山南道開元間增置十五道採訪處置使而山南東道治襄陽以諸郡𨽻之兼分入黔中淮南及江南西道後改採訪為觀察其治仍舊永泰間始置鄂嶽觀察使于鄂州宋置荆湖南北二路及京西南路安撫司以潭州江陵襄陽守臣兼領又於襄陽衡州澧州各置提點刑獄司元置湖廣等處行中書省及江南湖北道肅政亷訪司于武昌又置荆湖北道宣慰司及山南江北道肅政亷訪司于江陵置湖南道宣慰司及嶺北湖南道肅政廉訪司于潭州本朝置湖廣等處承宣布政使司領武昌黃州荆州常德永州寶慶辰州長沙衡州承天襄陽鄖陽嶽州漢陽德安一十五府郴靖二州置湖廣都指揮使司領武昌武昌左靖州長沙常德永州永定衡州嶽州辰州平溪清浪九溪鎮逺偏橋寧逺沅州五開黃州蘄州銅鼓施州寶慶茶陵二十四衛大庸澧州寧逺江華錦田枇杷桃川天柱八千户所成化中置行都指揮使司領鄖陽襄陽荆州荆州右瞿塘五衛均州竹山房縣枝江夷陵逺安常寧忠州八千户所嘉靖初置興都留守司領顯陵承天沔陽三衛德安隨州二所置湖廣等處提刑按察司分武昌湖南湖北荆南四道監察諸府州衛所三司並建治于武昌府而行都司則分治鄖陽以控制邊境云武昌府東至江西九江府瑞昌縣界五百二十里西至漢陽府漢陽縣界五里南至嶽州府臨湘縣界四百里北至黃州府黃岡縣界七十二里自府治至南京一千七百一十五里至京師五千一百七十里糧一十六萬三百石零建置沿革禹貢荆州之域天文翼軫分野自周夷王時地屬楚楚熊渠封其子紅為鄂王始名鄂春秋時謂之夏汭秦屬南郡漢置江夏郡治沙羡三國時吳分江夏更置武昌郡治武昌縣徙都焉晉以武昌𨽻江州江夏𨽻荆州劉宋於江夏縣置江夏郡兼置郢州梁分置北新州隋平陳改置鄂州大業初為江夏郡唐復為鄂州天寶初改江夏郡乾元初復為鄂州屬江南道元和初升武昌軍節度五代時唐遙改武清軍南唐復為武昌軍宋以鄂州屬荆湖北路元至元中置鄂州路大德中改武昌路本朝甲辰年改武昌府領州一縣九江夏縣附郭本漢沙羡縣地屬江夏郡三國吳屬武昌郡後省晉太康中置沙羡縣大元初改為汝南縣復屬江夏郡隋初廢郡改縣曰江夏唐宋元俱仍舊本朝因之編户六十三里武昌縣在府城東北一百八十里春秋時楚封鄂王於此秦為鄂縣屬南郡漢屬江夏郡吳始改武昌縣晉别立鄂縣並𨽻武昌郡隋省鄂縣入武昌唐因之屬鄂州宋升為武昌軍後又更名夀昌軍元改武昌縣本朝因之編户三十九里嘉魚縣在府城東南二百八十里本漢江夏郡沙羡縣地晉分置沙陽縣梁於沙陽置沙州尋廢隋以沙陽併入蒲圻縣後於其地置鮎瀆鎮南唐改鎮為場保大中始升為嘉魚縣其地有魚嶽山取詩南有嘉魚之義為名宋元仍舊本朝因之編户一十二里蒲圻縣在府城東南三百里本漢沙羡縣地孫吳時分武昌為兩部自武昌至蒲圻為右郢始置蒲圻縣以湖畔多蒲故名晉屬長沙郡劉宋屬江夏郡梁屬上雋郡隋屬鄂州唐宋元俱仍舊本朝因之編户三十里咸寧縣在府城東南四百二十里本隋江夏縣南境唐大厯初置永安鎮五代時楊吳改為場南唐升為永安縣𨽻鄂州宋改曰咸寧元仍舊本朝因之編户一十六里崇陽縣在府城南四百二十五里本漢長沙下雋縣地梁置上雋郡陳又置雋州隋廢以其地入蒲圻唐置唐年縣五代時楊吳始改為崇陽縣南唐復曰唐年宋復為崇陽縣元仍舊本朝因之編户一十六里通城縣在府城西南五百里本漢下雋縣地唐屬唐年縣元和中置通城鎮宋熙寧中始升為縣紹興中仍為鎮尋復為縣元仍舊本朝因之編户一十五里興國州在府城東南三百八十里春秋時屬楚秦屬南郡漢屬江夏郡三國吳析置陽新縣隋改冨川縣又改永興縣唐屬鄂州宋置永興軍尋改為興國軍元升為興國路本朝初改興國府洪武九年降為州省永興縣入焉編户四十六里領縣二大冶縣在州城西北一百五十里本隋武昌縣地唐置大冶青山場院南唐始升為大冶縣屬鄂州宋屬興國軍元仍舊本朝因之編户三十九里通山縣在州城西一百八十里本隋永興縣地屬鄂州唐因之五代時楊吳屬羊山鎮南唐始置通山縣宋屬興國軍元仍舊本朝因之編户六里郡名鄂渚輿地記雲夢之南號鄂渚江夏漢名武昌吳名形勝江漢為池吳趙咨使魏對魏主曰吳帶甲百萬江漢為池扼束江湖襟𢃄吳楚記室新書郊署之內奧都邑之綱紀晉左思吳都賦地居形要控接湘川邊帶漢沔齊志通接雍梁實為津要劉宋何尚之議曰夏口在荆江之中通接雍梁實為津要地接峴荆江吞雲夢喬大觀南樓賦黃鶴磯邊江峻山險南齊志夏口城據黃鶴磯邊江峻山險樓櫓髙危當荆吳江漢之衝要唐趙憬鄂州新􅈦記南抵五嶺北連襄漢宋志襟山帶江江南要區元巴延鄂城議墉山而城塹江而池元元明善武昌路學記山川包絡形氣涵蓄元虞集大冶縣學記東連江池西控荆楚興國州志風俗啙窳偷生而無積聚漢書地理志火耕水耨民食魚稻以漁獵山伐為業果窳螺蛤良物常足故啙窳偷生而無積聚飲食還給不憂凍餓人多徑悍決烈隋志土沃民剽雜以夷俗唐崔郾云田里小民務農力本圖册五方雜寓家自為俗同上自往昔軍興土民頗鮮存者而西北避地者萃焉東南趨利者輳焉五方雜寓家自為俗囹圄晝閉桁楊不施興國州紫芝妙香寮記以文辭相髙宋栁拱辰郡守題名記六縣士子以文辭相髙有六朝舊體計利尚鬼宋劉清之傳鄂俗計利而尚鬼家貧子壯則出贅習為當然病者不藥而聽於巫死則不葬而畀諸火日趨禮樂元明善武昌路學記武弛文張民日趨于禮樂之域而不知為之者俗尚質朴不事浮華元歐陽玄云山川黃鵠山在府城西南一名黃鶴山舊因山為城即今萬人敵及子城也世傳仙人騎黃鶴過此因名唐李白詩東望黃鶴山雄雄半空出四靣生白雲中峯倚紅日巖巒行穹跨峰嶂亦𡨕密頗聞列仙人於此學飛術一朝向蓬海千載空石室金竈生煙埃玉潭祕清謐地古遺草木庭寒老芝术蹇豫羡攀躋因欲保間逸觀竒遍諸嶽茲嶺不可匹結心寄青松永悟客情畢鳯凰山在府城北二里吳黃龍初夏口言鳯凰現因以名山唐岑參詩路指鳯凰山北雲衣霑鸚鵡州邊雨又蒲圻通城咸寧俱有鳳凰山胭脂山在府城東南五里其土色赤故名梁城山在府城東北一十六里梁武帝築城屯軍于此因名冶唐山在府城東南三十里世傳晉宋時依山置冶故名八分山在府城東南四十里有水分流如八字旁有八分湖八分院建康録云武昌有山無林政可圖始不可居終山分八字數不及九即此也烽火山在府城東北四十里梁末北齊清河王嶽進軍臨江梁將侯瑱來逼江夏以伐齊嘗屯兵于此舉烽火相應故名大觀山在府城東南五十里千巖競秀萬壑爭流髙峯峥嶸足以遊觀人以其土石赤色如金又名金華山江夏山在府城東南六十里其山重疊本名夾山唐天寶中改今名靈泉山在府城東六十里山有泉旱禱有應因名白頭山在府城東七十里山巔有四石白色故名大槐山在府城東南七十里相傳昔有李大槐隱居山麓因名錦繡山在府城東南七十五里山多桃李每春時花開如錦繡雞翅山在府城南八十里方輿記云昔有金雞飛集于此赤壁山在府城東南九十里唐元和志在蒲圻縣西一百二十里北岸烏林與赤壁相對即周瑜焚曹操船處圖經云在嘉魚縣西七十里其地今屬嘉魚宋蘇軾指黃州赤鼻山為赤壁蓋蜀漢居樊口進兵逆操遇於赤壁則赤壁當在樊口之上又赤壁初戰操軍不利引次江北則赤壁當在江南亦不應在江北今江漢間言赤壁者五漢陽漢川黃州嘉魚江夏惟江夏之説合於史宋李壁詩赤壁危磯幾度過沙羡江上欎崖峩今人誤信黃州是猶賴水經能正訛驚磯山在府城東南九十二里其西南俯臨大江下有石磯波濤迅激商旅驚駭故名半面山在府城東一百二十餘里山半面産木故名金城山在府城東南二百里吳將陸煥嘗屯兵于此鍾成山在興國州東南一十里相傳晉鍾離嘉飛升之處下有鍾成觀靈仙山在興國州西南一十里下有靈仙觀初建時獲石弩劍斧宋光宗書其額印山在興國州南一十里常湖之中形如印浮水靣圓正清碧龍角山在興國州西八十里兩峯相對本名龍耳唐改龍角其下有泉禱雨多應大坡山在興國州東八十里傍有石樓嶄然拔出衆山之上里人於此製茶名曰坡山鳳髓鍾山在興國州南八十里魏鍾繇墨池在其上故名宋韓克佐詩冨川三百疊山中秀出東南第一峯勢接匡廬分紫翠地連吳楚壓鴻濛從龍雲氣來滄海集鳯朝陽老碧桐深幸太平黎庶樂耕桑鼓舞自淳風闔閭山在興國州南九十里世傳伍子胥屯兵于此史記闔閭九年子胥伐楚是也今有闔閭城大墓山在興國州西一百一十里世傳唐李靖母墓在此有讀禮堂及墨池太平山在興國州南一百九十里與九宫山相連宋道士章自然開山為觀于上西山在武昌縣西三里宋蘇轍九曲亭記謂山有精舍西曰西山是也蘇軾居黃州時嘗與武昌令鄧壁會此後玉堂話舊詩云春江緑漲蒲萄醅武昌官栁知誰栽憶從樊口載春酒步上西山尋野梅虎頭山在武昌縣東三里舊名鳳穴吳黃龍初有鳳集于此舊名鳯凰臺樊山在武昌縣西四里與西山相連劉宋謝眺詩樊山開廣宴謂此一名樊岡下為樊口舊名袁山水經注云孫權徙鄂于袁山即此又名夀昌山産銀銅鐵及紫石下有寒溪中有蟠龍石宋蘇軾詩武昌樊口幽絶處東坡先生留五年春風搖江天漠漠暮雲捲雨山姢娟郎亭山在樊山西路出武昌退谷中五代梁時朱友恭鑿山開道射以強弩遂拔武昌即此地又山下石有窊顛者唐元結修以盛酒號窊樽石門山在武昌縣東五里兩山對峙如門唐武昌令馬安與元結同遊石刻尚存宋郭祥正詩雙崖屹然起剔蘚認題字乃知賢令尹曾同漫叟醉神人山在武昌縣西九十二里歷代帝王記云吳建衡二年有神人乘白鹿從此山出故名虬山在武昌縣南一百五十里山隂有龍穴續搜神記居人每見神虬飛翔出入旱禱即雨後人築塘其下曰虬塘武昌山在武昌縣南一百九十里吳孫權都鄂易名武昌故以名山晉武時宣城人秦精嘗入此山採茗遇一毛人長丈餘引精至山曲示以藂茗既别復還探懷中橘遺精精怖負茗而歸相山在咸寧縣治東南宋參知政事馮京嘗讀書其上故名金燈山與相山接上有善暉禪師葬塔每月夜有光如燈至曉乃滅今有金山寺登髙山在咸寧縣治東南俗傳晉孟嘉嘗遊于此因名登髙潛山在咸寧縣南二十里形如展旗上有壇舊傳葛洪煉丹處宋馮京未第時築室山間讀書有潛山碑及李唐侯記牛鼻山在咸寧縣東八十里以形似名山有深潭一百尺四面青蘿緑竹可觀輞山在咸寧縣東四十里山形圓曲如車輞然白望山在咸寧縣東南八十里巍然獨立望極江夏白湖故名鍾臺山在咸寧縣東南一百里寰宇記上有桃花洞即唐李雍讀書處石室尚存頂有石臺上有石鍾或時自鳴魚嶽山在嘉魚縣治西水經注魚嶽山在大江中楊子洲南今去水已逺山在平地百匹山在嘉魚縣北五里山勢綿延東西二十里如百匹練龜湖山在嘉魚縣西南三十里近山有水名龜湖故名白石山在蒲圻縣南二十五里居衆山中獨崒嵂距山一里許有巖名白石泉出巖中流下為白石港傍有唐顔杲卿兄