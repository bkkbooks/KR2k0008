也汝謹事之尋亦跏趺而逝西山寺在武昌縣治西晉僧惠逺建報恩寺在武昌縣治東又江夏縣亦有報恩寺普濟寺在大冶縣治西武當宫在府治西南黃鶴樓東鍾成觀在興國州東南一十里晉鍾離嘉飛升之所宋賜額靈仙觀在興國州西南一十里內有石劍石弩石斧尚存靈溪觀在武昌縣靈溪山吳可像許長慶蔡悟真飛升之所有鶴籠煉丹井飛升橋尚存文昌觀在崇陽縣西三里祠廟江漢神祠在府城西漢陽門樓上宋淳熙間通判劉靖以江漢在境內宜為望祀乃為坎以祭之坎在靈竹寺西後知州沈樞改祠于學蔣王祠在府城東二里祀金陵蔣山之神張中丞祠在嘉魚縣祀唐忠臣張巡以巡有保障江淮功咸寧崇陽亦祀之張乖崖祠在崇陽縣北宋張詠號乖崖嘗宰是邑有異政去而民思之以詠所建美美堂立生祠忠義祠在府治北宋建炎間金騎渡江郡守李宜嬰城固守民賴以安後為賊所虜遁投僧寺僧疑而殺之百姓傷感為建祠祀焉太守馬去疾以聞賜額忠義止齋先生祠在大冶縣學元至正間縣尹周鏜立以祀鄉先生萬禎本朝重建吳大帝廟在武昌縣治東安樂故宫普應廟在府城東五里舊云三公廟自唐有之宋始賜今額郭祥正詩三神鼎峙名謂何子胥范蠡馬伏波莊綽辨疑謂葛洪亦嘗拜伏波將軍非馬也陸大憲廟在府城西南三里祀漢陸賈賈使南粵至江夏而亡遂立廟按漢史賈非道死或因楚産郡人為立廟爾本曰陸大夫楊吳避諱改稱大憲宋大憲廟在府城東七里其神漢宋無忌為火精唐牛僧孺立廟祀之以禳火災本曰宋大夫亦楊吳避諱改稱唐韋建除武昌軍節度使將行夢一朱衣導從數十詣韋曰公將鎮鄂渚僕所居頽毁非公不能葺治及至訪無忌廟其像即夢中所見遂新之宋紹興中知州王信復立俗云火星堂本朝重建白馬廟在府治西祀蜀將張飛魯肅廟在府治西南二里肅吳橫江將軍昭勇廟在興國州東六十里富池口祀吳將軍甘寧宋錫王爵廟號昭勇本朝改號吳將軍甘公之神春秋祀之又大冶縣亦有廟孟孝感廟在府城東二里祀吳孝子孟宗宋紹興間建本朝遷武昌衛前陶侃廟在府城西北隅侃嘗鎮武昌卒于樊口百姓思之晉咸康間立廟有碑刻在焉馬步廟在武昌縣南梁子湖上周禮校人冬祭馬步注云馬步神之為災害馬者舊以仲月祭于大澤用剛日今縣人率以五月五日競渡祭享于廟蓋吳之故俗云廣惠廟在府城南竹簰門外舊名順濟龍王廟宋淳熙間禱雨靈應賜今額忠烈廟在府城旌忠坊宋嶽飛保護上遊有功乾道中建廟於鄂賜今額嘉定中又追封鄂王知鄂州羅願以父汝楫為侍御史時嘗附秦檜論飛不敢入飛廟一日自念吾政善姑往祠之再拜遽卒於像前人疑飛之憾不釋云表忠祠在府治東萬厯二年巡撫都御史趙賢建祀革除忠臣姚善廖升樊士信周拱辰陵墓楚昭王墓莊王墓憲王墓俱在府城東六十里靈泉山永安懿簡王墓通山靖恭王墓夀昌安僖王墓嶽陽悼惠王墓景陵順靖王墓崇陽靖簡王墓大冶悼僖王墓俱在府城東五十里以上十二王俱本朝宗室漢荆王賈墓在大冶縣西北六十里世傳九江王黥布反荆王以兵征之歿葬于此禰衡墓在府城西鸚鵡洲吕蒙墓在嘉魚縣西石頭口吕蒙城內陶侃墓九域志在江夏孟嘉墓在興國州西南陽新里晉永和中嘉嘗為陽新令卒葬于此彭汝礪墓在興國州南三十五里汝礪官至尚書俗呼彭尚書墓墓側有祠趙令􅍲墓在武昌縣西吉祥寺側令􅍲宋宗室建炎初通判鄂州賊犯黃州令􅍲引兵遏其衝就知黃州既而金人陷城脅之降大罵不屈而死黃人斂遺體葬于此後請立廟墓側賜額忠顯陳求道墓在蒲圻縣東二十四里都興陂吕文德墓在西塞山下母制機墓在大冶縣東黃龍山制機本蜀人宋末分教黃州兼領雪堂河南兩書院教人必明體適用學者稱為平山先生後卒于黃州子孫奉柩葬此謝枋得為之銘徐祥墓在大冶縣東三十里祥縣人本朝封興安伯永樂二年卒葬于此甘寧墓在興國州東六十里軍山之陽寧吳將也徐鏞墓在江夏縣東五里洪山北鏞都御史敕葬李田墓在嘉魚縣南十里白靣山右田都御史敕葬陳智墓在咸寧縣官埠橋智都御史敕葬戴書墓在崇陽縣背田畈書副都御史敕葬汪文盛墓在白羊山源文盛大理寺卿敕葬古迹鄂王城在武昌縣西南二里即楚熊渠子紅封國城子胥城在興國州東六十里俗傳子胥所築即永興故城吳王城在武昌縣治東本漢灌嬰所築晉陶侃為刺史理其地又云孫吳故宫城遺地今宫城前有御溝內有廟唐劉長卿詩上下故宫城長江竟何有寥落幾家人猶依數株栁宋張耒賦登武昌之故墟兮弔西門之哀栁是吳主之故宫兮昔仲謀之所有夏口城在府城西黃鶴山吳主孫權所築對岸則入沔津故城以夏口為名至劉宋順帝時栁世隆等守之沈攸之攻之不克梁末陳初周將史寧為土山長梯攻之不能破黃巢之亂止陷其外郭蓋其城依山負險周回不過二三里乃知古人築城欲堅不欲廣也黃石城在武昌縣東江表傳云劉勳走入樊口聞皖已沒及西寨將兵救皖為孫權所破遂奔曹公即此城也鄂縣故城水經注古岸有鄂縣故城蓋舊樊楚也太平城在蒲圻縣西南八十里吳孫權遣魯肅征零陵於此築城吕蒙城在嘉魚縣石頭口吳孫權征零陵時所築汝南城在府城西塗口即汝南僑郡故城晉咸和中冦難南逼户口南遷因置城于塗口曹公城在府城東北二里梁武帝起義兵遣曺景宗築曲水城及武帝攻郢城又遣王世興屯兵于此郢城在黃鵠山劉宋郢州治此梁武帝自襄陽起兵逼郢城見數百毛人踰堞且泣投黃鵠磯明旦城降萬人敵城在府城東黃鵠山頂舊有城宋建炎間草冦犯城郡守命其上以強弩射之冦退因名嶽公城在嘉魚縣東北宋嶽飛征楊么於此築城屯兵廢奉新縣在興國州西南一百二十里吳置隋廢入冨川縣廢安昌縣在興國州西北九十里梁置隋併入冨川縣廢冨川縣在興國州西南五十里本陳陽新縣隋開皇間改名尋併入永興縣郊天壇在武昌縣西山郊壇岡又名即位壇水經注吳主孫權即位告天于此南郊壇在武昌縣南吳主孫權郊天之所葛仙壇在崇陽縣東北三十五里葛仙山上壇西有清泉嵗旱環數百里來禱挹杯勺以去則隂雨隨之陶侃宅在武昌縣西中有黑石中拗如樽狀唐孟士源命為杯樽武昌西門晉陶侃鎮武昌課種栁都尉夜盜栁為巳種侃問西門柳何以盜種尉驚怖謝罪即此也唐劉禹錫詩一辭溫室樹幾見武昌栁孟浩然詩行看武昌栁倣佛映樓臺宋李豸詩官栁不知興廢事春來還是緑纎纎瓜圻在武昌縣西南一十里吳王種瓜于此夷市土俗編云晉西陽有豫州五水蠻陶侃為武昌太守作夷市於吳城東以為交易之所大獲其利吕洞賔仙迹有二一在府城西南黃鵠磯石壁上遺像宛然一在府城東六里紫荆山西石壁上卧迹尚存並有洞賔仙迹四字鑱石舜帝廟碑在蒲圻縣治有斷碑載二妃事字漫滅不可考元御書碑在武昌府學有元至順間御書逺志萬里歸程六字二碑刻歐陽玄為贊名宦漢董宣江夏太守先是有劇賊夏喜等冦亂郡境宣初到界移書曰朝廷以太守能擒姦賊故辱斯任令勒兵界首檄到幸思自安之宜喜等懼即時降散三國周瑜吳中護軍領江夏太守嘗討敗黃祖兵於柴桑後又敗曺操于赤壁程普吳禆將軍領江夏太守初從孫策攻黃祖於沙羡後與周瑜破曺操於烏林陸遜吳大都督嘗襲曺休振旅過武昌孫權令左右以御蓋覆遜出入暨權徙都建鄴徴遜輔其太子登留守武昌潘濬吳時與陸遜同駐武昌荆州牧劉表辟為江夏從事時沙羡守長贓穢濬按收之一軍震悚滕牧吳孫皓還建鄴以牧鎮武昌寬恩以結民武備以防冦當時稱能晉陶侃以都督鎮武昌嚴毅有權明悟善決斷勤於吏職所治數千里中路不拾遺庾亮鎮武昌坦率行已政迹著聞庾翼以都督鎮夏口有功得荆楚人心謝尚行江夏等都軍事始到官郡府以布四十匹為尚造烏布帳尚懷之以為軍士𥜗袴劉道規義熙中鎮夏口有文武大略威望重於一時南北朝蕭思話宋孝建初始置鄂州治江夏以思話為刺史有威望愛才好士人多歸之沈慶之宋武昌內史處分軍事內外整辦百姓欣悅韋睿梁初為江夏太守行郢州府事蒞人以惠愛為本甚有政績何逺梁武昌太守杜絶交遊饋遺秋毫無所受江左水物甚賤每食不過乾魚數片而已唐馮昭奏鄂州刺史志氣剛徑不畏強禦異政風行元稹武昌軍節度使在鄂二載有德政韓仲卿武昌令有美政既去縣人刻石頌德李兼鄂州刺史李希烈反遣兵襲鄂兼大破之於是畏兼不敢復有窺汪淮之志吕元膺鄂嶽觀察使嘗夜登城守者不許左右曰中丞也對曰夜不可辨乃還明日擢守者為大將在任有仁愛之政吏民懷之柳公綽鄂嶽觀察使時方討吳元濟詔發鄂嶽卒五千𨽻安州刺史李聽公綽即引兵渡江抵安州謂聽曰宜以兵法從事戒諸校曰行營事一決都將聽軍既出乃省問其家疾苦厚給之軍中感服曰中丞為我恤家事敢不死戰故鄂軍每戰輒克牛僧孺武昌節度使鄂城土惡亟圮嵗增築賦蓑茅於民吏倚為擾僧孺陶甓以為城五年畢鄂人無復嵗費栁仲郢牛僧孺辟為武昌幕府有父公綽風矩僧孺嘆曰非積習名教安及此耶崔郾鄂嶽等州觀察使嘗治虢以寬而涖鄂則嚴或問其故曰陜土瘠民貧吾撫之猶恐其擾鄂土沃民剽非用威莫能治政所以貴知變也聞者服焉宋張詠知崇陽縣民以茶為業詠使民拔茶植桑民初以為苦其後官𣙜茶他縣皆失業而崇陽之桑已成可為絹嵗百萬匹民咸德之假少連知崇陽縣崇陽劇邑自張詠為令有治狀自後惟少連能繼之蔣之竒知通山縣通山令有名顯於史册者由之竒始楊繪知興國軍為吏敏強表裏洞逹一出於誠尤以文章著名方澤知武昌軍政和民悅再起南樓黃庭堅詩庾公風流冷似鐵誰其繼之方公悅公悅澤字也王安國武昌軍節度推官在部持正不可干以私與安石雖兄弟而所守不阿張商英知鄂州時蔡京欲推方田於天下又築圜土以囚罪人商英謝表云方田擾安業之民圜土聚徙鄉之惡此語一出天下傳誦其名益重李涓知崇陽縣金人入冦涓募兵入援曰事急矣當持一信報天子為東南倡至蔡州與金人戰死之嶽飛荆湖北路制置使嘗屯兵鄂嶽討平冦賊以功封武昌郡開國侯李宜知興國軍時金兵渡江至境上遣檄使降宜斬使嬰城固守金兵不得入境民賴以安陸九齡興國軍教授興國俗儉嗇而鮮知學九齡不以職開自佚益嚴規矩肅衣冠如臨大衆勸綏引翼士類興起劉清之通判鄂州鄂大軍所駐兵籍多偽清之白郡及諸司俾偽者以實自言而正之又訪祠張節婦墓及諭止計利尚鬼之俗詹體仁知鄂州兼總湖廣餉事時嵗凶艱食即以便宜發廪振救時韓托胄建議開邊一時爭言兵以規進用體仁獨移書言兵不可輕動宜遵養俟時韓彥直以都統制駐鄂州條奏軍中六事朝廷從之軍中騎兵多不能步戰彥直命騎士被甲徒行日六十里雖統制官亦令以身率之人人習於勞苦馳騁如飛趙方湖北轉運判官兼知鄂州嘗自言性太剛請劉光祖書勤謹和緩四字揭坐隅以為戒馮去疾知興國軍去疾乃朱文公門人開定本四書於滄浪亭號興國本吳柔勝以湖北運判兼知鄂州甫至值嵗歉大講荒政被災之民全活者不可勝紀王霆知夀昌軍嘗歎曰兩淮藩籬也大江門户也三輔堂奧也藩籬不固則門户且危堂奧豈能久安乎乃以防江利害移書時相孟珙以京西鈐轄戍鄂時金主守緒逼蔡其唐鄧行省武仙犯光化軍鋒剽甚珙逼其營壘一鼓拔之元陳天祥知興國軍以恩信結人凶黨帖服流移者復業又知夀昌縱囚還家約三日來歸獄皆如期而至天祥白帥間釋之逺邇皆服其德為立生祠周鏜大冶縣尹邑有豪民持官府短長為梗難治鏜狀若尫懦而毅然有威不可犯遂能鋤豪強惠窮民治行為諸邑最成遵至正中武昌路總管時武昌為沔冦殘燬民多死於兵而大江上下皆劇盜阻絶遵假軍儲鈔萬錠募勇敢士具戈船截兵境且戰且行糴粟於太平中興民賴以全活者衆本朝馬極國初知通城縣披荆棘置縣治攘除凶暴撫輯遺黎逾年田野闢户口增境內大治民立碑頌之戴德洪武初任湖廣行省參知政事以疾卒于京師詔贈湖廣等處行中書省右丞護軍追封譙郡伯吳懋洪武初以蘇州知府左遷大冶知縣處心端正守己廉潔尤工楷書坊額多其所書慮民不率教嘗作戒諭文民傳誦感化焉汪大本洪武初為武昌知府勤於撫字教養有法甫下車即募財捐俸以搆講堂修齋舍由是武昌多學者管時敏洪武中楚府長史在任四十餘年忠誠謹恪始終如一年七十致仕王奏留居本府祿養終身仍賜地黃屯山所著有蚓竅集秋香百詠詩朱與言永樂中湖廣按察僉事廉明剛介黜姦貪郡縣望風解印綬去文章政事著聲于時省志蕭寬永樂中湖廣左布政使寬宏有量端簡不譁未嘗疾言遽色而處大事則裕如也省志周文永樂中湖廣參議時嵗飢民流乃捐俸粥民發廩施賑憂勞成疾卒于蘄省志俞士悅永樂中湖廣按察副使振肅紀綱貪墨望風解印綬去居民失火將及臬署士悅具衣冠再拜火乃滅嵗旱禱雨輒應省志綦禎永樂中知大冶縣以寬涖民恤貧下士造糧船清吏役修學校秩滿士民保奏復留至今傳頌其恩德省志王進武昌府學訓導講明體適用之學尤嚴義利之辨士之出其門者多立名節省志于賢永樂中以監察御史左遷知大冶識見明爽涖事果斷期年而政平訟理四野清寧百姓思之立遺愛碑省志林和生永樂間蒲圻知縣勵已公廉臨民慈愛去之日行李蕭然百姓遮道涕泗慘不忍别省志賈諒宣德初以副都御史巡撫湘廣鋤強梗屏袤􅕝振彛綱存大體楚之有大臣以保釐茲土自諒始省志邵旻宣德初知武昌府性忠直為政公平三載間六事咸舉百弊悉除召為工部右侍郎樊繼知興國州亷介公平州南有虎患禱於城隍數日兩虎自鬪死州西有湖隄壞捐俸勸民築成之興學校毁淫祠勸民喪葬用文公家禮不事浮屠民多化焉去之日送者數千人莫不垂泣為立去思亭馮昶咸寧知縣有善政人稱頌不忘熊鍊宣德中任湖廣提學僉事秉性剛直不避權勢以正本敦行為先士民畏而愛之省志薜瑄宣德間為御史監湖南銀場黜貪墨正風俗暇則進諸生講學不倦省志崔恭正統中湖廣布政使盡革諸冗費及和市苖民侵武岡督餉訓民兵勦賊賊皆聽撫公安監利流民相殺恭計定之省志羅箎正統中以都御史巡撫湖廣時蠻獠並叛箎會總兵官戒胄遣人諭以威德即率兵搗巢穴大破之嵗飢發賑民困賴以復生省志宋欽正統中擢湖廣參議值麓川亂欽督餉饋兵不避艱險嘗至盧溪被賊遮留欽率兵挽弓揚矢迎敵厲聲歷數其罪詞氣壯烈賊不敢逼省志頊忠湖廣按察副使纍官都御史會荆襄大旱流民入山者九十萬人賊黨倡流民為盜忠出總督軍務遣人持榜入山諭降即負險不服縱兵勦之不赦凡遣還鄉者四十萬人謫代者萬餘人俘斬二千人省志應皓湖廣按察司僉事分治平溪清浪征靖州蠻黃強築沿江堤及撫荆襄新附流民勞勩懋著全楚稱之省志韓陽正統中湖廣提學僉事公亷靜正善作士類諭諸生出入必巾服時武昌劉生有學行家貧被火為營其居助以薪米居楚數年文物丕變士人懷之省志鮑旭正統中知興國州治民以慈愛為本民有寃抑者急為伸之嘗修常平倉六所樽節出納數年郡頗殷富水旱不為災朝天堤圮甃以石建石亭于其上人名為鮑公橋至今存焉省志樂睿正統中以征麓川功升指揮使涖政明恕有才愛恤軍士威惠並至羣夷畏服之溪洞寧謐卒衛人思之立祠户祝省志翟亨指揮僉事正統中以征蒙顧及麓川功纍遷指揮使後復征麓川偕其弟戰死朝廷遣官諭祭省志楊琚景泰中湖廣布政司參議撫治荆襄築老龍堤疏竹洞河及創劉家隔雷峰坳諸要地至今賴之省志何喬新天順間為湖廣布政使為政以寬不阿權勢凡國儲盈縮民財豐耗靡不究心會荆襄大水民飢為均賑平徭列九等以授役省志唐瑜湖廣左參政分守荆襄撫綏均房流民各得其心荆湖大水挽舟載米濟之水退築堤民賴其利省志方中天順中巡按湖廣監察御史會苗獠入寇督兵討平建議遵常任專委任省班運設屯堡飭邊偹浚河灘立巡司防夷患八事俱允行省志洪弼湖廣僉事時常德辰沅飢弼為賑恤募民分粟仍給牛種多所全活靖州猺叛弼設畫經略擒其首惡餘黨悉平賜金綺以表之省志張敷華天順末湖廣左布政使嵗大飢給粟散粥藥病瘞骼民賴以蘇省志梁璟以右副都御史巡撫湖廣會永州寇作率兵討平之鎮守中官驅宗藩親至死璟訊之􅔰法力拒請托竟不為撓省志秦夔知武昌府屏姦植善興學勸農積穀偹荒節財裕國尤多善政宜民省志孫倫天順末知嘉魚縣內外一誠人不堪其清苦興冠婚喪祭禮去浮屠老子舍人咸遵其教親藩旗尉有不法競刑之比卒百姓哭之哀曰清官死誰復愛我者省志原傑以副都御史巡撫湖廣時劉千斤寇鄖西而河陜荆襄流逋聚梗傑按行三省八郡無停轍逐凶惡綏良善且給以田産令附籍凡萬人奏設都御史撫治鄖陽地方賴以靖鄖人祠祀之省志韓文湖廣參議分巡荆南所至軫民隱正士風力行古道歷升都御史巡撫湖廣振紀肅僚施政澤物多善政焉省志徐恪湖廣參議時汪直擅權使者旁午採辦恪力拒之後巡撫湖廣風裁益厲省志王恕成化初以副都御史撫治荆襄南陽豪爭礦殺人獲渠魁餘悉解散討平劉千斤之亂流民賴以復業為建生祠肖像祀之省志馬炳然知嘉魚縣為政明察而不煩暇則巡行村落悉知某人堪某事某户堪某役吏胥無所售其姦三年大治流民復業嵗飢輒開倉救之明年又飢朝廷出內帑錢以賑炳然即放散之雖忤府守意不恤也省志周洪蒲圻令督農種粟麥植桑麻令婦女業紡織事絲枲驗其勤惰而賞罰之髙田製筒車下隰築陂堰民賴饒洽鄉置社學學置田三十畝令生徒父母合力耕種仍復其徭邑有姦法者大書木牌于其門雖權勢不避立義倉六所儲粟三萬餘石至正德初大旱民猶被其餘澤省志劉肅巡按湖廣風采凝峻後謫知黃州府值蘄州宗藩弗靖監司倚重于肅卒致于理屬嵗飢賑恤偹至省志何淳成化中湖廣按察副使時旱潦相仍民艱于食區畫賑救咸得其所山陜河南流聚荆襄淳命有司隨地施給民為感泣省志姚文灝湖廣提學僉事慨然以作人自任崇正學黜浮靡規條甚悉嘗自謂所能者二毁譽不入請托不行賄賂不通而已省志王鑑之以部御史撫治荆襄去贓吏嚴請托飾學宫置祭器開堰盛水武陽政寬而惠法嚴而果軍民賴之省志王信成化中以恭將分守荆襄諸路時賊劉千斤反信趨房陵身先士卒斬首數千級獲千斤戮之進鎮國將軍都指揮同知鎮湖廣時永衡二司世相仇殺信面諭之不煩兵而下進都督同知稱名將焉省志戴珊𢎞治初以副都御史撫治鄖陽諸府豪右多窟流聚為利珊刻日令自首蜀盜野王剛侵境珊請令湖陜兵誅其首惡縱脅從千餘人事遂定省志張悅湖廣按察使執法嚴峻確不可拔會藩府承奉張通怙勢悅痛絶之不少貸凡百請謁拒不與通省志汪進湖廣按察僉事分巡衡永痛懲豪右會施州土官覃景隆不法特按治之躬歷其地撤去元帥舊衙毁其印牒民獲安堵省志林俊𢎞治初湖廣按察使風采稜厲所至肅然省志王時中湖廣按察使執而有守介以不隨省志李東𢎞治中守興國郡素有豪強十餘輩亷得其情首置于法自是姦人逞訟亦漸息郡多逋負東征一緩二輸無愆期省志彭倫永定衛指揮為人多謀略先計後戰討諸苖夷纍戰纍捷歷官右軍都督府僉事有古名將風省志周季鳳𢎞治中湖廣按察使左右布政使在任最久德澤在人最深以平郴寇功升都御史去省志王介𢎞治末知咸寧首詢民利害以丁産定賦役凡宫宇橋梁傾圮者皆新之令行禁止門無私謁以贖鍰易穀萬石嵗飢民賴以生省志孫需𢎞治末以都御史撫治鄖陽興學校復流徙廉明忠直軍民悅服正德初賜璽書金幣褒嘉之省志邵寶正德中湖廣左布政使端介自持政尚大體省志鄭嶽湖廣按察使嚴毅不屈端諒敢為省志席書嘉靖初以副都御史巡撫湖廣擒姦豪號三虎者民害以除長沙守貪酷巧附麗書按坐謫戍吏民畏戢省志林廷㭿嘉靖初湖廣布政使恬雅介潔有惠政及民省志流寓元結唐瑞昌人避亂寓武昌樊山自稱漫士又呼漫郎有子二長叔間呼為直者次叔靜呼為正者優遊山間以耕釣為業嘗作詩云將牛何處去耕彼西山陽叔間修農具直者伴我耕又云將船何處去釣彼大回中叔靜能鼓橈正者隨弱翁王欽若臨江人父仲華侍祖郁宫鄂州母李氏將免娠會江水暴溢逼舍亟遷黃鶴樓即生欽若范純粹蘇州人仲淹子也仕士宋纍官龍圖閣直學知金州坐元祐黨落職鄂州安置趙葵衡山人荆湖制置使方之子初生于蒲圻縣西梅隱坊或夢南嶽神降其家後為名臣李綱邵武人宋名相建炎初罷為觀文殿大學士提舉洞霄宫會陳東言黃潛善汪伯彥不可任綱不可去後有旨綱落職居鄂州謝枋得信州人仕宋為建寧教授寶祐中考試建康摘賈似道政事為問目坐訕謗追兩官謫居興國軍專務講授著書丁鶴年其先西域人元末因父兄遊宦寓居武昌縣之西山博學能文辭尤長於詩性耿介不混塵俗年九十終于家有詩集傳世人物三國李通江夏人與陳恭共起兵朗陵建安初歸魏拜中郎將破張繡軍封建功侯袁紹嘗誘以官爵通斬其使又擊羣賊定淮汝之地拜淮南太守卒諡剛侯孟宗江夏人仕吳為令每得時物必以寄母不敢先食母嗜笋冬時笋尚未生宗入林哀泣笋忽迸出聞母亡犯禁委官得免死晉孟嘉宗曽孫少知名太尉庾亮領江州辟為從事亮嘗大會客豫章太守褚裒問嘉安在亮由是益重嘉後為桓溫恭軍九日宴龍山風吹帽落嘉不覺溫命孫盛為文嘲之嘉即為答文甚美四坐嘆賞後遷長史孟陋嘉弟清操絶倫喪母毁瘠殆於滅性不飲酒食肉者十餘年桓溫躬往造焉不敢屈致郭翻武昌人庾亮嘗薦之不至咸康末乘小舟過武昌省墓庾翼躬造強起之不從又以船狹欲引就大舟不可翼俯屈入其舟中終日而去南北朝李圭江夏人南齊時為尚書左丞時中外穀帛至賤圭議出上庫錢五千萬及諸州錢皆令雜買從之後兼少府費昶江夏人嘗為樂府又作鼓吹曲梁武帝重之歎曰才意新拔有足嘉異昔郎惲博物卞蘭巧詞束帛之錫實惟勸善賜絹十匹唐李善江夏人有學行淹貫今古不能屬辭故人號書簏顯慶中兼沛王侍讀為文選注敷析淵洽表上之居汴鄭間講授諸生四逺至傳其業號文選學李雍善子早有名重義愛士見特進李嶠願一見祕書嶠假直祕閣未幾辭去嶠驚試問奧篇隱帙了辨如嚮因薦之拜左拾遺元宗初為御史中丞出為北海太守雍文章書翰皆過人李林甫疾其名盛害之李鄘雍從孫舉進士纍官淮南節度使吐谷承璀嘗為監軍薦之召拜同中書門下平章事鄘不喜由權幸進固辭以太子少傳致仕卒孫磎好學家有書至萬卷世號李書樓五代吳仲舉興國永興人仕南唐為池陽令宋兵渡江衆欲以城降仲舉以大義責之遂殺曺郴所令使者城陷仲舉被執彬責以殺使者之罪仲舉曰世祿李氏國亡而死職也彬義而釋之宋吳中復仲舉子景祐間與兄弟幾復嗣復聨名登第中復初知峨眉縣毁淫祠亷於居官通判潭州纍遷殿中侍御史風節峻厲仁宗以飛白書鐵御史三字賜之後擢龍圖閣直學士歷知江寧府永興軍諫青苖法免官子立禮為御史有父風烈吳擇仁中復從孫為雍丘主簿宰相范純仁異之以知太康縣盜相戒不入境擢熙河路轉運判官從招討使王厚伐青唐有功進集賢殿修撰為京畿都轉運使多善政終徽猷閣直學士馮京江夏人少雋邁不羣皇祐初進士鄉選禮部廷對皆第一纍官翰林學士知開封府事至立斷出安撫陜西神宗召為御史中丞中立不倚王安石為政京論其更張失當擢樞密副使尋以誣出知成都府安石敗復召知樞密哲宗時為宣徽南院使以太子少師致仕卒贈司徒諡文簡李昌國江夏人善於教子三子長康侯仕至河南守次康年仕至監丞善古篆與蘇軾黃庭堅遊次康直仕至左司員外郎休官歸里自稱裕老杜淦江夏人自稱漢隂老人居泗水上烈日笠首躬督耕墾起家十五年遂致富嘗謂人曰夫忍耻入仕不因妻子衣食者幾希彼忍耻我勞力皆衣食耳顧我何如盛子充興國人親喪廬墓鄉里稱其孝家藏書甚富有閣曰萬卷子充與王黼同舍黼登相位一無所求仕止朝奉郎陳卓咸寧人有田五千兄之田止一千願合户而同之且曰人生飽暖之外骨肉交歡而已其後兄子康民登皇祐初進士官至大中大夫陳求道康民子舉進士靖康間判都水監及二帝出郊求道力爭不聽以二帝蒙塵纍欲自殺因救得勉建炎中為襄鄧隨鄂鎮撫以奏兵食不給待命未行自咸寧挈家就食蒲圻會招撫劉忠叛欲奉求道為主求道正色厲辭賊怒殺其妻蔡及二子符佺脅之求道罵愈厲為賊所害吳必大興國人以父任補官為吉水丞屬權臣指朱文公為偽學遂致仕必大早事張栻吕祖謙晚師文公深究理學議論操守為儒林所重有所記師誨傳世邵應豹其先淳安人父遊武昌生應豹遂家焉舉嘉熙二年進士為常德府司户歷知江夏寶應潯州皆有善政後爵淳安縣男居九曲山下卒今祠于學元聶炳江夏人元統初進士同知平昌州事轉寶慶路推官遷知荆門州淮漢賊起荆門不守炳出募土兵得衆七萬復荆門既而賊合兵來攻炳率孤軍晝夜血戰援絶城陷為賊所執罵賊不屈而死本朝范俊大冶人洪武間任監察御史尋升左僉都御史以疾終劉仲亷江夏人洪武中領鄉薦仕於朝永樂中歷升工部侍郎盧文政江夏人自幼嗜學溫雅異常領洪武己卯鄉薦為吏部主事纍官太僕寺丞致仕年八十餘手不釋卷親筆百家之言以啓後進所著有歷代一覽李祥咸寧人洪武初督府斷事歷遷尚寶司卿浙江按察使為人識度明雅威嚴莊肅上素重之親為誥詞極其褒美云蔡哲武昌人始仕陳友諒為御史嵗壬寅來歸授江南行省理問升右司郎中命往贑州招諭熊天瑞天瑞遂遣子入朝擢哲中書省參政命往四川報偽夏明升聘因挾畫史同往圖其山川險易以獻後為侍御史以所舉御史犯法被劾坐免官卒朝廷惜之命賜棺歸葬鄉里劉任武昌人故元四川行省參政擢兵部尚書出為廣東行省參政召拜應天府尹其在四川廣東以善政聞後卒于官魏觀蒲圻人以文學薦為國子助教歷升翰林侍讀學士拜國子祭酒洪武四年坐考禮不以時奏貶龍南知縣甫至官召還為禮部主事出知蘇州府明教化正風俗郡中翕然後升四川布政司參政朝廷以蘇州大郡政務繁劇復命還郡黃琛武昌人尚皇兄蒙城王女慶陽公主授駙馬都尉中都正留守多著勞績卒賜葬鳯陽徐祥大冶人燕山護衛千户文廟居藩邸以祥謹直命侍衛左右後從征以功纍官都指揮使封興安伯祥在諸將中年稍長反為伯益勤慎謙抑永樂二年卒賜葬祭鄧真江夏人幼穎異好學永樂九年進士擢監察御史政事通敏讞獄詳明尋升山東按察使轉布政使處事公平愛民如子後卒于官吏民或見其行止如生咸以為神繪像事之成務興國人永樂間任監察御史以振揚風紀有聲超升貴州按察使鄧珏江夏人由進士歷刑部郎中貴州副使三十餘年廉介自持居家足不履公署世祀鄉賢省志翟亨正統中任指揮使征麓川偕其弟戰死事聞諭祭省志王竑江夏人徙陜西河州衛舉進士授户科給事中英廟北狩時嘗奮臂倅指揮髙順直聲震天下北兵犯順督守居庸等關後征平原諸寇大著勞績以兵部尚書致仕卒賜祭葬省志李田嘉魚人景泰甲戌進士歷户部郎中以督餉征蜀功擢廣東左恭議海南夷叛躬􅔰巢穴開諭夷皆效順進左參政纍遷副都御史巡撫京畿賑飢活貧以萬計後忤中官汪直歸或怵以禍無懼色省志李承芳嘉魚人幼頴異登進士授大理寺評事無鮮裘良馬嘗謂人曰豫得俸三十緡可津而南矣及升寺副遂謝病歸隱黃公山講學賦詩以自足省志李承箕承芳弟領鄉薦一試禮而歸師事陳獻章不復仕進築釣臺于黃公山與其兄日夕奉母怡愈一堂雖貧約不計焉所著有大崖集省志汪洪蒲圻人舉進士歷户部郎中出禦北邊督餉有功陟山東恭議以忤權相謫知綿州嵗飢發賑濬水創堰溉田千餘頃民賴之後遇土酋中流矢而死民立祠祀之省志黃玹蒲圻人成化乙未進士授江西髙安知縣為政嚴峻豪宗屏迹拜監察御史堅持風紀不畏強禦時貴州征都勻苗勑玹紀功改土為流改州為衛厥功居多陟大理寺寺丞省志徐鏞興國人成化己丑進士授行人拜監察御史巡視通州奏定漕卒挽輸著為令州人便之會星變請免慶成宴謫鎮源知縣嵗飢移民就粟多所全活尋調臨潼父老泣送之歷官副都御史總督漕運持法紏邪軍民沾惠省志吳廷舉嘉魚人洪武中以戎藉𨽻梧州舉進士授知縣歷官參政布政使副都御史以南京工部尚書致仕長身骨立不修藻飾而神采英毅志識雄偉言行必自信人鮮能奪之卒之日無以為殮省志李玘蒲圻人敦孝義與弟常立家規置義田子孫七世同居成化間表其門省志向珍大冶人由太學生授廣西興業縣知縣縣有洞時山同冦猖獗珍集民拒守破賊以火計搗其穴擒斬甚衆以功升鬱林知州興為鬱林屬邑益得知前禦賊附循其民未幾卒民祠祀之省志龔伯寧崇陽人成化甲辰進士知新昌縣勸諭農桑鑿天寶引水灌田甚廣芟強息訟民多誦其政績入覲卒于京新昌人德之祀以祠省志李承勛田子𢎞治初進士知太湖縣守南昌歷布政仕終兵部尚書學有源委才無枝柱提兵南北曉暢軍事通逹國體議論英發廉潔自守家無餘資卒贈少保諡康惠省志江師古蒲圻人𢎞治癸丑進士授工部主事清江浦管閘時中貴往來作威凌轢師古不為屈正德初逆瑾抦國即投疏歸性儉朴敝衣垢襪陋室匡牀獨翛然肆意省志廖漢蒲圻人性剛毅獨立不回𢎞治六年進士授户部主事陳情便養改南京孤介有聲正德初起復值逆瑾柄國乃上疏抗論時政不報再疏自陳歸結茅五洪山潛修以居省志張璞江夏人𢎞治己丑進士授監察御史按雲南時鎮守中官役軍虐民璞重懲之忤逆瑾逮繫詔獄卒贈少卿省志戴書崇陽人𢎞治壬戌進士授南京大理寺正出補四川僉事歷副都御史巡撫雲南上安邊疏謂肅州為極邊哈密為盡境哈密圖嚕與回夷為黨其種類流寓盤據肅州之境不免為患而罕東左衛赤斤蒙古衛亦與哈密相鄰近年漸多內徙直犯肅州宜遵舊制畫界分境設衛鑄印制之以杜邊患上韙其議省志劉績江夏人幼聰敏不羈貫穿羣籍尤精於考究凡所撰述古雅沖淡根極理要負一時物望𢎞治庚戌進士歷吏部員外補鎮江知府所著有禮記正訓蘆泉詩文集省志張鍾靈其先武昌人後徙江夏賦性孝友問學該博𢎞治戊午鄉試第一隨晦迹家孰嗜學益篤脫然聲華之外終身不受祿省志鍾湘興國人𢎞治壬戌進士授主事歷知漳州府會鄰廣山寇倡亂湘率死士先搗巢穴縳其首惡諸脅從者給牛粟而遣之賊感泣不戰而巢遂空海冦聞之亦皆就降擢廣東恭政未行卒漳人像而祀之省志劉珂興國人𢎞治中進士令長洲墾民田三干餘畝興水利七百一十處置義冢三毁淫祠十復逋户三百餘補大㒒丞逆瑾亂政遂乞休焉省志王疇崇陽人正德初進士授評事論駁諳法律擢江西僉事升四川副使歸居家手不釋卷愛佳山水多所題詠所著有石洲文集省志仵瑜蒲圻人紳之子舉正德庚午鄉試第一丁丑登進士授禮部主事提督四夷館上疏論勤聖學篤親親開言路敬大臣選諍臣去浮屠拯困窮重守令修武備儲人才十事嘉靖初以議大禮忤旨廷杖卒隆慶改元詔存恤其家蔭子一人為國子生省志汪文盛崇陽人進士饒州府推官時宋籓驕恣悉繩以法歷武選主事以諫止南巡械杖于廷濵死者數嘉靖初擢車駕郎中出守福州府遷浙江督學副使品隲無毫髮爽擢遷都御史巡撫雲南選鋒厲鋭卒致底定進大理寺卿卒祭葬省志孟廷柯武昌人正德辛未進士任大理寺副與翰林修撰舒芬等諫止武宗南狩謫户部照磨嘉靖初擢四川僉事轉陜西參議雲南參政省志胡堯元蒲圻人正德初進士授主事以忤權貴謫髙郵州同知轉瑞州府通判論平逆濠功擢廣西恭政征思恩冒瘴卒桂林人祀之贈右布政使省志方震嘉魚人倜儻有謀略正德中大寇起震奮身協謀誘二冦殺之搗其巢冦平震亦以勞卒有司以聞贈府檢校行翰林院撰文祭之復其家省志汪必東崇陽人正德辛未進士授户部主事改禮部邃於經史能為古文辭善草書擢廣西參議進河南恭政所著有南雋文集易問大旨省志廖道南蒲圻人正德末進士選庶吉士歷編修至侍講學士經筵論講多所發明日食上言上皆嘉納中忌謫推官召入卒以忌免所著有文華大訓針撰殿閣詞林記楚記省志劉師頴興國人嘉靖癸丑進士纍官武選郎中清戎籍督武學閲馬政咸井井有條同舍讓其能以母老告歸鄉里惟杜門不出而已省志龔良傅蒲圻人嘉靖丙戌進士歷浙江僉事時憲使萬雲鵬副使徐階張嶽俱以氣節相尚浙人稱為四君子焉纍遷山東副使卒省志謝存儒蒲圻人嘉靖丙戌進士纍官兵部侍郎宦績所經勛譽卓卓可紀省志汪宗元崇陽人進士授行人歷南京太僕寺卿修馬政遷太常修太常志輯國朝名臣所建白為經濟考遷副都御史總理河道漕流以通轉福建右布政禦倭有功纍遷應天府尹改順天晉通政使久之避怨引例自陳致仕省志朱廷立通山人嘉靖癸未進士授監察御史擢太僕少卿官至禮部侍郎質任渾朴言動直坦好惡不形於進退可否動以古道自持不逐時好觀察所至獨秉大體不尚苛刻久立朝著惟以忠厚正直為務惟好理學喜為文辭至老不倦士林多重之省志熊桴武昌人嘉靖庚戌進士守太倉纍官蘇松兵備副使值倭冦亂在吳十二年從將吏誅賊大小三十餘戰斬首一千四百有竒升雲南參政降女官素儀歷遷浙江右布政海寇曽一本亂擢僉都御史巡撫廣東勦平之論功進僉都御史卒贈官諭葬祭省志魏裳蒲圻人嘉靖庚戌進士為人質直亡他嗜好讀書博物洽聞一時海內知名士爭相交歡授刑部郎出守濟南解淄來盜均章丘賦濟人德之晉山西副使罷歸杜門不事家人生産而時時好著書里中後進之士爭師事之裳詩文好擬則古昔成一家言所著有雲山草堂集湖廣通志草凡若干卷省志列女張氏江夏民婦也里惡少謝師乞過其家持刀逼張欲汚之張大罵曰庸奴可死不可辱也至以刀斷其喉猶能走擒師乞以告鄰人遂死宋嘉祐中封旌德縣君表其墓曰烈女賜酒帛令郡縣致奠張氏孟福妻江夏人年少夫亡守節無二洪武中旌𢎞治中市火延燒旌坊