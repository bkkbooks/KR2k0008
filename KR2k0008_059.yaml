知縣文章充實政事寬仁不威而吏民自服徐述永樂中為漢陽知府公明有守吏民懷服秩滿升福建鹽運使潘文奎宣德初同知漢陽府清慎寬厚有豈弟之德其文章詞翰為當時推重省志孫􅌈宣德間同知漢陽府博學能文為政公平廉慎雖當煩劇而裁處雍容務從寬惠吏不忍欺民恆思之省志何淡成化中知漢陽府愷悌廉平不事苛察明于決獄哲于知人在任九年清白如一日時有真何武之謡去后士民懷之不置省志林堪成化中知漢川縣純厚近民廉介不茍公睱與諸生講誨窮日夕不倦民為立懷德碑及生祠省志何亮正德中知漢陽府清謹亷介人不敢犯凡有興作錙銖無費于民至于獄訟則聽折如流無不恱服卒于官立祠祀之省志徐弼正德中通判漢陽府時大盜往來江上勢甚危迫城且未築弼倚城架木先事防備人得哨守賊不敢犯郡賴以全活遷去囊槖蕭然民甚德之省志樊景麟嘉靖初知漢陽府鯁介不阿政尚綱紀尤加志窮民勤恤傋至水囓城址於詞訟役𨽻計日借工隨城斂石時與家僮移巨石於署前轉運江岸以身先民以節財費至今稱頌其德省志昌應會嘉靖中知漢川縣縣當漢江下流土田嵗被淹沒民不聊生會極拊循輕徭薄賦後坐調去民思之為立祠于漢江上以祀之省志人物宋張錫漢陽人舉進士為校書郎纍遷翰林侍讀學士判國子監卒贈工部侍郎錫淳重清約雖貴奉養如少賤時讀書老而彌篤初舉廣文館進士考官任隨以為第一及隨死無子錫屢賙其家張昌宗漢陽人處家以義歷八世不分馮京有詩一水縈回繞沌村子房苗裔此間存同居八世三千日可惜君恩未表門嘉定間孫杓守漢陽嘉其義捐俸代其納稅事聞表曰義門元景厚漢陽人領鄉薦至京師中書左丞許有壬師事焉本朝張敏漢陽人永樂中為工部司務推其才升知雲南曲靖軍民府在任逺夷懷服秩滿進升陜西苑馬寺卿後致仕卒陳昻漢陽人以明經中鄉舉棹廣西道監察御史後遷山西按察司僉事陳文通漢陽人才識通敏歷任有能聲纍官廣東按察使陳傑漢川人以明經中鄉舉歷任勤能纍官江西布政司右恭議戴金漢陽人正德甲戌進士歷蘇州撫州推官徴拜御史理兩淮鹺政條奏十二事節費省緡得羡銀六十八萬佐邊餉巡撫四川平滇賊安銓嵗飢疏請帑金二十萬為賑從之仕至兵部尚書金喜為古文辭熟典故兼通星象堪輿之學歷官中外三十餘年多所稱述卒賜祭葬著三難軒集使蜀稿海防稿江西詩記宦滁集棘署餘聞藏于家省志列女陳氏元漢陽人為武僉事妻夫早卒恐父母奪其情對鏡以墨自刺其靣為痛念夫情四字誓不再嫁梁氏元漢陽人嫁為劉府判妻夫早沒誓不嫁紡績以自給終身不出門事聞旌表之廖氏漢陽人年十三嫁鄭必真越三年而必真卒姑哀其無子而少寡欲更嫁之廖氏剪髮誓不嫁養姑至老不哀洪武中旌表之龔氏馬大慶妻漢川人夫卒時年十五子方嵗餘家貧紡績養姑撫孤成立洪武中旌省志黃氏李貞妻漢陽人貞卒黃年二十八家貧極力盡孝以事舅姑遺子暹就學發身科目孀居四十三年景泰中旌省志周氏李純妻漢陽人夫亡年甚少事姑盡孝殯葬以禮教子恕歷官府同知守節五十餘年成化中旌省志明一統志卷五十九
