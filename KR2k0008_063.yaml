body:
  text: 明一統志卷六十三明李賢等撰長沙府東至江西袁州府宜春縣界一百五十里南至衡州府衡山縣界二百三十五里西至辰州府沅陵縣界六百五十里北至岳州府巴陵縣界二百六十里自府治至南京二千四百二十五里至京師五千八百七十里糧九萬八千石零建置沿革禹貢荆州之域天文翼軫分野軫旁有小星曰長沙應其地商為荆楚地周始名長沙春秋戰國時為楚黔中地秦置長沙郡漢改為長沙國治臨湘東漢復為長沙郡三國時初屬蜀漢後屬吳晉𨽻荆州永嘉初於此置湘州咸和中罷湘州復𨽻荆州劉宋復為長沙國兼置湘州南齊又改國為郡隋廢長沙郡置潭州大業初復為長沙郡唐改為潭州天寳初復為長沙郡中和初置欽化軍節度五代唐為長沙府宋置防禦使復置武安軍𨽻荆湖南路元至元中改為潭州路天厯初改天臨路本朝甲辰年改為潭州府洪武五年復改為長沙府領州一縣十一長沙縣附郭秦置湘縣為長沙郡治漢改曰臨湘隋改曰長沙五代漢析置龍喜縣宋罷龍喜置常豐縣開寳中廢常豐入焉元仍舊本朝因之編户三十五里善化縣附郭本長沙湘潭二縣地分長沙五鄉湘潭二鄉置善化縣屬潭州元仍舊本朝因之編户二十里湘潭縣在府城西一百里本秦湘南縣漢屬長沙郡晉屬衡陽郡梁改湘南曰湘潭因昭潭為名隋以建寧陰山攸水茶陵四縣省入屬衡州唐屬潭州宋因之元陞為州本朝復為縣編户二十二里湘陰縣在府城北一百二十里春秋時羅子國地秦置羅縣屬長沙郡漢因之三國吳為吳昌縣劉宋析置湘陰縣屬湘東郡梁以縣置岳陽郡及羅州陳罷州存郡隋初廢郡併湘陰入岳陽縣尋改岳陽曰湘陰屬巴陵郡唐以羅縣省入屬岳州宋屬潭州元陞為州本朝改為縣編户四十六里寧鄉縣在府城西一百二十六里本漢長沙郡益陽縣地三國吳析置新陽縣晉改曰新康屬衡陽郡隋省入益陽唐復置尋省宋析長沙縣地置寜鄉縣治故新康之玉潭鎮屬潭州元仍舊本朝因之編户二十一里瀏陽縣在府城東一百五十五里本漢長沙郡臨湘縣地三國吳始析置瀏陽縣取瀏陽水為名隋省入長沙縣唐復置屬潭州宋仍舊元陞為州本朝復為縣編户七十一里醴陵縣在府城東一百八十里本漢臨湘縣地東漢析置醴陵縣屬長沙郡隋省入長沙縣唐復置𨽻潭州宋仍舊元陞為州本朝復為縣編户二十八里益陽縣在府城西北二百里本秦舊縣屬長沙郡以縣在益水之陽故名漢屬長沙國三國吳屬衡陽郡唐皆屬潭州宋屬鼎州尋復屬潭州元陞為州本朝復為縣編户二十三里湘鄉縣在府城西南二百一十二里本秦湘南縣地東漢析置湘鄉縣屬零陵郡三國吳屬衡陽郡晉以連道縣省入隋罷衡陽郡以湘鄉省入衡山縣屬潭州唐復置移治龍城後復舊治元陞為州本朝復為縣編户七十一里攸縣在府城南三百六十里本漢舊縣屬長沙國以水為名東漢晉宋屬長沙郡齊屬湘東郡陳改為攸水縣隋省入湘潭縣唐初復置屬南雲州貞觀初州廢以縣屬衡州五代時梁屬潭州漢屬衡州宋復屬潭州元陞為州本朝復為縣編户四十五里安化縣在府城西三百六十里本秦益陽縣地歴代為梅山地宋立五寨以謹防禦熈寧間始置安化縣屬潭州取民安徳化之義元仍舊本朝因之編户一十九里茶陵州在府城南四百八十里漢置屬長沙國以地居茶山之隂故名王莾改曰聲鄉東漢復舊屬長沙郡三國呉屬湘東郡隋省入湘潭縣唐復置𨽻南雲州尋省入攸縣聖歴中復置屬衡州五代晉屬潭州宋屬衡州紹興中陞為茶陵軍後復為縣元陞為州本朝改為縣尋陞為州編户五十里郡名星沙以長沙星得名熊湘昔熊繹封此故名三湘寰宇記湘潭湘鄉湘陰為三湘形勝南以五嶺為限北以洞庭為界元和郡縣志右納夏汭左抗荆門唐書南通嶺嶠唇齒荆雍通典控交廣之户牖擬吳蜀之咽喉宋吕和叔文集湘中七郡彈壓上游左振牂蠻右馳甌越控交廣之户牖擬吳蜀之咽喉翼張四隅襟東萬里依負喬嶽襟帶重湖長沙志五嶺南指三湘北流長沙風土碑控扼湖嶺宋湖南安撫李椿云長沙一都㑹控扼湖嶺鎮撫蠻猺湖湘重鎮宋汪立信傳風俗人多純朴士少宦情湘中記清慧而文唐劉禹錫云無土山無濁水民乘是氣往往清慧而文好文尚義元志漸被胡文定春秋之學而士習好文向慕譚世勣忠節之風而鄉俗尚義恬世利尚節槩同上土風純古有浮丘翁潘逸髙蹈之竒蹤故其士往往恬於世利而好脩有孔明關羽周瑜魯肅之遺跡故其俗多慷慨尚節而恥為不義學者勤於禮耕者勤於力故雖無甚富亦無甚貧民以網罟為業同上民以網罟為業漁利饒衍而無積聚士多亷隅民尚忠義舊志人勇於義同上前有蔣公琬社稷之器後有劉繼逺忠義之風遺習尚存人勇於義民朴而純士無奔競長沙志其民朴而淳其性决烈而勁直火耕水耨漁獵山伐人多髙年士無奔競退恬於世利有張司空之遺風焉山川大富山在府城北七里一名羅洋山峯巒峻㧞流水縈帶乃一郡之竒觀也尖山在府城西距湘江一十五里巍然一峯秀出天表亦名圭峯宋畢田詩圭鐫碧玉鎮南服字聳黄金插半天青旗山在府城南二十里山形髙聳如旗鵞羊山在府城北二十里山多竒石或踞或立狀如鵞羊故名昔成少卿昇仙之所有仙壇丹臺在焉一名東華又名石寳即七十二福地之一書堂山在府城北五十里唐歐陽詢嘗讀書於此智度山在府城北五十里山髙數百丈環二百餘里衆山羅列獨黑石峯最髙唐將軍劉度居之谷山在府城西七十里山冇靈谷深邃名梓木洞其下冇龍潭禱雨輙應雲母山在府城西北九十里其山紫色産雲母石列仙傳長沙雲母服之長生唐劉文房詩雲母映溪水溪流知㡬春深藏武陵客時過洞庭人嶽麓山在善化縣西南亦名靈麓峯即衡山七十二峯之一上有嶽麓書院山下有石方平土人於此望拜南嶽名拜嶽石錫山在善化縣東五里唐王錫隠於此因名下有龍潭水溢則通湘江而分清濁涸則潭清如鏡禱雨有應伏龍山在善化縣南五里宋張栻有詩關山在善化縣東四十五里疊峯峭㧞有如城壁中門道路僅通一車唐末鄧處訥遣蔣朂於此拒劉建鋒後有馬武亦嘗戍此華林山在善化縣南六十里山林聳茂下有龍潭雲葢山在善化縣西六十里峯巒秀麗望之如葢一名靈葢山山有虎溪蛇井宋析彦質詩昔年建立依蛇井今日流通頼虎溪猿啼山在瀏陽縣治南唐裴休讀書此山時嘗聞猿啼因名太湖山在瀏陽縣治西三峯鼎峙中有巨湖其深莫測下有别駕祠即易雄故居道吾山在瀏陽縣北一十五里山列七十一峯東連寳葢西接洞陽狀若蓮花又名蓮花峯崖溜髙百餘丈徑路二十四曲内有龍湫洞陽山在瀏陽縣西北六十里山有洞向陽即道書第二十四洞天唐孫思邈煉丹於此上有仙壇傍有石巖巖前有物如丹世傳思邈所遺山間有潭神龍居之寳葢山在瀏陽縣東北七十里羣山壁立狀如張葢霜華山在瀏陽縣西南八十里一名石霜其山南接醴陵北抵洞陽山峻水激觸石噴霜故名大光山在瀏陽縣西北九十里北抵豫章西接巴陵峯巒疊翠最為竒觀大圍山在瀏陽縣東北一百五十里舊名首裨山山頂有白沙湖廣袤五十餘里流分四𣲖一為瀏水其三入岳之平江豫章之分寧袁之萬載岡巒圍繞盤踞四縣因名大圍東臺山在湘鄉縣東十五里一名鳯凰山南連華葢下瞰漣水上有平石若臺每重九邑人登遊於此宋縣宰王汾詩但知㡌落臨風醉未必龍山勝鳯來石魚山在湘鄉縣南一十里上有石魚神廟嶽龜山在湘鄉縣南三十里頂冇石龜其大如屋近北有蓮花峯韶山在湘鄉縣南四十里西有三峯世傳韶氏三女於此昇仙山勢綿亘百餘里湘潭湘鄉寜鄉諸山皆其麓也葛仙山在湘鄉縣北八十里髙插霄漢上冇丹竈洗藥池相傳葛仙翁煉丹處梅龍山在湘鄉縣東南一百里西南有梅布水又與龍山相望因名山椒有梅龍巖水如噴雪蟹山有二一在湘鄉縣西一百二十里山頂有泉名蟹泉一在湘潭縣治南其形似蟹龍山在湘鄉縣西一百八十里山顛有池池中多鯉常冇烟霧相傳以為龍漣水出其下珎漣山在湘鄉縣西一百八十里與龍山對峙漣水别支出其下鶴嶺山在攸縣東四十里山㧞水清時有白鶴廻翔其上宋彭天益嘗隠于此司空山在攸縣東四十五里南接雲陽連山峻㧞左右有三十六峯舊名麒麟山亦名温泉山南齊司空張岊棄官隠此因改今名宋李韶詩鶴馭凌空入紫微水盤山脚五雲飛松杉老盡無消息猶得千年一度歸嚴仙山在攸縣北八十里一名嚴仙嶺三峯如螺劉宋元嘉中嚴起兄弟於此脩煉山有巖空洞内有丹井明月山在攸縣北九十里峯巒髙聳月出即見上有杉仙廟靈谷巖龍鬚灘巖前有井甘棠山在攸縣東北一百二十里下有天蓬巖泉出不竭世傳天蓬真人脩煉之所鸞山在攸縣東一百二十里與司空山對峙以形似名紫雲山在攸縣東北一百二十里傍有靈龜巖上有水一泓時有二白龜出没每出即有紫雲覆其上羅浮山在攸縣東一百四十里下與鳯嶺連麓下有石竇出泉浮青山在安化縣西南二十五里逺望若浮宋畢田詩山色有無青欲浮仙山在安化縣東北六十里兩峯對峙各有仙跡人稱之為大仙小仙浮泥山在安化縣東北七十里崖壁峭絶浮壤沃饒土人攀縁而上開畬種穀芙蓉山在安化縣東七十里舊名青羊山與大溈山相接竒峯疊聳狀若芙蓉中有芙蓉洞移風山在安化縣東南七十里梅山猺人於此從化名取移風易俗之義大峯山在安化縣東北七十里有七十一峯與大小仙山相接白鹿山在益陽縣治西南下有龍湫蒼崖古木清絶可愛唐裴休講道于此有白鹿啣花出聴因名宋楊億詩澬江水急魚行澁白鹿峯髙鳥度遲龜臺山在益陽縣東南二里山形似龜相傳吳魯肅駐兵于此五溪山在益陽縣西北五十八里亦名軍山吳潘濬討五溪蠻曾營此小廬山在益陽縣南六十里舊名青脩山上有香爐峯瀑布泉以其類九江匡廬山因名宋張栻詩峯勢香爐直溪流峽水潺居然一蘭若喚作小廬山浮丘山在益陽縣西一百里峯巒倚伏亞於南嶽山頂有石亭相傳劉宋時浮丘子煉丹處九岡山在益陽縣西二百里九峯如簡立武潭津上青山在湘陰縣南三十里即仙壇嶺山色比諸峯尤秀南有湖鼻巖龍潭上有霞峯臺皆禱雨之處黄陵山在湘陰縣北四十里舜二妃墓在山上故名酈道元水經云江有攴水曰黄陵西入于湘白霞山在湘陰縣南五十里上有百嵗巖石屋井泉四時不竭白鶴山冇二一在湘鄉縣西北六十里相傳廖真人昇仙處一在湘陰縣東六十里晉陶侃孫澹學仙于此神鼎山在湘陰縣東六十里上有古井世傳陶澹煉藥于此昔冇人嘗獲其鼎宋畢田詩深藏寳鼎今方出合有丹經與世傳一云山頂有石似寳鼎玉池山在湘陰縣東六十里一峯插天上冇浴池世傳陶澹浴丹之所人呼玉池玉笥山在湘陰縣北七十里屈潭之左昔屈原放逐棲此水經云汨水西經玉笥山隋於此置玉州磊石山在湘陰縣西一百里旁枕青草湖北接巴陵下臨湘口山石嵯峨相疊因名舊名萬嵗山下有萬嵗寺陶公山在湘潭縣西南七里晉陶侃卜居於此壺山在湘潭縣東三十里山頂有巨石圓大如壺書山在湘陰縣東南三十里廣十餘里髙數百丈唐隠士官民建臺讀書於此洗硯池猶存昭山在湘潭縣東四十里昭王南征至此不復因名山之南有石穴世傳蛟匿其中許旌陽逐之至此因為立廟石馬山在湘潭縣南五十里一名小淺山有石髙十餘丈其形如馬曉霞山在湘潭縣南七十里山髙聳朝東日曉