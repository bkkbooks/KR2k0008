獻助迎兩宫錢數萬緡時論偉之鄭汝諧淳熈間出知武岡州脩軍學建常平倉貸民以錢使市瓦覆屋民徳之汪立中嘉定間出知武岡軍工詩好學作興士類史彌寧嘉定間出知武岡軍始行鄉飲酒禮于學官元歐陽𤣥泰定間為武岡縣尹有惠政峒獠相攻殺𤣥單騎抵其地諭之獠熟𤣥名羅拜曰我曹嘗訴某事縣不為直故發憤就死耳不意煩我清亷官自來𤣥諭以禍福為理其訟獠遂安聶炳元統中為寳慶路推官詳慎刑獄民畏而懷之㑹峒猺㓂邊左丞圖沁討之屯兵武岡以炳攝分省理問官釋被俘無驗者數千人桞不華武岡路總官元李之亂不華率義兵屯戍同保山控制蠻獠守境衞民㡬二十年邉防頼之後以疾卒鄰郡聞之亦慟哭民嘗頌之曰前冇公綽武岡父母今之郡侯無乃其後足我衣食安我田畆我子我孫與侯同久許楫湖南提刑按察使武岡富民有毆死出征軍人者陰以家財誘其佃者代已欵伏楫審得其情釋佃者繫富民人服其明李朝端泰定間為新寧縣尹有遺愛在民本朝張原善知新化縣創建公署大興學校持身亷謹敬神恤民人至今思慕之葉宗洪武中任新化縣丞潔己愛民一考陞考功主事民懇請于朝仍俾復任仁惠之風逺近化之蕭岐永樂初知新化縣亷能才幹守己敬神教民種植桑麻㯶桐等物民獲其利陞寳慶知府至今有茶園三所民慕其遺愛徐彛永樂中武岡州判官時洞苖宼亂彛率民兵出戰死之民至今哀慕姜啓隆永樂中知寳慶府撫字勤勞勸課不怠嵗飢勸僚屬暨富民岀粟濟活甚多復致政去民至今仰慕何永芳宣徳初知邵陽縣持身亷謹勤於撫字尤作興學校修整一新值嵗荒召富民懇情勸借榖米數萬石以濟飢民全活甚多邑人感慕不忘薛得中知邵陽縣愛民敬士重建縣學振作儒風儀智永樂中知寳慶府為政寛厚深得民心累擢本省布政使簡易凝重尤得藩宣體省志白素永樂中由生員以守城功授武岡知州蒞事以厚風俗興禮讓省刑罰為務未㡬教化大行峒苗信服九年秩滿父老保留復任至今有遺思焉省志周冕永樂末知寳慶府體民利病凡有勾攝置木牌畫兵禁于上令持至鄉民無騷擾之患且多善政百姓懷之省志林繼顯知新寧縣尚教化省刑罰均徭賦秋毫無犯百姓思之立遺愛碑省志唐榮正統中知新寧縣時縣治燬于兵燹榮奏徙今治城池壇廟學校道路皆其創造百廢具興規畫咸當功蹟著聞省志謝省寳慶知府嘗書真徳秀四事十害為僚屬戒春秋行郊野勸耕省歛或給耕牛其不率者裁之以法新學校去佛老時稱循良第一民立祠祀之省志劉遜以監察御史知武岡州政持大體興學勸士卓有能聲省志吳轍正徳間知城歩縣時新創縣治修理功劇轍撫循新附苗餘威惠並至以老乞休至今民懷其惠省志田嵓正徳中知寳慶府節周愛人均里甲課諸生嵗荒作粥療飢多方賑濟全活甚衆省志流寓李安國宋熈寧間自洪都徙新化事母孝在位者以其行彰著請入學教邑子弟未㡬以奉菽水辭歸邑民敬之有詩百餘篇號梅山老人集陳與義洛陽人宋建炎初避地邵陽寓周氏之家有詩甚富後為叅知政事芮燁吳興人仕宋為左從政郎嘗和沈長卿詩云寧令漢社稷變作莾乾坤坐謫武岡軍秦檜死始放還人物晉周﨑邵陵人為湘州從事王敦之難譙王承使﨑求救於外與周該俱為魏乂所執乂責﨑臨以白刃曰汝為語城中稱大將軍已破劉隗等外援隔絶我當活汝﨑偽許之既至城下大呼曰王敦軍敗於湖甘卓已克武昌即日分遣大衆來赴此急努力堅守賊今散矣乂殺之唐胡曾邵陽秋田人長於才幹天福間應舉不第髙駢鎮四川乃置門下時雲南叛乗傳入川辭㫖不遜使幕客各撰書答之曾辭曰四方之於中國猶衆星之拱北辰百川之趨東海天地尚不能違况於人乎駢盛稱之自是箋奏皆岀其手遂成安定集十一卷詠史詩百首鄧處訥邵州龍潭人從江西閔頊防秋安南中和中還道經潭州黄巢之亂盗殺潭州觀察使李裕城中無主衆推頊留後請諸朝僖宗加頊節度使處訥為邵州刺史㑹頊為周岳所殺處訥率諸將哭之興兵問罪積八年攻岳斬之累遷武安軍節度使後為劉建鋒所害宋周儀武岡人雍熈初進士及第官至諫議大夫為嘉祐名臣臨終遺命以邵陵租田悉分宗族子湛天禧間進士孫欽武岡人宣和間洞獠讐殺欽挺身往諭即聴命郡守以聞徽宗嘉之召見官以文資後以武功大夫徳州刺史還守鄉郡靖康末死金人之難聶致堯邵陽人事親孝臨財亷周給貧困邦人徳之列舉孝行節義十事守宰以聞詔旌表其門張栻為題其額李傑邵陽人登熈寧初進士第後出帥湖南由邵陽拜松楸以己俸置書萬卷以遺郡庠買田數千畆以贍宗族王元春邵陽人慶元中進士歴官吏部侍郎有清譽金彥邵陽人力學善屬文天資敦厚喜振困窶而惇孝友邵人號義門金氏胡寅嘗記其事後牧守奉詔舉彥孝亷為天下第一本朝劉必榮武岡州人才識過人洪武間任鴻臚寺右少卿李原暹邵陽人才識逺大為監察御史持法有能名終雲南按察司僉事方觀武岡人性至孝年十四䘮母哭泣踰禮及父卒廬墓三年孝事繼母母卒遂終身廬墓景泰中事聞旌其門省志楊海清城歩人冇勇力為衆推服景泰八年洞苖肆掠邵湘海清率其妻及其徒追戰于龍王橋以後援不至與妻徒俱遇害今冇祠祀省志唐鳯儀邵陽人事親恤族内行純備登正徳戊辰進士授行人拜監察御史岀按蘇松浙江風裁凜然不避權勢擢應天府丞進僉都御史廵撫四川上疏救荒止征勦擒獲沙保振旅息兵蜀民大悅尋丁母憂以疾卒省志陽益新化人正徳間應貢奏免本縣加増稅糧邑民頼之任桐城丞督兵拒宸濠以功欽賜銀幣省志康憲寳慶人㓜孤事母雷曲盡其孝任廣元知縣寛洪簡易愷悌循良興學校惠小民民愛戴若慈母九載歸田恂恂謙厚雖待小兒亦必以禮人有非義愧不以聞治家嚴而有法尤敦婣睦周患急年八十四齒徳推重鄉評省志賀冕邵陽縣人有勇畧嘉靖十年流賊刼掠冕率弟璋并姪四人奮勇拒敵以後援不繼死之省志列女鄒氏武岡人段思禮妻孀時年二十四撫子肅領鄉薦景泰中事聞省志董氏邵陽人夏寅妻寅舉鄉試卒時董年二十無子妾劉氏年十八遺腹生子同心苦節撫孤成立以夀終省志余氏新化人劉大庭妻庭病劇泣下不言余知其意以死自誓撫子成名省志楊氏武岡人李録妻録為諸生楊歸甫八月録病籲天割股比殁楊年十九矢心以守冇司嵗以官租贍之省志仙釋盧侯二仙世傳秦始皇遣盧生入海求神仙藥不獲盧與侯生謀隠入邵陵雲山今山冇侯仙迹盧仙影秦人古道煉丹井飛昇臺掃壇竹皆其遺迹申泰芝唐洛陽人其母楊夣吞芝而孕故名與𤣥宗同誕日歴覽勝地後居佘湖山修煉𤣥宗感夣求得之賜號大國師住京師𤣥真觀屢著靈異白晝冲舉文斤晉南昌人號超然子咸安中為邵州髙平令嘗遇異人授以丹訣後棄官歸康寧二年仙去申仙翁洛陽人母夣吞靈芝覺而有娠唐垂拱二年生稍長去俗修道嘗遊南岳遇異人授金丹術𤣥宗夜夣湖南有白雲居士召至京師言論契合還山未㡬昇仙宋封妙寂靈修真人何大士營道人弱冠悟佛學宋慶厯間吕仙訪之相與指明宿植謂其為定光佛後身惟朝夕持念釋迦觀音名號有自來叅者率為偈以答之練提刑遇之言有所契大士云在家能出家火裏生蓮花後無疾而逝明一統志卷六十三
