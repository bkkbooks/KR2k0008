胡安國墓在隠山安國建安人仕宋累官至寳文閣學士致仕居衡山卒𦵏于此古蹟羅縣故城在湘陰縣東六十里春秋時羅子國秦立為縣漢晉皆屬長沙郡隋屬王州後屬羅州唐省益陽故城在益陽縣西南吳魯肅所築唐移于今縣治古戍城在湘潭縣南二十里垣壁遺址尚存相傳王莾嘗駐兵于此花石城在湘潭縣西一百六十里唐杜甫詩午辭空靈岑夕得花石戍碧湘門即府城門宋陶弼詩城中烟樹緑波漫㡬萬樓臺樹影間天闊島行疑没草地卑江勢欲沉山賈誼故宅在府城中濯錦坊舊有太傅井并廟尚存唐劉文房詩三年謫宦此棲遲萬古惟留楚客悲秋草獨尋人去後寒林空見日斜時司空仙蹟在司空山南齊張岊為司空棄官脩道挈家南嶽至縣東遥望山峯竒秀遂卜居放光山下梁天監中仙去有舊宅書堂遺址安化五寨俱在安化縣曰梅子口寨在縣西五里曰七星寨在縣東南七十里曰首溪寨在縣東北九十里曰白沙渡寨在縣西北一百二十里曰游浮寨在縣西南九十里五代時梅山蠻獠為邉患宋太宗討平之因立五寨以防禦焉石鼓在湘潭縣懸石山有巨石如鼓俗傳石鼓鳴則有兵興赤松壇在茶陵縣雲陽山相傳赤松子脩煉之所宋封凌虛真君元江存禮詩紫㣲峯畔赤松壇路入仙園杳靄間人世不堪思往事白雲長是繞孤山羅復元詩千古赤松子仙壇出翠岡鶴歸仙不返丹化井猶香鐵牛埠在湘潭縣南二十里下攝鎮江中有巨石儼然牛卧其形類鐵水涸則見仙人蹟在湘潭縣西南六十里石潭市前瀕江巨石上有仙人足蹟長一尺五寸指蹠儼存名宦漢賈誼文帝時為長沙王太傅有鵬飛入舍誼以為不祥作賦以自廣張機長沙太守時大疫流行治法雜出機著傷寒論金匱方行於世文春茶陵長慈仁汎愛郡人立碑以歌遺風孫堅為長沙太守時長沙賊區星自稱將軍衆萬餘攻圍城邑堅親率將士設施方畧旬月之間克破星等周朝郭石亦起於零陵桂陽遂越境尋討三郡蕭然三國廖立長沙太守昭烈入蜀諸葛亮鎮荆州吳孫權遣使通好於亮因問士人誰相經維者亮曰龎統廖立楚之良才當賛興世業者也晉司馬承元帝時為譙王監湘州先是湘土荒殘公私困弊承躬自儉約乘葦茭車而傾心綏撫甚有能名陶侃咸和中都督八州軍事封長沙郡公侃勤吏職百姓勤農家給人足謝安都督長沙處置得宜經逺無競進都督十五州事南北朝裴昭明宋長沙郡丞有清名及罷任貧無還資謝眺南齊武帝時有忝役湘州與宣城吏民别詩王琳梁湘州刺史果勁絶人又能傾身下士平侯景之亂功為第一唐褚遂良顯慶初以諌髙宗立武后出為潭州都督崔瓘大厯中遷湖南觀察使豈弟脩政理行第一時將吏習寛弛不奉法瓘以禮法繩之下多怨後遇害李巽潭州刺史有遺愛碑銘序云公下車而安已日而孚期月而政成徳風下偃恊氣旁逹楊憑長沙郡守韓愈稱其領湖南壤地二千里徳刑之政並勤爵祿之報兩崇乃能存志乎詩書寓辭乎歌詠所謂才全而能鉅者也楊儀之湖南度支使韓愈稱其智足以造謀才足以立事忠足以存下而又侈之詩書六藝之學裵休乾符間歴荆南節度使鎮長沙不為皦察行所治吏下畏信五代周行逢唐時為武平軍節度盡心為治所用官屬率皆亷介之士條教簡約民悅之宋何承矩太宗朝知潭州凡六年囹圄屢空詔嘉奬之李沆通判潭州掌漕趙昌言謂其有台輔之量表聞於朝馬知節以供奉官監潭州兵時何承矩為守以文雅飾吏治知節慕之因折節讀書劉審瓊知潭州州素多火日調民積水為防民甚勞之審瓊至悉罷之以為民便李允則真宗時知潭州初馬氏暴歛州有地稅屋稅及枯骨稅允則請除三稅民皆便之湖南飢發官廩先振而後奏募為軍者得萬人劉師道知潭州長沙當湖嶺都㑹師道敏於吏事剖煩析滯案無留牘張詠知益陽縣時江水泛溢湮没縣治詠禱于神應時而退民懷其惠建閣於决水處名曰壓波魏廷式知潭州湖南地土衍沃民喜訟產有根柢巧偽難辨者廷式立裁之吏民咸服楊覃知潭州王師討宜賊軍湏多出長沙曹利用以聞詔書褒勞劉沆慶厯中湖南蠻猺數入宼以沆知潭州兼安撫使許便宜從事蠻酋多降陳希亮天聖間知長沙縣有僧出入章獻后家恃勢據民地希亮捕冶寘諸法一縣聳服劉夔知潭州兼湖南安撫使初至遣人諭蠻酋使降不從乃率兵進討破其巢穴州境獲安周沆知潭州他道兵來戍者率兩期乃代多死瘴癘沆請以期為斷戍人便之王罕知潭州為政務適人情不加威罰有狂婦數訴事出言無章前守毎叱逐之罕獨委曲徐問乃為人妻無子夫死妾有一子遂逐婦而據家資屢訴不得直因憤恚發狂罕為治妾而反其資婦良愈郡人傳為神明馬亮知潭州屬縣有亡命卒剽攻為鄉閭患人共謀殺之事覺發當死者四人亮曰為民去害而反坐以死非法意也咸貸之齊廓提點荆湖南路刑獄潭州鞠繫囚七人為强盗當論死廓訊得其狀非强付州使劾正乃悉免死唐介通判潭州有巨賈私蓄明珠太守而下輕其估悉售焉介獨不售偶分珠獄發仁宗謂近臣曰唐介必不肯買奏至果然劉元瑜知潭州猺人數為宼元瑜使州人揚謂入梅山說酋長四百餘人出聴命因厚犒之籍以為民凡千二百户趙抃武安軍節度推官有造偽印者吏以為當死抃曰造在赦前用在赦後赦前不造赦後不用法不當死遂以疑讞之卒得免樂黄目知荆南徙潭州處劇無敗事時長沙月給减於荆渚特詔増之又諭以兵賦繁綜寄任之意何正臣知潭州時詔州縣聴民以家貲易鹽吏或推行失㫖正臣條上其害寢之民以為便任顓知潭州宣撫司以宣毅卒有功檄補軍校顓察其色動曰必有異志執按之具服為賊内應蒐其家得所記潭事甚悉梟首以狥吳中復通判潭州亷於居官中丞孫抃聞其賢薦為御史初不相識也或問之抃曰昔人耻為呈身御史今豈有識面臺官耶余良肱知湘陰縣民逋米數千石嵗責里胥代輸良肱論列之遂蠲其籍李南公知長沙縣有婺婦携兒以嫁七年兒族取兒婦謂其前子訟於官南公問兒年族曰九嵗婦曰七嵗問其齒曰去年毁矣南公曰男八嵗而齓尚何爭命歸兒族張連攸縣尉髙宗南渡劇賊王在據岐山潭州帥徴兵戍岳運將二千人先至賊遂平向子諲建炎中知潭州禁卒為亂縱大掠市出瀏陽縣子諲遣通判孟彦卿等追及攸縣平之劉玠潭州將官建炎中金人䧟潭州玠挺身血戰中數十矢死於陣民為立廟張栻作記吕頥浩湖南安撫制置大使兼知潭州時郴衡桂陽盗起頥浩遣人悉平之岳飛權知潭州兼荆湖安撫都總管招劇盗曹成成聞飛將至驚曰岳家軍來矣即分道而遁飛至茶陵招之不從乃掩擊大破之成走宣撫司降韓世忠以荆湖宣撫副使駐兵長沙時賊劉忠有衆數萬據白面山世忠大破之斬忠湖南遂平孟彥卿建炎中通判潭州潰兵杜彥叛侵長沙彥卿與添差通判趙民彥領兵擊賊死之賊以二人力戰之故後不敢窺潭州張浚紹興末以觀文殿大學士判潭州時金騎充斥王權兵潰乃改命浚判建康浚行至岳遇東來者云敵兵方焚采石慎無輕進浚曰吾赴君父之急知直前求乘輿所在而已勾濤知潭州秦檜嘗令人諭意欲與共政濤以書辭謝而上書論時事之害政者凡五髙宗嘆其忠劉珙知潭州兼湖南安撫使發兵討平郴盗為政精明果斷喜受盡言事有小失下吏言之立改民愛之若父母徐夢莘紹興末知湘陰縣㑹湖南帥括田號増耕稅他邑奉令惟勤夣莘獨謂邑無新田租稅無從出帥恚攟摭其過莫能得由是反器重之李椿知潭州兼湖南安撫使撫摩凋瘵氣象一如盛時嵗旱發廩勸分蠲租十一萬糶常平米二萬活數萬人辛棄疾知潭州兼湖南安撫使盗連起湖湘棄疾悉討平之又兩奏疏湖南事宜詔委以規畫楊時隆興間知瀏陽縣有善政嵗飢發廩賑民部使者以催科不給抵罪民思之不忘曾孝序知潭州道州猺人叛乘髙恃險機毒矢下射於兩山間横巨木以守孝序夜遣驍銳兵攀援而上以大兵繼進破平之周必大淳熈間以觀文殿大學士判潭州必大雖去朝而名益重朱熹紹熈間知潭州㑹峒獠擾屬郡熹遣人諭以禍福皆降之申敕令嚴武備戢姦吏抑豪民所至興學校明教化四方學者畢至徐應龍湖南檢法官潭州獲刼盗自謀者妄指逸者為首及獲逸盗治之急遂誣服應龍閱實謂首從不明力與辨提刑盧彥徳不能奪曾從龍湖南安撫使安撫峒獠威惠並行興學養士湘人紀之於石真徳秀湖南安撫使知潭州以亷仁公勤勵僚属以周敦頥胡安國朱熹張栻學術勉其士罷𣙜酤免和糴以甦其民立惠民倉社倉慈㓜倉立義阡惠政畢舉董槐嘉熈中知潭州方三邉急於守禦督府日夜徴發民且困槐為畫策應之令民不傷而軍需亦不匱汪立信湖南安撫使兼知潭州供帳之物悉置官庫所積錢連嵗代潭民納稅貧無告者子錢粟病者加藥餌雨雪旱潦軍民皆有給務興學校士習為變劉潁簽判潭州時王佐為帥負其能盛氣以臨僚吏潁約以中道佐多屈而改為髙斯得湖南提刑薦通判潭州徐經孫等六人攸縣富民陳衡老以家丁粮食資强賊斯得發其姦將簿録其家㑹諸邑水災衡老願出米五萬石賑濟以贖罪徐經孫寳慶初為瀏陽主簿潭守俾部牙契錢至州有告者曰朝廷方下令頒行十七界㑹若此錢皆用㑹少湏則幸而獲大利矣經孫曰此錢出諸公庫吾納㑹而私取之外欺民内欺心可乎其人驚服有愧色後通判潭州帥陳鞾雅相知事必咨而後行彭友方茶陵主簿民輸潭州造船木以折嵗租江行千餘里其費數倍友方白䕶漕請節縣造舟漕而出之公私兩便向士璧湖南制置使兼知潭州元將烏蘭哈達自交趾比還前鋒至城下攻圍急士璧極力守禦又遣王輔佑率兵迎其後隊通於南岳市一戰有功潭州圍遂解李芾徳祐初知潭州兼湖南安撫使元大軍圍潭芾與諸將分守以忠義勉勵乘城死鬬凡七月餘至除夕元大軍登城衡守尹榖叅議楊震俱死芾召帳下沈忠曰吾分當死家人亦不可辱汝盡殺之而後殺我忠辭芾固命之乃如其言忠縱火焚其居還家殺妻子復至火所大慟自刎死潭民聞之多舉家自盡事聞贈芾端明殿大學上謚忠節元阿爾哈雅以荆湖行樞宻院事移兵長沙㧞湘陰破潭州諸將欲屠之阿爾哈雅曰是州生齒數百萬口若悉殺之非上諭巴延以不殺意也其屈法生之復發倉以食飢者其後田租茶稅皆詣闕奏减郡民徳之謝端延祐中同知湘陰州事猾吏束手不敢舞文法豪民無頼者逺避去部使者行部旁郡滯訟皆委端讞端剖决如流績譽籍然虞槃湘鄉州判官有富民殺人使𨽻己者坐之上下皆阿從槃獨不肯署殺人者卒不免而坐者得不寃有巫至其州言某方火某日大水以惑民槃乃斷巫如法楊處仁皇慶間知湘陰州下車首停荒田之稅興學勸民越三月訟簡獄空朞年逋賦皆足流農復業田野謳歌代去民愛慕不已王文彪知湘鄉州伸寃抑强士庶仰之如父母奸點畏之如雷霆亷介之名振駭湖湘本朝黄思讓洪武初以知州知湘陰縣勤理庶政善斷獄訟時兵燹之餘孜孜教化縣治公署皆其創置民不告擾觧印去至今思慕之吳顯洪武初改湘鄉州為縣顯亦以知州改知縣事處心公正律己亷勤招還流民墾荒田八千餘畆新建縣治澤遺後人滕揖洪武中知長沙府公直亷能當㡬善斷發奸擿伏如神在任六年訟簡賦均民安盗息闔郡畏而愛之劉清洪武中知長沙府蒞政勤謹躬表屬邑必使賦役均平毋虐小民獄訟詳明母枉良善去任民慕之如父母朱詡洪武間知湘潭縣亷潔自守門無私謁每食糲飯鹽蔬而已禱雨齋沭籲神三日即雨縣嘗有虎患吏請設檻穽詡曰猛獸虐人守令之過也惟修徳可弭之焚香致祝數日虎屏跡海源善洪武中知安化縣新設縣治勤於政事謂人肌膚受之父母何可毁傷乃以熟皮為鞭使知愧而已民愛敬之不忍欺焉劉燾永樂中知長沙府慈祥豈弟不施鞭朴有不善者但勸喻之人咸悅服秩滿去父老擁路垂泣爭挽其舟洪鈞長沙知府政通人和有甘露凝于郡齋林木土人賦詩以彰厥瑞省志宋綸宣徳中知湘隂縣時有採木之役民甚苦之綸區畫有方民不告勞而事克濟邑人頼之祀名宦祠省志徐亨正統中知茶陵縣抑强扶弱卓有風裁嵗歉募民之富而義者得榖五千餘石并出官帑以賑之多所全活又奏减田租民用頼以不匱省志韓璟天順中知湘陰縣開闢荒穢勸民耕種積榖以偹不虞天旱躬勤祈禱甘雨隨注至有年民頼以全活省志劉昇天順中主湘陰縣簿縣舊惟務水耕昇躬督開墾原野教以雜植民始知山原之利至今受其惠去之日囊無餘貲君子以為難省志周鈍成化初知長沙府時藩王初就國䕶從者驕肆侵奪鈍奮身執義伸士師之法以禁制之民乃安息省志陳鋼同知長沙府愷悌臨民嘗新崇道祠以祀朱張郡人薰徳多所造就去之日行李蕭然士民立去思碑省志王一言成化中知瀏陽縣為政以鋤强安善為先尤加意士類公暇輙與諸生講論經義無虛日多所成就政教俱善至今稱之省志汪道成化中知醴陵縣蒞政嚴肅奸猾束手吏抱案牘至多震慴不敢出聲敝政一洗境内晏然省志鄧萬斛𢎞治中知寧鄉縣民籍多詭入寄庒以避差役斛釐正之民徭用省鄉有父子五人皆為盗訪得其情遣人擒誅之盗乃息省志董豫𢎞治中知茶陵州州善訟捕其尤寘之法科舉士弗振者三十年乃聘名士為之師遷學宫以善地士人自是興起多文學矣嵗旱奏减租者再民甚徳之省志彭琢𢎞治中長沙府推官以俸入嶽麓書院置田養士清風苦節始終不異卒之日貧不能殮士民慟之省志李衍正徳初知安化縣明敏果斷恩威並至時流民因旱為盗衍捕獲正之以法餘黨皆遁境内晏然省志趙以敬正徳中知茶陵州清慎有為撫字不倦部使督逋賦值飢饉之后民不聊生敬乃悉官帑所藏者貸之民感其徳不數月而上納州無逋負民困亦甦去之日百姓遮道攀轅以數千計省志張宣正徳中知茶陵州力祛前吏貪習亷靜質直樽節愛養有古君子之風省志鄭晃正徳中長沙通判其母嚴于晃晃亦以清苦自持在官惟茹蔬啜粥一毫不敢茍取于人潔白之操始終如一省志流寓裵休孟州濟源人唐乾符間由太子少保分司東都歴荆南節度鎮長沙因僑寓焉朱葆光南陽人朱全忠簒唐葆光與唐舊臣顏蕘李燾數軰挈家南渡寓潭州毎正旦冬至必序立南嶽廟前南望號慟殆二十年後燾北歸葆光樂衡山之勝遂往家焉子昻仕宋為翰林學士張浚廣漢人宋髙宗時為相封魏國公寓君潭州因家焉浚都督諸軍事時奏以子栻主管權宜文字累官直秘閣後累遷秘閣修撰知江陵府鄧得遇卭州人宋徙居湘鄉累官靖江府元兵至得遇朝服南望拜辭書幅紙云宋室忠臣鄧氏孝子不忍偷生寧甘溺死彭咸故居乃吾潭府屈公子平乃吾伴侣優哉悠哉吾得其所沉于水而死人物漢梅鋗安化人髙祖時為長沙太守吳芮之稱忠鋗力為多古初長沙臨湘人光武時遭父䘮未葬鄰家失火初匍匐柩上以身捍火火為滅太守郅惲甄異之以為首舉陳平子長沙人為太學生病將亡謂其妻曰吾聞范巨卿烈士也可以託死吾没後但以屍埋巨卿户前乃裂素為書以遺式妻從其言時式出行適還省書見瘞愴然感之乃營䕶平子妻兒送䘮於臨湘𦵏畢而歸祝良長沙臨湘人順帝時為九真太守日南徼外蠻區憐等破象林殺長史良到單騎入賊中招以威信降者數萬人嶺外復平初良為洛陽令大旱良暴身階庭引罪乃雨其誠信如此桓階長沙臨湘人父勝為尚書著名南方階初為郡功曹太守孫堅舉階孝亷除尚書令父䘮還鄉里㑹堅擊劉表戰死階冐難乞堅䘮表義而與之階後歸魏武辟為丞相掾累遷尚書令封安樂鄉侯卒謚曰貞子嘉嗣弟纂散騎侍郎爵關内侯三國蔣琬湘鄉人從昭烈入蜀除廣都長昭烈嘗至廣都怒琬衆事不理諸葛亮曰蔣琬社稷之器非百里之才後為尚書郎亮駐漢中琬統留府事常足食以給軍中亮毎言公琰託志忠雅亮卒以琬為尚書令時新䘮元帥逺近危悚琬舉止如平日由是衆望漸服後封安陽亭侯卒謚曰恭晉鄧騫長沙人少有志氣常推誠行已刺史譙王承命為主簿承為魏乂所敗乂求騫甚急郷人皆懼騫笑曰彼新得州欲求賢耳乃往詣乂乂喜以為别駕歴武陵始興太守遷大司農子粲少以髙潔不應州郡辟命刺史桓冲卑辭厚禮請粲為别駕乃起應召以父騫有忠信言而無知者著元明紀十篇虞悝臨湘人王敦有異志譙王承為湘中刺史徴悝為長史敦遣其黨魏乂㧞長沙悝被執遂死之弟望亦為譙王承司馬督䕶諸軍舉兵討王敦力戰死及敦平詔贈悝襄陽太守望滎陽太守遣謁者至墓祭以少牢桓雄長沙人為譙王承主簿及承被王敦黨魏乂執送武昌雄與西曹書佐韓階從事武延並毁服為僮竪從承不離乂見雄姿貎長者因害之階延執志愈堅敦遣其黨王廙殺譙王於道階延親營殯殮送柩還都朝夕哭奠𦵏畢乃還易雄瀏陽人少為縣吏念無由自逹乃脫幘掛縣門而去後舉孝亷為州主簿張昌之亂執太守萬嗣將斬之雄與賊爭論曲直賊乃舍去雄後為舂陵令㑹王敦反雄首奮忠義起兵討之力屈城䧟為魏乂所虜送到武昌抗詞不屈敦遣人殺之王矩長沙人美姿容毎出遊觀者盈路初為南平太守預討陳恢有功遷廣州刺史將赴職忽見一人持奏謁矩自云京兆杜靈之矩問之荅稱天上京兆奉使召君為主簿矩意甚惡之至州月餘卒南北朝孫普濟南齊臨湘人居䘮未𦵏鄰火將及舍普濟號慟伏棺上以身蔽火鄰人往救之焚炙已悶絶矣累日乃蘇歐陽頠長沙臨湘人少質直以言行著稱慱通經史梁時從將軍蘭欽征討夷獠以功為直閣將軍湘衡五十餘洞不賔頠為都督悉皆平殄封新豐縣伯元帝嘗令朝宰各舉所知未對帝獨曰頠公正有匡濟才恐蕭廣州不肯致之乃授武州刺史後封始興縣侯陳天嘉中卒贈司空謚曰穆唐歐陽詢潭州臨湘人㓜敏悟絶人毎讀書輙數行同盡遂慱貫經史仕隋為太常慱士唐髙祖㣲時數與游既即位累擢給事中詢初倣王羲之書後險勁過之尺牘所傳人以為法貞觀初歴太子率更令𢎞文舘學士封渤海男卒年八十五歐陽通詢子儀鳯中為中書舍人累遷殿中監封渤海子天授初轉司理卿判納言事㑹以武承嗣為太子通固爭忤諸武意下獄死之神龍初追復官爵通蚤孤母徐教以父書通乃刻意臨倣與父齊名號大小歐陽體戴簡長沙人以文行累為連帥所賔禮貢之澤宫而志不願仕好孔氏書旁及莊老莫不總統嘗有堂因東城為池環之九里遊覽之勝於是為最桞宗元作記五代徐仲雅其先秦中人徙居長沙馬希範辟置幕府年方十八因語及公府制度奢僣太過引典故以規正之後邉鎬入長沙仲雅遂遯匿周行逢慕其名欲用為節度判官兩以疾辭終身不仕劉昌嗣湘鄉人漢時為磁相二州刺史漢隠帝遇害昌嗣憤之即避地衡山馬氏招以賔禮不赴周行逢逼以偽禄昌嗣曰吾嘗致身漢氏縱不能為夷齊獨不可效梅福乎及改姓范號愚叟躬耕給粥饘以終身焉宋徐偉臨湘人事母至孝母死毁瘠至嘔血服除舉孝亷不就去之陸渾縣鮮落山中教授生徒依之以居者三百餘家嵗荒貧不舉子者偉資給之人感其惠所舉子皆以徐為名偉有八子皆知名時號徐氏八龍路振湘潭人父洵美事馬希杲署連州從事謝病終振淳化中舉進士太宗試巵言日出賦就試者􅌓眙振所作獨典曕擢甲科通判邠州後擢知制誥文詞温麗屢奏賦頌為名軰所稱尤長於詠詩有集二十卷鄧咸湘陰人天禧間縣未有學咸創義學於縣南置書招師訓族子弟及游學之士馮京鄭獬嘗肄業焉姪珙為豐城主簿夜聞庫丁聚哭詰之曰失官錢三百貫恐獲罪珙盡以錢代之還官其人感惠以二女獻不納時論嘉之胥偃長沙人少力學舉進士甲科授大理評事屢遷翰林學士權開封府忻州地震偃言此陽不勝陰之效元吴叛請遣使問罪然後加兵未仕時家有良田數十頃既貴悉分與族人歐陽脩始見偃偃愛其文妻以女胥元衡偃子有學行能自立累官尚書都官員外郎并其子茂諶俱早卒偃妻直史館刁約之妹與元衡婦韓茂諶婦謝凡三世皆寡居丹陽閨門有法江淮人至今稱之狄棐長沙人舉進士甲科累官太常少卿知廣州遷龍圖閣學士歴知河中河南府有貴人過河中言將援棐棐退謂所親曰吾湘潭一寒士今官侍從可以老而自汙耶弟栗歴官大理寺丞子遵度篤於學好為古文著春秋雜說有集十二卷丁雋醴陵人習春秋時稱丁三傳兄弟十七人義聚三百口家無間言大中祥符中詔旌表門閭蕭注瀏陽人豪邁不覊善屬文詩尤清絶登慶厯四年鄉薦授番禺尉值儂智髙反注募兵力戰連挫賊鋒累立竒功進官廣帥西上閤門使畢田長沙人慱學有文尤工於詩真宗朝以吏部兼王府侍講一日居經筵值天寒奏蠲臨湘七都科調里人徳之因祀焉李受瀏陽人治平中累官至天章閣待制兼侍讀神宗立進給事中龍圖閣直學士上言臣在先帝時年已七十不敢竊祿以自安今又加數年筋力憊矣惟陛下哀之於是拜刑部侍郎致仕卒年八十贈工部尚書鄧忠臣湘陰人登熈寧三年第為大理丞以獻詩賦擢正字遷考功郎中覆范宣公謚議㑹黨論起以罪入元祐黨籍後贈直秘閣别號玉池先生彭天益攸縣人登元祐三年鄉薦崇寧初為太學慱士以議論不合出為湖南提舉大觀初上封事力言權姦誤國年五十即致仕居司空山翛然有物外意所著冇瑞麟集鄧淵湘陰人登崇寧三年第為鄜延經畧司機宜入奏邉機徽宗嘉其敏㨗除國子丞遷虞部貟外郎大觀初星變束直言淵上封事剴切蔡京惡之左遷監酒終知懷州譚世勣長沙人父章慱覽經史散財賑貧封朝奉大夫世勣舉進士教授郴州累遷中書舍人徽宗禪位東幸且還請辯正宣仁謗史遷給事中兼侍讀金人内侵何㮚建言分置四道都總管世勣不可改禮部侍郎及張邦昌僭國令直學士院世勣稱疾卧不起以憂卒建炎初贈端明殿學士謚端潔所著有文集奏議及師陶集譚申世勣從父政和五年進士為王府贊讀張邦昌僭位以申為屯田郎中宣諭京東力却之㑹世勣死節申﨑嶇兵間䕶柩歸葬後守瑞州嵗飢民不能輸租申罷催監司督愈急申坐降秩復致仕歸昭潭王以寧湘潭人父長孺守靖州因言事落職以寧由太學任鼎澧帥幕溪蠻嘯聚以寧單騎入賊巢覊致其酋靖康初金兵内侵羽檄召天下兵以寧至長沙走鼎州乞師躬率入援觧太原圍建炎中以宣撫司叅謀制置襄鄧招諭郡盗桑仲等來歸孫方武長沙人為州學正金人入城方武率居民連日巷戰金人四面縱火人皆竄伏惟方武挺身罵不絶口死之今祀于學丁公膺醴陵人紹興初為髙郵尉拒金兵力戰死之朝廷嘉其忠節官其子倚終衡山宰初靖康間倚弟公億與兄公萬避難于鄉賊得公萬縳之將就炮烙公億號呼願以身代賊義而舍之一家獲全鄧深湘陰人紹興中進士為太府丞出提舉廣東市舶汪澈薦其才擢潼川路都運使鹽酒虛額久為民害深請蠲除之守令貪汚即劾奏虞允文貽書云不畏强禦思濟斯民挺然之操未見近比後以朝散大夫終于家王容湘鄉人舉進士第一累官至禮部侍郎卒贈銀青光祿大夫龔輿湘陰人乾道五年進士剛介亷潔為浙東檢法隨憲按部郡饋遺皆不受憲聞大慚以其已受者還之後知萍鄉民户逋官賦輿以己俸代輸終福建運幹身後家無儋石之儲袁顯益陽人矮身長髯勇敢過人建炎間湘宼楊么猖獗顯請于縣宰魏舜臣團鄉兵以捍一日賊傾寨來戰顯極力鏖戰為賊所得賊欲用之顯罵賊不屈么置諸鼎鑊而死舜臣哀之具禮以祭李揆瀏陽人乾道二年領鄉薦授寧逺縣尉獲强盗十數或謂曰可用賞脫選揆曰殺人以榮顯吾不為也後累官至中書舍人湯璹瀏陽人淳熈中進士累官國子愽士時召朱熹為侍講未㡬辭歸璹上疏乞留由是見惡權相而璹之直聲亦大聞于時出知常州入為大理少卿進直徽猷閣卒璹負節槩生平奉祠閒居之日多於揚歴其屬辭務持大體不為阿曲史稱其有清風峻節焉易祓寧熈人淳熈中釋褐為翰林學士累官禮部尚書退閒三十年號山齋居士著書自娛有周禮周易總義易學舉隅禹貢疆理記漢南北軍制周禮釋疑等書吳獵醴陵人登進士第劉焞經畧廣西辟凖備差遣光宗時召試守正字上疏請覲重華宫後以秘閣脩譔知江陵府金人犯竟陵獵募死士分道夾擊金人退去吳曦以反誅命獵充四川安撫制置使兼知成都府召還卒謚文定蜀人思其政畫像祠之獵從張栻朱熹學有畏齋文集奏議六十卷丁仁醴陵人擢進士第累叅淮蜀制幕及髙沙之變仁諭以順逆降之知無為軍依城築堰郡人感徳名曰丁公堰繼解合肥之圍進知太平軍湖北漕使退居二十年卒年八十四賀徳英湘鄉人七嵗能文淳熈間父以訟繫獄乃詣縣自乞廷試以贖父罪令問所習對以通毛詩春秋語孟策與詩賦令各出一題援筆立就遂薦于朝與金起巖等同試徳英第一卒年十四皮龍榮醴陵人淳祐四年進士歴官資善堂直講入對言一過改而一善著百過改而百善融陞吏部侍郎封醴陵縣男景定初拜叅知政事封長沙郡公尋罷為湖南安撫使判潭州奉祠有文集三十卷楊大異醴陵人從胡宏授春秋嘉定中登進士授衡陽主簿調龍泉尉皆冇惠政移逺安邑有峒宼擾民大異以一僕自隨肩輿入賊峒諭以禍福皆願自新出降以功陞四川制置司叅議官元兵入成都大異從制使丁黼巷戰身被數創死詰旦復甦獲免後入對極言時政進直秘閣封醴陵縣男楊霆大異子少有志節授桂嶺主簿有能聲擢知監利縣以薦通判江陵府庶務叢集随事裁决徳祐初為湖南安撫司叅議與李芾恊力戰守善出竒應變城西北隅破霆麾兵巷戰増築月城復完策勵將士以死守之城破霆赴水死胡潁湘潭人兄顓有拳勇善弓馬以材武八官為趙范將數立戰功潁㓜機警中童子科紹定間登進士第歴官知平江府兼浙西提刑移湖南所至毁滛祠後為廣東經畧安撫使潮僧寺有大蛇能驚動人潁檄僧舁蛇至令曰爾有神靈當三日見怪及期蠢然遂殺之平生正直剛果愽學强記吐辭成文臨政善斷不畏强禦尹榖長沙人性剛直莊厲為賦風裁典雅登進士第調常徳推官知崇陽所至亷正有聲用薦擢知衡州需次于家潭城受圍帥臣李芾禮以為叅謀城將破乃與妻子訣令弟岳秀出以存祀闔門縱火自焚數百人往哭之多感激死義者陳道周湘潭人少孤家貧奉母至孝母殁廬墓自陶磚日成五枚歴四年甃墓髙三丈墓成而道周繼亡袝葬母傍鄉人立碑表之洞庭老人夷堅志卓彥恭嘗過洞庭月下有小漁舟過其傍卓呼問有魚否應曰無魚有詩卓喜曰願聞一篇可乎老人鼔枻徐去髙吟曰八十滄浪一老翁蘆花江上水連空世間多少乘除事良夜月明收釣筒欲邀喚之不可及矣張康湘潭人早孤力學旁通術數江萬里留夣炎皆推重之辟置幕下宋亡隠衡山元世祖遣中丞崔彧祀南嶽就訪隠逸具以聞召康至上都親試所學大驗授著作佐郎禮遇殊厚遷秘書監丞元歐陽𤣥瀏陽人八嵗即知屬文舉進士歴國子祭酒入翰林三拜承㫖脩實錄大典三史凡朝廷制誥多出𤣥手文章道徳卓然名世羽儀斯文贊衞治具與有功焉卒追封楚國公謚曰文有圭齋文集馮子振攸州人愽洽經史其為文當酒酣耳熱命侍者二三人潤筆以俟子振據案疾書隨紙多寡頃刻輙盡仕為承事郎集賢待制號海粟劉畊孫茶陵州人至順初進士尹臨武縣大興學校歴建徳徽州瑞州三路推官所至政績卓然轉寜國路賊攻寧國城䧟死之弟燾孫為常寧州學正賊䧟常寧亦死之其子碩為江夏縣魯湖大使起義兵援茶陵又死之本朝張啓善化人洪武中領鄉薦入太學授吏部主事以勤能著稱尋陞郎中操行愈慎官至浙江右布政使劉聲遠湘鄉人洪武中領鄉薦授梁山知縣有政績尋陞户部郎中才名益振永樂中進陞交阯左叅政復轉山東所至能聲赫然周謨瀏陽人愽通經史為士類所推洪武中薦于朝試其材可以大仕拜河南布政使左叅政張武瀏陽人豁逹有勇力稍渉書史為燕山䕶衛百户從靖難累功封成陽侯卒贈潞國公謚忠毅周幹瀏陽人洪武中貢入太學授山西布政司照磨亷慎有為大著才名永樂中歴陞浙江右布政使有惠政及民夏原吉湘陰人洪武中領鄉薦授户部主事歴陞本部左侍郎永樂初進陞尚書兼太子少傅宣徳中特加少保原吉歴事累朝眷遇日隆政事多所禆益為人徳性寛厚居家孝友在任務存大體與物無競公卿問雅量推其為最卒贈特進光祿大夫太保謚忠靖何楚英攸縣人登永樂己丑進士第拜監察御史克效勤勞特陞陜西副使歴遷雲南左布政使累賜勑褒之至今黔人猶稱其善政曹𢎞益陽人登永樂己未進士第仕刑部主事尋陞員外郎恭慎有聞宣徳間進陞本部右侍郎廵撫淮南安靜不煩逺近稱之易先湘陰人永樂初由太學生髙等選授交阯諒山知府平易之政足以得民進交阯按察使仍治諒山宣徳初交阯叛賊攻城先奮志不囘嬰城固守糧盡闔家同死事聞遣官諭祭追贈廣西右叅政王偉攸人父戍燕時偉年十二獻平敵頌文廟嘉之充翰林院秀才登進士為兵部主事有異才以征討功進本部侍郎省志羅琥茶陵人正統中通判南陽積粟麥三十萬石撫綏禺民萬餘户築封丘堤八十餘里改衢州以擒賊功進南京户部郎中㑹尚書缺署部事諸司咸祗令焉省志賀勛湘鄉人景泰丙子鄉薦第一人歴官雲南叅政以直著聞與俗寡合引疾還家屏居一室環堵蕭然省志李東陽茶陵人曾祖以戎籍𨽻金吾遂居京師舉順天鄉試第進士二甲第一選庶吉士授編修歴官侍講侍讀學士禮部尚書轉吏部歴事四朝内沮權鐺外殱巨㓂每抗疏論列皆人所難言而亦多見俞允焉卒贈太師謚文正省志劉端寧鄉人性至孝領天順己卯鄉薦授潮州府同知聞父訃即匍匐歸廬墓三年服闋改西安府開涇陽廣惠渠引涇水溉五邑田七千頃民立生祠祀之致仕歸囊無遺帛而嵗享必豐潔事聞旌表其門省志黄寳長沙人成化甲辰進士歴吏部文選郎中藻鑑洞朗累擢都御史廵撫陜西清壁疊逺烽燧且扼北方西戍之中吭以倚角之秦地用寧以忤逆瑾罷歸瑾誅復起廵撫山東移疾卒省志羅安益陽人成化戊戌進士授户部主事使兩廣以清幹稱累官貴州叅政所至亷能拜金帛之賜省志羅鑑茶陵人成化進士授南刑科給事中累遷四川布政使所至均賦役練戎政撫孤獨不為赫赫名而人被實惠進副都御史以忤瑾罷瑾誅復起廵撫尋以病致政省志夏崇文原吉孫成化戊戌進士官至太僕少卿嘗條陳時務五事屬星變上言敬天惟在孝思用舍賞罰務守祖宗成法時論韙之省志劉憲益陽人成化戊戌進士拜監察御史歴陞僉都御史廵撫寧夏值北軍入境憲募土兵禦之于花馬池㨗聞賜金帛有差後忤逆瑾逮繫詔獄卒省志邵敏湘陰人事母孝母没廬墓側三年一夕有虎來墓所敏了無懼色忽數鹿來逐之去墓傍産芝數本人以為孝感所致成化間旌其門省志徐廷用醴陵人𢎞治癸丑進士授户部主事陞郎中嘗焚香却金宣大用兵佐理軍餉邉事克濟以疾卒無以為殮所著有未齋稿東曹奏牘省志易舒攸縣人𢎞治乙丑進士選庶吉士授檢討詞翰冠絶當時不屈逆瑾出為南京户部主事瑾敗復入為翰林聲稱藉甚尋以親老歸省志孫泰醴陵人𢎞治乙酉鄉舉知銅梁多惠政隣邑民爭訟子庭持身清苦在任十年惟一僕自随拜監察御史省志楊志學長沙人𢎞治初進士授户部主事歴陞都御史入為户部侍郎陟尚書扈從聖駕大狩興都督餉免租民䝉其澤子守謙守約守魯俱中甲科省志龍誥攸縣人正徳初知臨川縣時東鄉盗起不煩兵而定擢户部主事歴郎中出知廬州府嵗荒出賑奏罷馬價等賦全活者數百萬人累陞廣西叅政以病乞休卒于家所著有東洲奏議省志張治武陵人正徳庚辰㑹試第一人選庶吉士授編脩左贊善累陞南京吏部尚書入為文淵閣大學士進太子太保以疾卒博洽有文詞明習典故語及治亂毅然以經濟自許人亦以此期之卒賜祭葬謚文毅省志楊守謙志學子嘉靖中進士歴官兵部郎中擢督學副使累遷僉御史督保定軍務㑹北騎南牧卒逼都城守謙擁兵横絶營塞京都遂定晉兵部右侍郎尋以逗遛詔獄伏辜時論惜之守謙以學行稱聞雖赴敵蹈死不悔其樸忠足嘉云省志周采寧鄉人嘉靖己丑進士歴禮科都給事中端雅沉毅入奏務持大體出補㕘政歴四川左布政使時附和風熾采不能殉踰六年進副督御史廵撫雲南以鎮靜得民病歸卒省志魏煥長沙衛人嘉靖己丑進士授嘉興府推官歴兵部員外郎擢四川僉事貞夷簡溫不以才智自見明習當時之務所在毅然身任之留心邉防能言勝敗之故至四川力振風裁無何卒所著有九邉圖考蜀東撫夷錄皇明拱衞録省志列女尹虞二女晉長沙人虞始興太守起兵討杜弢戰敗二女為弢所獲並有國色弢將妻之女曰我父二千石終不能為賊婦有死而已弢並害之趙淮妾長沙人逸其姓名宋徳祐中從淮戍銀樹埧淮兵敗俱執至𤓰洲元將使淮招李廷芝不從為所殺棄尸江濵妾偽入軍帳中告曰妾夙事趙運使今其死不葬不能忘情願掩埋之當終身事公無憾矣軍校憐之使數兵輿至江上妾聚薪焚淮骨置瓦缶中自抱持操小舟至急流仰天慟哭躍水而死于同祖妻姓曹氏茶陵人父徳夫教授湖湘間同祖在諸生中因以女妻焉元至正末茶陵䧟曹氏聞婦女多被驅逐謂其夫及子曰我義不辱身以累汝也顧舅年老汝等善事之遂自剄死妾李氏驚抱持之不得亦引刀自剄死段氏劉頎妻茶陵人進士劉畊孫之子至正末紅巾賊起段被執自沉于水賊救之得不死釋之無何賊再至驅逐婦女段獨罵賊死之數日家人得其屍面如生叅將許某為殮葬有司奏聞旌表省志鄧氏梁尚志妻名靜邵陽人鄧早寡姑以家貧欲奪其志鄧指天泣誓撫㓜養姑終其身正統九年旌省志段氏瀏陽陳忠妻年二十三夫亡誓不改節孀居三十六年節行無瑕天順初事聞旌表其門省志洪氏諸生龍天衢妻攸人年十七歸龍甫期年而天衢以病故無子洪葬夫之日即築墳夫側以死自誓隆慶間有司奏聞旌表省志羅氏諸生曹道妻益陽人年二十四而道亡羅誓不再適守節五十餘年雖至親相見不踰閫閾萬歴元年有司奏聞旌表省志仙釋緱仙姑長沙人入衡山脩道年八十餘孑然無侣居傍南嶽魏夫人仙壇忽一青鳥飛來自言我南嶽夫人使也以姑脩道精苦命我為伴毎有人遊山青鳥必預言其姓名一日曰今夕有暴客至姑無怖果有羣僧持火挺刄將害姑姑在牀上僧不見而出俱為虎所害姑徙居湖南亦隨之後隠九疑莫知所終邵琥宋湘陰縣人少與兄玘弟珪同遊太學遇至人後歸都嶠山卓菴脩煉元符初蘇軾自嶺表歸訪琥庵中留旬餘琥後立草庵西蜀峨眉山遁去不知所終