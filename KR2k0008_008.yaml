body:
  text: 明一統志卷八明李賢等撰蘇州府東至東沙海岸三百一十四里西至常州府宜興縣界一百里南至浙江嘉興府秀水縣界九十四里北至揚州府通州界一百五十里自府治至南京五百八十八里至京師四千八十里糧二百五十萬二千九百石零建置沿革禹貢揚州之域天文斗分野周泰伯仲雍始居之地武王封仲雍曽孫於此為吳國自闔閭以後並都焉戰國時屬越後屬楚秦置會稽郡治吳漢初因之尋改屬江都東漢順帝始分此為吳郡三國屬吳晉宋齊梁皆為吳郡陳置吳州隋開皇中改曰蘇州因姑蘇山為名大業初復曰吳州尋改吳郡唐武德中復為蘇州置都督天寶初改吳郡乾元初復為蘇州尋分置長洲軍大厯中軍廢南唐升為中吳軍宋太平興國中改為平江軍屬浙西路政和中改平江府元至元中改平江路𨽻江浙行省本朝吳元年改為蘇州府直𨽻京師領州一縣七吳縣附郭本吳國秦置吳縣為會稽郡治東漢永建中置吳郡治此晉宋齊因之陳於縣置吳州隋唐屬蘇州宋為平江府治元仍舊本朝因之編户五百十一里長洲縣附郭本吳之長洲苑漢為吳縣地自晉至隋皆因之唐萬嵗通天初析置長洲縣乾元間置長洲軍大厯間復為縣宋元仍舊本朝因之編户七百四十一里崑山縣在府城東七十里秦為婁縣地屬會稽郡漢因之晉屬吳郡梁天監中置信義縣大同初又分置崑山縣以山為名隋初二縣俱廢尋復置崑山縣屬吳郡唐屬蘇州宋屬平江府元升為崑山州本朝洪武初改為縣編户三百四十四里常熟縣在府城北八十里本漢吳縣地晉初分置海虞縣屬吳郡東晉又分置南沙縣屬晉陵郡梁又分置常熟縣屬信義郡隋徙常熟治南沙而以海虞縣省入屬蘇州唐武德間移治海虞城宋屬平江府元升為常熟州本朝洪武初復改為縣編户四百八十里吳江縣在府城南四十里本漢以來吳縣地五代梁開平間吳越王錢氏始奏置吳江縣宋屬松江府元升為吳江州𨽻平江路本朝洪武初復改為縣編户五百六十七里嘉定縣在府城東一百四十里本隋唐崑山縣地宋嘉定間始析置嘉定縣以年號為名屬平江府元升為嘉定州本朝洪武初復改為縣編户六百六十八里太倉州在府城東一百八十里本崑山常熟嘉定三縣地本朝吳元年立太倉衛洪武十二年又立鎮海衛𢎞治十年始析崑山之新安等三鄉常熟之雙鳳鄉嘉定之樂智等二鄉置為州屬蘇州府編户二百七十五里領縣一崇明縣在州東二百八里本海中姚劉沙地宋屬通州嘉定中置天賜鹽場改屬浙西提舉司或屬淮東制置司元至元間置崇明州屬揚州路本朝改為縣洪武八年改屬蘇州府𢎞治十年置太倉州因𨽻焉編户一百一十里郡名吳會世稱吳門為吳會謂其地本吳㑹稽二郡也姑蘇以山名吳郡東漢名平江宋名形勝藪曰具區浸曰五湖周禮職方氏三江雄潤五湖腴表晉周處風土記南近諸越北枕大江漢武帝賜嚴助書川澤沃衍有海陸之饒隋地理志松江大湖水國之勝吳江主簿㕔壁記山川表明麗湖海吞大荒唐韋應物詩旁連湖海外控江淮宋徐嚞詰詞東際大江西控震澤宋地理志風俗風俗清美舊圗經泰伯遜天下季札辭一國德之所化者逺矣更厯晉漢以來風俗清美俗多淫祀漢第五倫傳尚文尚佛續圗經因士類顯名於厯代而人尚文因僧徒倡法於羣山而人尚佛土風清嘉晉陸機詩山澤多藏育風土清且嘉泰伯導仁風仲雍揚其波人有恆産多奢少儉舊志俗奢靡急圗利宋志俗奢靡而厚於滋味急圗利而巧於竒技俗好用劒元常熟州志俗好用劒輕死蓋湛盧屬鏤干將要離之遺風山川虎丘山在府城西北九里一名海湧山中有劒池千人坐石越絶書吳王闔閭葬山下葬三日白虎蹲踞其上因名或云秦始皇嘗登此將發吳冢有白虎出焉陳顧野王序有云髙不抗雲深無藏景卑非培塿淺異疏林路若絶而復通石將斷而更綴抑巨麗之名山大吳之勝壤也唐白居易詩怪石千僧坐靈池一劒沈海當亭兩面山在寺中心宋蘇軾詩入門無平田石路穿細嶺隂風生澗壑古木翳潭井湛盧誰復見秋水光耿耿鐵花秀巖壁殺氣噤蛙黽岝崿山在府城西南一十五里又名獅子山吳王僚葬於此橫山在府城西南二十里據湖山之中山有五塢曰飛泉修竹丹霞白雲芳桂又有明因院及寶積寺天平山在府城西二十里巍然特出羣峯拱揖最為崷崒郡之鎮也宋蘇舜欽詩吳㑹括衆山戢戢不可數其間號天平突兀為之主傑然鎮西南羣峯爭拱輔吾知造物意必以屏大府本朝髙啓有遊天平山記黃山在府城西南二十五里俗稱筆格山隋末王世充破劉元進坑其衆於黃亭澗即此支硎山在府城西南二十五里有南北東中四峯即此山支隴山舊有寺基宋咸平中碑云即東晉支道林所建支硎寺靈巖山在府城西南二十五里又名硯石山乃吳王館娃宫故地舊志云下瞰太湖望洞庭兩山滴翠叢碧在白銀世界中亦宇內絶景山有西施洞玩花池採香徑及琴臺諸勝唐韋應物詩始入松路永獨欣山寺幽不知臨絶檻乃見西江流吳岫分烟景楚甸散林邱方悟關塞眇重軫故園愁錦峯山在府城西二十五里宋理宗以尚書鄭起潛墓所在書錦峯二字以名山陽山在府城西北三十里一名秦餘杭山又名四飛山産白堊可用圬墁故亦曰白墡山吳越春秋越王葬夫差於此山髙啓詩我登此山顛不知此山髙但覺羣山總在下坐撫其頂同兒曹又見太湖動我前洶湧三十萬頃烟波濤伏龍山在府城西三十六里俗名小白陽山左抱靈巖右帶穹窿前瞰太湖中俯平疇萬頃喬木古松䕃蔽林谷亦吳中之勝處山陽有寄心菴姑蘇山在府城西四十里亦名姑胥姑蘇臺在其上漢司馬遷嘗云登姑蘇之臺以望五湖即此穹窿山在府城西南六十里舊傳赤松子食桂實石脂於此山有福臻院宋米芾嘗大書詩於兩壁字畫竒逸山下有海雲菴菴前有二茶樹其一株皆連理蓋百餘年矣香山在府城西南六十里胥口相傳吳王種香處下有採香徑王嘗遣美人採香於此髙啓詩晨妝出採芳零露濕紅裳種徙山中品薰傳海外方抱筐歸蕙徑焚鼎薦蘭堂未足娛君寢西施體自香華山在府城西六十三里巖石竒秀望之如屏老子枕中記云此地可度難山半有池曰天池生千葉蓮昔人服之羽化髙啓詩靈峯可度難昔聞枕中書天池在其巔每出青芙蕖𤣥墓山在府城西南七十里一名鄧尉山山峯四直林木䓤蒨前一石屹立太湖中若畫屏然山上有萬峯寺樓閣翬飛湖光掩映亦吳中佳處其山之隂名至理山山勢蜿蜒前瞰湖水對峙陽山光福諸山左右夾拱山雖北向隆冬入山其氯盎然光福山在府城西南七十里上有光福寺禹祈山在府城西南八十里舊志作禹期山相傳禹導吳江以泄具區㑹諸侯於此唐白居易詩萬代分明見禹心五湖傍注太湖深龍舟生㑹羣僚處徒想滄波見古今思夫山在府城西南八十里舊說秦人採藥此山不返其妻念之而死故名髙啓詩江上曽看望夫石湖中望見憶夫山夫君好採山中藥獨得長生竟不還不似蕭郎與秦女乘鸞同去彩雲間石公山在府城西南一百二十里山根有石如老翁立水中涸不露潦不沒故名唐陸龜蒙詩一片倒山屏何時隳洞門屹然空濶中萬古波濤痕洞庭山在府城西一百三十里太湖中一名包山漢書云下有洞穴潜行水底無所不通號為地脈道書以為第九洞天宋蘇舜欽水月院記中有山七十二惟洞庭稱雄其間民俗魯朴以橘柚為常産每秋髙霜餘丹苞朱實與長松茂樹相差間於巖壑間望之若圗畫內有甪里村毛公壇黿頭山洞庭西山支嶺也其麓有石闖出如黿首因名山産石有天然玲瓏者為花石宜雕琢擊之有金玉聲有色白而溫潤者為玉石堪為玩器有胎斑而光澤者可製硯馬鞍山在崑山縣北三里狀如馬鞍孤峯特秀極目湖海百里無所蔽山出玲瓏石梁沙門慧嚮居於此崑山在崑山縣西北境上晉時陸機陸雲生於此時人比之崑山出玉因名機思鄉詩云髣佛谷水陽婉孌崑山隂虞山在常熟縣治西北為縣之鎮一名海隅山越絶書巫咸所居又傳虞仲隱於此因名頂山在常熟縣西北一十八里本虞山之别峯山有齊女峯齊景公女葬此山産大栗名頂山栗福山在常熟縣北四十里形如覆釜舊名覆釡山梁乾化中改今名俗呼福山岡河陽山在常熟縣西北四十五里舊名鳳凰山花山在常熟縣北三十里相傳梁范冀居此因名寶山在嘉定縣東南八十里本朝永樂十年築有御製碑文其略曰嘉定瀕海之墟海舶往來最為衝要乃命海運將士相地之宜築土山以為往來之望樹以嘉木花竹蔚然竒觀民稱之曰寶山穿山在太倉州東北四十里山中有石洞前後通徹故名臨海記曰昔有海行者舉帆經其中今考其洞上猶通人往來卓筆峯在天平山髙啓詩雲來時似墨雁過還成字千載只書空山靈恨何事飛來峯在天平山髙啓詩風吹峩眉雲來依此山住我來不敢登只恐還飛去縹眇峯在洞庭山最髙又云杳渺峯峯頂有龍潭唐白居易詩登臨一望水滔滔還似蓬萊壓巨鼇遂認江流分笠澤界尋烟樹辨毫毛龍母峯在常熟縣西北一十八里山頂有龍祠羊腸嶺在天平山南如羊腸之曲故名攢雲嶺在洞庭山南青岡在崑山縣東北四十二里塗菘岡在常熟縣東南一百五里塗菘鎮大海在崇明縣海中潮汐所通俗謂之海㳌渺無涯際崑山常熟嘉定亦皆濱海新洋江在崑山縣東南六里自吳淞江流入本縣近嵗湮塞僅成小浦三江在崑山縣南九里禹貢三江既入震澤砥定唐仲初吳都賦注松江七十里分流東北入海者為婁江東南流者為東江併松江為三江其地今亦名三江口吳越春秋謂范蠡乘舟出三江口即此大江在常熟縣北四十里與通州對岸自福山港通至本縣北連大海吳江在吳江縣東源出太湖一名松江又名松陵江亦曰笠澤流經崑山入於海春秋時越伐吳軍於笠澤即此唐白居易詩震澤平蕪岸淞江落葉波在官常夢想為客始經過水面排罾網船頭簇綺羅朝盤膾紅鯉夜燭舞青娥姚城江在吳江縣東南三十里白蜆江在吳江縣東南青龍江在嘉定縣西南三十六里其水東通渡頭浦西連白鶴江白鶴江在嘉定縣西南三十六里其水南接青龍江北出吳淞江石湖在府城西南一十二里連越來溪舊志云范蠡所從入五湖者宋參政范成大隨髙下為亭觀湖山勝絶繪圗以傳孝宗書石湖二字賜之淡臺湖在府城南一十八里史記謂孔子弟子淡臺滅明南遊至江家於此後陷為湖陽城湖在府城東北二十里瀦浸廣闊溉田之利甚博來自吳淞江東流入於崑山太湖在府城西南五十里禹貢謂之震澤周官爾雅謂之具區史記國語謂之五湖圗經以貢湖遊湖胥湖梅梁湖金鼎湖為五魏韋昭以胥湖蠡湖洮湖滆湖與太湖為五吳虞翻云水通五道謂之五湖其地跨蘇常嘉湖四府界唐皮日休詩一舍行胥塘盡日行震澤三萬六千頃頃頃玻璃色宋蘇舜欽詩杳杳波濤閲古今四無邊際莫知深潤通曉月為清露氣入霜天作暝隂尚湖在常熟縣西南四里長十五里廣九里昆承湖在常熟縣東南五里廣長各十八里與尚湖相對俗謂之八字湖上湖在吳江縣南九里上承運河之水下流入新湖宋楊萬里嘗過此有詩長蕩湖在吳江縣西南七十里上承湖州諸溪水下流入太湖新開河在府城西三里南濠其水由閶門運河轉西北入楓橋運河運河在府城面一十里南違嘉興北接無錫太平河在崑山縣東北一十五里其源西自漢浦塘而來東流出古塘南新河在崇明縣北五十五里海水北流而入與北新河相通北新河在崇明縣北六十二里海水西流而入越來溪在府