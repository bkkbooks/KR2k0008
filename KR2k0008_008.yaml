江吳意栖筠乃張武備厚賫金帛勞杲軍杲懼悉衆渡江劉禹錫蘇州刺史以政績最賜金紫服王仲舒蘇州刺史隄松江為路變瓦屋以絶火災賦調常與民為期不擾自辦政為天下最于頔蘇州刺史罷淫祠濬溝澮端路衢為政有績皮日休吳郡從事與郡中名士陸龜蒙等唱和賦詩名曰松陵集自為序劉綺莊崑山尉研窮古今博考傳記作類書一百卷號崑山編狄兼謨文帝時蘇州刺史治有最績宋王禹稱太平興國中知長洲縣時同年生羅處約知吳縣公暇日相與賦詩篇什播於一時人多傳誦陳省華知蘇州時遇水災省華復流民數千户殍者悉痊之詔書褒美梅摯通判蘇州嵗饑官貸種食已而督償頗急摯言借貸本以行惠乃重困民可乎奏請緩期輸之後知是州閻象知蘇州知其風俗而揉以善政恩涵澤濡民以蘇息蔣堂再知蘇州清修謹飭遇事敢為不少屈好學工文詞延譽後進如不及孫冕知蘇州斷訟如神無所吐茹吏畏而民愛之甫及引年即拂衣歸九華朝廷髙其風詔再任竟不起徐奭兩浙發運使蘇州太湖塘岸壞及並海支渠多湮廢奭與江淮發運使趙賀伐石築隄浚積潦自吳江東赴海流民歸占者二萬六千户王質通判蘇州州守黃宗旦嘗以術鈎致得盜錢者百餘人下獄喜見於色質曰以術鈎人置之死而又喜仁者如是乎宗旦慚沮為薄其罪張方平知崑山縣慷慨有氣節著能名胡瑗蘇州教授教人有法科條纎悉備具以身先之嚴師弟子之禮視請生如其子弟諸生亦信愛之如其父兄從之游者嘗數百人鞠真卿知長洲縣有威名嘉祐中知蘇州政簡嚴無他施設而人自憚之蒲宗孟蘇州推官英宗以水災求直言宗孟謂臣隂象婦女隂類兵隂物閹宦隂之餘姦臣隂之極佞臣隂之本四夷中國之隂雨潦之變殆為是七者上疏極言之林肇熙寧中知吳江縣覽江湖之勝慨然有歸思乃即松陵勝處作鱸鄉亭繪三髙像於亭中遂具舟拂衣而歸王覿知蘇州治尚清簡一郡肅然民歌其政有吏行冰上人在鏡心之語洪彥升常熟尉奉母之官既至前尉欲申期三月以規薦而中分俸入彥升處僧舍却俸不納如期始交印章岵知蘇州時湖海暴風民多漂溺岵巡視賑恤請蠲田租人不失所鉏治姦吏豪右畏懾政以最聞下詔褒之向子韶知吳江縣蘇人私鑄黃錢流布一路子韶上書極言其害下令禁止一邑無敢犯者張克戩知吳縣吳為劇邑民喜爭大姓怙勢持官府為令者踵故習抑首務為不生事幸得去而已克戩一裁以法姦猾屏氣賈公望通判平江府有直聲時朱勔父子鼎盛公望有詩云正直士流少傾邪朋類多陽光一銷爍不復見妖魔朱大銜之竟罷去李光知常熟縣朱勔父冲倚勢暴橫光械治其家僮冲怒風部使者移令吳江光不為屈湯東野知平江府時吳中兵方驕兩卒入嫠婦家取酒壞釀器去東野立取格斬以徇於是列營懾肅莊徽知平江府朱勔蔑視州縣官吏徽獨不少假借勔深畏憚不敢讒張浚髙宗幸錢塘留朱勝非於吳門捍禦以浚同節制軍馬勝非尋被召浚獨留招集遺兵甫定會苗傅等作亂浚遂起兵勤王胡松年建炎間知平江府未入境貪吏解印斂迹以興利除害十七事揭於都市百姓便之汪應辰知平江府遇事特立不回韓玉被㫖㨂馬過郡應辰簡其禮玉歸譖之尋貶秩章誼知平江府時髙宗臨幸供費繁夥誼措置有法召對賜以帶笏又奏均本府稅役民皆德之向子諲知平江府金使議和將入境子諲不肯拜金詔上章言自古屈己和戎未聞甚於此時宜却勿受忤秦檜意乃致仕王㬇紹興中知平江府時兵火之餘凡公署學校靡不究心興葺録入城小舟出載瓦礫以培塘石之碎者焚灰泥壁不賦於民而用有餘其規為多類此洪遵紹興末知平江府時金兵窺浙涉師李捧請斷吳江橋或議塹福山以限敵兵遵曰審爾是棄吳之西也皆不行及李寶以舟師禦之遵之助力為多虞允文知平江府先是朝廷欲棄唐鄧海泗與金允文五上疏以為不可既而金兵至孝宗悔不用允文言梁克家平江府僉判時金主亮殁衆言可乘機進取克家移書陳俊鄉謂不量力而進將有後悔陳康伯嘆其慮逺張孝祥知平江府判決如流庭無滯訟屬邑大姓為奸利孝祥捕治籍其家得穀粟數萬明年吳中大饑迄賴以濟蔣璨知平江府禁戢姦偷鉏刈強梗善柔拊貧弱獄市為清省諸軍馬廏嵗更之費邦人德之李衡吳江主簿有部使者怙勢作威侵刻下民衡不忍以敲撲迎合投劾於府拂衣而歸謝深甫崑山縣丞為浙漕考官一時士望皆在選中司業鄭伯熊曰文士世不乏求巨眼如深甫者實鮮袁韶吳江丞提舉常平黃犖檄韶覆田以定役蘇師旦恃韓托胄威福密諭意言吳江多姻黨儻相容當薦為京朝官韶不聽常楙常熟縣尉公廉自持不畏彊禦部使者交薦之後知嘉定縣嵗大水勸分和糴按籍均敷徐鹿卿知平江府兼發運使居官廉約清峻毫髮不妄取胡潁紹定中知平江府臨政善斷不畏彊禦深嫉邪佞尤惡言神在郡毁淫祠以正風俗孫子秀吳縣主簿日詣學宫與諸生討論義理有妖人稱水仙太保郡守王遂將使治之莫敢行子秀往焚其廬碎其像沈其人於太湖曰實汝水仙之名矣妖遂絶陳塏知平江府兼淮浙發運使有政績戶部侍郎趙必願舉其治最遷太府卿包恢知平江府首以所得供堂緡錢盡償供帳之費節省浦課以補九任度支逋缺去官之日府庫剩錢六百餘萬黃震吳縣尉縣多豪勢家告私債則以屬尉民多饑寒窘苦震不受債家告府檄攝其縣及攝長洲皆有聲韓彥古知平江府至郡有士人持吏短長投狀以占能否彥古曰此狀汝不能為必有吏人為者其人錯愕即以實告於是捕吏杖之一郡以為神明蔡抗知蘇州並江湖民田苦風潮害抗築長隄自府城屬崑山亘八十里民得立塍堨大以為利王佐知平江府政聲第一尤長於聽訟時嚴酒禁有鄭氏以母病須酒飲藥民告其藏酒逮捕佐曰此必由家人漏言驗之果然得其姦狀而杖之王遂知平江府崇學校寬民力抑豪強正風俗時有村民妄言出神惑衆者又有盂蘭盆㑹皆禁絶之汚俗為之一變吳淵浙西發運使兼知平江府嵗大祲講行荒政全活者四十餘萬人吳濳知平江府條具財計凋敝本末以寬郡民與轉運使王野爭論利害元元童長洲縣尹盡力民事又勸募郡人陸德源建學而恢拓之邑人立碑以述其遺德王都中平江路治中時年甫十七僚吏見其年少頗易視之都中遇事剖析動中肯綮皆􅌓眙不敢欺學舍久壞都中募大家合錢新其禮殿偰傒斯崑山縣尹為政平恕凡境內忠貞孝義之事多所暴白時人賦崑山五詠以美之費復初知崑山州事政尚廉明推赤心以待人民敬愛之新建學宫作興士類本朝王興宗洪武初為蘇州知府器量宏廓吏卒有過諭之使愧赧既改又奬勸之人皆感德不敢犯法李亨蘇州知府性簡重臨事不迫薄於自奉治民有方不以喜怒加賞罰湯德蘇州知府剛介有為不屈於勢利崇教化明法令鋤奸去暴豪猾改行聽訟詳審獄無寃抑魏觀洪武間為蘇州知府深懲陳寧苛酷之弊一以寬厚為政明教化正風俗郡中翕然江恕崇明知縣抑豪強撫良善有守有為不苛不察鄭珇吳縣知縣廉謹有能政平訟理吏畏民服卓然可稱芮翀崑山知縣正直有局幹政不察察未嘗失民情劾暴繩頑扶顛舒困囹圄為之空虛去任民流涕不舍栁敬中知常熟縣修整學校勸士進業疏浚河渠便民生理以嚴馭吏以公均賦政聲翕然劉斡永樂初為長洲縣丞廉介剛直門無私謁衣粗食糲九年不變滿去民擁道哭送後以百姓請留仍為丞卒於官貧不能喪民為具棺斂送歸馬文炯為崑山知縣剛介有為政令嚴明姦孽屏跡民物熙洽疾卒民思慕之若其所生廖璉為常熟知縣寬厚廉勤門無私謁民感其政後升蘇州府通判葉錫厯吳江吳縣知縣為政一以經術先律己而後齊人大臣舉其治行超卓詔賜宴錫服而紀功於天官南畿志林鶚動由禮法雅好文學以儒飾吏未嘗為上官一屈膝時對下語必涉經史威儀之盛望之畏服南畿志况鍾為蘇州知府黜貪墨抑豪橫禁侈靡奏減重額官糧七十二萬石及遞年包荒糧十四萬石又奏免濶白三梭布七百匹其餘寬省逋缺疏上輒行代去軍民數萬人詣闕請留得再任卒於官民哀之如父母南畿志郉宥成化初蘇州知府郡大饑宥賑貸甚勤民賴以生流入境內者亦不失所他如刑名錢穀庶務繁夥處之綽然朝廷重其去加參藩之職賜敕仍知府事南畿志文貴成化間知吳縣施政有術逃亡盡復賦役均平儲糧至六萬餘石荒年有賴焉南畿志李端𢎞治間知太倉州時軍士強悍肆虐鄉民端一以法裁之崇明黃道恣劫殺人縣令莫能禁端計召立笞殺之境內帖服居官五年行李蕭然南畿志王術為嘉定縣令吏事明達邑有荒田千頃賦每責之里胥乃招徠逋民計畝闢墾仍給以牛種賦足而民不擾在任三年邑稱大治南畿志楊子器前知崑山縣後知常熟縣判疑獄毁淫祠兩邑政聲藉甚南畿志俞集正德間為令長洲愷悌愛民儉約節用蘇糧役之困革胥吏之姦民到於今稱之南畿志李一寧教授蘇州端方嚴重以身率人不示表暴不輕屈於上官郡守常稱之曰此真教授也南畿志張濬知常熟縣正財賦平訟獄罷贈遺民有兄弟競財者化感於庭願以所競財請治東門橋以謝過時久旱橋成雨乃洽足卒於任貧不能治喪民爭治之如父母然南畿志流寓梁鴻漢平陵人家貧尚節與其妻孟光俱入霸陵山中業耕織詠詩書彈琴自娛後去適吳依皋伯通居廡下為人賃舂光每具食舉案齊眉伯通察而異之乃舍之於家及卒伯通為葬焉戴顒山隂人父逵兄勃並隱遁有髙名顒出居吳下吳下士人共為築室聚石引水植林開澗少時繁密有若自然乃述莊周大旨著論自號吳中髙士錢藻吳越王元瓘五代孫自和州徙家姑蘇從學胡瑗宋舉進士纍官至翰林侍讀學士封仁和伯藻於書無所不讀為文閎放雋偉為人清謹寡過立朝無矯亢亦不雷同蘇舜欽開封人參知政事易簡之孫為人慷慨有大志長於古文歌詩行草書范仲淹薦其才為集賢校理監進奏院後坐事廢居蘇州作滄浪亭以自適李衡江都人仕宋為吳江主簿知溧陽縣専以誠意化民又厯知溫婺台三州致仕後定居崑山結草别墅聚書踰萬卷自號樂菴魏了翁邛州人慶元中進士纍官端明殿學士同簽書樞密院事封臨邛侯最後知福州在朝多所建明嘗賜第宅於蘇州所著有鶴山等集鄧若水隆州人博通經史嘉定中進士纍官太學博士屢言事出通判寧國府若水自知不為時所容到官數月以言罷遂不復仕隱太湖之洞庭山後歸蜀以捍賊遇害陳徵其先閬州人宋陳堯叟十三世孫徙家南康受學臨川吳澄研精經史考核百氏元時纍薦弗就遊吳遂家焉子惟寅惟允皆博學善詩文邵光祖其先河南人康節十世孫時從父宦遊吳遂家焉性夷易非聖賢之書不讀有得樂以教人吳中學者稱為五經師卒葬鄧尉山陳朴明州奉化人至正間與弟桱同遊吳遂家長洲桱博學有史才所著有通鑑續編尺牘筌蹄樓亦有味道編雲軒集王立中其先自京兆徙閬州再徙姑蘇博學善詩文由慈溪縣尉遷松江知府有廉介聲所著有息菴寓齊樨隱三集子璉璲璡皆至顯官人物周季札吳泰伯十九世孫父壽夢有四子長諸樊次餘祭次餘昧次季札壽夢見札賢欲立之札辭乃立諸樊復讓札謝曰曹人欲立子臧子臧去之以成曹君札雖不才願附於子臧之義諸樊卒餘祭立欲傳以次必致國於季札卒不受封於延陵故號延陵季子言偃吳人北學於中國受業孔子在文學科為武城宰以禮樂為教知滅明之賢而取之為聖門髙弟漢皋伯通吳人為郡之大家有賢行梁鴻與妻孟光至吳舍伯通家為人賃舂光每具食舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃舍之於家以實禮重之三國顧雍吳郡人從蔡雍學琴書為人寡言舉動時當仕吳厯合肥婁曲阿上虞長皆有治跡遷㑹稽郡丞行太守事吏民歸服孫權敬之嘗親拜其母於庭後為丞相凡十九年封醴陵侯卒諡肅侯張溫吳縣人父允輕財重士名顯州郡為吳東曹掾卒溫少修節操容貌竒偉纍官太子太傅以輔義中郎將使蜀蜀甚重其才顧徽雍弟少游學有才辨孫權召署主簿轉東曹掾權曰今孟德懷異意可揣之拜輔義都尉北與操相見操具問境內消息徽應對婉順乃厚待遣還官至巴東太守子容為鎮東將軍朱桓吳縣人孫權為將軍桓給事幕府除餘姚長民戴之以功封新城侯遷奮武將軍為人輕財重義愛養吏士卒之日舉營號慕子異為騎都尉以功遷揚武將軍復大破魏軍進大都督顧邵雍子博覽書傳好樂人倫少與舅陸績齊名吳孫權妻以兄女起家為豫章太守舉善而教風化大行能引拔賢士世稱其知人顧談邵子弱冠與諸葛恪等為太子四友吳赤烏中為在節度每省簿書屈指心計盡發疑謬薛宗以選曹讓談稱其才照人物德允衆望後祖父雍卒遂代為平尚書事顧承邵子吳孫權時與舅陸瑁俱以禮徵權賜丞相雍書曰貴孫令聞休休至與相見過所聞為君嘉之拜騎都尉後為吳郡西部都尉與諸葛恪等共平山越纍遷至侍中張儼吳人弱冠知名博聞多識仕吳為大鴻臚使於晉裴秀荀勗等欲傲以所不知不能屈羊祐何禎並結縞帶之好子勃撰吳録三十卷晉韋曜吳郡人少好學能屬文仕為太子中庶子又為太史令撰吳書顧榮雍孫父穆宜都太守榮機神朗悟與陸機兄弟同入洛時號三俊拜郎中厯尚書郎廷尉正俊元帝鎮江東以為散騎常侍顧衆榮族弟為王敦從事中郎不從其叛敦平加揚威將軍平蘇峻有功封鄱陽縣伯入為侍中尚書穆帝立進尚書僕射卒諡曰靖張翰吳縣人父儼吳大鴻臚翰有清才善屬文而縱任不拘仕為齊王冏東曹掾因秋風起思吳中蓴鱸遂命駕而歸時髙其志遭母喪哀毁踰禮人以孝稱顧和衆族子少有清操王導辟為從事賞其機警咸康初拜御史中丞劾奏左丞戴抗贓污百僚憚之尋遷侍中居任多所獻納加尚書令卒贈司空諡曰穆子淳厯官黃門侍郎球尚書郎孫敷著作郎張憑吳郡人祖鎮仕為蒼梧大守憑敏而有文舉孝廉䇿髙等謁丹陽尹劉惔處之下坐及發言一坐皆驚惔即延之上坐薦於簡文帝為太常博士官至御史中丞有文集十卷南北朝顧琛吳縣人曽祖和晉司空琛謹確不尚浮華仕宋起家州從事駙馬都尉元嘉中厯義興㑹稽吳興太守纍遷至都官尚書顧凱之吳縣人髙祖謙晉平原內史祖崇大司農凱之仕宋為謝晦衛軍參軍晦愛其雅素後為山隂令務簡而事理纍官吏部尚書覬之常謂命有定分乃以其意令弟子願作定命篇全景文吳郡人少有氣節仕宋為驃騎參軍以功封漢水侯泰始初假節寧朔將軍破東賊於晉陵後為髙平太守纍官給事中光祿大夫張裕吳縣人祖彭祖宋廣州刺史父敞侍御史裕厯官尚書郎元嘉初為侍中益州刺史入為五兵尚書卒諡曰恭子張邵裕弟為晉琅琊內史劉毅為相好士其門輻輳惟邵不往宋武帝聞而重之轉太尉參軍及帝受命以功封臨沮伯文帝時轉征虜將軍雍州刺史加都督卒諡簡伯張永裕弟厯官尚書中兵郎能文章善騎射為宋文帝所知拜揚威將軍加都督永志在宣力纍厯將帥與士卒同甘苦所得賞賜即頒與士卒弟辨厯官尚書郎大司農張岱裕弟厯官水部郎轉司徒掾母年八十輒去官有司欲糾宋武帝曰觀過知仁不須按也明帝時厯州刺史都督諸軍事齊髙帝知岱清直加給事中後進散騎常侍吳興太守卒諡貞子張暢邵從子仕宋厯官記室參軍沛郡太守元嘉中魏太武南侵義恭欲棄彭城暢曰如此是舍安就危乃止事平進吏部尚書封夷道縣侯卒諡宣子子浩為咨議參軍淹黃門郎張緒吳縣人清簡寡欲宋明帝時為太子中庶子大中正後遷中書令領國子祭酒緒長於周易言精理奧一時宗之張融吳縣人善草書玩涉百家弱冠有名宋時起為參軍後厯封溪令入為御史中丞融性至孝父母沒皆負土成墳所著有玉海集陸慧曉晉太尉玩之𤣥孫清介正直厯官諸府參軍尚書郎齊建元初遷太子洗馬纍輔五王為長史以禮處人厯東海太守五兵尚書終南兖州刺史陸厥父間慧曉從子為揚州别駕厥少有風槩善屬文齊永明中舉秀才傷父被刑感慟而卒陸澄吳縣人祖劭臨海太守澄少好學博覽或稱為書厨無所不知南齊永明初為度支尚書領國子博士後領國子祭酒卒諡曰靖陸倕吳縣人少勤學善屬文南齊永明中為護軍將軍兼司徒與謝眺等八人並以文學親侍纍遷給事黃門侍郎又為中庶子中正所著有文集顧憲之吳郡人凱之孫仕南齊為建康令斷盜牛者人稱神明厯衡陽內史風化大行還為太尉從事加建威將軍憲之性清直纍臨州郡資無儋石及歸環堵蕭然所著詩文并衡陽記數十篇張瓌吳縣人永子少有幹略纍遷桂陽內史不拜後為通直散騎常侍驍騎將軍梁天監初以給事中右光祿大夫致仕陸襄吳縣人仕梁為著作郎纍遷司空太清初拜度支尚書後以建義功追封餘干縣侯襄博學性至孝父母沒終身蔬食布衣不聽音樂陸雲公吳縣人九嵗讀漢書即能記憶從祖倕與沛國劉顯質問十事雲公對無所失顯嘆異之梁武帝召為儀曹侍郎纍遷中書黃門兼掌著作皇侃吳郡人少好學明三禮孝經論語仕梁為國子助教撰禮記講疏五千卷書成詔付祕閣召入壽光殿說禮記義武帝善之加貟外散騎侍郎陸杲吳縣人少好學工書畫梁天監初拜建威將軍尋遷黃門侍郎後以金紫光祿大夫領揚州中正卒諡質張充吳縣人少好遊逸後修改博學該通仕梁為太子舍人纍遷大司馬又拜散騎常侍國子祭酒充長於義理登堂講說皇太子以下王侯多執經問難卒諡曰穆張率吳縣人性簡重寬雅十二能屬文南齊時舉秀才纍官太子洗馬梁天監初遷司徒嘗為待詔賦武帝手敕曰相如工而不敏枚皋速而不工卿兼之矣遂遷祕書丞官至黃門侍郎有文衡十五卷文集四十卷顧協和七世孫好學能文沈約覽其策曰江左以來未有斯作厯官西陽郡丞參軍記室梁天監中拜散騎侍郎協安貧守靜卒無衾以斂諡曰溫子孫瑒吳縣人父修道梁中散大夫瑒倜儻好謀博涉經史侯景之亂王林表薦為宜都太守以功封富陽侯陳受禪徴入為侍中陸子隆吳人仕陳為中兵參軍屢立戰功都督張昭達與賊戰不利子隆來殺大破賊徒遷都督武官諸軍事封朝陽縣伯鎮荆州糾集夷夏甚得民和立碑頌功卒諡曰威弟子才有幹略厯官信州刺史子之武官至𢎞農太守張昭陳吳郡人與弟乾性俱孝父卒兄弟不衣綿帛不食鹽酢日食麥屑粥每一感慟人一嘔血服終又喪母哀毁如之家貧未得大葬遂衣布蔬食十餘年郡舉孝廉不就陸瓊吳縣人幼聰慧博學善屬文號為神童陳天嘉中以文學遷尚書殿中郎深為文帝所賞後為給事黃門侍郎轉中庶子領大著作撰國史瓊素清儉俸祿皆散之宗族卒之日家無餘財陸繕吳縣人幼有大志仕陳初為司馬遷給事黃門侍郎文帝嗣位拜太子中庶子領步兵校尉掌東宫管記纍遷左僕射卒贈侍中諡曰安陸琰吳縣人幼孤好學有志節仕陳以法曹參軍直嘉德殿學士世祖以其博學引置左右嘗使製刀銘琰援筆即成大建初為武陵王功曹史兼東宫管記時弟瑜為晉安王外兵參軍東宫學士時人比之二應張種吳縣人初為法曹參軍仕陳厯大府卿轉左民尚書髙帝即位為都官尚書遷中書令種仁恕廉靜而識量宏博時人皆以為宰相之器卒諡曰元弟稜亦沈靜有識度官至司徒左長史陸通吳縣人曽祖載隨劉義真鎮長安遂沒赫連氏父政事周文賜爵中都縣伯通少敦敏有志節纍以平寇功進爵綏德郡公後遷大司馬所得祿賜盡與親故嘗曰凡人患貧而不貴不患貧而貴也弟逞謹密蚤有名厯任三府所在著績亦進爵為公潘徽吳郡人性聰敏善屬文能持論陳尚書江總甚敬之及陳亡仕隋為州主簿秦孝王俊召為學士遣撰集寧書名為韶纂晉王廣復引為揚州博士令與諸儒撰江都集禮成徽為之序唐陸德明蘇州吳人善名理受學於周𢎞正陳大建中嘗入講承光殿唐髙祖時為國子博士後封吳縣男論撰甚多太宗閲其書嘉其博辨以布帛三百段賜其家張嗣宗崑山人唐髙祖鎮太原引為客授秦王經及太宗即位問君欲何官因謝不敢帝曰朕從卿授經卿從朕求官何所疑乃頓首願得國子祭酒遂授之永徽中致仕朱子奢蘇州吳人唐貞觀初髙麗百濟同伐新羅假子奢持節諭旨平三國之憾子奢有儀觀夷人尊畏之纍遷𢎞文館學士帝欲見起居紀録臧否子奢曰陛下所舉無過事雖見無嫌然以此開後世史官之禍可懼也朱佐日蘇州人仕為御史工於詩武后嘗吟詩曰白日依山盡黃河入海流欲窮千里目更上一層樓問是誰作李嶠對曰御史朱佐日詩也陸餘慶蘇州吳人祖珣仕陳為右將軍餘慶方雅博學舉制策甲科唐武后時擢監察御史纍官太子詹事中宗朝幸臣貴主斜封大行餘慶獨能以道自將雖仕不赫赫訖無悔尤陸南金蘇州吳人貞觀初為太常奉禮郎開元初以匿盧崇道按捕當重法弟趙璧自言匿崇道者我也御史怪之趙璧曰母未葬妹未歸兄能辦之我生無益不如死御史驚上狀𤣥宗皆宥之官至太子洗馬陸元方餘慶從子舉明經及八科皆中纍官監察御史武后時擢秋官侍郎同平章事以忤㫖下除太子右庶子進文昌左丞元方性清慎臨終取奏稿焚之曰吾隂德在人後當有興者陸象先元方子器識沈邃舉制科髙第景雲中同平章事恬靜寡欲議論髙簡為時所推𤣥宗時出為蒲州刺史兼河東按察使嘗曰天下本無事庸人自擾之耳澄其源何患不簡所至吏民懷之終太子少師陸景倩元方子仕為扶溝丞河南按察使畢構覆州縣殿最欲必得實有吏言狀曰某彊清某詐清惟景倩真清仕終監察御史陸景融元方子美資質博學工筆札以䕃補新鄭令有政績纍遷工部尚書東京留守景融為象先後母弟象先被笞景融諫不入則自楚母為損威人多其友陸長源餘慶孫瞻於文學纍遷都官郎中出為汝州刺史徙宣武遇軍亂被害長源以清白自將去汝州送車二乘曰吾祖罷魏州有車一乘而圗書半之吾愧不及前人云陸希聲景融四世孫善屬文通春秋易老子論著甚多唐昭宗時為給事中纍官户部侍郎同平章事張旭蘇州吳人善草書嗜酒每大醉呼呌狂走乃下筆或以頭濡墨而書既醒自視以為神世號張顛嘗尉常熟有父老屢求判其狀張怒父老曰見公筆勢竒妙欲家藏之耳歸崇敬蘇州吳人治禮家學天寶中中博通墳典科對䇿第一授左拾遺代宗召問得失崇敬極陳生民疲敝當以儉化天下大厯初充弔祭冊立新羅使東夷傳其清德纍官翰林學士以兵部尚書致仕歸登崇敬子事繼母篤孝舉孝廉又䇿賢良貞元初為右補闕起居舍人順宗即位超拜給事中憲宗問政所先登勸順納諫爭內外傳以為讜言纍官工部尚書封長洲縣男歸融登子元和中進士事文宗為翰林學士開成初拜御史中丞湖南觀察使盧周仁取羡餘錢億萬以進融劾奏周仁徇私希恩請重責還所進代貧民租入纍官兵部尚書封晉陵公沈既濟吳縣人經學該明楊炎雅善之薦其有史才召拜拾遺史館修撰子傳師更二鎮十年無書賄入權貴之門于公異蘇州吳人舉進士李晟表為掌書記朱泚平露布云臣既肅清宫禁祗奉寢園鐘簴不移廟貌如故德宗覽之泣下曰誰為之辭或以公異對帝咨歎之丁公著蘇州吳人舉明經授校書郎父喪負土作冢詔旌其孝纍官工部侍郎湘西觀察使徙河南尹治以清靜聞四遷禮部尚書翰林侍講學士時湘東災癘拜觀察使賜米七萬斛使賑饑民顧少連和之逺孫舉進士補登封主簿邑有虎孽移文嶽神虎不為害德宗時為翰林學士厯吏部侍郎裴延齡方橫少連挺笏將擊之㑹解而止轉京兆尹政尚寬簡進吏部尚書卒諡曰敬陸龜蒙寓居淞江甫里自號江湖散人天隨子甫里先生以髙士召不至與顔蕘皮日休羅隱吳融為益友著吳興實録四十卷松陵集十卷笠澤叢書三卷宋李成吳人五代末以詩酒遊公卿間善摹寫山水酒酣落筆煙景萬狀世傳以為寶宋初衛融知陳州閬其名召之成挈族而往以酣飲卒子覺舉九經纍官水部員外郎孫宥以進士官至樞密直學士許洞吳興人父仲容太子洗馬洞性疏雋幼習弓矢擊刺之伎及長折節勵學咸平初進士為雄武軍推官後免官歸尋召試中書改烏江縣簿有集一百卷范仲淹蘇州人刻苦讀書大通六經之㫖大中祥符間第進士慨然有志於當世嘗曰士當先天下之憂而憂後天下之樂而樂仁宗時為右司諫極論時政厯數州所至有惠政以龍圗學士知延州西賊大懼召拜樞密副使進參知政事未竟所施卒諡文正追封楚國公范純佑仲淹子受業胡瑗英悟能文性孝事父不違左右仲淹出鎮關陜純佑與將卒錯處鈎深擲隱得其才否由是仲淹任人無失而屢有功後以䕃為將作主簿范純仁仲淹子從胡瑗孫復遊勤志肄業父沒始出仕知襄城縣遷侍御史知諫院言王安石變法妨民前後上言無所諱避安石怒出知河中府厯轉諸州多有惠政哲宗時纍官尚書僕射中書侍郎以博大開上意以忠篤革士風卒諡文宣追封許國公有文集五十卷子正平有卓行官開封尉范純禮仲淹子以䕃為祕書正字元祐中纍遷給事中封駮皆國體之大者厯吏部侍郎徽宗立以龍圗閣學士知開封府務去苛政一切以寬處之立朝沈毅剛正曽布憚之卒諡恭獻范純粹仲淹子元豐中為陜西轉運判官時五路出師無功神宗欲再舉純粹言公私大困根本可憂遂止入為右司郎中哲宗立以龍圗學士出知慶州後以元祐黨奪職知均州徽宗時纍知永興軍以徽猷閣待制致仕范師道父琪仲淹從兄天聖進士厯官知明州有治狀召為殿中丞師道舉進士纍官兵部員外郎兼侍御史夙厲風操有聞即言官至龍圗學士有奏議文集數十卷子世京世亮皆舉進士世京官至祕書丞鄭戩吳縣人舉進士以右正言知制誥代范仲淹為陜西經略安撫招討使料敵制勝出人意表趙元昊畏憚之纍官至吏部侍郎拜奉國軍節度使卒贈太尉諡文肅錢象先蘇州人舉進士纍官天章閣侍講詳定一路敕成當進勳爵仁宗以其母老欲慰之獨賜紫章服進龍圗閣直學士象先長於經術侍邇英十餘年有所顧問必依經以對反復諷諭帝禮遇甚渥後厯知許潁陳三州以吏部侍郎致仕葉清臣長洲人天聖初進士仕為兩浙轉運副使疏太湖盤龍匯滬瀆港入於海民賴其利纍遷翰林學士三司使知河陽為人爽邁數言天下事皆當時可施行者有集百餘卷葉夢得吳縣人嗜學蚤成多識前言往行談論亹亹不窮紹聖中進士纍官翰林學士户部尚書數上疏極論時事以崇信軍節度致仕卒贈少保米芾吳人號海嶽外史為文竒險特妙於翰墨畫山水人物自名一家精於鑒裁遇古器物書畫極力求取由浛光尉纍官禮部員外郎知淮陽軍子友仁力學嗜古亦善書畫世號小米仕至兵部侍郎敷文閣直學士程師孟吳人舉進士甲科知南康軍屢領劇鎮為政簡而嚴罪非死者不以屬吏發隱擲伏如神得豪惡不逞跌宕者必痛懲艾之所部肅然洪福廣越皆為立生祠朱長文吳縣人著書閲古吳人化其賢名動京師元祐中起教授於鄉召為太學博士遷祕書省正字嘗著琴史有文三百卷六縣皆為辨說號樂圃李彌遜吳縣人弱冠登第紹興初遷起居郎論事更切後廷爭沮秦檜和議上疏乞歸田以徽猷閣直學士知端州改知漳州廢絀以沒無怨懟心所著有奏議外制議古及詩數十卷李彌大彌遜弟崇寧初進士為校書郎纍官刑部尚書多所建明建炎初試户部尚書兼侍讀後知靜江府奏廣西邊防利害入為工部尚書未幾罷去朱良吳郡人世儒科建炎中為海鹽尉金兵入境良曰今日乃忠臣義士死國之時也集所部百餘人奮擊金兵數人死衆為披靡然力不敵竟死事聞官其子思後守漢陽王介吳郡人紹興初進士授昭慶軍判官寧宗立韓托胄出入禁中介力攻其非坐是斥去後纍官中書舍人㑹不雨乞冊免宰相史彌逺出知嘉興府改慶元卒諡忠簡子野嘉定進士纍官禮部尚書奏陳剴切寶祐初拜端明殿學士進簽樞密院事范成大吳縣人紹興中進士隆興中出使金國竭節盡忠纍官參知政事後制置四川知明州帥金陵以資政殿大學士奉祠成大素有文名尤工於詩所著有石湖集攬轡録驂鸞録虞衡志吳船録鄭起濳吳縣人少孤篤志力學舉進士纍官中書起居舍人轉直學士權兵部尚書時有誣其為史嵩之之黨者貶知贑州黃由長洲人舉進士第一纍官刑部尚書兼直學士院侍御史張巖奏其植僞黨與遂奉祠嘉定間起為浙東安撫使仍官刑部尚書兼直學士院卒贈少師衛涇自華亭徙崑山之石浦淳熙中舉進士第一纍官參知政事厯事三朝出入內外憂國忘家始終一節與朱文公友善文公卒移文新安取經書傳注刋傳卒贈太師諡文節李韶彌遜曽孫父文饒為台州司理多隂德嘉定中韶與兄寧同舉進士纍官起居舍人上封事數十言出知漳州纍遷翰林學士後以端明殿學士奉祠韶忠厚簡淡門無雜賓云俞琰吳縣人隱居不仕以義理之學淑諸人精於易學所著有大易㑹要周易集說隂符經解諸書元干文傅平江人祖宗顯仕宋纍官承信郎文傅少嗜學十嵗能屬文延祐初進士同知昌國州後知吳江州廉平有聲治行為諸州最召為集賢待制以禮部尚書致仕王原傑吳江人學遂行潔至正間領薦值兵興不復仕教授於鄉所著有春秋讞議若干卷文曰貞白英華集詩曰水雲清泉集皆嘗經進錢良佑蘇人為人闓敏凡宿儒皆折行輩加重安貧守約鄉人後學者甚衆所著有詩文本朝髙啓長洲人洪武初為編修與修元史纍官户部侍郎致仕啓雋邁警敏書無不讀尤邃於羣史文雅淡有思致詩雄健渾涵自成一家所著有缶鳴鳧藻等集行於世楊基蘇州人讀書日記數千言尤工於詩穠麗纎蔚為時所重與髙啓及吳興徐賁潯陽張羽為詩友時稱髙楊張徐所著有眉菴集洪武初仕至山東按察司僉事申屠衡長洲人幼學於鐵崖楊維楨明春秋肆力古文自號樹屋傭洪武初嘗草諭蜀書授翰林修撰宋克長洲人洪武初為鳳翔府同知為人機警有口辨博學工詩文尤善真草書後人多取法焉張適長洲人七嵗習詩經過目成誦十三赴鄉試時稱竒童元季隱居不仕洪武初宋濂薦修元史授水部郎中與髙啓楊基輩稱為十才子鄭閎嘉定人精易學洪武初舉授禮部郎中以病告歸而郡邑之學易者多出其門永樂間嘗典湖廣福建文衡所著有味易餘吟集劉政長洲人以春秋魁鄉薦時方孝孺主文衡批其卷有羣鳥中孤鳳當虛左以處子之語政平生忠義自許壬午聞國事感慨不食而死畿志黃鉞常熟人洪武末舉進士任給事中以憂家居聞靖難兵至京具冠服自投於琴川橋下而死畿志秦約崇明人少嗜學長益刻勵於書無不讀為詩文負豪氣洪武初舉文學試居首擢禮部侍郎以母老告歸後徴儒士講論治道有司以其名聞賜帛鏹入覲陳三事皆有禆益沈德長洲人聰敏博學尤工於詩洪武間選入文華殿說書除江西左參議後轉山東卒所著有東碉集韓奕其先安陽人宋韓琦十一世孫南渡徙蘇奕濳心理學尤精醫道洪武初纍薦不起所著有韓山人集少師姚廣孝為序謂其沖淡幽婉無塵俗氣厠於晉宋作者盧熊崑山人質純氣和博學好古洪武間舉秀才除工部照磨以能書授中書舍人閲嵗遷知兖州府治尚和平政多遺愛所著有蘇州志清溪等集曽日彰吳江人洪武間舉秀才為黃陂知縣久之擢翰林院侍讀永樂初奉使交址尋從西平侯征進沒於軍中子堅纍官四川左布政使梁時長洲人警敏博學善為文尤工於詩洪武間由明經舉為岷府紀善後改翰林典籍預修永樂大典所著詩文有噫餘集藏於家滕思勉長洲人居鄉以賢士稱居官有大臣節厯升至户部尚書子枋刻苦讀書亦以文名王汝玉長洲人自號青城山人幼聰敏讀書日記數千言初授翰林五經博士轉左春坊贊善兼編修洪熙初贈太子賓客諡文靖為詩文膾尖人口書工真行小楷弟汝嘉博綜羣籍為詩文典雅嚴密洪武間為武昌訓導預修永樂大典等書升五經博士姚廣孝長洲人初從釋氏住慶壽寺資敏嗜學善詩文有謀略制行髙潔永樂初以靖難功授太子少師卒贈榮國公諡恭靖所著有逃虛子石城霞外等集金問吳縣人家貧力學善詩文永樂中以楷書薦授司經局正字纍官翰林侍讀學士禮部右侍郎陳祚吳縣人永樂中進士授河東市政使參議坐事落職洪熙初起為監察御史彈核不避權勢升福建按察司僉事致仕祚篤學尚氣節纍以直言遭貶斥而志不少銼所著有小學辨惑陳繼吳縣人少孤事母至孝學究性理之蘊淹貫經史洪熙初薦為國子監博士轉翰林五經博士預修兩朝實録升檢討致仕所著有怡菴集吳訥常熟人初為太醫院醫士性敏好學才識卓異宣德中用薦拜監察御史纍升南京都察院右副都御史剛介有為憲度振舉後引年致仕益留心於性理之學號思菴所著有小學集解張洪常熟人博學能文永樂中舉明經授靖江王府教授尋升翰林院修撰預修兩朝實録所著有四書五經解義史記要語歸田藳陳鎰吳縣人永樂中進士授監察御史纍升都察院左都御史致仕卒為人宅心平恕不務苛刻凡三鎮陜西多有惠政軍民愛戴祠之於家張益吳縣人永樂中進士授中書舍人纍升翰林侍讀後正統己巳沒於王事為人溫雅明敏博學強記為詩文雄建有法見稱於時李蕡長洲人永樂中進士授兵部主事精勤不怠纍遷太僕寺少卿正統間以平麓川功升工部侍郎尋轉兵部卒於官虞祥崑山人永樂中由鄉舉授上虞教諭升禮科給事中遷通政司參議敷奏詳明官至兵部右侍郎卒於官王永和崑山人好學能文器識宏雅永樂中領鄉薦獲主師席生徒多所造就宣德中績最升兵科給事中凡事務存大體厯升工部右侍郎正統己巳沒於王事贈工部尚書楊翥吳縣人自幼端厚凝重嘗師楊士竒受易學讀書至溫公以不妄語為誠之始即知守此言為文章平實似其為人洪熙初用薦為翰林檢討纍官禮部尚書致仕祿之終身卒年八十五有希顔集若干卷劉鉉長洲人由京闈鄉解授中書舍人預修三朝實録纍升翰林侍講學士國子祭酒轉詹事府少詹事卒於官為人學行淳篤其教人以不欺為本善古文尤工於詩所著有假菴集施槃吳縣人家貧力學穎悟過人從父遇居淮安登正統己未進士第一擢翰林修撰甫半載而卒韓雍長洲人舉進士授監察御史時年二十出巡於外聲名震赫𠞰除鄧茂七為陳循疏舉進都御史征討兩廣劇冦馘斬不可勝數刻石勒功而還尋忤中貴人乃引病歸卒諡襄毅雍俊偉有大節備文武才兩廣之功至今稱之南畿志葉盛崑山人舉進士為兵科給事中論事不激不隨遷山西右參政協贊獨石等處軍務興置屯田軍費給裕擢都御史巡撫兩廣請鹽商入米餉邊公私利之改鎮宣府建修村堡得免冦掠厯吏部左侍郎卒諡文莊所著有水東日記南畿志孫瓊長洲人舉進士授刑部主事升郎中時法司承望聞達風㫖多死非命惟瓊多所平反太監牛王假子犯法囑瓊瓊不少貸竟以同官連坐謫戍遼左成化初復官月餘即乞休致年僅四十家居篤於禮度所居朴陋人不能堪而處之裕如也南畿志徐恪常熟人舉進士為工科給事中言事務存大體厯官河南左布政使進副都御史巡撫河南改湖廣汴民號泣擁留為之罷市遷南京工部侍郎疾革戒勿請恩朝廷聞之賜葬祭如制南畿志吳寬長洲人成化壬戌進士第一擢翰林修撰纍官禮部侍郎兼學士掌東閣事進尚書卒贈太子太保諡文定當成化𢎞治間以文章德行負天下之望者三十年畿志李傑常熟人舉進士官翰林厯遷禮部尚書忤瑾致仕瑾誅起用遂不出而卒畿志陸釴崑山人進士及第授翰林編修與修英廟實録遷修撰孝宗在東宫時啓沃甚多進侍讀畿志王鏊吳縣人幼穎異文有竒思試鄉闈上禮部皆第一進士第三厯遷吏部侍郎兼翰林院學士孝宗初春遊御苑經筵講無逸篇反復規諫遂罷正德初進户部尚書武英殿大學士兼太子太傅時劉瑾怙寵專制乃乞歸卒諡文恪畿志吳洪吳江人舉進士授刑部郎中擢廣東按察副使以政績纍遷工部左侍郎南京刑部尚書劉瑾傾害大臣鮮有免者遂致仕歸時散錢穀以周宗族鄉里杜門絶跡有司問候亦不出卒贈太子少保畿志趙寬吳江人少以文學名舉㑹試第一官刑部主事至督學副使在浙三年所拔人才甚多畿志蔣欽常熟人以進士拜監察御史劾馬永成八人之奸及劉瑾用事繫獄鞫問挺言不回竟死杖下贈光祿少卿䕃其子畿志王倬太倉人舉進士厯升廣西右布政使遷右副都御史節鎮薊州等處敵入冦伏兵擊之斬首千餘級請庾未十四萬石帑銀八萬兩賑貸邊人歡呼相聞改南京兵部右侍郎卒畿志姜昂太倉人成化中進士拜監察御史劾李孜省聲稱大著厯知河南寧波府俱有政績母老乞終養母終言者交薦以疾卒畿志盧翊常熟人舉進士厯四川按察僉事復都江堰以障水嵗連大熟修要害城垣凡四十餘所賴以保障遷雲南右參政平靖四熟等夷進廣西右布政使卒於官畿志毛澄太倉人𢎞治癸丑進士第一人官翰林修撰纍官禮部尚書經緯使局有啓沃良史之名在廷論事折哈密之傾陷侃侃增氣奉迎聖駕不宿於家凡執所見皆本於忠平生無敢欺以病乞骸加太子太傅卒諡文簡畿志唐天恩常熟人舉鄉貢知葉縣劇賊劉六劉七擁衆壓境天恩奮戰生擒百餘人戮之既而援兵不至城破被執一門死者六七人後贈光祿少卿䕃其子畿志都穆吳人𢎞治己未進士任工部主事以太僕少卿致仕家居絶迹公府平生不治産卒時棺斂不能具葬志畿龔𢎞嘉定人成化間進士授嚴州府推官有治才擢刑部主事進郎中無寃獄知兖州稱循吏入覲賜宴錫服厯都察院副都御史専治漕河武廟南征江彬用事𢎞抗之隨上表乞休進工部尚書志畿盛應期吳江人𢎞治癸丑授工部主事纍官雲南按察僉事進右副都御史總督兩廣軍務後進右都御史歸卒於家畿志周廣崑山人登進士拜御史以言謫驛丞後厯進督學副使江西士習因之以變擢都御史仍巡撫江西大索飛稅之害為權力者沮之遂罷歸未幾擢南京刑部侍郎卒於官畿志列女范姬吳人孫竒妻歸一年而竒卒父母迎還其家姬不肯行迎者迫之姬持刀割耳鼻曰父母迎我不過以我年少色美欲改適我今已殘矣聞者義之吕榮吳人許升妻升遇賊被害榮手刃殺升者以首祭升何氏吳人吳永年妻宋建炎四年春金兵道三吳城中死者五十餘萬永年與其姊及其妻何奉母而逃卒為兵所得將縶其姊及何何紿謂兵曰諸君何不武耶婦人東西惟命爾兵信之行次水濱謂其夫曰我不負君遂投於河其姊繼之茅氏崇明人朱虎妻元大德間虎官都水監坐罪籍其家吏録送茅氏及二子赴京太醫提點師甲乞歸家欲妻之茅氏誓死不從母子三人以裾連結晝夜號泣形貌銷毁師知不可奪釋之茅氏託居永明尼寺憂憤不食卒後旌表其墓張氏崑山太倉人年十七始贅周為夫夫之父為百夫長嘗與其伍謀刺其帥事泄罪連其子及婦將斬之帥之子惜張姿容曰能從我即活張怒罵帥子拔刀磨其頸曰汝不從斷汝首張又厲聲罵帥子憤而殺之黃氏崇明人季富妻至正初海冦入境掠子女登舟者二十餘人黃氏義不受辱即投海死時年二十七孝節婦崑山人水得之妻也年二十夫死誓不嫁或勸之曰無子老將何依婦拒曰夫者天也天可二乎夫死無子命也欲自經其兄子覺之得不死後同籍繫獄婦當連坐任事者脅之曰若適人可全婦曰吾不忍以危難棄禮義雖死無悔有司以聞詔旌其門俞氏顧春妻春患病將革與俞訣勉其守節俞號泣不止因以指抉雙目不得出乃以剪先刺其左目又欲刺其右姑奪其剪諭曰汝欲養舅姑育二子留一目可也俞乃止遂守節終焉畿志彭餘璋妻鄭氏字宜君生儒家歸再朞餘璋卒子方晬抱持號哭成斂赴水死正統癸亥旌表畿志徐宣妻卓氏宣卒遺孤二逾年二孤夭既而舅姑皆沒卓操守益堅嘗刲股作糜以愈母疾後母即世執喪盡禮人稱節孝畿志葉氏崑山葉文莊公盛之女字夏景澄合卺四月而夫天即誓死以守先依於母母歿復歸於夏夏之舅即世為喪如禮比卒謂家曰只為名節二字一生如執玉如捧盈虞元凱銘其墓畿志鄒氏適葉藝成婚僅兩月藝卒鄒毁容誓死不出房限不見男子姑曰如火盜疾病何鄒曰火至委軀灰燼盜至先自刎疾聽其死不得令醫疹察年六十而卒畿志仙釋梅福漢壽春人仕為南昌尉成帝委任王鳳福上書極諫棄妻子而去遊於㑹稽變姓名為吳門市卒今城中有吳市門即其隱處宋元豐間封壽春真人麻姑漢桓帝時王方平過吳門蔡經家令人與麻姑相聞有頃而至經舉家見之是好女子手似鳥爪頂中有髻衣有文章而非錦繡坐定各進行厨香氣達於內外劈麟脯行酒麻姑云接待以來東海三為桑田蓬萊水又淺矣方平笑曰聖人皆言海中行復揚塵也經母妻見麻姑以米擲地皆成真珠宴臯升天而去魏伯陽吳人好道不仕入山煉丹丹成上升作參同契五行相類等書莎衣道人淮陽人姓何避亂渡江宋紹興末始來平江倐若狂者晝丐食於市夜止天慶觀衣弊以莎緝之嘗遊妙巖寺臨池見影豁然大悟人無貴賤問以休咎無不竒中孝宗召之不至賜號通神先生周元初姑蘇人精神溢目不類塵中人事母孝尤好澤物初得法於李拱瑞能除邪妖禱雨竒應洪武中屢被召命呼致雷雨數著神異時設神樂觀授正一仙官領觀事别號鶴林有鶴林集支遁晉人續圗經云平江風俗有支遁道生慧嚮之儔倡法於羣山而人尚佛遇賢姓林氏宋建隆初來居長洲之明覺禪院常以酒肉自縱酒家或遇其飲則售酒數倍於他日人稱為酒仙語人福禍多驗以符治病必痊創佛舍用錢數百萬雖稱丐於人而人不知所自來道濳吳僧過臨平詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲蘇軾大稱賞之又有詩云隔林髣佛聞機杼知有人家住翠微軾曰此吾師十四字師號也三詩僧夷堅志云吳中僧多能詩法貝絶句云鶴鳴九皋秋夜永紙帳芙蓉卧燈影九州之外更九州誰解摩心發深省蘊常詠石菖蒲詩細水圍碁石纎練手自移幾年離雁蕩萬里到天池法平登北固樓詩云不負南徐眼來看北固雲金焦兩山小吳越一江分三僧者皆勝流有唐人風致道元宋蘇州僧也纘佛祖及近世名人禪語為傳燈録三十卷以進刻板傳布明一統志卷八
