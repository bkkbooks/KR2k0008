志寧猶子白有司願為親民官以自效遂補東陽令及涖官以簡易為治洪少卿貞元中蘭溪縣令以信待物以勤集事賦平人和節度使盧羣嘗稱其如精金百鍊良驥千里五代錢元懿梁開平間判婺州有異政州每嵗三月大風為怪壞民廬舍元懿至風雨自山南過人皆異之宋假少連知金華縣通敏有才遇事無大小决遣如流錢藻熙寧間知婺州蘇軾送行詩老手便劇郡高懷厭承明東陽佳山水未到意已清蘇頌熙寧間知婺州遷州學於子城內頌初赴官泝桐江水暴迅舟橫欲覆母在舟中幾溺矣頌哀號赴水救之舟忽自正母甫出及岸舟乃覆衆以為誠孝所感胡壄婺州教授時方臘作亂壄以勇武自奮遇害舉家死之詔贈奉議郎推恩及其二子蘇遲建炎初以直祕閣知婺州言本州上供羅嵗增五萬餘匹民實不堪詔減其半王居正紹興中知婺州奏免嵗增貢羅御爐炭素與秦檜善及檜執政不侔居正見上曰秦檜欲圖中興臣心服之今設施止此願陛下以臣所言問檜所行檜終身恨之李南公浦江令郡猾吏恃守以陵縣不輸負租南公捕繫之竟置諸法辛次膺紹興中以直祕閣知婺州能以清苦自持甚有善政李知退知浦江興利除害專以教比為務民為立生祠蕭燧淳熙中自嚴州移知婺州父老遮道幾不得行婺與嚴鄰人熟知條教不勞而治李彥穎知婺州勤約有惠政禁民屠牛捐屬縣稅十三萬緡汪應辰知婺州郡積缺上供十三萬緡朝廷命憲漕究治應辰謂急則擾民乃與諸邑蠲宿道去苛斂定期㑹悉為發補吳芾知婺州勸民義役金華長仙鄉民十有二家自第其産相次執役幾二十年芾為更其鄉曰循理以褒異之李椿知婺州㑹詔市牛筯凡五千斤椿奏一牛之筯才四兩是欲屠二萬牛也孝宗悟為收前詔趙必願端平間知婺州立淳良頑慢二籍勸懲人户又措置廣惠倉及諸倉積榖俱有條理孫子秀浙東提刑兼知婺州婺多勢家有田連阡陌而無稅者子秀悉核其田書諸牘吳昌裔浙東提刑辭改知婺州時婺告旱乃不忍終辭至郡減騶從供帳遣僚召邑令周行阡陌蠲粟八萬石錢二十五萬緡汪綱知蘭溪縣决擲如神嵗旱躬勸富民浚築塘堰大興水利飢者得食其力全活甚衆元高興以招討使鎮婺州時東陽玉山羣盜殺宣慰使陳祐興捕斬之境內以安劉元元統間為武義縣尹剛毅亷介一錢不取時浙東憲司搆一公堂俾元斂材運甓元不從遂拂衣而歸王仲筠至元間為蘭溪尹掃窳弊之政朂偷惰之民滿去民為立碑紀其政蹟周自强至正間為義烏尹周知物情而性度寬厚故政治大行民畏而愛之許廣大至正間為武義尹政聲甚著溪水潰堤岸疊石以捍水患民懷其德名許公堤張恱逺至正間知浦江治民無疾呼遽色公退惟杜門讀書民為立惠政碑本朝王允誠洪武初知義烏縣時承兵火之餘廬井蕩廢允誠修舉撫循不期月而民安堵遷南安郡守民涕泣遮留不忍舍去假嗣輝洪武中知金華府性亷介多惠政卒之日民甚悼之朱璞洪武中知蘭溪縣涖事嚴而能恕寬而有制人皆悅服方素易洪武中由盱眙縣令有政績升金華知府涖政勤敏發奸剔蠧吏民畏而愛之吳理洪武末知金華縣操履公正催科不擾秩滿民涕泣不忍舍其去劉彥飛洪武末浦江縣丞性耿潔以氷蘗自持孜孜為治有古良吏之風宋哲永樂初知蘭溪縣洞察民隱豪猾屏跡未幾升户部郎中父老詣闕乞留詔從之劉實宣德中任金華府通判嵗旱稅不能完奏寬貸之任郡不以妻子隨不與流輩伍亷介之操獨立不懼為世名臣省志楊文𢎞治初由進士教授金華府學以身率教雖隆寒盛暑不廢講授嘗以胡安定之教蘇湖者自勵焉省志趙鶴𢎞治中知金華府飬士治民政教兼舉大有足尚云省志流寓朱泛漢沛國朱雲之後晉大興中為臨海太守有政聲秩滿居蒲墟村遂為義烏人曽孫幼仕齊遷揚州刺史有功人歌曰朱幼護江東人安盜賊空王煥之本大名人父良孺宋紹興間知水康因家焉又徙武義自幼穎悟能文嘗作王氏叙傳馬任仲本建陽人從朱文公游宋紹興間中進士乙科寓居東陽歷官州縣以亷能見稱所著有奏議雜著得齊集王介本吳門人徙家金華從朱熹呂祖謙逰宋紹熙初進士第三纍官國子祭酒在朝纍陳時政終知慶元府兼沿海制置使卒諡忠簡子野嘉定中進士仕至僉書樞密院事封吳郡侯前後上疏皆明正剴切鑿鑿可行有奏議文集人物漢顔烏㑹稽烏傷人事親孝父亡負土成墳羣烏銜土助之其吻皆傷因以名縣楊璇㑹稽烏傷人兄喬歷官尚書桓帝愛其才貌欲妻以公主不食而死璇靈帝時舉孝亷為零陵太守蒼梧桂陽賊相聚攻城璇製馬車尅期㑹戰奔突賊陳羣盜為之駭散郡境以清駱俊義烏人由尚書郎擢拜陳相值袁術僣號盜起俊厲威武保鄉境賊不敢犯濟養百姓鄰郡人多歸之子統仕吳纍官偏將軍封新陽亭侯三國留贊金華人仕吳與黃巾賊帥吳柏戰手斬之贊好直言不阿㫖權右畏憚官至左護軍斯敦東陽人吳赤烏間父偉為廷尉失儀當死敦叩閽泣血乞以身代吳主嘉其孝赦偉罪仍表其閭晉許孜東陽人孝友恭讓敏而好學二親殁柴毁骨立躬負土為墳時有鹿犯其墓上松栽孜悲歎曰鹿獨不念我乎明日鹿為猛獸所殺置松下郡察孝亷不起人號其居為孝順里南北朝婁幼瑜南齊金華人吳侍中𤣥六世孫聚徒教授不應徴辟為臨川王映所賞異著禮記捃拾三十卷又撰禮記托遺别記一卷文集六十六卷龔孟舒金華人通毛詩仕梁為尋陽郡丞元帝在江州遇之甚重以師禮事焉官至大中大夫鄭灼東陽人勵志儒學梁簡文在東宮雅愛經術引灼為西省義學士灼性精勤尤明三禮家貧抄義疏以日繼夜常蔬食講授其篤志如此唐厲文才東陽人貞觀初為道州刺史南土未靖賊冦猖獗臨郡期月羣盜悉平甚著威愛改容州刺史雅好山水未幾辭位歸鄉里孫乾曜高尚有祖風烈駱賓王義烏人七嵗能賦詩與王勃楊炯盧照鄰以文章齊名海內稱為楊王盧駱又號四傑歷武功長安主簿臨海丞中宗時詔求其文得數百篇張志和金華人父游朝通莊列書為象罔白馬諸篇以佐其說志和肅宗時擢明經授録事參軍親亡不復仕自稱煙波釣徒又號𤣥真子李德裕嘗稱其隱而有名顯而無事不窮不達嚴光之比云馮宿東陽人父子華事親孝親殁廬墓有靈芝白之祥宿有文名貞元中擢進士歷工刑二部侍郎轉東川節度使繕城郭增兵械息水患一方賴之有格後敕三十卷卒諡曰懿馮定宿弟與兄同第進士名播戎夷仕至左散騎常侍從弟審寬皆擢進士審歷國子祭酒寬為起居郎並以文學推重于時舒元輿東陽人元和中第進士擢監察御史按劾無所縱纍遷中丞奏辨明審未幾拜同中書門下平章事嘗為牡丹賦時稱其工弟元裒元肱元逈皆第進士滕珦東陽人太和初以太子右庶子致仕四品給券還鄉自珦始白居易送以詩曰身著錦衣兒戲繡東陽門外數滕家子時為侍御史張敦浦江人為諸暨令海寇三百餘人剽掠為患敦悉平之轉重泉令民悅其化遷車騎將軍楊扶浦江人為武源令遷交州刺史所至有恩惠州人為之謡曰楊聖儀政多奇陳太竭浦江人武鼎之子二親併亡即墓手藝松柏終身衰麻哀哭弗輟每奠果肴烏鳥不啄五代劉昭禹金華人為詩刻苦嘗自云句向夜深得心從天外歸後仕湖南為天䇿府學士嚴州刺史有詩三百篇宋胡則永康人端拱間擢第典七州更六路使者節所臨有績嘗奏免衢婺丁身錢民被其賜廟食至今范仲淹銘其墓徐無黨永康人皇祐間進士仕至郡博士歐陽修嘗稱其文詞日進如水涌所著有五代史集注滕甫東陽人舉進士第纍官翰林學士知開封府在神宗前論事如家人父子言無文飾洞見肝鬲治邊凜然威行西北終于龍圖閣學士知楊州卒諡章敏宗澤義烏人少有大志元祐間第進士徽宗時以直祕閣守磁州欽宗時拜副元帥起兵勤王與金兵大戰破之高宗時為開封尹留守東京志在復國敵畏不敢犯其境卒諡忠簡錢遹浦江人徽宗時為御史中丞纍官工部尚書大觀間以顯謨閣直學士領祠家居築三湖蓄水以利鄉民人多德之殁贈太中大夫陳天隱蘭溪人端重好學事毋以至孝聞大觀初詔以孝弟睦姻任恤忠和八字旌其門梅執禮浦江人崇寧間進士欽宗時纍官戶部尚書㑹金人犯闕索金帛無度執禮抗詞以拒遂被殺後贈資政殿學士潘良貴金華人政和間進士仕至徽猷閣待制中書舍人亷介剛毅立朝不阿父喪貧無以葬高宗賜錢五十萬緡歷三朝清風高節凜然當世樓照永康人政和間進士由國子博士遷殿中侍御言論多見採納官至簽書樞密院事兼權參政殁諡襄靖王師心金華人政和間進士揚歷中外咸著能績仕至宣奉大夫卒贈少師賜諡莊敏項德武義人宣和間寇陷婺州德率百餘人與戰俘馘甚多方繕甲謀復鄰邑適王師至欲㑹合殱之賊聞盡鋭邀德於黃姑嶺下德力戰而死邑人哭聲振山谷圖像於城隍廟嵗時祀焉徐端益金華人建炎初張邦昌手書至虹縣令以下迎拜宣讀如常式端益為武尉獨不屈膝事定向子諲言於朝為易文資賈庭佐東陽人剛毅有大節高宗時為大理司直秦檜主和議庭佐上書力言不可乞斬王倫以謝天下忤檜意出通判湖州鄭剛中金華人自號北山登進士甲科纍官四川宣撫使以不進金忤秦檜落職徙封州卒檜死朝廷盡復其官諡忠愍所著有北山集周易窺餘諸書許直可東陽人紹興間進士有才行為建康教授子中應繼登進士為光州定城令操履純正孫彥知嘉定進士為澧州石門令三世登科鄉邦榮之曹冠東陽人博學强記紹興間進士遷太常博士後告老轉朝奉大夫賜金紫致仕年八十卒所著有經進十論萬言書恢復祕略宣城雙溪等集范浚蘭溪人紹興間舉賢良不起篤志求道學者稱為香溪先生有文集藏于家朱文公取其心針入孟子集注王師愈師心弟自幼穎悟知宗正學嘗從楊時受易論語既又從朱熹張栻呂祖謙游紹興間登第官至崇政殿說書熹稱其有本有文德望隱然為東州之重云唐仲友金華人父堯封紹興間為侍御史論錢端禮坐斥仲友登第復中宏詞科仕至江西提刑博聞洽識講析經史所著有六經解皇極經世圖譜兄仲義弟仲溫俱登進士葉衡金華人紹興中進士負才足智善理兵事顯有成蹟由州縣不十載致位宰相卒贈資政殿學士陳良祐金華人紹興中進士仕為左司諌時高宗鋭意圖治良祐有願為良臣不為忠臣之語纍官至吏部尚書力止泛使懼開釁端遂至忤㫖甘心竄斥淳熙間復起除敷文閣待制知建寧府喻良能義烏人纍官至太常寺丞嘗進忠義傳二十卷孝宗深加歎賞即命頒行以開國縣男致仕所著有諸經講義香山集與忠義傳王淮金華人幼穎悟力學紹興中進士為台州臨海尉郡守蕭振一見奇之許以公輔器以薦除監察御史遷右正言條奏自治之策高宗嘉歎纍遷翰林學士知制誥訓詞深厚得王言體孝宗時歷左右丞相兼樞密使屢有建明卒贈少師諡文定厲汪東陽人隆興間進士補樂清宰民安其化纍贈中奉大夫篤於教子子模歷資政殿大學士朝請大夫東陽縣開國侯應孟明永康人隆興初進士後纍官吏部侍郎韓托胄嘗誘以顯官俾誣趙汝愚孟明不從士論以此重之呂祖謙夷簡六世孫祖好問隨高宗南渡仕至尚書右丞卜居金華祖謙早擢高第歷官著作郎直祕閣倡道於婺為一代宗師號東萊著書立言並行於世卒諡成喬夢符東陽人淳熙間進士纍官大理正鞠獄嚴明不畏權勢進監察御史奸佞為之喪膽既卒子孫蕃衍並登華要陳黼東陽人淳熙間進士恬靜有守不汲汲於進取三十餘年宦途竒蹇而能不改其樂終於參議有文集二十卷葛洪東陽人從呂祖謙學登淳熙進士歷官至參知政事觀文殿大學士卒諡端獻贈太師信國公高風徑節追嫓古人有奏議涉史隨筆詩文雜著凡二十四卷卲囦蘭溪人淳熙間登第教授潭州時朱文公為守薦其學行所著有禮記解讀易管見應鏞蘭溪人登博學宏詞科仕至知開州所著有書約義禮記纂義傳世陳亮永康人自幼穎異為文俊麗雄偉有奇志恆以經濟天下自任孝宗時六詣闕上書主於恢復兼論宰相得失紹興四年狀元及第授建康僉判尋卒特諡文毅呂祖儉祖謙弟仕至太常寺丞慶元間論姦惡忤㫖謫韶州卒賜諡忠號大愚有文集行世弟祖泰上書乞誅韓托胄坐配欽州士大夫重其義氣云鄭綺浦江人通春秋事親極孝父照繫獄當死綺上書請以身代事遂白母張病攣抱持若嬰兒三十年不懈綺臨殁歃血誓言子孫毋分財異㸑乾道間賜號沖素處士子孫世守其教馬之純東陽人隆興間進士學成行尊生徒從游者雲集乂號為茂陵先生有文集傳世其孫光祖居金華光祖弟潤祖登淳祐進士揚祖纍官知平江府兼發運使詩書奕葉為時稱羡徐次鐸東陽人負才尚氣登紹興間進士通判衢州嘗倣周禮作漢官人作唐書傳注補注音訓總三百卷中興兵房事類留之西府徐僑義烏人淳熙中進上寧宗時纍官集英殿修撰以寶謨閣待制致仕卒諡文清僑初受業於呂祖謙門人繼游朱熹之門熹嘗稱其明白剛直命以毅名齊所著有讀易等記文集王象之金華人慶元間進士博學多識著輿地紀勝傳世章如愚金華人自號山堂慶元間登第仕至國子博士所著有山堂考索行世何淡東陽人嘉泰間以上舍釋褐歷官國子丞祕書郎恬靜好學所著有通鑑手抄賢關謾録徐邦憲義烏人紹興中試禮部第一登進士第三以祕省正字知處州開禧間被召上疏忤韓托胄罷職秩未幾授江東運判仕至工部侍郎寶謨閣待制卒諡文肅林大中永康人紹興末進士寧宗時由臺諫歷官僉書樞密院事卒贈資政殿學士諡正惠所著有奏議外制文集三十卷大中守正不阿進退裕如朱熹嘗貽書朝士曰聞林和叔入臺無一事不中的去國一節風義凜然當於古人中求之李誠之東陽人受學呂祖謙鄉舉太學皆第一知蘄州嘉定間敵人犯蘄黃誠之堅守城壁罵敵而死詔閔其忠贈正節侯立祠郡庠真德秀表其墓戚如琥金華人從呂東萊游篤於修齊之道纍遷國子博士改知袁州政績大著甫受代而卒門人私諡曰貞白先生李大同東陽人嘉定間進士歷官右正言陳格天心弭災變進兵攻討之說纍官至工部尚書寶謨閣學士汪淳金華人受業呂東萊勵志于學授吉州教授金華自東萊大愚二儒即世後來講學者咸歸重焉王霆東陽人少有奇氣嘉定間中武舉異等凡四登朝列七剖州符課治最立戰功多見紀述至謂士大夫當以世從道不可以道從世猶古之謀帥說禮樂而敦詩書者也所著有玉溪集馬光祖金華人寶慶初進士纍官至知樞密院兼參知政事以金紫光祿大夫致仕卒諡莊敏光祖居官風績凜然三至建康始終一紀威惠並行百廢無不修舉云喬行簡東陽人紹興進士端平間纍官左右丞相與鄭清之同心革弊召用善類進少傅封益國公尋求去除少師以魯國公致仕卒諡文惠所著有周禮總說孔山文集范鍾蘭溪人嘉定初進士理宗時纍官至左丞相直清守法重惜名器與杜範李宗勉齊名卒贈少師諡文肅所著有禮記解王萬浦江人嘉定中進士理宗時纍官至監察御史彈劾不避權要以太常少卿致仕卒賜諡忠惠萬忠伉有大志終其身行無不顧言設施論諫皆根於心史稱其為正人端士云胡巖起永康人父㮚欽州司法參軍巖起嘉定進士知閩縣卓行危論奇文瑰句士大夫皆自以為不可及其在江西幕平贑州之難於指顧間全活數十萬人子居仁淳祐進士知台州文辭政事亦絶出於四方何基金華人自幼端重寡言笑師事黃幹窮伊洛之源隱居求志不願人知淳祐間以崇政殿說書徴不起授承務郎主管西嶽廟卒諡文定所著有大學語孟太極通書西銘近思録諸發揮傳于世金景文蘭溪人事親孝親殁廬墓夜有五色光焰爛然射墓土人以為孝感所致咸淳間知縣事沈應龍以景文及陳天隱董少舒名請于朝立碑建祠於學宮之後名三賢堂王柏金華人氣稟雄偉勇於求道欲以身任天下之重初號長嘯一日讀書至居處恭執事敬惕然曰以長嘯自命此非聖門持敬之道乃更號魯齊德祐間賜諡文憲有讀易記及文集傳于世徐道隆武義人父煥知南雄道隆以任入官參趙孟𫝊軍事遂提㸃浙西刑獄時元兵至臨平道隆率勤王兵間道由臨湖門乘舟入援德祐二年追兵及之軍士殊死戰道隆與其子俱赴水死事聞贈官賜諡徐文震金華人尚禮好義數世同㸑德祐間丞相留夢炎署其門曰金華孝友之家張潤之金華人號思誠子篤實清介專心問學避地長山摘其幽勝為十詠一時名公咸賡詠之元黃溍嘗為之跋謂其微言奧㫖世莫得聞尚賴此詩之存其高風雅韻猶可槩見云元金履祥景文曾孫少有經世志師事王柏講貫積詳踐履誠篤宋末以史館編修召不及用而國亡遂隱居著書以淑後進所著有大學疏義尚書表注通鑑前編論孟考證中庸標注仁山文集許謙金華人父觥淳祐進士未顯而沒謙自幼力學於書無所不讀聞金履祥道學往從之以求聖賢之心晚年四方來從者數百人然素志沖淡恬不近名世號白雲先生所著有詩集傳四書叢說劉應龜義烏人咸淳間游太學丞相馬驥高其才將以女妻焉應龜不可乃已由是名稱藉甚元至元初起為月泉書院山長改杭州學正所著有夢藁癡藁聽雨留藁共二十卷鄭大和綺之後十世同居凡二百四十餘年至大間表其門大和繼主家事嚴而有恩家庭中凜如公府見者嗟歎謂有三代遺風部使者余闕為書浙東第一家以褒之大和於冠昏喪祭必稽文公家禮而行有家範三卷聞人夢吉金華人夙承家學於六經傳疏悉手抄成帙義理所在必深究密察閉户討論逾十年乃開門講授泰定間歷教官所至學者爭從之游門人宋濓吳履仁輩私諡曰凝熙吳師道蘭溪人幼學於金履祥延祐間授國子博士以禮部郎中致仕所著有易詩書雜說春秋傳附辨戰國䇿校注及文集行世子沈仕本朝洪武中纍官東閣大學士張樞金華人聰慧爽朗於書無所不讀嘗譏宋高宗忘親事讎而追為之定復兩宮之計時前代遺老尚存無不降歎續後漢書七十三卷是非豫奪咸有論著名曰訓志詔取藏於宣文閣纍辟不起士論高之柳貫浦江人幼有異質於經史百家書靡所不通至正間由江山教諭至翰林待制兼國史編修與虞集揭徯斯黃溍齊名人號曰儒林四傑有文集四字系二卷吳直方浦江人元統間以薦纍官長史時權實臣欲為亂托克托丞相議出之直方協贊焉上念其功解所繫金帶賜之尋升學士未幾以集賢大學士致仕賜俸終身黃溍義烏人自幼篤學博極羣書師事常山教諭王炎澤發為文章如澄湖不波一碧萬頃用是擅名當世延祐初進士纍官侍講學士凡朝廷大詔令皆出溍手前後進講言甚切直卒贈江西行省參知政事追封江夏郡公諡文獻有文集行世吳萊直方子七嵗能詩賦族父幼敏家素多書萊每私取讀之幼敏偶指以一編誦之不遺一字試以他編皆如之遂盡出所藏書使讀自是該貫古今四方學者多師之既卒門人私諡曰淵穎先生有淵穎集十卷胡長孺巖起孫為人光明宏偉博學多文海內購其辭章者如獲拱璧非其人雖一金易一字毅然不與仕至兩浙鹽運使所著有瓦缶編顔樂齊藁等集從兄之綱之純皆以經術文學名人稱為三胡云朱震亨金華人師事許謙為高第弟子其清修苦節絶類古人篤行之士所至人多化之尤精於醫所著有局方發揮等書戴良金華人少從黃溍游英偉秀發以文章擅名仕元為淮南江北行中書省儒學提舉入本朝不仕所著有春秋經傳考和陶詩九靈山房文集本朝宋濓浦江人九嵗歌詩有奇語人呼為神童游元末諸名賢之門至正間有薦於史館者辭不赴洪武初遣使以書帛徴至除起居注修元史為總裁官擢翰林學士知制誥兼修國史繼升承㫖致仕所著有潜溪翰林芝園等集蘿山詩藁王禕義烏人幼秀爽竒敏師事黃溍洪武初授江西儒學提舉司校理遷起居注同知南康府事召修元史為總裁官書成擢翰林待制兼國史編修奉命使雲南為梁王把都所害其遺文有華川集玉堂雜著諸書正統間追贈翰林學士諡忠文胡翰金華人自少穎異既長務師古人洪武初起為衢州府教授㑹修元史薦入史館賜金帛遣歸有文集行于世蘇伯衡金華人宋文定公轍九世孫少警敏絶倫中嵗大肆力於文辭精博敷腴時稱其工洪武初擢國史院編修以疾辭歸有文集行世鄭濓大和之孫與弟湜俱以義聞洪武初召見慰諭甚至問以治家長久之道濓等以謹守家法對深見嘉奬除湜福建參議其家僮施慶者親喪哀泣不輟亦三年不御酒肉君子謂濡染所致傅藻義烏人博通經史善詞章洪武中纍官至河南按察使鄭沂浦江人洪武末以人材起至京師召見以其家孝義聞天下即授禮部尚書尋以老致仕王紳褘仲弟性至孝痛父死節遂匍匐往雲南求遺骸既至不可得乃即其處製神主號慟幾絶洪武末以文行薦授國子博士文章雅贍詩沖淡有陶韋風致著繼志齊集二十卷劉辰金華人性侃直負氣節洪武末為監察御史立朝謇諤永樂間纍遷北京刑部左侍郎尋以老疾乞歸樓璉金華人受業宋濓之門由主簿召為翰林侍講文皇登極命草詔惶恐憤歎歸而經死省志龔泰義烏人洪武末以鄉貢士授户科給事中靖難師迫為兵校所執見文廟于金川門釋之乃自投城下以死省志戴原禮金華人師朱震亨精於醫原禮得其術為一時醫流巨擘永樂初以潛邸舊恩召為太醫院使邵玘蘭溪人永樂中進士纍官至副都御史居家有孝行在官以威嚴憚吏遇事善斷所至削妄費黜貪庸能舉其職章懋蘭溪人成化初舉禮部第一登進士授編修以論諌張燈謫知臨武縣尋改南京評事遷福建按察僉事觸瘴成疾乞謝事去家居二十餘年論薦無虛日𢎞治中特起南國子祭酒正德改元三疏乞休升禮部右侍郎致仕嘉靖初進尚書卒諡文懿學者稱為楓山先生省志章拯蘭溪人懋從子也少從懋學即知尋向上去登𢎞治中進士歷工部主事調刑部仕至工部尚書致仕論者謂拯學術事功不負懋之教云省志唐龍蘭溪人正德初進士以知縣召為御史巡按江西值逆濠之後懇懇諭諸司協恭蘇息先是己卯變作江西輟鄉試龍至復當試期乃疏請得倍增解額且監臨至公而慎後滿期例代士民奏留特命再巡升陜西提學副使品藻如懸衡鑑歷都御史總制陜西三邉時有文武吉甫之譽仕至吏部尚書多拔淹振滯為名冡宰省志列女石氏金華人諱勝浦江義門鄭洪妻也洪為內藏庫提㸃以他纍死獄石乃絶粒不食者八日求其死而不可得遂引繩自絶皇祖聞而歎曰此真義門婦也省志陳氏永康人王和欽妻也年二十九夫亡遺孤嵗餘苦志守節勤以自給孤名德中性至孝一日東門失火德中向火稽首火遂西轉人謂節孝所感洪武中旌其門省志徐榮妻吳氏武義人年十九嵗適榮生子甫三嵗而榮死未幾榮弟廣繼卒其妻顔氏年二十七撫二孤妯娌一志奉姑育子恪守婦節年踰六十事聞洪武中表其門曰貞節省志一門三節永康李軻妻俞氏年二十五居孀守節子祿婦吳氏年二十九夫亡無子誓繼姑志孫齊娶陳氏年十九亦寡因自誓曰守節女婦常事况李氏世德有自乎台州王一寧題其堂曰一門三節婦四世九賢孫省志曹氏永康王仕濓妻夫亡截髮置棺中曰妾不即死以從君于地下者以有遺孤在也三年衰絰不去體力勤絍績資家訓子年已七十鄉老上其事乞為旌表曹聞之曰此婦職常事毋庸是也識者義之省志徐氏名瑩東陽趙為潛妻年二十七為潛殁撫遺孤晝夜哭者纍年有為言禮婦人不夜哭自是夜惟飲泣間誦孝經論語小學以節哀痛氣且絶猶誦割不正不食席不正不坐目不視邪色耳不聽邪聲諸語緝緝不絶口婦郭氏亦以孝聞有司兩上其事詔皆旌之省志宋氏金華人夫為閬州守被誣死獄中宋與其姑及子皆編戌金齒子死途中宋奉姑以行誓死不變行路傷之宋題郵亭壁歌楊慎刻于詩抄中為浙中士人傳誦省志仙釋黃初平晉丹溪人年十五牧羊遇道士引至金華山石室中四十餘年其兄初起尋之不獲後遇道士善卜因問之曰金華山中有一牧羊兒初起即隨去見初平問羊安在曰在山東往視之但見白石初平叱之石皆起成羊數萬頭初起願棄妻子學之後亦成仙初平號赤松子初起號魯班宋元時皆有封號孫逰嶽東陽人潜神希微宋太初中遇簡寂先生授以三洞經法其後茹芝却粒顔色精爽久而愈少齊永明初詔主興世館由是奇逸之士爭相趨赴後安坐羽化門弟子數百人惟陶𢎞景為入室傅翕義烏人梁普通間遇北僧嵩顯陀語曰爾彌勒化身令自鑑于水乃見圓光寶蓋即悟前因頭陀復指示松山下雙檮木翕遂于此建菴為修道之所今雙林寺即其處也貫休姓姜氏蘭溪人城西兜率寺即古道場唐天復間入蜀蜀主賜號禪月大師苦節峻行善草書工歌詩著西嶽集二十餘卷錢鏐稱吳越國王貫休以詩投之云滿堂花醉三千客一劔霜寒十四州鏐欲改為四十州師不可次日遂遁去明一統志卷四十二
