body:
  text: 明一統志卷四十二明李賢等撰金華府東至台州府天台縣界三百九十八里西至衢州府龍游縣界九十里南至處州府縉雲縣界一百八十六里北至嚴州府建德縣界一百一十里自府治至南京一千三百三十里至京師四千五百八十八里糧一十七萬四千石零建置沿革禹貢揚州之域天文牛女分野春秋時為越西界秦屬㑹稽郡漢為烏傷縣地仍屬㑹稽三國吳分㑹稽置東陽郡治長山縣晉屬揚州劉宋屬東揚州梁改置金華郡陳兼置縉州隋廢縉州及金華郡以地屬吳州尋置婺州治吳寧縣大業初廢州復為東陽郡治金華縣唐復為婺州天寶初改東陽郡乾元初復為婺州五代晉時為武勝軍宋仍為婺州淳化初改軍曰保寧𨽻浙東路元置婺州路本朝改為金華府領縣八金華縣附郭本漢烏傷縣地東漢析置長山縣屬㑹稽郡孫吳為東陽郡治晉以後因之梁於此置金華郡隋初廢郡改縣為吳寧尋改曰東陽後改為金華縣屬婺州唐改為金山縣神龍初復為金華縣宋元仍舊本朝因之編户一百八十六里蘭溪縣在府城西五十里本隋金華西部地屬東陽郡唐置蘭溪縣屬婺州宋因之元升為州本朝仍為縣編户二百四十一里東陽縣在府城東一百五十里本漢烏傷縣地𨽻㑹稽郡吳𨽻東陽郡晉以後因之唐為義烏縣地垂拱初析置東陽縣屬婺州五代時錢氏奏改東傷宋復為東陽元仍舊本朝因之編户一百八十七里義烏縣在府城東一百一十里本漢烏傷縣屬㑹稽郡孫吳以後屬東陽郡隋屬婺州唐郎縣立綢州又分置華川縣尋廢州省華川入烏傷又改曰義烏縣宋元仍舊本朝因之編户一百四十一里永康縣在府城東南一百一十里本漢㑹稽郡烏傷縣地孫吳分置永康縣屬東陽郡晉以後因之隋省入吳寧縣尋復置屬婺州唐於縣置麗州尋廢以縣𨽻婺州宋元仍舊本朝因之編户一百一十六里武義縣在府城西南八十五里本漢烏傷縣地孫吳以後為永康縣地唐天授初分永康縣西界置武義縣尋更名武成天祐中復名武義宋元仍舊本朝因之編户九十三里浦江縣在府城東北一百二十里唐為義烏蘭溪兩縣地天寶中分置浦陽縣屬東陽郡乾元中屬婺州五代時錢氏奏改浦江縣宋元仍舊本朝因之編户一百二里湯溪縣在府城西南五十五里本龍游東鄙金華西鄙蘭溪南鄙遂昌北鄙成化六年析置縣治官山編户八十里郡名東陽吳以郡在金華山之南瀫水之東故名金華梁名玉臺新詠序云金星與婺女爭華故曰金華寶婺宋淳熙間賜名形勝江南劇郡唐馮伉八詠後序江之南言劇郡者無出宣城與東陽東陽多名山金華為最唐陸龜蒙集山水佳地唐權德輿送僧道依歸婺州序三洞雙溪之勝東陽志婺為郎藩地廣力完宋李惇裕州學記風俗君子尚禮庸庶敦龎隋志人性敏柔而慧宋志氣習醇厚東陽志宋中興以來躋政府儀禁從者踵相接風聲氣習一變醇厚俗勤耕織東陽志士知所學宋呂東萊祠記山川金華山在府城北二十里一名長山又名金盆山越絶曰此山古聖採藥高且神黃初平初起於此成仙山之東有卧羊山即初平叱石處旁有小山名煉丹山山之西有尖峯山孤石特秀狀類芙蓉宋韓元吉詩自笑金華老使君兩仙常約度層雲駕車尚有雙羝在縱入山前白石羣銅山在府城南二十里一名百沙山此山出銅東陽記山下有泉色潔白號銅山泉蘭隂山在蘭溪縣西七里一名橫山橫截二江周十二里山頂有塔山下有潭南住山在蘭溪縣南一十五里其山自閩中迤邐而來至此截然而住因名洞巖山在蘭溪縣東二十里山間有巖洞高三尺通金華洞嵗時祈禱多應九峯山在蘭溪縣西南七十里一名風子山峯巒秀拔昔葛洪來逰丹龜猶在唐徐安貞肄業於此後人號讀書巖木案石牀尚存三丘山在東陽縣南八里晉殷仲堪嘗登此山郡人愛之若襄人之於羊叔子因又名峴山甑山在東陽縣西南一十里狀如甑有石壇東晉陳安居學道之所赤石山在東陽縣東北一十里上有赤崖一名孤絶山不生凡木青臺山在東陽縣東二十里突立如臺山頂有單令巖鶴巖山在東陽縣東北二十七里相傳昔有三白鶴飲泉于此已而翔去尋其蹤但見三石立巖下夏山在東陽縣東南四十五里四面峭絶山頂有池冬溫夏涼嵗旱於此禱雨山側有夏禹廟因名天竹山在東陽縣東五十里多産修竹白鹿山在東陽縣東北六十里山形肖鹿歌山在東陽縣東南七十里上有石室五間可容百餘人山下水通臨海昔人乘舟望見女子於此汲水登峯而歌蓋神女也今玉女祠尚存東白山在東陽縣東北八十里嶔崟危峭與㑹稽天台連屬中有水源流入東陽溪西有西白山對焉大盆山在東陽縣東南一百三十里形如覆盆雞鳴山在義烏縣東五里昔有金雞鳴其上羣雞皆鳴因名上有小亭九日邑大夫畢㑹於此又名登髙臺石門山在義烏縣東九里連山中斷兩石對峙如門宋陳炳有記青巖山在義烏縣南一十里其中高者曰齊山山下有雙澗南曰前溪北曰梅溪本朝王禕詩幽僻青巖中結屋開荒畦羣山列左右雙澗鳴東西蕭然守岑寂環堵蓬蒿齊林泉幸清勝吾將暫𡨕棲鐵巖山在義烏縣東南二十里俗名郭公山極為峻峭山半有水簾下垂數十丈如掛匹練至頂有曠土百畝三塢一潭黃蘗山在義烏縣北二十里一名黃櫨尖唐初置綢州治此山下因綢巖為名雲黃山在義烏縣南二十五里一名松山梁傳翕大士於此行道黃雲盤旋其狀如蓋相傳山多𤣥熊赤豹大士化之後不復出山頂有七佛庵行道塔石樓山在義烏縣東二十八里一名樓山四面孤絶兩山相峙逺望如浮屠狀西巖層級高下類重樓復閣蓋勝絶之地也箭山在義烏縣東北四十里山多竹箭蜀山在義烏縣南四十里下臨蜀墅塘金山在義烏縣西南四十五里屹立江流中清潭山在義烏縣北四十五里下有清潭龍祈山在義烏縣北四十八里山之西有水名深溪自縣北流入浦江嵗旱居民祈禱有應來山在義烏縣南七十里羣山自逺來至此而止山側有羊印石三山在來山東北三峯巍然聳拔上有三山廟金勝山在永康縣南五里昔人於此得金勝因名山下有趙炳祠石城山在永康縣南一十四里遙望山際若石城然絶塵山在永康縣東南二十九里其山嶮巇出塵石室山在永康縣東南三十里緣崖而上南北二穴相通可容四百人中有石柱又有一石形如竈釡歷山在永康縣南三十五里舊名歷山孤峯屹立望之如覆釡然石翁山在永康縣東四十里上有孤石遙望如人旁有一石類婦人俗稱石翁婦青石山在永康縣東四十里山色蒼翠因名靈巖山在永康縣東南四十里巖穴相通靈異可驗壽山在永康縣東四十五里上有瀑布泉溢出兩峯之間濺沫如霧本朝李曅詩雙澗橋西五老峯分明朵朵翠芙蓉半空絶壁開金像百道飛泉噴玉龍怪石坐來斜聽鳥曲闌憑處倒看松我生自倚凌雲筆不愧山僧飯後鍾三峯山在永康縣東北四十五里南北兩峯高百餘大中峯高七十丈峭絶之狀異於衆山方巖山在永康縣東五十里有巖如鑿後人於岩畔架飛甍環以欄楯為逰眺之所本朝徐孟璣詩百折飛橋依日月一方巍石戴星辰桃巖山在永康縣東北五十里山有石赤白相間狀類桃花元黃溍詩立石平如削飛雲近可梯莫窮千古勝但惜衆山低靈草經年長珍禽隔樹啼人言舊朝士感事有留題密浦山在永康縣東北五十里上有仙壇為鄉人祈禱之所南有水源號花溪三石山在永康縣南五十五里上有三石壇書臺山在武義縣西三里相傳唐舒元輿讀書于此白陽山在武義縣東七里白雲出岫即雨上有怪石色隨時變嵗豐則黃歉則黑鄉人以此占候翔鸞山在武義縣西七里世傳嘗有鸞棲其上小姬山在武義縣東一十里中有溪號姬水李公山在武義縣北一十五里宋隱士李惠居此人高其志大家山在武義縣西二十里其南有新婦山相向世傳晉張彥卿女出適纍月姑婦併亡有神靈各主一山鄉民禱之輒應菊妃山在武義縣南三十里多生蘭菊旁有溪號妃水八素山在武義縣北四十里秦末有八士從洛陽來逋栖于此皆青素冠履因名龍峯山在浦江縣治東浦江倚山為縣此則縣治之輔山也仙華山在浦江縣北八里一名仙姑世傳黃帝少女於此上升宋方鳯詩邈哉軒轅氏問道由崆峒龍髯一以逺千載悲遺弓猶傳少女靈錬玉於此宮山林重帝胄香火明民衷我來重懷古攬涕臨西風東明山在浦江縣東下瞰大澤中隱然突起元時青田縣尉那德璋嘗於此創精舍以教其族人子弟內有成性四勿繼善九思四齊宋濓撰精舍記康侯山在浦江縣東南三十五里上有池水久雨不增甚旱不減巖坑山在浦江縣西北五十里上有水二𣲖東曰巖坑北曰湖溪深鳥山在浦江縣西六十里衆山之間浦陽江水發源於此九峯山在湯溪縣南十里高數百丈峯巒秀拔巖洞玲瓏昔龍丘萇酆去奢皆居其下福民山在湯溪縣東南十五里高數百丈峯巒秀峍林木蓊欎欲逰目騁懷者多登之西峴峯在東陽縣南八里與東峴峯對峙宋王槩詩昔日龍山有勝逰也攜濁酒峴峯頭歡逢重見黃花好醉插都忘白髮羞戴令固嫌無惠愛陶潛應笑未歸休登高此地成狂賦裁謝當年沈隱侯雙峯在義烏縣東南二十五里龍門山頂兩峯秀拔高插天表一名筆架峯太陽嶺在府城東北五十里嶺高峻若與太陽齊西巖嶺在東陽縣東三十里夏山之西高峻多巖石三十六岡在浦江縣東三十五里重巒復嶂高低不齊前後相屬者三十有六春草巖在府城北二十里相傳赤松子羽化處巖間不生蔓草盡出龍鬚草大者為虎鬚草可為燈炷紫微巖在府城北二十五里巖有石室梁劉峻棄官舍其下撰類苑一百二十卷郡人呼為劉先生書堂鮑令巖在東陽縣南五里涵碧亭之上巋然崛起孤高峻拔有石刻鮑令巖三字以宋縣令鮑極嘗於此修禊故名煉丹巖在義烏縣南五十里葛仙山上相傳葛洪嘗煉丹於此覆釡巖在義烏縣西六十里形如覆釡四隅孤絶石芒峭發柏竹薈茂似非人世寶泉巖在武義縣南三十里上有方池甚旱不竭泉甘美宜瀹茗金華洞在府城北三十里即道書第三十六金華洞元之天其洞有三上曰朝真中曰氷壺下曰雙龍通四明天台諸山元金履祥詩洞府高深對月開長疑底裏祕龍雷天窗不照人間世限盡逰人自此回新洞在府城東北三十五里宋紹興間一石摧下旁露大竅風自中出振動山谷洞皆石乳登之若身在瓊樓銀闕中上靈洞在蘭溪縣東二十三里洞有三上曰白雲中曰紫霞下曰湧雪元吳師道詩清事長為俗纍侵靈源悵望一何深空山黃葉無行跡明月青松自落隂巖古每懷劉子隱地偏猶缺謝公吟相看倘有飄然興布襪青鞋約重尋浦陽江在浦江縣界源出深山及巖坑山本吳越三江之一春秋外傳所謂三江環之是也天中湖在府城東三十五里與黃演松溪諸湖相映帶繡川湖在義烏縣治西廣數百頃羣峯環列粲如組繡故名本朝王禕詩十里華川上年來足勝逰雨花林下寺風栁驛邊樓漠漠芙蓉浦依依杜若洲平生身外事未許付沙鷗上湖在夏山絶頂冬夏不涸久旱禱之必雨瀫水在府城東南西流至蘭溪縣龍門水在蘭溪縣北三十里一名梅溪源出浦江縣烏蜀山嵗旱禱雨多應大銅川小銅川在永康縣西北一十七里小銅川水入大銅川併入武義縣界梅溪在府城東北發源武義縣流入永康溪雙溪在府城南其源有二一出東陽縣大盆山一出處州縉雲縣與東陽義烏二溪合流故名赤松溪在府城西北自南流至赤松宮蘭溪在蘭溪縣西南三里即瀫水也以岸多蘭茝故名宋楊萬里詩蘭溪水清千頃强畫溪在東陽