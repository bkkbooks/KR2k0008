body:
  text: 明一統志卷三明李賢等撰真定府東至直𨽻河間府獻縣界三百一十里西至山西平定州界一百八十里南至直𨽻順徳府内丘縣界二百一十里北至直𨽻保定府慶都縣界一百七十里自府治至京師六百三十里至南京二千一百里糧一十一萬七千石零建置沿革禹貢冀州之域天文昴畢分野周為并州地春秋屬鮮虞國戰國屬趙秦為鉅鹿郡地漢初置恒山郡後避諱改曰常山武帝置真定國常山屬焉東漢建武間併真定屬常山國魏復為郡晉因之治真定後魏移治安樂壘後周於郡置恒州隋廢郡存州大業間省州以縣屬髙陽郡唐復置恒州開元間改恒山郡置大都督府元和中改鎮州後陞成徳軍節度五代時梁改武順軍唐復為成徳軍後復為鎮州晉改順德軍漢復為成徳軍周改為鎮州宋為真定府成徳軍節度金屬河北西路元改真定路本朝改為真定府直𨽻京師領州五縣二十七真定縣附郭本戰國趙之東垣邑漢改為真定縣屬平山郡後周恒山郡治此隋郡廢分置常山縣𨽻恒州大業間省常山入真定屬恒山郡唐改真定曰中山神龍初復名真定為鎮州治宋金真定府元真定路並治此本朝因之編户一十四里井陘縣在府城西南一百五十里本漢舊縣属常山郡隋於縣置井陘郡唐初改井州尋省宋於縣置天威軍金改為威州元移威州治洺水以井陘𨽻廣平路本朝改𨽻真定府編户一十四里獲鹿縣在府城西南五十里本戰國趙之石邑漢屬常山郡北齊廢隋復置尋分置鹿泉縣唐改名獲鹿𨽻恒州宋以石邑省入金陞為鎮寧州元改西寧州尋復為獲鹿縣𨽻真定路本朝因之編户二十八里元氏縣在府城西南九十里本趙公子元之封邑漢置元氏縣常山郡治于此晉改屬趙國北齊省隋復置屬趙郡唐屬趙州五代宋金元皆𨽻真定本朝因之編户二十一里靈夀縣在府城西北六十里本戰國時中山國地漢置靈夀縣屬常山郡後周立蒲吾郡於此隋廢郡以縣𨽻恒山郡後置燕州唐廢以縣属并州復属鎮州宋省入行唐尋復置属真定府金元仍舊本朝因之編户一十四里藁城縣在府城東南六十里本漢舊縣屬真定國晉省後魏復置北齊改為髙城縣置鉅鹿郡隋初郡廢置㢘州後復為藁城縣唐置㢘州省栢肄新豐宜安三縣入藁城貞觀初州罷以藁城屬恒州後更曰藁平宋金俱属真定府元初為永安州尋復為藁城縣本朝因之編户一十六里欒城縣在府城南六十里本春秋晉欒武子封邑漢為闗縣屬常山郡東漢置欒城縣漢末廢後魏復置欒城縣屬趙郡北齊廢隋復置屬欒州後屬趙郡唐屬趙州改屬恒州天祐間更名欒氏尋復舊名宋金元仍舊本朝因之編户一十二里無極縣在府城東八十里本漢母極縣𨽻中山國晉省後魏復置尋省北齊又置屬恒山郡隋屬定州唐屬㢘州武后時改毋作無宋金元俱屬中山府本朝改今屬編户一十四里平山縣在府城西九十里本春秋晉之蒲邑漢為蒲吾縣屬常山郡魏晉以来廢隋置房山縣屬恒山郡唐初於此置徽州尋廢州以縣屬恒州天寳中改為平山縣宋金元仍舊本朝因之編户二十一里阜平縣在府城西北二百五十里本隋行唐縣地唐因之宋置北寨金改為北鎮明昌巾陞阜平縣元仍舊本朝因之編户一十一里定州在府城東北一百三十里漢為中山郡後改中山國後魏改定州晉慕容垂都此隋改博陵郡唐改定州天寳初改博陵郡乾元初復為定州建中間改義武軍節度宋改定武軍政和間陞中山府金改定州後復改中山府元因之本朝改為定州以安喜縣省入編户三十五里領縣三新樂縣在州城西南五十里本漢新市縣屬中山國隋改為新樂縣屬定州唐宋金元皆仍舊本朝因之編户一十三里曲陽縣在州城西六十里漢置上曲陽縣屬常山國以在太行之陽轉曲䖏故名東漢屬中山國北齊改為曲陽縣屬中山郡隋改為恒陽縣屬定州唐元和中復名曲陽縣宋屬中山府金因之元初改為恒州尋復為曲陽縣𨽻保定路本朝改今屬編户二十五里行唐縣在州城西九十里秦割真定地置南行唐縣漢屬常山國晉屬中山國後魏去南字為行唐縣隋屬恒山郡唐置玉城縣長夀初又改章武神龍初復名行唐大歴初置泫州尋廢以縣屬恒州五代梁改彰武縣晉改永昌縣尋復舊宋金俱屬真定府元屬保定路本朝改今屬編户二十四里冀州在府城東南二百八十里春秋晉東陽地秦屬鉅鹿郡漢為信都縣立信都國于此景帝時改廣川國後復信都國東漢更名安平國後置冀州治此晉改長樂國後魏改長樂郡隋為信都郡唐改冀州尋改魏州後復舊名天寳初改信都郡乾元初復為冀州治信都縣宋増置武安軍金仍冀州屬河間府元屬真定路本朝因之以信都縣省入編户二十四里領縣四南宫縣在州城南六十里本漢舊縣屬信都國東漢屬安平國晉省後復置北齊省隋復置屬冀州宋省堂陽新河縣入焉金元仍舊本朝因之編户二十四里新河縣在州城西六十里本漢堂陽縣屬鉅鹿郡東漢屬安平國北齊省隋復置屬冀州唐因之宋省入南宫縣元復置新河縣𨽻冀州本朝因之編户一十四里棗强縣在州城東三十里本漢舊縣屬清河郡東漢省魏復置晉析置廣川縣屬渤海郡北齊省廣川縣入棗强其地棗木强盛故名隋唐皆屬冀州宋省為鎮尋復置金元仍舊本朝因之編户二十里武邑縣在州城東北九十里本漢舊縣屬信都國東漢屬安平國晉置武邑郡於此北齊郡縣俱廢隋復置縣以觀津縣省入屬冀州唐宋金元俱仍舊本朝因之編户二十五里晉州在府城東九十里本春秋鼓子國漢置下曲陽縣屬鉅鹿郡晉屬趙國後魏曰曲陽屬鉅鹿郡北齊廢隋置昔陽縣屬定州尋改為鼔城縣屬趙郡唐屬定州後屬恒州宋金俱屬祁州元置晉州本朝因之以鼔城縣省入編戸二十一里領縣三安平縣在州城東北九十里本漢舊縣屬涿郡東漢屬安平國晉置博陵國北齊為博陵郡治隋置深州後省州以縣屬博陵郡唐又置深州五代宋金皆因之元改曰南平州中統初為安平縣属晉州本朝因之編户一十五里饒陽縣在州城東北一百三十里本漢舊縣属涿郡其治在今縣西南三十五里東漢屬安平國晉屬博陵國隋屬瀛州唐為深州治所五代宋金皆屬深州元改屬晉州本朝因之編户一十九里武强縣在州城東一百六十里漢為武隧縣地属河間國東漢属安平國晉析置武强縣屬長樂國後魏屬武邑郡隋初以武隧省入屬信都郡唐屬深州後屬冀州宋金俱屬深州无置東武州尋廢州以縣屬深州改屬祁州中統初改屬晉州本朝因之編户一十六里趙州在府城南一百一十里春秋屬晉戰國屬趙秦為邯戰鉅鹿二郡地漢初立趙國治邯戰縣晉趙國治房子後魏廢國為趙郡治平棘北齊置趙州隋置欒州後改為趙州大業初改趙郡仍治平棘唐復為趙州治栢鄉尋復治平棘天寳初改趙郡後復為趙州宋置慶源軍宣和初陞慶源府金仍改趙州後改為沃州元復為趙州屬真定路本朝以平棘縣省入編户二十四里領縣六栢鄉縣在州城南七十里本春秋晉鄗邑地漢為鄗縣屬常山郡隋分置栢鄉縣遥取漢栢鄉之名屬欒州後改屬趙州宋省栢鄉為鎮後復置縣金𨽻沃州元𨽻趙州本朝因之編户一十二里隆平縣在州城東南一百里本漢廣阿縣屬鉅鹿郡東漢省後魏復置屬趙郡隋改為象城縣又改為大陸縣屬趙州唐復象城縣尋改為昭慶縣宋更名隆平尋省入臨城縣後復置金屬沃州元屬趙州本朝因之編户一十三里髙邑縣在州城西南五十里本晉鄗邑漢為鄗縣屬常山郡光武即位於鄗南改曰髙邑為冀州刺史治所晉屬趙國後魏屬趙郡北齊移治於漢房子縣界隋屬欒州後屬趙州宋屬慶源府金屬沃州元屬趙州本朝因之編户一十二里臨城縣在州城西南九十里戰國屬趙為房子邑漢置房子縣屬常山郡晉置趙國治房子後魏屬趙郡北齊省隋復置唐改臨城縣屬趙州宋金元仍舊本朝因之編户一十六里贊皇縣在州城西九十里本東漢髙邑縣地屬常山國隋置賛皇縣取山為名屬欒州尋改屬趙州唐因之宋省為鎮尋復為縣金𨽻沃州元併入髙邑尋復置本朝因之編户一十四里寧晉縣在州城東四十里春秋晉楊氏邑漢為楊氏縣屬鉅鹿郡晉為癭陶縣屬鉅鹿國後魏改癭遥縣屬南鉅鹿郡隋復曰癭陶屬趙州唐改為寜晉縣宋金元仍舊本朝因之編户二十七里深州在府城東二百五十里本漢下博縣地屬信都國東漢及晉屬安平國隋屬信都郡開皇中始置深州治安平縣後廢唐復置深州於饒陽縣移治陸澤五代周始徙治下愽宋改下博曰靜安金元仍舊本朝以靜安縣省入編户二十五里領縣一衡水縣在州城南五十里本漢信都國桃縣地隋分信都武邑下博三縣地置衡水縣屬冀州大業初屬信都郡唐宋金皆屬冀州元割屬深州本朝因之編户十二里郡名恒山漢名形勝壯哉一都㑹真定壁記靣臨滹水背倚恒山左接瀛海右抵大行圖經表山𢃄河元史天倪𫝊真定表山帯河連屬三十餘城山水秀麗邦鄙平夷元志當燕趙之郊雄於河朔本朝朱中敏重修本府公宇記風俗性緩尚儒仗義任俠通典土廣俗雜同上人習文武真定㕔壁記風物繁衍地廣氣豪人習為文則彬彬其質習為武則﨣﨣其雄獷悍木彊之習可變禮義㢘耻之風蘇過送孫誨若赴官序人物雄豪郡志山川劍山在井陘縣東一十里其形似劍城山在井陘縣東南三十里形如城垣雲鳳山在井陘縣東北四十里昔有彩雲彌覆丹鳳来集故名神山在井陘縣東五十里上有古山神祠陘山在井陘縣東北五十里漢置縣取此團尖山在井陘縣北六十里峰圓而銳故名射垜山在井陘縣東南六十里秦將王翦伐趙下井陘於此射垜鑾臺山在井陘縣東南七十里相傳隋文帝邀其女妙陽公主嘗駐蹕於此因名蒼巖山在井陘縣東南七十里峰巖疊翠髙出雲表上有雲霞交映中有石泉泉畔有龍王因祠祠東曰福慶寺相傳妙陽公主有疾浴此泉遂愈建寺為修行之所海山在獲鹿縣東五里上有海山龍堂堂下有穴水常不竭抱犢山在獲鹿縣西八里舊名萆山漢書韓信伐趙使人持赤幟從間道登萆山而望即此後魏葛榮之亂民有不從者於此抱犢而死故名上有石刻抱犢禍地四字元劉因詩亂山西去獨峥嶸合在仙經第㡬名物外髙閒真有意亂来險固亦堪驚太行穠秀霜洗盡全趙規模天鑿成珍重幽人留顧盻封龍英爽未全平横山在獲鹿縣東南一十二里上有聖母祠西屏山在獲鹿縣西三十里髙數百丈峯巒連亘宛若刻屏每冬雪霽望之如氷封玊削一郡中之竒景也海螺山在獲鹿縣西南山下有白鹿泉山之陽有巖巖有洞幽邃狀如門屋連續曰連珠洞金時賜額曰靈巖刻于洞上神巖山在元氏縣西南一十里石溜山在元氏縣西北二十五里山多巖石旁有長溪廻繞下注深壑靈山在元氏縣西三十里漢時封號與封龍無極白石相等乃縣界名山六之一也無極山在元氏縣西三十五里漢置縣取此上有無極神祠并漢時封號𨽻書碑刻長山在元氏縣西北四十里與黄山相連上有龍井及龍神廟黄山在元氏縣西北四十里上有北岳行祠又新樂縣有黄山出細輭白石可為器白石山在元氏縣西北五十里山多白石漢光和中封白石神君有碑刻甚古封龍山在元氏縣西北五十里舊名飛龍山勢如伏龍欲飛舉状唐改今名李公緒趙記云每嵗有疾風暴雨来自東南俗𫝊山神所為上有華盖螺峰玉石獅子諸峰峰西有蝦䗫石北有古石堂中有石佛又名佛洞洞之北谷有泉水俗呼龍王池其水南出螺峰之下上又有南北二天井前有金榆科障二山左右相