光武征王郎時築苦陘城在無極縣東北二十八里戰國魏李克為中山相苦陘之吏上計而入多其前克執而免之漢為縣屬中山章帝改曰漢昌新處城在定州漢置縣属中山國光武封陳俊為新處侯即此嘉陽城在平山縣東一十八里漢於北置蒲吾縣属恒山隋省入井陘縣九門城在藁城縣西北二十五里本戰國時趙邑漢置九門縣北齊省隋唐復置宋省入藁城故權城在府城北二十里元和志即古捷鄉也西平州城在平山縣西門外相傳昔為西平州遺址尚存瀝城在寧晉縣東城乃小堡城下藪澤周迴百餘里中有魚藕菱茨之利每嵗饑兵荒土人頼以全活者甚衆金末王義率衆保此女憙城在定州東三十里本漢安險縣章帝改為安熹昭烈嘗為尉處廣阿城在隆平縣東一十里漢縣後省隆平故城在隆平縣東宋大觀間城為水患遂移今治辟陽城在冀州東南漢縣属信都國後漢省入信都縣桃城在冀州西北四十五里漢桃縣屬信都國後漢省堂陽城在武邑縣西六十五里漢縣属鉅鹿郡後漢屬安平國晉改蒲澤縣宋省入南宫安鄉城在無極縣南六里魏明帝封外祖甄逸為安鄉侯即此癭陶城在寧晉縣南二十九里東漢置縣屬鉅鹿郡隋属趙郡葦澤城在井陘縣東北二十五里隋置縣屬井州後併入井陘百暢亭在臨城縣西一十里水經載泜水東經百暢亭即此廣望亭在安平縣城西即漢舊涿縣後王莾於此置廣望亭蕪蔞亭在深州城外滹沱之濵今𨽻饒陽縣界即漢馮異進豆粥于光武處麥飯亭在滹沱河上漢光武至滹沱河馮異於此進麥飯後人因以築亭南亭在南宫縣漢光武嘗遇大雨引車入道旁客舎馮異抱薪鄧禹然火對竈燎衣而去即此辟陽亭在冀州東南三十里水經註漢故瀆東北經辟陽亭即此京觀在晉州廢鼓城縣七里後漢皇甫嵩攻黄巾賊張角弟寳于下曲陽獲首十餘萬於此築為京觀名宦周樂羊為魏將伐中山魏文侯封之靈夀子孫因家焉樂毅其後也漢張敞宣帝時冀州部中有大賊召拜敞為冀州刺史居部嵗餘盜賊禁止朱博成帝時冀州刺史行部有吏民遮道自言愽駐車决遣四五百人皆罷去如神州郡畏其威嚴蕭育冀州刺史以經學與士民講誦以政事為吏民恱服鄧晨為常山太守㑹王郎反光武自薊走信都晨亦㑹鉅鹿下光武曰偉卿以一身從我不如以一郡為我北道主人晨乃歸郡發射士遣委輸給軍不絶萬修信都令與太守任光都尉李忠迎光武拜偏將軍李忠新博属長郡中咸敬信之光武討破信都命忠行太守事有恵政任光信都太守王郎反郡國皆降獨光發兵城守光武自薊還光開門迎謁拜左將軍馬成以大司空屯常山中山以備邉防北方無事拜中山大夫伏恭建武間常山太守敦修學校教授不輟由是北州多為伏氏學朱穆永興初冀州刺史持憲正平令長聞風解印綬者四十餘人左雄安帝時冀州刺史門杜請託奏按貪猾二千石無所回忌周舉冀州刺吏左雄薦其方正清平徴拜尚書蘇章順帝時冀州刺史有故人為清河太守章行部至清河設酒甚懽守喜曰人皆有一天我獨有二天章曰今日與故人飲者私恩也明日刺史按事者公法也遂舉正其奸賍之罪范滂桓帝時冀州饑荒盜起以滂為清詔使按察之滂登車攬轡慨然有澄清天下之志及至州境守令贓汙者多望風解印綬去郅夀冀州刺史時冀諸王賔客放縱不檢夀按察之無所容藩國畏懼冀土肅清第五種以司徒掾使冀州㢘察災害舉奏刺史二千石以下多得罪聞風棄官者數十人賈琮靈帝時冀州刺史舊典傳車驂駕垂赤帷裳琮曰刺史當廣視逺聽紏察美惡豈有垂帷裳以自掩塞乎乃命御者搴之郡縣聞風震竦蔡衍冀州刺史時中常侍曹騰弟鼎為河間相贓罪千萬衍劾奏之皇甫嵩靈帝時領冀州牧奏請一年田租賑饑詔從之百姓歌曰天下饑亂兮市為墟田母不保子兮妻失夫頼得皇甫兮復安居吏有受賂者嵩更以錢賜之吏慚或至自殺賈詡為冀州牧曹操與袁紹相拒於官渡糧方盡問詡計焉出詡曰必决其機訃可定矣操曰善并兵出擊紹紹軍大潰操鎮冀州徙詡為大中大夫三國司馬朗魏堂陽長其治務寛恵不行鞭杖而民不犯禁邢顒魏冀州從事時稱其徳行堂堂除行唐令勸民農桑風化大行孫禮魏冀州牧决八年爭界之訟在郡甚有威信晉山濤冀州刺史能甄拔隱屈搜訪賢才旌拔三十餘人皆顯名當時丁紹冀州刺史嘗破冦有功假節監冀州諸軍事號令嚴肅人畏而愛之南北朝張恂魏恒山太守開建學校優禮儒士吏人歌頌之政為當時第一酈道元魏鎮州鎮東府長史行刺史事政尚嚴肅吏人畏之姦盗逺去陸俟魏冀州刺史政最為天下第一源賀魏冀州刺史鞠獄以情徭役務簡省清約寛裕甚得人心朱韶魏定州刺史先在冀有名二州接境百姓素聞其徳州内大治封隆之北齊時四為冀州刺史每臨冀部州中舊齒咸曰我封公復来其得物情如此後神武過冀追述其徳為之流涕髙浟北齊定州刺史擒奸如神境内無盗政化為當時第一楊楙之北齊中山太守有恵政既去民樹碑頌德隋陸騫中山太守以政績著稱於時趙煚冀州刺史甚有威恵嘗有疾百姓奔馳争為祈禱其得物情如此唐李𤣥通定州總管為劉黒闥所破愛其才欲以為將不聴囚之故吏有餉飲者𤣥通縦飲因舞劍曲終仰天太息潰腹而死賈敦頥冀州刺史有治名與滄州薛大鼎瀛州鄭徳本俱為時所稱故河北號鐺脚刺史裴子餘開元初冀州刺史為政恵裕一郡清平韋景駿趙州長史興學校罷滛祠甚有善政龎履温開元末為元氏令公平稱職清儉當官有善政民為立清徳碑鄭放𤣥宗自擇刺史十一人放自太僕少卿出為定州刺史詔宰相諸王以上祖送洛濵放至官以治最聞顔杲卿恒山太守安禄山叛其將史思明攻恒山杲卿晝夜戰城䧟被執賊脅使降不屈見禄山瞑目罵之禄山忿節解以肉噉之罵賊不絶而死裵度長慶間王廷湊反度時為鎮州四靣行營都招討使討平之李元軌定州刺史突厥入冦元軌令開城門偃旗幟虜疑不敢入夜遁張孝忠定州刺史朱滔王武俊叛遣人来說孝忠拆以大義乃浚溝壘修器械乗城固守滔攻之不克裵守真冀州司馬其六世祖叔業嘗仕魏為冀州刺史子餘又刺冀州三世皆有恵于冀時人稱之五代張暉周冀州刺史㑹詔築李晏口束鹿安平博野武强等城命暉護其役踰月而就杜漢徽周時以指揮使率所部戍深鎮二州及移屯安平縣屢破契丹甚有戰功宋韓令坤成德軍節度使鎮恒山十年北邉以寧及卒太祖甚惜之李繼隆帥定州嘗運芻粟入威虜軍契丹兵邀繼隆繼隆敗之子昭亮四為中山守有保障功既去郡人追思祠事之如神明吕端通判定州以清介為吏民所服馬知節知定逺軍持己方正人不敢干以私有軍卒盗婦人首飾者知節斬之一軍肅然詔知深州有治聲吳元扆知定州及考滿吏民䟽其善政十事詣闕借留又樹碑表其徳政趙延進太宗時知鎮州及代吏民數千守闕借留詔許留一年王素知成徳軍政行寛大茍有不便於民者亟改之吏愛民恱韓𤦺仁宗時知成徳軍設條教葺帑廩勸農興學人愛慕之如父母徙知定州以古法教士卒嵗饑賑活七百萬人隣郡取其政以為法其子忠彦兩知定州民喜曰此老相公子也必使我曹安穏矣忠彦推行父法視民如傷李允則知鎮州處事精審吏民恱服宋祁知定州時鎮定分為二郡言二郡一體也請合為一路以將相大臣領之無事時以鎮為理所有事則遷治定上然之李冲嘉祐中知信都縣有善政與南宫令劉摯清河令黄莘皆以治行聞時稱為河朔三令張㫖知安平縣大募富民輸粟以給餓者又浚渒河泄支流溉田數萬頃外築隄以備水患田照隣慶歴中知元氏縣威惠浹洽境内大治黄寔知定州朝㫖籍民為兵旁郡因縁擾困寔懐檄不下而畫利害請之事得寢王鼎知深州王則以貝州反深卒龎旦等謀劫庫兵應之前期有告者鼎捕首謀者斬于市一郡帖然郡大饑經營振救盡其力張昭逺知成徳軍滹沱河决壞城郭乃修五闗城外環以隄民至今為利魯有開神宗時知冀州時河决而水不至城下數里有開議増築治城隍人謂無水何勞役為有開曰當備未然明年水至以有備遂無患韓璹知安喜縣為政强力能使吏不賄定州守韓𤦺稱其才髙繼勲知定州又知冀州所至善撫御士卒有威名任布知真定府或欲省河北兵布言契丹西夏方窺伺中國備未可弛築甬道屬滹沱河跨絶泥潦周沆知成徳軍俗方棄親事佛沆按斥數千人還其家李昭述真定路安撫使知成徳軍時大水民多流亡籍僧舎積粟為粥糜活饑民數萬計王巖叟知安喜縣有法吏罷居鄉里𨗳人為訟巖叟捕撻于市衆皆竦然定州守呂公著嘆曰此古良吏也蔚昭敏冀貝行營兵馬都監契丹以五千騎突至冀州城南昭敏帥部兵與戰敗之得其器甲敵遁去而師不失一人竇卞知深州熈寧初河决滹沱地大震流民来者踵相接卞發常平粟食之吏白擅發且獲罪卞曰吾寕以一身活數萬人趙抃武安軍節度推官人有赦前偽造印更赦而用者法吏當以死抃曰赦前不用赦後不造不當死讞而生之孫長卿知定州熙寧初河北地大震城郭倉庾皆隤長卿盡力繕補性㢘潔在郡當得園利八十萬悉歸之公吕公著元豐中為定州安撫使時永樂城䧟神宗臨朝嘆曰邉民疲弊如此獨吕公著為朕言之耳滕元發知定州初入郡言新法之害嵗旱求言又疏奏新法害民者後徙知真定蔡抗知定州郡兵畨戌室家留營多不謹夫歸輒首原抗下令悉按以法戌者感焉蘇軾知定州嚴軍律禁飲博軍中富足又奏免保甲及兩稅折變料配不便等事民咸徳之孫固熈寧中知真定府遼人盜耕解子平地嵗且久吏爭弗能還固㣲得其要領折愧之正疆地二百里管師仁知定州時遼横使再至師仁承詔増陴浚隍繕緝甲胄豫為計度一日而卒衆十萬轉盻迄成于是日與賔客燕集以示間暇使敵不疑侯䝉知栢鄉縣民訟皆决于庭受罰者不怨轉運使黄湜率諸使者合薦之陳遘歴知中山真定欽宗立復自真定徙中山金人再至遘突圍入城拒守受圍半年數與敵戰為部將沙振所害李彌遜宣和末知冀州金人犯河朔彌遜捐金帛致勇士修城堞决河護塹擊其游騎斬首甚衆烏珠北還戒師母犯其城劉韐再知真定府首賊柴宏聚衆剽刺韐單騎招之宏服罪韐飲之酒奏以官縱其黨還田里一路遂平劉竧靖康初為真定路都鈐轄金人来攻竧率衆晝夜搏戰城䧟猶巷戰知不敵顧其弟曰我大將也可受敵戮乎挺身之孫氏山亭中自縊死李政河北將官冀州駐劄金兵屢攻城政皆却之政號令明賞罰信人皆用命政死城始䧟金鄭奥天㑹中為獲鹿今興學校崇儒術時稱有文翁之風趙叶大定初為賛皇令精於法律甚有政聲比秩滿民不忍其去𤓰爾佳檝大安初任賛皇薄禮以接士嚴以治奸嵗值蝗旱民大饑窘檝規畫賑救有法民頼以存縣境有塘産蓮嵗久不開自檝来連嵗得瑞花人以為異政所感元史天澤真定等五路萬户治真定招撫流民賑濟饑餒初武仙以郡叛主將欲盡誅郡人天澤恐濫及無辜亟諌數四郡人咸得全活史楫真定路總管謹身率先明政化信賞罰任賢良汰貪墨恤孤獨民咸德之閻玉中統初調曲陽尹興利革弊甚得民心至元初改藁城尹以疾卒兩邑耆庶紀其異政為立遺愛碑姚天福真定路總管時真定驛傳之需多為民害天福更議措置之方使不擾民詔頒其制為天下式趙仁舉大德間知晉州政平訟理人庶樂業晉人立碑以志不忘賈垕延祐中為賛皇尹嵗饑集鄉豪勸出餘粟以給貧困在任以勸農興學為務齊謙至元間知趙州勤于政事明于决訟民懐其徳立碑頌之王安仁晉州節度使弟安上節度同知州治學校一新禮樂法度粲然備舉宋明善至正間為髙邑尹勸課有方寡嗜欲甘澹泊縣人立碑以頌其德本朝胡秉中洪武初行唐知縣教民祀先孝順義節讀書乃作三圖頒降郭勉洪武初真定知府興學校督農桑民懷其忠時稱有古循吏之風洪子祥洪武初真定知縣學問該博通逹政務士民至今稱頌孫緒洪武中為饒陽知縣均賦役清刑罰以㢘能稱縣人懷恵張惟康洪武中為武強知縣㢘能幹濟寛洪愛民代去縣人稱頌不置齊仕坤洪武中為新河知縣寛以愛民政清事簡後以老致仕賜半俸終于家張徴洪武中為元氏知縣到官首詢民瘼振興五事縣人至今稱頌之耿福縁永樂初為安平縣丞㢘能才幹撫民有方後以母憂去耆老百餘人赴闕請留不允比服闋邑民又懇請復任方杲永樂中知南宫縣存心愷悌蒞政公勤尋以政績著聞陞刑部郎中人物周郤缺春秋晉大夫芮之子耨於冀其妻饁之敬相待如賔臼季使過冀見之與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之文公用為下軍大夫復與之冀為采邑因以為氏稱冀缺云子克克子錡世為晉卿郤縠行唐人晉文公蒐於被廬作三軍謀元帥趙衰曰郤縠可公曰何以知其可也衰曰郤縠說禮樂而敦詩書必知御兵之道公乃使縠將中軍使郤溱佐之荀况趙人仕楚為蘭陵令著書數萬言羽翼六經有荀子傳于世列國樂毅靈夀人樂羊之後自魏適燕燕昭王以為亞卿伐齊下七十餘城封昌國君後奔趙封望諸君漢髙帝時求毅後得其孫樂叔封之樂鄉曰華城君㢘頗趙人恵文王時將兵伐齊大破之取晉陽為上卿以勇氣聞於諸侯故强秦不敢加兵於趙李牧趙人為趙將常居代鴈門避匈奴不戰者數嵗後一戰大破匈奴十餘萬騎又大破秦軍以功封武安君趙勝趙公子最賢喜待士食客數千人相恵文王及孝成王秦圍趙邯戰盡散家之所有以饗士得死士三千人却秦軍號平原君與齊孟嘗楚春申魏信陵號四豪趙奢趙人為田部吏秦伐韓請救於趙趙以奢為將大破秦軍號馬服君藺相如趙人時趙有良璧秦請易以十五城相如奉璧入秦秦負約相如乃完璧歸趙及秦王與趙王㑹澠池秦王令趙王鼓瑟相如亦請秦王擊缶秦終不能勝趙以功拜上卿漢李左車行唐人初仕趙封廣武君趙王歇不用左車計竟為韓信所敗信募得左車師事之用其策下燕齊諸城田叔趙郡陘城人仕為漢中守文帝召問公知天下長者乎叔對以孟舒帝曰孟舒守雲中虜入不能守使士卒戰死長者固殺人乎叔曰昔貫髙等謀反詔敢有隨趙王張敖者罪三族而孟舒自髠鉗隨趙王是乃所以為長者也帝曰賢哉復召孟舒為雲中守馮唐趙人為中郎署長嘗言雲中守魏尚有功而削其爵帝納之使唐持節赦尚復為雲中守拜唐為車騎都尉竇嬰觀津人景帝朝為詹事竇太后愛帝弟梁王王朝因燕帝顧曰千秋萬嵗後傳王嬰進曰天下者髙祖之天下父子相傳漢之約也安得傳梁王時太后好黄老而嬰重儒術以是不合遂免去吾丘夀王趙人武帝時為侍中丞相公孫𢎞奏禁民挾弓弩夀王以為无益於禁奸徒擅賊威而奪民救及汾隂得寳鼎衆以為周鼎獨夀王以為漢鼎帝善之累官光禄大夫耿純鉅鹿宋子人從光武恢復有功封髙陽侯嘗為東郡太守視事數日盜賊清寧後東郡盜起純與大兵㑹討賊聞純入界九十餘人皆詣純降卒謚成侯邳彤信都人初為王莽和咸郡卒正歸光武拜太守信都反者捕係其父弟妻子使為手書招彤彤報曰事君者不顧家以功封靈夀侯圖像雲臺崔駰安平人父篆王莽時為建新大尹理出寃獄二千餘人駰博學有才著詩賦銘頌二十餘篇子瑗舉茂才遷汲令時薦其宿徳大儒遷濟北相瑗子實舉至孝獨行嘗著政論指切時要積官至尚書崔𤦺安平人以文章博通稱梁冀行多不軌𤦺作外戚箴以諷冀呼𤦺問之𤦺曰昔管仲相齊樂聞譏諌之言蕭何佐漢乃設書過之史今將軍欲鉗塞士口乎冀因遣𤦺歸隂使人害之劉祐中山安國人初補尚書侍郎閑練政事累官大司農後歴三卿乞歸遂杜門絶迹每三公缺朝廷皆屬意於祐以譛毁不用既而大誅黨人幸不及禍顔良新河人少聰敏才氣宏逹比壯驍勇善謀為鄉老所推漢末為袁紹將屢有戰功後為闗公所刺三國趙雲真定人漢昭烈為曹操所追棄妻子南走時雲為騎將保䕶皆得免難累遷翊軍將軍封永昌亭侯晉張載安平人博學有文章太康初至蜀省父嘗著劍閣銘武帝命鐫之劍閣山累官中書侍郎領著作弟協少有雋才與載齊名官至河間内史時亂遂棄官家居以詩文自娱亢亦能文尤解音樂時號三張馮紞安平人祖浮魏司𨽻校尉父員汲郡太守紞博渉經史識悟機辯初仕魏為魏郡太守入晉累遷御史中丞深得武帝寵愛終散騎常侍崔洪博陵安平人髙祖實著名漢代父讚魏左僕射洪清厲鯁直武帝時累官吏部尚書舉用甄明門無私謁子廓終散騎侍郎亦以正直稱劉琨中山魏昌人為侍中太尉少與祖逖為友每枕戈待旦志欲討逆常曰吾恐祖生先我著鞭南北朝甄法崇中山人仕宋為江陵令在任嚴整時人稱之孫彬有操行家貧嘗以束苧就僧質錢後贖苧還於中得金五兩彬以還寺僧梁武帝踐祚召為益州錄事叅軍時同列行者五人帝親誡以㢘慎至彬獨曰卿昔有還金之美不復以此言相屬蘇侃武邑人祖䕶本郡太守父端中州從事侃渉獵書傳仕南齊為冠軍錄事叅軍深自勤厲為髙帝所委付卒謚質侯李靈趙郡平棘人父勰有聲趙魏間魏道武時靈以才雋被徴拜中書博士尋選授文成帝經終洛州刺史贈鉅鹿郡公子恢襲爵為侯恢孫瑾好學不倦終大司農賈彛廣川都亭人父為符堅鉅鹿太守坐訕謗繫獄彛年十嵗詣長安訟父獲申逺近嘆之後事魏道武拜尚書左丞叅預國政李孝伯順從父弟父曽以鄭氏禮左氏春秋教授郡三辟功曹不就魏道武時為趙郡太守令行禁止兄祥歴河間淮陽太守孝伯博綜羣書動止有度太武初累遷散騎侍郎明逹政務朝野推重之李順靈從父弟多計䇿仕魏以中書侍郎從征蠕蠕有功賜爵平棘子後從克統萬惟取書數千卷卒追封髙平王謚曰宣子敷南部尚書朝政大議事無不闗李先中山盧奴人少好學善占相仕魏為博士太武問何者可以益人神智對曰唯有經書又曰朕欲集天下書籍如何對曰王者欲集不難於是下詔捜訪遺書陸夸髙邑人耽好書傳髙尚不仕少與崔浩為莫逆交浩為司徒奏徴為中郎辭疾不赴州郡逼遣不得已入京與浩相見經留數日唯談叙平生不及世利浩每欲論屈之竟不能發言崔綽洪五世孫祖懿燕秘書監父遭鉅鹿令綽少孤學行修明神䴥中與范陽盧𤣥平棘李靈俱被徴母老固辭後為郡功曹崔鑒綽子有文學仕魏自中書博士轉侍郎出為徐州刺史於州内銅冶為農具兵人獲利爵桐廬縣子子二合襲爵終常山太守康有膽氣終儀同三司李恵中山人魏太武時累官雍州刺史為人明敏長於伺察人吏莫敢欺犯後遷青州刺史歴政有美績為文明太后所忌䧟天下寃惜之李璨靈帝受學梁祚仕魏為中書郎以定淮北功賜爵始豐侯子二元茂位司徒彭城鎮副將人吏安之宣茂位定州大中正曽孫槩有文學嘗著逹生丈人集崔仲哲鑒孫兄忻有世幹魏尚書左丞仲哲蚤孤為祖母宋所養六嵗宋亡啼慕不止性恢逹常以將畧自許累功賜爵安平縣男李謐孝伯從孫十嵗䘮父哀號動人事兄瑒極恭謹十三通詩書而歴數之術尤精鄉人以神童號之著明堂制度魏文成徴拜著作佐郎不就賜號貞静處士弟郁博通經史仕魏累遷黄門侍郎崔辯鑒從祖弟學渉經史風儀俊整仕魏為武邑太守政務之暇専以勸學為急卒謚曰恭子景雋好古博學累官員外散騎侍郎雅為孝文所知重景雋子臣倫有文武藝累功封漁陽縣男甄琛無極人父疑州主薄琛學覽經史仕魏累遷車騎將軍兼侍中在官清白自孝文宣武咸相知待所著有四聲族姓廢興㑹通緇素三論及宗誨二十篇石祖興常山九門人太守田文彪縣令和真等亡祖興出絹二百餘匹營護䘮事州郡表列孝文嘉之賜爵二級為寧陵令崔挺辯從父弟少好學五世同居魏孝文時拜光州刺史風化大行及卒州故吏聞者莫不悲感挺歴官三十餘年家資不益子孝芬卓有才識累官尚書東道行䑓孝偉為趙郡太守有恵政崔振挺弟少好學居家孝為宗族所稱仕魏為秘書中散以謹敕為孝文所知尋兼尚書左丞子朗終侍御史温厚有風尚崔楷辯子兄模雅有志度魏時累功遷相州刺史楷性嚴烈能摧挫豪强時人語曰莫廌獬付崔楷後調殷州刺史州賊蠭起攻城城䧟不屈被害贈侍中子士元沉雅有學尚戰没贈平州刺史劉蘭武邑人年三十餘始受學中山王保安三年後遂以儒學名聚徒二百人蘭長於左氏兼通諸經先是張吾貴解說不本先儒之㫖惟蘭推經傳叅以緯侯講說精悉又明隂陽博物故為儒者所宗杜纂常山人試郡太守以清白名魏明帝初拜清河内史問人疾苦勸督農桑甚有恩紀除東益州刺史清河人三百頌徳政乞重臨郡詔許之纂所歴任輕財潔已為百姓所思號為良守魏季景下曲陽人父鸞以有容儀為奉車都尉季景博學有文才魏莊帝時為中書侍郎歴官大司農卿及卒家無餘財遺命薄葬所著有文筆二百餘篇孟信棗強人家世貧寒從孝武入朝封東州子趙平太守尚寛和權豪無犯終儀同三司散騎常侍信居官清儉室無餘資張普恵常山人精於三禮兼善春秋百家之說仕魏累官東豫州刺史普恵不營財業好有進舉厚於故舊卒謚曰宣恭張吾貴中山人少聰惠年十八仕魏為太學博士吾貴先未多學乃從酈銓受禮牛天祐受易而自得為多其講左氏義例多以新意㕘之學者竒焉李繪靈曺孫六嵗知就學既長神情朗雋其舅邢晏每歎曰宅相之寄良在此甥仕魏歴中書侍郎每朝羣臣對揚繪先發言端音詞辯正風儀都雅聴者悚然弟緯有才學位中散大夫李元忠靈曽孫有志操粗覽書史及隂陽術數居䘮以孝聞仕東魏累官侍中每進從横之䇿髙歡嘉納之卒贈司徒謚敬恵子搔有才藝嘗采諸聲别造一器號曰八弦武定末除河内太守居數載流人盡復代去父老泣送生為立祠崔伯謙鑒從孫東魏髙歡召補相府功曹稱之曰伯謙清直奉公真良佐也嘗為濟北鉅鹿太守威徳大行伯謙少讀經史容止儼然親賔至則置酒相娯清言不及俗事卒謚曰懿弟仲讓仕西魏官至鴻臚少卿崔士謙楷子仕西魏為利州刺史深曉政術吏民愛畏後遷江陵總管外禦强敵内撫軍民風化大行號稱良牧劉亮中山人本名道徳倜儻有計畧仕西魏以都督從征西有功封廣興縣子屢陳謀䇿宇文泰曰卿文武兼資孤之孔眀也乃賜名亮卒贈太尉諡曰襄崔昻孝芬姪㓜孤事母孝孝芬嘗曰此兒吾家千里駒也東魏時攝京畿長史事入北齊累遷散騎常侍兼大司農卿校理有方下無奸偽深為文宣知賞朝之大事多委任之李渾繪兄仕魏為青州征東司馬時崔社客反海岱渾與諸將畫䇿擒社客入北齊累官太子少保時邢邵為少師楊愔為少傅論者榮之子湛渉獵文史官至通直散騎常侍崔暹洪之後仕北齊累官左丞吏部郎好薦人才官至尚書僕射暹憂國如家以天下為己任文宣嘗曰崔暹清平天下無雙也卒諡貞節子逹拏亷謹有學識位至司農卿魏釗下曲陽人博渉羣書有當世才兼資文武北齊世祖南伐召與語大恱曰我今此行是卿建功之日勉之加建忠將軍子長賢愽渉經史為著作郎李公緒靈之後博學經傳尤善天文圖緯魏末為冀州司馬屬疾去任隐賛皇山北齊以御史徴不就沉㝠樂道所著有典言禮質疑喪服章句古今畧記𤣥子趙語若干卷子少通有學行槩終齊功曹叅軍撰戰國春秋音譜魏收季景之族子少機警能屬文北齊受禪詔冊諸文及魏史皆收所撰官至尚書左僕射卒贈司空諡文貞魏蘭根收之族叔博學高才有機警歴官岐州刺史尋加都督諸軍事累遷中書令加侍中鉅鹿縣侯卒贈司徒諡曰文宣子相如族子愷俱重於當世李裔伯父季林魏大中大夫嘗守博陵郡以威嚴名裔仕北齊為神武大丞相諮議叅軍累功封固安縣伯卒贈尚書令司徒崔延伯博陵人仕北齊為元帥膽氣絶人兼有謀畧積勞厯進西道都督延伯善將兵撫下得衆心時與康生大眼為諸將之冠卒諡武烈李幼亷高邑人幼時人故以金寳授之終不取州牧以其幼而亷故名焉仕北齊厯數州守所在見稱後和士開權重百寮盡傾幼亷高揖而已出為南青州刺史卒贈吏部尚書崔季舒父子喻鴻臚少卿兄孟舒廣平太守仲舒鄴縣令季舒渉獵經史仕北齊補大行䑓都官郎中官至侍中待詔文林館在官每推薦人士奬勸文學義聲翕然逺近稱羙崔叔瓉仲哲次子有學識好直言北齊文宣擢為魏尹丞屬蝗為災帝以問叔瓉對曰按漢書五行志土功不時蝗䖝作厲當今外築長城内興三䑓故致此災弟季通終司農少卿季通子德立好學善屬文終濟州别駕崔季良叔瓉弟風望閑雅仕北齊位大學博士以征討功賜爵蒲隂縣子卒諡曰簡獨孤永業中山人北齊天保初除中書舍人為文宣所知後為洛州刺史河陽行䑓左丞甚有威信遷行䑓尚書久在河陽善於招撫周人憚之張彫武中山人通五經尤明三傳弟子就業者以百數北齊神武召為諸子講說遷平原太守後除侍中彫武自以致位大臣勵精在公議論無所廽避數譏切寵要獻賛帷扆武成深倚仗之蘇瓊長樂人仕北齊累官南清河太守郡多盗賊及瓊至姦盗止息瓊性清謹不發私書郡人趙頴五月中獻新𤓰一雙瓊置梁上竟不割有百姓乙普明兄弟争田積年不㫁瓊諭以理其兄弟分異已十年遂還同住李士謙趙郡平棘人幼孤事母孝其伯父瑒稱曰吾家曾子也博覧羣籍善天文術數北齊時徵辟不就家故富每凶年散粟賑貧合藥救疾羣犬生子交相乳之人謂仁心所感比卒趙郡士女聞而流泣相與樹碑于墓隋崔猷孝芬子性鯁直仕周拜御正中大夫隋初進爵汲郡公兄勉渉獵經史仕隋官至尚書右丞子仲方有文武才畧仕周為司正大夫隋初召議正朔服色仲方曰以火承木得天之統並宜用赤累進大將軍李德林安平人㓜聰敏年十五誦五經及古今文籍日數千言遂博該墳典仕隋為内史令文帝受禪時製作皆出其手後與高熲同修律令崔子發仲哲孫有文才仕為國子博士兄子樞多才幹仕北齊厯散騎常侍子端亦有才幹而文藝為優終北齊殿中侍御史子傅終隋泗州刺史李雄高邑人祖榼魏太中大夫父徽北齊陜州刺史雄慷慨有大志隋初累功進爵高都郡公後從晉王出鎮并州雄當官正直王甚敬憚焉崔彭士謙子剛毅有武工騎射畧通周禮尚書文帝時累遷監門郎將在省闥二十餘年未嘗有惰容陳君臣戒慎之義帝甚稱善杜臺卿曲陽人父弼仕魏厯官侍御史臺卿博覧書記觧屬文初仕北齊齊亡教授鄉里隋初徴拜著作郎嘗采月令推廣之為書十二卷名玉燭寳典兄㽔開州刺史子公贍好學有父風終安陽令孫松終起居舍人孫萬夀武強人祖寳後魏散騎常侍父靈暉北齊博士萬夀㓜從熊安生受五經博渉子史善屬文隋初徴拜豫章王長史有文集十三卷李諤趙郡人博學性方明於時務初仕北齊入隋累官侍御史時禮教彫弊文體輕薄諤具疏矯正文帝嘉納且以所奏頒示天下子三大方有才氣判内史舍人大體大鈞並位尚書郎崔𢎞度博陵安平人開皇初拜華州刺史遷襄州總管所在令行禁止盗賊屏息言行剛正見者凜然長安為之語曰寧飲三斗醋莫見崔𢎞度崔頥安平人父廓博覧書籍嘗著論言頥七嵗能屬文開皇初射䇿高第與諸儒定禮樂授協律郎居母憂水漿不入口者五日後奉詔與諸儒撰區宇圖志李德饒璨四世孫曽祖籍之後魏大中大夫嘗著忠誥祖徹北齊尚書左丞父純隋介州長史德饒好學有至性由校書郎轉監察御史每巡四方理寃枉褒孝弟凡師交皆海内名流劉焯信都人少聞武強劉智海家多墳籍往就讀凡十載隋初射䇿甲科詔修國史叅議律厯兼直門下省後罷歸專以教授著述為務凡星厯推歩之術莫不窮其秘要博學通儒無能出其右者李知本元氏人渉獵經史事親篤至兄弟雍順子孫百數庭無間言大業末盗賊過閭不入且相戒曰無犯義門往依者五百餘室魏澹李景子世業文學澹專精好學博渉經史善屬文仕為禮部侍郎遷著作郎高祖以魏收後魏書褒貶失實平繪中興書事不倫序詔澹别成魏史矯收繪之失甚為簡要又有集三十卷唐李思行趙州人避仇太原高祖起兵累具機䇿以賛大議授左三統軍從破霍邑平京師累功遷嘉州刺史樂安郡公諡曰襄李素立高邑人武德初擢監察御史民有犯法不至死者高祖欲殺之素立諌曰三尺法天下所共一有動搖則人無所措手足帝嘉納之累官侍御史後封高邑侯卒諡曰平孫至逺治左氏春秋復撰周書厯天官侍郎從逺清密篤學官太府卿李百藥德林子七嵗能文號竒童後文行為天下推重累官至宗正卿好奬薦後進禄賜多分與親族蘇定方冀州武邑人太宗時為將有功所滅三國皆生執其主累遷至幽州都督張進饒陽人少負竒質有膽氣唐初與饒陽太守諸葛德威合謀擒劉黒闥以功授開府儀同三司賜廐馬五十匹黄金百兩李守素趙州人通氏姓學世號肉譜虞世南與論江右山東人物歎曰肉譜真可畏也時渭州刺史李淹亦明譜學守素所論惟淹能抗之魏徵鉅鹿下曲陽人太宗時拜諌議大夫凡上二百餘奏無不剴切當帝心者後以秘書監叅預朝政及卒帝嘆曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可知得失徵沒朕亡一鑑矣孔頴逹冀州衡水人孔子三十二世孫誦記日千餘言及長善屬文隋末舉明經後仕唐累官國子司業遷祭酒撰五經正義子志孫惠俱為司業時人羙之蓋文逹冀州信都人博渉前載尤明春秋三家太宗時與十八學士之列其宗人文懿亦以儒學稱時號二蓋文懿官至國子助教郭正一定州鼓城人貞觀時由進士厯𢎞文館學士永淳中遷中書侍郎正一執政日久明習故事文辭詔勅多出其手蘇安恒冀州武邑人武后時嘗投匭上書言太子春秋鼎盛當統宸極曰天下者高祖太宗之天下非李氏不王今若蔽元良以據神器他日何顔靣見唐家宗廟書聞不報時論難之杜景佺武邑人性嚴正舉明經中第武后時自益州録事叅軍入為司刑丞與來俊臣專治詔獄時稱遇杜者生遇來者死延載初同平章事武后稱為真宰相後出為并州長史李嶠賛皇人十五通五經舉進士累官給事中㑹來俊臣搆狄仁傑獄嶠與大理少卿張德裕等覆嶠卒明其枉神龍初為中書令其為文章一時學者取法焉劉幽求冀州武強人聖厯中舉制科為朝邑尉初桓彦範等誅二張而不殺武三思幽求謂曰公等無葬地矣已而果然後官至尚書右僕射同中書三品張鷟深州人少聦惠絶倫為文下筆輙成舉進士擢考功員外郎累官至學士時稱其文猶青銅錢萬選萬中號青錢學士孫薦敏銳有文辭累官左拾遺論盧把姦惡進諫議大夫改秘書少監卒諡曰憲趙冬曦定州鼓城人擢進士第厯左拾遺神龍初上謂律令格式宜刋定科條直書其事使愚夫愚婦相率而逺罪犯者雖貴必坐律明則人信法一則主尊當時稱之官至國子祭酒倪若水恒州藁城人擢進士累官尚書右丞嘗為汴州刺史政尚清浄風化大行𤣥宗遣使捕珍禽竒獸於南方若水諫止之徴拜户部侍郎魏知古深州人方直有雅才擢進士第拜黄門侍郎時盛夏造金仙玉真觀工程嚴促知古切諌􅌖宗嘉其直罷之開元初卒宋璟嘆曰叔向古遺直子産古遺愛兼之者其魏公乎李乂趙州房子人沉正方雅為監察御史時遣使江南發庫貲以贖生乂上疏諫曰與其拯物莫若優民後進吏部侍郎請謁不行時人語曰李下無蹊徑兄尚一尚正俱以文章名所著詩文號華蕚集崔湜定州人祖仁師貞觀中為侍御史湜舉進士累官中書令偕弟液澄從兄涖並以文學居要官湜執政時年三十八嘗暮出端門緩轡諷詩張說見之歎曰文與位固可致其年不可及也甄濟定州無極人好學隐居諸府辟召皆不起𤣥宗嘗強致安禄山府中濟知禄山有反謀遂脫歸禄山反緘刃以授使曰即不起㫁其頭來使旣至濟引頸待刃使嗟嘆而止後肅宗召授秘書郎遷太子舍人田神功南宫人天寳末為縣史㑹兵興率衆歸朝以破賊功累遷太子太師且事親至孝謙以待人嘗寢疾吏為祈禱卒贈司徒弟神玉汴宋節度留守啖助趙州人後徙関中淹該經術天寳末調丹陽簿秩滿屏居為春秋考三家短長漏間號集傳崔衍安平人父倫為吏部員外郎安禄山反不汚偽官嘗使吐蕃留六年不屈衍擢明經調清源令天寳末累遷宣歙池觀察使簡静為百姓所懷幕府奏聘皆名士云李芃趙州人永泰初以河陽三城鎮遏使拜度支使與馬燧等破田恱洹水上恱將符麟以騎五百䧏芃大開璧門納之興元初授檢校尚書右僕射李華賛皇人中進士博學宏詞科累官吏部員外郎嘗按劾宰相楊國忠姻婭横暴由是州郡肅然所著有含元殿賦弔古戰場文姪翰觀俱以文知名崔造安平人永㤗中與韓㑹盧東羙張正則三人友善好言當世事皆自謂王佐才故號四䕫貞元初德宗謂造敢言能立事擢中書門下平章事崔損博陵人大厯末中進士博學宏詞科累官至右諫議大夫貞元中拜相立心純白一無所私孔巢父冀州人孔子三十七世孫少力學李季卿薦為叅軍德宗時與李白韓準裴政張叔明陶沔號竹溪六逸後使李懷光遇害子戣官至禮部尚書孫緯尚書左僕射李栖筠賛皇人莊重寡言有逺度為文章有體要舉進士累官御史大夫敷奏明辯不附有勢喜奬人善而樂人攻已短天下士歸重稱為賛皇公崔祐甫博陵人世以禮法為聞家第進士累官至中書侍郎薦擢人材推至公以行卒諡文正以從子植為後植博通經史補𢎞文生累官至宰相穆宗問貞觀開元之治奏對明切因言願以無逸為元龜帝然之劉禹錫中山人擢進士登博學宏詞科工文章累官至集賢直學士出為蘇州刺史以政最賜金紫服遷太子賔客晚年以文章自適白居易推為詩豪李巽賛皇人以明經補華州叅軍厯湖南江西觀察使持下以法吏不敢紿順宗立擢鹽鐵轉運副使再期年較所入増百八十萬緡累遷吏部尚書劉晏後善理財者巽一人也李翺趙郡人文章見推當時中進士第元和初為國子博士史館修撰性峭鯁嘗靣斥宰相李逄吉之過出為廬州刺史後拜諫議大夫卒諡文有文集李藩其先趙州人少沉静有檢局敏於學累官給事中憲宗謂有宰相器後拜門下侍郎同平章事嘗言儉則足用敦本則百姓富反是則匱憲宗恱曰願相朂以保此言李吉甫栖筠子為翰林學士擢中書侍郎綜理政事衆職咸治引薦賢士褒奬忠臣之後時稱賢相以功累封趙國公卒諡忠懿李綘賛皇人舉進士累官翰林學士元和中與李吉甫同相吉甫善逄迎而綘鯁直嘗捜次君臣成敗十五種奏上憲宗為連屏張便坐毎閲視之曰綘言骨鯁真宰相也李畬素立後少聰敏仕厯汜水主簿遇事鋒鋭雖厮童一閱輙記其姓名居止黜陟使路敬潛薦其清白擢西臺監察御史轉國子司業弟巖累官兵部郎中封賛皇縣伯李德裕吉甫子穆宗初擢翰林學士凡號令大典冊皆更其手敬宗朝獻丹扆六箴拜西川節度使建籌邊樓累官門下侍郎拜太尉封衛國公自元和後用兵宰相或不休沐或繼火乃罷德裕從容裁决沛然若無事時牛元翼趙州人材果而謀時與傅良弼冠諸將王廷湊叛穆宗以元翼名出廷湊逺甚自深州刺史㧞為深冀節度使以擕其軍廷湊卒旡所濟後加檢校工部侍郎劉栖楚鎮州人累官右拾遺嘗諌敬宗逰畋以額叩龍墀血被靣帝為動容後擢諫議大夫郎餘令定州新樂人祖楚之與兄蔚之俱有名楚之官至左丞蔚之位大理卿餘令博學有文擢進士第授霍王府叅軍其從父知年亦為王友王每曰郎家二賢俱入府不意培塿而松栢為林也官至著作佐郎崔珙博陵人父頲生八子皆有才世以擬荀氏八龍兄琯性行方介累官給事中珙為人威重精吏治擢嶺南節度使入對文宗訪撫治先後珙對精亮有理弟興河中節度使興子澹擢進士累官同平章事魏謩徴五世孫舉進士累官至太子少保讜直無所避宣宗曰謩名臣後有祖風後為令狐綯䜛免卒贈司徒趙涓冀州人為監察御史後為衢州刺史時觀察使韓滉素不相容奏免官帝見其名問曰是豈永㤗時御史乎詔拜尚書左丞旣至勞之曰卿正直朕所自知乃以罪聞朕不信陳楚定州人有武幹始為牙將從李茂昭征伐有功封普寧郡王天祐末定州亂楚馳傳赴州軍校部伍皆楚舊也及見楚至衆心遂定州境以寧徙入為羽林統軍司徒子君奕終鳯翔節度使五代杜審𤦺定州安喜人昆仲五人審琦最長其次審玉審瓊審肇審進世以積善聞審琦仕後唐為義軍指揮使卒年三十五女弟即太祖母昭憲太后太祖即位贈審琦左神武軍大將軍諸弟子姪顯於後者甚衆王白冀州人明天文善卜筮仕晉為司天少監遼太宗入汴得之凡决禍福旡不中保寧中厯彰武興國二軍節度使撰百中歌行於時宋高懷德真定常山人周天平節度行周之子倜儻武勇性簡率不拘小節嘗從周世宗討北漢南唐皆克㨗累官侍衞馬軍都指揮使宋初從太祖征澤潞及揚州以功加同平章事太宗時封冀國公趙晁真定人儀貌雄偉初仕周從世宗征劉崇平夀春皆有功拜檢校太保河陽三城節度宋初加檢校太尉卒贈侍中子延溥以從征高陽平太原功累遷至日騎天武左右廂都指揮使董樞元氏人周時為殿中侍御史宋初遷主客員外郎出兼桂陽監嘗上書請平吴伐蜀及取廣南累官兵部郎中厯知連襄州終判西京留司御史臺曹彬靈夀人父芸成德軍節度使彬初仕周為引進使宋太祖命為都監伐蜀蜀平諸將多收子女玉帛彬囊中惟圖書而已及下江南不妄戮一人官至樞密使太宗時從征太原封魯國公彬清介亷謹仁敬和厚有功不伐位兼將相不以等威自異為時良將第一及卒追封濟陽郡王諡武惠楊廷璋真定人累功官至右千牛衞上將軍嘗鎮涇州多惠政吏民請立碑頌德廷璋為人謙謹雖見小吏未嘗有怠容幕府多名士子坦塤皆進士及第坦官至屯田員外郎塤至都官郎中范廷召棗强人父鐔為里中惡少年所害廷召手刃父讐剖取其心以祭父墓善騎射有羣烏飛過發矢貫其三累功厯并代環慶兩路副都署卒贈侍中荆嗣冀州信都人從祖罕儒為晉州兵馬鈐轄嗣以應募累立戰功太宗時從征太原及幽州皆率先䧟陣累遷都指揮使真宗時為邠寧環慶副部署嗣起行間以勞居方靣經百五十餘戰周仁羙深州人開寳中從李漢超與契丹戰有功累遷右班都知戍環州屢敗蕃族後遷龍神衞四廂都指揮又權京城内都廵檢先是廵兵捕亡卒盜賊不獲皆有罰而獲者無賞仁羙因差立賞格以聞詔從其請李昉饒陽人父超晉集賢殿直學士昉舉進士累官中書侍郎平章事以司空致仕卒諡文正昉和厚多恕不念舊惡太宗嘗稱為善人君子為文章慕白居易有文集五十卷高賦中山人舉進士知真定縣通判成德軍嘗知衢州捕絶蠱毒及知唐州相其曠原沃壤募流民以畊户口税賦増至數倍二州皆為立生祠累遷集賢院學士王化基真定人仕為左拾遺擢諌議大夫御史中丞太宗問邉事對曰治天下猶植木根本固則枝幹不足慮朝廷治則邉鄙何患不安官至叅知政事卒諡正獻子舉正累官叅政李至真定人沉静好學善屬文舉進士累官翰林學士叅知政事太宗親征至謂宜飬威蓄銳示敵人以閑暇後以目疾免真宗時復叅大政卒贈侍中賈琰獲鹿人晉給事中偉之子以䕃累官樞宻直學士三司副使琰風神峻整有吏幹太宗尹京琰為推官勤於所職子湜汾皆仕於時孫昌符賜同學䆒出身昌齡第進士王榮定州人少有膂力事太宗於晉邸累官侍衞馬軍都虞侯出為定州行營都部署真宗時以功遷至左衞大將軍領昌州防禦使榮善射嘗引强注屋棟矢入木數寸時人目為硬弓高化真定人沉勇善射真宗為襄王尹京兆命廵八廂積獲姦盜甚衆盜有遺化金帛者俱弗受累遷武安軍節度使知相州部有大獄已具化疑而訊之出旡罪者數人卒贈太尉諡恭壯傅思讓冀州信都人有勇力善騎射太宗時累官至平州刺史奉詔破契丹兵於唐興口四遷為容州觀察使知莫州移隴州李宗訥昉子少能屬辭善書始以䕃補太廟齋郎試以詩賦立就授秘書省正字太宗親擢為國子監丞淳化中改太常博士判禮院子昭逈賜進士官至屯田員外郎昭逺太子中舍李宗諤昉第三子七嵗能文舉進士累官翰林學士為人風流儒雅内行淳至事繼母以孝聞與弟宗諒友愛所著有文集及内外制次子昭述賜進士官至尚書右丞從子昭遘能文授舘閣校理累官工部郎中葛覇真定人姿表雄毅善擊刺騎射太宗時累官保順軍節度鎮州都部署卒贈太尉子懷敏厯知數州仁宗時為涇原路招討經畧安撫副使趙元昊冦鎮戎軍懷敏督諸將與戰遇害孫冲趙州平棘人舉明經厯縣尉主簿又舉