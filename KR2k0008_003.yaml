擾後致仕卒于家志郡扈暹元氏人由舉人累擢鳯翔府知府政務寛簡識大體作興學校以憂去郡民詣闕保留復任及秩滿又保留之遂増俸仍府事凡三十餘年郡志鄭昌靈夀人趙國公温之曾孫領鄉舉授工部主事有操守陞户部郎中致仕郡志馬騤真定人領鄉薦授兩淮運司副使陞户部員外郎擢山東右叅政為人剛果勤于職務郡志李時真定人由進士任知縣陞府同知擢平凉知府厯任有聲省志畢鸞井陘人舉進士拜監察御史克振風紀遷湖廣右叅議致仕郡志邢端井陘人領鄉薦擢御史陞湖廣副使撫輯苗于夷甚有恩紀秩滿夷民保留之増禄復任卒官志郡崔逹景㤗中由國子生同知鞏昌府剛果有為吏民畏服陞本府知府致仕郡志白圭南宫人正統中進士累官工部尚書以平荆襄功改兵部宦轍所經以才能稱累膺玉帶寳刀錦衣之賜卒贈少傅諡恭敏郡志石瑤藁城人登成化丁未進士累官少保吏部尚書文章政事為世名臣列女王孝女名舜趙人父子春被從兄長忻夫妻所害無子時女甫七嵗與二妹寄食親戚家及笄不肯適人乃與二妹中夜持刀入長忻家殺其夫婦以告父墓因詣縣請罪姊妹争為謀首州縣不能决隋文帝聞之特原其罪蘇氏元真定人徙家京師夫武用疾蘇氏刲股為粥以進疾即愈生子德政四嵗而寡夫兄利其資欲逼嫁之不聽未㡬夫兄舉家死惟餘三弱孫蘇氏取育之德政長事母至孝母死時天大旱方掘地求水忽二蛇躍出一東一西隨其地掘之果得泉事聞旌復其家蒲氏行唐人嫁樊氏為妻未㡬樊卒誓不再適時有山冦逼求為妻蒲氏跳於崖下水中而死鄉人號曰義姜稱其水為玉女塘崔氏深州周傑妻洪武間傑任兵科給事中以疾沒崔氏奉骸骨歸祭奠畢告其親戚曰夫婦義當同穴今夫死無子吾無生理遂經死合塟焉劉氏新樂韓太初妻太初仕元為顯官本朝洪武七年徙和州劉奉姑寗氏以從至南宫姑仆地傷腰劉刺血和湯以進乃愈至𤓰州姑病再進再愈至和州鬻蔬供飬無違禮姑患風疾時盛暑劉晝夜驅蠅蚊不怠後姑病危囓劉小指意與之永訣劉不悟斬指滴血和粥以進姑卒殯之淺土欲歸塟五年弗果哀號常如袒括之日事聞召至京厚賜之官為送寗氏䘮歸塟新樂旌表其門甄氏無極人嫁欒城李大舅早卒事姑甚孝大與其弟異居一日姑出往次子家甄隨侍不忍去姑命之還甫三日甄忽心動舉身流汗少頃果有來告其姑病篤者甄氏沿途拜禱往至姑側侍疾數日而愈後姑年九十一卒合塟於舅墓甄氏廬墓側三年旦夕悲慟不輟里人稱為孝婦洪武中旌表其門高氏深州人適清河李茂茂充吉安衞總旗墮馬病臥高氏奉湯藥不離左右茂亡悲泣甚哀乃盡散家貲為䘮具復買一閒棺置諸尸側至夜沐浴更衣經死與茂合塟洪武中表其門曰貞烈岳氏深州岳興女適同州傅形嘉形嘉病革呼岳屬曰爾年少善事後夫岳涕泣曰吾豈忍事他人寧俱死及形嘉卒岳慿屍號哭遂經死合塟之洪武中表其門曰貞烈李氏安平人郭士文妻年二十五而士文卒李氏奉舅姑撫遺孤孝節兼全洪武間事聞旌表其門曰貞烈郡志范氏棗強人蔡甫原之妻年二十四而夫卒父母欲嫁之范不從飬其姑終身教育諸子咸底成立鄉人嘉其孝節事聞於朝宣德庚戍旌表其門省志孫氏南宫人御史孟著妻年二十撫子以慈矢靡他心始終一節事聞宣德五年詔旌表之省志張氏安平人翟得妻年二十一而夫以國子生卒于京張氏聞之遂自縊死事聞旌表其門曰貞烈省志施氏定州衞百户何毅妻年二十一生子甫二齡毅死哀痛漿水不入口欲自殺狥塟姑知有孕勸阻之後果生子舅姑親戚憐其少欲嫁之施曰夫亡子㓜况舅姑年老無倚可適人乎遂奉舅姑以終撫二子至於成立年六十二嵗本衞具聞旌表其門省志丁氏定州李英妻年二十生子八月英死舅亦早亡事姑張氏孝謹隣嫗諭其再嫁丁泣曰妾不幸舅沒夫亡今子㓜姑老無他侍飬寧死誓無他志鄰嫗愧止孀居㡬五十載無瑕玷有司具聞旌表其門省志徐氏藁城人教諭石麟之繼室隨夫之任廣東正統初麟卒于官時徐年方二十有四踰三月生子玉前妻子爾方五嵗徐携二㓜扶櫬還鄉安塟飬舅姑甚謹及舅姑相繼而卒皆以禮塟之徐以紡績為生終士無異志教二子繼承父志勉以修學後玉登甲申進任監察御史使石氏光顯者徐氐孝節義所致也成化二年事聞旌其門曰貞烈郡志王氏大同中䕶衛總旗王俊女年十五歸定州衛指揮男施安克事舅姑年二十八安亡奉舅姑夀皆八十餘而終撫育孤子至於承襲守節四十餘年而貞志無慙本衛具聞旌表其門郡志王氏饒陽趙彦良妻年二十二生男子方一嵗夫卒以禮塟之兄憐其少欲奪其志王曰生為趙家妻死為趙家鬼况有公姑無人侍奉豈可他適即固拒而止躬事蠶績以供舅姑及卒以禮殯塟王氏年至七十守節五十一年無瑕玷事聞詔旌其門郡志喬氏臨城王祥妻生一子年方七嵗而夫卒家貧守志躬親紡織撫養㓜子始終無玷成化四年旌表其門郡志李氏臨城王慶妻生子方五嵗而夫卒堅心紡織侍養舅姑恪守婦道始終無玷成化四年旌表其門郡志秦氏王璟妻禀性貞恪恪盡婦道璟歿時秦方一十九嵗哀痛㡬絶塟畢生一子名友才守節撫養翁姑欲奪其志秦懇辭誠切翁姑感悟乃止五十八年並無瑕玷成化中奏聞旌表其門郡志高氏棗强人宋亮之妻年二十六亮嬰疾日夜籲天求以身代及亮卒孀居五十餘年始終一志成化中事聞旌表其門郡志仙釋張果隐中條山往來汾晉間得長生秘術唐武后遣使召之即死後人復見恒山中𤣥宗遣中書舍人李嶠齎璽書邀禮乃至舍集賢院肩輿入宫帝親問治道神仙事欲以玉真公主降之果固辭還山號通𤣥先生邉洞𤣥棗强人自㓜於紫雲觀出家修行後得道白日上升唐𤣥宗御製詞褒揚之碑刻尚存于觀琴高趙人為宋舍人行肖彭之術入水不濡游冀州涿郡二百餘年一日辭衆入涿水中他日乗赤鯉而過其弟子見之蘇澄隐真定人為道士住龍興觀得養生術年八十餘不衰老五代唐晉繼有聘並辭疾不至宋太祖征太原還駐鎮陽召見因問其術對曰臣之養生不過精思煉氣爾帝王養生即異於是老子曰我無為而民自化我無欲而民自正昔黄帝唐堯享國永年得此道也上大恱年僅百嵗而卒寶公隋開皇中居真定解慧寺嘗礱石為柱作門三楹上為樓坐臥其上後北虜來冦縱火焚至寺寳公從樓隕身而下毫髪無傷衆冦刃之刀自㫁冦又舉火焚樓火自滅羣冦驚駭稽顙而去毗盧遮那不知何許人曾入毗山修行不知所終至唐時嘗現形山上人見之遂於山下立祠祀之懷丙真定人巧思出天性郡有木浮圖十三級久而中級大柱壊欲西北傾他匠莫能為懐丙别作柱命衆工維而上已而却衆工以一介自從閉户良久易柱下趙州洨河石橋鎔鐵貫其中嵗久鄉民多盜鑿鐵橋遂欹側計千夫莫能正懐丙不役衆工以術正之使復故宋時賜紫衣守千藳城人居龍興寺性聰慧無幽不燭宋元祐聞賜號通照大師一日發囊以紙衣一襲附其徒李旬乃易衣誦梵經合掌加額辭衆逝崇辨宋時修行山中弟子甚衆一日謂弟子曰吾行業已滿當歸佛道遂化弟子撫其尸則柔軟始知為尸觧云明一統志卷三
