安得無學彥之所貢稽古之力也唐韋思謙應城令負殿不得進官尚書髙季輔曰豫始得此一人豈以小疵棄大德耶令狐緒歷隋汝夀三州刺史有佳政汝人奏請刻石頌德緒辭曰臣任隋州郡人乞留轉河南少尹加金紫已名聞不必更立李繁隨州刺史栁公綽稱其博覽強記崇清淨之化施于隨人五代劉玘梁貞明中守安州以城中闤闠櫛比冬月井泉多涸乃於城西比隅依石壁造水樓以備不虞懸綆取水明年安陸被吳人圍方知井樓之利朱漢賔唐安州守臨政能守法好施惠人愛之王祚漢隨州刺史漢法禁牛革輦送京師遇署雨多腐壞祚請班鎧甲之式於諸州令裁之以輸民甚便之董宗本漢隨州刺史宋太祖往依焉其子遵誨曰每見城上紫雲如蓋又夢登髙臺遇黑蛇化龍飛去是何祥也太祖皆不對及即位召見遵誨曰卿尚記往日紫雲及化龍之夢乎乃以遵誨為通逺軍使李瓊周安州防禦使治郡寬簡民請立碑頌德宋石守信宋初除崇信軍節度使為開國名將王全斌崇義軍節度使寬厚容衆居郡十餘年怡然自得識者稱之張齊賢初知江陵府上章謝病乞知安州云郡務甚簡可以頥養醫藥在州政尚清靜民甚便之寇準天祐間知安州未幾貶道州司馬凖雖在謫而賢名不泯錢惟演以崇信軍節度使歸本鎮惟演出于勳貴文辭清麗名與楊億劉筠相並其在郡時對酒必自歌曰城上風光鶯語亂城下煙波風拍岸范雍康定間知安州為治尚恕郡人思之立祠祀焉彭乘康定間知安州有善政仁宗曰此老儒也雅有恬退者無以易之孫甫慶厯間知安州徑果無私嘗著唐史記七十餘卷范純仁治平中通判安州即求民間利病而興革之作興學校益為條教日有課月有最出入起居動循法度安陸由是多學者王德用知樞密院事出守隨州州置判官家人皆惶恐德用舉止言色如平時惟不接賔客而已滕元發知安州不奉行新法纍被謫元發曰天知吾直上知吾忠吾何憂也謝良佐知應山縣化民以德期于無訟簡而能栗威而不猛民立祠祀之張商英知隨州有善政崇寧初召為吏部侍郎陳規安陸令後知德安府事建炎中羣盜攻德安規屢擊却之諸重鎮多失而德安獨存郡人德之立廟祀焉張浚紹興間除崇信軍節度使其制詞云爰領使于漢東俾膺受于齊鉞初朌成命想慰輿情李道知隨州時劉豫叛遣其將張珖至隨招道道不從執其使以聞詔嘉奬之趙方知隨州時旱蝗相仍方親走四郊以禱一夕大雨蝗盡死嵗大熟適和議成諸郡寢弛備方獨招兵擇將拔土豪孟宗政等補以官元林興祖隨州守頌碣云有懷召杜多識前言無愧龔黃敦行素履多聞四海道重三山魏從恕至正間為應山縣尹束吏以法撫民以恩虛懷下士開心奉公後去邑人立碑頌之本朝汪灌洪武初由御史改雲夢知縣創置學校勸課農桑初抵任縣止一里三年增至三里至今邑民慕之諸葛平洪武間為應城知縣亷能愛民均徭簡賦吏服其威民安其惠孫士良永樂初應山知縣居官未三考人戶自占三千餘口開墾荒田五十餘頃政事簡惠賦役以均民到于今稱之陳莘永樂初知隨州修學勸士務本愛民闢田野四百餘頃利及百姓民感而慕之朱幹永樂初為應城令律己公正政勤而亷民懷吏戢秩滿父老保留升隨州知州省志夏子謙德安府推官能推情求法獄無滯囚人咸稱之非義之餽一毫不受省志史中德安知府守法恤民不畏強禦時有中貴人黷貨滿載中執以聞特命戮之在任九年吏民懷德省志王佐永樂中主孝感縣薄立心慈祥政敷明達卓有聲譽超拜監察御史省志饒政望正統中德安府學教授莊重謹飾不妄言笑不事浮靡教有成規雖祁寒盛暑不輟省志郭綸正統間應城教諭治書庠士治書傳自綸始今從祀上蔡先生祠省志周鐸德安知府公勤廉慎興學育材深得人心九年滿去郡人思之立碑于學省志吳禴成化初知隨州嵗旱徒步祈禱發倉賑貧獲鼠竊必置之嚴法數嵗民風寂然外戶不閉初夏民納祗候錢禴曰五穀未登必假貸于人者令還主候秋赴納隨民德之祀于名宦祠省志黃鞏𢎞治末德安府推官清亮博雅飾學宫表董孝子祠諸所修舉以正風俗作人材為先省志李重正德中知德安府興學校作士氣旌節義抑豪植弱修廢釐弊日斤斤務見治紀不屑細務然法令森嚴吏民屏息不敢犯乃清操直氣始終不易云省志李逄嘉靖中知德安府明毅有大志不屑屑故常挈綱維重教化黷吏黠民務置之法遇賢士每折節下之禔身清肅境內凛然省志徐貢元嘉靖中知德安府撫輯流移不受請托處親藩不擾弭羣盜修築河堤建置學宇百務興廢郡祀于名宦祠省志胡世寧初為德安府推官激烈有為無所撓沮尋知寶慶府蒞任數月州縣無徵求擾士民樂業後任湖廣按察使風裁益厲文章氣節卓越羣流志省趙文傑知雲夢縣剛方不撓操履介潔每以鋤豪右興學校為已任時俗尚浮屠凡冠婚喪祭必令遵朱子家禮又因冦盜創城塹立煙墩民始不便卒便而思之崇祀名宦祠省志流寓董永千乘人東漢末奉其父避兵來居安陸家貧傭耕以養其父父歿貸錢於里之富人裴氏許身為奴以償所貸得錢五千營葬乃感天帝令織女為配遂織絹于裴氏既償錢以贖永身遂辭永騰霄而去李白唐隴西人上裴長史書曰頃見鄉人相與大誇雲夢之事云楚有七澤遂來觀焉而許相公家見招妻以孫女便憩迹于此移三霜焉宋庠宋祁宋雍丘人父杞為應山令庠祁隨父僑寓安陸並以文學顯庠進士第一嘉祐中拜相封鄭國公卒諡元憲祁纍官知成都府終翰林學士承旨卒諡景文沈括杭州人宋神宗時永樂城陷括以始議謫隨州薩天錫幼時僑寓孝感博學能文登元泰定進磨士知襄陽縣終燕南道亷訪司照察空西域人博覽強記通諸國字書元仁宗時纍官參知政事得大臣體暮年居德安白雲山别墅以白雲自號嘗入見仁宗望見曰白雲先生來也其被寵遇如此人物周鬭榖於莬春秋楚人父伯比通于鄖子之女生子文鄖夫人使棄諸夢中虎乳之鄖子田見之懼而歸夫人以告遂使收之楚人謂乳榖謂虎於莬故名仕楚為令尹三仕三已無喜愠色舊令尹之政必以告新令尹孔子稱之曰忠季梁隨人春秋時仕墮為大夫楚侵隨少師董成請追楚師隨侯將許之季梁止之曰夫民神之主也聖王先成民而後致力于神故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免于難隨侯懼而修政楚不敢伐漢周章南陽隨人仕為南陽郡功曹時竇憲免就國太守欲謁之章曰不可太守不聽章以佩刀絶馬鞅乃止憲誅公卿多以交關得罪太守幸免以此重章舉孝廉永初元年為司空黃香江夏安陸人葉令況之子事親至孝夏月扇枕席冬則以身溫被九嵗失母思慕憔悴太守劉護召署門下甚見愛敬香博學經典能文章京師號曰天下無雙江夏黃童初除郎中肅宗詔香詣東觀讀所未嘗見書纍遷尚書令遂管樞機而香亦祗勤物務憂公如家黃瓊香子永建中公卿多薦瓊者徵至拜議郎稍遷尚書僕射瓊練達官曹爭議朝堂莫能抗奪尋遷尚書令轉太尉封邟鄉侯瓊首居公位舉奏貪汙海內翕然望之卒贈車騎將軍諡曰忠侯黃琬瓊孫瓊初為魏郡太守建和元年正月日食京師不見而瓊以狀聞太后詔問所食多少瓊未知所況琬年七嵗在傍曰何不言日食之餘如月之初瓊大驚即以其言應詔光和末徵拜議郎遷侍中後出為右扶風徵拜少府又為豫州牧擊平冦賊威聲大震封關內侯及董卓秉政徵為司徒遷太尉更封陽泉鄉侯唐樊興安州人以戰功多封營國公後坐事削爵貞觀中討陵州獠及擊吐谷渾纍遷襄城郡公太宗征遼以興忠謹副房玄齡留守京師卒贈洪州都督陪葬獻陵許紹安州安陸人為兒時與髙祖同學隋大業末仕夷陵通守開倉活流民數十萬王世充篡位以三郡歸唐封譙國公後圖形凌煙許圉師紹子有器幹研涉文義擢進士為相州刺史部內有受贓者不忍按但以清白針賜之其人感愧卒為廉士龍朔中拜左相卒諡曰簡郝處俊安陸人少好學貞觀中第進士襲父爵為甑山公上元中因諫髙宗觀酺令太子諸王分朋角為樂及傳位武后皆為時議所直遷中書令武后忌之以操履無玷不能害宋張君房安陸人為著作郎真宗時日本遣使入貢詔本國建寺夷使乞詞臣撰寺記時直院之文多君房代為之暨宣令誤寺記夷使待命而君房醉飲市樓索之不獲直院大窘後楊億改間忙令曰世上何人最號忙紫微失却張君房或謂君房非醉但假此以拒夷俗耳令狐揆安陸人卜築溳溪之南嘗雪中跨馬入城詣張君房借書令小童攜書簏負琴帛繒暖帽委轡長吟曰借書離近郭冒雪渡寒溪布衣林逸善繪因作令狐髙士雪中渡寒溪圖宋綬其先趙州平棘人徙隨州博通經史百家年十五召試中書真宗愛其文後又試學士院官至參知政事卒贈司御子敏求龍圖閣學士敏求家藏書三萬卷皆略誦習所著書甚多學者多咨之鄭獬安州安陸人少負俊材詞章豪偉仁宗重選士廷試考定焚香祝天曰願得忠孝狀元已而得獬初通判陳州入直集賢院英宗即位獬言陛下初臨御願申詔中外許令盡言有可采録召與之對必能有益治道神宗初拜翰林學士以不奉新法出知青州連庶安州應山人父舜賔好羲樂施庶舉進士為夀春令開田千頃一縣大治尋以母老乞監陳州稅嘗送客出北門慨然有感即日求分司歸久之歐陽修薦其學行屢遷職方貟外郎卒弟庠亦舉進士為宜城令敏于政事號良吏終都官郎中連南夫安州人纍官廣東轉運使新興飢發廩振濟全活以萬計弟萬夫補將仕郎建炎中羣盜犯應山萬夫率郡人數千保山寨賊圍三日卒破之萬夫怒厲聲罵賊為所害贈承務郎官其家一人劉逵隨州隨縣人舉進士髙第纍官至中書侍郎蔡京以彗星見去相逵首勸徽宗碎元祐黨碑寬上書邪藉之禁稍正京悖正害民之政及京復相責鎮江軍節度副使安州居住後京再罷稍起知杭州加資政殿學士李庭芝隨州應山人少頴異日誦數千言淳祐初舉進士第知濠州後主管兩淮制置司事大興鹽利揚民德之如父母尋坐纍罷元兵圍揚州復起制置兩淮遣兵首應勤王詔城守揚州日出兵死鬬加參知政事宋亡不屈阿珠殺之揚州民皆慟哭邊居誼隨州人初事李庭芝積功至都統制咸淳巾守新城能得士心凡戰守具治之皆有法吕文煥引元兵來攻居誼率舟師拒之嘗誘文煥至城預伏弩亂發中之幾就擒元兵攻城甚急居誼度力不支自殺事聞贈利州觀察使立廟死所王登德安人少讀書喜兵法慷慨有大志淳祐中進士調興山簿以母憂去制置使吳淵具書幣招之登即長揖出門既見淵為節制竟立奇功威聲日振為忌者所讒以是才略不能盡施識者惜之元趙復德安人元兵陷德安民數十萬皆俘戮時姚樞奉詔即軍中求儒得復以歸復以所記程朱傳盡録以付樞揚惟中聞復議論始嗜學建太極書院於燕城請復講授其中學者稱為江漢先生本朝周梅孝感人洪武間以卓行見推任福建按察司僉事後致仕氷檗之操始終不渝鄉人慕之張瓉孝感人正統戊辰進士歷工部郎中通敏有才纍官副都御史巡撫四川以征討功晉戶部右侍郎仕終右副都御史卒賜葬祭省志陳金應城人舉成化壬辰進士拜監察御史風采凝重歷擢副都御史巡撫雲南勞績茂著纍官南京戶部尚書總制兩廣以征江西桃源劇賊功進太子少保尋加少保平生虛直好善剛果有為志在立功不問家事年八十三卒省志孫交安陸人成化辛丑進士歷吏部文選郎中