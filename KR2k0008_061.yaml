body:
  text: 明一統志卷六十一明李賢等撰德安府東至黃州府黃陂縣界一百八十里西至襄陽府棗陽縣界二百里南至漢陽府漢川縣界二百里北至河南汝寧府信陽縣界一百八十里自府治至南京二千二百里至京師五千六百二十里糧四萬一千石零建置沿革禹貢荆州之域天文翼軫分野周職方氏荆州澤藪曰雲夢即此地春秋為鄖子國秦屬南郡漢屬江夏郡劉宋於此置安陸郡梁兼置南司州尋廢西魏置安州後周改為鄖州隋初郡廢大業初州廢復為郡唐改安州尋為安陸郡乾元初復為安州貞元中置安黃節度觀察使治安州五代梁置宣威軍後唐改安逺軍晉為防禦州後漢復為安逺軍周復為防禦州宋復置安逺軍𨽻京西路後𨽻湖北路宣和初升為德安府後徙治漢陽元復舊治𨽻湖北道宣慰司尋改𨽻鄂州行省後𨽻黃州路本朝洪武初改德安州𨽻黃州府十三年復為德安府領州一縣五安陸縣附郭漢舊縣屬江夏郡晉江夏郡治此劉宋以後為安陸郡治隋以吉陽縣省入唐安州宋元德安府皆治於此本朝初省入德安州後升州為府而安陸復為縣編戶一十里雲夢縣在府城南四十六里本漢西陵安陸二縣地屬江夏郡西魏於雲夢古城置縣因以為名屬城陽郡隋初屬安州後屬安陸郡唐屬安州又省入應城尋復置宋省入安陸縣元祐初復置紹興中移縣於許落市尋還故治元仍舊本朝因之編户五里應城縣在府城南八十里本漢安陸縣地劉宋置應城縣西魏以縣置城陽郡隋廢郡改應陽縣唐復曰應城屬安州天祐間仍改應陽後唐復舊宋元因之本朝併入雲夢縣後復置編戶一十里孝感縣在府城南一百二十里本漢安陸縣地劉宋因孝子董永分置孝昌縣西魏於縣置嶽州及嶽山郡後周州郡並廢隋屬安州唐初以縣置澴州後州廢仍屬安州又省入云夢縣尋復置後唐改孝感縣宋元仍舊本朝初省入德安州後升州為府復置縣屬焉編戶二十九里隨州在府城西北一百八十里禹貢荆豫二州之境春秋為隨國楚為隨縣秦漢皆屬南陽郡晉屬義陽郡後分置隨郡西魏置并州後改為隨州隋初郡廢後置漢東郡治隋縣唐復為隨州以安貴平林順義三縣省入天寶初改漢東郡乾元初復為隋州宋初置崇義軍改崇信軍紹興初復為隨州後因兵亂徙治無常元治黃仙洞𨽻德安府本朝初廢州為縣後復置州以縣省入編戶一十四里領縣一應山縣在州城東一百二十里本漢南陽郡隨縣地梁分置永陽縣及應州隋廢州改為應山縣屬安陸郡以山為名唐初於縣置應州尋廢州以縣屬安州宋嘉定間改𨽻隨州元仍舊本朝併入隨縣復置編戶一十一里郡名安陸劉宋名漢東隋名形勝介襄郢申安之間漢東志其城三重西枕溳水元和郡縣志連翼軫之分野控荆衡之逺勢李白代答孟少府移文巖石隘狹道路交錯文獻通考隨州因山為郡岩石隘狹道路交錯自棗陽至厲山九十九岡有括囊之勢易入而難出為一都會宋李元衡鎮楚堂記北接漢東南望鄂沔偃然為一都會秦頭楚尾宋黃世長詩溪工接秦頭逺江分楚尾風俗多尚仁義元和郡縣志應城之民多尚仁義士民純秀宋滕元發啓士民純秀幾同鄒魯之風土風醇厚宋周必大苃堂記其土風醇厚其士多秀傑其民多隱德俗喜儒學宋李元衡學田記地多磽瘠殖貨不饒惟俗喜儒學而近世名勝之流相望不乏由進士擢天下第一者三人矣民淳務簡宋范雍詩民淳詞訟少務簡官政優山川石柱山在府治北上有石柱髙二丈石梁山在府治西北連接白兆山其勢如梁鳳山在府治東南以形似名鐵城山在府城北五里山有石如鐵石巖山在府城南一十里山有石巖晉張昌作亂於石巖山織竹為鳥形衣以五色聚肉其傍而集百鳥詐云鳯凰降因偽建元神鳳紫金山在府城西二十里峭壁斗絶石皆紫色故名上有跨鼇堂遺址郡有紫金山金峯千金坊萬金橋金口湖總稱為五金科斗山在府城東北三十里白兆山在府城西三十里上有桃花巖仙人洞又有僧妙濟寫經臺及李太白讀書堂宋蔡確詩聞説桃花巖石畔讀書曽有謫仙人郝甑山在府城西三十里後周以此山名縣山有溳溪景雲潭潭側有唐甑山公郝處俊釣魚臺宋蔡確詩矯矯名臣郝甑山忠言直節上元間釣臺蕪沒知何處嘆息思公俯碧灣章山在府城東四十里古文以為內方山左傳吳自豫章與楚夾漢舊經云豫章即今之章山唐李白娶安陸許氏逮流夜郎妻在父母家有寄內詩云南來不得豫章書亦言安陸之豫章也陪尾山在府城東北四十里禹貢熊耳外方桐柏至于陪尾即此一名橫尾夀山在府城西北六十里與應山縣接境山下民有夀至百嵗餘者故名元楊繪詩夀山北聳侵隋碧鄖水南流接漢青宋玉陽臺猶暮雨子虛夢澤半春耕大安山在府城西六十里唐許紹家于此李白忤髙力士放還至此許氏以孫女妻之宋黃晦叔詩大安婦翁舍時來枕流眠燕子山在府城西一百里形如燕巢大猿山在隨州城西南一名大狐山南都賦天封大猿即此龍居山在隨州城西南以隋文帝微時居此故名隨城山在隨州城南七里因以名州三瓜山在隨城山南有三阜形如瓜獨宗山在隨州西南一十里山為溳川衆山之尊赤石山在隨州城北三十里山石皆赤唐天寶間改名赫石三鍾山在隨州城東北五十里山有三堆狀若覆鍾大義山在隨州城東北五十里民居其間貧富自相取足有義風故名君子山在隨州東南七十里山下居民多忠厚故名龍井山在隨州城西七十里山有龍井青林山在隨州東南七十里山林逺望蔚然而青石女山在隨州城東北八十里有石如女子狀卓劍山在隨州城南八十里以形似名松蓋山在隨州城西北九十里山多大松逺望如蓋驢泉山在隨州城北九十里有池雖旱不涸荆州記驢泉山石潤牛馬經過貪其甘不肯去土人云牛馬解逸即此山尋之大洪山在隨州城西一百二十里相傳為慈忍盧尊者道場其山崛起一方巉然雲間四面陡險絶頂有太湖湖旁有龍鬭崖又有明聖泉硫黃池仙女洞佛兒嶺鸛子山斷足巖皆此山之景也宋靖康間避冦者嘗依此山立寨柵自保賊竟不能破鸚鵡山在隨州城東北一百五十里形如鸚鵡香爐山在隨州西北一百八十里以形似名厲山在隨州城北一百八十里禮記祭法云厲山氏之有天下也其子曰農能殖百穀注云厲山氏炎帝也起於厲山西漢志注隨故厲國也皇甫謐云今隨之厲鄉荆州記山有二冗云是神農所生遂即此地為神農社常年祀之栲栳山在隨州城西北二百里跨南陽府唐縣境宋章潛詩秀色團團如栲栳孤髙端可壓羣山藏雲蓄雨無蹤迹怨鶴啼猿自往還葛藤山在雲夢縣東北四十里産葛根伍家山在應城縣東北二十五里方輿勝覽云伍氏所居上有禪剎龍井旱禱多應故名京山在應城縣北六十里山有溫泉鳳凰山在孝感縣東四十里方輿記晉孝武永和四年鳳産其上又云鳳將九子翔集安州之境故又名乳鳳岡三山在孝感縣西北八十里三峯鼎立一名大洪山九嵕山在孝感縣東北八十五里又名九宗山其山環阜疉嶂林麓深杳舊有圓明寺大溪橫前景物幽趣不減長安之九嵕也舊圖經云唐大將王鐵鎗所居上有八境寶陀羅漢三巖宋范雍詩山竒號九嵕名與雍州同白雲山在孝感縣東北八十五里舊名石人山元平章察罕隱此自號白雲山人大悟山在孝感縣東一百五十里舊傳靈濟祖師道場應臺山在應山縣治東南縣名取此山當縣治其頂方平如印又名印臺石井山在應山縣西三十里孔山在應山縣東三十里一名洞山山有洞冗每大風將起冗先有聲兜鍪山在應山縣北四十里以形似名凍山在應山縣東南四十里一名蜂兒山宋元豐間太守滕甫自汴赴官路經於此時無風雨而寒甚故名洞庭山在應山縣西四十里中有一冗莫測深淺吉山在應山縣東南五十里有南吉北吉二山古吉陽縣在山之南髙貴山在應山縣東北六十里山頂有石如龜又名太龜山上有靈濟祠前有聖水井嘗有白龍見覆手山在應山縣東六十里一峯五澗望之狀如覆手松子山在應山縣東北八十里地名新店禮山在應山縣東八十里舊建應州於此大城山在應山縣東一百里山之陽有古城四望山在應山縣北一百里山髙可周覽四方故名石羊岡在雲夢縣東十五里桃花巖在白兆山唐李白讀書處白有答俗人詩花云問豫何事棲碧山笑而不答心自間桃流水杳然去别有天地非人間又寄劉侍御詩云蓬壺雖冥絶鸞鶴心悠然歸來桃花巖得憩雲窗眠宋范雍詩鄖川夢澤地古迹堪詢求白兆桃花巖翰林棲此丘元李通儒詩地勢下臨鄖子國山光遙射楚王城惟有桃花巖上月曽聞李白醉吟聲仙姑洞在孝感縣東北一百二十里神農洞在厲山荆州記云山有二冗是神農所生處故名真珠坡在雲夢縣治東每雨過有圓砂光瑩如珠洗足石在安陸縣西勝業院方輿記五代周世宗微時隱水西寺濯足於此上有古檜一株宋王得臣詩柴皇徒步奔埃塵風雲未至時方屯石上無聊漫濯足泥蟠留此潛其神後湖在孝感縣治後董家湖在孝感縣東五里因董永得名羊馬湖在孝感縣東三十里注泉湖在孝感縣西南三十里東山淪河湖在孝感縣東四十里三臺湖在應城縣南六十里瀖河在安陸縣源出白兆山下逹雲夢蒿子港口入溳河扶恭河在隨州城西上從栲栳山道家林流入州境下流入安陸縣界合漢水入大江聖水河在隨州城西北八十三都右魚河在隨州城南大洪山界西河有二一在孝感縣治西源出河南信陽縣從澴河入漢水一在應城縣源出大洪山白龍井流至縣境會襄水東流至漢口入江義河在應城縣西北上接安陸州下入漢陽府張家河淪河在孝感縣南源出溳河入步口流經本縣下流入於荆江澴河在孝感縣北四十里源出應山縣西雞頭山以環繞山谷故名唐置澴州及澴陽縣取此今為澴河鎮汶水河在應山縣西北二里經東南入方家河白泉河在應山縣東三十里自山懸流而下入於溳水大洪河在應山縣北三十里漢東河在應山縣西四十里黃沙河在應山縣東五十里五龍河在應城縣源出京山縣林泉山分為二港俱流入本境三臺湖至漢口入江湯池港在應城縣源出玉女泉流入景陵縣溳水在府城西北源出陪尾山石巖下繞城西隅東流入漢江俗稱府河亦名石潼唐劉文房詩淮南搖落客心悲溳水悠悠怨别離早鴈初辭舊關塞秋風先入古城池漳水在府城西五十里源出大洪山沈括筆談清濁相揉者為漳章文也漳與溳水合流色如螮蝀十里方混故曰漳槎水在隨州城東南左傳楚人除道梁槎營軍臨隨即此一名溠水西魏改㵐西曰下溠取此㵐水在隨州城西北南流入溳水西魏置㵐西郡以此為名宋陳師道詩㵐溳雙水繞城隅髙誼曽聞季大夫九十九岡風俗厚人人況已握靈珠均水在隨州城西四十里泿水在隨州城南四十五里流入溳水暖水在大洪山西北漻水源出江夏廢平夀縣西南過安陸入于溳石牛潭在府城西北輿地紀勝水中有巨石如牛郡人以石巖部石紫石石照石淙馬踏石洗腳石及石牛潭為八石雲潭在隨州城東南五十里黿潭在隨州城東六十里天井澗在應山縣東二十里龍興寺北上有龍祠禱雨有應舊有平康塞在澗北宋人避兵于此虜不能犯金龍澗在府城西輿地紀勝朱時道家有金龍玉簡學士院撰文每一嵗中齋醮投於名山洞府故名九井在厲山山有兩重塹中有九井相傳神農既有九井自穿汲一井則衆井皆動舜子井在隨州治東南舜子巷又名義井有秦時斷碑字漫滅惟存五大夫三字後移于漢東樓下宋許覺之詩一千二