軾知黃州時蘇軾謫黃州人皆畏避懼其纍已軾獨願交期與同憂患張商英元符間朱諤彈商英在紹聖初雖有章疏論列元祐臣僚然本是姦黨遂出知蘄州列名黨藉韓駒政和間知黃州有詩名蘇轍題其詩卷云唐朝文士例能詩李杜髙深到者稀我讀君詩笑無語恍然再見儲光羲梅執禮仕為給事中與宰相王黼相善以詩規之黼怒罷顯謨閣待制知蘄州李宥知蘄州嵗凶人散委嬰孩而去者相屬於路宥令吏收取計口給榖俾營婦均養之每旬閲視所活甚衆任伋通判黃州負氣節與其兄伯雨齊名時稱為大任小任虞策通判蘄州時蔣之竒以江淮發運上計神宗訪東南人才之竒以策對擢提舉利路常平韓世清知蘄州州人請以為兵馬鈐轄有賊劉忠犯州境世清與戰破之何大節知黃州金人犯黃大節義不屈投江而死王玠蘄黃鎮撫使司幹辦公事會鎮撫使孔彥舟謀叛玠開陳百端不聽入罵曰逆賊萬段彥舟併玠家屬沉之龍眼磯李誠之嘉定間知蘄州金人犯蘄極力捍禦城陷誠之先戮其妻子然後自盡通判秦巨教授阮希甫防禦判官趙汝票蘄春主簿寧時鳳皆死之葉適知蘄州以經濟自負入為尚書郎官向士壁知黃州有才氣數立竒功時麻城尉楊掞有能名士璧檄入幕王益景定間知蘄州治尚寬和開麒麟山立郡治見古墓石刻云本有千年地始借五百年感謝王刺史移我過西園孟拱知黃州增埤浚隍搜軍實邊民來歸者日以千數皆為屋居之厚加振貸創兩堡為先鋒虎翼飛虎營陳仲微通判黃州職兼餉餽以身律下隨事檢柅軍興賴之不乏制置使上其最辭曰職分也何最之有王彥明守蘄州元兵至力戰糧乏不屈率家屬乘大船於城西中流祀之慷慨鑿船沉水而卒至今人立廟元史弼黃州等路宣慰使盜起淮西司空山弼討平之趙篔翁守蘄州有廉名去任民思之而不忘本朝陶安洪武初知黃州艾荆棘開府治安輯民庶政務一新民思慕之錢敏永樂初知黃州府首興學校課農桑修城池葺公宇文章政事諸郡首稱省志盛璞知黃州府不攜妻孥唯匹馬一僕警敏有才剖決無滯勢豪斂避省志何綸知蘄州廉介剛毅一介不茍取加意倉儲一時侵漁諸弊殱除殆盡善政在人至今傳頌省志莊轍正統初知蘄州亷介仁惠百務具興民樂于從事劇盜逼境民有被殱者極為優恤咸愛戴之省志龎敬正統中知羅田縣蒞政嚴明立已嚴介壇壝鋪舍祠廟皆其建置而不勞于民一時稱賢令云省志余清正統中知黃州府持廉秉公政平訟簡軍民畏服比卒囊無餘資黃人賻之歸氷蘖之操至今稱頌省志徐泰羅田知縣清白仁恕教民務農四郊俱創便民倉以為凶荒賑濟之偹百姓懷之省志林宗天順中任蘄州學正性溫雅有醖藉察諸生勤惰諄諄教誨學者建祠于學宫祀之省志李桓成化初知黃陂縣教民植桑棗民受其利嵗飢設法賑濟多所全活省志戴中成化中知黃梅縣持身清潔蒞政明敏學校公署廢墜者皆中所葺治一時文物煥然改觀省志胡錠正德初知黃州府時值盜警督兵防守保障有功嵗飢設法賑恤死者具棺瘞之盡心民事如理家然稱古循吏云省志葉溥正德中知廣濟縣洞察民隱以誠心蒞政無赫赫之威而吏不敢欺尤作興學校賔禮布韋有長者風省志葉仕美正德中知蘄州時流賊入冦單騎招集守禦城賴以全至今稱之省志王世祿正德中知麻城縣平正剛簡視民如傷開新河建縣廳多所偉績而民不知勞省志余貴正德中知黃州府為政寬猛適宜軍民安堵學校公署修飭煥然浚井二十餘處民用利之名曰余公井省志汪倬知廣濟縣慈愛子民時鄉民流徙者田歸蘄人倬請于朝編得田者𨽻焉民賴以蘇至今繹思其德有遺愛碑省志勞樟嘉靖中知羅田縣適地方凋敝之後樟親身會計稽賦釐姦新學廟葺石城確然直行己志去之日百姓號泣載道尋立碑識遺愛焉省志流寓李泌京兆人少以才敏著聞唐玄宗使與太子遊楊國忠惡之奏徙蘄州陳慥蜀人寓居黃岡號方山子又號龍丘子幼讀書以溪山自娛宋蘇軾謫居黃與之往來倡和為作方山子傳孫傅海州人仕宋為中書舍人宣和末髙麗入貢使者所過調夫治舟傅言騷擾勞費以妨農時宰相以其所論同蘇軾奏貶蘄州安置陳過庭山隂人宋徽宗朝為御史中丞論事大忤權貴罷知蘄州未半道謫海州團練副使黃州安置秦觀髙郵人仕宋為國史編修官紹聖初坐黨籍出通判杭州後為御史劉拯論其增損實録削秩編管黃州張耒楚州人纍官史館檢討宋紹聖初坐黨籍謫監黃州酒稅後為通判最後在頴聞蘇軾訃以師弟子禮舉喪言者論其罪貶房州别駕黃州安置凡三至黃龍仁夫元末永新縣人徙居黃州明五經為時矜式學者稱為麟洲先生授陜西儒學提舉吳大中其先信之弋陽人元時徙居羅田夫婦善事父母皇慶間有司以孝聞詔旌表其門詹同新安人元末因亂家黃州王師下武昌歸附仕終翰林學士兼吏部尚書文章髙古操行耿介始終清白之行後致仕人物五代陳起蘄春人南唐舉進士為黃梅令時有妖賊諸祐者自言能使貧者富富者貧俚民效之積衆數百夜行晝息取資于盜起到官數日藉祐為里長不服且嫚言曰吾取令頭殺𥪡子爾起聞執祐斬之由是知名遷監察御史宋潘大臨黃岡人與弟大觀皆有詩名與蘇軾黃庭堅張耒遊冷齊夜話云黃州潘邠老工詩有佳句然貧甚東坡山谷尤喜之吳瑛蘄州人知郴州以虞部貟外郎壯年致仕歸蘄臨溪築室種花釀酒賔至必醉或困卧花間客有臧否人物者不酬一言人莫不愛其樂易而敬其髙尚輕財重義人有負錢數十萬而母老即焚其劵卒年八十四林敏功蘄州蘄春人治春秋下第歸杜門不出者二十年博通五經尤長于詩元符末徴詔不赴賜號髙隱處士與其弟敏修所居比鄰終老以文字相友善敏修終身不舉進士世號二林余玠蘄州廣濟人仕為四川安撫制置使知重慶府大更敝政遴選守宰築招賢館士之至者不厭禮接言有可用隨才任之築合州釣魚山凡十餘城屯兵聚糧修學養士輕徭以寬民力薄征以通商賈自寶慶以來帥蜀閫未有能及之者卒贈資政殿學士子師忠歷大理寺丞張晏然廣濟人咸淳間為禮部尚書梅應春廣濟人寶祐丙辰進士為餘干令以趙葵薦升瀘州安撫使淳祐間進禮部侍郎元管如德黃陂人仕為江州都統制能一手挽二弓世祖南侵如德先登陷陳以功遷浙西宣慰使上時政五條纍遷江西行省左丞招降廣東盜鍾明亮卒封平昌郡公諡武襄子淳祖積官至富州尹周古象蘄水縣人元兵虜至薊贅蒙古氏既生子未嘗喜妻詢其故曰有母在欲得歸省妻許之且囑曰母在當奉養勿以妾故復來及歸母尚無恙古象奉養盡孝母歿廬墓妻亦終身不嫁淮西憲僉烏克章為立孝里門本朝康茂才蘄州人能通經史大義事母孝元季盜起茂才團結鄉兵禦之王師下建康率所部降授秦淮翼水軍元帥守龍灣纍升同知大都督事經略中原從定齊魯取汴下洛駐師陜州給糧造橋以渡大軍遂領鎮河中茂才善撫綏招徠絳解諸州之人屏蔽潼關秦人不敢東向民立石頌德卒贈湖廣行中書省平章政事柱國追封蘄國公諡武襄康鐸茂才子襲封蘄春侯初東宫讀書大本堂鐸侍之賜金牌鐫蘄國武毅公五字置帽上纍著征伐功及征雲南卒于軍贈蘄國公諡忠愍吳琳黃岡人詩禮名家父應澍號西山先生勤儉樂施琳性質篤力于問學洪武中召為國子博士歷遷浙江按察司僉事入為起居注進吏部尚書後以年老致仕弟琛歷官衢州府同知卓有政聲劉廣羅田人洪武中以軍功為指揮僉事守永平有膽略善用雙刀嘗病且殆語人曰吾當臨陳死王事安能居牖下死兒女手乎後北兵入境廣率四十餘騎與遇于城北力戰死之事聞遣使護喪至京賜其家楮幣以葬王燾蘄水人七世同居少長三百餘口庭無間言有司以間詔旌其門曰孝義王聰蘄水人性謹畏有膂力洪武末以靖難纍功封武城侯征北方戰死贈漳國公諡威毅鄒來學麻城人宣德間進士從征麓川有功升通政司參議正統己巳京師戒嚴來學以僉都御史巡視畿甸整戎分屯邊務咸舉仕終副都御史卒諭祭葬省志吕鏞蘄水人領宣德丙午鄉薦福之清流知縣值流賊鄧茂七陷縣鏞拒之力不能支具服端坐中庭抗罵不屈遂為賊解體邑人立廟祀之省志鄧鑑黃陂人任光祿署丞正統己巳從英廟北征亡于陳景泰初録其子省志劉訓麻城人正統己未進士由知縣擢監察御史廉直有風裁冡宰王翺特疏其治行為天下第一拜山西參政卒子璲進士省志趙説麻城人性孝友以詩書教授鄉里父母同日而歿説號慟欲絶者纍負土成墳廬于墓側有白鵲馴擾之祥正統間旌表其門省志華巒蘄州人布政使仲賢子蚤稱俊才弱冠發解登成化丁未進士選翰林庶吉士性凝重文詞清麗館局多重之授編修尋卒庶吉士鄒智以詩哭之李文正公志其墓省志陳言黃梅人氣度𢎞雅文學明恪成化丁卯領薦任泗州學正迪生儒以古行不拘屑文藝末尹都昌清亷仁恕四民浹恱疾卒於任如喪考妣然追慕不已合循吏潘劉楊為一祠祀之號四公祠省志熊經麻城人由進士知無錫縣有惠政秩滿內召至京中之者出知陜西隴州尋以疾致仕性剛氣豪善談論敦孝友今祀無錫名宦祠省志舒崑山麻城人幼竒潁登成化甲辰進士授主事貟外郎中知建昌府升廣東參政布政擢副都御史所至有政績能文章一時碑碣多出其手省志曾大有麻城人𢎞治癸丑進士授知縣徵拜監察御史振紀銜憲直聲動臺端忤逆瑾除名瑾敗起擢知府纍陟江西布政使省志劉璲麻城人𢎞治初進士授豐城縣知縣愷悌果斷興學育才邑有淫祀首毁之以正民俗其自守狷介不私引錢以充私槖至徵斂有方小民樂辦姦胥巨猾不能索一錢也述職為江右良有司第一卒于京豐人思之省志石金黃梅人進士拜御史按廣西值土官岑猛亂佐王守仁勦平十八寨值張桂變易國是金獨立敢言與漢陽戴金風采凝峻時人目之曰楚有二金後上言時政得失謫戍久之宥免卒省志劉天和麻城人正德初進士拜御史忤逆瑾謫縣丞瑾敗起湖州知府轉陜西提學副使擢都御史巡撫甘肅舉屯政西盡青海巡視河道疏汴河殺其下流又疏泰山七十二泉濬其上流運道遂通進兵部尚書值北兵入境出兵拒戰加少保尋卒諡莊襄省志賈啓黃岡人正德辛未進士授知縣拜監察御史擢光祿少卿尋以事謫徽州推官歷都御史巡撫延綏啓多材藝慷慨談邊事甚核歷官所至多治績及致仕家居恬約不殊布素鄉人稱為篤行君子云省志劉淑相麻城人正德中進士授南京兵部主事歷升順天府尹執法秉直權貴多憚之省志王廷陳黃岡人進士選庶吉士補吏科給事中諌武廟南巡謫知裕州尋免歸居家二十餘年日以詩文自娛所著有夢澤集行于世省志蕭一中黃岡人正德丁丑進士授知縣仕至浙江布政使性剛直廉介所在著名譽屢折弗回居鄉亦弗廣置田産省志陳伯安黃陂人賦性方正初任章邱知縣拜監察御史忤逆瑾謫南充尋調丹陽教諭瑾敗起知靈壁正德七年有巨冦楊虎者犯境被虜大罵不屈賊欲刃之毅然不避賊驚異遂釋之從此築城民賴以濟建祠生祀之官至山西副使省志王澄羅田人正德甲戌進士羅田甲科自澄始初令番禺有政績徵入歷官戶部郎中奉命淮餉次江西次遼東次埧上通州俱有賢聲省志邢寰黃梅人正德戊辰進士擢刑科給事中轉禮科以犯顔敵諫為已任武廟亦敬憚之忤中貴謫判官升南昌知府恤殣興賢剔蠧振滯萬口揄頌卒于官百姓如喪考妣省志許恩蘄水人年甫冠正德辛巳季冬夜鄰家火延恩舍恩覺巳得知忽思母江氏未出即反冒焚突入救母遂俱厄為燼止存其手尚抱母身邑人痛之省志董士毅麻城人正德庚午舉于鄉授四川南充知縣一介不取有青菜布衣破繖羸馬之謡升守蓬州南充民勒石以志去思居蓬清操益勵歸時囊無長物林下十餘年足不履城市好義喜施正德戊辰大旱捐榖倩人埋瘞餓殍不下數千省志毛鳳詔麻城人正德辛巳進士授知江浦縣有善政擢監察御史上弭災八事關于天下利害巡按陜西雲南守令以下皆望風解印綬去班列殆空尋謫嘉定州判官歷升推官同知終雲南僉事博學有文名有聚峯文集藏于家省志張明道羅田人嘉靖己丑進士厯刑部郎中紹興知府江西副使揚歷中外政績著聞為一時循良之冠省志奚世亮黃岡人嘉靖丁未進士授主事歷官延平知府時倭夷冦閩世亮與武帥分城拒守城陷亮猶西向迎戰身被數鎗死之事聞贈官録其子志省胡明庶羅田人嘉靖乙酉中鄉試第三人壬辰登進士觀政通政司卒于官平生孝友篤志力學尤精理數省志劉采麻城人嘉靖己丑進士初知宿州纍官副都御史巡撫山東遷南京戶部尚書以疾致仕穆宗即位起南工部改吏部尋改兵部歷官四十餘年清介如一日卒年七十四諭葬祭贈太子少保諡端簡省志列女魏氏熊谷真妻黃岡人夫亡一子在襁褓而貧依父母織袵自給年踰八十以節終洪武中旌省志王氏甘原禮妻蘄水人年二十四歸甘甫二載原禮卒孀居二十三年洪武中旌省志朱氏徐宗妻廣濟人年二十一守節不移洪武中旌省志張氏劉漢妻麻城人漢任商水知縣流賊至城陷張同女鸞山縊死正統中旌省志盛氏鄧鑑妻黃陂人鑑任光祿署丞以土木之難歿于陳盛時年二十七矢節撫孤瓊後以恩録仕為裕州守盛年九十餘卒有司表旌其門省志張氏何儀妻廣濟人守節無玷正統中旌省志盧氏劉鵬妻黃岡人夫卒痛哭嘔血遂自經死嘉靖中旌省志劉氏蘄人馬廷實妻廷實儒生貧甚劉績紡奉姑年甫二十廷實死遺孤溺死孫甫三周劉同媳潘氏撫之以延馬祀事聞萬厯中旌其門省志熊氏女許聘劉康未歸而康卒女往哭之竟觸柱而死事聞旌表其門仍復其家省志仙釋羅真人黃梅人名致福晉時修道于縣北鳳臺觀丹成有老人來云某龍也有病願求丹療之致福賜之丹而愈後于觀北水塘洗足飛升而去今遺飛升臺并洗足池宋賜今號麻姑後趙石勒麻姑秋之女其父猛悍人畏之築城嚴酷晝夜不止惟雞鳴乃息姑賢有恤民之心假作雞鳴羣雞效聲衆工乃止父覺欲撻之女懼而逃入仙姑洞修道後于城北石橋飛升追者不及名其橋曰望仙道信姓司馬氏其先世居河內後徙蘄之廣濟隋太業間領徒衆抵吉州唐武德中返蘄州往破額山永徽初卒廣德間賜號大醫禪師即僧家所謂四祖者𢎞忍黃梅縣人唐貞觀間住縣之東禪寺以養母咸亨中入馮茂山結庵上元中卒廣德間賜號大滿禪師即僧家所謂五祖者明一統志卷六十一
