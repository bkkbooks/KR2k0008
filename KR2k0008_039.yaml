月悞欲探驪珠聯魁坊在府治東宋嘉定中里人有陳四者剖心治親之疾名曰褒孝後有趙汝訓汝弼兄弟登進士郡守倪祖常改是名聚桂坊在府治西北宋時有唐堯臣包時習與弟時中時非俱中童科後徐聞詩又中童科堯臣後人夢符震龍天寵又相繼擢進士景定中扁是名名宦晉髙史君逸其名建武中為嘉興監屯校尉領兵三千屯田於此久而鎮靜歳遇豐稔公儲有餘有功有徳民立廟祀之南北朝沈演之宋嘉興令有能名召人為司徒祭酒周顒南齊處士應詔出為海鹽令欲過北山孔稚圭作北山移文以却之唐朱自勉廣徳中為嘉禾屯田使盡心職業入粟倍常邦人徳之立石頌美李諤長慶中為海鹽令察俗利病於縣西境開古涇三百所創二閘瀦蓄河流灌溉民田號曰常豐為一方之利居民歌之五代曹信吳越時為牧守涖嘉興慈惠愛民子珪繼為嘉興都將守城以拒淮人及卒民懷其徳立祠祀之錢元弼吳越秀州刺史州初建元弼涖政有方以最課稱宋柳植知秀州平居畏慎至官舍雖蔬果不輒取家無長物時稱其廉韓晉卿嘉興主簿治尚循良奏課第一魯宗道咸平中為海鹽令縣東南舊有港歳久堙塞宗道發鄉丁濬治之人蒙其利號魯公浦聶厚載皇祐中知秀州攘敝活罷邦用熙靖以循政聞李惟幾嘉祐中為海鹽令時方荐饑惟幾請公錢貸民糴􅩂濬治溝洫以備水旱民賴以安葉清臣知秀州嘗上書論天下事陳九議十要五利皆當世可行者劉師道知秀州剖煩析滯案無留事吏民愛畏甚有治聲張先元豐中通判秀州創花月亭先有俊才尤工於詩葛宫知秀州秀介江湖間吏為闗涇瀆上以絶往來間有昏喪趨期者多不克宫命悉毁之何執中元祐中知海鹽縣為政識先後邑人紀其十異滿去父老乞留攀舟而泣喬大臨政和間為海鹽令時平江朱勔以花石得幸其蒼頭至海鹽甚横大臨追逮杖十餘人坐是罷官士論髙之宋昭年宣和間知秀州盜發嚴州昭年謂吾州次當受敵於是大脩城隍明年賊果抵城下昭年與民乘城自固賊留三日無敢薄城者後五日賊大瀆朝廷嘉其功進職以寵異之洪皓宣和間秀州錄事適秋大水皓以荒政自任發廩捐直以糶活飢民九萬五千餘人鄧根建炎初知崇徳縣治劇有風力後代程俱為知州兵壗後經理有方秀民賴之方滋紹興初知嘉興府急吏寬民百廢具起始改建州學於通越門内其清名雋望為時所重黄楊知崇徳縣縣治自罹建炎兵火鞠為茂草寄治廣法院者二十餘年楊至始建縣治區處有方民不知擾李大卞乾道中知海鹽縣縣境有常豐二閘歳久僅存一閘日就墮圯大卞重脩以復其舊且置堰以通往來民甚便之葛邲乾道初知崇徳縣以樂易處心以儒術飾吏事舉大綱鎮以至靜綽然有循良之稱韓彥質淳熙中知嘉興府遇事精敏濟以公正下車未幾姦伏弱植優游撫馭遂以無事吳柔勝嘉興府學教援有持敬之學不妄言笑能以文行表率士知趨向伊洛之旨晦而復明黄幹監嘉興石門酒庫時韓侂冑方謀用兵吳獵帥湖北將赴鎮訪以兵事幹曰聞議者謂今天下能為大舉深入之謀果爾必敗此何時而可進兵哉黄灝提舉浙西常平秀州飢莩殣盈野而州縣方督促逋欠時有旨倚閣夏税灝奏乞併閣秋苗不俟報行之言者罪其專削兩秩而從其蠲閣之請岳珂寧宗朝權發遣嘉興軍府兼管内勸農事有惠政嘗居郡治西北金陀坊痛其祖飛為秦檜所陷作籲天辨誣天定錄等書總名金陀粹編樓演寶慶中知崇徳縣敏而有吏能始至即究極源流疏剔弊蠧發為教條具有準繩孫夢觀知嘉興府在郡蠲租税省刑罰有古循吏之風趙景緯咸淳初知嘉興府至郡首以䕶根本正風俗為先務三乞祠不許遷宗正少卿夏元直知崇徳縣脩學校興建課㑹尋訪故實平易近民庭無留訟囹圄久虚以最績聞元瞻思至元中浙西廉訪僉事以浙右諸僧寺私蔽猾民有所謂道人行童者類皆瀆常倫𨼆徭役使民力日耗契勘嘉興一路為數已二千七百乃建議請勒歸本族俾供王賦朝廷是之即著為令陳春嘉興路推官有能聲至正中民販私鹽事覺牽連千餘人獄久不決春徃治之即得其情釋被誣者數百人閬境稱為神明先是久不雨至是大雨郷人稱為陳公雨盧祥至順初知崇徳州時旱潦相仍民多流離祥招徠賑濟州境晏然陳伯顔至正間為嘉興縣尹時方多事調發有方百姓便之為立石頌徳杜溥嘉興路總管廉正仁厚勸課農桑除民疾苦尤以興學為務教化大行劉貞嘉興路總管時四方多難貞務寬厚存問鰥寡撫循貧乏大興學校及去任民爭遮道涕泣攀挽如失父母焉石光著至正間為嘉興尹多善政士民立碑頌徳本朝謝士毅洪武初知嘉興府内附之初民始休息士毅勤於撫字每遇芳辰則騎從出遊使民知太平氣象云畢輝知崇徳縣與縣丞齊搏同心執法不容奸弊朝廷嘉之遣行人賫勅及醴酒勞之徐本知嘉興縣長於撫字自為勸農文鄉人至今傳誦之劉觀洪武中知嘉興府勤於職事興利除弊修舉學校尊賢禮士郡政為之肅然趙豫嘉興府推官剛明廉介讞獄平恕郡有貧民構訟繫獄久之餽餉屢絶豫審其情縱使就食民亦感服不忍逸去楊得安永樂初知嘉興府為政和易與物無競寮寀以下自然畏服齊政知嘉興府時徵役鑄錢政編為三畨以期更代而且措置有法迄役而民不勞汪貴成化末知嘉善縣有惠愛汰無名費歳數萬錢倉庾學校多所構緝與諸生講授不廢寒暑坐調卧留者數千人省志湯沐𢎞治中知崇徳縣廉潔勤慎嚴禁奢俗興利除害敬教觀學歴陞浙江右布政操持與為令時同省志流寓沈晦本錢塘人徙居崇徳宋宣和間進士廷對第一除著作佐郎金人攻汴京借給事中從肅王樞出質金軍張邦昌偽立請金人得還髙宗立召為中書舍人累官徽猷閣直學士知潭州莫琮本仁和人宋建炎初避地崇徳晚入仕歴明福二州幕官涖政行已俱有可觀子五人元忠若晦似之若拙若沖俱登科時比燕山五竇王希呂本宿州人宋髙宗南渡時寓居嘉興舉進士為正言上章劾佞臣張説出知廬州累官吏部尚書希吕天性剛勁居官廉潔及致政歸無屋可居李曾伯本懷州人寓居嘉興天才卓絶素有雅量儒而知兵仕宋累官觀文殿學士所著有可齋類藁常同本臨卭人宋髙宗朝為御史中丞忤秦檜意出守湖州郡有賢明之謡後提舉江州太平觀寓居海鹽卒諡忠毅二子袾袊皆典郡有聲王琮本錢塘人宋紹興間避地居崇徳縣後登進士第以孝友稱歴官兩浙江東漕副以直龍圖閣致仕輔逵本趙州人寓居崇徳宋乾道間為後軍統制孝宗欲處以邊郡問其能勝任否曰當以家法治之又問何法曰子視兵民愛惜財賦遂除知泰州語寮寀曰吾目不識字手不能書但心能燭理耳能聽訟爾郡中果稱治趙汝愚本番陽人寓居崇徳宋乾道間魁多士官至丞相功業甚著追封福王諡忠定方誼本桐廬人宋乾道間侍父務徳徙居嘉興嘗從朱熹遊熹文集中多有相與問答之語葉時本杭州人仕宋累官龍圖閣學士明性命道徳之學尤粹於周禮晚居嘉興著禮經㑹元王明清本汝隂人宋慶元間寓居嘉興官至朝郎有史才所著有揮麈錄及玉照新志焦炳炎本宣州人寓居嘉興宋理宗朝登進士為諌官論奏皆切中時病屢遷太常少卿弟煥炎平生抱負英畧慷慨有大志仕至鎮江太守禦邊多顯效李鳴復本盧州人寓居嘉興之東門理宗朝拜㕘知政事後為福建安撫使子祠卒於嘉興子公夬公晉皆典郡髙巽志本蕭縣人元末寓居嘉興博學多文為鄮山書院山長本朝洪武初徵脩元史入翰林為編脩陞侍講學士仕終太常少卿所著有文集陳世昌本錢塘人力學古文元至正初由布衣入為翰林編脩代祀海上值道梗遂留嘉興授徒養母張士誠據平江屢致不屈本朝洪武初徵脩禮書授太常博士尋以母老辭歸後復徵至京而卒所著有希言集人物漢嚴助㑹稽人武帝時以賢良對䇿擢中大夫後乞為會稽太守久之帝賜書曰君厭承明之廬懷故土間者久不聞問助上書謝願奉三年計最詔許因留侍中有竒異輒使為文及作賦頌焉朱買臣㑹稽人家貧好讀書賣薪自給擔束薪行且誦書武帝時以同邑嚴助薦召見説春秋拜中大夫後為㑹稽太守擊破東越有功徵為主爵都尉列於九卿子山拊官至郡守右扶風張武吳郡由拳人父業為郡掾送太守妻子還鄉至河内遇盜夜刧業與戰死武年幼不及識父後詣太學受業常持父遺劔至父亡處祭泣太守第五倫嘉其行舉孝廉遭母喪過毁絶命晉韓績吳郡嘉興人少好文學不交當世東土稱焉成帝時以安車束帛徵拜博士不起南北朝顧野王吳郡海鹽人七歳讀五經九歳能屬文天文地理卜筮蟲篆竒字無所不通仕陳為黄門侍郎子安饒仕至鴻臚卿唐陸敦信嘉興人髙宗朝拜左待極檢校左相封嘉興縣子子齊望官至秘書少監齊望之後曰偘以䕃補溧陽尉民懷其惠而祠之徐岱蘇州嘉興人於學無所不通辨論明鋭大厯中劉晏表為校書郎觀察使李栖筠敬其賢書所居為復禮郷陸贄蘇州嘉興人年十八登進士第又中宏辭拔萃徳宗時為翰林學士從幸奉天日詔書旁午思如湧泉武夫悍卒聞者無不感泣思奮累遷中書侍郎同平章事為裴延齡所讒貶忠州别駕在朝論諫甚切一本於仁義卒諡宣所著有奏議翰苑文集丘為蘇州嘉興人事繼母孝嘗有靈芝生堂下官至太子右庶子及致仕年八十餘而母無恙給以俸祿之半初還鄉縣令謁之為候門磬折令坐乃拜里胥立庭下既出乃敢坐經縣治降馬而趨卒年九十六顧況海鹽人在貞元中𨼆居不仕自號華陽山人善屬文尤以詩名於時白居易少時以詩投況況戲曰長安物貴居大不易及見原上草篇曰有句如此居亦何難子非熊陸扆贄族孫舉進士從僖宗幸山南累遷翰林學士扆屬辭敏速若注射然昭宗甚優遇之官至中書侍郎同平章事爵嘉興縣男五代髙彥海鹽人事吳越錢氏屢從征伐有顯功及錢鏐立奏授彦湖州刺史彦性淳厚居職十餘年政甚簡便後奏領費州刺史宋謝炎嘉興人為文慕韓柳與盧稹齊名時謂之虚謝端拱初舉進士補昭應主簿知華容公安二縣吕諤嘉興人天禧初登進士第後天聖景祐間二弟曰詢曰評相繼登進士皆有名於時嘉興登進士者自其兄弟三人始盛陳舜俞嘉興人嘗寓居湖州博學强記慶厯中舉進士又舉制科第一僉書夀州判官熙寜初以屯田員外郎知山隂縣青苗法行舜俞不奉令上疏自劾責監南康軍鹽酒税而卒士大夫識與不識皆深悲之郭三益海鹽人父治平初進士三益元祐中登進士第累官至刑部尚書髙宗初即位除同知樞密院事聞人宏嘉興人父安逺朝散大夫宏大觀初登進士第援通州司法㕘軍陳了翁貶台州宏願與之遊轉台州兵曹識者羨其髙誼官至通判常州所著有周官通解經史旁通等書江珪崇徳人政和間登進士第歴官三院御史累遷吏部侍郎魯訔海鹽人兄詹崇寜中進士訔與弟詧紹興初同登進士訔仕至太府卿自號冷齋有註枉詩十八卷其後詹子可封訔子可宗詧子可簡可簡子幵珏皆以進士世其家可宗又中博學宏辭科官至太常卿趙汝能崇徳人宗室紹興末舉進士歴官州縣革奸宄決滯獄興學校所至皆有能績莫抃崇徳人隆興間進士歴官通判常州有列薦其補内職者抃力請郡得守臨汀子澤紹熙中亦舉進士官至刑部尚書婁機嘉興人學該經史乾道初進士為鹽官尉調含山主簿以治績聞累遷吏部侍郎兼太子左庶子屢進讜言多所禆益後除參知政事以資政殿學士致仕卒錢文崇徳人乾道間進士尉當塗捕販私茶十數輩法當進秩文力辭不願以為績郡守奇之後歴知青田萬載縣及循州克著能聲卒官朝奉大夫蔡開崇徳人淳熙間登進士第官至憲漕弟闢亦舉進士官至國子祭酒俱有名於時徐龜年崇徳人淳熙末舉進士知江寜縣歳饑盡心賑貸全活甚衆累官監察御史抗疏言士大夫之邪正實關風俗之美惡以直華文閣知温州改徽州致仕弟逢年亦登進士居官有能名陳之綱崇徳人淳熙間登進士第令海陵政先惠愛脩築捍海堰民甚賴之弟之純之經亦舉進士有聲於時王用亨崇徳人少孤事母至孝嘉定初舉進士志欲盡讀天下書手抄口誦至忘寢食鄉之登仕籍者多出其門嘗作二記於座右以不欺不貪自警焉輔廣逵子師事吕祖謙朱文公慶元初偽學禁興學者多解散廣獨不為動文公深器重之嘉定間仕止祠官罷歸𨼆語溪以著書為務有五經註釋四書問答詩童子問通鑑集義日新錄師訓編諸書學者稱為傳貽先生沈木崇徳人嘉定初進士知石城縣時汀宼入境牒熊子開等為鄉導巡尉司以隅官姓同者指為賊木察其非是破械與約使捕子開輩衆謂其縱虎出柙已而果縛子開以獻人服其明繼倅建昌守翊所至有古循吏風陸徳輿崇徳人從父鏕嘉定初進士後十年徳輿由童子科登第有文名歴兩浙知貢舉官至吏部尚書弟文輿通經史仕至按察司判官宋亡𨼆居不仕沈炎嘉興人寳慶初登進士第累官至參知政事炎嘗居言路所言多公論趙孟堅海鹽人寳慶初登進士第官至太守時與孟堅同科登進士者曰與翊時勇與橡夫漪夫瀜夫彦秘泮夫忞夫與機孟敏希檜與時崇洽善韸崇愜崇愈崇昔汝堂與曽崇試汝熠與善崇侑皆宗室也吕重庚嘉興人博學能文湍平間登進士官至大理正自號九山所著有九山集常楙同曽孫淳祐間登進士第為監察御史知無不言累遷刑部侍郎嘗論天變咈帝意及觸權臣出知平江改浙東安撫使所至以廉稱後拜吏部尚書進端明殿學士數與朝堂議事不合以疾辭拜參知政事及卒家無餘貲李如箎崇徳人為桐鄉縣丞博聞强識天文地理厯數禮樂兵機之學靡不該通所著有東園叢説樂書陳塏崇徳人累官太府卿權工部侍郎以直言罷未幾進集英脩撰歴權吏户兵三部尚書端明殿學士卒諡清毅所著有讀鑑随筆子鑄寳慶中進士官至都承旨莫光朝崇徳人博學强記下筆數百言尤好為詩識者謂其得意處不在唐人下舉進士知江寧以撫字稱元張伯淳崇徳人宋咸淳中舉童子科又弟進士歴揚州司户參軍至元初召為翰林學士卒諡文穆有養蒙集行世子采官至吳江州知州吳森嘉興人家饒於貲施予不吝嘗捐田二頃建義塾以淑鄉人子弟至大間廉訪使以名聞表其門曰義士潘應定嘉興人博覽典籍尤以孝行名於時母喪廬墓哀號無間時有桂花變色白鶴來翔之瑞左丞周伯琦嘉其孝為書雙禎二字揭於墓所戚敬嘉興人𨼆居事母至孝沒居喪哀毁過禮既𦵏廬墓有白芝之瑞又以木刻母像事之如生邦人稱之俞鎮崇徳人博覽經史鄉舉第一累官建徳縣尹所著有脩辭藁本朝鮑恂崇徳人嘗受易於臨川吳澄著大易傳義等書洪武初以明經召至京除文華殿大學士輔導東宫恂固辭歸鄉里學者稱為西溪先生貝瓊崇徳人居殳山博覽經史尤工於詩洪武初徵脩元史累官國子博士所著有清江文集程本立崇徳人洪武中舉秀才擢引禮舍人累官左僉都御史殷近仁嘉興人博學能文與其弟原誠原善友愛無間言家貧親老同心協力以供甘旨之養近仁洪武初以孝弟舉授山西平遥知縣未幾親喪𦵏祭盡禮服終以所著涖政戒銘四十二篇獻之於朝擢廣西㕘政沈兼善崇徳人洪武中由賢良舉薦歴任有能聲累官江西按察使陳俊民嘉興人有才行洪武中以求才至京授山東布政司理問有能聲永樂初擢刑部福建司員外郎陞郎中出為貴州布政司左㕘政再遷右布政使朱逢吉崇徳人洪武中以求賢擢知寜津縣有徳政陞湖廣按察司僉事入為大理寺左寺丞所著有牧民心鑑童子習二書徐子良嘉興人洪武末以國子生為兵部主事有能名累官江西㕘政鄭楚瞻崇徳人以學行推薦歴官老成後陞都察院右副都御史崔永海鹽人七歳喪父母韓氏從繼父謫海南後永徒步至瓊州求母時繼父已没有司以配屬不許歸永復號泣請於朝許之舟行遇風永入水負母因感疾卒江西布政司以聞為之祭𦵏仍給驛舟歸其母永往返數四廣海間人以崔孝子稱之姚文崇徳人永樂間中進士為北京刑部主事陞吏部郎中歴知慶逺袁州府以廉謹自持致仕卒于家朱侃海鹽人永樂中由國子生擢監察御史歴廣東按察僉事通政司右㕘議終左通政吕原秀水人正統末進士及第第二授翰林編脩歴官通政㕘議兼侍講入内閣㕘預機務天順末以憂制去位卒贈禮部侍郎諡文懿志省項忠嘉興人正統末進士歴刑部員外郎從英廟北狩陷敵中得還遷廣東按察副使歴陜西按察使尋轉右副都御史撫其地以平固原上達滿四功陞右都御史再奉詔討襄荆李胡子之亂斬首獻俘進刑部尚書改兵部加太子太保以奸黨仇陷落職尋復官卒諡襄毅省志張寜海鹽人景泰初進士授禮科給事中蹇諤自將每有大議朝廷問張給事云何拔掌科事值南京給事中王徽劾内閣李賢逺謫寧申救之遂出知汀州府寧至先教後刑境内利病悉罷行之民咸得所乞歸閒居二十年公卿交薦不起卒侍妾子女皆抱竒節省志卞諶嘉興人𢎞治末進士授江西廣信府推官辨疑獄理寃抑郡稱神明家居孝友嚴于義利之辨不究厥施而卒鄉人至今惜之省志錢錡海鹽人正徳初登進士知旴𣅿縣計拒流賊邑賴以全陞南京刑部郎中歴知臨江府有徳政左調思南請老歸教子姪相繼登第義聞孚于鄉邦卒年八十二省志列女禹氏崇徳石門人吳守正妻名淑靖嘗從容謂守正曰方今羣盜蜂起萬一不測妾惟有死而已元至正中盜陷崇徳淑靖倉皇攜八歳女登舟以避有盜數輩奔入其舟淑靖乃抱幼女投河死柳氏女嘉興人父為縣吏元至正末紅巾賊陷嘉興女時年十八與其父母同竄匿為賊所得驅以行至河滸紿欲結韈賊不知防遂投水而死郡人金絅為作記以表之錢氏二女嘉興人錢子順之二妹也元至正末紅巾賊至其家二女義不受辱乃相與結裙裾投河而死賊驚奔去其後子順妻俞氏亦守節得旌門鄉人稱其家二貞一節云董淑真海鹽董鎮女贅朱士廉年少夫亡誓不更嫁迎姑終養洪武中旌其門彭氏嘉興人父公衍鍾愛特甚館張昱為甥未幾昱病卒兒尚在抱既殯彭求自盡姑泣戒曰吾年老兒年幼且病忍棄捐耶乃奉姑命調䕶其兒兒愈遂絶飲食號泣五日而死省志李氏桐鄉人年十八適髙逾生子熊方朞而逾亡家貧舅姑相繼亡往依母居母諭之改圖輒慟絶母止不復强熊既長娶曹無子為立妾陸氏甫得子熊又亡曹與陸皆勵操事姑以撫幼兩世三節云省志趙氏崇徳人適衛蘭年二十七而蘭死趙勤蠶織養舅姑撫遺幼間關四十餘年苦節如一日卒年七十二省志沈氏海鹽人年十九適崇徳方瑄甫十八日瑄死沈悲摧屢絶而蘇服訖舅姑貧乏令歸依其母母謂年少無子勸改適不從母濳以許人沈覺之紿其母往吿外氏母行遂沐浴更衣縊而死省志沈氏嘉興人太守馬輿之繼室也貞靜有至性輿以壽終沈年尚少無子悲啼不絶聲者八日遂自經死省志梅氏嘉興人父諱江官僉憲擇壻得顧燁妻之燁第進士為給事中能舉其職早卒梅即不食以死省志朱四女平湖未炳少女也年十六許姚氏未及笄炳卒無子女依輔寡母盡孝養惡少丘鍾乃其姊夫謀欲私之强附同居數挑之以言女即大聲詈罵痛哭于庭自嘆無父之女為人所凌如此至夜遂縊死父柩之旁省志蔡氏崇徳蔡天錫之女許邑人何鶴齡齡多行不義兩家父母俱議改昏蔡氏誓死不從遂歸鶴齡齡日事淫博蔡輒泣諌冀悔悟及翁死齡不為理喪蔡罄衣資治喪𦵏齡愈兇暴勒蔡以不義蔡懼自辱遂經死省志周氏嘉善周鼎之孫女十六贅莫佐甫七月遺姙而佐死姙生又女姑重憐之諷使再適周誓曰有不從姑終身者不出户婺居六十餘年而終省志仙釋徐彎海鹽人少有道術能收捕邪精錢塘人杜氏女患邪彎為作法符召之見白衣人入門彎一叱即成白龜後登石﨑山不返兄弟往尋之見彎在山上倚樹不動遂抱下惟空殻耳蓋尸解也李鼻涕宋紹興初劉延仲寓秀州常有道人過門或從求藥則以鼻涕和垢膩為丸與之因目為李鼻涕延仲與坐曰今日適無酒為禮道人笑曰牀頭珍珠泉一樽何不出以待客劉大笑呼童取尊道人曰不必取但將一空瓶來瓶至索紙覆之少焉香溢於外成美酒矣坐者皆醉明日劉有他客出所謂珍珠泉者啓之而中空無涓滴一日詣劉别云後二十年某月日當於真州相見至期劉卒於真州律師光範唐沈亞之集云律師光範為童子時事師曰靈祐師學道經記初居嘉興空王寺更居靈光寺與其徒講贊數言百流㑹歸之説自吳南北郡邑緇永咸來受法人人自得著釋㑹章句十五卷文偃嘉禾人姓張氏少時徧遊方外遂得道於雪峯禪師宋太宗朝賜諡號康真洪明禪師寶安禪師蘇州人姓夏親運土石於精嚴寺立五臺院時夀八百餘歳不衣絲縷寢卧亂草深明宗旨終後肉身不壊尋遇沙汰遂即闍維空中飛鶴盤旋化畢祥雲始散楞嚴師名子璿宋時寓精嚴寺講楞嚴經自作疏疏未作時夢文珠入口既畢夢出於口疏成紙為之貴聽者雲集夏竦奏號楞嚴大師肉身𦵏於真如長水法師嘉興人有道行註華嚴經八十一卷跏趺而寂以兩甕合之𦵏真如寺宋建炎初金烏珠兵至發之見手爪遶身復瘞之而出梵琦象山人字楚石性穎發博通内外典元㤗定中住海鹽福臻院本朝洪武初以髙僧召至京師親承顧問未幾卒宋濂為撰塔銘明一統志卷三十九
