body:
  text: 明一統志卷三十九明李賢等撰嘉興府東至直隸松江府華亭縣界五十里西至杭州府仁和縣界一百里南至海八十三里北至直隸蘇州府吳江縣界二十七里自府治至南京七百三十八里至京師四千一百里糧六十一萬八千石零建置沿革禹貢揚州之域天文斗分野春秋時地名長水又名檇李初為吳越分境後為越境魯定公時越敗吳于檇李即此戰國時屬楚秦為㑹稽郡地漢因之東漢屬吳郡三國吳於此置嘉禾縣後改嘉興晉以後因之隋廢嘉興海鹽二縣以其地屬蘇州唐復置仍屬蘇州後屬杭州五代時錢氏奏置秀州治嘉興縣宋屬浙西路政和間名為嘉禾郡慶元初陞州為嘉興府元置嘉興路本朝復為嘉興府領縣七嘉興縣附郭秦為由拳縣地屬㑹稽郡東漢屬吳郡孫吳以嘉禾生改置嘉禾縣後改嘉興縣隋廢入吳縣唐武徳中復置屬蘇州尋省貞觀中復置五代時屬杭州後於此置秀州宋屬嘉興府元仍舊本朝因之編户三百八十里秀水縣附郭本吳嘉興縣地本朝宣徳四年析置秀水縣治府城内西北隅編户二百三十五里嘉善縣在府城東三十六里本嘉興縣東境本朝宣徳五年析置嘉善縣治魏塘鎮編户二百四里海鹽縣在府城東南八十里秦析吳縣地置海鹽縣屬㑹稽郡西漢因之王莽改曰展武縣後陷為湖移治武原鄉改為武原縣東漢復為海鹽屬吳郡又改故邑縣晉復為海鹽陳省人鹽官縣唐復置五代晉時屬秀州宋初仍舊後屬嘉興府元陞為州本朝仍為縣編户一百六十一里平湖縣在府城東五十四里本漢故邑縣地後為海鹽縣東北境本朝宣徳五年析置平湖縣治當湖市編户一百一十四里崇徳縣在府城西南九十里本嘉興縣地五代晉時吳越析嘉興之義和市及崇徳七鄉置為縣屬秀州宋初因之後屬嘉興府元陞為州本朝仍為縣編户二百一十三里桐鄉縣在府城西六十里本崇徳縣地宣徳五年割崇徳之梧桐八鄉建為縣編户一百七十九里郡名檇李古地名嘉禾宋名形勝江東一都㑹漢志吳東有海鹽章山之銅三江五湖之利江東一都㑹也旁接三江舊志介二大府旁接三江負海控江㑹浦河記負海控江土為上腴魚鹽之饒版圖之盛視他邑不若也海濱廣斥鹽田相望吳郡記澤國佳致嘉禾志序全吳腴壤唐李澣嘉興屯田政績記全吳在揚州之域最大嘉興在全吳之壤最腴故嘉禾一穰江淮為之康嘉禾一歉江淮為之儉居山澤之介圖志吳越多山而湖澤漸其下崇徳居山澤之介孔道四出左杭右蘇負海控湖元嘉興路總管府記襟溪帶湖四望如砥元趙孟頫天寜寺記大海環其東南震澤匯其西北郡志風俗慕文儒勤農務古圖經云罕習軍旅尤慕文儒不憂凍餒頗勤農務風俗淳秀舊志土膏沃饒風俗淳秀文賢人物之盛前後相望百工衆技與蘇杭等信巫鬼重淫祀隋書地理志素誘魚鹽之利宋嘉興知縣題名記云地富稻秫民素誘於魚鹽之利故牒訴為多人性柔慧宋志人性柔慧尚浮屠之教俗奢靡而厚於滋味民俗殷富元天寜寺記山川瓶山在府治東北髙三丈廣十畝餘千户所及民居環遶其麓相傳宋時清酒務在此其罌缶所棄積久成山又嘉善縣南亦有此山五臺山在府治西北山東南有宋秀王祠西南有木紋觀音殿以石刻法華等經列為闕凡十二間及立東西二塔建炎兵火後石經獨存胥山在府城東南三十里本名張山昔伍子胥伐越經營於此後人因改今名并立祠宋張堯同詩馬革浮尸去君王太忍人此山空廟貌何以勸忠臣山左有石龜勢欲趨水右有吳山磨劒石鄉人陳氏者嘗鑿室讀書名胥山書堂遊覽者多留題秦住山在海鹽縣南一十八里世傳秦始皇東遊嘗登此山故名晉樂資九州志云縣有秦逕山秦始皇逕此美人死𦵏於山下山之東海口有巫子山豐山在海鹽縣西南一十八里有石室室東南有九毋冢内多蜂蠆蛇虺不可近舊傳秦始皇嘗屯兵此山白塔山在海鹽縣東南二十里海中山有白塔因名山下舊有港通魯浦曰白塔潭海舟多泊焉唐至徳初有人於此山沙渚上得一桃核片可以貯升米望虞山在海鹽縣東南二十二里以隔海望㑹稽上虞縣故名横山在海鹽縣西南三十里唐顧況居此縣令劉長卿過横山顧山人詩秪見山相掩誰言路尚通人來千嶂外犬吠百花中細草香含雨垂楊間弄風却尋樵逕去惆悵綠溪東石帆山在海鹽縣西南三十餘里海中石帆之東有鷹窠項山長牆山在海鹽縣南三十五里秦始皇東遊嘗登此山望海以山形孤聳望若堵牆故名泊櫓山在海鹽縣南三十五里輿地志秦始皇東遊候潮渡海泊櫓於此金粟山在海鹽縣西南三十五里以其周迴六里又名六里山吳地志有石篆書三十八字天冊元年刻碑上有廣惠禪寺内有舍暉堂夾山在海鹽縣西南三十五里舊經云山居金牛金粟二山之間因名青山在海鹽縣西南三十五里𨼆若龜形為澉浦鎮之主山山顛今置烽堠葫蘆山在海鹽縣西南三十五里海中潮汐消長此山如葫蘆出没之狀因名紫雲山在海鹽縣西南三十六里相傳唐建中間有村女出耕紫雲常覆其上因名邵灣山在海鹽縣西南三十六里黄山在海鹽縣西南三十六里近有髙王山與此相接湯山在海鹽縣東北三十六里宋紹熙間縣令李養直置叢塜於山以𦵏溺海之屍今置烽堠於其上麂山在海鹽縣西南四十里永安湖側以形似名車山在海鹽縣東北四十里山形如車近此數里有暈頂山鳳凰山在海鹽縣西南四十五里與竇家山小山澤山颺山相近俱列峙於澉浦鎮之西南半湖山在海鹽縣西南四十五里與沈氏山近列於澉浦鎮之東北馬鞍山在海鹽縣西南四十五里近有若山楊山及碧里山與此山俱在澉浦山西北五六里月山在海鹽縣西南四十五里與小山相接去澉浦鎮西三里其在鎮南五里曰葛毋山在鎮東六里曰篠山蒼翠相望荆山在海鹽縣西南四十五里占宋安湖之勝上有悟空寺廟山在海鹽縣西南四十五里地名頭上有王廟石屋山在海鹽縣西南四十五里山頂有壘如屋之狀因名雞籠山在海鹽縣西南四十六里以形似名去澉浦西南六里龍尾山在海鹽縣東北四十七里以形似名金牛山在海鹽縣西南五十里吳地志云昔有牛糞全村民臯伯通與弟隨之牛穴此山而入二兄弟鑿山欲入山頽同死穴中故又名㑹骸山獨山在海鹽縣東北五十四里不與諸山相接上置烽堠以防海宼舊又置鹽塲於此沈山在海鹽縣西南六十里圖經宋臨海太守沈景𦵏於此因名唐大順中割其地歸杭州今沈山即海寜縣硤石鎮之東山陳山在崇徳縣西北三十里昔有陳氏居此故名􅉼山在崇徳縣西北保寧石門二鄉之界山有浮圖祐山在平湖縣東南二十里舊有秦小娘神祠小娘相傳晉人也故邑山在平湖縣東南二十七里山下有城唐志云舊縣治蓋漢安帝時海鹽縣淪陷為湖移治此後縣治復徙於馬嘷城雅山在平湖縣南二十七里山多怪石俗呼為惹山觀山在平湖縣東南二十八里一名官山其南一里又有髙公山苦竹山在平湖縣東南二十九里上有天妃宫蒲山在平湖縣東南三十里海邊近又有菜薺山亦瀕於海龍湫山在平湖縣東南三十里一名陳山山有龍湫山椒有大石盤陀歳三月十八日吳之陽山及此山多雲霧晦㝠雷雨之變俗傳為白龍君以是日生於陽山而歸藏其母於此故建祠若有禱必先酧酒石上有物蜿蜒即見宋時禱雨屢應累封龍神為廣惠淵靈侯名其廟曰顯濟甑山在桐鄉縣北一十七里山形如甑殳山在桐鄉縣東南三十五里昔有道士殳基𨼆居學道尸解於此故名山有兩峯其東峯號史山宋張堯同詩丹竈功成後寥寥掩石扉但聞蟬已蛻不見鶴來歸談家嶺在海鹽縣西南四十二里與杭州海寜縣分境走馬岡在崇徳縣東北四十九里永新鄉其地有官窑相傳正吳越分疆之地今有走馬岡及洗馬池穿山洞在長牆山下臨海有石岩如洞海在海鹽縣東二里舊去縣五里有岡一十八為海潮之限漂蕩日久遂不復存自元以來為石塘南北計四千八百丈本朝歳加修築海岸與寜波紹興二府相對深夜籟寂時雞犬之聲相聞天星湖在府治東北一名天心湖中水草不生其水雖大旱不竭舊傳秦始皇發囚所掘張堯同詩拍岸浮春淥菰蒲四逺生網羅人不到魚鳥亦忘情滮湖在府城東南二里一名馬塲湖宋張堯同詩有四境田相接烟瀾自𣺌瀰之句鴛鴦湖在府城南三里一名南湖湖中多鴛鴦或云以其東西兩湖相接如鴛鴦故名宋從事郎聞人滋當為南湖草堂記云檇李澤國也東南皆陂湖而南湖尤大稽其故履當有百二十頃相湖在府城東北九里昔有相姓者居此湖之濱故俗名相家湖鶴湖在嘉善縣西北三十里其中多蓴菜蘆葦風景幽勝或云舊嘗產鶴故名分湖在嘉善縣西北三十六里其半為吳江縣地故名其中產巨蟹風味殊絶天僊湖在海鹽縣西九里與賁横諸湖相通賁湖在海鹽縣西三十里一名宋坡湖周圍四十餘里南與黄道彭墩二湖相通横湖在海鹽縣西三十五里周圍六里鸕鷀湖在海鹽縣西南四十里周圍四十餘里永安湖在海鹽縣南四十五里溉田甚廣湖中之税均於田上是以税頗重而無旱患久雨水瀰漫則東南入於海上谷湖在海鹽縣西六十里水通賁横等湖當湖在平湖縣治東周圍四十餘里吳地志王莽改海鹽縣為展武縣後陷為湖亢旱水涸髣髴見其街陌遺迹舊有白沃史君廟相傳陷為湖時史君乘馬走不及將鞭圍得湖東北角一片遂不沒後立廟焉東泖在平湖縣東北三十里相接松江界運河在府城西舊志隋大業中開江南河自京口至餘杭八百餘里擬通龍舟唐白居易詩平湖七百里沃壤兩三州謂此穆溪在府城東北四里水接上谷湖入太湖水中多龍骨張堯同詩靜練明田外源流笠澤通不因逢歳旱誰識濟時功芝溪在府城西北五里韭溪在府城内即南湖之支流經城而達北運河者是也舊志在府城南八里按川瀆記云太湖東通嘉興韭溪水今按運河西北接太湖則當云東南通韭溪為是雙溪在府城東一十里舟之達於松江者皆由此溪有橋跨於溪上名曰雙溪橋錢溪在府城西北二十五里相傳舊有富室錢氏居其上因名麻溪在府城西北三十里水通太湖清溪在平湖縣東南一十四里茜溪在嘉善縣北一十二里舊傳其地嘗出茜草故名秦溪在海鹽縣西南三十六里水通豐山港接運河法喜寺舊有石碑刻秦溪二字語溪在崇徳縣東南一名語兒中涇又名沙渚塘在吳越時為吳栖兵之地車溪在崇徳縣東北三十六里南北相距二十餘里流入太湖白龍潭在府城西南四里有白龍穴此風濤間作輒飄溺舟楫居人作三塔以鎮之宋淳熙初歳大旱知縣李時習用攪龍法求之雨即應傍有景徳寺張堯同詩呼吸風雲合飛潛自有時只愁潭水淺頭角被人窺螺潭在府城南五里相傳舊有白色細螺生其中故名潭之西有廟九斤潭在府城東北思賢郷南接天荒許家二蕩横浦在海鹽縣東二里東北通故邑西通賁湖南入于海藍田浦在海鹽縣南三里浦上有藍田廟宋咸平中知縣魯宗道重間以通海潮入運河又名魯公浦乍浦在海鹽縣東北三十五里其水舊自官河入於海元至正間畨舶皆萃於此本朝洪武中築城浦上以備禦焉澉浦在海鹽縣南三十六里水經云谷水於縣出為澉浦以通巨海晉光熙初嘗有三毛人集於此蓋泛於風也元至元間宣慰楊耐翁居此搆屋招集海商居民質易遂成聚落洪武中亦築城浦上蘆瀝浦在海鹽縣東北七十里宋元祐中提刑羅適於此浦掘得古尼寺碑移置松江白牛寺今浦有鹽塲天荒蕩在府城東北思賢鄉南接許家西接毛頭菜花等蕩