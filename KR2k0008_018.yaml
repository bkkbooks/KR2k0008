王而都之宋蘇軾詩注徐州郡治有㕔事俗謂霸王㕔相傳不可坐軾在郡拆之以蓋黃樓漢髙祖宅在豐縣中陽坊龔勝故里勝居彭城亷里後世刻石表其里門雍門在州城東南五十里即雍門周善彈琴能使孟嘗君悲者樊巷即漢樊噲所居有古碑今斷裂枌榆社在豐縣漢髙祖時鄉社名縣西二十里有枌榆亭相傳髙祖斬白蛇聚衆徙於此亭息之馬惟固在豐縣治東北俗傳髙祖幼所從讀書馬惟先生是也後葬於此朱陳村在豐縣東南一百里宋蘇軾詩何年顧陸丹青手畫作朱陳嫁娶圖聞道一村惟兩姓不將門户買崔盧雙石人在州界上蘇軾寄弟轍詩道邉雙石人幾見太守發有如當解笑拊掌冠纓絶落馬碑在豐縣俗傳髙祖幼指此為秦始皇落馬之地後人為立碑古墓銘在徐州髙流之為刺史時河決水絶城破一古墓銘曰死後三百年背底生流泉賴有髙流之還吾上髙原流之為造棺槨改葬焉英州治在蕭縣西北五十里有四門中多水俗呼曰雁門泊名宦周黔夫戰國時齊威王與魏惠王㑹田於郊魏王問齊有寶乎威王曰吾有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七十餘家漢楊統建初中為彭城令嵗大旱統推隂陽消伏縣界蒙澤太守使統為郡求雨雨即大降自是朝廷灾異多訪之楊秉徐州刺史有能名以亷潔為朝廷所知牟融永平間為豐令視事三月獄無滯訟為諸郡最王尊成帝時為徐州刺史潔己砥節政聲大振欒巴以光祿大夫與杜喬等八使循行州郡觀風俗巴使徐州所按察無寃濫陶謙徐州刺史時天下兵起貢賦罕至京師獨謙遣使奉貢升本州牧謂别駕糜竺曰非劉備不能安此州謙卒竺率州人迎備三國袁渙魏沛郡都尉募民屯田樂之者不强百姓大恱遷梁相為政崇教訓以病去官百姓思之司馬芝魏沛郡太守有政績鄭渾魏沛郡太守郡界下濕水潦百姓飢乏渾躬率吏民於蕭相二縣界興陂開稻田比年大收頃畝嵗增租入倍常民賴其利號曰鄭陂石苞徐州刺史魏司馬昭戰於東關苞全軍而退昭指所持節謂苞曰恨不以此授卿以䆒大事晉王祥徐州别駕政化大行時人歌之曰海沂之康實賴王祥邦國不空别駕之功南北朝王懿宋時三為徐州刺史威德甚著劉懷慎宋徐州刺史政尚嚴猛境內震肅垣護之宋徐州刺史有善聲郡界寧謐張暢宋武陵王駿長史守彭城魏兵至駿欲南奔暢曰恐一動足百姓逃散是捨萬安之術就危亡之地也駿悟曰長史之言不可易也果獲全房謨梁徐州刺史始在兖州彭城慕其政化及涖此州合境歡恱美政如在瑕丘隋房兆徐州總管剛毅有武略著禦武之功盧昌衡開皇初徐州總管長史甚有能名吏部尚書蘇威考之曰德為人表行為士則劉髙蕭縣令有惠政大業之末長吏多贓汚髙清節逾厲風教大洽獄無繫囚為吏民所稱唐姚崇徐州刺史為政簡靜州人為立德政碑張建封貞元中以徐濠泗節度使鎮徐州凡十年為政寬厚有紀綱下皆畏恱許孟容韓愈皆在幕府時稱為得人子惜亦為徐州刺史其政稱治韓愈徐州推官操行堅貞鯁直無忌溫庭皓徐州觀察使龎勛反以刃脅之使為表求節鉞不從後遇害宋呂公綽以翰林侍讀學士知徐州有惠政梁鼎淳化中知徐州居官有介節名稱甚茂孔道輔知徐州剛直聞於時孫沔知徐州時京東多盜沔明購賞嚴誅罰盜為衰止王洙知徐州時京東饑朝廷議塞商胡賦梃薪輸半而罷塞洙命更其餘為穀粟誇願輸者以餔流民因募其壯者為兵得千餘人政最為京東第一曽肇知徐州仁厚謙和至於親故犯法未嘗寬宥公餘著書不輟蘇軾知徐州時河決曹村水滙州城下富民爭出避軾使復入躬率兵夫築長堤首起戲馬臺尾屬於城雨日夜不止河勢益暴軾宿於城上使官吏分堵而守卒全其城次年復增築故城民至今德之徐起知徐州前為轉運使募富室得米十七萬斛振餓殍又移粟以瞻河北西京者凡三百萬杜純知徐州作明善堂自為記講明義理以淑人心孫覺知徐州有善政嘗捕盜得殺人者五其一可疑覺訊之果非盜遂釋之傅堯俞知徐州前政嘗侵用公使庫錢堯俞代償之未足罷去後守反移文迫償堯俞竟不辨復假貸償之其容物如此王復知徐州金人圍城復率軍民力戰及城陷堅坐㕔事慢罵求死由是盡室遇害其帳下趙立已奪門出又潜入求復尸親為掩藏時教授鄭褒巡檢楊彭年亦罵敵而死元馬圭至元中沛縣尹為政循良頗有古風民思之不忘為立去思碑傅若金蕭縣尹文章政事卓異於人郭宣豐縣尹建廨宇興學舍不動聲色而民德之趙野大德初沛縣尹勸農興學政平訟理人多稱之有去思碑本朝文景宗丙午年知徐州時天下初定民多流離景宗招徠勸課民皆安業性亷潔善因事成功如州治儒學壇壝城隍廟皆其所建云劉秩洪武初徐州同知文學政事咸過於人與知州文景宗協力為政後升崇明知州民為立生祠齊福東洪武間為蕭縣丞心公政平民安吏服不以一毫私於已蕭人至今稱之楊節洪武末徐州知州為政以厚風俗為務州大疫遣醫四出治療躬自督視又捐俸以給病之貧者喜奬拔士類所薦士後皆知名顔瓌洪武末知沛縣靖難兵壓境瓌父子同日死節邑人斂葬之畿志郝玘永樂中為蕭縣典史以亷能升知縣歷邯鄲碭山二邑勸農興學以致著民富士成後以父老陳情復知蕭縣惠政尤楊祕宣德初知徐州有惠政得民心郡中公署廟學悉為改置後在治九年當代屬邑列狀保留升府同知俾復任前十八年民至今思之畿志杜釗正統間知碭山縣興學愛民秩滿當遷因民乞留以課最增秩還官畿志宋誠景泰中知徐州器宇才能逈出人表吏民畏服畿志馬時中成化間知沛縣持守亷介為政尚簡因忤權宦謫去民甚悼之畿志和鸞成化間知徐州性鯁介以亷靜自持以儉約臨民不阿上不虐下在治八載深得民心畿志陳嵩成化間任豐縣訓導老成莊重嚴毅剛正士類欽服畿志胡希顔𢎞治中碭山縣剛明果斷百廢具舉擢監察御史畿志人物漢蕭何沛之豐人初為沛主吏掾髙祖為亭長何常左右之及從入關獨先收秦律令圖書藏之漢楚爭雄何常守關中轉給餽餉軍中無乏天下既定以功第一封鄼侯為開國名相卒諡文終曹參沛人秦時治獄掾佐髙祖定天下戰功居多封平陽侯代何為丞相一遵何約束當時有載其清靜民以寧一之歌卒諡懿王陵沛人始為縣豪髙祖微時兄事之及髙祖起沛陵以兵屬焉天下既定封安國侯髙后立諸吕為王陵為相爭之力遂以病免周緤沛人以舍人從髙祖起沛至灞上西入蜀還定三秦常為參乘戰有利不利終無離上心封信武侯盧綰豐人與髙祖同里同日生里中交以羊酒賀及壯學書又相愛髙祖起沛綰以客從入漢為將軍擊破臧茶乃立為燕王樊噲沛人以屠狗為事從髙祖起豐及與項羽㑹鴻門賴噲奔入營誚讓羽不然事幾殆自是從入漢中定三秦天下既定封舞陽侯申屠嘉梁人以材官蹶張從髙祖擊項羽纍官都尉歷淮陽守文帝時遷御史大夫拜承相封故安侯嘉為人亷直不受私謁鄧通以幸臣戲殿上嘉欲斬之赦至乃免夏侯嬰沛人為沛廄司御以太僕從髙祖入蜀定三秦又從擊項羽及髙祖受圍平城既開一角出嬰徐行持滿外向卒得脫後事文帝封東平侯周昌沛人兄苛仕為御史大夫守榮陽項羽破之烹苛髙祖拜昌為御史大夫從破項羽有功封汾隂侯昌强力敢直言髙祖欲易太子昌力爭不奉詔為趙王如意相王死因謝病去周勃沛人以材官引强從髙祖戰功居多髙后崩與丞相陳平議誅諸吕迎代王即位是為文帝勃為丞相後以絳侯就國卒諡武侯周亞夫勃次子仕為河內守封條侯武帝六年胸奴大入邊以為將軍屯細㧕帝自勞軍有真將軍之歎景帝時吳楚反以亞夫為太尉擊平之後拜丞相韋孟彭城人為楚元王傅元王子孫荒淫不遵道孟作詩風諫後遂去位徙家於鄒自孟至賢五世為鄒魯大儒丁寬梁人初梁項生從田何受易時寬為項生從者讀易精敏遂事何學學成東歸何謂門人日易已東矣景帝朝寬為梁孝王將軍作易說三萬言後寬授同郡田王孫施讐沛人初從碭人田王孫受易後為博士甘露中與諸儒雜論五經同異於石渠閣讐授張禹禹授彭宣由是施家有張彭之學髙相沛人治易亡章句專說隂陽災異其學自言出於丁將軍龔勝彭城人三舉孝亷哀帝徴為諫大夫王莽秉政歸老鄉里莽遣使奉印綬安車駟馬徴之拜秩上卿勝謂門人髙暉等曰誼豈以一身事二姓不食死龔舍武原人通五經以魯詩教授與孔休卓茂等同志不仕初以龔勝薦徴為諫大夫復拜光祿大夫終不起舍與勝並著名節世謂之楚兩龔朱浮沛國蕭縣人從光武初拜幽州牧後征討有功代賈復為執金吾纍遷大司空劉平彭城人常為菑丘長政化大行更始時與母俱避亂澤中平出求食逢賊將烹之平乞歸食母畢就烹既而如期往賊義之得全後為全椒長纍官至宗正劉矩沛國蕭縣少有髙節舉孝亷為雍丘令纍遷尚書令性亮直不附貴勢延禧中為太尉與黃瓊和皓同心輔政時號賢相姜肱彭城廣戚人與二弟俱以孝友聞兄弟常共臥起肱後與徐稚俱徴不至桓帝使畫工圖其形狀肱以疾不出見後徴肱為太守肱遂遁於海濵三國劉馥沛人漢建安中歸曹操表為揚州刺史恩化大行百姓樂政流民越江山而歸者以萬數於是立學校廣屯田為戰守備及卒士民追思之子靖立廬江守河南尹為政有父風卒諡曰景張昭彭城人少好學通左氏春秋漢末大亂臨昭渡江孫䇿命為長史撫軍中郎將䇿亡以弟權託昭權為吳王敬禮彌重輔吳將軍封婁侯昭容貌矜嚴有威風自權以下皆憚之卒諡曰文嚴畯彭城人少耽學性尤純直避亂江東張昭薦之孫權以為騎都尉及魯肅卒權令代鎮陸口畯固辭後為衛尉使蜀蜀相諸葛亮善之著孝經潮水論樓𤣥沛人事吳主孫皓從九卿侍衛正身率衆奉法而行應對切直數忤皓意後人誣𤣥謗訕政事命送廣州華核言𤣥清忠奉公冠冕當世乞赦前愆責其後效皓疾𤣥聲名徙交址殺之晉劉伶沛國人容貌甚陋放情肆志常以細宇宙齊萬物為心不妄交游與阮籍嵇康相遇欣然神解性尤嗜酒嘗著酒德頌劉𢎞沛人有幹略政事之才與武帝少共研席以舊恩起家纍官鎮南大將軍都督荆州諸軍事𢎞每有興廢手書守相丁寧欵密人皆感恱咸曰得劉公一紙書賢於十部從事劉訥彭城人有人倫識鑒初入洛見諸名士歎曰王夷甫太鮮明樂彥輔我所敬張茂先我所不解周𢎞武巧於用短杜方叔拙於用長訥官至司𨽻校尉劉隗訥之姪少有文翰避亂渡江元帝以為從事中郎及王敦作亂隗都督青齊入見與刁協奏誅王氏帝不從遂奔石勒孫波初仕石季龍及李龍死遂南歸穆帝以為襄城太守纍遷散騎常侍劉疇訥之子善談名理永嘉中位至司徒左長史為閻鼎所害其後王導拜司徒歎曰劉君若過江我不獨拜公也其為人所推服如此劉牢之彭城人靣紫赤色鬚目驚人而沈毅多計畫太元初謝𤣥鎮廣陵以牢之為參軍領精鋭為前鋒百戰百勝號北府兵敵人畏之南北朝劉敬宣牢之子八嵗喪母悲泣不自勝或謂牢之曰此兒非惟家之孝子必為國之忠臣也仕宋官至右軍將軍後遇害劉芳彭城人處窮窘而業尚專固聰敏過人篤志墳典晝則傭書以自給夜則窮經不寢著窮通論以自慰仕魏纍遷中書令所撰𫐠凡十有六書劉粹沛郡蕭人奉宋文帝鎮京口盡心於國封灄縣男為雍州刺史加都督其宗人有劉伯龍者歷位少府武陵太守而家貧窶甚忽見一鬼在傍撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑也遂止劉孝孫彭城人博學通敏仕多不遂常歎曰古人或開一說而致卿相立談問而降白璧書籍妄耳劉勔彭城人宋初為廣州增城令纍遷鎮軍將軍死於難子悛愃繪孝綽潛並登顯位于時孝綽兄弟及羣從子姪凡七十人並能屬文近古未之有也朱齡石沛人世為將相齡石不事崖險從宋武帝平賊有功為鎮軍將軍伐蜀有功封豐城侯弟超石亦果鋭纍官中書侍郎封興平侯到彥之彭城人仕宋以戰功進爵為侯佐守荆楚垂二十年威信為士庶所懷孫沿溉洽俱知名溉官至吏部尚書劉璠沛人九嵗而孤好讀書兼善文筆仕梁為黃門侍郎家居作雪賦以諭志所著有梁三十卷子祥十嵗屬文十二通五經纍官車駕大將軍隋劉行本沛人性剛有不可奪之志徴拜諫議大夫檢校治書侍御史髙祖嘗笞一郎於殿前以行本諫而止後領大興令權貴憚其方直無敢至其門者劉士雋彭城人性至孝丁母喪廬於墓側負土成墳虎狼馴擾為之取食文帝特詔旌表其門劉子翊彭城人性剛謇有吏幹仁壽中為新豐令有能名大業中為治書侍御史從幸江都以切諫忤㫖為丹陽留守煬帝遇弒羣賊執子翊至臨川城下使告城中云帝已崩子翊反其言遂見害唐劉德威彭城人姿貌魁秀有幹略貞觀初歷大理卿太宗問比刑網太密其咎安在德威曰在君不在臣下之寬猛視主之好惡帝深然之官至刑部尚書劉延祐彭城人舉進士補渭南尉吏治第一李績戒之曰子年少而有美名宜少自抑無為出人上官至并州刺史安南都護劉藏器延祐從弟髙祖時為侍御史衛尉卿尉遲寶琳脅人為妾藏器劾還之寶琳私請帝止其還藏器曰法為天下懸衡天下用舍由情法何所施乃詔可後出為宋州司馬劉知幾藏器子博覽羣書善文辭舉進士纍遷鳯閣舍人修國史著史通內外四十九篇徐堅歎曰為史氏者宜置此座右也開元初遷左散騎常侍兄知柔纍官太子賔客封彭城侯卒諡曰文五代劉仁贍彭城人南唐時清淮節度鎮壽州周師圍城仁贍堅守不下副使孫羽詐以城降仁贍死之世宗遂徙城下蔡而復其軍曰吾以旌仁贍之節也宋劉濤彭城人後唐舉進士為左輔闕纍官少詹事宋太祖即位素知濤履行召至闕下以老疾求退授祕書監致仕子頊監察御史頊子晟晟子訥談並進士及第郭廷謂彭城人幼好學工書善騎射性恭謹事母以孝聞南唐時補殿前承㫖歷濠州監軍宋初知亳州馮瓚知梓州為僕夫所訟召為靜江軍節度觀察留後以代之悉除弊政兄廷諭南唐太子洗馬子延澤右屯衛大將軍王漢忠彭城人少豪蕩有膂力太宗時為殿前指揮使纍遷侍衛馬軍都指揮使契丹掠中山往禦之追殺甚衆漢忠有識略輕財樂施崇儒好文名稱甚茂卒贈太尉鼂迥本澶之清豐人父儉始徙家彭門迥少有學行真宗時纍官翰林學士承㫖又為工部尚書集賢院學士後以太子少傳致仕作書命楊億稱其得代言之體子宗慤知制誥亦入翰林為學士官至參知政事劉顔彭城人好古學不專章句舉進士知龍興縣免官家居以著書自適學者常數十百人所著有儒術通要經濟樞言石介見其書歎曰恨不在弟子之列劉庠顔之子八嵗能詩蔡齊妻以子第進士遷太常博士英宗時以灾異求直言庠上書論時事除監察御史裏行後以樞密直學士知渭州庠有吏能奄通歷代史王安石稱其博李若谷豐縣人少孤遊洛下因葬其考妣於緱氏而占籍焉舉進士纍官至參知政事卒諡康靖子淑賜童子出身纍官翰林學士孫夀朋復圭皆仕于時陳師道徐州彭城人少刻苦問學髙介有節安貧樂道諸經皆有訓傳於詩禮尤邃具為文師曽鞏為詩宗黃庭堅平淡雅奧自成一家元祐中蘇軾輩薦其文行除本州教授纍遷祕書省正字劉湜彭城人舉進士厯開封府推官遷殿中侍御史纍遷龍圖直學士知慶州改知密州居官著能聲鄭僅彭城人第進士為大名府司户參軍歷知冠福昌所至有善政盜賊相戒不人境纍官吏部侍郎知徐州遷至顯謨閣直學士卒諡修敏子望之少有文名官至戶部侍郎徽猷閣直學士趙立徐州人以戰功補官王復守徐州金兵陷城復死立權知州事金人圍楚州急宣撫杜充命立往援連七戰而勝纍遷鎮撫使知楚州誓衆力守忽飛炮中其首而死事聞諡忠烈宋汝為豐縣人建炎中陳邉事假開州刺史使金兼致書劉豫豫誘以官固辭以機密歸報朝廷後亡歸獻恢復方略又上丞相書極言用兵之要秦檜欲械送金人乃變姓名入蜀所著有忠嘉集顔太初彭城人顔子四十七世孫少博學有雋才慷慨好義為詩多譏切時事孔聖祐卒罷襲封太初作詩以諷在位遂以聖祐弟襲封文宣公後中進士纍官國子監說書所著有洙南子鳬繹集及淳矅聯英子復為奉議郎金曹圭徐州人大定中州人江志作亂圭子弼在賊黨中圭謀誅志并弼殺之全主詔云圭赤心為國大義滅親特進三官於正班用之朱存器徐州人後徙寶坻歷官至修內司使嘗夜行盧溝橋獲金一囊坐而待其主以付之其人請中分存器笑而遣之子國寶從元世祖攻鄂纍功官至宣慰司都元帥元曹伯啓碭山人弱冠從東平李謙遊篤於問學纍官集賢學士侍御史泰定初致仕伯啓性莊肅奉身清約在中臺所奬借名士甚多所著有詩文十卷漢泉漫槀三卷六子十孫皆顯仕楊惟良蕭縣人官至中奉大夫甘肅行省參政封𢎞農郡侯曹甫碭山人博學能文纍遷陜西諸道行臺御史中丞卒贈體忠守憲功臣行省左丞魯郡公諡文貞成克敬碭山人淳朴務實由歸德軍判官轉國子監典籍卒贈朝列大夫祕書少監追封上谷郡伯袁遵道豐縣人性穎悟年十六能誦五經纍官翰林直學士致仕以子貴贈中書參知政事追封汝南郡公諡文靖石普徐州人至正中進士授國史院編修官後以軍功升樞密院都事時張士誠據髙郵普請先驅為天下忠義倡乃趨髙郵勒兵血戰左脅為賊鎗所中猶手握其鎗砍賊死賊衆攢鎗以刺普力戰死之許義夫碭山人為夏邑縣尹每親詣鄉社教民稼穡見民勤者賞之惰者罰之境內豐足後為豐丘尹值羣盜劫掠州縣義夫單騎出郊力言豐丘邑小民已驚竄幸無入吾境民獲免於難郭通徐州人少以孝稱父柩在殯鄰火延及通舍通仰天訴曰柩不能移寧與柩俱焚死伏柩慟哭火遂熄徹里徐州人曽祖太赤從太祖定中原為馬步軍都元帥徹里幼孤母教以書至元中世祖召見應對詳雅悅之嘗奉使江南省風俗訪遺逸官至中書平章政事卒追封徐國公本朝髙巽志蕭縣人博學能文元末為鄮山書院山長國初徴修元史入翰林為編修纍遷侍講學士朱守仁徐州人有大志好讀書元末兵起為樞密同知守舒城洪武初纍遷工部尚書轉北平行省參政以饋餉不繼謫蒼梧知縣歷知二州以治最升四川布政使未幾召拜太僕寺卿眷賚有加尋致仕守仁朴茂無華始終一誠故見重焉孟驥蕭縣人洪武初以才能舉纍官禮部郎中治績書最升河南左參政益練達政務遷四川左布政使任滿夷民不釋復增秩留之後致仕黃正碭山人氣質剛方言語必信居家以孝聞洪武中為邑吏以直言徴奏對稱㫖擢右僉都御史彈劾不避權要後忤㫖黜為廬州英山縣吏及平金山叛冦復升左僉都御史未幾命討雲南叛夷降服而還至普安遇賊中傷任肅徐州人洪武中鄉貢擢工部主事尋升郎中以營繕宫殿成遷南昌府府政績卓異秩滿轉雲南左參政致仕山青徐州人涉古今知大義沈毅有勇略為燕山護衛百户永樂初以靖難功纍官右軍都督僉事馬榮徐州人少習武事有膽略洪武末從靖內難永樂初從征北虜纍功至右都督追封景城伯諡壯武劉泰徐州人少穎悟好學洪武中鄉舉授陵川訓導尋以渡淮功升授百户永樂初仍改文職授建寧府通判進升禮部員外郎與修永樂大典成賞賫有加尋致仕權謹徐州人十歲喪父哀毁幾絶洪武中以薦知樂安縣升光祿署丞迎母就飬母疾籲天求以身代母年九十卒躬負土成墳廬墓三年哭泣不輟事聞召拜文華殿大學士辭不稱朝廷不允欲以風勵天下之為人子者尋改通政司右參議致仕仍旌其門曰孝行王弼徐州人永樂中歷官良鄉地當要衝事極繁夥弼處之皆得其宜踰七旬當代去民懇留之益勤政不怠嵗大旱躬禱即得雨有蝗入境復自祈之為羣鳥食盡民皆歡戴以為至誠所感尋遷户部主事張宏碭山人天性孝友勤於問學永樂中授開封府同知轉户部郎中律己亷潔苞苴未嘗一至其門出知荆州府政務既舉所守益勵門絶私謁人號閉門張陳敬碭山人有武略永樂中以戰功纍官中軍都督府都督僉事鎮守山海永平兵民懷服甄實沛縣人永樂初鄉貢歷官湖州府同知秩滿以績最升太僕寺少卿益著勤能尋遷四川左布政使致仕山雲徐州人以都督鎮守廣西討溪峒諸蠻在鎮十年威惠並行卒贈懷逺伯諡襄毅畿志列女劉氏後魏彭城人嫁渤海封車初成婚時卓官京師後坐事伏法劉氏在家忽夢想知卓已死哀泣嫂諭之不止經旬凶問果至遂憤而死時人比之秦嘉妻高允為詩八章以表之王孝女唐徐州人元和中父兄皆防秋屯涇州吐蕃冦邉並戰死孝女時年十七却食跣足縗裳扺涇日丏貸護二喪還葬于鄉植松柏剪髮壞容廬墓所節度使王智興白狀詔旌其門謝氏徐州人假二妻元末兵亂舅姑夫俱亡乃依父家守志年八十卒洪武二十五年旌表畿志白氏沛人李伯奴妻夫死于邉白年二十粗衣糲食寡居四十餘年宣德間旌表畿志薛氏徐州王五妻年十八而夫亡子甫周誓不再適以節行稱正統十八年旌表畿志孟氏徐州人居浣妻年二十餘夫臥病久孟許與同死夫果弗起孟視殮畢從容自縊死畿志李剛妻魏氏徐州人學正魏黌女年二十餘夫亡無子誓死不嫁晝夜惟與夫靈座相對所居一室蕭然不蔽風雨門扉常掩惟取薪水出入始啓之人不堪其憂魏處之晏如紡績自給垂四十年仙釋王𤣥甫沛人學道於赤城霍山服青精石飯吞日精丹景之法內見五臟晉穆帝永和元年正月十五日玉帝遣羽車迎之𤣥甫乘雲駕龍白日升天為中嶽真人彭宗彭城人年二十服業於杜冲乃棲真味道精貫人神嘗從師採藥忽墮深谷又被蛇中曽無愠色冲乃授丹經五千文宗寶而修之洞暢幽漠能三晝夜為一息或一年不動人以為死及起顔色愈鮮山中毒蛇猛虎見之潜伏後為太清真人洞真子元涿州人姓立壯年學道嘗遊碭山縣創建聚仙宫北遊京師賜號寶巖大師道侣共號洞真子延祐中邀里中故舊㑹茶訖託以他往告別次旦人見其向西去其弟子闢戶視之已羽化矣參寥子宋僧道全也與蘇軾最密嘗遊於徐陳師道相與論詩深偉之序以送别其略曰釋門之表士林之秀而詩苑之英也明一統志卷十八
