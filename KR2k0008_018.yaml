body:
  text: 明一統志卷十八明李賢等撰滁州東至應天府六合縣界七十里西至鳯陽府定逺縣界七十里南至和州界七十里北至泗州盱眙縣界一百三十里自州治至南京一百二十里至京師三千二百五里糧二千一百石零建置沿革禹貢揚州之域天文斗分野春秋時為吳楚之交戰國屬楚秦為九江郡地漢初屬淮南國元狩初復屬九江郡三國為魏地晉屬淮南郡東晉於此僑置南譙郡宋置新昌郡梁置南譙州北齊徙南譙州於新昌郡又改北譙州為臨滁郡隋初置新昌郡改南譙州為滁州因滁水而名大業初州廢以其地屬江都郡唐初復置滁州天寶初改為永陽郡乾元初復為滁州五代時楊吳南唐有其地後入於周宋屬淮南東路元初為滁州路後復為州𨽻揚州路本朝初以清流全椒來安三縣併入州𨽻鳯陽府洪武十四年復置全椒來安為屬縣直𨽻京師編戶三十三里領縣二全椒縣在州城南五十里秦置屬九江郡漢因之晉屬淮南郡梁於此置北譙州改縣曰北譙北齊改北譙州為臨滁郡復周復改為北譙郡縣屬焉隋初郡廢改縣滁水大業初復為全椒縣屬江都郡唐屬滁州宋元仍舊本朝因之編戶一十二里來安縣在州城北三十五里本漢九江郡建陽縣地東漢以建陽省入全椒宋置新昌縣後改曰頓丘隋又改清流縣屬江都郡唐景龍中析清流置永陽縣屬滁州南唐改為來安縣宋紹興中廢為鎮後復置縣元仍舊本朝因之編戶七里郡名滁陽在滁水之陽故名南譙東晉名永陽唐名形勝環滁皆山宋歐陽修醉翁亭記山髙水清歐陽修豐樂亭記淮北勝地宋吕元中紫微泉記清淮灌其北烏江蕩其南宋林希逸白鶴觀記形勢深秀慶厯前集跋羣峯環於西南清溪注於東北形勢深秀實甲淮海風俗民安畎畝歐陽修豐樂亭記滁介於江淮之間舟車商賈四方賔客之所不至民生不見外事而安於畎畝地僻訟簡其俗安閒宋章衡重修醉翁亭記淳厚尚氣吕元中紫微泉記滁人雖風俗淳厚而尚氣易以德化難以力服習尚勤儉郡志山川琅琊山在州城南一十里晉琅琊王嘗駐此因名其山谷深七八里自城南行六七里至溪溪之源出兩山間為釀泉唐顧況詩東晉王家在此溪南山樹色隔忩低碑沉字滅昔人逺谷鳥猶向寒花啼豐山在州城西南五里世傳沛豐人嘗居之故名其山盤亘雄偉出琅琊諸峰上天欲雨常有雲氣發山椒若巾帽然諺曰豐山著帽豐年之兆其下有幽谷地形低窪四面皆山歐陽修詩滁南幽谷抱千峰桞庭俊詩滁陽山水佳幽谷尤勝絶跑龍蟠山在州城南一十三里上有虎卧泉桃花澗偃月洞洞側皆峭壁前賢題詠多刻其上孤山在州城西北二十里四面無山巋然獨立因名石屏山在州城外宋梅堯臣詩尋常畫屏多畫山何意此山還作屏峭排直下幾千尺下有石路莓苔青石駝山在州城西北二十二里上有龍王祠遇旱禱雨有應牛頭山在州城西四十里兩峰峻起形如牛頭石屋山在州城西四十八里牛頭山北上有石屋後有龍竇洞曲亭山在州城西六十里俗呼皇甫山南唐皇甫暉與周兵戰嘗屯兵於此皇道山在州城東北一十七里世傳秦始皇途經是山因名下有秦皇塘黑龍山在全椒縣西南山顛舊有黑龍寺下瞰井邑一覽畢見南岡山在全椒縣南二里山勢自西而南連亘數十里至此益髙峻環繞縣治為一縣形勝武山在全椒縣東北一十里上有梁王城車蓋山在全椒縣西北一十五里形如車蓋花山在全椒縣西北二十二里攢峰叠嶂如花瓣然九鬬山在全椒縣東南二十五里一名隂陵山昔項羽兵敗欲東渡烏江道經此山興漢兵一日九戰故名山石有磨礪刀鏃迹神山在全椒縣西三十里有洞極深景物幽邃唐韋應物寄全椒山中道士詩落葉滿空山何處尋行迹即此桑根山在全椒縣西北四十里梁南譙州故城在其西龍檜山在全椒縣西北五十里其山舊有檜如龍形馬鞍山在全椒縣西北五十里山有人跡入石寸許又有拄杖跡入石二寸其北有仙人洞洞口廣尺許深不可測俗傳昔有人仙去遺馬鞍於此卧龍山在全椒縣西北五十里其上舊有卧龍菴北獨山在全椒縣西六十里崒然特起不與衆山相接上有漢髙祖廟及古塔銅井山在全椒縣西七十里一名銅官上有銅井舊嘗出銅菩薩山在全椒縣西北七十里舊傳嘗取此山之石為佛像因名黃山在全椒縣西北七十里上有二石碑八石山在來安縣西南一十三里即淮南八公憩石之處烏龍山在來安縣南一十八里上有烏龍王廟祈雨多應西龍山在來安縣東二十里與六合界東龍山對峙勢頗髙峻上有龍王廟五湖山在來安縣東北一十八里下有五湖因名山在縣境最為險要控扼南北一名白禪山蓋山北屬白禪村故也三山在來安縣東二十里與天長縣接境山有三峰排列練寺山在來安縣西北二十里山側有寺其東有地名浮林上有浮石髙百餘丈伏牛山在來安縣北三十里形似伏牛卧羊山在來安縣北三十五里形似卧羊尖山在來安縣北三十五里其山特出下臨大澗石固山在來安縣北三十五里羣山連亘惟此獨髙最為險峻宋紹興辛巳居民避兵其上壘石為城遺址尚存嘉山在來安縣西四十里上有龍王廟山之西北即盱眙縣境樊山在來安縣北六十里網鷹山在來安縣西北六十里馬頭山在來安縣北七十里俗傳有龍經過又石上有人馬足跡馬嶺山在來安縣北九十里來安水出其下歸雲洞在琅琊山梅堯臣詩雲收雨歇草樹濕澗下流水空潺潺試劔石在全椒縣西北一百里相傳秦王以此石試劔鄼湖在全椒縣西南三十里魏置鄼縣治于此滁河在州境內源出廬州過全椒縣與襄水合流至州東南三義河㑹清流水經六合縣逹于江清流河源出州西清流沛上繞州治而南入滁河龍尾河在來安縣東門外下流㑹來安水入水口河襄水在全椒縣界內源出石臼山北循縣治之後東南流入滁河來安水在來安縣境內源出盱眙縣界流至此又東南流入清流河石塘水在來安縣西北二十里琅琊溪在琅琊山源出兩峰之間歐陽修詩空山雪消溪水漲遊客渡溪橫古槎不知溪源來逺近但見流出山中花明月溪在琅琊山宋王禹稱詩惜哉幽勝事盡落唐賢手惟餘舊時月團團照山口菱溪在州城東一十里源出永陽嶺西經皇道山下歐陽修菱溪石記本名荇溪避楊行密嫌名故改曰菱西澗在州城西俗名烏土河唐韋應物詩獨憐幽草澗邉生上有黃鸝深樹鳴春潮帶雨晚來急野渡無人舟自橫銅井在全椒縣西北五十里廣採十餘丈深不可測舊于此銅有魚出其中其色如金琉璃井在來安縣治後井甃瑩徹色如琉璃庶子泉在琅琊山山以唐庶子李幼卿得名王禹稱詩乍挹清泚姿頗愜幽閒性味將春茗宜光與曉嵐映梅堯臣詩庶子去來多少年依舊清心共泉潔六一泉在醉翁亭側宋滁守歐陽修晚號六一居士故名舊名玻瓈泉章衡記傍有石泓泉湧而流甘如醍醐瑩如玻瓈紫微泉在琅琊山舊名幽谷歐陽修寄謝絳詩云滁陽幽谷抱山斜我鑿清泉子種花故事留傳父老說世人今作畫圖誇元祐間郡守陳知新名以紫微白龍泉在琅琊山嵗旱禱雨輒應真珠泉在州城西三十里幽棲菴前遊者撫掌則泉水濺射狀若跳珠統軍池在州治後宋淳化中孟元哲以龍武統軍知軍事鑿池於此故名迷溝在全椒縣西南二十里昔項羽戰敗失道田父紿之曰左左乃大澤即此溝也距隂陵五里王家衝塘在州之三才鄉長一百五十丈又有王家莊堰亦在此鄉長五里龍蟠塘在州之仁義鄉長四百丈又有于家塘亦在此鄉長三百丈新塘在州豐城鄉長二百丈柏子潭在州城西南三里潭西北隅水深莫測有龍出沒其中祈雨輒應土産巴㦸子白蘚皮女萎草決明虎杖貝母已上各縣並出長石黃精俱州境出鯽魚出城濠者甚大公署南京太僕寺在州城外西南三里洪武六年建滁州衛在州治東初為守禦千戶所洪武十八年改建為衛學校滁州學在州治東宋景祐間自舊子城南遷于此元大德中新之吳澄為記本朝洪武三年重建永樂初重修學士王逹記全椒縣學在縣治東宋崇寧間自縣南徙建于此本朝洪武十五年重建來安縣學在縣治東南隅宋崇寧初建本朝洪武十四年重建宫室宣化樓登豐樓俱在故臨滁郡治懷嵩樓在州治後即贊皇樓也唐元和中李德裕刺滁州建取懷歸嵩洛之意宋歐陽修詩解帶西風飄畫角倚欄斜日照青松常安民詩斜日西風總如昨風流只缺倚欄人凝香閣在州治取唐韋應物燕寢凝清香之句御書閣在琅琊山開化寺宋太平興國中賜額藏四朝御書希真堂宋會肇十詠詩序滁城多卉木希真堂左右前後列植尤衆四時花葉顔色可喜因物感興題為十詠思賢堂政樂堂瑞麥堂坐嘯堂紫芝堂俱在州治宋時建醉翁亭在琅琊山釀泉之上宋慶厯中僧智仙為郡守歐陽修建修自號醉翁因以名亭作醉翁亭記其文膾炙人口天下傳誦焉其略曰太守與客來飲于此飲少輒醉而年又最髙故自號曰醉翁也醉翁之意不在酒在乎山水之間也山水之樂得之心而寓之酒也豐樂亭在琅琊山幽谷歐陽修顧其景而樂之闢地為亭名曰豐樂自為之記其略曰修之來此樂其地僻而事簡又愛其俗之安聞既得斯泉於山谷之間日典滁人仰而望山俯而聽泉掇幽芳而䕃喬木風霜氷雪刻露清秀四時之景無不可愛又幸其民樂其嵗物之豐成而喜與豫遊也遂書以名其亭云醒心亭在豐樂亭東山上歐陽修建常安民詩為愛昌黎湖上句醉來直上醒心亭煩酲不待山風解臥讀殘碑已自醒會鞏作記有云凡公與州之賔客遊則必即醒心而望以見夫羣山之相環雲煙之相滋曠野之無窮草木衆而泉石嘉使目新乎其所覩耳新乎其所聞則其心灑然而醒更欲久而忘歸也故即其所以然而為名翠微亭在琅琊山宋朝端受詩曉風吹落秋泉聲夜雨洗出秋山色上有樓臺深翠微可惜丹青圖不得清風亭在琅琊山朝端受詩物外林泉靜聞中日月長清風颯然至可以傲羲皇無心亭在琅琊山朝端受詩地與市朝逺雲藏山水深長令有心者到此自無心班春亭在州境梅堯臣詩使君固自足風味時傍青山去問農茶仙亭在琅琊山宋紹聖中僧永起建取唐杜收誰知病太守猶得作茶仙之句以名曾肇詩山僧獨好事為我結茅茨茶仙榜亭中頗宗樊川詩漸入佳境亭在醉翁亭北宋宣和中郡守唐恪建名曰同醉嘉泰和林㟽改今名日觀亭望月亭俱在琅琊山洪武初宋濓遊琅琊記山中之亭幾二十所而日觀望月為尤勝望日臺在琅琊山王禹稱詩長安不可見但見金烏赤傾盡葵藿心庶免浮雲隔琴臺在琅琊溪傍唐刺史李幼卿建關梁清流關在州城西南二十里南唐置關地極險要其將皇甫暉與周師戰敗欲退保滁州尋被擒即此地也廣惠橋一名赤欄橋通濟橋以上二橋俱在州治東沙河上東河橋廣利橋俗名司徒橋以上二橋俱在州城西門外積玉橋在全椒縣東北下通舟楫一名石橋寶林橋在全椒縣西寶林寺之東觀風橋在來安縣東南二十五里仙人橋在來安縣北三十里濟川橋在州城西三十里烏衣橋在州城東南三十里以上二橋俱洪武中建寺觀琅琊寺在琅琊山舊名開化寺唐大厯中刺史李幼卿與僧法深建龍興寺在州城內唐時為興壽院周顯德中改今名寶林寺在全椒縣西二里宋崇寧中建本朝正統中修吉祥寺在來安縣治北宋紹興間建白鶴觀在全椒縣治西唐垂拱初建梓潼觀在州城內舊名文昌宫宋嘉定三年建真武觀在州城東門內宋咸淳中建本朝洪武永樂中俱重修祠廟李衛公廟在州治西南衛公唐滁州刺史李德裕也有德政後人立祠祀之五賢祠在琅琊山五賢宋守王禹稱歐陽修張方平曾肇蘇軾也柏子潭廟在豐山下柏子坑舊名㑹應祠宋乾德中知州髙保緒繪五龍像祀之嵗旱禱雨輒應本朝洪武中重建潭四周為欄起樓於其上有御製禱雨靈應碑記剛烈廟在州城北祀宋郡守劉位位招信人靖康初率衆勤王屢敗金人又破李成兵復滁州金遣使招之位斬其使未幾金兵奄至位出戰中流矢死詔贈建寧軍節度使建廟滁陽賜號剛烈豐山廟在豐山頂葛名表豐本朝洪武初改豐山之神嵗六月六日與柏子潭之神合祭滁陽王廟在龍興寺右洪武初建命有司嵗時致祭王姓郭諱子興定逺人有開國翊戴之功太常寺丞張來儀奉勑撰廟碑馬神廟在太僕寺西洪武中建春秋祀之陵墓髙辛冢在來安縣東南地名廣陽羔頡侯冢在州境漢髙祖微時過其丘嫂食嫂轑釡羔佯為羔盡後封其子信為羔頡侯此其冡也張太傅墓在州城西門外太傅宋參政張巖祖滁陽王墓在王廟後繚以周垣內樹松柏洪武九年詔設官戶看守樂韶鳯墓在全椒縣沿村河韶鳯歷尚書大學士以祭酒致仕有文學名古蹟建陽城在州城東四十里本漢邑東漢時省入全椒阜陵城在全椒縣東一十五里本漢縣屬九江郡後廢頓丘城在來安縣治東劉宋割秦郡頓丘以立新昌郡及縣又隋廢樂髙塘二縣入頓丘即此南譙城有二一在全椒縣北二里梁置南譙州於此又云在桑根山下一在州西南八十里北齊徙治於此隋初改為滁州大業初改為清流縣即此臨滁城在州城東五十五里梁置北譙郡北齊改臨滁郡治此俗呼為羅城北譙城在全椒縣西北二十里梁置郡治此後廢豐樂城在全椒縣西南七十里三隱在桑根山下舊志南隱中隱北隱三隱相去各十餘里皆古隱者所居有泉池石室其名氏時世莫考名宦漢馬成以功封全椒侯劉平全椒長政有恩惠百姓懷感獄人或增資就賦或减年從役無繫囚先有虎為害平至日虎皆南渡而去唐李幼卿大厯中自太子庶子出知滁州有善政暇遊琅琊山號景物為八絶滁人慕之韓思復滁州刺史每以惠利為心州有銅官人苦鏟鑿思復為賈他鄙費省獲多有黃芝五生州治民為刻石頌其祥韋應物滁州刺史性髙簡節食寡欲公餘焚香默坐雖工詩而事不廢李德裕滁州刺史有德政及民留意翰墨嘗作懷嵩樓於郡治自為文記之李紳滁州刺史時山谷多虎擷茶者苦之治機穽發民跡射不能止紳至盡去之虎不為暴五代趙普初仕周為滁州軍事判官宋太祖與語竒之時獲盜百餘當棄市普疑有無辜者請更訊之全活者甚衆竇儀宋太祖下滁州周世宗命儀籍其帑藏至數日太祖遣親吏取絹儀曰今既有籍即官物非詔㫖不可取後太祖每稱其有守宋王禹稱知滁州閩人鄭褒徒步來謁禹稱愛其文雅為買一馬或言其買馬虧價太宗曰彼嘗却李繼遷五十馬顧肯虧一馬價哉歐陽修知滁州為政以鎮靜為本明不及察寬不至縱吏民安之後為立祠趙槩知滁州山東賊李二過其境語人曰我東人也公嘗知青州民愛之如父母我不忍犯率衆而去張方平知滁州為政清肅姚仲孫通判滁州嵗旱饑有詔發官粟賑民而主吏不時給仲孫至立劾主吏夜索丁籍盡給之曽肇知滁州有政績文章行義推重于時梅執禮知滁州時賦鹽虧額滁亦苦抑配執禮曰郡不能當蘇杭一邑而食鹽乃倍粟數民何以堪請於朝詔損二十萬滁人無不德之常安民以御史論章惇曾布謫監滁州鹽酒稅日親細務郡守曽肇約為山林之游曰謫官例不治事安民謝曰食焉而怠其事不可人推重之魏安行知滁州開墾田土增舊數倍滁人賴之嶽諒臣知滁州聞鄉村有周智張九作黨食人捕得之斬市自是州境晏然羅疇滁州法椽或曰滁山郡也以公髙才處此非宜疇曰此歐陽之醉鄉也香泉萬斛以為供給白雲千頃以為職田何謂貧僻耶杜杲滁州受兵杲提偏師住援甫至民多求入滁守固拒杲啓鑰納之金人圍城數重杲登陴中矢益自奮厲卒全其城元徐君慶知滁州潔己愛人為政期年民懷其惠士服其善曹瑞知滁州為政專務教化杜居敬來安縣尹政尚仁惠有古循良風鄰境有蝗逹縣界居敬齊沐致禱蝗不入其境及代縣人立碑頌德楊朴全椒縣尹冦陷廬江人震動行省參政總兵于滁者縱飲不理軍事冦入城縱火朴度必死盡殺其妻子朝服坐堂上盜欲降之朴曰我已戕妻女正欲死官守耳大罵不屈而死蔣居仁至正中來安縣尹精於吏治民樂其政凡學校祠宇橋梁靡不經營本朝陳璉知滁州文學政事為時推重秩滿滁人乞留升揚州知府仍管州事唐振洪熙元年知滁州秩滿父老乞留升授正五品仍治州事正統初再任後以老請歸民思之不置畿志周正天順間知滁州有治績滁人德之南畿志留衢知全椒有循良之政南畿志人物唐邢文偉全椒人咸亨中為太子典膳丞時太子有罕接宫臣文偉上書曰古者太子既冠司過之史徹膳之宰今史既闕官宰得奉職謹守禮經以聞後右史闕髙宗曰文偉切諫吾兒此直臣也遂授之纍遷鳯閣侍郎宋張洎全椒人有俊才博通墳典南唐時舉進士為知制誥參預機密江南平歸宋太祖責之曰汝教李煜不降又草詔召上江救兵對曰犬各吠非其主太祖釋之拜太子中允後為翰林學士參知政事有文集五十卷子安期方回皆仕于朝徐象賢全椒人祥符初進士持身勤儉居官清潔遇事不茍避官至太子右贊善大夫張昷之滁州人祥符中進士纍遷集賢校理天章閣待制歷河北都轉運使以光祿卿致仕為人亷直吏治精明議論慷慨徐徽象賢子提舉利路常平抗疏得謝致仕居縣之獨山號獨山居傳士曾肇為守相與為文字交嘗集唐宋以來文字可者合為一編以示肇肇裒集之以為滁陽慶厯集茅革全椒人仕為貴池令民有兄弟訟田者革為垂涕說同生當相盡以恩義兄弟感泣而去其後革五子皆取科第以文學顯吳蔚全椒人中進士第為臨淮簿攝今事時青苗法行旁邑奉行峻急口語籍籍蔚施行得宜民以不擾張瓌洎孫舉進士除祕閣校理遷淮南轉運使三司責羡財瓌以賦數民貧對當官遇事輒言觸忤勢要至屢黜終不悔張璪瓌弟舉進士歷官知制誥遷翰林學士拜參知政事後進大學士知揚州卒諡簡翼以附勢為士論所譏云雍存全椒人隱居不仕以文史自娛居城南號南郭先生錢公甫遊山詩每同南郭先生到謂存也紹聖初曾肇為守嘗與為文字交茍與齡來安人志尚髙潔事其親生養死葬力竭而禮盡母殁廬墓有芝十九莖生墓亭事聞旌其門趙察來安人少負才望事親甚孝養孤姪如己子行義為鄉里推重尤深於易為文簡嚴仕為福州永福縣丞元范思敬全椒人有志操能文章至正初嘗獻治平十二䇿遂歸隱于石子岡之梁莊號栖谷子以詩酒自娛本朝何世隆滁州人沈勇果决元季糾義兵守滁城洪武初率衆歸附授萬戶以從征功升右副都元帥李茂之滁州人機悟勇決為義兵千戶從征渡江授右府都先鋒洪武初屢立竒功纍官中軍都督僉事黃立恭滁州人性寬厚有巧思洪武初扈蹕渡江纍官工部侍郎范常滁州人穎悟嗜學淹貫古今洪武初以文學顯用命典兵牘後升翰林學士楊元杲滁州人洪武初以志士見重從侍左右扈蹕渡江擢江南行省右司員外郎升應天府尹魏忠滁州人介特有守以薦授諸暨州判官調洛陽令升大同知府月俸取足而已餘收之於官時以亷謹稱樂韶鳯全椒人洪武初從征渡江授起居注轉給事中遷中書省員外郎再升兵部尚書後為翰林學士久之以病免復起為國子司業未幾升祭酒弟暉知開封府禮太常卿毅諸暨州同知俱知名談淵滁州清流人有膂力引兩石弓發無不中洪武中以軍功授燕山護衛副千户後從靖難戰于真定及埧上馳騎突陳斬獲甚衆至夾河摶戰所乘馬蹶遂死之永樂初追封崇安侯諡壯節陳旭全椒人英毅有智略洪武中永平衛指揮同知永樂初以征討功升前軍都督同知進封雲陽伯方政全椒人勇略過人永樂初以靖難功歷升都指揮宣德正統中充總兵官鎮守邊方纍進右都督征麓川沒于陳追封威逺伯諡忠毅方瑛政子有謀略以父廕提兵破賊寨歷升都督僉事鎮守雲南復以平苗功升右都督充總兵官鎮守湖廣貴州纍封南和侯卒諡忠襄陳友全椒人其先自山後徙此友有膽略屢使朔漢纍官都督平苗有功封武平伯又征虜冦進侯爵黃純全椒人由鄉貢纍官兵科給事中升江西提學僉事德行文章為時重子􅛁舉進士授御史有聲南畿志黃正滁人性孝讀書尚禮居母喪哀毁廬墓負土築墳事聞旌表畿志列女丁氏全椒人袁蘭妻蘭卒丁誓不再生競自縊死鄉族義之有司上其事詔旌其門畿志楊氏全椒人陶珙妻為縣學生以疾卒楊年三十無子誓不他適父老欲録其事以上輒泣曰守節閨門之常耳何事表暴乎壽八十內外稱賢南畿志陳氏來安人張珣妻年三十六適珣未幾而珣卒陳無子誓不改節年六十餘而卒畿志徐州東至淮安府邳州界一百一十里西至河南歸德府虞城縣界二百二十里南至鳯陽府宿州界九十里北至山東兖州府滕縣界一百二十里自州治至南京一千里至京師二千里糧一十四萬八千二百石零建置沿革禹貢徐州之域天文房心分野本古大彭氏國春秋為宋地戰國屬楚秦置彭城縣屬泗水郡項羽自立為西楚霸王都於此漢改泗水為沛郡又分沛郡立楚國置徐州宣帝更為彭城郡尋復為楚國晉武帝於淮南僑立徐州安帝始分淮北曰北徐州劉宋改北徐州曰徐州而加淮南徐州曰南徐州後魏於徐州仍立彭城郡隋開皇初郡廢復為徐州大業初改為彭城郡唐置徐州天寶初復改彭城郡乾元初復為徐州後升武寧軍宋因之金屬山東西路元復為徐州屬歸德府本朝初𨽻鳯陽後直𨽻京師編戶一百三十里領縣四蕭縣在州城西五十里古蕭國春秋為宋邑漢為蕭屬沛郡東漢屬沛國晉因之北齊改為承髙縣𨽻彭城郡隋初屬徐州尋改為龍城縣又改為臨沛縣大業初復曰蕭縣屬彭城郡歷唐五代宋金並屬徐州元初併入州尋復置本朝因之編户四十六里碭山縣在州城西一百七十里秦置碭郡及縣漢於縣置梁國東漢梁國遷治下邑而改陽為碭山縣晉以碭山省入于邑後魏改為安陽縣治麻城隋復改碭山縣屬梁郡唐屬宋州昭宗於縣置輝州尋徙州治單父五代唐州廢以縣屬單州宋因之金屬歸德府後廢元復置碭山縣屬濟寧路本朝改今屬編戶二十五里豐縣在州城西北一百一十里秦為沛縣之豐邑屬泗水郡漢以豐為縣屬沛郡晉屬沛國劉宋改屬濟隂郡北齊屬永昌郡隋屬彭城郡唐宋及金並屬徐州元屬濟寧路本朝復改今屬編户一十九里沛縣在州城西北一百八十里古逼陽國地秦置沛縣為泗水郡治漢改泗水為沛郡遷治相而沛縣如故晉屬沛國劉宋屬徐州北齊省隋復置屬彭城郡唐以廣戚縣省入宋因之金初屬邳州後為源州縣省元復為沛縣至元初省入豐縣尋復置屬濟寧路後屬濟州本朝改今屬編戶三十八里郡名彭城秦名形勝要害之地隋唐十道志汴泗交流唐韓愈詩岡嶺四合宋蘇軾放鶴亭記楚山為城泗水為池蘇軾黃樓詩東近齊魯北屬趙魏南通江淮西通梁楚宋陳師道學記吕梁橫絶四山合圍宋蘇轍黃鶴賦風俗挾任節氣好尚賔遊隋地理志俗多楚音朴直舒徐地理志風俗髙邁迥出等倫舊圓經霸者之餘以武為俗陳師道學記山川彭城山在州城東北三里大石上鐫彭城山三大字雲龍山在州城東南二里宋時山人張天驥所居蘇軾詩醉中走上黃茅岡滿岡亂石如羣羊即此石佛山在州城南二里山頂有石佛井定國山在州城東四里東魏武帝五年慕