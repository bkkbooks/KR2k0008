書數百言如史漢論贊者元叔嘆其有史筆元祐間累詔徵之力辭而免子先光俱登進士以詩文名王當眉山人博覽古今所取惟王佐大畧嘗舉進士不中退居田野著春秋列國名臣傳五十卷元祐中蘇軾以賢良方正薦廷對慷慨不避權貴調龍游尉後見蔡京入相遂不復仕當於經學尢邃易與春秋皆為之傳得聖人之㫖居多楊時丹稜人累官朝請郎知合州以清厲著稱子煒通敏能文官至修職郎史炤眉山人父清卿蘇軾兄弟以師事之炤博古能文嘗作通鑑釋文三十卷楊孟容眉山人累官至懷安軍在治平時與濮議不合在熙寧間議新法又不合元祐中乞致仕哲宗書清節二字賜之巢谷眉山人傳其父中學舉進士谷素多力棄其業學古兵法游西邊與河州将韓存寳善後存寳坐罪死谷逃避江淮間㑹赦乃出蘇軾蘇轍謫嶺海谷往循訪轍又欲徃海南訪軾至新州病死轍聞哭之失聲曰谷於朋友之義無愧髙恭惜不遇襄子而前遇存寳後遇予兄弟也史通青神人少與兄珣以文學知名歴官通川尉磐石令有古循吏風嘗著易書乾坤别解詩書義論語孟子又進世要機務十卷芻蕘策十卷吕陶彭山人舉進士知夀陽縣應熙寧制科時王安石改新法陶對策枚數其過忤安石意出知彭州哲宗即位除殿中侍御史上疏論蔡確韓縝章惇負國皆罷去累官集賢殿學士知陳州楊迹青神人少有文名嘗謁黃庭堅論學術邪正自是學有指歸時用王安石新經屏黜孔安國訓註迹笑曰吾不能强束縳進身遂棄去子旻城固主簿晃監石羊鎮酒税程之邵眉山人曽祖仁覇即蘇洵妻之父仕為録事叅軍能辯疑獄之邵以䕃為新繁主簿厯知泗州鳳翔府鄭州徽宗時累官顯謨閣待制攝涇原帥事屯兵行邊敵人聞風遁去兄之元知楚州有政績子唐官至寳文閣學士任伯雨孜子邃經史文力雄徤中進士仕為右正言上䟽言章惇蔡京過惡入元祐籍伯雨居諌省僅半歲所上一百八䟽皆係天下治亂長子象先登世科又中詞學兼茂舉調秦州户曹掾聞父謫棄官歸養次子申先官至中書舍人曽孫希夷從朱文公學篤信力行累官端明殿學士徙家邵武文初彭山人父永客汴初尚在襁褓中後二十年至汴訪尋之踰年始得歸養暨登第封永為承事郎安輿奉養時人稱之蘇過軾子軾謫英亷永州獨過随侍凡生理晝夜寒暑所須一身百為不知其難嘗為文曰志隱軾覽之曰吾可以安於島夷矣歴官郾城令通判中山府皆有政績所著有孔門弟子别傳斜川集子七籥籍節笈篳箾唐庚丹稜人善屬文舉進士為宗子博士累官承議郎卒庚為文精宻通世務作名治察言諸篇學者稱之有文集二十卷兄伯虎治易春秋皆有家法元祐初其父游瀘南病甚伯虎感夢往見父是日疾少間具舟侍父歸蘇元老軾從孫幼力學善屬文黃庭堅竒之舉進士累官太常少卿時禁元祐學術軾方在黨禁元老亦罷提點明道宫元老歎曰昔顔子附驥尾而名顯元老以家世坐累豈不榮哉有詩文行世任諒眉山人徙汝陽幼孤力學舉進士累官龍圖閣直學士知京兆府諒孝足以囘母欲奪之志知足以知藥師必反之状再為京兆卒嘗為懷州教授作新學碑徽宗見之嘆曰文士也劉勃眉山人元符初詔求直言九上書辯宣仁太后之誣雪司馬光之枉乞用范純仁蘇轍之賢斥章惇蔡卞吕惠卿蔡京之姦改提舉湖北路常平尋坐元祐黨籍劉汲丹稜人紹聖中進士累官直龍圖閣知鄧州與金人戰衆且盡汲罵不絶口死之贈太中大夫謚忠介家愿勤國子紹聖初舉進士廷問力詆元祐之政愿答䇿惟以守元祐已行者為言為普州樂至令元符初應詔論時政凡萬言後入黨籍禁錮凡十年大觀中始知雙流縣高宗時擢知閬州移彭州初蘇轍讀愿䇿謂異時當以直道聞至是果驗王宿眉山人與同郡李由頥程之才楊明家愿楊恂蘇千鈞賈勉中史彭年孫曽家度史欽家徳基家幹劉剛楊貫張繻史勵節史移中家寧史勤李敀成彪史書言費易共二十五人俱以元符上書入黨籍師維藩眉山人仕為全州文學其學精於春秋徽宗時興太學國子司業髙閱言建學之始宜得老成以誘掖後進乃以維藩薦詔除國子録王賞當之弟舉進士累官禮部侍郎兼直學士忤秦檜意出知利州賞為文師蘇軾有玉臺集子稱學問該洽初除直秘閣知龍州有美政後為吏部郎中嘗撰東都事畧一百三十卷孫昭逺眉山人元祐進士調長沙尉有能績建炎初遷河南尹西京留守能收集散亡為義兵以拒金人既而金人來攻昭逺戰不利其下欲擁之南還昭逺怒遂遇害唐重彭山人少有大志大觀中進士累官起居舍人重言開邊之禍起于童貫宜誅貫後知京兆府兼經畧制置使金将圍城固守踰旬城陷血戰中流矢死初重度不可支以書别其父克臣曰忠孝不兩立義不茍生以辱吾父克臣報之曰汝能以身殉國吾含笑入地矣孫道夫丹稜人貢辟雍坐收蘇文除籍髙宗時以張浚薦召對除秘書正字出知懷安軍資蜀綿州遇事明了有水晶燈籠之稱累遷至禮部侍郎道夫居官一意為民不可干以私仕宦三十年奉給多置書籍杜莘老青神人甫十三世孫累官殿中侍御史後以直顯謨閣知遂寧府嘗嘆曰䑓諌當論天下第一事若有所畏姑言其次是欺其心不敬其君者也及任言責極言無隱取衆所指目者悉擊去聲震一時都人稱骨鯁者必曰杜殿院云楊椿眉山人省試第一累任憲節甚有風績後以不附秦檜罷政家居紹興末始自兵部尚書兼權翰林學士除叅知政事卒諡文安唐文若庚之子少英邁不羣為文豪健登進士第分教潼川府通判洋州遂寧府皆有政績髙宗時召為秘書郎作文思箴以獻及勸收西北人材以固根本深見嘉納出知饒温漢鼎江州累遷敷文閣待制李燾丹稜人父中登第知仙井鹽燾紹興中進士博極羣書作續資治通鑑長編累官禮部侍郎進敷文閣學士兼侍講同修國史燾以名節學術知名海内長編一書用力四十年始成又有易學春秋學及文集總數百卷卒謚文簡累贈太師温國公子垕著作郎坖䕫州路提點刑獄李壁燾第三子日誦萬餘言舉進士為正字寧宗時累官叅知政事兼同知樞宻院後謫撫州又起知遂寧府以資政殿學士致仕卒謚文懿壁文學徳望轟震一時所著有鴈湖集㳙塵録中興奏議内外制臨汝閑書共數百卷李􅐉燾第四子宋舉進士入為館職文聲赫然班對備陳忠讜為沿江制置副使開閫于鄂甚得江漢之心入為禮部尚書資政殿學士卒謚文肅所著有恱齋集楊汝明青神人舉進士為成都府觀察推官時呉曦叛汝明不受逆儔之招及曦平宣諭使呉獵以聞遂名汝明入補官累遷工部尚書楊大全青神人乾道中進士調温江尉召監登聞皷院時光宗久不省重華宫大全為書萬言以諌時稱忠直寧宗時累官司農寺丞㑹御史虚位有力薦大全者屬大全一徃見大全笑謝决不徃明日遂丐外知金州劉焞眉州人贊讀恭王邸權尚書禮部侍郎光宗以太子尹臨安焞為判官兼少尹天府之政不便於諸貴出為湖北轉運判官知静江府平李接之亂楊泰之青神人少刻志於學臥不設榻幾十歲慶元初類試累官知富順縣及普果州皆有異政寳慶間召對謂今以直言求人而以直言罪之使天下士以言為戒恐士氣益消寖成衰世之風理宗竒其對後遷大理少卿出知重慶府所著文集甚多家大酉愿曽孫舉進士初授昭化縣主簿呉曦叛蜀大酉不受逆儔之招遂被召用淳祐侍講經筵累官工部侍郎與宰相史嵩之論不合罷去大酉為人方直雖屢起屢外所守不變卒謚文節楊棟汝明從子紹定二年進士第一為宗正少卿進對理宗曰止是正心修身之説乎㨂對曰臣所學三十年止此一説用之事為至為簡易後累官禮部尚書進叅知政事後以資政殿大學士奉祠卒贈少保棟之學本諸周程負海内重望所著有崇道集平丹文集史次秦眉山人舉進士為大安軍教授呉曦之叛招次秦甚遽次秦以石炭桐油塗目末生附子傅之比至目腫母命家人詐以訃聞乃聼還後改利州主管文字仕至合州太守楊文仲棟從子幼孤母胡守節自誓教養諸子文仲邃於春秋淳祐間入太學兩試皆第一寳祐初登進士累官太常丞兼崇政殿説書每以精誠感動帝意官至工部侍郎兼國子祭酒後知泉州卒有見山文集家鉉翁眉州人舉進士問學該博尤邃於春秋累官端明殿學士簽書樞宻院事元兵至奉表祈請被執聞宋亡旦夕哭泣不食飲元世祖髙其節欲授以官不受後教授河間每語及宋興亡之迹輙流涕太息成宗即位放還錫以金帛不受本朝張鑑眉州人洪武末任監察御史陞陜西左叅議在官以才幹稱左經眉州人洪武初由儒士舉累官興山教諭博通經史文章典雅蜀人以左五經稱之蜀士之有聲於進士科者多出其門所著有武昌集張添禄眉州人永樂間任監察御史每按部能振揚風紀陞廣西左布政旬宣有方民甚徳之余子俊青神人由進士累官太子太保兵部尚書卒贈太保謚肅敬為世名臣列女蘇軾母姓程氏仁覇女通經史有氣節適蘇洵生軾轍洵游學四方程教二子以書甚嚴每語家人曰二子必不忝蘇門嘗讀漢范滂𫝊慨然太息軾請曰軾若為滂夫人許之否乎程曰爾能為滂吾顧不能為滂母邪師驥二女驥眉山人仕宋為右正言靖康中避亂還蜀至唐州方成驛遇賊執二女欲强之伯罵曰宜速殺我仲抱其姊亦從而罵賊併害之土人收葬二女號曰正女家虞集母姓楊氏父文仲世以春秋名家明於性理之學楊氏在室即通其説適成都虞汲生集宋末兵亂汲挈家趨嶺外無書可携楊氏口授集論孟左氏傳歐蘇文比還始得刻本則已盡讀諸經通大義矣後集以文翰擅名當代皆楊内訓之力仙釋彭祖古陸終氏第三子籛也自堯歴夏殷封于大彭周衰始浮遊四方晚入蜀抵武陽留家焉張逺霄眉山人一日見老人持竹弓一鐡彈三質錢三百千張旡靳色老人曰吾彈能辟疫汝宜寳而用之再見老人遂授以度世法熟眎舉首見其目中各有兩瞳子徃白鶴山垂釣西湖峯上有一老人曰此乃四目老翁君之師也尚不記授竹弓鐡彈時邪張大悟牟羅漢眉人名安以廂兵𨽻倅㕔如岷山陟上清坂忽遇髯者顧笑曰汝饑何不食柏子邪摘子投其口顧髯者不復見矣遂不火食大可庭有大甕貯水觧衣就浴徃上通老荘至到語一日江水暴漲舟不可行或戯指其笠曰乗此渡可乎牟遂置笠水而趺坐其上截江以濟觀者異之人呼為牟羅漢史通平漢光武時自㑹稽來蜀詣峩眉出謁天皇真人授以三一之法及五符訣遂居青神縣地置茅廬煉太丹龍虎成形餌之又廣行隂徳功滿白日升天楊昭慶唐景雲中自京兆來眉志尚清虚巡遊二十四化至北平化嘆曰昔漢時史先生得真一之道修之已白日升天後無繼者乎遂住青神縣遊仙觀三十餘年感五嶽丈人希受真君降下授以朱明龍文遂得尸觧之道陳太初眉山人初與東坡同學於道士張易簡後東坡謫黃州有眉山道士陸惟忠來云有得道者曰陳太初問之則同學者也又數年見東坡於惠州云太初巳尸解矣明一統志卷七十一
