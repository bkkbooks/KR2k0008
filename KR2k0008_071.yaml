商愽學多聞守蜀郡亦有治聲王祐郪人隱居不仕陳紀山善知人稱祐天下之髙士三國李朝郪人蜀漢益州别駕與其弟邈俱以文稱於時邈仕為犍為太守嘗面折昭烈以忠鯁稱杜微涪城人諸葛亮領益州妙簡舊徳選為主簿數固辭舉而致之求歸亮曰君但當以徳輔時不責以軍事何為求去乃拜諌議大夫以從其志李譔涪城人從梓潼尹黙講學五經諸子無不該覧蜀漢後主以為太子庶子譔嘗著古文易尚書毛詩三禮左傳指歸李餘涪城人蜀漢時年十三父殺人出亡母下吏餘乞代母死吏不許遂自殺郡以狀聞詔圖像府庭晉李毅朝孫性豁達賑恤窮民篤於故舊仕為寧州刺史從弟苾仕為犍為太守以清儉稱王化堂𤣥孫少有令望舉孝亷為梓潼太守撫綏異俗得夷夏心龔頴遂寧人益州刺史毛璩辟為從事璩為譙縱所殺佐吏並逃頴遂奔赴殯送以禮後縱僭位禮徵不起脅以兵刃執志彌堅唐王慧翼郪人詞藻清逸墳籍博贍仕為左補闕後遷通州司馬陳元敬梓州射洪人弱冠豪俠世髙貲歲饑嘗散粟萬斛以賑鄉里以明經擢第拜文林郎武后居攝遂山棲茹木而終陳子昂元敬子文明初舉進士上書言事武后竒其才擢麟臺正字累遷右衞胄曹叅軍唐之文章至子昂始變雅正王適稱為海内儒宗所論著世以為法嚴震梓州鹽亭人兄侁舉進士累官行軍司馬震為興鳳兩州團練使韋禎状其治行為山南第一後遷山南西道節度使累進同平章事卒贈太保謚忠穆從弟礪為興州刺史累官尚書左僕射節度東川卒贈司空趙㽔鹽亭人篤學不仕明王伯天人大畧李白有懷趙徴君詩即㽔也李浦射洪人著補履十卷皆孟子揚雄之㫖宰相張延賞表薦拜右拾遺正色抗辭當朝敬憚張九宗遂寧人舉進士持節封侯歸典鄉郡凡宫觀碑銘多其所撰李睍射洪人少負俊頴讀書過目即悟舉進士工於詩時人比之陳子昂李白宋蘇易簡梓州銅山人父協累官至光禄丞易簡風度竒秀才思敏贍太宗時進士第一以文章知名累官翰林學士承㫖眷遇敻絶倫軰終叅知政事所著有文集二十卷子耆有才名仕為工部郎中蘇舜欽易簡孫少有大志好為古文弱冠極言時政范仲淹薦其才召試為集賢校理後寓呉中詩歌豪放尤善草書兄舜元任氣節亦善詩歌草書尤工官至三司度支判官汝顔安岳人舉進士調鳳州幕職年未及請致仕仁宗嘉其蚤退特授太子舍人牟衮鹽亭人受學於多岳舉進士後有用中義先積中學先兄弟皆出仕號一門四桂景泰安岳人舉進士為防州推官歴知寧原二州以竒兵敗元吴于彭陽改鎮戎軍賊不敢犯後徙秦鳳路總管子思忠累官左藏庫副使思立熙寧中累立戰功知河州神宗知其母老命其弟思誼為秦州判官以便養馮光戬安岳人李順之亂已平諸将縱殺附降光戬白大将楊瓊止之自是降者日以千數岑象郪人舉進士持心履行為士矜式出将指使入侍經幄尤以端亮稱王求郪人舉進士知眉州恂恂謹飾有譽於時子維亦舉進士仕至榮州太守退休二十年清節大著楊天惠郪人舉進士知雙流縣文詞有左氏西漢之風蘇軾見其古律大稱許之勾克儉郪人舉進士累官殿中侍御史出為河東路轉運使以忠清明敏聞馮如晦安岳人舉進士范純仁帥環慶時有訟純仁不法詔獄寧州命如晦徃訊之力辨其誣冨弼韓縝有詩述其事杜孟普州人由太學因童貫蔡京用事幡然而歸嘗訓子孫曰忠孝吾家之寳經史吾家之田時號為寳田杜氏趙開安岳人元符中舉進士為成都路轉運判官善心計有通變捄弊之志建炎初都大提舉川陜茶馬更茶馬𣙜酒法張浚治兵秦川犒賞所費盡取辦於開而贏貲常有裕馮山安岳人熙寧末為秘書丞通判梓州鄧綰薦為臺官山以不諳新法辭不就退居二十年范祖禹薦於朝官至祠部郎中馮澥山之子登進士歴官入朝以言事再謫靖康初召為左諫議大夫累遷尚書左丞紹興中以資政殿學士致仕卒澥為文師蘇軾論西事忤蔡京郡人張庭堅以言事斥象州死妻子流離澥力振其家馮康國遂寧人為太學生負氣節苖劉之變張浚治兵平江先遣康國至杭州說折二凶及浚宣撫川陜辟主管文字後都大主管川陜茶馬楊輔遂寧人舉進士才足以有用明足以知姦累官龍圖閣學士兼江淮制置使愛君憂國知無不言兄弟五人自為師友以孝著聞卒謚荘惠呉泳中江人嘉定進士歴官著作郎屢抗䟽直言遷寳章閣學士歴知温泉州所著有鶴林集呉昌裔泳弟早孤痛自植立得程頥張載朱熹諸書研繹不倦舉嘉定進士歴官監察御史遇事敢言後以寳章閣待制致仕卒謚忠肅所著有儲鑑奏議四書講義姚希得潼川人嘉定進士累官叅知政事忠貞清儉好引用善類屢抗疏直言以潼川郡公致仕卒贈少保所著有續言行録及橘洲文集任忠厚郪人有文名一時英俊願交舉進士朝貴事相汲引官至二千石茍允中中江人𦵏父自培其墳三年有虎二馴擾其傍醴泉出其下蹇彛通泉人嘉定中進士累官通判金州端平間元兵攻蜀彛堅守戰不能敵被擒不屈而死子永叔復力戰城破舉家死焉弟維之紹定中進士都統王宣辟行參軍亦迎敵力戰而死賈子坤潼川懷安軍人嘉定末進士為西和州推官關外被兵子坤與郡守陳寅誓死以守城陷同家口死之追贈承議郎官其子仲武孫昌忠純孝同登咸淳進士純孝後為右司郎中厓山師敗抱二女及妻牟同蹈海死元許維禎遂州人元至元中為淮安判官屬縣鹽城有二虎為害維禎黙禱神祠一虎去一虎死祠前境内旱蝗禱而雨蝗亦息是歲冬無雪民多疾維禎禱之雪深三尺朝廷聞其事褒奨之趙成慶郪人累官至兩臺中丞激濁揚清臺閣生風張谷寳郪人歴兩臺御史累遷平陽路總管政聲清肅徳洽于民崔洪範中江人為涿州同知累遷至兩臺御史剛正嚴明