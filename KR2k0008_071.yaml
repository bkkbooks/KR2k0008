body:
  text: 明一統志卷七十一明李賢等撰潼川州東至順慶府西充縣界二百六十五里西至成都府漢州界一百八十里南至重慶府大足縣界四百七十里北至成都府綿州界九十里自府治至南京七千二百六十五里至京師一萬二百六十五里糧二萬石零建置沿革禹貢梁州之域天文井鬼分野春秋戰國為蜀地秦為蜀郡地漢置廣漢郡及郪縣蜀漢分置梓潼郡晋又分置新都郡宋齊仍為廣漢郡梁於郪縣置新州西魏置昌城郡隋廢郡改新州為梓州後改為新城郡唐復為梓州又改梓潼郡後復為梓州又為東川節度治所五代時蜀為武徳軍宋改静戎軍又改安静軍尋復為東川節度後仍為安静軍節度重和初陞為潼川府元為潼川路本朝初仍為潼川府洪武九年改為州併郪縣入焉直𨽻四川布政司編户六里領縣七射洪縣在州南六十里本漢廣漢郡郪縣地西魏置射江縣後周改曰射洪隋屬新城郡唐屬梓州宋末省元復置倂通泉縣入焉本朝因之編户四里鹽亭縣在州東一百里本漢廣漢縣地屬廣漢郡梁於此置北宕渠郡及鹽亭縣西魏置鹽亭郡隋罷郡存縣唐屬梓州又分置永泰東關二縣宋仍舊元併永泰東關入焉本朝因之編户三里中江縣在州西一百二十里本蜀漢伍城縣後周置𤣥武郡隋改縣曰𤣥武尋置凱州大業初州罷以縣屬蜀郡唐屬梓州宋改為中江縣元併飛烏銅山二縣入焉本朝因之編户五里遂寧縣在州南二百四十里秦為蜀郡地漢為廣漢郡地又分廣漢縣置徳陽縣東晋時蜀於徳陽縣界置遂寧郡齊以為東遂寧郡後周置遂州又改遂寧郡曰石山隋初郡廢州存大業初改遂寧郡治方義縣唐初為遂州後改遂寧郡復為遂州置武信軍宋陞為遂寧府元改府為州本朝初因之洪武九年改為縣編户一十七里蓬溪縣在州東三百二十里本漢廣漢縣地梁為小溪縣地西魏為方義縣地唐置唐興縣尋改武豐縣後復為唐興又改蓬溪縣屬遂州宋末縣廢元復置併長江縣入焉本朝因之編户六里安岳縣在州南三百八十里本漢資中牛鞞墊江徳陽四縣地梁立普慈郡後周置普州治安岳及置多業縣隋改為普慈縣唐復置普州尋增置樂至崇龕二縣改州為安岳郡後復為普州宋因之廢崇龕普慈二縣寳祐以後州縣俱廢元復置安岳縣併安居樂至入焉本朝洪武初復置普州領安岳縣後又併州入縣編户二十六里樂至縣在州城北三百三十五里唐置樂至縣宋因之元省𢎞治中復為縣編户六里郡名梓潼蜀漢名昌城西魏名新城隋名東川宋名形勝居水陸之要衝通典左帶涪水右挾中江居水陸之要衝劔外一都㑹宋乾道中奏陞潼川府狀江山形勝水陸之衝劔外一都㑹梓於西南為大都通泉縣連鼇閣記梓州沃野千里人物盛繁於西南為大都據涪水之上游馬咸記據涪水之上游人物冨繁江山灑落風俗好勝尚氣不耻貧賤士通經學古罕為異習俱舊經性輕揚喜虚穪尚奢靡好音樂宋史地理志山川牛頭山在州西南二里形如伏牛古刻牛頭於崖附臨城郭舊多樓閣為一方勝槩杜甫詩青山意不盡衮衮上牛頭龍頂山在州西北二里蜿蜒于牛頭山之後故名長平山在州北岡長而平東山在州東四里隔涪江脩阜若長城有蘇公泉暨石塔存焉以山在州東故名唐杜甫詩東山高頂羅珍羞下顧城郭銷我憂香積山在州西北五十里北枕涪江金華山在射洪縣北二里杜甫詩涪右衆山内金華紫崔嵬武東山在射洪縣東七里山下玉屏山在射洪縣南一十五里即古之白崖山逺望懸崖宛類玉屏故名獨坐山在射洪縣東南二十里射江涪江左右合流此山卓然孤立故名鳳凰山在鹽亭縣東北負戴山在鹽亭縣西自劍門南來起伏四百餘里至此而蹲山有飛龍泉味極甘美髙山在鹽亭縣西杜甫詩馬首見鹽亭高山擁縣青金紫山在鹽亭縣北一十五里世傳嚴震封馮翊郡主有金紫之榮故名龍固山在鹽亭縣西北六十里山髙四里四面懸絶可以固守董叔山在鹽亭縣東隔涪江水孤峰絶島峭壁千仞舊名潺亭山隋縣令董叔嘗遊宴于此後人思其徳號曰董叔山女徒山在鹽亭縣東北七十里昔有女徒千人行役路逢賊乃於山頂置柵禦之因名今山頂有祠皷樓山在鹽亭縣東一百二十里山有三層高五十丈又蓬溪縣亦有皷樓山雙峰對峙可望數百里王蜀時嘗置古樓烽火於其上因名𤣥武山在中江縣東南一名大雄山舊有真武祠今廢水中之石多若龍蛇状隋有𤣥武縣以此名天柱山在中江縣西南山巒孤秀如柱火烽山在中江縣東南蜀漢諸葛亮嘗於此置烽火覆舟山在中江縣西南二十里高五里山腹有風穴人徃視則風從穴而起甚至折木賴應山在中江縣南九十五里産銅及空青銅官山在中江縣西南九十八里産銅即卓王孫鄧通治鉄之所可蒙山在中江縣西南三百二十里産銅唐貞觀末於此置鑄錢官調露初罷私鎔山在中江縣南一百三十里産銅廣人多採之者㑹軍山在中江縣東南一百六十里漢昭烈入蜀遣諸葛亮張飛畧地至此百姓以牛酒犒師因名飛烏山在中江縣南一百七十里峻峭如飛烏之状唐有飛烏縣以此山名長樂山在遂寧縣西形如蟠龍頂平如砥寳臺山在遂寧縣西山頂平如臺書臺山在遂寧縣西南唐張九宗讀書于此梵雲山在遂寧縣西南二里玉堂山在遂寧縣北一十五里峰巒聳秀氣象雄峙縣之主山也鶴鳴山在遂寧縣東北二十里漢張道陵入蜀居此山養道行教後僊去山有雙石鶴因名靈泉山在遂寧縣東一十里數峰壁立有泉自巖滴下成穴深尺餘紺碧甘美流注不竭因名宋楊大淵等守靈泉山即此奴厥山在遂寧縣南一十五里本名屈山唐景雲中改今名傘子山在遂寧縣北一十五里環山之民以植蔗凝糖為業尋香山在遂寧縣東二十里舊名血腥山宋刺史白子昉改今名龍頭山在遂寧縣西五十里有石如龍頭故名銅盤山在遂寧縣東五十里壁立四絶人莫能上赤城山在蓬溪縣東二里中峰蔚然左右環拱上有七曲老人祠蓬萊山在蓬溪縣西龍馬山在蓬溪縣西北一十里昔李章甫牧馬於山下産一駒毛骨異常人呼為龍馬因名青石山在蓬溪縣南一百七十里山有青石可為鐘磬采石者必先祀其神唐青石縣以此山名風門山在蓬溪縣南一百七十里四面峻絶常有清風因名伏龍山在蓬溪縣西二百里其山盤曲形如伏龍明月山在蓬溪縣西二百二十里兩峰對峙下臨涪水相映而明唐賈島詩長江微雨後明月衆星中龍多山在蓬溪縣南二百二十里鐡峰山在安岳縣後一名鳳凰山大雲山在鐡峰山後上有棲巖寺雲居山在安岳縣東南上有葛僊洞崖畔勒龜鶴二字鰲魚山在安岳縣北二十里以形似名落馬崖在州南一十里唐易𤣥子嘗乘馬至此崖上忽落馬躍入水中龍穴在射洪縣梓潼江濵世傳有龍馬出郪江在州西南源自銅山赤岸流至飛烏㑹衆流入長江涪江在州北源自吐蕃下歴綿州入本州東南合中江為一歴遂寧縣與嘉陵江合射江在射洪縣東南一十五里水經云涪江東南流合射江李膺益州記婁灘東六里土人呼為射江水大瀰江在射洪縣東源出劔州又有小瀰江在射洪縣北中江在中江縣東南夾流有二源南江來自綿州舊神泉縣東江來自涪成縣至𤣥武山下合南江鳳凰川在蓬溪縣北一百二十里以州近鳳凰山故名沈水在射洪縣東南八十里公孫述據蜀時令延岑盛兵于沈水固守漢臧宫進兵縱擊破之斬首溺死者萬餘人可波水在射洪縣東合梓潼水桃花水在射洪縣東北流入涪江梓潼水在鹽亭縣南源自劔州隂平縣竇圌山經綿州入本縣界下白馬河入涪江鵞溪在鹽亭縣西北八十里其地産絹宋文同詩待将一片鵞溪絹掃取寒稍萬丈長蘇軾詩為愛鵞溪白繭光麟溪在鹽亭縣王蜀時麟見於此因名揚溪在鹽亭縣源出順慶府赤溪在遂寧縣北一十五里源自蓬溪經本縣東流入涪江倒流溪在遂寧縣西一十五里其水旋繞向北入涪江因名蓬溪在蓬溪縣北源自蓬萊山西通遂寧縣珠玉溪在蓬溪縣西北七十里古有珠玉村因名岳陽溪在安岳縣西即青竹溪遶縣東流宋太守彭乘臨溪鑿石為曲水每歲脩禊于此名翰林灘以乘嘗官翰林故也大安溪在安岳縣北七十里浴丹井在鳳凰山昔易𤣥子浴丹于此僊井在遂寧縣北舊有霞氣薰騰因名仙井火井在伏龍山山下地窪若池以火引之有聲隱隱出地中少頃炎熾夏月積雨停水則熖生水上水為之沸而寒如故冬月水涸則土上有熖觀者至焚衣裾破石井在安岳縣西有巨石中分而出水世傳為陳摶相地所鑿甘泉在射洪縣南四十里唐時邑人黃嘉猷父沒躬負土成墳感甘泉之應詔蠲租税仍旌其門飛龍泉在負戴山下湧泉在遂寧縣西北玉壘鎮壘之曲有泉湧出灌溉壘傍之田洗筆池在中江縣水色如墨相傳有仙人嘗於此洗筆零星池在遂寧縣西南四里龍池在遂寧縣西五里昔池側有栁樹大十圍後周天和初有龍自樹昇士女共觀之其後樹枯池竭放生池在龍多山世傳唐武后嘗令放生于此方池在安岳縣北舊有陳摶手植蓮樂至池在樂至縣宋寇凖為縣令嘗讀書于此流杯池在安岳縣東郡守彭乗命工鑿之土産桃竹江心蟠石上出可為杖竹譜云竹性中皆空此竹獨實如木唐杜甫詩江心蟠石生桃竹蒼波噴浸尺度足斬根削皮如紫玉蔗霜遂寧縣出銅中江縣銅山出鐡鹽亭射洪二縣出鹽本州境及所屬七縣俱有井柑橘天門冬俱遂寧安岳二縣出曽青空青潼川州出學校潼川州學在州治東南宋熙寧間建本朝永樂十四年重脩射洪縣學在縣治西宋元符間建鹽亭縣學在縣治南唐貞觀間建本朝洪武九年重建中江縣學在縣治南晋時建遂寧縣學在縣治西南唐貞元間建二學俱本朝洪武七年重建蓬溪縣學在縣治北唐開元間建本朝洪武十四年重建安岳縣學在縣治東南宋元祐間建本朝洪武九年重建樂至縣學在縣治東書院金華書院在射洪縣學北元至正間建肖陳子昻像祀之張九宗書院在遂寧縣書臺山唐貞元間建東臺書院在鹽亭縣西南二十五里宋任伯傳讀書處宫室翔鳳樓在蓬溪縣西近樓之山有飛鳳之勢因名官閣在州北六十里唐杜甫詩山腰官閣逈添愁元祐閣在遂寧縣畫元祐人物又云司馬光幼時嘗侍父池宰小溪後人慕之因名玉虹閣在安岳縣名世堂在州治後有屈原司馬相如王褒揚雄嚴君平陳子昻李太白蘇子瞻畫像以八人皆名世之士也來衮堂在州治以宋丞相趙雄得名静治堂在遂寧縣東北二里宋孝宗書静治堂三大字賜丁逢嘉禾堂在遂寧縣宋尚書蘇仲虎守是邦民獻禾一莖九穗者百餘本因以名堂山亭在牛頭山唐杜甫詩路出雙樹外亭窺萬井中野亭在射洪縣東唐杜甫詩江水東流去清尊日復斜異方同宴賞何處是京華亭影臨江水村烟對浦沙狂歌遇形勝得醉即為家叩雲亭在鹽亭縣治西南環翠亭在中江縣治南宋程建用記西園之勝有環翠亭面北而抌南讀書臺在射洪縣北金華山唐陳子昻嘗讀書於此杜甫詩陳公讀書臺石上生青苔孝義堂在鹽亭縣東一百三十里宋時邑人馮伯瑜剖腹取肝愈父疾縣令卞詵為築臺于此立石旌表之又蓬溪縣西亦有孝義臺蜀孟昶時里人程崇事親孝方冬母病思笋號泣林中為生數笋縣令陳元佐詩戢戢蒼芽為母生淚痕落處兩三莖關梁孝弟橋在州之文廟前宋時州學生杜田舉孝弟因以名橋徳星穚在鹽亭縣南近嚴氏故宅唐杜甫詩有嚴家聚徳星之句寺觀兠率寺在州南二里中有劉蛻文塜唐杜甫詩兠率知名寺真如㑹法堂江山有巴蜀棟宇自齊梁庾信哀雖久何顒好不忘白牛車逺