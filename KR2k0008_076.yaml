body:
  text: 明一統志卷七十六明李賢等撰建寧府東至福州府福安界三百三十六里西至延平府順昌縣界一百一十五里南至延平府南平縣界八十里北至江西廣信府上饒縣界三百二十里自府治至南京二千三百一十里至京師五千七百五十五里糧一十六萬三千石零建置沿革禹貢揚州之域天文女分野周為七閩地秦屬閩中郡漢為東冶縣地屬㑹稽郡東漢置㑹稽南部都尉三國吳罷都尉置建安郡治建安縣晉以後因之隋廢郡以縣𨽻泉州大業初屬建安郡唐武德中置建州治建安縣天寶初改建安郡乾元初復為建州五代時閩置鎮安軍節度又改鎮武軍南唐改永安軍尋改忠義軍宋端拱初改軍曰建寧紹興末升為建寧府元改置建寧路本朝復為建寧府領縣八建安縣附郭本漢㑹稽郡冶縣地東漢改冶縣曰東侯官縣孫吳始置建安縣以年號為名屬建安郡自晉至元俱仍舊本朝因之編户一百三十六里甌寧縣附郭本建安建陽浦城三縣地宋治平中析置甌寧縣屬建州熙寧初省入建安元祐中復置元仍舊本朝因之編户一百七十七里建陽縣在府城北一百二十里本建安縣地晉太康中析置建陽縣屬建安郡宋以後因之隋省唐初復置屬建州尋省入建安垂拱中復置宋景定中改嘉禾縣元復舊名本朝因之編户一百八里崇安縣在府城北二百四十里本唐建州建陽縣地五代時閩置溫嶺鎮南唐為崇安場宋淳化中始升為縣元仍舊本朝因之編户八十八里浦城縣在府城東三百三十里本漢東侯官縣地漢末置漢興縣吳改曰吳興隋省入建安唐初復置改曰唐興天授初改曰武寧神龍初復曰唐興天寶初始改浦城宋元仍舊本朝因之編户一百五十八里政和縣在府城東二百四十里五代時閩為寧德縣地立關𨽻鎮宋咸平中升為關𨽻縣屬建州政和中改曰政和縣元仍舊本朝因之編户五十五里松溪縣在府城東一百六十里本建安縣地五代時屬吳越尋為閩有立松源鎮南唐升為松源縣宋開寶末改名松溪元仍舊本朝因之編户六十三里夀寧縣在府城東二百五十里本政和縣及福州福安縣地景泰六年以其地險逺分二縣地置夀寧縣治楊梅村編户二十二里郡名建安吳名建溪舊建州富沙方輿勝覽古有富沙驛城北有大伏州豈以此得名歟形勝碧水丹山梁江淹云碧水丹山珍木靈草為郡之盛東閩劇地唐權德輿序東接括蒼北距上饒西南抵延平東北帶建溪建安志山水竒峻同上閩中號佳山水建安視閩中尤號竒峻保界閩越綿地八百宋楊億云東南勝地建安志南望鐵獅紫蓋以次羣峯傍聨黃華白鶴之秀為東南勝地襟山束水宋盛均序其郡襟山束水其人黠而易隨居閩嶺上流宋史韓世忠傳風俗備五方之俗建安志自五代亂離江北士大夫豪商巨賈多逃難于此故備五方之俗市井侈浮田里樂業建安志處市井者尚侈而好浮居田里者勤用而樂業家有詩書户藏法律宋韓元吉記土風差勝建安集農力甚勤桑麻被隴茶笋連山土風差勝道義之鄉郡志自朱文公倡道東南彬彬然道義之鄉絃誦相聞同上擢科第登館閣者彬彬輩出居畎畝處閭里者絃誦之聲相聞山川黃華山在府治東北劉宋元嘉初太守華瑾之徙郡治于此山之西白鶴山在府城東二里東晉時望氣者言此山有異氣命工鑿之朝鑿暮合既而有雙白鶴翔其上故名馬鞍山在府城東北三里一名瑞峯宋郡守韓元吉種萬松於山麓鐵獅山在府城南三里山顛有庵昔人鑄文殊獅子像置庵中故名自此山分岡左為赤芝山五代閩時嘗産紫芝右為雲際山上有陸羽泉梅仙山在府城南三里世傳漢梅福于此煉丹有丹井壇竈遺跡宋曹文姫詩鑿開天外長生地煉出人間不死丹升山在府城南三里一名朗山以晉司馬王朗登遊之所故名五代時王延政據郡僣築郊壇於此宋更今名楊億詩層雲連郡郭占勝有招提宿霧昏金像飛泉濺石梯鐘聲空谷答塔影亂雲齊千騎時來此幽尋獨杖藜覆船山在府城南三里以形似名吳太守王蕃嘗築城山下龍首山在府城西三里勢若龍舉首然響山在府城東五里其山空洞枕於溪側行人相呼若有應者雞籠山在府城東北五里竹木蓊鬱狀若雞籠天湖山在府城北一十里其中有三十六景如雙虹泉紫芝菴之類皆久湮廢梨山在府城東南一十五里唐刺史李頻雅好此山既卒郡人思之立祠其下宋郡守盧幹為立碑鳳凰山在府城東北二十五里宋蘇軾鳳味石硯銘序云北苑龍焙山如翔鳳下飲之狀當其咮有石蒼黑堅緻如玉太原王頤以為硯豫名之曰鳳咮即此龍山在府城東狀若龍蟠與鳳凰山對峙其左有龍鳳池御茶亭紅雲島在焉壑源山在鳳凰山南此山之茶為外焙冠辰山在建安縣東萇里有石如鼓擊之有聲一有竹洞靈鷲山在甌寧縣崇安里半巖有亭亭藏仙骨一函東山在建陽縣東三桂里中有一峯髙出羣山名妙髙峯勒馬山在建陽縣南以形似名下有洑洲古語云山之足有溪田水推去出狀元五龍山在建陽縣西一十五里五山分峙中有小山如五龍捧珠之狀硯山在建陽縣東北三十五里山之西有石如巨硯相傳仙人華子期師角里先生于此武仙山在建陽縣西北嘉禾里山顛石筍髙十餘丈舊傳有仙人武裝跨馬於其顛故名九峯山在建陽縣西北嘉禾里其山九峯聨峙宋時有異人語朱熹曰龍居後塘其先生歸藏之所乎後熹卒葬於此龍湖山在建陽縣西崇化里山頂有古庵石門柴扉映帶前後又有雙井號龍湖蕉源山在建陽縣東北崇任德里道書謂此山為第十三福地集公山在建陽縣西北樂里宋江側嘗聚徒讀書於此側與羣弟相繼登第如葉祖洽游酢乃其尤顯者有山齊題名石刻大潭山在建安縣西舊志越王築城其上史稱吳五六千户屯大澤即此地赫曦臺山在建陽縣西崇泰里山髙萬仞絶頂平曠宋朱文公游至此因名以今名西山在建陽縣西崇泰里宋蔡元定結廬其上後理宗御書西山二大字表之石刻尚存朱熹詩卜居屏山下俯仰三十秋終焉村墟近未愜心期幽近聞西山西深谷開平疇茅茨十數家清川可行舟風俗頗淳厚曠土非難求誓捐三徑資往還半畝丘著書候來哲補過希前修豸山在建陽縣西禾平里山形如獬豸下有薦山書院鼓角山在建陽縣東北三衢里三峯峭拔狀如鼓角闌干山在建陽縣北二百九十里與武夷山相聨屬山麓古木周列如䦨干庵山在建陽縣東南後唐時有處士石湖結庵此山故名武夷山在崇安縣南三十里周回百餘里其峯巒大者三十六道書謂為第十六洞天相傳嘗有神降此自稱武夷君又列仙傳籛鏗二子長曰武次曰夷因以為名二說不同朱熹序有云武夷之名著自漢世祀以乾魚不知果何神山有枯木查插石罅間以度舟船棺柩之屬柩中遺骸外列陶器尚皆未壞頗疑前世道阻未通川壅未決時蠻俗所居而漢祀者即其君長蓋亦避世之士為衆所臣服而傳以為神仙也白石山在崇安縣北三十里山皆疊石若樓臺狀山巔有石室室有三井金雞山在崇安縣南山半石上有巨人跡及馬蹄柱杖遺跡屏山在崇安縣東南以形似名宋劉子翬世居其下起賢山在崇安縣東南劉子翬朱熹嘗集于此龜山在崇安縣東南其形如龜又建陽縣亦有龜山乃宋陳軒讀書處百丈山在崇安縣東朱熹記其上皆蒼藤古木雖盛夏無暑氣東南望見瀑布自前巖穴瀵湧而出投空下數十尺其沫如散珠噴霧日光燭之璀璨奪目濟拔山在崇安縣東八十里山有石壇如琢九井穴如鎔鑄又有瀑布泉三髻山在崇安縣西三峯鼎峙狀如螺髻巍然為萬山之宗又建安縣東北有雙髻山寂歷山在崇安縣東南山下有宋朱松墓游果山在浦城縣北相傳昔有方士周霞修煉於此大同山在浦城縣西南九里絶壁上有龍湫唐㑹昌中有蕭袁二禪師修行於上建寺曰大同石龍山在浦城縣西北山有巨石如龍宋趙抃詩直上更無容足地速回猶在夕陽天越王山在浦城縣東舊𫝊越王於此築臺為烽堠吳山在浦城縣東五里山四面秀異人居其側多吳姓漢興有吳氏六千户别屯大澤即此之民也夢筆山在浦城縣西北上相里相傳梁江淹為吳興令夢神人授筆於此故名又以山在環漳之間挺然孤立名孤山子期山在浦城縣西南二十餘里昔華期師角里先生得𨼆仙靈寶之法後居此山泉山在浦城縣東北六十里山頂有泉漢朱買臣傳云故東越王保泉山疑即此蓋仙山在浦城縣北九十里一名浮蓋山抵衢信括三州界山有仙壇石洞洞口有石如龍口出泉深處有竅可以窺天漁梁山在浦城縣北樂平里舊志天下十大名山漁梁其一也洞宫山在政和縣東南政和西里道家謂此為第三十七福地滿月山在政和縣南一十里山峯圓瑩若滿月然上有石壇世傳顧思逺煉丹於此大風山在政和縣東南感化里山勢絶類廬山五老峯有石室世傳有趙元琦者於此修道嘗云不畏大風則大山可登銅盤山在政和縣東感化里世傳胡仙姬煉丹于此上有飛升巖下有龍井望浙山在政和縣西長城里世傳古有大魚姬者於此修道望見白鶴從括蒼飛來喜曰浙仙來矣遂乘鶴上升湛盧山在松溪縣南二十里山形峭峻常有雲霧凝其上昔湛王鑄劒于此因名山有罏冶遺跡及唐貞觀中石刻萬山在松溪縣東所産之物萬種故名皆望山在松溪縣西其山髙出雲表登其顛則環邑諸山皆在望中黃梔峯在建安縣東南將相里峯下舊有三十六寺今存者五昔人詠此有冷水一源開五剎黃梔三秀冠諸峯之句劒門峯在甌寧縣崇安里清溪中注東西兩山如劒對峙五峯在崇安縣東八十里曰金鵝曰蓮花曰清湖曰石畬曰石廩凡五峯清湖峯腰石穴常有風出名風門大王峯在武夷山中一名天柱峯舊志昔魏王子騫於此得道有張湛等十二人謁之㑹天旱魏王置酒脯祭仙祈雨時控鶴仙人浮空而下大霈雨澤湛等賦詩即此地玉女峯在武夷山中宋辛去疾詩玉女峯前一擢歌雲鬟霧髻動晴波幔亭峯在武夷山中一名鐵佛嶂秦始皇二年八月十五日武夷君置酒殽㑹鄉人于此建幔亭綵屋設寶座施紅雲紫霞褥呼鄉人為曽孫宋白玉蟾詩人間幾度曽孫老惟有青山自古今溫嶺在崇安縣治西延亘數里五代時立鎮于此分水嶺在崇安縣西北石雄里二水發源其下一入江西界一入福建界嶺有銘鐫于巖石朱熹詩水流無彼此地勢有西東要識分時異須知合處同西巖嶺在浦城縣西上相里宋章得象少時讀書於此山下折桂嶺在浦城縣北九十里舊名泗水嶺唐林藻與弟藴登第經此題詩云長記嶺頭題姓字不穿楊葉不言歸而今折得兩枝桂又向嶺頭聨影飛因改今名柘嶺在浦城縣西北一百八十里與麗水縣分界以地多柘樹得名梅嶺在崇安縣東從籍里朱熹詩去路霜威徑歸程雪意深玉梅疏半落猶足慰幽尋寶勝巖在建安縣東川石里上有飛泉百尺直瀉澗底望之若玉虹然徐將巖在歐寧縣西崇安里相傳嘗有徐將軍者駐兵于此仙館巖在武夷山中半巖有石室其間几案具在蓋仙家翰墨之館大藏巖在武夷山中下際深淵石罅處有仙骨函又有小藏巖仙鶴巖在武夷山中峭壁上有繪鶴千古不渝朱熹詩誰寫青田鶴髙超鴈鶩羣長疑風雨夜清唳九霄聞靈巖在武夷山中兩石相倚中有一罅可以窺天號一線天仙機巖在武夷山中有石室機杼存焉换骨巖在武夷山中半壁有石室室前有黃心木如橋上列置蛻函函中藏仙蛻皆質小而紅色世傳方外之士得道尸解者悉於此换骨云𨼆仙巖在崇安縣東七十里絶頂有壇平曠可十餘丈宋劉韐書堂在焉西巖在崇安縣東從籍里巖間有瀑布旁有觀泉亭朱熹詩平生壯