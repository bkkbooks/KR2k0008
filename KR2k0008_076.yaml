寢堂曰韋齊别室有晦堂敬齊義齊熹自記元葉善夫詩峩峩雲谷山渺渺滄洲水中有宅一區過者視闕里滄洲精舍在建陽縣西朱熹晚年築室於此扁曰竹林精舍後更名滄洲元時即此為祠堂祀之虞集記寒泉精舍在天湖之陽朱熹建淳熙中吕祖謙來訪於此共編次近思録武夷精舍在武夷山山有峯夷下鋭上號大𨼆屏朱熹築室其下有仁智堂𨼆求齊觀善齊止宿寮石門塢寒栖館晚對亭晦庵釣磯茶竈韓元吉有記西山精舍在浦城縣治東宋真德秀構為講學之所中為講堂後為拱極堂德秀自作記夢筆山房在夢筆山麓真德秀建魏了翁記社倉在崇安縣宋乾道中縣大饑朱文公請於郡得粟六百石以賑給之秋成民償粟於官因乞留里中乃以所貸米就五夫等里立社倉夏貸冬收以為常規文公自作記後請頒其法於天下北苑焙在府城東建安出茶北苑為天下第一茶舊有十品曰龍鳳茶京挺的乳白乳頭金䗶面頭骨次骨龍茶以供御及賜與宋丁謂嘗備載造茶之法名宦三國王蕃吳建安太守建立郡治紀綱庶務多其功晉張華建安從事以文學推重於時南北朝何𦙍南齊建安太守政有恩信人不忍欺每伏臘放囚還家依期而返到溉梁建安太守其友任昉以詩贈溉求一衫溉答曰豫衣本百結閩中徒入蠶假令金如粟詎使亷夫貪江淹梁建安令政尚文雅愛邑中山水竒秀嘗言水碧山丹皆平生所至愛不覺行路之逺唐葉皓建州刺史武德初郡有妖賊作亂皓嬰城捍賊城陷不屈而死郡人立廟祀之張文琮永徽中建州刺史下教令俾民祭春秋二社除去淫祀安靖而有惠愛陸長源建中初建州刺史民歌之曰令我州郡泰令我户口裕令我活計大陸貟外又曰令我家不分令我馬成羣令我稻滿囷陸使君李頻懿宗時建州刺史以禮法治下時更布條教時政亂盜興相推奪而建賴頻以安及卒郡人懷之為立廟于延陵建州刺史宣宗曰建州去京師幾何對曰八千里帝曰卿到彼為政善惡朕皆知之勿謂其逺宋李覺通判建州秩將滿州人借留太宗詔褒之王鼎知建州俗生子多不舉鼎為條教禁止時盜販茶鹽者衆一切杖遣之課為諸郡最龎籍景祐中為福建轉運使治務愛民明練法令待僚吏謙和有所關白茍有盆於民雖文書已行立改之曰此一道休戚所繫豈可有悔吝心方偕知建安縣縣産茶每歲先社日調民數千鼓譟山旁以達陽氣偕以為害農奏罷之陳襄浦城主簿攝令事民有失物者捕偷兒數輩相撑拄襄曰某廟鐘能辨盜犯者捫之輒有聲乃引偷兒詣鐘所祭禱隂塗墨鐘上而以帷蔽之命其暗捫出視手一人無墨扣之遂服蔡襄福建轉運使復古五塘溉田民以為利乂奏減閩人五代時丁口稅之半趙抃知崇安縣為政簡靜邑人愛之陸藴知福州徙建州時其弟藻出為泉州過藴合樂燕欵閩人以為盛事杜杞知建陽縣强敏有才閩俗老而生子輒不舉杞使保伍相察犯者得重罪俗為之易辛次膺建炎中知浦城縣比至冦黨已焚其邑於是披荆棘坐瓦礫中安輯吏民料丁壯治器械厄險阻號令不煩邑民便之陳俊卿以宰相出判建州者三人俊卿王淮梁克家皆名重于時汪應辰紹興中為祕書省正字以言事忤秦檜出通判建州有政聲洪邁知建寧府富民有睚眦殺人衷刃篡獄者人拒捕邁正其罪黜流嶺外龔茂良知建寧府亷勤有為自以不為羣小所容請祠不允張大經知建寧府初大經為禮部尚書屢請祠孝宗曰卿公亷必能為朕牧民故有是命袁甫知建寧府篤意愛民尋兼福建轉運判官奏除俗弊民皆德之陳居仁知建寧府嵗饑出儲粟平其價弛逋負以巨萬計代輸畸令􅗀稅趙必願嘉定中知崇安縣剖決如流吏不能困修學政立催科法革吏胥鬻鹽之敝力主義役之法上下便之秩滿民共立祠刻石葉夢鼎開慶初知建寧府作橋梁置驛舍建大安關決疑獄甚有善政傅自得福建轉運使有循良之譽子伯成嘉定中知建寧府以律己愛民為本有治聲王野知建寧府陛辭理宗命之曰游胡朱真流風未泯表宅里以率其民則豫汝澤陳韡福建招捕使兼知建寧府衢寇破常山開化勢張甚韡命將提兵夜薄其寨賊出迎戰驚曰此陳招捕軍也皆大哭急擊之衢冦悉平包恢嘉定中知建寧府閩俗以九月祠五王生日靡金帛傾市奉之恢曰彼非犬豕安得一日而五子同生衆感悟而止之孫夢觀理宗時知建寧府蠲租稅省刑罰郡人徐清叟蔡抗以為有古循吏風元陳天錫建陽尹文學優贍政事公勤尤篤意斯文邑人稱頌其德辛思謙建陽尹長於儒術勤於吏治邑人愛之如父母彭庭堅至正中為崇安尹時冦犯閩關庭堅禦之有方冦不能入境升同知建寧路總管府事周禮崇安簿定六班役法按籍品配髙下一夕而畢吏不能欺人服其公李榮實松溪尹核實田賦邑人德之本朝李子春洪武初知政和縣亷慎勤敏在任三年妻自執㸑無異布衣時人以為難張鵬舉知浦城縣持已端方蒞政公恕尤留心學校邑人悅服芮麟洪武間建寧知府寬厚能文歲饑勸富民出粟賑濟全活甚衆及郡學被災乃卜地重建規制宏壯士風益振陳永建寧府推官治獄平允請謁不行朝廷遣官旌賞之擢本府同知曹端洪武間崇安知縣亷明有為蒞任即置二簿紀民善惡時加勸戒民用感化張準永樂初建安知縣撫民有惠嘗因饑歲請以鈔折糧及蠲户口鹽稅免勾補軍役以恤民困皆見允納民便之劉敬永樂間知建寧府律已亷明蒞政勤慎崇學校修祀典郡中大治李新建寧府檢校勤敏練達以亷能稱江顯正統間知政和縣下車首革里胥濫徴之弊歲歉勸富民出粟賑貸民賴以生胡欽建安知縣亷能有威時沙尤寇亂大兵征勦欽給饋餉躬撫捕民賴以不擾張瑛知建寧府以征沙尤功升參政明年盜復猖獗瑛直抵其巢與弟敬力戰死之劉鉞天順間建寧府豈弟平恕建人稱之喬銘歐寧知縣值歲饑勞心賑恤張鋭成化間知崇安縣興利除弊人不敢欺劉珩浦城知縣沈敏有割斷士民至今思慕之楊惇知浦城興學理財抑强扶弱聲稱甚美張端建安知縣興學撫民政教兼舉浦鏞知建寧府以清勤節儉為治士民安之許明𢎞治初知甌寧縣持亷秉公不事聲色而綱紀整飭盜息民安已上十二人俱郡志流寓顧野王本吳人因游宦居建安梁末侯景之亂野王歸本郡乃募鄉黨隨義軍入援嘗撰建安地記後又撰玉篇輿地志章仔鈞泉州人五代時為建州刺史因家浦城嘗出兵二將後期欲斬之其妻練氏救免二將後事南唐破建州練時寡居二將遺以旗曰吾欲屠城宜植旗於門可免練反其旗曰願全此城不然吾家與衆俱死耳二將遂不屠城豐稷明州人仕宋纍官御史中丞論蔡京姦狀徽宗將處以尚書左丞而稷忤貴近不得留出知越州京得政修故怨後除名建州安置趙士宋宗室紹興間封齊安郡王士欲救解嶽飛漏其語或聞之以告秦檜檜令臺官言士責建州朱熹本婺源人父松仕宋為尤溪尉松亡熹年十四從父遺言依劉子羽寓居崇安晚徙建陽又往從李侗復遍交當世有識之士遂得聖道之宗登第後五十年仕於外者僅九考立朝才四十日折衷羣言發揮經傳集諸儒之大成卒贈太師諡曰文追封徽國公從祀孔子廟庭本朝官其後為世襲五經博士祝穆新安人以朱熹母黨隨寓建安博涉經史所著有事文類聚方輿勝覽行世謝枋得信州人仕宋為江西招諭使知信州吕師夔叛降元引元兵攻信州枋得乃變姓名入建寧唐石山寓逆旅中日麻衣躡屨東鄉而哭已而賣卜建陽市中有來卜者惟取米屨而已委以錢率謝不取天下既定遂居閩中至元中以薦强起至京不食而死人物唐葉京建安人舉進士為太常博士州人登第自京始劉常建陽人父死廬墓七年有芝生於廬前刺史陸長源以聞詔旌其門賜粟帛五代游簡言建安人父恭唐末進士仕楊吳為别駕貟外郎簡言少孤力學除知誥鎮金陵辟掌文翰及建國纍遷翰林學士吏部尚書進右僕射林仁肇建陽人剛毅有膂力初為閩將閩亡歸南唐周世宗征淮南仁肇出援夀州斬獲甚衆官至洪州節度使仁肇雖居將任常與士卒均食同服故得其心陳誨建安人趫捷有勇初事閩有戰功閩亡歸南唐以功纍官建州節度使周師伐淮南誨遣其子德誠率師赴難拜和州刺史潘承祐建安人初仕閩王氏為吏部尚書以忠諌逐歸私第南唐查文徽下建州以禮致之南唐主以為衛尉少卿升降人物制置郡縣多用其言以禮部尚書致仕江文蔚建陽人南唐時為御史中丞坐貶江州奉其母以行怡然不以貶謫為意嘗作詩有曰屈原若遇髙堂在終不懷沙弔汨羅江為建陽人嘗遊廬山曰鹿洞師事陳貺學詩居二十年遂以詩著名為南唐主所喜其詩有風人之體為時輩所稱宋楊徽之建州浦城人父澄閩浦城令徽之純厚清介尚名教周顯德間舉進士纍官右拾遺見太祖為人望所歸上書言之太宗見其書稱為周室忠臣官至翰林侍讀學士卒贈兵部尚書有集二十卷宗人徹為祠部郎中徹子巒為職方員外郎李虛已建州建安人父寅初仕南唐歸宋遣其子養母仕為衢州司理參軍虛已第進士纍官知遂州以治最聞太宗賜以手書虛已因獻詩自陳父子遭遇榮及祖母太宗悅遂賜五品服及其祖母錢五十萬緡纍遷至工部侍郎精於詩律有雅正集十卷弟虛舟以孝友清慎世其家虛舟子寬尚書金部郎中定司農少卿張靄浦城人為侍御史太祖方彈雀於後苑靄亟請入奏事及見所奏乃常事帝怒靄曰臣以為尚急於彈雀帝色愈厲以斧柄撞其口墮兩齒靄徐拾之帝曰欲訟朕耶靄曰臣不能訟陛下自有史官書之耳楊億浦城人祖文逸南唐玉山令夢懷玉山人來覺而生億七歲善屬文太宗召見試喜朝京闕詩下筆立成有願秉忠貞節終身立聖朝之句除正字後賜進士兩為翰林學士億性耿介尚名節文格雄健學者宗之卒諡曰文所著文集一百九十四卷葉齊建陽人端拱初進士第一為館陶令㑹契丹擾邉太宗幸河北或言齊督糧芻不足將加之罪齊曰使敵聞此將輕中國以臣計之糧可充十年太宗悟而釋之吳待問浦城人與楊億同州里每造億億厚禮之門下少年多易之億曰彼他日所享非若曹可望也纍官禮部侍郎致仕後其子育在二府待問奉朝請時人榮之楊偉億弟天禧初獻頌召試賜進士知衢州龍游縣通判單州權開封府判官皆以清慎聞纍遷翰林學士進中書舍人卒贈禮部侍郎徐奭甌寧人祥符間舉進士試鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上居實取王臣之威重遂擢第一徐的建安人天禧三年進士補欽州推官的善知兵嘗征宜州辰州蠻開示恩信蠻黨悔過自歸纍官荆湖南路安撫使蠻復叛討平之潘慎修承祐子真宗朝為諫議大夫數為冦準所毁及準出守有告其不法者詔慎修往驗治至即密疏準材堪將相所坐皆詿誤時稱為長者章頻浦城人真宗時與弟頔試禮部預選㑹詔兄弟毋得並舉頻即推其弟棄去後六年乃擢第歷知數州以刑部郎中使契丹卒子訪官至三班奉職張沔浦城人大中祥符初進士歷官侍御史排擊奸佞不避權貴端亮有操無愧清議云黃震浦城人進士及第為著作郎通判遂州纍官廣東轉運使奏罷廣南歲進異花數千本震在真宗時數論事既卒詔進官一等曹修古建安人舉進士仁宗朝纍官殿中侍御史立朝慷慨有風節當劉太后臨朝權幸用事而修古遇事輒言以忤太后出知興化軍曹修睦修古弟性亷介自立與修古同舉進士纍官都官貟外郎知邵武軍杜衍薦為侍御史改司封員外郎知夀州徙泉州修睦恬於仕進年五十一即致仕人以是賢之黃晞建安人少通經聚書數千卷學者多從之游自號聱隅子著歔欷瑣微論十卷石介在太學遣諸生以禮聘召晞走匿不出韓琦表薦之以為太學助教阮逸建陽人仕為鎮東軍節度推官景祐初上樂論十二篇與胡瑗俱召赴闕命同校鐘律分造鐘磬各一虡皇祐中更鑄太常鐘磬又召瑗逸與近臣太常官議於祕閣遂典作樂事章得象浦城人舉進士知玉山縣歷知數州為人莊重深厚有容持守法度仁宗時纍官翰林學士承㫖同中書門下平章事兼樞密使在中書八年宗黨親戚一切抑而不進封郇國公卒諡文憲楊紘億從子為億後賜進士通判越州知筠州遷江東轉運按察使歲饑開義倉賑之吏持不可紘曰稍遲人將殍矣官至太常少卿紘性嚴雖家居兒女不敢妄言笑聚書數萬卷手抄事實名窺豹篇劉䕫建州崇安人第進士歷知陜廣潭州所至有亷名纍官樞密直學士知鄆州發廩賑饑民賴全活盜賊屏息後知建州以户部侍郎致仕章楶頻孫以叔得象䕃入官試禮部第一纍官直龍圖閣知慶州徙渭州築沿邉城屢擊敗夏兵後拜同知樞密院事卒諡莊簡子縡户部員外郎綡第進士纍官龍圖閣直學士綜通判常州綰知丹徒縣綖簽判西安州縯簽判蘇州黃鑑浦城人少敏慧過人舉進士纍官國子監直講楊億善其文詞延置門下後遷國史院編修官嘗詔館閣官後苑賞花而鑑特預召國史成擢直集賢院出通判蘇州黃亢浦城人少竒頴過人雖侏儒野率如不能言然嗜學强記文詞竒偉嘗游錢唐以詩贈林浦浦激賞之時杭守王隨奏禁西湖為放生池亢作詩數百言以諷士人誦之有東溪集十二卷張泌浦城人篤志古學官至尚書比卒仁宗悼之曰朕將大用不意遽亡宋咸建陽人為廣西漕歐陽修喜其文嘗補注周易及揚子法言行世吳育待問子少竒穎博學中進士甲科纍官翰林學士慶厯間拜參知政事後以資政殿大學士尚書左丞知河南府卒諡正肅育性明果所至作教條簡而易行遇事不妄發發即人不能撓有集五十卷章望之得象子志氣宏放長於議論初為校書郎後歐陽修吳奎等薦除建康軍判官不赴遂以光祿寺丞致仕望之嘗著救性七篇明統三篇禮論一篇又有歌詩雜文數百篇張伯玉建安人知太平州日語司户曽鞏曰吾方作六經閣子為我記之鞏呈藁終不合意遂自為之曰六經閣者諸子百家皆在焉不書尊經也鞏一見畏服今按記文為平江作與此不同徐復建州人初游京師舉進士不中退而學易通流衍卦氣法自筮知無祿遂無進取意游學淮浙間益通隂陽天文地理占射諸家之說尤精音律慶厯初召見命為大理評事固辭賜號沖晦處士曹覲修古兄子為修古後皇祐中知封州儂智髙反攻封州覲率衆禦之兵敗被執賊戒勿殺捽使跪且誘以美官覲不屈詬賊而死事聞贈太常少卿章衡浦城人嘉祐初進士第一歷知數州嘗使遼燕射連發破的遼以為文武兼備異待之又嘗進編年通載十卷神宗覽而善之後以集賢學士知頴州謝麟甌寧人嘉祐中第進士再調石首令疊石障江人號謝公隄通判辰州招捕徭寇一方以寧纍官直龍圖閣歷知江寧鳳翔府渭桂二州以計平融江夷戍兵不利水土麟措置得宜賴以全活者衆陳升之建陽人博學多能舉進士歷知封州漢陽軍熙寧中拜相與王安石異請免條例司後以使相判揚州封秀國公卒贈太保中書令諡成肅柳耆卿崇安人纍官屯田貟外郎工於辭章范鎮見其所作歎曰仁宗四十年太平鎮在翰苑十餘載不能出一語咏歌乃於耆卿詞見之張詵浦城人第進士通判越州神宗朝為陜西轉運副使召對帝曰朕未識卿每閲章奏獨卿與蔡挺有所論請令人了然纍遷龍圖閣直學士知杭州詵性孝友亷於財平生不置田業云吳充育弟與兄育京方皆進士髙第調穀熟簿歷翰林學士熙寧中拜相政務安靜欲更新法乞召還司馬光吕公著等十數人性沈密對家人語未嘗及國事卒諡正憲子安詩元祐中諫官安持工部侍郎葉康直建州人擢進士知光化縣時豐稷為穀城令皆有善政人歌之曰葉光化豐榖城清如水平如衡元祐初知泰州河中府亳州進寶文閣待制召為兵部侍郎陳軒建陽人進士第二授平江推官元祐中以龍圖閣待制知廬州徽宗立擢兵部侍郎兼侍讀每勸帝以治貴靜願法文景之恭儉加龍圖直學士知杭州徙福州陳師錫建陽人熙寧中游太學有俊聲廷試擢進士第三調昭慶軍掌書記郡守蘇軾倚以為政元祐初軾薦其德行文章以為校書郎徽宗立拜殿中侍御史疏陳時務出知潁廬滑三州坐黨安置郴州師錫始與陳瓘同論蔡京蔡卞時號二陳游酢建陽人與兄醇俱以文行知名師事河南二程子第進士調蕭山尉纍官監察御史歷知漢陽軍和舒濠三州伊川嘗言游君德器粹然問學日進政事亦絶人逺甚范致虛建陽人舉進士為太學博士徽宗即位擢右正言才數月論疏七十餘上政和中纍官尚書左丞靖康初為陜西宣撫金人犯京師㑹兵入援兵敗髙宗時知鄧州後貶官尋復資政殿學士徐遹歐寧人崇寧中以對䇿稱上意特比正奏名第一人恩例遹賦詩云白髮青衫老得官瓊林頓覺酒腸寬平康夜過無人問留得宫花醒後看吳執中松溪人嘉祐進士歷官州縣門壻吕惠卿方貴盛不肯附以進取大觀初為御史中丞政和中星變執中奏推尋厥咎實由蔡京又言八行之舉所得皆鄉曲常人後以樞密直學士知越州吳祕甌寧人纍官提㸃京東路刑獄御書政刑二字賜之所著有周易通神及楊子注太𤣥箋吳栻甌寧人舉進士知蘇州纍官龍圖直學士再帥成都陛辭帝曰以卿清謹循良故以重地委卿子激以米芾壻工詩能文字畫俊逸將命至金被留命為翰林待制知深州有東山集十卷周武仲浦城人紹聖中登第纍官左司貟外郎嘗使金還言金人貪詐輕與通好未為得計宜講求禦戎之策童貫惡之謫居黃州髙宗即位召為刑部侍郎進尚書謂大臣曰方今人才如周武仲者未見其比周常建州人中進士補國子直講以養親求教授揚州年未五十即致仕又因薦起徽宗時為國子祭酒遷禮部侍郎蔡京用事不能容以寶文閣待制出知湖州周因浦城人為司農少卿出為荆南轉運使帝語及溪洞事對曰有邉事邉臣之福無邉事朝廷之福時初得燕薊故因語及之江贄崇安人隱居不仕因太史奏少微星現詔舉遺逸三聘不起賜號少微先生所述有資治通鑑節要劉韐崇安人其先自京兆徙閩子孫仕宋得諡忠者五人世號五忠劉氏韐弟進士厯知建福州纍官延康殿學士宣和中再知真定金人犯京師遣韐使金營金人欲留用韐曰偷生以事二姓死不為也又聞軍中欲立異姓仰天大呼曰有是乎遂更衣酌巵酒自縊建炎初贈資政大學士後諡曰忠顯翁彥國崇安人官至御史中丞靖康之變充經制使撰文誓衆張邦昌為金所立移書責之子蒙之為常山尉趙鼎喪歸衢守檄蒙之馳取士友與鼎書䝉之密告鼎之子令焚之無所得劉子羽韐長子建炎初為樞密院檢詳文字與張浚同謀誅范瓊及浚宣撫川陜為參議軍事薦吳玠吳璘中興戰功居多子羽之力也後知鎮江府兼沿江安撫使劉子翬韐次子痛憤父死廬墓三年執喪致羸疾服除授通判興化軍以不堪吏事辭歸武夷山妻死不再娶事母兄盡孝友講學不倦學者多從之游號屏山先生劉珙子羽長子生有奇質從季父子翬學刻苦自勵登進士乙科紹興末為中書舍人兼直學士阮金人渝盟一時詔檄皆出其手臨數鎮民愛之如父母後同知樞密院事精明果斷時近習用事力裁抑之卒諡忠肅翁挺崇安人纍官考功員外郎博極羣書尤長於詩有文集傳世挺同邑有翁合者自號丹山為大學生後舉進士厯官中外皆有聲魏行可建安人建炎中以太學生應募假禮部侍郎使金因留不遣嘗遺書金人警以不戢自焚之禍金人逼其仕不從仰天號慟飲鴆而死紹興中贈祕閣修撰官其二子一弟一孫吕祉建陽人宣和初上舍釋褐髙宗朝纍官直龍圖閣知建康府遷吏部侍郎劉豫子入寇命祉護合肥諸將酈瓊叛迫祉過淮北不從而死其妻吳氏在吳中自縊以徇葬聞者哀之郭緒浦城人留意邵康節象數之學兼取揚雄所據列山易以章㑹統元推之久而成書名易春秋按圖布卦千歲之日可坐而致也章誼浦城人崇寧中進士通判杭州南渡初苗劉作亂誼奮然面折逆黨事定遷殿中侍御史立朝論事奏疏無慮數十百皆經國濟時之策官至端明殿學士卒諡忠恪鄭㲄建安人政和中進士授安陸府教授建炎中為右司諌髙宗時苗劉作亂㲄面折二凶拜御史中丞密遣人見張浚等具言城中事復辟之功㲄有力焉纍遷簽書樞密院事劉勉之崇安人自幼强學日誦數千言以鄉舉詣太學時禁伊洛學勉之潜抄日誦師事譙定楊時歸結草堂讀書力耕自給紹興間召至與秦檜不合即謝病歸學者號白水先生朱松卒屬以後事且令子熹受學勉之誨熹如子因妻以女胡安國崇安人紹聖中進士擢太學博士靖康初除太常少卿起居舍人皆辭髙宗時以張浚薦除中書舍人兼侍講先獻時政論二十一篇尋以疾求去留兼侍讀專講春秋纍官至給事中謝良佐嘗稱其如大冬嚴雪百草萎死而松柏獨秀所著有春秋傳卒諡文定從祀孔子廟庭范如圭建陽人少從舅氏胡安國受春秋登進士第紹興間以薦召為校書郎時秦檜力主和議如圭力論其不可最後知泉州罷居邵武如圭忠孝誠實得於天其學根于經術有集十卷皆書疏議論之語胡憲安國從子紹興中以鄉貢入太學與劉勉之隂誦習伊洛之說自是一意下學歸故山力田奉親從游者日衆晚年召為祕書正字抗疏言金人勢必敗盟疏入即求去詔改秩與祠歸朱熹師事最久世號籍溪先生胡寅安國弟之子少桀黠難制安國閉之空閣其上有雜木寅盡刻為人形安國乃置書數千卷於上年餘寅悉成誦遂登進士靖康初召為校書郎又從楊時學纍遷起居郎後為秦檜所惡謫新州著論語詳說及讀史管見數十萬言世稱致堂先生胡寧安國子秦檜當國召試管職及兄寅與檜忤乃出為䕫路安撫司參議官知灃州不赴卒安國傳春秋修纂檢討盡出寧手又著春秋通㫖以羽翼其書學者稱為茆堂先生胡宏安國季子幼事楊時侯仲良而卒傳其父之學優游衡山下餘二十年玩心神明不舍晝夜紹興中上書數千言初以䕃補承務郎不調秦檜死宏被召以疾辭所著有知言并皇王大紀八十卷學者稱為五峯先生劉爚建陽人與弟炳受學朱熹吕祖謙乾道中進士纍官工部尚書兼左諭德嘗上疏言敵運已衰我之邉鄙當過慮者三又表章朱熹四書以備勸講卒諡文簡所著有奏議史藁講堂故事雲莊外藁等書丘濬建安人幼頴悟博通經史尤精於厯數嘗著長世論五十篇言用兵利害仕為光祿丞致仕魏掞之建陽人幼有大志師事胡憲與朱熹游乾道中舉遺逸以布衣入見極陳當世之務勸以修德業正人心養士氣為恢復之本孝宗嘉納賜同進士出身授太學録卒贈直祕閣詹體仁浦城人父慥信豐尉體仁隆興中進士纍官太常少卿孝宗崩率同列抗疏請光宗親臨祥祭時議諡體仁言宜諡曰孝卒用其言後出知福州退居霅川博極羣書以存誠慎獨為主為文悉根諸理云袁樞建安人試禮部詞賦第一調溫州判官淳熙中為編修官分修國史故相章惇家求為潤飾其傳樞曰吾為史官法不隱惡寧負鄉人不可負天下後世公議時相趙雄嘆曰無愧古良史矣後以右文殿修撰知江陵府所著有易傳解義等書熊克建陽人幼翹秀既長好學善屬文紹興中進士第孝宗時纍官學士後出知台州克博文强記著述外無他嗜所著有髙宗紀事本末及九朝通略帝王經譜諸子菁華黃鍰浦城人為監察御史首陳七事在臺十月風節凛然所著有奏議等書二十卷蔡元定建陽人父發博覽羣書號牧堂老人元定八歲能詩日記數千言及長登西山絶頂忍饑啖薺於書無所不讀聞朱熹名往師之熹扣其學大驚曰此吾老友也不當在弟子列韓托胄禁僞學謫道州卒後賜諡文節所著有律吕新書八陳圖說等書蔡沈元定子與兄淵皆不仕淵號節齊所著有周易訓解沈師事朱熹熹晚欲注書遂以屬沈又元定獨得洪範之數隱居九峯未及論著曰成吾書者沈也沈潜心反覆數十年遂成書傳及洪範皇極內篇卒從祀孔子廟庭蔡抗沈子兄模號覺軒抗博通經史尤邃於理學紹定初進士纍官諸王宫學教授疏奏權姦不可復用國本不可不早定帝善其言纍遷端明學士參知政事卒諡文肅游九言建陽人年十歲即為文詆切秦檜受學於南軒張栻纍官知光化軍卒諡文清弟九功知慶元府有古循吏風朱在熹子兄孰贈中散大夫在以恩補承務郎歷官至工部侍郎時經筵日讀父四書玉音訪問不已因請黜楊雄乞以二程張載從祀帝嘉納之孰子鑑官至湖廣總領在孫浚纍官吏部侍郎死節真德秀浦城人四歲受書過目成誦慶元中第進士纍官至參知政事世稱西山先生卒諡文忠德秀之學以朱文公為宗慨然以斯文自任黨禁既開而正學遂明于天下後世所著有大學衍義讀書記文章正宗從祀孔子廟庭徐應龍浦城人淳熙初進士纍官至刑部尚書兼侍講在經筵多指陳時政轉吏部尚書以煥章閣學士奉祠卒諡文肅徐榮叟應龍子與弟清叟俱嘉定中進士榮叟纍官僉書樞密院事嘗言朝廷當以節義勵士夫則緩急必無求生害仁之事以資政殿學士致仕卒諡文靖清叟纍官知樞密院兼參知政事孤忠無附麗封晉寧郡公卒諡忠簡陳戩松溪人為給事中上疏論當時有五失宰執務姑息將帥邀功賞臺諌言細務守臣多犯法內侍權漸大宜有以禁止之熊禾建陽人寧武州司户參軍入元不仕學問至老不倦著易講義書說標題四書及輯翰墨全書行世元楊載浦城人後徙杭州為宣州推官工詩與虞集范椁揭徯斯齊名世號虞楊范揭有詩集傳世葉景仁松溪人為浦城縣尹閩中盜起景仁率衆勦捕為賊所害其子雋聞之傾家資募壯士從間道入賊境殺賊首載父尸還事聞授以官不受本朝徐竒浦城人洪武中由鄉舉歷官戶科都給事中物論重之升廣東右布政使鄭賜甌寧人洪武中第進士擢監察御史升湖廣右參議尋遷工部尚書調刑部終禮部尚書潘賜浦城人洪武中進士歷官禮部祠祭郎中操履方正尋升江西布政司右參政楊榮建安人洪武末登進士第永樂初授翰林編修即入閣典機務知制誥有果斷通敏之才纍官少師工部尚書兼謹身殿大學士歷事五朝特見寵任宅心仁惠薦用人才經筵輔導禆益良多卒贈太師諡文敏所著有兩京類藁丁顯建陽人博通經史洪武乙丑進士第一授翰林院修撰國朝狀元及第自顯始郡志江鐵建安人永樂中登進士第選翰林庶吉士尋擢監察御史得風憲體纍官廣東布政司右參政卒于官張珂建安人永樂中進士擢為行人歷遷吏部郎中練達老成尋升浙江布政司左參政致仕卒雷填建安人由進士授給事中彈劾不避權勢嘗被命巡撫蘇浙常等府朞歲封章凡四十上皆切時弊又嘗巡撫廣西利害所當興革悉疏以聞夷民懷服卒于官囊無寸帛惟浣衣半篋詩文奏稿而已郡志連均建安人永樂中進士纍官江西右布政使均謙謹和緩于物無忤歷官四十餘年身無美衣家無餘産子孫僅免饑寒而已郡志雷鐩建安人永樂中進士授御史纍官浙江僉事巡視海道未幾卒居官清謹所至有冰蘖聲既卒浙人作詩哀之有除却數函書籍外别無一物載歸舟之句郡志吳廷用政和人永樂甲辰進士授給事中仁廟在東宫廷用以小心縝密被知時有吳老實之語既登極特升刑部左侍郎後改禮部致仕卒諭祭葬郡志朱泗建安人熹八世孫領永樂甲午鄉薦除直𨽻夀州判官改徐州值歲饑泗留本州京運以賑民而後申白督運民多所全活郡志劉童建陽人永樂中進士知湖廣寧逺縣亷能著聞觀風者薦其才略出羣以嘗忤時相事竟寢歷升䝉化州知州致仕卒童號稱循吏特以鯁直不屈遂至坎坷終其身郡志張善浦城人登進士拜監察御史以亷介自持出按廣東馬軍林思祐倚權肆剽掠害民滋甚善捕其黨三十餘人置諸法民賴以寧尋致仕去郡志范忠甌寧人登永樂甲辰進士授兵部主事以謹厚稱嘗奉命往蘇松等府捕盜綽有能譽郡志黃仲芳甌寧人永樂中進士知東陽縣有異政歷升貴州參政卒仲芳典雅剛方深惡佛老家其徒竟未嘗與之面所著有淡庵集郡志鄭以誠甌寧人領鄉薦授吏科給事中升雲南參政招撫干崖南甸流移二千五百餘户開懇通海河西二縣荒田二千五百餘畝種種有成績郡志陳遜浦城人登進士任監察御史亷介有直聲纍升雲南布政使卒于官囊無餘資都督沐昂為棺斂以歸其喪郡志田忠建安人由進士纍官江西左參議致仕家居二十餘年自奉淡然平生不肯干人以私非公事未嘗一至官府至于晚節䇄立不少屈人以為難郡志裴旻崇安人登進士纍官江西僉事亷介嚴毅糾察不避權貴風聲振肅卒于官士論惜之郡志雷吉生建安人由進士除御史正色立朝巡歷江西湖廣山東所在風裁凛凛郡志雷潛建安人宣德中領鄉薦除武選司主事升郎中正統己巳之變死焉郡志吳智甌寧人領宣德己酉鄉薦纍官國子助教所在嚴約束厚士風多所造就子文第進士郡志葉恕浦城人登進士授御史嘗署院事巍然有老成之望郡志龔貴浦城人領鄉薦歷官撫州知府所至興學校雪寃滯以政績著聞郡志滕員甌寧縣人領宣德己酉鄉薦纍遷禮部祠祭郎中後正統己巳之變死焉詔録其子郡志劉福建安人正統壬戌進士纍官河南按察使所至持憲嚴明人不敢犯尋升浙江布政使郡志趙熙政和人正統間由國子生授濱州判官遲鈍願慤與物無競自筮仕以至歸老服食不少易其舊郡志朱梴熹九世孫景泰中詔録熹後遂以梴襲翰林院五經博士以奉祀事梴淳朴謙謹動遵繩墨人謂其無忝大賢之後云郡志丁慈建陽人登景泰甲戌進士授御史升河南僉事有能聲郡志吳義政和人景泰間知零陵縣以清政自持吏畏民懷丁內艱歸行李蕭然民爭致賻贐郡守以帑餘資之俱辭不受郡志楊瑛建安人性明敏文氣英發舉鄉試第一登天順庚辰進士改庶吉士曹欽之變瑛入朝遇害贈翰林院編修郡志王吉甌寧人嘗知靈山縣持身謹厚居官多善政惠民郡志龔沅建安人弱冠以文名登成化己丑進士授主事督稅兩浙焚香自矢不私是歲商無過取國有餘課士論賢之郡志吳浩建陽人由國子生授肇慶府經歷受命築四㑹新興二縣城有化盜安民善政從征廣西纍受旌賞郡志江沂建安人自少豪邁不羈登成化丙戌進士授監察御史出按外藩綽著能譽升四川副使致仕郡志楊恭榮子自幼慷慨博學以榮當國引嫌不仕榮沒䕃補尚寶寺丞升少卿卒處家積而能施鄰盜嘗逼境相戒勿犯楊氏且為扃鑰而去子士偉第進士郡志吳文光甌寧人成化丙戌進士除御史巡按浙江禁奸革弊無所顧忌杭大火民不堪命乃發倉給食及木植與民為居民賴以安歷河南按察使卒端重詳雅居官務存大體不察察為明於權要竟未嘗少屈郡志列女鄭氏余洪敬妻南唐查文徽平建州鄭氏為亂兵所獲文徽欲犯之鄭罵曰王師弔伐凡義夫節婦宜旌賞乃欲加非禮於一婦人文徽愧求其夫歸之余楚妻建陽人姓陳氏生子翼三歲楚卒陳氏盡以其産與前妻之子翼年十五遣遊學四方翼在外十五年以進士歸迎侍之官王安石為志其墓曹修古女修古知興化軍既卒不能歸葬賓佐賻錢五十萬季女泣白其母曰奈何以此纍吾先人也卒拒不納官勝娘建寧人夫方寧耨田勝娘饁之見一虎方攫其夫勝娘即棄饁奮挺連擊之虎舍去勝娘負夫至中途而死元時事聞旌之復其家徐氏浦城人名彩鸞李文景妻略通經史元末青田賊冦浦城彩鸞從父嗣源逃山谷賊欲害嗣源彩鸞前曰寧殺我賊舍其父彩鸞語父曰兒義不受辱今必死父可速去賊拘彩鸞至桂林橋彩鸞題詩壁間乃厲聲罵賊竟投水而死李智貞浦城人七歲能讀書九歲母病調護甚謹及卒哀慟欲絶治女工供祭祀及奉父甘㫖不乏父嘗許為鄭全妻邵武豪陳良强納采智貞斷髮拒之且數自求死良不能奪卒歸全泰定間全病殁智貞悲泣不食數日而死魏氏名璣建安人雷烇妻烇父拱尉興化烇與璣在侍至正壬辰冦亂拱奉檄守海口烇璣侍繼母假館福州烇卒明年拱亦卒璣悉以首飾易喪具扶二柩歸備嘗艱苦守節不渝郡志林氏字淑柔浦城人張伯成妻年二十而寡孤幼弱遭世亂舅姑繼沒乃攜子女依其兄凡十餘年逮洪武間始寧居紹服先業年八十餘卒鄉人謂其婦道母儀無愧古人云郡志劉氏建陽人年十八適熊剛中逾年而剛中卒昕夕哀慟不輟姑憐其少令以他適劉以死自誓乃求夫之猶子為夫後事姑孝言動必謹於禮年七十八卒洪武間有司上其事詔旌其門郡志江氏崇安人程啓隆妻生三女一男而啓隆卒江年二十七即以死自誓撫育諸孤雖極慈愛而不失內教外傅之嚴辛苦三十年不變其志有司上其事詔旌其門郡志朱氏建陽人文公七世孫女也適里人劉潭生子甫三歲而潭卒朱矢不食二姓撫教其子必以義方人稱為賢婦有司奏乞旌異未報而先卒郡志章氏名聰建安人魏夀孫之妻年二十八夫亡始生一子舅姑老而家貧聰守志四十餘年內外無間宣德間詔旌表其門郡志黃氏崇安人鄧文燮妻年二十八而文燮卒男仕濓生始九月黃抱而泣曰使是兒長成繼成宗祀無憾矣矢志不二弟嘗欲迎歸黃慮其有異竟不往仕濓成立遣遊邑庠為弟子貟事聞旌表郡志周氏建安楊仕儀妻兵部員外周炫女也歸仕儀踰年而寡遺腹生子孀居撫教其孤後第進士𢎞治壬子郡守為旌其事郡志張氏名閨建安人適楊士倫士倫遘疾張百方求禱不效乃刲股肉和粥以進疾瘳復作不可治比卒悲慟幾絶力襄大事誓不二志事姑盡禮撫二孤皆底成立云郡志倪氏政和陳受榮妻時古田寇發剽掠縣境倪與其夫避山中寇虜其夫倪不受辱投溪水而死郡志陳氏政和王明妻生子未周而寡往依母以居值沙尤寇亂備嘗艱窘節操不移邑令作詩記之郡志仙釋周史卿浦城人宋元祐中遇異人得養生之要隱油果山二十年煉丹垂成一夕風雷大作丹已失矣遂出神求之謂妻曰七日復來有一僧勸其妻曰學道者視形骸如糞土遂焚之明日史卿來空中啞啞責其妻而去白玉蟾瓊州人嘗於黎母山中遇異人授洞𤣥雷法後居武夷山嘗自讃云千古蓬頭跣足一生服氣餐霞笑指武夷山下白雲深處吾家宋嘉定中詔徴赴闕對御稱㫖命館大一宫一日不知所往後往來名山神異莫測詔封紫清明道真人扣氷和尚崇安人名藻光出家參雪峰真覺師在瑞巖院前有溪遇冬輒扣氷而浴馬道一漢州人容貌竒異幼落髮受戒於渝州圓律師唐開元中習禪定於衡山遇懷讓師密受心印登建昌石門山有洞壑之幽謂其徒曰吾當棲此遂沐浴跏趺而逝諡大寂禪師王法昌建陽人生不茹葷幼失父母落髮入福仙寺服勤苦事不拔生草不剪生柴著破衲以養蟣虱時常翻易使之均飽宋熙寧辛亥忽告人曰吾來年五月十八日當去至期果然人驚異之姚宥安福州人幼習儒術長落髮為僧宋熙寧中至建陽往武仙山一百二十里朝發午歸鐘樓頽朽人莫敢登宥安上梯解鐘如履平地劉朝奉祈嗣日與爾一了某年某月生可名姚哥至期果然人咸異之有禎福清人幼頴悟好讀書骨相秀奇落髮為僧遂潜心本宗閉户獨處若禪定然緇流聞風信向叢集者衆說法作頌皆造其極後端坐示寂所著有釋嚴經解明一統志卷七十六
