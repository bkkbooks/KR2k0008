唐李白梁園吟我浮黃雲去京闕挂席欲進波連山天長水濶厭逺涉訪古始及平臺間平臺為客幽思多對酒遂作梁園歌却憶蓬池阮公詠因吟淥水揚洪波芳林園在府城東北宋太宗在潛邸時太祖賜此地為園及即位號曰潛龍後改曰奉真又改曰芳林同樂園在府城東北宋徽宗置金師拓詩晴日明華構繁隂蕩緑波蓬丘滄海遠春色上林多流水時雖逝遷鶯暖自歌可憐歡樂極征鼓散雲和玉津園在府城南宋都人遊賞之所劉敞詩垂楊冉冉籠清籞細草茸茸覆路沙長閉園門人不見禁渠流出雨殘花西園在陳州城西宋知州張詠創中有七亭曰流芳中燕流杯香隂環翠洗心望京有閣曰冷風堂曰清思晏殊以故相守此於此得隙地有莎叢生殊愛護之為莎場既成作庭莎記曲水園在許州城北有大竹二十餘畝潩水貫其中以入西湖最為佳處宋文彥博為守時買得之賈昌朝來代一日往遊題詩壁間云畫船載酒及芳辰丞相園林潩水濱虎節麟符拋不得却將清景付間人宜春苑在府城麗景門外宋人號東御園王安石詩宜春舊臺沼日暮一登臨解帶行蒼蘚移鞍坐緑隂樹疏啼鳥逺水靜落花深無復增修事君王惜費金瓊林苑在府城西鄭門外宋嘗宴進士於此衡雍在滎澤縣西北一十五里左傳晉文公敗楚師於城濮遂至衡雍作王宮於踐土今故城西北有踐土臺即諸侯盟處互鄉在商水縣論語云互鄉難與言即此桑落在陳州界即孔子絶糧處宋劉敞詩四海栖栖一旅人絶糧桑落死生鄰自是天心勞木鐸豈關陳國有愚臣沙海在府城西北一十二里戰國䇿齊欲發卒取周九鼎顔率説曰夫梁之君臣欲得九鼎謀于沙海之上為日久矣謂此隋文帝疏鑿舊迹引汴水習舟師平陳後立碑其側以紀功今塞夷門史記大梁城其東門曰夷門魏有隱士侯嬴年七十家貧為夷門監者為公子無忌畫計厚遺之不受固陵在陳州城西北三十里史記項羽南走固陵即此古戰場在廣武山下即漢楚戰處唐李白詩有云秦鹿奔野草逐逐若飛蓬項王氣蓋世紫電雙明瞳呼吸八千人提兵起江東赤精斬白蛇叱吒入關中楚滅無英圖漢興有竒功按劍清八極歸酣歌大風伊青臨廣武連兵決雌雄戰爭有古迹壁壘頽層穹繫馬樹在滎陽縣東七里本一古槐樹形甚竒怪世傳漢髙祖為王時繫馬於此金趙秉文詩滎陽縣東千古槐人言曾見漢朝來不知幾覺南柯夢直到如今喚不回汴河故道汴河舊自滎陽縣東經府城內又東合蔡河名茛菪渠又名通濟渠東注泗洲下入于淮纍因河決其蔡河湮沒無迹而汴河自府城中牟縣入黃河矣髙陽里在許州城內漢荀淑所居里舊名西豪潁隂令苑康以為髙陽氏有才子八人今荀氏亦有八子改其里曰髙陽關聖故宅在許州俗云一宅分兩院今有祠存焉陳橋驛在府城北四十里即宋太祖為衆所立處夀山艮嶽在府城東北隅宋徽宗所築初名鳳凰山後改夀山艮嶽其上有華陽宮山周回十餘里峯巒嶂巘洲渚池沼怪石古木珍禽竒獸宫殿館閣堂亭臺榭名有名號不可殫紀悉為金兵所毁唯土山尚存蔡雍斷碑在延津縣治雍嘗為酸棗令劉書撰去思碑斷碣存焉唐王建詩蒼苔滿字土埋龜風雨銷魂絶妙詞不向圖經中舊見誰人知是蔡雍碑張敬因碑宋歐陽修集古録云碑是顔真卿撰并書在許州長社縣民田中慶厯中稍稍有模之者民家患其踐田稼擊碎之豫在滁陽遣人求之得大碑闕一段其文不可次第獨其名氏存焉曰君諱敬因南陽人也乃祖乃父曰證曰運其字畫尤竒名宦周孫叔敖楚莊王破陳既而又封之乃使叔敖為相叔敖絶汝墳之水作塘以溉田民獲其利漢周苛以御史大夫守滎陽項羽破城苛罵不絶口羽怒烹之唐李觀碑稱其能立節顯主汲黯武帝召為淮陽太守黯以病辭上曰顧淮陽吏民不相得吾徒得君重臥而治之在郡十載政清民安卜式武帝時欲使治民自緱氏遷成臯令厯有政聲韓延夀昭帝時淮陽太守治甚有名徙潁川太守民多豪強難治乃教以禮讓定嫁娶喪祭儀品略依古禮百姓遵用之尤納善聽諫斷獄大減為天下最趙廣漢昭帝時翟陽令治行尤異後遷潁川太守大姓原褚宗族恣橫廣漢誅之又豪姓為黨乃為缿筒使相告訐以散之威名流聞何並潁川太守郡掾鍾威倚兄廷尉勢與輕俠漁食閭里至姦人婦女持吏短長縱橫郡中並至捕殺之表善好士一郡清靜薛宣成帝時臨淮太守政教大行後徙陳留盜賊禁止吏民敬其威信焦延夀小黃令辨别姦細愛養吏民化行郡中舉最當遷民上書留之詔增其秩卓茂成帝時為密令視民如子吏人親愛不忍欺有言亭長受遺米肉者茂曰律設大法禮順人情且歸念之數年教化大行道不拾遺後遷京部丞密人老少皆涕泣隨送冦恂光武時潁川太守密人賈期為亂衆數萬恂平之尋遷汝南時潁川盜起恂從車駕南征百姓遮道曰願借冦君一年乃留恂長社鎮撫樂俊建武中浚儀令時陽武令張汜上言河決積久宜改修隄防俊復上言元光間人庶繁盛而瓠子河決尚二十年不即壅塞今新被兵革宜須平淨更議其事乃止郭伋建武中除潁川太守帝勞曰賢良太守去帝城不逺河潤九里冀京師蒙福時盜賊羣起伋招懷之降者悉遣歸農餘黨聞伋威信降者絡繹不絶玊况建武中陳留太守務行德教一嵗蝗大起過郡界不集五穀獨豐玉音宿魯恭肅宗時為中年令専尚德化不任刑罰時螟傷稼不入中牟河南尹遣掾廉之與恭坐桑下雉過兒童傍掾曰何不捕之兒曰雉方將雛掾瞿然曰蝗不犯境化及鳥獸竪子有仁心此三異也即具狀白府馬嚴建初時陳留太守明賞罰發姦慝盜賊屏息郡界清寧秦彭建初末潁川太守郡有鳳凰麒麟甘露嘉穀之瑞章帝巡行輒賞賜錢穀戴封永元初為西華令蝗不入界時督郵行縣蝗忽大至督郵去蝗亦頓除一境竒之嵗大旱禱雨不獲封乃積薪自焚火起而大雨至逺近歎服周舉順帝時為平丘令上書言當世得失辭甚切正尚書郭虔等見之歎息稱其忠直韋義順帝時為陳縣令政甚有績官曹無事牢獄空虛雷義南頓令清白持身吏有貪墨者聞風竄逸李祥淮陽太守時經喪亂民多流徙祥撫巡有方歸者萬餘家劉矩桓帝時雍丘令以禮讓化民其無孝義者皆感悟自革民有爭訟者矩引喻之皆感悟罷去有得路遺者皆推尋其主棗祗陳留太守時嵗旱軍食不足祗建置屯田以致所在倉廩積粟軍國以饒三國司馬岐魏陳留相梁郡有繫囚多所連及數嵗不決詔徙獄於岐屬縣請預治牢具岐曰豈當久處囹圄及囚至詰之皆不敢匿詐一朝決竟傅祗魏滎陽太守時郡有水患祗築沉菜堰以防之自是兗豫無水患百姓立碑頌功殷裒魏滎陽令興學教民民知禮讓歌曰滎陽令有異政立學校人易性令我子弟恥爭訟晉陸雲浚儀令下不能欺市無二價人有見殺者主名不立雲録其妻十許日遣出密令人尾之得一男子與語者縛之乃與所通而共殺其夫者一縣稱為神明曹攄惠帝末為襄城太守時屢經寇難攄撫綏經理旬月克復祖逖以豫州刺史鎮雍丘愛人下士克己務施百姓感悅大興攻討黃河以南悉為晉土及卒豫州士女若喪考妣為之立祠郭誦陽翟令阻水築壘且耕且戰為滅石勒計賊至設伏破之隋郎基鄭州刺史兼守潁川時侯景亂後人多犯法積嵗留滯基數日間剖斷殆盡劉曠開皇間為臨潁令清名善政為天下第一帝召見勞之遷營州刺史房彥謙仁夀初為長葛令甚有惠化百姓號為慈父吏能為天下第一張須陀滎陽通守有勇略李密説翟讓取洛口倉共率兵逼滎陽須陀拒之讓懼而退須陀逐北為密伏兵邀擊須陀潰圍出左右不能盡出復躍馬入救衆皆敗散仰天嘆曰兵敗如此何面目見天子乎下馬戰死劉幟成臯令政有恩惠大業末長吏多贓汚幟清節逾厲風教大洽獄無繫囚唐狄仁傑貞觀中汴州參軍為吏誣訴閻立本召訊異其才謝曰君可謂滄海遺珠矣子光嗣為許州刺史罷不切之征奏毁淫祀時論韙之馮淑元浚儀令不挈妻子俸餘給貧窮右善去惡人稱神明王珣許州長史嵗大旱珣乃假刺史事開倉賑民即自劾玄宗赦之倪若水開元初為汴州刺史政清靜增修孔子廟興州縣學廬勸生徒身為教誨風化興行齊浣汴州刺史地當舟車湊集事浩繁前刺史數不稱職唯倪若水與浣以清毅聞吏民頌美李雍陳州刺史拯孤恤窮救乏賙急玄宗封泰山還雍見帝汴州獻詞賦帝悅陸景倩扶溝丞河南按察使畢構覆州縣殿最有吏言狀曰某強清某詐清惟景倩真清張巡天寶末為真源令起兵討賊至睢陽與許逺等合賊將尹子竒攻之巡勵士屢戰賊潰尋復圍城士多餓死巡殺愛妾以饗之圍益急巡西向拜曰生不能報陛下死為鬼以癘賊城遂陷巡與許逺南霽雲雷萬春姚誾等俱被執遇害龎堅薛願天寶末堅為潁川太守安祿山反南陽魯炅表堅為長史而以願為太守共守潁川賊攻之急二人死守久之糧乏援絶城陷而死李勉開封尉汴俗龎錯號難治勉摧姦決隱大有能名裴度貞元初為河隂尉元和末以宰相都統諸軍討蔡州戒諸將無得妄殺數州之人多所全活韓愈為汴宋亳潁等州觀察推官憲宗時裴度討蔡州奏愈行軍司馬先入汴説韓𢎞使叶力淮蔡平遷刑部侍郎髙承簡溵州刺史治郾城始開屯田列防庸瀕溵綿地二百里無復水患皆為腴田狄兼謨文宗時鄭州刺史嵗旱發粟賑飢民不流徙崔安濳忠武軍節度使乾符初王仙芝冦河南安潛募人增陴繕械號令精明賊畏之不敢犯境五代王彥章梁鄭州防禦使與唐將戰馬踣被擒莊宗愛其驍勇欲全活之彥章曰朝事梁暮事晉生何面目見天下之人乎終不從遂見殺王朴周汴京留守廣新城通道路及修汴口斗門東京之制多其規畫薛居正漢開封府判官乾祐初史𢎞肇部下吏告民犯鹽禁法當死居正疑不實捕吏鞫之具服抵法宋吕餘慶初仕周為許州推官秉正不阿臨事有斷入宋知開封府弟端厯知浚儀開封二縣臨事果決待民以寬宋琪乾德中開封府推官時太宗為府尹甚加禮遇後通判府事京府置通判自琪始程羽開寶中開封判官性淳厚涖事恪謹時太宗尹京頗以長者待之後知開封府曹彬太祖時忠武軍節度使又徙天平軍子璨亦為忠武軍節度使名重當時張詠太宗時賜緋魚知浚儀縣會李沆宋湜冦凖連薦其才以為荆湖北路轉運使後知陳州王明知鄢陵縣時吏多受賂嵗有常數明至民以例有所獻明曰可人致數束薪芻水際民不喻其意即得十數萬取以築隄由是民不被水患後又為陳州判官雷有終淳化中知許州長於吏事細微必察以故人無寃滯從子孝先知宛丘縣亦有政績王旦太宗時通判鄭州表請天下建常平倉以塞兼并之路弟旭知雍丘縣亦有能聲楊礪真宗尹開府時礪為推官盡心民事無敢干以私者李穆知開封府剖判精敏豪右屏迹權貴無敢干以私太宗益知其才梁皓景德初權知開封府子適亦權開封府又知鄭州有風采明于法令教條嚴而難犯畢士安真宗時知開封府時近臣有強取民間定婚女士安奏還之子仲衍為陽翟主簿邑子馬宏橫閭里仲衍捕治之一縣相賀王彬雍丘尉皇城司隂遣人下畿縣刺事多厲民彬捕鞫之得所受賂致之法自是詔親事官母得出都城錢昆知許州為治尚寬簡每有一毫傷民之事則毅然不為樂黃目咸平中知浚儀縣上言知州縣令引見御前試時務第取其明於吏治達于教化者充選則官得其人矣後權知開封府持正奉法吏民畏而愛之石普知許州築大流堰引河通漕時真宗崇符瑞普請罷天下醮設省緡錢以贍國用薛奎權知開封府為政嚴敏擊斷無所貸仁宗重之魏瓘開封倉曹參軍持法精審明吏事弟琰通判陳州適嵗飢百姓以強取人粟坐死者甚衆琰曰此迫于窮餓耳止坐其首黥之王平許州司理參軍有女騎驢單行盜殺之驢逸入他家吏捕得驢併致其人于獄平力爭久之果得盜李若谷長社縣尉時許州葺兵營課民輸木吏以不中程多退斥欲苛苦輸者因以取賕若谷為程置庭中使民自輸李防開封府推官後又知應天府鑿府西障口為斗門泄汴淤旁田數百頃民甚利之呂夷簡真宗時權知開封府為治嚴辨有聲仁宗時兩以宰相判陳許州子公綽公弼公儒皆相繼知開封府陳堯佐仁宗時與弟堯咨相繼知開封皆有政績石揚休知中牟縣地瘠民貧賦役煩重富人隸太常為樂工僥幸免役者凡六十餘家揚休請悉罷之錢明逸知開封府平居樂易無崖岸而居官獨立守繩墨為政簡靜有條理不肯徇私取顯韓琦仁宗時開封府推官子忠彥亦為開封判官俱有惠政曾公亮仁宗時知鄭州為政有能聲盜悉竄他境至夜户不閉後又知開封府有惠政范仲淹仁宗時通判陳州上言罷修寺觀減市木之數以蠲積負又知開封府明敏通達決事如神都民謠曰朝廷無憂有范君京師無憂有希文李士衡知陳州州大水築大隄以障水患居官廉靜不為矯激龎籍開封府法曹參軍擢遷判官尚美人遣內侍傳旨免工人市籍籍言祖宗以來未有美人敢撓府中者於是仁宗杖內侍詔禁宮中傳命賈昌朝仁宗時兩判許州在官視事専以惠愛存心境內無盜鄭戩知開封府敏強善聽決政有能迹府吏馮士元素為姦利奉權貴戩發其姦流海島榮諲開封府判官太康民事浮屠法相聚祈禳號白衣會縣捕數十人送府尹賈黯疑有妖請殺其為首者而流其餘諲持不從各具議上之中書是諲議但流其首而杖餘人包拯仁宗時知開封府剛毅不撓令訟牒徑造庭下辨曲直吏不敢欺凡勢族築園榭侵民利者劾奏毁去之京師語曰關節不到有閻羅包老歐陽修知開封府承包拯威嚴之後簡易循理不求赫赫京師亦治王拱辰權知開封府不以詞章自驕終日究心民事治聲赫然蔡襄知開封府精於吏事談笑剖決破姦發隱吏不能欺王疇皇祐中為開封府推官內侍李允良訴其叔父死疑為仇家所毒請發棺驗視疇曰安知非允良有姦窮治果與叔父有怨孔道輔仁宗時知許州徙知應天府遇事即剖斷不徇私請馮京知開封府數月不詣丞相府京富弼壻宰相韓琦語弼以京為傲京聞之曰公為宰相從官不妄造請乃所以為公重非傲也王素至和中知開封府秋大雨蔡河裂水入城詔軍吏障朱雀門素曰兵民廬舍多覆壓衆心怦怦然奈何更塞門以動衆違詔止其役水亦不害韓璹開封府司録嘉祐寬恤諸道璹曰京師諸夏本顧獨不蒙惠乎乃具徭役利害上之詔司馬光等詳定條式遂革大姓漁并之弊吳奎仁宗時通判陳州後權開封府達於從政應事敏捷吏不敢欺豪猾畏斂治聲赫然范鎮知陳州嵗方飢擅發錢粟以貸即自劾詔原之是嵗大熟所貸悉還楊繪開封府推官遇事迎刃而解諸吏惟日不足繪未午率沛然後又知應天府李淑知許州嵗飢取民所食五種上之帝惻然為蠲其賦滕甫知開封府時三獄皆滿甫視事未幾決遣殆盡京師翕然稱之李絢為開封府推官盡心民事後為知府京師多老姦宿猾吏不能擒絢推迹其物色起居一時録治略盡威令大行陳希亮仁宗時開封府司録先是青州人趙禹上書言元昊必反被流及昊反禹至京自理時相怒下禹獄希亮言禹不可罪上釋禹賞為徐州推官竇卞開封府推官方禁銷金為衣皇城卒捕得之屬卞治以中禁為言奏曰真宗行此制自掖庭始今不正以法無以示天下英宗從其請杜衍英宗時知開封府權要聞衍名莫敢干以私其為政以聽斷盜賊為能否沈遘知開封府蚤作視事逮午而畢從容燕笑沛然有餘暇士大夫交稱其能范純仁知襄城縣勸民植桑有罪情輕者視其所植多寡除其罰後又知襄邑縣衛士牧馬踐民稼純仁捕杖之言恤兵當先恤民朝廷以為是弟純禮嘗知開封府務去苛刻一切以寬處之陳襄知陳州濬溝以泄水患州人賴之忽州瓦屋冰文皆作鳥獸花果狀屬官請奏瑞襄曰此非瑞但有此異不可不奏人以為知大體孫覽知尉氏縣有屯將遇下嚴酷士卒欲謀殺之以叛覽聞之往諭曰將誠無狀然天子何負汝輩欲為族滅計衆皆感謝帖服呂公著熙寧初知開封府率五鼓視事賓僚至者不拘時見以故府無廢事下情易達李琮知陽武縣役法初行琮處畫盡理旁近民相率撾登聞鼓願視以為則章衡熙寧中知鄭州奏罷原武監弛牧地四千二百頃以豫民吳育知襄城縣請母容使者妄索羊豕民省供費殆半異時宗子所過縱鷹犬暴民田入襄城境毋敢縱者蔡延慶開封府推官有衛士告黃衣老卒筒火入直延慶察卒詞色疑焉詢之果為所誣即反坐告者事聞神宗器重之吕溱知開封府時為京兆尹者比不稱職溱精識過人辨訟立斷豪惡斂迹王存知開封府京師並河居人盜鑿汴堤以自廣或請令培築復故又按民廬侵官道者使撤之已有詔存入言之即日弛具役都人歡呼相慶趙瞻開封府推官神宗問青苗法便乎對曰唐行之於季世擾攘中掊民財誠便今欲為長久計愛養百姓誠不便劉庠知開封府奏論新法不便神宗諭之曰卿奈何不與大臣協心濟治對曰臣知事陛下不敢附安石程皓知扶溝縣廣濟蔡河在境內瀕河惡子脅取行舟財貨皓捕一人使引其類貰宿惡分地處之令以挽繂為業且察為姦者自是境無焚剽患樂京知長葛縣助役法行京曰提舉常平官言不便使之條析又不報且不肯治縣事自丏去蘇軾神宗時以言事忤王安石命權開封府推官以困之軾決斷精敏聲聞益逺弟轍為陳州教授又簽書南京判官王安禮知開封府事至立斷前滯訟幾萬人安禮剖決未三月囚繫皆空吕大防哲宗時權開封府有僧誑民取財因訟至庭下驗治得情命抱具獄即其所杖之他挾姦者皆遁去范百祿知開封府勤于民事獄無繫囚僚吏欲以圄空聞百祿曰此至尊之仁非尹功也錢協元祐初知開封府老吏畏其敏欲困以事導人訴牒至七百協隨即剖決簡不中理者緘而識之戒無復來閲月一人又至呼詰之曰汝前訴云云啓緘信然上下皆驚吒王巖叟知開封府都城羣偷所聚淵藪詭僻巖叟令掩捕隨輕重決之根株一空任伯雨知雍丘縣御吏如束濕撫民如傷縣枕汴流舊多盜伯雨下令網舟無得宿境內自是外户不閉向子諲知咸平縣豪民席勢犯法獄具上開封尹盛章方以獄空覬賞却不受子諲以聞詔許自論決吳擇仁元祐中雍丘主簿後畿內飢多盜以知太康縣擇仁曰民窮而盜非天性也我以靜鎮之若故犯者弗貸羣盜相戒不入境王襄崇寧中知開封府府事浩穰訟者株蔓千餘人縲繫滿獄襄晝夜決遣四旬俱盡又閲月獄再空霍端友知陳州為政以寬不立聲威陳地久雨則積潦時疏新河去淮尚逺水不時泄端友請益開之達於淮自是水患遂去蔣興祖知陽武縣縣土脈脆惡大河薄其南嘗積雨泛溢興祖躬救護露宿其上彌四旬隄以不壞治為畿邑最葉夢得徽宗時帥潁昌府時旁郡糾民輸鏹就糴京師獨潁昌賴夢得獲免內侍李彥括公田以黠吏告訐籍屬縣隱田數千頃夢得捕吏按治之郡人大悅宗澤靖康初知開封府時敵騎留屯河上盜賊縱橫樓櫓器械無一存者澤乃捕盜賊撫軍民修武備纍挫敵兵由是盜賊屏息民賴以安金程震興定初陳留令農桑有效徴科均平治為河南第一李晏中牟令會海陵方營汴京運木於河晏領之晏以經三門之險前後失敗者衆乃白行臺以其木散投之水使工取於下流人皆便之王浩哀帝時為扶溝令時民多執縣官送欵于元以浩有恩不忍加刃勸之降終不聽於是殺之棄尸自春徂夏儼然如生烏犬不敢近如有神護者劉仲傑郾城令築隄以防溵水民得安居時境多軍壘無敢侵漁於民者元楊惟中河南道經略使治汴梁先是以萬户劉福為總管貪鄙殘酷虐害民二十餘年惟中召福至擊仆之數日死河南大治陳祐南京總管兼開封尹吏多震懾失措祐曰何必若是前為盜跖今為顔子吾以顔子待之前為顔子今為盜跖吾以盜跖待之由是吏知修飾不敢弄法袁裕開封府判官洧川縣達嚕噶齊貪暴盛夏役民捕蝗禁不得飲水民不勝忿擊之而斃有司當以大逆置極刑者七人裕議止誅首惡一人餘各杖之有差中書從其議史天澤河南路經略使興利除害政無不舉誅郡邑長二之尤貪橫者二人境內大治王忱汴梁路總管政清訟簡吏民懷之嘗籍羌族之不供公役者萬餘以築河防民賴其利齊克中扶溝縣簿升延津縣尹嵗凶民多流亡克中撫慰招徠咸得其所及代去數嵗過延津百姓猶感泣而迎送之商夢弼至元中原武縣尹蒞政勤敏按無凝滯決獄明信人無敢輕犯者趙志至元中長葛尹為政寬和撫字有方流民咸歸焉邑地下濕纍嵗不登志相其宜使為水田旱則決潩水灌之民獲其利劉天孚知許州有治績嵗大旱天孚禱即雨野有蝗天孚令民出捕俄羣烏來啄蝗為盡韓守中至正中洧川縣尹興學教民盜賊屏息邑人立碑頌之路義順帝時郾城簿勞心字民凡蠧政撓法者必治之本朝安然洪武初河南行省參政時蔡河壅塞自開封抵陳州漕運不通然親督工師疏導之不逾月而功成官民兩便王博洪武初開封知府時流移新復反覆未定博寬其徭役禁其侵攘教民闢土地藝蠶桑期年之間民獲其利遂安生理周矩洪武初知中牟縣為政廉明廢事悉舉先是民居數有火災禁其夜作矩弛其禁但俾儲水以防民翕然稱便徐士涓洪武初河南按察副使風紀振肅年髙行篤出巡南陽值大旱齋沐虔禱甘雨隨注嵗大熟至蓬池郡忽生竹一枝於廳側土産所無人以為異劉恭獻洪武初陳州知州平徭均稅撫綏勞來不期年間流民復業者至五百餘户復立社學擇賢師以教幼稚由是民知向學陳霖洪武初許州知州嵗歉民多流徙霖使民導湖水注别壑縱民取魚藕自給賴以全活者甚衆滿去民思齊勉洪武初尉氏知縣清慎蒞職先是雙洎河水為患築堤六十餘里又康溝河淤塞復疏通之自是尉氏并鄰邑俱免水患齊原芳洪武初郾城縣丞元末兵燹城邑丘墟原芳繕城邑修室廬督農事通商賈流民聞風而歸者九百餘户劉茂洪武初河隂知縣公廉有為力行善政時兵革之餘能盡心撫綏凡廨舍廟宇皆經營創置吏民悅服有古循良風郭敦洪武初河南布政司參政廉明勤約才識超邁時京師營造敦率民赴役民聞敦行皆歡趨之無後期者王平洪武中河南按察僉事廉介明敏為政有聲行部至孟津有司斂財以賂平械其人并所賂以聞朝廷嘉其得憲體賜文綺襲衣鈔定仍降璽書勞勉之進升左僉都御史劉紹洪武中延津知縣教民墾田樹桑棗惰農及犯輕罪者俾伐材木以修學宇自是訟簡田闢而學校興又教民蠶織每婦女令月織布二端官為點視由是民知務本無飢寒之嘆李子儀洪武中陳州知州務勤儉敦禮讓孜孜興學州地多卑下督民築堤以防水害俗尚奢侈教民量出入戒暴殄於是州無水災而人知節儉李本中洪武中知通許縣清謹公平遇徭役必驗丁力親為編遣吏胥縮手貧民無耕具者必為借貸使不失業邑人慕其德黃福洪武中項城主簿臨政廉公吏民懷畏邑有好訟者福拘而置之法由是訟平政簡孫玄仁洪武中商水縣丞導民以德不尚刑罰尤興學課農能聲籍籍有兄弟爭田乃以言化之遂感泣相讓由是政化大行孔秉忠洪武中郾城典史沙河水嵗為患秉忠率民築堤四十餘里其患遂息以至治民事神各得其道以能升信陽知縣許譽洪武中儀封知縣俗多遊民譽榜禁之且曰不遵告戒是謂棄民由是民皆自服田野闢盜賊息境內熙然李遵義洪武中新鄭知縣性明敏有果斷睱則巡行於鄉民之貧富丁之壯弱記憶無遺嘗有富民妄訴其貧者遵義詰之其人驚服又斷訟曰某也詐某也實人服其明余崇瞻洪武末祥符知縣清慎廉勤邑民宋義避水他所及歸亡其所瘞金訴為鄰人所取崇瞻廉知為義甥馬斗保取之乃以計令人紿其妻拘問盡得金給義人稱其明婁觀洪武末鄢陵知縣民多豪猾難治觀選邑中老成人素信服者使陳德義以勸諭之遂皆感化又貧民負稅者捐俸置酒殽請其富者貸輸之民懷其德馬文炯永樂初扶溝知縣蒞政廉謹撫民寬和不尚刑法専務德化民之姦惡者自勸流移者自歸盜賊亦皆自息逺近稱之程新永樂初河南布政司右參議臨事不徐不亟訟者至庭一言取決人服其明公暇觀書不輟或問之新曰古人為政之方盡在是何可一日舍去章以善永樂初知杞縣初小民困於輸賦以善第為三等量貧富以定其程之逺近役之輕重民皆稱便陳璉永樂初許州知州儉約廉平俗多淫祀璉諭戒之民遂更俗暇則編集古書所載明人倫厚風俗勵士勸善之語為志以傳周文褒永樂中河南左布政司勵志勤政察官民利病陳奏嘗曰方面當以勸懲為先故有過惡不改者必重懲之白瑜永樂中鈞州判官廉勤有為均平賦役凡利於民者即興之妨於衆者即去之恤其飢寒惟恐一民不得其所秩滿民不忍其去保留復任終始如一傅啓讓永樂中河南按察僉事賊殺長葛教諭吳晉劫其財經年不獲啓讓微行得生員胡昭者拘鞫之初未服潛令人紿其家曰已招矣令取當時衣來而血漬猶存昭始服罪并同謀五人悉置于法人服其明劉咸永樂中河南按察僉事律已清廉用法平恕巡厯郡縣凡忠孝節義可激厲風俗者必表而題詠之文章政事時為首稱徐正永樂中知陳留縣蒞政仁恕濟貧民招逃移屯軍擾民者嚴禁之又置集場以通商貨民賴其利而懷其德萬信宣德間開封知府守職廉勤夜夢一男子裸身稱寃曰某為樣符民耿羊兒所殺尸埋莊後信驚悟明日至其家果得尸考驗具服人皆異之在任嵗久一夕澡畢燃燭廳事呼酒獨酌召二子曰強毅可建事功忠孝可通神明我去汝勉為之言訖遂逝是夜巡撫侍郎夢信來辭儀衛甚盛黎明報信卒人以為神曾泉宣德中以御史謫任泛水典史蒞政勤能頻課生徒校官厭之泉乃選四鄉俊秀自教之三年多有成材邑臨黃河教民結網捕魚大得其利時督民開荒田伐材木耕無牛者助之顛連者得棺以送死貧乏者得財以成婚民感其惠為立生祠于謙正統初巡撫河南興利除弊綽著成績嘗因河決汴隄告天誓以身殉其決遂息民為立庇民祠以祀之省志喻茂堅初以監察御史巡按河南清理戎政剔姦刮蠧宿弊一清升去軍民號泣攀援於道者絡繹不絶省志張志道正統初知陳州勸課農桑教民耕織嵗大蝗鄰邑被災志道遍禱於神蝗不入境省志賈威正統初知滎陽縣扶善懲惡在任九年無一民越訴者巡撫侍郎于謙署其考曰究心民事克舉厥職且榜諭闔治縣僚觀法比卒官民痛惜之省志周庠正統末知陳州時陳民流徙甚衆庠招來撫綏授田給種俾之耕植民皆安業省志王暹景泰間巡撫河南築隄置堡以捍河溢沁泄為漕河之助暹之力也省志甄完景泰中任河南布政使政尚平恕時嵗大祲首發倉廩賑恤民賴以全活省志王亮景泰間任河南右布政使修築河防綽有成績省志陳紀天順初知許州取法程明道為政著四事六戒等針以自勵省志鄭賢天順間新鄭知縣以疾引致仕去囊無長物省志周斌天順末知開封府鋤強扶善一無所憚柔懦者賴生全焉省志張岫成化中知開封府養賢育民以績最尋升去省志王珣成化中知睢州以績著賜幣旌勞秩滿民乞留升授四品祿仍任三年省志何經成化末巡撫河南兼撫荆襄撫循有道南陽流徙之民賴以生活者甚衆省志邵寶成化末知許州綽有治績至今百姓歌之省志韓文𢎞治中巡撫河南有聲民祠祀之省志毛伯溫正德中巡按河南彈劾不避貪墨者望風解綬而去省志徐讚嘉靖初以副都御史巡撫河南撫流移鋤姦惡均賦役善政縷縷在民省志王慎中嘉靖初以僉事提學河南拔淹振滯甄别靡不明確士類為之輸誠省志流寓韓思彥唐鄧州人舉下筆成章志烈秋霜科纍官蘄州録事參軍嘗客汴州有張僧徹者廬墓三十年詔表其閭請思彥為頌餉縑二百不受固請為受一匹命其家曰此孝子縑不可輕用錢惟演本杭州人父吳越王俶歸宋賜第開封遂家焉惟演少有俊才纍官翰林學士兵部尚書樞密使從弟昆進士及第纍官右諫議大夫易纍官翰林學士王旦本大名人父祜官汴京因家焉旦舉進士纍官右僕射三遷至太尉天下稱為賢相三子雍司封郎中沖左贊善大夫素尚書左丞以工部尚書致仕馮元本始平人三世仕嶺南為日官隨劉鋹歸宋遂家開封博通五經舉進士纍官國子直講真宗召講周易泰卦元推君臣交感之義上大悅仕終户部侍郎楊億建州蒲城人宋太宗時以童子召對授祕書省正字終翰林學士以從祖徽之嘗知許州億依焉遂家潁川田京本滄州人徙鹿邑舉進士纍官兵部郎中知滄州拜右諫議大夫卒京為人尚氣節喜論議著天人流術論通儒子十數書韓億真宗靈夀人徙雍丘億以文學起家致位政府葬其父保樞於許之長社遂為許人八子綱綜絳繹維縝緯緬人稱八鳳杜衍會稽人寓家睢陽宋慶厯中為宰相出知兗州後以太子少師致仕衍清介舊無居第既退方葺舍南都出入如平日無軒冕者范純仁蘇州人仲淹子以前宰相三守潁昌弟純禮尚書右丞純粹户部侍郎兄弟並居于許蘇轍眉山人宋元符間歸自嶺海崇寧中降朝請大夫罷祠居許州築室於許號潁濱遺老兄軾亦嘗寓潁昌程皓程頤河南人皓以御史言新法失職後起知扶溝縣舉與頤奉其父珦皆往及任滿韓維兄弟招延之家寓潁昌上蔡謝良佐建安遊酢林大節南劒楊時皆嘗至潁昌從二程學明一統志卷二十六
