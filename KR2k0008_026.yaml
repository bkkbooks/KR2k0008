body:
  text: 明一綂志卷二十六明李賢等撰河南布政司河南古豫州地漢置豫州刺史察舉潁川河南等郡而不常所治東漢置司隸校尉治洛陽而别置豫州於譙郡唐於此置河南道開元中置都畿河南河北三道採訪處置使而都畿道治東都河南道治陳留河北道治魏郡宋都於汴置京東東西二路安撫使以開封河南守臣兼領元於此置河南江北等處行中書省河南江北道肅政㢘訪司本朝置河南等處承宣布政使司領開封彰徳歸徳衛輝懐慶河南南陽汝寧八府置河南都指揮使司領宣武南陽信陽彰徳𢎞農陳州懐慶河南潁川睢陽十衛并潁上守禦千户所置河南等處提刑按察司分河南河北二道兼察諸府州衛所三司並治于開封云開封府上東至直隸鳯陽府宿州界五百一十五里西至河南府鞏縣界三百六十里南至汝寧府上蔡縣界四百里北至衛輝府汲縣界一百七十里自府治至京師一千五百八十里至南京一千一百七十五里糧七十一萬九千三百石零建置沿革禹貢兗豫二州之域天文角亢分野春秋鄭衛陳三國之境戰國魏都於此號為大梁秦為三川郡地漢為陳留郡地晉改為陳留國東魏廢國置梁州及陳留開封二郡北齊以開封省入陳留郡後周改梁州為汴州隋初廢陳留郡州如故大業初廢州以其地併入滎陽梁潁川等郡唐武徳初於此置汴州天寳初復改為陳留郡乾元初又為汴州興元初自宋州徙宣武軍於此五代梁都於此號為東京置開封府後唐復為汴州及宣武軍晉漢周皆為東京開封府宋因之金以此為汴京貞元初又改為南京宣宗南遷復都焉元初改為南京路至元中又改為汴梁路本朝洪武元年仍改開封府領州四縣三十祥符縣附郭漢為浚儀縣屬陳留郡魏晉以後皆因之東魏於此置梁州後周改汴州隋廢陳留郡以縣屬鄭州唐於此置汴州以開封縣省入尋復舊宋初改祥符縣金元因之本朝復以開封縣併入編户一百五十八里陳留縣在府城東五十里古有莘城春秋為留地屬鄭後為陳所併故曰陳留秦始置陳留縣漢為陳留郡治晉末郡縣皆廢隋初復置屬宋州後屬梁郡唐初屬杞州又改屬汴州五代屬開封府宋金元仍舊本朝因之編户三十九里杞縣在府城東一百里古雍國黄帝之後殷周皆以封夏後為杞國漢置雍丘縣屬陳留郡後魏屬陽夏郡隋初置杞州大業初廢州以縣屬梁郡唐復置杞州尋廢五代晉始改杞縣漢周至宋仍曰雍丘金復為杞縣元仍舊本朝因之編户八十四里通許縣在府城東南九十里本漢陳留扶溝二縣地宋初始置通許鎮咸平中陞為咸平縣屬開封府金改通許縣元仍舊本朝因之編户一十二里太康縣在府城東南二百一十里本夏太康所築城漢置陽夏縣屬淮陽國東漢屬陳國晉屬梁陽國後魏置陽夏郡隋改縣曰太康屬匡城郡後復置夏郡改縣曰匡城縣隋末廢唐初復置屬陳州五代梁屬開封府宋宣和初屬拱州金屬開封元屬汴梁本朝仍舊編户三十五里尉氏縣在府城南九十里本春秋鄭大夫尉氏之邑秦始置尉氏縣漢屬陳留郡晉及後魏因之北齊省隋復置屬許州後屬潁川郡唐屬洧州後屬汴州宋屬開封府金元仍舊本朝因之編户二十里洧川縣在府城西南一百五十里本春秋鄭之曲洧漢為淮陽國扶溝縣地唐置洧州貞觀初廢宋為宋樓鎮屬尉氏縣金始置洧川縣屬開封府以洧水為名元仍舊本朝因之編户一十七里鄢陵縣在府城南一百六十里春秋鄭邑鄭伯克段于鄢即此戰國謂之安陵漢始置鄢陵縣屬潁川郡東魏屬許昌郡北齊省入許昌縣隋復置屬許州唐因之宋屬開封府金元仍舊本朝因之編户二十六里扶溝縣在府城南二百里本漢舊縣屬淮陽國以小扶亭有洧水之溝因名東漢屬陳留郡晉省後魏復置東魏屬許昌郡隋屬潁川郡唐於此置北陳州尋廢以縣屬洧州後屬許州五代梁屬開封府宋金元仍舊本朝因之編户二十里中牟縣在府城西七十里本春秋鄭邑漢始置縣屬河南郡晉屬滎陽郡後魏省尋復置東魏增置廣武郡後周徙縣治圃田城隋初廢郡改縣曰内牟屬鄭州後又徙舊治唐復改中牟縣并置牟州尋罷州以縣屬管州龍朔初屬鄭州五代梁屬開封府唐屬鄭州宋屬開封金元仍舊本朝因之編户二十六里陽武縣在府城西北九十里秦為博浪沙地漢始置陽武縣屬河南郡晉屬滎陽郡東魏屬廣武郡北齊省隋復置屬滎陽郡唐屬鄭州五代屬開封府宋元仍舊本朝因之編户四十五里原武縣在府城西北一百二十里漢置屬河南郡晉省後魏屬滎陽郡東魏改置廣武縣北齊省隋置原陵縣唐改原武縣屬鄭州宋省入陽武縣元祐初復置金元屬鄭州本朝改今屬編户一十四里封丘縣在府城北七十里本古封父國漢始置封丘縣屬陳留郡尋析置平丘縣晉省平丘以縣屬陳留國後魏省入酸棗縣尋復置北齊省隋復置屬滑州後屬東郡唐屬汴州五代屬開封府宋元仍舊本朝因之編户二十六里延津縣在府城西北九十里本春秋鄭之廩延戰國嘗為韓所都秦置酸棗縣漢屬陳留郡後魏併入小黄後復置屬東郡北齊併入南燕縣隋初復析置酸棗縣屬滑州大業初屬滎陽郡唐復屬滑州五代梁屬開封府宋改延津縣金置延州後廢元仍舊本朝因之編户八里蘭陽縣在府城東北九十里本秦東明鎮地漢為東昬縣地屬陳留郡三國魏廢縣為鎮宋初復置東明縣屬開封府金析東明六郷為縣取其首郷曰蘭陽以為名元仍舊本朝因之編户二十九里儀封縣在府城東北一百一十五里春秋時衛邑儀封人見夫子即此漢為東明縣地後魏為考陽縣地屬北梁郡北齊郡縣並廢金為通安堡元始置儀封縣屬睢州本朝改今屬編户一十五里陳州在府城東南三百五十里古伏羲所都周封舜後於此為陳國秦為潁川郡地漢置陳縣淮陽國治此晉於此置豫州後魏置陳郡又置北揚州治項縣北齊改為信州後周改曰陳州隋廢陳郡改縣曰宛丘後改州為淮陽郡唐復為陳州五代晉為鎮安州周為鎮安軍宋宣和初陞淮寧府金元復為陳州並以宛丘縣為附郭本朝省縣入州編户四十五里領縣四商水縣在州城西九十里本漢汝陽縣地屬汝南郡晉屬汝南國後魏屬汝陽郡隋置溵水縣屬陳州唐屬溵州後屬陳州宋改商水縣金仍舊元末徙治舊南頓縣本朝因之編户一十二里西華縣在州城西北九十里漢為長平西華二縣地屬汝南郡晉省西華以長平屬梁國宋復置西華北齊省長平入焉隋初改為鴻溝縣後復名西華屬淮陽郡唐改箕城縣屬陳州長夀初改曰武城景雲初復曰西華宋屬淮寧府金屬陳川元仍舊本朝因之編户二十二里項城縣在州城東南九十里古項子國漢置項縣屬河南郡晉屬陳國復屬梁國東魏置北揚州及秣陵縣北齊信州後周陳州皆治此隋始改為項城縣屬陳州宋屬淮寧府金仍屬陳州元初省入商水縣後復置本朝因之編户一十五里沈丘縣在州西南一十五里本朝分置編户一十三里許州在府城西南二百二十里周為許國秦屬潁川郡漢為韓國尋置許縣屬潁川郡東漢末獻帝都於此曹魏改曰許昌晉徙潁川郡治此北齊於此置南鄭州後周改許州治長社縣隋改縣因潁川州為潁川郡唐復為許州長社縣五代梁置匡國軍唐改忠武軍宋陞潁昌府金復為許州昌武軍元為許州屬河南路本朝以長社縣省入改今屬編户四十八里領縣四臨潁縣在州城南六十里本漢舊縣屬潁川郡以在潁水之上故名隋屬許州唐屬溵州貞元初仍屬許州宋金元皆仍舊本朝因之編户一十八里襄城縣在州城西南九十里本春秋鄭氾地以周襄王出居此因名襄城漢始置襄城縣屬潁川郡晉置襄城郡後周置汝州隋俱廢唐復置尋廢以縣屬許州宋屬汝州金元屬許州本朝因之編户三十二里郾城縣在州城南一百二十里本古郾子國漢置郾縣屬潁川郡北齊置臨潁郡隋置道州改縣曰郾城縣後廢道州以縣屬許州唐復置道州尋廢以縣屬溵州又屬許州宋屬潁昌府金元屬許州本朝因之編户二十二里長葛縣在州城北五十里本春秋鄭邑宋人伐鄭取長葛即此漢為潁川郡許縣地晉省隋始置長葛縣屬潁川郡唐屬許州宋屬潁昌府金元仍屬許州本朝因之編户二十二里禹州在府城西南三百二十里本夏禹所封地春秋時為鄭之櫟邑戰國為韓國秦為陽翟縣兼置潁川郡漢因之晉屬河南郡東魏置陽翟郡隋廢郡以縣屬襄城郡唐廢嵩州後屬許州宋屬潁昌府劉豫置潁順軍金改為州又改鈞州以州有鈞臺故名元仍舊本朝以陽翟縣省入萬厯三年避御名改禹州編户六十四里領縣二新鄭縣在州城東北九十里周封黄帝後於此為鄶國春秋時為鄭武公之國名曰新鄭秦屬潁川漢始置新鄭縣屬河南郡晉省劉宋復置屬滎陽郡後魏省隋復置唐宋皆屬鄭州金屬鈞州元仍舊本朝改屬本府編户十九里密縣在州城西北一百二十里本古密國亦鄶國地漢始置縣屬河南郡晉屬滎陽郡後周屬滎州隋屬鄭州唐初於縣置密州尋廢州以縣屬鄭州後屬河南府宋屬鄭州尋屬河南府金屬鄭州元屬鈞州本朝因之編户二十三里鄭州在府城西一百四十里周管叔鮮封于此後為鄭國秦屬三川郡漢屬河南郡東漢分置滎陽郡後魏為東恒農郡東魏置廣武郡後周置滎州後改為鄭州隋于管城縣置管州後改為鄭州尋為滎陽郡唐初于武牢置鄭州貞觀中移治管城天寳初又改為滎陽郡乾元初復鄭州宋置奉寧軍金復為鄭州元因之本朝以管城縣省入編户三十三里領縣四滎陽縣在州城西七十里本古東虢國春秋為鄭京城秦置敖倉於此漢始置滎陽縣屬河南郡其治在今縣西五十里晉置滎陽郡後魏郡縣並徙今治北齊改郡曰成臯隋廢郡存縣唐析置武泰縣屬洛州神龍初復省入滎陽縣屬鄭州五代宋金元仍舊本朝因之編户一十里滎澤縣在州城北五十里本古澤名春秋衛侯及狄人戰於滎澤即此地秦三川郡嘗移治於此漢為滎陽縣地晉屬滎陽郡隋置廣武縣仁夀初改為滎澤縣屬鄭州唐因之宋省入管城元祐初復為縣元屬汴梁路本朝屬鄭州編户一十里河隂縣在州城西北五十里秦置平隂縣在廣武山漢徙治瀕河山下始曰河隂縣晉屬河南郡唐又徙治輸場之東渠口開元初屬河南府會昌初屬孟州宋以氾水縣省入金屬鄭州元移治廣武山之大峪口本朝初又徙今治編户七里氾水縣在州城西一百一十里古東虢國地春秋時為鄭巖邑又名虎牢秦屬三川郡漢置成臯縣屬河南郡東漢廢縣為闗三國魏復置縣晉屬河南郡劉宋於此置司州後魏北豫州及成臯郡同治於此隋始改縣曰氾水屬滎陽郡唐初析置成臯縣貞觀中又省入氾水屬鄭州後屬孟州宋初屬洛州元豐初復屬孟州金屬鄭州元仍舊本朝因之編户一十里郡名大梁戰國魏名陳留漢名汴梁元名形勝天下要衝酈生説漢髙祖云陳留天下要衝四通八達之郊水陸都㑹舊圖經汴京舟楫車馬商賈輻輳為一大都會又唐李勉傳汴州水陸一都㑹咽喉九州閫域中夏唐賈至虎牢闗銘鎖天中區控地四鄙唐呂溫成臯銘岡阜繚轉龍盤虎伏李清臣汴都記濁河限其北清洛貫其内同上提封萬井宋周邦彦汴都賦芒碭渙渦截其面金堤玉渠累其脊雷夏灉沮繞其腸星丘訾婁夾其胰分疆十同提封萬井處四達之㑹宋志浚郊處四達之㑹故建為都風俗人稟中和之氣周禮註豫州豫之為言舒也言人稟中和之氣性理安舒也俊髦儒雅漢地理志梁魏之墟人多俊髦好儒雅雜以遊豫有魏公子之風難動以非易感以義右武習豪唐劉禹錫汴州刺史㕔壁記地為四戰故其俗