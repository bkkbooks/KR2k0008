城戰日數十合魏軍死者與城平會援兵至魏軍遂敗夏侯亶梁南豫州刺史夀久罹兵荒百姓多散亶輕刑薄賦務農省役人户充復李崇後魏將守夀春十年常養壯士數千人冦來無不摧破鄰國謂之門虎隋趙軌夀州總管長史芍陂舊有五門堰蕪穢不修軌勸課吏人更開三十六門灌田五千餘頃人賴其利元胄濠豫二州刺史翼亮隋室𢎞濟王基有佐命之勳唐盧祖尚高祖時為夀州都督有能名高智周髙宗時夀州刺史治尚文雅行所部先見諸生質經義及為政得失既乃録訟考耕餉勤惰以為常栁寶積永徽中潁州刺史修椒陂塘引潤水溉田二百頃民利之顔元孫垂拱間為濠州刺史有文名即杲卿之父也蘇晉泗州刺史以仁恕為政吏民信服久之父老解職歸養韋知人泗州刺史政尚平易以恤民為務有治聲李岵潁州刺史在郡興利除害得民歡心張公度夀州刺史有去思頌大厯間立碑張鎰大厯初濠州刺史政條清簡延經術士講授生徒大厯中條天下牧守課績鎰理行第一張萬福德宗時李正已反江淮漕船不敢踰渦口以萬福素有威名拜濠州刺史萬福至濠駐馬於岸悉發漕船相銜進賊兵睥睨不敢動李繁亳州刺史有機略遇劇賊為患繁出兵擒之民用得所貟半千濠州刺史不専任吏以文雅粉澤故禮化大行獨孤及濠州刺史嵗饑鄰郡流亡什四已上而州人獨安其治因俗為理人用愛戴劉茂復濠州刺史政無他門賦無橫斂人人知教濠人多不葬茂復下令過期不葬者笞之其不能葬者以俸錢與之楊凝判亳州增墾田决墟堰築隄防水患訖息李則定逺尉假領他縣令嚴而行富豪併貧民之産而不稅者盡以法治貧民用安羅珦夀州刺史後刺廬州其德政碑曰夀春距廬江三百里公嘗牧守兹郡夀人望而愛之赤幃即路夀人自理侯固大中間濠州刺史奏乞增植桑無加稅刻石定逺縣門鄭惲下蔡長至縣奪民漁獵之具使務耕桑杜慆泗州刺史龎勛反攻城或勸出家屬慆曰死生與將士共之賊易慆馳勇士欲入封府庫慆陽出迎勞伏甲士皆殱焉被圍凡十月拊循將士皆殊死戰賊纍攻不克卒定一州五代王祚漢潁州刺史均部內稅租補實流徙及疏導通商渠湮塞以通舟楫郡無水患司超周時為宋宿亳二州遊奕巡檢使改宿州固鎮守禦都指揮使移屯潁州下蔡鎮屢與淮人戰有功朱景楊吳霍丘守將梁遣兵襲之為景所敗初梁兵渡淮表識其可涉之津景密徙表於深處梁兵望表而涉溺死者大半郭全義南唐濠州觀察使有能名子廷謂仕為濠州監軍後加本州團練使周師兩至不能下江夢孫南唐天長縣令民有爭馬訟久不決夢孫令縱馬於郊馬奔入主家其訟遂決劉仁贍南唐清淮軍節度使鎮夀州周師攻圍久不能下既而南唐割地於周而仁贍獨堅守其子崇幸其父病謀出降仁贍命斬之病甚其副使以城降仁贍是日卒世宗因移城下蔡而復其軍曰忠正軍曰吾以旌仁贍之節宋假思恭知泗州太祖嘗面諭之曰卿在泗州百姓稱仁雍熙中知夀州克著勤蹟王郁為濠州判官將死告家人曰吾厯官逾五十年慎於用刑活人多矣後必有興者其孫欽若果大顯朱昻知泗州嘗聚淮水流尸三千為冡瘞之有戍卒謀亂昻誅其首惡凡支黨詿誤者悉貰之王審琦為中正軍節度在鎮八年為政寬簡嵗得租課量入為出未嘗有所誅求韓丕端拱中知濠州雖不優於吏事能以清介自持時稱其長者楊覃淳化中同判夀州巡撫使潘慎修上其政績有詔嘉奬就命知州事李迪真宗時知亳州亡卒羣剽城邑發兵捕之久不得迪至悉罷所發兵隂聽察知賊區處部勒驍鋭士擒賊斬以徇俞獻卿安豐縣尉有僧貴寧積財甚厚其徒殺之詣縣紿言師出遊矣獻卿曰吾與寧善不告而去豈有異乎其徒色動因執之得其所瘞尸一縣大驚崔立知安豐縣大水壞期斯塘立躬督繕治踰月而成政以循稱後又知濠州畢士安知潁州有治政以嚴正見稱王旦通判濠州以賢達著名弟旭亦嘗知潁州卓有政績喬惟嶽真宗時知夀州表陳彭年通判州事甚有治聲李若谷知夀州豪右多分占芍陂陂皆美田夏雨溢壞田輒盜決若谷擲冒占田者逐之每決輒調瀕陂諸豪使塞堤盜決乃止栁植知潁州後又厯知壽亳州所至官舍蔬果亦不妄採家無長物時稱其廉張知白知亳州守道徇公當官不撓蔡齊知潁州卒于官故吏朱寀至潁吏民見寀泣指其所嘗更厯施為曰此蔡使君之迹也其仁恩如此陳堯佐知夀州嵗大飢出俸米為糜粥食餓者吏人悉獻米至振數萬人夏竦知潁州以不苛為政革去前弊人甚德之又知亳州立保伍法有政聲盜賊不發田里晏然晏殊知潁州以政事聞於一時公餘手不釋卷時邵亢為推官殊諉之以事段少連仁宗時知蒙城縣通敏有才遇事無大小決遣如流陳希亮知宿州跨汴為橋水與橋爭常壞舟希亮始作飛橋無柱以便往來詔賜縑以褒之仍下其法自畿邑至泗州皆為飛橋尹洙通判濠州元祐間通判王雍刻石題名記之議者謂倅㕔多賢達云宋庠以使相判亳州以慎靜為治宋祁知夀亳二州用經術飾吏事臨訟以平恕決之陳執中以使相判亳州人莫敢干以私蘇頌知潁州通判趙至忠本邊徼降者所至與守競頌待之以禮且盡誠意至忠感泣曰身雖夷人然見義則服平生說服者惟公與韓魏公耳後又厯知亳濠二州張昷之淮南提刑知亳州楊崇勳恃恩為不法誣蒙城知縣王申罪械送獄昷之廉得寃狀乃出申配姦吏若干人魏琰知夀州盜殺寺童子有司執僧笞服琰廉其非罪命脫械縱去一府爭以為不可後數日得真盜李防知宿亳二州好建明利害所至必有論奏連庶知夀春縣興學校尊禮秀民以勸其俗開瀕淮田千頃縣大治楊察景祐中通判宿州後又厯知潁夀二州遇事明決勤於吏職趙抃通判泗州州守昏不事事監司欲罷之抃左右其政守得以善罷又嘗攝知濠州趙賀通判宿州後又知濠夀州所至吏事精明下不敢欺劉渙仁宗時為潁上令以剛直不能事上官棄去家于廬山之陽歐陽修髙其節作詩以美之吳奎至和中知夀州専以仁恕及民事至立斷吏民惜其去久而思之包拯定逺令政績彰聞又知天長縣有訴盜割牛舌者拯使歸屠牛鬻之尋有告私屠牛者拯曰何為割牛舌而又告之盜色變遂引伏李先淮南轉運使夀春民陳氏施僧田其後貧弱往丏食僧所而僧逐之取僧園中筍遂執以為盜先詰其由奪田之半以還之傅楫攝知天長縣發摘𨼆伏姦猾屏跡張燾淮南轉運使泗州水城且壞燾悉力營護詔寵其勞朱景知夀州嵗飢亟發廩振給勸富者出穀所活數萬城西居民三千室建請築外郭環入之公私稱便子光庭亦嘗知亳州朱夀隆知宿州宿多劇盜至白晝被甲剽攻郡縣不能制夀隆設方略耳目捕斬千餘人蘇軾知潁州嘗乞賞汝隂尉李直方捕賊功不報會郊恩當轉官即奏移以賞之韓晉卿神宗時知夀州奏課第一葉康直知亳州通濬積潦民獲田數十萬畝豐稷蒙城簿每事據正以誠意贊其官長未嘗立異傅求通判泗州淮水溢毁城朝廷遣中使護築絶淮取土求相度汴隄旁有高埠夷之得土載以回舟省工費殆半尋擢知宿州馬從先知宿州宿素難治從先厚賞以求盜禁屠牛鑄錢嚴甚大水發廩振流亡全活數十萬後又知夀州其治一如宿時石揚休知宿州究心民事未嘗有睱常曰吾茍偷安一日則訟事必聚受害衆矣吕公著通判潁州郡守歐陽修與為講學之友後知是州民愛戴之子希純亦嘗知是州燕肅知潁州精於刻漏時刻不差有善政臨去吏民莫不攀戀尤蔣堂知泗州事剛柔並用無急遽之政田里帖然富紹庭知宿州紹庭故相弼之子能以善政繼其家法陶令靖康間知旴𣅿縣徽宗南幸以南山有十景欲臨幸詔所在清道令辭以非浹旬可辦上嘉其直而止曽悟靖康初為亳州土曹金人破州被執悟抗辭慢罵衆創劘之妻孥同日被害徐端益虹縣尉張邦昌僞詔至縣令以下迎拜宣讀如常式獨端益不拜而走康允之建炎中知夀春府有賊萬餘人攻城允之率軍民固守賊解圍去孫逸知濠州建炎間閭勍奉兩京祖宗神御至逸不開門勍告之故逸乃朝服率屬吏遙拜勍不能奪而去畢再遇知盱眙軍金人大入冦再遇屢擊敗之吳說紹興初知盱眙軍奏乞禁止採􅒕高宗謂貧民以此為生乃詔官司不得採􅒕而民間從便國鳳卿紹興初通判濠州金人圍城守棄城去鳳卿抗敵不屈而死夏俊紹興中盱眙縣尉金人入冦俊與士人胡昉部八十四人夜攻泗州金守棄城遁俊入城撫勞詔俊就知泗州劉錡以東京副留守抵順昌守臣陳規得報金兵已入東京錡即鑿舟沈之示無去意屢率衆極力與戰殺其衆五千金人大敗而遁汪若海紹興中通判順昌府金人奄至劉錡衆不滿三萬遣人丐援於朝無敢往者若海毅然請行朝廷從之金兵果敗去王霆初守濠州節浮費糴粟貴馬以備不虞尋差知安封軍臣上言王霆在濠人甚安之不宜輕易詔再任職事修舉鄭絪通判夀春府先是金人遣完顔林持檄來撫諭絪縛林送于朝率軍守禦制置使劉錡言其忠改知府事周淙紹興末守濠梁淮楚舊有並山水置寨自衛者淙為立約束結保伍金主亮傾國犯邊民賴以全活者不可勝討王阮孝宗時知濠州請復曹瑋方田修种世衡射法日講守􅊀與邊民親訪北境事宜終阮在濠金不敢南侵李祥濠州録事參軍安豐守臣冒占民田訟屢改而不決監司委祥卒歸之民黃幹通判安豐軍淮西帥司檄鞫和州疑獄幹委曲審問無所得一夜夢井中有人明日呼囚詣之曰汝殺人投之井我悉知之矣囚遂驚服果於廢井得尸趙士嶐淮西兵馬鈐轄駐夀春賊丁一箭以衆來攻三旬不退士嶐選壯士數百出其不意擊走之楊照濠州將官金人圍城急照躍上角樓刺敵執旗者洞腹而死照俄中流矢卒有統領丁元者遇金人十八里洲勉其徒毋負國一舟二百人皆鬭死杜杲知定逺縣會李全犯邊擢知濠州制置大使趙善相謀復盱眙密訪杲卒用其䇿成功李庭芝淳祐中為兩淮制置司參議官與賈似道議柵清河五河口增淮南烽一百二十繼知濠州復知荆山以􅊀淮南皆切中機會元張晉亨以萬户戍宿州分兵列營於汴隄南北屯田種藝期年皆獲其利子好古繼其職訪民瘼革吏弊立為條約梁瑞懷逺縣尹溫雅廉慎上下翕然敬憚之鼎新學舍及去士子刻石以紀其德歸𤾉至順初同知潁州事鉏奸擊强人不敢以年少易之張孚虹縣尹興學化民時俗丕變邑人德之余闕元統初同知泗州事為政嚴明宿吏皆憚之梁思溫靈璧縣尹為政循良有去思碑連九鼎鍾離縣尹六事具備以廉勤稱本朝車誠洪武初潁上知縣守職廉謹以誠信治民政化大行尋以績最升知光州李偉洪武中知臨淮縣在任亷慎有為勤於撫字民賴以安永樂初以政績著聞厯升光祿寺卿朱儼洪武末知鳳陽縣在任能革宿弊為政有方民咸德之方素易洪武中旴𣅿知縣在任廉謹有善政朝廷嘉之賜璽書鈔錠衣服等物以旌其能遷知金華府楊鏞永樂初懷逺知縣以廉謹自持勤於政務尋升欣州知州百姓攀留不能釋楊浩永樂中鳳陽知府處已無私馭下有道闔郡之人咸仰賴之石佩宣德間知泗州勤勸課興孝友九載考績民赴闕借留加參議銜復任九年有古循吏風南畿志楊瓚正統中知鳳陽府廉潔公勤入覲賜襲衣宴勞志南畿孫景明正統間知潁州興學校嚴禮祀以廉靜牧民得為治體南畿志李敏正統末同知鳳陽府廉潔慈惠纍官南京户部尚書南畿志張智景泰間知定逺縣課士勸農政教大行部使上其績賜璽書旌異南畿志何源天順間知鳳陽府亷能剛果軍民畏愛南畿志馮良天順間定逺訓導嚴條約先德而後藝士風一變南畿志白玉成化初以都督同知守備鳳陽嘗修葛陂興水利在官無一亳妄取軍民思慕之不置南畿志張黻成化間知宿州秉公持正吏畏民懷升去行李蕭然南畿志王子澄𢎞治初天長教諭以學行稱躬訓迪諸生連舉進士去後科則不若之矣南畿志蔣賢正德間任靈璧主簿流賊侵冦賢率民兵禦之被執不屈遂為所害事聞廕子南畿志張鑰正德間由都御史謫知泗州以廉明稱捍淮水禦流賊尤有功南畿志流寓彭祖古陸終氏第三子籛鏗也自堯厯夏殷封於天彭嘗𨼆於雲母山服雲母夀八百嵗莊周宋蒙人嘗與惠子觀魚於濠梁之上今靈璧潼山有莊子後族中率有善𤣥談者王質河汾人文中子四世孫唐時僑居淝水上無進取意與游者激之使求發聞因決䇿而西官至御史中丞高乾本燕人五代時李景據江南潜結契丹嵗遣單使往復乾父霸將契丹命以乾從行使景方至江左諜間北使與中夏構隙遂殺霸居乾濠州乾在濠生三子尋挈族歸宋給田亳州蒙城因土著焉郭延澤本徐州人好學博通典籍仕宋纍官國子博士咸平中以虞部貟外郎致仕居濠州城南有小園以自娛其詠牡丹千餘首聚圖籍萬餘卷歐陽修本宋廬陵人初知潁州因災傷奏免黃河夫萬餘人修陂水以通西湖民得其利皇祐初自維揚來潁樂其風土慨然有終老之意致仕遂家焉劉攽本臨江人厯官中外喪父時歐陽修守潁攽往依之與修賡詠攽詩有云羈鳥能擇木游魚知赴淵卜居幸樂國負郭依良田王萬世家婺州父游淮間萬因生長濠州少忠伉有大志究心當世急務宋嘉定中登進士纍官通判鎮江府時金初滅當路多知其人豪也咨問者旁午萬謂當急為自治之規纍遷至知平江府以太常少卿致仕人物周管仲春秋時潁上人少與鮑叔牙為友鮑叔知其賢薦於齊桓公既相齊遂富國彊兵攘夷狄尊周室九合諸侯一匡天下孔子曰微管仲吾其被髮左袵矣許其有仁者之功所著有管子書八十六篇卞和春秋時楚人嘗於荆山得玉璞獻之厲王以為詐刖其左足武王即位復獻之又以為詐刖其右足及文王即位乃抱璞泣王使人問之曰臣非悲刖寶玉而題之以石真士而名之以詐所以悲也王使玉人琢之果得玉封零陵侯不就列國甘茂下蔡人為秦左相秦王嘗使之約魏以伐韓宜陽茂恐王聽讒見疑王遂與之盟于息壤卒拔宜陽後復仕齊為上卿秦甘羅茂之孫年十二事秦相吕不韋秦欲使張唐相燕唐不肯行羅說而行之乃使羅於趙趙王郊迎割五城以廣河間羅還報秦封羅為上卿復以茂之田宅賜之陳勝陽城人嘗與人傭耕曰茍富貴無相忘傭者笑曰若為傭耕何富貴也勝曰燕雀安知鴻鵠之志哉遂舉兵稱扶蘇項燕自立為將軍後為其御所害陳嬰本東陽令史居縣中素信謹東陽少年殺其令欲立嬰為王嬰母謂曰自我為汝家婦未聞汝先有貴者今暴得大名不祥不如有所屬嬰乃止後相楚懷王漢武涉盱眙人有口辨項羽使往說韓信以三分天下鼎足而立信不從陳萬年沛郡相人性廉平內行修飭以高第入為右扶風遷太僕丙吉嘗薦於宣帝後至御史大夫召信臣九江夀春人以明經甲科為郎遷上蔡長視民如子後為南陽太守為民興利其化大行號曰召父詔賜黃金四十斤遷河南太守治行常為第一復增秩賜金竟寧中徴為少府列於九卿薛廣德沛國相人嘗以魯詩教授楚國龔勝龔舍師事焉以蕭望之薦纍官至御史大夫廣德溫雅有醖藉及為三公直言諌諍後乞骸賜安車駟馬黃金而歸縣其安車傳子孫陳咸萬年子為郎有異材抗直數言事元帝時擢御史中丞纍官冀州刺史後為尚書王莽専政即乞骸骨去三子參豐欽悉令解官嘗戒子孫曰為人議法當依於輕雖有百金之利慎勿與人重後莽再徴競稱疾不起郭憲宋公人少師事東海王仲子時王莽専政召仲子憲諌曰不宜賤道畏貴及莽篡位拜憲郎中賜以衣服憲焚之而逃光武時徴拜博士遷光祿勳嘗以諌諍不合伏地不拜帝曰嘗聞關東觥觥郭子橫真不虛也子橫憲字梅福九江夀春人少學長安明尚書穀梁春秋為郡文學補南昌尉上書言事及王莽専政福一朝棄妻子去人傳以為仙其後人有見福於會稽者變姓名為吳市門卒云桓談沛國相人父成帝時為大樂令談以父任為郎因好音樂遍習五經能文章尤好古學光試即位拜議郎上疏陳時政帝欲以䜟決疑談極言非經帝怒出為六安郡丞談著書言當世行事號新論又有賦誄書奏桓榮沛郡龍亢人少學長安精力不倦建武中拜議郎授太子經纍遷太子少傅賜以輜車乘馬榮大會諸生曰今日所䝉稽古之力也明帝即位尊以師禮拜為五更子郁敦重篤學以尚書教授門生常數百人官至侍中張酺汝南細陽人自少力學不怠顯宗開四姓小侯學酺以尚書教授論難當上意除為郎令入授皇太子經侍講率有徑正之辭纍官至司徒衛宏東海泗人仕為議郎少嘗從九江謝曼卿受毛詩作詩序後更受古文尚書於杜林為作訓㫖時濟南徐巡師事宏亦以儒顯由是古學大興宏又作漢舊儀四篇載西京雜事趙孝沛國蘄人時兵荒人相食弟禮為餓賊所得孝聞之即詣賊曰禮瘦不如孝肥賊驚異並放還鄉顯宗聞其行拜諫議大夫召馴九江夀春人少習韓詩以志義聞鄉里稱之曰德行恂恂召伯春馴字伯春肅宗朝拜左中郎將入授諸王經帝嘉其義學恩寵甚崇范遷沛國相人有清行仕為漁陽太守以智略安邊胸奴不敢入界及在公輔有宅數畝田不過一頃復推與兄子其妻謂曰君有四子而無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世徐防沛國銍人舉孝廉為郎禮貌矜嚴顯宗異之特補尚書郎職典樞機周密畏慎和帝時拜司空上疏言五經宜為章句以悟後學纍官至太尉杜密潁川陽城人為人沉質為司徒胡廣所辟遷北海相宦官子弟為令長姦惡者輒按捕之行春到高密見鄭𤣥知其異器即召署郡職後拜太僕黨事既起免歸本郡與李膺俱坐而名行相次故時人稱李杜焉桓典榮𤣥孫舉孝廉為郎靈帝朝拜侍御史常乘驄馬京師畏憚語曰行行且止避驄馬御史三遷至羽林中郎將弟彬為尚書郎與蔡雍齊名雍論序其志以為有過人者四乃樹碑而頌焉陳寵咸曽孫父躬事光武為廷尉寵明習家業肅宗初為尚書是時承永平故事吏尚嚴切寵上疏請濟之以寬是後人俗和平屢有嘉瑞後厯三郡三卿所在有跡官至司空寵雖𫝊法律而兼通經書奏議溫粹號為稱職陳忠寵子明習法律用心寬詳三遷廷尉政有聲稱安帝初立數上薦𨼆逸及直道之士常作縉紳先生論以風上寵信之偏屢上疏言多切直纍官至尚書令范滂汝南細陽人少厲清節舉孝廉光祿四行時冀州飢荒盜起滂為清詔使登車攬轡慨然有澄清天下之志及至州境守令望風解印綬去後以鉤黨坐繫既釋復見收母曰汝今得與李杜齊名死亦何恨滂跪受教再拜而辭聞者流涕施延沛國蘄人明五經星官風角家貧嘗詣海鹽任作半路亭以養母時馮敷為督郵至知其賢者下車謝使入亭請與飲食脫衣與之餉錢不受順帝初徴拜太尉華陀譙人遊學徐土兼通經史曉養性之術年且百嵗猶有壯容人以為仙舉辟皆不就精於方藥處劑不過數種心識分銖不假稱量針藥所不及者因刳割腹背斷截腸胃除其疾而縫之傅以神膏即愈曹操苦頭風召陀針之隨手而瘥後召不至竟為所害三國曹植譙人操次子十餘嵗善屬文操視其文曰汝倩人邪植跪曰言出為論下筆成章顧當靣試奈何倩人操甚異之植任性而行不自雕勵封陳王薨諡曰思夏侯惇沛國譙人嬰之後魏曹操初起惇為裨將尋領東郡太守屢從征伐有功文帝時拜大將軍惇性清儉有餘財輒以分施卒諡忠侯劉曄淮南夀春人許邵嘗稱其有佐世之才廬江界有山賊守險衆謂不可伐曄以為可卒如所度其他料敵制勝無不中明帝時進爵東亭侯曄在朝略不交接或問其故答曰僕在漢為枝葉於魏備腹心寡偶少徒於宜未失也卒諡景侯夏侯淵惇族弟從曹操征討有功拜征西將軍淵之從子尚領荆刺史文帝與之親友尚子𤣥左右勳業官顯於時許禇譙國人身長八尺餘腰大十圍勇力絶人曹操壯之拜都尉從討袁紹纍拜振威將軍卒諡壯侯陳矯東陽人魏明帝時為尚書令帝嘗至尚書門矯跪曰陛下欲何之帝曰欲案行文書耳矯曰此臣職分非陛下所宜臨也帝乃命回車其直亮如此嵇康其先本上虞人姓奚以避怨徙譙家于銍之嵇山因命氏焉康逺邁不羣與魏宗室婚拜中散大夫不就嘗彈琴詠詩以自足後以譛被害兄喜有當世才厯太僕宗正魯肅吳臨淮東城人家富於財周瑜嘗往見之且求資糧肅有米兩囷囷三千斛乃指一囷與之後仕吳纍戰功為橫江將軍肅為人方嚴雖在軍陳手不釋卷又善談論屬文蔣欽九江夀春人給事吳孫䇿為右護軍纍功遷蕩冦將軍初欽屯宣城徐盛收欽屯吏表斬之盛常畏欽害已而欽每稱其善論者美焉薛綜沛郡竹邑人仕吳為五官郎中除合浦交址太守官至太子少傅所著詩賦論難凡數萬言子瑩孫皓時領少傅又為左國史與華核等共撰吳書吕範汝南細陽人少為縣吏從孫䇿攻討有功拜裨將軍領彭澤太守遷平南將軍屯柴桑權都武昌拜範建威將軍領丹陽太守治建業終大司馬丁奉吳廬江安豐人少以驍勇為小將屢立戰功孫亮即位為冠軍將軍後遷大將軍領徐州牧胡質楚國夀春人性沈實內察仕魏為頓丘令平反獄情纍遷征東將軍假節青徐諸軍事備禦有方海邊無事卒贈陽陵亭侯諡曰貞晉胡威質子父子俱以清慎聞威厯安豐太守後入朝武帝問曰卿孰與父清對曰臣不如也臣父清惟恐人知臣清惟恐人不知是臣不及逺也夏侯湛譙國人幼有盛才文章宏富善構新詞而美容觀嘗與潘嶽同車接茵京都謂之連璧泰始中舉賢良對䇿中第拜郎中後轉尚書郎出為野王令惠帝即位為散騎常侍嵇紹康子事母孝纍官至侍中㑹河間成都二王舉兵紹從惠帝與王戰于蕩隂侍衛皆潰惟紹以身捍衛遂被害血濺御衣事定左右欲浣衣帝曰此嵇侍中血勿去桓彛譙國人漢五更榮九世孫性通朗早獲盛名仕為逡遒令纍遷尚書吏部郎後為宣城內史蘇峻反守節而死五子溫雲豁祕冲溫豪爽有風概姿貌甚偉哀帝朝以功加大司馬冲淹識有武幹孝武朝為荆州刺史盡忠王室嵇含紹從子好學能文自號亳丘子舉秀才除郎中惠帝朝為中書侍郎纍官至平越中郎將廣州刺史曹攄譙國人調補臨淄令縣有寡婦姑勸令改適婦守節不移姑愍之密自殺親黨告婦殺姑攄知其寃辨究得實時稱其明獄有死囚攄於嵗夕放暫歸家刻日相率而還一縣嘆服戴逵譙國人博學能文善鼓琴工書畫性高潔常以禮度自處深以放達為非道著為論孝武時纍徴不就子顒有高名嘗述莊周大㫖著為論陳騫矯子沈厚有智謀為尚書郎纍遷太守並著治蹟後封安國亭侯遷侍中都督揚州諸軍事劉翼淮陵人永昌之亂翼為衡陽太守起兵期復晉祚力戰死之武周沛國竹邑人仕至光祿大夫子陔及二弟韶茂皆總角見稱有器望同郡劉公榮見之曰三子國士也陔最優仕至尚書左㒒射韶至散騎常侍茂至侍中尚書桓宣譙國銍人仕為丞相舍人時張平樊雅負固各據一城元帝以宣與之同里轉為後參軍使就之平雅即遣使隨宣受節制後更宣為都督司梁雍及荆州之南陽襄陽新野南鄉軍事甚有稱績劉惔沛國相人祖宏宏兄粹弟潢並有名惔少清逺家貧晏如王導深器之纍遷丹陽尹為政清整性好老莊卒於官孫綽誄云居官無官官之事處事無事事之心時以為名言桓伊宣族子嘗督豫揚二州軍事所至撫綏百姓賴焉與謝𤣥共破符堅進號右將軍封永修縣侯伊性謙素不伐善音樂有蔡雍柯亭笛嘗自吹之隗照汝隂人善易臨終書板授妻曰後五年春當有詔使來姓龔此人負吾金即以此板往責至期果有龔使至妻齎板往使者惘然良久乃悟取蓍筮之歎曰妙哉吾不負金汝夫自有金知汝漸困故藏金以待知我善易故書板以寓意耳金五百斤盛以青甕覆以銅梓在屋東去壁一丈入地九尺掘之如卜南北朝夏侯詳譙人年十六遭父喪哀毁廬墓三年有三足雀來集後仕宋為新汲令纍遷尚書左僕射王彭宋盱眙人父母終貧無以營葬鄉人為助作磚時天旱艱於水彭號天自訴忽泉湧出葬畢而竭鄭黑宋夀陽人為豫州刺史時殷琰叛黑起兵淮上以捍之遷司州刺史劉瓛宋沛郡相人惔六世孫䔍志好學五嵗時聞舅氏讀管寧𫝊欣然聽之曰此可及也兄弟二人共處蓬室怡然自樂聚徒教授不廢袁粲嘉其清德薦為祕書郎劉璡瓛弟方毅正直宋泰豫中為明帝挽郎瓛常夜隔壁呼之璡下牀著衣立然後應瓛怪其久曰向束帶未竟其立操如此劉顯瓛族子六嵗能誦過秦論仕梁為參軍俄署法曹後沈約引為少傅五官約嘗於坐䇿顯十事顯對其九裴邃梁夀陽人時裴叔業以夀陽降魏邃乃自拔還梁梁以為豫州刺史欲謀夀陽乃以邃督軍北入所至響應竟破魏軍隋劉臻沛國相人舉秀才為邵陵王東閣祭酒隋高祖初進位儀同三司左僕射臻耽悅經史終日覃思精於兩漢書時稱為漢聖唐張路斯潁上人年十六中隋明經第仕唐為宣城令以才能稱夏侯端夀州人唐髙祖微時與相友高祖入京師擢河南道招慰使𫝊檄州縣次亳州會王世充起道塞無所歸乃馳節東走世充遣人以吏部印綬召之端即焚書及衣解節毛懷之間道走歸拜祕書監劉行舉盱眙人徐敬業起兵揚州行舉與楚州刺史李崇福連和嬰城不從敬業敗拜遊擊將軍李敬𤣥亳州譙人該博羣籍尤善於禮髙宗在東宫以馬周薦為崇賢館侍讀纍官中書令封趙國公儀鳳初拜洮河道大總管與吐蕃戰敗貶揚州長史卒諡文憲撰次禮論及他書數十百篇董召南夀州安豐人苦學讀書𨼆居行義事親以孝聞韓愈嘗作董生行以送之有云嗟哉董生孝且慈人不識惟有天翁知龎嚴夀春人舉賢良第一嘗權京兆尹强幹不阿後為翰林學士李興安豐人父死廬墓孝誠洞達廬上産紫白芝二本醴泉湧出栁宗元為作孝門銘何武夀州人嘗被誣枉至州投石自明守釋之未幾冦起即請子守曰此真畢命之秋也命領偏裨入摐陽不意伏盜發叢翳間兵盡駭潰武獨鬬死裴懷古夀州夀春人清介審慎仕為監察御史多所平反纍官左威衛大將軍韓琬稱其馭士信臨財廉為國名將云李紳敬𤣥曽孫為人短小精悍詩最有名時號短李元和初補國子助教擢翰林學士與李德裕元稹同時號為三俊纍官至同中書門下平章事五代楊師厚潁州斤溝人梁時纍立戰功為天雄節度使太祖與晉戰河北乃為招討使悉領徑兵朱友圭欲圖之召計事其吏勸勿行師厚曰吾不負梁今雖往無如我何乃朝京師張存敬譙郡人為人剛直有膽略仕梁為將纍遷護國軍留後徙宋州刺史卒贈太傅徐懷玉亳州焦夷人仕梁為將纍功遷保大軍節度使為人雄豪勇敢戰陳所至克捷為時名將云馬嗣勛濠州鍾離人為人才武有辨仕梁為宣武軍押衙屢立戰功卒贈太保朱漢賔亳州譙人為人有膽力仕梁為指揮使纍遷昭逺軍節度使為政能守法好施惠人頗愛之卒贈太子少傅諡貞惠宋尹拙潁州汝隂人性純謹博子通經史舉三史官至國祭酒通判太常禮院宋初改工部尚書太子詹事判大府寺卒年八十一子季通國子博士李谷潁州汝隂人厚重剛毅言多詣理舉進士從事華秦二州晉天福中擢監察御史纍官開府儀同三司進封趙國公宋建隆初卒贈侍中丁罕潁州人以應募補衛士纍遷指揮使淳化中為澤州團練使知霸州河決以私錢募築民咸德之後拜密州觀察使徙貝州張綸潁州汝隂人太宗時擢荆湖提點刑獄厯知辰渭州遷江淮發運副使權知泰州復逋户二千六百民為立生祠後又知府瀛滄潁州綸有才略所至興利除害有循良之政高瓊濠州人乾之子少勇鷙太宗召置帳下及即位擢御龍直指揮使積戰功纍官保大軍節度鎮州都部署真宗時為并代都部署有政績終檢校太尉瓊不識字而曉達軍政善訓諸子高繼勳瓊子真宗時為益州兵馬都監厯知數州纍遷建雄軍節度使繼勳性謙謹有機略善撫御士卒在蜀有威名子遵甫官至北作坊副使遵甫女為英宗皇后神宗即位追封繼勳康王遵甫亦追封楚王閻日新宿州臨渙人真宗時為供奉官遷文思使多所建白纍官坊州刺史知渭州兼涇原路駐泊鈐轄終昭州團練使知單州張傅亳州譙人進士及第真宗時知拳符縣纍官工部侍郎傅七為監司所至審核簿書句擲姦隱州縣憚之傅曰奚為我憚哉吾所以事事致察者正所以愛州縣也吏不敢慢則州縣不復犯法矣人亦以為然魯宗道亳州譙人舉進士為定逺尉真宗時為諭德上嘗遣使召之宗道方與鄉人飲于酒肆使者曰即上訝來遲何辭以對宗道曰第以實告飲酒人之常情欺君臣子之大罪使者如其言上嘉其忠實仁宗時拜參知政事務抑僥幸時皆憚之目為魚頭參政卒諡簡肅王臻潁州汝隂人始就學能文辭中進士為大理評事知舒城縣纍遷龍圖閣待制權知開封府以右諫議大夫權御史中丞多所建明臻剛嚴善決事所至有風迹子仲言克紹家學有揮塵録玉照志吕夷簡夀州人進士及第通判濠州知開封府治嚴辨真宗識姓名於屏風仁宗時纍官同中書門下平章事進昭文館大學士手疏陳八事語甚切以使相出判陳州後再相進位司空封許國公卒諡文靖自仁宗初立太后臨朝十餘年天下晏然夷簡之力為多有集二十卷子公綽公弼公著公孺皆有名髙覿宿州蘄人舉進士為嘉興縣主簿通判泗州詔定南場茶法覿多所建明纍官集賢院學士進給事中知單州子秉常梓州路轉運使朱夀昌天長人以父㢲䕃補官纍調州縣通判陜州荆南知嶽閬州所至有善政夀昌母劉氏㢲守京兆時出之母子不相聞者五十年夀昌行四方求之不置熙寧初棄官求之得於同州迎以歸由是孝聞天下後纍官至司農少卿許遵泗州人第進士又中明法擢大理詳斷官知長興縣及宿州登州後判大理寺熙寧間出知夀州又知潤州提舉崇福宫致仕纍遷至中散大夫李犍招信人纍官國子博士嘗著易說楊介盱眙人善醫著傷寒論脉訣行於世吕公著夷簡子幼嗜學至忘寢食夷簡器之曰他日必為公輔寓居洛陽舉進士纍官御史中丞元祐初拜尚書右僕射兼中書侍郎與司馬光同心輔政後進司空卒贈申國公諡正獻常秩潁州汝隂人以經術著稱士論歸重熙寧初詔郡以禮敦遣始詣闕神宗問曰先朝纍命何為不起對曰先帝亮臣之愚故得安閭巷今陛下嚴詔趣迫故不敢不來數求去不許纍官至寶文閣待制兼侍讀曹潁叔亳州譙人進士及第纍官右司郎中陜西都轉運使自慶厯鑄大鐵錢行陜西民盜鑄不已潁叔請罷鑄諸郡鐵錢以三鐵錢當銅錢之一從之進龍圖閣學士知永興軍高遵惠瓊之孫從王遵裕以戰功纍官龍神都指揮使知熙州遵惠生以䕃入官熙寧中試經義中選纍官户部侍郎以龍圖閣學士知慶州方宣仁后臨朝繩檢族人一以法度乃舉家事付遵惠遵惠躬表之人無間言魯有開宗道從子好禮學通左氏春秋以䕃入官知韋城縣後厯知衛冀洺滑州所至有循良之政熙寧行新法王安石問江南如何有開曰新法行未見其害當在異日也苗時中其先自壼關徙宿州以䕃主寧陵簿有善政熙寧中為梓州轉運副使韓存寶討蠻軍行時中以糧道逺創為摺運法食以不乏遷關東轉運使加至寶文閣待制終户部侍郎魏瓘夀春人知廣州會城頽圮為之申請經理既築土得一小石碣云委於鬼公役夫持以告瓘曰事之興廢亶非偶然張整亳州酇陽人初補供奉官為利文州都巡檢使厯涇原真定京東環慶鈐轄蒞軍嚴明哲宗嘗訪於輔臣召之對擢為龍神衛四廂都指揮使官至威州刺史孫暉霍丘人少負義氣靖康之亂率淮民團結保護鄉井賴之擢招信尉建炎中金人將渡淮暉率射士民兵禦之會大霧金人莫測多寡相持踰半日暉且戰且却城陷竟死於敕書樓李稹泗州臨淮人幼明敏篤學靖康初補迪功郎湖南向子諲使督犒師銀兩數百艘自淮趨濟卒以計達高宗大悅曰得一士如獲拱璧豈特軍餉而已纍官户部貟外郎秦檜當國稹丐祠奉親十九年不仕母卒廬墓有白鷺朱草之祥後厯知數州以寶文閣學士致仕卒諡忠襄有臨淮集十卷王希吕宿州人南渡後寓居嘉興乾道中進士授祕書省正字厯兵部吏部尚書以端明殿學士知紹興府希吕天性剛徑遇利害無所回護惟是之從居官廉潔歸老至無屋可廬魏把夀春人紹興中舉進士知宣州涇縣錢端禮薦其才召為大府寺主簿孝宗時遷宗正少卿使金通問克尊國體比還纍遷至參知政事右僕射兼樞密使淳熙中卒諡文節劉位招信人知滁州節制徐泗二州軍事金人南伐位屢敗之金遣使誘之位斬其使後出戰中流矢沒於陳贈建寧軍節度使建廟滁陽號光烈董槐濠州定逺人廣顙豐頤美髯少喜言兵既而折節為學嘉定初登進士調靖安主簿纍官右丞相兼樞密使為政務大體茍可以利國家知無不為進封許國公一日將暮值天雷雨大作槐起衣冠而坐為諸生說兑謙二卦畢遂卒諡文清王惟忠鍾離人軍興據韭山為寨依附者萬餘人金人以孫興知濠州屬縣皆聽惟忠獨不從後仕至左軍統領牛富霍丘人勇而知義為侍衛馬軍司統制戍襄陽移守樊城纍戰不為衄城破率死士百人巷戰遇民居燒絶街道以頭觸柱赴火死贈靜江軍節度諡忠烈裨將王福曰將軍死國事吾豈宜獨生亦赴火死姜才濠州人貌短悍知兵善騎射為通州副都統與元兵屢戰屢勝復守揚州元將使人招之才曰吾寧死豈作降將軍邪後以疽發不能戰被執死之鞏信安豐軍人為荆湖都統沈勇有謀本𨽻蘇劉義部曲文天祥開督劉義以信等借天祥官至江西招討使招淮士數千自隨天祥趨永豐大兵追其後信戰於方石嶺中數矢傷重不能戰自投崖石而死贈清逺軍承宣使立廟旌之金魏全夀州人泰和中宋李爽圍夀州刺史徒單羲募兵往斫爽營全在選中為爽兵所執爽曰若為我罵金主免死全至城下反罵宋主爽殺之金贈宣武將軍武禎宿州臨濠人深數學金正大初徴為司天臺管勾時久旱禎忽謂其友王鉉曰今日早歸恐為雨阻既而平地雨注二尺人皆嗟異元孟祺宿州符離人幼敏悟善騎射早知問學辟掌書記廉希憲等器重之薦為國史院編修官一時典册多出其手巴延南伐祺贊畫大計酬應剖決略無疑滯纍官至提刑按察使卒諡文襄張紹祖潁州人讀書力學以孝行聞特授河南路學教授至正中奉父避兵山間賊至將殺其父紹祖泣曰吾父耆德善人請殺我以代父且若等非父母所生乎何忍害人父賊怒以戈擊之戈應手挫鈍因相謂曰此真孝子不可害乃釋之李黼潁州人父守中為工部尚書黼泰定中以明經魁多士纍官宣文閣監書博士兼經筵官數與勸講每以聖賢心法為言至正中江南冦起出守江州路總管捍賊有功詔為行省參政賊大至城陷巷戰叱曰殺我無殺百姓與從子秉昭皆罵賊而死諡忠文兄冕居潁亦死於賊杜昌鍾離人長身多力至正間首以義兵應募有功授金虎符為義兵萬户卒軍中嘗圖其形上之曹彥可亳州人至正間妖賊起里中皆不知書者羣趨彥可家以刀斧迫之寫旗彥可唾曰我儒者知有君父寧死耳豈為汝寫旗者邪遂遇害事聞諡節愍馬希先懷逺人舉鄉貢前夕夢靈槎賦已而果然後廬祖父母父母墓凡九年劉通亳州譙縣人家貧業農母卜氏好聲樂每眩技者以簫鼓至門必令娛侍或自歌舞以悅母心卜氏目失明通誓斷酒肉禱之三十年不懈卜氏年八十五忽復明事聞褒美之張旺舅霍丘人幼失父母陳氏居貧守志旺舅九嵗賣餳以養及長母病無資命醫惟日夜痛哭禮天求代未幾遂愈又自以生業微不能多給竟不娶以終母年縣令言於朝旌之本朝馬公宿州閔子鄉人素剛直重然諾愛人喜施即孝慈高皇后父也洪武初追封為徐王郭子興濠州定逺人其先曹州人父郭公善星厯子興兄弟三人皆以資産豪里中元末兵起子興乃散家財隂結豪傑攻拔濠城據之自稱元帥為人勇悍善戰而性悻直不能容物卒以憤恨終洪武初追封滁陽王徐達鳳陽人長身偉貌直元季兵起乃仗䇿來歸留置麾下久之察其智慮材略超衆命為鎮撫位諸將上征討四方摧強撫順輔成大業纍官中書左丞相封魏國公達言簡慮精令出不二偏裨以下敬若神明小心慎密謙謹若不能言及受命征討必致成功凡下城邑未嘗妄殺卒追封中山王諡曰武寧孫景昌封定國公常遇春懷逺人性剛毅膂力絶人初為羣雄劉聚所得度聚無成乃率衆來歸從征所至克捷運籌決勝之方皆不學而能嘗攻采石屢出竒以挫元兵扼江之勢尋守溧陽攻建康又從征克陳友諒擒張士誠取中原功居多焉纍官至中書右丞相封鄂國公卒追封開平王諡忠武李貞臨淮人為人孝友謙約初避兵淮東後居守倉卒遇變有戡定功洪武初以姻聨戚里拜駙馬都尉封曹國公薨追封隴西王諡恭獻李文忠貞子生十二嵗母公主薨國初以甥為至親賜姓擇師教之初以舍人領軍南征北討皆與有功封曹國公復李姓文忠器量沈閎智力過人臨戰必身先士卒及戰勝必以功推下及釋兵家居一循禮度恂恂若儒者及薨追封岐陽王諡武靖沐英定逺人八嵗遭兵亂父母殁國朝憐其孤幼賜姓子之年十八授帳前都尉尋升指揮使屢從征討有功洪武初詔復其故姓封西平侯英沈毅有智量好賢禮士馭卒伍尤有恩意奉命討平雲南諸夷留鎮其地英宣布威德結以恩信得其歡心朝廷無西南之憂及卒夷人為之流涕罷市追封黔寧王諡昭靖鄧愈虹縣人器量宏偉沈毅簡重元季兵起來歸從定金陵有功纍官至御史大夫封衛國公愈臨大敵而不懼有大功而不矜好賢下士寬惠愛人嘗厯鎮廣德宣徽嚴饒撫南昌襄陽所至明立賞罰撫以恩信八州之人至今德之追封寧河王諡武順湯和鳳陽人剛毅有智略元末兵起率子弟歸附從征渡江領兵征伐所至克捷纍功官至御史大夫封中山侯加封信國公卒追封東甌王諡襄武胡大海虹縣人身長鐵面智力過人國初仗䇿來歸遂居前鋒攻拔諸州屢建竒功纍升僉樞密院事行軍不妄殺人不虜婦女不燬廬舍故所至悅附諸暨州嘗被圍大海率兵救之賊將勢蹙求解許之或曰彼猾賊難信不如擊之大海曰言出而背之不信既縱而擊之不武竟引兵還以江南分省參知政事守婺州值苗軍謀亂被害追封越國公諡武順趙德勝臨濠人勇敢有氣節國初詣和陽歸附從征渡江克太平下建康取鎮江皆有克捷功纍官至元帥守洪都陳友諒攻城德勝中流矢死追封梁國公諡武桓郭子興臨濠人生有膂力善騎射初從郭元帥起兵尋來歸附從師渡江定金陵攻常宣諸州破陳友諒於鄱陽湖屢建竒績克定西伐西蜀征甘肅皆與有功封鞏昌侯卒追封陜國公諡宣武耿再成泗州五河人國初歸附從征渡江多著勞績纍升樞密院判官守處州苗軍元帥李祐之等叛再成聞亂即上馬收兵不及迎賊罵曰賊奴國家何負汝乃敢反因被害追封髙陽郡公吳良鳯陽定逺人初名國興後賜今名器貌雄偉性剛直與弟禎俱有勇力元季歸附屢立戰功命為指揮使鎮江隂時張士誠據姑蘇良繕城池利器械部伍整肅號令嚴明士誠畏威不敢闖其境洪武初封江隂侯命討廣西蠻夷之亂數月間盡平其地卒追封江國公諡襄烈弟禎封靖海侯繆大亨定逺人初起義兵為元攻濠弗克元兵潰散大亨獨率其衆二萬從元將屯橫澗山固守月餘乃率衆降自是從征屢有功命同僉樞密院事守江淮總制軍民為政寬簡人皆悅之及卒朝廷遣人祭其墓曰繆將軍平生端直在諸將中未嘗有過今不見矣惜哉曹良臣夀州安豐人元季兵起良臣聚鄉里立堡以禦外侮約束嚴明無敢違其令者後率所部來附受命為江淮行省平章政事從大軍取河北入元都攻永平其功居多後從徐達擊敗元將王巴拜于定西封宣寧侯既平蜀又從李文忠進兵鄂勒歡河與敵戰沒追封安國公諡忠壯郭英臨淮人有膂力善騎射國初從征渡江取金陵以謹重見信任又從征僞漢戰鄱陽湖下武昌及從徐達取中原克元都定隴右山後諸處繼平南溪峒諸蠻纍功封武定侯復同傅友德平北方英為將善撫士卒人多用命大小百餘戰刀箭瘢被體若刻畫然英毅之氣瀕老不衰居家善事親尤喜觀書卒追封營國公諡威襄茅成定逺人國初勇將攻張士誠戰死於蘇州追封東海郡公張赫臨淮人少有勇略元季兵亂率衆來附從征渡江屢建勳勞授福州衛指揮使後以平海洋倭冦功升都督僉事督遼東海運封航海侯卒年九十追封恩國公諡莊簡陳德鳳陽人歸附從征纍功封臨江侯卒追封把國公諡定襄花雲懷逺人體長大面鐵色驍勇絶人既歸附將兵略地屢建竒功升行樞密院判守太平陳友諒來攻雲被執怒罵奮躍而起縛皆絶奪守者刃連斬賊五六人賊衆怒縛雲叢射之至死罵不絶口追封東丘郡侯雲被執妻郜氏赴水死子煒始三嵗婢孫氏抱匿之渡江因潰卒爭舟捽孫氏及兒投江中孫氏抱兒附一斷木入蘆渚中采蓮實啖之七曰不死有老父呼令俱行送至朝老父不見煒既長命為水軍衛指揮僉事李新鳳陽人國初歸附擢管事千户以功纍升中軍都督府僉事封崇山侯王簡夀州人國初來歸從師渡江招降決戰征討四方屢著勳績官至都督僉事卒追封霍山侯諡忠毅王真夀春人少英邁國初以武功纍官廣西都指揮使在鎮軍民輯睦號為稱職卒贈都督同知追封臨沂侯諡桓義張銓定逺人國初以從征功纍升指揮僉事繼以取中原破諸州下濟南征西蜀功纍升都督僉事後以再征雲南有功封永寧侯安然潁州人洪武初為起居注厯任浙江河南布政司參政尋升山東布政使未幾召為御史大夫官至四輔每論事賜坐多所裨益潘毅臨濠人國初從征十有五年破荆楚將諸山冦轉戰吳越從徐達北伐皆與有功拜虎賁衛指揮使再從西征道卒追封榮陽伯諡曰武李敏潁州人洪武初為工部尚書尋升江西行省參知政事復轉工部尚書賜以浙江田土卒遣官祭葬胡海定逺人慷慨有大志國初從征每戰以身先士卒敗元將賈魯授萬户繼以克捷諸州擒元帥唐隆等升指揮使留鎮益陽後又以征湖廣廣西平雲南功封東川侯充征南將軍平九溪諸蠻冦歸老于家子斌龍虎衛指揮使征雲南中流矢卒贈都督同知觀尚南康公主寧正夀州人國初纍功至右軍左都督平羌將軍李恪鳳陽人國初從征渡江纍功至後軍都督僉事陳春夀州人洪武中纍功至右軍都督僉事高銘鳳陽人國初仗戈來從授百户升千户洪武初以從征日久多著勞績命子亮襲職特授銘中軍都督僉事致仕張耀夀州人從義兵元帥陳野先領兵屯建康之殷巷天兵克殷巷耀始歸附命與諸將子同入侍衛纍立戰功升神策衛指揮使洪武初從李文忠與北兵戰沒賜葬于江寧縣獅子塘唐鐸鳳陽人重厚慎密國初隨侍左右厯任副都御史兵部刑部尚書太子少保僚屬數以事連鐸上重其德皆釋不問嘗稱之曰鐸自友及臣三十餘載交不知變色口不出惡聲及卒遣官護喪恤賻甚厚吕本夀州人初仕元為元帥府都事國初歸附為中書掾史纍升太常司卿卒賜葬鍾山之隂女為皇太子妃郁新臨淮人洪武中以才能舉授户部主事纍升侍郎新長于訾算奏事稱㫖秩滿升尚書卒賜祭葬鄒魯盱眙人洪武中以聰明正直舉授河內縣簿尋以事降為會稽縣典史耆民奏其廉能遂升知縣既而廣寧衛鎮撫趙興以公事至縣為人請求魯執法不從興遂誣奏逮至刑部事直上嘉其有守特升為大理寺丞賜鈔襲衣郝致才濠梁人深明醫術國初因其用藥有驗召為太醫院判後請老以其子又傑為院吏單安仁鳳陽縣人洪武初入仕克效勤勞又嘗從征有功纍官至兵部尚書卒賜葬祭金純泗州人由太學生擢吏部文選郎中有能聲薦升江西布政司參政召為刑部侍郎尋升禮部尚書轉工部又轉刑部致仕朱濬夀州人父伯賢為長史有輔導功濬以父䕃補官厯升北京刑部尚書勤能著稱三子皆為顯官吳斌霍丘人由太學生擢刑部主事持法不撓朝廷重之纍升都察院左都御史陳居敬蒙城人由太學生厯官勤能纍升户部右侍郎桂滿臨淮人由鄉舉厯官才能過人纍升都察院左僉都御史欒世英潁州人洪武初入仕厯任不怠官至四川布政使沈士溫臨淮人早以才能擢秦州衛知事勤於職務纍遷浙江右布政使章順潁上人以隱士召用厯官勤慎纍升河南布政使尋調廣西有惠政楊冀安靈璧人洪武初入仕厯遷工部侍郎有聲卒賜葬祭張泌潁州人洪武中由太學生授兵科給事中和易謹厚勤於職事升都給事中再升光祿寺卿為光祿二十餘年於御膳必躬視精潔其祭享宴會必豐潔馭下以寬處事以公衆咸服之及卒特賜祭葬泌容貌豐偉識達大體後吏部每奏除光祿官必思得人如泌經濟濠州人為鄉里耆老國初車駕至濠賜濟等宴謂曰諸父老皆吾故人豈不欲朝夕相見然吾不得久留此父老歸宜教導子弟為善立身孝弟勤儉養生父老等亦宜厚自愛以樂高年濟等頓首謝皆歡醉而去陳亨夀州人勇敢善騎射國初從征渡江以功纍升後軍都督僉事仍掌北平行都司事後從軍平內難鏖戰壩上乘勝而南至白溝奮擊衝陳以疾卒追封涇國公諡襄敏朱能懷逺人父亮國初渡江從征積功至燕山中護衛千户能嗣其職沈毅有智略從師平內難降强撫順屢建勳勞封成國公永樂初進太子太傅安南叛率師討之以疾卒于龍州卒之日將校皆流涕追封東平王諡武烈劉才霍丘人國初從征開創後從靖難俱有功為人悃愊無華不為苟合亦不苟詆訾纍爵至廣恩伯李逺懷逺人沈毅有膽力善騎射從軍靖難纍功封安平侯征北方突陳力戰馬蹶被執罵不絶口而死追封莒國公諡忠壯孫巖鳳陽人少挾智勇國初從征渡江授百户調燕山右護衛靖難之時命守通州城孤而敵攻之急巖隨機應敵卒保無虞封應城伯卒追封應城侯諡威武周長天長人善騎射居燕山中護衛從軍靖內難戰白溝東昌藁城皆與有功卒追封菜陽伯諡忠毅張勇夀州人年壯有膂力洪武初從父興起行伍以功授燕山左護衛指揮僉事後靖難兵起勇復從興在行陳為肘腋每戰克捷興嘗單騎追敵身被數創傷重勇繼領其衆以功封安鄉伯趙彛虹縣人洪武初由虎賁右衛百户以沙漠築城功升永平衛指揮僉事後以從靖內難功纍升都指揮使封欣城伯景福臨淮人洪武中為會州衛指揮同知後從靖內難積功至右軍都督僉事卒賜葬祭崔聚懷逺人從靖內難以功纍升薊州衛指揮使扈從北伐敗邊冦升河南都指揮僉事又升左軍都督僉事征交趾力戰而死皇甫斌夀州人任遼海衛指揮同知為人忠勇有智略遇警急不避險艱身先士卒適有冦犯邉領軍禦之至密城東峪與冦遇交戰自旦及晡斌氣愈鋭戰愈力以矢盡死子弼從戰以身衛父亦死事聞詔褒恤之張思恭蒙城人永樂中纍官北京刑部右侍郎馭下嚴恪吏畏服之嘗出鎮能謹邊防人稱其才袁容夀州人永樂中為駙馬都尉儀容端謹進封廣平侯卒追封沂國公諡忠穆宋晟定逺人永樂中以靖難功纍升右都督進封西寧侯子琥瑛俱為駙馬都尉襲侯爵瑛於正統中率兵征邊冦沒於陳追封鄲國公諡忠順張信臨淮人永樂中以靖難功纍官都督僉事進封隆平侯為人智勇出衆能效忠勤卒追封鄖國公諡襄僖費瓛定逺人謀勇過人永樂中從征有功纍升左都督宣德初進封崇信伯張貫靈璧人由大學生厯職勤能永樂中纍遷順天府尹卒于官王綗定逺人性至孝母病躬侍湯藥母沒哀毀水漿不入口三日既葬不茹葷飲酒廬墓三年事聞旌其門曰孝行王質太和人永樂中由鄉舉授南陽縣訓導以才學卓異拜監察御史清謹老成薦升四川參政愈勵前志出巡不食肉人呼為青菜王厯遷山東右布政使未幾召為户部右侍郎尋升刑部尚書復轉户部卒朱勇能子性至孝居喪哀毁人不能堪永樂五年襲父公爵厯掌帥府兵政宣德中以征沙漠功加太子太保正統初復敗北兵進太保後提兵禦敵沒於陳追封平隂王諡武愍勇修幹魁顔望之森然善騎射待士卒有恩尤重文士工大書縉紳咸推重之苗衷定逺人永樂中登進士第二擢翰林院編修屢典文衡預修實録正統初用楊士竒薦為經筵講官學術醇正士林推重厯升兵部侍郎兼本院學士入內閣與機務進兵部尚書景泰初致仕卒年八十贈少保諡文康年富懷逺人永樂中舉鄉試纍升陜西右參政興學勸農尤嫉贓吏遷河南右布政撫定流民數十萬皆為編户進左副都御史巡撫大同核實軍功爵賞無濫召為户部尚書夙夜不懈以國計為已任尋卒諡恭定南畿志卜謙潁上人領永樂辛卯鄉薦授工科給事中嘗從皇太孫南京監國忠于輔導值內外艱廬墓側六載宣德間直文華殿陳事大見嘉納升陜西僉事尋升山東副使疏時事忤近幸謫陜西參議民聞謙至歡呼迎者塞途以足疾致仕南畿志韓璽潁州人永樂中由大學生授給事中選春宫講讀升山東按察副使宣德初召還侍文華殿備顧問以忤權貴遷廣東參政考滿致仕室如懸罄南畿志李芳潁上人登進士選庶吉士轉刑科給事中立朝凛然執法不撓嘗陳前代理亂朝廷得失等事上嘉納以忤權貴謫海鹽丞家居怡然四十餘年卒南畿志趙亮亳州人以刀筆任慶雲典史督民耕織嵗饑捐俸買榖種給貧民入覲以賢能聞賜衣一襲鈔百錠升崇仁知縣盜息民安升撫州知府卒南畿志陳道盱眙人為文選主事有聲出知金華善斷大獄纍遷南京刑部尚書志南畿劉福臨淮人任山東兖州府管泉同知河決張秋以死勤事囊無餘資今祀于安平鎮志南畿王矩武平衛人母羅氏終廬墓側冬不絮夏不扇有棠榆生連理枝之異服闋猶衣縞素蔬食二十餘年事聞旌表南畿志蔡興盱眙人父歿負土築墳廬墓三年植木成林有鳩鳥營巢之異事聞旌其門大學士李東陽為作傳南畿志李紹賢盱眙人正德初舉進士授行人諌南巡忤㫖杖于闕庭死南畿志列女范滂母細陽人漢建寧中大誅黨人詔下急捕滂白母曰仲博孝敬足以供養滂從龍舒君歸黃泉存亡各得其所惟大人割不忍之恩勿增感戚母曰汝今得與李杜齊名死亦何恨既有令名復求夀考可兼得乎滂跪受教再拜而辭聞者無不流涕夏侯令女譙人魏梁相文寧之女曹爽從弟文叔妻也文叔早死服闋恐家必嫁已乃斷髮為信後家果欲嫁之令女復以刀截兩耳及爽被誅夫家夷滅已盡文寧冀其意沮微使人諷之令女復以斷鼻終不改其執義之志曹氏臨淮王宣妻宋建炎中盜馬進掠臨淮宣要曹氏避之曹曰我聞婦人死不出閨房賊至宣避之曹堅卧不起衆賊劫持之大罵不屈為所害鍾離婦宋紹興間金人來攻城陷欲驅之去婦罵曰汝寧殺我必不從賊金人怒斷其臂婦罵不絶口死之花夫人郜氏懷逺人東丘侯花雲妻陳友諒陷太平雲死郜以其子煒囑侍兒孫氏即以死殉南畿志杜氏鳯陽人夫卒于元末杜年二十三守節育孤洪武十年旌表周氏臨清人詹奎妻年十七適奎奎卒無子家特貧周守志不二事夫祖母及姑生養殁葬惟謹永樂中旌表南畿志劉錫妻張氏靈璧人錫卒張年二十有三二子夫兄逐逼改適張剪髮自矢遣子珍就學後舉鄉貢正統中事聞旌表南畿志金源妻盧氏亳州人有程義妻何氏景泰中同以守節受旌表南畿志胡氏五河人年十九夫亡守節終身天順中旌表其門南畿志周鑑妻官氏虹縣人成化間以守節事聞旌異其門南畿志陳氏宿州人方諒妻諒卒陳年十八守節撫養遺腹子亦尋卒陳守益堅𢎞治中旌南畿志方淳妻居氏定逺人正德壬申流冦攻陷定逺居死節一時女婦死節者計五十六人賊平侍郎叢蘭上其事詔悉旌其門志南畿王綬妻徐氏靈璧人正德辛未流賊猖獗徐被虜不從被七鎗三箭而死時有李希儒妻張氏赴水死董鸞妻茅氏攜子女赴井死事聞俱旌表李驥妻胡氏太和人正德辛未賊攻太和胡不受辱被殺一時同節王昭妻陳氏李氏女玉蓮後事聞旌之南畿志武氏武平衛百户穆榮妻武適榮未朞而寡所親勸之他醮武持刀刎頸血濺滿衣家人救之得不死年九十餘卒志南畿雙貞女不知其姓盱眙何雄育為已女正德辛未嵗饑雄欲鬻于娼以賈厚利二女知之一夕以巾聨兩臂投淮河而死志嘉靖初詔立廟祀之賜額雙節南畿宋氏亳庠生毛繼妻繼卒宋矢志不二持夫之書籍衣服于靈所侍奉如生孀居三十六年以禮自防蓬首垢面足迹不外出部使者書貞節二字以榜其門南畿志仙釋吕真人有道士投宿曹三香店三香有惡疾道士以筯針其股曰回心回心既出見户外有皂角大樹枯死已久遂以粒藥投於竅中以泥緘之須㬰失道士所在翌日皂角復生枝葉敷榮三香疾亦愈遂為建祠於郡東北藍采和唐末人嘗飲于鍾離市橋酒樓乘雲仙去莫知所終嘗作歌曰踏踏歌藍采和人生能幾何紅顔三春樹流年一擲梭古人混混去不返今人紛紛來更多朝騎龍鳳到碧落暮看桑田生白波長景凝暉在烟際金銀宫闕髙嵳峩僧伽葱嶺北人唐龍朔中東遊長安南至臨淮宿賀𤣥濟家謂𤣥濟曰此故寺也𤣥濟因捨宅為寺掘地得石刻果齊香積寺基中宗召見賜號國師及滅度後大著靈異土人呼為大聖云劉大師舊傳唐憲宗時有劉大師者騎白馬行村落中不知所從來人有病與藥輒愈一日從鄉人鄭氏乞地為室未可俄入林中趺坐而逝衆異之即其地為寺志言夀春人自言姓許落髮東京景德寺相貌竒古語笑無度時從屠酤遊飲啖無所擇衆以為狂然事多前知宋仁宗嗣未立默遣內侍至志言所志言書有十三郎字人莫測何謂後英宗以濮王第十三子入繼衆始悟嘗有具齊薦繪者并食之臨流而吐化為小鮮羣泳而去言將死作頌仁宗命以真身塑像置寺中人見額上有光就視之得舍利明一統志卷七
