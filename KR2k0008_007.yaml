body:
  text: 明一統志卷七明李賢等撰中都古塗山氏之國即大禹會萬國諸侯之所東連三吳南引荆汝外有江湖之阻內保淮淝之固山川環拱鍾靈育秀實我太祖髙皇帝龍興之地如周之岐豳漢之豐沛也洪武三年建為中都尋定鼎金陵乃設留守司於此誠為國家千萬世根本之地云城池中都城本朝洪武初營建於舊城西二十里周回五十里立門九正南曰洪武南之左曰南左甲第右曰前右甲第北之東曰北左甲第西曰後右甲第正東曰獨山東之左曰長春右曰朝陽正西曰塗山皇城在中都城中萬嵗山南壇廟圜丘在洪武門外之東本朝初祀天之所方丘在北左甲第門外本朝初祭地之所太廟在皇城內山陵祖陵在泗州城北十三里皇陵在中都城西南十二里太平鄉乃仁祖淳皇帝淳皇后陵也苑囿內果園萬嵗山下內臣職守嵗進胡桃棗票等果公署中都留守司在洪武門內東本鳳陽行大都督府舊基洪武十二年改建為留守司領城內留守中留守左鳳陽鳯陽中鳳陽右懷逺長淮七衛及洪塘湖屯田千户所皇陵衛在中都城西南十二里洪武二年建後𨽻中都留守司鳳陽府東至揚州府寶應縣界四百里西至河南開封府項城縣界五百九十里南至廬州府合肥縣界一百五十里北至徐州蕭縣界三百三十三里自府治至南京三百三十里至京師二千里糧二十萬五千七百石零建置沿革禹貢揚州之域天文斗分野古為塗山氏之國戰國時屬楚淮南郡秦屬九江郡漢更郡為淮南國武帝初復屬九江郡東漢為鍾離侯國晉復屬淮南郡安帝時置鍾離郡屬徐州劉宋泰始末改屬南兖州後置北徐州治鍾離北齊改為西楚州隋開皇初改為濠州大業初復改為鍾離郡唐復為濠州天寶初又改為鍾離郡乾元初復為濠州貞元中改屬徐州後復為濠州五代時南唐改置定逺軍宋建炎間復為濠州元至元中置濠州安撫司後升為濠州路未幾改臨濠府後復為濠州屬安豐路本朝為興業之地吳元年改臨濠府洪武三年改中立府定為中都七年改為鳳陽府自舊城移治中都城直𨽻京師領州五縣十三鳳陽縣附郭秦漢並為鍾離縣地厯代皆因之本朝改為臨淮縣洪武七年始析臨淮之太平清洛廣德永豐四鄉置鳳陽縣以在鳳凰山之陽故名十一年又割虹縣南八都益之編户三十四里臨淮縣在府東北二十里本秦九江郡之鍾離縣東漢為鍾離侯國晉復置安離縣屬淮南郡隋於此置濠州唐以塗山縣省入宋元仍舊本朝洪武三年改置中立縣尋改臨淮縣仍治舊城編户四十九里懷逺縣在府西七十里春秋時宋地秦屬泗水郡漢屬沛郡三國魏為蘄城縣北齊屬龍亢郡五代周置鎮淮軍宋改懷逺軍領荆山一縣元改軍為縣以荆山縣省入本朝因之編户四十七里定逺縣在府南九十里本秦曲陽縣漢為東城縣屬九江郡東漢為西曲陽縣晉屬淮南郡梁改曰豐城縣置定逺郡尋改郡曰廣安縣曰定逺南齊改廣安曰大安郡隋罷郡改縣曰臨濠唐初復為定逺縣宋元仍舊本朝因之編户三十三里五河縣在府東北一百一十里本泗州五河口宋於此置隘口屯田又置安淮軍及五河縣有涇澮沱漴淮五河故名元屬臨淮府後屬泗州本朝改今屬編户一十五里虹縣在府東北二百五十里堯封禹為夏伯邑於此漢因置夏丘縣屬沛國北齊置夏丘郡後周改晉陵郡隋仍為夏丘縣屬虹州唐因置虹縣屬泗州後屬宿州宋仍屬泗州金廢元復置本朝因之改今屬編户一十七里夀州在府西一百八十里春秋為六蓼國地楚遷都於此秦為夀春邑置九江郡漢初為淮南國武帝時復為九江郡東漢為揚州刺史治所晉置淮南郡東晉改夀陽郡元魏置揚州梁改豫州東魏北齊復為揚州陳為豫州後周又為揚州皆治於此隋初置夀州後改淮南郡唐為夀州天寶初改夀春郡乾元初復為夀州五代唐為順化軍南唐改清雅軍宋置夀春府後改安豐軍元置安豐路本朝改為夀州以夀春縣省入編户五十四里領縣二霍丘縣在州城西南一百二十里本周霍叔封邑春秋為蓼國地漢為安豐松滋二縣地晉屬安豐郡後置霍丘城梁置安豐郡於此東魏廢隋置霍丘縣唐宋仍舊本朝因之編户三十七里蒙城縣在州城北一百八十里本漢沛郡之山桑縣東漢屬汝南郡三國魏屬譙郡後魏置渦陽縣隋改曰淝水縣大業中復改為山桑縣唐改蒙城縣五代宋因之金屬夀州元屬安豐路本朝仍屬夀州編户二十五里泗州在府東二百一十里禹貢徐州周青州之域春秋時徐子國秦屬薛郡漢初為東海郡地元鼎中為泗水國後為􅤌猶縣晉為宿預縣屬淮陽國後魏為宿預郡尋改東徐州又為東楚州陳改安州後周改泗州隋為下邳郡唐仍改泗州天寶初改臨淮郡乾元初復為泗州五代宋元仍舊本朝因之以附郭臨淮縣省入編户五十里領縣二盱眙縣在州城南七里春秋時為吳善道地漢置盱眙縣屬臨淮郡東漢屬下邳國晉為臨淮郡治後置盱眙郡南齊於此置北兖州陳屬北譙州唐屬楚州宋置旴𣅿軍後仍為縣紹定中改招信軍元升招信路尋改臨淮府後仍為盱眙縣屬泗州本朝因之編户三十七里天長縣在州城東南一百五十七里本漢廣陵縣地梁置涇州後周置石梁郡及石梁縣隋初郡罷大業中改縣曰永福唐置千秋縣天寶中改天長縣五代時南唐置建武軍周改為雄州宋初為天長軍至道初復為縣建炎初復為軍後復為縣元仍舊本朝因之編户一十二里宿州在府西北二百三十三里本古宿國春秋時屬宋後并於楚秦屬泗水郡漢屬沛郡梁置睢州北齊置睢南郡唐置宿州宋置保靜軍治符離縣元仍為宿州屬歸德府本朝改今屬編户七十里領縣一靈璧縣在州城東一百二十里本隋虹州地唐為虹縣之零璧縣鎮宋元祐初置零璧宿州縣政和中改曰靈璧屬宿州元省入泗州後復置屬潁州在府西四百四十里禹貢豫州之域春秋為胡子國戰國屬楚秦為潁川郡地漢為汝隂縣屬汝南郡魏置汝隂郡後魏置潁州取潁水為名齊罷州置郡隋初廢大業初復置唐初置信州尋改潁州天寶初改汝隂郡乾元初復為潁州五代因之宋置順昌軍政和中改順昌府治汝隂縣金復為潁州元屬汝寧府本朝改今屬編户八十里領縣三潁上縣在州城東一百二十里本漢汝南郡慎縣地晉屬汝隂郡梁置下蔡郡北齊省隋志潁上縣屬汝隂郡唐屬潁州五代宋金因之元省入州後復置本朝因之編户一十九里太和縣在州城西北八十里本漢汝南郡細陽縣地宋置萬夀縣宣和中改太和縣元省入潁州後復置本朝因之編户三十五里亳州在府城西北四百五十里本春秋譙邑秦屬碭郡漢置譙縣屬沛國魏為譙國後魏置南兖州後周改亳州唐初為譙州尋改亳州天寶初改亳郡乾元初復亳州宋置集慶軍金仍為亳州元屬歸德府本朝降為縣𢎞治中復升為州屬鳳陽府編户四十九里郡名濠梁鍾離俱古名形勝背渦口之曲流望馬丘之髙澨魏王粲浮山賦東連三吳南引荆汝晉伏滔正淮論東連三吳之富南引荆汝之利外有江湖之阻內保淮淝之固鍾離天險元魏邢巒表建鄴肩髀隋書夀春形勝建鄴之肩髀淮海內屏東南樞轄唐羅珦德政碑長淮橫北石梁環西宋連南夫修城記濠之為城也長淮引桐柏之源橫其北石梁會衆山之流環其西淮南一都會寰宇記夀春淮南一都會地方千里有陂澤之饒北接中原南通江淮泗州圖册梁宋吳楚之衝齊魯汴洛之道泗州郡志阻淮帶山為淮南之險元史地理志風俗文詞並興宋錢文子修學記濠水之上江淮之間惠莊隱士昔所游處淮南賔客集而著書流風所被文詞並興性率真直賤商務農寰宇記尚武勤農知慕孝行夀州圖經其俗尚武稍習文詞務儉勤農知慕孝行民俗醇厚以信行為先泗州圖册民俗醇厚以信行為先與洙泗接壤雍容文雅有士君子之風喜學問從教化元宿州志喜學問從教化雖兵革之餘猶有是心風俗清麗穎州舊志山川流峙風俗清麗人才皆間氣所鍾人備文武全才同上不事末作同上汝隂之俗不事末作男勤耕桑女勤織絍山川萬嵗山在皇城北城垣經其上山之東西有二峯對峙東曰日精西曰月華盛家山在萬嵗山東大龍興寺在焉馬鞍山在萬嵗山西以形似名又有山在旴𣅿縣南四十里亦曰馬鞍唐天寶中改曰旴𣅿山鳳凰山在府治北即府之主山也又有鳳凰山在靈璧縣西五里皆以形似名獨山在府東觀星臺在其上欄干山在舊府城西二十里相連如欄干然曹山在府西北三十里相傳魏曹操嘗駐兵於此畫山在府西五十里山有木枝如楊栁可用為畫故名石膏山在府西南五十里山出石膏今採取無時陡山在府西南六十里又有陡山在旴𣅿縣東北五里皆以險峻得名鏌鋣山在府南八十里相傳人嘗於此鑄劍故名雲母山在舊府城西南四十里相傳山出雲母彭祖取服之宋蘇軾詩跨厯商周看盛衰欲將齒髮鬭蛇龜空飱雲母連山盡不見蟠桃著子時升高山在舊府城西南五十里俗以正月登此山遊樂化明山在舊府城東六十里隋志化明縣蓋以此山得名烏雲山在舊府城東南六十里又名烏霧山與定逺縣接境山上常有曀霧鍾乳山在舊府城南六十里山穴中出鍾乳又名濠塘山以濠水之源所出白沙山在舊府城東八十里其山遍是白沙荆山在懷逺縣治西南城經其上山之西北有玉坑乃卞和采玉之所白石異常其他處石皆青黑東有卞和洞又名抱璞巖唐胡曽詩抱玉巖前桂葉稠碧溪寒水至今流空山落日猿聲呌疑是荆人哭未休塗山在懷逺縣東南八里與荆山對峙禹娶于塗山即此山西南有禹墟及禹會村蓋禹會諸侯之地唐栁宗元銘塗山巖巖界彼東國惟禹之德配天無極宋蘇軾詩川鎖支祁水尚渾地埋汪罔骨應存樵蘇已入黃能廟鳥鵲猶朝禹會村韭山在定逺縣東北四十里以山暖多韭故名山上有石城兵火時嘗保聚焉山下有洞穴其中澗水常流不絶石形如器物者甚衆左右多唐人題刻深處有石觀音像後為峻崖遊者莫能至踰水而還劍山在定逺縣舊傳山有寶劍驟雨過或倚立路傍夜中黑氣多見光又天長縣北四十五里亦有劍山華蓋山在定逺縣東南二十五里山頂似蓋相公山在定逺縣東七十里以令狐子伯立廟山傍俗呼令狐相公因以名山橫澗山在定逺縣西北七十里上有石纍城及澗泉兵火時嘗屯禦於此朱山在虹縣東北四十里以有漢朱買臣祠墓故名鹿鳴山在虹縣西三十里八公山在夀州東北五里淝水之北淮水之南漢淮南王安與其賔客八公俱登此山學仙今山有安故臺及石上有人馬迹晉謝𤣥禦苻堅陳淝水堅望見八公山上草木皆為旌旗狀秦師遂敗紫金山在夀州東北一十里山有車轍馬迹謂淮南王安賔客之遺迹世傳昔有人獲小金牌可以療病疑為丹砂所化周世宗大破南唐軍於紫金山即此硤石山在夀州西北一十五里山兩岸相對淮水經其中禹鑿舊蹟猶存山上嘗立二城以防津要黃閭山在夀州東北五十里相傳楚春申君黃歇嘗遊於此舜哥山在夀州東北八十里舊名舜王山俗傳舜嘗耕於此山石上有大人足蹟大别山在霍丘縣西南八十里接河南固始縣界髙祖山在霍丘縣西八十里近固始縣舊傳漢髙祖追頂羽嘗過此九仙山在霍丘縣南一百里上有九臼舊傳嘗有九仙人搗藥於此望到山在霍丘縣南二百五十里山形峭峻遙望似近而行實難到故名北狼山南狼山俱在䝉城縣西北二十八里二山對峙甓山在泗州西四十里今作碧山上有祠第一山在盱眙縣治東其下有石刻宋米芾書第一山三大字芾詩云莫論衡霍衝星斗且是東南第一山司馬光詩都梁一别周星