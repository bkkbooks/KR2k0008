body:
  text: 明一統志卷九十明李賢等撰安南東至海三百二十里西至雲南老撾宣慰司界五百六十里南至占城國界一千九百里北至廣西思明府慿祥縣界四百里自其國至南京七千七百二十里至京師一萬一千一百六十五里沿革古南交之地秦屬象郡漢初為南越所有武帝平南越置交趾九真日南三郡兼置交趾刺史治羸􅖮東漢郡屬交州吳增置九德武平新昌三郡宋又增置宋平郡而徙交州治龍編梁陳於交州置都督府隋初郡廢改都督府為總管府唐初仍曰交州調露初改安南都護府至德初改鎮南都護府大厯間復曰安南五代梁時土豪曲承美專有其地後為劉隱所并後楊延藝紹洪相繼為交趾節度使既而管內大亂推丁部為州帥其子璉繼立宋平嶺表璉內附封交趾郡王弟璿嗣立為其將黎桓所篡其後李公藴篡黎氏陳日煚篡李氏然皆臣服中國封交趾郡王元憲宗時遣將破其國日竄海島後歸附封其子光昺為安南國王光昺死子日烜自立世祖又發兵討破之日烜卒子日燇遣使入貢本朝洪武初陳日煃率先歸附仍賜安南國王印傳至日焜其臣黎季犛篡立僭稱偽號永樂四年詔遣新城侯張輔西平侯沐晟率兵分道並進俘獲季犛父子詔求陳氏後立之無所得因郡縣其地置府十七州五領各州縣又建交趾布政司提刑按察司及都指揮使司於交州府洪熙元年寇孽黎利攻劫郡邑朝廷復命將討之宣德二年黎利勢屈始奉表乞立陳氏後曰皓者主其國詔封為安南王後利篡皓而自立朝臣復請加兵會利遣使來貢謝罪請命因而與之至今朝貢不絶舊所置府州縣列於左方交州府領慈亷福安威蠻利仁三帶五州東關慈亷石室芙蒥清潭清威應平平陸利仁安朗安樂扶寧立石一十三縣北江府領嘉林武寧北江三州嘉林超類細江善才東岸慈山善誓七縣諒江府領諒江上洪二州清逺那岸平河鳯山陸那安寧保祿古隴唐安多錦十縣諒山府領上文下文七源萬涯廣源上思下思七州丘溫鎮夷淵縣丹巴脫縣五縣新安府領東潮靖安南䇿下洪四州至靈峽山古費安老水棠支封新安安和同利萬寧雲屯四岐清沔一十三縣建昌府領快州及建昌布縣真利東結芙蓉永涸六縣鎮蠻府領廷河太平古蘭多翼四縣奉化府領美祿西真膠水順為四縣建平府領長安一州懿安大灣安本望安寧黎平六縣三江府領洮江宣江沱江三州麻溪夏華清波西闌古農五縣宣化府領曠縣當道文安平原底江收物大蠻楊縣乙縣九縣太原府領冨良司農武禮洞喜永通宣化㺯石大慈安定感化太原一十一縣清化府領九真愛州清化葵州四州安定永寧古藤梁江東山古雷農貢宋江俄樂磊江安樂一十一縣乂安府領歡州南靖茶籠王麻四州衙儀友羅丕祿上油偈江真福古社上黃東岸石塘竒羅盤石河華一十三縣新平府領政平南靈二州衙儀福康左平三縣順化府領順化二州利調石蘭巴安仁茶偈利蓬乍令思蓉蒲苔蒲浪士榮十一縣升華府領升華思義四州黎江都和安備萬安具熙禮悌持羊白烏義純鵝杯溪錦一十一縣廣威州領麻籠美良二縣嘉興州領籠縣蒙縣四忙三縣歸化州領安立丈盤文振水尼四縣宣化州領赤土車來瑰三縣演州領瓊林茶清芙蒥三縣風俗夷獠雜居不知禮義文獻通考五嶺以南地方遐阻夷獠雜居不知禮義其性輕悍以富為雄豪爭奪兼并役屬貧弱俘掠不忌土俗獷悍宋史安南國傳不解種麥偽越外記椎髻剪髮同上其人或椎髻或剪髮文身跣足口赤齒黑尊卑皆食檳榔一年再稻一歲八蠶桑麻蔽野多魚鹽之利好浴善水平居不冠安南志暑熱好浴於江故便舟善水平居不冠立常叉手席坐盤足待客以檳榔同上謁尊貴跪膝三拜待客以檳榔嗜醎酸海味交愛人倜儻好謀歡演人淳秀好學同上山川佛迹山在交州府石室縣上有巨人迹下有池景物清麗為一方勝槩勾漏山在石室縣相傳古勾漏縣在其下漢書勾漏縣有潛水牛上岸共鬬角軟還復出東究山在北江府嘉林州一名東臯山唐刺史髙駢建塔其上仙遊山在北江府武寧縣一名爛柯山相傳有樵夫觀二仙奕碁於此不覺斧柯已爛金牛山在武寧縣相傳唐刺史髙駢欲鑿其山見金牛奔出遂止漢書九真郡居風縣有山出金牛往往夜見光輝十里崑山在諒江府鳯山縣上有清虛洞山腰有瀨玉橋白雲庵林岫之勝丘皤山在諒江府丹巴縣上有石門廣三丈相傳漢伏波將軍馬援所鑿安子山在新安府東湖縣一名象山漢安期生得道處宋海嶽名山圖以此山為第四福地雲屯山在新安府雲屯縣大海中兩山對峙一水中通蕃國商船多聚於此大圓山在新安府新安縣大海中突起圓嶠永樂十六年此山獲白象二來獻鳯翼山在三江府夏華縣邑人歲時登覽於此三島山在宣化府楊縣三峰特起芄山在太原府㺯石縣下有岩洞水穿洞中可行舟隴山在太原府洞喜縣四面峭壁中有村墟戲馬山在清化府永寧縣一名遊英山巍然獨立橫枕長江為邑人九日登髙處安鑊山在清化府東山縣出美石漢豫章太守范寧嘗遣吏於此採石為磬天琴山在乂安府竒羅縣東海邊相傳陳氏主遊此夜聞天籟聲故名本朝永樂初天兵擒黎賊子蒼於此橫山在乂安府河華縣昔林邑告交州刺史朱蕃求以日南北鄙橫山為界即此傘圓山在嘉興州其勢髙峻雄偉艾山在嘉興州蒙縣面臨大江峭石環立人迹罕至相傳上有仙艾每春開花雨後漂水羣魚吞之便過龍門江化為龍海環交州等府東南唐沈佺期渡海詩嘗聞交趾郡南與貫胸連四氣分寒少三光置日偏越人遙捧翟漢將下看鳶北斗崇山挂南風漲海牽别離頻破月容鬢驟催年虛道崩城淚明心不應天冨良江在交州府東關縣一名瀘江上接三帶州白鶴江經府城東下通利仁縣大黃江以達於海宋郭逵破蠻決里隘次冨良江本朝張輔等嘗破黎寇於此處天德江一名廷藴江又名東岸江永樂初黎寇懼討役民堙塞已久天兵既平寇重加浚治舟楫復通來蘇江舊名蘇歷江自交州府城東北轉而西下直抵鋭江昔有人名蘇歷者開此故名本朝永樂初工部尚書黃福重浚因王師弔伐乃更名來蘇宣光江在宣化府曠縣源自雲南教化長官司入境流七百餘里以達宣化江永樂初沐晟自雲南引兵駐此海潮江在建昌府快州自阿魯江分流下通玉球江昔陳氏破占城軍處龍門江在嘉興州蒙縣漢書封溪縣有隄防龍門水即此源出雲南寧逺州至此橫截江流中分三道飛湍聲聞百里舟過此必舁上岸方可復行傍有穴多出鸚鵡魚色青緑口曲而紅似鸚鵡嘴相傳此魚能化龍云夜澤在建昌府東結縣梁武帝時有阮賁者世為豪右因命陳霸先擊破之賁逃澤中夜則出掠因號夜澤龍溪在鎮蠻府廷河縣昔陳氏夜過此江不能渡忽見一橋跨江既渡回顧不見及有國改名龍溪天威涇唐髙駢以交州至雍川海多潛石漕運不通遂鑿開五道有青石涇或傳漢馬援所不能治既而震碎其石亦得通因名天威涇東津渡在交州府東關縣瀘江舊以舟楫往來阻於風濤永樂初張輔沐晟始置浮橋橋歲一易土産金太原諒山乂安等府出珠靖安雲屯海中出海賈云中秋有月是歲多珠珊瑚有赤黑二種在海直而軟見日曲而堅漢初趙他獻赤珊瑚名火樹玳瑁狀類龜而殼稍長其足有六後兩足無爪丹砂晉葛洪欲煉丹求為勾漏令杜甫詩交趾丹砂重沉香有香木斫斷歲久朽爛而心節獨存置水中則沉曰沉香安息香樹如苦練大而直葉類羊桃而長中心有脂作香蘇合油樹生膏可為藥胡椒蔓生似山薯春花秋實羚羊角髙石山出一角而中實極堅能碎金剛石犀象兕漢靈帝時九真獻為竒獸元時安南嘗貢兕白鹿晉元康初白鹿見交趾武寧縣宋元嘉末交趾獻白鹿猩猩南中志猩猩人面豕身似猿常數輩為羣人以酒并糟設路側連結草屐猩猩見之即知張者祖先姓名呼曰奴欲張我亟捨去復自謂試共嘗酒逮醉取屐著之為人所擒狒狒晉郭璞云出交州山中狀如人面長臂黑身被髮迅走食人見人則笑蒙貴狀如猱而小紫黑色畜之捕鼠甚於貓白雉周成王時越裳氏來獻漢光武時日南九真貢翡翠羽可為首飾蚺蛇形大而長其膽性極泠能療眼疾及諸瘡蟻子鹽醢古載交州溪洞酋長多收蟻卵鹽為醬非官客親族不得食周禮醢人饋食之豆有蚔蟻子即此菴羅果俗名香蓋乃果中極品或謂種出西域實似北梨四五月間熟多食無害波羅密大如冬瓜皮有軟刺五六月熟味最香甜可煮食能飽人奉化府嘉林州出者尤佳核烏木堅緻可為器蘇木一名多邦古迹越王城在乂安府東岸縣又名螺城以其屈曲如螺漢時安陽王所築安陽王舊都越地故又稱為越王城城中宮址尚存璽城望海城俱在交州府安明縣漢建武中馬援平交趾分置封溪望海二縣築此二城守之大羅城在交州府城外漢交趾郡唐安南都護府皆在此其城唐張伯儀所築髙駢嘗修廣之宋時李公藴立國於此雒王宫在交州府三帶州未有郡縣時有雒田隨潮水上下墾其田者為雒民統其民者為雒王副二者為雒將皆銅印青綬號文朗國以淳朴為俗以結繩為治傳十八世為蜀王子泮所滅宮址尚存天使館元傅與礪使安南題詩云使旌入館青雲動仙蓋臨江白日回喻蜀豈勞司馬檄朝周終見越裳來浪泊在交州府東關縣一名西湖馬援既平交趾謂官屬曰吾弟少遊常哀吾慷慨有大志嘆曰士生一世但取衣食才足為郡縣吏守墳墓使鄉里稱為善人足矣至求餘自苦耳吾在浪泊西里間賊未滅時下潦上霧毒氣薰蒸仰視飛鳶站站墮水中念少遊語何可得也銅柱漢馬援既平交趾立銅柱為漢界相傳在欽州古森洞上有援誓云銅柱折交趾滅唐馬總又建二銅柱鑱著唐德以明其為伏波之裔今未詳所在日南郡西有西屠夷國援嘗經其地亦植二銅柱表漢界及北還留十餘户於柱下至隋乃有三百餘户悉姓馬按林邑記林邑大浦口有五銅柱唐天寶中何履光伐雲南收安寧城立援銅柱以定疆界亦未詳所在銅鼓交趾服役有頭飛獠子赤裩獠子鼻飲獠子皆穴居巢處好飲酒擊銅鼓鼓成置庭中招同類來者盈門豪富女子以金銀叉擊鼓叩竟留與主人或云銅鼓乃諸葛亮征蠻鉦也名宦漢馬援光武時交趾女子徴側徴二反援以伏波將軍與扶樂侯劉隆等水陸並進至浪泊與二徴戰大破追斬之盡殱其黨交趾平援立銅柱而還張喬順帝時象林蠻區連入寇州郡討之不克於是選喬為交州刺史喬單車至州寇徒自弭朱俊靈帝時交趾梁龍等反乃拜俊交趾刺史令過本郡簡募鄉兵及所調合五千人分兩道而入先宣揚威德既而進逼之斬龍降數萬人旬月盡定賈琮交趾刺史先是刺史無清行吏民怨叛琮招撫荒散蠲復徭役誅斬渠魁簡選良吏百姓以安為之歌曰賈父來晚使我先反今見清平吏不敢飯治事三年為十一州最周乘交州刺史上書云交州絶域習俗貪濁強宗聚姦長吏肆狡侵漁萬民臣欲為聖朝掃清一方時屬城解綬者三十餘人三國吳岱吳交州刺史初交趾太守士徽拒命岱督兵浮海突進徽震怖率兄弟六人降岱皆斬之徽將攻岱岱大破之復討九真遣從事南宣國化扶南林邑諸國各遣使奉貢晉陶侃初王機刺交州與杜洪溫邵等反侃以江夏守討平之斬機等傳首京師以功遷都督交廣七州軍事兼領交州刺史南北朝宗慤宋元嘉中從檀和之伐林邑攻拔區栗城入象浦林邑王領國來逆以具裝被象前後無際慤製獅子形禦象象果驚奔遂克林邑收其珍寶無箅而慤一無所取隋丘和交趾太守撫綏盡情荒域安之蕭銑等舉兵招之不從後納欵於唐授交州大都督唐杜正倫中書侍郎兼太子左庶子承乾稍失道帝詔正倫可審喻之正倫道帝語督切帝責其漏泄貶交州都督馬總元和中遷安南都護亷清不撓用儒術教其俗政事嘉美獠夷安之建二銅柱鑱著唐德明其為伏波之裔裴行立安南經略使時環王國人李樂山謀廢其君來乞師行立斬之歸其孥蠻人悅服髙駢懿宗時為安南都護招討使時南詔陷交趾駢治兵海門進至南定掩擊大破之進破南詔進駢為靜海軍節度使駢從孫鄩嘗為先鋒駢表薦自代從之宋馬植安南都護以文雅飾吏事清淨不煩夷民安之諸酋皆納欵請租稅約束邵曄景德中充交趾安撫國信使會黎桓死其子互相殺奪曄駐嶺表以事聞改為緣海安撫使許以便宜曄貽書安南諭朝廷威德俾速定位即時聽命人物秦阮翁仲身長二丈三尺氣質端勇異於常人少為縣吏為督郵所笞嘆曰人當如是耶遂入學究書史始皇併天下使翁仲將兵守臨洮聲振胸奴秦以為瑞翁仲死遂鑄銅為其像置咸陽宫司馬門外胸奴至有見之者猶以為生漢李進交州人中平間代賈琮為刺史請交趾依中州例貢士其後阮琴以茂才仕至司𨽻校尉人才得與中州同選蓋自進始士燮其先魯國汶上人王莽時避地交趾六世至桓帝時燮父賜為日南守燮治左氏春秋舉孝亷補尚書郎以事免舉茂才拜交趾太守氣宇寬厚謙虛下士天下喪亂不廢職貢詔封龍度亭侯建安末吳孫權遣步隲刺交州燮奉節度修貢不缺封龍編侯唐薑公輔愛州人第進士補校書郎以制䇿異等授右拾遺翰林學士有髙材每進見敷奏詳亮德宗器之朱泚亂帝在奉天公輔曰今禁旅單寡而士馬處外竊為陛下危之帝曰善悉內諸軍既而朱泚兵果至乃擢公輔諌議大夫同中書門下平章事後貶泉州别駕順宗立拜吉州刺史占城國東距海西抵雲南南接真臘國北連安南國東北至廣東舟行順風可半月程至崖州可七日程沿革古越裳氏界秦為象郡林邑縣漢改象林縣屬日南郡漢末區連者殺縣令自立為林邑國王其後世絶外孫范熊代立熊死子逸嗣其臣范推之奴名文者譖逐逸諸子逸死文篡立傳至玄孫文敵為扶南王子當根純所殺國臣范諸農平其亂而自立傳子陽邁陽邁傳子咄歷宋齊梁陳及隋初皆來朝貢隋仁壽末其王梵志為隋將劉方擊破遂棄城遁獲其廟主十八枚皆鑄金為之蓋其國有十八世矣方班師梵志復其故地自是朝貢不絶唐貞觀中其王頭黎獻方物子鎮龍嗣為摩訶慢多伽獨所弒范氏遂絶國人立頭黎之姑子諸葛地更號環王唐元和初入寇歡愛等州安南都護張丹擊破之遂棄林邑徙國於占因號占城五代周顯德中其王釋利因德漫遣其臣莆訶散來貢宋乾德中其王悉利因陀盤遣使因陀玢等貢方物自是間歲或數歲一貢淳熙中襲破真臘慶元中真臘大舉復讎俘殺幾盡更立真臘人以主之元至元間其主孛由補刺者吾內附遣使貢方物後其子補的遂負固弗服屢遣重兵臨之又數遣使招諭乍臣乍叛終無順志本朝洪武初其主阿答阿者首遣其臣虎都蠻來朝貢方物詔遣中書省管勾井桓等封為占城國王自是朝貢不絶每國王嗣立必遣使請命於朝遣使册封率以為常風俗出入乘象馬粒食稻米肉食水兕山羊之類寰宇記胸纒㲲布腦垂髽髻宋史外國傳土無絲繭以白㲲布纒其胸垂至足衣衫窄袖撮髮為髻散垂為髾於後其王腦後髽髻散披吉貝衣戴金花冠七寶裝纓絡為飾股脛皆露躡革履無襪婦人亦腦後撮髻無笄梳其服及拜揖與男子同殺牛祭鬼同上畜産多黃牛水牛而無驢亦有山牛不任耕耨但殺以祭鬼將殺令巫祝之曰阿羅和及拔譯云曰早教他託生人性凶悍果於戰鬬文獻通考市用金銀同上互市無緡錢止用金銀較量錙銖或吉貝錦定博易之直人有疾病旋采生藥服食地不産茶亦不知醖釀之法止飲椰子酒兼食檳榔驅象逐邪焚衣祭天同上正月一日牽象周行所居之地然後驅逐出郭謂之逐邪四月有遊船之戲定十一月十五日為冬至人皆相賀每歲十二月十五日城外縳木塔王及人民以衣物香藥置塔上焚之以祭天刑禁輕重同上刑禁亦設枷鎖小過以藤杖鞭之或五六十至一百當死者以繩繫於樹用梭槍舂喉而誅其首若故殺劫殺令象踏之或以鼻捲撲於地象皆素習犯姦者男女共入牛以贖罪山川金山在林邑故國山石皆赤色其中産金金夜則出飛狀如螢火不勞山在林邑浦外國人犯罪則送入此山令自死鴉侯山在占城國大州西北其國主為元兵所敗嘗逃於此山土産金銀錫鐵獅象民獲犀象皆輸於王犀牛周顯德中嘗貢雲龍形通犀角玳瑁伽南木香朝霞大火珠大如雞卵狀類水晶當午置日中以艾藉之輒火出菩薩石薔薇水灑衣經歲香不歇猛火油得水愈熾國人用以水戰乳香沉香檀香丁香檳榔茴香烏樠木蘇木胡椒蓽澄茄白藤吉貝吉貝樹名其華成時如鵝毳抽其緒紡之以作布亦染成五色織為斑布絲絞布白㲲布貝多葉龍腦香甘蔗蕉子椰子孔雀山雞暹羅國在占城極南沿革本暹與羅斛二國地暹乃漢赤眉遺種其國土瘠不宜耕藝羅斛土田平衍而多稼暹人歲仰給之元貞元初暹人嘗遣使入貢至正間暹始降於羅斛而合為一國本朝洪武初暹羅斛國王參烈昭毗牙遣使臣奈思俚儕刺識悉替等朝貢進金葉表詔賜大統厯永樂初其國止稱暹羅國其王昭祿羣膺哆囉諦刺遣使奈必表貢方物詔賜古今列女傳且乞量衡為國中式從之至今朝貢不絶風俗氣候不正俗尚侵掠煮海為鹽釀秫為酒男女椎髻男女椎髻白布纒頭被服長衫事決婦人每有計議刑法輕重錢榖出入之事並決之婦人其志量在男子上􅖝子代錢水銀灌尸以􅖝子代錢流通人死則灌水銀以養其身已上俱島夷志土産羅斛香味極清逺亞於沉香犀象翠羽蘇木花錫瓜哇國東抵古女人國西抵三佛齊國南抵古大食國北抵占城國沿革本古闍婆國又名莆家龍其屬國有蘇吉丹打板打綱底勿等國劉宋元嘉中始通中國後絶至宋淳化中其王穆羅茶遣使來朝貢大觀中復遣使入貢元時稱瓜哇國至元末遣兵征之不克本朝洪武初其王昔里八達刺遣其臣八的占必等朝貢納元所授宣敕二道自是朝貢不絶風俗室宇壯麗飲食豐潔宋史室宇壯麗飾以金碧剪銀葉為錢博易飲食豐潔地不産茶其酒出於椰子及蝦蝚丹樹被髮纒胸有名無姓同上土人披髮其衣裝纒胸以下至於膝疾病不服藥但禱神求佛其俗有名而無姓坐俟王過同上其王椎髻戴金鈴衣錦袍躡革履坐方牀官吏日謁三拜而退出入乘象或腰輿壯士五七百人執兵器以從國人見王皆坐俟其過乃起婚聘無媒同上土俗婚聘無媒妁但納黃金於女家以娶之五月遊船十月遊山有山馬可乘跨或乘軟兜樂有橫笛鼓板亦能舞尚氣好鬬諸蕃志不設刑禁同上不設刑禁雜犯罪者隨輕重出黃金以贖惟寇盜則置之死民不為盜島夷志其田膏腴地平衍榖米冨饒倍於他國民不為盜道不拾遺諺云太平闍婆者此也男女纒頭被服長衫同上山川保老岸山在蘇吉丹國凡畨舶未到先見此山頂聳五峰時有雲覆其上鸚鵡山出鸚鵡故名八節澗澗上接杜馬班王府下通莆奔大海乃瓜哇咽喉必爭地元史弼髙興嘗會兵於此土産金銀真珠畨名沒爹蝦囉犀角畨名低密象牙畨名家囉玳瑁沉香茴香青鹽不假煎煮日曬而成檀香樹與葉似荔支龍腦香丁香蓽澄茄其藤蔓衍春花夏實花白而實黑木瓜椰子蕉子井蔗芋檳榔胡椒樹如蒲桃以竹木為棚架正月花四月實五月收采曬乾硫黃紅花蘇木桄榔木吉貝絞布有繡絲絞雜色絲絞裝劔藤簟白鸚鵡猴國中山多猴不畏人呼以霄霄之聲即出或投以果實則其大猴二先至土人謂之猴王猴夫人食畢羣猴食其餘真臘國東際海西接蒲井南連加囉希北抵占城國沿革本扶南屬國亦名占臘其王姓剎利名質多斯那者始併扶南而有之隋大業中始通中國唐自武德至聖厯凡四來朝神龍以後國分為二其南近海多陂澤為水真臘其北多山阜為陸真臘後復合為一宋政和中遣使來貢宣和初封為真臘國王與占城等慶元中國人大舉伐占城破之而立真臘人為占城王故當時占城亦為屬國其屬國又有參半真里登流眉蒲井等國所領聚落六十餘地方七千餘里本朝洪武初國王忽兒那遣其臣奈亦吉郎等表獻方物自是朝貢不絶風俗東向為上右手為潔寰宇記國俗東向開户國以東為上男婦悉拳髮垂耳性氣捷徑以右手為淨左手為穢縣鎮風俗與占城無異宋史王三日一視朝臣階下三稽首文獻通考其王三日一視朝坐五香七寶床上施寶帳著朝霞吉貝瞞絡腰腹下垂至脛頭帶金寶花冠被珍珠纓絡足履革屐耳懸金璫嘗服白㲲其臣朝於王者輒於階下三稽首王呼上階則跪以兩手抱膊繞王環坐議政事訖跪伏而去婚娶燃燈不息同上婚娶男女二家各八日不出晝夜燃燈不息視力耕種諸蕃志厥土沃饒田無畛域視力所及而耕種之俗尚華侈島夷志國有城周七十餘里殿宇三十餘所頗為壯麗其王及貴人所御之物多飾以金璧俗尚華侈田産富饒男女椎髮女滿十歲即嫁以錦圍身眉額施朱諺云富貴真臘者此也土産銅金顔香香乃樹脂有淡黃色者有黑色者擘開雪白者為佳夾砂石為下其氣能聚衆香畨人以之和香塗身篤耨香樹如杉檜香藏於皮老而脂自流溢者名白篤耨冬月因其凝而取之者名黑篤耨盛之以瓢碎瓢而爇之亦有香名篤耨瓢沉香出真臘者為上占城次之速暫香出真臘者為上伐樹去木而取香者謂之生速樹仆木腐而香存者謂之熟速其樹木之半存者謂之暫香黃而熟者為黃熟通黑者為夾箋麝香木氣似麝臍白豆䓻樹如絲瓜蔓衍山谷春花夏實象島夷志國有戰象蘇木翠羽大風子毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實略似棗歌畢他樹花似林禽葉似榆而厚大實似李菴羅樹花葉似棗實似李建同魚四足無鱗鼻如象吸水上噴髙五六丈浮胡魚八足狀如鱔觜如鸚鵡滿刺加國在占城國南其朝貢自廣東以達於京師沿革前代不通中國本朝永樂三年其國王西利八兒速刺遣使朝貢朝廷賜以印誥封為滿刺加國王九年其嗣王拜里迷蘇刺親率其妻子來朝厚賚而還自是朝貢不絶天順三年國王無答佛哪沙卒其子蘇丹茫速沙請命復遣使賫詔往封焉山川鎮國山永樂中詔封其國之西山為鎮國山御製碑文賜之勒石其上土産錫布蘇木胡椒象牙犀角硫黃玳瑁古麻刺國沿革前代無考本朝永樂中國王哇來本親率其臣來朝至福州卒詔諡曰康靖敕葬閩縣有司歲時致祭拂菻國東南至滅力沙北至海皆四十程西至海三十程東自大食及于闐回紇乃抵中國沿革宋元豐四年其王滅力伊靈改撒始遣使來貢方物元祐中其使兩至本朝洪武四年詔遣其國故民捏古倫齎詔諭之尋遣使來朝并貢方物風俗土屋無瓦宋史國地甚寒土屋無瓦以蒲萄釀酒樂有箜篌壺琴小篳篥偏鼓貴臣如王服同上王服紅黃衣以金線織絲布纒頭歲三月則詣佛寺坐紅床使人舁之貴臣如王之服或青緑緋白粉紅褐紫並纒頭跨馬不尚鬬戰同上刑罰罪輕者杖數十重者至二百大罪則盛以毛囊投諸海不尚鬬戰小有爭但以文字來往相詰問事大亦出兵鑄金銀錢同上鑄金銀為錢無穿孔面鑿彌勒佛背為王名禁民私造土産金銀珠西錦千年棗馬獨峯駝巴欖蒲萄三佛齊國在占城國南五日程其朝貢自廣東以達於京師沿革本南蠻别種與占城為鄰居真臘瓜哇之間所管十五州其屬國有單馬令凌牙斯蓬豐登牙儂細蘭等國其王號詹卑其人多姓蒲唐天祐初始通中國宋建隆初其王悉利胡大霞里檀遣使朝貢其後遣使入貢本朝洪武四年國王哈刺札八刺卜遣其臣玉的力馬罕亦里麻思奉金字表來朝并貢方物遂朝貢不絶風俗人用香油塗身宋史四時之氣多熱少寒冬無霜雪人用香油塗身俗以金銀貿易同上地無麥有米及青白豆無緍錢土俗以金銀貿易諸物雞魚鵝鴨頗類中土人民散居城外同上纍甓為城用椰葉覆屋人民散居城外不輸租賦有所征伐隨時調發立酋長率領皆自備兵器糧糗文字用梵書同上國中文字用梵書以其玉指環為印亦有中國文字上表章用焉臨敵敢死文獻通考習水陸戰臨敵敢死伯於諸國畨舶輻輳同上其國在海中扼諸畨舟車往來之喉咽若商舶過不入輒出船合戰故諸國之舟輻輳水上架屋島夷志男女椎髻穿青綿布衫繫東沖布喜潔淨故於水上架屋官兵服藥刀兵不能傷同上土産金銀水晶珠琉璃犀角象牙安息香樹脂其形色類核桃不宜於燒然能發衆香故人取以和香龍腦香檀香烏樠木單馬令國出樹似棕櫚可為器用貓睛石細蘭國出瑩潔明透如貓眼睛沉香乳香樹類榕以斧斫之脂溢于外凝結而成其品十有三有滴乳瓶乳袋香黑榻纒末之别薔薇水即薔薇花上露花與中國薔薇不同土人多取其花浸水以代露故多偽者以琉璃瓶試之翻搖數四其泡周上下者為真萬歲棗木香樹類絲瓜冬取根曬乾𥚹桃婆律香薰陸香蘆薈草屬狀如鱟尾採之以玉器搗研成膏名曰蘆薈梔子花色淺紫香清越其花稀有土人採之曝乾藏琉璃瓶中沒石子樹如樟開花結實如中國茅栗蘇合油以濃而無滓者為上腽肭臍獸形如狐腳髙如犬走如飛取其腎以漬油名腽肭臍阿魏樹不甚髙土人納竹筒於樹梢脂滿其中冬月破筒取脂即阿魏也或曰其脂最毒人不敢近每采時繫羊樹下自逺射之脂之毒著於羊羊斃即為魏珊瑚生海中最深處初生色白漸長變黃以絲繩繫五瓜鐡貓兒用黑鉛為墜擲海中取之初得肌理軟膩見風則乾硬變紅色者為貴若失時不取則蠧敗沒藥樹髙大如松皮厚一二寸採時掘樹下為坎用斧伐其皮脂流於坎餘方取之血竭樹略同沒藥採亦如之自乳香以下諸物多大食諸蕃出而萃于三佛齊浡泥國去闍婆四十五日程去三佛齊四十日程去占城三十日程朝貢自廣東達於京師沿革本闍婆屬國在西南大海中所統十四州前代不通中國宋太平興國中其國王向打始遣使入貢元豐中國王錫理麻喏復遣使入貢本朝洪武四年國王馬謨沙遣其臣亦思麻逸進表箋貢方物永樂三年詔遣使封浡泥國麻那惹加那乃為王給印符誥命六年率其妻子來朝卒於南京會同館詔諡恭順賜葬南京城南石子岡命其子遐旺襲封歸國自是朝貢不絶風俗以板為城其國以板為城王所居屋覆以貝多葉民舍覆以草王坐繩床出即大布單坐其上衆舁之名曰阮囊以銅鑄甲戰鬬者則持刀披甲甲以銅鑄狀若大筒穿之於身護其腹背其國鄰底門國有藥樹取其根煎為膏服之及塗其體兵刃所傷皆不死喪葬有棺斂喪葬亦有棺斂以竹為輿車載棄山中二月始耕則祀之踰七年則不復祀婚聘先以椰子酒婚聘之賔先以椰子酒檳榔次之指環又次之然後以吉貝布或量出金銀成其禮盛食無器皿國人以十二月七日為歲節凡宴會鳴鼓吹笛擊鈸歌舞為樂無器皿以竹編貝多葉為器盛食食訖棄之以上俱宋史王之服色略倣中國基宇𢎞敞原田獲利俗尚奢侈俗尚奢侈男女椎髻以五采帛繫腰花錦為衫煮海為鹽釀秫為酒愛敬中國人愛敬中國人每見中國人醉者則扶之以歸以上俱諸蕃志山川長寧鎮國山永樂六年國王麻那惹加那乃上言蒙恩封王爵境上皆屬職方國有後山乞封表為一方之鎮王卒其子遐旺復以為請遂封為長寧鎮國山御製碑文刻石其上土産片腦樹如杉檜取之者必齋沭而往其成片似梅花者為上其次有金腳腦速腦米腦蒼腦札聚腦又一種如油名腦油檀香象牙吉貝布玳瑁鶴頂巴尾樹貝多葉加蒙樹二樹心可為酒椰子檳榔紙紙類木皮而薄瑩滑色微緑宋時入貢以此紙書表蘇門答刺國沿革前代無考本永樂中國王鎖丹罕難阿必鎮遣其臣阿里來朝并貢方物自是修貢不絶風俗田磽榖少島夷志男女繫布縵椎髻繫紅布同上酋長殺人取血浴身同上其酋長人物修長一日之間必三變色或黑或赤每歲必殺十餘人取自然血浴之則四時不生疾疹故民皆畏服焉土産鶴頂錫斗蘇木胡椒闊布大茄樹髙丈餘經三四年不瘁子大如西瓜重十餘斤以梯樀之蘇祿國沿革前代無考本朝永樂十五年其國東王巴都葛叭答刺西王巴都葛叭蘇哩洞王叭都葛巴刺卜各率其妻子頭目來朝并貢方物風俗民食沙糊魚蝦螺蛤山塗田瘠間植粟麥民食沙糊魚蝦螺蛤氣候半熱短髮纒皂縵俗鄙薄男女短髮纒皂縵繫小印布煮海為鹽釀蔗為酒織竹布為業以上俱島夷志山川石﨑山國以此山為保障土産竹布玳瑁真珠色青白而圓有至徑寸者蔗彭亨國沿革前代無考本朝永樂中國王遣其臣蘇麻固門的里等來朝并貢方物風俗田沃榖稍登島夷志男女椎髻同上男女椎髻衣長布衫繫單衣冨家頸帶金圈數四常人則以五色燒珠為圈束之煮海為鹽釀椰漿為酒同上山川石崖其國石崖周匝﨑嶇如柵寨土産片腦沉香花錫椰子西洋古里國沿革其國乃西洋諸畨之會本朝永樂元年國王馬那必加刺滿遣其臣馬戍來朝貢馬自是朝貢不絶風俗海濵為市以通貿易行者讓路道不拾遺山橫而田瘠宜種麥好畜馬俗稍近古俱島夷志土産沉香木香西洋布幅廣至四五尺五色巾白鳩胡椒馬國多馬來自西域五色鴉鶻石瑣里國沿革前代無考本朝洪武五年國王卜納的遣其臣撒馬牙茶嘉兒幹的亦刺丹八兒奉金字表朝貢并圖其土地山川以獻土産撒哈刺以毛織之蒙茸如氊毼有紅緑二色紅八者藍布覬木里布白苾布榜葛刺國沿革本古欣都州府西天有五印度國此東印度也其國最大本朝永樂六年國王靄牙思丁遣使朝貢十二年又遣其臣把一濟等來朝貢麒麟等物風俗耕殖為業歲以耕殖為業野無曠土田疇極美一歲三收原防管茅之地墾闢種植不倦無再勞之役氣候常熱男女以細布纒頭衣長衫官稅十取其二民安物泰國冨俗厚國鑄銀錢國鑄銀錢名唐加每錢重二錢八分以權小錢以上俱島夷志山川五嶺山髙林茂民聚居之土産髙你布兜羅錦翠羽金繡巾琉璃天方國沿革古筠沖之地舊名天堂又名西域本朝宣德中國王遣其臣沙瓛等來朝并貢方物風俗風景融和四時皆春田沃稻饒居民樂業男女辮髮俗好善男女辮髮衣細布衫繫細布有回回厯與中國厯前後差三日牛乳拌飯人皆以牛乳伴飯故其人肥美以上俱島夷志土産馬髙八尺許金珀珊瑚犀角默德那國沿革即回回祖國也初國王謨罕驀德生而神靈有大德臣服西域諸國諸國尊號為别諳拔爾猶華言天使云其教專以事天為本而無像設其經有三十本凡三千六百餘卷其書體旁行有篆草楷三法今西洋諸國皆用之又有隂陽星厯醫藥音樂之類隋開皇中國人撒哈八撒阿的幹葛思始傳其教入中國其地接天方國本朝宣德中其國使臣隨天方國使臣來朝并貢方物風俗有城池宫室田畜市列與江淮風土不異寒暑應候民物繁庶種五榖蒲萄諸果俗重殺非同類殺者不食不食豕肉齋戒拜天每歲齋戒一月更衣沭浴居必易常處每日西向拜天國人尊信其教雖適殊域傳子孫纍世不敢易製造織文雕鏤器皿尤巧以上俱晉安郡志古里班卒國沿革前代無考本朝永樂三年國王遣其臣馬的等來朝并貢方物風俗田瘠榖少登氣候不齊夏則多雨多寒俗質男女被短髮假錦纒頭紅油布繫身以上俱島夷志錫蘭山國沿革前代無考相傳其國有巨人足迹本朝永樂十年詔諭其國王不刺葛麻巴思刺查正統十年國王遣其臣耶把刺謨的里啞等來朝并貢方物天順三年其王葛力生夏刺昔利把交刺惹復遣使來貢土産寶石水晶白葛達國沿革前代無考本朝宣德七年國王遣其臣和者里一思等來朝并貢方物百花國沿革前代無考本朝洪武十一年國王刺丁刺者望沙亦遣其臣八智亞壇等來朝并貢方物土産紅猴龜筒玳瑁孔雀倒挂胡椒婆羅國沿革前代無考本朝永樂四年國王遣其臣勿黎哥等來朝并貢方物土産真珠玳瑁瑪瑙車渠吕宋國沿革前代無考本朝永樂三年國王遣其臣隔察老來朝并貢方物土産黃金合貓里國沿革前代無考本朝永樂三年國王遣其臣回回道奴馬髙等來朝并貢方物土産蘇木烏木胡椒碟里國沿革前代無考本朝永樂三年國王遣其臣馬黑木等來朝并貢方物土産蘇木烏木打回國沿革前代無考本朝永樂三年國王遣其臣麻勿等來朝并貢方物土産蘇木胡椒日羅夏治國沿革前代無考本朝永樂三年國王遣其臣文那打時鎮等來朝并貢方物土産胡椒蘇木阿魯國沿革前代無考本朝永樂五年國王速魯唐忽先遣其臣滿刺哈三等來朝并貢方物甘巴里國沿革前代無考本朝永樂十二年國王兜哇刺查遣其臣得名公葛葛等來朝并貢方物土産絲錦忽魯謨斯國沿革前代無考本朝永樂中國主遣其臣馬刺足等來朝并貢方物土産大馬西洋布獅子駝雞昂首髙可七尺福祿似驢而花文可愛靈羊尾大者重二十餘斤行則以車載尾長角馬哈獸角長過身忽魯母恩國沿革前代無考本朝永樂三年國王遣其臣已即丁等來朝并貢方物土産檀香速香胡椒柯枝國沿革前代無考本朝永樂二年國王可亦里遣其臣完者答兒等來朝并貢方物山川鎮國山永樂十年詔封其國之山為鎮國山御製碑文賜之命立碑其上土産胡椒蘇木麻林國沿革前代無考本朝永樂十三年其王遣其臣獻麒麟等物沼納朴兒國沿革其國居印度之中即佛國也本朝永樂中遣使齎詔諭其國王一不刺金加異勒國沿革前代無考本朝永樂中國王者麻里奈那遣其臣别里呆不來等來朝并貢方物祖法兒國沿革前代無考本朝永樂中國王亞里遣其臣來朝并貢方物土産西馬鶴頂駝雞福祿片腦沉香乳香溜山國沿革前代無考本朝永樂中國王亦速福遣其臣來朝并貢方物阿哇國沿革前代無考本朝永樂中國王昌吉刺遣其臣來朝并貢方物韃靼東抵輝和爾西連托和瑪及賽瑪爾堪北盡沙漠沿革北邊種落不一歷代名稱各異夏曰獯鬻周曰玁狁秦漢皆曰胸奴唐曰突厥宋曰契丹自漢以來胸奴頗盛後稍弱而烏桓興漢末鮮卑滅烏桓盡有其地後魏時蠕蠕獨強與魏為敵蠕蠕滅而突厥起盡有西北地唐貞觀中李靖滅之五代及宋契丹復盛别部小者曰蒙古塔齊爾烏克曰塔塔爾曰克哷各據分地既而蒙古兼并有之遂入中國代宋稱號曰元十四傳後天命歸於本朝元帝遁於朔漠傳子阿裕爾實哩達喇傳托古斯特穆爾為伊蘇達喇所弒其部屬皆奔散來附洪武二十五年遣將周興往討其罪追至徹徹爾山大破之自是不敢近邊者十餘年永樂間有布尼雅實哩者其下瑪哈木阿嚕台奉貢惟謹因封瑪哈木為順寧王阿嚕台為和寧王己而叛服不常遣使諭之不悛車駕屢親征之諸國始平布尼雅實哩妻率部屬來朝願居京師宣德中瑪哈木攻殺阿嚕台欲領部落人心不服乃求元後托克托巴哈立為王居沙漠之北瑪哈木子托歡托歡子額森居沙漠之西北衛喇特正統初偕遣使朝貢歲以為常朝廷賞賚甚厚其後負德入寇歸而自相篡弒朝廷因而絶之風俗隨水草畜牧胸奴志隨水草畜牧無屋居行則車為室止則氊為廬自君長以下咸食畜肉衣皮毛貴壯賤老朝夕拜日月同上其單于朝拜日之始生夕拜月其坐長左而面北其送死有棺槨而無封樹凡舉事嘗隨月盛壯以攻戰月虧則退兵怒殺父兄娶先掠女烏桓志烏桓俗與胸奴同其異者怒則殺父兄而終不害其母以母有族類父兄無相仇報也其嫁娶先私通掠將女或半歲百日後始遣媒送馬駝牛羊以為聘其父子男女相對踞蹲髠頭為輕便婦人至嫁時乃養髮病則灸尉蒸決葬則歌舞相迎同上有病以艾灸或燒石自尉燒地卧上或隨痛病處以刀決脈出血俗貴兵死葬則歌舞相送肥養一犬以綵繩纓牽燒而送之言使護死者神靈歸赤山以帛絞頸問所言以驗修短突厥志突厥俗與胸奴同其異者其主初立近侍重臣等舁之以氊隨日轉九回每一回臣下皆拜訖乃扶令乘馬以帛絞其頸使才不致絶釋而急問之曰你能作幾年可汗其主既精神瞀昏不能詳定多少隨其所言以驗修短之數刻木封箭為信停尸候時而瘞同上其徴發兵馬及科稅雜畜輒刻木為數併一金鏃箭蠟印封之以為信有死者停尸於帳春夏死者候草木落秋冬死者候花葉榮茂始坎而瘞之無禮頑嚚夷中最甚契丹志契丹之俗異於諸胡者父母死而悲哭者為不壯但以其尸置之山樹上經三年後乃收其骨而焚之酹酒而祝曰冬月時向陽食夏月時向隂食若我射獵時使我多得豬鹿其無禮頑嚚於諸夷中最甚山川隂山東西千餘里草木茂盛多産禽獸漢時冒頓單于依阻其中治作弓矢後武帝奪其地胸奴入寇無所隱蔽過此未嘗不哭狼居胥山漢驃騎將軍霍去病出代二千餘里與胸奴左賢王接戰得胡首虜七萬餘人左賢王將遁乃封狼居胥山而還填顔山即胸奴築城居漢降將趙信處驃騎將軍霍去病以輕騎追虜至此得胸奴積粟食軍留一月燒其餘粟以歸浚稽山山有二胸奴多分居之漢將李陵以步卒五千擊虜至此營於兩山間虜見漢軍少直前就營陵慱戰敗之虜還走山上漢軍追殺數千人燕然山去塞三千餘里後漢車騎將軍竇憲率羌胡兵出塞與胸奴戰於稽落山大破之斬獲甚衆憲遂登此山勒石紀功令班固銘曰鑠王師兮征荒裔勦凶虐分截海外敻其邈兮亘地界封神兵兮建隆碣熙帝載兮振萬世金微山去塞可五千餘里竇憲遣兵大破北胸奴於此自漢出師未嘗至此都斤山突厥部汗常處於此其西五百里有髙山逈出無草樹謂勃登凝黎猶夏言地神也布爾罕山鄂諾河源出于此昔有蒼白狼遇慘白鹿于此山生子名拜達勒察罕後為蒙古部即元氏之祖特哩衮博達斯山近鄂諾河即元太祖特穆津生處徹徹山本朝洪武中總兵官周興征北自元者河追至此山下大破之禽敵山洪武中王師嘗禽北寇鼐爾巴哈於此因名永樂八年車駕征敵至此御銘勒石曰瀚海為鐔天山為鍔一掃邉塵永清沙漠白雲山永樂八年六軍營于此時四山雲氣潔白如練因賜今名蒼山一名蒼山峽永樂八年駐蹕于此沙嶺永樂二十一年車駕北征駐蹕于此凌霄峰永樂八年車駕征北登絶頂望漠北顧侍臣曰元盛時皆民居今萬里蕭條惟見風埃沙草耳敵勢衰弱若此尚敢倔強果何所恃哉立馬峰永樂八年車駕次玄石坡製銘勒于是峰之石曰惟日月明惟天地壽勒銘玄石與之悠久班珠爾河元太祖初起兵至此河水方渾飲之以誓衆曰他日當記曽同此艱難飲馬河舊名臚朐河永樂八年駐蹕賜名傍有殺虎城乃清逺侯王友統守營兵所築玄冥河舊名鄂諾河元太祖興于此永樂中賜今名時追敵至此大敗之敵布尼雅實哩窮蹙以十騎遁去清塵河舊名庫爾哲河永樂中跓蹕改今名庫庫諾爾魚兒海元太祖為諸部推戴稱帝于此蒙山海在蘇爾溫都爾之地其水清洌永樂十二年車駕次此他人水突厥部汗常以五月中旬集此拜祭天地神應泉地名清水源永樂中駐蹕於此去營三里許平地湧泉髙數尺味井冽士馬飲之不竭因賜今名清流泉永樂八年駐蹕於此製銘勒石曰於鑠六師罙入其阻山髙水清永彰我武土産馬槖駝野馬羱羊爾雅似吳羊而角大角端漢書音義角端似牛角可為弓世謂角端弓是也鼲貂鼠青鼠土撥鼠豽猴屬已上六物皮毛柔軟可為裘東牆似蓬草實如穄子十月始熟沙雞酥酪古迹范夫人城寰宇記城本漢將所築將亡其妻率衆保完之因名麻彈城楊義城矢波羅城舍利城達督城寰宇記諸城傍皆有美水豐草唐時突厥所居移徙不常和寧路城初名和林以西有哈刺和林河故名元太祖始建都於此前後凡五朝大德間立和林等處行中書省置和林路總管府皇慶初改嶺北等處行中書省及改路曰和寧烏梁海東接海西西連開平界北抵北海沿革本春秋時山戎地秦為遼西郡北境漢為奚酋所據東漢征敗之走匿松漠間後魏之先復居於此號庫莫奚後服屬契丹元為太寧路北境本朝洪武二十二年征敗北兵來降者衆詔以烏梁海之地置泰寧諾延扶餘三衛以處之為東北外藩命其長為指揮使指揮同知各領所部自是每歲朝貢風俗與韃靼同山川馬盂山廣袤千里中一峰形類馬盂有福山東西袤五里南北廣二十里七金山山有七峰遼時於中建三學寺唱呌山香臺山遼時建昊天寺金杜元有碑土産馬槖駝黃牛青牛瑪瑙鵲樺皮白葡萄明一統志卷九十
