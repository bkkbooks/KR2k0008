body:
  text: 明一統志卷十明李賢等撰常州府東至浙江湖州府長興縣界二百里西至鎮江府丹陽縣界五十五里南至應天府溧陽縣界一百八十里北至揚州府㤗興縣界六十里自府治至南京三百六十里至京師二千八百八十里糧七十六萬四千石零建置沿革禹貢揚州之域天文斗分野周初屬吳後屬越後又屬楚秦為㑹稽郡地漢因之東漢永建中分屬吳郡三國吳分無錫以西為屯田置典農校尉晉太康初省校尉分吳郡置毗陵郡東晉初改為晉陵郡徙治京口後還治晉陵縣宋齊梁陳皆因之隋開皇中廢郡置常州太業初改為毗陵郡唐武徳初改常州天寳初復改晉陵郡乾元初復為常州五代時屬楊吴及南唐宋仍為常州屬浙西路元陞常州路𨽻江浙行省本朝洪武初改為常州府直𨽻京師領縣五武進縣附郭本漢丹徒曲阿二縣地三國魏青龍初改丹徒為武進晉太康初别置武進縣於丹陽之東境太興初於武進僑置南蘭陵郡梁天監中改為蘭陵縣屬南蘭陵郡隋省入曲阿屬江都郡唐武徳中復置武進縣貞觀中省入晉陵垂拱初復置五代楊吴時徙治郡城與晉陵俱為附郭縣宋元仍舊本朝以晉陵縣省入武進編户四百五十七里無錫縣在府城東九十里周初為泰伯始封地漢為無錫縣屬㑹稽郡縣有山舊産錫至漢初錫殫故縣以無錫名新葬改曰有錫東漢復舊三國吴廢晉復置屬毗陵郡宋齊梁陳皆屬晉陵郡隋開皇中省入晉陵縣後復置唐屬常州宋因之元陞為州本朝復為縣編戸四百一十里江隂縣在府城西北九十里本秦漢毗陵縣地屬㑹稽郡晉初析置暨陽縣屬毗陵郡梁始置江陰郡及江陰縣隋初廢郡以縣屬常州又以利城梁豐二縣省入唐初於縣置暨州復析置暨陽利城二縣尋廢暨州及省二縣入江隂縣屬常州五代南唐置江陰軍領江陰縣宋或為軍或為縣元初仍為軍後陞為江陰路後又降為州本朝初改連洋州尋復江隂州後復為縣編戸三百七十四里宜興縣在府城南一百二十里本吴荆溪地秦置陽羡縣漢初屬㑹稽郡後屬吴郡三國吴時屬吴興郡晉置義興郡隋廢郡改縣曰義興以義郷國山臨津三縣省入屬常州唐初改鵝州尋改南興州後仍為義興屬常州宋改宜興縣元陞為府尋罷為縣後復陞為州本朝復為縣編戸三百五十七里靖江縣在府城東北一百三十里本江隂縣地成化七年析置為縣治馬䭾沙編戸五十五里郡名延陵古名毗陵漢名晉陵晉名形勝三江之雄潤五湖之腴表晉周處風土記岡阜相屬林麓欝然舊毗陵志川澤沃衍有海陸之饒隋志大江横北太湖處其東宋政和河溝記北抵江淮東連海道江陰圖經山長水逺氣秀地靈元宜興州圖冊土厚水深山澤清曠元路學興造記風俗髙節所興由克遜以立風俗晉左思賦君子尚義庸庶厚龎隋地理志秀而多文愿而循理宋葛邲江隂貢院記得江山之助故其人秀而多文有淮楚之風故其人愿而循理事簡易治民醇相安圖冊江陰有泰伯延陵之風事簡而易治民淳而相安禮義之俗寖盛元路學記漢魏而降衣冠南渡禮義之俗由此寖盛山川横山在府城東北三十五里舊名芳茂山晉時嘗有紫氣右將軍曹横𦵏此改今名三茅山人張存詩當時不𦵏曹横墓千古猶稱芳茂山鷄籠山在横山東状如鷄籠三山在府城東北三十五里中峯峭㧞宋尖楊萬里詩三山幸有一峯髙山在府城東北四十五里上有田及井俗呼舜田舜井又有馬跡石蛟山在府城西一名穿石山相傳有蛟處其下夾山在府城東南七十里山南北五里包秦湯二小山故名舊傳秦始皇嘗登此黄公山在府城南七十里一名百瀆山去太湖十五里即楚春申君黄歇所封故墟下有龍泉灣烏龜山在府城南與黄公山相對其狀如龜相傳宋楊時嘗寓居山下馬跡山在府城東南八十里太湖中山之西石壁間有两宂圍各盈尺深五六寸水落則見相傳為秦始皇馬所踐因以名山宋建炎中赤心隊將劉晏保馬跡山以捍冦冦再至晏選舟師迎戰降其衆即此地津里山在府城東南八十里即秦履山以秦始皇嘗登此故名後訛為津里黄山在府城西北八十里俯瞰大江又江隂縣北六里亦有黄山取春申君之姓為名上有石室吴時烽火之所孤陳山在府城北八十里與孟城山相接九龍山在黄山南自孤陳山至此凡九嶺故名孟城山在府城北八十里俯瞰大江舊傳晉孟嘉嘗寓此下流有孟瀆嘉山在府城西北一百里山有白龍潭鄉人歲旱於此山禱雨錫山在無錫縣西七里慧山東峯也周秦間曾産鉛錫昔有樵者於山下得古銘云有錫兵天下争無錫寜天下清有錫沴天下弊無錫乂天下濟自光武以後不復有錫慧山在無錫縣西七里舊名九龍山宋蘇軾詩石路縈迴九龍脊水光翻動五湖天孫登無語空歸去半嶺松聲萬壑間璨山在無錫縣西九里山上有泉曰洞酌下有大塜龍山在無錫縣西一十里越絶書縣西有龍尾道春申君初封吴所築即此上有白龍潭獨山在無錫縣西南一十八里與錫山連中分斷太湖舟行其中號晉陵門漆塘山在無錫縣西南二十五里宋錢紳退老卜築其間歴山在無錫縣西北三十里舊名舜山又名柯山劉宋湛茂之别墅在焉劉鑠詩兹山藴靈詭憑覽趣亦贍九峯相接連五渚逆縈漫夫椒山在無錫縣西太湖濱左傳吴夫差敗越于夫椒即此又名湫山芙蓉山在無錫縣東三十里上有龍井及金鷄名夏隂山在無錫縣西三十五里周迴一十五里連亘柯山西臨太湖青山在無錫縣西三十六里又江隂縣西南一十里亦有青山上有干將鑄爐處膠山在無錫縣東四十里與慧山東西相望宛若翠屏下有竇乳泉宋蘇紳詩汲泉巖畔驚猿飲栽葦池邉引鷺翔軍將山在無錫縣南四十里南唐屯兵於此以偹吴越故名其側有塢曰甲伏塢下有龍潭潭有三石穴歸山在無錫縣西北四十五里昔吳王夫差殺伍子胥以鴟夷裏之浮於江吴人於此山望子胥之歸故名胥山在無錫縣西南五十里近太湖伍子胥死吳人憐之為立祠于此因名安陽山在無錫縣西北五十里相傳呉王封周章少子斌為安陽侯卒𦵏此山下山頂有龍池下有白龍亭一名文筆峯宋趙義父詩突兀當空勢不羣蔪然頂角起祥氛毗陵自古多英俊可信孤峯解主文香山在無錫縣東六十里一名顧山頂有龍潭此山連接無錫常熟江隂三縣界又冝興縣南三十五里亦有香山君山在江隂縣北門外二里乃邑之主山以春申君取名北臨大江故亦名瞰江山山顛舊有松風亭其南又有浮圖綺山在江隂縣東一十里昔呉王泛舟逰賞至此見野花盛開如錦綺因名後人訛為啟山女山在江隂縣東一十五里山頂有洞十二俗傳昔有太守女入山脩道後仙去故又名仙女山由里山在江隂縣東南一十五里山頂出雲邑人視為雨候上有龍祠旱禱有應真山在江隂縣東一十八里舊名甄山梁時山側民韓文秀者見鹿産一女因収養之及長令為女道士時號鹿娘死𦵏于此武竒為建觀謂其得道因改今名稷山在江隂縣東二十里亦名薛山相傳唐薛稷别業在此山側有覆酒山盤龍山在江隂縣東二十里唐垂拱中嘗有黄龍盤於山上三日亦名蛟山鳳凰山在江隂縣東二十里晉太康初於此掘地得石鳯凰因名貪山在江隂縣東二十七里相傳梁大同中有樵夫見金寳現因掘取之山頺壓死後人因名貪以示戒秦望山在江隂縣西南二十七里夲名鵝鼻山風土記秦始皇嘗登此山四顧後人因名時山在江隂縣東三十里相傳昔有富民時氏族居於此白龍山在江隂縣東南四十里上有龍洞嵗旱禱雨於此定山在江隂縣東四十里唐貞觀中法嚮禪師掛錫之地有虎跑泉沙山在江隂縣東四十五里初本平地晉宋間江水泛漲湧沙石積成此山荆南山在宜興縣西南三里荆溪之南東漢時陽羡長袁玘常言死當為神一夕飲醉無病而卒風雨失其柩夜聞荆山有數千人噉聲鄉民徃視之則棺已成塜因改名君山立祠祀之山顛有池池有三足鼈六目龜穿石山在宜興縣東南二十里亦名蛟山晉時有大蛟孕子人得其殻可容三斛㠌空城穴上受許陂長流下溉民田金鵞山在宜興縣東北二十五里昔有金鵞飛集於此故名陽羡舊名鵝州取此義山之東峯名計山甑山在宜興縣西南二十五里雲氣騰涌若炊故名梁蕭子雲詩忽聞甑山侣萬里自相親寂寞晚霖霽重疊晴雲新小心山在宜興縣西南三十五里一名敷金嶺金硎承小心盖以山下有金沙泉故也煙山在宜興縣西南三十里諸峯環峙西曰碧雲南曰羅漢北曰雞籠西北曰紫雲上有漁磯臨深谷舊傳呉孫權嘗釣于此其西南又有聖山下有深潭蒿山在宜興縣西南三十五里山産茶唐貢山在宜興縣東南三十五里山産茶唐時入貢故名杜牧詩山實東南秀茶稱瑞草魁剖符雖俗吏脩貢亦仙才泉嫩黄金湧牙香紫壁裁樹隂香作帳花徑落成堆頥山在宜興縣東南三十六里唐陸希聲隱此以山近震澤震為雷故取頣卦為名著二十七詠紀臺池泉石林木之勝蜀山在宜興縣東南三十八里其山屹然獨出舊名獨山宋蘇軾見其景物類蜀中改今名山下有軾祠香蘭山在宜興縣東南五十里斗入太湖五里有兩岸南曰大蘭山北曰小蘭山相連二里山産蘭故名晉李顒詩旋經義興境艤棹石蘭渚國山在宜興縣西南五十里本名離里山有九岑相連亦名陞山相傳呉王皓時山大石自立皓遣司空董朝太常周處封為南獄故今名因刻石頌徳碑形如鼓篆文周繞字多漫滅俗呼囤碑􅖘山在宜興縣西北八十里漢封蔣澄為􅖘亭鄉侯即此地宋蔣堂詩􅖘亭深處枕清溪萬木囬環盡翠㣲梅蕚破香知臘近栁梢含緑認春歸章山在宜興縣南六十里風土記即芳巖也通典陽羡有君山國山章山謂此孤山在靖江縣東北二十里揚子江中距山百步有石碇接為平陸其北有仙人洞南有仙人臺其上有僧廬及望江閣八角樓天井峯在無錫縣西四十里其峯有二一東一西偃月嶺在宜興縣東南三十六里唐陸希聲詩山嶺依稀偃月形數層竒石疊空青幾囬雪夜寒光積直似金光照户庭松嶺在宜興縣東南三十六里陸希聲詩嶺上春松手自栽已能蒼翠暎莓苔苦寒本是君家事好送清風月下來㑹仙巖在宜興縣東三十五里孤峯壁立若雕琢然宋紹聖間或見二叟倚石囬睨忽不見故名白雲巖在宜興縣東南五十里峻踰百仭上有龍湫雲氣常蒸繞其上張公洞在宜興縣南三十五里其門三面皆飛崖峭壁惟正北一門可入嵌空邃碧有水散流石乳融結石上有唐人題刻洞中又有燒香臺仙人房𤣥武石風土記漢張道陵嘗修道於此唐李栖筠詩一逕深窈窕上升翠㣲中忽然靈洞前日月開仙宫焚香入仙洞巨石如虛空夙夜備蘋藻詔書祠張公五雲何徘徊𤣥鶴下蒼穹白鶴洞在張公洞北二里嵗旱有石燕飛出即雨善卷洞在國山東南洞有三曰乾洞曰大小水洞舊經周幽王時洞忽自開上有巨石形常如堕洞中寛廣可坐千人周圍峭壁刻為佛像有石柱髙丈餘號玉柱唐張祐詩金涵崇寳蔵玉柱閟靈根宋陳襄詩水洞深無百尺泉白龍蟠蟄已多年誰知此物能雲雨常濟山南萬頃田梅花塢在宜興縣東南三十六里陸希聲詩凍蕊凝香雪艷新小山深塢伴幽人知君有意凌寒色羞共千花一様春大江在府城北五十里西接丹陽東抵江隂中流西北入泰州界其在江隂境有馬䭾沙與泰興縣分領閭江在無錫縣西四十五里即太湖别浦呉王闔閭築城於此故名太湖在府城東南一百里連武進無錫宜興三縣界禹貢謂之震澤爾雅謂之具區周廽三萬六千頃亦名五湖唐陸龜䝉詩嘗聞咸池氣下注作清質至今涵青霄尚且作白日芙蓉湖在府城東五十