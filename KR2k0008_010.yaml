罕白郡守倍其直市之而令民輸錢旁州聞之皆願如罕法陳襄嘉祐中知常州郡庠隘窄乃新黌宇為諸庠冠晨人坐授諸生經義旁决郡事由是毘陵學者盛於二浙震澤積水以運渠横過不得入江為民田之害累世矣襄立法浚之其患遂除司馬旦知宜興縣其民嚚訟旦毎獄必痛䋲之民稍以詆冒為耻長橋廢壞旦勸民葺復不勞而成岳飛建炎中金烏珠攻常州飛移屯宜興盗郭吉遁入湖飛遣兵追破之又遣辯士盡降其衆避地者頼以免圖飛像祀之後金人再攻常州飛四戰皆捷金人大敗横尸十五里李寳浙西總管紹興末金主亮欲南渡命寳駐江隂軍以防海道時金遣兵由海道趨二浙寳率舟師發江隂至膠西奮擊大捷以功除靜海軍節使葉顒知常州初至郡無旬月儲未一年餘緡錢二十萬或勸獻羡餘顒曰羡餘非重征則横歛是民之膏血也以利易賞心實耻之弗聴葉衡知常州時水潦為災衡發倉廩為糜以食餓者或言常平不可輕發衡曰儲蓄王備緩急可視民飢而不救邪疫大作衡單騎命醫藥自隨徧問疾苦活者甚衆王聞禮知常州兼江東轉運判官聞禮十朋子為治能守家法人思慕之趙坯無錫令性剛毅不畏強禦人號趙鐡頭農田水利無不脩舉邑人徳之林祖合淳熈中知常州尊禮耆儒延見秀士激勸學校後河堙沒已乆重浚治之民頼其利髙商老知冝興縣朱熹學記云商老之來躬為講說開之以性命道徳之指傳之以詩書禮樂之文使其士知所學范炎嘉定中知晉陵縣時民賦多弊炎乃剔吏奸以疏其源裁經費以制其用期㑹不爽科斂不横而民瘼以瘳父老謂炎之政數十年所未有袁爕江隂尉浙西大飢常平使者羅點屬任賑恤燮命毎保畫一圖田疇山水道路悉載之而以居民分布其間凡名數治業悉書之合保為都合都為鄉合鄉為縣征發迫胥境圖可立决以此為荒政首唐璘嘉定末知晉陵縣隣州田訟至有泣愬願送晉陵可否者陳韡留守建康辟為通判舉府事以聽家鉉翁知常州政譽燁然遷浙東提點刑獄孫子秀浙西提刑兼知常州淮兵數百人浮寓貢院給餉不時死者相繼子秀請於朝創名忠衛軍置砦以居截上供米以贍之顔耆仲紹定間知江隂軍蒞政公勤百廢具舉當時稱其政平訟理千里如春史能之咸淳中知常州不數月州治清理撙浮費以浚河三百餘里民頼其利姚訔知常州先是元巴延兵至知州王宗朱遁通判王虎臣以城降既而都統劉師勇等復拒守推訔為守城數月不下巴延攻䧟屠之訔及通判陳紹等皆死之元董守思元統中知無錫州亷能公恕自奉澹泊衣食或不給其治民去豪強植㣲弱威惠兼著曹晉常州路總管政以不擾事無矯揉暇日輒視儒學重加修葺禮義之俗日以興盛臧夢觧江隂饑江浙行省委夢解振之夢解不為文具躬至其地人給以米所活四萬五千餘人袁德麟常州路判官遇歲水旱賑濟有方浚城南渠以便舟楫去任人思其徳為立記史壎延祐中常州路總管興教勸學建閣貯書籍使學者得所觀覽劉溶武進縣尹至正末㓂兵䧟常州官軍潰散溶獨率民兵戰於葛橋南死之辛思仁泰定間知宜興州潔已愛民濬溝渠建長橋深有美績本朝孫用洪武初為常州知府亷能儉素治政清平救民疾苦作興學校任滿朝廷以其亷能令復任張度洪武初知常州府好學能文治政公勤勸勉郡人俾知尚學朝廷聞其能召為吏部尚書董尚洪武初知武進縣守法公勤為政簡肅至於修建學校撫恤黎民尤盡心焉至今人慕之尹克昌洪武初武進主簿凡有差役輒集耆老詢問務在公平獄訟必詳䆒情偽公以斷之重建縣治其費用有度民不知擾韓約洪武初知無錫縣亷明公恕民不忍欺毁淫祠興學校橋梁郵傳咸重葺之鄉邑盗起討平之以功陞通州知州方文洪武中知武進縣設再思亭於縣門左於内條陳憲章令訟者讀誦及以理省諭無情者多自悔而止一時㚥弊大革李德善洪武末知常州府寛恕亷慎初到任有江隂民二十餘人以鬻鹽繫獄因為首者未獲故乆不决徳善諭而縱之俾見其父母妻子仍令勸為首者出期十日歸衆皆感泣而去至期果引未獲者詣官即决遣之朱仲安永樂初為武進主簿正已率物亷能愛民尋陞本縣知縣熊觀洪武初知常州府亷㓗公勤嚴於御史張宗漣宣徳中常州府同知亷介寛厚鞭笞不施而事無不舉時清軍御史峻法誣民為軍宗璉堅執不從民頼以不寃及卒衣衾不備郡民徳之立祠祀焉許穆宜興主簿佐理賢能百姓欣戴秩溝代去父老遮留之王子倫宣徳間知江隂縣公亷書最擢監察御史南畿志項伾正統初知無錫縣明恕仁厚不畏强禦因逮繫京師毅然不屈事白還任南畿志俞文景泰間任常州府照磨性儉素布衣蔬食嘗督漕徐淮郤餽金百亷聲籍甚以老乞歸吏民攀送南畿志孟勲天順間以御史改任常州府推官公恕亷明獄無寃滯南畿志周斌天順初以御史左遷江隂知縣勤敏有為政績茂著南畿志華仲賢成化末知常州府寛厚詳審去後人多思之南畿志姚文灝𢎞治間以刑部主事左遷通判常州府優于學問勤于政理治水有方以薦陞工部主事仍督蘇常水利畿志姜文魁𢎞治間知無錫縣平易愛民而民亦愛之畿志黄傅𢎞治間知江隂縣練逹有為興學校去淫祠擢鹽察御史卒民思慕之祀于學宫畿志凃禎𢎞治間知江隂縣持已嚴飭蒞政公恕擢鹽察御史為權姦所中弊于獄士民思之祠于學宫畿志王鎬江隂縣學訓𨗳能以身教人事上接下渾然一誠人謂之古遺直畿志王泮知江隂縣居官清苦召去敝篋蕭然猶赴任時物也畿志流寓郭璞聞喜人博學好古妙於隂陽筭厯天文卜筮之術避地東南過江晉王𨗳重之引為參軍作卦多驗著江賦其辭甚偉復作南郊賦元帝見而嘉賞以為著作佐郎累上疏言災異多所匡益母亡卜葬地於暨陽去水百步人以為言璞曰當即為陸矣其後沙漲皆為桑田明帝即位熒惑守房又赤烏見乃上疏請改年肆赦嘗為人葬云當致天子問明帝東㣲行至其家問之後為王敦所害李紳敬𤣥之孫寓居無錫讀書慧山唐舉進士武宗朝拜中書侍郎同平章事進封趙郡公卒謚文肅陳喬廬陵人寓無錫仕南唐為翰林學士承㫖門下侍郎兼樞宻使宋師圍金陵後主欲降喬曰自古豈有不亡之國乎降無益也臣請城下一戰而死後主不從喬自縊死宋太祖以其忠於所事以禮改葬蘇軾眉山人宋嘉祐初與蔣之竒登進士聫名遂約卜居陽羡後以言事謫黄州移汝州上章自言有田在常願得居之朝奏夕報可軾常托邵民瞻買宅一區直錢五百緡將挈居偶聞老嫗哭甚哀問之荅曰吾家居相傳百年今吾子不肖售諸人所以悲耳扣其居即邵所買者亟焚劵竟不索直自是亦不問舎寓於顧塘橋孫氏之室而歿賀鑄衛州人寓居毘陵好學工文詞尤長於樂府藏書萬卷手自校讐無一字誤官終太平州通判卒葬義興之篠嶺楊時延平人宋政和初為蕭山令任滿奉祠徙居毗陵講道城東書堂東南學者皆徃從之居十有八年建炎初始還延平後人徳之即城東立祠祀焉吕祖泰河南人夷簡五世孫寓居宜興尚氣誼學問該洽飲酒至數斗不亂論世事無所忌諱上書論韓伲胄之奸仵㫖杖配欽州侂胄誅詔雪其寃特補上州文學改授迪功郎鹽南嶽廟人物漢虞俊無錫人少以孝友稱明春秋公羊左氏傳哀帝時為御史稍遷丞相司直王莾執政左遷新陂令後召為司徒俊仰天嘆曰願為漢鬼不能事兩姓飲藥而卒光武即位表其墓彭脩會稽毘陵人年十五侍父行道中為盗所刼脩㧞佩刀向盗曰父辱子死汝不畏死邪盗驚謂曰童子義士毋逼之遂辭去後仕為郡功曹嘗守吳令討賊障扞太守為流矢所中賊素聞㤙信即殺中脩者衆悉降曰自為彭君不為太守也許武會稽陽羡人太守第五倫舉孝亷武以二弟晏普未顕欲令成名乃剖財産為三自取肥田廣宅二弟所得悉劣鄉人皆稱弟克讓而鄙武貪婪晏等並得選舉武乃㑹宗親泣言所以分財取譏意悉推財産於二弟於是郡中翕然稱之仕至長樂少府許荆武之孫仕為郡吏兄子世嘗報讐殺人怨者操兵攻之荆跪言曰世無狀咎在荆不能訓𨗳兄惟一子死則滅絶願殺身代之怨家曰許椽郡中稱賢吾何敢相侵遂委去後舉孝亷和帝時為桂陽太守孫馘靈帝時為太尉王閎無錫人以明易稱通天文之學仕為主簿守山隂令㭪御史終陳留太守不交豪彊人號王獨坐髙彪呉郡無錫人舉孝亷第一除郎中校書東觀數奏賦頌竒文因事諷諫靈帝異之遷内黄令卒有徳政靈帝詔東觀畫彪像以勸學者張秉陽羡人時顧邵號知人於庶民中㧞而友之為立聲譽後仕吳至雲陽太守三國周魴陽羡人少好學吳時舉孝亷為寜國長歴鄱陽太守魏兵潜入皖魴與陸遜斬馘萬數賊帥董嗣鈔豫章諸郡復設竒計平之晉周處魴子少孤膂力絶人好馳騁田獵不脩細行州里患之處自知為人所惡有改勵之志謂父老曰今嵗豐何苦不樂耶父老嘆曰三害未除何樂之有處曰何謂也答曰南山白額虎長橋下蛟并子為三處遂入山射虎入水斬蛟勵志為善力學好義初仕吳為東觀左丞後歸晉累遷御史中丞糾劾不避寵戚所著有黙語及風土記等書三子玘清扎錢廣義興人惠帝末年與周玘顧榮倡義平陳敏卒追封平世侯周玘處之子强毅沈斷閉門潔已不妄交逰舉秀才除義郎太安初起義討平妖賊張昌叛人錢璯拜呉興太守封烏程縣侯甚有威惠境内寜謐帝以玘勲誠並茂置義興郡以彰之顧愷之無錫人父恱之尚書左丞愷之博學有才氣嘗為桓溫及殷仲堪參軍謝安深器重之善丹靑圖畫每畫人成數年不點目睛曰傳神寫照正在阿堵中義熙初為散騎常侍尤信小術以為求之必得故世傳愷之有三絶才絶藝絶癡絶嘗為虎頭將軍人號顧虎頭南北朝蕭思話南蘭陵人宋孝懿皇后弟子也父源之除兖州刺史思話少未知書隣曲皆患毒之自此折節數年遂有令譽元嘉中為青州刺史孝武時徴為尚書左僕射後拜鄭州刺史加都督卒謚曰穆子惠開惠基基子洽從子深介介子允引俱有名吳欣之江隂人宋元嘉末弟慰之為武進縣吏隨王誕起義元凶遣軍主華欽討之見執將死欣之詣欽乞代弟命兄弟皆見原齊建元三年詔蠲表之吳達之義興人嫂亡無以葬自賣為奴以具棺槨從弟欽伯夫妻荒年畧賣江北逹之貨田贖之遂與同處郡命欽伯為主簿固以遜兄逹之又以世舊田與弟弟亦不受田遂間廢齊建元中表其門周盤龍義興人仕齊累功封純陽侯建元初魏攻夀春以盤龍假節助垣崇祖拒敵大破之又與魏軍戰盤龍父子兩騎縈攪數萬人大敗魏兵後遷散騎常侍武帝戲之曰卿着貂蟬何如兠鍪盤龍曰此貂蟬從兠鍪中生耳陳慶之義興國山人切從梁武帝甚見親賞為武威將軍後除假節總知軍事與魏兵相持各數百戰魏人倚角作十三城慶之䧟其四壘復鼓譟攻其九城斬獲殆盡二子昕暄俱有名蕭立南蘭陵人年十七射䇿甲科仕梁自廷尉評再遷殿中侍御史文學政事為臺閣領袖獨孤及序其文比之賈馬云周文育陽羡人本新安人性項少孤貧義興周薈竒之請于其母養為己子教之書計文育曰誰能學此取富貴但有大槊耳遂教之騎射文育大恱仕梁以戰功最進爵夀昌縣公卒謚忠愍周寳安文育子父殁起為將軍領父兵南討陳文帝深器重之以功拜吳興太守襲封夀昌縣公後遷左衛將軍領衞尉卿卒謚曰成蕭摩訶南蘭陵人果毅有勇力仕陳屢從吳明徹北伐領騎深入敵陣縱横奮擊無不披靡明徹謂其材不減關張以功歴車騎大將軍封建綏郡公改授侍中隋劉子翼晉陵人仕為著作郎唐貞觀中召之辭以母老詔許終養江南廵察使表其所居為孝慈里唐衛逖陽羡人少習詩書學劔逰并汾間唐初建義旗逖以勇藝進及擒竇建徳逖持挾鎗劔前突後翼太宗竒之拜將軍宿衛以母老乞歸詔許之既而以孝敬睦閨門以忠信居鄉里及卒邑人懷其賢廟祀于荆溪之湄錢九隴晉陵人初佐髙祖起義兵從太宗擒竇建徳平王世充皆有功封郇國公蔣儼義興人擢明經第為右屯衛兵曹參軍太守將伐髙麗募為使者人皆憚行儼奮曰以天子雄武蕞爾小國敢圖王人遂請行為莫離支所囚不屈髙麗平得歸帝竒其節遷殿中少監髙宗時為蒲州刺史卒贈禮部尚書薛登義興人父士通隋鷹揚郎將江都亂與州民㨿城拒賊唐初自歸授東武州刺史平輔公祐封臨汾侯豋通貫文史善議論為左輔闕累上疏言皆切中官至御史大夫僧慧範怙太平公主勢豋劾奏反為所搆出為岐州刺史劉禕之晉陵人父子翼為著作郎峭直有行常靣折僚友短退無餘訾尤以孝稱褘之能文辭累遷𢎞文館學士髙宗宻與參决時政以分宰相權時謂北門學士後以言忤武后賜死于家睿宗立贈中書令髙智周晉陵人舉進士為夀州刺史治尚文雅行部先見諸生質經義及政事得失乃録獄訟考耕餉勤惰以為常儀鳯初為同中書門下三品以夀終諡曰定蔣子慎義興人與髙智周善有相者言髙公位極人臣而嗣少弱蔣侯官不逹後且與子慎終建安令其子繒徃見智周智周以女妻之生子挺歴湖延二州刺史挺生渙洌皆擢第渙歴鴻臚卿許景先義興人曾祖緒武徳初以佐命功封真定公景先舉進士後舉茂才異等授殿中侍御史評按不避近强後知制誥以雅厚稱張說稱其文詞㫖豐美得中和之氣開元中由吏部侍郎為刺史治虢州後徙岐州復為吏部侍郎王遇武進人肅宗時與弟遐為賊所執將釋其一兄弟爭死賊感其誼俱縱之秦景通晉陵人與弟暐皆有名俱精漢書號大小二秦君經指授者咸有師法景通仕至崇賢館學士暐復踐其官云蔣乂義興人徙家河南博覽強記該綜羣籍有史才貞元中擢史館修撰累遷秘書少監又居史職二十年每有大政事議論宰相必咨訪之嘗疏裴延齡罪惡當世髙之五子係為右僕射伸位丞相偕史館修撰踵修國史僊佶皆位刺史蔣防義興人年十八父令作秋河賦援筆即成後以李紳薦累官翰林學士中書舎人許嗣宗義興人仕為義興太守精於醫或勸其著書貽後世答曰醫者意也吾意所解莫能宣矣宋張觀毘陵人南唐舉進士歸宋為彭原主簿後召拜監察御史終廣南西路轉運使觀廣覽漢史雅好論事辭理切直有古人之風杜鎬無錫人博貫經史素有懿行南唐時舉明經為集賢校理宋平江南授國子監丞加秘閣校理太宗嘗問以西漢賜與悉用黄金而近代為難得之貨何也鎬曰當是時佛事未興故金價甚賤景徳中以為龍圖閣學士後進秩禮部侍郎張鑄晉陵人祥符中進士甲科歴知四郡五任漕憲皆有政績嘗帥南陽王安石出其門後以光禄卿致仕葛宫江隂人舉進士性敦厚善屬文上太平雅頌十篇真宗嘉之召試學士院又上寳符閣頌官至工部侍郎葛密宫之弟舉進士為光州推官仕至太常博士年五十即請老姻黨交止之笑曰俟罪疾老死不得已休官者安得有餘裕哉即退居號草堂逸老子書思踵登第調建徳簿宻既致仕書思即投劾歸養十餘年後仕至朝奉郎亦告老父子清節相映人以為難子勝仲孫立方皆以學業至侍從徙家呉興陳思道江隂人喪父事母兄以孝弟聞鬻醯為生母病思道衣不解𢃄者数月母喪水漿不入口七日既𦵏廬墓側日夜悲慟晝則白兎馴狎夜則虎豹環廬而卧咸平初賜束帛旌其門邵靈甫宜興人倜儻樂施予嘗歳歉盡發儲得五千餘斛自縣至湖洑鎮除道四十里浚蠡河等水路八十餘里通罨畫溪入太湖邑人爭受役因頼以活子梁登進士第孫剛魁南省人以為積善之報蔣堂宜興人舉進士為監察御史仁宗廢郭后堂極論不可出為江南東路轉運使徙河南歲薦部吏二百人累遷至禮部侍郎致仕有吳門集二十卷胡宿晉陵人舉進士為揚子尉脫萬人於水死累官修起居注知制誥唐介貶嶺南遣中使䕶徃宿言介如不幸道死陛下受殺直臣之名帝悟為追還使者遷翰林學士宿内剛外和臨事重慎尤顧惜大體官至尚書右丞以太子少師致仕卒諡文恭子宗炎善為詩有鮑謝風致官至直龍圖閣丁寳臣晉陵人與兄宗臣俱有文聲號二丁景祐中同登進士寳臣歴官至秘閣校理英宗每論人物必稱之尤與歐陽修友善修志其墓杜杞鎬之孫䕃補將作監主簿知建陽縣強敏有才累官環慶路經畧安撫使知慶州杞博覽強記有奏議十二卷兄植以文雅知名累任監司終少府監弟樞亦彊敏為北部員外郎錢公輔武進人少從胡瑗學舉進士通判越州同修練起居注英宗即位陳治平十議後謫滁州團使神宗立復入知制誥富弼曰上求治如飢渇正頼君軰同心以濟公輔曰朝廷所為是天下誰敢不同所為非公輔欲同之不可得已後與王安石不合出知江寜府徙揚州丁隲武進人嘉祐進士以經學倡後進尤長於易春秋為文自成一家官至太常博士右正言有文集二十卷張巨武進人嘉祐中舉明經少從胡瑗㳺與蔣之竒胡宗愈丁隲為四友以薦充國子監直講王安石新經行巨即引去時論髙之有文集四十卷易解十卷胡宗愈宿之姪舉進士英宗嘗問宿卿之子弟誰可繼者以宗愈對神宗時除集賢校理同知諌院哲宗即位首進六事及君子無黨論官至吏部尚書卒諡修簡弟宗囬用䕃登第官終樞宻直學士胡氏自宿始大其後子孫至侍從者十數遂為晉陵名族袁黙無錫人嘉祐進士官至湖北轉運判官學問淵深為時所宗弟點植正功皆有名於當世單錫宜興人明隂陽圖緯星歴之學與蘇軾同年進士軾愛其賢以女兄之子妻之來宜興每寓其家從子子發舉八行科有風土記傳世孫時亦舉進士擢監察御史錢顗無錫人熈寜初為御史裏行上疏忤王安石貶衢州監稅顗將出臺於坐大罵同時御史孫昌齡謂其奴事安石求為美官遂拂衣上馬赴貶所蘇軾送以詩有烏府先生鉄作肝之句世因號鉄肝御史沈初無錫人熈寜進士初入大學試周以宗强賦為第一文詞典麗時爭倣之官終國子直講余中宜興人熈寜間中進士第一而同郡邵剛魁南宫邵材魁開封於是宜興稱多士矣中官至知湖州致仕邵材宜興人熈寜中試開封第一舉進士為監察御史時王安石當國司馬光論新法一日語材曰劾去司馬大官可立待材毅然曰君實正人也可厚誣之乎即自劾歸後終鴻臚卿張昷之鑄姪進士及第補樂清尉通判常州知温州蔡齊薦其才可用累遷天章閣待制河北都轉運使善吏事所至有聲後知湖州徙揚州以光禄卿致仕錢即宜興人呉越王諸孫也舉進士累官顯謨閣學士知延安府所至有聲童貫宣撫陜西患物價騰踴嚴設科條又行均糶法陜西騒然即上疏極陳其害坐貶永州團練副使後知宣州以龍圖閣學士致仕卒諡忠定蔣之竒宜興人舉進士為監察御史徽宗時累官翰林學士知樞宻院事崇寜初以觀文殿學士知杭州以疾歸之竒為部使者十二任亦典會府所至以治辦稱有文集百餘卷子瑎舉進士知興元府鄒浩晉陵人以行人著舉進士為右正言上章極言章惇之罪哲宗廢孟后而立劉氏復上章乞追停冊禮惇詆其狂妄削官覊管新州徽宗立召為中書舎人蔡京忌浩再責衡州别駕尋竄昭州卒賜諡曰惠子柄從學楊時以薦除編修累官知台州張􅘏常州人進士甲科養其親不忍去左右閉户讀書四十年手校數萬卷窮經著書范祖禹蘇軾交章薦其髙行詔拜校書郎竟不出􅘏孝弟忠信蹈中守常為當時所重卒賜諡正素先生陳敏無錫人舉進士知台州朝命立元祐黨籍碑敏不肯立監司促之急敏曰誣司馬公為姦臣是誣天也倅立之敏碎其石或咎敏敏曰我死且不辭何劾之畏遂掛冠去後以八行薦不起周孚先晉陵人與弟恭先俱從程頥學頥嘗謂孚先兄弟氣質清明可以入道其後俱由鄉薦入太學孚先調四明鹽塲改建徳尉不就後丐祠恭先終坑冶官唐杖宜興人嘗從程頥學頥教之以先大學次及論孟杖自是有所得遺書載問答甚多纂次伊川語録百餘條方之門人記録為詳蔣静宜興人舉進士調安仁令毁淫祠神像三百軀後遷國子司業徽宗幸太學命講書無逸賜金紫服進祭酒胡交脩宿從子崇寜進士直學士院兼侍講首論天下大勢及應詔對弭盗保民豐財裕國彊兵禦戎之要後陞翰林學士遷刑部尚書交修簡重寡言進止有度為文不事雕琢在詞苑號為稱職霍端友武進人崇寜二年狀元累官吏部侍郎有所善者與蔡京厚從容致京意欲擢為中執法端友不肯阿附遂忤京意以通議大夫致仕卒贈少師有内制三十卷胡唐老宿曽孫崇寜間進士靖康初擢殿中侍御史金人再犯京師攻圍日急唐老請拜康王為兵馬大元帥及京城破金人根括金銀杖唐老幾死後知鎮江府建康失守潰卒戚方來犯脅唐老部衆以犯臨安唐老怒罵遂遇害詔贈徽猷閣直學士胡世將唐老弟同登進士第為寳文閣學士宣撫川陜時關陜初復分軍移屯熈秦諸道金人䧟同州世將禦之金人不敢度隴後以資政殿學士致仕施坰武進人崇寜進士累官禮部侍郎顯仁太后回鑾為考訂儀注時以為宜性孝友在官得親書必冠帶跪讀遇恩奏補官率推弟姪鄉里稱其賢李熈靖晉陵人舉進士徽宗時歴中書舎人兼侍講靖康中張邦昌攝國熈靖即移病不出邦昌迫令權直學士院熈靖力拒之以憂憤廢食而卒贈端明殿學士蔣興祖之竒孫以䕃累官知陽武縣靖康初金兵犯汴道過縣或勸使走避興祖曰吾世受國恩當死於是與妻子留不去監兵與敵通斬以徇金兵至拒戰力不敵死焉妻及長子以悸死詔贈朝散大夫李端行無錫人與弟尚行入太學俱有聲大觀中同登進士吕熈浩嘗師之逮貴猶執弟子禮為太學博士作詩詆蔡京出宰鄞縣發憤終身不復仕沈積中晉陵人舉進士累官户部尚書宣和中知真定府上疏論不可取燕山童貫惡之奪其職建炎三年追復資政殿學士盡還合得㤙數吳懋晉陵人仕為禮部員外郎靖康末金人立張邦昌王時雍用事坐政事堂懋發憤罵之曰反臣吾不能擊汝如叚秀實耶時雍靣頸俱赤後吳幵莫儔以表狀詣金營懋竟不屈張守晉陵人崇寜進士建炎初為御史中丞嘗上疏言陛下處宫室之安則思二帝母后穹廬毳幕之居享膳羞之奉則思二帝母后羶肉酪漿之味言極激切遷翰林學士知制誥尋除參知政事卒諡文靖胡珵晉陵人宣和中進士嘗從學劉安世操行端方紹興初召試翰林兼史館校勘命珵删定舊史忤執政出知嚴州周葵宜興人宣和進士歴官殿中侍御史知無不言孝宗時為參知政事卒諡惠簡所著有聖傳詩二十篇文集三十卷奏議五卷吳師古宜興人舉進士紹興中宰臣秦檜决䇿主和金使以詔諭江南為名慪宻院編修胡銓抗疏論之銓遂貶師古鐫木傳其疏金人募其書千金為人所訐師古流袁州陳之茂無錫人為太學生與張九成同廷對之茂所對忤權相黜之九成第一叩頭殿堦曰陳之茂能言人所不敢言宜奬不宜黜髙宗覽對悚然曰忠言也賜同進士出身調休寜尉以經學為諸儒倡仕至吏部尚書蔣芾之竒曾孫紹興中進士累官至右僕射同中書門下平章事兼樞宻使時有手詔議大舉兵廷臣或主和或主恢復使芾决之芾奏天時人事未至拂上意尋除觀文殿大學士知紹興府尢袤無錫人紹興進士為秘書丞權禮部侍郎孝宗嘗曰如卿才識近世罕有累官中書舎人兼直學士院内禪制冊皆出其手官至禮部尚書諡文簡所著有遂初小藁六十卷内外制三十巻丘崈江隂人隆興初舉進士除國子博士宰相虞允文舉以自代崈入對首言恢復之志不可忘恢復之事未易舉宜甄㧞實才責以内治光宗時為四川安撫制置使兼知成都府崈以吳氏世掌兵為慮奏選他將代之遂革世將之患官終同知樞宻院事卒贈太師諡忠定李祥無錫人隆興初進士累遷國子祭酒時相趙汝愚以言去國祥上疏爭之以罪去除湖南運副言者劾罷之後以直龍圖閣致仕卒諡肅簡錢之望晉陵人少放逹喜竒計金主亮南侵以䇿干虞允文謂敵有内潰之勢允文用其言金果有符離之敗乾道中登進士第為金部郎官知楚州遷華文閣待制丁逢晉陵人舉進士金主遣其婿烏林荅天錫來怙貴驕黠衆憤而莫能析逢謂示弱何以為國上書乞斬之孝宗嘉其材氣可尚召對除國子監書庫官終寳謨閣待制邵及之宜興人乾道中為司封郎時楊沂中封和王薨其子乞襲封及之曰國朝故事異姓王無襲封者雖趙韓王開國元勲亦止及身而已事遂寢後以徽猷閣致仕薛極武進人以䕃調上元主簿中詞科累官兵部侍郎嘉定中嘗疏奏願以今日遇災警懼之心永為異時暇逸之戒後賜同進士出身累遷知樞宻院事兼參知政事封毘陵郡公端平中加少保和國公致仕蔣重珍無錫人嘉定中進士第一嘗為秘書郎兼崇政殿說書凡當講戒言家事務積精誠以悟上意每草奏齋心盛服有宻啟則手書削藁積官至刑部侍郎卒諡忠文向士璧常州人紹定進士歴官至兵部侍郎湖南安撫使兼知潭州元兵圍潭士璧拒却之士璧負才氣精悍自好嘗捐官貲百萬以供軍費數立竒功賈似道疾其功諷言官劾罷之錢相晉陵人嘉定進士端平初以真徳秀薦累遷御史右正言有直聲自起居郎入經筵理宗大書經畬二字賜之官至吏部尚書卒贈少師尤焴袤之孫父棐工部侍郎焴端平初徵為將作監主簿後為淮西帥以儒者守邉威惠兼濟累進工部尚書入為翰林學士卒年八十三自號木石耿秉江隂人仕為兵部郎中兼給事中終煥章閣待制律已清儉兩為浙漕所至以利民為事著春秋傅二十卷五代會史二十卷胡鏜江隂人舉進士歴知寳慶府工部郎官平生所學以四書為本一室瀟然凝塵滿几處之晏如也清苦亷介為時所稱陳炤常州人少工詞賦登第知胊山縣丁母憂歸元兵至常州知府姚訔辟炤為通判或勸炤辭炤曰鄉邦淪沒何可坐視遂墨衰出率義兵戰禦元巴延自將圍常炤與訔恊力固守城破訔死炤猶巷戰家人曰城東北可走炤曰去此一步非死所矣日中兵至死焉事聞追贈直寳章閣官其子徐道明常州人為天慶觀道士徳祐初元兵圍城道明謁郡守姚訔請曰君侯計將安出訔曰死守而已道明亟還告其徒曰姚公誓與城俱亡吾屬亦不失為義士元兵屠城道明危坐焫香讀老子書兵使之拜不顧以刃脇之不為動遂死焉莫謙之宜興人初為僧徳祐初糾合義士捍禦鄉閭詔為溧陽尉尋没于戰陳贈武功大夫胡應炎晉陵人舉進士元兵次常州知府姚訔署為節度判官包圭亦晉陵人素有智謀辟知武進縣事城䧟應炎與圭率民兵巷戰衆潰俱被擒不屈死之包天麟江隂人咸淳間舉博學宏詞科嘗註詩書易春秋年八十三手不釋卷元旌其門二子植橒俱登科仕于時陸文圭江隂人㓜穎悟博通經史百家及天文地理律厯醫藥筭數之學宋亡隱居不仕元初設科有司强之就試再中鄉舉文圭為文融會經傅縱横變化莫測其涯東南學者皆宗師之元數遣使幣聘不起蔣捷武進人入元不仕平生多所著述一以禮義為主其小學詳斷發明㫖趣為多元陸垕江隂人自㓜以孝友聞至元間巴延兵南下垕時年未冠而志强氣銳率其鄉人見之論議有合元兵遂不涉其境巴延奏授同知徽州路以亷能稱累官湖廣亷訪副使陞浙西亷訪使所至黜贓吏洗寃獄卒諡莊簡梁益江隂人博洽經史而工於文隨其教人以變化氣質為先務浙西稱學術醇正陸文圭與益而已所著書有三山藁詩緒餘史傳姓氏纂詩傳旁通惠希孟江隂人學問該博持守嚴重兄老無子希孟奉侍如父嘗著宗範五卷雜禮纂要易象鈎𤣥數十卷徐憲無錫人性端雅博學為詩有唐人風仕為内臺監察御史終兵部侍郎陸以衜無錫人明易經遡程朱之源得象外㫖趣至正中官至翰林待制所著有宋鑑提網倪瓚無錫人博學好古工詩畫家故饒貲一旦舎去曰天下多事矣乃徃來五湖三泖間人望之若仙去本朝謝應芳武進人自㓜篤志留心性理之學尤工於詩文元末避地呉中本朝平定始還毘陵年九十七終所著有思賢録辨惑編毘陵續志龜巢藁孫英武進人成穆貴妃之兄洪武初拜參知政事賜第京師子震補河南中䕶衛鎮撫蔣賢宜興人輕財好施遇嵗歉發粟賑貧死無以𦵏者施以棺洪武初率鄉民運粮赴太平以助軍上嘉其誠賜墨勅俾知宜興州以老辭用其孫貞代之錢本中武進人洪武初以材能薦知吉水縣小氏為强豪侵奪哨聚山谷間為盗事聞遣帥調兵勦之本中詣主帥懇告緩兵單騎直抵其壘示以恩信衆乃歸命活數萬人後調知樂安以詿誤去官吉水胡廣時為學士奏請復舊任驛召至京仍命知吉水吳雲宜興人性明敏善詩詞洪武初以求賢舉授𢎞文館校書郎累官至刑部尚書出為湖廣左參政楊得安宜興人博覽經史由太學生擢知南和縣歴官至僉都御史王逹無錫人洪武初以明經舉任本縣訓𨗳薦陞國子助教永樂初擢翰林編修預修實録陞侍讀學士性簡淡博通經史所著有耐軒集天㳺藁詩書心法易經選註桂林僟要陳濟武進人博學強記六經子史無不究竟時稱為兩脚書樹永樂初以布衣召修永樂大典為總裁書成授右春坊右賛善所著有詩傳通證書傳補元史舉要通鑑綱目集覽正誤思齊集陳洽濟弟淹貫經史洪武中用薦授吏科給事中永樂中為吏部侍郎大理寺郷佐英國公張輔討平交趾陞兵部尚書鎮撫其地後交趾復版成山侯王通引兵渡河洽力陳利害弗聽翌日兵與賊遇遂被害贈少保諡節愍官其子樞為給事中叚民武進人永樂甲申進士選入翰林為庶吉士除刑部主事預修五經四書性理大全陞郎中宣徳初陞南京户部侍郎轉刑部亷介為時所稱王紱無錫人有行義喜吟咏工真行草書善畫山水木石而竹尤精永樂初任中書舎人徐晞江隂人為人明敏有幹才累官户部侍郎以平麓川功陞兵部尚書趙琬武進人以明經領鄉薦授教諭陞翰林待詔未幾陞國子監司業官終右春坊右諭徳蔣守約宜興人為人端謹永樂中歴太常賛禮協律郎累陞太常寺卿終禮部尚書王忠武進人洪武初父友諒以輸稅後期法當死忠時年十七即自詣京懇請代父比至會赦免人以孝稱宣徳中以國子生除兵部主事老成練逹人皆以大任期之忠以母老懇乞致仕卒于家俞雍無錫人正統初知公安縣勤于撫字每單騎行郊野中勸民耕織課其勤惰楊傳嘗延譽于朝謂有古循吏風畿志髙曇無錫人由國子生授潭州府通判鄧茂七搆亂會府使督餉遇賊以刃脅之曇罵曰汝等旡狀上勞王師下毒黎庻指日梟首于市敢肆猖狂殺汝父母耶遂受害畿志王㒜武進人景泰初進士及第第三授翰林編修進講經筵屢預纂修擢南京吏部尚書致仕㒜徳器宏裕練逹事體為時推重卒贈太子太保諡文肅畿志盛顒無錫人景泰辛未進士拜監察御史以言事出知束鹿丁内艱服除束庻民相率詣闕乞還從之時有水鏡之謠累官刑部侍郎山東饑轉副都御史徃撫之致仕歸以疾卒畿志徐溥宜興人景泰甲戌進士及第第二授翰林編修預經筵歴詹事府入内閣典幾務進少師𢎞治中致仕為人端厚凝重贈太師加柱國諡文靖畿志厲昇無錫人以嵗貢入胄監授浙江青田知縣持公秉亷孜孜愛民去之二十年邑人猶懷慕其徳立生祠祀之白昻武進人性謙厚天順間進士擢禮科給事中嘗因災異上謹命令以全大信六事僉内臺巡江治河有功入司風紀歴掌邦刑有平恕老成之譽致仕卒諡康敏子坼舉進士官至副都御史畿志秦䕫無錫人天順庚辰進士歴知武昌建昌府所至有聲䕫器宇軒豁才氣英邁與人不茍合累官江西布政以疾乞休卒畿志陸簡武進人成化丙戌進士第三人累官諭徳至詹事兼侍講學士兩典試事稱得人以疾卒于官簡志行淸峻問學該博贈禮部右侍郎畿志王沂㒜之子成化乙未進士累官副都御史沂方髫時母吳溺于北河號慟人不能堪每舟過溺處大慟幾絶歴官三十年勤慎端方如一日畿志湯沐江隂人𢎞治中進士累官大理寺卿守官端方公亷所在有政績卒于家畿志毛憲武進人任給事中正徳中武皇北狩回賜文臣武階緋綺使戌制服之以迎有争以榮者憲獨納還歸鄉足不及公門畿志邵寳無錫人舉進士任許州知州以善政稱江西督學副使以善教名至今士人皆思之仕至禮部尚書畿志胡濙武進人洪武庚辰進士累官禮部尚書贈太保諡忠安為世名臣列女羊氏名叔褘南蘭陵人蕭矯妻性至孝居父喪哭輒吐血母嘗有疾叔褘夕祈禱忽見一人自稱枯桑君曰若人無患令泄氣在亥西南求白石鎮之言訖不見明日如言而疾愈薄氏唐江隂尉鄒待證妻待證在官遭亂解印竄匿薄氏為盗所驅將辱之不屈先以夫誥命托村媪訪夫所在付之而後就死李華作哀節婦詩何氏女江隂人五代末為江賊所掠欲汚之何曰當修容以見湏臾盛飭以出立于船首罵賊赴水而死後人為之立祠胡淑脩宿之女嫁李之儀讀書善屬文宋嘉祐中從其祖母至内庭光獻皇后拊之曰是胡氏有學能文之女乎之儀母死淑脩躬自負土封穴哭泣不輟手植松栢遂成茂林蔣氏江隂人宋建炎三年金兵至夏港守臣胡魴謂僉判李易曰吾曹有死城郭之義公母宜少避易歸告其母蔣氏令避母曰我去則汝决不肯守矣願與汝同死聞者義之鄧氏武進人謝天與妻其姑以哭子喪明鄧氏竭力侍養宋末元兵猝至家人皆走匿姑弗能從鄧氏抱姑避牛舎中兵至火其廬急扶姑出匿後圃鄧氏被獲繫之行遇漕渠遂投水死費氏名元琇江隂知事朱道存妻元末依父居上海為苗軍所執費氏攀堂檻厲聲曰吾義不受辱苗狗敢辱我耶遂被害爪入楹木血沁于指程氏丹陽翼千户陳存信妻初王師攻常州存信死之程氏年二十七聞之號慟幾絶兵退行求其屍歸𦵏之子夀嗣為江隂衛百户征閩為盗所殺存信遂無嗣程氏守節不渝詔旌其門臧氏武進人陳旭妻旭疾革語臧曰吾殆不起汝宜善事後人臧泣不能答翌日旭亡臧給家人入室取衣衾為殮具即自經死詔表其門曰貞烈畿志巢氏女武進人許聘惲氏子惲父卒女言于親為制服未幾子亦卒父母將為擇對女曰忍以一女擇二姓哉遂自經死畿志吳氏三節江隂人吳宗傑妻周氏宗道妻木氏宗善妻花氏吳兄弟俱以行役死殊方三婦相與謀歸夫骨袝𦵏先塋誓不食他姓詔表其門曰三節畿志楊氏無錫人余彦照妻彦昭戍滇南卒楊年二十一子甫朞家貧誓不他適養姑強以天年終既而子婦俱蚤世楊又撫其孤志愈厲詔旌之畿志吳氏江隂人華緯妻正徳壬申避賊賊追及吳詐仆負塗賊縶之問曰洗塗曰不洗更衣曰不更且罵曰汝當速殺我我江國公勲臣家女奈何汚耶明日又問荅如之賊怒爭刃之投于江畿志袁範妻陳氏武進人夫亡守節事聞受旌畿志吳谷祥妻無錫人姓劉氏夫死守節詔旌之畿志趙氏江隂人適夏師顏顔蚤卒趙誓不他適矢志自守終其身惟謹詔旌之畿志謝氏宜興人宋仲庸妻夫亡守志終其身旌之畿志仙釋申屠有涯宋時居宜興携一瓷缾一日與衆渡舟飲酒大吐衆逐之乃挈缾登岸倚杖呤曰仲尼非不賢為世所不容蚩蚩同舟子不識人中龍吟畢跳身入缾中衆皆駭舉缾碎之寂無所見劉混康晉陵人㓜遇異人授以呪術治疾輒騐宋徽宗聞而召之入對稱㫖後住茅山賜號葆真冲和先生陳葆光住天慶觀嘗夢𤣥武神舉白璧授之遂善符篆治病輒愈撰丹神蒙求三卷正勤姓韓氏五代時居永慶寺嘗有僧問如何是禪勤曰石裏蓮花火裏泉又問如何是道曰楞伽峯頂一莖草又問禪道相去幾何曰泥人落水木人撈晉天福中無疾而逝宗本無錫人師事道昇禪師住凈慈民張氏有女死母夢女曰我以罪為蛇既覺得蛇於棺下本為說法復置故處俄有黒蟬翔棺上蛇失所在母祝曰若我女當入籠中如其祝本復為說法是夕母夢子曰二報已解脱矣其顯化異數多類此明一統志卷十
