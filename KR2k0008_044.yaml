陌東風拂靣柔客裏又驚春事晚夢中重續括蒼游歡情飲量年年减古寺名園處處留却羡少年輕歲月角聲如此不知愁名宦唐李雍開元中括州刺史興利除害郡人悅服李陽氷乾元間為縉雲令修孔子廟歲旱禱雨於城隍約以五日不雨將焚其祠如期果雨秩滿居吏隱山多留詩字為後人所寶邢羣㑹昌中為處州刺史革吏姦除弊政去任之日老稚泣送於路李中敏㑹昌中處州刺史性剛直有氣節會大旱上言乞斬鄭注則天必雨不省遂以病告歸假成式大中間處州刺史境內惡溪多水怪成式有善政水怪潜去民謂之好溪宋甄旦知麗水縣吏道詳敏而飾以文學清白以率下明察以照姦到任未期政治大成楊億至道中知處州真宗賜以金百兩在郡歲稔刑清專以寬大為政仲簡知處州時稱治為浙東第一張若谷知處州不激訐取名而自有循良之迹孫沔景祐中知處州時學校久弛沔贍養生徒士始知學邦人立祠於郡庠崇大年慶厯中知青田縣民貧無以納稅買州符追縣吏大年悉令候冬熟納足民感其惠政張仲倩神宗時為縉雲縣尉治有政聲縣有淫祠曰五通歲旱仲倩遍禱祈不及五通吏民以請仲倩強往命毁之歲亦大熟劉琦熙寧初為侍御史疏論王安石言行乖戾坐貶監處州酒稅以直聲聞劉芹元祐中知青田縣時邑未知學芹躬為訓誘風俗一變競以儒業相尚秦觀紹聖中坐蘇轍黨責監處州酒稅嘗寓僧寺中有詩云市區收罷魚豚稅來與彌陀共一龕言者得詩劾以廢職再貶藤州朱戩元符中知青田縣子常復知是縣興建學校崇奬儒學父子繼美邑人稱之陳戩徽宗朝為處州教授後又知處州時苦亢旱戩下車雨霑足人以為隨車雨史徽政和中知青田縣明敏果斷時以茅葺屋多火災徽教以用瓦火患遂息黃葆光宣和中知處州當方臘殘亂之後民力凋弊招集流散撫摩不倦民列其狀加直祕閣再任卒之日闔城哀慟罷市建祠祀之張觷知處州有善政嘗欲造大舟幕僚不能計其直觷教以造一小舟量其尺寸而十倍算之劉大中紹興中知處州在任激濁揚清抑强扶弱境內肅然謝深甫孝宗時知青田縣有廊廟才侍御史葛邲監察御史顔師魯禮部侍郎王藺交薦之王極淳熙中知青田縣律已清介􅊩事明敏嘗立銷鈔程式民庶稱之劉􅍲淳祐中知青田縣明敏警悟於政事洞見源委吏無所欺以崇學校厚風俗為先民懷其惠肖其像祠於義倉江安止知麗水縣為政明敏囹圄屢空案牘無積又練鄉兵以禦盜邑賴以寧去之日吏民泣送於道張根知遂昌縣省决曲盡情僞猾吏革心獄訟衰息興利除害政繢赫然汪待舉知處州為政寬厚曲盡下情民有爭訟呼之使前靣究曲直不以屬吏百姓以詩誦之云官舍却如僧舍靜吏人渾似野人閒傅楫知龍泉縣中丞孫覺曰朝廷欲用君盍少留楫曰仕宦樂居中者免外臺督責耳今俯首權門與外臺奚擇遂去不顧葉顒知處州明習法令吏不能欺待下以嚴僚屬敬畏民懷其惠范成大知處州開堰溉田興義役修橋梁民便之葉綰知龍泉縣有善政邑人立碑記之司馬掀典遂昌縣撫字百姓教化大行有瑞蓮嘉禾之應馬光祖知處州為政知大體决訟如神舉行荒政威惠並著後人思之吳勢卿知處州救荒有法時松陽盜起率民義悉平之尤留心學校親為講說以淑後生李雷奮知處州在郡亷謹嘗捐俸造郡學士人立祠於學祀之楊大異龍泉尉攝縣事適歲饑提刑司遣吏和糴米二萬石於邑米價頓增民乏食大異即以提刑司所糴者如價發糶民甚德之吳芾知處州因俗為治視官如家處舊苦丁絹重芾損之以新丁補其額黃㽦通判處州經總制有額無錢俗號殿最綱㽦㑹十年中成賦酌取之閣免逋負錢額鈞等獨以最聞元趙賁亨至元中為處州路逹嚕噶齊討平叛冦招散亡立官府呼賴都克台欲屠城賁亨不從曰賊固可殺良民何辜州以免舒穆嚕宜孫副都元帥守處州本朝獲其弟及母以書招宜孫不至遁入建寧復出與王師戰敗走死於桃坑朝廷嘉其盡忠遣使諭祭州民立祠祀之本朝石驥洪武初知松陽縣明敏果斷吏民不敢欺凡有賦役務稽其實民皆服其均平為立政繢碑凌玉洪武初知青田縣以興學勸農為政民受其惠倪孟賢洪武中知麗水縣有賣卜者干謁縣民不遂所求詣京誣訴其謀亂乃遣官往捕連坐者數十人孟賢其情以聞被訴者悉得釋民以是深感其德魏明德洪武中慶元縣丞愛民如子時青田縣賊葉香等作耗統兵者勦捕欲盡誅慶元連境民明德抵軍門涕泣請曰今以他邑被􅊇連勦吾邑良民吾寧受死不忍傷吾民也主將乃止邑人咸感其德李納洪武中知遂昌縣以恩信感化山寨七十餘所招復離民萬有餘家政績為最謝子襄洪武末知青田縣在任亷潔勤於撫字務興學校初邑多虎患禱於神遂息歲旱而蝗設誠禱之雨足蝗死秩滿邑人赴闕懇留升處州知府劉仲亷洪武末知處州府在任亷謹有為政尚寬平深得牧民之體尋遷工部侍郎韓時中洪武末處州府同知操守亷正督造海舟青器措置得宜民心悅服人物宋周啓明龍泉人舉進士又舉賢良方正既而罷歸教授子弟百餘人不復仕進時號處士轉運使陳堯佐表其行義詔賜粟帛仁宗時除試助教遷至太常丞所著有詩賦雜文千六百餘篇吳戭龍泉人以行義見推甘於隱遁康定中郡守孫沔奏以教授州學部使者薦於朝賜粟帛授將作監主簿卒門人私諡曰沖和先生立祠於學管師復龍泉人與弟師常俱有盛名從胡瑗遊師復善詩自號卧雲先生仁宗召至問曰卿所得何如對曰滿塢白雲耕不盡一潭明月釣無痕臣所得也競不受爵命何琬龍泉人舉進士神宗疏其姓名於御屏云政事何琬文章葉濤濤亦邑人也詹適縉雲人幼嘗廬墓有靈芝之瑞嘉祐中進士仕至龍圖閣學士居官亷正葛源麗水人仕為雍丘令時有申貴人擊驛吏府不敢劾源上書論其事中貴人坐詘時論髙之終湖北路提㸃刑獄詹乂縉雲人善辭章元祐間馳聲太學後舉進士纍遷給事中徽猷閣學士以才識聞葉濤龍泉人進士乙科為國子直講坐事免官從王安石於金陵為文紹聖中為祕書省正字編修神宗史進校書郎後以龍圖閣待制提舉崇禧觀管師仁龍泉人崇寧中進士知建昌軍冇善政纍官樞密直學士知定州時邉備久不整遼橫使再至師仁預為計度設備一日而舉衆十萬轉盼而成日與賔客燕集以示閒暇召為吏部尚書終同知樞密院事龔原遂昌人進士髙第紹聖初拜國子司業兼侍講出知潤州徽宗初為給事中時除郎官五人皆執政姻戚悉舉駁之後歷兵工部侍郎除寶文閣待制知盧州所著有易解孫敦頥博通羣書仕至宗政丞何執中龍泉人琬之裔進士髙第調台亳二州判官知海鹽縣有異政以母憂去寓蘇州比鄰夜半火執中拊母柩號痛有頃火郤徽宗時纍官至太宰封榮國公卒追封清源郡王子志同姪志宗皆擢第胡份縉雲人舉進士文章氣節為學者宗師官至國子司業葉夢得松陽人纍官尚書左丞博學能文尤邃經術徙居胡州號石林先生所著有石林避暑録燕語行世陳汝錫青田人幼頴悟數歲能屬文舉進士邑之登第者自汝錫始官至紹興郡守有鸛溪集刋於郡齊周綰遂昌人舉進士典五郡入為國子祭酒吏部侍郎敷文閣待制自號蓮峯先生蔣存誠青田人好學工文辭仕為國子祭酒出知饒州猶子繼周舉進士歷館職二十餘年一日孝宗問宰相葉衡其人如何對曰臣備位七年不識其靣即日除右正言凡奏議上稱其得陸贄體鮑愼由龍泉人舉進士纍官工部員外郎以議論不合而去後知明海二州奉祠愼由嘗從王安石蘇軾遊為文汪洋宏肆詩尤髙妙嘗注杜詩有文集五十卷趙文澤麗水人六歲喪父廬墓有羣鼠銜花白鶴來巢之異宋大觀初詔賜粟帛祝公明麗水人主㿻縣簿金人犯太原時公明率兵入援城陷死之子陶亦死國事李洞麗水人知名太學舉進士賊陷郡父沒於冦洞隨官軍收復得殺其父者手刃之吳安國麗水人宣和初太學進士纍遷考功郎中以太常少卿使金金人渝盟拘留欲脅服之安國毅然不屈曰我首可得我節不可奪金人不敢犯靖康初遣還後知袁州詹度縉雲人宣和中為燕山府路安撫使奏郭藥師不可信任且與藥師議論不合改中山路安撫後藥師叛果如度言鄧熹遂昌人有勇略善文章宣和中睦賊犯松陽遂昌間熹捐家資集鄉民入邑禦侮與盜戰勝遂全兩縣郡守黃葆光聞於朝增職賜金以榮其歸官其一子閭丘昕麗水人舉進士以亷稱為義烏令有政績除監察御史纍遷吏部侍郎卒諡清簡姜綬麗水人靖康初金人圍汴召募忠勇士賫蠟書求援綬以忠翊郎應募刲股藏書縋下南壁為邏卒所獲罵敵不屈遂被害建炎中召官其子特立季陵龍泉人政和初以上舍三遷太學博士論學術邪正異同被譖謫知舒城縣建炎初從至揚州為太常少卿金人南侵髙宗幸杭州陵負九廟神主以行遷中書舍人多所建明歷知溫州臨安府官至右文殿修撰有文集十卷梁汝嘉麗水人以外祖何執中任入官建炎初知武進縣有治狀纍遷户部侍郎知臨安府後以寶文閣學士知明州兼浙西沿海制置使又更宣溫鼎三郡汝嘉長於吏治在臨安風績尤著章雲就麗水人建炎中賊將逼處州守臣梁頥吉募能說賊者雲就應募遇賊於荆坑諭之使降賊許諾既至城下官軍掩至賊以為賣已遂被害後人立祠於州治祀之王信麗水人紹興末進士纍官給事中以能稱嘗假禮部尚書使金肄射都亭連中其的金人驚駭曰尚書得非黑王相公子孫耶歸言金人必衰之兆有四在我當修之䇿有二歷知湖州紹興府鄂池州纍遷煥章閣待制所著有是齊集楊富老麗水人性至孝七嵗喪父廬墓三年不返感烏鵲來巢木生連理之異紹興中詔賜粟帛項安世括蒼人淳熙初進士除祕書正字光宗以疾不朝重華宫安世上書不報尋遷校書郎寧宗即位應詔言事未久以僞黨罷後以直龍圗閣為湖南轉運判官所著有易玩辭等書鄭汝諧青田人纍官知信州孝宗褒之曰鄭汝諧威而能惠自號東谷居士著易傳論語意源及東谷集田渭縉雲人舉進士纍官浙東提舉常平以鄉邑有五等差役之擾奏罷之民得安業每嵗寒食父老祭奠其墓胡紘慶元人幼穎悟好學讀書過目不忘纍官吏部侍郎出為廣東經略使所至有能聲李由臯青田人通九經試春秋舉業應童子科淳熙中中選同邑人又有戴夢齡者總角能文作項羽聞楚歌賦傳世葉賀孫龍泉人早從朱文公遊官至校書郎嘗編輯朱文公語録卒諡文修學者稱為西山先生祠於學尹起莘遂昌人隱居不仕學問該洽嘗著資治通鑑綱目發明五十九卷行世元鄭滁孫處州人宋景定間進士知樂清縣至元末以薦召見纍官集賢學士致仕歸所著有大易法象通贊周易記玩等書鄭陶孫滁孫弟宋進士鹽西嶽祠元世祖徵至闕授翰林國史院編修官㑹纂修國史至宋德祐末年事陶孫曰臣嘗仕宋宋是年亡義不忍書終不書世祖嘉之升應奉翰林文字出為江西儒學提舉所著有文集祝公榮麗水人隱居飬親事母甚孝母沒柩在堂家人失火公榮力不能救乃伏棺悲哭其火自滅鄉里異之塑二親像於堂朝夕事之如事生焉陳繹曾處州人為人雖口吃而精敏異常諸經注疏多能成誦文辭汪洋浩博其氣燁如論者謂與莆田陳旅相伯仲官至國子助教本朝劉基青田人元進士後棄官歸隱本朝初召至金陵陳時務十八䇿自是屢從征伐仰觀天象謀謨帷幄知無不言言無不應授太史令纍遷御史中丞兼𢎞文館學士論功封誠意伯致仕卒所著有郁離子覆瓿集寫情集犁眉公集子璉官至江西右參政孫豸襲封伯爵今録其後一人為翰林五經博士胡深龍泉人元末統鄉兵以保障處且州本朝師趨處州深即日迎見曰吾所以為此者欲郡邑之民安耳召至京師纍擢浙東行省左右司郎中總制處州軍民事深興利除害惠愛甚多後以征福建陳有定遇害追封縉雲伯鄉人立祠祀之章溢龍泉人元末統鄉兵保捍鄉士本朝擢浙東按察司僉事胡深兵入閩陷沒處境復驚升溢為副使往鎮撫之溢至閩誅其首叛者數人民乃定又奏减處州稅停海舟木罷鄉兵歸農官至御史中丞兼太子贊善葉琛麗水人元季兵亂從參政舒穆嚕宜孫討冦有功授行省元帥歸附本朝授管田司僉事守洪都冦陷洪都琛遇害追封南陽郡侯王景松陽縣人洪武中為山西參政與布政使會稽韓宜可同坐事謫雲南後召宜可為副都御史景與修髙廟實録升翰林侍講永樂初進升學士景博學以古文自名亦善筆札劉璟青田人基次子也髙廟時拜閣門使以剛直聞靖難師起詣闕獻䇿尋以疾歸文皇登極召用之辭以疾遂逮繫至京入見猶稱殿下下之獄自經死省志葉希賢一名雲松陽人洪武中舉賢良任御史壬午六月之變家人驚潰相失疑其已死希賢實亡在外隱姓名削髮為僧好事者異之為建剎於蜀重慶之松柏灘以志居之號雪菴和尚省列女湯輝妻元龍泉人姓張氏兵亂其家財先已移入山寨夫與姑共守之舅以疾未行張歸任樂膳賊至即命以輿載其舅而已遇賊賊以刃脅之曰從我則生否則死張掠髮整衣請受刃賊未忍殺張懼汚即奪其刃自剚死時年二十七湯婍元龍泉人有姿容賊殺其父母以刃脅之婍不勝悲咽乞早死因以頭觸刃賊怒斫殺之其妹亦不受辱而死周婦元松陽人姓毛氏美姿色至正中隨夫避亂麻鷖山中為賊所得脅之曰從我多與居金否則殺汝毛氏曰寧剖我心不願汝金賊以刃磨其身毛氏因大詈曰碎剮賊汝碎則臭我碎則香賊怒刳其腸而去季鋭妻元龍泉人姓何氏至正中因避兵於邑之繩門巖賊至何氏被執欲汚之乃與子榮兒女回娘投崖而死周氏遂昌人永樂間許聘蘇仲善為繼室未行而仲善死周遂號痛至夫家服衰麻撫夫前子事姑以孝年七十餘而卒鄉里以童老安人稱之王氏思員處州人適周應熊再嵗生一子方八月應熊病革指王曰能不吾負善養吾母保孤幼王泣曰必無負天鑒之後一如夫言孀居六十餘年始終一節省志吳質妻潘氏松陽人正統間宣平冦起避難橫山賊攻寨兵潰賊至欲脅以行潘不從抱子投崖而死省志周廷輝女松陽人年十八有姿色正統間避亂橫山冦至欲迫去不從即以刃按其頸女曰欲殺即殺决不志汝從遂被害省蔡儼妻包氏宣平人正統中鄉冦作亂包從舅姑避難東巖巖破包被執紿賊曰我冇金銀藏巖穴中當往取之賊以為然問至其所遂自投崖而死成化二年旌其門志省谷得與妻陳氏麗水人年二十景泰初鄉賊摽掠陳與鄰婦同避巖穴被執欲犯之陳憤罵不從賊脅以白刃罵愈厲遂遇害賊去鄉人斂其體葬於小嶺因名其嶺曰烈婦嶺省志陳驥妻王氏景寧人年二十一驥死生遺腹子名逹家貧甚日紡績事孤撫幼營葬其夫孀居三十九年成化初旌之省志林庭光妻蔡氏青田人二二十一庭光卒孤子始周歲戚戚勸其易志蔡斷髮自誓績紡事姑撫幼孀居六十年省志葉孔賔妻鄭氏青田人孔賔以父卒於官迎喪覆舟死鄭年二十三遺子十月矢心自守妾何氏年尤少鄭謂之曰我守夫家汝無子宜自擇也妾曰主母既以節守妾當奉承以全其節何以出為志相與同處年各八十餘時人謂之雙節省葉婦應氏處州人年十八夫從戍二十餘年信音不聞人傳其夫在戍所别娶生子父母令改適婦堅不從後夫終不返而應志終不志渝清白自持以死省潘榆妻毛氏景寧人年二十二夫死無子即誓不食他姓粟抱志獨居時有豪家以力脅其父而娶之毛謂父曰今不從父不免受其毒但女子失身辱及宗黨毒尤甚焉有死而已父不敢復言省志林叔資妻葉氏青田人年二十一而寡夫葬時泣拜墓前剔去一齒誓不再醮家貧事姑撫幼充盡其道年八十餘卒省志仙釋葉法善括蒼人世為道士嘗遊白馬山石室遇二仙人授以正一三五之法能厭劾怪鬼唐髙宗召詣京師欲寵以官不拜睿宗時拜鴻臚卿封越國公開元八年卒未一年棺開尸化吳善經唐縉雲人權德輿集有故太清宮三洞法師吳先生碑銘云先生族系於東吳築室於仙都而演道於明庭棲神於太清隱機於開元歸根於露仙其來適然具去寥然馬大仙冇廟在青田縣唐光化間馬氏女既嫁家貧養姑尤謹遇異人授以仙術往來傭織去家百里食冇羮不食即以箬笠浮還家薦於姑頃之復回人始知其不凡呼為馬大仙羊愔以明經授括蒼尉隱於括蒼山一日與青􅘟觀道士飲於阮客洞酒中忽仆地七日乃悟云初見一人自云雲英邀入洞中石間有物迸出曰此青靈芝也食之得仙愔取食之自是惟飲水覺身輕日行數百里後入委羽山人莫之見云杜光庭唐縉雲人咸通中進取不利入天台山學道應制為道門領袖僖宗時從幸興元後隱於青城山蜀王建封為廣城先生卒年八十五人以為尸解云章思亷壽昌人居壽光宫為道士誦度人經有悟遂默不語或絶粒不食踰四十年預言休咎多有驗范子珉處州道士嗜酒落魄談人意外事多竒中善畫牛往訪郡守錢竽曰負公畫四軸故來相償畫成儼然就逝將斂得片紙于席間書曰庚申日天帝詔范子珉蓋其亡日也三平和尚有真身塑像在麗水之大安院有破衲若蟬翼藕絲其徒寶之周南遂昌人號知常叟壯年放蕩遊四方謝棄鄉里學仙不成去學佛以易著名明一統志卷四十四
