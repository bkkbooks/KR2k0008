body:
  text: 明一統志卷四十四明李賢等撰處州府東至台州府仙居縣界一百一十里西至衢州府江山縣界一百六十五里南至溫州府瑞安縣界三百五十里北至金華府永康縣界一百二十里自府治至南京一千三百三十里至京師四千五百八十里糧六萬四千石零建置沿革禹貢揚州之域天文斗分野春秋戰國屬越秦為㑹稽郡地漢初為東甌國武帝時屬㑹稽郡三國吳兼屬臨海郡晉屬永嘉郡隋廢郡置處州治括蒼尋改括州大業初復為永嘉郡唐復立括州治麗水天寶初改縉雲郡大􅍓中復為處州宋屬兩浙東路元改為處州路本朝改為處州府領縣十麗水縣附郭本漢回浦縣地屬㑹稽郡東漢為章安縣地吳晋為松陽縣地屬臨海郡劉宋屬永嘉郡隋析置括蒼縣兼置處州尋改括州又改永嘉郡而括蒼常為治所唐大厯間改為麗水縣宋元仍舊本朝因之編户一百一十六里青田縣在府城東南一百五十里本隋括蒼縣地唐析置青田縣屬括州以縣有青田山故名後屬處州宋元仍舊本朝因之編户一百五十四里縉雲縣在府城東北八十里本括蒼及婺州之永康縣地唐析置縉雲縣以縣有縉雲山故名天寶初屬縉雲郡後屬處州宋元仍舊本朝因之編户一百五里松陽縣在府城西北一百三十里本東漢㑹稽郡章安縣南鄉地建安中立為松陽縣吳屬臨海郡東晉屬永嘉郡隋屬處州唐置松州尋廢以縣屬括州五代梁時改為長松縣晉天褔時改為白龍縣宋咸平初復為松陽縣元仍舊本朝因之編户一百九里遂昌縣在府城西北一百九十里本漢㑹稽郡太末縣地吳赤烏初分置平昌縣屬東陽郡晉改為遂昌縣隋屬處州唐省入松陽縣景雲初復置屬括州後屬處州宋元仍舊本朝因之編户七十八里龍泉縣在府城西南二百四十里本松陽遂昌二縣地唐析置龍泉縣屬處州宋改為劍川縣紹興初復為龍泉縣元仍舊本朝因之編户一百六十六里慶元縣在府城西南四百七十里本唐龍泉縣地宋置慶元縣治松源鄉因紀年為名屬處州元因之本朝洪武初省入龍泉縣十四年復置編户五十三里雲和縣在府城西一百一十里本麗水縣地本朝景泰三年析置雲和縣因鄉為名編户五十三里宣平縣在府城北一百二十里本麗水縣地景泰三年析置宣平縣編户四十五里景寧縣在府城南一百二十里本青田縣地景泰三年析置景寧縣編户五十六里郡名括蒼因山名縉雲唐名形勝湍流險阻元和郡縣志湍流險阻九十里間五十六瀨羣峰倚天宋楊億與章廷評書引領西目羣峯倚天清溪南奔淺深見底逈在霄漢楊億與李起居書郡齊逈在霄漢石蹬盤曲䇿馬征登嵐靄滴衣烟霞滿目風俗君子尚禮小人勤稼隋志東陽永嘉之俗頗同君子尚禮小人勤耕稼一年蠶四五熟故庸庶厚龎風俗澄清而道化隆洽躬儉嗇尚朴素圖經縉雲地瘠人貧加以繭絲之稅倍於他郡故躬儉嗇尚朴素安土重遷家習儒業同上獄訟甚稀楊億與章廷評書山川檡山在府城內西南唐李繁建孔子廟其上俗呼廟山相傳舊有大檡木故名梅山在檡山東南二山之麓士大夫多居焉錦山在府城內西北與交山相接多蒔桃若錦繡然小括山在府城西舊析治在其上相傳即左括蒼一名蓮城山山路屈曲名九盤路天王山在府城西二里其上有唐時天王像故名石僧山在府城西四里山腹有石狀如僧宋劉大中詩雲作袈裟石作身巗前獨立幾經春有人問我西來意默默無言總是真桃山在府城西五里山南彌望皆桃春月人多遊賞宋知州許尹有游桃山賦南明山在府城南七里有髙陽洞石崖上有宋米芾書南明山三字又有葛仙翁𨽻書靈崇二字山頂舊有千里亭盡得遠近之勝少微山在府城東七里郡應少微星故名山西南絶頂有眉巗峰下望之若眉然麗陽山在府城北一十里麗水縣以此得名上有龍潭石屋天井白雲山在府城北一十里髙與麗陽山等山頂有池山半有冷泉亭山麓有白雲亭皆有題咏巾子山在府城東南一十里其形如巾又慶元縣北十五里亦有巾子山石羊山在府城西南一十五里山有巖穴深數丈中有枯木狀如石羊寰宇記石羊山有蘭巖溪溪有一穴莫知深淺穴口有大樹仰視杳然博物志云千載木也石色如黛赭大梁山在府城南二十里登其巔俯瞰城郭盡在目前山有石洞洞口有石洞山神廟風門山在府城西三十里山有石穴深叵測風自此出每夜靜月朗白氣自山交紏上徹於天山椒舊有風門白氣二將軍廟三峯山在府城西五十里下曰靈峰中曰翠峰上曰岑峯俱有僧舍林巒秀麗為縣之冠連雲山在府城西南六十里上有僧寺昔刺史盧約奪民田三十餘項入於寺與僧約曰凡入山者無大小貴賤皆飯之將以植福於來世聞者笑之湧泉山在青田縣東二里上有湧泉四時不竭金田山在青田縣西北四里有石井龍湫石佛山在青田縣西五里有石髙可二丈其狀如佛相傳嘗因洪水失其首庵僧易以他石一夕見夢於漁人詰朝網得之以告僧補之凡禱有應石門山在青田縣西七十里兩峰壁立相對如門中有洞西南髙谷有瀑布自上潭直㵼至天壁三十餘丈自天壁飛灑至下潭四十餘丈有亭曰噴雪上有軒轅丘道書以為青田𤣥鸐洞天唐葉法善嘗居此又遂昌縣亦有石門山石樓山在青田縣西七十里與石門山近時有雲霧狀若樓觀又有石帆山亦在縣西小連雲山在青田縣西一百里其山常出雲有二洞東曰龍鬚南曰韓山禱雨多應南田山在青田縣南一百五十里上有稻田歲旱則大熟唐袁朝之亂邑人多於此避難萬松山在縉雲縣東五里山勢盤旋林巒森秀元朱仁翁詩洗耳聽潺湲歡然一破顔不因官獨冷豈識客心閒晚色凉天月秋容霽雨山憑髙成獨嘯聲答萬松間吏隱山在縉雲縣治東北一名窪尊山唐縣令李陽􅖅退居於此有臺曰忘歸多題咏篆刻為世所寶石壁有吏隱山三楷書宋詹逈詩李侯築崇臺吏隱於其間斯人不可見篆蝕蒼苔班小蓬萊山在縉雲縣東一十二里仙都山西潭水中上多怪石竒樹潭之南有石壁髙可數仞多有名公題詠刻於石遊者泛舟而入敻出塵外黃龍山在縉雲縣西北一十二里有池水清潔相傳昔有黃龍潛焉山之右有石如臺俗傳昔施史君拜臺上有跡如人拜狀小仙都山在縉雲縣南二十里數峯峭拔肖仙都山而小仙都山在縉雲縣東二十三里一名縉雲山又名丹峯山唐天寶七年因山有靈異改今名道書以為𤣥都祈福洞天相傳黃帝嘗登此山車轍猶存山巔有鼎湖相傳即黃帝上仙處多龍鬚草唐栁紳詩千尋雄鎮地萬仞上擎天成華詩軒轅示遺跡杳杳藏深幽丹成凌倒景鼎湖難久留初暘山在仙都山之西初入頗隘少進有石屋洞房虛敞可居以東向見日故名有唐李陽􅖅篆初暘山三字山左有東蒙巗其石低昂竒怪聚立於深潭之濵下有玉甑巖石突起如甑漦山在縉雲縣西北二十五里舊傳有龍遺漦於此瀑布山在縉雲縣北三十五里有飛泉灑落三百餘丈管溪官山在縉雲縣東七十里與台州接境薪竹之饒居民所賴又有龍潭三處溉田甚廣歲旱禱雨有應煉丹山在縉雲縣東北八十里上冇石釡俗呼黃帝煉丹釡青田縣亦有此山唐葉法善修煉處有大石形肖屋下有土坎云丹竈傍有大石四裂云砥石西屏山在松陽縣西二里百仞山在松陽縣西南五里有峯獨立髙二百餘丈旁無接連舊名獨山唐天寶中改今名上方山在松陽縣西七里梁毛雲龍煉丹於此宋沈晦詩天畔羣山一草亭半溪烟雨花溟溟老翁投老得此景日與溪山同醉醒橫山在松陽縣南一十里髙三百餘丈狀如陳雲射堋山在松陽縣東一十五里形類射堋卯山在松陽縣西三十里山下有泉冬夏不竭唐葉靜能及法善嘗修煉於此酉山在松陽縣與卯山相對亦葉法善往來之所大明山在松陽縣西三十五里相傳有仙人頭戴火炬故又名戴火仙山至今隱見不常長松山在松陽縣西四十里上有龍潭與龍頭山相近石罌山在松陽縣西四十五里山有圓石髙四丈狀如石罌馬鞍山在松陽縣西四十八里狀若馬鞍瑞山在遂昌縣治南昔有異人乘白虎至山創庵煉丹有紫雲之瑞丹成上升其丹竈雖圮時有瑞氣盤結於上曾山在遂昌縣西二十里一名西山又名文筆峰上有七級浮圖望之崒嵂君子山在遂昌縣南一十五里二山相近秀麗可挹故名大君子小君子山丁公山在遂昌縣西一十六里髙可十丈上有白石如馬禱求多應唐山在遂昌縣北一十八里有翠峯庵五代時僧貫所居庵北有淵廣五畞因虎跑出泉澄徹不竭號虎丘相傳有龍居之山北有二峯如卓筆相向嘗有羅漢見又名羅漢峰尹公山在遂昌縣東三十五里峯巒髙聳與百丈巖相連昔冇尹公煉丹於此九姑山在龍泉縣西北有龍首之象上有最髙亭得溪山之勝鳳凰山在龍泉縣西四里五代錢氏時有鶴衣道人日醉山下為里婦所尋噀紙為鶴乘之西去後人因建祠即今報恩光孝宫是也山陽有白雲巖桃花洞相傳昔冇漁人遇仙於此石馬山在龍泉縣北一十五里山頂石狀如馬騣尾宛然有洞穴數十每雲氣觸石而合則雨洞前有秀才峯九際山在龍泉縣南三十里有水分九潭龍常居之甚有靈異瀑水自巖頂飛懸如簾石笏山在龍泉縣西四十五里以形似名孝義山在龍泉縣西五十里山舊出銅相傳古有鄉民孝義者居此宋時有孝童盧猛者行跡甚著臺湖山在龍泉縣西南八十里相傳梁時邑人丘鼓採樵入山匆遇澄湖橘林杳非人間見二叟對奕及還已期年矣棋盤山在龍泉縣東一百里臨流壁立狀如削成相傳昔有仙人奕棊於此勳山在慶元縣西一十二里相傳上有仙橋仙車寶仗嘗往來於其間百丈山在慶元縣西二十里相傳五代時馬氏二女於此修道後倛飛升巖上有剪尺鏡臺𥚑帶遺跡山下有龍湫禱雨多應牛頭山在雲和縣狀如牛頭有水淵澄禱求屢應婁狗山在雲和縣西一十里上有石室石笋髙可一丈下有靈泉汲水禱雨多應大杉源山在雲和縣境有龍潭二處一曰大杉一曰狐梯宋紹興中歲旱麗水令劉凱之禱之有赤蛇自潭中出雨即應白馬山在宣平縣西五里有瀑布石室室中有巨石屹立擊之鏗然相傳葉法善嘗棲於此溫樣山在宣平縣西一十五里冇三峯中峯有唐葛周三將軍廟凡禱多應勑木山在景寧縣南一十里相傳山神嘗見夢以大木獻於朝因得名雞鳴峯在遂昌縣西四十里四山中立一峯嘗聞雞鳴牧人迹之絶頂獲一石紺青而潔持以歸後雞聲寂然蓮花峰在遂昌縣西四十五里秀異聳特狀類蓮花宋待制周綰居之號蓮峯居士馮公嶺在縉雲縣西二十里一名木合嶺宋楊億以比蜀之棧閣詩云征途㳂木合竹􅬃嶺在松陽縣北一十五里宋沈晦詩三月亂山中﨑嶇處處同溪流因雨漲木葉著霜紅人跡千巖絶松聲萬壑空尋幽自可問不復嘆途窮銀嶺在遂昌縣北六十里抵金華府境黃鶴嶺在龍泉縣北八十里隋唐間號龍泉為黃鶴鎮相傳冇仙人騎黃鶴往來其間三巖在府城西四里有飛泉㵼落其右曰清虛中曰白雲左曰晨曦宋紹聖中知州劉注題詩於石注能詩所至泉石多有題詠豅谼巖在府城東一十五里有石洞如屋可坐十餘人謝公巖在縉雲縣南一十里一名康樂巖劉宋謝靈運遊燕之地金石巖在遂昌縣北二十五里山尢峭絶其巔可屯萬馬出泉成池歲旱不竭大樓巖在遂昌縣西一百五十里有飛瀑春夏不絶冬凝結倒懸猶玉乳巖下為龍泓者三十有六東巖在宣平縣南六十里四靣斗絶惟有一徑捫蘿可上一名赤石樓巖下有清風峽桃花洞唐宋間亂邑人多於此避難冇西巖其髙亞於東巖鸕鷀巖在景寧縣西一百里有泉一泓飲可