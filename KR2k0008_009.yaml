宦唐蘇籥攝華亭令在縣簡惠蒞事公正時稱賢宰張聿華亭令治政凜然吏民畏服宋李夔華亭令有政聲生子綱後為相吳及知華亭縣有惠政蝗不入境水不害稼民思其政作亭於西湖之上曰思吳蘇軾作記姚舜明政和間知華亭縣撫摩其民無所不盡其敬嘗以元豐元符斷獄之制書而揭之獄劉鵬知華亭縣修明學校簿書期會各有條理在官未十旬教化大行邱崈孝宗時知華亭縣捍海堰廢且百年鹹潮嵗大入壞並海田崈至海口訪遺址已淪沒乃奏創築三月堰成舄鹵復為良田楊瑾知華亭縣施政有方上下信服境內稱治又建為平糴倉民甚便之秩滿鄉老泣涕送之且以二旗為餞題其上曰農人不會題詩句但稱一味好官人趙彥敔監青龍鎮稅建鎮學養士百里之間絃歌相聞兵部侍郎杜孝嚴以彥敔有官不顯有民不多而所知者本所務者大為文記之董楷提舉松江市舶分司上海鎮愛民養士海外馳名去官之日人攀留不捨黃震知華亭縣夜未明視事事至立決甚有治聲元張國英延祐間為華亭尹明敏於政時郡將恃世守陵虐有司欺害細民國英以法制裁之民藉以安羅璧以管軍總管鎮金山居四年海盜屏絶徙鎮上海督造海舟六十艘兩月而畢劉宣至元間知松江府威惠並著未幾同知浙西宣慰司事張之翰至元間知松江府文聲政績並著有古循吏風申杲至正間知松江府悉心愛民有循吏風從子秉禮相繼知府事值水旱能恤民隱民立碑頌德王艮江浙行省檢校官有詣中書訴訟松江富民包隱土田沙蕩為糧鈔甚多宜立官府糾察追收之遣艮驗視艮至松江條陳曲折以破其誑事遂寢劉克復至正間松江府推官平反寃獄甚衆時稱為神明張德昭至正間華亭縣尹廉明勤儉民懷其德立碑頌之魯淵至正間華亭縣丞動循禮法佐治公廉其學長於春秋郡之學春秋者多出其門吕謙以懷逺將軍鎮守上海統領軍民謙當春勸民召父老告曰善牧羊者先去敗羣善牧民者先除民害由是吏胥畏憚境內大治鄧巨川至正初華亭縣丞參綜有方嘗言縣之稅糧民艱於輸乞以豆麥代民被其德劉輝至正間上海縣尹明辨文雅恢然有牧馭才興學校平徭役敦禮義杜私謁民風遂變鄰縣亦刻石頌德何緝至正末上海縣尹亷公有威興學校勸農桑毁淫祀斥巫覡勸善懲惡民知所尚風俗丕變胡善至正間為松江府學訓導時苗賊陷松江欲燬孔子廟善罵賊遂被害初善聞賊至即以死節自誓題詩於壁曰領檄來司教臨危要致身果踐所言楊維禎為傳其事本朝馮榮華亭知縣賊陷華亭榮不屈被囚王師既復華亭主將以其民從亂欲屠之榮力爭曰民由迫脅必欲加兵榮請先死主將義其言從之民得免死祝挺洪武初上海知縣時海盜竊發挺效死禦之遂被執挺曰汝吾子吾汝父母汝何執我耶盜釋之挺乃密謀佐二召義民追獲渠魁斬之以獻賊平統兵者欲罪餘黨挺曰彼良民被逼耳若罪之寧罪我統兵從之民賴以全活胡儼洪武中為華亭縣學教諭經明行修勤於教育士及門者多造就後召入翰林蔣惠洪武間華亭知縣平寃獄毁淫祠去姦民及民之惠實多甄庸洪武末為松江知府端謹廉明後召為工部侍郎杜鎰洪武末為上海知縣守廉介尚節儉吏畏民憚黃子威永樂初為松江知府公勤清慎不惑憸邪甫三年事舉民安孫鼎宣德間松江府學教授以清慎持己以禮讓化人諸生咸信服之秩滿以選升南直𨽻提學御史劉惠掌金山衛事三十年清心勵行一衛化之知廉恥之足尚畿志章增正統中知華亭為政知大體廉謹和緩禮賢惠民及卒民追思之畿志葉冕景泰中知松江府鋤強植弱民畏而服之時連嵗飢饉冕悉力賑救賴以全活者甚衆畿志寧祥景泰中知松江府清謹愛民嘗董浚浦淮塘建盤龍塘諸橋嵗旱奏免兩邑稅糧十九萬民深德之畿志趙正景泰間為上海教諭終日坐堂上講授夜則振鐸以警惰者及門之士既仕而休猶念之不置畿志俞欽天順中同知松江府廉慎慈惠不為煩苛嘗受委董學校理戎伍士勸民懷歌頌盈耳召去行李蕭然畿志李紋知上海縣剛毅練達剖決若流日訪民疾苦而得其貧富實狀故徭役令下皆若家至而户厯者輿論翕然稱平畿志王衡成化中松江知府清介公廉人不敢干以私嚚訟衰息囹圄數空民轉運苦於漕軍衡疏其弊得免畿志于準成化中松江府同知為政本仁恕先教化而後刑罰開益瀆河不笞一人而事就城中失火勢烈甚準衣冠向火再拜火隨息蓋一誠也畿志何瀞成化癸巳松江府推官明允清慎門無私謁知府王衡贈詩有關門共惜寒儒苦斷獄爭誇老吏明之句拜監察御史志畿郭綸成化中知華亭縣未明起視事速暮始休雖盛暑必衣冠終日無怠縣庭肅然綸持法甚嚴而未嘗輕入人以罪民故思之畿志汪宣成化中知華亭縣通練明察庭無留事興學校禮師儒奬勵人才多所造就畿志流寓鄭聞開封人寓居華亭與錢良臣同遊縣庠宋紹興間魁南省與良臣並參大政趙孟僩黃巖人宋宗室嘗遊廬陵歐陽守道劉辰翁之門文天祥開浙西閫以從事辟之階行僅五十日而大事已去孟僩遂隱為道士又為僧因自號三教遺逸子孫遂家華亭所著有湖山汗漫集陳宏莆田人宋末徙居華亭以儒業起家邃於易嘗著易象發揮易益通言童子問楊維禎會稽人元末寓居華亭維禎淹貫經傳詩文雄富仕至江西儒學提舉所著有春秋透天關宋遼金三史正統辨史鉞史義拾遺麗則遺音古樂府陶宗儀天台人元末隱居華亭負經世之學與人言若訥遇事輒極論不少借所著有四書備遺説郛輟耕録書史會要廣薈菆等集李象賢台州人徙籍華亭明春秋贍文詞洪武初舉任本府儒學訓導子至剛博學能文亦舉明經纍官禮部尚書兼左春坊大學士預修永樂大典出知興化府卒於官趙友同金華人父以德博學邃醫遊吳中友同從之遂占籍華亭嘗從宋濂遊攻古文辭尤精於醫膺薦授華亭訓導後升太醫院御醫預修永樂大典等書為副總裁錢惟善錢塘人寓居華亭詩極精緻過璘本平湖人父䚮始家華亭璘舉進士纍官江西按察司副使致仕為人闥朗方直遇事不避利害畿志人物漢陸康吳郡人少以義烈稱舉茂才除髙城合厯武陵廬州太守以恩信為治申明賞罰所在稱之三國陸績康少子年六嵗於九江見袁術術出橘績懷遺母既長博學多識吳孫權辟為奏曹掾以直道見憚出為鬱林太守雖有軍事著述不廢作渾天圗注易釋玄傳於世陸遜康從孫始任幕府厯東西曹令史吕蒙謂吳主權曰陸遜意思深長才堪負重終可大任權乃召拜偏將軍右都督代蒙屯陸口以功封華亭侯進封婁侯黃武初破蜀漢兵於夷陵尋為相陸瑁遜弟好學篤義仕吳拜議郎選曹尚書孫權欲親伐公孫淵瑁諫止之子喜仕吳纍官吏部尚書少好學有才思嘗作言道等書及西州清論陸凱遜族子吳黃武初為永興諸暨長所在有治績拜建武都尉雖統軍衆手不釋書寶鼎初為相乃心公家表疏皆指事不飾忠懇內發陸抗遜子仕吳拜奮威將軍都督信陵西陵夷道樂鄉公安諸軍事晉羊祜率師向江陵抗使輕兵躡之祜引軍還抗無矜色故得士心後拜大司馬荆州牧臨終上疏以西方為屬史稱其貞亮籌幹咸有父風陸監華亭人少時隱靜方直抗烈仕吳除後將軍司馬以功封西陽亭侯晉陸褘凱豫仕晉行左丞相鎮西大將軍事華核嘗表薦褘曰褘體質木剛器幹強固董率之才魯肅不過在戎果毅臨財有節陸機抗子少有異才文章冠世伏膺儒術非禮不動領父兵為牙門將成都王穎攻長沙王又假機後將軍河北大都督為孟玖等所譛穎密使孫秀收機機與穎箋詞甚悽惋既而嘆曰華亭鶴唳可復聞乎遂遇害所著文凡三百餘篇陸雲機弟六嵗能屬文與機齊名雖清新不及機而持論過之號曰二陸尚書閔鴻見而竒之曰此兒若非龍駒當是鳳雛後成都王穎表雲為清河內史轉大將軍右司馬因機敗亦遇害陸曄瑁孫少有雅望從兄機每稱之元帝辟為祭酒遷太子詹事以清直著稱拜侍中纍官至光祿大夫弟玩器量淹雅蘇峻平以功封興平伯纍授左光祿大夫開府儀同三司加散騎常侍南北朝顧野王吳郡人父烜信威臨賀王記室以儒術知名野王精記博識天文地理無不該通仕陳領著作掌史事後為黃門侍郎光祿卿卒有玉篇及輿地志國史記傳文集等書宋朱諤華亭人初名紱進士第二徽宗時纍官御史中丞嘗奏願開內閻延羣臣從容論道如神宗故事又請分命使者刺舉諸道有受令而不行及行令而不盡者論其罪則令出而朝廷尊矣厯禮兵吏三部尚書拜右丞居位三月卒諡忠靖弟紘崇寧初進士栁約華亭人性至孝深於經學大觀中上舍進士為霸州教授靖康初為殿中侍御史論三鎮不可棄後以直龍圗閣知嚴州兼浙西兵馬都監時金人大入列郡震恐約屹保孤城境內按堵髙宗嘉其忠後擢試户部侍郎且將大用當路忌其盡言誣以事罷之卒贈四官衛膚敏華亭人以上舍登宣和初進士纍官校書郎假給事中使金時金人將舉兵大入膚敏論難往復殊不為屈髙宗時拜右諫議大夫后父邢煥除徽猷侍制太后兄子孟忠厚除顯謨閣直學士膚敏言非祖宗法皆改職勸帝早幸金陵因陳守長江之䇿帝善其言除刑部侍郎潘緯華亭人紹興中舉進士甲科恬於進取工著述嘗音注栁文錢良臣華亭人幼志於學年十九升太學紹興中舉進士纍官至參知政事德望甚著嘗一新郡學舊祠於西廡許克昌華亭人紹興末舉進士名在第一以有官政第二纍官右正言時松江新涇堰閘為海水延入蘇湖境上為民患克昌請於朝移堰入運港以避潮勢由是三郡之田得免醎潮浸灌之患胡林卿華亭人淳熙中進士甲科與史彌逺同年史既柄國勢焰薰灼終身不登其門後卒有挽詩云有名登相甲無迹到權門子琚嘉定中進士學識該博有靜菴詩集田疇華亭人號與齋嘉定間嘗設講席於國學六館之士皆托北面焉所著有學易蹊徑四書説約林至華亭人淳熙中上舍釋褐魁厯官至祕書嘗登朱文公之門所著冇文集子革嘉定中進士衛謙華亭人嘗立義莊以贍貧建義孰以教學者所著有易管見髙子鳳華亭人嘗注杜詩所著詩文有淡庵集王泰來華亭人性剛介不為柔從蚤以詩名寶祐開慶間元至元間召至京世祖與語持正不回欲授以官懇辭乞歸所著有詩集元夏侯尚元華亭人好著述仕為東宫伴讀明宗之變去官入海都郯王聞其賢待以上賓已而王被誣誅尚元力陳王之忠孝數事既得白翩然南歸不復仕揭徯斯為傳其事周之翰華亭人博究羣書通象數之學其著述有乾坤闔闢天地生成隂陽變化山川流峙四圗并贊以發明其蘊奧講授於鄉以夀終費㮤上海人仕為管領海船萬户浙東道宣慰使卒贈鎮國上將軍封江夏郡公諡榮敏子拱辰平江等處運糧萬户孫雄以蔭為宣城尹夏椿華亭人大德間大飢死者相跲藉貧者皆攜老幼歸之椿闢廬舍具饘粥以食之去則贐之病者藥之死者葬之有司上其事表其門官其子任仁發上海人年十八中鄉試仕為都水監自黃河江浙及吳淞江淤塞皆隨處疏而通之官至浙東道宣慰副使所著有水利書十卷本朝錢全􅻖華亭人通涉書史元末張氏據吳誓不為其用杜門著書有韻府羣玉掇遺續松江府志陳文東華亭人穎悟好學能詩文尤善篆𨽻真草洪武間以秀才舉任山西解州判官調湖廣栁州卒於任至今郡人學書者多宗之全思誠華亭人博學能文洪武初以老儒召為文華殿大學士兼左春坊中允敕賜致仕王公亮華亭人世業儒早失怙恃自幼勤學尤善楷書舉任吏科給事中尋升應天府丞官至廣東布政使能聲著間任勉華亭人洪武中舉進士知鄱陽縣甚得民心後升福建參政寬猛得宜吏氏畏眼王鍾華亭人仕為紀善永樂和侍東宫居守北京甚見親重官至户部右恃郎鍾端厚沈靜從容詳雅臨事無留滯僚吏咸眼其能何廣上海人洪武中舉明經任知縣升江西僉事再升湖廣參議在邑則有患政稱循吏在風憲有激揚名在藩垣得方嶽體嘗著律解辨疑沈度華亭人父易性至孝明易授徒於家宦達者多出其門嘗著五倫詩孝經旁訓度善篆𨽻真行書纍官翰林學士弟粲亦善真草書飄逸適徑自成一家初授翰林修撰纍官大理少卿永樂中特賜兄弟二品袍笏以寵異之石璞華亭人由永樂中舉人任四川按察使剖決如流吏民畏服得憲臣體陳禎華亭人讀書好禮喜怒不形洪武中為禮部主事有能聲嘗攝部事纍官河南參政子詢永樂中進士剛直有氣節厯官翰林侍讀學士大理太常少卿終國子祭酒夏宗文華亭人善𨽻真草書名重於時以才學起至京師纂修永樂大典及勸善書授廣平縣主簿有惠及民沒於官以子貴贈中大夫太僕寺卿衛青華亭人永樂間為山東都指揮僉事備倭海上時蒲臺妖婦唐賽兒作亂圍安邱青率千騎晝夜兼行到城下奮擊賊衆而收其孥賊遂平事間升為都指揮使朱孔易華亭人永樂中中書舍人升順天府丞筆力道徑得書法之妙朝廷凡有題額多出其手陳篔上海人宣德間進士拜監察御史風采凜然論事斷獄雖權貴莫敢屈纍官山東左參政致仕居官四十年清謹如一日畿志張鎣華亭人正統戊辰進士拜監察御史纍官南京兵部尚書參贊機務更事三朝凡所設施皆有成績卒贈榮祿大夫太子太保諡莊懿畿志夏寅華亭人正統戊辰進士纍官山東右市政使嘗督學江西士服其教參政浙省賊化為良他學行皆有可稱云畿志唐珣華亭人天順丁丑進士知合州興學勸農盜賊解散後知福州發姦擲伏如神纍官右副都御史巡撫兩廣南蠻弗靖直檮嵒穴斬首萬計卒於官畿志張恱華亭人舉進士厯刑部主事員外郎奉職守法以不欺為本恱嘗督學浙江去糊名校士曰我且自疑人誰信請託覬覦無敢干者成化中以按察使入覲時尚銘在東厰任事衆皆及其門恱獨不往銘銜之伺察無所得纍官南京兵部尚書卒贈太子太保諡莊簡畿志張弼華亭人舉進士任兵部主事員外郎出知南安府有善政大抵風度髙曠非簿書俗吏遂謝病歸畿志孫衍華亭人成化戊戌進士厯官延平知府清介自持吏民不威而治治郡為八閩之首畿志顧清華亭人𢎞治癸丑進士改庶吉士授編修同館毛澄汪俊羅欽順相與砥礪氣節涵養德器人謂館局得人清自學士擢少詹事遷禮部侍郎沈默簡靜一洗吳淞佻薄之習嘗被誣致仕不復與辨廷臣直之起南京禮部侍郎卒畿志李希顔華亭人𢎞治癸丑魁禮闈授南京刑部主事擢廣東按察僉事時逆瑾勢傾中外希顔奉表詣闕不踵其門京師稱為鐵腰李遷雲南提學副使振作士氣滇人德之進本司按察使詞訟煩劇剖決如流以疾卒畿志曹閔上海人舉進士授沙縣知縣任滿民號泣攀留纍日不得去至鄰邑民亦爭為留之為南臺御史正德初上疏極論宦官竊弄下錦衣獄被杖幾不生瑾誅復官年未五十即引退養母十年母終枕塊得寒疾卒畿志列女王子溫妻華亭人姓諸氏子溫家貧諸以女紅給其服膳略無慍色元丙申兵劫松江子溫欲挈以逃雖諸流涕曰豈可以我一婦人致纍汝耶汝第去我自為計乃與鄰嫗避於襄南城陋室中少頃賊入鄰嫗皆為所汙獨諸怒罵不從賊掣刃剖其腹罵不絶口而死費元琇上海名家女歸廣陵朱氏元至正間從宦江隂盜起因歸寧避亂邑陷苗軍露刃欲私之元琇罵不已苗怒刳之妹元徽有女德歸華亭陶氏年三十喪夫誓死不嫁時號雙節沈景新母妻平江人元至正中景新調上海吏江浙苗軍大肆殺掠母與婦謀曰吾家素清白義不受辱項為苗軍所擒曰爾能從吾不殺汝婦姑大罵苖軍怒刃其姑縛婦髮馬尾曳殺之任仕中婦上海人姓俞氏年二十一寡居有女始二嵗男始五月誓不二天撫教男女女既笄適俞邦用邦用亦早喪親戚勸再適女曰再嫁則俞氏祭祀誰奉且辱吾母乃歸與母同居守志本朝洪武中旌為雙節之門張文通婦上海人姓俞氏永樂初文通嬰瘵疾藥不能療囑俞曰吾將死汝年少無子宜善事後人俞泣曰父命以妾事夫夫今死矣又無子女將何從也願從夫於地下文通沒是夕俞亦自經鄧林婦上海人姓湯氏通孝經列女傳歸林未久而寡鄧族利其居址迫使改節婦曰我生死鄧家耳乃盡其資以還鄧族躬織絍以自給年九十三卒畿志蔡倫婦上海人姓唐氏夫亡守志育二子式堅以成式娶侯氏亦蚤卒姑婦並以節著成化中旌表畿志張氏三節婦璿妻胡氏璣妻瞿氏珩妻楊氏俱夫亡守節成化中旌三節之門胡氏又以子貴受封焉畿志趙氏女北京人幼有令質刑部尚書張鎣為次子昱聘之未婚而昱卒父母將嫁之女曰我聘於張又誰適乎姑衛夫人迎以歸守志終其身𢎞治壬戌旌其門畿志錢岐妻宋氏華亭人夫卒棄其二女自縊家人救之得不死遂屏食卒年二十五有司以聞詔旌其門貞烈畿志仙釋王可交華亭人業耕釣一日棹舟入江忽見中流有彩舫載七道士逺聞有呼可交名者頃之舟近舫側呼可交登舫一道曰好骨相合為仙一道與之二栗食之甘如飴命黃衣送上岸覔所乘舟不得乃在天台山瀑布寺前僧迎問之可交曰今早離家蓋三月三日僧言九月九日已半年餘矣後絶穀住四明山不出心鑑華亭人俗姓朱母生時有異香稍長出家詣嵩嶽受具戒唐大中間居洛陽長夀寺尋歸姑蘇再住明州棲心寺所在禪者雲集咸通中示寂葬天童山賜號心鑑塔曰夀相船子和尚名德誠入藥山洪道禪師室大明宗旨常乘小舟往來松江朱涇以輪釣度日人號船子和尚忽一日覆舟而逝唐咸通中僧藏暉即其覆舟處建寺曽有詩曰千尺絲綸直下垂一波才動萬波隨淨真華亭人宋嘉定間為興聖寺僧有道行嘉熙三年浙江錢塘江坍具偈呈安撫趙端明曰海沸江河水接連民居衝蕩亦憂煎投身直入龍宫去要止驚濤浪迫天遂投於海三日而返謂衆曰我在龍宫説法龍神聽受此塘不復崩矣語訖復入於海安撫上其事敕賜護國真法師德聰姓仰氏初受具戒於梵天寺參諸方密契心印宋太平興國中結廬山之東峯有二虎大青小青為侍挂一書梁間見者問之曰此佛經也問嘗讀否曰既知其義何再讀其他問者皆默然不對天禧初趺坐而逝閲月容貌如生海月名慧辨華亭傅氏子生時有異父母令出家入普照寺得法明智遂領寺事遷至杭州都僧正蘇軾倅杭甚髙其行一日合掌坐曰遺言須東坡至方合龕四日軾至見其趺坐如生項尚溫遂以詩哭之云生死猶如臂屈伸情鍾我輩一酸辛樂天不是蓬萊客憑仗西方作主人覺慶四明人自幼窮究妙典於二十嵗棄俗出家投禮梅峯和尚深入悟門元至元初至雲間陳源家端坐而化越三日送至茶毗之處忽遍體汗下源再請回家是夜紅光貫天停龕十日顔貌如生鬚髮自長四方瞻禮者無不嘆異後源改創所居為蘭若漆其肉身祠之以香水救人疾苦纍獲靈驗明一統志卷九
