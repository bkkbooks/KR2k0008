body:
  text: 明一統志卷九明李賢等撰松江府東至海岸一百里西至蘇州府長洲縣界六十里南至海岸七十里北至蘇州府崑山縣界八十里自府治至南京八百里至京師三千八百三十五里糧九十五萬九千石零建置沿革禹貢揚州之域天文斗分野周為吳地吳滅入越越滅入楚秦為婁縣地屬會稽郡漢因之東漢及魏晉皆屬吳郡隋省唐始置華亭縣屬蘇州五代晉時屬秀州宋改秀州為嘉興府而華亭仍為屬邑元升縣為華亭府𨽻嘉興路尋改為松江府以府北有松江故名本朝因之直𨽻京師領縣三華亭縣附郭秦漢為婁縣地漢末孫吳封陸遜為華亭侯華亭之名始見唐為崑山嘉興海鹽三縣地天寶間割置華亭縣宋元仍舊本朝因之編户八百一十一里上海縣在府城東北九十里本華亭縣地居海之上洋舊曰華亭海宋時啇販積聚名上海市元至元中置上海縣本朝因之編户六百四十九里青浦縣即青龍鎮隆慶六年户部題準建為縣治分割華亭三保上海二十保編户一百九十五里郡名雲間因晉陸雲有雲間陸士龍之語而名形勝負海枕江平疇沃野宋魏了翁學記佩帶江湖南瀕大海宋唐詢華亭十詠詩序府稱澤國以九峯勝舊志瀕海重地元史沙全傳風俗士奮於學民興於仁魏了翁學記風俗淳秀舊志民素誘於漁鹽之利題名記人性柔慧習俗奢靡宋史地理志山川機山在府城西北二十里因郡人陸機得名山下有村曰平原亦以機為平原內更故也凌嵒詩六峯喬木鎖雲根青接平原數里村此處無人來聽鶴海靈山鬼哭黃昏鳳凰山在府城北二十三里華亭有九峯為邑之勝此其一也宋凌嵒詩一峯雲氣接蓬萊白石磷磷護碧苔幾向鳯凰池上望不知何日鳳凰來橫雲山在府城西北二十三里一名橫山或云因陸機弟雲易今名山頂有白雲洞凌嵒詩七峯􅍶崒擁層巒偃蓋孤松石上蟠行雨白龍何處去暮雲深鎖洞門寒陸寶山在府城北二十五里本陸家山宋許尚詩祕寶封堅石山靈謹護藏欲為中帑助時復露輝光凌嵒亦有詩佘山在府城北二十五里舊傳有姓佘者養道於此因名山之東有昭慶寺許尚詩人與室俱化隂森松竹寒時時見孤鶴疑此守神丹凌嵒詩三峯髙逺翠光濃右列仙宫左梵宫細林山在府城西北二十五里舊名神山唐天寶間改今名凌嵒詩四峯孤聳鬱蒼蒼新構僧廬傍野塘林下雨晴春晝暖松花薰得白雲香薛山在府城北與佘山對峙昔有薛道約者居此因名今名玉屏山凌嵒詩五峯遙隔水村西薛老曽來隱翠微牧子唱歌樵子笛貪看明月夜忘歸崑山在府城西北二十五里陸氏之先葬此後生機雲時人比之崑山出玉因以名山宋唐詢詩昔有人如玉兹山得美名巖扄鎖積翠谷水斷餘聲喬木今無在髙臺久已傾如何嵩嶽什獨詠甫侯生干山在府城北二十九里舊傳吳干將鑄劒於此因名又名天馬山山南舊有圓智寺凌嵒詩八峯蔥蒨石林幽給事題詩記勝遊煙寺僧歸鐘鼓靜一聲鶴唳海天秋簳山在府城北四十里舊以土宜竹箭而名下有駱駝墩干將試劎石又有玉竇泉雨華洞山形雖小而遊覽者衆小橫山在橫雲山東由絶頂至東北皆峯巒隱起壁立數仞下瞰小溪亦竒絶處澱山在府城西北六十里澱湖中其形四面如鼇上有浮圗下有龍洞屹立湖傍有小山寺僧立亭其上曰明極許尚詩殿閣輝金碧遐觀足畫圗維舟一登覽誤涉小方壺秦山在府城東南近海又名秦望俗傳始皇曽登此望海柘山在府城南六十五里俗呼小澱山旁有一石其狀如牛金山在府城東南九十里海中吳地記云有平坡可容二十人坐山北有寒穴出甘泉浮山在府城東南一百里海中達岸山在府城東南一百六十里海中白龍洞在橫雲山頂相傳下流澱湖每風雨夜有龍出入洞中許尚詩呼吸湖中水山椒寄此身洞門風雨夜電火逐霜鱗按朱之純集皇祐中吳及宰華亭浙西旱蝗及禱橫山之神致甘雨蝗不入境鶴坡在府城東七十里此地出鶴俗謂之鶴窠許尚詩索寞東郊逺仙禽盡此藏夢回明月夜林杪響圎吭華亭谷在崑山之西谷有水縈繞百餘里乃長泖之異名出鱸魚蓴菜晉陸機詩髣佛谷水陽婉孌崑山隂寰宇記華亭谷水下通松江綾錦墩在府城東一十里元錢慶餘種桑之所慶餘嘗於此修郡志并韻書海在府城東南一百里有司春秋致祭滬瀆江在府城西北六十里松江東㵼海而靈怪者曰滬瀆廣韻滬水名白虎通發源而注海曰瀆瀆上有壘晉虞潭袁嵩防海處傍有蘆浦俗呼為蘆子城唐皮日休詩全吳臨滄溟百里到滬瀆青龍江在府城北七十里上接松江下通滬瀆吳孫權造青龍戰艦於此故名松江在府城北七十二里一名吳淞江源出太湖口東注於海書曰三江既入震澤砥定此其一也錡湖在府城西北三十五里有陸錡宅故名一名洋湖柘湖在府城南七十里湖中有小山生柘樹因名秦時有女子入湖為神今湖已堙為蘆葦之場為湖者無幾矣唐詢詩世厯亡秦逺湖連大海瀕柘山標觀望玉女見威神澱湖在府城西七十二里古鍾水之地受三泖及西南諸港水自大盈趙屯二浦以㵼於松江元戴表元詩雪融湖蕩白春動海山青黃浦在府城東南一十八里其水自杭州嘉興經華亭西南入浦又東北流至上海縣入於海湍流悍急舟楫必趁潮汐往還並浦兩縣之田胥資灌溉元張之翰詩黃浦春風正怒號扁舟一葉渡驚濤諸君來問民間苦何用潮頭幾丈髙范家浦在黃浦東北舊名范家濱本朝洪武間濱因吳淞江淤塞潮汐不通郡人葉宗行上言疏浚接黃浦入海因改曰浦顧會浦在府城西北接青龍江達於松江今通波塘是大盈浦在府城西北七十里南接澱湖北經白鶴匯達於松江宋王安石詩徒嗟大盈北浩浩無春秋龍盤浦一名盤龍匯自上海縣西北達於江每嵗大雨泛溢為民病宋乾興間范仲淹守平江嘗經度之寶元間葉清臣按嘉興路建議為新渠其患遂弭周浦在上海縣東南三十六里宋末有詩人儲泳居其上下沙浦在上海縣東南五十里一名鶴沙宋宣城吳濳侍父下沙鹽場讀書後魁多士為開慶名相三􅍩在府城西南三十六里廣韻泖華亭水也晉陸機對武帝三􅍩冬溫夏涼圖經􅍩有上中下之名而舊縣圗又以近山涇圎者曰圎􅍩近􅍩橋闊者曰大􅍩自􅍩而上縈繞百餘里者曰長􅍩五色泉在府城內西南相傳葛元煉丹於此丹成投水中至今常湧泉成五色郡人士見者必擢髙第寒穴泉在金小山居海中鹹水浸灌泉出山頂味獨甘冽朝夕流注不竭王安石華亭十詠詩神泉冽冰霜髙穴與雲平空山渟千秋不出嗚咽聲山風吹耎寒山月相與清北客不到此如何洗煩酲湧泉在上海縣靜安寺泉湧如沸上有亭養魚池在府治西南隅一名瑁湖或云吳陸瑁所居有宅址尚存許尚詩誰得陶朱術修治一水寬皇恩浹魚鱉不復敢垂竿今為城壕天光雲影池在上海縣儒學西八角井在陸機宅傍許尚詩浚極疑無底鋒稜定有因沈沈中夜月照影屬何人羅漢井在府城南禪寺前宋崇寧間僧鑿井得羅漢像因名泉甚甘冽瑞光井在超果寺嘗有光如虹貫井中又嘗有金鰻之異郡人嬰疾者多汲水飲之鹽鐵塘在府城東南長三十里世傳吳越王時於此運鹽鐵故名白牛塘在府城西南五十里風涇地界嘉興宋陳舜俞知山隂不奉行青苗法上疏自劾歸居於此自號白牛居士捍海塘在府城西南抵嘉興海鹽縣界東北抵吳淞江長三百三十里唳鶴灘在養魚池傍晉陸機曰華亭鶴唳可復聞乎許尚詩養鶴人何在湖邊水尚清陸鵬詩眼前風景無人管時有漁舟泊栁邊釣灘在府城南三十里朱涇唐船子和尚垂綸於此故名石筍灘在上海縣東南下砂捍海塘外灘抵海三十餘里沙中有石如筍故名御史涇在府東南二里一名馭駟涇許尚詩疏鑿人何在流功幾世餘農民誦名氏不數鄭公渠將軍堰在府城東北三十五里晉左將軍袁嵩因以為名土産鹽絨毯藥班布三梭布鱸魚出松江者獨四腮隋煬帝謂金齏玉膾東南佳味石首魚在南海頭中有小石故名石首魚腹中膘可作膠鱠殘魚博物志吳王闔閭江行食鱠有餘因棄中流化而為魚唐皮日休詩隱憑船舷無一事分明數得鱠殘魚鶴宋沈括云鶴惟華亭之鶴窠村所出為得地他雖有凡格也公署金山衛在府城東南七十二里本朝洪武二十年建松江守禦中千户所在府治東南洪武三十年建青村守禦中前千户所在府城東八十里南匯觜守禦中後千户所在上海縣東南六十里俱洪武二十年建𨽻金山衛學校松江府學在府治東南舊為華亭縣學宋魏了翁記元至元間改為府學本朝重建華亭縣學在縣治西南舊為邑人徐進義孰本朝洪武二年改縣學正統四年重修上海縣學在縣治東舊為上海鎮學元至元末改為縣學青浦縣學在縣治東南隆慶六年建金山衛學在衛東北隅正統七年建書院孔宅書院在府城北七十里舊有孔子廟在慧日院側宋淳熙間院僧浚渠得寶玉璧三環三簮一藏之郡學尚存蓋孔子三十四代孫禎宦遊至吳因立家廟葬衣冠於此寶蓋墓中物也元至正間里人章弼建書院以貯鄉俊秀之來學者九峯書院在府治西北宋邑士衛謙建按華亭趙驥建議書院云華亭尉廳舊有折桂閣宋右文殿修撰李夔為尉時生子綱於此後綱為相因呼相公閣世代綿逺廳與閣俱廢而生賢之地愈久愈光江流之清海涵之大與夫九峯三泖之英粹鍾而生趙宋中興第一之賢相其地豈不偉歟是宜建書院并以祠之西湖書院在瑁湖泳波亭舊址元郡守張之翰建清忠書院在上海縣元至正間邑人張元澤建取宋仁宗賜其祖得象清忠二字之名邵氏義孰在華亭縣西南六十里胥浦之上元末邑人邵天驥建贍以胥浦風涇仙山三鄉之田二百餘畝禮名士主其席聚里之俊秀而教育之宫室來青樓覽暉樓俱在青龍江上元都水監仕仁發建楊維禎二樓詩大江如龍入海口青山似鳳來雲間棲雲樓在淨行寺元建楊維禎記一覽樓在超果寺本朝戶部尚書夏原吉登樓詩有云金鰻不起泉光暗青虎長眠墓草寒折桂閣在華亭縣治宋建詳見書院尊經閣在府學後正統間因舊重建草堂在圓智寺後晉陸機讀書處宋沈遼詩海天寥寥禾黍秋人籟已息煙霧收數聲鶴唳草堂靜何苦更向咸陽遊思堂在華亭縣丞廳盡心堂在府治西宋乾道間建取禮記一成而不可變故君子盡心焉之義而名清節堂在上海縣治內宋咸淳間董楷提舉松江市舶時建人服其廉故名貢舉堂在府學南舊有魁星樓樓廢而建堂元張之翰記本朝正統間重修承宣堂在府治中元元貞間建唳鶴亭在府城西三里今為接官亭唐胡曽詩陸機西沒洛陽城吳國春風草又青惆悵月中千嵗鶴夜深猶自唳華亭泳波亭在養魚池宋嘉祐間太常丞吳及宰華亭時建後令劉鵬增大之因民所譽榜曰思吳醉眠亭在青龍江宋僧行中建蘇軾名陳舜俞詩酒擔長輕六印腰醉中一枕敵千朝興亡藐比榮枯栁聚散看同旦暮湖醉法本應塵外有醒魂徒向水邊招已聞佳士過從約不似東風返去橈濯纓亭在府治南宋紹興間建半雲亭在淨竹寺元僧印正詩一片青山雲占斷老僧米與雲相伴白雲懼喜兩平分僧一丰兮雲一半詠歸亭在府學後正統間建升仙臺在上海縣西北七十里即王可交升仙處講經臺在靜安寺宋嘉定間僧仲依嘗築土臺趺坐講習元楊瑀詩華表不歸干載鶴至今遺迹鎖空山錢嶽詩江月夜搖金篆冷天風時送寶花來月榭在府治側宋許尚詩簷角御牆固明疏護翠羅公餘秉談麈竟夕對金波雲間館舊志華亭有此館晉陸雲字士龍與荀隱字鳴鶴未嘗相識一日會張華坐上華曰今日相遇可勿為常談雲因抗手曰雲間陸