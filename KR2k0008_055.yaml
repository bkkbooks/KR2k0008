body:
  text: 明一統志卷五十五明李賢等撰臨江府東至南昌府豐城縣界八十里西至袁州府分宜縣界七十里南至吉安府吉水縣界一百六十里北至瑞州府髙安縣界三十里自府治至南京一千七百九十里至京師五千二百三十五里糧二十三萬石零建置沿革禹貢揚州之域天文斗分野春秋時屬吳後屬越戰國屬楚秦為九江郡地漢初屬淮南郡後屬豫章郡三國吳為豫章安成巴丘三郡地隋屬洪吉袁三州唐因之宋淳化間以清江縣置臨江軍𨽻江南西路元改置臨江路本朝改臨江府領縣三清江縣附郭本漢建城縣地屬豫章郡隋初屬洪州唐改建城曰髙安縣而以境內蕭灘為鎮南唐升鎮為清江縣初屬洪州後屬筠州宋為臨江軍治所元仍舊本朝因之編户二百七十里新淦縣在府南七十里本秦舊縣因淦水為名屬九江郡漢屬豫章郡為南部都尉治所吳分置巴丘縣屬廬陵郡隋省巴丘入新淦屬吉州唐為虔吉五州巡撫使治所五代時楊吳為都制置使治所宋初屬吉州淳化中改屬臨江軍元升縣為州本朝復為縣編户一百二十七里新喻縣在府西一百二十里本漢豫章郡宜春縣地吳析置新喻縣屬安成郡本因渝水為名後聲變為新喻隋初省入吳平縣尋復置屬袁州唐初析置州尋廢元復升為州本朝仍為縣編户二百七十里峽江縣在府南百二十里編户百七十六里郡名臨江宋名形勝當四會之衝南唐吳鸞建清江縣議當南粵虔吉舟車四會之衝閣皂玉笥為鎮山圖經北有蒙山南臨渝水新喻志碧嶂清江宋羅知古詩層層碧嶂來無盡衮衮清江逺莫追風俗君子善居室小人勤耕稼隋志君子尚禮而崇德小人勤力而知分臨江志山川章山在府治西偏舊名富壽岡宋宣和中太守汪師心修郡圃得碑于池中始知此山舊名富壽岡瑞筠山在府治南本唐歐陽處士宅有瑞竹色如銀故名龍岡山在府西南一十里有赤土如環者二相去數丈舊傳為龍眼掘出輒雨雨過則如初雲谷山在府東北二十五里有寺曰龍居棲梧山在府西南三十五里上有觀曰玉虗又有靈茅丹井蜻蚨塘蟾蜍谷黃岡葛峰筯竹巖真君泉聖水亭諸遺迹紫淦山在府東四十里山色紫翠淦水經其下夏山在府東六十里中有寺門枕石潭俗傳有龍居之閣皂山在府東六十里山形如閣色如皂故名相傳為神仙之館道書以為第三十三福地漢張道陵晉丁令威葛孝先皆嘗修煉於此山有凌雲峰漱玉泉投龍潭九龍塘磨劔池會仙橋著衣臺煉丹壇仙人石諸勝迹宋陶弼詩萬仭天然閣皂形隂陽不似衆山青一區海上神仙宅數曲人間水墨屛華表鶴歸春谷響玉京龍起夜潭腥可憐張葛無人繼三級髙壇拂杳冥銀嶂山在府東北七十里峙立如屏嶂且多白石色如銀或云舊産銀官取之今無刻木山在新淦縣南一十里下有孝子刻木廟大羅山在新淦縣南三十里山出雲輒雨下有甘泉嵗旱鄉民汲泉以禱湓山在新淦縣東六十里山有十二峰絶頂有玉郭二真壇水早疾疫輒禱焉安山在新淦縣南六十里上有陳嶽陽王祠墓小廬山在新淦縣東北六十里周迥回一百里上有石池𢎞澄如鏡又有石泉分四飛瀑尚樂山在新淦縣北六十里上有宋武帝祠玉笥山在新淦縣南六十里舊名羣玉峰道書為第十七洞天第八福地相傳漢武帝時有玉笥降壇上因名漢梅福晉郭桂倫彭真一袁景立梁杜曇蕭子雲皆嘗學道於此上有峰三十三洞六壇二十五亭臺各十一其餘泉池澗谷勝迹尤多伏泉山在新淦縣東七十里山有飛泉皎若垂練故名寶林山在新淦縣南八十里上有寺曰天長其在縣境者又有風岡石屋盧峯黃金黃蘖鳯凰鷓鴣順龍大恩等山虎瞰山在新喻縣治南屹臨渝水勢如虎踞唐武德中移州治此山巔有臨梁館後廢徙學宫其上盤龍山在新喻縣北一十里上有古剎曰瑞相銅山在新喻縣西二十里有銅礦唐大厯後置官場宋初罷鍾山在新喻縣西四十里裴子野宋略云永嘉初因洪水有一大鍾從山中流出驗之乃秦樂器故名唐盧肇嘗讀書于此鼎山在新喻縣南五十里頂有泉山腰瀑布如練宋尚書謝諤嘗讀書于此蒙山在新喻縣北七十里巉巖竒秀髙插雲漢山有雲隱寺曹玉洞道鳴禪師塔本朝梁寅嘗居於此作蒙山賦席帽峰在新淦縣北五里仙女峰在新淦縣東南七十里下有神廟唐乾符間邑人李姓者興義兵以禦黃巢之亂賊占云新淦有神人生紫氣遂不敢犯境後李之女得道升仙於此鄉人立廟祀之吟峰在新喻縣北四十里宋初吳鸞者歸休與其弟鳯作亭吟嘯于其上故名吳山嶺在新淦縣南八十里晉吉州刺史吳世雲嘗修煉於此百丈嶺在新喻縣東南七十里上有葛仙翁丹並及雷祠元范梈嘗居於此寶珠嶺在新喻縣北八十里與蒙山相連茱萸岡在新淦縣北五里上産茱萸仰天岡在新喻縣西北一十五里髙聳數千仭上有古佛剎境界清絶一縣之景暸然在望清江在府南五里本贑江經吉安府至此為清江又東北流入南昌府界象江在新淦縣南五十里源出新喻縣界東流三十里入于清江袁江源出袁州府萍鄉縣瀘溪至新喻為渝水至府南十里入清江太平江在府西三十里自蒙山之陽至華陽江口流二十里入袁江桂湖在新淦縣治南舊傳湖傍有登科第者因名又名倉池蕭水在府西五里源出棲梧山及烏塘合流而為蕭水中有灘曰蕭灘亦曰蕭州下流至南昌府境入江淦水在府南三十里源發荗林鄉流經紫淦山至清江鎮入于清江黃金水在新淦縣西南一百三十里自新喻縣界流至此逹于清江昔有人嘗窮源得黃金歸而再往不見其處泥江水在新淦縣南一十里一名泥溪源出撫州府樂安縣流入縣境二百里逹于清江頴江水在新喻縣東北八十里自蒙山之陽八十四源合流而經此下入渝水蛇溪在府東源目臨江鎮之下五里分江水為溪五十里至蛇溪復與江流合秀溪在新淦縣東北二十里其流縈曲八九而逹于江宋曽宏迪嘗請宸翰篆賜秀溪二字刻置其傍玉澗在新淦縣南七十里源出玉笥山回互紓曲號三十六澗宋朱熹詩獨抱瑶琴過玉溪朗然清夜月明時如今已是無心客却怕山前荷蕢知蓮花潭在新淦縣南三十里潭畔有巨石狀如蓮花讀書潭在新喻縣西南一十五里唐盧肇讀書鍾山嘗扁舟往來其中故名丹池在府西南紫霞宫晉章昉煉丹之所洗墨池有二一在新淦縣治東舊傳晉陶侃讀書於此一在新淦縣南玉笥山相傳梁杜元老學道於此皆嘗鑿池洗硯故名碧玉池在玉笥山上鳯凰池在新喻縣治南濶不盈丈而清泠四時不竭九星井在新喻縣治內相傳鑿井初成泉湧出有浮漚若九星隱映其中故名劉仙井在新淦縣南一十里舊傳仙人劉守真煉丹井其泉清甘病者飲之可愈虎跑井在府治東唐魯季文廬母墓每患汲江水逺忽有虎于廬側跑地得泉人以為孝感白乳泉在玉笥山舊傳梅真人修煉于此其泉出石竇潔白如乳醴泉在新喻縣西三十里宋黃庭堅嘗過此飲之而甘曰惜張又新陸鴻漸輩不及知也因題其傍柱曰醴泉萬石洲在府南一十里大江環其前袁江帶其後其地夷曠肥饒嵗收常倍因名太洋洲在新淦縣北四十里蕭公廟在焉金鳯洲在府學前江中橫亘一里許其形如鳯故名土産銅新喻縣出紵布葛布柑銀杏各縣出學校臨江府學在府治南宋建本朝永樂二十一年重修金幼孜記清江縣學在縣治東北宋淳祐間建本朝宣德二年重修後燬正德中重建新淦縣學在縣治東北宋乾道間建本朝景泰四年重修新喻縣學在縣東南虎瞰山上唐大厯間建本朝正統十三年重修書院髙峰書院在新淦縣治東宋縣令黃幹建清江書院在清江縣治東宋著作郎張洽建金鳯書院在府治東南隔江金鳯洲上宋國子司業黎立武建立武又有蒙立講書堂在新喻縣北八十里惜隂書院在新淦縣治東陶侃讀書臺下成化初建夏寅記金川書院在新淦縣正德七年李夢陽建祀陳子寧扁曰浩然堂自為記宫室近江樓在府東南瀕江宋守魏廷玉建以朱文公詩有征驂聊駐近江樓南市津頭問買舟之句故名內祀文公及黃幹張洽一覽樓在府治圃中圃有清江臺臺上有樓名曰一覽宋建集雅樓在新喻縣治東宋王安石子雱嘗館于是樓藏書萬卷名曰集雅橫舟閣在府治其在倅廳有槐風桂月二閣在判官廳有氷壺閣皆宋時所建經史閣在府學宋建以藏經史水閣在新喻縣治西宋李咨建陳堯佐詩水閣春來好泉聲坐臥間有田皆負郭無樹不連山浮世誰輕重清風自往還何當免拘束短棹訪松關文昌閣在新喻縣東南一名采芹閣黃伯樞詩數椽古屋對雲沙小語空梁燕作家冠蓋不來庭院悄東風隨意長芹芽讀書堂有三一在清江縣西一十五里晉豫章人吳猛能以白羽扇畫江而渡嘗過此喜其山水之勝建堂讀書故今城西門曰望仙門一在府城內唐宜春人盧肇樂蕭灘山水之勝故讀書于此一在閣皂山南唐宋齊丘讀書處又有藏書岩在焉富壽堂在府治宋建因富壽岡為名靜治堂在府治宋建又有坐嘯堂司諌韓璜為之記維嵩堂在府治宋天禧中王益為軍判官其子安石生于此後人因名其堂曰維嵩亦名文公堂五賢堂在府學講堂西五賢宋劉敞攽孔文仲武仲平仲所謂二劉三孔也美俗堂在新喻縣治宋建戲魚堂在新淦縣治東東山寺前宋劉次莊謫居臨江卜築東山下鑿池其前因名堂曰戲魚自號戲魚翁嘗自摹淳化帖十卷刻石置堂中時稱為戲魚堂帖緑隂亭在新喻縣學俯瞰袁江唐盧肇詩亭邉古木晝隂隂亭下寒潭百丈深黃菊舊連陶令宅青山遙負子平心霽月亭在府治宋時建吸川亭在府治宋時判官廳面對大江眼界甚竒魁星亭在府學亭面江對閣皂諸峰如玉立然化梭亭在府東北三十里清江鎮晉陶侃漁于雷澤得織梭挂壁間一日電雷梭化為龍去後人因作亭于陶母墓前本朝洪武初重修張九韶記兩耆亭在新喻縣學西宋朱熹守長沙道經於此與謝諤會時人作亭表之景疏亭在新喻縣西一十里宋歐陽國華致仕歸景慕二疏而作學士徐君平記秀江亭在新喻縣南濵江宋隱者吳叔元建黃庭堅嘗訪之因題詩云因循不到此江頭匹馬黃埃三十秋舊社只今人共老清波常與月分流湧月亭在新淦縣宋時建雙秀亭在新淦縣黃金鄉宋時有鄧氏二子長曰佑擢童科季曰吉登三禮科築亭江上扁曰雙秀朱嚴為記讀書臺有二一在新淦縣治東相傳為晉陶侃讀書處本朝正統中重修一在新喻縣治西相傳為唐狀元盧肇讀書處九仙臺在玉笥山黃庭堅詩九真承詔上龍湖盡是驪山所送徒惟冇鄧公留不去松根搘鼎煮菖蒲黃蘗館在新淦縣西唐權德輿有奉使宜春夜渡新淦江陸路至黃蘗館遇雨詩關梁問津橋在府學東清風橋在天寧寺東廣濟橋在府治公選坊虎川橋在府治東惠政橋在新淦縣治南望仙橋在新淦縣治東通濟橋在新喻縣東三里暇豫橋在新喻縣東二十五里寺觀天寧寺在府治南唐韋宙征南蠻道由蕭灘夜見江中有光命漁者入水得鐵佛像五凱還日奏立興化寺宋曰報恩元改今名本朝正統中重修慧力寺在府治南宋熙寧間建本朝洪武間重修崇慶寺在新喻縣西門外洪武間建正統間重修建興寺在新淦縣治東北洪武間建玄妙觀在府治南晉建唐名三清元改今名祥符觀在新淦縣治西南舊名大虗唐改沖真宋改今名內有晉許旌陽煉藥井仙馭觀在新喻縣治東宋宣和間建本朝正統間重修紫霞宫在府南晉建為紫霞堂元改為宫本朝正統間重修祠廟孝通廟在新淦縣南八十里峽江鎮相傳秦時有溫媪經程溪得巨卵藏于家生七龍放之江媪或至江口龍輒獻嘉魚若祭養焉媪死