府推官見事敏給涖政詳明持己儉約待人寬恕尋被薦授監察御史李存仁永樂間知新喻亷幹有機局初抵任佯為不知事體狀逾月閭里銖兩之姦悉知之一時豪右摧抑淨盡境內大治民所告訏判斷如流民至今誦之省志潘諒宣德間知臨江府為政寬和吏民懷之省志夏璣天順間知新淦縣持身清慎平易近民有古良吏風省志沈棨由進士以南京工部郎中擢臨江知府性果毅明敏問學博洽善吟咏臨政尚嚴明吏民畏服省志葉淇成化間知清化縣政平訟理擢監察御史省志王佐成化間同知臨江公平正大慱學工吟咏以才能著稱省志陳旅臨江府學訓導律己端方敷教嚴明士子畏愛後遷國子監丞今祀于名宦祠省志盧翊由進士任新喻令亷不近名仁不墮事和平豈弟有循吏風以憂去民不忍去省志陳元憲正德間通判臨江政尚亷平催科中存撫字門第清嚴闋節不能入去任十年民思之如初省志戴德孺由進士知臨江府適華林賊後豪猾相緣結人民凋瘁德孺鋤刈強梗姦惡屏迹宸濠叛率鄉兵從征直搗宸濠巢穴以功升雲南右布政卒于途省志王泰正德間為清江尹舊以里甲值日科取無度泰至除十之七值度支部使為催科泰曰知縣可辱吾民不可迫建倉預飢財力不與於民卒于官無以為殮知府戴德孺為具棺衾士民哀之省志流寓王覿泰州人宋哲宗朝為司諫極言章惇之黨四人朋邪害正由是惇罷徽宗立覿為中丞又論惇之罪後謫居臨江軍趙孟濟其先汴人寓居清江宋德祐時待次家居郡檄攝元僚保障城邑以功充清江令居官介特豪猾屏息已而城破死之人物漢孔恂新淦人為州别駕車前舊有屏星如刺史車制刺史因怒欲去之恂曰撤去屏星毁國舊儀别駕可去屏星不可省即投傳去刺史追謝乃不去屏星唐陳嶽玉笥人纍官南昌觀察判官著唐書自髙祖至穆宗為統紀一百卷子濬仕楊吳為翰林學士撰吳録二十卷楊彥伯新淦人幼頴敏大順間擢童子科昭宗親試之彥伯應對詳雅帝謂左右曰劉晏之徒也御製詩賜之後宰安福縣境內按堵牛産六犢蓮莖四花州以狀聞賜緋魚五代陳喬嶽之孫幼敏悟耽玩文史仕南唐纍官翰林學士承旨門下侍郎兼樞密使以社稷為己任及建康不守喬自縊死後主既降太祖責其拒命後主曰臣為陳喬所制時喬已死太祖愍其忠詔改葬焉宋劉式清江人明春秋公榖之學纍官三司都磨勘司淳化中持命往諭三韓酋長歸化暨歸值風舟覆而夷謝表貢珍一無沾濡後官至刑部郎中子立本賜出身立言立德立禮相繼登第俱有名孫冕新淦人雍熙間舉進士後守蘇州甫及引年大書一詩於壁有曰莫待朝廷差致仕早謀泉石養間身題畢拂衣歸九華山再召竟不起王欽若新喻人淳化間舉進士纍官至尚書左僕射兼中書侍郎同平章事進司空封冀國公卒贈大師中書令諡文穆平生撰述數百卷多神異之事李咨新喻人幼以孝聞景德間舉進士纍官户部侍郎知樞密院事性明敏周知世務處煩劇若間暇吏不敢欺在樞府專抑僥幸革濫賞人以為稱職卒諡憲成蕭諤新喻人以詩易教授閭里而尤篤于教子其後四子皆慱學有名曰賀曰貫曰賁皆登進士第貫纍官京東轉運使後知饒州遷兵部貟外郎為人尚氣槩臨事敢為且善屬文時比之唐李賀云楊申新喻人天聖間舉進士纍官光祿卿立朝頗有風節王安石當國以論新法不合出知濟州多善政尋乞致仕吕大防表其所居為耆德坊孔延之新喻人宣聖四十七世孫幼孤貧晝則帶經耕鋤夜則燃松讀書慶厯間舉進士九遷至司封郎中平生惟與周敦頥曽鞏最友善蕭固新喻人天聖間舉進士皇祐初為廣西轉運使知儂智髙凶狡預條上羈縻之䇿于樞府不果用後智髙果叛人服其識云劉敞式孫慶厯間舉進士纍官知制誥奉使契丹還知揚州有惠政徙鄆州道不拾遺纍遷翰林侍讀學士侍英宗講讀每指事據經因以諷諌官至集賢院學士敞學問淵博為文尤贍敏有公是集行世劉攽敞弟慱極羣書與兄偕登進士熙寧初知太常禮院初與王安石甚相得及安石執政屹不肯附後出知曹州政尚寬平召為國史編修與司馬光同修資治通鑑官至中書舍人有公非集行世蕭注諤從孫磊落有大志尤喜言兵慶厯間舉進士攝番禺令儂智髙圍廣州注突圍出募海濵壯士與格鬪破其衆擢知雍州結溪洞酋長擒智髙弟智光子維宗以獻纍官西上閣門使後知桂州胡向清江人皇祐間舉進士纍官倅越州奏課為天下第一後權大理卿決獄仁恕雪寃免死者甚多劉奉世敞子天資簡重有法度嘉祐間舉進士元豐中纍官僉書樞密院事出知成都府以中丞邢恕劾再貶隰州團練副使後以端明殿學士知定州尋落職知徐州以舊職致仕孔文仲延之子性狷直學問慱洽嘉祐間舉進士再遷台州推官熙寧初范鎮以制舉薦極論新法之害為王安石所黜哲宗初再遷左諌議大夫改中書舍人同知貢舉以疾卒有文集五十卷孔武仲文仲弟嘉祐間舉進士纍官國子司業嘗論科舉之弊詆王氏學進拜中書舍人直學士院建北郊議纍遷禮部侍郎出知洪州坐元祐黨奪職居池州卒有所著詩書雜文總百餘卷孔平仲武仲弟治平間舉進士為集賢校理紹聖間坐黨籍謫知衡州再謫惠州别駕安置英州徽宗即位召還纍官金部郎中平仲長于吏學工文詞著續世説等書行世何正臣新淦人九嵗舉童子賜出身復中進士元豐中為御史裏行會正御史專六察正臣言幸得備言路不宜兼治他曹纍遷寶文閣待制出知潭州後歷刑部侍郎知宣州李大有新喻人紹聖間舉進士纍官知虔州宣和末金人犯京師大有募兵勤王鼓行而前淮甸歌曰天下姦臣皆守室虔州太守獨勤王後知衢州州有宿冦猖獗大有下車冦即平李邈清江人少有才略見事風生宣和間知霸州時童貫將連金人夾攻契丹邈上書言不可忤貫免官久之復起知嚴州貫收復燕山邈嘆曰禍亂自此始矣金人犯京師詔輒入見出知真定府金人至邈且戰且守相持四旬城破巷戰被執遂遇害髙宗贈昭化軍節度使諡忠壯向子諲臨江人丞相敏中玄孫宣和間纍官京畿轉運副使張邦昌僣位遣人問起居子諲械繫其使者遣將統兵勤王髙宗時出知潭州金人猝至子諲以死守金人登城乃奪門去紹興間遷徽猷閣待制户部侍郎出知平江府以忤秦檜致仕傅雱臨江人為從事郎改宣教郎建炎初偕工部侍郎使于金國其誥詞有曰庶爾一言之合成吾兩國之歡識者知髙宗之意在于講和矣蕭建功新淦人少好學嘗從陳瓘遊瓘器重之李朴被謫時貧不能自給建功為築室居之朴死建功以女妻其子李綱薦其操行堅正纍官知衡州蕭燧固玄孫父增慱究羣書紹興初應制舉以書詆時相竟不仕而歸燧幼能屬文紹興間進士授平江府觀察推官忤秦檜歸孝宗時起為左司諫議論鯁切出知嚴州移婺州婺素知其條教不勞而治纍官至參知政事以資政殿學士奉祠卒諡正肅楊獬新喻人紹興間舉進士知吉水縣救荒有政纍官司農少卿知明州沿海有小冦獬悉擒之海道晏然生平亷介自持博覽強記為後學所師法鄉人至今祠之于學楊願臨江人紹興間舉進士纍官車輅院願于書無所不讀邑有考德問禮之事必求是正里人稱壽岡先生謝諤新喻人幼敏惠日記千言為文操筆立就紹興末舉進士攝樂安縣改吉州録參知分宜縣皆有惠政擢監察御史上其所創義役法詔行于諸路光宗登極獻十針纍遷御史中丞尋以煥章閣學士知泉州所著有聖學淵源五卷徐夢莘清江人百家書寓目成誦紹興末舉進士纍官知賔州嘗為三朝北盟會編一百五十卷擢直祕閣所著又有讀書記志集醫録集仙録弟得之淳熙中進士安貧樂分官至通直郎致仕嘗著左氏國紀史記年紀及鼓吹詞郴江志張紱清江人強記慱覽為文敏而純粹紹興末舉進士為澧陽主簿以亷勤稱秩滿調衡州録參宜春丞暇日閲究經史有愚谷集十五卷歷代史年表二十卷劉清之臨江人受業兄靖之慱極書傳紹興末舉進士及見朱熹慨然志義理之學嘗為髙安縣丞賑飢有方徙知宜黃縣孝宗時召對首論民困兵驕纍官知衡州善政甚多罷主雲臺觀光宗即位起知袁州所著有訓蒙新書通録墨莊祭儀時令諸書常楫清江人乾道間倅房陵遷知宜州所至有聲尤善決獄家居極孝友盡以其田廬讓其兄清江上流水泛輒壞民田楫為築隄防水田皆為沃壤至今民賴焉章頴新喻人以兼經中鄉薦孝宗初立求言頴為萬言書以聞纍官左司諫疏論右相葛邲不足任大事寧宗時為侍御史兼侍講又極論趙汝愚不宜去被罪家居後起為刑部侍郎卒諡文肅其操履風節不為窮逹所移雖仕多偃蹇而清議與之朱景文清江人自少俊邁傑出讀書過目不忘為文頃刻立就雄贍豪爽如其為人乾道間舉進士再調分宜簿未赴而卒有批鱗藁五十篇文集四十卷彭龜年清江人從朱熹張栻講學乾道間舉進士纍官吏部侍郎兼侍讀嘗極諌光宗宜盡孝道寧宗時又極言小人竊權之弊以寶謨閣待制致仕龜年學識正大議論簡直其愛君憂國先見之識敢言之氣皆人所難自偽學有禁士大夫鮮不變者龜年則始終特立卒諡忠肅陳琦清江人嘗從張栻遊乾道間舉進士主衡陽簿辨雪寃獄賑荒郴桂使糴者為伍循次以糴民甚德之遷贑縣丞贑守留正尤器之留鎮蜀辟主管機宜文字在蜀二年事無巨細多質焉曾三復新淦人與弟三聘俱乾道間進士三復性耿介耻奔競紹熙初歷知池常州召拜監察御史持論正平不隨不激纍官至起居郎兼權刑部侍郎致仕曾三聘三復弟幼有異質日記千言由進士纍官祕書郎光宗時三上相陳時事黨論興坐重劾卒贈直龍圗閣諡忠節弟三異少有詩名嘗著新舊官制通考通釋除太社令力求去時號雲巢先生三英嘗考究三國六朝攻守事迹著南北邉籌十八篇又著蒙史蕭逵燧子淳熙間舉進士孝宗曰逵才氣甚佳父子高科秀殊可喜後纍官至太常嘗知貢舉於落卷中取真德時稱其知人逵從子崱號大山崱弟泰來號小山俱以文名登紹定間進士崱纍官宗正永泰來纍官御史遷起居郎徐天麟夢莘從子開禧初進士纍官武學慱士輪對言人主當持心以敬通判惠潭二州權英德府所至興學明教有惠政著兩漢會要漢兵本末西漢地理疏山經等書張洽清江人從朱熹學嘉定初舉進士歷官州縣有善政纍遷著作佐郎直祕閣平生用力於敬居間不言朝廷事或因災變輒顰蹙不樂及聞一君子進用則喜見顔色所著有春秋集傳續通鑑長編嚴世父新喻人隱居不仕師事朱子有疑義問答往復書帖鄉人祠之于學黎立武新喻人咸淳間舉進士纍官國子司業華文閣侍制考試臨川得吳徴時稱其知人元范梈清江人纍官翰林應奉福建廉訪司知事梈精古學砥礪名節持身廉正吳澄嘗稱其為特立獨行之士工篆𨽻楷書尤工於詩與虞集揭傒斯楊載齊名時號虞楊范揭有文集行世周自強新喻人好學能文練于吏事泰定間以招諭徭酋有功授廣西宣慰司都事再遷義烏縣尹周知民情訟者必開譬令其悔改怙惡不悛者然後繩之以法履畝核田以定賦役吏民不敢少欺官至江州路總管傅若金新喻人少貧刻勵于學能文章嘗遊京師虞集見其詩大加稱賞揭傒斯亦稱其詩髙出魏晉下不失於唐杜本清江人慱學善屬文尤工篆𨽻隱建寧武夷山平居沉靜寡欲無疾言遽色與人交尤篤于義文宗徴之不起至正間復居為翰林侍制稱疾固辭學者稱為清碧先生所著有四經表義六書通編十原等書蕭克翁燧四世孫隱居不仕學行為州里所稱富珠哩翀從之學楊士𢎞清江人其先本襄城人士𢎞祖父世官于臨江遂家焉士𢎞少好學工樂府諸詩有鑑池春草集嘗選唐詩名唐音行世本朝梁寅新喻人通五經元末纍舉不第洪武初召至京議禮以年老告歸從學者甚衆所著有䇿要宋元史略歷代敘略石門集張九韶臨江人性頴悟十三能詩詞元時纍舉不第隱居教授洪武初辟為清江教諭升國子助教翰林編修所著有理學類編羣書備數元史續編曾魯新淦人好古博學洪武初徴至京師與修元史編禮書授禮部主事升禮部侍郎練僖新淦人元末領鄉薦隱居不仕洪武初召為起居注以直言忤旨謫廣德州同知遷臨汀鎮安二府通判以疾卒于官今祀鄉賢省志練子寧僖子性資英邁志操不凡洪武乙丑進士第二纍官至都御史革除間與方孝孺等特見信用靖難志師起寧不屈而死省金幼孜新淦人洪武末舉進士永樂初授翰林檢討入內閣纍官至太子少保禮部尚書歷事纍朝論思獻納多所禆益文章豐暢為人所愛重眷遇雖隆而自處益謙卒贈少保諡文靖習嘉言新喻人永樂戊戌進士擢翰林編修歷侍讀太常寺少卿詹事府詹事為人篤實沉重每有封章皆切時政黎恬登永樂王辰進士授監察御史時因災異上言歷詆大臣權要側目出知南寧州用薦擢為春坊右諭德預修宣廟實録進講經筵以展墓歸卒所著有觀過稿省志張固新喻人宣德間舉進士擢刑科給事中升吏科都給事中遷大理少卿居官清慎為朝士所重吳匯新喻人性頴異家貧力學景泰辛未會試第一登進士官至國子司業以疾歸卒于家省志張黼固子景泰甲戌進士任監察御史強毅果斷風裁凛然贓吏望風罷去歷升廣西按察使以直忤當道致仕省志胡榮新喻人自少遊心理學研究旨歸登景泰甲戌進士歷給事中遷憲職奉敕提督浙江廣東學校號稱知人以參政致仕省志何𠂻新淦人天順丁丑進士授刑部主事纍遷郎中為人沈毅不阿蜀有守臣不職奉命往訊之賂千金拒不納竟置于法中都留守笞殺人數多纍官按之不能決𠂻往治即伏辜尋升大理右丞卒于官貧無以為殮所著有靜齋藁祀于賢鄉祠省志傅瀚新喻人溫厚和粹篤于孝友天順甲申進士歷翰林檢討春坊諭德學士時李孜省為通政使得侍經筵瀚進講極言汰冗官李銜之不為動兩主文衡得名士進禮部侍郎大禮多所贊襄中更變故卒不失正用廷薦兼學士掌詹事府事修會典充副總裁進禮部尚書以疾卒贈太子太保諡文穆入鄉賢祠省志周謨新淦人為庠生時嘗推廪以遜其友天順進士授工部主事纍官至陜西副使以母老乞休邉氓畨夷扶老擕幼相泣不忍舍為人剛方易直所著有東臯集省志何純新淦人成化丙戌進士授庶吉士拜監察御史時大臣不厭輿論純歷數其過疏至三上按廣東四川端平詳慎大協人望升雲南兵偹副使發倉賑飢民免相食擒阿彌州賊首奏設守禦千户所邉患以息奏減銀課民生以全卒于官兄善以成化乙未進士終新城令民立遺愛亭省志孫仁新淦人登成化己丑進士歷刑曹審録湖襄多所平反知常州府力抗權閹升浙江參政陜西布政右副都御史巡撫寧夏修城垣簡上卒邉鄙賴焉致仕卒賜祭葬省志陳壽新淦人𨽻籍江寧成化壬辰進士授給事中以直言纍下錦衣獄事白升光祿少卿擢僉都御史巡撫延綏時敵和碩犯境以捍禦捷聞褒賚有加歷刑部尚書居官清淡不治産業及致仕無所歸僑寓金陵敝屋蕭然以壽卒人稱其有清白風省志彭綱清江人成化戊子解元乙未進士出知汝州庶政既平鑿渠引水灌田數千畝世為民利遷雲南提學副使以公明稱為人端凝朴茂而不波逐于時流家居無一語及公府事惟以文行汲引後進士知自檢者至今式之自號雲田所著有雲田集省志孫治清江人成化辛丑進士知臨淮縣守己愛民興學作士時權閹汪直陳廣以選妃責貢繼至所在需索動以千計治持正不阿竟為二宦所中改安東遂棄官歸士類尚之所著有鳴春集省志陳陽新淦人以進士選翰林庶吉士歷郎中訊獄蘇常逆瑾受獄家賄欲曲法陽不許遂下錦衣獄謫州同知瑾誅升廣西僉事以劾巡按監司不法左遷運同卒于官今祀鄉賢省志張文新喻人博覽強記以春秋登𢎞治癸丑進士授刑科給事中轉都給事多所建明上中鹽張燈二疏為權貴所憚以疾卒省志凃禎新淦人由𢎞治己未進士出知江隂三載有古良吏風治行為天下第一遷御史巡長蘆鹽課時逆瑾壞鹽法禎紏正之且求賂不得遂以禍中之死于錦衣獄瑾伏誅命復官諭祭今祠于鄉賢省志干顯偲新淦人六嵗失怙踰年知求父像時拜且哭家貧事母能盡養及卒水漿不入口者數日比葬廬墓所虎馴其側人咸異之正德三年奉詔旌表省志干鳯顯偲子天性純孝領以𢎞治甲子鄉薦授髙淳合肥教諭誨諸生敦尚行實勵清約有古人風采遷桃源令命下而卒無以為斂正德間督學僉事邵鋭既祠于鄉賢仍書孝廉以表其宅省志列女廖氏臨江軍貢士歐陽希文妻宋紹興初盜起希文與妻共挾其母走山中為賊所追廖以身蔽姑使希文負之逃賊執廖氏廖正色叱之賊揮刃斷其耳與臂廖猶謂曰爾輩叛逆我即死爾輩亦不久屠戮語絶而仆鄉人義而葬之號廖節婦墓謝小娥父自廣州部金銀綱擕家入京舟過蕭灘遇盜全家被害小娥溺水不死附漁舟而出行乞于市後為鹽商李家傭奴見其酒器皆父物始悟其盜乃置刀藏之李生日會酒舉家皆醉小娥持刀盡殺之事聞命以官不受願為尼乃建尼寺使居之沈氏新喻章伯髙妻年二十五而夫亡或諷其改適沈曰婦人足不踐二庭此足一移三綱即淪吾為章氏婦知有章氏而已洪武間旌表省志陳貞婦新淦人幼納庠生黃體堅聘體堅謫吏放金陵貽書娶陳父母欲易他女以往陳曰吾命也遂遣歸後體堅以罣誤棄市纍欣不得白徒步收其尸斂而瘞之為位奠哭期年家人來迎曰吾志願畢矣乃自書其名氏經于柩側君子謂貞婦生以義歸死以節徇大學士曽棨為之傳省志李氏清江熊恆妻歸熊三年夫卒李年十八無子父母數令改嫁李以死自誓乃鞠從孫瞻繡為後紡績自給年八十餘而卒省志張氏新喻阮尚德妻年十九而夫亡或以無子勸其改嫁張曰吾夫無子吾夫之兄弟有子茍可以繼嗣吾無他求事聞詔旌其門省志蔡氏新喻廖益麾妻夫亡艱於自給或逼其嫁蔡曰妾聞餓死事小失節事大有司以其事聞為立貞節坊以表之省志胡氏新喻張和禎妻和禎亡遂不御膏沭以未亡人自處事聞為立坊以表之省志丁氏新喻彭元鼎妻年二十一而夫亡所親欲奪其志丁曰夫臨終托吾養其母吾今既去母孰與養天順間郡邑核其實以聞詔旌其門省志王氏新喻周逹理妻年二十而夫亡有強其他適者王曰妾聞禮一與之醮終身不改事聞詔旌表其門省志廖氏羅氏新喻人廖為蕭嘉迪妻羅為蕭嘉聞妻親妯娌也廖年二十三羅年二十一而嘉迪嘉聞繼亡廖與羅同事舅姑清貞一心年皆八十餘卒成化間詔旌表其門省志嚴氏清江嚴孟端女適同里黃時訓年二十七而寡清修苦節始終弗渝成化間詔旌表其門省志簡氏名祥貞新喻簡公啓之女適同邑鄒濟泰年二十一而濟泰亡父母欲改嫁簡死誓不從及服闋復私納采強之簡聞持刃哭于濟泰靈右斷二指示無再適意父母患之乃止成化間有司以事聞詔旌表其門省志彭氏新淦人年十七歸圳上李厚載年二十而夫亡父母欲奪其志彭誓曰從一而終婦人之義遂以針刺毁其一目紡績以教育遺孤𢎞治間詔旌表其門省志彭氏清江熊斐妻也正德辛未華林賊入城彭被執義不辱死之提督副使李夢陽聞于朝命立石旌表後復詔旌表其門省志易氏清江縣學生鄧介妻也正德乙亥盜入介室易奔出遇賊盡脫簪珥祈免賊執不舍欲汙之易紿與偕行賊不為偹至江濵赴水未殁賊追刃之省志陳氏杜氏陳清江城北陳廷瓚女杜則瓚子德純妻也陳甫及筓與嫂杜皆有容色華林賊至奔赴李家塘賊拽入鄰居欲汙之相持愈力罵不絶口賊并刃之而投于水省志邵氏府城劉清徹妻年二十清徹死邵撫孤守節正德間華林賊入城邵走匿孔家塘賊拽之登岸邵匍伏于水堅不行賊怒殺之省志熊氏劉清渭妻華林賊至清渭寢疾垂絶家人悉奔竄惟熊在清渭旁賊掠其資擁之出户乃抱幼子偽隨賊行至李隆德塘置子于水涯自投于水水淺不得溺以泥汗面目且罵且拒賊殺之省志翁氏城東劉淮妻華林賊至家人皆走匿淮病不能興謂翁當避翁曰君或不諱我獨以生為乃盡其資與賊賊猶繫至鄰寺翁仆地不行遂遇害省志仙釋孔丘明秦時人與駱法通等十人避亂相與結友逺訪大道來玉笥山修煉嵗久道成驣空而去惟仙良一人慢遊不與但成地仙云明一統志卷五十五
