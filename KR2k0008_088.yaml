body:
  text: 明一統志卷八十八明李賢等撰貴州布政司貴州本西南夷羅施鬼國地元於此置八畨順元等處軍民宣慰使司都元帥府本朝洪武初以其地分𨽻湖廣四川雲南三布政司永樂十一年始置貴州等處承宣布政使司領貴州宣慰使司及貴陽思州思南鎮逺石阡銅仁黎平都匀八府普安永寜鎮寧安順四州并凱里安撫司置貴州都指揮使司領貴州貴州前普定新添平越龍里都匀畢節普安威清安南安莊清平平壩烏撒赤水永寜興隆一十八衛黄平守禦千户所置貴州等處提刑接察司分貴寜新鎮二道兼察諸司府州衞所三司並治於貴州宣慰司云貴陽府東至龍里衞界九十里西至安順州界七十里南至廣西泗城州界九十里北至舊程畨府界四十里自府治至南京四千三百九十里至京師七千七百三十里糧六千五百石零建置沿革禹貢荆梁二州之南境天文參井分野本西南夷地宋開寳間置大萬谷樂總管府嘉定間移府於今治元改置順元等路軍民安撫司屬八畨順元等處軍民宣慰司初𨽻四川行省後改𨽻湖廣行省本朝洪武初改置貴州宣慰使司𨽻四川布政司永樂十一年改𨽻貴州布政司隆慶三年析置貴陽府領縣一新貴縣附郭萬厯中新設貴竹長官司附郭水東長官司在府城北三里元為水東寨長官司中曹蠻夷長官司在府城北十五里元置中曹百納等處長官司上馬橋長官司在府城南七十里小程畨長官司在府城南七十里二長官司俱元置本朝因之盧畨長官司在府城南八十五里元至元中置盧畨静海軍安撫司程畨長官司在府城南八十五里元至元十六年置程畨武勝軍安撫司俱本朝改置韋畨長官司在府城南九十五里元置本朝因之方畨長官司在府城南九十里元至元中置方畨河中府安撫司洪畨長官司在府城西南九十里元至元中置洪畨永盛軍安撫司卧龍畨長官司在府城南一百里元至元中置卧龍畨南寜州安撫司金石畨長官司在府城西南一百里元至元中置金石畨太平軍安撫司小龍畨長官司在府城南一百三里元至元中置小龍畨應天府安撫司大龍畨長官司在府城南一百一十里元至元中置大龍畨應天府安撫司羅畨長官司在府城南一百一十五里元至元中置羅畨遏蠻軍安撫司俱本朝改置形勝東阻五溪西距盤江貴州志風俗種類非一習俗各異舊志貴州所轄夷人種類非一曰羅羅曰宋家曰蔡家曰仲家曰龍家曰曽竹龍家曰打牙犵狫曰紅犵狫曰花犵狫曰東苗曰西苗曰紫薑苗曰賣爺苗習俗各異儒教漸興同上諸姓舊皆澆邪之俗本朝儒教漸興而冠婚喪祭之禮皆效慕中國間有嚮意詩書登科出仕者矣山川銅皷山在府城東三里毎隂雨聞山中有聲如銅皷獅子山在府城西土山戴石狀如獅子本朝潁川侯傳友德嘗駐兵其上鳯凰山在府城南五里山形如鳯舒翼木閣箐山在府城西四十里林木蓊蔚水西之境由此而入唐㡌山在府城南八十里土人嘗於此避兵南門河在府城南土産茶鐡馬薑蘭菖蒲刺竹筯竹俱府境及各長官司出學校貴陽府學在府治東北隆慶三年建關梁廣濟橋在府城西南三里寺觀崇真觀在府治西洪武中建祠廟夏國公祠在府治南祀本朝顧成貴州宣慰使司東至龍里衛界五十里西至四川烏撒軍民府界九百五里南至廣西泗城州界北至四川播州宣慰司界俱二百五十里自司治至南京四千二百五十里至京師七千六百六十里糧一千八百石零建置沿革同貴陽府地元置八畨順元等處軍民宣慰司𨽻四川湖廣行省本朝洪武初改置貴州宣慰使司𨽻四川布政司永樂十一年改𨽻貴州布政司舊領長官司二十三隆慶初析十六長官司屬貴陽府乃以金筑安撫司并所屬𨽻宣慰司焉今領安撫司一長官司十一青山長官司在宣慰司城東北四十里元為青山逺地等處蠻夷長官司劄佐長官司在宣慰司城北五十里元置落邦劄佐等處長官司龍里長官司在宣慰司城東五十里元為龍里等寨長官司俱本朝改置白納長官司在宣慰司城東北七十里底寨長官司在宣慰司城北一百里二長官司俱元置本朝因之乖西蠻夷長官司在宣慰司城東北一百五十里元皇慶中置乖西軍民府養龍坑長官司在宣慰司城北二百二十五里元為養龍坑宿徴等處長官司金筑安撫司在宣撫司南二十里古為荒服地元始置金筑府屬順元等路本朝洪武十年改為金筑安撫司屬四川貴州衛軍民指揮使司正統四年改屬貴州布政司隆慶三年改今屬領長官司四木𤓰長官司在安撫司東一百里元為羅頼州軍民長官司本朝改置今司盧山長官司在安撫司東一百二十里元置本朝初屬貴州衛正統中改屬貴州宣慰司尋改今屬麻嚮長官司在安撫司東一百一十里大華長官司在安撫司東一百二十里二司俱洪武中置形勝滇南門户貴州志貴州宣慰司滇南之門户山廣箐深重岡疊寨貴州志金筑安撫司云據諸夷叢聚之地新志風俗疾病不識醫藥被氊衫以為禮俱貴州宣慰司志冠婚喪祭頗效中華貴州志男子以白布裹額安撫司志山川石洞山在宣慰司城東北八里山有石洞可以容衆石門山在宣慰司城東六十里絶頂二石對立人行其中儼如門焉南望山在宣慰司城北一百里深林大箐嵐氣晝蔽人跡罕至清水山在宣慰司城東二百里兩岸壁立水深莫測天臺山在安撫司東南一十里孤聳如臺螺擁山在安撫司南三十里山髙五里狀如擁螺上有深淵水碧如藍四時不涸龍洞河在宣慰司城東一十里陸廣河在宣慰司城西北一百五十里當水西驛道於此置廵檢司以盤詰行者烏江河在宣慰司城北二百里湍流洶悍乃貴播之界河其南岸有烏江關西溪河在宣慰司城西北二百八十里聖泉在宣慰司城西北八里泉宂寛可六尺許時或漲而不溢人莫測其故又號靈泉養龍坑在養龍坑長官司兩山之間泓渟􅞹深靈物藏其下當春初和暢夷人立柳坑畔擇牝馬之貞者繋之己而雲霧晦𡨕類有物蜿蜒與馬接其産必龍駒本朝洪武四年為夏明昇降獻良馬十其一白者乃得之於此首髙九尺長丈餘不可控御詔祀馬祖然後敕典馬者囊沙四百斤壓而乗之行苑中乆漸馴習後將行夕月之禮於清涼山乘之如躡雲一塵弗驚賜名飛越峰且命繪形藏焉翰林學士宋濓為之贊公署貴州衛在城内西本朝洪武四年建貴州前衞在城西北隅洪武二十六年建俱𨽻貴州都指揮使司學校宣慰司學在城東北隅元建舊在今都司之北本朝洪武二十六年改建於此有新造大成殿記關梁通濟橋在城北二里龍塲橋在水東長官司北五十里天生橋在安撫司北三十里石壁千仭環繞如城水流其下人行其上坦平若橋寺觀大興寺在城内東洪武中以元普庵堂改為寺萬壽寺在安撫司治南祠廟忠烈祠在宣慰司南元建祀唐忠臣南霽雲名宦元李德輝至元中羅施鬼國既降復叛詔雲南等路合兵討之時德輝以左丞被命在播州遣張孝思諭降其酋阿察熟徳輝名即身至播泣且告曰吾屬百萬人微公來死且不降今得所歸蔑有二矣德輝乃奏改鬼國為順元路以其酋為宣撫使後有譖德輝受鬼國馬千數者世祖曰是人雖一羊不妄受寜有是耶劉繼昌至元中以招討司經厯招降西南諸蕃遂奏以龍方零為小龍畨安撫使龍文求為卧龍畨安撫使龍延三為大龍畨安撫使程延隨為程畨安撫使洪延暢為洪畨安撫使韋昌盛為方畨安撫使石延異為石畨安撫使盧延陵為盧畨安撫使並授懷逺大將軍佩虎符由是畨境以安本朝顧成貴州衛指揮僉事攻破蠻冦懷來撫順累功封鎮逺侯鎮貴州嘗還京師蠻復出沒成再至縱所拘者徃諭諸酋即相率來見成撫輯之邊境以安易節貴州布政使司左布政使寛猛得宜撫字有方夷人至今思慕之蔣廷瓚以行人奉命計平思州思南叛冦陞貴州左布政使興利除害夷人德之人物宋普貴土人開寳間納土歸順賜王爵以鎮一方宋景陽土人寜逺節度使都總管控制邊方苗民歸附卒贈大尉諡忠成孫裕為寜逺經畧安撫使恩威並著夷民歸心元阿畫普貴之後仕為順元等處軍民安撫使以征伐功加龍虎大將軍封順元羅甸侯卒追封濟國公宋阿重景陽之後仕為貴竹長官以其叔宋隆濟結諸蠻為亂棄家朝京陳其事宜大德中為順元同知宣撫事後加平章政事柱國順元侯克服叛逆威著南裔及卒追封貴國公謚忠宣本朝靄翠阿畫之後仕元為四川等處行中書省左丞兼順元等處宣慰使本朝洪武初歸附授懐逺將軍世襲宣慰使今安氏其後也宋欽阿重孫舊名䝉古岱元時以平冦保境功授昭勇將軍八畨順元等處宣慰使都元帥加鎮國上將軍兼四川等處行中書省參知政事本朝洪武初同靄翠歸附賜名欽授懐逺將軍世襲宣慰使思州府東至湖廣辰州府沅州界九十里西至鎮逺府界一百里南至黎平府界北至銅仁府界俱二百二十里自府治至南京四千二百里至京師七千七百二十里糧八百石零建置沿革楚為黔中地秦屬黔中郡漢以後屬武陵郡唐為思州地後改州為寜夷郡元為思州軍民安撫司地本朝洪武初分置思州宣慰司永樂中改為思州府領長官司四都坪峩異溪蠻夷長官司附郭永樂十一年置編户四里都素蠻夷長官司在府城西六十里永樂十一年置編户二里施溪長官司在府城南一百四十里元置施溪様頭長官司本朝洪武五年改今名編户一里黄道溪長官司在府城南一百二十里元置本朝因之編户二里郡名寜夷唐名形勝西南雄勝之地郡志東連沅靖西抵涪渝作湖廣之唇齒扼槃瓠之喉襟商賈貿遷居民輻輳實西南雄勝之地地連溪洞文獻通考重山環抱溪流縈帶府志風俗民性剛悍外癡内㸃郡志刻木為契同上土人各據溪谷乆者自稱洞官塞長假貸要約則刻木為契雞卜瓦卦同上有病不用醫藥惟事雞卜瓦卦以占吉凶夷風丕變同上自昔椎髻跣足言語侏􅍣本朝聲教漸染既乆夷風丕變祭鬼弭灾府志山川峩山在府治南崒嵂難登巖前山在府城東五十里江頭山在府城西北八十里傍有歇客坪土人毎遇節序則相聚笙歌於此天應山在府城西一百里相傳昔有禱雨於此呼雷則雷聲應故名住溪河在府城西二十里諸溪瀦此而復流架溪在府城南架木溪上以濟徃來龍溪在府城西五十里相傳昔有土人擊銅皷於此而龍出養苗溪在府城西北八十里有巨石障流土人架木引以灌苗異溪在府城東八里以小水各分𣲖入於平溪大河故名異溪土産鉛蠟俱本府出硃砂水銀俱施溪長官司出鐡竹雞俱府境及各長官司出學校思州府學在府城内北永樂六年建關梁平溪關在府城東北三十里黄土關在府城南二十五里鮎魚關在府城東北六十里迎恩橋在府治南思南府東至銅仁府界三百九十里西至四川播州宣慰使司界四百里南至石阡府界一百四十里北至四川涪州彭水縣界六百五十里自府治至南京四千四百五里至京師七千三百九十五里糧一千八百石零建置沿革禹貢荆州荒裔春秋戰國屬楚為黔中地秦屬黔中郡漢為武陵郡地後周屬清江郡隋置務川縣屬庸州尋廢庸州以縣屬巴東郡唐置務州治務川縣貞觀間改為思州天寳初改寧夷郡乾元初復為思州宋為覊縻州政和間始置思州宣和中廢紹興初復置元置思州軍民安撫司至元間改宣撫司𨽻湖廣行省本朝洪武初改思南宣慰使司𨽻湖廣布政司永樂十一年改宣慰司為府𨽻貴州布政司領長官司四縣二水德江長官司在府治北元為水特姜長官司本朝改水德江長官司編户四里蠻夷長官司在府治南洪武十年置沿河祐溪