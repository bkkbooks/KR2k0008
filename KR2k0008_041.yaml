body:
  text: 明一統志卷四十一明李賢等撰嚴州府東至杭州府富陽縣界二百里西至直隸徽州府歙縣界二百三十里南至金華府蘭溪縣界五十里北至杭州府於潛縣界一百二十里自府治至南京一千一百七十里至京師四千四百二十八里糧一萬一千石零建置沿革禹貢揚州之域天文牛女分野春秋時屬吳後屬越戰國時屬楚秦為㑹稽鄣二郡地漢屬㑹稽丹陽二郡東漢屬吳郡及丹陽郡建安中孫吳始置新都郡晉改為新安郡治始新隋初罷郡為新安縣仁夀中始置睦州大業初改為遂安郡治雉山縣唐初復為睦州又於桐廬别置嚴州尋廢於睦州加東字未幾復名睦州徙治建德屬江南道天寶初改為新定郡乾元初復為睦州宋置遂安軍宣和初改州曰嚴州軍曰建德咸淳初升州為建德府屬浙西路元改建德路本朝改建安府尋改嚴州府領縣六建德縣附郭本東漢吳郡富春縣地三園吳廣武中始析置建德縣仍屬吳郡梁屬東陽郡隋省入吳寧縣唐復置屬嚴州後屬睦州尋移州治於此宋為建德府治元仍舊本朝因之編戶八十四里淳安縣在府城西一百六十里本漢丹陽郡歙縣地三國吳置始新縣為新都郡治晉屬新安郡隋改新安縣置睦州後改雉山縣為遂安郡治唐初復名新安開元中改曰還淳永貞初改青溪縣屬睦州宋宣和初改曰淳化紹興中始名淳安元仍舊本朝因之編戶八十一里桐廬縣在府城東一百里本漢富春縣之桐溪鄉三國吳廣武中析置桐廬縣屬吳郡隋初廢仁夀中復置屬睦州唐初置嚴州尋廢以縣屬睦州宋初屬杭州後屬建德府元仍舊本朝因之編戶五十三里遂安縣在府城西一百八十里本漢歙縣之南境三國吳置新定縣屬新都郡晉改遂安縣屬新安郡隋初縣廢仁夀中復置屬睦州唐屬遂安郡宋屬嚴州後屬建德府元仍舊本朝因之編戶五十九里夀昌縣在府城西南九十里本漢富春縣地吳置新昌縣屬吳郡晉改夀昌縣梁屬新安郡隋併入新安縣唐永昌初分雉山復置夀昌縣尋省神龍初復置屬睦州宋元縣仍舊本朝因之編戶三十里分水縣在府城東北一百五十五里本桐廬縣西鄉地唐析置分水縣取桐廬水中分之義為名尋省如意初復置改名武神龍初復故名宋元仍舊本朝因之編戶一十八里郡名嚴陵以嚴子陵居此郡得名新都吳名新定唐名形勝據浙江上游宋錢協浮橋記當甌歙數道之衝同上建邦於山谷之間宋田鍚孔子廟記衢歙二水合於城隅宋范仲淹云羣峰回環一水縈帶宋蘇頌靈香閣記江濶山深古詩江濶桐廬岸山深建德城山川宏偉宋朱熹山陵奏議山川之勝宏偉非常錦峰繡嶺圖經錦峰繡嶺子陵隱居之所四達皆巇險之道郡志風俗俗號輯睦圖經俗號輯睦因以名邦可以無事治不可以多事理人和俗阜寰宇記民貧而嗇圖經序州境山谷居多地狹且瘠民貧而嗇穀食不足仰給他州惟𧖟柔是務且蒸茶割淎以要商賈貿遷之利多文學之士郡志郡多文學之士在唐有皇甫湜方干李頻宋有方逢辰錢時諸人皆以文學著名山川秀山在府冶東宋時山顛有秀亭麓有秀泉山之東又有建安山烏龍山在府城北三里宋宣和初以龍為君象凡州縣山水地名有龍字者避之嘗改名仁安山之麓有烏龍廟旁有烏龍嶺嶺間有三彎九曲之竒髙峰山在府城東五里山峰峭聳昔有浮圖在其巔古語云卯巽二峰重建塔狀元從此冠羣英蓋指此山平壁山在府城西一十里千仭壁立因名橘山在府城南一十里相傳絶頂有羅浮橘一林遇橘熟時風飄墜地得者詫為仙人橘碁枰山在府城南一十五里山頂有石碁稱下有石壁萬嵗山在府城東南二十里與明山巖山相連屬為郡中佳山水馬目山在府城西南二十五里有峰狀如馬首中有小峰如目龍門山在府城東二十七里山巔有浮圖臨於江渚石壁上有瀑布泉吳氏山在府城西北四十里山下有吳村唐天寶中因改吳氏山幽徑山在府城西四十里山下有漢朱買臣墓湫山在府城東北四十五里山有石湫俗呼為聖水紫蓋山在府城西北七十里巍然髙聳出衆山之表常有紫霞騰繞如蓋五寶山在府城西八十里其山有五曰金曰銀曰銅曰緑曰鐵皆以色相似故名銅官山在府城西八十里秦時於此置官採銅今無南山在淳安縣南宋人於山巔搆物外亭錢時有月夜遊南山記都督山在淳安縣治南下有都督方儼祠因名古志載建德縣有都督山鄉人於此擲石以占吉凶今莫詳所在雉山在淳安縣治西南山形如雉蹲隋時嘗以此山名縣靈巖山在淳安縣東北六里吳永安中黃龍見於此因名龍山唐元和中改今名邁山在淳安縣西北六里其山重叠邁於諸山小金山在淳安縣西一十里屹立大溪中上有佛宇山形甚似鎮江之金山而差小故名來胡朝穎詩緑水繞門迷客渡白雲終日伴僧閒聖姥山在淳安縣東南二十五里絶頂平夷流泉不竭上有仙祠雲濛山在淳安縣南三十里每天欲雨先有雲霧滃然䝉此山頂三鶴山在淳安縣南三十五里相傳昔潘氏兄弟三人於此山登仙蔗山在淳安縣東北四十二里山分八面水注十派相傳昔人於此種蔗故名蜜山在淳安縣東南五十里山多蜜出木空石罅中上有蜜山庵東山在淳安縣西五十五里絶頂有僧菴中祠石佛並桃山在淳安縣西北六十里髙出衆山之上一登絶頂杭歙衢婺之山依約在目山下望之如二桃然因名安樂山在淳安縣東六十五里山頂有泉及石碁盤遇旱禱雨多應張景修詩我是掛冠林下客山中安樂合平分芝山在淳安縣南七十里秀出遼溪之上宋嘉祐中西夏都知兵馬使商援入朝奏密事因留家青溪故今山麓多商姓所居重坑山在淳安縣東八十里山有二坑故名擔鹽山在淳安縣西北一百一十里錢鏐微時常販鹽經此因苦渴以拄杖觸巖泉忽湧出名拄杖泉東泉山在淳安縣東北一百三十里舊名覆船其一支南出曰紫瑞峰當龍池之上望之如青芙蓉出泉三派並東注故唐改今名元洪震老詩青蓮浴秋水浮出龍王宫平生閲山亦多矣未有如此竒哉峰金焦靈鷲等培塿詞客誇談不容口恨君不上千仞岡一見天台與廬阜通都大邑人爭馳一泉一石小亦竒雲深路絶無人處大有佳山誰得知南來山在淳安縣西北一百三十里山勢自北而南故名桐君山在桐廬縣東二里一名桐廬山相傳昔有異人於此山採藥求道結廬於桐木下人問其姓則指桐以示之因號為桐君山戴山在桐廬縣東二里劉宋㑹稽戴顒與其父兄及弟來隱於此因名今絶頂有遺居在焉旁有九田灣常山在桐廬縣西五里晉許邁隱此邁丹陽人因採藥遍遊名山至此遂卜居焉牛山在桐廬縣西一十里宋建炎初歙人錢嶨敗金人於此淳熙中邑令向演置石柱欄柵以便行者孫紹逺作記金雞山在桐廬縣西一十里昔人有詩天上金雞種何時種此山祇因鳴有信流落在人間寨基山在桐廬縣南一十四里相傳昔有避難者立寨於此金牛山在桐廬縣東南一十五里相傳昔有人失牛追尋至此見之色變如金入於山穴法華山在桐廬縣北二十五里俗傳昔有異僧於此誦法華經羣鳥聚聽香爐山在桐廬縣西二十五里遠望山形若香爐然富春山在桐廬縣西三十里一名嚴陵山清麗竒絶號錦峰繡嶺乃漢嚴子陵隱釣處前臨大江上有東西二釣臺龍洞山在桐廬縣西北三十里山中有石洞龍門池流水灌田二百畝清泠山在桐廬縣西北三十里四面出泉雖大旱不竭溉田五十餘頃舊名鍾山唐改今名風穴山在桐廬縣西北四十里山下有穴常有風自中出烏石山在桐廬縣東四十五里舊名白鶴峰上有孫鍾祖基石英山在遂安縣山産白石英唐時以供貢霧山在遂安縣東南二里孤峰峭立為一邑望織女山在遂安縣西南一十里山下有織女祠公山在遂安縣西四十里四山環拱此山獨髙古志載建德縣亦有公山有水浮橘之異今莫詳所在龍耳山在遂安縣西六十里舊名兔耳山山有神號大姥祈禱有應若寇至土人能勝之則神鼓先鳴以示兆洪洞山在遂安縣西南七十里唐時置場於此採銅久廢彭頭山在夀昌縣治西宋祕書郎胡楚材未第時讀書其中楚材詩久容倦行役故山安在哉松篁讀書室水石釣魚臺明月照歸夢清風吹酒杯亭亭籬下菊寂寞為誰開仙池山在夀昌縣南三里一名南山山巔有池鄉民遇旱為機以泄池水溉山下田天將雨則雲霧興相傳池有靈蜃因名仙池宋胡楚材詩峻嶒插天山仙池在絶頂無源水自溢泓澄照天鏡石鼓山在夀昌縣東南七里山有大石以小石投之有聲如鼓邑有災沴則不擊自鳴鄉人候之有驗天井山在夀昌縣南一十里天欲雨山有聲若鍾鼓過浴山在夀昌縣北一十八里下有洞流泉下傾地穴名曰龍潭潭上有龍門中有石室石器之屬其泉冬溫夏凉相傳昔有仙人過此浴故名燕山在夀昌縣東北二十里每遇亢旱有烟霧直上羣燕翔集鄉人視為雨候赤孤山在夀昌縣東二十里有石壁直而孤峻故名巖峝山在夀昌縣東南三十里山有五峰曰華蓋羅帽玉露慶雲景星魏䭾山在夀昌縣西四十里唐李頻及第挈妻歸省其妻過此山見其險隘有倦容頻戲為作詩有魏䭾山前一片花嶺西更有數十家之句四靈山在夀昌縣西四十里麟鳯龜龍四山相向拱挹宋葉義問故居在焉慶雲山在分水縣治東南唐長庭中山上有五色雲現故名玉華山在分水縣治南下有泉色如玉覺道山在分水縣北九里相傳昔有二人入山得道不知所終石壁留其影如道士狀晴日視之宛然因名曰覺道山紫龍山在分水縣西南一十五里上有龍池嵗旱禱雨多應秦遊山在分水縣東南一十七里相傳秦始皇遊天日山庶民於此覲見舊名參秦山唐改今名石柱山在分水縣南二十里二山對峙各有石如桂髙數十丈崤山在分水縣東五十里山頂有池下有葛仙村相傳葛𤣥嘗煉丹於此筆架峰在府城西七十五里五峰峭列如筆架然故名梅花峰在淳安縣南三十里望之若梅花五出紫蓋峰在淳安縣東南七十里其峰亭亭如擁蓋金紫峰在淳安縣東北八十里髙二十餘丈中峰有圓石起數十丈光瑩無草木其旁兩峰若俯每旭日照灼則有金紫閃爍之色上有九隴瀑布泉元洪震老詩白波九道自流雪青玉一峰長挂天獨髙峰在桐廬縣北二十里突然一峰絶頂平坦上有石塔金姑峰在夀昌縣東三里宋傳嵩之詩雲泉落澗鳴秋杼月鏡懸崖理曉容午方嶺在府城東北六十里以在烏龍山之南故名絶頂有金雞窠石穴銅嶺在淳安縣東七十里中有石洞出泉嵗旱祈雨多應乂有田號仙人田白鶴嶺在淳安縣東北一百里相傳漢仙翁方儲乘白鶴駐於此鶴啄出泉以自飲至今名仙鶴泉燕石巖在淳安縣西一十五里穹然如石屋可坐數人俗呼積甲山保安巖在淳安縣東北六十里一名玉笋峰側視如圭正視如筆金雞巖在夀昌縣西六十里昔有異人過此聞石中有雞聲剖石得一物如雞有金色石竅今存千佛巖在分水縣東一十二里相傳昔邑人方子容以母疾鑿山作千佛於此石樓洞在府城西北四十里衆石攢聚如樓靈巖洞在淳安縣東五十里上有千仞峰下有兩水源東曰懸明西曰龍門龍門源水又分為二曰龍泓曰均濟各溉田數頃宋邵晃父子隱居於此所謂雲峰千仞對吾廬是也仙居洞在淳安縣東南五十里連接十數洞皆有一竅可通往來最外一洞有石如龍蟠又有石座上有盆池龍口水注其中仙女洞在淳安縣東北六十里洞口有祠每嵗旱禱之則環山皆雨不及他境乳洞在淳安縣西六十里深可數里泉溜凝結似乳中有石笛石果宋宣和中雷震忽有大石掩洞自是難入又遂安縣亦有乳洞其中異石非一威平