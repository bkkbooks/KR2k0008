body:
  text: 明一統志卷五明李賢等撰永平府東至山海關一百八十里西至順天府豐潤縣界一百二十里南至海岸一百六十里北至桃林口六十里自府治至京師五百五十里至南京凡三千九百九十五里糧四萬五千零建置沿革禹貢冀州之域天文尾分野初虞分冀州東北為營州此即其地商為孤竹國周屬幽州春秋時為山戎肥子二國地秦為遼西右北平二郡地漢末為公孫度所據魏改盧龍郡北燕置平州及樂浪郡後魏改樂浪為北平郡隋改為平州後廢州為郡唐復改平州天寶初改為北平郡乾元初復為平州五代唐以為遼興軍金升為南京天會初復為平州升興平軍元改興平府中統初升為平灤路大德中改永平路夲朝洪武二年改為永平府屬北平布政司永樂中直𨽻京師領州一縣五盧龍縣附郭古肥子國漢為肥如縣屬遼西郡北齊屬北平郡又析置新昌縣隋開皇中省肥如入新昌後為盧龍郡治唐武德初移平州治此改為盧龍縣遼金元俱仍舊夲朝因之編户一十里遷安縣在府城西北四十里漢為令支縣屬遼西郡東漢以後廢遼始於令支廢城遷定州安喜縣民於此置安喜縣金大定中改為遷安縣屬平州元至元初省入盧龍縣尋復置夲朝因之編户一十七里撫寧縣在府城東八十里夲漢驪城縣地屬右北平郡東漢以後廢遼初置新安鎮屬平州金大定末升撫寧縣元至元初省入昌黎縣尋復置省昌黎海山入焉後復析置昌黎縣本朝因之編户一十七里昌黎縣在府城東南八十里夲營州地在平遼二郡間後魏為遼西郡地屬平州隋開皇初置營州大業初罷州置遼西郡唐初復為營州金皇統初為廣寧縣大定間改為昌黎縣屬平州元至元中省入海山縣未幾復置昌黎縣併海山入焉夲朝因之編户二十七里灤州在府城南四十里本商孤竹國漢為石城縣地東漢為海陽縣地晉屬遼西郡後魏因之隋唐為北平平州之境五代時契丹始析其地置灤州在盧龍塞南因灤河而名金元仍為州領義豐樂亭二縣本朝洪武二年以義豐省入編户六十七里領縣一樂亭縣在州東九十里本盧龍縣地唐開元中析置馬城縣五代時契丹屬灤州金大定末又析置樂亭縣元初嘗于縣置溟州尋廢復為樂亭縣屬灤州本朝因之編户二十七里郡名孤竹古名北平秦名盧龍魏名形勝連接邊郡隋地理志山如龍形元和志平州有盧龍鎮山如龍形四塞險固東北雄邦地志集黑肥水之西洞山之北赤山之東方山之南廣二千餘里四塞險固實東北之雄邦也負山帶河為形勝之地遼地理志地連青幽元志風俗人性徑悍習於戎馬隋地理志人尚義勇節儉務農元志孝義為先質朴相染郡志昌黎之俗孝義為先質朴相染勤於栽植趨於稼穡習尚朴茂人好禮讓元樂亭廟學記山川陽山在府城東南一十五里峯巒高聳下多溪谷西有李廣射虎石筆架山在府城南一十五里山顛有石如筆架洞山在府城西一十五里其上産鐵有冶雙子山在府城西北一十五里山有孤竹長君之墓周王山在府城西南二十里灤河中水夾流其下馬鞭山在府城西北二十里山有孤竹少君墓團子山在府城西北二十五里山有孤竹次君之墓灰山在府城東南二十五里上有龍神廟下有龍潭裂坡山在府城西南二十五里下有龍潭歲旱居民於此祈雨北安山在府城東北二十里龍山在府城西四十里燕慕容皓表此山為福地黃臺山在遷安縣南三里山多黃土其狀如臺蟒山在遷安縣東北一十五里山之東有深冗嘗藏巨蟒其山産鐵有冶龍泉山在遷安縣東二十五里山腰有泉號曰聖泉鄉人歲旱於此祈雨團山在遷安縣東二十里山峯團秀逺望如釡曬甲山在遷安縣東二十五里相傳漢李廣出軍於此曬甲都山在遷安縣北一百五十里高聳秀拔羣山莫及上多木材兔耳山在撫寧縣北二里雙峯尖聳狀類兔耳山頂有潭常有雲罩其上大崇山在撫寧縣南一十里臨渝山在撫寧縣境峯巒崛起高千餘仭下臨渝河鏵子山在撫寧縣北一十里茶芽山在撫寧縣二十里山頂有洞中有水如盤號聖水池孤山在山海衛南六里屹然獨立於海上四面皆水石門山在昌黎縣西北五里兩山峙立如門兩山在昌黎縣東北八里兩山對峙鋸齒山在昌黎縣北十五里山形如鋸齒水巗山在昌黎縣北一十五里一名西巗山中有深洞石壁間出泉夏冬不竭道者山在昌黎縣西北二十里上有道者寺因名元宋綱詩兹山介平營特與太古存碣石拱其側水巗何足論東北醫無閭羅列為弟昆碣石山在昌黎縣西北二十里禹貢注云碣石在北平郡驪城縣西南河口之北今平州之南也酈道元言驪城縣枕海有石如甬道數十里當山頂有大石如柱石韋昭以為碣石舊在河口海濵歷世既久為水所漸淪入海已去岸百餘里矣今碣石在平州東離海三十里逺望其山穹窿似塜有石特出山頂其形如柱疑即禹貢冀州之碣石橫山在灤州西四里下有深潭石井巖山在灤州南五里山勢巉巗紫金山在灤州北五里芹菜山在灤州西南一十五里下有陂塘産蓮偏山在灤州西北八十里澗谷逶迤山下多生果木唐山在灤州西南一百一十里上有薑將軍墓赤峰山在府城西四十里上有公孫神康墓雙嶺在遷安縣境內其上舊産鐵尖山洞在撫寧縣東南二十里世傳昔有學道者於此修煉石洞在昌黎縣西八里相傳昔有僧居其中臨石洞在昌黎縣西八十里崖分八字切近深潭由小徑而入其中昏晦既而四壁有孔明朗可愛一名織羅洞龜谷在府城東南二里其形如龜入其中暖氣勃然每嵗過時花卉方凋西山危石在昌黎縣治西三里其石􅍦中撼之即動雖加千人之力亦然故名孟薑女石在山海衛長城北石上有亂杵迹及婦人迹相傳為秦時孟薑女尋夫之處射虎石在府城南八里漢將李廣夜出見虎