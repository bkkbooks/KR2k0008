body:
  text: 明一統志卷五十二明李賢等撰南康府東至饒州府鄱暘縣界二百里西至九江府德安縣界六十里南至南昌府新建縣界一百二十里北至九江府德化縣界五十里自府治至南京一千三百二十里至京師四千七百六十五里糧七萬石零建置沿革禹貢荆揚二州之域天文斗分野春秋為吳楚之地戰國屬楚秦屬九江郡漢為海昏彭澤二縣地屬豫章郡晉屬潯陽郡宋齊因之隋唐屬江州宋太平興國中置南康軍治星子縣元為南康路本朝為南康府領縣四星子縣附郭本漢彭澤縣地屬豫章郡晉以後並因之五代時楊吳置星子鎮屬德化縣因境內有落星石故名宋升為縣屬江州尋置南康軍元仍舊本朝因之編户二十八里都昌縣在府東一百二十里本漢彭澤縣地屬豫章郡晉屬潯陽郡唐初置都昌縣屬浩州尋廢浩州以都昌屬江州大厯間徙治彭蠡湖之東屬饒州宋改屬南康軍元仍舊本朝因之編户五十九里建昌縣在府西南一百三十里本漢海昏縣地屬豫章郡東漢置建昌縣晉以海昏縣省入仍屬豫章隋屬洪州唐初於縣置南昌州尋廢州以縣仍屬洪州宋屬南康軍元升為建昌州本朝仍改為縣編户八十六里安義縣在府城西南二百二十五里正德十一年以建昌縣安義等鄉山賊嘯聚割安義卜鄰南昌依仁控鶴五鄉置為縣以鄉得名編户五十六里郡名星渚以地名匡廬以山名形勝控五嶺而壓三吳滙岷江而瀦彭澤棲賢寺記廬山南國之德鎮梁元帝碑匡廬奇秀甲天下唐白樂天草堂記負匡廬面彭蠡南康志千山擁廬嶽百水會宫亭宋徐俯詩風俗南方之俗其在康哉宋賜南康郡名詔挹先儒淳固慤實餘風宋吕祖謙白鹿書院記俗朴訟稀民貧土瘠宋黃唐謝表山川玉京山在府西七里晉陶潛詩疇昔家玉京指此鳯凰山在府西南一十里水漲山浮若鳯凰然東古山在府西南一十里上有東古寺西古山在府西南一十里上有西古寺雞籠山在府西一十五里傍有二石一赤一青望之如雞籠然山下有潮泉晷刻不差朔望尤大洪井山在府西二十里世傳葛洪煉丹於此廬山在府西北二十里古名南障世傳周武王時匡俗兄弟七人結廬隱居於此故名其山疊嶂九層崇巖萬仞周五百餘里實南方巨鎮也道書為第八洞天山有凌霄獅子諸峯雲覆之其狀尤顯唐李白廬山謠廬山秀出南斗傍屏風九疊雲錦張影落明湖青黛光金闕前開二峯長銀河倒挂三石梁香爐瀑布遙相望回崖沓嶂凌蒼蒼翠影紅霞隱朝日鳥飛不到吳天長宋歐陽修有廬山高詩黃龍山在府南三十里相傳唐廣明中有黃龍見於此龍塘山在府西北三十里峯巒秀拔環抱湖灣象山在府西南四十里以形似名屏風山在府西北四十里丹崖紫壁縈繞磅礴如屏障然鞋山在府北六十里獨立湖水中其形如鞋釣磯山在都昌縣治南相傳晉陶侃微時垂釣於此後得一梭化為龍去石壁山在都昌縣治西南傍臨大江有石如壁劉宋謝靈運嘗居此有石壁精舍詩云昏旦變氣候山水含清暉清暉能娛人遊子淡忘歸大磯山在都昌縣治西一名望仙山頂有平石世傳晉許旌陽拔宅飛升時蘇耽曽於此望焉芙蓉山在都昌縣北一十里其山巒大小相對如芙蓉然陽儲山在都昌縣東四十里居衆山之南謂其陽氣所鍾故名元辰山在都昌縣西四十里道書以為第五十一福地蘇耽曾居此煉丹故又名蘇山龜山在都昌縣北七十里山形偃伏如龜狂山在都昌縣東南八十里晉時有仕宦不逹者佯狂於此故名左蠡山在都昌縣西北八十里臨彭蠡湖東故名華山在都昌縣東北九十里以其突然峭拔高壓衆山擬之太華黃金山在都昌縣東北一百里山頂有龍湫歲旱禱雨多應鳯棲山在建昌縣西一十五里山勢旋伏狀如棲鳯將軍山在建昌縣北一十六里山有樊將軍廟舊名軍山雲居山在建昌縣西南三十里其山紆回峻極上常出雲故名雲居一名歐山世傳歐岌先生得道於此長山在建昌縣西南五十里與龍安山相對宋嶽飛屯兵於此李成屯兵於龍安之北飛望成軍陳勢遂邀之於樓子莊回城山在建昌縣西五十里中有高峯峨然如城郭城門山在建昌縣西八十里山形雙峙遠望如城門中有飛泉溉田甚廣兆州山在建昌縣西南二百一十里崖巘磊落其形如兆下多良田民居有如州郭故名石鏡峯在府西二十六里有一圓石懸崖明淨照人見影隱見無時宋謝靈運詩攀崖照石鏡即此五老峰在廬山五峯如五老相連故名唐李白嘗築居於此詩云廬山東南五老峯青天削出金芙蓉九江秀色可攬結吾將此地巢雲松宋蘇轍詩五老高賢不入城開軒肯就使君迎坐中莫著間賔客物外新成六弟兄紫霄峰在廬山之西昔禹刻石在石室中極深險曩有好事者縋而下摹得百餘字皆不可辨僅有鴻荒漾余乃攆六字可識今石室迷不知處宋朱熹詩此日發高處千巖錦樹稠無人嘲落帽有客賦悲秋忽忽塵中老匆匆物外遊江湖空極目不盡古今愁香爐峯在廬山其形圓聳常出雲氣唐李白詩日照香爐生紫煙遙看瀑布挂長川飛流直下三千尺疑是銀河落九天雙劍峯在廬山與香爐峯相對宋朱熹詩雙劍峯高削玉成芒寒色淬曉霜清腦脂壓眼人高卧誰斬天驕致太平上霄峰在廬山昔秦始皇登之謂其與霄漢相接故名鐵船峰在廬山世傳許旌陽與吳猛乘鐵船二龍挾行戒舟人瞑目勿視至紫霄峰茂林戞擊有聲舟人竊視之龍即委去船墮於此下有艑底池梅仙峯在建昌縣南六十里相傳漢梅福得道之所迎春嶺在府治西與少府嶺相接師林嶺在府西南三十里舊有宋陳凖石室書堂在其下黃石巖在五老峯舊傳黃石公遊息之所雨巗在廬山之南其巖窈而深上有流泉直至巖下以崖石嶄巖又能出雲氣為雨澤故取傅巖為霖之義名之白雲洞在府西四十里洞在山頂白雲常出入其間洞口有白雲菴仙居洞在府北四十五里兩山相翼岡嶺重復並澗而行宛若洞府故名宋錢聞詩仙客神人幾度行環山岌嶪似重城有門不掩寒溪月終日水流無盡聲楚王谷在廬山昔秦始皇并吞六國楚康王避難於此錦繡谷在廬山三春花開紅紫匝地如錦繡然青牛谷在五老峯下世傳道士洪志乘青牛得道於此唐楊衡詩隨雲步入青牛谷青牛道士留我宿南唐時鄭元素亦隱於此屏風疊在廬山自五老峯而下九疊如屏李白詩有一往屏風疊之句一名九疊屏落星石在府南五里湖中舊傳有星墮水化為石高五丈許宋蔣之奇詩今日湖中石當年天上星華蓋石在府北二十里宋朱熹名以華蓋仍書風雩二字刻石上有詩云醉扶藜杖少盤桓四繞煙蘿手自捫此石至今無處問秪應來自太微垣彭蠡湖在府東南一名宫亭一名揚瀾左里一名鄱陽濶四十里長三百里巨浸瀰漫中有鴈泊小湖西接南昌東抵饒州北流入於江禹貢東滙澤為彭蠡是也宋謝靈運詩攀崖照石鏡牽葉入松門三江事多往九𣲖理空存唐李白詩謝公之彭蠡因此遊松門余方窺石鏡兼得窮江源前賞迹可見後來道空存而欲繼風雅豈惟清心魂雲海方助興波濤何足論錢家湖在府治西南昔有巨室錢氏居此傍故名落星湖在彭蠡湖西北湖有小山相傳星墜水所化陳王僧辨破侯景落星灣又宋孟太后過落星寺舟覆宫人溺死者十數惟太后舟無虞皆此處明月湖在建昌縣西四十里其水泓涵澄徹瑩然如月新開河在都昌縣治西宋紹聖間邑宰言都昌邊湖風濤不時請開此河以便舟楫且避大小磯水之湍急修水在建昌縣治南源出南昌府寧縣幕阜山遠而徑達於江故名郭璞云有水名修有魚名鯈天下大亂此地無憂邑人稱為西河帽帶水在建昌縣治前以其映帶於縣之東西故名布水在建昌縣西四十里以歐山有湫澤其湧泄垂流三十餘丈形如曳布故名鸞溪在府西二十五里源出上霄峯昔人以是山有翔鸞展翼之勢因以名溪石鏡溪在府西二十六里金輸峯之側宋李彭詩石鏡溪邊樹金輪峯上雲龍溪在府西南三十里舊有龍溪鎮珠溪在建昌縣東一十五里相傳漢元和間有珠出水中石橋潭在府西一十二里唐陸羽茶經以是水為天下第六龍潭在雲居山真如寺前東西各一歲旱禱雨多應宋蔣之奇雲居謠白雲起於東西之龍潭即此洪井在府北一十八里世傳晉葛洪煉丹處七靖井在建昌縣晉永嘉中旌陽令許遜嘗煉丹於艾城之黃龍山有蛟魅為淵藪輒作洪水欲漂丹室遜擒之釘於石壁還郡時海昏有巨蛇據山為穴吐氣為雲遜誅之法北斗七星每靖置一靖井以鎮之譛曰海昏之地府屬當陽南昌之州龍安之場上繚艾縣古城之岡地連蛇穴侵截川江占其地土防民之殃於今立靖萬古吉祥五井俱在都昌縣境內相傳五代范越鳯過此喜其地合五行故浚之青石井在建昌縣南一百里其水清冷可愛谷簾泉在府西一十里其水如簾布巗而下者三十餘𣲖唐陸羽茶經品其水為天下第一宋王禹稱詩瀉從千仞石寄逐九江船迢遞康王谷塵埃陸羽篇何當結茅屋長在水簾前瀑布泉在廬山開先寺西唐李白詩西望香爐峯南見瀑布水挂流三百丈噴壑數十里歘如飛電來隱若白虹起初驚河漢落半灑雲天裏仰觀勢轉雄壯哉造化功海風吹不斷江月照還空雲液泉在府西三十五里山多雲母石泉甘且清蓋雲母滋液所致故名卓劍泉在建昌縣南四十里廣福觀世傳許遜斬蛇淬劍於此吳猛泉在建昌縣治西方輿勝覽云人有瘡疾或飲或洗皆愈野老泉在都昌縣治南清隱寺山頂水出石罅中清冽甘潔大旱不涸宋蘇軾蘇轍黃庭堅嘗遊此溫泉在建昌縣西八十里四時溫暖患瘡疾者洗之多愈墨池在府西二十五里行龜寺側晉右軍王羲之洗墨於此磨劍池在建昌縣北五里冷水觀前相傳晉許遜斷蛇時嘗磨劍於此愛蓮池在府治後宋守周敦頥鑿池種蓮其中玉澗在府北一十里宋朱熹詩欲把瑤琴過玉溪朗然清夜月明時秪今已是無心久却怕山前荷蕢知西澗在府治西一十八里宋劉煥嘗乘黃犢往來其地山僧結茅以待之因號西澗居士朱熹守郡時作亭其上取黃庭堅詩誰能四十年保此清淨退榜曰清淨退庵蛇骨洲在都昌縣東南一十七里晉永嘉中有蛇長三十餘丈斷道以氣吸人被吞噬者蓋百數許遜有神術率弟子往殺之聚骨成洲蓮花洲在建昌縣西江心五里諺云蓮花到縣前建昌出狀元昭德源在府治北延真觀下宋朱熹詩景幽人迹少惟有此源長水接天池緑花開繡谷香僧間多老大寺古半荒涼却怪尋山客何由到上方陳令塘在都昌縣治南唐咸通初縣令陳可大築以阻潦水石堤在府治南臨大江當舟楫往來之衝風作艤泊無所宋元祐中郡守吳審禮始柵木為障崇寧中孫喬年以石為堤內浚二隩可容千艘歲久浸圯紹興末朱熹來為守歲適歉遂捐金募飢民增築之捍水堤在建昌縣治南唐縣令何易于築縣西二里又有堤乃縣令孫永築土産石斛葛布蛤粉茶石耳俱星子縣出學校南康府學在府治南宋朱熹知軍時建本朝洪武初遷於星子鎮後復舊所星子縣學在府治東南宋紹興間建於府西門外本朝洪武初徙於此都昌縣學在府治東南絃歌坊唐咸通中建本朝洪武初遷縣治東十六年徙於此建昌縣學在縣治西宋崇寧間建於縣治東慶元初徙於此本朝洪武初重建安義縣學在縣治東正德十二年建書院白鹿書院在今五老峯下唐李渤與兄涉俱隱此洞中嘗養白鹿以自娛因名南唐升元中因洞建學館置田以給諸生以李善道為洞主掌其教宋知江州周述言白鹿洞學徒數百乞賜九經使之肄習詔國子監給本傳送久之學廢朱熹因其遺址復修之自為詩賦吕祖謙記云書院之復豈茍云哉此邦之士盍相與挹先儒淳固慤實之餘風服大學離經辨志之始教由博而約自下而高以答揚熙寧開迪樂育之大德則於賢侯之勸學斯無負矣馬融書院在建昌縣正德間知縣周廣建宫室清暉樓在府治西南取謝靈運詩山水含清暉之義重湖閣在府治南前瞰揚瀾左蠡極目湖波與天相接宋蔣之奇詩宫亭彭蠡接揚瀾浩蕩浮空六月寒試問風波何似險高僧只管倚闌干遠明閣在建昌縣治宋元祐中建前揖西山俯瞰修水盡覽江山之秀六老堂在府後廳面五老峯宋郡守趙師夏建愛蓮堂在府治後宋守周敦頥性愛蓮有愛蓮説後人為作堂氷玉堂在愛蓮堂左宋郡人劉渙故居渙字凝之蘇轍嘗曰凝之父子亷潔不撓氷清而玉剛鄉人因以名堂張耒有記直節堂舊在郡治宋徐師回為守因庭有八杉故建堂以直節名之蘇轍為記後朱熹至求其遺迹不存獨廳事南有堂無額而庭中有老柏焉生意殆盡而屹立不僵如志士仁人更歷百變而凜然不衰者因取直節寓之此堂以倣佛前賢之意折桂亭在府西二十里唐李逢吉讀書於此後登進士第故名喚渡亭在建昌縣治南唐白居易謫江州司馬嘗過此賦詩建昌江水縣門前立馬教人喚渡船好似昔年歸蔡渡草風莎雨渭河邊因摘詩中二字名亭宋黃庭堅書於亭中碑刻尚存養生亭在都昌縣治東南唐邑令李稱建於池上春則買魚養於池以供公需張錦亭在府治南宋郡守朱熹建取李白廬山詩屛風九疊雲錦張之義又郡圃有雲錦閣亦取此義壯節亭在府治西宋屯田員外郎劉渙墓前郡守朱熹建并記起亭在府西北二十里下臨卧龍潭郡守朱熹建以為遊覽之所時歲方旱因名曰起以為龍之淵卧者可以起而天行矣真意亭在府治後宋郡守陸德輿建取朱熹梅花詩真意還自在之義玉淵亭在府西北二十里澗中白石如卧羊者不可數計宋張孝祥嘗書玉淵二字石刻尚存潄玉亭在府西一十里宋僧若愚建瀑布泉落龍湫流經於此縈亭而出有如潄玉開先寺僧支石視凡數十接引從寺前流入於湖蘇軾詩高巖下赤日深谷來悲風擘開青玉峽飛出雙白龍亂沫散霜雪古潭搖青空餘流滑無聲快寫雙石谼冷水臺在建昌縣治西晉吳猛遊息之所其地有泉清冷康樂臺在府西二十里康樂劉宋謝靈運封邑名翻經臺在都昌縣西南七里東西有二臺及石壁精舍舊址皆謝靈運舊遊處齊庾臺在建昌縣治東南齊永明中庾肩吾置東臺在府治內宋劉凝之建虛白館在府北二十五里五老峯九疊屏之下有雙澗水交流於前面香爐峯旁有獅子峯後有靈龜峯虎嘯崖麻姑崖列於四隅而館處其中五柳館在府西三十五里即陶淵明栗里故宅關梁三峽橋在廬山歸宗寺為廬山之雄觀宋蘇轍記云水行石間聲如雷霆如千乘車行者震悼不能自持雖三峽之險莫過於此因以三峽名蘇軾詩云吾聞泰山石積日穿線溜况此百雷霆萬世與石鬬深行九地底險出三峽右長輸不盡溪欲滿無底竇忠孝橋在都昌縣北三十里跨忠孝港舊傳宋寺丞陳畦獲罪子代其死故名以旌之雙玉橋在建昌縣治東宋兵部尚書李常建氷玉澗橋在府治東跨氷玉澗宋郡守朱熹建寺觀天寧寺在府治西舊名光孝宋建後改今名本朝洪武初重建歸宗寺在廬山西晉王羲之故宅時僧佛馱耶自西來羲之施宅為寺宋朱熹詩往昔王內史願香有餘煙千年今一歸景物還依然開先寺在廬山下舊傳梁昭明太子棲隱之地萬杉寺在廬山下唐名慶雲院宋景德中僧太超即山植萬杉故名棲賢寺在五老峯下唐李渤讀書處宋陳舜俞有詩新開寺在都昌縣治西南唐時僧馬祖禪師建本朝洪武中重建大果寺舊在建昌縣治東唐大厯間建因寺背有梨嘗結子大如斗因名本朝洪武初建於縣治西法安院在落星石上宋建黃庭堅有詩玄妙觀在府治北宋祥符中建元燬本朝洪武初重修廣福觀在建昌縣南四十里嘗有赤烏來集又名赤烏觀簡寂觀在府西二十三里舊名太虛觀劉宋陸修靜封丹元真人修養於此卒諡簡寂因以名觀承天白鶴觀在五老峯下宋大中祥符中賜名蘇轍詩五老相邀欲上天玄猿白鶴盡疑仙尋真觀在府北二卜五里唐貞元中女仙蔡尋真修煉於此嘗有詩名闌干曲延真觀在府北四十里唐李林甫女騰空所居李白詩羡君相門女學道愛神仙一往屏風疊乘鸞著一鞭祠廟匡君廟在廬山北潯陽記漢武帝南遊祀名山問匡君何神博士對曰昔匡俗得道於此乃賜其號陶桓公廟有二一在都昌縣北三十里一在縣南五里祀晉陶侃也侃諡曰桓宋避諱稱曰威公劉羲仲有記又張齊賢過南廟下作記有經牛眠鶴弔之鄉覩漁釣龍梭之迹之句釣梭石在祠下石刻尚存五賢祠在府學東宋郡守朱熹訪古今名陳士居是邦者得陶潛劉渙渙子恕瓘李常五人建祠祀焉二賢祠在府學內朱熹以周敦頥嘗守是邦為建祠配以二程及熹殁諸生以二程别有從祀止祀周子朱子二賢劉西澗祠在府北二十里西澗宋劉渙號淳熙間朱熹為郡守時建黃庭堅詩棄官清潁尾買宅落星灣身在菰蒲中名滿天地間三賢祠在廬山楞伽寺三賢宋李常蘇軾曾常伯也宫亭神祠在府治東宫亭湖上有神能分風擘浪故為立祠陵墓陶母墓在都昌縣治西石壁精舍之側晉陶侃母也又九江府亦有陶母墓何乾耀墓在府西一十里乾耀唐侍郎後隱廬山劉凝之墓在府北能仁寺側凝之名渙孔文仲墓文仲臨江人仕宋為中書舍人及卒歸葬南康蘇軾拊其柩曰世方嘉軟熟而惡崢嶸求徑直如吾經父者今無有矣孫冕墓在白鹿洞側冕仕宋為史館官張叔夜墓在府治東叔夜宋靖康時為南道總管從淵聖北遷死節歸葬於此謝之艮墓在建昌縣北一百二十里之艮本蜀人避兵居南康仕宋至承義郎纍贈太師加封周國公古迹昌邑城在建昌縣北六十里漢廢昌邑王為海昏侯此其處豫章記城東十三里江邊名慨口昌邑王每乘流東望輒憤慨而還故名慨口孫慮城在建昌縣南一百里慮吳孫權第三子黃武七年封建昌侯居此彭澤縣城在都昌縣北四十五里漢縣屬豫章郡晉陶潛為令治此城左里城在都昌縣西九十五里晉盧循為宋祖所敗自蔡洲南走乃悉力柵斷左里即此地龍安縣城在建昌縣南六十里唐初置縣屬南昌州尋廢為驛梁太子書堂在府西一十五里梁昭明太子統性愛山水嘗棲隱廬山築堂讀書今開先寺即其地李白書堂在五老峯下唐李白嘗至此愛其險峭歎曰天下之壯觀因卜築讀書於此李氏山房在五老峯下宋李常少時兄弟讀書於此蘇軾有記炭婦鎮在建昌縣南一十里晉許旌陽於此化炭為婦散羣弟子以驗其心明日視之皆涅其衣不染者僅十人後人即其地立妙明觀娉婷鎮在建昌縣南六十里唐仙女吳綵鸞曽舞鶴於此故名石屋在府西三十里崖石如屋簷故名三石梁在廬山上長數丈廣不盈尺杳然無底相傳晉仙人吳猛與其弟子躡石梁而度見金闕玉房有一老人坐琪樹下以玉杯盛甘露漿授猛猛弟子竊一寶器須臾雲霧晦𡨕梁化如指猛令送還乃手引諸徒閉目而返唐李白詩金闕前開二峯長銀河倒挂三石梁即此醉石菴在府西南三十里菴左有巨石晉陶潛醉卧其上故名陳舜俞詩是非分付千鍾裏日月消磨一醉中卧龍菴在府西北二十里蒼崖四壁怒瀑中㵼大壑淵深有黃石數丈在激浪中若蜿蜒飛舞故名卧龍宋朱熹作菴其旁欲以休隱乃繪諸葛亮像於中自為記夀松在建昌縣北五里冷水觀一名挂劍松古老相傳許遜曾挂劍於此其松盤屈奇怪宋寶慶初知縣曹豳創亭匾曰千歲靈根又於門外榜曰煙蘿勝景嘉定間縣丞李鴻漸刻圖於石夀樟在建昌縣治南宋黃庭堅記項安世作夀樟亭記初邑人李左司公懋仕於朝高宗嘗問樟公安否奏以枝葉婆娑四時常青何萬幾之暇眷眷乎遐方一樟哉必閭閻纎悉轉而上聞抑念世家仁及此木也紹定間縣令陳文孫刻圖於石名宦唐何易于會昌中攝建昌縣令政教有方築隄防水家給人足民歌之曰我有父何易于昔無儲今有餘陳可大咸通初都昌縣令因纍歲水潦築長隄障之百姓便焉號曰陳令隄孫永咸通初為建昌令築隄以捍水患而造橋以渡民甚便之邵師裕咸通中建昌縣令為政以德邑人感之以德政名其鄉鄰境之人慕之多來歸附又以卜鄰名鄉取王翰願卜鄰之意也五代朱弼仕南唐為廬山國學助教動持禮法每升堂講釋生徒環立各執疑難問辨鋒起弼應聲解説莫不造理以故諸生咸服四方肄業者多造焉廖凝仕南唐宰都昌縣以亷自守秩滿題詩修江寺云五斗徒勞更折腰三年兩鬢為民焦今朝解印吟歸去還挈來時舊酒瓢宋洪沂慶厯初知都昌縣教民以陶瓦代竹民安物阜政事一新邑人為立坊名曰新政周敦頥熙寧間知南康軍興學善俗民從其化士宗其學因家廬山蓮花峯下前有溪合湓江因取營道所居濓溪以名之魯有開知南康軍有善政時行新法及代還王安石問江南如何有開曰法新行未見其患當在他日也安石不悅程師孟知南康軍為政簡嚴罪非死者不以屬吏發隱摘伏如神陳舜俞知山隂縣青苗法行舜俞不奉令且上疏自疏奏上責監南康軍酒稅五年而卒在軍多所題詠徐師回元豐中知南康軍性耿直設施有條公暇建堂植八杉號曰直節曰吾欲守節如此杉之直又建亭於明月泉上曰吾欲守亷如此水之清朱熹淳熙中知南康軍興利除害值歲旱講求荒政多所全活民無流殍間詣郡學引進士子與之講論又奏復白鹿書院以養士居官俸餘輒發以修葺書院善政不可殫記曽集紹熙間知南康軍勤理庶務首慕先賢劉渙之為人修其墓亭礲石以培其封割公田以奉其祀朱熹稱其有尊賢尚德之心陳宓嘉定間知南康軍歲大侵蠲其賦十之九會流民羣集宓就役之築江隄而給其食又重修二賢祠時造白鹿洞與諸生討論由是文風大振張虙知南康軍剖決滯訟衆皆悅服前守陳宓以錢七千緡置濟民庫為築城費虙不取贏於民而經營以成其事張洽白鹿書院長選好學之士日與講説而汰其不率教者凡養士之田乾沒於豪右者復之趙師夏嘉定間知南康軍奏以星子縣請佃稅錢對補上供撥梅洞寺田及魚池入兩學立三縣社倉善政甚多趙與􅾮景定間知南康軍覆實社倉復還原額修軍學兩祠堂繕治城池造軍衣弓矢旗幟等器百廢具興劉傅漢咸淳間知南康軍首行淳熙荒政捐已俸以賑貧節用買田置惠民倉撥廢寺田榖助星子月解軍糧創白鹿洞貢士莊修流澌橋愛民重士興利補弊善政為多元陳炎酉至正間南康路總管修白鹿書院作興學校歲荒賑飢給種子牛具使之耕招集流亡四萬餘户有麥秀兩岐之瑞民立生祠祀之范祥卿至正間都昌縣丞首詢民瘼盡心撫字值歲歉勸分以濟貧困旱禱雨雨立至政成民阜民咸稱之孫天民至元間南康路總管亷潔平恕嘗捐俸以修學宫學田之侵於僧道者理而復之本朝吕明甲辰年知南康府時兵戈初息流民四散明孜孜愛民招撫有方躬循田野以督耕桑民有鬬者訓之以義而諭之以法自是民皆感化無敢強梗者朱敏洪武五年以監察御史改知星子縣興學勸農奏減稅糧茶貢後遷代去任民多思之省志李守中洪武中知府事亷潔自持辭常祿弗受薪水之外一毫不取於民省志林仕敏洪武中由郎中知府事文學政事皆擅名一時歷任既久民心愛戴去後有甘棠之思省志楊升秉性淳厚洪武間任星子教諭學問該博訓誨嚴明擢邵武教授去後門人立祠祀之省志胡龍洪武間由進士任星子知縣亷勤公正疏食布衣除革吏弊民深服之後擢監察御史省志卞同洪武末知都昌縣撫牧有道以政聲著聞擢知河南府唐冕永樂初知星子縣剛介亷明時邑民少田多荒蕪冕奏請召鄰府縣無産者入縣闢田得數百家撫恤各得其所楊鐸永樂末知星子縣撫字有方他郡之民挈家來歸者四百餘家劉麒由進士擢御史宣德初知府事作新士類勸課農桑政治聿興士民仰戴省志翟溥登進士任員外郎正統間守南康崇儒學教民務稼穯重建六老堂白鹿書院修築石堤凡有興作不費民財民德之從祀二賢祠省志孔鏞由進士景泰間知都昌縣事撫字有方吏民畏服省志陳敏登進士景泰中由通判知南康府秉公持正翊善鋤強復社倉修石堤建白鹿書院百廢具興民不告勞郡人思之從祠二賢祠省志何濬成化初知本府時大旱移檄鄰郡貸米萬斛以給飢民全活者衆興學勸農政教兼舉省志吳紳成化間知都昌縣事宅心平恕為政有方興利革弊民皆向慕省志許顒成化間以太僕寺丞擢知府政令嚴明開河道以通商旅實義倉以備荒歉聿修文廟禱雨輒應省志曹凱由進士任給事中升參政以言事左遷衛經歷尋擢南康知府豈弟慈祥亷明剛果剖決如流囹圄空虛積粟備荒招集流散編户日增府治為之一新省志王珀𢎞治間謫知都昌風節猶存政平訟理民懷吏畏省志劉定𢎞治間擢守南康府知大體謹細行執法無私興學校建書院有循良風殁於官百姓哀之省志劉章正德間擢南康知府為政公勤操持清慎建府治不費公帑民爭尤趨之卒於官士民感愴今從祀名宦祠省志流寓黃鳯麟其先江夏人徙家建昌鳯麟好學能文以德行稱舉進士纍遷侍御史比部員外郎有文集十卷李渤洛陽人與兄涉俱隱廬山白鹿洞唐元和中以右拾遺召不拜韓愈遺書有景星鳯凰爭先快覩之語後起為諌議大夫屢以言斥而氣節不少衰陳貺閩人徙星子志操朴古而不茍於仕進一卧廬山三十餘年學者多師事焉南唐時以幣致之欲授以官固不受賜粟帛遣還舊隱鄭元素京兆人少習詩禮五代時避亂南遊隱居廬山青牛谷四十餘年會集古書殆至千餘卷元素溫韜甥也自言韜發昭陵石函中有鐵匣悉藏前世圖書鍾王墨迹韜悉取之韜死元素得之為多伍喬廬江人性嗜學南唐時入廬山國學苦勤自勵一夕見人掌自牖入中有讀易二字喬因取易讀之探索精微逮數年出與郡計及春試畫八卦賦喬中第一纍官考功郎柳宏建人宋咸平間舉進士知江州德化縣過廬山愛羡不已官至九卿志樂肥遁故卒歸隱焉劉渙本筠州人天聖間進士纍官潁上令以剛直不能事上官棄去歸隱廬山歐陽修高其節作廬山高詩以美之渙居廬山三十餘年環堵蕭然而超然無戚戚意陳瓘沙縣人宋熙寧中為右司諫坐論蔡京父子謫居南康吟賞諷詠寵辱俱忘號了翁人物晉幸靈建昌人性寡言父母嘗使守稻羣牛食之不驅牛去乃理其殘亂者曰萬物各欲得其性耳後為人療疾去妖怪輒有驗賴濟者甚衆不取報謝為人性恭儉見人即先拜言輒自名行不騎乘長不娶晚年始娶妻畜車馬云周續之豫章建昌人豫章太守范寧於郡立學招集生徒續之年十三詣寧受業居學數年通五經五緯名冠同門既而間居讀易老入廬山與劉遺民陶淵明為潯陽三隱南北朝司馬皓建昌人仕陳為大中大夫性至孝母病亟禱於先祠願以身代死母果得痊又司馬延義為從事中郎性亦至孝每遇朔望詣墓哭奠始終如一唐張懷約建昌人初仕隋官至學士後歸唐以為溫州司馬懷約幼有令名鄉人宗其德行尤博學強記文詞典麗講三禮三傳出諸儒之右性尚間雅後隱於當陽山莫知所終郭元靖建昌人才兼文武隋末興兵保衛鄉閭後歸於唐以功纍官虔撫吉三州司馬衡州長史以亷謹稱所在有政績徐元之建昌人幼潁悟博通經史年十七第進士纍遷監察御史諫議大夫出為湖州刺史遷邠王府長史改曹州刺史卒有文集十卷宋洪文撫建昌人本姓殷避諱改焉曽祖諤唐虔州司倉參軍子孫衆多以孝弟著稱六世同居宋至道中賜其家御書百軸文撫遣弟文舉詣闕謝太宗飛白一軸曰義居人以賜之命文舉為江州助教又旌表其門陳巽星子人博學敦行義大中祥符間登進士兩為節度推官再作劇邑一為郡二後典蘄黃二州所在有政績官至太子賔客劉恕渙子居星子博學能文未冠舉進士調巨鹿主簿遷和川令司馬光修資治通鑑薦恕兼修史事尋以親老求監南康軍酒以就養許即官修書官至祕書丞劉羲仲恕子性敏博學素以節操自持恕沒後通鑑成追録其勞乃官羲仲政和間欲編逸史自汝州儀曹召為編修自宰相以下皆不造謁未幾致仕歸廬山弟和仲有超軼材作詩自成一家為文慕石介李常建昌人皇祐間舉進士熙寧初為右正言時王安石方更法常言其不便哲宗時上言七事拜御史中丞少與兄弟讀書廬山白石僧舍既擢第留所抄書萬卷於室名曰李氏山房蘇軾歎為仁者用心為記其事云陳篆星子人宣和間登進士歷任州縣所至有聲子凖以廕補官年五十餘即挂冠歸有别墅在石屋間朱熹為扁石屋書室凖二子秬為江夏令築隄捍水民德之終池州倅秠力學不倦秬子畦為靖州判官李公懋建昌人建炎初進士纍官江西提學召對陳五事擢監察御史高宗駐蹕建康大臣請還臨安公懋力排秦檜以為不可疏三上不報出為湖北提刑徙福建潼川剛直無私終湖南漕黃灝都昌人父唐髮為平陽丞亷正而通達灝幼頴悟書史過目終身不忘隆興間舉進士歷知常秀州修救荒之政終廣西轉運判官初朱熹守南康時灝質疑問難熹沒黨禁方嚴灝單車往赴不少怵卒諡文簡有西坡集四十卷李燔建昌人紹熙初進士授嶽州教授末上往建陽從朱熹學及至嶽州教士以古文六藝改襄陽教授熹沒學禁嚴燔率同門往會葬後以直祕閣主管至道宫卒諡文定孫鑣登進士第曹彥約都昌人父興宗紹興間舉進士歷州縣有聲彥約天資頴異嘗從朱熹講學淳熙間舉進士纍官至兵部尚書平生以建立事功為務在朝多所建明卒諡文簡兄彥純弟彥繼子士况士衮士冕皆有時名彭尋都昌人文行為鄉里所推人稱曰東元先生弟蠡天資頴敏朱熹守南康蠡質疑問難甚精以經學名世號梅坡先生子方舉進士官至吏部尚書卒諡文定馮椅都昌人性敏博學受學朱文公紹熙間舉進士官至江西運幹既而家居授徒所著易書詩語孟太極圖西銘輯説孝經章句喪禮小學孔子弟子傳讀史記及詩文志録合二百餘卷今祠於學馮去非椅子淳祐初進士仕為宗學諭丁大全為左諌議大夫三學諸生叩閽言不可下詔禁戒詔立石三學去非獨不肯書名碑下未幾以言罷歸舟泊金焦山有僧上謁致大全意願遽歸少俟收召去非奮然正色老夫今歸廬山不復仕矣絶之不與言周秬星子人博雅好古淹貫經史諸子百氏之書工於詩賦後集朱文公語録類為别集以詔後學學者宗之李成大建昌人舉進士德祐初知金壇縣元兵至與戰不勝吏民脅成大降乃潛與胡用存謀復金壇事泄繫獄榜掠不屈遂殺其二子以懼之終不屈笑曰子為父死臣為君死卒殺之詔贈直祕閣諡忠節江萬里都昌人入太學有聲理宗時為賈似道宣撫參謀以峭直見忌度宗時拜右相嘗請益師往救襄樊似道不應力求去歸鄉里元兵至萬里赴水死詔贈太師益國公諡文忠弟萬頃以南劍知州家居亦被執罵賊死陳澔都昌人號雲住潛心禮學所著有禮記集説行世元燕公楠建昌人十歲能屬文居父喪廬墓元初同知吉州路世祖召對稱旨命僉江淮行尚書省事令民墾廢田勸導有方除大司農領八道勸農營田司事按行郡縣興利除弊後纍遷湖廣行省右丞黃異灝之裔少好學讀書於白鹿洞至元間舉進士為廣東惠州學録後升道源書院山長元季兵變隱居不仕自號節庵有詩集三十卷本朝于光都昌人磊落有大志元末兵起光歸本朝從征九江戰鄱陽降武昌皆與有功纍官鷹揚衛指揮使從徐達擒張士誠下山東取汴梁克陜洛移守鞏州王巴拜襲蘭州光帥兵援猝遇敵戰敗被執使呼蘭州降光大呼曰公等堅守大軍至矣敵怒遂遇害詔配享功臣廟余鼎星子人永樂初登進士授翰林修撰博學能文與修高廟實録及聖學心法遷侍講洪熙初致仕自號南坡有文集若干卷邑人即學宫祠之魏源建昌人永樂中進士纍官河南左布政使時歲飢民流源賑給有方流亡盡歸正統間歷升刑部尚書剖決如流獄無寃滯嘗往西北督察邊防邊將莫不畏服為人器識宏逺立朝侃侃有大臣體黃珏星子人少端重勵行涉獵子史百氏洪武中聘為星子訓導歷安東東阿教諭典陜右文衡才名為時所重省志廖敏星子人洪武中鄉試選入內閣修永樂大典任刑部主事宅心公恕讞獄明允為時所重省志殷革星子人由監生歷官知松江府清慎自守政聲大著母喪服闋復知南雄時梅嶺險峻行者艱阻乃募民疏鑿通衢民至今便之後致仕卒於家省志盧翰星子人登永樂甲申進士改翰林庶吉士與二十八宿之選修永樂大典歷代名臣奏議官至吏部主事省志黃維星子人永樂間由舉人任餘姚知縣政尚簡易務修學校民有健訟者遣入社學久之化為善士以母喪歸民計服闋先詣闕請復知餘姚六載考績民脫履留之未至京卒省志胡新建昌人永樂辛丑進士任知縣御史副使按察使所在有聲志省邵嵩都昌人永樂辛丑進士授御史歷按廣東河南隨扈從山東討武定州及漢府有功省志陶偉星子人由監生授吏科給事中遇事敢言不避權勢升福建按察僉事按治郡邑吏畏而民懷之省志胡璉建昌人由監生授監察御史升山東按察使才德俱優政聲大著省志柳芳都昌人由進士歷官刑部郎中讞獄平恕升湖廣參政尋調山西所至有政績時論歸之省志曹崇建昌人由監生授吏科給事中德不回言論悉當擢陜西按察使風紀振肅省志葉瑾星子人少孤資性穎敏既長以詩領宣德乙卯鄉薦歷儒官三十年所至訓迪有方人才輩出致仕卒於家省志劉衢星子人榮祖之子由鄉舉任長寧教諭性最仁孝宣德間舉家罹疾母將危求以身代一夕焚香籲天割股烹粥啖之母病瘥鄉人以劉孝子名之省志朱讓星子人景泰間由舉人授御史遇事敢言不畏權勢出按廣東肅振百僚尋升大理知寺多惠政以疾辭卒於家省志黃暉建昌人景泰辛未進士任給事中賜一品服奉使滿刺國官至廣西僉事綽有政聲省志梁崑星子人家嘗罹疫舉家逃避弟病危衆諭使棄之出避崑曰如崑去弟誰視湯藥竟不去人以友愛稱之後由監生授建平訓𨗳升光山教諭卒於家省志黃玄建昌人登成化丁未進士任翰林檢討端謹修飭後以母老終養不出平居手不釋卷杜門不涉公事恬退雅操終始無失德省志余濓都昌人登𢎞治癸丑進士歷監察御史出按遼陽屢上疏極諌謫武進令尋參畫征勦蘇松海冦擢蘇州府同知省志列女宋馮孝女諱素真星子人父病割股療之病即愈郡守陸德輿大書以表其墓省志長孫氏星子揚遺直妻生四子曰發假收嚴遺直客死姑蘇子皆幼長孫氏攜骨歸葬廬山親授子五經後俱擢第發官至嶺南節度使假為常州刺史收至宰相嚴為翰林學士省志吳孝婦都昌人夫早亡無子寡居事姑孝姑老且病欲贅壻以資養吳泣曰女不二夫妾志也自能供侍姑從之嘗傭於鄰家獲錢以具養姑年老目翳嘗取所飲食誤頓不潔處吳外出還見亟借鄰食饋姑滌汚者自食一夕吳夢兩童子引叩天門謁帝勞問賜酒錢養姑自是家資日裕姑目復明省志王氏建昌人適本縣董易之子少喪夫無後以死自誓婺居四十餘年終始不渝省志董氏建昌人董易之族女適同邑張漢臣之子早寡無子而守志不渝兄母欲奪其志不從卒合葬於夫墓生連理木人以為真節之感省志李氏劉安雅母生安雅未及百日夫汝霖卒家極貧誓不負所天七十餘年一節終身省志胡氏建昌人踰笄嫁宋冀王九世孫希愈六年而寡無子毅然守志終身省志元李氏建昌人黃時清妻年二十喪夫生子璨六歲鞠育教誨以至成立年七十餘青燈敗帷不易其操有司以事聞旌其門省志黃氏星子人余鶴年妻鶴年以哭弟而卒年二十七黃孀居誓不再適子宗甫四齡清苦撫育卒以經明行修薦年至八十大學士尹直表其墓省志甘清秀星子人甘孟珊女年十五正德間值逆濠變賊入境清秀隨母逃避賊虜其母清秀義不辱即投玉京潭而死賊退其尸浮水如生里人收葬於山前省志查氏梅氏星子錢家二妯娌也查夫孟昭梅夫孟琳俱以節終省志仙釋葉千韶晉建昌人有道術辟穀服氣嘗獨居忽有一白衣人言君道德臻備仙籍褒升當在人間役使鬼神其後能立致風雨驅雷電救人疾疫其應如響不知所終云談紫霄泉州人有道術事王昶封正一先生閩亡寓廬山棲隱洞其徒百餘皆禁沮鬼魅禳祈災福南唐後王召紫霄至建康賜之道號紫霄皆不受後無疾卒人謂之尸解歸葬之日有祥雲白鶴盤繞送之周顛仙郡人長身奇貌少時病顛狂持瓢乞食於市因號顛仙國初上親征陳友諒至南昌顛仙來見隨至京自謂入火不熱上命覆以巨甕積薪燔之火盡揭視端坐自若寓蔣山寺半月不食寺僧以為言上召之步趨無異平時嘗以手畫地作大圈曰破一桶成一桶矣時友諒圖南昌上復征之顛仙從行至馬當見江豚戲水曰水怪見損人多上怒其妄語投之江中明日復來見乃縱之廬山上後親為文勒石廬山紀其事九江府東至直𨽻池州府東流縣界三百里西至湖廣武昌府興國州界二百里南至南康府星子縣界五十里北至湖廣黃州府黃梅縣界九十里自府治至南京一千二百六十里至京師四千六百里糧四萬石零建置沿革禹貢荆揚二州之境天文斗牛分野春秋時為吳楚地秦為九江郡地漢初屬淮南國尋分屬豫章郡文帝時又分屬廬江郡東漢末其地南境入吳屬彭澤郡北境入魏屬廬江郡後盡入吳屬武昌郡晉為武昌鄱陽豫章三郡地永興初置潯陽郡於此屬江州梁移江州治湓城即今府治隋初廢郡後改州曰九江郡唐復為江州天寶初改潯陽郡乾元初復為江州五代時楊吳置奉化軍節度宋降為軍事𨽻江南東路建炎初升定江軍江西安撫司治此元置江州路本朝改九江府領縣五德化縣附郭本漢潯陽縣屬廬江郡晉永興初置潯陽郡永嘉初以九江縣省入後省潯陽入柴桑梁又析置汝南縣隋省郡及汝南柴桑二縣復置潯陽縣後改曰彭蠡大業初置郡改曰湓城縣唐初復改曰潯陽縣五代時南唐改為德化縣宋元仍舊本朝因之編户一十七里德安縣在府城南一百五十里本漢歷陵縣地屬豫章郡王莽改曰蒲亭東漢復曰歷陵梁省入柴桑縣隋為湓城縣南境唐為蒲塘場五代時楊吳升為德安縣屬江州宋元仍舊本朝因之編户一十八里瑞昌縣在府城西九十里漢時地在柴桑之北潯陽之西三國吳有赤烏之瑞名其地曰赤烏唐初為潯陽縣地建中時立為場南唐升為瑞昌縣屬江州宋元仍舊本朝因之編户一十一里湖口縣在府城東六十里本劉宋時湖口戍上據大鍾傍臨大江齊梁陳皆為鎮後廢唐復置鎮南唐升為湖口縣屬江州宋元仍舊本朝因之編户一十七里彭澤縣在府城東一百里漢置縣屬豫章郡梁屬太原郡隋置龍城縣屬江州後復改彭澤縣屬九江郡唐初於此置浩州後廢州以縣屬江州宋元仍舊本朝因之編户一十八里郡名潯陽晉名九江隋名形勝左匡廬右江湖唐白居易集陸通五嶺勢拒三江九江志左挾彭蠡右傍通川陸通五嶺勢拒三江襟帶上流乃西江之重鎮南面廬山北背九江圖經縈以三湖帶以九江宋支賦山亞五嶽江比四溟東林寺記據江湖之口衝要之地宋吕誨奏劄江東西襟喉之地元史李黼傳西據彭蠡北跨海門彭澤縣志西據彭蠡北跨海門前拱文筆之峯右繞小孤之水形若環椅勢如聯屏江右咽喉之邑也風俗民尚朴實崇興禮讓九江志士習詩書農勤稼穯同上儒風相續唐白居易云廬山自陶謝洎十八賢已逺儒風綿綿相續不絶高人間士蟬聯不絶宋余靖崇勝寺記人性淳朴民俗恬靜郡志山川廬山在府城南二十五里古南嶂山也周武王時有匡俗兄弟七人皆有道術結廬於此故名山之南為南康山之隂為九江其東南有五老峯唐李白詩廬山東南五老峯青天削出金芙蓉九江秀色可攬結吾將此地巢雲松高良山在府城西高聳秀拔為諸峯之最昔有高良氏世居此山因名鞋山在府城南四十里彭蠡湖中望之如鞋因名龍門山在府城西南五十里與落拖山相對如門瑞昌所出湓水自此二山間過至大江大孤山在府城東南彭蠡湖中東南與都昌分界四面洪濤屹然獨聳上有神祠過者必致祭焉唐顧况詩大孤山盡小孤出月照洞庭歸客船靖居山在府城西南六十里昔有姓傅者獵此山射鹿墮胎而斃其人遂折弓矢修道因名山曰靖居柴桑山在府城西南九十里寰宇記柴桑近栗里陶潛此中人雞籠山在府城西山有石雞冠距如生有道士李鎮常玩之雞一旦自毁鎮曰吾其死矣果然吳章山在府城東過此即南康府界義豐山在德安縣治南有義豐亭邑人好義聚居如陳王梅鄭多至千口人謂此山之應博易山在德安縣南一十二里漢書豫章歷陵縣有博易山注云古文以為敷淺原根盤三十里奇峯疊秀為一邑之重鎮望夫山在德安縣西北一十五里方輿記昔人行役未回其妻登山而望每登山輒以箱盛土積日纍功漸高峻故名石鼓山在德安縣西北四十里每天隂輒聞鼓聲因名葛洪山在德安縣北四十里晉葛洪嘗遊此史君山在德安縣西北四十里唐江州刺史李渤作讀書堂於此因名崑崙山在德安縣西北一百二十里昔王子喬於此朝斗因取道經下覆崑崙之語名之亭子山在瑞昌縣治西相傳宋蘇軾赴黃州經此題詩石上以墨灑竹至今有斑後人為結亭名曰東坡故山名亭子蘇山在瑞昌縣治西北昔蘇耽沖舉於此因名羊腸山在瑞昌縣西北三十五里宋何宋英詩羊腸有路地多險馬脊無人天一隅甪山在瑞昌縣南四十里相傳漢甪里先生嘗遊此馬脊山在瑞昌縣西北五十里以形似名清湓山在瑞昌縣西七十里巍然為羣山之表湓水源此書堂山在清湓山西昔王喬嘗讀書於此山有石房房壁有墨朱迹赤顔山在順昌縣西北一百二十里相傳赤松子嘗遊此因名其山與玉華洞相連石鍾山在湖口縣有二上鍾山在縣治南下鍾山在縣治北其石視上鍾尤奇酈道元謂下臨深潭微風鼓浪水石相摶聲如洪鐘宋蘇軾嘗遊此有記石門山在湖口縣治南兩崖對聳形如門闕當雙石間垂流數丈晉謝靈運詩晨策尋絶頂夕息在山棲疏峯抗高嶺對嶺臨洄溪幞頭山在湖口縣南二里與上鍾山相連峯巒秀拔狀若幞頭彭城山在彭澤縣治東有古城相傳彭越逃此因名小孤山在彭澤縣北九十里宋歐陽修云江南有大小孤山江側有彭郎磯云彭郎者小孤壻也余嘗過小孤山廟像乃一婦人而勑額為聖母豈止俚俗之謬哉劉阮詩擎天有八柱此二柱仍存石聳千尋勢波流四面痕江湖中作鎮風浪裏盤根平地安然者饒他五嶽尊鳯凰山在彭澤縣治西山下有讀書巖巗右有潛玉洞龍山在彭澤縣東南三十里梁尉文光修煉之地松壇石室丹竈遺迹具存仙迹山在彭澤縣東四十里上有巨人迹馬當山在彭澤縣東北四十里橫枕大江山象馬形橫風撼浪舟船艱阻人為立廟唐王勃舟過其下遇神人賜以順風一夕至洪都作滕王閣序陸魯望銘云天下之險者在山曰太行在水曰吕梁合二險而為一吾又聞乎馬當石壁山在彭澤縣南四十里一名玉壺洞宋有客題詩云洞前流水碧於苔洞口桃花撲面開轉頭望斷意不斷長嘯一聲須再來時縣僚祈雨於此見墨迹未乾亟追之不得疑仙云黃漿山在彭澤縣東南四十五里疊石如甃上下有二洞深邃莫窮歲旱禱雨輒應宋黃鵬舉詩清泉徹底瑩無泛喚作黃漿恐未宜若見洞仙還寄語佳名當換碧琉璃浩山在彭澤縣東九十里唐李大亮擇彭澤山之高者莫若此山因名浩山而立浩州焉雙劍峯在府治西兩峯屹然壁立如劍與府相直蓮花峰在府城北三十里望之如芙蓉因名下有杏林晉董奉隱此香爐峰在府城西南五十里峯形圓聳氣靄氤氲若煙故名唐李德裕望匡廬賦輕煙冒於爐峯若香散於空谷南有巨石如人故又名石人峰上霄峯在廬山上有石室石梁瀑布秦始皇嘗登此謂與霄漢相接故名有禹刻及秦皇漢武刻語太史公亦嘗登此石耳峰在府城南六十里傍聳雙峯若耳宋洪芻詩朝踏紅塵暮宿雲往來車馬謾紛紛猴溪橋下潺湲水惟有峯頭石耳聞大林峯在府城西南六十里有新羅巖雞冠石飲牛池晉謝靈運詩積峽忽有起平途俄已絶巒隴有合沓往來無蹤轍擲筆峰在大林峯北晉釋慧遠於此製涅槃經疏成因以名峯有㵼油定心石上有文殊巖下有十八賢臺慧逺與同社諸賢嘗憩於此天池峯在府城西南六十里嘗有神燈之異內有錦繡谷即逺公種藥處石鏡峯在府城西南七十里有石鏡隱見無時晉謝靈運詩攀巖照石鏡唐李白詩間窺石鏡清我心謂此康王谷在府城西南六十里楚康王嘗隱此故名內有水簾洞宋王禹稱序略云康王谷為天下第一水簾高三百五十丈計程且一月矣其味不敗取茶煮之浮雲散雪之狀與井泉殊絶陸羽留題有㵼從千仞石寄逐九江船之句王𢎞岡在府城西南九十里晉王𢎞遣白衣送陶潛酒處王喬洞在瑞昌縣西二十五里昔仙人王喬嘗經此因名玉華洞在順昌縣西七十里洞有仙迹泉湧如雷唐僧以洞中獲磬與錢皆漢物宋趙汝馭詩唐僧逢漢寶山洞得天名垂魚洞在彭澤縣西南五十里洞深逺莫窮有小溪西南流入巴水有石如魚垂在洞中又有石橋石乳潯陽江在府城北源自珉山至此下流四十里合彭蠡湖水東流入海唐白居易詩九𣲖繞孤城城高生逺思皇甫冉詩長江九𣲖人歸少寒嶺千尋鴈度遲龍開河在府城西源發瑞昌縣清湓鄉東由大江逆泛為鶴問湖便於舟楫世傳古有龍開此河因名甘棠湖在府城南一名景星湖唐刺史李渤築隄於湖之陽人不病涉遂名李渤湖張洪靖以方召伯故又名甘棠湖鶴問湖在府城西一十五里世傳陶侃擇地葬母至此遇異人云前有牛眠處可葬言畢化鶴而去因名宫亭湖在府城東南九十里一名彭蠡湖十道志云湖神能分風上下宋秦觀宿湖邊惜竹軒夢神女贈詩曰不知水宿分風浦何似秋眠惜竹軒聞道文章妙天下廬山對面可無言赤湖在順昌縣東北二十五里湖中有石沃山世傳赤松子嘗遊此下巢湖在瑞昌縣北四十里相傳巢父嘗經此因名母鯉湖在彭澤縣南一十五里昔李氏母病思魚其子於此得魚供母病遂愈因名濓溪在府城南一十五里自廬山西流合龍開河入江宋儒周敦頥嘗寓此因取其故里之號名之敦頥詩潺湲來數里到此始澄深有龍不可測岸木寒森森吾樂蓋易足名濓朝暮針虎溪在府城南晉僧慧逺送客過此虎輒號鳴因名道書以虎溪山為七十二福地之一瀼溪在瑞昌縣南唐元結嘗居此自號瀼溪浪士其詩云尤愛一溪水而能存瀼名湓浦在府城西源出瑞昌清湓山亦名盆水相傳昔嘗有人此處洗銅盆水忽瀑漲失盆投水取之見一龍銜盆奪之而出故名盆水唐韓愈詩湓城去鄂渚風便一日耳不枉故人書無因泛江水射蛟浦在湖口縣治西南一名黃牛浦昔漢武帝自潯陽浮江親射蛟江中獲之疑即此地宋蘇轍詩萬騎巡遊遍千帆破浪輕射蛟江水赤教戰越人驚浪井在府治內世傳漢灌嬰穿此井湓江有風井水輒動唐李白詩浪動灌嬰井潯陽江上風蟹口井在瑞昌縣治內世傳郭璞相地形似蟹因名蟹口其左右有二井又名蟹眼龍泉在府治北晉僧慧逺結庵於此無水以杖刺地泉湧既而歲旱逺師誦龍王經於泉上俄有龍起雨乃大足故名神泉在廬山宋紹興中皇甫履賜隱廬山高宗名其所居曰清虛菴光宗在東宫日嘗問履山中所乏履曰但水差遠光宗因大書神泉二字遺之云持歸隨意鑿一泉履歸於菴側穿一小井方施畚鍤而泉已湧湯泉在廬山唐白居易詩一眼湯泉流向東浸泥澆草暖無功驪山溫水因何事流入金鋪玉甃中卓錫泉在府城南東林寺後晉慧逺卓錫於地曰此地若有水吾當居之泉遂湧出東佳泉在府城西北東佳山下一名紫巖泉山有巖洞甚深廣昔有人秉火入洞至一巨澗不可渡而止其泉有上下二竅上竅流則下竅乾絶下竅流則上竅乾絶三日一周白家池在府治西唐白居易鑿以養魚種荷有詩云已被山中客呼作白魚池嶽飛池在府治東南宋嶽飛守鎮時鑿久湮今按察分司街是其處蓮花池在府治南周敦頥所鑿有愛蓮説九曲池在湖口縣南三十里晉陶潛宰彭澤時所濬暇日與陸修靜周續之流觴而飲今成小港洗墨池在湖口縣南三十里相傳陶潛鑿以滌筆硯者聖池在湖口縣治南因祈雨有應而名彭浪磯在彭澤縣北聳立江濵與小孤山相對俗訛為彭郎遂有小姑嫁彭郎之語桑落洲在府城東北過江五十里昔江水泛漲流一桑於此因名元范德機詩桑落洲前秋興孤白雲逺見近還無楊葉洲洲西半屬彭澤縣以東屬池州界洲上多楊柳或云狀如楊葉土産銅葛茶玄參雲母石斛俱德化縣出石耳廬山石上生梅栗芋鱅魚公署九江衛在府治東洪武二十年建𨽻前軍都督府學校九江府學在蓮花池上宋建本朝洪武初重建德化縣學在府治前街西宋初建於嶽飛池右崇寧間始移此本朝洪武初及成化間俱重建德安縣學舊在縣治東北隔水半里宋初徙縣東南崇寧間又徙縣治東本朝洪武初重建瑞昌縣學在縣治西宋立於瀼溪傍嘉泰間徙此本朝洪武中重建湖口縣學在縣治東北宋建於下鍾山傍本朝洪武初徙此彭澤縣學在縣治西舊在縣治東宋慶厯間建本朝𢎞治中徙於此書院景星書院在府城東唐李渤刺江州元和初以右拾遺召不拜韓愈以書勉之有景星鳯凰先覩為快之語後人因建景星書院濓溪書院在廬山麓宋周敦頥建後守潘慈明增築朱熹為記靖忠書院在彭澤縣治北觀音山後元邑令王國輔建取晉陶潛之靖唐狄仁傑之忠為名義門書堂在府城西北東佳山下唐義門陳衮即居左建書堂聚書數千卷以資學者子弟弱冠悉令就學宋徐鉉為記匡山精舍在府治南元學士姚燧讀書處宫室庾樓在府治後晉庾亮刺江州時建樓下有舒嘯堂唐白居易詩重過蕭寺宿再上庾樓行九疊樓在府治後唐刺史李渤建因對廬山九疊故名清輝樓在府治後唐劉禹錫詩潯陽江色湖添滿彭蠡秋聲鴈送來南望廬山千萬仞共誇新出棟梁材齊雲樓在府治東北子城上宋皇祐間建紫煙樓在府治後宋余崇龜建取唐李白詩日照香爐生紫煙之句因名清風閣在府治後人慕宋均潔已安民去獸之異因名本朝洪武末重建倚天閣在府治東對雙劍峯宋張孝祥命名取長劍倚天外之意漪嵐堂在德化縣治西偏宋政和間縣令吳怡建丞相洪適有詩草堂在香爐峯唐白居易為江州司馬時建詩云香爐峯北而遺愛寺西偏其下無人居終日空風煙時有沉冥子姓白字樂天傲然意自足箕踞於其間舍此欲焉往人間多險艱三賢堂在府治後祠陶潛狄仁傑白居易又瑞昌縣治南有二賢堂祀元結蘇軾皆宋時建清燕堂在府治後宋守錢公稔建吳説書額生意堂在府治後周敦頥領江州提刑時窗前草不除人問之曰與自家意思一般因扁堂曰生意虎渡亭在府城北門外昔宋均為九江守實在夀春到官虎渡江去後人慕之立亭於此因名白蓮亭在廬山晉謝靈運與慧遠鑿池種白蓮因名三笑亭在東林寺前晉僧慧遠每送客不過虎溪一日與陶潛陸修靜相攜共話不覺踰之三人大笑而别後人於此建亭百花亭在府城東梁刺史邵陵王綸建梁元帝詩極目才千里何由望楚津落花灑行路垂柳拂砌塵白雲亭在彭澤縣南一十五里唐狄仁傑宰彭澤奏赦犯大辟者三百人民德之建祠立亭後人因取其望雲思親之意為名本朝正統九年重建琵琶亭在府城西大江濵唐司馬白居易送客湓浦口夜聞鄰舟琵琶聲問之乃長安娼女嫁於商人為作琵琶行後人因以名亭浸月亭在府城西甘棠湖中有土墩圓如月唐白居易作亭其上後人因其别時茫茫江浸月之句而名高遠亭在府治東唐李渤建每一登覽江中景物俱在目中魯望亭在馬當山宋黃庭堅嘗登此眺望有四詩紀之後人名亭曰魯望蓋以其字魯直故云六角亭在彭澤縣治西宋縣尉石振搆亭山巖下令其三子讀書黃庭堅書其巖曰讀書亭曰六角元吳澄有記疊翠亭在府城南五十里宋嶽飛建以對廬山九疊故名煙水亭在甘棠湖隄上周敦頥子司封郎官夀建取山頭水色薄籠煙之義為名攬秀亭在府治南宋建元總管李黼重建取李白詩九江秀色可攬結之義而名白鹿升仙臺在天池寺世傳嘗有白鹿於此上升因名本朝洪武二十二年御製周顛仙傳建碑亭於臺上歇馬臺舊圖經云始皇至廬山歇馬於此翻經臺在舊東林寺謝靈運翻經於此玩月臺在湖口縣東三十里晉陶潛宰彭澤時築以玩月董奉館在廬山第三嶺後巖下今存遺址五柳館在彭澤縣即五柳先生陶潛宅關梁虎溪橋在東林寺前李白詩