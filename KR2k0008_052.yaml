授中為來俊臣所誣貶彭澤令適歲旱奏免民租又縱囚令如期而還邑人感之為立生祠白居易元和中貶江州司馬喜曰匡廬在念久矣今得青山緑水中為風月主人乃築草堂於香爐峯北以自適錢徽憲宗時江州刺史州有盜劫貢船捕吏取濵江惡少年二百人繫訊徽按其枉悉縱去數日得真盜州有牛田錢百萬刺史以給宴飲贈餉者徽命代貧民租入李渤長慶初為江州刺史築南湖隄立斗門以蓄泄水勢人號為甘棠湖五代皇甫暉南唐江州節度使周師伐淮南暉率江州屯兵以拒之軍陳整肅士樂用命雖中原名將往往憚之宋吕誨仁宗朝為殿中侍御史論樞副陳升之章十八上遂罷知江州劉述神宗朝侍御史因劉琦等論王安石貶官述謂朝廷不當劾言事官貶知江州沉靜有守趙士嶐建炎中為江州鈐轄李成圍城誓以死守城陷成義之欲用為安撫使士嶐罵不絶口而死嶽飛高宗時鎮江州子孫因世居德化縣朱勝非紹興初充江西安撫使兼知江州有政聲尋謫居江州韓彥直江西轉運兼權知江州時朝廷還嶽飛家資産多在九江歲久業數易主吏緣為姦彥直搜剔隱匿盡還嶽氏葉義問紹興中通判江州豫章守張宗元忤秦檜或中以飛語事下漕臣張常先宗元道九江常先檄義問拘其舟義問投檄曰吾寧得罪不為不祥趙崇憲知江州郡民歲苦和糴崇憲疏於朝永蠲之民負茶引錢新舊纍積至十七萬緡崇憲亟請以新劵一償舊劵二受賜者千餘家刻石以紀其事又修陂塘以廣灌溉凡數千所劉頴江西運判江州德化縣田逃徙大半守乞蠲稅不報頴以見種之稅均於荒萊民願耕者第減之而逃田盡復董槐沿江制置使兼知江州下教曰吾涖州而吏猶為盜不自悔吾且誅之吏乃震恐願自新槐因除民患凡利有宜弛以利民吾恐不盡弛吳淵江西安撫使兼知江州湖南洞寇蔓入江右破數縣袁洪大震淵命將調兵生擒其渠魁亂遂平汪立信知江州充沿江制置副使節制軍馬提舉兵甲有政績升江西安撫使陳塏知江州主管江西安撫司事有善政軍民愛戴樂於薦士幕客盛多余崇龜開禧中守江州躬行阡陌與民同勞苦政聲著聞百姓皆安魏了翁理宗時以同簽書樞密院事督視江淮軍馬開幕府江州申警將帥調遣援師元張士熙至正間湖口縣尹為政有方民懷其惠及去老稚攀號車莫能行邑人勒石頌之曹靖國大德間彭澤尹為政簡而亷修譙樓新縣廨夷官道飭水驛建萬里江天亭復淵明祠葺城隍廟士民感悅立惠愛亭以美之李黼至正間江州路總管時徐夀輝陷江州黼與姪秉昭力戰而死追封黼隴西郡公諡忠文丁鶴年詩叔姪並歸忠義傳江山不盡古今愁本朝孔復永樂初知九江府政令一新律己亷慎民至今頌之王銘永樂中為德安知縣豈弟愛民時邑有虎害銘禱於城隍一夕雷擊於縣西之箬山隴重建文廟不費於民士民感德之林純浙江黃巖人永樂中湖口訓導勤於教誨去後士子懷仰至設木主祀之子鶚為少司冦經此泣祭而去省志林道安福建甌寧人洪熙間由給事中左遷德安縣丞寬厚愛民去後見思省志求琰浙之新昌人宣德中九江通判涖政務崇寬厚禁民淫祀時推刑者多刻琰曰刑可刻乎每勸執法平恕民以不訟值敕建天池寺督役者擾民民訴於琰遂躬自率下人喜赴工嵗歉人將殍引咎自責巡行屬邑勸貸富民以賑濟之民賴全活者衆志省向文敏湖廣沅州人宣德初湖口訓導幾九載士類賴其造就者多卒於官士子思之與陳賢林純合祀云省志馬驄廣西臨桂人正統間知德化縣涖事勤敏首以學校農桑為務甘棠湖隄歲久且壞行旅病涉遂率民往築甃以巨石植柳於隄護之上有煙水亭濓溪祠久圯驄復修葺之後升工部主事卒於官邑民懷其德遂迎其喪葬於廬山之麓省志劉仁宅湖廣華容人正統間知瑞昌縣亷勤有為下車首陳三疏蠲赤湖虛課二萬緡免舊欠蘆柴十餘萬完逋稅數千石抑強扶弱崇修學校士習丕變九江邏卒索路於深山與村民格鬬且叛仁宅撫慰之民免血刃歷五載徵為御史子忠宣公大夏適生於是邑人以為仁者之報云省志謝昶湖廣黃岡人正統進士天順三年知九江府蒞政公勤撫民惠愛以憂去任民不忍舍省志楊安頴縣人天順末知德化縣正直公亷常種蔬自給一毫不取於民省志安永邯鄲人天順中九江同知亷慎勤勞不尚刑威而人自服修甘棠隄以防亢旱構思賢橋以便往來歷任六載卒於官民感慕之省志童潮浙江慈溪人成化中任九江知府涖政公勤撫民仁恕善文章尤勤於修葺卒於官有遺愛省志常元山陽人成化初知彭澤縣嘗建議移龍成驛於小孤山遷峯山巡檢司於燕支港減編馬船割鄱陽地四事為人所稱省志汪濬歙縣人由舉人𢎞治中九江推官佐政公勤折獄仁恕歲旱盡誠禱雨輒應賢聲著聞省志王春𢎞治中任德安知縣亷能謹恪修百廢而不傷民財設䇿捕盜以安靖地方民頌其德去之攀轅者塞於道省志劉璣𢎞治中任九江知府存心仁恕處事精詳安靜士民仰之以憂去任省志黃源正德間任瑞昌知縣端謹沉毅有節介不為事物屈撓興利祛弊政迹丕著省志陸郁正德間任湖口知縣亷靜寡欲在任八年蔬食自奉省志流寓李白唐成紀人玄宗時供奉翰林後遭祿山之亂嘗避地寓居廬山下史虛白北海人世業儒五代唐晉間中原多故卜居潯陽以詩酒自娛南唐時韓熙載薦之辭不仕賜田遣歸周敦頥宋道州人嘗知南康軍愛廬阜因築室其下居焉李若谷河北人宋高宗時罷參政或曰胡不效楊原仲之泣若谷笑曰即捶死淚亦不出秦檜聞之大怒謫居江州黃澤其先蜀人父儀可纍舉不第隨兄驥子官九江因家焉澤生有異質慨然以明經學道為志作易春秋二經解元大德中授江州景星書院山長以施教吳澄以為平生所見明經士未有能及之者人物晉翟湯潯陽人篤行亷潔耕而後食永嘉末冦害相繼聞湯名德皆不敢犯王導庾亮纍薦不起子莊以孝友稱遵湯之操徵辟亦不就莊子矯矯子法賜皆有隱德時稱潯陽四德周訪潯陽人自少沉毅果斷而能謙讓為縣功曹元帝立以為揚烈將軍討華車犬平江州定漢沔纍遷都督梁州諸軍事屯襄陽逺近悅服蔚然為中興名將王敦忌之雖懷逆謀不敢發卒諡曰壯周撫訪子強毅有父風元帝時纍官征虜將軍都督梁州軍事擊破蜀餘冦遷鎮西將軍卒諡襄弟光亦有父風從溫嶠破蘇峻有功賜爵曲江男周楚撫子監梁益二州襲爵建城公世在梁益甚得物情楚以討平司馬勳進冠軍將軍卒諡定子瓊徑烈有將略歷數郡纍遷梁州刺史建武將軍周虓撫孫歷官梓潼太守符堅遣將冦梓潼虓固守沿城遣步騎送母妻抵江陵為堅將所獲虓不得已降堅後與堅兄子苞謀襲堅事泄堅引問虓曰虓世荷晉恩生為晉臣死為晉鬼復何問堅曰殺之適成其名撻之徙於太原病卒其子興迎致其喪贈龍驤將軍益州刺史陶淡潯陽人侃之孫幼孤好導養之術年十五六便服食絶穀家纍千金僮客百數淡終日端拱曽不營問頗好讀易善卜筮後逃隱山中不知所終陶潛侃曾孫少好高尚博學善屬文宅邊有五柳自號五柳先生後起為州祭酒尋自解歸再起知彭澤縣會郡遣督郵至縣吏自應束帶見之潛歎曰吾不能為五斗米折腰見鄉里小兒即解印去賦歸去來辭以見意及宋受禪惟賦詩飲酒以終其身有詩集行世宋陳兢德安人唐僖宗時已六世不分南唐復其家至孫昉之世宗族七百餘口有畜犬百餘共食一犬不至諸犬為之不食宋開寶初仍復其家昉弟子鴻鴻弟兢兢之世子孫益衆詔每歲貸粟二千石兢卒從弟旭止受貸粟之半屬歲歉或勸旭全受可邀善價旭曰朝廷以旭家乏食而貸之粟豈可見利忘義事聞奬歎拜江州助教旭卒弟藴主家事鄉里稱其德仁宗仍賜為本州助教同居十八世又德化人許祚亦八世同居至祚之世七百八十餘口太宗時詔旌表其門鄭良德安人善果孫克承家訓而樂道不仕最精於地理其後子孫繁衍名著譜諜者六千餘家胡旦德安人咸平間登進士授朝奉郎纍遷兵部郎中直祕閣上柱國賜紫金魚袋夏竦德安人父承皓太宗時與契丹戰沒竦以恩補官纍遷至樞密使卒贈太師中書令諡文莊李受九江人為太子少保丐歸廬山詔王圭司馬光吕公著等餞飲於資善堂命賦詩以贈之弟東之自經筵官去歸上亦命圭等賦詩以送當時榮之比之漢二疏云王韶德安人嘉祐間登進士後以開熙河功拜樞密副使卒諡襄敏子彥繼以闢湟鄯功拜武勝軍觀察留後卒諡莊敏厚子彥博靖康初勤王亦有功王宇江州人父易簡資政殿學士兼侍講宇歷官國子司業中書舍人欽宗立纍遷翰林學士尚書左丞副康王使金因丐免降單州團練使并黜易簡建炎中賊馬進破江州易簡等俱被害王阮韶曾孫少好學尚氣節隆興初進士對策極言宜遷都建康以圖進取紹熙中知濠州修戰守具金人不敢南侵改知撫州韓托胄聞阮名特命入奏阮對畢即出關托胄大怒批旨豫祠於是歸隱廬山盡棄人間事從容觴詠而已吳元德安人開禧間與弟宏愈同登進士官至制幹纍贈正議大夫宏饒州司户愈官至沿江制置使兼知鄂州卒諡文肅元子革嘗肄業官至刑部尚書卒諡清惠宏子觀官至江東提刑知饒州元戴羽德安人隱居積學徵辟皆不就著武侯通傳三卷史評一卷虞集為之序本朝黃信彭澤人洪武中由太學生擢監察御史有能聲尋升廣西按察使未幾轉任湖廣按察司持正不撓進升都察院右副都御史劉隆彭澤人洪武中由太學生擢廣州府同知勤於政事尋升福建布政司參議未幾轉廣西所至有聲王賢德化人性質直善醫永樂中屢薦不就嘗道拾遺金候其主還之卒年九十三人以為隂德所致云史中德化人由歲貢永樂間任衡州通判守法治民不畏強勢歷本府知府轉陜西參政卒以子珍貴贈太中大夫資治少尹省志遊瑞德化人由歲貢永樂中任給事中升鎮江府知府綽有惠政在任十八年致仕民懷之省志豐慶瑞昌人正統進士任兵科給事中歷升河南左布政使蒞政有聲後占籍鄞縣子耘為湖口訓導耘子熙翰林學士熙子坊解元進士代有文名云省志黃材德化人讀書崇禮天性孝友一日因父病篤藥不能療乃焚香籲天引刀刲左股肉和粥進之不令人知後父沒妻見其股瘢詢之始知其故鄉人莫不歎服王廷翰彭澤人勇敢有為正德己卯宸濠作亂遊兵掠境翰挾弓矢率其子弟鄉兵迫敵賊有畏心遂擲金於地誘之翰不視奮擊愈厲連射斃二賊對敵終日矢盡力竭身中十餘鎗罵賊不絶口賊乃斷其頭而去省志列女鄭氏彭澤人鄭英長女年十八嫁同邑民畢彥升三月而夫亡遺腹生子仲遠鄭養老撫幼紡績為家終無嫁意洪武中旌表其門省志董氏南昌人董和用女適德化民魏輔甫四載生男魏宏中夫故董氏守節奉舅姑始終無玷永樂中旌表其門省志王氏彭澤人年十九歸邑庠生柯茂三載而夫亡勤儉孝敬鞠育二子守義不衰年七十五而終姪柯與妻楊氏楊遂之女年二十七而夫喪撫子曰璿長充邑庠生以貞節自守年七十而終人稱為二節云省志黃氏德化人郡庠生劉相妻相迎父喪於臨清哀恚嘔血死柩至家黃觸柩流血被面每欲以死徇時二十有一形毁骨立矢志靡他衰絰十年事繼姑益謹卒曰哀殯盡禮閨門肅然雖處貧苦而怨聲不聞人皆賢之省志周氏名端秀湖口人張仲偉妻年十九嬪於張生子德潤周歲而偉亡舅姑憫其家貧子幼欲奪其志周曰寧為張氏鬼不作他人妻孀居三十年氷清玉潔鄉里嘗記其言以為內則省志陶氏彭澤人王守邦妻年二十夫以暴疾卒陶哀毁欲與俱死翁慟其子越宿亦亡陶嘆曰我即死姑何倚哉乃營大葬預虛其右以示同穴人不敢以非言逆之居孀二十餘年事姑盡孝內外重之省志劉氏名玉蘭彭澤人年十八適同邑民計偉越五載夫亡哀痛殊切圖與俱死既而翁舉夫喪劉泣告願少留乃别築室停之劉苫塊獨居悲號傷心嘔血數升父母恐乃遷柩藁葬劉曰吾今得死期矣遂不解衰絰七日不食而卒舉其尸見袖中所遺巾帨皆夫遺物省志諶烓妻么氏烓時為南湖觜巡檢司吏及其女同居正德間被流賊突至欲汚之三人厲聲罵賊不絶口俱被支解而死省志余氏孝繡年一十八歲湖口余志通女家貧未受聘正德七年流賊劫縣女與鄰婦俱被虜至舟賊欲汚之女獨投河而死省志仙釋董奉晉時居廬山有道術為人治病不取錢病重而愈者令栽杏五株輕者一株數年杏成林子熟時作一倉令買杏者隨器之大小易以穀若置穀少取杏多羣虎輒吼逐之所得穀悉以賑貧奉後仙去慧遠姓賈氏鴈門樓煩人晉時隨沙門道安南遊遠見廬山清淨乃以杖扣地曰若此中可栖當使朽壤抽泉言畢清流湧出遂建龍泉寺有阿育王像陶侃以其有威靈欲迎事之不去及遠奉請乃飄然無梗遠居廬阜三十餘年不出送客以虎溪為界與慧永等十八人結為蓮社年八十三無疾而逝住得湖口縣人號赤腳僧常居廬山本朝洪武間詣闕求見不得已而上不豫復賫藥自進謂天眼尊者及周顛仙人所奉上因服之即愈御製詩賜之楊權盱江人自少頴悟不羣聞張真牧有道行即往從之真牧授以九返之術曰逢江莫行至泥則止後舟次九江江沱觜始悟遂結茅修煉其中時大疫施以符水輒效遠近慕之後作頌而逝宋咸淳中封通慧孚惠真人明一統志卷五十二
