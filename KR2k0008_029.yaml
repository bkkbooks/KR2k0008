body:
  text: 明一統志卷二十九明李賢等撰河南府東至開封府氾水縣界一百六十里南至南陽府南陽縣界二百六十里西至陕西西安府華隂縣界四百九十里北至懐慶府濟源縣界九十里自府治至京師一千八百里至南京一千八百里糧四十八萬一千三百石零建置沿革禹貢豫州之域天文柳分野武王克商定鼎於郏鄏成王營洛為王城下都至平王自鎬京東遷乃居王城秦置三川郡漢置河南郡東漢都於此置河南尹兼置司隷三國魏置司州晋亦都此置河南尹司州如故苻秦改為豫州劉宋初仍置司州後魏改為洛州孝文自代徙都之又改司州亦為河南尹東魏改司州為洛州改河南尹為河南郡西魏又改為司州北齊為洛州後周為東京隋初罷郡為洛州煬帝徙都于此改豫州尋改河南郡唐初復為洛州置都督府開元初改河南府初髙宗以此為東都光宅初改神都神龍初復為東都天寳初又改東京五代梁為西都唐改東都晉改西京宋因之金置徳昌軍興定初號中京置金昌府元為河南路本朝改為河南府領州一縣十三洛陽縣附郭本成周地居洛水之北故曰洛陽秦屬三川郡漢為河南郡治莽改宜陽東漢改雒陽魏復為洛陽晋因之隋遷郡治河南縣併移縣於城中唐神龍初改洛陽為永昌尋復舊宋初河南洛陽二縣並置熈寕中省洛陽入河南縣元祐初復置金以河南縣省入元仍舊本朝因之編户八十六里偃師縣在府城東七十里帝嚳所都之地商有三亳成湯居西亳即此後盤庚亦徙都於此改號曰殷周武王伐紂還息偃師徒遂以為名秦屬三川郡漢置偃師縣屬河南郡新莽改師成東漢復舊晋併入洛陽隋復置唐宋元仍舊本朝因之編户三十六里鞏縣在府城東一百三十里周鞏伯邑西周惠公封少子班於鞏是為東周漢始置鞏縣屬河南郡治故鞏城魏晋因之後魏屬成臯郡北齊屬洛州隋徙治洛口唐宋金元皆仍舊本朝因之編户二十四里孟津縣在府城東北七十里周武王伐紂師渡孟津即此漢置河陽縣屬河内郡後廢隋復置唐初析置河清縣屬懐州又改屬孟州後屬河南府宋初治白波鎮金徙置孟津渡改為孟津縣元仍舊本朝因之編户五十八里宜陽縣在府城西南七十里周為召伯聴訟之所漢為宜陽縣地魏析置甘棠縣屬新安郡後改曰宜陽後魏置宜陽郡東魏置陽州後周改熊州以縣屬焉隋初因之尋改穀州後廢州屬河南郡義寕初復置宜陽郡唐初改郡曰熊州改縣曰福昌後唐改福慶縣宋初復舊名熈寕中省入夀安縣後復置金復改宜陽元仍舊本朝因之編户五十八里登封縣在府城東一百四十里禹避舜之子於陽城即此漢置陽城崇髙二縣屬潁川郡東漢省崇髙入陽城晋屬河南郡東魏析置堙陽縣改曰武林後又曰嵩陽與陽城並屬河南郡唐初屬嵩州尋改陽城曰告成嵩陽曰登封後又改告成曰陽邑五代周時省陽邑入登封宋金元仍舊本朝因之編户四十四里永寧縣在府城西南二百里漢為澠池縣之西境屬𢎞農郡西魏置北宜陽縣後改熊耳縣屬宜陽郡後周屬同軌郡隋徙治永固城改永寧縣唐初又移治同軌城屬榖州後移治鹿橋屬洛州宋屬河南府金屬嵩州元屬河南路本朝因之編户六十七里新安縣在府城西七十里春秋時西周地秦名新安漢置新安縣晋屬河南郡後周改東垣縣置中州後省州置新安郡隋復改東垣為新安縣屬榖州後省州以縣屬河南郡唐初屬洛州後屬河南府宋及金元俱仍舊本朝因之編户一十八里澠池縣在府城西一百六十里本韓地後屬秦漢置澠池縣屬𢎞農郡以地在崤黽間故名新莽改陜亭東漢復舊曹魏徙治蠡城西魏屬河南郡後周屬同軌郡隋徙治大塢城屬熊州後屬宜陽郡唐初屬穀州貞觀初徙今治宋屬河南府金置韶州元省州復為縣本朝因之編户二十五里嵩縣在府城南一百六十里古伊闕地秦晋遷陸渾戎於此漢置陸渾縣屬𢎞農郡晋屬河南郡東魏置伊川郡隋改伊州尋廢唐析置伊陽縣屬河南府五代時以陸渾省入伊陽宋又以伊闕縣省入紹興初陞為順州金改嵩州治伊陽縣元以縣省入州屬南陽府本朝改州為嵩縣及改今屬編户二十五里盧氏縣在府城西南三百四十里本虢之莘地漢因盧敖得仙始置盧氏縣屬𢎞農郡晋屬上洛郡後魏置洛安郡西魏改義川郡隋初改虢州皆治盧氏唐徙州治𢎞農五代及宋金俱屬虢州元屬嵩州本朝初屬陜州尋改今屬編户四十里陜州在府城西三百里周為虢國地王季子虢仲封於此周召分治東西以陜為界即此春秋時屬晋後屬韓韓滅入秦漢置陜縣為𢎞農郡治魏晋因之後魏始置陜州隋大業初州廢以縣屬河南郡後復置𢎞農郡唐初復為陜州天寳初改陜府乾元初改陕郡昭宗時陞為唐興府哀宗初置保義軍宋改保平軍金復為陕州又改西安軍元仍為陕州本朝以陜縣省入編户三十里領縣二靈寳縣在州城西六十里本秦函谷闗地漢置𢎞農縣魏晋因之隋開皇中析置桃林縣屬陕州後屬虢郡唐初屬陜州天寳初得符寳於古函谷闗因改曰靈寳縣宋金元仍舊本朝因之編户四十五里閿鄉縣在州城西一百三十里本漢湖縣之閿鄉屬京兆尹因津以名邑後周於湖城故地置閿鄉郡隋初廢郡後遷今治為閿鄉縣唐貞觀初置鼎州尋廢州以縣屬虢州宋屬陜州元以湖城縣省入本朝因之編户二十三里郡名周南洛陽俱古名三川秦名河南漢名形勝南望三塗北望嶽鄙顧瞻有河粤瞻雒伊毋逺天室史記載武王言三河若鼎足漢貨殖傳三河在天下之中若鼎足左據成臯右阻黽池前鄉崧髙後介大河漢書翼奉疏泝洛背河左伊右瀍晋張衡東京賦泝洛背河左伊右瀍西阻九阿東門于旋盟津達其後大谷通其前迴行道乎伊闕邪徑㨗乎轘轅前瞻大室後眺嵩丘晋潘岳思舊賦函谷天險後魏崔浩云陕州東自崤山西至潼津通名函谷號曰天險所謂秦得百二前直伊闕後據邙山左瀍右澗洛水貫其中唐地理志洛邑為天地之中宋地理志南距商虢北控大河元王挺閿鄉隘秦堂記風俗忠義疊見宋邵氏聞見録此邦乃子晋長房神仙之勝蹟有夷齊巢許之髙風忠臣義士疊見於紀載間刑訟簡省民安生業陕州甘棠記召伯甘棠之䕃未徙而刑訟簡省斯民熈熈然安生業有古風化民性安舒廹於營養宋地理志民性安舒而多衣冠舊族然土地褊薄廹於營養士知嚮於詩書宋范祖禹志表詩書禮樂粗知所嚮方而英雄武略亦未嘗起秦無人之歎農耕於田商販於市舟車徃來山川眀秀陕之所以可稱者此也性行淳朴不事華侈嵩縣志山川北邙山在府城北一十里山連偃師鞏孟津三縣綿亘四百餘里東漢諸陵及唐宋名臣墳多在此晋張協賦地勢窊窿丘墟陂陀墳隴㟪疊棊布星羅金更名太平山翠雲山在府城西北一十里其上樹木森列蒼翠如雲周山在府城南一十五里一名小亭山下有周谷闕塞山在府城西南三十里左傳晋趙鞅納王使女寛守闕塞即此一名伊闕亦名闕口大禹疏龍門伊水出其間漢服䖍謂南山伊闕是也俗名龍門山秦山在府城西南二十五里俗云秦頭魏尾因名玉泉山在府城東南三十里上有白龍祠歳旱禱雨多應谷口山在府城西南三十里谷水所出八將山在府城西三十里唐尉遲敬徳與單雄信等八将戰此遂以名山委粟山在府城東三十五里魏眀帝景初間營為圜丘至今形制尚存萬安山在府城東南四十里一名大石山北接登封縣糓城山在府城西北五十里連孟津縣界舊名替亭山瀍水出此景山在偃師縣南二十里詩景貟維河即此鳳臺山在偃師縣東二十里昔有鳳集築臺因名首陽山在偃師縣西北二十五里商伯夷叔齊隠此詩采苓采苓首陽之顛晋阮籍詩歩出上東門北望首陽岑下有采薇士上有嘉樹林按河南志言首陽者五處史記賈逵註云在蒲坂未詳孰的緱氏山在偃師縣南四十里周靈王太子晋升仙之所上有石室飲鶴池一名覆釡堆虎頭山在鞏縣治南其西有駱駝嶺二山並峙甚竒侯山在鞏縣東南二十五里漢王亥隠此景帝時累徴不出因封之趙封山在鞏縣東南四十里宋種茶於此而封固其地因名青龍山在鞏縣南四十里以其在宋太祖陵東故名其尾接洛河者曰龍尾山寒戰山在鞏縣東南五十里其山陡峻臨玉仙河經者戰懼故名黒雲山在鞏縣西六十里昔成湯於此禱旱忽起黒雲天降大雨轘轅山在鞏縣西南七十里左傳欒盈過周周王使侯出諸轘轅即此其坂有十二曲道将去復還故名漢於此置闗錦屏山在宜陽縣治南唐武后幸此賜名上有玉柱峯石墨山在宜陽縣西南二里水經洛水側有墨山石盡墨可以書公山在宜陽縣西九里状如公字又云山頂有周公廟因名憇鶴山在宜陽縣東南四十里世傳王子晋得仙緱嶺乗白鶴憇此女几山在宜陽縣西九十里唐李賀集白蘭香神女上升遺几在焉故名鹿蹄山在宜陽縣俗名非山山上多羙玉下多金甘水出焉西北流注於洛嵩山在登封縣北一十里五嶽之中嶽也其山三尖峯東曰大室西曰少室嵩其縂名謂之室者以其下各有石室中嶽居四方之中而髙故名嵩髙山詩曰嵩髙維嶽是也上有中嶽廟漢武帝至中嶽獲駁麃見夏后啓母石翼日親登嵩髙吏卒咸聞呼萬歳者三乃令祠官加贈太室祠置奉邑名曰崇髙唐武后改山為神嶽陽乾山在登封縣東二十五里潁水一源出此箕山在登封縣東南三十里一名崿嶺昔許由隠此堯召為九州長不欲聞滌耳水濵巢父牽犢上流而飲之即此上有許由墓陽城山在登封縣北三十八里俗名車嶺山洧水出此大熊山在登封縣南五十里上可避兵近有小熊山懊來山在登封縣東南五十里接永寕縣界倚箔山在登封縣西七十里望如立箔正西北崖下有鍾乳鳳翼山在永寕縣治西北山如鳳翅延夀山在永寕縣西五里有香泉飲之則夀因名金門山在永寕縣西南三十里一名律管山九州要記金門之竹可為笙管嶕嶢山在永寕縣西北三十五里相傳廣成子憇息之所上有河瀆靈源廟龍頭山在永寕縣西四十五里上有快風軒下有洛水天壇山在永寕縣西四十五里一名壇屋山宋王子由紀異云早暮有影其色深碧旦則在西直挿天際日髙則卧與海接暮影在東先卧後立他山所無也壇上有仙燈王母洞中有仙藥中岩有仙猫洞世傳燕真人丹成雞犬皆昇仙猫獨不去人就洞呼仙哥則或有應者陽虛山在永寕縣西五十里一名陽峪黄帝時倉頡隨帝南廵登陽虚之山即此大通山在永寕縣西五十里有風穴擊之如雹聲崤山在永寕縣北六十里一名嶔崟山春秋時晋人及羌戎敗秦于崤即此自東崤至西崤相去三十五里路極險絶慕容山在新安縣治後晉慕容垂屯軍于此因名青要山在新安縣西北二十里一名強山為帝之宻都北望河曲是多駕鳥南望禪渚轅水出焉有草黄華赤實服之益人夀缺門山在新安縣西三十里一名扼山山阜不相接者里餘故名白石山在澠池縣東北二十三里澗水所出田山在澠池縣東北三十里山平可種韶山在澠池縣北三十里左右有金烏玉兎二峯方山在澠池縣東北三十里山頂四方廣陽山在澠池縣東北三十里一名沔池山北溪水出焉桓王山在澠池縣北九十七里以山顛有周桓王廟而名三塗山在嵩縣西南一十里周武王南望三塗謂此山有龍祠奉牛山在嵩縣東三十里山下有靈泉寺介立山在嵩縣北四十里一名孤山唐武后廵幸至此将半見神人立雲霧中或隠或見鳴臯山在嵩縣東北四十里宋程顥作邵雍墓誌銘鳴臯在南謂此陸渾山在嵩縣東北四十里一名方山漢末隠士胡昭隠居于此隋因山置陸渾縣又陸渾之