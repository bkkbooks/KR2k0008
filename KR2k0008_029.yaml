充以官招之端焚書斬其使許紹陕州刺史蕭銑圍陕州紹擊走之制書褒羙長孫操武徳間陕東道大行臺城中無井開廣濟渠引水入城以代井汲百姓利安以母䘮解任長老守闕頌遺愛蕭瑀貞觀中為河南道廵省大使以稱職聞賈敦頥永徽初為洛州司馬舉没豪右田三千餘頃以賦貧民發奸摘伏下不敢欺賈敦實咸亨初為洛州長史政尚寛惠人心懐向始洛人為敦頥刻碑及敦實入為太子右庶子又復立碑其側宋璟洛州長史正直不私權貴憚服後三為東都留守洛人甚喜如子得慈父魏元忠檢校洛州刺史治號威眀張易之家奴暴横甚元忠笞殺之權豪憚服張東之為洛州司馬武后求人狄仁傑曰臣嘗薦張柬之未用也張仁愿神龍中檢校洛州長史㑹榖貴多盗仁愿捕殺之畿内震懾無敢犯先是賈敦實為長史有政績時人語曰洛有前賈後張敵京兆三王李傑先天中為河南尹精於聽㫁府無淹事有寡婦訴其子不孝使人跡婦出與一道士語按得其姦乃殺道士人以為快又修梁公埭以通漕不費而利入李適之河南尹政不苛細為下所便作榖洛三防水不為患陸璪𤣥宗時為黽池令人愛其仁政遷洛陽令摧勒奸豪人不敢犯韋陟開元中為洛陽令宋璟見之歎曰盛徳遺範盡在是矣裴耀卿河南陕州路水陸轉運使置河隂集津三門倉引天下柤泝河而西三年積七百萬石省運費三十萬緡裴寛河南尹政務簡静人愛之不屈附權貴郡中大治裴諝河南府㕘軍後遷河南尹東都留守以寛厚和易為治不鞠人以贓諝寛之子也崔隠甫洛陽令時棃園弟子胡雛善笛有寵負罪匿禁中隠甫按殺之後為河南尹居三歳境内大理顧少連登封主簿邑有虎孽移文嶽神虎不為害韋𢎞景陕州刺史虢州觀察使有治效百姓懐之李尚隠伊闕令𤣥宗知其方嚴累遷河南尹性剛亮後為東都留守崔縱河南尹為政簡易蠲略細苛又引伊洛溉髙仰人甚宜之崔碣兩為河南尹邑有大賈王可乆轉貨不歸妻詣卜者咨存亡卜者紿以不還誘聘為妻可乆歸妻詣吏自言碣具得其情即掩卜者殺之時淫潦獄决而霽韋堅陕州刺史開河引渭以通漕名廣運潭李勉河南尹權豪憚其方正不敢干以私盧奐陕州刺史𤣥京西還至陕嘉其美政題賛於㕔事曰專城之重分陕之雄亦既利物内存匪躬斯為國寶不墜家風李揆𤣥宗時河南少尹尹蕭炅倚權植私揆裁其繆李齊物陕州刺史天寶初開底柱三門以利漕運得古刄有篆文曰平陸詔以名縣韓休虢州刺史虢於東西京為近州乗輿所至常積厩芻休請均賦他郡迄如其請張延賞大厯中河南尹政尚簡有輕徭役疏河渠築宫廟數年流庸歸附都闕完雄有詔褒羙陽城陕虢觀察使徳宗時以薦召拜諌議大夫岑羲陕州總管甚有政迹弟仲翔為陕州刺史兄弟相踵為守並馳聲譽鄭珣瑜貞元中為河南尹清静惠下賤歛貴發以便民時韓全義将兵伐蔡河南主饋餉珣瑜宻儲之陽翟以給軍百姓不知僦運之勞吕元膺東都留守都有李師道留邸邸兵輿山棚謀竊發事覺元膺禽破之人賴以安王質虢州刺史李徳裕器之後為河南尹政化大行令狐楚陕虢觀察使後為河南尹有治名百姓愛之俄拜東郡留守韋温陕虢觀察使民當輸租而麥未熟吏白督之温曰使民貨田中穗以供賦可乎為緩期而賦辦杜兼元和初河南尹善政及民民甚懐之韓愈河南令時諸鎮多有反意愈潛破其謀事聞憲宗喜曰韓愈是助我者崔咸陜虢觀察使日與賓客僚属痛飲未嘗醒夜分輒决事裁剖精明無一毫差吏稱為神李絳穆宗時東都留守當洛中頽靡之乆嚴於蒞政裴度為東都留守有異政皇甫湜初調陸渾尉後分司東都留守裴度辟為判宫馮宿河南尹洛苑使姚文夀從部曲奪民田宿掩取搒殺之李徳裕武宗時以太子賓客分司東都以寛和得士庶之心李紳開成中河南尹為治明嚴惡少望風遁去盧鈞宣宗時東都留守遨遊林墅㝠心榮進卧䕶留鑰門庭肅然栁仲郢宣宗時河南尹以寛惠為政後為虢州刺史又為東都留守再治河南志於擿貪濟弱里無逋家衣冠孤女不能自歸者斥廩嫁之姜師度陕州刺史大原倉水陸運所湊轉属諸河師度依高為廥而注米于舟人不知勞張全義河南尹初東都荐經冦亂户不滿百全義招懐流散勸之樹藝刑寛事簡逺近趨之如市出見田疇羙者召田主勞以酒食有蚕麥善收者賜以茶綵有田荒穢者集衆杖之由是比户豊實水旱無飢既去百姓思之立廟以祀五代何澤唐洛陽令莊宗好獵數踐民田澤諫止之楊昭儉晉河南少尹時河决數郡大發丁夫塞之晋少主喜命立碑紀其事昭儉表諌曰刻石紀功不若下哀痛之詔少主嗟賞之卒罷其事宋邊珝知洛陽縣其兄扞嘗為河南令而珝繼之兄弟迭尹赤邑時人榮焉王旭太宗時出知緱氏縣時官隣邑者多貪猥民民有永寧三钁緱氏一䥥之謠趙普為西京留守河南尹表劉昌言為通判府事悉委之師頏知陜州簡静為治時西鄙用兵運道所岀軍士多亡命嘯聚山林為盗頏嚴其廵捕盗越他境向敏中景徳初為西京留守知河南府盡心民事時有僧過村家寢户外夜見盗入挾一婦出僧慮禍及亡去忽墮眢井則婦人已殺在井中主人執僧詣縣掠治獄成敏中疑之因宻訪果得賊并贓人以為神薛映知河南府為治嚴明吏不能欺每五鼓冠帶黎明據案决事雖寒暑無一日異冦凖以前宰相守陜州判河南府留心民事不以大臣自驕陳堯佐知河南府初為京西轉運使有治聲及守洛陽人稱其政馮拯再知河南府後又以使相出判仁宗遣人撫問還奏其家儉陋被服甚質因賜衾禂及錦綺屏查道天禧中知虢州值蝗災民歉道不候報出官廩振之所活至萬餘人政務寛恕吏胥有過未嘗笞罰狄棐知陜州為政愷悌不為表暴後又知河南府李迪以前宰相出判河南府究心郡政不舎書夜子及之知陜州吏事精明以稱職聞王曽以使相判河南府㑹歳歉里有困積者飢民聚黨脅取鄰郡以强盗論曽但笞而免之逺近以為法張奎知河南府宫闕歳乆頗圯奎大加興葺又按唐街陌分榜諸坊以能政聞初其七世祖全義尹河南洛人徳之及見奎偉儀觀曰真齊王孫也宋庠知河南府有一僕告舉人行槖有不稅物庠曰舉人孰無所貨物未可深罪若僕告主此風不可長乃治僕罪遣之桑懌為澠池尉永安縣廵檢所至盡捕諸盗盗畏其名聞風而遁尹洙歴河南府户曹又知河南縣遷伊陽宰教士讀書作文以民事為念吏不敢欺歐陽脩為西京留守推官時尹洙梅堯臣皆仕於洛脩從洙學為古文與堯臣歌詩相倡和遂以文章鳴世孫唐卿景祐中通判陜州於吏事若素習民有母再適人而死及葬父遂盗母之喪祔葬之有司論以法唐卿曰是知有孝而不知有法爾乃釋之呉育知河南府徙陜州後又判西京留臺惠洽人心士民喜之弟充亦知陜州政務安靜李若谷知陜州治民多智慮愷悌愛人盗聚青灰山遣人招諭之盗殺其黨與自歸後又知河南府張方平神宗時為西京留守嘗奏罷𣙜河北䀋以惠百姓范鎮為新安主簿西京留守宋綬以鎮富文學召置西京國子監使教諸生司馬池知虢州專以長厚為政不報私怨人甚稱之韓絳元豐中知河南府夏大雨伊洛間民被溺者十五六絳發廩賑恤收葬溺死禁止盗賊又環城築隄數月水復至民頼以免韓縝知河南府視民如子不以苛法陳希亮西京運轉使石塘河兵叛希亮輕車出按賊相與列訴道周希亮徐詢其所苦令曰汝已自首皆無臯乃推首謀者斬之以徇馬仲甫知登封縣轘轅道險厄遂傭民鑿平為坦塗人便其行為刻石頌羙韓贄知河南府建永厚陵費省而不擾神宗稱之范祖述知鞏縣鑿南山導水入洛縣無水患文彦博稱其能范純仁神宗時提舉西京留臺元祐中以前宰相判河南府李中師知河南府前此多大臣居守委事掾幕吏習弛緩中師一以嚴整齊之號為治辦孫覽河南簿守職之外頗精講學後知河南府慈厚以待百姓遇事立決無滯孫鼛知偃師縣蒲中優人詭僧服隱居間以不語惑衆相傳有異法奔湊其門鼛收案姦状立伏辜蘇軾為福昌縣主簿歐陽脩以制䇿薦之入三等除僉書鳳翔府節度判官蘇轍為澠池主簿王安石引為三司條例司属官時欲行青苗法轍力陳不可安石怒左除河南府推官趙良規知陜州歳飢百姓請閣殘稅二分為官伐芟以給河埽或以為須報乃可行良規檄縣遂行而以擅命自劾范純禮知永安縣永昭陵建配木石磚甓及工徒於一路獨永安不受令他日衆質之純禮曰陵寢皆在邑境嵗時繕治曷若置之使奉常時用乎韓𤦺是其言劉安世自洛州司法恭軍授河南府軍事判官以剛直知名呂大忠知陜州清謹持身為政慈愛發奸摘伏盗賊知畏張商英河南尹秉政亷平改鑄錢以平泉貨李彦仙靖康初為石壕尉保三觜以計復陜州命知陜州益為戰守備金人屢攻彦仙極力禦之金人技窮而去守陜再踰年城䧟巷戰北走投河而死阮駿河南少尹金人犯京師率兵擁䕶神御殿罵聲不絶口卒遇害趙叔憑建炎間為陜州都監金人圍城援兵不至時叔憑子官盧氏遺以書曰人臣當死國難况吾近属可辱命耶遂死之時通判王滸縣令張圯等五十一人皆死無降者金完顔伯嘉知河南府事時甫經兵後兵乏食伯嘉令輸棗栗菜根足之皆以為便富勒呼知河南府貞祐中為陜州宣撫使元兵取潼闗戍卒皆潰富勒呼禦戰兵敗死之元史天澤憲宗時經畧河南均賦稅更定鈔法立屯田保甲河南大治陳祜中統初為河南路總管時州縣以未給俸多貪暴祜獨以清慎見稱在官八年如始至之日譚澄至元初為河南路總管興利除害有愛民之政張特立偃師主簿正大初遷洛陽令時軍旅數起郡縣窘迫東帥道經洛陽責令治糗其期三日足後期如軍法民素賢特立争輸於庭賈淵延祐間為偃師尹西冦告變備禦撫慰民頼以安王翺大徳間為鞏縣尹有治聲民感其徳劉傑宜陽縣尹出已錢募民生理每月收利三分以濟逋租縣人呉得常彭得争田乆不决傑諭之二人感泣遂不復爭三年之間教化大行閻從新安縣尉縣有鬻麥商為賊所殺莫知主名從因集吏民至尸傍跽聽忽一人屏樹而立命卒引詰之賊遂服嘗於道中遇數人騶從若貴㳺者從曰此巨盗也邏致之果得其實鄰境稱為神明張世英盧氏縣尹勤於撫字邑人祠之本朝康茂才洪武初同知大都督府事將兵取汴洛駐師陜州給粮餉造浮橋以治大軍徐孝義洪武初任盧氏縣主簿上書請都中土擇守令興禮樂書奏朝廷嘉納之周榮洪武間河南知府遇事果斷洛陽民婦張氏失綿線不知盗名訴于府榮宻謂之曰汝但歸焚香罵府官不為我捕盗有嗔怒者即以聞張如其言不二日果有嗔者一問即伏府中稱為神明徐麟洪武初為河南府同知愽學果斷下車之後百廢俱興朞年而郡邑稱治王桓洪武間盧氏知縣亷慎自持抑豪强剗蠧弊暇日廵歴鄉社問民疾苦在職六年境内熈然郭肫洪武末孟津縣丞抑豪右恤貧困遇事勤敏賞罰明信數年縣中稱治民富於初郝敬永樂初知永寧縣守身亷謹遇事公勤縣有萬箱等渠嵗乆湮塞敬諭民疏導之溉田百餘頃戴希賢永樂間知河南府禮賢士抑豪强盗賊屏息道不拾遺滿去吏民泣送者塞路李驥河南知府公平亷潔城市多盗驥設火甲一户被盗一甲償之犯者大署其門曰盗賊之家又為勸教文振木鐸以誦之自是道不拾遺立集於城市以便交易郡人立廟祀之李守義永樂間偃師縣主簿縣北有山水為害守義脩堰以道之遂息兼得灌溉之利党理宜陽知縣蒞政公勤律身清白抑豪强禁浮習俾游食之民各安其業谷庸永樂間知登封縣居民席守中姪被虎齧死庸齋沐投疏中岳祠不旬日虎自投於守中眢井中人以為徳政所致呉祥永樂間知嵩縣為政寛和流民自歸者二百餘户縣有猛虎刼賊二害祥乃禱神未踰嵗獲虎二十餘賊黨亦各散去民遂安業袁錠河南知府亷以律已誠以待下作勸善榜以喻弗率者作勸農歌以示失業者任滿民立去思碑儀㤗景㤗初陜州判官尋陞本州同知卒官民哀思之省志李春閿鄉主簿境西河每嵗水患春躬相地勢諭民䟽導其患遂息省志劉頴正統初偃師知縣陞去民為立碑頌徳省志劉粹正統間閿鄉知縣遇旱毎禱有應號曰雨劉省志彭烈成化初知河南府累陞廣東左布政使省志柯忠成化間知鞏縣陞江西道監察御史去民甚懐之省志何鑑成化間河南知府政宜於民省志張智陳留知縣以才堪治繁調洛陽縣省志流寓陸扆唐嘉興人宰相贄族孫客居於陜工文詞思中如注射累遷翰林學士昭宗優遇之後拜同書門下平章事孔承恭唐京兆人昭宗東遷舉族隨之遂占籍河南父莊晉諫議大夫承恭以䕃入官累遷太常少卿以疾求觧官且言早逰嵩少間樂其風土願卜居焉授將作監致仕王彦昇本蜀人唐同光中移家洛陽補東班承㫖歴晋周官至龍㨗軍都虞候宋初累官原州防禦使西人畏之不敢犯塞太祖以其專殺韓通終身不授節鉞李建中其先京兆人父祖俱事蜀王建蜀平建中侍母居洛陽舉宋進士累官工部郎中通判河南府建中善書札草𨽻篆籀八分俱妙好古勤學多藏古噐名畫張澹其先南陽人徙家河南澹幼好學有才藻舉進士周恭帝時為左司員外郎宋初加祠部郎中權直學士院攝殿中監澹羙風儀善談論歴官釐務所至皆治張齊賢本曹州人徙居洛陽宋太祖幸西都齊賢以布衣獻䇿馬前條陳十事四説稱㫖齊賢堅執以為皆善上怒令武士拽出之及還語太宗曰我幸西都唯得一張齊賢耳異時可使輔汝為相後官至右僕射以司空致仕邵雍其先范陽人雍遊河南葬其親伊水上遂家焉受學李之才探賾索隱遂衍先天之㫖尤精數學著書十餘萬言富弼司馬光呂公著二程子雅敬雍為市園宅自名其居曰安樂窩春秋時乘小車出遊城中賢者悅其徳不肖者服其化舉遺士補潁州團練推官不就卒諡康節趙及其先良鄉人父的事契丹宋師北征乃歸授偃師令因家焉及和厚亷退尤篤内行舉進士歴知數州民吏愛之累遷至右諫議大夫文彦愽汾州人仕宋任將相五十年後以太師致仕居洛陽尊徳樂善見洛人邵雍程顥兄弟接之如布衣交與富弼司馬光等十三人置酒賦詩相樂序齒不序官謂之耆英㑹好事者莫不慕之吕公著夀州人父夷簡仁宗朝大拜在中書二十餘年公著幼嗜學至忘寢食夷簡噐之曰他日必為公輔寓居洛陽舉進士累官御史中丞元祐初拜尚書右僕射兼中書侍郎與司馬光同心輔政後進司空卒贈申國公謚正獻兄公綽公弼弟公孺俱至顯官司馬光夏縣人神宗時累官樞宻使與王安石論不合出知永興軍請判西京御史臺歸洛自是絶口不論事居洛十五年天下以為真宰相哲宗立入相罷行新法曾幾其先贑州人徙河南府學粹文純高宗時累官敷文閣待制嘗三仕嶺表家無南物兄開亦善屬文累官禮部侍郎兼直學士院以忤秦檜罷開嘗師㳺酢及劉安世故立朝遇事臨大節而不可奪許古瀛州人金進士哀宗時以左司諌致仕居伊陽性嗜酒每乘舟出村落間留飲或十數日不歸及泝流而上老稚爭為挽舟其為時人愛慕如此薛繼先河東人金末隱居洛西山中課童子讀書事母孝所居化之御史石玠行部過繼先繼先不之見或問故繼先曰今時政未必皆善御史一有所劾將謂自我發之他日并鄰里必有受其祸者子純孝有父風杜瑛覇州人金末避地河南緱氏山中搜訪諸書盡讀之而究其指趣元初教授汾晋間徴薦皆不就杜門著書優㳺以終姚樞栁城人遷居洛陽肆力程朱之學仕元官至中書左丞昭文館大學士翰林承㫖從子燧為文閣肆該洽有西漢風仕至翰林學士承㫖陳天祥本晋寧人元中統初河南宣慰司授以千户遏宋兵事平居偃師號緱山先生羣書畢覽至元中累官中書左丞議樞宻院事及卒追封趙國公謚文忠人物商伊尹名摯古萃川人耕於萃野受湯三聘而起遂相伐桀在太甲時居保衡之任作書以訓于王萃野又在陜西邰陽周申伯周宣王母舅封申築城于謝仲山甫作詩送之曰崧高維嶽峻極于天惟嶽降神生甫及甲仲山甫周宣王之臣尹吉甫作詩羙之管仲潁陽人名夷吾鮑叔牙薦之齊桓公以為相稱仲父九合諸侯一匡天下仲之力也蘇秦洛陽人師鬼谷子㳺說秦王書十二上而說不行裘敝金盡憔悴而歸妻不下機嫂不為炊後從説得行并相六國佩印而歸妻嫂不敢仰視秦歎曰使我有負郭田二頃安能佩六國相印乎弟代厲皆知名當時漢賈誼洛陽人文帝時河南守呉公薦之召為愽士時年二十餘歳中超遷至太中大夫誼請改正朔興禮樂絳灌等毁之出為長沙王太傅帝後思誼召見宣室因問鬼神事至夜半帝不覺前席拜梁王太傅上治安䇿論者以為通達國體孫嘉好學世其家昭帝時為九卿劇孟洛陽人以俠顯文帝時呉楚反周亞夫乗傳至河南而得孟喜曰呉楚舉大事而不求劇孟吾知其無能為矣蔡義河南人昭帝時詔能韓詩者義得待詔以說詩稱㫖擢光祿大夫給事中遷御史大夫後代楊敞為丞相封平陽侯卜式河南人以田畜為事武帝朝願輸家財助邉召拜中郎初式不願為郎令牧羊上林嵗餘羊肥息上善之式曰治民亦猶是矣惡者輒去母令敗羣上竒其言拜緱氏令後為御史大夫賜爵闗内侯楊僕福昌人武帝時為樓船將軍伐南粤有功後封梁侯賈捐之誼曾孫元帝初上疏言得失待詔金馬門時朱崖郡反朝議大發軍擊之捐之建議罷擊後以忤石顯下獄棄市士論痛之周堪緱氏人明經有志操建武中仕郡縣後累官至侍御史遷尚書令光祿勲堪清亷公正後為侍中都騎尉郭賀雒陽人祖堅伯父游君並脩清節賀光武時尚書令曉習故事多所匡益拜荆州刺史有殊政顯宗賜以三公之服勅行部去䄡帷使百姓見其容服以彰有徳龎參緱氏人舉孝亷拜左校令永初中御史中丞樊凖薦參可用拜謁者後為漢陽太守抑強助弱以惠政得民順帝時累遷至太尉時三公之中名以忠直种暠洛陽人父遺財三千萬暠悉以賑䘏宗族邑里之貧者順帝時舉孝亷為侍御史紏奏稱職累遷南郡太守入為太司農遷司徒子岱舉孝亷不就次子拂官至太常孫邵官至諌議大夫杜宻陽城人為人沈質少有厲俗志為司徒胡廣所辟遷北海相宦官子弟為令長姦惡者輒捕按之後拜太僕黨事既起免歸夲郡與李膺俱坐而名行相次故時人亦稱李杜焉尹勲鞏縣人伯父睦為司徒宗族多居貴位而勲獨持清操察孝亷為邯鄲令有異政桓帝誅梁兾勲建大謀封都鄉侯遷汝南太守終大司農成瑨𢎞農人舉孝亷拜郎中遷南陽太守舊多豪强瑨下車振威嚴以檢懾之信任功曹岑晊時語云南陽太守岑公孝𢎞農成瑨但坐嘯公孝其字也杜䕫河南人以知音律為雅樂郎中平五年以疾去官司徒禮辟不就奔荆州劉表令與孟曜為漢主合雅樂樂備表欲庭觀䕫止之三國孟光洛陽人漢末人蜀劉焉父子待以客禮光愽物識古無書不覽蜀漢先主定益州拜為議郎遷大司農年至九十餘趙達河南人少從侍中單用受學用思精宻謂東南有王者氣可避難故脫身渡江事孫呉治九宫一筭之術能應機立成對問若神郤正偃師人祖儉靈帝末益州刺史正安貧好學弱冠能屬文仕蜀漢為秘書帝禪遷洛陽惟正及殿中督張適從侍晋以為已西太守其所著述詩賦論將百篇胡昭居陸渾山躬耕樂道養志不仕閭里敬而愛之漢末孫狼等叛亂至陸渾南乃相約誓言胡居士賢者也一不得犯其部落一州頼昭咸無怵惕魏正始中以薦公車特徴㑹卒年八十九晉王濬𢎞農湖縣人家世二千石濬博渉墳典仕為車騎從事中郎累遷益州刺史造樓船平吳以功遷鎮軍大將軍累加特進散騎常侍後軍將軍郭象河南人少有才理好老莊閒居以文論自娯永嘉中辟司徒掾稍遷至黄門侍郎著碑論十二篇趙整洛陽人苻秦時為散騎常侍常盡忠匡諫時秦主堅頗好酒色整嘗為詩上之曰昔聞孟津河千里有一曲此水本自清是誰使令濁堅正色曰朕之過也董景道𢎞農人少好學千里從師與人寡交明春秋三傳京氏易馬氏尚書韓詩皆精宻永嘉中知世亂隱於啇洛山劉曜時徴為太子少傅散騎常侍皆不就南北朝房謨洛陽人仕魏歴昌平代郡太守所在亷惠神武入洛拜潁川太守徴為丞相右長史以清直被賞遇累遷至驃騎大將軍攝南汾州事世稱其清白奚康生河南人少驍武彎弓十石矢異常箭仕魏為直閣將軍吐京胡反命康生等討之四軍俱敗康生軍獨全追胡至車突谷傷殺數千人韓雄河南東垣人慷慨有大志魏大統初舉兵洛西與河南行臺共為掎角所向克復封武陽縣侯後除河南尹都督中州刺史在邊具知敵人虚實元文遥洛陽人有王佐才仕北齊累遷尚書左僕射歴事三主明達世務時因魏宰縣多用厮濫文遥令搜剔貴逰子弟發教用之士人為縣自此始元暉洛陽人仕周補相國中兵叅軍遷武伯下大夫時突厥入冦令暉齎錦練出使暉說以利害可汗大説遣其名王獻方物累轉兵部尚書魏州刺史韓裒潁陽人以獵經史深沉有逺畧周文帝為丞相時引為録事叅軍大統初拜丞相府司馬累遷至少府裒歴事三朝武帝深見敬重于謹周洛陽人性沉深有識量位太師耆年碩徳為三老賜延年杖封藍田縣公宇文慶洛陽人深沉有噐局以從征有功授都督進驃騎大將軍後從周武帝征伐以功進位大將軍隋初進位上柱國長孫覽洛陽人父紹逺後周小宗伯覧有噐量渉書記尤曉鍾律明帝時拜車騎大將軍毎公卿上奏必令省讀及誅宇文䕶以功封薛國公隋伐陳徴為東道行軍元帥終涇州刺史子洪仕為北平太守有惠政隋長孫熾覧從子性敏惠涉書傳後周武帝置通道館學士熾首應其選隋初拜上儀同三司判東官右庶子後持節使東南道廢置州郡廵省風俗還授僕射遷户部尚書韓擒虎雄子容貎魁岸有膽畧好經史初仕周文帝時拜廬州總管以平陳功進位上柱國又為凉州總管徴還疾篤時有人驚走至其家曰我欲謁閻羅王擒虎聞之曰生為上柱國死作閻羅王足矣子世諤有父風賀若弼洛陽人父敦周金州總管弼少慷慨驍勇觧屬文愽渉書記獻取陳十䇿文帝善之賜以寶刀克定三呉拜大將軍元孝矩洛陽人西魏襲爵始平縣公拜南營州刺史益州總管轉司憲大夫隋初拜夀州總管轉涇州刺史長孫晟洛陽人渉書記善射趫㨗過人仕周為司衛上士隋高祖異之許為名將後累官相州刺史右驍衛將軍女為唐太宗后元亨洛陽人父季海後魏司徒馮翊王周大祖以亨功臣子優禮之歴武衛將軍勲州刺史隋初拜太常卿出為衛州刺史在職八年惠化大行元巖洛陽人好讀書以名節自許仕周累官御史大夫隋初拜兵部尚書明達世務廷爭靣折無所回避後為益州總管蜀王奢侈巖切諫之後蜀王為非法文帝曰元巖若在吾兒豈至是乎元夀洛陽人愽渉經史仕周授儀同三司隋平陳以功拜尚書左丞出為箕州刺史在任公亷入為大府少卿累遷右光祿勲趙軌洛陽人父肅後魏廷尉卿軌少好學有行檢後周蔡王引為記室隋初轉齊州别駕有能名徴入京師與牛𢎞撰定律令格式累官夀州總管元善洛陽人祖又後魏侍中父羅梁青冀三州刺史善少子隨父至江南學通五經侯景亂歸後周隋初累遷國祭酒帝嘗視學命講孝經敷陳義理兼以諷諫帝大悦賚錫甚厚張湏陀閿鄉人有勇畧弱冠從史萬歳討西僰以功授儀同從楊素擊平漢王諒加開府大業中為齊郡賛務歳飢即開倉賑給不待詔勅後以戰死唐長孫無忌洛陽人晟之于愽渉書史唐初擢比部郎中佐大宗定天下功第一封齊國公累遷太子太師後與禇遂良同受顧命高宗初以諌立武昭儀削爵流黔州子順徳官至驍衛大將軍常達陕州陜縣人從高祖征伐薛舉方强達敗其子仁杲舉遣仵士政紿降伺隙刼之歸賊達不屈仁杲平高祖嘉其忠節仕終隴西刺史張士貴盧氏人善左右射隋末從羣盗攻剽城邑高祖招降之從征有功進爵虢國公貞觀中以破賊功遷右領軍大將軍李君羡洛州人初為王世充驃騎尋歸唐從破竇建徳劉黒闥所向必先登摧其鋒突厥至渭橋復擊破之太宗曰使皆如君羡者虜何足憂累官左武侯中郎將封武連縣公趙𢎞智新安人元魏大將軍肅之孫通書傳太宗時累官黄門侍郎兼𢎞文館學士出為菜州刺史以父禮事兄𢎞安兄卒哀慟過期撫兄子慈均所生永徽初為國子祭酒丘行恭洛陽人父和初仕隋歴三州刺史善撫吏士得其心大業末拜交阯太守行恭有勇善騎射唐初累從戰伐功多又從侯君集平高昌封天水郡公劉允濟鞏人少孤事母孝工文辭與王勃齊名舉進士累遷左史直𢎞文館為著作佐郎脩國史遷鳳閣舍人夀州刺史以清白稱入為脩文館學士上官儀陜州陜縣人工詩詞貞觀初為𢎞文館直學士高宗時累遷西臺侍郎武后得志專威福儀宻請帝廢后后聞而殺之中宗時贈中書令姚崇陜州硤石人父懿貞觀中雋州都督崇少尚氣節長乃好學初授濮州司倉叅軍累遷鳳閣侍郎以張易之譛出為靈武道大總管張柬之等誅二張崇與謀以功封梁縣侯𤣥宗立說以十事遂拜相封梁國公楊元琰虢州閿鄉人性孝居父喪七日不食初補梓州司倉叅軍累遷右羽林將軍與張柬之等謀誅二張後以削髪免禍睿宗立四遷刑部尚書以太子賓客致仕張齊賢陜州人聖厯初為太常奉禮郎遷愽士論禮制合古義累遷諫議大夫吉頊洛州河南人舉進士聖厯中累遷天官侍郎時張易之以寵盛思自全問頊計頊曰天下思唐乆矣廬陵斥外相王幽閉公盍從容請相王廬陵以副人望易之如頊教后意乃定張廷珪河南人慷慨有志尚第進士累遷監察御史按劾平直開元初大旱闗中飢廷珪應詔上疏官至少府監廷珪偉姿儀善八分書與李邕友善及邕躓於事屢表薦之人尚其方介賈至洛陽人父曾歴官中書舎人至擢明經第授單父尉𤣥宗幸蜀拜起居舎人知制誥及帝傳位至撰册帝曰兩朝盛典出卿父子可謂繼羙大厯初仕至兵郎侍郎進京兆尹終右散騎常侍張說洛陽人永昌中䇿賢良方正第一授校書郎遷左補闕累官同平章事後為中書令封燕國公朝廷大述作多出其手畢構河南偃師人六歳能文擢進士居親喪毁棘甚歴閠衛開陜四州刺史𤣥宗立授河南尹進户部尚書終太子詹事卒謚曰景子炕天寶末為廣平太守拒安禄山城䧟死之贈户部尚書畢諴構從曾孫早孤夜燃薪讀書遂工文詞性端慤不與人交舉進士累官翰林學士宣宗嘗召訪邊事緘援質古今甚悉時號禁中頗牧懿宗初拜同中書門下平章事張守珪陜州人慷慨尚節義開元中為𤓰州刺史敵掩至衆失色守珪置酒城上㑹諸將作樂敵疑有備不敢攻引去守珪縱兵擊敗之入拜右羽林大將軍子獻恭數有軍功累遷檢校吏部尚書房琯河南縣人少好學風度沉整隠陸渾山開元中以薦為校書郎授盧氏令𤣥宗幸蜀琯馳謁拜吏部尚書同平章事與韋見素奉册靈武見肅宗及還都遷禮部尚書元澹河南人博學尤通訓故及進士第累官通事舎人狄仁傑器之後為𢎞文館學士𤣥宗自註孝經詔澹為疏立於學宫卒謚曰獻盧邁河南縣人性孝友舉明經補太子正字累遷吏部員外郎出為滁州刺史召還遷諫議大夫條當世利病後拜相罷為太子賓客張鎰河南人為殿中侍御史黄原令盧樅為邑人所構有司以死論鎰不直之理樅免死坐貶撫州司户叅軍大厯初為濠州刺史後拜相罷為鳳翔隴右節度使梁文貞虢州人少從軍守邊逮還親已亡自傷不得養即穿壙為門晨夕汛掃廬墓左喑黙三十年家人有所問畫文以對有甘露降塋木白兎馴擾縣令刻石記之蕭昕河南人中愽學宏辭科調夀安尉累遷禮部侍郎大厯中持莭使回紇責其失禮回紇厚禮之徳宗幸奉天昕年八十餘歩至奉天遷太子少傅兼禮部尚書卒年九十三劉廼河南伊闕人少頴悟誦六經日數千言善文詞為時所推徳宗幸奉天廼臥疾私第朱泚遣人召之固稱疾篤聞車駕幸梁州自投於床下搏膺呼天不食卒謚曰忠惠盧坦洛陽人仕為河南尉杜黄裳為尹遇之甚厚累遷刑部郎中御史中丞再遷户部侍郎與宰相李吉甫議不同出為東川節度使獨孤及洛陽人為兒時讀孝經父試之曰兒志何語對曰立身行道揚名於後世天寶末補華陰尉代宗召為左拾遺上疏陳政事得失累官檢校司封郎中及喜㧞後進性孝友明善惡長於談論盧仝居河南自號玉川子韓愈為河南令愛其詩厚禮之嘗為月蝕詩以譏切元和逆黨愈稱其工獨孤朗及子元和中擢左拾遺因勸罷兵忤憲宗意貶興元府户曹叅軍乆之拜殿中侍御史出為韶州刺史後遷御史中丞工部侍郎出為福州觀察使獨孤郁朗弟始生而孤元和初舉制科高第為翰林學士權徳輿輔政郁以子壻引嫌求避改考功員外郎徳輿去位還為學士以疾辭徙秘書少監元徳秀河南人少孤事母孝母亡廬墓天寶中為魯山令天下高其行稱曰元魯山房琯嘆曰見紫芝眉宇使人名利之心都盡紫芝德秀字也及卒家惟杖履簞瓢而已謚文行先生元結徳秀族弟舉制科㑹祿山亂沉浮人間蘇源明薦其可用帝幸河東結上時議三篇擢金吾將軍代宗立辭去侍親歸樊上自稱漫郎韋應物河南人性高潔工詩永㤗中歴滁江二州刺史召為左司郎中貞元初又歴蘇州刺史世號韋蘇州有集十卷梁肅世居陸渾隋刑部尚書毗五世孫唐建中初中文詞清麗科擢太子校書郎以薦授右拾遺脩國史終翰林學士楊虞卿虢州𢎞農人父寕國子祭酒虞卿第進士愽學宏詞累官監察御史穆宗初上疏極諫累遷𢎞文館學士出為常州刺史遷京兆尹後貶䖍州司户叅軍楊憑𢎞農人善文詞與弟凝凌齊名大厯中踵擢進士第累官至太常少卿湖南江西觀察使入拜京兆尹終太子詹事元稹河南人舉制科第一拜左拾遺憲宗時陳西北邊事召問得失當路者惡之出為河南尉拜監察御史遇事敢言官至膳部員外郎稹長於詩與白居易齊名時稱元白賈餗河南人少孤舉進士第一又䇿賢良授渭南尉擢考功員外郎知制誥敬宗時拜常州刺史入為吏部侍郎再遷京兆尹兼御史大夫拜相曹確河南縣人擢進士第拜兵部侍郎懿宗時同平章事為人儒術深邃噐識方重居位六年出為節度使李襲吉洛陽人僖宗時為河中𣙜鹽判官後為晋王掌書記襲吉博學知唐故事累遷節度副使官至諌議大夫五代高季興陜州硖石人梁初拜荆南節度使始至江陵一城而已李興招輯綏撫末帝封為渤海王唐初封南平王子從誨封渤海王孫保融周封南平王子繼冲立歸於宋劉岳洛陽人唐民部尚書㑹八代孫敏於文詞舉進士仕梁為翰林學士後唐明宗時為吏部侍郎遷太常卿桑維翰河南人為人醜恠身短靣長初舉進士主司惡其姓不取或勸其他仕乃著日出扶桑賦以見志鑄鐵硯示人曰硯敝則改業卒第進士晋時拜相李鄑洛陽人曾祖坦馮翊令祖仲芳大理司直父𤣥福建觀察推官鄑仕梁歴滑魏宋三鎮留後遷禮部尚書至唐以太子少傅致仕卒贈太保子延昭殿中丞王處訥洛陽人少時有老叟煑石如麵令食之且曰汝性聰悟後當為師處訥留意星厯占候之學避地太原漢時累官尚書愽士判司天監事周祖入汴嘗問以劉氏祚短事處訥曰漢祚猶永第以高祖多報讎殺人所以運祚不長周祖蹶然太息後拜司天監宋劉温叟岳子始以父任補四門助教仕後晋為翰林學士宋初拜御史中丞子曄天禧初與魯宗道同為諫官天聖中為龍圖閣直學士知河南府徙河中王審𤦺其先遼西人徙家洛陽五代周時為鐵騎都虞候宋初擢殿前都指揮使後加同平章事及卒追封琅邪郡王審𤦺重厚有方畧善騎射鎮夀春日歳得租課量入為出未嘗有所誅求子承衍承徳承祐承僎承謹俱至顯官李漢瓊洛陽人資質魁岸有膂力五代時歴晋周累官左射指揮使宋初遷鐵騎第二軍都校領累遷檢校太尉卒贈中書令張鑄洛陽人五代時舉進士仕梁累官秘書監判光祿寺宋初加檢校刑部尚書鑄羙姿儀善筆札老能燈下細書如蠅頭由晋以來徽號封册皆鑄書之及卒身無兼衣家人鬻其服馬園囿以𦵏李琪河南伊闕人幼生長兵家得給事宣祖左右太祖以材力稱及受禪命補鎮職累遷效忠都虞候領富州刺史後加左武衛大將軍劉保勲河南人父處讓晋樞宻使保勲十許歳攝潞州左司馬父卒補供奉官習刑名之學頗工詩宋初累遷御史中丞知幽州行府事㑹王師不利與其子利渉没於巨馬河端拱初贈工部侍郎宋偓洛陽人五代周時年十一以父死事補内殿直遷供奉官累官至鄧州節度使宋初從太祖征伐有功加同平章事知覇州聶崇義洛陽人舉三禮五代漢時累官國子愽士校定公羊春秋周顯徳中進司業兼太常博士世宗以宗廟祭噐漸失規式命檢討纂書以聞宋初又上三禮圖凡宗廟禮制多所更定崔頌偃師人父恊後唐平章事頌以蔭補官歴漢周官至左諌議大夫宋初判國子監太祖問以一時典禮頌占對閒雅上甚重之子曉太子右賛善大夫臚雍熈初進士官至太常少卿李度洛陽人五代周進士入宋累官虞部員外郎直史館借太常少卿使殳州未至卒度工於詩有佳句為時傳誦弟康亦善詩太宗時進士官至右賛善大夫何繼筠洛陽人父福進累官節度使繼筠深沉有智畧宋初從征有功累拜建武軍節度使前後備邊二十年善揣邊情能以少擊衆遼人畏其名子承矩歴知數州終齊州團練使安徳裕河南人父重榮石晋成徳軍節度徳裕性介潔愽貫文史精於禮傳宋初舉進士甲科累官金部郎中出知睦州還判太府寺有集四十卷安忠洛陽人祖叔于仕石晋累任方鎮以太子太師致仕忠形質魁岸乆事宋太宗以藩邸及即位授供奉官嘗䕶高陽闗屯兵屢敗契丹歴知夀貝揚州累遷東上閤門使石熈載洛陽人五代周時舉進士宋初歴拾遺補闕出為忠武射崇義二鎮掌書記太宗即位累遷左僕郭忠恕洛陽人七歳能屬文舉童子及第五代周時為周易愽士宋初以被酒貶官流落尤善圖畫太宗召為國子監主簿令刋定歴代字書坐罪流登州所定有古今尚書并釋文石中立熈載子年十八能文授光祿丞遷殿中丞除直集賢院累擢知制誥翰林學士景祐中拜參知政事吕䝉正河南人太宗時舉進士第一通判昇州代還歴拾遺補闕遷翰林學士拜參知政事嘗以宰相判郷郡時人榮之䝉正三居相位累封許國公子行簡官至龍圖閣直學士种放洛陽人七歳能文與母隠終南山以講習為業從學者衆太宗召之不起賜錢養母母卒復賜錢帛助喪召授左司諌寵賚甚厚尋乞歸山後數召至詢問據經以對頗多禆益從祠汾陰拜工部侍郎徙居嵩山卒贈工部尚書不娶無子以姪世衡為嗣錢若水新安人舉進士為同州推官以善决疑獄名聞于朝遂召用乆之拜同知樞宻院事真宗即位以親老求退罷為集賢院學士温仲舒河南人舉進士通判吉州直史館拜樞宻直學士累遷同知樞宻院事後知河南府才堪應務與冦凖同進人稱温冦魏野陜縣人居東郊彈琴賦詩號草堂居士真宗召之辭疾不至嘗以詩贄王旦云㤗嶽汾陰俱禮畢這廽好伴赤松逰又嘗與冦凖詩好去上天辭富貴歸來平地作神仙後凖貶悔不用野言李瀆鄑曾孫父瑩善詞賦周進士為蒲帥記室宋初為殿中侍御史瀆博覧經史不求仕進聚書畫嗜酒往來中條山真宗祀汾陰召見辭足疾不起一日有人至床下誦詩云行到水窮處未知天盡時瀆曰吾逝矣頃之果卒魏野聞而哭之後六日亦卒人皆異之趙安仁洛陽人曾祖武唐虢州刺史父孚周進士殿中侍御史安仁舉進士真宗時累官叅知政事卒謚文定為人純慤寛恕善論事喜誘誨後進所著有集五十卷子温瑜官至國子博士良規工部侍郎康徳輿洛陽人父賛元嘗從曹光實襲李繼遷獲其母妻擢武州刺史賛元死真宗錄徳輿累官西上閤門使至和中河决頓丘徳輿以巨艘濟居民遂免昏墊仕至果州團練使知趙州徙東州鈐轄康保裔洛陽人祖志忠後唐時討王都戰殁父再遇從太祖征李筠亦死於兵保裔謹厚好禮善騎射宋初屢立戰功後為高陽闗都部署與契丹戰矢絶而死錄其子繼英繼彬繼明皆至顯官朱景河南偃師人舉進士調滎澤簿累遷光祿卿知壽州所至有能績臨卒自占遺表皆經國大計畧無一語求思澤詔加賻贈錄其子以官王曙河南人登進士乂中賢良方正科累官資政殿學士知陜州嘗與修册府元龜累遷同平章事方嚴簡重有大臣體卒贈中書令謚文康有集四十卷張景憲河南人以父師徳任為淮南轉運副使属官不法者多被舉刺累遷河東郡轉運使終知同州居官不畏强禦自負所守於人少許可母卒一夕鬚髪盡白范雍其先太原人祖從龜為蜀刑部侍郎入宋卒𦵏河南遂為河南人雍中進士第為洛陽主簿累官樞宻使進資政殿學士趙元昊反出知延州永興軍遷尚書左丞卒贈太子太師謚忠獻雍為治尚恕喜薦士子子竒孫坦皆至顯官田瑜河南壽安人舉進士歴袁郢合三州軍事推官累遷龍圗閣學士歴知青澶州謹厚少又能任劇繁而於吏事尤盡心焉鄭驤河南人登進士歴慶汝鄭秦四州推官累遷天章閣待制知鳳翔府以工部郎中知華州為政爱民謙已利物推功與人有古道焉楊日嚴河南人兄日華官至太常少卿三司副使日嚴進士及第試校書郎歴知襄廬鄆州累遷集賢院學士知河中府加樞宻直學士知益州為蜀人所信愛富弼河南人篤學有大度仁宗時舉茂才異等簽書河陽判官通判綘州慶歴中再使契丹以成和議拜樞密使後與文彦博並相天下稱為富文卒贈太尉謚文忠子紹庭官至祠部員外郎知宿州滕宗諒河南人舉進士累官刑部員外郎知涇州范仲淹薦以自代擢天章閣待制徙慶州終知蘓州宗諒尚氣倜儻自任好施與及卒家無餘財所蒞州喜建學而湖州最盛所著有諫䟽二十餘篇趙尚寛安仁子仁宗時知平陽縣有異迹遷知忠州以考課第一知唐州徙同宿二州河中府又徙梓州所至勤於農政治有異等仁宗嘗進秩賜金積官至司農卿耿昭化河南人仕為蜀州司户叅軍盗據城欲脅以官昭化大罵至斷手足不屈而死耿傅昭化子少喜俠尚氣初以父蔭累官通判儀州徙慶州元昊入冦參任福行營軍事諸将失利或勸傅避之傅愈前指顧自若被數創乃死詔贈右諫議大夫官其四子王隨河南人登進士甲科通判同州仁宗時累官翰林侍讀學士歴參知政事知樞密院事拜同平章事昭文館大學士後以使相出判河陽卒謚文惠陳大素河南緱氏人舉進士累官大理少卿能推原人情以傅法意毎臨案牘至忘寢食歴知兖明二州有治績官至兵部郎中常以為議法當據文直斷不可求曲當求曲當法所以亂也尹源河南人博學強記以文學知名而自晦不矜飾舉進士累官通判涇州嘗作唐説及叙兵十篇上之最後通判慶州范仲淹韓琦薦其才召試學士院源不肯試賦除知懐州尹洙源弟博學深於春秋為文謹嚴舉進士累遷起居舍人唐末以來文章寖敝洙與穆伯長倡為古文以矯時所向自是文風少變王益柔曙子兄益恭性恬澹官至司門貟外郎益柔少力學為文日數千言伉直尚氣喜論天下事用父䕃至殿中丞多所論列神宗廟累遷龍圖閣直學士知蔡揚毫州江寧應天府司馬光為資治通鑑獨能閲之終篇其好學頴此程顥其先世居中山曽祖而下葬河南遂為洛陽人父珦神宗朝太中大夫顥生而秀爽舉進士歴鄂上元主簿晋城令專尚徳化熈寧初為御史裏行論新法不合去後又知扶溝縣坐獄逸囚責監汝州稅哲宗立召為宗正丞命至而卒顥以道學鳴世稱明道先生後謚純公封河南伯程頥顥弟少有髙識非禮不動仁宗時上疏欲黜世俗之論以王道為心大臣屢薦不起哲宗初詔授西京國子教授力辭詔見擢崇政殿説書文彦博稱為眞侍講後入元祐黨藉頥與兄顥倡明道學出其門者最多世稱伊川先生後謚正公封伊陽伯兄弟俱從祀孔子廟庭楚建中洛陽人舉進士知滎河縣民苦鹽稅不平建中約田多寡以為重輕累官陜西都轉運使知慶州江寧成徳軍以政議大夫致仕元祐初文彦愽薦為户部侍郎不拜吕希哲公著子少從孫復石介胡瑗學復從二程張載游聞見益廣務躬行實踐元祐中為崇政殿説書勸導人主以正心誠意為本徽宗時歴知曹相邢三州為人樂易有至行逺近皆師尊之封滎陽公弟希純為中書舍人出知亳潁諸州邵伯温洛陽人雍子入聞父教出與司馬光二程子交故所聞日愽以薦授大名府助人調長子尉章惇為相薦之伯温願補外得監永興鑄錢監徽宗初上書數千言欲復祖宗制度辨宣仁誣謗觧元祐黨錮出知靈寳徙芮城縣後遷利路轉運副使所著有河南集聞見錄及皇極觀物諸觧席旦河南人七歲能詩元豊中舉進士未奏名上書言戰守事神宗嘉納令廷試賜第累官吏部侍郎顯謨閣直學士兩知成都府甚有治理加至述古殿大學士子益紹興初參知政事郭逵其先自邢徙洛康定中兄遵死於敵録逵為三班奉職范仲淹勉以問學後累官簽書樞密院事加檢校太尉哲宗時以左屯衛将軍致仕逵性慷慨喜兵學善用偏禆每令人自言所能暇日閲按之故臨陣皆盡其技一時稱為宿將云趙君錫安仁孫性至孝母亡事父良規不失左右及登進士第以親故不願仕父没始調知武强縣累官給事中嘗論蔡確章惇罪進刑部侍郎御史中丞紹聖中貶少府少監分司南京种世衡放兄子少尚氣節以放䕃補將作監主簿嘗知青澗城及環州以控夏人在邉數年積榖通貨善撫養士卒以故得人死力及卒羗酋臨者數日青澗及環人皆畫象祠之子古諤診皆有將材時號三种詔其㓜子也孫朴師道師中亦為名將任布河南人力學家貧嘗從人借書以讀進士及第累官至樞密政使以大子少保致仕始布歸洛中作五知堂謂知恩知命知道知足知幸也卒謚恭惠朱光庭景子十歲能属文辭父䕃舉進士調萬年主簿數攝邑人以明經稱元祐間為諫官有聲言路終集賢院學士知潞州光庭從程顥學嘗學於胡瑗瑗告以為學之本在於忠信故終身行之韓川陜州人舉進士元祐初為監察御史極言市易之害遷殿中侍御史疏言朝廷於人才徒信薦舉而不嚴考課仕終吏禮二部侍郎以龍圖閣待制知虢州郭忠孝逵子受易中庸於程頥少以父任補官登進士第累遷河東路提舉靖康初召為軍器少監力陳和議之非改永興軍路提點刑獄金人南侵與經畧唐重分城拒守城䧟死之張繹河南壽安人少家貧𤼵憤力學遂以文名㑹伊川自涪還遂徃受業伊州稱其頴悟卓偉又曰吾晚得二士謂繹與尹焞也尹焞源孫父林官至虞部員外郎焞師事伊川以篤行聞靖康初召至京懇辭還山賜號和靖處士金人䧟洛闔門被害焞死復甦避劉豫聘奔蜀止於涪紹興中召為崇政殿說書後遷禮部侍郎兼侍講所著有論語觧及門人問答宋炎陜縣人蹶張命中補秉義郎金人圍城射死數百人比再圍災以勁弩數百𤼵毒矢殺千餘人城䧟金人聲言求善射者貴之炎不應力戰死翟興河南伊陽人徽宗時與弟進應募擊賊號大翟小翟以保䕶陵寢功累官京西安撫等使兼知河南府紹興初劉豫將遷汴隂遣人殺興事聞贈保信軍節度使興為將多勇畧軍食或不繼激以忠義無不奮厲在河南累年金人不敢犯諸陵子琮沈勇有父風繼興為鎮撫使翟進興弟累以戰功進西京北路制置使兼知河南府㑹巨冦揚進擁兵數萬殘害汝洛間分兵犯進營進追之破賊四砦馬驚墜塹為賊所害贈忠州刺史官其後五人富直柔弼孫少敏悟有才名靖康初召賜同進士除祕書正字建炎中為御史中丞多所建明累遷端明殿學士同知樞密院事吕好問希哲子以䕃補官靖康中為御史中丞數建大議弹劾無所畏避尋遷吏部侍郎及金人南侵委曲以成中興之業建炎初為尚書右丞後以資政殿學士知宣州封東萊郡侯張玘澠池人建炎中以家財募兵以属翟興金兵渡河玘禦之白浪口金将取商州玘佐統制董先禦之九戰九㨗累功遷唐州馬歩軍副總管又從岳飛復西京六州平湖賊與金人戰於海州中流矢卒孝宗命祠於戰所子世雄没於符離之戰陳與義洛陽人其先居京兆自曽祖希亮始遷洛與義天資卓偉政和間上舍甲科累官大學博士徽宗見所賦墨梅詩有見晚之歎紹興中拜翰林學士叅知政事其出處氣節文章翰墨卓然可稱所著有簡齊集朱敦儒河南人父勃紹聖諫官敦儒志行髙潔累辭薦辟避亂客南雄州紹興初明槖言其深逹治體有經世才召為廸功郎固辭其故人勸之始起奏對稱㫖賜進士累遷兵部郎官敦儒素工詩及樂府婉麗清暢時人推重之吕本中好問子宣和中為樞密院編修官紹興初賜特進士累官中書舍人兼侍講本和性清約工詩詞卒謚文清所著有師友淵源録春秋觧童䝉訓等書子大猷大同從子大器孫祖仁祖平祖謙祖儉南渡後寓居婺州世有中原文獻之傳郭雍忠孝子傳其父學隱居陜州乾道中旌召不起賜號冲晦處士孝宗稔知其賢更封頥正先生令部使者遣官就問時年八十三矣雍於易發明精列淳熙初學者哀集忠孝雍所著列於七大家為大易粹言王忠民潁陽人㓜通經史靖康以來數言邉方利害屢召不至髙宗南渡忠民依商虢鎮撫董先先事以師禮劉豫僣立忠民作九思圖以明天下之義紹興初特授宣教郎忠民以本心非求名禄辭官遂不出元秦長卿洛陽人姿貌魁特俶儻有大志世祖徴至京阿哈瑪特專政長卿上書請誅之遂為阿哈瑪特所害其從子山甫為建康府判官聞長卿寃状即棄官累徴不起山甫子從龍仕為侍御史從徳仕至江浙行省參知政事卜天璋􅏖陽人負直氣讀書史織成敗大禮屢官山南亷訪使厲風紀清吏治州郡肅然嘗條陳二十事凡萬餘言目之曰中興濟治䇿後謝病居汴以餘禄施其族黨卒贈河南郡侯謚正獻袁裕洛陽人累官監察御史遷甘州等路宣撫副使兼西夏中興等路新民安撫副使甚有政績入為刑部侍郎終順徳路總管兄子師愈官至侍御史程埜偃師人愽通經史仕為太中大夫河南路總管轉集賢院直學士劉濬河南人為連江縣廵檢至正中賊帥王善冦閩瘠與仲子健將兵拒賊三戰三㨗衆多潰濬與賊鏖戰被執大罵而死賊義之舍健健結死士詐流丐賊中夜半發火大譟賊驚擾健手斬殺其父者事聞贈濬官立祠授健古田縣尹張恭偃師人以兵部符署案牘親老辭歸侍養父䘮過哀侍母馮尤謹歳凶采野菜為食而營奉甘㫖無乏母病嘗糞以驗天厯初西兵至河南居民悉竄恭守祖母病項中一劒母驚悸而沒恭居䘮盡孝詔旌其閭張惟敏鞏縣人㤗定間以儒官補集賢院掾史後追封梁郡公謚文定楊樸河南人早以文學得推擇為吏官至全椒縣尹冦入縱火樸度必死盡殺其妻女朝服坐堂上盗欲降之樸指妻女示曰我已戕我属政欲死官守耳乃連唾之賊縶樸倒立樹上而割其肉至盡猶大罵不絶蔡子英永寜人元季舉進士累遷顯官兀軍敗單騎走關中入南山有司以形求之械送京帥命釋之授以官不受退而上書大畧謂臣之事君猶女之適人一與之醮終身不改事君之道一食其禄終身不二朝廷重之命館於儀曹忽一夜大哭不止人問故子英曰思舊主爾知其志不可送之出塞本朝荅禄與權永寧人博學强記仕元為河南北道亷訪司僉事洪武初以故官起赴京授秦府紀善改監察御史除廣西按察司僉事擢翰林院修撰以應奉致仕秦從龍洛陽人仕元為御史元末避兵居鎮江洪武初朝廷重其才學老成以白金文綺聘之既至賜第西華門外事無大小悉與之謀以筆書漆板問答甚密及卒乘輿至其家哭之甚哀華士瞻偃師人性淳篤節操堅確洪武初以賢士舉授湖廣右布政使夏恕洛陽人謙和有智畧居鄉閭以徳行稱洪武間由賢良舉累官刑部尚書劉世英洛陽人識見超越為鄉里所推服洪武中以人材舉擢都察院右僉都御史宋賔洛陽人性剛直遇事果决洪武間為太學生才能為衆所推授清紀郎遷真定知府為政有方吏民信服秩滿陞陜西右布政使開濟洛陽人性聰敏少有大志鄉里竒之洪武間以明經舉授河南府儒學訓導擢國子助教以病免四輔官安然薦其有治才累官刑部尚書王敬先偃師人性孝友愽通經史工文辭洪武間以賢良舉授山西布政司左參政武友諒偃師人少貧有才器敏於問學洪武間以賢士舉授湖廣布政司左參政魏敏鞏縣人性至孝博通經史登洪武戊辰進士第授吏科給事中母病謁告歸省未至而母卒敏即之墓所哀慟水漿不入口者五日廬墓三年旦夕哭奠如初䘮鄉里稱其孝事聞表其門張文舉鞏縣人材器卓越通經史能文章洪武間以賢士舉任山西布政司左叅政王中登封人家業農未嘗知書性至孝母沒廬墓三年身被衰麻日食飦粥旦夕哭奠未嘗櫛髪易衣墓側無水浚井四丈餘不得泉中環井再拜籲天泉乃湧出鄉里以為孝誠所感洪武間表其門陳敬河南人敦實有行義先為河南儒學訓導洪武間以刑部尚書開濟薦試吏部尚書坐事免歸起為龍川知縣詣闕言事稱㫖進吏部侍郎薛嵓陜州閿鄉人慷慨負志操有治才洪武間累官大理寺卿謫廣西永樂初安南國王為黎季犛所殺其孫陳天平自老撾來歸季犛子蒼表請還君之上命廣西縂兵官都督黄中以兵五千送歸其國中舉嵓為輔行至芹站伏發劫天平嵓被虜死之范謙澠池人聰敏重厚愽通經史洪武間累官福建右布政使任祐靈寳人性資頴悟篤學慎行洪武間以大學生授山東諸城知縣政聲著聞遷永平府同知再陞四川右布政使石璞陜州人好讀書不事華靡以吟詠自娯樂洪武間以儒士薦授教職後陞户部侍郎曺庭訓靈寳人性資聰敏處事果决鄉里曲直悉求判正洪武間以人材舉授應天府尹姬敏孟津人通儒書明律筭徳行純備節操過人洪武中以材幹舉授西安知府趙瑁宜陽人喜讀書愽學冾聞洪武間由儒學任河南府學訓導陞廣東瓊州知府再遷吏部尚書趙廸宜陽人勤學好問師友咸器重之洪武間貢于太學以才能見稱擢吏部侍郎范讓登封人在童丱時負竒識潜心經史洪武間游太學師友稱善授通政司左參議在官亷慎不受私謁趙翥永寧人少有志節識量過人篤志勵學為時軰所重洪武間以儒士舉授工部尚書宋禮永寧人性剛果遜志篤學為時軰所重洪武間由太學生授山西按察司僉事永樂間累官工部尚書初營建北京命取材川蜀伐山通道深入險阻還朝特被嘉賞盧方常澠池人性明敏愽通經史洪武間以才行卓越薦任山東布政使范敏閿鄉人性聰慧愽渉書史名重郷間洪武間舉秀才任户部尚書劉瑾澠池人資貌魁偉性孝友初為縣學生力學不怠永樂初以大學生任福建右布政使曹端澠池人端重有守潜心經書尤好性理之學永樂初中鄉舉任山西蒲霍二州學正嚴立教條講授不倦其教人每以踐履為主後生多所成就號月川先生所著有四書詳説反太極圖觧等書王士能性純孝父染疾躬奉湯藥寢食用廢比亡哀毁踰禮廬墓終制還家事母尤篤事聞詔旌表之省志耿九疇盧氏人永樂甲辰進士擢禮科給事中累官南京刑部尚書天性孝友親終追思不忘奉身節儉無所嗜好慎交與関節不至其門雖權貴亦敬憚不敢貌凡論事是非邪正之辯確然不移雖累遭讒困頼上知其為人卒保全之年六十五謚清惠九名臣錄耿裕九疇子景㤗甲戌進士累官太子太保吏部尚書平生坦夷無物世守清白為儒流冠卒謚文恪志畧何濬靈寳人正統間中鄉舉除知象州時洞蠻黄甫榮叛諭以朝廷威徳卒致其服改知趙州有宦官侵属邑民田二千餘頃以狀聞歸宦田於民而坐宦官以罪陞南康知府脩白鹿洞書院延胡居仁等六人以教逺近子弟且置産以給食所著有行事録及何氏家訓十三卷子鈞由進士除太常寺愽士轉山東道御史省志許聚靈寳人家五世共㸑家法之嚴郷邦推重聚充正統初年貢歴安定豐潤二縣學教諭莊以自持嚴以馭衆士類多所造就云省志杜中盧氏人由貢任故城縣知縣以績最著聞績勅旌異陞知寧州志省許進聚子成化丙戌進士擢御史鎮甘肅山西風裁卓卓法尚嚴明凡諸請托拒不行廵按大同以直不容降知兖州以平西虜功召為户部侍郎累官吏部尚書卒贈太保謚襄毅子八六登仕籍長誥舉鄉試謨户部尚書謚莊敏讚少保兼文淵閣大學士詩工部主事詞知府論太子太保兵部尚書孫僴嘉靖乙丑進士國朝宦業之盛無如許氏者志畧劉徤洛陽人天順庚辰進士累官少師大學士左柱國名臣錄穪健與謝遷李東陽三人在内閣健敢於任事東陽長於為文遷直亮明斷可否其間不阿不激同寅協恭所以成𢎞治十餘年之治且在内閣不私鄉故唯健一人卒謚文靖通紀列女楊氏𢎞農人吕纂妻纂為吕超所害楊自殺秦氏二女元宜陽人逸其名父嘗有危疾醫云不可攻姊閉户黙禱鑿已腦和藥進飲遂愈父後復病欲絶妹刲股肉置粥中父小啜即甦事聞褒表之朱氏洛陽人趙彬妻元天厯初為西兵所掠將犯之朱度不能脱即紿之曰幸釋我舍後井傍瘞金發以遺汝兵信之朱氏得近井即抱三歲女踴身赴井死王氏女偃師人名安哥元天厯間從父避兵邙山丁家洞兵搜得之見安哥色美驅使出欲汚之安哥不從投澗死有司言狀表其廬劉氏河南人齊關妻關應募為千夫長戰死劉守節愿不撓有來强議婚劉紿甲曰吾三月三日有心償畢當從所言是日徑徃彰徳天寧寺登浮圖絶頂祝天曰妾本河南名家夫已死不敢失節遂授地而死杜氏宜陽人陳忠妻年二十夫死遺腹子復禮杜誓死不嫁織紡為生業奉姑益謹復禮舉孝弟任湖廣宜城縣知縣洪武十二年狀聞旌表省志屈氏靈寳人蘓六妻蘓卒屈年二十二截髪誓死不嫁洪武末事聞旌表省志李氏靈寳吕材妻年二十二而夫卒紡績孝養翁姑守節終身不改洪武事聞旌表省志孫氏永寧人趙三妻性貞一年二十三一子甫三歲夫病且劇嘱孫曰㓜兒無可托者汝寧撫之令成立乎孫氏感其言誓死靡他孀居三十五年清白無玷永樂初旌表志省牛氏洛陽人及笄父母贅偃師李保兒為婿未朞而李歿牛奉䘮歸𦵏孝養舅姑誓不他適守志三十二年永樂四年旌表其門省志樊氏偃師人汪徳源妻歸甫三年而其夫亡生一子曰駒兒樊年方盛誓不貳志壬辰兵亂群盗哨聚樊偕其舅姑避居山西之潞州隨時紡績為養洪武三年始還樊年已四十矣舅姑繼歿樊服衰麻未嘗去身仍善教其子令克有成縣以事聞旌表正統四年詔重旌表省志劉氏宜陽人馬瓊妻年二十一夫亡號泣三月不絶孀居紡織誓不再醮養舅姑撫㓜子守節始終不渝正統八年旌表其門省志馬氏宜陽人蔡致中妻歸四載而夫亡時舅姑髙年二子㓜弱乃躬勤紡績以供事育正統八年以狀聞旌為貞節之門省志陳氏孟津人劉安妻年二十一而夫亡生子甫三歲陳自誓守節躬紡績以給朝夕成化二年縣以狀聞旌表其門志省王氏洛陽人董安妻年二十六而夫亡無子王紡績以養舅姑守節四十七年始終無玷有司以狀聞成化七年詔加旌表省志匡氏雒陽人董雄妻生二子長威方四歲次武甫半週而雄疾篤嘆謂匡曰我且死若肯善撫二稚乎不則任所適匡泣曰生則同室死則同宂矧有子可恃安敢有他雄殁匡竟節完二孤亦克成立成化九年受旌表省志仙釋宋倫洛陽人周厲王甲辰歲入道凝心寢景抱一冲和後感老聃授之上道即能飄然飛歩陵波渉險或比麋鹿或為鳩鴿弋獵者自不能近或為蟲癩之人與病者寢處自然疾瘥宣王丁巳嵗遂上昇為仙浮丘伯姓李居嵩山脩道白日飛昇嘗作原道歌云虎伏龍亦蔵龍蔵先伏虎但畢河車功不用隄防苦諸子學飛仙狂迷不得住左右得君臣四物相念䕶乾坤法象成自有眞人顧又有相鶴經王子喬傳王子喬名晉周靈王太子生而神異好吹笙一日同浮丘公登髙山而去有林良者遇晉於緱山之上謂良曰七月七日我當昇天至期良與故人群官登山見晉乘白鶴揮手謝時人而去祝雞翁洛人居户即北山下飬雞百餘年雞皆有名字千餘羣暮栖樹上晝放散之翁行呼名即種别而至賣雞及子得千萬錢輙置錢去之呉作養魚池後昇呉山白鶴孔雀嘗止其傍鬼谷子春秋晉平公時人姓王名詡嘗入雲氣山採藥得道顔如少童居青溪之鬼谷蘓秦張儀嘗問道三年辭去子曰二子輕松喬之永壽貴一旦之浮榮惜哉鬼谷處人間數百歲後不知所之或曰嵩高之陽城亦有鬼谷河上公漢文帝時結廬于河之濵時文帝好老子書而未觧數句遣使問之公曰道尊徳貴非可遥問於是遂枉駕問之授素書老子章句二卷曰熟研此即所疑自觧今河上公廟在陜州之北薊子訓東漢時至洛陽有神異公卿以下候之者恒數百人皆為設酒脯終日不匱後因遁去有人於長安東覇城見與一老公共摩娑銅人相謂曰適見鑄此而已近五百歲矣明崇儼洛州人少隨父令安喜吏有能召鬼神者崇儼盡得其術以竒技自名唐髙宗召見甚恱盛夏帝思雪崇儼坐頃取以進自云徃隂山取之四月帝憶𤓰崇儼索百錢湏臾以瓜獻曰得之緱氏老人圃中帝召老人問故曰埋一𤓰失之土中得百錢王旻居洛陽青羅山鄉里見之已數百歳唐開元中召至京待以優禮復遣從李元靖求補僊書還請歸舊山不復入城嘗與逹奚侍郎徃還死後猶杖屨詣逹奚人始知其尸觧云申泰芝洛陽人後徙居長沙㤗芝卜居卲州嘗遊息南嶽訪神仙之文一夕於祝融頂遇眞人傳金丹火龍之術遂能乘虚神遊隱顯出入人不可測柴通𤣥陜州閿郷人為道士於承天觀年百餘歲善辟榖長嘯唯飲酒言唐末事歴歴可聼宋太宗召至懇求歸眞宗祀汾隂亦召對明年春通𤣥作遺表遣弟子詣闕又召官僚士庻言生死之要夜分盥濯然香遲明卒摩騰夲中天竺人美風儀觧大小乘經漢明帝夜夢金人以問羣臣傅毅曰臣聞西域有神其名曰佛陛下所夢将必是乎乃遣中郎蔡愔等徃天竺尋訪因見摩騰要還中國於雒邑西門外立精舍以處之遂譯四十二章經後卒於雒陽中國有沙門自騰始竺法蘭中天竺人誦經論數萬章為學者師與摩騰同入中國其言皆有徴信蔡愔所得西域經多蘭所翻譯阿羅竭莫詳氏族誦經二百萬言獨宿山野晉武帝時一至洛陽時疾疫竭為呪治十瘥八九元康中止婁至山石室中去水甚逺竭以左脚碾石壁壁陥水出比卒闍維之焚爍累日尸不煨燼乃移還石室耆域天竺人周流華戎人莫能測一日至襄陽欲渡江舟人見其衣服弊陋忽而不載比舟逹北岸域已渡矣有兩虎前行一日求去衆送至城外域徐行追者不能及是日有從長安來者見域在彼賈人胡濕是日將春逢域於流沙計九千餘里云佛圖澄西域人晉永嘉中來洛陽善念神呪能役使鬼物以麻油雜胭脂塗掌千里外事皆徹見掌中聽鈴音言事舉無不驗左乳旁有一孔通腹内時以絮塞之遇夜㧞絮一室洞明或臨流引腸洗之已復納入之石勒石虎甚敬事之比死之日有人見於流沙虎既殮澄疑其不死因發墓開棺視之唯見一石虎虎曰師葬我而去矣未㡬虎死𤣥奘緱氏人俗姓陳住長安莊嚴寺受諸經論一聞不忘後遍遊荆揚等州訪諸道隣復還京輦唐貞觀初徃西域取諸經像至罽賔國道險不可過奘閉室而坐至夕忽見老僧授以心經一卷令誦之遂得虎豹濳迹至佛國取經六百餘部以貞觀十七年還令住玉華翻譯經藏麟徳初告門人曰有為之法必歸磨滅泡影形質何得久住行年六十五必卒至期果然色貌如常𦵏於白鹿原明一統志卷二十九
