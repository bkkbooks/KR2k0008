七十二里漢置屬蜀郡郡志禹本汶川廣柔人𨗳江廢縣在灌口縣本蜀安都縣唐改盤龍尋改灌寧乂改𨗳江宋即縣治置永康軍青城廢縣在灌縣南四十里南齊置齊基縣後周改曰清城唐曰青城宋因之魏城廢縣在綿州東一十五里本漢涪縣地西魏置此縣唐宋皆屬綿州巴西廢縣在綿州本漢涪縣地西魏置巴中縣隋改曰巴西九隴廢縣在彭縣西魏置屬濛州唐屬彭州宋以堋口縣省入平泉廢縣在簡州西南五十里西魏置婆閏縣隋改曰平泉通化廢縣在威州東一百三十里隋初置金川縣改曰通化唐宋因之月山廢縣在資縣境本資中縣地隋析置宋初與銀山丹山縣俱省入盤石縣江原廢縣在崇慶州東南三十里本漢江原縣地唐初置唐隆縣又改唐安宋改曰江原鹽泉廢縣在綿州東一百二十里唐初析魏城縣置宋因之定亷廢縣在威州南四十里唐置濛陽廢縣在彭縣東二十一里唐儀鳯初置宋因之小封廢縣在威州南六十里唐咸亨初刺史董辨招慰生羌置此縣犀浦廢縣在郫縣唐垂拱初置宋熙寧中廢為鎮又宋志云始興郡城晉興縣城皆在犀浦鎮靈泉廢縣在府城東五十里唐貞觀初置東陽縣天寶初改曰靈池宋改曰靈泉永康廢縣在崇慶州西五十里孟蜀分青城縣地置此縣宋因之青溪廢縣在內江縣境唐置宋省入內江貴平廢縣在仁夀縣東北六十里西魏置及置和仁郡隋廢郡相如宅在府城西南五里蜀記云在市橋西即文君當壚滌器處舊有琴臺揚雄宅在府城內西南內有草𤣥堂及墨池唐岑參詩吾悲子雲居寂寞人已去姢姢西江月猶照草𤣥處今成都縣治即其地也嚴君平宅在府城西南隅即嚴遵賣卜處又漢州東一里有君平臺綿竹縣有君平池花蘂夫人宅在灌縣宋陳後山詩話費氏青城人五代時以才色入蜀宫後主嬖之效王建作宫詞百首國亡入宋備後宫太祖召使陳詩即誦云君王城上竪降旗妾處深宫那得知四十萬人齊解甲並無一箇是男兒石紐村在汶川縣境帝王世記曰禹生石紐邑又元和志禹所生處其地今名刳兒畔華陽國志夷人營其地方百里不敢居牧有過逃其野中不敢追云畏禹神能藏三年為人所得則共原之云禹神靈祐之石鏡說見武擔山唐杜甫詩蜀王將此鏡送死至空山𡨕寞憐香骨提携近玉顔衆妃無復歎千騎亦虛還獨有傷心石湮淪玉宇間石笋在府城西門外寰宇記蜀之五丁每一王死輒為立大石長三大重千鈞以為墓志今石笋是也唐杜甫詩君不見城西門陌上石笋雙高蹲古來相傳是海眼蒼蘚蝕盡波濤㾗雨多往往得瑟瑟此事恍惚難明論恐是昔時卿相墓立石為表今仍存石婦在府城西一十五里昔有婦守節孝于舅姑後人刻石像之唐白居易詩至今為婦者見此孝心生不比山頭石空有望夫名石犀在府城南三十五里秦太守李冰作五石犀沉江以厭水怪其後土人立廟祀氷號石犀廟唐杜甫詩君不見秦時蜀太守刻石立作三犀牛自古雖有厭勝法天生江水向東流石姥在仁夀縣治西跨鰲山上嵗旱人轉徙之天輒雨宋文同有賦禮殿圖漢文翁立學作石室在城南安帝永初間遇火興平初太守髙朕更新又增一石室始作禮殿以祀先聖周公畫三皇五帝七十二子及三代兩漢君臣像於殿壁其後好事者頗增益以魏晉宋嘉祐中王素命摹寫為七卷凡一百五十五人為成都禮殿聖賢圖紹興中席益又摹寫於石經堂為一百六十八人八陳圖在新都縣北三十里牟彌鎮諸葛亮八陳圖凡三在夔州者六十有四方陳法也在牟彌者一百二十有八當頭陳法也其在棊盤市者二百五十有六下營法也鐡龜在灌縣江都堰元四川亷訪僉事吉當普鑄萬斤大龜以鎮江濤之險名宦秦李氷蜀郡守鑿離堆以灌溉諸郡沃野千里而無水害號為陸海蜀人德之漢文翁景帝時蜀郡太守修學宫崇尚文雅以詩書教人風俗丕變比於齊魯第五倫蜀郡太守蜀地冨饒掾吏多以賄賂通倫簡其豐贍者悉罷遣之擇孤貧有志行者以處曹任於是屬職修舉時稱知人王襄益州刺史欲宣風化於衆庶命王褒頌漢德作中和樂職宣布詩三篇選少年者以鹿鳴之聲歌之楊仁什邡令寬惠為政勸課掾史子弟悉令就學有通明經術者顯之或貢之朝由是義學大興墾田至千餘頃孫寶益州刺史時廣漢盜起寶到部親入山谷諭告渠皆悔過自出後為漢太守蠻夷安輯吏民稱之王尊益州刺史王陽至九折坂歎曰奉先人遺體奈何乘此險遂去官尊至是問曰此非王陽所畏道耶叱其馭曰驅之王陽為孝子王尊為忠臣張喬益州刺史旄牛夷叛攻殺長吏喬引兵旬日間破殄强寇張堪蜀郡太守在任秋毫無私去職之日乘折轅車囊一布被而已亷范明帝時蜀郡太守舊政禁民夜作防火災范至但令儲水民以為便歌曰亷叔度來何暮不禁火民安作昔無襦今五袴第五訪新都令政平化行三年之間鄰縣歸之户口十倍朱輔永平中益州刺史宣示德威懷逺夷白狼槃木等皆慕化歸義李膺蜀郡太守恩威並行蜀之珍玩不入其門黃昌蜀郡太守先太守年老多悖政百姓侵寃及昌到吏人訟者七百餘人悉為斷理莫不得所种皓益州刺史宣恩逺夷開曉殊俗岷山雜落皆懷漢德閻憲綿竹令邑人夜行得遺錦送縣憲曰夜行得遺物是天賜也何為將來曰縣有明府犯此則慙馮灝成都令立文學學徒八百人開稻田百頃治有異效董和劉璋時為成都令蜀土冨實時俗侈靡和躬率以儉為立軌制民皆化之畏而不犯三國諸葛亮漢建興初領益州刺史政事無巨細咸次之皆稱平允何祗漢成都令時郫闕令諸葛亮以祗兼之人不敢欺蔣琬漢廣都長為政以安民為本不以修飾為先昭烈嘗怒其衆事不理諸葛亮曰琬社稷之器非百里之才吕又漢新都綿竹令乃心隱恤為一州諸城之首後遷廣漢成都太守為政簡而不煩號為清能晉王濬益州刺史垂惠布政百姓賴之武帝謀伐吳詔濬大修舟艦以為龍驤將軍周撫永和中蜀郡太守子楚繼之俱有善政毛據蜀郡太守弟瑗繼之並有循良之稱隋韋仁夀大業未為蜀郡司法書佐斷獄平得罪者皆自以韋君所論死無恨唐劉德威貞觀初綿州刺史政號亷平百姓立石頌德陸象先益州長史政尚仁恕司馬韋抱真諫曰公冝峻朴罰以示威不然民慢且無畏答曰政在治之而已必刑法以立威乎卒不從而蜀化陳易從髙宗時彭州長史大興水利溉九隴唐昌田民有去後之思為立祠尹思貞隆州參軍屬邑豪蒲氏驁肆不法州檄思貞按之擲其姦贓萬計卒論死部人稱慶刻石嘆頌蘇味道長安初益州刺史以文飾治遇事明恕髙儉益州長史設條教督勵風俗引諸生講授經藝學校復興又引李氷故渠以廣溉道人以富饒姚璹益州長史始蜀吏貪暴璹擲發之無所容貸武后降詔慰勞謂左右曰二千石清其身者易使吏盡清者難惟璹兼之張東之蜀州刺史故事嵗以兵五百戍姚州地險瘴到屯輒死柬之上疏論其弊蘇頲開元中益州長史治尚簡靜重興力役時皇甫恂使蜀檄取庫錢市錦半臂頲不肯豫因上言遣使銜命先取不急非國家意嚴武上元初為劔南西川節度表杜甫為參謀時稱知人顔泉明彭州長史家貧居官亷而孤藐相從百口飯粥不給無愠色韓思彥巡察劔南益州髙資兄弟相頌纍年不决思彥敕厨宰飲以乳二人悟曰吾夷獠不識孝義公將以兄弟共乳而生耶乃輟訟崔寧漢州刺史吐蕃寇西川嚴武遣寧將兵而西既薄賊城乃為地道再宿而拔拓地數百里虜衆驚相謂曰寧神兵也韋皋貞元初西川節度使治蜀二十一年數出師破吐畨四十八萬斬首五萬餘級其功烈為西南最善拊士務惠其民皋沒蜀人德之見其遺像必拜路巗劔南西川節度承蠻盜邉後極力拊循治故關取壇丁子弟教擊刺使補屯籍由是西山八國來朝林藴西川節度推官劉闢反藴曉以逆順不聽又切諌闢怒將殺之隂戒刑人抽劔磨其頸以脅服之藴叱曰死即死我頸豈頑奴礪石耶闢知不可服捨之由是名重京師髙崇文元和初西川節度使討平劉闢入成都市井不移刻石紀功於鹿頭山武元衡劔南西川節度使綏靖約束儉己寬民比三年上下寬實蠻夷懷歸假文昌文宗時西川節度使治尚寬簡間以威斷羣蠻懷服李德裕太和中成都尹西川節度觀察等使蜀承南詔入寇之後民不聊生德裕全殘奮怯皆有條次於是二邉寢懼南詔請還所俘掠四千人樊智遷蜀郡太守秩溝民歌曰太守來門夜開持節去民惶懼五代辛昂周成都令嘗率諸生祭文翁諭以子孝臣忠師嚴友信之理諸生感悟翕然從化宋沈義倫乾德中西川轉運使隨軍入成都却孟蜀羣臣珍竒之獻東歸惟圖書數卷而已王晉卿漢州刺史時蜀初平冦盜充斥晉卿嚴武備設方略擒捕靡遺自是雖劇賊無敢窺其境吕餘慶知成都府郡承孟蜀僣叛之餘善撫循凋瘵民用按堵弟端後亦知府事為政清簡人用便安吳元載知成都府蜀俗奢侈好遊蕩民無贏餘元載禁止之劉熙古開寶初知成都府築堰以悍水患民多德之名曰劉公堰馬知節咸平中知益州有告騎士千數謀變者知節捕殺其首而置其餘自乾德後嵗漕蜀物籍冨民以部舟運坐沉覆破産者衆知節請代督以省校而程其漕事自是蜀人賴以免患雷有終知益州明幹知兵平蜀巨賊聲振鄰敵安守忠漢州刺史時寇難甫平使車旁午公帑不足守忠出私錢以給用每遣使太祖必戒之曰安守忠在蜀律己以正汝當效其為人宋璫雍熙中知益州屬嵗飢多盜璫以方略擒捕招輯盜皆首伏屛息下詔嘉奬張旦知陵州時李順黨數萬來攻旦修完戰具驅市人進戰大敗之詔書褒美凌策李順之亂川陜選官多憚行䇿自陳三蒞蜀境諳其民俗即命知蜀州又徙綿州敏而能斷甚有治迹司馬池郫縣尉攝縣事蜀人妄言成兵叛蠻將入寇冨室爭瘞金銀逃山谷間㑹上元張燈池縱民遊觀凡三夕民心遂安張詠淳化中知益州曰前日李順脅民為賊今日吾化賊為民禁止訛言興學勸士恩威並用蜀民畏而愛之後再知是州民聞其至鼓舞相慶薛田益州路轉運使民間以鐡錢重私為劵以便交易謂之交子而冨家専之數致爭訟田請置交子務以榷其出入未報及寇瑊守益州奏用其議蜀人便之張佶益州鈐轄勇敢善射有方略御軍撫民甚有威惠蜀人久猶懷之姚渙監益州交子務發姦隱萬緍主吏皆當死渙曰戮一人以干澤非吾志也義不蔽姦而已請於使者願不受賞於是全活者衆王曙咸平中知益州盜賊屛息外户不閉又奏復張詠預糴以濟貧民法蜀民大悅比之張詠號前張後王趙􅍬益州路轉運使真宗諭曰蜀逺而數亂其利害朕所欲聞􅍬至州條上部中事後再知益州度支市錦六千匹􅍬召工計嵗織才千餘匹乃止以嵗所織數上供程堂知雙流縣聽斷明敏縣無留獄有蝗食苖堂曰吏奉天子命以養民蟲當食吏五臟無食民食乃引蝗而吞之蝗遂踰境鍾離瑾簡州推官又通判益州建言州郡既上雨後雖凶患多隱之以成前奏請令監司劾其不實者程琳知益州上元張燈州人夜聚遊嬉琳先戒曰有火則隨救之母白也已而果有火吏救之終宴人無知者其施設有備類此任中正知益州代張詠之後在郡五載遵詠條教蜀人便之弟中師亦知益川先是轉運使韓瀆急於籠利薪芻疏果之屬皆有算中師盡奏蠲之韓億仁宗時知益州為政簡嚴故事發粟六萬石賑糶貧民㑹嵗大旱億倍數出粟先期豫民民免飢饉又疏九升江口下溉民田數千頃王騣知益州戍卒有夜為亂者騣潜遣兵環營下令曰不亂者斂手出無所問衆皆出命軍校指為亂者十餘人戮之及旦人莫知也其為政有大體不為苛察蜀人愛之程戡知益州仁宗慰遣之初至彭州民妄言有兵變捕斬之守益州者以嫌多不治城堞戡獨完城浚池不以為嫌薛奎天聖中知益州時有民婦訟其子不孝詰之乃貧無以為養奎出俸錢與之戒曰若復失養吾不貸汝矣其母子遂如初嘗夜燕有戍卒殺人奎密遣人捕殺之坐客莫有知者蜀人愛之以比張詠張方平至和初知益州奏减橫賦四十萬减鑄鐡錢十餘萬緍蜀人大悅蔣堂知益州慶厯初詔天下建學漢文翁石室在孔子廟中堂因廣其舍為學宫選官屬以教諸生士人翕然稱之文彥博慶厯中知益州時米價騰貴乃諭冨室得米二萬斛以活飢民髙覿知益州彭州廣碃麗水二峽地出金宦者挾冨人請置場募人夫採取覿曰聚衆山谷間與夷獠雜處非逺方所冝且得不償失奏罷之袁抗益州路轉運使時三司嵗市上供綾錦鹿胎萬二千匹抗言蜀民困憊願少紓其力以備秦中他日之用是年郊祀蠲其數之半田況慶厯中知益州治尚和易去苛細奬進儒素禁戢姦暴以德化人人不忍欺謝濤知華陽縣亂亡後田廬荒廢詔有能占田而倍入租者與之於是腴田悉為毫右所有流民至無所歸濤收詔書悉以田還主吕公弼仁宗時知成都府治尚寬人疑少威斷營卒犯法當杖扞不受曰寧以劔死公弼曰杖者國法劔汝自請杖而後斬之軍府肅然王素嘉祐中知成都府為政務合人情蜀人録其所行號曰王公異斷趙賀知漢州蜀吏喜㺯法而賀精明吏不敢欺事更賀所多被䆒詰人目為趙家關韓絳知成都府增置學校裁省冗費時內臣使蜀者多所貨易綘奏加禁約家定國永康司法參軍韓綘欲治山西道定國謂蜀近夷恃險以安塹為坦途將有後憂綘然其言為之罷役趙抃英宗時益州路轉運使窮城小邑行部無不至父老喜相慰後再知成都府以寬為治民大悅轉相告莫敢為惡張燾知成都府蜀人苦多盜燾嚴保伍使不得隱而申其捕限盜為之息趙瞻知威州瞻以威茂雜羣獠險而難守不若合之而建郡於汶川條著其詳後熙寧中經理西南就瞻取其書考焉桂堂知威州清介有聲羈縻保霸兩州交惡道阻不通堂自携牛酒㑹二州酋長諭以禍福乃降魯周詢通判漢州城中夜有火部衆救之植劔於前曰攘一物者斬火止民無所失王舉元治平中成都路轉運使邛井鹽嵗入二百五十萬為丹稜卓箇所侵積不售下令止之鹽登於舊馮京熙寧中知成都府蕃部寇雞棕關京出兵賊懼請降京請於朝為禁侵掠給稼器糧餉使歸夷人喜爭受盟願世世為漢藩程珦知漢州嘗宴客開元僧舍酒方行人歡言佛光見觀者相騰踐珦安坐不動頃之遂定熙寧法行珦抗議指其未便張戩知金堂縣誠心愛人養老恤窮間召父老使教督子弟以奉為酒食月吉詔老者飲勞使其子孫侍勸以孝弟民化其德獄訟日少李行簡彭州軍事推官陵州冨民陳子美父死繼母詐為父書逐出之纍訴不得直轉運使檄行簡劾正其獄范純仁熙寧中成都路轉運使以新法不使戒州縣未得遽行王安石怒其沮格遣使欲攟托私事卒莫能得吕大防元豐中知成都府政治尚寬與民同樂訟至立斷又修築堰以灌民田齊恢提點成都路刑獄臨政明白簡約不苛擾及徙河東餽餉之物一無所受單車而東鮮于侁通判綿州綿處蜀左吏狃貪成風至課卒伍供薪炭芻豆侁一切弗取郡守以下效之王覿知成都府蜀田膏腴畝千金無閒田以葬覿索侵耕官地表為墓田江水貫城中為渠以湮塞多水災覿疏治復故民德之號王公渠陳薦華陽縣尉盜殺人棄尸民田薦出驗有以移尸告者田主又殺其母縣欲聞致殺二人以逭薦失盜之責薦不可曰焉有誣人以自貰者耶已而獲盜席旦知成都府議者言蜀士習亂或𨗳旦治以峻猛旦政和平入見言蜀人性善柔願勿以為慮楊佐陵州推官州有鹽井深五十丈嵗久幹摧敗欲易之而隂氣騰上入者輒死惟天有雨則氣下稍能施工佐教工人以木盤貯水穴竅灑之如雨滴然由是井幹一新利復其舊王剛中紹興中知成都府制置四川檢身以法示人以禮從容裁决恩威並行表賢疸惡興利除害比去蜀父老遮道有送數百里者亰鏜四川制置使兼知成都府首罷征斂弛利以豫民蜀以大治張燾知成都府兼安撫使戢貪吏簿租賦嵗旱發粟民得不飢暇則修學校與諸生講論蜀人懷其惠政祀之不忘胡世將四川制置使兼知成都府嵗大旱發糶賑飢撫黎稚戢貪吏修溝渠蠲落江田稅修文翁舊學政無不舉蜀人大悅蕭振知成都兼安撫制置使威行惠孚治甚有聲髙宗曰四川善政前有胡世將今有蕭振及卒于官民無老稚相與聚哭于道汪應辰乾道初四川制置使兼知成都府清心寡事奉公守正軍政民事革弊殆盡嘗入覲孝宗曰卿久在蜀朕寬西顧憂范成大淳熙初四川制置使兼知成都府鑿夔山路以避湍險减無名酒息論和糴之害而行招糴表薦知名之士蜀士莫不歸心留正四川制置使兼知成都平折租價嵗减酒課三十八萬以簡素化民歸裝僅書數簏人服其清趙汝愚淳熙間四川制置使兼知成都諸羌相挺為邉患汝愚至悉以計分其勢鄭剛中四川宣撫副使治蜀有方略奏蠲四川雜征又請减成都府路對糴及宣撫司激賞錢黃疇若知成都府蠲積缺十數萬考罷官吏冗貟為民代輸六年布估錢又减他賦之重者民力遂寬吳昌裔知華陽縣修學宫來四方士斥羡錢買良田以傋旱後權知漢州核兵籍興社倉郡政畢舉孫道夫知資州宣撫鄭剛中薦其治行第一移知蜀州盜不敢入境遇事明了人目為水晶燈籠後又知綿州丘崈四川安撫制置使兼知成都府崈素慮吳氏世掌兵奏言吳挺脫至死亡臣請以便冝撫定諸軍挺死崈即奏乞選他將代之崔與之嘉定中知成都府兼本路安撫使寬减征賦篤志為民詔盡護四蜀之師拊循將士人心悅服後還蜀人肖其像於仙遊閣以配張詠趙抃名三賢祠吳獵開禧中知成都府列上不拊逆黨倡義守節之士四十餘人薦人才五十餘人請蠲賦稅以幸蜀民揭白鹿書院學規以訓蜀士牛大年紹定末四川都大提舉茶馬司兼董織錦及召歸不載一物一清如水魏了翁知漢州首蠲積逋除科抑賣酒之敕嚴户婚交許之禁復為文諭以厚倫止訟其民敬奉條教不敢犯陳隆之四川制置使淳祐初成都被圍城破隆之舉家數百口皆死檻隆之至漢州使喻州守臣降隆之呼語毋降遂見殺丁黼成都制置使嘉熙初元兵趍成都黼夜出城南迎戰至石筍街兵散黼力戰而死黼帥蜀為政寬大蜀人思之元汪良臣中書左丞行四川省事陳治蜀十五事世祖訐納蜀瘡痍之餘良臣拯意循撫蜀人安之汪惟正行四川中書省事於蜀蜀土荐罹兵革民旡完居惟正留意撫循人便安之王利用四川提刑按察使土豪有持官府長短者問得其實而當以罪民賴以安吕四川行樞密院事嘗勸主帥李德輝不殺王立未幾立降巴人感德立祠祀之張廷瑞成都路總管興學崇儒勤於撫治化行境內有古循良風王繼志四川行省郎中以政最聞遷本道廉訪司副使時李喜喜陷四川繼志帥兵與戰力屈被執不食而死衆咸憐之本朝張衍洪武初為四川行省參政時四川甫定民凋瘵衍盡承宣之道由是德化旁逹郡邑輯寧何文暉洪武間以都督僉事守四川號令嚴明恩威兼著軍民多德之李敬洪武初為四川都指揮使時羌氐鄭黑太作亂敬擒之特升都督同知仍守四川後戎縣山民嘯聚為盜敬討平之民安其業臧哲洪武間四川右布政使恩威兼著吏民懾服孫伯堅洪武間為四川左參政持政寬平不事苛察吏民德之張瓊洪武間新都知縣亷能公直蒞事明敏民有鬻子輸稅者瓊脫己衣贖以還之楊浩洪武間知崇慶州撫字有方寬猛得冝尤篤意學校至今士民稱慕之胡夀安永樂間知新繁縣嘗自種蔬一圃以供日用人呼為菜知縣及滿秩去囊篋罄然惟書籍布衣而已劉堅永樂中茂州知州公正亷直民多德之時茂州衛奏請立學羌民難之堅集衆羌勸諭以朝廷成俗之意於是遣子就學及滿去羌民乞留匡文真永樂初知羅江縣為政公直撫字有方去之日百姓遮道攀留何文淵永樂中以御史考察四川風紀振肅時久旱禱之輒雨人謂之御史雨鄭齡成化中四川布政使時劇盜野王剛稱逆齡為督糧餉繕甲兵寇竟就擒吳景四川僉事時流賊鄢藍之黨遁入川東逼江津景拒守以援兵不至死之王萱𢎞治中以給事中視師四川即條上八事請設大將劾貪懦明賊情蜀寇遂寧葺朱槩正德間四川僉事以討平畨賊阿戎功轉參議諭服播州宣慰兄弟之爭殺者不以兵車流寓嚴遵漢臨邛人賣卜於成都市中與人子言依於孝與人臣言依於忠各因其義而𨗳之日閲數人得百錢乃止閍肆下簾著周易揚雄欽重之李彊為益州牧欲得遵為從事及見之遂不敢言杜甫唐襄陽人流落劔南結廬成都西郭浣花溪上成都尹裴冕為築草堂嚴武鎮蜀辟為參謀待之甚善嘗詣草堂訪之甫慷慨懷古人莫測也為詩渾涵汪洋千彚萬狀兼古今而有之傷時橈弱情不忘君人懷其忠云程頥河南人父珦嘗守廣漢頥與兄皓皆隨侍嘗游成都見治篾箍筒者挾册就視之則易也篾者問曰若嘗學此乎因論未濟男之窮曰三陽失位也頥兄弟渙然有悟後袁兹問易頥曰易學在蜀滋入蜀見賣醬薛翁於眉邛間與語大有所得篾叟醬翁皆蜀之隱君子也宋汝為豐縣入宋建炎初吕頥浩使致書劉豫遇烏珠軍為所拘紹興中亡歸授通判處州後金人議和之汝為言其機事秦檜將械送金人汝為變姓名為趙復徒步入蜀青城山而卒所著有忠嘉集安世通本西人隱居青城山中吳䂀反乃獻書於成都帥楊輔欲其舉義討䂀言甚切至輔不能决遂東如江陵請吳獵討之未幾曦敗獵使蜀薦士以世通為首云鄭彥文本蔚州人仕元為萬户入蜀居彭城因家焉本朝平蜀率土官首先歸拊授貴州宣慰南使洪武六年調潼川知府未幾仍改宣慰從征云有功進升工部右侍郎卒于官人物周萇𢎞資中人敬王時為大夫孔子嘗從之問樂死而血碧蜀人祀之漢司馬相如成都人少好讀書學擊劔事景帝為武騎常侍以病免客游梁著子虛上林賦武帝讀而善之召見屢獻賦拜為郎㑹唐䝉驚擾巴蜀遣相如諭之還拜中郎將建節乘傳至蜀通卭莋還報帝大悅復奏大人賦帝稱飄飄有凌雲意後以病免居茂陵為人口吃而善著書云張寬成都人蜀人未知學太守文翁選寬等詣博士受業還以教授於是蜀學比齊魯寬仕至揚州刺史作春秋章句十五萬言揚雄成都人少好學博極羣書口吃不能劇談而好沉思成帝時為郎給事黃門嘗奏甘泉河東校獵長楊四賦又著法言及太𤣥經等書何武郫縣人以射䇿甲科為郎再舉賢良方正召對䇿拜諌議大夫遷茂州刺史成帝時為大司空封汜鄉侯哀帝時䇿免就國復召為御史大夫會詔舉可大司馬者衆舉王莽武不可後莽用隂誅不附己者武以誣自殺楊宣什邡人仕為太倉令上言冝封周公孔子詔從之薦龔勝等四人章明新繁人纍官至太中大夫王莽篡位明嘆曰不以一身事二主遂自殺侯剛新繁人仕為郎王莽篡位剛佯狂負耒斗守關號哭莽使人問之剛曰漢祚無窮不忍事非主也莽殺之羅衍成都人公孫述據蜀衍說述尚書解文卿鄭文伯諌述歸漢為子孫福解鄭從之述怒閉二子於薄室二子守志不回遂幽死姜詩廣漢人事母至孝妻龎氏奉順尤謹母好飲江水嗜魚鱠妻每旦出汲一曰舍傍忽泉湧出味如江水每旦輒出雙鯉永平中察孝亷明帝詔曰大孝入朝凡諸舉者一聽平之楊終成都人習春秋為郡小吏詣京師受業顯宗時召拜校書郎官至郎中嘗受詔刪大史公書為十餘萬言又著春秋外傳十二篇改定章句十五萬言張霸成都人自少知孝讓鄉人號張曾子七嵗通春秋後博覽五經和帝時舉孝亷為㑹稽太守擢用有業行者郡中爭勵志節化服越賊故童謡云棄我㦸捐我矛盜賊盡吏皆休後徴遷侍中翟酺廣漢雒人四世傳詩酺好老子有善圖緯天文厯算徴拜議郎遷侍中安帝時閻顯等並用威權酺上疏切諫不省出為酒泉太守擊斬叛羌威名大振順帝即位遷捋作大匠屢因災異多所匡正以權貴誣罷歸李充廣漢雒人少以文章顯和帝時侍中賈逵薦召拜蘭臺令史安帝時為諌議大夫撰漢紀順帝立遷樂安相卒年八十三所著詩賦銘諫頌七嘆哀典凡二十八篇張楷霸子通嚴氏春秋古文尚書門徒常百人五府連辟舉賢良不就順帝詔云楷行慕原憲操擬夷齊郡時以禮發遣楷復告疾不到性好道術能作五里霧張陵楷子官至尚書元嘉中梁冀帶劔入省陵敕虎賁奪冀劔劾奏冀百僚肅然初冀弟不疑舉陵孝亷謂曰昔舉君適以自罰陵曰今申公憲以報私恩也任昉成都人為尚書令清身檢下大將軍梁冀憚之出為平原守冀誅復為尚書令司𨽻校尉大司農趙典成都人父戒為太尉桓帝立以定策功封厨亭侯典少篤行隱約博學經書父卒􅊞封後為太常朝廷每有災異疑議輒咨問之典據經正對後就國兄子溫為京兆丞嘆曰大丈夫當雄飛安能雌伏遂棄官去獻帝時為司徒何英郫縣人學通經緯著漢德春秋十五卷孫汶亦深於學著世務三十篇楊厚廣漢新都人父統習天文推步術為彭城令一州大旱統推隂陽消伏縣界䝉澤厚少學統業順帝徴至長安因陳漢三百五十年之厄冝蠲法改憲以消伏災異纍官侍中拜議郎後稱病歸教授門生三千餘人卒年八十二鄉人諡曰文父任末蜀郡新繁人少習齊詩游京師教授十餘年友人黃奉德病死洛陽末躬推鹿車載喪致其墓所後奔師喪於道物故臨命勑兄子造曰必致我尸於師門使死而有知魂靈不慙如其無知得土而已朱普廣都人為郡功曹太守與刺史王冀有隙枉被劾普詣新都獄掠笞連月肌肉臭腐卒證太守無事敕其子曰我死載喪詣闕使天子知我心董鈞犍為資中人習慶氏禮永平初為博士時草創郊廟禮樂威儀章服多從鈞議當時稱為通儒纍遷五官中郎將王忳廣漢新都人嘗詣京師見一書生疾因愍而視之書生曰我腰下有金十斤願相贈死後乞藏骸骨忳即鬻一斤營其殯葬餘悉置棺下後遇其父迎其子喪餘金皆存忳官至郿令諒輔新都人為郡五官掾時天大旱乃祝曰輔不能進諌納忠薦賢退惡至令天地否隔萬物焦枯若日中不雨乞以身自焚頃之雲合雨澍一郡沾洽景毅蜀郡人靈帝時李膺坐鈎黨詣詔獄考死門生故吏並被禁錮毅子碩為膺門徒未及録毅慨然曰本為膺賢遣子師之豈可漏名苟安遂自表免歸時人義之任安廣漢綿竹人少游太學受孟氏易兼通數經行尚古道又從同郡楊厚學圖䜟䆒極其術時人稱曰居今行古任定祖欲知仲桓問任安辟除皆不就董扶綿竹人靈帝時私謂劉焉曰京師將亂益州分野有天子氣焉遂求出為益州牧扶亦歸蜀後天下大亂昭烈稱帝於蜀皆如扶言杜瓊成都人少受學於任安精䆒安術纍官左中郎將大鴻臚太常瓊為人靜默少言闔門自守不與世事蔣琬費禕皆器重之所著韓詩章句十餘萬言三國張裔成都人治公羊春秋博涉書史漢昭烈定益州以為太守後為丞相亮參軍裔少與楊恭友善恭早死遺孤未數嵗裔迎恭母事之及恭子長為娶婦買田宅時人咸重其義後加輔漢將軍秦宓綿竹人少有才學州郡辟命皆不往漢昭烈定益州廣漢太守夏侯纂請為師友祭酒宓稱疾卧不起及諸葛亮領益州牧選宓迎為别駕吳遣張溫來聘百官往餞宓與溫答問應聲而出溫大敬服晉杜軫成都人察孝亷除建寧令𨗳以德政風化大行夷夏悅服秩滿將歸羣蠻追送賂遺甚多軫一旡所受纍遷尚書郎何攀郫人為廷尉平廷尉卿諸葛冲以攀蜀士輕之及斷疑獄始歎服尋以功封西城侯食邑萬户賜絹萬匹攀讓所封賞者給中外宗族後除兖州刺史固辭不就隋何妥郫縣人少機警有口才初事梁湘東王為誦書左右嘗上疏陳八事與蘇威有隙出為龍州刺史時有負笈游學者妥皆為講說在職三年以病請還後為國子祭酒卒諡曰肅唐袁天綱成都人有風鑒應驗不可勝紀太宗召見曰古有君平朕今得爾何如對曰彼不逢時臣實勝之子客師亦傳其術旡不竒中李白蜀郡彰明人母娠時夢長庚星因名之性倜儻善詩賦尤工古歌才志逸邁天寶初召見金鑾殿論當時事詔供奉翰林後帝坐沉香亭召白為樂章乃援筆成清平調帝愛其才欲官之為髙力士貴妃譛而沮之遂浮遊四方卒於采石孫逢吉益州人仕蜀為國子毛詩博士檢校刻石經又有同郡林罕亦善文字之學著說文二十篇目曰林氏小說刻石蜀中宋句中正益州華陽人孟蜀時舉進士歸宋補曹州録事參軍中正精於字學古文篆𨽻行草無不工太宗時嘗獻八體書召授著作佐郎直史館詔詳定篇韻及雍熙廣韻子希古希仲並進士何隨郫縣人初仕蜀為安漢令蜀亡去官時巴土飢送吏取民芋以自給隨即以綿繫其處償直民視芋見綿相與語曰聞何安漢清亷必此人也歐陽迥益州華陽人父珏通泉令迥初事孟蜀纍官翰林學士遷平章事監修國史嘗擬白居易諷諌詩五十篇以獻昶嘉之賚以銀器錦綵隨昶歸宋充翰林學士卒贈工部尚書卞震益州成都人蜀舉進士為渝州判官蜀平仍舊職㑹賊杜承褒圍城震躬率士卒且戰且拒與刺史陳文襲夾攻之賊遂平仕至虢州録事恭軍子衮舉宋進士知將樂縣咸平中為淮南轉運使兼發運使明敏有幹局孫光憲陵州貴平人少好學游荆渚髙從誨署為從事纍官祕書監勸繼中獻地於宋太祖聞之甚悅授光憲黃州刺史在郡有治聲光憲博通經史聚書數千卷校讎不倦自號葆光子所著有荆臺集等書子謂讜並進士羅居通益州成都人母死廬墓三年有甘露芝草之瑞開寶中詔以為延長主簿大中祥符初資州人黃德輿葬父母負土成墳甘泉湧其側並降詔旌表王著成都人祖賁仕王建為雅州刺史父景瓌萬州别駕著在蜀以明經及第入宋授隆平主簿纍官至殿中侍御史著善書太宗政暇嘗以觀書及筆法為意著侍書多所規益楊允恭漢州綿竹人少倜俶任俠初丁德裕討賊至州允恭以策干之署綿漢招收巡檢太宗時捕斬海賊纍官荆湖江浙都巡檢使允恭有心計好言事子可咸平初進士喜屬文有吏幹纍召試歷户部鹽鐡判官知洪宣潤夀潭州纍遷至都官貟外郎弟告纍官右諌議大夫知江寧府王永益州華陽人為右補闕吳越納土永受命往均賦至則悉除無名之算或言其多弛賦租太宗詰之對曰使新附民䝉天子仁恩臣雖得罪死不恨太宗大悅孫罕以䕃纍官廣東轉運使歷知潭明州為政務適人情終光祿卿子琪舉進士歷知數州政尚簡靜以禮部侍郎致仕羅處約益州華陽人父濟仕蜀歸宋至太常丞處約太宗時舉進士形神豐碩有詞采初知吳縣後召直史館卒年三十三有文十卷曰東觀集蜀士又有嚴儲者舉進士直史館後使河北督糧陷於契丹陳充益州成都人家素豪盛少以聲酒自娛雍熙中擢進士甲科以寇準薦授殿中丞出知明州真宗時纍官刑部郎中詞學典贍性曠達善談謔淡於榮利自號中庸子臨終自為墓志有集二十卷李建中益州人幼好學太宗時進士纍官太常博士嘗表陳時政後歷知曹解潁蔡四州終判太府寺建中性簡靜恬於榮利善書札草𨽻篆籀俱妙有集三十卷子周道周士並進士及第王圭永之後少孤罕教養有恩圭弱嵗竒警曰誦數千言舉進士通判揚州後為翰林學士文章閎麗自成一家朝廷大典册多出其手纍官尚書左僕射兼門下侍郎封岐國公卒贈太師諡文恭所著有華陽集梁鼎華陽人祖鉞蜀劔門關使父文獻乘氏令鼎舉進士知秭歸縣為度支判官建議興水利歷知數州皆有治績磊落尚氣有介節名稱甚茂好學工篆籀著隱書史論等書薛映成都人好學有文知開封縣為治嚴明太宗召對除江南轉運使歷知數州每五鼓冠帶黎明决事雖寒暑無一日異纍官禮部尚書集賢院學士卒諡文恭郭震成都人博學能詩才識過人裕然有物外之志所著有漁舟集李畋稱其有孟郊之風李畋華陽人以學行為鄉里所稱初蜀士知向學不樂仕宦知州張詠敦勉就舉畋遂登第纍官知榮州自號谷子所著歌詩雜文及谷子總百卷張詠語録三卷卒年八十七任玠成都人通五經雖緯候音律琴棋繪畫皆得其妙真宗令試學士院玠撰詩一千二百韻以進賜進士授汝州團練推官玠具野服捧告身詣登聞院陳納尹瞻溫江人以博通知名舉進士嘗通判永州建學誨士一日城中火且風曕具朝服向火拜已而風息火止張愈益州郫人雋偉有大志寶元初上書言請使契丹令外夷相攻以完中國之勢除校書郎願以授父顯忠而隱於家文彥博為治居青城山六召不應性樂山水遇有興雖數千里輒盡室往遂浮湘沅觀浙江升羅浮入九疑而歸杜門著書未就卒妻蒲氏賢而有文自為誄李大臨華陽人嘉祐中進士纍官祕閣校理僦居陋巷仁宗遣使賜御書使者見大臨親秣馬還奏帝曰李大臨真亷士也大臨清整有守論議識大體神宗時知制誥言清苖之害疏李定之過時論偉之李謹交成都人幼頴異讀書一過輒能暗誦父師怪而器之年十四舉進士仁宗命中黃門引入內賜座嘗進牡丹詩官至鄂州觀察推官章察雙流人博通經學尤長易太𤣥著發隱三篇蜀守蔣堂等以逸民薦賜粟帛再命州助教不就嘉祐中賜號冲退處士察益以道自裕尊生養氣憂喜是非不一撓其心形楊應詢益州郫人真宗楊淑妃之族孫歷知信安保定軍為河北沿邉安撫使有政績知雄州治兵積粟契丹不敢犯後為定州真定大名副都總管卒諡康理何郯本陵州人徙成都為殿中侍御史嘗極陳夏竦姦狀仁宗諭曰古有碎首諌者卿能之乎對曰君不從諌則臣碎首今陛下從諌如流臣何敢掠美纍官龍圖閣直學士後以尚書右丞致仕楊摯新繁人進士起家性淳靜平居未嘗問生業仕為侍御史嘗力論外戚李用和不冝加平章事又言張堯佐緣宫掖以進恐纍聖德仁宗嘗稱其言事有體後歷知數州有奏議四十餘篇范鎮華陽人寓居洛陽舉進士纍官翰林學士嘗論新法不合以户部侍郎致仕熙豐間士大夫論天下賢者必歸司馬光及鎮其道德風流足以師表當世光嘗自謂勇决不如景仁卒諡忠文有文集百卷蹇周輔雙流人少與范鎮何郯為布衣交舉進士知冝賔縣纍官河北都轉運使遷刑部侍郎彊學善屬文子序辰亦有文仕至翰林學士承㫖代淵𨗳江人性簡潔事親孝受學李畋張逵祿年四十舉進士甲科擢清水主簿淵以不及親還家教受纍薦不起以太子中允致仕著周易㫖要等書自號虛一子彭乘華陽人性純孝以好學稱舉進士授漢陽軍判官嘗登相國寺閣悵然曰親老矣安敢捨晨昏之奉而圖一身之榮乎遂癸乞歸養及父卒甘露降墓柏人以為孝感後纍官翰林學士鄧至雙流人通六經學者從之甚衆每出入市邑人皆拱立著往事龜鑑五十卷通書十卷二江集三卷子綰官至翰林學士孫洵仁官至尚書左丞洵武知樞密院事宇文昌齡雙流人進士甲科神宗時為監察御史職事修飭纍遷太常少卿詔議郊祀合祭論者不一後竟用其議出知梓夀等州徽宗立為户部侍郎建言嵗省陜西糴價五百萬子常纍官提舉成都路茶馬盡革宿弊馬遂溢額進祕閣修撰知䕫州楊天惠郫縣人幼警敏嘗取韓愈歐陽修文集縱觀作歌行十數篇老師宿儒相傳驚嘆元豐中進士徽宗時上書言宫禁事甚剴切後入黨籍有文集行世張商英新津人兄唐英及進士第纍官殿中侍御史有史材嘗著仁宗政要宋名臣傳蜀檮杌商英負氣倜儻治平中登進士纍官翰林學士遷尚書右僕射後以觀文殿學士知河南府楊繪綿竹人少竒警讀書五行俱下名聞西州進士上第通判荆南府遇事迎刃而解仁宗愛其才神宗時知諌院改兼侍讀繪以諫官不得其言則去不拜後纍官翰林學士繪表裏洞達一出於誠為搢紳所推重宇文之邵漢州綿竹人舉進士為文州曲水令神宗時上疏論時政不報遂致仕以太子中允歸時年未四十自强於學不易其志司馬光曰吾聞志不行顧祿位如緇銖道不同視富貴如土芥今於之邵見之矣范百祿鎮兄子第進士又中制科纍官翰林學士為哲宗言分别邪正之目以類相反者凡二十餘條以龍圖學士知開封府獄無繫囚拜中書侍郎後以資政殿學士知河南府卒諡文簡范祖述百祿子知鞏縣鑿南山𨗳水入洛無水患以父墮黨籍監中嶽廟久之知台州奏罷黃甘葛菌之貢靖康避地汝州與汝守趙子櫟共城守旁郡盡陷汝獨全纍官朝議大夫吕陶成都人其先曰懷王曰公宜世以風節聞陶舉進士纍官通判蜀州知彭州俱有政績哲宗立除殿中侍御史上疏論蔡確韓縝章惇之奸進給事中又以集賢院學士知潞州後入元祐黨范祖禹鎮從孫舉進士甲科為校書郎從司馬光編修資治通鑑書成薦除祕書正字後拜右諌議大夫上疏勸哲宗辨邪正甚懇切官至翰林學士嘗進帝學八卷唐鑑十二卷仁皇政典六卷申積中成都人楊繪從其父起求之為子及長知非楊氏而絶口不言登進士事所養父母盡孝終身有二弟一妹為畢婚娶始歸本族復申氏政和中通判德順軍以薦擢提舉永興軍陳祐仙井人舉進士官至右司諌嘗言姦人詆毀善類之故及論章惇蔡京蔡卞郝隨鄧洵武忤㫖通判滁州後入元祐黨籍楊滙成都人杜門委巷之下著書賦詩人無知者邵伯溫為部使者薦其學行甚高節甚苦不報及卒學者諡為靜恭先生宇文粹中華陽人以文學際遇纍官至尚書右丞弟虛中舉進士官至簽書樞密院事謫韶州建炎中應詔起以資政殿大學士使金金人留之虛中每密以蠟書奏虛實後遇害有文集行世張咸漢州綿竹人唐宰相九齡弟九皋之後父紘舉茂才異等知雷州有治聲咸舉進士賢良兩科其對䇿之語有曰臣寧言而死於斧鉞不能以不言以負陛下杜翊世華陽人紹聖中進士嘗通判懷德軍靖康初金兵奄至城陷翊世先火其家與妻張自縊以死事聞贈朝議大夫官其後十人名其所居曰忠義坊何㮚仙井人政和五年進士第一纍官右僕射嘗阻割三鎮京城失守從欽宗幸金營遂留不返既陷北庭卓仰天大慟不食而死兄棠弟矩俱有名號為三鳯勾濤新繁人舉進士纍官史館修撰後為湖北安撫使知潭州秦檜嘗令人諭意欲與共政濤辭乃上書論時事之害政者髙宗嘆其忠濤長身偉貌以忠亮自許料邊情如在目前知名之士多所薦進有文集西掖制書奏議數十卷張浚咸子登進士髙宗時纍官右僕射兼知樞密院事嘗平苖劉之亂攘郤敵敵招降劇盜能使將帥用命始終不主和議為秦檜所惡所著有五經解及雜說文集奏議孝宗封魏國公卒諡忠獻蘇雲卿廣漢人紹興間結廬豫章東湖人皆愛敬之稱曰蘇翁布褐草履終嵗不易畚礫為圃人爭貿之以故薪米不乏有餘則以周急少與張浚為布衣交浚為相馳書函金幣屬帥漕致之帥漕力請期以詰朝上謁旦則扃户闃然書幣俱在而翁已遁矣竟不知所往范冲祖禹子紹聖中進士高宗時為宗正少卿直史館祖禹嘗修神宗實録盡書王安石之過為蔡卞所惡謫死嶺表至是命冲重修神哲兩朝實録纍官至翰林侍讀學士韓駒仙井監人少有文稱政和中賜進士除祕書省正字出知分寧縣遷中書舍人嘗撰祀明堂圓壇方澤等樂曲後以集英殿修撰奉祠髙宗即位知江州駒嘗從蘇轍學評其詩似儲光羲趙逵資州人讀書數行俱下尤好聚古書考厯代治亂之迹紹興中對策擢第一為秦檜所忌授僉書劔南東川後纍遷至中書舍人髙宗嘗稱其純正可用又以其文章似蘇軾稱為小東坡有棲雲集三十卷張栻浚子頴悟夙成以古聖賢自期仕為直祕閣浚閒府治戎栻內贊密謀外參庶務間以軍事入奏孝宗異其對召為吏部侍郎每召對皆修身務學畏天恤民等事後知江陵府卒諡曰宣栻聞道甚早與朱熹為友熹嘗稱其卓然有見所著論孟太極說諸書學者稱為南軒先生淳祐初從祀孔子廟庭張枃浚次子以父恩纍官知袁衢二州有能稱提舉湖北常入奏事孝宗甚喜纍遷户部侍郎光寧朝積官至端明學士知建康府枃天分高爽吏材敏給屢知臨安南渡以來京尹以枃為首子忠恕治郡有能聲纍官直祕閣在朝屢陳諌疏有祖父風趙雄資州人隆興初類省試第一除正字召見極論恢復孝宗大喜曰功名與卿共之嘗以中書舍人使金與金主爭辨金人謂之龍鬭淳熙中纍官參知政事拜右丞相朱熹極論時事上怒雄言熹狂生罪之適成其名乃止光宗初又上萬言書陳修身齊家以正朝廷之道卒諡文定李舜臣隆州井研人八嵗能屬文少長慨然有志於天下乾道初舉進士對策論金人世讎無可和之義歷官知德興縣專尚風化官至宗正主簿舜臣學邃於易著本傳三十篇又有羣經義書小傳文集家孰編次論語若干卷復以子貴追封崇國公宇文紹節廣都人孝宗以虛中及其子師援皆死於金愍之命紹節為之後登進士第纍官端明殿學士簽書樞密院事多所建明朝廷咨訪蜀事紹節審而後言皆周悉事情卒諡忠惠虞允文隆州仁夀人父琪政和進士仕至潼川轉運判官允文七嵗能屬文紹興間第進士纍官中書舍人直學士院金海陵入寇允文為督視府參謀激諸將力戰敗金人於采石孝宗時拜相封雍國公卒諡忠肅出將入相垂二十年孜孜忠勤所著冇詩文奏議等集數十卷劉光祖簡州陽安人登進士第為潼川提刑司檢法淳熙初召對論恢復事光宗時為殿中侍御史極論道學所係嘗撰涪州學記諌官指為謗訕奪職謫居房州終顯謨閣直學士奉祠卒諡文節所著有後溪集宋德之蜀州人慶元初擢外省第一纍官武學博士與諸生論八陳之象本乎八卦竒正之變往來相生而不窮出知閬州又自湖北提刑召為兵部郎官朝論疑安丙德之言蜀旡安丙朝廷無蜀矣後知眉州李蘩崇慶晉原人第進士為隆州推官攝綿州賑飢活十餘萬人又知永康提刑成都路兼提舉常平嵗凶活百七十萬人知興元府奏罷和糴之法梁洋間繪像祀之遷太府少卿蘩講學臨政皆有源委所著有桃溪集百卷胡晉臣蜀州江原人紹興末進士為成都通判孝宗召對除著作佐郎時近習用事晉臣極論之出知漢州後為侍御史林栗奏朱熹傲慢晉臣疏留熹而排栗光宗時拜參知政事兼同知樞密院事與留正同心輔政卒諡文靖許奕簡州人慶元五年擢進士第一授東川節度判官韓托胄議開邉奕貽書曰今日之勢如氣僅屬不足以當寒暑之冦以給事中使金金人禮迓甚恭後以寶謨閣直學士知潼川府奕在朝論諌甚多帝稱其骨鯁天性孝友通籀𨽻書所著有毛詩說論語尚書周禮講義楊震仲成都人負氣節有志當世登淳熙初進士知新井縣後權知大安軍吳䂀叛來招震仲辭疾不行先遺書家人曰武興之事從之失節不從禍立見我死禍止一身不及妻子矣遂飲藥死詔贈朝奉大夫諡節毅賜廟額曰旌忠趙彥呐彭州人登四川類試第少以材稱吳䂀叛以祿禧僞守䕫彥呐結義士殺之遂顯名嘉定中經理西和州金人再至戰却之在州五年得軍民心端平初為四川制置使謝方叔威州人嘉定中進士歷官監察御史多所建明纍遷給事中兼侍講淳祐中參知政事封永康郡侯後拜左丞相兼樞密使進封惠國公李性傳舜臣子嘉定中進士纍官起居舍人兼侍講上疏論喪禮嘗進讀仁皇訓典乞讀帝學從之淳祐中拜端明殿學士參知政事尋同知樞密院事後以觀文殿學士致仕卒贈太保李道傳性傳弟讀程氏書玩索義理志忘寢食擢慶元初進士纍官著作郎歷知果州致仕卒諡文節道傳篤於踐履氣節卓然於經史未有論著曰學未至不敢於詩文未嘗苟作曰學未至不暇居官以惠利為本江東人久而思焉李心傳道傳弟慶元初閉户著書以薦賜進士為史館校勘修中興四朝帝紀後遷著作郎詔踵修十三朝㑹要書成遷工部侍郎未幾致仕心傳有史才所著有髙宗繫年録學易編誦詩訓春秋考禮辨讀史考及詩文共數百卷虞剛簡允文孫兄弟八人皆好修而剛簡最知名纍官利州路提刑有治績嘗與魏了翁范仲黼李心傳輩講學蜀東門外得程朱微㫖著易書論語說以發明其義蜀人師尊之嘉定中召不至子㠭知連州亦以文學知名牟子才井研人嘉定中舉進士調洪雅縣尉後擢史館檢閲入對首言大臣不公不和六事次陳備邉三䇿忤史嵩之請外通判吉州轉衢州應詔上封事萬言後入直學士院理宗眷遇甚厚所著有存齊集內外制四朝史槀子巘居湖州官至大理少卿黃申井研人開慶初進士授德安尉調樂安丞亷謹有聲元兵拔撫州索降狀樂安令率其僚屬聮署以上申獨抗不往吏民强輿致之申陽死令無如之何申有惠愛至暮衆畀入置中堂得免遂去隱巴山以終王翊郫縣人寶慶初進士吳䂀嘗招入幕及䂀叛抗節不拜為陳大義不聽嘉熙初制置使丁黼辟為參議官元兵至翊與司理王璨等募兵拒守元兵入翊朝服危坐尋赴井死轉運使蒲東卯亦死之鄧若水井研人博通經史嘉定中進士時史彌逺柄國若水對䇿極論其姦嘉禧間太學博士當對草奏數千言丞相喬行簡聞之即奏若水通判寧國府到官數月以言罷遂不復仕若水學務躬行嘗削木為主大書曰自古以來忠臣孝子義夫節婦之位嵗時祀之何充漢州德陽人祖耕祕書監充通判黎州欇州事元兵破邛崍關充自刺不死軍帥許以不殺充曰吾三世食趙氏祿為趙氏死不憾自是水飲不入口敵知不可强殺之充妻陳罵不絶口亦死男士麟孫駒行從子仲桂皆先死元張䇓𨗳江人僑寓江左從金華王相學自六經語孟以及周程張朱微言靡不潜心至元中行臺中丞吳曼慶延致江寧學官逺近翕然尊師之稱曰𨗳江先生有經說及文集行世虞汲剛簡孫㠭之子為黃岡尉僑居臨川之崇仁與吳澄友善澄稱其文清而醇嘗雨至京贖族人被俘者十餘口以歸由是家益貧晚稍起家教授後以翰林院編修官致仕張惠啇英裔孫事世祖以謹敏稱授燕京宣慰副使為政寬簡後纍遷中書右丞巴延伐宋惠主餽餉後拜平章政事行省揚州徙杭州所至皆有能稱黃澤資州人五世祖拂與二兄播揆同年登進士第蜀人榮之澤生有異質慨然以明經學道為志大德中厯兩書院山長嘗宗程朱作易春秋二經解二禮祭祀述略其後年老家貧嵗大侵家人采木實草根以療飢澤晏然惟以聖人之心不明而經學失傳為大戚卒年八十七虞集汲子隨父居臨川天性孝友𢎞才博學纍遷奎章閣學士日取經史中切心德治道者陳進經筵凡承顧問必隨事規諌而一時大典册咸出其手其論薦人才必先器識平生為文萬篇有道園學古録行世卒贈仁夀公諡文靖子安民知安福州鄧文原綿州人博學善書初為杭州學正纍官翰林侍制出僉浙西亷訪司事時吳興民有訴弟夜為長身者刺其右脅而死有司執直初更者使服文原鞫之得真殺人者人以為神後遷集賢直學士兼國子祭酒卒諡文肅有文集行世子衍浙江儒學副提舉虞槃集弟性方正少與集從吳澄游嘗著非非國語時稱其有才識詩書春秋皆有論著纍官湘鄉州判官有巫稱神降告灾者州長史皆厚禮之槃訊得巫所為狀召至鞫之并其黨繩以法時服其明布景範新都人舉進士授芒布路益涼州同知時李頗驢侵掠景範舉義兵拒之力戰終日矢盡而死馮文舉什邡人舉進士為雲南儒學正提舉時明氏攻雲南文舉謂妻馬曰我元進士䝉厚恩今軍至有死無二汝光州馬中丞子孫其從之乎馬氏曰官人既去生亦何益遂皆自縊時人義之本朝王平新繁人洪武間以御史遷河南僉事行部孟津宜陽屬吏有謀以貨撓法者平即以其狀聞賜褒奬纍官右都御史楊直漢州人洪武中由太學生拜監察御史慎持憲度升河南按察司副使轉任交址卒于官鄧謙資縣人洪武末鄉試舉人才識過人歷任勤能纍官浙江左布政使鄒昱華陽人洪武中由太學生歷官有能聲終湖廣右布政使劉瑞內江人𢎞治中進士歷官浙江按察司副使提督學校較士公明先德行而後文藝所行條約切于身心仕至南京禮部侍郎列女張氏女羅江人母楊寡居親黨有婚㑹母女偕往其典庫雍乙者從行先歸死於庫提刑張文饒疑楊有私命石泉軍劾治考掠終不服女曰母以清潔受害死將訟寃於天言終而絶於是石泉連三日地大震天雨雪勘官李志寧夕坐恍有猿墜前自念殺人者非袁氏乎有門卒忽言張氏傭夫曰袁大執訊之即伏云適盜庫金會雍歸遂殺之楊乃得免時女死才數日郡榜其居曰孝感坊師氏彭州永豐人宋右正言驥之女適范孝純建炎初還蜀至唐州方城縣遇賊孝純先被害執師氏欲强之許以不死師罵曰我中朝官女豈可受賊辱吾夫已死冝速殺我賊知不可屈遂殺之陳堂前漢州雒縣人王氏女歸同郡陳安節嵗餘夫卒僅一子既葬其夫事親治家有法舅姑安之子曰新稍長延名儒訓𨗳入太學年三十卒二孫曰剛曰紱咸篤學有聞又教育夫幼妹以禮嫁遣親屬貧者收飬婚嫁至三四十人鄉人尊敬呼曰堂前子孫遵其遺訓五世同居乾道中旌其門仙釋杜宇古蜀主也蜀嘗大水宇與居人避水於長平山後鱉靈開峽治水人得陸處宇禪位與之自居西山得道升天李八百蜀人初居筠陽之五龍岡歷夏商周年八百嵗又動則行八百里時人因號為李八百或隱山林或居㕓市又修煉於華林山石室丹成還蜀中周穆王時居金堂山蜀人歷代見之號紫陽真君有女弟亦得仙封妙應真人老子姓李名耳楚之苦縣人為周柱下史得長生術欲開化西域乃駕青牛之車西度函谷關以長生術授令尹喜著道德五千言曰千日之外尋我於蜀中青羊之肆至期果見於大官李氏之家授喜玉册金文賜以文始先生之號馬成子秦扶風人志欲修道棄家訪師遇黃蓋童子授以胎元煉氣之法乃入蜀之鶴鳴山石洞中復遇異人授以神丹曰氣為內丹藥為外丹今授子此丹服之當列為髙真矣言訖而去成子遂白日升天折象廣漢人少好黃老業師事東平先生家世豐財以為多藏必厚亡散千金以賑貧苦或諌之象曰竇子文有言我之施物乃逃禍非避時也智者咸服焉自剋亡日尸解如蛇蛻焉李常在蜀中人少治道術百姓纍世見之初有二男一女皆已嫁娶乃去二弟子隨之後各以青竹杖度其身遣歸家置杖卧床徑還其家見兒尸在床各泣而埋之百餘日有人於郫縣逢二子隨常在行附書到家各發棺視之惟一青竹杖常在又娶婦前婦子往尋之常在曰吾兒欲來見我法不得見兒見母泣而别去神和子姓屈突名無為五代時人張詠嘗游京師於封丘門逆旅遇一道士與飲至醉詠曰不知姓名異日何以相識道士曰我神和子也異日見子於成都耳後詠守成都始異其言嘗以物色訪之弗得後於天慶觀院堂壁上畫像一道人肖逆旅所見視其題曰神和子詠悵然自失尚圓廣漢人出家以呪術救物梁武陵王肅紀宫中多鬼怪魅諸綵女請圓持咒除之圓入宫安坐告曰爾輩小家鬼何因敢入王宫可聽我一言於是諸鬼合掌住立圓即發咒南無佛陀鬼皆失所在自是乃靜武帝聞之大加賞遇寶崖涪陵人自幼寡言不嬉戲出家為僧以布裹五指燒之曰信佛如此可也人以為有風疾何不治之答曰身皆空耳四大五枝復何有耶為四衆說法詞切義要後投火滅身而心不壞妙虛綿竹人自幼出家投禮鼇山和尚發志遊方抵江西謁海禪師得其心印叢林爭歸之洪武初即欲辭世說偈云幼出來何來幼滅去何去幼盡覺圓明生死無根蒂端坐瞑目衆皆悲泣妙應開目曰為生勝耶為死勝耶衆曰生勝良久曰為汝輩再住三年後如期而化明一統志卷六十七
