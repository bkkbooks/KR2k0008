body:
  text: 明一統志卷六十七明李賢等撰成都府東至潼川州安嶽縣界一百五十里西至雜谷安撫司界六百三十里南至眉州彭山縣界一百一十五里北至潼川州中江縣界二百五十里自府治至南京七千二百六十里至京師一萬七百一十里糧十六萬六千石有零建置沿革禹貢梁州之域天文井鬼分野入參一度古為蜀國秦置蜀郡漢分置廣漢郡武帝置益州蜀郡𨽻焉王莽改益州曰庸部蜀郡曰導江東漢州郡復舊蜀漢都此於益州置牧蜀郡置守晉武帝改蜀郡為成都國尋復蜀郡宋齊蜀郡皆𨽻益州後周置益州及蜀郡隋初罷郡大業初復罷州為蜀郡唐改為益州後置大都督府及劔南節度於此天寶初改為蜀郡至德初改為成都府又升為南京尋罷後復於此置劔南西川節度五代時王氏孟氏相繼有其地宋為益州路端拱初改為成都府元為成都路本朝改為成都府領州五縣二十六成都縣附郭春秋時蜀侯所理秦始置成都縣漢末益州治此晉宋齊梁並因之隋屬益州唐宋元為成都府路治所本朝因之編户一十四里華陽縣附郭本秦成都縣地唐貞觀中分置蜀縣與成都縣分治郭下乾元初改為華陽縣取華陽黑水惟梁州之義宋元仍舊本朝因之編户一十一里雙流縣在府城西南四十里本漢蜀郡廣都縣地晉置寧蜀郡後周郡廢隋初改廣都為雙流縣取蜀都賦帶二江之雙流為名唐復析置廣都縣宋仍舊元省廣都入焉本朝因之編户五里溫江縣在府城西五十里本漢蜀郡郫縣地西魏置蜀郡治於此隋初省郡入郫縣尋置萬春縣後廢唐初復置貞觀初改為溫江縣以江水溫潤為名宋元仍舊本朝因之編户七里新繁縣在府城西北五十六里本漢蜀郡之繁縣以繁縣為名蜀漢改為新繁縣晉宋齊復為繁縣後周仍改新繁隋省入成都縣唐初復置宋元仍舊本朝因之編户四里新都縣在府城北六十五里本漢舊縣屬廣漢郡後置新都郡晉徙新都郡治雒縣仍屬焉梁置始康郡西魏郡廢隋改新都曰興樂縣後併入成都唐復置新都縣宋元仍舊本朝因之編户七里金堂縣在府城東七十里本漢雒與新都縣地屬廣漢郡唐咸亨初析置金堂縣屬漢州以地連金堂山故名宋屬懷安軍元初升軍為懷州縣屬如故後省州入縣本朝因之編户八里仁夀縣在府城東二百里本漢犍為郡武陽縣之東境晉置西城戍梁置懷仁郡西魏以西城戍置普寧縣屬陵州隋改普寧曰仁夀為隆山郡治唐初改郡為州又改為仁夀郡後復為陵州縣仍舊宋廢州為陵井監改仙井監隆興初又為隆州元併州入仁夀縣本朝因之編户一十二里井研縣在府城東一百五十里本漢武陽縣地東晉置西陽郡西魏置蒲亭縣隋改井研縣屬陵州又析置始建縣唐因之宋以始建縣省入井研元屬隆州本朝州廢縣存洪武十年以井研省入仁夀縣後復置改今屬編户三里郫縣在府城西二十五里古郫邑為蜀王杜宇所都秦始置郫縣𨽻蜀郡漢以後並因之隋大業初縣省尋復置唐因之垂拱初析成都置犀浦縣宋省犀浦入焉元仍舊本朝因之編户七里資縣在府城東三百里漢為資中縣屬犍為郡後周改盤石縣徙資州治此兼置資中郡隋初廢郡後改州為資陽郡唐改郡為資州天寶初復為郡乾元初又為州宋屬潼川府元省入簡州後復置本朝改州為資縣編户七里內江縣在府城東四百三十里本漢資中縣地後周置漢安戍尋改中江隋改內江唐咸通中置內江縣屬資州宋元因之本朝改今屬編户一十六里灌縣在府城西五十里本漢郫綿􅫧江原三縣地蜀漢置都安縣屬汶陽郡晉徙都安於灌口屬汶山郡宋齊因之後周省都安入郫縣唐初於灌口置盤龍縣尋改為𨗳江縣貞觀中曰灌寧開元中復曰𨗳江孟蜀置灌州東改為永安軍又改為永康軍後廢為灌口寨又復置永康軍治𨗳江縣元初復置灌州以𨗳江青城二縣省入本朝改州為縣編戶六里彭縣在府城北九十里周為彭國秦為蜀郡繁縣地漢晉因之劉宋置晉夀郡及縣梁置東益州後周改郡及縣俱曰九隴隋初廢郡置濛州尋廢唐復置濛州貞觀初廢後又置彭州天寶初改濛陽郡乾元初復為彭州又置威勝軍宋仍為彭城治九隴元以九隴縣省入本朝改州為縣仍省濛陽縣入焉編戶六里崇寧縣在府城西北八十里本郫𨗳江九隴三縣地唐儀鳯初置唐昌縣屬益州尋屬彭州五代梁時改歸化縣唐復為唐昌晉改為彭山縣漢復曰唐昌宋初改為永昌縣崇寧初改曰崇寧元屬彭州本朝改今屬編户三里安縣在府城州八十里本漢汶江縣地屬蜀郡晉為汶山郡地後周屬汶州隋屬㑹州唐屬茂州宋於此地置石泉軍元中統間升為安州以龍安神泉二縣省入本朝改州為縣編户六里簡州在府城東一百五十里本漢犍為郡之牛鞞縣晉因之宋齊屬蜀郡西魏改陽安縣於縣置資州及武康郡後周徙資州治資中隋初置簡州後廢唐初復置簡州天寶初改陽安郡乾元初復為簡州後又置清化軍宋復為簡州領陽安平泉二縣元廢平泉以陽安縣省入本朝洪武六年改州為縣尋復為州編户一十四里領縣一資陽縣在州城北一百二十里本資縣地新置屬簡州編户七里崇慶州在府城南一百一十里漢為蜀郡之江原縣地晉因之李雄據蜀置漢原郡晉穆帝改晉原郡南齊改晉康郡西魏省郡入犍為郡隋置晉原縣屬益州唐置蜀州天寶初改唐安郡乾元初復為蜀州宋紹興中升崇慶府元改為州以江原縣省入本朝又省晉原永康縣入焉編户一十二里領縣一新津縣在州東南一十里本漢武陽縣地屬犍為郡後周始置新津縣徙犍為郡治於此隋初郡廢以縣屬益州唐屬蜀州宋屬崇慶府元屬慶州本朝因之之編户七里漢州在府城東北一百二十里本漢雒縣廣漢郡治焉東漢為益州刺史治所晉為新都國宋齊梁為廣漢郡隋併入蜀唐置漢州天寶初改德陽郡乾元初復為漢州宋仍舊元以雒省人本朝因之編户八里領縣三什邡縣在州西二十里漢舊縣屬廣漢郡髙祖封雍齒為什邡侯即此晉屬新都郡後周改為方亭縣武帝廢入雒縣唐初復置什邡縣屬益州垂拱中改屬漢州宋元仍舊本朝因之編户四里綿竹縣在州西二十五里本漢舊縣屬廣漢郡以其地冝竹因名漢末劉焉嘗徙益州治此晉屬新都郡後又置晉熙郡後周改綿竹為晉熙縣隋初改孝水縣後復曰綿竹唐屬漢州宋仍舊元初省入漢州後復置本朝因之編户七里德陽縣在州北六十里本漢綿竹縣地屬廣漢郡東漢析置德陽縣後周省入雒縣唐初復置屬益州垂拱初屬漢州宋仍舊元初升為德州尋復為縣本朝因之編户六里綿州在府城東北三百六十里本漢廣漢郡之涪縣蜀漢屬梓潼郡晉以後屬梓潼巴西二郡西魏改縣曰巴西置潼州隋初改為綿州後改為金山郡唐初復為綿州天寶初改巴西郡乾元初復為綿州宋仍舊元初屬成都路後以魏成縣省入屬潼川路本朝改今屬編户六里領縣二彰明縣在州北九十里本漢涪縣地晉白沙戍移漢昌縣僑治於此屬巴西郡後魏改為昌隆縣隋屬金山郡唐先天初改為昌縣屬綿州後唐時又改為彰明縣宋元仍舊本朝因之編户三里羅江縣在州南九十里本漢涪縣地晉置萬安縣後移於潺亭改潺亭縣曰魏復曰萬安置萬安郡廢以縣屬以縣屬綿州後屬金山郡唐初屬綿州天寶初改羅江縣宋元仍舊本朝因之編户三里茂州在府城西北五百五十里古冉駹國地漢武開置汶山郡宣帝時郡廢後復置梁置繩州後周改曰汶州治汶山縣隋初改為蜀州尋改㑹州後復為汶山郡唐初復置㑹州尋改南㑹州貞觀中改為茂州天寶初改通化郡乾元初復為茂州宋元州仍舊治汶山縣本朝以汶山縣省入編户四里領縣一汶川縣在州南二百里本漢綿􅫧縣屬蜀郡晉置汶川州於此梁置汶川縣後周以縣置汶山郡隋初郡廢以縣屬汶州唐屬茂州宋即縣置威戎軍元復為縣屬茂州本朝因之編户四里威州在府城西四百五十里古冉駹國漢武開之晉屬汶山郡隋屬㑹州後沒於羌唐置維州天寶初改維川郡乾元初復為維州五伐蜀時徙治中州城宋改威州以威制西羌故名元仍舊本朝因之編户七里領縣一保縣在州西四十里本徼外冉駹之地隋以其地置薛城戍唐置薛城縣屬維州孟蜀改為保寧縣宋因之元以保寧併入威州後復置本朝初因之後分置保縣編户四里郡名蜀郡秦名益州成都俱漢名錦城以蜀有錦官故名亦曰錦里形勝沃野千里天府之土蜀漢諸葛亮云華陽西極黑水南流楊雄益州針帶二江之雙流抗峨眉之重險晉左思蜀都賦緣以劔閣阻以石門蜀都賦西抗吐蕃南撫蠻獠唐元和志坤維大都㑹范謨砌街記金躔奧壤玉壘名區宋薛田成都百韻詩序地大且要宋蘇洵與吳職方書水陸四衝古涪志序左綿據涪上流水陸四衝為蜀重地岷嶓鎮其域華陽志岷嶓鎮其域五嶽華山表其陽四瀆汶江出其徼咽喉於蜀而臂視諸郡廣漢圖經天下藩鎮之冠宋吳師孟西樓記風俗俗不愁苦漢志民食魚稻亡凶年憂俗不愁苦而柔弱褊人多工巧隋志人多工巧綾錦雕鏤之妙侔於上國畏鬼惡疾唐髙儉傳蜀人畏鬼而惡疾雖父母疾皆委去望舍投餌哺之昆弟不相假財尚侈好文益州記其風尚侈其俗好文文多於質華陽國志益州之俗文多於質故其民柔弱土地沃美人士俊乂民重蠶事成都古蠶叢之國其民重蠶事故一嵗之中二月望日鬻花木蠶器於市號曰蠶市俗好娛樂成都遊賞之盛甲於四蜀俗好娛樂往者太守嵗時宴集以從民樂嵗率有期及期則士女闐道嬉遊以坐具列廣庭謂之遨床謂太守為遨頭民和俗阜宋劉昊簡州折栁亭記以勇悍相髙寰宇記茂州本羌戎之人好弓馬以勇悍相髙有古淳質風宋仁夀縣志願慤而好靜公議而無私有古淳質風山川武檐山在府治北蜀記武都山精化為女子蜀王開明納為妃不習水土而死王遣五丁於武都山擔土為冢蓋地數畝髙七丈上有石厚五寸徑五尺瑩潔號曰石鏡用表其門又傳成都內及毗橋側有一折石長三丈云是五丁擔土檐也漢昭烈即位於武檐之南謂此升仙山在府城北入都江水西山在府城西一名雪嶺唐杜甫詩雪嶺界天白又云東郭滄江合西山白雪髙威鳯山在府城北一十八里一名石斛山蜀漢後主禪嘗習射於此又名學射山天回山在府城北三十里唐𤣥宗幸蜀至此及聞長安平車駕乃回因名宋興山在府城北三十里六對山在府城南六十里五代時蜀後王自新津縣修覺山至廣都見十二峯有山峯六對之語因名鐡爐山在府城南六十里五代之季日者占此山當出異人乃掘羅氏之墓有松根纒棺肰若雙龍取刀斷之流血不止應天山在雙流縣南八里唐僖宗幸蜀時賜名宜城山在雙流縣南一十里岡阜相對上有冝城山出紫草聖燈山在雙流縣東南四十里一名普賢山世傳昔有善賢聖燈出現蜀太后看聖燈詩所恨風光看未足却驅金翠入龜城麗元山在新都縣北八里平地特起髙三丈有雙石鏡廣五尺龍門山在新都縣南一十里下有龍洞因名繁陽山在新都縣南一十五里相傳張道陵嘗修煉于此上有浴丹池通仙井又有麻姑洞赤岸山在新都縣南一十七里山色赤如岸邉火光因名三學山在金堂縣東北一十里上有法海普濟廣濟三寺又有佛跡石理溫潤非世間追琢所能昌利山在金堂縣東北一十二里山有一石室三門可容九十人呼為三龍門萬安山在金堂縣北一千五里昔因洪水泛濫曽活萬人於其上雷分山為三眷有二寺久廢蟠龍山在金堂縣南五十里山勢盤旋起伏如龍宋馮時詩一别蟠龍又十年水光山色兩依然功名未立羞重到