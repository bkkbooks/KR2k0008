麥大尾羊羊尾大者重三斤小者一斤肉如熊白而甚美楸子胡桐律隂牙角香棗古蹟伊吾廢縣在哈密衛漢置伊吾屯後魏置縣唐為伊州治縣南去玉門關八百里東南去陽關二千七百二十里納職廢縣在哈密衛境東南漢破胸奴置宜禾都尉以為屯田唐貞觀四年以鄯善故城置納職縣開元中省後復置宋史云城在大患鬼魅磧之東南望玉門關甚近柔逺廢縣在哈密衛境唐置縣屬伊州神功初省入伊吾和卓東距哈密西連伊埒巴爾南抵于闐北接衛喇特東南至肅州凡一月程沿革本漢時車師前後王地前王治交河城即唐交河縣去長安八千一百里後王治務塗谷即唐蒲類縣去長安八千九百里漢元帝時置戊巳校尉屯田於前王庭以其地勢髙敞遂名髙昌壘壘有八城晉時前涼張駿於交河城置髙昌郡後魏初有闞伯周者始為髙昌王其後麯嘉稱王於此自後魏至隋皆來貢獻唐貞觀中平髙昌以其地置西州及都督府開元中改金山都督府天寶初改州為交河郡領髙昌交河柳中蒲昌天山五縣初西突厥據後王地與髙昌相影響及髙昌平懼而來降以其地置庭州領金滿蒲類輪臺三縣長安初置北庭都護府後俱陷於吐蕃其地有回鶻雜居故亦謂之回鶻宋建隆間西州回鶻遣使來貢太平興國中遣王延德等使髙昌雍熙初還景德初又遣使來貢元時輝和爾等地太祖平西域置達嚕噶齊監治之本朝其地名曰和卓城東七十里曰柳陳城即唐柳中縣城西百里曰土魯畨即唐交河縣其風俗物産大抵相同永樂七年和卓遣使朝貢宣德五年和卓王哈薩爾圗嚕萬户賽音特穆爾柳陳城萬户敖拉齊等俱遣使貢馬及玉璞至今入貢不絶風俗與胸奴烏孫異俗漢書有城郭田畜與胸奴烏孫異俗故皆役屬胸奴頗同華夏文獻通考丈夫裙𥜗頭髻略同華夏兵器有弓箭刀楯甲矟文字亦同華夏兼胡書有毛詩論語孝經歷代子史集稅則計田輸銀無者輸布其婚姻喪葬與華夏大同其人面貌類髙麗辮髮垂之於背女子亦然事天神信佛法同上貴食馬好騎射宋史髙昌國傳屋室覆以白堊地産五榖惟無蕎麥貴人食馬餘食羊及鳬鴈樂多琵琶箜篌俗好騎射婦人戴油帽謂之蘇幕遮時節潑水為戲同上用開元七年厯以三月九日為寒食冬至二社亦然以銀或鍮石為筒貯水激以相射或以水交潑為戲謂之壓陽氣去病居民春月游者馬上持弓矢射諸物謂之禳災山川靈山在上魯畨西北石皆黑紋如毛髮又白石堆石骨堅潤夷呼為十萬羅漢削髮涅槃之所赤石山在土魯畨西北峯巒秀美石多赤色貪汗山在赤石山北七十里夏有積雪此山之北鐡勒界也火熖山在柳陳城東連旦火州宋史云北庭北山中出􅓀砂山中常有烟氣湧起無雲霧至夕光焰若炬火照見禽鼠皆赤采者疑即此丁谷山在柳陳城北中有唐時古寺及碑刻無量夀窟塔宋史髙昌傳云佛寺五十餘區皆唐朝所賜額中有大藏經唐韻玉篇經音等天山在交河城北一名祁連山唐天山縣以此為名蒲類海在土魯畨西南一名鹽澤又名婆悉海周四百里葱嶺于以東之水皆注於此漢張騫道西城度玉門見二水交流發葱嶺趨海闐匯鹽澤伏流千里至積石而再出瀚海在柳陳城東地皆沙磧若大風則行者人馬相失夷人呼為瀚海宋史云沙深三尺不育五穀沙中生草名登相收之以食交河在土魯畨西二十里源出天山河水交流繞斷岸下夷名崖兒城唐交河縣也土産馬槖駝胡桃葡萄蠶砂鼠大如䨲鷙禽捕食之􅓀砂胡桐律刺蜜羊刺草上生蜜味甚佳鹽白者如玉赤者如朱白㲲布野蠶結繭苦參上絲如細纑取織為布名白㲲子用以市易鑌鐡隂牙角速霍角阿魏有草根株獨立枝葉如蓋臭氣逼人生取其汁熬膏名阿魏伊埓巴爾東距北連和卓西抵賽瑪爾堪南接于闐東南至肅州三千七百里沿革地居沙漠間不知古何國疑即焉耆或龜兹地也北魏書云龜兹國在白山南都延城今其地東西三千餘里南北二千餘里元時地名巴實伯里憲宗分建諸王哈坦於此世祖立宣慰司以萬户綦公直為宣慰使後置元帥府以領屯田本朝洪武二十四年國王哈迪爾和卓遣使貢馬永樂四年國王實訥察罕遣使貢玉璞等物十一年吏部員外郎陳誠等使其國十六年頭目蘇克格哷穆爾來朝言其王汗納琳實克為從弟布沙弒之而自王徙其國西去更號額森布哈正統二年國王額森布哈遣使貢玉駝馬天順以來入貢不絶風俗逐水草以居飲食肉酪陳誠使西域記地無房屋逐水草置氊帳以居畜牛羊駝馬少種五榖飲食惟肉酪衣服類回回語言類輝和爾席地而坐惟行跪禮同上其王髠髮戴罩刺帽插鷀䳓翎設綵繡氊帳席地而坐與使者相見不拜揖惟行跪禮山川白山山中常有火煙蓋出􅓀砂之處採􅓀砂者著木底鞋取之皮者即焦下有穴生青泥出穴外即變為砂石土人取以治皮葱嶺髙數百丈上多連蔓葱夷名西距塔爾塔斯達巴宋史云髙昌西天步路涉雪山葱嶺皆數千里謂此金嶺宋史云厯交河西凡六日至金嶺口又兩日至漢家寨又五日上金嶺過嶺即多雨雪嶺上有龍堂刻石記云小雪山也嶺上有積雪行人皆服毛罽度嶺熱海周數百里夷呼伊錫格爾土産銅鐡鉛雌黃胡粉馬犛牛孔雀氍毹駝葡萄刺蜜阿魏白㲲布􅓀砂賽瑪爾堪東抵額爾巴拉西連哈里東至肅州九十里沿革其地不知古何國或云漢罽賔國地東西相距三千餘里地勢寬衍土田膏腴為諸國勝元駙馬特穆爾主其國東有揚濟克城蘇嚕克哈雅薩蘭城塔什罕西有克實克都哩諸城皆𨽻焉本朝洪武二十年特穆爾遣回回摩哩哈必蘇等貢駝馬永樂間其孫卾勒博遣使貢馬正統二年又貢馬及玉石風俗善治宫室陳誠西域記人多工巧藝善治宮室門楹皆雕文刻鏤窗牗綴以瑟瑟主戴白帽器用金銀同上主戴白圓帽妻以白纒首飲食喜甘酸羔雜米肉器用金銀不設七箸以手取食山川景物頗類中原同上賈用銀錢屠埋血腥同上商賈交易用國中所造銀錢坊幣有酒禁屠牛羊者埋其血腥建屋祀天泥金書經同上俗重拜天建屋祀之以青石為柱雕鏤甚精經文皆書以泥金裹以羊皮山川鐡門峽在渴石城西懸崖絶壁髙數十仭徑路﨑嶇深二三里夷人守此名鐡門關唐書云自焉耆西五十里過鐡門關疑即此哈喇布拉克河在賽瑪爾堪城東河淺濶而北流火站河在蘇嚕克哈雅城西阿布爾河在蘇嚕克哈雅城西阿珠河在特爾默城東水西流多魚土産金銀玉銅鐡珊瑚琥珀琉璃罽苾思檀樹葉類山茶實類銀杏而小水晶鹽堅明如水晶琢為盤以水濕之可和肉食瓦矢實類野蒿實甚香可辟蠧阿魏甘露小草叢生葉細如藍秋露凝其上味如蜜可熬為餳俗呼為達喇呼必蓋井露也花蘂布名馬獨峰駝大尾羊狻猊産阿珠河邊葦叢中七日內未開目取之則易調習稍長則難馴伏哈里東北至賽瑪爾堪一千四百里東至肅州一萬一千里沿革古無可考其地居平川四面皆大山元駙馬特穆爾之子薩哈勒國人尊之為蘇勒坦猶華言君王也東有諳都瓌博囉哈斯等城皆𨽻焉本朝洪武三十五年遣使詔諭酋長賜織金文綺永樂七年頭目莽賚等來朝并貢方物正統二年指揮哈濟等貢馬及玉石風俗服色尚白金碧飾居陳誠西域記衣服喜鮮潔色尚白有喪易以青國主之居窗壁以金銀瑟瑟為飾地施氊罽重席而坐冨家居室服用頗同國主禮儀簡略同上禮儀簡略君臣相見但行跪禮無刑法有罪罰錢而已坊市不設斗斛但用權衡凡宴㑹環列而坐酒器用金銀餘用陶瓦食無七筯惟以手取㛰室多以姊妹謂為至親死無棺槨以布囊裹尸痊之國有學舍俗無正朔同上國有學舍中為一大室四面皆房俗無廊以居遊學之士名曰默爾格特繅察正朔不用甲子以七日為一周擇日用事則以第一日名阿德納為上吉凡拜天聚㑹用之酒禁甚嚴修行者多不飲酒恐天也土産葡萄巴旦杏有似棗而甜者名忽鹿麻蘿蔔大者重十斤鎖伏又名梭服以鳥毳為之紋如紈綺花毯極細蜜色久不變金銀銅鐡珊瑚琥珀珠翡翠水晶金剛朱砂名馬獅子爾雅亦謂之狻猊于闐東抵察遜衛北連伊埒巴爾東北至肅州六千三百里沿革古于闐國居葱嶺之北二百餘里自漢至唐皆入貢中國五代晉天福中其王李聖天自稱唐宗屬遣使來貢冊封為大寶于闐國王宋建隆初聖天遣使來貢乾德中又遣其子德從來貢大中祥符初其國主汗王遣回鶻羅思溫等入貢嘉祐中遣使羅思溫獻方物請王號乃以其國王為特進歸忠保順果琳汗王原作􅠫鱗黑韓王其國語謂金謂果琳黑韓蓋汗之訛也元豐中遣部領愛新上表稱于闐國羅羅有福力量知文法及汗王書元祐後詔令間嵗一至訖于宣和朝享不絶本朝永樂六年頭目達嚕噶額布勒津遣使瑪拉噶薩木丹等貢玉璞風俗貌不甚胡頗類中華文獻通考自髙昌以西諸國人等深目髙鼻唯此一國貌不甚胡頗類華夏俗機巧喜浮屠法相見以跪同上得問遺書戴於首乃發之同上俗事祅神喜歌舞工紡織宋史山川阿耨達山漢書以為河源所出葱嶺在國西南白玉河在國城東國人夜視月光盛處必得美玉緑玉河在國城西烏玉河在城西三河皆源出崑岡山去國城西一千三百里每歲秋國人取玉於河謂之撈玉土産玉胡錦獨峯駝乳香􅓀砂珠珊瑚翡翠水香琥珀花蘂布名馬腽肭臍金星石水銀阿魏安息香雞舌香葡萄獅子明一統志卷八十九
