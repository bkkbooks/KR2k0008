body:
  text: 明一統志卷八十九明李賢等撰外夷朝鮮國東西南瀕海北鄰女旦西北至鴨緑江東西二千里南北四千里自國城至京師三千五百里至南京四千里沿革周為箕子所封之國秦屬遼東外徼漢初燕人衛滿據其地武帝定朝鮮為真番臨屯樂浪𤣥莵四郡昭帝并為樂浪𤣥莵二郡漢末為公孫度所據傳至孫淵魏滅之晉永嘉末陷入髙麗髙麗本扶餘别種其王髙璉居平壤城即樂浪郡地唐征髙麗拔平壤置安東都護府其國東徙在鴨緑水東南千餘里五代唐時王建代髙氏闢地益廣并古新羅百濟而為一遷都松嶽以平壤為西京其後子孫遣使朝貢於宋亦朝貢遼金歷四百餘年未始易姓元至元中西京內屬置東寧路總管府畫慈悲嶺為界本朝洪武二年其主王顓表賀即位賜以金印誥命封髙麗國王二十五年其主瑶昏迷衆推門下侍郎李成桂主國事詔從其自為聲教成桂更名旦徙居漢城遣使請改國號詔更號朝鮮旦老請以子芳逺襲永樂元年賜芳逺金印誥命冕服十七年芳逺老請以子祹襲景泰元年祹卒命其子珦襲珦卒命其子𢎞暐襲𢎞暐幼弱其叔瑈以讓位請七年封瑈為王自旦以來時嵗貢獻不絶其國置八道分統府州郡縣風俗柔謹為風漢書東夷叙論東夷率皆土著喜飲酒歌舞或冠辨衣錦昔箕子施八條之約遂乃邑無淫盜故東夷通以柔謹為風戴折風巾服大袖衫北史髙句麗傳人戴折風形如辨士加插二羽貴者紫羅為之服大袖衫大口袴素皮帶黃革履婦人𥚑𥜗加􅙦公會衣服皆錦繡金銀為飾男女相悅為婚同上俗多遊女夜則男女羣聚為戲相悅即婚無財聘之禮死經三年而葬同上死經三年而葬居父母夫喪服皆三年兄弟三月埋訖以死者服玩車馬至墓側會葬者爭取而去好祀鬼神修宫室寰宇記形貌潔净男女好祀鬼神社稷靈星以十月祭天國有大穴號隧神亦以十月迎祭多山少田故節飲食而好修宫室始為扶餘别種故習俗相類俗知文字喜讀書五代史髙麗傳飲食用爼豆官吏間威儀宋徐兢圖經飲食用爼豆文字合楷𨽻上而朝列官吏間威儀而足辭采下而閭胥陋巷經館書社三兩相望子弟未昏者則羣聚從師稍長則擇友講習居皆茅茨以粳為酒文獻通考居民皆茅茨大止兩椽覆瓦者十二土無秫以粳為酒多衣麻苧巾幘如唐同上少絲蠶多衣麻紵市以米布貿易器悉用銅服尚素男子巾幘如唐裝婦人鬌髻垂肩約以絳羅婦人僧尼皆男子拜柔仁惡殺崇釋信鬼同上堂上設席升必脫履性柔仁惡殺崇釋教信鬼拘隂陽病不服藥惟呪咀厭勝至親有病不相視殮俗不知醫後中國有往者始通其術俸皆給田刑無慘酷同上三嵗一試有進士諸科士尚聲律百官以米為俸皆給田國無私田計口授業兵器踈簡彊弩大刀刑無慘酷之科唯元惡及罵父母者斬餘皆杖肋死罪貸流諸島纍赦視重輕原之山川丸都山在國城東北漢時髙句麗王伊夷模都此至晉為慕容皓所破龍山在國城漢江之東神嵩山在開城府一名嵩嶽後唐時王建依此山為都北嶽山在漢城府境本朝初朝鮮國王李旦依此山為都天寶山在朝鮮山有舍利馬邑山在平壤城西南唐蘇定方奪馬邑山遂圍平壤即此蓋馬大山在平壤城西其東即古東沃沮國地魯陽山在平壤城東北上有魯城葦山在平壤城西南二十里南臨浿水觀門山在土山縣比縣元屬東寧路花山在土山縣東南屈巖山在定逺府城東府屬東寧路金堂山在黃州三和縣西北州屬東寧路領安嶽三和龍岡咸從江西五縣政方山在黃州境馬頭山在寧州東州屬東寧路長花山在鐵州西南州領定戎一鎮雲山在朔州西南龍骨山在龍州城東天聖山在殷州東北靈山在宣州東南香山在延州東南熊花山在郭州東北以上州俱屬東寧路洪州山在海中洪州建其下東有東源山産金富用山在洪州海中上有倉穀故名俗訛為芙蓉山白山黑山俱在全州南海中有澳可以藏舟慈悲嶺在平壤城東一百六十里元時畫此為界嘉山嶺在嘉山郡西平山嶺在開城府西一里土色盡赤江華島在國城南海中元時髙麗王禃庶族承化侯據此紫燕島在廣州海中舊有客館曰慶源亭和尚島在廣州海中上有􅶾老寺唐人島在清州海中與九頭山相近馬島在清州海中國中牧地舊有客館曰安興亭與軋子苫相近羣山島在全州海中十二峰絡如城舊有客館曰羣山亭及五龍廟白衣島䦨山島俱在全州南海中大青嶼小青嶼俱在廣州海中大月嶼小月嶼俱在全州南海對峙如門菩薩苫紫雲苫苦苫苫春草苫跪苫圖經小於嶼而有草木曰苫俱在全州南海中雙女嶕圖經如苫嶼而其質純石曰嶕在清州海中檳榔嶕在全州南海中蛤窟在開城府南海中山脊有龍祠急水門在開城府南海中宛如巫峽海國東西南皆瀕海其東水淡清徹下視十丈餘西大海在黃州長命鎮東流入大通江鴨緑江在國城西北一千四百五十里一名馬訾水源出鞨靺之長白山水色如鴨頭故名西南流與鹽難水合南入於海闊三百步朝鮮恃為天塹大通江在平壤城東舊名浿水中有朝天石唐蘇定方破虜兵於浿水即此漢江在國城南一十里源出金剛五臺二山合流入海江之南即古百濟國地月不唐江在黃州安嶽縣東西流入大海大江在靈州東西北入大通江大定江在博州城西清川江在安州西南流入海舊名薩水發盧河在平壤城西唐李謹破新羅兵於此熊津在國城南故百濟海口唐置熊軍都督府於此楊花渡在王城西南漢江之濵各道饆餉聚此禮成港在開城府南通海土産金銀鐡石燈盞有紅白二色水晶鹽紬苧布有黑白二色白硾紙狼尾筆滿花席草性柔折屈不損摺扇編竹為骨以多為貴黃漆樹似棕六月取汁漆物如金果下馬髙三尺果下可乘長尾雞尾長三尺蜂蜜貂豽獐鹿皮海豹皮八梢魚蠣房龜腳竹蛤海藻昆布粳可為酒黍麻麥松有二種惟五葉者結子人參茯苓硫黃白附子榛子梨栗核桃橘梅竹茶牡丹日本國東西南北皆際於海去遼東甚逺去閩浙甚邇其朝貢由浙之寧波以達於京師沿革古倭奴國其地東西南北各數千里西南至海東北隔以大山國王以王為姓歷世不易文武僚吏皆世官其地有五畿七道以州統郡附庸國凡百餘自北岸去拘邪韓國七千里曰對海國又南渡一海千餘里曰瀚海國又渡一海千餘里曰末盧國東南陸行五百里曰尹都國又東南百里曰奴國又東百里曰不彌國又南水行二十日曰投馬國又南水行十日陸行一月曰邪馬一國其次曰斯焉國曰已百支國曰伊邪國曰郡支國曰彌奴國曰好古都國曰不呼國曰姐奴國曰對蘇國曰蘇奴國曰呼邑國曰華奴蘇奴國曰鬼國曰為吾國曰鬼奴國曰邪馬國曰躬臣國曰巴利國曰支惟國曰烏奴國皆倭王境界所盡其國小者百里大不過五百里户少者千餘多不過一二萬自漢武帝滅朝鮮使驛通於漢者三十許國皆稱王其大倭王居邪焉臺國即邪摩維是已光武中元二年始來朝貢後國亂國人立其女子曰卑彌呼為王其宗女一與繼之後復立男王並受中國爵命歷魏晉宋隋皆來貢稍習夏音唐咸亨初惡倭名更號日本自以其國近日所出故名或云日本乃小國為倭所併故冒其號開元貞元中其使有願留中國授經肄業者久乃請還宋雍熙後纍來朝貢熙寧以後來者皆僧也元世祖遣使招諭之不至命范文虎等率兵十萬征之至五龍山暴風破舟敗績終元之世使竟不至本朝洪武四年國王良懷遣使臣僧祖朝貢其後數嵗一來至今不絶自永樂以來其國王嗣立皆受朝廷冊封風俗黥面文身披髮跣足寰宇記男子黥面文身衣裙襦橫幅結束相連不施縫綴女人衣如單被穿其中以貫頭皆披髮跣足其王至隋時始製冠以綿綵為之而飾以金玉無盜少訟不娶同姓同上人不盜竊少爭訟婚嫁不娶同姓父母兄弟異處惟會同男女無别飲食用籩豆初喪不酒肉同上飲食以手而用籩豆以蹲跪為恭敬死有棺無槨封土作冢初喪哭泣不食肉飲酒親戚就尸歌舞為樂既葬舉家入水浴潔以祓不祥信巫好戲同上兵有矛盾木弓竹矢以骨為鏃灼骨以卜吉凶信巫覡好棊博握槊樗蒲之戲重儒書信佛法同上初無文字唯刻木結繩後頗重儒書有好學能屬文者尤信佛法有五經書及佛經唐白居易集皆得自中國云交易用銅錢宋史土宜五榖而少麥交易用錢文曰乾文大寶樂有國中髙麗二部四時寒暑大類中國婦人皆披髮一衣用二三縑山川壽安鎮國山國之鎮山本朝永樂初御製文賜之刻碑立其地土産金東奧州出銀西别島出琥珀水晶有青紅白三色硫黃水銀銅鐡丹土白珠青玉冬青木多羅木杉木水牛驢羊黑雉細絹花布硯螺鈿扇漆以漆製器甚工緻琉球國其地在福建泉州東海島中其朝貢由福建以達於京師沿革古未詳何國漢魏以來不通中華隋大業中令羽騎尉朱寬訪求異俗始至其國語言不通掠一人以返後遣武賁良將陳稜率兵至其都虜男女五千人還唐宋時未嘗朝貢元遣使招諭之竟不從本朝洪武中其國分為三曰中山王曰山南王曰山北王皆遣使朝貢永樂初其國王嗣立皆受朝廷冊封自後惟中山來朝至今不絶其山南山北二王蓋為所併云風俗去髭黥手羽冠毛衣寰宇記人深目長鼻頗類胡人男子去髭鬚婦人以墨黥手為龍蛇文皆紵繩纒髮從頂後盤繞至額男以鳥羽為冠裝以珠玉赤毛婦以羅紋白布為帽織鬬鏤皮并雜毛為衣以螺為飾而下垂小貝其聲如珮無禮節好剽掠同上無君臣上下之節拜伏之禮父子同床而寢婦人産乳必食子衣食用手得異味先進尊者死者浴其尸以布帛纒之裹以葦草襯土而殯上不起墳無他竒貨尤好剽掠故商賈不通人喜鐡器及匙筯不駕舟楫惟縳竹為筏急則羣舁之泅水而遁殺人祭神聚髏為佳同上事山海之神以酒肴鬬戰殺人即以所殺人祭其神王所居壁下多聚髑髏以為佳所居地曰波羅檀洞塹柵三重環以流水樹棘為藩殿宇多雕刻禽獸無賦斂不知節朔同上無賦斂有事則均稅無文字不知節朔視月盈虧以知時視草榮枯以計嵗山川黿鼊嶼在國西水行一日髙華嶼在國西水行三日二嶼俱隋陳稜率兵過此彭湖島在國西水行五日地近福州泉州興化漳州四郡界天氣晴明望之隱然若烟霧中落漈元史水至彭湖漸低近琉球謂之落漈漈者水趨下不回也凡西岸漁舟到彭湖遇颶風作漂流落漈回者百一二土産鬬鏤樹似橘而葉密硫黃胡椒熊羆豺狼西蕃沿革西蕃即吐蕃也其先本羌屬凡百餘種散處河湟江岷間其酋發羌唐旄等居析支水西後有樊尼者西濟河逾積石居跂布川或邏婆川隋開皇中有論贊索者居牂河西唐貞觀中始通中國既而滅吐谷渾盡有其地至唐末衰弱種類分散入內屬者謂之熟户餘謂之生户宋時朝貢不絶其首領唃厮羅始居鄯州後徙青唐神哲髙宗朝皆授以官元憲宗始於河州置吐蕃宣慰司都元帥府又於四川徼外置碉門魚通黎雅長河西等處宣撫司世祖時復郡縣其地設官分職以吐蕃僧帕克斯巴為大寶法王帝師領之嗣者數世弟子號司空司徒國公佩金玉印章者前後相望本朝洪武六年詔吐蕃各族酋長舉故有官職者至京授職遂置五衙門建官賜印俾因俗為治以攝帝師納木喀巴勒藏布為熾盛佛寶國師元國公納木喀斯達克巴勒巴嘉勒燦等為都指揮同知宣慰使元帥招討等官自是蕃僧有封灌頂國師及贊善王闡化王正覺大乘法王如來大寶法王者俱賜印章誥命比嵗或間嵗赴京朝貢今其地為指揮司宣慰司招討司萬户府千户所凡三十有三烏思藏都指揮使司朵甘衛都指揮使司隴答衛指揮使司