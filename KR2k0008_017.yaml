body:
  text: 明一統志卷十七明李賢等撰廣德州東至浙江湖州府長興縣界三十里西至寧國府宣城縣界一百里南至湖州府安吉縣界六十里北至應天府溧陽縣界七十里自州治至南京五百里至京師三千七百五十五里糧一千八百石零建置沿革禹貢揚州之域天文斗分野春秋屬吳地名桐汭後屬越戰國屬楚秦為鄣郡地漢為丹陽郡故鄣縣地鴻嘉初為廣德國東漢分置廣德縣仍屬丹陽郡三國屬吳晉屬宣城郡宋齊因之梁分置石封縣梁末增置大梁郡尋改為陳留郡隋郡廢改石封為綏安縣屬湖州以廣德縣省入煬帝改屬宣城郡唐初以綏安置桃州後又改置宣州至德初更綏安為廣德縣南唐改為廣德制置司屬升州宋太平興國中置廣德軍頴江南東路元至元中升為廣德路𨽻江浙行省本朝改廣德州直𨽻京師尋以廣德縣省入編户一百二十七里領縣一建平縣在州城西北九十里本廣德縣地宋端拱初置建平縣治郎步鎮元仍舊本朝因之編户一百二十里郡名桐汭在桐水內故名形勝吳之西疆故鄣之墟宋曽鞏鼓角樓記靈山泉石甲於一郡舊志三峰拱其前溪流枕其後桐汭志負山為郡郡志風俗力於田畝不務商賈漢地理志民淳事簡號江東道院桐汭志境大壤沃食貨富穰曽鞏鼓角樓記喜事鬼神郡志山川橫山在州城西五里高出羣山之中四面望之皆橫故名山之西南有祠山廟山巔有聖井四時不竭丹井山在州城南一十里相傳昔徐真人於此錬丹丹井尚存竹山在州城南一十五里疊嶂層巒回環拱揖有松竹泉石之勝絶頂有二亭曰巢雲流玉方山在州城南一十五里山勢盤紆實州之勝地下有方侯祠因名山之口兩峯對峙若二柱然雞籠山在州城南二十里俗呼雞罩山中峯最高旁有兩峰端列左右蔚然深秀為一州之竒觀仙石山在州城南二十里山下有石高二丈許平坦可履世傳嘗有仙人月夜獨立於上遺迹存焉巖頭山在州城西四十里兩山屹立如關隘中夾一溪廣德南山之水皆會於此而入建溪每遇巨潦藉此以障湍流奔突之勢金雞山在州城南五十里山有石洞舊傳夜隂晦有火光燁然出洞中居民多見之又有一金雞往來飛翔於上石鼓山在州城東南五十里山巔有巨石如鼓下有石如架舊傳每隂兩則石鼓自鳴後墜於山南亂石中石婦山在州城東南五十里衆山環繞中一峯獨高峯之巔有石高二丈許如婦人狀舊傳謝氏女介潔有守登山化為石藤蘿薜荔縈繞其上如衣被之狀獨露其面樵者不敢採桃花山在州城東南六十里山上多桃開時如錦繡然山之石上有金牛及牧童足迹又有金雞窠形皆天成靈山在州城南七十里泉石甲於一郡上有文殊巖普賢臺羅漢洞山水合流而出匯為丁公潭演迤數里前後有兩巨石平廣數十丈流瀑垂其上望之如織機尖山在州城南七十里衆峰環繞一峰巍然如書空之筆傍山皆巉巖之石石上有水一泓初無泉脈旱不涸雨不溢山下多飛泉白石之勝五花巖山在州城北七十里橫列五峰高三百丈許最高峰頂有白佛祠石壁上刋天寶年號遇旱禱雨輒應桐源山在州城南八十里一名白石山大首山在州城西南八十里其山最峻上有一井龜魚時出沒其中相傳每遇隂雨隱隱有樂聲鎮山在建平縣南五里赤山在建平縣西南七里麓枕大溪伍牙山在建平縣東北四十里相傳伍子胥伐楚還吳經此建牙因名上有子胥祠祠側有潭遇旱禱雨多應鴉山在建平縣南九十里上一石高二丈許有彈迹百餘俗呼為彈子石又有釣臺舊傳有仙人釣於此其山産茶宋梅詢詩茶煮鴉山雪滿甌金牛嶺在州城東北七十里四面皆重山中有一嶺長亘十五里舊傳有僧逐一金牛至此牛入洞中不出僧亦化石立於洞門外遇夜隂晦時有天燈見於此大洞在州城東北七十里廣數丈深不可測遊者秉燭而入有石燕羣飛乳泉滴瀝神人佛像碁盤鐘磬之屬皆白石天成其東洞水深不可入昔傳神龍所居遇旱禱雨輒應南崎湖在建平縣西一十里流入丹陽湖桐川水在州城西北源出白石山西北流入丹陽湖大源溪自寧國府大陶山流經州界下流入南崎湖自丹陽湖蕪湖達於江鯉洪溪在州城東南一十里其源有二會流於此灌田二萬餘畝清澗在建平縣北三里東接浮湖西通北溪四時澄徹洗馬澗在建平縣東南四十五里世傳唐僖宗時黃巢作亂命李克用征之於此洗馬因名金井在州治南門外泉甚清冽本朝初車駕嘗幸其地飲水因名范公井在州治宋大中祥符間范仲淹所鑿氷玉井在建平縣西一十里不老泉在州城南四十里泉脈長流大旱不竭古有石碑刻不老泉三字八角井在建平縣高封周宅舊傳井有藏金鄉民嘗欲取之水輒沸湧隱隱聞笙簫之聲乃出浴兵池在州東南三十里亦名東亭湖土産茶出鴉山者味美絲漆州縣俱出桐油玉面狸俱州境出學校廣德州學在州治東南宋天聖間司理范仲淹建於城北治平中郡守錢公輔徙于此本朝洪武三年重建建平縣學在縣治東宋紹興間郡守洪興祖建本朝洪武三年重建宫室三峰樓在州治前宋紹興中參政李光嘗留題云一川花栁擁雕欄濃緑浮空四面山便欲移家來此住不將名姓落人間鼓角樓在州治前宋熙寧初知軍朱夀昌建曽鞏為記借景樓輿地紀勝郡圃縣圃相連故曰借景清容堂在州城西宋知軍錢公輔築堂以居儒者查深使訓郡人子弟靜治樓在州治後宋建本朝正統六年重建范公亭在州舊司理廳東南宋范仲淹嘗為廣德司理治獄廉平作亭於此時引囚訪問皆得其情後人因以范公名之秀逺亭在州治前宋陳天麟詩筍槊秧針入圖畫令人魂夢到家山翠溪亭圓嶠亭方壺亭俱在州圃攀蘿亭在橫山宋天聖中郡守梅詢建巢雲亭在竹山集仙臺在橫山絶頂宋天聖中郡守梅詢建及王渙守廣德詢送以詩曰我有集仙經始在勞君一到為重修後因張真君嘗禮斗於此改為禮斗臺釣魚臺在州城北二十五里唐張志和釣魚於此因名臺之下淵深莫測藤蔓繞磯松篁夾岸臺基尚存關梁苦嶺關在州南六十里濯纓橋在州城西門外跨玉溪取滄浪之水可以濯纓為名獅子橋輿地紀勝在青霜門外梅花橋在州城北門昔橋傍有梅樹竒絶可愛織女橋輿地紀勝有近市中娥橋有州城北三十里相傳唐劉文靜夫人建故名以中娥寺觀開化寺在州治東唐天祐間建竹山寺在州城南一十五里唐咸通間建鎖山寺在州城北二十里宋建名萬夀院以上俱本朝洪武中重建東泉寺在州城東北四十里唐天祐間建開法寺在建平縣治東南梁建本朝洪武中重建昭德宫在州城西五里唐張君祠宋賜今額玄妙觀在州治南唐建本朝永樂初重建白鶴觀在建平縣治西洪武初重建存真道院在建平縣治東北洪武中重建迎仙道院在州城西五里宋淳祐中建祠廟四先生祠在州學元時判官秦德用建以祀宋司理范仲淹郡守錢公輔孫覺洪興祖以其有興學功也郡人梅應發有記明王祠在石鼓山有禱輒應祠山廟在橫山舊志神姓張名渤吳興人一云武陵龍陽人生西漢末遊苕霅之間久之欲自長興之荆溪鑿河至廣德以通舟楫工役將半遂遁於橫山故人立祠祀之夫人李氏亦有廟在州東二里名昭妃廟其神為最靈凡水旱有禱輒應又有埋藏之異其俗嵗殺牛祀之為坎於庭以所祭牛及器皿數百納于中明日發視之一空竟不知所在劉相公廟在州城北三十里宋興寺前俗傳唐劉文靜捨宅為寺故廟祀之泗州廟在建平縣南八十里唐有泗州大聖顯於此因立廟焉嵗旱禱雨輒應陵墓茅王墓在建平縣北一十里廣袤數畝履其上則隱然有聲中空故也冢中有蛇人不敢近去墓數里又有茅王廟鄉民亦不知其何神劉文靜墓在州城北三十里唐興寺之側文靜唐民部尚書也夏侯塜在縣西一十里有石如碣深陷土中其顛半露而無欵識舊嘗掘視重莫能舉遂止里俗亦無知其人者王叔英墓在州城西五里叔英黃巖人官修撰旅出廣德聞靖難兵自經死因葬焉古迹故鄣城在州城東北漢縣屬丹陽郡去長興縣西南八十里東漢分故鄣之南鄉置安吉縣諸葛城在建平縣西一十里其中可容數千人旁有驢城馬城相去一二里有井數十世傳以為昔人屯駐之地浮城在建平縣西一十里廣數畝其上有木莫能名斧之則淋漓如血地至窪下每夏潦暴漲諸墟盡沒惟此巋然獨存故名廢廣德縣在州城內漢分故鄣縣地置廣德縣宋分置綏安縣隋省廣德唐復改綏安為廣德宋置廣德軍治此本朝省入州高封周宅在建平縣已廢為夀昌院封周在江南為陳氏外戚宅有八角井九曲池皆封周所鑿至今存焉衆春園在州治西北宋趙子濬置名宦晉裴松之義熙初為故鄣令立身簡素在縣有政績南北朝丘寂之南齊故鄣令專以廉潔御下有能名宋范師道知廣德縣縣有張王廟民嵗祀神殺牛數千師道禁絶之范仲淹廣德司理參軍日抱具獄與太守爭是非守盛怒臨之仲淹不為屈歸必記其往復辨論之語於屏上比去官屏上字無所容貧止一馬鬻之徒步而歸梅詢天聖初知廣德軍興學校敦教化政績甚多民皆頌之錢公輔治平中知廣德軍首建學校延鄉老以教郡人又作學諭一篇委曲訓誘使郡人知所崇嚮孫覺熙寧初以言青苗法不便出知廣德軍作興學校甚有善政石公弼知廣德縣有政績召為宗正寺主簿上官均元祐初以言事出知廣德軍正直不撓賈易元祐中知廣德軍公忠朴直守正不撓聲譽大著郡人頌之孫諤紹聖中知廣德軍重賢下士有張介者隱居城北諤躬造見與之酬唱焉王儔權通判廣德軍建炎末盜戚方過廣德入其郛儔不屈與權判官李唐俊司户朱嗣孟司法潘偊權知廣德縣常績縣丞蔣夔皆死之錢觀復紹興間守廣德請于朝寄廩以便民輸民不病勞嵗飢輒發常平倉賑之民賴以生洪興祖紹興間知廣德軍視水源為陂塘六百餘所民無旱憂重建學宫舉行鄉飲又作原學記以示諸生熊彥昭淳熙中佐郡事嵗歉發倉以賑飢民治為江東之最耿秉由知廣德軍以嵗大歉發常平倉以賑飢民萬餘人且自劾其矯制之罪寧宗聞之賜璽書褒異王介知廣德軍韓托胄𨽻人蘇師旦忿介不通謁目為偽黨以告托胄有勸其自明者介曰吾髮已種種豈畏鼠輩耶托胄亦畏公議不敢發常楙知廣德軍郡有水災發社倉以活飢民先發而後請專命之罪又置慈幼局立先賢祠故事郡守秋苗例可得米千石乃以代屬縣償大農綱欠黃震淳祐間通判廣德軍時民困於社倉納息震買田以代之郡有祠山廟江淮之民祈禱者數十萬牲皆用牛又有自桎桔拷掠以徼福者震皆禁絶之董槐廣德軍録事參軍民有誣富人李桷私鑄兵給豪傑以應李全者郡捕繫之獄槐攝通判察其枉上書明其不反竟脫桷獄施德懋端平中知建平縣廉能有善政民甚德之趙時踐廣德司户參軍以廉能名郡守雅敬其才俾攝建平縣時事變已迫以死自誓率家屬九人投水死元偰文質廣德路總管廉潔自持興起學校民賴其德秦德用廣德路判官贊治有聲作興學校嘗興創四先生祠史正明廣德路總管為政仁惠作興學校創先師孔子釋奠雅樂主簿牟應龍有記高璧建平縣尹興學校奬善懲惡訟平盜息民物阜康當時稱之本朝王新洪武中廣德州同知奉公守正一毫不取於民雖蔬萊必廉其價值臨事有斷樵者鬻薪忘其斧即覔之買者昧而不與樵者訴於官新乃解其人之絛隂紿其家果得斧人服其術胡興昱廣德州判官贊修學宫督造郵驛立輸糧便益之計民咸戴之羅坤泰知廣德州存心公直不受私謁重新學校奬勵生徙祛除弊政民訟止息王大雅知廣德州興學校革姦弊