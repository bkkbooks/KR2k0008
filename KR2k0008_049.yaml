body:
  text: 明一統志卷四十九明李賢等撰江西布政司江西古揚州地漢領以揚州部刺史唐𨽻江南道開元中分為江南西道置採訪處置使治洪州後改採訪為觀察治仍舊宋置江南西路安撫使以隆興守臣兼領又置江西提點刑獄司治贑州元於隆興路置江西等處行中書省及江西湖東道肅政亷訪司本朝置江西等處承宣布政使司領南昌饒州廣信南康九江建昌撫州瑞州袁州吉安臨江贑州南安十三府置江西都指揮使司領南昌前南昌左袁州贑州四衛吉安安福撫州鉛山建昌廣信饒州會昌南安永新信豐十一守禦千户所置江西等處提刑按察司分南昌湖東湖西九江嶺北五道兼察諸府衛所三司並治于南昌云南昌府東至饒州府餘干縣界二百四十里西至湖廣嶽州府平江縣界四百九十里南至撫州府樂安縣界二百四十里北至南康府星子縣界一百八十里自府治至南京一千五百二十里至京師四千一百七十五里糧五十萬石零建置沿革禹貢揚州之域天文斗分野春秋戰國時為吳楚之交秦屬九江郡漢始置豫章郡屬揚州王莽改曰九江東漢復為豫章郡晉元康初置江州治此後移治武昌宋齊梁陳並為豫章郡隋罷郡為洪州大業初復為豫章郡唐復為洪州置都督府天寶初改豫章郡後以避諱止稱章郡乾元初復為洪州建中以後嘗為江南西道觀察使治所南唐遷都於此改州為南昌府宋復為洪州宣和中於此置安撫使隆興初升隆興府元置隆興路本朝初改洪都府領州一縣七南昌縣附郭本漢舊縣為豫章郡治隋改為豫章縣屬洪州大業初復名南昌縣後廢唐初復置屬孫州又析置豫章縣尋廢孫州以南昌並入豫章後復改曰南昌宋元仍舊本朝因之編户四百九十九里新建縣附郭本漢南昌縣之西境晉分置宜豐縣陳又分置西昌縣後俱省入豫章縣唐初復置西昌縣尋又省入豫章宋初為南昌縣地後置新建縣元仍舊本朝因之編户一百九十七里豐城縣在府城南一百六十里本漢豫章郡南昌縣地三國吳分置富城縣晉移治豐水西改名豐城縣隋初廢尋復置五代梁時改曰吳臯唐復名豐城宋仍舊元升為富州本朝復為豐城縣編户三百五十四里進賢縣在府城東一百二十里本漢豫章郡南昌東境晉分置鍾陵縣尋省入南昌唐初復析置鍾陵縣尋廢為鎮名進賢宋始升鎮為進賢縣元仍舊本朝因之編户一百九十八里奉新縣在府城西一百二十里本漢豫章郡海昏縣地東漢分置新吳縣治在山區之間隋省入建昌縣唐復置新吳縣尋省永淳初置神龍初遷治馮水南南唐改為奉新縣宋元仍舊本朝因之編户一百五十一里靖安縣在府城西北一百六十里本晉豫章郡建昌縣地唐置靖安鎮屬洪州五代時楊吳改為場南唐割建昌奉新武寧三縣地升為縣宋元仍舊本朝因之編户三十里武寧縣在府城北三百二十里本漢海昏縣地晉為建昌縣地唐始分置武寧縣景雲初改曰豫寧後復曰武寧屬洪州宋屬隆興府元置寧州本朝罷寧州以縣屬南昌府編户五十一里寧州在府城西三百六十里本漢艾縣地屬豫章郡隋省艾縣入建昌縣唐析建昌置武寧縣貞元中又以武寧析置分寧縣屬洪州宋屬龍興府元屬寧州本朝初改為寧縣屬南昌府𢎞治十六年升為州仍𨽻本府編户八十六里郡名豫章漢時有豫章生庭中故名洪都隋名見唐王勃滕王閣序隆興宋名形勝水陸四通山川特秀劉宋雷次宗豫章記咽扼荆淮翼蔽吳越同上襟三江而帶五湖控蠻荆而引甌越唐王勃滕王閣序楚之東境吳之西界唐元和郡縣志當淮海之襟帶作吳楚之把握唐封敖記在江湖之間東南一都會宋曽鞏記南距五嶺北奠九江宋范致虛記羅山峙其南贑江環其北元富州志風俗講誦為業晉志豫章范宣以􅊰誦為業學者聞風而至諷誦之聲有若齊魯衣冠萃止頗有文物三朝史志人尚清靜之教重於隱遁宋雷次宗豫章記君子善居室小人勤耕稼隋志處士有巖穴之雍容文章有江山之秀發宋黃庭堅道院賦有泰伯虞仲季子之風故處士有岩穴之雍容有屈原宋玉枚臯之筆故文章有江山之秀發勤生而嗇施薄義而喜爭宋曽鞏分寧雲峰院記雅素不競圖經士知尚儒民皆務本元富州志山川雞籠山在府城西一十里其山盤旋聳秀狀若雞籠下枕大江為一方逰覽之地釣磯山在府城西一十里舊傳洪崖先生釣逰處西山在府城西大江之外三十里一名厭原山又名南里山上有仙洞道書第十二天柱寶極真天即此其最幽絶處有香城蘭若宋余靖記初濟江十里有盤石名石頭津自石頭西行有梅嶺即梅福學仙處嶺之南有葛仙峯下有葛仙壇上有煉丹井及鸞岡乃洪崖先生乘鸞所憩處西有鶴嶺王子喬控鶴所又有大簫小簫二峯世傳簫史嘗逰其側旁有簫仙壇又有水出山椒名吳源水高下十堰溉田萬餘頃西山之勢與廬嶽等而餘山則支附耳罕王山在府城西六十里峯巒高聳上有罕王廟馬鞍山在府城南七十里形如馬鞍逍遙山在府城西南八十里乃道家第四十福地南有旌陽玉隆宫几山在府城東北一百四十里屹立湖中上有石橋釣臺又有仙岩吳城山在府城東一百八十里臨大江乃吳許二真君斬蛟處松門山在府城北二百十五里上有石鏡光可照人劉宋謝靈運詩攀岩照石鏡牽葉入松門吉州山在府城北一百八十里其上居民數千家相傳秦時移此赤岡山在豐城縣西北一十五里山瀕江壁立土石皆赤宋朱熹詩晚風吹過赤岡頭白馬山在豐城縣東南三十五里相傳晉時有三神乘白馬于此鄉人因立祠且以名山始豐山在豐城縣南七十五里乃道家三十九福地南唐徐鉉有記鳯凰山在豐城縣東九十里相傳晉升平中有鳯將九雛于此又寧州治北奉新縣東九十里俱有鳯凰山龍門山在豐城縣南一百里傍有龍湫西北與道人山接相傳馬祖禪師駐錫于此堯山在豐城縣東南一百四十里上有堯祠因名羅山在豐城縣南一百四十里東接堯山晉羅文通于此學道其巔有池又名池山澄山在豐城縣南一百四十七里其下有水澄徹土人取水造麯色如丹砂一名孤山壇石山在進賢縣治後相傳嘗闢縣治得斷石有尉遲恭監修五字其山乃縣治之根脈棲賢山在進賢縣東九十里唐撫州刺史戴叔倫携家居此因名登高山在奉新縣治北一名龍山下有泉名馮井其山下視民居千甍隱然每嵗重九士人多逰賞于此藥王山在奉新縣南五十里峭拔屏列其巔夷曠唐文簫吳彩鸞仙去留藥一粒與其主人鄒舉詩簫聲凝露濕鶴背伴雲間一粒仙人藥服之能駐顔華林山在奉新縣西五十里一名浮雲山三峯秀拔土人常伺雲氣舒卷以驗晴雨山巔有壇百丈山在奉新縣西一百四十里吳源水倒出飛下千尺故號百丈以其勢出羣山又名大雄山下有大智院唐宣宗遁迹方外時嘗至此題詩有日月每從肩上過山河長向掌中看之句又有栁公權所書法正禪師碑駐蹕山在奉新縣西南一百四十里唐宣宗迎回嘗駐蹕于此繡谷山在靖安縣北五里一名幽谷山有瀑布與幽谷亭相對桃源山在靖安縣西北四十里仙靈勝概宛如武陵故名葛仙山在靖安縣西北四十里按豫章志仙本楚人漢末隱此或云即葛洪也此山四面險阻人迹罕到相傳其巔有金鍾每遇風雨晦冥則有聲又有煉丹壇飲馬池壇之左有葛仙庵石門山在靖安縣西北四十里山有寶峯院院有唐權德輿碑宋僧詩兹山甲天下蔥翠自開闢石磴緣空青新營炫金碧玊枕山在武寧縣北八里狀若枕形北有四望山高下相等嚴陽山在武寧縣南四十里舊傳嚴陽尊者嘗結庵于此石鏡山在武寧縣東北四十里面平色墨其形似鏡栁山在武寧縣西五十里峯巒峭拔如文筆唐栁渾嘗隱此故名今讀書石臺遺趾尚存旌陽山在寧州東隔水山勢壁立橫截水口相傳晉旌陽許遜嘗逐蛟過此上有旌陽觀南山在寧州隔溪跨橋穿石竇而入懸崖峭壁下瞰修水有釣磯玉溜石積雪石宋黃庭堅題字趙崇和為宰日創一翠亭何異為記山巔有冠雲亭鹿源山在寧州西八里山有九峯昔有仙人乘白鹿出入其間故名毛竹山在寧州南一百二十里按圖經此山路塞宋治平間有余奭者出資募人鑿道至爛泥坪始通往來青龍山在寧州西二百八十里嘗有禪師駐錫于此能馴伏猛虎今有禪院塔廟黃龍山在寧州西一百八十里相傳吳黃武中黃龍見此或云山頭湫中有黃魚二能致風雨嵗旱禱之輒應幕阜山在寧州西一百九十里吳太史慈拒劉磐于此置營幕因名香爐峯在府城東四十里其狀如爐時雨乍作煙霧滃然上有許旌陽洞文筆峰在靖安縣治東高五六十丈與縣譙樓相對宛若筆之插架白雲峰在靖安縣北五里上有二峯狀如丫髻每天將雨雲必興于其間寶蓮峰在靖安縣北四十里宋紹聖初真淨禪師葬此上有寶峯禪院翻車岡在府城西南四十里列仙傳許仙役夫許大者與妻運米至此忽聞仙君上升倉皇奔歸遂覆車于此上有許仙廟龍岡在靖安縣西四十里每嵗旱禱有應清水巖在寧州東北二十里南岩有石室北岩多蘭蕙黃庭堅云清水岩號為天下勝處野狐巖在百丈山後昔懷誨禪師開堂有老人聽説法曰墮落此山今有幸矣明日有老狐斃于崖下自是老人不復至洪崖在府城西三十里西山左右石壁斗起峭絶飛湍奔注下有洪井乃洪崖先生得道之處翔鸞洞在西山有石洞敞豁可容數十人景物清曠相傳唐明皇公主隱于洞之南洞側有歐陽拾遺書堂天寶洞在府城西八十里西山最勝處洞門有石泉狀如水簾宋嘗遣使投金龍玉簡于此楊傑詩天寶洞中如不到西山元似不曽來秦人洞在府城西齊源嶺側故老云嘗有鄉人秉炬入洞行五里許豁然開明有泉橫不可渡遙望桑麻芁芁若有居室然宋潘興嗣詩桃花洞口不多逺借問秦人知不知投龍洞在華林山本浮丘公逰息處號浮丘石室唐明皇投金龍于此因名投龍洞昭宗時里人費琯避冦于此得明皇所金簡玉環有􅍢文八十六字李八百洞在奉新縣南三十里洞門甚隘小但可側肩而入行數十步漸高其深莫測或云髙安郡圃亦有李八百洞與此相通唐開元初有孫天師受張天師書藏于此故又名孫天師石室鳴水洞在黃龍山西南水行兩石間其高數十丈直下聲如雷流十餘里始達平田宋韓駒詩大聲如雷霆細者亦竽瑟得非拖天紳常恐浮地脈鎮蛟石在奉新縣延真觀內舊傳許吳二真君逐蛟入穴以巨石書符鎮之有石碣尚存望夫石在豐城縣西二十六里高二十丈相傳昔人有商於逺者其妻望之遂化為石抱子石在寧州修水之濵高數十丈紆徐折洑試劔石在奉新縣三十四都有巨石中分相向如削舊傳許真君逐蛟嘗試劍于此章江在府城西一名贑江上從豐城縣界流至南浦折而北流下入鄱陽湖曲江在豐城縣東北一十里形如半月中分三潭有灘嘗出金宋姚勉詩曲江磯頭山崒嵂此景江南誇第一東湖在府城東南隅周廣五里舊通大江漢太守張躬築堤以通南路謂之南塘唐刺史韋丹開斗門以接江水俗呼謂南塘塍其水清魚美為一郡之勝張九齡詩郡庭日休暇湖曲邀勝餞樂職在中和虛心挹上善乘流坐清曠舉目稱悠緬林與西山重雲因北風卷晶明畫不逮隂影鏡無辨晚秀復芬敷秋光更遙衍萬族紛可佳一遊豈能展蛟湖在豐城縣西一十五里源發劍池東北流五里許滙為湖流入張樂港灌田數百頃日月湖在進賢縣北二十里水涸則分為二漲則合為一中有石人灘古諺云日月湖明良將出石人灘合狀元生武陽水在府城東南三十五里源出南豐流經臨川支流達于豐城東北流經南昌又東北