南縻以鐵索以鎮蜃穴石柱在寧縣西南二百里郁江口四面如削成柱流觴曲水在百丈山西北唐宣宗嘗遊此避暑鑿石引泉為九曲每曲置石墩為坐石梁跨水以通往來元趙孟俯書天下清規四字鐫于石仙虎迹在藥王山世傳文簫綵鸞跨虎升仙處有二迹倣佛于石上龍沙在府城北江水之濱白沙湧起堆阜高峻其形如龍舊俗為重九登高處國初駕至南昌築臺沙上集父老諭之曰陳氏據此軍旅百需民甚苦之今俱不以相勞其各事本業為吾良民父老皆感恱呼舞云常州亥本武寧縣之市名嶺南謂市曰虛以不常會多虛日也西蜀曰痎如瘧疾間而復作也江南惡以疾稱故止曰亥蛟穴有二一在豐城縣東二里一在豐城縣治西其中積水四時不竭舊傳蛟精嘗蟄于此許真君以符呪逐之蛟遂遁去名宦漢梅福南昌尉時成帝委任王鳯福上書云方今君命犯而主威奪上不納遂棄官去妻子隱于洪崖山劉寵豫章太守性仁惠為吏民所愛焉陳蕃豫章太守性方峻不接賔客惟禮徐孺子特設一榻去則懸之重其高節如此欒巴豫章太守郡多淫祀民常破資産以祈禱巴素有道術乃剪除姦巫妖異自消民始懼而終安之三國顧邵吳豫章太守下車祀先賢徐孺子之墓舉善以教風化大行太史慈吳建昌都尉劉表從子磐驍勇數冦西安諸縣慈督諸將置營幕阜山以拒磐磐絶迹不復為冦晉雷煥武帝時斗牛間常有紫氣張華以煥妙達象緯問之煥曰寶劍之氣上徹于天耳當在豫章豐城華即補煥豐城令掘獄地果得二劍是夕紫氣不見劍名龍泉太阿煥以一送華以一自佩後華誅失劍所在煥卒其子携劔過延平津躍入水中令沒人探之但見二龍蟠縈須臾光彩照水何無忌都督江荆二州八郡軍事加鎮南將軍討賊死節范寧豫章太守在郡大設庠序遣人往交州採磐石以供學用逺近至者千餘人資給衆費一出私祿殷羡豫章太守都下士夫因其致書者百餘函行次石頭皆投水中曰洪喬不能為致書郵其資性介立如此唐張九齡開元中為洪州都督有治聲張休洪州都督州人愛之如父母崔祐甫為作遺愛頌李勉江西觀察使厲兵睦鄰平賊屯部人父病為蠱求厭者以木偶署勉名埋之掘治驗服勉曰是為其父則孝也縱不誅魏少遊江西觀察使表栁渾為判官州僧有夜飲火其廬歸罪瘖奴獄具渾與其僚崔祐甫曰奴寃少遊趣訊僧服因厚謝二人王仲舒江西觀察使初江西𣙜酒民私釀嵗抵死不絶仲舒罷酤錢九十萬吏坐失官息錢五十萬仲舒焚簿書脫械不問水旱民賦不入為錢二十萬代之有興浮屠者皆驅出境韋丹江西觀察使計口受俸餘委于官教民為瓦屋民無火憂築堤捍江灌田萬餘頃百姓賴之詔刻功于碑子宙亦為江西觀察使尚簡易人以為能世其官張鎬寶應初洪州刺史屢平羣盜慎簡僚佐慈惠之政洽于百城卒于官郡人頌其遺愛為立碑焉周墀江西觀察使劾舉部刺史剪捕劇賊出兵戍彭蠡湖禁止剽劫百姓賴之宋李咨知隆興府政平訟理人以况唐韋丹曰先韋後李王明初以祕書監知州事明帥師入豫章或勸以城違期不下當盡屠之明但入城觀變竟不戮一人王濟真宗時知洪州兼江西安撫使屬嵗旱民飢躬督官吏為麋粥日給之録飢民為州兵全活甚衆凌䇿知洪州真宗曰南昌水潦艱殆長吏當便宜從事宰相王旦言䇿涖事和平可寄方面即以江南轉運使授之程師孟知洪州州瀕江嵗積薪捍堤師孟疊石易薪又浚漳溝揭北閘以節水升降後無水患民甚便之周敦頥分寧主簿有疑獄久不決敦頥至一訊立辨邑人驚詫曰老吏不如也後知南昌縣邑人咸曰是能辨分寧獄者吾屬得所訴矣由是富家大姓黠吏惡少皆以汚穢善政為恥程璠知豐城識用高爽凡山川道途人物名氏目所一見耳所暫聞閲年雖多不復忘廢為邑三年識其民且半楊告豐城主簿邑有賊殺人投尸于江人畏不敢言告親往禽之有言賊黨欲報怨者告不為動既而果乘夜欲刺告告又捕得之境內肅然張瓌知洪州營校督役急其徒三百人將以夜殺之求不獲持臿譟請易校瓌召問諭遣明日推治黠者十人不為易校趙概仁宗時知洪州作石堤二百丈以捍江患至今賴之僚吏有挾持郡事為不法者概即收抵罪闔府肅然曽鞏知洪州會嵗大疫資其衣食責醫候視全活甚衆孔宗翰知洪州以治聞哲宗初立求言吏民上書以千數詔司馬光采閲其可用者獨宗翰王鞏二人見奬韓駒宣和間知分寧政修民悅訟簡庭空以吟詠為樂詩篇甚多張商英知洪州興修學校會嵗潦開東湖以泄水民無淹浸之患劉韐豐城尉時嵗飢多盜他邑率以捕殺希賞韐獨率豪右出穀賑濟多有全活江介知進賢縣會詔蠲半租介白部使者程大昌自全户三升以上悉蠲之貧民被其實惠陳敏識知分寧縣金騎至江右牧守之臣望風逃避獨敏識抗義不屈與民死守卒全其境曽民瞻南昌尉通天文學以晷漏有差遂更用其法箭傍二木偶左者畫司刻夜司點則擊板以告右者晝司晨夜司更則鳴鉦以告自謂得古人之所未至李綱江西安撫制置大使兼知洪州有旨赴行在奏事畢之官綱入對言今日用兵之失者四措置未盡善者五宜預偹者三當善後者二趙鼎知洪州在郡二年戢吏愛民盜賊屏息一方賴之張浚以觀文大學士判洪州時以母喪將歸葬念天下事為秦檜所壞邊偹廢弛又聞金主亮篡立必將舉兵不敢以居喪為嫌具奏論之張守知洪州兼江西安撫使時盜賊未悉守至部出師屯要害揭榜開諭禍福許之自新不數月盜平楊萬里知奉新縣戢追胥不入鄉逋賦者揭其名市中民歡趍之賦不擾而足縣以大治龔茂良江西運判兼知隆興府時連歲大旱茂良戒郡縣免積稅上户止索逋發廪賑贍疫厲大作命醫治療全活數百萬劉珙乾道中知隆興府兼江西安撫使蠲歲務新額及罷苗倉大斛屬邑奉行有復出租稅窮民不能輸相率逃去反失正稅并奏除之沈作賔江西安撫兼知隆興府在郡撙錢二十餘萬緡僚屬請獻諸朝作賔謂平生未嘗獻羡以半歸帥司犒師半𨽻本府辛棄疾知隆興府兼江西安撫時大飢棄疾榜通衢曰閉糴者配強糴者斬盡出公錢召幹實者責領運糴不取子錢期終月至城下發糶于是連檣而至其直自減民賴以濟時信守乞米救助棄疾曰均王民也即以米舟十之三與信楊長孺知南昌縣前宰多控制不下長孺處之裕如三年之間繭絲保障各得其所王居安知隆興府盜起列城皆震居安命都統許俊討平之賞厚罰明將吏盡力始終用以賊擊賊之䇿故兵民無傷者江西人祠祀之刻石記功陳韡知隆興府時贑盜出沒韡遣官諭降不從即自提兵搗賊巢克平六十餘寨郡境寧輯劉應龍知隆興府兼江西轉運副使奏免和糴二十萬石人皆德之陳塏知隆興府兼江西安撫使樂于薦士幕客甚多有善政軍民愛戴之吳淵知隆興府兼江西轉運嵗大侵講行荒政全活者七十八萬九千餘人程迥知進賢縣縣大水亡穡麥郡蠲租至薄迥白于府盡蠲之境內有婦人傭身以養姑其子為人牧牛亦乾飯以餉祖母迥亷得之為紀其事給以錢粟真德秀知隆興府承寬弛之後稍濟以嚴而尤留意軍政趙良淳知分寧縣分寧俗尚譁訐良淳治之不用刑戮不任吏胥取民敦孝友者身親禮之甚桀驁者繩以法俗為少革江萬里知隆興府兼江西運判創為宗濓書院萬里器望清峻論議風采傾動一時元嶽柱江西行省平章政事時有誣富民負永寧王官帑錢者遣使徴之使至江西柱曰事涉誣不可奉命况民惟邦本傷本以斂怨非國家福也時相聞之感動詰治得誣罔狀乃罪誣告者劉容至元中以中書省掾使江西撫慰新附之民或勸其頗受送遺歸賂權要以致榮寵容曰剝民以自利吾心何安不聽敬儼江西行省參政舊俗民有爭往往越訴於省吏得並緣為姦利訟以故繁儼令下省府不得侵民訟事遂簡黃澤東湖書院山長以明經講道為志多所著述受學者甚衆嘗揭六經中疑義千有餘條以示學者安謙監郡沉毅明斷政尚清夷德化大孚至于退強寇興學校舉弊政尤加意焉後人為立德化碑李亷龍興路録事日則署公事夜則課諸生有春秋會通傳世賈全豐城縣尹時民多附賊全以仁恕慰撫民以還定省徭役興學校邑人德之吳觀分寧縣尹清慎寡欲門無私謁括私帑買田數百畝設鄉司以掌之置倉積其所入名存惠遇水旱則發之後民為立祠本朝張子明國初為千户從大將守洪都陳友諒來攻子明潛出詣京師請援兵既還為友諒所獲使誘城降子明偽許之至城下大呼曰大軍且至宜固守以待友諒怒殺之事聞追封忠節侯陶安洪武初江西行中書省參政端確儒雅振肅方面吏民畏服趙文奎洪武初知南昌府涖事嚴毅措置有方凡百興作民不知勞而事已畢集去後民思慕之許方洪武初知南昌府盡心民事勸課農桑尤惓惓於學校嘗夢一儒者曰吾廬冒風雨久矣冀太守修之莫詳所以及見徐孺子像方悟遂葺其亭林弼洪武初為豐城知縣以文學飾政事孜孜愛民士高其行民頌其德時比之卓魯焉梁璧洪武初知進賢縣在任亷明果斷囹圄空虛吏畏其威民懷其德立清政坊於縣前邑人稱頌不忘李思聰洪武中為布政司參議亷介自守行學俱優善書法作興學校創貢院士林重之房安洪武中為按察使有守有為崇儒重道旌善懲惡吏民咸服聲譽赫然秦泰洪武中知南昌縣勤于撫字延禮需士民有不孝者以禮諭之不加鞭朴政清訟簡去任父老攀留項中宣洪武中知寧縣治事嚴明公勤不怠公署廟宇多所創建但元行洪武中武寧知縣開荒田興水利重建公署惠愛甚多民至今頌之朱宗晦洪武中靖安知縣愛民禮士潔已奉公修壇壝興學校治橋道勸農桑政績甚著胡本惠南昌知府朴實有才愛民如子處紛斷伏綽有餘能滿去囊無南昌一物時儒士鍾甬制行卓然本惠特禮致之郡齋薦補本學訓導至今士民以為國朝南昌太守第一璩鎮海奉新知縣蒞政亷勤鋤強植弱嵗大飢民賴存活邑學田科額重煩奏減十之二民咸德之解敏洪武中按察使性剛毅務學明敏以古人自期超拜右都御史周觀洪武末為按察使稟性剛直彈劾不避權貴在任振肅風紀百度惟新吏民畏之姚瑾洪武末知豐城縣平易近民有知人之明至其葺縣治修學宫築堤防濬溝洫皆務民之義去後民思之稱循良吏云劉辰永樂初布政司右參政會嵗潦飢民聚盜辰檄郡邑勸冨出粟以貸民用輯寧南贑等郡荒田糧六萬餘石重為民困辰具奏悉蠲其額士民懷之顧佐永樂中按察司副使涖事勤敏威望尊號令嚴姦黠聞而遁聲名大振余耀進賢知縣亷介不阿涖下以信政平訟理而民不敢欺遷任士民不忍舍去林瑜永樂中按察司僉事行部屢辨疑獄吏民信之如神晉副使袁有流冦瑜往治之殱除渠魁撫綏餘黨一方底寧嘗督造戰衣一百萬責以三月如期而集在任二十餘年滿去耆老數百相與挽足脫革履為記史克新永樂中按察司副使剛方有守正直無阿發姦擲伏如神巡歷所部淹滯無遺卒于官聞者流涕邵玘江西按察使蒞任五年綱紀振肅嚴明之政與亷潔之操始終如一轍張本永樂中南昌知府尋升布政司左參政為人有器識直諒通敏剛果亷介臨事秉公吏胥不能售其姦王翺宣德中以都御史鎮守江西剛果孤介斂華就實處事平易而吏民自懼臨下雖寬裕有容而觸姦犯法不少貸刑清政舉一方晏然于謙以監察御史巡按江西風稜峻整時三司多宿望僉敬服之張文昌江西按察使性慈厚居憲職未嘗輕撻一人輕入一人罪吏民咸服吉郡素號健訟至今亦追思之不置云楊寧以刑部右侍郎鎮守江西寬裕和厚勸懲允愜時閩浙盜起屬郡民皆震悚奔竄寧為警偹盜不侵境民復安堵韓雍正統中巡按江西尋復巡撫敏識高才嚴明敢為在任設施多愜輿情所行均徭嵗辦法民甚便之至今追頌林鶚厯江西按察使繼升左布政使恪守禮法人無私干掌憲時有決獄雖滯其明如燭之謡張沖正統間知進賢縣亷幹嚴明愛民禮士重名器抑僥幸創學宫築城垣增圖籍置義倉民無荐飢時致野蠶成繭瑞蓮靈芝之異陳純知奉新縣蒞官有惠政吏部以聞特賜楮幣樽酒張居傑正統中布政司左參政有幹濟才聲譽著聞以績最升山西左布政使孫遇江西右布政使為治一以至誠民皆心服稱仁厚長者云李齡按察司僉事提督學校時提學官久罷復設齡欲士子敦本尚實痛抑奔競自持一言一動不茍雖時為教官士子所欺然終篤信不渝被讒而去時論惜之張翥知南昌府性剛鯁以名節自許優于刑名剖決如流時中貴王慶怙勢索珍玩翥峻拒之一無所與臨行挾之上舟欲挫辱之百姓號擁登舟奪歸吕聲由進士知進賢縣捷敏有才幹凡所修舉功能立就邑嘗多疫死聲剪爪齋沐禱上帝晝夜不少怠疫勢隨息明年疫又作聲又齋禱請以身代疫又隨止人咸感之王恕江西右布政使操履剛正人不敢干以私天性忠直遇義敢為而無少顧忌陳選以監察御史巡按江西風采大振不事聲威官吏自不敢犯士民至今稱頌之尚裭監察御史左遷豐城知縣剛嚴敢為不畏權勢時鎮守中官假進貢名民不堪其需擾多伐木棄産以逃獨豐城賴裭無患一邑德之黃雋成化間知武寧縣亷潔律己仁惠及民深得牧民之體士民至今稱之李廷聰豐城知縣亷明有為時洪水衝堤殆盡聰勸募採石興工修理至今百姓德之夏寅江西提學副使博學工文所至多題詠紀述其敷教以寬為本校文時雖不過為隄防而藻鑑精明毫髮不爽士子心服劉芳由進士知靖安縣持身清介治政公勤建公署興學校修壇壝邑治煥然涖官六載政平訟理民到今思慕之祝瀚知南昌府視事勤敏時京奏臺訴者株連至千百人瀚不一閲其誕詞惟令對面纒縲之相去不能以寸寢息惟艱未旬日多求辭去圜土一空出堂餐餘墾田二百頃以贍三庠生築墟五百餘處統名曰祝公堤又立義學擇師以訓蒙士他如修郡志移郡獄擴郡治基致靈鵲巢梁馴堆隨車鐵船港妖龍潭鍾怪俱遁迹人以比魯恭三異為生祠祝之黃仲昭江西提學僉事氣岸屹立而思致安詳校文以理氣為主綜核酙酌毫髮不爽有奔競躁進者則諭以受命之説時朝廷以學校冗滯令額外悉沙汰之仲昭奉行惟謹雖鼎貴子弟未嘗假借蘇葵以翰林編修升江西提學僉事性剛介不茍合太監董讓陷之理官附董欲加之刑南昌諸生數百人號泣白寃擁入扶蘇去事竟得雪其名愈彰白鹿洞書院自朱子振作之後至李齡復興而增置田廬招徠四方之士至葵益力潘子秀提學副使藻鑑精明人才多所造就雖嚴刑弼教人或過而表正砥礪卓有可紀邵寶江西提學副使敦尚道義砥礪名節以身為教周憲按察司副使督兵捕馬瑙巖賊䇿馬以進為士卒先大戰華林桐梓嶺援兵不至死之其子幹亦從征奮不顧身同死于難事聞贈憲按察使諡節愍以其父死于忠子死于孝詔旌表其門嘉靖初從祀于旌忠祠蔡清提學副使性質溫良問學純正取士先德行而後文藝其教人論道必極其蘊奧語事必悉其首尾吳一貫正德間按察司副使時華林賊勢猖獗一貫督兵𠞰捕嚴令命信賞罰罰卒奮勇俘斬甚多因建議築城賊至則督兵以戰戰退則督民以築至忘寢食竟以勞瘁卒于軍民立祠祀之李情按察司副使整飭饒州兵偹時桃源降賊復攻萬年縣有告賊至請去情曰我憲臣柄兵者也寧死不去遂遇害同死事者通判秦碧陳逺照磨馬驄指揮邢世臣千户許政等邵鋭提學僉事顧名檢篤孝義淡朴素持退然若不勝衣究心理學文體賴之以正且以敦行風士忠信之稱朝野同之孫璋正德間南昌知縣孤介立身和緩應事時宸濠肆虐政多掣肘璋維持調護保全一邑之民濵江田多沙塞入覲疏豁沙米八百石以蘇民困三年政平訟理民到今稱之林俊以僉都御史巡撫江西鋤強扶弱雖市販小害必懲之先事發寧庶人姦人服其見陳恪江西布政使時逆濠鈐制方面恪雖不事矯激而內有定見不可搖奪凡議夫價賀禮類多忤其意濠怒甚面叱數四且繫逮其吏恪處之裕如濠將中以竒禍會升都御史巡撫南贑以去姚永禎知進賢縣一以愛民為本值嵗荒盜起流劫坊鄉命將征𠞰調度軍用百法區處民不知擾閫帥求責自甘窘辱而不忍傷民卒于任士民思之李夢陽提學副使工英古文詞自任氣故在任亦以振作士氣為先至今賴之吳廷舉布政司參政桃源洞亂被執入賊巢欲加害廷舉挺然不少動色且諭以順逆之道賊感化反加禮焉胡世寧按察司副使兵偹東鄉民賴以寧時寧藩有逆謀乞詔戒諭濠賂權姦世寧坐離間謗下錦衣衛獄獄中三上書言江藩逆狀後濠果反起用歷官巡撫所至有勞績穆相巡按江西劾太監章鑑風采肅然按部止乘驄馬除貪擲姦郡邑靡不憚服沒于官有遺囑詩徐一鳴提學副使崇正學文體毁淫祠并寺觀創東湖書院院司憲綱禮自一鳴始明被誣逮械入京諸生泣送官校為之感動事竟得白范輅以御史清軍時逆濠將復護衛擅察民間殷實尅取民財輅忤之被誣謫龍州宣撫經歷恬然不悔後起升江西副使李承勛正德間知南昌府時劇賊驕藩內外孔亟號稱難治承勛深略雄才撫機應變華林馬瑙桃源各冦執殺藩臬勛疏蠲稅請兵廣詗諜繕壁壘扼溪澗盡𠞰滅之境內安輯萬士賢正德間令靖安縣時遭馬瑙賊變舊無城郭甲兵可恃士賢為鑄兵器訓戰士築城鑿池竟討平之己邜宸濠造逆偽檄取馬瑙餘黨以益其亂假威臨士賢士賢誓不受制即斬偽使於南港橋以定衆志隨興義兵討逆濠就擒士賢與有力焉遭兵燹後修學校建射圃立社學治教聿興民到今懷之孫燧巡撫江西己邜六月濠反脅公保駕燧折之曰天無二日臣安有二君不屈遂遇害時烈日方熾忽隂曀慘淡百姓皆為流涕贈禮部尚書諡忠烈祀旌忠祠許逵按察司副使己邜濠反縳副都御史孫燧逵厲聲曰孫都堂朝廷大臣不可輒無禮濠并縳逵且問逵何言逵罵賊言天無二日我唯有赤心肯從汝反乎濠怒喝令斬之慷慨激烈挺立受刑贈左副都御史諡忠節並祀旌忠祠馬思聰户部主事奉命督糧江西己邜六月與宸濠生辰之燕翌旦入謝度必有變語厨人曰我倘不出將勑藏于高處厨人未諭其意姑如所示及入濠怒其不從遂遇害配享旌忠祠黃宏布政司參議己卯之變濠械繫各官宏憤憤不平引所縻索自縊而死事聞贈太常寺少卿仍配享于旌忠祠王守仁以副都御史提督南贑軍務平洞冦奉命往勘福建叛軍事道豐城聞宸濠反轉駐吉安起兵勤王平逆有功民尸祝之封新建伯諡文成從祀文廟伍文定正德末知吉安府適寧藩謀不軌都御史王守仁募兵勤王文定首倡義兵四集及守仁兵入南昌逆濠兼程還救文定率哨兵先進披甲胄立矢石間雖火炮燃鬚不退故各哨奮勇先登逆濠就擒擢本省按察使顧佖豐城知縣存心仁恕蒞政嚴明積粟至數萬石頻年水旱佖發廩減價以糶秋成糴還民賴以濟逆濠要索悉禁絶之及叛欲加兵於豐即緝斬從逆者四十八人以殉極力偹禦境賴以安後從討有功升大理寺丞轉少卿劉源清知進賢縣政尚嚴明尤加意學校己邜逆濠變起倉卒逺近震駭清竪旗邑門書精忠報國四字號集義兵斷橋守城效死弗去逆戚婁伯領偽詔逼奪邑篆清即斬以殉賊遂不敢東嚮逆平擢御史大理寺丞民于邑東關立忠義祠去思碑杞名宦劉守緒正德末知奉新縣嚴明正大不假人以辭色平夫役清獄囚事簡而民安己邜宸濠之變舉兵搜伏破城其功居多唐龍正德末以御史巡按江西時逆濠就擒中貴張永率京兵駐省肆虐尤甚兵荒後且值水旱相仍龍疏請班師如解倒懸列從逆之罪表劉源清馬津之功劾鎮監崔和之黷貨辨雪脅從多方存恤先後所上九十餘疏無非為民請蠲賑患時賴以寧去後肖像同仁祠汪頴同知南昌府練達政體人不敢干以私練兵營中申軍法作士氣與士卒同甘苦故人皆思奮若桃源華林馬瑙醴源諸巢皆險不可破者以次破之間關百戰先期集事其勞居多吳嘉聰知南昌府當逆濠變後凡與平民讐者輒誣以助逆時拲梏盈囹圄嘉聰日夕細求割免者千計且留神興學造士豫章文風振起與有力焉陳世甫嘉靖初知南昌縣溫厚慈祥視民如子聽訟時詳為開𨗳雖人服其罪亦貸不深究令其自化嘗有兄弟爭田世甫且諭且泣兄弟竟以相讓庭無滯事至今稱為南昌縣令之最云陳仲録知奉新縣甫涖任禁令一新盡革里役冗費撫良鋤強而寬洪間雅四年間吏胥未見其疾言遽色秩滿去送者幾千人靡不墮淚鄭嶽先任江西參政以守正拒濠被誣發戍及濠叛起江西巡撫時坐助濠逆者率多纍死嶽至曰濠橫恣甚我藩司且被挫折矧民乎分豁不止千餘家至今民戴其德徐階自翰林出為江浙文宗崇正學厲士風藻鑑精明時稱得人又開同仁祠陽明祠以示嚮往逮登相位置田宅羣三學肄業其中迄今士類猶仰慕之鄭世威嘉靖間按察司副使督驛傳革借關夫馬時分宜權宰當軸絶不通問人服其操且性侃直清苦自甘歸家止畜一僕灌園自給善翰札故江西名區多遺墨云談大初按察司副使時江省供億不資民力􅉵甚大初一一裁革之且執法不媚權勢摘伏姦竇民畏服若神明然譙孟龍嘉靖間知南昌府府故九河交注春漲汪洋一浸龍為沿河築堤禦之民以有賴林大霖南昌縣學教諭仁厚謹飭言不及利訓人以敦本為先論學以明經為急雖隆冬酷暑未嘗懈故學規整肅造士有方時稱得師云張嶽先任提學以選貢法忤時相謫去尋以功擢江西巡撫會嵗大飢嶽多方賑濟民賴以生各郡邑民糧苦偏重嶽為請改重米若干民到今稍得輕輸皆嶽之惠魏謙吉嘉靖間巡撫江西才猷軒敏綽有風裁墨吏豪猾莫不竦息時嵗大飢出贓鍰為糴民賴全活復奏蠲全稅稱威惠懋著云黃卿歷江西參政左右布政使清介峻特大旱步禱經旬不稍懈兊原封出入堂無管庫捐修學舍及城隍廟入覲唯圖書數卷有清風兩袖獨朝天之謡薛大楹主南昌簿清直自持嘗標其門曰要一文不直一文且不畏強禦不媚上官今鄉耉猶有薛青天之稱焉陳紹儒南昌知府事上接下不設城府恆不言而飲人以和且案牘詳慎鞫獄刑不妄施百姓亦自輸情欵服胡松巡撫江西時流冦猖獗松入境單車趨撫州定難而後視事尋詔三省會兵𠞰廣劇賊璉松即飭兵境上滅冦斾旋建營據要害民賴以寧汪佐通判南昌清古朴司捕時刑罪人人泣下嘗視篆南昌縣縣務素稱煩劇公無煩焉賦稅民爭輸納至今稱之劉應峰知南昌縣縣當會事難綜核應峰以鎮靜處之一不為勞均丁糧以僉差役省工食以核軍兵他如定追徴均鋪行革民船政績為一時之最卒祀名宦杜完知新建縣愛民恤用嵗大旱乃出示責躬偹極剴切百姓讀之潛然淚下果雨注竟成有年及涖事權貴之家一無所忌當時百姓有杜母之號周如斗巡撫江西稔知民困差徭孜孜與百執事議為四差條鞭畫一之法開局摩算寢食俱廢竟以勞瘁得疾及革一語不他及詹詹惟鞭法是圗百姓如喪考為肖像祀江濵祠曰懷仁馮嶽江西左布政使正直重厚有大臣風度絶包苴之入革吏書之姦藩政一時肅然至今多其楷式劉光濟巡撫江西首詢民瘼議行一條鞭法總其事為二十四欵閲三月定為四差較若畫一貧冨兩便之諸所創建悉冝于民肖像祀于青雲館江以東督學副使人不敢干以私時上加意學校以東奉行惟謹士習一變行部南贑當塗稍欲撓之公回省竟拂袖歸諸士攀留江滸數日舟不得行嗣擢大參竟致政去王天性通判南昌府資性質直疏爽有才堤能署豐城縣篆丈田有法築平豐晝築工于鄉夜理訟于庭吏胥肅然事罔不緝民稱無寃故豐人被澤尤深祀豐城縣名宦祠曹大川豐城縣知縣存心易直守已清亷寧拙摧科不肯浚民脂膏以博聲譽受挫當道勿恤焉卒于官祀名宦祠丁應璧知南昌府資性亷介簡易慈祥留心民瘼士民稱氷檗之操者必歸之璧云流寓范宣陳留人東晉時徙家豫章博學善三禮家貧躬耕養親親沒負土成墳廬于墓纍徴不起太守殷羡以年荒疾疫厚餉給之固辭不受著易難行世陳陶本閩人以儒名家陶聲詩厯象無不精究南唐升元中至南昌將詣建康不果乃築室西山日以詩酒為事會宋齊丘出鎮南昌陶志不屈而齊丘亦不為之薦李夤本建安人有清節仕江南李氏至諸司使宋初授官不拜舉進士為衢州司理參軍以母在江南棄官歸後其子虛巳亦舉進士歷官通判洪州時夤春秋高夤母尚無恙虛巳雙輦迎侍夤至豫章樂其山水曰此可以終吾身也遂於東湖築第以居焉虛巳官至工部侍郎與子壻晏殊有唱和集邵成章宋內侍建炎初以上書論黃潛善汪伯彥誤國除名南雄州編管久之高宗召赴行在其徒忌譛遂止于洪州金人入洪州訪得之曰知公忠正能事吾主可坐享富貴成章不應脅以威亦不從遂釋之曰忠臣也吾不忍殺遺之金帛而去蘇雲卿廣漢人少與宋丞相張浚為友靖康之亂避地豫章東湖治圃織屨浚入相貽書聘之遂遁去莫知所之郡為立祠伍伯遜本福建寧化人元時徙居南昌與弟伯㿩伯逺伯璣讀書敦信義一時稱厚德者歸焉同居數百口雍睦無間胡儼深嘉重之長子渙領正統戊午鄉薦仲子恆景泰庚午應賢良詔終養于家人物漢唐檀豫章人通經史善星占教授鄉里漢元初間郡生芝草太守劉祗問檀對曰方今陽道微弱豈嘉瑞乎永寧初有婦生四子祗復問對曰京師有兵禍發蕭墻果如所占舉孝亷拜郎中時白虹貫日上書陳咎徴棄官去著書二十八篇徐稚南昌人家貧常自耕稼非其力不食恭儉義讓所居服其德太守陳蕃特設榻以禮之纍舉皆不就築室隱居時稱南州高士靈帝欲以蒲輪聘之會卒三國胡勃豫章人仕吳為郡功曺嘉禾初太守黃翊為人所誤勃懷斧詣闕乞代翊罪吳主嘉之後為廬江太守吳亡入晉懸車不仕晉熊逺豫章南昌人少有志尚朝臣勸帝親征杜韜逺嘗上疏諌止會韜平拜從事中郎纍遷至散騎常侍帝每歎其忠及王敦作逆亦憚其正而有謀胡藩豫章南昌人參郤恢征虜軍事殷仲堪為荆州刺恱史藩説仲堪曰玄玄意趣不常非將來計仲堪不及劉裕起兵召參軍事從征慕容超討盧循頖戰有功又從伐關中統别軍至河東破後魏河上兵以功封陽山縣男卒諡壯侯羅企生豫章人多才藝補臨汝令纍遷武陵太守未之郡而桓玄攻殷仲堪仲堪以企生為咨議參軍仲堪敗去文武無送者惟企生從焉玄至荆州或勸其詣玄企生曰殷遇我以國士不能共殄醜逆亦何面目復求生乎玄聞之太怒遂害之南北朝雷次宗豫章南昌人少入廬山篤志好學尤明三禮毛詩宋時徴至都開館雞籠山聚徒教授久之還廬山後又徴詣都為築室鍾山號招隱館使為太子諸王講喪服經胡諧之豫章人南齊武帝時江州别駕歷遷左衛將軍加給事中諧之風采瓌潤兼以舊恩見遇進都官尚書有識鑒每朝廷缺官密量用人皆如其言人服其明卒諡肅侯王綜南昌人仕梁為魯郡太守嘗役家僕于所部職田中耕得銀二萬五千斤盡數送官一毫不取滕曇恭南昌人五嵗能孝母楊氏患熱思瓜非其時曇恭歷訪不得銜悲且行遇一僧問其故曰我有一瓜相遺持歸奉母舉室驚異太守王僧虔引為功曹不就梁天監初表異之時號滕曽子唐胡敬之諧之五代孫幼聰敏高潔簡靜仕為侍御史彈劾不避豪貴後為琛州刺史卒于官高宗下詔弔問賜絹歸葬楊相如南昌人聰明慱古神龍初進士補當塗尉屢上書言當世事改歷晉陵陸渾又上君臣政要三卷明皇曰朕身之寶也拜右拾遺開元末復上書語益切直出為懷州别駕臧嘉猷進賢人開元中州牧吳競召不赴著無求論以見志競名其鄉曰真隱里曰正吉以旌異之又以所住為旌賢坊王季友豐城人博極羣書貞元進士能詩甚高古仕為御史中丞杜甫詩丈夫正色動引經豐城客子王季友羣書萬卷常暗誦孝經一通看在手豫章太守高帝孫引為賔客敬頗久宋何蒙洪州人精春秋左氏學南唐時進士宋初為洺州推官纍遷至水部員外郎通判廬州真宗時上所著兵機要類十卷後知濠州以光祿少卿致仕胡仲堯奉新人纍世聚居至百口搆學舍聚書以延逰學之士南唐時嘗授寺丞宋雍熙初旌其門州境旱歉仲堯發廩減市直以賑飢太宗嘉之除本州教授以國子監主簿致仕弟仲容纍官光祿丞克順端拱時進士官至三司户部判官仲容子用之及從子用莊用舟並進士及第陳恕洪州南昌人少為縣吏折節讀書第進士通判澧州以吏幹聞召為三司判官纍遷鹽鐵使太宗深器之恕事母孝沒以哀毁得疾不任治劇官至尚書左丞袁抗南昌人少以能文名及長遂厲學舉進士同學究出身吕夷簡執政或諷以私謁屹不往自廣南提刑還槖中無銖兩南貨纍官至少府監抗善藏書至萬餘卷子陟好學善為詩登第官至殿中丞陳執中恕子始以父任為祕書省正字出知梧州上復古要道三篇真宗異而召之又進演要三篇擢右正言纍遷至同中書門下平章事昭文館大學士執中當國人不敢干以私四方遺問無及門者卒諡曰恭吳居厚洪州人嘉祐進士元豐中纍官至户部尚書以龍圖閣學士知開封府崇寧初拜尚書左丞進中書門下侍郎遷知樞密院事潘興嗣新建人與王安石曾鞏善仕為德化縣尉許瑊與興嗣同郡瑊為江州刺史興嗣往見瑊踞不為禮興嗣竟歸徜徉山水間自號清逸居士後以瑞州推官召不赴孫淳師事黃庭堅作記尤工趙庶明新建人少倜儻以功名自許嘗詣闕上書僅萬餘言大略以為契丹不可恃其恭順而不之偹又言趙元昊必叛朝廷以為狂斥建州未幾元昊果叛識者高之黃庭堅分寧人其先居金華五世祖贍知分寧因家焉父亞夫有詩名庭堅號山谷舉進士教授北京國子監蘇軾見其詩文嘆其獨立萬物之表為著作佐郎神宗實録成擢起居舍人紹聖初知鄂州為章惇蔡京等所惡謫授涪州别駕黔州安置移戎州尋坐謫宜州江西詩𣲖祖庭堅世以其詩配軾稱蘇黃云徐禧分寧人少有志度博覽周遊以求知古今事變風俗利疚以獻䇿擢檢討官元豐中城永樂禧以給事中被詔與內侍李舜舉往相其事會賊趍新城禧亟往視或説禧曰本被詔相城禦冦非職也禧不聽與舜舉俱至永樂城陷死之贈吏部尚書諡忠愍黃亷分寧人第進士歷官州縣神宗召訪時務對甚悉擢提點河東刑獄元佑初為户部郎中陸思閔茶法為川陜害遣亷按察奏罷其太甚者纍遷陜西都轉運使給事中余良肱洪都分寧人第進士纍官知虔州士大夫死嶺外者喪車自虔出良肱悉力振護遷光祿卿知宣州治為江東最七子卞爽最知名初試校書郎爽博學多大略纍官知明州復與卞俱入黨籍黃得禮豐城人舉進士為栁州推官建中靖國初應詔言持平守正如彭汝礪葉濤之徒當省其言子彥輔著論是非刋落陳言歷官所至有聲次山幼警敏歷官吏部員外郎數論事補外提點湖南刑獄所著有三餘集黃庠分寧人博學強記就舉國子監開封府禮部皆第一比引崇政殿以疾不時入天子遣內侍即邸舍撫問賜藥時庠名動京師所作文傳誦天下聞于外夷歸江南五年以疾卒徐俯禧子庭堅甥仕為司門郎中會金人立張邦昌集百官議皆以次書名俯不書居城中買一婢名昌奴遇朝士至即呼前驅使之後避地廣中建炎中召至纍官簽書樞密院事俯工于詩有東湖集洪朋南昌人民師子庭堅甥也庭堅嘗稱其筆力扛鼎不患他日文章不圃垂世弟芻舉進士仕為諌議大夫所著有職方乘老集弟炎亦舉進士高宗召為中書舍人時方倥偬除命填委炎操筆立成未嘗屬藳李誼南昌人幼以孝聞舉進士罷入太學歷官諌議大夫奏牘數百無不剴切當帝心嘗論講和之非秦檜不樂纍遷工部尚書資政殿學士所著有文集三十卷范璿豐城人舍選第一知甌寧縣平心率物吏民愛之遷兵部員外郎上言帝王弔伐事語凱切時秦檜主和議璿力爭曰宰相須開懷聽天下人言安可以私意害公議耶出知南劍州不就所著有松溪集子德動知龍泉縣遷知肇慶亦有文集李安國豫章人少穎悟能詩歷官知建昌軍剖決精明有兩邑賦不均請減其多者交訟頓息遷知常州條上利害進司農卿開無名逋十八萬省楮幣百萬三年積緡錢斛米千百萬淳熙初擢户部侍郎京鏜南昌人紹興中進士擢監察御史嘗使金出為四川帥寧宗立纍遷為左丞相卒贈太保諡莊定丁錟新建人以伊洛之學倡江右子弟雲集與陸子靜友而議論有不同者號甕天先生孫中篤學力行聚書數萬卷號韋軒先生范士衡豐城人每謂春秋一經其説曼衍皆傳注害之作尊經辨及春秋本末晚事朱熹以書請益熹報之稱以老友黃疇若得禮曽孫第進士主析陽簿遷知廬陵周必大稱其有子路治蒲之政進知成都召除兵部尚書力辭丐歸命知貢舉試禮部尚書所著有竹坡集曽孫竑第進士仕至廣西提幹為文筆力奔放所著有留皮集孫義伯豐城人於書無所不讀謂治厯當偹三法曰象曰器曰數作六厯論渾蓋同歸圖寫古今七十六家法數作大厯賦復古著傳其他著述尤盛雖瓶無儲粟淡如也李大性其先端州人祖積中為御史徙家豫章大性力學習典故仕至端明學士知平江府封豫章郡公諡文惠弟大異中博學宏詞科官至諌議大夫大理第進士官至朝奉郎大東官至龍圖閣學士大原官至朝散大夫其子孫尤盛趙汝暨新建人仕為明州録事參軍有執平民為殺人盜者汝暨直其寃繼獲真盜豫章守貪刻宣撫趙葵薦汝暨知鄉郡民始安且有拓境之功善政具舉進刑部尚書轉工部致仕胡價奉新人舉進士所著有當世急務湖北利害漢唐龜鑑及本朝名臣奏議等書裘萬頃新建人有孝行節操學問粹然一出于正登淳熙進士為樂平簿清聲播聞纍遷大理司直力求外補差江西撫幹所著有竹齋詩集范應鈴豐城人開禧初進士知崇仁縣甚有政績纍遷大理少卿卒諡清敏號西堂先生所著有西堂雜著及對越集徐鹿卿稱其經術似貌寬決獄似雋不疑治民似龔遂風采似范滂理財似劉晏而正大過之人以為名言徐鹿卿豐城人博通經史嘉定中進士纍官禮部侍郎卒諡清正鹿卿居家孝友喜怒不形居官亷約清峻毫髮不妄取所著有泉谷文集奏議講義及手編漢唐文類文苑菁華羅必元進賢人嘉定中進士歷官撫州司法真德秀入參大政必元移書謂老醫嘗云傷寒壞證惟獨參湯可救先生其今之獨參湯乎通判贑州上書論賈似道後以直寶章閣致仕黃畇庭堅姪孫嘗從朱熹學舉進士纍官知台州謝良佐子孫居台州者播越流落畇收而教之在郡先勸後禁訟牒消縮郡稱平治遷袁州所著有復齋集泠應徴分寧人寶慶初進士調廬陵主簿以亷能著知廣州理政務不擾不倦嘗曰治官事當如家事惜官物當如己物聞襄樊受圍日繕器械裕財粟以偹倉卒後卒賴其用臨事輒斷雖勢要不為撓奪徐經孫豐城人寶慶初進士纍官太子詹事敷陳經義隨事啓迪景定初春雷求直言所對悉中時病忤時相賈似道拜翰林學士知制誥未踰月罷歸後以端明殿學士間居十年卒追封豐城伯諡文惠劉德秀豐城人舉進士歷官諌議大夫吏部尚書進龍圖閣學士四川制置使改知潭州召簽樞密院進爵郡公為政嚴而不苛帥蜀尤有去思自號退軒有遺藁數十卷王衡仲豐城人舉進士授新昌簿居官不詭隨尤善推類以得事情漕運使捕盜數十約至境誅之衡仲按其事曰非真盜也悉縱之遷守建昌軍值大旱入境大雨如注郡人迎喜曰真刺史雨也號柏軒所著有文集李琮豐城人力學不倦趣向高雅邑有長堤江水為患琮輸財於官易以石以子貴進工部侍郎子秉登進士以都官郎中歷知宿州所至有惠政從子仲詢為金溪尉孫君伯知蕭縣亢臨川丞登舉進士歷官吉水丞龍庚舉進士疏論五欺十賣之罪子丁卯為桂陽軍判官有文集徐國和豐城人兄弟義居宰木連理其子定親喪廬墓三年家有紅紫牡丹悉變為白人以為至孝所感定卒子頎居喪三年寢食于墓曽孫傅霖事親尤孝居喪如制人謂徐氏世孝又同邑過昱母卒刻像事之考古人勉于孝者類成三十卷目曰至孝通神集章鑑分寧人以别省試及第纍官同知樞密院事咸淳中拜右丞相兼樞密使後豫祠鑑在朝日寬厚與人多許可士大夫目為滿朝歡云元熊凱南昌人精義理之學以明經開孰四十餘年時稱遙溪先生子東造詣尤高逺從逰者益衆同邑熊良輔受學于凱善屬文所著有易傳集疏風雅遺音小學入門等書雷光霆分寧人家居教授學士程巨夫詹天遊皆其徒也嘗注九經集義五十卷史辨三十卷詩義指南十七卷至元間遣使徴拜未幾卒學者稱龍光先生熊朋來豫章人宋咸淳進士授寶慶僉判未上而國亡遂隱居教授元初以薦為福建廬陵教授所至講論經義考古篆籀文字調律吕協聲歌以興雅樂後以清州判官致仕學者稱為天慵先生所著有集三十卷子太古鄉貢進士有文名趙一德新建人至元中被俘至燕為鄭留守家奴歷三十年忽泣拜請於其主欲歸視父母許之至家父兄已沒惟母在年八十餘一德葬父兄畢如期而還主家嘆其孝即縱之將辭歸會主翁以寃被誅羣奴各亡去一德獨留為訴枉得雪主家分以田廬一德不受而歸皇慶初旌其門湯霖新建人早喪父事母孝母嘗病熱更數醫弗效母曰唯得冰我疾可愈時天甚燠霖纍日號泣池上忽聞池中戞戞有聲視之乃冰澌也亟取以奉母疾果愈郡守聞于朝嘉其孝行授臨江路儒學教授揭傒斯龍興富州人父來成宋鄉貢進士傒斯父子自為師友由是通五經屬文典麗仕至翰林侍講學士同知經筵與修經世大典及遼金宋三史卒追封豫章郡公諡文安子汯工翰墨官至祕書監丞趙德宋宗室博學工文隱居郡城之東湖嘗注四書箋義五經辨疑行世熊復豐城人以五經教授鄉里四方來學者嘗數百人以明經舉進士者衆著春秋成紀以惠後進隂幼遇奉新人五世同居家數百口讀書講學八嵗中九經科著韻府羣玉行世巴延西域人其祖父仕江西因家焉巴延由東湖山長辟為行省都事至正中兵陷巴延間道入閩攻復建昌因陳江南緩急之勢朝臣驚歎奏授南恩知州後除吏部侍郎會全閩二廣皆歸夲朝巴延遂潛隱進賢之北山洪武中以禮往徴巴延聞使者將至作七哀詩祭同事死節之士飲藥而卒本朝張謙南昌人明經飭行教授東湖書院洪武初以文學舉授監察御史未幾辭歸後布政李宜之再以明經薦赴京試周易劉向説苑吏部奏第一授刑部右侍郎李宗頥靖安人幼聰頴年十二以能詩聞陳友諒陷南昌妻夏氏自溺井宗頥義之不再娶本朝初擢國子監學正改丞渭南後拜監察御史纍官禮部尚書卒表為義夫朱善豐城人十嵗能屬文長通五經尤邃于詩洪武初纍官至文淵閣大學士歸終于家所著有詩經解頥一齋集遼海集包希魯進賢人學問該博制行高潔門人受業必先德行而後文藝士習為之一新稱之曰忠文先生所著有諾若文集子實夫力學明經事親至孝一日獨行忽遇虎銜其衣曵至林莽中實夫曰爾欲食吾肉吾何憾念父母垂老缺終身之養虎知我乎虎乃起復曵其衣至故處而去人以為孝誠所感龔鐩南昌人洪武中領鄉薦拜兵科給事中執政不阿永樂中歷轉廣東按察司僉事宣德中特升四川按察使明察民隱當理必為在職四十餘年蕭然不異寒士後致仕二子海浩俱領鄉薦吳存南昌人洪武中領鄉薦歷官中外才能著稱永樂中升山東布政使寬平仁恕深得方面體善吟詠尤長于草書向寶進賢人洪武中進士敡歷仕途清譽著稱纍官至都察院右都御史兼詹事府詹事宣德初條陳八事言論剴切有禆治道尋引年致仕黃宗載豐城人洪武末進士拜監察御史巡歷四方所至有冰蘗聲纍官吏部侍郎進升尚書為人中正和厚寬裕有容長于詩詞以引年致仕士林重之徐伯恭南昌人山西行太僕寺少卿素抱清操險夷一致致仕歸行李蕭然安處舊廬非飲射不入城府陳仲賢武寧人母病刲肝割股以食母尋愈永樂初以事聞擢鴻臚司儀署丞旌表其門張顯奉新人父上原洪武初以儒士薦不就嗜經史善草書學者稱為誠齋先生顯以明經舉授王府教授永樂初與修國史遷國子學正考績書最特升國子監丞劉端南昌人由進士官大理寺丞亷明執法靖難後因治方孝孺獄暑月縱息樹隂劓鼻而卒平生負浩然氣每以天下事自任在詔獄時有詩云綱常千古事此日屬銘彛所著有儒行十二篇懷古詩集并百家輯録隆慶初詔恤革除死難諸臣建大節祠以祀之王高南昌人與劉端為同年進士又與端同官靖難後縱方孝孺息樹隂劓鼻而卒隆慶初與端同祀大節祠胡儼南昌人未冠知名由教官薦入翰林歷官侍講國子祭酒與典機務受知永樂洪熙間眷待優厚宣德初以老疾進太子賔客兼祭酒致仕歸間二十餘年儼詩文豐裕為時所重有頥菴集數十卷吳淑潤豐城人永樂初登進士第授福建道監察御史有謇諤風尋升浙江按察司僉事聲譽藹然彭遠南昌人永樂初中鄉試歷官治民勤於所務升淮安知府殷勤撫字持已清慎吏民畏服遷廣東布政使德化大行一方仰賴以年老休官吕爰正奉新人永樂初中鄉試擢兵部主事亷謹守法歷升郎中精于所務輿論以為不可釋特升左通政仍理其事尋以老疾辭歸盧淵新建人永樂中貢入太學擢兵部主事尋升貟外郎大著才猷特遷本部侍郎端重謹飭始終不渝凡所謀為深愜衆意卒賜葬祭贈本部尚書諡恭順史安豐城人永樂初進士授禮部主事時交人再叛用薦舉安助師入交趾總戎栁升戰沒安被執不屈死之衛源南昌人永樂中進士擢監察御史纍官河南布政使賑恤飢民全活者衆三年入為刑部尚書與顧佐齊名徐義南昌人永樂中進士授監察御史歷升廣東副使河南左布政使所至俱有聲况鍾靖安人由吏員薦授禮部主事升郎中簡知蘇州府授璽書假便宜從事至則舉僚屬胥卒不法暨豪右恣侈者繩刓不少恤彰善疸惡使民震懾嘗與周忱講求糧運之法奏減重額虛徴糧合一百二十萬辨釋誣入軍罪千八百餘復逋户三萬六千七百餘種種興革皆綱紀大務秩滿郡民八萬詣闕請留再任七年卒于官論者謂其亷潔之操一塵不滓執守之固千夫莫回丁鉉豐城人永樂中進士除太常博士歷刑部員外郎正統初升刑部右侍郎扈從北征而亡贈本部尚書追諡襄敏録用其子萬觀南昌人永樂辛丑進士授監察御史升嚴州知府纍有善政遷左布政使卒范衷豐城人由進士歷昌化太和二縣尹升知汝州居官清苦每去任民輒哀戀不舍時天下亷官三人衷為第一性至孝廬父墓瓜生連理又有三白兔繞墓馴走人謂孝感所致二子鏞鍈皆第進士官藩臬長有聲于時鏞任廣西政績尤著孫曰恭豐城人兄曰良進士官副都御史曰恭進士及第廷對時第為狀元嫌其名若暴字遂置第三歷官翰林編修修撰侍講端志雅操問學純篤為文簡古惜未大用而卒熊觀豐城人永樂中貢入太學授刑科給事中歷知常州鳯陽二府升山西參政所至旌亷能懲貪墨風采凛然及致政執經業者無虛日聶好謙豐城人永樂中進士授工部主事遷郎中擢知廣州府抑強扶弱除弊革姦權貴有所需拒之弗憚郡稱為仁懷太守時新會冦聚知其名撫之即降去之復叛後卒于官民祠祀之熊錬進賢人宣德中進士授刑部主事調工部改大理寺正獄多平反升浙江提學僉事嚴約革弊以孝弟忠信禮義亷恥為先務明于知人去就之際如較錙兩仕終布政使引年致仕歸熊尚初南昌人由吏員舉授都察院都事轉經歷升福建泉州知府會大冦鄧茂七猖獗鎮巡檄以監軍不旬日降賊數百明年賊復逼境閫帥危懼尚初歎曰受命一方本以安民今冦出不時由我不職所致寧一人受害無致下民受殃遂單騎出城為流矢所中卒有司嘉其忠配享忠臣廟萬祺南昌人為郡工曹掾正統間除鴻臚寺序班至天順中纍升工部尚書太子少保平生精星厯學且醇謹無敢慢立朝亦多建明云陳安新建人正統間進士授大理右寺副審獄詳慎多所平反升陜西參議嵗旱禱雨輒應改雲南會滇池暴溢淹沒多方賑給活人十萬餘纍遷布政使引年致仕羅箎南昌人舉進士拜監察御史活閩冦少壯者三百餘人纍升右副都御史巡撫湖廣撫諭苖獠嵗飢多所全活召還上疏乞親萬機用正人節賜豫等事皆人所難言未幾致仕卒所著有知菴集鍾甬南昌人幼頴敏長益肆力于學屹然為士林師表屢薦不就強補郡學訓導雅不能俯仰遂力求退張元禎稱其真知實踐卓然以聖賢自力特立乎詞華利祿之際非孟子所謂豪傑之士哉章幼文寧縣人由嵗貢終京衛經歷嘗受學于南昌鍾甬制行端潔老益不渝李瓛豐城人景泰初進士授監察御史巡按南畿獨持風紀纍升松潘兵偹副使却徐謝二指揮金總兵堯彧被虜重圍選將出竒以解後卒于官蜀人慕之祀于名宦祠李裕豐城人景泰中進士授監察御史巡按陜西建言選將安流民等八事尋劾權貴逆謀歷官副都御史總督漕運剔除宿弊修飭河道漕運至今賴之進右都御史振揚風紀臺省肅然升工部尚書轉吏部會朝覲黜陟一以至公𢎞治間致仕歸卒年八十張澯楊亷志其墓劉季清南昌人景泰中進士授南京大理寺評事江陵有富民訟其子不孝乃以至親曉譬子竟化之又有姑訟婦不孝亷直其寃婦得免季清為人孝友亷介每遇宴輒不懌或怪之曰老母久違養何能自樂居常食淡素以教授為業云楊瑄豐城人景泰中進士授監察御史巡按河南彈劾有聲歷升浙江按察使卒楊暟南昌人由嵗貢歷知德州以亷介稱時嵗久旱徒跣祈禱竟焦勞疾卒啓篋惟一破褐衫猶未仕時所置也熊懷豐城人天順初進士擢刑部主事讞獄詳明擢廣平知府摶豪強興水利嵗暑潦餓殍載道捐俸發廩賑之全活者甚衆民立生祠祀之以外艱去服闋知衛輝府稱循良升廣東參政時瀧水猺獞猖獗大軍征𠞰懷給饋餉振威聲遂平之捷聞賜豫優厚進布政使政績茂著纍遷南京刑部侍郎以老乞休卒王一夔復姓謝新建人父得仁由吏員任汀州府經歷有異政汀民請于朝祠之扁曰遺愛一夔天順庚辰廷對第一授翰林院修撰纍升禮部侍郎十年以不附李孜省擢工部尚書外夷中密言婉氣和善謀而多成嘗因彗見陳五事以格君心正宫闈尤人所難言又疏諌土木輿論善之卒贈太子少保諡文莊張元禎南昌人幼靈異五嵗出語驚人有心定萬事定之句長益嗜學登進士授編修成化初上疏勸行三年喪又疏論治道大本四事與時宰議不合求去𢎞治初召用上疏勸行王道幾萬言凡三赴召侍經筵進講太極圖性理諸書孝廟恱有天生斯人以開朕之語正德初乞歸終吏部侍郎凃觀豐城人兄謙進士時英廟北狩廷臣議遷都抗疏論止之官至副使蚤卒觀登天順庚辰進士歷南京吏部郎中考察疏黜十餘人憲廟從之升知衢州府再知寧國府政尚寬平民懷其惠有天降凃來解倒懸之謡後致仕二子升旦皆舉進士升任御史終廣東副使旦任都給事中歷官湖廣布政使皆以才能著稱于大節進賢人天順末進士授行人升監察御史巡按湖廣以直言謫鶴慶府推官歷升浙江按察使以不阿權貴遂稱疾去大臣交薦力以疾辭朝廷強起之改山東按察使卒為人矜名譽甘清苦歷任三十餘年終始一操士大夫髙之黃琥豐城人領鄉薦拜臨洮同知有善政民廟祀之升知肇慶府以得慶瀧水功擢廣東參政尋乞休進嘉議大夫楊峻進賢人成化初進士知丹徒縣寬嚴兼濟百度維貞擢監察御史纍遷布政使進南京光祿卿以老乞休去峻性孝友才優識逺所至剔蠧宣滯政聲翕然熊繡豐城人由道州籍登成化丙戌進授行人轉御史巡按陜西劾布政使落職繡謫知清豐縣得民心肖像祀之起知鳯翔府歷升兵部左侍郎進右都御史巡撫兩廣以瑾誣休致瑾誅召為南京刑部尚書未幾卒家計蕭然嗣子貧不能立卒諡簡肅羅經南昌人幼有志節由進士歷官廣東僉事瓊崖逺隔鯨波分巡者多失所矢經居一載歸囊無瓊物改補提學勞于督課卒平生亷潔嘗以京官居家十載惟閉門受徒以自給云周季麟寧州人成化中進士歷官浙江左參政屢斷寃獄平巨盜賑飢多所存活升河南布政使政績益茂會冦犯北涼特升右副都御史往巡撫之至則勒兵與戰斬首百級餘捷聞賜敕奬豫移鎮陜西有奉詔取牡丹者裁抑其費民以不擾召還巡撫薊州致仕丁隆南昌人登進士授太平縣令築堤捍江民號丁公埧擢御史出按湖廣執法不徇為權姦所忌謫判光州風采愈勵進同知滅延平沙冦𠞰賀連猺賊升兵偹副使乞休每恨逆濠殘逞請于官立保甲以偹防禦人服其先事之智云江潭豐城人成化中進士授南京屯田主事嘗捧部檄核蘆洲權鐺多方賄之不得同官有中其餌者以語搖潭一不為動轉員外進郎中屢與司空爭事不茍隨以內艱去服闋赴銓曹卒于京棺殮之資出于親友潭學問精博詩文可傳言動不苟惜未究厥施云舒綱本性陳進賢人幼頴異領成化辛邜鄉薦一試禮闈不第遂棄科舉之業勵志聖賢博究羣書父喪廬墓三年事母孝撫弟遺孤恤族中婚葬者動遵古典主教白鹿洞師道尊嚴綽有古人風艾璞南昌人幼警敏擅文名登成化進士授兵部主事纍官都御史巡撫蘇松諸郡所至有聲嘗捧建儲詔使朝鮮歸槖蕭然詔求直言首陳慎修等六事又陳聖政等四事皆人所難言因勘勳戚家田逆瑾誣逮詔獄幾死瑾誅復職致仕卒魏默新建人成化甲午科舉人知光澤縣剗釐宿弊不畏強梗嘗延禮閩士有文行者課邑之俊秀暇則躬為講經義亹亹不倦光澤志稱其剛明幹濟請托不行公家庶務多所修舉後家居足不履城府所著有介菴小集范兆祥豐城人七嵗作登堯山詩以竒童稱登𢎞治丙辰進士時北邊入貢廷議依違可否兆祥上疏數千言其間尊國體料夷情有人所不敢道者選庶吉士授檢討應詔陳言時政語切宫闈下獄尋釋之出為涇府長史上疏論計安民社三事時議招南土民兵偹邊兆祥力言不教之民不宜驅而逺征議寢後以不附中人復下獄編戍放歸兆祥有才名尚氣節雖屢困踣不少沮抑陳伯宣靖安人補邑庠父卒廬墓肖像事之母卒復廬五年子恩中𢎞治甲子鄉試事父母以孝稱于繼母益謹𢎞治間有司上其事詔旌表父子孝行之門劉華甫豐城人由進士歷吏兵給事中彈劾不避升蘇州知府奏蠲虛糧三萬餘石以疾去起知雲南曲靖軍民府夷民安之復以疾辭歸卒祀鄉賢祠楊亷豐城人父崇領鄉薦歷知桞州永州二府有善政民甚德之亷舉鄉試第一登進士好學攻文辭于天下事靡不究心授庶吉士轉給事中首薦張元禎吳寬李東陽王鏊宜偹日講講書宜用大學衍義時論韙之仕終南京禮部尚書嘗摘薛瑄十五人各為傳贊命之曰理學名臣卒贈太子少保諡文恪龔浩南昌人其妻徐與李孜省妻兄弟也孜省方寵幸浩鄉舉上春官獨不往至目為林靈素孜省中傷之授祿勸州知州夷皆若于訓改知潞南州時竹子龜山二寨猖獗浩單車入寨宣威德諭以禍福二寨帖然夷人廟祀之休致歸疾革作浩然歌而卒楊源瑄子欽天靈臺郎正德初逆瑾亂政源察星象失度疏陳止遊幸黜姦邪忤旨杖于朝謫戍甘肅卒于途中外壯其節概熊卓豐城人由進士為平湖知縣擢御史陳時政得失奉敕勞軍盡革乾沒之弊按都督神英贓罪論如法雖權貴莫之撓巡按廣東貪墨下吏望風先遁時逆瑾權傾中外卓獨抗節不屈遂誣以姦黨勒令致仕陸時通豐城人由進士授行人選御史首陳國體廣聖學六事發逆濠姦軌及濠誅武廟親征駐蹕南畿者逾嵗力請回鑾辭甚剴切士林韙之汪深進賢人由鄉舉授蘄水知縣下車首詢民瘼革弊政清虛糧積榖至肆萬餘石後飢嵗藉以賑恤修築堤堰旱潦有偹葺學宫文風為之一新卒于官士民哀慕之祀蘄水縣名宦祠李元凱豐城人由進士知婺源縣邑故煩劇下車與民休息興革不避勞怨奏除鎮守千户民免暴害會採內臣貪虐凌有司遂棄官歸終身窮約婺人追祀名宦祠熊達南昌人由進士為溧陽令興學校毁淫祠立義冢以絶水葬擢御史劾道士崔志薦名儒張元禎陳獻章又納畨貨築堤塍杜滹沱水患因忤逆瑾致政值逆濠搆亂以死自守卒免于患祀鄉賢祠傅習進賢人由進士任大理評事以執法忤逆瑾謫理問瑾怒未釋復逮刑弗徇屈後升僉事副使兵偹屢建軍功終副都御史克定土官之亂其剛介始終一致云凃淮靖安人由進士授工部主事歷升順慶知府嘗自矢曰吾縱不能為循吏自信決不為酷吏也時民苦水患奏築堤禦之且弭盜安民興利祛弊郡大治終身無所競於世居鄉未嘗以資貨差别人焉丁錬新建人由進士令淳安涖政清苦擢禮部主事與修憲宗實録母死廬墓服闋補工部員外引年致仕楊亷銘其無書不讀進退以禮朱廷聲進賢人授行人擢御史歷官浙江僉事以侍郎致仕平生操履清謹居官以亷介稱雖政尚平恕人不敢干以私鄉評雅重其恬淡云朱槩豐城人由進士知吳縣改知旌德升刑部主事轉員外疏諌武皇巡逰廷杖奪俸起四川僉事畨賊阿戎叛據石城討平之轉參議時播州宣尉兄弟爭殺僉議用兵概獨往諭以禍福竟悅服遷河南副使歷參政卒于官楊銓豐城人由進士令襄陽擢御史以逆濠變疏革鎮守清戎兩廣酌鹽法軍政利病罷行之升興化知府去後民建祠立碑歷升廣東布政使終順天府尹致仕銓體貌魁梧材宏而敏為時所重云秦僎南昌人由進士授汀州府推官平反寃獄復補潮州擢涿州知州明文東武西之位雪妾誣嫡氏之寃以清節入朝名宦祀鄉賢祠范慶豐城人由進士授刑部主事歷員外郎中嘗決武辨奪爵不為權貴撓奉命勘晉藩獄情法兩盡出守蘇州禁火葬革酒艤捕樗博止遊女惓惓以移風易俗為先終雲南憲副卒祀鄉賢祠葉釗豐城人由進士授南京刑部主事見久繫淹滯者皆制于貴戚不敢決釗悉按如法有中貴奪民蘆洲嵗利不下五百金判以歸之應詔陳八事忤逆瑾逮獄既歸講學於嶽麓石鼓諸山尋卒諸士請配享石鼓書院陳奎南昌人由進士知廣濟縣擢御史查盤甘肅抵牾逆瑾幾杖死巡按廣西姦贓解綬歷山西山東河南臬藩平盂冦城晉陽修三關改汾河扈從武廟南巡權璫畏憚以廣西左轄致政當道餽以逆産咸固辭焉祀鄉賢祠魏棨新建人由進士授行人副時逆瑾擅權棨上書言時政無所避忌出參閩藩時古田流賊盤據議者欲屠之棨曰倡亂者馬周良也誅止周良耳賊解民賴全活者數十萬咸肖像祀之以母喪歸行李蕭然升右布政致仕卒祀鄉賢祠查仲道寧州人舉進士授兵部主事疏諌武廟南巡被杖幾死嘉靖初録直言擢郎中出守杭州因織造太監暴橫不堪命力抗阻之遂為所誣械至京謫運同擢知汀州府卒于官民祠祀之平生性剛介以直道自任云胡訓南昌人舉進士謙恭醇謹不以賢智先人每居一官輒思盡其職兵偹廣東以賊攻賊海賊竟遁巡撫雲南以夷治夷滇夷畏懷及總憲南都整飭大體風紀肅然官至太子少保南京兵部尚書卒贈榮祿大夫賜祭葬祀鄉賢世稱盛德長者云楊薰南昌人由進士授主事劾逆瑾謫刺潮州民生祠之歷升四川兵偹僉事讓松潘之功轉貴州有宣慰以金餽之者正色拒之致政歸行李蕭然家居野服途行絶無宦態王守仁大書清流臣子四字贈之熊浹南昌人由進士授職諌垣諍武廟南巡疏世廟以弟繼兄以子繼父與時議異出參河南召修明倫大典歷僉副都御史風采凜然再起南京禮部尚書議寂表揚朱家巷疏轉南兵書考校軍政悉當材品召掌北院紏正官邪辨雪誣枉時議建九廟有附會武皇不可自為一世者浹正言之晉吏部尚書銓敘流品尤奬拔恬退後以諌箕仙忤旨械繫歸田平生重倫理挺挺有氣節深得大臣體穆宗即位贈少保諭祭録其後一人祀鄉賢祀諡恭肅熊蘭南昌人由進士授行人擢御史豪右斂迹時逆濠蓄異謀蘭首泄其姦武廟親征至金陵聞而歎曰真御史也官至太平知府祀鄉賢弟葛領鄉薦為人剛正不苟合逆濠迫脅從已窘辱百端囚禁一載幾死終不附周季鳯寧州人由進士歷吏部員外慮囚湖廣極明慎釋矜疑者三百餘人升兵偹副使改雲南提學卒遷布政使平嘉魚巨冦擢右副都御史終刑部侍郎進階尚書諡康惠余楨奉新人由進士授工部主事改武庫司嘉靖初議大禮以諌獲罪而死隆慶改元贈光祿寺少卿祀鄉賢祠何祉進賢人由進士授行人升户科給事以諌諍著聲時江北大飢疏請發內帑蠲租稅民賴全活告飬復起南兵科條陳商書一德三義軍政四事馬政五事足國裕民六事升嘉定知府民為立祠未竟厥施而卒祀鄉賢所著有常濱文集舒芬進賢人幼警異十二嵗作馴堆依人賦郡守竒之薦補庠校士督學蔡清輒試首選曰他日必大魁天下果以廷試第一授修撰因武廟北狩上隆聖孝疏又上車服疏諷諭切至後因南巡率同官伏闕懇疏幾斃杖下神色不異謫福建市舶提舉世廟録直言復職旋以疾終平生風節凜然文章亦宕跌不羣所著有周禮定本等書諡文節朱世忠南昌人領鄉薦時逆濠慕其才名招之不肯附授知縣歷同知民為尸祝以左長史致仕居官厲氷蘗之操事父母以孝稱沒祀鄊賢方孟縉武寧人早失父事母孝比沒廬墓由進士授刑部主事時貴戚張氏搆大獄不決縉折斷平允推理淮安漕刑值江西吳城兊運軍民交變一詢輸服議改就省兊至今民便之歷升僉事致仕卒祀鄉賢祠所著有雁里淺稿薑儀南昌縣人由進士初任鳯陽抗疏逆權閹蕩平湖冦懾服貴宣慰安族鎮建寧諸路荒全活億萬人征楚苖蠻不妄殺一人復地四十五營寨疏忤時相謫官致仕平生剛介敦孝弟讀書危坐終日祀楚辰名宦本郡鄉賢李金豐城人進士尹碭山築城以防流賊後值洪水恃為保障升兵部郎中諌武廟南巡杖幾死升台州知府懲姦慝弛鹽禁蠲逋負設糜拯飢民賴全活祀碭山名宦趙惟興南昌人由鄉舉知桐廬縣仁恕均役野宿禱雨設飦粥濟民飢百姓尸祝之升承天府同知出帑以援漂沒築堤以障洋沙巨璫不敢撓其法邑有𣙜鹽羡金用以貸貧民之輸宦逰十載寒素如故卒無以為殮云李逢豐城人以進士任紹興府推官亷明人不敢干以私擢給事有風采時大同搆隙國是無從逢抗章直憲臣劉源清之獄復疏諌光祿靡費四十萬緡世宗幸承天伏闕極諌謫尉永福轉德安知府所至有聲卒于官魏良弼新建人性資剛毅操履方嚴逰王守仁門早聞良知之學自縣宰陟諌垣屢以讜言犯闕屢受廷杖亦屢復職每杖患甫愈又以直言受杖下詔獄雖獄卒亦為之流涕而直聲滿天下隆慶初晉太常少卿致仕弟良中嘉靖乙酉鄉試第一良器俱受學於王守仁門多所自得萬鏜進賢人父福進士官金華知府鏜舉進士授刑部主事員外郎改吏部考功文選郎中升太常少卿纍官吏部尚書掌銓選人服其介加太子少保卒蒙祭葬周期雍寧州人由進士選御史清軍兩廣升福建兵偹僉事歷官按察使刑部侍郎右都御史仕終南京刑部尚書自陳休致鄧顯麒奉新人由進士授行人諌武廟南巡忤旨廷杖謫國子監學正典試京闈首拔楊維聰士論服其知人擢御史上先聖學節民財釐祀典疏巡鹽山東監察湖廣俱有生祠去思碑仍祀本縣鄉賢所著有夢虹奏議郭升新建人事親以孝聞預識宸濠之變避居巖中卒免于難居室罹兵燹官給逆産堅執不受以貢授興國司訓日與諸士講學即以俸資館榖之數月翕然信從卒于任歸櫬蕭然著有大學中庸問答羅明南昌人由吏員授衛知事歷四川劔州判官正德中劇盜鄢藍等數萬人攻城民竄明偕其子介死守孤城不支明被執罵賊就死介奮身救父亦被殺事聞蒙恩恤蔭江匯進賢人由進士授兵部主事纍官河南右布政使亷介剛直不畏權貴居家益勵清節士論高之陳冠南昌人由進士授工部主事歷升營繕郎中親核中貴役占冒濫諸弊淹郎署十五年不遷忤時相謫官家居不事豐殖一榻數十年無有御之者郡士大夫共髙之祀鄉賢張鏊南昌人由進士簡庶吉士陟部郎悉毁寶玉佛像力拒徽藩田租督浙學政得人最盛以祝辭忤時相改遼冏卿轉藩臬至南京兵部尚書相度留都險要分水陸兵首尾聫絡俾江南北免倭冦荼毒皆鏊力也鏊外直內清儒雅為世所重沒祀鄉賢宋景奉新人方正耿介持大體習典故由進士筮仕州守以治行卓異改御史因忤逆瑾請告再起忤時相擢僉憲歸後薦起歷藩臬纍官南京兵部尚書轉左都御史守法不撓紏肅百僚海內想望其風采卒贈太子少保諭祭葬諡莊靖祀鄉賢萬廷彩武寧人由鄉舉授訓導歷升國子監學録南京刑部郎中仕終參政居官四十餘年練達剛正勤慎精明沒祀鄉賢祠所著有求正稿張臬進賢人由進士授刑部主事歷官副使按察使左右布政使升都御史巡撫四川進南京兵部侍郎總督閩廣右都御史傅炯進賢人由進士授刑部主事改山東道御史歷操江都御史刑部侍郎仕至南京刑部尚書自陳致仕卒諭祭葬李璣豐城人由進士簡庶吉士歷官國子祭酒纍升至禮部尚書典文試者五典武試者一嘗為史官典內學堂教事後中官多貴幸亦不藉以進且衷腸洞豁不設城府人樂親焉李遂璣弟由進士筮仕使垣列秩祠部出歷郡牧藩臬晉二留憲終兵部尚書剔歷四紀赫有令聞間以忤權遭擯落逮平倭難靖叛軍坐消池河之變功績尤茂祀鄉賢曽鈞進賢人由進士授行人纍官南京刑部侍郎中外垂三十年所至遺愛遐思逺邇若一居南垣以謇諤稱歷藩臬中丞卿二以徑節著且抗疏歸田其介如石竒氣峻節海宇仰之卒贈刑部尚書諡恭肅喻茂堅豐城人領四川鄉薦登進士第授銅陵知縣治行卓異擢御史恆守正忤時後守兩郡踐藩臬轉右副都御史大理卿刑部侍郎晉尚書歷事兩朝屢批逆鱗履虎尾既全其道又全其身且筮仕宦成清苦一節以尚書致仕囊無餘金自奉簡約若儒生然隆慶改元贈太子少保諭祭葬子姓秩秩約可百人科第接武遂為榮昌宦族云丁以忠新建人由進士授刑部主事諸疑難大獄多所裁決出為河間知府發粟賑飢却賄明法歷閩廣藩臬所在尸祝巡撫山東汰冗兵簡浮食晉南京兵部侍郎定噪卒之變既考續鄉貴當國感時事遂懇疏致仕歸卒祀鄉賢所著有世美堂稿黃樞南昌人由進士授縣尹陟南刑曹纍轉至太守居官清慎自持興利剔蠧勞怨不避故嘉興賑飢湖州禱雨特疏請蠲民受其惠竟以勞心民瘼卒於官當永訣時有勢家饋貽棺衾奮起手麾之亷介至死不變沒祀湖州名宦本郡鄉賢吳桂芳新建人由進士筮仕部郎却婚時宰為士林所重出守維揚督學東魯繼由藩臬建牙兩廣練兵禦冦開府河漕疏海口以泄淫潦造石堤以防風濤卒于官且孝事繼母推恩蔭均資産以待弟建橋梁築墟壋以利濟鄉人嘗論道龍光以作興後進云孫世祐豐城人由進士授行人歷員外僉憲藩參至都御史巡撫雲南先是土官豪恣禍變相踵世祐約黔徒緝姦猾諸難悉平升工部侍郎修葺城堞時倭夷江冦並起卒恃以無恐召拜刑部尚書致仕卒世稱為長者云李遷新建人登進士以行人出使滇蜀貴竹堅却餽贐除南京兵部主事按侵犯三皇陵獄不徇權貴全活數百人出知濟南府疑獄多所平反歷楚蜀西粵藩臬辨雪寃獄開諭藩王巡撫真定援兵破虜總督兩廣悉𠞰諸蠻蕩平三世劇冦功尤韋焉以南京刑部尚書歸老卒祀鄉賢祠所著有鶯谷山房集黃潯豐城人領鄉薦授彰德府推官通判常州興吳中水利知許州除商稅紆里甲民有青天黃母之謡卒祀許州名宦祀萬思謙南昌人由進士授吳江丞轉嘉定尹偹禦倭冦築城堞淹滯郎署轉光祿丞以長揖冡宰外輔官至福建左布政使家徒壁立升南京太常寺卿致書張江陵勸復言官切直相忤遂致政歸篋無遺帛清節天成士論歸之王希烈南昌人幼頴異七嵗有敲落梅花襯筆香之句人咸竒之由進士選翰林院庶吉士授編修歷官春坊國子祭酒吏禮二部侍郎兼侍讀學士掌詹事府事充經筵日講與纂修副總裁希烈梓中休度內直外和居常以名節自持立朝三十餘年未嘗私謁政府侍經筵日講每引經寓規諷忠悃溢然嘗攝禮部尚書事會肅王薨無嗣中尉某隂援為代希烈正色不許甲戍典會試張江陵以子希進則矢日不私士論服之屢與鄉會試門生例獻贄悉峻絶之居父喪哀毁服闋以原官召用而烈竟以毁卒贈禮部尚書諭祭葬祀鄉賢列女謝小娥豫章人嫁溧陽段居正居正與小娥父作賈江湖並為盜所殺小娥夢父及夫告曰殺汝父者申蘭殺汝夫者申春小娥尋訪嵗餘得之乃詭服為男子托傭蘭家一日蘭釃酒會羣盜蘭與春皆醉小娥斬蘭首大呼捕盜鄉人踰墻擒春并其黨數十皆抵死小娥還豫章人爭聘之不許削髮為尼彭烈女分寧太平鄉人宋嘉祐中隨父入山伐薪虎嚙其父女抽刀挺身斫虎父得不死負歸州以事聞詔賜巢帛仍命有司嵗時存問吳中孚妻進賢人少寡宋景定初兵亂携孤女以自沉于縣之染步曰義不辱吾夫也段氏隆興人霍榮妻榮無子嘗乞人為飬子榮卒段年二十六孝養舅姑舅姑沒諸父貪其産謂曰汝無子宜改適霍氏業汝無預段曰家資不足計但再醮非義即入室引針刺面墨漬之誓死不二元大德初旌其門丁氏新建人鄭伯文妻元大德間伯文病將殁丁與訣曰君脫有不諱妾當從但君父母已老妾且忍死以奉其餘年必不負君伯文卒丁年二十七居喪哀毁服除其父母議奪嫁之丁慟哭言所以盡不死之故父遂止舅姑嘗病丁夙夜護侍及卒喪葬禮事上表其門陳淑貞富州陳壁之女壁故儒者移家隆興淑貞七嵗能誦詩鼓琴元末陳友諒冦隆興淑貞取琴絃之曲終泫然流涕曰吾絶絃於斯乎父母怪問之淑貞曰城陷必遭辱不如早死明日賊至遂溺東湖水死之時同郡李宗順妻夏氏亦儒家女賊至與其女共投井死劉氏二女隆興人長曰貞年十九次曰孫年十七皆未許嫁陳友諒冦隆興其母泣謂曰城或破置汝何所二女曰寧死不辱父母也城陷二女登樓自縊羅文姬南昌人元幹女年十六適鄭氏鄭疾篤執姬手曰汝盛年當别適母自負也姬誓不嫁鄭亡水漿不入口者七日葬夫訖投繯而死高烈女寧縣人年十七有美色元季盜起匿巖穴中盜詰其弟得之高抗言曰我在室女未受父母命豈可擅事人盜甘言誘之再三高曰吾寧死不屈也盜強之高大詈不服乃拔刀欲殺高欣然受刃顔色不少變遂遇害舒氏四節靖安舒𢎞道妻王氏年二十八而寡子三長仲甫生子未一周而卒妻陳氏亦操志不二女二長曰靖正適項坊張氏次曰靖貞適奉新鄭氏俱早寡無出矢志自持皆無愧于其母葉貞女名兆姺南昌人聘新建李光庭未娶而光庭卒兆姺時年十三先月夢光庭騎白馬衣素衣入其室相携補綴覺以告嬸母越數日訃聞傷之誓不改節父母憐其幼強為轉聘兆姺聞之即于密室整裝自縊而死劉氏雙節南昌劉天瑞妻熊氏年二十三而寡生子仲高娶喻氏年二十亦寡生子觀方四嵗熊自念婺居艱難諷喻曰此煢煢四嵗兒安可冀望喻泣曰姑能不負所天吾獨不能乎前途明暗一聽諸命于是姑婦紡織自給觀竟有成立孫曽不下二十餘人熊沒年九十一喻亦八十一人以為天道之報有雙節集行于世孫氏豐城庶吉士周懋昭妻年二十適懋昭越三載而昭卒于官遺腹生子仁誓不再嫁同邑庶吉士黃瓛妻胡氏年二十三適瓛甫二載而瓛亦卒于官胡扶櫬歸葬以節自守又邑庠生周珍妻吳氏珍卒殮畢吳自縊死合葬焉熊氏名謇奴豐城人余繼妻年二十一歸繼繼疾度不能起語以偹後事熊出篋中衣對繼紉定每襲為二泣且謂曰即有不幸吾當服之以俱死不能獨生也繼卒熊視襲斂畢聞家人議舉棺焚化即衣所紉衣期赴火死家人察其意防之少懈即自縊與繼同日合葬于施家園余睿昭妻遊氏睿昭卒無嗣撫侄銘為子孀居三十年非廟祀不接宗族紡織以供舅姑躬勤艱苦終身不渝𢎞治十一年旌表蔣愛貞順義鄉人納徐貢陳聘未適而陳卒愛貞誓不改適有二富民爭聘者訟于官得不果兄名貴亦死嫂陳氏年十九愛貞與之同志相守克全雙節亡年俱近七十林氏豐城李與鎬妻年十九歸鎬甫載鎬卒生子平尚在襁褓族豪利其有百計害之林恐平遇害密托于外氏育之身攖其鋒豪見林志難奪乃夤夜執凶器毆之中額流血被面時繼姑亦孀居林奔就之得免自是姑媳相依守節不渝教子有成孫逢遂繼領鄉薦人皆賢之胡氏奉新李瓉妻瓉早卒遺二孤長浹甫三嵗次仲尚在懷時有欲奪其志者胡守益厲三十九年始終無玷華林亂嘗迫于冦投懸崖不死人咸謂天佑節云正德十年旌表其門洪氏南昌人張士琦繼室年十七歸張越二載而寡居志不二撫育夫前妻子源得有成立未嘗以貧窶動心貞白之操著聞于鄉朝廷特加旌表焉張氏字文娥新建人指揮使方卬妻梧州知府張元春女也正德庚午卬督兵討桃源劇盜死之張聞訃號曰吾夫以死報國吾何難以死報夫一慟遂絶救之得蘇有娠默禱曰姑俟之生男也吾與俱生生女也吾與俱死矣踰月而生子恩值家徒壁立惟紡繢織絍殫力盡瘁事姑以終其天年嘉靖間蒙旌表後以子貴封太淑人贈太夫人陳氏女寧州父孟實為處子時母黃氏疾危醫不能療女焚香籲天割股置糜中食之母病尋愈鄉人重之稱之曰孝女陳氏豐城人諶烓妻烓為江州巡司掾流冦掠其境烓被執陳氏同壽華俱色少賊欲汚之遂殺烓陳指賊厲罵賊怒又殺之夀痛哭抱二尸以血塗面籲天而呼復抗聲以罵賊賊又殺之有司竒其節以聞旌表其門張氏奉新人余陽妻年二十一時華林賊衝入縣境張以少艾被虜前去至後坪旅店衆欲辱之張憤罵曰有死而已決不受賊奴辱罵不絶口賊遂斬之江氏奉新易功亷妻被華林賊執堅不從賊且叱罵之賊怒斷其首楊氏新建謝聰妻年二十聰卒誓不再適立姪廷和為嗣娶媳方氏生孫天胤和亦蚤卒胤長娶鄧氏未幾胤又早卒遺腹生子産正嘉靖丙辰楊年七十而終事聞旌表易妹貞聘儀賓子楊鐶未婚鐶卒妹貞聞訃墜樓幾死誓不再天奔弔楊氏舟至河索夫神主成親迎禮用小竹簥抱主入柩前行合巹禮朝夕哭奠及期年夜焚香畢自縊於夫柩側事聞旌表秦氏鄧氏新建人共事夫胡璡秦其妻而鄧其妾也鄧生子綗甫二嵗而璡卒二氏俱少誓不再適共撫一孤嘉靖二十四年嵗大飢撫台令民納榖賑濟者表揚義名綗納榖二千石辭義名而願表揚其二母撫台核其實旌以雙節孝義二扁仍上其事詔旌表之孫氏新建金曰榮妻年二十二榮故長子應輝三嵗次應隆甫八月孫勵志守節貧苦萬狀為人織絍以教其孫孫名銑第進士官知府嘉靖三十六年受旌表徐氏豐城吳都憲祺繼室又張氏李氏俱副室也俱芳齡徐氏事姑以孝聞嘗從祺北上抵河西忽祺墮舟徐躍出俱下頃抱以出祺逝櫬泝長沙風烈舟顛危甚徐哀哭籲天舟乃定李無育張嗣孩提或有以他意諷之者徐曰婦人夫死稱未亡人無再醮禮守適各惟所志張與李泣曰烈女無二肯憚一死辱大人于地下茹苦服縞共撫其孤事聞詔旌表之方氏新建王朝卿妻朝卿舉成化丙辰進士甫三載而卒方年十九翁以姪諌嗣之時諌尚襁褓撫之甚艱閨門嚴謹人罕及見臨危惟曰雙槨雙槨他無所及後諌以選貢歷延平通判孫淑湜並登進士萬氏新建鄧梧妻年二十五梧卒萬氏哀絶期與同死父母以姑老子幼諭之遂剪髮毁容誓不他適専勤織絍甘茹淡薄葬故舅事繼姑俱盡禮撫孤訓孫俱成立邑侯給貞節扁額以表其門何氏進賢胡煌妻正德六年冦至姑老疾艱於行何負之踰墻避焉姑尋以驚卒暨冬冦復至家人逃匿何泣守姑柩不去遂被執以行至苦腸陂曰此死所也胡不速殺我遂罵不絶口投入陂內死次日夫往收其尸儼然若生人咸哀之樊鳯英南昌樊昱女聘新建石頭萬尚𢎞未婚𢎞病女為廢寢食𢎞病亟昱往視之三晝夜女不寢食亦三晝夜訃至女痛哭亟白母曰吾欲歸治萬郎喪母曰逮父歸乃遣若女痛不能禁即登樓自縊時訃者席尚未暖也後合葬焉有司上其事詔旌表之溫氏新建郭匡晉妻事舅姑極孝謹姑廢明昕夕侍側飲食親調移必扶携夜則候其就枕然後即安及寢疾割股以進即愈晉卒溫年二十一子幼或有微諷之者輒摘髮碎鏡矢死靡他當道旌之屈氏南昌徐鍾妻年二十鍾客死聞訃閉門自縊姑覺而破門救之撫孤守節自誓其母憐之欲奪其志乃剪髮以示復欲奪之即欲自殺母乃止孤嘗患痘幾危屈掌心燒香籲天願身代子以昌夫後子果生事姑孝姑死紡績供葬學道書貞節扁以旌之徐氏南昌生員萬文式妻式亡徐年二十七撫一孤亡立一嗣又亡再立一嗣不肖蕩覆家産殆盡全無怨悔饘粥布服終身不御肉帛凡婚嫁一不與焉撫台表其閭曰貞節仙釋許遜南昌人生而頴悟從吳猛得神方祕法以修煉為事晉太康初為旌陽令大施利濟尋棄官東歸遇諶姆傳以道術遂斬蛇誅蛟悉除民害慮豫章為浮州蛟螭所穴乃於牙城南井鑄鐵為柱下施八索鉤鎖地脈由是水妖屏迹城邑無虞又周行江湖諸郡殄滅毒害乃歸舊隱精修至道寧康二年一百三十六嵗舉家同時升天雞犬亦隨逐飛去宋封神功妙濟真君吳猛濮陽人仕吳為西安令因家分寧性至孝遇至人丁義授以神方又得祕法雲符道術大行嘗見暴風書符擲之風即止或問其故曰南湖有舟道士求救驗之果實西安令于慶死已三日猛曰數未盡乃卧於尸旁數日同起嘗渡江值風濤猛以白羽扇畫水而渡觀者駭異許遜上升猛亦于是嵗乘鹿車與弟子四人升天宋封神烈真人甘戰晉豐城人有孝行喜神仙術往從許遜遜異其材器凡奧文祕訣悉命掌之自是周遊江湖誅蛟斬蛇無不從焉及遜上升戰歸豐城布德行惠鄉人感化陳大建初乃駕麟車乘雲而去宋封精行真人盱烈南昌人少孤事母孝母許氏遜之長姊遜嘗築室宅西數十步間俾烈母子居之故日聞至道母嘗採花果以奉遜及遜飛升日母子俱從遜騰雲而去宋封烈和靖真人吳彩鸞猛女唐太和末有書生文簫寓鍾陵紫極宫一日於西山遇之竟許成婚而歸鍾陵簫貧不自給彩鸞寫孫愐唐韻運筆如飛日得一部鬻之獲金五緡盡則復寫如是僅十載稍為人知遂潛往新興越王山二人各跨一虎陟峰巒而去張氲晉州人號洪崖子隱姑射洞中仙書祕典無所不通唐開元中玄宗召問曰先生善長嘯可得聞乎即應聲而發拜官不受還山絶粒服氣洪州大疫有狂道士市藥病者立愈玄宗聞之意必氲果然三召不至天寶末忽大霧尸解乾元中詔立應聖宫奉肅宗以氲配焉錢朗南昌人讀書西山以五經登科仕唐纍官至光祿卿文宗朝歸隱廬山得補腦還元之術錢鏐延至于杭禮之如師玄孫數人皆以明經為縣宰已皓首矣而朗猶如童子一日語家人曰我適為上清所召今去矣俄氣絶數日顔色如生舉棺尸已解去時年一百七十餘嵗塢通微不知何許人為道士神清氣爽遊止無定常醉吟于道多遊豫章之間或數見其容益壯于前人莫之測也一日忽登市樓醉飲飛升而去周顛仙不知其名自言南康建昌人元末往來南昌乞食暮宿閭閻下一日忽有異詞凡新官至必謁訴曰告太平及國初駕至南昌顛仙拜于道左言動殊異隨至金陵且云入火不熱試覆以巨甕積薪煅之火滅揭視寒氣凜然嘗以手畫地成圈曰破一桶成一桶時陳友諒據江南問可征否曰可果平之後辭入廬山莫知所之有御製傳嚴陽尊者名善信唐天祐間杖錫來逰居明心寺踞坐蟠石嘗有二虎一蛇馴繞左右及沒建塔于寺中宋淳祐間啓其塔髮垂至踵指甲過臂欣笑隱名大欣南昌人幼開爽頓悟禪機研窮教典旁及儒家道流之説元文宗時召赴闕特賜三品文階嘗編禪林清規所著有四會語録蒲室集來復豐城人號見心幼出家明內典通儒術善為詩文元末時受知于歐陽玄諸公本朝初以高僧召至京師時論與僧宗泐齊名所著有蒲菴集明一統志卷四十九
