body:
  text: 明一統志卷二十八明李賢等撰彰德府東至直𨽻大名府內黃縣界七十里南至大名府濬縣界七十里西至山西潞州壺關縣界一百七十里北至直𨽻廣平府邯鄲縣界一百二十里自府治至京師一千二百里至南京一千七百里糧二十五萬二千石零建置沿革禹貢冀州之域天文室壁分野商河亶甲居相即此春秋為晉之東陽地戰國為魏之鄴地秦為上黨邯鄲二郡地漢置魏郡治鄴東漢末冀州徙治鄴魏曹操受封於此後稱為鄴都晉仍為魏郡屬冀州後趙石虎前燕慕容雋並都之後魏於此置相州東魏靜帝徙都之改曰司州北齊武帝又都之改為清都尹後周復改為相州及魏郡治安陽隋初罷郡為相州大業初復改魏郡唐為相州天寶初改鄴郡乾元初復為相州五代梁置昭德軍節度晉改彰德軍宋復為相州屬河北道金升彰德府元改彰德路本朝改彰德府領州一縣六安陽縣附郭本紂都之地左傳茀陽即此地戰國為魏寧新中邑秦更名安陽漢省入蕩隂縣晋始置安陽縣後魏併入蕩隂後復置後周自古鄴城移相州治此隋析置相縣尋併入焉唐宋元皆仍舊本朝因之編戶八十四里湯隂縣在府城南四十五里古羑里地戰國為魏蕩隂地漢置蕩隂縣屬河內郡後魏省隋於縣東十七里置湯隂縣屬汲郡尋省入安陽後復分安陽置湯源縣大業初省唐初復置湯源縣屬衛州貞觀初改湯隂縣屬相州宋宣和初改屬濬州後仍舊屬金屬彰德府元不改本朝因之編戶四十一里臨漳縣在府城東北一百一十里本鄴地魏文侯始封於此漢屬魏郡東漢末魏公曹操居此晋始改為臨漳縣東魏復增置鄴縣後周移臨漳治於城東二十里屬魏郡隋改為靈芝縣俄復舊唐屬相州宋省鄴縣入焉金元仍舊本朝因之編户三十六里林縣在府城西一百二十里本漢隆慮縣屬河內郡後漢改林慮縣三國魏屬朝歌郡晋屬汲郡後魏省入鄴縣尋復置兼置林慮郡北齊郡廢後周復置郡隋罷郡置巖州縣仍舊大業初州罷唐初復置巖州尋罷州以縣隸相州宋因之金升為林州元因之本朝洪武三年降為縣編戶三十五里磁州在府城北七十里本秦邯鄲郡地漢為魏郡武安縣地後魏析置臨水縣後周割臨水置滏陽縣及成安郡隋罷郡於滏陽置磁州後罷唐改為惠州後復為磁州宋以昭義縣省入滏陽元初升為滏源軍節度屬廣平路後復為磁州本朝並省滏陽縣入焉及改今屬編戶四十一里領縣二武安縣在州城北一百二十里漢置屬魏郡曹魏屬廣平郡隋屬武安郡唐初屬置洺州後改屬磁州宋金仍舊元初省入邯鄲縣尋復本朝因之編戶三十四里涉縣在州城西二百里古沙侯國地漢置漠縣後因漳水人民徒涉遂名涉縣屬魏郡後魏并入臨水縣後周移臨水縣治涉城隋復於涉城置涉縣隸韓州唐隸潞州宋仍舊金升為崇州元罷州復置縣屬真定路本朝改隸磁州編戶一十八里郡名魏郡漢晋名鄴郡唐名形勝旁極齊秦跨躡燕趙晋左思魏都賦疆域則旁極齊秦結湊冀道開胸殷衛跨躡燕趙山林幽映川澤回繚恆碣砧􅑇於青霄河汾浩涆而晧溔西澤潞東大名南衛輝北洺磁圖經地險人豪圖經其地平廣為天下要相臺志序其地平廣闊大挾上黨撫襄國跖澶掖衛常為天下要風俗得京洛之風隋志魏郡鄴都所在浮巧成俗雕刻之工特云精巧士女被服咸以奢麗相髙其性所尚習得京洛之風俗陶淳古人尚英雄圖經自殷王河亶甲所都而俗已陶為淳古之風項籍與章邯盟於洹水人盡尚英雄之習勤於營生儉於費用圖經有恆代遺風宋顔氏家訓鄴下風俗專以婦持門戶爭訟曲直造請逢迎代子求官為夫訴屈此乃恆代之遺風乎雅重儒術郡志土狹人稀習尚淳厚雅重儒術而耕鑿甚勤俗尚節儉林縣圖經其俗鑿山採礦伐木為炭緝麻為布粗衣糲食而尚節儉山川韓陵山在府城東北一十七里曹魏劉楨詩朝發白馬暮宿韓陵即此東魏髙歡破爾朱榮於此山下立碑溫子升為文陳徐陵謂北朝人物惟韓陵一片石耳䝉賚山在府城西南二十五里後魏孝文帝遷洛陽於山下頒賚從臣因名寶山在府城西南四十里多産白石陶人取以為器龍山在府城西四十里魏都賦虎澗龍山即此銅山在府城西北四十里山舊産銅魯山在府城西北七十里相傳春秋時魯般居其下髙望山在府城西北八十里其山最髙可以遠望賀蘭山在磁州城西北四十里相傳昔宋賀蘭真人嘗居此神麕山在磁州城西四十里以形似名飛鳯山在湯隂縣西三里以形似名五巖山在湯隂縣西四十里山有五谷故名淺山在湯隂縣西南侯趙川與林縣太行山相接鶴山在湯隂縣西四十五里相傳昔有雙鶴棲其上西牟山在湯隂縣西五十里湯河發源於此東崓山在臨漳縣西南一十五里東魏髙澄嘗於此鑿池以為遊玩之所太行山在林縣西二十里羣山一帶形勢崔嵬其間峰谷岩洞景物萬狀其在本府界者綿亘二百里總曰太行為中州巨鎮黃華山在林縣西二十里一名林慮山山有三峰名仙人樓玉女臺魯般門下有黃華谷北巖出瀑布又有抱犢固馬鞍山棲霞谷金王庭筠嘗隱居於此隆慮山在林縣西北二十五里南負太行北接恆嶽景最竒絶天平山在林縣西南三十里山勢平坦有滴乳泉沿石而下如滴乳然又有鑑泉清徹如鑑玉泉山在林縣西南三十里有泉清潔如玉將軍山在林縣西南三十里昔齊侯伐晋趙勝率東陽之師追之駐兵於此倚陽山在林縣西北三十里山勢突聳而絶頂平坦可以避兵俗呼為蟻尖山􅫊峪山在林縣西南三十五里山尤竒絶其顛或有金燈隱現粟山在武安縣東南一十二里相傳秦白起拒趙廉頗於此趙將絶糧起命將士以布囊盛粟積至山巔趙軍乃退土人至今呼為粟山玉峯山在武安縣西南二十里上有白石如玉鼓山在武安縣南二十里一名滏山有二石如鼓南北相當冀州圖經鄴城西有石鼓鳴則兵起髙齊之末此鼓嘗鳴而齊遂滅隋末鼓又鳴聲聞數百里而隋亡通鑑髙澄虛葬歡於漳水之西而潜鑿鼓山石窟佛頂之旁為穴納其柩而塞之殺羣匠及齊亡一匠之子知之發石取金而逃即此紫金山在武安縣東北三十里山有紫峯烏石磁山在武安縣西南三十里土産磁石州名取此崇山在涉縣東南三十里金升涉縣為崇州以此山名山頭青翠形如螺髻又名青頭山流沙嶺在林縣西南三十里其嶺多沙遇暴風飛走如流愁思岡在安陽縣境內陳思王植不為魏文帝所容於此悲吟因名契丹主執晋少帝及母后輔臣至此岡後人訛呼為愁死岡博望岡在湯隂縣西河在安陽縣境內卜子夏田子方假干木所遊之地以魏趙多儒在齊魯鄒之西故呼為西河非龍門西河也安陽河一名洹水源自故洹水縣東至林安陽二縣屢伏屢見東經永和鎮入衛河漳河其源有二一出山西潞州長子縣名濁漳自林縣西北入境一出平定州樂平縣名清漳自涉縣西入境俱東至林縣合流經臨漳館陶縣界入衛河洺河源出遼州太行山至武安縣柏林里伏流至洺逺里復出東經巨鹿縣界入滹沱河響水河源出沙河縣趙村莊經武安縣界入洺河儒教河源出太行山麓流至武安縣沙窩里伏流至儒教里復出入洺河防水在安陽縣西南二十里水出西山馬頭澗東經防城湯水源出湯隂縣治西𤣥泉舊名蕩水流經縣東五十里過內黃縣界入衛河羑水源出湯隂縣西北鶴山流至羑城北城淵東會防水入湯水滏水源出磁州西北神􅍪山湧沸如湯出滏東流至臨漳縣界入漳河浙水一名三陽河源自澤州陵川縣經林縣南與洹水合滄溪在林縣西北四十里經磻陽城西北入漳水墨井在府城西南郭村井中有石如墨晋左思賦墨井鹽池𤣥滋素液是也龍井在湯隂縣西真人社相傳晋孫登嘗居此社時亢陽農夫禱於龍洞得雨將祭謝之登曰此病龍雨安能蘇禾稼乎如弗信請嗅之水果腥穢龍時背生大疽聞登言變為一翁求治曰疾痊當有報不數日果大雨見大石中裂開一井其水湛然蓋龍穿此井以報也陷馬泉在府城西南置度村鄴都故事爾朱兆與髙歡戰兆敗走經此馬為所陷拔劔泉在府城西水治村相傳宋韓琦以劔插地後拔劔泉隨湧出葦泉在林縣西北林慮山泉傍多葦雙泉在林慮山一名靈巖水源自魯般門山谷東流入葦泉七泉在林縣東南七泉社地出泉有七竅白龜泉在武安縣東北有廟歲旱禱雨有白龜現雨即降洗參池在林縣治西相傳為王母洗藥之池照碧池在林縣治西南池水清徹可以照物長鳴溝在府城西二十里魏武帝引漳水入城經銅雀臺下相激水聲長鳴萬金渠源出寶山經府城西分注東南溉田其利可抵萬金髙平渠在安陽縣東南二十里唐刺史李景所鑿引安陽水東流溉田宋韓琦判相冉疏之置水磑名千金渠其水繞城而流西門渠在臨漳縣西門豹為鄴令時所鑿引漳水以溉田菊花渠在臨漳縣南自鄴引天平渠水溉田屈曲經三十里又北三十里有利物渠亦引天平渠水以溉田唐咸亨中開土産艾湯隂縣扁鵲墓旁出磁石孩兒魚俱磁州出錫武安縣出鐡自然銅俱涉縣出知母胡粉府境出藩封趙王府在府治東洪熙元年以彰德府治改建臨漳王府在府治南景泰三年建湯隂王府襄邑王府洛川王府南樂王府平鄉王府廣安王府江寧王府獲嘉王府成臯王府光山王府俱同城公署彰德衛在府城內東南隅洪武七年建守禦林縣中千戶所在縣治東南洪武二十八年建隸彰德衛守禦磁州千戶所在州治東北洪武中建隸山西潞州衛學校彰德府學在府治西宋至和間建本朝洪武三年重建磁州學在州治東洪武五年建正統十四年重建安陽縣學在縣治西北元至元間建湯隂縣學在縣治東南宋大觀元年建俱本朝洪武三年重建臨漳縣學在縣治西舊在縣治東洪武十八年淪於河二十七年徙建於此林縣學在縣治東元至元間建本朝洪武七年重建武安縣學在縣治東南金天會中建本朝洪武五年重建涉縣學在縣治西南洪武三年建宫室九華宫在臨漳縣西銅雀臺東北後趙石虎建宫以三三為位謂之九華梁沈約詩照耀三雀臺徘徊九華宫赤橋宫在臨漳縣東南七里石虎自襄國至鄴每舍輒立一行宫有安陽湯隂二宫又有臨漳永樂梨園赤橋四宫皆在縣界疑當時遊獵宴息之所紫陌宫在臨漳縣西北五里石虎建齊文宣因修為濟口巡幸往來百官祖餞皆至於此有橋亦名紫陌披雲樓在臨漳縣治西南後趙石虎建南矚城池繡欄凌雲雕梁接露故曰披雲逍遙樓在臨漳縣治西南石虎建北望漳水極目嬉遊真逍遙之竒觀玳瑁樓在臨漳縣治西南鄴中記鄴城之上有玳瑁樓純用金銀裝飾懸五色珠簾白玉鉤帶內有䃋石床以玳瑁為龜甲文鋪以十色錦繡褥故名清風樓在府城內宋相韓琦建王巖叟有詩見山樓在磁州元儒醫張煥文建王沂為扁名并作記以其樓望太行諸山羣峯叢出紫翠萬狀㘴得勝槩故也紫金樓在武安縣北城上晝錦堂在府治北宋韓琦以宰相判鄉郡建於居第歐陽修記蔡襄書碑刻尚存琦第别有榮歸虛心二堂其後曽孫肖胄守相又建榮事堂歐陽修榮歸堂詩白首三朝社稷臣壺漿夾道擁如雲金貂爭看真丞相竹馬猶迎舊使君豈止軒裳誇故里已將鍾鼎勒元勳不須授簡樽前客好學平津自有文忘機堂在府治北韓琦建於居第後圃琦詩伊豫本是忘機者因立佳名近狎鷗醉白堂在府治北韓琦建於居第池上名曰醉白取唐白樂天池上之詩以為醉白堂之歌蘇軾為記有曰以樂天之平生而求之於公較其所得之厚薄淺深孰有孰無則後世之論有不可欺者矣文致太平武定亂略謀安宗廟而不自以為功急賢才輕爵祿而士不知其恩殺伐果敢而六軍安之四夷八荒想聞其風采而天下以其身為安危此公之所有而樂天之所無也乞身於強健之時退居十有五年日與其朋友賦詩飲酒盡山林園池之樂府有餘帛廩有餘粟而家有聲伎之奉此樂天之所有而公之所無也忠言嘉謀效於當時而文采表於後世死生窮達不易其操而道德髙於古人此公與樂天之所同也公既不以其所有自多亦不以其所無自少將推其同者而自託焉方其寓形於一醉也齊得喪忘禍福混貴賤等賢愚同乎萬物而與造物者遊非獨自比於樂天而已雙桂堂在湯隂縣許熙載故居元時熙載仲子有壬季子有孚相繼登進士其長子有恆樹雙桂堂以顯其親之教劉嶽申有記㑹盟亭在洹水之上楚項羽與章邯會盟於此後人置亭以表其處狎鷗亭觀魚亭俱在忘機堂前琦狎鷗亭詩亭壓東池復壞基園林須喜主人歸憩棠猶茂應存愛植桞堪驚近過圍魚泳藻間諳物性月沉波底發禪機羣鷗只在輕舟畔知我無心自不飛觀魚亭詩雨後方池碧漲秋觀魚亭檻俯臨流時看隱荇駢頭戲忽見開萍作隊遊喜擲舟前翻亂錦靜潜波下起圓漚吾心大欲同斯樂肯插筠竿餌釣鈎御書亭舊在韓琦居第之後圃凡奉詔敕等書皆貯於此廣春亭在府治東南宋杜純建每歲春前一日迎土牛於東郊至日鞭春以廣生物之意今為彰德衛鎮撫㕔樂山亭在林慮縣西舊龍泉觀元時道人髙道崇建王沂有記蓋西山臨林慮即亭以望歷歷可指故可樂也卓茆亭在磁州治西元參政安祐建祐詩從此卓茆亭上客抱琴何處覓知音五松亭在林縣治西南五松並生挺然可愛元縣丞李弼建銅雀臺在臨漳縣治西魏曹操築并金虎氷井三臺相去各六十步其上復道樓閣相通中央懸絶鑄大銅雀髙一丈五尺置之樓頂臨終遺令施繐帳於上朝晡使宫人歌吹帳中望吾西陵西陵操葬處也後樓臺俱毁土人掘地得瓦色頗青內平瑩印工人姓名皆八分隸書硯譜云人得此瓦為硯貯水數日不滲劉宋謝眺詩繐帷飄井幹樽酒若平生鬱鬱西陵樹詎聞歌吹聲唐劉方平詩金鳯鄰銅雀漳河望鄴城君王無處所臺榭若平生劉文房詩嬌愛更何日髙臺空數層含啼映雙袖不忍看西陵沈雲卿詩銅雀昻然飛不去當時美人髮垂素我生不如陵上樹年年樹根穿入土金虎臺在臨漳縣治西南鄴鎮曹操於臺下鑿渠引漳水入白溝遺址尚存氷井臺在臨漳縣治西南曹操建石虎於上藏氷三伏之月以賜大臣抱螺臺在府城北園中有廢臺如抱螺基圍盤曲而上故名宋韓琦判相州日闢而新之休逸臺在府治北韓琦築於居第後圃中琦詩草色且無歸後怨禽飛同到倦時還飛仙臺在府治東宋杜純築臺髙十丈官僚公暇登以觀望宛若飛仙思古臺在郡治宋太守馮元建關梁安陽橋舊名鯨背在府城北四里跨洹水建隆橋在府城北四十里跨漳水滏水石橋在磁州跨滏水金大定初建趙秉文記永通橋在湯隂縣南跨宜溝河通聖橋忘歸橋俱在林縣西南跨天平山澗寺觀天寧寺在府治西北周廣順初建大明寺在磁州西北元元貞間建本朝永樂中重修寂靜寺在林縣北元至正間建妙覺寺在武安縣治東宋元祐中建崇明寺在涉縣西北隅宋嘉祐間建崇壽寺在湯隂縣治北宋宣和間建巳上四寺俱本朝洪武中重修葆光觀在湯隂縣西三十里唐天寶中建金大定間重修蓋晋孫登學道之所有嘯臺及煉丹井白雲洞存焉太虛觀在府治西北元至順初建本朝洪武間重修靈泉觀在涉縣東南玉泉社宋宣和中建元至正中重修玉興觀在臨漳縣北宣德中建祠廟黃帝廟在舊滏陽縣世傳黃帝軒轅氏葬於陵臺建廟於此宋太中祥符初賜名先天觀堯廟在府城乞伏村祀帝堯有碑刻金趙秉文作記湯廟在林縣南關社祀商王成湯河亶甲廟在臨漳縣境內殷王河亶甲建都於相故廟祀之文王廟在湯隂縣北一十里商紂囚文王於羑里廟後方城即羑里也孝文帝廟在安陽縣大孟村後魏孝文帝南征駐蹕於此後人為立廟碑刻尚存扁鵲廟在湯隂縣東南一十五里伏道村扁鵲古名醫為同輩所嫉刺殺於此祠堂碑刻尚存西門豹廟在府城北大夫村北齊天保間建碑刻尚存白起廟在武安縣起秦將武安君也相如廟在安陽縣西五十里黃口村藺相如之家廟也子孫散處其旁歲時祀之張騫廟在湯隂縣東三十里騫漢博望侯欒巴廟在府城東永和村巴漢尚書有仙術郭巨廟在林縣南關社元大德間建巨漢孝子嵇紹廟在湯隂縣西南紹晋永興間從惠帝北征至此遇成都王頴兵敗紹以身捍帝而遇害宋韓琦碑文尚存尉遲迥廟在臨漳縣境迥為相州總管與楊堅將韋孝寬戰死唐顔真卿作碑蔡有鄰書石刻尚存韓琦廟在府治東南晝錦坊琦宋相封魏國忠獻王嶽飛廟在湯隂縣治西南飛宋將本朝建賜額精忠敕有司春秋致祭陵墓扁鵲墓在湯隂縣路旁扁鵲見前相傳墳上土可療疾禱而求之或得一小丸如丹劑張耳墓在府城東白璧里耳漢封趙王周昌墓在滏陽縣境內漢髙帝封子如意為趙王昌為王相卒葬於此墓前有祠李固墓在磁州東諸翟村固東漢人有名德為梁冀所害碑刻尚存杜喬墓在磁州北二十五里姚村宋林慮令王獵嘗往奠謁建祠其旁袁紹墓在臨漳縣西北一十六里紹漢州牧曹操疑冢在講武城外凡七十二處森然彌望髙者如小山布列直至磁州而止宋王安石詩青山如浪入漳州銅雀臺西八九邱螻蟻往還空隴畝騏驎埋沒幾春秋京鏜詩疑冢多留七十餘謀身自謂永無虞不知三馬同槽夢曽為兒孫逺慮無嵇紹墓在湯隂縣境內韓琦墓在安陽縣舊輔巖縣城琦卒之前一夕大星隕治所櫪馬皆驚神宗命發兩河卒為治冢篆其碑曰兩朝顧命定䇿元勳又常令其子若孫一人官於相以護邱墓云仙母冢在磁州黃花谷內上有祠堂後漢仙人王津葬母於此古蹟大甲舊都在古鄴城西南太甲殷王也河亶甲城在府城西北洹水南岸邙城在湯隂縣東南三十里殷紂子武庚所封之地鄴城在臨漳縣西二十里本戰國魏之鄴邑三國魏後趙前燕東魏皆都於此講武城有二一在漳河之上一在滏陽縣皆魏曹操所築永定廢縣在府城東四十里本晋長樂縣隋改堯城唐改今名宋省入安陽縣昭義廢縣在磁州本隋臨水縣屬魏郡唐改昭義縣屬磁州宋省入滏陽羑里在湯隂縣北九里一名牖城又名防城北臨牖水即紂囚文王處浣衣里在湯隂縣境內晋侍中嵇紹死所紹遇害血濺御衣及事寧左右欲浣之惠帝曰此嵇侍中血勿去也因名其地為浣衣里魏徵宅在安陽縣唐魏徵所居後為睿宗潜邸韓琦宅在府城東南隅西園在鄴縣舊治魏曹操所作古今題詠甚多唐胡曽詩月滿西園夜未央金風不動鄴天凉髙情公子多秋興更領詩人入醉鄉康樂園宋韓琦判相州時所作有名園初闢至和中思與康時衆樂同之句名宦周西門豹戰國魏鄴令鄴俗素信巫覡歲為河伯娶婦選良民處女投河中豹問知其害曰今歲娶婦幸來告吾亦送之至見其女豹曰醜煩大巫入報即投之河中又繼投二人羣巫驚懼乞命從此遂止因開其河為十二渠以溉田史起戰國魏鄴令引漳水灌田民歌曰鄴有賢令兮為史公决漳水兮灌鄴旁終古潟鹵兮生稻粱漢京房魏郡太守得以考功法治郡歲竟得乘傳奏事在郡嘗上書極言災異銚期魏郡太守平五校賊郡界清平人尤服其威信馮魴魏郡太守政成人和以髙第入為太僕岑熙魏郡太守招聘隱逸與參政事視事二年輿人歌曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶菑張酺魏郡太守郡人鄭據時為司隸校尉奏免執金吾竇景景後復任遣掾夏猛私禱於酺令治據子酺即收猛繫獄檄執金吾矯稱以報私讐黃香魏郡太守郡舊有內外園田常與人分種收穀歲數千斛香曰食祿之人不與民爭利乃悉以賦人課令耕種時被水年饑乃分奉祿及所得賞賜班贍貧者荒民獲全子瓊亦繼為魏郡太守鄴民喜曰黃氏有子矣三國王修魏魏郡太守為治抑強扶弱明信賞罰百姓稱之陳矯魏魏郡太守時繫囚千數至有歷年者矯謂周有三典漢約三章今惜重輕之理而忽久繫之辜謬矣悉自覽罪狀一時論决晉荀朂安陽令有遺愛民為立生祠唐彬鄴縣令道德齊禮期年化成遷弋陽太守盧志鄴縣令成都王頴鎮鄴愛其才量委以心膂後為魏郡太守喬智明隆慮縣令人愛之號為神君竇允臨水令克己厲俗改修政事士庶悅服咸歌詠之南北朝庾嶽魏相州刺史執法平當百姓稱之鄴舊有園池時果初熟丞吏送之不受曰未進御吾何得先食其謹如此王雍魏相州刺史魏主戒雍曰作牧亦易亦難其身正不令而行所以易其身不正雖令不從所以難雍一遵王命在任纍有政績張蒲魏相州刺史扶弱抑強進善黜惡風化大行卒於官吏民痛惜之李沂魏相州刺史政尚清簡百姓愛之嘗請州郡立學詔從之政為諸州最陸馥魏相州刺史為政清平抑強扶弱盜賊屏息徴為散騎常侍百姓乞留者數千人孫昕之亦為相州刺史李安世魏相州刺史敦農桑斷淫祀表薦善士捕斬劇賊州內肅然李平魏長史行相州事勸農桑修太學簡博士選生徒教之乃畫履虎尾踐薄氷注頌其下以示戒子奬亦為相州刺史尉遲迥周相州總管持正守法恩澤下流隋攻相城迥堅守之伏劔奮忠以保相民隋梁彥光相州刺史發擲姦伏若神豪滑潜竄闔人境犬治於是招致儒師立鄉校以德化吏民感悅樊叔略相州刺史政為第一璽書褒美并賜粟帛百姓為之語曰智無窮清鄉公上下正樊安定叔略嘗封清鄉安定公故云唐許圉師相州刺史專以寬治州人刻石頌美部有受賕者圉師不忍按但賜清白針其人自愧後修飭更為廉士宋璟相州刺史政尚清毅吏民無敢犯者張說相州刺史河北道觀察使勤恤民隱有惠政李景相州刺史相地勢乃於州西開萬金髙平二渠引洹水東流以灌田民獲其利李仁綽臨漳令開菊花利物二渠引天平渠水以溉田民德之崔𢎞正衛州刺史田𢎞正表其治行徙相州刺史楊德幹相州刺史歷四郡所至有威嚴時人語曰寧食三斗炭莫逢楊德幹宋田錫知相州居官不懈有善譽每上章論事索湘知相州時有羣盜聚西山下謀攻劫磁相鄰郡發兵千人捕逐無敢近湘以州兵三百偵其入境即掩擊而盡擒之冦凖初為成安令百姓便之後以宰相出知相州薛英知相州專以仁愛及民上下不忍欺之李迪知相州有惠政吏民懷之王德用磁相巡檢以氊車載勇士詐為婦人飾擒劇賊張洪霸後判相州德用雖有職而仁厚愛民奉法秉職有左選所不逮也宋庠判相州雖大臣出鎮而留意吏事未嘗以委同寮崔立知相州有循良之政又識韓琦於布衣以女妻之人服其鑒張存知相州純意愛民一切苛刻之事皆不忍為程珦知磁州慈恕而剛斷熙寧法行為守令者奉命惟恐後珦獨抗議指其未便王獵知林慮縣縣依山俗以搜田為生不知學獵立孔子廟擇秀民誨之居官無絲毫擾吏民愛信共目為清長官宗澤知磁州時太原失守官兩河者率託故不行澤曰食祿而避難不可也即日就道磁經敵蹂躪人民逃徙帑廩枵然澤至繕城浚隍治器械募義勇為固守之計金人來攻磁澤遣兵擊敗之趙不試以宗室知相州建炎初金人來割地不試固守不下及州被圍久外援不至不試知不可為與敵約勿殺城中人既啓門遂與闔家赴井死州人皆免於死金丁暐仁磁州判官政無留訟時詔使廉察官吏以暐仁廉命攝守事黃久約磁州刺史磁並山素多盜既獲而欵服者審録官不時至繫者多以杖殺久約曰民雖為盜豈可不死於法乃盡請讞之而後行李遹涉縣令民苦乏水溉田遹行視西山下得美泉度地為渠引水溉田數百頃去任民刻石頌德焉元王士元知磁州值軍興餽餉需索日繁民不堪命士元心念其民力為區畫至為將士陵辱詞責弗之避吕士榮湯隂尹杜絶私謁惠政及人教民孝弟化暴勝殘幾於無訟去任民心不忘立碑以紀其遺愛焉吳秉彛彰德路總管存心忠厚政尚寬簡民甚愛之李起巖滏陽主簿勸民興學諭民孝弟廉恥書絶私謁三字於門見者憚之民有兄弟爭訟起巖曰骨肉乖爭實由政化未孚深自咎責其人慙謝而退郅朗武安尹練達吏事剛方嚴毅介然無纎毫取於人政聲燁然李仲彬武安尹為政知大體不求赫赫名於民之利病孜孜興除擇師教子弟講釋菜禮以易風俗為己任既去邑人思之王琚仁涉縣尹邑城東隅嵗為山水圯壞民不寧居琚仁設法築堤其患乃息去任民攀留不忍釋後慕其德為之刻石李良弼涉縣尹興廢舉滯勸善懲惡由是士知向儒農知務本詞訟簡而盜賊息去任民刻石以示不忘本朝詹俊洪武初磁州同知始至大書坐隅曰忠勤廉謹民有掘故址得藏金納半於官俊不許而歸之嘗遇飛蝗呼天哀告蝗遂出境遇久旱作歌自責大雨即至民至今思之楊辛洪武間臨漳知縣適漳水泛溢辛為巨筏數百渡民於髙陵全活數百家民相率詣縣拜曰吾民得活者公之力也辛曰此吾分內事何以謝為後徙縣治皆辛規畫民至今稱之陳文通洪武末彰德知府廉介有為門無私謁俗多婦人爭訟文通榜止之由是政平訟息嵗飢嘗勸富民出粟人爭輸米以賑復分巳俸賑城中不給者比歿民皆號慟如失父母焉郤忠洪武末臨漳知縣值嵗荒民生男女慮不能育皆棄之忠出禁令以己俸給與獲生者甚衆在任决獄無滯囹圄恆空民咸德之沙玉永樂初涉縣知縣慮民無恆産乃設酒饌請富民親為立劵借財買牛具以給貧乏者督民每丁種蔬一畝以備饑饉民遂足食嘗值禾稼方熟督民晝夜收穫未畢飛蝗大至鄰邑禾食盡而涉民得保生焉張楫安陽知縣厯任既久志操愈堅時稱其賢應琚永樂初知彰德府府俗富民子弟多投肄兵以隱役琚乃諭以教條限以額數令民習學月加考較值嵗旱齊沐徒跣遍禱境內諸神祠不三日而甘澍至嵗大稔章士浡永樂初由進士知磁州勤慎廉介修理學宫綽有成績而民不以勞病省志劉安永樂中除武安知縣門無私謁勤於撫字修舉百廢嘗以詿誤逮赴京民以失依逃去比白復任民即復業其得民類如此省志楊縉永樂間以監察御史升彰德知府甫朞夏淫雨河水湧溢為患縉乃率寮屬自責以禱神未幾果天霽水復故道民以無患至今民有餘思劉澤永樂間彰德知府清儉守職慈祥治民尤恤鰥貧百姓無不思慕其德省志馬忠宣德初以監察御史改武安知縣撫字有方秩滿民乞留升本府通判仍署縣事以疾自引至今民思慕之省志安理宣德中以監生除知磁州作五瓜渠以興水利民為立碑以紀其事省志髙仲仁宣德中磁州訓導通五經尤勤于訓誨省志劉禮宣德末知涉縣以績著省志傅祿宣德間知彰德府修政立事興學養賢厯有成績省志謝琛正統中除知林縣奏免逋稅民困以蘇興廢舉墜動遵成憲政暇多吟詠以憂去民乞留焉省志王鋭由進士景泰間以南京戶部郎中升彰德府知府以績最纍升副都御史巡撫陕西延綏省志黃宗孝景泰間任湯隂縣主簿作歌勸民至今思之省志方鯉由進士知彰德府政尚寬厚民不忍欺嵗旱齊沐徒跣遍謁神祠果獲甘雨以蘇民望省志李昭天順初知磁州有惠政葺理學校壇廟民不勞而事集省志尚璣成化元年由貢士除湯隂知縣以績著䝉詔旌異省志張珵成化初磁州判官嘗疏河道以除水患請减東北沙鹻田額稅三之一以憂去民甚思慕之省志周完初知林縣以績著䝉給敕命旌異升浙江寧波府通判以憂去成化二十一年復除彰德知府政績益懋省志韋堅成化初彰德府經厯三考績最升伊陽縣知縣省志張夢輔由貢士初除直隸碭山知縣秩滿升知頴州以憂去成化十五年復除知磁州隨任輒有治績所在民咸懷之省志李經成化六年由進士知臨漳縣以績最擢陕西道監察御史省志劉湜成化中由貢士任儀封縣教諭升歸德府儒學教授厯考福建湖廣庚子等科鄉試所在稱得人士類推服省志流寓王庭筠河東人金昌明中嘗試館職罷歸卜居彰德買田隆慮讀書黃華山寺因號黃華山主工詩能文書學米元章尤善山水墨竹仕至翰林修撰子曼慶亦能詩并書仕至行省郎中自號淡游李秉彛北平人徙家於相讀書工篆隸仕元為彰德路轉運使厯戶部尚書所居有間邪齊號間邪老人有文集王博文東魯人徙家於相元初從憲宗南征厯官禮部尚書纍遷江南道行御史臺中丞卒贈魯國公諡文定三子長師道同知東安州事次景哲同知睢州事次為豐州同知王磐永年人徙家於相世祖聘為翰林直學士改山東宣撫司入為太常少卿仕至學士承㫖卒贈太傅洛國公諡文定號鹿菴有文集杜瑛文安人徙家於相世祖問平宋之䇿對以養民強兵授大名等路提舉卒贈翰林學士諡文獻子茂仲睢州教授榮季東平路經厯髙鳴太原人徙家於相時稱河東先生世祖召為翰林直學士纍官吏部尚書追封魏國公所著有河東集三子書訓易訓詩訓俱顯仕崔升青州樂安人父剛宣德初以才選入官除趙府庫使因占籍安陽遂家焉升登成化己丑進士除兵部武選司主事以憂去復除戶部升兵部武選司員外郎省志人物漢蓋寬饒魏郡人舉賢良對䇿髙第嘗為衛司馬遇士卒甚有恩及歲代衛卒數千人請復留一年以報厚德宣帝嘉之擢司隸校尉刺舉無所避後奏封事犯上意執金吾附㑹劾奏寬饒大逆不道下吏寬饒自剄衆憐之霍諝鄴縣人仕為北海相入為尚書僕射大將軍梁冀秉權諝因陛見陳其罪及冀誅桓帝嘉其忠節封鄴都亭侯出為河南尹遷司隸校尉郭巨隆慮人家貧養母盡孝每供饌母必分與孫巨謂妻曰兒分母饌貧乏不能供子可冉有母不可冉得乃埋其子掘地三尺得黃金一釡上有丹書曰天賜孝子郭巨官不得奪人不得取魏桓安陽人以清節數被徴鄉人勸之應聘桓曰夫干祿求進所以行志也今後宫百數其可損乎厩馬千匹其可減乎左右權豪其可去乎皆對曰不可桓乃嘆曰使桓生行死歸於諸子何有哉遂隱身不出杜喬林慮人少為諸生舉孝廉辟司徒楊震府遷南郡太守轉東海相入拜侍中時梁冀專權喬正色不撓卒為所害晉邵續安陽人父乘仕為散騎侍郎續素朴有志博覽經史妙解天文初為成都王穎參軍後為樂陵太守綏懷有方散亡歸附尋以兵屬元帝纍官冀州刺史南北朝孔伯恭鄴人仕魏纍官鎮東將軍後以散騎常侍彭城鎮將都督徐南北兖州諸軍事申徽魏郡人仕魏為襄州刺史性廉勤事無稽滯入後周纍遷都官尚書右僕射進小宗伯陸彥師魏郡人好學能文親歿與兄卭廬墓負土成墳北齊表其閭卭當襲父侯爵以讓彥師固辭乃止時稱兄弟孝義萃於一門隋初以彥師為尚書左丞轉吏部侍郎陸爽臨漳人少聰明年九歲日誦二千言仕北齊纍官中書侍郎周武帝聞其名召授宣納上士入隋為太子內直遷太子洗馬隋趙輔和臨漳人明易學占筮初為北齊神武館客所言無不中入隋纍官通直常侍堯君素湯隂人仕為鷹擊將軍大業末從屈突通拒唐師於河東通軍敗左右請降君素不從越王侗見而嘆之拜金紫光祿大夫後死節唐傅奕相州鄴縣人仕為太史丞時國制草具多仍隋舊奕稍更之嘗上疏詆浮圖法武德九年太白晝見秦分奕言秦王當有天下帝以奏付王及太宗即位召賜食謂曰向所奏幾敗我自今無有所諱戴胄安陽人仕為秦王府參軍遷大理少卿犯顔諌諍纍辨寃獄遷尚書左丞參預政事子至德西臺侍郎遷右僕射父子相繼世詫其榮鄧世隆相州人隋末為王世充兄子書報秦王夸慢棲白鹿山號隱𤣥先生貞觀初召授國子主簿修史學士帝遣房𤣥齡諭曰爾作書各忠其主耳毋有後疑官至衛尉丞李延壽相州人仕為崇文館學士嘗追述父志作南北史一百八十篇上之又撰太宗政典髙宗觀之咨美直筆賜帛褒之杜正倫相州洹水人初直秦王府文學館魏徴薦其才擢兵部員外郎纍遷中書侍郎從孫咸舉進士纍遷尚書左丞咸子泰之開元時為工部尚書愕之為將作少監封博陵侯馮元常安陽人舉眀經及第調浚儀尉擢監察御史厯尚書左丞嘗諌中宫權重宜少抑為武后所惡出為廣州都督卒為周興所害神龍中旌其家曰忠臣之門源乾曜相州臨漳人第進士神龍中以殿中侍御史出知江東遷諌議大夫開元中拜相帝東幸以京兆尹留守京師治尚寬簡居三年政如始至王同皎相州安陽人尚中宗女桓彥範等誅二張遣同皎與李多祚迎中宗復位封琅琊公後為武三思所誣被害睿宗時諡曰忠盧從願本范陽人六世祖昶徙居臨漳從願擢眀經舉制科仕為山南黜陟巡撫使開元末為中書舍人遷刑部尚書李傑相州滏陽人本名務光少以孝弟擢第為河東巡察黜陟使課最諸道先天中自陕州刺史以河南尹府無淹事人吏愛之後為御史大夫邵說安陽人郭子儀辟置幕府纍遷長安令祕書少監德宗立擢吏部侍郎以才顯杜羔正倫孫貞元初進士遭兵父死母離不知所之憂號終日及為澤潞判官鞫獄因得母後至佛寺得柱間文字乃父所記因識其墓厯振武節度使以工部尚書致仕卒贈右僕射諡曰忠崔𤣥亮磁州昭義人舉進士為監察御史清慎介特改諌議大夫朝廷推為宿望宋申錫逮捕𤣥亮流涕苦諍帝感悟重其不撓杜中立羔之子以廕為通事舍人尚公主為駙馬都尉以不任事憒憒不樂上異之因轉太僕少卿遷司農卿即除吏姦尋為京兆尹宰相欲厯試其能出為義武節度使卒贈工部尚書居官精明所至吏人畏伏宋韓令坤武安人父倫亳州團練使令坤有才略仕為大平軍節度加侍衛同平章事太祖親征李筠令坤率兵屯河陽澤潞平以功加侍中韓重贇武安人少以勇力聞仕為都校領防禦使從太祖征澤潞為侍衛領節度使及征太原為行營元帥卒贈侍中子崇訓官至檢校太傅崇業左屯衛大將軍能世其家蔡審廷武安人少能騎射初從周世宗征伐有功纍官內殿直都虞侯宋初授冀州刺史從太祖征太原訓練士卒甚整後為鎮州兵馬都鈐轄劉用相州人祖萬進都指揮使父守忠驍衛大將軍用曉音律善騎射初事太宗於晋邸立戰功纍官祁州刺史景德初為邢州副部署真宗北征以守城勞進爵邑厯知齊陳潞等州韓國華安陽人太平興國初進士纍官左司諌性純直有時譽淳化初契丹請和遣使河朔察之盡得其詐以聞每歲後苑賞花國華以直昭文館陪宴後以右諌議大夫知泉州子琉賜出身琚璩琦並進士及第魏丕相州人纍官復州刺史遷左驍衛大將軍典工作朝廷有事征討每令修創器械無不精辨雅好歌詩嘗使南唐且俾觀其意與李煜登升元閣賦詩有朝海浪拱星辰之句以風動之陳貫安陽人舉進士真宗識其名擢置髙第少倜儻喜言兵纍官刑部郎中直昭文館知相州嘗著兵略世頗稱之陳安石貫子宋嘉祐中為䕫陕轉運判官厯知蘇邠州河中府皆有政績纍遷至吏部侍郎選人將改京官須次久臨當引對率困於刑寺審問安石請罷冉問以絶曩弊遂為後法後以龍圖直學士知河陽韓琦國華子風骨秀異天聖中弱冠舉進士時方唱名太史奏日下五色雲見初授將作監丞厯開封推官為陕西帥朝廷倚以為重嘉祐中拜相其後擁英立神不動聲色措天下於泰山之安封魏國公卒諡忠獻後追封魏王韓忠彥琦子舉進士初為祕書丞徽宗時拜右僕射帝用其言數下詔蠲逋責甄叙流人忠直知名之士稍見收用進左僕射封儀國公以與曽布不協出知大名弟端彥贊善大夫純彥徽猷直學士粹彥吏部侍郎嘉彥駙馬都尉蘇寀滏陽人擢第嘗以侍御史使契丹還道聞英宗晏駕契丹置宴仍用樂寀謂送者曰兩朝兄弟君臣之義吾與君等一也此而可忍孰不可忍遂為之徹樂纍官給事中知審刑院寀長於刑名屢為法官數以讞議受詔奬焉張君平滏陽人以父承訓與契丹戰歿補官屢立戰功遷右班殿直天聖中為滑州修河都監塞决河遷鈐轄卒君平有吏材尤眀於水利自議塞河朝廷每訪以利害子鞏為河隂發運判官嗣其父職云竇舜卿安陽人以廕纍官雍州觀察使厯邠寧環慶副都管數立戰功熙寧中十上章求退且丐易文階改刑部侍郎提舉嵩山崇福宫卒諡康敏嶽飛湯隂人少負氣節好左氏春秋孫吳兵法誓以忠義報國初授河南河北諸州招討使轉少保志圖恢復用兵能以寡敵衆屢破強敵未嘗一敗大業垂成為秦檜所害後追封鄂王諡武穆五子雲雷霖震霆雲左武大夫隨飛征戰數立竒功雷霆俱閣門祗候霖敷文閣待制震茶鹽提舉霖子珂知嘉興府韓浩琦孫靖康中以奉直大夫守濰州建炎二年金人攻城浩率衆死守城陷力戰死之姚興相州人以武功纍遷荆湖南路兵馬副都監金兵渡淮興以四百騎當金人十數萬自辰至午戰數十合援兵不至父子俱死金人相謂曰有如姚興者十輩吾屬敢前乎事聞詔贈容州觀察使更諡忠毅立廟祀之韓肖胄忠彥孫父治以太僕少卿知相州肖胄初以䕃厯開封司録尋代父知相州自琦至肖胄三世守鄉郡人以為榮建炎初知江州入為祠部郎應詔陳五事紹興初以端明學士使金通問金人知其家世甚重之纍遷簽書樞密院事後與其弟膺胄寓居越卒諡元穆李道安陽人初與兄旺聚衆歸宗澤澤因事誅旺命道掌其軍後依襄陽鎮撫使桑仲知隨州纍遷湖北副總管卒贈太尉諡忠毅以女為光宗后追封楚王韓同卿琦五世孫知泰州纍遷慶逺軍節度使加太尉卒諡恭靖同卿女為寧宗后其季父托胄自以有定䇿功聲勢薰灼同卿每懼盈滿不敢干政以故天下皆知托胄為后族而不知同卿為后父同卿沒一年而后崩托胄競敗人始服其善逺權勢云金胡礪武安人韓昉見而異之曰他日必名世天會中舉進士第一授右拾遺權翰林修撰改定州觀察判官定州學校士子聚居者嘗百數礪督教不倦經指授者悉為場屋上游官至翰林學士刑部尚書卒贈安定郡開國侯田確安陽人幼家貧勵志讀書登進士第厯天眷皇統間官至吏部尚書王競彰德人以䕃補官天眷中試館閣競文居最纍官禮部尚書翰林學士承㫖修國史競博學能文善草隸書字大字兩都宫殿榜題皆競手筆士林推為第一韓玉相州人曽祖錫濟南尹玉舉進士為翰林應奉應制一日百篇文不加㸃纍官至鳳翔總管趙秉文滏陽人舉進士纍官禮部尚書翰林學士有才藻工書翰能直言自幼至老未嘗一日廢書所著有滏水文集及易叢說中庸說資暇録等書元胡祗遹武安人少孤長讀書見知名流厯官員外郎出為太原路治中纍遷山東提刑按察使以疾歸朝廷徴耆文德者十人祗遹為之首復辭以疾卒贈禮部尚書諡靖子持太常博士蔡珍安陽人素驍勇從憲宗及世祖征伐所至有功南方平遂入宿衛後為親軍千戶佩金符時白海初建行營命珍督役號令嚴肅卒事民不知擾世祖嘉之郭昻林州人習刀槊能挽強稍通經史尤工於詩至元初上書言事廉希憲材之授山東統軍司知事纍官廣東宣慰使所至招降猺獠擒討蠻酋人服其威信子震杭州路鎮守萬戶惠僉江西廉訪司事預知寧都州安祐磁州人弱冠上書世祖竒之授以近侍每有委用規模宏逺官至集賢大學士卒贈平章追封興國公諡文康杜秉彛安陽人瑛曽孫仕為監察御史纍官禮部尚書參知政事進中書左丞集賢大學士有文集四十卷子原輝州知州許熙載湯隂人博古通今事母以孝聞仕為會福院照磨能以儒飾吏嘗病古人遺教雜見於禮書漫無統紀乃輯為女教書後開義學以教鄉人所著有東岡小藁許有壬熙載仲子幼頴悟讀書一目五行延祐中進士纍官集賢大學士改樞密副使拜中書左丞歷事七朝垂五十年遇國家大事無不盡言且善筆札工詞章所著有至正集卒諡文忠兄有恆歷官大理路知事弟有儀經筵檢討有孚湖廣儒學副提舉莊文昭安陽人舉進士歷官保定路總管刑部尚書遷陕西行省參知政事徐昺安陽人天厯初進士擢監察御史纍官禮部尚書國子祭酒歷遷翰林學士承㫖子企雲州知州韓從益安陽人纍官江浙行省參政歷轉昭文館大學士啇議中書省事卒贈右丞魏郡公諡文肅高謙磁州人幼翹俊業兼儒吏釋褐將仕佐郎歷轉河間等路都轉運鹽使及常州湖州路總管致仕加吏部尚書所纂有格例百餘冊邢溫安陽人纍官至東昌路總管卒贈户部尚書諡康肅父秉仁為廣平路總管子從周澤州知州梁貞安陽人性純孝官至山南東道按察副使以母老辭歸侍飬母卒廬於墓側遂杜門不出梁琮安陽人父卒廬墓以孝行稱纍官福建轉運副使所著有官吏須用十六卷唐律類要六卷髙傅鳴曽孫為林州團練萬户赴調遇盜邏卒且戰且行盜率大衆突擊傅匹馬挾徑弓射無不中盜懾不敢前救軍不至盜復合攻誘以降傅厲聲大罵力戰而死趙正倫湯隂人頴悟特達長於詩賦泰定中登進士第官至吏部尚書薛大猷湯隂人蚤中甲科棄而不仕隱居教授學者多宗之有四書講義董搏霄磁州人纍官河南行省右丞所至理寃獄革弊政嘗克復杭湖徽饒諸路斬獲無算尋駐兵南皮縣而毛貴兵奄至搏霄督兵力戰而死事聞追封魏國公諡忠定是日其弟昻霄在濟南亦死追封隴西郡侯諡忠毅本朝郭資