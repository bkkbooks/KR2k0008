㫖宋直龍圖閣初㫖游學數年不還家人欲嫁其妻李李守節而死因以名坊盧同莊在濟源縣西北二十里石村北之玉川同詩云買得一片田濟源花洞前石敬塘别墅在濟源縣西六十里韓村社俗呼為特進莊敬塘五代晋髙祖也微時居此許衡别墅在府城東北景賢村名宦秦司馬卬趙將定河內數有功項羽立為殷王王河內都朝歌漢周亞夫為河內太守有治聲寇恂為河內太守光武北征恂講兵肄射伐淇園竹為矢百餘萬收租四百萬斛轉以給軍朱鮪據洛陽遣兵來攻溫恂擊破之宋均為河內太守政化大行均嘗寢病百姓為禱請旦夕問起居其為民愛如此任延為河內太守視事九年有循良之政馬棱自會稽太守轉河內有治聲趙喜為懷令大姓李子春豪猾為患喜窮詰其姦京師為請者數十終不聽樊凖為河內太守時羌復屢入寇凖輒將兵討逐修理塢壁威名大行周景為河內太守好賢愛士拔才薦善常恐不及周舉以侍中遷河內太守有治聲陳蕃以樂安太守左遷修武令名譽益振魏朗為河內太守政稱三河表宗慈為修武令時太守出自權豪多取貨賂慈棄官去王渙為溫令縣多姦猾渙以方略擊誅之境內清夷商人露宿牟長為河內太守在郡諸生講業常千餘人前後多至萬餘著尚書章句皆本之歐陽氏號牟氏章句三國劉馥魏河內太守政績最著司馬孚魏時河內典農有治最寬以愛民恭以待士晉何曽為河內太守以威嚴稱石崇為修武令有能名裴楷為河內太守有清通之譽夏侯湛為野王令以恤隱為急而緩於公調政清務簡潘嶽為河陽令嶽多植桃李號曰花縣後轉懷令勤於政績李矩都督河南三郡軍事遷滎陽太守封修武侯有治稱陸子彰以齊州刺史行懷州事寬大愛人軍政修備盧賁為懷州刺史在郡决渠東注者名刺史渠又𣲖入溫縣者名溫潤渠以溉舄鹵人資其利南北朝髙允魏懷州刺史時年將九十每秋月巡問疾苦勸人學業風化大行故老為立祠樹碑紀德焉于栗磾魏鎮東將軍有勇力築壘河上以備侵軼平鑒東魏懷州刺史敵攻城城內井泉竭鑒具衣冠祝之泉即湧溢合城取足焉鄭述祖北齊懷州刺史以清白著稱唐假秀實為懷州長史時安慶緒亂安西節度使李嗣業圍之秀實督餉募士市馬以助其軍溫造河陽節度使奏復懷州古秦渠枋口堰溉諸縣田崔𢎞禮河陽節度使治河內浚秦渠溉田千頃烏重𦙍河陽三城節度使待官屬有禮善撫士與下同甘苦令狐楚河陽節度使代烏重𦙍始重𦙍徙滄州以河陽士三千從士不樂潰歸將轉掠旁州楚至中灘以數騎往勞之衆志遂定韋澳河陽三城節度使為政安靜田布河陽節度使省冗將募戰卒寬賦勸穡人皆安之楊元卿河陽節度使何進滔亂魏博元卿請自齎三月糧舉軍出討文宗嘉美之敬昕河陽節度使武宗以王宰兼河陽行營攻討使以扞敵昕饋餉不絶劉沔自義城軍節度使鎮河陽討平劉稹張鷟河陽尉有客失驢捕急盜放驢匿鞍鷟令客勿秣夜縱之驢尋向所餵處遂捕其家得鞍人服其智石雄討平劉稹進檢校兵部尚書徙河陽節度使李珏河陽節度使罷橫賦宿逋百餘萬召為吏部尚書珏去鎮而府庫十倍於初五代竇儀晋河陽推官有執守臨事不阿弟僖亦為推官亢直無僞符彥卿晋河陽三城節度使契丹入寇拒戰有功宋曹璨河陽節度使善撫士卒兼著威愛曹瑋知河陽縣有寬政戒所部不擾民張齊賢判河陽威惠有斷吏畏民愛寇凖知河陽三城謙恭下士平易近民陳省華知濟源縣勤政施仁惠及黎庶其後遂家於濟源張知白河陽節度判官真宗朝上書言事擢右正言孫奭知河陽縣及朱能獻乾祐天書奭驛疏請斬能以戒幻惑陳堯叟知河陽縣臨事有斷富弼以宰相三判河陽郡人喜之如見父母文彥博河陽三城節度使威德並著人甚戴之子及甫知河陽亦有惠政韓絳知河陽三城有政譽百姓懷之吕公著知河陽三城蠲役法以寬下戶輸錢吳元扆冉知河陽河溢城將壞元扆督工壅塞民免墊溺陳襄知河陽縣治邑整整有緒百姓便安傅堯俞神宗朝與王安石議論不合移知河陽閲歲五徙自知不為時所容請間而去朱光庭河陽判官遇事公直不可干以私霍安國知懷州時有治狀靖康初金人陷懷州安國死之金王競河內令時歲饑盜起競設方略購賊不數月盡得之夏秋之交沁水泛溢歲發民築隄豪猾夤緣為奸競核實之減費幾半民為之諺曰西山至河岸縣官兩人半蓋以競自前令韓希甫皆有幹能正平令張元亦有治績而差不及故云宋扆沁南軍節度使貞祐初元兵至懷州城破死之元仇濟懷孟路總管興學救災民思其德梁貞濟源縣尹縣有虎食牛貞牒城隍神而虎遂死原昌井深而少水貞為檄投井中而水溢民甚德之談澄中統初懷孟路總管歲旱令民鑿唐溫渠引沁水以溉田民用不饑教之種植地無遺利趙元善濟源縣尹多善政民懷其德刻石頌之徐德恩濟源縣簿蝗入境德恩禱之風寒大作蝗悉斃歲大旱致禱即雨民愛戴之范忠河陽尹溴水泛溢隄潰忠令塞其决處仍命鑿渠濬水民利之虎秉河內知縣性剛果有志節抑強扶弱决事眀敏張煥濟源縣丞廉介不茍吏畏民服宿弊盡革本朝沃墅洪武初溫縣知縣時民艱於食墅令墾闢荒蕪樹藝桑棗百姓歌曰田野闢沃公力衣食足沃公育比代去民遮道留之劉瑜永樂初懷慶知府臨政不徐不亟作新文學郡遂以治百姓至今思之靳禮永樂間知孟縣勤政恤民以憂去民保留之省志張煥永樂中濟源縣丞廉介不苛吏畏民服宿弊盡革省志孫迪宣德中武陟縣丞以績著升陳留知縣比去民為留鞾懸諸治門以識不忘省志李湘正統初懷慶知府律已廉潔恩威兼著卒官百姓如喪父母省志虞瑄正統中知溫縣有善政後以憂去邑民五百餘人詣闕乞留升河南知府省志崔謙正統末任修武知縣後以績最升懷慶知府省志胡宣初任扶溝知縣優于治劇保調溫縣知縣省志倪成化中以進士任兵部主事知懷慶府以績最纍給誥命旌異省志張珙成化中懷慶府經歷署溫縣事有治績詔升南召縣知縣省志流寓嵇康晋譙郡人寓居河內之山陽寬簡有大志能詩文為時所重傅堯俞鄆州人徙居濟源舉宋進士嘉祐中為監察御史屢進讜言元祐中拜中書侍郎司馬光嘗稱其有清直勇三德人物周聶政軹人戰國時濮陽嚴仲子與韓相俠纍有隙欲報之聞政勇敢乃奉黃金百鎰為政母夀政以母在不許及母死獨行仗劔刺殺俠纍因自披靣抉眼而死漢甪里先生軹人避秦居商雒山為四皓之一也又云吳人郭解軹人始以游俠睚眦殺人後折節為儉以德報怨厚施而薄望振人之命不矜其功石奮河內溫人景帝朝為九卿子建甲乙慶皆以馴行孝謹官至二千石景帝號奮為萬石君奮歸養于家歲時過宫門闕必下車趨見路馬必式賜食于家必稽首俯伏而食家以孝謹聞雖齊魯諸儒質行皆自以為不及蔡義溫人以眀經給事大將軍幕府昭帝召見說詩悅之擢光祿大夫後拜相以定䇿功封陽平侯張禹河內軹人眀習經學仕為博士元帝朝授太子論語成帝即位尊禮師傅與鄭寬中說書金華殿纍遷光祿大夫代王商為丞相封安昌侯趙子河內人事燕韓嬰受詩學生徒甚盛趙子以授蔡誼誼授食子公與王吉食生授栗豐吉授長孫順由是韓詩有王食長孫之學傅喜溫人傅太后從弟好學有志行成帝遷為太子庶子哀帝時丁傅二家驕侈喜獨謙退守節歷遷大司馬封髙武侯蔡茂河內懷人哀平間以儒學顯徴試博士纍遷侍中王莽居攝茂以病歸光武初徴拜議郎遷廣漠太守後代戴涉為大司徒清儉匪懈張𤣥河陽人少習顔氏春秋建武中拜博士琅琊徐業與語大驚曰今日相遭真解矇矣藥菘河內人天性朴忠嘗為郎獨直臺上家貧無衾枕每食糠核帝入臺見而嘉之詔太官賜朝夕餐歷官南陽太守衛颯修武人家貧好學隨師無糧常傭以自給建武初除侍御史遷桂陽太守理恤民事居官如家修庠序之教邦俗從化野王二老光武遣鄧禹西征送之於道既返因於野王獵路見二老者即禽光武問曰禽何向並舉手西指言此中多虎大王勿往光武曰茍有其偹虎亦何患父曰湯即桀於鳴條而大城於亳武王即紂於牧野而大城於郟鄏彼二王者偹非不深也光武悟顧左右曰此隱者也將用之辭而去丁蘭河內人母喪刻木像事之若生鄰人張叔醉詈母像以杖擊其首蘭歸見母像色若有不懌詢知之即奮擊張叔吏捕蘭像為之垂泣郡嘉其孝通神眀奏之詔圖其形張範修武人性恬靜徴命無所就弟承以方正拜議郎董卓亂範承命徒共誅之弟昭亦為議郎魏曹操以範為參軍承領趙郡太守三國司馬芝河內人避亂荆州躬耕守節魏曹操以為廣平令歷甘陵陽平太守所在有績明帝賜爵關內侯芝不矜亷隅在公卿間直道而行子岐仕為陳留相司馬懿溫人少有竒節博學洽聞漢末兵亂慨然有憂天下之心後受曹操顧命輔政傳至孫炎是為晋武帝追尊懿為宣帝常林魏河內人年七歲父黨造門問伯先在否汝何不拜林曰臨子字父何拜之有長益知名歷官刺史封髙陽鄉侯司馬懿以鄉邑耆德每為之拜或勸止之林曰彼自欲敦長幼之節貴非吾所畏拜非吾所制也時論欲致之公輔林遂稱疾卒諡貞侯司馬朗河內人年十二試經魏辟為司空掾屬後為堂邑長入為丞相主簿遷兖州刺史政化大行晉山濤河內懷人器量不羣少與阮籍為竹林友武帝朝為吏部尚書甄收人物各為題目時稱山公啓事纍官至尚書僕射加侍中初伐吳濤曰自非聖人外寧必有內憂釋吳以為外懼不亦美乎人服其逺山簡濤子性溫雅有父風仕為征南將軍鎮襄陽每出遊習家池上置酒輒醉而歸名之曰髙陽池時有童兒歌以嘲之子遐仕至東陽太守向雄河內山陽人初仕魏為秦州刺史成寧初為御史中丞遷侍中太康初為河南尹有大志在朝多諌正向秀河內懷人清悟有逺識雅好老莊注莊子發眀竒趣與嵇康親善康沒作思舊賦仕至黃門侍郎散騎常侍茍晞河內山陽人少為司隸部從事後都督青兖二州練於官事文書盈案裁决如流位至録尚書事郭文軹人少愛山水尚嘉遁恆著糜裘葛巾採竹葉木實貿鹽以自給後隨晋東遷王導迎置西園一旦忽求還山未幾蘇峻叛人以為知幾南北朝司馬楚之溫人晋宗室少有英氣能折節待士劉裕墓晋楚之歸北魏授汝南大將軍封琅琊王後為鎮西大將軍在邉二十年以清儉著聞子悅豫州刺史張蒲修武人父暈仕後燕慕容垂位至兵部尚書以清方稱蒲少有父風慕容寶時仕為尚書左丞後遷相州刺史扶弱抑強風化大行常爽魏溫人篤志好學五經百家多所研綜州郡辟命皆不就置館教授門徒至七百餘人時號儒林先生趙默溫人魏獻文時選部尚書當官謹飭進爵河內公孝文立纍功進爵為王諡曰康子司馬子如溫人東魏丞相髙歡入洛以為大行臺尚書天平初除尚書左僕射與髙嶽等共知朝政齊受禪封須昌縣公司馬筠溫人博通經史尤眀三禮梁天監初為暨陽令有清節入為尚書丞張子信河內人涉文學隱居白鹿山時出遊京邑北齊太寧中徴為尚藥典御武平初為大中大夫善易算及風角之術隋張衡河內人幼懷志尚有骨鯁風仕至御史大夫知無不言後以讒賜死唐髙祖代隋追贈大將軍南陽郡公諡曰忠唐王琚河內人有才眀天文象緯之學王友貞河內人父知敬善隸書武后時授麟臺少監友貞少為司經局正字母病醫言得人肉啖良已友貞割股以進母病愈詔旌其門神龍初徴為太子中舍人固辭𤣥宗在東宫表以蒲車召不至穆寧河內人剛正負氣節初以眀經調鹽川尉安祿山反遣使誘寧寧斬以徇仕肅代二朝纍官太子諭德終祕書監長子贊御史中丞次質右補闕次員侍御史次賞監察御史昆弟皆和粹世以珍味目之贊為酪質為酥員為醍醐賞為乳臠王智興懷州溫人少驍鋭纍立戰功厯遷侍御史後平賊進中丞後加尚書左僕射又以戰功封鴈門郡王進兼侍中卒贈太尉子晏平以功為散騎常侍遷朔方靈鹽節度使王晏宰晏平弟甘露之變以功為御史大夫纍擢邠寧慶節度使後以太子少保分司東都進少傅裴休濟源人講經著書終年不出戶舉賢良方正為監察御史操守嚴正文宗朝拜相後罷為宣武軍節度使卒贈太尉休為人藴藉能文章書有體法宣宗稱為真儒者韓愈南陽人即今修武縣北南陽城是也七歲讀書日記數千百言比長盡通六經百家之學擢進士第纍官刑部侍郎時憲宗迎佛骨愈上表極諌貶潮州刺史除鱷魚患尋改袁州召拜國子祭酒歷轉吏部侍郎卒贈禮部尚書諡曰文愈為文粹然一出於正佐佑六經學者仰之如泰山北斗云盧同濟源人號玉川子好學博覽工詩嘗為月蝕詩譏元和逆黨韓愈稱其工為茶歌句多竒警邑有盧同煮茶泉張庭圭濟源人慷慨有志尚舉進士纍遷監察御史黃門侍郎數直諫御史蔣挺坐法詔决杖朝堂庭圭執奏以為可殺不可辱時服其知治體後入為少府監卒諡正穆李商隱河內人世績之裔孫舉進士調𢎞農尉又試拔萃中選補太子博士遷檢校工部員外郎詩文瑰邁竒古世號其詩為西崑體五代假希堯河內人晋髙祖為河東節度時以希堯為判官髙祖屯欣州軍中有擁呼萬歲者希堯勸斬之髙祖立遷諫議大夫纍官禮部尚書向拱河內人少倜儻負氣仕周纍立戰功遷檢校太師武寧軍節度使宋封秦國公卒贈中書令子德眀官至洛苑使昱進士出身孫懌國子助教悅虞部郎中盧億河內人少篤學以孝弚聞歷晋漢周纍官𢎞文館直學士宋初遷河南少尹以清介自持億性恬退聞其子多遜知制誥即上章求解遂以少府監致仕宋盧多遜億子周進士積官集賢校理宋初纍遷翰林學士參知政事太宗時拜中書侍郎平章事多遜博涉經史文辭敏給好任數有謀略坐事流崖州穆衍河內人纍官直龍圖閣知慶州嘗從韓絳宣撫陕西遇慶卒潰亂衍母在耀亟謁歸卒知衍名不敢近元祐初大臣有議棄熙蘭者衍以為不可議遂止史抗濟源人宣和末為代州沿邉安撫副使金人圍代急抗夜呼二子稽古稽哲曰吾昔語用事者鴈門宜擇帥增戍彼皆不吾省今城必陷吾將死事汝輩亦勿以妻子為念而負國也二子泣曰唯命眀日城破父子三人突圍力戰死於城隅李伯宗河陽人第進士歷大理卿刑部侍郎言今情重法輕者許奏請情輕法重者不得焉恐非仁聖忠恕之意徽宗納之以顯謨閣待制卒贈光祿大夫諡曰榮傅察濟源人堯俞從孫端重有特操為文溫麗舉進士蔡京欲娶以女察拒之初調青州司法參軍宣和中以吏部員外郎使金不屈死贈徽猷閣待制諡忠肅傅伯成察之孫少從朱熹學登隆興初進士第纍官集英殿修撰知建寧鎮江府皆有善政理宗時以寶謨閣學士奉祠伯成純實無妄每稱人善不啻如己出語及姦邪則詞色俱厲不少假借卒年八十四諡忠簡陳芳河陽人一門十四世同居三百年孝義為時所重芳仕為大理丞詔旌表其門李曽伯覃懷人後居嘉興厯官寶章閣直學士進權兵部尚書纍以直言受賞曽伯初與賈似道俱為閫帥邉境之事知無不言似道嫉之卒使不竟其用云元許衡河內人號魯齊幼嗜學穎悟不凡及長經傳子史禮樂名物星厯兵刑食貨水利之類無所不通仕為集賢大學士兼國子祭酒纍遷中書左丞追封魏國公諡文正以道學鳴有文集傳世從祀孔子廟庭子師可廣平路總管師敬西臺中丞吕河內人從許衡學衡為祭酒薦為伴讀輔成教養其功為多嘗為四川行院都事勸主帥李德輝不殺王立未幾立降巴人感德立祠祀之纍官翰林侍讀學士致仕卒追封東平郡公諡文穆馬景道河內人隱居教授徴拜國子助教陕西行省提舉皆不就蕭讓武陟人資敏純篤才德優贍仕至山南湖北道提刑按察使卒贈司徒孟國公諡忠肅子七人珍仕至大司徒中都留守珝無為路學教授親沒廬墓事聞詔旌其門吳恭祖孟州人沉毅有才識仕為福建行省理問有能聲纍升建興汀福四路總管所至以重厚見稱卒贈兵部尚書追封渤海郡侯諡正肅楊一懷孟人至元間憐其叔清家貧密以分契詣神祠焚之與清同居者三十年無間言閔本河內人性剛正敏給始為御史臺掾平反寃獄甚有聲五轉為吏部尚書移刑戶二部皆以能見稱嘗上章乞謝事不允詔授集賢侍講學士大兵薄京城本乃北向冉拜大書其職銜姓名于屋壁與妻程氏及二女皆縊死馬英河內人性孝友父喪哀毁二兄繼歿獨事母并奉二寡嫂與居比母喪卜地葬諸喪親負土為四墳手植松柏廬墓側終其身本朝馮冕孟縣人洪武初以儒士舉為欒城縣丞有廉能聲尋用薦升春坊贊善大夫九年遷刑部尚書以疾歸老于家劉幹修武人洪武癸酉科舉人仕為長洲縣丞清修苦節公平仁恕民信愛之比卒如失父母貧不能歸民為買舟資送留衣冠葬於虎丘山側立石表其上曰劉公墩歲時致祭焉王鐸修武人洪武丙子科鄉舉除鳳陽府教授尋用薦升金華知府子愈懋孫璠俱進士第志省髙俊溫縣人永樂初由貢士纍官山西右布政使省志王黻河內人永樂癸卯科舉人仕為山東嶧縣知縣蒞政廉勤眀達大體秩滿嶧民詣闕保留賜敕褒異仍任三載後致仕老弱遮道挽留省志趙瑛河內人除監察御史省志孫育武陟人初登洪武丙子科鄉舉後代祖父行戍十有四年居母喪廬墓三年躬負磚土築為墳臺髙丈五許年九十詔賜冠帶幾百齡而卒省志列女聶嫈軹人聶政姊政刺殺韓相俠纍自皮面抉眼而死韓暴其尸於市購問無知者嫈往視之知是政乃伏尸哭曰是軹深井里人聶政也以妾在之故重自刑以絶蹤妾奈何畏誅終滅賢弟之名乃呼天悲哀遂死政之傍何氏元懷孟人夫沒守志養舅姑以夀終親負土築其墳髙三尺康孝女本朝濟源人父友賢年老無子擇王珏入偦女勸母納妾生子而乏乳女亦生女遂捨之乳其弟曰吾父老矣女可得弟不可再得也母嘗構疾甚輒嘗糞甜苦夫早沒誓不再適時人稱之秦氏修武人江彥深妻夫早逝誓不再適勤儉奉養舅姑洪武二十八年有司以聞旌表其門省志鄭氏溫縣人孟景妻年十七適景二十三而景亡二子俱幼家且貧甚甘於守節父母憐其少寡議欲再適乃截髮自誓躬勤紡績以養舅姑撫育二子及舅姑繼沒竭力營葬哀毁骨立守節四十九年始終無瑕玷有司以其事聞天順庚辰詔旌其門省志仙釋司馬承禎溫人事潘師正傳辟榖道引之術唐睿宗召問其術對曰為道日損損之又損以至於無為帝曰治身則爾治國若何對曰國猶身也故游心於淡合氣於漠與物自然而無私焉則天下治帝嗟嘆曰廣成之言也卒諡貞一先生賀蘭號棲真自言百歲善服氣往往不食或時縱酒能啖肉至數斤始居嵩山紫虛觀後徙濟源奉仙觀宋真宗召至問曰人言先生能點化萬金信乎對曰臣願陛下以堯舜之道點化天下顧方士僞術不足為陛下道真宗奇其言賜號宗𤣥大師賚以紫服白金仍蠲觀之田賦未幾求還舊居卒時大雪經三日頂猶熱人多異之古峰和尚姓周氏為盤谷寺僧甘心守淨修廢寺三十餘所悟三空之性理為一代之名僧臨終有偈省志明一統志卷二十八
