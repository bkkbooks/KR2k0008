何力以遼東道行軍總管擊髙麗敵以精兵守鴨緑水軍不得度忽值冰合何力引衆乗冰鼓譟而進賊衆大潰追奔數十里斬首三萬級餘衆悉䧏遼劉伸崇義軍節度使政務清簡民用不擾致鳥鵲同巢之異優詔褒之蕭孝穆東京留守治遼陽為政務寛簡撫納流徙其民安之韓應凝開㤗中以崇義軍節度使鎮廣徳秩滿部民請留從之金趙文昌遼東路鹽運使博學好持議論李完同知廣寧府初遼濵民崔元入城飲不歸求得尸於水中有司執同飲者訊之皆誣服提刑司疑其寃以獄畀完完亷得其賊乃舟師也遂免同飲人王維翰大定中為永覇令縣豪欲嘗試維翰設事陳訴維翰窮竟之遂伏其詐杖殺之徤訟衰息元穆呼哩封忠武王經略遼東民甚戴之亷希憲遼東中書省平章政績著聞王居禮知錦州勸農興學善政為多有去思碑王伯勝遼陽行省平章政事省治懿州州弊陋民不知學伯勝為增弟子貟擇師敎之度閑田百頃募民耕種以廩餼之嵗大旱齋戒以禱神禱畢即雨人謂之平章雨胡秉彛知錦州政務寛簡敎民耕桑民戴之如父母去後見思賀惟一遼陽行省左丞相糴粟以給京師處置有法所致甚多而民不擾王結㤗定中遼陽行省叅政遼東大水糓價翔湧結請𤼵粟數萬石以賑之本朝葉旺馬雲洪武初俱為遼東都指揮使時遼東新附反側尚多旺與雲由登萊渡海頓兵金州招䧏元叅政葉庭秀攻走平章髙嘉努遂進至遼東完城繕兵屯田興學政治一新已而納克楚犯金州二人合謀既定雲乃留守而旺出兵征之設竒出伏追擊三百餘里殱其衆殆盡上嘉其忠義遣使勞之俱陞都督僉事總制遼東軍馬流寓管寜本北海人漢末避地遼東公孫度虛舘以待乃廬於山谷與度語惟經典不及時事講詩書陳俎豆禮讓崇於海表王烈本北海人漢末避地遼東有行誼東域人多歸之有争訟者將質之於烈或至途而反或望廬而還皆相推以直不敢使烈聞伊克紐爾其先夲永古特部人徙臨洮金畧地盡室遷遼東祖徙静州之天山以財雄邉父錫喇累濟蘓累官鳯翔判官死國事伊克紐爾好負氣仕元遷禮部尚書卒追封梁郡侯曽孫祖常居浮光累官至御史中丞人物漢公孫度遼東襄平人父延避吏居𤣥莬度初為𤣥莬吏後舉有道累官遼東太守東伐髙句驪西擊烏桓南越海取東萊諸縣威行海外自立為遼東侯平州牧曹操表度為永康鄉侯度曰我王遼東何永康也藏印綬武庫卒子康嗣魏封為襄平侯三國公孫恭度弟康死子晃淵皆小衆立恭為遼東太守魏文帝拜為車騎將軍封平郭侯初恭病隂消劣弱不能治國淵長乃脅奪恭位後自立為王尋爲司馬懿所滅自度至淵三世凡五十年晉李𦙍遼東襄平人祖敏漢河内太守去官還鄉里公孫度欲强起之敏乗舟浮海莫知所終𦙍父信追求積年情若居喪而不聘娶或勸之曰不孝莫大於無後乃娶妻既生𦙍遂絶房室數年而卒𦙍㓜孤及有識追念其父以孝聞智度沉邃言必有則仕封廣陸侯進尚書僕射遷太子少傅家至貧約兒病無以市藥武帝聞之賜錢十萬拜司徒南北朝李元護𦙍八世孫少有武力頗覧文史仕魏爲齊州刺史州内餘荒表請賑貸蠲其賦後卒贈青州刺史晁清遼東人祖暉魏濟州刺史頴川公清襲爵例䧏為伯為梁城戍將梁師攻圍糧盡城䧟清抗節不屈為賊所殺宣武褒羙贈道陵太守謚曰忠子榮賔襲髙謙之遼東人專意經史而於天文筭歴圗緯之書亦多該渉仕北齊行河隂令屢上䟽論事多見施行髙恭之謙之弟學渉經史所交皆名流雋士仕北齊為御史紏擿不避權豪帝姊夀陽公主犯清路恭之令卒破其車上知其清直亦不責也隋李衍遼東襄平人父弼周太師衍少專武藝慷慨有志畧仕隋以行軍總管討叛蠻平之進位柱國從秦王俊伐陳有功拜安州總管頗有惠政遼耶律托雲太祖安已堅長子東丹人皇王也居遼東好學􅀶覧外寛内恕立為皇太子太祖問侍臣事天敬神祀孰為先衆以佛對托雲曰孔子萬世之所尊太祖大恱即命立孔子廟後太祖取渤海多其謀畫太祖薨以位讓弟徳光景宗追謚為文獻欽義讓國皇帝其後子孫歴代蕃衍姚景行興中人重熙中進士性敦厚亷直累官翰林學士叅知政事道宗時為北府宰相大康初以上京多滯獄命為留守不數月獄空卒追封栁城郡王謚文憲夏行羙渤海人太平中大延琳叛時行羙總渤海軍於保州延琳使人來誘行羙執之嬰城自守以功加同政事門下平章事錫賚甚厚累遷副部署致仕大康乂渤海人開㤗間累官南府宰相出知黄龍府善於綏撫東部懷服嘗言蒲盧毛朶界多渤海人乞取之詔從其請康乂領兵至大石河駞凖城掠數百户以歸馬人望醫巫閭人曾祖廷煦遼南京留守祖淵中京副留守父詮中京文思使人望以才學稱咸雍中第進士為松山縣令知新城縣皆有善政後歴保静彰義軍節度使遷南院樞宻使人不敢于以私請老加侍中卒謚文獻大公鼎遼陽率賔人咸雍中進士累官興國軍節度副使徙長春州錢帛都提㸃後為中京留守所至皆有善政時稱循吏金張浩遼陽人其先世有功於邉歴方鎮者十人浩􅀶通經史尤長於詩以䇿謁太祖即命承應御前文字官至大師南陽郡王浩好賢樂善所著有華表山人集五子汝霖官至平章政事汝為轉運使汝翼舉進士汝方汝猷俱仕至宣徽院使劉仲尹盖州人第進士仕為潞州節度副使終都水監丞詩樂府俱藴籍有龍山集大㚖本名托卜嘉遼陽人從侵宋屢有大功封太傅漢國王及卒海陵親臨哭之贈賻甚厚贈太師晉國公張九思錦州人皇統中同知易州三遷亳州防禦使世宗時為刑部侍郎改工部所守清約後遷工部尚書鄧儼懿州冝民人大徳中進士明事機有心力世宗時擢户部侍郎即累遷中都路都轉運使明昌初為户部尚書後出知歸徳府致仕髙衎遼陽渤海人敏而好學自少有能賦聲登進士第調漷隂丞世宗時為吏部尚書每季選人至部託以檢閱舊籍乆滯留衎三為吏部知其弊嵗餘銓事脩理選人便之子守義亦舉進士李經錦州人作詩極刻苦喜出竒語李純甫見其詩曰真今世太白也由是名大震再舉不第拂衣去南遷後其鄉帥有表至士大夫識為經筆朝議就命倅是州後不知所終斡勒忠葢州人習女直契丹字大定中為監察御史歴滄滕州刺史入為同僉樞宻院事承安初以寧武軍節度致仕忠信敦慤通法律以直自守不交權貴故時譽歸之梁肅廣寧牽馬嶺人早有大志勤於文墨為彰徳節度會世宗怒宋使就驛中取國書選朝臣孰堪為詳問使不辱君命者宰臣以肅對使還穪旨拜參知政事張景仁遼西人仕為翰林學士承㫖每國書與宋徃復者多出其手世宗穪為能文後兼御史大夫廷論宰臣元忠之非人以儒者之勇許之李獻可遼東人父石遼末狀元官至太師封金原郡王獻可大定間舉進士官至山東東西路提刑使衞紹王即位贈特進道國公子道安符寶郎髙竑渤海人以䕃補官調貴徳縣尉累遷安州刺史知河南府充安撫使同知大名府所至皆有政績後為河北西路按察轉運使冀禹錫利州龍山人至寧初進士仕歴州郡有能聲歸徳受兵禹錫為行院都事經畫守禦一府倚重聞變或勸以微服免不從遇害王庭筠盖州熊岳人父遵古舉進士官至翰林直學士庭筠早有重名大定間甲科登第詞翰文采照耀一時官至翰林脩撰晚愛鄆州黄華山卜居其下號黄華山主有文集傳世子曼慶仕至行尚書省左右司郎中龎鑄盖州熊岳人少登第仕為翰林待制博學工詩文世多傳之髙德裔遼陽鶴野人才髙學愽弱冠登進士第官至西京轉運使劉光謙瀋州人舉進士天資明敏處事詳雅官至少司農馬知剛廣寧人性敏慧善屬文為時軰所推仕為鳳翔府尹有詩名髙憲遼東人衎孫天資頴悟博學強記㤗和三年乙科登第為博州防禦判官後遼陽城破死於兵髙禎遼陽人少好學雖甚暑未嘗解帶對妻孥如賔友嘗以尚書僕射判廣寧尹吏畏而民懷之入為御史大夫以剛明自任官至太子太師髙仲振遼東人愽極羣書尤深於易及皇極經世書隱居嵩山安貧樂道足不渉城市山野小人亦知敬之嘗終日燕坐所談皆世外事有扣之者輙不復語云完顔閭山盖州人明昌初進士累官沁南軍節度使入為工部尚書後知鳳翔平凉府召為吏部尚書耶律履托雲七世孫家廣寧通易太𤣥精䆒厯數仕為翰林直學士拜參知政事進右丞卒謚文憲有集傳於後子辨材善材楚材皆有名耶律辨材履之子家義州天資倜儻軀幹雄偉每以志節自負仕為中京兵馬副都指揮使宣宗問以軍政利害辨材言將相多非其材遂忤權貴出為許州兵馬鈐轄耶律思忠履之姪同知歸徳府㑹汴京信戒以都水監使充鎮撫軍民都彈􅐦金主召見思忠乞留死汴梁金主幸和議可成固遣之君臣相視泣下竟投城濠贈工部尚書金法最嚴惟思忠從事四十年未嘗有笞贖之玷髙守約遼陽人大定中進士累官觀州刺史元兵狥河朔郭邦憲以䧏從至城下呼曰當計全家室守約弗顧至再三守約厲聲曰吾不汝識也城破被執不屈而死贈官謚忠敬元髙宣遼陽人太宗時以元帥統兵從攻大名勸睿宗以不殺民心恱服又從破金兵三峯山累遷都總管及卒追封營國公謚簡僖子天錫孫諒皆積官至兵部尚書追封營國公李守賢大寧義州人金大安初與兄庭植等歸欵穆呼哩朝蒙古太祖命庭植為右副元帥守賢為臨海軍節度尋為兵馬都總管鎮河東多惠政傳子彀以功累官河東路總管孫伯温見忠義劉世英遼東人時金元争河朔民物空竭世英言於穆呼哩曰自古建國以民為本今殺掠殆盡異日我師復來孰給轉餉収存恤亡此其時也穆呼哩綬以絳州節度使弟亨安嗣其位累立戰功為時驍將石天應興中永樂人善騎射豪爽不覊穆呼哩授以興州府尹從南征臨機應變㨗出如神以功累遷兵馬都元帥屯河中金兵來攻天應力戰死之趙炳惠州灤陽人父宏為征行兵馬都元帥炳侍世祖扵潜邸恪勤不怠以為撫州長中統間累官京兆路總管兼府尹後改安西王相子仁榮官至中書平章事劉潤瑞州人穆呼哩舉為都統使軍旅之事多謀焉子秉忠避難邢臺從浮屠後出仕為太保耶律楚材履子身長八尺羙髯雄聲少好學博洽羣書尤邃天文星歴世祖聞其名召置左右凡制度典章軍旅政事皆其經畫仕終尚書令贈太師廣寜王家藏惟琴書金石遺文而已子鑄聦敏善属文尤善騎射嗣父領中書省事卒封懿寜王王克敬大寜人㓜竒頴孜孜力學元統初為江浙省叅政年五十九即請老謂人曰穴趾而峻墉必危再實之木必傷其根無功徳而忝富貴何以異此其歴官所至俱有政績可紀所著有詩文㫖奏議卒謚文肅子時官至翰林學士承耶律希亮楚材孫武宗時累官翰林學士承㫖兼脩國史希亮疾以職在史官乃類次嘉言善行以進為人性至孝雖病不廢書史或中夜起坐取燭以書所著有愫軒集三十卷卒謚忠嘉孫秀實大寜人性剛毅喜周人急里人王仲和嘗托秀實貸冨人鈔貧不能償逃去數年其親思之秀實日饋薪米存問終不樂秀實乃悉為代償取劵還其親復命奴訪仲和使歸父子歡聚聞者莫不嘆羙耶律有尚遼東丹王十世孫祖父官東平因家焉有尚資識絶人篤志於學受業許衡邃於性理累官國子祭酒遷至昭文舘大學士前後五居國學其教法一遵衡之舊海内宗之以年老致仕卒謚文正王明之盖州人累官翰林學士卒追封太原郡公王珣義州開義人武力絶人善騎射嘗行凌水中得一古刀常佩之每有警必先鳴故所向皆捷金末歸䝉古穆呼哩累官至兵馬都元帥鎮遼東為政簡易為當時所倚重子榮祖官至招討使儀形魁傑望之若神人劉廷讓大寧武平人至順初北方兵起民被殺掠廷讓挈家避山中有幼弟方乳母王氏置於懷兵㥯廷讓棄己子一手抱幼弟一手扶母疾驅得免事聞旌之崔敬大寧惠州人通刑名之學後至元中為刑部主事累遷監察御史在朝多所建明後歴兵刑二部尚書官至參知政事卒謚忠敏郭全遼陽人幼喪母哀戚如成人及壯父廷玉又卒居廬三載事繼母唐古氏甚孝唐古氏生四子皆幼全躬耕以養既長娶婦各求分異全不能止凡田廬噐物悉自取朽弊者奉唐古氏以居甘㫖無乏唐古氏卒全年六十餘哀痛毁瘠廬墓終喪詔褒表之本朝童信三萬衞人洪武末從靖内難勇敢負氣每出戰輙有竒功累官至都督王麒建州松花江人壯勇善射洪武末從平内難小河之戰躍馬衝陣矢無虛發累陞至遼東都指揮同知進都督同知賀欽遼東廣寧衞人成化初進士官給事中時聞白沙先生議論觧官去執弟子禮為白沙所重嘗寄詩以寫懐想云志略陳夀遼東寧逺衞人成化中進士官至南京刑部尚書平生建明樹立多可述而亷名為尤著居恒布衣䟽食如寒士然通紀列女王氏遼陽人李君進妻元大徳中君進病卒卜𦵏將發引親隣咸㑹王氏謂衆曰夫婦死同穴義也因撫棺大慟嘔血升許即仆於地死衆為歛之與夫連柩出𦵏送者數百人莫不灑泣趙氏大寜人名哇兒年二十夫蕭病劇謂哇兒曰我死汝年少若之何哇兒曰君幸自寛脫有不可諱妾不獨生遂命匠製巨棺夫没即自經死家人同棺歛𦵏焉其同郡又有趙􅌜兒妻安氏陳恭妻張氏武夀妻劉氏宋敬先妻謝氏並早寡以死從夫事聞悉命褒表明一統志卷二十五
