半長夜漫漫何時旦齊桓公聞之命後車載之賜之衣冠授以卿位晏嬰萊之夷維人相齊景公食不重肉妾不衣帛一狐裘三十年盡忠補過名顯諸侯漢蓋公膠西人善治黄老言曹參為齊相使人召問之對曰治道貴清淨而民自定推此類具言之参用其言齊國大治費直東萊膠東人治易長扵卦筮為單父令所著有彖象繫辭十篇文言觧說上下經王吉琅琊皋虞人舉賢良為昌邑王中尉王雖不遵道亦知敬禮及王即帝位以淫亂廢昌邑羣臣皆誅惟吉以忠直數諫正得免官至諫議大夫謝病歸吉與貢禹為友世稱王陽在位貢禹彈冠言其取舎同也王駿吉子以孝亷為郎因薦轉諫議大夫累遷京兆尹先是京兆有趙廣漢張敞王尊王章及駿皆有能名時稱前有趙張後有三王後代薛宣為御史大夫王崇駿子以父任為郎歴刺史郡守治有能名建平中為御史大夫平帝初拜大司空封扶平侯時王莾秉政崇謝病避莾就國卒自吉至崇世以清亷名鄭崇髙宻人哀帝時為尚書僕射每曵革履進見上曰我識鄭尚書履聲其見寵眷如此後以直諫忤㫖下獄死天下哀之逢萌北海都昌人家貧為亭長既而嘆曰大丈夫安能為人役哉遂去之長安時王莾殺其子宇萌謂友人曰三綱絶矣不去禍將及人即掛冠都城門擕其家属浮海客扵遼東及光武即位始還勞山累徵不起司馬筠東萊人隱居教授不應辟命信誠行乎鄉里鄉人有所計爭輙曰敢祝少賔乎不直者終無敢言少賔均字後位至侍中房鳳不其人以射䇿乙科為太史掌故舉方正為縣令都尉失官王根薦鳳明經通達擢為光禄大夫仕至青州牧明榖梁春秋世傳其學王扶掖縣人少脩節行客居不其所在人化其徳太傅鄧禹辟致之杖䇿歸鄉里後拜議郎永平中劉復著漢徳頌盛稱扶為名臣鄭𤣥北海髙宻人入關從馬融受學後歸鄉里學徒相隨者數百千人國相孔融深敬之𤣥嘗道遇黄巾賊數萬人見𤣥皆拜相約不敢入縣境袁紹帥冀州大會賔客競設異端百家互起𤣥隨方辨對咸出問表莫不嘆服晉劉毅掖人㓜有孝行厲清節大康初為司隸校尉紏正豪右京師肅然武帝嘗問朕可方漢何帝對曰桓靈帝曰吾雖不徳以桓靈方之不亦甚乎毅曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝笑曰桓靈不聞此言今朕有直臣固不同也累遷尚書左僕射侯史光掖縣人受學於同縣劉夏舉孝亷為散騎常侍兼侍中與皇甫陶茍廙持節循省風俗及還奏事稱㫖累遷少府卒詔以其家素貧儉睗錢五十萬劉暾毅子正直有父風累遷侍御史武庫火尚書郭彰率人自衛而不救火暾詰之彰曰我能截君角暾勃然曰君何敢持寵作威福天子法冠而欲截其角乎彰伏不敢言後為左丞正色立朝三臺清肅劉𦙍掖縣人美姿容善交時豪舉賢良辟司空掾並不就避亂依兾州刺史邵續續欲䧏石勒𦙍持不可令歸琅琊王即晉元帝也帝賢𦙍命為丞相参軍累遷江州刺史南北朝唐永北海平夀人祖揣北海太守父倫青州刺史永少耿介有將帥才仕魏為北地太守遷幽州刺史夷人垂淚遮留隨數日始得出境後封平壽伯子陵少習武藝遷車騎大將軍唐瑾永次子温恭有噐量􅀶渉經史仕周官至司空中大夫為六俊之最甚見器重所得禄賜常散之宗族卒諡曰方隋叚文振北海期原人祖夀魏滄州刺史父威周洮州刺史文振膽智過人明達時務初仕周以戰功拜柱國入隋封龍岡縣令從伐陳累功累遷光禄大夫伐遼東卒於軍贈右僕射謚曰襄子銓位武牙將弟文操為武賁郎將杜松贇北海人性剛烈重名義仕為石門隊正見賊被執賊使招䧏松贇至城下乃大呼曰官軍大來賊旦暮禽翦矣賊以刀築其口松贇大罵而死贈朝請大夫本郡太守髙構北海人仕為雍州司馬有能名徵拜吏部侍郎所舉杜如晦房𤣥齡等皆公輔器論者謂有知人之鍳唐張允濟青州北海人初仕隋為武陽令以愛利為行道不拾遺遷髙陽郡丞吏民畏恱貞觀初擢幽州刺史蔣欽緒萊州膠水人工文辭擢進士第為太常􅀶士中宗親郊祝欽明建言皇后應亞獻詔禮官議衆欲曲意阿徇欽緒獨陳不可諸儒壯其節累遷汴魏二州刺史蔣沇欽緒子􅀶學有名以孝亷授洛陽尉與兄演溶弟清俱為才吏有名乾元中歴四縣令美政流行郭子儀軍出其縣敕麾下曰蔣沇賢令毋撓其清也累遷大理卿持法明審號稱職五代吕夢竒萊州人仕唐累官至户部侍郎子龜圗周起居郎徙家河南龜圗弟龜祥仕宋以殿中丞知夀州因家焉龜圗子蒙正為宰相蒙休舉進士官至殿中丞龜祥子蒙亨舉進士髙等累官大理寺丞夢巽虞部貟外郎蒙周進士及第蒙亨子即宰相夷簡韓熙載濰州北海人唐進士名聞京洛以父為明宗所殺奔江南事李氏累官中書侍郎光政殿學士卒贈僕射謚文靖熙載才氣俊逸善為文性髙簡無所卑屈江左號為韓夫子云宋王景掖人五代之際累破契丹官至侍中宋加太保封平原郡王追封岐王謚文靖滕中正北海人有才幹累官諫議大夫權御史中丞振舉綱憲人咸稱之二子𤣥錫𤣥晏並舉進士孫祖徳北海人父航淮南轉運祖徳以進士為吏部侍郎致仕嘗上䟽論章獻太后當還政郭皇后不當廢世稱其鯁直子珪江東轉運使蔡齊膠水人舉進士第一儀狀俊偉舉止端肅其宗見之曰得人矣詔金吾給七騶以寵之累官参知政事屢進讜言出知潁州卒贈兵部尚書謚文忠從子延慶舉進士歴官户部侍郎劉閴北海人從出塞遇敵矢貫左耳戰不顧衆服其勇又從文彦􅀶討貝州賊戰功第一累官宣武神衛都指揮使後與夏人戰有功以左金吾大將軍致仕呉奎北海人舉五經累官至同知諫院後除参知政事出知青州司馬光言奎名望素重不當罷去廼召復職既而論王安石新法仍黜知青州卒謚文肅奎少甚貧既貴買田為義莊以賙族黨朋友卒之日家無餘貲王仲寶髙宻人初補尉職以捕盗功累遷涇原路總管安撫副使任福戰敗别將來觀被圍仲寳救之㧞觀出圍時諸將皆沒惟仲寳與觀得還後除左屯衛大將軍致仕侯䝉髙宻人舉進士歴殿中侍御史因星變䟽十事徽宗納之西師失利帝將責五路將十八人皆寘死䝉被㫖按問力為申理帝遂釋之歴陞中書侍郎與蔡京不恊出典外任卒謚文穆辛次膺萊州人政和初進士累官至参知政事孝友清介立朝謇諤如成閔湯思退之属皆有所劾仕宦五十年無纎毫掛吏議為政貴清淨先徳化所至有聲綦崇禮髙宻人徙北海祖及父皆中進士崇禮累官翰林學士從髙宗南渡詔令悉出其手凡一詔下讀者輙感動所著有文集徐承珪掖人嘗仕為賛皇令㓜失父母與兄弟三人及其族三十口同居其里中木連理𤓰異蔓同實事聞詔名其郷曰孝感里曰和順初暐膠水人第進士歴官集賢院知濰州母喪廬墓衰麻䟽食經六冬有白烏白兎馴擾墳側狀聞詔賜粟帛金范成進其先莒人後家濰州性倜儻有大志負氣任俠膂力過人貞祐之亂成進籍鄉里以自蔽義宗出汴成進將五千人從之賜以王爵元王國昌髙宻人仕為千户世祖召問軍旅之事奏對甚悉嘗奉命往髙麗境黒陽山覘海道波濤洶湧從者皆勸之還國昌神色自若直抵其處始返子通以戰功為副都指揮張緝膠州人性孝能文至正中為㤗州幕職棄之飬親居揚州兵亂遇害本朝殷哲膠州人洪武初以貢士𤼵身有才識累官中書左丞士林重之薜禄膠州人洪武末有靖難功永樂初營建北京禄董其事復從征北方宣徳初從征武定州屢立戰功進爵太保陽武侯為將勇智兼備紀律嚴明善撫士卒裹創赴鬬有進無退故所嚮成功卒追封鄞國公謚忠武黄福昌邑人風采凝重器量宏偉洪武中鄉貢入太學歴官龍江左衛經歴上書論國大計超拜工部侍郎永樂間陞尚書改北京刑部尚書交阯平福往鎮之交人戴之如父後代歸交人叛福佐師征之失利交人獲福拜且泣䕶送出境累遷少保兼南京户部尚書前後屢上䟽論事皆切時務多見施行憂國忘家老而彌篤卒之日家無百緡儀智髙宻人由教官歴知髙郵州寳慶府所至寛厚得民心陞廣東布政使簡易凝重得藩臣體召為禮部左侍郎遇事務别是非不少附會尋侍東宫講學年八十致仕卒子銘仕至兵部尚書王璡昌邑人洪武中以儒士舉任邑學訓𨗳歴陞寜波知府杜私謁清吏弊以造就人才為急或夜分至學以察諸生勤怠毁郡中淫祠以葺公宇寮属曰廟神極靈冝避其禍進曰吾欲正民心耳神禍非所懼也卒毁之性亷介儉約厨無丼雋去之日行李蕭然父老追而贐之一無所受李公諒濰縣人性沉重寡言以賢良舉擢翼城知縣時兵燹之餘民不􅂓生公諒教民拾野萊槐豆五易水煑之以濟饑民免流離驛中夜常有怪使客靡寜公諒移牒城隍神其怪遂滅終廣州知府侯庸平度州人登洪武乙丑進士第為吏科給事中有才幹嘗署吏部事尋陞吏部左侍郎以勤勉見稱張信掖縣人性至孝母病求醫弗效遂仰天𤼵誓引刀於脅下取肝和麵湯以食母母遂愈事聞旌表擢尚寶司丞陞少卿薛禄膠州人洪武末有靖難功永樂初營建北京禄董其事復從征北方宣徳初從征武定州屢立戰功進爵太保封陽武侯禄為将智勇兼偹紀律嚴明善撫士卒故所向成功卒追封鄞國公謚忠武省志儀銘智之子天性孝友由兵科給事中陞翰林編修宣廟實録成陞侍讀正統間額森犯順謀謨征伐之力居多轉南京禮部侍郎遷兵部尚書兼太子太保卒贈太師謚忠襄省志譚溥昌邑人宣徳中舉進士累官遼東苑馬寺少卿剗除馬政之弊邉用仰給陞陜西左布政使清介自特志進南京户部侍郎卒勅封諭祭省孫洪昌邑人景㤗間進士兵部主事以選調功陞郎中會中宫崩喪禮一從擬議累遷副都御史賑撫流民咸得其宜省志馮續昌邑人天順進士由兵部主事歴官丼肅廵撫都御史所至輒有政聲省志李介髙宻人第進士擢監察御史以直諫被廷笞累遷僉都御史廵撫宣府尋召入佐院清簡自持不事苛刻時稱得體進兵部侍郎值北敵犯邉奉命督軍至則宣揚威徳召募訓練脩葺偹禦前後訃上邉事二十餘條皆切實用卒贈兵部尚書省志藍章即墨人成化間舉進士按兩浙山西彈劾不避轉僉都御史忤逆瑾左遷通判撫州瑾敗復起廵撫陜西時蜀保兒冦掠漢中章選將練兵殱其首惡餘黨悉平漢中立祠祀之仕終南京刑部侍郎為時名臣省志崔衍膠州人任北平衞經歴以亷能稱陞河間府知府幹濟有力善政著聞召為刑部侍郎省志列女王氏雙女膠州人宋靖康間王氏姊妹與姑避難為兵所得兵見二女羙欲挟以行二女紿之曰放姑還當從汝兵即縱姑去二女行至途中相謂曰我閥閱家豈為賊所汙俱投海死其親属收其尸而理之曰雙女塜張氏金監察御史李英妻居濰州元兵至入其家盡以財物與之猶令其上馬曰汝品官妻當復為夫人張曰我死則為李氏鬼頓坐不起遂見殺追封隴西郡夫人英官至中丞欒氏掖縣人金縣吏相琪妻紅襖賊䧟掖琪與欒氏及子俱被執欒有姿色賊殺琪及其子而誘之欒奮起以頭觸賊罵曰我豈為犬彘所汚者哉賊怒殺之追封西河君王氏平度州人車勸妻勸為青州總管卒王誓不再適子文昇亦早卒婦陶氏守節如姑洪武三十二年旌表省志王三妻季氏髙宻人王歿季為守節正統八年有司聞其事旌之曰貞節省志李氏膠州人王山兒妻山兒早亡李為守節天順間旌表貞節省志趙錢兒膠州人劉倫妻正徳六年流賊入其家值趙搗衣奮杵擊賊會賊大至遂遇害事聞旌表省志劉氏濰縣人靈山衞指揮劉竒之子也正徳六年為賊所執欲犯之大罵觸石而死旌表省志仙釋徐問真濰州人有道術與歐陽脩善一日求去甚