body:
  text: 明一統志卷二十五明李賢等撰登州府東至海七百里南至萊州府即墨縣界四百里西至萊州府掖縣界一百五十里北至海三里自府治至京師一千六百里至南京一千九百里糧二十三萬六千石零建置沿革禹貢青州之域天文危分野古為斟尋國唐虞時為嵎夷地春秋時為牟子國戰國屬齊秦為齊郡地漢属東萊郡後魏析東萊地於黄縣東中郎故城置東牟郡北齊省東牟入長廣郡自昌陽縣移長廣郡治中郎城隋初廢郡置牟州大業初州廢唐復置牟州治牟平又置豋州牟文登貞觀間二州俱廢如意初復置豋州於牟平縣神龍間徙治蓬萊縣天寶初改州為東牟郡乾元初復為登州属河南道宋屬京東路金屬山東東路元初属益都路後属般陽路本朝初属萊州府洪武九年陞為登州府領州一縣七蓬萊縣附郭本漢東萊郡黄縣地武帝於此望海中蓬萊山因築城以為名唐貞觀間置蓬萊鎮神龍初始置蓬萊縣宋金元俱為登州治所本朝因之編户六十六里黄縣在府城西南六十里漢舊縣属東萊郡其治在今縣東二十五里北齊徙今治隋因之唐宋及元俱属登州本朝因之編户五十里福山縣在府城東一百四十里本漢腄縣地属東萊郡晉廢唐以後地属登州金時劉豫始析登州之兩水鎮置福山縣元仍舊本朝因之編户二十九里棲霞縣在府城東南一百五十里亦漢腄縣地属東萊郡唐以後地属豋州金時劉豫始析登州之楊疃鎮置棲霞縣元仍舊本朝因之編户四十六里招逺縣在府城西南一百五十里本漢東萊郡之掖縣地唐宋以來為羅峯鎮金始置招逺縣属萊州元因之本朝改今属編户四十八里萊陽縣在府城南二百五十里本漢東萊郡之昌陽縣地晉初縣廢元康中於故城西七十里復置昌陽縣属長廣郡北齊属東萊郡隋初属萊州唐以盧鄉縣省入五代唐改為萊陽縣宋金元因之本朝改今属編户一百四十一里寧海州在府城東二百二十里本漢東牟縣属東萊郡北齊移縣治於黄縣東北七十五里属長廣郡隋改郡為牟州仍以牟平為属縣唐初州縣俱廢後析文登縣復置牟平縣又於縣置登州神龍中徙州治於蓬萊縣金時劉豫於牟平縣置寜海軍金改軍為州元直隸省部本朝初以牟平省入寧海属萊州府洪武九年改今属編户八十里領縣一文豋縣在州東南一百二十里本古不夜城漢置不夜縣属東萊郡東漢以後省入牟平縣北齊始置文登縣取山為名唐武徳中於此置登州尋廢後復置登州於牟平縣文登縣属焉金属寜海州元仍舊本朝因之編户六十九里郡名東牟後魏名形勝三面距海文獻通考登州三面距海爲京東扞屏土田狹窄元志登之爲郡慿負山海利擅魚鹽僻在東陲土田狹窄瘠鹵半之山海勝境同上山海所歴皆秦皇漢武之勝境又云城名不夜亭曰朝陽此勝境也髙山阻於前巨海環於後郡志風俗人少文義隋書齊之數郡風俗與古不殊男子多務農桑崇尚學業登萊人尤朴魯故特少文義民好訟鬭宋史東萊負海之北民性愎戾而好訟鬬大抵東人皆朴魯純直甚者失之滯固朴野獷直元志民多朴野性皆獷直猶有古風凡所施為質多文少文章禮樂舊圗經蘇軾游宦之邦文章所薫染禮樂所漸摩士風之秀如親登坡老之門山川丹崖山在府城北三里東西二靣石壁巉巖上有蓬萊閣又有三洞曰半仙曰獅子曰南土秀麗竒絶為一郡偉觀田横山在府城西北三里俗傳漢韓信破齊田横與其徒五百人棲此宻神山在府城南一十里山東麓有貴溪漏天山在府城東二十里山下有洞冬夏水滳如漏故名羽山在府城東南三十里書殛鯀于羽山孔安國註云山在東齊海中即此蔡傳則以為徐州羽山龍山在府城南四十里上有龍洞山産鐵舊有塲九目山在府城東南七十里連山接黄縣界按晏謨齊記云山有九竅故名萊山在黄縣東南二十里封襌書云齊之八祠萊山為月主一云居萊隂山多仙聖所蔚陽山在黄縣東二十里蘆山在黄縣西南二十五里下有蘆山觀金縣尹陳公譔真君宫碑記云晉蘆童子九嵗居此因食茯苓昇仙唐封冲禧真君蹲犬山在黄縣西南三十里三齊記日山似犬蹲有神漢劉寵出西都經此山山犬吠之寵曰山神謂我人也祝聖山在褔山縣東南二里又名芝山南有㫒仙峯芝陽洞俗傳馬丹陽昇仙之地福山在福山縣北五里本在登州兩水鎮金時劉豫以此地有福取以名縣又有碁山及積金山側立山在福山縣西北三十五里山之主峯西嚮側立特出羣峰之外故名峆山在福山縣南三十里連棲霞縣界山勢嵳峩草木暢茂上有峆寺及聖水一泓之罘山在福山縣東北三十五里連文登縣界周圍五十里三靣瀕海史記秦始皇二十九年登之罘刻石紀功即此郊祠志齊有八祠之罘為陽主漢武登之罘山間稱萬嵗其東南海水中有壘石俗傳武帝造橋有兩石銘尚存磁山在福山縣南三十五里東南有洞深三丈許内有石佛像下有泉二泓澄澈可鑑張畫山在招逺縣北一十五里山髙林茂如張畫然羅山在招逺縣東二十五里雲屯山在招逺縣東北二十五里上有六翁澗祥光觀鳳喙山在招逺縣北三十里本名牛心元陳節齋過此以其名俚故易之齊山去招逺縣三十五里宋元時嘗置買金塲於此靈山在招逺縣西南五十里又棲霞縣東五里亦有靈峯山山神最靈嵗旱禱雨輙應翠屏山在棲霞縣治南岠嵎山在棲霞縣東二十里嘗産金亦名金山宋史慶歴六年登州地震輙海底有聲如雷岠嵎山摧即此艾山在棲霞縣西北三十里山前有温泉北曲山在棲霞縣西北三十里産鐵又有方山唐山百澗山在棲霞縣東五十里山多水泉故名舊産鐵五龍山在萊陽縣南二十里山下有五水相合流入海俗稱五龍火山在萊陽縣北三十三里山多赤石如火故名倉山在萊陽縣東五十里山舊産鐵林寺山在萊陽縣東八十里山多林木上有古寺因名元時嘗置金塲於此褔阜山在萊陽縣七十里宋元時嘗於此置買金塲七子山在萊陽縣東南九十里山有八峯大峯居中七峯傍列若其子然故名牟山在寜海州北七里山之陽地勢平廣舊牟平縣葢取此義侯至山在寜海州東北二十里舊傳漢東牟侯劉興居嘗至此故名大崑崙山在寜海州東南四十里與小崑崙連秀㧞為羣山之冠上有太白頂中有煙霞洞本名姑蘇山仙經云麻姑嘗於此脩道上昇餘跡尚存故名姑餘後世訛名崑崙元史云崑崙山邱處機與馬鈺譚處端劉處𤣥王處一郝大通孫不二同師重陽王真人於此繫馬山在寜海州東四十里世傳秦始皇遊此山攬草繋馬至今草生若繫結之狀文登山在文登縣東二里世傳秦始皇東廵召集文士登此山論功頌徳故名白鹿山在文登縣北四十里唐刺史畢元愷於此獲白鹿進之故名五壘山在文登縣南五十里南北成行入海如壘石門山在文登縣東南五十里東西二石聳立如門又寧海州東南五十里蓬萊縣四十五里俱有石門山斥山在文登縣東南六十里葢取海濵廣斥之義為名爾雅云東北之美有斥山之文皮焉鐡槎山在文登縣南一百二十里山有九頂南瞰大海下有水簾洞中有石􅼧十餘潮至蕩擊聲響如雷山之東有雲光洞世傳王陽真人脩煉於此成山在文登縣南一百二十里海濵史記秦始皇過黄腄窮成山又漢武帝幸東海作朱鴈之歌拜日於成山郊祀志齊有成山為日主召石山在成山東三齊畧奏始皇造石橋欲渡海觀日出處有神人召石於山下石行不駛神人鞭之見血今山下之石皆赤色鐵官山在文登縣西一百四十里漢置鐵官冶鑄遺跡尚存臙脂岡在府城西南隅石牛壕上舊有桃李故名煙霞洞在大崑崙山金大定間有重陽王真人自關西抵崑崙謂山前大姓于氏曰我嘗脩煉此山煙霞洞中盍徃登焉于笑曰我世居此未聞有洞乃相與求之果有洞洞口有煙霞二字大多神異乃為立祠紀石焉珠璣巖在丹崖山下石壁千丈水中有小石狀如珠璣或如彈丸嵗久為海浪所磨盪圎潔光瑩可愛俗呼彈子渦宋蘇軾嘗取數百枚養石菖蒲且作詩遺垂慈堂老人詩云蓬萊海上峯玉立色不改孤根捍滔天雲骨有破碎陽侯殺亷角隂火發光彩纍纍彈丸間𤨏細成珠琲閻浮一漚耳真妄果安在我持此石歸袖中有東海垂慈老人眼俯仰了大塊置之盆盎中日與山海對眀年菖蒲根聮絡不可觧倘有蟠桃生旦暮猶可待沙門島在府城西北六十里海中凡海舟渡遼者必迫此以避風宋時嘗流放罪人於此其相聮属則有鼉磯牽牛大竹小竹凡四島皆紫翠巉絶出沒濤中真神仙所宅上生石芝草木竒絶多不識名又多美石見蘇軾北海十二石記海市現滅常在五島之上海牛島在文登縣北海中海牛無角長丈餘紫色足似龜尾若鮎魚性㨗疾見人則飛赴水皮堪弓鞬脂可燃燈又有海驢島與海牛島相近海驢常以八九月上島産乳其皮水不能潤可以禦雨又有海狸亦上牛島産乳逢人則化為魚入於水海登州四靣皆海惟西南一隅地接萊州府城北去海五里春夏時遥見水靣有城郭市肆人馬往來若交易狀土人謂之海市蘇軾嘗禱於海神嵗晚見之有詩云東方雲海空復空羣仙出沒空明中蕩摇浮世生萬象豈有貝闕藏珠宫心之所見皆幻影敢以耳目煩神工嵗寒水冷天地閉為我起蟄鞭魚龍重棲翠阜出霜曉異事驚倒百嵗翁原疃河源發萊州府蠶山北流經招逺縣東北合東良平南二河入海大河源發棲霞縣治南東流經褔山縣界合清洋河入海五丈河源發寜海州西南六十里㟙山合澗谷諸水東北流入海金水河一名沁水源發寜海州南八十五里黄堆諸山溪澗會流東北經州治東五里許又東北流入海義井河在褔山縣西南三十里源出棲霞縣翠屏山之西流經城東清洋河入海送駕河源發文登縣東北四十里正碁山經本縣南入海黒水源發府城西南一十里黒石山東北流入于府城南水門合宻水出西水門北流入海宻水源發府城南一十里宻神山北流入城與黒水㑹入海浲水源發黄縣東南二十里北流合黄水入海之罘水在蓬萊縣南一十五里源出羽山與石門水合流入海昌水一名昌陽水源發文登縣西南四十里昌山西南流經萊陽縣東流入海貕養澤在萊陽縣東周禮職方氏幽州之澤藪曰貕養葢此地周属幽州故也泠然泉在丹崖山之隂去海數歩味甘而冽花山泉在府城南五十里隆冬不氷夏時蓮花生焉温泉有三一在府城南七十里一在棲霞縣艾山之麓皆甃石為池引以澡浴又一在寧海州㟙山之麓竒泉在褔山縣西三里泉從石孔湧出味甘美冬温夏冷聖水泉有二一在褔山縣西北三十五里側立山東北一在峆山頂水皆瑩潔嵗旱禱雨輙應寒温泉在招逺縣治東二泉並發一寒一温好事者甃石為池引二泉注焉以便澡浴又構堂于上名曰徳新又寧海州東四十里有龍泉文登縣西七里有湯泉東北六十里有温泉皆寒温二泉並發甘泉在文登縣西三十里泉出石穴色瑩味甘冬夏旱澇不加増損暖水灣在府城外潄玉池在府治後鹹泉池在蓬萊縣其泉鹹百姓取之為䀋九龍池在寜海州東南四十里池有九或如甕缶或如盆盎上有神祠嵗旱禱雨輙應五龍池在文登縣西三里上有五龍神廟九陽池在文登縣西五十里池有九曰玉華金蓮龍吟虎嘯化生嬰姹王母洞天彩雲皆馬丹陽真人所名旱澇水不増損浪井在府城内唐麟徳二年建昌陽湯在文登縣西南四十里周廽四十二歩南流入黒水土産金棲霞萊陽招逺三縣出鐵蓬萊棲霞二縣出滑石蓬萊縣出其出縣東百里桂府村者尤善硯石蓬萊縣海中鼉磯島下出名羅文金星硯又名雪浪硯方竹登州出體如削勁徤堪為杖亦不讓張騫