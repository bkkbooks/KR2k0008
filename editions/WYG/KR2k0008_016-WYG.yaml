能郡人稱頌孟常洪武間為石埭知縣撫字有方先時邑民負租累嵗無徵常到任設法足之民獲安業滿考民慕其徳赴京奏留之吕復洪武間為東流縣典史撫字勤勞仁恕及下民甚徳之後陞工部郎中姜士原洪武初貴池知縣清㢘直幹撫民有方葉恩永樂中知池州府有惠政民争訟有關大防者輙詩于詞尾民皆悔悞謝罪作興士類造就甚多畿志劉潔貴池知縣政暇巡行郊野勸課農桑至今民享其利畿志洪達知青陽縣存心仁恕及歸休舉留者塞道畿志晏毅以叅政來知池州府平易近民民多徳之後陞雲南布政畿志商賔以吏科給事中改知銅陵縣疏請聽民開墾荒田民無不業者任滿民請留進府同知仍知縣事志畿尹安知石埭縣時民因兵燹失業乃興學理財勞來安集逋民復業焉畿志陳良器池州知府外和内剛涖政明決民懐其惠作興學校能知人善與進仕至應天府尹其文章政事皆可為後學法至今池人稱之畿志云朱綱同知池州府㢘介寛厚鞭撲不施民甚慕之畿志張岐知貴池縣誠心愛人有不利于民者極力以處之仕至廣東左叅議畿志錢瓉青陽知縣豪右貧細各安其業有古循吏風畿志陳鏐知銅陵縣善于撫綏流民歸者接踵畿志周原知石埭縣律己㢘臨民恵遇災而能恤民賴以存畿志吳禎建徳知縣㢘明仁恕以徳化民民咸懐之畿志傅宗貴池縣學訓導教人以身先之轉國子助敎累遷少詹事畿志流寓羅隠本餘杭人父仕于池因家焉唐光啟初遊謁錢鏐為從事開平中朱全忠以諫議大夫召不應後羅紹威宻表薦之乃就授給事中有文集三十卷弟鄴亦能詩宋齊邱本豫章人少好學即負大志為文有天才仕南唐累官左丞相後罷為浙西節度使表乞歸隠賜號九華先生封青陽公人物唐胡楚賔秋浦人善屬文高宗召諸儒論禁中楚賔時為右史預選撰臣軌等書凡千餘篇朝廷有疑議表疏皆宻使叅處時號北門學士盧嗣立秋浦人登第後吏部侍郎高元裕以詩與知舉陳商有中丞為國拔賢才寒畯欣逢藻鑑開之句顧雲池州人少與諸賢肄業九華山文名籍甚登第後杜門著書後起修三朝實録知虞部員外郎所著有鳯䇿聨華編昭亭雜筆共五十卷杜荀鶴本牧之子牧嘗鎮秋浦妾有孕妻逐之以嫁長林鄉工杜筠而荀鶴生七嵗家人令相東作荀鶴怒曰吾豈耕夫邪比長擇居得香林之勝與顧雲諸賢為友官至翰林學士知制誥其詩律自成一家世號晚唐格費冠卿青陽人既登第聞母病革馳歸而母已𦵏遂盧墓以終䘮歎曰干禄養親耳得禄而親喪何以禄為再詔不起杜荀鶴詩凡弔先生者多傷荆棘間不知三尺墓高却九華山韋彖貴池人以能賦名嘗抵京師翰林吳融竒其文薦為京兆貞元歸隠九華山以終康駢貴池人篤於自修善論議田頵守宣州聘駢入幕嘗左右頵畫䇿禦冦後薦為户部郎遷中書舍人何澄粹青陽人性至孝母殁哭墓哀毁而卒時稱孝子周繇建徳人調河南尉秩滿歸隠九華山僕射王徽稱其孝弟可以表俗奏為建徳令嘗著明皇夢鍾馗賦弟繁亦有文聲稱建徳二周五代伍喬秋浦人性嗜學苦節自勵南唐時入廬山國學讀易探索精微尤長於詩賦舉進士第一官至考功郎湯悦貴池人父殷有才名悦幼穎悟嘗見飛星墜水盤中掬吞之自是文思日竒仕南唐為宰相凡書檄教誥皆出於悦後隨其主歸宋為光禄卿嘗奉勅撰江南録十卷宋方綱青陽人八世同㸑家屬七百口居室六百區每旦鳴鼔會食嘗出穀五千賑貸貧民景徳初詔旌其門湯允恭悦之後累官通判常州會有叛兵及境親徃其營喻之解去州人獲全遷刑部員外郎能平反寃獄累遷殿中侍御史湯巖起允恭族姪知營道縣有清名秩滿歸治小圗為樂澹如也後起通判徽州尋奉祠歸擇居竇峰有詩五十卷論語義十卷夏鴻池州人嘗與弟鵬撰十三代史畧後以辟為團練推官鵬隠居布衣疏食鄉人罕見其面有造門問學者為之講解不倦江南士多宗師之夏乾錫鵬之子樊知古嘗師事之及守池薦於朝為製冠裳乾錫不得已拜命然竟不出自稱清溪布衣夏中正池陽人歴官所至有能聲嘗知貴池縣以鄉黨非威刑所宜施每面訓之人皆悦服轉職方員外郎告歸孫靈中才識兼茂科知長洲縣以直坐廢文彦􅀶奏復其官許規貴池人嘗寓宣州客邸旁舍客有病者乃建康人規為請醫終不愈其人因以槖中金百兩付規託以後事規為之棺歛併以餘金還其家曽孫元官至天章閣待制知揚越二州胡舜元銅陵人王安石讀書大明寺嘗同硯席後知鄭縣遇行新法以書抵安石言其懐利事君貪利害民竟乞致仕檀固建徳人登第後嘗上書極言朝政缺失且言朝廷罷吕大防蘇轍范純仁而用章惇曽布蔡卞去三賢而進三凶此天下治亂之由也書奏報罷及蔡京用事遂不復用張璉貴池人篤於孝友歴數邑治劇有聲後知鳯州卒其父洵嘗為獄吏每闔户黙思為囚平反四十年如一日以璉貴累封朝奉大夫卒年八十六人以為隂徳之報高允文貴池人為清流主簿會里人張璉嘗忤蔡京卒于客邸京欲檢視之允文力為保免京召謂曰君高節尚義當加旌賞授定邊軍教授實黜之也後以汀州守罷歸家甚貧靜守無營時稱長者李植建徳人歴官至湖北轉運判官入為尚書度支郎官坐善元祐黨擯不盡用王鎡池州人為中書舍人兼侍講未仕時旁郡從肄業者常數百人所著有紫薇集春秋門例通解戚里元龜易象寳鑑余起銅陵人一門義聚千三百餘口子姪皆以科第顯世以儒業傳家葉楠貴池人調鄱陽尉力請蠲租以救荒澇後為績溪令邑人歌曰前有蘇黄門後有葉令君所著有知非集精金訓鑒童䝉記凡八十卷羅復銅陵人嘗知胙城縣值靖康亂率吏民禦敵至傷肌體終不去職朝廷以忠義褒之鍾鏜銅陵人其家十一世同居鏜幼開悟如成人後官至汀洲守宦游五十餘年卒無贏資汪與成銅陵人一家百八十口盡斃于建炎之難獨遺與成後三年改葬其父念母骸骨不存刻木削形侍養十年而後附葬哀動鄰里邑令林桷以詩美之曰事死如生有至難古來不獨數丁蘭阮鍾儁銅陵人十一世同居朝廷嘉之鍾儁天性純厚為時所稱仕終秘書郎陳翥銅陵人篤志好學杜門讀書家人婦子非時不見時號閉門先生丁黼石埭人真徳秀嘗薦於朝為提點刑獄改除祕閣知夔州路安撫疏當世急務十條奏之後知成都死節諡恭愍所著有涎溪集六經辨證疑問諸史精考元方時發綱之後十一世同居至時發克世其家以孝義旌之後起為潮徽二州教授陳清隠青陽人累舉不中汗漫江湖嘗集杜甫詩句為鳯髓集又有九華詩集楊少愚青陽人少好學博通羣書所著有孝經衍孝編秋浦集九華外史陶起祖銅陵人兵興嘗募集義兵扶植良善後官至同知為趙軍所執仗義而死本朝潘伯庸銅陵人洪武初由國子生任浙江道御史學識宏逺狀貌魁梧有風裁戅直不避上每嘉之累陞河南廣東山西按察使鄉人稱為池陽傑者祀鄉賢祠劉時敏詩大鼎初新選重臣持風秉鉞自丹宸萬方玉帛今洪武一徳賡歌起戊申檀氏曙星勞上問衡州玉樹絶才倫雲龍風虎真知遇池考看君第一人黄觀貴池人初從舅氏許姓後復黄姓洪武辛未進士㑹殿試皆第一官至禮部右侍郎嵗壬午靖難師起募兵上游次李陽河聞事定具衣冠號泣北向自沉于羅刹磯妻雍夫人暨二女家屬十餘人盡死畿志柯暹建徳人由舉人預修永樂大典擢户科給事中嘗疏時政缺失忤㫖繋獄三載屏其食不死出知交阯驩州改知永新吉水政聲歘著九載特陞雲南浙江按察使畿志胡本惠銅陵人由舉人任户部主事陞南昌知府多徳政遷河南右布政使陞都察院右副都御史有徳量時稱長者享年八十九卒賜祭葬畿志孫仁貴池人由進士任户工二部主事累官户部左侍郎平生方正清白嚢篋蕭然卒年七十賜祭葬焉畿志陳輊青陽人由進士任刑部主事陞福建按察司僉事持憲嚴明討賊遒卒襯歸唯圖書數卷耳畿志李廷章石埭人初授南京刑部主事歴官至雲南按察司副使恩威兼至畨夷信服不煩兵刃而擒土官元惡疏邊務六事多所施行尋以疾懇乞休致家居杜門自守畿志張廷瑞貴池人舉鄉貢任龍泉知縣有惠政民廟祀之擢御史清理屯田革宦官宿弊屯軍稱便累上封事有聲憲臺畿志許潜貴池人由進士授行人轉御史剛正不阿犯顔直諌嘗監内幣權宦畏避凡朝政人所不敢言者潜獨言之于利害無所計畿志李嘉祥貴池人幼讀小學書便知以古人為法年二十四進士第知開州首興學以勵俗作保甲之法興民食之利築城鑿池以防民害開人至今祀之擢南京户部員外郎卒畿志潘大承伯庸孫嘉靖中以貢授保昌知縣性直度偉守官亷慈郤常例千餘金民頌其徳政後致仕家居捐禄俸給族黨親舊鄉人義之日以詩書自娛訓迪諸子年逾八十手不停披累賔鄉飲士論稱嘉云邑志列女孝娥吳大帝時娥父為鐵官冶鑄不流娥憂父刑遂投爐中鐡乃鎔注見履出爐上乃知鄉人詫之為立仙姑廟以祀畿志阮氏銅陵人趙仲成妻同邑人姚添麟妻潘氏洪武中俱以守節旌表志畿黄夫人雍氏貴池人侍中觀之妻也與二女同死于節畿志何氏青陽人年十八適陳㫤㫤登永樂中進士差湖廣公務卒于道何守節終身事聞旌表其門畿志李氏石埭人桂智妻夫亡子幼舅姑欲嫁之乃斷髮截耳守節不渝成化九年旌表畿志黄氏建徳人相延薌妻年二十二夫亡無子守節終身𢎞治初旌表畿志蘇珣妻曹氏石埭人年十九歸珣甫八月夫亡守節事聞旌表畿志吳氏青陽人陳逕妻夫亡守節終其身正徳中旌表志畿何文宇妻江氏青陽人年二十有七無子夫病革謂江曰願適人乎願事吾父母乎江涕泣不已夫絶遂自縊畿志仙釋張先生池州人少遇異人既得道結廬齊山中常黙不語士大夫問之直視不對終日端坐廬下三十年神觀超然毛髮𤣥潤肌理如玉雪宋徽宗正和間尸解而去趙自然居銅陵縣陶村耆種杏煉丹宋太平興國中一夕夢真君授以篆法遂能篆又夢與以柏枝遂不食雍熙中召至闕下賜觀於太平州繁昌縣之鳯凰山金地藏新羅國僧唐至徳間渡海居青陽九華山嘗以岩間白土雜飯食之人以為異年九十九忽召徒衆告别但聞山鳴石隕俄分趺坐於函中洎三稔開將入塔顔貌如生舁之動骨節若憾金鎖馬懐義本永嘉陳氏子得法於雪竇住景徳禪寺有百問盛行於世叢林謂之池陽百問妙空名守訥嗣法於雪峰卯一齋住嘉祐禪院江南李氏三詔不起王繼勲詩白面山南靈慶院卯齋道者雪峰禪徽州府東至浙江杭州府昌化縣界一百二十里西至江西饒州府浮梁縣界二百七十里南至浙江衢州府開化縣界一百八十里北至寧國府太平縣界一百七十里自府治至南京七百二十里至京師四千里糧二十萬石零建置沿革禹貢揚州之域天文斗分野春秋時屬吳吳亡屬越戰國時屬楚秦為鄣郡地漢為丹陽郡地三國吳分置新都郡晉改新安郡治始新縣劉宋以郡屬東揚州梁又析置新寧郡隋廢郡置歙州治黟大業初改為新安郡遷治休寧義寧中又遷治歙唐置歙州天寶初改新安郡乾元初復為歙州屬浙西節度或𨽻宣歙觀察宋改為徽州元為徽州路屬江浙行省本朝初改為興安府後改徽州府直𨽻京師領縣六歙縣附郭秦置屬鄣郡以縣南有歙浦故名漢屬丹陽郡為都尉治晉屬新安郡梁屬新寜郡隋初縣省後復置為歙州治宋為徽州治元仍舊本朝因之編户二百六十五里休寜縣在府城北六十五里本秦歙縣地三國吳析置休陽縣屬新都郡後改曰海陽縣晉武時改為海寜縣劉宋以黎陽省入梁屬新寜郡隋改為休寜縣屬婺