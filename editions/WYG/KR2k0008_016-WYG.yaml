body:
  text: 明一統志卷十六明李賢等撰池州府東至寧國府南陵縣界一百四十里西至江西九江府彭澤縣界一百四十里南至徽州府祁門縣界一百九十里北至安慶府桐城縣界三十里自府治至南京六百里至京師四千五十里糧六萬一千九百石零建置沿革禹貢揚州之域天文斗分野春秋時吳地後屬越越滅屬楚秦屬鄣郡漢改鄣郡為丹陽郡三國吳為石城侯邑晉屬宣城及豫章郡梁屬南陵郡陳屬北江州隋初屬宣州後改州為宣城郡唐初始置池州治秋浦以地有貴池故名貞觀初州廢永泰初復置南唐陞康化軍宋復為池州治貴池縣元為池州路屬江浙省本朝改為池州府直𨽻京師領縣六貴池縣附郭本漢丹陽郡石城縣地晉屬宣城郡隋置秋浦縣屬宣州唐為池州治五代時楊吳改貴池縣宋元仍舊本朝因之編户三十九里青陽縣在府城東八十里本漢丹陽郡涇縣地三國吳置臨城縣晉屬宣城郡隋省唐析置青陽縣屬池州以其地在青山之陽故名宋元仍舊本朝因之編户一十七里銅陵縣在府城東北一百二十里本梁南陵縣地隋屬宣州唐置義安縣尋廢為銅宫治南唐因置銅陵縣屬昇州宋改屬池州元仍舊本朝因之編户一十五里石埭縣在府城東南一百六十里本漢陵陽石城涇三縣地屬丹陽郡三國吳置石埭場梁因置石埭縣以有兩石横亘溪上如埭故名隋省入南陵唐復置宋元仍舊本朝因之編户一十一里建徳縣在府城西南一百八十里本漢鄱陽石城二縣地唐置至徳縣屬饒州因年號為名後改屬池州五代時楊吳改曰建徳縣宋元仍舊本朝因之編户九里東流縣在府城西一百八十里本漢豫章郡彭澤縣地晉以後因之唐置東流場南唐因置東流縣以大江自湓城而下迤邐東注故名宋割貴池之晉陽鄉入焉元仍舊本朝因之編户七里郡名池陽古名秋浦隋名形勝依貴池之美據石城之固唐裴度㕔壁記九峯競秀神采竒異唐劉禹錫九華山歌序浸以秋浦鎮以齊山南唐徐鉉天慶觀記浸之以秋浦鎮之以齊山北望陵陽竇真人飛昇之地南膽孫子費徵君棲隠之鄉山川清曠秋浦志江山千里襟帶六朝宋曽會池州門樓記清溪南來九華東引宋盛約中和堂記清溪南來九華東引洪流環繞沃野彌望風俗民淳氣和盛約中和堂記民淳氣和衆貨畢給雖人物稠夥而有訟不嚚雖租賦浩而聞令必集以漁獵為業郡志祀社􅂿歌同上春秋祀社神畢則羣飲執手踏歌謂之歌社山川齊山在府城南三里山有十餘峯其高齊等故名又有妙空武功寄𨼆竇雲玉桂有待等巖九頂圓頂華盖蓮子左史石虎等洞極為竒勝或云山因唐刺史齊映得名唐杜牧九日登山詩江涵秋影鴈初飛與客攜壺上翠微塵世難逢開口笑菊花須挿滿頭歸宋吳中復詩當時齊映為州日從此山因姓得名却自牧之賦詩後每逢秋至菊含情鎮山黄龍山俱在府城北五里瀕大江江祖山在府城西南二十五里有一石突然出水際其高數丈上有仙人蹟名曰江祖石黄老山在府城東南三十里唐康駢嘗隠于此郎山在府城西六十里舊名和龍山其下有潭山半有石刻玉鏡潭三字魁山在府城南七十里舊傳山有寳光夜見則是鄉必有登第者故名秀山在府城西七十里峯巒秀麗屹然干雲舊傳梁昭明太子薨其神附于秀山之民曰吾昔愛此今帝錫我矣民因立祠于山阿祈禱有應大樓山在府城南七十里舊有悟真寺七井山在府城南八十里上有七峯湧泉七穴其泉險峻四時多寒盧子庫山在府城南九十里一名伏龍巖山有龍池相傳神龍宅焉凡旱禱而龍或微露其形輙應鯉魚載山在府城西南一百五十里其山峯巒峭拔有飛瀑掛石壁凡三級下各有潭上有巨石附飛流中如鯉魚狀靈山在府城西南二百里山顛有田百畝水泉四時不竭九華山在青陽縣南舊名九子山唐李白陋其名無所據以山九峯如蓮華乃更名九華白詩妙有分二氣靈山開九華又云天河掛緑水秀出九芙蓉杜牧詩凌空痩骨寒如削照水清光翠且重却憶謫仙才格俊解吟秀出九芙蓉青山在青陽縣北五里縣以此山得名幘山在青陽縣南與九華山相接六峯嵬峩儼如冠幘五松山在銅陵縣南五里唐李白詩我來五松下置酒窮躋攀鵲頭山在銅陵縣北一十里其山高聳宛若鵲頭今廬江西岸有鵲尾渚與此為匹楓林山在銅陵縣東一十里山多楓林銅官山在銅陵縣南一十里又名利國山有泉源冬夏不竭可以浸鐡烹銅舊嘗於此置銅官場李白詩我愛銅官樂十年未擬還石耳山在銅陵縣南二十里雙峯對峙秀拔亦名真人峯有石高丈餘上有巨人跡龍泉山在銅陵縣東三十里山顛舊有西峯庵祈禱多驗山下出泉冬夏不竭杏山在銅陵縣東三十里昔傳葛仙翁嘗留此種杏有溪襟帶其下落英飛堰上名花堰宋郭祥正詩傳聞花落流堰水每到三月溪泉香金山在銅陵縣西南三十里山有金牛洞世傳嘗有金牛出遊鄉民欲設穽陷之因名其地曰大欄小欄天門山在銅陵縣西南四十里以其山高聳挿天故名葉山在銅陵縣東五十里上有蓮花峯葉真人廟在焉祈禱多應城山在銅陵縣東五十里四圍石壁峭拔惟西南一逕可通如城門然山顛平坦可數十畝名曰寨塘中有一井遇隂晦則雲氣湧出鄉民嘗避兵于此貴山在銅陵縣東六十五里山南有百丈峯北有馬鞍峯上有獅子峯中有西峯皆極高峻有大聖堂馬仁山在銅陵縣東南七十里舊名馬人以山類人馬狀唐徳宗時嘗有石馬妖鳴遂斷其首因更人為仁上有仙人韜玉等峯又有望江石唐陳商王冲霄嘗隠于此鳯凰山在銅陵縣東七十里世傳嘗有鳯集其上石窟有泉寒冽名鳯飲泉金城山在石埭縣治西開福寺在焉山列于寺傍宛若城郭陵陽山在石埭縣治北山自西北迤邐而來三峯連亙東接宣州其西二峯乃仙人竇子明所居之地盖山在石埭縣南三十里逺望之如盖櫟山在石埭縣西一百六十里其山四壁峭拔上有池水澄澈如鑑杉山在石埭縣西一百六十里白象山在建徳縣治後以形似名博陽山在建徳縣東北一十里巖石嵳峩溪流湍急舊於絶頂設祠祈禱有應五龍山在建徳縣東二十五里五峯森立山半有石井清澈名化龍池深不可測嘗有五巨蟹遊于水面歴山在東流縣東三十里西枕歴池故名上有二池其一嘗乾雖乆雨不停其一常溢雖乆旱不涸升雲峯在青陽縣西上有潭雖旱不竭將雨則四山雲氣先從此起中峯在青陽縣西衆峯環列而此峯居中上睇日月下覸雲雨淸泉迸石翠霧凝空玉峯在建徳縣治南絶頂有石光瑩如玉一名峯子山宋嚴畢得漢武登嵩所刻夀字石本刻于上名夀崖水車嶺在齊山李元方嘗云秋浦千重嶺而水車嶺最竒郭祥正和李白詩萬丈水車嶺還如九叠屏北風來不斷六月亦生冰呈鳯嶺在青陽縣西舊傳丹鳯生焉有獲之者欲獻于朝而羣烏競來撲人乃捨之儀鳯嶺在銅陵縣東南一十五里峯巒喬聳形勢如鳯普門嶺在建徳縣西南一十五里宋朱文公嘗書普門嶺三字刻于石半巖在齊山李元方云齊山大小泉凡十一而半巖為勝夫子巖在建徳縣東七里昔有隠者讀書于此巖前有水若簾亦名水簾巖古仙洞在府城南六十里中有石棊局石鑼鼔各一穿山洞在府城西七十五里相傳宋建隆中有犬登木化為龍風雲勃興穿山而行故名蛻龍洞在建徳縣治山後深廣各三丈古木森秀怪石嵳峩嘗有獲龍骨於此者石礲磯在銅陵縣北五里瀕大江有三石門水涸可出入容數十人亦名五霞洞鹿跡石在東流縣東六十里有巨石平如掌俗傳葛洪於此煉丹丹成跨白鹿飛昇石上有鹿跡金雞石在建徳縣草堂寺北相傳唐羅隠過此題詩有金雞不向五更啼之句石遂迸裂有雞飛鳴而去大江在府城北境上自東流縣鴈㲼入界北流又折而東歴李陽河梅根口下至銅陵縣大通河口凡二百餘里府境諸水皆入焉僊人湖在建徳縣南舊名瀝湖世傳宋建炎間冇七仙人泛舟湖中衣冠談論逹旦不已後人遂以名湖大青湖在東流縣北四十里廣十餘頃澄澈如鑑池口河亦名杜塢河即貴池也源出櫟山流為管公明溪歴龍髦河會于秀山倉埠潭過白面渡匯為秋浦又北流入于大江銅陵河在銅陵縣西北七里其源一出南長山一出縣北官莊一出東高村山會于横塘閘入市後湖達于大江大通河在銅陵縣南四十里其源一出九華山一出天門山一出梅衝山會于車橋湖至大通鎮入大江荻港河在銅陵縣北八十里源發朱村耆即坑邵家澗㑹石洞南洪鳯風鍾鳴貴上中下各耆之水合流至北下社入于大江五溪水在青陽縣西二十里源出九華山五溪龍溪池溪漂溪雙溪瀾溪合流北入大江天門水在銅陵縣南四十里出天門山石竅中委蛇曲折襟帶數里灌溉民田流入永城埭至荻港達于大江舒溪水自太平縣界流入石埭縣舒泉鄉與盖山清泉水合流至縣南三十里潭洞不一青溪源出洘溪山與石人嶺水合北流匯為玉鏡潭又東流經府門外復折而北至清溪口入大江唐李白詩夜到清溪宿主人碧巖裏簷楹掛星斗枕席響風水堯城溪在建徳縣治南發源自太原鄉等處春夏水溢可通舟楫北流達于大江秋浦在府城西南八十里長八十餘里濶三十里四時景物宛如瀟湘洞庭唐李白詩愁作秋浦曲強看秋浦花山川如剡縣風日似長沙杜牧詩秋浦倚吳江去檝飛青鶻溪山好畫圖洞壑深閨闥丁家洲口在銅陵縣東北二十里發源儀鳯嶺達于東流㑹于栖鸞湖過鳯心閘合胡城順安水一自洲上口一自洲下口達于大江鍊丹井在九華山卧雲庵北相傳葛仙嘗錬丹于此包公井在府治内西偏相傳宋太守包拯所浚清泉在青陽縣西一十里舊以鮑公趙公名宋林之竒改名清泉真徳秀為記銘雙泉在青陽縣東南七里龍安山西二泉相去咫尺宋曹機嘗鑿方池建亭其上潮泉在青陽縣東南一十里龍池山巖石聳立下有二竇泉自中出日凡三至故名隠真泉在青陽縣東六十里招隠山崇真觀後泉從石罅流出味甚清冽靈竇泉在銅陵縣葉山相傳嘗有龍自穴出溉田百頃水旱自若上下華池在青陽縣雙峯下曰上華池雙溪上曰下華池泉甘土沃産異茗宋陳巖詩聽鍾喫飯東西寺就水烹茶上下池嘉魚池在青陽縣南三十里百丈潭側黄鶴池在石埭縣陵陽山中峯下相傳竇子明於此跨鶴昇仙蒼凖潭在府城西七十里舞鸞鄉行旅徃來濟渡於此土産茶青陽縣出薑銅陵縣出紙貴池縣出銅鉛鐵錫俱銅陵縣出學校池州府學在府城東南隅宋開寳間建于城之西北至和間始移建于此本朝洪武元年重建景泰三年重修貴池縣學在縣治西南舊在縣治東洪武三年建𢎞治間遷于黄狀元故宅即今地青陽縣學在縣治東洪武七年建正統四年修成化間重建銅陵縣學在縣治西宋淳熙間自縣治東移建於北本朝洪武間重建正徳間復遷于舊址石埭縣學在縣治南洪武初建正統八年重修建徳縣學在縣治西宋嘉定間自縣治東移建於此本朝洪武三年重建十六年重修東流縣學在縣治東洪武元年建成化間重建書院齊山書院在府城西六十里元建設山長職教授李白書院有四一在貴池縣華竹嶺一在青陽縣九華山化成寺西斷碑存焉一在銅陵縣五松山一在石埭縣杉山陽明書院在化成寺西為新建伯王守仁建鄒守益記甘泉書院在成化寺東為禮部尚書湛若水建吕柟記宫室蕭相樓在府城東南隅唐大歴間刺史蕭復建復有惠政民追思之因以名樓宋蘇轍詩樓成始覺江山秀人去方知徳業尊九華樓在府城九華門上或云即九峯樓也唐建齊山横陳九華遥聳霜降水涸溪流如帶縈迴曲折勝槩溢日宋陳舜俞詩