兵斷其歸路華乃納欵歸唐雄誕以功遷歙州總管蘇瓌歙州刺史時來俊臣貶州叅軍人懼復用多致書請瓌瓌叱其使曰吾忝州牧高下自有體能過待小人乎俊臣朱至追還恨之由是連外徙不得入劉贊歙州刺史部内野媪將為虎噬幼女呼號搏虎俱免韓滉奏贊治狀加金紫路旻元和中為祁門令鑿武陵嶺為盤道及置斗門於閶門灘民便之崔淙為歙州刺史在官一簡約束明信誓去害羣之姦寜詭險之俗范傳正歙州刺史轉湖州白居易掌制詞云黟歙之遺愛尚存吳興之新政方播馮宿元和中韓愈上疏諫佛骨宰相疑宿為愈草疏出為歙州刺史崔衍宣歙池觀察使治簡靜為百姓所懐幕府奏聘皆有名士崔元亮元和中歙州刺史郡人馬牛生駒犢官籍蹄角吏得為姦元亮悉焚其籍一不問陳甘節咸通中為祁門令閻門灘斗門廢甘節以俸募民宂石積木為横梁因山派渠餘波入于乾溪舟行乃安州司馬張途為記其事吕季重歙州刺史以俸募士鑿車輪灘遂成安流至今人號吕公灘五代馮令頵南唐歙州鹽鐵院判官禆將樊思藴作亂燒營而火及令頵第叛卒皆釋兵救火其得人心如此宋李度知歙州十年不調有中黄門得度歙州所著詩石本傳入禁中太宗見之召為虞部員外郎曹修古以監察御史論罷嶺南買翡翠事出知歙州人皆稱其直節李紘知歙縣地産黄金民輸以代賦後金竭責其賦如故紘奏罷之鮮于侁景徳中為黟令攝治婺源姦民汪氏横里中因事抵法羣吏羅拜曰汪族敗前令不少今不舍後當貽患侁怒立杖之惡類屏跡李維真宗時以兄沆為相請知歙州至郡興學舍嵗時行鄉射之禮胡順之知休寜縣民有汪姓者豪横縣不能制嵗租賦常不入適以訟逮捕不肯出順之曰令不行何以為政卒致之法蘇轍知績溪縣與民相從于社民樂之向綜知歙縣性寛裕善治劇籍閭里惡少年有盗發用以推迹輙得吕大防英宗時為監察御史以濮議不合出知休寜縣有治跡黄誥紹聖中知歙州始至謁先聖升堂講周禮諭父老遣子弟入學聽講更創校舍明年登第者十人崔鷃政和中知績溪縣嘗因日食求言上書辨司馬光力詆時相鞠嗣復宣和初知休寜縣方臘黨破縣欲逼使降嗣復罵曰爾當去逆效順何為脅我使降嗣復知必死不少懾賊曰我縣人也明府宰邑有善政我不忍殺委之而去毛㮚徽州司士叅軍嘗攝州事適陸冦䧟城㮚坐府治賊脅使降終不屈罵賊而死妻孥皆被害曽孝藴宣和中知歙州方臘起青溪孝藴約勅郡内無得奔擾分兵守阨塞人恃以安周葵宣和末為徽州推官高宗移蹕臨安諸軍交馳境上葵與判官攝郡事應變敏速千里帖然洪适紹興中知徽州尋提舉江東路常平茶鹽首言役法不均之弊李稙紹興末知徽州徽俗崇尚淫祠稙首以息邪説正人心為事民俗為變范成大徽州司户叅軍太守洪适博洽精明每以訟牒付成大成大由此究心吏事徐誼乾道中知徽州歙縣有告妻殺夫繫獄以五嵗女為證誼疑緩之未覆會死者父母力言我子欠租乆繋飢而大呌役者批之墮水死矣然後寃者得釋合郡以為神舒璘乾道中為徽州教授徽詩禮乆不預貢璘作詩禮講解家傳人習自是其學寢盛丞相留正稱為當今教官第一袁甫知徽州治先教化崇學校訪便民事上之請預蓄常平義倉備荒興修陂塘剏築百梁陳居仁孝宗時知徽州植二表于庭有輸納中度而遭抑退者抱所輸立表下親視之人無留滯吏不能措手秩滿邦人挽留由間道始得去王應麟知徽州其父撝嘗守是郡父老皆曰此清白太守子也摧豪右省租賦民大悦魏克愚寳祐中知徽州克愚以了翁之子為政為先務闢貢闈作橋梁政恬事熙民安其化元許楫至元末徽州路總管有惠政及民秩滿去績溪歙縣民因嵗飢阻險為寇行省捕之未克賊曰但得許總管來我輩即降行省為驛召楫至楫单騎趨賊壘賊果降唐子華休寜縣令前令貪鄙廢事税賦不均詭名虛户雜其間子華一覈正之及重新縣學虞集黄溍皆有文紀其實張蒙祁門縣尹在官抑奸詐扶良善民為立生祠張毅績溪縣尹嘗置義倉以備嵗飢有蝗蔽空入境毅禱于神一夕盡去干文傅婺源知州以禮訓告革其婚喪之俗朱文公故業為豪民所占諭其民以理不煩窮治而悉歸之復即其故宅建祠治行為諸州最張景周歙縣丞不剛不柔善於裁決美政流行民懐思之劉耕孫徽州路推官詳讞疑獄政績卓然本朝鍾友諒國初為祁門知縣敏諒疏通剸煩治劇值壬辰蘄兵蹂躪縣境鞠為草莽友諒薙蓬藋開市井招逋逃闢蕪田理寃抑民服其化吏畏其明治聲大振胡善洪武初徽州知府撫綏貧民廣闢萊田修學校課農桑民甚徳之張起宗洪武初休寜知縣清儉自持勤政愛民凡諸修作不勞民而事自集嘗疏不便事朝廷嘉之賜衣三襲黄虎洪武初黟縣知縣值元末兵燹之餘招集流散開闢田土政事一新陳彦囘洪武中知徽州府聞靖難之師舉兵入援事平被繋争以大義而死畿志何敏中洪武間祁門知縣有政聲嘗疏不便事朝廷嘉賞以酒遂陞本府知府益加清慎事簡民安黄憲永樂初徽州府通判㢘能公正佐理有方嘗公差於外郡民千餘保留囘任民賴以安張齊永樂間歙縣知縣市井廬舍舉皆煨燼齊設法修葺民賴安生又建紫陽書院禮師儒訓民間子弟邑人感之杜貫道休寜知縣政事文章邑人稱頌其後知縣周徳成劉紹先繼之皆有善政孫遇以楊溥薦任徽州知府興學勸農均徭恤獄植善鋤强丁内艱民奏留之有詔起復尋以外艱去服闋復除守徽在郡二十年善政不可勝紀及去民立祠生祀之没後士民奏行有司春秋致祭畿志王稚正統中為休寜縣丞崇儒愛民甚有政聲畿志鄭同由進士知祁門清慎寛簡興學愛民無赫赫聲既去而民益思之畿志黄岳景泰間為績溪縣學訓導去記誦之習務明義理士皆知所自勵畿志皇甫遵道以儒士擢知歙縣嚴于律己始終不可干以私其政不立異不要民誠意之孚乆而愈深畿志龍晉天順間徽州知府公謹㢘恕撫字有方開良堨灌田三千餘畝利澤流于民畿志陳寓成化間知休寜縣剛明㢘勤不可干以私民戴之盖如父母畿志人物南北朝程靈洗休寜人侯景之亂保歙黟以拒景梁元帝授以本郡太守華皎之反使招靈洗靈洗斬其使後累功封縣公卒贈鎮西將軍開府儀同三司諡忠壯子文季善騎射多幹畧以功累遷新安太守每戰常為前鋒齊軍憚之目為程虎以功累官至都督唐吳少微新安人登進士第長安中為晉陽尉與武功富嘉謨友善先是天下文章以徐庾為宗氣調益弱獨少㣲嘉謨屬詞本經學雄邁高麗時人慕之文體一變稱為吳富體汪華績溪人少以勇俠聞隋末兵亂以土豪應郡募保據郡境并有宣杭睦婺饒五州建號吳王唐武徳間籍土地兵民納欵高祖授以總管歙宣杭睦饒婺六州軍事歙州刺史封越國公郡人十姓九汪皆華之後黄芮歙縣人建中初繼母洪氏病刲股饋羹而愈貞元中父卒號泣不絶聲廬墓終身不舍墓側産芝及連理木刺史上其事詔旌其門五代汪台符歙州人能文章通古今楊吳時徐知誥鎮金陵台符上書陳民間利病十餘條知誥善之宋齊邱疾其才高使親信誘台符痛飲推沉石城蚵蚾磯下查文徽歙州休寜人仕南唐為中書舍人以平閩功累遷建州節度使官至工部尚書子元方仕為建州判官宋平江南盧絳據歙遣使傳檄至建元方斬其使及絳被擒太祖聞元方所為優奬之拜殿中侍御史知泉州宋魏羽􅄔源人少能屬文初仕江南署洪文館校書郎出為雄逺軍判官歸宋擢太子中舍累遷户部度支使太宗嘗稱其有心計真宗時擢禮部侍郎卒贈太尉張諤歙縣人能文有吏材初仕江南為祕書丞通判鄂州歸宋授右賛善大夫累官荆湖江浙等道制置茶鹽使卒贈太子太傅子秉舉進士累官禮部侍郎樞密直學士吕文仲歙州新安人父裕南唐歙州録事叅軍文仲在江左舉進士入宋累官翰林侍讀學士終刑部侍郎集賢學士嘗使高麗清潔無所求每高麗使至輙詢其出入以君子稱之有文集十卷馮伉新安人伯父延己父延魯俱以文學事南唐延魯官至工部侍郎留守揚州為周世宗所執放還為户部尚書伉歸宋與兄儀价並第進士伉文辭清麗嘗著平晉頌時人稱之累遷殿中侍御史歴典藩郡皆有治迹謝泌歙縣人舉進士歴知數州累官右諫議大夫初在史館諌修正殿不當用采繪及知福州代還民立去思碑泌知人能薦士每發薦牘必設几置章望闕再拜曰老臣又為陛下得一人後皆至卿相王旦亦其所薦也俞獻可歙縣人以文學知名登進士第歴官御史吏部郎中有能稱累官龍圖閣待制後為鹽鐵副使開封府判官子希孟官至殿中侍御史聶冠卿歙州新安人五世祖師道楊吳時鴻臚卿冠卿舉宋進士累官翰林學士後判昭文館兼侍讀學士每進講春秋必引尊王黜霸之義以諷冠卿嗜學好古尤工詩有蘄春集十卷弟世卿太常博士通判宣州俞獻卿獻可弟舉進士補安豐尉歴補州縣累遷三司鹽鐵判官上言時事謂自天禧以來日侈一日夫巵不盈者漏在下木不茂者蠧在内陛下宜與公卿大夫圖議而捄正之真宗嘉其言為除無名之費最後知應天府以刑部侍郎致仕查道文徽孫未冠以詞業稱性慈孝母病思鱖􅅅市無鬻者道泣禱于河鑿氷得之母疾遂愈端拱初舉進士為館陶尉通判遂州公正清潔真宗時中賢良方正科官至龍圖閣待制道性純厚有犯不校所至務寛恕有集二十卷查陶道從兄初仕南唐以明法登科補常州録事叅軍入宋歴侍御史判大理寺咸平中遷祕書少監後代楊億知審刑院子拱之淳化中進士後為都官郎中慶之太子中舍汪叔詹歙縣人少敏於文累官太常博士尋知鄂州轉湖南憲使有惠愛後領湖廣江西等路財賦數年總餉稱職魏瓘羽子為開府叅軍持法精審累遷太常少卿知廣州築城疏江後儂智高為冦獨廣州城堅論功遷工部侍郎集賢學士後以吏部侍郎致仕弟琰授祕書省正字為吏強敏歴知諸州皆有政績後以司農卿知江寜府召判刑部致仕終衛尉卿王舜舉祁門人舉進士通判信州時清溪洞方臘反舜舉伏兵大破之授朝請大夫直秘閣賜賚甚厚尋除江東提刑卒贈太中大夫程邁黟人仕為顯謨閣直學士嘗因使過其鄉民有訟田者二十年不決邁閲其牘問訟者年幾何曰六十六邁曰爾齋劵乃慶歴三年時方七嵗安得妻財置産訟者歎服程惟象婺源人以占算㳺天下言人貴賤禍福皆預定自號三靈山人英宗在潛邸惟象嘗語人曰後當為太平真主及即位賜以御書黄葆光黟人少刻意於學賜進士累官侍御史奏蔡京開僣擬之路安置昭州京致仕召為職方員外郎改知處州歿之夕家未有繪象索之民間得百餘本洪中孚休寜人為成都縣簿鵰門蠻叛蜀帥以屬中孚中孚親呼酋長諭以禍福令自歸服人謂其膽大於身後以龍圖閣待制致仕詹惠明婺源人熙寜间父坐事當死惠明詣郡求代罪曰無以報罔極恩有二弟足以養母願以身代父死遂坐府門以火艾灼頂明日趨庭斷右耳血出淋漓郡守駭之以狀聞詔減父罪賜惠明錢帛王汝舟婺源人以風節自持所不合不降詞色熙寜中知舒城嵗荐飢推行荒政多所全活後知南劒州治行為諸郡第一羅汝楫歙縣人登進士第累官刑部員外郎高宗時為御史遷起居郎兼侍講上問或曰春秋有貶而無褒是否對曰春秋上法天道春生秋殺若貶而不褒是天道不具矣後遷吏部尚書終龍圖閣直學士汪藻婺源人崇寧初進士累官顯謨閣學士嘗知徽州人以為榮紹興中為翰林學士晚年詩文益竒自號龍溪所著有龍溪集凌唐佐休寜人元符進士知夏津縣徃決河北疑獄得其情時夏津亢旱及唐佐歸雨隨至人號為縣令雨建炎初知應天府南京陷劉豫因使為守唐佐密疏其虛實告於朝事泄被捕唐佐見豫責以大義為豫害事聞贈徽猷閣待制胡舜陟績溪人大觀中進士歴州縣官為監察御史建炎中以集賢殿修撰知廬州時淮西諸郡多盗惟廬晏然民為立生祠事之後遷夀廬等州鎮撫使朱弁徽州婺源人弱冠入太學建炎初議遣使問安兩宫弁奮身自獻詔借吉州團練使至雲中見尼瑪哈説甚切尼瑪哈不聽弁復與書言用兵講和利害甚悉而守節不屈後和議成弁得歸轉奉議郎所著有聘遊集書解金安節休寜人日記千言博洽經史宣和中進士調新建主簿紹興初累官至吏部侍郎權尚書兼侍讀嘗拒秦檜排淵覿堅如金石孤立無黨死生禍福曽不一動其心所著有文集三十卷奏議表疏周易解汪若海歙人未冠入太學靖康初以金人侵擾詔求知兵者若海應詔又上書樞密曹輔請立康王為大元帥擁兵鎮撫河北及二帝北行走謁康王於濟州請即位以圖中興累官江南經制使後以直祕閣知江州盧臣中黟人為右正言後高宗南渡金騎迫近御舟臣中叱退之失脚墜水明日復召左右始奏其事亟使沒人拯之拱立如生帝憫其忠贈右諫議大夫趙善璙歙縣人宋宗室少苦學登第為徳清縣簿嘗謂士大夫涖官臨民不明九章則無以斷疑後除大理評事累官尚書郎有自警編行世朱安國休寜人歴遷廣東經畧安撫使能捕劇盗威鎮一方後進直徽猷閣學士知寜國府祝確歙人朱熹外租淳厚孝謹親喪廬墓一兄一弟先後死熙河不憚萬里徒步以歸其喪所舍輙悲號上食如禮夜寢柩旁不忍暫去親舊有盡室病卧者確每旦攜粥藥徧飲食之日以為常凡遇貧乏輙傾財予之無吝色人多高其行云汪文振休寜人為浙西提舉時蝗旱民饑縣督逋監錮文振録囚夜至華亭得四百餘人悉釋去令待秋償民籍以活焉程大昌休寜人十嵗能屬文紹興中進士歴知數州以龍圖閣直學士致仕大昌篤學於古今事靡不考究所著有禹貢論易原雍録易老通言攷古編演繁露北邊備對又為山川地理圖就經筵進呈朱松婺源人舉進士為尤溪尉知饒州松有俊才為文汪洋放肆不見涯涘後取六經子史讀之以求天下興亡理亂之變又聞河洛之學得聖賢不傳之義乃日誦大學中庸用力於致知誠意之地自謂褊急害道因取佩韋之義名韋齋曹矩休寜人少以純孝聞累遷左屯田郎中焚黄之夕芝生墓上詔以所居為忠孝鄉孝芝里羅願汝楫子兄顥籲頡頌弟頮皆有文願博學好古法秦漢為詞章高雅精鍊朱熹特稱重之有小集十卷爾雅翼二十卷累官知鄂州有善政朱熹松子天資粹美讀書務躬行實踐紹興中舉進士主泉州同安簿累遷煥章閣待制侍讀領鴻慶宫祠熹初從劉子羽居崇安後從延平李侗學復徧交當世有識之士遂得聖道之宗平昔著述有諸經傳解四書集註及編通鑑綱目小學楚辭等書後世學者宗師之自絶學以來集諸儒之大成發先聖之祕蘊熹一人而已卒諡曰文追封徽國公從祀孔子廟庭汪勃黟人以端明殿學士致仕歸鄉里嵗每新陳未接之際必損價出穀旁郡皆賴之子作礪太常寺簿孫義和侍御史義端給事中程叔達黟人嗜學至老不倦第進士典湖學後以論時弊擢為御史賑濟二浙甚有勞績除右正言遷左司諫累官華文閣直學士卒諡莊節所著有玉堂等集邱濬黟人歴官殿中丞因讀易悟損益二卦能通數知未來興廢嘗語家人曰吾夀終九九後果八十一卒汪必達黟人官至太常主簿知峽州嘗知旌徳縣有父子訟於庭必達曰父子至恩忍以私家語言聞官乎令吏授父以杖笞其子已而感悟父子如初吕午歙縣人嘉定中進士累官監察御史糾正官邪不顧忌觸秉國者欲疎之遷浙東提刑復入為御史兼崇政殿説書遷起居即以論諌切直名卒贈華文閣學士王炎歙縣人為潭州教授以薦知湖州災初著易解未竟而病篤夜分祝天曰願須臾無死以成此書果如其言汪綱勃曽孫以祖任入官淳熙中調鎮江司户歴知平陽金壇弋陽蘭溪太平六縣及高郵軍所至有政績理宗時累官户部侍郎致仕綱學有本原多聞博記兵農醫卜隂陽律歴諸書靡不研究機神明鋭遇事立決尤長於論事所著有恕齋集程崇歙縣人登淳祐第歴大理寺丞出守台州抑絶權豪甚有政聲府治後山有猿精嘗出為妖怪崇至潜伏不見後官至將作監程元岳歙縣人寳祐登第除宗學博士歴遷殿中侍御史工部侍郎以清介自持嘗彈撃奸相宦寺無所畏屈程元鳯歙縣人紹定中禮部第一歴監察御史右正言兼侍讀後拜右丞相兼樞密使御書清忠儒碩昭光六字褒之進封吉國公卒贈少師所著有訥齋集程卓休寜人淳熙中試禮部第一遷刑部郎中嘗使金議論不屈金人憚之後知泉州民為立祠尋召同知樞密院事程珌休寜人紹熙中進士授昌化主簿累官權吏部尚書拜翰林院學士立朝剛正風裁凜然進封新安郡侯以端明殿學士致仕卒珌居家常平糶以濟人凡有利於衆者必盡心焉所著有洺水集吕沆午子以恩補將仕郎端平中授黄岩主簿知於潛縣通判婺州皆有善政彗星見沆請罷公田還民大忤賈似道意與雲臺觀起知興國軍及全州皆不赴徳祐初召赴行在沆不復出卒年八十一胡方平徽州婺源人學精於易初饒州徳興沈貴寳受易於董夢程夢程受朱文公之易於黄榦而方平嘗從貴寳夢程學得文公源委之正嘗註易學啓蒙通釋胡一桂方平子幼穎悟好讀書受父易學景定中年十八領鄉薦試禮部不第退而講學逺近師之號雙湖先生所著有周易本義附録纂疏本義啟䝉翼傳諸子詩傳附録纂疏十七史纂元胡炳文婺源人元初為信州書院山長再調蘭溪州學正炳文篤志朱子之學諸子百氏醫卜等書靡不推究所著有四書通易本義通釋春秋集解禮書纂述又有大學指掌圖四書辯疑五經會義爾雅韻語雲峰筆記世稱雲峰先生卒諡文通程文徽州人平生介然自持不茍務造請居窮守約以鑚研六藝紬繹百家為文明潔而精深與陳旅相伯仲年踰六十始擢國史編修官調國子助教尋拜南臺監察御史遷禮部員外郎間奉使江南客死錢塘自號黟南生有遺藳三十八卷程復心婺源人自幼沈潜理學會輔氏黄氏之説而折衷之章為之圔圖為之説書成名曰四書章圖總要仕元為徽州路教授後以母老辭歸陳櫟休寜人性剛正孝友三嵗祖母吳氏口授孝經論語輙成誦五嵗涉獵經史十五鄉人皆師之遂致力聖賢之學涵濡玩索貫穿古今著四書發明書傳纂疏禮記集義等書延祐初試鄉闈中選乃不復赴禮部教授於家不出門户者數十年櫟所居堂曰定宇其徒因稱定宇先生倪士毅休寜人潜心求道嘗學於陳櫟朱敬輿所著有四書輯釋汪澤民藻七世孫少警悟力學長通諸經歴數郡通判所至人服其明後以禮部尚書致仕退居宣州值長槍軍來冦或勸其去澤民曰我故受國厚恩臨危愛死豈臣子之節耶叅畫戰守之䇿及城陷賊誘之降大罵不屈被害汪克寛祁門人少穎敏力學元舉于鄉不第遂隠居教授鄰郡學者皆宗師之號環谷先生所著有春秋纂疏綱目考異吳訥休寜人父禮元靜江府經歴常從収五溪蠻洞訥學兵法習騎射授建徳路判官兼義兵萬户守徽州隨元帥阿魯輝退屯浙西扎溪戰敗不屈引刀自刎嘗於龍爪石題一聫云怪石有痕龍已去落花無主鳥空啼鄭玉歙縣人博究六經尤邃春秋教授于鄉至正間徵不起日以著述為事本朝兵至守將欲致之玉曰吾既不得慷慨殺身以勵風俗猶當從容就死以全節義明日具衣冠自縊而死本朝趙汸休寜人嘗授業於九江黄楚望究心於春秋作春秋屬辭以著聖人筆削之㫖又作春秋集𫝊以明聖人經世之志著左氏補註十卷師説三卷以為學者用力之階本朝洪武初與修元史詹同新安人穎悟好學元奎章閣學士虞集見之曰才子也以其弟槃之子妻之舉茂才異等為郴州路儒學正遇亂家黄州歸附本朝授國子博士累遷學士承㫖兼吏部尚書致仕朱升休寜人師同郡陳櫟博洽羣書隠居石門本朝王師下徽州被召數承顧問授翰林學士洪武二年以老疾致仕終于家所著有易詩書周官儀禮禮記四書孝經小學旁註及書𫝊補正輯註程通績溪人洪武乙丑舉鄉貢官至遼府長史靖難初上封事數千言後械繫至京而死畿志王俊得黟縣人永樂中進士拜監察御史剛正有守陞河南按察司副使賛理邊務進河南左布政使卒于官胡永成歙縣人少負才氣擢工部主事陞四川按察使副使有清操尋陞廣西右叅政致仕卒汪景明黟縣人永樂中進士選為庶吉士歴監察御史巡歴有能聲陞湖廣布政司叅議卒于官莊觀歙縣人英敏篤學歴官國子學正薦陞陜西按察司僉事提督學校有方進陞本司副使致仕卒楊寜父孟潜錢塘人為徽州府教授因家焉寜宣徳進士歴官刑部主事郎中聽訟明決正統初征麓川命理軍務以功陞本部右侍郎後巡撫江西未幾召為禮部尚書以疾轉南京刑部致仕卒程思温婺源人正統間進士授中書舍人進禮部員外郎以清慎著聞己巳之變死于難景泰癸酉追贈更録用其子畿志汪囘顯祁門人正統間進士授户部主事己巳也先犯邊督芻餉于畿甸奏行勸借賑恤之令人得甦息景泰初監運懐來永寜軍餉備嘗險阻明年買牛具于河南轉送大同給濟軍民耕種于時餓莩塞路奏發廩賑恤全活甚衆又教民掘蕨為粉以療飢民立祠祀之又嘗使西蜀覈實鹽井奏除冗課十餘萬後歴知廣惠二府政尚寛厚不任刑罰以老致仕歸志畿程信休寜人正統間壬戌以河間衛籍登進士建議設兩京提學御史累官兵部尚書掌兩京兵政征伐俱有成績謨謀獻納實兼文武云卒贈太子太保諡襄毅志畧汪溥績溪人舉鄉貢授蘇州知州興學教士課農足民有龍池河壅塞為患忽自東注粟有一本數穗蝗自滅禾大熟人謂過魯㳟之異政秩滿民赴闕留詔陞從四品再任以慰民望擢廣西慶逺知府歴按察副使所在有政績卒于官夷民莫不流涕畿志程敏政襄毅公信之子也幼以神童薦弱冠進士及第授翰林編修歴侍講學士與修英宗憲宗實録時詔議孔廟從祀諸賢敏政上疏請大正祀典言雖未行而學識見之矣以浮言致仕後復召還遷太常卿掌院事卒年五十五贈禮部尚書賜葬祭畿志汪舜民婺源人成化間進士授行人拜御史以忤權貴謫官後至都御史平生以文學名畿志胡富績溪人成化戊戌進士累官至户部尚書老成慎密卒諡康惠畿志莊英歙縣人舉鄉貢授夏邑教諭擢廣昌知縣適聞冦入境挺身捍禦遂遇害事聞贈建昌通判録其子為大學士畿志汪奎婺源人舉進士由知縣擢御史正徳間同臺諫疏言宦官弄權廷撲幾死謫通判後官至御史以疾卒志南畿洪逺歙縣人累官至工部尚書直諒有為卒諡恭靖畿志汪循休寜人舉進士兩為縣令民皆有去思擢判順天時逆瑾擅權循一月三抗疏于朝請裁革中官及上内修外攘十䇿言剴切為瑾所忌罷職瑾誅再召弗起畿志戴銑婺源人舉進士授給事中正徳初逆瑾擅權詵同六科言閹官害事乃傳㫖命廷杖落職竟以疾卒畿志唐澤歙縣人舉進士任平鄉知縣築河堤八十里擢福建副使有勦賊功官至副都御史巡撫甘肅處哈密土魯畨各得効順以病乞歸卒于涼州畿志唐臯歙人正徳甲戍進士及第第一授翰林院修撰修武宗實録成進侍講學士卒于官畿志列女章氏二女歙縣人章頂之女也母程氏與二女登山採桑母為虎所攫二女號呼搏虎虎遂棄去母得免唐刺史劉賛嘉之蠲其户役改所居合陽鄉為孝女鄉程氏女歙人年十七值兵亂父母謂曰儻為兵所執柰何曰脱有不可當死拒之已而遇賊脅之以刃女罵不絶口遂被害潘氏婺源人汪琰妻年二十八而琰卒潘誓不他適以其夫從兄子元圭為後元圭時甫三嵗鞠之若己出潘氏卒年六十二元圭之子良垕有子燕山燕山卒妻李氏年二十四無子乃守志自誓燕山兄子惟徳娶俞氏惟徳早死二子甚幼俞守節不墮家業故人賢汪氏之門而稱曰三節余氏績溪人許徳仁妻夫亡撫孤里人高姓者求婚不聽而怒中以他事余訴不得免乃詣闕陳情事下法司抵高罪時稱其賢畿志王氏績溪人馮永保妻夫遘疾刲股和粥以進且祈以身代夫卒誓死不二有欲奪其志者或托媒以探其意王大笑曰禽獸之行吾豈為乎卒年八十餘畿志胡氏績溪章徳俊妻夫亡守節事聞旌表畿志方氏婺源胡亨華妻嫁未幾而夫卒及𦵏嘱工為虛壙于右去容飾孝事其姑一日告夫墓曰吾事畢矣歸自縊而死畿志俞氏婺源人鮑叔用妻夫亡守節不渝事聞旌表畿志孫希賢妻程氏休寜人年二十一而寡勵志撫孤卒年六十二希賢姪英徳亦早卒其妻汪氏年二十八無子誓死不二時號雙節畿志程氏休寜汪道夫妻生二子夫卒未幾而二子繼卒獨奉舅姑其父與弟逼使再醮遂自經而死畿志汪氏休寜人金希佑妻夫亡守節受旌畿志程烈女婺源人已嫁歸寜里有强暴欲私其母女大罵强暴怒毆殺之復以危言懼其母令勿洩時郡㕔前夜有聞悲號如怨訴者太守孫遇疑之未幾御史行郡詢其畧令遇鞠治強暴伏罪乃為文以祭之畿志陳氏程克良妻祁門人夫亡守節後事聞旌表畿志張氏婺源人胡某妻也少貞潔知書年十六而嫁未幾夫亡或欲娶之乃嚙指書衣自刎而死畿志汪氏黟縣韓文炳妻夫亡守節事聞旌表畿志張友妻洪氏歙人夫死預治塋誓必同穴姑憐其早寡無子欲嫁之不聽乃隂納富人聘至期迫之洪曰嫁不辭當與夫别乃造夫墓慟哭而歸拜姑告别入室閉門自縊而死畿志許氏歙縣江務本妻夫亡守節不二事聞旌表畿志吳氏歙人在室而姑歿即服喪行婦禮尋夫歿二十五守節不渝撫幼孤殯𦵏四世以下諸喪後以夀卒志畿洪氏劉昌妻歙人年二十而寡妾春香色美昌父欲嫁之春香不從自縊死洪憐之絶穀十日亦死畿志汪氏女婺源人許聘邑人葉天彛未歸而天彛卒女聞訃即易服徃夫家誓死不二嘉靖十二年奏聞旌表畿志仙釋許宣平歙縣人唐景陽中隠於城陽山南塢絶粒不食顔如四十許人行及奔馬時負薪買於市嘗獨吟曰負薪朝出賣沽酒日西歸借問家何處穿雲入翠微李白入山尋之不見乃題其庵以歸是冬庵為火所焚遂不見復百餘年至咸通七年有採樵者見之南山石上聶師道歙縣人少學道得服松脂法乃登績溪百丈山採芝後詣南嶽招仙觀聞蔡真人舊隠去洞靈源不逺乃辟穀七日獨徃遇老父問所從來因折草與之師道咀之味甘自是精健毎入山虎豹見之皆馴伏號問政先生一日謂其徒曰我為仙官所召語訖而逝及歛棺有聲視之若蟬蜕然後有自豫章來者見之於道鄭全福浮梁人梁開成中遊獵深入窮谷暮有老人導游新安靈岩諸洞及出有鹿引上山半坡遂結茅修鍊焉後年百餘嵗語門人曰必𦵏我浮梁白水鄉及卒弟子舁至夕陽嶺上覺棺空發之唯履杖而已何令通南唐時為國師言牛頭山不利謫休寜來芙蓉峰更名慕真一坐四十年豁然大悟宋天禧中一旦正席趺坐忽心火自灼頃刻而化其徒収舍利為塔𦵏之雪山唐歙縣人少時遇盛夏輙暮伏草莽中以身施蚊蚋者二十年始住休寜普滿寺自號覺庵及坐滅荼毗頂骨不壊得舍利數十粒所著有池陽百問永素祁門人宋紹興中居柏山院日誦華嚴經後住嚴州烏龍山嵗乆仍囘柏山一日沐浴升堂説法作偈言訖而逝荼毗舍利滿盤明一統志卷十六
