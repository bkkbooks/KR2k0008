其後又治宣城唐初南豫州治當塗上黨郡城在蕪湖縣西南五里晉孝武時上黨百姓南渡即蕪湖地僑立上黨郡及襄垣縣以處之赭圻城在繁昌縣西南十里晉哀帝召桓温入朝至赭圻有詔止温温遂築城居此梁南陵縣嘗治赭圻隋唐為鎮戍上俗至今猶稱故縣城襄城郡晉元帝時流民從帝渡江即春穀地僑立襄城郡及繁昌縣以處之淮南郡晉成帝時百姓南渡乃於于湖僑立淮南郡于湖廢縣晉太康中分丹陽縣之南境置春糓廢縣在蕪湖晉元帝因流民之寓春􅂖者僑立繁昌縣孝武改春􅂖曰陽􅂖安帝時併陽􅂖入蕪湖謝公宅在青山齊宣城太守謝眺築室山南人呼為謝公宅唐李白討宅近青山同謝眺李翰林宅在青山翰林謂李白也裴敬碑云余過當塗訪李翰林舊宅即此昭明太子書堂在府城東南五十里淨居院昭明梁太子蕭統嘗讀書於此郭祥正書堂在府城東二十里石城山宋郭功父讀書之所浮丘仙壇在繁昌縣東五十里仙人浮丘翁隠居赤烏鐵䃍在府城東浮橋岸下有古鐡䃍如碇石狀大數尺許上有赤烏字乃呉年號也水落則見名宦三國周瑜吴孫策時領春􅂖長有治績陸遜仕吳鎮姑孰意思深長才堪任重雖身在外而心於國晉謝尚以衛將軍鎮牛渚庾亮平蘇峻之亂後求外鎮自効假節豫州刺史領宣城内史鎮蕪湖率軍㑹陶􅋲討破郭黙不受爵賞胡母輔之繁昌令輔之少擅髙名性嗜酒及至縣遂節酒自勵甚有能聲桓冲自京口遷鎮姑孰謙虛愛士尤有武幹南北朝蕭鏗齊南豫州刺史鎮姑孰時人發桓温女冢得金巾箱織金篾為匳器又有金蠶銀繭等物甚多鏗自往修復纎毫無犯輿論賢之唐李陽冰當塗令善古書法李白以其族人往依之宋宋準開寶中知平南軍㑹改軍為州就命知州事涖官有治聲尤以文章著名馬亮知蕪湖縣在任有政績宋敏求知太平州歐陽修司馬光諸公皆有送行詩曽鞏嘉祐初為太平州司法㕘軍以能文名聞四方夏希道慶厯間知繁昌縣初縣甚陋而民貧自希道至有善政民戸日臻田利之入倍他壤昔之疵者日以減去而索寞者日以冨繁黄庭堅知太平州以徳化民不事箠楚豪猾者訊之如法不少貸吕希哲知太平州有政聲民仰之若神明徐勣大觀中知太平州召入覲極論茶鹽為民病且言生財有道理財有義用財有法徽宗曰不見卿乆矣今日乃聞嘉言郭偉知太平州建炎初金兵攻采石及蕪湖偉率將士敗之其後水賊邵青薄城下偉募死士夜焚其攻具又決姑溪水灌其營賊勢窮蹙乃遁劉光世江東宣撫使守太平州先是光世為制置使水賊邵青有戰船三千餘艘抵州光世率兵圍之賊遂降周葵紹興間知太平州時水壊圩隄葵悉繕完傍郡圩皆没惟當塗嵗熟市河乆湮葵令城中家出一夫官給之食併力浚導公私便之趙汝勣慶元初當塗令時嵗饑穀貴乃開倉散米萬斛一邑獲全事聞詔他郡依汝勣賑恤法虞允文紹興末金主亮以大軍臨采石而别以兵爭𤓰州允文奉詔往蕪湖趣李顯忠交王權軍且犒師時敵騎充斥允文命諸將列大陣不動分戈船為五督時俊與戰亮兵大敗不得渡孝宗嘉嘆命知太平州洪邁淳熈中知大平州政尚寛簡民皆向化郊産異麻狀若靈芝人以為祥吴芾知太平州造舟以梁姑溪厯陽築者乆役潰歸聲言欲趨郡境芾呼至城下厚犒遣之而密捕倡亂者繫獄以聞詔褒諭之李椿知太平州力圖上流之備請選將練習緩急列艦上可以援東闗濡須下可以應采石趙汝愚知太平州有政績張運知太平州當兵饑疾癘之餘殫勞徠安輯之方嚴斥堠攻守之備理財賦造戰艦繕甲兵申禁令民賴以安呉柔勝知太平州有惠政二子淵潛又相繼來守是邦人以為榮牟子才知太平州首教民孝弟以前慈竹義木二詩刻而頒之間詣郡學講四端推明性情體用之㫖前政負上供綱及總所綱七十萬緡悉為補之呉淵知太平州兼江東轉運使時兩淮民流徙入境者四十餘萬淵極加慰撫而賙濟之使其什伍令土著人無相犯旁郡流民焚劫無虛日獨太平境内肅然吴潛知太平州在郡上言和戰成敗大計又貽書執政論京西既失當招收京淮丁壯為精兵以保江南馬光祖寳慶中知太平州兼提領茶鹽寛養民力興廢起壊知無不為江萬里知太平州有治聲陳塏知太平州兼江東轉運副使奏蠲諸郡灾傷發公帑代三縣輪折絲帛錢五十萬治聲赫然王居安知太平州當邉遽甫定嵗儉汰去軍羣盜寇攘居安威惠流行晏然若無事時元暢師文太平路總管時大旱師文捐俸致禱不數日澍雨大降遂為豐年公田米積之盈屋曰我家幾人能盡食此乎呼貧士及細民恣其取去在任未乆境内晏然歐陽𤣥蕪湖縣尹縣多疑獄乆不決𤣥察其情皆為平反徵賦及時民樂趨事教化大行飛蝗獨不入境本朝許瑗為太平知府陳友諒来攻勢急瑗與院判花雲王鼎堅壁拒戰兵少無援城陷俱被執不屈死之追封瑗高陽郡侯雲東丘郡侯鼎招毅大將軍范常洪武初為太平知府時陳友諒来寇軍民困甚常撫恤安全賜宅一區為家黄朝弼洪武初蕪湖知縣為人清慎公務雖繁退必讀書去任惟將原帶書一籠易鈔為路費邑人至今惜之楊偁洪武初蕪湖知縣詢民疾苦撫摩凋瘵民有遇以義責之不施鞭杖境内大治李習洪武初大平知府亷能公勤識達治體均平徭役民受其惠吏不敢欺吳聰洪武初蕪湖縣丞性至孝畫海雲南望圖懸於壁以思親民有不敬父母者必痛治之復泣曰吾以不得侍親為憂汝幸得生膝下何為不孝民皆感化徐敬永樂中太平知府不寛不猛均徭役崇教化鋤豪强恤寡弱民有訟諭之以理自服凡遇水旱禱之輒應劉有年知太平府以儒飭吏抑豪横去淫祠令行禁止秩滿去任民甚懐之畿志周鳯成化中知太平府悃幅儉素不以家室隨自奉如寒士推誠愛民秩滿解任老稚遮道挽泣畿志徐節𢎞治初太平知府端本崇化有政聲賜誥旌寵畿志唐詔成化間同知太平府端方清謹吏民敬服卒於官啓其笈笥惟書數卷而已畿志徐禮成化中知繁昌縣持身端潔豪右畏懾弊蠧悉除拜陞御史畿志包犧民成化末知繁昌縣有豈弟風民甚愛之以憂去畿志汪本正徳間以進士知蕪湖縣蒞政明決人不敢犯時流寇猖獗三過江上不敢延佇於渚民實頼之畿志流寓謝朓南齊陽夏人好學有美名属文清麗長於五言詩善草𨽻好奬人材嘗守宣城愛當塗青山之勝遂築室其南以觴詠自適李白蜀人唐𤣥宗時天才英特詩思飄適𤣥宗擢為翰林供奉以高力士譛不得用居匡廬坐永王璘事長流夜郎㑹赦還依族人當塗令李陽冰卒葬青山東麓元和末觀察使范傅正訪白後惟二孫女為民妻傅正欲改適士族女曰孤窮失身命也不願更嫁石待問眉州人宋舉進士及制科進諫史百卷真宗大悦後諫營昭應宫坐謫滁州仁宗即位召見知階州引年致仕卜居蕪湖縣卒因𦵏焉李之義滄州人登第幾三十年乃從蘇軾於定州幕府厯樞密院編修官徽宗初提舉河東常平坐為范純仁遺表作行狀編管太平自號姑溪居士所著有姑溪集張瑁宋以御史知雜知宣州因家繁昌千口同居内外肅然楊傑書義居二字遺之孫崇熈寧三年進士官至太常丞陸同厯陽人建炎間父有常知臨淄抗敵死節同以知望江縣轉廬江條上中原形勢遷兩京轉運判官卜居蕪湖而歸老焉子世良官至廣東提刑楊宏中福州人宋國子生寧宗時趙汝愚竄永州祭酒李祥等連疏救爭俱被斥宏中曰師儒能辨大臣之寃而諸生不能留師儒之去於誼安乎與杜仲麟等五人上書韓􅇑胄大怒將竄之嶺南以右丞相余端禮救送太平州編管趙時賞宋宗室居太平州知旌徳縣元兵至捍戰有功從二王入閩擢知邵武軍尋罷文天祥開府南劔以為江西招討副使空坑之敗被執不屈死之張鐩本東平人為太平路總管治中秩滿因家當塗事母至孝母卒廬墓三年有紅蓮變白之異郡立孝蓮坊事聞大徳二年旌表畿志李永本吉水人因祖教授蕪湖遂居焉以嵗貢授諸暨縣學訓導講授不倦警輕濟乏諸士尊信之卒於官士皆冒雪負木以殮祀之學宫二子贊貢同舉進士贊官至浙江布政使貢至兵部侍郎皆忤逆瑾致仕並有時譽畿志人物漢陶謙丹陽人以諸生四遷為司馬西討邉章尋刺徐州擊黄巾大破之境内晏然時董卓雖誅而闗中未平四方斷絶謙每遣使間行奉貢西京遷徐州牧加安東將軍封溧陽侯晉陶基謙從子初仕吳為交州刺史子璜亦刺交州晉平吳復其本職封毘陵侯改為冠軍將軍在交州三十年威恩著於殊俗及卒舉州號哭如喪慈親陶回祖基父抗皆仕吳回仕晉王導引為從事中郎嘗收義兵與陶侃等併力攻蘇峻又破韓晃以功封康樂伯性雅正不畏强禦丹陽尹桓景佞事王導㑹熒惑守斗南經旬回語導曰公以明徳作相當親忠貞逺邪佞而與桓景造膝熒惑何由退舍導深愧之薛兼丹陽人祖綜孫吳選曹尚書父瑩領少傅撰吳書後仕晉為散騎常侍兼清素有器宇與紀曕閔鴻顧榮賀循齊名號為五儁初入洛張華見而竒之曰皆南金也累官太子少傅加散騎常侍卒贈光禄大夫張闓丹陽人薛兼薦之於元帝言其才幹貞固當今良器以佐翼功賜爵丹陽縣侯蘇峻之亂闓與王導俱入宫侍衛密謀討峻峻平以尚書加散騎常侍樂道融丹陽人少有大志好學務周人急有國士之風嘗為王敦㕘軍敦以討劉隗為名遣道融召甘卓道融忿敦之逆因説卓襲敦卓大然之既而卓納敦和將旋軍道融晝夜泣諫憂憤而死何琦陽穀人好古博學事母至孝患供養不給為涇縣令母亡哀毁幾絶服闋嘆曰所以仕者實利徼禄以供親耳遂養志衡門累召不起桓温過其山曰此中有人嘗著三國論王諒丹陽人交州刺史時梁碩專威交土諒謀誅之不克碩遂圍諒於龍編敗之逼諒奪其節諒固執不與遂斷諒右臂諒正色曰死且不畏斷臂何有十餘日憤恚而死南北朝周興嗣世居姑孰善属文嘗投宿逆旅有人謂曰子才學邁世當被知英主言訖不知所之梁天監初奏休平賦累遷散騎侍郎法書中有王羲之草書千字患其不倫命典嗣以韻属之一夕成文鬚髮為白遷給事中佐撰國史有文集百餘卷唐陶大舉當塗人武后時為宣州刺史徐敬業反大舉與戰敗之轉懐州刺史吏民思之為立徳政碑張惟儉當塗人和州刺史與栁鎮友栁宗元曰先君之所與友凡天下之士舉集馬信讓而大顯道博而無雜今世言交者以為端其見重如此陳商徳宗時與王冲霄同隠馬仁山江表從學者衆後應詔射策仕至卿王居巖當塗人為驍衛長史遭亂棄官歸居青山楊行密據淮南以兵迫起之居巖散遣其家人而以一身歸行密授湖州别駕一日行密大㑹失居巖亟使人掩其家無一人在者後有人於嵩山見空石室詢其旁或云有道人王居巖居此室而莫知所終宋王逢居巖四世孫教授蘇州學者常數百人晚始登第累官至國子直講駙馬李瑋嘗從學後為逢求遷官逢不受乆之以太常博士通判徐州逢與胡瑗最善喜著書有易傳十卷乾徳指説一卷復書七卷存羅彦輔當塗人嘉祐進士厯江都湖口令皆以亷稱後知池州属嵗旱以荒政從事奏課第一嘗誡子曰我以清白遺爾曹萬一至饘粥不給亦不可少屈人以姑溪水況其清徳及卒人過溪上者嘆曰羅公何在溪水如故相與躊躇不忍去郭祥正當塗人母夢李白而生少有詩名梅堯臣一見嘆曰真太白後身也舉進士知武岡縣以殿中丞致仕後復出通判汀州知端州又棄去隠於青山所居有醉吟庵蘇軾為作像贊有詩文三十卷號青山集韋許蕪湖人從李之儀學不事科舉築室榜曰獨樂陳了翁為作堂記元祐間諸公遭貶逐雖素所親宻亦畏禍不敢相聞許遇有過江上者必欵接且周其急朱文公每稱之自號湖隂居士唐敏求當塗人宣和中進士調徳化主簿盜起敏求挺身率衆捍賊度力不能支諭以禍福賊憤詆觸譟而前遂遇害事聞贈官補其子楠將仕郎陶居仁蕪湖人以行羲聞州里仕為鎮江録事㕘軍元兵攻鎮江統制官舉城降居仁被執抑使降居仁曰得以死報朝廷夫何憾竟不屈為所殺大軍至聞其死時語歎嘖之為棺使人䕶以還其家泝流數百里不時頃至人皆異之鄉人為立祠吕武太平州步卒也文天祥出使武應募從行及偕脫鎮江之難走海道賴武力為多天祥開府南劔武以武功補官遣結州縣起兵相應道阻復﨑嶇數千里即天祥於汀梅挺身患難化賊為兵其忠梗出天性云後出江西死於横逆元胡光逺太平路人母喪廬墓一夕夢母欲食魚晨起號天將求魚以祭忽見生魚五尾列墓前俱有囓痕鄰里驚異方共聚觀有獺出草中浮水去衆知是獺所獻以狀聞表其閭本朝王愷當塗人幼讀書有大志天兵取太平以愷居幕府既克衢州命兼總制衢州軍民戍守有方謀慮深逺及胡大海為行省㕘政愷為郎中吳將吕珍侵諸暨堰水灌城大海奪堰水灌珍珍勢盛誓解兵愷曰彼狡謀勿聴大海不忍食言竟引還珍果敗盟大海及愷俱被害追封愷當塗縣男陶安當塗人幼敏悟有大志元至正間授明道書院山長洪武初以迎車駕授左司員外郎陞翰林學士又陞江西行中書省㕘政臨終條陳二十事上之朝廷遣使祭於家子晟官至浙江按察使潘庭堅當塗人洪武初以奉迎車駕授太平教授累官至翰林學士杜智蕪湖人洪武間擢隨州知州有治聲遷河南左布政使官至右都御史李衡當塗人永樂初登進士第選為翰林庶吉士厯遷户部員外郎湖廣布政司㕘政官至兵部右侍郎吳庸蕪湖人讀書知大義襲父職為燕山護衛百户永樂初以智勇從征靖難累功至後軍都督僉事後敏當塗人永樂初登進士第擢為行人出使有勞績遷工部員外郎官至陜西布政司㕘議謝孚當塗人為監察御史論功陞福建按察副使改陜西嘗不屈中貴䝉附石以剛直見憚子騫為御史終㕘政亦有聲騫子理登進士稱步武云畿志鍾城當塗人少穎敏苦志積學登景泰進士厯官大理寺正著明允聲門舍蕭然一寒士也擢福建僉事江西副使兩督學政士經品題者多為令器晩歸鄉里門下執經問難者踵接卒年八十餘畿志楊璧當塗人為給事中以章疏太峻上忤㫖外補有風雹之變復官陕西㕘議黜為平涼守鑿延安河晚歸不入公府貴顯過訪並以疾辭焉畿志端宏當塗人為御史巡按雲南河南廣西咸有風裁後長浙藩以亷稱謝事歸足跡不至公府畿志吳琛繁昌人拜監察御史以劾奏權要外補忽天變雨雹還臺遷大理寺丞疑獄多所平反轉遷都御史巡撫甘肅檢括隠占屯糧斬獲虜首一千三百餘級後進總督兩廣軍務經畧益著年五十一而卒有奏議若干卷畿志夏􅍈為兵科給事中有鯁直風厯㕘政終福建右布政使有平易之政致仕卒畿志汪宗器與兄宗禮先後舉進士拜御史時稱二龍宗禮早卒宗器窮經博籍臺中多所論列官至大理少卿卒於家畿志邢珣當塗人𢎞治癸丑進士授南京戸部主事出知贑州府論討宸濠功擢江西㕘政以布政致仕卒於家畿志胡爟蕪湖人九嵗能詩翰家世農從諸弟躬耕盛暑中亦攜書隨暇則坐茂樹開卷朗誦暮歸仍檢閲不厭舉進士改庶吉士授户部主事所司錢穀出入惟謹嘗抗疏論列戚畹閹宦方士夷狄等事詞甚剴切僚友皆危之未幾宦者果以贓敗畿志濮詔當塗人未冠即以文名領解順天登進士授翰林院編修奔父喪歸以病卒母鄒氏通經善詩亦多内訓焉畿志列女聶氏南唐當塗人年十三隨母採薪母為虎攫去女從後持刀跳虎背抱虎項刺殺之收母屍歸𦵏詹氏女蕪湖人少失母事父孝宋紹興初淮冦破縣女年十七嘆曰今父子無俱全理我計決矣賊至欲殺其父兄女趨而前曰妾願事將軍以贖父兄命不然併命無益也賊從之釋其縛女麾使父兄亟去遂隨賊行數里過市東橋躍水而死賊相顧駭嘆而去周氏繁昌縣丞之女徐俊妻俊卒無子周為守節成化初以事聞旌表之畿志王氏當塗人錢均用妻夫亡守節有司上其事詔旌表之畿志張玘女名仙貞繁昌人正徳七年流賊剽掠仙貞年十七以護母病不欲走羣盜刧之去至江滸抱樹哭義不受辱賊不能奪乃衆磔之畿志仙釋丁令威本遼東人學道於靈墟山後化鶴歸遼集華表柱云有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙塜纍纍趙自然繁昌人家以鬻茗為業年十三疾甚父抱詣清華觀許為道士後夢一人姓隂引之登山啗以柏枝幣及覺遂不食神氣清爽宋太宗兩召至闕賜衣服銅遣往清華觀以母老求歸侍養梁杯渡師嘗乗木杯渡水故名蔣之竒為傳云杯渡自建康往南州依陳氏繼聞違康復有一杯渡陳氏父子五人往觀果有之乃留二人守三人還南州驗之杯渡乃在其家寧國府東至廣徳州建平縣界六十里西至池州府青陽縣界一百六十里南至徽州府績溪縣界二百二十里北至太平府當塗縣界一百五十里自府治至南京四百二十里至京師四千一十五里糧十萬三千三百石零建置沿革禹貢揚州之域天文斗分野春秋屬吳戰國屬越後屬楚秦為鄣郡地漢置丹陽郡治宛陵東漢永和間析置宣城郡桓帝時省宣城復為丹陽郡三國屬吳晉復置宣城郡治宛陵宋析置淮南郡尋又置南豫州治宣城陳改南豫州為宣州隋初郡廢州存大業初復改為宣城郡唐置宣州天寳初改宣城郡乾元初復為宣州昭宗時陞寧國軍節度宋仍為宣州屬江南東路乾道初陞寧國府元改為寧國路屬江浙行省本朝改為寧國府直𨽻京師領縣六宣城縣附郭本漢丹陽郡宛陵縣地順帝置宣城縣隋宣