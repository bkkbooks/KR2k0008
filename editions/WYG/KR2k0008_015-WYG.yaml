初知寧府亷謹有設施門無私謁始終如一後陞廣東㕘政民到今頌之梁徳逺永樂間知太平縣亷能公恕深察民隠積年逋賦徳逺設法完足民感其徳塑像祀之舒謨宣徳中旌徳知縣慈祥亷敏不事刑罰百姓愛慕擢為御史而卒況子玉正統間知宣城縣剛斷敏給嵗饑多方賑捄民賴以全畿志强珍正統間知涇縣亷謹不受私謁有應變才屢決疑獄復屯兵侵田定兩里凋耗之税言賢令者以珍為稱首畿志馮本正統間旌徳知縣在官奉職亷惠蒞政有方凡諸建作俱可垂範畿志王弁天順間涇縣知縣慈祥豈弟有古循良風值嵗大侵為請躅貸民賴之畿志凃觀成化間来知寧國府為政寛平鎮靜號稱長者時有天降凃来解倒懸之謡畿志李延壽成化間以御史謫宣城主簿遷知縣亷靜簡易庶事畢集吏民宜之畿志姜綰以御史同知寧國府在郡摧豪右惠小民杜謁剔奸蠧庶務具舉鄰境訟乆不決者必請折政務沓至鮮不稱服有姜老愈辣之謡擢慶逺知府宣人立碑志思畿志顔禄壽𢎞治中寧國通判以亷能稱擢安慶府同知有去思碑畿志李文𢎞治末任宣城縣主簿持亷奉公嘗鬻其家騾車十餘兩得直盡以築雙溪橋宣人徳之初文廟以附府輟祀文始於春秋二仲修行釋奠儀迄今因之畿志張瀚𢎞治中知太平縣亷謹聰察不畏强禦典補滯敝邑政大新數十年間稱治績者必曰張君畿志胡文靜正徳中知南陵縣為人簡恕應務無滯加意士習裁冗費嵗大侵多方賑捄後擢御史去畿志人物三國紀亮丹陽人與子騭俱仕吳亮為尚書令騭為中書令每朝㑹以雲母屛風隔坐晉丼卓丹陽人仕為厯陽内史外柔内剛為政簡要嘗以梁州刺史鎮襄陽善於綏撫西土稱其徳政累爵至都亭侯瞿硎先生逸姓氏晉太和末居宣城文脊山山中有瞿硎因以為號桓温嘗造之見先生披鹿裘坐石室神色無忤温及僚佐十數人莫測乃命伏淊為之銘賛終隠於山中何琦宣城人事母孝母喪未𦵏火起撫棺號慟俄而火息嘗以述作為事著三國評論俞縱宣城人成帝時桓彛為宣城内史蘇峻之亂彛遣縱守蘭石與峻將力戰將敗左右勸其退守縦不從曰吾之不負桓侯猶桓侯不負國也卒死於難寇平追封興古大守唐左難當涇縣人隋末亂率衆保鄉井武徳中授猷州刺史後封戴國公石仲覽宣城人踈財結客士多依之仕為駕部郎中御史中丞王炎宣城人與李白為友嘗逰蜀及死白詩輓之云王公希世寳棄世亦何早劉太真宣城人天寳中舉進士官至刑部侍郎徳宗宴曲江為詩羣臣皆和第太真詩為首羅立言宣州人貞元末進士為陽武令以治劇遷河隂立言始築城郭地所當者皆富人大賈所占下令使自築民憚其嚴數旬畢設鎖絶汴流姦盜屏息後由廬州刺史召為司農卿擢京兆少尹方元蕩旌徳人永貞初授冠軍大將軍元和中進御史大夫封河南義成郡王以兵從征吴元濟有詔嘉之汪遵宣城人幼為吏善絶句詩後辭役就貢涇人許棠遇於途問之遵曰就貢棠怒曰小吏無禮比遵成名五年棠始登第五代邵拙宣城人孤峭不撓博通經史飲酒常至百盃偶沈酗遂絶飲有詩百篇南唐尚書郎孫邁為之序命曰廬嶽集又有手抄史傳文集三百卷宋舒雅旌徳人好學善属文南唐時舉進士第一歸宋為將作監丞充秘閣校理嘗編纂文苑英華校史記前後漢紀及周禮禮記公羊穀梁等疏後出知舒州請祠加至直昭文館蒯鼇宣城人少孤貧篤志於學善属文以亷直自勵一介不干於人太宗時擢進士第厯茶陵令以殿中丞致仕隠於廬山丘旭宣城人少以畜産為事弱冠始讀書學為辭南唐時凡九舉不第而自勵彌篤及再試遂第一江南平歸宋時吕䝉判銓聞其名甚重薦遷京秩卒於衡州旭嘗纂自古賢俊遺言為賔朋宴語其詞賦後人以為法李含章宣城人少好學攻文辭太宗時舉進士授屯田都官員外郎累遷至太常少卿封潘原縣男凌策涇縣人幼孤勵志好學雍熈初進士累官至御史中丞為時名臣真宗嘗言策治蜀敏而有斷王旦對曰策性質淳和臨事强濟真宗深然之梅詢宣城人舉進士博學有辭辯初為利豐監判官真宗竒其占對召試直集賢院屢言邉事官至翰林侍讀學士汪文諒旌徳人家饒餘財與兄文政俱尚義輕利聚族千三百口天禧中旌表其門後以里物獻京師詔賜白金文諒請以賜金易國子監書歸訓子詔從之梅堯臣詢從子工為詩歐陽修以為詩友初以䕃為河南主簿厯鎮安判官仁宗召試賜進士出身為國子監直講遷都官員外郎卒堯臣家貧喜飲酒與物無忤賢士大夫多従之游嘗註孫子選唐戴記及有宛陵集四十卷趙􅍬宣城人舉進士真宗時累官右諫議大夫集賢院學士為人寛厚博學官至樞密副使卒贈太子太保諡僖質許元宣城人初以父䕃入官累遷國子博士范仲淹以元長於理財薦擢江淮發運判官尋為發運使發千艘浮江而上京師足食遷户部郎中天章閣待制楊佐宣州人進士及第為陵州推官累遷江淮發運使天章閣待制判都水監皆有能名英宗時使契丹卒於道詔護喪歸賻以黄金恤其家劉𤦺涇縣人博學强記立志峻潔慶厯中進士通判歙州召為侍御史嘗上疏劾王安石貶監處州酒税後通判鄧州汪澥旌徳人少從胡瑗學易又學於王安石元豐中進士累官國子祭酒改大司成以議學政不合出知婺州澥自布衣為學録學正司業祭酒司成官以儒名者三十年許遂宣城人夙喪父事母以孝聞里人毎勵其子輒曰汝獨不慚許伯通乎伯通遂字也弟逖官至員外郎子俞知大冶縣民甚徳之楊璵宣城人少篤學天聖中進士累官至光禄卿封源武縣男王相如宣城人建炎初江右盜起相如為盜所獲命作檄相如奮髯曰吾有死而已不能為盜作箋遂遇害盡室殱焉工詩文有溪堂集陳天麟宣城人天資豪爽慷慨重義紹興中進士累官至集賢殿修撰嘗編易三傳及西漢南北史左氏綴節等書周紫芝宣城人嗜學勤苦厯官至右司員外郎知興國軍為政簡靜有太倉梯米集七十卷行世魏良臣宣城人少勵儒業有志當世舉進士累官宣城守時虜衆四起良臣乃堅築城壘修飭器械卒獲保全後以左光禄大夫卒諡敏肅徐勣南陵人熈寧中進士仕為侍講遷翰林學士累上疏有禆於時以顯謨閣學士致仕卒勣挺挺持正徽宗甚見禮重而不至大用時議惜之章夏寧國人宣和中進士紹興時自御史中丞遷端明殿學士除簽書樞密院事兼權㕘知政事李兼宣城人博學工詩楊萬里推許之知台州居官有守既卒吏民為之巷哭罷市自號雪巖所著有詩文及郡志吳柔勝宣城人幼聴其父講伊洛書知持敬之學淳熈中登進士厯太學博士始以朱熹四書與諸生誦習於是士知趨向累遷湖北運判兼知鄂州大講荒政十五州被災之民全活不可勝計後以祕閣修撰奉祠卒諡正肅吳淵柔勝子苦志力學嘉定中進士累官端明殿學士沿江制置使封金陵侯進爵為公後拜㕘知政事卒贈少師所著有易解及退庵文集奏議弟濳舉進士第一擢尚右郎官言事切直累遷樞密使自右丞相進左丞相封許國公饒虎臣寧國人嘉定中進士器宇魁然魏了翁甚竒之累官至端明殿學士知樞密院事㕘知政事文章政事昭聞於時萬文勝寧國人倜儻有大志累官至福州觀察使總殿前諸軍理宗飛白書忠實二字賜之元貢奎宣城人有智識度量人莫測其涯深尤以文章名家延祐至治間累官至集賢學士卒追封廣陵郡侯諡文靖所著詩文有雲林藁倦遊集子師泰性倜儻有文學厯官翰林待制國子司業累遷至江淛行省㕘知政事有詩文梅寔宣城人明春秋累官至集慶路總管府照磨至正間大兵圍集慶乏援乃㑹友人李端曰事急矣當以死徇國城陷果不屈遂闔門遇害本朝何應龍南陵人少涉獵經史膂力絶人元末起義兵累以竒功授珠虎符為民兵萬户歸附木朝仍襲其官從徐達北定中原還留宿衛後征西卒於途子執中䕃襲次子時中聚族同居九世不分呉原頥柔勝六世孫好學明經善詩文𨽻書洪武間為本府儒學訓導累官國子博士致仕後應召預修永樂大典王士謙宣城人學優純行洪武間聘為儒學訓導士經其門者多所造就後應召預修永樂大典號竹西翁所著有詩集秦逵宣城人洪武間由國子生累官工部尚書戚遜宣城人幼力學豁達剛果有大志洪武間由國子生任兵部主事累陞山東布政勤慎愛民夙夜無怠永賑樂初嵗大荒遜設法賑濟因請於朝不俟報預發廩之民賴全活者十餘萬丁恕南陵人徳性敦厚仗義輕財嘗於鄰居壊垣得白金首飾一囊詢其實還之鄉人皆稱其有徳子聰敏力學累官兩浙都轉運鹽司使以亷能著稱朝廷嘉之賜衣楮幣錫宴禮部後陞刑部左侍郎王著涇縣人洪武間任浙江按察司經厯亷能著稱嘗巡温州州乆旱著禱雨輒應慈豁虎為害著誠心禱神虎盡自斃而民遂寧後累陞雲南按察司副使陳迪宣城人累官禮部尚書靖難師至被召不屈而死有俞逢辰者水陽西鎮人初充伴讀及靖難師亦以力諫被殺畿志陳富涇縣人永樂戊子舉人初授湖廣布政司照磨用薦為監察御史提督北直𨽻學校作興士類得人甚盛尋陞廣東按察僉事居官以亷公著稱性剛直不為勢利所移士林重之趙昌涇縣人舉進士厯官户部郎以忤中貴謫長沙府同知時洞寇竊發昌悉平之成化初復為户部郎值蘇松災旱昌奉使檢覈奏減秋糧三十餘萬民困以蘇累遷山東布政畿志董傑涇縣人舉進士上疏論經筵除沔陽知州謫四川行都司都事累陞保定知府練兵儲粟盜發賴以無恐民立生祠祀之仕至右副都御史卒畿志吳璟南陵人舉進士官四川僉事時流賊鄔藍之黨遁入川東進逼江津璟受檄守之兵援後期城陷被執而死事聞贈副使官其子鎬為宣州衛百户畿志萬琛宣城人為清江令改瑞金流賊夜突入城或勸其引避琛曰當手刃諸賊以報國恩賊擁入縣遂遇害事聞贈光禄少卿官其子麟為侍讀崔桐為作傳畿志張綸宣城人舉進士授鹽山令累官大理寺卿進刑部右侍郎至右都御史致仕畿志列女葛妙真元宣城民家女九嵗聞日者言母年五十當死妙真即悲憂祝天誓不從人長持齋以延母年母後年八十一卒事上賜旌異紀氏女名催弟宣城人紀吉甫之女也年及筓未適人元末長槍軍陷城為所虜催弟以首觸牆曰寧死於此遂見殺其同縣胡氏女亦被虜不從而死胡氏寧國縣人葛之孚妻年二十二而寡孤觀稍長亦死胡與婦施氏相勵以節洪武間有司聞其事詔旌表之畿志金氏寧國縣人年十六歸胡選孫選孫冇痼疾偃卧牀蓐安言叛軍突至家人出走金獨侍夫疾不去後夫殁年甫十八無子持志甚堅洪武末旌表畿志蕭氏涇縣人趙敬忠妻早寡守節天順間旌表畿志劉氏宣城人王璉妻年二十五而寡撫遺腹子毎言及其夫輒悲號隕地璉兄璟妻孫氏弟琇妻陶氏亦早寡因感劉氏同處以守節畿志陡門婦宣城人不知何氏女居陡門中正徳三年宣大饑婦與其夫乞于金寳圩夫約曰汝居此若得食即還去數日不返圩人有悦其容者誘致之與之食不食飲於河一蹶而死畿志陳氏宣城人郭祥妻早寡守節正徳間旌表畿志張氏旌徳人劉旭妻旭死張少且無子倚妾胡氏遺腹子二婦相弔卒成其志嘉靖間旌表之畿志張氏南陵人劉定妻夫亡守節嘉靖初旌表畿志章氏涇人童寛濟妾也寛濟令萬載於官章年二十扶襯而歸舟中坐卧不離棺側及抵涇川遣人報嫡至悉取宦囊付之束髪易衣伺舁棺起即自投於河而死畿志仙釋陵陽子明姓竇漢丹陽人嘗獲白魚剖之得丹書論服餌之術遂登仙去唐人詩白龍已謝陵陽去黄鶴還来喚子安琴髙涇縣人有竒術入水不濡嘗遊冀州涿郡二百餘年辭入涿水他日乗赤鯉而昇其弟子見之宗杲姓奚寧國人張商英一見喜之字以妙喜吕好問卷與宗杲號曰佛日有語録行於世明一統志卷十五
