body:
  text: 明一統志卷十五明李賢等撰太平府東至應天府溧水縣界一百一十里西至和州界三十里南至寧國府宣城縣界七十里北至應天府江寧縣界五十里自府治至南京一百五十里至京師三千五百九十里糧四萬九千石零建置沿革禹貢揚州之域天文斗分野春秋時呉地後屬越戰國時屬楚秦屬鄣郡漢為丹陽郡地晉屬丹陽宣城二郡成帝時僑立淮南郡及當塗縣治於湖後又僑立豫州治蕪湖劉宋以來或治姑孰或徙於湖又併淮南入宣城郡亦治於湖隋省蕪湖等縣以當塗屬蔣州唐以當塗置南豫州尋廢州以縣屬宣州五代時南唐於當塗立新和州後改雄逺軍宋改為平南軍後陞為太平州元陞為太平路屬江浙行省本朝改為府直𨽻京師領縣三當塗縣附郭本漢丹陽縣地晉分丹陽置于湖縣東于晉成帝時以江北當塗流民南渡者衆乃於湖僑立當塗縣及淮南郡隋初罷淮南郡徙當塗於姑熟属丹陽郡唐初於縣置南豫州尋廢州以縣属宣州後以丹陽縣省入属昇州尋復舊南唐属雄逺軍宋属太平州元仍舊本朝因之編户一百三十九里蕪湖縣在府城西南六十五里本吳鳩茲邑漢置蕪湖縣属丹陽郡以其地卑蓄水而生蕪藻因名晉於蕪湖僑立豫州又分立逡遒縣興寧初以宣城郡移治蕪湖後還治宛陵寧康初又於蕪湖僑立上黨郡及襄垣縣後省蕪湖入襄垣隋初省襄垣入當塗唐以蕪湖為當塗属鎮南唐復置蕪湖縣属昇州宋初属宣州後属太平州元仍舊本朝因之編户三十三里繁昌縣在府城西南一百六十五里本漢春榖縣地属丹陽郡晉属宣城郡東晉僑立襄城郡繁昌縣後罷郡以縣属淮南郡陳属北江州隋以繁昌併入當塗南唐復析置繁昌縣属昇州宋初属宣州後属太平州元仍舊本朝因之編户一十二里郡名姑孰古名當塗晉名形勝姑孰衝要密邇京畿南齊詔龍山南指牛渚北臨陳宣帝詔江山之勝天下之竒處宋曽鞏記左天門右牛渚鐵甕直其東石頭枕其北宋洪遵壁記采石之險甲於東南姑孰志序風俗士質而靜民儉且淳宋牟子才作七先生祠記其士質而靜既少馳騖之觀其民儉且淳又無華麗之悦純一平實易以理曉其民安其物阜郡國志千里風煙同樂國萬家歌吹共春臺宋楊灝詩民尚敦龎士知勤學郡志山川白紵山在府城東五里本名楚山晉桓温攜妓遊山奏樂好為白紵歌因名山椒舊有四望齊雲二亭王安石詩白紵衆山頂江湖下縈帶浮雲卷晴明可見九州外登臨信地險俯仰知天大黄山在府城西北五里世傳浮丘翁牧雞於此亦名浮丘山山上舊有宋離宫及凌歊臺懷古臺誓清堂并浮圗在焉金山在府城北一十里山出銅與金類古所謂丹陽銅是也又繁昌縣西南五十里有銅山亦出銅龍山在府城南一十里舊經載孟嘉落㡌事按龍山當在江陵而郡志云桓温嘗以重九日與僚佐登此疑必温移鎮姑孰時事也九井山在府城南一十里山有九井世傳晉桓温所鑿元和志殷仲文九月九日嘗從温登九井賦詩即此王安石詩沿崖涉澗三十里高下犖确無人耕捫蘿挽蔦到巖趾仰見吹瀉何崢嶸花山在府城東南一十里相山在府城東十七里鍾山在府城南十八里石城山在府城東二十里有石環繞如城唐羅泰有石城記周成王時楚熊繹受封於此上有八角井飲馬池駕鼓臺按楚封丹陽在歸州謂封於此者非是采石山在府城北二十五里牛渚北昔人於此取石因名臨江有磯曰采石唐李白嘗乗月與崔宗之自采石至金陵著宫錦袍坐舟中即此寳積山在采石山北山有古取銅坑一所寳積之名取此連磯山在當塗邉大江磯石相連晉謝眺嘗於此賦詩牛渚山在府城北二十五里下有磯曰牛渚去采石磯僅一里舊有險要備禦之地亦名然犀浦世傳下多怪物晉温嶠燃犀照之須臾見水族覆火竒形異狀或乗馬車著赤衣幘其夜夢人謂曰與君幽明道别何意相照即此李白詩絶壁臨巨川連峯勢相向亂石流洑澗迴波自成浪但驚羣木秀莫測精靈狀更聴猿夜啼憂心醉江上青山在府城東南三十里齊宣城太守謝朓嘗築室於山南又名謝公山宋郭祥正詩三峯連延一峯尊龍山白紵如兒孫重岡複嶺控官道北往金陵真國門石崩廢井謝公宅龜仆斷碣長庚墳斯人白骨已化土英氣往往成煙雲甑山在府城東三十里上有龍窟遇嵗旱人多焚此窟以起龍往往得雨天門山在府城西南三十里二山夾大江東曰博望西曰梁山對峙如門亦名峩眉山又名東梁山西梁山李白詩天門中斷楚江開碧水東流至此迴兩岸青山相對出孤帆一片日邉來褐山在府城西南三十五里臨大江五代史楊行密攻趙鍠戰於褐山大敗之又九國志田頵與馮𢎞鐸帥舟師戰於褐山皆此也宋梅堯臣有詩靈墟山在府城東北三十五里世傳丁令威學道飛昇於此山椒壇址猶存山有洞後有井大旱不竭李白詩丁令辭人世拂衣向仙路伏煉九丹成方隨五雲去翰辟山在府城東北四十里梁大同起居注云九年往姑孰翰辟山採石墨馬鞍山在府城西北四十里慈湖港口舊有神祠吳赤烏二年所建琵琶山在府城東北四十里以形似名望夫山在府城北四十里昔人往楚累歳不還其妻登此山望之乃化為石唐王建詩望夫處江悠悠化為石不回頭山頭日日風和雨行人歸來石應語葛陽山在府城北四十三里上有石洞藤蘿蔽隠洞前有方石相傳為葛仙翁棊局慈姥山在府城西北四十五里出竹堪為簫管厯代嘗取以給樂府亦名鼓吹山横望山在府城東北六十里即春秋楚子重伐吳所至之地其山四望皆横故名靈山在蕪湖縣西南五里大江中舊名孤圻山亦曰戰山晉桓温城赭圻宿鳥驚啼温謂官軍至一時驚潰赭山在蕪湖縣東北五里江南志漢丹陽郡北有赭山丹赤故郡名丹陽驛山在蕪湖縣北八里臨大江南唐時設館驛列市肆於此故名赤鑄山在蕪湖縣東北八里舊經云楚干將鑄劔之地神仙山在蕪湖縣北九里上有磨劔池砥石人足膝遺跡荆山在蕪湖縣東一十六里東南麓有大石下有一穴上有龜紋相傳古有龜穴此而出又一石相對有古僊鶴足跡白馬山在蕪湖縣南三十里上有石洞冬間有燕集洞中至春初不見俗稱為燕洞山下有白馬廟公孫山在繁昌縣治西世傳公孫捷所居舊有廟今廢下有公孫橋磕山在繁昌縣南一十里上有龍池流泉不竭覆釡山在繁昌縣南一十五里山頂如平掌有古廟址井泉冬夏不竭鳯凰山在繁昌縣西南二十里上舊有延禧觀宋郭祥正有寄鳯凰山張居士詩老山在繁昌縣東北三十里山有三峯曰老子方大有石室案几洞門石上有拄杖跡浮丘山在繁昌縣亦名隠玉山有二峯第二峯有石壇亦鄉民祈禱之所馬仁山在繁昌縣東南六十里舊經云山石類人馬狀舊名馬人唐時有石馬妖鳴命斷其首改今名山有五峯曰韜玉龍首馬人羅漢雙柱有石庵觀音巖雙猫石唐處士王冲霄處此隠靜山在繁昌縣東南七十里相傳為晉杯渡師道塲山有五峯曰碧雲桂月鳴磬紫氣行道又有宿猿巖噴雲泉蟂磯在蕪湖縣西南七里大江中蟂老蛟也今磯南有一石穴廣一丈深叵測盖蟂所居宋黄庭堅書蟂磯云蟂似蛇四足能害人漢賈生所謂偭蟂獺以隠處者也七磯在蕪湖縣西北一十五里又名磧磯陳周文育襲盆城徐嗣徽引齊人渡江據蕪湖列艦於青墩至七磯以斷文育歸路即此三山磯在繁昌縣東北四十里宋陳堯佐嘗泊舟磯下有老叟曰來日午有大風宜避之堯佐信其言至期果大風暴至行舟皆溺堯佐獨免又見前叟曰某江之逰奕將也以公他日當位宰相故相告耳慈姥磯在繁昌縣西北四十里磯上刻界碑二字註云北潤州上元界南宣州當塗界乃唐刻也大江在府城西北五里魯明江在蕪湖縣西南三十餘里與繁昌縣分界舊經魯仲明居此至今稱魯港按十國紀年孫孺與楊行密戰行密將臺濛於魯江作五堰以輕舟給楊行密軍食即此丹陽湖在府城東南七十里亦名路西湖周匝百餘里當塗與溧水以湖中為界李白詩湖與元氣連風波浩難止天外賈客歸雲間片㠶起龜遊蓮葉上鳥宿蘆花裏少女棹輕舟歌聲逐流水天城湖在當塗縣又名天聖湖大信河在府城西南二十五里江自天門山南驪為夾河曰大信下達采石入大江宋徐俯詩便風擊鼔大平州斜日落帆大信口即此新河在采石東牛渚磯屹然控江流之衝水勢湍激大為舟楫害宋慶厯初命開新河於磯後南接夾河北達大江舟行遂獲安濟黄池河在府城南六十里東接固城河西接蕪湖縣河入大江南至黄池鎮北至宣城縣界姑孰溪在府城南二里一名姑浦有港舊經城中宋建炎中郡守郭偉始築新城限溪流於外西入大江李白詩愛此溪水閒乗流興無極漾楫怕鷗驚垂竿待魚食波翻曉霞影岸疊青山色何處浣紗人紅顔未相識白壁水在府城北三十里唐李白有過白壁水翫月詩慈湖水在府城北六十五里吳將笮融於此屯兵晉陶侃與蘇峻戰於慈湖又侯景之亂兵至慈湖梁人大恐皆此蕪湖水在府城西南八十里源出丹陽湖西北流入大江漢末嘗於湖側置縣鼉浦在府城南李聿任歙州刺史經此浦有鼉魅幽聿於潭中領聿妻子就任凡三年聿從潭中出往尋妻子妻子不識聿學法斬鼉魅妻子始識之泥浦在繁昌縣東一十五里宋楊萬里有詩鳩慈港在蕪湖縣東四十里左傳吳伐楚克鳩茲即此地輿地志以為臯慈狄港在繁昌縣西南二十里與赭圻城相属西對無為州乃江流險要處楊萬里有詩桓公井在白紵山晉桓温所鑿李白詩桓公名已古廢井曽未竭石甃冷蒼苔寒泉湛孤月謝公井在青山路側山嶺又有謝公池齊宣城太守謝眺所鑿李白詩青山日將暝寂寞謝公宅竹無人聲池中空月色荒亭衰草徧廢井蒼苔積唯有清風聞時時起泉石白雲泉在青山白雲寺味甚甘大旱不竭俗名虎跑泉龍泉在龍山俗傳晉杯渡禪師登山渇甚羅浮尊者為卓錫於山泉湧出西湖池在蕪湖縣治西北青堆沙在府城南二十里周文育克徐嗣徽於此虎檻洲在繁昌縣東五十里宋沈攸之王休仁屯軍於此以破孫冲之於赭圻又陳侯瑱進軍虎檻洲與齊王琳合戰亦此地土産蓴菜各縣出鰣魚大江出烏昧草宋范仲淹以太平州所食烏昧草進呈乞宣示六宫戚里用抑奢侈公署建陽衛在府治西南洪武三十五年建學校太平府學在府治西宋紹興間建本朝洪武間重修當塗縣學在縣治東舊在萬夀寺西正統六年改建於此蕪湖縣學在縣治東舊在東南宋元符間建本朝洪武間重修萬厯十三年改建於城隍廟故基繁昌縣學在縣治西宋建於舊縣南再遷東北元燬本朝洪武初重建天順元年徙縣治因徙治東成化間再遷於此書院天門書院在天門山宋郡守陳塏奏建理宗書額内有周濓溪程明道伊川張横渠朱晦庵張南軒吕東萊七賢祠牟子才記采石書院在采石山宋嘉定間郡守賈實建為士子講學之地本朝宣徳間重修丹陽書院在當塗縣南黄池八十里元至大間建于湖書院在蕪湖縣昇平橋西狀元坊内即張孝祥讀書處正徳間建畿志宫室謫僊樓在采石瀕江正統五年巡撫侍郎周忱建清輝閣在蕪湖縣承天院後卧治堂在府治道院南宋建道院亦名宴堂舊在後㕔西北太守吴芾所名也姑孰堂在府城清和門外下臨姑溪宋嘉祐中朱從道建郭祥正詩誰謂江南地偏小姑孰之堂天下少丹湖千里浸城東蒲葦藏煙春渺渺蛾眉亭在采石山宋郡守張環建前有望梁山夾大江對峙如眉因名沈栝詩雙峯秀出兩眉灣翠黛依然鑑影間終日含顰縁底事秖應長對望夫山申錫詩一島雲霞幹怒流燃犀捉月總悠悠脩眉中劃三千丈不著人間半