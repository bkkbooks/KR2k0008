白石禦之遷仕亦築城相對既而僧明生擒遷仕今兩城舊基尚存東謂之古城西謂之髙城魚梁城在萬安縣南一十里昔李遷仕據太臯渡遣將入贑石魚梁築城陳覇先命周文郁敗之今俗呼爲城頭摭口城在廬陵縣北七十里陳廣州刺史蕭勃遣其子孜及其將歐陽頠傅泰等將兵出南康傅泰據摭口城周文郁使其將丁法洪攻泰擒之嚴城在永豐縣東十五里舊傳唐末有嚴將軍聚兵于此相公坪在吉水縣北九十里與張欽寨相近彭玕作亂置堡寨于上可容數萬人倉庫之跡尚存故吉州碑在吉水縣西二十里龜趺在岸而碑沉于江霜降水落則見大業等字石鍾在安福縣西羅漢寺傍有嶺曰陽岡下瞰碧潭巨石倒垂崖中狀若鍾石鼓在安福縣西資福寺傍有溪曰灣潭巨石錯立中有一石如鼔或云宋熈寜間鼔嘗自鳴陶皮仙室在武山北昔有陶皮二仙隱此食桃果度嵗月居者必髙潔若茹葷則虎豹随至遊山者亦然今呼爲北巖祈禱有應神楓在安福縣西一百里其木狀如神面目嵗旱以泥封之有雨龍陂在安福縣東南百餘里世傳吳主孫皓伐木造宫室順流而下至龍陂而木沉以繩挽之有烈風雷雨之變後嵗旱率衆牽繋其木風雨随至宋元嘉中木忽浮于水上其半猶溺壅成沙洲鐡十字在府城南柵門外岸上有鐵鑄一十字題云保大二年五月日置重一千三百斤下有潭水或時清淺亦見一十字世傳南唐造戰艦以此繋䌫或云當時有水場商人於此編栰官爲經紀故置此以繋栰云名宦漢劉陵安成長先是邑多虎患民徙他郡陵脩政月餘虎皆出境流民復還吳碭安成長吳孫權使吕岱取長沙郡碭據縣拒之權遣魯肅攻圍碭突出盖碭知有漢而不知有吳也晋孟嘉庾亮辟嘉廬陵從事引問風俗對曰當問吏亮掩口笑曰嘉是盛德人南北朝劉湛宋廬陵王長史王居憂多曠禮湛嘗在坐厨人進車螯及酒湛曰既不能以禮自處又不能以禮處人傅昭梁安成内史郡自宋來兵亂相接府舍稱凶每昏旦人鬼相觸在任者鮮以吉終及昭至不敢犯郡多猛虎常設檻穽昭命撤去之竟不爲害劉竺陳廬陵太守公家無負租私室有餘粟出郊則白鹿随馭吏民為之立廟唐杜審言武后時坐言事貶吉州司户叅軍顔眞卿吉州别駕日與詩人文士倡酬爲樂有廬陵集五代楊元清南唐永新制置使先是夏賦凖貢見緍民苦之元清奏請納帛一疋折錢一千以為定制常以便宜科率民無怨望宋梁鼎知吉州民有蕭甲者豪猾爲民患鼎暴其凶狀杖脊黥面徙逺郡太宗賞其強幹戚綸知太和縣邑民險悍好訟綸爲諭民詩五十篇言近而易曉老㓜多傳之每嵗時與囚約放之暫歸祀先櫛沐民感之皆及期而還余靖知吉州甫一載其詢細民之疾苦去健吏之刻削皆能踐其謝表之言元絳知永新縣豪子龍聿誘少年周整飲􅀶勝之計其貲折取上腴田立劵久之整母始知訟于縣不得直絳辨爲偽劵聿駭謝即日歸整田王陶知太和縣鼎新縣治自爲記有行道貴乎誠臨事貴乎果等語黄庭堅知太和縣政尚慈祥既去而民懐之立祠祀焉吳革知吉州减諸縣所増鹽課奬善勸不能御姦黠吏有轡䇿元祐初御史按察以革爲江西第一張洽知永新縣獄吏受賕乗間訊囚榜笞使誣服洽亟執吏付獄以上於郡黥之結約土豪得其歡心冦將犯境聞有備乃去方師尹知太和縣章貢兵變揚聲欲擣廬陵師尹柵江流以捍賊民心始安後爲左司郎中又奏减廬陵重賦蒲堯仁知太和縣亷白端謹無秋毫失自奉尤薄或經旬不知肉味曰吾不以口腹累人官三年如一日熊彦明知吉水縣隣賊犯境彦明率五郷民兵與戰遇害民爲立祠祀之趙訓之建炎中知永豐縣孟太后避兵䖍州護衛統制杜彦叛犯永豐訓之與尉陳自仁設㐲殱其衆㑹賊别校繼至皆力戰遇害事聞俱贈官立廟祀之李璆紹興初知吉州江西兵素悍璆始視事有相挻爲亂者亟捕誅首謀者撫循其餘大布恩信境内遂安許浹知萬安縣興學除弊豈弟之化比屋相尚郭師元爲撰許公十政詩刻石郭奉世知永新縣時㤗和民苦其令訢諸上司欲得奉世治其邑漕檄以往而永新民不可奉世乃寓兩縣之佛舍兼治焉王居安節制江池大軍駐廬陵督捕盗賊領郡事賞厚罰明將吏盡力始終用以賊攻賊之䇿故兵民無傷者人爲刻石紀功黄疇若淳熈中知廬陵縣州嘗以六月督畸零稅疇若念民方艱食取任内縣用錢三千餘緡爲民代輸治以最稱范應鈴開禧間永新尉縣冦甫平喜亂者詐爲驚擾應鈴亷得主名捽而治之後又知吉州首以練兵足食爲先務然後去冗吏覈軍藉以次罷行遂平冦亂江萬里知吉州于白鷺洲創建書院延州人歐陽守道講說選民俊秀受學弦誦相聞元李恒平章政事提兵至吉城外人皆惴慄及入城撫民如在襁褓市不易肆州人懐其惠立祠祀焉張懋至元中吉州路總管惡衣糲食率之以險慎刑平政處之以公新府治設義倉甚有爲惠愛流民歸者數千家及卒民巷哭不絶者三日且立祠張翥吉州路總管收捕龍泉山冦有功于民陞廣東亷訪使民思之爲立祠焉吳繹守吉安不數月去劉岳申爲撰去思碑稱其爲政有賢于人者三外敏而内寛讀書知治體好謀而善斷梁克中吉安路總管四境盗起克中即移兵出鎮于郡東大洲上脩濠豎柵爲營壘益募丁壯置舟師節制屬縣義兵郡頼以安寳童廬陵逹嚕噶齊盗䧟郡城寳童堅守不屈集義士力戰殺賊甚衆廬陵復安至今人慕其德本朝潘景岳洪武初爲安福州判官天兵下安福景岳言于主將得所掠男女千人分置空舍飼以糜粥俱遣還家劉昭先㤗和知縣爲政尚寛恕上不負期約下不勞民庶去之日老稚攀送者千餘人萬鵬舉萬安縣丞㢘平勤政時有民婦來訢其夫及五子皆爲人謀殺毁滅其屍者鵬舉䖍禱于神一日有五蜂旋繞行幕鵬舉曰汝若真䰟冝前飛引蜂徑臨掩骸處得衣帶上所繋買布數人名姓推鞠之遂獲謀殺者烏斯道洪武間永新知縣亷静有守民不忍欺能詩文善楷書邑士多受經講學民有去思錢本中吉水知縣以簡御煩民樂其政操守甚堅門無私謁去官民思之不忘永樂中復來民皆歡迎如見慈母及卒百姓留葬本邑争負土成墳孫公與㤗和知縣持已簡嚴處事明决雖百務叢脞而剖析不少紊久之公庭晏然數吏旁拱而已朱幹廬陵知縣性明豁髙朗砥礪亷節遇事不畏盤錯人皆德之省志劉璨洪武間爲萬安縣丞嘗攝縣事剪滌民瘼有勾攝輙以一木碑䟽其名去無不至者至則論其曲直皆得其情囹圄無寃民吳勝祖泰和主簿居官亷潔寛猛得宜卒于官至無以爲殮民皆爲之涕泣賻贈以歸其柩趙彦剛萬安知縣亷能有守涖事尚簡興學勸農役均訟理奸吏屏革殆盡盗冦殄㓕無或遺既代去行李蕭然惟二破篋而已百姓呼爲清亷父母于仲寛永新縣令洪武間南郷龍仁和聚冦爲亂千户所官幸捕盗爲利欲調軍盡屠南鄉仲寛力止之躬率鄉兵執其渠魁治之冦乃平南鄉之人感之若父母生子者多以仲寛姓爲名趙敏安福知縣公亷有幹局定民户髙下爲科差量地里逺近約賦稅察料物輕重受納價躭鬬者志名懲之慎法者假容待之民翕然恱信既卒因家焉其孫璜今任工部尚書朱仲智洪武末吉安知府以亷介自守刑政清簡吏民畏服尤注意學校凡齋舍廊廡及奎文蔵書二閣皆所修置藺芳永樂中吉安知府屬縣吉水民詣闕妄言縣産銀宜置冶芳奏言其妄事遂寢芳事母孝母亦善教凡芳日所行事夕則命陳于前有未善必讓之吉守自朱仲智後惟芳能繼之郡民稱賢守必曰朱藺陳本深宣德初知吉安府治尚寛簡不任智巧民有寃抑不伸者雖三足童子皆得往白久之郡中無訟尤能折節下士辭色和煦涖任凡十有八年自校舍而下凡百廢墜皆截然振飭既去民刻小像祀于東嶽廟家户祝之正德初始立賢侯祠祀焉胡春同宣德間吉安教授操履純正學亦該􅀶示諸生纎毫必以禮諸生咸自繩檢懼忤其意其教固有在于月書季考之外者師道巋然曹鼐宣德間爲泰和典史愛民如子雖政事繁冗亦不廢學問立志逺大嘗督工匠至京陳情願入鄉試遂中經魁及廷試狀元及第余耀正統初知泰和縣亷敏自持既擢本府通判仍攝縣事楊文貞公重之嘗贈以詩云吏胥無跡到鄉村喧雜何曽及縣門願得年年比今日邑人常戴府公恩又云澄江一道分明月照見余侯一片心誰謂今人不如古古來循吏即如今王業髙以父䕃授吉安所副千户嘗扈蹕從征功陞正千户正統己巳調征浙冦于丁公崖遇敵死戰援孤勢窮猶手刄數十人死之其孫莊剛累有謀畧嘗平湯存文于萬安殱金耀于永豐擒周天鑾于梅花洞正德庚午從征姚源㧞所佩刀指天劃地誓不與賊俱生領兵至鼓樓鋪斬獲甚衆進屯梁山師失利指揮徐麟等下馬先遁莊直前死戰賊勢將郤援兵不至力殫死之事聞官其孫爲指揮以酬其功云張瑄景泰間知吉安府爲治寛大有體簡重明敏剸劇治繁如庖丁觧牛不煩餘力久之郡内大治無愧于古之循良超拜廣東布政陟都御史仕終刑部尚書宿德重望爲時名臣薛驥景泰間以御史言事謫永新令爲政亷明豪強歛跡懦善者因頼以生程宗天順初知吉安府才敏而不務苛察胥吏之舞文弄法者釐革殆盡嘗詔健訟者曰汝能枉其是非以欺我耶汝將害人適自害爾郡中化之訟自息尢篤意學校勸賢諸生㒺有厭怠王昻永豐知縣時乗積弊之餘持亷秉公振作有道舊俗椎牛釃酒以送終昻至道以禮教痛革之久之民亦稱便既又去淫祠表忠節凡事關風化者爲之恐後永豐人至今論賢令必曰揭陽公柯暹以給事中知永新州訟牒盈庭徐析以一二語唯唯讋服暇召諸生講究經史廢脩墜舉民不知勞後改吉水治猶永新民隱吏弊疏剔無遺尋以久任績最超擢浙江按察使州民思之如失父母鄭鋼吉安教授學行純實師表一郡其爲教諄諄然欲人敦德義薄榮利曰人有不爲也然後可以有爲學校士咸心服之張本𢎞治間知吉安府下車首撃鋤武斷豪惡數人強暴歛迹且汲汲焉表著節義若楊文貞劉子輔譚節婦皆奏請祠之其爲治知所先務類如此馬鉦𢎞治間知永寜寜在吉爲小邑前尹多荏苒卒事鉦至政教一新禁巫祝毁淫祠教民内祀其先外致敬土榖之神復制祭文頒示俾時序稱家致祭俗因以羙張淳𢎞治中知吉安府心清欲寡事不煩而民不擾自奉甚薄家人至不能堪自視裕如也前守專擅擊豪強小民之風益甚淳行無所事士服民化後官至都御史卒陳茂烈𢎞治中吉安府推官端重簡潔動必以禮郡訟諜日堆案從容推鞫不假聲色箠楚而奸黠者自無所容召爲御史以母老乞終養家貧不能自給有司以聞詔給月廪三石母卒哀慟失明尋亦卒部使者請于朝建孝亷坊以旌表其大節陸震㤗和知縣時逆瑾柄政民困政弛震洗剔瘡痍盡革積弊邑乃稱治有和買精葛以奉權貢者震毅然白當道止之後官兵部屬以諫止廵幸杖于朝卒李智吉水知縣誠心愛民藥病瘞死惠及貧困甲午夏恩江水驟漲衝决民居男婦随居漂流經文江智下令諭兩岸小舟能救一人者賞一金活者三十餘人卒賞如令仍給薪米追歸所活者流寓姚崇陜州人唐時嘗居永新縣北十里有臺曰聦明崇嘗舍其上其母墓今在縣治東牛僧孺涇州人祖仕唐自交廣至郴衡間爲山冦所掠惟僧孺母子獲存遂棲姚崇故址母訓之學母終葬邑之西南禾川元和初随計長安第進士後官至宰相李祁茶陵人元末舉進士第二人爲遼陽儒學提舉元亡不復仕寓居永新卒焉自號危行老人文章端雅有希蘧集若干卷人物漢歐寳安成人居父䘮鄰人格虎虎投其廬中寳以嬢衣覆之鄰人問寳寳曰虎豈可舍而藏之乎後虎每月送鹿以助祭時人以爲孝能格鳥獸寳之謂也晋修肅廬陵人爲典書令懐帝始立爲皇太弟懼不敢當肅曰儲副之重宜歸時望親賢之舉非大王而誰宜及時登儲副以允黔首喁喁之望帝曰卿吾之宋昌也從之苻表苻朗兄子也徙居安成大中間年十六母姜氏有疾侍省晝夜數十母一食表亦一食母不食將絶表感咽而殞俄頃母亦沒葬于四望岡太守爲表其墓五代周彬永新人南唐主鎮金陵彬囊文而往㑹有事圜丘募人爲文乃用彬所著累官大理司直歸宰本邑爲政亷平嗣主錫以銀章茜綬以寵異之官至尚書郎曾崇範廬陵人竈薪不屬而讀書自若家藏九經子史南唐刺史賈皓就取進之以已緍償其直崇範笑曰墳典天下公器世亂藏于家世治藏于國其實一也何估直以償耶召授太子洗馬遷東宫使蕭儼永新人以童子擢第及長有志量仕南唐累官大理卿兼給事中後主屢與嬖倖對弈儼入白事舉奩投地後主大怒曰汝與魏徴孰愈儼從容曰臣若非魏徴陛下亦非唐太宗矣後主黙然罷弈郭昭慶永新人世業儒父鵬南唐進士官至大理司直昭慶􅀶通經史擬元經作唐春秋著治書五十篇以獻後再獻經國治民論各十餘篇後主恱之授著作郎時嵗貢方物于宋表箋詞章皆出其手劉茂忠安福人貌魁雄善用大稍事南唐以功授吉州兵馬監押累遷袁州刺史宋平江南茂忠至京太祖間汝在江南屢擾邉邑何也對曰臣結髪事主惟忠勇是奮雖使陛下親征臣亦殞身不顧太祖壯之宋王克貞廬陵人南唐進士累官光政院副使宋初授太子中允知漢州太宗聞其有詞學命直舍人院誥命典正時人推之修太平廣記緫類出知滑襄梓三州所至皆有善政劉德言安福人南唐時冦亂德言率良家子弟悍閭里全活甚衆宋平江南以所統兵授文階仕至水部貟外郎江南轉運使蕭定基廬陵人舉進士累官監察御史裏行蘄州守王䝉正恃勢責賂誣屬縣長死罪詔定基往治遂正其獄宜州蠻爲冦以定基爲廣西安撫蠻不復動再遷淮浙荆湖制置發運副使歐陽觀廬陵人少孤力學舉進士歴綿随頴三州推官天性仁孝嵗時祭祀必涕泣曰祭而豐不如養之薄也常夜燭治官書屢廢而歎妻問之曰此死獄也我求其生不得耳後以子修貴累贈崇國公歐陽曄觀弟與觀同登進士累官知桂陽監民有相毆至死者獄久不决􅁮出囚飲食之㯮留一人曰汝持七以左手今死者傷在右肋此汝殺之明也囚即服其决獄多類此官至都官貟外郎歐陽修觀子四嵗而孤母鄭氏守節教育之舉進士甲科仁宗時為諌官論事切直韓琦范仲淹相繼罷去修上疏極諌出知滁州還為翰林學士拜恭知政事盡心匡弼與韓琦䇿立英宗熈寜初以太子少師致仕自號六一居士卒贈兖國公謚文忠脩多所著述撰唐書五代史文章名冠天下與唐韓愈並稱云王贄太和人舉進士知開封府慶厯初知諌院言事多聽用除天章閣待制條陳時事對奏甚久上謂左右曰五方異禀若南方有燕趙之氣玉贄是也英宗踐祚進給事中神宗即位改户部侍郎張庠永新人􅀶通經史嘗著斥蠧正言二書以排佛老作元經圖以推五行六度之秘鄭獬吳處厚錢明逸軰皆師之號白雲先生毛洵吉水人父應佺舉進士歴官太平州通判洵亦舉進士又中㧞萃科性至孝凡守四官再以親疾觧任執藥調膳及親卒荷土為墳廬墓所朝夕哭踊若初䘮郡以孝聞賜其家粟帛劉沆永新人曾祖景洪不從彭玕活萬餘人沆倜儻任氣登天聖中進士擢右正言知制誥陜西用兵沆極言得失執政不恱曰湏君作相自行之皇祐中果拜相後罷為工部尚書知應天府徙陳州卒諡文安子瑾登進士累官天章閣侍制歴知瀛䖍江福㤗五州所至以能稱彭思永廬陵人舉進士累官侍御史皇祐中祀明堂百官遷秩思永以抗論張堯佐王守忠罷知宣州歴知成都府還拜御史中丞時追崇濮安懿王諌官多以罪去思永力陳不可且請召還言事者以户部侍郎致仕子衛孝謹有節操以父老棄官家居者十餘年曾朝陽永豐人慶厯間登第為石首令寛其賦稅改忠州從事教民從事文學有文集二十卷弟匪亦同登第為南安主簿邑有冦獨力擒之辭賞不受改龍南令設學以教其子弟後移知玉山朝陽孫元忠大觀間登第累官廣州教授所著有春秋厯法論語觧周易觧等書門人私諡文節先生歐陽發脩子少好學師事安定胡瑗得古樂鍾律之說不治科舉文獨探古立論議以恩補將作監主簿累遷大中丞弟棐廣覧強記能文詞累官職方貟外郎知襄州徙知潞蔡州董敦逸永豐人舉進士歴知穰縣弋陽縣俱有惠政及民元祐中為監察御史出知臨江軍哲宗復召拜御史上疏辨瑶華秘獄出知興國軍徽宗召拜諌議大夫極言蔡京蔡卞過惡遷户部侍郎張汝明廬陵人兄汝賢元豐中為侍御史以論左丞王安禮與俱罷汝明元祐間舉進士歴官州縣二十年率多惠政徽宗召拜監察御史即日劾蔡京等後知岳州卒汝明性至孝執母䘮水漿不入口三日病羸行輒踣夢父授以服天南星法用之驗人以為孝感所著有易索書張子巵言劉弇安福人兒時警穎日誦萬餘言元豐初舉進士繼中詞科歴官知峨眉縣改太學􅀶士元符中進南郊大禮賦徽宗時改著作佐郎弇為文辭剷剔瑕纇卓詭不凡所著有雲龍集三十卷劉顯吉水人舉進士爲光禄主簿時曽布當國顯于布爲甥壻未嘗間見布貶顯得免後爲䕫路提舉常平子琮登第任諸王宫翊善靖康中京城受圍敵議立張邦昌琮不預有文集數十卷郭知章龍泉人爲中書舍人有董必者使廣東罷歸除北部郎官知章歴䟽其罪不肯草制羣議韙之官至直學士卒祠于學曾肅太和人居父䘮廬墓數年有慈烏來巢人以爲孝所感子安止登科爲彭澤令掛冠歸隱安中未冠登第上書言時政入黨藉安強爲進士提舉成都路常平嘗葬暴露不葬者三十餘柩蕭楚太和人紹聖間游太學時蔡氏專國禁春秋學楚誓不復出仕著經辯四十九篇弟子百餘人受春秋大義者纔三四趙暘馮澥胡銓皆師之自號三顧隱客既沒門人私諡曰清節先生歐陽珣廬陵人崇寜中進士授南安軍司録以薦上京師遇國難議欲割地講和珣上書極論不可忤時宰加將作監丞出使河朔至深州慟哭謂城上人曰朝廷爲姦臣所誤吾已辦一死來矣汝等宜勉爲忠義以報國金人怒執送燕山焚死之劉才邵廬陵人鶚之後紹興中累官中書舍人兼權直學士院髙宗稱其文出知漳州開渠溉田民甚德之召拜工部侍郎權吏部尚書才邵氣和貌恭方權臣用事日雍和遜避以保名節所著有檆溪居士集曾光庭吉水人仕爲永州東安簿靖康之難勒兵勤王㑹徽欽北狩列表勸進髙宗立光庭不願受賞孫三復紹興間登第累官監察御史舉劾平正遷太常少卿上疏正太祖祫祭東向位改權刑部侍郎楊邦乂吉水人􅀶通古今以舍選登第每以節義自許建炎中通判建康府金人至守臣率屬迎拜惟邦乂不屈以血大書衣裾曰寜爲趙氏鬼不作他邦臣極口嫚罵而死事聞諡忠襄加贈至徽猷閣待制子再興爲岳飛禆將從飛戰郾城單騎入陣幾殪烏珠身被數十創而還蕭服廬陵人第進士知髙安縣治以教化爲本徙知康州召爲將作少監以使事得入對徽宗謂有争臣風擢監察御史俄偕沈畸使鞠獄坐覊管處州踰嵗得歸爲吏部員外郎出知蘄州郭孝友龍泉人舉進士累遷工部侍郎時秦檜與金約和以孝友同舍生冀其助已乃私諗之孝友曰議和本非至計因遂銷兵如後患何檜不懌尋以直敷文閣致仕卒祠于學胡銓廬陵人舉進士任樞宻院編脩官上封事力排和議乞斬秦檜孫近王倫坐是謫居海外三十年後入爲工部侍郎請祠以歸復召以經筵稱疾力辭因陳時病五事自號澹菴老人卒諡忠簡祠于學王廷珪安福人舉進士調茶陵丞以職事忤上官拂衣而歸胡銓得罪貶嶺南親友無敢通問廷珪獨送以詩流辰州孝宗召除國子監簿尋乞祠歸復召對時年九十餘賜坐勞問除直敷文閣所著有盧溪集項充龍泉人幼未知學兄洵美訓督甚至後與胡銓俱以春秋學馳聲終父母䘮兄弟當析産充盡以遜兄以報其教育之恩紹興間旌表門閭彭合廬陵人髙宗時爲清江主簿以土瘠賦重力請蠲减後爲京西總領卒于官䘮過清江民相聚哭肖像立祠長子商老爲南雄州司理司至南安通判次子漢老知常德府有豪民劉庚誣其悍僕爲盗漢老審鞠僕免誅死周必大廬陵人舉進士又中􅀶學宏詞科除秘書省正字兼國史院編脩官髙宗見其文竒之孝宗即位除起居郎權給事中以力排權倖忤㫖改福建路提刑後除叅知政事遷樞宻院使拜左丞相進少保益國公卒諡文忠祠于學有文集行世劉安世安福人舉進士嘗知雩都縣有郡官諷以獻羡餘者安世曰土瘠賦重安得有羡餘遂不仕歸而設教逺近受業者踵至楊萬里從而師之安世没萬里爲制服及葬門人私諡清純先生戴之邵安福人寓居鹿門山紹興末京西招討吳珙以書招之差充忠義破敵統置之邵遂率所募忠義千人入西京脩葺祖宗諸陵且創制永安軍收復鄭宻等州日與敵戰屢勝以兵粮不繼而歸楊萬里吉水人舉進士調零陵丞時張浚謫居寓焉勉以正心誠意之學萬里遂以誠名齋改知奉新孝宗時召爲國子監􅀶士後以寳文閣待制致仕進寳謨閣學士萬里際遇三朝始終一節杜門著書絶意榮宦開禧中見邉釁驟開謂必誤國幽憤激烈不食而死謚曰文節祠于學楊長孺萬里子自少頴悟超羣讀書一過成誦歴官至刑部郎中福建路安撫後除直敷文閣致仕憂人之憂急人之急閭里德之理宗即位諂除屯田郎官不出平生著作甚多尤工於詩李如圭吉水人七嵗時孝宗召問童子何業對能誦書即誦無逸篇帝大喜授廸功郎明日與父謝㤙賜宴殿上以父子不可同坐命設珠簾隔之宴罷就以簾賜之歸建淩雲樓以彰君賜後官至福建安撫使孫逄吉龍泉人其族祖叔通學極􅀶時稱書庫官至清海軍節度推官逢吉隆興初進士知萍鄉縣紹熈初爲右正言累遷吏部侍郎時朱熹在經筵持論切直小人濳激上怒逢吉謂熹所言皆正願留之以重經幄後以忤韓侂胄出知太平州丐祠卒諡獻簡弟逢年逢辰皆有文行時目爲孫氏三龍胡夢昱吉水人幼孤貧母教育之舉進士累官大理評事理宗即位求直言夣昱上封事言濟邸寃抑爲御史所劾削藉覊管象州貶欽州卒詔諡剛簡歐陽守道廬陵人少孤貧自力于學以德行爲鄉里儒宗淳祐初舉進士授雩都主簿以憂歸後累官著作郎兼崇政殿說書于學無所不講尤深前代治亂廢興存亡之説學者稱巽齋先生卒祠于學所著有文集劉子薦安福人父天驥以進士知澧州沒于王事子薦度宗時知融州以亷静著聞廣西經畧司檄爲叅議官德祜初元兵至静江子薦提兵守城取笏書其上云我頭可斷膝不可屈城陷竟死之文天祥廬陵人英姿俊爽目光如電舉進士第一授寜海軍節度判官歴湖南提刑平邵永巨冦已而入衛元巴延軍至臯亭山天祥往說之被脅至真州遁時益王駐福州天祥上書勸進以樞宻使號召天下屯贑州戰雩都大㨗加少保信國公嶺南兵敗被執服毒不死執至京見博囉丞相不跪問有何言曰爲宋丞相宋亡義當死更何言自是囚兵馬司者四年屢請死世祖從之將出獄即自贊云孔曰成仁孟云取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶幾無愧南面再拜就死本朝追諡忠烈建祠于京師祀焉鄧光薦廬陵人舉進士少負竒氣與文天祥同勤王贊畫居多挈家入廣東遇土賊妻子皆焚死累官禮部侍郎權直學士國亡投海者再不得死元將張𢎞範禮致舟中至建康得歸故山以沒彭震龍永新人天祥妹婿性跌蕩江南已附元天祥志恢復有書約震龍震龍與同邑張履翁顧司理盟各起兵嬰城自守天祥兵不至三人遂敗衂以死又天祥妹婿孫􅙫龍泉人知縣事元兵至拒守不下爲其所執死之張雲吉州人嘗爲敢勇將文天祥師入衛雲隸麾下及天祥以使命被執雲引兵自婺建劔汀取道歸時吉州已降雲謀興復夜襲元兵殺傷相當質明猶戰渴赴水死劉士昭太和人與鄉人同謀復太和敗血指書帛云生爲宋民死爲宋鬼赤心報國一死而已因以其帛自經死其黨入獄多乞憐茍免有王士敏者獨慷慨不撓臨刑嘆曰恨吾病失聲不能大罵耳鄒㵯吉水人徙永豐少慷慨有大志從文天祥勤王爲江西招諭副使聚兵寜都得數萬復興國永豐二縣進兵部侍郎後走潮州聞天祥被執乃自殺又劉子俊廬陵人從天祥爲督府機宜天祥被執乃自詭爲天祥意脫天祥及天祥至遂遇害劉沐廬陵人文天祥開府南劍沐收部曲㑹之授太府寺簿專將一軍爲督府親衛空坑兵敗被執與其長子仲子皆死季子復從天祥死嶺南當時江西忠義皆沐所號召云王炎午安福人名鼎翁爲上舍生㑹天祥舉義兵乃杖䇿謁見尋以母憂家居而天祥被執鼎翁爲生祭文以速其死隱居不仕所著有吾汶藁劉友益永新人宋亡卜築萬山間杜門讀書不與世接著通鍳綱目書法五十卷研精覃思歴三十年而後成元揭傒斯稱之曰百世之下先生此心先生不作山髙水深劉辰翁廬陵人少舉進士宋季亂遂隱居求道所著有湏溪文集子尚友能繼其學元吳澂評其父子之文謂辰翁竒詭變化尚友浩瀚演迤皆能成一家之言云元劉詵廬陵人㓜失父年十二能文章宋遺老一見即以斯文之任期之在元屢薦皆不起其爲文根扺六經躪轢諸子百家融液今古而不露其踔厲風發之狀所著有桂隱集龍仁夫永新人􅀶究經史以道自任仕元爲湖廣儒學提舉晚年僑居黄州著周易集傳十八卷其他文尤竒逸流䴡學者稱麟洲先生劉岳申吉水人仕爲遼陽儒學副提舉以太和州判致仕其文辭簡約峻潔甚爲吳澂虞集所推重逺近學者師尊之稱申齋先生楊景行太和州人延祐初舉進士爲㑹昌州判官教民穿井以飲陶瓦以覆民始免于灾癘歐暴興學惠化大行後歷永新判官撫州推官宜黄歸安縣尹所至治官如家所去民皆立石頌之以翰林侍制致仕馮翼翁永新人舉進士試科斗賦有名官至撫州守所著有春秋集觧等書與父魯山弟奬翁俱以文學稱劉瑾安福人􅀶通經史隱居不仕所著有詩傳通釋行世李亷安福人元末以鄉舉魁登進士尹信豐擁鄉兵守城父子俱戕于難邑人立雙節祠以祀之所著有春秋㑹通行世彭絲安福人父應龍宋江陵府教授致仕弟齊叔父子兄弟自相師友􅀶習脩㓗俱以著述爲業絲所著有筭經圖釋九卷黄鍾律說八篇禮記集説四十九卷又有易包春秋辨疑等書黄瑞節安福人元季不仕嘗輯濓洛關建諸儒之言爲朱子成書行世劉霖安福人少從虞集學􅀶通五經元季冦陷安成乃避地㤗和學者師尊之性耿介所著有四書纂釋太極圖觧易本義童子說杜詩類註羅明逺廬陵人元季冦犯吉安明逺率敢死士三百餘大呼巷戰城東殺冦數百人恢復郡城而明逺死郡爲立祠王充耘吉水人舉進士同知永新州著書義矜式行世本朝曾萬中吉水人自㓜穎異元季爲千夫長江右大亂萬中與弟粹中保障鄉里歸本朝還守吉安兵至走京師乞援授萬中江省叅知政事弟梓中親軍指揮使後城陷兄弟皆戰死羅復仁吉水人少負竒氣言論敏㨗本朝初奉命招降偽漢主陳理復往諭安南母侵占城安南人贈以黄金辭不受累官至𢎞文館學士以老歸田里賜玉帶襲衣名馬陳謨㤗和人自號心吾學者稱心吾先生行義脩潔以易詩書教授學者爲鄉郡所宗洪武初徴議禮以老辭終于家所著有海桑集書經㑹通詩經演䟽王沂㤗和人􅀶通諸經元季一試有司不合不復出洪武初徴爲說書上書論事授福建鹽運副使以老罷歸弟佑爲監察御史陞廣東按察僉事風槩凜然子伯貞爲按察司試僉事奏振寃滯恤孤寡防海冦及鹽法等弊後爲瓊州知府爲政清簡正統中贈吏部尚書劉崧㤗和人七嵗能賦詩其世父養䝉甚竒之洪武初以明經薦歴官職方郎中北平按察副使禮部侍郎權吏部尚書尋致仕歸雅好山水每登臨賦詠自號槎翁後復召拜國子司業卒有職方集行世蕭尚仁㤗和人􅀶通經史洪武中以賢良召對論民事十條甚見嘉納授潭府長史以老懇辭俾教雲南楚雄府既就道復馳使召還留京師月給膳羞尚仁求休致賜路費衣被而歸門人私諡曰正固梁伯興永豐人洪武初以明經舉除真定府同知善政著聞陞應天府丞改知梧州府後召至京查理刑科事嘗命撰日本國詔稱㫖陞河南右布政使觧縉吉水人㓜穎悟絶人洪武中舉進士選爲庶吉士嘗條陳政事言極切直永樂間累官翰林學士凡大制作咸出其手每預宻議後出爲廣西叅議平生重義輕利喜引㧞士類襟宇濶畧爲詩文皆豪放草書尤精絶洪熈間官其一子王省吉水人領洪武鄉薦不仕復以文學應徴浮梁縣學教諭尋轉睢寜濟陽靖難師至省大哭以頭觸明倫堂柱而死其子禎爲䕫州通判亦死于陣省志周是脩㤗和人少孤貧自奮于學初舉霍丘縣訓導擢爲周府奉祠正改衡府紀善嘗預翰林脩纂數陳論國家大計及指斥用事者誤國情狀靖難師駐金川門是脩暮入應天府學自經死省志吳孟勤永新人父師尹元進士孟勤詩文清䴡有父風尤善楷書學士胡廣其也薦孟勤入翰林孟勤薦楊士竒以自代士竒由此召用人稱孟勤爲知人官至楚府教授所述有匡山集胡廣吉水人舉進士第一永樂中累官至文淵閣大學士兼左春坊大學士惇厚慎操履論事持大體一時制冊多出其手寵遇日盛而自處泊然公退杜門讀書賦詩未嘗千人以私卒贈禮部尚書諡文穆王艮吉水人㓜孤事母孝洪武庚辰進士及第授翰林脩撰屢上言時政無所回隱靖難師至城下是夜飲藥而死省志鄒瑾魏勉俱永豐人瑾初以薦辟授巴縣訓導改延安未幾陞湖廣僉事進大理寺寺丞掌御史事魏勉瑾之時亦爲御史靖難師至城鄒魏自殺省志鄒朴永豐人以儒官仕周府直言極諫以止其非謀陞爲監察御史尋陞秦府長史歸省聞大理公死靖難之節憤激不食卒省志曾鳯韶廬陵人革除間爲監察御史靖難兵至遂自殺妻李氏亦死于節省志顔瓌廬陵人革除間沛縣知縣靖難師過沛乃自經死子有爲亦自刎楊士竒㤗和人蚤以􅀶學徴入翰林編纂書藉時共事者皆天下宿儒獨士奇爲首稱永樂初擢翰林編脩歴春坊大學士洪熈宣德正統中累官至少師兵部尚書兼華葢殿大學士預機宻重務典冊制命悉委焉其文章德業重天下卒贈太師諡文貞有東里文集行世鄒緝吉水人洪武間以明經舉累官至翰林侍講兼左庶子以文學名重于時王芳孫安福人官至山東河南布政清慎自持子髙亦以進士官至福建右布政使清慎如其父人咸重之省志曾棨永豐人永樂甲申進士第一翰林脩撰時簡㧞進士二十八人進學秘閣月試優劣棨信筆百千言以是名聞天下爲人温雅英邁官至少詹事兼翰林侍講學士預脩兩朝實録卒贈禮部左侍郎周述吉水人永樂甲申進士第二與從弟孟簡連名俱授翰林編脩述累官左春坊左庶子兼翰林侍讀預脩兩朝實録有文名孟簡卒官左長史楊相㤗和人永樂甲申㑹元進士入讀中秘書爲庶吉士天資闓爽文學䟽通朋軰鮮與之匹任刑部主事卒省志宋子環吉水人永樂甲申進士選爲庶吉士預脩永樂大典官至王府長史爲人寛厚夷坦孝弟出于天性自守有素居兩京二十餘年足跡未嘗渉權貴所述有詞林稿梁圍稿周忱吉水人永樂甲申進士時選曽棨等文淵閣讀書忱自願進學上喜増忱爲二十九人後擢刑部主事預脩五經四書性理大全宣德中陞工部右侍郎廵撫江南督理粮儲㑹計有方國用充足民懷其惠官至户部尚書卒諡文襄所述有雙崖集羅汝敬吉水人永樂甲申進士選爲庶吉士預脩實録陞侍講以言時政改監察御史交阯反廷議舉汝敬陞工部侍郎往諭以順逆禍福交人震恐廵撫陜西一方仰頼尋致仕卒所著有寅菴集李時勉安福人永樂甲申進士選爲庶吉士除刑部主事預脩實録改翰林侍讀嘗陳時政十五事洪熈初改監察御史宣德初復舊官尋陞學士正統中遷國子祭酒教規嚴整士類多所造就存心不愧古人所著詩文甚多學者稱爲古亷先生卒諡文毅鄉學祠之余學䕫㤗和人永樂甲申進士選爲庶吉士累官侍講宣德間預脩兩朝實録書成當遷學䕫上䟽乞致政歸平生負直氣非所當得一毫不取家無餘資而􅀶古好學孜孜不倦以終其身云蕭寛吉水人永樂甲申進士選爲庶吉士與脩永樂大典授兵部主事累官湖廣左布政使爲人寛容端重未嘗見其有疾言遽色所至有聲王直㤗和人永樂甲申進士以庶吉士入秘閣讀書累官至少傅兼太子太師吏部尚書性嚴重寡言笑在翰林三十餘年恭勤不怠詔特許之孫俅䕃授中書歴太平知府有善政省志王訓㤗和人永樂甲申進士爲翰林庶吉士儀度端謹爲上所重奥學能文章以疾卒于官省志彭汝器安福人永樂甲申進士入讀中秘書官至翰林學士嘗扈從北征預脩實録卒于官省志蕭省身㤗和人累官河南布政使有惠政及民爲人温雅涵容而端㓗之操始終一致士大夫多愛重之劉子輔廬陵人由太學生擢監察御史陞廣東按察使卓有憲體坐累左遷交阯諒江知府撫民如子時叛冦猖獗子輔率民兵固守冦悉衆來攻城陷子輔與其妻子死之兵民皆死無一人降者事聞贈布政司叅政李昌祺廬陵人􅀶學強記永樂甲申進士選爲庶吉士歴官禮部郎中舉陞河南左布政使涖政精敏庭無留事時以亷能稱致仕卒所著有詩文集藏于家蕭時中廬陵人兄不敏事母盡孝與時中自相師友時中登永樂辛夘進士第一入翰林爲脩撰不敏亦以詩經薦上春官㑹時中充考官即以避嫌不入歸教授于鄉逺近從學者多取髙第熊槩吉水人永樂辛卯進士累官監察御史大理寺卿嘗廵撫浙東西及蘇松常鎮所至鋤治豪強進陞都察院左都御史卒于官所著有芝山稿公餘槁藏于家錢習禮吉水人永樂辛夘進士入翰林爲庶吉士授檢討仁宗特命侍左右備顧問所言多見聴納歴翰林學士禮部右侍郎致仕居官三十有七年以清節重望名海内爲一代名臣卒諡文肅省志陳賞㤗和人永樂辛夘進士擢廣西僉事守官清苦至無以爲殮妻子不能自存省志朱與言萬安人永樂壬辰進士歴官湖廣僉事四川副使號稱得憲體擢副都御史立朝侃侃有氣節每有封章皆切時政多見嘉納後以疾乞歸卒于家陳正倫吉水人永樂壬辰進士擢監察御史廵歴有聲舉陞南陽知府歴陜西四川按察使操履端慎所至有惠愛及民學士楊士竒最重之稱爲畏友羅通吉水人永樂壬辰進士累官至少保兼右都御史諳熟兵法才畧過人嘗從北征通設方畧自當一軍鼔行而前深入沙漠北兵逺遁凱旋大拜以憂去位卒省志歐陽和㤗和人永樂壬辰進士選授監察御史太宗時特知其寛厚坦亮亟稱之曰歐陽御史真識大體者後陞雲南副使卒省志陳循㤗和人永樂乙未進士第一授翰林脩撰累官户部尚書文淵閣大學士兼太子太傅立朝四十年列聖寵遇最厚省志廖謨㤗和人永樂乙未進士官至河間府知府所至多惠政有古循良風嘗任刑部主事福建僉事以明刑著稱省志曾鶴齡㤗和人永樂辛丑進士第一授翰林脩撰預脩實録陞侍讀學士有松坡集臞叟集藏于家郭循廬陵人永樂中進士擢刑部主事尋遣往南京録囚于枉抑多所伸雪嘗論列政務極言營繕之事因改工部官至廣東叅政劉髦永新人永樂戊子鄉試易魁後不果仕教授鄉閭學􅀶行莊不干仕進事母以孝稱鄉人化其德所著有易傳撮要脩身箴覆瓿集少師楊士竒重其篤學以子貴贈司經局洗馬周敘吉水人登永樂戊戌進士選爲庶吉士官至侍讀學士署南京翰林院事雖以文字爲職業尤著意國事前後章論皆剴切勤于纂修所著有詩學梯航唐詩類編劉球安福人永樂辛丑進士擢禮部儀制主事時麓川不靖上章請招降之下詔求言球復陳十事其一言宜親政務權不可移於下太監王振覧之怒欲置之法適編脩董璘自陳願爲太常卿振令錦衣指揮馬順深探其獄謂球畫此謀陛前捽球去球見刑不知所謂但曰死訢太祖太宗遂死于獄景㤗初贈翰林學士諡忠愍省志尹鳯岐吉水人永樂戊戌進士由庶吉士官至侍讀爲文章有法度根理據義磊落竒偉省志曾全㤗和人永樂戊戌進士授監察御史左遷汜水縣典史民感其惠立生祠祀之省志孫鼎廬陵人永樂間領鄉薦任松江教授擢監察御史提督南畿學政取人先德行而後文藝上北狩詣闕上疏請随所用以効死不報省志劉子輔廬陵人永樂間擢監察御史端謹清約風裁凛不可犯尋陞廣東憲使左遷交阯諒江府知府值黎利來冦諸郡縣多陷子輔以義堅守將及兵民死守數日冦益衆來攻城破兵民俱死戰無一人降者子輔知事不可支曰吾奉命守郡郡亡義不可汚賊手即死一子一妾皆相繼死事聞贈布政司叅政遣官賜祭復其家省志歐陽哲㤗和人永樂辛丑進士僉事浙江後副使河南歴官四十年以清介著人稱爲介翁省志萬節安福人永樂辛丑進士官至廣西按察副使操執不茍涖事必詳非人所易及省志劉廣衡萬安人永樂甲辰進士授刑部主事用法平恕陞陜西按察司副使遷右布政使尋陞右副都御史轉刑部尚書爲人清脩簡朴不事浮靡有古人風彭琉安福人永樂戊戌進士宣德間少師楊士竒薦入翰林爲編脩陞廣東僉事理學政官至湖廣副使爲人剛介居官泊然如布素勤於職務動以古人自勵致仕卒于家蕭鎡㤗和人宣德丁未進士由翰林侍讀陞國子祭酒後官至太子少師入内閣卒賜塟祭省志羅崇本㤗和人宣德丁未進士官至廣東雲南叅政嘗奉勅提督廣東秋糧以備接濟征進官兵處置得宜軍民稱快省志蕭晅㤗和人宣德丁未進士官至湖廣左布政使沈静有幹局不爲皦皦之行事必求於便民省志蕭啟龍泉人宣德丁未進士任監察御史累官都察院右僉都御史所至豪貪膽落小民樂生省志吳節安福人宣德庚戌進士由庶吉士官至太常卿兼侍讀學士己巳之變條陳經國時宜十餘事多見采納陞祭酒省志劉實安福人宣德庚戌進士通判金華三年不以妻子随郡賦以旱逋民或鬻子女以足取盈奏寛貸之又爲贖還其子女景㤗中召脩宋元史擢南雄府知府嘗以忤中貴得罪至京具言臣從官三十年飡粗衣敝欲爲國家愛養所部不忍勞費之以是忤使臣有罪上恕始霽不復窮治將釋免以病卒省志蕭維禎廬陵人宣德庚戌進士累官至刑部尚書性瓌偉而才充敏爲法官数十年練逹事體聲聞籍甚省志廖莊吉水人宣德庚戌進士官至刑部侍郎景㤗間言事謫驛丞英廟復辟官至刑部侍郎卒贈尚書諡恭敏尹昌吉水人宣德癸丑進士官至行人司司正己巳之變扈駕北征自刎而死朝廷官其子省志李詔安福人宣德癸丑進士入翰林爲庶吉士累官翰林學士擢禮部右侍郎纂脩大制作多經其手翼猷輔德有古儒臣風省志曾翬㤗和人宣德癸丑進士官至刑部侍郎介直剛明德政懋脩省志蕭聦㤗和人起家刑部主事陞郎中改禮部祠祭司以練逹老成進本部侍郎改南京吏部左遷湖廣布政司叅政省志劉益吉水人進士第授兵科給事中封駁彈劾務存大體嘗旱祈雨雨随注人以爲誠感巳巳北兵臨邉往山東募民兵以偹民頼以安陞湖廣叅議未幾召拜祭酒卒于官省志陳文廬陵人正統丙辰進士及第歴翰林編脩拜詹事陞禮部右侍郎累進太子少保禮部尚書兼文淵閣大學士謨謀毗益眷注日隆卒諡莊靖文學識敏悟且逹於政體亦一時之能臣也省志劉定之永新人正統丙辰進士及第授翰林編脩己未京師大水條陳十事己巳畨衆犯順復上十事多見采納歴遷洗馬右庶子陞太常卿兼學士入内閣改工部右侍郎卒年六十贈禮部尚書諡文定省志梁婺㤗和人進士歴刑部貟外廣東副使浙江左布政清操粹行爲時首稱省志蕭翼永新人由進士知濳山改知長垣黄河漂民舍十常八九翼浚河築堤身先衆役發粟賑貸踰二稔而水定民安任滿老稚遮留不可争祠祀之陞順德知府歸裝惟一琴而已省志劉儼吉水人正統壬戌舉進士第一累官春坊大學士太常少卿兼翰林侍讀爲人性剛直遇事侃侃不爲勢屈爲文章舂容典雅卒贈禮部侍郎諡文介陳宜㤗和人工科給事中累官都察院副都御史廵撫貴州屢著竒績逺人向化轉兵部左侍郎卒爲人謹厚有德望而經術尢正省志劉鍇㤗和人正統進士任刑部主事正統中值北兵入境條陳十四事皆見采納歴陜西山東僉事嘗劾廵撫之不法者因調雲南既歸清約如貧士省志周鐸萬安人正統壬戌進士累官至廣東布政敦朴誠篤歴官数十年以清慎勤著聲所至有遺愛焉省志左鼎永新人進士擢監察御史立朝蹇諤風裁凛然後拜都察院左僉都御史未至而卒所著有立齋集省志羅如廬陵人正統壬戌進士授行人巳巳扈駕北征土木敗績死之景㤗間詔旌異録其一子省志王槩廬陵人正統壬戌進士由主事歴藩臬兩司所至囹圄空虗天順初被誣下獄時襄王入朝上以官吏賢否問首稱槩以對即日宥還尋陞都察院右副都御史廵撫陜西設法救荒還定流適改大理卿陞刑部尚書䟽陳時政十事上嘉納焉卒諡恭毅子臣進士官翰林省志曾㢘鶴齡子正統乙丑進士歴任御史福建僉事湖廣叅政浙江按察使以家學擅名于時且剖决如流政聲赫然同官皆歛手推讓所著有介菴集省志劉孜萬安人正統乙丑進士授監察御史廵按遼東景㤗初額森攻遼東孜躬督邉將嚴翼抗禦進山東按察使治行爲天下第一人入爲都察院右副都御史陞刑部尚書以疾乞休歸卒省志彭時安福人正統戊辰狀元及第拜翰林脩撰歴陞太常卿兼學士脩英宗實録成進太子少保兵部尚書大學士在内閣屢進直言嘗因地震陳六事規切時政彗見陳七事言皆剴切無忌成化乙未卒于官贈太師諡文憲省志羅俊㤗和人正統進士任監察御史歴官潯州知府蠻獠向化郡大稱治改南雄公亷寛厚有古循吏風省志劉昇永新人豪爽偉敏寜藩器之請爲己用遣官諭意昇不可明年中進士第二授翰林院編脩居翰苑年餘剛果無附惟刻意問學而已年三十而卒人咸惜之省志劉敷永新人進士授監察御史歴湖廣布政使值星變條奏時政十二事憲宗可之陞廵撫右副都御史討平苗冦獰惡效順召還院爲副都御史以疾休致居鄉二年人無間言𢎞治初起爲右都御史後乞休卒于家省志鍾同永豐人父復翰林編脩同任御史以直言死獄天順初贈大理寺丞劉宣安福人登進士入翰林爲庶吉士累官至工部尚書平生厚重優容喜恕不形卒諡文懿省志張業安福人景㤗進士由翰林庶吉士檢討陞國子司業凡八年坐註誤落職士論惜之平生誠篤力學不倦爲文温雅所著有書經節傳禮記節疏省志王臣吉水人南京監察御史奉命廵觧池塩屏奸盗時出納一切興革曲盡良法國課日益以充未幾卒觧人立祠祀之省志彭蕐安福人景㤗甲戌㑹試第一歴官吏部侍郎兼學士入内閣加太子少保禮部尚書致仕卒贈太子少傳諡文思才識超邁望重一時嘗侍經筵及東宫講讀啟沃居多屢典㑹試及兩京文衡號稱得士預脩英宗實録一統志續綱目恩賚優渥業擅春秋海内士翕然景從有文思集行于世省志尹直㤗和人景㤗甲戌進士累官至太子少保兵部尚書入内閣憲廟時陳言脩省凡三十二事又嘗諍萬貴妃之贈李孜省之進斥内史李毅之誣宗室办御史吳珎之坐誣人謂其得相體致政家居肆力制作有澄江集别集續集行于世卒諡文和省志劉釪安福人景㤗進士累官至雲南按察使自爲監察御史以來所至慎憲度理寃獄訪民利害而興除之不務摶擊以張聲威其在雲南示以恩信民夷俱戴省志伍驥安福人景㤗甲戌進士授監察御史出按于閩上杭巨冦謀作亂驥單騎從数十人直抵其穴降之斬其渠魁餘皆爲置牛具給種子令各就農衆大恱納命卒于京杭人肖像祀于城樓仍命建廟祀之子希閔成化乙未進士歴官福建兵備僉事再平上杭漳冦民德之配享父祠姪希淵天順甲申㑹魁進士官至廣西布政祀于名宦祠希齊𢎞治庚戌進士卒于黄州府推官有治蹟一門累葉以春秋擅名于時省志劉珂安福人進士歴知縣御史副使以至廣東布政使其宰麻城嘗悟五蛇入庭而伸五人横死之寃人謂其政通幽明其在山西發倉賑饑活人無數省志傅韶永豐人登進士授刑部郎中剛明有執嘗攝大司冦事時太廟被盗金盆珠冠西䑓繋至數百人韶承命往聽得其盗逮繫者得以全活遷黄州知府益勵清操力折豪強庶務爲之脩舉省志王用㤗和人景㤗進士官至河南布政嘗廵按蘇松斷决如流獄無流滯貪墨望風知懼省志康驥㤗和人拜監察御史天順初宦官武將竊威弄權致賣官鬻爵以干憲度驥抗章論其奸狀羣小交相泣訴于上不得已下驥獄拷掠備極而詞氣侃侃不少挫既得恩釋奸黨縮首以避後廵按山東北直𨽻所至風紀肅然吏民畏懾後陞福建轉運使卒于家省志楊琚㤗和人兵部主事出鎮山海關政令多著爲例轉武選郎中紀功陜西嘗奏改延綏城堡及建言軍民利病上多采納尋陞叅議奉命撫治荆襄築老龍隄䟽竹筒河及剏改劉家隔雷峰􅉾等水驛廵司皆有利于民而開剏鄖陽功尤居多以叅政總督粮儲致仕卒省志彭教吉水人天順己夘舉江西鄉試第一甲申復擢進士第一授翰林脩撰預脩英廟實録書成進侍講典㑹試京闈文衡所取多名士侍講經筵銳意轉導竟齎志而殁所著有瀧江集省志阮玘天順進士授行人所至不辱君命拜監察御史貪暴不敢肆侵漁董築運河决隄令有司與民爲期約民恱事集尋以廵視鹽塲冒暑得疾至京卒歛殯不能自舉鄉舊共賻僅得歸襯玘平生篤行動以古人自期其孝友尤爲人所重云省志羅璟㤗和人天順甲申進士及第授翰林編脩嘗上疏論慈懿山陵事上嘉納之充經筵講官命纂續通鑑綱目成進司經局洗馬時李孜省惡不附已隂中傷之調南京部屬轉福建提學副使冡宰王恕特疏薦爲南京國子祭酒篤實平易善激引後進以疾乞歸所著有氷玉集省志龍文㤗和人歴官文選司郎中以清慎著天順初陞南京工部侍郎卒省志蕭禎㤗和人進士由刑主事陞湖廣僉事以亷幹名歴九載不奏蹟而歸尋遣中使以副使起千家後累官都察院副都御史廵撫陜西令行禁止風清俗正進南京工部侍郎轉刑工二部尚書以疾休致性亷㓗尤精吏事所至有赫赫聲省志張敷華安福人天順甲申進士以翰林庶吉士歴官兵部郎中浙江叅議叅政湖廣布政進副都御史廵撫山陜都察院左都御史歸休逾年卒平生剛介不輕言笑奉公秉法望重一時南都稱四君子盖推敷華云卒贈太子少保諡簡肅省志羅倫永豐人成化丙戌進士第一䇿對萬言中引程子人主一日之間接賢士大夫之時多親宦官宫妾之時少句諸執政欲節其下句倫不從直聲振時爲翰林脩撰大學士李賢遇䘮去官奪情起復䑓諫皆不敢論列倫詣其私第告以不可復上疏歴陳古今起復之非累數千言一本于天理人心之不可已者疏入落職提舉泉州市舶而終倫之世臺省未嘗有起復者矣明年復脩撰改南京尋以疾辭歸開門授徒日註經箋史以終其身所著有一峰集子幹由舉人任知縣有父風省志劉喬萬安人成化進士拜監察御史按畿内八郡獨持風裁稱名御史歴湖廣按察使轉右布政亷明益著興仆起墜凢百皆飭治無遺因奉命祀南嶽卒省志周孟中廬陵人登進士授主事歴僉事副使皆以提督學校用譽陞按察使䑓諌表天下方面治行著聞者以孟中居第二陞浙江右布政使轉廣東左布政進副都御史乃以疾懇乞歸平生性剛毅重名節所著有畏齋集子統登進士省志劉震安福人成化進士及第授翰林編脩進侍講㑹國子缺司業以右諭德暑司業事未幾遂爲南京祭酒越五年以病卒性剛毅耻于詭随爲文敏贍雄健下筆數千言不襲陳筌所著有雙溪集省志王禎吉水人䕫州府通判荆襄劇賊石和尚反禎領民壯與戰大敗之越三日賊大集禎曰今日當以死報國復領兵壯衝賊鋒殊死戰援兵不至遂爲賊所獲禎奮罵不已賊殺之詔贈䕫州府同知録其子廣于太學省志張黻吉水人進士擢涪州知州清介公明愛民如子茍利於民雖權貴不避陞後軍都督府經歴父老泣留不可得時刑曹林俊以忠諫下錦衣獄黻獨上章救之言甚懇切亦下獄得不死惜未究其用而卒省志馬鉉永新人成化進士授工部主事治遵化鐵治律身亷約治事周宻時役夫多病疫癘鉉親爲察脉而藥之盡獲甦愈民祠祀之再陞廣西叅議㑹古田苗賊猖獗自將往勦出其不意斬獲過半班師歸爲伏兵夾戰竟死之事聞諭祭贈叅政録其子省志劉戬安福人成化進士及第授翰林院編脩進侍講孝宗皇帝嗣位充正使使交阯交阯爲吞占城侵緬甸頗崛驁僉難其行戬承命乗肩輿從兩僮道南寜直抵其境交人驚曰豈天人耶舘候視昔倍恭餽遺一無所顧交人謝表有廷臣清白之語交爲建郤金亭於思明道中後以志春坊右諭徳終所著有晉軒集省曾彦㤗和人成化進士第一時年幾六十性純篤平生自負其重及第時祭酒丘公濬書歸第綵旗對云江右賢科十回虎榜魁天下西昌文運三應龍洲過縣前都人榮之官至南京翰林院學士嘗與脩憲廟實録同考㑹誠其爲文不事刻削而平澹思致自不可及省志曾進鶴齡孫成化戊戌進士及第學􅀶才髙爲儕軰所推重入翰林爲編脩未逾年以疾卒省志歐陽旦安福人進士授休寜令厚風俗興學政擢監察御史民懐遺愛生祠祀之𢎞治初條陳時事上多采納以副使提督浙江學校敷教以寛後累官南京都察院右副都御史歴任三十餘年清節始終一致弟晢登成化甲辰進士廣東提學僉事才行實相伯仲云省志劉丙安福人進士由庶吉士進監察御史按歴所至風采壁立陞副使提督閩蜀學校道尊而教立遷貴州按察使虜冦聞風夜遁廵撫湖廣時方大營建遷工部侍郎督諸藩採運材木竭力區畫令行弊革憂勞成疾卒于官訃聞贈南京工部尚書諡恭襄省志羅用俊㤗和人領鄉薦授青田教諭進安慶教授兩京太學學正助教所至以身爲教士敬信之去則祀于名宦祠三子皆舉進士以子貴累封通議大夫卒賜祭塟省志徐穆吉水人𢎞治癸北進士及第授翰林編脩同考㑹試一時名士多出其門侍讀武宗即位充正使頒正朔于朝鮮正迎見之儀拒饋獻之禮逺人畏服逆瑾惡不己附調南京員外郎改兵部㑹瑾誅還職進侍讀學士而卒穆有長才大畧未究所施士林惜之省志周魯吉水人進士授監察御史出按雲南彈劾不避抽分盧溝權貴杜謁時有以司馬遷冡宰者十三道以爲不可欲言之而無肯當先者魯曰言官畏言耳即首署其名冡宰憾之後與都憲公論差法不合因廵山西以疾乞休杜門自守終于家省志王懋中安福人登進士宰南樂歴九任至南京右都御史操履清介方鎮撫滇南時不避權貴奏免塲課數事有忌公能者公懇疏乞歸家居者四年宸濠叛倡集義兵告變力贊討之詔起南北兩臺既二年以疾卒省志王思登正德辛未進士選庶吉士授編脩士林推重省志列女項氏吉水人居永昌里適同里孫氏宋宣和中爲里胥所逮至中途欲侵淩之項引刀自刺而死事聞贈孺人旌其廬梁氏龍泉人適同邑李生宋紹興初盗彭友犯吉州梁義不受辱赴水而死歐陽氏安福人適同邑劉生紹興中生以事出惡少來欲侵淩之歐陽不受辱而死同縣有朱雲孫妻劉氏姑病雲孫刲股肉作糜以進而愈姑復病劉亦刲股以進又愈譚氏婦永新人姓趙氏宗室女宋末元兵破城趙氏從其家俱匿縣學兵至殺其舅姑與夫執趙氏欲汚之趙氏哭罵不從以死自誓遂并其子皆殺之血漬于禮殿間八磚上宛然一婦人抱嬰兒狀或磨以砂石不滅又煆以火其狀益顯至今如初云胡貞女大學士胡廣女吉水人在妊時太宗皇帝命與大學士觧縉子爲婿越數月果生貞女因名吉慶奴遂訂盟未幾觧氏被誣舉家戍遼諸父欲改適他姓貞女竊入室以刀截耳家人覺而救之血被兩頰因言曰薄命之婚皇上主之父面承之一與之盟終身不改今背主違父何以生爲越數年觧氏蒙宥歸胡既歸觧氏以孝名省志顔節婦姓蕭廬陵顔伯偉子有爲之妻有爲死父難蕭氏養姑守節省志楊節婦㤗和刑部主事相妻年十九撫子養姑守節正統間奉詔旌表其門省志曾氏三節㤗和人進士曽思文妻楊氏年二十四思文卒守節撫孤嶽既長爲娶康氏生子洧時年二十四嶽卒康守節如其姑有司請旌表之詔下而洧亦卒洧妻任氏人或勸之嫁曰吾曽家無背夫婦人守節以終省志鄧節婦姓蕭吉人翰林編脩鄧珎妻珎卒時年二十二無子貞静自閑無故不出户庭勤紡績以終其身卒年八十餘天順間旌其門省志劉氏三節婦孫氏文貞廬陵劉燧妻年十八守節胡氏滿貞歸燧之兄㵸年二十七撫孤守節胡氏寜貞歸㵸之從弟澗年二十六撫孤守節誓與妯娌共守有司上其事詔旌表其門曰劉氏三節婦之門省志羅節婦曽氏漙秀永豐副使曽鼎女歸里人羅年二十三守節成化間詔旌省志劉氏順貞安福伍希憲妻年二十八希憲卒劉以老母與孤在自誓守節養姑教子如夫言𢎞治間旌表之省志劉節婦姓周名性㤗和劉士鴻妻夫被徴卒于京婦年方十九生男纔一月誓不他適撫子養姑以壽終省志胡貞女永豐胡邦振之女許聘里之俞勝祖及笄未歸而勝祖死父母將改聘之貞女嚙指泣誓曰改適他人吾寜就死父母乃不敢強紡績自活終身無毫髪玷省志頼氏萬安曽友文妻年二十而夫亡男敏生甫三嵗頼紡績以養舅姑訓敏讀書遊邑庠人比之陶母云省志羅氏三節歐陽氏吉人諱壽娘鵞田羅韞匱妻韞匱卒時婦年二十五長子篤温方二嵗次篤良尚在娠越四月而生歐陽氏撫二孤無異志長篤温娶歐陽氏酉貞生子甫期而篤温已篤良娶袁氏蘭秀生子既五嵗而篤良卒酉貞蘭秀相告曰姑爲節婦我屬獨改節乎乃恊力共守姑年六十而卒蘭秀年五十五卒酉貞年幾九十卒鄉里稱爲三節婦云省志羅秉厚妻曽氏淄陽縣丞忠翔女也年二十六秉厚卒一子用九甫彌月矢節教育始終無二志年七十四卒羅用俊嘗爲著慈節傳省志丁氏吉水王堯儒妻堯儒就婚河南時丁年十九越三月堯儒以疾卒遺腹生一女未幾父亦卒丁随兄奔父與夫二䘮歸道經新淦其兄強之偕歸丁氏堅意歸吉水與外氏絶往來雖家貧無依不計年七十二而終省志王氏素英吉水生貟周必登妻王氏年十九歸必登𢎞治七年必登以疾卒王氏誓與同死不食數日母死歸吊一日語弟曰我死屍還周氏弟方出忽以無疾卒于家弟如其言還屍于周鄉黨莫不慟之省志許氏鳯㓗安福士人周梯雲妻年十九梯雲卒方有娠哭毁以身殉姑曰存祀與死孰重許訣曰妊男則生弗男弗生越四十有六日男煦生養舅姑撫孤子治生理咸有規年四十九而卒正德辛巳煦登進士第省志胡氏坤秀萬安周賢佐妻庚午之亂貞婦出走賊追之急貞婦度不能免乃跣坐於地賊驅之起行曰不能行指輿使乗之曰不能乗賊怒以刀叱之遂伏地而死死頗慘酷行道傷之省志梁氏文英㤗和蕭時玉妻年二十時玉卒卒時瞠目視兒女節婦逆其意囓指示之遂瞑目自是撫兒事姑終其身無疾言怨氣年七十七卒祭酒羅璟謂其如精金羡王不負所天云省志劉氏安福王良粹妻年二十五良粹以運稅卒于外時二孤俱幼撫長歸夫䘮塟于欽村廬于墓側因家焉卒年九十五鄒編脩守益爲節壽堂銘以表之省志仙釋曽志静廬陵人自少不御酒肉端毅寡言去爲道士益𤣥黙忽遇異人授以道術自是杜門辟榖十餘年異人來視之曰未也别去又數年復至曰可也宋至和二年春忽告其徒曰吾九月爲衡山之遊至期正坐而化既葬有自衡山來者持志静書勉其徒學道云李思廣吉水人自㓜志操特異放情山水間得錢即易酒或獨飲於市年逾七十容貌愈少宋政和四年遊螺川常住習溪橋酒家老嫗以爲異來則飲之以酒不問其直一日謝别老嫗晨起視已死矣遽報所親殮葬之日餘有客見思廣于千里之外衣冠如故乃開棺不見其尸云匡智長安人唐貞觀間棄妻子與姪大郎適廬山脩道居七日有老人曰廬山隂地仙不可得南有名山陽地可往居之乃至吉州望見義山其山神化爲樵夫引入山中曰此處安穏遂立壇脩行數年忽有仙衣降智服之但見足下雲生上昇而去大郎亦爲地仙至誠禪師㤗和人少師事神秀禪師于玉泉寺神秀一日謂其徒曰吾聞南宗深悟上乗吾不如也且吾師五祖親付衣法豈徒然哉師聞此語即往曹溪叅請南宗示偈曰一切無心自心戒一切無碍自性慧不増不退自金剛身去身來本三昧師聞偈遂誓依歸南宗即六祖也眞寂禪師安福人師事曹溪六祖傳其衣法住青原山靖居寺緇林向慕多往從之唐開元中端坐圓寂真寂即七祖也明一統志卷五十六
