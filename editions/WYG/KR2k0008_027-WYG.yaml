叛将破之留鎮汴有善政子孫遂家太康韓𢎞憲宗時宣武軍節度使汴自劉士寧以來軍益驕主帥勢輕不可制𢎞察素恣横者數其罪斬之自是訖𢎞去無一敢横者令狐楚敬宗時宣武軍節度使以仁恵解去酷烈人人悦喜遂為善俗裴休宣宗時宣武軍節度使不為皦察行所治吏下畏信之五代陳省躬鹿邑令居官有異政民思之宋髙懐徳留守睢陽時杜仲威降契丹京東羣盜大起懐徳堅壁清野敵不能入建隆初累遷歸徳節度使竇偁開寳中為歸徳軍節度判官遷知宋州尋為開封判官時太宗為府尹嘗宴諸王偁與推官賈琰預㑹琰言矯誕偁叱其巧言令色王曾天禧中知應天府民間訛言有妖起若飛帽夜搏人曾下令敢倡言者即捕之卒無妖李防真宗時知應天府鑿府西漳口為斗門洩汴水溉田數百頃民甚利之張知白知應天府先是與王欽若不合至是欽若分司南京衆謂知白必報之既至待欽若加厚議者多之燕肅知考城縣有政績子度知陳留縣京東蝗饑盜𤼵度勸邑豪出粟以濟民又行保伍法以察盜善政日聞晏殊天聖間知應天府延范仲淹以教生徒自五代以來天下學校久廢興學自殊始後又厯知陳州許州遇事即決庭無滯訟張先天聖中知鹿邑縣吏畏民懐韓琦為永城令政平訟理境内清夷民敬畏之若神明劉航厯知虞城犀浦二縣虞城多猾狡喜宼盜犀浦民弱而馴航為政寛猛急緩不同兩縣皆治劉安世知虞城縣縣多姦猾喜宼盜安世乗之以猛遂稱治賈昌朝知應天府後弟昌衡及從子炎相繼知應天政蹟並著孔道輔孔子四十五世孫仁宗時知應天府遇事即剖㫁不狥私請蘇頌神宗時知應天府呂恵卿諷以一詣我執政可得頌笑而不答又知開封府頗嚴鞭朴頌謂京師浩穰當以柱後恵文治之耳劉摯簽書應天府判官時司農新令税及天下祠廟摯白留守張方平奏罷之曾肇以待制尹應天府天資仁厚剛大之氣粹然見於面人望之知其為成徳君子也文學徳行皆可為後人式苗時中主寧陵簿邑有古河久湮請開導以溉田為利甚博人謂之苗公河章炳文為虞城令脩舉廢墜盡力於所當為採事蹟可行者刻石紀之必行而後已淩唐佐建炎初知南京及南京䧟劉豫因使為守唐佐密疏其虗實遣人持蠟書告於朝事泄遂遇害王慥靖康中為拱州守仁愛公謹金烏珠寇河南慥拒之力不能支遂全家死焉金尹升卿大定中為寧陵令以㢘能當升除金主謂㢘能者即與升除無以慰百姓愛留之意但命進升卿官王徳彰以進士知夏邑縣在任起廢植仆興學課農化行俗善人以良吏稱之元商晦世祖時知夏邑縣重儒術禮賢士課農桑鄰邑流亡悉歸之號稱樂土云宋世元至大中永城縣令務徳化不任刑罰是年夏麥雙岐又明年秋嘉禾並秀蝗不入境民思之立誦徳碑焉卜天璋皇慶初為歸徳知府勸農興學復河渠河患遂弭時群盜據要津商旅不通天璋禽百數人悉磔以狥盜為止息孫旭柘城令性溫和存心正大吏不敢欺民有誣訟者自揣其欺輒望縣而止陞去百姓遮道送之張廷珍南京路總管兼開封府尹勤於民事脩舉廢墜嵗大旱𤼵廩賑濟流民悉還志能知歸徳府㢘明剛㫁𤼵擿如神民有銜寃不直者雖數十年前事皆千里奔走來訴立為剖決旬日悉清趙璧泰定中知寧陵縣值嵗歉請賑至再嘗化蝗出境時論異之嚴瑜知歸徳府多善政民為立去思碑懐之梁思溫知睢陽縣器識髙邁得牧民體李守中方正有守知歸徳政清訟簡尤加意學校張思立至順中永城縣尹有文學通象緯為政明决人稱神明游居敬元統間知虞城縣持己㢘介為政勤勞任滿去人勒碑頌徳焉劉承事柘城縣尹蒞任首以鋤强暴為務凡素豪悉斂迹有學田為世家所并承事即追復之時大蝗害稼承事齋沐以禱遂悉出境及歸民思之因立碑頌焉許義夫順帝時夏邑縣尹每親詣郷舍教民稼穡勤者出已俸賞之怠者罰之及三年境内富庶吴肯搆鹿邑縣尹多幹濟尚氣節為政以厚風俗為先劉得新知柘城縣性慈愛值嵗饑勸民賑貸又大疫出俸市藥以療病者民賴以全活埜僊至正中尹柘城縣捕盜賑饑舉有成績流民多歸之後民立碑祠祀焉本朝蔡祥洪武初由人材知寧陵縣㢘幹正直撫民有方賦平訟息陞去民思之梅克讓洪武初知永城縣教稼穡植桑棗民甚利之陳紹睢州知州以㢘勤自勵分賦役之等以革其姦時蝗傷稼民饑紹憂形於色親詣上户室自貸粟以賙給之人以為得子民之道段嗣輝洪武間知歸徳州蒞政公勤脩舉廢墜陶文昌洪武間鹿邑縣尹政勤敏多撫字勸農興學禁邪革弊時稱治焉李學可洪武中知歸徳州政尚勸化有循吏風任思道鹿邑縣尹躬循田野督民稼穡不數年民以殷富及去民遮道送之扈俊臣洪武中知歸徳州民有賈五之子娶李聚女為妻不順舅姑責之投河而死聚與其黨威脅賈五父子俱縊死事久不白俊臣察得其情置于法郷人快之程寧可洪武末夏邑知縣為政精勤律己㢘慎凡遇科辦不擾於民時課生徒業精者奨進之姦弊日革吏民畏服楊廣仁永樂初虞城知縣興學勸農而民知禮讓人仰足給民家嘗失火廣仁望空禱之驟雨随至火遂不然周𢎞永樂中柘城知縣寛厚㢘謹治官如家愛民猶子戢暴横以安良善節用度以安民困一邑大治梁祖榮永樂中柘城知縣嵗值霖雨教民疏濬溝澮邑無水災民有負租者貧無以償祖榮首捐己俸以倡富民出粟助之由是官無負租而民不失所夏子芳歸徳州學學正經學詳明教法嚴謹士多成立焉方正宣徳間知考城縣寛刑薄賦守法奉公大得為政之體周普正統初夏邑知縣蒞政精勤㫁獄平允脩理學校增築城垣士民至今懐之仲廣正統中睢州知州修葺學舍訓勵生徒值嵗饑乃禮勸富家出粟萬餘以資賑濟尋以内艱去州人赴闕奏留詔奪情復任王理正統間考城知縣性沈識敏剖㫁盡情人不敢飾其非厯九年風化大行彭崑睢州知州性資狷介政事詳明興學課農大有政績㑹當道有橈之者遂乞休去蔣魁天順初知歸徳州㢘而不激寛而有制愛惜人材脩舉廢墜治績甲於諸郡宋景睢州知州明敏剛方不避權要時廖某横於河南誅索無己凡文移至郡景悉罷閣弗行廖欲中以禍無從偵隙後改監察御史直聲益振王恂成化初知睢州節財愛民抑强扶弱以績著特賜綵幣旌勞秩滿民乞留從之李敬成化間知考城縣清慎嚴明吏民畏服嘗建學掘地得錢若干緡悉以助役後卒于官士民思之立祠祀焉魏𢎞成化間考城縣典史時邑人張彬夜為仇所殺莫知其人𢎞以誠禱于神忽風起晝暝有一人仆階下訊之乃殺人者至今傳頌以為異政畢用成化末知歸徳州性剛毅不事媕阿㢘恤民隠時黄河潰溢用為築月堤水不得入廓且疏蠲嵗租曲為賑濟民賴以不魚有巨閹過郡强用拜跪用與抗閹怒誣奏逮繫京師竟直其寃得復秩人以畢鐵腿稱之陞去民遮拜泣留至不得行為立仁政碑頌焉沈杰與畢用俱成化丙戌進士相繼為守律己㢘勤敷政平恕士民賴之每頌曰畢沈比漢召杜焉唐相𢎞治初以御史謫任永城縣丞聴㫁如神至今民思之汪嵩𢎞治中知睢州立心平恕處事公勤厯官八年以清白自守日用恒不自給李紀鹿邑縣尹才識明敏案無滯留有餘閑則課校生徒境内肅然稱治王鼎正徳初知永城縣時流賊攻城鼎率衆守禦及城䧟鼎取印綬繫於身瞑目端坐以待賊入被執不屈死之事聞詔贈其官及其子劉信歸徳州知州性剛毅有才智明習吏事人不敢欺時遷城初庶務草創劉公經畫區處極為精密簿書之暇課訓生儒衛官有治具延飲者以廢政長玩不往人敬憚之安宣正徳中授夏邑縣丞時流賊楊虎等擁衆逼城宣尚未至任聞之兼程而進或止之宣以義辭遂入城分守及城破死焉事聞錄其子張濂正徳間由進士授鹿邑縣知縣性嚴重人不敢以私嘗曰牧民如牧牛羊能弗擾之而已在任二年政教旁達人咸頌之雷時成嘉靖元年知夏邑縣多善政時饑設方濟之存活者萬人又申復原代獲嘉洧川賦金七百兩有竒民甚懐之立祠祀焉盧瓉嘉靖初知虞城縣守己奉法教養備舉厯政六年盜息訟理吏畏民安民之孤惸賴成立者尤衆華淳鹿邑縣知縣性寛厚務持大體暇則為諸生講析經義及去民送之有泣下者陸冕嘉靖初由進士同知歸徳州徳器簡重學術純確諸士多師法之夏寳鹿邑縣尹在任不欈妻子後聞母喪遂即日去行李蕭然馮鉞嘉靖中知柘城縣薄賦緩刑百姓親之如父母嘗有門吏夜代之賂鉞厲聲叱之後卒于官百姓皆哭奠罷市蔡汝楠由進士第有才名嘉靖二十四年創府首任當新造時政以節省便民為務未幾以憂去民感之至今不置郭忠顯商丘縣尹性執固不依阿上官上官事少不便民者即以身當之南逢吉嘉靖中由進士知歸徳府性剛果有治才政尚嚴整寮屬肅然敬憚之鞠躬歸徳府推官性冲雅持法平恕審編屬邑賦役人多其公有去思王有為嘉靖三十二年知歸徳府當兵火後拊循調適威恵並行脩築城堞樓臺民不知勞費待士有禮衛官以嚴見憚董綸歸徳府經厯時逆賊師尚詔潜伏於柘城墟中招集亡叛日夜剽掠綸憂之乃白於知府尹曰賊勢未熾宜急捕之且請往尹不許居數月尚詔果䧟歸徳綸為賊所執不屈且罵不置口賊怒遂殺之妻賈氏與子奎皆遇害事聞詔贈其官仍建祠以祀之陳學䕫歸徳府知府政持大體不寄人耳目遇事立㫁豪右屏迹尤奨成士類羅復嘉靖間以監察御史知歸徳府鋤强植弱政務宜民正疆界均賦役一時詭隠杜絶懐慶衛輝欲加賦歸徳復力争止之流寓田京宋滄州人徙鹿邑舉進士累官兵部郎中知滄州拜右諌議大夫卒京為人尚氣節喜論議著天人流術論通孺子十數書杜衍會稽人寓家睢陽宋慶厯中為宰相出知兖州後以太子少師致仕衍清介舊無居第既退方輯舍南都出入如平日無軒冕者王渙本太原人累官禮部侍郎致仕家睢陽畢世長本雲中人父士安事母以孝聞嘗求友於宋世長累官衛尉司農卿致仕遂家睢陽馮平本始平人以駕部郎中致仕遂家南都朱貫本沛國人以兵部郎中致仕家南都趙天麟元東平人僑居夏邑博學能文舉郷貢所著有太平金鏡策行于世人物周李耳楚苦縣人母懐之八十一嵗乃生生即白首因號老子又曰老聃仕周為守蔵史又為柱下史博古通今孔子往問禮焉老子曰良賈深蔵若虚君子盛徳容貌若愚孔子退曰老子其猶龍乎後見周衰乃西出函闗隠去闗尹喜求長生術為著道徳五千言其言曰天地所以能長且久者以其不自生又曰我無為而民自化後世治天下者多用其術學仙之士皆宗焉司馬耕宋人即子牛孔門弟子雖兄弟為亂能潔身而脱之後世追封楚丘侯原憲宋人孔子弟子原思也為人狷介所居蓬樞甕牖子貢過之曰夫子病乎憲曰無財之謂貧學道而不能行之謂病若思貧也非病也莊周戰國䝉人嘗為䝉漆園吏其學無所不闚楚威王聞其賢遣使厚幣迎之周曰千金厚利卿相尊位也子獨不見犧牛乎我寧遊戲以快吾志焉著書十餘萬言大抵寓言洸洋自恣雖當世宿學不能自解免也漢欒布梁人彭越為家人時嘗與布游及越為梁王請布為大夫越被誅布祠而哭之髙帝欲烹布布請就烹帝壯其義拜為都尉後以功封鄃侯灌嬰睢陽人嘗以販繒為業從髙帝定天下封潁隂侯後與周勃平諸呂共立文帝以功進太尉右丞相卒諡曰懿侯申屠嘉梁人以擊項籍功封闗内侯性㢘直不受私謁文帝時為丞相封故安候是時鄧通寵幸驕踞嘉檄召通至責以朝廷大禮令斬之帝知使使持節召通乃免卒諡曰節侯丁寛梁人為梁孝王将軍初受易於田何及東歸何謂人曰吾易東矣作易説三萬言寛授同郡田王孫王孫授施讎孟喜梁丘賀由是易有施孟梁丘之學韓安國睢陽人嘗學韓子雜説初事梁孝王為中大夫吴楚反安國捍吴兵於東界後累官御史大夫韓伯俞梁人嘗有過母笞之泣母曰他日笞子未嘗泣今泣何也對曰他日笞常痛今母之力不能使痛是以泣也平當下邑人以明經為博士元帝朝奏復髙帝寢廟園累官大中大夫哀帝即位徵為光祿大夫位丞相賜爵闗内侯夏恭䝉人習韓詩孟氏易講授生徒常千餘人王莽末盜賊從起攻沒郡縣恭以恩信為衆所推擁兵固守獨安全光武即位嘉其忠果召拜郎中再遷大山都尉和集百姓甚得其歡心恭善為文著賦頌詩勵學凡二十篇申屠剛梁人質性方直當平帝時王莽専政剛舉賢良因對策及之書奏罷歸田里隗囂據隴右剛説以大義後拜尚書令帝嘗出游剛叩馬諌曰隴蜀未平不宜游逸願陛下裁之帝不聴遂以頭軔乗輿輪帝為之止桓榮沛郡龍亢人治歐陽尚書光武召授太子經官至太子少傅明帝即位尊以師禮賜爵闗内侯子郁傳父業官至太常郁子焉明經篤行官至太尉郁曽孫典官至侍御史虞詡武平人祖父經為獄吏平允寛恕詡年十二通尚書孝養祖母舉順孫為郎中出為朝歌長縣多盜詡曰不遇盤根錯節何以别利器即有治聲厯遷武都太守増竈進兵大破羌人官至尚書僕射仇覽陳留考城人一名香為蒲亭長有陳元者母訟其不孝覽以徳言喻之元感泣遂為孝子考城令王渙聞之舉署主簿尋資之入太學夏侯訢寧陵人侍母疾衣不解帶者二年母憐其苦令出便寢息訢方假寐忽夢其父告之曰汝母疾沈痼非凡藥可愈天帝憐汝至孝賜以仙藥在室後桑枝上訢忽驚起往視果得藥進之母病頓瘥三國衛臻陳留襄邑人父兹有大節曹操初至陳留兹曰平天下者此人也後討董卓戰於滎陽而卒操追錄兹勲賜臻爵闗内侯魏建國以為散騎常侍累遷至司徒封長垣侯梁習柘人曹操辟為漳長累遷下邳令所至有治聲後領并州刺史拜議郎入魏累官大司農習在并二十餘年居處貧窮無方面珍物文帝異之晉衛京襄邑人自南陽大守遷河内時尉氏阮冲遷平原相與京俱拜武帝望而歎曰二千石皆若此何憂乎蔡謨陳留考城人世為著姓父克少好學博涉書記謨弱􅃣察孝㢘舉秀才皆不就後累官吏部尚書深謀逺畧為時所重康帝時遷侍中司徒南北朝蔡廓謨曾孫博涉羣書宋武帝以廓剛直補御史中丞多所糾奏後為吏部尚書少子興宗行己恭恪家行尤謹亦官吏部尚書封樂安公孫撙仕梁累官吏部尚書有清操官至中書令江秉之濟陽考城人少孤友其弟妹甚篤仕宋厯烏程建康山隂令皆有政績累遷新安臨海太守所至以簡約見稱在郡嘗作一書案去官留以付庫江淹考城人父康之長沙令雅有才思淹少孤采薪以養母仕齊梁累官御史中丞彈劾不避貴近風采肅然天監初為㪚騎常侍後封醴陵侯所著有詩賦江悦之濟陽考城人統七世孫好讀兵書有将畧仕宋厯諸王将軍入南齊進冠軍将軍子文遥仕至咸陽太守悦之族弟子一慷慨有大志仕梁為王國侍郎制行髙潔不趨勢要弟子四累官尚書右丞江革考城人六嵗能文事母以孝稱雖貧寒嗜學不倦仕南齊累官度支尚書以直道忤時謝病歸除光祿大夫以詩酒自娱樂范岫考城人少孤以孝聞仕南齊為太子家令沈約輩服其該博入梁為祠部尚書卒所著有禮論雜義字訓江湛考城人父夷湘州刺史湛以孝聞為太子中舍人義康之盛人競求泥惟湛自䟱出為武陵内史孫斆為秘書監斆子蒨雅有風格終光祿大夫蒨子紑有孝行紑子總篤學有文仕陳累官左户尚書蔡景厯考城人俊爽有孝行家貧好學攻草隸為文不尚雕琢長於叙事仕梁累官度支尚書子徵聰敏强記事後母至謹擢中書令入隋為給事中李彦夏邑人少有節操好學慕古仕陳拜尚書左丞在尚書十有五載屬軍國草創庶務殷煩彦留心省閣未嘗懈怠㫁決如流畧無疑滯臺閣莫不嘆其公勤畧遷兵部尚書卒謚曰敬子昇明仕隋終齊州刺史朱昌寧永城人有孝行母病思瓜時初四月瓜未熟昌寧於瓜田中號泣一夕瓜盡熟取之以奉母母病頓瘥開皇中有司上其事詔旌之翟普林楚丘人事親以孝聞州郡辟皆不就躬耕色養郷閭稱為楚丘先生父母疾親易燥濕不解衣者七旬及卒廬于墓側負土成墳盛冬不衣繒絮唯著單縗而已家有烏犬随墓所普林哀痛犬亦悲號見者嗟異有二鵲巢廬前栢樹入廬馴狎無所驚恐大業初司隸巡察奏其孝感擢授孝陽令唐盛彦師虞城人隋末為澄城長髙祖兵至汾陽彦師率賓客上謁授行軍總管鎮宜陽以斬李密功封葛國公魏元忠宋州宋城人為太學生少學兵術髙宗時吐蕃數盜邊元忠上封事言命将用兵之要累官御史中丞以直道自立中宗時拜中書令封齊國公朱仁軌亳州永城人隠居養親嘗誨子弟曰終身遜路不枉百步終身遜畔不失一段及卒諡為孝友先生弟敬則好學重氣節累官同鳳閣鸞臺平章事每以用人為先務以直忤時出為鄭州刺史敬則與三從昆弟居四十年貲産無異鄭惟忠宋州人天授中以制舉召見武后問舉者何所事為忠惟忠曰外揚君之美内正君之惡后曰善擢黄門侍郎時議禁嶺南酋户不得蓄兵惟忠曰善為政者因其俗禁之得無擾乎乃止程袁師宋州人母病十旬不榹帶藥不嘗不進母終因負土築墳號㿑人不復識嘗有白狼黄蛇馴墓左每哭羣鳥鳴翔曹華宋州楚丘人憲宗時拜兗海軍觀察使身見儒士春秋祀孔子祠立學官講誦斥家貲佐贍給人乃知教成就諸生徙鎮義成軍雖出戎伍而動必由禮愛重士大夫至厮豎必待以誠信人以為難五代張廷蘊襄邑人仕唐嘗從莊宗征伐先登力戰金瘡滿體荘宗壯之以為指揮都虞侯後以破李繼韜功遷羽林都指揮使左監門衛上将軍開運中以疾卒廷蘊性㢘重士厯刺七州卒之日家無餘貲張誼襄邑人幼孤好學諸父使督耕隴上誼閲書樹下舉後唐進士仕晉累官中書舍人初和凝拜端明殿學士署門不接賓客誼即致書以為四方利害所宜詢訪若不接賓客聾瞽耳目坐虧職業凝大竒之宋楚昭輔宋州宋城人有才幹善心計初隸太祖麾下陳橋推戴時遇入京安母后累官樞密使性勤介不可干以私卒贈侍中從孫随咸皆進士及第劉熙古寧陵人博通經史旁究隂陽象緯算書五代時擢第仕周為髙州推官入宋累官叅知政事雖貴顯不改寒素所著有厯代紀要五十卷劉䝉叟熙古子兄蒙正善騎射累官内蔵庫副使後出知滄冀棣三州䝉叟好學善屬文乾徳中進士厯知廬亳滁汝四州以太常少卿致仕所著有五運甲子編年厯子宗弼宗誨皆進士李惟清夏邑人開寳中以三史解褐涪陵尉累官京西歸運使太宗将大舉取幽州惟清以為兵食未豐不可輕動至道初同知樞密院事子永錫光祿寺丞永徳殿中丞戚同文楚丘人幼孤養祖母以孝聞師邑人楊慤不終嵗畢誦五經從其學者不逺千里而至既卒門人號堅素先生有集二十卷二子維以文行知名舉進士累官太常少卿綸篤於古學善訓子弟雖至清顯不改純儉陳摶亳州真源人幼聰悟讀書一見成誦不求祿仕隠武當山移居華山寢處百餘日不起周世宗召至拜諫議大夫不就宋太宗時來朝待之甚厚宰相宋琪曰先生得脩養之道可以教人乎摶曰假令白日冲天何益於世今君臣同徳興化勤行脩煉無出於此帝益重之賜號希夷先生所著有指𤣥篇及寓言鈞潭等集許驤睢陽人風骨秀異師事戚同文年十三能屬文善辭賦太宗朝中進士甲科累官右諌議大夫知單州驤雖無他材畧而人以儒厚長者稱之子宗夀殿中丞宗翼虞城人篤學恭謹負米養母經籍一見即能黙寫學歐陽虞栁書俱得其楷法能屬文隠而不仕戚同文稱其有古人風子度舉進士至侍御史厯京西轉運使預脩太祖實錄盛度應天府人父豫終尚書度支郎中度舉進士累遷尚書屯田員外郎嘗奉使西域繪圖以獻條陳邊計十事真宗每嘉納之仕終叅知政事卒贈太子少保諡文肅度好學家居列圖書每歸未嘗釋手兄京有吏能以尚書工部侍郎致仕張去華誼子幼勵學敏於屬辭建隆間舉進士甲科累官工部侍郎致仕去華善談論尚義節嘗獻元元論大㫖以養民務穡為急真宗命寫其論列置龍圖閣四壁有文集十五卷子師古師顔皆國子博士師錫殿中丞侯義楚丘人貧無産傭田以事母卒葬不掩壙晝則負土築墳夜則慟哭柩側踰年墳間木連理野鴿馴而不去嘗遇盜刼其衣服既而知為義物悉還之郭贄開封襄邑人乾徳中進士累官叅知政事時曹彬為弭徳超所譛贄辨其誣嘗對太宗曰臣受遇不次惟以愚直報上太宗曰愚直何益贄曰猶勝姦邪仕終禮部尚書所著有文集十三卷張師徳去華子最見器重真宗祀汾隂獻大禮頌於行在是嵗舉進士第一累官至右諌議大夫孝謹有家法時相頗不悦之有文集十卷石延年宋城人少以氣自豪遺落世事自顧不合時乃隠於酒真宗時為太子中允嘗進備邊策不報已而西北用兵帝思其言欲召用之而延年死矣其為詩文尚勁健稱其意氣趙槩虞城人少篤學自力器識宏逺中進士仁宗時累官樞密使叅知政事以太子太師致仕退居十五年嘗為諌林百二十卷上之神宗詔褒之卒年八十八諡康靖槩秉心和平雖在事如不言然隂以利物者不少李紘宋州楚丘人第進士知歙剡縣治有恵愛累遷龍圖直學士知秦州其從父昌齡太宗時進士累官叅知政事昌齡兄昌圖國子博士弟昌言太子中舍昌言子晉卿仲卿耀卿並進士及第王堯臣虞城人舉進士第一累官翰林學士陜西用兵為體量安撫使使還上書言邊事又薦种世衡狄青有将帥才後拜樞密副使務裁抑徼倖尋叅知政事卒諡文安王洙宋城人舉進士累官翰林學士汎覽博記至圖緯算數音律詁訓篆隸之學無所不通著易傅十卷雜文千餘篇子欽臣清亮有志操賜進士及第累官集賢殿待制知成徳軍平生為文至多蔵書數萬卷皆手自讐正劉随考城人進士及第通判益州後遷右司諌終天章閣待制随為言官以清直聞在蜀臨事明鋭人號為水晶燈籠比卒帝憐其家貧賜錢六十萬嵇頴宋城人父適石首主簿有仁政穎天聖中進士累官翰林學士王曾張知白嘗見穎謹厚篤學謂其子弟曰若曹師表也張堯封嘗從頴學文其女入禁中甚被寵求編次其父藳為序以獻之頴竟不答李師中楚丘人年十五上封事言時政舉進士累官河東都轉運使在官不貴威罰務以信服人包拯叅知政事或云朝廷自此多事矣師中曰包公何能為王安石眼多白他日亂天下者必斯人也後二十年言乃信蔡抗宋城人中進士自廣東轉運召為三司判官都城大水抗推原變異大臣畏其諌列白為知制誥遷龍圖直學士知定州弟挺擢進士厯知數州在慶州夏人大入知有備乃引却神宗時知渭州甲兵整習常若冦至熙寧中拜樞密副使卒諡敏肅張方平宋城人少穎悟絶倫書一閲不再讀累官叅知政事南京留守知陳州以太子少師致仕卒諡文定初守蜀時得蘇洵與其子軾一深器異之嘗薦軾為諫官晚受知神宗王安石方用事嶷然不小屈以是望髙一時鄭雍襄邑人進士甲科累官御史中丞以資政殿學士知陳州徙北京留守坐元祐黨奪職知鄭州政和中復資政殿學士許翰拱州襄邑人元祐三年進士累官翰林學士同知樞密院髙宗時拜尚書右丞終資政殿大學士翰通經術正直不撓厯事三朝致位政府論議剴切然横遭口語志卒不展所著有論語解春秋傳滕康應天府宋城人崇寧中進士累官中書舍人建炎初權端明殿學士同簽書樞密院事孟太后如江西康以權同知三省樞密院事從行卒年八十四有文集二十卷元孔全鹿邑人父成病刲股肉啖之愈後卒居喪廬墓負土為墳三年起墳髙三丈餘又有夏邑人陳乞兒年九嵗母喪哀毁親負土為墳人欲助之則泣拜而辭並表異焉陳奕永城人倜儻有直氣善騎射累官沿江大都督贈金紫光祿大夫二子巖累官中書左丞嵩歸徳路總管陳思濟柘城人以才器稱為左司都事出為髙唐州同知以清最聞拜監察御史累遷同知浙東道宣慰司事盛昭歸徳人由儒學官累遷淮南行省照磨遣入髙郵諭張士誠士誠拒不聴拘之舟中昭語所從吏曰吾之至此有死而已既而官軍逼髙郵城士誠授昭以兵使拒官軍昭叱曰吾奉命招諭汝豈從汝為賊耶駡不絶口而死本朝梅思祖夏邑人從相國徐達屢立戰功進封汝南侯後署雲南布政司事民夷安之從子殷駙馬都尉吴伯昂歸徳州人問學該博元末隠居不仕洪武初以儒士徵至京師儀度老成特拜國子監祭酒造就人才有法居數年卒于官楊睿柘城人洪武初舉進士累遷平陽知府㢘介公平處事詳敏不數月政教大行刑清訟簡嘗嵗旱祈禱甘雨随注致仕歸吏民遮道泣留歿而祀於郷賢祠樊鎮考城人賦性剛直博通經史洪武中登進士第授監察御史振揚風紀有能聲特陞山西按察司副使轉浙江左叅政復陞山西右布政使所至㢘幹勤敏大得時譽李從義歸徳人洪武中上疏言黄河泛溢為患有可塞之法朝廷從之水患遂除民從安居既而試事有能擢監察御史執法不撓久之出知晉州為政得民心引年致仕呂仲和歸徳衛人少喪父事母路氏至孝路因疾喪明百藥罔療仲和叩天泣禱䑛之遂愈後卒廬墓三年鳩雀馴集墓所正統初詔旌其門徐永達歸徳人洪武末舉人厯官翰林編脩左春坊中允鴻臚寺卿三使交趾出為湖廣按察使轉任山西張麒永城人為人嚴重樂善好義洪武末授指揮使卒于官以外戚累贈為彭城侯子昇淳謹樸儉任府軍衛指揮僉事封恵安伯守法循理不以貴戚自居楊敬歸徳衛人父昱洪甫武間死于陣時敬十嵗聞訃即哭踊每思求父遺骸不果乃取衣冠葬於先塋之次事母艾氏極孝謹凡母意所向無少違之暇則讀經史開家塾以授生徒每閲戰陣事輒流涕不已時人以王褒擬之母卒哀毁踰禮方殮在堂而西鄰不戒於火将及柩敬仰天大哭俄風反火息郷里異之事聞詔旌其門子愍舉人仕至知州冀凱鹿邑人以文才貢入太學授廣西祿州判官在任㢘幹有為正直不撓舉陞兵科給事中尋陞工部左侍郎清譽益振陳亨歸徳人為人勇敢有膂力累從戰伐著竒勲永樂初授金吾右衛指揮使厯陞後軍都督府僉事同知復陞前軍都督府左都督任貴歸徳衛人父恭義早卒貴恒以不逮父養為恨事母孫氏曲盡孝敬母年八十終貴哀毁骨立既𦵏廬墓三年軒輗鹿邑人永樂末舉進士擢監察御史出按福建摘𤼵奸伏如神正統中陞蔬浙江按察使所至山岳動摇豪猾屏息居九年布袍食而已聞親喪即日就道寮屬有未及知者服闋陞副都御史總理南京糧儲清聲益勵天順改元進刑部尚書尋告歸久之起都察院左都御史厯六年前後所上三百餘䟽皆闗軍國大計後以致仕卒賜祭于家潘禮歸徳衛人天順中舉進士授户科給事中剛直敢言中外震慴累遷工部左侍郎奉勑理易州厰厰故有園圃果蔬之利為守者所侵漁嵗時饋遺中貴人禮取其直需國絶饋遺中貴人疾之禮即乞休去歸時篋惟敝衣數襲圖書數卷而已武廟命有司給月米特加慰問年八十四卒朱謙夏邑人以䕃補指揮僉事累陞都督僉事鎮守宣府會敵入邊謙斬俘甚衆久之敵不敢犯論功進撫寧伯卒諡武襄子永屢平劇寇進爵保國公𢎞治間卒追封宣平王諡武毅李孟𤾉睢州人成化中進士授給事中厯官南京工部尚書憲宗時嘗奉使占城逺夷嚮化朝廷有清慎老成之褒卒賜祭葬蔡天祐睢州人𢎞治末舉進士改翰林庶吉士累遷山西按察使時大同五堡軍叛殺撫臣用薦擢右僉都御史巡撫其地既至乃集亂軍諭以朝廷威徳衆志稍定會侍郎胡瓉率兵討叛衆疑懼圍總兵桂勇宅天祐冒白刃往援之復示以逆順禍福衆悟泣愬天祐疏戮其首惡脅從者弗問人心始帖然寜未幾進兵部侍郎詔還民感徳為立生祠祀之沈忠歸徳衛人初父疾籲天願以身代及父卒母姚氏喪明忠送死養生靡不盡禮未幾姚亦卒廬墓手自封植成化間旌表後忠患癰其長濙吮之忠卒季子瀚廬于墓側人謂之一門三孝云朱洪歸徳人舉進士知唐縣治豪族除黠吏人心快之選諸生才者授以經義後多顯達三載考績拜監察御史出按浙江風裁益著任鏜夏邑人母早卒育于嫡母趙氏趙卒廬墓時黄河衝溢将侵齧塋域鏜仆地號哭不已俄而河南徙郷人以為異事聞詔旌其門陳聞詩柘城人性純篤舉嘉靖丁酉郷試以親老未仕及親没哀毀骨立人以孝稱之癸丑秋賊帥尚詔亂被執欲屈之不從乃自絶飲食誓以必死後三日得間自經焉事聞詔旌表之封鳳陽府同知仍為立祠與檢校董綸並祀沈瀚忠子舉進士厯禮部員外郎出知建寧府以誠信愛民養士績最當遷時逆瑾索賄瀚恥之致仕賈時歸徳衛人舉進士厯刑部主事員外郎舊志謂有懐金謁者時正色斥之陞山西僉事分理宣府邊計多所裨益晉副使致仕鄭東商丘人進士性溫謹不規勢利尤勤于學雖寒暑不易登第後尹良郷良郷當京師孔道東日夜酬勞竟致疾當道惜之改臨邑未赴而卒許勇歸徳衛百户嘉靖末征倭至泗州義井山力戰死之事聞陞其子千户令世襲列女伯姬春秋宋共公夫人魯襄公之女歸于宋十年共公卒伯姬寡居夜火左右曰夫人盍少避火乎伯姬曰婦人之義保傅不在夜不下堂頃之左右又曰夫人盍少避火乎伯姬曰越義而生不如守義而死遂逮乎火而死鮑女宗宋人鮑蘇妻養姑甚謹蘇仕衛三年而娶外妻甚寵厚女宗姒謂曰夫既有所好可以去矣女宗曰婦人以専一為貞以善從為順豈有專夫室之愛為賢哉吾姒不教吾以居室之禮而反欲使為見棄之行将安所用遂不聴事姑愈謹宋公聞之表其門號曰女宗蔡人妻宋人之女既嫁於蔡而夫有惡疾其母将改嫁之女曰夫之不幸乃妾之不幸也奈何去適人之道一與之醮終身不改不幸遇惡疾不改其志且夫采采芣苢之草雖其臭惡猶始於捋采之終於懐擷之浸以益親况於夫婦之道乎彼無大故又不遣妾何以得去終不聴樂羊子妻梁國穀丘人羊子嘗行路得遺金以歸妻曰志士不飲盜泉之水㢘者不受嗟來之食奈何拾遺以汚行乎羊子乃捐金遊學一年來歸妻因趨機㫁織曰夫子積學以就懿徳若中道而歸何異於是羊子復終業七年不反妻紡績以養姑兼饋羊子後盜欲犯之乃引刀自刎太守禮葬之號曰貞義寡髙行漢梁之寡婦色婉而性淑夫早逝梁人多欲娶之者不能得梁王聞之遣使聘焉髙行曰妾夫不幸早死妾為養其幼孤貴人多求妾者幸免今又辱王命妾聞婦人之義一醮不改以全貞信之節今忘死趨生是不信也貴而忘賤是不貞也棄義從利無以為人乃援鏡持刀以割其鼻曰王之求妾以其色也今妾刑矣何以事王使還報王重其義復其身號之曰髙行木蘭随宋州人姓魏氏恭帝時𤼵兵禦戎木蘭有智勇代父出征厯年一紀閲十有八戰人莫識之凱還天子嘉其功除尚書不受懇奏省親及歸釋戎服衣舊裳同行者駭之遂以事聞於朝召赴闕欲納之宮中木蘭曰臣無嫓君之禮遂自盡帝驚憫贈将軍諡孝烈郷人為之立廟祀焉杜牧之詩彎弓征戰作男兒夢裏曾經與畫眉幾度思歸還把酒拂雲堆上祝明妃劉禹錫詩出寨男兒勇還家女子身尚能降北虜㫁不慕東鄰張氏宋蔡人之妻值蔡人家屬死畧盡張為鬻首飾截髮毁容力營一十八喪詳見徐積睢陽篇苗子榮妻張氏歸徳人元末夫亡事姑撫幼厯兵變中以節自勵人無間言洪武中詔旌其門曹氏歸徳人張琮妻琮卒曹因紿匠氏曰夫嘗囑我作棺必寛大匠如其言是夜竟自縊合棺而葬景泰中詔旌其門宋氏陜西咸寧人父翬知歸徳州宋適歸徳衛千户趙琳琳卒宋年十九撫其子遜教之甚嚴事姑謹姑病疽宋日一䑛濯之竟愈成化初詔旌其門黄氏睢州人張貴妻夫卒守節成化初旌表程氏睢陽衛人百户姚通妻通以疾卒于京程自縊以殉成化初旌表石氏虞城人范俊妻俊舉郷進士早卒石誓節撫孤子賢任順天通判成化七年旌表潘氏睢州人曹文道妻文道領郷薦上春官不第而歸卒于途潘聞訃日號泣不食比喪至并出已所服衣盡焚之自縊而死又州學生皇甫迪妻潘氏迪卒潘亦自縊俱成化二十二年旌表丁氏虞城人吴皥妻夫死守節成化末旌表張氏女字玉蘭歸徳衛人指揮金之妺也正徳中賊破城玉蘭為賊所執欲犯之不屈乃裂其尸有司上其事旌其門曰烈女張祿女永城人正徳中賊䧟城女投井死賊怒出其尸磔於市有司奏之旌其門曰貞烈楚氏睢州人御史髙安妻安病卒楚泣引刀刲其右耳誓不二志正徳中詔旌其門李氏睢州人王廡妻廡貢士以疾卒李守節不二又考城盛訥妻李氏夫死守節俱正徳十六年旌表楊氏女名桃兒鹿邑人嘉靖元年賊至境桃兒年十六從兄世威避之遇賊被執逼令上馬女不從且厲罵不絶賊怒殺之兄亦被害事聞旌表閻氏鹿邑人李浩妻夫亡守節嘉靖初旌表孫氏鹿邑人夫卒自縊又史綸妻樊氏考城劉遵妻馮氏俱嘉靖二十年旌表范氏字蟾香歸徳人郡校士王輔妻輔臨病三年范侍醫藥久而不怠輔嘗謂范曰吾先世皆不夀吾之年未可知如有不諱汝將何如范以死許之又焚香籲天願代夫死及輔卒從容自縊於柩側遂同葬焉督學楊維總扁其門曰貞節蔡氏睢州人天祐孫女也適湯希富富病革蔡自製新衣一襲著之謂希富曰萬一君不諱願衣此偕行希富曰倘如此吾目瞑矣及卒蔡遂自縊詔旌表其門李氏寧陵人舉人黄嘉猷妻嘉猷疾卒李自縊於柩側嘉靖中特旌表鄧氏張氏俱睢州人鄧恵汝賢妻張熊威妻賀氏虞城人段鎰妻解氏寧陵人喬文光妻以上四氏俱夫死自縊嘉靖二十二年同旌表孫氏考城人孫同人妻夫死自縊以殉嘉靖二十五年詔旌表之淡氏夏邑人曾泰妻又考城人董講妻李氏俱夫死自縊嘉靖二十六年旌表仙釋寇先春秋宋人以釣魚為業居睢水旁百餘年得魚或放或鬻或自食之冠帶不去體好蒔荔枝日取葩實食焉宋景公召見之問其道不告公怒而殺之後數十年踞於宋城鼓琴十餘日而去墨子名翟宋人仕宋為大夫外治經典内脩道術著書十篇號曰墨子世多宗之公輸子嘗為楚造雲梯以攻宋墨子説楚王而罷之年八十有二乃嘆曰世事已可知榮位非常保将委棄流俗與赤松遊耳入周狄山精思道法想像神仙于是數聞山間誦書之聲夜卧有人以衣覆之墨子起曰君豈非山岳之靈乎願誨以道教神人曰子有仙骨志且好道故來相候耳乃授以秘書墨子遂隠居以避戰國至漢武帝時遣使者楊偉來聘不出視其顔色常若五十許人周游五岳不知所終丁少微亳州真源人為道士隠華山潼谷密邇陳摶所居志尚清潔善服氣多餌藥百餘嵗康强無疾宋太宗召赴闕以金丹巨勝南芝𤣥芝為獻留數月遣還山卒明一綂志卷二十七
