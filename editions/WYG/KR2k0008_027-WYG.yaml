body:
  text: 明一綂志卷二十七明李賢等撰開封府下伊尹耕于有莘之野湯以幣三聘之遂幡然而起相湯伐夏救民以天下為己任一夫不獲其所曰時予之辜又相太甲而放之使之處仁遷義卒成令主孟子稱其聖之任者也周潁考叔春秋時潁谷封人聞鄭莊公誓不見母有獻于公公賜之羮食而舍肉公問之對曰小人有母請以遺之公感其言遂為母子如初甯越中牟人苦耕之勞問其友曰如何可以免此苦也友曰其學乎勤三十年可免越曰然人將休吾不敢休人將卧吾不敢卧如是十五年亦足矣乃𤼵憤學十三年而齊威公師之子皮鄭人為鄭大夫知子産賢以政授之宋人得玉以獻辭之或曰寳子皮曰子以玉為寳我以不貪為寳若受之喪吾寳矣及卒子産哭之曰吾無與為善矣燭之武鄭人晉侯秦伯圍鄭鄭伯使之見秦伯而説之秦伯説與鄭人盟使人戍之而還洩冶陳人仕靈公時為大夫以諫而死逢滑陳人吴入楚而召陳侯滑進曰國之興也以福其亡也以禍今吴未有福楚未有禍未可從也晉為盟主盍托晉以辭陳侯從之國僑鄭人即鄭卿子産也作封洫不毁郷校制叅辟鑄刑書上下有服都鄙有章孔子過鄭因與之厚及卒泣曰古之遺愛也子太叔鄭人美秀而文熟於典故為鄭大夫繼子産為政不忍猛而寛鄭國多盜取人於萑苻之澤太叔於是興徒兵以攻之盡殺乃止司城貞子陳人仕為大夫孔子過陳主於其家顓孫師陳人即子張孔門弟子才髙意廣晚年進徳後世追封陳伯進宛丘侯田基晉中牟人趙簡子屠中牟以基不從佛肸之畔欲官之不受而之楚楚王髙其義以為司馬列禦冦鄭人荘子重其為人多稱道之自云居鄭圃四十年人無識者其學本於黄帝老子著列子一書多寓言與荘子書相類非秦漢而下作者所可及但因散軼不完有附益之者其真偽亦不可亂也尉繚尉氏人有賢名魏恵王時著兵書五卷號尉繚子公子無忌魏諸公子號信陵君仁而下士食客嘗三千人諸侯以公子故不敢加兵於魏侯嬴大梁人魏隠士嘗為夷門監者公子無忌延為上客秦攻趙魏遣晉鄙救之按兵不進公子患焉嬴教之奪晉鄙兵大破秦師于邯鄲朱亥大梁人有力隠於屠肆侯嬴薦之魏公子無忌使奉璧謝秦秦王怒置之虎圈亥髮上衝冠瞋目視虎虎不敢動遂以禮遣之秦韓非韓之諸公子與李斯俱事荀卿善刑名法律之學作説難孤憤五蠧説林五十餘篇呂不韋陽翟人荘襄王以為相封文信侯作月令集著所聞為十二紀八覽六論合十餘萬言名曰呂氏春秋懸千金於市能增損一字者與之陳餘大梁人好儒術與張耳為刎頸交秦滅魏購求耳餘兩人變姓名俱之陳為里監門後從陳勝起兵餘自立為代王張耳大梁人嘗亡命游外黄後從漢髙帝定天下以功封趙王子敖嗣立尚髙帝長女魯元公主漢張良其先韓人也家世相韓秦滅韓良為韓報仇不果乃佐髙帝滅秦天下既定封留侯尋棄人間事從赤松子遊卒謚文成侯先儒謂其有儒者氣象陳平陽武人少家貧好讀書有田三十畝與兄伯居伯嘗耕田縱平游學後佐髙帝定天下凡六出竒計官至右丞相封曲逆侯酈商陳留髙陽人髙帝為沛公畧地商以四千人屬沛公從擊項籍又從擊黥布以功封曲周侯酈食其商之弟以儒者見髙帝使説齊下齊七十餘城及韓信破齊齊以食其為賣己遂烹之漢封其子疥為髙梁侯張蒼陽武人好書律厯嘗仕秦為御史後歸漢從攻臧荼以功封北平侯孝文初為丞相年百餘嵗乃卒著書十八篇専言隂陽律厯事賈山潁川人涉獵書記孝文時上書言治亂之道借秦為喻名曰至言其後文帝除鑄錢令山復上書諫遂復禁鑄錢鼂錯潁川人學申韓刑名以文學為太常掌故文帝遣受尚書於伏生遷太子家令號智囊數上書言邊事皆見嘉納景帝時遷御史大夫灌夫潁隂人父張孟嘗為灌嬰舍人故䝉灌姓吴楚反時孟以校尉戰死吴軍夫奮曰願取吴王若將軍頭以報父仇遂披甲持㦸而往大破吴軍以此名聞天下後為淮陽太守鄭當時陳人少任俠自喜武帝時為内史以貴下人性㢘不治産聞人之善輒薦引之唯恐後韓延年潁川人父千秋封成安侯延年襲父爵與李廣同伐匈奴以戰死任安滎陽人嘗為大将軍衛青門客後青日衰故客多歸霍去病安獨不肯故人司馬遷為中書令尊寵用事安遺之書責以進賢之義黄霸陽夏人習文法溫良有讓善御衆武帝末以入錢賞官復察㢘遷河南太守丞宣帝召為廷尉正數決疑獄庭中稱平累遷潁川太守霸外寛内明得吏民心户口嵗增治為天下第一天子下詔稱揚賜爵闗内侯徵拜京兆尹後為丞相封建成侯李充陳留人家貧兄弟同居妻挾其私欲分異充黜之後為博士遷左中郎将年八十餘平帝時為國三老時被進見賜以几杖孫寳潁川鄢陵人初以明經為郡吏累官京兆尹後為大司農時廷臣稱王莽功徳寳獨非之坐免彭宣陽夏人治易事張禹禹薦其明經有威重可任政事入為右扶風累官大司空封長平侯王莽専政宣上書言三公鼎足承君一足不任則覆亂鼎實臣年毦昬亂乞骸骨歸郷里鄭興開封人學公羊春秋兼通左氏嘗與劉歆條列章句傳詁及校三統厯建武間徵為大中大夫子衆傳父學永平中累官大司農以清正稱孫安世亦知名於時虞延陳留東昬人為細陽令每嵗時伏臘輒遣徒繫歸家並感其徳應期而來有疾者亦自載歸獄百姓説之累官至司徒從曾孫放亦知名於時劉昆陳留東昬人以施氏易教授弟子恒五百人光武聞其名授江陵令反風滅火後守𢎞農虎北渡河去召拜光祿勲上問何以致是對曰偶然耳以騎都尉致仕子軼傳其業門徒益盛累官宗正世嗣其官王霸潁陽人從光武為王郎所逼将至滹沱時河水流澌衆恐難濟霸即詭曰冰堅可渡遂前至河冰果合乃濟後以功封淮陽侯祭遵潁陽人恭儉好學從光武征河北有功拜将軍封潁陽侯弟彤為黄門侍郎累遷太僕居官三十年衣無兼副顯宗美其清約賜錢百萬堅鐔襄城人以吏能從光武為偏将軍以功封合肥侯傅俊襄城人光武徇襄城俊以縣亭長迎軍拜為校尉累從征伐有功拜積弩将軍侯霸河内密人矜嚴有威容治穀梁春秋累官淮平大尹更始徴霸百姓號哭遮道乞留光武初徵拜尚書令積善清潔明習故事進大司徒封闗内侯薨諡哀侯董宣陳留圉人為洛陽令時湖陽公主蒼頭殺人宣格殺之帝怒强使叩頭謝主宣兩手據地終不肯俯因勑强項令出賜錢三十萬宣悉以班諸吏及卒帝遣使臨視唯見布被覆屍大麥數斛帝曰董宣㢘潔死乃知之子並官至齊相薛漢淮陽陳人世習韓詩父子以章句著名尤善説災異建武初為博士當時言詩者推漢為長遷千乗太守有異跡張興鄢陵人治梁丘易舉孝㢘累官太子少傅明帝數訪以經術既而聲稱著聞子弟從游者前後至萬人子魴世其業位至張掖屬國都尉樓望雍丘人治嚴氏春秋累官中郎将教授不倦稱為儒宗諸生著錄者九十餘人郭躬陽翟人家世衣冠父𢎞習小杜律為決曹掾㫁獄無寃躬傳父業講授徒衆常數百人累官至廷尉決獄多所矜恕終河南尹子孫至公者一人廷尉七人侯三人刺史侍中二十餘人御史至監平者甚衆丁鴻潁川定陵人父綝從光武以功封陵陽侯鴻少受尚書於桓榮父歿當襲爵讓於弟而教授里中章帝詔鴻與諸儒校五經於白虎觀累官至太尉蔡衍項人少明經講授以禮讓化郷里郷里有争訟者輒詣衍決之其所平處皆無怨舉孝㢘累官冀州刺史徵拜議郎梁冀聞其賢請欲相見衍辭疾不往應順南頓人舉孝㢘累官冀州刺史㢘直無私事後母至孝異樹忽生㕔事人以為孝感所致十子皆有才名繆彤召陵人少孤兄弟同居及娶婦各求分異彤掩户自責弟及婦聞之悉謝罪更為雍睦仕至中牟令有異政李膺潁川襄城人舉孝㢘累官青州刺史守令聞風解印綬去後為司𨽻校尉有被其容接者名為登龍門坐黨錮免官夏馥陳留圍人少為書生言行質直同縣髙氏蔡氏並皆富植郡人畏而事之唯馥比門不與交通後與范滂張儉俱為黨魁賈彪潁川定陵人志節慷慨為新息長黨事起士皆寒心彪入洛陽訟之遂赦黨人兄弟三人並有髙名天下稱曰賈氏三虎偉節最怒彪字偉節故云應奉順𤣥孫讀書五行俱下仕為武陵太守遷司隸校尉桓帝欲立田貴人為后奉諫止之黨氏起稱疾而退子劭舉孝㢘累官泰山守曹操専政劭棄官歸作春秋㫁獄二百五十篇獻帝召為軍謀校尉著漢官禮儀潁容長平人博學多通善春秋累徴不起著春秋條例五萬餘言楊匡陳留人初為杜喬掾喬與李固坐黨錮死匡衛其屍都官從事執詣梁太后太后義之因上書乞送二人骸骨歸葬之遂隠不仕邊鳳陳留人為京兆尹有能名郡人記曰前有趙張三王後有邊延二君陳翔召陵人以孝㢘髙第拜侍御史遷揚州刺史舉劾贓吏威名大振終御史中丞嘗𨽻黨籍荀淑潁川潁隂人少有髙行博學而不好章句桓帝朝補朗陵侯相蒞事明理稱為神君尋棄官歸子八人儉緄靖燾汪爽肅専並有才名時謂八龍靖有至行不仕號𤣥行先生爽年十二能通春秋論語仕為郎中遭黨錮隠海上日以著述為事後徵起累官司空韓韶長社人就辟為泰山嬴長賊聞其賢相戒不入境流民入縣界者甚衆韶愍其飢開倉賑之主者争不可韶曰長活溝壑之人而以此伏罪含笑入地矣子融少能辨理累官至太僕楊倫陳留東昬人少師事丁鴻習古文尚書請辟皆不就後拜侍中以上書直辭不遜免歸後為将軍梁商長史諫諍不合出補常山王傅以疾自止坐稽王命免陳寔潁川許人隠居好學桓帝時為太丘長修徳清静百姓以安寔在郷閭平心率物有争訟輒求判正曉譬曲直退無怨者夜有盜止其梁上寔起呼子孫訓戒曰不善之人習與性成梁上君子是也盜驚自投伏罪寔遺以絹自是一縣無盜卒諡文範先生子紀以至徳稱遭黨錮隠海上著書數萬言號陳子仕終大鴻臚諶與紀齊徳父子並著髙名時號三君鍾皓潁川長社人以篤行稱九辟公府皆不就以詩教授門徒千餘人姪瑾好古慕學有退讓風其内兄李膺謂之曰無是非之心非人也瑾以白皓皓曰保身全家爾道為貴李曇潁川人少孤事繼母至孝陳蕃等薦之曰曇徳行純備擢登三事必能賛宣盛美增光日月桓帝以安車𤣥纁徵之不起爰延陳留外黄人為侍中桓帝嘗問朕何如主對曰中主帝曰何以知之曰尚書令陳蕃任事則治中常侍黄門預政則亂是以知之帝嘉其言後拜大鴻臚茅容陳留人年四十餘耕於野避雨樹下衆皆夷踞容獨危坐愈恭郭泰見而異之因留寓宿旦日容殺鷄為饌泰意謂為己設既而供母自以草蔬與客同飯泰起拜曰卿賢乎哉因勸令學卒以成徳庾乗潁川鄢陵人少為縣門士郭泰勸游學宮遂能講論自以卑弟每處下坐諸生博士皆就讐問由是學中以下坐為貴徵不起號徵君邊韶陳留浚儀人教授數百人才思敏捷應口成章嘗晝日假卧弟子私嘲之曰邊孝先腹便便嬾讀書但欲眠韶潜聞之應時對曰邊為姓孝先字腹便便五經笥但欲眠思經事嘲者大慙官至尚書令著作東觀著詩頌碑銘書策凡十五篇符融浚儀人少為都官吏恥之委去後遊太學師事李膺時郭泰始入京師融一見歎其賢嘗知益州以清節名許慎召陵人性惇篤少博學經籍馬融嘗推敬之時人語曰五經無雙許叔重叔重慎字也初慎以五經傳説臧否不同於是撰為五經異義又作説文解字十四篇申屠蟠陳留外黄人九嵗喪父哀毁過禮蔡邕深器重之蟠隠居精學博貫五經見漢室夷陵累徵皆不就陳留老父桓帝時黨禍起士大夫有去官者相抱而泣老父過之歎曰夫龍不隠鱗鳳不蔵羽網羅髙懸去将安所雖泣何及乎衆欲與語不顧而去竟不知其名范丹一名冉陳留外黄人桓帝時為萊蕪長不到官議者欲以為侍御史遂遁去徒行敝服賣卜於梁沛之間居徒四壁處之裕然三府累辟不就卒謚貞節先生孫粲髙亮清正累官武威太守劉翊潁隂人累官陳留太守及歸惟乗車馬不載他物道遇士大夫病死輒以馬易棺葬之逢貴人困餒又殺所駕牛食之或止之翊曰視死不救非義士也服䖍河南滎陽人有雅才善著文作春秋左氏傳解行世又著賦碑誄書記連珠九憤凡十餘篇靈帝時累官九江太守呂彊河南成臯人為人清忠奉公靈帝時例封官者以彊為都郷侯彊辭讓因上疏陳事言中常侍曹節等徼寵宜止封賞又詔書於河閒故國起解瀆之館未見其便書奏不省蔡邕陳留圉人六世祖勲平帝時為郿令王莽欲臣之逃匿山中父稜有清白行邕性至孝同居三世仕為議郎較正六經親書於碑置之太學門外及卒縉紳諸儒莫不流涕劉陶潁川潁隂人通尚書春秋舉孝㢘累官侍御史封中陵郷侯三遷尚書令拜侍中數切諫為權臣所憚徙京兆尹不就徵拜諫議大夫上書言時務八事荀悦淑孫家貧無書每於人家見篇牘一覽即記官至秘書監侍中時政移曹氏悦作申鑒五篇奏之又依左傳體刪漢書為帝紀三十篇典韋陳留人形貌魁梧膂力過人嘗從曹操討呂布於濮陽操募陷陣者韋手持㦸十餘大呼起所抵無不應手倒者布衆退拜韋都尉其後張繡反襲操營韋戰歿郭嘉潁川陽翟人少有逺量深通籌畧達於事情曹操召見論天下事曰使孤成大業者必此人也表為司空祭酒屢從征伐有功及卒追諡貞侯阮瑀陳留尉氏人少受學於蔡邕曹操辟為司空軍謀祭酒管記室凡書檄多出於瑀徐庶長社人嘗薦諸葛亮於昭烈及曹操獲其母庶謂昭烈曰本欲與将軍圖事今失老母方寸亂矣請從此辭遂歸操荀彧淑孫聞曹操有雄畧歸也之與語大悦曰吾子房以為奮武司馬軍國事悉以咨之董昭謂操宜進爵國公彧曰曹公本興義兵不宜如此操心不平因表留彧為侍中至濡須口飲藥死鄭太開封人少有才畧累官侍御史董卓亂太與荀攸何顒共謀誅之事洩太走歸袁術為揚州刺史子袤有識鑒仕晉累官光祿勲進司空三國荀攸彧從子祖父曇廣陵太守攸仕為汝南太守曹操以為軍師及魏建國為尚書令卒諡敬侯子顗博學洽聞仕魏為司空年七十居母憂哀毁幾滅性封臨淮公鄭渾太弟事曹操為下蔡長召陵令時天下未定民生子多不舉渾課使耕桑重去子之法民漸豐給所育男女多以鄭為字魏建國累官魏郡太守子崇仕為郎中袁渙陳郡人劉備舉渙茂才後歸曹操拜沛南都尉遷梁相每勑諸縣存鰥寡髙年表孝子貞婦常曰世治則禮詳世亂則禮簡全在斟酌魏國初建行御史大夫事子侃清粹閑雅素有父風位至尚書辛毘潁川陽翟人曹操表為議郎遷丞相長史入魏為侍中好直諫嘗以事諫文帝帝不聴毘随而引其裾帝竟從其言明帝時封潁郷侯陳羣寔孫寔嘗竒之謂宗人曰此兒必興吾宗羣初仕漢為治書侍御史入魏為御史中丞累官司空錄尚書事為人𢎞博不伐杜襲潁川定陵人祖根漢永初時舉孝㢘為郎中官至濟隂太守襲始依劉表知其不足托遂還郷里曹操以為西鄂長魏建國為侍中明帝時封平陽郷侯趙儼陽翟人事曹操為朗陵長恩威並著魏建國累官至司空與辛毘陳羣杜襲齊名時號辛陳杜趙何䕫陳郡人避亂淮南曹操辟為司空掾遷長廣太守多所建明海賊冦暴樂安濟南界操以䕫前在長廣有威信拜樂安太守到官數月諸城悉平魏文帝時封成陽亭侯毛玠陳留平丘人少為縣吏以清公稱後為曹操東曹掾與崔瑗並典選所舉用皆清正之士魏建國以為尚書僕射鍾繇皓曾孫善書好謀漢末舉孝㢘累官尚書僕射封武亭侯入魏為相國封定陵侯遷太傅子毓機捷談笑有父風累官刺史厯都督徐州荆州少子㑹討蜀有功封縣侯應㻛順六世孫以文學名識治體仕魏為五官将文學多識朝廷制度弟璩好學善屬文仕魏累官侍中時曹爽専政璩作詩諷之璩子貞有文學官至散騎常侍髙柔陳留圉人仕魏為管縣長姦吏聞其至皆引去累宫廷尉封安國侯子光以文學行義著仕晉累官散騎常侍進少傅晉阮籍瑀子容貌瓌傑志氣宏放初仕魏累官散騎常侍籍本有濟世志屬天下多故名士少有全者遂酣飲為常司馬昭輔政引為大将軍從事中郎将嘗賦詠懐詩八十餘篇子渾有父風鄭冲開封人博學經史初仕魏為陳留太守累官太保封夀光侯時定儀禮律令多主於冲入晉為太傅進夀光公致仕何曾陽夏人好學博聞性至孝友自少至老夫婦相見如賓無聲樂嬖倖之好仕魏至鎮北将軍入晉累官太宰侍中阮咸籍兄子任達不拘與籍齊名仕為散騎侍郎妙解音律善彈琵琶出補治平太守二子瞻孚並有才名孚從明帝平王敦累官吏部尚書從子修好老易意度豁然常步行以百錢掛杖頭至酒店便獨暢飲家無儋石之儲晏如也畢卓鮦陽人少放達嘗曰得酒滿數百斛左手持酒盃右手持蟹螯拍浮酒船中便了一生矣與阮孚等為八達大興末為吏部郎荀朂爽曾孫岐嶷夙成十嵗能屬文既長遂博學達於從政仕至尚書令子組夷雅有才識累官太子太保懐愍之難多所匡扶族子邃累官尚書邃弟闓官至侍中尚書亦有名稱庾峻鄢陵人好學有才思初仕魏為博士長安有大獄拜侍御史往㫁之朝野稱允入晉賜爵闗内侯嘗疾世浮華不修名實著論以非之弟純為世儒宗累官中書令純子旉少有清節仕至國子祭酒潘岳滎陽人少潁敏郷邑號為竒童才名冠世累官中書令有西征閒居等賦從子尼性恬退以著述為事累官太常卿封安昌公阮种陳留尉氏人弱冠有殊操舉賢良對䇿第一遷中書郎正己率人朝廷咸憚其威再遷平原相有治聲江統陳留圉人静黙有逺志累官散騎常侍嘗著徙戎論長子虨仕終國子祭酒次子惇讀書有文名累徵不就虨子敳敳子恒夷並貴顯鍾雅潁川長社人好學有才智仕至御史中丞直法繩違百僚憚之蘇峻之亂侍衛天子或勸之去雅曰君危不能濟而遁逃茍免不可也卒死於難追贈光祿勲七世孫嶸好學善詩仕南齊官至西中郎荀崧彧𤣥孫志操清純雅好文學泰始中代兄襲父爵為安陵郷侯累官開府儀同三司錄尚書事蘇峻之亂與王導等共衛帝二子蕤羨並知名王隠陳郡人父銓少好學有著述之志每私錄晉事及功臣行狀末就而卒隠博學多聞不交勢援元帝時為著作郎令撰國史褚翜陽翟人以才藝名襲父爵為闗内侯累官淮南内史蘇峻之亂翜與王導抱帝登殿侍立左右峻兵入翜正立呵之兵不敢動賊平以功封長汝縣伯進尚書左僕射謝鯤陽夏人父衡國子祭酒鯤少有髙識好老易累官豫章太守蒞政清肅百姓愛之子尚八嵗時坐客曰此兒一座顔囘也尚應聲曰世無尼父焉别顔囘客皆歎異既長辨悟絶倫仕至散騎常侍庾亮鄢陵人明穆元皇后兄風格峻整動由禮節仕為散騎常侍以外戚求退復起為中書監加中書令蘇峻反亮督諸軍平之三子彬死蘇峻之亂義有時名仕為吴郡内史龢仕至中領軍義子凖豫州刺史凖子悦為司徒右長史入宋累官江州刺史庾冰亮弟清慎儉約累官中書監經綸時務朝野稱賢鎮武昌卒弟翼有經綸大畧累官都亭侯代兄冰鎮武昌厯鎮襄陽夏口褚裒陽翟人少有盛名桓彝目之曰季野有皮裏春秋言其外無臧否而内有褒貶也謝安亦曰裒雖不言而四時之氣已備仕終鎮北将軍名冠中興毛寶陽武人叅溫嶠平南軍事破蘇峻有功為廬江太守終豫州刺史二子穆之安之並知名鄭黙開封人寛冲博愛雖童竪厮養不加聲色仕至大司農光祿勲子球封平夀公袁瓌陽夏人元帝時為呂令其弟猷為江都令齊名江淮間時人美之瓌累官散騎常侍瓌族弟耽少有才氣官至厯陽太守耽子質以孝行稱官至東陽太守蔡豹陳留圉人有氣幹仕為振武将軍臨淮太守在郡有治最遷徐州刺史應詹瑒弟璩之曾孫以才藝文章知名當世仕為太子舍人以功封觀陽縣侯領江州刺史子𤣥嗣官至散騎常侍次子誕有器幹厯六郡太守龍驤将軍庾闡鄢陵人九嵗能文仕為零陵太守過湘為文以弔賈誼又作楊都賦膾炙人口子肅之亦有文藻殷浩陳郡長平人父羨資性介立仕終光祿勲浩識度清逺三府辟皆不就謝尚輩嘗伺其出處以卜江左興亡後徵為揚州刺史陳讓至五月始受拜仕至中軍将軍子涓亦知名從子仲堪能清言善屬文仕厯五州刺史桓𤣥忌其勝己害之謝安鯤從子父裒太常卿安少有重名寓居㑹稽之東山累徵不起年四十始為桓溫司馬累官尚書僕射時秦兵百萬冦淮淝加安征討大都督賊平進太保兄奕弟萬子𤣥朗從孫晦皆有才名居江左其行蹟詳見紹興府阮放咸族子與咸子孚齊名中興間為吏部郎銓筦有稱績授交州刺史弟裕少以徳業知名隠居不仕累徵聘皆不就放子晞之累官南頓太守裕子寧鄱陽太守自後子孫貴顯不絶袁喬瓌子博學有文桓溫辟為司馬不就拜尚書郎佐溫平蜀進龍驤将軍子崧少有逸才累官吴郡太守孫恩之亂力守滬瀆城死之江逌陳留圍人避亂居江淮耽玩經史殷浩辟為叅軍甚有匡弼之益後以功拜侍中遷太常子蔚官至吴興太守弟灌累官尚書中護軍從子績御史中丞韓伯潁川長社人清和有思理留心文學舅殷浩及王坦之皆見推奨官至吏部尚書袁宏瓌從孫自少有逸才謝安輩甚重之累官至東陽郡太守所著詠史詩及東征等賦為時盛傳荀伯子潁隂人博通經傳仕為著作郎與徐廣同撰國史遷御史中丞南北朝謝景仁安從孫仕宋為大司馬累遷左僕射弟純純子眺文章清麗善草隸長五言詩仕宋為尚書殿中郎從弟方明方明子恵連從子靈運皆有時名庾登之亮𤣥孫少以經濟自任仕宋累官豫章太守中護軍弟仲文為廣平太守時謝晦當國人皆加謹惟仲文與抗禮登之子仲逺為太子中庶子從文從孫子仲好危言髙論累官太子舍人袁湛陽夏人宋武帝以為諮議叅軍累官司空尚書弟豹好學博聞為御史中丞豹子淑縱横才辯累官太子左衛率淑兄洵洵子顗顗子昂皆有名殷景仁長平人少有大量仕宋累官中書令嘗薦劉湛同為侍中湛入而隂毁之景仁稱疾文帝悟待之益隆凡朝政大小必密函問之殷孝祖陳郡長平人少有氣幹仕宋以軍功拜積射将軍兗州刺史族子琰和雅寡欲多識前事為文帝所知仕至少府加給事中鄭鮮之滎陽開封人仕宋累官御史中丞性剛直言無所隠權貴憚之遷尚書右僕射子愔仕至始安大守毛修之滎陽陽武人累官相國右司馬行司州事戍洛陽修立城壘宋武帝至履行善之後為安西司馬為赫連勃勃所擒及赫連昌滅入後魏既而得還褚淵裒四世孫父湛尚書左僕射淵少有清譽父卒財寳悉與諸弟惟取書數千卷仕宋及南齊累官尚書令侍中及卒家無餘財子賁從父弟炤並有名殷鈞長平人九嵗以孝聞善隸書為學者楷法仕宋至臨川内史閉閣卧理而百姓化之終國子祭酒鄭羲滎陽人渾八世孫仕魏累官中書令出為西兗州太守表薦士類時論多之子道昭博覽羣書累官秘書監兗州刺史孫述祖文雅有風采仕北齊累官太子少保兗州刺史兗人歌之曰大鄭公小鄭公相去五十載風教猶相同袁翻陳郡人仕魏累官度支尚書翻名位俱重當時賢達咸推與之子聿修仕北齊累官都官尚書聿修以名家子厯仕清華時望多相器待袁粲豹曾孫幼孤好讀書及長有風操嘗著妙徳先生傳仕宋累官左僕射出鎮石頭城為劉僧静所殺子最以身衛父俱死粲語最曰我不失為忠臣汝不失為孝子後弟彖好學善屬文仕南齊官侍中袁昂粲從弟仕南齊為尚書令遷司空立朝謇諤世號宗臣被接見者亦號登龍門孫樞仕陳累官尚書左僕射清白自居樞弟憲官至右僕射阮孝緒尉氏人父彦之宋太尉從事中郎以清幹稱孝緒出後從伯𦙍𦙍歿餘財百餘孝緒悉推與其妹母病醫言須人葠舊傳鐘山所出孝緒躬厯幽險累日不逢忽見一鹿前行因尾之獲焉人以為孝感所致荀朗潁隂人慷慨有大畧仕梁累官荆州刺史以功封興寧縣侯遷都督合州刺史鄭紹叔滎陽開封人仕梁為安豐令有能名累遷司州刺史繕兵積穀流民多歸焉終左衛将軍殷不害陳郡長平人家世儉約居甚貧窶有弟五人皆幼弱不害事老母養小弟無所不至士大夫以篤行稱之年十七仕梁為廷尉平長於政事兼飾以儒術累官司農卿簡文帝以不害善事親賜其母蔡氏甚渥鄭道邕羲從𤣥孫以清約自居叔父四人皆早世道邕撫諸孤如同出仕魏累官岐州刺史綏撫逺近户增四萬治為天下最入為少司空樊叔畧陳留人父觀魏封河陽侯為髙歡所誅叔畧奔闗西宇文泰引置左右數被親信以平齊加上開府汴州刺史周宣帝營建東都制度皆其所定以軍功進大将軍入隋加上将軍徵拜司農卿隋鄭譯道邕子初仕魏累官内史上大夫進封沛國公入隋以定策功拜柱國嘗修樂府聲調凡八篇又奉詔定律令正音樂卒官岐州刺史諡曰達劉祐滎陽人開皇初為大都督封索盧縣公其所占候如合符節嘗奉詔撰兵書十卷名同金韜後又著隂䇿觀臺飛候𤣥象要記等書唐鄭善果滎澤人仕隋為魯郡太守母崔賢明嘗坐閣内聴善果處決或當理則悦有不可則責媿之故善果所至有績歸唐檢校大理卿奉法持正風績顯公卿間從父兄元璹愛尚文藝五聘絶域太宗稱其口伐可汗遂使邊火息燧郭孝恪許州陽翟人少有竒節不治貲産初仕李密密敗歸唐嘗進策平王世充竇建徳以功遷上柱國崑丘道副大總管討龜兹國戰歿崔知溫鄢陵人仕為靈州司馬有善政累遷中書令兄知悌户部尚書子泰之工部尚書諤之以功封博陵侯劉仁軌尉氏人家貧好讀書每畫地書空以寓所習卒以通博聞仕為陳倉尉累遷尚書左僕射五世孫瑑舉進士掾翰林學士宣宗時累遷同平章事韋思謙陽武人八嵗喪母以孝聞舉進士累官肅政大夫振明綱紀朝廷肅然子承慶舉進士累官天官侍郎嗣立性孝友累官同中書門下三品格輔元浚儀人舉明經累官鳳閣鸞臺平章事武后欲以武承嗣為太子輔元不從遂下獄坐以謀反斬之天下稱其寃婁思徳鄭州原武人舉進士累官檢校豐州都督進同鳳閣鸞臺平章事卒諡曰貞師相徳深沉有度量善知人人有忤己輒遜以自免為将三十餘年恭勤樸忠以功名終王求禮許州人武后時為監察御史時三月大雪蘇味道以為瑞率羣臣入賀求禮曰宰相和隂陽季春雨雪乃災也味道不從入賀求禮厲聲曰主荒臣佞使天有瑞何感而來哉羣臣震恐后為罷朝李日知滎陽人及進士第武后時厯司刑丞時法令嚴吏争為酷日知獨寛平嘗免一囚死少卿胡元禮曰吾不去曹囚無生理日知曰吾不去曹囚無死法后竟用日知讞議累遷侍中罷為刑部尚書致仕吴兢汴州浚儀人貫知經史方重寡諧累官右拾遺𤣥宗初立鋭於決事兢慮其果而不精上書切諫拜諫議大夫修國史事多核實不少假借人比之董狐鄭䖍滎陽人𤣥宗愛其才置廣文館以為博士居官貧約澹如也䖍善圖山水好書嘗自寫其詩并畫以獻帝大署其尾曰鄭䖍三絶遷著作郎後貶台州司户參軍劉昌開封人善騎射天寶末從張介然討安祿山累以戰守功官至檢校尚書右僕射南川郡王在邊最久所至率士墾田而軍有羨食邊障妥寧卒贈司空鄭濳曜滎陽人母代國長公主開元中主寝疾累三月不靧面主疾侵刺血為書丐諸神請以身代火書而神許二字獨不化翌日主愈戒左右無敢言後尚臨晉公主厯光祿卿吴道𤣥陽翟人仕為兗州瑕丘尉官至寧王友少學書於張旭賀知章不成因工畫其筆法超妙為百代畫聖𤣥宗召入供奉為内教博士非有詔不得畫殷踐猷長平人博學善記尤通氏族厯數醫方時稱為五總龜舉文儒異等授秘書省學士兼麗正殿學士子寅舉宏詞為太子校書郎孫髙杭州刺史孔璋許昌人李邕下獄當死璋以布衣上書謂邕往者折二張之角挫韋氏之鋒有功於國臣無益於時願以身代之遂減邕死鄭珣瑜滎澤人少孤躬耕養母為宋城尉累官同平章事性嚴重未嘗以私託人人亦不敢干以私二子覃經術該深淳篤守正累官尚書左僕射朗累官中書門下平章事覃子裔綽峭立有父風仕至浙東觀察使鄭絪滎陽人幼有竒志善屬文所交皆名士擢進士宏詞髙第憲宗時拜中書侍郎同平章事以太子太保致仕絪守道寡慾世以耆徳稱之鄭餘慶絪從子舉進士貞元中拜同平章事餘慶少砥礪行已完潔仕四朝其祿皆賑親濟急被貶復相不避權幸子澣累官右補闕敢言無避仕終户部尚書孫處誨文辭秀拔仕至宣武軍節度使從讜舉進士累官門下侍郎出為河東節度使詔自擇㕘佐皆一時極選人比為小朝廷後拜太傅兼侍中族孫延昌有文行累官户部尚書拜相王沛許昌人少勇決厯官兗海沂密節度使明示法制軍政大治以檢校工部尚書徙忠武節度使卒子逢仕為諸衛将軍討劉楨有功加右散騎常侍朱忠亮浚儀人為薛嵩裨将累官經原四鎮節度使吏白耄卒不任戰者可罷答曰古於老馬不棄况戰士乎聞者莫不感奮築潘原城有勞改封丹陽卒贈尚書右僕射諡曰靈韋𢎞景思謙曾孫父濟以文雅知名官至馮翊太守𢎞景舉進士累官翰林學士時劉士涇賂貴幸擢太僕卿𢎞景封還詔書後為吏部侍郎銓綜平序官至禮部尚書殷侑陳州人有志於學不治貲産長通經術貞元末及五經第累官刑部尚書時李訓鄭注已誅帝問侑治安術侑言朝廷宜任耆徳無輕用新進帝然之鄭肅滎陽人以儒世家學有根柢舉進士書判拔萃累官平章事挺挺有大臣節與李徳裕協心輔政子洎仕至州刺史孫仁表豪爽有文累官起居郎陳夷行潁川人由進士第累官尚書左僕射介特不羣深為主知以足疾乞罷為河東節度使王博武長社人會昌中侍母至廣州涉海口風起母溺博武號泣赴水救之亦死節度使盧貞得其屍葬之詔刻石表其墓鄭畋滎陽人父亞爽邁有文仕至觀察使畋舉進士宣宗時為翰林學士詔書紛委畋思不淹晷成文粲然皆切機要累遷同中書門下平章事終司徒太子太保趙犨陳州宛丘人重義氣善騎射仕為忠武軍都虞候黄巢亂陳人請授犨為刺史破巢僖宗時擢彰義軍節度使卒贈太尉弟昶以破巢功累遷同中書門下平章事犨子珝累官右金吾上将軍鄭綮滎陽人舉進士昭宗時累官中書門下平章事初綮善詩多俳諧時號鄭五歇後體及為相立朝侃然無復故態既三月以太子少保致仕五代髙頔雍丘人後唐進士累官天雄軍掌書記以左補闕致仕頔有清節力學彊記晨暮常拱手危坐未嘗少懈子南金宋雍熙初擢第次子鼎舉進士官至殿中丞符彦卿宛丘人善騎射事唐荘宗以謹厚出入卧内入漢以功封魏國公周封魏王宋初加太師彦卿為将有謀善戰頗謙恭下士所得賞賜悉分給士卒故人樂為之用周世宗及宋太宗后皆其女也宋石守信浚儀人仕周為鎮安軍節度使入宋累加中書令河南尹封衛國公卒追封武威郡王諡武烈子保興知澶州保吉鎮安軍節度保興子元孫仁宗時為鄜延副都總管薛居正浚儀人好學有大志舉後唐進士仕周累官刑部侍郎宋初遷門下侍郎平章事太宗時進司空居正性孝行純為相任寛簡不好苛察子惟吉涉獵書史官至右領軍大将軍李穆陽武人性至孝言行無矯飾五代周進士為右拾遺入宋累官翰林學士終叅知政事好汲引後進弟肅舉進士累官保静軍推官嘗作樂章九首其文甚工子惟簡多材藝不樂仕進真宗時召拜太子中允致仕沈倫太康人少習三禮講學自給累官給事中清介醇謹從王師伐蜀諸将皆以賄敗倫歸篋中惟圖書而已擢樞密副使中書侍郎同平章事後以左僕射致仕梁周翰管城人幼好學十嵗能屬辭五代周舉進士為開封户曹參軍入宋直史館累官翰林學士工部侍郎有集五十卷及續因話錄劉廷翰浚儀人父紹隠死節於晉廷翰自周入宋累立戰功厯官大名尹天雄軍節度使寛厚容衆長於御下卒贈侍郎子贊元登州刺史贊明勤州團練使焦繼勲長社人少有大志厯晉漢周入宋為右金吾衛上将軍時向拱為西京留守羣盜白日入都市繼勲代之月餘羣盜斂迹子守節厯知襄鄧汝三州以右神武大将軍致仕吴䖍裕許州許田人少為郡吏厯漢周入宋為右千牛衛上将軍仍判左衛仗事每朝會從遊宴上憐其夀髙常慰撫之卒年八十八贈太尉喬維岳陳川南頓人治三傳周時登第授太湖主簿入宋累官給事中知審官院乞外遷真宗嘉其静退特授海州刺史明習吏事卒贈兵部侍郎王昭素酸棗人篤學有志行為郷里所稱聚徒教授嘗著易論二十三篇太祖召至賜坐令講易因訪以民間事深見嘉奨拜國子博士致仕和峴浚儀人父凝晉宰相峴累官著作郎入宋為太常博士後為京東都運使峴善音樂太祖以雅樂聲髙詔峴講求均節之自是八音和暢弟㠓幼能屬文舉進士累官判吏部銓知制誥㠓弟皡淳化中獻文授大理評事宋凖雍丘人開寳中舉進士第一除校書郎直史館太平興國中知制誥凖美風儀善談論文辭清雅為當時所重常思徳開封人累官右神武大将軍雍熙初從曹彬北征不利至涿州左右皆潰散獨思徳以所部護至易州曰既備戎行當與主帥同死生若視利害以為去就将何面目見君父乎太宗聞其言深加慰勞尹繼倫浚儀人父勲郢州防禦使嘗内舉繼倫可用太祖以補殿直累遷都巡檢使威虜軍乏糧太宗遣李繼隆𤼵兵護送輜重契丹将邀之繼倫夜躡其後擊殺其将冦兵大潰自是相戒曰當避黒面大王以繼倫面黑故也官至靈慶兵馬副都部署袁逢吉鄢陵人父蟾大理評事逢吉四嵗能誦爾雅孝經七嵗兼通論語尚書開寳中擢三𫝊第累官鴻臚少卿性修謹練達時務子成務京東轉運副使從子楚材虞部員外郎欒崇吉封丘人以吏部令史上書言事衛補臨淄簿明習文法清白勤事累官江南轉運使遷調尉少卿以将作監致仕子源虞部員外郎沂殿中丞張煦開封人開寳末累官昭州團練使知鄜州徙并代鈐轄知滋州嘗在川蜀西夏東廣累立戰功數被嘉奨又能明術數善相宅時稱其妙上官正開封人少舉三𫝊後為鄜州攝官累授平州防禦使分司西京致仕正以平川蜀有功受知太宗以悻直累致謗書太宗力與明辨仍賜劄戒諭之盧斌開封人以筆劄事晉邸太宗即位補殿直累授閣門祗候尋為梓遂十二州都巡檢使在川峽六年以孤軍禦冦累立戰功及代還上親加勞問行拜檢校左僕射子文質殿中丞楊樸新鄭人善歌詩士大夫多傳誦每乗牛往來郭店自稱東里野既民嘗入嵩山窮絶處構思為歌詩凡數年得百餘篇被召還作歸耕賦以見志真宗朝諸陵道出鄭州遣使以茶帛賜之萬適陳州宛丘人自號遣𤣥子喜學問精於老子書不求仕進所著有狂簡集百卷雅書三卷志苑三卷雍熙詩二百首經籍擿科討論記四十卷後以韓丕薦召為慎縣主簿數日卒戴興雍丘人少以勇力聞及長美髭髯眉目如畫事太宗於藩邸後累官定武軍節度徙夏州行營都部署討李繼遷興所部深入千里後知京兆府卒贈太尉王延徳開封東明人宣祖與其父溫厚善愛延徳謹重太宗尹京署為親校累官東京舊城都巡檢使好撰集近事如司膳錄版築記凡若干卷又上太宗南宮事迹三卷史官脩實錄多訪之許均開封人以應募征遼州有功補武騎十将累官永興軍團練使有勇畧所至輒立戰功幼子懐徳累官殿前都指揮使卒贈侍中諡榮毅王顯開封人性謹介不好狎累官樞密使山南東道節度使同平章事嘗大破契丹於威虜軍後知永興軍顯雖寡學術而質直無邪佞子希逸好學聚書萬卷官至殿中丞直史館周審玉開封人父勲隰州團練使審玉以䕃補殿直累官千牛衛大將軍致仕嘗在定州監軍先鋒劉緒䧟賊審玉躍馬趣擊拔緒而還以勇敢聞故能累立戰功晚年好讀神農本草留意方術白守素開封人父廷訓為博州刺史守素以䕃補官累官鎮州鈐轄王繼忠陷契丹守素據橋有矢數百每發必中敵不敢近遂引去居邊嵗久契丹畏之仕終合州團練使楊樸管城人善詩少與畢士安同學士安為宰相薦之太宗召見面試簑衣詩云狂脱酒家春醉後亂堆漁舍晚晴時除官不受聴歸山以其子從妙為長水尉向敏中開封人父瑀仕五代漢為符離令敏中舉進士累官中書侍郎同平章事天禧中進左僕射昭文館大學士居大任三十年沈毅開濟識達大體卒諡文簡有文集十五卷孫經女為神宗后王繼英祥符人少從趙普給筆劄甚謹普復相補中書直省官後累遷樞密使小心慎靖以勤敏稱真宗倚賴之卒贈太尉侍中諡恭懿子遵式遵誨遵度遵範皆至顯官劉師道開封東明人雍熙初進士累官樞密直學士換左司郎中師道敏於吏事剖煩析滯案無留牘所至有聲性慷慨尚氣善談世務工為詩多與楊億輩酬唱當時稱之張耆開封人年十一事真宗於濳邸及即位累遷宣徽南院使兼樞密副使時建玉清宮耆奏疏謂殫國財力非所以奉天意後封鄧國公以太子太師致仕子希一利一皆厯知數州孔維雍丘人乾徳中以九經及第為國子博士使髙麗王治問禮維對以君臣父子之道升降等威之序治悦曰今日復見中國之夫子也累遷國子祭酒校定五經疏義崔頤正封丘人與弟偓佺並舉進士頤正初為髙密尉以孔維薦為國子直講刊正諸經音疏真宗時日召頤正於苑中説尚書仕終國子博士偓佺自連江尉入為直講真宗幸國學召説尚書所著有帝王手鑑十巻崔立鄢陵人祖周度仕五代周為泰寧軍節度判官立中進士厯知數州有循良之政後以工部侍郎致仕性淳謹喜論事事真宗仁宗前後上四十餘奏多見施用張忠開封人慷慨不事生産仁宗時累官知滄州徙澶州總管㑹河決商胡詔留戌滿卒以助堤役輒羣譟将劫庫兵為亂忠潜捕倡前者數人斬以徇乃止李及新鄭人舉進士累官樞密直學士判吏部銓出知杭州及資性清介治尚簡嚴喜慰薦下吏而樂道人之善在杭數年比去惟市白樂天集後官至御史中丞王徳用管城人父超從真宗幸澶淵有功授崇信軍節度使厯知青州懐州徳用以軍功累官樞密使軍政明而士心附所至有威名家居貧約祿賜多以周宗族段少連開封人倜儻有識度舉服勤詞學知崇陽縣累遷龍圖閣直學士知涇州通敏有才決事如流不為權勢所屈及卒仁宗悼惜之宋庠雍丘人天聖初舉進士第一累官翰林學士叅知政事與呂夷簡不合出知揚州皇祐中拜中書平章數言國家當慎固根本封鄭國公卒贈太尉諡元獻為人儉約好學不倦所著有校定國語補音通譜叢志諸書宋祁庠弟與兄同時舉進士厯官太常博士詔定新樂權度支判官上言三冗三費進翰林學士禮部侍郎上禦戎七論累加龍圖閣學士知鄭州與歐陽修同修唐書書成遷左丞進工部尚書學士承㫖卒諡景文丁度祥符人真宗時登服勤詞學科累官端明殿學士仁宗嘗曰度侍從十五年數論天下事未嘗及其私除樞密副使改叅知政事遷尚書右丞其在經筵上常呼學士而不名江休復陳留人仕為藍田尉累遷刑部郎中修起居注為人外簡曠而内行甚飾其文章醇雅尤善於詩善隸書與人交久而彌篤著唐宜鑒春秋世論及文集若干卷王拱辰開封咸平人年十九舉進士第一通判懐州累遷翰林學士承㫖拜三司使使契丹還為宣徽南院使出鎮北京又鎮彰徳劉平祥符人剛直任俠讀書强記舉進士後以将家子改武官累遷鄜延路副總管趙元昊冦延州平往援與賊大戰衆潰平被執而死贈侍中謚壮武弟兼濟善騎射知其累官河北縁邊安撫副使郭遵開封人家世以武功稱遵累官延州西路都巡檢使元昊冦延州遵入敵陳敵出驍将揚言當遵遵揮鐵杵破其腦復持鐵鎗進所向披靡深入敵中為攅兵注射馬仆被殺贈果州團練使王珪開封人少拳勇善騎射通隂陽術數能用鐵鞭鐵杵仕為涇原路都監元昊入冦珪從任福連戰三日諸将皆敗珪復入戰殺數百人鞭鐵撓曲手掌盡裂奮擊自若矢中目乃還夜中卒子光祖明於料敵累官涇原等路副總管嘗從熊本平瀘夷功第一任福開封人累官環慶路總管知慶州以破元昊功拜神龍衛四厢都指揮使元昊復入冦福力戰身被十餘矢有小校劉進者勸福自免福曰吾為大将兵敗以死報國爾遂挺身決戰而死子懐亮亦死之馬遂開封人仕為北京指使聞王則叛詣留守賈昌朝請擊賊昌朝使持榜招降見則諭以禍福不答遂扼其喉毆之流血賊攅刃聚譟遂被縛而支解之贈宮苑使范恪開封人驍勇善射臨難敢前仁宗時以戰功累遷永興路副都總管恪有弓勝一石七斗其箭鏃如鏵名曰鏵弓凡所𤼵必中他日取蕉蒿砦歸恪獨殿為數千騎所襲恪視箙止有二鏵即為引滿之勢賊遽却孫甫陽翟人少好學日誦數千言舉進士累官右正言時事多所建明官至天章閣待制河北郡轉運使有文集七卷著唐史記七十五卷孫節開封人以才勇補右侍禁與狄青同在延州數破敵砦有功又從青討儂智髙至歸仁鋪為前鋒摶戰賊鋭甚節鏖戰中槍而没特贈忠武軍節度留後姚仲孫商水人父曄進士第一官至著作郎仲孫蚤孤事繼母孝擢進士累官河北都轉運使大修城壘兵偹遷龍圖閣直學士權三司使屬西北備邊悉心經度雖病未嘗廢事程戡陽翟人舉進士累官樞密直學士知瀛州進端明殿學士叅知政事以鄜延經畧使判延州久在邊安重習事治不近名卒諡康穆楊燧開封人善騎射從征貝州穴城以入賊平功第一累官殿前副都指揮使卒諡荘敏燧初穴城時為叛兵所傷劉順救之得免及貴順死訪恤其家甚至故人妻子貧不能活者一切收養之人推其義掌禹錫郾城人舉進士為道州司理試身言書判第一改大理丞以尚書工部侍郎致仕禹錫博學多記嘗預修皇祐方域國志地理新書及校正𩔖篇神農本草又著郡國手鑒周易集解鞫詠開封人父勵廣南轉運使詠舉進士累官監察御史錢惟演圖入相詠言其憸險惟演聞乃亟去大安殿生芝草命羣臣就觀詠言願以援進忠良退斥邪佞為國寳以訓練兵農豐積倉廩為天瑞草木之怪何足尚哉累官天章閣待制韓綜億子兄綱為水部員外郎知光化軍綜舉進士通判鄧州同修起居注嘗為契丹館伴使使者欲稱北朝去契丹號綜曰自古未有建國而無號者使慙而止累遷刑部員外郎知制誥子宗道厯官户部侍郎寶文館待制韓絳綜弟舉進士通判陳州厯遷江南安撫使行便民事數十條後厯翰林學士御史中丞神宗立韓琦薦為樞密副使轉叅知政事夏人犯塞請行邊拜中書平章事哲宗時封康國公卒諡獻肅子宗師舉進士累官至集賢殿修撰韓維絳弟以父輔政不試進士宰相薦其好古嗜學神宗時累官龍圖閣直學士知開封府王安石惡其言保甲事出知許州尋召為學士承㫖天久不雨維言當自責求直言即命維草詔頒之人情大悦是日乃雨元祐更役法命維詳定拜門下侍郎忌者讒之出知汝州坐黨籍納官里居韓縝維弟舉進士為南京判官上言災變詞極剴切厯知開封府進同知樞密院哲宗立拜尚書僕射以太子太保致仕卒諡荘敏子宗武第進士為河間令日食上言切直進都官員外郎張洞祥符人父惟簡太常少卿洞讀書日數千言為文甚敏未冠曄然有聲仁宗時以布衣上方畧尋第進士累官工部郎中洞在館閣久數有建明仁宗以為知經因賜飛白善經字寵之宋充國庠子性剛介刻意學問以郷書試禮部既自謂宰相子輒罷舉仁宗召試賜進士累官知太常禮院充國孝於奉親平居得㣲物必先薦家廟乃敢嘗子喬年官至龍圖閣學士知陳州孫昪顯謨閣學士知應天府鄭向陳留人舉進士甲科為大理評事累遷龍圖閣直學士知杭州卒五代亂亡史册多漏失向著開皇紀三十卷摭拾遺事頗有補焉郭稹祥符人世寓鄭州舉進士甲科累官龍圖閣直學士權知開封府嘗使契丹契丹厚禮之與同出觀獵延稹射稹一發中走兔衆皆愕視稹文思敏贍尤刻意於賦聚古書畫不計其貲購求之趙賀封丘人少喪明遇異醫而愈事繼母至孝舉毛詩及第累官給事中判宗正事厯知數州以精明稱轉運使李中庸嘗薦賀改官中庸没無子賀為主葬圖其像嵗時祠于家魚周詢雍丘人早孤好學舉進士第累官右諫議大夫權御史中丞多所建白仁宗嘉其詳敏知安州時園吏見大蛇垂闌楯即視之乃周詢醉而假寐世𫝊其異何中立許州長社人幼警邁頗以文辭自喜進士及第累官樞密直學士知許陳州徙杭州卒既没家無餘貲有文集二十卷論思集十卷子舜賓官太子中舍呂誨開封人祖端相太宗真宗為時名宰輔誨性純厚家居力學進士登第累官御史中丞王安石初拜叅政誨言安石好執偏見天下必受其禍出知鄧州誨三居言責皆以彈奏大臣而去及安石行新法司馬光始服其先見居洛病困目已瞑司馬光往視之乃張目曰天下事尚可為君實勉之馬懐徳祥符人補三班奉職積官静難軍節度觀察留後累立戰功斬獲動以萬數為范仲淹韓𤦺所知薦嘗為流矢中其顙鏃入於骨以弩絃繫鏃𤼵機而出之許懐徳祥符人父均磁州團練使懐徳善騎射擊刺以父任為東西班殿侍以戰功累遷殿前都指揮使年八十猶生子筋力過人卒贈侍中諡榮毅趙滋開封人父士隆邠寜環慶路都監戰没錄滋三班奉職滋少果敢任氣有智畧累立戰功官至步軍都虞候在雄州六年契丹憚之馭軍嚴繕治城壁樓櫓至於簿書米鹽皆有條法李兊許州臨潁人登進士第積官尚書右丞轉工部尚書致仕兊厯守名郡為政簡嚴老益精明卒諡曰荘從弟先由進士積官秘書監致仕兊尚無恙事之彌篤子庭玉年六十即棄官歸養人賢其家法孫永長社人長肄業西學羣試累常第一擢進士調襄城尉官吏部尚書元祐初進資政殿學士兼侍讀卒謚康簡永外和内勁論議常持平不求詭異與人交終身無怨尤田况陽翟人進士及第又舉賢良方正直集賢院上言治邊十四事多見施用累遷翰林侍讀學士以太子少傅致仕况於天下事小利近功仕勿論而所及必朝廷先務著好名朋黨二論從子畫為校書郎知西河縣與鄒浩以氣節相激厲後知淮陽軍卒淮陽人祀以為土神馬從先祥符人少盡力於學性整嚴雖盛夏不袒跣父當任子推與其弟由進士累官太常少卿知宿州代還知夀州以老辭英宗曰聞卿治行籍甚夀尤重於宿姑為朕往後以工部侍郎致仕徐處仁穀熟人中進士甲科累遷右正言給事中攝開封府剖決如流囚繫嘗空進尚書右丞數請寛民力弭劇盜以剛㢘稱宋守約酸棗人累官步軍副都指揮威武軍留後卒諡勤毅神宗初為簡練法守約率先推行子球累官樞密副都承㫖嘗使契丹告哀至則使易吉服球謂曰通和嵗久憂患實同大國安則為之契丹不能奪賈嵒開封人少善騎射起家從戎累官步軍都虞候濠州團練使嵒在兵間二十年有智畧能附御士卒所向輒勝時稱為良将王恩開封人以善射入羽林神宗偉其貌補供備庫副使累官殿前都指揮使武信軍節度使以檢校司徒致仕卒贈開府儀同三司謝文瓘陳州人進士甲科累官集英殿修撰知濟州上疏言臣下推行新法榜笞禁錮民受其虐大臣以為訕神宗曰彼謂奉法者非其人爾何訕也子貺知汝州欽宗時上封事十篇金人犯汝州貺戰死李南公鄭州人舉進士調浦江令厯知數郡以龍圖閣直學士致仕南公為吏六十年幹局明鋭子譓第進士紹聖間知章丘縣後以直龍圖閣知熙州累遷陜西轉運使黄寔陳州人登進士第累官寳文閣待制知定州卒贈龍圖閣直學士寔孝友敦睦世稱其内行與蘇軾兄弟友善雖以章惇甥獲免黨禍然亦不得久於朝著孫路開封人第進士元豐中累官兵部尚書以龍圖閣直學士知成都夏人入寇有扞禦功司馬光将棄河湟問於路路挾地圖示光曰熙之北已接夏境若捐以予敵一道危矣光幡然曰賴以訪君不然幾誤國事盛陶鄭州人第進士為監察御史累官權禮部侍郎後以龍圖閣學士知順昌府嘗劾李復圭輕敵敗國程昉開河無功二人實王安石所主陶不少屈史稱其大節可取楊仲元管城人第進士調宛丘簿厯知光䖍虢三州累官光祿卿戒諸子曰吾入官五十年未嘗以私怒加人雖杖刑之微茍有兩比不敢與輕法以是為報國耳時彦開封人舉進士第一累官工部尚書進吏部卒彦嘗尹開封異時都城苦多盜捕得則皆亡卒吏憚於移問往往畧之彦始請一以公憑為騐否則拘繫之以俟報坊邑少安獄屢空張近開封人第進士累官大理正受詔鞫治呂恵卿哲宗諭曰此出朕命毋畏恵卿對曰法之所在雖陛下不能使臣輕重何畏恵卿也官至顯謨閣直學士知太原府孫固管城人舉進士石介一見以公輔期之累官門下侍郎知樞密院事卒諡溫靖固宅心誠粹不喜矯亢故更厯夷險而不為人所嫉張逸滎陽人舉進士厯知鄧城長水青神尉氏縣後以樞密直學士知益州民有殺人以誣人者吏受賄令殺人者守囚逸曰囚色寃守者氣不直豈守者殺人耶囚始敢言而守者果服立誅之凡四為益守而政多便於民羅拯祥符人第進士性和柔不與人較曲直累官江淮𤼵運使嘗與副皮公弼不協比公弼被劾拯力為辯理諫官錢公輔嘗論拯短公輔姻黨多在拯部内往往薦進之或譏以徳報怨拯曰同僚不協所見異也諫官所言職也又何怨乎時論服其長者崔鶠陽翟人舉進士積官殿中侍御史徙右正言累章極論章惇蔡京罪惡時議歸重有古學為文至多尤長于詩清峭雄深有法度有遺文三十卷張叔夜耆孫少喜言兵厯知陳留襄城縣海州宋江起河朔叔夜誘擒其副江乃降靖康初領南道都總管金兵再至即與子伯奮仲熊入衛轉戰至都累遷簽書樞密院連日與金人大戰斬其二貴将城䧟被創猶父子力戰車駕北狩叔夜從至白溝死之諡曰忠文安燾開封人幼警悟登第累官觀文殿學士知鄭州章惇與燾布衣交及為相覬其助己燾乃上疏言用事之臣持紹述之名誑惑君父在哲徽時兩知樞密院事子扶為給事中張克戩耆曾孫第進士累官知汾州金人攻汾克戩畢力扞禦久之召令民兵曰吾不忍負國家辱父祖願與此城終始以明吾節衆皆泣對曰願盡死聴命屢敗金人而援兵不至城䧟率衆巷戰歸索朝服南向拜自引決一家死者八人事聞贈延康殿學士張克公克戩從弟起進士官至吏部尚書嘗論蔡京罪京御之欲以銓綜稽違中克公既又擿其知貢舉事帝以為所取得人不問也卒贈資政殿學士趙遹開封人大觀中累官兵部尚書嘗伐宴州夷山險難進乃捕猱數十束麻灌以膏蠟縛猱背夜遣人負繩梯登崖及賊柵乃然炬猱熱狂跳廬舍火𤼵賊號呼奔樸猱益驚火益熾官軍鼓譟破柵賊亂赴火墮崖死者不可計俘斬數千人鄭居中開封人登進士第累官知樞密院加少師三封國公卒追封華原郡王諡文正徽宗時蔡京數勸攻契丹居中力陳不可謂京曰使百萬生靈肝腦塗地公實為之由是議寝路昌衡祥符人起進士累官直學士知成都徽宗立上書言西方用兵致興大役利源害政佞臣蔽主四者皆隂之過盛後落職入黨籍卒贈龍圖閣直學士李璆汴人登政和進士第累官四川安撫制置使璆所至為政有恵治蜀之政尤多可紀有清溪集二十卷曹勛陽翟人父組為睿思殿應制勛用恩補承信郎賜進士甲科累官太尉開府儀同三司卒贈少保勛從徽宗北遷復持御衣書歸進髙宗﨑嶇兵間稍著勞効故恩榮始終云呂由誠誨季子幼明爽有智畧以父恩補官後通判成都府知雅嘉溫綿四州皆有治績靖康初差知襲慶府時羣盜蜂起﨑嶇至郡為備金兵來攻與判官趙令佳同心誓守城䧟俱被執不屈死之何灌開封人武選登第累官河東河北制置副使數有戰功靖康初金師叩京城灌入援既至令控守西隅背城拒戰凡三日被創没於陣子薊閣門宣賛舍人從父戰箭貫臂病創死紹興間贈灌忠正軍承宣使胡閎休開封人入太學著兵書二卷靖康初應知兵科中優等補承信郎二帝詣金營閎休欲結義士劫之為何㮚所止後南渡從岳飛討賊湖湘進成忠郎飛被誣死閎休𤼵憤杜門佯疾卒有勤王忠義集蔵于家程迪開封人父博古部鄜延兵戰死迪以䕃得官至榮州團練使金人破永興迪率其徒力戰身被創幾徧絶而復蘇猶厲聲叱戰不已遂死之詔贈明州觀察使諡恭愍韓公裔開封人以三館吏補官充康王府内知客累官岳陽軍節度使卒贈太尉諡恭榮公裔早著忠藎為天子故人能與黄潜善秦檜為異史稱其知所向方髙貴祥符人寓居鎮江舉進士累官知髙郵府扈從之海上擢樞密使與陸秀夫同死崖山金楊伯元尉氏人泰定間舉進士調郾城主簿以才幹被委注累為審錄官明辨多中理人稱其平官至工部侍郎武安軍節度使卒諡曰達張彀臨潁人性至孝善書人以為有顔真卿風致舉進士為同州判官有善政及民官至河東南路轉運使元徐世隆西華人金進士辟為縣令其父戒以年少毋急進仕世隆遂辭官益篤於學世祖方圖征雲南以問世隆勸以不嗜殺人世祖曰誠如卿言吾事濟矣後召為翰林集賢學士以疾辭所著有瀛州等集百餘卷楊敬直祥符人父澤有隠徳敬直以儒術見世祖累有軍功進宣慰使卒贈𢎞農郡公弟元直仕至行中書省平章政事贈梁國公田滋開封人公正有清徳累官浙西㢘訪使辨理寃獄人稱神明官至陜西行中書省叅知政事卒追封開封郡公劉好禮祥符人父仲澤金大理評事好禮幼有大志知讀書通國言仕元累官澧州路總管厯刑禮吏户部尚書邵敬祖宛丘人父喪廬墓母繼没河決不克葬殯于城西敬祖露宿依其側風雨不去友人哀之為縛草舍庇之前後居廬六年兩髀俱成濕疾至治二年旌其家李仲和河隂人性純篤以文吏從事閫幕元兵攻襄陽下重慶定西蜀多其賛畫以功累遷建徳路總管楊士𢎞襄城人寓臨江好學善屬文尤工於詩嘗選唐人詩名曰唐音其自著有鑒池春草集謝讓潁昌人幼穎悟好學累官户部尚書更定鈔法民甚便之轉刑部尚書詳定律令凡六部疑事悉聴裁決後拜侍御史卒追封陳留郡公歸𤾉汴梁人學無師傅而精敏過人至順初進士累官刑部尚書集賢學士兼國子祭酒暘同知潁州時杞縣人范孟謀不軌召官屬署而用之使𤾉北守黄河口𤾉力拒不從賊怒繫于獄暘無懼色賊敗獨獲免韓元善太康人父克昌監察御史以論事有名元善累官中書左丞性純正以文學治才羽翼廟謨議論之際秉義不回嘗置義荘以贍貧族立義塾以教族人子弟卒追封梁國公韓因汴梁人少習舉子業負氣不羣盜據汝寧久討不下㑹詔赦叛逆借因以唐州判官使持詔詣賊賊渠恐納詔不讀而縱因歸報因乃周賊屯大言汝等好百姓何甘從賊驅使賊渠追因責之因極口肆詈賊怒寸割因張槙開封人元統初進士為髙郵縣尹性剛介門無私謁抑豪之强辨寃獄人稱為神明召拜監察御史上疏言禍亂由不報即辭官居河中安邑山谷間累徵不起陳祖仁汴人父安國晉陵縣尹祖仁好學有文名至正初進士第一累官翰林學士叅知政事朝廷之事多所匡正及順帝北遁祖仁死焉本朝滕克恭祥符人性明敏博通經史登元進士累官集賢館學士本朝洪武初兩為河南郷試考官夀百餘嵗張玉祥符人有智畧性謹密仕元為樞密院使本朝洪武初歸附累官燕山右護衛指揮僉事以靖内難功進都督同知次東昌戰没永樂初追封榮國公諡忠顯洪熙改元進封河間王諡忠武王鈍太康人淹貫經史元舉進士授猗氏縣尹入本朝累官叅政持節撫諭麓川平緬甸宣慰使贈遺金貝固却不受還陞浙江布政司致仕季子瀹以永樂餘丙戌進士累官户部侍郎致仕號退翁能詩文有公歸田二集蔵于家任昂河隂人博覽羣書早有才譽元進士拜晉寧縣尹不受隠居日以經史自娱本朝洪武初以儒士訓襄垣縣學累官禮部尚書吴孔彰臨潁人才識超卓博通經史元末不干仕進本朝以儒士薦送京師累官至山西右布政使王僎祥符人仕元為國子助教本朝洪武初召授翰林修撰兼編修官命于大本堂授經遷待制致仕子𢎞為龍江逓運所官為丞相胡惟庸家人所愬寘于法惟庸敗召僎父子至京慰勞賜綺帛給舟車還家世家寳臨潁人性剛果有謀畧讀書知兵洪武初授大理少卿進禮部侍郎終刑部尚書馬守中陽武人洪武初以秀才釋褐獲嘉縣丞厯遷知縣同知所至政聲著聞入為監察御史未幾進陞都察院右僉都御史解敏陽武人性剛勁務學明敏以古人自期洪武中進士積官浙江按察使政聲著聞超拜右都御史趙羾祥符人質直孝友攻書善詩文洪武中郷舉初授兵部主事厯陞浙江叅政入為刑部侍郎厯禮兵刑三部尚書所至能聲著稱宣徳間致仕卒于家所著有傖父集王彰鄭州人博學有郷才望洪武中領薦入太學初授吏科給事中厯陞山西左叅政入為禮部右侍郎尋調户部累陞右都御史人莫敢干以私時劉觀為左都御史用法之公人以彰為優云于潛鄢陵人少倜儻有志操釋褐太學為監察御史厯知龍徳昌樂二縣能以清介勤敏得吏民心官至應天府尹張志尉氏人性資沈静涉獵經史洪武中由國子生起家任監察御史能幹益著尋陞右副都御史王觀祥符人性耿介儀度詳整語言敏捷洪武中入太學問學識見為衆所服比為蘇州知府𤼵奸擿伏境内畏憚朝廷嘉其能榜諭天下以勵怠政者張春許州人才器淵宏洪武中由國子生擢刑部郎中尋陞都察院左僉都御史出為福建浙江布政司叅政永樂中入為戸部右侍郎終山西右布政使楊端禹州人性醇厚博學超羣洪武中以太學生擢延安府通判治民有能聲以績最陞户部郎中累官至山東布政司左叅政解禮鄢陵人幼純篤父母歿廬墓側負土壘墳手栽柏樹數千株欲開井以資灌溉一日偶出廬行數步如有人附耳者曰此有井及掘地果得一井復有雙兔馴擾墓上人稱其孝焉宋文祥符人性資醇厚學行兼備洪武中河南叅政鄭居貞以隠士薦送京師授山西按察司副使在任㢘能著稱風紀肅然古樸陳州人少聰敏善于㑹計洪武中釋褐太學以勤勞累官户部尚書程敏鄢陵人淳篤好學謙恭不伐洪武間以國子生選擢都督府㫁事尋調刑部主事讞獄精詳累官廣東布政司左參議魏清禹州人性資明敏識見過人洪武中以國子生拜監察御史能聲籍籍尋陞四川按察司副使永樂宣徳中厯陞山東山西所至有㢘能幹濟之譽岳岫密縣人少嗜學博通經史容貌魁偉氯岸卓越洪武中以人材舉薦累官至右布政使劉逵項城人性寡黙善書翰家世以忠孝相承郷邦稱之洪武間以人材舉薦累官至刑部試尚書郭濟大康人博通經史永樂中以春秋魁郷試厯任定州大名訓導秩滿薦陞左春坊司諫累轉行人兩使交趾宣徳中陞鎮江知府奉勅往蒞其事在任多善政聲譽大振劉禮臨潁人性醇厚器重不凡自幼嗜學久厯仕途才名著稱累官至湖廣左布政使劉醇祥符人能詩善屬文洪武末以儒士起家累官周府長史致仕年九十餘號菊荘先生有菊荘集若干卷張輔玉子器宇雄壮顧盼有威從定内難累立戰功封信安伯加新城侯永樂五年率師征交趾一鼓而破之生擒賊首犁季犛父子進爵英國公卒追封定興王諡忠烈洪熙宣徳正統間享福祿榮名數十年朝廷倚以為重名震四夷弟軏南征有功累陞右都督進封太平侯追封裕國公諡勇襄張信祥符人讀書善為文為輩流所推服洪武己夘郷舉入太學永樂初拜刑科給事中厯陞工部侍郎尋以英國公張輔同族轉任四川都指揮僉事後陞都指揮使鎮静一方名重于時顧佐太康人洪武末進士初授荘浪知縣午節會射将官以文士易之佐連𤼵三中且有禮人由是重之入為監察御史守正疾邪累官右都御史卓有聲譽立朝侃侃不阿綱紀為之振起時稱為名執法云許廓襄城人魁偉倜儻博涉經史善草書洪武己夘科舉人厯任工科給事中勵志勤慎累遷工部侍郎出撫郷邦流民人賴以安官至兵部尚書宋伯義西華人剛介有守言辭辨正洪武中以才行俱優由太學選擢山東布政司右叅政克著勤能永樂初轉任陜西布政司清譽益彰王鐸祥符人行已謙恭為學勤敏早有譽于郷曲永樂中郷舉授陜西鳳翔府教諭訓士有功陞福州府教援復以績最陞刑科給事中未幾超遷貴州按察司副使郭原蘭陽人永樂中郷舉初授四川道監察御史持身端謹正大無阿雖故人不敢以私恩相干人謂有古御史風尋陞陜西按察司副使李敏儀封人志節髙邁識見過人永樂中貢入太學初授刑科給事中累遷南京都察院右僉都御史祝暹祥符人宣徳中進士擢户部主事有能聲累陞右僉都御史田春襄城人永樂庚子科郷舉除徐州學訓導能以身教子秦進士累官山西叅政孫墀舉於郷羅俊扶溝人由舉人通判大同府有善政子贊孫玹俱進士第贊官御史丘陵蘭陽人登宣徳庚戌進士授平郷知縣以績最給勑命旌異陞真定知府改淮安天順庚辰入覲賜錦衣楮幣陞湖廣右布政以從征苗寇功轉山西左布政使致仕子潞舉成化壬辰進士珙中成化丁酉科郷舉省志王瓚蘭陽人正統中由貢除武昌府同知為政寛平郡人至今思之省志李敏襄城人正統中舉進士除監察御史陞厯浙江湖廣按察使山西四川左右布政使副都御史巡撫大同入為兵部侍郎以疾辭歸復召為副都御史士林推重志省馬文升禹州人景泰初進士除御史巡按山西湖廣所至有聲陞福建按察使憤鎮守中官擾民輒繩以法巡撫遼東凡三往皆樹竒績累官兵部尚書卒贈太師諡端肅志畧孫賢杞縣人景泰末進士陞翰林修撰厯侍講春坊太常少卿兼翰林侍讀頗擅文名省志何清許州人由貢授陜西環縣學訓導聞母喪亟徒步奔歸襄事廬守墓側朝夕悲泣有黄貓隨應紫燕二巢累年不去成化初旌為孝子省志金迪扶溝人天順甲辰進士厯陞户部郎中奉勑督運漕糧時河南陜西饑迪為賑恤民賴之省志陳鎧祥符人早喪母事繼母極孝及卒葬祭成禮父遘痿痺疾十餘年鎧家貧孤立妻死不再娶躬執爨和藥餌無少懈劉忠陳留人由進士厯官中外為世名臣見名臣録劉憬鄢陵人由進士除刑部主事厯陞四川叅政山東左右布政使都察院右副都御史所至有聲累官刑部侍郎政績茂著省志列女荀氏名采漢潁人荀爽女隂瑜妻年十九而寡且無子後爽詐病召采强以嫁同郡郭奕采懐刃将自殺爽命傅婢奪之既至因入浴掩户以粉書扉曰屍還隂氏遂自縊死蔡琰陳留人邕之女博學妙音律初適衛仲道為胡騎所獲曹操以金璧贖還再嫁屯田都尉董祀祀犯法當刑琰詣操請罪文辭清辯杞獲免操因問汝家多書能識之不琰曰亡父賜書四千餘卷今所誦憶裁四百餘篇自著有胡笳十八拍及悲憤詩辛氏名憲英陽翟人魏侍中毗之女嫁為羊耿妻聰明有才鑒初文帝立為太子抱毗頭曰辛君知我喜不憲英聞之曰太子代君主宗廟社稷者宜戚而喜何以能久魏其不昌乎其明鑒類此謝道韞陽夏人晉安西将軍奕之女幼聰敏才辯嘗内集雪下叔父安曰何所似從子朗曰撒鹽空中差可擬道韞曰未若栁絮因風起安大竒之所著有詩賦誄頌荀小女名灌潁川人父崧晉襄城太守為杜曾所圍欲求救於故吏平南将軍石覽計無從出灌時年十三乃率勇士數十人踰城夜突出詣覽乞師又為崧書與南中郎將周訪請援覽與訪合力救之遂解圍董氏名徳貞浚儀人賈直言妻直言坐事貶嶺南以妻少乃訣曰生死不可期長去可亟嫁徳貞不答引繩束髮封以帛使直言署曰非君手不可解直言貶二十年乃還署帛宛然楊烈婦唐項城縣令李侃妻建中末李希烈䧟汴州其别將抵項城侃以兵少財乏難於守楊曰請重賞募死士尚可濟侃用其言率吏民死守㑹賊将中矢棄去城遂得完詔遷侃太平令旌異楊氏號烈婦朱氏宋開封民婦夫日與俠少飲博犯法徙武昌父母欲奪而嫁之失将行一夕朱自經死且曰及吾夫未去使知我不為不義屈也丁氏宋新鄭人張晉卿妻靖康中與夫避兵大隗山為金兵所得挾之鞍上丁自投於地㦸手大罵連呼曰我死即死誓不受辱復挾上馬再三駡不已卒奮然舉杖縱擊死杖下白氏金許州人蘇嗣之之母宋蘇轍五世孫婦也年二十餘寡居除服外家議迎歸改醮白曰我蘇學士家婦又有子乃欲使我失身乎自是不往外家天興初許被兵嗣之為汴廂官白時年七十餘矣拜祠二蘇先生前曰兒子往京師老婦死無恨矣即自縊死霍氏二婦尹氏楊氏夫家鄭州人元至元間尹氏夫耀卿歿姑命其更嫁尹曰再嫁失節妾不忍為也姑不能强楊氏夫顯卿繼歿慮姑欲其嫁即先白姑願與尹共修婦道姑曰汝果能如是吾何言哉於是同處數十年節孝著聞衣氏元汴梁人孟志剛妻志剛儒士貧無子及卒有司給棺木衣氏紿匠者曰棺可寛大吾夫有遺衣欲盡置其中匠者然之是夕衣氏祭其夫畢自經死有侯氏者鈞州曹徳妻徳病死侯曰欲守志而亂離如此其能免乎遂縊死於墓李氏汴梁人丁尚賢妻年二十餘有姿容元至正中賊至欲虜之李怒曰吾家六世義門安能從賊以辱身乎於是闔門三百餘口皆遇害李順兒元許州儒士李讓之女性聰慧頗涉經𫝊年十八未嫁至正中賊䧟鈞州其父母憂曰此女必累我女聞之泣曰父母可自逃難勿以我為憂須臾於後園自經死孫氏陽武人陳子英妻子英充飛虎衛小旗本朝洪武初從征迤北金山謂孫曰吾生死未可知幸有二弱息汝肯撫育乎孫曰君但盡忠報國吾母子毋煩憂也子英果死於戰父母欲奪其志孫泣曰吾不忍背夫而生即欲自盡父母懼乃止萬氏密縣人王佐妻佐疾亟顧萬氏曰我死後汝善事人萬氏泣誓曰吾與汝同死豈能再適須臾佐卒是夜萬氏自縊遂雙棺合葬郷人無不傷嘆洪武中有司上其事特旌異之時氏祥符人魏安仁妻安仁登進士第厯官未久卒時年二十三奉事舅姑盡孝以女工易甘脆父母家貲素饒累有所遺皆卻之或問其故曰以養舅姑累父母非吾願也宣徳中旌表其門于氏長葛人程黼妻黼任寧津知縣未幾卒于官子顯在襁褓于氏時年二十六歸葬其夫堅志守節撫育其子及冠為娶婦王氏生子玘未踰嵗顯卒王氏時年二十四家道且貧或諷其他適王氏喟然曰吾姑守節若不能繼生無以見姑死無以見夫孀居數十年姑婦俱無恙正統中旌為雙節張針姑陳州人年十四許同郡孟七保為婚未幾七保輸税於開封卒𦵏祥符之蘇村父母欲嫁之針姑曰既許孟氏今雖亡其母無所依願歸以養之父母重其義從之乃與姑詣祥符負其夫尸還𦵏誓養姑終洎姑卒以禮𦵏之立志愈堅年幾六旬有司上其事旌表其門段門雙節儀封人段整妻魏氏二十三夫亡矢志自守力織紝自給卒養翁姑以天年終三子亦皆成立未幾長子安其妻胡氏年十九守節如其姑成化四年事聞旌其門曰雙節省志于氏儀封人李嵩妻嵩随父任南京副都御史未至而卒於途于年十九都憲公憐其少将改配而于聞之乃以死自誓不復適人居孀四十餘年郷里不識其面子清孤時甫三月卒至成立授吉府奉祀成化五年有司上其事旌其門曰貞節志省吳氏封丘人庠生彭儀妻儀卒守志不三載而姑亡子殀其母利富人之財欲令改適吴泣曰妾聞失節事極大異日何面目見夫乎于是更衣沐體潜行至夫墓所以手扒墓側深尺餘欲進而不得痛哭至夜分淚竭血繼衣有痕漬自縊於棠樹同下而死面色猶生見者莫不流淚鄉人為置棺與夫穴至其年仲冬獨所縊棠樹花生殊甚時有盛雪寒風花不隕蘀人皆以為貞烈所感有司上其事特旌異之志省趙氏鄭州人李讓妻讓蚤逝遺腹生子名福舅姑欲奪其志誓不再醮奉養唯謹竟終所守成化六年事聞旌為節婦省志鄭氏太康人年十六適邑人趙泰越一載趙役京師卒翁姑欲奪其志趙援髪誓曰生為趙家人死為趙家鬼姑卒墓前植樹有雙鳩來巢乳雛連年不去成化庚寅事聞特旌表其門省志王氏太康人王傑女傑任刑部郎中贅郭浩為婿浩卒王年二十哀毁骨立遺子杲尚童稚誓不他適後杲與妻繼逝僅一孫王教之底於成成化庚寅旌異之省志裴氏陳州趙璧妻璧貢入監囑裴曰爾為我奉父母撫小兒裴諾未幾趙卒舅姑議欲嫁之裴泣曰許夫以諾而不能信則狗彘之不若終養舅姑成其子事聞詔旌之省志張氏太康人晉嵩妻生女甫一嵗嵩病篤謂曰我死後寡守何如張痛哭不言私命匠者造大棺迨殮畢竟自縊合棺而葬事聞旌表志省李氏項城人趙二妻二病劇謂李曰汝盛年無子吾死後不宜自守李泣曰夫死謂之未亡人若有異志他日何以相見於地下未幾遺腹生子長嘆曰妾不幸不得事夫今得撫孤成立不墜趙祀幸矣事聞旌表其門省志許氏雙節襄城人兵部尚書許擴二女長淑真贅盛全次淑英贅尉善盛尉俱早亡時長年二十三次年二十皆以死自誓不再適事聞旌表其門曰許氏雙節省志路氏氾水人趙三妻年二十五而夫亡路誓不再適孀居四十餘年孝養舅姑撫子安成立入太學安以狀聞旌表省志仙釋劉諷潁川人漢景帝時仕為公車司馬事司馬季主得服日月精華之道晚歸郷里託形杖屨而去鮑靚陳留人事漢為南海太守嘗遇隂長生授道訣一日行部入海遇風饑甚取白石煑食之又與葛洪善以女妻洪靚還丹陽卒𦵏石子岡蘇峻之亂盜𤼵其棺無尸唯大刀一柄盜欲取之聞左右兵馬之聲刀亦有聲如雷盜驚懼乃止上成公東漢密縣人出行久而不還後歸語其家云我已得仙因辭家而去家人見其舉步稍髙良久乃没陳寔韓韶同見其事李根許昌人有趙買者聞其父祖言已見根比買事根年已八十四而根年少自若有得根素書讀之其自記云以漢元封中學道於某甲計之己七百餘嵗矣張拱汴人宋舉進士不第賣藥宜春門忽有道士抵其肆授以棗七枚食之自是不食踰二年溲矢俱絶神氣明爽日可行數百里後遊名山不知所終郭上竈宋天禧中以傭瀹湯滌器汴州橋茶肆中一日遇呂嵓随去十餘年始歸謁趙長官曰大數垂盡願施一小棺乞於棺首穿一穴插通節竹於穴中以通氣明日汲水浣身卧槐下遂絶葬于河岸是秋水漲趙往視焉獲棺無尸張九哥宋慶厯中居京師雖盛冬單衣燕王竒之嘗召見與之酒嵗餘見王曰将逺遊故來别有小技欲以悦王乃取羅重疊剪為蝴蝶狀随剪皆飛去莫知其數少頃呼之蜂蝶皆來復為羅王曰吾夀幾何九哥曰與開寳寺浮圖齊堅後浮圖災王亦薨侯先生不知何許人慶厯間貨藥京師年四十餘無鬚眉瘤贅隠隠徧肌體常半醉遇夜與丏者同處有馬元者盛夏随之出閶闔門浴池中元因就視乃一蝦蟆元遽引退侯浴出著衣元前揖之笑曰子適見我乎乃召元飲酒肆中出藥一粒曰服之令子夀百嵗自此不復見有自蜀中來者見其貨藥於市訾亘嘗師丹陽馬鈺長春丘處機自號寧真子人稱訾仙翁遊厯濟南抵鄭之釣臺金泰和間大雪丈餘亘不出已十餘日人以為死矣衆除雪視之端坐儼然殊無寒餒色貞祐間大兵破闗陜軍民恐懼亘曰無妨已而果然哀宗幸蔡問曰天下城池攻䧟殆盡此城獨安何也僉以訾仙翁對亘遂溘然羽化未及𦵏翌日城䧟矣神秀尉氏人少親儒業訪道至蘄州雙峰東山寺禮五祖忍師為弟子唐武后召至都命舊山置度門寺以旌異之張説問法秀曰一切佛法本自心有将心外求捨父逃走神龍初入滅諡曰大通禪師志言本姓許氏自夀春來居東京景徳寺為人卜休咎書紙揮翰甚疾初不可曉其後多騐宋仁宗以儲嗣未立黙遣内侍詣志言所即書十一郎字付之人皆莫測後英宗以濮王十一子入繼衆始悟有具齋薦鱠者則又食之臨流而吐化小鮮羣泳而去仁宗以其真身塑像置寺中榜曰顯化禪師文通慧姓張氏脱俗白雲寺師令掌厠盥盆忽有市鮮者沃於盆文偶擊之仆地死文懼奔華州總持寺久之為長老忽曰三十年前一段公案今日當了衆問故曰日午當自知之遂趺坐以待時張浚統兵至闗中一卒持弓矢至法堂瞠目視文将射之文笑曰老僧相候久矣卒曰一見即欲相害不知何讎文語以故卒悟曰寃寃相報何時了刼刼相纒豈偶然不若與師俱解釋如今立地往西天視之已立化矣文即索筆書偈云三十三年飄蕩救了幾番模様誰知今日相逢却是在前魔障書畢泊然而化歸徳府東至直隸鳯陽府宿州界二百一十里西至開封府杞縣界二百二十里南至鳯陽府太和縣界一百三十里北至山東兖州府曹縣界四十里自府治至京師一千五百五十里至南京一千一百八十里糧七萬七千六百石零建置沿革禹貢豫州之域天文房心分野古商丘湯所居亳都地周封微子於此為宋國戰國齊楚魏三分其地秦為碭郡漢改為梁國後漢晉俱因之後魏置梁郡後周改曰梁州隋初置宋州大業初改為梁郡以宋城等八縣屬焉唐初仍為宋州尋改為睢陽郡五代梁置宣武軍唐改歸徳軍以滅梁袁象先入朝故名宋陞為南京應天府治宋城金改府曰歸徳元仍舊本朝洪武初降為州屬開封府嘉靖中復為歸徳府直𨽻河南布政使司而增以睢州等縣焉領州一縣八商丘縣附郭本髙辛氏子閼伯所居商丘也相土代之繼主火祀秦為碭郡地漢置睢陽縣屬梁國後漢魏晉俱因之南北朝劉宋改縣曰夀春尋復為睢陽屬南梁郡後魏置梁郡隋開皇初改郡曰宋州改縣曰宋城大業初復置梁郡唐為睢陽郡治宋為宋城縣金為睢陽縣元以姑熟縣省入本朝洪武初降歸徳府為州省睢陽縣嘉靖二十四年陞州為府置商丘縣編户二十七里寧陵縣在府城西六十里本古葛伯國又為甯城春秋時宋地秦為碭縣地漢元狩初置寧陵縣屬陳留郡後屬梁國晉屬譙郡又屬陳留北齊廢隋復置屬宋州唐因之宋屬拱州後屬應天府金屬歸徳府元仍舊本朝因之編户七里鹿邑縣在府城南一百二十里春秋晉邑本曰鳴鹿左𫝊諸侯侵陳至于鳴鹿即此漢為鄲縣地屬沛郡東漢析置武平縣屬陳國晉屬梁國隋始改鹿邑縣屬陳州唐屬亳州宋金元仍舊本朝改今屬編户三十四里夏邑縣在府城東一百二十里戰國時下邑地秦屬碭郡漢置下邑縣屬梁國後魏置碭郡於此北齊以已吾縣省入下邑隋屬亳州後屬宋州金始改夏邑縣屬永州元初併入睢陽尋復置屬歸徳以穀熟縣省入本朝因之編户一十四里永城縣在府城東一百八十里本春秋芒縣地亦名犬丘西漢為芒犬丘二縣東漢改芒曰臨睢犬丘曰太丘三國魏二縣俱廢晉為譙郡蘄縣地隋始置永城縣屬譙州後廢唐復置屬亳州宋仍舊元屬歸徳本朝因之編户二十四里虞城縣在府城東北六十里本古虞國即禹封商均之地漢置虞縣屬梁國後魏屬沛郡北齊省隋復置屬宋州唐置東虞州尋廢改縣曰虞城五代梁置輝州宋廢以縣屬宋州後屬應天府金廢元復置屬東平路後屬濟寧路本朝改今屬編户一十四里睢州在府城東一百二十里春秋時宋陳地秦置襄邑縣漢屬陳留郡北齊併襄邑入雍應丘隋復置襄邑屬宋州唐屬杞州後仍屬宋州宋屬天府崇寧間建拱州以為東輔大觀中廢拱州後復置金改睢州元因之並以襄邑縣為附郭本朝省入州屬開封府嘉靖二十四年改今屬編户三十九里領縣二考城縣在州城東北九十里本周之戴國春秋時鄭取之改名穀城秦置甾縣漢屬梁國東漢始改考城屬陳留郡晉省後魏置考陽縣北齊又改為城安縣屬濟隂郡隋復為考城縣屬宋州唐置東梁州尋廢以縣屬曹州五代晉漢屬開封府宋屬拱州後仍屬開封金屬曹州又改屬睢州元仍舊本朝因之編户一十一里柘城縣在州城東南九十里古朱襄氏邑春秋時為陳株野地漢置柘縣屬淮陽國以邑有柘溝故名晉廢隋復置改曰柘城縣屬宋州唐省入穀熟寧陵二縣永淳初復置宋屬應天府崇寧中改屬拱州金屬睢州後省元復置本朝因之編户九里郡名睢陽唐名形勝控江淮聯蕭碭府志平衍四達控江淮聯蕭碭袵河脇洛此其地豈不最重哉居天下膏腴地遷史謂梁為天中居天下膏腴地精氣上應列星説者謂商丘之精氣上應列星世