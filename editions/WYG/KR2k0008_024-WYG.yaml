出城西冨弼知青州會河朔大水民流就食弼勸所部出粟益以官廪隨所在貯之得公私廬舎十餘萬區散處其人以便薪水山林陂澤之利聴流民取之死者爲大冢葬之凡活五十餘萬人歐陽脩知青州時諸路散青苖錢爲民害脩乞令民止納本錢及罷提舉官不報陳執中知青州率民錢築諸城有詔止之執中格詔卒城之未㡬沂卒王倫叛執中遣兵捕殺之余靖知青州自㓂凖及靖來守是邦風俗丕變人才軰出張琰知益都縣罷里正弗用而租以時石介獻息民論請以益都為天下法王愽文知宻州負海有䀋塲嵗飢民多盗鬻吏捕之輒抵死愽文請弛鹽禁嵗豐乃復從之趙抃知青州時京東旱蝗青獨多麥蝗将及境遇風退飛盡堕水死蘇軾知宻州時司農行手實法不時施行者以違制論軾謂提舉官曰令出於司農是擅造律也提舉官驚曰姑徐之未㡬朝廷知法害民罷之宻人深以為幸曽孝序靖康初知青州繕脩城池訓練士卒儲峙金穀有數年之備金人不敢犯髙宗召赴行在青民借留許之後兵亂遇害陸有常知臨淄縣臨胊土兵作亂有常率民兵拒守死於陣知益都縣張侃千乗縣丞丁興宗亦死之元劉好禮知莒州事鋤奸起懦盗弭化行嘗嵗旱禱而霖雨三日蝗生亦禱焉蝦䗫羣至食蝗盡去後民思之張徳新樂安縣尹綦㤗繼之並以亷惠得民及歿人以配享蕭信公張俊山東行樞宻院知院本朝兵攻益都悉力拒守城䧟携妻子投井死胡濬益都路總管本朝兵取其城自縊死時山東宣慰副使于徳文僉山東宣慰司事齊郁皆死之本朝趙麟國初莒州知州長於文學亷公有為凡州之儒學公署皆其所建脩者牟魯莒州同知洪武初青州民孫古朴等聚衆為亂襲莒州執魯欲脅其䧏魯叱之曰今民皆安業汝輩何為自取夷戮即悔過自新猶可轉禍為褔不然官軍至汝軰寜有遺種乎我守土臣有死而已所可惜者良民也賊未敢加害擁至城南鄒家莊魯大罵賊遂殺之事聞命厚恤其家王公懋洪武初爲髙苑縣丞時有盗賊數十人入髙苑刼掠民不能禦公懋率民兵捕之賊拒敵砍公懋左耳公懋不爲動擊殺二人餘皆擒之事聞賞綺帛以旌之于子仁洪武中為昌樂縣丞爲政亷能吏胥畏服耆民赴京奏保詔賜金幣陞本縣知縣後坐誣累民復赴京訴理陞知登州府仍賜金幣旌其賢張旟永樂中爲安丘知縣㑹妖賊唐賽兒黨賔鴻等攻掠安丘旟與縣丞馬撝率民兵八百以死拒戰賊敗復集衆攻城㑹備倭都指揮衞青率千騎至旟出城中兵合擊大敗之卒全安丘事聞擢旟山東左叅政撝左叅議衛青爲山東僃倭都指揮永樂中妖賊攻掠安丘青率千騎至城下奮擊敗之賊収餘衆再戰城中人亦鼔譟出擊賊大敗遁去殺賊二千餘人生擒四千餘人山東悉平㨗聞賜勅奨諭陞青山東都指揮使葉元凱正統間知沂水縣存心仁恕勤政愛民卒于官民立祠祀之省志李昻成化間知青州府鋤奸植善境内懾服嵗飢發官廪數十萬石又勸冨民出粟八萬餘石全活甚衆郡人比之冨公生立祠于表海亭省志奚銘成化間知樂安縣興學勸農賞罰明信百廢脩舉民俗大化尋擢監察御史省志趙一貫成化間知日照縣平易近民寛猛適宜蝗旱有禱輙應屢變歉爲豐焉省志周致𢎞治中知臨淄縣以清節自勵事至立辦士民咸服嘗檄署益都而邑民爭之尋卒百姓哀慕遂立祠祀之省志馬繼祖𢎞治間知博興學寛厚仁愛蒞事明敏嵗飢悉力賑給民頼全活百姓歌之省志人物周把梁名殖與華周俱齊人仕爲大夫莊公伐莒為車五乗之賔而梁周不與焉歸而不食其母曰汝生而有義死而有名則五乗之賔盡汝下也趨食乃行至莒二人出鬬獲甲首三百莊公曰子止與子同齊國梁曰君不使梁與五乗是少吾勇也臨敵止我以利是汙吾行也深入多殺臣之事也齊國之利非吾所知也遂進闘而死其妻間而哭之城爲之崩成覸齊人謂景公曰彼丈夫也我丈夫也吾何畏彼哉公冶長齊人孔子弟子子謂其雖在縲絏之中非其罪以其子妻之後世追封髙宻侯后處齊人孔子弟子言行不乖後世追封營丘伯歩叔乗齊人孔子弟子力扶聖道後世追封愽昌侯以上三人俱從祀孔子廟庭黔婁子齊隱士守道不屈威王師之孫武齊人以兵法見呉王闔廬用爲将西破强楚北威齊魯顯名諸侯所著兵書十三篇行於世騶衍齊人著書十餘萬言其歸必止乎仁義名重於齊適梁惠王郊迎執賔主之禮如燕昭王擁篲先驅請爲弟子周遊諸侯其見尊禮如此又有騶忌騶奭號三騶子王蠋齊晝邑人屢諫湣王不聴退而耕于野燕初破齊聞蠋賢将封以萬家蠋固謝曰忠臣不事二君遂經死齊士大夫聞之曰王蠋布衣也義不北靣於燕况在位食䘵者乎乃求湣王子法章立之是爲襄王田單臨淄人初為臨淄市掾燕伐齊盡䧏齊城惟莒即墨不下即墨人謂其智立為将軍拒燕單用火牛大敗燕師盡復齊七十餘城迎立襄王於莒王封單為安平君顔蠋齊人戰國時隠居不仕嘗言有處窮方其藥有四味一曰無事以當貴二曰早寢以當冨三曰安歩以當車四曰晚食以當肉東坡云若此可謂巧於處窮矣子竒齊人年十八爲阿邑宰開倉廪以賑貧乏邑内大化田文齊人父嬰號靖郭君齊威王公子也相齊二十餘年文亦相齊封萬户於薛招致天下賢士食客嘗數千人聲聞諸侯號孟嘗君魯仲連齊人嘗遊趙秦圍趙急魏遣新垣衍說趙請帝秦仲連見衍極論帝秦之害秦軍聞之遂解於是平原君以千金爲壽仲連却之而去後田單問䇿於仲連遂下􅂓城齊王欲爵之仲連不受逃於海上曰與其冨貴而詘於人寜貧賤而輕世肆志焉漢田横故齊王榮弟項羽破齊復擊漢横乃以散兵復収齊城邑立榮子廣為王而相之及廣死横自立為王漢髙帝既立横與其徒五百餘人入居海島髙帝召之乃乗傳詣洛陽未至自剄其徒五百人聞横死亦皆自殺婁敬齊人以衣褐見髙帝說帝都關中賜姓劉拜郎中號奉春君匈奴入㓂帝欲擊敬言不可帝不聴後果被圍七日始得解帝謂敬曰吾不用公言以困平城乃封敬為關内侯號建信君淳于意臨淄人文帝時為太倉長喜醫師事同郡元里公乗陽慶得扁鵲術定可治决死生及藥論甚精治病多驗文帝問其所驗㡬何意歴舉以對帝嘉之鄒陽齊人景公時仕吴以文辯著名吴王隂有邪謀陽上書諫不納去而之梁從孝王游被譛下吏從獄中上書王立出之卒爲上客轅固齊人治詩景帝時爲博士以亷直拜清河王太傅疾免武帝立復以賢良徵諸儒多嫉毁曰固老罷歸之時年已九十餘公孫𢎞亦徵昃目事固固曰公孫子務正學以言毋曲學以阿世諸齊以詩顯皆固之弟子也胡母生齊人治公羊春秋景帝朝爲愽士與董仲舒同業仲舒著書稱其徳年老歸教於齊齊之言春秋者宗事之公孫𢎞菑川人家貧牧豕海上年四十餘乃學春秋雜說武帝初舉賢良對䇿第一拜博士待詔金馬門元朔中為丞相封平津侯開東閣以延賢人與叅謀議身食一肉脱粟飯俸䘵皆以給賔客家無餘資主父偃臨淄人初學縦横術晚乃學易春秋百家之言武帝朝上書闕下朝奏暮召時徐樂嚴安亦上書言世務上曰公等安在何相見之晚拜偃為郎中一嵗四遷後拜齊相徧召昆弟賔客散五百金予之嚴安臨淄人武帝朝以故丞相史上書言周失之弱秦失之强拜郎中後為騎馬令倪寛千乗人治尚書家貧賃作帶經而鋤武帝時以射䇿為掌故遷左内史吏民大信愛之通世務眀習文法以經術縁飾吏事後爲御史大夫歐陽生千乗人事伏生受尚書傳至曽孫髙為愽士髙孫地餘亦為愽士論石渠官至少府由是尚書世有歐陽氏學梁丘賀諸城人初以能心計為武騎從京房受易宣帝求房門人得賀入説易善之以為郎賀小心周宻甚見信重官至少府圗形麒麟閣子臨亦以説易爲黄門郎嘗奉使問諸儒於石渠樓護齊人父為丗醫護舉方正為諫大夫使郡國上書求上先人冢過齊會宗族故人各以親踈與束帛一日散百金之費使還奏事稱意擢天水太守有故人吕公無子護飬之終身周堪齊人元帝時擢光䘵勲與蕭望之並領尚書事以師傅見尊重數宴見言治亂事為石顯所譛皆免官望之自殺上愍堪仍擢光䘵勲師丹琅琊東武人治詩舉孝亷為郎累遷大司空哀帝封拜丁傅追帝共王丹皆切諫浸不合遂䇿免平帝即位以丹執忠節㩀聖法可爲社稷之臣封義陽侯卒謚節侯薛方齊人嘗爲郡掾祭酒徴不至王莾以安車迎方方辭謝曰堯舜在上下有巢由今明主方隆唐虞之徳小臣欲守箕山之節也使者以聞莽說其言不强致方居家以經教授喜属文著詩賦數十篇光武即位徴之方道病卒伏湛東武人伏生九世孫父理當世名儒湛少傳父業教授數百人更始時為平原太守時天下兵起一郡頼湛以全光武徵拜大司徒封陽都侯又奏行鄉飲酒禮自伏生以後世傳經學清静無競故東州號為伏不闘伏隆湛子以節操立名光武時張歩㨿齊地隆為太中大夫移檄告以順逆青徐羣盗皆䧏歩遣使隨隆詣闕光武拜隆光䘵大夫遣使於歩歩欲自王留隆共守二州隆不從為歩所殺歩平收隆䘮賜棺歛作塜琅琊伏恭湛兄子初湛弟黯以明齊詩改定章句作解說九篇恭少傳黯學光武時除劇令遷常山太守敦修學校教授不倦眀帝臨雍拜恭為司空儒者榮之肅宗行饗禮以恭為三老歐陽歙樂安千乗人自歐陽生傳伏生尚書至歙八世皆為愽士光武時拜汝南太守推用賢俊政稱異迹在郡教授數百人徴為河南尹終大司徒吴良臨淄人初為郡吏不事欺謟東平王蒼辟為西曹又薦其公方亷恪躬儉安貧白首一節明帝以為議郎遷司徒長史每處大議輙㨿經典不希㫖以狥俗牟融安邱人少愽學以尚書教授門徒數百人舉茂才為豐令永平中入為司𨽻多所舉正百僚憚之後爲司空甚得大臣節肅宗朝為大尉叅録尚書事承宫姑幕人少牧豕過徐子盛學舎棄而聴講勤學不倦後為大儒永平中徴拜中郎将數納忠諫朝臣憚其節名播匈奴單于使來嘗求見之官至侍中祭酒周澤安丘人少習公羊嚴氏春秋中元初遷渑池令吏人愛之後拜太常果敢直言顯宗嘗以北地太守廖信贓物班諸亷吏惟澤等數人特䝉賜焉是時在位者咸自勉勵郎顗安邱人父宗善風角星筭能望氣占候安帝朝徵拜吴令顗少傳父業兼眀經典勤心銳思朝夕無倦順帝時災異數見顗拜章言其故復陳便宜七事召拜郎中辭病不就童恢姑幕人父仲玉遭時凶荒傾家賑恤九族鄉里頼全者以百數恢少爲郡吏執法亷平後除不其令有呪虎之異遷丹陽太守滕撫劇人有文武才順帝末揚徐盗起拜撫為九江尉討平之陞左馮翊所得賞賜盡分麾下性方直不交權勢宦官懷忿及論功當封太尉胡廣時録尚書事承㫖黜撫天下怨之周璆樂安人髙潔之士前後郡守招命莫肯至惟太守陳蕃能至焉字而不名特為設一榻去則懸之江革臨淄人少失父獨與母居遭亂負母逃亂備經險阻數遇賊輙求哀言有老母辭氣愿欵有足感動人者賊以是不忍犯之卒與母歸鄉人稱之曰江巨孝母終廬墓不除服後舉孝亷遷諫議大夫王脩城陽營陵人事母至孝母以社日亡來年隣里聚社脩念母哀甚隣里爲之罷社孔融召脩為主簿守髙宻令復以膠東多盜移令膠東融有急難頼脩以免曹操徙脩爲奉常任旐樂安愽昌人黃巾賊到愽昌聞旐姓名曰夙聞任子旟天下賢士那可入其鄉邴原朱虛人少與管寧俱以操尚稱州府辟命皆不就後避亂居遼東一年往歸原居者數百家游學之士教授之聲不絶後曹操辟爲司空掾歴遷五官将長史閉門自守非公事不出管寜朱虛人美鬚眉與邴原相友漢末同避亂至遼東依公孫度度安其賢民化其德後浮海還郡魏初累徴不起吟詠詩書不改其樂眀帝特具安車束帛加璧聘之會寜卒年八十四董永千乗人少失母獨飬父流寓孝感父亡無以葬乃從人貸錢一萬曰後無錢還當以身作奴葬畢忽道遇一婦人求爲永妻永與俱詣錢主令織縑三百匹以償一月而華辭永去乃曰我天之織女縁君至孝天帝令我助君償債言訖凌空而去三國徐奕東莞人仕魏初為掾屬從征馬超留為丞相長史鎮撫西京稱其威信曹操嘗謂奕曰君之忠亮古人不過也魏國既建復典選舉後為中尉國淵樂安人初仕魏為司空掾属每公朝議論常直言正色後遷魏郡太守太僕卿雖居列卿位布衣蔬食禄賜散之故舊宗族以㳟儉自守周宣樂安人初為郡吏魏文帝以為中郎屬太史其占夢十中八九世以比建平之相徐盛琅琊莒人初為孫權司馬守柴桑大破黃袓兵復討臨成南阿山賊有功及權稱藩魏使邢貞拜權為吴王盛忿憤曰盛等不能奮身為國家并許洛而令吾君與貞盟不亦辱乎後領廬江太守王裒脩孫父儀為将軍司馬昭之司馬東關之敗昭以非罪斬儀裒痛父非命隱居教授累辟不就廬墓側旦夕攀栢悲號涕淚着樹樹為之枯讀書至哀哀父母生我劬勞輙三復流涕門人為廢蓼莪之篇晉左思臨淄人口訥而辭藻壯麗造齊都賦一年乃成復欲賦三都搆思十年門庭藩溷皆着筆札遇得一句即便䟽之自以所見不愽求為袐書郎及賦成皇甫謐為序張華見而嘆曰班張之流也時競傳冩洛陽為之紙貴王尼城陽人東嬴公騰辟為車騎府舎人不就時尚書何綏奢侈過度尼謂人曰綏居亂丗矜豪乃爾将死不久未㡬果為東海王越所殺尼初入洛見越不拜越問其故尼曰公無宰相之能是以不拜徐邈姑幕人下帷讀書不游城邑東晉初徙居京口謝安舉為中書舎人撰正五經音訓學者宗之遷㪚騎常侍處西省前後十年多有匡益遷中書侍郎專掌綸綍仕終驍騎将軍徐廣東莞人世好學至廣尤精百家無不研覽嘗撰車服儀注及晉紀四十一卷荅禮問百餘條仕晉至驍騎将軍王猛劇人少好學氣度雄逺隠於華山晉桓温入關猛被褐往謁捫虱而談當世之事後秦苻堅招之一見如平生若𤣥德之遇孔明累遷尚書左僕射任兼将相宰政公平秦國富强及卒堅哭之曰天何奪吾景略之速也子休仕為河東太守王鎮惡猛之孫從叔父矅歸晉客荆州頗讀諸子兵書嘗為臨澧令劉裕召與語異焉因謂諸佐曰鎮惡王猛孫所謂将門有将以功封愽陸縣子以龍驤将軍率水軍伐秦遂㧞長安後爲沈田子所害南北朝臧燾東莞莒人少好學善三禮貧約自立晉太元中始立國學謝𤣥舉燾為助教宋武時以后兄拜太常雖外戚貴顯而彌自冲約弟熹熹子質有氣幹好言兵累官至雍州刺史監四州諸軍事王憲劇人猛之後仕後魏為廷尉卿出為上谷太守清身率人風化大行後以年老特賜錦綉布帛珍羞禮膳卒年八十九謚曰康王昕憲曽孫少篤學仕後魏累官常侍武帝或時袒露與侍臣戯狎見昕即正冠歛容昕母崔氏學識有風訓生九子皆風流醖籍世號王氏九龍王晞昕之弟㓜孝謹有器度好學不倦北齊徵署王府功曹吏晞願養母竟不受署昭帝欲以為侍中苦辭不受謂人曰非不愛作熱官但思之爛熟耳賈思伯益都人與弟思同俱好經史思伯仕後魏累官至衛尉卿謙恭下士人曰公今貴重寜能不驕思伯曰衰至便驕何常之有世以為雅言思同官至侍中孫搴樂安人少勵志勤學仕北齊為國子助教神武署爲相府主簿專典文筆當煩劇之任大見賞重及卒神武親臨之曰折我右臂任昉愽昌人父遥齊中散大夫昉八嵗能屬文初仕齊為太學愽士王儉沈約皆推讓其文梁武帝時歴黃門侍郎出為義興新都太守所著文章數十萬言孫謙東莞人仕梁累官零陵太守以老徴為光䘵大夫謙歴二縣五郡所在亷㓗居身儉素牀施蘧蒢屏風冬則布被莞席每朝見猶請劇職自效武帝笑曰朕當使卿智不當使卿力卒年九十二從子亷歴晉陵呉興太守劉勰東莞人撰文心雕龍五十篇論古今文體欲取定於沈約無由自達乃負書候約於車前狀若貨鬻者約取讀大重之謂深得文理劉穆之莒人徙居京口從宋武帝平建鄴諸大處分倉卒立定累加尚書左僕射帝北伐留守建業内緫朝政外供軍旅决斷如流事無壅滯後以佐命元勲追封南康郡公謚文宣孫􅱫仕至御史中丞唐叚志𤣥臨淄人姿質偉岸以驍果從太宗破竇建徳平東都累官右驍衛将軍嘗奉命勒兵衛章武門太守夜遣使至志𤣥拒曰軍門不夜開使者示以手詔曰夜不能辨不納太宗嘆曰真将軍封褒國公卒謚壯肅房𤣥齡臨淄人父彦謙仕隋為監察御史直道守常介然孤立終涇陽令𤣥齡㓜警敏貫綜墳籍善屬文書兼草𨽻太宗狥渭北杖䇿上謁一見如舊為府記室從征伐獨收人物置幙府累官尚書左僕射居相位十五年任公竭節世稱其賢卒贈太尉謚文昭叚文昌志𤣥三世孫任義節不為齷齪小行累官翰林學士中書侍郎出帥西蜀羣蠻震服入拜御史大夫徙帥荆南民有旱不苦雨不愁之語子成式愽學强記著酉陽雜爼王敬武青州人中和中盗發齊隶間遣敬武擊定因授平盧軍節度使後檢校太尉同中書門下平章事孫既樂安人母喪廬墓髪氊靣垢尫瘵骨立俄有醴泉涌於墓側里人名之曰孝源泉唐貞元中碑刻今尚存五代趙犨青州人㓜與羣兒戱部分行伍指顧如大将及壯善弓劒勇果重氣義拒黄巢有功仕梁爲忠武軍節度使犨卒弟翊代立有徳政及卒陳州人為之罷市孫晟宻州人好學有文辭仕南唐為右僕射周世宗征淮南遣晟使周見留晟謂其副王崇質曰吾行必不免然吾忠不忍負永陵一抔土世宗待晟甚厚召問江南事終不對世宗怒収下獄晟臨死神色怡然南望拜曰臣惟以死報國乃就刑唐王聞之贈魯國公宋李成益都人性曠蕩嗜酒喜吟詩善琴奕畫山水尤工得意處疑非筆墨所成人欲求者先為置酒酒酣落筆煙景萬狀世傳以為寶張宏益都人髙祖茂唐易定節度使曽袓𤣥易州刺史袓持蒲城令父峭業春秋一舉不第退居邱園宏太宗朝進士累官樞宻副使卒贈右僕射宏脩謹守位不求赫赫之譽歴踐通顯末嘗敗事徐興青州人以拳勇𨽻兵籍嘗從太袓征晉陽立功後從潘羙趣團栢谷奮與賊闘有果敢氣生擒偽将身被重創無所回撓累官左監門衛大将軍許仲宣青州人登進士第性倜儻有心計太袓征江南仲宣知隨軍轉運事兵數十萬供饋無闕後為廣南轉運使㑹征交州地炎瘴士卒多死仲宣因奏罷其兵草檄書以諭交州交州即送欵内附太宗嘉之後遷給事中王子輿莒人少業文詞太宗朝進士累官殿中侍御史真宗時爲淮南轉運使子輿精於吏事久掌茶鹽漕運周知利害裁量經制公私便之後拜諫議大夫户部使傅霖青州人少與張詠同學霖隠不仕詠既顯求霖者三十年不可得及詠知陳州乃來謁閽吏白傅霖請見詠責之曰傅先生天下賢士吾尚不得為友汝何人敢名之詠問霖昔何隠今何出霖曰子将去來報子爾翌日别去後一月詠卒賈同臨淄人篤學好古有時名舉進士王欽若方貴盛欲致之不往天聖初上書言丁謂造符瑞欺先帝今冝眀告天下以正其謬又言冦凖忠亮不宜貶黜累官殿中丞卒門人謚曰存道先生李之才青社人性朴直為古文章語直意邃師穆脩受易脩之易受之种放放受之陳摶其圖書象數變通之妙秦漢以來鮮有知者之才嘗權共城令邵雍傳其學官至殿中丞王曽益都人自少頴悟善為文辭咸平中郷貢禮部廷對皆第一累官右僕射平章事集賢大學士封沂國公卒謚文正曽資質端厚在朝進止皆有常處當國時正色危言進退士人莫有知者嘗曰夫執政者恩欲歸己怨使誰歸范仲淹服其言王皥曽之弟舉進士累官集賢院學士以兵部侍郎致仕卒嘗論次典禮因革為禮閣新編又集五代事為唐餘録六十卷趙師民臨淄人九嵗能屬文舉進士第學問精愽志尚清逺歴官崇政殿說書遷宗正丞上書陳十五事三遷刑部郎中有集三十卷燕肅青州人舉進士累官龍圗閣直學士歴知數州皆有善政知審刑院寃獄盡釋肅性巧嘗造指南記里鼓二車及欹器蓮花漏人服其精子度第進士累官諫議大夫知潭州孫瑛官至户部尚書楊安國安邱人父光輔居馬耆山教授學者官國子監丞安國以五經及第仁宗時為崇政殿説書行義淳實在經筵二十七年累遷翰林侍講學士卒贈禮部侍郎明鎬安邱人中進士第仁宗朝歴京東益州陜西河東轉運使入知開封府副文彦愽討平王則於貝州拜叅知政事卒謚文烈鎬端挺寡言所至安静有體而遇事不茍為世所推重朱壽隆諸城人累官鹽鐵判官京東轉運使甚有政績終少府監知楊州壽隆為人和厚接語怡怡必當於理而不屈於權貴周沆益都人舉進士歴官湖南轉運使以計撫䧏蠻族徙河東陜西河北皆有政績累遷龍圗閣直學士知成徳軍俗方棄親事佛沆閱按斥數千人還其家以户部侍郎致仕韓晉卿宻州安丘人為童子時日誦書數千言嘗以明經中第歴州縣政循良奏課第一元祐中為大理卿持平考核無所上下士大夫間推其忠厚不以法家名之任顓夀光人舉進士擢鹽鐵判官累遷龍圗閣直學士以太子賔客致仕顓剛毅不回臨政累有顯績仁宗嘗賜壐書旌之蘇丕青州人袓徳祥建隆四年狀元丕有髙行少時一試禮部不中拂衣去居渳水之濵五十年不踐城市歐陽脩言於朝賜號冲退處士張所青州人豋進士第歴官監察御史髙宗即位遣所按視陵寢還上䟽論還京五利又條上兩河利害及言黄潜善奸邪謫江州安置後李綱薦為河北招撫使所方招來豪傑而李綱罷相遂落職嶺南安置王輝青州人靖康初應募立竒功官至巡檢使寓吉州茶㓂犯邑郡檄輝使行至勝郷地險輝勇於進為賊所得以刄加頸欲全之輝含血大罵遂死事聞贈忠州刺史立廟羅陂仇悆益都人舉進士歴鄧城武陟令調髙宻丞皆有偉績㓂起相戒毋犯髙宻境南渡後知廬州劉麟入㓂統制張𤦺欲驅民南走先脅悆出悆曰吾當以死狥國堅不為動時令諸郡棄城退保悆力陳不可卒全活數州之衆後知平江府封益都縣伯李宥成孫父覺舉九經起家歴官國子愽士直史舘宥善屬文不雜交游舉進士歴官諫議大夫知江寧府有善政後判留司御史臺性清介好奨㧞士人賙恤貧者既死家無餘財官賜錢百萬陳規安丘人中眀法科為人端毅寡言以忠義自許建炎初知徳安府累破羣賊嘗砲傷其足神色不變改知順昌府與劉琦合謀大敗烏珠兵移知廬州宻佑宻州人徙廬州為人剛毅質直累官江西路副緫管咸淳中為江西都統元巴延兵東下至隆興祐率衆逆戰大兵圍數重佑告其部曰今日死日也若力戰或有生理兵敗被執竟不屈而死金劉珫益都人世宗時為護衛長累遷太子詹事宣徽使求補外除定海軍節度使榮寵終身弟璣舉進士累官國子祭酒太常少卿嘗同知漕運言省費事又嘗為户部員外郎條上便宜數事世宗嘉納之鄒谷諸城人大定中進士累官刑部主事大理寺丞爭論情法折正疑難後歴定海㤗寜軍節度使張暐日照人正隆中進士博學該通累官太常少卿禮部侍郎歴二十餘年最明禮學家法為仕人儀表諸子講論至夜分乃罷率以為常張行簡暐子淹貫經史大定中進士第一累官禮部尚書翰林學士終太子太傅謚文正為人端慤慎宻所著文章及禮例纂共百餘卷金儒臣世為禮官習學禮者稱張氏父子云張行信行簡弟大定中進士累官諫議大夫為人純正真率雖兩登相位殆若無官而遇事輙發無所畏避嘗言胡沙虎必反抗權臣髙琪為士論所稱及卒之日雖平昔甚娟忌者亦曰正人亡矣元李庭壽光人以材武選至元中從大将攻宋襄樊取臨安每䧟陣先登以功累遷中書左丞後東征日本遇風壞船庭抱船板漂流抵髙麗得還再遷平章政事卒追封益國公謚武毅子大用歸徳府同知以哀毀卒大椿襲益都萬户張禧益都人年十六從大将南征又從世袓濟江與宋兵戰屢㨗後從下襄樊取閩浙皆有功累官都元帥後與范文虎李庭同征日本遇􅄓風文虎庭戰艦悉壊禧預有區處所部獨完張𢎞綱禧子從父攻城狥地屢有功累官至萬户後從右丞劉傑征八百媳婦國戰没追封齊國公謚武宣子漢官至集賢直學士鼎襲江隂水軍萬户于欽益都人博學多聞初授國子助敎陞兵部侍郎奉命山東周覧原隰詢諸鄉老水經地記歴代沿革著書六卷名曰齊乗張士謙樂安人累官南臺監察御史出知婺源州事敵兵至踰五十餘日城䧟被執先戮其妻仍加刃於頸以脅之䧏士謙曰吾為國死忠豈畏死耶可急殺我至死色不為變罵語不絶事聞追封清河郡伯王英益都人性剛果有大節膂力過人善騎射以平㓂功拜懷逺大将軍至正間毛貴䧟益都英曰吾老不能報天子尚忍食異姓之粟以求生乎遂饑而死本朝臧哲諸城人洪武中以儒士舉為兵馬指揮發奸擿伏不避權豪朝廷嘉之賜白金鞍馬後為廣西布政使以亷介稱丁憂家居勑賜米錢旌之馬愉臨朐人宣徳丁未進士第一授翰林院脩譔累遷侍講學士預聞機務侍經筵性資淳篤論事務存寛厚嘗奏讞疑獄經年不决者遷禮部右侍郎兼侍講學士卒贈翰林院學士禮部尚書張時蒙隂人好學愽文洪武中由鄉舉歴教官擢給事中官至山西布政司左叅政孫浩諸城人洪武中由太學生授廣東布政司左叅政再陞本司左布政使政績著聞劉甄壽光人剛果有為永樂中鄉貢選𨽻翰林用知者薦為四川道監察御史陞山西按察司副使卒劉昺甄弟通經史徴召不起以六子皆貴贈翰林學士邦人比之竇燕山曹凱益都人正統間進士授給事中彈劾不避權勢聞英廟北狩捽言官於闕門執嬖倖壞事者格殺之劉珝夀光人正綂中進士累官太子太保户部尚書謹身殿大學士資性剛直文學純正其在講筵甚久當時講官稱第一受知憲廟簡入内閣呼為東劉先生而不名居家孝父母歿各廬墓三年所居號曰仁孝里嘉靖初事聞欽撰祝文曰忠裨于國孝表于鄉為一代名臣云省志列女顔文姜齊人適李氏事姑至孝常踰歴山險汲新泉以供姑嗜忽感泉湧於室遂流成河故人名其里曰顔神河曰孝婦立廟祀之宿瘤女齊東郭人閔王出遊百姓盡觀惟宿瘤女採桑如故王怪問之對曰受教父母採桑不受教觀王王曰此竒女也聘以為妃朞月之間諸侯來朝女死燕乃圗齊緹縈女漢太倉令淳于意之少女意有罪當刑怒罵其五女曰生女不生男緩急無可使者於是緹縈隨父至長安上書言妾父為吏齊中稱其亷平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過其道無繇願沒身為官婢以贖父刑文帝憐之為免意罪因除肉刑李氏家青齊間夫王疑五代時為虢州司户叅軍卒于官李氏携其㓜子負骸骨以歸東過開封旅舎主人不許其宿牽其臂出之李氏慟曰吾為婦人而此手為人執耶即引斧斷其臂事聞官為賜藥封瘡厚恤之而笞其主人寗氏安丘縣人許嫁同里劉真兒未婚真兒死寗氏年方十六聞訃甚哀謂父母曰烈女不更二夫請往事舅姑至真兒家為服衰麻無違禮晝夜勤女紅以飬舅姑及歿賣衿珥以葬節行完羙洪武末事聞詔旌表其門為貞節鄒氏莒州人王政妻政亡無子飬侄惟一爲嗣亦卒婦邊氏事鄒守節終身洪武十七年事聞詔兩旌之省志趙氏䝉隂人宋文羙妻孀居矢志自守終身無玷正統間旌表貞節省志張氏䝉隂人毛信妻信亡張寡守節終其身成化七年有司上其事詔旌表之省志潘氏沂水人王經妻正德六年為賊死節事間受旌省志曹氏女名明達益都人性至孝父母歿終身不嫁省志仙釋馬眀生臨淄人姓和字君實少為賊傷殆死忽遇一女子乃太真夫人也與藥一丸服訖即愈乃自號馬眀生隨夫人入岱山石室試以鬼恠狼虎不懼挑以羙女不動夫人曰可教有安期生至夫人以眀生付之以詩留别而去後得安期生丹經神方入華隂山脩煉漢靈帝時太傅胡廣訪以國事俱驗遂餌金丹白日昇天賀元琅琊人得道不死宋真宗東封謁於道左曰晉水部員外郎賀元再拜而去蘇軾詩舊聞父老晉郎官已作飛騰變化㸔聞道東蒙有居䖏願供菽水㸔燒丹劉野夫青州人居東都嘗約龔德莊曰君家人夕必出我往見君至晚德莊坐待不至俄火自門起徳莊犯烈㷔而出四傍皆燼翌日野夫來曰君家人幸出可賀也陳瑩中深重之宋政和間寓興國寺人計其壽一百四十五嵗善道臨淄人入大藏信手探卷得觀無量夀佛經及往廬山觀逺公遺躅豁然増思後遁迹終南復往晉陽從綽禪師授經入定七日毅綽曰師當懴悔三罪綽乃洗心悔謝道行化京師忽曰吾明歸去至期怡然念佛而逝張三丰永樂間隠于青州雲門山之陽修煉洞中太宗賜號三丰莫知所終今青州山有張仙洞省志眀一綂志卷二十四
