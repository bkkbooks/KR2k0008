body:
  text: 明一統志卷二十四明李賢等撰東昌府東至濟南府長清縣界一百里西至直𨽻廣平府廣平縣界一百五十里南至兖州府陽穀縣界二十五里北至直𨽻河間府景州故城縣界二百五十里自府治至京師九百四十里至南京一千五百四十五里糧三十一萬八千五百石零建置沿革禹貢兖州之域天文危室分野春秋時齊西鄙聊攝地戰國爲魏齊趙三國之境秦漢爲東郡地曹魏𨽻平原郡晉因之劉宋嘗置魏郡後魏置南冀州及平原郡治聊城未㡬州廢隋初郡廢後置博州大業初州廢唐初復置天寶初改爲博平郡乾元初復爲博州五代晉徙治􅳖陵宋属河北東路淳化間移今治金属大名府路元初𨽻東平路至元初析爲博州路尋改爲東昌路本朝改爲東昌府領州三縣十五聊城縣附郭本春秋時聊攝地秦置􅂓城縣属東郡漢因之魏晉俱属平原郡北齊改属濟州隋初属平原郡尋於此置博州後州省以縣属武陽郡唐爲博州治五代周省武水縣入馬宋金元仍舊本朝因之編户二十四里堂邑縣在府城西四十里本漢發干清縣地属東郡隋始於此置堂邑縣属毛州取縣西北堂邑故城爲名大業初改属武陽郡唐初属毛州貞觀初属博州五代晉改為河清縣尋復舊宋因之熙寜初徙治於東十里即今治金元仍舊本朝因之編户一十七里博平縣在府城東四十五里本齊博陵邑漢為博平縣属東郡晉属平原國隋初属毛州改属博州大業初属清河郡唐属博州貞觀中省入聊城天授初復置宋景祐間徙治東南三十里寛河鎮即今治金元仍舊本朝因之編户一十八里茌平縣在府城東北七十里本秦舊縣属東郡漢因之東漢属濟北國三國魏属平原郡晉末移治􅂓城縣界興利鎮後齊廢入􅂓城唐武德間復置貞觀初省金時劉豫復置元仍舊本朝因之編户三十六里莘縣在府城西南九十里本春秋魏地漢為東郡陽平縣地晉属陽平郡北齊改樂平縣後周於此置武陽郡隋初郡罷復為陽平縣尋改清邑縣又置莘州大業初罷州改莘縣属武陽郡因縣北古莘亭為名唐武徳間復置莘州貞觀初州廢復以縣属魏州宋金属大名府元属東昌本朝因之編户一十八里清平縣在府城北九十里本漢清陽縣地属清河郡隋初徙貝邱縣治此属貝州後改為清平縣属清河郡大業中廢唐武徳間復置属􅀶州五代時属大名府宋徙治􅀶平縣明靈寨金属大名府里元属徳州本朝改今属編户一十二冠縣在府城西南一百五十里本春秋晉冠氏邑漢為魏郡館陶縣地魏晉皆属陽平郡隋析置冠氏縣属魏州大業初属武陽郡唐初属毛州後属魏州五代宋金並属大名府元初属東平路後陞為冠州本朝降為縣改今属編户二十七里臨清州在府城西北一百二十里本漢清淵縣地属魏郡後魏大和間於縣西四十里置臨清縣属魏州北齊廢隋初復置属貝州大業初属清河郡唐属貝州大厯中属瀛州又析置永濟縣宋初以永濟省入臨清後廢為鎮尋復置属大名府金属恩州元属濮州本朝洪武二年徙治縣北八里臨清閘改今属景泰初又於縣東北三里築城徙治焉宏治二年陞為州編户四十一里領縣二舘陶縣在州城西一百三十里本春秋晉冠氏邑地漢置舘陶縣属魏郡三國魏属陽平郡晉石趙徙陽平郡治此後周置毛州隋廢毛州以縣属武陽郡唐属魏州宋金属大名府元属濮州本朝初𨽻東昌府宏治二年割属臨清州編户二十三里今增為三十里丘縣在州城西二百里本舘陶之别鄉漢析置邱縣属魏郡三國魏省尋復置晉属廣平郡北齊移治斥漳城隋又徙治平恩州為平恩縣属武安郡唐属洺州宋因之金廢為鎮𨽻曲周縣元初省入唐邑後復置属東昌本朝初因之宏治二年割属臨清州編户二十五里今增二十七里髙唐州在府城東北一百二十里本春秋齊之髙唐邑漢始置縣属平原郡後魏置南清河郡北齊罷郡隋初以縣属貝州後属清河郡唐改為崇武縣後復為髙唐縣属􅀶州五代梁改魚邱縣後唐復舊晉改齊城縣漢復爲髙唐縣宋金仍属􅀶州元初属東平至元中改爲州本朝省縣入州編户四十里領縣三恩縣在州北七十里本春秋齊貝邱秦爲鉅鹿郡地漢置清河郡後魏移置清河郡及縣於漢歴城北齊移治漢武城縣後周置貝州郡如故隋罷郡以清河縣属貝州五代晉陞爲永清軍宋改為恩州金属大名府元直𨽻省部本朝改為縣属髙唐州徙今治編户三十七里夏津縣在州西五十里本漢鄃縣属清河郡晉因之北齊省入平原縣隋復置属貝州唐改爲夏津縣宋属魏州金属大名府元属髙唐州本朝因之編户三十一里武城縣在州西北一百二十里本趙平原君封邑地漢置東武城縣属清河郡晉去東字隋改爲清河縣以舊東武城爲武城縣唐移治永濟渠西属貝州宋属恩州移今治金仍舊元属髙唐州本朝因之編户二十一里濮州在府城西南二百里古顓頊之墟曰帝邱夏為昆吾氏所居春秋衞成公遷都此地漢置鄄城縣属濟隂郡東漢末於此置兖州晉析置濮陽郡隋置濮州尋廢唐復置天寳初改為濮陽郡乾元初復為濮州治鄄城宋仍舊金属大名府路元直隸省部本朝省鄄城縣入州属東昌府景泰二年以河患徙治王村編户三十六里領縣三范縣在州東北六十里本春秋晉大夫士會之邑漢置范縣属東郡晉属東平國北齊廢隋復置属濟北郡唐初於縣置范州尋廢以縣属濟州貞觀中改属濮州宋金元仍舊本朝因之編户一十二里觀城縣在州西北七十五里本古之觀國漢爲畔觀縣属東郡東漢更名衛國縣晉属頓邱郡隋改觀城縣属武陽郡唐属澶州貞觀中省大歴中復置宋省入濮陽尋復置属開徳府金属開州元属濮州本朝因之編户一十里朝城縣在州北九十里本春秋衞國東鄙地漢為東武陽縣属東郡東漢改為郡尋復爲武陽縣魏晉俱属陽平郡北齊廢後周復置属魏郡隋属莘州後属魏州唐改爲武聖縣又改爲朝城以縣東古朝城為名元和中属澶州後属魏州五代晉属大名府宋属開德府金属大名里府元属濮州本朝因之編户二十六郡名博平唐名形勝南接濟兖北連徳景郡志漕河所經實要衝之地同上宋魏齊魯之衝濮州地理志地平土沃元志地平土沃無名山大川之限風俗質直懷義有古風烈隋志士風彬彬賢良宏博博平舊志其民朴厚好稼穡務蚕織元濮州志俗近敦厚家知禮遜元志習俗節儉人多讀書同上山川茌山在府城東五十三里漢茌平縣治此山之平地曰茌故以名縣歴山在濮州東南七十里相傳虞舜耕田之所舊有舜祠今惟髙阜東有再熟成都二鄉取一種再熟三年成都之義陶山在舘陶縣南舘陶鎮西北七里微有土阜禹貢導沇水東流為濟入於河溢爲滎東出於陶丘北即此山也西山在恩縣西四十里舊恩縣遺址在焉弇山在莘縣北四十五里舊有泉湧出底冇碎石號曰弇山泉上有顯仁廟宋趙㠓治莘禱旱而雨請於朝賜額左傳齊閭丘嬰出奔於弇中即此會通河在府城東南自兖州府陽榖縣入境北至臨清縣入衛河本朝永樂九年䟽鑿以通漕運衛河在舘陶縣西二里漢名屯氏河隋䟽爲永濟渠亦曰御河源自河南衛輝府輝縣東北流至臨清與會通河合流入海黃河在濮州東南六十里本朝永樂九年䟽通東北流入會通河正統十三年决於張秋鎮沙灣徑流入海景㤗七年始塞復故道漯河在髙唐州西二里溢涸無常水經云漯水出於髙唐即此鳴犢河在髙唐州南三十五里漢河决靈鳴犢口即此津期河在恩縣南二十里溢涸無常不通舟楫或曰即舊永濟渠也黒龍潭在范縣南一十五里相傳潭有龍能興雲雨宋熙寜間禱雨有應封其神爲妙應立廟于潭之北収鶴池在觀城縣境去縣五十六里相傳衛靈公養鶴之所玉環井在府治西南一名玉井相傳井中有白石如玉鑿其中混然爲井甃琉璃井在臨清州西南下甃以琉璃泉甚清冽土産絲綿氊梨棗枸杞牽牛以上各縣俱出公署平山衛在府治東洪武五年建東昌衛在府城南門西街北宣德五年建臨清衛在臨清州城内東北景㤗元年建濮州備禦千户所在州治西原属東昌衛正統六年建今徙建新城内學校東昌府學在府治東宋在博州舊城金徙于都監故治内本朝洪武三年移建于此臨清州學在州治北舊在縣治西正統間築新城徙建于此髙唐州學在州治東元至元間建本朝洪武三年重建濮州學在州治東舊學圯于河景㤗二年因徙州重建于此聊城縣學在府城内東北舊在城東門外永樂間嘗徙于城南門外正統間復徙城東成化間移建于此堂邑縣學在縣治東北宋建本朝洪武十八年重建愽平縣學在縣治東洪武三年因舊重建茌平縣學在縣治東南舊在縣治南金承安間移建於此本朝正統十三年重脩莘縣學在縣治東北應海寺故基洪武三年建冠縣學在縣治東金貞元初建本朝景㤗四年重脩清平縣學在縣治東元至正二年建本朝景㤗間重建舘陶縣學在縣治東南元建本朝永樂十三年重修丘縣學在縣治東南元大德間建本朝正統十三年重脩恩縣學在縣治東南洪武七年建武城縣學在縣治南永樂正統間俱重脩夏津縣學在縣治東南金大定間建本朝洪武三年重建范縣學在縣治東洪武十五年建宣德八年重脩觀城縣學在縣治東金㤗和中建元至元中重修本朝洪武三年重建朝城縣學在縣治南洪武三年因舊重建書院弦歌書院在武城縣治南子游仕魯爲武城宰其治在今兖州府費縣西北此以其名同故立書院祀之舊在縣西四十里元㤗定中徙此學士承㫖劉賡扁名學士張起巖譔記宫室望嶽樓在府城東北隅可登以望岱嶽故名公惠堂在府治内宋熙寧初建二賢堂在朝城縣漢末臧洪守東郡爲袁紹所害司馬陳容奮而起曰仁義豈有常蹈之則爲君子背之則爲小人紹亦害之後人稱爲二賢立堂祀之四知堂在堂邑縣治元張飬浩尹縣時建茌山草堂在茌平縣學講堂後相傳馬興祖嘗讀書于此本朝正統十二年脩靈芝亭在􅂓城縣西南四十五里本宋武水鎮都廵檢司講武亭大觀間有芝生于梁因名緑雲亭在府城西北角樓舊名自公亭元至元間改今名晉文公臺在􅀶平縣地名晉臺相傳晉重耳自翟奔齊齊桓公以宗女妻之留齊五嵗後歸晉國武陽臺水經武陽城門外有臺曰武陽在今莘縣界内會臺在濮州東南二十五里春秋齊桓公再會于鄄即此玉版臺在􅂓城縣相傳昔人得玉版於此臺故名絃歌臺在武城縣西一十里上有子游祠説見書院魯連臺在古聊城中髙七十餘尺釣臺在濮州東南九十里相傳為莊子垂釣處唐胡曽詩青春行役去悠悠一曲汀蒲濮水流正見塗中龜曵尾令人特地感莊周陳臺在濮州舊城東北魏曹子建封鄄城侯於此築臺讀書後改封陳王謚曰思邑人因號爲陳臺孟舘在茌平縣治東相傳孟子游齊梁嘗舘于此關梁通濟橋在府城東門外會通河上永樂九年改爲閘牟家橋在清平縣西漯河上正統三年里人牟士成脩津期橋在恩縣南津期河上今名永長橋馬頰橋在夏津縣東三十里寺觀隆興寺在府城東門外洪武間建大覺寺在髙唐州治東南舊名侯興禪院永樂間重建圎覺寺在濮州治東景㤗間重建興國寺在博平縣東北二十里洪武初建寧國寺在朝城縣治西慈雲寺在堂邑縣治東南俱洪武中建大寧寺在臨清州治西洪武中建正統中重修寶應寺在舘陶縣治西南崇興寺在恩縣治東北俱洪武中重建法祥寺在茌平縣治南洪濟寺在邱縣治東俱永樂初重建萬壽寺在府城西南舊為三皇廟洪武末改爲觀𤣥都觀在髙唐州治西南嘉祥觀在朝城縣治西元大德初建丹霄觀在朝城縣治東北宣德中