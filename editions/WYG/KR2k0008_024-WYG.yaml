敢東漁於河漢鍾離意堂邑令聴獄囚房廣歸葬其母及廣還獄具間得减死論由是人皆徳之三國程昱魏振威将軍與荀彧留守鄄城張􅊬等叛迎吕布郡縣皆應惟鄄城范東阿不動以功遷奮威將軍晉范廣堂邑令嘗㪚私穀數千斛賑飢逺近流寓歸之户口増數倍南北朝蘇瓊魏南清河郡太守盗賊屏息每嵗春集儒講于郡庠郡吏文案之暇悉令受書在郡六年人皆化之隋郎茂衞國令時獄多繫囚茂審䆒之釋免者百餘人訟由是息邑人張元預兄弟素相憎茂曉之以義遂相親睦劉仁恩開皇初為毛州刺史仁恩倜儻有文武才治績號為天下第一魏徳深貴鄉長為政清静不嚴而治盗賊不入其境轉舘陶長貴鄉民傾城送之號泣之聲道路不絶既至舘陶民如見其父母貴鄉父老詣闕請留有詔許之舘陶父老復詣郡相訟以貴鄉文書爲詐郡不能决會部使者斷從貴鄉舘陶民庶因而徙居貴鄉者數百家樂運髙唐令有聲績運常願處一諫官從容諷議而性訐直不果用張允濟武陽令以愛利爲行道不拾遺元武民有以牸牛依婦家孶十餘犢而不還者訴縣不能决乃詣允濟允濟因令左右縳民蒙其首過婦家云捕盗牛者令盡出牛質所從來婦家不知遽曰此婿家牛遂斷牛還婿唐薛從濮州刺史儲粟二萬斛􅍯凶災及山東大水得賑民飢姚崇濮州司倉叅軍以亷直稱韋濟開元初鄄城令或言吏部選縣令非其人有詔問所以安人者對凡二百人惟濟居第一葛同堂邑令郡學鄉賢碣有賛云葛公宰邑歴代稱賢一方受賜千室鳴絃嚴挺之濮州刺史治尚威嚴吏人畏憚之李栖筠冠氏主簿李峴以三司案羣臣䧟賊者表栖筠為詳理判官推原其人所以脅汚者輕重以情故峴愛恕之譽一旦出人上五代張源德梁末守貝州時郡邑皆歸晉獨貝州堅守不從久之城中食盡或勸出降不聴遂被害宋柴禹錫咸平中知貝州是嵗契丹兵奄至城下禹錫内嚴備禦㓂尋引去徐爽知愽州有惠政鄉賢碣有賛云仁於用心利非專巳能輟清俸贍飬多士源源其惠如西江水涵泳恩波無時而巳文彦􅀶慶歴間貝州王則叛彦愽以叅知政事為河北宣撫使討平之李參知濮州善發擿奸伏事至即决雖簿書纎悉不遺神宗知其才書姓名於殿柱郭中錫知􅀶州州兵出戍有欲脅衆為亂者中錫戮一人黥二人乃定奏至仁宗曰臨事如此豈易得耶蔡挺知愽州申飭属縣嚴保伍得居停姦盗者數人把其宿負補爲吏使之察警盗發輒得均􅀶平􅂓城二縣税嵗衍鉅萬三司下其法於四方宗澤舘陶縣尉為政簡易撫民有方李載知冠氏縣以寛厚稱府守吕夷簡賢之及入相遂薦其才鄭僅知冠氏縣河决大名夜調夫急僅閲保甲盡籍即行先他邑至决遂塞時河朔飢盗起獨不入冠氏境他邑獲盗詰之盗因言鄭公仁故相戒不犯爾楊粹中知濮州建炎初金人大入粹中固守不下尼瑪哈以濮小郡易之将官姚端夜擣其營尼瑪哈跣足走免遂急攻城月餘城䧟端率死士突出粹中豋浮圖不下尼瑪哈嘉其忠義許以不死粹中竟不屈而死守禦官杜績亦死之金王遵古同知􅀶州有惠政鄉賢碣賛云治飾儒術政施仁愛學校脩完士民感戴布薩忠義皇統中􅀶州防禦使公餘學女直字及古筭法盡能通之在郡不事田獵燕游以職業爲務郡中翕然稱治及滿考郡民詣闕留之王庭筠恩州軍事判官臨政有聲郡民鄒四者謀爲不軌事覺逮捕千餘人而鄒竄匿不能得庭筠以計獲之分别詿誤坐預謀者十二人而已元張好古中統初為恩州刺史訪民瘼革吏弊立為條約徐世隆至元中東昌路緫管至郡專務以徳率下不事鞭箠吏不忍欺民亦化服朞年政成郡人頌之陳思濟同知髙唐州事為政簡要不務苛察以績最聞張炤至元中東昌路緫管蒞政二年吏民畏服以治最稱張養浩堂邑令首毁滛祠三十餘所罷舊盗之朔望叅者曰故皆良民既加以刑而猶以盗目之是絶其自新之路也衆盗感泣互相戒毋負張公有李虎嘗殺人其黨暴戾舊氏莫敢詰問飬浩盡寘諸法民甚快之去官十年猶為立碑頌徳王結東昌路緫管境有黄河故道而會通河隄遏其下流夏月潦水壊民麥禾結䟽為斗門以泄之民獲耕治之利耶律伯堅恩州同知在郡有循良之政民親戴之凡賦役有重者輒曰寜得罪於上不可得罪於下必力爭止之劉克敬莘縣尹為政以正風俗為急務取仙居令陳襄之條約以教民民感其徳後為之立去思碑劉天孚知冠州有治績民徳之本朝趙彦可洪武間臨清知縣公清寡欲好士愛民初為山陽丞嘗以公事他出其室潜受賄彦可歸而知之遂以賄首于府而箠其室遣還鄉事聞陞知鞏昌府李真卿洪武間臨清知縣亷能愷悌撫字有方卒於官所行李蕭然至無以殮邑民悲泣如喪所親送葬者皆披麻執紼至三千餘人薛景文洪武中范縣丞撫民以仁處事以公所食惟舎糲飯菜􅃵而已後去任百姓涕泣不忍任芳永樂初清平知縣爲政亷勤以人户分三等九甲量力均徭民感其惠殷序永樂初髙唐知州公勤持已平易近民有剸繁治劇之才遇事不勞而辨原黼觀城知縣公亷守巳徳政化民滿去民懷思不忘吉慶正統間知荏平縣興學校勸農桑鋤奸惡廣儲蓄民感其惠尋擢監察御史省志毛澄景㤗間知濮州政尚簡易先是河决城圮澄爲徙州治規畫建置費不及民代去民為建碑祀于學宫省志王廷器天順間知清平縣剛明仁愛莅政公勤撫流亡賑飢乏民悦其惠立石頌之省志馬忠天順中知堂邑縣亷潔愛民嵗飢輙發粟以賑未嘗湏報行部至邑者惟以糲米進曰此土産其不厲民以求悦諸類是歴十二年比去行李蕭然民甚思之省志蔡釗堂邑主簿河决張秋釗率丁夫往塞自矢求成乗小舟往來調度不避險難遭舟覆溺死河亦遂塞郡人立祠祀之省志張勛成化中知清平縣亷明仁恕門無私謁時河水為患奏减租税之半水患既息存恤周至官至都御史有徳政碑省志金福宏治中知東昌府寛厚簡重為政持大體吏民畏服尤以亷静稱省志夏鼎宏治間治臨清州節冗費民藉安裕時中貴有脅取民貨者鼎立簿籍時考之患遂寢嘗議革守備都司兵民稱便一時治行以操幹稱最民爲立遺愛祠省志堅晟正徳間知􅀶平縣清慎公勤剗革宿弊會流賊攻城晟親拒敵率民死守城頼以完陞薊州知州民立忠義碑建祠祀之省志流寓畢士安雲中人父乂林爲觀城令因家焉士安少好學事繼母以孝聞宋乾徳中第進士真宗時與冦凖並同平章事士安端方沉卷雅年老目昏猶讀書不輟有文集三十袁裕洛陽人㓜孤從兄避難聊城因家焉稍長嗜學元中統初為聊城丞累官刑部侍郎出爲順徳路緫管以其兄有鞠育恩推䕃兄子仁子師念官至侍御史人物周孫臏生阿鄄之間孫武之後與龎㳙俱學兵法㳙爲魏將嫉臏之能以計斷其足齊使載歸威王以為師魏攻齊臏用减竈法擣魏國度㳙夜至馬陵白書大樹㳙果至見白書讀未畢萬弩齊發㳙智窮自剄臏由是名顯天下漢汲黯東郡濮陽人為東海太守東海大治召為主爵都尉嘗對武帝曰陛下内多欲而外施仁義柰何欲效唐虞之治乎帝語人曰甚矣汲黯之戅也古有社稷臣黯近之矣黯前奏事帝不冠不敢見其見敬禮如此後守淮陽卒漢廷以直諫名者黯為首稱尹齊東郡茌平人為御史以亷稱武帝使督盗賊斬伐不避貴勢有能名拜為中尉賈琮東郡聊城人舉孝亷為京兆尹有政績遷交阯刺史招撫不軌之民民歌曰賈父來晚使我先反今見清平吏不敢犯官至度遼将軍劉儒東郡陽平人舉孝亷遷侍中桓帝詔求直言儒上封事十條辭甚忠切不見納出為任城相尋徵為議郎會竇武事下獄自殺郭㤗嘗稱其口訥心辨有珪璋之質劉瓆髙唐人爲太原太守嘗以直言坐罪陳蕃上䟽訟瓆志於去惡欲釋其罪不許瓆竟死獄中天下寃之謝弼東郡武陽人中直方正為鄉邑所宗師靈帝時舉有道對䇿除郎中時青蛇見前殿大風㧞木弼上封事言切直去官歸家曹節從子紹忿疾於弼遂以他罪收考死獄中趙苞東武城人靈帝時為遼西太守名振邊俗遣使迎母及妻子道值鮮卑刼質以擊郡苞率衆禦之㓂出母以示苞苞悲號母遥語曰毋虧忠義苞遂力戰破之其母妻為賊所害詔封苞鄃侯苞葬母訖謂鄉人曰食禄而避難非忠也殺母以全義非孝也何靣目立於天下遂嘔血而死樂進衛國人容貎短小有膽畧從曹操征伐皆先登有功封廣昌亭侯累遷右将軍卒謚曰威子綝果毅侯有父風官至楊州刺史為諸葛誕襲殺諡曰愍崔琰東武城人少樸訥好擊劍尚武事年三十九乃就鄭𤣥學初從袁紹辟為騎都尉尋歸曹操為尚書甚有威重朝士瞻望操亦敬憚焉三國華歆髙唐人仕魏為御史累遷太尉凡䘵賜悉以賑親族故人而清貧自若卒謚敬侯子表累官太常卿卒謚曰康崔林東武城人仕魏為幽州刺史累遷司空進封安陽亭侯為政多推誠存大體去後民輒見思潘璋東郡發千人居貧嗜酒好賒沽債家至門輒言後豪富相還事呉主權屢平㓂盗有功璋為人麤猛禁令肅然領兵馬數千而所在常如萬人官至右将軍晉王鑒堂邑人父濬御史中丞鑒少以文筆著稱初為瑯琊國侍郎時杜弢叛鑒上䟽勸征之後拜駙馬都尉弟濤及弟子戭並有才名劉寔髙唐人好學􅀶通今古以世多進趨亷遜道缺乃著崇讓論以矯之元康間累官至太傅以病免尋徵授太尉詔以列侯就第賜几杖不朝卒年九十一劉智寔弟素有兄風少貧寠每負薪自給讀誦不輟仕為頴川太守累遷至尚書太常著喪服釋疑論多所辨明卒謚成華廙表子宏敏有才思歴官黄門侍郎散騎常侍惠帝即位累進光禄大夫卒謚曰元子恒官至散騎常侍尚清儉死之日惟書數百卷華嶠表子才學深愽少有令聞歴仕魏晉元康初累封樂鄉侯補秘書監内臺中書有良史才典統撰集又自作漢紀卒贈少府謚曰簡歩熊發千人精卜筮數術門人甚盛趙王倫召之熊䇿其不久遂逃去吳隠之濮陽人愽渉文史有清操為中書侍郎嘗為廣州刺史州有貪泉隱之飲而賦詩以見志在州清操愈厲後拜度支尚書授光禄大夫南北朝崔宏東武城人林六世孫少有俊才號冀州神童魏道武征慕容寶素聞其名徴為黄門侍郎定國號為魏從幸鄴歴問故事應對如流道武善之遷天部大人進爵為公卒贈司空謚文貞崔浩宏子愽極羣書明識天文歴官著作郎魏道武以其所上書常置左右及幸其私第多問以異事累官至司徒嘗叅著作序成國書三十卷崔逞琰五丗孫好學有文才仕慕容暐補著作郎撰燕記後歸魏道武拜御史中丞子頥為散騎常侍冀州刺史崔彧東武城人逞曽孫與兄相如俱自宋入魏相如有才學早卒或善醫術性仁恕官至冀州别駕子景哲亦以醫術知名累官司徒長史景哲子冏仕北齊官至鴻臚卿王顯陽平樂平人仕魏歴本州從事以醫術多效累遷御史中尉百僚肅然嘗著藥方三十五卷李彪頓邱衛國人魏孝文賜名初為中書教學愽士累遷御史中尉領著作嘗表上封事十條詔褒羙之子鴻道能属文歴官所在著績崔休逞𤣥孫仕魏為尚書左丞兼給事黄門侍郎叅定禮儀累官司徒右長史公平清潔甚得時譽歴幽青二州刺史皆以清白著稱董徵衛國人身長七尺好古學尚雅素愽通諸經仕魏為四門小學愽士宣武詔徵教授諸王累遷至司農少卿光䘵大夫卒謚文烈張彛東武城人性公强有風槩歴覽經史仕魏為散騎常侍兼侍中持節廵察陜東河南十二州甚有聲稱後除安西将軍秦州刺史羗夏憚其威尋召為光禄大夫卒贈冀州刺史謚文侯崔亮琰之後居貧傭書自業仕魏累官度支尚書别立條格嵗省億計遷吏部尚書秦為格制以停觧日月爲斷後世相踵賢愚同滯皆自亮始然其性公清所在並號稱職崔光韶亮從弟愽學强辨尤好理論仕魏為廷尉卿屢建讜議永安擾亂後還鄉里杜門却掃戒子孫守儉從弟道固仕至齊郡太守房法壽清河東武城人仕宋為魏郡太守以功賜爵壯武侯卒謚敬曽孫豹累遷外任皆有能聲惠政終於樂陵太守張奫清河東武城人父雙自清河太守免歸鄉人有引陳冦至者雙欲率子弟擊之奫賛成其計竟破賊由是知名奫仕周起家州主簿入隋為潭州總管卒謚曰莊崔光清河鄃人家貧好學晝耕夜誦仕魏爲中書愽士撰國書孝文稱其才曰浩浩如黄河東注今日之文宗也每有妖異詔問光光皆詳對婉諫累官司徒侍中進位太保卒謚文宣子勵有父風為太尉長史劼好學為中書令謚文貞崔鴻光從子愽綜經史為魏尚書都兵郎中鴻弱冠有著述志撰為十六國春秋勒成百卷後遷平州刺史卒謚曰貞崔靈恩清河東武城人徧習五經尤精三禮三傳自魏歸梁累遷國子愽士受徒常數百人觧析經理甚有精致先是儒者論天執渾葢二義不合靈恩立義以渾葢為一張譏清河武城人年十四通孝經論語篤好𤣥言仕梁為士林舘學士侯景㓂臺城譏獨侍太子不去及臺城䧟譏﨑嶇避難卒不事景後事陳卒於長安王榮世舘陶人仕魏為三城戍主方城縣子梁師攻圍自知力不可全乃先燒府庫後殺妻妾既而城䧟不屈被害詔進爵為伯贈齊州刺史李脩舘陶人父亮精醫術大為㕔事以舍病人死者則就棺殯親往吊視累遷府叅軍脩遵父業仕魏常在禁内侍針藥有效賞賜累加卒於大學令房景伯法壽族子篤於孝友渉獵經史仕魏累官州郡皆有惠政卒贈齊州刺史劉昭髙唐人晉太尉寔九世孫㓜清警通老莊義及長勤學屬文仕梁卒於郯令集注後漢書一百八十卷文集十卷子縚亦好學通三禮魏尚書祠部郎緩風流跌宕名髙一時為湘東王中録事崔悛逞五丗孫仕魏以建議功封武城縣公悛有文學偉風貎端嶷如神名軰燕集悛到一座無復談話鄭伯猷嘆曰身長八尺靣如刻畫謦欬如洪鐘響胸中貯千卷書使人那得不畏服子贍才學風流為後來之秀仕為相府司馬張晏之彛孫仕北齊官至北徐州刺史百姓為製清徳頌子乾威獵渉羣書仕隋官至内史舎人儀同三司崔仲文悛弟北齊天保初悛為侍中仲文為銀青同日受拜時云兩鳳連飛文宣嘗試觀射詩一韻操筆立成拜散騎常侍光䘵大夫子偃為太子洗馬尚書郎崔景真琰六世孫仕北齊為平昌太守有惠政及去民立祠祀之姪袓思有志氣好讀書仕為内史屢陳政事官至青冀二州刺史為政清勤路去病冠氏人儀表魁異仕北齊為殿中侍御史彈劾不避貴戚以正直知名入隋卒於冀州縣令崔彦穆浩之後風韻閑雅器度方正奔江左仕宋為黄門侍郎後復仕周官至户部中大夫進爵東郡公崔􅇺袓東武城人父梁州刺史家財巨萬􅇺袓散與宗族凡假貸文䟽悉火焚之好學聚書至萬卷仕宋為始安王記室嘗作海岱志起太公迄西晉人物為四十卷半成而卒隋崔儦仲文次子年十六郡守請為功曹不就後遂博覽羣書北齊舉秀才累遷三曹郎中與李若齊名時人語曰京師灼灼崔儦李若齊亡歸鄉隋徵起累遷散騎侍郎授易州刺史張䖍威晏子渉獵羣書歴周入隋累官謁者大夫上嘗問叅見人首立者爲誰䖍威審視而後對上怪問之䖍威引石建數馬故事為對時上數廵幸百姓疲弊䖍威上封事以諫由此見踈子爽仕至蘭陵令張䖍雄䖍威弟亦有才器秦孝王俊為秦州緫管選法曹叅軍王嘗親案囚徒䖍雄誤不持狀口對百餘人皆盡事情同軰莫不嘆服後歴壽春陽城二縣俱有治績唐崔善爲貝州武城人精歴數始勸髙袓舉義及兵起署大将軍府司户叅軍以清察見稱後歴大理司農卿出為秦州刺史卒謚曰忠劉祥道魏州觀城人父林甫武徳時為内史舎人典機宻撰定律令著律議萬餘言髙宗時拜右相進爵廣平郡公卒謚曰宣子齊賢性方直由侍御史出爲晉州司馬有言晉州出佳鷂可捕取帝曰齊賢豈捕鷂人耶王元感濮州人擢明經髙第所撰書紏謬春秋振滯禮繩愆等凡數十百篇上之魏知古見其書嘆曰五經指南也徐堅等聮疏薦之遂下詔褒美以爲儒宗孫伏伽武城人武徳初上言三事髙袓大悦用為治書侍御史太宗時累遷大理少卿始伏伽拜御史歸無喜色時稱其有量吕才愽州清平人聰明絶人太宗召直宏文詔舘與袓孝孫叅論樂事擢太常博士受刪定隂陽家書掇可用者為五十三篇合舊書凡百篇詔頒天下馬周􅀶州荏平人少孤家貧嗜學善詩春秋貞觀中拜監察御史數陳時務帝皆稱善累遷中書令帝嘗以飛白書賜之曰鸞鳳冲霄必假羽翼股肱之寄要在忠力崔義𤣥逞之後貞觀初歴左司郎中兼韓王府長史以介直稱後遷婺州刺史討平睦州㓂拜御史大夫終蒲州刺史子神基仕至大理卿崔神慶義𤣥次子舉眀經累遷禮部侍郎數陳時政轉太子右庻子更日侍讀東宫歴司刑卿子琳累遷太子少保珪太子詹事瑶光䘵卿俱列棨㦸世號三㦸崔家王志愔愽城聊城人擢進士第景龍中為左臺侍御史以剛鷙為治人呼為皂鵰後遷御史中丞出為魏州刺史改揚州長史令行禁止境内肅然崔元略愽州人父敬貞元時尚書左丞元略第進士累官義成節度使弟元式中書門下平章事卒贈司空王少𤣥愽州聊城人隋末父死亂兵遺腹生少𤣥甫十嵗問父所在母以告即哀泣求尸時野中白骨覆壓或曰以子血漬而滲者父胔也少𤣥鑱膚越旬而獲遂以葬事聞拜徐王府叅軍張文瓘貝州武城人爲宰相時髙宗造宮殿討四夷飬廐馬萬疋文瓘上書諫止改兼大理卿不旬日斷疑獄四百抵罪者無怨言後拜侍中諸囚皆垂泣卒贈幽州都督四子皆至三品時號萬石張家弟文琮文琮子錫皆為顯官有政績路敬淳貝州臨清人少志學足不履門居親喪倚廬不出者三年後擢進士遷崇賢舘學士數受詔纂輯慶䘏儀典及著姓畧衣冠系録等書百餘篇弟敬潜少與敬淳齊名官至中書舎人崔隱甫武城人為殿中侍御史時浮屠慧範倚太平公主脅人子女隱甫劾之反爲所擠貶邛州司馬𤣥宗立擢汾州刺史以亷潔自守累遷御史大夫多所劾正威名赫然後遷刑部尚書封清河郡公孫逖愽州武水人自㓜警敏有文思累官中書舎人典詔誥極精宻張九齡視其草欲易一字卒不能其父嘉之為襄邑令逖求増父秩遂拜宋州司馬聴致仕後逖官至太子詹事張鎬愽州人儀狀瓌偉有大志好王覇大畧仕至中書侍郎同平章事亷潔不殖貲産善待士性簡重論議有體天下推為舊徳云孫成逖子為信州刺史嵗旱發倉以賤直售民故飢而不亡後改桂管觀察使子公器亦至邕管經畧使公器子簡元和初第進士累官諫議大夫知制誥進中書舎人簡兄範亦為淄青節度使世號顯家杜暹濮州人五世同居暹事繼母孝擢眀經補婺州叅軍以清節稱累官至安西副大都護守邊四年撫戎練士爲夷夏所樂進禮部尚書封魏縣侯杜鴻漸暹族子舉進士為朔方判官安䘵山亂肅宗時爲太子按軍平凉未知所適鴻漸説往靈武遂與李冕等勸進以係中外望六請見聴肅宗即位授兵部郎中累遷至禮儀使代宗時拜相呉湊濮州人才敏而謙畏德宗初爲福建觀察使羙譽四騰還為京兆尹請簡宮市料中官髙年謹信者爲令平賈和售以息衆讙後兼户部尚書卒謚曰成呉溆湊弟初授太子詹事累遷金吾衛大将軍循循謙謹見重朝廷時朱泚叛溆請持節慰諭之由是被泚曰忠害徳宗悲哭贈太子太保謚崔羣貝州武城人未冠舉進士累官翰林學士中書舎人數進讜言憲宗嘉納後以皇甫鏄譛出爲湖南觀察使穆宗立召爲吏部侍郎俄拜御史大夫官至吏部尚書崔邠貝州武城人父垂三世一㸑當時言治家者推其法邠以進士為補闕䟽論裴延齡姦以鯁亮知名憲宗深器之累官至太常卿知吏部尚書銓弟郾郇鄯鄲郾姿儀偉秀中進士第累官禮部尚書家不藏貲有輙周給親舊鄲及進士第文宗末同平章事宣宗以其一門孝友為題其齋居曰徳星堂崔漢衡愽平人沉懿愽厚善與人交建中初吐蕃請盟以殿中少監爲和蕃使定盟清水官至晉慈隰觀察使崔咸愽州愽平人素有髙志造詣深逺尤善詩歌元和初擢進士又中宏辭遷侍御史處正特立風采動一時官至秘書監崔鉉元畧子舉進士累官中書舎人學士承㫖武宗好蹴踘角觝鉉切諫帝褒納之後為淮南節度使討叛有功累封魏公子沉累遷户部侍郎改中書侍郎崔彦昭羣從子由河陽節度使徙河東撫循有法境内大治遷中書門下平章事每退朝侍母膳與家人齒順色柔聲人多其孝子殷誥潞州刺史路巖魏州冠氏人累平官户部侍郎同章事尋出為劒南西川節度承蠻冦邊後巖撫循置定邊軍於邛州扼大渡河故關由是諸蠻來朝以功封魏國公孫揆逖五世孫以進士累官刑部侍郎行京兆尹昭宗討李克用授揆昭義軍節度以本道兵會戰克用伏兵執揆厚禮将尊用之揆大罵不屈克用怒使以鋸觧之鋸齒不行揆曰死狗奴觧人當用版如其言詈聲不輟至死初逖洎子宿宿之孫簡簡從孫啓四世掌誥至揆與弟拙及棨又以昆仲典綸士論榮之五代賀瓌濮州人初仕鄆州朱宣為都指揮使後歸梁累立戰功官至招討使卒贈侍中子光圗仕宋葛從周濮州鄄城人仕梁累立戰功官至昭義軍節度使封陳留郡王致仕卒贈太尉楊邠冠氏人仕漢官至中書侍郎兼吏部尚書同平章事為人頗儉靜長於吏事宋王彦超臨清人性温和恭謹能禮下士五代時歴仕晉漢周累官河陽三城節度使以功加檢校太師領數鎮皆有功宋初加中書令後封邠國公王祜莘縣人袓言唐黎陽令父徹後唐進士官至左拾遺祜性倜儻有俊氣仕爲殿中侍御史嘗諭杜重威使無反拒盧多遜害趙普之謀以百口明符彦卿無罪世多稱其隂徳手植三槐於庭曰吾後世必有爲三公者累官兵部侍郎卒長子懿舉進士嘗知袁州有政績譚延羙朝城人偉軀幹初仕周以勞遷控鶴軍副指揮使宋初討朗州賊四遷至内殿直都知端拱初知寜逺軍契丹兵至城下圍數日延美開門以示之契丹不敢入遂引去張璚舘陶人有勇力善射太袓在周時討壽州乗皮船入城濠城上車弩遽發璚亟以身蔽太袓矢中璚股死而復蘇破骨出鏃神色自若太袓即位累官至殿前都虞候及卒家無遺財昝居潤髙唐人初仕晉周累官知開封府宋初加檢校太尉性明敏有節槩篤於行義卒贈太師嘗薦沈倫純謹可用後至宰相世稱其知人張昭濮州范縣人父直有孝行通經教授學者號逍遥先生昭愽洽經史兼善天文風角太一卜相兵法處亂世躬耕飬親仕後唐晉漢累官翰林學士户兵部尚書封舒國公宋初為吏部尚書改封陳國公有文集五十卷錢守俊濮州雷澤人少勇鷙初補禁衛屢立戰功前後中三十六創官至右領軍大将軍卒年八十一張遜愽州髙唐人初補左班殿直從征太原還遷文思副使官至樞宻副使小心謹慎子敏中比部郎中次子虚中閣門祗候王旦祜次子㓜沉默好學舉進士歴官右正言知制誥有逺大器真宗曰爲朕致太平者必斯人也累進工部尚書同平章事當國最久帝益信之羣臣或異同旦徐一言以定事至不膠有謗不校薦賢不市恩救罪不費辭尤有德量㓂凖數短旦旦益重之張師徳兩詣其門終不用以戒貪進薛奎使江淮旦曰東南民力竭矣張士遜使江西旦曰朝廷𣙜利至矣至於契丹借幣西夏假糧處之有道夷人愧服偉哉宰相才也卒贈魏國公謚文正王旭祜季子嚴於治内恕以接物以䕃知緱氏雍邱縣三遷至殿中丞自兄旦居宰府以嫌不任職及旦卒颺歴中外卓有政績後以兵部郎中知應天府子質舉進士歴官天章閣待制知陜州李迪濮州鄄城人少從桞開學為古文開曰公輔器也舉進士第一累官資政殿大學士同平章事當章獻太后臨朝時正色危言時稱賢相以太子太傅致仕卒贈司空侍中謚文定仁宗篆其墓碑曰遺直廉公諤堂邑人為莱蕪令民歌曰甑釜生塵魚境内安以樂昔間范史雲今見亷公諤累遷司農少卿出知滑州治聲流聞於時王巖叟清平人為監察御史上䟽極陳時弊遷左司諫時李定不持所生母服巖叟論其不孝後論章惇罪惡坐貶未幾入為起居舍人累遷至端明殿學士劉謙堂邑人曽袓直以淳厚間有盗其衣者既得亦不問謙累官保寜軍節度使守職寡過嘗上言邉城早寒請六月給冬衣後以為例從真宗東封閲視山門設施有法卒贈侍中孫奭愽州愽平人㓜師里中王徹徹死門人數百皆從奭問經以九經及第爲莒縣主簿真宗朝累官龍圗待制奭守道自處有所言未嘗阿附時以兩得天書召問奭對曰臣聞天何言哉豈有書也又上䟽極諫尋出知宻兖州仁宗時召為翰林侍讀學士以太子太傅致仕卒謚曰宣髙弁濮州雷澤人從种放及桞開學至道中舉進士累官侍御史諌脩玉清昭應宫䧏知廣濟軍後知陜州弁性孝友為文章多袓六經及孟子有帝則三篇張詠濮州鄄城人太宗時進士兩知益州築隄灌田萬餘頃威惠及民民皆信服後以江左旱充昇宣等十州安撫使遷禮部尚書知陳州卒贈左僕射謚忠定詠剛方自任為治尚嚴猛自號乖崖以為乖則違衆崖不利物有文集十卷李垂聊城人咸平初進士累官修起居注時丁謂執政未嘗往謁或問其故荅曰謂恃權怙勢必逰朱崖吾不欲在其黨中遂補外任還朝有勸其謁時相者荅曰我若昔謁丁謂則爲學士久矣今已老大見大臣不公常欲靣折之烏能趨附乎終知均州王沿舘陶人舉進士歴知數州累官龍圗閣直學士好建眀當世事初興河北水利論者以為無益已而邢州有爭渠水至殺人者然後人知沿所建為利有文集二十卷唐志二十一卷王鼎沿子第進士累官河北都轉運䀋使當官明敏彊直不可撓所薦士多知名性亷不欺嘗任其子或勸増年以圗速仕不從父財悉分與諸弟奉使髙麗得千縑盡散之族人馬元方濮州鄄城人父應圗知頓丘縣以部芻粮没虜中元方去髪爲浮屠求父尸不得太宗哀之爲官其兄元吉元方以進士累遷户部判官上言方春民貧請預貸庫錢至夏秋令以絹輸郎官行之公私果便因下其法諸路官至兵部侍徐起濮州鄄城人舉進士累遷徐州轉運使募冨室出米以賑饑民又移粟以贍河北京西後知兖州有廵檢虐所部而部兵百餘人持兵至庭下州人大恐起諭以禍福衆感泣聴命終知湖州張質博州髙唐人太宗時爲樞宻院使累遷都承㫖在樞要五十年練習事理精敏端慤未嘗有過真宗嘗召問五代以䧏軍籍更易及利害之詳質纂為書目曰兵要以進真宗覧而稱善靳懐德博州髙唐人袓昌範殿中丞父隠禹城令懐徳太平興國中眀法累更外任皆著政績嘗爲益州鈐轄軍民甚畏愛之卒知陜州王素旦季子以進士累遷知諌院數進讜言時王徳用進二女素論之仁宗為出二女後知成都為政務合人情蜀人紀其目號王公異斷終禮部侍郎謚懿敏子鞏有俊才爲宗正丞從子靖力學好講切天下利害爲度支副使從孫敏仲寶文閣學士震龍圗閣學士李柬之廸長子明曉典故賜進士累官龍圗閣直學士以太子太保致仕出都門即幅巾白衣見客子孝基始豋第唱名仁宗顧侍臣曰此李廸孫耶能世其家可尚也歴知數州皆有治績累遷光䘵卿年方五十與父同謝事時以比二䟽李肅之廸從子歴知數州遷江淮發運使後以龍圗閣學士知鄆州肅之内行脩飾母喪廬墓撫㓜孤弟承之至成立神宗稱其一門忠孝承之有志節中進士累官樞宻直學士知青州先是遷龍圗直學士懇辭乞授兄詔並遷焉李及之廸從子登第通判安肅軍後以太中大夫致仕嘗撰次唐史有益治體者為君臣龜鑑八十卷卒年八十五子孝稱為大理少卿連奏獄空仕至工部尚書孫瑜奭子爲兩浙轉運使歴知數州累官至工部侍郎瑜天資整敏齊家以嚴稱所薦士有過或教使自言曰已知之而復擠之吾不爲也張奎臨濮人舉進士累官河東都轉運使知河南府以能政聞京東盗起以奎知鄆州數月捕盗悉平奎治身有法度風力精强吏不敢欺子燾舉進士歴州縣皆有治績累官至龍圗閣直學士判太常燾才智敏給英宗時三司前奏事帝詰鑄錢本末皆不能對燾悉論無隠帝是之張亢奎弟少有竒節舉進士為涇原鈐轄知渭州善於教閲屢敗夏人後爲徐州緫管好施輕財凡燕犒皆過於厚馭軍嚴眀所至有風迹民圗像祀之杜純濮州鄄城人少有成人之操以䕃補官范純仁等薦為河北轉運判官至鴻臚重之光䘵卿權兵部侍郎屢有建眀司馬光稱杜紘純弟起進士爲永年令累官刑部郎中爲夏國母祭奠使夏人倨傲紘責正之出知鄆州繫囚三百人旬日處决盡後知應天府張守約濮州人以䕃累官定州路駐泊都監夏人萬騎來㓂守約簡兵五百進戰提身立陳前自節金鼓發强弩殪其酋敵遂退歴守七州皆有惠愛可紀終扵都指揮使孫構博平人中進士歴知數州徙湖北轉運使章惇興南北江蠻事構諭䧏懿洽二州納歸附州十四後以右諫議大夫知桂州馬默單州武城人從學石介登進士調臨濮尉以張方平薦爲監察御史裏行遇事輙言無顧方平間遣所親謂曰言太直得無累舉者乎默謝曰不敢爲身謀所以報也嘗除知登州奏請更定配沙門島法後爲河北都轉運使紹聖初坐附司馬光落職致仕卒紹興中贈太保和斌濮州鄄城人累官嶺南至歩軍都虞候老於爲將以恩信得邊人心嶺南珍貨一無所蓄邉吏欲希功者皆憚不敢發所至無事士夫咸稱之和詵斌子以䕃爲河北副將累官至威州刺史知雄州嘗上制勝强逺弓式能破堅於三百歩外邉人號爲鳳凰弓在雄十年頗能偵敵王友直愽州愽平人父佐以才武稱友直隨父㳺諳兵法紹興末金人渝盟友直結豪傑勤王得衆數萬置都統制訓練進克大名欲南歸道拜天雄軍節度使常張一大旗書宋忠義将河北王九郎以自表髙宗視師江上見於金陵後累立戰功積官至殿前指揮使卒贈檢校少保王倫莘人髙宗時爲􅁱職郎選使金國歴官僉書樞宻院卒歸梓宫太后後爲金人所留不屈而死王柟倫孫初調海門尉孝宗時假右司郎中使金柟歸白其母母曰而袓以忠死故恩及子孫汝其勉之毋以吾老爲念柟至金金人知韓侂冑已誅和議遂决後柟奏和約之成皆方信孺将命之功臣因人成事爾朝論多之累官知太平州金賈鉉博平人性純厚好學問大定中進士爲諫議大夫上書論有司决杖不如法及揀茶害民事皆從其請累官至禮部尚書叅知政事孫鐸恩州歴亭人性敏好學大定中進士累官户部尚書叅知政事嘗上書論法令不一及議交鈔金主稱其剛正雖魏徵不能加後以太子太師致仕耿端義博平人大定中進士累官翰林侍講學士叅知政事時中都被圍端義奏今士卒縱不可使城中軍官不啻萬餘出戰亦可得志議竟不行及圍觧遂請遷都宣宗從之宋九嘉夏津人爲人剛直豪邁少㳺大學有能賦聲長從李純甫讀書為文有竒氣至寜初進士歴藍田髙陵扶夫三水四縣令咸以能稱入爲翰林應奉正大中以疾去没於癸巳之難閻詠髙唐人氣節豪邁常慕張忠定公爲人以狀元應奉翰林文字終於河南治中郡人祀之扵鄉賢祠其弟子康􅈌篤信好學四方之士經其指引爲元初名卿大夫者甚衆與詠同登鄉賢祠馬定國茌平人自少志氣不羣累官至翰林學士嘗著石皷辨萬餘言大要以字畫考之是宇文周時所作出入傳記引㨿甚眀有文集傳世毛佺恩州人宣宗南渡率衆歸國署爲義軍招撫哀宗遷蔡以佺爲都尉圍城之戰佺力居多城破自縊其子先佺戰歿元趙天錫冠氏人仕金歸元官至左副元帥同知大名路兵馬都緫管事彭義斌鄭侗嘗前後㓂冠氏皆戰敗之子賁亨從元兵平江南有功累遷處州路緫管府達魯噶齊改本路管軍萬户閻復髙唐人用王磐薦爲翰林應奉會議加封孔子復受命爲制詞有曰先孔子而聖者非孔子無以眀後孔子而聖者非孔子無以法聞者嘆服累宫翰林學士承㫖遥授平章政事卒謚文康有清軒集五十卷岳存冠氏人初歸東平嚴實行冠氏主簿有破賊功陞本縣丞移治楚丘有惠政中綂初卒子禎累立戰功後爲建康路緫管定救荒之政民立碑以紀遺愛焉齊榮顯聊城人仕金歸元屢立戰功官至東平路緫管府叅議俄兼愽州防禦使嘗請困民間供給兵費二萬定得折充賦税民頼以不樊楫冠州人初爲軍吏數從征伐有功累官中書省叅知政事進攻交阯班師還爲賊邀遮力戰被創竟爲所殺贈上黨郡公謚忠定司庠恩州人與弟廙舉進士庠爲西臺御史梗直無所顧忌廙有才行仕至禮部尚書焦養直堂邑人夙以才器稱爲典瑞少監入待世袓幃幄陳說古先帝王政治世袓聴之忘倦累遷集賢大學士與謀大政卒贈河南行省左丞謚文靖王徳新莘縣人爲淮東亷訪司僉事丁父母憂廬墓七年不茹葷酒諸道交章薦之有曰孝符曽閔學紹朱程後旌表其孝亷梁宜茌平人博雅有文學判徽州遷河南路緫管俱有治聲官至禮部尚書張汝卿恩州人隠居不仕好蓄經史名其庋書之堂曰萬卷唐之右有文會齋四方賢士有來假閲其書則舘于其中詔旌其門曰義士後書皆燬於兵時人惜之朱汝諧濮州人父子明嘗命與兄汝弼别産父卒汝弼家盡廢汝諧泣請共居仲父子昭子玉貧病汝諧迎至家奉湯藥甘㫖甚謹後卒喪葬盡禮鄉人賢之州縣以聞表其閭陳舜咨鄄城人篤於孝友以已産分讓兄弟縣令言狀表美之本朝楚樟朝城人父惟善學冠一時仕元為翰林學士樟性資明敏博通經書洪武初以明經舉任本縣訓導教人有法士多成材秩滿陞詹事府府丞郭敦堂邑人洪武間鄉舉擢户部主事陞衢州知府立義阡以葬貧死不能舉及禁焚屍者又爲條約教民患難相恤民甚頼之累陞禮部左侍郎改户部兼少詹事進陞尚書鎮守陜西悉革宿弊敦性純實事親孝閨門肅然於人不茍合公暇手不釋卷氷蘗之操無愧古人雖官列六卿而泊然布素歿之日家無餘貲劉昱武城人初任吏科給事中陞通政司左通政河南左叅政改交阯右叅政昱勇於有爲所至吏民畏憚征交阯與尚書劉㒞賛黔國公沐晟軍務被圍與㒞同死之王士嘉武城人永樂初由國子生選任知縣歴官工部員外郎中宣徳中以才識老成薦陞陜西布政司叅政清譽大振正統初召爲禮部右侍郎後以年老致仕卒年八十餘爲人端重詳雅作事一毫不茍踐履篤實爲士大夫所推許云呉中武城人永樂初由太學生歴官大理寺丞尋陞少卿再陞右都御史歴刑部尚書持法寛平轉工部尚書兼詹事進兼太子少保陞少保時營建三陵及京城宮殿皆中董役先事蓄材以應時需未嘗􅊴乏陞少師卒追封茌平伯謚榮襄趙巖堂邑人母亡奉父甚謹家貧常借貸以供父艱苦不使父知父歿合母葬建祠堂墓側圗親容事之如生永樂中旌其門曰孝行李懋茌平人篤學尚志居太學士類推重累官褔建按察使史􅈌丘縣人勤學慎行早以才能歴任仕途官至河南按察司副使以亷明著稱呉祥茌平人學識出衆由監生歴任有能聲累官福建布政司叅議馬豫臨清人宣徳中登進士歴官大理寺副正統己巳土木不利奮不顧身厲聲叱賊遇害英廟復辟憫其忠贈寺正録其子遜入監省志魏元朝城人正統中進士授給事中抗䟽論萬氏兄弟恣肆諸萬稍自歛束辨慈懿皇后