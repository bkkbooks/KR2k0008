從忩中飛出髙入雲中於是立廟每表靈騐嘗有一靑鳥在祭所人有所失請問所在鳥即集盗物之處以此道無拾遺魏文帝廟在府城東四十五里九域志魏文帝幸廣陵因立廟亦名曹公廟恭愛廟在儀真縣東二十里祀漢廣陵太守陳登白馬廟在江都縣治南祀漢秣陵尉蔣子文嘗逐盗而死吳先主初其故吏見子文乗白馬於道郡人為立祠本朝正統十二年重修興化南溪上亦有白馬將軍廟甘棠廟在府城東北四十五里晉謝安鎮廣陵有善政郡人立廟祀焉江令祠在舊江陽縣唐咸通中大旱令以身禱雨赴水死天即大雨民為立祠康澤廟在髙郵州西北一十五里俗呼為耿七公廟舊傳東平梁山泊人歿著靈異凡有禱輒應宋賜號康澤侯迄今居民暨舟行者皆致祭武定公祠在通州治西南隅昔武定鎮江隂軍令嚴肅而民不擾移屯通州被命南征没於王事宋元祐中立祠以彰其忠義范仲淹祠在興化縣學宋天聖間仲淹嘗宰興化遺徳在民故立祠祀之胡安定祠在如臯縣學西舊在縣治東南隅正統初移建於此三賢祠在髙郵州儒學祀宋孫覺秦觀喬執中又儀真亦有三賢祠以祀元郝經吳澄張䇓六太守祠在泰州城内宋元符中建以祀故太守荆罕儒周述田錫張綸孔道輔曾致堯孝子祠在泰興縣治東祀宋孝子顧忻嘉靖間建旌忠廟在府治東宋紹興中統制王方魏全與金兵戰死為之立廟每歲季春致祭三將軍廟在儀真縣東北五里三將元怡梁宏張昭宋紹興中戰死于此邑人壯其忠勇立廟祀之露筋廟在髙郵州南三十里舊傳有女子夜過此天隂蚊盛有耕夫田舎在焉其嫂止宿女曰吾寜處此死不可失節遂以蚊死其筋露焉宋米芾碑記云澤國之女􅏐膚露筯不就有幃之子氏不顯於一時名可揭於萬世歐陽修詩近聞髙郵間有蚊夜陵辱哀哉露筋女萬刼讐不復蒿坡廟在興化縣東八十里相傳宋祖㣲時販鹽過此宿有一老姥見其貌異禮待之宋祖登極遣使徴之姥已歿遂立廟焉陵墓盤古塜在府城西四十里塜上有廟煬帝塜在府城北雷塘隋陳棱為江都守求得煬帝柩畧備儀衛葬之於此唐羅隱詩君王忍把平陳業只换雷塘數畆田楊行宻塜在儀真縣西七十里五代史楊溥僣號追尊其父楊行宻為大武皇帝墓號興陵董永墓在如臯縣北一百二十里又湖廣孝感縣亦有永墓孔融墓在江都縣髙士坊袁術墓在寳應縣治南淳于棼墓淳于棼家於廣陵宅南有古槐夢槐安國王邀入穴中令娶其女金枝公主命理南柯郡及覺乃一古槐耳今俗呼為南柯太守墓吕岱墓在如臯縣東南六十里岱孫吳大司馬胡瑗墓在如臯縣安定鄉正統初增築髙榖墓在興化縣北十五里李賢撰碑古蹟張公城在府城西四十里漢末張嬰築因名江都城在府城西南四十五里為江水所侵蕪城即古䢴溝城呉王濞故都後荒蕪鮑照作蕪城賦廣陵城魏黄初六年文帝如廣陵故城臨江觀兵有渡江之志呉人嚴兵固守即此胡墅城與𤓰歩城俱在儀真縣陳大建五年置石鼈城在寳應縣西八十里鄧艾所築隋初嘗置石鼈縣尋省入安宜縣盂城即髙郵城其城四隅皆低為沮洳蒲葦之澤城基獨髙狀如覆盂秦觀詩吾鄉如覆盂地據揚楚脊環以萬頃湖粘天無四壁髙黎王城在寳應縣西南八十里相傳宋治乎間髙黎王置此城金牛城在寳應縣東南一十五里相傳宋熙寧間王將軍置此城四靣土色皆黄形狀如牛新舊城宋郭埭知揚州謂故城處勢卑渫遭虜襲瞰請即遺址建築未幾矗然屹立卓為鎮淮上䇿廢廣業郡本髙郵縣地梁析置竹塘三歸二縣及廣業郡尋以有嘉禾改神農郡隋初郡廢縣亦省廣陵廢縣在揚州北一十八里劉宋置宋廢入江都齊寜廢縣在府城東六十里南齊建武五年遏艾湖水立裘塘屯移縣於萬嵗村中興元年廢吳陵廢縣在泰州即漢海陵縣唐武徳三年改為呉陵後復舊廢寜海縣在如臯縣境隋初省入如臯廢揚子縣在儀真縣境唐永淳初置後廢孝義里宋書劉宗武陽村人文帝時魏太武至廣陵宗母為軍所害遂蔬食不嘗五味以終于世其所居村因號孝義里彰孝坊宋孝子朱壽昌自天長來居髙郵人名其里曰彰孝皂角林在江都縣南三十里宋紹興末金人入淮制置使劉錡軍𤓰洲金將髙景山攻揚州錡遣統領貟錡拒於皂角林䧟圍力戰大破之斬景山俘數百人即此秦郵亭在髙郵州本秦之郵亭漢改置髙郵縣董仲舒宅在江都縣大東門外漢時仲舒為江都相宅於此謝安宅在府城傍今為民居手植雙檜唐時猶存東園在儀真縣東宋皇祐間施昌言許元為發運使作此園歐陽修為記蔡君謨書嘗謂人曰吾用顔筆作禇體故其字遒媚異常後人因名園記為三絶園有澄虚閣淸讌堂共樂堂拂雲臺衆樂園在髙郵州郡圃宋守楊蟠作園有堂曰時燕豐瑞四香樂聖亭曰玉水華胥摇輝序賢塵外迷春蟠自為記鐵棺垜在興化縣南法華廢寺西長九尺髙三尺前闊後狹宛若棺狀相傳宋建炎間薛慶嘗遣其徒摇動中有物相觸聲以鐡鎚擊數百畧無少損又鼔鞴鎔之其固如初乃止蓮花垜在興化縣安仁鄉舊傳有姑嫂共刈稻姑忽墜深溝中嫂急救之俱溺死二屍𦵏於溝傍忽生蓮花數朶里人驚異啟棺視之蓮花皆從口出人稱為蓮花垜今雙塜尚存名宦漢董仲舒武帝時為江都相事易王王素驕好勇仲舒以禮匡正王敬重焉馬稜章和初為廣陵太守時穀貴民饑奏罷塩官以利百姓賑貧羸薄賦稅興復陂湖溉田二萬餘頃吏民刻石頌之張綱廣陵太守時張嬰等㓂亂揚徐積十餘年前遣郡守率多求兵馬綱獨單車之職徑詣嬰壘申示國恩賊靣縛歸降綱大㑹置酒為樂散遣部衆任其所之人情恱服南州晏然陳登廣陵太守辟郡人陳矯為功曹矯曰聞逺近之論頗謂明府驕而自矜登曰夫閨門雍睦吾敬陳元方淵清玉潔吾敬華子魚清修疾惡吾敬趙元逹博文强記吾敬孔文舉䧺姿傑出吾敬劉豫州所敬如此何驕之有晉謝安以尚書僕射鎮廣陵有惠政築埭城北人思如召伯名為召伯埭謝𤣥建武將軍監江北諸軍事鎮廣陵嘗領精銳為先鋒戰無不捷南北朝檀道濟宋南兖州刺史鎮廣陵屢立戰功威名甚重徐湛之宋南兖州刺史善政俱肅威惠並行公餘修樓觀亭臺招集文士盡㳺玩之適陸子真宋海陵太守時中書舎人秋當見幸家海陵子真不與相聞聞者髙之隋賀若弼吳州總管鎮廣陵髙祖委以平陳之事弼欣然以為已任獻取陳十䇿髙祖稱善唐婁師德江都尉揚州長史盧承業異之曰子台輔器也當以子孫相諉詎論僚吏哉姚崇揚州刺史政條簡肅人為紀徳于碑蘇瓌揚州大都督府長史州據都㑹多名珍竒産前長史貲取鉅萬瓌單身襆被自將張延賞淮南節度使嵗旱民他遷延賞曰拘此而斃不如適彼而生乃具舟遣之敕吏為修室廬已逋債而歸者更增於舊杜佑淮南節度使决雷陂以廣灌溉斥海濵棄地為田積米至五十萬斛列營三十區士馬整飭四隣畏之杜亞淮南節度使治漕渠以通大舟夾隄髙田因得灌溉疏啟道衢撤壅通堙人皆恱賴李鄘淮南節度使憲宗時兵興鄘盡發府庫以佐國用諸道由是悉索以獻時甚賴之李吉甫淮南節度使居三嵗奏蠲逋租數百萬築富人固本二塘溉田萬頃又築平津堰以蓄洩水利官雖居外每朝廷得失輒以聞李珏淮南節度使時江淮旱請發倉廩賑流民以軍羡儲殺半價與人及卒百姓立碑刻其遺愛崔從淮南節度使時揚州交易貲産奴婢有貫率錢畜羊有口筭以佐用度從皆蠲除之及卒民有刲股肉以祭者李德裕淮南節度使初徳裕父吉甫年五十一出鎮淮南復入相徳裕出鎮入相如父之年人咸異之牛僧孺淮南節度使文宗賜以彛樽龍勺詔曰精金古器以比君子杜悰淮南節度使武宗聞揚州娼女善酒令勅監軍選十人以獻監軍請悰同選悰曰監軍自受勅不敢預聞監軍怒具奏其狀武宗曰杜悰得大臣體朕甚愧之勅勿復選李紳淮南節度使治尚剛嚴務為威烈能自伸其才以功名終李襲譽揚州刺史俗喜商賈不事農襲譽為引雷陂水築句城塘溉田八百頃以盡地利自是民多務本杜牧牛僧儒鎮揚州牧為書記剛直有竒節不為齪齪小謹敢論列大事指陳利病尤切五代荆罕孺周泰州刺史輕財好施禮接儒士世宗幸泰州以為團練使及將代軍吏耆艾詣闕請留朱昻周世宗南征時以昻知揚子縣適兵革之際民逃亡過半昻便宜綏輯復逋亡者七千餘家邊珝同知通州課鬻鹽於狼山嵗増萬餘石後又知揚州多治績宋李處耘知揚州時大兵之後境内凋敝處耘勤于綏撫奏减屋稅民皆恱服及召歸老㓜遮道泣留劉綜雍熙中知建安軍先是天長軍及六合縣民輸賦非便綜奏請降天長軍為縣屬揚州以六合縣屬建安軍自是民力均濟王嗣宗淮南轉運使揚楚間有窄家神廟民有疾不服藥皆檮之以徼福嗣宗撤其廟選名方刻石州門自是民風稍變薛奎淮南轉運副使遷江淮發運使疏真揚漕河廢三堰舟楫便之嵗以八百萬供京師孔道輔仁宗廢郭后道輔時為中丞率諌官伏閣請對遂出知泰州後其子宗翰知揚州皆以治聞張綸江淮發運使奏除通泰州鹽户宿負又築髙郵漕河隄修泰州捍海堰因命兼知泰州堰成流傭歸者三千餘户民為立生祠滕宗諒泰州判官剛直有能名王素知通州有徳政民思之錢明逸知揚州居官獨立守繩墨為政簡靜有條理王随乾興初知揚州後又知通州外若方嚴以寛惠為政興學為務曽致堯知泰州有美政子易占嘗知如臯縣孫肇知泰州三世守官海陵故有三至堂范仲淹知興化縣先是海潮漫為鹹鹵仲淹時監西溪倉築捍海隄於通泰海三州之境長數百里以衛田民享其利立廟祀之徐景知興化時楚民胡徳等㓂掠馳入縣治景諭以逆順禍福賊怒欲害之景曰人誰無死得死王事亦何不可但勿殺百姓吾含笑入地矣賊義之竟不加害韓𤦺以資政殿學士知揚州琦前領麾而後建節十年不易鎮政績甚著歐陽修知揚州以寛簡不擾為治三五日間事十减五六兩月後官府如僧舎或問故曰吾寛不為苛急簡不為煩碎爾非廢事也王琪江都主簿上時務十二事請建義倉置營田减度僧罷鬻爵禁錦綺珠貝行鄉飲籍田復制科興學校仁宗嘉之王珪通判揚州吏民皆少珪有大校嫚不謹捽置之法賊王倫犯淮南珪議出掩擊賊遁去胡宿揚子縣尉時大水民被溺令不能救宿曰拯溺吾戰也即率公私舟以濟活數千人從子宗愈通判真州亦有治績趙槩知通州以誠心為政喜怒不形於色隱惡揚善吏民懷之沈起知海門縣地卑濕海波至則冒民田舎起為築隄百里引江水灌田田益闢民相率歸業户口倍增黄萬頃知興化縣安集人民縣治以次修舉凡學校倉庫有關政治者悉為創建邑人稱之馮京知揚州以仁厚存心遇事立斷吏畏民恱王安石揚州僉判讀書逹旦畧假寐日已髙亟上府多不及盥潄至和間又為海門令甚有治聲劉敞知揚州前守政苛吏民不安敞以寛厚濟之而民大恱劉攽通判泰州為政寛平視官屬如子弟人甚愛之蘇軾知揚州晁補之有詩云去年使君到廣陵吾州空市看雙旌今年吾州懼一口使君來為廣陵守吕公著知揚州勤於聴覽人人得盡所欲言然御下簡肅入公府者屏氣不敢譁上下恪職事無不舉趙抃知海陵縣崇學校禮師儒民有可與與之獄有可出出之元綘知靜海縣時江淮制置使建言私販塩滿二十斤者皆坐徒絳曰海濵之民恃鹽以生非羣販者止笞而遣之張次元知靜海縣嵗大旱苗且稿死惟漕河衝溢而法不可决次元慨然决以便民運使陳安石以書勞之曰真古良吏之用心也陳升之通判揚州時髙麗入貢所經州縣悉要地圖至揚州升之紿使者曰欲盡見兩浙圖效其規模造之及圖至聚而焚之具以事聞曾肇紹聖間知泰州以文章推重而為政有成績晁補之通判揚州以文章著名太守蘇軾稱為風流賢别駕既而其弟詠之亦調揚州司法參軍軾雅重其能文顧坐客曰竒才也徐勣通判通州瀕海有捍隄廢不治嵗苦漂溺勣躬督防卒䕶築之隄成民賴其利楊蟠知髙郵軍政無留滯嘗營衆樂園取與衆同樂之義任建中通判通州築隄岸二十里民咸仰之陳德林知真州蘇軾有詩云君為守令有古風名聲直入明光宫老人愛君如劉寵小兒敬君如魯恭羅適知江都縣為政簡肅修大石湖灌田千餘頃居數月政化大行及代去民思之為立生祠邵必知髙郵軍又提點淮南刑獄居官震厲風采始至郡為一赴宴集行部但一受酒食之餽以為數㑹聚則人情狎多受餽則不能行事吳表臣通州司理參軍朱勔黨盛章嘗市婢有武臣強取之章誣以罪繫獄表臣方鞫之郡將曰知有盛待制乎表臣佯若不知者卒直其事胡安國知通州見善必為抵任甫逾旬金人薄都城時子寅為郎在城中客或憂之安國愀然曰主上在重圍中卿大夫恨效死無路敢念子乎吕好問揚州儀曹參軍時蔡卞為帥欲扳附善𩔖好問以禮自持卞不得親及卞得政當時掾屬㧞擢畧盡獨好問留滯羅薦可髙郵理曹㑹京城䧟張邦昌竊位號肆偽赦至髙郵守欲拜之薦可毅然不可宿留數日而建炎赦下事聞褒以亰秩薛慶承州天長軍鎮撫使金人欲北歸㑹兵攻楚州郭仲威與慶約俱徃逆敵既而仲威不至慶與金人遇轉戰數十里墜馬為金追騎所獲而死吕頥浩以淮東安撫知揚州修築城池鎮撫江淮政績甚著張榮知泰州先是金監軍達蘭以舟師犯水寨榮擊敗獲子孫俘馘甚衆遂以榮知是州號張敵萬胡令儀知如臯縣江淮内屬未乆吏奸民囂令儀先令後刑人凜然憚之岳飛建炎中通泰鎮撫使兼知泰州㑹金攻楚州急詔飛徃援飛抵承州三戰三捷殺金髙太保俘酋長七十餘人又還守通泰戰於南覇橋金人大敗韓世忠淮南宣撫使時金人與劉豫合兵而進世忠親提騎兵駐大儀俾統制解元守髙郵遂大敗敵衆論者以此舉為中興武功第一尤袤紹興中知泰興縣奏免邵伯鎮置頓及漕司輸藁秸之弊又修築外城已而金人克揚州獨泰興得全民感其徳為立生祠莫濛紹興中知揚州城圯命濛增築濛規度城闉分授諸將各刻姓名甃堞間懸重賞激勸閲數月告成方信孺知真州即北山匱水築石隄二十里人莫知其故後金人薄儀真守將决水匱以退敵城乃獲全吳遵路淮南轉運副使於真泰州髙郵軍置斗門十九以畜泄水利廣屬縣常平倉儲畜以待凶嵗凡所規畫後皆便之辛棄疾為淮東帥以吏事聞每出於車前張二旗書云撫軍恤民斬賊配吏洪興祖知真州州當兵衝瘡痍未瘳興祖請連復二年租自是流民復業墾荒田至七萬餘畞崔與之主管淮東安撫司權發遣揚州事奏選守將集民兵浚城壕疏塘水開月河置吊橋練兵習馬射自是金人不敢深入李道傳知真州時城圯道傳甓治之築兩石埧以䕶並江居民又隄陳公塘有警則决以為阻人心始固杜庻知真州大修守僃後又知揚州射陽湖饑民嘯聚庻曰皆赤子也遣將昭降戮止首惡數人趙范知揚州務修軍政籍民為半年兵春夏在田秋冬教閲弟葵亦知揚州入對帝稱其父子兄弟宣力甚多葵頓首謝曰臣世受國恩當捐軀以報陛下李庭芝淮東帥招徠士民大興學校振恤貧窮境内乂安元兵至固守累年景炎登極召為丞相至泰州元兵追執之不屈死姜才揚州將屢破元兵與李庭芝同赴召元將愛其才勇啖以官爵才不屈含血噴罵竟死之元郝彬揚州路治中宋末鄞賊顧閏侵揚州彬討擒之泰興人有被賊殺二年而賊不獲吏誣平人獄已具彬疑其誣讞之果得真賊李天禄以元帥守通州御軍牧民恩威並濟修城池捐粟者以千計民稱其美詹士龍興化縣尹時捍海堰頺壊鹹鹵浸入髙郵諸郡農桑湮没民饑死流亡者半士龍竭力修築數月堰成民至今頼其澤張禎髙郵縣尹律已亷厲摧抑豪強門無私客有守城千户惑嬖妾殺其妻者禎鞫正其罪人稱為神明李齊髙郵知府張士誠陷其城誘之使跪齊曰吾膝如鐵豈為賊屈乃槌碎其膝而咼之齊嘗舉進士第一論者謂其不負所學云趙璉以參政行省揚州又移鎮真泰州張士誠作亂璉遣李齊論降之尋復叛璉奮擊被執大罵而死亂定州民收其屍殯於真州本朝繆大亨洪武初為樞宻同僉鎮揚州洞燭民情抑强扶弱凡剖决合宜衆皆恱服卒于官民哀之如親䘮吕秉直洪武初知泰興縣首開縣治撫集人民為人純篤無偽果决有為尤敦尚亷恥邑人稱慕之儀智洪武初知髙郵州亷能公正勤於政務凡農桑學校極力興舉吏民恱服張遇林洪武初泰州知州闢草萊設州治建學校凡公私舎宇靡不周完郡人至今稱之張本洪武中江都知縣在任有善政尋陞揚州知府亷介有為盡革宿弊勤於政務切於愛民人皆畏服田慶永樂中知泰州在任淸慎公勤門無私謁為政有條吏不敢欺髙敏永樂中知揚州府亷明公正人不敢干以私官屬有勤於撫字者必加禮貌貪墨者奏而黜之事不便於民者不顧利害除而後已王福永樂中為揚州府推官持身亷謹門無私謁存心忠厚洞逹人情凡斷理詞訟詳悉明决人無寃抑吕童永樂中知興化縣在任淸正首除吏弊治化洽於民心凡百廢墜興舉無遺及卒百姓為棺殮之奠哭者千數曹𢎞宣徳間以侍郎巡撫淮揚𢎞為均徭役給賑濟備牛具凡所設施切于救民盡除宿弊民甚徳之南畿志楊璵宣徳間為髙郵判官惠愛于民去後民頌之曰為政不寛還不猛處心無黨更無偏南畿志湯節宣徳初調髙郵衛指揮使訓練士卒整飭城垣樓櫓器械無不堅好尤能恤軍愛民好賢禮士殱湖㓂賑貧窮建露觔女祠以勵風俗勉軍余就學以知禮義綽有儒將風陞參將益著能聲南畿志耿九疇正統初大臣言兩淮鹽法之弊因擢為運司同知九疇性節儉嚴肅豪商勢宦凜凜不敢侵漁嘗奏鹽法便宜數事多見允行進鹽運使守法益堅為不便已者所誣逮上知其寃釋之後為都御史清理兩淮塩法益有聲卒諡淸惠南畿志王恕正統間知楊州嵗饑發廩不俟報其給醫藥多所全活作資政書院教郡弟子科不乏人在政五年亷仁公恕明察果斷遷去揚人立石志思南畿志劉蘭景泰初同知揚州府嵗饑寛民租賦嘗築淮河口抵鹽城潰隄百餘里以障民田修儀真𤓰洲牐壩使河不壅流至今賴之先是漕卒用軍後更用民民困甚蘭申狀克復舊又覈實鹽竈稽户補曠民獲以安致政歸揚民立徳政碑頌焉南畿志王勤天順間知揚州府平易簡實愛民若恐有傷在任九年操持如一百姓至今頌之南畿志李紱成化間任揚州府同知潔已愛民嘗築堤復坍江田數萬頃又董開髙郵康濟河挑揚州𤓰洲儀真運河當道旌保其績加四品服尋卒于官南畿志蕭盛成化間通州判官清慎孶牧嘗修學舎又浚築岸百二十里民享其利南畿志田瓊成化初揚州府學教授持已教人一時士皆砥行礪學嘗出已資濟士貧乏揚人至今稱之南畿志蔡暹成化末知泰興縣政教兼舉寛猛得宜嘗築江堰一萬六千七百餘丈賑借饑粮一萬三千三百餘石人蒙其惠南畿志房瀛𢎞治間揚州府推官性峭直理刑必盡兩情更無觀望意時為刑官第一擢監察御史南畿志羅賢𢎞治間泰興知縣勤勸課修水利政在惠民不避強禦儉約之操尤著南畿志裴紹宗正徳間知海門縣剛直有為縣被江患民日凋弊乃抑裁浮費奏蠲江坍之粮民賴以蘇息擢兵科給事中南畿志流寓王播其先太原人父恕仕唐為揚州倉曹參軍因家焉貞元中與弟炎起皆有名並擢進士俱歴官至左僕射播累封太原郡公起封魏郡公查道徽州人祖父皆仕南唐宋平金陵道侍其母渡江居如臯奉養以孝聞母病思鱖􅃵方冬苦寒道泣禱於河得鱖以歸母病尋愈仕宋累官至右司郎中知虢州許元宣州人徙居如臯仕宋累官國子博士慶厯初京師乏軍儲范仲淹薦為發運判官至則發瀕江藏粟轉漕而西京師足食累遷至天章閣待制曽孝序泉州人仕宋監泰州海安塩倉因家泰州累官至環慶路經畧使過闕與蔡京論講議司事忤其意竄嶺表後知靑州兵亂與其子訏皆遇害趙訓之宋宗室居揚州登政和進士知吳縣朱勔怙勢訓之移疾去金人入㓂訓之募士勤王聞汴京䧟乃止建炎中知永蘴縣孟太后避兵䖍州䕶衛統制叛訓之率兵拒戰被害任伯雨眉州人仕宋為左正言力陳章惇蔡京之非崇寜中黨事作削籍編管通州陳次升興化人家於儀真宋時中進士官至侍御史右諌議大夫遷給事中㑹除蔡京參政次升力陳其不可謫知潁州府後削籍貶循州陳瓘南劍州人仕宋權給事中崇寜中其子正彚告蔡京有動摇東宫迹下正彚開封獄併逮瓘瓘曰京之奸邪固嘗論之於諌省豈特今日語言間耶獄具竟流正彚海上瓘亦安置通州張汝明盧陵人徙居真州刻意屬文舉進士歴官州縣簿丞凡二十年最晚知岳州屬邑得古編鐘求土獻汝明曰天子命我以千里懼不能仰承徳意敢越職以幸賞乎郝經澤州陵川人元世祖以經為翰林侍讀學士使宋告即位且定和議宋賈似道方以却敵為功恐經至謀泄竟館經真州驆吏棘垣鑰户晝夜守邏欲以動經經不屈及元伯顔南伐先遣使問執行人之罪宋懼以禮送經歸經拘宋十六年思託言垂後撰續後漢書易春秋外傳等書凡數百卷張䇓其先𨗳江人受業金華王栢得朱文公之學及周程張氏之㣲元中丞吳曼慶延致江寧學官俾弟子受業其在真州學者尤衆逺近翕然尊為碩師稱曰𨗳江先生宋應龍仕宋為諮議官寓泰州應龍儒生知兵出入行陣三十餘年元兵至泰州禆校開門迎降應龍與其妻自縊園中時提刑諮議褚一正督戰於髙沙被創竟投水死知興化縣胡拱辰亦死之蘇大年世家真定逰學廣陵因家焉有碩學鴻才不受辟舉元至元間上書於朝官以編修卒平生著述甚多號西澗又號林屋洞主賀庸其先武威人庸受經於余􅊴仕元累官至𢎞文館學士本朝初寓居興化以教授為業所著有野堂集人物秦邵平廣陵人為東陵侯嘗為陳勝狥廣陵後為布衣種𤓰長安城東𤓰有五色甚美世謂之東陵𤓰今廣陵有東陵亭疑即平所封地也漢劉瑜廣陵人好經學尤善圖䜟天文歴筭之術州郡禮請不就延熹中始舉賢良方正陳琳廣陵人初為何進主簿後歸曹操操愛其才軍國書檄多琳所作操先苦頭風是日疾發卧讀琳所作翕然起曰此愈我病數加厚賜官至門下督琳建安七子之一也三國陳矯廣陵東陽人初為郡功曹郡嘗被孫權圍矯求救於曹操曰鄙郡雖小形便之國也若救為外藩則吳人挫謀威聲逺振操乃遣兵赴救吳兵退避累遷尚書令明帝嘗幸至尚書門矯跪曰陛下欲何之帝曰欲案行文書耳矯曰此是臣職分非陛下所宜臨也帝慚囘車其亮直如此卒謚貞侯張紘廣陵人漢末辟舉皆不就避難江東委質孫䇿䇿身臨行陳紘每切諌後為長史權再征合肥紘曰兵貴時動宜廣開播植任賢使能順天命以行誅可不勞而定也權為止所著詩賦十餘篇吕岱廣陵人吳孫權初統事岱處法應問甚稱權意後為交州刺史清身奉公討平髙凉等賊時已八十體素精勤躬親王事張承稱其功以權成化與道合君子嘆其徳小人恱其美後拜大司馬卒其年九十六范慎廣陵人仕吳為侍中補武昌左都督孫皓嘗曰慎勲徳俱茂朕所敬憑宜登上公以副衆望以為太尉後歸老軍士戀之舉營殞涕盛彦廣陵人少有異才母因疾失明彦不應辟召躬自侍養疾乆奴伺彦出取蠐螬炙進母食之美且疑之藏以示彦彦見之抱母痛哭幾絶母目即開後仕呉至中書侍郎又仕晉為中正晉劉頌廣陵人咸寜中守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免在職六年號為詳平時以比張釋之元康中為尚書加光禄大夫卒諡貞華譚廣陵人博學多通有口辯揚州刺史周浚愛其才器待以賔友之禮後舉秀才歴官尚書郎永寧初出為郟令時境内饑饉譚傾心撫䘏甚有政績官至秘書監加散騎常侍著書三十卷名曰辯道戴淵廣陵人有風儀性開爽舉孝亷累轉祭酒出守豫章後死於王敦之難贈右光禄大夫儀同三司諡曰簡南北朝吕僧珍廣陵人家甚寒㣲容貌甚偉少從師學有相士指曰此兒有竒聲封侯相也事梁武帝為輔國將軍封平固縣侯後拜南兖州刺史尋徴還卒諡忠敬杜僧明廣陵人形貌眇小而有膽氣善騎射陳武帝引為主帥從之征討所向克捷武帝表為長史仍隨東討以功除南兖州刺史進爵為侯卒贈散騎常侍諡曰威隋來䕶兒江都人㓜立竒節仕為大都督以平陳功進位上開府後累擊賊有功進封榮國公江都之難宇文化及忌而害之曹憲江都人仕為秘書學士聚徒教授凡數百人公卿多從之逰唐貞觀中召不至即其家拜朝散大夫太宗讀書有竒字輒遣使問憲憲具為音註援騐詳複卒年百餘嵗唐李彦博廣陵人學無不通尤好地理嘗為地志圖内自五侯九伯外至要荒蠻貊禹跡之所窮漢驛之所通皆據書而畫隨方靣以區别萬邦錯峙炳焉可觀來濟䕶兒子少篤志文章舉進士累官中書舎人太子承乾敗太宗問侍臣何以處之濟曰陛下上不失為慈父太子得盡天年則善矣髙宗時累遷中書令帝欲立武氏為后濟諌不可後貶庭州刺史突厥入冦總兵拒之没於陣石藏用江都人仕為右羽林大將軍明於歴數嘗召家人謂之曰天下將有變而蜀為最安處乃去依其親眉州刺史李滈遂家焉王紹宗江都人少時貧嗜學工草𨽻書徐敬業起兵以弊刼之稱疾不起武后時擢秘書監紹宗雅修飭當時公卿莫不慕悦其風五代潘佑廣陵人少貞介文章贍逸尤長於議論仕南唐為秘書省正字遷中書舎人後主所為乖謬佑上書謂若不急圖善政國必亡後主怒而殺之宋太祖聞其賢官其一子徐鉉廣陵人十嵗能屬文仕南唐累官吏部尚書後歸宋為太子率更令太平興國初直學士院從征太原加給事中出為散騎常侍鉉精小篆為文章有典則於金石之文尤簡徐鍇鉉弟南唐時第進士累官集賢殿學士宋李穆使江南見鉉及鍇文章乃嘆曰二陸不能及也得所著有說文通釋方輿記宋崔希甫髙郵人有文武才畧潘美薦于朝召見賜金紫知原州拜監察御史更置諸道事務又靣賜金帶仍命賜魚時號重金御史陳知微髙郵人沉厚有才幹擢進士甲科歴京東轉運副使奏還東平監所侵民田六百八十家又决古廣濟河通運路罷夾黄河嵗减夫役數萬計後判司農寺子堯卿進士及第受卿為奉禮郎潘閬江都人至道初自布衣賜進士及第授國子四門助教初賣藥京師有言其能詩者因召見崇政殿遂官之王伯起海陵人父綸仕為太常博士伯起舉進士不第嘆曰士不自重而獻藝求售可恥也於是閉門肆志於學人莫窺其靣仁宗英宗俱賜粟帛王覿誌其墓謂伯起不有其道而道著於朋友不居其名而名聞於朝廷栁植真州人少貧自奮于學舉進士甲科累官至翰林學士歴知夀亳蔡相四州平居畏慎寡言笑所至官舎蔬果不輒採家無長物時稱其亷胡瑗海陵人仕為蘇湖二州教授立經義治事二齊倡明體適用之學出其門者皆循循雅飭後居大學四方歸之庠舎不能容自河汾以後能立師道成人才者必以瑗為首稱焉吳及通州靜海人舉進士累官太常博士至和中上疏言繼嗣事仁宗異其言用為諌官以勁直稱遇事無大小輒言之後遷貟外郎直昭文閣吕溱江都人有俊才嘗作鵾化為鵬詩有九霄離海嶠一息到天池之句仁宗見之曰此當作狀元後舉進士第一累遷龍圖閣直學士知開封府為政精敏京師稱之後復遷樞宻直學士周孟陽海陵人登進士為王宫教授時英宗居環列孟陽嘗從容陳古事以諷英宗悚然起拜及即帝位以為集賢殿修譔兼侍讀神宗初立啟沃尤多官至天章閣待制既卒兩宫測然命官其孫仍賜白金千兩孫錫儀真人舉進士第以文學見稱居官忠厚正直除刑部時有逮捕繫獄者一百二十人勅遇赦不原錫獨奏釋之後持憲淮南考課為天下第一知舒州發常平廣惠倉以活陳許頴蔡流人不可勝數官至司封郎中孫洙錫之子舉進士應制科上策論五十篇指陳治體分辨得失韓𤦺讀之太息曰今之賈誼也神宗稱其學術行義擢翰林學士文詞典麗有西漢風施昌言通州静海人舉進士通判徐州遷尚書屯田員外郎知太平州上政論三十篇入為殿中侍御史以老求罷知越州卒顧忻泰州人十嵗喪父以母病葷辛不入口者十載每鷄初鳴具冠帶率妻子詣母室問所欲如此者五十年母老目不能視物忻日夜號泣祈天母目忽明年九十餘無疾而終孫長卿揚州人以外祖朱巽䕃為校書郎拜龍圖閣直學士知定州神宗知其能轉兵部侍郎長卿長於政事為時能臣性亷介不以一毫取於人喬竦髙郵人以學行推於時教授鄉里從之學者多以文行知名而淮南數千里間髙郵若齊魯自竦發之孫覺其徒也孫覺髙郵人舉進士神宗時修起居注靑苗法行覺論其非時言者亦以為畿内有追呼抑配之擾神宗令覺行視虚實覺上疏曰臣以言為職體量非臣事黜知廣徳軍踰年徙湖州累遷吏部侍郎除龍圖閣直學士孫覽覺弟舉進士累遷直學士徙知永興軍成都府後請祠覽為人剛直在朝敢論諍不肯阿徇於吏事亦精敏張日用靜海人知新昌縣見郡曹掾之子鄭獬竒之妻以女後果魁天下文彦博宣撫河北日用謂彦博此行須得便宜行事請于上遂許之擒王則實日用參賛之力也張次山日用子少俊邁有才年十六即入仕調泰興簿因開河部夫整肅工力多先辦包拯薦諸朝清名直節見知於司馬光遂知泰州有鸛訴於庭次山呼兵官使隨去乃其雛為人所烹次山為斷治鸛始退飛崔公度髙郵人口吃不能劇談書一閲即不忘遂覽群書英宗時擢國子監直講不就熙寜中作一法百利論以進召對擢光禄寺丞知陽武縣後復召對命以館職終直龍圖閣王惟熈如臯人初調鹽城尉有郡飲而弊者囚莫肯承州以屬尉惟熙脱其械與飲食問一人曰汝用左手而死者傷右尚何拒囚伏罪儂智髙反嶺南諸吏棄城當死者數十惟熙奏以城不足恃皆得免孫升髙郵人舉進士元裕時歴三院御史遷起居舎人危言讜論朝野憚之忤時宰意以集賢殿修撰出知應天府遷天章閣待制所著有談圃秦觀髙郵人長於議論文麗而思深元祐初蘇軾薦於朝除太學博士遷國史院編修官坐貶有淮海間居集孫鼛江都人年十五㳺太學以父直言任調武平尉徽宗時為屯田貟外郎鼛㣲時與蔡京善京逆謂曰我若大用願助我鼛曰公能謹守祖宗法以正論輔人主天下幸甚鼛何為者京為相鼛以忤京奉祠後起知單州致仕喬執中髙郵人舉進士累官給事中刑部侍郎執中寛厚有仁心屢典刑獄雪活以百數紹聖初出知鄆州與孫秦齊名號三賢周秩泰州人熙寧中與兄穜俱擢第歴官有聲紹聖中革元祐政時文彦博子及甫有私語忤時相以秩為京西轉運使俾推治之秩至竟雪其寃王覿惟熙子舉進士為秀州司户參軍哲宗即位擢右司諌首陳知人安民之術徽宗立累遷御史中丞論蔡章之惡以龍圖學士出知潤州後安置臨江軍吳敏儀眞人妙齡秀發大觀初辟雍私試首選蔡京愛其文欲妻以女敏辭之累官校書郎欽宗初立擢知樞宻院事終廣西湖南宣撫使沈銖真州揚子人舉進士髙第為國子直講遷中書舎人兼侍講常講南山有臺詩哲宗屢首肯之後以龍圖學士知宣州王俊儀覿從子少有直節以太學上舎選奏徽宗閱其文擢為第一見容貌甚偉曰真所謂俊儀矣宜即起用蔡京欲見之拒而不徃僅拜國子博士遷右司貟外郎以直秘閣知岳州沈錫銖弟仕為講議司檢討蔡京銓次元符上書人欲定罪錫力言其不可京不從拜兵部侍郎以徽猷待制知應天府歴海泰汝宣四州以通議大夫致仕王昴江都人以文章稱於時政和中進士是年嘉王居首選徽宗以親王為嫌陞昴為第一除秘書省校書郎髙宗時除起居舎人秘書少監王居正揚人少嗜學㳺太學司業王齊見其文曰王佐才髙宗時為起居郎後忤秦檜出知婺州又奪職奉祠居正學根据六經楊時器之著書詩周禮辨學數十卷李易江都人髙宗幸揚州御行殿䇿試賜易以下及第出身易好學多聞以清素自立仕至中書舎人敷文閣待制揚州有三魁謂吕溱王昴與易也李衡江都人㓜博學為文操筆立就紹興中進士歴州縣專以誠意化民累官至侍御史改起居郎以祕書修撰致事潘汝一海陵人淹貫經史善文章建炎中許容攝州事迎敵西郊汝一不食數日所親强之乃起敵遣人誘之乃罵曰吾生於宋死於宋闔門為忠義鬼含笑入地矣後以進士名次得官更歴州縣牛大年揚州人慶元進士歴仕州縣清操凜然知黎州治鎧甲増科錢以優郡兵會大水即以私帑賑民比還朝一夫荷擔而已郡人歌之官至寳章閣侍制周麟之海陵人舉進士歴官兵部侍郎兼給事中髙宗謂之曰給事之命非左遷也欲觀卿心術耳充金國哀謝使言辭詳雅敵為加禮後拜同知樞宻院事許叔微真州人篤志經史尤邃於醫建炎初大疫叔㣲親行里巷為之診療所活甚衆夢神人曰上帝以汝隂功錫汝以官因留語云藥市収功陳樓間阻堂上呼盧喝六作五後第六人登第升第五人在陳阻言樓材之間劉大中揚子人素志不羣歴官州縣直道自將僚友憚之用趙鼎薦累遷吏部尚書除參知政事以資政殿學士致仕吳志興揚子人世篤孝義其家七世三百年不分異積善好施鄉人稱為吳善三公髙宗封為迪功郎卒年九十三子汝明嘗刲股療母疾有靈芝生堂側開禧中虜入境他室廬皆焚蕩汝明室獨存嘉定中旌其門崔涇靜海人為兒時見蟻出穴不敢踐及長見蠅蝶投網必與救脱見網罟者多與之錢令其改業又率鄉人共為放生㑹後其子為郡文學二孫端禮端詩皆登進士致身華要人以為活物之報云本朝李民瞻泰興人由前元舉人選充通賛官洪武三年授都督府都事陞刑部侍郎再遷尚書後改户部卒于官潘原明泰州人初與張士誠俱起鹽徒元兵圍髙郵士誠與原明突圍出走後為淛江行省平章事守杭州本朝右丞相李文忠師至錢唐原明以城降仍授平章事後平雲南以原明掌布政司事卒賜葬鍾山之隂王鼎儀真人趙忠之養子洪武初渡江從征有功累授行樞宻院判鎮池州趙普勝冦池州忠出戰沒於陣鼎襲忠職復姓王守太平陳友諒攻太平鼎力戰死之追封太原郡侯朱顯忠如臯人嘗為張士誠將守松江洪武初以城降從征有功授濠梁衛指揮僉事調守文州㑹西冦攻城顯忠力戰死贈鎮國將軍都指揮使張麒興化人張氏之亂奮勇從義征伐有功洪武初授江西行中書省參知政事馮諒興化人洪武初以才能顯用累官至刑部尚書陸闓興化人父謙為湖廣都司斷事闓博學多能詩畫書法皆精緻洪武初任楚府伴讀所著有續古樂章并詩集弟顒由明經累官至禮部貟外郎嘗奉使朝鮮又嘗纂修實録善詩畫字時稱三絶袁復寳應人洪武間以才能薦為吏科給事中歴任大理寺右少卿成璡興化人洪武中授代州學正陞蔚州知州為政清肅與守將恊修邉備民賴以寧永樂初命為北平布政司參議制辭有致朕無北顧之憂之語卒追封吏部左侍郎洪熙初贈兵部尚書顧成江都人狀貌魁偉膂力絶人洪武初兵臨和州成仗劍詣軍門命居幕下數從征有功累陞都督僉事及靖難兵起軍師縶成至以先朝舊人得釋成感泣歸欵後以居守功封鎮逺侯卒追封夏國公諡武毅陳珪泰州人自㓜勇畧過人洪武中歴官武職勤勞不怠永樂初以靖難功封泰寜侯髙榖興化人永樂中進士選為庶吉士歴官翰林院侍講正統初楊士竒等以其學術醇正薦為經筵講官預修實録屢典文衡歴陞工部侍郎兼侍講學士入内閣與機務進工部尚書東閣大學士致仕卒諡文毅曹義儀真人宣徳正統中以都督鎮守遼東有邉功進封豐潤伯諡荘武黄瓉儀真人舉進士累官四川參議奔母喪歸三年麻衣不解寝室不入蕭然環堵後居方伯京尹一如寒士巡撫山東貪吏聞風解綬進南京兵部侍郎致仕瓉古貌古心出乎風氣之外為文典雅不為人諛辭盖不多見焉南畿志髙昭寳應人工文學寳應舉進士自昭始嘗為巡按御史有王府隂蓄異志昭先變服作星家㣲諷之既而按其地王謀遂寢髙文毅以兄事之嘗見其文嘆曰兄才不啻十倍于穀而位止于是豈非命哉南畿志崔潤海門人事親以孝聞天順間任湖廣彬州同知清白自勵歴任九載不渝及歸民拜送塞道居家益以禮自防日課諸子孫而已南畿志顧雄通州人成化間進士為户部貟外郎以病乞歸及卒囊無餘貲鄉人稱清白吏南畿志儲巏泰州人少舉鄉試禮闈皆第一進士二甲第一累官南京吏部侍郎疾革取紙筆書國恩未報親養未終而卒所遺鬚髪手足甲各以囊盛隨殮其愛親敬身如此南畿志徐蕃泰州人舉進士授南京吏科給事中上事及瑾逮捕京師廷杖幾死落職瑾誅起復累進工部侍郎以目疾乞歸卒蕃性簡直剛毅居官淸介雖餽贈不輕受焉南畿志楊果興化人舉進士累轉吏部文選郎中杜請托抑奔競居太僕疏便宜十餘事多允行陞户部右侍郎時中貴擅儲賦寘于法不少貸後以母老乞養卒于家南畿志周臣通州人由進士改刑部主事有大臣子坐奸淫竟正其罪以是出為薊州同知清審徭役蔚有能聲轉順天府推官㑹疏逆瑾責朝官廷跪于日中臣抗聲辨詰校尉叱之則擊以手板至晚氣絶士大夫惜之畿志姚繼巖通州人由進士官吏部十年徧歴四署而三入考功陞太常少卿卒于官貧不能𦵏畿志朱應登寳應人𢎞治己未進士累官雲南參政致仕應登自少文工雋藻詩尚俊逸書法淸勁海内舉知其名畿志王艮泰州人從王陽明㳺力行孝義府院交薦辭不出志略列女魏氏唐江都人樊彦琛妻彦琛病篤魏欲殉以死彦琛固止之及卒徐敬業之難魏氏䧟軍中聞其善音律命鼓筝即以刀自斷其指軍中欲強之以刀礪其頸魏厲聲曰狗盗乃欲辱人刺死吾志也遂遇害周迪妻廸洪州商人也唐末楊行宻圍揚州時食盡軍士殺人而賣其肉迪妻曰勢窮蹙如此義不兩全君有老母不可不歸妾請鬻以備行資遂詣屠肆得白金一鋌使歸至門守者得金詰之不信共詣肆念其實妻之首已在案上矣衆嘆異共以帛遺迪収其餘骸歸晏氏殊曽孫孝廣之女也宋建炎三年金人至揚孝廣為尉死之女年十五有美色為金人所得欲妻之女即刎縊求死金人皆義之榮氏真州人宋將作馬監簿妻建炎兵亂女奉姑擕子以逃賊以兵脅之不從賊怒傷其姑榮氏叱之賊又殺其子欲取以行榮氏自刄其臂罵賊不已遂遇害毛惜惜髙郵妓也宋端平初别將榮全據髙郵以叛制置使遣人招之不聴全與同黨王安等宴飲惜惜耻於供給安斥責之惜惜曰初謂太尉降為太尉更生賀矣今乃閉門不納使者乃叛逆耳妾雖賤妓不能事叛臣全怒遂殺之後人為立廟張氏女髙郵人元末兵亂賊知女有姿艷叩其家索之女匿複宇間聞賊將害其父母乃出拜賊即㐲地拜其父母而以女行女欣然從之過河橋投水死髙氏婦髙郵人携其女從夫避亂見道旁空舎入其中脱金纒臂與女且語夫令疾行夫挈女稍逺乃自經死賊至焚其舎夫抵儀真夜夢歸告曰我已縊死彼舎矣其精爽如此管氏二婦揚州人管賢妻􅊴氏管哲妻馬氏洪武中賢卒􅊴氏年二十六一子在襁褓且瞽誓死不嫁後哲繼卒馬氏年二十一姑以其無嗣諷之他適馬氏曰伯氏能守節我獨不能乎娣姒力事紡績以養姑瞽子稍長教之學星卜以資日給姑以天年終併力𦵏之後二婦俱年七十餘郡上其事旌為雙節髙氏江都人儒學生戴和妻永樂中和鄉試不利抱愧投水死髙氏每哭踊頻絶誓不獨生一日盛餙白姑歸寧父母乃詣夫沈處號數聲亦投水死事聞旌為貞烈陳氏儀真人髙慧妻生子二次名厚補邑庠生入太學夫之妹髙氏贅婿錢信生子定方二嵗信早卒陳與髙同守節三十餘年正統五年旌為䨇節之門南畿志薛寛妻牛氏江都人寛為臨海令無子過杭娶牛為繼室寛卒牛年二十九族人強之嫁牛即赴水強者乃止四十餘年針指引日而已事聞詔旌其門侍郎葉相銘其墓南畿志顧氏朱漢雲妻如臯人夫亡守節洪武間旌其門南畿志何氏二婦泰州人何永明妻沈氏二十三而寡弟婦楊氏亦二十三而寡沈子謙楊子誠皆在襁褓相以死誓終養其姑二子各獲成立郡守扁其堂曰雙節南畿志張大本妻潘氏海門人大本亡時年二十守節孀居夀一百餘嵗而卒南畿志左氏江都人劉徳妻徳亡守節宣徳初旌表南畿志閔氏儀真人曹三妻夫亡守節事聞旌表南畿志薛氏髙郵人陳原友妻夫亡守節詔旌異之南畿志沈氏興化人李鎮妻夫亡守節有司上其事詔旌表之南畿志鄭氏冀絅妻寳應人早寡守節詔旌表之南畿志陳氏李巖妻夫亡守節受旌南畿志尹氏通州人孫昕妻早寡守節事聞旌表南畿志徐氏海門人崔發妻夫早喪徐為守節旌表南畿志仙釋李珏唐廣陵人以販糴為業每斗惟求利兩文以資父母有糶與糴即授以升斗俾自量丞相李珏節制淮南夢入洞府見石壁填金書姓名内有李珏字方自喜有二仙童云此乃江陽部民李珏爾卒年百餘嵗顔筆仙髙郵人少落魄宋建炎初鬻筆遇仙日售筆十則止㑹轉運使過境見之問曰能飲否曰可飲一斗飲畢長揖而去遺所携筆籃於舟中轉運俾左右取而還之盡力莫能勝凡得其筆者剖而視之管中必有一詩或偈紀其破毁嵗月及人姓氏禍楅無不騐者故號筆仙年九十七一日積葦庭中坐其上自舉火焚之人但見烈熖中乗火雲飛昇而去贊寜宋𩔖苑云僧賛寜有文學洞古博物著書數百卷王元之輩嘗就質疑栁仲塗守維揚嘗贈之詩有空門今日見張華之句石塔長老宋僧住石塔寺蘇軾守維揚與之徃還後退院歸西湖軾以疏留之云明一統志卷十二
