body:
  text: 明一統志卷十二明李賢等撰揚州府東至海三百六十里南至江六十五里西至應天府六合縣界一百二十里北至淮安府山陽縣界二百八十里自府治至南京三百三十里至京師三千一百一十五里糧二十四萬六千七百石零建置沿革禹貢揚州之域天文牛斗分野春秋時地屬吳後屬越戰國時屬楚秦為九江郡地漢初為淮南國又更為吳國景帝更為江都國武帝時更名廣陵國屬徐州東漢初為廣陵郡三國初屬魏後屬吳晉廣陵郡移治淮隂此地屬焉東晉分置海陵山陽二縣劉宋置南兖州治廣陵縣齊梁因之北齊改為東廣州陳復為南兖州後周改為吳州隋始改為揚州大業初改江都郡治江陽縣唐初復為南兖州改䢴州尋復為揚州治江都置大督都府天寳初改廣陵郡乾元初復曰揚州置淮南節度五代時楊吳都於此改江都府南唐以為東都周世宗取揚州仍置大都督節度宋初因之屬淮南東路建炎初陞帥府元至元中建大督都府置江淮等處行中書省尋改為揚州路屬河南行省本朝庚子年置淮海府壬寅年改維揚府丙午年復為揚州府直𨽻京師領州三縣七江都縣附郭本秦廣陵縣地漢置江都縣屬廣陵國晉屬廣陵郡隋屬江都郡唐始以為揚州治所復析置江陽縣南唐以江陽省入廣陵宋復省廣陵入江都治州城東南隅元徙治北關外元末毁本朝辛丑復置江都縣編户一百一十九里儀真縣在府城西七十五里本漢江都縣地唐為揚州揚子縣地五代時楊呉為永正縣地南唐置迎鑾鎮宋初陞為建安軍大中祥符間陞軍為真州治揚子縣政和中號郡曰儀真元至元中改真州路後復為真州本朝洪武二年改為儀真縣以揚子縣省入編户一十四里㤗興縣在府城東南一百四十里本隋唐海陵縣地屬揚州五代時南唐析置泰興縣屬泰州宋屬揚州初治柴墟鎮後徙治延令村元仍舊本朝因之編户一百一十二里髙郵州在府城北一百二十里春秋時呉邘溝地秦為髙郵亭漢置髙郵縣屬廣陵國晉屬臨淮郡宋屬廣陵郡隋屬江都郡唐屬揚州宋開寳中以縣置髙郵軍後罷軍縣屬揚州元祐中復置軍建炎中陞為承州紹興末復為軍元至元中置髙郵路後改為府屬揚州路本朝丙午年改為州以縣省入編户八十六里領縣二興化縣在州東一百二十里本唐海陵縣地楊吳始置興化縣屬揚州南唐屬泰州宋建炎中𨽻承州紹興初改為鎮屬海陵後復為縣屬髙郵軍元仍舊本朝因之編户六十二里寳應縣在州北一百二十里本漢平安縣屬廣陵郡東漢改為安宜縣梁置陽平郡隋初廢郡以縣屬江都郡唐初於縣置倉州尋廢州以縣屬楚州上元中以獲定國寳更為寳應縣宋初因之寳慶中陞為州後又陞為軍元初為寳應軍路改安宜府後罷為寳應縣屬髙郵府本朝因之編户三十四里泰州在府城東一百二十里本漢海陵縣屬臨淮郡東漢省入東陽縣晉因之梁置海陵郡隋初郡罷以縣屬江都郡唐武徳中改為吳陵縣置呉州尋廢州縣復故名屬揚州五代時楊吳置海陵制置院南唐陞為泰州後其地入于周宋初改為軍元置泰州路後為州屬揚州路本朝仍為州以海陵縣省入編户一百八十七里領縣一如臯縣在州東南一百四十五里本漢廣陵郡地晉分廣陵五縣置山陽郡時已有如臯縣莫知為縣之始隋初省入寧海縣屬江都郡唐析海陵地置如臯鎮南唐復陞鎮為縣屬泰州宋元仍舊本朝因之編户四十二里通州在府城東四百里本漢海陵縣之東境屬臨淮郡東漢屬廣陵郡晉宋齊皆屬海陵郡隋屬江都唐屬揚州五代時南唐置靜海都鎮制置院後周改為静海軍尋改通州宋改為崇州復為通州屬淮南東路元改為通州路後復為州屬揚州路本朝仍為州以静海縣省入編户一百七里領縣一海門縣在州東一百里本海陵縣東境之東洲鎮五代置海門縣屬通州以僻在海隅因名宋元仍舊本朝因之編户三十七里郡名淮海維揚俱古名江都廣陵俱漢名江陽北齊名形勝地控三齊南齊郡志地控三齊靑兖同鎮西至淮畔東届海隅土甚平曠四㑹五達劉宋鮑照蕪城賦重江複闗之隩四㑹五逹之莊向江負山唐皇甫湜集公是篇淮海重地宋蔣之竒韓忠獻祠記淮海之間揚為重地枕江臂淮宋王觀揚州賦揚州枕江臂淮為節鎮首稱東南佳麗廣陵志長淮之區綿亘数千里揚其都㑹也迷樓九曲珠簾十里二十四橋風月之景尤為東南佳麗江淮一都㑹宋司馬光送吳處厚知真州序東南繁雄之地江山清淑真州圖經據江海之㑹握􅁭帶之藪宋通州守狄遵修海隄祭文東南咽領髙郵志介于揚楚之間號東南咽領風俗土俗輕揚孔氏六帖揚州者以其土俗輕揚故名其州俗喜商賈唐書李襲譽傳揚州江吳大都㑹俗喜商賈不事農稼號為繁侈唐元和志揚與成都號為天下繁侈故稱揚益又廣陵志天下富貴一揚二益俗務儒雅吳陵志俗務儒雅雖窮巷茅茨之下徃徃聞絃誦聲性多朴野吳陵志海陵幽邃而地肥美故民惟事耕桑樵漁性多朴野民從約而易化士循理而有文郡志獄訟稀簡宋宋湜知通州制獄訟稀簡魚稻饒足為仕宦之樂土以魚鹽為業宋俞授能奏通之為郡瀕海控江南通閩粤北通齊魯民以魚鹽為業俗皆喜儒髙郵志俗厚而勤於稼髙郵題名記土髙而廣於水俗厚而勤於稼山川浮山在府城西南隅髙三尺長四丈五尺濶丈餘其狀似鐵不生草木以其浮於地上因名上有夏禹廟金櫃山在府城西七里山多𦵏地諺云𦵏於是者如黄金入櫃故名得勝山在府城西北三十里宋紹興初韓世忠大敗金人於此故名甘泉山在府城西北三十五里髙二十餘丈周圍二里上有甘泉井大銅山在府城西北七十二里又有小銅山在儀真縣西北二十五里皆漢吳王濞鑄錢之地城子山在儀真縣北六里魏文帝嘗於此築東逰臺立馬賦詩云孰云江水廣一葦可以航不戰屈人兵戢兵稱賢良神山在儀真縣西二十五里上有九江王廟方山在儀真縣西三十里與横山丫山鼎峙上有王子石鳯凰橋黄龍池唐於此置方山府横山在儀真縣西三十里上有證聖寺寺有梁昭明太子讀書堂丫山在儀真縣西四十里兩峯並峙故名古誌云唐末黄巢嘗屯兵於此靈巗山在儀真縣西七十里舊有法義院乃唐僧神建道塲山嶺髙峻南北為偃月巖前有鳯凰臺左有鹿跑泉白龍池萬山亭又有龍鬬港碼碯澗𤓰歩山在儀真縣西四十七里後魏太武南伐起行官於此諸軍同日皆臨江即此山有盤道及太武所鑿井劉宋鮑照文云𤓰歩山因㢠為髙據絶作雄淩清瞰逺擅竒含秀是亦居勢使之然也孤山在泰興縣東南七十里南枕大江巍然一峯約髙百仭上有福祠多大竹伐者必先祠此神又興化縣東南亦有孤山神居山在髙郵州西南六十里亦名土山上有排牙石人欲数之者其數必差終無能知其數之的者俗傳謝安嘗煉丹於此石井石臼猶存昭陽山在興化縣西四里有昭陽府君廟昭陽為楚懷王令尹出將入相有功徳於民故立廟祀焉雲山在寳應縣西南一百二十五里上有白龍潭水四時不竭山上雲起即雨天目山在泰州東四十五里一名土山上有雙井宋發運使蔣之竒嘗於井中獲金龍璧三十六羅浮山在泰州西北五里澤藪中不為水所沒遙望如羅浮摩訶山在如臯縣南一百二十里俗名蝦蟆山故老相傳舊多異蛇嘗有僧過之蛇分道而行因立泗州大聖祠於上改今名狼山在通州南一十八里五山相連屬嘗有白狼居其上或云山形如狼宋淳化中邑長楊鈞上書乞改狼為琅山有紫石巖提刑薛俅郡守臧師顔等有題名塔山與狼山相接其上有塔軍山在狼山東或云越王嘗軍於此馬鞍山在狼山之西以形似名刀刄山在狼山東一名劍跡山相傳秦始皇嘗於此山磨劍有劍跡存崑崙岡在府城西北八里劉宋鮑照賦軸以崑岡是也一曰廣陵謂崑崙山横為地軸此陵交帶崑崙故曰廣陵九龍岡在府城南一十五里下枕湖水桃花岡在府城西一十五里上有吳王廟基蜀岡在府城西綿亘四十餘里接儀真界舊傳地脉通蜀故岡上又有蜀井或云産茶味如䝉頂故名宋蘇軾詩剰覔蜀江新井水又與金陵相對看王安石詩城郭千家一彈丸蜀岡擁腫作蛇蟠眼前不道無蒼翠偷得鍾山隔水看海門島在通州海中宋長編云國初以來犯死獲貸者多配𨽻登州沙門島及通州海門島有屯兵使者領護布洲峡在通州南四十里有南布洲東布洲舊是大海其中沙漲為洲相傳嘗有布機流至沙上因名海在海門縣東一十五里南逹閩越北接齊魯揚子江在儀真縣南經通泰二州入于海昔魏文帝嘗至廣陵觀兵臨江見波濤洶湧曰嗟乎固天所以限南北也江心水謂之南泠水陸羽能辨之三湖在髙郵州繫年録云承楚相距有樊梁等三湖綿三百里宋紹興初有張榮者聚衆于此擊敗金人金人克揚州榮駐龜潭湖積茭為城又距州六十里有五湖蔣之竒詩三十六湖水所瀦其間尤大為五湖甓社湖在髙郵州西三十里宋崔伯易有賦叙云孫莘老家於湖隂夜讀書覺牕明如畫循湖求之見大珠其光屬天是年莘老登科黄庭堅詩甓社湖中有明月淮南草木借光輝得勝湖在興化縣東一十里宋張榮賈虎率山東強壯號義軍由梁山泊與金人轉戰至於承楚師皆舟艦時金監軍達蘭在泰州榮等設㐲掩擊於縮頭湖大敗其衆因更名得勝白沙湖在興化縣東南一十里南兖州記云湖岸有白沙吳公湖在興化縣北二十三里昔有呉尚隱居湖側因名平望湖在興化縣北二十里南接官塘其水四望平坦故名白馬湖在寳應縣北一十五里包老湖在泰州東北四十里其水清而無滓湖靣雖與他水㑹而不雜挈壺氏嘗以此水供滴漏千人湖在興化縣東一百二十里相傳隋末有千餘人避難於此因名鷄雀湖在泰州東北五十里昔多雞雀飛集因名官河即古䢴溝昔吳王夫差將北覇中國自廣陵城東南築䢴城下掘深溝謂之䢴江亦曰䢴溝自江東北通射陽湖又西北入淮一名漕河左傳呉城䢴溝通江淮即此伊婁河揚子鎮以南至江運河也自隋以前揚子鎮尚臨江至唐時始積沙至二十五里開元中潤州刺史齊澣穿此河白塔河在府城東北六十里南通揚子江北抵運河其水冬涸春泛民得灌溉之利獅子河在儀真縣治南與運河通鳯凰河在興化縣北三十五里以仲氏兩舎人世掌絲綸得名游龍河在如臯縣東南六十里通於大江又名九十九灣樊梁溪在髙郵州北二十里源自天長縣石梁河流入州界南溪在興化縣治南宋范仲淹有南溪馴鷗詩曰萬物有常性性無不貴生鳯翔與駿奔一一逺害情耽彼沙上鷗皎皎霜雪明夜宿滄浪静日浴滄浪清何以狎溪人溪人淡無營循循自飲啄徃徃相逢迎徘徊兩無情何慕復何驚蓮塘浦在興化縣東接得勝湖本朝髙穀詩芳蓮無數滿芳塘絶勝西湖十里香帯露有情誇麗色臨風無語鬬新粧花邉每見檠青葢葉底還看墜玉房却恠菱歌深處起一聲驚散紫鴛鴦太子港在泰州市河之西相傳王仙翁上昇昭明太子由此港徃天目山致禮沿海六港在海門縣皆通東海潮漲則盈水退則涸董井在府東城兩淮鹽運司治内即漢江都相董仲舒故宅井也後人號曰董井繅絲井在泰州西溪鎮世傳漢董永寓居于此家貧父亡貸主人萬錢葬父許身為奴道遇一女求為妻同造主人約織縑三百匹以償所貸一月而畢遂辭永曰我天之織女也帝以君孝遣我助之言訖凌雲而去井即女所汲以繅絲者玉女井在髙郵州治西南東齊郟道光與其女居井傍煉丹故名宋崔伯易有記七星井在泰州城内外布列如斗形甘泉在通州城西州地斥鹵市井皆醎宋任伯雨謫居于此因舊井