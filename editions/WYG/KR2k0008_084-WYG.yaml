令其妻侍獄中後産一男郡人歌曰蒼梧府君惠及死能令死人不絶嗣三國陸績呉鬱林太守逺俗不知學績廸以詩書士慕其風樂其教皆舍里居而從其學唐李靖武徳中為桂林道大總管南廵至藤州有遺愛州民立廟祀之元結肅宗時為容管經畧使身諭蠻豪綏定八州民樂其教立徳頌徳王翃容管經畧使大歴中蠻酋梁崇牽據容州翃至藤州以私財募兵斬賊將歐陽珪又移書約義藤二州刺史進討遂擒殄崇牽等悉復故地李曉庭藤州刺史與王翃等結盟討賊引兵攻容州拔之戴叔倫容管經畧使招懷夷落威名流聞其治清明仁恕徳宗賦中和詩遣使賜之韋丹元和中容州刺史築城壘疏隍池興學校訓耕織民貧自鬻者悉贖歸之禁吏不得擾仁化大行崔方實元和中容州兵馬使破蠻賊黄探平其窟穴獻俘以聞憲宗嘉之蔡少卿容管經畧在押衙兵馬使破黄賊隳折妖巢收復故地杜佑大厯中為容管經畧使綏懐兵民兩盡其道控制盜賊一無所犯鄭畋咸通中由翰林學士出為梧州刺史政暇遊覽多所題詠謝肇大厯中為容管經畧使討平叛卒詔荅云朕以容南寄重隆恩遂行果能制彼凶妖全活黎庶布威令于一方息忿昏于千里宋梁適知梧州五嶺自南漢時民間折税已重轉運使以調不足復折之適為奏免民甚便之郎簡知藤州興學養士一變其俗藤自是始有舉進士者陳執中知梧州不鄙夷其民陶以豈弟愛山水為篇章以道其登覽可樂者上復古要道三篇真宗異而召之姚道源治平中知鬱林州三載未嘗决大辟㑹神宗初即位遣子弟修貢例當推恩道源乃不遣子而遣弟旁郡皆愧之王次翁建炎中知容州嘗慕元結之為人取結在道州時乞免科率二奏刻之石并刻其遺像以便觀省且曰庶不墜元子之政也蔣南金嘉定中知容州興學校立貢院在任三年自以教養為事未嘗有逸豫遊樂之好趙若銑咸淳中知容州叛賊楊先攻城若銑與敵力屈死之元文魁至順中知藤州時經寇亂之後城邑蕩然魁至始立州治修城隍建學校教養百姓政化大行朱國寳以管軍萬戶鎮守梧州領安撫司事有政績劉志行知鐔津縣政事之暇以吟詠自適有梅南集行于世馮思齊至正間知藤州律身㢘潔御下寛簡惠政甚多及去任民思之不忘為立徳政碑本朝王清洪武初為容州同知時州經寇亂民不聊生清繕城隍立學校撫綏百姓勸課農桑後陞本州知州趙天鑑洪武初知鬱林州清介自持愛民如子後擢太平府知府金文仲洪武間為藤州同知文章政事有足稱者為古藤八景而題詠之趙惟清洪武間知愽白縣不鄙夷其民以禮為教由是士務學農樂耕風俗丕變與中土無異常士昭洪武中知北流縣在任以㢘幹見稱邑人老稚咸䝉其惠卒之日惟餘一青毡逺近聞之莫不歎賞蔡誠洪武末知鬱林州慈祥豈弟民心悦服值嵗飢發倉廩以賑貸不俟報及卒百姓思之如喪慈母羅觀永樂間梧州知府下車之初詢民瘼課農桑以先務為急有古循吏風謝有立永樂初知岑溪縣存心公恕吏畏民懐在任十年始終如一秩滿邑人不忍釋去保陞梧州府通判余顯宗永樂初知陸川縣蒞事公平諳練政體民之流亡悉招復業横歛者禁懲之由是田無荒棄税不愆期邑人感化流寓馮京宋宜州人嘗寓居藤之鐔津既長又寄籍武昌解省廷對皆居首選仕終叅政樞密秦觀揚州人宋紹聖初御史劉拯論其增損實錄貶官編管雷州徽宗立放還至藤州觀嘗作詞有醉臥古藤隂下杳不知南北之句至是為客道其夢中詞索水飲水至笑視之而卒時人以為詩䜟王安中中山人宋宣和初為尚書左丞靖康中為言者所論謫鬱林州有詩云宦遊梅嶺外訟訴榕庭空李光越州人宋紹興中為叅知政事忤秦檜奉祠以歸檜令中丞万俟卨誣論之謫藤州光在藤唱和有諷刺及檜者為守臣所告遂再竄海外呉元美福州人紹興中為福建安撫司機宜坐鄉人鄭瑋告其作夏二子賦譏時宰又謂其家亭號潜光有心於黨李堂名商隠無意於事秦秦檜甚惡之謫容州劉子羽崇安人紹興中坐富平之役為言者所論謫白州蜀帥呉玠上疏論子羽之功請納節贖罪乃聴子羽自便吕摭齊州人頤浩子官至朝散郎貶梧州秦檜追憾頥浩竄摭藤州摭雖在貶所以詩書自娯無幾微見詞色人物漢陳欽蒼梧廣信人治春秋左氏傳三輔决錄謂左氏春秋逺在蒼梧即欽也武帝時仕至猒難將軍陳元欽子傳父業以父任為郎抗疏請立左氏學又請勿令司𨽻校尉督察三公光武皆從之元以才髙著名辟司空府後數陳便宜不用以病去終於家子堅卿有文章史逸其論譔丁蘭蒼梧人性至孝母殁刻木為像事之如生凡家事必告像鄰人張叔者令其妻假物蘭妻白像像不悦遂弗與張叔怒突入蘭室擊木像蘭知之奮殺張叔吏捕蘭去木像為之垂淚郡縣嘉其至孝奏釋蘭罪蘭又為河内人士燮蒼梧廣信人父賜桓帝時日南太守燮治左氏春秋建安中舉茂才遷交阯太守達於從政謙虛下士時天下喪亂中國士人往依者以百數在郡四十餘嵗卒年九十士壹燮弟辟舉為司徒椽黄琬甚器重之董卓作亂交州刺史朱符為夷賊所殺燮表壹領合浦太守壹弟鮪為九真太守武為南海太守兄弟四人並居列郡威震百蠻三國士廞燮子仕呉為武昌太守自賜至廞父子兄弟並以威信著名南土出入車旗滿道夷人夾轂焚香者常數千焉唐李堯臣鐔津人貞觀中第進士累官至交州刺史賜其里門曰登俊龎孝㤗愽白人龍朔中以左驍衞將軍為遼東道行軍總管與蘇定方程名振等征髙麗孝泰以嶺南兵逼蛇水蓋蘇文來攻孝泰兵敗死之宋李時亮愽白人嘉祐中舉進士累官知㢘州有治聲嘗獻平邉十策及疏時政得失神宗嘉之累遷檢校散騎常侍兼御史大夫時亮善屬文尤長於詩與陶弼賡和號李陶集徐噩愽白人仁宗時鄉舉入仕攝知宜州討歐希範以功授白州長史皇祐間儂智髙叛噩引兵追至金城驛與賊遇力戰死之贈大理寺丞秦懷忠愽白人以文學孝㢘稱應四舉第初授徐聞令再任雷州推官平反寃獄後擢知容州所至有治聲潘盎蒼梧人常儒衣持一大翣行坐獨語皇祐中儂賊陷邕至梧城下聞其異召而問曰吾形貌如何盎曰汝一賊爾又曰梧州幾日可陷曰百年亦不陷又曰吾欲據此以有南粤如何曰汝將斬首豈能有粤耶賊怒遂害之洗積中北流人紹興中登進士第累官至朝請大夫知白州事有治聲同邑有坦中庸者亦紹興中進士累官至廣東提點刑獄李用謙鐔津人有文行歴官至國子祭酒卒贈銀青光祿大夫李奉政藤州人愽學能文紹興中舉進士累官至國子祭酒本朝莫敬山蒼梧人洪武中由明經舉任本縣儒學訓導秩滿推其才學卓異陞河南布政司叅政楊寧逺容縣人洪武中舉人擢興寧縣教諭歴遷戶部員外郎官至交阯布政司叅政龔篪蒼梧人永樂初舉進士擢嘉定縣丞有能聲歴遷兵部郎中以老成見推特陞廣東布政司左叅政列女龍氏藤縣人夫王克讓以疾卒龍氏紡績奉養舅姑舅卒殯葬以禮姑憐其少欲更嫁之龍氏曰既為王氏婦豈可再適他人誓以自守永樂間旌其門明一統志卷八十四
