body:
  text: 明一統志卷八十四明李賢等撰慶逺府東至柳州府柳城縣界七十里西至利州界七百里南至柳州府賔州界一百四十里北至柳州府融縣界九十里自府治至南京七千五百里至京師一萬一千里糧一萬四千石零建置沿革古百粤地天文翼軫分野秦屬象郡漢為交趾日南二郡界後淪於蠻唐始置粤州乾封中改曰宜州治龍水縣天寳初改龍水郡屬嶺南道乾元初復為宜州五代時為楚馬氏所有後屬南漢宋平嶺南仍為宜州屬廣西路宣和初置慶逺軍節度咸淳初改慶逺府元至元中改置慶逺路本朝洪武初復為慶逺府領州四縣五宜山縣附郭本唐龍水縣為宜州治宋嘉祐間省洛曹縣入焉熙寧間又以古陽迷昆二縣省入宣和間改為宜山縣以縣有宜山故名元仍舊本朝因之編戶一十五里天河縣在府城北九十里唐置𨽻宜州宋初因之大觀初割𨽻融州靖康初復置宜州元仍舊本朝因之編戶一十八里忻城縣在府城南一百一十里唐置芝州治忻城縣天寳初改忻城郡屬嶺南郡後復為芝州宋慶厯間廢芝州以忻城縣𨽻宜州元仍舊本朝因之編戶一里河池州在府城西二百一十五里本唐羈縻智州地宋置河池縣𨽻宜州以富力縣省入大觀初即縣置庭州改縣曰懐徳㝷廢州復改為河池縣𨽻宜州元因之本朝洪武初又省三旺州入焉㝷陞為州編戶三十四里領縣二思恩縣在州城西一百五十里唐貞觀間置思恩縣𨽻環州宋慶厯中改𨽻宜州大觀初以帶溪寨置溪州割此縣𨽻之後州廢復以縣𨽻宜州元仍舊本朝初因之今改𨽻河池州編戶一十五里荔波縣在州西北一百八十里宋置荔波州以羈縻蠻人元仍舊属南丹安撫司本朝洪武初廢入思恩縣十七年復析置荔波縣𨽻府正統十二年改𨽻南丹州今改𨽻河池州編戶一十六里南丹州在府城西二百四十里舊為蠻洞唐為羈縻極邉之地宋元豐三年立為南丹州設土官管轄諸洞羣酋元属慶逺南丹溪洞等處安撫司本朝洪武初仍為州省永鸞福延四州入焉二十八年州廢設南丹衛尋復置州編戶一十九里東蘭州在府城西南四百二十里宋崇寧五年置蘭州紹興間命土人韋姓者為知州元改為東蘭州本朝因之洪武十二年省安習忠文三州入焉編戶一十二里那地州在府城西南二百四十里唐為蠻猺所居之地名曰那地宋崇寧五年納土置地那二州大觀初析地州建隆縣置孚州宣和中孚州廢元仍為那地二州本朝洪武初省那入地改為那地州編戶三里郡名龍水唐名宜陽郡有宜山故名形勝嶺南要害郡志控牂牁昆明等十五部為嶺南要害之地控扼蠻夷嶺外代荅廣西控扼蠻夷曰邕曰宜邕屯全將宜屯半將土壤遐僻宋地理志桂林邕宜土壤遐僻接夷獠置守戍江山險峻寰宇記危峰疊嶂峙列如㦸東蘭州志風俗民性輕悍宋地理志民性輕悍大率㛰嫁喪葬衣服多不合禮人風獷戾寰宇記人風獷戾常持甲兵以事戰爭左袵椎髻禮異俗殊以岩穴為居止居民頗馴宜陽志南丹州地為蠻洞咽喉莫氏據其控扼宋錫爵命遂成市邑居民頗馴言語無異中州仗義拙朴宜陽志山川宜山在府城北二里羣山皆髙大惟此卑小有宜於衆故名天門拜相山在府城北二峰如筍崒嵂恭天宋馮京祖塋在其下南山在府城南六里山有洞曰龍隠洞門有神祠相傳盧僧坐化於此今有塑像在焉日山在府城東九里與月山相對九龍山在府城南一十里山口有潭曰九龍嵗旱禱雨多應㑹仙山在府城北二十里一名北山盤曲數里上有靈草嘉木中有丹巖玉井石枰昔陸仙翁隠此嘗有紫雲元鶴乗空而下如神仙之㑹故名青鳥山在㑹仙山東嘗有青鳥飛至因名月山在府城西二十五里風土記曰東有日山西有月年年征戰無休歇繼之曰賴得西水向東流世代永無憂謂征戰雖時有而無憂處也屏風山在河池州東北三里形如屏風智州山在河池州西四十里綿亘百餘里舊智州治在焉孟英山在南丹州西五十里北陵山在天河縣西二十里昔里人呉生師事陸仙翁脩道於此龍塘山在忻城縣北六里山有塘龍嘗潜於此疊石山在忻城縣北六十里山石重疊因名暗嶺山在思恩縣北二十里山嶂重疊日光少見故名嘯山在思恩縣西北四十五里水巗山在荔波縣西一十里龍隱洞在南山中宋方信孺詩南山山北北山南一洞中分路口三飛鶴呌雲聲自逺懶龍慳雨睡方酣襄公淡墨留蒼壁太史髙風拂翠嵐百尺巖前清絶處道人先我著茅菴白龍洞在㑹仙山中相傳唐陸仙翁曽煉丹於此宋張自明詩白龍洞口白龍臺一俯南天眼豁開蒼壁漫題三數字後人還笑我曽來龍江在府城北石岸峭險東流經柳象尋藤梧等州至廣州入南海相傳江道如龍故名小江在府城北流合龍江洛蒙江在府城南六十里流入龍江金城江在河池州東舊金城州以此為名猫兒溪在河池州西烏泥江在忻城縣西六里合龍江北流過東水源等江入于潯梧州界思吾溪在天河縣東南二里通大江三潮水在天河縣西一十里一日三潮潮退則其流一線可以溉田民受其利因名聖水立祠祀焉帶溪水在思恩縣北四十里源出荔波縣至此旋繞如帶南流入龍江宋有帶溪砦以此為名蓮花塘在府學前龍塘在府城南二里旁有龍母廟宜江井在府城東其水與龍江相消長龍泉在府城南二里泉湧出如勺合然而潤澤丘畝甚愽其水重於諸水宋黄庭堅嘗以斗量之果然懸崖泉在河池州南可漑田十餘頃婆婆泉在思恩縣北五十里其水常隠不見遇行者渇而求飲則湧出飲軍池在府城東南宋景徳間曹利用平賊時嘗飲軍於此土産銀孟英山出錫南丹那地二州及河池縣俱出豆蔻府境出草菓馬㯽榔公署慶逺衞在府城東北洪武二十九年建河池守禦千戶所在宜山縣徳勝鎮西二里原在河池縣永樂六年徙於此𨽻慶逺府學校慶逺府學在府治東宋建淳熙中知宜州韓璧重脩廣帥張栻為記河池州學在州治東北本朝嘉靖中建宜山縣學在府學西洪武初重建天河縣學在縣治西洪武七年建宫室南樓在府城上有黄庭堅所書范滂傳刻石其中籌邉樓在府治後舊名望仙規模壯麗甲於諸樓恵慈樓在府北城上俯瞰龍江御書閣在府城西二里宋守張自明建宜山堂在府治東龍溪書堂在府城西二里宋嘉定間建中設孔子像旁立黄庭堅祠四賢堂在府治東宋建祀馮京黄庭堅趙抃吕璹四賢來薫臺在府城中瘞鶴臺在府城南龍塘之旁關梁安定橋在府城西定逺橋在府城南原豐橋在府城東門外今名迎恩昇髙橋在府城東五里延夀橋在府城東二十里冷水橋在河池州東七里廣源橋在天河縣治北大通橋在天河縣南半里都黎橋在思恩縣西北二十里環江渡在思恩縣治西江口渡在天河縣南二十五里金城渡在河池州東五十里傍置廵檢司寺觀西竺寺在府城西二里舊名西明宋治平間改今名湘山寺在天河縣北𤣥妙觀在府城東舊名天慶元元貞間改今名夀聖觀在㑹仙山祠廟遺烈廟在府城西二里唐麟徳間蘇仕評以柳州亞將平賊後人立廟祀之靈潜廟在九龍山宋守張自明于廟禱雨有應請賜今額本朝封為九龍之神馮三元祠在府城東宋守李守柔建以祀馮京三侯廟在府城東三里宋莫庭浪兄弟三人有功于民民為立廟祀之古蹟鐵城在府城北三里宋寳祐間築黄應徳作記頌廢溪州在思恩縣宋大觀初置於縣之帶溪砦四年廢廢庭州在河池州宋大觀初置治懐徳縣四年廢廢觀州在南丹州宋大觀初置尋移于髙峰砦紹興四年復廢州為砦廢孚州在那地州舊本建隆縣宋大觀初置此州治歸仁縣四年廢政和中復置宣和中又廢靖南砦在南丹州舊中平縣宋大觀初置屬庭州後移於廢孚州政和中仍移于中平紹興中廢綏南砦在東蘭州之廢文州宋大觀初置紹興四年廢墟市去府城一百二十里宋時百姓相聚交易於此富安監在府城南一百六十里宋時立此監以採硃砂後廢名宦宋曹利用廣南安撫使景徳間宜州軍校陳進叛陷柳象懐逺軍利用擊敗之楊文廣廣西鈐轄知宜州時稱為名將桑懌宜州蠻叛殺廵檢官兵不能制懌以府班殿直往討悉平之遷為廣南駐泊都監陳堯叟廣西廵檢使咸平中安輯宜蠻真宗嘗嘉其能馮伸巳知宜州安化蠻犯邉伸巳率兵討之單騎出陣語酋豪曰朝廷撫汝甚厚乃自取㓕亡耶衆仰泣羅拜曰不圖今日再見馮公皆降趙抃慶厯中通判宜州有卒誤殺人法當死方繫獄病疽未潰抃使醫療之得不死尋會赦免抃愛人之周類此吕璹景祐初通判宜州㑹儂智髙將入寇璹區處防禦民賴以寧杜杞廣西安撫使時歐希範誘白崖山酋叛杞至宜州攻破白崖等砦擒希範醢之以賜諸溪洞蘇緘知宜州整飭邉備夷夏信服俞若著通判宜州黄庭堅謫居是州時黨論甚嚴士夫例削劄掃迹惟若著為經理舍館敬遇不怠又遣二子執諸生禮胡則廣西轉運使按宜州重辟凡十九人為辨活者九人熊本元豐中宜州蠻擾邉以本知桂州至則諭溪洞酋長戒邉吏勿生事選將練兵以代戍守益市馬以足騎兵宜州遂無事和斌時撫水蠻犯宜州守將戰死斌以昭州刺史提兵進討至懐逺寨示弱以驕之蠻果大至斌誘至平坂列八陣大敗之酋黨悉附遂命知宜州吕愿中廣西經畧安撫使在南丹諭降諸蠻三十一種以其地皆為羈縻州縣徐彌髙天河縣主簿淳熙初丹州為永樂州所攻彌髙諭和之韓璧知宜州清介豈弟建學宫作興士類本朝王仕忠洪武中宜山知縣慈祥豈弟深得民心甫三載陞知夀州民不忍其去彭舉永樂初為慶逺衞指揮使先是蠻獠數出掠為民害舉號令嚴明恩威廣布由是蠻人懾服百姓安堵楊禧永樂中慶逺知府㢘公有為撫字得宜及滿軍民上章請留詔陞廣西布政司左叅政仍知府事流寓黄庭堅洪州人宋崇寧初謫宜州與零陵蔣湋相友善時庭堅名在黨籍中士夫畏禍不敢往還獨湋日陪杖屨次年庭堅召還未行疾革湋往見庭堅大喜握手曰身後事委君矣及卒湋為棺斂具舟送歸人物宋莫洪㬫南丹州人開寳中遣使奉表求内附太祖刻印以給之領州十餘年嵗貢白金百兩厥後子孫世襲為刺史脩貢不懈馮京宜之龍水人從其父遊宦寓籍江夏少雋邁不羣舉進士解省廷試皆第一累官至叅知政事復知樞密院事有中立不倚之操何旦龍水人以邉賞補三班借職官至武經郎嘗為海南四州都廵檢使時蘇軾謫海外旦常往來其門得軾真染甚富黎志宜州人治平中第進士仕為化州路呉川縣令以政最加勲武騎賜緋魚袋韋經宜州人大觀中舉進士官至承議郎通判雷州權知州事有政聲莫公晟洪㬫之裔紹興中廣南經畧使劉彦適奏公晟知南丹州兼漢峒都廵檢使徭人不叛百姓安業唐儀鳳宜州人慶元間以特科文學出身初授賔州司理叅軍權知賔州後以從仕郎為化州路推官所至以㢘能稱平樂府東至廣東廣州府連山縣界五百里南至梧州府蒼梧縣界四百二十里西至桂林府陽朔縣界六十里北至桂林府灌陽縣界三百四十里自府治至南京四千四百六十里至京師七千六百四十二里糧六萬二千石零建置沿革禹貢荆州之域天文翼軫分野周為百粤地秦屬桂林郡漢屬蒼梧郡三國呉置始安郡領平樂等縣隋初廢郡以縣屬桂州大業初州廢縣仍屬始安唐置樂州治平樂縣貞觀中改昭州屬嶺南道天寳初改平樂郡乾元初復為昭州五代時屬南漢宋開寳中仍為昭州屬廣南西路元大徳中改為平樂府本朝因之領州一縣七平樂縣附郭本漢蒼梧郡荔浦縣地呉析置平樂縣𨽻始安郡唐初於縣置樂州後為昭州治宋以永平縣省入元平樂府治此本朝因之