天寳初改感義郡乾元初復為藤州治寧風縣宋徙治鐔津縣元因之本朝洪武初改州為縣省鐔津縣入焉編戶二十九里容縣在府城西二百四十里本漢合浦縣地晉分置宕昌縣梁改曰隂石縣置隂石郡隋廢郡改縣曰奉化又改曰普寧屬藤州唐置銅州貞觀中改容州以山為名天寳初改普寧郡乾元初復為容州元改置容州路後復為州本朝洪武初改為縣以普寧縣省入編戶一十一里岑溪縣在府城西南二百九十里秦為南海郡地漢屬蒼梧郡梁置永業郡尋改為縣隋屬瀧州唐置南義州後徙治岑溪縣宋避諱改南義州熙寧中州廢以岑溪縣𨽻藤州本朝洪武初改今屬編戶四里懷集縣在府城東北一百五十里本漢四㑹縣地屬南海郡晉置懷逺縣屬新會郡劉宋析置懷集縣屬建綏郡隋屬廣州唐置威州尋廢開元初以永固縣省入宋初又省洊水縣入焉元屬賀州本朝洪武初改今屬編戶五里鬱林州在府城西北三百三十里本秦桂林郡地漢屬鬱林郡隋屬鬱州後屬鬱林郡唐屬貴州麟徳初析置鬱州治鬱平縣乾封初改鬱林州天寳初改鬱林郡乾元初復為州五代時地屬南漢宋仍為鬱林州遷治興業至道初徙治南流元因之本朝洪武五年省南流縣入焉編戶三十九里領縣四愽白縣在州西南七十里秦屬象郡漢為合浦縣地唐初析置南州并置愽白縣以山為名尋改南州為白州宋廢州以縣𨽻㢘州未幾州復置政和初又廢州以縣𨽻鬱林州尋復置紹興中復廢州以縣𨽻鬱林州元仍舊本朝因之編戶三十三里北流縣在州東四十五里本漢合浦郡地隋置北流縣屬越州後屬合浦郡唐屬容州或属普寧郡宋元仍屬容州本朝洪武十年改屬鬱林州編戶十六里陸川縣在州南七十里本漢合浦縣地隋析置陸川縣屬越州大業初省入北流縣唐復置屬南巖州貞觀中屬潘州開元中属容州宋廢順州以龍豪等四縣省入移治公平淳化中又移治温水元屬容州本朝洪武四年改屬鬱林州編戶一十二里興業縣在州北六十里本陳石南縣置石南郡隋廢郡以縣屬尹州後屬鬱林郡唐屬貴州麟徳初析置興業縣屬鬱州建中初以石南省入宋開寳中以鬱平興徳二縣省入元仍舊本朝因之編戶七里郡名蒼梧漢名形勝南極水陸之衝隋志蒼梧為郡南極水陸之衝承桂海之源分鬱江之脉地總百粤山連五嶺史通前引長江北背原阜鬱林州政績堂記居百粤五嶺之中連九疑七澤之勝方輿勝覽介桂廣之間容州志容介桂廣之間盖粤檄也唇齒湖湘襟喉五羊宋丘翔蒼梧郡賦風俗質直尚信隋志自嶺以南人性輕悍俚人則質直尚信諸蠻則勇敢自立皆重財輕死人風婐盛史通力田務本不誘於末鬱林州脩學記良才秀民好學者多圖經人性剛悍不習文學十道志容管夷多夏少鼻飲跣行好吹葫蘆笙擊銅鼓習射弓弩不習文學人性剛悍輕生食用手摶刻木為契寰宇記衣冠禮度並同中州容州志渡江以來北客避地留家者衆俗化一變今衣冠禮度並同中州樂音閑美蒼梧志樂音閑美有京洛遺風俗反淳古蔡絛叢話云愽白僻陋甚故俗反淳古山川火山在府城南隔江二里山上有火毎三五夜一見如野燒之狀或言其下水中有寳珠光燭于上或言南越王佗藏神劒于山阿故深夜騰熖如火山有祥光亭又山中産物名靈麖有三足郡中有灾福或使車将至則先鳴本朝洪武中葉原賀記其事大蟲山在府城東三里搜神記云扶南王范尋養虎于此有犯罪者投與虎不噬乃宥之故山名大蟲亦名大靈金石山在府城東四里圖經載呉時有道士牽牛渡江語舟人曰船内牛糞聊以為酬舟人視之皆金也道士并牛並隠石下後因置寺名金石印山在府城北二十五里其形似印石英山在府城西桂江之上山産石英通星山在府城北六十二里南漢劉曜為太守嘗登此山仰觀星象故名南山在藤縣南二里山勢聳秀頂平如砥上有佳處曰杏壇曰松崖曰竹巷率皆清絶可愛鎡鑪山在藤縣南有鎡鑪佛舍因名石人山在藤縣南三里山勢峭拔下臨深淵上有巨石逺望如人龍驤山在藤縣南六里數峯聳列下俯清流晉龍驤將軍陳隠鎮此州嘗駐兵其下因名六爻山在藤縣西九十里山形六層如卦爻然南靈山在容縣南二里上有古壇容山在容縣西北二十五里以其迥濶無所不容故名藤容北流興業諸縣鬱林髙潯諸州分據其麓皆以此山為望都嶠山在容縣南二十里山有八峯曰兠子馬鞍八疊雲盖香爐仙人中峯丹竈而八疊竒秀最髙有南北兩洞皆天造地設道書第二十洞天即此南洞寛坦中列浮屠大像北洞差狹為星壇凡八中峯絶頂有室曰中宫院宋蘇軾送邵道士還山詩乞得紛紛擾擾身結茆都嶠與仙鄰天塘山在容縣南一百五十里上有塘水旱澇不増減故名丁蘭山在岑溪縣東三十里山下有丁蘭村相傳漢孝子丁蘭故居鳳山在岑溪縣南一百里山形肖鳳齊嶽山在懐集縣西北一百里山勢峭拔出於衆山之上故名上有龍潭嵗旱禱雨輒應筆架山在懷集縣南一百二十里峰巒秀聳如筆架然信立山在鬱林州東南二里一名牢石坡坡上有平石又有夾石形如鐘側立舊經云毎嵗秋日鄉人共候此石若雲氣覆之其嵗必稔寒山在鬱林州北二十里九域志南越王佗遣人入山採橘十日方回問其故云山中大寒不得歸因名宋余靖詩空翠紛紛冷不流風雲常是䕶靈湫山神鞭起龍行雨散作炎州六月秋綠鵶山在鬱林州西北三十五里州人於此淘取青黄泥煉成鐵鑄為鍋銅鼔山在鬱林州南七十里相傳昔有銅鼔現於此山雙角山在愽白縣西一十五里兩峯角立亦名二角宴石山在愽白縣西南六十里山皆盤石壁立峭絶北臨大江中有流泉噴激有二石相傳越王宴處伏割山在愽白縣西四十里多鸚鵡孔雀象獸山下有伏割村因名飛雲山在愽白縣西