𢷬其巢破四十二栅䧏其衆大将駐兵淮壖以拒金運給餉未嘗乏絶時稱其能錢景持知桃源縣時鍾相犯城景持與鍾力戰遂為所殺事平後贈二官凌景夏守鼎州乞减程昌寓所増蔡州官兵衣糧錢六萬四千餘緡詔减四分之一李燾知常徳府境多茶園異時禁切啇賈率至交兵燾曰官捕茶賊豈禁茶啇聴其自如訖無驚曹彦約寳慶中知常徳府陛辭言下情未通横歛未革帝曰其病安在對曰言官不及時政下情安得通都城包苴公行則州郡横歛無可疑者帝然之後在郡有治聲吕午知龍陽縣豪民陶守正殺人正其獄誅之時宰相置人才簿書賢士大夫以待用而午治縣之政特書之姚孳知桃源縣茍可利於民無不為鄉有虎孳禱諸社諭以文越三日虎仆於祠傍奏課為第一元倪徳政常徳路總管有惠愛於民民徳之既去郡人為立遺愛碑噶珊郡監有善政每嵗運輸民艱以肩荷乃從北門外至潜水十五里開河以便之嵗旱得以溉田民甚頼焉朱國寳以總管統軍鎮常徳知安撫司事時宋諸郡邑多堅守不下國寳傳檄招諭閱月悉平苖益知龍陽州洞㓂侵掠人民飢饉益振濟保撫之如子民視之如父母後陞常徳路總管夲朝張子俊洪武初知常徳府不事煩苛課農桑興學校舉行鄉飲以厚風俗應履平永樂間常徳府知府郡舊賦麥為稅履平奏易以稲民甚便之且加意學校作新士類文教勃興超迁雲南右布政使省志王斌正統間任龍陽縣丞存心愛民嘗脩圍堤不辭勞瘁務為堅厚以保障民田百姓歌曰王父母築圍堤民樂業我無飢石刻猶存省志王績成化中知常徳府持身清潔人不敢干以私禱雨于龍門洞輙應比卒囊無餘貲士民賻其䘮還其妻子省志劉纓成化中知武陵縣在任六年明習吏事諸舞文者以次摘發凡百紀綱次第偹第省志黄珂成化中知龍陽縣興學校勸農桑理寃獄嵗飢加意賑恤極有方畧全活者甚衆省志陸垹歴武昌常徳知府調知岳州府清介自持政尚大体胥徒不下州縣嵗旱躬詢民瘼首䟽于朝廷請發公帑賑濟復給牛種助耕岳民立祠祀之省志應龍𢎞治中知武陵縣敏逹有幹局時藩第初建先事經畫有條民不知擾每村創義囤積􅂖偹賑任九載民奏留増俸二級仍治縣事省志王禾正徳初知常徳府質朴嚴毅為政務持大体時藩封初至侵索百出或至加辱禾不為奪省志李􅂱以御史謫武陵縣丞釐弊革奸以清白自守郡有猾賊羣盗附于民訴之官輙以賂免􅂱得其情寘以法盗遂息武陵路當四逹民疲于傳送䟽奏請復原轄縣供役以蘇民困省志歐陽恂正徳末知常徳性鯁介政尚簡易務節省民力時洪水决堤悉心修築民困少蘇捐俸入覲秋毫無所取治行為闔省第一省志張鉞嘉靖中知沅江性剛直極甘清苦時世宗南頼廵撫臺委領支應宦官不得過索夲郡夫馬以生還人稱鐡漢張榮籓以慶賀餽金即日分給寒士以資肆業去之日即食筯破釡騐給還民其亷如此志省張澤知沅江縣移署武陵事時麻陽諸苖鴟張竊發督府駐節湖北川貴供億調度倍蓰于常而諸應不匱上下異之省志方仕嘉靖中任知府勤敏公明治賦公平一卒不下鄊落脩堤壋嵗旱徒歩祈禱積穀至四萬餘石賑荒仍奏請蠲租又作新學校周贍貧士實政鑿鑿可紀省志陸州嘉靖中知常徳府時方建造三殿湖北木運孔棘部使乘勢為奸州為調停差撥以隂折其非一時属路類以安堵省志流寓栁拱辰青州人五李時避地荆楚遂為武陵人精易春秋宋舉進士通判鄂岳州有惠愛後致政歸武陵有歸老橋曽鞏作記弟應辰子平猷等皆相繼擢第人號武陵五栁邢繹鄭人父倞宋知鼎州因家焉繹以䕃入官連倅五郡後倅襄與帥争疑獄因不仕起知興國軍秩滿歸武陵號復庵居士張庭堅廣安軍人宋舉進士歴官右正言在職逾月数上封事嘗為徽宗言司馬光吕公著之賢後通判陳州以不附蔡京列諸黨籍又坐嘗談瑤華宫非辜事編管虢州徙鼎州杜昉宋通判宻州建炎初寓居武陵㑹賊鍾相亂欲強使從巳昉罵不絶口遂遇害邵宏淵大名人寓武陵宋高宗時賊鍾相反於湖湘宏淵将兵擒其渠魁授鼎澧統領楊么犯州宏淵擊敗之用韓世忠薦授閤門舎人與劉錡擊退金人同李顯忠䧏金将達嚕噶齊等累戰有功仕至定逺軍節度使人物虞善卷武陵人居於枉山荘子云舜以天下譲於善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收歛身足以休息日出而作日入而息逍遥於天地之間而心意自得吾何以天下為哉遂不受而去宋政和間賜號曰遁世高蹈先生周屈原楚人懷王族属為三閭大夫謀行職修王甚珍之靳尚軰妬害其能譛之遂見踈原憂心煩亂乃作離騷諸篇兾君覺悟而終不見省不忍見宗國危亡自沉汨羅而死黄歇黔中人戰國時為楚相號春申君相楚凡二十餘年門下食客三千人其上客皆躡珠履趙使見之大慙後為李園所害漢田強武陵五溪酋領也王莽欲錫強銅印強有子十人雄勇過人乃曰吾等漢臣誓不事莽以其三子将五萬人下屯沅東各築一城烽火相應田子居上城王子居中城倉子居下城三國廖立武陵人蜀先主辟為從事諸葛亮荅呉使謂龎統廖立楚之良材後徙長水校尉立怏怏坐廢為民徙汶山郡率妻子耕殖自守及聞亮卒泣曰吾終為左祍矣潘濬武陵人呉孫權拜濬中郎将迁太常時五溪蠻叛濬督諸軍討之信賞必罰獲斬数萬自是羣蠻衰弱一方以寕李衡武陵人呉建興間為丹陽太守加安逺将軍每欲理産業妻習氏不許衡宻遣人於龍陽汜洲種橘千株臨終謂其子曰汝母惡吾營家故貧如此吾於汎州種橘乃千頭木奴不費汝衣食太史公言江陵千株橘其人與千户侯等盖謂此也晉閻曾武陵人避地凉州州牧張茂專伯隴右築靈鈞臺人苦其役曾夜扣門諌之遂罷役凉人大悅潘京武陵人弱冠郡辟主簿有機辨後舉秀才至洛與尚書令樂廣共談累日廣歎其才曰君天才過人若加以學必為一代談宗京感其言遂勤學不倦時武陵太守戴昌父子亦善談俱為京所屈厯巴丘邵陵泉陵三令明於政術路不拾遺龔𤣥之武陵漢夀人好學潜黙初舉秀才公府辟皆不就孝武聞其名徴為散騎常侍固辭子元夀黎民孫祈皆有聲伍朝武陵漢夀人少好學臨池學書水為之黒劉𢎞持莭荆州尤深禮異補零陵太守不就邵榮興武陵漢夀人八世同居州縣辟皆不應後旌表門閭南北朝范安袓武陵人與族人袓根齊名五世同居齊建元中旌表其門伍安貧武陵人愽雅嗜學梁累䧏𤣥纁之禮皆以疾辭嘗撰武陵圖志黄閔武陵人愽學有詞藝撰沅州志唐章懷太子註郡國志取之為證唐韓約武陵人厯兩池𣙜運使䖍州刺使權安南都䕶文宗時授左金吾大将軍初約為代北水陸轉運使修廢田嵗收粟二十萬石人頼之宋陳起沅江人舉進士調寕鄉令改令秭歸又歴湘鄉萍鄉令皆有政聲在秭歸日䟽鑿新灘舟行以安歐陽修銘其功於石終永州倅鍾正甫武陵人治平初進士與米芾善樞宻蒋之竒器之後為廣東轉運有美聲蔡京置正甫黨碑中坐謫張頡桃源人兄顒慶厯初進士以材幹聞頡皇祐初亦第進士仕州縣有能名歴廣東西等路轉運使以材諝推重於時後知荆南府楊維武陵人嘉祐中進士工詩神宗時進宫栁詩百篇上親誦数篇遂大傳播嘗召見御書清白傳家以賜之管師復武陵人自號白雲先生陳襄以師復與程頥經明行修薦為學官弟師常亦齊名楊縯武陵人志在泉石棄官隠桃源山崇寕中賜號冲真䖏士王在武陵人端平初進士治周禮真徳秀知貢舉擢冠夲經後攝倅施州城䧟死之丁易東龍陽人舉進士為編修官入元数徴不起註周易傳䟽以便學者建石壇精舍教授生徒資以廩費事聞賜額沅陽書院授以山長夲朝朱應袓武陵人永樂間由監察御史轉陞四川按察使以才能著稱何頴武陵人洪武庚辰進士擢四川峩眉令多善政邑人失牛吏捕得之頴疑其寃黙禱於城隍果得真盗累官江西按察司僉事張以澄武陵人洪武己邜鄉舉歴官勤能累陞河南布政司叅議馮貴武陵人洪武庚辰進士擢兵科給事中端謹有為陞交阯布政司叅議尋轉叅政下民悅服鄧崙武陵人永樂甲辰進士授兵科給事中遇事風生嘗條軍務十事陞河間長蘆塩運使建議塩課利害切時病者十餘事每見俞允累陞兵部侍郎卒省志李顯桃源人成化甲辰進士授户部主事監𣙜督儲並以清慎着稱性樂恬静乞改南京考功出知南康府以惠愛為政修復白鹿洞書院作興士類未及二年以疾乞歸人甚高之省志劉璟武陵人成化丙戌進士知霑化縣加意撫字民瘼拜御史出按山西憲度修明適晉藩嘗訟民奪田璟察其非是仍判還民代去士民號泣以送省志陳䇿武陵人成化丁未進士知冝興縣重厚有量政尚遁良雖居劇邑卓有能聲擢拜監察御史謹於持憲論事率循忠厚出按貴州廣西二省得体嵗甲子監河南試以藻鑑得人士論翕然歸之省志文澍桃源人成化丙戌進士歴南京刑部郎中知重慶府政尚寛平有古循吏風嵗㓙發賑有劇盗聚山澤以至誠諭之盗即觧散調忠州府即觧官歸省志談録武陵人自袓子隆以下曰文亮曰興曰惟褔曰志貴曰仲旻至録十世不分居成化間有司嘗以事上聞今子孫数傳猶守家規不變省志石瑗武陵人袓廷河嘗主家訓約子孫同㸑傳至邦逹興權應鳯子明和至瑗家益蕃衍人無間言孫偉鼎益守其訓惇尚禮譲知府陸屢造其廬大書十世同居遺之當道以上聞命有司表之復其家省志陳洪謨武陵人𢎞治丙辰進士授主事厯雲南布政使值習阿苖亂督餉濟兵克平十八寨晉都御史廵撫江西百廢具舉入為兵部侍郎署部事籌邉理戎益懋𢎞績尋乞休歸所著有静芳亭稿省志楊裭武陵人由觧元登進士第選庻吉士拜兵科給事中持正敢言忤瑾致仕瑾敗起吏科轉通政陞南京太僕寺卿省志列女張氏武陵人林徳成妻夫亡㫁指自誓守節宣徳中旌省志孫氏龍陽人史源齊妻年二十五而寡誓死守莭宣徳中旌省志史氏龍陽人袁奎妻年二十二守莭貧甚紡績奉姑撫㓜成立成化中旌省志梅氏龍陽人伍景妻梅十八適景明年景卒又明年姑舅俱亡梅父憐其少且貧欲改嫁之梅守莭不變紡績以為食節行無虧成化間有司以事上聞旌表其門省志王氏龍陽人曽義妻年十九義卒遺腹三月生子王撫孤厲莭飬姑以孝聞隆慶二年有司奏聞旌表省志亷氏諸生熊冨秋龍陽人年二十秋卒亷甘貧矢志奉姑終餘年撫子成立以承夫志鄉黨以節孝稱之隆慶間有司奏聞旌表省志仙釋黄道真武陵人晉時棄俗居高吾山修道乘白鹿而去不知所終黄洞源武陵人唐大厯間學道于桃源宫辰州瞿栢廷走武陵師事之尋遇一老尊遂辭洞源曰歸仙洞去洞源留之不可約十八年再見後洞源往潤州之茅山栢廷忽至洞源曰吾将踏滄海次日亦化温造為記其事于桃源宫藥山師名惟儼唐朗州刺史李翺謁藥山問如何是道師以手指上下曰㑹麽翺曰不㑹師曰雲在天水在瓶翺遂贈以詩曰煉得身形似鶴形千株松下兩函經我來問道無餘說雲在青天水在瓶張秉武陵人一日行山澤間遇仙女詣秉曰帝以君功在呉分故遣相配生子以木徳王其地且約踰年再㑹秉如期往果見前女以襁褓子歸秉曰當世世相承血食呉楚後生子渤為祠山神明一統志卷六十四
