body:
  text: 明一統志卷六十四明李賢等撰衡州府東至長沙府茶陵縣界一百五十里西至寳慶府邵陽縣界一百二十里南至廣東廣州府連州界四百八十里北至長沙府湘潭縣界一百三十里自府治至南京三千二百一十五里至京師六千六百六十里糧二十二萬四千七百石零建置沿革禹貢荆州之南境天文翼軫分野春秋楚地秦屬長沙郡漢初屬長沙國又分屬桂陽郡東漢長沙桂陽二郡𨽻荆州三國呉分長沙為湘東衡陽二郡晉初𨽻湘州後𨽻荆州劉宋為湘東國南齊改國為郡尋復為國梁分湘廣二州置衡州陳増置東衡州以衡州為西衡州隋初省衡陽湘東二郡置衡州大業初改衡山郡唐復為衡州𨽻江南西道天寳初改衡陽郡至德初復為衡州後置湖南觀察使治此宋𨽻荆湖南路元置衡州路又置湖南宣慰司夲朝改為衡州府領州一縣八衡陽縣附郭夲漢承陽酃二縣地屬長沙國東漢改承陽曰烝陽屬零陵郡酃屬長沙郡三國呉析二縣地置臨烝縣屬湘東郡晉宋齊梁因之陳析置新城縣隋以臨烝新城重安三縣省入衡山縣唐初復置三縣尋省重安新城入臨烝開元中改臨烝曰衡陽宋元仍舊夲朝因之編户五十二里衡山縣在府城東北一百五十里本周麋子國秦屬長沙郡漢為長沙國湘南縣地三國呉置衡陽縣屬衡陽郡晉改曰衡山隋以湘西湘鄉二縣省入屬潭州徙治白馬峯下唐復徙治於此屬衡州宋初屬潭州復屬衡州後又屬潭州元屬衡州夲朝屬衡州府編户二十一里耒陽縣在府城東南一百三十五里秦置耒縣屬長沙郡漢初改曰耒陽縣屬桂陽郡以在耒水之陽故名梁割𨽻湘東郡陳移縣冶鷔山口隋改曰耒隂屬衡州唐還舊治復改曰耒陽宋因之元陞為耒陽州屬湖南宣慰司本朝仍為縣改今屬編户三十八里常寧縣在府城西南一百二十里本漢耒陽縣地三國呉析置新平新寧二縣屬湘東郡東晉以新平省入新寧劉宋更曰常寧陳復曰新寧隋屬衡州唐改曰常寧宋因之元陞為常寧州屬湖南宣慰司夲朝降為縣改今屬編户七里安仁縣在府城東二百里夲唐衡山縣之安仁鎮屬潭州五代唐陞為是仁塲𨽻衡州宋陞為安仁縣治水安鎮元仍舊夲朝因之編户二十八里酃縣在府城東三百九十里夲漢長沙國茶陵縣地晉屬湘東郡隋廢茶陵入湘潭縣唐復置屬衡州宋取古酃縣為名元仍舊本朝因之編户一十九里桂陽州在府城東南三百里春秋戰國楚地秦屬長沙郡漢分置桂陽郡治郴縣晉析郴縣置平陽縣陳復省入郴隋因之唐置平陽縣又置桂陽監屬郴州宋陞監為桂陽軍屬荆湖南路元陞軍為桂陽路屬湖南宣慰司本朝洪武元年改為桂陽府九年降府為州以平陽縣省入編户六十三里領縣二臨武縣在州城東南一百二十里夲漢舊縣屬桂陽郡隋屬郴州唐改曰隆武尋復舊名五代晉時省入平陽縣宋復置屬桂陽軍元屬桂陽路夲朝因之編户二十五里藍山縣在州城西南二百里夲漢南平縣屬桂陽郡隋省入臨武縣唐復置屬郴州天寳初改曰藍山縣因山為名宋屬桂陽軍元屬桂陽路本朝初屬郴州後改今屬編户二十八里郡名湘東衡陽俱呉名衡山隋名形勝東傍湘江北背烝水元和郡縣志瀟湘帶其左圖經衡之為郡直鴈峯之北瀟湘帶其左湖右奥區舊志山川秀麗宋歐陽修云山川之秀麗稱衡湘人居其間得之為俊傑襟帶湘江控引交廣宋練亨甫桂陽五雲觀記南連嵠峒東接桂陽常寧圖册嶺開越嶠路轉荆門宋潘正夫桂陽詩嶺開越嶠通交趾路轉荆門入九疑山水甲天下石林亭記湖南山水甲天下桂陽乂居其髙風俗人多純樸寰宇記地有舜之遺風人多純樸民豐士閑南齊志湘川之奥民豐士閑民以漁獵為業地志淳朴近古畏法少訟桂陽志俗重䘮祭士少宦情同上俗尚農桑民知教化方輿勝覽刀耕火種常寜圖册州濵溪峒其民剛勁勇悍刀耕火種山川花藥山在府治西南俗傳昔有神仙煉丹有五色禽嘗棲於牡丹樹因名石鼓山在府城東北三里有東巖西溪朱陵後洞水經注臨烝縣有石鼓髙六尺湘水所逕鼓鳴則有兵革事花光山在府城西南十五里上有花光寺宋時花光僧居此善畫梅黄庭堅有詩石窟山在府城東三十里湘水記昔有人掘山作宂髙十丈長一里溪水過其下伊山在府城西三十五里晉桓伊讀書處亦名桓山清泉山在府城東四十里山有清泉灌田數十頃雨母山在府城西一百里亦名雲阜山上有石壇湘水記舜南逰經此後立祠毎祭有雲氣起豉江水出此山流㑹蒸水石盤山在府城西南一百二十里山有石盤界浦山在府城東二百里以其在耒陽縣界上接浦口故名芙蓉山在桂陽州西南諸峯左右特出下有䝉泉其西有巖宋職方黄照隣父子嘗讀書於此鹿頭山在桂陽州東山有石如鹿及有塔七層大湊山在桂陽州西舊經云出銀鑛當其盛時爐烟蓊然上接雲漢烹丁紛錯商旅徃来輻凑因以為名今鑛絶龍渡山在桂陽州南三十里州之望山也有神甚靈宋陳傳良嘗為文記之下有源泉灌溉甚博石門山在桂陽州西北六十里山有巖宂如門巋水自藍山穿石門西注舟筏皆經其下晉嶺山在桂陽州南八十里相傳此嶺晉時出銀鉛砂礦藍山在桂陽州西一百里跨臨武藍山二縣界薈蔚蒼翠浮空如藍衡山在衡山縣西三十里五嶽之一也寰宇記云宿當翼軫度應璣衡故曰衡山舜南廵狩至于南嶽周職方氏荆州之鎮曰衡山即此其山盤繞八百里有七十二峯十洞十五巖三十八泉二十五溪九池九潭九井而峯之最大者五曰祝融紫盖雲宻石廪天柱惟祝融為最髙唐李白詩衡山蒼蒼入紫𡨕下㸔南極老人星囘飈吹散五峯雪徃徃飛花入洞庭馬阜山在耒陽縣北二里山勢髙大盤踞二十餘里虎踞山在耒陽縣南四里岡巒秀麗逺望之如屏几石臼山在耒陽縣西二十里有石臼巨人跡舊傳漢蘓耽嘗逰此有蘓仙祠在焉相公山在耒陽縣東北四十里蜀漢相諸葛亮嘗駐兵於此因名鷔山在耒陽縣東北四十三里其形獨秀不與衆山相連相傳昔有白鷔翔于上故名侯計山在耒陽縣東七十五里山有七十峯上有仙人亭觀音閣亦名侯憇山謂諸葛武侯嘗於此憇息籌計兵事侯曇山在耒陽縣東南八十里一名侯堂山跨安仁縣界有溪壕神祠傍有石井常涸鄉人遇旱祀之則水出祀畢水仍乾城岡山在耒陽縣義興鄉岡巒秀㧞東西有銀瓶皮㡌二峯對峙北有清溪水注白馬渡塔山在常寜縣治東山腰有白石七級相傳昔阿育王疊石作塔於此盟山在常寧縣北七十里逍遥山在常寧縣東南一百六十里熊耳山在安仁縣東南七十里山髙峻狀若熊耳有逺天湖可容萬家青臺山在酃縣北一十里形如筆架為一邑壯觀雲秋山在酃縣西四十五里雲烟黯慘常若秋時萬陽山在酃縣西南八十里周㢠廻三百里上多古木恠石韓張山在臨武縣學後唐韓愈張署同時迁謫韓令陽山張令臨武及北還㑹宿于此故名宋紹興間僉判范寅因作韓張亭舜峯山在臨武縣西北二里舊名千仭上平而北垂邑民避難嘗據其顛築柵拒守華隂山在藍山縣東南一十五里跨臨武藍山兩縣髙秀如華嶽石柱山在藍山縣北二十里亦名天柱下有巖洞石乳融結竒恠萬狀色如碧玉九疑山在藍山縣西南五十里九域志云有九疑水黄蘖山在藍山縣南九十里山出黄蘖故名亦謂之都龎山與連州分界即五嶺從東第三都龎嶺是也囘鴈峯在府城南雁至衡陽不過遇春而囘或曰峯勢如雁之囘故名唐杜荀鶴詩猿到夜深啼嶽麓雁知春信别衡陽徐靈期云南嶽周廻八百里囘雁為首嶽麓為足碧雲峯在府城西南望雲陽山如潑墨華靈峯在府城南二里舊傳後漢華佗築臺其上修道辟榖年百嵗猶壯容人以為仙靈因名岣嶁峯在府城北五十二里髙一千五百丈湘中記岣嶁山有玉牒禹案其文以治水上有禹碑韓愈詩岣嶁山尖神禹碑字青石赤形摹竒科斗豢身薤葉披鸞飄鳳泊拏虎螭事嚴跡秘鬼莫窺㑹善峯在府城北五十三里古名毛女峯乃十八髙僧相㑹處白石峯在府城北五十五里山多白石祝融峯在衡山縣西北三十里位直離宮以配火德乃祝融君逰息之所上有青玉壇道書以為第二十四福地盧載詩五千里地望皆見七十二峯中最髙山顛有風宂雨將作隂風自宂而發又有雷池宋時禱雨有應建廟池上朱文公詩我来萬里駕長風絶壑層雲許盪胸濁酒三杯豪氣發朗吟飛下祝融峯紫盖峯在衡山以形似名上有鶴泉仙人池翠麓巖及鶴鳴寳霞天寳至臺唐韓愈詩紫盖連延接天柱石廩騰擲堆祝融雲宻峯在衡山峯西北上有㑹仙壇丹霍仙人石室夜遇隂晦有光晀曜俗呼仙燈又有大禹巖桃花源峯半有禹碑皆科斗文字圖經載即禹治水碑碑下有石壇流水縈之最為勝境石廪峯在衡山形如倉廩有二户一開一闔湘中記云開則嵗儉閉則嵗豐又有風穴雷泓鬼栽石誦經壇陳真人煉丹臺遺跡天柱峯在衡山形如雙柱聳㧞西北有香岡出香白芷又有石室呉時有李洞巖叟者居此自囘鴈至仙上七峯在衡陽縣界自祝融至天柱五峯及巾子金簡降真芙蓉等五十五峯俱在衡山縣境其吐霧碧岫屏嶂日華嶽麓則在長沙府界共為七十二峯紫盖雲宻石廪天柱四峯皆去衡山縣西北三十里楊梅峯在安仁縣西一十里五代時馬殷將歐陽方於此立寨屯兵以偹南漢宋沈通父子亦保障於此東樓峯在藍山縣南五十里其下有巋水宋劉接詩九疑山色瑞烟籠縣占東樓第一峯古寺常多千嵗竹舊林元有萬年松天門嶺在耒陽縣雲峯鄉其上石巖中有泉流下禱雨多應樟隍嶺在耒陽縣即羅訓隠居此鳳岡嶺在安仁縣治南嶺形如鳳潭流嶺在桂陽州北一百三十里出銀鉛砂礦今廢懶殘巖在衡山後唐時有異僧懶殘居此因名靖居巖在衡山縣西二里有飛泉古木及羅漢菓樹又有㵼洪亭宋張公綬詩潺潺石磴㵼洪泉路躡丹梯入紫烟巖有髙人無問處庵羅雙樹碧參天獅子巖在耒陽縣南三十里巖有石乳滴成獅子狀宋隠士侯彭老嘗避暑於此亦名侯公巖秀巖在臨武縣南一十五里東北有穴通明石乳績聚下有兩穴水出其左為大溪流二百餘歩復入右穴石龍巖在臨武縣西二十里中有石如龍相傳嵗旱洗之即雨金粟巖在臨武縣西北二十里石壁峭㧞下有溪流巖上石璀璨如垂珠珞集雷巖在酃縣集雷山舊傳有雷神集此其神最靈馬嶺岡在府城東南五十九里其形似馬曽青岡在府界岡産曽青可合仙藥分水岡在府城北一百一十三里與湘鄉縣分水黄龍岡在府城西一百三十里相傳昔有黄龍見此破岡在衡陽縣界湘中記宋大明中望氣者云湘東有天子氣遣謁者廵視斬岡石以厭之故名朱陵洞在衡山道書第三洞天曰朱陵洞天即此又名水簾洞宋畢田詩洞門千尺掛飛流王碎珠簾冷噴秋今古不知誰捲得緑蘿為帶月為鈎李朝洞在安仁縣南七十里其洞延袤數十里錦石在衡山縣東江邊有錦石數片云是區星遺錦於此化為石秦石在耒陽縣東四十里舊傳秦皇驅石塞海至今不去熱石在臨武縣置物其上立焦湘水在府城東源出廣西興安縣陽海山流至分水嶺分流北流者謂之湘水經全永州至府城東又北流入長沙界宋文天祥詩瀟湘一夜雨江海十年雲相見皆成老重逢便作分蒸水在府城北水氣如蒸源出寳慶府邵陽縣耶薑山東北流至衡陽縣界㑹清陽水又東流經府城北㑹于湘上潢水源出岣嶁峯屈曲流六十里可勝小舟府城東北又有下潢水耒水在府城北源出郴州之耒山西北流經耒陽衡陽縣界至耒口注于湘肥水源出侯計山其水清澈馬水在耒陽縣東北百餘里舊經云昔人