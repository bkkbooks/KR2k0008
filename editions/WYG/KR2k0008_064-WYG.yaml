俗病輙云先亡為禍皆開塚剖棺名為除􅑂憲之曉諭禁戒為陳生死之别事不相闗風俗遂改王珍國梁桂陽内史境内肅清罷任經江州刺史栁世隆見其還裝輕素歎曰此真良二千石也唐李皋衡州刺史法成令修觀察使誣奏之貶刺潮州後還任衡州降叛將國良齊映貞元中衡州刺史建合江亭韓愈有詩美之呂温元和中衡州刺史治有善狀時李寛中建石鼔書院温為刺史訪之且贈以詩宋魯維周乾德中通判衡州卒於官有遺愛民為立祠張齊賢太平興國初通判衡州時鞠刼盗十餘皆論死齊賢至活其失入者五人知州等懼譴責齊賢曰齊賢豈欲委罪衆人而自為功乎令改正而已髙岳淳化中知安仁縣户口増益捐己俸徙縣治於香草坪父老立廟祀之今稱髙長官廟韓丕通判衡州聲名籍甚石熈載薦其文行代還擢著作佐郎李虗巳大中祥符初知衡州以循良清白預選上歎曰真得良二千石矣劉沆天聖中知衡州大姓尹氏作偽劵以欺鄰孤奪其田訟久不得直沆至詰尹氏云爾始為券時曽取訂他鄰否其人固多在可訊也尹氏遂詘服孔平仲知衡州提舉董必劾其不推行常平法䧟失官米之直六十萬置獄潭州平仲疏言米貯倉五年半陳不堪食若非乗民闕食隨宜渫之將成棄物矣倘以為非臣不敢逃罪乃徙韶州楊畋慶厯初吉州巫黄捉鬼等誘峒蠻作亂畋以夲路提刑率兵入討捉鬼計窮詣衡州降未幾餘黨復出㓂畋至桂陽斬其酋約賊徙出峒授田為民自是峒㓂遂平向子忞知衡州首鋤擊大胥姦賍十餘人民情始通時大旱米價騰踴子忞遣人糴於鄰州歸糶之所活萬計頌聲洋溢尋以誣奉祠士民羣聚提刑司擊鼔舉留及戒途日闔郡遮擁王定民元祐間知衡陽縣修葺學宇又為勸學頌以勉學者人傳頌之彭璟知常寧縣興起學枝教以禮義風俗丕變鄭行已紹聖間知耒陽縣精勤吏職剖决如流案無停牘人服其敏余剛崇寧間知耒陽縣大毁滛祠誅巫覡民始駭愕久更安之辛次膺湖南提刑紹興末金人遣張通古來詔諭江南次膺上書言君父之讎不與共戴天書奏不報即丐祠周堯卿衡州司理叅軍居官盡職禄雖薄必以周宗族朋友罄而後已劉清之知衡州行利民之政表先賢之祠鄭清之知衡州究心民事不餙厨傳嘗作諭民書一編教以事親睦族教子祀先謹身節用和物濟人邦人家有其書非理之訟日為衰息乂與諸生論學以振士風趙逢龍知衡州為政寛恕民不忍欺居官自常奉外一介不取雖􅆒歴日久泊然不知富貴之味楊文仲知衡州運餉有法民不知擾以所當得米八千石立思濟倉元趙宏偉至元中為衡州路治中羣盗出没其境宏偉計其地興屯田民既足食盗亦為農郡遂寧謐史秉彞至正間衡州推官亷勤公正賑饑活民興庠序復侵田民甚德之劉燾孫至正末為常寧州儒學正湖南䧟常寧長史棄城走民奉印請燾孫為城守城頼以完者一年外援俱絶死之夲朝髙從訓洪武初衡州通判公平蒞政視民如子陞夲府同知又陞知府遺愛在人至今父老傳頌韋衡洪武初安仁知縣處事公正好尚詩書愛民如子縣知公署皆其創立陳安福永樂間衡州知府持心正大嵗旱禱雨輒應時有虎傷人誓於城隍其虎死胡湜永樂間酃縣知縣亷公守己平賦均徭小民咸被其澤胡暹永樂間常寧知縣愛民律己遺惠在人後陞知江寧民至今稱之楊永樂間知臨武縣凡政務不便於民者即奏罷之且公勤自持吏民畏服縣治肅然省志林靖知衡陽縣賦性剛毅蒞事勤敏新縣治興學校一時建立勞績實多省志翁世資正統中以工部侍郎謫知衡州府革宿弊敦漓俗决疑獄修石彭書院置便民倉至今民受其惠省志蕭抜天順間知藍山縣時縣初草創政平訟簡問民疾苦若痼瘝在身築縣城費役有經民恃以不擾志省孟統正德初知桂陽州耿介清澹敢於有為嘗捐俸増號舎修學校後卒於官笥箧惟白金數分而已省志劉璣正德初知衡州府性寛厚治劇有餘才時封雍藩百務叢集璣應之以裕不勞民而事集民多頼之為立遺愛坊省志葉夢淇正德中知衡州府亷能公正治民如治家惟玩法怙終者則必不貸尋以疾卒於官貧無歛具僚属助其䘮歸闔郡悲之省志李純正德中知蘄州警敏有才剖决無滯而清慎律己愷悌愛民卓有樹立豪猾之徒無敢肆逞百姓安堵至今懐之志省林允宗嘉靖中知衡州府凡有所為民甚便之民有坐鬪殺者獄成宗得其情抗言釋之征苖調郡兵故事以疲民嘗賊宗部良家子三千人芻粮噐械悉偹苖平以全軍歸人德之如父母省志流寓劉凝之劉宋時南郡枝江人慕老莱子嚴子陵之為人推家財與弟及兄子州里重其仁德禮辟並不受擕妻子隠居衡山之陽李泌京兆人唐肅宗即位於靈武泌有功崔員李輔國以泌見親信疾之泌畏禍願隠衡山有詔給三品禄賜隠士服為治室庐杜甫初避亂入蜀嚴武鎮蜀往依之武卒蜀亂復避亂移䕫州唐大厯三年下峽至荆南逰衡山寓居耒陽嘗至岳廟阻暴水旬日不得食耒陽聶令知之自具舟迎還嘗餽牛炙白酒一夕醉飽卒或謂宿江上酒家為水漂漲聶令堆空土為墳皆不可信惟云扁舟下荆楚還㐮漢卒於岳陽而旅殯之為是焉胡安國崇安人仕為湖南提舉學事嘗講道于衡山後因家焉以其學傳之三子寅寕宏寅嘗著讀史管見寕著春秋通㫖宏嘗師楊中立侯師聖優游南山下者二十餘年註皇王大紀諸書胡銓吉州人建炎間為樞宻編修官論和議上䟽乞斬秦檜王倫孫近三人謫居衡州因留家焉人物漢谷永來陽人成帝時為大司農前後上封事四十餘章後免官蔡倫桂陽人有才學和帝時為中常侍元初中封龍亭侯倫言自古書契多編以竹其用縑帛書者謂之紙縑乃始用樹膚麻頭敝布魚網為紙天下咸稱蔡侯紙胡騰耒陽人少師事竇武武死騰獨殯殮行䘮坐禁錮初桓帝廵狩南陽以騰為護駕從事公卿貴戚車乘萬計徴求費役不可勝極騰上言天子無外乘輿所幸即為京師臣請以荆州刺史比司𨽻校尉臣自同都官從事從之自是肅然莫敢妄有干請騰以此顯名黨錮觧官至尚書谷朗烝陽人事継母以孝聞歴官遷大中正時交州叛以朗往南州恩威素著遷九真太守三國劉巴烝陽人諸葛亮薦為左将軍西曹掾亮嘗曰運籌䇿于帷幄中吾不如子初逺矣晋李義縣人時盗起荆湖義傾家貲市兵器率鄉人擊破之闔境以安荆州牧陶侃召至麾下分兵使擊賊戰屡有功事乎旌賞獨優鄉民立祠於故居號其地曰太尉原羅含耒陽人少時嘗晝卧夣一鳥文彩異常飛入口中自此藻思日新仕為江夏從事太守謝尚曰可謂湘中之琳琅後補桓温叅軍或謂含荆楚之才温曰此自江左之秀豈惟荆楚而已唐李寛衡陽人元和中始於尋真觀剙石鼓書院以為讀書之所刺史呂温有詩趙知微衡山人穆宗時以布衣上書詞㫖危切帝詔宰相慰諭宰相因賀天子納諌然不能用宋曹裕耒陽人舉進士為潭州司録叅軍能辨枉獄後宰溧水值嵗旱蝗漕使以嵗計不足諷諸邑裕曰吾能忍視其死而不救之卒以實聞子洪舉進士為永興令邑小民貧上供匱乏洪歎曰吾八歴縣未嘗横歛豈以暮年倒行逆施乎遂棄官歸黄照隣桂陽軍平陽人舉進士仕為職方郎中嘗讀書於郡西芙蓉山石林亭鄉人號為職方巖胡晏衡陽人資性孝友鄉里慕之有争訟不到公庭多往質焉大開舘含延禮四方賢士以廸諸子及卒孔武仲表之曰䖏士胡君之墓葉盖平陽人熈寕中以才雅魁賦上庠見者目為南瑞累官知彬州侯宣衡山人少逰四方還家築室道傍俾逰舉之士往來舘焉行之二十年曽無倦意逺近號曰侯家書院趙世德衡山人宣和間進士初攝鄉邑時邑遭兵燬移治上封賊曹成大掠脇世徳歛民金帛世徳不從被執以死自誓百姓自率金帛以贖後辟廣西機宜黄珙衡陽人資質方正嘗以善行誨人長子師道仕為屯田郎中次子師旦為屯田貟外郎皆以清白才幹聞趙棠衡山人少從胡宏學慷慨有大志嘗見張浚於督府浚雅敬其才欲以右選官之棠不為屈累以䇿言兵事浚竒之命子栻與棠交棠之子方遂從栻學焉襲盍卿常寕人以明經擢第即往師朱文公明義理之學入諌垣為右正言以直道事君趙方棠子少從張栻學淳熈中舉進士知隨州時講和罷兵方獨選将招兵為戰守計㧞土豪孟宗政等補以官後又知江陵㐮陽金兵至荆㐮以有備不能䧟累遷至權刑部尚書進徽猷閣學士卒謚忠肅有家傳録遺文趙范方子與弟葵俱有大志少從鄭清之牟子才學後從父軍中嘉定間嘗與葵殱金人於高頭累官知揚州淮東安撫副使屡立戰功進工部尚書沿江制置副使後為京湖安撫制置使兼知㐮陽府趙葵方子以功累官知滁州度李全必叛乃聚兵為戰守計及全㓂揚州葵率衆與戰出竒破之斬全以歸淳祐中進端明大學士知潭州後拜右丞相兼宻樞使封魯國公葵有雄武之才累立大勲朝廷倚之為重者二十年卒贈太傅謚忠靖李芾衡人髙袓斥靖康中死節芾生而聰警少自樹立名其齋曰無暴棄初補南安司户歴知永温州有惠政咸淳初入知臨安府忤賈似道罷去起知潭州兼安撫使元兵至芾極力戰守城破芾命帳下沈忠盡殺其家人而後殺已忠如其言事聞謚忠節趙淮葵從子李全之叛屡立戰功累官至淮東轉運使徳祐中戍銀樹埧兵敗被執元将阿珠使招李庭芝許以大官淮陽許諾至揚城下大呼毋降元将怒殺之張鏜衡山人僕射浚之後益王立詔天下勤王鏜起兵衡山移檄安化新化諸獠得民兵数千文天祥率兵出嶺相與接應既而兵敗被執元叅政崔斌欲降之鏜罵曰今日降而死何以見我袓魏公於地下斌命述起兵夲末鏜奮筆斥罵千百言斌恕殺之夲朝茹瑺衡山人洪武間國子生累官通政使進副都御史兵部尚書加太子太保亷介忠直為上下所重永樂初封忠誠伯譚有得安仁人洪武間任揚州府知府後陞四川按察使詳慎刑獄亷介有聲李思聦桂陽人洪武甲戌進士任行人奉使百夷深為夷人所敬服及還進所著百夷傳并詩朝廷嘉之尋升江西石參議王詔衡陽人正統壬戌進士授禮科給事中景泰中免天順中累進工部右侍郎國史稱其儉素簡黙云省志謝天祥耒陽人登成化丙戌進士選庶吉士天性峭直與羅倫荘㫤相善遷監察御史数上封事直氣動臺端謫南陵縣丞李東陽劉大夏陳獻章輩俱壮其節贈之詩年三十七即掛冠歸子訥𢎞治乙丑進士官給事中省志胡文璧耒陽人正徳辛未進士歴官郎中改監察御史出知鳯陽府擢天津兵備副使奏革皇庒忤中官謫延安府檢校嘉靖初起四川按察使弟文奎嘉靖癸未進士歴官户部主事省志蒋褔陵衡陽人正徳甲戍進士知鄞縣擢太僕寺丞出知臨安府公亷寛裕始終不易卒于官民舁柩歸衡悲慕而去省志劉黻衡陽人正徳丁丑進士授行人諌武廟南廵謫南助教世宗登極復行人專擅授御史屢建危言宦戚歛手出按四川禁中貴復蘇氏侵田以終飬告歸省志劉穏酃人嘉靖丙辰進士除南京武選主事累官南太僕寺少卿性冲粹于人無所拂忤海内名流什伍齒交故所至每有戰功欝有令譽所著山房漫藁家訓粤中政紀兩粤猺訓二南澷稿易經折􅇆蒙訓藏于家省志列女王氏衡陽人朱衡妻宣徳中衡舉進士卒于京王年二十五剪髪欽棺中誓死以堅守節省志梁氏蒋志泰妻衡山人年二十適蒋生一子甫七月泰卒家貧守節事姑盡禮天順初旌其門省志雷氏女桂陽人雷廷惠女名毛姑天順中獞猺攻破藍城人民奔竄女父目疾不能行女獨侍父側哀哭被執欲汚之罵賊不屈而死省志陳氏女名三貞臨武人陳仕良女𢎞治中苖冦入其家将辱之不屈觸刄而死