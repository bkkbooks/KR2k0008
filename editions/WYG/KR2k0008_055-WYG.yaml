府推官見事敏給涖政詳明持己儉約待人寛恕尋被薦授監察御史李存仁永樂間知新喻亷幹有機局初抵任佯爲不知事體狀逾月閭里銖兩之姦悉知之一時豪右摧抑净盡境内大治民所告訏判斷如流民至今誦之省志潘諒宣德間知臨江府爲政寛和吏民懐之省志夏璣天順間知新淦縣持身清慎平易近民有古良吏風省志沈棨由進士以南京工部郎中擢臨江知府性果毅明敏問學愽洽善吟咏臨政尚嚴明吏民畏服省志葉淇成化間知清化縣政平訟理擢監察御史省志王佐成化間同知臨江公平正大慱學工吟咏以才能著稱省志陳旅臨江府學訓導律己端方敷教嚴明士子畏愛後遷國子監丞今祀于名宦祠省志盧翊由進士任新喻令亷不近名仁不堕事和平豈弟有循吏風以憂去民不忍去省志陳元憲正德間通判臨江政尚亷平催科中存撫字門第清嚴闋節不能入去任十年民思之如初省志戴德孺由進士知臨江府適華林賊後豪猾相縁結人民凋瘁德孺鋤刈強梗姦惡屏跡宸濠叛率鄉兵從征直搗宸濠巢穴以功陞雲南右布政卒于途省志王㤗正德間爲清江尹舊以里甲值日科取無度㤗至除十之七值度支部使爲催科㤗曰知縣可辱吾民不可廹建倉預饑財力不與於民卒于官無以爲殮知府戴德孺爲具棺衾士民哀之省志流寓王覿㤗州人宋哲宗朝爲司諫極言章惇之黨四人朋邪害正由是惇罷徽宗立覿爲中丞又論惇之罪後謫居臨江軍趙孟濟其先汴人寓居清江宋德祐時待次家居郡檄攝元僚保障城邑以功充清江令居官介特豪猾屏息已而城破死之人物漢孔恂新淦人爲州别駕車前舊有屏星如刺史車制刺史因怒欲去之恂曰撤去屏星毁國舊儀别駕可去屏星不可省即投傳去刺史追謝乃不去屏星唐陳岳玉笥人累官南昌觀察判官著唐書自髙祖至穆宗爲統紀一百卷子濬仕楊吳爲翰林學士撰吳録二十卷楊彦伯新淦人㓜頴敏大順間擢童子科昭宗親試之彦伯應對詳雅帝謂左右曰劉晏之徒也御製詩賜之後宰安福縣境内按堵牛産六犢蓮莖四花州以狀聞賜緋魚五代陳喬岳之孫㓜敏悟躭翫文史仕南唐累官翰林學士承㫖門下侍郎兼樞宻使以社稷爲己任及建康不守喬自縊死後主既降太祖責其拒命後主曰臣爲陳喬所制時喬已死太祖愍其忠詔改葬焉宋劉式清江人明春秋公榖之學累官三司都磨勘司淳化中持命往諭三韓酋長歸化暨歸值風舟覆而夷謝表貢珍一無沾濡後官至刑部郎中子立本賜出身立言立德立禮相繼登第俱有名孫冕新淦人雍熈間舉進士後守蘇州甫及引年大書一詩於壁有曰莫待朝廷差致仕早謀泉石養閒身題畢拂衣歸九華山再召竟不起王欽若新喻人淳化間舉進士累官至尚書左僕射兼中書侍郎同平章事進司空封冀國公卒贈大師中書令諡文穆平生撰述數百卷多神異之事李諮新喻人㓜以孝聞景德間舉進士累官户部侍郎知樞宻院事性明敏周知世務處煩劇若閒暇吏不敢欺在樞府專抑僥倖革濫賞人以爲稱職卒諡憲成蕭諤新喻人以詩易教授閭里而尤篤于教子其後四子皆慱學有名曰賀曰貫曰賁皆登進士第貫累官京東轉運使後知饒州遷兵部貟外郎爲人尚氣槩臨事敢爲且善属文時比之唐李賀云楊申新喻人天聖間舉進士累官光禄卿立朝頗有風節王安石當國以論新法不合出知濟州多善政尋乞致仕吕大防表其所居爲耆德坊孔延之新喻人宣聖四十七世孫㓜孤貧晝則帶經耕鋤夜則燃松讀書慶厯間舉進士九遷至司封郎中平生惟與周敦頥曽鞏最友善蕭固新喻人天聖間舉進士皇祐初爲廣西轉運使知儂智髙㓙狡預條上覊縻之䇿于樞府不果用後智髙果叛人服其識云劉敞式孫慶厯間舉進士累官知制誥奉使契丹還知揚州有惠政徙鄆州道不拾遺累遷翰林侍讀學士侍英宗講讀每指事據經因以諷諌官至集賢院學士敞學問淵博爲文尤贍敏有公是集行世劉攽敞弟慱極羣書與兄偕登進士熈寜初知太常禮院初與王安石甚相得及安石執政屹不肯附後出知曹州政尚寛平召爲國史編修與司馬光同修資治通鑑官至中書舍人有公非集行世蕭注諤從孫磊落有大志尤喜言兵慶厯間舉進士攝番禺令儂智髙圍廣州注突圍出募海濵壯士與格闘破其衆擢知邕州結溪洞酋長擒智髙弟智光子維宗以獻累官西上閤門使後知桂州胡向清江人皇祐間舉進士累官倅越州奏課爲天下第一後權大理卿决獄仁恕雪寃免死者甚多劉奉世敞子天資簡重有法度嘉祐間舉進士元豊中累官僉書樞宻院事出知成都府以中丞邢恕劾再貶隰州團練副使後以端明殿學士知定州尋落職知徐州以舊職致仕孔文仲延之子性狷直學問慱洽嘉祐間舉進士再遷台州推官熈寜初范鎮以制舉薦極論新法之害爲王安石所黜哲宗初再遷左諌議大夫改中書舍人同知貢舉以疾卒有文集五十卷孔武仲文仲弟嘉祐間舉進士累官國子司業嘗論科舉之弊詆王氏學進拜中書舍人直學士院建北郊議累遷禮部侍郎出知洪州坐元祐黨奪職居池州卒有所著詩書雜文搃百餘卷孔平仲武仲弟治平間舉進士爲集賢校理紹聖間坐黨籍謫知衡州再謫惠州别駕安置英州徽宗即位召還累官金部郎中平仲長于吏學工文詞著續世説等書行世何正臣新淦人九嵗舉童子賜出身復中進士元豊中爲御史裏行㑹正御史專六察正臣言幸得備言路不宜兼治他曹累遷寳文閣待制出知潭州後歴刑部侍郎知宣州李大有新喻人紹聖間舉進士累官知虔州宣和末金人犯京師大有募兵勤王鼓行而前淮甸歌曰天下姦臣皆守室䖍州太守獨勤王後知衢州州有宿冦猖獗大有下車冦即平李邈清江人少有才畧見事風生宣和間知覇州時童貫將連金人夾攻契丹邈上書言不可忤貫免官久之復起知嚴州貫收復燕山邈嘆曰禍亂自此始矣金人犯京師詔輙入見出知真定府金人至邈且戰且守相持四旬城破巷戰被執遂遇害髙宗贈昭化軍節度使諡忠壯向子諲臨江人丞相敏中𤣥孫宣和間累官京畿轉運副使張邦昌僣位遣人問起居子諲械繋其使者遣將統兵勤王髙宗時出知潭州金人猝至子諲以死守金人登城乃奪門去紹興間遷徽猷閣待制户部侍郎出知平江府以忤秦檜致仕傅雱臨江人爲從事郎改宣教郎建炎初偕工部侍郎使于金國其誥詞有曰庶爾一言之合成吾兩國之懽識者知髙宗之意在于講和矣蕭建功新淦人少好學嘗從陳瓘遊瓘器重之李朴被謫時貧不能自給建功爲築室居之朴死建功以女妻其子李綱薦其操行堅正累官知衡州蕭燧固𤣥孫父増慱究羣書紹興初應制舉以書詆時相竟不仕而歸燧㓜能属文紹興間進士授平江府觀察推官忤秦檜歸孝宗時起爲左司諫議論鯁切出知嚴州移婺州婺素知其條教不勞而治累官至叅知政事以資政殿學士奉祠卒諡正肅楊獬新喻人紹興間舉進士知吉水縣救荒有政累官司農少卿知明州沿海有小冦獬悉擒之海道晏然生平亷介自持博覧強記爲後學所師法郷人至今祠之于學楊愿臨江人紹興間舉進士累官車輅院愿于書無所不讀邑有考德問禮之事必求是正里人稱壽岡先生謝諤新喻人㓜敏惠日記千言爲文操筆立就紹興末舉進士攝樂安縣改吉州錄叅知分宜縣皆有惠政擢監察御史上其所創義役法詔行于諸路光宗登極獻十箴累遷御史中丞尋以煥章閣學士知泉州所著有聖學淵源五卷徐夣莘清江人百家書寓目成誦紹興末舉進士累官知賔州嘗爲三朝北盟㑹編一百五十卷擢直秘閣所著又有讀書記志集醫録集仙録弟得之淳熈中進士安貧樂分官至通直郎致仕嘗著左氏國紀史記年紀及鼔吹詞郴江志張紱清江人強記慱覧爲文敏而純粹紹興末舉進士爲澧陽主簿以亷勤稱秩滿調衡州録叅宜春丞暇日閱究經史有愚谷集十五卷歴代史年表二十卷劉清之臨江人受業兄靖之慱極書傳紹興末舉進士及見朱熹慨然志義理之學嘗爲髙安縣丞賑饑有方徙知宜黄縣孝宗時召對首論民困兵驕累官知衡州善政甚多罷主雲臺觀光宗即位起知袁州所著有訓䝉新書通録墨莊祭儀時令諸書常楫清江人乾道間倅房陵遷知宜州所至有聲尤善决獄家居極孝友盡以其田廬譲其兄清江上流水泛輒壊民田楫爲築隄防水田皆爲沃壤至今民頼焉章頴新喻人以兼經中郷薦孝宗初立求言頴爲萬言書以聞累官左司諫䟽論右相葛邲不足任大事寜宗時爲侍御史兼侍講又極論趙汝愚不宜去被罪家居後起爲刑部侍郎卒諡文肅其操履風節不爲窮逹所移雖仕多偃蹇而清議與之朱景文清江人自少俊邁傑出讀書過目不忘爲文頃刻立就雄贍豪爽如其爲人乾道間舉進士再調分宜簿未赴而卒有批鱗藁五十篇文集四十卷彭龜年清江人從朱熹張栻講學乾道間舉進士累官吏部侍郎兼侍讀嘗極諌光宗宜盡孝道寜宗時又極言小人竊權之弊以寳謨閣待制致仕龜年學識正大議論簡直其愛君憂國先見之識敢言之氣皆人所難自偽學有禁士大夫鮮不變者龜年則始終特立卒謚忠肅陳琦清江人嘗從張栻遊乾道間舉進士主衡陽簿辨雪寃獄賑荒郴桂使糴者爲伍循次以糴民甚德之遷贑縣丞贑守留正尤器之留鎮蜀辟主管機宜文字在蜀二年事無鉅細多質焉曾三復新淦人與弟三聘俱乾道間進士三復性耿介耻奔競紹熈初歴知池常州召拜監察御史持論正平不随不激累官至起居郎兼權刑部侍郎致仕曾三聘三復弟㓜有異質日記千言由進士累官秘書郎光宗時三上相陳時事黨論興坐重劾卒贈直龍圗閣諡忠節弟三異少有詩名嘗著新舊官制通考通釋除太社令力求去時號雲巢先生三英嘗考究三國六朝攻守事迹著南北邉籌十八篇又著蒙史蕭逵燧子淳熈間舉進士孝宗曰逵才氣甚佳父子高科秀殊可喜後累官至太常嘗知貢舉於落卷中取真德時稱其知人逵從子崱號大山崱弟㤗來號小山俱以文名登紹定間進士崱累官宗正永㤗來累官御史遷起居郎徐天麟夣莘從子開禧初進士累官武學慱士輪對言人主當持心以敬通判惠潭二州權英德府所至興學明教有惠政著兩漢會要漢兵本末西漢地理䟽山經等書張洽清江人從朱熹學嘉定初舉進士歴官州縣有善政累遷著作佐郎直秘閣平生用力於敬居間不言朝廷事或因灾變輒顰蹙不樂及聞一君子進用則喜見顔色所著有春秋集傳續通鑑長編嚴世父新喻人隱居不仕師事朱子有疑義問答徃復書帖鄉人祠之于學黎立武新喻人咸淳間舉進士累官國子司業華文閣侍制考試臨川得吳徴時稱其知人元范梈清江人累官翰林應奉福建㢘訪司知事梈精古學砥礪名節持身㢘正吳澂嘗稱其爲特立獨行之士工篆𨽻楷書尤工於詩與虞集掲傒斯楊載齊名時號虞楊范揭有文集行世周自強新喻人好學能文練于吏事㤗定間以招諭徭酋有功授廣西宣慰司都事再遷義烏縣尹周知民情訟者必開譬令其悔改怙惡不悛者然後䋲之以法履畆覈田以定賦役吏民不敢少欺官至江州路總管傅若金新喻人少貧刻勵于學能文章嘗遊京師虞集見其詩大加稱賞揭傒斯亦稱其詩髙出魏晋下不失於唐杜本清江人慱學善属文尤工篆𨽻隱建寜武夷山平居沉静寡欲無疾言遽色與人交尤篤于義文宗徴之不起至正間復居爲翰林侍制稱疾固辭學者稱爲清碧先生所著有四經表義六書通編十原等書蕭克翁燧四世孫隠居不仕學行爲州里所稱富珠哩翀從之學楊士𢎞清江人其先本襄城人士𢎞祖父世官于臨江遂家焉士𢎞少好學工樂府諸詩有鑑池春草集嘗選唐詩名唐音行世本朝梁寅新喻人通五經元末累舉不第洪武初召至京議禮以年老告歸從學者甚衆所著有䇿要宋元史畧歴代敘畧石門集張九韶臨江人性頴悟十三能詩詞元時累舉不第隱居教授洪武初辟爲清江教諭陞國子助教翰林編修所著有理學類編羣書備數元史續編曾魯新淦人好古􅀶學洪武初徴至京師與修元史編禮書授禮部主事陞禮部侍郎練僖新淦人元末領鄉薦隠居不仕洪武初召爲起居注以直言忤㫖謫廣德州同知遷臨汀鎮安二府通判以疾卒于官今祀鄉賢省志練子寜僖子性資英邁志操不凡洪武乙丑進士第二累官至都御史革除間與方孝孺等特見信用靖難志師起寜不屈而死省金㓜孜新淦人洪武末舉進士永樂初授翰林檢討入内閣累官至太子少保禮部尚書歴事累朝論思獻納多所禆益文章豐暢爲人所愛重眷遇雖隆而自處益謙卒贈少保諡文靖習嘉言新喻人永樂戊戌進士擢翰林編脩歴侍讀太常寺少卿詹事府詹事爲人篤實沉重每有封章皆切時政黎恬登永樂王辰進士授監察御史時因災異上言歴詆大臣權要側目出知南寜州用薦擢爲春坊右諭德預脩宣廟實録進講經筵以展墓歸卒所著有觀過稿省志張固新喻人宣德間舉進士擢刑科給事中陞吏科都給事中遷大理少卿居官清慎爲朝士所重吳匯新喻人性頴異家貧力學景㤗辛未㑹試第一登進士官至國子司業以疾歸卒于家省志張黼固子景㤗甲戌進士任監察御史強毅果斷風裁凛然賍吏望風罷去歴陞廣西按察使以直忤當道致仕省志胡榮新喻人自少游心理學研究㫖歸登景㤗甲戌進士歴給事中遷憲職奉勅提督浙江廣東學校號稱知人以叅政致仕省志何𠂻新淦人天順丁丑進士授刑部主事累遷郎中爲人沈毅不阿蜀有守臣不職奉命往訊之賂千金拒不納竟寘于法中都留守笞殺人數多累官按之不能决𠂻往治即伏辜尋陞大理右丞卒于官貧無以爲殮所著有静齋藁祀于賢鄉祠省志傅瀚新喻人温厚和粹篤于孝友天順甲申進士歴翰林檢討春坊諭德學士時李孜省爲通政使得侍經筵瀚進講極言汰冗官李衘之不爲動兩主文衡得名士進禮部侍郎大禮多所賛襄中更變故卒不失正用廷薦兼學士掌詹事府事修㑹典充副總裁進禮部尚書以疾卒贈太子太保諡文穆入鄉賢祠省志周謨新淦人爲庠生時嘗推廪以遜其友天順進士授工部主事累官至陜西副使以母老乞休邉氓畨夷扶老擕㓜相泣不忍舍爲人剛方易直所著有東臯集省志何純新淦人成化丙戌進士授庶吉士拜監察御史時大臣不厭輿論純歴數其過疏至三上按廣東四川端平詳慎大恊人望陞雲南兵偹副使發倉賑饑民免相食擒阿彌州賊首奏設守禦千户所邉患以息奏减銀課民生以全卒于官兄善以成化乙未進士終新城令民立遺愛亭省志孫仁新淦人登成化己丑進士歴刑曹審録湖襄多所平反知常州府力抗權閹陞浙江叅政陜西布政右副都御史廵撫寜夏脩城垣簡上卒邉鄙頼焉致仕卒賜祭塟省志陳壽新淦人𨽻籍江寜成化壬辰進士授給事中以直言累下錦衣獄事白陞光禄少卿擢僉都御史廵撫延綏時敵和碩犯境以捍禦㨗聞褒賚有加歴刑部尚書居官清澹不治産業及致仕無所歸僑寓金陵敝屋蕭然以壽卒人稱其有清白風省志彭綱清江人成化戊子解元乙未進士出知汝州庶政既平鑿渠引水灌田數千畝世爲民利遷雲南提學副使以公明稱爲人端凝朴茂而不波逐于時流家居無一語及公府事惟以文行汲引後進士知自檢者至今式之自號雲田所著有雲田集省志孫治清江人成化辛丑進士知臨淮縣守己愛民興學作士時權閹汪直陳廣以選妃責貢繼至所在需索動以千計治持正不阿竟爲二宦所中改安東遂棄官歸士類尚之所著有鳴春集省志陳陽新淦人以進士選翰林庶吉士歴郎中訊獄蘇常逆瑾受獄家賄欲曲法陽不許遂下錦衣獄謫州同知瑾誅陞廣西僉事以劾廵按監司不法左遷運同卒于官今祀鄉賢省志張文新喻人􅀶覧強記以春秋登𢎞治癸丑進士授刑科給事中轉都給事多所建明上中鹽張燈二疏爲權貴所憚以疾卒省志凃禎新淦人由𢎞治己未進士出知江隂三載有古良吏風治行爲天下第一遷御史廵長蘆鹽課時逆瑾壊鹽法禎紏正之且求賂不得遂以禍中之死于錦衣獄瑾㐲誅命復官諭祭今祠于鄉賢省志干顯偲新淦人六嵗失怙踰年知求父像時拜且哭家貧事母能盡養及卒水漿不入口者數日比塟廬墓所虎馴其側人咸異之正德三年奉詔旌表省志干鳯顯偲子天性純孝領以𢎞治甲子鄉薦授髙淳合肥教諭誨諸生敦尚行實勵清約有古人風采遷桃源令命下而卒無以爲歛正德間督學僉事邵銳既祠于鄉賢仍書孝㢘以表其宅省志列女廖氏臨江軍貢士歐陽希文妻宋紹興初盗起希文與妻共挾其母走山中爲賊所追廖以身蔽姑使希文負之逃賊執廖氏廖正色叱之賊揮刄斷其耳與臂廖猶謂曰爾軰叛逆我即死爾軰亦不久屠戮語絶而仆鄉人義而葬之號廖節婦墓謝小娥父自廣州部金銀綱擕家入京舟過蕭灘遇盗全家被害小娥溺水不死附漁舟而出行乞于市後爲鹽商李家傭奴見其酒器皆父物始悟其盗乃置刀藏之李生日㑹酒舉家皆醉小娥持刀盡殺之事聞命以官不受願爲尼乃建尼寺使居之沈氏新喻章伯髙妻年二十五而夫亡或諷其改適沈曰婦人足不踐二庭此足一移三綱即淪吾爲章氏婦知有章氏而已洪武間旌表省志陳貞婦新淦人㓜納庠生黄體堅聘體堅謫吏放金陵貽書娶陳父母欲易他女以往陳曰吾命也遂遣歸後體堅以罣誤棄市累訢不得白徒歩收其屍歛而􅙁之爲位奠哭期年家人來迎曰吾志願畢矣乃自書其名氏經于柩側君子謂貞婦生以義歸死以節狥大學士曽棨爲之傳省志李氏清江熊恒妻歸熊三年夫卒李年十八無子父母數令改嫁李以死自誓乃鞠從孫瞻繡爲後紡績自給年八十餘而卒省志張氏新喻阮尚德妻年十九而夫亡或以無子勸其改嫁張曰吾夫無子吾夫之兄弟有子茍可以繼嗣吾無他求事聞詔旌其門省志蔡氏新喻廖益麾妻夫亡艱於自給或逼其嫁蔡曰妾聞餓死事小失節事大有司以其事聞爲立貞節坊以表之省志胡氏新喻張和禎妻和禎亡遂不御膏沭以未亡人自處事聞爲立坊以表之省志丁氏新喻彭元鼎妻年二十一而夫亡所親欲奪其志丁曰夫臨終托吾養其母吾今既去母孰與養天順間郡邑覈其實以聞詔旌其門省志王氏新喻周逹理妻年二十而夫亡有強其他適者王曰妾聞禮一與之醮終身不改事聞詔旌表其門省志廖氏羅氏新喻人廖爲蕭嘉廸妻羅爲蕭嘉聞妻親妯娌也廖年二十三羅年二十一而嘉廸嘉聞繼亡廖與羅同事舅姑清貞一心年皆八十餘卒成化間詔旌表其門省志嚴氏清江嚴孟端女適同里黄時訓年二十七而寡清脩苦節始終弗渝成化間詔旌表其門省志簡氏名祥貞新喻簡公啓之女適同邑鄒濟㤗年二十一而濟㤗亡父母欲改嫁簡死誓不從及服闋復私納采強之簡聞持刄哭于濟㤗靈右斷二指示無再適意父母患之乃止成化間有司以事聞詔旌表其門省志彭氏新淦人年十七歸圳上李厚載年二十而夫亡父母欲奪其志彭誓曰從一而終婦人之義遂以針刺毁其一目紡績以教育遺孤𢎞治間詔旌表其門省志彭氏清江熊斐妻也正德辛未華林賊入城彭被執義不辱死之提督副使李夣陽聞于朝命立石旌表後復詔旌表其門省志易氏清江縣學生鄧介妻也正德乙亥盗入介室易奔出遇賊盡脫簪珥祈免賊執不舍欲汙之易紿與偕行賊不爲偹至江濵赴水未殁賊追刄之省志陳氏杜氏陳清江城北陳廷瓚女杜則瓚子德純妻也陳甫及筓與嫂杜皆有容色華林賊至奔赴李家塘賊拽入隣居欲汙之相持愈力罵不絶口賊并刄之而投于水省志邵氏府城劉清徹妻年二十清徹死邵撫孤守節正德間華林賊入城邵走匿孔家塘賊拽之登岸邵匍伏于水堅不行賊怒殺之省志熊氏劉清渭妻華林賊至清渭寢疾垂絶家人悉奔竄惟熊在清渭旁賊掠其貲擁之出户乃抱㓜子偽随賊行至李隆德塘置子于水涯自投于水水淺不得溺以泥汗面目且罵且拒賊殺之省志翁氏城東劉淮妻華林賊至家人皆走匿淮病不能興謂翁當避翁曰君或不諱我獨以生爲乃盡其貲與賊賊猶繋至隣寺翁仆地不行遂遇害省志仙釋孔丘明秦時人與駱法通等十人避亂相與結友逺訪大道來玉笥山修煉嵗久道成驣空而去惟仙良一人慢遊不與但成地仙云明一統志卷五十五
