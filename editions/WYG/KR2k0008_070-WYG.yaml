檢使賊李順黨犯䕫州傅序督士卒晝夜拒戰城中乏食傅序盡出囊槖市酒肉以犒士衆皆感泣力戰城䧟投火死袁逢吉知䕫州㑹遣使川陜採訪因條上知州通判有治迹者七人逢吉與朱協李虚已薛顔邵􅈌査道劉檢預焉皆賜詔褒諭雷說淳化中知大寧監人户汲泉强弱相凌說於穴傍創石池以瀦之外設橫板三十竅承以脩竹謂之筧筒人咸稱便丁謂咸平中為䕫州轉運使有威惠時溪洞蠻作亂謂自入溪洞諭以禍福蠻酋感泣作誓刻石境上還所掠萬餘人彭乗䕫路轉運使㑹土賊田忠覇誘下溪蠻作内寇乗適按部至境大集邊吏勒兵山下以偹賊遁去因遣人間之其黨斬忠覇夷其家薛顔知雲安軍後為夔路轉運使始孟氏據蜀徙䕫州於東山據峽以拒王師而民居不便顔為復其故城魯有開皇祐中知萬州在郡有惠政西山池亭多自有開發之劉源嘉祐中開州萬歲令縣有灘舟楫患之源火石淬之以醯遂易灘為通流民立祠於灘側號開灘長官祠周湛䕫路轉運使雲安鹽井歲賦民薪茅至破産責不已湛為蠲鹽課而省輸薪茅陳安石嘉祐中為䕫峽轉運判官民蓄蠱毒殺人捕誅其魁并得良藥圖由是遇毒者得不死束莊知萬州州舊多火災荘乃籍羡緡市材具屋通衢而瓦之築水防表火道其害始息曹頴叔䕫路轉運判官䕫峽多淫祠人有疾不事醫而專事神頴叔悉禁絶之教以醫藥孔嗣宗嘉祐中以滎州資官令措置大寧監凡監事有不便於民者悉除去民以為便立祠祀之唐介仁宗時知奉節縣有政績張詵神宗時為䕫路運使時渝州蠻反詵討平之張商英熙寧初為通川簿渝州蠻反䕫路運使張詵討平惟王衮未降詵檄商英行衮見而下拜蠻遂平史方知䕫州時冨順州蠻寇施州方領兵直抵冨順蕩其巢穴窮追至七女柵降其衆程之邵䕫州路轉運判官大寧井塩利博前議者輙儲其半供公上餘鬻於民使先輸錢塩不足給民以病告之邵盡發所儲與之商賈既通關征増數倍李樗宣和中知巴渠縣有虎白晝入市樗為文檄諸社廟越五日虎斃於郊周執羔知䕫州兼安撫使或告溱播夷叛執羔謂其豪帥曰朝廷用汝為長今一方繹騷責将焉徃豪懼斬叛者以獻夷人自是惕息馮時行紹興中知萬州有操畧治甚有聲百姓愛之郡學立祠虞祺紹興中為䕫路轉運判官運司權大寧監鹽例多重征祺悉蠲免每謂法無重征例不可壞法王十朋知䕫州宣上恩恤民隱民輸租俾自槩量聞者相告宿逋亦願償去之日老稚攀留涕泣越境以送思之如父母程師孟提點䕫路刑獄䕫部無常平粟建請置倉適歲凶振民不足矯發他儲不俟報吏懼白不可師孟曰必俟報餓者盡死矣竟發之虞公著知開州有盜數千至境郡人大震公著不為動徐遣州兵禦之不勝又募茶商百餘人逐之出境賊遂敗李浩䕫路安撫使䕫有覊縻思州世襲守田氏與其猶子不協将起兵相攻浩草檄遣官為勸解二人感悟盡釋前憾邊境以寧陳式淳熙中知達州以禮為敎民心感悦為立生祠於州學祠左刻善政碑何異知夔州兼本路安撫以夔民土狹食少同轉運使糴米摏積立循環通濟倉陸游通判夔州嘗陳進取之䇿於宣撫王炎以為經畧中原必自長安始取長安必自隴右始當積粟練兵以俟釁鄭脩知梁山軍仁惠簡静至則民愛去則見思在郡所得廩禄除奉養外悉為民代輸李庭芝權知建始縣訓農治兵期年民皆知戰守善馳逐無事則植戈而耕兵至則悉出而戰孟珙䕫州路制置大使兼屯田大使大興屯田調夫築堰募農給種上屯田始末與所減券食之數降詔奨諭楊夀孫雲安軍主簿元兵至中江縣夀孫與将官何庚安惟臣田廣澤多坤等連戰二日俱死之韓明開州守将元兵破開州軍潰散守趙章被擒明父子猶率所部兵巷戰力屈始就擒上官䕫萬川守將元兵圍城及城䧟巷戰而死本朝郭子盧洪武末萬縣知縣政甚有聲邑人稱頌劉聲逺洪武末梁山知縣以廉幹陞户部郎中嚴升永樂初巫山知縣公勤有守百姓愛之曹嗣宗達縣丞攝縣事亷能有政聲胡軫宣徳中知䕫州府獄有無辜者三人服上刑軫辨其非釋之嘗劾罷幕官之貪墨者一時僚采為之肅然吕晟景泰中出知䕫州府性資柔順與人和樂政尚寛平一以愛民為主民懐其徳而吏胥卒亦未嘗敢慢流寓唐杜甫襄陽人初入蜀下居成都嚴武鎮蜀辟為叅謀大厯初武卒蜀亂甫乃泛江遊嘉戎次雲安移居䕫州之東屯所作有秋興等詩謝昇資州人父立為逹州推官因家焉以上書救正言鄒浩斥為邪等宋濓金華人本朝初畧官至翰林學士承旨文學冠於當時後居䕫州卒人物漢扶嘉朐䏰人初嘉母於湯溪水側遇龍後生嘉長占吉凶巧發竒中髙祖為漢王時與嘉相遇嘉勸定三秦髙祖以嘉志在扶翼賜姓扶氏官至廷尉食邑朐䏰宋龍景昭夔州奉節人少有武勇初仕蜀為施州刺史宋平蜀授永州刺史秩滿入朝改右干牛衞将軍初景昭弟處塘等四人隨孟㫤入朝卒于道太祖憫之以其子補殿直杜仁偉達州人為馬步軍都指揮淳化中李順作亂仁偉罄家貲給官軍討賊斬獲甚衆以功授撿校太子賔客行達州别駕宗晏夔州人為都押衙乾徳中有寇犯州境晏捍禦甚力民頼以安以功補右班殿直達州招安廵檢後轉西頭供奉官景林洙通川人咸平間王均叛州有賊應之林洙将鄉兵拒戰於州北為賊所戕首隕而身不仆跨馬奔歸州城東北隅人訝而呼之曰公無首矣於是始墜邦人即其地立祠祀之王文義大寧人景徳中其母疾篤剔股進藥疾愈後母卒廬墓鄉人憫其貧日給之食墳去水逺無以資洗滌祭奠器用感憂得泉人扁曰孝感泉事聞賜以衣襖王汲通川人嘉祐中嘗作天將以夫子為木鐸賦士以為矜式因呼王木鐸後舉進士官至梓州通判多政聲弟昌熙寧間舉進士任黔江縣令元豐中景靈宫成昌作賦獻之