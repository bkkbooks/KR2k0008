body:
  text: 明一統志卷七十明李賢等撰䕫州府東至湖廣荆州府巴東縣界二百一十里西至重慶府墊江縣界七百四十里南至湖廣施州衛界二百六十里北至陜西漢中府平利縣界八百里自府治至南京三千五百三十里至京師六千九百八十里糧二萬石零建置沿革禹貢荆梁二州之域天文翼軫分野周初為魚復國春秋為庸國地後屬巴國戰國時楚置扞關秦屬巴郡東漢分置永寧郡建安初改巴東郡蜀漢改置固陵郡尋復改巴東郡治永安晉治魚復劉宋置三巴校尉南齊兼置巴州尋省梁置信州皆治白帝城後周移治瀼西尋復舊治隋初郡廢州存大業初改州為巴東郡唐初復為信州尋改夔州治奉節縣天寳初改州為雲安郡乾元初復為夔州屬山南東道五代時王建置鎮江軍梁徙軍治夔後唐陞為寧江軍節度宋仍為䕫州元為夔州路本朝洪武四年改䕫州府九年改為䕫州十四年復為府領州一縣十二奉節縣附郭春秋時庸國之魚邑秦為魚復縣屬巴郡漢因之蜀漢改為永安縣晋復為魚復縣西魏改曰人復隋屬信州唐貞觀中改為奉節縣宋元仍舊本朝洪武九年省縣入䕫州十四年復置編户四里巫山縣在府城東一百三十里本楚巫郡秦改為巫縣屬南郡漢因之晋於此置建平郡隋罷郡改縣曰巫山屬巴東郡唐屬䕫州宋元仍舊本朝因之編户三里大昌縣在府城東二百里本秦漢巫縣地蜀漢屬冝都郡晉置建昌縣又改曰泰昌属建平郡後周改曰大昌置永昌郡尋廢郡及省北井縣入焉隋属巴東郡唐属䕫州宋置大寜監以大昌為属縣元併入大寧州本朝仍置縣改今属編户二里大寧縣在府城東北二百里本後周大昌縣地属永昌郡隋属巴東郡唐属䕫州宋開寳中始以鹽井地置大寧監元至元中陞為大寧州本朝洪武九年改為縣編户三里雲陽縣在府城西一百七十里本漢朐䏰縣属巴郡晉属巴東郡後周改雲安縣唐属䕫州五代唐置雲安監宋置雲安軍治雲安縣属䕫路熙寧中以監析置安義縣尋復為監元置雲安軍後陞雲陽州以雲安縣省入本朝洪武七年改州為縣編户九里萬縣在府城西四百五十里本漢朐䏰縣地属巴郡蜀漢立南浦縣後周置安鄉郡後改縣曰安鄉改郡曰萬川属南州隋改萬川曰南浦属巴東郡唐置南浦州尋改浦州貞觀中改萬州天寳初改南浦郡乾元初復為萬州宋因之元以南浦縣省入本朝洪武七年改州為縣編户四里開縣在府城西四百七十里本漢巴郡朐䏰縣地漢末析置漢豐縣蜀漢属巴東郡晉省梁復置西魏改曰永寧初改曰盛山属信州義寧初置開州唐天寳初改盛山郡乾元初復為開州廣徳初又改縣曰開江宋因之元以縣省入本朝洪武六年改州為縣編户七里新寧縣在府城西六百四十里本漢宕渠縣地西魏新寧縣属新寧郡隋廢郡以縣省入通川縣唐初復置太和中属開州後属通州宋以三岡縣省入属達州元因之本朝洪武初省入梁山縣十四年復置縣改今属編户七里梁山縣在府城西六百里本漢朐䏰縣地西魏置梁山縣隋属巴東郡唐初属浦州後属萬州宋置梁山軍縣属焉元祐初還属萬州尋復舊元改軍為梁山州本朝洪武七年省州入梁山縣編户一十里建始縣在府城南五百里本漢巫縣地晉置建始縣屬建平郡後周置業州隋廢州郡以縣属清江郡義寧初復置業州唐貞觀中州廢以縣属施州宋元仍舊本朝改今属編户五里達州在府城西北八百里本漢巴郡宕渠縣之東界東漢析置宣漢縣晉省劉宋復置属南宕渠郡南齊属巴渠郡梁置東關郡及置萬州西魏改為通州隋初郡廢大業初改州為通川郡唐初復為通州天寳初改通川郡乾元初復為通州宋初改達州以宣漢等縣省入元仍舊本朝洪武九年改州為縣省通川後復為州編户八十里東鄉縣在州城西南三百八十里西魏置元省本朝復置編户五里太平縣在州城西北三百二十里本朝置編户二里郡名永寧巴東俱漢名固陵蜀漢名雲安唐名形勝㨿荆楚上游歐陽頴引水記䕫州控二川限五溪㨿荆楚上游為巴属要郡當全蜀之口董鉞制勝樓序夔為一路當左右全蜀之口堅完兩川間隔三楚宋丁謂䕫城記慿髙控深咽喉巴峽同上鎮以灔澦扼以瞿唐䕫州報恩寺佛牙樓記水陸津要呉簡言禦寇記當水陸津要乃蜀之東門也鳳山昌江拱揖環匯大寧江山堂記東有瞿唐西有縉雲雲安鍾秀堂記東有瞿唐灔澦之壯西有縉雲塗山之美處岷嶓之下㨿三峽之上唐段文昌岑公洞記山川秀出冠於峽右宋侯師聖達州天慶觀記山水之國達州雙清閣記風俗其俗信鬼都督府記其人豪俠其俗信鬼其税易征其民不偷多勁勇少文學巴郡志俗重田神寰宇記土風拙朴宋楊輔帥䕫門與人書州人淳實土風拙朴燒地而耕杜詩注峽土磽确燒地而耕謂之火耕士以績文相高開縣儒學記踏蹟而遊圖經䕫人重諸葛武侯以人日傾城出遊八陣蹟上謂之踏蹟婦人拾小石之可穿者貫以綵索繫於釵上以為一歲之祥民俗秀野任俠尚氣通川志民淳訟稀宋王十朋詩䕫峽民淳獄訟稀使君無事只吟詩地無醫藥通川圖經山川臥龍山在府城東北五里上有諸葛亮祠因名又有泉極清冷白帝山在府城東五里峽中視之孤特甚峭北縁馬嶺接赤甲山公孫述㨿蜀殿前井中嘗有白龍出因稱白帝山亦以名赤甲山在府城東北七里不生樹木土石皆赤如人􅃝臂故曰赤甲或云漢時嘗取巴人為赤甲軍因名上有孤城相傳公孫述築類要謂即古魚復縣基勝已山在府城東九里峰巒疊秀巋然獨出衆山之山宋郡守王十朋名曰勝已白鹽山在府城東十七里崖壁高峻色若白鹽昔張珖嘗書白鹽赤甲四大字于上唐杜甫詩卓立羣峰外根蟠積水邊他皆任厚地爾獨近高天麝香山在府城東南三十里唐杜甫詩水生魚復浦雲煖麝香山陽臺山在巫山縣治北高百丈上有雲陽臺遺址驅熊山在巫山縣東二里下有石灘四時湍急如熊聲女觀山在巫山縣東北四里有石如人形相傳昔有婦人其夫官於蜀登山望夫因化為石寒山在巫山縣東五十里垂崖千層絶壁萬丈其勢髙寒荆州記云寒山九坂最為險峻飛鳥山在巫山縣西南六十里言山高鳥飛不能越也千丈山在巫山縣東北一百里秀異高於衆山石柱山在大寧縣北二十里一峰削成如巫峽所望剪刀峰與道士峰相連皆竒觀也鳳山在大寧縣治東亦名東山木石蒼翠景物幽絶宋時郡守暇日窮討得月窟雲巖釣雪玉環浮玉寳華之勝石鍾山在大寧縣東北一十五里與二仙山相望上有巨石如鍾下有三足烟火之迹宛然父老以為爾朱丹爐云寳源山在大寧縣北二十五里氣象盤蔚大寜諸山惟此獨雄山半有石宂出泉如瀑即鹹泉也金頭山在大昌縣東北四十里山勢髙聳冬月積雪不消飛鳳山在雲陽縣大江南岸與縣對峙以形似名漢成山在雲陽縣北一十五里漢扶嘉隱居其上唐瞿法言楊雲外相繼飛昇于此馬嶺山在雲陽縣北二十九里與三牛山相接漢扶加臨終有言云三牛對馬嶺不出貴人出鹽井南山在萬縣治南下瞰大江圖經云面揖南山背負都歴是也都歴山在萬縣治北一峯突出衆山之上峛崺為平阜氣象融結葢縣之主山西山在萬縣西三里上有絶塵龕宋郡守馬元頴魯有開元翰修西山池亭種蓮栽荔枝雜果凡三百本景物清絶為夔路第一石佛山在萬縣北五里山形自成佛像獅子山在萬縣北八里形如狻猊四面險絶惟鼻尖可登魚存山在萬縣西一十里上銳下廣崖面有石形如雙魚人存山在萬縣西四十里亦名萬户山羊飛山在萬縣西南五十里相傳昔有人學道于此常養二羊忽一日戒童子云勿放羊童子放之一羊冲天而去因名木櫪山在萬縣西一百里昔大禹治水過此見衆山漂沒惟此山木􅇫不動因名神仙山在開縣治東相傳昔有仙人衣朱衣乗白馬登此山唐天寳初勅置壇號神仙宮盛山在開縣北三里突兀高聳為縣主山古詩云卦笏看山尋盛字葢山如盛字也上有盛山堂宿雲亭隱月岫流盃渠琵琶臺繡衣石熊耳山在開縣東北五里以形似名鯉城山在開縣廢新浦縣西四十里四面懸絶東面有城間有浦多鯉魚因名有常渠水流經此山石門山在開縣北一百里山有石穴名盤頭洞洞有水水出嘉魚舊屬清水縣青岡山在開縣西南一百四十里與百現山近龍神山在新寧縣東北三十里上有龍神廟因名豆山在新寧縣東六十里石馬山在梁山縣南五里栢枝山在梁山縣南一十里下有丙穴出嘉魚高都山在梁山縣北一十五里山中地黃壌而腴其民以種薑為業衣食取給焉峰門山在梁山縣東一十五里其山高大頂有寒泉兩崖對峙如門故名七城山在梁山縣西二十里高梁山在梁山縣北二十里蜀中望之若長雲垂天劒閣銘所謂巖巖梁山積石峩峩是也五斗山在梁山縣西南三十里形如斛斗蟠龍山在梁山縣東三十里孤峙秀傑突出衆山下有二洞洞有二石狀如龍首尾相蟠多喜山在梁山縣南五十里山或有丹光夜現是境人必多喜事相傳陳摶嘗修道于此石枕尚存銅印山在梁山縣西南六十里以形似名白雲山在梁山縣西一百里竒峰突出如筆亦名筆山金鳳山在梁山縣西五十里山之南半崖有罅邃然内皆洞明其石上有若圖仙女狀面貎儼然時若遙動廹而視之則不見瓦城山在梁山縣西一百二十里亦名石瓦山山頂坦平耕者徃徃得古銅片禄山在建始縣東二十里山多禽獸洞蠻恃為廩禄石乳山在建始縣西五十里山石層疊多生石乳翠屏山在逹州治南形如屏風上有真武廟又名真武山傍有戛雲亭石城山在達州西四面峭絶宋晁公遡有遊山詩鳳凰山在達州西五里高聳舒展其形如飛鳳掩映縣城昔有人于此山對奕因建爛柯亭碑記剥落龍爪山在達州西北五里圓聳懸絶如龍擎珠金華山在達州西四十里與石城山相接唐楊晨詩吾州金華峙霄漢上有兠率香飄帷又梁山縣亦有金華山文筆峰在府城東南二里峰尖如筆琵琶峰在巫山縣治西對蜀江之南以形似名此鄉婦女多曉音律或云鍾此峰之秀所致十二峰在巫山曰望霞翠屛朝雲松巒集仙聚鶴淨檀上昇起雲飛鳳登龍聖泉沿峽首尾一百六十里唐沈佺期詩巫山峰十二合沓隱昭囘俯眺琵琶峽平看雲雨臺道士峰在大寧縣東與石柱山相連長松嶺在府城北五十里山多古松冬夏饒風瞿唐峽在府城東舊名西陵峽乃三峽之門兩崖對峙中貫一江灧澦堆當其口唐杜甫詩三峽傳何處雙崖壮此門入天猶石色穿水忽雲根白居易詩瞿唐天下險夜上信難哉岸似雙屛合天如匹練開巫峽在巫山縣東三十里即巫山也與西陵峽歸峽並稱三峽連山七百里畧無斷處自非亭午夜分不見日月水經云杜宇所鑿以通江水圖經云此山當抗峰岷峨偕嶺衡嶽凝結翼附並出青雲南鄉峽在府城西五十里荆州記峽西八十里有巴鄉村善釀酒村旁有溪曰龍洞溪中有靈夀木書院峽在梁山縣東五十里峽石市之北每風雨𡨕𡨕如聞讀書聲故其中有夫子崖子貢埧岑公巖在萬縣大江之南盤結狀如華葢左為方池有泉湧出巖簷遇盛夏注水如簾昔岑公修道于此俄而仙去唐刺史馬冉云南溪有仙洞咫尺非人間古練巖在萬縣治西傍有治平寺烏飛巖在巫山縣與燕子坡相對北巖在達州西五里巖壁聳然下有平池春時遊人甚盛垂虹巖在達州西北五里有水自巖巔流下若垂虹焉二仙洞在大寧縣東北一十七里鹽泉側峭壁上有石紋如人相對起伏狀洞中有仙骨長丈餘洞前有池不竭寒泉洞在梁山縣西一十里勝槩不减蟠龍龍清洞在梁山縣西一百里寳芝洞在鳳凰山頂有泉水