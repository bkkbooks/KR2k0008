石形如皷舊傳皷自鳴為兵兆錢倉在弋陽縣東二十里有石臨水如廩高數丈號曰錢倉相傳晉太和中有漁人遇石開其錢自出雄石鎮在貴溪縣西廢置不可考今資國寺僧尚藏文帖陸九淵有䟦名宦唐柳渾永豐令用重典以威奸暴鋪太和以惠鰥寡敺除物害消去人隠里閈大變綽有能聲楊光翼肅宗時信州刺史治有惠愛州人立祠祀之裴倩信州刺史復其庸亡五千户闢其農耕二萬畆代去之日不書於籍曰吾以恤隠豈當沽美方帥表其行理第一増秩加印綬孫成信州刺史有惠政潤澤及民郡人請立碑頌德優詔褒美常曽信州録事叅軍韋應物為作古鼎歌云三年紏一郡獨飲寒泉井江南鑄器多鑄銀罷官無物惟古鼎蕭定大厯中信州刺史勸農均賦逋亡歸户口増時有司條天下牧守課績定為第一宋章得象玉山令在任有恵政民立祠祀之張根徽州時淮南轉運使以花石綱拘占漕舟根上言力陳其弊貶監信州酒稅王愈宣和間知信州時盗發清溪入睦歙愈即募士増埤浚隍脩戰具賊來攻愈擊敗之追奔俘馘不可勝計李先知信州治官如家信人目以俚語曰錯安頭謂其無貌而有體也董敦逸知弋陽縣寳豐銅冶役卒多困於誘畧有致死者敦逸推見本末縱還鄉者數百人陳扄紹興中通判信州軍士謀欲為亂扄制禦有方無敢動者後除知州事沈介乾道初知信州時歲饑介賑濟有方民得其所去之日老椎扶擕隨行涕泣不能捨徐礐乾道中永豐令縣有烏石灘險惡募人疏鑿之遂平其勢值歲饑礐平其榖價且勸民出粟賑濟之盗賊猶起礐殺其首惡者一人衆頼以安張子顔乾道中知信州知閭閻隠伏臨事能斷在任盗賊屛息路不拾遺葉顒知貴溪縣時詔行經界郡議以上中下三等定田稅顒請分為九等郡守從之令信之六邑以貴溪為式趙汝愚乾道中知上饒縣時逺人貢象所過騷然乃預為條約遂免苛擾每歲推排物力互相訴乃下令俾自均認無復紛競政成惠洽郡人德之後知信州馬子嚴淳熈間鉛山尉恤民勤政長於文雅為寺碑隠然有排邪之意為倉銘藹然有愛民之心錢象祖淳熈中知信州大新學宫一時士習為之丕變王自中紹熈初知信州有文學器識以功名自期嘗訪求前賢請於朝立廟祀之曾逮上饒尉手植挂於㕔後人懷其德名之曰西清桂又有松風亭横碧軒儒紳多有題詠袁甫提點饒信刑獄行部問民疾苦薦循良劾姦貪決滯獄嘗詣學宫講說歲大旱請度牒緡錢以助賑恤疫癘大作剏藥院療之所活不可數訃黄衮玉山令有惠政嘗以檄出民皆驚憂以為遂去及還老幼歡呼已而任滿留之不獲乃立祠繪像祀之石純臣玉山令不畏高明不侮細微人不敢干以私凡得訟牒輒以筆抹其要處故無能為奸者程逈知上饒縣政寛而明令簡而信綏强扶弱導以恩義積年仇訟一語解去猾吏姦民皆感激悛悔賔禮賢士隠德潛善皆表而出之以勵風俗李由玉山令以直道自任不受請托民有所訟不拘早暮到手即决終日坐㕔重門洞開上下之情無不通者趙彦杉嘉定間貴溪令亷以律己寛以撫民及代去百姓遮道攀轅請留涕泣送之趙與懃端平初知信州鋤强梗蠲虐征治河梁新驛舍剗除宿蠧作新學校趙逢龍知信州守已儉約為政務寛恕撫諭惻怛一以天理民彛為言民以是不忍欺章鑄淳祐中知信州創新學校重脩橋梁惠民之政一時大行委博士考古今増脩上饒志自撰記文葉匪躬永豐令政績甚彰縣之東懽陂久廢匪躬復興築之至今民頼其利曾從龍宋末知信州盡心民事有戍卒行掠州境從龍置於法索得婦人衣命梟於市境内肅然元盧天祥至元中守信州興學校崇詩書延儒生論理致刻六經圖於石立兩廡下林興祖至正初知鉛山州除豪民積年之害有惠政聲譽籍甚元時循吏興祖為首辜中至正中永豐令專尚德化不施刑罰百姓晏然民愛之如父母治行第一邑人立生祠刻石記之荆思温至正中玉山尹有善政澤民秩滿民勒石頌德夀安至正中玉山尹創立書院以絃誦為教在任未久百廢具興後領兵討賊死於難宋詳至正間永豐尹興學校務農桑築陂防旱鄱陽冦至率兵禦之民頼以安及代去父老勒石頌德于大本信州路總管賊犯信州大本以土兵備禦城破被執至蘄水見賊偽主釋縳命以官大本痛罵不屈遂遇害本朝朱陵洪武初玉山知縣時兵革之後四顧蕭然陵夙夜勞心於養民之政於是逃散者爭先歸業然後漸興百廢人以為難徐中洪武間廣信知府持已亷潔措置有方嚴課生徒務臻成效民嘗病涉脩橋以便之至今郡人談前守之賢必以中為首稱徐良弼洪武初貴溪知縣時承平未久百姓離散良弼日勤憂恤民漸復業時賦外多雜科乃具申民瘼不從輒至府頓首涕泣言之獲免民頼以安方𢎞道洪武初同知廣信府有善政及民以績最擢陞郎中事載彰善癉惡録省志袁泰洪武間任鉛山丞清慎愛民邑頼以安且崇文術興舉學校省志張迪洪武間由御史知弋陽縣亷明仁愛吏畏民懷後因坐前任事被逮縣父老等千餘人詣闕乞宥得還任省志鄭庸永樂初知鉛山亷介不阿措置有法宿奸巨豪肅然畏服民皆信之有所事輒以手札召之無後期者朱原貞永樂中廣信府同知嘗督修宫宇民懷其德樂於趨事修學舍勉生徒倡立郡邑題名碑自為之記卒於官郡人無少長奔走流涕而送之錢性知廣信府法制詳明禮教興舉民不敢犯永樂丙申郡大水發公帑以賑昏墊全活者甚衆民到於今頌之不衰省志徐仕宗知貴溪縣時邑圯於水夙夜經畫脩治一新累年逋負奏析布絹田地坍决疏除稅糧歲饑甚捐俸倡義賑恤之全活無算民戴其德任滿無老穉爭赴告留事聞特加禄秩治縣至今人稱其賢云省志林端知玉山縣亷介有為愛民如子雖嚴謹不容私謁而常愛接賢士耆老相詢問是以閭閻無有能遁其情者省志吳潤宣德間任廣信知府宅心平恕政尚簡約民咸德之省志謝琛正統間上饒知縣耿介有守平易近民省志李文殊正統間廣信知府亷靜寡慾政簡民安致仕去囊槖罄如至今郡人有餘慕省志鄧顒正統間知永豐縣鼎新文廟作興士類勸農桑興水利捕殺强冦遇害民咸哀之肖像於城隍廟祀焉事聞贈光禄卿諡恭毅省志姚堂景泰間知廣信府政尚簡易民以安業嘗録郡之先賢為立祠肖像置祭田訪其後以奉祀事人是以賢之省志陶鎔天順間知永豐縣政尚平易而務抑强梗民畏而懷之殁於官室如懸罄幾不舉其喪人無遠近爭泣賻焉省志金銑天順間廣信知府文章博洽政事通敏凡百廢悉舉而新之省志吳澮天順間知弋陽縣亷介不阿絶私謁政以得民心為本入覲錫錦衣一襲省志任泰成化間知上饒縣學優才贍為政得大體不事苛屑在任三年愛民養士百廢具舉以治行徵卒於官人咸惜其用之不盡省志陳惠成化間廣信知府外和内剛惟以愛民為本嘗舉右族公正耆士十六人優禮之與謀郡政未踰年政平訟理所侍惟二僕疾卒民哀之如父母殯殮無所資十六人為治其喪以歸省志謝士元成化中知廣信府剛明果决令在所必行時永豐坑盗猖獗親率民兵禦之身被重創而不顧卒靖大難政先革弊無所撓於勢貴尤以振作斯文為己任增學舍五十餘間暇則課試諸生在任四年境内乂寧士風丕變省志張昺成化間知鉛山縣亷仁公勤通敏練達鋤强去邪邑用大治省志葉贄𢎞治初廣信知府有大度政令嚴明而行之以寛恕一時奸屏訟清四封内晏然志省丁璣由進士中書任遷廣信通判以風節自持政以敦化善俗為務甘澹泊終始不渝後以憂去省志張汶𢎞治初由舉人任上饒縣學教諭恬雅鎮靜有古人風士子咸率其教語後進必先器識校文主理勝奬勤警怠規條嚴密而人無間言省志卞諶廣信推官行端才敏政舉刑清庭無留獄民有撥雲見青天之頌省志汪瀅知玉山縣寛簡宜民清苦著節每食虀粥而已嘗公出刻期未回妻子絶糧丞聞饋以米力郤之省志朱嘉會以御史出知廣信府時桃源盗熾大兵駐郡城百姓騷然嘉會撫綏經畧省科徵簡徭役懲惰吏事理民安秩滿考績父老號泣而别省志曹琥同知廣信府堅忍清苦逆濠取茶芽及中官索方物皆力抗之民頼以甦息省志孫景雲知玉山縣以亷能稱政繢荗著未幾卒於官妻鍾氏自縊從之有司奏旌其節人謂景雲刑家之化云省志流寓陸羽唐復州竟陵人詔拜太子文學徙太常太祝不就寓居信州城北號東岡子性嗜茶環植數畆著茶經三篇後人祀為茶神吳勔唐元和間由水曹入翰林年四十即致仕初自延陵遷濮陽後樂貴溪山水之秀遂居焉好學善文後友人薦之不出桂卿自睦州徙貴溪仕南唐官至銀青光禄大夫上柱國進司空龎籍武城人宋大中祥符間侍其父為鉛山稅官嘗肄業於觀音山崇夀院院有經綸堂畫像於中應舜臣婺州人後徙居貴溪登宋慶厯進士官至太常少卿三司判官極言新法不便忤王安石出知洪州李彌大蘇州人宋崇寧進士履行端方為一世之傑累官至工部尚書後以顯謨閣學士致仕卜居於信之懷玉山韓元吉開封人維之子宋南渡後寓居上饒號南澗先生仕至吏部尚書師事尹焞與朱文公相善得吕祖謙為壻師友淵源為諸儒所推敬著愚戅録周易繫辭等書辛棄疾歴城人號稼軒宋紹興間金主亮南冦棄疾為義士耿京奉表來通高宗授以天平軍掌書記未幾京被殺棄疾遂留家鉛山之期思渡累平劇賊歴官兵部侍郎樞密都承㫖卒家無餘財僅遺平生詩詞雜著書籍而已德祐初諡忠敏晁謙之澶州人渡江親族離散謙之乃極力收恤因居信州仕宋官敷文閣學士卒葬鉛山鵝湖子孫因家焉周聿青州人徙居上饒宋紹興間召對陳經綸匡濟策稱㫖累官刑户部侍郎所著有春秋大義易說等書鄭望之彭城人徙上饒少有文名宋靖康初再使金營後累官至吏部侍郎以徽猷閣直學士致仕弟資之亦居溪南仕至吏部侍郎尹穯兖州人宋建炎間自北歸南徙居懷玉山後徙上饒愽學有文孝宗賜進士出身累官殿中侍御史後遷至諌議大夫陸九淵撫州金谿人徙居貴溪之象山與門人彭世昌等創齋舍以待四方學者來者輻凑學者稱為象山先生又嘗在鵝湖寺與兄九齡及朱熹吕祖謙相聚論議後人為立四賢堂人物唐方竦弋陽人景雲初進士累官鸞臺侍郎開元中封禪為禮儀使容止閑雅𤣥宗嘆其知禮封雲亭侯吳武陵貴溪人勔子元和初進士仕為太學􅀶士後出為韶州刺史卒柳宗元賢其為人嘗曰武陵剛健士也王貞白上饒人乾寧初進士仕為校書郎未幾退居田里工於詩有靈溪集宋余安行弋陽人所居有巖如月號石月先生歴官朝議大夫性篤孝親喪廬墓名其亭曰無盡以著孝思所著有至言春秋傳諸集葉虞仲玉山人通判江州持身甚亷歐陽脩嘗有書與相徃來其邦人有解官歸者遽斥田數十頃以誇虞仲虞仲笑曰吾貧甚不能辦此請以二十櫃書當之許幾貴溪人少以諸生謁韓琦於魏琦勉入太學擢第知南陵縣還民之託僧尼為姦者數百人以寳謨閣待制知鄆州梁山濼多盗幾籍十人為保使晨出夕歸否則以告輒窮治無脫者幾有吏幹善理財嘗四入户部官至尚書沈邈弋陽人舉進士踈爽有治才慶厯初為侍御史時吕夷簡罷相輔臣皆進官邈極論無功濫授爵及夏竦為樞密使又論其狡譎累官刑部郎中知延州劉煇鉛山人嘉祐四年狀元祖母没解官行喪禮有諸叔而嫡孫承重者自煇始嘗買田以贍族人之貧者又結廬以處逺方從學之士所著有東歸集余應球安行子崇寧間進士累官監察御史知無不言一時利害無不切中官至吏部員外郎後居親喪不復仕所著有文集奏議又公端公彦亦安行從子俱知名當世葉大用玉山人紹聖間任武職金人侵汴大用從戰陣於軍前全軀以歸高宗親書拔身歸國節義可尚八字牌面賜之嘉熈初授西京路兵馬副都監張憲道陵之後紹聖初以武力絶倫中選為􅀶興巡檢募兵復衢州劉光世上其功拜武義大夫後迎高宗於濟南拜武顯大夫江南東路副總管没於陣官其二子鄭驤玉山人元符進士靖康初知同州金人奄至或勸之逃避驤厲聲曰吾職在守土有死而已城陷赴井死詔贈樞密直學士諡威愍張叔夜其先開封人徙永豐以䕃為蘭州叅軍畫攻取策遂無羌患歴知濟南斬羣盗數千進龍圖學士金人南下為都總管率二子伯奮仲熊舉兵勤王與金人轉戰而前至京師簽書樞密院事不肯署推立張邦昌狀金人怒執至軍中北行不食扼吭而死紹興初追諡忠文余堯弼上饒人政和中進士屢為丞令不尚威嚴而人皆化其德高宗時為御史中丞知無不言拜簽樞密院叅知政事尋乞歸家居十有六年不以貴驕鄉里張運貴溪人宣和中擢進士為藍山縣尉有平寇功累遷通判鼎州張浚平賊楊么運力為多後知達州方大旱入境而雨奏除病民五事歴官大理少卿刑部侍郎獄為之空金人渝盟遷户部侍郎以專餽餉後以敷文閣待制奉祠卒贈少師周世脩玉山人宣和進士知興國縣有平盗功簽書建康府後以能應辦諸軍臺監交薦得對力陳諸將之失職者韙之陳康伯弋陽人宣和中進士歴官侍郎尚書紹興中拜左僕射大學士進封福國公時金人舉兵臨江朝論洶懼康伯屹然不動指授方畧據要害民恃以安有古社稷臣之風及再相制出中外鼓舞都人懽呼加封魯國公卒贈太師諡文正周執羔弋陽人宣和中舉進士歴治郡縣有古循吏風官至禮部尚書寳文閣學士立朝無朋比屢上疏勸辨忠邪納諌諍孝宗嘉納之平生手不釋卷尤通於易方疇弋陽人建炎初進士紹興改元上書言四宜憂十宜行一宜去又言擇宗室為儲貳除刪定官後為建康通判卒有文集二十卷徐人傑玉山人紹興初進士廷對惟以復仇為言忤秦檜意遂辭歸後提舉江西茶鹽任滿奉祠平生不治生産及没惟圖書數篋而已所著有易傳春秋發微及文集數卷汪應辰玉山人五歲知讀書一經目不忘初名洋紹興五年進士第一賜今名歴官秘書省正字以論和議忤秦檜出為建州通判奉祠檜死始還朝累遷權户部侍郎上書極論足食足兵之䇿後以敷文閣學士帥蜀一道晏然進吏部尚書卒諡文定子逵繼登進士第仕至端明殿學士申世寧鉛山人紹興六年潘逵兵襲鉛山父愈年七十未及出户遇賊賊意其有藏金欲殺之世寧年未冠亟引頸願代父死賊感其孝兩全之王時敏上饒人學有淵源兼該體用老於田里有處士之風著師說及語孟中庸大學說并雜文十卷朱熹為作墓誌周欽若鉛山人累世業儒初有聲三舍間不就禄仕積書教子病亟索筆書二百餘字戒四子曰吾平日教汝等非為干禄欲敦義厚俗耳時子幼妻虞藏之及子長出示之諸子感泣白父訓於官給令守之數世同居慶元中旌其門陳文蔚上饒人號克齋朱熹門人講學鉛山著書立言得其師㫖趣高風雅操為鄉邦所共仰卒祠於學詹叔善玉山人紹興中進士拜奉議郎諸王教授僅滿即求致仕夀皇嘉之官其子復賜誥有知止足勵士風之語先時叔善築書屋榜曰知止與詔語合人多題詠之又叔寧叔逈叔法叔羲皆其昆弟俱登進士第韓大寧玉山人紹興中進士有經世志嘗著續百將傳及周易集註乾道間上書凱切上覽而異之除知德興縣有惠政劉允迪玉山人隆興中進士知德安縣為政一本於儒術以惠愛得民後居家建義學以教族子弟及鄉人之願學者累官至朝奉郎叅議沿海制置便軍事施師點上饒人十歲通六經乾道中以臨安教授賜對言細民困窮乞免逋負詔從之假翰林學士使金於禮有所執金人駭愕後參知政事兼同知樞密院事與周必大恊心輔政惓惓搜訪人才卒贈金紫光禄大夫所著有文集二十卷韓祥玉山人與弟補同登嘉定進士祥累官侍講學士中書舍人補累官寳文閣學士兄弟俱以德行文章顯名世稱二韓理宗作詩賜祥又書翕和堂三大字賜之黄從龍永豐人嘉定中進士為郢州推官元兵入襄峴郢當要衝守將潛遁乃抱印登城大呼兵間曰張巡許遠之事正在今日齧指書死戰報國四字與子熈力戰而死趙蕃其先鄭州人曾祖暘以秘書少監提點坑冶寓信之玉山蕃以暘致仕恩補官寳慶初以太社令召三辭不起止於直秘閣致仕蕃性雖寛平樂易而剛介不可奪嘗受學於朱熹徐元杰上饒人紹定五年南省廷對皆第一為崇政殿說書時權臣遭親喪起復元杰極論其不可命遂寢累遷國子祭酒權中書舍人廷論無慮数十皆國家大政邊鄙遠慮忽暴疾轉工部侍郎卒時以為中毒詔諡忠愍長子直方為起居郎兼侍講次子直諒為吏部尚書徐宗仁永豐人淳祐進士歴官國子監主簿開慶初伏闕上書言悞國之罪不誅則用兵之士不勇累遷太府少卿兼侍講徳祐初為吏部侍郎權禮部尚書衛益王走海上厓山兵敗死焉謝枋得弋陽人號為疊山為人豪爽以忠義自奮寳祐中試經科除教授德祐初以江西招諭使知信州遣將與元兵戰不利乃變姓名入建寧山中元初大臣屢薦輒辭有怒者逼以北行至元都問謝太后攢所及瀛國公所在再拜慟哭不食而死妻李氏擕二子在貴溪山中後被執亦自經死元祝堯上饒人博學能文延祐中進士為江山尹後陞無錫州同知所著有大易演義策學提綱張宏綱貴溪人早負才學歴官至集賢院大學士榮禄大夫柱國謚安惠封信國公本朝龔斆鉛山人學問該博徳行篤實洪武初以明經為府學教授御史葉孟芳高其學行薦至京師遷國子司業尋陞祭酒卒於官白天民鉛山人洪武初以明經為邑庠訓導教人有方御史葉孟芳薦之曰學精德邁智慮過人才堪大用召至京師授廣東肇慶知府果有政績著聞陳脩弋陽人太祖戡定陳氏脩來歸首授理官講明律令尋遷兵部郎中贊定兵農之政疲敝復興超拜吏部尚書脩明習經制建官均􅕄肇昭代之法卒於官何敏中洪武中以才行卓異任祁門知縣上書言時政得失朝廷嘉之遣行人賜以樽酒陞徽州府知府後轉嘉興府所至有政聲游志遜上饒人慷慨有俊才洪武間為廣西興安縣丞入朝應制賦詩最佳擢監察御史舉劾不避權豪嘗以忠直見稱後拜四川按察司僉事楊廣仁上饒人讀書識大體永樂間為虞城知縣百廢其興民有火災值風烈弗禁廣仁以誠禱得大雨以熄後又雨潦將傷稼廣仁齋沐禱之雨止嘗以累繫獄百姓相率詣闕白其寃得釋及卒老穉遮道迎其喪而泣送之者千數百人李奎弋陽人永樂間歴任教官遷國子監學録正統間拜監察御史巡歴有聲尋陞大理寺丞巡撫河南時流民聚衆頼之以安遷右少卿巡撫畿内諸郡未幾致仕卒居官亷潔優於文學屢上章疏切於時政王增祐貴溪人永樂間進士授監察御史歴陞僉事副使嘗兩奉敇審録重囚辨死罪以下三百餘人全活訾者衆進廣西按察使致仕歴官四十餘年善政無可議志省吳添麒弋陽人永樂間進士嘗奉使東魯閩楚大藩清聲昭著中外省志祝同玉山人由監生任主事累官河南叅議以疾致仕召起布政使辭不就省志周旭鑑貴溪人歴官黄巖知縣鋤强植弱振興士類表倡風俗致瑞麥駢桑之應累官浙江叅政卒於官民爭先賻奠柩還衆皆縞素送數十里祠祀焉省志胡濬鉛山人正統末進士歴官杭州知府亷公有威不畏强禦屬邑富陽新城屢旱亟相視之為開渠築牐引流灌溉民頼之郡有滯獄悉為剖决治行為天下第一杭人至今祀焉省志黄􅄎弋陽人正統間進士授御史按歴西蜀直𨽻諸郡書考得宜振勵有方郡邑有真御史之稱歴陞四川廣東按察使省志吕晟永豐人景泰辛未進士歴陞䕫州知府柔順和樂以孝行稱於鄉有司上其事詔旌其門省志高明貴溪人景泰間進士拜御史巡按都城及河南直聲振天下累陞南京僉都御史平揚州鹽寇滅上杭劇盗皆樹奇績致仕卒詔諭祭葬省志王讓上饒人天順末進士任吏科給事中在諫垣屢觸忌諱不為禍福怵一時權貴深畏之有希風㫖誣奏之者朝廷反坐之後擢楚雄知府威惠並洽遠人靡不懷服焉省志費瑄鉛山人舉進士歴官貴州叅議忠孝睦友出於天性初以主事治水吕梁見上流有渠合芻土沿渠築堤恒潰民苦征役乃募工改築石堤西則築壩以殺湍悍之勢東則甃長衢以疏牽挽之壅於是漕兵穪便居民立廟祀之省志姚明貴溪人成化間進士授御史嘗出按兩浙歲饑發京儲以賑或難之明曰為民而死吾不避也竟如請有中貴贈劔既拒之且削其歲餽金數千兩或危之明曰吾為耳目官敢為身謀耶後陞陜西僉事卒省志婁謙上饒人成化初進士任御史陞副使嘗督兩畿陜西學政以躬行實踐為教士類風動時汪直有寵能禍福人謙絶不與之接直御之使邏校伺察竟莫可問陞四川布政使卒志省畢瑜貴溪人成化初進士改庶吉士歴官工刑二曹擢山東提學僉事文學操履見重一時卒於官諸生哀之子濟川第進士官編修省志鄭齡弋陽人登進士拜官工曹累四川布政使凡秩六進政譽日彰在川督糧餉繕兵甲劇盗野王剛就擒其績尤偉尋擢都御史巡撫河南振憲度察風俗禮賢愛民顒然中州之望卒賜葬祭省志李鏡弋陽人登進士歴知岳州府鋤梗植弱崇學博惠築辰陵磯洩水墾田授民以居民深德之名曰李公隄陞去民不忍捨立生祠祀之後以河南按察轉浙江布政使卒省志汪鳯弋陽人少治經學為文汪洋渾厚自成一家登成化乙未進士官刑曹治獄明恕堂司章䟽多所草上出知漳州歴九載以仁恕稱擢貴州左叅政卒四子俱登進士長僎工部郎中次俊禮部尚書偉侍郎佃編修省志姜綰弋陽人舉進士拜御史以直言謫判貴陽尋調慶遠逋寇攻城綰計敗之斬首二百級威震逺人東蘭皆歸侵地擢副使兵偹柳慶值思恩岑濬之亂仍率兵而一皷俘之用是荒陬向治以疾歸起為河南按察使卒省志費宏鉛山人成化丁未進士第一授翰林院修撰靳貴謂其甫弱冠狀元及第入内閣年四十有五在位多所匡正卒以不合去自國初及今以狀元位宰相年與才俱茂而又得勇退之義者亦不多得矣外史姚文灝貴溪人成化間進士歴官湖廣提學僉事崇正學黜浮靡嘗自謂所能者三毁譽不入請託不行賄賂不通而已所著有學齋稿等書省志吕翀永豐人登進士累官給事中抗疏忤㫖杖於朝黜歸瑾誅起為雲南僉事四川副使卒省志詹軾玉山人由進士授行人正德末以諌南巡受杖而死嘉靖初諭令録其子省志紀鏞由吏員授福建漳浦縣丞正德丁丑南靖寇熾鏞率兵與戰斬首數千級乗勝抵其穴因遇害事聞贈官録其子省志列女羅氏名妙安元弋陽人能諳誦列女傳年二十歸鄭琪琪家世宦族同居百餘日羅執婦道無間言琪以軍功擢鉛山州判官羅封宜人至正末信州陷羅取所佩刀淬礪令銛琪問何為對曰時事如此萬一遇難為自全計耳已而兵至羅自刎死翁氏永豐人周德成妻年二十五撫幼奉姑守節又玉山葉德彰妻王氏夫早亡守節俱洪武間受旌省志徐氏永豐傳彦恭妻年二十六夫亡無子以姪為嗣生孫姪又亡撫孫守志始終一節永樂間詔旌其門省志劉氏永豐人鄭友東妻友東出戍早亡劉年二十五子甫週且兵亂公姑為仇家所殺以禮葬之守節無玷永樂間詔旌其門省志鄒氏貴溪萬全保妻年十九全保卒無子水漿不入口數日既而事舅姑盡孝舅姑卒喪葬如禮孀居一致知縣梁孟嶽以事聞請旌表未報而卒省志羅妙法千户羅仁女年十六許配曹氏子徃蘇州道卒遂誓不嫁父母不能奪老而卒家人繪像祀之省志施氏名貞上饒王伯剛妻年十九而伯剛卒人或以無子撓之施以死辭居常閉門一婢相守寂如也撫教繼子輔為增城知縣卒年七十有八人無間言省志鄭氏雙節上饒人祝氏名臨姑歸孔貫年二十六而孔貫亡劉氏名錦雲歸麒年二十九而麒亡姑婦相繼守節完璧以終都穆為作雙節婦傳省志陳氏上饒人歸龔潤潤舉鄉試上春官天順癸卯之變死焉陳時年少甘貧守節不以無子故異其心省志劉氏上饒汪芳妻芳廢瘋痿謀更遣之劉泣曰夫貧且疾妾命也敢不以死從傭紡績以給朝夕正德庚午桃源賊至劉䕶芳不忍去賊欲辱之不從斬芳首以脅罵聲益厲遂遇害省志團氏上饒鄭䞇妻桃源賊至團度難兼免使夫畀其姑先走自負子從之不及被執賊欲汚之紿求緩乃并其子俱赴水死省志朱氏上饒人歸歐陽福祐年二十三而寡姑難其少且貧諷使更適矢死不從姑病革刲股療之比卒哭之甚慟遇異人指以古厝人謂孝感所致云省志葉氏永豐人歸上饒周瑗年十八夫卒無子嗣其姪誌垂老不渝節操姪婦俞氏者亦無子早寡清苦守節葉實倡之也省志毛氏玉山詹清妻年二十二清没遺腹生子杓垢容惡服誓不再嫁姑徐久癱患毛與共寢浣滌檅惡孝謹備至省志張氏鉛山費珣妻珣領鄉薦未第卒張剪髮入歛􅄔居三十餘年節操如一事聞旌表其門省志鍾氏浙江上虞人玉山知縣孫景雲妻也𢎞治十五年景雲卒於官鍾哀慟迫切自縊以從提學副使邵寳為之立亭以紀其事於石省志祝氏鉛山人傅岡妻傅没祝年二十六姑議欲改嫁祝泣辭甚確姑竟欲奪而嫁之聘至祝佯為閉門檢飭狀竟赴江抱石而死是秋大旱知縣張昺禱之不應乃集諸耆老問其故有以祝氏節義告者昺即具牲醴為文親詣死所祭奠是夕大雨祝之死節處水深莫測後湧塞成洲俗因呼為節婦洲省志蔣氏名善鉛山人適弋陽蘇榮年二十八夫亡撫孤守節有司聞於朝旌其門省志虞氏弋陽人李元順妻也正德壬申流賊剽掠元順挈家以逃賊勢迫虞度難免拔簪遺犬曰吾分死矣决不受辱子為全母計耳果被執且哭且罵聲益厲賊殺之省志危氏貴溪聞一貫妻正德壬申桃源賊剽掠危度難免顧謂夫曰禍迫矣夫全老祖我負二子且逃後為賊所執出首飾祈免賊取之復逼以去危乃罵曰吾儒家婦豈為狗彘從耶賊殺其幼子脅之奮罵愈厲遂遇害事聞旌其門省志丘氏貴溪人年十四歸邵節甫八年節以苦學得疾卒丘哀毁欲死慮嗣飬無主乃截髮矢志年六十三卒祭酒魯鐸挽以詩有泉臺無愧見良人之句省志李氏弋陽人黄觀妻年二十夫喪守節有司高其行奏請旌表之省志仙釋張道陵漢留侯良八世孫生於天目山學長生之術退隠於山章帝和帝累召不起久之徧遊名山東抵興安雲錦溪升高而望曰是有異境遂沂流而之雲錦洞有仙巖焉煉丹其中三年青龍白虎旋繞於上丹成餌之時年六十容貌益少又得秘書通神變化驅除妖鬼後於蜀之雲臺峰昇天所遺經籙符章并印劔以授子孫其四代日盛復居此山歴代重之今其子孫世襲真人張留孫貴溪人少時入龍虎山為道士有相者謂曰神仙宰相也元世祖時從天師張宗演入朝世祖與語稱旨留侍闕下世祖嘗親祠幄殿忽風雨暴至留孫禱之即止授為𤣥教宗師居崇真宫時天下大定與民休息留孫因論治道貴清淨之㫖深契上衷加號大宗師武宗時陞大真人自清宋紹興中居大山寺其性疎屢被師責一日謂師曰弟子欲往京都見天子願假一乘師怒曰糞箕扛汝自清即成一偈云糞箕扛出轎擡回優鉢羅花向日開但願老僧高着眼管教平地一聲雷遂辭去忽一日乘傳至奉勅重整山門賜號曰雲風和尚明一統志卷五十一
