body:
  text: 明一統志卷五十一明李賢等撰廣信府東至浙江衢州府常山縣界一百二十五里西至饒州府安仁縣界二百里南至福建建寧府崇安縣界一百六十里北至饒州府樂平縣界一百六十里自府治至南京一千八百四十里至京師五千里糧十三萬三千石零建置沿革禹貢揚州之域天文斗分野春秋戰國迭為吳楚之地秦属九江會稽二郡漢為豫章郡之餘汗縣及會稽郡之大末縣地晉宋及隋屬鄱陽東陽二郡唐析衢之玉山常山饒之弋陽及撫建二州地置信州𨽻江南西道五代時楊吳南唐繼有之宋以信州𨽻江南東路元改置信州路𨽻浙江行省本朝改為廣信府𨽻江西布政司領縣七上饒縣附郭本漢豫章郡鄱陽縣地孫吳置上饒縣晉省宋復置隋省唐復置𨽻饒州以其在饒州之上故名尋省入弋陽乾元初復置為信州治宋元仍舊本朝因之編户一百八里玉山縣在府城東一百里本隋東陽郡之信安縣地唐初為常山湏江及弋陽三縣地證聖初析置玉山縣以縣有懷玉山故名初屬衢州後改屬信州宋元仍舊本朝因之編户五十七里弋陽縣在府城西一百二十里本漢豫章郡餘汗縣地孫吳折置葛陽縣晉屬鄱陽郡隋改為弋陽以地有弋水故名唐初屬饒州後改屬信州宋元仍舊本朝因之編户五十二里貴溪縣在府城西一百九十里本漢餘汗縣地隋為弋陽縣地唐永泰初置貴溪縣以縣在湏溪口故名𨽻信州宋元仍舊本朝因之編户八十四里鉛山縣在府城南八十里本唐撫建二州地後析上饒弋陽五鄉置為塲南唐始置鉛山縣屬信州以山產銅鉛故名宋初以縣直𨽻京師後復𨽻信州元陞為州本朝復為縣編户五十七里永豐縣在府城東南四十五里本唐饒州上饒縣地乾元初析置永豐縣屬信州以縣有永豐山故名元和中省入上饒縣宋復置元仍舊本朝因之編户五十二里興安縣在府城西八十一里本上饒弋陽貴溪之餘鄙嘉靖中置為縣編户三十一里郡名上饒唐名形勝地控閩越引二浙隠然為要衝之會宋韓元吉修城記川源夐遠關防襟帶寰宇記當吳楚閩越之交為東南望鎮宋李彌大法海院記山水之秀甲諸郡元袁桷梅亭記風俗土風貧薄唐白居易詩地僻山深古上饒土風貧薄道程遙文風日盛郡國志安土重業貴溪縣志嗇陋改習永豐縣志古雖嗇陋然有柳渾賢令倡之於前張叔夜忠臣陶之於後故郡民頓改前習矜謹節義元袁桷梅亭記其俗多刻厲自奮矜謹節義山川茶山在府城北唐陸鴻漸嘗居此號東岡子刺史姚驥嘗詣其所居鑿沼為溟渤之狀積石為嵩華之形後隠士沈洪喬葺而居之龜山在府城西南五里勢如龜有諺云水打烏龜山信州出狀元宋徐元杰應之南屏山在府城東南五里環拱秀麗可愛下有東獄廟及祥符景德二寺石橋山在府城西二十里山半有巖洞遠望如月又名月巗其上平坦如橋宋朱喬年詩鑿透巉巖不記春山腰千古掛氷輪元趙孟頫詩月巖如偃月風泉麗晴雪仙境在人間真成兩奇絶銅山在府城南四十五里有井泉廣丈餘一石倒墜如蓮花覆蓋天欲雨井中即有白霧上騰靈山在府城西北六十里山有七十二峯蓋郡之鎮山也道書為第三十三福地上有龍池多珍木竒卉産水晶其東北峰梃立孤石高百餘丈西峰絶頂有葛仙壇遺址宋韓元吉詩諸峰七十二磊砢畧可推定知水晶宫悶藏神所司葛仙煉丹成空聞龍化陂遺體被山川勝槩無乃私水南山在玉山縣南二里一名武安山清秀卓拔其巔有塔太甲山在玉山縣北二十五里上有商太甲廟齊峯山在玉山縣南三十五里元魏𤣥德居此善製墨至今業墨者墨有齊峰字龍泉山在玉山縣西八十里有泉不竭三清山在玉山縣北一百里與懷玉山並峙有羽化壇晉葛洪與德興李尚書修煉處山巔有老子宫又有金沙水玉洞靈濟廟羅漢洞李尚書鐵爐諸奇勝懷玉山在玉山縣北一百二十里一名玉斗南唐時縣令楊文逸嘗夢一羽衣自稱懷玉山人來謁未幾其孫億生山有法海院宋李彌大有記龜峯山在弋陽縣南二十五里有三十二峯植立如笋峭不可攀中有一峯如龜又有蜃樓能吐納雲􅂔可為晴雨之驗宋謝枋得詩三十二峯峯最高脚踏高處真人豪近觀靈山亦培塿俯視彭蠡無波濤軍陽山在弋陽縣南三十里一名君陽唐貞元中其山産銀乾符後不復有李翺詩有怪峯直聳似華山之句金鳯山在弋陽縣南三十里山有奇石迴旋如鳯寳峯山在弋陽縣南三十五里廣袤數百里白雲吐吞瀑泉清響中有石亭高七十餘丈傍有石橋長五十餘丈搗藥山在弋陽縣東一百三十里上有搗藥石臼傍有井泉甘美三峯山在貴溪縣南二里三峯相並東連玉表巖西接五面山南北孤絶五面山在貴溪縣西南五里東連三峰山南一峯屹立削成五面元趙孟頫詩洞中即仙境洞口是桃源何殊五陵路鷄犬自成邨自鳴山在貴溪縣西五十里上有湖天欲雨則水湧其聲如雷故名元張留孫言山神有靈狀請崇顯之至大中封真君袁桷有記象山在貴溪縣西南七十里初名應天山宋儒陸九淵嘗讀書於此以山形如象更今名鬼谷山在貴溪縣南八十里道家第十五洞天山有蘇秦臺張儀井世傳鬼谷子嘗居此龍虎山在貴溪縣西南八十里山峯峭拔兩石對峙如龍昻虎踞道書為第三十二福地乃漢張道陵脩煉之所飛昇臺遺址尚存下有演法觀古松夾道今道陵裔世襲真人居之宋江萬里詩鑿開風月長生地占却烟霞不老身虚靖當年仙去後不知丹訣付何人徴君山在貴溪縣南八十里十四代真人張子明隠此屢徴不起故名龍窟山在貴溪縣北八十里山有龍井有龍窟寺歲旱禱焉銅寳山在鉛山縣治西南石竅中湧泉侵鐵可為銅天久晴有礬可拾一名七寳山鉛山在鉛山縣西南七里舊名桂陽山又名楊梅山其山産銅鉛南唐嘗置鉛塲於此鵝湖山在鉛山縣北一十里山之上有湖生荷舊名荷湖山後有龔氏畜鵝於此故又名鵝湖唐王駕詩鵝湖山下稻粱肥豚柵鷄塒半掩扉桑柘影斜春社散家家扶得醉人歸葛仙山在鉛山縣西七十里吳葛𤣥修煉於此上有煉丹臺及龍井井傍有試劔石元胡汝為詩白雲紅霧鎖仙扉古木蟠空鸛鶴飛丹室草湮翁子去經床香緲道人歸永豐山在永豐縣西南二十五里鶴山在永豐縣西三十里上有龍池其水色碧靈鷲山在永豐縣東三十五里山石秀潤樹木環密上有光相洞幽深不可窮雨石山在永豐縣東南四十里歲旱禱雨多應山西有巖其石如螭盤虎踞鶴立鸞翔之狀六石峯在永豐縣東六十里與三巖山相對逍遙峯在貴溪縣南七十里晉許遜煉丹處元趙孟頫詩兹石足逍遙下可坐百人豈徒木石居且與猿鶴隣南巖在府城南一十里一名盧家巖巗傍巨石北向其下寛平可坐舊為郡人遊賞之所今南巖僧院在焉宋晁補之韓元吉皆有詩洞巖在玉山縣北三十五里林壑掩映巖石竒秀溪水流出其聲清壯越溪行數里舊有軒曰尤美取醉翁亭記林壑尤美之義結鬚巖在三清山俗傳晉李尚書與葛洪脩煉時尚書結鬚渡此巖因名長廊巖在貴溪縣南二里相傳漢王表修煉之所有煉丹井洗藥池飛昇臺元趙孟頫詩修巖如長廊下有流泉注山中古仙人步月自來去龍口巖在貴溪縣南二里峭石壁立飛泉二道瀉下如龍口噴涎趙孟頫詩峭石立四壁寒泉飛兩龍人間苦炎熱仙山已秋風徐巖在貴溪縣南三里宋徐紹景讀書處其地林深水遠洞穴幽䆳有巨石平坦突出山側如月攀蘿可登以望遠仙巗在貴溪縣南去龍虎山二里峯巒削立高出雲表巖石䆻空多洞穴房屋牕牖床榻倉廪棺槨雞犬禽鳥之狀共二十四巖宋白玉蟾題仙機巖詩云織就霓裳御冷風玉梭隨手化成龍天孫歸去星河畔滿洞白雲機杵空王文卿題轆轤巖詩天上霞開金井曉山中風引玉繩秋長江萬古吸不盡斷岸夕陽飛白鷗鬼谷洞在鬼谷山其洞幽黑入必以燭䢛迴四里可容數千人旁有一洞洞口狹小相傳昔有人入其中迤邐漸遠見人物廬舍儼然如人世風洞在貴溪縣南五十里嘗有風氣嘘吸趙孟頫詩石壁何崆峒中有風冷然安知列禦寇不向此中仙水簾洞在貴溪縣南八十里洞中可容數千人洞口泉水懸崖而下趙孟頫詩飛泉如玉簾直下數千尺新月懸簾鈎遙遙掛空碧緝女石在府城西三十五里類工女之形神石在弋陽縣東南横出大溪捍截東流縣治頼此無衝潰之患故以神名上饒江在府城北上流會諸溪水下經弋陽貴溪流入饒州府境弋陽江在弋陽縣東二十里又名弋溪源出靈山西流入葛溪相傳昔有弋獵者居其側或云有大石面如鐫弋字因名宋梅堯臣詩縣前奇哉一江水日暮風吹碧鱗起客恨征塵忽如洗不用金箆刮眸子宋溪在府城西八十里源出靈山西流入上饒江唐天寳間有宋氏居溪之傍因名櫧溪在府城西一十里源出靈山西流入上饒江岸多櫧木故名玉溪在玉山縣東五里因懷玉山為名水有二源合流十餘里會淪溪水入上饒縣境沙溪在玉山縣西三十里下流入上饒江明溪在弋陽縣西二十里下流入葛溪本名弱水唐刺史孫成改今名葛溪在弋陽縣東七十里源出靈山合晚港水下流經薌溪入饒州府鄱江薌溪在貴溪縣南一名貴溪上流即上饒江也永平溪在永豐縣東四十五里下流合永豐溪永豐溪源自福建建寧府界流經永豐縣界下流合玉溪信義港在弋陽縣東二十里源出福建邵武府下流入葛溪其傍土地膏沃人多信義君遷潭在府城西南四里义名五龍潭舊經云每郡守解任去嘗於潭上祖餞之故名落馬潭在玉山縣北五十里源出三清山重潭在弋陽縣西南二里下通葛溪鍾石灘在府城西八十里灘畔有巨石如鍾南池在府治内相傳故州學之泮池墨池在府治南舊傳嘗有仙人於池内洗筆其水常黑義泉井在貴溪縣南七十里當入閩要路行者至此多渴里人徐氏鑿井引泉作亭其上真人張宇初題曰義泉井聖井在龍虎山山有三井一在山半一在絶頂相傳有龍居之三台井在貴溪縣南一百里其井三級相連水源不竭石井在鉛山縣北四里井上石文隠起錯鏤垂下如蓮花倒生其水清泠甘美溉田數百畝始名玉洞泉又名碧玉泉慈濟泉宋洪芻有記仙井在葛仙山頂元陳衡作葛仙翁祠碑云病飲則念旱禱則霖一滴泉在南巖之西自石竇中出四時不竭味甚甘美宋朱熹詩一竅有靈通地脉半空無雨滴天漿華峰龍泉在玉山縣南一十五里有龍潜焉歲旱輒禱於此元韓澄詩名齊西嶽聳蒼𡨕神物潛藏地有靈寒泉在玉山縣東三十五里水甚清冽元徐興善詩冷沁雲根漾素秋土産銀弋陽玉山縣出今無銅弋陽鉛山二縣出鉛鉛山縣出鐵玉山貴溪弋陽三縣俱出有塲久罷惟上饒縣永樂鄉塲尚存瓷器弋陽縣出有窰葛粉各縣出公署廣信守禦千户所在府治東北鉛山守禦千户所在縣治西俱洪武元年建學校廣信府學在府治東宋景德間建本朝宣德初及𢎞治中俱重建上饒縣學在府治東北宋淳祐間建夲朝洪武初重建玉山縣學舊在縣治東元大德間徙建於縣治南本朝永樂間重建弋陽縣學在縣治東宋紹興間建本朝洪武初重建貴溪縣學在縣治東宋慶厯間建本朝洪武初重建尋圯於水徙縣治西宣德丁未仍遷於此鉛山縣學舊在縣治東宋紹定初徙於縣治西真德秀有記本朝洪武初重建永豐縣學在縣治東宋熈寧間建本朝重建興安縣學在縣治南嘉靖中建書院稼軒書院在鉛山縣南二里宋辛棄疾讀書處初名瓢泉書院後以其號名端明書院在玉山縣治東宋端明殿學士汪應辰講學處元監縣夀安始建書院蘇天爵記象山書院在象山宋陸九淵講學之所鵝湖書院在鵝湖山下宋