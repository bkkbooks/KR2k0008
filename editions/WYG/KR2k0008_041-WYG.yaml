鄉為始新縣及賊平復表分歙地為新都郡孫權以齊為太守三國孫韶呉甘露初韶于建徳水濵得大鼎進之呉主因改元寳鼎封韶為建徳侯南北朝江秉之劉宋新安太守政尚簡要所得禄悉散之親故在郡止作一書案去官留以付庫沈瑀齊建徳令教人一丁種十五株桑四株杮及棃栗女丁半之頃之成林民咸感悅伏暅梁新安太守在郡凊恪有操履賦稅不登者輒以太守田米助之郡多麻苧家人乃至無以為繩其厲志如此任昉梁天監中為新安太守在郡不事邊幅為政清省吏人便之及卒遺言不以新安一物遷都徐摛梁大通中新安太守為政凊凈教民禮義勸課農桑朞月之間風俗頓改陸繕陳永定中留異割據東陽新安人向文政與異連結以繕為新安太守討平之唐宋璟開元初為御史大夫坐監朝堂杖人輕出為睦州刺史房琯開元初為睦刑司戶復為建徳縣令所至尚徳化興善利以治最顯韓洄乾元中江淮凶饑而新安特甚時推洄能名除睦州别駕知州事韓泰長慶中睦州刺史韓愈在袁州時嘗薦泰自代極加稱許杜牧㑹昌中為睦州刺史嘗論土鹽商為害孶孶為民郡中號紫微太守李道古睦州刺史著大㕔記載唐永徽至元和刺史除拜嵗月甚備宋刁衎知桐廬縣㑹詔羣臣言事衎上諫刑書謂淫刑酷法非律文所載者望詔天下悉禁止之田錫雍熙初知睦州卅人舊阻禮教錫大興庠序建孔子廟表請以經籍給諸生詔賜九經自是人知問學俗為之變范仲淹景祐中知睦州大興學校建嚴子陵祠作瀟灑桐廬郡十絶以紀山川風俗之美彭思永通判睦州有治績台州大水敗城思永往欇數月公私之舍皆具築城髙於前趙抃嘉祐中知睦州州嵗為杭州市羊抃移文却之又民有茶稅而無茶地奏蠲之民懷其徳錢即睦州推官部使者有獄在衢啖即以薦牘使往治即曰吾寧老冗選中豈忍以數十人易一薦乎至則平反之吕希純知睦州有賢行郡志謂自范仲淹至吕希純可稱者止六七公張確通判杭州攝睦州事時青溪盜起有自賊中還回者確悉㸔之訪得虚實以告諸將用其言盜果平劉清之紹興中為建徳縣主簿請於州俾民自實其戶由是賦役平爭訟息胡寅紹興中知嚴州政教並行民用胥勸袁樞嚴州教授樞常喜誦司馬光資治通鑑苦其浩博乃區别其事而貫通之號通鑑記事本末桞約知嚴州時金人大入列郡震恐約屹保孤城悉力捍禦境内安堵乂上書請合諸郡克復呉㑹李彦頴建徳縣丞方改秩時宰知其才將處之學官或勸使一見彦穎恥自獻不往張震知嚴州州舊有章惇祠震即命毀去而以范仲淹易之張栻乾道初知嚴州以教化為先問民疾苦首以征鹽鐵絹太重為請孝宗可其奏弟枃亦通判嚴州方年少已有能聲蕭燧淳熙中知嚴州嚴地狹財匱始至官鏹不滿三千燧儉以足用二年之間積至十五萬以其羡補積邇諸邑皆寛吕祖謙嚴州教授時張栻為守以經學淑諸生祖謙又以經㫖薫陶之自是郡人尚義理之學金安節知嚴州除浙西提刑赴召首言治民之道先徳後刑今守令於簿書期㑹賦稅輸納窮日力辦之而無卓然以教化為務者願申飭守令陳曄淳熙中知淳安縣創義倉募義役興滯補廢民甚便之髙斯得淳祐中知嚴州嚴環山為郡雖豊嵗猶仰他州夏旱斯得蠲租發廩招糴勸分請於朝得米萬石以賑濟袁韶嘉泰中知桐廬縣縣多宗室持縣事無有善去者韶始至絶私謁莫敢橈錢塘岸嵗為潮齧率取石桐廬韶言廟子山有石不必旁取鄰郡遂得永免呉淵嘉定中建徳主簿丞相史彌逺館留之語竟日大悅謂淵曰君國器也今開化新置尉欲以此處君淵對曰甫得一官何敢躁進彌逺為之改容元王子玉至元中為夀昌尹時江南新附徭役繁劇子玉每抱吿身詣府泣訢卒減差科民甚徳之鄧文原浙西廉訪僉事桐廬人戴汝惟家被盜有司得盜獄成送郡夜有焚戴氏廬者而不知汝惟所之文原曰此必有故也乃得其妻與其弟謀殺汝惟狀人以為神馬世榮大徳中為夀昌尹冶多善政嘗率民於近縣築堤障水民頼之名曰馬公堤朱倬至正間為遂安尹以興學為先務鄰境盜竊發倬集鄉民禦之邑頼以安本朝彭子冲洪武初知夀昌縣涖事勤敏甞建㑹通橋以濟不通未幾陞池州府同知金師古洪武初知分水縣修築壇壝教民播種後陞永州府同知民恩之不忘王思勝洪武中為嚴州知府政尚清簡臨下以莊吏民畏而愛之季仲蘭洪武中為嚴州知府勤於政事惠愛及民一郡翕然從化潘惟學洪武末為嚴州知府為政不苛推行有漸既去而民思之劉廷讃景泰末知淳安縣廉介仁恕訪民疾苦専施惠政不求赫赫名焉省志流寓嚴光漢㑹稽人少與光武同遊學及光武即位以物色訪之得於齊國拜諫議大夫不就去耕釣於富春山今釣臺即漢富春縣地也戴顒劉宋譙郡人徙居剡縣父兄勃並隠遯有髙名顒聞桐廬多名山與兄弟共遊遂留居焉顒嘗述荘周大㫖著通選論戴記十篇俞鳬唐洪州南昌人徙居分水登進士第以詩名於時與方干賦詩相往還豐稷宋明州人徽宗朝為御史中丞首論蔡京姦狀京坐貶及京復相修故怨稷安置睦州人物漢方儲歙人其地在今淳安講孟氏易精通圖䜟建初間舉賢良方正對策為天下第一拜議郎轉洛陽令後追贈尚書令封黟縣侯世傳其仙去蓋出於傳㑹兄儕弟儼俱有學行三國陳惲桐廬人呉富陽侯碩之子仕至黄門侍郎征虜將軍封餘杭侯惲有仙術能興水工今有廟存焉晉夏孝先桐廬人父亡負土成墳廬其側時有野火燎山將近塋域孝先繞墓號慟鳥獸羣集以毛羽濡水灑火俄頃撲滅南北朝周文育夀昌人本姓項少孤貧年十一能反覆游水中數里梁承聖中累官散騎常侍時北齊冦江文育却之進爵夀昌縣公周廸之敗為熊曇朗所害贈侍中司空諡忠愍唐方干桐廬人工詩性氣不羈一舉不得志遂隠居釣臺東時號元英先生有詩集吳少微新安人為晉陽尉與富嘉謨同官且友善善屬文辭本經學雄邁髙雅時人慕之文體一變號呉富體皇甫湜新安人元和中擢第仕至工部郎中韓愈愛其才厚禮之與李翺張籍齊名有文集行世施肩吾分水人有詩名元和中舉進士退隠洪州西山終身不仕所著有文集十卷後遇旌陽授以丹方竞得仙去陳京桐廬人有至行親喪廬墓刺史蕭定上言表其門時人目所居鄉曰至徳里曰如曾同邑有祝希進者父喪廬墓側有芝草生異蛇至元和中旌其孝行又同郡建徳何起門亦以廬墓被旌戴元益桐廬人五世同居家有紫薇木連理刺史以聞咸通中詔旌表其門李頻夀昌人少秀悟博記覽尤長于詩與詩人方干相善擢進士任歴都官員外終建州刺史有詩傳世建人立廟于棃山嵗祀之宋邵煥青溪人咸平中年十嵗以童子召赴􅊴真宗令賦春雨詩頃刻而就除正字令於秘閣讀書累官金部員外郎姪大受官至刑部侍郎立朝謇諤不畏強禦方仲謀青溪人嘉祐中進士累官殿中丞工於詩有雉山集二十卷江公望睦州人舉進士崇寧初任司諫抗疏極論時政及宫禁事皆人所難言者坐廢終身名節偉然終始不渝天下髙之後贈諫議大夫詹良臣遂安人為縉雲尉方臘起其黨犯處州守貳俱遁良臣獨守城曰捕盗尉職也縱不勝敢愛死乎率弓兵出禦之被執誘使降良臣怒罵賊怒臠其肉使自㗖且吐且罵至死不絶口時年七十二後贈通直郎子大方官至僉書樞密院事徐亨桐廬人臘冦竊發其兄為賊所執亨叩頭晉曰家有老母兄能養請代其死賊舎其兄而殺亨鄉人義之陸時雍淳安人幼孤貧與兄力樵養母稍長補郡學生念母兄食不給語掌膳曰吾日飯勿盡炊願輟一膳遺母自以一膳分為晨午其苦節孝養如此後登宣和進士第中博學宏辭科歴秘書丞復請以恩官其兄子方閎淳安人與弟誾聞同居太學每試必迭為之魁時人語曰兩浙三方天下無雙閎仕至判南京國子監誾歴右文殿修撰致仕錫號龍亭居士聞仕歴太僕少卿劉晏嚴州人入遼舉進士為尚書郎宣和中率衆數百来歸授通直郎金人犯京師以晏總遼東兵號赤心隊建炎初從劉正彦擊淮西賊及金人犯建康杜充兵潰羣㓂犯常州晏出竒破之後追擊賊戚方於宣城為賊所害贈龍圖閣待制官其四子立廟死所王縉分水人自侍御史遷右司諫知無不言每謂人才實難多事之際尤宜為朝廷愛惜以故不專彈擊而惟論安危大計與所以啓沃君心者髙宗嘗以得諫臣體稱之葉義問夀昌人建炎初進士累官至知樞密院事時金主亮窺江上命義問視師淮上御書義問到處如朕親行八大字於旗以賜之卒諡忠簡喻樗建徳人少慕伊洛之學受業于楊時建炎中登進士累官工部員外郎知蘄州孝宗即位用為提舉浙東常平以治績聞樗為人質直好議論尤善識鑑嘗言沈晦張九成進士當第一後果然樗有二女富人受請婚不許及見汪洋張孝祥曰佳壻也遂以妻之所著有中庸太學論語解及玉泉語録詹至建徳人仕為䡗州通判敵騎將及境合民兵七千人授甲登陴入與家人訣出約死守敵遂遁去後𨽻張浚暮多所建明墳官至左中奉大夫卒南軒張栻銘其墓朱文公書并題葢胡嘉言夀昌人髙宗朝為吏部侍郎與秦檜連姻嘗上書論和議乞斬檜以謝天下聞者縮頸其後家居開義學置瞻士田方有開淳安人仕為淮西運判著屯田詳議二十二篇以獻朱文公嘗為書萬溪書堂四字故自號溪堂云馬大同建徳人紹興中進士官至戶部侍郎每奏對輙陳恢復大計歴官中外必求其盡識詹儀之遂安人時張栻守郡吕祖謙分教儀之日以學問為事官終吏部侍郎洪璞淳安人任為鎮東節度推官陳備邊八策楊慈湖薦之曰守官數十年而無屋可居舉家三百指而無田可養其廉介如此弟琰亦有學行錢時淳安人書經目輙成誦仕為史館檢閲輪當面奏敷陳剴切所著有尚書演義四書管見等書學者稱為融堂先生胡朝穎淳安人歴官武昌令通判嘉興時鄭清之家奴暴横執寘諸法移書謝云以天子之命官撻宰相之奴僕罪當避位清之得書以聞帝喜曰得一佳士矣除守岳州趙彦肅建徳人留心聖賢之學乾道初登第官至寜海軍節度推官所著有易說等書學者稱為復齊先生鄭穎夀昌人嘉定間登第為理官執法平允時相開邊薦叅謀官知政事穎抗論政府非賞功之地命遂寢出守嘉興歸闢一室號志齊汪自強淳安人紹定間進士知錢塘縣時值孟饗赤縣出班起居人物清修帝目送之中書因薦其才除監察御史兼崇政殿說書未幾遷大理卿方慤桐廬人父死廬墓喪畢不歸覃思積年解禮記書成獻之朝詔頒其書於天下黄蛻淳安人淳祐間舉進士累遷大理卿以文學知名徐梅龜夀昌人舉進士為霍丘尉嘉熙初敵兵犯境梅龜與子尚古皆死之理宗嘉其忠梅龜贈宣教郎尚古贈承信郎各官其一子方逢辰淳安人舉進士第一累官兵部侍郎國史修撰兼侍讀除吏禮部尚書俱不拜先是鄭清之賈似道東政逢辰上書力詆其非遂不復出授徒講學所著有孝經解易外傳尚書釋傳大學中庸註釋等書學者稱蛟峰先生弟逢振檢閲翰林文字逢嘉判司門事邵拱淳安人舉進士僉判漢陽軍通守南安尋知昭州以朝奉大夫致仕孫應豹號菊逸舉進士歴官州郡何夢桂淳安人咸淳中舉進士第三為太常博士歴監察御史宋亡不仕所著冇易衍中庸致用等書於易尤精有先儒所未發者孫潼發桐廬人登咸淳進士授衢州軍事判官有廉能聲辟御前軍器所幹辨公事未幾宋亡家亦毀乃避地萬山中為終焉之計元侍御史程鉅夫求遺逸以潼發應詔辭弗起元余丙遂安人初喪母泣血成疾父亡不忍葬結廬古山下殯其中日閉戶守視有牧童遺火延殯廬丙與子慈亟撲不止欲投身火中與柩俱焚俄暴雨火滅方道壑淳安人逢辰曾孫仕為翰林編修官累遷江西行省員外郎所著有春秋集説詩説文説愚泉詩稿汪汝懋淳安人宦至翰林待制兼國史院編修官所著有山居四要魯淵淳安人勵志為學舉進士為華亭丞本朝洪武初屢徴弗就學者稱岐山先生所著有春秋節傳及䇿府樞要本朝徐舫桐廬人博學尚志與劉基宋濓同游洪武初劉宋被徵遇桐廬見之舫荷簑笠示不與同行之意隠居終身濓為撰墓誌所著有滄江集周淵夀昌人洪武中以能書薦擢中書舎人遷工科給事中尋陞大理寺丞官至四川布政司叅議平生尚儉素甘淡薄讀書手不釋卷羅觀桐廬人洪武中遊太學有聲選署陜西投察使事後擢寧國府同知永樂初歴陞廣東按察使在任以清慎稱徐誼夀昌人洪武中知鎮江府處事詳密人莫能欺去任惟文書數帙而已陳禮建徳人永樂初由鄉舉授山西道監察御史有能聲歴陞河南按察使聞質桐廬人永樂中由鄉舉入大學授工部主事在任勤能尋陞吏曹郎中官至湖廣布政司右㕘議洪璵淳安人永樂中進士授刑部主事轉翰林院侍講官至吏部右侍郎商輅淳安人宣徳乙卯浙江鄉試第一正統乙丑南宮廷試俱第一授翰林修撰景泰初陞兵部侍郎兼左春坊大學士天順初為石亨等誣陷革職為民成化初起復元官入内閣累官吏部尚書兼謹身殿大學士以疾致仕卒贈太傅諡文毅省志姚䕫桐廬人正統末舉禮部第一登進士授吏科給事中歴官吏部尚書立朝三十餘年憂國憫民恒存念慮每廷議大政大事正色昌言人皆悦服卒贈少保諡文敏省志列女徐氏二女宋建徳人長清次淳年及笄元兵下嚴州父師顔携之㢠廻於薛山父適出而兵奄至清謂淳曰吾家世清白寧死不受汚辱遂相牽投崖而死鄉人為之立祠翰林學士程鉅夫賦詩以表章之王氏女建徳人至大間其父出耘舎傍遇豹為所噬曳之升山父大呼女識父聲驚趨救以父所棄鋤擊豹腦殺之父乃得生童氏嚴州人俞士淵妻姑性嚴待之寡恩童柔順無少拂其意至正間賊䧟成平官軍復之乃縱兵標掠至士淵家童以身蔽姑衆欲汚之童大罵不屈一卒以刀擊其左臂又一卒斷其右臂罵猶不絶遂遇害黄紳妻洪氏淳安人年十七歸紳甫一年而紳死生一女一日歸寧父母逼奪其志遂抱女觸寒冰濟河以歸終其身年九十嬸胡氏姪婦呉氏皆幼年孀居守節不變人以三貞稱之省志何廷傑妻戴氏淳安人年二十而寡人有欲奪其志者戴以刄裂其兩耳誓不改節孀居六十餘年省志何瑗妻方氏淳安人年十九歸瑗時瑗疾已革一見遂亡方以貞節自持誓不再適孀居六十年而卒乃合葬焉省志何道妻鄭氏淳安人年十六歸道越二嵗而寡家貧無子舅姑欲奪其志度不能免遂自經死省志童敦妻李氏名榮夀昌人年二十四而敦卒菅敦葬所李求結壙于旁喪終父奪其志李知勢不可遏又慮自死遺禍舅姑家乃屬舅姑以後事泣拜而歸自經死舅姑為送衣衾及館至遂舁葬於敦之傍省志仙釋唐廣真嚴州人既嫁得血疾夢道人與藥服而愈自是與夫相離從師修道經謁何仙姑宋淳熙中在郭家食飯次若有人喚者出門逢三仙人引至海邊跨大蝦蟇渡海因隨遊名山仙人問曰汝欲超凡入聖耶留形住世耶棄骨成仙耶對曰有母尚在願終奉養曰如是且留形住世遂與丹一粒吞之自是不米食後召入徳夀宫封寂靜凝神真人徐道士唐末居青溪縣天樂觀年八十餘自夢大羅天賜詩因自衆尸解而去稠錫和尚桐廬人唐開元間卓錫南獄庵前稠木自開嘗下山復歸庵衆不納一日偕二虎至僧衆怖走稠錫曰勿怖止欲决去留耳吾果不能住此庵虎當恣噉我如可再居繞吾身三匝虎繞行如數衆懼請止集衆五百遂為大禪刹云少康唐縉雲人俗姓周十五出家從學諸方貞元中嘗至江陵遇一僧謂曰汝化緣在睦州言訖不見康至睦州日乞食城中得餞誘小兒誦阿彌陀佛一聲遺一錢郎髙峰山顛建道塲集齊聲念佛康獨聲髙衆見佛從康口中出坐逝之夕有光燭烏龍山山色為燮白宋賜號廣道大師道明睦州人俗姓陳入開元寺為僧契法於黄藥禪師常自織草履鬻以養親及施行路者黄巢兵壓境郡人洶懼明吿以勿憂為大草屨令摽之三十里外木杪巢見之即舎去郡人益尊禮之或有叩激隨問隨答宋元符中賜號悟空禪師義澄富陽人俗姓孫投新定龍門僧徳詮出家周顯徳中年已五十八始祝髪訪道四方宋咸平中住信州王山洞巖縣令章得象異之以聞真宗召至闕賜號明慧大師後還錢唐因微疾作偈曰本來無質豈有去住要識真歸南來北去端坐而逝時年百二十八嵗矣明一統志卷四十一
