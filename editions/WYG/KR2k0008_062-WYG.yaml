城在府城北一十里史記註楚都於郢今江陵縣北紀南城是至平王更城郢在江陵東北故郢城是荆州記昭王十年呉通漳水灌紀南入赤湖進灌郢城遂破楚則郢與紀南為二城云鄖城在府城南二百里楚昭王封鄖公所築今松滋楚城亦號鄖城䕫子城在歸州東二十里春秋䕫子之國水經江水東經䕫城南註云熊摯始治巫城後移此城宋王十朋詩身乗蓽輅思熊繹詞誦離騷弔屈原城邑舊為䕫子國民人多是楚王孫髙陽城在歸州境舊興山縣西楚自以為髙陽之裔故有此城華容城在府城東漢置華容縣属南郡今監利縣即其地也劉備城在歸州蜀漢昭烈征呉連營七百里下至秭歸此城盖當時所築者吕䝉城在公安縣治北唐杜甫詩野曠吕䝉營江深劉備城寒天催日短風浪與雲平江陵城即府城蜀漢闗羽所築晉時桓温增脩之樂鄉城有二一在松滋縣東七十里即呉陸抗與羊祜對壘處一在巴東縣治東後周置縣孱陵城在公安縣一名孫夫人城乃漢昭烈妻夫人所築夫人權之妹疑備故别作此城不與同居陸抗城在夷陵州西五里赤溪其址尚存宜都城在夷陵州境呉陸遜所築晉於此置郡唐為縣後廢臨江城在夷陵州南二十里魏武帝所築梁置臨江郡及縣後周置臨州隋州郡俱廢上明城在松滋縣境晉荆州刺史桓冲自襄陽退屯於此時所築安蜀城在夷陵州境陳宣帝征江陵後周軍於峽口築壘以備陳名安蜀城信陵城在巴東縣西一十五里梁為樂鄉縣置信陵郡於此睦州城在長陽縣治東隋開皇中置尋廢基州城在内方山東北馬良口唐武徳中置州及章山縣尋廢夷道城在宜都縣漢置縣属南郡晉属宜都郡隋属峽州唐廢入宜都沙市城在府城東南一十五里相傳楚之故城元末增築舊址尚存夷陵州故城初在下牢唐貞觀中徙治歩闡壘宋建炎中徙治石鼻山紹興中復舊端平初徙治江南元復徙於江北歸州故城初在江北宋端平徙治江南曲沱次徙新灘又徙白沙又徙南浦本朝初徙丹陽魯宗之壘司馬休之壘俱在江陵縣東一十里屈原宅在歸州北一百里方七頃累石為屋基今其地名樂平宅其東北六十里舊有原姊女嬃廟有擣衣石尚存唐杜甫詩若道士無英俊才何得此有屈原宅宋玉宅在歸州舊治東五里唐杜甫詩摇落深知宋玉悲風流儒雅亦吾師江山故宅空文藻雲雨荒臺豈夣思羅含宅在府城内今承天寺即其故址庾信亦居之唐杜甫詩庾信羅含俱有宅春來秋去作誰家胡安國宅在江陵縣北新店子孫世居之挿竈在空舲峽絶崖壁立數百丈有一火燼挿石間望見可長數尺相傳堯洪水時行者泊丹崖側炊㸑以餘燼挿之至今猶曰挿竈石函鐵契在府境昔荆州掘地得石函鐵契云楚都郢邑代無絶黄金蔵在夷陵州有寳軸秘函蔵崖寳中宋陳膺訪故老謂崖書皆金版出遺書之一得之以歸乃古易傳其書但曰易無周字經文與今經文絶異廪君土舟在府城西南境寰宇記夷水自施州開蠻界流入昔巴蠻有巴樊蟫相鄭五姓未有君長各乗土舟約浮者當以為君惟巴務相獨浮因共立之是為廪君務相乃乗土舟從夷水下及夷城因立城其傍而居之今水名清江在長陽縣鍾離山石穴在府城西南境巴蠻五姓皆出鍾離巴氏子生赤穴四姓子黑穴俱事鬼神未有君長共擲劍石穴約能中者奉以為君巴務相中之衆皆服昭君村在歸州東北四十里昭君名嬙郡人王攘女入漢掖庭元帝以後宫人多使􅀞工毛延夀圖其形按圖召幸宫人多賂畫工昭君獨不賂延夀故毁其形及單于願婿漢昭君以圖當行元帝見之悔恨乃殺延夀籍其家昭君入胡於馬上彈琵琶悲歌哀怨後死塟胡中其冡草獨青鄉人為立廟唐杜甫詩羣山萬壑赴荆門生長明妃尚有村一去紫臺連朔漠獨留青冢向黄昏畫圖省識春風面環珮空歸月夜魂千嵗琵琶作胡語分明怨恨曲中論一柱觀在松滋縣東丘家湖中按渚宫故事劉宋臨川王義慶在鎮於羅公洲立觀甚大而惟一柱梁劉孝綽詩經從一柱觀出入三休臺唐杜甫詩孤城一柱觀落日九江秋息壤在府境山海經鯀竊帝之息壤以湮洪水溟洪録云江陵府南門有息壤焉唐元和中裴宇牧荆州掘之得一石其狀與江陵城同徑六尺八寸徙棄之是年霖雨不止復埋此石乃止海匱在府城東北江陵以水為險陸抗築大堰髙保融名為北海宋孝宗時知府呉獵劉甲皆脩築之開禧初孟珙再築引沮澤及諸湖水注之三海綿亘數百里遂為江陵天險又為八匱蓄泄水勢金人嘗犯荆門州距江陵纔百里而去以有三海之險故也地肺在府境以荆州濟江西岸洪潦常浮不沒故云地肺鐵棺在歸州白狗峽東其地亦名鐵棺峽唐將軍王果為雅州刺史舟經三峽望見懸崖間有物似棺令人視之果棺也骸骨存焉傍有石誌云三百年後水漂我將及長江垂欲墮欲墮不墮遇王果果視之愴然因為歛祭而去萊公栢在巴東縣庭前宋萊公冦凖為令時手植栢二株人以比甘棠蘇軾詩萊公昔未遇寂寞在巴東聞道山中樹猶餘手植松萊公竹在公安縣冦凖貶雷州卒歸塟西京道出公安邑人皆設祭哭於路析竹植地掛紙錢逾月視之植竹盡生笋衆為立祠嵗時享之名宦周鬬穀於莬春秋時楚令尹三仕無喜色三已之無愠色舊令尹之政必以告新令尹孔子許之曰忠孫叔敖春秋時為楚相施教導民上下和合吏無姦邪盗賊不起民皆樂其生故三得相而不喜知其材自得之也三去相而不悔知非已之罪也漢蕭育建平間南郡太守時江中多盗帝命肓曰南郡盗賊為害朕甚憂之以太守威信素著故委南郡育至郡盗賊遂息呉漢建武中公孫述遣田戎據荆州漢將兵㑹岑彭伐蜀破其浮橋遂入江闗留守夷陵劉昆建武間江陵令時縣有火災昆向火叩頭火尋滅後徴為光禄勲帝問前在江陵反風滅火行何徳政而致是昆對曰偶然耳帝嘆曰長者之言也命史官書之郭賀荆州刺史有殊績百姓歌之曰厥徳仁明郭喬卿忠正朝廷上下平明帝賜以三公黼黻冕旒勅行部去䄡帷露冕使百姓見其容服以章有徳楊震荆州刺史性公廉嘗舉江陵茂才王密為昌邑令後震遷萊州密暮夜懐金遺之不納法雄南郡太守斷獄省少户口增益郡多虎狼之暴前守賞募張捕反為所害者甚衆雄遺書属縣曰古者至化之世猛獸不擾皆由恩信寛澤仁及飛走其毁去陷穽不得妄捕自是虎暴遂息李固永和中荆州盗起以固為刺史固到赦前釁與之更始於是賊帥自縛歸首固皆原之使自招集半嵗間州内清平度尚荆州刺史桂陽賊畏尚威烈徙入山谷尚窮追多獲珍寳士卒驕富莫有鬬志尚乃潜焚其營珍積皆盡衆涕泣尚因曰賊財寳足富數世諸君但不併力耳衆咸奮一鼓平之馬融南郡太守才髙博學教養諸生常以千數坐髙堂施絳帳前授生徒後列女樂徐璆荆州刺史董太后姊子張忠守南陽太后以忠属璆璆對曰臣身為國不敢聞命到州舉奏忠贜億萬又奏五部太守及属縣有贜汚者悉按其罪威風大行三國張飛蜀漢宜都太守曹操追及昭烈於當陽長坂飛後拒水斷橋瞋目横矛叱之曰我張翼徳也可來决死無敢近者魯肅呉奮武校尉嘗屯兵監利至今名其地為魯洑陸遜呉宜都太守嘗攻破蜀將招降秭歸大姓文布等合夷兵數千人且上疏請㧞用荆州士人孫權敬納其言陸抗呉西陵都督歩闡據城叛遣使降晉晉羊祜率衆向西陵抗使輕兵躡之祜等引還抗遂誅夷闡族東還樂鄉貎無矜色謙冲如常甚得將士心後拜荆州牧雷譚吳宜都太守擁遏上流號令嚴肅威震隣敵吕蒙呉南郡太守封孱陵侯後公安人祀䝉為土主吾彦呉建平太守時晉王濬造舟於蜀木杮蔽江而下彦請增兵守建平皓不從彦乃為鐵鎻以斷江流逮晉師至者城皆潰惟彦不下晉胡質荆州刺史素廉㓗武帝嘗謂其子威曰卿孰與父清威對曰臣父清畏人知臣清畏人不知是臣不及父逺矣殷仲堪荆州刺史孝武曰嘗謂卿永為廊廟之寳而忽為荆楚之珍良以慨恨先是堪收塟江濵流棺其門前溝忽起為岸夜夣人自稱徐伯𤣥來謝且曰水中有岸其名為洲君將為州也至是果臨荆州陶侃荆州刺史楚郢士女莫不相慶侃勤於吏職逺近書疏皆手答引接䟽逺門無停客諸叅佐或以手談廢事者命取其酒器蒱博之具悉投之江中周訪元帝時荆州刺史或説王敦曰荆州用武之國公宜自領改訪梁州訪大怒敦手書譬釋因遺以玉環玉椀訪投諸地曰吾豈賈竪可以寳悦乎劉道規荆州刺史桓謙冦荆州道規斬之又破徐道復在州累年秋毫無犯及歸府庫帷幕儼然若舊謝安征西司馬桓温甚禮重之時温之叅佐又有習鑿齒袁宏王坦之孫盛孟嘉王珣羅友郗超㐲淊顧愷之王徴之謝𤣥羅含范汪郝隆車𦙍韓伯康皆海内竒士南北朝蕭憺梁荆州刺史軍旅之後公私空乏憺勵精為治廣屯田省力役民有訟者决於俄頃曹無留事江水壊堤憺率將吏冐雨築之雨甚或請少避憺曰王尊欲以身塞河我獨何心言終而水退隄立劉之遴梁南郡太守好古愛竒聚古器數十百種又著春秋大意三十事上之武帝大悦詔答褒美劉之亨之遴弟累遷歩兵校尉尅復南鄭有功封臨江子不受拜南郡太守有異績荆士懐之號其兄為大南郡弟為小南郡蕭秀梁荆州刺史加都督立學校招隱逸小心畏謹文帝賢之孔休源梁時為晉安王長史兼領南郡太守行荆州事帝謂曰今以十嵗兒委卿善匡翼之乃勅晉安王曰孔休源人倫儀表汝當每事師之韋叡梁南郡太守㑹馬仙琕自北還軍為魏人所躡三闗擾動詔叡督衆軍援焉叡至安陸魏人乃退隋韋世康荆州總管時天下唯置四大總管并楊益三州並親王臨統唯荆州委於世康時論以為美唐許紹初為隋夷陵通守流户歸者數十萬後入唐任峽州刺史武徳初蕭銑遣兵來侵紹擊破之後暨李靖進兵江陵銑降蘇良嗣荆州長史髙宗遣宦者采恠竹江南將蒔上苑宦者縱暴良嗣因之上書言狀帝下詔慰奬取竹棄之姚崇荆州刺史在任三年受代闔境囚民泣擁馬首不使去鞭鐙皆截留之張柬之武后謂狄仁傑欲得一竒士用之仁傑曰荆州長史張柬之雖老宰相才也用之必盡節於國尋召為相張九齡𤣥宗時貶荆州長史常登南樓嘯咏賦詩其心未嘗一日不在朝廷又辟致孟浩然於幕府崔日用荆州長史入奏計因言太平公主逆節有萌帝曰畏驚太上皇奈何日用曰庶人之孝承顔順色天子之孝惟安國家定社稷帝納之韓朝宗荆州刺史李白與書曰白聞天下談士相聚而言曰生不願封萬户侯但願一識韓荆州顔真卿代宗時由刑部侍郎貶峽州别駕元結荆南節度使叅謀安史之亂結屯泌陽守險以討賊遷荆南節度使甚有時譽李臯貞元中荆南節度使塞古堤廣良田五千頃又規江南廢洲為廬舍架江為二橋荆俗飲陂澤乃教人鑿井人以為便嚴綬荆州節度使呉元濟反僉以綬明恕可任大事加淮西招撫使韋臯逺安令有善政鳯凰雙集於江洲吕諲上元初諲請於荆州置南都詔可於是更號江陵府以諲為尹自至徳以來處方面數十人諲最知名段文昌文宗時帥荆南州或旱禬解必雨或久雨遇出遊必晴民為語曰旱不苦禱而雨雨不愁公出遊韓愈永貞初江陵法曹叅軍公正獨立吏民愛敬之李徳裕宣宗時為荆南節度使孜孜民事無一日怠宋盧懐忠知江陵府王師伐蜀江陵當峽江㑹衝以供億之勞遷客省使冦凖太平興國中知巴東縣每期㑹賦役未嘗發出符移唯具鄉里姓名掲縣門民莫敢後者郭䞇知荆南府俗尚􅁋祀属久旱盛陳禱雨之具䞇始至命悉撤去投之江不數日大雨張齊賢淳化中知荆南府敏於吏道庭無滯訟宋太初咸平初知江陵府蠻冦擾動太初以便宜制遏詔奬之馬亮大中祥符中再知荆南府有智畧敏於政事威惠兼濟去冇遺愛雷有終知江陵府李順之亂王師西征為峽路隨軍轉運使同知兵馬事調發兵食規畫戎事皆有節制張頡江陵推官嵗旱饑朝廷遣使安撫頡條獻十事活數萬人朱夀昌通判荆州府時多水盗夀昌籍民船刻著名氏使相伺察出入必以告盗發驗船所向窮討之盗為少弭旁郡取以為法陳堯咨仁宗時知荆南府母馮氏問曰汝典名郡有何治効對曰稍精於射母曰汝父訓汝以忠孝今不務仁政而顓卒伍末技豈汝父意耶以杖撃之金魚墜地歐陽修貶夷陵令因取舊案反覆觀之見其枉直乖錯不可勝數於是仰天嘆曰以荒逺小邑且如此天下固可知自爾遇事不敢忽也徐的以轉運使攝江陵府事城中多惡少年欲為盗輙夜縱火火一夜十數發的籍其惡少年姓名使相保任火遂息謝麟知石首縣縣居江水為患隄不可禦麟疊石障之自是人得安堵號謝公隄後又知荆南府姚渙知峽州宜都縣執民為盗訊服以獄上渙移劾他有司居亡何獲真盗大江漲溢渙前戒民徙儲積遷髙阜及城没無溺者又築隄岸江不為患民徳之朱慶基景祐間知峽州蒞民有徳政嵗數豐稔民建來豐亭以彰顯之王皥仁宗時知荆南府盗張海者縱掠襄鄧至荆門皥閲州兵將迎撃之盗聞即引去魏瓘知荆南府時以下溪蠻叛將發兵致討瓘上三䇿以招徠為上守禦為下攻取為失王質以轉運使攝荆南府事有訟婚者訴貧無貲故後期質出私錢與之吏捕盗人衣者盗叩頭曰平生不為過廹饑寒故至此質命取衣衣之遣去王回知松滋縣荆沔俗用人祭鬼回捕治甚嚴其風遂革鮮于侁江陵司理叅軍有無辜者白太守出之所活甚衆唐介稱其賢上官交章論薦侁盛言左叅軍李景陽枝江令髙汝士之美乞移與之介益以為賢趙誠皇祜間知歸州先是山頽江石斷流誠附薪石根縱火裂石不半載而功成江開舟濟名曰趙江有磨崖銘余良肱荆南司理叅軍属縣捕得殺人者既自誣服良肱視驗疑之曰豈有刃盈尺而傷不及寸乎白府請自捕未幾果獲真殺人者楊時江陵府學教授時安於州縣未嘗求聞逹而徳望日重四方之士不逺千里從之游解潛建炎中荆南府歸峽州荆門公安軍鎮撫使時荆南殘破寓治於峽之宜都不附和議公論稱之王庶紹興中知荆南府時荆南屢為盗殘破庶至披荆棘治城隍繕府庫闢市區流庸四集隱然為東南雄藩程千秋知公安縣時羣盗欲犯公安千秋帥縣民禦之岳鄂鼎澧皆頼以安民間多繪像祀之就命通判荆南府趙雄知江陵府江陵無險可恃雄請城江陵城成而民不告擾呉獵知江陵府請出大農十萬緡以賑饑者招商分糴减價發糶米價為平又脩髙氏三海以限戎馬宇文紹節知江陵府統制官髙悦肆為殺掠逺近苦之紹節杖殺之兵民歡悦范如圭通判荆南府舊户口數十萬冦亂後無復人迹時蠲口錢以安集之議者希秦檜意謂流庸䆮復責償積逋甚急如圭悉奏蠲之袁樞知江陵府郡瀕大江嵗壊為巨浸民無所託樞即楚觀為室廬以備不虞種木數萬以為捍蔽民徳之張孝祥知荆南府兼湖荆北路安撫使築寸金隄以免水患置萬盈倉以儲漕運及卒孝宗惜之有用才不盡之嘆張栻孝宗時知江陵府安撫本路禮遇諸將得其歡心又加恤士伍勉以忠義士咸感奮暇日召諸生告語民以事至庭必隨事開曉具為條教張洽嘉定中為松滋尉湖右經界不正洽請行推排法令民自實其土地疆界産業之數投於匱乃籌覈而次第之吏姦無所匿李大性知江陵府充荆湖制置使郡當用兵後殘燬饑疫大性首賑貸前官虚羡十四萬緡率蠲放不督民流移新復業者皆奏免征𣙜劉甲知江陵兼湖北安撫使以威馭軍以寛待民因髙氏三海遺址浚築亘四十里趙方知江陵府增脩三海八匱以壯形勢荆門有東西兩山險要築堡其上増戍兵以遏敵衝孟珙江陵府副都統制大敗金人於吕堰御將用兵甚有方畧後又兼知江陵府復脩三海以拒敵汪立信荆湖安撫制置使知江陵府時襄陽被圍危急立信上疏請益安陸府屯兵凡邉戍皆不宜抽减又移書賈似道極言時事似道怒中以危法廢斥之楊霆景定初知監利縣有疑獄久不决霆立决之人稱神明後通判江陵府時庶事叢集霆隨事裁决暇日詣郡庠與諸生講學又選民強壯訓練行賞以激勵之未幾皆為官用元廉希憲至元中以平章行省事於荆南禁剽奪通商販興利除害兵民安堵又大興學選教官置經籍旦日親詣學舍以勵諸生後召還江陵民號泣遮留不得相與畫像建祠許楫至元中亷希憲行中書於荆南以楫為左右司員外郎荆南父老輿金帛求見楫曰汝等已為大元民矣今置吏以撫字汝輩奚用金帛以求見拒不納王都中荆湖北道宣慰副使適嵗祲躬履山谷以拯其饑民頼以全活者數十萬人卜理山南亷訪使治中興中興為江漢屏蔽卜理每按臨所部威惠翕然正中冦犯中興力戰被執不屈而死畢遜逺安縣尹清亷愛民多有美政本朝周政洪武初知荆州府招集流亡脩治學校政聲逺聞功績著於一時陳獻洪武間知監利縣雅飭不為華貎時有司造官楮民病之獻奏减大半民獲其利劉永知荆州府敏通亷介勸農興學均賦簡訟清吏弊遏强暴革郡政之為弊者數十事兵民共獲其利戴之如父母後守制去闔郡懇請於朝仍復任尋致仕卒民立祠祀之俞雍正統初知公安縣公恕亷勤脩舉庶務撫恤鰥寡民懐其仁刁鵬永樂中知荆州府賦性耿介立志清苦在任九年門無私謁囊無嬴帛凡所設施調度綽有條理且勞來安集政教大行軍民稱頌省志張宏宣徳中知荆州府持已清亷庭無留事吏畏民懐論者謂其羔羊之節無媿古人云省志范理宣徳末知江陵縣時荆土負租十四萬石理為處分平徭役勸樹畜恤窮弱禁豪猾陞知徳安府政聲益著省志馬祥正統間石首知縣公平仁恕吏畏民懐興學勸農凡傳舍堤圩之類靡不脩葺以憂去百姓涕泣載道如失父母省志張愷正統中知江陵縣興學校建公署革弊釐奸吏民畏服祀太守劉公祠省志馬思敬正統中知安化縣存心仁愛視民如子民亦不忍欺秩滿奏留復任十三年上下相孚如一體去之日泣送載道祀於名宦祠省志錢昕天順間知荆州府亷敏有才時江陵潛江水溢乃築黄潭堤以捍之長亘幾千里暇則課諸生奬進之多知名士省志何盤天順中知逺安縣忠信明决見義必為凡一日營建咸出自贖鍰民不知勞財不告匱省志張嵓天順間知荆州府亷介有為苟利於民雖叢怨於身亦不之恤民歸於善士風聿興省志石敏中成化中知松滋縣嵗荒發賑江漲築堤民頼全活且措置軍需餉糧不匱而民不告病省志李芳成化中知夷陵州律已清儉臨民平易有古君子風至今稱賢守以芳為最省志劉瑛成化中知夷陵州政尚平易百姓悦服境多虎患嘗禱於黄陵神驅獲之其患遂息省志邉貢正徳初以太常寺丞出知荆州府亷静自守行篤學優事集而民不擾政寛而下不欺省志蔣瑤正徳中知荆州府公明亷介士民畏服聞母䘮即日就道荆民懐其徳立祠祀之省志姚隆正徳末知荆州府在任七年民安事集以忤當路免荆民老㓜遮道泣送不忍其去後立祠祀之與劉㫤蔣瑤稱三賢守省志李士翺嘉靖中先知荆州府調知承天府時慈宫南祔供應浩繁翺區畫有方民不為擾嵗饑多方賑恤民馴死疫癘損俸營地塟之比遷秩行李蕭然士民感仰省志流寓王粲髙平人善属文漢獻帝時召除黄門侍郎以西京未寧不就之荆州依劉表嘗登當陽樓作賦建安中卒其贈文有曰遷於荆楚在漳之湄司馬芝河内人漢末避亂荆州嘗出遇賊同行者皆棄老弱走芝獨守老母賊以劍臨芝芝叩頭言母老無養之者賊曰此孝子也殺之不義遂免後仕至河南尹爵闗内侯羅含晉耒陽人為桓温别駕於江陵城西立茅舍以居織葦為席布衣䟽食晏如也後徴為尚書郎庾易新野人徙居江陵志性恬静不交外物以文義自樂齊臨川王表薦之餉麥百斛不受長史袁彖欽其風贈以鹿角書格蚌盤牙筆易以連理几竹翹書格報之建武中徴為司空主薄不就劉虬南陽湼陽人徙居江陵初仕劉宋為當陽令罷官歸家齊建元以後累辟不就以西沙洲去人逺乃徙居之武帝臨荆州惟與虬談因見二子帝曰之遴必以文章顯之亨當以功名著已而果然李遜隴西人客居荆州仕唐累官給事中故事天子以畸日聴政遜上書諌憲宗從其言後為武忠節度使為政抑强植弱有績可紀弟建隨兄客荆州事母以孝聞貞元問擢翰林學士初建苦貧兄造為營丏使成就之故遜建皆舉進士後雖通顯以清儉稱鄭谷宜春人唐乾寧中寓居白社谷卒嘗有渚宫亂後詩云白社已應無故宅清江依舊只空流梁震蜀依政人唐末進士寓江陵髙季興欲署判官震恥之終身不受辟署止稱前進士自號荆臺處士劉安世宋魏州人哲宗朝為右正言嘗論蔡確章惇等妄要定䇿之罪及惇入相落職責嶺外徽宗朝既復職復貶峽州張商英宋新津人仕為御史裏行以言事出監荆南鹽商稅又以忤蔡京安置歸州量移峽州胡安國宋武夷人父淵寓蹟荆湖間至安國為蔡京所惡退居當陽之漳濵後仕至寳文閣直學士卒三子寅寧宏皆以徳學著稱寅仕至禮部侍郎寧為太常丞宏徙居衡山郭雍河南人父忠孝從程頥學得其傳持憲陜西死於金人之難雍退居峽州放浪長陽縣下魚山宋乾道間徴不起賜號冲晦處士孝宗時封頥正先生雍傳其父學纂遺書有易説中庸説行世其兄球有文學號白雲先生杜敏漢嘉人其祖因避亂自蜀至公安因家焉兄弟六人好學不倦俱以儒業顯敏仕元為著作郎歐陽𤣥贊其像何廷蘭其先鳯翔人徙居公安仕元踐登省臺三十餘年納忠陳善秉節不阿謝端遂寧人宋末避兵江陵因家焉弱冠時與大都宋本同師王奎文明性理之學又同教授江陵城中時號謝宋後本擢進士第一仕至工部尚書端亦累官翰林直學士人物周伍貟楚人郡志云貟監利人父奢兄尚為楚平王所殺貟奔呉𨗳呉伐楚既入郢遂出平王尸鞭之申包胥曰子之報讎不已甚乎貟曰吾日暮途逺所以倒行而逆施也申包胥楚人仕為大夫與伍貟友善平王殺貟父奢兄尚貟曰我必覆楚包胥曰我必存之及呉師伐楚入郢包胥乃入秦乞師救楚依庭墻而哭日夜不絶勺水不入口七日秦伯哀之乃出師至楚遂敗呉師楚王賞功逃之不受熊宜僚楚人白公勝欲殺子西謂石乞曰市南有熊宜僚者若得之可以當五百人石乞告之固辭承之以劍不動勝曰不為利誘不為威惕去之屈伯庸楚武王子瑕之後食采於屈因氏焉生女嬃及子原屈原伯庸子名平别號靈均仕楚懐王為三閭大夫掌王族三姓入則圖議政事决定嫌疑出則鑒察羣下應對諸侯謀行職脩王甚珍之同列蘄尚輩妬害其能共譖而踈之乃作離騷冀君覺悟襄王立復用讒謫原於江南原於是作漁父諸篇以見志遂自沉汨羅江而死宋玉楚人屈原弟子為楚大夫憫其師放逐乃作九辨述其志以悲之又作神女髙唐二賦皆寓言托興有所諷也老萊子楚人嘗著書十五篇言道家之用事親至孝年七十身着五色斑斕之衣嘗取水上堂詐跌仆卧地為小兒啼或弄雛於親側欲親之喜也漢胡剛南郡華容人清髙有志節平帝時大司徒馬宫辟之值王莾居攝剛解其衣冠懸府門而去遂亡命入交阯隱於屠肆之間後莾敗乃歸鄉里胡廣剛六世孫父貢仕為交阯都尉廣少孤貧安帝時舉孝亷為天下第一拜尚書郎累遷司徒定䇿功封侯進司空致仕復拜太尉遷太傅廣練逹事體明解朝章雖無謇直之風屢有補缺之益故京師諺曰萬事不理問伯始天下中庸有胡公在公台三十餘年厯事六帝禮任甚優卒謚文恭蒯越南郡人劉表為荆州刺史時冦賊縱横道路梗塞表单馬入宜城請南郡名士蒯良蒯越與謀越教其誘宗賊帥而襲之至者五十五人皆斬之而取其衆遂徙治襄陽鎮撫郡縣江南悉平三國霍峻枝江人蜀漢昭烈時守葭萌城張魯遣人誘之峻曰小人頭可得城不可得以功遷梓潼太守及卒昭烈率羣僚弔祭留宿墓上子弋為太子璿中庶子璿好騎射弋引古義以規諌之董和南郡枝江人劉璋以為成都令時蜀土富實百姓僭侈和躬率以儉所在移風變俗轉巴東都尉遷益州太守清約如前南士愛信昭烈定蜀與丞相亮並署大司馬事外牧殊域内幹機衡二十餘年死之日家無儋石之儲董允和子蜀漢黄門侍郎丞相亮出師表稱其良實志慮忠純宫中之事悉以咨之必能禆補缺漏有所廣益延熈中守尚書令南北朝劉凝之南郡枝江人劉宋時隱居不仕時年饑衡陽王義季慮其餒斃餉錢十萬凝之大喜將錢至市門觀有饑色者悉分與之俄頃而盡庾黔婁易子少好學性至孝仕南齊為孱陵令政有異績父在家遘疾忽心驚流汗即棄官歸每夕稽顙北辰求以身代父亡廬墓仕終散騎侍郎庾肩吾黔婁弟兄於陵博學有才思仕梁為太子洗馬終鴻臚卿肩吾八嵗能賦詩累官至太子率更令中庶子終義陽太守庾信肩吾子俊邁絶倫博覽羣書尤善左傳仕梁為抄撰學士與徐陵同僚詞並綺艷元帝時以右衛將軍使西魏被留長安後周時為洛州刺史信雖位望通顯常有鄉闗之思乃作哀江南賦以致意庾曼倩南郡人早有令譽仕梁為中録事元帝謂劉之遴曰荆南信多君子嚴植之秭歸人少善莊老精解䘮服孝經論語及長徧習鄭氏禮周易毛詩左傳春秋性惇謹不以所長髙人梁天監中兼五經博士生徒常數百講説有區叚次第析理分明後遷中撫記室叅軍殷不害江陵人仕梁為中書郎後魏平江陵失母所在時甚寒雪凍死者填滿溝壑不害行哭尋求舉體凍僵水漿不入口者七日始得母屍路人皆為流涕隋蔡允恭荆州江陵人父大業後梁左民尚書允恭美姿容工為詩仕為起居舍人煬帝有所賦必令諷誦遣教宫人允恭恥之數稱疾授内史舍人俾入宫固辭由是踈斥嘗著後梁春秋唐劉洎荆州江陵人貞觀中為治書侍御史拜尚書右丞洎勤於職務太子初立泊上言謂宜尊賢重道帝敕洎與岑文本馬周日直東宫稍遷侍中帝忽謂羣臣曰朕今欲聞已過卿等為朕言之洎曰頃上書有不稱㫖或面窮詰恐非所以進言者路帝曰卿言善朕能改之岑文本江陵人其先鄧州人祖善方仕梁吏部尚書因家江陵文本仕唐為中書舍人累官中書令從伐遼東事一委倚籌不廢手為人節儉事母孝或勸營産業文本歎曰吾漢南一布衣無汗馬勞以文書位宰相俸已重矣尚何殖産業耶從子長倩官至文昌右相孫義為金壇令仲翔為長沙令仲休為溧水令皆有著績俞文俊江陵人武后時有山出於新豐稱為慶山文俊上書言陛下以女主居陽位反易剛柔故地氣隔塞山變為災􅒳以為非慶也后怒流之嶺南楚江漁者楚江有漁者以魚换酒輙自歌舞不言姓氏江陵守崔鉉見而問之曰君之漁隱者之漁耶漁者之漁耶漁者曰昔姜子牙嚴子陵皆以為隱者之漁也殊不知不釣其魚釣其名耳五代李景威長陽人五代時仕髙氏為水手都指揮宋建隆中假道江陵以討張文表景威恐宋師襲巳欲伏兵攻之判官孫光憲不從景威扼吭而死太祖曰忠臣也命王仁贍厚䘏其家宋朱昻荆南人好學有清節時有朱遵度者好讀書人號為朱萬卷目昻為小萬卷太宗時初為衡州録事叅軍後累官翰林學士以工部侍郎致仕所著有資理論三卷弟協以純謹著稱仕至主客郎中雍王府詡善亦告老歸時人比之二䟽昻子正彛正辭並登進士第王延範江陵人形貌竒偉喜任俠家富於財父保義為髙氏武泰軍留復髙從誨奏署延範太子舍人後隨從誨入覲薦為大理寺丞知泰州太平興國中為廣南轉運使夏侯嘉正江陵人少有俊才舉進士歴官著作佐郎使於巴陵嘗作洞庭賦人多傳冩端拱初召試辭賦擢右正言直史館兼直秘閣元夕太宗御乾元門觀燈嘉正獻五言十韻詩卒年三十七子紆太子中舍崔遵度江陵人後徙淄州七嵗時受經於叔父憲舉進士咸平初為太子中允改太常丞為編脩官改左司諫仁宗時遷吏部郎中兼左諭徳卒遵度與物無競淳澹清素於勢利泊如也善於鼓琴嘗自著琴箋有文集二十卷龎天祐江陵人以經籍教授里中父疾天祐割股食之疾愈又復病目䘮明天祐號泣祈天䑛之父年八十餘卒天祐負土封墓結廬其側晝夜號聲不絶真宗時詔旌表門閭張景公安人仁宗召見問曰卿在江陵地有何景對曰兩岸緑楊遮虎渡一灣芳草䕶龍洲曰所食何物對曰新粟米炊魚子飯嫩冬瓜煮鼈裙羮髙懌荆南人髙季興四世孫十三能文通經史百家從种放受業知長安冦凖薦不起及范雍建京兆府學召懌講授諸生席間常數百人仁宗時命為大理評事固辭賜號安素處士樂京江陵人為布衣時鄉里稱其行義嘉祐中以訪遺逸為湖陽令神宗求言上䟽以畏天保民為請知長葛縣不肯行助役法棄官而歸元祐初召赴闕不至終於家唐介江陵人嘗寓當陽讀書漳水上登天聖八年進士為殿中侍御史論文彦博燈籠錦事貶英州别駕後以彦博薦入為叅知政事與王安石榻前論事不屈疽發於背卒謚質肅子淑問第進士擢監察御史裏行多所建明後為吏部員外郎義問風力强敏累官集賢脩撰知廣州李堯言江陵人熈寜中除侍御史未七十即上印綬其兄立言亦自澶州納政時又有李竦亦引疾同時里居郡人為之語曰元豐濟濟移多士南郡堂堂有三李萬鍾於我何加焉一瓢樂在其中矣劉蛻荆南人時荆南嵗解舉人多不成名蛻始及第號為破天荒孫諭江陵人元祐末掛冠同時退休者呉師道梁宏朱光復賈亨彦張景逹布衣唐愈為七老㑹五日一集時人榮之唐恕介孫崇寧初為華陽令以不能奉行茶法謝病免歸其弟意方為南陵令亦以病自免兄弟杜門躬耕恕尋以宣教郎致仕靖康初許翰言其髙行詔起為監察御史意亦以呉敏薦召對而貧不能行竟餓死江陵山中胡勉長陽人建炎初冦鍾相之徒犯其邑勉集豪勇斬二渠魁嘗攝縣事劉超將侵建平勉捍防蜀道賊不得進凡破賊所獲金帛悉分其下亳釐無取項安世江陵人淳熈初進士為秘書正字在朝多所建明後累官至直龍圖閣所著有易玩辭及他書多行於世子寅孫大理少卿容孫吏部侍郎劉鼎孫江陵人第進士累官翰林學士徳祐末從二王至崖山陸秀夫負王赴海死鼎孫亦驅家属并輜重沉海不死為元兵所執搒掠無完膚一夕得脱卒蹈海死元向遜宜都人自宋末及元九世同居共㸑人無間言稱為義門其十世孫存仁存禮早卒存仁妻張存禮妻杜各一子二婦年皆未及三十堅守節義至元中旌表其門曰節義本朝趙勉夷陵州人洪武初進士才能著稱累官至户部尚書王賢江陵人為監生與友王讓同居讓幹往江南以故人所贈銀十兩故衣一篋托賢收之未幾賢除鹽城尹讓囘除泌陽令尋卒後十餘年賢致仕還家即以所寄之物與讓子不受曰吾父彼時安有此物賢白於官拘其子與之張秉彛右首人驍勇有智畧初仕陳友諒為樞密院同僉守韶州王師克贛州遂以其軍降授贛州衛指揮同知仍守韶州後改廣州衛指揮同知調守雷州脩築東洋圩岸六十餘里以捍海潮又興特吕塘水利民甚便之海冦黑面鍾冦欽亷秉彛將兵討捕追獲之累遷水軍右衛指揮使劉儁江陵人洪武乙丑進士歴户兵二部主事郎中遷右侍郎進尚書永樂間征安南督理軍務有功既還餘冦猖獗復命儁徃征提兵至大安海口援絶被執不屈而死洪熈初贈榮禄大夫柱國少傅謚愍節官其子奎給事中何忠江陵人永樂中進士拜監察御史讜言正色陞交阯政平知州專尚徳禮夷民懐服交阯叛忠在圍中藩臬大臣謂忠有才智膽畧使告於朝乞師忠縋城出遇伏被執忠罵賊不屈死事聞詔旌其門謚忠節楊溥石首人湖廣鄉試第一人洪武庚辰進士授翰林編脩進洗馬洪熈初陞翰林學士尋加太常寺卿宣徳初脩兩朝實録為總裁官正統初拜少保兼禮部尚書武英殿大學士卒贈特進光禄大夫左柱國太師謚文定溥謹厚謙恭學術醇實與楊士竒楊榮同典機務時號三楊公裴璉監利人洪武間知劍州歴浙江江西僉事執法不撓被誣去尋起為御史以平冦功陞河南副使免官再起為御史改刑部主事官至刑部侍郎子綸永樂中進士歴翰林編脩脩撰終山東右布政使傅啟讓石首人永樂壬辰進士授河南僉事清慎有為吏畏民敬嘗奏築隄以禦河水民皆徳之官至大理寺少卿劉永清石首人永樂辛卯進士歴官翰林編脩侍講終廣東右布政使鄒師顔宜都人洪武間以國子生擢兵部主事永樂間陞大理寺丞洪熈初陞禮部右侍郎未幾病疽卒家貧不能歸䘮朝廷惜之給官舟載歸師顔小心謹畏亷介自持蒞事周密人不敢干以私云余汝弼宜都人勤學好問居家孝友能傾已濟人里嘗大疫率諸兄煮湯粥徃飲食之人徳其惠登永樂辛邜鄉薦擢營繕主事陞屯田郎中居官儉約不改布衣盖棺之日家靡餘蓄學士楊溥嘗稱其静澹知義人以為名言張純江陵人永樂辛丑進士授監察御史嵗大旱乃捐銀帶簮珥易粟為粥活民累陞僉都御史巡撫畿内風紀丕振仕終兵部尚書王詢公安人宣徳五年進士改翰林庶吉士授檢討博學工文操行簡約後陞大理寺丞巡撫貴州蠻夷畏服官至國子祭酒劉祥監利人以左軍都督府事死正統己巳之難天順間録其子省志汪浩石首人景泰辛未進士歴官四川僉事時成䕫潼嘉諸郡冦作浩多方經畧擒斬萬餘擢僉都御史巡撫四川平劇賊趙鐸等加副都御史往討都掌叛夷卒致底定所著有平西録省志王軾公安人以進士授大理評事審録四川用刑平允陞四川副使尋擢按察使清决滯獄囹圄為空進副都御史總理京儲巡撫貴州振揚風紀召入為大理卿陟南京户部尚書討貴州酋婦米魯事平加太子太保謚襄簡省志劉懋江陵人成化壬辰進士拜刑科給事中封駁無所避值權閹汪直用事懋首劾之尋論昭徳貴妃專寵杖繋詔獄出為浙江僉事憂歸不起懋明爽遇事剖决不滯疾惡太嚴與人不茍合家居數十年足跡不至城市號不姤子省志趙鑾江陵人成化辛丑進士授大理評事亷恕詳審擢雲南僉事訟牒旁午治之無留滯土官不法及掣肘難治者立寘於法勦平菁寨邉境用安建昌與南詔土酋讐殺鑾躬往處定士論偉之省志汪瑄江陵人成化甲辰進士初知華亭拜監察御史時權閹李廣敗頗連大臣太宰屠滽以為不必深究瑄䟽劾之數其黨䕶及壊選法數事人稱其巡松江貪墨望風解印綬云省志劉渙江陵人成化辛丑進士知鄱陽明毅有為吏治為稱首以疾卒民立祠祀之省志趙文奎江陵人少與弟文衡勵志講讀舉成化丁丑進士初知繁昌拜監察御史按鳯陽清戎兩浙出知雷州府歴貴州右布政轉應天尹致仕器識端諒不苟於官省志李昻江陵人少有才名初知長寧縣尚書周洪謨稱之曰長寧能賢令四湯行以善政稱胡諒以惠民稱朱思明以賢能稱昻則兼三子之長而有之考最陞潼州知州省志易忠宜都人由太學生授四川内江知縣蒞政亷明聲譽􅂱然擢監察御史正直不阿贊理軍務令行禁止吏民畏服省志蘇昭宜都人童稚時日記千言為諸生後為南平令致仕一日江濵遇一孤子守骸而泣昭問其由對曰父知巴縣殁於此死無所依昭遂出貲殮之助還成化間邑人杜姓者五人饑甚逼食於人執於官誣以盗罪昭上書當道得伸省志潘子秀江陵人𢎞治初進士授户部主事有能聲調文選員外郎精於品藻補江西提學副使振教作人卓有可紀省志袁宗臯石首人𢎞治初進士授長史謁獻皇帝於邸特稱徳意世宗入繼大統扈蹕行陞吏部左侍郎尋遷禮部尚書以疾卒於京諭祭京邸贈太子太保謚榮襄省志劉思賢石首人𢎞治中進士歴户部郎中正徳間以忤逆瑾繋獄免瑾誅起重慶知府累遷工部侍郎恭慎端慤踐履不茍嚢無餘儲省志劉寓生石首人𢎞治乙丑進士選庶吉士拜監察御史抗直敢言以忤逆瑾免瑾誅起福建僉事尋致仕杜門寡交自奉類寒素然省志鄒文盛公安人𢎞治癸丑進士授吏科給事中歴官雲南布政使時貴州土酋嘯亂陞副都御史巡撫征勦克之進右都御史掌留臺振風紀人不忍欺進南京户部尚書尋乞休卒贈太子少保謚莊簡省志伍文定松滋人𢎞治己未進士常州府推官歴知吉安府擒逆濠有功擢副都御史累遷兵部尚書省志王宗義石首人五世同居長㓜二百餘人藹然雍睦詔表其門閭省志曽璉江陵人正徳初以吏員任四川綿州判官時流冦廖麻子攻刼州縣璉率兵禦敵力屈死之事聞贈工林苑監丞䕃其子省志鄧俊石首人正徳初以吏員任泗州榮山縣典史時鄢賊猖獗城陷俊示子曰我與賊不共戴天何以生為與子俱死事聞䕃其别子一官省志張璧石首人正徳辛未進士選庶吉士授編脩晉侍讀學士嘉靖初補學士掌翰林院事累進禮部尚書兼東閣大學士預機務壁恭恂雅直不近流俗喜文學所著多雅馴省志籃純江陵人應貢將赴南雍以父老不行知府呉彦華曰只此一念可當孝子父卒廬於墓側不忍歸士林韙之省志鄧鋐江陵人領正徳丁卯鄉薦授南陽知縣性狷介不阿治行茂著徴入為御史以直忤於時遷桞州守布徳施惠民夷懐服擢廣東副使有遺愛及巡海㑹有採珠之令鋐焚香與諸從事誓一無所取致仕歸家徒四壁清苦若儒生士林重之省志張誠荆州衛人性質樸好施與能急人之難嵗大侵道殣相望出貲周賑多所全活且為瘞其暴露者有軍人犯罪當贖家貧將鬻男以償誠憐之代為出金亦不責報後泛舟公安遇風溺者甚衆獨誠不死人咸異之夀九十終省志髙嵩者江陵人性至孝嘗舉嘉靖癸卯鄉試一上春宫後以父母老更不再赴退居於野力田贍飬而已其家稍饒給嵩者乃折節為儉自奉親甘㫖外供苦茹淡有寒畯所不能堪者父母既終髙竟不仕卒省志陳大賔江陵人清介豁逹以直節自負由上虞縣知縣起家治行卓越累遷至工部侍郎所在宦茂著省志列女子發母楚將子發攻秦絶糧使人請王因見母母曰士卒得無恙乎對曰分菽粒而食之曰將軍得無恙乎對曰豢黍足食子發敗秦而歸母閉門不納使人數之曰子不聞越王伐呉客有獻酒一器乃注之江使士卒飲其下流獻糗一嚢分而食之故戰自力也今雖勝非術吾不取子發謝罪然後納之樊姬楚莊王妾王好獵姬諫不止乃不食禽獸之肉王遂改過勤於政事一日聴朝罷宴姬曰何宴也王曰與賢者虞丘子語也姬笑曰虞丘子相楚十餘年所薦非親則故未聞進一賢也王以姬言告之虞丘子不知所對遂進孫叔敖治楚而霸姬之力也老萊妻楚人老萊耕於䝉山之陽楚王聞其賢詣所居曰寡人愚昧獨守宗廟願先生臨之老萊曰諾其妻載畚䇿而來曰何車跡之衆也老萊曰楚王請吾守國政已許之矣妻曰妾聞可啖以酒肉者可隨以鞭朴可餌以官禄者可繼以斧鉞妾不能為人所制投其畚䇿而去老萊從之伯嬴楚平王夫人呉敗楚至郢昭王亡呉王盡妻其後宫伯嬴持劍曰妾聞諸侯者一國之表也而亂之可乎且男女坐不同席食不共器所以别也君棄儀表何以臨國妾以死守不敢承命呉王慙而退真姜楚昭王夫人王出遊留夫人於漸臺聞江水大至急使人迎之忘持符夫人不從使者曰大水且至取符恐後矣夫人曰真女義不犯約守一節也寧畏死乎於是使者取符未返水大至臺崩夫人流而死之越姬楚昭王姬昭王遊獵與姬同乘馳逐登附社之臺望雲夢之囿顧謂姬曰樂乎姬對曰樂則樂矣不可久也昔先君莊王􅁋樂三年不聴政事終而能改卒霸天下君王若能法先君改之以勤其政可也不然亂無日矣王敬其言而禮之向氏長陽人宋建炎中保山栅以避賊冦皮仲破柵向義不辱被殺人見其白乳自吭流踵向之子後誘賊醉而殺之以復母讎杜氏王善妻江陵人夫卒生子倫甫二嵗姑以年少家貧密勸之嫁杜曰夫以老母孤兒托我所不死者以此耳遂痛哭以死自誓姑年八十卒以禮歛塟教子成立孀居四十餘年正統中旌志省姚氏張原泰妻石首人守節不渝姑病目䑛之愈比姑殁工女事以給殯塟三年不食肉正統中旌省志魏氏周鏞妻石首人鏞卒魏年二十四家貧誓守四十餘年景泰中旌省志尹氏張蘭妻石首人蘭為太學生卒尹年二十五姑老子㓜家貧尹躬勤紡績以給衣食養姑九十而卒教子讀書孀居五十餘年天順中旌省志于氏沈彦清妻江陵人清卒于年二十八而貧養姑撫子守節四十餘年成化中旌省志楊氏何清妻枝江人清為太學生卒楊年二十四子存中時在襁褓楊撫孤礪節夀至九十嘉靖中旌省志翁氏周通妻江陵人通卒斷髪守節以死自誓嘉靖中旌省志張氏汪寳妻冷錡妻鄧氏逺安人二節婦俱嘉靖三十二年知縣田時雍奏聞旌表省志董氏周宗義妻石首人宗義卒董年二十八生子鼎尚在懐乳中以死自誓紡績以養舅姑教子讀書成名事聞旌表省志劉氏咼懋妻公安人年二十四夫卒誓不再醮撫遺孤文昌教之以貢入太學諸名士甚推重焉劉守節垂三十年有司亷其實特旌表其門省志駱氏余鳯儀妻宜都人年二十八儀卒無嗣鄉人勸之以刀自剄自是人不敢言日勤紡績以養翁姑年六十有司覈實以聞旌表其門省志仙釋陸法和隱於江陵百里洲有道術能先知禍福梁侯景之亂遣任約撃湘東王於江陵法和率蠻兵敗約擒之封江乘縣公慮梁室日衰嘗大聚兵艦欲襲襄陽元帝使止之法和乃還州堊其城門麻衣葦坐及聞梁元敗滅衰服終身岑道願江陵人隋初避難沂三峽至萬州江南山岩下脩煉食黄精百餘嵗蛻迹而去唐貞觀十八年以香属商人令徃所隱岩下然之商人不徃且歸波濤雷怒不可上乃返詣岩然香遂平行無虞司馬子㣲唐台州人隱内方山煉丹成仙後人因名其村曰馬仙村李白云予昔於江陵見天台司馬子㣲謂予有仙風道骨可與神遊八極之表乃著大鵬遇希有鳥賦以自廣大通禪師汴人姓李氏生而神秀隋仁夀時卓錫江陵玉泉談經析理勸誘愚俗南北學徒幾萬人時有能禪師居曹溪學者宗之因號南能北李僧融住九江東林寺嘗至江陵有一家奉崇神廟者見融禮之遂受戒奉佛後主人之母見一鬼欲縛之母懼請融誦經鬼怪遂息後融還廬山宿旅店衆鬼曰君何謂鬼神無靈耶乃曵之下地將欲加手融黙念呪語即見一天將執金剛杵撃之鬼遂驚散不見道穆初入荆州神山忽風雷震吼蛇虎交侵穆心泰然不動七日蛇虎遂隱山神變形謝過云是由田伯玉也特來受戒自是諸毒潛亡旱則禱雨輙應居山三十餘年道俗欽徳智顗荆州人七嵗聞誦法華便能記憶謁大蘇山思禪師得其宗㫖思曰汝於陳國有縁顗即詣金陵隨處闡化嘗夢登髙山見一僧以手招之曰此天台山也遂徃天台居北峯螺溪之上陳宣帝聞之割始豐縣以供其費儲后以下並宗戒範岳州府東至武昌府通城縣界二百里南至長沙府瀏陽縣界二百九十里西至辰州府沅陵縣界八百二十五里北至荆州府監利縣界三十里自府治至南京二千二百二十五里至京師五千六百七十里糧一十七萬石零建置沿革禹貢荆州之域天文翼軫分野周以前為三苗地春秋為麇國羅國地戰國屬楚秦為長沙郡地漢因之三國呉為重鎮晉分置建昌郡尋復省入長沙劉宋復分巴陵等縣立巴陵郡屬湘州南齊為巴陵國梁復為郡兼置巴州隋平陳郡廢改巴州曰岳州治巴陵縣大業初改為羅州尋復為巴陵郡唐初蕭銑復置巴州武徳中改為岳州屬江南西道天寳初復為巴陵郡乾元初復曰岳州宋𨽻荆湖北路宣和初置岳陽軍節度紹興問改州曰純改軍曰華容後復舊元置岳州路本朝初為岳州府尋改岳州後復為府領州一縣七巴陵縣附郭本漢長沙郡下雋縣地孫呉置巴陵縣晉於縣置建昌郡尋省劉宋以後皆為巴陵郡治隋唐岳州皆治此宋仍舊元屬岳州路本朝洪武九年以縣併入岳州後仍置編户五十七里臨湘縣在府城東北九十五里本巴陵縣地五代唐置王朝塲宋淳化初陞為王朝縣屬岳州至道初改臨湘縣元仍舊本朝因之編户八里華容縣在府城西一百八十里本孫呉孱陵縣地晉置南安縣梁置南安湘郡尋罷隋開皇中改華容縣屬岳州以古華容城為名唐改曰容城神龍初復曰華容宋元仍舊本朝因之編户二十二里平江縣在府城南二百四十里本春秋羅國地秦為羅縣漢屬長沙國孫呉析置漢昌縣又改曰呉昌晉屬長沙郡隋省入羅縣唐省羅縣入湘隂神龍初分湘隂置昌江縣五代唐改為平江縣宋因之元陞為平江州本朝復為縣編户五十里澧州在府城西五百七十里春秋戰國時並屬楚秦為黔中郡地漢屬武陵郡孫呉屬天門郡晉置南平郡又析置義陽郡南齊為天門南平義陽三郡地隋初罷郡置松州尋改為澧州治澧陽縣大業中改為澧陽郡唐初復為澧州屬山南道天寳初改澧陽郡乾元初復為澧州宋屬荆湖北路元陞為澧州路本朝初改路為府洪武中改府為州𨽻常徳府後改𨽻岳州府編户三十里領縣三石門縣在州城西九十里本漢武陵郡零陽縣地孫呉以武陵分置天門郡治零陽晉因之陳為石門郡隋罷郡為石門縣屬澧州唐宋元皆仍舊本朝因之編户二十五里慈利縣在州城西一百六十里本漢零陽充二縣地屬武陵郡孫呉析置漊中縣晉又析置臨澧縣並屬天門郡後周屬衡州隋初又置崇義縣改零陽曰慈利俱屬崇州大業初州罷以縣屬澧州唐以崇義併入慈利縣宋因之元陞為州屬澧州路本朝復為縣編户五十八里安鄉縣在州城東南一百二十五里本漢孱陵縣地屬武陵郡建武間置作唐縣東晉置南平郡治此陳又析置安鄉縣為義陽郡治隋改作唐曰孱陵與安鄉俱屬澧州唐以孱陵省入安鄉宋元仍舊本朝因之編户一十一里郡名巴陵劉宋名岳陽宋名形勝左洞庭右彭蠡史記囊山帶江唐史囊山帶江處百越巴蜀荆襄之㑹倚連岡面長江唐戎昱澧州新城頌倚連岡以起伏面長江以演漾沅湘衡嶽接其前漢沔荆峴帶其後宋澧州郡守題名記兼有江湖之勝岳陽志四凟長江為長五湖洞庭為最江湖之勝巴陵兼有之巴陵勝狀在洞庭一湖宋范仲淹岳陽樓記蘭江前陳仙洲外蔽澧州圖經州宅有彭阜聳其西簫山列其東蘭江前陳仙洲外蔽所謂神仙窟宅也風俗人性悍直士尚行義舊志士知義而好文俗信巫而尚鬼郡志民以網罟為業舊經圖有楚遺俗澧陽志舊屬楚為黔中地至今有楚遺俗有屈原遺風唐刺史王堪制詞刀耕火種永定衛志山川巴丘山在府城南亦名巴蛇塜羿屠巴蛇於洞庭積骨為丘故名呉使魯肅以萬人屯巴丘即此白鶴山在府城南山有白鶴寺其陽有兩池相傳内潛巨蟒吕翁招出化為劍又有江叟者嘗遇樵夫遺以鐵笛吹之無聲一日登此山吹於紫荆臺響震林谷忽有兩女子出授神藥云服此當為水仙女子葢龍女也金鶚山在府城東五里昔有異鳥飛集其上故名烏龜山在府城南五里楞伽峯南水際九山相連形如龜亦名九龜山即唐桞宗元記無姓和尚所居之處君山在府城西南一十五里洞庭湖中一名洞庭山狀如十二螺髻山海經云洞庭之山帝之二女居之盖堯女湘君嘗居此故名昔秦始皇南遊浮江遇大風因問湘君何神博士對曰堯女舜妃始皇怒命赭其山又宋岳飛討楊么伐君山木為巨筏塞諸港􅆜即此道書以為第十一福地唐李白詩帝子瀟湘去不還空餘秋草洞庭間淡掃明湖開玉鏡丹青􅀞出是君山劉禹錫詩湖光秋水兩相和潭面無風鏡乍磨遥望洞庭山擁翠白銀盤裏一青螺酒香山在君山湘川記上有美酒數斗飲者即為仙漢武帝遣欒巴來求果得酒未進御東方朔竊以飲帝怒欲殺之對曰酒有驗茍殺臣臣亦不死臣死酒亦無驗遂赦之土俗云每春時徃徃聞酒香尋之莫見其處鳴山在君山履之鏘然有聲艑山在君山東洞庭之涯相望浮浮其狀如舟九馬觜山在洞庭東岸有九口觜舟行過此多險城陵山在府城西北一十五里蜀江西來洞庭南注合流於此乃一郡水口山也鹿角山在府城南五十里洞庭湖東古屯戍之所魚梁山在臨湘縣治南山下有湖土人常取魚於此望城山在臨湘縣南三十五里下有井泉溉田千頃其山髙峻人登之望見郡城象骨山在臨湘縣西南四十里山海經巴蛇吞象暴其骨於此山傍有湖曰象湖大雲山在臨湘縣東九十里連接七十餘峯四時雲霧上有石通判祠響山在臨湘縣南九十里上有四山髙聳人嘯呼應聲如響龍窖山在臨湘縣東南一百里跨臨湘通城崇陽蒲圻四縣境上有龍湫因名又有雷洞洞有石門山徭所居雞籠山在臨湘縣界中以形似名馬鞍山有二一在華容縣西五里一在石門縣治東北以形似名東山在華容縣東一十里峯巒秀麗連亘百餘里古松夾道驛路經其中鼎山在華容縣北一十五里上有蜀漢昭烈廟昭烈秭歸之敗嘗過此山北故又有逐備陵南山在華容縣南三十里隔湖對峙蒼翠如屏石門山在華容縣東三十里一名仙廬山有七峯甚髙將雨則雲起峯上霽則雲復歸中有寳慈觀晉仙人張驚喜煉丹之地又石門縣西十五里亦有石門山縣以此名墨山在華容縣東四十里上有龍池禱旱多應唐張説詩序云石門墨山二山相連有禪堂道觀天下絶境𤣥石山在墨山北楚辭馳余車於𤣥石即此此山西北有石龍山崖石上有龍鱗㾗澗中流泉四時不竭禹山在華容縣南四十里夏禹濬山嘗登其巔山上今有禹廟鼓樓山在華容縣東南五十里上有石室下瞰洞庭中可容數十人團山在華容縣東南七十里山多赭石可研以書字上有馬援廟方臺山在華容縣東山出雲母石土人候雲所出掘之徃徃有長數尺可為屏風者明山在華容縣南一百里上有洞庭神祠昌江山在平江縣東南二里上冇艾仙人所居石壇及芙蓉池金線洞飛仙石昔呉魯肅嘗屯兵於此後人徳之故又名魯徳山為立廟焉梧桐山在平江縣北十五里有觀梅仙山在平江縣北三十里梅子真隱處有丹井梅水出焉道巖山在梅仙山東四十里上有天池池前兩峯南曰席㡌北曰雲盖中有斷石相傳許旌陽淬劍處山又有香爐巖連雲山在平江縣南五十里舊名純山峭㧞萬仞雲氣常覆其上有呉真人煉丹壇中有石室唐田遊岩亦嘗隱此盧山在平江縣東五十里一名獨石山工有七仙井并祠永寧山在平江縣北六十里四壁削成履雲梯飛棧而后可躋其端沃衍可耕斷戈朽鏃時出於上幕阜山在平江縣北九十里一名天岳山髙一千八百丈周廻五百里石崖壁立上有篆文云夏禹治水嘗至此山頂有田數畝東有温泉三穴又有芙蓉池産金鯉列仙壇産瑞竹又有海棠仙人二洞道書以為二十五洞天今紫陽觀在焉石牛山在平江縣東一百里山多岑石其狀類牛又冇大寨石大者可容萬人小者容千人上有井泉可以避地土龍山在平江縣東北一百里汨水經其下又有龍門山彭山在澧州西一十里接連欽山上有李彭廟闗山在澧州東一十五里以其闗鎻水口故名彰觀山在澧州東一十五里乃四十四福地即宋明道中黄道冲范靈二仙飛昇處上有寧極觀溪流九曲縈遶前後將軍山在澧州南六十里相傳漢紀信所居後信死難人義之立祠其上因名藥山在澧州南九十里上多芍藥山有長嘯峯昔僧惟儼嘗夜登山雲開月現大嘯一聲聞十數里因名太浮山在澧州西南一百三十五里亦名獨浮山跨石門武陵桃源三縣界谷中有石室户牖自然虚明上有青玉壇又有丹竈白鹿池十八洞及有湧泉成谿相傳浮丘子學道浴丹之所横山在澧州西北一百二十里岡嶺平直逺無峰巒因名山南有潺水洞旱禱有應太清山在澧州北一百六十里上冇五老峯老君巖中有瓊瑶紫極宫乃李凝陽得道之所層山在石門縣東北三里一名層歩山外望如一山入内乃有二重山側有石屹立如人形號層山神紫和山在石門縣東北一十里上有存志觀皮子藥爐山之陽又有仙女洞俗傳丁令威煉丹之所石匱山在石門縣南一十里上有大方石其形如匱黄石山在石門縣西北二百一十里有溪出雄黄騎龍山在慈利縣治南以形似名其上石室内有石龍頭口中吐水下流溉田俗呼黑龍泉道人山在慈利縣北一十里山下有一石類道人形髙五丈餘面南而立崇山在慈利縣西三十里舜放驩兠於崇山即此月山在慈利縣東四十里山頂彎如半月赤松山在慈利縣西一百六十五里與天門山對峙赤松子嘗隱此上下數十里號赤松村天門山在慈利縣西南一百八十里古松梁山狀如香爐有十六峯相次最髙者為天門空明透徹上貫山頂門角上各有一竹倒垂下拂俗名天帚九度山在慈利縣有九度水故名上有石形似樓名仙人石樓銅盤山在慈利縣連錢銅盤石馬此澧陽之灘險也黄山在安鄉縣北六十里土石皆黄一名金峯山上有劉宋謝晦廟故又名謝山古田山在安鄉縣西北六十里上有石田古人耕之故名中有石田觀鳴鳯岡岳陽志云在巴陵界中仙女巖在平江縣南三十里下有石室曰仙郎洞龍影洞在平江縣西北邃三千餘尺周三十里石壁瑩然上有龍影屈伸蜿蜒鱗甲如繪桃花洞在慈利縣界洞多桃花宋仁宗朝彭仕義反知澧州郭逵破之於此燕子洞在慈利縣東南二里巖洞深廣可坐數千人巖後有穴秉燭而入其中亦有明處四圍石乳融結中有石燕子故名賔郎洞在慈利縣茆岡寨之南羣蠻徃來之徑一穴而入後有大門過此即為猺界昔猺人侵擾邀撃而後屈伏與之盟畫此為界鐫石象人立於道左風洞在慈利縣北三十里洞常有風雷公洞在慈利縣境天色隂晦則其中隱隱有聲如雷兩壁峻立形如神像落馬洞在石門縣舊傳漢昭烈嘗落馬於此白馬磯在巴陵縣境唐李白詩側疊萬古石横為白馬磯鴨欄磯在臨湘縣東一十五里呉建昌侯孫慮作鬬鴨欄於此陸遜諌止之道人磯在臨湘縣南一十五里大江濵有石髙十餘丈如道人面北而立磯中有二洲南為黄金瀬北為黄金浦上又有白石髙丈餘其光如鏡名石鏡亦名雞冠石花石在慈利縣武口寨石上有花如堆心牡丹枝葉繚繞雖精於􅀞者莫能及或以物撃碎其花拂拭之其花復見重疊非一大江在府城西北從荆州府石首縣北流過城陵磯下合洞庭諸水入臨湘縣其流清者為洞庭濁者為大江又東過武昌㑹漢水三江在府城下岷江為西江澧江為中江湘江為南江皆㑹於此故名亦名三江口宋慕容延釗等大破周保權軍於此蘭江在澧州城東地多蘭蕙楚詞云捐余珮兮澧浦因稱珮浦又云澧有蘭故名蘭江洞庭湖在府城西南禹貢九江孔殷註云即洞庭也沅漸元辰叙酉澧資湘九水皆合於此故名九江又九江沅資湘最大皆自南而入荆江自北而過洞庭瀦其間名為五瀦戰國䇿云秦與荆戰大破之取洞庭五瀦是也每嵗六七月間岷峨雪消水暴漲自荆江逆入洞庭清流為之改色唐杜甫詩呉楚東南圻乾坤日夜浮孟浩然詩八月湖水平涵虚混太清氣蒸雲夢澤波撼岳陽城宋吕蒙正詩八月寒濤濺碧空片帆悠颺信秋風探珠直待驪龍睡莫遣迷津浩渺中相傳湖中有巨蚌夜深展一殻如帆徃來烟波間吞吐明珠與月爭輝漁者百計取之莫能得青草湖一名巴丘湖北連洞庭南接瀟湘東納汨羅之水每夏秋水泛與洞庭為一水涸則此湖先乾青草生焉唐張志和漁歌青草湖中月正圓巴陵漁父擢歌連杜甫詩洞庭猶在目青草續為名赤沙湖在洞庭湖西秋夏水泛與洞庭為一涸時惟見赤沙舊記云洞庭南連青草西亘赤沙七八百里又謂之三湖㴩湖在府城東南五里亦名滃湖左傳呉人敗楚於雍澨即此爾雅曰水泛入為㴩唐張說集云㴩湖者沅湘澧汨之餘波夏潦奔注則泆為此湖冬霜既零則涸為平野故詩有曰念彼㴩湖去浮舟更一臨千峯出浪險萬木抱烟深蓴湖在臨湘縣東風土記云岳陽雖水鄉絶難得蓴惟此湖有之故名大鯨湖在安鄉縣西北二十里嘗有大鯨飛天而去故名新墻河在巴陵縣南六十里發源臨湘縣相思山至巏口注於洞庭華容河在華容縣治北晉杜預所開以通郴桂之漕北源江水南逹洞庭澧水源出慈利縣西厯山流至石門縣㑹渫水又流至澧州城下合涔澹二水入於洞庭繡水在澧州東二里水流至此旋折如繡紋范仲淹嘗遊此澹水在澧州東二十五里漢王粲詩悠悠澹澧水涔水在澧州北七十里唐杜牧詩一話涔陽舊使君郡人回首望青雲盧肇詩君夢涔陽月中秋憶棹歌渫水在石門縣西一百七十里流經水南山鯉魚山合陽泉南溪水至縣西四十里入於澧水漊水在慈利縣源出歸州東流至索谿合四十八澗而為一水南至觀嘉觜㑹澧水昌水在平江縣北八十里源出幕阜山流至縣南有巨石形如昌字水環遶其中故名汨水在平江縣東一百一十里源出江西寧縣至平江縣東南合純盧二水又西南㑹昌水下流合羅水又西北流入洞庭楚詞有汨羅即此黄溪在澧州西沂流鑿石數丈有石神頗有靈異洳溪在澧州源出龍洳山昔楚莊辛説楚莊王飲洳溪之流即此雙溪在慈利縣乃前後江合流之口有芙蓉洲至菱花渡而合為一邑之勝東陽潭在石門縣之東陽山下出石鯽魚重唇魚雙鱗魚皆珍品也長樂潭在石門縣東南二里白馬洲在澧州東二十里唐林静先生乘馬飛昇處金沙洲在洞庭湖中一名龍堆延袤數里杜甫詩龍堆擁白沙即此又名金沙堆宋張孝祥有賦葛長庚詩惟有金沙堆下水東西南北任風吹彭城洲在府城東北劉宋元嘉中謝晦反到彦之進討軍次彭城洲彦之軍敗退保隱磯即其地楊子洲在華容縣境相傳荆佽飛刺蛟之所今有廟存三湘浦在府境内梁天監中僧寳誌為符書云起自汝蔡訖於三湘後侯景起於汝水之南而敗於三湘之浦故亦名侯景浦鴛鴦浦在慈利縣治北昔人詩桃花浪煖鴛鴦浦桞絮風輕燕子巖桞毅井在君山桞毅唐中宗時下第歸至涇陽見一婦人牧羊曰妾洞庭君小女嫁涇川次子為婢所惑毁黜至此敢寄尺牘洞庭之隂有大橘樹撃樹三當有應者毅如其言有武夫掲水引入至靈虚殿取書以進洞庭君泣曰老夫之辜使孺弱罹害頃之有赤龍飛去俄紅粧擁一人回即寄書女也宴毅碧雲宫洞庭君弟錢塘曰涇陽􅄔婦欲託髙義為親毅不敢當辭而去後再娶盧氏即龍女也與同歸洞庭七僊井在盧山有石竇七竅出泉四時不竭嵗旱禱雨輙應白龍井在安鄉縣黄山嵗旱禱雨嘗有白龍升天雙泉在澧州西九十里二泉相近其水常湧或聞人聲則怒濤異常東泉在石門縣南三十里有石洞曰東泉遇旱祈雨徃來輻輳斷山泉在臨湘縣南八十里泉㵼斷崖之間灌田千頃雲母泉在墨山松嶺之下味甘而流長地産雲母魚泉在慈利縣西二十一里其泉石