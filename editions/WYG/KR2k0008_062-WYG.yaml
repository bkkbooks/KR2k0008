body:
  text: 明一統志卷六十二明李賢等撰荆州府東至承天府沔陽州界二百里西至四川夔州府巫山縣界六百六十里南至岳州府澧州界一百九十八里北至襄陽府宜城縣界二百四十五里自府治至南京二千七百一十五里至京師千一百三十里糧一十九萬四千石零建置沿革禹貢荆州之域天文翼軫分野春秋時為楚郢都秦㧞郢置南郡漢初改為臨江郡尋復故武帝時置荆州刺史南郡𨽻焉三國初歸蜀漢後屬吳晉太康初改新郡尋復曰南郡為荆州刺史治所東晉以為重鎮梁元帝都於此隋初州郡俱廢尋復置荆州治江陵大業初罷州為南郡唐初復為荆州天寳初改江陵郡上元初又改江陵府號南都宋置荆湖北路淳熈初改曰荆南府尋復為江陵府元改江陵路天厯初改中興路本朝改為荆州府領州二縣十一江陵縣附郭本秦南郡之郢縣地漢置江陵縣為南郡治東漢省郢縣入江陵唐以安興縣省入宋元仍舊本朝因之編户一百二十四里公安縣在府城東南七十里本漢武陵郡之孱陵縣地漢末以劉備為左公居此號公安晉置江安縣劉宋為南平郡治所復改公安陳置荆州於此隋以孱陵縣省入唐仍其舊宋陞為公安軍尋復為縣元仍舊本朝因之編户三十一里石首縣在府城東南一百八十里本漢南郡華容縣地晉置石首縣以山為名劉宋省唐初復置属荆州宋因之熈寧中省建寧縣入焉元仍舊本朝因之編户二十一里監利縣在府城東三百一十里本漢南郡華容縣地三國呉置監利縣尋省晉初復置劉宋属巴陵郡隋属復州唐因之五代梁属江陵府宋初因之熈寧中以玉沙縣省入尋復舊宋末縣廢元復置本朝因之編户三十三里松滋縣在府城西南一百二十里本漢南郡髙成縣地晉以廬江郡松滋縣流民避兵至此乃僑置松滋縣属河東郡隋初廢郡以縣属荆州唐属江陵府宋元仍舊本朝因之編户二十三里枝江縣在府城西一百八十里故羅國地漢始置枝江縣属南郡以蜀江至此分枝為諸洲故名唐析置長寧縣以枝江省入大厯中復置枝江省長寧宋省入松滋後復置徙治澌洋州又遷治下沱市元仍舊本朝因之編户八里夷陵州在州城西三百四十里本楚國地秦伐楚燒夷陵即此漢為縣属南郡三國魏於此置臨江郡蜀漢改為宜都郡又改縣為西陵晉復曰夷陵梁兼置宜州西魏改為拓州後周又改峽州隋初郡廢後改州為夷陵郡唐初復為峽州天寳初改夷陵郡乾元初復為峽州宋因之元改為峽州路本朝初為峽州府洪武九年改為夷陵州以夷陵縣省入編户七里半領縣三長陽縣在州城南九十里本漢武陵郡之佷山縣晉属宜都郡隋改為長陽縣属南郡開皇中置睦州尋廢唐復置睦州尋省以縣属東松州後属峽州宋元仍舊本朝因之編户三里宜都縣在州城東南九十里本漢夷道縣属南郡蜀漢置宜都郡劉宋析置宜昌縣陳改為宜都縣隋復曰宜昌属荆州唐復曰宜都置江州改東松州貞觀中省州入宜都縣宋元仍舊本朝因之編户四里半逺安縣在州城東北二百里本漢臨沮縣地属南郡晉析置髙安縣属汶陽郡後周改為逺安縣属峽州隋初郡廢唐宋元俱仍舊本朝因之編户四里歸州在府城西五百二十五里周為䕫子國地戰國属楚秦漢属南郡三國呉属建平郡晉因之劉宋属荆州南齊属巴州後周置秭歸郡治長寧縣隋初郡廢改縣曰秭歸属信州唐置歸州天寳初改巴東郡乾元初復為歸州宋属荆湖北路建炎中属䕫路元至元中陞歸州路尋降為州本朝洪武九年廢州為秭歸縣属夷陵州後復為歸州正統七年以興山縣省入編户六里領縣一興山縣在州治西北一百里漢秭歸縣地属南郡晉置興山縣属建平郡後省隋為歸州地唐武徳二年析秭歸置興山縣宋元仍舊國初属歸州正統七年省入巴東縣成化七年復置興山縣尋廢𢎞治二年復置属歸州編户二里巴東縣在州城西九十里本漢巫縣地属南郡晉属建平郡梁為歸鄉縣置信陵郡後周郡廢改縣曰樂鄉属信州隋改為巴東縣唐属歸州宋元仍舊本朝洪武九年改属夷陵州後復属歸州編户九里半郡名郢都春秋時名南郡秦名江陵唐名荆南宋名形勝東連呉㑹西通巴蜀南極湘潭北據漢沔蜀諸葛亮傳山陵形便江川流通呉甘寧傳上流重鎮元和志荆州為上流重鎮故有西陜之號左吳右蜀前臨江漢宋王庶議面施黔背金房秭歸志左荆襄右巴蜀面施黔背金房大江經其前香溪遶其後距三峽之口介重湖之尾郭見義三游洞辭雄據上流表裏襄漢宋史楊霆傳風俗敬鬼重祠隋地理志荆州率敬鬼尤重祠祀之事昔屈原為制九歌盖由此也衣冠藪澤方輿勝覽江陵衣冠藪澤諺云琵琶多於飯甑措大多於鯽魚十年一佃夷陵舊志山田磽确民先期砍木火之名曰畬田以種麥麥登塲伺雨候布茅又火之乗土熱下粟既收即委其地比及八九年復一種俗云十年一佃民俗險陋宋歐陽脩峽州至喜亭記民俗險陋常自足無所仰於四方質直好學元志民質直好義不事誇詐宋大觀中飬士至七百人學校之盛甲於荆湖故其民多好學伐鼓以祭祀呌嘯以興哀歸州舊志荆楚之風夷夏相半巴人好踏蹄歌白虎人事道蠻蜑人與巴人事鬼伐鼔以祭祀呌嘯以興哀故人好巴歌名曰踏蹄競渡之戲郡志屈原以五月望日赴汨羅土人追至洞庭不見因爾鼓櫂争歸競㑹亭上習以相傳為競渡之戲㧞河之戲郡志歸州俗以麻絙巨竹分朋而挽謂之㧞河以定勝負而祈農桑山川擲甲山在府城龍山門西北隅漢將軍闗羽棄甲於此故名今有羽廟在焉龍山在府城西北一十五里晉桓温九月九日同叅軍孟嘉登此山風落嘉㡌今有落㡌臺唐李白詩九日龍山飲黄花笑逐臣醉看風落㡌舞愛月留人紀山在府城北四十里荆州之主山也西北與荆門當陽諸山相接繡林山在石首縣西南二里舊名岐陽山漢昭烈娶孫夫人於此錦障如林因名上舊有綉林亭望夫山在石首縣西二里漢昭烈常泊舟江北沙浦孫妹於此望焉因名一名楚望山龍葢山在石首縣東二里縣主山也形類龍盤寳葢故名石首山在石首縣北江中有石孤立為北山之首因名着紫山在枝江縣南五里漢昭烈初入蜀嘗於此息馬更衣後人因名昭烈愛其山水秀麗建景帝祠祠前有井人不敢䙝名曰神井九岡山在松滋縣西九十五里昔人題松滋亭云江分三峽濁山帶九岡青獅子山在監利縣東一百二十里以形似名楊林山在監利縣東一百三十五里其地多楊望之如雲石鼻山在夷陵州西北三十里髙五百餘仞下臨江流中有巨石横六七十丈如簰筏因名石簰亦名石鼻後周嘗移州治此馬鞍山在夷陵州西北三十里漢昭烈為陸遜所敗升馬鞍山陳兵自遶即此地又石首巴東荆門俱有馬鞍山黄牛山在夷陵州西九十里即黄牛峽峭壁間有石色如人牽牛狀人黑牛黄此山既髙更江湍紆廻望之可見行者謡曰朝發黄牛暮宿黄牛三朝三暮黄牛如故荆門山在宜都縣西北五十里大江南與虎牙山相對唐陶雍詩兩崖開盡水廻環一葉纔通石罅間楚客莫嫌山勢險世人心更險於山虎牙山在大江北岸與荆門山相對狀如虎牙昔公孫述遣將依二山作浮橋拒漢師下有虎牙灘又名武牙宋歐陽脩詩經年遷謫厭荆蠻惟有江山興未䦨醉裏人歸青草渡夣中船下武牙灘今荆門州亦有荆門虎牙二山將軍山在長陽縣南隔江山勢雄峻崖石如帶鎧甲狀上有藺將軍廟因名方山在長陽縣南三十里四面俱方有風穴口大如甕夏則風出冬則風入春秋分則静又名重山龍角山在長陽縣清江北山穴内有隂陽二石隂石常濕陽石常燥旱鞭隂石則雨潦鞭陽石則霽鳯凰山有二一在逺安縣西三里相傳唐韋臯為令有美政鳯凰集此山一在松滋縣南九十里俱以形似名破石山在歸州山有大石破為十字人登陟者咸經其間又冇蔵口曲尺朱雀麝香屈曲野猪等山皆在州境楚臺山在歸州城中舊説楚襄王建臺於此因名今為長寧千户所治臥牛山在歸州北五里形如臥牛上有翰林亭唐翰林李矗為刺史時建嘗遊晏於此八學士山在歸州東山有八疊皆朝州治唐李矗建學士樓以對此山巴山在巴東縣治南其在縣境者又有鐡峯金葢青銅明月雙城桐木蜀口覆磬諸山石門山在巴東縣東北三十五里山有石逕深若重門漢昭烈初為陸遜所破走逕此門追者甚急乃焼鎧斷道然後得免雙劍峰在松滋縣南七十里上有煉丹臺相傳吕洞賔遊處走馬嶺在松滋縣西南十五里相傳漢昭烈入蜀於此馳馬明月峽在夷陵州西二十里懸崖間白石狀如月唐李白詩春水月峽來宋歐陽脩詩江上掛帆明月峽西陵峽在夷陵州西北二十五里峽長二十里層崖萬仞三峽之一也白狗峽在歸州東一十五里兩崖如削白石隱起狀如狗唐杜甫詩白狗斜臨北黄牛更在東馬肝峽在歸州東二十里峭壁間懸石如馬肝狀空舲峽在歸州東三十里夏秋水泛必空舲乃可上其灘亦名空舲自歸州至長陽四百里内峽水奔流石磧險惡唐杜甫詩峽中丈夫絶輕死少在公門多在水富豪有錢駕大舸貧窮取給行艓子朝發白帝暮江陵頃來目撃信有徴瞿塘漫天虎鬚怒歸州長年與最能諸倪岡在府城東三十里五季時髙氏以將軍倪福可有功分賜田土子孫多居於此故名白馬崖在長陽縣東南一十五里清江之南石狀如馬其色純白故名三游洞在夷陵州西北二十五里唐白居易與弟行簡及元􅍬三人遊此作三遊洞記刻石壁上後人因名宋蘇軾與弟轍及黄庭堅三人亦曾遊焉軾詩云凍雨霏霏半成雪遊人屐冷蒼苔滑不辭攜被巖底眠洞口雲深夜無月玊虛洞在歸州城東北唐天寳中有人遇白鹿於此薄而窺之有洞可容千人石壁異文成龍虎花木之狀有石乳結成物象皆温潤如玉故名龍門洞在長陽縣南隔江洞前兩崖劒立巖穴幽邃泉瀑飛注嵗旱禱雨輙應蔵書洞在長陽縣西三十里宋郭雍蔵書於此鬼谷洞在逺安縣西南八十里相傳鬼谷子嘗遊此鎮流砥在府城東南一十五里沙市東捍激江水聲如萬雷一名象鼻觜大沱石在巴東縣大江西北歐陽脩硯譜云巴東大沱石其色青黑斑斑其文微麄亦頗發墨十二培在荆門山宋王十朋詩楚國封疆六千里荆門巖岫十二培言山勢與江路相背也蝦蟇培在夷陵州西三十里江之南有石如蝦蟇其大數丈石上出泉水過者必酌此水以㵸茗陸羽第水品居第四宋黄庭堅云從舟中望之頥項口吻甚類蝦蟇尋泉源入洞中石氣清寒流泉出石骨若虬龍吼陸游詩巴東峽裏最初峽天下泉中第一泉大江在府城南源自蜀之岷山歴歸州夷陵宜都枝江公安石首而東與漢江合流魯洑江在監利縣治東南即大馬河南通荆江北入漢沔三國時魯肅屯兵於此故名清江在長陽縣南一名夷水源出舊施州開蠻界經建始縣境流入本縣至宜都縣入大江以其流獨清不混因名清江川江在松滋縣北岷江至此分為三𣲖下流三十里復合為一逹於江陵入大江赤湖在府城西北一十里相傳晉桓𤣥挾帝西幸劉毅等追襲敗𤣥黨血流水赤故名東湖在府城東五里廣袤數十里為一郡勝槩漕河在府城北晉元帝時所鑿自羅堰口入大漕河由里社穴逹沔水口直通襄漢江浣紗河在夷陵州城西冬月水涸水色如曽浣紗然故名龍穴水在石首縣水經註大江右有龍穴水口昔禹濟江黄龍夾舟故水地俱以龍名赤溪在夷陵州西北五里昔陸抗討歩闡築城之所東合大江香溪在歸州東一十里源出興山縣流入江即昭君溪也蒼茫溪在宜都縣東五十里引以灌田二千餘頃水生五色石類瑪瑙玻璃東瀼溪西瀼溪在巴東縣大江東西