杜弢之亂其將王貢誘五谿蠻向武昌侃使鄭攀夜趣巴陵大破之貢走湘城勢屈降侃後都督八州軍事移鎮巴陵綏懐有道甚得荆楚人心應詹南平太守時天下大亂詹境獨完百姓歌之日亂離既普殆為灰朽僥倖之運頼兹應后嵗寒不彫孤境獨守拯我塗炭惠隆丘阜潤同江海恩猶父母陳頵建興間為天門太守好學有文殊俗安之選腹心之吏為叅軍若有調發動静馳白故恒得宿辦陶侃表為梁州刺史王裕之天門太守山郡無事恣其遊適意甚樂之後為南平太守及桓𤣥擅晉裕之隠東山屢召不出時人稱王東山南北朝王鎮惡宋臨澧令喜論軍國大事雖騎射非長而從横善斷武帝召與語異焉謂諸佐曰鎮惡王猛孫所謂將門有將即以署前部胡僧祐梁天門太守有善政嘗諫元帝忤㫖下獄及侯景叛圍王僧辯於巴陵元帝乃引僧祐於獄拜將軍令援僧辯至赤沙亭㑹陸法和至乃與併軍大敗景將任約軍禽送江陵許懋梁天門太守政有能名凡諸禮儀多所刋正時號為經史笥唐張說神龍初由宰相出為岳州刺史說為文屬思精壯既謫岳州而詩益悽婉人謂得江山之助云李泌永泰間為澧州團練使治有風績更築新城澧人徳而歌之戎昱為頌曰上有清史君下有清江流崔瓘大厯中澧州刺史不為煩苛人便安之流亡還歸居二年増户數萬歌頌之聲聞於朝廷桞公綽元和間岳鄂觀察使時方討呉元濟公綽選兵六千屬李聴而厚撫兵士家故所向有功杜悰元和中澧州刺史治行為天下第一桞晟貞元中為翰林舍人三䟽雪呉通𤣥之謫死徳宗謂其執義不回改澧州别駕李建澧州刺史在郡不鞭人不名吏居職嵗餘人人自化李絢澧州刺史黄巢陷州絢死之判官黄甫鎮詣賊與之俱死宋陳恕通判澧州自唐季為節鎮吏多縁簿書乾没為奸恕盡摘發其弊郡中稱為强明郭逵知澧州時湖北溪蠻彭仕義叛逵得蠻親信為鄉導盡平諸隘破其所居桃花洞仕義棄城去衆悉降謝炎太宗時知華容縣有善政尤能文與盧􅍬齊名時謂之盧謝王旦知平江縣官舍舊有物怪憑戾前後令居多不寧旦將至前一夕守吏聞羣鬼嘯呼云相君至矣當避去自是遂絶無影響楊畋慶厯初知岳州湖南猺人刼掠州縣畋募才勇討擊遂平六洞徙知太平州嵗餘賊復肆乃授畋兵馬鈐轄賊聞其至皆逾嶺遁滕宗諒慶厯間知岳州建學興士踰年政通人和百廢俱興又重脩岳陽樓文章政事為郡人所傳頌唐介知平江縣民李氏多貲而吝吏有求不厭誣為殺人祭鬼岳守捕其家無少長楚掠不肯承屬介訊無他驗守怒白於朝遣御史徙獄其究與介同守以下得罪御史受賞介未嘗自言史方潭鼎澧縁邊巡檢澧州民訢下溪蠻侵其地方馳驛徃視復地四百餘里得所掠五百餘人又置澧口等四寨以扼賊衝就知邵州徙澧州張汝明徽宗時知岳州屬邑得古編鍾求上獻汝明曰天子命我以千里懼不能仰承徳意敢越職幸賞乎王端岳州司法㕘軍值荆湖饑饉有制攘刼者免死至明年五月論如律及期犯者愈衆端曰原法意以五月者為麥可食也荆湖無麥必須秋成宜以八月為限請於朝以活死者如端所議石光岳州通判有功徳及民後寓大雲山卒民慕之立祠至今春秋致祭楊寅知平江公正剛介以禮義訓齊其民未期民服其教令岳飛建炎初為荆湖南北制置使時楊么據洞庭為亂飛捕斬之黄琮建炎間鍾相陷澧州琮為州守與澧陽縣丞葉畬及其屬十餘人皆戰死朝廷褒贈之劉愚知安鄉縣邑逋賊萬計愚覈實數寛限期民不見吏而賦自足㑹嵗歉出常平米賑貸邑佐持不可愚曰冇罪不以相累又於范仲淹讀書地立祠興學士競知勸張忠恕知澧州能植立名節尤有撥繁剸劇之才李曾伯嘉熈間知岳州多善政暇日輙登樓賦詠嘗自為岳陽樓記人傳誦焉楊大異理宗時知澧州兼庾事時常平司逋負山積械繋追索大異與之約悉縱遣之負者如期畢輸吏無所容其奸元劉好禮澧州路總管有政績入為刑部尚書歐陽𤣥延祐初同知平江州處已儉約為政亷平汪澤民延祐間同知平江州時州民李氏以貲雄其弟死妻誓不他適兄利其財嗾族人誣婦以姦事獄成而澤民至知其枉為直之人皆驚服㑹朝廷徴江南包銀府檄澤民分辦民不擾而事集本朝郎子文洪武初知巴陵縣慈惠恭勤創立縣治及學宫置壇壝城池民不勞而事集既去民至今思慕之呉顯平江知縣處心正直理民有方嵗旱禱雨輙應事聞詔陞一官免部考楊謹行水樂初岳州知府愛惠小民作興士類不尚威嚴而政教自行杜述慈利知縣處已㢘介賦役均平徳化一方嘗入蠻谿採官木夷獠争來迎勞奉之如已親焉邵棠巴陵知縣尚㢘操勤政事均賦役深得民心秩滿闔邑懇請於朝俾復仕至今流風不泯周應規華容知縣㢘介守巳仁惠恤民振起士風盡除吏弊時營造方殷區畫科條民不告勞後董役武當山疾卒民哭之如失父母黄孟舟宣徳初慈利知縣㢘能謹慎愛民如子民戴之如父母及卒邑民立祠塑像春秋祀之胡福永定衛指揮使素負材勇永樂初從征交阯親擒賊首黎季犁有功朝廷嘉之瞿亨九谿衛指揮僉事正統中以征蒙顧及麓川功累遷指揮使後復征麓川偕其弟戰死朝廷遣官諭祭之陳介知臨湘縣興學勸農政績卓異在任六載嵗屢凶荒上䟽乞寛租所司不可介不為屈章數上詔蠲之民得聊生縣有舟丁六百戍江淮役重多逋亡乃奏免一百善政率多類此歴陞都御史省志王維正統中知巴陵縣尚節概勤政事鋤强植弱興利去害多所樹立百姓畏而愛之致仕卒於家民有涕泣徃賻其䘮者省志王士華正統中知華容縣築圩四十餘堤百五十呼王公堤墾田數萬頃九載績成水患乃息志省陶安正統間知平江縣善於撫字視民如子尤憐恤貧弱多所拯濟后卒於官士民哀慕不巳省志楊鐩正統間知華容縣奏築四十八垸縣始困於水垸脩而水殺民頼以生活省志李鏡岳州知府築湖堤通城陵磯墾隰為田引水灌溉其為民利甚溥洞庭君山為水冦淵藪鏡擒其渠魁餘黨解散政聲大振岳州民立祠祀之省志季恒成化中知安鄉縣縣民不習縷織恒教藝桑綿月課其功民利始興儲積救荒市地廣學復范文正義田善政皆可傳述者省志陳鉞成化中知華容縣除奸革弊鋤强植懦盗賊屏迹在任未及一年而士民安土樂業號稱善治以疾卒民塑像於城隍廟以祀之省志宋鑑成化中知平工縣果毅㢘介卓有風裁時流賊逼境率典史張澄縣吏王和等禦賊大戰於野援兵不至力盡死之事聞録其後邑人立廟報祀之省志楊貴成化中知平江縣興學勸農鑿池塘以資水利建橋梁以便行旅人甚徳之祀於名宦祠省志張瑄成化中知安鄉縣縣境多虎瑄禱於城隍曰令不職神宜殛之猛虎為災苛政所致百姓何罪耶自是虎屏迹人稱為張驅虎云省志胡㢘成化中知石門縣性嚴毅有才畧剖訟明决操履清慎勸民務農桑凡有興作不違其時鋤抑强梗革吏胥之奸欺者公庭寂然一邑安堵省志姜元澤𢎞治間任平江教諭寡黙宏博誨人無倦因殿廡隘陋捐俸建之士民翕然相應既落成卒於任士子哀慕不巳立祠肖像祀之省志熊一定知澧州性抗直政尚嚴厲吏民畏之新洲舊有牧地藩府欲專其利定婉辭啟聞卒弛其禁九谿土酋怙險殺害良民定承檄按問伏其辜任澧七年積榖累數萬斛嵗荒民頼以濟省志張舉正徳初治岳州府蒞毁淫祠聴訟一揆諸理豪勢無畏吏胥一毫不敢横索於人有神明太守之稱比卒郡人思之並祀於李公祠省志麥成正徳中任安鄉縣典史值流賊掠鼎江口成父子集民兵徃禦之比戰馬躓賊叢槊刺之猶徒歩手刃數人遂遇害子亦死焉省志李克嗣嘉靖初岳州通判擢知隨州嚴明㢘介造士愛民惠政甚著省志韓士英嘉靖初知岳州府温雅有度政尚明恕重創郡堂脩葺諸廢墜咸不擾於民省志流寓韓注仕唐為諫議貞元間以言事忤㫖貶岳州適意遊君山棄人間事杜甫以詩寄之有濯足洞庭望八荒之句趙彦若宋宗室為翰林學士紹聖初章惇當國惡元祐人以彦若預脩神宗實録謫居澧州劉寳宋岳飛將嘗從破楊么有功及飛遇害寳遂散其部曲隠居華容東山卒葬焉有墓存曩秉彛元蒙古人一名加台寓居澧州受學於瞿炳中湖廣鄉試第一舉進士授蘇州録事官至河南省㕘政王申子本卭峽人號秋山元季隠居慈利註大易輯説春秋類傳人物周白善春秋時楚白公勝之族為楚將家澧陽白公欲亂國召之善曰從子而亂其國則不義於君背子而發其私則不仁於族遂棄其禄築圃灌園以終其身楚人因名其圃曰白善將軍藥圃其地在今城東藥圃寺申鳴春秋楚人家澧陽以孝聞王欲相之辭不受父曰使汝有禄於國吾無憂矣鳴遂入相居三年白公勝為亂將徃死之父止之不可白公刼其父鳴曰始吾父之孝子也今吾君之忠臣也何以得全身援桴鼓之遂殺白公其父亦死王欲賞之鳴曰食禄避難非忠臣也定國殺父非孝子也名不可兩立遂自殺晉周該慈利人以義勇稱從父級宜郡内史王敦為逆級遣該使湘洲約醮王丞甘卓同奬王室為敦所執訊掠之至死不言級由是得免於難車𦙍南平人父育為本郡功曹𦙍少時篤學不倦家貧不常得油夏月囊螢照書及長甚有鄉譽桓温在荆州引為主簿太和中領國子博士遷吏部尚書王國寳諂㑹稽王道子諷入坐奏以道子為丞相加殊禮𦙍言不可忤道子意乃稱疾不出唐李羣玊澧陽人能詩大中間裴休入相薦之云羣玉放懐丘壑吟詠性情叱妍詞於麗則動清律於風騷冥鴻不歸羽翰自逸霧豹逺跡文采愈竒詔授𢎞文館校書郎有詩集行世段洪古安鄉人剛削寡合不事産業人或交之度非義輙去以故五十不能禄後卒於桂之逆旅歸葬黄山桞宗元為誌其墓并祭之以文宋蘇庠澧州人以詩鳴蘇軾一見比之唐李白自是清名籍甚時當國者誘以美官庠笑而謝之紹聖初徐俯在樞筦力薦於朝不起後徙居丹陽秦檜欲召見庠曰吾老矣不忍販賣雲壑卒年八十餘號後湖居士有文集行世黄誥平江人熈寧三年進士為長沙簿章惇開梅山請增畝税誥力言罷之後知益陽縣有政聲居䘮廬墓芝生塋祠凡百餘本事聞哲宗賜帛五十匹後知歙建州移湖南提刑官至太府卿羅孝芬平江人宣和間居側有大柿樹雷折之火燎其文成羅狀元字下有三點人莫能測明年孝芬舉甲科第三人始悟其兆云後擢吏部郎中靖康初致仕歸建畫錦橋秀野亭當世榮之李平西平江人伯父綱累官輕車都尉父純皇祐中進士有賢名平西元符中進士知澧州專務徳化集民訓以孝弟勸事農桑化洽州邑累遷樞密院承㫖金人侵汴平西與宰相李綱奏守禦䇿金再南侵又乞詔諸道勤王兵决䇿一戰時宰相何㮚不能用元劉琦臨湘人生二嵗母遭亂陷於兵父必逹不復娶琦稍長思其母不置及冠請於父徃求之徧歴河南北淮東西數嵗不得後得於貴池迎以歸養後父母相繼没終䘮猶蔬食事聞旌其門曰孝義熊義山安鄉人累官至萬户至正間倪文俊兵至執縣尹張繼和義山保障黄山一縣獲安越二年文俊襲執之逼使速降義山罵不絶口文俊大怒剖其腹而死本朝張庭蘭澧州人洪武乙丑進士授審刑司詳議陞大理少卿進左都御史戴本昇澧州人洪武間任兵科給事中後陞廣西右㕘議蕭忠慈利人洪武間由國子生授山東左布政使左遷髙密縣典史永樂初復陞江西僉事調廣西方庭玉巴陵人永樂乙未進士授工部主事遷郎中正統中陞浙江右布政使致仕武毅華容人累官都督僉事為㕘將守廣西智勇過人馭下嚴明多樹戰功為蠻夷所服董廷圭華容人景泰辛未進士拜監察御史彈劾不避累官山東副使歴任中外家無寸土比歿殯殮皆鄉人􅐠助省志鄧廷瓚景泰甲戌進士授知縣厯貴程番知府諸夷感化累遷布政使時貴州黑苗叛乃擢為都御史徃平之斬首六千餘級生擒二千餘人進左都御史總督兩廣卒於任贈太子少保謚襄敏平生雅量宏致罔測淵奥厥中明炳人亦鮮及省志劉大夏華容人天順中進士改翰林院庶吉士授兵部主事累官本部尚書性坦夷謙厚慈仁清白而所自植立竪不可易歴中外四十餘年學士大夫無論識不識皆仰之若山嶽然卒謚忠宣省志黎淳華容人天順丁丑進士第一初為翰林院脩撰歴官春坊諭徳少詹事陞吏部侍郎以南京禮部尚書致仕淳性耿介剛毅寡鮮諧合重倫紀尚節儉其所自樹植即齒隠勿媿云二子俱進士居尊官若於家訓省志馬安石門人父䘮膝行負土成墳廬墓三年有司以聞旌表其門省志程萬里華容人天順丁丑進士成化初授吏科給事中封駁得體嘗上䟽言用賢圖治䟽通人才慎選風憲皆切時政累官户部右侍郎致仕家居嘯歌山澤托志恬曠所著冇閑情集省志桞應辰巴陵人進士累官副都御史忤逆瑾摭以他事免歸瑾敗復職致仕省志謝綱巴陵人成化己丑進士知髙安縣有氓素强梗綱諭以利害革心為善徴拜監察御史清戌四川河南所至咸著風采擢山東按察副使所著有素軒文集省志王儼華容人成化己丑進士累官户部右侍郎所至以廉能稱功績茂著子官之領鄉薦省志方昇臨湘人鄉薦第一舉進士拜御史所按治處咸著清直聲時稱真御史尋遷江西按察副使卒於官篋中惟衣服二三襲士大夫賢恤之省志嚴永濬華容人進士授户部主事出守西安府秦俗變以興讓撫按藩臬庭無宿牒以浙江㕘政卒學醇節峻發為忠諍義形於色即貴要人勿恤也所著有兩山集省志卜馬祥岳州人成化中任指揮同知流賊掠洞庭祥奮身督戰死之省志黄昭道平江人𢎞治中進士知長山縣嵗蝗禱神雨雹交作蝗盡死人異焉拜監察御史厯江西僉事補獲逆濠黨惡訊治如法遷雲南㕘政諭木邦諸夷以利害咸襲明懽騰誅普安賊有功轉布政使辭疾歸惟誠坦凝定克濟大事盖今之古人云省志徐貴平江人由舉人授四川潼川州同知力甘清苦為政嚴明後以剛直忤臺官謝政歸家居灌園種蔬窮約如寒士嚴飭周防不失尺寸鄉里目為古君子云省志顔頥夀巴陵人𢎞治初進士授知縣拜監察御史赫然有激揚聲歴光禄大理卿進都御史累官刑部尚書省志李如圭澧州人𢎞治中進士拜監察御史出按江西激揚有聲歴陞副都御史廵撫延綏時北軍屢至如圭豫防周悉入為大理卿尋致仕起為工部侍郎管理河道進户部尚書省志桞尚義巴陵人𢎞治己未進士授知縣徴拜監察御史累陟僉都御史以忤逆瑾除名瑾敗復起副使仕至㕘政省志周溆九谿衛人進士授大理評事諫武廟南巡謫縣丞起知韶州府累官工部尚書督理沙河大工所至以治績見稱㑹災異自陳致仕歸省志孫繼芳華容人正徳辛未進士授主事陞兵部員外諫武廟南巡廷笞不死改職方歴雲提學副使致仕歸性慷慨激昻當其氣所欲言雖萬乘勿畏也省志周廷用華容人正徳辛未進士授知縣擢御史出按貴州獠帖冦附歴四川兵備副使有征芒部功進江西按察使以他事致政去平生不喜遷合濶視放言畧弗旁顧而㢘介之節終始弗渝所著有八厓集省志髙鵬澧州人器識超異少聘周偉女病癱瘓周恐艱於櫛沐議辭婚不可竟委禽焉相與無間言姻黨賢之後舉進士以戚畹外補知南通州㢘慎有為境内蝗旱火叠興卒不為害人以為徳孚三異焉尋調覇州以禁奸歛怨權璫誣逮降雲南寧州同知陞杭州府通判卒省志列女韓氏女巴陵人宋魏國公琦之裔名希孟少明慧知讀書開慶初元兵至岳陽女年十八為卒所掠將挾以獻其主將女知必不免竟赴水死越三日得其屍練裙帶中有詩曰我質本瑚璉宗廟供蘋蘩一朝嬰禍難失身戎馬間寧當血刃死不作袵席寛漢上有王猛江南無謝安長號赴洪流激烈摧心肝藍氏黎受三妻巴陵人適黎未幾夫卒無子依弟榮誓不再嫁孀居五十年洪武中旌省志程氏王谷樹妻澧人夫病篤刲股啖之夫遺命適人程剪髪誓無他終身足不渝閾洪武中旌省志凌氏呉伏顯妻平江人永樂中以節旌省志易氏方志通妻巴陵人年二十而寡力貧養姑姑疾篤易氏籲天求以身代病瘥奉養惟謹孀居四十餘年成化中旌省志黎氏毛瑢妻華容人適毛甫二載夫卒誓無他志辛勤機杼以為養姑費教子向學規度嶄然成化中旌省志張氏陳學明妻巴陵人年二十而寡無子或勸其改節張斷義不可廼以兄之子為後辛勤撫育居孀餘五十年成化中旌省志方氏梅紀妻臨湘人年二十三而寡杜門却掃矢志不渝成化中旌省志黄氏余勝妻臨湘人年二十二而寡撫孤守節始終如一成化中旌省志李氏謝紀妻巴陵人年二十四夫亡日夜慟哭不輟屢死復甦遺腹生子梅鞠育成立皓守一節成化中旌省志陳氏朱宣妻岳州衛人宣任指揮死於陣陳年二十二孀居四十餘年𢎞治中旌省志周氏王昇妻岳州衛人昇任千户死於兵周哀之幾殞而甦杜門不出𢎞治中旌省志徐氏李信妻岳州衛人年十七適信生一子英甫三嵗信調征靖州歿於戍所徐年二十四清苦自勵孝養其姑姑卒葬祭不違禮𢎞治中旌省志陳氏王萬爵妻平江人年二十餘夫亡無子陳勵節自守孀居四十餘年嘉靖間事聞旌表省志劉氏缺玘妻臨湘人年二十一夫亡劉矢志不再醮遺子植撫之稍長遣令就學學成舉於鄉嘉靖三十六年旌省志仙釋吕洞賔河東人唐禮部侍郎渭之孫兩舉進士不第去遊盧山遇異人得長生訣多遊湘潭鄂岳間嘗留題岳陽樓上云朝遊北海暮蒼梧柚有青蛇膽氣麤三入岳陽人不識朗吟飛過洞庭湖宋時嘗來謁滕宗諒自稱華州回道士宗諒密令􅀞工傳其像口占以贈之曰華州回道士來到岳陽城别我遊何處秋空一劍横回憮然大笑而别湘中老人舊志載唐吕雲卿嘗遇於君山側索酒數行老人歌曰湘中老人讀黄老手援紫虆坐碧草春至不知湖水深日暮忘却巴陵道蘇軾云此詩詞殆是李謫仙軰老人盖真遁世者也今考唐詩此篇乃髙駢所作未知何據普實夔府人㓜頴悟必跏趺不茹葷九嵗遇僧話即如宿契遂出俗從通禪師居天寧寺擕鍚遍歴禪席嘆曰不超三界非丈夫也自此節食毁形謁石鍾賢禪師隠楊板山習定一紀出遊衡岳憇圓通寺升座説法有天花飛墜白鶴翔空長沙大旱迎師祈之説偈而徃大雨隨至一日告門人曰辛未嵗正月朔日吾當去及期端化而去明一統志卷六十二
