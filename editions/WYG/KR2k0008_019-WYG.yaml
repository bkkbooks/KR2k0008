力保障李光進代州刺史破賊有功弟光顔亦刺是州皆以御史大夫領事軍中俱呼為大夫而以大小别之裴懐古并州大都督長史吏民懐之後以召去再為并州百姓皆扶老携稚出迎魏谷倚太原主簿與晉陽尉富嘉謨吳少㣲友善皆以文辭著名時穪北京三傑宋李重誨太宗時為忻州都廵檢北兵鎧冦邉重誨邀戰敗之獲羊馬甲甚衆賜詔褒美陳堯佐天禧中知并州毎汾水暴漲民輙憂撓堯佐為築堤植柳數萬本作柳溪民頼其利宋摶真宗時河東轉運使上言大通監治鐵盈積可諸州軍數十年鼔鑄願罷採以紓民時邉事未息摶經制漕運以幹洽穪劉綜景德中知并州以政績聞州民乞留優詔嘉奨梁適夏人盗耕屈野河西田累年乃以適為定國軍節度使知并州至則悉復侵地六百里王嗣宗咸平中知并州境内有卧龍王廟每窮冬闔境致祭風雪老㓜踣於道嗣宗亟毁之李若谷知并州始建學校出私錢助貧民嫁娶時州多盗若谷籍累犯者以三人互保再犯則并坐悛者削去藉名張齊賢雍熈中知代州破契丹俘獲甚衆龐籍慶歴中知并州長於吏事治民有惠爱時契丹盗耕河西地籍戒邉民無與遼人市易杜衍知并州為治謹宻不以威刑督吏而吏民憚其清整張伯玉慶歴中知太谷縣莅民勤政廣興水利邑人德之為立祠陽村明福寺文彦􅀶知榆次縣政尚循良又授河東轉運使穪職改河東節度使韓𤦺知并州罷前帥所興不急之役募弓箭手墾荒田至萬頃變河東火𦵏之俗鄭戬仁宗時知并州契丹與趙元昊交兵邉奏互上獨戬不以聞詔遣使問故戬對敵自相攻中國不足憂明鎬知并州遇事不苟為而安静有體大廵邉以備賊時邉任多紈袴子弟鎬取尤不職者杖之疲軟者皆自觧去張孜仁宗時并代副捴管河東更鐵錢法人情疑貳兵相率叩府欲訴幾為亂孜䇿馬往諭之皆散還營張汝明通判寕化軍地界遼文移數往来汝明名觸其諱遼以檄暴於朝安撫使問故衆欲委罪於吏汝明曰詭辭欺君吾不為也遂坐責歐陽脩河東制置使奏募民耕忻代岢嵐等處廢田及以河東賦歛過重奏罷十數事吕誨知大同監兼交城令究心民事而於𣙜鹽亦不廢薛映知并州治尚嚴明吏不能欺每五鼔冠帶黎明决事雖寒暑無一日異司馬旦知祁縣天大旱人乏食郡盗剽奪富家巨室至以兵自備旦召富者開以禍福於是爭出粟减直以糶飢者獲濟盗患亦弭吕大忠知代州時遼使設次於本地輙據主位大忠移次於長城北遼使竟屈孫覽知太原府夏人據横山並河為塞覽下令具糗粮嚴兵械俟夏人入冦撃敗之遂城葭蘆而還孫永知太原府忻代産鹽苦􅁖不堪食轉運使欲以盗販罪罪兵吏永上言以􅁖鹽累防兵非計詔弛其禁范純仁元祐初判太原府其境地狹民惜地不葬純仁遣属収葬無主燼骨及檄一路葬以數萬計唐介知太原府夏人數擾邉介戒邉将無生事移諭以利害遂不敢動吕公弼知太原府時韓絳宣撫秦晉将取囉兀城令河東發兵趣神堂新路公弼慮必設伏乃路由永和援兵果遇伏詔褒之韓絳與弟縝相繼為并州帥有恩惠作杕華堂劉庠知太原府請復憲州募民子弟剽銳工技擊者籍為勇敢倣漢謫戍法貰流以下罪徙實河外王素知太原府汾河大溢素曰若壊平晉遂灌州城矣亟命具舟楫築堤以捍之一夕水驟至人頼以安郭永知太谷縣有善政太原帥每宴饗歛取諸縣以給永以書抵幕府府遂不敢迫縣有潭出雲雨嵗旱巫乗此譁民永杖巫暴日中雨立至縣人刻石紀其異唐恪知榆次縣豪子萃逋庇姦不輸公賦前後莫敢詰恪以理善曉之悟而自誨折節為長者何灌火山軍廵檢賈胡疃有泉遼人常越境而汲灌遏其來忿而舉兵灌迎髙射之發輙中或着崖石皆沒鏃敵驚以為神歛去後又知寕化軍治聲著聞劉舜卿知代州遼遣諜盗西闗鎻舜卿宻易舊鐍而大之數日敵以鎻来歸舜卿曰吾未嘗亡鎻也引視納之不能受遂慚去誅諜者史抗宣和末為代州沿邉安撫副使金人圍代急抗告其二子稽古稽哲曰吾将死事汝輩亦勿負國城破父子力戰死李翼宣和末為代州西路廵檢使屯崞縣金人取代来論降翼射却之率士堅守城破摶被執怒罵不屈與縣令李聳丞王唐臣尉劉子英同死之張忠輔宣和末為将同崔申折可與守崞縣金人来攻忠輔固守拒敵中有二心設伏斬忠輔首以畀金人可與以不屈見殺徐徽言知火山軍徙石州金人圍太原自石隰以北命令不通者累月徽言以三千人渡河一戰破之金趙秉文平定州刺史前政苛於用刑而盗愈繁秉文政尚寛簡旬月盗屏蹟民飢出祿以賑活之楊邦基天眷初交城令太原尹徒單恭貪汙不法託名鑄金佛命属縣輸金邦基獨不與㢘介為河東第一元潭澄交城令有文谷水溉田為郭師所專澄令决水均其利於民豪民有持吏短長為奸者察得其主名皆以法治之李德輝太原路捴管崇學校表孝節勸耕桑立社倉一權度凡可以阜民者無不為之嘉禾瑞麥六出其境劉福平定元帥府監軍衆服其恩信子熈載有學行父子相繼者二十餘年齊元彛知興州盡心勞來流移者復業郡人立碑以紀其德楊克恭知興州剖劇除弊賦均訟簡既去人思慕之本朝尹暹洪武初興縣知縣莅政廉能民懐其惠乃立善政碑以頌之考績陞平陽同知鍾友諒洪武初忻州知州興學撫民有循良聲自州署至驛傳城郭皆一新之公私不甚費而事畢集代去民泣涕不忍舍吳原庸洪武初夀陽知縣當兵荒後招集流散教之耕作民以安業廼建縣署毁淫祠立學宫以及城隍廟壇壝驛舖皆備民懐慕之黄福洪武間為清源縣主簿孜孜愛民惟恐不被其澤一邑之人無不感戴宋禮洪武中為按察司僉事在任持法嚴明人莫敢犯李昇洪武中五臺典史時秋霜殺禾昇奏乞賑濟布政司委官劾實文致之罪昇曰為民獲罪吾無憾矣耆老民庻訴于朝䝉賞勞復職吕震洪武中為按察司僉事明敏有為聲譽大振王彰洪武末為布政司左叅政廉直無私官吏畏服王綱宣德中為右布政使廉正自守處事安詳吏民懷之劉英繁峙知縣廉正愛民代去而民不忘周禮正統初祁縣丞學問該􅀶以徳化民省志于謙正統間以兵部侍郎廵撫山西撫循有道民思慕之省志鮑時正統中為布政司右叅議政餘以春秋之學淑人士習丕變省志張智正統中五臺知縣在任九年政多美績省志滕淵正統間為嵐縣典史有廉能聲嘗戍偏頭闗禦外兵草宿枕戈與士卒同滿去唯携琴書而已省志楊璿景㤗初為布政司右叅政以治行穪省志梁昱景㤗間平定知州以文學政事並穪卒于官士民哀悼不已省志范瑄景㤗末文水知縣有惠政卒于官民思不忘省志王𦙍天順初知祁縣牧民有方既去民甚思之省志胡謐成化初山西按察僉事提督學校以身率教甄别精明䝉詔旌異省志雷復成化中廵撫山西嘗督師斬獲敵酋蒙勅奨諭省志流寓孟敏漢鉅鹿人客居太原荷甑堕地不顧而去郭林宗見而問其意對曰甑已破矣視之何益林宗異之因勸令㳺學十年知名三公俱辟並不屈滕茂實宋杭州人靖康初以工部侍郎使金為所留時其兄綯通判代州已先降尼瑪哈遷茂實代州茂實聞欽宗至郊即自為哀詞具冠幘迎謁拜伏號泣請從舊主俱行金人不許憂憤而卒有墓在州東六里王無咎磁州人徙樂平金昭義節度副使金亡無咎義不仕元人物周狐突晉大夫懐公立時突之子毛及偃從重耳在秦公執突曰子來則免對曰子之能仕父教之忠古之制也今臣之子名在重耳若又召之教之貳也滛刑以逞誰則無罪臣聞命矣乃就死狐偃突子晉文公為公子時出亡在外偃與兄毛從之十九年比文公定王室宣信諸侯而覇天下大抵多偃謀也公孫杵臼晉人為趙朔客屠岸賈誅朔杵臼有謂朔友程嬰曰胡不死嬰曰朔婦遺腹若男吾奉之故不死也及生男賈聞而索之杵臼曰立孤與死孰難嬰曰立孤難耳杵臼曰我為其易者乃取他人兒匿山中使嬰謬呼曰與我千金吾告趙氏孤處賈諸将随嬰攻杵臼杵臼謬曰小人哉程嬰縱不能立孤而忍賣之乎遂殺杵臼及孤兒其趙氏真孤乃在程嬰處也程嬰晉人既謬殺趙朔孤兒屠岸賈不疑乃抱趙氏真孤匿山中居十五年韓厥言於晉景公復立趙氏後是為趙武即孤兒也遂攻屠岸賈滅之武既冠嬰曰昔下宫之難我非不能死欲存趙後今宜下報宣孟杵臼遂自殺武啼泣齊衰三年奉祀不絶漢衞綰代之大陵人初事文帝為中郎将及景帝立以綰㢘實無他膓拜河間王太傅累遷御史大夫至丞相常惠太原人武帝時随蘇武使匈奴拘留十餘年始還昭帝嘉其勤勞拜光祿大夫卒謚壮武侯郇越太原人明經飭行平帝時州郡舉孝㢘茂才數病去官越散其先人貲千餘萬分施九族州里志節甚髙顯名於世周黨廣武人家産千金散與宗族㳺學長安建武初被徵三聘乃肯就車陛見帝廷伏而不謁自陳願守所志詔賜帛四十匹寵之遂隱居黽池王霸廣武人王莽簒位遂棄冠帯絶交宦光武時徵到拜尚書穪名不穪臣尋以疾歸隱居守志茅屋蓬戸連徵不起温序太原人建武中徵為侍御史遷䕶羗校尉行部至襄武為隗囂别将所拘刼諭使從已序曰分當效死義不貪生遂以口銜鬚伏劔而死王允太原祁人世仕州郡為冠盖同郡郭林宗見而竒之曰王生一日千里王佐才也允少好大節有志立功累官豫州刺史討破黄巾後拜司徒王烈太原人少師陳寔以孝義穪鄉里爭訟者将質于烈或至途或望廬而還其德感人如此三國郭淮陽曲人舉孝㢘仕魏屢立戰功累遷征西将軍都督雍凉諸軍事終車騎将軍孫資太原人曹操為司空辟資不應後荀或見而嘆曰北州賢智零落今復見孫彦龍乎表為尚書郎仕至中書令彦龍資字也王淩太原祁人為太尉封南鄉侯忠於魏室而死王昶晉陽人世父柔北中郎将父澤代郡太守昶仕魏累官兖州刺史遷司空賜爵闗内侯著兵書及治論二十餘篇云温恢祁人父恕守􅃰郡卒恢年十五送䘮還鄉盡散私財施宗族後舉孝㢘魏文帝時為侍中出為魏郡太守子六人恭生良儉譲克並知名世號六龍晉王沉晉陽人父機魏太守沉少孤飬於從叔昶事昶如父奉祖母寡嫂以孝義穪好書善属文以佐命勲累遷尚書令散騎常侍封􅀶陵郡公郭𤦺晉陽人少方直善五行作天文志五行傳註榖梁京氏易百卷趙王倫簒位欲用𤦺𤦺曰我已為武帝吏豈容復為今世吏終身隱居郭奕陽曲人少負重名山濤穪其髙簡有雅量初為野王令太康中為尚書劉殷新興人曽祖母王氏盛冬思蓳食殷方九嵗往澤中慟哭蓳忽生得斛餘而歸又嘗夢人謂西籬下有粟掘之果得粟十五鍾鄉人異之王渾昶子累官至司徒弟湛㓜有識度簡言語父䘮居墓次服闋闔門守静不交當世仕至汝南内史濟少有逸才氣盖一時性好弓馬尤善易及老荘文詞温羡恢孫少聰敏惠帝時拜豫州刺史累遷吏部尚書後為冀州刺史遷開府領司徒温嶠羡從子父憺河東太守嶠􅀶學能文風儀秀整為劉琨右司馬奉表江東元帝器之王導等並與親善後除散騎侍郎累遷開府儀同三司孫楚太原中都縣人才藻卓絶爽邁不羣少欲隱居謂王濟曰吾欲潄石枕流濟曰流非可枕石非可潄楚曰枕流欲洗其耳漱石欲礪其齒年四十餘始叅鎮東軍事孫綽楚孫兄盛􅀶學善言名理著醫卜及易象妙於見形論又著魏氏春秋晉陽秋咸穪良史官至秘書監加給事中綽博學能文後居㑹稽㳺放山水十餘年作遂初賦及天台賦詞甚工王承晉陽人清虚寡欲弱冠知名太尉王衍敬異之以比南陽樂廣自昶至承世有髙名論者以為祖不及孫孫不如父王述承子安貧守道嘗見司徒王導導每發言一坐賛美述正色曰人非堯舜安得每事盡善導改容謝之累官散騎常侍尚書令子坦之弱冠負時名後同謝安輔朝政累官中書令王濛晉陽人少不為鄉曲所齒晚節勵行有美譽子藴仕至散騎常侍藴二子恭有節􅋵自負才地恒有宰相之望爽仕至寕朔将軍莫含繁峙人劉琨為并州辟含從事穆帝聞其才求含於琨遂入叅軍國大謀後封闗中侯子顕為左常侍顕之子題後魏時為大将以功封東安侯弟雲好學善騎射官至執金吾進封安定公觧叔謙鴈門人母有疾夜禱聞空中語云須丁公藤為酒便瘥叔謙遍訪至宜都郡山遇老翁伐木問之曰此丁公藤叔謙求歸漬酒毋飲之疾瘥王懿太原人年十七及兄叡同起義兵與慕容垂戰敗太元未徙居彭城後叡以襲桓元遇害懿仕宋累官徐州刺史三臨徐州威德著於彭城卒謚曰桓周續之鴈門人徙豫章太守范寗於郡立學招集生徒續之年十二詣寗受業居學數年通五經五緯號曰十經名冠同門既而入廬山與劉遺民陶淵明俱不應徵命謂之尋陽三隱南北朝王元謨太原祁縣人仕宋為彭城太守累官至開府儀同三司遷南豫州刺史加都督郭祚魏太原晉陽人少孤貧姿貌不偉凡人莫之識有女巫相祚後當貴祚渉經史尺牘文章並穪於世後果為吏部尚書唐邕晉陽人明敏有才幹魏神武時擢文襄大将軍督䕶累遷尚書令後授上開府儀同大将軍王僧辯祁縣人學渉該􅀶尤明左氏春秋噐宇肅然雖射不穿扎而有凌雲氣仕梁為江州刺史後平侯景之亂加侍中尚書令累遷至大司馬王思政祁縣人漢司徒允之後容貎魁梧有籌䇿仕北齊為都官尚書郎在荆州置三十城以當衝要所薦舉咸得其才王軌太原人亦司徙允之後性質直事周累官内史下大夫處以腹心之任以功進位柱國拜徐州捴管威振敵境陳人甚憚之王茂太原人好讀兵書性寛厚居家未嘗有惰容梁武帝以王佐許之事無大小皆詢焉累官至江州刺史在州不取奉獄無滯囚居處被服同於儒者卒贈太尉謚忠烈隋王韶太原人㓜方雅頗好竒節在周以軍功封晉陽縣公隋初進爵頃城郡公晉王廣鎮并州除行臺右僕射韶性剛直王嘗穿池起三山韶自鎻而諫王謝而罷之髙祖嘉歎賜金百兩郭雋太原人家門雍睦七葉共居犬豕同乳烏鵲通巢時人以為義感之應州縣上其事髙祖遣昌平公宇文㢸詣其家勞問之唐張道源并州祁人年十四居父䘮盡孝縣令郭湛署所居曰至孝里隋末政亂辭監察御史歸後仕唐歴秋官尚書唐儉邕孫父鍳與髙祖善儉爽邁少繩檢然事親以孝聞佐太宗定天下為天䇿府長史後累官禮部尚書封莒國公許世緒并州人與弟洛仁俱從起晉陽有功世緒累官蔡州刺史封真定郡公洛仁累官冠軍大将軍温大雅祁縣人師文中子髙祖時與竇威等定儀典拜黄門侍郎太宗朝封黎國公弟彦􅀶累官尚書左僕射既掌机務謝賔客不通進見必陳政事利害得失累官中書侍郎封清河郡公王珪祁縣人太宗時為諫議大夫忠直敢言嘗令品藻當代人物珪既歴舉之末曰激濁揚清臣於數子亦有一長當時以為確論王方翼并州人早孤哀毀時號孝童髙宗時累官肅州刺史烽邏精明河西蝗獨不至方翼境後遷夏州都督為耦耕法力省而見功多百姓順頼狄仁傑太原人舉明經嘗赴并州法曹登太行山見白雲孤飛曰吾親舍其下同府叅軍鄭崇質母老且病當使絶域仁傑請代行長史藺仁基義之曰斗南一人而已後以地官侍郎同平章事委曲請武后還政中宗時封梁國公茹汝升代州人為僕射嘗承命治代郡民獲安業後里人慕其德立廟祀之武平一太原人通春秋工文詞武后時畏禍隱嵩山屢詔不應中宗復位拜脩文館學士李憕文水人父希倩神龍初監察御史憕舉明經天寳初守清河有美政民為立祠後尹京兆又為中都留守安祿山䧟東京憕與子十人皆遇害王縉太原人少好學兄維俱以名聞舉草澤文章清麗科安祿山亂擢太原少尹佐李光弼以功加憲部侍郎俄拜黄門侍郎同平章事領河東節度後知政事王翃晉陽人擢才兼文武科累遷容管經畧使討定夷僚卒贈尚書僕射謚曰肅兄翊性謙柔歴山南東道節度使代宗目為純臣卒贈戸部尚書謚忠惠武元衡平一孫事德宗為御史中丞嘗對延英帝目送之曰真宰相噐元和中拜相時淮蔡用兵悉以機政委之從弟儒衡氣韻髙雅為諫議大夫劾奏皇甫鎛剥下媚上後為戸部侍郎王緯太原人為長安尉累官御史大夫時裴延齡希寵以諸道負錢為羡錢緯奏此皆諸州經費大忤其意改檢校工部尚書王鍔太原人曹王臯節制江西表為江州刺史鍔小心善刺軍中情偽臯推以腹心德宗時累官尚書左僕射為河東節度使遷同平章事王仲舒并州祁人貞元中賢良方正登第為左拾遺德宗欲相裴延齡仲舒與陽城交章言不可歴婺蘇二州刺史穆宗重其文召為中書舍人尋除江西觀察使有興浮屠祠屋者驅出於境王彦威太原人舉明經甲科補太常檢討官嘗采隋唐典禮沿革條次類分號元和新禮上之累遷宏文舘學士温造大雅五世孫父佶安祿山亂往見平原太守顔真卿助為守計造姿表魁傑性嗜詩書隱東都烏重𦙍奏致幕下遷殿中侍御史彈劾夏州節度使李祐違詔進馬祐曰今日膽落於温御史矣王播太原人舉賢良方正補􅉦厔尉善治獄事累遷京兆尹穆宗立以刑部尚書拜相弟起性孝友讀書一經目弗忘元和中以殿中侍御史兼集賢殿學士數上䟽諫畋㳺累擢同平章事狄兼謩仁傑族曽孫剛正有祖風文宗朝為御史中丞帝曰御史是朝廷紀綱一臺正則朝廷治官至尚書左丞王鐸播弟炎之子炎仕至太常􅀶士鐸㑹昌初進士累官同平章事從僖宗幸蜀以經濟自任尋為田令孜所搆罷為檢校司徒卒遇害五代張憲晉陽人沉静寡欲少好學能鼔琴唐荘宗知其能文以為天雄軍節度使掌書記累遷刑部侍郎後為太原尹北京留守史建塘鴈門人仕晉常為先鋒破敵有功累官至檢校左僕射歴貝相二州刺史子匡翰好讀書沉毅有謀接下有禮仕至義成軍節度使鄭仁誨晉陽人初事唐将陳紹光紹光醉怒欲殺之仁誨植立不動紹光曰汝有器量非吾所及也周太祖每事有疑即從質問仁誨謙謹好禮不自矜伐為士大夫所穪世宗攻河東仁誨留守東都扈彦珂代州鴈門人初仕晉為河東節度漢初擢宣徽南院使嘗賛周祖討平河中加同平章事以太子太師致仕薛懐讓太原人勇敢善戰鬬仕漢擢安國軍節度周封把國公懐譲好畜馬駞及罷節鎮猶有馬百匹駞三十頭傾資以給芻粟朝夕閱視為娛韓通并州太原人謹厚有勇力周世宗時累官侍衞親軍副都指揮使宋太祖北征至陳橋為諸将推戴通聞變惶遽而歸謀率兵禦之為軍校王彦昇所害妻子皆死太祖怒彦昇專殺贈通中書令以禮収葬李筠太原人善騎射仕周屢立戰功為昭義軍節度使恭帝即位加檢校太尉宋太祖遣使諭以受禪筠即欲拒命及延使者置酒遽索周祖畫像懸壁涕泣不已於是拒命為太祖所攻城䧟赴火死李重進周太祖之甥也生於太原累官歸德軍節度恭帝即位加檢校太尉改淮南道節度宋太祖受禪加重進中書令重進治城繥兵以拒命太祖攻之城䧟舉族自焚死宋藥元福晉陽人有膽氣善騎射晉天福中擊敗契丹以功累加至檢校太尉宋初加檢校太師卒贈侍中元福雖老筯力不衰人言其尚堪領兵必大喜時稱驍将李萬超太原人㓜孤貧負販養母石晉時從杜重威拒契丹流矢貫手㧞矢復戰神色自若屢立功授洺州團練使宋初遷左驍衞大将軍武行德榆次人材貎竒偉仕晉累官指揮使為契丹所獲偽請自效遂走據河陽漢初授河陽三城節度使從周世宗討淮南以功封宋國公宋初改封魏國公侯章榆次人五代晉時為指揮使契丹入汴與王晏等斬其将後歸漢擢鎮國軍節度周封申國公後世宗北征再為武勝軍節度宋初封楚國公張從恩太原縣人初仕晉由外戚擢金吾衞将軍以禦契丹加同平章事契丹入汴從恩歸漢為右衞上将軍周封褒國公宋改封許國公李洪信晉陽人少善騎射初仕漢累官侍衞馬軍都指揮使乾祐中以郡小用事求觧軍職周加同平章事宋擢左驍衛上将軍致仕弟洪義仕漢周官至檢校太師宋加中書令劉孝忠太原人母病經三年孝忠割股肉㫁左乳以食之母病心痛劇又然火掌中代母受痛母尋愈及母卒為傭富家得錢以葬富家養為己子後養父兩目失明孝忠䑛之復能視太祖親征太原召見慰諭郭從義太原人性厚有謀畧善飛白書初仕漢周以功累官至檢校太師宋加守中書令出為河中尹以太子太師致仕曽孫承祐歴知數州累官至殿前都虞侯石曦太原縣人仕晉為左衛将軍宋初從征太原及南唐皆有功歴知雄覇鎮原四川遷至右龍武軍大将軍王貴太原縣人累官都指揮使太宗時從潘美北征頗立戰功及從楊業為遼兵所圍親射殺數十人矢盡張空弮又擊殺數人遂遇害時年已七十三矣李進卿晉陽人少驍勇從周世宗戰髙平累官都虞候宋初以平蜀功累遷歩軍都虞侯終静江軍節度子延渥積功遷右領軍衞大将軍歴知數州楊業太原縣人父信漢麟州刺史業事劉崇屢立戰功時號楊無敵太宗征太原業勸其主繼元降以保生聚太宗召見業以為代州兼三交駐泊兵馬都部署屢敗契丹後與契丹戰被擒不食而死業不知書忠烈武勇有智謀與士卒同甘苦故士卒樂為之用楊美并州文水人状貎雄偉初仕後周為鐵騎都指揮使宋初為北海軍使政尚簡易民德之以平蜀功累遷端州防禦使卒贈侍中美凡得賜予及俸祿盡周給親戚故舊死之日家無餘財慕容延釗太原人父章開州刺史延釗少以勇榦聞從周世宗征討以功累官殿前副都點檢宋初以功加檢校太尉卒追封河南郡王次子德豐從征太原江南累官頴州團練使歴知數州安守忠晉陽人父審𤦺周封陳王守忠累官為州刺史入宋知興元太宗時歴知數州累遷感德軍觀察留後為治簡静喜與士大夫㳺從時論多與之白重賛憲州樓煩人有武勇初仕漢領端州刺史周時從征太原淮南以功遷至檢校太尉宋開寳初以左千牛衛上将軍奉朝請張永德并州陽曲人家世饒財父潁晉安州防禦使永德仕周屢立戰功至檢校太尉宋初加侍中授武勝軍節度復立戰功封衞國公常延信平晉人祖思仕周歴昭義歸德平廬三鎮節度延信仕宋累官梓遂十二州都廵檢使淳化中歴㐮鄧宋曹等州都廵檢使皆著威績袁繼忠并州人父進周階州防禦使繼忠長厚忠謹宋初平澤潞討并汾征蜀廣悉預攻戰又從征契丹皆有功累官判四方館事後䕶鎮定髙陽闗屯兵前後賜賚悉以犒士及卒家無餘財子用成登進士第官至太常􅀶士吳廷祚太原縣人性孝好學有将畧仕周官至樞宻使宋初為雄武軍節度鎮京兆卒贈侍中長子元輔好學善筆札官至定州鈐轄次子元載官至左衞将軍王溥祁縣人父祚周宿州防禦使漙漢時舉進士第一仕周為中書侍郎平章事賛世宗討澤潞加右僕射宋初位司空太宗時封祁國公卒謚文獻漙藏書萬卷長子貽孫徧覽之累官右司郎中㓜子貽永慶歴中拜相賀惟忠定襄人性剛果知書曉兵法初仕周知易州宋興授本州刺史兼易定祁等州都廵檢捍禦有功撫士卒得其死力毎乗塞用兵所向必克威名震北邉故十餘年間契丹不敢南牧羅彦瓌太原縣人仕周官至指揮都虞候顕德宋太祖自陳橋入彦瓌曰我輩無主今日湏得天子范質等由是降階聽命累遷安國軍節度嘗與李繼勲大破契丹郭守文太原縣人父暉漢䕶左軍使征遼東戰死守文沉厚有謀畧宋初以功累遷宣徽南院使卒追封譙王其平時所得俸祿悉以犒士卒之日家無餘財女為皇后子崇仁累官磁州防禦使髙防夀陽人性沉厚守禮法累世将家父從慶戍天井闗與梁軍戰死防好學善為詩事漢入宋官至樞宻直學士知鳳翔府及卒太祖甚悼惜之王全斌太原縣人初仕周累官右廂都指揮使宋初為西川兵馬都部署平蜀有功全斌輕財重士寛厚容衆軍旅樂為之用初入蜀時太祖常因大雪觧所衣紫貂裘㡌遣使馳賜焉呼延賛太原縣人累功積官至康州團練使賛有膽勇徧文其體為赤心殺賊字至於妻拏僕使皆然諸子耳後别刺字曰出門忘家為國臨陣忘死為主尹憲晉陽縣人事太宗於潜邸及太宗即位為殿直充延州保安軍使屢立戰功歴知瀛滄邢州皆兼兵馬鈐轄李謙溥盂人性慷慨通左氏春秋開寳中為濟州團練使及卒太祖甚痛惜之子允正累官知定州允則有才畧歴知潭滄雄鎮潞州治有聲慕容德琛延釗弟延卿之子累官内殿崇班知夔州討反賊李順及澧鼎蠻皆有功景德中以并代鈐轄知憲州後為右監門衞大将軍石普其先幽州人徙太原祖全周鐵騎軍使普從父通給事晉邸後歴數路都捴管累遷左領軍衞大将軍普有膽畧凡預討伐聞敵所在即馳赴之頗通兵書隂陽六甲星歴推歩之術太宗厚遇之輔超忻州秀容人勇悍有力宋初從平上黨遷内直都知又從征太原攀堞先登身被十三創太宗嘉其勇賜錦􅂁銀帶再乗城中流矢者八累官萊州團練使武英太原人父宻随劉繼元歸宋仕至鎮定同廵檢與契丹戰沒錄英為忻代同廵檢累遷涇原行營都監夏人入冦諸将戰小勝敵偽遁英以為前必有伏任福等既敗英猶力戰矢盡遇害吳元扆廷祚子性謹譲喜讀春秋左傳太宗選尚公主累官安州觀察使歴知鄆定河陽潞徐州有憂民心待賔佐以禮卒贈中書令楊延昭業子太宗朝以崇儀使知保州屢敗契丹後為髙陽闗副都部署延昭智勇善戰號令嚴明與士卒同甘苦遇敵必身先行陣克㨗推功於下在邉防二十餘年契丹憚之目為楊六郎夏守贇榆次人父遇為武騎軍校與契丹戰歿兄守恩累官定州路都捴管守贇在真宗時知樞宻院事後為髙陽闗都捴管判瀛州卒謚忠僖子随累官陜西副都捴管閻守恭榆次人父榮倜儻有志畧劉繼元召辭不就守恭體貎竒偉後徙家大名應募立功累遷德州刺史為并代兵馬鈐轄御軍嚴雖家居如對賔客常訪求郭進事而師法之王信太原人少勇悍真宗時應募以擒賊功補龍神衞指揮使累功遷保州刺史王則反為貝州城下都捴管城破則遁信率兵執則而還拜感德軍節度觀察留後安俊太原人祖贇髙州團練使仁宗即位俊補殿直後歴知數州累遷侍衞歩軍都虞候俊乆在邉羗人識之嘗為環州都監种世衡得俘虜問曰若属孰畏曰畏安太保劉易忻州人性介烈􅀶學好古喜談兵韓𤦺知定州上其所著春秋論授太學助教并州州學説書不能屈志仕進寓居盧氏習辟穀術趙抃復薦之任山平晉人有大志不仕法春秋作通記擬井田作中田圖嘗應詔言事富弼厚遇之所著有晉溪集楊文廣延昭子從狄青南征為廣西鈐轄知宜邕二州英宗穪為名将累遷興州防禦使秦鳳副都捴管後徙定州遷歩軍都虞侯遼人爭地界文廣獻陣圖并取幽燕䇿未報而卒髙若訥榆次人徙衞州進士及第累官樞宻使皇祐中罷為觀文殿學士尚書左丞卒謚文荘若訥彊學善記該通群籍頗明歴學醫書有文集二十卷盧政文水人以神衞都頭從劉平與夏人戰兵敗平被執政脫歸仁宗引問状因自陳失主将當死帝義其言以為供奉官討貝州賊率勇敢登堞大軍乗之後累官至武㤗軍節度使潘夙太原人天聖中上書論時政授仁夀簿歴知韶滑桂州累遷河北轉運使知河中府章惇察訪荆湖討蠻徭陳夙憂邉状以知潭州再遷光祿卿知鄂州王凱全斌曽孫徙家京兆冦凖奏為三班奉職累遷麟州都監敗趙元昊以功遷侍衞親軍副都指揮使卒謚壮恪凱治軍有紀律善撫循士卒與敵遇未嘗挫衂孫詵能詩善畫尚公主郝戭石州定胡人家貧竭力養親舉進士歴通山令時年未五十以父樵老上書請致仕為父求官執政諭使赴官而後請則可乃留妻子於家獨奉父行踰歳竟謝事得太子中允以歸而樵卒自畚土造冢詔賜粟帛楊震代州崞人宗閔子弓馬絶倫從折可存討方臘有功還知麟州建寕寨靖康初夏人圍建寕震率士與戰矢盡力乏與子居中執中力戰歿唯長子存中從征河北獨免建炎中贈官謚恭毅趙宻清源人政和中用材武試為河北隊将戍燕髙宗以大元帥開府檄援京師建炎初從張俊討冦及敗金人於明州累功遷龍神衛四廂都指揮使後加至少保王中立岢嵐州人博學强記家豪於財待賔客豐腆而自舉甚儉不再娶亦不就舉居一室如衲僧數年乃出人覺其談吐詩翰異常問之不言晚年易名雲鶴自號擬栩臨終預尅期而逝楊存中震子少警敏誦書日數百言為人魁梧沉鷙宣和末應募擊賊積功至忠翊郎靖康初金人再汴存中入援金人攻明州從張俊死戰破之累官檢校少保後封同安郡王卒謚武恭子偰工部侍郎倓簽書樞宻院事金楊雲翼樂平人弱冠有文名醫卜象數皆精究舉進士第一累官翰林學士禮部尚書卒謚文憲所著有文集及續通鑑周禮辨等書子恕亦舉進士仕元為翰林待制元好問秀容人父德明自㓜嗜書以詩酒自適好問七嵗能詩及長淹貫經史百家中興定五年進士歴内郷南陽令天興中為行尚書省左司貟外郎金亡不仕為文備衆體蔚為一代宗工其所著中州集捴若干卷孫九鼎定襄人天㑹中經義進士第一弟九疇九億俱有詩名與兄同榜登第吳彦髙嘗贈詩云清廟瑟三嘆齋房芝九莖其為名流穪道如此吕允平定人逺祖宗禮舉進士為遼州司户宗禮子仲堪亦舉進士仲堪孫釗為千夫長死國事釗生成德成徳生允累官漢中道㢘訪僉事以子思誠貴追封齊國公王渥太原人性明俊不覊􅀶學善談論少㳺太學長於詞賦登興定初進士為寕陵令有治迹累遷右司都事及完顔色哷往鄧州以為右司員外郎王璹太原人舉進士第珙珦皇統九年同榜璹仕至汾陽軍節度使鄊人榮之號三桂王氏㳺完崞州人大定初歲荒完日賑贍三百餘口冬給窮民衣襖五百套春秋以家財募人平治道路二百五十里北至太和嶺南至忻口及其老也以仁爱之心勉勵子孫胥鼎繁峙人父持國尚書右丞鼎以大定中進士累官平章政事封英國公鼎通達吏事有度量為政鎮静南遷以来書生鎮方靣者鼎一人而已郭文振太原人承安初進士累官遼州刺史深得衆心興定中招降太原東山二百餘村得壮士七千命權元帥右都監行元帥府事封晉陽公聶天驥五臺人至寕初進士累官京兆治中尋為衞州行尚書六部事哀宗遷歸德天驥留汴中崔立變天驥被創甚其女舜英謁醫救療天驥死舜英葬之明日亦自縊天驥沉静寡言能以雅道自将踐歴臺省若素宦然張大節五臺人天徳中舉進士調崞縣丞累遷戸部侍郎後歴知太原太興府致仕大節㢘勤好學賦性剛直果於從政世宗甚愛重之子巖叟由進士累官刑部侍郎兼太常卿國子祭酒致仕楊慥五臺人舉進士累官南京司農卿戸部侍郎擢尚書有清望資噐雅重處巨細事皆有法知朝廷大體非他人所能及劉昂興州人髙曽而下以科名相踵者七世昂天資警悟律賦自成一家作詩得晚唐體大定中登進士後自國子司業擢左司郎中終上京留守判官張翰秀容人大定末舉進士為人有藴藉累官翰林直學士户部尚書有經濟之能卒謚逹義弟翛然由進士同知河東北路都捴管事從子天彛舉進士子天任近侍局副使王特起崞州人智識精深好學善論議長於辭賦泰和中舉進士為真定錄事叅軍有惠政民立碑頌其遺爱改沁源令禹顯代州鴈門人貞祐初𨽻上黨公張開累戰功授義勝軍節度使兼沁州招撫副使正大中軍内變城破被擒得脱復被執不屈而死趙益太原人讀書肄業元兵入境益合土豪保險屢戰有功晉陽公郭文振署為夀陽令遷同知太原府事兼招撫使元兵攻城急益乃自殺妻子沉符印于井亦自殺事聞贈河東北路宣撫使元馮純陽曲人舉進士為河南行省平章後封魏國公子思温累官彰德路捴管後封晉國公思温子本翰林檢討郝㧞都太原人善騎射通譯語太祖遣使宋往返數四以辨穪從侵宋以功拜宣德等五路萬户後還治太原凢逺道租稅過重者悉除之卒追封冀國公子天益天舉天澤皆至捴管聶珪平定人授都元帥捴管平定等處兵馬子大本有學行從憲宗下蜀後為平江路治中有聶輝者亦平定人累官兵工二部尚書後以陜西行省叅政致仕張德輝交城人少力學金末兵興家業殆盡史天澤開府真定辟為經歴官世祖即位起為河東宣撫使民戴之若神明至元初叅議中書省事擢侍御史不拜徳輝天資剛直􅀶學有經濟噐望之知為端人許楫忻州人㓜從元好問學年十五中詞賦選又舉賢良方正孝㢘累官陜西道勸農使江西按察使歴徽州東平兩路捴管所至皆有循良之政吕思誠允子㤗定初舉進士累官翰林編修歴禮刑二部尚書捴裁宋遼金三史後三為祭酒一法許衡之舊所著有文集及兩漢通記卒謚忠肅王守誠陽曲人泰定初進士由秘書郎累官至禮部尚書與脩三史至正間使四川薦賢直枉為諸道最進行省左丞卒謚文昭所著有文集郝天挺交城人官至中書平章封冀國公號新齋著唐詩鼔吹子祐西臺御史孫忠恕翰林侍制獻所著無逸圖帝恱命捴裁宋遼金三史書成歸隱終身武祺太谷人以儒進身知桐城縣果㫁有善政官至甘肅行省叅政郭周岢嵐人為都元帥立闗外六州元帥府便宜行事時嵗屢不登四隅擾攘周瞻濟士庻境内無虞郜知章樂平縣人家世業儒有詩名司業王嗣能齊名世號王郜本朝吳昭盂縣人洪武中以才能穪累官至福建布政司左布政使吳印盂縣人才識卓異洪武中敭歴仕途累陞陜西布政使和希文平定人學行過人洪武中擢用蒞職勤能官至刑部侍郎王克己夀陽人􅀶通經史洪武中以文學起家官至吏部試尚書齊麟五臺人洪武己丑進士以文學異等擢翰林院編脩累官至禮部侍郎郝鵬徐溝人由太學生歴職仕路有能名累官至湖廣布政司左叅政田敏道五臺人洪武中以才行超卓薦起之官至湖廣按察司副使李拳徐溝人洪武中以孝亷薦累遷應天府尹同邑閻彦清洪武間亦以舉孝亷累官淮安府知府陞陜西布政司叅政董方忻州人登正統乙丑進士累官刑部尚書子寕成化壬辰科舉進士省志喬毅樂平人正統戊辰進士累官工部右侍郎子鳳登天順丁丑進士官兵部武選郎中後先相望世濟其美云志省王鑑太原人景㤗中進士除江西道監察御史左遷膚施知縣以績最受詔旌異陞延安知府致仕省志白侃平定州人景㤗中進士由御史陞陜西按察司副使省志周經陽曲人天順初進士累官翰林學士間侍皇太子講文華大訓太子毎起立拱聽仕至戸部尚書卒贈太子太保謚文端志略列女王覇妻漢廣武人霸少立髙節妻亦美志行初覇與同郡令狐子伯為友後子伯為楚相其子為郡功曹嘗詣霸霸子時耕於野投耒歸見色沮怍客去覇卧不起妻固問故霸曰彼子容服甚光我兒曹見客有慙色父子恩深不覺自失耳妻曰以子伯之貴孰與君之髙覇屈起而笑曰有是哉遂共隱終身聶氏石州定胡人郝戭妻事舅姑以孝聞戭篤行苦節而不仕姻族語聶使勸戭聶曰吾不德無以助君子矧敢强其所不欲以累其髙哉武管嬰太原人年十七未嫁元至正間避兵山洞其父被執女奔至父所謂兵勿殺我父請以身代衆乃釋其父父已逃去又言我有金帛瘞井邉衆往掘得之方爭取女即投井死齊氏太原人適王履謙至正中賊䧟太原齊氏與蕭吕二婦及二女避難趙荘賊至度不能免顧謂二女曰汝家五世同居號為清白豈可辱身以苟生哉長女曰吾夫已死今得死為幸吕曰吾左丞孫也義不受辱齊氏大哭乃與二婦二女及二孫女俱投岩下死申氏冀寕人至正中賊䧟冀寕申語其夫李宏益曰君當速去勿以我相累言訖投井死宏益後再娶安氏居二嵗而宏益卒安氏泣謂諸親曰女子一適人終身不改不幸夫死雖生亦何益乃自縊於柩側白氏太原人夫棄家為僧白氏年二十留養姑不去服勤績絍以供租賦夫一日還廹使他適白㫁髪誓不從夫不能奪乃去姑年九十卒竭力營𦵏畫姑像祀之終身武志賢妻姓蘇氏徐溝人年十九而夫亡子甫週家貧特甚蘇勤紡織養姑以孝姑卒以禮葬之永樂三年旌表其門省志馮氏陽曲人董三漢妻年二十一夫亡守節三十餘年貞潔無玷宣德五年旌表族人名榮者妻郝氏年二十二而寡居與馮齊節並受旌表省志朱氏陽曲人胡源妻夫亡朱年二十一奉姑撫㓜守節二十五年始終如一正統六年旌表其門省志劉氏太原人適楊素素染疾不起劉號泣拔髪自誓比歿親理䘮葬事姑克盡婦道三子皆有立景㤗初旌表其門省志梁氏石州人適阮福福兖州學生卒時梁年二十慟夫早逝哀泣不已是夜自縊與夫同槨而𦵏事聞表為貞節之門省志侯氏繁峙人縻岩妻也夫歿侯焚香自誓孀居五十餘年飬舅姑撫遺㓜艱難百状卒全其節天順間旌表其門志省孫氏五臺人陳紀妻夫亡孫年二十四即以節自勵孀居五十餘年無玷成化初旌表其門志省仙釋志超榆次人俗姓白隋大業初出家有異行唐貞觀中入湼槃勅賜其院曰空王寺世號曰空王佛李長者自滄州來盂縣日惟食十棗一栢葉小餅掩室著論無虚時後至冠葢村逢一虎馴伏長者語虎曰吾欲釋華嚴經可與吾擇一棲止處虎遂起引至神福山得一龕居之以著論年九十六化於龕中打地和尚傳心要於江西馬祖退隱定㐮縣徃来深山與虎豹群居踪跡神異有以佛法問者以杖打地三下或匿其杖而問焉則開口而已唐大歴中跏趺入㓕弟子𦵏其真身今酈村塔是也宋張商英為撰記真寳代州人為五臺山僧正學佛能外死生宋靖康之擾與其徒習武事山中欽宗召對眷賚隆縟真寳還山益聚兵助討敵大至真寳被執金將不忍殺誘勸百方終不顧且曰吾法中有口回罪吾既許宋皇帝以死豈當妄言耶怡然受戮法空漢州人俗姓古出家㳺至忻州依懶牧和尚居萬安襌院日誦寫蕐嚴經元大德中忽㣲恙誨徒出頌畢奄然而逝茶毘之際祥光溢目得舍利十餘粒順禪師長安人俗姓弓洪武初来五臺普光禪寺師無念德公嘗夜中見自身在文殊㑹中聞種種偈頌後雲㳺名山還止五臺永樂初跏趺而逝茶毘後有舍利及有語錄傳世了空忻州人俗姓王氏生而神異年二十餘辭家去人不知其所之後十餘年方歸住華盖寺凡事能前知雖千里外莫不預見忽遇一異僧曰脩行當學最上乗前知特小乗法耳非所以了生死也于是苦志勵行又數年遂大徹悟一日㣲恙示衆曰吾逝矣説偈曰無物本来無身心何處尋人法雙忘却虚空現法身茶毘之日贈送者萬人而烟成五采人咸異之省志昌海太原人俗姓許氏七八嵗時言動非常求出家後叅徹半藏禪師深契要㫖􅀶渉群經皆極其奥與洪蓮義金談道人呼為海金蓮三髙士戒律精嚴嵗旱禱雨輙應隱崛􅡆山刺血書五大部經一百十三卷校正華嚴合論五臺清凉傳本宗二百問皆親筆書之永樂中詔選赴京纂脩大藏經授太原府僧綱司都綱一日沐浴更衣趺坐而逰省志義金太原人俗姓張氏㓜頴㧞有出塵之志禮沙門了空為師洪武間逰金陵登壇受戒復歸杜門習靜衍曹洞宗𣲖以戒定慧自持化洽逺邇永樂壬辰奉詔赴京讐校内典并三藏法數比進所註經文賜官弗就乞歸故山上嘉其恬退賜衲衣襌褥平生所著有勝嚴集若干卷校正水陸儀文六卷俱行世省志洪蓮太原人俗姓吴氏早䘮父憂毀殊甚侍母盡孝比䘮哀哭幾絶遂投晉城西饒益寺僧智巖出家儒釋兼通戒行苦節永樂十年詔選註大明三藏法數校大藏經典成進賜衣設宴欲授以官懇辭還山後累奉詔對御談經䝉賚賜益厚景泰四年七月四日展香禮佛畢趺坐説偈訓徒奄然示寂詔贈謚净梵翊教禪師僧錄司右講經兼大功德寺住山覺庵大和尚仍遣官諭祭省志明一統志卷十九
