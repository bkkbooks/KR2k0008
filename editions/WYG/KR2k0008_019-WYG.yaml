body:
  text: 明一統志卷十九明李賢等撰山西布政司山西古冀州地漢分冀州西境河東等郡屬司𨽻置并州部刺史察舉太原上黨雲中鴈門等郡而不常所治東漢并州治晉陽唐貞觀初置河東道開元中置河東採訪處置使治蒲州後改採訪為觀察其治仍舊宋置河東路經畧安撫使以太原守臣兼領元以冀寕諸路直𨽻省部置河東山西道宣慰使司于大同置河東山西道肅政亷訪司于冀寕本朝置山西等處承宣布政使司領太原平陽大同潞安四府澤汾沁遼四州置山西都指揮使司領太原左太原右太原前振武平陽潞州鎮西七衞保德州寧化沁州汾州四所又置山西行都指揮使司領大同前大同後大同左大同右天城陽和鎮虜玉林髙山雲川朔州威逺安東中屯十三衞山陰馬邑二所置山西等處按察司分冀寕冀南冀北河東等四道兼察諸府州衞所三司並治太原而行都司則分治於大同以控制邉境云太原府東至直𨽻真定府井陘縣界三百七十五里南至沁州武鄉縣界二百一十里西至陜西延安府吳堡縣界五百五里北至大同府馬邑縣界三百五十五里自府治至京師一千二百里至南京二千四百里糧五十七萬零建置沿革禹貢冀州之域天文參井分野舜初以冀州地廣分置并州後復省入冀周置并州成王封弟叔虞於此為唐國春秋時為晉國戰國時屬趙秦置太原郡治晉陽漢兼置并州東漢末省并入冀三國魏復置并州改太原郡為國晉為劉淵所㨿後沒於石勒後魏仍為太原郡後周置并州總管府隋初郡廢大業初罷州為太原郡唐為并州後置大都督府開元中改并州爲太原府屬河東道天寳初加號北京五代時唐為西京又改北京宋以榆次縣置并州後徙治陽曲縣唐明鎮即今治嘉祐中復為太原府兼河東軍節度金改軍曰武勇後復曰河東元改置太原路大徳中改冀寕路本朝仍為太原府領州六縣二十二陽曲縣附郭本秦太原郡狼孟縣地漢置陽曲縣在今定襄縣境漢末移治太原縣北境魏又徙于狼孟縣南境後魏以陽曲縣属永安郡隋改曰陽直属并州又徙治汾陽故城改曰汾陽煬帝復曰陽直唐於故陽曲城置汾陽縣尋省陽直改汾陽曰陽曲宋属大原府金始移置郭下元仍舊本朝因之編戸七十八里太原縣在府城西南四十五里周唐叔虞始封之地春秋戰國皆曰晉陽秦置晉陽縣為太原郡治所唐徙縣治汾水東宋初以縣為平晉軍尋罷軍為縣後又徙治永利監属太原府元属太原路本朝移治汾水西洪武八年改為太原縣編戸四十五里榆次縣在府治東南六十里春秋時晉涂水邑漢置榆次縣属太原郡晉仍舊後魏太武時并入晉陽縣後復置北齊省入中都縣隋初復置徙治漢榆次古城属并州唐宋元仍舊本朝因之編戸六十六里太谷縣在府城東南一百二十里本晉大夫陽處父邑秦属太原郡漢為陽邑縣晉属太原國後魏属太原郡後周徙治今縣地隋開皇初郡廢以縣属并州後改為太谷縣以縣西南有太谷故名唐初置太州尋廢州以縣属太原府五代宋金元俱仍舊本朝因之編戸七十九里祁縣在府城南一百五十里春秋時晉大夫祁氏邑秦属太原郡漢為祁縣治祁城村後魏徙今治北齊省隋復置属并州唐初属太州開元中仍属太原府金属晉州元属冀寧路本朝属太原府編戸四十五里徐溝縣在府城南八十里本清源縣之徐溝鎮金大定中析平晉榆次清源三縣地置此縣属太原府元仍舊本朝因之編戸一十九里清源縣在府城西南八十里春秋時晉地名清源又名梗陽漢為榆次縣之西境隋始於梗陽故城置清源縣属并州以水為名大業初省入晉陽唐初復置金以晉州移治於此後復為太原属縣元仍舊本朝因之編戸二十八里交城縣在府城西南一百二十里本漢晉陽縣西境北齊於此置牧官隋始置交城縣因縣界有古交口城故名唐分置靈川縣開元初復省入移治山南宋嘗置大通監於此金廢監以縣属太原府元仍舊本朝因之編戸四十三里文水縣在府城西南一百六十里春秋時為晉平陵邑趙曰大陵漢為太原郡大陵縣地晉属太原國後魏置受陽縣隋始改曰文水取縣西文谷水為名唐初属汾州尋属并州天授初改為武興縣神龍初復舊宋徙於今治属太原府金元仍舊本朝因之編戸七十九里夀陽縣在府城東一百六十里春秋時晉馬首邑漢為楡次縣之東境晉始置夀陽縣属樂平郡晉末省隋初復置属并州唐於此置受州貞觀中州廢縣仍属并州金於此置晉州尋移治清源元仍舊本朝因之編戸二十六里臨縣在府城西南五百里本漢西河郡離石縣地後周於此置烏突郡及縣隋郡廢改縣曰太和属石州唐改曰臨泉置北和州貞觀初州廢縣仍舊属宋属晉寕軍金復属石州元属太原路中統初陞爲臨州後属冀寧路洪武初改臨縣萬厯中改属沁州編戸十七里盂縣在府城東北二百四十里本春秋時仇猶國晉為大夫孟丙邑名曰盂戰國属趙為源仇城漢置盂縣属太原郡後魏省入石艾縣隋分石艾置原仇縣属遼州大業初改為盂縣属太原郡唐初属受州貞觀中以烏河縣省入属并州金貞祐中陞爲盂州元因之本朝洪武二年改為縣編戸二十二里静樂縣在府城西北二百二十里本漢汾陽縣地属太原郡東漢末廢入九原縣隋爲岢嵐縣改曰汾源大業初又改静樂縣置樓煩郡唐於縣置管州從廢以縣属嵐州宋置静樂軍尋廢軍徙憲州治此熈寕中省憲州入静樂縣後復置金改為管州元因之本朝洪武二年省入静樂縣編戸二十八里河曲縣在府城西北一百八十里舊為嵐州雄勇鎮宋立火山軍属代州後置火山縣尋廢金改為火山州後改曰隩州貞元初増置河曲縣取河千里一曲之義元至元初州縣俱省入保德州本朝復置河曲縣編戸七里平定州在府城東二百八十里春秋時晉地秦属太原上黨二郡漢為上艾縣地東漢属恒山國晉属樂平郡後魏為西陽郡改上艾曰石艾縣隋属遼州後属太原郡唐属遼州後属并州又改為廣陽縣宋改為平定縣建平定軍金改軍為平定州元省平定樂平二縣入焉尋復立樂平縣本朝因之編户二十二里領縣一樂平縣在州東南六十里本漢沾縣地属上黨郡晉析置樂平郡治樂平縣隋郡廢以縣属遼州大業初改属太原郡唐初置遼州於樂平後徙州治遼山宋陞為平晉軍尋廢復為樂平縣属平定軍金陞軍為臯州尋廢以縣属平定州元仍舊本朝因之編戸一十里忻州在府城北一百六十里春秋時地属晉後属趙秦漢為太原郡之陽曲縣地東漢末於此置新興郡晉改曰晉昌郡後魏置肆州隋復立新興郡尋廢郡置忻州取界内忻水為名大業初州廢後復立新興郡唐初為忻州天寳初為定襄郡乾元初復為忻州金属太原府元改為九原府尋復舊本朝以秀容縣省入編户六十三里領縣一定襄縣在州東五十里本漢陽曲縣地東漢末於此置定襄縣属新興郡晉改曰晉昌後魏復為定襄縣隋省定襄入秀容唐初復析置定襄縣属忻州宋省元祐初復置金元仍舊本朝因之編戸十九里代州在府城東北三百五十里春秋時晉地後属趙秦為鴈門郡漢治隂縣即此地三國魏徙鴈門郡南度句注治廣武縣後周移肆州治此隋初郡廢置代州及改廣武曰鴈門縣大業中改州為鴈門郡唐改代州天寳初改鴈門郡乾元初復為代州宋因之金置震武軍元罷軍仍為代州以鴈門縣省入𨽻太原路本朝洪武二年改代縣八年復改為州編戸四十一里領縣三五臺縣在州南一百四十里本漢慮虒縣属太原郡晉省後魏復置属新興郡北齊改属鴈門郡隋改為五臺縣因山以名唐属代州金陞為臺州元仍舊本朝洪武二年改為五臺縣属太原府八年改今属編戸一十五里繁峙縣在州東七十五里漢舊縣属鴈門郡後魏置繁峙郡後周郡縣並廢東魏僑置武州于此北齊改為北靈州尋廢隋移縣於武州城属鴈門郡唐又移今治宋属代州金改為堅州元仍舊本朝洪武二年改州為今縣編户二十六里崞縣在州南六十里漢舊縣属鴈門郡漢末廢晉復置後魏改為石城縣東魏置廓州於此北齊改為北顕州後周州廢隋改為平冦縣大業初改崞縣唐属代州五代梁析置白鹿縣宋省入崞縣元陞崞州本朝洪武二年改州為縣属太原府八年改今属編户三十八里岢嵐州在府城西二百八十里春秋属晉後為樓煩胡所㨿趙滅樓煩以為縣秦属太原郡漢因之三國魏属新興郡後魏於此置嵐州因山為名隋為岢嵐鎮属樓煩郡唐置嵐谷縣及岢嵐軍宋仍為軍金改為州省入嵐州後省入管州本朝洪武八年置岢嵐縣九年改縣為州編戸一十一里領縣二嵐縣在州東南一百四十里本漢汾陽縣属太原郡漢末地空三國魏為新興郡地後魏為嵐州地隋置樓煩郡唐置東㑹州尋改嵐州天寳初改樓煩郡乾元初復為嵐州治宜芳縣金陞為鎮西軍節度元復為嵐州本朝改為縣洪武九年改今属編戸一十二里興縣在州西一百五十里本漢汾陽縣地後魏置蔚汾縣屬神武郡隋罷郡改為臨泉縣属樓煩郡唐改為臨津縣属東㑹州貞觀初改為合河縣属嵐州宋元豊間遷治於蔚汾水北金改為興州属太原府元因之本朝洪武二年改為縣九年改今属編戸一十二里保徳州在府城西北五百里本嵐州地宋析置定羗軍景德初政保德軍尋立為州金置附郭保德縣元初縣廢至元初又省隩芭二州入焉属太原路本朝初因之洪武七年改州為縣至九年復為州編戸五里永寧州在府城西南四百一十里戰國時為趙之離石邑秦属太原郡漢置離石縣属西河郡東漢郡徒治此晉改為西河國後趙改永石郡後魏廢為離石鎮北齊置昌化縣及懐政郡兼置西汾州後周政西汾為石州又改郡及縣曰離石隋初郡廢大業初州廢復置離石郡唐復改石州天寳初為昌化郡乾元初復為石州本朝以離石縣省入嘉靖初以虜患殘破欽改今名編戸四十一里領縣一寧郷縣在州西南五十里本漢離石縣地属西河郡後周析置寕鄉平夷二縣属離石郡隋省寕鄉以平夷属石州金改平夷曰寕鄉縣元属太原路至元初属石州本朝因之編户一十三里郡名晉陽古名太原秦名冀寧元名形勝左有恒山之險右有大河之固魏牽招說髙幹句注險阻晉句注碑北方之險有盧龍飛狐句注為首天下之阻所以分别内外靈山角立唐桞宗元送文暢登五臺序雲代間有靈山焉與竺乾鷲嶺角立相望襟四塞控五原唐李白餞王賛序天王三京北都居一襟四塞之要衝控五原之都邑雄藩劇鎮非賢莫居還繞一郡之内得沾水之勝平定州志南有石嶺之關北有雲内之塞忻州志山明水秀岢嵐州志北有方山南有孟門石州舊志風俗好樂無荒詩唐風好樂無荒良士瞿瞿文字盛興通典山西土瘠其人勤儉魏晉以降文字盛興憂深思逺詩集註其地土瘠民貧勤儉質䃼憂深思逺有堯之遺風淳儉好學太原圖册士窮理學兼習辭章敦厚不華淳儉好學工賈務實勤業人物軰出太原圖經人物軰出代不乏人皆有文武全才民風清簡元志平定州郡小民淳俗重端午其風清簡好尚文章民性質朴忻州志民性質朴士尚文雅無澆薄風元志代州民淳訟簡節儉勤農無㳺惰之習絶澆薄之風民貧尚義保德州志土瘠民貧莫不尚義善治生多藏蓄舊志山川亭子山在府城北三十里下有桃源三洞乃白子西讀書處罕山在府城東北五十里榆次縣北界方山在府城東六十里連清源縣西二十五里漢柵山在府城東北六十里接盂縣鵶鳴谷阪泉山在府城東北八十里舊名漢山晉文公卜遇黄帝戰于阪泉之兆因立廟于此繫舟山在府城東北九十里禹治水繋舟此山故名有