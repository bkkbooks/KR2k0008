body:
  text: 明一統志卷二十三明李賢等撰兖州府東至直𨽻淮安府贑榆縣界四百九十里南至直𨽻徐州沛縣界一百五十里西至東昌府濮州界三百三十里北至濟南府肥城縣界一百一十里自府治至京師與南京俱一千二百三十里糧四十五萬三百石零建置沿革禹貢徐兖二州之域天文奎婁分野春秋時為魯國戰國屬楚秦為薛郡漢為魯國及泰山山陽郡地東漢為任城國山陽泰山郡地兼置兖州晉改為魯郡劉宋元嘉末復置兖州於瑕丘北齊改為任城郡隋罷郡為兖州大業初改為魯郡唐為兖州天寳初又為魯郡乾元初復為兖州後陞泰寜軍五代周復為州宋初復為泰寜軍重和初改為襲慶府金仍為兖州復為泰寜軍又改泰定軍元初復為兖州𨽻濟寜路本朝初因之洪武中陞為兖州府領州四縣二十三滋陽縣附郭本魯之負瑕漢置瑕丘縣屬山陽郡武帝時為瑕丘侯國東漢復為縣晉省入南平陽屬髙平國隋復置瑕丘縣為魯郡治唐為兖州治宋避宣聖諱改為瑕縣又改曰滋陽縣取山為名金元因之本朝初省入兖州洪武十八年復置編戸二十四里曲阜縣在府城東四十里神農少昊徙都之地周武王以封周公旦是為魯國秦為薛郡漢復為縣兼置魯國晉改國為郡隋初廢郡改縣曰汶陽後人改曰曲阜因城中有阜委曲長數里故名唐貞觀初省尋復置屬兖州宋改為仙源縣金復為曲阜元仍舊本朝因之編户一十六里寜陽縣在府城北五十里本魯闡邑漢置寜陽縣屬泰山郡東漢屬東平國晉省後魏置平原縣隋改為龔丘縣宋改為龔縣金復為寜陽縣屬兖州元省入滋陽後復置本朝因之編户三十五里鄒縣在府城東六十里周時為邾國魯繆公改為騶因山為名漢置騶縣屬魯國隋屬魯郡唐改為鄒縣屬兖州宋屬襲慶府金屬滕州元因之本朝改今屬編戸三十九里泗水縣在府城東九十里古下明國春秋時為魯卞邑漢置卞縣屬魯國晉屬魯郡隋改為泗水縣屬兖州唐宋金因之元省入曲阜尋復置屬兖州本朝因之編户一十七里滕縣在府城東南一百四十里古小邾子國秦屬薛郡漢置蕃縣屬魯國晉屬魯郡後魏置蕃郡北齊廢隋改為滕縣屬彭城郡後陞為滕郡唐復為滕縣屬徐州宋因之金陞滕陽軍大定中改滕州及置滕縣元因之屬益都路本朝洪武二年州廢以縣屬濟寜府洪武十八年改今屬編戸八十七里嶧縣在府城東南二百六十里春秋時鄫國漢為蘭陵承二縣地屬東海郡晉置蘭陵郡治承城隋罷郡置鄫州大業中州縣並廢而徙蘭陵縣於承城屬徐州唐初復置鄫州又改蘭陵為承縣貞觀中廢州以縣屬沂州宋因之金屬邳州後改承縣為蘭陵興定中以縣置嶧州元初以州屬益都路至元初以縣省入本朝洪武二年改州為縣屬濟寜府後改今屬編戸三十六里金鄉縣在府城西南一百八十里古為緡國春秋時為宋邑漢置東緡縣屬山陽郡後漢析置金鄉縣以山為名晉以東緡省入屬髙平國後魏以昌邑縣省入唐於縣置金州尋改戴州州廢以縣屬兖州五代周屬濟州宋金仍舊元屬濟寜路本朝洪武十八年改今屬編戸三十三里魚臺縣在府城南一百七十里春秋時魯棠邑隱公觀魚于棠即此漢置方與縣屬山陽郡晉屬髙平國後魏屬髙平郡北齊省唐置魚䑓縣屬山陽五代唐屬單州宋金因之元屬濟州至元初省入金鄉後復置本朝初屬徐州尋屬濟南府洪武十八年改今屬編戸二十七里單縣在府城南二百九十里本魯單父邑漢為縣屬山陽郡東漢為侯國晉屬濟陽郡後魏置北濟隂郡隋初廢郡以縣屬戴州大業初州罷以縣屬曹州唐屬宋州後自碭山縣徙輝州治此五代唐改為單州宋因之金屬歸徳府元初以單父縣附郭屬濟寜路本朝洪武元年省縣入州二年改州為單縣屬濟寜府十八年改今屬編戸四十二里城武縣在府城西南二百九十里漢舊縣屬山陽郡東漢屬濟隂郡晉屬濟陽郡北齊於此置永昌郡隋初罷郡置戴州大業初廢州以縣屬濟隂郡唐貞觀中屬曹州五代唐屬單州宋金元因之本朝洪武四年改屬濟寜府十八年改今屬編戸二十三里曹州在府城西三百里古豫州之域周武王封弟振鐸為曹國戰國屬齊漢為濟隂郡地晉為濟陽郡後魏於郡東北置西兖州治定陶城後徙治此後周改為曹州隋改為濟隂郡治濟隂縣唐復為曹州天寶初改濟隂郡乾元初復為曹州五代晉置威信軍周改彰信軍宋為興仁府金復為曹州大定末河決徙治州東北七十里本朝洪武四年改為縣正統十一年復置曹州於古曹國𨽻兖州府編戸七十四里領縣二曹縣在州南一百二十里本漢濟隂郡之定陶縣地隋置濟隂縣唐宋皆因之金徙曹州治舊乘氏縣仍置濟隂為附郭本朝初以濟隂省入州洪武二年徙州治盤石鎮四年改州為縣屬濟寜府正統十一年復置曹州以縣屬焉編戸四十八里定陶縣在州東南五十里本堯所居秦置定陶縣漢初封彭越為梁王都此後以縣屬濟隂國宣帝時為定陶國後魏為西兖州治隋屬濟隂郡唐屬曹州尋降為鎮宋置廣濟軍兼置定陶縣熙寜中軍廢以縣屬曹州後復置軍金廢軍仍以縣屬曹州本朝初省入州洪武四年復置屬濟寜府正統十一年改今屬編戸一十九里濟寜州在府城西六十里古徐州之域春秋時屬魯戰國屬宋秦屬碭郡漢屬山陽郡晋為髙平及任城國地劉宋屬濟北郡後魏置濟州於碻磝城隋改為濟北郡唐初復為濟州後廢五代周復置濟州治鉅野金徙治任城元初還治鉅野後陞為濟寜路而於任城置濟州至正中省濟州而徙路治任城本朝洪武元年改路為府十八年改府為州以任城縣省入屬兖州府編戸五十四里領縣三嘉祥縣在州城西五十里本鉅野澤地世傳魯哀公西狩獲麟於此唐宋以來皆為任城縣地金大定中始置嘉祥縣屬濟州皆取獲麟之義元屬東平路至元初還屬濟州後屬單州本朝改今屬編戸一十四里鉅野縣在州城西北一百里禹貢大野既瀦即此地周屬魯漢置鉅野縣屬山陽郡晉屬髙平國後罷隋復置屬東平郡唐置麟州治此尋廢州以縣屬鄆州五代周於此置濟州宋因之金徙州治任城縣省鉅野入鄆州元初為濟寜路治後徙治任城而此縣仍屬焉本朝因之編戸三十五里鄆城縣在州城西北一百六十里本魯地漢為夀良縣地東漢屬廪丘後周置清澤縣及髙平郡隋廢郡改縣為萬安後改為郡以廪丘省入大業初置鄆城縣屬東平郡唐置鄆州以縣屬焉五代周廢州以縣屬濟州宋因之金以水患徙盤溝村元屬濟寜路本朝因之編户二十四里東平州在州城西北一百五十里春秋時為須句國戰國屬宋秦屬碭郡又為薛郡地漢為東平國取禹貢東原底平之義後為濟東國又改太河郡東漢仍為東平國後魏為東平郡後周置魯州隋置鄆州後改東平郡唐復鄆州天寳初改東平郡元和中置天平軍宋徙治州故城政和初改東平府元改為東平路本朝洪武初復改為府八年降為州以須城縣省入屬濟寜府十八年改今屬編戸三十四里領縣五汶上縣在州東南六十里古厥國春秋時為魯中都地漢置東平陸縣屬東平東漢省入須昌縣北齊置樂平縣隋後改平陸屬魯郡唐初屬兖州後改為中都縣金改為汶陽縣又改曰汶上元屬東平本朝因之編戸四十八里東阿縣在州西北七十里春秋時齊柯邑漢置東阿縣屬東郡晉屬濟北國隋屬濟北郡唐初屬濟陽郡後屬鄆州宋徙治新橋鎮屬東平府金元仍舊本朝洪武八年還舊治編戸二十四里平隂縣在州北一百二十里本齊地春秋魯襄公㑹諸侯伐齊齊侯禦諸平隂即此漢為盧縣地晉因之隋置榆山縣後改平隂縣屬濟北郡唐屬鄆州宋屬東平府金元仍舊本朝因之編户一十九里陽榖縣在州西北一百四十里春秋時齊地僖公時齊宋江黄㑹于陽榖即此隋置陽榖縣屬濟北郡唐屬濟州天寳後屬鄆州宋徙治上述鎮金元仍舊本朝因之編戸三十九里夀張縣在州西一百二十里春秋時為良邑漢為夀良縣屬東郡其治在今縣南九十里東漢改為夀張縣隋屬濟州後屬鄆州唐於此置夀州并增置夀良縣尋俱省宋屬東平府金元仍舊本朝洪武三年省入須城陽榖二縣十四年復置屬東平州編户一十五里沂州在府城東三百六十里本齊魯二國之境秦漢晉皆為瑯琊郡地後魏於此置北徐州後周改沂州以城臨沂水故名隋置臨沂縣改州為瑯琊郡唐復為沂州天寳初改瑯琊郡乾元初復為沂州宋金因之元屬益都路後以臨沂縣省入本朝洪武初改屬濟寜府又改屬濟南府十八年改今屬編户一百五十里領縣二郯城縣在州城東南一百二十里古郯子國地漢置郯縣屬東海郡東漢徐州刺史治此北齊省後周復置隋省後復置屬下邳唐宋金因之元末復置郯城縣仍屬沂州本朝因之編戸六十二里費縣在州城西南九十里古費國地春秋時為魯季孫氏之邑漢置費縣屬東海郡東漢屬泰山郡晉屬瑯琊國後魏徙治祊城屬沂州後廢唐復置宋金元俱仍舊本朝因之編戸七十五里郡名東魯古名任城北齊名魯郡隋名泰寜宋名形勝奄有龜䝉遂荒大東詩魯頌河濟之間唐孔頴逹禹貢疏兖州在河濟之間其地卑下而水之所沮洳者為多東盤琅邪西控鉅野北走厥固南馳互鄉唐李白任城㕔壁記近通徐泗逺控江淮宋蘓轍鉅野縣詩風俗民有聖人之教化漢地理志周以少昊之墟封周公子伯禽為魯侯其民有聖人之教化故孔子曰齊一變至於魯魯一變至於道言近正也尚禮義重㢘恥同上去古逺而風俗漓孔子閔王道將廢乃修六經以述三代之道是以其人好學尚禮義重亷恥有桑麻之業同上周公遺化銷㣲庠序衰壊地狹人衆頗有桑麻之業亡林澤之饒俗儉嗇愛財趨商賈好訾毁多巧偽君子以材雄自髙小人則鄙野難治唐李白任城㕔壁記山川嵫陽山在府城西三十里宋熙寜中旱祈于此山獲雨遂封其神為惠應侯甑山在府城東北七十里後魏時境内數有猛獸為暴自張蕐原臨政山中忽有六駁食獸咸以為化感所致防山在曲阜縣東二十里禮記孔子父母合𦵏于防今其墓在山北二十里尼山在曲阜縣東南五十里連泗水鄒縣界一名尼丘山昔叔梁紇與顔氏祈於此山而生孔子今其麓有宣聖廟西南有觀川亭遺址亭東有坤靈洞元時嘗有人持火曵絙而入北三數丈忽隙間有光覩一室口廣两楹許中横石床石枕皆天成元周伯𤦺詩五峯鴈列岡巒秀一洞龍蟠氣象雄河潤周知流澤逺頂圬猶見肖形同顔母山與尼山相對上有聖井及顔母廟遺址雲山在寜陽縣西一十五里上有穴出雲伏山在寜陽縣北二十里上有洞洞内鐫石成佛像故又名佛山杏山在寜陽縣東北三十里上多杏木岡山在鄒縣北五里上有岡山寺馬鞍山在鄒縣北二十里上有孟母墓九龍山在鄒縣東北二十里山形起伏凡九上有靈泉故又名靈山四基山在鄒縣東北二十里上有孟子墓嶧山在鄒縣東南二十五里一名鄒嶧山禹貢嶧陽孤桐春秋邾文公卜遷於嶧史記秦始皇上鄒嶧山刻石頌徳皆此元鮮于樞詩東方巨鎮宗岱宗羣山列侍臣妾同西南崛起一萬仭却立不屈如争雄何年天星下天宮墜地化作青芙蓉外如刻削中空洞閬風𤣥圃遥相通鳬山在鄒縣西南五十里連魚䑓縣界詩保有鳬嶧遂荒徐宅即此其陽有伏羲廟遺址世傳伏羲畫卦於此故土人呼其處為八卦山元楊奐東逰記云過泗水地頗髙敞南望鳬嶧諸峯出没於烟蕪雲樹之表謂此昌平山在鄒縣東北五十里史記孔子生魯昌平鄉謂此鳯凰山在泗水縣東南五里下有珎珠泉昌山在泗水縣東南二十里下有泉曰鮑村曰東嚴曰黄隂皆流入泗水陪尾山在泗水縣