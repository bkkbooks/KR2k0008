子舊宅以廣其居聞金石絲竹之音乃不敢壊於壁中得古文經傳又髙帝過闕里以太牢祀孔子皆此今為宣聖廟大庭氏庫在曲阜縣治東春秋昭公十八年梓慎登大庭氏之庫以望氣曰宋衛陳鄭火註曰大庭氏古國名唐李白詩朝登大庭庫雲物何蒼然莫辯陳鄭火空霾鄒魯烟我來尋梓慎觀化入寥天矍相圃在魯城内宣聖廟西南周廻二里即孔子射所杏壇在魯城内宣聖廟前即孔子講道之所北有子路捻丁石南有宋真宗御寶殿受命壇在曹縣東北二十里漢髙帝即位于定陶汜水之陽建此五父衢在曲阜縣西南左傳季武子将作三軍盟諸僖閎詛諸五父之衢東魯門在府城東李白詩日落沙明天倒開波摇石動水縈廻輕舟泛月尋溪轉疑是山隂雪後來水作青龍盤石堤桃花夾岸魯門西若教月下乗舟去何啻風流到剡溪魯壁在孔子宅内宋王禹偁銘據山髙兮為秦城鑿池深兮為秦坑城之髙兮􅂚先壊坑之深兮曷先平伊斯壁兮藏家書匪秦亂兮猶不傾壊之者共王誦之者伏生發典謨訓誥之義振金石絲竹之聲如天地兮否而忽泰如日月兮晦而復明秦之焚兮未盡我不為燼秦之坑兮未得爾滅其國江海涸乾坤傾惟斯文兮用之不息手植檜在孔廟大成門北髙五丈餘圍一丈三尺宣聖手植者也晉永嘉三年枯隋義寜元年復榮唐乾封二年枯宋康定元年復榮金時燬其根亦為人所戕元至元三年復榮嶧山碑在嶧山上刻秦始皇東巡狩羣臣頌徳之詞丞相李斯篆宋元祐間摹於縣廨中名宦周伯禽周公旦之子旦封於魯伯禽繼之往治魯國變其禮革其俗晏嬰春秋齊景公時治東阿舉儉罰惰决獄不畏强貴請託不行貨賂不至名顯諸侯言偃魯武城宰以禮樂為教民皆感化有絃誦之聲巫馬期魯單父宰戴星而出戴星而入身親其勞而治田文戰國時相齊封之於薛號孟嘗君招致天下賢士食客常數千人荀卿戰國時為楚蘭陵令著書數十篇漢田叔魯相守正有禮度及卒魯以百金祠其少子仁不受曰義不傷先人名張敞山陽太守盗賊屏息郡内無事膠東盗起敞請自治書奏徵為膠東相乃令盗自相捕斬除罪吏民翕然國中遂平蔣詡兖州刺史以亷直稱王莽居攝詡以病免官王尊東平王相先是王驕奢不奉法尊以正事之曰天下皆言王勇王安能勇如尊乃勇耳王雅聞尊名髙大為尊屈相對酌酒極驩第五種兖州刺史時单匡為濟隂太守負勢貪放種乃委從事衛羽收其賓親糾發其賍州内震慄鍾離意瑕丘令善治猾吏後為魯相出私財修孔子廟視事五年以愛利為化民多殷富劉章平隂令章光武兄之子不為貴自驕在邑有善政王梁光武時救桃城破龎萌等拜山陽太守将兵如故周榮共令遷山陽太守所歴郡縣皆見稱秦彭山陽太守以禮訓人不任刑罰崇好儒雅敦明庠序百姓懐愛莫有欺犯鄭𢎞騶令政有仁惠魯國大旱騶獨致雨蝗起泰山不集騶境申屠剛以尚書令數切諫出為平隂令有治行袁安任城長吏民畏愛未幾三府舉安能理劇務遷楚郡太守劉祐任城令兖州舉為尤異遷揚州刺史李恂兖州刺史以清約率下常席羊皮服布被威名大振楊秉歴徐兖二州刺史計日受奉餘禄不入私門以亷直稱劉岱兖州刺史虚已愛物為士人所附黄巾盗入兖州岱擊之死於戰三國解修魏琅邪太守考績為天下第一晉江統兖州别駕舉薦郗鍳阮修程牧時以為知人南北朝邢邵魏西兖州刺史有善政桴鼔不鳴吏人姦伏守令長短無不知之民為立生祠勒石頌徳房謨魏兖州刺史選用亷清廣布恩信僚屬守令有犯必知雖號細宻百姓安之張華原魏兖州刺史有幹畧逹治體境内大賊及鄰州亡命者皆請華原歸欵及卒州人號慕鄭述祖繼其父道昭為兖州刺史有人入市盗布其父怒曰何故負吾君執以歸首述祖原之自是無盗百姓歌之大鄭公小鄭公相去十五載風教猶尚同崔伯謙北齊濟北太守富者禁其奢侈貧者勸課周給百姓歌頌隋薛胄兖州刺史到官繫囚數百剖斷如流時人號為神明城東沂泗二水南流汎濫胄堰令西注百姓賴之號為薛公豐兖渠唐宋璟兖州刺史以仁信為政吏民愛之裴耀卿濟州刺史郡當走集地廣户寡會天子東巡耀卿置三梁十驛科歛均省帝甚嘉之韋凑曹州刺史摧姦發㐲甚有政績馬總鄆曹濮節度觀察使在鎮一以簡靜為治吏民愛之劉光期夀張令以徳化致祥瑞之應縣人為之立石崔𢎞禮天平軍節度使屢以破賊功加檢校尚書左僕射殷侑天平軍節度自李師道亂賦税盡為軍資無輸王府者侑裁制經費嵗以錢十五萬緡粟五萬石歸有司烏重𦙍天平軍節度使威惠兼用吏氏懐之表列才能致之幕府鄭昈沂州刺史諭降賊李浩五千人令狐楚天平軍節度使始汴鄆帥每至以州錢二百萬入私藏楚獨不取又毁李師古園檻之僣制者五代郭瓊漢沂州刺史時盗賊蜂起瓊单騎赴部盗聞其威名相率遁去張暉周沂州刺史有善政既三年吏民詣闕舉留宋符彦卿天平軍節度使以寛惠得人心魏咸信知曹州時秋霖積潦决廣濟河隄以𨗳民之田無害畢士安開寳中為濟州團練推官專掌筦𣙜嵗課増羡改兖州觀察推官索湘開寶中鄆州司理叅軍齊州有大獄連逮者千五百人有司不能决湘受詔按鞫事隨以白安徳裕太平興國中知廣濟軍城新建徳裕作軍記及圖經三卷優詔嘉奨崔立知兖州嵗大飢募富人出榖十萬餘石賑餓者所全活者甚衆後又知鄆州姚鉉咸平中河决鄆州東南注鉅野入淮西城中積水壊廬舍以鉉知州事徙州於汶陽鄉之髙原陳堯咨通判濟州以氣節自任後知鄆州建請浚新河自魚山至下杞以導積水宋庠知鄆州以簡靜為治不務變更王臻真宗時知兖州剛嚴善决事所至有風績王堯臣知鄆州時京東多盗堯臣請便宜處决盗為少衰河决曹村去鄆尚逺堯臣急令築隄城下隄成水大至民免其患皆繪像祀之李迪知兖鄆二州所至有善政吏民喜其仁厚蔡齊通判兖州太守王臻治政嚴酷齊濟之以寛獄訟為之不寃王貽永知鄆州通衢宻邇梁山泊春夏病涉貽永相地築道人獲其濟劉顔任城主簿嵗飢發大姓所積粟活數千人李迪知兖州辟為從事㓂凖通判鄆州召對稱㫖試左正言直史館謝濤真宗時知曹州屬縣賦税多輸睢陽助兵食百姓以霖潦苦於轉送濤奏留漕賦由廣濟河以饋京師詔從之陳知㣲京東轉運副使奏還東平監所侵民田六百八十家又决古廣濟河通運路罷夾黄河嵗減役夫數萬王曽咸平中通判濟州後又知鄆州興學校輟俸金以助其費富弼仁宗時夏竦中以飛語弼求補外宣撫河北還又出知鄆州賈同通判兖州天聖初上書言自祥符以來丁謂造符瑞以欺先帝今謂姦既白宜明告天下正符瑞之謬杜衍知兖州時州縣官有累重而素貧者以公租及公帑均給之量其大小咸使自足有侵漁者責之韓𤦺知鄆州京東素多盗捕法以百日為三限限中不獲抵罪𤦺請獲他盗者聴比折除過故盗多獲吴奎知鄆州逹於從政應事敏㨗治績著稱龎籍知鄆州治以愛民為主明習法令僚屬言有可取雖文書已行立為改易司馬光從龎籍辟通判鄆州盡心郡事劉䕫知鄆州發廩賑飢民賴全活者甚衆盗賊衰息賜書褒諭李及通判曹州治尚簡嚴州有持郡長短縱為姦利者及以状聞斬于郡市後又知鄆州王徳用知曹州先是嘗為御史中丞孔道輔所劾會道輔卒客有謂此害公者徳用曰渠以職言事豈害我者可惜朝廷亡一直臣陳希亮知曹州先是寃句盗起盡刼張郭鎮希亮至曹不逾月悉擒其黨州以無事范諷知廣濟軍河决民避水堤居凡給徭於官者諷悉縦使䕶其家奏除其租賦吕公著皇祐中知單州率五鼔起秉燭親案牘黎明出㕔决民訟賓僚至者無拘時以故郡無留事下情易通為政不嚴而肅張奎知鄆州時京東盗起奎至數月捕諸盗悉平甚有治迹杜紘知鄆州獄繋囚三百人紘至旬日處决立盡鄆嘗有掲幟著妖言期為變者俄草塲白晝火或請大索紘笑曰妖計正在是屹不動未幾獲為妖者誅之滕甫神宗時知鄆州民有爭田久不决者甫奏請以為學田遂絶其訟又賑濟流民所全活五萬許将知鄆州上元張燈吏籍為盗者繫囚将曰是絶其自新之路也悉從遣之自是無一人犯法三圄皆空鄆俗士子喜聚肆以謗官政将雖弗禁其俗自息趙概知鄆州以寛厚待吏民吏按前守侵公使錢三十萬當以職田租償概知其貧為代以己俸許幾知鄆州梁山濼多盗皆漁者窟穴幾籍十人為保使晨出暮歸否則以告輒窮治無脱者李璋知鄆州京東盗白日殺畧人璋信賞罰擒捕盗為衰止調夫修路數十里夾道植栁人指為李公栁劉敞知鄆州撥遣簿書决平獄訟境内清正盗賊屏息道不拾遺先是旱蝗敞至而雨蝗自出境曾孝寛熙寜中知鄆州州有孟子廟無封爵孝寛請於朝封鄒國公從弟孝亷亦嘗知是州劉攽知曹州曹為盗區重法不能止攽曰民不畏死奈何以死懼之至則治尚寛平盗亦衰息後又知兖州孫鼛知曹州徙鄆州邑人子為草祭之謡指切蔡京鼛以聞京怒使言者誣以他謗罷之程振徽宗時提舉京東路學事請立廟於鄒祀孟軻以公孫丑萬章樂正克等配食從之王靚知東平襲慶守張漴使郡人詣闕請登封靚諫以京東嵗凶多盗不當請封為政者不悦将罪靚以工部侍郎虞奕言得免郭永東平府司録叅軍府事無大小永咸决之吏有不能辦者私相靳曰爾非郭司録耶金鄒谷大定中同知曹州軍州事有吏才以課最聞後又為沂州防禦使雷淵至寜中為東平録事河朔重兵所在驕将悍卒倚外敵為重自行䑓以下皆摩撫之淵出入軍中偃然不為屈不數月間里間多畫淵像尋遷東阿令完顔弼至寜中知東平府事元兵圍城弼百計應戰久之乃解圍去弼治東平愛民省費井邑間軍民無訟有古良将風馬驤貞祐中為濟隂令元兵克曹州驤被執不屈死之元嚴實東平路行兵萬戸開府布政養老尊賢子忠濟襲職所行一法其父治為諸道第一姚樞世祖時東平宣撫使置勸農檢察二人以監之推物力以均賦役罷鉄官張晉亨權知東平府事東平貢賦率倍他邑迎送供億簿書獄訟日不暇給厯七年吏畏而民安之胡祗遹至元中濟寜路總管上八事於樞府樞府是之以其言著為定法時濟寜移治鉅野遹選郡子弟擇師教之親為講論治以最稱張炤至元中知兖州事時州境亢旱吏民懇禱不雨炤始至甘雨霑足屬邑有吏肆為暴炤繩之以法杖出境外民害遂息齊顯榮東平路總管府叅議時攻淮南道出東平民間供給費銀二萬錠顯榮精得折充賦税民賴以不困梁宜知嶧州嘗曰為政之要有三謹民政肅宫規崇教本某嘗以是自勵韓仲睴夀張尹時黄河水溢為患仲睴開會通河以洩之民得安堵汪澤民兖州知州孔子後衍聖公襲封職三品澤民建議謂宜陞其品秩以示褒崇先聖之意廷議從之董搏霄濟寜路總管理寃獄革弊政才譽著稱於時李徳麟知單州恪勤奉公築堤濬河民賴其利彭庭堅至正初沂州同知爭毁牛皇神祠驅隣郡賊免民横急徵歛民甚便之張伯玉郯城尹亷公有為抑强扶弱民甚徳之本朝鄭剛兖州知府禀性剛直蒞政亷勤官至工部侍郎蕭寛兖州知府寛厚公正吏不忍欺民樂其政尋陞湖廣左布政使黄哲洪武初東阿知縣勤於為政寛以撫衆流離之民咸復其業曹體仁洪武間東平知州亷慎公平教民以禮讓撫字有方嘗有詩曰三年短髪憂民白一寸忠心為國丹去後民猶思之狄崇洪武中濟寜左衛指揮使開設衙門創造城池尋陞廣東都指揮使未幾特命統兵鎮守雲南没於王事令有司送𦵏濟寜遣行人諭祭刻石墓前張仁洪武間東平知州勤於撫綏以秩滿去州民奏稱其亷慎公勤陞河間知府王季立洪武間東阿知縣秩将滿知府鄭剛薦其歴練老成政學兼備邑民奏其清亷直幹守法奉公咸乞留之史誠祖洪武間汶上知縣守已亷公勤於撫字興學校勵風俗由是政清訟簡民繁土闢累以秩滿民輙奏留永樂中賜勑褒之賚以上尊織金紗衣楮幣在任二十九年政聲益著陳葵洪武末任單縣知縣持身亷謹好士愛民逺近稱之潘時正永樂中濟寜州同知存心公恕長於撫字建言開通河道自濟寜直抵臨清朝廷嘉之至今漕運頼其利朱珤永樂間鄒縣知縣公勤亷幹賦役均平秩滿邑民奏留者再卒於官民思慕之貝恒永樂中知東阿縣甚得民心在縣十餘年嵗無不登有薦其堪任風憲者耆老百餘人詣闕乞留從之後卒於任鄉人士女日會哭者數百人宫志永樂間魚䑓知縣為人亷能善於撫字後以秩滿邑人再四奏留之沈固宣徳間知沂州公亷仁愛政有善績官至户部尚書省志顧俊宣徳間授滕縣丞亷明剛正不畏權豪尋陞臨清知州行李蕭然士論重其清介省志王黼正統間知嶧縣亷明仁惠興學勸農招撫流亡復業者萬餘口教民種植多獲其利秩滿民奏留復任九年及去民立石頌徳省志張慶天順間知嘉祥縣重農桑務教化流民復業者三百餘家後改章丘民泣留者以干計既去立徳政碑省志龍俊天順間知金鄉縣亷明仁恕吏不敢欺蝗不入境去後民為立碑省志張浩天順間同知曹州亷明剛毅抑豪强毁􅁋祠修舉廢墜興學養士州佐之賢稱為第一省志孫賓成化間知定陶縣興學舉廢惠政及民遷員外郎民立石頌之省志王範成化間由刑部員外郎出知東平州政尚寛厚悉知民隠戸役稱平民有相訟者率以事理曉諭多化之秩滿民奏留得復任仕終右布政省志王肅𢎞治初知曹縣愛民重士修城郭隄防民賴其利省志康友惠正徳間為郯城縣典史值流賊攻城友惠以死捍禦民賴以安立祠祀之省志流寓温子昇太原人徙寃句為學精勤博覧羣書文章清婉仕魏為散騎常侍濟隂王暉業嘗云江左文人宋有顔謝梁有沈任今我家有子昇足以當之蘓源明本京兆武功人少孤來家于兖工文辭有重名唐天寳初第進士累官至秘書監燕肅宋益都人父峻慷慨任俠楊光逺反時率其屬迎符彦卿遂家曹州肅舉進士累官龍圖閣直學士知鄧州以禮部侍郎致仕孫奭本博平人徙居鄆之須城仕宋為龍圖閣待制真宗嘗問天書奭曰天何言哉豈有書也仕終太子少傅子瑜以䕃補官累遷兩浙轉運使韓忠彦相州人𤦺之子仕宋累官尚書左僕射徽宗用其言數下詔蠲逋責收用忠直之士而曽布為右相多不協言事者助布排忠彦謫官濟州居住孟祺宿州符離人父仁業儒有節行寓濟州魯䑓褀早知問學東平嚴實辟掌書記元初擢應奉翰林文字從巴延南伐宋平陞嘉興路總管以疾歸東平卒追封魯郡公謚文襄申屠致逺其先汴人金末從其父義徙居夀張仕元累官淮西江北道亷訪僉事清修苦節耻事權貴聚書萬卷名曰墨莊所著有任齋稿及釋奠通禮等書夾谷之竒其先金源人徙家滕州受業東平康􅁮為濟寜教授累官贊善大夫遷翰林直學士吏部尚書之竒明於治體為文章簡嚴有法多傳於世張孔孫隆安人父之純為東平萬戸府叅議生孔孫長以文學名元世祖時累官翰林學士承㫖孔孫尤善琴工書精於騎射立朝讜言有可觀者士論服之人物周展禽魯人居栁下仕魯為士師三黜而不去人問之曰直道而事人焉往而不三黜枉道而事人何必去父母之邦卒謚曰惠孟子稱其不羞汚君不辭小官進不隱賢必以其道弟展喜嘗犒齊師諭以先王之命齊侯愧服孔子其先宋人六世祖孔父嘉之子奔魯遂為魯人父叔梁紇母顔氏禱於尼丘生孔子因名丘少習禮容適周見老子回弟子益進適齊景公欲以尼谿田封孔子晏嬰沮之退而修詩書禮樂魯定公以孔子為中都宰一年四方皆則之進為司空復為大司冦三月而誅少正夘齊懼與魯會於夾谷孔子攝行相事遂歸所侵之田還墮三都齊人饋女樂而孔子適衛歴聘各國復歸魯正樂晚而喜易因魯史作春秋年七十三卒弟子心䘮三年魯追謚尼父漢追謚宣尼公後周追封鄒國公唐追封文宣王宋加至聖元加大成自漢以來皆封其後本朝益尊崇之世封其後為衍聖公擇其後之賢者世知曲阜縣顔無繇魯人孔門弟子孔子始教而受學焉後世累封曲阜侯顔回無繇子孔門弟子天資明睿聞一知十居十哲之首年二十九髪盡白三十二而卒孔子哭之慟曰天喪予歴代累封兖國復聖公首配孔子廟庭本朝官其後為翰林院五經博士閔損魯人孔門弟子以徳行稱損早喪母父再娶生二子繼母嫉損冬月衣以蘆花絮父察知之欲逐其母損曰母在一子寒母去三子单父善其言而止母亦感悔遂成慈母孔子稱之曰孝哉閔子騫人不間於其父母昆弟之言後世追封費公冉雍魯人孔門弟子寛洪簡重居徳行科孔子稱其仁而不佞可使南面後世追封薛公冉耕魯人孔門弟子以徳行稱有疾将死孔子甚痛惜之曰斯人也而有斯疾也後世追封鄆公冉求魯人孔門弟子居政事科孔子嘗曰求也藝於從政乎何有仕為季氏宰後世追封徐公宰予魯人孔門弟子以言語稱智足以知聖人嘗曰以予觀於夫子賢於堯舜逺矣仕為臨菑大夫後世追封齊公仲由卞人孔門弟子有政事才聞過則喜勇於為義片言可以折獄仕衛死難後世追封衛公林放魯人嘗問禮之本孔子以時方逐末而放獨能有志於本故稱之曰大哉問後世追封長山侯樊須魯人孔門弟子嘗兩問仁知又嘗問崇徳修慝辨惑孔子屢因其失而告之後世追封益都侯澹䑓滅明武城人状貌甚惡持身正大令施諸侯孔子聞之曰以貌取人失之子羽子羽滅明字也後世追封金鄉侯公西蒧魯人孔門弟子為魯邦之望後世追封徐城侯有若魯人孔門弟子嘗論孝弟為仁之本禮之用和為貴孔子卒弟子以其似孔子欲以所事孔子者事之後世追封平隂侯鄭國魯人孔子弟子有令徳後世追封朐山侯商瞿魯人受易於孔子後代追封須昌侯秦非魯人孔門弟子樂善慕道後世封華陽侯曾㸃南武城人孔門弟子天資髙明嘗對孔子言志曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸孔子喟然歎曰吾與㸃也後世追封萊蕪侯漆雕徒父魯人孔子弟子嗜學涉道後世追封髙苑侯榮旂魯人孔門弟子務學篤實後世追封厭次侯冉孺魯人孔門弟子勤學好問後世追封臨沂侯顔之僕魯人孔門弟子鋭志尊道後世追封寃句侯顔髙魯人孔門弟子得其微言後世追封雷澤侯邽巽魯人孔門弟子志存正大後世追封髙唐侯縣成魯人孔門弟子學出羣類後世追封武城侯顔噲魯人孔門弟子學已成器後世追封濟隂侯漆雕哆魯人孔門弟子學道亹亹不倦後世追封濮陽侯申棖魯人孔門弟子孔子嘗言吾未見剛者或以棖對孔子謂棖也慾焉得剛後世追封上蔡侯施之常魯人孔門弟子其徳甚著後世追封乘氏伯加封臨濮侯公祖句兹魯人孔門弟子有令儀後世追封即墨侯伯䖍魯人孔門弟子儒行著稱後世追封沐陽侯南宮适魯人孟懿子之兄謹於言行一日常三復白圭之詩孔子稱其邦有道不廢邦無道免於刑戮以其兄之子妻之後世追封汝陽侯叔仲會魯人孔門弟子進學廣業後世追封博平侯商澤魯人孔門弟子涉覧六籍後世追封鄒平侯公西赤魯人孔門弟子能習禮樂孔子嘗使之言志對曰宗廟之事如會同端章甫願為小相焉後世追封鉅野侯宓不齊魯人嘗宰單父所父事者三人兄事者五人友十一人鳴琴不下堂而邑治孔子稱之曰君子哉若人魯無君子者斯焉取斯後世追封單父侯奚容箴魯人孔門弟子有文采志氣堂堂後世追封濟陽侯冉季魯人孔門弟子勤於講道後世追封諸城侯左人郢魯人孔門弟子心悦聖道後世追封南華侯申黨魯人孔門弟子言動克謹後世累封淄川侯顔辛魯人孔門弟子學業有就後世累封陽榖侯孔鯉孔子之子嘗趨庭受詩禮之訓先孔子卒後世累封泗水侯孔忠孔子兄之子後世累封鄆城侯以上俱從祀孔子廟庭曾參㸃子師事孔子踐履篤實天性至孝悟一貫之㫖得道統之傳述大學一篇為教人之法後世追封郕國宗聖公配享孔子廟庭孔伋鯉子為魯穆公師公問可以利民者曰毁不居之室以賜民奪嬖寵之禄以賑困匱無令人有怨愁而後世有聞見也作中庸以述道統之傳後世追封沂國述聖公配享孔子廟庭孔白伋子博通羣書仕齊威王為相公儀僣魯人砥功礪行樂道好善恬於榮利不事諸侯子思與之為友公儀休魯人相穆公嘗㧞園葵出織婦奉法循理無所變更百官自正使食禄者不得與下民争利受大者不得取小孟子戰國時騶人受業子思之門人道既通㳺梁齊以仁義説其君不能用退與萬章之徒序詩書述仲尼之意作孟子七篇後世累封鄒國亞聖公配享孔子廟庭本朝官其後為翰林院五經博士然友戰國時滕人為滕世子侍滕定公薨世子使之問喪於孟子孔斌孔子六世孫魏王聞其賢聘以為相秦伐趙魏以為便斌曰吾聞燕雀處室呴呴相樂竈突炎上棟宇将焚不知禍之将及已也相魏凡九月務陳大計不用乃喟然曰言不見用居官食禄是尸位素餐矣遂辭以疾秦孔鮒孔子九世孫博通經史秦始皇并天下召為魯國文通君遷少傅丞相李斯始議焚書鮒聞知收其家論語尚書孝經等書蔵於舊宅壁中隱居嵩山漢叔孫通薛人為博士説髙祖起朝儀采古禮與秦儀雜就之始用於長樂宫自諸侯王以下莫不震肅帝曰吾今日乃知為皇帝之貴拜通為太常賜金五百斤徙太子太傅孔貞孔子十世孫該習古今有髙尚之志徵為博士封褒成侯彭越昌邑人常漁鉅野澤中陳勝項梁起少年相聚請越為長收諸侯散卒得千餘人沛公擊昌邑越以兵助之自是為漢逰兵擊楚卒敗項羽於垓下以功封梁王申培公魯人少事齊人浮丘伯受詩髙帝過魯申公以弟子從師入見武帝使使以束帛加璧安車蒲輪迎之至則以為太中大夫武帝問治亂之事對曰為治不在多言顧力行何如爾後以病免歸髙堂生魯人嘗論禮學仕為博士周仁任城人以醫見景帝拜郎中令帝時問人仁曰上自察之然亦無所毁羣臣賂遺終無所受武帝立為先帝臣重之病免以二千石禄歸老子孫咸至大官江公瑕丘人受詩書春秋於申公以詩授韋賢以春秋授榮廣子孫皆為博士武帝尊公羊春秋詔太子受之太子私問榖梁於江公而善之孔安國孔子十二世孫申公弟子治古文尚書承詔作傳武帝朝為諫議大夫以文章政事名當時夏侯始昌魯國人通五經以齊詩尚書教授自仲舒韓嬰死後武帝得始昌甚重之始昌明於隂陽先言柏梁䑓災日至期日果灾為昌邑王太傅以夀終夏侯勝始昌族子少孤好學從始昌受尚書及洪範五行傳嘗曰士病不明經術經術茍明取青紫如拾地芥宣帝朝為諫議遷太子太傅王式東平新桃人為昌邑王師以詩朝夕講授至於忠臣孝子反覆誦之至於危亡失道之君未嘗不流涕為王深戒後昌邑王廢式得減死論歸家韋賢魯國鄒人質材篤學號稱鄒魯大儒累官大鴻臚宣帝立以與謀議賜爵闗内侯位至丞相封扶陽侯子𤣥成亦以明經位至丞相故諺曰遺子黄金滿籯不如教子一經于定國東海郯人父于公為縣獄吏有隂徳定國累官廷尉當時稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃後拜相封西平侯子亦為御史大夫丙吉魯國人為廷尉監宣帝生數月坐衛太子事繫獄吉擇謹厚女徒保養之及帝即位吉不伐功後知之封博陽侯拜相吉尚寛大知大體於官屬務掩過揚善世稱其賢魏相濟隂定陶人地節中拜相嘗白去副封以防壅蔽時宣帝厲精為治練羣臣核名實而相總領衆職甚稱上意蔚為一代賢相封髙平侯孟喜東海蘭陵人父孟卿善為禮春秋以授后蒼疏廣喜從田王孫受易由是易有施孟梁丘之學舉孝亷為郎曲䑓署長龔遂山陽人為昌邑王郎中令王有不正遂率諫諍王掩耳起走宣帝即位渤海盗起命遂為渤海太守单車至郡勸民農桑民皆賣劒買牛賣刀買犢境内大治號為循吏王望琅邪人為貴州刺史值嵗荒便宜發倉廩賑饑民事畢上言朝廷以望不先表請欲議罪鍾離意言望懐義忘罪不宜䋲之以法乃赦之孔覇孔子十三世孫昭帝時為博士後為元帝師賜爵闗内侯子光仕為博士遷尚書典樞機守法度修故事累官至丞相孔均孔子十六世孫好學有大才乎帝時封褒成侯王莽以為大尉三以疾辭得還史丹魯人徙杜陵以父䕃為駙馬都尉侍中詔䕶太子家元帝寢疾欲易太子丹直入卧内伏青蒲上涕泣固諫太子得不易及即位封丹闗内侯檀敷瑕丘人家貧而行清立精舍教授逺方至者數百人仕至䝉令家無産業子孫易衣而出後舉方正遷議郎鄭𢎞泰山剛人與兄昌俱明經通法律昌為􅃰郡太守𢎞為南陽太守皆著治迹後𢎞官至御史大夫后蒼東海郯人從孟卿受禮記説禮數萬言號后氏曲䑓記授戴徳又事夏侯始昌兼通齊詩授蕭望之宣帝朝為博士官至少府馬宫東海戚人治春秋嚴氏以射策甲科為郎師丹薦其文行遷廷尉平青州刺史汝南九江太守所在見稱徵為詹事拜大司徒代孔光為大師封扶徳侯朱雲魯人徙平陵倜儻有大節以論易折五鹿充宗為博士成帝朝為槐里令上書曰願借尚方斬馬劒斬佞臣張禹上大怒欲斬之御史將雲下雲攀折殿檻大呼曰臣得下從龍逢比干逰於地下足矣遂得免疏廣東海蘭陵人仕至太子太𫝊兄子受官至太子少傅在位五年廣謂受曰知足不辱知止不殆宦成名立如此不去懼有後悔乃上疏乞骸骨上許之公卿大夫設祖道供張東都門外送者車數百兩道路觀者皆曰賢哉二大夫貢禹琅邪人以明經潔行著聞徴為博士歴凉州刺史去官元帝時徴為諫大夫上書勸上節儉遷御史大夫蕭望之東海蘭陵人徙杜陵素有重望仕至太子太𫝊宣帝疾篤受遺詔輔政領尚書事元帝即位望之以師傅見重多所匡正後為𢎞恭石顯所害子育官至南郡大守匡衡東海承人累官至太子少傅朝廷有政議輙引經以對言多法義數上書陳便宜後拜相封樂鄉侯子咸亦明經歴位九卿家世多為博士陳湯山陽瑕丘人仕為郎使外國矯制發兵斬郅支單于後賜爵闗内侯西域都䕶段會宗為烏孫所圍朝用湯議解其圍眭𢎞魯國蕃人少時好俠長乃變節以明經為議郎遷符節令元鳯中泰山大石自立上林苑僵栁復起𢎞推春秋意以為當有從匹夫為天子者霍光惡之下𢎞獄死後宣帝興於民間即位徵𢎞子為即王章泰山鉅平人以文學為諫大夫在朝有名敢直言累遷京兆尹劾大将軍王鳯為鳯所害諸葛豐琅邪人以明經為郡文學元帝擢為司𨽻校尉刺舉無所避京師語曰間何濶逢諸葛上嘉其節加秩光禄大夫時外屬許章貴幸奢淫豐奏劾之上不納免其官薛宣東海郯人累官御史中丞數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黑分明出更外任皆有政績後為丞相封髙陽侯毋將隆東海蘭陵人成帝朝為諫大夫上封事遷冀州收累官至京兆尹王莽秉政隆不附免官徙合浦王良蘭陵人王莽時隱居教授建武初累官至大司徒司直在位恭儉妻子不入官舍以禮進止朝廷敬之後以病歸詔復其子孫丁恭山陽東緡人習公羊嚴氏春秋學義精明教授生徒恒數百人當世稱為大儒官至諫議大夫魏應任城人明經修行弟子自逺方至著録數千人永平初為博士會諸儒於白虎觀講論五經同異肅宗甚重之寒朗魯國薛人舉孝亷守侍御史章帝時考察楚獄理出千餘人累遷至大尉范式山陽金鄉人㳺太學與張劭為友並告歸式約曰後二年當過拜尊親乃共克期日至期劭白母殺雞炊黍待之至日果到陳子平亦同在學病臨終謂妻曰范巨卿可託既死式為營喪䕶至臨湘累官荆州刺史曹褒魯國薛人父充治慶氏禮官至侍中褒傳父業為博士朝廷欲制定禮樂拜為侍中褒博物識古為儒者宗鄭均東平任城人好義篤實累官至尚書數納忠言章帝重之後以病乞骸骨歸帝東巡過任城幸其第賜尚書禄以終身孔僖魯國人孔子後自安國以下世傳尚書魯祖子建與崔篆善及仕王莽勸子建仕子建答以各從所好僖仕肅宗為蘭䑓令史從幸闕里帝曰今日於卿有光僖曰陛下崇禮先師増輝聖徳至於光榮非所敢承帝大笑曰非聖門子孫安有斯言王龔山陽髙平人為青州刺史劾奏貪濁二千石數百人遷汝南太守政崇温和好才愛士後進知名之士莫不歸心累官至太尉子暢以清實稱累官至司空魏覇濟隂句陽人世有禮義覇少舉孝亷和帝時為鉅鹿太守以簡朴寛恕為政椽吏有過先誨其失不改者乃罷之官至太常張儉山陽髙平人延熹間為東部督郵劾中常侍侯覧家所為不軌覧誣以事遂亡命建安初徴為衛尉儉見曹氏漸興乃闔門懸車不與政事度尚山陽湖陵人為上虞長為政嚴峻明於發擿奸非吏人謂之神明後以討賊功累官至遼東太守封右鄉侯仲長統髙平人少好學博涉書記贍於文辭為尚書郎每論及時事恒發憤歎息因著論名曰昌言孔融孔子三十世孫為北海相立學校表儒術獻帝都許召拜太中大夫融髙談清教可玩而誦名重當時值漢室之亂志在靖難黙才疎意廣訖無成功曹操忌其威望害之何休任城契人質朴呐口而雅有心思精研六經世儒無及者嘗作公羊墨守左氏膏肓穀梁廢疾除北新城長大作講舍聚生徒數百朝夕自往勸講儒化大行劉表山陽髙平人魯恭王之後為荆州刺史時冦賊塵沸表招誘有方威懐兼洽劉虞東海郯人初遷幽州刺史民夷感其徳化後為大司馬進封侯務存寛政都督農植民悦年登青徐士庶避難歸虞者累百萬口程昱東阿人漢末保東阿歸曹操累遷都督兖州事卒謚肅侯嘗勸操因兖州三城以圖伯業策袁紹必禽公孫瓚孫權必不殺劉備無不中者三國王粲龔子暢之孫博物多識問無不知蔡邕竒其才畧聞粲在門則倒屣迎之後仕魏累官至侍中所著有詩賦董昭濟隂定陶人初事袁紹歸曹操勸操挾天子令諸侯卒成伯業拜司徒嘗上疏陳末流之弊卒謚定侯凉茂山陽昌邑人仕魏歴泰山魏郡太守又為甘陵相所在有績位終太子太傅文帝尊禮之滿寵山陽昌邑人仕魏累立戰功官至太尉寵不治産業家無餘財詔賜田四十頃榖五百解錢二十萬以表清節諸葛亮琅邪陽都人豐之後漢末避難居南陽徐庶謂劉先主曰諸葛孔明卧龍也先主凡三往問計延為軍師先主即位拜丞相後主時封武鄉侯任賢養民通呉平蠻嘗作八陣圖上出師二表北伐曹魏卒於軍謚忠武諸葛瑾亮兄事孫權使蜀與亮公朝相見退無私面常與權論説諫諭但粗陳指歸如有未合則舍而及他徐復託事造端以物𩔖相求於是權意往往而釋累遷大将軍封宛陵侯諸葛誕亮兄事魏為吏部郎人有所屬輙顯其言而用之後有當否則公議其得失以為褒貶自是羣僚皆慎所舉官至御史中丞諸葛恪瑾子少有才名仕吴官至太傅原逋減税衆莫不悦每出入百姓延頸思見其状諸葛瞻亮子少聰慧累遷尚書僕射蜀人咸喜其才敏後魏鄧艾伐蜀遣人誘降瞻斬使出戰而死王郎東海郯人漢末遭亂雖流移窮困朝不謀夕而收恤親舊行義甚著曹操表徴之歴事文明二主屢上言勸育民省用諫射獵興造官至御史大夫司空封樂平鄉侯王肅朗子仕魏官至崇文觀祭酒景初間宫室盛興上疏極諫出為廣平太守徴還遷散騎常侍光禄勲卒謚景侯所著有諸經傳註子恂立朝忠正歴官河南尹侍中王弼山陽人察惠通辨仕魏補䑓郎嘗著老子及周易年二十四卒李典鉅野人仕魏累立戰功封都亭侯典好問學貴儒雅不與諸将争功敬賢士大夫恂恂若不及軍中稱其長者卒謚愍侯劉楨東平人以文章見重於魏文帝與王粲等號建安十子吕䖍任城人仕魏為從事将家兵守湖陵及泰山有平敵功且有惠愛遷徐州刺史加威虜将軍晋馬隆東平人少而智勇好立名節以平凉州封奉髙縣侯積十餘年威振隴右唐彬魯國鄒人敦悦經史尤明於易教授恒數百人有經國大度仕為廣武将軍與王濬同平吴封上庸縣侯領雍州刺史魏舒任城樊人少為外家寗氏所養寗氏起宅相宅者云當出賢甥舒曰當為外氏成此宅相武帝朝拜司徒郗詵濟隂單父人博學多才不拘細行舉賢良對策第一嘗對武帝曰臣猶桂林一枝崑山片玉帝笑官至尚書左丞王雅肅曽孫祖隆後将軍父景大鴻臚雅舉秀才累遷尚書左右丞歴廷尉侍中左衛将軍敬慎奉公朝廷大議多參謀議遷左僕射卒贈光禄大夫子凖之協之少卿皆至顯官並有士操茍晞山陽人東海王越討汲桑晞為先鋒破羣盗威名甚盛時人以擬韓白進位都督青兖諸軍事練於官事决斷如流從母子犯法晞斬之既而素服流涕曰殺卿者兖州刺史哭弟者茍道将道将晞字卒封東平侯王祥琅邪臨沂人性至孝事繼母極恭謹母欲生魚時天寒水凍祥解衣将剖氷求之氷忽自解雙鯉躍出嘗為徐州别駕率兵討冦州郡清靜政化大行晉初拜太保進公爵王覽祥異母弟母朱遇祥凶虐覽年數嵗見祥被楚撻輙涕泣抱持其母少止覽孝友恭恪名亞於祥後仕至太中大夫劉超臨沂人元帝時為舍人處身清苦每賜與皆固辭後拜中書侍郎右衛將軍蘇峻謀逆遷帝於石頭超步侍左右雖幽厄中猶啟授孝經論語未幾為峻所害王戎覽姪父渾凉州刺史戎㓜頴悟與阮籍為竹林之逰後襲父爵以平吴功進安豐縣侯累遷尚書令劉卞東平人少為縣史入大學試經為䑓四品吏訪問令寫黄紙一鹿車卞曰劉卞非為人寫黄紙者也或謂卞曰君才簡畧堪大不堪小不如作守舍人卞從其言後累遷并州刺史王衍戎從弟戎嘗曰衍神姿髙徹如瑶林瓊樹自然風塵物表為元城令終日清談而縣務亦理累遷至司徒後為石勒所害弟澄少歴顯位仕終軍諮祭酒繆播蘭陵人才思清辨為中書令專掌詔命盡忠於國為東海王越所害王𨗳覧孫元帝為琅邪王與𨗳素相親善及鎮下邳以為安東司馬軍謀宻䇿知無不為後東遷累官至太傅封始興公兄敦反以大義滅之出入将相戮力王室晉之中興𨗳力為多魏浚東阿人為度支校尉永嘉末浚東保河隂所得榖麥悉獻之於懐帝仕至河南尹王舒𨗳從弟官至揚州刺史以軍功封彭澤縣侯從弟廙仕至輔國将軍散騎常侍孔衍孔子二十二世孫少好學年十二能通詩書元帝引為安東叅軍掌記室書令殷積而衍亦以稱職見知虞溥髙平昌邑人察孝亷為鄱陽内史大修庠序招生徒移告屬縣勉勵於學為政嚴而不猛風化大行嘗註春秋經𫝊撰江表𫝊及文章詩賦數十篇卞壼濟隂寃句人父𤣥仁為中書令兄弟六人並登台輔壼弱冠有名譽官至尚書令與庾亮同心輔政及蘓峻犯順壼扶疾與戰不克而死二子眕盰相隨赴賊同時見害峻平追贈侍中謚曰忠貞二子皆贈官郗鑒髙平金鄉人博覧經籍躬耕壠上吟詠不勌為車騎将軍與王𨗳卞壼等同受遺詔輔少主位至司空加侍中子愔有邁世風仕至會稽内史愔子超卓犖不覊仕終司徒左長史郗隆金鄉人直亮有匪躬之節為尚書左丞在朝為百僚所憚後為揚州刺史為陳留王邃所害父子皆死時議惜之諸葛恢誕孫弱冠知名晉末遭亂避地江左王𨗳嘗謂曰明府當作黒頭公遷會稽太守政績第一加侍中王允之舒子總角知名從伯敦使隨已敦嘗夜飲允之辭醉先卧敦與錢鳯謀逆允之悉聞其言慮敦或疑己便於卧處大吐時其父舒始拜廷尉允之求還定省至都以敦議白舒即與𨗳俱啟明帝後以討賊功封番禺縣侯卒謚曰忠王彪之廙子累官尚書右僕射簡文帝崩羣臣疑惑未敢立嗣當須大司馬處分彪之正色曰君崩太子代立大司馬何容得異於是議定後遷尚書令與謝安共掌朝政王羲之𨗳從子以骨鯁稱善書為古今之冠論者稱其筆勢飄若㳺雲矯若驚龍仕至右軍将軍會稽内史子凝之徽之獻之遂居會稽並有盛名何無忌東海郯人忠亮任氣為太學博士後為廣武将軍桓𤣥簒位與劉裕等起義兵與𤣥戰𤣥敗走以興復功封安成郡開國公後以戰失利握節死謚忠肅顔含琅邪莘人顔子二十七世孫有操行成帝朝累官侍中嘗有問百僚宜為王𨗳降禮者含曰王公雖重理無偏敬既而告人曰吾聞伐國不問仁人今有問佞於我者我豈有邪徳耶郭璞欲為之筮含曰自有性命無勞蓍龜南北朝虞丘進東海郯人少從謝𤣥討符堅封闗内侯人從宋武帝征伐有功封龍川縣侯時盧循逼都廷議奉天子過江進不可面折孟昶武帝嘉之除鄱陽太守義熙中以功封望蔡縣男宋受禪進爵為子檀道濟髙平金鄉人仕宋參建武将軍府事遷太尉參軍説武帝北征所至望風降附封永修縣公丹陽尹文帝即位進位司空鎮夀陽道濟立功當時威名甚重後為朝廷所疑見收怒曰壊汝萬里長城劉兆東平人宋時辟公府三徴博士皆不就安貧樂道潛心著述作春秋調人等書百萬餘言王𢎞琅邪臨沂人少好學以清悟知名仕宋有安社稷功封建安郡公進位太保領中書監孔鮮孔子二十六世孫恢廓有大度好學博覧宋元嘉中封崇聖侯乘二十七世孫博學有才藝魏延興中封崇聖侯王僧逹臨沂人少好學善屬文仕宋累官至中書令子融文辭㨗速有所造作援筆可待仕齊位至中書郎王曇首𢎞弟仕宋為鎮西長史武帝謂文帝曰曇首輔相才也及帝即位累遷太子詹事子僧綽位至吏部尚書僧虔雅善𨽻書仕南齊官至左光禄大夫王誕臨沂人少有才藻仕宋為輔國将軍何承天東海郯人博通古今尤精歴數仕宋領著作郎朝廷每有疑議必先訪之時𤣥武湖得古銅斗衆皆不識承天曰此新莽威斗三公亡則賜之江左惟甄邯為大司徒此必甄之墓也既而果然官至御史中丞王裕之臨沂人性恬靜樂山水仕宋官至尚書令固讓求歸改授侍中武帝幸治亭餞之徐羡之東海郯人沉宻寡言憂喜不形仕宋累官司空揚州刺史封南平郡公居廊廟人所推重從孫湛之善尺牘官至尚書僕射顔延之臨沂人文章冠絶當時仕宋官至太常延之與謝靈運齊名時稱為顔謝子竣孝武時為金紫光禄大夫李安人蘭陵人宋時率衆南歸明帝大敬曰卿面方如田封侯相也南齊時位至尚書左僕射出為吴興太守有清名王肅臨沂人涉獵經史頗有大志仕南齊奔魏禮遇日加除輔國大將軍累立戰功遷揚州刺史頻年在邉悉心撫綏逺近歸附清身好施冡無餘財桓康蘭陵承人隨南齊武帝起兵摧堅䧟陣江南人畏之畫其形可愈瘧疾後封吴平縣侯終驍騎将軍王僧孺東滓郯人有聰慧頴異性極孝年七嵗能讀十萬言及長善屬文工楷𨽻多識古事仕南齊累官中書侍郎王智深臨沂人為南齊豫章王大司馬參軍奉勅撰宋紀三十巻周盤龍北蘭陵人膽氣過人仕南齊為右將軍以破魏功進大司馬後進爵為侯仕終散騎常侍光祥大夫檀超金鄉人少好文學自北晉郗超仕南齊為國子博士兼左丞顔見逺博學有志行仕南齊為御史中丞及梁武帝受禪見逺發憤不食數日而卒帝聞之曰我自應天從人何預天下士大夫而顔見逺乃至於此何逺東海郯人初仕南齊梁武帝踐祚封廣興男歴宣城太守累遷給事黄門侍郎公清為天下第一凡典郡所至為立生祠王褒臨沂人識量淹通博覧史傳十嵗能屬文仕梁官至左僕射位望隆重愈自謙抑時論稱之徐勉東海郯人㓜孤貧勵清節仕梁為吏部尚書嘗與客夜某有求詹事五官者勉正色曰今夕止可談風月不宜及公事累官至左僕射中書令卞華壼六世孫博涉有機辨説經折理為當時之冠仕梁官至尚書儀曹郎徐摛郯人少好學善屬文仕梁為晉安王侍讀嘗詔問經義諸史應答如響遷新安太守為政清靜卒贈侍中謚曰貞子陵八嵗能文十三通老莊義官至中書監顔協臨沂人顔子三十四世孫少以器局稱博涉羣書工於草𨽻飛白不求顯逹恒辭徴辟僅為梁湘東王記室而已其子之推嘗作顔氏家訓顔晃臨沂人好學有辭采下筆立成介然修立為世所知仕梁入陳累遷散騎常侍中書舍人卒贈司農卿謚曰貞子徐伯陽東海人敏而好學善色養家有史書所讀者近三千卷仕梁為新安知府諮議叅軍事聞姊喪發疾卒何敬叔東海郯人為長城令清亷不受禮遺夏節忽榜門受賄數日得米二千餘斛他物稱是悉貸貧民輸租子思澄勤學工文化梁為武陵王録事叅軍與宗人遜及子朗俱擅文名時人語曰東海三何子朗最多鹿愈濟隂乗氏人好兵書隂陽釋氏之學仕魏為黄門侍郎孝莊嘉其清遷尚書左僕射張景仁濟北人㓜孤家貧以學書為業遂工草𨽻選補内書生周武成令侍書遂被引擢小心恭謹後主登祚累遷通直散騎常侍隋鮑宏東海郯人父機仕梁宏㓜孤湘東王引為中記室累遷散騎侍郎江陵平歸周為學士累遷遂伯下大夫及平山東賜爵平遥伯隋文帝受禪進爵為公唐李勣曹州離孤人客衛南從髙祖太宗征戰所至有功拜同中書門下最後伐髙麗破其國裂其地進太子太師封英國公王雄誕曹州濟隂人膂力絶人杜伏威之起用其計戰多克以前後功授歙州總管宜春郡公伏威入朝以兵屬雄誕雄誕愛人善撫士每破城邑無秋毫犯死之日江南士庶為流涕髙祖嘉其節以其子世果襲宜春封太宗時謚曰忠程知節濟州東阿人從太宗征伐搴旗先登者不一以功封宿國公改封廬國公終岐州刺史賈敦頥曹州寃句人仕歴數州刺史性資亷潔入朝常盡室行車一乘弊甚羸馬䋲覊道上不知其刺史也與弟敦實先後刺洺州人皆為之立碑號為棠隶碑張公藝夀張人九世同居髙宗封泰山還幸其宅問曰何為九世不分公藝書忍字百餘以對顔師古琅邪臨沂人顔子三十七世孫校定經史註班固西漢書修五禮成進子爵終秘書監銀青光禄大夫𢎞文館學士其弟相時累官為諫議大夫有爭臣風王難得沂州臨沂人健於武工騎射天寳初為河源軍使吐蕃贊普子恃趫敏挑戰難得挾矛躍馬直斬其首𤣥宗壮其果召授金吾将軍後以收復京師封琅邪郡公子子顔檢校衛尉卿子用封太原郡公顔杲卿師古五世孫為常山太守安禄山反杲卿起兵討賊河北諸郡響應已而賊将引兵至城下杲卿舉兵纔八日以城守未備而䧟賊将執至洛陽殺之杲卿罵不絶口顔氏死者三十餘人顔真卿杲卿從弟博學工書事親以孝聞舉進士累官平原太守安禄山反河朔盡䧟惟平原城守具備事聞𤣥宗曰朕不識真卿何如人所為乃若此累遷尚書右丞李希烈䧟汝州朝廷遣真卿往諭之不屈被害劉晏曹州人𤣥宗封泰山晏八嵗獻頌帝竒其㓜即授太子正字累遷京兆尹總大體不苛代宗立拜相領常平使理財甚有績效後為楊炎所誣賜死天下以為寃李自良兖州泗水人天寳亂往從兖鄆節度使以戰多累授右衛率為人勤且有謀從馬燧討田悦攻李懐光數履鋒䧟陣功在諸將右貞元中以檢校工部尚書充河東節度使居治九年民不知有軍上下諧附卒贈左僕射吕元膺鄆州東平人姿儀瓌秀有器識仕至蘄州刺史嘗録囚囚或泣曰父母在明日嵗旦不得省為恨元膺悉釋械而歸之戒還其囚果如期而至累遷太子賓客居官始終無訾缺伊慎兖州人通春秋戰國策天官五行書用善射為折衝都尉屢立戰功拜蘄州刺史封南兖郡王貞元末為奉義軍節度憲宗即位以兵付其子宥身入朝拜尚書左僕射五代王彦章夀張人善用鎗人謂之王鉄鎗仕梁為招討使出竒取勝名聞敵國後為唐莊宗所執不屈而死閻寳鄆州人仕唐為招討使梁唐戰胡栁唐軍敗莊宗欲退保臨濮寳曰夫决勝料勢决戰料情今梁兵窘蹙其勢可破勝而驕怠其情可知莊宗乃整軍復戰遂敗梁兵房知温兖州人唐莊宗時拜泰寜軍節度使歴鎮天平平盧廢帝立封東平王子彦儒拜沂州刺史顔衎顔子後梁進士歴官簿令皆有政績入晉知沂州聞父有風痺疾即棄官歸侍親掬父矢未嘗少倦召為工部郎中累轉御史中丞後歸宋官至兵部尚書致仕王晏徐州滕人少壯勇應募𨽻唐禁軍晉開運中戌陜州契丹南侵歸漢為綘州防禦使周封滕國公宋封韓國公以太子太師致仕王朴東平人周舉進士為校書郎嘗獻平邉策累遷户部侍郎樞宻副使及卒世宗臨其喪以玉銊叩地大慟和凝鄆州須昌人梁時舉進士歴漢周官至太子太傅封魯國公嘗知貢舉所取皆一時之秀稱為得人宋趙隣幾鄆州須城人五代周舉進士入宋直史館遷左補􅊴知制誥為文浩博慕唐四傑體有文集及所補唐武宗以來日厯等書張進曲阜人拳勇善射挽强及石餘初應募選補控鶴軍太宗時累遷并代副都部署適李繼遷㓂靈州進不待詔㫖即發兵赴援手詔褒美孔宜孔子四十四世孫祖光嗣唐末泗水主簿父仁玉九嵗通春秋為曲阜令宜舉進士不第乾徳中詣闕上書述其家世詔以為曲阜主簿襲封文宣公累遷殿中丞太宗嘗賜詔稱其服勤素業砥礪亷隅宜生延世襲封其次子曰憲曰朂皆中進士第張荗直兖州瑕丘人父延昇以經術教授鄉里荗直淳至寡言勵志於學開寳中舉進士為海州推官太宗朝累官秘書少監出知頴州子成列進士及第翟守素濟州任城人父溥晉左司禦率府率守素仕周歴供奉官入宋累官劍南十州都巡檢使太宗時為天雄軍兵馬鈐轄知大名府歴内職五十餘年性謹慎寛仁容粟所至有治績梁顥鄆州須城人雍熙初進士第一累官翰林學士風姿粹美閨門雍睦與人交久而無改有吏才每進對詞辨明敏真宗嘉賞之所著有文集十五卷張齊賢曹州寃句人兵亂徙家洛陽太祖幸西都齊賢以布衣獻策上還語太宗曰我幸西都唯得一張齊賢爾異時可使為相太宗朝舉進士慷慨有文畧累官吏部侍郎同平章事進右僕射以司空致仕卒謚文定王能廣濟定陶人事太宗於晉邸及即位累遷殿前右班都虞候真宗時為鎮定副都部署兼知定州後為彰信軍節度卒謚太尉夏侯嶠其先幽州人髙祖秀徙家鉅野嶠善詞賦淳謹無過太宗朝舉進士累官翰林侍讀學士卒後畢士安拜相每歎曰若夏侯君在此位吾豈得而據也有集十五卷王禹偁鉅野人九嵗能文太宗朝舉進士為右拾遺嘗獻端拱箴及禦戎十䇿文章獨步當時累遷翰林學士出知滁州移蘄州所著有文集五十餘卷子嘉祐為館職嘉言第進士官至殿中侍御史曽孫份進士甲科仕至戸部侍郎魏能鄆人材勇過人為殿前都虞候真宗朝為威虜軍部署契丹再入㓂皆戰破之徙知莫州及定邉軍皆有破敵功官至康州團練使呂祐之濟州鉅野人太宗朝舉進士歴知襄夀昇州累官工部侍郎翰林侍讀學士所著有文集三十卷馬尋鄆州須城人舉毛詩學究累判大理寺以明習法律稱歴廣東淮南兩浙轉運使歴知湖汝襄鄧滑等州襄州飢人或羣入富家掠囷粟獄吏鞫為强盗此脱死爾情與强盗異奏得减死論著為例終司農卿梁固顥子㓜有志節初以顥䕃賜進士出身舉服勤詞學科擢甲第累官著作郎直史館為人俊爽慷慨尚氣義明於吏道嘗詔鞠獄時稱平審天禧大禮成奏頌甚工有集十卷梁適顥子少孤輯顥制詔并自為文以獻真宗曰梁顥有子矣授秘書省正字後舉進士累官同平章事加太子太傅卒謚莊肅孫子美有才幹仕至開府儀同三司柴成務曹州濟隂人父自牧能詩舉進士官至兵部員外郎成務博聞稽古有詞學登進士甲科歴官中外皆有能名真宗時遷至給事中終判尚書刑部有文集二十卷任中正曹州濟隂人父載右拾遺中正舉進士嘗代張詠知益州遵詠條教蜀人便之累官叅知政事仁宗時加至禮部尚書卒謚康懿任中師中正弟舉進士累官知益州康定中召為樞宻副使尋以知政殿學士知永興軍後以太子太傅致仕卒謚安惠中師性樂易自奉儉約晚知養生術號大塊翁王博文曹州濟隂人年十六善屬文舉進士為安豐簿有能名真宗時累官同知樞宻院事子疇舉進士為太常博士仁宗獵近郊疇引十事以諫英宗時拜樞宻副使性介特厲風操𩔖其父云傅堯俞鄆州人十嵗能文未冠舉進士為監察御史行時仁宗春秋髙皇嗣未立堯俞請建宗室之賢者神宗時拜中書門下侍郎及卒宣仁太后曰傅侍郎金玉君子也嗟惜久之孔道輔孔子四十九世孫父朂舉進士通判廣州後以工部侍郎致仕道輔亦舉進士為寜州推官累遷御史中丞仁宗時㐲閣争廢后事出知秦州徙兖州未幾復為中丞遇事彈劾不避權貴出知鄆州孔宗旦魯人為邕州司戸叅軍儂智髙未反時州有白氣出庭中宗旦以為兵象度智髙必反以告知州陳珙珙不聼及智髙反州破被執賊欲任以事宗旦大罵遂被害顔復顔子四十八世孫父太初以名儒為國子直講嘉祐中訪有道之士京東以復應詔賜進士知永康縣元祐中累官至國子祭酒子岐建炎中累官至門下侍郎穆修鄆州汶陽人真宗東封賜進士累官潁州文學叅軍徙蔡州修性剛介寡合自五代文敝宋初栁開始為古文其後復尚聲偶修獨以古文稱所著有詩書序記誌等數十首嘗𫝊數學於李挺之至邵雍遂大顯郭勸鄆州須城人舉進士累官殿中侍御史仁宗時廢郭后議立陳氏勸諫曰郭氏非有大故不當廢陳氏非世閥不可以儷宸極疏入后已廢而陳氏遂議寢官至侍讀學士子源明累官職方員外郎梁燾鄆州須城人父蒨兵部員外郎燾舉進士累官右諫議大夫上書言市易青苗法不便御史張舜民不當以言事左遷元祐中拜尚書左丞好賢樂善每以引援人物為意後以元祐黨貶雷州卒贈少保謚忠肅李師中楚丘人舉進士歴知濟兖二州有政績累官河東轉運使以言時政得失坐貶終於南京奉祠師中落落有竒節不容于時晁補之濟州鉅野人宗慤曽孫才氣飄逸嗜學不倦蘓軾稱其博辨雋偉必顯於世舉進士以禮部郎中知泗州自號歸來子弟詠之蘓軾見其詩文稱為竒才舉進士官至京兆府司録卒有文集五十卷馬黙城武人舉進士為監察御史𠂻行數上書諫争出知登州累遷戸部侍郎以寶文閣待制再知徐州黙長於治民所至有治最劉潛曹州定陶人少卓逸有大志好為古文舉進士知蓬萊縣代還過鄆州母疾亟歸母死一慟遂絶其妻哭潛亦死時人傷之曰子死于孝妻死于義燕度曹州人父肅禮部侍郎度登進士第知陳留縣年飢盗發勸邑豪出粟以濟民又行保伍法以察盗善状日聞後累官右諫議大夫知潭州度有心計慶厯中三司請𣙜河北塩度言川陜不禁酒河北不禁塩此祖宗制也議遂寢子英靖康初知河陽金兵南侵遇害李叅鄆州須城人以䕃屢更外任喜發摘奸伏不假貸事至即决雖簿書纎悉不遺時稱能吏累官至尚書右丞孔宗翰道輔子氣貌渾厚事親孝登進士第知仙源縣歴知䖍陜揚洪兖州皆以治聞元祐中累官刑部侍郎以寳文閣待制知徐州未拜而卒竇卞曹州寃句人第進士通判汝州適役兵叛卞招諭撫定之歴知深州河决擅發常平粟賑流民吏恐獲罪卞曰吾寜以一身活數萬人累官天章閣待制判昭文館榮諲濟州任城人父宗範知沿山縣諲舉進士累官廣東轉運使因板步古河路險絶為作棧道通之改京東民有私採銀砂者安撫使欲以刼論諲持不可貸免甚衆後以集賢修撰知洪州龔鼎臣鄆州須城人景祐初進士累官同知諫院屢上疏論事其言和平不峻激使人主易曉退亦未嘗語人故其事多施行後以正議大夫致仕李迨參曽孫入太學以䕃補官累遷通判濟州髙宗以大元師過濟迨辦軍須無缺會勸進乗輿儀物不日而辨建炎中除戸部侍郎金人歸三京以為京畿都轉運使或以金兵脅之迨曰吾世食宋禄首可斷膝不可屈也李邴濟州任城人崇寜中進士累官翰林學士辭命㨗敏髙宗時為兵部侍郎兼直學士時苗劉作亂邴面諭以逆順禍福之理及責賊黨以大義後拜叅知政事嘗條上戰守策卒謚文敏有草堂集一百卷畢再遇兖州人姿貌雄傑武藝絶人挽弓二石七斗背挽一石八斗以恩補官取泗州定旴􅇇完楚州皆以勇智立竒功累官左驍衛上将軍卒贈太師謚忠毅王師道兖州人任吉州栗傅岩巡檢與盗戰每射輙斃追擊數里遇有伏㓂挺身力戰死事聞立廟其地官其二子馬伸東平人紹聖中進士為西京法曹欲依程頥門以學時學徒盡逐頥固辭伸曰使伸得聞道死亦無憾卒受中庸以歸靖康初擢監察御史汴京䧟張邦昌僭立伸以書責之邦昌氣沮乃迎孟太后垂簾髙宗即位擢殿中侍御史撫諭湖廣誅邦昌等還奏黄潛善汪伯彦責監濮州酒税卒金趙渢東平人舉進士仕至禮部郎中性冲澹學道有所得尤工書時人以配黨懐英號曰黨趙自號黄山所著有黄山集商衡曹州人以特恩第一人為威戎令民飢能賑敵至能禦民為立生祠累遷監察御史時哀宗郕國夫人與政内族慶山奴軍敗戸部權尚書曹强貪墨衡皆舉劾無所避後為秦藍府經歴元兵刼欲降之不屈自剄李演任城人進士第一除應奉翰林文字居憂值亂墨衰為濟州刺史畫策集兵搏戰三日兵潰被執欲降之不屈遂遇害贈濟州刺史侯摯東阿人明昌初進士入官慷慨有為嘗以尚書右丞行省河北上言宜開沁水以便饋運從之盗起詔摯行省事於東平終平章政事封蕭國公致仕孔端甫孔子四十八代孫明昌初學士黨懐英薦其年徳俱髙讀書樂道該通古學召至京師特賜及第除将仕郎小學教授以主簿奉致仕孔璠孔子四十九代孫宋襲封衍聖公端友弟端操之子天眷中詔求孔子後加璠承奉郎襲封衍聖公奉祀事璠卒子拯襲拯卒弟揔襲揔卒子元措襲後歸元以終焉任天寵曹州定陶人明昌初進士歴考城主簿威戎令泰安軍節度判官皆有善政累遷國子祭酒中都路都轉運使中都戒嚴粮運艱阻天寵悉力營辦曲盡勞瘁遷户部尚書中都不守走南京道遇兵死之謚純肅賀揚庭曹州濟隂人累遷監察御史轉山東提刑改陜西轉運使所至以亷能稱張萬公東阿人正隆初進士颺歴中外累遷叅知政事封夀國公卒謚文貞萬公淳厚剛正門無雜賓典章文物多所裁正輔政八年所引多亷讓之士王去非平隂人嘗就舉不得意即屏去督妻孥耕織以給伏臘家居教授束修有餘輙分惠人弟子班忱貧不能朝夕一女及笄去非為辦資裝嫁之北隣有喪忌東出西北皆人居南則去非家去非壊蠶室使南出髙霖東平人大定中進士累遷國史院編修官論黄河之决當别開河以殺其勢從之官至兵部尚書叅知政事中都留守兵亂死之謚文簡王廣道平隂人有文學不求仕進鄉里化服號為醇徳先生黨懐英尤亟稱之從弟明道文學與兄齊名大定間以醫試第一入翰林元王鶚曹州東明人㓜聰悟日誦千言金正大初進士第一累官尚書郎中從金主於蔡蔡陷幾被殺以萬戸張柔救免世祖即位首授翰林學士承㫖知制誥典章制度皆所裁定卒謚文康所著有論語集義及應物集孔思晦孔子五十四世孫資質端重而性簡黙讀書講求義理不事詞章家貧躬耕以為養雖劇寒暑而為學弗懈逺近争聘為弟子師襲封衍聖公修理廟庭請加封宣聖父為啟聖王母為王夫人卒謚文肅王玉汝鄆人少習吏事耶律楚材見而竒之元初授東平路奏差官遷平隂令有惠政累遷泰定軍節度使以病謝事杜門日以經史自娱强起為行䑓叅議視事僅五六日裁畫署置煥然一新張雄飛沂州臨沂人世祖召見陳當世之務授同知平陽路轉運司事處士羅英嘗稱為真公輔器雄飛請建儲貮及御史䑓累官至叅知政事世祖以其剛直亷慎賜銀數百兩李稷滕縣人八嵗能記誦經史泰定中進士累官中書叅知政事後出為山東亷訪使為人孝友恭儉亷慎忠勤出入䑓省三十年始終無疵卒謚文穆王閠東平須城人父老而貧不甘淡薄每食必需魚肉閠勤苦營奉無闕甚得歡心父嘗卧疾然長明燈室中火延籬壁間閏聞火聲驚起馳救煙燄已蔽寢戸閏突入抱父出肌體灼爛而父無少傷中統初復其役苖好謙城武人為司農丞勤於職務著農桑輯要行于世官至河南江北行中書省叅知政事商挺曹州濟隂人工詩文善𨽻書從世祖征伐屢建大議世祖稱為古良将官至中書叅知政事卒追封魯國公謚文定所著有詩千餘萹子琥徵拜中䑓監察御史遷國子司業所著有彛齋文集𤦺善書畫歴集賢侍講學士遷秘書卿李謙鄆州東阿人始就學日紀數千言為賦有聲世祖時召為應奉翰林文字成宗時官至集賢大學士嘗上疏以正心為首其文章醇厚有古風學者稱為野齋先生李之紹東平平隂人家貧教授學者咸集至元末以薦授國史編修姚燧欲試其才凡應酬之文積十餘事并以付之之紹援筆立成燧驚服焉延祐中遷國子祭酒後遷翰林侍講學士自號果齋有文集藏于家楊桓兖州人為秘書監丞有得玉璽於穆呼哩曽孫家者桓辨其為歴代𫝊國璽即為文述其本末上之又上時務二十一事成宗嘉納官至秘書少監為人寛厚篤孝博覧羣籍尤精篆籀之學王思誠滋陽人徙汶陽天資過人力學弗懈至治初舉進士歴監察御史累疏時政皆見嘉納出僉河南山西道亷訪司異蹟著聞累遷禮部尚書集賢學士國子祭酒卒謚獻肅張昉汶上人父汝明金進士官至治書侍御史昉仕元為中書省左司郎中甄别能否公其黜陟人無怨言損益古今裁定典憲累官至兵部尚書卒追封東平郡公謚荘憲曹元用汶上人資禀俊爽書過目輙成誦為禮部主事時皇后既崩者猶以名稱元用請加徽號遷太常禮儀院經歴裁定郊祀儀注及鹵簿輿服之制陞翰林直學士卒封東平郡公謚文獻有超然集十卷李泂滕州人有文名以姚燧薦授國史院編修官遷待制以養親辭歸文宗召至著書輔治篇以進又預修經世大典累官翰林直學士晚年僑居濟南泂骨骼清峻如神仙中人為文揮筆思態疊出有集四十卷馬紹金鄉人從上黨張播學嘗知單州民刻石頌徳累官中書右丞有言事者平章事欲罪之紹曰國家𨗳人使言今重罪之豈不與詔書戾乎乃止執政數年時稱其賢仕終河南行省右丞有詩文數百篇王構東平人風度凝厚學問該博以詞賦中選至元中為國史院編修宋亡構被㫖至杭取三館圖籍太常禮器儀仗凡薦㧞皆名士累遷翰林學士承㫖所著有文集子士熈士㸃皆能以文學世其家士熈官至南䑓中丞王旭東平人以文章名當代與王磐王構號為三王李昶東平須城人與父世弼同登金進士第世弼為東平教授昶為嚴實都事世祖召見知無不言眷遇隆盛累官翰林侍講學士吏部尚書昶務持大體不事苛細所著有春秋左氏遺意及孟子權衡遺説趙天麟東平人以布衣進太平金鏡策八卷評商政事切於當時其他詩文尤多辛有常汶上人以儒道鳴山東仕至河南山西道宣慰使樊執敬濟寜鄆城人擢授經郎嘗見帝師不拜或問之曰吾知尊孔氏而已至正中為江浙行省叅知政事時劇賊攻城執敬率衆出戰奮力斫賊因中鎗而死事聞追封魯國公孫撝曹州人至正初進士授濟寜録事遷集賢待制時張士誠據髙郵撝往諭之士誠囚撝使降撝詬斥之士誠百計馴擾終不可得乃殺之事聞贈曹南郡公謚忠烈顔瑜顔子之後以行誼薦為鄒縣教諭至正中山東盗起瑜擕家走鄆城道遇賊知其為書生使之寫旗瑜罵曰爾為叛逆我豈為爾寫旗賊刺殺之妻子皆遇害本朝師逵東阿人以國子生擢監察御史陞陜西按察使歴兵吏二部侍郎尋陞户部尚書兼吏部事卒賜祭𦵏逵有徳量為時所重于睿陽穀人由太學生歴官克慎累遷湖廣布政司左叅政張本東阿人以國子生授江都知縣陞揚州知府繼陞江西叅政皆有治聲召為工部侍郎以事謫交阯起為刑部侍郎治獄平恕後陞兵部尚書兼掌都察院事復兼太子賓客卒賜𦵏祭復其家劉文平隂人洪武中由舉人擢監察御史激揚有聲尋陞浙江按察司副使趙臨汶上縣人由太學生久歴仕途官至浙江布政司左叅政王麟魚䑓人由太學生歴官刑部郎中勤能著稱薦陞湖廣布政司左叅政宋亮魚䑓人洪武中以通經舉薦歴官有能聲仕至福建布政司左叅政馬貫單縣人以才學超卓舉任監察御史冇直聲官至江西布政司叅政韓克忠城武人洪武中登進士第擢翰林院修撰學行淳實累官至河南按察司僉事歐陽恭城武人以耆老有才徳洪武中擢陜西布政司叅政子規由太學生歴官河南按察司僉事賈諒嶧縣人永樂中鄉舉擢刑科給事中正色敢言朝廷重其為人委以糾察事情務存大體歴陞都察院右副都御史敭歴中外聲譽大振尋卒于官劉廸沂州人永樂中由鄉舉歴官以才能見推官至陜西按察使王晟鄆城人以進士任刑部主事陞浙江按察司僉事時温處盗起晟預征伐死之事聞遣官諭祭贈江西布政司左叅議官其一子張琛東平州人永樂中由舉人擢衢州府同知有孝行父没廬墓三年正統中轉吏部文選郎中尋陞福建左布政使卒于官李秉曹州人正統中登進士為監察御史累官左都御史整飭邉征勦建州三衛夷㓂克揵回京陞太子少保兼吏部尚書省志孔公恂孔子五十八代孫舉景泰中進士授禮科給事中賞先邉戍弊革侵漁歴遷左春坊左諭徳省志秦紘單人景㤗中舉進士以劾中官忤時貴屢謫屢危而屢獲免歴官都御史陞户部侍郎進尚書紘正直剛方節摡凛凜為時名臣祀鄉賢祠省志侣鍾鄆城人成化間進士仕至戸部尚書為一時名臣省志魏紳曲阜人母卒廬墓稱孝後舉成化中進士拜刑部主事轉郎中多所平反遷都御史嵗旱奏减民税築邉墻増墩堡上賜璽書文綺官至侍郎省志云孟鳯曲阜人兄麟成化進士官陜西布政有聲鳯舉𢎞治中進士拜監察御史陞懐慶知府歴都御史摠制北方邉塞寜輯轉督漕事值徐淮大水武廟親征鳯區畫有方民不勞費累遷刑部尚書卒贈太子少保省志列女無鹽女姓鍾離名眷貌醜嫁不售乃自詣齊宣王陳時政王納以為后於是退讒説納直諫開四門進衆賢齊國中興諸侯來朝秋胡婦魯人秋胡納婦五日逰于陳五年乃歸見道傍有美婦方採桑秋胡子悦之與之金婦不受秋胡子至家見婦即採桑者婦曰悦桑下婦人而忘其母是不孝也妾不忍見不孝之子遂投河而死義姑戰國時魯人齊師伐魯及郊見一婦人抱一兒携一兒軍至棄小者抱大者而走軍問故婦人曰大者亡兄之子小者妾所生也軍義之與食而去漆室女戰國時魯漆室邑之女過時未適人倚柱而嘯鄰婦曰何嘯之悲曰憂吾君老太子㓜鄰婦曰此卿大夫之憂也曰不然魯國有患君臣父子被其辱婦人獨安所歸乎鄭孝女宋瑕丘人父神佐為官兵戰死慶州時母已亡無他兄弟鄭翦髪毁服䕶喪還鄉與母合𦵏手樹松栢成林詔旌其閭董氏女滕縣人許適劉氏子建炎初盗攻剽悦其色欲亂之曰汝不從當剉汝萬段女終不屈遂斷其首劉氏子聞之大慟曰烈女也𦵏之為立祠彭氏東平人徐順妻與曹州鄭臘兒妻康氏並以早寡不忍獨生以死從夫事聞悉旌表之楊氏東平須城人郭三妻夫戍襄陽揚留事舅姑以孝聞至元初夫死母欲奪嫁之楊號痛自誓乃已夫骨還楊自經死與夫共𦵏焉王氏鉅野人馬善輕妻夫殁守節終身洪武十七年旌表貞節省志齊氏名淑賢山西代州人適寜陽許超超舉鄉試及卒無子齊守節終身景泰間事聞旌表省志髙氏城武人王俊妻天順三年夫卒與其妾蔣氏同縊於柩側三人同穴而𦵏旌曰雙烈省志李徤妻王氏曹州人徤舉鄉試卒王為不食而死成化二十年詔旌表之省志孫氏濟寜州人錢官保妻年十九夫殁于軍骸骨孫即自縊死正統十一年旌表之省志趙氏名巧雲曹縣人郭憲妻夫卒守節正徳六年流賊入其家欲汚之趙曰吾孀居十八年矣今豈受汚辱按劍厲聲誘之終不從死于旌表省志孔彦臣妻王氏曲阜人正徳六年遇賊死節旌表時流賊猖獗凡經剽掠地女婦以守節不汚而受旌表者比比此不及殫紀詳具于省志云趙氏汶上人張鳯翥妻嘉靖五年夫疾語趙曰汝年少雖有女不可恃以終身慎圖之趙為徉荅夫曰迷亂将絶趙即縊死頃之夫復蘓家人語之夫遂瞑目使合𦵏焉旌表省志仙釋王逺東海人即方平舉孝亷歴官中散大夫後棄官入山修道既成漢桓帝連徵不出俾郡國逼載至京閉口不語乃題四百餘字於宫門皆言方來事削去復見後還鄉居太守陳耽家四十餘年舉家無恙一日忽語耽曰吾期運當去耽知其化具棺衾歛之忽失其尸衣冠不動若蝉蜕耳于吉瑯瑘人精苦修道忽得痼疾晨夕告天誠感老君令仙翁授吉經曰非但愈疾當得長生化行天下吉得之疾遂除凡消災治疾無不騐者後老君數降親授其㫖孫䇿平江東将士多病請吉噀水輙差天久旱乃縛吉暴日中即大雨策忌而殺之俄失其尸周旋人間又百餘年仙去徐則隋東海郯人㓜沉靜寡欲受業於周𢎞正精於議論懐棲隠之操入縉雲山常服巾褐又入天台山因絶穀養性所食惟松水而已後尸解趙棠曹州人宋時棄官隠居番禺汴京景徳寺有異僧曰志言人傳棠與志言數以偈頌相寄萬里間輙數日而逹棠死值盛夏其身不壊海印泰安州人居鄒縣大明禪院㓜悟道常夣異僧指示一旦呼弟子謂曰吾幻身不堅非久住世親書偈畢端坐而化三日慈容如生其院上紫霧光明貫於天際邑令見之嘆為真佛侯谷神沂州道正貎古形臞酷慕神仙黄白之術一日鶉衣道士入觀中少話間袖出丸藥一粒賜谷神啖之年逾八十有五羽化值嵗時盛暑沐浴罷别諸弟子枕肱而逝月餘不聞其臭省志吴守一蘭陵人早為黄冠師後從淵然劉真人授以鍊度秘術入瑯琊神峯山之陽棲霞辟穀有年忽有道人入庵與語須臾袖中出茶一包遂烹與共啜出户少頃道士不見年逾九十鶴髪童顔羽化之夕竒香滿室白鶴遶空者移日云省志明一統志卷二十三
