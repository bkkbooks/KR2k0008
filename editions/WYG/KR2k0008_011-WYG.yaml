頼其利岑羲金壇令有治績尤以文著名武平一金壇令平一官中朝甚有名既謫令金壇而名不衰李元紘潤州司馬有惠民政代去吏民遮留烏鵲羣飛亦擁車行韓滉鎮海軍節度使綏輯百姓均租調不踰年境内稱治李希烈䧟汴州遣兵破走之漕路無梗完靖東南滉功居多齊澣潤州刺史以舟繞𤓰歩多風濤乃開伊婁河以逹揚子歲收利百萬舟免漂溺之患韋損潤州刺史吏人畏伏嘗修練塘以溉丹陽丹徒金壇之田民刻石頌徳閻濟羙潤州刺史浙西觀察使為治簡易常賦之外不知其他蕭定大厯中潤州刺史治最為天下第一陸象先潤州刺史政尚仁恕吏民愛之裴寛潤州叅軍刺史韋詵休日登樓見寛於後圃有所瘞詵問狀曰寛義不以苞苴汙家適有以鹿為餉置而去不敢自欺故瘞之詵乃引為判官及妻以女杜祐潤州法曹叅軍初祐過潤州刺史韋元甫待之不加禮他日元甫有疑獄不能决祐在旁為辨處契要無不盡元甫竒之乃奏為法曹叅軍馬炫潤州刺史以淸白顯杜審言潤州刺史時徐州戍將寵勛大擾淮南審權以浙西兵破之進檢校司空宋栁開太平興國中知潤州有善政招誘羣盗以俸金給之又解衣與賊酋置之左右或謂不可開曰彼失所則為盗不爾則吾民也今推以赤心夫豈不可化未半嵗境内熙寧鄭向兩浙轉運副使疏潤州蒜山漕河抵於江人以為便王隨通判潤州後知州事練習民事有善政及民劉師道咸平中知潤州敏於吏事治有能聲吏民畏愛之范仲淹知潤州為政尚寛厚多有治跡吳中復慶厯中金壇令有治績王琪知潤州三莅郡政臨事精敏有訟立决民甚懷之張昪知潤州有報井中有死人者一婦人徃視之曰吾夫也昪令其親隣驗之井深不可辨昇曰衆皆不能辨婦人何以知其為夫即付所司鞠問果其婦與奸人同謀殺其夫時服其明許元知丹陽嵗大旱請假練湖水以溉民田不待報决之州遣吏按問元曰罪令可也由是溉田萬頃嵗大熟孫立節鎮江軍書記初為條例司屬官不肯奉行故出當時監司皆敬之曰是不肯為條例司官者王安禮知潤州當官持政遇事立㫁下不敢欺王覿知潤州嵗旱郡遣吏視苗傷承監司風㫖不敢多除稅覿受檄覆按歎曰民食已絶倒廩贍之猶懼不克濟尚可責以賦耶盡除之梅執禮知潤州有治跡徳惠及民劉子羽知鎮江府兼沿江安撫使金人入冦淮東之人皆徙鎮江子羽撫以恩信雖兵民雜居無敢相侵者沈與求知鎮江府金人將入宼與求奏請命將分屯江岸遣岳飛自上流取道乗虚擊之髙宗曰當如此措置張枃知鎮江府治材敏給遇事不凝滯能隨宜應變陳居仁知鎮江府時郡中大旱居仁區畫有方存活萬計因饑民治古海鮮港為石䃮丹徒境上蓄泄以時以通漕運董槐鎮江觀察推官尋又為通判㑹李全叛淮臨大江槐將兵濟江而西全乃遁去胡唐老知鎮江府建康失守潰卒戚方趣鎮江欲犯臨安唐老論以禍福方衆環脅之唐老怒罵遂遇害王萬通判鎮江府究心當世急務尤精于邉防數害當路多知其人豪也咨問者旁午汪綱鎮江司户叅軍時馬大同鎮京口強毅自任綱言論獨不詭隨多所裨益孫子秀知金壇縣嚴保伍釐經界與民休息訟者使賫諜自詣里正并隣證來然後行不實者徃徃自匿其諜淮民流入以萬計賑給撫䘏括田使耕教化大行蔡洸知鎮江府時乆旱郡民築陂瀦水溉漕司檄郡决之洸不從巳而大雨漕運通嵗亦大熟民歌之曰我瀦我水以灌以溉俾我不奪蔡公是頼王埜知鎮江府兼都大提舉浙西兵船請免鎮江水軍調發專一守江是冬揚子橋有警埜遣逰兵擊却之李成大徳祐初知金壇縣元兵至與寄居官潘大同大本率民兵巷戰大同兄弟戰死成大被執不降元兵殺其二子以懼之終不屈笑曰子為父死臣為君死卒見殺陶居仁鎮江錄事參軍元兵攻鎮江守臣洪起畏遁統制官石祖忠舉城降仁不屈屈遇害元張晉亨至元中從伯顔南征以總管戍鎮江兼與民政以鎮静為務戰焦山􅆶州皆有功張炤鎮江路總管蒞政有方吏民畏服以治最稱叚成珪鎮江路總管有德恵及民代去郡民立碑頌德太平鎮江路總管均賦革弊民頼以安曹元周鎮江路學正學問該博翰林承㫖閻復於四方土少許可而獨大竒元用薦為國史院編修官黄中金壇縣尹奏免邑人無徵之焉稅萬餘石又興水利邑民頼本朝繆大亨洪武初以同僉書樞宻院事守鎮江以嚴恪成士伍以簡重莅民人徐誼洪武中知鎮江府在任以亷介自守賄賂不行見事明敏人莫敢欺孔克忠洪武初為金壇縣主簿亷勤愛民隣邑嘗有劇盗入境克忠擒而戮之王秉彞洪武中知丹徒縣先是邑民倪遵道等十餘人專主案牘倚法害衆前吏莫能禁秉彛至首革之凡獄訟科差無不公平民咸徳之尋陞本府同知李思進洪武中為金壇縣丞惠愛及民以事逮赴京民不忍其去詣闕保留得復任朝廷遣使賫酒勞之羅觀洪武中初知丹徒縣以勤於撫民陞本府知府勤約自將作興學校風化日淳薛巗洪武末知鎮江府在任甘淡薄鋤擊豪强不避權勢劉辰洪武末知鎮江府重修減水牐以便舟楫築水門溉田四百餘頃民賴之顧信洪武末為丹陽縣丞修築練湖牐畜水溉田民至今得其利孫時洪武末知金壇縣革吏弊均賦稅興學校王貫永樂初為鎮江府同知以儉約自持吏民敬信博學明理同僚以師事之洗用行永樂初為鎮江府推官㫁獄平允甚得民心潘妥丹陽知縣亷謹有為民受其惠林鶚知鎮江府舉偏補弊清介不阿重祀典以勵風化遣先賢之後入鄉塾以教飬之濬京口以通舟楫至今人稱其功南畿志姚堂天順中鎮江知府政尚平易修舉廢墜集郡哲最著者彚其行履為潤州先賢錄以勵流俗南畿志劉觀成化初知金壇亷静公恕甚有惠政凡民間利病悉為興革之南畿志楊峻成化初知丹徒縣為政平恕深恤民隱嵗旱禱雨輒應優禮良善惟豪黠不少貸由是闔境稱治南畿志史系成化中知鎮江府髙才博識愛民節用處官事如家尤嚴祀典南畿志毛瑄成化間任府通判政尚清白吏不忍欺每按獄有犯辟者輒動色咨憫累日不懌後遷秩民頌之南畿志胡怡𢎞治中鎮江府推官聴獄詳審刑不輕試而多得其實有兄弟競財經年不决怡曉以義遂罷頌有令被誣為直其寃令懷金以謝怡正色拒之又專門易學郡士多所成就及卒貧無以殮寮屬為經理其喪南畿志李咨𢎞治中知丹陽縣寛雅尚文不事苛刻民犯細故皆輕恕之至豪强奸吏必痛治以懲被召瀕行百姓攀輓塞路南畿志流寓焦先河東人漢末隱居京口結草為廬冬夏袒露野火燒其廬先露處大雪不移蔡邕為之作賛俗誤以先為光祖逖范陽人寓丹徒晉元帝用為奮威將軍豫州刺史渡江中流擊楫自誓曰逖不能清中原而復濟者有如大江後果克復晉土進鎮西將軍劉毅沛人寓京口東晉末與劉裕同謀起義兵討桓𤣥破之封南平郡公進衛將軍歴轉江州都督何無忌東海人僑居丹徒東晉末以平桓𤣥功封安城郡公遷鎮南將軍將兵拒廬循敗績無忌厲聲曰取我蘇武節來躬執以督戰而死諡曰忠肅劉粹沛郡人其先隨晉元帝南渡因寓丹徒初為州從事累遷中軍咨議參軍宋武帝立以佐命功封建安縣侯劉穆之東莞人寓居京口為宋武帝所委任官至左僕射穆之内總朝政外供軍旅决㫁如流事無留滯檀道濟髙平人寓京口善將兵有機䇿宋武帝立以佐命功封水脩縣公丹陽尹進位司空後彭城王矯詔収之道濟怒曰乃壊汝萬里長城何承天郯人寓丹徒聰明博學劉宋拜尚書祠部郎撰朝儀遷御史中丞曽孫遜能賦詩江革考城人寓丹徒性孝友舉秀才隨梁豫章王鎮彭城為魏人所執命作碑文革不肯執筆後放回武帝嘉之除都官尚書人贈遺之一無所受徐勉郯人寓丹徒王儉每見之曰非常器也梁武帝拜中書侍郎嘗與門人夜集或有于以私者勉正色曰今夜止可談風月不宜及公事王僧孺郯人寓丹徒梁天監中拜中書侍郎俄兼御史中丞僧孺工屬文善楷𨽻多識古字尤精於譜學權臯天水畧陽人寓居丹陽唐舉進士第為臨清尉安禄山辟幕府詐死脫歸永王璘舉兵詭名以免𤣥宗嘉之擢監察御史顔真卿表為行軍司馬召拜起居舎人及著作郎俱不就卒贈太子少保權德輿臯之子歴官兵部吏部侍郎拜禮部尚書中書平章尋以檢校吏部尚書為東都留守復為山南西道節度使子璩為監察御史張祐唐南陽人僑居丹陽工於詩或薦之書奏不下受辟藩鎮性狷介輒自刻去愛曲阿山水幽勝遂築室種樹居焉沈彬髙安人隱居丹陽喜賦詩南唐主授以校書郎懇求還山以尚書致仕石延年幽州人僑寓丹陽范純仁奉父仲淹命運麥五百斛舟次丹陽見延年言三䘮未舉悉以與之延年任氣節為文勁徤而詩尤工仕宋終太子中允同判登聞鼓院蘇頌泉州人以父紳𦵏丹陽因徙居之仕宋為右僕射中書門下侍郎頌為相務在奉行故事杜僥倖之原沈括吳興人博學善文仕宋累官龍圖閣學士知延州以夏人䧟永樂城不能先援謫官以光禄少卿分司潤州辛次膺萊州人㓜孤從母依外氏王聖美於丹徒力學善詩文中進士宋孝宗朝累官御史中丞參知政事次膺立朝蹇諤為政貴清净仕宦五十年無絲毫挂吏議陸秀夫鹽城人徙家鎮江宋景定初進士性沉静不茍求人知李庭芝制置淮東擢參議官徳裕初以禮部侍郎使元軍請和不就而反與張世傑等立益王於福州益王殂又共立衛王於崖山累遷左丞相與世傑共秉政及崖山破秀夫度不能脫乃驅妻子入海即負王赴海死髙貴祥符人寓丹徒宋末髙郵知府後扈從之海上拜樞宻使與陸秀夫同死於海楊一清先世雲南人後家丹徒年十二以竒童薦入翰林弱冠登進士累官副都御史巡撫陜西平寘鐇之叛入為户部尚書改吏部進武英殿大學士内閣事罷歸武廟廟南巡親幸其第嘉靖初起為兵部尚書改吏部加少師賜銀章二以老乞骸奪官歸卒詔復其官南畿志人物漢包咸㑹稽曲阿人客於東海為赤眉所得晨夜誦經自若賊異而遣之光武中興歸鄉里舉孝亷除郎中入授太子論語累遷大鴻臚明帝即位以咸有師傅恩特加賜俸禄咸皆散與諸生之貧者左恢曲阿人官至尚書左丞京師稱其志髙後遷㑹稽太守三國韋昭雲陽人三國吳時累官封高陵亭戻昭自少勤學雖老不倦嘗撰吳書華覈曰昭在吳亦漢之史遷也子隆亦有文名唐桓彦範丹陽人武后末為中丞與張柬之等謀復中宗以定䇿功擢侍中封譙郡公時帝惑於後宫彦範上書諌帝不省未幾罷政事封扶陽郡王為武三思所誣貶瀧州司馬復遣人矯制殺之睿宗即位追復官爵諡忠烈周積金壇人永徽間四境盗起積糾合鄉人拒之衆寡不敵賊誘之從為亂積怒曰恨不斬汝萬段肯從汝為賊耶遂手刄數十人自刎死事聞于朝封爵立廟至今祀之馬懐素丹徒人舉進士累官左臺監察御史武后詔令按問魏元忠崔貞慎反狀使者促迫懷素執不從元忠等獲免開元初進昭文館學士與楮無量分日侍讀𤣥宗自迎以師臣之禮懷素篤學謙慎時人推為長者卒諡曰文施敬本丹陽人開元中為四門助教𤣥宗將封禪詔有司講求典儀舊制敬本歴陳古制最為詳悉遷太常博士集賢修撰終右補闕儲光羲丹陽人開元中登進士第召入中書試文章歴監察御史工於詩所著有詩集皇甫冉丹陽人十嵗能文張九齡嘆異之師事蕭穎士以文名天寳初舉進士授無錫尉累遷右補闕所著有詩集弟曾亦舉進士累官至殿中侍御史與冉齊名戴叔倫金壇人能詩賦守撫州刺史作均水法俗便利之詔書褒美封譙縣男加金紫服後遷容管經畧使綏徠夷落威名流聞徳宗嘗賦中和節詩寵之丁仙芝曲阿人舉進士為餘杭尉工詩郡人又有陶翰殷遥張潮皆以能詩聞于時後世編唐詩者徃徃采焉許渾丹陽人舉進士授太平尉遷監察御史歴睦郢二州刺史所賦詩號丁卯集五代吳淑丹陽人父文正好學事楊吳至太子中允淑㓜有俊才韓熙載潘佑稱為中林蘭蕙嘗聞以唐太宗杜淹論樂異同淑曰志氣未動明聲能協和哀樂既形則樂乃斯變二人嘆曰足以探禮樂之情矣淑在南唐舉進士歸宋充史館編修累遷職方貟外郎所著有文集二十卷宋吳遵路淑之子少穎異第進士天聖初以太常博士為秘書校理不能阿附權貴出知宣州終龍圖閣直學士家無餘貲范仲淹分俸周之子瑛仕為比部貟外郎邵必丹陽人舉進士累官京西轉運使入修起居注雄州種木道上契丹遣人夜伐去命必往使必以理折契丹屈之後遷龍圖閣學士知成都邵餗丹陽人素有節行精於篆書范仲淹嘗稱許之王琪守潤薦於朝賜號冲素處士焦千之丹徒人歐陽修勉之棄科舉學而専意經術吕公著嘗延之教其子希哲嚴毅方正以師道自重官終無錫知州邵亢必從子少舉茂材異等為頴王府翊善加直史館英宗召對羣玉殿訪以世事謂曰真國器也神宗即位遷龍圖直學士歴樞密副使卒諡安簡刁約丹徒人寳元中為館閣校理後遷直史館嘗使契丹改判度知院治平中出知楊州浩然有山林之志乃掛冠而歸作藏春塢日逰其間以壽考終王存丹陽人慶厯中進士自嘉興簿累官尚書左丞以端明殿學士知蔡州時朋黨之論漸盛存入對首言人臣朋黨誠不可長然不察則濫及善人後以右正議大夫致仕司馬光嘗曰並馳萬馬中能駐足者其王正仲乎人以為名言蔡肇丹陽人能為文最長歌詩援筆立就舉進士徽宗時為吏部郎中兼編修國史後拜中書舍人以顯謨閣侍制知明州有文集三十卷蔣猷金壇人舉進士累官御史中丞兼侍讀嘗論士風浮薄廷臣伺人主意承宰執風㫖此風道不可長輔臣奏事殿上雷同唱和畧無所可否非論獻納之體官終正議大夫卒贈特進洪造丹陽人舉進士授歙州黟縣尉方臘亂造拒之為賊所殺璽書褒美洪擬丹陽人舉進士宣和中為監察御史時蔡京用事擬中立無所附㑹後遷至吏部尚書卒諡文憲洪興祖丹陽人少讀禮至中庸頓悟性命之理績文日進登政和上舍第累官知饒州直敷文閣興祖好古博學自少至老未嘗一日去書著周易通義繫辭要㫖古文孝經序賛楚詞考異等書張綱金壇人徽宗時以上舍及第蔡京王黻用事綱為所忌遂奉祠家居髙宗南渡復召用之累官叅知政事卒諡文簡孫釡慶元間諌官累遷僉書樞密院事陳東丹陽人俶黨負氣徽宗時為太學生率同舍生詣闕上書請誅邪侫命以官不就髙宗南渡復上書極論黄潜善汪伯彦潜善等誣以指斥乗輿殺之天下以為寃髙宗後知其非辜悔之詔贈秘閣修撰湯東野丹陽人靖康中知平江建炎初苗劉之變與張浚同謀弭亂超拜工部侍郎張縝金壇人建炎中守揚州金兵進圍城朝廷恐縝力不能支許退保鎮江縝堅守不動弗顧其家後城潰及妻子皆死之翟汝文丹陽人舉進士紹興初累官翰林學士叅知政事與秦檜不和罷去汝文風度翹楚好古博雅精於篆𨽻有文集數十卷湯喬年丹徒人為人慷慨自負博學工文秦檜欲館致之使學官諭意喬年曰是主和議者吾方為天下讐之又安能出其門乎後以特恩授韶州推官不赴湯鵬舉金壇人舉進士累官至御史中丞知樞密院事卒諡敏肅葛勝仲丹陽人舉進士調杭州司理叅軍薦試學官及詞科俱第一後歴遷太守卿承詔續太常因革禮三百卷紹興初丐歸稱卒諡文康子立方官至吏部侍郎孫邲官至左丞相自其祖命密至邲五世登科第自勝仲至邲三世掌詞王遂金壇人嘉泰初進士為監察御史䟽奏極論進君子退小人遷右正言後以華文閣直學士知隆興府召還授權工部尚書遂與同里劉宰素同志宰甞稱遂為文雅健無世俗浮靡之氣云竇從周丹陽人志尚冲雅不伍流俗年五十偕弟澄往建陽從學朱文公得操心之要及歸築室講道専以為已為學者倡士友慕之造門無虚日一夕盗入其室知為從周所即轉而之他文公聞而嘆曰忠信可行於蠻貊於此可見譚知柔金壇人舉進士歴官通判邵州終秘書少監善為詩有華陽居士集劉宰金壇人紹興進士歴任州縣有能聲理宗以為藉田令及遷太常丞知寜國府皆不就端平間一時譽望收召畧盡所不能致者宰與崔與之耳隱處三十年於書無所不讀所著有漫唐集既卒朝廷嘉其莭諡文清丁明金壇人閉門讀書二十年手編事𩔖及諸史通考等書百餘卷奉祠家居及卒郷里私諡博雅先生章瑢丹徒人事親盡孝母忘思慕切至墓上枯竹復生子孫相繼以經學顯用人謂孝行之報張恪金壇人性孝友居母喪祥禫逾年猶不御酒肉有甘露白鵲之祥張志道嘉熈間求直言上封事言建儲遷都之事宋亡閉門著書書家貧衣食不給處之泰然所著有易傳等茅相丹徒人慷慨有大志宋末急於用人以陸秀夫薦投兵部侍郎從之海上元兵勢逼同帝赴海死元羅璧丹徒人父大義為宋將至元中初通海道漕運以璧為運糧萬戸首部漕舟由海洋抵楊村不數十日入京師賜金虎符後又為廣東道宣慰使都元帥誘致山海獠夷假以官位曉以禍福咸率衆以歸青陽夢炎丹徒人初仕宋世祖聞其名召至都賜第以居歴官至禮部尚書翰林學士子奎累官同知臨江捴管府壁以廕為揚州通判堵簡金壇人元末為江浙行省松檢校官平章慶童領兵復江簡為叅謀兵敗為賊所擒欲留用之不屈而死孫瑾丹徒人父没哀毁停柩未葬衣不解帶嚴冬洗足而歩事繼母唐甚謹唐患癰瑾親吮之即愈唐雙目失明瑾旦暮䑛之復明及唐卒卜日將𦵏時春苦雨瑾夜號天至旦開霽甫掩壙復雨數日不止事聞旌異之徐鈺丹徒人泰定中侍父鎮渡橋父堕水中同行者立岸上不能救鈺即投水擁父出父挽行舟獲免鈺力􅉵不能奮逐漂流以死事聞旌為孝子本朝虞謙金壇人洪武中由太學生擢刑部郎中歴杭州知府大理少卿副都御史轉大理卿天冿衛倉灾焚糧數十萬御史按之謂主典者盗之縱火以自葢耳論死者百餘人徒流者七百餘皆誣服謙察其寃白於上得減論又嘗上書言七事皆切中時務謙工詩畫所著有玉雪齋集徐銘丹陽人仕為監察御史有蹇諤風遷知楊州府未幾召拜兵部侍郎後陞山西左布政使儲懋丹陽人永樂中領郷薦歴吏科給事中以學行選充經筵官轉翰林修撰與修實録進侍講累官戶部尚書卒為人端重寛和云王豫丹徒人永樂中由大學生擢監察御史歴浙江按察司副使激揚有聲官至雲南左布政使盛祥丹徒人舉進士官泉州照磨當道交薦遷知道州以儒雅飭吏事州有虎患禱于鼻亭翌日二虎渡河一虎斃于祠下及卒百姓縞素哭拜合祀于冦萊公祠南畿志王振金壇人舉孝亷授監察䘖史巡按交趾渉險阻理煩據凡十三年民夷帖服清介之節終始如一知温州府致仕蕭然如寒士焉南畿志胡清丹徒人舉郷貢任清平訓導擢禮科都給事中權貴震熠遷浙江叅政禦温㓂有功朝廷賜綺帛旌之子信舉進士嘗知鶴慶軍民府有政聲南畿志叚敏金壇人舉進士歴官浙江參議值峴賊猖獗敏設疑兵以禦之歲飢復區晝賑恤後江西起大獄敏奉朝命行勤瘁得疾卒敏居官清謹剔歴中外幾三十年家無中人之産南畿志沈固丹陽人領鄉薦同知沂州有言沂産銀請置局採辦固執奏不可冄遷山東參政鎮大同累有建白皆邉防要務己巳之變以城守勞進都御史絳户部尚書南畿志費誾丹徒人舉進士授翰林編修歴祭酒詹事禮部右侍郎儀度閎偉善談論恥言人過人以公輔期之孝宗幸太學賜坐講經甚見褒異卒于官南畿志靳貴丹徒人領觧鄉試舉進士及第第三授翰林編修累官太子太保户部尚書武英殿大學士謝病歸尋卒武皇南廵幸其第為嗟悼之贈太傅諡文僖南畿志列女竇氏女丹徒人父母俱亡許嫁之人乃家舊僕也成婚日始識之遂投井死郡守義之為立石于釡鑿山前表之萬敬妻史氏金壇人適敬未閲歲敬得惡疾終家人以火𦵏史躍入火幾死瘞畢自經詔旌表仍復其家南畿志吳氏丹徒人葛彦祥妻夫亡守節詔旌表之南畿志儲氏丹陽人王徳華妻夫死矢志自守受旌表畿志朱氏金壇人荘秀五妻夫喪守志始終節事聞詔旌之畿志仙釋王纂居馬跡山晉永嘉末中原大亂饑饉疫癘死者相繼纂于静室飛章告天祈救生靈夜感神人告之曰子念生民吾得以盻子矣沈建丹陽人好道能醫嘗逺行寄奴婢騾羊於主人各與藥一粒語主人曰不煩飲食也去後主人飲食之皆不受三年還又各與藥飲食如故建後不知所止殷七七唐人周寳鎮浙西鶴林寺有杜鶻花寳謂七七曰鶴林之花天下竒絶嘗聞能開頃刻花可副重九乎七七曰諾及九日果爛熳如春寳逰賞累日花忽不見魏隆唐貞觀中召至京太宗恱之屡垂清問後居潤之仁静觀卒𦵏馬跡山元暠姓陶氏唐丹陽人雖從釋氏而心存孝愛劉禹錫有送元暠南遊詩序了元號佛印居金山寺蘇軾舟次𤓰歩了元來訪以偈為獻軾一日入其方丈了元曰内翰何來此間無坐處軾戲曰借和尚四大作禪床了元曰四大本空五藴非有軾議擬未即荅了元急呼侍者取所許玉帶永鎮山門而以衲裠相報慈濟宋時僑居丹陽普定寺嘗遇異人授黒錫丹方洞明醫道察脉如神與神濟同以醫名天下祖可宋時寓京口少病癩人呼曰癩可善于詩徐俯為作詩序謂近歲江南髙僧逸民出語可觀皆祖可所化也明一統志卷十一
