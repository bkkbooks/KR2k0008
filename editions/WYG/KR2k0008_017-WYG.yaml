瑜宋歴陽人事母至孝母喪三年不進鹽酪服除二十餘年布衣疏食言輙流涕昌義之梁烏江人有武幹每戰必捷性寛厚為將能得人死力累功至䕶軍將軍唐勒思齊歴陽人武后召見竒之授游擊將軍李白詩太古歴陽郡化為洪川在江山猶鬱盤龍虎祕光彩特生勒將軍神力百夫倍張籍烏江人善古詩及書翰行草舉進士歴水部員外郎官至國子司業籍性狷直不容物是時韓愈以文衡輕重天下士而籍為愈客且薦於朝自是名播人口一時賢士争與之游何蕃和州人為太學生二十餘年學成行尊諸生不敢與齒朱泚反諸生將從亂蕃正色叱之故六館之士無受汙者韓愈為作傳宋沈立歴陽人以進士累官右諫議大夫判都水監嘗著河防通議治河者悉守為法歴事三朝白首一節儲書至數萬卷神宗問所藏立上其目及所著名山水記三百卷後知宣州提舉崇禧觀錢藻和州人師胡瑗與同郡邱鄜前後舉進士並以詞學推重於時藻官至翰林侍讀學士魏矼歴陽人少頴悟時方尚王安石新説矼獨守所學宣和中上舍反第高宗時為殿中侍御史屢進讜言金人南侵矼請扈從親征及請罷講和忤秦檜意出奉祠蔣子春歴陽人教授鄉里建炎初金師至新塘見子春挾書又人物秀整喜之欲命以官子春怒罵為敵所殺徐兢歴陽人作邑有善狀篆籀得李斯法張卲烏江人登上舍第建炎中以直龍圖閣使金議論不屈留燕中十餘年而歸陞祕閣修譔後知池州卒贈少師有文集十卷子孝曽後亦以出使沒於金張孝祥卲從子父祁與胡寅厚秦檜憾寅下祁大理獄後得免孝祥讀書一過目不忘文章俊逸尤工翰墨紹興中進士第一累官集賢殿修譔歴知平江靜江荆南皆有聲績及卒孝宗惜之有用才不盡之嘆張孝伯和州人隆興間進士官至叅知政事時韓侂胄當國孝伯勸弛偽學黨禁一時賢人貶斥者得漸還故職子即之以父恩授承務郎累官司農寺丞知嘉興以直祕閣致仕能書聞天下金人得其翰墨重之如寳龔楫父原本處州人仕為兵部侍郎崇寜中謫居和州因家焉楫懦如不勝衣聞金人陷郡縣輒忿恚不食烏珠據和州楫率家僮等徃襲之得數百人金救兵大至楫麾其衆曰今日鬭死亦足為義士遂死之何宗英和州人紹興間以布衣上書數萬言論敵必渝盟冝先事為備與其坐困一隅不若進幸建康以壯國勢趙時賞宋宗室居和州舉咸淳進士知旌徳縣櫂知邵武軍為人風神明俊議論慷慨文天祥開府南劒知其有謀䇿奏辟叅議軍事為江西招討副使空坑兵敗被執不屈死之元張茂之和州人累官淮南轉運使以寛厚長者見稱本朝華高含山人初以舟師從征累官湖廣行省平章政事天下已定論功封廣徳侯後命徃巡海南諸城卒于瓊州訃聞朝廷憫其無子詔納鐵券於墓中追封巢國公諡武壯陳亨和州人洪武初以征戰功累陞大寜都司都指揮及告歸展墓賜以御譔碑文後鎮守大寜號令嚴明下人畏服楊文含山人洪武初從征屢立戰功朝廷嘉之累陞右軍都督府都督李彬和州人洪武中襲父職濟州衛指揮僉事勇畧過人永樂初以靖難功進封豐城侯賜以鐵券子孫世襲後命鎮守交趾卒追封茂國公諡剛毅李濬和州人父旺洪武初以從征有功授副千户濬襲職勇敢自奮累功陞北平都指揮同知永樂初以靖難功進封襄城伯及卒子隆襲爵為將重儒下士御衆有方守備南京聲譽赫然紀清含山人洪武初以從征功授濟陽衛指揮克效勤勞永樂初以靖難功進陞右軍都督僉事耿定和州人歴官刑部郎中以才優舉陞叅議轉任浙江布政司正統末處州盗起定領兵勦捕率先督戰死於兵事閒贈浙江按察司副使遣官諭祭馬諒和州人舉宣徳進士才識過人尹應天專務徳化歴官户部侍郎畿志唐忠含山人由鄉舉知密雲縣忠信愿慤以賢著聞民徳之如父母畿志列女徐氏宋和州人北兵抵維揚官軍奔潰多肆擄掠執徐欲汙之徐瞋目大罵曰朝廷蓄汝輩以備緩急今敵犯行在既不能赴難又乗時為盗我恨不能斷汝頭肯為汝辱第速殺我賊慚恚殺之投江中張氏和州人周徳新妻夫早喪張守節終其身事聞洪武間旌表畿志尹氏含山人張子文妻夫卒育遺腹子可成後為千户洪武間旌表畿志包氏高化賢妻和州人夫亡守節宣徳中旌表畿志張氏女含山人正徳初父誠貧而無子疾將革張痛切且恨以女子不能為父後遂籲天割股和藥以進請以身代畿志仙釋商栖霞歴陽人唐大歴中居於白石山下彭仙洞善吐納之術絶粒三十年明一統志卷十七
