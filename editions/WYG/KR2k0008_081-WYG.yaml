body:
  text: 明一統志卷八十一明李賢等撰肇慶府東至廣州府南海縣界九十里西至廣西梧州府蒼梧縣界四百里南至髙州府電白縣界六百里北至廣州府清逺縣界一百七十五里自府治至南京四千二百六十里至京師七千四百二里糧十六萬石零建置沿革禹貢揚州之南境天文牛女分野春秋時為百粤地秦為南海郡地漢武帝平南粤為蒼梧合浦二郡地三國呉及晉属蒼梧郡劉宋置綏建郡治四㑹縣梁置髙要郡治髙要縣隋平陳廢綏建郡入四㑹縣又廢髙要郡置端州大業初改信安郡唐復改端州又於四㑹縣置南綏州属嶺南道貞觀中改為湞州尋廢天寶初改端州為髙要郡乾元初復為端州宋置興慶軍節度重和初陞州為肇慶府仍改軍曰肇慶𨽻廣南東路元至元中改置肇慶路𨽻廣西尋復𨽻廣東本朝洪武元年改路為府領州一縣八髙要縣附郭本漢舊縣属蒼梧郡劉宋属南海郡梁於此置髙要郡隋平陳廢郡以縣置端州唐以博林縣省入宋又省平興縣入焉元仍舊本朝因之編戸九十八里四㑹縣在府城北一百三十里本秦舊縣属桂林郡漢属南海郡宋陳於此置郡隋廢郡又以始昌縣併入属南海郡唐置南綏州後改湞州又廢州以縣属廣州宋初省入南海尋復置縣熈寧中割属端州元属肇慶路本朝因之編戸三十里新興縣在府城南二百四十里秦為南海郡地漢置臨􅁢縣属合浦郡東晉始析置新興縣及新寧郡梁兼置新州隋廢郡大業初廢州以縣属信安郡乂省索盧縣入焉唐復置新州治新興縣天寶初改新興郡乾元初復為新州宋仍舊元改置新州路尋復為州本朝洪武二年州廢縣改今属編户五十八里陽春縣在府城南二百四十里本漢合浦郡髙涼縣地呉属髙涼郡梁於此置陽春郡及陽春縣隋平陳廢郡以縣属髙州唐於縣置春州天寶初改南陵郡乾元初復為春州宋廢州以縣属南恩州元仍舊本朝洪武二年州廢縣改今属編戸二十四里陽江縣在府城南三百四十里本漢髙涼縣地孫呉置海安西平二縣晉属齊興郡齊改海安曰齊安隋復改海安唐仍改齊安尋改曰恩平為恩州治又改西平曰陽江属恩州宋改恩州曰南恩州徙治陽江而以恩平縣省入陽江元至元中改置南恩路尋復為州本朝洪武二年州廢縣改今属編户二十九里髙明縣在府城西南二百八十里本朝新建編戸三十五里恩平縣在府城南二百七十里本朝復置編戸二十里廣寧縣在府城西北八十五里本朝新建編戸一十里德慶州在府城西二百一十里秦為南海郡地漢置端溪縣属蒼梧郡東晉於縣置晉康郡隋廢郡以縣属端州唐於此置南康州尋廢復置名康州天寶初改晉康郡乾元初復改康州宋初州廢縣仍属端州尋復置康州紹興初陞為德慶府又置永慶軍節度元改置德慶路𨽻廣西道後還𨽻廣東道本朝洪武初改路為府九年改府為州以端溪縣省入編户六十三里領縣二封川縣在州西一百二十里本漢廣信縣地属蒼梧郡梁置梁信縣及梁信郡兼置成州隋平陳郡廢改成州曰封州改梁信縣曰封川大業初以封興縣省入尋改州為蒼梧郡治封川縣唐復為封州天寳初改臨封郡乾元初復為封州宋紹興中州廢以縣属德慶府尋復置元改置封州路後復為州本朝省州縣改今属編戸十四里開建縣在州西北三百一十里本漢蒼梧郡封陽縣地劉宋析置開建縣属臨賀郡梁於縣置南靜郡隋廢郡以縣属連州後廢唐復置属封州宋開寶中省入封川縣尋復置仍舊属元因之本朝廢封州縣改今属編戸四里郡名信安隋名古端隋唐置端州因名形勝北望頂湖南瞻銅鼓圖經北望頂湖萬仞峙其後南瞻銅鼔四阜列其前白沙崗驅羊於其左腐柯山卧虎於其右據三江口臨封志據邕桂賀三江口誠控扼之地居廣東上㳺德慶州志當五州要路寰宇記恩平當五州之要路頗有賈人循海而至阻山瀕海圖經恩平與廣右接境阻山瀕海山麓勝境鼉山志序龍鼉山為南服之冠金鷄亦舊壤所有山麓名勝之境海珎果實之饒控江帶山延袤數千里郡志風俗火耕水耨食稻與魚隋書云土厚民淳郡志土厚民淳男事漁樵女事紡績以檳榔為禮同上俗以檳榔為禮以鬬歌為樂地有草曰胡蔓服之即死小民争鬬或負債輒服以誣人瘴氣最惡宋新州志以鷄骨占吉凶寰宇記新州俗以鷄骨占吉凶衣服即都落吉貝蕉布豪渠之家喪祭則鳴銅鼓召衆則鳴春堂巧作木疊藤㡌五色藤箱席夷獠相雜同上康瀧一同夷獠相雜病不服藥唯巫是信恩平圖經俗荒陋市肆無陶瓦封州志質樸知義臨封志風俗質樸民淳訟簡又蘇軾云司馬温公薨封州父老相率致祭亦足見其民之知義也椎髻跣足郡志鄉村男子多椎髻婦人多跣足又好著木屐山川石室山在府城北六里一名圓屋山一名髙星山山有石室自生風烟南北有二門號為神仙下都旁有石聳立謂之崧臺又有七星巖連属曲折為斗形中可坐數百人巖内築斗魁臺唐李邕作記鐫石宋郭祥正詩端州正在雙峽間石室髙臺壓孤壘銅鼓山在府城南隔江一十里府治之案山也山有赤石如鼓形扣之有聲故名髙峽山在府城東三十五里呉歩隲為交州刺史以兵取南海衡毅錢博等領兵逆戰於峽口博兵敗死即此地相傳山有羊化石因名羚羊峽又名髙要峽爛柯山在府城東三十六里其上猺人所居土俗相傳為王質觀棊處頂湖山在府城東北五十九里山勢雄峻為一方之鎮山頂有湖茍逕山在府城南四十里山下有基相傳乃南朝陳髙祖壠掘鑿之不能辯其穴惟石砌存焉山口有載碑石龜大可丈許歌樂山在府城東八十里風起聲如音樂故名古勞山在府城東一百二十里出徑嶮狹樵人憚勞故名老香山在府城南一百二十里山出香木有水出此山東流經廢平興縣名鈎源水奢山在府城東南一百三十里山有丹砂夷語訛砂為奢山南有粟砦山産山棗葉似梅果似荔枝九月熟又多錦鳥鮫魚又有𤣥鈎鳥鳴則雨至香山在德慶州北二里山有五色石石上多香草一名利人山山勢突兀屹然為一州之望上有乾明寺茗山在徳慶州境境内多山其有名者曰勞山曰樝山曰思耆曰髙良曰平定曰馬鞍曰禮嶺曰大力藿山在德慶州東北五里山有草如藿端山在德慶州東二十里其形方正因名輿地志山有樹冬榮其子大於杯炙而食之味如猪肉錦石山在德慶州西五十里漢陸賈使南越時設錦繡幃帳於此因名古蓬山在德慶州界凡五十四山此其一也其上猺人雜處自昔民為所苦本朝洪武間始勦平之然未盡帖服永樂初向化來歸然後諸山之名始入版圖倉岡山在四㑹縣西三里林巒聳秀舊傳南漢劉氏嘗建倉貯兵儲於上故名金岡山在四㑹縣北一十里縣治之主山也按廣州記云行人徃徃見金人逰於岡側又名金山貞山在四㑹縣西南一十里又名烈女山相傳文氏女許嫁而夫死於虎女歸夫家養姑三年父母欲奪其志乃潜於此山絶巘藝苧蔴蕉竹績織以自給親黨求之莫知所在傳以為仙去廣正山在四㑹縣西南一十里又名貞山絶頂有三池旁有巨石如壇其側有竹下垂風至輒自掃壇石前有龍池思子山在四㑹縣東二十五里隋末籍民為兵有老嫗年八十餘止一子亦在行後思其子登此望之悲哽而絶故名扶盧山在四㑹縣東四十里上有池水四時澄澈花木繁茂相傳甲戌日即有管絃音昔六祖嘗隱此山有六祖庵六祖姓盧故名百僚山在四㑹縣北五十里山形髙聳旁有崇岡疊巘四面拱峙若百僚然石澗山在四㑹縣西六十里有泉自竇中出東流五里入于江舊傳竇中有巨鯉每㳺泳則不踰數日天必雨石燕山在四㑹縣東八十里巖穴中有石佛石鐘又有石燕落鞍山在四㑹縣西北一百一十里相傳有青衣人乗白馬出山中俄墜地人馬俱失因名三宿山在四㑹縣西一百四十里山有三峯若列宿一名三足山相傳昔有蘇姓者入山仙去髙望山在四㑹縣西二百五十里山多茶木昔有人登此山及半忽晦瞑迷不能進乃由他路歸端峯山在新興縣北六里山峯屹然端正不欹雲秀山在新興縣東一十里許相傳山有五色雲見新寧山在新興縣西南二十里山勢髙聳為一境之鎮龍山在新興縣南三十里上有龍山寺寺有覺軒宋左丞王安中銘云本自不迷何者為覺惟無舌人滿口道着龍山名軒無病求藥從而銘之分一半錯錦山在新興縣西南三十里山多花木爛若錦綺有峽岡水出此北流至府界入大江天露山在新興縣東南三十五里山形陡峻上挿雲霄頂有巨石泉出其傍為龍潭郷人立廟以祀龍神嵗旱以石投之有聲如雷即雨射木山在陽春縣南一十五里縣治之按山也又名雲靈山雲罩其上必雨開則霽故諺云雨未晴看雲靈羅黃山在陽春縣境石上有仙人足跡又有瀑布數十丈流為羅水與縣西南麻逢吉流二水相合鐵坑山在陽春縣東南二十里宋胡銓詩路入陽春境杳然非世間初疑金谷嶺元是鐵坑山日薄煙嵐重天寒酒力慳人言兹地惡我愛碧孱顔雲浮山在陽春縣北七十里舊經云陳霸先嘗居此山上有偃松石床舊基峒石山在陽春縣北八十里巖石幽邃内有古佛宋咸平初賜太宗御書藏於石室胡銓詩兹處山皆石他山蓋不如固非從地出疑是補天餘下陋一拳小髙凌千仞虛竒章應未見名不到中書鳯凰山在陽江縣東北二十里一名北甘山壁立千仞有瀑飛下猿狖不能至相傳有鳯凰巢其上遇大風雨嘗墮其雛羅琴山在陽江縣西二十五里昔羅含嘗携琴逰此故名山頂有石如棊局或云仙人嘗圍棋於此海陵山在陽江縣西南七十里大海中延袤三百餘里一名羅洲宋末張世傑自崖山潰圍出至此山下􅄓風大作或勸世傑登岸世傑慮為人所圖即登佗樓露香祝天風濤愈甚遂溺死焉鸚鵡山在陽江縣西南有石成巨人跡俗名聖人跡縣境山甚多其著名者又有翠鳥龜龍博泥即髙磁石諸山龍鼉山在陽江縣東一百二十里山頂有龍穴能興雲雨有石名龍口泉出焉旱則取水禱雨即應其水南流入海名半亭水羅領山在陽江縣出沈香木瑞靈山在陽江縣東舊名烟蘿山唐時有瑞光燭天郡白其事勅置院開山叢棘中發石龕得古經一函題曰大佛名經有古碑存焉登髙山在封川縣治北山形突兀舊有花藥圃嵗九月官属於此登臨東山在封川縣治東形如覆舟舊於出下為三舎學基西山在封川縣西隔江山石上有巨人跡遇旱郷人洗而禱之即雨名曰聖石山之西有雙清亭豐夀山在封川縣東四十里寰宇記云山髙一百三十丈一名霹靂山麒麟山在封川縣東八十里八表侵雲視諸山最髙澤錦山在封川縣坊場鄉漢陸賈南來至此有池澄澈因以浣錦後縫錦裹石遂名圓珠山在開建縣西北三十里山圓如珠忠讜山在開建縣北七十里舊經云古人居此者性多讜直因名忠讜水出焉騰豻嶺在府城西北一十五里山産騰豻故名騰豻沐猴類頭正方貎類人髪長尺餘常覆面欲冇所視輒搖頭以兩手披之一名騰豺千嵗嶺在四㑹縣南一十里三峯突兀形如筆架縣治之案山也龍子嶺在四㑹縣東一十三里又有鳯頭岡宋淳熈間縣令蘇邦平縣基得古碑有詩云龍嶺行歌龍已化鳯頭將見鳯齊鳴三洲巖在徳慶州東七十里取蓬萊第三洲之名一名玉乳巖中有石室室中有石乳蒼緑色間類佛像鍾磬玉麟逰魚之属相傳有皓叟修真於此宋周敦頥嘗㳺蘇軾有題識及李綱書玉乳巖三大字俱存龍巖在徳慶州東七十里相傳有龍穴於此巖口有水方丈餘清碧而深不可測九星巖在徳慶州東一百一十里巖有九峯尖秀如玉笋下有巖穴如堂中有一徑通幽其左一穴人跡罕到逰者湏秉燭以覽其勝崆