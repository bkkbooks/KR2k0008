body:
  text: 明一統志卷三十三明李賢等撰西安府下名宦漢兒寛左内史勸課農桑緩刑理訟卑體下士吏民天信愛之雋不疑京兆尹吏民服其威信鄭𢎞右扶風能著治迹有教條法度京師稱之趙廣漢京輔都尉守京兆尹善為鈎距以得事情發奸摘伏如神京師稱之黄覇武帝時補左馮翊卒吏領郡錢榖計簿書正以亷稱後自潁川太守徴拜京兆尹張敞甘泉倉長後為京兆尹自趙廣漢後更數尹皆不稱惟敞能繼其迹韓延壽左馮翊屬民有昆弟訟田者延壽因閉閣思過由是郡中轉相敇勵恩信周遍二十四縣王尊槐里令兼行美陽縣事有能名成帝時南山群盗為害以尊為京輔都尉行京兆尹事旬日間盜肅清陞守京兆尹王章京兆尹素剛直敢言㑹日食奏王鳯蔽主之過王駿京兆尹先尹趙廣漢張敞王尊王章及駿皆有能名故京師稱前有趙張後有三王何武京兆尹守法盡公進善退惡翟方進京兆尹搏擊豪强京師畏之薛宣左馮翊嘗奏瀕陽令薛恭粟邑令尹賞換縣而兩縣皆治宣為政多仁恕愛利賞罰明用法平所居有條教可紀何並長安令善於治劇道不拾遺陳龜京兆尹三輔豪彊之族多侵枉小民龜厲威嚴悉平其怨屈者郡内大悦段熲為憲陵園丞陽陵令所在能政延篤由左馮翊尹京兆政用寛仁憂恤民黎與前尹邊鳯並有能稱三輔語曰前有趙張三王後有邊延二君趙温京兆丞有大志嘆曰大大夫當雄飛安能雌伏遂棄官去王重泉令力行徳政鸞集縣庭三國鄭渾魏初為京兆尹渾以百姓新集為制移居之法勤稼穡明禁令由是明安於農盜賊止息陳泰魏雍州刺史與郭槐謀禦蜀姜維有功顔斐魏京兆太守治身清白時稱為良二千石晉司馬望都督雍州軍事在任八年威化明肅闗中頼之范晷雍州刺史時百姓困敝晷傾心化𨗳勸以農桑所部頼之杜軫池陽令治為雍州諸邑最百姓為立生祠王猛仕符秦為京兆尹教化大行路不拾遺南北朝李爕西魏京兆尹吏民愛敬歌之曰恩如春威如虎愛如母訓如父樂運周萬年縣丞抑挫豪右號稱强直武帝嘉之事有不便於時者令巨細奏聞隋房恭懿新豐令政為三輔之最髙世衡櫟陽令風教大洽獄無繫囚唐蘇味道咸陽尉吏部侍郎裴行儉才之㑹征突厥引管書記作文攬筆而具當時盛傳裴琰之同州司户叅軍裁決積案名動一州號霹靂手崔日知京兆尹有政績從弟日用亦檢校雍州刺史李嶠長安縣尉時畿尉名文章者駱賔王劉光業嶠最少與等夷李嗣真調露中為始平令風化大行姜師度同州刺史引洛灌朝邑河西二縣闗河以灌通靈陂池又收棄地二千頃為上田置十餘屯所就必為後世利宋璟京兆尹徳望重于一時李商隱下邽主簿刺史姚班説其能器之徐堅萬年主簿蒞政以寛厚稱强循雍州司士參軍華原無泉人畜多渇死循教人引渠水以浸田一方利之號强公渠源乾曜𤣥宗時京兆尹治尚寛簡人安之居三年政如始至鮮于仲通𤣥宗時尹京兆有風力弟叔明亦嘗為京兆尹百姓有前尹赫赫後尹熙熙之歌姚崇同州刺史𤣥宗講武新豐召崇咨治道崇陳十事帝納之翌日拜相張嘉真􅃎州刺史公正明白吏民懐之崔隱甫華州刺史吏民畏愛庭無滯訟劉晏華州刺史後尹京兆總大體不苛寛猛相濟吏民安其政房琯邠州刺史始吏攘民居相淆讙琯至一切革之人以便安政聲流聞魏少㳺京兆尹善任人縁飭䂓檢有足稱者吳湊徳宗時尹京兆勤儉孜孜庶事咸舉顧少連尹京兆政尚寛簡不為灼灼名蕭復同州刺史歳歉擅發觀察使所儲粟貸民被劾復曰茍利於民何責之辭袁滋華州刺史清簡慈惠民向愛之其後楊于陵代滋為刺史吏民遮留滋于陵諭曰吾不敢易前政既而果得民心王疑商州刺史州有治賦羨銀疑無所取惟市馬以供驛用叚秀實邠州都虞候行營節度郭晞縱士卒為暴秀實列卒取十七人斷首注槊上植市門外又就讓晞邠州由是無禍裴向同州判官後為櫟陽渭南令奏課第一陸贄鄭縣尉罷歸再調以渭南尉説黜陟使五術八計三科四經六徳五要徳宗召為監察御史薛珏乾陵臺令歳中以清白聞課第一改昭應令人請立石紀徳崔縱藍田令徳化大行縣人立碑頌徳後遷京兆尹馮伉醴泉令縣多豪猾數犯法伉著諭豪書十四篇勸之使互相督教李鄘京兆尹彊直無私畿輔安静其子拭亦嘗為京兆尹有能名王播京兆尹盜賊不能隐皆出境避焉李絳宰相出為華州刺史㑹遣五坊使帝戒曰至華宜自戢綘大臣有奏即行法矣崔戎華州刺史有徳政及徙任民擁留不得行孔戣華州刺史時明州歲貢海物水陸逓運勞費戣奏罷之弟戢為京兆尹崔斯立藍田丞韓愈為作㕔壁記韓愈京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯也李頻武功令畿民多藉神策軍吏不敢繩以法頻至有神策士犯法者即械送獄由是豪彊屏息縣大治方嵗飢發官廩庸民浚廢六門堰溉田穀以大稔劉仁師寶疆初髙陵令築堰更水道以溉民田渠成民徳之名其渠曰劉公堰曰彭城羅珦京兆尹請减平糴半以常賦充之人頼其利薛元賞京兆尹捕治禁屯軍怙勢者民頼以安弟元龜亦嘗尹京兆精於吏事韋澳京兆尹為人公直既視事豪貴斂手劉潼京兆尹時山南有劇賊潼挺身往諭之賊盡降王璠京兆尹當時政條隳斁璠修舉之甚有名宋曹瑋知永興軍及邠州御軍有方畧治民以寛惠王禹偁商州團練副使種蔬自給有亷名栁開淳化中知邠州時再調民輦送趣環慶民皆蕩析産業轉運復督役民號訴開上書運使罷之張齊賢知永興軍時閣門祗候趙賛以幸提點関中芻粮所為多豪横齊賢論列其罪抵於法後又判邠州留心邊事錢若水同州推官能雪寃獄逺近稱之陳省華知櫟陽縣縣之鄭白渠為隣邑强族所據省華盡去壅遏水利均及民皆頼之王嗣宗知耀同二州徙永興軍上疏徙兼并之家後又知邠州州東有靈應公廟傍有狐穴妖巫挾之為禍福嗣宗至毀其廟燻其穴得狐盡殺之滛祀遂息向敏中咸平末知永興軍時真宗幸澶淵宻詔便宜行事敏中得詔不泄邊境以安李士衡鄠縣主簿田重進守京兆命士衡鞠死囚五人活者四人重進即其家謂曰子有隂施此門當髙大之陳堯佐明道中知同州徙永興軍有善政初太后遣宦者起浮圖京兆城中前守姜遵盡毀古碑碣充磚甓用堯佐奏唐賢臣墓石其子孫深刻大書欲傳之千載乃一旦與瓦礫等誠可惜也其未毀者願敇州縣完䕶之陳堯咨知永興軍長安地斥鹵無甘泉堯咨疏龍首渠注城中民利之韓晉卿知同州政尚循良奏課第一張綸知乾州興利除害有循吏之稱范雍知永興軍嵗飢疫振恤有方築城浚池葛懐敏之亂邠岐間皆恐惟永興帖然馬元方知萬年縣諸將討李繼遷闗輔轉餉踰瀚海多失亡獨元方所部全十九鄭戩知永興軍充陜西經畧安撫招討使多所建明趙元昊謂其下曰我已稱臣朝廷何為復使此公䕶戎其見欽畏如此趙師民知耀州民有犯鐡禁者師民曰奪其利而取之是罔民也一切不問葉清臣知永興軍浚三白渠溉田輸六千頃文章政事卓稱一時司馬池知耀同二州所至以仁存心以勤治政龎籍知同州就除陜西都轉運使建言頻歳災異天久不雨凡乘輿所費宫中所用宜務加裁抑乃修徳弭災之道也李迪知永興軍城中多無頼子弟喜犯法迪奏取其甚者部送闕下境内肅然杜衍知乾州有治行後再知永興軍時方用兵民若調發吏因縁為姦衍區處有方比他州費省晏殊知永興軍奉飬清儉政務簡便趙鄰㡬知盩厔咸陽二縣為治清而不煩民安之每覽牒訴必喻以曲直訴者多心伏引去後又知涇陽縣韓𤦺陜西安撫使劉平與賊戰敗被執時宰入他誣收繫平子弟𤦺辨其寃後以侍中判永興軍甚有政績吳遵路知永興軍為政簡易不立聲威被病猶决事不輟及卒仁宗聞而悼之文彦愽仁宗時知永興軍後復以侍中判軍事尊徳樂善如恐不及其子及甫亦嘗知同州范仲淹知耀邠二州皆有善政及趙元昊叛又自越州改知永興軍時稱其胸中有十萬甲兵子純禮亦知永興軍為政一如其父畢仲游知耀州是歳大旱仲游先民之未飢揭喻境内曰郡振施與平糴若干萬石實虚張其數富室知有備亦相勸發廪凡民就食者十七萬九千口無一人去其鄉明鎬知同州元昊冦邊起為陜西都轉運使鎬嘗閲同州廂軍得材武者三百人教以强弩號清邊軍最驍悍趙尚寛知同州勤於為政治有異等之效陳希亮知鄠縣老吏曽腆侮法以希亮年少易之希亮視事首得其罪腆叩首出血願自新希亮戒而舍之卒為善吏程顥鄠縣主簿民有争蔵錢者令不能决顥一言决之其人遂服南山僧寺有石佛歳傳其首放光顥戒曰俟後現當取佛首就觀之其光乃止府境水害倉卒興役諸邑多狼狽獨顥所部無不安便人不勞而事集吳中復知永興軍時行青苗法使者至將先下州縣中復曰斂散自有期今先事擾之何也拒不聽吕公綽知永興軍待寮屬謙恭遇吏民仁厚弟公孺亦繼為知軍有政績劉敞知永興軍大姓范偉為姦利冐同姓户籍五十年持府縣短長數犯法敞窮治其事偉伏罪長安民喜之种世衡知武功縣又僉書同州判官㕔事人服其威信子諤亦知華州孫師中知邠州威惠兼用軍畏民悦司馬旦鄭縣主簿有婦藺訟奪人田者十年不决旦取案一閲情偽立見寃者以直吏捕蝗因縁搔民旦言蝗民之仇宜聽自捕輸之官後著為令司馬光知永興軍時宣撫司下令分義勇戌邊選竒兵調民造乾糒悉修城池光極言公私困敝而京兆内郡繕治非急於是一路得免朱光庭萬年主薄有學行數攝邑事人以明鏡稱吳時知鄭縣轉運檄華州餫米五萬輸長安鄭獨當三萬時貽書言古者用師則贏粮以養兵無事則移兵以就食誠移兵於華則運費可省使者從其言鄭驤京兆府路提舉常平時陕右大稔驤奏以所部本息乘時廣糴得米六千萬斛髙宗初知同州金人來攻城陷赴井死唐重知京兆府兼經略制置金人來攻城陷血戰而死副緫管楊宗閔運使桑景詢判官曽謂提刑郭忠孝主管機宜王尚提舉馬軍程迪俱戰死之金龎迪初為華州防禦使軍變被執入山已而賊衆悔曰公為政素善豈宜刼辱遂縱之還天眷初又知京兆府張彀同州判官時徴雕鴈羽箭十萬價翔踴彀執不可身任其咎尚書省竟如所請王浩涇陽縣令亷白為闗輔第一艾元老厯澄城淳化兩縣令寛而能斷嚴而不苛李革韓城令同州知州事納富商賂以歳課軍湏配屬縣革獨不聽提刑司薦其能李獻甫長安令行臺所在供費甚繁獻甫處之常若有餘民賴以安徒單鎰知京兆府事充宣撫使陕西元帥府並受節度鎰厲兵撫民盡心於職元田雄緫管京兆等路事時闗中苦兵革郡縣蕭然雄披荆棘立官府開陳禍福招徠未降者又教民力田京兆大治商挺從楊惟中宣撫闗中為郎中佐惟中進賢良黜貪暴出淹滯定規程務農薄税通其有無民乃安後又為宣撫副使廉希憲京兆宣撫使日從名儒􅖴訪治道講求民瘼抑强扶弱深得民心馬亨陜西行省郎中時興元畜粮五萬石欲轉餉大安軍推亨任之亨以兵官丁産均其役不閲月而事集無勞民傷財之嘆趙炳世祖以闗中重地風俗强悍授炳京兆路總管吏卒暴横擾民者繩以法自是豪猾歛戢秦民以安曹伯啓西臺御史改都事闗陜自許衡倡道學教多士伯啓請建祠立學以表其績朝議是之田滋陜西行省叅政時境内不雨者三年滋禱於西嶽即雨復開倉給以麥種民大悦郝天挺陜西行御史臺中丞風紀大振其子佑亦嘗為陜西行省叅政以廉直著名石端甫陜西廉訪司副使忠慎廉介卓有能名孫明道盩厔尹方賊冦擾攘之後雞犬不聞蒿萊相接明道至則皇皇焉求其遺民綏之以徳由是流離者悉皆復業百廢具興尋擢本路治中冦靖自乾州倅為鄠縣尹勤於撫字去任民懐其徳立去思碑杜思敬安西路總管又僉陜西行省事有政績冦卞耀州判官又歴髙陵醴泉兩縣尹俱有政聲王義咸寧尹循良愷悌民懐其徳重脩公宇不日而成上下莫不羡之趙世延大徳中為安西路總管安西省臺所治號稱㑹府前政壅滯者三千牘世延不三月剖决殆盡民饑不俟請先發廩以賑所活者衆張養浩天厯中闗中大旱民相食特拜陜西行臺中丞道經華山禱雨嶽祠泣拜不能行天即雨二日由是禾黍自生到官止宿公署夜禱於天晝出振飢終日無少怠荆茂元藍田尹民有兄弟争水磑者茂元以禮化之張崇髙陵尹廉以持已仁以愛下去任邑人慕之為立遺愛碑王思誠陜西行臺侍御史時紅巾之賊陷商州思誠請兵以破朱春三原尹本朝天兵克奉元春謂其妻曰吾當以死報國妻曰卿盡忠妾豈不能盡節俱投崖死焉本朝嚴把洪武初知武功縣革煩以簡愛民以誠民懐其徳去任雖久而不忘焉耿炳文洪武初以長興侯鎮守陜西修築涇陽縣洪渠堰又浚堰渠十萬三千餘丈民皆利焉許訢洪武中知鄠縣公勤慈惠修建廨宇興舉學校措畫得宜民至今稱之金原亮洪武中知興平縣宅心正直蒞政公勤滿去雖日久民猶稱頌之翟益洪武中任華隂縣丞亷聲大振尋陞按察司僉事持法公平王成洪武中任臨潼縣主簿在任九年公平無私民多稱頌去後不㤀張斌洪武二十七年知咸陽縣勤政愛民不事酷刻上下咸稱譽之楊謹行洪武中知同州公勤於政愛民如子惟恐傷之民懷其徳而不㤀李郁洪武中知郃陽縣撫民有方持身亷幹後以績最陞户部主事俞思義洪武未知涇陽縣亷勤和緩政簡事理有古循吏風伏伯安洪武末知永壽縣守己無汚撫民有道尋以課最陞工部侍郎閻暠洪武末知長安縣蒞政公平吏民咸服不敢欺至今人思慕之不衰王皜永樂四年任白水縣學教諭精通性理愽貫經史勤於施教而善詩文有古人風學者慕焉劉遜永樂八年知盩厔縣公平仁恕律已愛民後去任民留之不忍釋去郭敦永樂中為陜西布政司叅政端重有威僚屬敬畏後陞户部尚書鄺埜永樂中陜西按察司副使廉謹自持刑清弊革振揚風紀大得時譽師逵永樂中為陜西按察使徳量宏逺務持大體後陞吏部尚書宋禮永樂中為陜西右布政使立法嚴正吏民畏憚凜然不可犯後遷工部尚書劉同永樂中知邠州農政大舉賦税無虧吏畏其威民懐其惠聲譽赫然後鮮有繼之者孫浩永樂中知咸寧縣存心端正為政公平吏悦民懷政聲著聞尋擢知辰州府陳琰永樂中陜西布政司叅政初秦府有羊三千散養民間每歳徴羔千餘以故不勝其擾琰至即上疏言秦府有軍校有牧地宜自養供用以甦民之力朝廷從之張麟永樂中為陜西都司都指揮同知持己廉能驍勇過人尋陞都指揮使鎮守寧夏軍威大振王士嘉宣徳中陜西布政司叅政在任廉正有為吏民仰慕清譽大振召為禮部侍郎陳卣宣徳中陜西按察司僉事在任端謹詳雅一毫不茍下人愛敬之尋遷大理寺少卿金濓宣徳中陜西按察司副使剛果不撓尋陞副都御史鎮守邊陲才能著稱召為刑部尚書陳鎰正統中以都御史鎮守陜西寛厚清慎不事苛察作興學校聽理獄訟每及代還軍民老稚遮留不忍其去鄧棨正統中陜西按察使在任持大體廉勤端慎理獄平恕行事安靜一方仰賴尋遷副都御史耿九疇以副都御史鎮守陜西持已端方政令簡肅凡處置邊務撫安軍民悉有條理宿弊盡革官吏畏服八郡翕然大治項忠天順中陜西按察使賑饑民活以萬計尋遷右副都御史撫其地奏開泉渠三十餘里又濬涇陽鄭白渠溉田七萬餘頃討固原之叛大小三百餘戰竞殱之大著勞績王朝逺天順間陜西副使㑹虜冦邊督餽餉有功及兵後民艱於食奏減公私租餘粟數萬石及弛茶鹽之禁地方賴以全活後以僉都御史鎮守甘肅覈兵壯修墩堡擇廉吏平物價夷情服邊境晏然藍章成化間以僉都御史撫陜西討平漢中蜀保兒之亂漢人立祠祀之李文祥由進士任咸寧縣丞以不附萬安故有是命熊繡𢎞治間巡按陜西劾布政使于藩貪濫繼知鳯翔府大旱禱於岐山湏㬰甘霔後以都御史來撫巡政績視前尤顯著楊一清陜西提學副使所㧞士多魁天下累遷副都御史督理陜西茶馬茶利大興馬亦蕃盛改巡撫築平虜江右二城以援固原進總制三邊平寘鐇之叛功尤顯著喻茂堅正徳中巡按陜西劾總兵之不法者竟梟示三鎮奏復督臺出疑獄緝巨奸墨吏多望風觧去時有真御史之稱後復任布政使值敵冦花馬池督臺以軍務屬茂堅乃為選將調兵分布井井不可犯敵遂遁去朝廷嘉之賜白金文綺流寓伊尹孟子曰伊尹耕于有莘之野而樂堯舜之道焉有莘即同州郃陽縣成湯三使人以幣聘之遂相湯伐夏救民以天下為己任當時稱為元聖孟子以為聖之任者也石奮趙人有姊能鼔瑟漢髙祖召為美人以奮為中㳙徙其家長安中戚里積功勞孝文時官至太中大夫恭謹無與為比孝景即位以為九卿四子皆以馴行孝謹官至二千石故世號奮為萬石君四皓東園公綺里季夏黄公甪里先生避秦不仕隱居商洛山中漢髙帝欲易太子張良畫計以書幣請至為太子客湏眉皓白衣冠甚偉帝恠問之各言姓名帝驚曰吾求公避迯我何自從吾兒遊乎四人言其故帝曰煩公幸卒調䕶太子竟不易太子者四人之力也陸賈楚人有口辯從髙祖定天下使南越拜尉佗為王稱臣奉漢約髙祖大悦拜賈為太中大夫時稱説詩書著書十二篇以好畤地善因家焉有五男出嚢中千金分之令為産吕后王諸吕陳平患之用賈計與周勃相結遂誅諸吕立文帝朱建楚人廉直有辯初為黥布相布欲反建止之不聽漢髙帝賜建平原君因家長安行不茍合義不取容辟陽侯行不正避之不見及惠帝欲誅辟陽侯建以計脱之馮奉世上黨人徙杜陵補長安長失官乃學春秋讀兵法宣帝時持節送大宛諸國客與其副嚴昌擊莎車王威振西域得名馬而還元帝朝賜爵闗内侯奉世子九人而四子通四經蕭望之蘭陵人徙杜陵好學治齊詩乂從夏侯勝學地節中京師雨雹上疏陳灾異之意宣帝時累遷至諌大夫後為左馮翊京師稱之遷至太子太傅鄭子真褒中人家于谷口躬耕巖石之下名震京師成帝時王鳯以禮聘之不屈王猛北海人少好學倜儻有大志隱居華隂聞桓温入闗披褐詣之捫虱談當世務旁若無人温異之署為軍謀祭酒後事秦符堅為相於是國富兵强秦國大治冦讃上谷人因難徙馮翊少以清㓗知名仕後魏為河南太守遷南雍州刺史在州十七年甚收公私之譽後進爵河南公啖助趙州人後徙闗中淹貫經書唐天寳未調臨海尉善為春秋考三家短長號集傳復攝其所條為例統助卒其門人陸淳趙匡與其子異裒錄助所為損益而纂㑹之號纂例种放洛陽人沉黙好學七歲能屬文與母俱隱終南山豹林谷結草廬以講習為業從學者甚衆宋淳化中屡加禮聘輙辭去所著有䝉書苦卷吳河内人宋相吕夷簡之後金未其父佑徙家闗中從許衡學衡為國子祭酒舉為伴讀元仁宗時累官翰林侍讀學士卒謚文穆子杲果槙皆顯仕孫魯濟寧路總管人物上古倉頡黄帝時人四目為史官觀鳥跡而制字造書契以代結繩之政百官以治萬民以察至秦滅其籍而文不傳周壤駟赤秦人孔門弟子長於詩書唐封北徴伯宋加封上邽侯秦祖秦人孔門弟子篤於守道唐封少梁伯宋加封鄄城侯秦王翦熲陽人將兵六十萬虜楚王負芻以其地置楚郡用兵與白起齊名漢魏尚興平人文帝時為雲中守匈奴畏之不敢近塞田蚡長陵人好儒術武帝時為太尉與丞相竇嬰推轂趙綰等所言皆聽後封武安侯蘇武杜陵人父建以功封平陵侯武天漢初以中郎將使匈奴被留囓雪咽旃仗節牧羝居十九年得還拜典屬國宣帝立賜爵關内侯圖形麒麟閣田千秋長陵人為高廟寢郎㑹衛太子為江充所譛敗久之千秋上急變訟太子寃武帝大感召見而恱之拜為大鴻臚數月遂代劉屈氂為丞相封富民侯昭帝時年老得乘小車入宮因號曰車千秋趙禹漦人武帝時以刀筆吏積勞遷為御史至中大夫與張湯論定律令禹為人㢘倨為吏以來舍無食客公卿相造請終不行報謝務在絶請託孤立行意後為少府九卿以夀卒張安世杜陵人父湯官至御史大夫安世以父任為郎武帝奇其才擢尚書令遷光禄大夫昭帝即位封富平侯宣帝時以定䇿功拜大司馬自漢以來安世子孫七葉侍中諸曹散騎者千餘人翟公下邽人為廷尉賔客填門及罷門外可設雀羅後復用賔客欲徃翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見楊敞華陰人莊重謹畏昭帝時屢遷至御史大夫霍光張安世謀廢昌邑王議定報敞敞驚懼不知所言乆之始許諾宣帝即位月餘卒子惲以才能顯好交英俊諸儒封平通侯魏相平陵人少學易為郡史舉賢良以對䇿高第為茂陵令遷楊州刺史宣帝朝拜相與丙吉同心輔政封高平侯卒諡曰憲圖形麒麟閣尹翁歸杜陵人文武兼備宣帝時拜東海太守以高第入守右扶風㢘平向政治為三輔最三子皆為郡守少子歴位九卿閎孺亦至廣陵相有治名韋𤣥成平陵人父賢本鄒人宣帝朝拜相封扶陽侯𤣥成初以父任為郎與五經諸儒雜論於石渠閣元帝朝拜相封侯故國其父子俱以明經至相孫彪孝行純至好學洽聞官至司徒馮野王杜陵人父奉世為左將軍本潞人徙居杜陵兄譚舉孝㢘為郎早世野王通詩歴長安當陽夏陽令遷隴西太守以治行高入為左馮翊京師稱其威信遷鴻矑卿弟逡通易舉茂才為美陽令遷清河都尉嘗言河隄方畧立通春秋歴五郡太守所居有迹參通尚書為黄門郎綏和中封宜鄉侯張山拊平陵人師小夏侯建為博士論石渠官至少府授同縣李尋鄭寛中山陽張無故信都秦恭陳留假倉由是小夏侯有鄭張秦假李氏之學鄭寛中平陵人有雋才師張山拊傳小夏侯之學成帝時賜爵關内侯疾卒谷永上疏曰鄭寛中有顔子之美質包商偃之文學儼然總五經之𦕈論立師傅之顯位卒然早終宜加𦵏禮賜之令諡上弔贈甚厚朱愽杜陵人初為縣功曹性㢘儉歴櫟陽雲陽平陵長安四縣令累遷冀并二州刺史行部決遣如神後為左馮翊官至大司空代孔光為丞相封陽鄉侯朱雲平陵人少通輕俠年四十變節從師受易論語能傳其業好倜儻大節與五鹿充宗論易連柱五鹿君諸儒語曰五鹿岳岳朱雲折其角成帝時為槐里令上書願借上方劔斬佞臣張禹上怒欲斬之御史將雲去雲攀折殿檻上命舍之谷永長安人博通經書元帝時為太常丞數上疏言得失累遷光禄大夫終大司農王嘉平陵人初以明經射䇿甲科為郎坐事免鴻嘉中舉敦朴直言召對政事得失累遷至御史大夫前後屢上封事哀帝時拜相封新甫侯蔣詡杜陵人嘗於舍前竹下開三徑惟故人求仲羊仲從之游哀帝時為兖州刺史以亷直著名王莽居攝以病免官歸鄉里臥不出户蕭育杜陵人望之之子以父任為太子庶子後為茂陵令歴司𨽻校尉右扶風誅捕鄠縣賊哀帝時以南郡江中多盜拜南郡太守育至郡盜靜以病去官復起為光禄大夫執金吾以壽終育少與陳咸朱博友善故長安語曰蕭朱結綬言其相薦達也陳遵杜陵人哀帝末以功封奮威侯性好客每㑹飲取客車轄投井中雖有急不得去善書與人尺牘皆藏以為榮云敞平陵人師事同縣吳章王莽子宇與章謀夜以血塗莽門若鬼神之戒事發莽殺宇章坐腰斬初章為當世名儒弟子千餘人皆禁錮門人盡更名他師敞時為大司徒掾自劾吳章弟子收章尸葬之京師稱焉王舜薦為中郎諫大夫王丹下邽人哀平時仕州郡王莽時連徵不至家累千金隱居養志好施周急每歳農時常載酒殽詣田間以勞勤者而誨勵其惰者十餘年間其化大洽風俗以篤邑致殷富竇融平陵人廣國七世孫更始拜為鉅鹿太守融以東方尚擾求為張掖屬國都尉撫輯雄傑遂據河西光武即位決策歸漢授涼州牧後從征隗囂以功封安豐侯及入朝拜大司空從子固亦好覽書傳喜兵法襲父友爵封顯親侯耿弇茂陵人上谷太守況之子好學肄騎射更始初謁光武於盧奴光武指曰是我北道主人也弇歸說父發突騎助討王郎又從擊銅馬等賊以功封好畤侯耿國弇弟為五官中郎將時單于欵塞朝議欲不許國獨言宜如孝宣故事帝從之自是中國無事者二十七年官至大司馬萬修茂陵人更始時為信都令與太守任光都尉李忠迎光武拜為偏將軍從平河北以功封槐里侯馬援茂陵人援三兄況余負皆仕為二千石援嘗辭兄況就邊郡田牧況曰汝大器當晚成建武初為隗囂奉書詣洛陽見光武後遂歸漢拜隴西太守伏波將軍討平交阯及武陵蠻從弟少游四子廖防光客卿族孫稜官至廣陵太守申屠剛茂陵人王莽時避地河西建武中徵拜侍御史質性方直常慕史鰌汲黯之為人光武嘗欲出遊剛諫不聽乃以頭軔乘輿輪帝遂為止後為大中大夫郭伋茂陵人少有志行光武召拜雍州牧歴漁陽頴川太守後調并州牧過京師上言選補衆職當簡天下賢俊帝納之後為大中大夫孔奮茂陵人少受學劉歆王莽末避兵河西為竇融守姑臧與妻子甘澹泊而奉母極厚光武時單車就徵吏民饋遺悉不受後遷武都太守郡中稱為清平張純安世𤣥孫父放為成帝侍中純襲爵土光武時更封武始侯嘗將突騎安集荆揚純在朝歴世明習故事朝廷禮儀多所正定後為大司空子奮好學節儉所得俸皆分瞻宗親後為司空班彪安陵人祖說越騎校尉父雅廣平太守彪沉重好古初事竇融勸融歸漢光武初舉茂材拜徐令所著賦論奏事凡九篇宋𢎞長安人威容德器羣臣莫及光武時為大司空嘗止繁聲戒淫色尤以清行著聞封宣平侯景丹櫟陽人更始時為上谷長史與冦恂等將兵歸光武拜偏將軍與吳漢從討王郎以功拜驃騎大將軍封櫟陽侯明帝時圖形雲臺摯恂京兆人博通經籍以儒術教授隱於南山不應徵聘名重關西馬融從之游學恂以女妻之第五倫長陵人峭直無私京兆尹閻興召為主簿署督錢掾領長安市市無阿枉百姓恱服每讀光武詔書歎曰此聖主也一見決矣章帝時擢為司空曽孫種以司徒掾奉使稱職封高宻侯杜篤杜陵人居美陽延年曽孫吳漢卒光武召諸儒誄之篤時在獄中為誄辭最髙帝美之賜帛免刑仕至郡文學章帝時從馬防擊西𦍑戰歿所著賦誄七言女誡之類凡十八篇王隆雲陽人避難河西為竇融左護軍建武中為新汲令所著有詩賦銘書杜林扶風茂陵人父鄴涼州刺史林博洽多聞時稱通儒光武召為侍御史嘗議郊祀禮累官至大司空子喬為丹水長宣秉雲陽人少修高節王莽徵不至光武初拜御史中丞秉性儉約所得俸禄輙散親族後拜大司徒子彪仕為郎張湛平陵人矜嚴好禮動止有則在鄉黨詳言正色人以為儀表光武時拜光禄勲數諫諍後為太子太傳耿恭國弟慷慨多大畧明帝時以戊已校尉攻匈奴引兵據疏勒城拜井得水以功拜騎都尉東漢以來耿氏子孫踵歴顯仕者數十百人耿秉國子博通書記能說司馬兵法明帝時拜謁者僕射與竇固等擊車師征匈奴以功封美陽侯弟䕫少有氣節從竇憲征匈奴斬其名王以下甚衆出塞五千里而還封粟邑侯亷范杜陵人父遭亂客死於蜀范時年十五徃迎父柩船破俱溺以救得免明帝時范舉茂才遷雲中太守匈奴不敢犯後徙蜀郡民歌其政初范與慶鴻為刎頸交時人稱曰前有管鮑後有慶亷竇憲融曾孫建初中以后兄稍遷侍中後因殺都鄉侯暢懼誅請擊匈奴贖罪拜車騎將軍出塞大破匈奴勒功燕然山而還封冠軍侯族子章好學冇文章為東觀校書郎班固彪長子九歳能文及長博貫載籍明帝時典校秘書續成父所著西漢書及作兩都賦與頌記凡若干篇班超固弟少有大志家貧傭書養母嘗投筆歎曰大丈夫當立功異域以取封侯安能久事筆硯間乎明章兩朝出征西域安集五十餘國封定逺侯子勇有父風章帝時為軍司馬馮衍杜陵人野王孫幼有奇才大志不戚戚於賤貧嘗作顯志賦以自勵仕為曲陽令建武中因日食上書陳八事肅宗甚重其文子豹事後母孝謹舉孝亷拜尚書郎累遷武威太守徵為尚書傅毅茂陵人博學能文以明帝求賢不篤士多隱處嘗作七激以為諷章帝以為蘭臺令史拜郎中與班固賈逵共典校書文雅顯於朝廷毅早卒著詩賦誄頌連珠凡二十八篇魯恭平陵人世吏二千石父為武陵太守卒時恭及弟丕尚幼晝夜號踊稍長居太學講誦章帝時與講白虎觀出宰中牟政有三異後為大司徒弟丕通五經舉賢良累官陳留郡守後拜侍中楊政京兆人少從范升受梁丘易善說經書教授常數百人京師語曰說經鏗鏗楊子行子行政字也章帝時官至左中郎將秦彭茂陵人六世祖襲與羣從五人同時為二千石三輔號萬石秦氏彭建初時為山陽太守以禮訓人後徙頴川有鳯凰麒麟嘉禾甘露之瑞肅宗巡行輙賞賜焉何敞平陵人六世祖比于武帝時廷尉正敞性公正章帝時累官汝南太守徴拜五官中郎將馬融茂陵人美辭貌有俊才受學摯恂博通經籍永初間拜校書郎以忤鄧氏滯東觀十年不得調後為河間王廐長史召拜郎中桓帝時為南郡太守融才高博洽為世通儒教養諸生常有千數所著述甚富李育漆人少習公羊春秋為班固所重章帝時為議郎後拜博士詔與諸儒講論白虎觀為時通儒累遷至侍中樂恢長陵人好學精誦性亷直竇憲北征數上書諫和帝時為尚書僕射後稱疾歸憲風州郡迫脅飲藥死弟子衰絰輓者數百人蘇章平陵人建八世孫祖純南陽太守章舉賢良方正對䇿為議郎數陳得失順帝時為冀州刺史不私故人州境望風畏肅宋登長安人父由為太尉登少傳歐陽尚書教授数千人為汝陰令政明如神入為尚書僕射順帝時拜侍中數上封事抑退權臣出守頴川道不拾遺及卒汝陰以配社祠蘇不韋平陵人父謙為金城太守既罷私至洛陽為司𨽻李暠詰掠死以報宿怨不韋嘆曰伍子胥獨何人也遂變姓名募劔客邀暠不克因殺其妾并及小兒又馳至魏郡掘其父冢斷頭以祭父墳暠憤傷發病嘔血死賈逵平陵人父徽受左氏春秋兼習國語周官尚書毛詩逵悉傳其業尤倜儻有大節明帝時拜為侍中至和帝時内備帷幄兼領祕書甚見信用所著絰傳義詁及論難百餘萬言學者宗之稱為通儒楊震華陰人八世祖喜髙帝時赤泉侯震明經博覽諸儒語曰關西夫子楊伯起年五十始仕歴郡守安帝時拜太尉居官清白以四知却所饋金或勸殖産業震曰使後稱清白吏子孫不亦可乎第五訪倫族孫少孤貧傭耕以養兄嫂有暇則以學文仕為新都令政平化行順帝時為張掖太守開倉賑飢不俟上報帝璽書嘉之楊秉震子桓帝時以侍中尚書拜太尉每朝廷得失盡忠規諌多見納用嘗歴豫荆徐兖四州刺史所至以純白稱子賜累官至太尉司空劉寛華陰人司徒﨑之子性度寛仁桓帝時守南陽吏人有過蒲鞭示辱嘉平中拜太尉後封逮鄉侯趙歧長陵人少明經有才藝嘗與兄襲得罪中常侍唐衡避禍北海唐死乃出徵拜議郎嘗著孟子章句及三輔決錄後居荆州卒先自為夀藏韓康霸陵人家世著姓康賣藥後隱霸陵山中連徴不起桓帝備𤣥纁安車聘康康辭自乘柴車至道中遁去竇武平陵人少以經行著稱延嘉中以掖庭親拜侍中遷越騎校尉封槐里侯靈帝立拜大將軍謀誅中常侍曹節等不克遇害梁鴻平陵人受業太學家貧尚節里有女孟光者擇對不嫁問之曰欲節操如梁鴻者鴻遂娶之與俱入霸陵山中業耕織後適吳賃舂光每饋食舉案齊眉楊彪秉孫獻帝時拜太尉李催郭汜之亂盡節衛主魏文帝立欲拜為太尉彪固辭乃賜几杖待以賔禮子修好學有俊才為曹操主簿操忌其才因事害之三國馬超茂陵人輔漢昭烈以功封定西將軍遷左將軍卒諡曰威蘇則武功人少以學行聞辟舉不就後為酒泉太守聞魏代漢發服悲哭魏初左遷東平相杜畿杜陵人少孤繼母苦之以孝聞年二十為郡功曹決遣繋獄魏武以為河東守治為天下最後封豐樂侯子恕大和中為散騎黄門侍郎專心向公侍中辛毗等器重之張既髙陵人舉茂才除新豐令治為三輔第一魏初以為京兆尹後為雍州刺史安定太守在郡十餘年政惠著聞後封西鄉侯晉杜預畿孫博學時號杜武庫武帝時為河南尹荆州都督羊祜舉預自代拜征南將軍以平吳功封冨陽侯嘗作春秋左傳集解子錫累官太子舍人亮直屢諫諍太子患之置針於錫坐氊中以刺之摯虞長安人父模魏太僕少卿虞才學通博著述不倦武帝時歴祕書監衛尉卿撰文帝志四卷族姓昭穆十卷王育京兆人少孤貧為人牧羊每過小學必歔欷流涕時折蒲學書同郡許子章聞而嘉之給衣食使與其子同學遂博通經史後為武陽令為政清約遷并州督護破虜將軍南北朝吉翰馮翊人叅宋武帝中軍事清謹勤正為武帝所知賞累遷徐州刺史監豫州梁郡諸軍事吉士瞻蓮勺人少有大志不事産業年逾四十始事梁武帝以功歴巴東相建平太守後為梁秦二州刺史加都督入為太子古衛率又為西陽武昌太守在郡清約家無私積康絢藍田人祖穆姚秦河南尹宋時率郷族三千家至襄陽絢倜儻有志性寛和少喜懼仕梁為竟陵太守累遷司州刺史領安陸太守冦雋馮翊人讃之孫幼有識量好學強記性又亷恕仕魏累官司馬出為梁州刺史立庠序勸耕桑敦禮讓風俗頓革後為東魏洛州刺史卒年八十二吉翂馮翊人梁天監初父為吳興原鄉令為吏所誣當大辟翂年十五撾登聞鼓乞代父命武帝疑其受教於人敕廷尉脇誘取實翂對終不屈撓乃宥其父後丹陽尹王志欲舉充純孝翂曰父辱子死斯道固然若當此舉是因父買名也拒之而止韋叡杜陵人事繼母以孝聞仕梁累遷豫州刺史領歴陽太守叡晝接賔客夜叅軍書每臨陣常執竹如意以麾號名將馬樞茂陵人六歳能誦孝經論語及長博極經史尤善周易老子義梁邵陵王刺南徐州素聞其名引為學士侯景之亂乃隱茅山有終焉之志陳文帝徴為度支尚書辭不應命韋放叡子長身偉貌性篤實輕財好施仕梁至北徐州刺史弟正為㐮陵太守稜光禄卿黯累官至輕車將軍楊播華陰人仕魏爵華陰伯子侃襲爵播弟椿官司徒津為司空家世純厚並敦義讓昆季相事有如父子津子愔仕北齊拜尚書令尤有名侯植北地三水人少倜儻仕魏為義州刺史從孝武西遷破沙苑平江陵以功累進大都督封汧源縣公蘇綽西魏武功人博物多通為宇文泰行臺郎中僕射周惠達稱其有王佐才泰推心任之拜大行臺左丞叅典機宻官至度支尚書韋佑京兆人質直寡言父歿事母以孝聞西魏時為東洛州刺史與東魏戰流矢中頸從口中出久之乃蘇後為驃騎大將軍進爵為公韋孝寛杜陵人沉敏和正渉獵經史西魏時為浙陽郡守有政術轉晉州刺史移鎮玉壁齊神武引衆來攻悉其智力孝寛咸拒破之後上䇿平齊進位大司空上柱國王羆京兆霸城人質直木彊處物平當初仕魏為殿中將軍稍遷雍州别駕後仕周為大都督鎮華州以功進爵扶風郡公隋韋鼎杜陵人兄載仕梁以平侯景功為散騎常侍鼎明陰陽善相見隋文帝曰公當大貴貴則天下一家及隋代周平陳帝召見鼎拜儀同三司韋洸孝寛從子剛毅有器幹便騎射嘗從孝寛擊破突厥拜江陵總管以平陳功累拜廣州總管弟藝累官上開府世冲為民部尚書韋師杜陵人少有至性居憂盡禮及長畧渉經史工騎射仕後周為賔曹叅軍隋初拜吏部侍郎爵井陘侯楊伯醜馮翊人好讀易隱於華山文帝召與語竟無所荅賜衣服捨之而去其論易辭義皆異先儒之㫖而思理𤣥妙出於獨得非常人所及竇榮定平陵人深沉有器局文帝初拜右武侯大將軍辛贈陳國公劉方京兆人性剛决有膽氣初仕後周以戰功拜上儀同後事隋文帝進爵為公仁夀中為交州道行軍總管討平俚人汙其宫室刻石紀功而還韋世康杜陵人沉敏有器度開皇中拜吏部尚書多所進拔朝廷稱為亷平史萬歳杜陵人善騎射好讀兵書隋平陳萬歳為行軍總管踰嶺越海攻破溪洞還拜左領軍將軍楊素華陰人少有大志為御史大夫數進取陳之䇿及伐陳為行軍元師江南平與高熲專掌朝政累加上柱國封越國公楊武通華陰人性果烈善馳射以討西南夷功封白水郡公後羗為邊患朝廷以其威名歴岷蘭二州總管以鎮之蘇威綽子少有至性䘮父母哀毁骨立徵拜太子太保累遷尚書石僕射子䕫博覽羣言尤以鍾律自命仕為太子通事舍人著樂志十五篇楊善㑹華陰人大業中為鄃令以清正聞後以擊賊拜清河郡丞時山東思亂從盜者如市郡縣陷没相繼能抗賊者惟善㑹而已唐屈突通長安人初仕隋為右武衛將軍守河東高祖與戰乆不下乃留兵圍之遂濟河通誓以死報國俄聞京師平家盡没兵敗被執高祖以其忠臣釋之授兵部尚書蔣國公後配享太宗廟廷劉𢎞基池陽人少以蔭補隋右勲侍唐興有功累封任國公卒諡曰襄皇甫無逸萬年人隋并州司馬誕子歴清陽太守治為天下最後仕唐為刑部尚書終益州大都督府長史姚思㢘萬年人父察本吳興人思㢘初仕隋為代王侍讀唐兵入城獨侍王不去後為唐𢎞文館學士與魏徵共撰梁陳書子璹累官地官冬官二尚書班歴六州刺史政皆有績劉文靜武功人倜儻有大志隋末為晉陽令與唐太宗謀起義高祖初授民部尚書杜如晦京兆杜陵人叔淹材辯多聞官至檢校吏部尚書如晦少英邁臨事善斷有王佐才太宗引為文學館學士進僕射與房𤣥齡共筦朝政封萊國公弟楚客工部尚書五世孫元穎穆宗時拜相李大亮涇陽人有文武才畧初為土門令能捕盜賊貞觀時都督凉州有諷使獻名鷹者大亮宻表言之太宗報曰有臣如此朕復何慮入為工部尚書韋𢎞機萬年人貞觀中為左千牛胄曹參軍使西突厥還上西征記太宗大恱累遷殿中監檀州刺史以邊人不知文儒貴乃修學宫畫孔子像敦勸生徒由是大化孫景駿累官房州刺史所至有循良之政殷開山鄠縣人從太宗征伐有功仕至吏部尚書進爵鄖公圖形凌煙閻立德萬年人與弟立本俱有巧思武徳中立德嘗製衮冕六服咸有典則官至工部尚書立本貞觀中自主爵郎中代兄為工部尚書總章初拜右相于志寧髙陵人後周太師謹曽孫太宗引為文學館學士貞觀中為太子右庶子能直諫累遷侍中拜左僕射封燕國公蘇世長武功人祖彤仕魏父振仕周世長隋末為長安令唐初拜諫議大夫貞觀初使突厥與頡利争禮不屈朝廷任之張儉新豐人初檢校代州都督建平糴法貞觀中都督營州有征遼功兄文師太僕卿弟是師右衛大將軍門有三㦸李𤣥通藍田人立定州總管為劉黒闥所破黒闥愛其才欲以為將不聽囚之故吏有餉飲餽者𤣥通曰諸君見哀吾能一醉遂縱飲謂守者曰吾能劔舞可借刀守者與之曲終仰天太息曰大丈夫不能保所守尚何視息耶乃潰腹死侯君集三水人以材雄稱從太宗征伐有功平高昌刻石紀功而還封潞國公圖形凌烟李靖三原人姿貌魁奇貞觀中出將入相封衛國公卒諡景武圖形凌烟弟客師累戰功封丹陽郡公孫思邈華原人通陰陽推步醫藥居太白山隋文帝以國子博士召不拜太宗召至京師時年已老欲官之不受竟稱疾還山崔敦禮咸陽人多涉書傳以節義自將武徳中為通事舍人善辭令進止太宗時官至中書令唐臨長安人周内史瑾之孫唐初為萬泉丞有囚久繫臨以方春說令使暫出務農如約而還高宗朝累遷至吏部尚書田仁㑹長安人擢制舉累官左武侯中郎將太宗征遼東薛延陀以數萬騎掩河内仁㑹擊敗之為平州刺史歳旱自暴以祈雨􅂖大登民歌之五遷勝州都督轉右衛將軍韓瑗三原人父仲良唐初預定律令官至刑部尚書瑗博學曉吏事永徽中為侍中王后之廢褚遂良之貶瑗切諌不納乞歸田里後因許敬宗誣奏貶振州刺史楊𢎞禮素從子太宗征遼東𢎞禮為中書舍人與褚遂良等掌行在幾務還拜司農卿弟𢎞武髙宗時為西臺侍郎居職以清簡稱令狐徳棻華原人博貫文史初為秘書丞高宗朝為𢎞文館學士累遷國子祭酒五世孫峘天寶末進士後撰𤣥宗寶録屬起居注亡散峘裒掇詔䇿備一朝之遺唐休璟始平人舉明經高第高宗時累遷靈州都督陳方畧請復四鎮又破吐蕃兵景雲初拜特進為朔方行軍大總管備突厥卒諡曰忠田遊巖三原人永徽中隱太白山後入箕山居許由祠傍自號東隣高宗嘗幸其門召拜崇文館學士後聽還山韓思復長安人高宗時為滁州刺史累遷諫議大夫𤣥宗時山東蝗思復言當悔過責躬帝然之後遷御史大夫子朝宗京兆尹曽孫佽桂管觀察使李昭徳長安人父乾祐後周司刑太常伯昭徳彊幹有父風武后時累官御史中丞以剛直稱嚴譔朝邑人高宗時舉銷聲幽藪科及第武后時為詳審使平活八百餘人又嘗按囚罷疑不實者百人酷吏來俊臣等疾之誣以罪謫交趾五歳得還拜右散騎常侍子向乾元中為鳯翔尹蘇良嗣世長子垂拱中遷文昌右相嘗怒僧懷義偃蹇叱左右批其頰後罷相仍知政事子踐言官至太常從孫弁德宗時為度支郎中李逈秀大亮族孫武后時以鳯閣鸞臺平章事出為衡州長史中宗朝累遷至兵部尚書事母孝堂産芝草犬乳鄰猫中宗謂為孝感旌表其門韋安石孝寛曽孫祖津父琯皆歴顯仕安石初調乾封尉武后擢鳯閣鸞臺平章事數折辱二張時論偉之睿宗朝為中書令子陟善文詞書有楷法與弟斌居父䘮杜門者八年張九齡引為中書舍人累遷吏部尚書高叡萬年人武后時為趙州刺史黙啜入冦叡力不能制即自經不得死為虜執見殺贈尚書子仲舒通故訓擢明經為相王府文學王所欽器開元初宋璟蘇頲當國多諮訪焉官至右庶子韋湊萬年人祖叔諧貞觀中與兄季武弟叔謙同時為郎中湊累遷鴻臚少卿中宗初諌作金仙等觀出為陜汝岐三州刺史後歴河南太原尹蘇珦藍田人擢明經調鄠縣尉裁決明辨長史李義琰異之中宗時累官户部尚書封河内郡公子晉有文名官終左庶子韋叔夏萬年人通禮學每朝廷儀制皆與參討中宗時為太常少卿進封沛郡公子縚開元中累遷太常卿終太子少師李適萬年人初調猗氏尉與修三教珠英遷户部員外郎景龍初擢修文館學士工部侍郎卒子季卿舉明經博學宏辭代宗時為吏部侍郎振拔幽滯薦進才髦時稱為恢博君子張仁愿下邽人有文武才神龍中為洛州長史盜不入境又為朔方總管築三受降城拜同中書門下三品封韓國公李元紘萬年人父道廣武后時同鳯閣鸞臺平章事元紘初為雍州司户參軍累遷至中書侍郎務抑奔競再世宰相俱有清節韋斌安石次子與兄陟齊名天寶中為集賢學士時從兄由為金吾衛將軍縚為太子少師兄弟同時列㦸子況少隱王屋山元和初授諌議大夫數月竟辭去李朝隱三原人擢明經嘗為長安令宦官閻興貴有所干請曵去之開元中為吏部侍郎先是斜封授官朝隱執罷者千四百員至是銓叙明審累官至御史大夫韋述𢎞機曽孫性嗜書舉進士開元初為櫟陽尉累遷起居舍人撰武徳以來國史文約事詳累遷集賢學士工部侍郎述任史官二十年蓄書二萬卷古草𨽻帖祕畫古器圖譜無不備有所著書二百篇弟逌迪學業亦亞於述述與逌對為學士與迪並禮官搢紳高之韓休長安人父大智洛州司功叅軍兄大敏鳯閣舍人休舉賢良擢補闕𤣥宗朝拜黄門侍郎為人峭直遇事輒諌或謂𤣥宗曰休為相陛下殊瘦於舊上曰朕雖瘠天下肥矣官至太子少師于休烈志寧曽孫機鑒精敏善文章開元中擢制科累官集賢殿學士肅宗時為太常少卿終工部尚書二子益肅繼為翰林學士肅子敖户部侍郎敖子琮右僕射蘇頲威𤣥孫父瓌累官同中書門下三品封許國公頲幼敏悟一覽千言累官修文館學士與父瓌同在禁中時人榮之開元中拜相弟銑給事中韋抗萬年人弱冠舉明經累官御史中丞開元中拜黄門侍郎後為御史大夫弟拯仕至刑部尚書李適之京兆人天寶初代牛仙客為相李林甫以計去之故適之詩有云避賢初罷相樂聖且銜盃王忠嗣鄭縣人父海濵與吐蕃戰死忠嗣年九歳授尚輦奉御𤣥宗愛之養禁中及長雄毅有武畧後節度朔方及河東有破賊功吳筠華陰人通經善文辭性高鯁𤣥宗召至京筠請𨽻道士籍入嵩山又召見問道筠開陳皆名教後仍還嵩山路嗣恭三原人為蕭關令考績為天下最𤣥宗以其可嗣漢魯恭因賜名官至兵部尚書封葉國公嚴武華陽人父挺之少好學舉進士制科歴官刑部侍郎遷左丞武幼豪爽房琯薦為給事中𤣥宗擢為成都尹遷黄門侍郎後節度劔南破吐蕃有功從孫綬擢進士第官至尚書右僕射荆南節度封鄭國公杜甫杜陵人其先自襄陽徙河南父閑為奉天令遂居杜陵而甫生焉𤣥宗朝獻賦命待詔集賢院後轉檢校工部員外郎甫博覽羣書善為詩歌涵渾汪洋千態萬狀至陳時事律切精深世號詩史元稹謂詩人以來未有如子美者于邵萬年人天寶末補崇文館校書郎出為道巴二州刺史以諌議大夫知制誥朝廷大典册多出其手程千里萬年人魁岸有力天寶末為安西北庭節度使禄山反千里守上黨賊將攻城千里率騎欲擒之㑹救至退還馬墜塹中反被賊擒謂從騎曰歸語諸將善為守備賊攻城竟不克送千里於洛陽囚之李嗣業髙陵人長身有膂力以軍功歴官驃騎大將軍天寶末從平安禄山以功封虢國公龎堅涇陽人四世祖玉魁梧有力明軍法髙祖時為領軍武衛二大將軍梁州總管堅歴頴川長史安禄山反堅守城晝夜與賊戰無援被執而死韋見素湊子性仁厚天寶中為黜陟使所至震畏遷吏部侍郎銓叙平允又拜左相從帝幸蜀封􅃎國公肅宗立拜尚書右僕射致仕子諤累官御史中丞終給事中從孫顗官至吏部侍郎郭子儀華州鄭縣人自武舉補左衞長史累遷至同平章事平安史之亂功居第一加司徒封代國公徳宗賜號尚父封汾陽王八子四孫皆以才顯李泌京兆人七歳知為文𤣥宗嘗與張說觀奕召泌賦方圖動靜泌應聲即對說賀得奇童帝因使與太子為布衣交後謁肅宗於靈武入議國事出陪輿輦兩京之復泌謀多功大官至宰相封鄴縣侯來瑱永壽人父曜開元末持節磧西著名終左領軍大將軍瑱畧知書有大志安禄山反瑱守潁川前後殺賊甚衆以功加防禦招討節度等使封潁國公肅宗末年拜相李峴吳王恪孫世居京兆折節下士累官京兆尹𤣥宗歳幸温湯甸内皆巧供億以媚上峴獨無獻帝異之乾元初拜相出刺蜀州代宗召為禮部尚書兄峘御史大夫嶧户部侍郎兄弟同居門列三㦸蘇源明武功人少孤工文辭累官國子司業安禄山陷京師源明稱病不受偽署肅宗時擢知制誥數陳時政得失終祕書少監第五𤦺長安人少以吏幹進累官諸道鹽鐵使進御史中丞肅宗朝拜相後為京兆尹韓滉休子肅宗初避地山南李承昭表為郡長史三遷吏部員外郎性剛直明吏事德宗時為江淮轉運使後封晉國公嘗著通例及序事奏議各一篇子臯歴官京兆尹終左僕射韓洄滉弟以蔭補𢎞文館生安禄山亂避難江南肅宗時為睦州别駕德宗朝拜户部侍郎終國子祭酒李勉京兆人少好學沉雅清整從肅宗靈武擢監察御史劾大將管崇韜背闕坐代宗時為京兆尹政尚簡肅德宗興元中拜相所得俸賜皆分遺親黨身歿家無贏藏令狐彰富平人代宗時為永平節度使承滑毫離亂之後治軍勸農府廩充實時藩鎮率皆䟦扈獨彰貢獻不闕歳遣兵詣京西防秋自齋糧食所過秋毫不犯李夷簡鄭惠王四世孫世居京兆累官御史大夫出為淮南節度以清直自閑歴三鎮家無餘貲臨終戒以母厚葬母事浮屠母碑神道常衮京兆人性狷潔文采贍蔚初為中書舍人代宗朝與楊綰同執政後為福建觀察使設置鄉校閩人由是知學崔祐甫沔子第進士代宗時為中書舍人時有表猫䑕同乳為瑞者宰相欲率百官賀祐甫不賀曰物反常為妖何以賀為宜戒法吏之不察姦邊吏之不禦冦者以承天意帝嘉之未㡬拜相薦入人才莫不諧允子植長慶初亦拜相韋夏卿萬年人少邃於學善文詞大厯中與弟正卿舉賢良方正出為奉天令課第一後為吏部侍郎京兆尹晚歳歸署其居曰大隱洞楊綰華陰人少孤貧事母甚孝性沉靜大厯中拜相制下朝士相賀奢侈者靡然改行嚴郢華陰人父正誨以才吏更七郡郢第進士大厯末為京兆尹嚴明守法疾惡撫窮敢誅殺盜賊一衰號稱職尹李程京兆人擢進士第一賦日五色士流推之初調藍田尉縣有滯獄十年程單言輒判德宗時為翰林學士敬宗初拜相徐申京兆人擢進士第遷洪州長史曹王臯討李希烈以申行刺史事任職辦臯表其能遷韶州刺史累進嶺南節度使封東海郡公馮河清京兆人徳宗幸奉天時河清為涇原判官與知州事姚況集將士大哭激以忠義發申兵輸行在由是軍聲大振帝即拜河滑安定郡王韋臯萬年人德宗時累官檢校司徒兼中書令順宗朝表請皇太子監國及暴王叔文等姦惡卒贈太師賈隱朴華原人父循官遊擊將軍隱朴德宗時朱泚之亂率衆扈行在陳攻守訃累遷檢校右散騎常侍賊圍急隱朴與侯仲莊力戰圍解拜神䇿統軍韋武萬年人以蔭補右千牛累遷長安丞德宗幸梁州武委安子奔行在後為絳州刺史鑿汾水灌田璽書勞勉憲宗時入為京兆尹卒贈吏部尚書杜黄裳萬年人舉進士憲宗時累官同平章事劉闢叛於蜀黄裳表委高崇文進討蜀平憲宗曰皆卿之功也後封邠國公韋處厚萬年人事繼母以孝聞初授集賢校書郎憲宗朝數上諫疏出為同州刺史穆宗立拜翰林學士承㫖進同平章事杜佑萬年人父希望恒州刺史佑以蔭補叅軍德憲兩朝拜司空進司徒封岐國公佑嗜學撰通典二百篇二子式方桂管觀察使從郁秘書丞孫悰武宗朝拜相後封邠國公令狐楚德棻裔孫五歳能文憲宗時知制誥遷翰林學士後為左僕射楚外嚴中寛待士有禮為政有績後出為山南節度使白居易下邽人元和初調盩厔尉後為左拾遺出為江州司馬久之擢主客郎中知制誥與元稹多酬咏時稱元白會昌初為刑部尚書弟行簡子龜年許孟容長安人方勁有禮學擢進士憲宗時為京兆尹時神䇿軍驕恣有李昱者貸富人錢不肯歸孟容捕詰與之期使償京師豪右大震後遷吏部侍郎弟季同京兆少尹栁公綽華原人性孝友平生不讀非聖之書初補校書郎嘗奏箴以諷憲宗游畋拜御史中丞累遷撿校左僕射柳公權公綽弟博貫經術元和初進士仕為侍書學士穆宗嘗問筆法對曰心正則筆正帝悟其筆諫文宗朝累官學士承㫖以太子太保致仕弟公度善攝生年八十餘有強力竇易直始平人擢明經補校書郎歴藍田尉累遷浙西觀察使入為户部侍郎文宗立為左僕射以公潔自喜未嘗引用親黨杜牧佑孫善屬文能詩有竒節第進士累官史館修譔終中書舍人弟覬亦舉進士累官秘書省正字善屬文與牧相上下韋丹孝寛六世孫早孤從外祖顔眞卿學舉五經髙第歴咸陽尉累遷諫議大夫出為江南西道觀察使甚有冶狀子宙官至尚書右僕射楊於陵華陰人冇奇志擢進士德宗時拜中書舍人遷浙東觀察使政聲流聞入為京兆尹請限丁制姦人無所隱賴元和初為嶺南節度以尚書左僕射致仕子嗣復八歳知屬文後擢進士文宗時拜同平章事令狐綯楚子舉進士宣宗朝為翰林學士累遷至承㫖嘗夜對禁中燭盡帝以金蓮炬送歸院後拜檢校司徒李固京兆人長慶中擢第後拜相當國有賢譽盧鈞藍田人舉進士拜華州刺史關輔驛馬疲耗鈞為市徤馬率三歳一易自是無乏後為吏部尚書左僕射懿宗初以太保致仕杜審權如晦之後清重寡言性長厚宣宗時累官學士承㫖在翰林最久終不漏泄禁近語坐必歛袵常若對大賔懿宗立拜相子讓能累官中書侍郎進太尉白敏中居易從弟長慶初進士武宗時召為學士承㫖宣宗立拜相懿宗時加中書令咸通中致仕楊收馮翊人早孤母授之經遂善屬文號神童懿宗時為學士承㫖累遷尚書右僕射兄發嶺南節度假常州刺史弟嚴及長子鉅皆翰林學士次子鏻户部尚書嚴二子涉吏部尚書汪翰林學士栁仲郢公綽子方嚴簡素累官侍御史京兆河南尹其父子居官不奏祥瑞不度浮屠非慶弔不至宰相第子璞珪璧玭皆謹守家法玭以明經補秘書正字累拜御史大夫韋貫之京兆人兄綬舉進士德宗時為翰林學士貫之及進士第官至宰相嚴身律下以正議裁物子澳宣宗時尹京兆豪右歛迹綬子温亦仕為翰林學士温女歸薛䝉工屬文續曹大家女訓王徽京兆人僖宗時以翰林學士拜相帝西狩蜀為左僕射充京畿留守外調兵食内撫流亡裁制有宜後進檢校司空韋昭度京兆人累官中書舍人僖宗西狩以學士承旨扈從還京授司空遷侍中趙隱奉天人朱泚攻城時其祖植率家人奴客拒守賊平擢鄭州刺史父存約賊亂遇害隱與兄隲廬墓十餘年不應辟召後擢第拜相子光逢光裔光𦙍皆登第光逢為翰林學士光裔知制誥韓偓萬年人累官學士承㫖時宰相韋貽範䘮母詔還位命偓草詔偓曰腕可斷麻不可草朱全忠怒其薄已斥偓罪貶濮州司馬凡儀亦以御史中丞貶司馬偓因挈族依王審知五代王易簡萬年人唐末避地山谷間梁初既舉進士復隱華山後唐時召為右拾遺以上書忤㫖出為邠州推官周顯德中以太子少保致仕宋初加少傅卒子景讓舉進士官至尚書郎李懌京兆人舉進士後唐翰林學士時有請下學士院作詩賦為貢舉格者懌曰後尘可畏豈能與英俊為準格聞者多其知體後遷刑部尚書分司洛陽張保續萬年人性介直好儉素初仕梁歴唐晉至宋為衛尉卿判閣門事前後四十年善宣賛辭令聽者傾聳累使蕃國不辱命從征李筠以疾留河内竇貞固白水人後唐同光中舉進士為河東節度推官晉初應詔上封事累官翰林學士工禮刑三部尚書後仕漢為司徒封汧國公宋李濤萬年人慷慨有大志以經綸為己任工為詩筆扎遒勁居家以孝友聞弟澣晉翰林學士孫仲容宋翰林侍讀學士官至户部侍郎杜漢徽長安人有膂力善騎射年十七仕後唐為䕶聖指揮使宋初領潮州刺史從平李筠李重進録功居多出為雄武軍使知屯田事被病家人勸其求醫藥漢徽笑曰我在戎行四十年大小百餘戰不死幸矣安用藥為陶穀新平人祖彦謙有詩名歴三州刺史父渙夷州刺史穀幼有俊才仕五代周為翰林學士宋興歴禮刑户三部尚書遷學士承㫖乾德初郊祀法物制度多所裁定雷德驤邵陽人周廣順中進士為磁州判官宋初拜殿中侍御史判大理寺言趙普擅増刑名後歴官至工部侍郎卒贈太師曽孫簡夫累官職方員外郎崔翰萬年人風姿偉秀驍勇有謀太祖時以功累官端州團練使後從太宗征太原流矢中其頰督戰益急擢武泰軍節度鎮安化軍以疾召還上言臣既以身許國不願死于家仍令赴鎮月餘卒贈侍中李若拙萬年人質狀魁偉尚氣有才幹初舉㧞萃又第進士太祖時為著作郎後累遷史館修撰歴兩浙江南轉運使子繹第進士累官知鳯翔府自以乆官在外作五知先生傳謂知時知難知命知退知足也雷有終徳驤子初授萊蕪尉召為大理寺丞出知解廣等州焯有聲稱真宗時以户部侍郎知益州討賊有功後拜宣徽北院使有終沉敏善斷歴典藩閫能撫士卒輕財好施家無餘財楊礪鄠縣人曽祖守信唐山南西道節度使祖知禮後唐均州刺史父仁儼孟蜀丹稜令礪建隆元年舉進士第一仕至翰林學士咸平初遷工部侍郎樞宻副使有文集二十卷韓丕鄭縣人幼孤貧有志操讀書於驪山暠陽舉進士端拱初拜右諫議大夫歴知河陽濠州以沖澹自處不奔競於名宦太宗甚嘉重之召入為翰林學士邊珝鄭縣人曽祖頡祖操皆縣令父蔚太常卿珝晉天福中進士第宋初為倉部郎中太宗時為廣南轉運使後拜諌議大夫知開封府卒珝精力有吏材太宗方欲倚用之及聞其卒歎惜數四楊克讓馮翊人晉末舉進士不第宋初為西川轉運副使蜀民懷其善政後知廣州卒克讓少好學手冩經籍歴官㢘謹所至有聲子希閔生而失明令諸弟讀經史一歴耳輙不忘所著有文集二十卷自教其子日華日嚴日休皆登進士崔嶧長安人進士及第累官河東轉運使㑹更錢法潞州大擾推其首惡誅之人心遂定後歴知同州鳯翔河中以刑部侍郎致仕宋湜長安人父温故石晉進士官至左補闕湜風貌秀整器識沖逺好學美文詞舉進士通判梓州累遷翰林學士樞宻副使所著有長集二十卷兄泌亦舉進士官至起居郎直史館越王府記室參軍宋澥湜從弟父温舒舉進士官至職方員外郎温舒三子沆澥濤沆舉進士歴左正言京西轉運使澥有清節居長安不仕與种放魏野遊多篇什酬唱濤端拱初進士知襄城縣以政績聞累遷監察御史知虢州冦凖下邽人年十九舉進士真宗時知同州又判永興軍盡心民事每曰有一時之閒則有一時之滯後拜相決䇿成澶淵之功後出鎮大名貶雷州凖外奢内儉寢處一青幃二十年仁宗朝贈中書令封萊公趙湘華州人進士甲科真宗時知新繁縣以吏最聞為太常博士上補政忠言十篇官至集賢院學士知虢州張昪韓城人舉進士為楚丘主簿忠謹清直仁宗時累官至樞宻使英宗時請老帝曰太尉勤勞王家詎可遽去命五日一至院後以太子太師致仕卒諡康節王陶萬年人爽邁善書翰第進士累官御史中丞後為翰林學士出知陳許蔡汝四州卒諡文恪蔣偕鄭縣人幼有立志父病嘗刲股以療舉進士補韶州司理陜西用兵數上書論邊事通判同州知邠州歴數州鈐轄屢討平叛寇後為忠州刺史侯可華隂人少倜儻有氣節篤志於學知巴州化城縣再調華原主簿韓琦鎮長安薦知涇陽縣所至皆有政績尤輕財樂義急人之急憂人之憂關中稱其賢官至殿中丞趙瞻盩厔人父剛太子賔客瞻第進士調孟州司户參軍歴知萬泉夏縣皆有善政英宗時以侍御史上疏出判汾州神宗時判開封言青苗法不便出知同州累遷同知樞宻院事卒諡懿簡所著有春秋論史記牴牾論等書蘇昞武功人始學於張載而事二程卒業元祐末吕大忠薦之為太常博士後坐元符上書入黨籍編管饒州吕大忠藍田人質直不妄語動有法度初登第為華隂尉未㡬提舉永興路義勇哲宗朝歴知秦州有治聲後以寳文閣直學士知渭同二州致仕吕大防大忠弟登進士第調馮翊主簿歴知永壽青城縣英宗時除監察御史𠂻行論紀綱賞罰及陳八事出知華州永興軍成都府務在寛民哲宗召為翰林學士拜左僕射不事邊功而天下自然富庶吕大鈞大忠弟中乙科歴官知三原縣後為鄜延轉運司從事大鈞初學於横渠後又卒業於二程平生以聖門事業為己任所著有四書註及鄉約吕大臨大忠弟學於程願與謝良佐游酢楊時在程門號四先生通六經尤䆳於禮所著有克己銘諸篇元祐中為秘書正字㳺師雄武功人學於張載第進士為徳順軍判官後以破吐蕃擒鬼章累遷直龍圖閣知秦州蒞官二十餘年常任邊畨漢情偽將佐才否以至山川險易靡不周知李周馮翊人登進士調長安尉轉洪洞令有善政神宗時以司馬光薦召至訪以禦邊之術累遷集賢學士知邠州徙鳯翔河中府周自為小官況晦自匿未嘗私謁執政李廌華州人幼孤能奮立嘗以文謁蘇軾於黄州軾謂其筆墨瀾翻有飛沙走石之勢嘗閱其所著曰張耒秦觀之流也鄉舉試禮部軾典貢失之賦詩以自責張舜民邠州新平人善為文中進士為襄樂令上言新法不便元祐初司馬光薦其才器秀異剛直敢言召為監察御史出知陜潭青二州後為吏部侍郎坐元祐黨商州安置自號浮休居士張確宜禄人元祐中進士徽宗即位上書言事宣和中判杭州攝睦州後知隆德府以不降金死節欽宗悲悼之贈述古殿學士召其子宻慰撫之曰卿父今之巡逺也劉長孺耀州人為簽書博州判官㕔公事劉豫僣號長孺以書諭以禍福豫怒囚之百日終不屈李好義下邽人祖師中忠州團練使父定一興州中軍統制好義善騎射討蕃部有功開禧中為興州正將與兄好古等誅叛臣吳曦以忠義著名金蕭貢咸陽人大定進士調涇州觀察判官有美政左丞董師中薦其文學除翰林修撰嘗上書言時政五弊言路四難詞意切至累官户部尚書貢好學讀書至老不倦有註史記一百卷張建蒲城人章宗時舉才行歴官應奉翰林文字以老乞身金主愛其淳素不欲令去左右乆之同知華州防禦使自號蘭泉老人有集行世元楊奐奉元人蚤喪母哀毁如成人金末嘗作萬言䇿指陳時病欲上不果元初隱居鄠縣講道授徒學者稱為紫陽先生以耶律楚材薦拜河南亷訪使約束一以簡易所著有還山等集楊恭懿奉元人力學强記書無不讀父歿水漿不入口者五日世祖時與許衡俱被召不至數年太子又下教聘乃至時議設取士科恭懿言宜勑有司舉有行檢通經史之士試以經義論䇿則民俗趨厚國家得才矣尋歸鄉里後又詔改歴授集賢學士辭歸是後凡三召皆不至賀仁傑鄠縣人父賁金符總管仁傑從世祖南北攻戰得近侍知無不言多所禆益仕為上都留守累遷中書左丞請老賜錦袍玉帶以歸子勝襲留守蕭􅆽奉元人幼翹楚不凡讀書南山者三十年博極羣書及門受業者甚衆世祖累以集賢學士國子祭酒徵至輒以疾辭歸所著有三禮説九州志勤齋文集關輔翕然宗之稱為一代醇儒韓擇奉元人天資超異信道不惑其教人雖中嵗後亦使自小學始尤邃禮學世祖嘗徵之以疾不果行及卒門人服緦麻者百餘人侯均蒲城人事繼母以孝稱積學四十年羣經百氏無不通貫名振關中以薦為太常博士後因上疏忤時相即辭歸鄉里不復仕同恕奉元人祖昇父繼先皆博學能文恕學無不該仁宗以國子司業三召不起嘗以太子賛善召至歴陳古誼後拜集賢學士以老疾辭歸其學由程朱上遡孔孟所著有榘菴集第五居仁奉元人師蕭􅝥同恕博通經史有宏度雅量學徒滿門及卒門人私諡曰静安先生賀惟一仁傑孫受學趙孟頫歴陜西漢中道廉訪使文宗時擢工部尚書後為中書右丞嘗總裁宋遼金三史蕭道壽興平人家貧孝母每旦候母起侍盥櫛凡飲食必母先然後敢寢食或母怒必進杖伏地受責謝過俟母色喜乃敢退至元中表其門劉徳奉元人父娶後妻何氏徳事之如所生家貧傭工取直寸錢尺帛皆上之四弟並何出徳撫愛尤篤年五十未娶稱貸得錢悉為弟求婦諸弟亦化其徳一門藹然鄉里稱為劉佛子本朝張紞富平人勤學勵行洪武初以通經舉送京師歴官雲南左布政使宣布徳威夷人畏服未幾召為吏部尚書大著時譽姚哲蒲城人洪武中以才學卓異舉授南康府同知有治聲遷荆州府知府未幾召為春坊贊善士林重之康汝楫武功人以儒術起家洪武初歴官四川安岳知縣有治績永樂初以舊臣擢北京行部左侍郎既卒官其長子爵上林苑監左監正累遷太常少卿次子禋上林苑監副累遷通政司叅政墨麟髙陵人洪武中以國子生擢監察御史陞北平按察副使永樂初以城守功陞兵部侍郎尋兼少詹事卒贈少保諡榮毅髙士文咸陽人質直剛果善騎射洪武末從平内難出入戰陳累陞前軍都督僉事征交阯多効勞勣取廣源州與賊力戰而死追封建平伯李昶涇陽人洪武中擢左府都事陞户部郎中永樂初陞北京行部左侍郎轉户部嘗扈從北征轉運不絶宣德中陞户部尚書昶和平謹恪勤職不懈而亷介之節始終不渝吕震臨潼人聰明善記才識宏偉由舉人歴山西按察司僉事遷大理寺少卿累官禮部尚書永樂中春遇甚隆王真咸寧人少負智勇洪武中以功授燕山右護衛百户勤慎小心及從靖難臨陣應敵能出奇制勝肥河之戰真率壯士斬獲無筭而後隊不繼被圍數匝真氣愈奮斬敵數十人馬上自刄而斃後追封金鄉侯諡忠壯馬京武功人洪武中任翰林編修永樂中累官北京行部右侍郎卒洪熈初贈少傅諡文簡遣官諭祭有淳質有文端厚而正靖恭不渝夷險一節之褒曹端華隂人洪武中以太學生歴刑部郎中官至雲南右布政使為人㢘謹有能蒞政寛平為時推重張璉華陰人洪武中歴官有能聲尋陞通政司右通政恭勤不怠卒於官李濟朝邑人學優才敏洪武末登進士第歴官守法陞至左副都御史雷亮咸寧人以才學舉薦仕湖廣按察司僉事有賢能之譽士林稱重任勵長安人力學不倦登進士第歴任有能聲仕至刑部左侍郎卒于官馬巨江蒲城人學問老成志尚閒逸永樂初召至京師將用之以老固辭遂授翰林五經博士令致仕劉昻白水人永樂初舉人歴任有能聲官至雲南右布政使李暹長安人永樂中領鄉薦歴官户部郎中總理在京糧儲能聲著聞尋陞通政使官至户部左侍郎張賢鄠縣人永樂中由太學生歴官吏部郎中亷幹老成正統中舉陞山西右布政使後致仕卒于家李錫咸寧人領永樂戊子鄉薦仕至尚書太子少保有名于世張鵬洛南人永樂中為監察御史後陞廣西按察使轉山東左布政使為人寛厚平易練達老成士林推重云蕭伯剛邠州人永樂末舉人歴任山西僉事能振揚風紀致仕卒喬誠朝邑人由太學生歴官勤能陞山西布政司左叅政處心忠信措事寛平人稱為長者林嵩邠州人初為監察御史持法不撓歴陞江西左叅政德望甚著後致仕卒趙倫邠州人宣德中歴官職方郎中有聲陞户部侍郎巡撫浙江後轉河南布政使卒于官倫持身㢘潔蒞事嚴明人不敢干以私吏胥畏之段信三原人正統初進士歴仕監察御史尋陞右僉都御史卒于官為人端謹物論惜之楊楊鼎咸寜人正統己未進士第二累官尚書太子少保卒諡莊敏王恕三原人登正統戊辰進士累官吏部尚書平生操履剛正人不敢干以私天性忠直遇義敢為無少顧忌卒贈太師諡端毅平生好學至老不倦所著有漕河通志介菴奏議石梁意見經籍格言等書雍泰咸寧人㢘厲稜峻成化己丑進士任知縣御史㢘憲巡撫所至有遺愛紀綱肅然人不敢干以私嘗捶太原知府杖宣府叅將之不法者三軍股慄累官南京户部尚書以忤瑾致仕李崙臨潼縣人登成化己丑進士歴官中外大有聲稱劉璣咸寧人𢎞治中由進士歴官知府存心仁恕處事精詳安靜士民仰之吕楠高陵人正徳戊辰狀元及第累官南京禮部侍郎性孝友儉朴内充外裕行方辭厲在朝在野隨寓盡道且經書子史博覽詳玩並有發揮卒諡文簡所著有四書因問五經說行於世韓邦奇朝邑人正德進士歴浙江按察僉事㢘勁自持時鎮守太監王堂恬勢害人邦奇數裁抑堂遂以阻遏進貢誣之詔錦衣械治百姓感泣哀動城市後仕至南京兵部尚書弟邦靖同年進士官工部主事㩁稅浙省南關人亦賢之列女孟姜女同官人秦時以夫死長城自負遺骸於縣北三里許死石穴中班昭扶風班彪之女適曹世叔早寡兄固著漢書术竟而卒和帝詔昭踵成之數召入宫令皇后諸貴人師焉號曰大家作女誡七章馬融女扶風人有才辨適汝南袁隗禮初成隗曰婦奉箕帚而已何乃珎麗對曰慈親愛重不敢違命君若慕鮑宣之髙妾亦效少君之事隗既貴融女亦有名嚴憲京兆人晉杜有道妻年十八而寡誓不改節撫教孤子植及女韡後植果顯韡亦有淑德蘇若蘭始平人善屬文適將軍竇滔滔仕符秦鎮襄陽攜寵姬以徃蘇織錦為廻文以寄滔滔遂善遇之李氏高陵人唐楊三安妻舅姑及夫相繼卒子孤窶李氏晝田夜紡三年間葬七喪太宗賜帛三百段免其徭王氏華隂人楊紹宗妻襁褓喪母父征遼殁繼母亦卒王氏年十五乃舉二母柩及招父魂以葬廬墓哀號唐高宗詔賜粟帛旌表其門竇氏二女奉天人唐永㤗中賊剽掠二女將逼以私行臨大谷相繼投下而死京兆尹第五𤦺表其貞烈詔旌異之復其家史氏白水人金李文妻夫亡服闋誓死不嫁父強以歸許嫁邑人姚乙史不聽姚訴之官被逮自縊死詔有司祭其墓劉氏藍田人元張訥妻訥為監察御史早卒劉守志不二河東受兵其二子衡衍俱以事出外劉度不能自脫遂與二婦孫氏姚氏同縊死焦氏涇陽人袁天祐妻天祐祖父始皆從軍役祖母楊母焦並守志元至元中天祐從征死甘州妻焦年少宗族欲改嫁之焦氏哭曰袁氏不幸三世早寡自祖姑以來皆守節義豈可至吾遂廢乎吾生為袁氏婦死則葬袁氏土爾衆不敢復言又有邠州任氏乾州田氏皆一家三婦俱以少寡誓不他適戮力蚕桑以養姑事聞並褒美之仙釋馮長驪山人周宣王時為柱下史覩天文之變乃退隱攝生遇鄧真人授以靈書功行垂成復遇彭真人授以太上隱書遂得仙用術活人平王三十年春昇化而去茅濛咸陽人博學深鑒知周室將衰不求仕進嘆曰人生若流電於是師鬼谷先生受長生之術遂入華山修煉秦始皇三十年九月庚子白日昇天先是邑人謠曰神仙得者茅初成駕龍上昇入大清時下𤣥洲戲赤城繼業而徃在我盈帝若學之臘嘉平瓠沉乃還已失老母所在但留麥飯於石上筌食之後血氣不衰入名山訪道不知所終陳搏亳州真源人幼聰悟過人及長經史一覽無遺曰吾將與安期輩論出世法乃盡棄家業攜一石鐺而去遂棲武當服氣辟穀二十餘年移居華山常閉户臥累月不起周世宗召見賜號白雲先生宋太宗時兩至京師賜號希夷先生再詔辭曰九重仙詔休教丹鳯銜來一片野心已被白雲留住嘗有壺公赤松子吕洞賔麻衣子與之遊端拱初命弟子於蓮花峰下鑿石室於張超谷中而化形焉吉志通郃陽人幼穎悟師喬潛道及潘清容博學令聞後居武當山十年不火食但餌黄精蒼术精神清澈行歩如飛一日召弟子戒以珍重修道言訖曲肱而逝時元中統甲子歳也佛圖澄本西域人誦經至數百萬言晉永嘉間入中國息於澄城其左乳傍有一乳通徹腹内常塞以絮至夜欲誦經則㧞絮一室洞明或至水邊引腸洗之還復納入今縣有洗腸泉即其遺跡懷丙真定僧也巧思出天性故河中浮梁用鐵牛八維之一牛且數萬斤宋嘉祐中水暴漲絶梁牽牛沒於河募能出之者懷丙來大慶關以三大舟實土夾牛維之用大木為權衡狀鈎牛徐去其土舟浮牛出轉運使張壽以聞賜紫衣石寶金永壽人號璧峰禪師有異行嘗趺坐大樹下溪水横溢人意禪師已死七日水退視之燕坐如平時後遊五臺山元順帝召至燕都慰勞甚至及本朝洪武三年奉詔至南京住天界寺時召問佛法及鬼神情狀奏對稱㫖四年五月示微疾還御製詩以賜之有𤣥闗盡悟已成正覺之譽六月卒翰林學士宋濂為撰舍利塔銘明一統志卷三十三
