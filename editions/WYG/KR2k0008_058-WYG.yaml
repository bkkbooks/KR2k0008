正知南安軍理財治賦務窮源流誅鋤豪猾詭挾之戸政聲大振管銳淳熙中知南安軍勤政愛民増脩學舍士民懐其德為立生祠趙孟藡淳熙中知南安軍以亷勤為政以孝弟教民其於學校尤加意焉政績具載學碑元張元祚南安路總管嚴祀育材薄賦斂省冗費嘗脩平政橋以便徃來凡一事不獲自盡寢食不安邦人德之張昉南康路總管始至即知閭閻疾苦奏罷不急之科作石隄以息水患凡有利於民者為之無遺民為立生祠趙明至治間上猶縣尹始至以五事為憂既舉曰常事耳禱雨雨隨逐蝗蝗去驅厲厲走民以為異為立棠隂碑以紀其政績毋珌南安路總管克脩其官飾新廟學時稱賢守本朝周以中洪武初南康知縣亷以律己信以示民先是民頗荒阻不遵令以中凡有召㑹給片札約之無後期者髙敏道永樂中上猶知縣平易臨民賦役甚均一邑之人安堵樂業雖思順石溪之民亦賴以安吳德基南康縣丞以儒術飾吏事平易近民尤善書邑人得之以為法帖趙時中永樂間來守南安府為政亷勤勞于撫字名聞鄰境省志陳賢永樂中南康教諭好學不倦施教有方新廟學署邑治至今規制猶存士民稱慕省志齊原銘宣德間知南康縣亷介有為愛民興學在任十二年士民懐之既去語及有涕泣者省志林元美宣德間知上猶縣十餘年公亷有為興學愛民事持大體行必以正重建縣治脩舉百廢民始畏而終懐之今祀于賢令祠省志林芊正統中知南安府練達政務裁决如流刑無濫加民受實惠政暇尤從容詞翰卒于官士人哀慕之省志郭誠正統間南安知府剛直勤敏興學勸農開懇大庾荒原鑿渠引水灌溉凢事闗百姓者罔不脩飭至今民享其利焉省志劉琮正統間通判南安府多善政時石溪妖民稱亂琮親犯矢石率勵士氣一鼓平之民賴以安省志夏璣成化初知大庾縣寛厚愛民事持大體尋召為監察御史省志張弼成化中南安府知府方正嚴果為政務持大體去滛祠表前賢遺蹟諸所經略皆百世可法者也既去民立祠祀之省志鄧應仁𢎞治末知南安府亷靜寡慾政尚平恕惟務德化不事鞭朴在任數年唯携一僕而已既去民大失望至有肖像祀于家者省志黃璋正德間知南康縣勤介自持剛毅有執立旌善懲惡二牌于要地善惡直書其名衆服其公卒于官士民哀之省志流寓江公望陸州人宋徽宗時為左司諫内苑稍畜珍禽竒獸公望力言此非初政所宜徽宗縱遣之後公望出知壽州及蔡京為政編管南安軍遇赦還家張九成錢塘人為禮部侍郎秦檜惡其言事謫守邵州又諷言者論其謗訕朝政謫南安軍既至結廬掃軌號横浦居士嘗自題柱曰平生好書老來病目執書就明于此者十四年矣倚立庭磚嵗久雙趺隠然解潛藍田人為邊帥以中丞李文㑹言其本趙鼎客不從和議謫居南安凡十九年疾革張九成徃視之潛泣曰平生仗忠義誓與敵死為秦檜所斥此心惟天知之九成曰無愧此心足矣何必令人知潛即豁然而逝劉黻温州人淳祐中丁大全劾丞相董槐去國將奪其位時黻為太學生伏闕上書忤執政送南安軍安置歸别其母母曰為臣死忠以直被貶分也速行黻至南安盡取濓洛諸書摘其精切語輯成書十卷名曰濓洛論語人物唐謝肇上猶人㓜閑武伎與父率義兵征蠻功第一除韶州刺史㑹冦起汀建命肇捕之一出而平遷百勝軍防禦使閩粤卒叛肇復提兵勦平之詔授金紫光禄大夫檢校户部尚書五代盧光稠上猶人唐末羣盜蜂起光稠為䖍州防禦使狀貌魁特起義兵衆推為帥請命于梁拜鎮南軍節度使進開國侯卒子延昌復帥䖍父子相繼扞禦郡人德之立廟奉祀五世孫世亮事母以孝聞黃玉上猶人天祐中補使院尋署上猶塲猶民德其保障累功二十四年有司上其狀于南唐授銀青光禄大夫上柱國賜紫金魚袋以壽終昆弟子孫顯於宋聮登進者八九人宋謝茂希肇之裔建隆初以武藝顯官至銀青光禄大夫檢校右散騎常侍兼御史大夫何大正大庾人博通諸經元祐間入國學雖老師宿儒莫不推遜時稱上庠三傑大正其一也利申大庾人元豐間㳺學江都名傾同輩有廣陵集廬陵郭勁序之曰其放得於太白其易得於樂天其蹇得於聲叟其嚴得於昌黎田闢南康人天資篤實嗜學不倦㳺上庠二十年無所成浩然歸隠號六隠居士子九人各授一經教法甚嚴登第及特恩者七人時稱義方者必曰田氏田如鼇闢弟舉進士丞相吕頤浩一見器重之高宗召問江右盗賊對曰小冦不足慮所憂者西北耳累官監察御史出知道州民樂其豈弟後加知直秘閣京西轉運副使昆弟如鵠如鵬如鴻俱登進士第盧汝舟大庾人㓜治易長習律令政和間以陸藻薦𨽻御史府亷約守正不喜深刻紹興中地震上疏推本劉向京房之意無慮數千言官至武翼大夫李諤南康人家貧好讀書舉進士通判吉州倜儻有材畧所至冦賊屏息累官至朝奉大夫鄧富大庾人有智勇能除冦賊紹興間為諸寨長賊畏之呼曰鄧江南以功累遷八州巡檢知昌化軍其族邦直官至武翼大夫盧宗邁汝舟姪年十三𨽻御史府樞宻使汪澈臨邊視師檄以自隨熟知險阨澈深嘉之歴館職文雅練達兩朝日厯成一嵗五遷官至武翼大夫晚年藏書萬卷然不滿致身於武階云鍾鼎上猶人嘗觀范仲淹義田事偕姪日新置義莊建書院延師以教鄉族子弟子三傑登紹興進士為化州司法㕘軍歸值建城盡其家之磚石輸官有司以聞賜勑有哲夫成城保衞鄉里之褒本朝蔡原啓上猶人洪武中由嵗貢拜監察御史剛正有風裁省志賴禮南康人永樂初進士第累官興寧沅江知縣亷介不阿所至有稱卒于任民哀思之省志劉永大庾人永樂末進士任刑部主事轉郎中才名甚著陞荆州知府興學勸農一郡翕然稱治以劾親藩不法繫獄朝審直其言仍復職憂去郡軍民幾千人走京師懇請特命奪情起復歴官十四年卒于任民立祠肖像祀之省志蔣誠大庾人永樂末進士授巴縣知縣牧愛得民去任祀于名宦祠擢監察御史風紀振肅陞廣西按察司副使威惠並行俱稱得體事親甚孝以仕終養鄉人賢之省志蔣銘大庾人宣德末進士授主事歴吏部郎中陞雲南澂江知府平生清介不屈所至人不忍欺比致仕尤以風節自持非公事足不入公門省志張九逵大庾人𢎞治中進士由揭陽令陞南京禮科給事中累官湖廣㕘議去任民為立碑居言路彈劾有風采起復改廣西有征蠻功卒于任追陞秩焉省志列女謝氏上猶人徐人妻年三十而夫死家貧孀居夫黨徐詳者隂許為富家鍾子茂妾謝聞之不勝悲怒訢於縣不為之理號慟終日自縊而死元大德間亷訪司至縣表其墓曰貞節作詩刻石以紀其實劉氏大庾人彭道詵妻年十八夫死數月始生男程劉教養卒成其學仕至博羅縣丞程卒劉復養其二孫有成立壽八十而終知府張弼賦直桃篇美民間貞節婦劉其一也省志李氏大庾人劉繼妻繼卒李方十九誓不他適所親憐其少諷之李泣曰吾夫為官族子苟有二志辱門多矣衆嘆服𢎞治改元詔例給綿壽終八十有九仙釋巢道人上猶人㓜遇異人授以辟穀法常經月不食自言年九十顔如童子日行三百里盛暑烈日曾不畏避忽一日謂所親曰吾明日歸去果端坐而逝里人異之以為脫殻云法緫潼川人有禪學宋紹興戊寅至南安貢士謝堯咨與之善一日忽書十𤣥談因語謝曰吾明日入滅君幸茶毗我更十三年同為極樂遊至明日早索浴更衣跏趺而化焚之北郊煙焰中舍利飛颺觀者如堵謝以庚寅嵗果卒德賢上猶人號棲真尊者宋治平間結菴了山習禪要元豐五年九月忽自圖其容於壁間對衆説偈云井雲歸洞本無心流水下山非有戀言訖而化弟子收靈骨建塔凡有禱屢應焉明一統志卷五十八
