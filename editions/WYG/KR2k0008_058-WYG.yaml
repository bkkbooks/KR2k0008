body:
  text: 明一統志卷五十八明李賢等撰贑州府東至福建汀州府長汀縣界四百六十里西至南安府南康縣界三十里南至廣東韶州府翁源縣界五百二十五里北至吉安府萬安縣界一百三十五里自府治至南京二千八百一十里至京師五千六百七十里糧七萬石零建置沿革禹貢揚州之域天文斗分野春秋属呉越戰國属楚秦𨽻九江郡漢為贑雩都南壄三縣地𨽻豫章郡東漢属廬陵郡三國吳立南部都尉治雩都晉罷都尉立南康郡仍舊治属江州東晉移郡城於章貢二水間即今府治隋初罷郡置䖍州大業初復為南康郡治贑縣唐為䖍州天寳初改為南康郡乾元初復䖍州南唐置昭信軍節度宋初因之紹興間改為贑州元陞為贑州路本朝改為贑州府領縣十二贑縣附郭漢舊縣属豫章郡東漢属廬陵郡呉属南部都尉晉始為南康郡治隋初改南康縣後復為贑縣唐為䖍州治宋元仍舊本朝因之編戸一百一十里雩都縣在府城東一百五十里漢舊縣属豫章郡因雩水為名三國呉為南部都尉治所晉属南康郡陳徙縣治大昌村隋徙治東溪属䖍州唐徙治南康古郡即今治所宋元仍舊本朝因之編戸一十五里信豐縣在府城東南一百七十五里本漢豫章郡南壄縣地東漢置南安縣晉改南康縣唐析置南安縣天寳初改曰信豐縣宋元仍舊本朝因之編户五里興國縣在府城東北一百八十里本贑縣之瀲江鎮宋陞為興國縣以年號為名割贑廬陵太和三縣地以益之元仍舊本朝因之編戸五十七里㑹昌縣在府城東三百里本雩都縣之九洲鎮宋太平興國中置㑹昌縣時鑿井得瓴甋十二上有篆文唐㑹昌年號因以為名元陞為㑹昌州本朝復為縣編户四里安逺縣在府城南三百四十里本漢雩都縣地梁大同間析置安逺縣因水為名隋廢唐貞元中復置宋元仍舊本朝因之編户三里長寧縣在府東四南三百十里本安逺㑹昌二縣地萬厯初葉賊聚哨為亂守臣討平之奏析安逺㑹昌堡里即馬踏岡立縣治焉名曰長寧縣編户四里寧都縣在府城東北三百六十里本漢贑縣地三國呉始置新都縣晉改曰揭陽劉宋又析置䖍化縣尋改揭陽曰寧都省䖍化属焉又改寧都曰䖍化宋復改為寧都縣元陞為寧都州本朝復為縣編户一百一十七里瑞金縣在府城東三百八十里本漢雩都縣地五代時楊呉以縣之象湖鎮置瑞金監南唐陞為縣宋元仍舊本朝因之編戸八里龍南縣在府城南四百一十里本漢南壄縣地唐為信豐縣地置百丈鎮尋改曰䖍南五代時楊呉改為䖍南塲南唐陞為縣宋改龍南縣以縣在百丈龍灘之南故名元仍舊本朝因之編戸五里石城縣在府城東北四百六十里本寧都縣之石城塲南唐陞為縣以山多石聳峙如城故名宋元仍舊本朝因之編戸九里定南縣在府東南九十七里本龍南安逺信豐三縣地萬厯初奏析為定南縣即蓮塘鎮開治焉編户四里郡名章貢因二水而名贑城宋紹興間因䖍州有小警意䖍字為虎頭或有以兆之乃改名贑形勝江湖嶺海樞鍵輿地紀勝地最廣大山長谷荒宋王安石䖍州學記䖍於江南地最廣大山長谷荒交廣閩越銅鹽之販道所出入接甌閩百粤之區介谿谷萬山之阻宋洪邁表風俗以漁獵山伐為業漢書江南地廣或火耕水耨民食魚稻以漁獵山伐為業盖在贑尤甚伉健工巧好佛信鬼同上其民伉健其作工巧好佛信鬼抗志勵節宋蘇軾云嗜勇好鬭輕生敢死宋董德元奏風俗篤厚人物秀特元劉尚友㑹昌州學記風俗篤厚而純一人物秀特而節槩風氣錯糅人多勁㨗尚義元李太初贑州學記山川賀蘭山在府治西北隅其右隆阜突起舊名文筆山其左綿亘為白家嶺天竺山在府城東四里舊有天竺寺唐白居易有寄韜光禪師詩宋蘇洵嘗逰此山見其墨蹟後蘇軾南遷過此留題云香山居士留遺蹟天竺禪師有故家空詠連珠吟疊璧已亡飛鳥失驚蛇林深野桂寒無子雨浥山薑病有花四十七年真一夢天涯流落淚横斜李朴詩天竺﨑嶇絶海邉何人分作贑江禪鷲山巧疊三峯石葛塢深疏兩𣲖泉一醉風光能幾許十年塵跡尚依然欲題豹隠還相笑望斷長空簇暝煙鳯凰山在府城東一十里有兩山狀如鳯凰飛來故名儲潭山在府城北二十里山俯清潭下有儲君廟玉房山在府城東南二十四里本名赤石中有玉房瓊室唐改今名汶山在府城東三十里有昇仙峯相傳唐天監中女道士丘真昇仙於此席帽山在府城南四十里下有黃仙石相傳昔有仙人乗白鹿駐石上今左近有黃仙寺崆峒山在府城南六十里章貢二水夾以北馳為郡之案山唐十道記其顛有湖湖有艑艚底人或動之風雨立至宋李朴詩雲根秀出碧芙蓉烟晃霞霏瑞靄中地詠九支龍奮蟄天河一𣲖練横空玉石山在府城北四十五里衆峯俱黑惟一石如玉瑩南康記昔瞿漁父釣山下遇二少年如氷玉相謂曰别來此石殊長矣黃唐山府城北六十里山右有石室上有通天窓下有二石人巾櫛而坐每丙日人聞笙簫音盖仙宅也錦屏山在府城北九十里状若屏風龔公山在府城北一百二十里昔隠士龔毫所棲因名今有寳華寺鄧隠峯松靈照女蓮龎居士竹勒潭龍井在焉金精山在寧都縣西北一十五里道家以為第三十五福地相傳漢張金華女麗英生禀瑞相年十五入山得道長沙王吴芮聞而聘焉麗英弗許乃昇高紿曰山有石室中通洞天若能鑿之當相見也芮大發兵攻鑿既通見女乘紫雲在半空語曰吾為金星之精降治此山言訖而去因以名焉淩雲山在寧都縣北二百里其高萬丈金雞石山在雩都縣西二十六里上有石穴相傳昔有金雞嘗出入其間或挾彈欲取之至穴口遂化為石雩山在雩都縣北三十五里山椒有泉嵗旱禱雨於此故名夜光山在雩都縣西六十里夜光若火或云明珠吐輝太平山在雩都縣西北八十里有瀑布幽蘭賞者多即焉高沙寳山在雩都縣東北一百二十里昔樵者遇白兎逐之入地鑿之得銀故名盤古山在㑹昌縣東南一百二十里中産異獸一名般固陳石山在瑞金縣東北五十里相傳陳武帝微時嘗廬此故名銅鉢山在瑞金縣西北一百里巉巖為衆山之冠南山在信豐縣南二里峭拔屹立葢縣之朝山也糓山在信豐縣一十五里山腰有石室山頂有池舊傳池有五色鯉鳯湖山在信豐縣南二十里上有池井三明山在信豐縣西五十里三峯鼎峙上有井泉又有石塔香山在信豐縣南七十里山有九十九峯猶山在信豐縣西一百二十里山分九十九面多産異藥大龍山在信豐縣南一百二十里山有數十巖産異花如白蓮黄柏山在信豐縣南一百二十里上有龍湫禱雨多應新龍山在信豐縣南一百五十里相傳普濟大師學佛之地有塔尚存欣山在安逺縣西南一十五里中有石室石床産丹橘異竹上洛山在興國縣南九十六里上有石墨可書寰宇記山中多木客乃鬼類言貌似人能斫杉枋與人交易嘗就民間飲酒為詩云酒盡君莫沽壺乾我當發塵市多囂塵還山弄明月覆笥山在興國縣北一百七十里上有石室中藏石笥玉牒靈應山在龍南縣北三十里相傳山嘗建寺艱於水有禪師飛錫來此泉即湧出因名松梓山在龍南縣南八十里上有古松痩柏森然蒼翠又有石笋三十率高三十餘丈歸羙山在龍南縣南一百里一名神闕山有石城又有石峽左右高聳若雙闕琉璃山在石城縣東二里相傳秦末劉華女於此拾異果食之仙去俗名劉仙姑山樓盖山在石城縣北六十里楊真人煉丹處石几石牖尚存妙高峰在府城東六十里一名㞦嶺高出羣山之表白茅峰在寧都縣西南三十里上有龍湫常出雲氣筆架峰在瑞金縣南一十五里状如筆架寳盖峯在瑞金縣西北二十里状如傘盖擢秀峯在安逺縣西北八十里宋眉山程子山紹興中自西掖謫出安逺嘗寓山下僧院以擢秀名其庵梅嶺在寧都縣北一百二十里漢閩越反武帝令諸校屯梅嶺即此嶇嶺在信豐縣西北三千里嶺顛有石石上有巨人跡馬祖巖在府城東五里昔僧馬祖嘗棲此巖山鬼為築垣馬祖曰學道不至為邪崇所測此非吾所居也遂棄去徃居龔公山李朴詩踏盡層巒上小亭日華初泛曉烟青塵埃不到門常靜身世相忘性自靈羅田巖在雩都縣南五里有流觴曲水宋周敦頤詩聞有山巖即去尋亦躋雲外入松林雖然未是洞中境也勝人間名利心需巖在雩都縣南四十里宋王鴻隠此巖工篆籕劉彛贈以詩曰冬寒夜憶王夫子獨坐需巖治古書巖旁又有木犀巖􅉼虛巖蕭帝巖在㑹昌縣南一百里相傳齊武帝初為贑縣令避兵於此巖或云梁武帝㣲時讀書巖下東龕巖在興國縣東北二十里唐鍾紹京讀書處前後有讀書巖試劍石靈湖石舫石笋峯筆架山縤泉洞環鯉瀑布泉僧寺共號十景通天巖有二一在府城西二十里有穴透山顛王竒詩松蘿石室中清雅勝支公地靜無塵到山高有穴通一在龍南縣東北八里有二洞一高廣通明一深不可測陽孝本隠於此九日岡在信豐縣治西其顛頗平可坐百人九日人多登逰其上仙女石在府城北二十五里有仙女祠蠶者禱焉螺亭石在府城東七十里昔貧女採螺為業暮宿此亭為衆螺嘬其肉死焉殯其傍化為巨石螺殻無數宋蘇軾詩薄暮漁樵人去盡碧溪青嶂遶螺亭噴龍石在府城東八十里兩崖劔立飛淙由顛注下為龍泓嵗旱禱雨有應龍門石在雩都縣西南一十里相傳嵗大比或裂聲如雷則謂龍門開必有登科者貢水漢志名湖漢水源出汀州新樂山西經瑞金南入㑹昌北㑹雩都寧都興國信豐之水流至府城東環城而北㑹于章水章水漢志名彭水源出南安府聶都山流至府城西環城而北㑹于貢水贑水在府城北章貢二水合而為一故名北流至萬安縣其間為灘十八怪石多險宋余靖詩萬堆頑碧聳嶕嶢壅遏江流氣勢驕鐵馬陣横秋戰苦水犀軍亂夜聲囂吕梁謾託莊篇險灧澦休誇蜀道遥怒激波聲猶可避中傷榮路不相饒䖍化水在寧都縣境舊䖍州及䖍化縣皆以此為名雩水源出雩都縣之雩山西南流入貢水寧都水源出寧都縣㑹散水篔簹曲陽黃沙長樂五水流經雩都縣境入貢水湘洪水源出㑹昌縣流經雩都縣入貢水綿水在瑞金縣治東南二源一出汀州白頭嶺一出陳石山合流入貢水亷水源出安逺縣㑹鳥田紫嶺欣山禮仁上林諸水下流至㑹昌縣界入貢水瀲水在興國縣東北一名平川㑹濊水黃田水流入貢水三江水在龍南縣治後乃桃水渥水亷水之㑹流經信豐入贑水金沙井在府治西北水極清冽三潮井在府治南四里水日三潮潮則溢井口靈泉井在府治東四里烹茶味極佳㢘泉在府治東南四里劉宋元嘉中一夕霹靂忽泉湧出時郡守以亷名故曰亷泉蘇軾詩水性故自清不清或撓之亷者謂我亷何以此名為獅子二泉在府治前通衢左右温泉有九在信豐者一在寧都者二在安逺龍南者各三皆温如湯在寧都者尤熱陸公泉在瑞金縣治西南宋陸藻被召去留題泉上有泉聲潄玉寒之句後人因名陸公鳯凰池在府治東南二里池中有石竹相傳嘗有鳯棲其上宋郡守曽端伯脩譙門掘地得石有字其文云穿開獅子兩條泉九秀回流出大官金鯽魚池賜金紫鳯凰池出貴公卿金鯽池在府治東南二里宋守郡者相繼浚之元末湮廢本朝復浚之硯池在贑縣學久塞本朝宣德中復浚瑞蓮池在雩都縣治西池産異蓮其葉曰雙捲劒脊其華曰雙頭叉髻三蕚二十四葉其實曰覆鍾金鋌移之他處輒類常種俗傳雩山倒影所致洗藥池在興國縣治西北治平觀晉葛洪過縣境見山林水秀遂結庵築壇鑿池洗藥留榮偈曰洞隂泠泠風珮清清仙居永刼花木長土産金雩都縣出銀贑縣及㑹昌瑞金縣出舊有塲久廢鉛寧都縣