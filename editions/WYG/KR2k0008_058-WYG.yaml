步民不病涉宋楊澈䖍州通判時郭載興擁兵自固澈獨趍其壘諭以威信即委符聴命陳希亮天聖間知雩都縣清勁節介有巫覡嵗斂民財以禳火訛言有緋衣三老人行火希亮禁之火亦不作毁滛祠數百區勒巫為農者七十家余良肱知䖍州士大夫死嶺外者喪車自䖍出多弱子寡婦良肱悉力振䕶孤女無所依者出奉錢嫁之程戡通判䖍州州人有殺母暮夜置尸仇人之門以誣仇者獄已具戡獨辨之正其罪程珦知興國縣縣素難治珦在邑幾二年而獄空者嵗餘狡民善為古劵契田訟最難辯珦訊之不十數語盡得其情余靖在贑縣尉後復知䖍州所至有惠愛孔宗翰知䖍州州城濵章貢兩江嵗為水齧宗翰伐石為址治鐵固之由是屹然詔書褒美趙抃嘉祐間知䖍州召戒諸縣令使人自為治令皆喜争盡力獄屢空改脩鹽法疏鑿贑石民賴其利造舟百艘以給二廣諸郡仕宦殁而不能歸者周敦頤通判䖍州薄於徼福而厚於得民菲於奉身而燕及惸嫠守趙抃熟視其所為執其手曰今而後乃知周茂叔也沈希顔嘉祐間知雩都縣公宇後妖禽夜啼希顔書其木云此處離朝路幾千為官不取一文錢平生不養無情鳥遮莫妖禽夜哭天詰旦禽去治縣三年灾沴不生百廢具興蔡挺䖍州推官後提舉䖍州鹽時鹽賊為州縣害挺諭所部使首納器甲原其罪簡僚吏至淮轉新鹽明殿賞以官數之餘畀之於是盜黨破散宿弊遂絶陳從易知䖍州㑹歳大飢有持杖盜取民榖者請一切减死論凡生者千餘人劉彛熙寧間知䖍州嵗歉民多棄子彛榜通衢召人収養日給廣恵倉米二升又推行於縣鎮故一境無夭閼有甘露瑞蓮瑞粟之應李大有知䖍州金人南伐召募得五千人鼓行而前淮甸歌云天下奸臣皆守室䖍州太守獨勤王趙善繼嘗領州事以興學宣化為先務閭閻靡然成俗人安士業訟牒希簡雷孚通判贑州齊術亂後縁坐三千人郡將李耕欲盡處以死孚力争曰茶冦術黨也若土人則脅從耳耕悟止㦲其黨餘盡釋之洪邁乾道間知贑州起學宮造浮梁士民安之嵗飢贑適中熟邁移粟濟隣郡僚属有諫止者邁笑曰秦越瘠肥臣子義邪留正淳熙間知贑州㤙惠並著嘗奏减上供米不報及為相蠲一萬八千石陳孔碩嘉定間知贑州抑强扶弱子惠小民貢水濵居民堰舟作堆阻平為險嘗壊舟楫孔碩盡除之人賴其利何時咸淳間知興國縣以衣錦鄉山長谷荒民甚梗化乃設安湖書院以訓是鄉子弟其俗遂革文天祥宋末知贑州元兵渡江詔天下勤王天祥捧詔流涕發郡中豪傑萬餘人赴之其友止之天祥曰吾非不知苐國家有急以身狥之庶忠臣義士有聞風而起者於是盡以家貲為軍費提兵而徃元楊景行㑹昌州判官其民素汲於河以茅覆屋故多疾癘火災景行教民穿井以飲陶瓦以屋民始獲安乃創學舍禮師儒勸民斥腴田以膳士絃誦之聲遂盛本朝莊濟翁洪武四年知寧都縣勸農興學雖閭巷小學師生亦令朔望赴邑庠講解所習逺近聞風而化又懲豪猾均賦役脩陂堰造梅川橋民感其惠陳大本洪武間為府同知撫民以寛臨吏以莊應務以敏政聲昭著尋陞知府吏民熟其化雖公務煩㨿凡所號令無違誤者故事不勞而集許庸永樂初知㑹昌縣涖政公勤庭無滯訟遇事功浩大貪者驗丁役力富者驗實供需民多樂於趨事邑無異議在任八年脩學舍勵生徒積年逃卒皆聞風自首及去任民皆思慕焉李素宣德間知贑縣得古循良牧民體民咸愛戴疏之當道保留二十餘年後以憂去省志鄭暹正統初贑州府通判涖事有聲未幾盜起躬率民兵保障郡幸無虞當道以聞陞知府以憂去省志黃振正統初知安逺縣慈祥愷悌喜怒不形在任九載人愛戴之省志黃恭正統間由舉人知贑州府興學校勸農桑尋以艱去十邑士民列狀保留不克人至今思之省志陳璉正統初知興國縣清勤不懈寓政以思後以内艱去民懐其德俟服闋請于朝再任三載而去省志阮衍正統間知瑞金縣時流賊之後官兵繼擾衍立法防制兵不敢犯撫瘡痍招流亡民懐其惠省志林純正統間掌興國教有學行嚴教規講論或至夜分邑士禮經有傳自純始尋卒門人悲慕立祠祀之省志李璡由進士知贑州府興學勸農有善政時郡罹大水且疫盛璡竭力賑濟全活甚衆未幾閩廣流賊犯境璡率兵敗之再合再敗之躬冒矢石民賴以安至今感仰不置省志蕭永秀天順間任石城教諭學問該􅀶勤教誨每深夜歴課講讀携茗粥餉之士賴成就者甚衆省志姜璉成化中贑州府知府明達剛果識大體剪奸豪植良善脩學校嚴教育防冦盜益民之績甚著後以憂去民思慕之省志王廷珪成化中同知贑州府事諳達政體時流賊犯境統率民兵奮力追逐以援不及竟死焉事聞詔贈官秩録其子省志楊友諒成化間知龍南縣性素忠實政務老成民咸樂之㑹司府又檄覈田升科友諒仗義執言力為分辨考課促裝民遮道攀戀特留一革履以慰去思省志平世用𢎞治間知寧都縣興學校均徭役除盜賊訟理政平士民愛戴以内艱去省志王天與正德間寧都知縣居官亷勤大有德政豪右不敢肆凌至市俗賭愽者悉為所化值逆濠之變率師勤王竟死于難邑士人哀慕塑像祀于學宮名宦祠省志流寓王學古本交趾人正統間知信豐縣亷介寛厚嘗招徠蠻洞列為編氓以功陞授六品致仕遂家于信豐人物唐鍾紹京贑縣人繇十世孫性孝童㓜時嘗得𤓰果不敢先食以奉二親工書號小鍾以繇為大鍾也從唐𤣥宗平内難累進中書令越國公賴棐雩都人七嵗能文弱冠通九經百氏乾元中舉進士拜崇文館校書郎謝肇興國人唐末與父帥義兵征蠻功第一後又經制容管叛卒止誅元惡脅從罔治逆黨遂平優詔􅅄諭五代衷愉寧都人本哀姓仕南唐改姓衷官至檢校禮部尚書南唐降宋去官歸山野服黃冠以琴書泉石自娯宋王竒贑縣人少為縣吏令題鴈詩於屏云隻隻衘蘆背曉霜盡隨鴛鷺立寒塘竒宻續曰晚來漁棹驚飛去書破遥天字一行令竒之因激使學後逰京師真宗偶見其所作詩召見賜第竒作詩云不拜春官為座主親逢天子作門生官至殿中侍御史陳炳贑縣人結廬崆峒山躬耕求志與學者琢磨俱成雅器有文權十卷白雲編二十卷包拯嘗師事之誌其墓曰文髙表世學優入聖靜退不競深中篤行黎仲吉寧都人端重該愽天禧中叩閽言事丁謂惡其不附已授洪州文學謂罷相召對辭以疾授袁州戸曹尋解職歸隠稱方外髙人盧世豪贑縣人天聖中母殁廬墓簁土為墳廬中泉湧一虎為守視有巨蛇入墳俄震死縣令陳廷揭其事於石温革石城人寳元中上書願納家貲盡市國子監書得請歸創講堂開義學逺近之士多就教育鄉俗陶其善化王鴻雩都人􅀶學工篆𨽻草書皇祐中試南宫不利遂歸隠嘗為米囷銘曰夫竊人之食而不任其事又騷然而為害者鼠也暴人之物而不知有畏又肆然而不足者虎也吾暴而不忍為虎竊而不忍為鼠寧守斯廪以安吾處孫立節寧都人祖長孺真宗朝知潯州政尚仁恕立節七嵗能詩學問淹貫任為桂州節度判官辨寃獄十二人得不死子勰勴皆從蘇軾遊勰有父風以勁直聞勴隠居臺府數薦不起李潛興國縣人志識警抜治平中第進士仕為洪州司理㕘軍性孝丁父憂終喪足不至私室歴官知蘄州初如京師其子弟請貫開封籍取應潛不許曰欲求事君而先欺君可乎其後三子連中進士弟渾及渾子存皆有時望劉炳贑縣人治平中與弟景繼登進士俱為郎時唐介以言張堯佐貶嶺表炳兄弟餞以詩遂得罪免官景子敏材為廣東提點刑獄以亷稱曾凖贑州人嘉祐間進士知公安縣火燔民居凖以身叩之風反滅火復通判臨江明慎刑獄芝草生圜扉或勸以獻凖抑之長子楙少頴悟官至吏部尚書陽孝本贑縣人學愽行髙隠於城西通天巖凡二十年一時名士多從之游蘇軾為號曰玉巖居士贊其真曰道不二德不孤無人所有有人所無崇寧中舉八行累官國子博士以直秘閻歸老時李存亦以髙年掛冠日與觴詠號崆峒二老劉鵬瑞金人元豐間進士為諌議大夫值蔡京用事連疏論之子舉䕫靖康初陷於敵死之鍾伷龍南人紹京之後元豐間舉進士知桂陽縣考課第一通判宜州招諭蠻冦多順從者進帥桂林性至孝喪父盡哀有羣烏鳴於墓人名其廬曰感烏堂尹天民㑹昌人為太學博士出知果州相如縣時王黼得政黼舊在太學乃天民所𨽻齋生也有强天民謁黼者天民笑曰見王丞相豈不得好官但恐為顔閔所笑後除侍講不就清議髙之唐稷雩都人政和間登進士授樞宻院編修官自號硯岡居士有硯岡居士集胡銓誌其墓李朴潛子紹聖初進士仕為西京國子監教授以嘗言孟后不當廢事勒停尋以陳瓘薦徽宗召對首言士大夫從王氏學敗壊心術朴性鯁直操履勁特天下高其名靖康初累遷祭酒髙宗召為秘書監未至而卒有章貢集二十卷曾開凖次子崇寧進士厯官至禮部侍郎秦檜主和議開抗疏力爭忤檜出知徽州尋裭職後復袐閣脩撰卒開嘗師游酢友劉安世故立朝遇事臨大節而不可奪陳敏石城人父皓有才武建炎末以破贑賊功補官至承信郎敏精騎射擢閤門祗候時閩地多冦敏分兵扼要害盗發輒獲累功封武功縣男髙宗見其狀貌魁岸除破敵軍統制嘗駐兵髙郵屢敗金人終光州觀察使曾幾開弟㓜有識度事親孝紹興間歴官浙西提刑秦檜怒開幾亦罷及檜死起知台州尋授秘書少監脩寳訓書成權禮部侍郎卒諡文清幾為文純正詩尤工有集五十卷王質興國人博學能文著論五十篇言厯代君臣治亂謂之朴論紹興末舉進士孝宗時上書言和戰守之計後為樞宻院編脩官虞允文薦其鯁亮不回可為正言時中貴用事隂沮之遂奉祠山居絶意禄仕曾興宗寧都人篤志為已之學自號唯庵冠婚喪祭一用古禮朱熹嘗稱之偽學之禁興學者諱名其師興宗執禮益勤勵志益苦孫原一原郕俱博學工詩李謙朴從孫父珙行義脩潔經典該通賜號養素處士謙咸淳間舉進士為安福縣尉獲盗不願受賞後為浙東提舉值嵗飢賑濟活人甚多官至左司郎中陳繼周寧都人淳祐中厯知衡陽縣遂從文天祥勤王甚有方略及元兵已下贑繼周蟄兵於農將以有為贑州總管先事襲繼周父子殺之贈敷文閣待制謐忠節次子榘從天祥攻江西病死尹玊寧都人以捕盗功為贑州三砦巡檢從文天祥勤王拒元兵戰于伍牧軍敗諸將皆遁惟玉殘軍五百殊死戰援絶力屈死之贈濠州團練使官其二子陳子敬贑人以貲雄鄉里嘗從文天祥遊天祥開閫汀州子敬募集民兵屯皂口據下流及天祥攻贑子敬與合謀忠效甚著空坑兵敗復聚兵屯黃塘砦連結山砦不降元廖人俊寧都人元初父死於冦母亦被虜人俊七嵗與祖母居既長誓求父骨得於叢塜間又徃北方求母聞在滄州至則已死欲貿骨歸葬異父弟不許遂刻母像而還合葬焉呉澂有文記其實蕭士贇贑人自㓜潛心篤學尤愛李白詩反復吟誦為分類補註行世本朝陳勉寧都人永樂初進士擢監察御史為人清慎端方洪熙初陞都察院右副都御史尋遷南京右都御史致仕卒賜𦵏祭李旭贑縣人永樂中由太學生擢監察御史激揚有聲超遷山東按察使尋陞湖廣左布政使惠政及人致仕卒黃德潤信豐人正統末進士時英廟北征有内侍潛為敵謀者德潤知而格殺于庭拜武選主事有武臣納賂求遷秩德潤抗疏劾之平生亷介方剛門無私謁病革以家禮授子震曰其以此治吾喪無作佛事以壊家法省志董越寧都人性雅飭博學善文成化己丑進士及第累官翰林學士南京工部尚書嘗典㑹試文衡所取多人奉使朝鮮著朝鮮賦清介端謹館閣推重卒諡文僖省志袁慶祥雩都人成化中進士累官廣東僉事在國學建言五事所指斥皆人難言者歴官有聲性剛正寡合謝事歸隠龍溪好學忘倦省志丁積寧都人成化中進士授新㑹知縣毁滛詞杜私謁綽有善政卒于官民為立祠陳白沙哭之以詩云有廟旌遺愛無錢返故鄉省志胡易寧都人𢎞治初進士授給事中立朝敢言風采凛然所著有易經淵源學者宗之省志列女劉氏石城呉村人及笄父母許蔡氏未歸而蔡淪替再許呉氏既納采而吴又卒父母復欲與蔡女曰許呉已負蔡從蔡又負吳且何面目見蔡乎恐父母廹之一夕溺水死莫詳何代但祠廟尚存省志袁氏雩都人李崇仁妻年二十適崇仁明年夫故遺腹生子時姑年八十袁奉養盡誠洪武中旌其門曰貞節省志陳氏寧都廖國器妻少􅄔節守矢不二心後值冦亂子死婦被擄陳育㓜孫人俊愛不忘教人俊長能孝養陳氏安之年九十餘有司上其事詔旌其門仍賜粟帛省志謝氏贑縣劉辛二妻年二十九夫亡遺腹生子舅姑衰老家無餘貲謝躬織以具養殯𦵏舅姑以禮撫遺孤底于成洪武中事聞旌表省志歐陽氏贑縣劉德潤妻年二十餘夫亡遺一子玊輝先是玊輝曾祖母廖祖母蕭相繼􅄔居至歐陽凡三世清節危操後先一轍歐陽茹辛飡苦養姑教子孝慈尤著洪武末旌表時稱三節世家省志劉氏贑縣朱宗文妻年二十八􅄔居撫遺孤顯後顯領鄉薦授石城訓導亦遵母訓克稱職焉永樂中事聞得賜旌表省志管氏雩都呉孔暉妻年十五適孔暉未期孔暉卒得遺腹子秉珪管矢心不二善養其姑事聞𢎞治庚戌旌表其門省志葉氏信豐人黃信義妻年二十五夫亡無子孀居砥節事聞詔旌表之卒年七十七省志羅氏興國人呂若履妻年二十二􅄔居善養姑安之撫二孤引掖以成矢心勵節終始不渝卒年七十七省志仙釋曾文辿雩都人天文纎緯黃庭内景之書靡所不究而地理尤精梁貞明間逰至袁州府萬載縣愛其縣北西山之丘謂其徒曰死𦵏我于此及卒遂𦵏其地後其徒在豫章忽見之駭而歸啓其墳無有也劉淵然贑人師事趙原陽於金精山得授諸階符籙及金火大丹之訣久之靈應響荅洪武癸酉召至京賜號高道寵賚殊厚洪熙初封真人賜二品銀章領天下道教卒年八十二比入斂凡七日端坐如生南安府東至贑州府贑縣界二百一十里西至廣東韶州府仁化縣界一百八十里南至廣東南雄府保昌縣界二十里北至吉安府龍泉縣界二百八十里自府治至南京三千二百一十里至京師六千六百六十五里糧二萬石零建置沿革禹貢揚州之域天文斗分野春秋属吳戰國属楚秦属九江郡漢為豫章郡贑南壄二縣地晉為南康縣地隋属䖍州唐因之宋初置南安軍治大庾縣割䖍州之南康上猶二縣來属𨽻江南西路元改置南安路本朝改為南安府領縣四大庾縣附郭本漢南壄縣地武帝遣將軍庾勝討南越築城於此因名大庾晉為南康縣地隋立大庾鎮唐神龍初陞為縣属䖍州宋為南安軍治元仍舊本朝因之編户十六里南康縣在府城東北一百六十里本漢贑縣地三國呉置南安縣晉太康間改南康縣属南康郡劉宋以後因之隋初属䖍州大業初復為南康郡之属縣唐属䖍州宋属南安軍元仍舊本朝因之編户三十一里上猶縣在府城東北二百里本漢南康縣地唐天祐中楊呉析置上猶場以地有猶水故名南唐陞為縣宋嘉定中改曰南安屬南安軍元又改曰永清本朝復改為上猶縣編戸七里崇義縣在府城東北一百里本上猶縣地先是輋人哨聚為亂于此正德末王都御史削平之奏割大庾南康上猶三縣里地分立為崇義縣編户六里郡名横浦以郡城大江自西流東横繞南岸故名形勝交廣襟喉南安志橫浦有闗大庾有嶺通道交廣此其襟喉南扼交廣西距湖湘宋范大用生祠記㨿江西上流接南荒之境宋蘇軾軍學記當五嶺最東輿地廣記軍有大庾嶺當五嶺之最東者南迫東廣西帶郴桂元劉尚友上猶學記控廣引閩元總管府治記南安為江西要郡南控廣引閩西接郴桂深山長谷隣亘谿洞風俗文物之盛與閩蜀等宋蘇軾軍學記民氣淳古士果而義民直而剛俱元劉尚友上猶縣學記民貧多訟南安軍學記山川東山在府城東南隔江一里山勢特起榖山在府城東髙千丈上有石頂圓盖如人形及有池産五色魚金蓮山在府城北三里諸峯連接状若蓮花寳珠山在府城西三里形圓如珠西華山在府城西五里髙聳連亘玉枕山在府城北七里以形似名乃郡之主山也峒山在府城北一十八里上有泉出石隙瀑流數尋下匯為澄潭南源山在府城西北七十五里巖崖髙峻飛瀑百丈其下湫潭深不可測聶都山在府城西南一百二十里相傳昔有聶姓者開都以居民故名其山出礬山海經云聶都之山諸水出焉旭山在南康縣治北盖縣之主山也山形髙峙日出則先照之故名一名九日嶺宋宰相陳升之父魏公來主縣簿夢山神來謁已而生升之初名旭後避神宗諱改名升之南臺山在南康縣南五里上有三岩可坐十餘人俗呼南岩晝錦山在南康縣西北一百里髙百餘丈周盤三十里石君山在南康縣泥水口三石形甚似人居中者為君左曰夫人右曰女郎雲主山在南康縣南一百六十里髙可數百丈形如飛驥故又名馬山上有仙巖巖前有仙池四時澄澈旱潦不増減羊嶺山在南康縣北三百里綿亘百餘里山頂有浮屠相傳唐有郭禪師者居之下山或騎虎豹後以禱雨弗應積薪自焚火然而雨隨至人見其烈焰中冉冉而去因祠祀之蓮花山在羊嶺山之西三峯狀如蓮花上有仙巖巖前有仙橋橋下瀑布千尺瀉於石竇不知所徃巽山在上猶縣治東相傳邑人有登科者則山下石嶂必生光彩龍鳯山在上猶縣西北二里縣之主山也有龍飛鳯舞之狀南山在上猶縣南三里俗有山生角之䜟故建塔其上方山在上猶縣南三里形如覆