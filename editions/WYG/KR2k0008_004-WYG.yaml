body:
  text: 眀一統志卷四眀李賢等撰順徳府東至廣平府威縣界一百五十里西至山西遼州和順縣界一百五十里南至廣平府永年縣界五十里北至真定府栢鄉縣界一百里自府治至京師一千里至南京一千七百二十里糧四萬二千石零建置沿革禹貢冀州之域天文昴分野周時為邢國地後属晋戰國属趙秦置信都縣属鉅鹿郡項羽改襄國漢属鉅鹿常山二郡及趙廣平三國晋時為石勒所據石虎改置襄國郡後魏改為襄國縣後周仍於縣立郡隋初廢郡以縣属洺州開皇中置邢州大業初復改為襄國郡唐初為邢州置總管府天寳初改為鉅鹿郡乾元初復為邢州五代梁為保義軍節度唐改安國軍宋陞為信徳府金改邢州仍置安國軍元初置元帥府尋改安撫司中統初陞順徳府至元初改為順徳路夲朝洪武初改為順徳府属北平布政司今直𨽻京師領縣九邢臺縣附郭本秦信都縣地後魏為㐮國縣隋改龍岡縣宋又改為邢臺縣元仍舊本朝因之編户三十二里沙河縣在府城南三十五里本隋龍岡縣地後分龍岡南境置沙河縣唐初於縣置温州州廢以縣屬邢州宋金仍舊元隸順徳路本朝因之編户一十六里南和縣在府城東四十里本漢舊縣屬廣平國東漢屬鉅鹿郡後魏併入任縣後周置南和郡尋廢郡為縣隋屬洺州尋改屬邢州唐初於此置和州州廢還屬邢州宋金仍舊元省入沙河縣尋復置本朝因之編户一十七里平鄉縣在府城東南一百里本漢廮陶縣屬廣平國晉屬鉅鹿國後魏改為平鄉縣隋屬洺州尋改屬邢州唐初於此置封州州廢還屬邢州宋省入鉅鹿縣尋復置金仍舊元隸順徳路本朝因之編户一十四里廣宗縣在府城東一百二十里本漢鉅鹿郡堂陽縣地後漢分置廣宗縣晉屬安平國後魏屬清河郡隋改為宗城縣唐於此置宗州州廢以縣屬貝州後復改為廣宗縣屬魏州宋屬大名府金復改宗城縣屬洺州元復為廣宗縣後省入平鄉縣尋復置屬順德路本朝因之編户一十五里鉅鹿縣在府城東北一百二十里本漢鉅鹿郡南䜌縣晉省入任縣後趙復置南䜌後魏省入栢仁縣隋於此置鉅鹿縣屬趙州唐置起州州廢還屬趙州後改屬邢州宋金仍舊元屬順徳路本朝因之編户一十七里唐山縣在府城東北九十里本春秋時晉栢人邑戰國時屬趙漢為縣屬趙國後魏改曰栢仁隋屬邢州唐初於縣屬東龍州州廢還屬趙州後改屬邢又改堯山縣宋省入内丘縣尋復置金改為唐山縣屬邢州元又省入内丘縣尋復置屬順徳路本朝因之編户一十三里内丘縣在府城東北五十里本漢常山郡之中丘縣晉陞為中丘郡石虎改為趙安縣後魏省入栢仁縣尋復置中丘縣隋改内丘縣屬趙州尋改屬邢州唐宋金仍舊元屬順徳路本朝因之編户一十七里任縣在府城東北四十里春秋時晉張縣地漢分置任縣屬廣平國東漢屬鉅鹿郡晉屬廣平郡後趙石氏改置苑鄉縣尋改清苑縣屬㐮國郡隋初復改任縣屬邢州後省唐復置宋省入南和尋復置屬信徳府金屬邢州元省入邢臺縣尋復置屬順徳路本朝因之編户一十五里郡名鉅鹿秦名㐮國隋名形勝依山慿險形勢之國後趙右侯張賔云鉅鹿當四方之衝宋沈括堯山縣㕔壁記大行䧺鎮於西北漳水縈流於東南郡志風俗人性敦厚好尚儒學隋志㐮國人性多敦厚務在農桑好尚儒學而傷於遲重雖當安静無事之日知有戰鬬攻掠之備沈括堯山縣㕔壁記争訟不撓於官司貧富相尚於賙恤郡志民俗醇厚稼穡惟勤郡志質厚少文氣勇尚義宋史地理志山川仙翁山在府城西北三十里唐時仙翁張果嘗止息其上𤣥宗因封其山為仙翁山風門山在府城西北四十里以冬夏多風故名雷公山在府城西十三里上有雷公廟百花山在府城西南四十二里甚崇峻其色青白鵲山在府城西北一百三十里山中有穴出雲母夷儀山在府城西北一百五十七里道通㐮國百巖山在府城西北其山峻極有百巖故名石門山在邢臺縣石勒遣石季龍進據石門即此湯山在沙河縣西北七十里下有湯泉可以愈疾巖上有石室絶無塵穢俗號為聖人室黒山在沙河縣西北四十里山石多黒色赫山在沙河縣西八十里中有龍神祠有禱輒應磬口山在沙河縣西南九十八里盧毓曰淇陽磬口冶鑄利噐即漢魏時舊鐵官也千言山在唐山縣西北四里衛詩出宿于千飲餞于言即此堯山在唐山縣西北八里相傳堯始封於此故名上有堯祠一名宣務山一名虚無山其上出文石五色錦章青山在内丘縣西二十里舊名黑山後周改今名攫山在内丘縣西北一十二里礪水之源出於此蓬鵲山在内丘縣西六十三里一名龍騰山相傳扁鵲將虢太子採藥於此因名其上有太子巖扁鵲祠孤山在内丘縣西北一十七里其山孤特故名唐改内丘山石井岡在府城西北七里一名龍岡岡上有井大如車輪漢光武營軍所鑿又相傳石勒時天旱佛圖澄於此岡掘一死龍濟以水乃蘇咒而祭之龍騰空而上雨即降因名龍岡石佛洞在府城西北内有三石人肖佛故名狼溝河在南和縣南五里兩岸多狼故名濁漳河在平鄉縣西南一十里源出山西潞州發鳩山流經此縣下至南和縣即禹貢之漳水也俗又名柳河宋王沿奏言漳水一石其泥數斗古人以為利源募民復魏史起十二渠以之灌溉可使數郡瘠鹵之田變為齊腴矣澧河在任縣東一十五里上接南和縣下流入真定府隆平縣界元郭守敬嘗建議澧河東過古任城失其故道沒民田千餘頃若開修成河其田即可耕種遠活水在府城西北五里舊名蓼水出㐮國西石井岡其流經任縣為蔡水復合入澧河百泉水在府城東南八里水自平地出其脉甚多蓋澧河之上源也一名渦水一名鴛鴦水沙河水在沙河縣治南亦名湡水泜水在唐山縣西二里上接趙州臨城縣下流入任縣及内丘南和縣境龍騰水在内丘縣西七十五里其源出龍騰山礪水在内丘縣西北十三里其水可以礪刀劔亦名渚水沙溝水源出蓬鵲山東流經内丘縣下入唐山縣界落漠水在平鄉縣西南十八里古薄津也俗訛為落漠聖井在仙翁山下相傳張果指此為井掘而得水冬夏不竭仙井在南和縣治北其水與地平深不可測上有仙井廟歳旱禱雨輒應温泉在沙河縣西北七十里其水四時長温能愈人疾鴛鴦泉在南和縣南有泉二道逆流而出廣阿澤在鉅鹿縣北五里一名大陸一名鉅鹿一名大麓中有菱蓮魚蟹之類又有鹹泉可煑為鹽洗腸源在内丘縣西十三里昔有髙僧佛圖澄於此洗腸因名土産白瓷􅄙玉沙俱邢臺縣出𤣥精石本府出公署順徳守禦百户所在府治東學校順徳府學在府治西北元初建本朝重修邢臺縣學在縣治東南洪武三年建沙河縣學在縣治東南宋大觀初建本朝永樂中重建南和縣學在縣治南洪武九年建永樂十年重修平鄉縣學在縣治東洪武六年建永樂三年重修廣宗縣學在縣治東南元中統間邑人李仲濟以其私地建本朝永樂九年重建鉅鹿縣學在縣治東南元元貞間建大徳初重修唐山縣學在縣治西元至正三年建本朝洪武二年重建内丘縣學在縣治北洪武三年建永樂二年重修任縣學在縣治東洪武三年建宫室蘇秦亭在沙河縣西南三十里俗呼為十里亭蘇秦激張儀西説秦使人微隨其後與同宿舍資以金帛車馬即此處沙丘臺在平鄉縣東北二十里紂築沙丘臺多取鳥獸置其中衛靈公卒莫沙丘宫穿冢得石槨有銘云不憑其子靈公奪我里子韋曰靈公之為靈也久矣秦始皇東巡囘崩於沙丘即此處平臺在平鄉縣東北三十里太平郷張耳臺在唐山縣西北十二里漢趙王張耳所築關梁豫譲橋在府城内俗呼為板橋豫譲事智伯智伯後為趙㐮子所殺豫譲伏此橋下欲刺㐮子以報智伯之仇又山西趙城縣亦有豫譲橋寺觀開元寺在府治東北唐開元中建本朝洪武中重修天寧寺在府治西北唐建元至元中重修汎愛寺在沙河縣治西北唐建本朝洪武中重建經閣寺在内丘縣治南宋元祐間建崇勝寺在任縣治東北普應寺在廣宗縣治東俱洪武中建廣教寺在唐山縣治西洪武中建福勝寺在平鄉縣治北永樂中重建圓通寺在南和縣治東永樂中修通真觀在府治西南元至元間建長春觀在内丘縣西八里元至元間建有碑存焉祠廟堯祠在堯山上堯登此山東瞻洪水後入因立祠焉銅馬祠在鉅鹿縣北七里以祀漢光武光武擊銅馬於館陶大破之闗西號光武為銅馬帝故名二賢祠在府學元總管王結建祀唐魏徴宋璟郭巨廟在内丘縣東南一十里金堤村陵墓邢侯夫人墓在府城齊武平初有掘古冡得銅鼎五受六升腹有科斗字云邢侯夫人姜氏墓時苗冢在平鄉縣東北二十里苗鉅鹿人晉末遷𦵏於此石勒墓在邢臺縣西十五里偽號髙平陵張賔冢在南和縣西十三里賔石勒軍師宋璟墓在沙河縣西北八里碑刻見存顔真卿書古蹟祖乙都書傳祖乙遷於邢相傳即今府城是栢人城在唐山縣西十二里皇甫謐帝王世紀堯所都也漢初為縣屬趙國趙貫髙以髙祖輕辱趙王欲圖之壁人置厠髙祖過此縣欲宿心動問縣何名曰栢人髙祖曰栢入者迫於人也不宿而去即此栢鄉城在唐山縣東北二十二里城冡記云堯所築也夷儀城在邢臺縣西一百四十里春秋邢遷于夷儀即此南䜌城在平鄉縣春秋傳齊田夏伐晉取䜌即此漢為縣唐廢張城在任縣西南二十七里漢張縣一名渚陽城晉將王浚遣兵討石勒屯於渚陽城即此建平城在邢臺縣石勒定都時所築苑鄉城在任縣東北十八里後趙石氏所築置縣名宦漢謝夷吾章帝時遷鉅鹿太守愛育人物有善績班固以政洽時雍薦之魏霸和帝時鉅鹿大守為政簡朴寛恕吏有過先誨之不改者然後罷去有譛訴者但稱他吏之長譛者慙而止樊準和帝時鉅鹿太守歳饑民流準課農桑施方畧眀年歳大豐殺價賤十倍趙魏之間數遭寇掠凖外禦盜賊内撫百姓郡境以安三國常林魏南和宰節操清峻治化有成遷博陵太守南北朝崔伯謙北齊鉅鹿太守導民以禮譲事無巨細必自親覧決在郡七年獄無停囚每使者巡察恒處上第隋劉曠平鄉令人有争訟輒丁寧曉以義理不加繩劾在縣七年風教大洽囹圄生革庭可張羅及去官民無少長泣送數百里唐元誼貞元中邢州刺史徙漳水自州東二十里出自鉅鹿北十里入故河民頼之五代趙鳯唐安國軍節度使所得俸悉分將校有廉聲陳思譲周安國軍節度留後有善政及代還官吏耆艾詣闕借留宋邊肅知邢州先是地屢震城堞摧圯無守備會契丹入寇真宗在澶淵宻詔肅聼便宜保他城肅匿詔不發督丁壯乗城闢諸門悉所部兵陣以待契丹騎薄城下肅與戰小勝契丹莫測居三日引去王慥知邢州民樂其政既去民思之不已圖像祀焉劉恕鉅鹿縣主簿潛心書史發姦摘伏一時能吏自以為不及王沿初知宋城縣有才名後知邢州興水利導諸渠溉民田數萬頃初沿建言論者以為無益已而邢州民有争渠至殺人者始知沿所建為利劉渙知邢州時承賊蹂踐後渙經理繕葺有叙兵民犯法者䋲以重典威令大振金周昻南和縣主簿有異政遷良鄉令李復亨南和令有亷名盜割民家牛耳復亨盡召里中人至使牛家牽牛徧過之至一人前牛忽驚躍詰之乃引服元劉潤鉅鹿内丘兩縣提領所至皆有惠愛即秉忠父也張耕邢州安撫陵州有萬餘户兵興以來不滿數百耕及副使劉肅善於綏撫流民復業遂陞邢為順德府又興鐵冶行楮幣公私賴焉趙良弼邢州安撫司幕長邢久不得善吏且當要衝使者旁午民多逃亡良弼區畫有方邢大治户日増倍王結順徳路總管教民務農興學孝親弟長戢奸禁暴悉有書俾朝夕閲習又祠唐魏徴宋璟於學考其言論風㫖以勵多士張時中鉅鹿令縣遭水旱多方賑恤期月而百姓豐裕有殺人以誣人者時中鞫知其情誣者竟抵罪既去民思其徳立碑頌焉本朝蕭翼正統間知順徳府持已廉執事敬比去宦囊一琹而已唐澤𢎞治中平鄉知縣築河隄一百八十里百姓至今賴之人物漢路温舒鉅鹿人舉孝廉昭帝時守廷尉史宣帝即位温舒上書言宜掃亡秦之失尊文武之徳省法制寛刑罰則太平之風可興宣帝嘉納累官臨淮太守治有異績子孫皆至守牧侯芭鉅虎人少肆力於學壯逰四方聞楊雄博覧經史徃從之逰雄授以太𤣥法言芭得其旨焉張禹襄國人性篤厚節儉舉孝廉章帝時拜揚州刺史志在理察枉訟録囚徒多所明雪轉兗州刺史以清平稱遷下邳相為民開水門灌田民用給足累官太傅安定初以定䇿功封安鄉侯孟敏鉅鹿人性剛直有剖决不仕嘗客居太原荷甑墮地弗顧而去郭泰見而問之敏曰甑已破矣視之何益泰竒之因勸令學卒以成徳時苗鉅鹿人少清白建安中為壽春令初之官用黄㹀牛牽車至縣嵗餘生一犢及去任留其犢謂父老曰是爾土所生也初來無此吾不可以歸當時重之張臶鉅鹿人漢魏間徴辟皆不應逺遁恒山魏明帝時張掖郡有寳石負圖太史令奏以為有魏之䅡或以問臶臶曰神以知來不追已徃此石當今之變異將來之禎祥也遂隐居不與時競以道自樂年百有五歳而卒晋張賔中丘人博涉經史闊達有大節常自謂智算識鍳不後于房但不遇髙祖耳及見石勒勒引為謀主算無遺策號曰右侯及卒勒流涕彌日南北朝游雅廣平任人魏太武時與髙允等俱知名累官太子太傅出為雍州刺史在任廉白甚有惠政卒謚宣侯游明根雅族弟幼年遭難為櫟陽王氏牧羊以壺漿倩人書字地上學之長安鎭將竇瑾見之以告雅雅贖之教讀書積學累歳雅薦之魏太武擢為中書學士累官儀曹尚書遷大鴻臚卿陳元康廣宗人頗涉文史機敏有幹北齊神武時授大丞相功曹内掌機宻善陳事意累遷大行臺左丞耿豪鉅鹿人有武藝好以氣凌人周文帝時以武勇見知從戰芒山當豪前者死傷相繼周文嘉之拜雍州刺史進位侍中驃騎大將軍隋游元明根𤣥孫父寶藏位至太守元少聰明仕周歴夀春令譙州司馬俱有能名隋煬帝時為治書侍御史遼東之役宇文述等敗績元按其獄以公正稱奉使黎陽督運楊𤣥感作逆元以正言諭之為所囚竞不屈莭而死詔贈之官其子唐李嗣真邢州栢仁人多藝數舉明經直𢎞文館與學士劉獻臣徐昭皆少有名號三少髙宗時累官太常丞武后嘗問以儲貳事對曰程嬰杵臼存趙孤古人嘉之后悟中宗乃得安卒謚曰昭李元愷邢州人博學善天步律歴性恭慎未嘗敢語人宋璟嘗師之既當國厚遺以束帛將薦之朝拒不答卒年八十餘李懷遠邢州栢仁人少孤嗜學宗人欲藉以髙䕃懐逺辭退曰因人之勢髙士恥之乃擢四科第累官至同平章事爵趙郡公懐遠久貴益素約不治居室常乗欵叚焉卒謚曰成李景伯懐遠子仕為諫議大夫中宗宴侍臣酒酣命為回波詞衆以諂言進景伯獨為箴規語以諷有建言置都督非是者諸羣臣普議景伯議願罷都督留御史以時按察秩卑任重以制奸宄從之宋璟邢州南和人耿介有大莭風度凝遠武后時為鳯閣舍人每遇事直言不頋身之利害𤣥宗時拜相務清政刑善守文以持天下之正中興賢相璟為首稱潘好禮貝州宗城人第明經博學能論議莭行修整開元初為邠王府長史兼司馬王好遊觀農月出獵好禮乃卧馬下謼曰今農在田王何得非時暴禾稼以損下人請先踐殺司馬王慚而還後遷豫州刺史勤於政治魏少游邢州鉅鹿人天寶末累官水陸轉運使四為京兆在官無赫赫之名然善任人緣飾規檢有足稱者五代孟方立邢州人少有勇力仕梁為昭義軍節度使節制澤潞邢洺磁五州而治潞州後徙軍於邢晉將安金俊攻磁方立往救之兵敗馳還邢食盡飲酖卒孟知祥邢州人仕後唐為成都尹西川節度使明宗立知祥訓練兵卒陰有王蜀之志并有東川及明宗殂乃建國曰蜀傳子昶為宋所平李周邢州人父矩遭亂不仕嘗謂周曰今世道未平汝當從軍旅以興吾門盧嶽徙家太原周送之嶽曰子方頤隆準眉疎徹真將相也吾占天象晉必有天下宜留事晉後為莭度使歴四鎮柴守禮堯山人與周太祖郭威同里妹歸周祖為后后無子以守禮之子為子是為世宗守禮徙居洛陽終世宗之世未嘗至京第以元舅禮之王仁鎬龍岡人仕周累官至樞宻副使後為安國軍莭度郡有盜鎬遺以束帛諭之盜悉遁去宋初加檢校太師宋范質宗城人性明悟九歳能屬文後唐時進士自從仕未嘗釋卷後周時累官平章事左僕射及宋太祖陳橋之立質誚譲之具陳禪譲之禮封魯國公質㢘慎守法太祖稱為真宗相有文集及五代通錄共九十餘卷張思鈞沙河人祖中正漢澤州刺史思鈞善擊劔挽强初補龍衛指揮使歴綿漢等九州都巡檢累立戰功遷左千牛衛將軍卒年八十几思鈞質狀小而精悍太宗嘗稱其樓羅自是人目為小樓羅魏廷式宗城人少明法學有膽氣登進士累官益州轉運使嘗入奏事太祖謂有事當白中書廷式曰臣遠乗驛而至以機事上聞願取斷宸衷非為宰相來也即不時召對稱旨歴知數州所至以嚴明稱官至右諌議大夫劉知信邢州人父遷晉帳前軍使母即昭憲杜太后之妹知信累官武徳使真宗時歴知河南及昇定州雖因戚里致貴而以循謹著聞卒贈太尉范旻質之子初知開封縣太宗尹京時數召與語器重之後權知兩浙諸州軍事有政譽嘗從征晉陽加給事中子貽孫官至主客員外郎范杲質從子少孤質視如己子杲刻志於學為文尚深僻初為太廟齋郎嘗求奏遷秩質作詩曉之後歴拾遺補闕終史館修譔子坦亦第進士劉承宗知信子幼善射兼習書數真宗時累官知保定州在郡有治迹詔書嘉奬官至東上閤門使弟承渥以䕃補殿直喜為條奏官至閤門秖候李玭宗城人力耕事母母卒譲田與弟廬𦵏所晝夜號泣負土築墳又以二代及諸族父母槀𦵏未盡禮築之凡三年成六墳不食肉衣帛不預人事墳成復留守墳三年常令兄子賣藥以自給天禧中知府張知白以狀聞詔賜粟帛里中有母在而析産者聞玭被旌兄弟慚懼復同居陳薦沙河人舉進士為華陽尉後從韓𤦺在定州幕府琦每稱其亷於進勇於退嫌疑間毫髪不處累官龍圗直學士河北都轉運使後知蔡州進資政殿學士子厚御史臺主簿成閔邢州人靖康初劉韐帥真定以應募在麾下後從髙宗南渡屢立戰功韓世忠推譲其勇嘗拒金主亮有功拜太尉卒贈開府儀同三司有子十一人金王徳元邢臺人大安中舉經童第二人既受官避兵於許許人以為師出其門者數千百人為人豈弟敦厚與人言必本於忠信許人化之及卒為立祠於學以祀之元劉秉忠邢臺人蚤遁迹浮屠博學多材藝深於數學世祖召見大奇之留置左右迨下江南常贊世祖以天地好生為徳世祖即位拜太保領中書省事益以天下為己任建國號定都邑頒章服立朝儀凡事有闗於國家大體者必酌古今之宣焉卒贈常山王謚文正有文集十卷劉秉恕秉忠弟好讀書受易於劉肅遂明理學世祖召見擢禮部侍郎歴彰德等五州總管所至皆有惠政召除禮部尚書出為淮西宣撫使終平陽路總管郭榮邢臺人通五經精於算數水利而尤善於教子時劉秉忠張文謙張易王恂同講學於邢州西紫金山榮使其子守敬從秉忠學遂至成名張文謙沙河人為人剛明簡重洞究術數尤粹於義理之學世祖時以劉秉忠薦深見信任世祖征大理欲屠其城文謙力諌止之時大臣議欲每事奏聞不闗白省府文謙曰朝政不闗中書古無是理累官樞宻副使卒贈太師魏國公謚忠宣郭守敬榮之子幼有大志嘗從劉秉忠游張文謙薦之於世祖能知水利嘗興復西夏瀕河五州諸渠後受命治歴乃徧考諸書晝夜測驗推算極為精驗歴成拜太史令再遷昭文館大學士知太史院事董朴順徳人自幼强記師事樂舜咨劉道濟有求道之志至元中用薦為陜西知法官未幾以親老歸養召不起命以翰林修譔致仕卒年八十五朴所學自六經及孔孟先儒微言莫不融貫其旨為人清而通和而介學者稱為龍岡先生林起宗内丘人自幼力學嘗從劉因遊深得道學之指既而教授於鄉後學多宗之嘗著志學指南心學淵源二圗及大學論語孟子中庸諸圗孝經圗觧小學題辭發明魯菴家説等書夲朝左獻廣宗人洪武中由太學生歴官户部主事勤於職務薦陞浙江布政司左參議永樂初召為刑部右侍郎才能著稱張瑛邢䑓人洪武中領鄉薦任教職被薦為給事中進春坊中允宣徳中累官禮部尚書兼華葢殿大學士入秘閣㕘預機務尋調南京禮部尚書卒井源邢䑓人父田永樂中鄉舉任户科給事中源風儀俊整為駙馬都尉謙恭小心接士大夫有禮正統中没於王事人咸惜之李聰順徳人由進士歴官郎中饒州知府廣西左㕘政所至有惠澤及人人多思慕之崔恭廣宗人由進士歴官布政司副都御史吏部侍郎進尚書卒恭好學薦士惟恐不及在吏部奬廉退抑貪競未嘗以好惡黜陟人時論偉之諡莊敏列女房氏鉅鹿人年十六為魏溥妻溥遇疾且卒顧謂之曰死不足恨但痛母老家貧赤子䝉𦕈房垂泣曰幸承先訓出事君子義在偕老不獲所願命也母慮母子在妾一身溥卒房操刀自割左耳投棺中曰鬼神有知相期泉壤終身不預坐席事姑終養訓子成立後孫為濟隂太守仙釋潘師正宗城人隐居嵩山逍遙谷高宗幸東都召見問所須對曰茂松清泉臣所須也高宗尊異之詔即其廬作觀時太常獻新樂遂更名祈仙望仙翹仙曲卒年九十八諡體元先生竺道生鉅鹿人生而頴悟聰哲若神遂改俗歸依沙門竺法汰年十五便登講座雖宿望老僧莫敢詶抗初入廬山後逰長安還止青園寺宋太祖深加歎重尋入呉之虎邱山竪石為徒講湼槃經石皆點頭復入廬山升法座而卒廣平府東至山東東昌府臨清縣界一百二十里西至河南彰徳府磁州武安縣界八十里南至河南彰徳府臨漳縣界八十里北至順徳府南和縣界六十里自府治至京師一千里至南京一千六百七十五里糧五萬九千石零建置沿革禹貢冀州之域天文昴分野春秋屬晉戰國屬趙秦為邯鄲郡地漢初置廣平國武帝改為平干國宣帝復為廣平國東漢省入鉅鹿郡晉魏因之後周改置洺州隋改為武安郡唐初改為洺州立山東道大行臺尋罷置洺州大總管府天寶初改廣平郡乾元初復為洺州宋屬河北道金屬河北西路元初置邢洺路總管府又改洺邢路至元中改廣平路本朝洪武初改為廣平府屬北平布政司今直隸京師領縣九永年縣附郭本春秋曲梁地漢為曲梁縣屬廣平國東漢屬鉅鹿郡晉屬廣平郡北齊併曲梁入廣平縣隋改廣平為永年縣屬武安郡唐屬洺州宋以臨洺縣省入元仍舊本朝因之編户二十八里曲周縣在府城東北四十五里本漢舊縣屬廣平國東漢屬鉅鹿郡後魏改曲安縣屬廣平郡隋屬洺州唐復為曲周縣宋省入雞澤縣後復置金以平恩縣省入元仍舊本朝因之編户二十四里肥鄉縣在府城南四十里本漢邯鄲蒲縣地曹魏置肥鄉縣屬廣平郡晉因之後魏省入臨漳縣隋復置屬磁州後屬洺州唐省清漳縣入焉宋金元仍舊本朝因之編户二十六里雞澤縣在府城北七十里春秋盟於雞澤即此漢為廣平縣地隋於廣平城置雞澤縣大業初省唐初復置自後縣治屢遷而名不改元初併入永年縣尋復置本朝因之編户一十一里廣平縣在府城東南七十里漢置廣平縣屬廣平國東漢屬鉅鹿郡曹魏於縣置廣平郡北齊以曲梁縣省入