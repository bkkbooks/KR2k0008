澶淵城在開州城南五里春秋㑹盟於澶淵宋神宗時河决澶淵城即此戚城在開州城北七里春秋晋趙鞅納衛世子蒯瞶於戚即此牽城在内黃縣西南一十二里春秋公㑹齊人衛人于牽即此柯城在内黃縣春秋襄公㑹于柯即此雍榆城在濬縣西南一十八里春秋叔孫豹帥師救晋次于雍榆即此繁陽城在内黄縣東六十里趙將亷頗伐魏取繁陽即此匡城在長垣縣西南一十五里春秋諸侯盟于牡丘遂次于匡論語于畏於匡即此長垣故城在今縣西南三十五里本秦置唐廢入匡城縣訾樓城在舊長垣縣西北六十里春秋邢人伐衛取訾樓即此漆城在舊長垣縣西二十里竹書紀年邯鄲伐衛取漆即此蒲城即長垣縣治春秋齊侯衛侯胥命于蒲家語子路為蒲宰即此金元長垣縣舊治栁家村本朝徙治此平陽城在韋城廢縣西二十里左傳衛侯飲孔悝酒於平陽即此頓丘城在清豐縣西南二十五里衛風送子渉淇至于頓丘即此亦謂之隂安古城漢置頓丘縣晋於縣置頓丘郡五代晋置德清軍宋淇入清豐干城在頓丘舊縣界郡國志衛縣有干城衛風出宿于干即此漆園城在東明廢縣東北二十里今名漆園村内有莊子廟盖莊周為吏之所長羅城在舊長垣縣西南三十里漢武封常惠為長羅侯即此光武時併入長垣東明城在長垣縣東四十五里本漢東昏縣莽改曰東明東漢復曰東昏宋初置東明縣属開封府金徙於曹州濟隂縣西本朝省入開州故魏縣城在府城西三十五里故老云此即舊魏縣今為舊縣店昌樂城在南樂縣界晋置此縣隋省唐復置繁水城在南樂縣北四十里隋置此縣唐省入昌樂德清城在開州城北七十里陸家店晋天福中移澶州於德勝寨而於故澶州置頓丘鎮尋改鎮為德清軍開運初移於此隍城在舊府城五代周郭上皇所築其城儀門東南有五禮碑西南有大樂大成碑皆宋徽宗所立清豐故城在今縣西北一十八里宋時因水故遷治於今縣婦姑城在舊長垣縣西南七十里隋於此置匡城縣宋改長垣縣金始遷縣於栁家村此城遂廢舊府城在今府城西八里宋元時府治在焉本朝洪武末淪於水始遷今治廢濮陽縣在開州治西南後魏置縣於此隋改昆吾縣後改濮陽唐属濮州五代時澶州治此本朝省入開州廢白馬縣在滑縣治南本衛之曹邑漢為縣隋唐以来為滑州附郭本朝省入滑縣廢黎陽縣在濬縣西二里漢縣元省入濬州廢臨河縣在開州西六十里本漢黎陽縣地隋析置臨河縣金省入開州廢澶淵縣在臨河廢縣東四十里隋割臨河頓丘内黄三縣地置唐初改澶水貞觀中廢入臨河廢韋城縣在滑縣東南五十里本殷伯豕韋氏之國隋置縣金省入白馬縣廢靈河縣在滑縣境隋置靈昌縣後唐改曰靈河宋省入白馬縣今名靈河鎮廢衛南縣在滑縣東六十里本春秋楚丘地衛文公自曺遷此隋初置楚丘縣後改衛南金省入白馬縣廢永昌縣在濬縣境隋初置大業中廢鉅橋在濬縣西五十里紂聚粟之所武王發鉅橋之粟即此又衛輝府亦有此橋泉源在頓丘古城東北衛詩泉源在左淇水在右五鹿墟在府城東左傳晋公子重耳乞食於五鹿有野人與之塊即此處又開州南三十里有五鹿城魯伐衛取五鹿盖此城也百花塢在府城内宋王拱辰留守日於西園髙築塢名曰百花旄丘在開州城東北􅆁風旄丘之葛兮何誕之節兮鐵丘在開州北五里左傳衛與鄭戰蒯瞶登鐵山望之至今云此丘曰鐵丘清丘在開州東南七十里左傳盟于清丘即此延丘在開州東南四十里左傳延陵季子適衛説蘧伯玉等曰衛多君子未有患焉盖季子憇於此坵瑕丘在開州城東南三十里禮記檀弓公叔文子升瑕丘蘧伯玉從文子曰樂哉斯丘也死則我欲𦵏焉伯玉曰吾子樂之則瑗請前馬陵道在府城東南一十里即孫臏伏弩殺龎涓處黄河故道在開州治南又長垣縣南六十里清豐縣西五里及廢東明縣南五十里皆有故道本朝正統十三年河决陽武循故道至開州南一百二十里東流扺濮州過張秋入海其流奮激聲聞數十里俗名響口子中軍帳在大伾山近北絶巔隋末李宻嘗息兵於此故立帳後人因之又立中軍亭臺頭堡在府南大門外有高臺相傳魏惠王拜郊臺今稱村曰台頭堡逯明壘在滑縣石勒将所築逯明石姓因以稱壘遺址尚存黎陽倉在大伾山北麓乃隋煬帝所制及隋亂李宻襲倉以賑兵民唐宋皆復其制漕河北粮儲以餉京師自政和後河易故道始廢王鐵槍寨在滑縣東北四十里五代王彦章與叚凝屯兵於此彦章善鐵槍故名德勝寨在開州南三里漢乾祐初自夾河移澶州於此周世宗又遷於夾河與德勝寨南北相直故居人有南澶北澶之目鯀堤在開州城西一十里自濬縣入界相傳鯀治水時所築復關堤在開州城西南古黃河岸北衛詩乘彼垝垣以望復關即此金堤上接清豊下入南樂縣界漢書金堤古堰也成帝時王延世運土以塞河决自金堤而增築之堤上有金堤驛秦女樓瓠子口在開州城西南二十五里漢武帝時河决濮陽瓠子使汲仁郭昌發卒数萬塞之帝因封禪還自臨决河沉白馬玉璧令從官自將軍以下皆負薪寘决河作歌二章悼功之難成卒塞瓠子築宮其上曰宣房云枋頭在濬縣西南八十五里淇水之北即淇水口也魏志曹操於淇水口下大枋木以成堰遏淇水東入白溝以通漕運故名枋頭晋書桓温伐慕容暐暐將慕容埀拒温大破之遂至枋頭亦此地濳龍宅在開州舊澶州城内乃後唐明宗所居之宅後名潛龍院御店宋太祖太宗㣲時嘗寓澶淵城中有邸舍後以􅝕瓦覆之號御店徽宗時改修觀以潛德名東園在舊府治宋韓𤦺判大名新進少年多怱之𤦺嘗游園為詩云風定曉枝蝴蝶閙雨匀春圃桔橰閒時人稱其㣲婉棃園在舊府城内宋時置有棃萬餘株其後許留守又種桃萬株名公題詠甚富名宦周仲由仕衛為蒲宰孔子稱其有三善蒲人德之漢兒寛内黃縣令嘗開陸輔渠以灌田民獲其利因號兒公堤韓延壽東郡太守尚禮義好古教化在東郡三嵗令行禁止斷嶽大减為天下最王尊東郡太守河溢泛浸瓠子金堤尊躬率吏民投沉白馬祀水神請以身填金堤因止宿堤上吏人数千人争叩頭救止尊終不肯去俟水波稍却迴還吏民奏其狀耿純光武時為東郡太守視事数月盗賊清寧居四嵗坐免後因事過郡百姓数千涕泣願留之黄香肅宗時為東郡太守上疏願任以宮臺煩事召為尚書令仇覽為蒲亭長勸人治生産農事畢令子弟就黌舍有陳元者母告其不孝覽驚曰母守寡養孤奈何欲致子於不義乎母感悔而去覽親至其家因陳孝行元竞成孝子李雲白馬令桓帝時中常侍單超等以誅梁冀功封侯專權用事雲露布上書指其奸邪害國下獄死天下甚寃之三國司馬芝魏陽平太守家無餘財政聲流聞鄭渾魏陽平太守勸稼穡明禁令民安於農盗賊止息晋樂廣元城令有清聲遷中書侍郎羊暨陽平太守有治行鄭黙東郡太守值嵗飢輙開倉賑給乃自表請罪朝廷嘉其憂國詔書褒羙子球為頓坵太守亦有治績南北朝明亮魏陽平太守清白愛人甚有惠政既去吏民追思之許惇魏陽平太守時遷都鄴陽平為畿郡軍國責辦又勲貴属請朝夕徵求惇並御之以道咸以無怨政為第一後為魏尹羊烈北齊陽平太守蝗不入境詔書褒羙之隋楊文恩開皇初魏州刺史甚有惠政及去吏民思之為立碑頌德魏德深貴鄉長為政清静不嚴而治㑹興遼東之役所在征歛下不堪命惟貴鄉一縣有無相通百姓不擾尋轉舘陶長兩邑民詣闕争之鄭袤黎陽令吏民悦服太守班下属縣特見甄異為諸縣最唐狄仁傑通天中為魏州刺史時契丹䧟冀州前刺史懼賊至驅民保城修守具仁傑至曰賊在逺何自疲民悉縱就田民愛仰之為立生祠李懐讓以御史劾宰相崔湜等過失出為魏縣令為政方嚴張廷珪魏州刺史在官有威化時議以蚕折租廷珪謂安可不恤其患而殫其力奏免折租之害苗晋卿魏郡太守有德政郡為立碑王維撰文宋璟魏州刺史有惠化吏民懐之蘇幹埀拱中魏州刺史河朔飢前刺史苛暴百姓流徙幹檢吏督奸勸課農桑由是流民盡復以治稱杜暹開元中魏州刺史發奸摘伏吏民畏愛後封魏縣侯李邕開元末滑州刺史上計京師邕蚤有盛名人傳其眉目瓌異至阡陌聚觀後生望風納謁盧暉開元末魏州刺史徙永濟渠自石灰窠引流至貴鄉縣西注魏橋以通江淮之貨蘇晋魏州刺史清心省事吏民安之陽嶠魏州刺史以清白聞遷本道按察使魏人􅋇耳闕下請為刺史故再治魏王志愔魏州刺史在任破碎奸猾令行境止境内肅然令狐彰魏博節度使始滑當冦衝城邑墟榛彰躬訓吏下檢軍力農法令嚴無敢犯者田疇大闢庫委豊餘田𢎞正魏博節度使得軍士心事事禀承朝命來朝請留闕下憲宗勞之曰卿為朕長城安用辭𢎞正死朝廷以其子布賢可世其官召布仍拜魏博節度使韋景駿貴鄉令有母子相訟者景駿曰教之不孚令之罪也因嗚咽流涕付授孝經使習大義於是母子感悟後為魏州刺史民甚悦之蕭倣懿宗時義成軍節度使滑州瀕河累嵗有水患倣徙其流逺去樹堤自固人得以安五代王彦章梁澶州刺史晋人䧟澶州獲其妻子誘之降彦章不從既而兵敗被執晋王欲用之彦章曰朝事梁而暮事晋何面目見天下之人遂死之魏丕周世宗鎮澶淵辟司法叅軍有盗五人獄具丕疑其寃緩之不数日果獲真盗後又歴頓坵冠氏元城三縣令王祜周魏縣南樂二縣令善治劇有聲迹宋初自潞州召還知大名府宋張永德以魏國公判天雄軍專意安静以老去官李昭亮以成徳軍節度使判大名府治聲流聞移定州尋徙為天雄軍節度使曹瑋再知天雄軍以威愛相濟吏民安之契丹使過天雄戒其下曰曹公在此毋縱騎馳驅趙昌言知天雄軍又知澶州有操畧敢斷治軍極嚴治民和易甚有治狀魏咸信太平興國初知澶州訓齊卒伍契丹不敢入冦陳恕知大名府時契丹内冦受詔増浚隍城器用取於民者不時集恕擒一大豪將斬之宗族號愬請救願翌日集事違期甘死由是無敢後期者數日就功既而改知澶州尤以寛厚待民威嚴治吏趙及知魏縣又通判大名府和厚廉退所治有聲吏民愛之雷有終知大名府專以寛厚治民寇凖知天雄軍契丹使過謂曰相公重望何以不在中書凖曰主上以朝廷無事北門鎖鑰非凖不可馬知節知天雄軍有惠政吏民懐之李昭述河北都轉運使知澶州時河決澶淵久未塞㑹契丹使來乃命昭述城澶州以治堤為名調兵農八萬逾旬而就韓億真宗時通判澶州時河決億集瀕河丁夫就伐芟親督築不賦于民而河患平仁宗時又知澶州尤有惠政陳堯佐眞宗時知滑州治水有功滑人徳之號其堤為陳公堤陳堯咨仁宗時知天雄軍特命佩魚以示優恩改判澶州令行禁止境内肅然王曽天禧初天聖中再蒞大名凢舊政有不便者委曲彌縫悉掩其非吏民感悦咸繪其像祠事之冦瑊河北轉運使天禧中河決澶淵瑊視役河上堤墊數里衆皆奔潰瑊獨留自若須㬰水為折去衆皆異之仁宗時知滑州總領脩河河平擢樞密直學士張知白知大名府有惠愛人徳之姚仲孫知澶州河壊明公埽仲孫親總役堤上埽一夕復完權知大名府夜領禁兵塞金堤決河是歳澶魏雖大水民不及患吕夷簡以前宰相判天雄軍兼北京留守不以大臣自驕而留意民政王徳用知澶州契丹使劉六符至謂曰比嵗大熟此公仁政所及也徳用曰豐年乃其常耳後以使相再判是州民喜曰黒王相公來矣梁適以翰林侍讀學士知澶州有善政靳懐徳知澶州州居水陸之要懐徳悉心撫治著政績使車徃復多稱譽之程琳仁宗時知大名府前後十年持重不擾増守禦備植襍木數萬曰異時樓櫓具可不出於民矣魏人愛之為立生祠賈昌朝三領魏藩咸有惠政吏民常恐其去英宗即位始徙許州杜衍自河北都轉運使改知天雄軍專以慈惠及民陳執中以使相判大名府河決商胡走大名程琳欲為隄不果成而去執中乗豐年調丁夫増築二百里以障横潰文彦博以使相兩判大名府徳望老成為朝廷倚重韓琦熈寕初以使相判大名府處事果㫁而器量不凢魏人思其徳繪像生祠之遼使過境相謂曰此侍中治境毋多需索子忠彦亦知大名惟務安静民皆樂其至焉歐陽修通判滑州時仁宗登用杜衍等分列府乞召脩重言路遂入知諫院包拯兩為河北轉運使治大名府政令嚴明吏民畏而愛之陳希亮知滑州㑹河決魚池希亮發禁兵扞之而自廬於當決之處吏民涕泣更諫堅卧不起水亦漸去人比之王曽李若谷知滑州愷悌愛人河嚙韓村隄夜馳徃督兵為大埽至旦以完既去民思之韓綜億子知滑州在任有徳政民甚懐之韓絳綜弟熈寕中判大名府神宗遣使問役法絳上疏條其弊時河決小呉都水議傍魏城穿渠絳言徒費耗國力三奏訖罷之蘇轍為大名府推官當官論事不肯謟附甚得時譽張觀知澶州河壊孫陳埽州人大恐或請趨北原避水觀曰太守獨去如州民何乃躬率卒徒増築之隄完水亦退黄庭堅大名府國子監教授文學足以軌範學者當時推重焉張錫知東明縣始至令其下曰吾所治者三恃力恃富恃贖者吾所先也嵗中以治迹聞梅摯知滑州州歳備河調壯丁伐灘葦摯以其疲民奏用州兵伐之河大漲將決夜率官屬督工脩完水不為患燕度知滑州滑與黎陽對境河埽下臨魏者霖潦暴至薪蒭不屬度悉以所儲茭楗禦埽頼以不壊劉渙知澶州治平中河圯地震民乏粟率賤賣耕牛渙盡發公錢買之明年民無耕牛價十倍渙復出所市牛以元値與民澶民頼不失業張問通判大名府羣牧地在魏歳久冒入于民有司按舊籍括之至毁室廬發丘墓問止以聞仁宗曰吏用心如此民何不安立罷之韓璹元豐初知澶州河決晝夜扞禦又脩立學舍以興起文風使澶知有詩書之化任布知澶州慈祥愷悌行以不擾李亰知魏縣奉法嚴正吏不便欲以竒中京遂相率遁去監司果議以斥京知府任布曰如此適墮吏計京賴以免司馬光僉書武成軍判官攝韋城令有政聲李肅之通判澶州契丹泛使將過而樓堞圯壊肅之鳩工構成屋凡千區已而中貴人􅔷命來視規置一新驚賞嗟異聞之于朝王拱辰元豐初以宣㣲使判大名府時藉氏為保甲禁令苛急徃徃去為盗拱宸抗言其害主者指為沮法拱辰上章不已神宗悟於是第五等户得免劉摯元豐末知滑州有惠政李常通判滑州留意政事民懐其惠李若水元城縣尉甚有執守傅堯俞直昭文館以力論新法貶監黎陽草塲郡掾行縣堯俞出迎盡禮守為遣他吏代主出納堯俞辭曰居其官安可矌其職雖隆寒盛暑必日至庾治事金裴時亨同知大名府事先是豪猾縱橫前政莫能制亨下車宣明約束闔境帖然圖克坦公弼知大名府事時軍興有司督捕租及牛頭税甚急公弼奏民皆疲弊宜緩征以紓民從之元張𢎞範大名路總管以嵗大水免民租税朝廷罪其專𢎞範請入見言朝廷儲之小倉不若儲之大倉帝曰何説也曰今必責民輸倉庫雖實而民死亡殆盡明年租税將安出曷若活其民使歳有恒収非大倉庫乎帝曰知體其勿問趙矩至元中南樂縣尹務興學校當時弦誦之聲遍聞四野人比之文翁陳執中清豐縣尹時兵革未寕民多困苦執中平賦役課農桑又修飭學校以興起文風時稱其治教咸盡云張孔孫以廉訪使蒞治大名糶粟以賑饑民全活甚衆後為大名路總管兼府尹大興學校有獻故河隄三百里於太后者即上章請還於民從之王士元知濬州州潰黄河城堞不完至正中賊逼州州兵悉散潰士元坐堂上賊至前問曰爾為誰士元曰我王知州也强賊識我否賊欲縳士元士元奮拳毆賊賊怒并其子致㣲殺之劉友諒至治中知濬州下車訪察利病修舉墜廢六事俱興百姓咸慕其徳政立碑以思之夲朝歐陽莘洪武初為開州判官愛士恤民政從寛簡奸弊悉除吏胥畏服遷行省郎中民攀留泣下不忍釋金雍洪武初知清豊縣博學多才為政有惠愛時兵燹之後樽節財用脩舉廢墜勸課農桑期年之間民皆安生樂業諸𢎞道洪武中知滑縣在任招撫逃移優恤窮困教耕桑之法立學校之規風俗丕變栁申洪武中知大明府在任專尚徳禮志欲措刑為政務推經術有古循吏風胡儼永樂初為長垣敎諭淹貫經史師道尊嚴一時模範無出其右後為國子祭酒翟整永樂初知南樂縣在任興補廢墜孜孜不輟為政務寛平民心悦服職滿邑人不釋復留之後致仕夏忠永樂中知大名府存心忠厚持己廉平脩學校勵風俗政化興行人皆徳之宋安宣徳間知内黄縣公勤節愛民心胥悦秩滿士民詣闕保留得復任數年去民益向慕立祠祀焉郡志李輅正統初以御史出知大名府時曾鶴齡稱其為政清而温惠而直廉而不激寛而不縱人以為實録云郡志閻禹錫景㤗中任開州訓導博學通五經敦尚行義克振師範郡志張鳳内黄知縣法律精明恩威並著儲穀至數萬斛歉饑有賴焉郡志楊動成化初知濬縣清介自持敝履布􅂁其心休休然也去之日民有致贐者皆泣而拒之郡志李瓚成化間知大名府築長垣東明間長隄二百餘里又於元城築衛河隄工費相等世享其利在任十有二年百姓㤀分若家人父子云郡志熊繡以御史左遷知清豊縣殫心民瘼均徭役省轉輸立重輕嵗給之法民便之郡志洪逺成化間知濬縣政體寛平凡事務存長者嵗饑講求荒政全活者多郡志李嘉祥𢎞治間知開州以勤敏著績學校公署多所建置而民不擾郡志韓福𢎞治間知大名府措置經盡大著威名以治行為天下第一郡志華珩𢎞治間知元城縣除刷吏弊聼訟明允發奸擿伏如神裁節冗費與民休息元民至今首稱郡志朱應昌元城知縣以廉介自持才猷綽裕獄無􅁈滯政聲藉甚志郡唐錦𢎞治間知東明縣才猷敏達發擿奸伏如神後擢兵科給事中去郡志梁渠𢎞治間元城縣學教諭制行純正雖暗室屋漏如對大賔教廸士子無異子弟束脩以上一無所受邑人感其徳化至今士子首頌之郡志馬卿大名知府時薊盗猖獗大名者盗數出没之區卿首檄屬邑繕城浚隍練習民卒賊聞之道出東境不敢犯圍東明十二日竟不能㧞而去賑饑發倉不俟報復其他善政尤多郡志高䕫正徳初知魏縣沉毅有大畧時流賊布滿畿䕫晝夜區度浚治隍塹凡兵械火器戰車之𩔖畢具賊犯境䕫攘臂登城倡勇敢以挫其勢賊竟不敢近郡志何塘正徳中忤瑾由脩撰摘開州同知時稱其一介不取之廉萬夫不當之勇郡志潘中矩正徳中知内黄縣恬淡樂易與民道疾苦藹然如家人一切儉約時河道脩築嵗費薪埽萬計為疏請竟得蠲豁百姓至今思之郡志陸崑正徳間知清豐縣以廉明著聲擢御史郡志陳滯由大名府教職以薦擢知濬縣值流賊倡亂募兵城守賊至相機設竒累戰皆㨗城以完論功擢為本府通判郡志孫孟和正徳中知滑縣時流賊倡亂城被圍孟和誓衆守禦城得不破擢監察御史百姓去而思之郡志張治道正徳間知長垣縣剛毅有為興利除害百姓至今思之郡志劉鸞正徳間知東明縣時流賊攻東門幾陷乃據城督戰百餘合項刺二鎗神色不變廵守愈厲乗風縱火燒賊賊圍始解活數萬民事聞有綵叚之賜郡志喬璽正徳辛未流賊攻圍東明璽從逰擊許㤗及千户姜大戰賊于東門奮身死敵賊乃敗去城賴之以全郡志潘塤以兵科都給事中謫開州同知興墜舉廢惠政之及民者多政聲炳烈郡志朱紈嘉靖初知開州下車汰冗費釐革弊政羣吏肅然操持廉潔與民纎芥無所取論者謂其與嘉祥前後並稱及去民追思之不已郡志王芳嘉靖初知魏縣政務節省革里甲無名之科祛徭役不平之弊比嵗大饑賑濟有法全活甚衆在任期年民懽然徳之志郡賈世祥嘉靖初知滑縣端方凝重剛介不阿造就諸生不廢寒暑且政事不拘拘故常酌地均糧民無偏累有古循吏之風焉郡志樂頀嘉靖間以光禄卿出知大名府頀本雅操又以列卿宿望来典郡事故吏民不嚴而化頀亦不以重臣倦民事辨决如流獄舍累旬月無請繋者尋改陜西叅政郡志葉溥嘉靖中知大名府性剛介自持務廉白寡言笑雖寮佐之間事之如大父也不敢干以私境内肅然郡庭中常空盡日可羅鳥雀隨至官唯兩童子琹書一挑而已去郡之日亦如之人呼為葉青天郡志王徳嘉靖中大名府推官讞决多哀矜之意吏畏而民不能欺甞辨出滑縣誣繋富民滑人立祠祀之擢兵科給事中以持正見忌外補尋罷去郡志曹邦輔知元城縣居官以正大寛平為務操持廉潔吏憚之如神省節里甲之費歳數千計時邊方多故悉以公帑羨餘給軍器之資毫髪無干於百姓歳値歉饑民賴賑以活遭外艱去士民追奠于其家者數百人郡志諸儞嘉靖間知大名府妻孥不入官舍清約如寒素置學田數頃以給貧士築隄障河其功至今賴之郡志張謙大名知府為政嚴明知大體以廉馭吏每季冬察舉州邑吏有貪墨者輒庭撻之終謙之治吏無敢受一錢者祛害興利積弊除剔殆空去後見思於民民立祠祀焉郡志李冕大明知縣為政以愛利為本視四境如棖臬之内田廬生業無不周知作地丁之法以均徭役百姓稱便他如興學禮教賑饑捕蝗政績甚偉邑父老願尸祝冕弗許士論高之郡志人物上古倉頡南樂吳村人生而神聖有四目觀鳥跡蟲文始制文字以代結繩之政乃軒轅黄帝之史官也漢汲黯濮陽人性倨少禮不容人過景帝時為太子洗馬以嚴見憚武帝時為謁者徃視東粤以便宜持節發倉粟賑貧民面折庭諍武帝憚之稱為古社稷臣不冠不敢見後出為睢陽太守馮楊魏郡人宣帝時為𢎞農太守有子八人皆為二千石趙魏間號曰萬石君蓋寛饒魏郡人性剛直初以明經為郡文學以孝廉為郎舉方正對䇿髙第遷諫議大夫奉公守法不避權要終司𨽻校尉京房東郡頓丘人師焦延壽學易甚精尤長於災變占騐以孝廉為郎元帝時日蝕隂霧房數上疏指陳時政得失石顯五鹿充宗嫉之出為魏郡太守卒為所中下獄死虞延陳留東昏人性敦朴力能扛鼎少為户牖亭長王莽末兵亂延扞衛鈔盗賴其全者甚衆光武時官至司徒曾孫放少為楊震門生及震被讒自殺放詣闕白震罪由是知名杜鄴内黄人為凉州刺史蒞政寛厚不尚威嚴元夀初加后父孔鄉侯爵臨封日食鄴上言極論陽尊隂卑禮明三從之義昔鄭伯隨姜氏之欲終有叔段之禍襄王廹惠后之難而遭居鄭之危不可不戒也時不能用劉昆東昏人深於易敎授子弟五百餘人王莽簒位昆匿河南負犢山中光武時歴江陵令𢎞農太守徵為光禄勲召問曰前在江陵反風滅火後守𢎞農虎北渡河行何徳政而致是邪昆曰偶然耳帝歎曰長者之言也索盧放濮陽人以尚書教授子弟千餘人光武徵為諫議大夫數獻忠讜尋以病去不復就徵馮勤楊曽孫光武時為郎中精勤盡忠賜爵關内侯遷尚書令母年八十詔給扶上殿帝謂諸王曰使馮勤貴寵者此母也楊綸東昏人少師丁鴻習古文尚書講授大澤中弟子千餘人州郡徵辟皆不就順帝特徵拜侍中㑹武威太守任嘉以罪下廷尉牽染百餘人綸乃上書論枉直有司奏其辭不遜免歸田里呉祐陳留長垣人父恢南海太守祐年十二隨至官恢欲殺青簡寫書以祐諫而止祐舉孝廉仕至齊相梁冀誣誅李膺馬融為具章草祐謂之曰卿何面目見天下人乎冀怒出祐為河間相自免歸家不復仕欒巴魏郡内黄人性質博覧經典累官議郎陳蕃竇武被誅靈帝怒其為黨謫永昌太守甞有噀酒之異至今傳焉成公簡濮陽人家世二千石與周馥齊名官至散騎常侍晋成公綏東郡白馬人性寡欲不營貲産有孝烏集廬舍綏作賦以美之又為天池賦累官中書侍郎束晳陽平元城人察孝廉舉茂才皆不就太康中旱為邑人請雨三日雨注官至尚書郎後罷歸教授年四十卒市里為之廢業門生故人為立碑晳學博通所著有五經通論發蒙記補亡詩文集數十篇桑虞黎陽人父冲有深識惠帝時河間王顒引為司馬冲知顒必敗就職一旬即求去虞仁孝年四十䘮父毁瘠過禮甞有人踰其宅後垣盗𤓰者虞以園多荆棘乃為開道盗聞之自詣請罪虞家五世同居閨門雍穆世皆重之南北朝李崇頓丘人性寛厚深沉有謀仕魏孝文為荆州刺史氐人作亂命崇都督隴右諸軍事討平之累遷至徐州大都督卒諡武康崇善御衆寇賊侵邉所向輒摧破號曰卧虎李平崇從弟涉獵羣書有文才仕魏為散騎侍郎自請效一郡拜長樂太守政務清静吏民懐之徴拜河南尹後遷司徒子諧風流文辯歴位中書侍郎諧因癭而舉顒因跛而緩步因塞而徐言人言其善用三短隋華秋汲郡臨河人家貧傭賃以養其母母終負土成墳容貌毁悴縣大獵有兔奔入秋廬中匿其膝下郡縣嘉其孝感以聞詔旌其門閭隋末亂羣盗常往来必相戒曰勿犯孝子郷賴秋全者甚衆唐張公謹魏州繁水人貞觀初為代州都督置屯田以省餽運又數言時政得失後遷襄州都督甚有惠政其卒也太宗不避辰日哭之傅仁均白馬人唐初言厯者惟仁均最精宻仕至太史令李義琰魏州昌樂人舉進士補太原尉時李勣為都督僚吏憚之義琰獨敢辯曲直累官至銀青光禄大夫致仕從弟義琛舉進士累官刑部侍郎後為黎州都督終岐州刺史谷那律魏州昌樂人貞觀中累官至𢎞文館學士博識羣書禇遂良稱為九經庫孫倚相仕為秘書省正字讐校羣書多所刋定倚相子崇義天寳末為幽州大將以雄敢聞崇義子從政涉儒書有風操王恭白馬人貞觀初召為太子博士講三禮别為義證甚精博馮嘉運魏州繁水人少為沙門後還治儒學常講授白鹿山受業者千餘人貞觀中召拜𢎞文館學士嘗摭指孔穎達五經正義之疵當世諸儒服其精博薛頥滑州人善天步律厯唐太宗為築臺觀九嵏山號曰紫府拜頥大中大夫徃居之每所上災祥與李淳風合姜師度魏州魏縣人擢明經調丹陵尉神龍初為河北道廵察使作溝于薊門以限契丹並海鑿渠以通餉路罷海運省功多累遷至司農卿王栖曜濮州濮陽人性謹厚善騎射累立戰功官至鄜坊節度使卒贈尚書左僕射子茂元河陽行營攻討使崔日知滑州靈昌人擢明經累官太常卿從弟日用舉進士累官户部尚書出為并州刺史兄弟皆以文學知名解琬魏州元城人舉中幽素科景龍中為御史大夫兼朔方行軍大總管前後乗邉積二十年務農習戰專為長久計逺近安之沈佺期相州内黄人舉進士累官起居郎兼脩文館直學士弟全交全寕皆有文學而不逮佺期郭震魏州貴鄉人少有文才為太學生家甞送資錢四十萬㑹有衰服者自言五世不𦵏願假以治䘮震舉與之無吝年十八舉進士為通泉尉景雲初拜同中書門下三品後封代國公盧懐愼滑州人在童丱時已不凢歴官清慎所居環堵蕭然開元中拜相元宗諭之曰朕用卿坐鎭雅俗耳馮伉魏州元城人為醴泉令著諭蒙書十四篇以教民後為散騎常侍領國子祭酒卒贈禮部尚書崔良佐滑州人擢明經補湖城薄以母䘮去官遂不復仕治詩書易春秋有文名子鵬舉進士博學宏詞賢良方正皆異等仕至武部郎中南霽雲魏州頓丘人張廵守睢陽霽雲從之廵遣乞師于賀蘭進明因食㧞所佩刀㫁一指血淋漓以示一座大驚知賀蘭終無出師意即馳去將出城抽矢射佛寺浮圖矢著其上磚半箭曰吾歸破賊必滅賀蘭此矢所以志也睢陽䧟與巡俱死于賊柏良器魏州人父友王奐見之曰爾額文似臨淮王面黒子似顏平原殆能立功乃薦之學光弼年二十四更戰陣六十二李希烮圍寕陵良器以救兵至擇善射者沿汴渠夜入及旦伏弩發賊乗城者皆死録功封平原郡王圖形凌煙閣韓𢎞滑州匡城人莊重寡言沉謀勇斷初試大理評事累官司徒中書令卒贈太尉諡曰隐張萬福魏州元城人三世明經止縣令州佐萬福乃學騎射累官和州刺史鎭咸陽時李正已反江淮漕船不敢踰渦口徳宗召拜濠州刺史漕遂通陽城等論裴延齡帝怒萬福大言曰朝廷有直臣天下太平矣吾年八十與見盛事天下重其名官至左金吾衛將軍圖形凌煙閣羅𢎞信魏州貴郷人狀貌雄偉善騎射仕為節度使累遷檢校太師卒贈北平王諡莊肅子紹威少有英氣吏事明辨嗣父節度累加檢校太尉呉保安魏州人仕為義安尉姚州都督李蒙表掌書記後䝉與蠻戰没判官郭仲朔被執欲得千縑贖之保安為經營十年得縑贖仲朔以歸其後保安以彭山丞客死其妻亦没䘮不克歸仲朔為負骨歸𦵏衰絰廬墓三年乃去及為嵐州長史迎保安子為娶而讓以官鄭遨滑州白馬人敏于文辭昭宗時舉進士見世亂乃隐于少室山其妻數以書勸還家遨輒投于火後晋高祖以諌議大夫召不起賜號逍遥先生五代劉贊魏州人始就學其父自肉食而以蔬食食贊曰爾欲之則勤學以干禄由是贊力學舉進士後唐明宗時為御史中丞刑部侍郎守官以法權豪不敢干以私王周魏州人仕晋歴涇州節度使尚寛恕去苛弊二十餘事歴四鎭皆有善政在定州時契丹呼周出降周曰受晋厚恩不能戰死而以城降何面目南行見人主與士大夫乎馮暉魏州人晋天福中拜義成軍節度使鎭靈武推以恩信部族懐惠止息侵奪然後廣屯田以省轉輸民不加賦管内大治撫綏邉人凢十餘年恩信大著宋崔彥進大名人純質有膽畧善騎射初仕周至都虞侯宋初累立戰功積官至彰信軍節度使鎭河陽卒贈侍中李繼􅈴大名元城人性質直仕周為安國軍節度宋初加檢校太尉累遷至同平章事以太子太師致仕弟繼偓亦有武勇官至龍衛右廂都指揮使曹翰大名人少為郡小吏多知數飲酒數斗不亂仕周至樞宻承㫖宋初從太祖征澤潞及平江南太宗時又從下太原征幽州皆有功累遷左千牛衛上將軍攻幽州時士卒掘土得蟹以獻翰曰蟹水物而陸居失所也且多足彼援將至不可進㧞之象况蟹者解也其班師乎已而果驗馬令琮大名人少善騎射嘗從其父全節屢戰有功由是知名周世宗時為虎㨗都指揮使宋太祖即位出刺懐州陞團練使累功遷昭義兵馬鈐轄司超大名元城人初仕漢周以戰功累遷舒州團練使宋初陞防禦使太祖討李重進以為前軍歩軍都指揮使後徙蘄州防禦使潘美魏州大名人少倜儻有大志仕周以功遷客省使宋太祖受禪陜帥袁彦㓙悍潘徃諭以天命彦遂入朝自後平澤潞揚州下江南廣東雲代皆有功累官忠武軍節度使同平章事封代國公卒諡武惠柳開大名人父承翰乾徳初為監察御史開㓜警悟豪勇開寳中舉進士歴官諸州皆有政績太宗以其文臣有武畧擢知寕邉軍徙全桂環邠代諸州著書自號東郊野夫又號補亡先生作二傳以見意又作家戒千餘言刻石以訓諸子開兄肩吾官至御史肩吾三子湜灝沆並進士及第陳興澶州衛南人事太宗屢從征伐為御龍弩直都虞侯眞宗時歴知覇州滄州徙鎭戎軍部署與曹瑋掩擊蕃寇斬獲甚衆詔書嘉奬興起行伍有武畧所至著聲績官至神龍四廂都指揮使宋白大名人年十三善屬文豪俊尚氣節建隆初擢進士甲科乾徳獻文百軸累官翰林學士承㫖眞宗時遷至吏部尚書卒諡文安白甞典貢舉得蘇易簡王禹偁田錫李宗諤胡旦時稱得人所著有文集百卷子獻臣國子博士得臣賜進士及第良臣太子中舍人忠臣殿中丞李符大名内黄人博通時務有吏幹初仕漢為縣主簿入宋累官至諌議大夫知開封府甞為京西轉運使奏便宜百餘條命著為令後出知春州師頏大名内黄人父均後唐進士官至永興節度判官頏曠達夷雅篤于問學與兄頡齊名建隆初舉進士累官至殿中侍御史知資眉二州所至以簡静為治後召為翰林學士所著有詩集十卷子仲囘端拱初進士田仁朗大名元城人宋武晋昭義軍節度仁朗性沉厚有謀畧頗涉書傳從討李仲進征太原皆有功累官知慶州太宗時知㤗定州所至皆有善政遷右神武軍大將軍陳琰澶州臨河人進士及第累官監察御史父䘮哀毁墳木連理歴京西河北轉運副史積遷至尚書郎中臧丙大名人弱冠好學性剛果有吏幹太平興國初進士為大理評事多所建明淳化間拜右諫議大夫知江寕府子列進士及第官至太常丞馮繼業暉子幼敏慧有度量仕宋為静難軍節度使改鎭定國軍吏民立碑頌其遺愛太平興國初封梁國公卒贈侍中趙延進澶州頓丘人父暉周太子太師延進初仕周為兵馬鈐轄宋太宗討幽薊以督造礟具功累遷右監門衛大將軍知鎭州及代吏民請留知鄧州蝗不入境終金吾衛大將軍延進涉獵經史好作詩士流多之子昻登進士官至直昭文館鄧中和開封長垣人舉三禮䘮親廬墓終其䘮定省徃來如事生者二十年負土累墳高三丈李防大名内黄人舉進士為莫州軍事推官累官至右諫議大夫知永興軍防精力過人好建明利害所至必有論奏朝廷頗施行之王延徳東明人曽祖芝濮陽令祖璋相州錄㕘父温石晋末契丹内冦率郷豪捍蔽里人徳之延徳素謹愼事太宗眞宗累官至東京舊城都廵檢使所至好撰集近事掌御厨有司膳録掌皇城有紀事録從郊祀則有南郊録及治郡則有奏報録潘惟吉美從子累官天雄軍駐泊都監雖連戚里能以禮法自飾敭歴中外人咸稱其勤敏柴禹錫大名人少時有客見之曰子質不凢若輔以經術必致將相由是留心學政事太宗累官至樞宻副使後授鎭寕軍節度歴知涇貝州卒贈太尉子宗亮尚太宗女孫宗慶累官武成軍節度使判鄭州王巖叟大名清平人年十八舉明經進士累官至樞宻直學士簽書院事後出知河陽平生進諫無隐或章至十數上必行其言而後已為文語省理該深得制誥之體所著有易詩春秋傳劉越大名人少孤貧有學行舉進士累官秘書丞㑹禁中火詔劾火所從起越與滕宗亮疏諫仁宗為罷詔獄又請章獻太后還政太后崩擢甞言還政者越已卒贈左司諫馮守信白馬人從太宗征討有功累官龍神衛四廂都指揮使出知定州後改滑州治河決有功遷威塞軍節度使張田澶州人第進士為應天府司録以歐陽修薦通判廣信軍歴知數州治有善迹知廣州日甞作欽賢堂繪古清刺史像日夕師拜官至直龍圖閣劉航魏人第進士歴知虞城犀浦縣為政寛猛不同而兩縣皆治知宿州押伴夏使使者執禮不遜抗折正之持節使夏凢例所遣却不受還為河北轉運使熈寕大旱求言航論新政不便者五不報請祠去起知涇相二州終太僕寺卿潘夙美從孫天聖中上書論時政授仁壽主簿後為河北轉運使知河中府章惇察訪荆湖討南北江蠻猺陳夙憂邉狀以知潭州再遷光禄卿知鄂州李載黎陽人少苦學隆暑讀書置足於水雖得疾不舍去登進士知大名冠氏縣守呂夷簡入相薦其材累官歴六州一以寛厚稱載性篤孝侍母病不解帶至病亟不能食載亦不食母知之為強食劉筠大名人頴悟善文舉進士累官翰林學士承㫖出知廬州筠三典貢舉始以䇿論升降天下士眞宗朝居文翰之選者筠與楊億齊名郭申錫魏人舉進士為侍御史知雜事屢詆權倖無所避种諤取綏州申錫曰邉患將自此始及夏主諒祚死請捐前故聼其子襲爵且言但得重將守邉不要功生事則善矣以給事中致仕劉安世航子登進士第不就選從司馬光學問盡心行已之要光教之以誠且令自不妄語始調洺州司法歴臺諫論事剛直一時敬懾目之曰殿上虎哲宗末坐黨安置英梅等州徽宗即位移内郡安世儀狀魁碩音吐如鐘忠孝正直家居未甞有惰容甞曰吾欲為元祐全人見司馬光于地下也李清臣魏人少孤事母盡孝七歳知讀書日數千言暫經目輒誦登皇祐進士歐陽修壯其文以比蘓軾歴官尚書右丞門下侍郎徽宗甞欲息朋黨清臣與執政者叶輔上意為曽布所陷出知大名府所著有淇水集郭永大名元城人剛明勇决博通古今得錢即買書家藏至萬卷仕為丹州司法㕘軍遷河東提點刑獄金人犯大名宗澤檄永為戰守具城陷永瞋目大罵為金人所殺一家皆遇害紹興初贈資政殿學士諡勇節金蘇椿大名人以元帥守許州時元兵南下至許節度使石倫遣提控高珪徃斥堠珪降元引大兵至城下使韓夀孫者持檄招降倫椿即斬之既而城陷椿被擒元將怒其不屈殺之倫亦投井死閻忠滑州人衛王時為開州刺史賽格叛忠單騎入城縳之出由是漸被擢用哀宗遷蔡圍城之役與義軍招撫毛全等同日戰死張特立東明人㤗和中進士歴官宣徳州司侯貴戚歛手遷濟陽令時軍旅起責令具糗糧約三月足後期如軍法民争輸于庭尋拜監察御史言宰執與細民争利近習忌之遂罷歸田里教授諸生元世祖降璽書賜號中庸先生所著有易集説歴年係事記元王珎南樂人慷慨有大志仕為行營軍前都彈壓㑹宋將彭義贇取大名珎棄妻子閒道走及元兵破大名珎謂其妻子曰吾非棄汝輩誠不以私愛奪吾報國之心耳後以軍功累授本路征行萬户子文幹累官東平總管王鶚東明人㓜聰悟日誦千言長于詞賦金正大初進士第一授應奉翰林文字金主遷蔡擢左右司郎中蔡陷將被殺萬户張柔救之輦歸保州世祖在藩邸遣使聘至進講孝經書易及治道每夜分乃罷及即位首授翰林學士承㫖後致仕歳給禄有大事遣使就問卒諡文康張立道其先陳留人後徙大名父善金進士立道事世祖授雲南廵行勸農使通水利立學校雲南之風丕變累官至雲南㕘政所著有效古集平蜀總論安南録雲南風土記六詔通説靳徳進大名人讀書通大義精星歴之學世祖時選為太史官屬所言休咎輒應時因天象以進諫多所禆益累官秘書丞掌司天事成宗即位歴陳世祖進賢納諫帝嘉納之授昭文館大學士知太史院預議中書政事卒贈大司徒諡文穆子㤗工部侍郎元善大名人父有五兄弟因貧流散江淮皆客死至大中善徃尋其骸骨并迎弟姪等一十五䘮而歸改𦵏祖父母以諸䘮序列𦵏于塋次州縣以聞旌其家李好文大名東明人至治初進士為翰林國史院編修官累遷翰林學士承㫖所著有端夲堂經訓要義大寳録大寳龜鑑王賢元城人登進士第歴官福建鹽運同知累遷浙江廉訪使清介端謹為世所稱以引年致仕壽百有十歳蓋苗大名元城人性孝友學術淳正延祐間進士授單州判官累遷至陜西行御史䑓中丞卒贈魏國公諡文獻苗平居恂恂謙謹及過事張目敢言雖經挫折無少囘撓有古遺直之風李茂大名人徙家揚州父興臨卒語曰吾死爾善事母茂泣受命奉母孟益謹母病目失明茂禱于泰安山三年復明母殁居䘮哀慟聞者傷之揚州再火延燒千餘家及茂廬皆返風而滅事聞旌之李從善元城人至正間為太常禮儀院判征西夏有功賜虎符俾世守大名卒贈太師追封魏國公郭嘉開州濮陽人祖昂父惠俱以戰功顯嘉有大志舉泰定進士累官禮部員外郎㑹遼陽騷動特授廣寕路總管既至賊勢日張孤城無援賊遣使脅之降嘉殺其使開門督戰力竭死之詔諡忠烈高昉元城人泰定中累官湖廣行省平章時兩江黄岑二族為患昉謂遐荒之人撫則治擾則亂請部使者詔諭果相率效順朝廷賜玉帶以酬其功卒諡文貞巴延濮陽人一名師聖以隐士徵為翰林待制辭歸復起為江西廉訪僉事以病免歸從學者至千餘人其學專事講解而務眞知實踐後遇亂不屈與妻子俱死贈奉議大夫諡文節潘廸元城人博學能文歴官國子司業集賢學士所著易春秋庸孟述解及格物類編六經發明諸書傳於世劉天孚大名人累官知許州有異政後遷知河中府適陜西行省丞相阿斯罕謀叛舉兵至河中天孚日夜修守戰具力竭城䧟投河死詔諡忠毅夲朝何顯周内黄人洪武初為四輔官賜坐講論治道命工圖其像賜待漏院記及誥命以旌之宋訥大名滑縣人父壽卿元陜西行臺侍御史訥博學强記登元至正進士授鹽山知縣夲朝洪武初為國子助教陞翰林院學士撰宣聖廟碑稱㫖改文淵閣大學士尋轉國子祭酒嚴立學䂓諸生畏敬終於官命官賻祭給驛歸其柩有司治𦵏事官其子復祖為司業崔克昇内黄人㓜以孝聞父遘疾醫弗能療克昇取父大小便嘗之以審輕重卒治得瘳父年九十九卒克昇跣足負土築墳廬墓三年有司上其事詔旌表其門傅鐸内黄人早有才識由太學生歴官勤能陞至户部左侍郎陳嘉魏縣人㓜有大志馳聲太學歴官練達終山西布政使李謙濬縣人由太學生歴職效勞志節卓越官至僉都御史張忠開縣人才識過人逰太學有聲歴官盡職終刑部侍郎王斌南樂人由國子生入仕有幹才官至廣東布政司㕘政紀著開州人博學明經初任夲州訓導後歴官有能聲官至右僉都御史蔣庭贊滑州人少有學術識達治體志存忠孝洪武中以才行薦用累官工部侍郎永樂中開設布政布政司遷左布政使撫治夷人安静地方聲譽大振宋明濬縣人官授户部主事督臨清倉儲裁恣横者以法宿弊一清歴員外郎進兩浙塩運使杜絶私謁不畏强禦浙人因呼之曰鐵宋仕終左叅政郡志劉禎清豐人由進士擢監察御史以直諫死時論高之祀郷賢祠郡志劉矩開州人永樂辛丑進士及第第二授翰林院編修陞修撰以疾致仕卒矩方平古樸有至行學問宏深為文温醇典則筆力道勁至今郷邦稱古君子以矩為首祀於郷賢郡志董俊南樂人由舉人擢監察御史出按淮南關陜應天等處激揚有聲進雲南按察司副使㑹尋旬夷叛俊勒兵討之兵不血刃而首惡就擒境内晏然後廣西臨安及鐵索青赤石厓昌明等處夷酋弗靖俊復籌畫底寕陞為按察使郡志王越濬縣人登景泰辛未進士初授御史超拜按察使尋特徴右副都御史廵撫大同時屢有拒敵之功三遷為左都御史歴官至太子太保兵部尚書賜爵威寕伯越姿表竒偉身經數十百戰尤善按得邉徼險易處每出竒兵黙計熟甚廼發傳令受約偏禆莫得測其際且其身先士伍㧞敵搴旗雖古名將亦何讓焉卒贈太傅諡襄敏郡志劉聚清豐人善騎射俊偉不羣永樂間屢扈從北征至正統甲子從立戰功積官至左都督進寕晋侯後以總兵榆林有功陞世襲卒諡威勇封寕晋侯郡志王崇之滑縣人天順間進士由知縣擢御史出按遼陽調劑振作切中幾宜以不屈枉直出為延安府推官崇之性友愛剛直弗撓與濬王越齊名郡志張如宗大名人歴官四川㕘議子倫天順丁丑進士官太原知府父子相與退休鋤蔬灌園以自給居常方嚴如對大賔教郷人力行孝弟人為感化説者比之漢石氏父子云𢎞治中入祀郷賢郡志甘澤開州人與其弟潤俱以純孝稱歴官御史廣西副使既而謫滁州天順初召還至張秋聞父訃乃徒跣三百餘里歸𦵏廬墓旦墓泣奠盡哀有兎及蛇馴繞墓旁潤事母亦篤孝俱被詔旌表郡志李岳長垣人登進士由禮部員外郎陞山西㕘議以禦冦功擢按察使累遷左右布政廵撫宣州都御史為人峭直不阿自持以正故始終三十年宦逰山西人不敢以所私干之所在立石頌功以忤瑾致仕今祀郷賢郡志侯英開州人與弟侃皆篤孝甞母病眼疾憂泣輟食每夜稽首祈祐疾竟愈歴官江西按察使聞母訃奔還偕弟廬于墓有白鷺數千遶墓事聞旌表英仕終河南都憲郡志董進第元城人由進士歴知慈谿太湖二縣俱有惠政湖人立祠祀之擢禮科給事中勘事山西奏撫臣等官之不法者俱罷黜進吏科都給事中以言論忤㫖歸不獲大用士論惜之郡志王鼐東明人性孝友補邑庠生居䘮執禮廬墓三年致平地湧泉之異事聞詔旌表焉𢎞治壬子領郷薦官監察御史浙江按察僉事郡志王綖開州人舉進士授户部郎中遷湖廣副使宦者谷大用迎世廟而南强綖長跪綖竟不屈轉河南擒鑛賊有功歴陞布政使廵撫都御史官至大理卿以㕘駁咈衆左遷山東㕘政卒宦逰三十餘年蕭然如寒素士論賢之没祀郷賢郡志劉宗仁大名縣人以進士知鄞縣先是市舶太監倚權貴為民病以宗仁禁不敢恣擢南監察御史甞論事被逮尋釋之陞揚州知府陜西副使鄜州兵備虜不敢近邉境以寕陞左㕘政卒郡志薛贇魏縣人𢎞治中進士歴知縣約已戢吏鋤强剔蠧遷淮安知府轉都轉運使時總督江彬太監丘得需索無􅌅贇力為阻抑商民咸賴之尋以病乞休避跡城市益秉節勵行窮達如一日郡志劉珂開州人少孤奉母性至孝登嘉靖癸未進士未授官即上疏乞終養後數年母以病卒哀毁過禮郷人稱孝焉已而授刑部主事歴郎中以亷平著聲擢陜西僉事盡心屯政甚著勞績陞副使俱有清愼之稱郡志晁瑮開州人嘉靖辛丑進士改庶吉士一時海内俊髦悉推讓焉尋遷檢討專制誥修㑹典絲綸宻勿多所裁定陞洗馬進國子監司業未幾以疾卒于官祀于郷賢祠郡志列女郭氏大名人王徳政妻少孤事母張孝及笄富貴家争求聘張不許時王徳政教授里中年四十餘貌甚古陋張欲納為婿使教其二子郭慨然願順母志既婚相敬如賔屬教二弟有成未幾徳政卒郭年方二十餘勵節自守元大徳間表其家馮淑安大名官家女元山隂尹山東李如忠繼室也如忠初娶䝉古氏生子任數歳卒如忠病篤謂馮曰吾已矣其奈汝何馮即㫁髪誓不他適如忠没兩月遺腹生一子名伏李氏及蒙古氏族至山隂盡取其貲及子任以去惟餘如忠及䝉古氏兩柩馮鬻衣權厝二柩携其子廬墓側時年二十二羸形苦節為女師以自給居二十年始䕶喪歸𦵏汶上齊魯之人聞之莫不歎息王氏内黄人趙美妻元至治初美溺水死王誓守志舅姑念其年少無子欲使更適人王曰婦義無再醮且舅姑在安可棄而去舅姑欲以族人繼婚王不從舅姑迫之王即自經死陳氏開州張慶妻慶有疾殆盡陳氏號泣籲天願以身代謂其夫曰汝死父母必再嫁我不如一死以從汝庶幾免辱是夕即自經明日慶亦死郡人咸哀歎焉郡志邵氏長垣郜仁妻仁卒遺二孤長甫三歳次在襁褓紡績自給有憐其貧而勸以他適者即哀泣力拒以刃自誓事姑羅郷人稱孝後次子永春少登進士第立朝謇諤風裁自持皆庭帷䂓範之力也隆慶二年旌表之郡志仙釋王梵志黎陽人王徳祖有林檎樹生癭大如斗癭爛徳祖撤其皮見一孩兒抱胎而出七歳能語問誰育我具以實告因名梵天後改曰志蓋菩薩示化也一行張公謹孫自㓜聰黠師事普寂禪師出家剃染于嵩山見高僧盧鴻文一覧成誦因窮大衍歴數得其精妙唐𤣥宗聞之召問曰卿何能對曰善記覧即以宫人籍示之覧畢如素所習讀𤣥宗呼為聖人漢洛下閎造大衍歴云歴八百歳當差一日有聖人出而定之一行當其期乃造大衍歴而正其差謬卒謚大慧禪師明一統志卷四
