秦將聞之却軍五十里適魏救至遂引去衍曰吾乃知仲連為天下士平原君以千金贈之連笑曰所貴乎士者為人排難􅄙紛也却而去之人物列國李同趙邯鄲人秦圍邯鄲急平原君患之同曰今君誠能令夫人以下編於士卒家之所有盡以饗士平原君從之得敢死士三千同遂與俱赴秦軍秦軍為之却三十里亦會楚魏救至秦兵遂罷同戰死封其父為侯漢李雲甘陵人舉孝廉桓帝朝為白馬令時中常侍單超等以誅梁冀功封侯用事雲上書指其奸邪害國遂下嶽杜衆陳蕃上疏救雲不聼竟死獄中天下寃之三國朱靈清河人從曹操征伐有功文帝禪位封鄃侯詔稱元功之將社稷之臣後更封髙唐侯卒謚曰威劉劭邯鄲人魏文帝時為尚書郎散騎侍郎受詔集五經羣書作皇覧尋拜騎都尉定律令嘗作趙都賦明帝美之詔作許都洛都賦時外興軍旅内營宫室二賦皆寓諷諌後執經講學賜爵闗内侯晋程衛曲周人劉毅聞其名辟為都官從事毅奏中䕶軍羊琇犯法當死武帝與琇有舊遣人喻毅衛正色以為不可馳入䕶軍營收琇屬吏考問奏琇所犯然後言於毅由是名振遠邇南北朝房叔安清河人宋明帝時青州刺史王𤣥邈辟為長史𤣥邈為明帝所疑欲北結魏以叔安諌而止齊髙帝即位懷其忠正時為益州司馬寧蜀太守就拜前將軍方用為梁州會病卒髙宗嘆曰叔安節義古人中求之耳馮道根廣平人事母以孝聞郡召為主簿不就聞梁文帝起兵率鄉人從之為驍騎將軍攻戰有功進爵為伯能檢御部曲所至不敢騷擾戰勝未嘗言功傅永清河人有志幹涉獵經史仕魏為王肅平南長史時齊將魯康祚趙公政侵豫州永擊殺之又裴叔業侵楚王戍永復敗之兩月之間遂再獻捷昭成帝嘆曰上馬能擊賊下馬作露布唯傅脩期耳脩期永字官至貝丘縣男子叔偉膂力過人彎弓三百斤左右馳射能立馬上與人角騁見者以為得永武傅豎眼清河人沈毅壯烈仕魏為參軍累官散騎常侍西征都督卒贈吏部尚書齊州刺史房亮清河人好學有節操魏舉秀才奉朝請後歴濟北平原太守以清嚴稱卒贈撫軍將軍齊州刺史程駿曲周人少孤貧居喪以孝稱仕魏為著作郎除髙密太守以有史才留之歴官清慎言事每愜人心門無挾貨之客詔賜帛以旌其儉駿悉散之親舊隋馬光武安郡人少好學從師數十年晝夜不息圗書畢覧尤明三禮髙祖徴為太學博士髙祖幸學光升坐講禮諸生論難光剖析疑滯咸共推服嘗教授瀛博間門徒千數唐程名振洺州平恩人仕為永寧令太宗征遼嘗召問方畧不合旨太宗詰之名振辨對益詳太宗稱為奇士拜平壤道行軍總管破沙卑城及獨山陣皆以少擊衆號為名將程務挺名振子少從父征討以勇力聞嗣聖初為單于道安撫大使士服其威愛突厥憚之不敢盜邊後以誣被害突厥聞之相慶為立祠每出師必禱焉王及善邯鄲人父從太宗征遼戰死及善授朝散大夫襲邢國公爵武后時廬陵王之還及善密贊其謀為人不甚文而清正自持臨事不可奪有大臣節累官文昌相同鳯閤鸞臺三品宋慶禮洺州永年人擢明經承詔與邵宏等築營州都督府故柳城三旬畢事授營州都督開屯田八十餘所追拔漁陽淄青沒户復舊田宅不數年居人蕃集倉廩充盈卒贈工部尚書謚曰敬馮仁海雞澤人事親居喪有至行為鄉人所稱郭守素雞澤人與馮仁海齊名同載唐書孝友傳崔圓貝州人志嚮卓邁喜學兵法開元中歴京兆㕘軍𤣥宗西幸次河池圓疏具陳蜀土腴榖羨儲供易辦即日拜中書侍郎同平章事肅宗時為淮南節度使在鎭六年請朝京師吏民乞留之五代崔居儉清河人祖蠡父嶤皆為唐名臣居儉善文詞舉進士仕梁為翰林學士歴唐晉官至户部尚書其家専以門望自髙嘗自著家禮行之張歸霸清河人仕梁累官右龍虎統軍左驍衛上將軍嘗與張眰戰中流矢反拔其矢以射賊一發而斃奪其馬而歸其驍勇如此弟歸厚善用弓槊能以少擊衆歴官鎭國軍節度使歸弁亦善戰為滑州長劔指揮使霍存洺州曲周人驍勇善騎射仕梁累官曹州刺史兼諸軍都指揮使王清曲周人仕晉為奉國都虞侯尋以戰功加檢校司徒卒贈太傅宋張美貝州清河人仕周為樞宻承旨授三司使太祖征李筠美有饋運功為定國軍節度太宗時以左驍衛上將軍致仕解暉洺州臨洺人父珪後唐時西征至劒門戰殁暉鷙猛木強初仕周為奉國軍節度使宋初屢從征伐身先士卒金創徧體時稱驍將以功遷馬步軍副都軍頭後以右千牛衛上將軍致仕元達洺州雞澤人身長八尺負膂力善射嘗醉見道旁槐樹拔劔斬之樹立斷初亡命山林後𨽻太宗帳下累遷北面行營都部署交士大夫能折節盡禮人以是稱之趙瑫貝州清河人由衛士累遷龍衛指揮使後以徐河戰功加鎭州團練使至兵馬部署卒贈歸義軍節度使孟元洺州人性謹愿少過頗喜讀書仕為眞定路鈐轄討貝州叛賊被數十創戰愈力累官大名路副都總管子在累官閭門祇候榮州刺史在之女為哲宗皇后丁德裕臨洺人父審琦彰義軍節度德裕仕周為供奉官宋初累官内客省使成都初平羣寇大起用為西川都巡檢使率兵討平之後征江南領常潤等州經畧巡檢使王明大名成安人仕周歴清平郾城二縣令宋初知榮州以廉正持身而徳惠及民太宗召拜諌議大夫累官禮部侍郎知真定府子挺扶並進士及第皆知名李炳洺州肥鄉人祖豊㤗陵令父滔洺州團練判官炳初從邢帥薛懷讓辟為觀察支使歴邠州鳯翔判官拜殿中侍御史知舒州太祖征金陵以供億甚勞加侍御史李沆炳之子太宗時進士為右補闕知制誥上嘗稱其風範端凝真宗時拜相日取水旱盜賊奏聞曰人主少年當使知四方艱難不然則留意於土木禱祠之事矣王旦初以為細事後果驗嘆曰李文靖真聖人也至於焚封妃之詔奪西夏之謀不用浮薄不市私恩可謂正大光明矣張詠曰吾榜得人最多謹重雅望無如李沆故論宋初得大臣之體者沆為首稱卒謚文靖李維沆之弟舉進士累官翰林學士承旨仁宗時為尚書左丞維博學以文章知名至老手不廢書嘗預修續通典册府元龜卒贈右僕射子師錫虞部員外郎公謹太子中含丁逢吉恩州清河人父顗後唐清泰初䧟於契丹後脱身南歸逢吉精於醫術事真宗於藩邸然好聚書與儒者游力教其子度度遂登服勤詞學科累官至㕘知政事李若水洺州曲周人以上舍登第為太學博士靖康初兵金人入邊選若水為使見尼瑪哈於雲中􅂊歸已南下及尼瑪哈攻汴以若水為吏部尚書金人邀帝出郊計中變逼帝易服若水抱持而哭詆金人為狗大罵不屈遂遇害謚忠愍孟忠厚元曽孫父彦弼追封咸寜郡王即元祐太后兄也宣和中官至將作少監建炎中奉太后幸杭州及洪州累遷鎭海軍節度使封信安郡王卒贈太保李椿洺州永年人父升進士起家為吏有廉名靖康中金人破汴以刃迫其父升前捍之與父俱死椿奉繼母避地南走仕為吏部侍郎知太平州以敷文閣待制致仕椿長於易凡措諸行事者皆易之用曾孫芾死節於潭州金董師中洺州人少敏贍好學强記皇統中舉進士調澤州軍事判官累官叅知政事尚書左丞嘗曰宰相不當事細務但一心正兩眼明足矣卒謚文定弟師儉亦登進士劉政洺州人性篤孝母老喪明政每以舌䑛之逾旬母能視物母疾刲股肉啖之者三母死負土起墳葬之日飛鳥哀鳴翔集丘木間廬墓三年防禦使以聞除太子掌飲丞李慶嗣洺州人少舉進士不第棄而學醫讀素問諸書洞曉其義天德間嵗大疫慶嗣􅂝藥與米分遺貧民全活甚衆年八十無疾而終所著有傷寒纂要及傷寒論針經等書元劉肅威州洺水人金興定初詞賦進士累官户部主事金亡依東平嚴實元中統初擢真定宣撫使後商議中書省事致仕肅性舒緩有執守嘗集諸家易説曰讀易備忘後追封邢國公謚文獻子憲禮部侍郎孫大名路總管劉恩洺水人徙威州父辛元初為貝州長恩幼知讀書勇而有謀以管軍總管入蜀與宋將戰守成都路副萬户後同僉行樞宻院事招降䕫府等州邑授副都元帥子德祿襲萬户竇黙肥鄉人初避地大名與姚樞許衡講明道學尋還鄉世祖在潛邸聞其賢召至首以三綱五常誠意正心為言及世祖即位召問欲求如唐魏徴者乃薦許衡史天澤時平章王文統用事黙力詆其學術不正後果敗由是國有大政輒以訪之黙為人樂易至論國家大計面折廷諍不少撓累官昭文館大學士卒謚文正子履集賢大學士石髙山洺水人以管軍總管鎭息州軍令嚴肅邊境晏然後從巴延南征至焦山與宋將孫虎臣等戰殺獲甚多累遷顯武將軍侍衛都指揮使秦起宗洺水人幼生長兵間學書無從得紙父順削柳為簡寫以授之成誦削去更書會立䝉古學學既成辟譯史累遷中臺御史劾中丞和尚不法後為撫州路總管以兵部尚書致仕子鈞銓鐸鏞皆仕於時王磐永年人幼篤志好學超然異衆舉金進士後仕元官至翰林學士兼修國史與許衡同議朝政禆益居多其文章著稱當時卒謚文忠何榮祖永年人初習吏事後折節讀書日記數千言累官御史中丞出為山東按察使奏免海運陷粮民以福星目之入為叅政尋遷右丞條具有官新格進平章政事至元大徳間朝廷晏然多其力也尤明性理文學所著有學易記觀物外篇等書自號總山卒謚文憲元明善大名清河人五經皆通尤䆳春秋早以文章自豪出入秦漢間仁宗在東宫時首擢太子文學歴陞翰林直學士詔節尚書經文譯之以進每奏一篇帝必稱善曰二帝三王之道非卿莫聞也官至湖廣行省參知政事復入為翰林學士眷遇之隆當時莫並卒諡文敏所著有文集劉賡肅之孫少有文名至元間用薦者授國史院編修累遷集賢大學士兼國子祭酒復為翰林學士承旨久典文翰當時大製作多出其手以耆年宿徳為朝廷所推重云呉鼎永年人為人特達博通經史歴官大司農都事纂古今農桑録累遷河北道提刑按察副使不事華細嚴警大吏百城凜然朝廷方大用以疾卒追封壽國公諡憲穆呉元珪鼎之子簡重深沉世祖竒其儀貌累遷禮部侍郎參議中書省事尋拜樞宻副特加平章政事時政多所論建卒追封趙國公諡忠簡李齊廣平人元統初進士第一知高郵府有政聲時張士誠據㤗州河南行省遣齊徃招降被拘久之縱歸已而有詔赦叛逆者士誠䧟高郵不受命紿曰請李知府來乃受命齊徃則囚之官軍進攻城士誠呼齊使跪齊叱曰吾膝如鐵豈為賊屈遂遇害時人悲之夲朝張璉曲周人為國子生明經有志歴官著能聲後遷至河南右布政使郝珩廣平人永樂三年領鄉舉擢吏科給事中以清慎稱後累官陜西左布政使金貴邯鄲人登宣徳庚戌進士歴官有能聲蔣勛肥郷縣人登成化辛丑進士第歴官内外以廉能著稱馬子聰廣平人成化丁未進士有廉能聲列女崔氏清河人適滎陽鄭誠生子善果宇文周末誠討尉遲迥力戰死之時崔年二十父母欲奪其志崔抱善果曰婦人豈可再適且幸有此兒在背夫為不義棄兒為不慈吾安忍為乃截髪割耳以明素志崔氏清河人趙元楷妻自幼有禮度遭隋末亂途遇盜欲以為妻崔曰我士大夫女為僕射子妻當即死終不為賊婦羣盜縳崔於床簀將凌之崔紿盜釋之因倚樹而立曰任加刀鋸盜怒亂殺之元楷後得殺崔者支解以祭其靈房愛親妻崔氏清河人性嚴明有髙節子景伯爲清河太守每有疑獄輒先請焉貝丘人母列子不孝吏欲案之景伯以告崔氏曰民未知禮故也乃召其母來處之於榻與共食景伯旦夕温清其子侍立堂下未及旬日悔過求還竟以孝聞趙氏宋貝州人父嘗舉學究王則反聞趙有殊色刼致之欲納為妻趙慢罵求死賊