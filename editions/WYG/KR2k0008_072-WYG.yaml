body:
  text: 明一統志卷七十二明李賢等撰嘉定州東至成都府内江縣界二百六十里西至雅州界二百里南至叙州府宜賔縣界二百二十里北至眉州青神縣界五十里自州治至南京六千七百七十里至京師九千八百四十五里糧四萬石零建置沿革禹貢梁州之域天文井鬼分野秦為蜀郡地漢為蜀犍為二郡地晉初因之後為夷獠所侵梁於此置青州西魏改眉州後周復為青州尋改嘉州及置平羗郡隋初郡廢州存大業初改眉山郡治龍游縣唐初復改嘉州又别置眉州而嘉州如故天寳初改犍為郡乾元初復為嘉州宋初因之慶元初陞嘉定府開禧初又置嘉慶軍元為嘉定路本朝洪武四年復改為府九年改為州以龍游縣併入直𨽻四川布政司編户一十里領縣六峩眉縣在州西八十里本漢犍為郡南安縣地後周置平羗縣後改峩眉縣隋改青衣縣又析置峩眉縣属眉州唐属嘉州宋併綏山羅目二縣入焉元仍舊本朝因之編户六里夾江縣在州西北八十里本漢南安縣地隋分龍游平羗二縣於夾江戍置夾江縣初属嘉州後属眉州唐復属嘉州宋因之元併洪雅縣入焉本朝初因之後復置洪雅縣編户九里洪雅縣在州西南一百里隋置唐宋仍舊元省入夾江本朝初因之尋復析為縣編户五里犍為縣在州南一百里本漢南安縣地後周置沉犀郡及武陽縣隋初廢郡改縣曰犍為𨽻戎州唐上元初属嘉州宋併玉津縣入焉徙治懲非鎮元仍舊本朝因之編户十里榮縣在州東二百里本漢南安縣地齊属南安郡隋置太牢縣属資州唐析太牢置旭川縣以縣置榮州天寳初改和義郡乾元初又為榮州宋初因之治榮徳縣後陞為紹熈府元復為榮州屬嘉定路本朝洪武初仍為州後改為縣編户七里威逺縣在州東二百里漢為蜀郡地隋置威逺戍後改為威逺縣属資州唐属榮州宋因之元初省入犍為後復置本朝初廢入榮縣未㡬復置編户四里郡名犍為漢名眉山隋名形勝西有熊耳南有峩眉華陽國志孤清秀絶鮮于之武谷神亭記山水為蜀冠冕劉伯熊幹辦公事題名記山水之勝蜀曰嘉州宋邵􅀶清音亭記背負三峩襟帶二江宋鮮于繪議道堂記東接江陽南接朱提北接蜀郡西接廣漢華陽國志水陸要衝州志風俗地靈人秀議道堂記人士俊乂華陽國志有禮義㢘耻之風任熈明教授題名記民良俗朴元志犍為王津之間地曠而人稀民良而俗朴民勤稼穡不好争訟州志山川高幖山在州西一名高望山巍然高峙萬象在前舊有層樓境内風月之勝一目可盡宋范成大詩若為喚得涪翁起題作西南第一樓三龜山在州治東其形似龜而首亦具因名當中一龜循其趾而上弯環有九洞九頂山在州治東隔江山有九峯曰鳳集棲鸞靈寳就日丹霞祝融擁翠望雲兊説宋蘇轍詩巉巉九頂峯可愛不可住烏尤山在九頂山左舊名烏牛突然於水中如犀牛状宋黄庭堅題涪翁亭始易今名揚雄山在州治西有洞深䆳漢楊子雲居之舊有西蜀子雲亭又犍為縣南十八里有子雲山下有揚雄灘海棠山在州治西山多海棠為郡守宴賞之地名賢多有題詠九龍山在州治東北臨大江之左右崖上舊刻九龍形古像山在州西門外有石鐫彌勒佛如凌雲像而小或謂初作此以為大像之式馬鞍山在州南五里烏尤山之左望之若馬鞍然梨花山在州西七里山舊植梨花数百株昔有人寒疾藥不能療取梨食之即愈金燈山在州南一十里一名至樂山昔清閑處士王朴居此山趾有淵每嵗人日太守於此修油卜故事謂以油灑水靣觀其紋驗一嵗豐歉錦江山在州北四十里江自成都流經此山下瞰如帶因名白崖山在州北八十里山有清風白雲朝露三洞昔徐庸先生嘗於此著書又峩眉縣亦有白崖山下有龍池龍門山在峩眉縣西一十里兩崖峭峙其形如削仰觀青天僅露一罅相傳孫思邈棲真之所有種玉溪真人巖藥竈藥臼朝真臺飬龍潭線水崖虎跳石荼􅐘洞瀑布崖中峩山在峩眉縣南二十里又名覆逢山劉向列僊傳周成王時葛由嘗騎木羊上此山有葛僊洞諺云得綏山一桃雖不得僊亦足以豪故亦名綏山元和志云有古穴初纔容一人行數里漸寛穴有蝙蝠大如箕小峩山在峩眉縣南三十里一名鏵刄山與中峩大峩山相連是為三峩宋趙抃詩蜀山天下竒三峩壓岷右誰謂孤劒外名出嵩華後大峩山在峩眉縣西一百里兩山相對如蛾眉故又名峩眉山周廻千里有石龕一百十二大小洞四十南北有臺重巖複澗莫測逺近唐陳子昻詩浩然坐何慕吾蜀有峩眉念與楚狂子悠悠白雲期李白詩峩眉山月半輪秋影入平羗江水流謂此平羗山在夾江縣西一十五里後周置郡縣以此山名道士常正一得道此山萬松山在夾江縣東北三十里山有三峯一峯居中兩峯左右如拱侍化山在夾江縣西三十里峯巒秀麗俯臨雅江寰宇記天下二十四化此其一也晉李阿真人煉丹於此修文山在夾江縣西六十里宋田錫讀書山中後登第因名山之南麓雅江所注名曰龍潭𨼆䝉山在夾江縣西六十里晉處士龎居正字𨼆蒙者𨼆於此洞溪山在夾江縣西六十二里一名月珠峯盖前一峯如珠後一峯如月阿吒山在夾江縣西一百里山崖有一巨石周廻鐫羅漢一百八軀東巖瀑布千仞響撼山谷犍為山在犍為縣南一十五里沈犀山在犍為縣南二十里昔有犀牛於此山下渡江而沈四望山在犍為縣東一百里金粟山在犍為縣北一百里山多桂樹花如金粟鳳鳴山在榮縣北山有此君軒故老相傳其竹實茂盛鳳鳴于上因名榮梨山在榮縣東一十五里山有龍池禱雨輙應榮𨼆山在榮縣北三十里相傳古有榮𨼆先生修道於此榮徳山在榮縣東北四十二里其高挿天一名老君山山有僊人脩道石室二十四所其半有唐刺史薛高磨崖碑葛仙山在威逺縣東昔葛僊嘗遊於此聖岡在州治前唐杜甫詩逺林通後徑一郡接前岡郭璞巗在烏尤山蘇軾詩巖有古郭生此地苦箋註區區辨䖝魚爾雅分細縷洗硯去殘墨遍水如墨霧至今江上魚頭有遺墨處伏羲洞女媧洞俱在峩眉山鬼谷洞在峩眉山相傳鬼谷子𨼆此得道上升著書號珞琭子雷洞在峩眉山有七十二穴雷神居之時出雲雨治易洞在九頂山宋郡守吳秘名上有磨崖大字云聖作易晦其數劉傳吳識易祖蘇軾詩自昔遥聞太守高明爻象彖日忘勞洞中陳迹今如掃斯道何曽損一毛方響洞在州學前洞中有水泠然如環珮聲舊名丁東水宋黄庭堅改今名詩云古人題作丁東水自古丁東直至今我為更名方響洞信知山水有清音陽江在州治西蜀南方之水交委於此一名洙水又名涐水岷江在州東俗名通江自岷江發源經平羗縣界流繞烏尤山下瀆江發源温江縣經雙流縣界東流至州東合岷江羅目江出峩眉山麓右溪自小天池以東左溪自黄茅平以北至羅目廢縣之上合二溪之委為江水石甚竒恠洪雅川在洪雅縣西七十里東西曲流一百三十里經洪雅大川流繞本縣因名硫黄川在威逺縣北四十里川傍一泉有硫黄氣因名大渡河源出巂州界流經舊羅目縣南東入龍游縣界水出麩金秦水在峩眉縣西南二十里秦恵王克蜀移秦人萬家以實之秦人思秦之涇水遂於此水側置戍謂之涇口唐天寳間改今名符文水出峩眉山有二水北則白水南則黒水夷惜水在峩眉縣東南五十里源發巂州界巾有嘉魚長三尺每年二月隨水而下八月逆水而上入穴天津水在峩眉縣西南出徼外入洙水青衣水在夾江縣西九十里發源自盧山徼外東南流經嚴道洪雅夾江至龍游與岷江合漢水在犍為縣東北一百八十里漢成帝時得古磬十六枚於水濵故亦名寶磬川花溪在夾江縣西六十里發源雅州瓦屋山下注嘉陽大江四望溪在犍為縣東北一百里發源三江鎮下與岷江合種玉溪在峩眉縣西十餘里一曰龍門水顯露亂石如玉状因名鶴洲在夾江縣近江濵張方開新河以殺水勢正由此洲虞允文子方簡卜居於此有花竹之勝魏了翁書扁題詠甚多八卦井在州東相傳晉郭璞所鑿東巖泉在州治東泉宜釀酒宋蘇軾詩一時付與東巖酒虎擘泉在鳳凰山唐契覺道人結庵於此有虎為之擘地出泉馬龍池在峩眉縣西六七里昔有一馬馳走如飛村民攫捕適傷其足投之池中一夕雷雨大作擘山而去龍池在峩眉縣西南四十里漢李膺記峩眉山下有池廣長十里號龍池向君堤在夾江縣治西南延袤數里蒙江齧岸縣令向君捍之鍤沙濘中得白金一篋資以就堤故亦名白金堤吕公堤自三江門二水之㑹連延不㫁岸被齧宋守吕由誠築此堤郡人徳之因名焉土産麩金麝香本州出茶峩眉山出味初苦而終甘邛竹堪為杖鹽犍為縣東山出荔支本州并犍為峩眉夾江三縣俱出宋吳中復詩莫愛荔支紅嵗作嘉州孽黒頭魚本州出形若鯶長者及尺惟郭璞臺前有之世傳璞著書臺上魚吞洗硯之墨故其魚首黒海棠花譜云海棠有色無香惟蜀中嘉州者有香其木合抱學校嘉定州學在州治西唐武徳初建於州治南本朝洪武二十七年徒建于此峩眉縣學在縣治西宋慶歴二年建夾江縣學在縣治東隋開皇間建二縣俱本朝洪武七年重建洪雅縣學在縣治南唐建元廢本朝復建犍為縣學在縣治南漢建本朝洪武四年重建榮縣學在縣治東唐武徳間建本朝洪武九年重建威逺縣學在縣治東隋開皇間建本朝洪武十四年重建宫室明月樓在州治譙樓右有明月湖故名枕江樓在州治東憲司後宋建左窺龍泓右瞰烏尤高明爽塏盡得江山之勝璧津樓在州治東南隅跨城為樓下瞰三江三峩九頂森列左右宋提刑陳謙建荔支樓在州治南宋建陸游詩山横瓦屋披雲出水自牂牁裂地來萬景樓在州治西宋郡守吕由誠建宋齊愈詩面瞻北闕三千里俯視嘉陽十萬家李燾詩試上層樓高處望十洲三島似蓬萊峩峯真境樓在峩眉縣南五里横溪樓在榮縣北雙溪之上大像閣在州東唐開元中僧海通於凟江洙水濛水三江之合悍流怒浪之濵鑿山為彌勒大佛像高踰三百六十尺建七層閣以覆之積十九年工始偹韋臯有記今像猶存尊賢堂在州治有唐李太白等八􅀞像歌鳳堂在州之三峩館繪楚狂接輿像於壁盡心堂在嘉州提刑司宋楊王休為憲使以一路渠堰源𣲖鍾泄及西南夷邊寨堡障道里斥堠繪之壁間講教堂在榮縣北五里宋郡人王庠王序讀書之所太白亭在錦江山之顛唐李太白嘗於此賦詩宋黄庭堅因以名亭競秀亭在州治西宋陸游詩是邦山水窟領㑹得佳處竹葉泝江船春薺隔烟樹涪翁亭在萬景樓前涪翁宋太史黄庭堅也黄然詩清音妙絶東坡老方響名高太史公水繞烏尤談笑外江連洪雅􅀞圖中清音亭在九頂山下瞰大江宋蘇軾書額邵􅀶作記來薫亭在榮縣舊土城内呼應臺在峩眉縣西南相傳唐天寶初孫思邈𨗳行雲至庭墀見𤣥宗求賜武都雄黄勑遣中使往賜至山中不知其棲隠處因置之岩上炷香宣詔俄見其形謂使者但留雄黄自取之石上有朱書謝表旋録旋滅嘯臺在榮縣治東號孫登嘯臺宋陸游詩孫登載酒雲生履仙穴尋梅雨墊巾此君軒在榮縣後山上有黄庭堅詩刻關梁二石關晏殊類要云龍游縣有此小銅梁寰宇記云在羅目縣西南五里孝女渡在犍為縣大江之濵昔有女子見父溺水隨父入水中三日抱父屍而出因名寺觀凌雲寺在州治東唐岑參詩寺出飛鳥外青峯載朱樓博壁躋半空喜得登上頭始知宇宙闊下看三江流天晴見峩眉如在波上遊光相寺在峩眉山絶頂方輿勝覧云自白水歴八十四盤山徑如線登躋六十里至寺即普賢示現之處西坡寺在峩眉縣治西本朝永樂中増修月珠寺在夾江縣西六十里寺有明月樓程逸少詩滄江也愛