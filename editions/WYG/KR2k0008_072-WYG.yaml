與駱文貴等以其地内附授為奉訓大夫内殿崇班使忠國愛民久而弗替鄭昌孫珍州人嘉熈間元兵犯蜀剽掠珍州之地昌孫集民兵禦之事聞授本州總制王震孫播州人端平初元兵犯蜀震孫率衆戍蜀口觧難息民事聞授従義郎重慶路兵馬鈐轄楊文价子寳祐間授武徳郎脩學勤治累官播州安撫使卒贈光禄大夫同知樞宻院事冉璡播州人與弟璞俱有文武才前後辟召皆不赴余玠安撫四川築招賢館以禮士冉氏兄弟聞之遂謁玠玠與分庭抗禮待之甚至久之無所言因使人窺其所為兄弟惟對據以堊畫地為山川城池狀又旬日始見玠曰某辱公禮遇思少禆益今若徙合州於釣魚山任得其人以守之賢於十萬師逺矣玠大以為然即聞於朝詔以璡為承事郎權發遣合州璞為承務郎權通判州事徙城之事一以任之遂築雲居大獲等十餘城屯兵聚粮為必守計後果賴之楊邦憲文子襲父職端平間蠻人掠境領兵拒之擒其酋長進武節大夫宋亡元世祖詔諭之始内附授播州沿邊安撫使卒贈平章政事追封播國公謚惠敏元楊漢英邦憲子㓜孤其母田氏攜至上京見世祖遂命襲父軄後再入覲時年十二世祖嘉其應對明敏復因宰臣奏安邊事益嘉之授宣撫使大徳中討平宋隆濟折節之叛加勲上䕶軍後征黄平蠻卒于軍贈平章政事柱國追封播國公謚忠宣楊嘉貞漢英子至正初授播州等處管軍萬户侍衛親軍都指揮使上䕶軍討平楊留總之叛進湖廣行中書省左丞本朝楊鑑嘉貞從子洪武初率其屬張坤趙簡來朝授宣慰使賜勑奬諭俾其永堅臣節後屢隨大軍討平叛冦卒贈懐逺將軍子昇襲軄涖政勤敏邊境綏寧永樂初請開學校薦士典教州民益崇習詩書禮義列女田氏楊頀妻永樂間頀囘自北京卒於途田氏聞之哭泣不食暨柩至自經死事聞旌其門曰貞烈永寧宣撫司東至播州界二百五十里西至瀘州江安縣界一百五十里南至鎮雄府界四百里北至瀘州合江縣界一百六十里自司治至南京五千六百一十里至京師八千七百八十里建置沿革禹貢梁州之南境天文井鬼分野秦為蜀郡地漢為益州地晉宋及周隋俱為夷地唐置藺州宋為瀘州江安合江二縣之境元置永寧路領筠連州及騰川縣後改為永寧宣撫司本朝洪武初改永寧長官司八年陞宣撫司領長官司一九姓長官司在司城西南一百二十里舊為蠻夷之地元立夷民羅氏党九人為總把至元初改為九姓羅氏党蠻夷長官千户本朝洪武四年改為九姓長官司郡名永寧宋名形勝環城皆山疊翠如屏圖經馬口崖鎮其北漁漕溪横其南郡志上通雲南北連川廣同上南接蠻夷上通雲南北連川廣水陸交通分界於此風俗習俗鄙陋性格野朴郡志不事商賈惟務農桑圖經山川土保山在司城内昔有夷人土保居此因名西珠山在司城内西南山形圓瑩如珠故名海漫山在司城北延袤八十餘里如海水之汗漫青龍山在司城南二里形如青龍俗因呼之紅崖山在司城東北一十里山多赤石木案山在司城東南五十里上有林木下平如案烏降山在司城西北五十五里疋絹山在司城西北六十里山頂瀑布飛流宛如疋絹因以名山雪山在赤水衛北二十里高峻巉巖幽陰莫測方冬積雪春盡始消水東河源出落郎連山澗流經司城南一十里下流㑹江門峽赤水河源出芒部界水腦洞流經司城東南一百四十里下經赤水衛通江溪源出貴州界流經九姓長官司南十五里名落卜姑溪下流㑹江門峽靈湫泉在司城西五十里有山洞深二丈許泉水四時不竭禱雨即應天生池在司城西北六十里四面山繞水積于中不假穿鑿故名金鵝池在長官司西南五十里昔有天鵝羽如黄金遊池内至暮飛去因名土産茶梅柑葛思木苦竹馬猿公署永寧衛在司治西南洪武四年建赤水衛在司城東南一百四十里普市守禦千户所在長官司東一百四十里俱洪武二十二年建以上二衛一所俱隸貴州都司摩泥千户所在赤水衛城北四十五里洪武二十二年建阿落宻千户所在赤水衛南四十里洪武二十七年建前千户所在赤水衛城南一百里洪武二十七年建白撒千户所在赤水衛城東七十里洪武二十二年建以上四所俱隸赤水衛學校永寧宣撫司學在司治西南元至元間建九姓長官司學在司治西南洪武四年建赤水衛學在衛治西北正統五年建關梁魚浮關在司城東三里洪武四年建雪山關在司城東南一百二十里赤水河關在司城東一百五十里以上二關隸赤水衛俱有戍守上橋在司城内東南隅下橋在司城内西北隅通濟橋在司城東南二里永福橋在長官司北一十五里寺觀萬夀寺在司城西門外永樂九年建永福寺在長官司北三里洪武三十一年建梓潼觀在司城西門外洪武十八年建三清觀在長官司東南二里洪武二十八年建祠廟關王廟在司城内之北五龍廟在司城西門外小山上二廟俱洪武中建陵墓仙婆墓在烏降山下銅鼓溪岸相傳昔有阿婆滿道者脩道有功能知吉凶事卒葬於此古蹟舊永寧路在司西北八十里漁漕溪岸元路治此舊藺州在司東一百八十里唐元和初置有碑在唐朝埧今剥落米利城在司北八十里有大田常無水旱憂米穀成熟故名明一統志卷七十二
