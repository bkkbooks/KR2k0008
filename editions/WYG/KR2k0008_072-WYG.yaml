間通判卭州王安石送以詩文翁出治蜀蜀士始文章犖犖漢守孫千載起相望張及知臨卭縣太守欲引水乏舟遣吏於縣决堰水時農事方興及曰涸民田以事嬉遊可乎令可去水不可𨗳守斂容謝之王伯憲紹興間為蒲江令民安訟簡有無訟堂民為立碑韓曉乾道初為蜀緫領减卭州錢引三十七萬餘民咸徳之畫其像刻石於白鶴山頌而祀之趙雍淳熈間知卭州以儒術飾吏事待士甚厚恤民甚勤下車期年政化大行郡人為畫像而祀之李舜臣卭州安仁主簿嵗大侵飢民千百持鉏棘大呼響震邑市令懼閉門舜臣曰此非盜也何懼為出慰勞遣之姚希得知蒲江縣巨室挾勢邑號難治希得綏强扶弱聲聞著稱本朝門仲昌洪武間卭縣知縣練達政體善於撫字㑹天龍寳謀叛其黨鐵甲吳冦掠鄉村仲昌率民立柵以禦之冦計窮夜遁民頼以全葉國祥嘉靖間判卭州歴任五載兩署名山縣征蠻督餉及委採木事集而民不擾當道亟嘉予之以疾致仕歸卭民畫像以祀流寓司馬相如成都人事漢景帝為武騎常侍因病免歸家貧素與臨卭令王吉善往舍都亭富人卓王孫為具召之一座盡傾酒酣令前奏琴相如鼓之王孫女文君好音遂奔相如武帝時相如以辭賦得幸為中郎將建節使蜀太守以下郊迎縣令負弩矢先驅於是王孫自以女尚為晚乃厚分其財劉瓌曹州人仕宋通判卭州因家焉其先八世同居至是和睦之風不替平生薦士幾二百人多知名士人物漢胡安臨卭人聚徒教于白鶴山司馬相如嘗從之受經林閭臨卭人善學博古自古天子有輶車之使由漢以來儒者但聞其官不詳其職惟閭與嚴君平知之曰此使考八方之風雅通九州之異同使天子居高堂而知天下也揚雄聞而師之嚴遵臨卭人即嚴君平善易卜筮於成都市日閲數人每依卦辭教人以忠孝日得百錢足自養則閉肆下簾讀老子揚雄少從之學曰其風聲足以激貪勵俗亦近古之逸民也益州牧李强召為從事不就卒年九十餘陳立蜀郡臨卭人成都時為牂牁太守討平冦亂又徙守巴郡及天水治績為天下最天子賜以黄金四十斤後入為左䕶軍唐梁震卭州依政人唐末進士遊中原取道荆南為高季興所留季興甚重之震耻為季興所汚但稱有唐進士而不稱其官爵宋計用章卭州安仁人天禧中進士通判延安時范雍為帥用章勸其修城練卒以備不測雍不聽及元昊圍城召用章問䇿用章以一死報國對㑹其夜大雪賊遂退後知龔州終都官員外郎李絢依政人累官起居舍人龍圖閣直學士仁宗春秋高未有繼嗣因侍祀高禖還奏賦大指言逺嬖寵近柔良則子孫蕃衍仁宗嘉納之趙卨依政人第進士為汾州司法參軍郭逵宣撫陜西辟掌文字多所建明夏人入冦俘馘有功累官龍圖閣學士帥延安元祐中進端明殿學士常安民卭州人年十四入太學有俊名熙寧中進士為應天軍廵判官知長洲縣政如古循吏累遷監察御史論章惇蔡京之奸峻直不囘後京用事入安民黨籍流落二十年而卒後贈右諌議大夫李稷絢子以䕃歴官累遷陜西轉運使制置解鹽种諤起興靈夏議稷督餉築永樂城既成輦致金帛於其中夏人來圍城稷守之不敢去以及於難常同安民子政和中進士除太常博士紹興初知栁州召還首論朋黨之禍除殿中侍御史金使入見同言先振國威則和戰常在我若一意議和則和戰常在彼累遷御史中丞後以顯謨閣學士知湖州請祠卒子孫家於嘉興吳時卭州人舉進士甲科知鄭縣徽宗時為辟雍司業出提舉河東常平童貫經畧北方時因進對言必速亂王黼怒斥為腐儒尋以徽猷閣待制奉祠時敏於為文未嘗屬藁人目之曰立地書厨費孝先安仁人至和初嘗游青城董正圖學舍壊其竹床欲償其直正圖曰成敗有數何償焉孝先視其側書云某年月日為費孝先所壊大驚即師事之正圖授以易孝先遂以術名聞天下李繒卭州人舉八行不赴以文史自娛所著有補註唐書三百卷杜國寳卭州大邑人在乳時其父遊東吳不歸音問杳然後四十年國寳南至荆渚以父名出處手掲以行間關萬里至韶州見父時父為州都廵因迎還鄉人嘉其孝李僑臨卭人紹熙進士時光宗不豫久闕朝重華宫僑初釋褐即慨然上䟽乞致仕有曰禄不逮養乞將所得官資囘贈二親冀以感動上意朝論偉之魏了翁卭州蒲江人本髙姓出繼魏氏因姓魏慶元進士累官吏部尚書端明殿學士同僉書樞宻院事先是論事忤史彌逺謫官嘗言自結髪遊聖人之門窮探邃逺今髪星星矣大懼年數之不足其於他道盖未遑及也卒諡文靖累贈秦國公魏文翁了翁弟舉進士為眉山尉後知叙州嘗讀禮將為善思貽父母令名必果日諷味不能釋自號果齋高稼了翁同産兄博極羣書為四川制置司參議官元兵入漢沔稼力戰却之後知沔州曰大丈夫不於汗青垂名則碌碌人耳後元兵䧟沔城稼死焉贈龍圖閣直學士諡曰忠高定子稼之弟博通六經嘉泰初進士累官端明殿學士僉書樞宻院事兼參知政事嘗以忤史嵩之謫官卒贈少保定子歴州縣所至以教化為先務所著有存著齋文集北門類藁高斯得稼之子少從李坤臣學坤臣􅎩斯得左右扶持之紹定初進士授利路推官稼死事於沔斯得潜至其地奉遺體以歸服除無意仕進李心傳領史事辟為史館檢閲後累遷翰林學士僉書樞宻院事兼參知政事所著有詩膚説及耻堂等集郭正孫卭州人舉進士累官太府寺丞帥興元時金人内侵屹守孤城三戰三却左右勸之避正孫不從遂死於敵鄧得遇卭州人淳祐進士累官知昭州遷廣西提點刑獄兼知静江府時兵起長沙破静江得遇取幅紙書云宋室忠臣鄧氏孝子不忍偷生寧甘溺死彭咸故居乃吾潭府屈公子平乃吾伴侣優哉優哉吾得其所遂投南流江而死列女程小姑大邑人姚三五之妻一日姚如外小姑煢然