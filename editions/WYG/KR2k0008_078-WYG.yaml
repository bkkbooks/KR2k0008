為漳州路總管寛以恤民嚴以馭吏親學校為己任事簡民安翕然向化金璵後至元初為漳州路總管淳厚亷謹吏不敢欺百廢具舉唐大年以行省知事攝龍溪尹事寛以恵下毅以任重吏不敢欺以私民不違其令鄧朝陽龍溪縣尹以興利除弊為務又擇學行之士使為鄉師以教民革其獷悍之習甚得民心扈海至正中南靖縣尹撫字勤勞興學校均賦役政清訟簡時畬寇扇亂海屹不為動既而賊夜入海罵曰尹承上命以父母汝者汝欲殺父母耶賊皆駭散其後盗息民安民立去思碑徳哷黙色元末為漳州路達嚕噶齊居三年民甚安之本朝兵取福建福州興化泉州皆納欵德哷黙色仰天嘆曰吾荷㤙厚有死而已及聞招諭使至乃從容具公服北面再拜遂引斧斫其印文又大書手版曰大元臣子端坐取佩刀自刺死本朝王禕洪武初為漳州府通判有文學政事嘗作風俗十詠趙榮祖龍巖知縣首以安民為務百廢具舉弊無不革利無不興潘琳洪武中漳州知府歴數十載治政卓然為當時列郡守之首稱王仲謙漳州知府為政有方而㢘謹自持又奬勵學者清簡詞訟而屬邑之民多䝉其恵錢古訓漳州知府以文章飾吏事表著忠孝激勵風俗當時甚有聲稱楊通南靖知縣均平賦役興起學校毁淫祠為公廨既去民有餘思焉劉深洪武末為南靖縣典史練達有為堅扵持守撫字有方民感其澤教諭植士謙上其績陞知宜興縣劉孟雍洪武末龍溪知縣革諸弊政民懐吏畏秩滿陛知祈州龍溪民奏乞還任朝廷從之陳思賢洪武末漳州府學教授以恩信禮義帥諸生隨材教育多所成就郡志趙鎔永樂間知長泰縣剛毅有為事無停滯法令嚴眀吏民畏服逃逋之家悉復其業至今士民懐之郡志劉奎宣徳初長泰知縣為民興利除害凡境内陂塘溝洫衝决壅塞者皆募工䟽濬又嘗計均粮役地方頼之秩滿百姓懇留得復任郡志甘瑛正統初知漳州府時征永横溢例扵有司暴取無厭瑛奏革之海門山居民往往涉海為盗乃盡遷扵内地興學校闢府治修栁營江橋皆有足稱者今祀名宦祠郡志陳士名南靖知縣時寇亂之後士名多方撫輯不三年官有廨民有家學舎有絃誦而縣治始復厥初秩滿民攀留不遂為立碑大書曰陳公愛民父母郡志顧斌漳州衞指揮僉事正統末沙尤寇亂其黨數萬圍漳城斌募敢死士親督與戰大敗之斬首及溺死者甚衆餘悉奔潰城頼以完事聞陞福建都指揮僉事及卒殆無以為殮郡志謝騫景泰初以監察御史出知漳州府鋤奸惡植良善政尚嚴眀令出不二一時盗息民安郡志林瑛景泰中知漳浦縣時當兵燹之後民無由活梗自恣瑛至問民疾苦而休息之有犯者輙按之不少貸邑用以治後卒于官嬴餘不足扵道里之費郡志李昊天順初知龍巖縣居官以愛民為本男女有過期者助其婚嫁逋稅不能完者助其輸納生徒之賢者加禮優遇而造就之以績考最詔旌異之既復任卒于官民號泣如䘮考妣郡志劉璧成化初漳浦知縣䟽通眀敏剖决如流旁邑持不平者來質各得其理百廢具舉政通人和陞去民為立石以識遺愛郡志韋濟成化初任龍巖知縣宅心正大才識通敏措置經營悉合程度汀寇發鄰境皆受其害龍巖頼濟以全既去人乆而益思之郡志劉鐸長泰知縣㢘眀練達政寛而簡陂塘壇廟廨舎無不修葺事集民安百姓懐之郡志張璝成化中知漳州府時山水大發璝具船筏極力救援且發倉賑恤復為奏減田租留心學校教之務底于成解郡郡人為立去思碑今祀名宦郡志張本成化間知南靖縣公勤㢘恕愛民如子不立刑具嘗被上杭溪劇寇乃圍集民兵招募敢死者以扼險要賊竟不得肆其虐後丁内艱去民攀留不得相與立碑乆而愈思郡志姜諒成化間知漳州府有心計長扵吏治嘗殱海上盗魁海宇清霽築長堤以捍傍海瀉鹵諸田凡一百八十六所盗息民安且作興學校表章先賢立書㑹令諸生自相講習親課臨之以觀其得失諸所設施悉宜扵俗今有遺愛祠復崇祀于名宦郡志吳黼成化間同知漳州府㢘而有為愛民禮士今祀名宦祠郡志汪鳳𢎞治初知漳州府時境内盗起鳳承命不過家而來任先揭牓諭賊禍福乃引兵蹙之賊果就擒在任恪供祀事眀慎用刑尤好程督諸生毎躬親啓廸終始無倦他如修文廟葺雙節祠作捍海石堤鑿井道旁防坑水之毒政績著異郡志陳熈𢎞治初知龍巖縣文章政事大有足稱陞監察御史去郡志陳栗知漳平縣時縣初設庶務叢雜民獷難治栗眀敏亷慎撫民如子民樂為之用剏縣治建學校列街坊編徭役秩然就緒在任五年人漸化服以内艱去至今思之郡志胥文相正徳初知漳浦縣時苦蝗患文相引慝修偹蝗悉赴海死嵗乃熟旁邑莫能救也士民咸歌頌之邑故有銀礦取不充額重為民病為奏罷之擢去士民立石道左思之不置郡志陳洪謨正徳初知漳州府招海寇平山賊立名宦鄉賢及文公諸祠建社學興水利掩野骼凡可以利民正俗者毅然為之毁譽不顧民為立生祠祀之志郡黄芳正徳間同知漳州府慎重寡言邃扵理學在漳三年諭民興行勸課諸生足為士民表郡志鍾湘正徳間漳州知府時南靖賊黨未下湘躬詣賊壘招撫之賊帖然聽命兵遂罷奏立平和縣迄今永頼嵗旱賑救全活者多在任數年行所無事不輕役一夫後以疾卒于官囊槖蕭然既祀名宦復特祠祀之郡志曽鵬正徳間知龍溪縣適强寇勦平之後鵬履任心平而政簡事事悉以雅靜鎮之民頼以安立石為頌郡志朱絃正徳末知長泰縣清介自勵公正不阿剔弊舉廢興利除害均徭役重師道縣治創築以城民不知勞而保障永固古之遺愛也郡志謝思木正徳末知龍巖縣嚴毅㢘眀政清訟理奸宄懾服事有不便扵民者即白當道務祛之不瑣瑣限常格凡公署壇壝橋梁之屬無不整飭而不以病民卒于官邑人勒碑紀其績郡志黄直嘉靖初任漳州府推官嫉惡好善誠心為民歴署漳浦長泰縣事恤民興學百廢具舉諸所設施無不宜于民者郡志周仲任漳浦縣知縣吏民畏服剖决如流振滯興廢境内飭然今祀邑名宦郡志王禄嘉靖初知平和縣時縣尚草創禄冰檗自持損上益下治邑如家視民如子開社學置田租飭壇廟設義塜庶事畢舉措置有法而民不告勞比去民為立去思碑郡志郭大鯤嘉靖中知南靖縣警敏有恵政事多簡理殆無虚日竟以勞悴而卒邑人哀之祀于名宦且遺愛有亭郡志流寓楊合問蜀人父仕休殿中丞合問宋淳熈中進士為職方貟外郎真宗時契丹入寇以為防禦使天聖中居于漳遂移𦵏父中丞扵長泰縣陳塘洋浮山孫友諒應博皆登進士唐介江陵人父拱任官漳州介隨侍焉父卒于官州人知其貧合錢以賻介年尚幼謝不取後累官至恭知政事龔原邵武人寓居龍巖宋熈寜中進士累官知連州元豐間方以財用為急所司務峻刻原優㳺不廹民便之子時可孫嶒曽孫惟叙皆登第官于時趙鼎解州人宋髙宗時為相罷知紹興府秦檜惡其廹已徙知泉州鼎自泉州歸復上書言時政檜懼其復用諷中丞王次翁論之謫興化軍移居漳州人物唐周匡物漳州龍溪人初州人未有業儒者匡物兄匡著擢貞元進士而匡物復擢進士官至髙州刺史唐世郡人登科者始于匡物兄弟宋劉棠龍溪人元祐中進士歴樞宻院編修官出為利州路提舉學事後提舉两浙常平以朝請即致仕同邑有陳補者與棠俱有詞賦聲時稱之曰劉棠陳補漳巖賦虎棠既登第補遂隠居不仕顔師魯龍溪人紹興中進士累官監察御史遇事進言無所阿撓擢國子祭酒規約率以身先遷吏部尚書兼侍講後以龍圖閣直學士两知泉州泉人徳之塑像以祀卒諡定肅孫頥仲亦官至吏部尚書髙登漳浦人少孤力學事母至孝為太學生靖康初金人犯京師與陳東等上書乞斬六賊廷臣建和議奪种師道李綱兵柄登五上書不報紹興初廷對盡言授富川主簿又上䟽萬言秦檜惡其譏已不以聞授古縣令後編管容州所著有家論忠辨等篇及東溪集學者稱為東溪先生吳獬龍溪人两領鄉薦又領漕薦退為學者師稱為省齋先生獬與陳知柔相友善知柔稱其貎古心古學古文古使其閉户著書當不在子雲下所著有省齋集王遇龍溪人師事朱熹為髙第弟子登進士甲科歴國子博士知常州終户部郎中所著有論孟講義两漢博議學者稱為東淵先生陳淳龍溪人朱熹守漳時淳從㳺郡齋熹曰南來吾道得一安卿安卿淳字也淳無書不讀無物不格義理貫通洞見條緒學者稱為北溪先生後授安溪主簿所著有論語大學中庸口義字義詳講禮詩女學等書元胡景清龍溪人元兵下漳南景清時五嵗隨父母迯難倉卒失其母景清長知學每念母涕淚澘然下一日辭其父抵幽薊尋焉忽扵燕市遇其從叔胡巨川知母已至燕而未知其處踰年始得之盖母子不相見者四十餘年矣事聞詔旌表之仍給驛以歸陳君用南勝人至元中鄉民李志甫聚衆冦掠邑里攻圍郡城守將吹斯絅與戰失利君用率鄉之有勇者襲殺之賊黨遂散民頼以保全以功授同知漳州路總管府耆舊至今思之蕭景懋龍溪人至元中南勝民祐李志甫作亂景懋與兄集鄉丁拒戰兵敗被執賊脅使從已景懋罵曰狗盗我生為元民死為元鬼豈從汝山賊耶賊怒縳景懋扵樹臠使自啖景懋罵不絶而死事聞褒表之給錢以𦵏王吉才龍溪人篤志古道尤眀典禮元時郡守知其有身心之學延為弟子師後為泉州學正吉才天性孝敬親終皆及期耄已且老哀慕痛毁有如早䘮雖在家庭亦冠衣歛容人未見其􅃍言怒色自號益齋學者稱益齋先生本朝林弼龍溪人元至正中進士有文詞著聲閩浙間仕為郡募官入本朝與修元史授考功主事使安南贐以金珠弗受其王强致之既還悉獻于朝廷嘉之賜以白金尋命知豐城有善政後為考功郎中出為登州知府所著有文集劉宗道龍溪人洪武中以共論治道授都察院左都御史林瑜龍巖人洪武中由太學生授五軍斷事中司稽禮遷江西按察司僉事永樂中陞副使居官平恕而民徳之後陞浙江左恭政卒于官王昇龍溪人永樂甲申進士初知羅田縣有恵政改大理評事陞寺正審獄平允後知撫州府愛民而勤于政秩滿進從三品致仕卒汪凱龍溪人􅀶學能文章永樂癸卯鄉舉第一登進士授禮部主事陞浙江按察司僉事以清介聞後致仕卒王源龍溪人永樂初進士為庶吉士歴官兵部職方郎中廣東潮州知府所至有聲平生嗜學能文既致仕年及八十猶手不釋卷所著有韋菴集并家禮易覽王用相龍巖人永樂辛丑進士歴官户部貟外郎正統間歸省遇沙寇猖獗被執不屈死之郡志李貞南靖人永樂乙未進士第二授翰林編修與修四書五經性理大全改髙州府教授卒郡志謝璉龍溪人宣徳初進士第三人授翰林編修進侍講嘗上治安十五事後陞南京户部右侍郎卒于官林震長泰人篤志問學宣徳中進士第一人授翰林修撰以疾歸卒于家陳正統初進士累官廣東左布政使為政務存大體不事苛刻時劇賊荼毒之餘且撫且捕不期近效盗息民安後以疾歸為文章温醇典雅詩尤有髙致善造就後進及門者多所樹立為世聞人所著有梅菴存稿經籍要覽若干卷郡志周宣龍溪人正統乙丑進士第三授户部主事陞潮州知府屢殱海寇平山賊勞績著稱歴陞太僕寺卿以内艱歸卒宣少有文名銳志扵學其所為詩文多出新意自成一家郡志歐輝長泰人正統末進士累遷廣東僉事㢘介不阿抑强扶弱時有强寇依山剽掠者十餘年輝進兵勦捕境土以寜陞湖廣副使未任而卒郡志鄭和龍溪人正統末進士歴官南京户部郎中修實録成陞雲南恭議為政不矯不隨滇人安之以入賀卒和天性朴厚與人言若呐呐不出口志其文章政事足為後進儀範者為多云郡潘榮龍溪人正統末進士拜吏科給事中多所叅駁彈劾累官南京户部尚書榮為人寛𢎞平易見義必為嘗使琉球䟽漕運所在務存大體削弊剔奸鄉居澹如每家廟朔望及時祭無不盡禮人多化之卒贈太子少保諭祭𦵏郡志張寛平和人景泰辛未進士為御史直言敢諫以劾總兵官石亨下獄後出知安定縣禦寇有功卒于官郡志郭舒龍溪人景泰中進士授行人陞南京户部員外工部郎中擢知池州府舒為人古直剛介持已㢘行事方嘗出使川廣累郤餽遺在池日以撫字為先留意學校農桑而催科諸政若拙焉致仕去行李蕭然郡志陳爵南靖人天順丁丑進士知揭陽縣時山海盗起爵親諭之盗不從乃築城鑿池躬擐甲胄冐矢石為士卒先賊知其難犯遂散去叙功擢知韶州府改髙州卒揭陽立祠崇祀之郡志吳森漳浦人天順丁丑進士累官浙江恭政定紹興等郡徭役貧富適均江山草寇負險㺯兵者幾三年森至設法捕之民頼以安其他督糧清戎凡所設施皆平恕寛仁之政郡志陳真晟鎮海衛人年十七八即自拔扵俗専心儒業業成薦扵有司聞其防察過嚴無待士禮乃辭歸自是不復以科舉為事務為聖賢踐履之學為學有次第扵敬字實下工夫嘗两上書請補正學不報退而自修益厲鎮海初創戎壘自真晟為學而儒術始正自真晟講行文公家禮而風俗始正以布衣自號學者因稱為布衣先生有布衣存稿刻于郡齋郡志林同龍溪人天順初進士歴官江西恭議調廣西禦賊有功陞浙江恭政督理粮儲民無所逞其奸仕終廣東布政使司外柔而内剛喜為義事居官四十年禄入隨散卒之日家無餘貲郡志吳原森從弟天順甲申進士拜兵科給事中嘗言事被譴彈劾益力陞都給事中累遷户部左侍郎以僉都御史視两浙飢宣徳意捜民隠勸分平糴且積且賑蠲累年逋負數百萬民甚徳之召還以疾卒遣官諭祭并營𦵏焉郡志陳宏龍溪人天順甲申進士授御史廵歴有聲因星變上言歴數大臣之不職者數人出為湖廣僉事治豪民斷累嵗不决疑獄計平洞庭草宼陞副使歸卒宏長于政事而加以直氣惜乎未究厥施孫遷官監察御史郡志沈源龍溪人纂修英廟實録以清節著為南京監察御史廵江號令嚴肅盗賊不敢犯因天變上言列修徳弭灾十事後以諸貴臣交章誣之貶知盧氏縣以疾卒郡志魏富龍溪人成化中進士為御史廵歴廣東有能聲仕終刑部右侍郎歴官四十餘年隨事盡軄未嘗立異取譽而所至輙以譽終郡志陳恵龍溪人成化初進士除御史擢知廣信府以清慎勤自勵卒于官郡志許􅅗詔安人領成化戊子鄉薦知平樂縣不以家累自隨盡心職務招撫洞猺剖决疑獄尤加意學校親為講解後卒于官百姓悲號不已郡志吳瓌平和人登成化己丑進士歴南京庫部主事郎中擢貴州恭議有平夷功遷雲南恭政奉命釐正鹽法宿弊一清陞右布政使執法不撓時黎酋弑其叔而奪之位獄乆不决瓌寘諸法重賄不能入也以外艱歸遂卒于家宦槖蕭然郡志吳玭龍溪人𢎞治進士授撫州府推官有折獄才每公出裹粮自隨不勞百姓以不干名譽十年不得調後為御史直言敢諌有古爭臣風廵按山東以疾卒人咸惜之郡志林魁龍溪人𢎞治中舉進士授户部主事陞員外郎郎中度支有法不畏彊禦出知鎮江府當兵荒之後寛猛得宜民頼生息擢山西提學副使公嚴有聲調雲南兵偹撫鐵索青夷諸酋有功陞廣東恭政致仕所著有白石野稿歸田録行于世志郡洪異龍溪人領𢎞治乙夘鄉薦歴知崇徳縣擒江淮劇盗墾田至萬餘畝擢御史執法敢言陞四川僉事改浙江遏惡揚善恩威並著遷廣東恭議鎮靜自持不嚴而治歸卒于家孫公諧舉進士第郡志楊表龍溪人正徳甲戊進士授南京户部主事陞郎中督稅两廣勞業大著擢知長沙府清慎自持改知雷州興學校表節義濬水利作文以祭城隍猛象為之出境郡人異之陞浙江鹽運使削去常例浙人謂三十年來清官楊表一人而已陞廣西恭政致仕以㢘介終其身郡志林梅龍溪人嘉靖己丑進士歴户主事加中督課江州覺察内帑儧運粮儲所至持正不撓坐是忤權貴出知泰安州同知慶逺南安府陞南京禮部郎中卒于官梅慷慨有氣節志在天下國家為文章愽雅有則人推重之志郡列女蔡三玉龍溪陳端才妻也元時盗起漳州端才與父廣瑞各竄去三玉獨偕夫妹出避隣祠中盗入斫夫妹見三玉美與里婦歐氏同驅納舟中行至栁營江三玉投江而死越三日屍流至廣瑞舟側廣瑞識為女收歛之歐氏脫歸言狀事聞命旌門復役仍給錢以𦵏雍氏長泰人黄伯英妻年二十七而夫亡織絍市餅以養舅姑舅姑䘮𦵏盡禮而終身無玷嘗携幼子負荳至水濵置磨磨之遇鄉人廖姓者奪其磨處雍氏號天慟哭磨為不轉其人驚異遂還之洪武中事聞旌其門陳氏龍溪人李徳淵之妻父母兄弟俱早失獨依扵嫂氏年十六適徳淵未幾而寡陳誓不他適時舅與夫三䘮在堂陳衰麻哀毁苦勞萬狀終克襄大事孀居三十年謹守婦道始終無玷洪武丁丑詔旌表其門黄妙觀龍溪蔡安繼室也安拜潮陽令便道過家時陳有定兵䧟漳州安被擒不還妙觀年方二十七剪髪自誓紡績教子之死不移洪武末事聞旌門仍復其家郡志連新玉龍巖張玉一妻年二十二而寡家特貧姑康氏性特暴愎新玉採薪行賣以養姑姑感而慈繼遭凶年姑諷以去就新玉終無他意宣徳間有司以其事聞郡志郭貞姑詔安郭安女年十八受聘扵邑人許惟長而手患痼疾惟長父母欲悔之惟長不可卒娶焉入門事舅姑孝敬偹至未數月惟長病卒時俗火𦵏貞姑在旁悲慟􅆭烈頃之不忍視自投火中而死鄉人義之聚土成墳郡志楊氏漳浦人適李氏子夫亡義不再適正統間賊徒刼掠楊被執驅廹而前至南馬塲賊欲無禮憤罵不絶口賊怒手刄之後鄉人義而埋于長潭原郡志林淑瑶龍溪莊同妻同領景泰癸酉鄉薦㑹試卒于途時淑瑶年二十五子弼僅周嵗舅姑有季女贅婿于家偏愛之逼淑瑶他適且奪其子乳于他人又虐使獨㸑飲苦二十餘年其操愈厲既而季女及婿皆暴亡無後弼長且受室舅姑亦相繼謝世淑瑶母子乃即安夀八十有五精神猶自若焉郡志黄坤貞南靖林輝祥妻年二十一而輝祥卒長子惟聰甫三嵗次惟恵甫一嵗坤貞撫育二孤紡績供朝夕後惟聰官至推官坤貞年七十始終一節成化間事詔旌表之郡志林氏龍溪鄭景政妻年二十五而寡子允中在孩提家且不給孀居六十六年始終無玷正徳二年允中子慶領鄉薦郡志徐雙節漳浦人姑林氏歸于舉人徐輔越八年輔北上道卒一子藻七嵗林飲痛撫育克世其家娶婦周氏年十八越六載而藻又歿一孤棟甫三嵗林周貞志相依姑慈婦孝人無間言嘉靖四年表之曰雙節郡志鄭氏龍溪顔波妻年二十四而寡舅姑繼歿門至五䘮鄭為變産殯𦵏之父母憐其貧欲奪厥志鄭輙哭不食以死自誓年七十餘不改其初嘉靖十四年有司上其事詔旌表之郡志黄楣漳浦人年二十一適鄭承恵勸其力學三年而寡哀痛籲天欲以死從越七日哭奠如禮家人不疑楣􅅗自縊而死視其殮具皆預為之嘉靖中事聞旌表之郡志陳氏漳浦陳徳昌女也適士人康起鳴甫一月而夫亡既卒陳􅅗入寢室自縊而死嘉靖二十一年詔旌表之郡志蔡貞烈鎮海衛人歸儒士郭道膏克閑婦道後道膏遘疾蔡呼天願以身代道膏歿蔡為殮具如禮家人莫之防也次日即入寢室自縊死焉事聞表曰貞烈郡志許氏漳浦沈同訓妻年十八適同訓三月而寡哀慟幾絶一日托疾閉室服衰絰縊死家人啟户視之面色如生三日内屋宇汗滴如雨聞者異之嘉靖二十八年詔加旌表郡志仙釋􅅗翁隋開皇中鍊形扵石壁山養白蝦蟆以自隨後不知所終劉希岳漳州人宋端拱中為道士居西都老子觀中遇異人得道號朗然子嘗自言辛勤未踰十年人驚不老嵗月俄經一紀自覺如新又詩云夾脊雙闗至頂門修行徑路此為根一日沭浴更衣陳席而卧湏㬰飛出一金蟬遂失所在三平大師名義中唐王諷有碑云義中祝髪後依大顛大師寳厯中到漳州三平山住持學者三百人卒年九十二從謙宋慶厯中住開元寺日誦經說偈辟􅂖不食者四十年後四十年後歸岐山石門洪覺範有詩大覺禪師亦有詩福寧州東至浙江温州府平陽縣界三百三十里西至建寧府政和縣界四百二十里南至海岸三百六十里北至温州府㤗順縣界三百里自州治至南京二千三百二十五里至京師五千七百二十里糧二萬八千五百石零建置沿革本晉温麻縣地唐武徳中分置長溪縣尋省入連江長安初復置屬福州宋因之元陞為福寜州本朝初改為福寧縣屬福州府後陞直𨽻福寧州領縣二編户五十二里福安縣在州城東北二百里本唐福州長溪縣地宋淳祐中置福安縣元屬福寧州本朝洪武二年改屬福州府嘉靖中改今屬編户四十五里寧徳縣在州城北二百二十里本長溪古田两縣地唐開成中分置盛徳塲五代時閩陞為寧徳縣宋屬福州元屬福寧州本朝洪武二年改屬福州府嘉靖中改今屬編户三十五里郡名長溪唐名形勝其地坦夷圖經吻海𣲖江唐沈亞之集風俗産懼薄以勤羨用喜嗇以實華閩中記民以魚鹽為生州新志山川大姥山在州城東北望海里山有三十六峯王烈蟠桃記堯時有老母以藍染為業後獲九轉丹砂法乗九色龍而仙漢武帝時名曰大姥山閩王封此為西嶽浮膺山在州城東南海中控壓海道昔人登山詩絶頂試窮千里目烟波深處是琉璃南交山在海洋中鳳山在寧徳縣山分两翼如鳯鳳鼔翼之狀霍童山在寧徳縣北七十里神仙霍童所居洞天記謂霍林洞天是也唐司馬承禎扵此修鍊後駕鶴飛昇遂名鶴林又吳郡鄧元塩官楮伯玉沛國王元甫扵此授青精飯白霞丹景之法龜山在寧徳縣北七十里昔有二僧擕鐵鉢鐵瓶入于幽谷逢龜即止故名宋程師孟詩香焚薝蔔巖雲曉花發莎蘿海日春支提山在寜徳縣山之東有童峰雙峙壁立無際西有神僧石窟葛公仙巖南有蘇溪鶴嶺北有菩薩紫帽二峯白水江在州城東一百七十里舊記閩人先居海島者七種白水其一也龜湖在州城東舊傳湖有大龜浮其中沿岸而上僧惟亮者有所之輙載而往後化為石藍溪在大姥山下即老母藍染之所長溪在州城南四十五里流入大海桃花洲在寧徳縣鶴林宫唐初有此宫今桃木日盛甘棠港在府城東一百五十里舊名黄﨑港有巨石為舟楫患唐天祐初王審知令工鑿之忽然震碎遂改今名海鰌井在霍童山閩中記井中有海鰌甚巨若㺯水堰沒天即大雨或先霖潦㺯水即晴土産銀州境及二縣俱有塲鐵寜徳縣出公署福寧衞在州治東守禦大金千石所在州治南初𨽻福寧衞後改𨽻都司俱洪武二十年建學校福寧州學在州治東南即舊縣學宋慶厯中建本朝洪武初重建正統六年重修福安縣學在縣治東舊在縣西元皇慶初建本朝洪武中重建寧徳縣學在縣治東南宋嘉祐中建本朝重建宣徳四年重修宫室見江亭在州城東宋縣令表正規詩江心逺叠通潮浪海外遥分異域疆繚繞人家依縣市寂寥烟景認吳航寺觀建善寺在州城東唐建龜湖寺在福安縣西南元建資聖寺在寧徳縣東宋建鶴林宫在霍童山梁建唐名鶴鳴東有桃花洲東山宫在寧徳縣東宋建古蹟旃檀林在州城栖勝院古有十竒旃檀林為首名宦元王伯顔福寜州知州賊自邵武來偪伯顔破之賊率王善擁衆直壓西門伯顔與戰被執善曰聞公有恵政公為我尹此州可乎伯顔叱罵不屈挺頸受刄頸斷涌白液如乳暴屍數日色不為變州人哭聲連巷本朝龍存仁洪武中知福寜縣修廢墜恤孤寡舉賢才祛民害理寃獄均賦稅民愛戴之尹昌隆洪武末以御史知福寜縣處心眀白􅊩政公勤民敬服焉闗可誠洪武間以監察御知寜徳縣守己奉公愛民禮士黄理永樂中福安知縣禮士愛民政平訟簡有公勤之譽鄭齊永樂間知福安縣興學校均徭役邑民懐之賈得善宣徳間知寜徳縣眀直仁恕百姓安之詹應正統間寜徳知縣有政蹟吏畏民懐胡晨正統末福安縣丞時沙冦餘黨侵掠縣境晨多方偹禦民頼以安人物唐薛令之長溪人神龍初進士開元中為東宫侍講題詩于壁曰朝日上團團照見先生盤盤中何所有苜蓿長闌干𤣥宗幸東宫見焉續之曰啄木觜距長鳳凰毛羽短若嫌松桂寒任逐桑榆暖令之因謝病東歸宋林湜長溪人舉進士紹興末除監察御史奏䟽言陛下托股肱扵宰執而所授皆小人寄耳目扵臺諫而彈擊皆君子治亂之大無過扵此時論多之時同邑有王定國者少有大志紹興末上邊宜十䇿後知髙郵軍政績甚著余復寧徳人光宗初䇿士大廷覽復所對曰余復直而不訐擢第一後入史舘兼實録檢討所著有禮經類說蔵于家陳經長溪人號存齋舉進士有書解五十卷及詩講存齋語録行世髙頥寜徳人舉進士嘗語學者曰吾身任大責重無天地生物之功而有天地生物之心無經國子民之位而有經國子民之志所著有雞忩叢覽百五十卷詩集解傳各三十卷楊復長溪人受業朱熹與黄幹相友善著祭禮十四卷儀禮圖十四帙又有家禮雜說附註二卷林駧寜徳人少頴悟清修苦學博極羣書雖山經地志稗官小說釋老之書無所不覽徳祐丙子以易魁鄉薦著述甚富有皇鑑前後集源流至論行世元陳尚徳寜徳人號懼齋隐居不仕其學以四書五經為本而尤精通律吕天文地理算數之説著述有四書集解書傳補遺易經解詠詠史詩王薦福寜人性孝而好義父嘗病甚薦禱于天願減已年益父夀父果延夀十二年母嘗病渴思𤓰時冬月薦至深嶺值雪仰天而哭忽見巖石間青蔓披離有二𤓰焉摘歸以進母渴頻止又為人置後治𦵏立義阡贈棺賑粟官上其狀旌之韓信同寜徳人别號古遺受學扵陳尚徳隠居不仕著書經講義五百餘篇又易經三禮旁註書集解史類纂王積翁福寜州人初仕宋為福建制置使宋亡積翁以閩圖籍獻元世祖授中奉大夫累遷刑部尚書轉江西行省恭知政事奉使日本至其境遇害武宗時追封閩國公諡忠愍陳自新寜徳人博學通五經尤精扵易數推衍皇極經世弟子從逰甚衆所著有起興等集本朝周斌寜徳人洪武中舉福建鄉試授建寜府學教授官終國子司業陳宗孟寜徳人永樂初進士有學行知易州為諸生時嘗上書當道罷立塩塲鄉人徳之居家嚴訓戒子姓同居庭無間言陳錡福安人永樂間領薦扵鄉拜御史監軍甘肅與北兵遇奮兵大戰力乏被執厲罵死之林聰寜徳人正統中進士授給事多所彈劾歴吏科都給事僉副都御史嘗出賑山東江淮飢民廵撫大同仕終刑部尚書太子少保聰為人和氣滿容及遇事則侃侃然非流軰所能及閒居喜讀書發為詩文自成一家言卒贈少保謚莊敏列女陳氏福寜人林克威妻元季兵亂陳氏曵姑抱子走匿山穴後􅅗依母家收克威一家遺骨𦵏之時年二十四母憐其幼令人諷之適人陳愀然泣曰棄老稚而他適禽獸不為由是日夜紡績養姑撫兒姑歿哀毁殯𦵏子後成立陳氏八十三而終連氏名婉娘福寜州人父悌以適里人黄坦年二十坦卒子鏵不能言連誓無他志教鏵學書以代口語既長為納婦生孫以永宗祀鄉人賢之鄭氏名賢娘福寜州人夫王滿卒鄭年二十四養老姑撫幼子誓不易心卒之姑頼以終其天年子恃以底于成立鄉人有節孝之稱楊氏名靜徳福寜衛千户劉泉妻泉卒楊年二十九三乳而生五子俱在襁褓内外無期功强近之親自操井臼夜則紡績教諸孤咸底扵成年八十無疾而卒眀一統志卷七十八
