body:
  text: 明一統志卷七十八明李賢等撰邵武府東至延平府順昌縣界一百二十里西至江西建昌府新城縣界一百四十里南至汀州府寧化縣界三百四十里北至江西廣信府鉛山縣界三百里自府治至南京二千四百五十里至京師四千八百三十里糧六萬三千石零建置沿革禹貢揚州之域天文牛女分野周為七閩地秦屬閩中郡漢為冶縣地東漢為東候官縣地屬㑹稽郡三國吳扵此置昭武縣屬建安郡晉改縣曰邵武隋平陳縣後廢尋置屬撫州大業初屬臨川郡唐改屬建州宋以縣置邵武軍又領歸化建寜光澤三縣屬福建路元改軍為邵武路本朝洪武初改為邵武府領縣四邵武縣附郭本漢東候官縣地吳置昭武縣晉改邵武縣又改邵陽縣劉宋復為邵武縣隋屬撫州唐析置綏城縣貞觀初省綏城入邵武縣屬建州五代晉時改昭武縣漢時復曰邵武宋元仍舊本朝因之編户一百七里光澤縣在府城西八十里本邵武縣地宋初為財演鎮太平興國中即鎮置縣析光澤鸞鳳二鄉以𨽻之因名光澤元仍舊本朝因之編户五十三里泰寜縣在府城西南一百四十里本劉宋綏城縣地唐置歸化塲南唐保大中改為鎮後陞為歸化縣宋元祐初始改泰寜縣屬邵武軍元仍舊本朝因之編户五十二里建寜縣在府城西南二百二十里本吳建安郡將樂縣地劉宋置綏城縣唐貞觀中省入邵武縣唐末置義寜軍尋廢為永寜鎮又改永安塲南唐陞為建寜縣屬建州宋屬邵武軍元仍舊本朝因之編户五十二里郡名昭武吳名樵川以郡有樵溪故名形勝居四州之上㳺郡志其土曠夷其勢蜿蜒同上其土曠夷其氣清淑其勢蜿蜒抱負如在碧玉環中甌閩之西户前據重岡後帶鹿水俱宋胡寅軍治記風俗獷直尚氣力農重榖郡志人性獷直尚氣治生勤儉力農重榖頗好儒所至村落皆聚徒教授有古之遺意儒雅樂善輕齎健往同上喜以儒術相髙是為儒雅里人獲薦登第則厚贐慶賀是為樂善家有餘財則輕齎健往賈售他州易動難安建寜沿革記建寜邑介汀邵間去郡城甚逺土俗剛獷民易動而難安調馭有方則怡然聽命山川登髙山在府城西一名熈春山有三峯舊謂之靈泉三峯熈春臺在其北斯美堂在其南憇亭在其中各占一峯並嵳峩聳特下瞰城闉為郡人嵗時逰觀之地宋葉儀鳳詩城南城北草如茵緑水青山眼界新更問樵溪何處好滿城桃李萬家春樵嵐山在府城西樵水所出潮魚山在府城西山有三峰巾山在府城北一十里狀若居士巾或曰有人得金扵此宋饒方詩地將雲氣吐林巒至寳曽淘瓦礫間若把圖經重校定此山移喚作金山麻姑山在府城北四十里俗𫝊麻姑寓此山修道雞鳴山在府城東二十里五代時盧絳叛入閩居民未知避夜有雞鳴山頂人皆起而賊適至一方免擾攘之害故名龍湖山在府城西五十里絶頂有龍湖泉下有寳乗院唐僧普聞者嘗居此天馬山在府城西周十五里其形如馬天池山在府城東山頂有池方廣數畝白鹿山在府城東唐樊鍊師築壇鍊丹於此後乗白鹿而去因名雞籠山在府城東以形似名上有龔劉二大師祠水旱禱之有飛蜂至則應三臺山在府城東下有廣福寺七臺山在府城東南一百里連跨汀延邵三郡境上有七臺曰台星文殊普賢㑹仙獅子雲臺月臺有菴祀真濟劉大師菴前有百花洞乃劉蛻化處洞畔有石穴常乾每嵗旱疾疫禱之有水汲之灑田則雨病者飲之亦愈南午山在府城南山有三峰俱在午位與郡治相對故名福山在府城東南疊嶂相連元黄清老讀書其中建聽雨軒近廢邑人周文通詩為愛名山好秋來幾度登白雲多古意明月一書燈烏君山在光澤縣東秦漢間有徐仲扵此山採藥遇仙妃偶多假烏皮為羽飛走上下故名徐徹詩杭川雄鎮烏君山山頭古蹟仙人壇仙人騎龍去不返藥鑪丹竈留山間至今鬼神與守護洞口時時起雲霧玉清行府尚依然縹緲仙蹤無覔處雲巖山在光澤縣南其山蒼翠秀麗髙出雲表徐公山在光澤縣西下有徐仲仙廟元江通詩洞中烟鎻五雲樓洞口寒泉今古流見說秋髙風雨冷徐郎騎鶴更來逰鑪峰山在泰寜縣治西圓峙如香鑪為一邑勝槩金鐃山在泰寜縣西山極髙大盤跨建寜泰寜寜化三縣昔越王無諸逰獵遺金鐃扵此故名旗山在泰寜縣東北如旌旗狀雲盖山在泰寜縣西南上有龍潭又有瀑布泉垂三十餘丈鳳棲山在泰寜縣西南一名黄西崖石壁立中有線路縈紆可登山麓之南有巨池池之南有平野昔人嘗避地于此鳳山在建寜縣治西狀若飛鳳或𫝊有樵者見五色禽翔集其上故名山有東嶽行祠迎釐觀極樂寺逰人多吟賞其地東山在建寜縣治東一名何山其顛有蘭若樓閣經蔵雄偉壯麗邑人嵗時逰觀扵此平山在建寜縣東北怪石巉巖嵗當大比邑士以其墮石之數為得人之占其顛平如掌可坐百餘人屏山在建寜縣東山方而髙狀若翠屏上有碁盤石道人峰在府城南負長溪靣樵水秀拔為羣山之冠其險處名羅漢巖嵗旱禱雨有應昔有道人號龔勝者結菴於此頗有異跡蓮花峰在府城北峯巒疊秀其狀如蓮上舊有梅軒及嗽玉挹爽亭白雲峯在光澤縣西南其峯特峙髙入霄漢晨昏雲氣㝠濛故名君子峰在泰寜縣西南山勢髙聳蒼翠可愛峩眉峰在泰寜縣北周四十里髙數十丈楚陽嶂在建寜縣東其中有古器如缾盎罏銚然皆地氣融結而成鄉人墾藝往往得之隨復消毁飛猿嶺在府城西一百七十里其地産紙衾杉闗嶺在光澤縣西為福建江西界雲際嶺在光澤縣北邑人往浙江者由之百丈嶺在建寜縣北乃閩楚分界鳥道懸絶昔越王無諸築臺之所㑹仙巖在光澤縣東巖口有穴名石斗内深而方清泉常滿宋嘉定間有醉者䙝瀆其地火從斗中烈㷔四起崖上有桃實丹色熟時即墜人莫能得聖水巖在泰寜縣西一十五里巖中有三石乳下垂其大四五圍甘露巖在泰寜縣西南二十五里外有石門天成景物竒絶棲真巖在泰寜縣北相傳昔梅子真脩煉之所中有朝斗石採藥澗瑞豐巖在泰寜縣西四十五里與羅漢丹霞二巖鼎峙中有五百羅漢院方輿勝覽瑞豐巖有院初闢時得龍骨以其牙刻觀音像雙峰巖在泰寜縣西四十五里山頂有洞仙人碁局存焉鄉人梯險登以求嗣筆笏石在泰寜縣南七十里雙峙雲外逺視之有卓筆植笏之象朱石在泰寜縣南突兀髙聳而朱色鼓石在泰寜縣西一十五里形圓如鼓樵溪在府城内源出城西樵嵐山東流至城内逶迤九曲出北門入紫雲溪宋蘇為樵川即景詩愛重八九月登臨髙下樓樹紅雲白處寒瀬泊漁舟麀溪在府城西北建安記邵武縣衆山西北來溪源出縣西烏嶺撫州南城界謂之麀溪東流下與宻溪合東南至萬福亭入縣界紫雲溪在府城北俗名大溪東流至延平界宋葉儀鳳詩溪上千峰碧玉環瞰溪臺榭紫雲間鳥啼花落非人世似在金鰲山上山鶴冲溪在府城東何潭在泰寜縣治東一名龍潭方輿勝覽灘江之水自何山下環繞縣治遂瀦為潭其勢漸若斗角然又建寜縣亦有何潭龍平潭在建寜縣南舊傳有異物􅅗焉宋時其旁居民有享年百餘嵗者騏驎洲在泰寜縣西南一十五里昔越王戯馬于此館前洲在建寜縣東水心狀若逰魚出水靈泉在登髙山唐末僧大溈駐錫扵此有泉湧出故名龍湖泉在龍湖山秀水池在邵武縣學内樵水紆曲自西南來引以為池九龍池在府城中𤣥妙觀東北唐貞觀初有九龍現于此土産鐵邵武光澤二縣銅邵武出銀光澤泰寜建寜三縣出宋時有塲今廢茶泰寜出公署邵武衛在府城東南洪武元年建學校邵武府學在府治南宋天聖中建於西北隅熈寜後遷於城外本朝洪武初改建今所邵武縣學在府治西北宋天聖中建為軍學紹興中改為縣學光澤縣學在縣治東南元至正中建本朝洪武初重建泰寜縣學在縣治西宋慶元中建元末燬尋復建建寜縣學在縣治南宋嘉祐中建本朝正統十三年燬景泰初重建書院樵溪書院舊在府城東門外宋景定中知軍錢謙孫建以祀丞相李綱元時移置城内樵溪五曲之上今為府學雲巖書院在雲巖山下宋果齋李方子講學之所元天厯中縣尹况達建虞集有記雲谷書院在建寜縣南宋待制俞豐讀書之所後致政歸扁曰雲谷書院外有怡雲來薰致爽舒嘯浮香諸亭崇仁書院在光澤縣北元時建宫室平翠樓在府城北石鼓廟前唐文宗時銅川人廖懋監邵武鎮卒𦵏扵此邑人為立廟仍建樓翠微閣在福山元黄鎮成記福山為樵郡勝逰之最山之僧為閣以延賔客扁曰翠微眀幽勝也斯美堂在登髙山宋知軍方澤詩丹雘鮮鮮郡郭西簷牙髙啄翠雲齊地形舊壓重城峻天勢初圍疊嶂低晚市浮烟生萬瓦曉忩寒日度雙溪庭前便有青松路豈似桃源使客迷育英堂在府學宋淳佑中建教授方澄孫為記讀書堂在泰寜縣西二十五里宋丞相李綱讀書之所今縣西有讀書樓猶存㑹景亭在登髙山最髙絶處宋僧宗澈建前觀井邑萬瓦鱗次左瞰清流右臨碧巘為一郡偉觀憇亭在邵武縣光孝寺之右宋知軍李勉建採芹亭在府城外舊儒學前宋時建知軍方岳詩亭與樵嵐一様新詩書不受世間塵清風眀月來無盡不在溪山只在人魁星亭在建寜縣學門之左宋令程夢桂建越王臺在府城西漢閩越王無諸㳺獵之所故址猶存嘗有牧童扵土中得瓦有羅紋鴈翅之狀叩之鏗然如金石聲宋黄希旦詩荒臺枕古丘伊昔越王逰輦路今何在凄凉草木秋又建寜縣北百丈嶺亦有越王臺熈春臺在登髙山頂宋知軍張師中建黄通詩萬家雞犬環四面城池繞木落烟蒼蒼天低雲杳杳釣魚臺在熈春臺下瑞榴軒在邵武縣學内宋時有石榴士人觀其結實之數以為登科之信熈寜間結二實頗大是嵗葉祖洽上官均名在一二祖洽詩已分桂葉爭雲路不負榴花結露枝後人因以名軒㑹文軒在府學東廡之後闗梁樵溪橋在府城北跨大溪上本朝洪武初建長六十三丈有竒泰定橋在府城東元泰定中建翼以石欄里人危西仲作記絃歌橋在光澤縣治東元縣尹况達建以橋與學宫相隣故名寺觀西塔寺在府城西唐建光孝寺在府城西唐末建僧大溈居此本朝洪武初重建覺恵寺在府城南唐伏虎大師愛其地有山林泉石之勝建寺扵此廣福寺在二臺山唐㑹昌中建大覺寺在府城西北宋紹興間建寳嚴院在府城内後唐天成中建寳盖巗院在泰寜縣東殿堂廊廡並處巖下中有漱玉泉宋黄履詩曲逕山隈入重扉木末平巖垂半空盖泉滴四時聲𤣥妙觀在府城中本隋白鳩觀唐名九龍觀元改今名白鹿觀在白鹿山南唐建亦以樊鍊師乗白鹿得名迎真觀在邵武縣東四十八里祠廟廣祐廟在府城西五十里地名大乾隋末温陵太守歐陽祐舟次大乾溺死後人立廟祀之極為神異水旱祈禱其應如響有謁夢録宋李綱嘗謁廟夣神延接讓以主位綱固辭神曰他日更仗主盟及為相值神加封果與署名葉祖洽赴省試夢神將犬肉一片置几上命食之又指殿下竹一束示之莫曉其義眀年作大魁方悟一片犬肉置几上乃狀元二字前者廷對皆出賦題至是始問䇿竹一束者䇿字也如此者不可勝紀今名恵應王廟張文懿祠在廣祐廟内宋時邑人建以祀張士遜者文懿其諡也李忠定祠舊在府城外儒學講堂之東宋教授徐元徳建以祀丞相李綱本朝正統四年重建在今府學東朱熹舊祠記有云李公之為人知有君父而不知有其身知天下之有安危而不知其身之有禍福雖以讒間竄斥屢瀕九死而其愛君憂國之志終有不可得而奪者是亦可謂一世之偉人矣陵墓越王塜在泰寜西五里髙踰十丈世傳人觸之則有風雨之異陳巖墓在建寜縣治西巖邑人唐末黄巢叛巖聚衆保鄉里奏置義寜軍後陞福建觀察使卒𦵏于此鄒應龍墓在泰寜縣南應龍宋狀元古蹟烏坂城在府城東北建安記昔越王拒漢築城六此其一也今遺趾猶存髙平苑在泰寜縣南昔越王無諸校獵之所樂野宫在府城東三十五里建安記越王無諸以七百里山澗之地畋獵縱樂故邑有樂野宫或云泰寜縣治西有樂野宫其地今為民居白䑕村在府城南父老相傳此村昔嘗有白蛇白鼠相鬭故名丹臺仙境在府城南門外世傳隋盧真人唐樊真人宋支離子黄希旦皆煉丹于此王氏石銘宋洪邁夷堅志邵武人危氏者大觀二年𦵏其親于郡西塔院傍踰月雨過視墳側有痕掘之得銀盃二銅水缶及鏡銘一又得埋銘石其文曰琅琊王氏女江南熈載妻丙申閏七月𦵏在石城西諸器皆依古制度精巧非世工可及名宦宋陳從易知邵武軍専務以徳化民召修册府元龜張士遜知邵武縣有恵政嘗即聽訟之所手植海棠因以名亭後登台衮邑人封植以方甘棠蘇為知邵武軍政尚清簡在郡有詩人所傳誦後袁轂作守讀其詩因為詩云手掬樵溪塵可濯恨無雄筆繼蘇為曹修睦知邵武軍有善政性尤亷介杜衍薦為侍御史袁轂知邵武軍在任清介嘗有詩云滄浪不須濯纓上本無塵周居權知泰寜縣俗有生子不舉者居權為文戒勸扵是民多感而從之徐夀知泰寜縣有恵愛監司下塩之令夀曰民不堪命矣力拒之尹洙知光澤縣士學務程文洙勉勵之以古文為主扵是學者大悟文體一變羅拯福建運使邵武之光澤不𣙜酒以課賦稅號黄麴錢拯均之他三邑人以為便劉彛邵武縣尉恤孤寡作陂池教種藝平賦歛折豪猾振㳺惰凡所以恵民者無不至呉逵知泰寜縣愛民如子縣素産茶舊敷茶引錢額過重逵曰民不堪矣力為申請蠲其半邑人徳之為立祠章元振知泰寜縣建炎初盗賊四起元振據險立砦遷民帑庾于中與百姓堅守闔境獲全王遂知邵武軍時冦擾甫定遂過江山浦城道中遇邵武避地之人即遺金為歸資從者如市至郡撫摩創痍翦平兇孽民恃以安張毣知邵武軍金人犯順遣使約毣歸附毣怒斬其使人皆壯之王洋知邵武縣有袁氏夫死請縣投牒丐他適洋視衰絰之下紅裳微露且無戚容命械繋之一掠而服果毒死其夫徙問如初遂决之人服其眀王邁知邵武軍時以亢旱求言邁驛奏七事而以徹龍翔官立濟王後為先王埜知邵武軍盗起唐石埜親勒兵討平之胡斌紹定間以殿前司將官戍邵武江盜大至斌奮身迎戰大呼曰我死救百姓兵盡矢竭卒遇害其尸僵立數日始仆事聞贈武節大夫邑民即其戰地立廟祀之元况達光澤縣尹興崇儒學善决訟嘗有兄弟爭田者達曰吾視若貎非不恭友者授以伐木之詩親為諷詠解說於是兄弟皆感泣求解知爭田為深恥本朝周時中洪武初知邵武府時郡承元季民皆流離時中撫馴安輯使各遂其生養之樂人愛慕之後陞吏部尚書張文昱洪武初知邵武府㢘介愛民善詩文尤精扵畫號蒲塘散人後陞刑部侍郎夏祥鳳洪武末知邵武縣嘗曰㢘為士之大節居官者不能守㢘大節虧矣雖有政事何足尚哉及代去囊槖蕭然能踐其言李復觀永樂初知邵武縣能以文學飾吏事不假鞭朴而民服及去人思之葉仲賢永樂初知邵武府慈祥勤慎後遷参政郡志方嵩永樂初以進士任邵武府學教授條約嚴眀頑鈍者畏威改行得人為多時稱郡傳之最云郡志張淵永樂初知泰寜縣倜儻亷潔勤扵撫字邑自元季以來學官乆廢淵銳作興多所成就民有訟扵庭者必從容開諭使之自悟焉郡志劉仕傑永樂初知建寜縣均賦愛民無所阿附郡志劉仕𫝊永樂中知邵武府公勤亷慎興學勸士多所造就政蹟亦多郡志周英永樂間知泰寜縣愛民訓士政尚寛平去之日民遮道不忍舎郡志傅礪永樂中任邵武縣丞清謹精勤有政蹟後陞知建寜縣亦以㢘能著稱郡志劉進建寜知縣興學勤農尚亷耻不任刑罰郡志劉復宣徳初任邵武知府愽學能文政尚簡靜郡志鄒良宣徳中知邵武縣性耿介不避權要有恵政及于民秩滿邑人留之得復任郡志楊衡正統間知邵武府剛果有為時沙尤宼亂奄至城南衡勒兵討之賊退乃堅壁清野戒嚴以待郡境晏然郡志聶用乂正統中以監察御史向知邵武府公正㢘介且有善政在民郡志李春正統間邵武府檢校沙尤冦突至城南春率民兵出戰親冐矢石為士卒先連發輙中賊懼遂却去郡志汪榮正統間知建寜縣時沙寇殘燬縣治民亦有從賊稱逆者榮多方慰諭悉復其業郡志傅恭正統中主建寜簿宅心温厚勤扵職業沙寇犯境民多被脅從丞吏皆遁去泰獨率民兵悉力保障反覆以利害開諭其民民于是從令自解省志盛塤正統間知光澤縣為政得體吏民懐之郡志段永以進士任光澤縣教諭好古守禮條教嚴眀人雅敬之郡志王弁景泰中任邵武府學訓導性豪邁不覊講授之暇竟日端坐翻檢經傳不少置或論及財利輙赧然無一言諸生有所奉亦却去士大夫敬服之郡志同蠡景泰中知邵武縣㢘慎愛民鯁直不阿郡志金瑄景㤗間建寜知縣清心寡慾政蹟著聞郡志丁暹景泰末建寜主簿老成多識剛果有為植善抑强修廢舉墜茂著政跡郡志周仲斌天順初邵武府推官誠信感孚刑不輕用郡民咸恱服郡志盛顒成化初知邵武府㢘勤敏達汲汲以革奸弊崇教化為務先是郡中諸惡少朋害善良顒擒其尤者械之死由是軍民帖服盗賊屏息郡志洪瑛成化初通判邵武府以亷謹耿介著稱郡志廖鐸邵武府推官操守㢘謹有幹濟才郡志馮孜邵武知府慎徴輸平徭役民投牒訴訟一訊而决郡志王拯知邵武縣為政一以公㢘愛民為主服食淡素不異布衣時論者謂其可方古之清白吏云郡志劉元成化間知邵武府剛介不茍愛民之心表裏如一政蹟著聞去郡日乆軍民益誦其徳郡志謝雍成化間知建寜縣㢘能有為吏民憚服郡志劉俊成化間以監察御史左遷光澤知縣為政㢘眀剛果以戢奸植善為首務毁滛祠禁師巫凡境内菴院之私剏者悉撤其材埴以葺學宫壇壝人稱其得為政之體云郡志王佐成化間邵武府推官博學能文而恒推之以飾其政事以故政蹟著甚屬邑泰寜嘗有盗發佐遣人招諭降其脅從者數十人賊散去郡志潘洪成化間知邵武府質朴淳厚不事矯飾嘗發御史吕烱之贓致其罷去郡志奚銘成化間知泰寜縣治尚簡靜百姓安之郡志王義成化間任泰寜訓導邑故僻壤士鮮向學義每日夙興正衣冠坐齋中隨諸材質髙下授之學講經至有要議必懇懇為之言欲其體諸身而見扵行不徒為科舉之學而已也諸生乃幡然改觀至絃誦之聲聞于遐邇去任諸生白扵當道者為樹表扵學宫之傍榜曰遺教郡志馬昇成化間建寜知縣綽有政聲民畏憚之郡志張濟邵武府學教授性簡嚴每以忠義㢘耻激厲生徒嘗奏請以李忠定公入祀典郡志魏黙𢎞治初知光澤縣剛眀幹濟請託不行公家庶務多所修舉郡志丘世喬𢎞治中光澤知縣甫朞年能聲茂著吏畏民懐部使者以其才堪治劇奏遷延平之沙縣百姓攀留之郡志流寓范如圭建陽人少從舅氏胡安國受春秋登進士第累官至直秘閣嘗掇至和嘉祐間名臣奏章合為一書以獻髙宗嘆其忠後出知泉州為南外宗官浸潤譛罷僦舎邵武以居學者多從質疑有文集十卷人物唐黄桓邵武人居母䘮廬墓三年有芝産墓側貞觀中旌表門閭同郡張巨錢亦居母䘮廬墓十三年永淳初蠲其賦役宋龔慎儀邵武人仕南唐為禮部侍郎宋開寳初入貢太祖命賫書往招廣南後為盧絳所害從子頴為侍御史嘗憤其叔死絳來陛見頴遽前以笏擊之太祖驚問其故曰臣為叔父復讐因俯伏請罪且言絳獸心不可畜扵是誅絳義穎而釋之李巽邵武人累舉進士不第鄉人侮曰李秀才席㡌幾時離身及得第寄詩曰當年踪跡困埃塵不意乗時亦化鱗為報鄉闗親戚道如今席㡌已離身與王禹偁相善有送巽赴官序上官凝邵武人進士調銅陵尉官滿有老叟十數人送至境上餽藥數器行數里發之皆白金追而反之曰奉法循理非私汝也詎以公義而受私恵乎髙照邵武人舉進士任䖍州司理恭軍時郡有盗驅脅良民捕者利賞誣以真盗將論死照察其枉出繋者百餘人吳處厚邵武人舉進士累官知武陽軍神宗初皇嗣不育處厚上言程嬰杵臼全趙氏孤最為忠義宜旌之詔封嬰成信侯杵臼忠智侯立廟扵絳州祀之所著有青箱雜記葉祖洽邵武人熈寜三年廷試陳數千言貫穿古今擢進士第一簽書奉國軍判官累遷給事中知濟洪等州加徽猷閣直學士黄通邵武人嘉祐初進士韓琦范仲淹薦其才除大理丞每浩歌長嘯衆目以為異人有元夕燈詩誰將萬斛金蓮子撒向皇都一夜開通以詞語未壯自作云秦樓十二玉梯横紫府千門夜不扄疑是嫦娥弄春色彩雲移下一天星其雄俊如此黄履邵武人嘉祐中進士累官至御史中丞後定郊議進尚書右丞以言鄒浩犯顔納忠當徙善地坐罷知亳州徽宗初召復右丞加大學士上官均邵武人熈寜三年進士第二除監察御史裏行上䟽忤蔡確謫宰光澤杖妖巫立義社有政績元祐初復為御史論青苗以為有恵民之名無恵民之實遇事敢言朝政得失多所論諫崇寜初與元祐黨籍後復龍圖待制黄伯思履孫元符中進士為秘書郎縱觀冊府蔵書至忘寢食自六經及子史百家無不精詣篆隸正行草飛白皆至妙絶頗好道自號雲林子有文集五十卷黄伸邵武人嘉祐中進士邵武諸黄惟伸與兄僅弟侑齊名時比河東三鳳官至太僕司農卿子滂沔沂俱為顯官吳點邵武人與蔡京舊崇寜初京拜右僕射點為太僕寺丞首求去京不樂以郡倅處之終身李綱邵武人少有大志政和初舉進士仕徽欽髙三朝官至宰相謚忠定綱負天下之望以一身用捨為社稷生民安危雖用有不乆而其忠誠義氣初不少貶嘗曰吾知盡事君之道不可則全進退之節祻患非所恤也所著有易傳内外篇論語詳說文章歌詩奏議諸集百餘卷盧奎邵武人政和初進士仕至江西運判嘗作毋我論為衆所推號為盧毋我其學多得于楊龜山晚寓黔中著筆録十卷謝如意邵武人宣和中為南劍州司録時福兵叛害其帥擁衆數千道出南劍如意白太守曉以禍福守即遣如意往諭之衆聽命乃靣縳其兇渠二十餘人赴郡斬之何兊邵武人受學馬伸伸沒兊嘗輯其事狀政和中第進士紹興中為辰州通判覩郵報秦檜自陳其存趙之功兊取所輯事狀達尚書省檜大怒下幽獄削官竄真陽檜死復其官子鎬從朱熹逰所著有臺溪集諸說李郁光澤人少從楊時學時妻以女紹興初嘗被召入對便殿既還家築室西山學者號曰西山先生其卒也朱熹誌其墓施宜生邵武人博聞强記政和中為潁州教授後入金試日射熊三十六賦擢第一累官禮部侍郎翰林侍講學士黄中邵武人幼受書一再輙成誦紹興中廷試第二為國子司業後累宫至兵部尚書以龍圖閣學士致仕朱熹嘗裁書以見有曰今日之來將再拜堂下惟公坐而受之俾進扵門弟子之列其為人敬慕如此卒諡簡肅有奏議十卷任希夷其先眉州人祖賢臣始家邵武少刻意問學登淳熈進士第累官端眀殿學士簽書檢密院事兼權恭知政事卒諡宣獻希夷少從朱熹學篤信力行周程大儒賜諡皆希夷所請饒幹邵武人淳熈初進士知長沙從學朱熹夙興治事暇即聽講後知懐安軍卒有為之銘曰能磨琢而器吾之玉乎則心皇皇如不足能烜赫而丹吾之轂乎則足蹜蹜如不欲故樂也不加若性而汚也不懼其辱是謂善學朱氏者盖不惟其名而實之篤李方子光澤人朱熹髙弟端謹純篤天質近道自號果齋嘉定中進士第三累官國子録通判辰州所著有禹貢解傳道精語等書弟文子紹熈中進士亦以道學倡門人宗仰之李閎祖光澤人父吕號澹軒與朱熹為友三子從學閎祖篤志精思熹留之家塾為編中庸或問輯畧登嘉定進士為臨桂簿仲弟相祖用心精切編書說三十餘卷季弟壯祖舉進士為閩清尉真徳秀薦之稱其為人物典型李東綱族孫受學于朱熹登紹熙進士為廬陵簿秩滿周必大餞以詩地跨江閩秀氣兼玉成界尺直方㢘西曹乆處習鑿齒髙士惟知孫子嚴危昭徳邵武人寳祐初進士歴官侍御史權工部侍郎兼同修國史致仕嘗為崇政殿說書以易春秋大學衍義進講反覆規正甚多所著有春山文集子徹孫咸淳初進士鄒應龍泰寜人慶元二年廷試第一累官至資政殿學士簽書樞宻院事既歸得逰憇之所理宗親書南谷二字賜之卒贈少保諡文靖杜杲邵武人以父廕補官江淮帥李珏羅致幕下提偏師援滁州後累有戰功官至吏部尚書龍圖閣學士卒贈開府杲淹貫經史善草書為文麗宻清嚴晚嵗専意理學嘗言吾兵間無悖謀無左畫得于四書杜庶杲子倜儻有大志通典故善為文從父兵間習邉事立戰功補官籍田令兼制機督幹後進直秘閣兼廬州安撫副使人歡迎如見慈父治績甚多後為江西轉運副使髙談光澤人言動由禮鄉人敬之紹定間旁郡盗起諸子請避曰四方皆盗區無可避者及盗入諸子又請談曰有廟祐在將焉之盗至談出曰時和嵗豐何忍為此盜執之脅使從談唾賊大罵遂遇害元黄清老邵武人天資頴悟五嵗日記數千言泰定中舉進士累官翰林編修及為提舉作成人才甚衆時重其學行詩有盛唐風存者數千篇又著春秋經㫖四書一貫數十卷李學遜綱九世孫博學洽聞善天文尤邃扵易為文典雅人有得其片言隻字者寳而蔵之所著有易精解中星儀象等圖黄鎮成邵武人年弱冠厭棄榮利慨然以聖賢道學自力學者號曰存齋先生至正間隐居不仕著述甚富以夀終集賢定謚貞文處士郭回邵武人天性至孝家素貧竭力養親母年九十八而卒回傭身得錢𦵏之毎日詣墓哭祭如是者十四年守臣以聞詔旌表之本朝諶賤生邵武人洪武中以國子生為岳池縣典史㢘介有守薦陞四川按察僉事列名彰善録何道旻泰寜人洪武中以國子生歴官監察御史彈劾不避權倖陞江西副使坐事免後起僉事知永州府􅆒厯中外所至皆著能績人畏而愛之去後恒見思慕郡志蕭永泰建寜人以國子生授㢘州推官誠朴㢘謹嘗招降木頭洞賊四千餘人後陞濟寜州同知剸繁治劇綽有餘能部使者皆器重之後引年致仕郡志吳琬建寜人洪武末進士任户部主事精扵吏治操履清謹尋陞貟外郎卒郡志吳璽邵武人領永樂戊子鄉薦擢武選主事以才能稱累官户部侍郎經費出納莫不㑹計營度皆得其宜而于下之弊蠧亦盡照察衆推服之郡志張誠建寜人永樂己丑進士除御史用法平恕遇事敢言廵歴交趾鎮守大臣及中貴有不法者誠㢘而劾之悉寘之法為一時御史首稱繼廵浙江湖廣所至皆有聲後致仕卒郡志朱祐邵武人永樂間由國㢘子生授職方主事以能著稱出判紹興府凡政有便於民者必力為之秩滿士民請留涖任又七年以漢陽知府致仕歸囊篋蕭然郡志花潤生邵武人以進士授古田知縣創公署興學校為子弟置書親課其業歴陞浙江僉事督視江浙學校規矩詳密考較精嚴後引年致仕郡志曽真保邵武人永樂間進士除浮梁知縣清白持身恭慎為政嘗疏中貴人狀罪戮之民獲安帖後致仕卒平生耿介剛直士大夫咸羡慕之志郡余隆建寜人領永樂戊子鄉薦歴官選部員外郎性恬退未嘗躡跡豪門大為搢紳軰稱許志郡黄原昌建寜人永樂間登進士拜行人持重有節槩宣徳改元頒正朔出使占城得使臣體贈以金帛竒物悉却之陞户部員外郎時奔競之風熾原昌耻隨流俗浮沉遂請老以休致郡志黄昌建寜人由國子生歴象州陸安州同知所至鋤强伐暴興學勸農多有政績陞光禄署正歴官三十餘年未嘗有過舉郡志陳泰邵武人歴官監察御史彈劾無所顧忌廵厯貴州總戎素桀驁聞風亦自歛束繼廵山西山東奏黜大臣之不職及藩憲貪暴不法者若干人以右副都御史致仕大節清操為時所推重卒諭𦵏祭郡志黄孟舟光澤人宣徳初應求賢舉擢慈利知縣㢘能謹慎愛民如子民戴之如父母及卒民為立祠肖像祀之郡志余靖建寜人豁達有識由國子生歴知武定州及鄭州撫字有方深得治體剸繁治劇名聞昭著郡志鄒允隆泰寜人正統壬戌進士拜太常博士凡朝廷大典儀文擬議皆取正扵允隆後改太僕丞以僉事督廣東學校端軌範嚴條約察勤惰公勸懲學政肅然未幾以疾卒郡志徐溥邵武人第正統戌辰進士拜監察御史卒于官􅄎氣質剛方才華卓􅕸持節按部風紀肅清郡志陳綬建寜人歴官乳源知縣戢强暴増户口辟田野興學校事無不舉而仁愛之心尤篤秩滿致其事而歸郡志陳孟温建寜人父沒廬墓三年嘗有𤣥兎烏鴉集于墓所有司為立孝子坊以旌之郡志陳順建寜人正統戊辰沙尤冦亂順集民兵與戰大勝未幾寇益兵奄至順復出戰衆潰順手殱十數人力竭遂遇害時邑人寗宗珮亦同死焉志郡謝􅖌邵武人景泰初進士拜監察御史持憲嚴明人不能奪累官廣東左恭政凡所至皆有聲稱郡志寗堅邵武人早失怙事母孝在庠序時嘗聞母病馳歸即入母卧内侍起居奉湯藥夜則假寐其側衣不解帶如是者越數旬未嘗一入房室母病愈乃止復領鄉薦任鳳陽府同知有恵澤在百姓郡志余志隆子登天順甲辰進士授刑部主事審决重獄號稱平允坐誣出判廣州嘗請出絶户田以安集流民三萬口陞知石阡府夷民安之後遂致仕郡志董英建寜人領鄉薦知興寜縣小心勤慎撫字有聲縣故供應皆出于民英一切禁止民懐其徳立祠祀之郡志列女龔氏二女父慎儀開寳初守歙賊盧絳逼慎儀拒罵遂舉家被害虜二女行至邵武王堂香嚴寺絳恣飲以二女幼不設防二女遂縊于寺後之小阜後人名其死所曰烈女臺去臺百餘歩有雙塜存焉吕氏建陽人歸于邵武饒偉生子幹甫晬而寡持守嚴潔後幹登進士第從朱文公學知懐安軍贈吕宜人葉氏二女泰寜人紹定二年寇犯邑二女與嫂義不辱扵賊乃相結衣裾皆投溪而死邑人為立祠扁曰二潔葉氏泰寜祖洽孫女適邑人蕭玠生二子曰舜咨曰舜申孀居紡績教子後二子俱宦且以㢘潔稱皆其教也卒年一百嵗黄氏建寜人適同邑進士王防防為泗州户曹卒黄營挈其柩以歸哀毁骨立服闋所親議改適黄聞之憤鬰悲號不食死黎氏邵武傅君用之母家居事姑甚謹定省必察其飢寒夜則侍寢如是者餘四十年大厯初姑年九十有九黎病革姑問之黎曰老人善自養待三日後則為百嵗人既而卒其姑戚然三日亦卒縣令為立眉夀坊以旌之李氏光澤上官成一之妻至正末賊起䧟光澤邑民依烏君山之玉隆宫以居賊衆乗機入山剽掠李被執縛驅廹以前行經石崖其懸石數百尺李力曵繩與賊俱投崖下而死鄧奴娘光澤人適里人郭子成洪武丁夘成以人材舉卒于旅邸時鄧年二十有二生二子俱在孩抱舅姑老家日貧乃力紡績營生以孝養或有異議者則泣以告之謂他日何以見吾夫扵地下也竟以節終丘氏邵武陳文清妻永樂初隨文清從戎福州文清病卒丘時年十七生子永宗甫四月遂函殖歸𦵏矢志不再適人有異議則泫然涕下以故不敢强後永宗以國子生拜西藤令事聞詔旌其門陳氏名正娘邵武副都御史泰之女適邑人吳成成病卒目不瞑陳仰天自誓願終養其母成為瞑目去自是躬勤紡績孝養其姞鄉人資之相率狀其事以上聞得旌表其門鄧氏名全泰寜人適李祥正統間避冦于獅子巖為賊所執欲犯之全紿曰吾從汝須就崖穴隠僻處可也及崖間奮身即投下賊亦援而下俱死焉徐觀娘邵武人適郡庠生某年方二十有六而寡生二子長六嵗幼二嵗觀娘厲志自守終始無玷趙氏名真娘泰寜人適陳顯生二子其一尚在襁褓而夫沒夫死靡他勤紡績以養舅姑克盡孝道孀居六十餘年始終一節成化初事聞詔旌表之徐氏二婦建寜人一王氏徐存妻一江氏徐忠妻正統間同避寇于里之掃箒寨聞賊至二婦相與誓死賊果至王抱幼女投崖江繼之俱死惟江子福昭縣崖樹間得不死賊退收二屍歸𦵏之鄉人至今哀焉江氏名望娘泰寜鄧勝達妻年二十六而寡僅生一女尚懐抱王父母奪其志遂褫去鉛飾以死自誓勤女事以終其年成化四年狀其事于上詔旌表之應氏建寜人名鳳姑歸于同里丘伯春年甫二十而伯春卒應號天願同死遂自投于池中適鄰婦援而出之氣息奄奄忽憶起斷左手中指置夫懐中既𦵏旦夕號慟未幾得疾卒與夫合𦵏焉以上列女俱邵武郡志仙釋馮觀國邵武人逰方外遇異人得肉丹之法自稱無町畦道人寓宜春二年言人吉凶盡驗或有誚其醉狂者觀國以詩謝之曰踏遍紅塵四百州幾多風月是良儔朝來應笑酡顔叟道不相侔風馬牛紹興中端坐而逝郡守李觀民為塑其像于治平觀徐熈春郡城人宋熈寜初夢鐵冠道人儀容修偉既寤至城南五峰院後過所夢者自云姓蔡住武夷遺以五華草食之甘美自此不復粒食惟飲清泉約以某日㑹武夷至期而往蔡巳先至徐以水深不能渡止于金身院修煉尸解而去黄希旦長樂里人號支離子居九龍觀翛然有出塵之志熙寜五年作五福宫成希旦以戒行清淨召至京師後二年化形扵太一宫後復見扵蜀有詩寄友人曰昔逰西太一今日返成都若問去來事雲蔵月影孤龍湖禪師名普聞唐僖宗第三子往湖南石霜寺恭禪及去付之曰汝逄乾即止逄陳則住來邵武問其山曰大乾問居者曰一道士姓陳師悟遂結庵居焉一日師聚徒說法有老人在傍師問之對曰某此山之龍因病行雨不職見罰願師救之師曰可易形來俄為小蛇師引入淨瓶覆以袈裟忽雲雨晦㝠雷電遶空而散蛇自瓶出復為老人謝曰非藉師力則腥穢此地矣山中無水當以水報乃爪石成穴湧泉一泓後師跨虎而去不知所終漳州府東至泉州府同安縣界八十里西至汀州府長汀縣界二百三十里南至廣東潮州府潮陽縣界三百五十五里北至延平府尤溪縣界三百里自府治至南京三千五百二十五里至京師七千五百二十五里糧一十一萬六千石零建置沿革禹貢揚州之域天文牛女分野周為七閩地秦屬閩中郡漢為東冶縣地東漢為南部都尉地並屬㑹稽郡晉屬晉安郡梁屬南安郡隋屬閩州唐垂拱初始析福州西南境置漳州以南有漳水為名治漳浦縣開元初徙治李澳川天寳初改漳浦郡乾元初復為漳州又徙治龍溪五代晉時留從効改為南州宋復為漳州元陞為漳州路本朝改為漳州府領縣十龍溪縣附郭梁天監中始置縣𨽻南安郡隋屬泉州唐屬武榮州後更武榮為泉州縣仍屬焉開元末始屬漳州乾元初州治徙此宋元仍舊本朝因之編户一百四十八里漳浦縣在府城南一百里本龍溪縣南界地唐垂拱間析置漳浦縣開元初置漳州治此後分置懐恩縣未幾省懐恩入漳浦宋元仍舊本朝因之編户五十三里龍巖縣在府城西四百里本晉新羅縣苦草鎮唐初于此置新羅縣屬汀州天寳初改為龍巖縣大厯中割𨽻漳州宋元仍舊本朝因之編户二十九里南靖縣在府城西四十里本龍溪漳浦龍巖三縣地元至治間以其地僻逺難于控御遂割置南勝縣後改名南靖本朝因之編户一十六里長泰縣在府城東三十七里本泉州南安縣地南唐始扵縣之武勝塲置長泰縣屬泉州宋改屬漳州元仍舊本朝因之編户一十一里漳平縣在府城西北三百二十里本龍巖縣地成化初以其地險逺難治遂析置漳平縣地平衍統扵漳故名編