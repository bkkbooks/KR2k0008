body:
  text: 明一統志卷三十明李賢等撰南陽府東至汝寧府遂平縣界二百八十里南至湖廣襄陽府襄陽縣界一百八十里西至鄖陽府鄖縣界二百里北至河南府登封縣界四百三十里自府治至京師二千一百四十五里至南京一千七百里糧一十一萬四千四百石零建置沿革禹貢豫州之域天文張分野本夏禹之國在周為申伯鄧侯之封春秋時併於楚戰國屬韓秦取韓地自漢江以北置南陽郡治宛以其在中國之南而居陽地故曰南陽漢因秦制領於荆州刺史光武起兵舂陵更始立於淯水皆在此地晋為南陽國宋齊並為南陽郡後魏於穰縣置荆州以郡屬焉隋初罷郡置鄧州治穰改宛為南陽縣唐初於南陽縣置宛州尋罷五代至宋因之金置申州元陞為南陽府本朝因之領州三縣十一南陽縣附郭本周申伯國戰國為韓宛邑秦為宛縣南陽郡治此漢因之後魏改上陌縣後周改上宛縣隋初改南陽縣屬鄧州唐初於縣置宛州尋罷州仍以縣屬鄧州唐末以向城縣省入五代及宋皆因之金為申州治所元改州為南陽府仍置縣屬焉本朝因之編戸二十五里鎮平縣在府城西七十里本漢安衆縣屬南陽郡晋改安昌縣屬義陽郡南北朝廢為穰縣北鄉地金初置陽管鎮後始置鎮平縣屬申州元屬南陽府本朝初省入南陽縣尋復置編戸一十七里唐縣在府城東南一百二十里本漢北陽縣屬南陽郡後魏置東荆州西魏改淮州隋初改顯州後改淮安郡唐初復為顯州尋廢州以縣屬泌州又改泌州為唐州治北陽縣天寶初改淮安郡乾元初復為唐州五代梁改泌州徙治泌陽後唐復為唐州晋又改泌州漢又復舊宋屬京西南路元屬南陽府本朝降州為縣編戸二十里泌陽縣在府城東二百二十里漢為舞隂縣屬南陽郡東魏改臨舞縣及置期城郡隋廢郡以縣屬顯州唐始改泌陽縣乾元初屬唐州五代梁初嘗以泌州徙治此宋金皆屬唐州元初因之後省本朝復置編戸三十六里桐栢縣在府城東南三百里本古唐州地秦漢並屬南陽郡西漢始置復陽縣三國屬魏晋屬南陽國隋改復陽為桐栢縣唐屬河南道五代因之宋屬京西南路金因之元省入唐州本朝初置廵檢司成化十二年復置為桐栢縣因縣東有桐栢山故屬南陽府編戸一十四里南召縣在府城北一百四十里本南陽縣地世傳楚王故城漢屬西鄂州唐屬向城縣宋屬南陽府元因之本朝初置廵檢司成化十二年析為南召縣因地有南召店故名編戸一十八里鄧州在府城西南一百二十里本春秋時鄧侯國秦為穰邑漢為穰縣屬南陽郡後魏為南陽郡治又於此置荆州隋初罷郡改荆州為鄧州大業初復改南陽郡唐為鄧州天寶初改南陽郡乾元初復為鄧州五代梁置宣化軍節度唐改威勝軍周改武勝軍宋復為鄧州屬襄陽府金屬開封府元屬南陽府本朝以穰縣省入編戸三十七里領縣三内鄉縣在州西北一百二十里本楚之白羽地春秋時改曰析秦置中鄉縣屬南陽郡漢為析縣屬𢎞農郡晋屬順陽郡後魏以縣置淅陽郡西魏改内鄉縣後周廢隋復置屬浙州唐貞觀中州罷以縣屬鄧州宋析置順陽縣元以順陽省入仍屬鄧州本朝因之編戸三十四里新野縣在州東南七十里漢舊縣屬南陽郡晋為義陽郡治後改義陽為新野郡治棘陽縣西魏改郡曰黄岡及改棘陽為百寧縣後周以南棘陽縣省入隋仍為新野縣屬鄧州唐省入穰縣五代宋金俱為新野鎮元復置縣屬鄧州本朝因之編戸一十八里浙川縣在州城西北一百二十里秦漢屬南陽郡北魏置浙川縣屬鄧州尋改浙陽縣屬荆州隋唐因之宋復置金元省入内鄉縣本朝成化初復置仍舊屬編戸一十九里裕州在府城東北一百二十里本春秋時楚之方城漢為堵陽葉二縣地屬南陽郡東漢為順陽縣西魏置方城縣及襄邑郡隋初廢郡以縣屬淯州唐初於此置北澧州貞觀中改魯州尋罷州以縣屬唐州宋仍舊金始置裕州治方城元屬南陽府本朝以方城縣省入編戸三十二里領縣二舞陽縣在州東北一百四十里本漢舊縣屬南陽郡以在舞水之陽故名東漢屬潁川郡魏置舞陽郡後仍為縣晋屬襄城郡後改北舞縣隋屬潁川郡唐貞觀中屬許州尋廢開元中復置仍曰舞陽五代宋金並仍舊元初省入葉縣後復置本朝因之編戸四十四里葉縣在州北一百二十里古應子國周為應鄉春秋為楚地遷許于葉即此後為沈諸梁邑漢置葉縣晋屬南陽國北齊置襄州東魏置定南郡後周廢襄州置南襄城郡又廢定南郡為縣隋初郡廢以縣屬許州後以定南縣省入唐初於此置葉州州罷仍以縣屬許州後析置仙鳬縣屬仙州尋罷仙州及省仙鳬縣宋屬汝州金屬裕州元仍舊本朝因之編戸三十二里郡名南陽秦名形勝成臯之固商阪之阻蘇秦云北有成臯之固西有商阪之阻東有宛穣九百餘里西通武關東受淮海史記宛西通武關東受淮海一都之會也滄浪為隍方城為墉漢張衡南都賦武闕闗其西桐栢揭其東流滄浪而為隍廓方城而為墉湯谷涌其後淯水盪其胸推淮引湍三方是通用武之國宋熊剛大云南陽北連中原東通吳㑹西接巴蜀南控蠻粤故諸葛亮以為用武之國山川清逺宋陳振雅才亭記瀕汝為郡山川清逺土壤膏沃天地中和之氣為多山水盤紆宋王襄辨方志宛穣之北伊洛之南山水盤紆丘原蔓衍襄漢籓籬宋虞允文奏議鄧為襄漢之籓籬南陽又為鄧州之籓籬古形勝之國也山川秀㧞甲於西京宋鄧州地理志大乘峙前方城鎮後郡志裕州之境大乘峙其前方城鎮其後近被二水之津逺恃七峯之險地稱陸海元志鄧州山峯合而氣清水泉深而壤闊舟車輳泊地稱陸海風俗有先王遺風史記南陽本夏禹之國夏人政尚忠朴猶有先王遺風上氣力好商賈西漢書搢紳所出隋志南陽古帝鄉搢紳所出淳朴尚農元志被召杜之化淳朴尚農俗以殷富至今猶然士皆為道徳性命之學同上敦尚詩禮郡志鄧州之俗古稱醇厚敦尚詩禮務勤耕桑不喜爭訟有東漢遺風務穡重禮國志裕州之俗務穡重禮有絲麻綿絹之饒廣成王喬仙風所被人多壽考山川豫山在府城東北一十五里孤峯峭立俗名獨山下有三十六陂紫山在府城北二十五里一名紫靈山有水無所㑹通冬夏常温因曰陽谷北筮山在府城北二十五里蘘山在府城北二十五里昔有居民被蠱毒遇神女教食蘘荷毒愈因名豊山在府城東北三十里山海經山有九鍾霜降則鳴下有泉曰清冷泉神耕父處之神來時水赤有光耀南都賦云耕父揚先於清冷謂此金元好問詩豊山一何髙古屋蒼烟重開門望吳楚鳥去天無窮磨山在府城西北三十里石可為磨磑因名羊山與磨山並峙百重山在府城北七十里山巒重複所可記者鹿鳴武陽亂石柘禽鯉魚五山總曰百重雉衡山在府城北七十五里山有石室中甚精潔唐人詩雲連熊耳峯齊秀水出雉衡山最高丹霞山在府城東北一百五十里三鴉路中一名留山上有棲霞寺寺後一峯巉巖千仞左右兩峯夾立旁近諸峯朝拱非一唐孟郊送芳顔二上人還丹霞山詩松色不肻秋玉色不肻柔登山須正路飲水還直流倩鶴負書信索雲作衣裘仙村莫道逺杖䇿相交遊遮山在鎮平縣東三十里巒岫岧嶤溝澗深阻相傳莽兵追光武至此為山所遮竟弗能及因名騎立山在鎮平縣西北五十里狀若立騎其山五峯並峙又名五朶山上有龍湫三穴禱雨輙應杏花山在鎮平縣西北五十里地宜杏上有龍潭雙山在唐縣東北四十五里兩山相並故名白玉山在唐縣南五十里一名髪山上有卓錫泉中陽山在唐縣東七十里一名慈丘山又名上介隋因此山置慈丘縣蓼山在唐縣南九十里古蓼國地上有蓼王廟紫玉山在唐縣南一百里下有龍潭二石柱山在唐縣東南一百里山有石柱柱有鐡環莫考其故唐子山在唐縣南一百里漢髙鳳隱居處唐因此山置唐州一名西唐山牡丹山在唐縣東南一百五十里上産牡丹天封山在唐縣境一名大胡北水出焉南都賦曰天封大胡列仙之陬即此銅山在泌陽縣東四十里其地有分水處東流為淮西流為泌同源異流相傳漢鄧通鼓鑄其上盤古山在泌陽縣南四十里上有盤古廟碁盤山在泌陽縣東北八十里上有石碁盤與截軍山並峙桐栢山在桐栢縣東南一里其山東南接隨川界西接棗陽界峯巒竒秀上有玉女卧龍紫霄翠微蓮花諸峯淮水出其下近山又有大木山晋祖逖将家屬避難於此元張伯雨詩桐栢山髙在半天峯巒平處住神仙髙老山在桐栢縣東一百里一名栲栳山峯巒峻起髙出群山天子望山在南召縣西南二十里世傳光武鴉導而出登此山以望南陽故名金𦵏山在南召縣西五里峯林秀麗世傳山南多有古王侯墓故名鉄朶山在南召縣西南八十里世傳下産鉄石古有鉄冶故名紫金山在鄧州西南岡阜孤起因為城角崖下二洞宋狀元賈黯嘗讀書其中後有道士居之為藥圃於洞門五壠山在鄧州西山有五堆連接故名上有諸謝兆域謝絳嘗家焉宋梅堯臣詩窮覧川原勝經行未見頻樵深但聞斧谷暖自留春析隈山在鄧州南七十里左傳秦人遇析隈因記其地而名山俗訛為厮隈山禹山在鄧州西南九十里此山祈禱有應因名雨山後人遂為禹山湯山在鄧州西七十里山有兩峯東西列峙東峰上有成湯廟覆釡山在鄧州西北八十里以形似名俗呼吐霧山石堂山在内鄉縣西五十里山洞若堂又名靈堂即麻衣子所居修道處熊耳山在内鄉縣東一十二里山連盧氏縣詳見盧氏縣山川蕭山在内鄉縣東二十五里上有蕭王廟祀漢世祖因名蕭山墨山在内鄉縣北五十里山色盡黒一名石墨山丹崖山在内鄉縣西一百里其石悉赤壁峙霞降若江雲秀空二岫更為絶出大白山在内鄉縣南一百二十里峯巒髙峻下臨丹河舊指此山為順陽淅川二廢縣分界處秋林夏館山在内鄉縣北一百五十里金元好問樂府秋林夏館山水窟家家林影暎湖光髙前山在内鄉縣亦名天池山山海經翼望山東南五十里有髙前山上有池甚寒而清乃帝臺之漿也得而飲者可愈心疾岝嶺山在淅川縣北二百里其山甚髙峭壁如削上有忠國師結􅈋處其神威嚴不可少犯葷穢酒炙一至山頂則雷雨暴至白崖山在淅川縣東南七十里山石瑩白若縞素舊有香嚴寺宋范仲淹詩白崖山下古禪刹即此石杯山在浙川縣南順陽舊縣北一峯雄壯上有隋石杯太子廟方城山在裕州東北四十里左傳楚屈完對齊桓公曰方城以為城即此今竹山縣亦有方城山然杜預註云山在葉縣南則此山是七峯山在裕州北三十里上有七峯列峙泉白山在裕州北四十里與七峯山對峙山頂有泉下流如布黄石山在裕州北五十里葛仙翁於此昇仙上有仙翁觀東有青龍潭西有白虎峯南有火精嶺北有真龜洞寳泉山在裕州北六十里上有甘泉箕山在舞陽縣南三十五里以形似名馬鞍山在舞陽縣西南四十里以形似名十八盤山在舞陽縣南八十里周廽一十八里黄城山在葉縣北一十里一名苦華一名長城即長沮桀溺耕處下有東流水即子路問津處玉照崖在内鄉縣順陽保自丹水行謂之小江口北有石壁髙仭許截然如削其色清瑩下有潭水色亦漣漪宋順陽尉郭端嘗遊于此名為玉照分水嶺在府城北七十里有水自嶺南北分流俗呼為分頭嶺其水為鴉河乃三鴉之第二鴉也三鴉路在府城北七十里分二路東北帯西而行者謂之三鴉路中有石山鯉魚山拓禽山即行人來往趨西洛之便路也石川為第一鴉路口分水嶺第二鴉路口今在汝州界者第三鴉路口也卧龍崗在府城西南七里起自嵩山之南綿亘數百里至此截然而住囬旋如巢然草廬在其内時人以孔明為卧龍