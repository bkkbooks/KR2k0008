老百姓歡服杜詩建武中南陽太守政治清平造水排鑄農器修陂塘拓田土比室殷足政化大行時人有前召父後杜母之語皆為立祠王喬為葉令每朔望自縣詣朝章帝怪之宻令太史伺望言其臨至輒有雙鳬從東南來舉羅得雙舄詔尚方驗視則所賜尚書官屬履也鮑昱比陽長有繫獄當死者母詣昱泣告無後昱憐之令妻入獄遂有姙生子荆州刺史表其事于朝魯丕建初時為新野令視事一年州課第一藥崧南陽太守天性忠朴以亷約化民郭晊南陽太守明法律政有名迹种拂宛令時南陽郡吏好因休沐遊戲市里為百姓患拂出逢之必下車公謁以愧其心自是莫敢出者政有能名虞延建和中南陽太守延以新野功曹鄧衍行不職配容積三年不用上自遷衍至𤣥武司馬在不服父䘮上由是上以延為明徴為太尉劉陶桓帝時順陽長縣多姦猾陶覆按姦宄所發若神以病免吏民思而歌之曰邑然不樂思我劉君何得復來安此下民王暢南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢奮勵威猛豪右大震納功曹張敞諫更崇寛政教化遂行劉寛南陽太守温仁多恕吏人有過但用蒲鞭示辱而己每行縣輒引學官講經人皆感徳興行成瑨延熹中南陽太守志除姦邪豪强震懾舉岑晊為功曹政事悉委之楊彪光和中南陽太守以仁愛為政既去百姓思之趙戒南陽太守糾豪傑恤吏民奏免中官子弟為令長貪濁者羊續中平間南陽太守入界羸服間行歴縣邑採謡其令長貪潔吏民良猾皆逆知其狀後擊平賊冦班宣政令百姓歡服府丞嘗獻生魚續受而懸于庭以杜其再進杜襲為西鄂長縣濱南境㓂賊縱横時長吏皆歛民保城郭不得農業襲留丁壯備守遣老弱各分散就田業晉杜預咸寧中都督荆州諸軍事屯守南陽大修宛葉陂堰墾闢荒蕪租賦増羡饋餉不絶軍民獲濟丁穆順陽太守改梁州刺史未發㑹苻堅冦順陽戰敗被執至長安穆與國中人倡義謀襲長安事泄遇害南北朝李崇後魏荆州刺史時巴氐擾亂崇宣詔慰諭民夷帖然命邉戍悉還所掠齊人齊亦還其生口二境交和無復烽警酈道元後魏景明中守魯陽郡表立黌序崇勸學教山蠻服其威名不敢為寇其弟道約亦為魯陽太守為政清靜吏人安之韋孝寛後魏普泰中浙陽郡守時獨孤信為新野郡守政術俱美人號連璧劉思忌南齊新野太平時魏主引兵冦新野思忌拒守攻之不克築長圍守之城䧟不屈薛慎後周保定初為湖州刺史諸蠻從化謂慎父母風化大興有同華俗樂遜後周天和中為湖州刺史人多蠻習遜勸勵生徒化洽州境唐呂子臧鄧州刺史朱粲攻城城壊帥麾下赴敵而死陳君賔貞觀初為鄧州刺史州承䘮亂後兵多流亡君賔加意勞徠不朞月皆復業時四方霜潦獨君賔所治有年儲廪充羡詔褒之李適之唐州刺史政治清平人為作清德頌魯炅至德初山南東道節度使守南陽禄山反攻圍朞年炅晝夜苦戰扼其要衝由是南夏以完趙矜舞陽簿吳少誠反矜誓不從叛以縣來歸狄兼謨文宗時為鄧州刺史嵗旱發粟賑濟民不流徙盧祥㑹昌中為唐州刺史興復召信臣陂堰甚有勞勣益大其利宋張永德太祖時為武勝軍節度使鄧人戴之如父母趙普太平興國末出為武勝軍節度使建白時政撫治軍民大有謀為鄧人德之蘇易簡淳化初知鄧州專以詩書飾吏事甚得人心素愛竹有題西禪院碧鮮亭詩趙延進淳化初知鄧州飛蝗不入境詔褒之冦凖至道初知鄧州所得俸禄惟務施予治郡一以寛慈待民民甚德之既去為之立祠李至咸平初為武勝軍節度使節制鄧州其節槩英裂學術文章當世重之陳堯咨真宗時知鄧州有政最吏民懐之劉筠知鄧州輕徭薄賦政平訟省范仲淹仁宗時知鄧州孜孜民事政平訟理公餘營花圃為臺榭之勝許郡民游樂子純粹亦嘗知是州民便其政孫甫知鄧州在官亷介吏民不敢欺謝絳知鄧州按召信臣六門堰故迹壅水注鉗盧陂溉田至三萬頃子景温亦知是州趙尚寛嘉祐中知唐州開故渠溉田四萬餘頃四方民歸者雲布尚寛授以荒田比三年榛莽皆為膏腴増户積至萬餘治有異等民像以祠之髙賦知唐州募兩河流民計口授以曠田使耕作陂堰四十餘再滿再留比其去田増闢三萬餘頃户増萬一千三百璽書褒諭民為立生祠王琪知鄧州政尚簡静時人稱之吕誨神宗時出知鄧州凡遇朝廷有大得失言之不置劉䝉知湖陽縣常平使者㑹諸縣令議免役法䝉謂不便不肯與議退而條上其害即投劾去燕若冲元豐中知南陽縣政治清平修陂堰闢田土比屋殷富嵗資豐稔黄庭堅神宗時調葉縣尉嘗作漫尉詩知其居官有守范百禄元豐中知唐州為政以寛囹圄空虚大興學校士習丕變李常神宗時知鄧州遇事即决無停訟仁心愛民吏不敢欺李兊知鄧州為政簡嚴老益精明富人榜僕死係頸投井中而以縊為觧兊曰既赴井復自縊有是理乎必吏受贓教之耳訊之果然董敦逸知穰縣時方興水利提舉官調民鑿馬渡陂敦逸言於朝謂利不補害核實如敦逸言免役夫十六萬全舊田三千六百頃張叔夜知鄧州領南道都總管金人再侵汴叔夜即自将中軍子伯奮仲熊将前後軍入衛至尉氏與金游兵遇轉戰而前至汴軍容甚整金元好問興定間知内鄉勞撫流亡邊境寧謐後又知南陽縣劉從益大安初為葉縣令修學勵俗有古良吏風請减流亡粮一萬石流民歸者四千餘家及卒百姓以端午罷酒為位而哭元郭岩至元初葉縣尹明敏有斷仁愛無私吏民懐慕為立去思碑和元恕至元間知裕州建使舘於州東上下便之螟不入境化行俗美周尚文至元間梁縣尹建學校表忠節繪農桑圖教民栽種民懐慕之程仲賢大德初尹泌陽修築馬仁陂堰民獲其利又葺新文廟民不知勞劉益謙元統間為鎮平尹修舉六事民庶懐慕富珠哩翀為撰遺愛碑荘文昭至正間為南陽府尹勸耕興學通水利置義倉教行民富席巨川至正間同知南陽府事時王師討叛冦委巨川饋餉軍食足而民不勞主帥欲盡殪降者巨川泣言不可殺降帥悟賴以活者千數民為立碑頌徳楊彦珍至正間留守鄧州修楚堰以灌田全活饑民甚衆崔括至正中判府事興學校通水利振薄俗之除民瘼凡事有益於民者慨然以身任本朝郭雲洪武初南陽衛指揮膂力過人有謀畧築城建衛撫綏軍民咸得樂業子孫世襲其爵程本初洪武初南陽府同知以文學經術幹濟見稱時創建公署學校繕築城池相度經營皆出其意人服其能民安其業王昇洪武間南陽知府㢘謹仁恕尋以憂去民懐慕之僉事傳啟特為上章奪情起視事時夏旱昇引咎自責齋沐請禱甘雨如注民歌詠之凌雲洪武間南陽府推官振寃抑出濫繋積年滯獄一時剖决庭無留獄時論能之車敬洪武中南陽縣知縣清慎方介政令一新興學勸農平徭均税芟鋤兇惡囹圄空虚民到于今稱之唐吉祥洪武中厯葉南陽二縣知縣時徴需百出驛傳旁午吉祥處之裕如雖急遽中未嘗有厲色胡惠洪武中知泌陽縣縣革而復設民雜處两界中恃以逃賦惠撫字公平民皆歸化復為辨疆界俾其復業民遂安堵徐讓洪武中泌陽知縣為政㢘平興建學校教民開墾安輯流亡以母憂去民贐賻之悉辭不受胡清永樂中知泌陽縣縣乆乏科貢清孜孜興學親為講説至是始有其人且杜私謁革奸弊愛民如子及卒𦵏之城西耆老嵗時致奠周編洪武末南陽知縣門無私謁視民如子興利除害時有勢豪求重賄於民民甚苦之編上章禁止之比滿單車而徃民頌其徳王煥永樂初鎮平縣主簿存心寛恕臨事明决嘗督民運材木撫綏慰諭民不知勞間有疾者躬為市藥調䕶撫若已子百姓感之曹居敬永樂初知裕州㢘謹慈惠不施鞭朴妻孥衣粗食糲安於儉約九載秩滿吏民感泣不忍其去王騏永樂中知舞陽縣時夏麥失秋騏請以布花代輸公私兩便鄰縣效之歳歉民饑發不待報民賴全活比書最朝廷嘉其政績給驛還任時人榮之武斌永樂中知鎮平縣勤於撫字洞燭民情興理學政人材彬彬嘗董役臨清賑䘏貧病民感恩信歳終無一人逋者冦義永樂中知新野縣有能聲宣徳中知鄧州正直嚴眀聽訟即知誠為吏民不敢欺宿弊盡革賦役均平凡百廢墜一一修舉暇則詣學課勵生徒城中掘地嘗得一石云若要鄧州治還須冦公至其政績果能繼萊公云周志義永樂中鎮平知縣果毅公平民安其政先是縣多冦盜志義設法掩捕恒導民以禮義㢘恥未朞月而盜賊屏息陳正倫宣徳中知南陽府慈祥樂易治民事神務盡愛敬值歳旱廵行州縣修築陂堰已而得雨陂堰經修者穀大熟凡事有便於民者必興之害於民者必除之奏疏屢上多見施行郡人至今追慕其徳楊儀知鄧州學術正大以禮化民有爭訟者必諄切勸諭使相感悔不得已然後用刑為政一毫不茍立規設法逺過常情務追古之循吏在任未乆而卒孫宗富正統初知新野縣修築隄堰至今民獲其利省志郝景芳正統中知唐縣民為立善政去思碑省志王文正統中任鄧州判官政宜於民尋致仕去省志李正芳正統中由進士知南陽府有善政陞山西布政使去後民甚惜之省志龔鼎天順中由進士任南陽知府政簡民懐憂去人共惜焉省志鄭時天順初以監察御史改内鄉知縣有善政累陞陜西廵撫志省叚堅成化中知南陽府書院義祠多所創建民知觀法頗稱易治至今有餘思省志孔彦禄成化中知裕州愛民禮士有善政人咸徳之省志宋璽成化初南陽知縣治行稱最賜宴旌異志省汪雲成化末知桐栢縣時縣初創營建百出雲之功居多而民賴以不擾省志流寓諸葛亮本琅邪人漢末避亂寓居南陽之西岡躬耕隴畆好為梁父吟每自比管仲樂毅時人莫之許也惟崔州平徐庶以為信然建安中先主屯新野庶曰諸葛孔明者卧龍也将軍豈願見之乎先主即枉駕顧之凡三往乃見曰漢室傾頽姦臣竊命訃将安出亮曰将軍既帝室之胄若跨有荆益結好孫權伯業可成漢室可復矣先主曰善乃起為軍師情好日宻闗張二人不恱先主曰孤有孔眀猶魚之有水也關張乃止其興漢之志光明正大而出處之義同於伊尹三代以下一人而已富珠哩德本隆安人金㤗和間定女直姓氏屬望廣平德從憲宗南征道經於鄧見順陽山川秀麗風土淳美因家焉後以功封南陽郡侯子孫遂為鄧州人人物周百里奚春秋宛人事虞公七年而無所遇知其将亡不諫而先去之秦困於牛口之下秦穆公聞其賢以五羊皮贖之授以國政秦日强盛號曰五羖大夫騅甥聃甥養甥左傳荘公六年楚文王伐申過鄧鄧侯曰吾甥也止而享之三甥曰亡鄧者必此人也若不早圗後君噬臍鄧侯不從其後楚果滅鄧長沮桀溺俱葉人避世隱居孔子過葉見長沮桀溺耦而耕使子路問津焉長沮曰是魯孔丘與是知津矣桀溺曰㴞㴞者天下皆是也而誰以易之耰而不輟丈人葉人以杖荷蓧子路遇之問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而芸止子路宿殺鷄為黍而食之明日子路行以告子曰隱者也使子路反見之至則行矣范蠡南陽宛人事越王勾踐苦身戮力與謀滅吴以報會稽之耻及勾踐既覇遂辭越乘舟浮於五湖出齊變姓名號鴟夷子皮之陶為陶朱公三致千金再分與貧交昆弟天下言富者稱陶朱公漢直不疑南陽人文帝時為郎同舍有告歸者誤持同舍郎金去金主意不疑不疑買金償之後告歸者至而歸金亡金郎大慙以此稱為長者景帝朝為御史大夫以功封塞侯張釋之南陽堵陽人以貲為騎郎十年不得調後拜廷尉惟務持平語曰張釋之為廷尉天下無寃民景帝時出為淮南王相子摯官至大夫免以不能取容當世故終身不仕杜延年南陽杜衍人父周武帝時御史大夫延年寛厚明法律昌邑王廢勸霍光立宣帝以定策功封侯益士出奉車駕入居九卿延年卒子緩嗣侯緩六弟五人至大官杜欽延年子少年好經書目偏盲而知名於時舉直言歴陳灾異拜議郎徴詣大将軍王􅃫幕府多所匡益兄子業有材能為太常數言得失不事權貴李通宛人父守好星厯䜟記通知漢當復興乃遣從弟軼迎光武相結定議舉兵光武即位徴為衛尉封固始侯進拜大司空卒謚恭侯通性謙恭常欲避權勢能以功名終云鄧禹南陽新野人㓜游學與光武相親光武収河北杖䇿往見説曰明公莫如延攬英雄務悦民心立髙祖之業救萬民之命光武大悦與定計議任使諸将多訪於禹以前将軍持節入闗名震闗西拜大司徒封髙宻侯參議大事卒謚元侯禹内文明篤行淳備有子十三人各使守一藝長子震次襲次珎俱封侯自後累世貴寵為侯為公者三十一人大将軍以下及州牧郡守九十八人其餘侍中等官不可勝數鄧訓禹第六子少有大志顯宗初為郎中謙恕下士士多歸之㑹上谷變詔訓屯兵為防鮮卑不敢近塞元和初拜張掖太守羗胡來者待以恩信小大感悦皆欵塞納質遂罷屯兵久之卒于官羗胡旦夕臨哭者數千人家為立祠元興初謚敬侯吴漢宛人勇鷙有謀初從光武擊賊有功累拜大将軍及即位拜大司馬封舞陽侯屢率諸将破賊後討公孫述於成都八戰八克光武嘗曰吴公差强人意隱若一敵國在朝斤斤謹質形於體貌卒謚忠侯陳俊南陽西鄂人少為郡吏從光武擊銅馬五校短兵所向必破斬其渠帥光武嘆曰戰将盡如是吾何憂哉以功封祝阿侯任光宛人少忠厚為鄉里所愛為信都太守光武自薊還不知所向聞光堅守信都即馳赴之以為左將軍将兵以從旬日間兵衆大盛遂屠邯鄲建武初定封阿陵侯子隗義行内脩顯宗朝累官司空持重處正鯁言無囬朱祐宛人為人質直尚儒學從光武征河北以為䕶軍常力戰䧟陣累立戰功拜建議大将軍後封堵陽侯賈復冠軍人少好學習尚書從光武為破虜将軍有折衝千里之威後拜執金吾封冠軍侯又以功進封膠東侯復為人剛毅方直多大節既就第闔門養威當時功臣惟復與鄧禹李通得叅議大事卒謚剛侯子宗少有操行多智畧建中初為朔方太守匈奴畏之不敢入塞徴為長水校尉曽孫建為侍中光祿勲馬武南陽湖陽人從光武破王尋擊群賊力戰無前為騎都尉建武初拜捕虜将軍數從征有功定封楊虚侯後擊破西羗復増邑焉來歙新野人六世祖漢武帝時光祿大夫父仲哀帝時諌大夫歙事光武拜太中大夫説隗囂歸漢囂叛復以精兵襲破之隴右遂安進攻公孫述蜀人大懼使客刺之謚曰節侯歙有信義憂國忘家忠孝彰著子褎嗣帝嘉歙忠節又封其弟田為宜西侯來歴歙曾孫以公主子為侍中歴遷執金吾太僕時侍中周廣等讒䧟太尉楊震歴以其傷害忠良絶不與交順帝立累遷車騎将軍終大鴻臚弟祉為步兵校尉超為黄門侍郎岑彭南陽棘陽人王莽時守本縣長漢兵起率衆降討從平河北光武即位拜廷尉與吴漢等収洛陽平南方進封舞陽侯後與吴漢圍隗囂公孫述遣将救囂彭奉勑擊蜀長驅入関徑㧞武陽全蜀震駭述大驚曰是何神也乃使客夜刺殺彭賜謚壯侯子遵嗣徙封細陽侯帝思彭功復封遵弟淮為穀陽侯馬成棘陽人世祖徇頴川調守郟令從征伐平江淮地封平舒侯從征破隗囂以為天水太守後代李通行大司空事拜楊武将軍出屯常山以備北邉遷中山太守定封全椒侯卒子衛嗣衛卒子香嗣徙棘津侯杜茂冠軍人初歸光武於河北為中堅将軍後拜大将軍擊五校於魏郡清河東郡三郡清靜後累持節率将攻討鎮守北邉定封参蘧鄉侯馮異頴川父城人好讀書通左氏傳孫子兵法事光武為主簿光武徇河北值王郎起乃馳至饒陽蕪蒌亭天寒衆飢異進豆粥至南宮又進麥飯至信都拜偏将軍異為人謙退諸将論功異獨坐大樹下軍中號為大樹将軍後封陽夏侯鄧晨新野人世吏二千石娶光武姊更始立以晨為常山太守㑹王郎反光武自薊走信都晨請從擊賊光武曰以一身從我不若以一郡為我北道主人乃遣晨歸郡光武追群賊晨助射士輸餉不絶封房子侯晨樂郡職復歴中山汝南太守定封西華侯卒謚恵侯卓茂宛人父祖皆至郡守茂寛仁恭愛嘗乗車行有人認其馬觧與之性不好爭如此後以儒術舉遷宻令教化大行道不拾遺蝗不入境光武即位徴為太傅封褒德侯長子戎太中大夫次子崇以中郎給事黄門韓歆南陽人從光武攻伐有功封扶陽侯嘗為司徒好直言勿隱諱證嵗将飢凶指天畫地言甚剛切坐是免歸田里趙熹宛人少為兄報仇以信義著名光武破王尋熹有戰勞拜中郎将鄧奉反熹以書責之或譛通謀光武疑之及奉敗得書乃驚曰真長者也後拜平原太守擢舉義行誅鋤姦惡蝗不入境進拜太尉封節鄉侯卒謚正侯張堪宛人少時志美行勵諸儒號曰聖童光武拜為郎中大司馬吴漢伐公孫述㧞成都堪留撫慰蜀人大恱徴拜騎都尉漁陽太守冠弭民富有麥穂兩岐之歌朱暉宛人家世衣冠暉業於太學性矜嚴進止必以禮光武與暉父岑有舊召暉為郎中遷臨淮太守吏人畏愛之後拜尚書僕射進尚書令任延宛人年十二明詩易春秋顯名太學號任聖童更始拜㑹稽都尉建武初徴為九真太守教民嫁娶於是徼外蠻夷慕義保塞尋拜武威太守帝戒曰善事上官延對曰履正奉公臣子之節善事上官臣不敢奉詔既至威行境内後又歴潁川河内子愷官至太常郭汲南陽人仕更始為并州牧素結恩德後行部至西河有數百小兒乘駒馬來迎建武中為潁川太守帝勞以河潤九里京師䝉福徴為太中大夫馮魴南陽湖陽人王莽末四方潰畔唯魴自守兼有方畧光武嘉之徴拜嘉令縣界清靜遷魏郡太守累官司空賜爵闗内侯更封楊邑鄉侯魴性矜嚴公正在位數進忠言多見納用樊宏湖陽人光武之舅父重貲巨萬好賑宗族縣中推為三老宏有志行光武即位拜光禄大夫封壽張侯畏慎不求苟進戒其子曰天道惡盈而好謙今保身全己豈不樂哉宗族化之未嘗犯法子儵嗣有父風孫凖勵志行修儒術仕為光禄勲王常潁川舞陽人王莽末起兵入南郡後與光武合軍破王尋王邑於昆陽以功封山桑侯光武嘗謂羣臣曰常輔翼帝室心如鉄石真忠臣也遷漢忠将軍累平諸郡拜横野大将軍位冠諸将卒謚節侯隂識新野人隂貴人兄也更始中以功封隂德侯更封隂鄉侯後以征伐功當増封叩頭讓曰托屬掖庭仍加爵邑不可以示天下帝從之劉隆南陽安衆侯宗室也從世祖為騎都尉累拜誅虜将軍討平李憲屯田武當封竟陵侯後與馬援擊交趾破之定封慎侯卒謚靖侯樊􅁮新野人光武㣲時以事拘新野􅁮為市吏餽餌一笥帝德之及即位拜天水太守善惡立斷吏民及羗胡畏之道不拾遺郭丹南陽穰縣人從師長安歎曰不乘使者車終不出闗後仕更始為諫議大夫持節安集河南果乘髙車出闗建武中吴漢辟為并州牧有清平稱遷左馮翊永平初拜司徒在朝亷直公正子宇官至常山太守張宗南陽魯陽人鄧禹定河東時宗詣禹自歸禹聞其多權謀表為偏将軍禹軍到栒邑赤眉至宗為後拒戰却之諸将服其勇自是有戰必勝累遷河南都尉大中大夫終琅邪相洼丹南陽淯陽人世傳孟氏易専志教授徒衆數百人建武初為愽士歴遷大鴻臚作易通論七篇世號洼君通丹學義研深易家宗之稱為大儒李善淯陽人本同縣李元蒼頭元家俱疫死惟孤兒續始生數旬而貲財千萬諸奴欲謀殺續分其財善潜負續逃亡及長為理舊業告奴婢於官悉殺之光武聞其行詔拜善及續並為太子舍人善後遷日南太守續至河間相尹敏堵陽人初習歐陽歙尚書後受古文建武初上疏陳洪範消灾之術拜郎中帝以敏􅀶通經記令較圖䜟敏對以䜟書非聖人所作帝不納仕終諌議大夫宋均南陽安衆人好經書通詩禮累官九江太守郡多虎暴均至皆東游渡江而去遷東海相徴拜尚書令執義不撓出為河内太守政化大行族弟京以大夏侯尚書教授官至遼東太守京子意明帝時舉孝亷為司𨽻校尉孫俱靈帝時司空鄧彪新野人禹之宗父邯以功封鄳侯彪少勵志脩孝行父卒讓國異母弟府鳳明帝髙其節許之後仕州郡辟公府累官太傅録尚書事賜爵闗中侯在位清白為百僚式鄧隲訓子以後兄累遷車騎將軍定策立安帝封上蔡侯不受時西羗叛詔隲将兵討平之拜大将軍於是推進賢士楊震等列於朝廷上書還第有大議與公卿叅謀建元初復封上蔡侯尋被誣徙羅侯卒朱寵頌其寃復録其子孫韓稜舞陽人少孤養母弟以孝友稱及壮推父餘財數百萬與從昆弟仕為郡功曹五遷至尚書令以材能稱在朝數舉良吏遷南陽太守政號嚴平累進司空孫演為司徒終司𨽻校尉髙鳯葉縣人家世農業鳯顓精誦讀妻嘗曝麥於庭令鳯護鷄時天暴雨鳯持竿誦經不覺潦水流麥後為名儒教授西唐山中不應徴辟隱身漁釣而終馮良南陽人少作縣吏耻在厮役因壊車殺馬裂衣冠而遁積學十許年乃還志行髙潔鄉黨以為儀表郡太守遣丞掾致禮不從張衡南陽西鄂人善屬文通五經作二京賦精思十年乃成衡善機巧尤精天文厯筭為太史令作渾天儀復造候風地動儀人服其妙遷侍中宦官讒之作思元賦以寄情出為河間相嚴整法度上下肅然徴拜尚書左雄南陽湼陽人安帝時舉孝亷稍遷冀州刺史徴拜議郎遷尚書令累上疏條陳時政明達政體遷司𨽻校尉樊英魯陽人習京民易兼明五經善風角前後辟舉皆不就嘗有暴風起西方英謂成都市火甚盛因潄水作雨息之天下稱其藝順帝備禮徴之稱病不屈詔以為光祿大夫朱穆暉之孫五嵗以孝稱及北耽學舉孝亷為侍御史出為冀州刺史部令長聞穆濟河觧印綬去者四十餘人後拜尚書禄仕數十年家無餘貲蔡邕與門人共謚為文忠先生宗慈安衆人舉孝亷九辟有道徴不就嘗與八顧之號後為修武令時太守出自權豪取貨賂慈遂棄官去徴拜議郎道卒南陽羣士皆重其義行宗資南陽人延熹中為汝南太守署范滂為功曹凡政事悉委任之人歌曰汝南太守范孟愽南陽宗資主畫諾鄭衆南陽犨人為人謹敏和帝初加位鉤盾令時竇憲竊威權上下附之而衆獨一心王室又首謀誅憲策勲班賞每辭多受少帝念其功羙封鄛鄉侯岑熈彭五世孫少為侍中遷魏郡太守招聘𨼆逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺皷腹焉知凶灾熙卒子福嗣為黄門侍郎董班宛人少游太尊尊事李固才髙行美固誅奔赴哭泣盡哀守尸不去桓帝嘉其義許送䘮葬隠德不仕韓韶舞陽人為羸長流民入界甚衆韶開倉賑之主者争不可韶曰長活溝壑之人以此伏罪含笑入地矣太守知其德竟不坐岑晊棘陽人有髙才與郭泰等相友善雖在閭里慨然有董正天下之志太守成瑨請為功曹不避豪勢時語曰南陽太守岑公孝宏農成瑨但坐嘯胵字公孝瑨死遂不仕延篤犨人愽通經傳能著文章舉孝亷為平陽侯相到官表龔遂之墓擢用其後桓帝時徴拜議郎著作東觀稍遷侍中徙京兆尹政用寛仁與邉鳯齊名所著論銘等凡二十篇何進宛人靈帝朝以女弟為皇后徴拜侍中遷大将軍以發賊黨姦封慎侯後欲誅宦官反為所害謝該南陽章陵人明春秋左氏為世名儒門徒數百人建安中河東人樂詳條左氏凝滯數十事以問該皆為通觧之名謝氏釋後拜議郎屢陳忠言再遷諫議大夫劉廙安衆人兄望為荆州劉表從事以正諫不合投傳告歸廙遂告曹操為丞相掾屬轉五官将文學曹丕器之著書數十篇文聘南陽人獻帝時為荆州大将曹操進軍江陵厚禮待之使統本兵為江夏太守三國韓暨南陽堵陽人祖術河東太守父純陽郡太守祠縣陳茂譛暨父致大辟暨殺茂以首祭父墓由是顯名仕曹魏為太常崇明正禮廢去滛祀累官至司徒卒謚恭侯陳震南陽人蜀漠昭烈領荆州牧辟為從事累遷尚書令遣使吴與孫權升壇㰱盟交分天下還封城陽亭侯吕乂南陽人好讀書鼓琴仕蜀漢累官蜀郡太守入代董允為尚書令衆事無留治身儉約為政簡静號為清能來敏歙之後涉獵書籍善左氏春秋尤精爾雅訓詁仕蜀漢為虎賁中郎將累遷光禄大夫宗預南陽安衆人仕蜀漢為丞相亮主簿累遷屯騎校尉兩使吴孫權嘉其善對遺以大珠一斛累拜征西大將軍賜爵闗内侯許慈南陽人善鄭氏學治易尚書三禮毛詩論語又有胡潜雖學不沾治然卓犖强詘蜀漢昭烈鳩合典籍沙汰衆學慈潜並為愽士李嚴南陽人少為郡職史以才幹稱劉璋用為成都令後歸昭烈拜偏將軍進尚書令昭烈疾革嚴與諸葛亮並受遺詔輔㓜主為中都䕶統内外軍事留鎮永安封都鄉亭侯黄忠南陽人蜀漢昭烈南定諸郡忠委質隨從入蜀常先登䧟陣勇冠三軍撃斬夏侯淵以功賜爵闗内侯王連南陽人仕蜀漢為蜀郡太守建興初拜屯騎校領丞相長史時諸葛亮將征南方連久諫以不毛之地不宜以一國之望冐險而行故停留之後封平陽亭侯鄧芝新野人禹之後仕蜀漢為廣漢太守清嚴有治績入為尚書吴嘗請和及昭烈崩諸葛亮遣芝報吴芝見孫權説以吴蜀二國宜為唇齒吴遂絶魏與蜀連和芝為大将軍二十餘年卒之日家無餘財趙咨南陽人仕吴為中大夫使魏魏主問吴王何等主咨對曰聦明仁智雄畧之主也魏主問其狀咨辨析以對魏主大竒之何晏宛人進之孫尚魏公主美姿容少以才秀知名曹爽引為散騎侍郎遷侍中尚書賜爵列侯晏與夏侯元等競為清談天下士大夫慕之遂成風流不可復制鄧艾棘陽人少有大志每見髙山大澤輙規度軍營處所仕魏為尚書累遷鎮西将軍都督隴右諸軍事葑鄧侯後以平蜀功拜太尉孫朗為郎中晉張輔南陽人衡之後少有幹局初補藍田令不為豪强所屈累遷御史中丞梁州刺史嘗論司馬遷班固謂遷之著述辭約而義舉此所以稱良史也鄒湛南陽新野人父軏魏左將軍湛少以才學知名仕魏歴官太學愽士晉秦始初轉尚書即深為羊祜所器重累官散騎常侍國子監祭酒所著詩論數十篇樂廣南陽淯陽人善談論每以約言析理以厭人之心王戎為荆州刺史舉為秀才衛瓘見而竒之曰此人之水鏡也累遷侍中河南尹後至尚書令劉喬南陽人仕為秘書郎遷太子洗馬拜尚書令累遷御史中丞以功封安衆男子挺頴川太守挺子耽光禄大夫耽子栁尚書左右僕射郭舒順陽人㓜請其母從師嵗餘便歸粗識大義鄉人少府范晷宗人武陵太守郭景咸稱舒當為後來之秀終成國器仕至梁州刺史范晷順陽人仕為河内郡丞太守裴楷薦為侍御史轉馮翊太守綏撫百姓甚有政聲累遷凉州刺史加左将軍魯襃南陽人好學多聞以貧素自立元康之後綱紀大壊襃傷時貪鄙著錢神論以刺之朱序義陽平氏人為梁州刺史鎮襄陽苻堅遣将圍序城䧟被執後謝石與堅戰淝水序唱言堅敗遂大潰序乃得歸拜龍驤将軍豫州刺史子湛仕至益州刺史孫修之立身清白仕宋封南昌侯韓延之堵陽人仕為平西府録事叅軍劉裕伐司馬休之宻書招延之延之報書辭甚激厲以裕名父翹字顯宗於是已字顯宗名子曰翹示不臣劉氏後入魏為武牢鎮将賜爵魯陽侯南北朝宗少文南陽湼陽人善圖書琴畫精於言理每游山水輒忘歸劉宋時前後徴召皆不應古有金石弄為諸桓所重桓氏亡聲遂絶惟少文傳焉趙隱南陽宛人性聰敏善書訃安閒樂道為雅論所歸仕元魏為丞相参軍専掌機宻文翰神武稱其小心恭慎禮遇獨重以功進爵安樂公累遷尚書左僕射封宜陽王張敬兒冠軍人父醜官至節府叅軍敬兒有膽氣好射猛獸發無不中仕劉宋累官寧蠻叅軍泰始初轉驃騎叅軍後以平義嘉功除南陽太守及齊受禪轉侍中車騎将軍樂頥湼陽人仕劉宋為京府叅軍性至孝父在郢亡即號泣徒歩而徃扶歸葬之嘗得病忍而不言齒被至碎恐母聞之哀已也吏部郎䖍果之徃候之為設食惟菜葅而已果之不能食母出其饍果之曰卿過於茅季偉顧我非郭林宗劉湛湼陽人博學史傳自比管葛不為文章不喜談議仕劉宋為廬陵王義貞長史時居武帝憂義貞以臑酒進湛曰既不能以禮自處又不能以禮處人後遷侍中太子詹事湛負才氣嘗慕汲黯為人因名其子曰黯范泰順陽人仕劉宋為中書郎繼領國子祭酒少帝在位多失泰上封事苦諫進位侍中泰博覧篇籍撰古今善言二十四篇子􅁮好學善文章𨽻書曉音律元嘉初為宣城太守累遷太子詹事所著有後漢書師覺元魏涅陽人少有素業以琴書自娱忽見人持書一函題曰至孝師君俄而不見奔歸于家一呌而絶良久乃蘇後撰孝子傳八卷累辟不就宗慤南陽人少時叔父嘗問其所志慤荅曰願乘長風破萬里浪仕劉宋為振武将軍伐林邑國克之珍寳山積一毫無犯後封洮陽侯累遷豫州刺史平竟陽有功進光禄大夫卒謚肅侯從子夬少勤學有局幹歴太子右衛劉渢南陽人父紹中書郎渢事後母至孝雖極捶楚孝不衰母亦感悃慈愛遂隆友愛弟濓仕元魏為遙光諮議求出為丹陽丞及遙光敗渢曰吾為人作吏不避死弟濓曰吾何忍獨生俱見殺張耀南陽西鄂人仕元魏累遷步兵校尉歴岐東荆州刺史清直素著勤於其事尋加大将軍卒贈司空謚曰懿趙文深南陽人少學楷𨽻雅有鍾王之則仕元魏為大丞相府法曹叅軍以善碑牓得名嘗刻定𨽻書六體行於世張孝秀南陽宛人仕元魏為州從事刺史陳伯之叛孝秀與州中士大夫謀襲之弗克遂入匡山學道力田逺近歸慕赴之如市性通率不好浮華博涉羣書善談論工𨽻書凡諸藝能莫不明習劉虬涅陽人喬七世孫徙居江陵抗節好學仕為當陽令罷官歸家齊建元初辟為荆州别駕復徴為國子博士俱不就子之遴之亨俱為南郡太守孫廣德歴河東太守仲威為中書侍郎從弟坦歴官蜀郡太守庾蓽新野人仕南齊為驍騎将軍功曹史有口辨後為荆州别駕清身率下妻子不免饑寒明帝初勑褒羙累遷會稽郡丞清節愈厲庾杲之蓽兄子仕南齊為尚書駕部郎清貧自業累遷尚書左丞王儉領吏部用為衛軍長史蕭緬與儉書曰庾景行汎緑水依芙蓉何其麗也時人以儉府為蓮花池故緬書美之景行杲之字累遷至侍中庾易新野人性恬静以文義自娱南齊臨川王表薦之餉麥百斛不受建武中徴為司空主簿不就子黔婁性至孝歴官散騎侍郎於陵博學有才累遷黄門侍郎肩吾八嵗能詩歴官度支尚書庾域新野人梁文帝為郢州辟為主簿羙其才為荆南杞梓後為懐寧太守罷任還家妻子猶事井臼仕終寧蜀太守子子輿性至孝父没於蜀䘮還至瞿唐適水漲子輿撫心長呌水忽安流官至巴陵内史庾季才新野人八嵗誦尚書十二通易好占元象梁湘東王繹引授外兵叅軍累遷中書郎領太史封宜昌縣伯所撰有靈臺祕苑垂象志等書樂藹清陽人廣六世孫方頥隆凖舉動醖籍仕南齊為驃騎将軍叅荆州事梁天監初累遷御史中丞終廣州刺史子法才法藏俱有羙名法才累官江夏太守法藏官至録事叅軍法藏子子雲為光禄卿死節范雲舞陽人初仕南齊為尚書殿中郎入梁為吏部尚書封宵城侯遷尚書左僕射從兄鎮字子直仕為宜都太守曹景宗新野人以膽勇聞頗愛書史每讀穰苴樂毅傳輒嘆息曰大大夫當如是梁武帝表為竟陵太守及帝起兵聚衆從之累功封湘西縣候除郢州刺史加都督卒謚曰壮蔡道恭冠軍人初仕南齊為右将軍時議北伐令先屯洛口至壽春士女歸降者數千人梁武帝起兵以為司州刺史善於備禦北魏攻不能克甥馮亮博覧諸書𨼆居嵩山宗越葉人為襄陽隊主累立戰功封范陽縣子復以功進爵為侯召為游擊将軍改嶺南東海太守越善立營陣每數萬人止頓自騎馬前行使軍人隨後馬止營合未嘗参差胡僧祐冠軍人有武幹仕後魏為銀青光禄大夫避難歸梁侯景圍巴陵元帝拜為武猛将軍以援之大敗景将拜領軍将軍岑之敬南陽棘陽人五嵗讀孝經每焚香獨坐親戚嘆異之十六擢髙第仕梁為夀光學士累遷征南府諮議参軍博涉文史雅有詞筆以篤行稱宗懔涅陽人少聦敏好讀書鄉里呼為小兒學士為梁元帝記室嘗召宿省使製龍川廟碑一夕便成三為縣令入後周為車騎將軍岑善方棘陽人清慎有器局愽綜經史仕梁為散騎常侍所著有文集七卷七子皆為操行庾詵新野人㓜聦警篤學經史百民無不該綜而性夷簡愛林泉梁普通中詔為黄門侍郎不起卒謚貞節處士唐岑文本鄧州棘陽人性沉敏善文辭貞觀初為祕書郎遷中書侍郎專典機要進中書令有憂色母問之曰位髙責重所以憂也或勸營産業嘆曰吾以文墨位宰相俸已重矣尚何産業為卒謚曰憲從子長倩官至文昌右相封鄧國公岑羲文本孫第進士武后時為金壇令弟仲翔為長洲令仲林為溧水令皆有治績羲遷中書舍人敬暉欲上表削諸武衆畏三思不敢為羲獨為之進吏部侍郎掌選剛亷官至侍中封南陽郡公自文本至羲一門三相在清要者數十人岑參文本後登天寳進士第官至侍御史能詩與李杜相頡頏後為嘉州太守韓思彦鄧州南陽人舉下筆成章志烈秋霜科授監察御史廵察劍南益州髙貲兄弟相訟累年思彦敕厨宰飲以乳二人悟泣請輟訟後太白晝見勸帝脩德帝責中書令李義府不言義府譛思彦免去後復召為御史子琬官至殿中侍御史張廵南陽人愽通羣書曉戰陣法氣志髙邁開元末擢進士第為清河令有治績後調真源令禄山反廵起兵討賊與許逺同守睢陽大小四百戰粮盡城䧟罵賊而死贈楊州大都督郡人廟祀焉張建封南陽人少喜文章慷慨尚氣代宗詔李光弼進討蘇常盗建封請前諭盗一日降數千人德宗時鎮徐泗來朝召見眷遇異等北還鎮親賦詩以錢在徐十年一軍大治有文章傳世趙宗儒鄧州穰人貞元中進士累官翰林學士時父驊遷秘書少監徳宗欲寵其行使一日並命累官吏部尚書以司空致仕范傳正鄧州順陽人舉進士宏詞髙第授集賢殿校書郎歴歙湖蘇三州刺史有殊政進拜宣歙觀察使代還改光禄卿韓翃南陽人仕為駕部郎中知詔誥有能詩名號大厯才子時有兩韓翊其一為刺史宰相請掌誥孰與徳宗曰與詩人韓翃終中書舍人庾敬休鄧州新野人擢進士第又中宏詞拜起居舍人累遷尚書左丞性夷澹不邇聲色弟簡休官至工部侍郎朱葆光南陽人梁祖簒唐葆光與唐舊臣顔蕘李濤數軰挈家南渡寓潭州每正旦冬至必序立南嶽祠前北望號慟殆二十年後濤北歸葆光遂家於衡子昻讀書至萬卷仕宋累官翰林學士昻澹於榮利進退有禮有集三十卷五代張澹南陽人好學有才藻五代晋進士桑維翰器之歴左拾遺禮部員外郎知制誥宋初加祠部郎中權直學士院尋攝殿中監賜金紫澹羙風儀善談論歴官中外所至皆治宋王仁贍方城人性倜儻仕為武德使知泰州累遷宣徽北院使判三司後從太宗征太原加檢校太傅周湛鄧州穰人舉進士甲科歴官諸州拜右諌議大夫知襄州湛天資彊記吏胥滿前一見輒識其姓名治煩劇能得其要所至喜條上利害前後至數十百事以忤夏竦徙知相州未幾卒湛善射弩雖隔屋亦中的云賈黯鄧州穰人擢進士第一累官給事中權御史中丞嘗合議以濮王為皇伯執政弗從㑹被疾以翰林侍讀學士知陳州未行卒口占遺奏數百言猶以濮王議為請初黯母陳歸宗繼母史在堂後迎陳歸二母不相善黯能安以事之黯修潔自喜在朝數言事人稱其介直王襄鄧州南陽人初名寧登進士第累官權知開封府事縲繫滿獄襄晝夜决遣再閱月獄為之空後為兵部侍郎使髙麗還對稱㫖賜名襄歴工部吏部尚書同知樞宻院事加資政殿學士金人再入冦出為西道總管元暢師文南陽人㓜警悟家貧無書手録口誦過目輒不忘弱冠謁許衡與姚燧髙凝相友善至元間陳時政十六策安童竒其才累官翰林學士卒追封魏郡公謚文肅長子篤仕至江東道肅政亷訪副使劉整鄧州穰人沉毅有智謀善騎射宋制置使孟拱攻金信陽整為前鋒克之累遷知瀘州軍事呂文德忌之遂附元授夔府安撫使遷上将軍都元帥習水戰攻圍襄陽進河南行省叅政遂破樊城守襄陽者以城降進中書左丞卒謚武敏孫嗣鄧州人善騎射倜儻不羈金末兵至集鄉兵之衆據守武當元初歸附以平亂功累官至蘄黄道宣慰使卒追封樂安郡公謚武康李友端鄧州人𨼆居不仕表儀鄉里有女擇配見富珠哩翀曰此佳士也遂以女妻之郡大姓李氏集書萬卷建書院延友端訓誨子弟從者甚衆以夀終門人私謚曰貞隠先生戈毅梁縣人舉進士第為太康路提舉倡明正學盪滌餘習文風為之一新王明嗣舞陽人擢進士第官至翰林國史院編修遷國子司業博學多才聲譽昭著張寛舞陽人舉進士為國子伴讀遷沔陽知府累官都水屯田使名冠當時西漢傑葉縣人累官至禮部尚書封南陽郡侯王儀鄧州人天資明敏力學不倦累官至西臺御史中丞所著有文集蕭景鳯鄧州人初嘗出仕已而辭職養母以終其身孛术魯翀髙其行遂仿韓昌黎董生行為作蕭卿行以紀其實王𤦺鄧州人博學有文與姚燧為親友累官至廣西亷訪使聲譽大振富珠哩翀德孫累官至集賢學士禮部尚書浙江行省叅政其學一本於性命道德文章典雅學者仰為儀表其兼國子祭酒時帝師至京有㫖朝臣郊迎大臣俯㐲進謁惟翀立進曰帝師天下僧人師也余天下儒人師也請各不為禮帝師笑而起飲卒封南陽郡公謚文靖有文集六十卷劉子平鄧州人博學尚氣兄弟五人同居共㸑力農厚俗凡喪葬祭禮悉依文公家禮鄉人化之以為矜式名重於士林俱登上夀成遵鄧州穰人㓜敏悟日記數千百言長為國子生見虞集集曰適觀生文今見生貌公輔器也元統初舉進士累官中書左丞每叅大政决大議持正不囘為衆所服有奏議塞責藳並文集傳世陳介鄧州人力學强記博通經史汴省以文學辟主師席不就性至孝親終廬墓盡哀鄉人化之魯文靖為撰墓碣備述其行白景亮南陽人明法律善書筭累官台州路總管所至均徭役興學校儒風大振搢紳稱頌焉性亷介勤苦自奉甚薄妻尤儉約惟以脫粟對飯部使者上其事特詔褒美賜以宫錦智受益鄧州南陽人以善書負時望至元中擢荆湖行省都事征交趾轉行省郎中計度餽餉歴遷宣慰副使練習事物吏不能隱及為潭岳總管郡人大恱豪縱者避去庭無留事賜金虎符進兩浙運使李威鄧州人天資嚴重剛毅不撓元末領毛胡蘆兵為陜西乾州金牌總帥後與主将不合棄官居家尚義樂施鄉人感化家範甚整子弟肅然夀及八旬而卒子孫多至顯宦李奉先葉縣人天性至孝父卒既葬竊自嘆曰奉先兒時父嘗戒家人曰兒㓜勿令獨入林野慮其驚恐今親没一旦棄於林野吾心惻然安所忍乎乃結庵於墓側晝夜臨哭其中植樹數百株時呼為孝子林本朝唐俊南陽人誠信亷介終始不渝洪武初授兵馬指揮拜監察御史持部使者節叅預戎機以政事著稱超拜福建右叅政鄭剛南陽人天資英邁質直無偽家貧嗜學洪武中釋褐胄監署廣西布政使事累官工部右侍郎恭慎小心為時所重持節廵視江淮卒于官洪熈初贈工部尚書制稱其資禀純實蹈履清慎夷險之際一心不渝周炳舞陽人事母焦氏至孝温凊定省無違禮母嘗病甚炳哀號籲天願以身代母又思獐肉炳四出求之弗得悲痛愈切晚忽有獐入其室殺以㗖母病遂愈事聞洪武中旌表其門宋玒唐縣人洪武中舉人材知祁縣事亷慎有為以才行超卓遷監察御史執法不阿不避豪勢擢知南雄府以母憂去未幾奪情起為金華知府有時名趙安葉縣人洪武中由禮部主事權池州知府剸繁治劇為政有聲李新鄧州内鄉人天性剛直洪武末由太學生任兵馬指揮歴監察御史振舉憲度轉工部郎中能聲益著官至戸部右侍郎王禮鄧州人永樂中由鄉舉入太學擢知大興縣尋轉兵馬副指揮以勤能著稱歴戸部主事南京刑部郎中以績最陞貴州布政司叅政後引疾致仕卒焦宏葉縣人永樂中進士累官戸部右侍郎督饋餉於麓川事竣還京便道過家而卒宏為御史時嘗按貴州平反疑獄全活者數百人為江西按察副使時理寃禁弊擊彊扶弱善類多賴之及為布政小民咸被其澤弟寛亦舉進士歴官監察御史遷陜西布政司叅政卒于官李賢鄧州人宣徳癸丑進士累官吏部尚書歴陞少保卒年五十九贈太師謚文達賢孝友忠信謙恭嚴宻居位好崇尚正學能容善類得時行志自三楊後莫能及之言行録王鴻儒南陽人成化丁未進士歴官山西提舉吏部侍郎終尚書為名臣卒謚文荘列女雷氏富珠哩翀子逺妻逺為襄陽尹拒賊被害雷為賊所執欲妻之乃詆賊曰我魯參政冡婦肯從汝狗彘生乎遂見殺仙釋廣成子軒轅時人隱居崆峒山石室中黄帝造焉問以至道之要荅曰至道之精窈窈𡨕𡨕至道之極昏昏黙黙無視無聴抱神以静形将自正必静必清毋勞爾形母搖爾精母俾爾思慮營營乃可長生慎内閉外多智我敗我守其一而處其和故千二百年未嘗衰老隂長生新野人漢和帝后之曽祖不好榮位潜居隱身專務道術聞馬明生者得度世法乃求見於太和山中執役二十年不懈乃偕入青城山立壇㰱血以太清金液神丹授之丹成著書九篇白日昇天而去南陽公主下嬪王咸漢綏和間王莽秉政謂咸曰國危世亂但當退而修身咸不能從公主遂於華山結廬嵗餘精思丹道乘雲氣冉冉而去咸追之昇層嶺漠然無迹忽於嶺上見遺朱履一雙収之已化為石後人名其峯曰公主峯麻衣子姓李名和生而紺髪羙姿稍長厭世穢腐遂入終南山忽遇一道者授以道祕戒之曰南陽之間湍水之陽有山靈堂岩洞其旁神開汝鄉汝則往之可以翕神功於蒼茫麻衣遂往求之遇樵者導至其所居洞中十有九年晋義熈間大旱居民張奭率衆請焉麻衣以無術拒之請者不輟一夕忽有少年十二人謂麻衣曰若再請但許之麻衣怪而諾之翌日雨果大至十二人者復來拜曰吾屬龍也上帝以師道業成勑令輔師行化耳劉宋大明初年百有一嵗儼坐而逝陳永伯南陽人得淮南王七星散方試合服之二十八日忽然不知所在永伯兄子名増族年十七亦服之其父繋其足閉於宻室中書夜守之滿二十八日亦復不知所之本方曰服三十日而失其所在後人不復敢服服之者臨去必有仙官來迎之但人不見耳張虚白鄧州南陽人通太乙六壬術留心丹竈遇真人得秘訣宋徽宗聞其名召管太乙宫恩賚無虚日官太虚大夫金門羽客出入禁中終日論道無一言及時事曰朝廷事有宰相在非子所知也金人尤重之以為神仙忽一日曰某年月日吾當化去至期果然景知常鄧州人少從趙氊襖學道顔如丹渥宋太宗知其名召至俄辭去嘗遇吕真人時或語唐昭宗以來事殆數百嵗或祈寒浴溪或大暑偃地有書生病憊􅌵酒飲之即能行所居夜神光滿室卒舉其棺甚輕開視惟衣衾有異香焉張仙姑南陽人莫詳其所以人有疾仙姑輒瞑目潜為布氣攻之俄覺腹熱如火已而鳴聲如雷雖沉痼者無不愈宋徽宗嘗召至東都後不知所終天然初習儒業将舉進士第道遇禪客曰選官何如選佛天然悟即謁馬大師大師曰我子天然遇留即止後振錫南陽見山巒疊出方四顧之頃忽見一老人云此大留二留三留之山也師因憶大師之言遂棲止之唐長慶中示寂丹霞寳厯初謚智通禪師塔號曰妙覺云真禪師唐天元間駐錫風穴山嘗襲衡陽三昧其化大行一夕溘然示寂守宰李暠闍維之得舍利千粒元宗謚為七祖法聰南陽新墅人八嵗出家至襄陽傘盖山白馬泉築室以棲梁晋安王來都襄雍乃造禪室見堂内有虎聰以手按其頭虎即閉目伏地王因告境内虎災聰即入定須臾十七大虎至聰命弟子以布繩繫頸而去自是無害又見白龜就聰手取食曰此雄龍也遇屠者驅猪百口即時觧散因㫁殺業所居夜放光明不假燈燭年九十二端坐而化雲定平山人生而異常長乃出家每曰法離文字豈可溺於筌蹄遂遊歴四方聞方城之東有名刹曰普嚴乃得遺址募縁重建緇流争歸之預知圎寂其徒建塔刻銘以紀其實智通燕人自幼神清貌秀頴悟善記初慕全真謁道者弗合遂落髪入法門禮璧峯金師即聞奥㫖夙契脗合往遊大乗山因駐錫焉乆之百廢具興緇素雲集永樂中召至京師居天界寳刹端坐而化明一統志卷三十
