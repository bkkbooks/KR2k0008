body:
  text: 明一統志卷七十七明李賢等撰延平府東至建寜府建安縣界五十里西至汀州府清流縣界三百二十五里南至福州府古田縣界一百二十里北至邵武府邵武縣界一百八十里自府治至南京二千四百七十里至京師五千二百九十三里糧八萬六千石零建置沿革禹貢揚州之域天文牛女分野周為閩越地秦屬閩中郡漢為東冶縣地屬㑹稽郡東漢屬㑹稽南部都尉三國吳屬建安郡晉以後因之隋屬閩州唐為建福汀三州地後於此置延平軍五代時改軍為延平鎮尋於鎮置鐔州南唐改置劒州宋太平興國中因利州路亦有劒州改曰南劔州屬福建路元至元中陞南劔路後改曰延平路本朝洪武初改為延平府領縣七南平縣附郭本漢㑹稽郡地吳置南平縣屬建安郡晉改曰延平縣劉宋廢五代時閩為延平鎮改永平鎮後扵此置鐔州及龍津縣南唐改縣曰劒浦為劒州治宋縣仍舊元復改曰南平本朝因之編户九十九里將樂縣在府城西二百二十里本漢㑹稽郡地吳置將樂縣屬建安郡隋省唐復置將樂縣屬撫州尋省後復置屬建州五代晉時閩以縣置鏞州尋復為縣宋改屬南劎州元仍舊本朝因之編户六十七里大田縣在府城南一百二十里本朝析置編户四十里沙縣在府城西一百二十里本晉延平縣地劉宋析置沙村縣隋改為沙縣尋廢唐初復置屬建州後省入建安永徽中復置後屬汀州南唐改屬劔州宋元仍舊本朝因之編户一百四十里尤溪縣在府城南一百五十五里本延平縣地唐開元末開山洞置尤溪縣九屬福州南唐屬劔州宋元仍舊本朝因之編户六十里順昌縣在府城西一百二十里本吳建安郡地唐貞觀初為漿水塲垂拱中為蠲科鎮景福中改永順塲南唐始置順昌縣屬劔州宋元仍舊本朝因之編户五十八里永安縣在府城西南二百里本沙尤溪二縣地本朝景泰三年分沙縣新嶺以南尤溪縣寳山以西地置永安縣編户六十六里郡名延平唐名劔浦宋名形勝負山阻水為七閩襟喉延平志劔溪環其左樵川帶其右宋金良弼雙溪樓記七閩號東南山水佳處延平流又冠絶扵他郡劔溪環其左樵川帶其右二水交山川清明偉麗為東南最宋楊時修造記占溪山之雄當水陸之㑹宋黄裳雙溪閣致語襟帶髙下甌閩占溪山之雄舟車往來延平當水陸之㑹崇山峻嶺為郭郛驚湍激流為溝池楊時資聖院記風俗民儉嗇質直延平志民儉嗇而尚氣義質直不為姦詐五歩一塾十歩一庠同上家樂教子五歩一塾十歩一庠朝誦暮絃洋洋盈耳諸儒講明道義遺風餘教猶未泯延平志以耕織為生劍浦記士以詩書相勸民以耕桑為務順昌記山川九峯山在府城南九山苕蕘相接為郡境諸峯之冠展旗山在府城南狀如張旗宋黄裳詩崢嶸南揖展旗山旗鼓相臨縹緲間虎頭山在府城西山形如虎踞衍仙山在府城東北一十里古號含源山昔衍客結廬煉丹其上傳以為仙去因名山有支峯巖中一石佇立如佛名石佛山金鳳山在府城西南山形如鳳髙出羣山天柱山在府城西屹立凌空如柱九龍山在府城東南一百二十里其山九峯蜿蜒如龍右有獅子巖石盤旋俯伏如獅子狀左有禪巖石壁峭抜龜山在將樂縣北三里山形如龜宋楊時歸休扵此因號龜山封山在將樂縣北龍池都其山髙大羣峯環拱為一邑之鎮山有洞昔楊道真君扵此得道宋楊時有記含雲山在將樂縣治西山上常有雲氣氤氲下有寺楊時嘗築室讀書扵此五馬山在將樂縣治西南五峯森列如馬馳狀金泉山在將樂縣南建安記云山南枕溪有細泉出沙淘之得金石壁山在將樂縣治西南蒼崖壁立險阻難登三石山在將樂縣西南山上有三石色紅白似人形俗呼為三郎石翠簾山在將樂縣南五里蒼翠髙聳如垂簾狀天湖山在翠簾山上三面峯環中夷而曠有龍窟承天瀦水故名孔子山在將樂縣東二十五里屹立溪中舊傳山有獸人形名曰天階山在將樂縣南二十五里髙若升天故名山有聖泉又有寳華洞相傳赤松子採藥處石帆山在將樂縣東北三十里坤元録云將樂石似張帆東寳山在將樂縣南五十里朝暮嘗有光㷔如寳氣仙靈山在將樂縣西南七十里西華鄉百丈山在將樂縣北一百八十里與江西南豐縣分界懸崖絶壁髙出羣山昔越王嘗扵此山建置臺榭鳳凰山在沙縣治南以形似名舊多種桐獬豸山在沙縣治北昔鄧將軍光布云百年後縣當出忠義之士為國觸邪後邑人為臺官者相踵摧擊姦宄人謂此山之應越王山在沙縣東南一十五里俗呼為越王寨山頂有石碁局及越王墓㓜山在沙縣西北一百二十里乃龍峽之地中有山魅形似人生毛黒色身長丈餘逢人而笑鄉人謂之山大人又云山魈或野人也爾雅云狒狒如人披髪迅走食人即此栟櫚山在永安縣治北上有天柱石及仙人馬跡中多産栟櫚木延平志峯巒巖岫凡十餘所神刓鬼劃髙下相屬生雲吐霧隠見無時草木䝉茸冬夏一色宋李綱嘗目為小武夷山中有十二景多有賦詠斗山在永安縣治東南其山髙峻自頂凹下廣可五里山背有風穴雲洞每雲冐山即雨有石龍居竇中樵者攀縁而至得覩其頭角鱗爪之異伏獅山在尤溪縣治北狀如伏獅為縣之鎮山董山在尤溪縣北二十里上有石室相傳為董真人煉丹之所雙髻山在尤溪縣北二十五里峭壁萬仭如倚雙劔扵天外又名雙峯鷄籠山在尤溪縣西二十五里以形似名靈旗山在尤溪縣南三十里望之如旗九仙山在尤溪縣西南四十里舊名仙山巍然秀拔人迹罕到上有金鯽池石棊局黒白二石馬及煉丹竈金樓山在尤溪縣西南六十里聳翠雲間如樓閣狀龍門山在尤溪縣南九十里有泉出其顛嵗旱不涸相傳有龍居焉雪山在尤溪縣西一百五十里龍山在順昌縣治南狀如逰龍大明山在順昌縣治西南孤峯特立日升先照其頂鳳山在順昌縣西二十里五峯疊翠髙數百仭景靈山在順昌縣西北二十餘里與鳳山對峙常有霧䝉其上嵗旱禱雨多應七臺山在順昌縣西四十八里髙峯峭壁幾至千丈山有微雲即雨土人以為候唐㑹昌中有恵應大師扵此山乗虎出入超華山在順昌縣西北五十五里山頂有菴下有泉出石罅中分為五澗有田園及居民數十家梅仙山在順昌縣北七十里界扵甌寜順昌之間山顛平坦廣袤數里相傳梅福嘗煉丹于此小鷲峯在府城東屴崱如鷲鳥狀宋元祐間漕使曹子方過此愛其竒秀有詩云靣前山好無人識定是飛來小鷲峯蓮花峯在府城東層巒疊嶂狀若蓮花文筆峯在府城南一十五里髙出羣山之表宋張致逺新學記九龍雙旌衍仙文筆諸峯皆秀拔摩雲山門峯在將樂縣西一十五里髙聳雲霄下有两石相峙如門中逕可通往來祥雲峯在沙縣東五里有祥雲菴七峯在沙縣治南又名七朶山皆石壁峭立由水底崚層而出宋李綱各命之以名曰朝陽碧雲妙髙真隐桂花凝翠東凝翠西毓秀峯在尤溪縣治南峯下即南溪書院君子峯在順昌縣西南二十五里又有髙峯宋尚書廖剛家其下分枝嶺在尤溪縣西南一百七十里南臨泉州徳化縣嶺為界上有大樹一枝南向一枝北向以樹枝分二縣境故名黎嶺在將樂縣西北三十里百花巖在府治東北石壁峭立春時百花鮮麗故名中巖在府治東北五里髙聳衆山之上有瀑布自巖中飛下西巖在府城西南三十餘里巖石崔嵬相傳唐寳厯初有蔡栁二禪師創庵山神示現二師拔松倒植于地而松倒生山神乃歸向虎頭巖在將樂縣東南五里有石門自山下通山上其中明爽可居楊時有記翠雲巖在沙縣西一百八十里巖有三洞穴有三石笋頼巖在尤溪縣西三十五里有洞廣三四里靈恵巖在尤溪縣西一百四十里有竇可入内有若㕔事者二所可環坐千人龍頭巖在順昌縣治南髙山之上山水勝槩一目可盡玉華洞在將樂縣南一十里有兩門相去一二里中分二路㑹于後門此洞之隂有寳華洞洞之中有靈泉遇旱禱之輙雨觀音洞在尤溪縣北昔陸道人廬扵山間鑿石得像如觀音宿雲洞在尤溪縣西七十里盖仙靈山十竒之一也龍門洞在尤溪縣東九十里中有石龍石床石棊局棊子宋朱松詩阿逰陸沉乆亦復太癡絶未成安一枝况乃辨三穴唯餘愛山意如水心東折首鼠今幾年顧影愧瓊玦那知龍門客塵底抱闗闎虚簷日偃仰蒼壁對横截拄藤危磴響濯足細泉潔東薪取竒觀滴乳當嘉設摩石驚蜿蜒信矣耆舊設靈龜洞在順昌縣東南四十里洞有靈龜紫色如金有石如鍾磬魚鼓之狀叩之其聲清越三溪在府前自順昌沙縣來者曰西溪自建溪來者曰東溪二溪㑹于劍津鄉人呼為丁字水者曰南溪又南流與尤溪合抵福州南入于海謂之三溪尤溪在尤溪縣洲多尤姓故名今尤氏自言其上世本姓沈避王審知諱故改云太史溪在七峯下宋李綱初以太史謫官于此故名嘗題詩有七峯倒影蘸層碧十里平津流向東之句海溪在將樂縣西北八十里沙源在沙縣南源出汀州寜化縣水嶮􅇖如龍門過縣東至劍津合建溪下福州劍津在南平縣治東建寜邵武二水合流之所晉雷煥得二劍扵豐城以一與張華留一自佩華死失劍所在其後煥子佩劍渡延平津劍躍人水化為龍因名劍津亦名劍潭唐歐陽詹詩想像精靈欲見難通津一去水漫漫空餘昔日凌霜色長與澄潭生晝寒七星井在府治南水味甚美夏月不竭龍井在將樂縣凡三一在玉華洞内一在寳華洞後一在縣南一百里泉味甘美靈源井在尤溪縣治西深十餘丈遇米價髙則湧溢四出平則止四五尺鄉人以是為占澗泉在府治南源出山顛縈廻石澗泓深清潔可愛靈泉在將樂縣北封山之顛相傳昔人禱雨扵此有泉湧出汲而洒之輙雨故名今有石穴無泉聖泉在沙縣治東南其泉有三青膽瓶在山巖中鄉人嵗旱禱雨其中視瓶内有小紅蛇即雨金泉在南平縣治西百歩潭中有沙人或披沙淘之往往得金張公渠在順昌縣治北本朝洪武初知縣張溍鑿流經十里分注縣郭民利之仙洲在府城東有山介于二水之間俗呼仙洲黄龍洲在府城東俗以此洲每春水後視沙多寡占嵗豐歉宋黄裳詩㸔取黄龍沙斗起滿城歌吹入豐年港灘在南平縣東溪者五西溪者十南溪者七凡二十有二其水湍急其石㢘利舟上下失勢輙破溺其黯淡天等九灘宋時嘗加䟽鑿而溪之險稍平倪思有詩土産鐵有冶在南平縣者四在尤溪縣者十七銅尤溪沙二縣出銀南平將樂尤溪沙四縣出茴香茶南平等縣出金橘南平沙縣出白苧布諸縣俱出將樂尤佳滷水石南平出宋葉夢得避暑録石有三種其一出滷水可為硯雖細潤而不甚發墨花紋石南平出色青紋素有山水禽魚形狀可為硯為屏公署延平衛在府治東即元之總管府本朝洪武初改建將樂守禦千户所在將樂縣治南洪武初建守禦永安千户所在永安縣治東北景泰三年建𨽻延平衛學校延平府學在府治東北宋天聖中建後移建扵郡西尋復舊本朝洪武初重建南平縣學在縣治西宋紹興中建本朝洪武初重建將樂縣學在縣治東南宋建于城南元徙今所本朝洪武初重修大田縣學在縣治西本朝建沙縣學在縣治東宋慶厯初建本朝洪武初重建尤溪縣學在縣治東北舊在縣東南宋慶厯中建後徙于此元至正間重修順昌縣學在縣治東舊在縣治西宋皇祐中徙于此本朝洪武初重建永安縣學在縣治東景泰三年建書院諫議書院在沙縣治西宋陳瓘嘗為諌議嘉定初郡守余景瞻即其舊宅建為書院本朝永樂中重修龜山書院在封山麓即龜山先生楊時舊宅宋咸淳初建本朝洪武七年重建延平書院在劍津之陽宋嘉定間郡守陳宓建扵南山下因稱李侗為延平先生故名後守董洪徙建扵此中有