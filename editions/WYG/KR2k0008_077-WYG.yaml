逋迯彛至撫字有方科差不擾民信而恱之多還復業以主學宫壇宇莫不一新甫三年卒于官邑人哀慕不已立碑頌徳丁繼宗景泰間興化府經歴風度閑雅政事平實郡民苦供億繁重嘗奏請輕之至今䝉其利郡志丁泰天順中通判興化府為政頗有風力清戎督籍稅糧之類皆郡志措置有法化行政舉百姓安之楊銓正徳間知興化府有恵政民為立碑以紀其績仍請于朝立廟以永其祀郡志人物唐林披莆田人讀書一覽即記李栖筠薦授太子詹事子九人俱為刺史號九牧而藴藻尤知名林攅莆田人貞元中為福唐尉居母䘮水漿不入口者三日既𦵏廬墓有白烏甘露之祥事聞詔立雙闕旌其孝今子孫居縣之孝義里號闕下林家林藴披子兄藻貞元中進士累官侍御史藴為西川節度推官劉闢反藴以逆順喻之闢怒欲殺之命行刑者以刀磨其頸脅之藴罵曰死即死我頸豈頑奴砥石耶闢知不可屈釋之黄滔莆田人乾寜初舉進士善屬文有文集及泉山秀句集鄭良士仙逰人博學能文景福中獻詩五百篇授四門博士後遷御史中丞天復中棄官歸隠扵白嵒宋陳仁壁莆田人初仕陳洪進為泉州别駕洪進稱臣扵宋豪猾有負險為亂者仁壁徒歩謁轉運使揚克巽陳討賊策以平之召仁壁為陽翟縣主簿子靖厯知婺潭州官至秘書監潘慎修莆田人父承祐仕南唐以禮部尚書致仕慎修淳化中以考功員外直秘閣官至翰林侍讀學士風度醖藉博渉文史有文集五卷方偕莆田人大中祥符間進士為御史臺推直官辨疑獄三百人安撫江南奏罷配民雜賦知杭州有能聲後遷光禄卿蔡襄仙逰人天聖中進士累官知諫院正色讜言精扵吏事下不能欺所至有聲能文章尤工扵書為當時第一官至端明殿學士卒諡忠恵薛奕興化縣人熈寜九年中武舉第一時同郡徐鐸亦冠文科宋神宗賜以詩有一方文武魁天下萬里英雄入彀中之句後死扵國事林豫仙逰人熈寜中進士嘗知通利軍與蘇軾兄弟善後轍貶送以詞有怒髪衝冠壯心比石之句歴官七郡皆有遺愛朱祓仙逰人治平中進士紹聖初章惇當國首唱異議人爭附之祓獨陳正心誠意知人安民之說除都官員外郎以鄒浩貶贐金特厚追一官勒停後除給事中編入元祐黨籍方軫莆田人為太學齋郎䟽論蔡京睥睨宗社内懐不道且言忠義之上投匭者無日無之京分為邪等黥配編置又使子攸嶺南日以花石禽鳥為獻知京必有異謀京怒流軫陳次升仙逰人熈寜中進士累官殿中侍御史疏論章惇蔡卞及曽布蔡京之惡又嘗從容一言正吕升卿使嶺南世稱其大有功于元祐諸臣焉方次彭興化縣人皇祐初進士出知梅州民甚愛之在州六年两被褒詔元祐初賜三品服引老歸從弟公衮元豐初進士嘗以布衣被薦條奏十事神宗嘉納之陳大卞仙逰人治平中進士為威武軍僉判與章惇舊惇當國屢招不往以有事眀堂封二親拜且泣曰吾不能與時俯仰黽勉仕宦者為吾親耳遂致仕黄隠莆田人初名隆治平中進士為國子司業力排王安石新經取其板火之傅楫仙逰人治平中進士徽宗朝為中書舎人時曽布當國自以扵楫有汲引恩冀為之用楫畧不傾下凡命令及用人不當悉極論之又每以遵祖宗法度安靜自然勸帝後見時事寖興知禍之始此求去以龍圖閣侍制知博州卒阮駿莆田人紹聖初進士為河南少尹建炎初金人冦京師駿率部兵擁護神御殿抱神御罵聲不絶口卒被害後贈朝議大夫陣淬莆田人紹聖初下第挾策西逰以戰功為鄜延都監建炎初為諸軍統制金人犯采石淬欲伏兵以禦杜充不從諸軍皆潰淬獨戰勢窮大罵刄交扵胸而色不動與其從子仲敏俱死詔贈明州觀察使林冲之莆田人元符進士靖康初以主客郎中副陳過庭使金被拘執逼仕劉豫不屈徙顯州極北之地冲之以義命自安髭髪還黒病革語同難者曰某年七十二持忠入地無所恨恨國讐未復耳一慟而絶陳膏莆田人政和中進士為汾州教授佐守臣張克戬捍金後知恵州單馬造曽衮壘譬曉降之鄞僧王法恩謀逆事覺或請屠城膏方為御史力論之脅從者悉寛宥官至太府少卿宋旅莆田人大觀初進士累官奉議郎知剡縣盜方為臘犯越旅獨與民據守以忠義激勸部勒隊伍預備計俄而盗衆大至躬率壯銳冐矢石雖頗殺獲力終不敵遂死之後贈朝散郎録其四子林震冲之從子崇寜初進士仕至秘書少監以不附二蔡有聲弟霆政和進士博學深象數聚書數千卷皆自校讐紹興中為勅令所刪定官力詆秦檜和議之非即掛冠去鄭樵莆田人愽學强記捜竒訪古遇蔵書家必借留讀盡乃去過目不忘為經㫖禮樂天文地理蟲魚草木方書之學皆有論辨紹興中以薦召對授樞密院編修官所著書凡五十八部有通志畧行世嘗居夾漈山學者稱夾漈先生鄭厚樵弟工文詞自成一家尤長扵易紹興中以詞賦中南省第一官至昭信軍節度推官學者稱為鄉湘先生陳覺民仙逰人熈寜中進士為宗正丞出知漳福泉興化廣五郡皆有治行两為部使者風采嚴峻人甚憚之葉顒仙逰人兄顗累官承節郎死節顒紹興初進士嘗知常州或勸其獻羡餘當得美官顒曰名羡餘非重征則横歛也以利易賞心實恥之後官至宰相識大體抑僥倖服食田宅不改其舊卒諡正簡陳吉老仙逰人紹興初為維揚帥髙宗賜鞍馬金帶以寵其行時秦檜主和議吉老力斥之卒贈奉直大夫陳居仁膏子紹興中進士秦檜與膏有故或勸一見可得美官居仁不聽累官國子丞入對論文武並用長乆之術後以寳文待制知福州居仁風度凝逺臨事毅然有守有奏議制藁黄公度莆田人紹興八年進士第一官至考功員外郎被召入對乞縂權綱厚風俗上嘉納之工詩能文有知稼翁集陳俊卿莆田人紹興中進士累官侍御史劾黜秦檜黨䟽言張浚忠藎歴同知樞密院事授右僕射以用人為己任奬亷退抑奔競後以少師魏國公致仕卒諡正獻俊卿孝友忠敬清嚴好禮有集二十卷龔茂良莆田人紹興進士為吏部郎官論禦敵得失曰景徳之勝本於能斷靖康之禍由扵致疑孝宗時以恭政行相事慶夀禮行中外覬恩茂良歎曰此當以身任怨不敢愛身以弊天下也卒諡莊敏劉夙莆田人紹興中進士累官著作郎上封事論近習時稱其直亮弟朔紹興末進士累官秘書省正字孝宗謀恢復朔言宜選兵蓄財以待其變林光朝莆田人専心踐履不為訓詁南渡後以伊洛之學倡東南登隆興進士歴官國子司業廣東提刑屢敗茶冦孝宗喜其儒生知兵召為祭酒除中書舎人鄭鑑莆田人著作郎立朝敢言孝宗謂其直出扵肝腑非矯偽者後卒朱熹祭之以文謂其有古爭臣之風陳卓居仁子紹熈初進士嘗知寜國府丞相吳􅅗欲見之卓謝不往􅅗器之累官簽書樞密院事尋丐祠還家卒諡清敏張弼仙逰人精于易推明象數出乎自得隠居不仕賜號葆光處士陳讜仙逰人博學能文不為險語而雅有典則工書法大字尤精隆興初進士官至敷文閣待制陳宓俊卿子以父任監進奏院慷慨盡言遷軍器監簿又言三事謂人主之徳貴乎明大臣之心貴乎公臺諫之言貴乎直後直秘閣卒所著有春秋三傳抄讀通鑑綱目唐史贅瘤等稿蔡洸襄𤣥孫父伸政和中進士仕為左中大夫洸事親孝以䕃補將仕郎累官徽猷閣學士知寜國府所得奉每以振親戚之貧者卒之日囊無餘貲鄭僑莆田人乾道五年進士第一官至恭知政事僑在政府以不欺事君以無我議政令名大節為世推重郭義重莆田人早逰太學以操尚稱年四十餘客錢唐聞母䘮徙跣奔䘮每一慟輙嘔血聚土為墳而廬其旁甘露降烏鵲馴集紹興間事聞旌其閭劉克莊夙弟朔之孫父彌正淳熈中進士累官起居舎人克莊生有異質日誦萬言為文援筆立就為龍圖閣直學士真徳秀以學貫古今文追騷雅薦之所著有後村文藁方大琮莆田人開禧初進士為御史嘗上䟽謂必先明綱常則天道好還可以永天命定國勢大琮色夷氣温平居言不出口至立殿庭爭是非論可否雖賁育不能奪卒諡忠恵葉大有仙逰人紹定中進士為殿中侍御史嘗奏論今日根本之慮有四惜名器惜財力惜民命惜天時不可以有警畏不可以無警玩方信孺莆田人父崧卿隆興初進士仕為轉運判官嘗訂正韓文信儒有雋材能文以父䕃補番禺縣尉以近臣薦使金嵗三往返以口舌折强敵金人計屈情見後知真州築石隄二十里人莫知其故後金犯真州城頼以全王邁仙逰人嘉定中進士為秘書省正字嘗上言人臣不可欺君人主不可欺天語甚切直與真徳秀魏了翁友善所著有曜軒集二十卷陳文龍莆田人能文章負氣節咸淳五年進士第一累官恭知政事益王入閩稱制以為閩廣宣撫使討平漳州興化元兵至有諷其降者文龍曰諸君特畏死耳未知此生能不死乎後被執至杭州不食死母病尼寺中左右視之泣下母曰吾與吾兒同死又何恨哉亦死之元陳旅莆田人學有源委聞見􅔜博為文純潔髙古深為虞集所知仕終國子監丞有安雅堂集行世郭道卿義重四世孫元初閩盗起道卿與弟佐卿守孝子祠不去俱被執兄弟各求代死盗感两釋之道卿子廷煒為建寜平準庫使辭歸侍養道卿病廷煒憂瘁扶護一夕髪盡白有司言狀旌之朱文霆莆田人元泰定中舉進士擢甌寜縣尹有恵政及人以泉州路總管致仕文霆博學善屬文宋濓稱其文言醇而理彰所著有葵山文集本朝吳源莆田人洪武初由眀經舉授郡庠教授講眀經㫖諸生多所造就後以薦起為四輔官未幾致仕尋又召起為國子司業卒于官林圭莆田人洪武初以眀經薦為本邑訓導陞寜國教諭凡六典文衡晚年致仕家居講學眀理啟廸後進經學詞章為莆郡首稱林環莆田人幼聰慧讀書肆數遍即成誦甫成童筆成章永樂丙戌進士第一除翰林修撰眀年陞侍讀預修永樂大典為書經總裁官两為㑹試考官所取多得人卒于官楊慈莆田人幼頴敏下筆數千言立就其文豐贍典則直欲追蹤古作者永樂戊子鄉試第一辛夘登進士改庶吉士慈體貎豐偉志氣軒昻恒以科第文辭為儒者末事抱負甚大未及用而卒黄夀生莆田人永樂戊子京闈第一辛夘舉進士改庶吉士預修五經四書性理大全書成除檢討夀生端重􅀶贍時人重之陳繼之莆田人由進士歴官有聲靖難師至不屈死之陳中永樂辛丑會試第一性資簡靜文思豐贍自南京户部主事召修實録書成陞貟外郎致仕卒省志陳用莆田人永樂中進士改庶吉士預修五經四書性理大全書成授檢討進修撰陞侍讀掌院事二十餘年卒省志余耀永樂中進士歴進賢知縣通判吉安饒州二府勤敏亷介歴官郡縣所至有聲省志方鯉永樂中進士為監察御史風采凛然出知彰徳紹興二府皆以嚴明􅊩郡號良二千石正統中致仕行義為鄉邦所推服省志林時永樂中進士歴官陜西僉事貴川副使持節两部風力亷介為時所稱省志林文莆田人宣徳中進士第三除行在翰林院編修預修實録成陞修撰累遷學士進太常卿致仕文安靜守禮接人無大小一以至誠士大夫咸為醇儒卒贈禮志部侍郎有澹軒文稿省翁世資莆田人正統中進士歴主事郎中布政副都御史仕終户部尚書居官四十年勤謹和厚豁達有為時譽歸之卒贈太子少傅所著有冰崖集省志方澥莆田人正統間年五十餘始第進士授行人懇求致仕去性介烈抱經固窮以講授為業未嘗輕入城府晚年尤邃於學動止語黙不少茍學者稱為栁東先生省志何誠正統間由國子生知虹縣㢘正豈弟不尚威嚴民䝉其利卒扵官因𦵏焉仍立廟祀之省志陳俊莆田人正統戊辰進士為户部主事累進本部侍郎時北兵臨闗西俊總督軍儲轉輸不擾而辦歴陞南京户部尚書改兵部擢吏部以太子少保致仕俊温厚周慎冲澹清約雖位冡宰而服食器用猶寒士然卒諡康懿省志柯濳莆田人景泰辛未進士第一除翰林院修撰歴中允洗馬學士少詹事後以内外艱歸起復為國子祭酒辭不拜尋卒濳為人温雅端慎士大夫期其柄用及卒咸悼惜之有竹巖文稿省志彭韶莆田人天順初進士授刑部主事歴陞刑部侍郎廵視浙西劾罷貪酷守令尋兼右僉都史整理两浙鹽政䟽定折價及减温處課額比志還圖竈户窮苦狀以進仕至刑部尚書省楊琅莆田人第進士拜御史累上書言事嘗劾罷大臣之不才者數人風采隠然動縉紳間出按江浙靜重不苛陞山東僉事提督學政卒于官省志黄仲昭莆田人成化丙戌進士授編修改評事陞江西提學僉事氣岸屹立而思致安詳校文以理氣為主錯綜斟酌毫髪不爽即鼎貴子弟亦不少借竟以是休致周瑛莆田人成化己丑進士為理學名臣林俊莆田人成化戊戌進士歴官中外任終刑部尚書執法不苛平生不畏强禦不擇利害抗犯顔敢諫之節髙難進易退之風無瑕可議卒諡貞肅宋端儀莆田人成化辛丑進士為理學名臣方良永莆田人𢎞治初進士為河南僉事以抗節忤逆瑾勒令致仕瑾誅復起歴陞浙江左布政使馬思聰莆田人𢎞治乙丑進士官户部主事督糧江西與宸濠生辰之燕翼旦入謝度必有變語厨人曰我倘不出將勅蔵扵髙處厨人未諭其意姑如所示及入濠怒其不從果遇害配享豫章忠臣祠黄鞏莆田人𢎞治乙丑進士為世名臣林文俊莆田人正徳辛未進士累官南京吏部侍郎有聲扵時卒諡文修魏一恭莆田人嘉靖己丑進士授温州府推官笞時相子弟之侮慢官司者境内肅然歴陞江西布政使一恭性剛方清約雖位方面宦囊蕭然嘗自言不要官不要錢不要命則何事不可做故時人目之為三不要列女王氏本睢陽人趙子乙妻子乙故王氏誓不嫁宋靖康亂王氏以堊土自毁負姑携幼子避地而南越四年始達温陵徙居于莆終焉一時名人如陳俊卿軰皆有詩以哀之程氏仙逰人蔡襄弟髙之妻髙為太康主簿卒于官時程年方二十四縣人哀其貧以錢百二十千為賻程氏泣曰吾家世㢘吏不可以此汚吾夫却不受既歸鄉里以冰雪自持終其身徐氏鄭永廸妻也夫亡時年二十八子焸􅂱皆幼妾許氏年二十三子燉徐泣謂許曰婦人以不失身為貴宜相守以保厥終事舅姑甚謹翼三子俱有成燉仕為曲江主簿時稱鄭氏雙節省志林茂正莆田王崇貢妻夫亡時年二十二子稜方二嵗王氏産業多荒而賦稅繁重茂正内外支持家計恃以不絶且𦵏姑及教稜讀書成立為髙唐州訓導守節四十餘年事聞詔旌表之省志鄭淑慎莆田莊季妻也季歿鄭年二十五子幼姑老且病乃紡績以資湯藥姑歿脫簮鉺營宅兆有司具其事與季淑潔同聞于朝省志鄭淑清莆田周則用妻夫歿時年二十二僅生二女誓無他志或諷以無子厲聲答曰子可無身可失乎其家素富綜理有方僕婢莫或敢二以夫之兄子越為嗣越亦早死孫軫方九齡務調䕶教督之及軫薦于鄉鄭年八十有二猶及見焉有司上其事詔褒之省志陳淑慧栁廷茂妻年二十五夫亡子方六嵗姑苦病養之終身無失所其夫之叔母林孟貞弟婦林玉清皆妙年守志不渝人號栁氏三貞節志省林氏莆田黄子厚妻年二十六而寡遺腹數月生子季興誓不改節教督其子及興補郡庠弟子員成化己亥有司上其事旌表其門省志王氏仙逰人適同邑張琳年十七而琳卒子烱甫三嵗姑季氏患風疾王氏誓養姑鞠子不二其心孀居四十餘年閨門之内肅如也知縣王燦以聞成化己亥優詔旌表省志楊靖娥莆田顧文嘉妻禮部員外郎瑛之女也年二十五夫亡無子僅生二女厲志守孀母許氏廹令再嫁靖娥斷髪自誓即返其家奉姑尤謹有司上其事成化中旌表之省志吳淑貞年二十二歸于同邑黄大廣方閱數月而大廣亡斷髪自誓紡績為生孝事舅姑𦵏祭以禮遺腹生子曰宜教之讀書著録郡庠持身終始無玷有司具其事奏請旌表之省志余淑玉吳師舜妻年二十一而師舜亡罄奩粧築墳以𦵏父母欲奪其志誓死不從奉舅姑生事𦵏祭如禮成化間詔加旌表省志祁淑恵莆田翁志宏妻也歸數年無子買妾祁氏生子可璋未幾夫歿時淑恵年二十四妾年二十一姑老子幼剪髪自誓帥其妾辛勤紡績以備乏絶舉先廬質錢𦵏姑及夫扵西麻山年幾八十卒省志黄氏莆田黄季實之女適林道淵年二十八而寡力貧撫孤以底于成立夀八十有竒學士林文為著貞節傳省志吳貞女莆邑庠生陳琛妻也年二十二而琛亡守節孀居養姑育子閭里賢之省志仙釋何氏九仙何氏莫詳其世代兄弟九人居仙逰東北山中修道因名其山曰九仙山又居湖側煉丹丹成各乗赤鯉仙去名其湖曰九鯉湖陳易興化縣人好學攻詩宋熈寜中逰京師王安石邀至相府易一見不辭而歸不葷不娶野服葛巾日一飯或經旬不食居蔡溪之左巖中五十年猶一日宣和中跏趺而逝子薰𫝊燈録名文炬隠囊山髙巖下趺坐浹旬不食誦經口吐異光或臨水餧蛭或袒露施蚊行則两虎隨之因號其菴曰伏虎兀坐正覺常指之曰辟支佛化身也僧寂名躭章年十九入靈石山南平鍾王嘗盡禮致之不赴但書付使者曰摧殘枯木倚寒林幾度逢春不變心樵客見之猶不採郢人何事苦捜尋明一統志卷七十七
