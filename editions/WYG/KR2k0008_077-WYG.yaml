連城知縣下車之初沙尤寇犯境佐一心備禦率民庶登蓮花寨民頼以生咸徳之郡志岑髙正統末知上杭縣寇亂之後而綏懐有方流亡悉復郡志韋清景泰初知寜化縣清㢘勤慎植弱抑强勞扵撫字未三載卒于官民哀慕之不置郡志吳中景泰中知清流縣才優學贍遇事迎刄而解尤隆儒好士節儉愛民公而恕足為豈弟君子後歴官布政使郡志李翰連城縣丞豈弟得牧民之體崇尚師儒作興學校立養濟院脩文川橋恵濟于人衆所信愛志郡李瓊天順初知汀州府首建邑學决訟如神吏猾無侵漁之患凡雨𤾉愆期躬身布悃祈禱民無荒歉之憂時上杭勝運來蘇寇發征討不服瓊親往諭之由是衆皆釋甲民得以安郡志胡越成化初知上杭縣清勤公正不喜謟諛時初調千當户所守禦上杭悍兵驕卒往往肆虐扵民越白扵道而以法繩之自是軍民各安其業郡志蕭寵上杭知縣持身勤質吏民畏服嘗奏請廟祀伍驥丁泉之死王事者士論偉之郡志邢昊成化初知清流縣居官治事一以愛人為主去後民懐思之郡志王環成化中永定知縣㢘眀果斷興利除害吏民恱服郡志吳琬丞連城縣不以家累自隨敬老尊賢愛民如子任十年老穉泣送其去郡志凌寀清流知縣興學重農毁滛祠崇正道政治卓越卒于官民哀慕之郡志程熈成化間同知汀州府清脩苦節門無苞苴性剛介每行部至各縣興學校課士子凡橋梁道路有利害於民者無不脩葺多善政及卒逺近悲之郡志陳𫝊成化末連城縣學教諭立心正大施教勤惓郡志流寓鄭俠福州人宋熈寜中俠監安上門繪流民圖以進神宗為罷新法數事後又上䟽進正直君子邪曲小人事業圖吕恵卿誣以謗訕編管汀州曽肇建昌人仕宋累官翰林學士自熈寜以來大臣更用事邪正相軋肇數不合崇寜中出知和州徙岳州繼貶濮州團練副使安置汀州趙令衿宋宗室髙宗時因觀秦檜家廟記口稱君子之澤五世而斬檜聞怒責居汀州檜死放還人物唐伍正己寜化人大中間進士累官御史中丞時正人為邪佞所擠者必救之朋黨漸盛禁錮名流正己遂歸田里子祐中甲科調雩都令歴知宜城須昌以㢘能稱為文近古尤長於詩宋羅彧長汀人第進士契丹入寇真宗親征彧扈從至澶淵與宰相恭議機務契丹乞和遣彧為報使還京丐歸里賜錦衣金帶錦旂二還鄉領本州刺史鄭文寳寜化人太平興國中進士累官工部侍郎嘗題緱氏山云秋隂漠漠秋雲輕緱氏山頭月正明帝子西飛仙馭逺不知何處夜吹笙又題緑野堂云水暖鳬鷖行哺子溪深桃李卧開花歐陽脩稱其不减扵王摩詰杜少陵鄧詧連城人有材武好讀兵書以功擢皇城使性剛嚴遇下有禮與士卒同甘苦故皆樂為之用後收復熈河遷都統終武功大夫頼紱清流人紹興中為程鄉尉㑹盗起紱運謀招捕境内悉平累遷鎮南軍節度使推官又改京秩知南劍州彭孫連城人少以勇敢自負皇祐間應募討賊孫乃單騎造其壘曰爾曹兵粮不及官軍之衆若悔過享終身之利于是賊衆感泣聽命後屢平賊冦累官萊州防禦使隴西郡侯徐唐寜化人幼頴悟不事科舉業隠居鄉里後從胡瑗講學上庠質疑問難諸生屈服歐陽脩薦于朝宋仁宗召見講易嘉之賜銀絹張良裔寜化人篤好程氏之學建炎間中第調臨川簿不就郡守髙其行復辟為武平丞㑹盗起良裔單騎造賊壘諭以禍福賊皆感泣而散吳簡言長汀人以茂異决科累官祠部郎中嘗經巫山神女廟題詩云惆悵巫娥事不平當時一夢是空成祇因宋玉閑脣吻流盡巴江洗不清是夜夢神女來謝元頼禄孫寜化人延祐初贑寇作亂禄孫負母挈妻子入山寇至禄孫守母不去寇將刃其母禄孫以身蔽曰寜殺我母傷我母時母病渴乏水禄孫含唾哺之盗竊窺相顧駭嘆不忍害有掠其妻去者盗責曰柰何辱孝子婦使歸之事聞旌表本朝張顯宗寜化人洪武中進士及第為翰林編脩遷太常丞再遷國子祭酒後出為交趾布政使有恵於民沈仲繼連城人中應天鄉試永樂初累陞吉安府知府先知山西應州有文武材弭盗安民地方寜謐郡志巫章珤清流人永樂間歴官建昌知縣嚴眀立政㢘介自持至今建昌稱徳及民者以珤為最他令不能及也郡志羅經上杭人永樂戊戌進潔士歴官淇縣知縣㢘持身尤重農事嘗教民以桔槔溉田至今民受其利擢御史彈劾不避權要人多忌之陞浙江副使執法眀允徳恵及民郡志王瑛長汀人宣徳中仕户部主事尋陞員外郎又陞山西恭議官至左布政使司致仕卒許浩志運城人文章學問馳名于時登正統乙丑進士以親老就養授泉州同安教諭後進受業于門者多登顯第領大拜云郡志馬馴長汀人正統乙丑進士累官右副都御史廵撫湖廣所至務持大體不事小察人多懐之卒年七十有六詔諭𦵏祭郡志劉謙長汀人以國子生歴官南京後府都事陞北左府經歴存心仁恕愛恤軍民政尚精嚴始終如一郡志余珤清流人任青田知縣十有五年勵精為政清慎亷能興學校重農桑善政及民民愛戴之後卒扵官民立祠祀焉扁曰石古廟以珤之徳如石之不朽也郡志丘𢎞上杭人天順甲申進士除户科給事中時淮揚大飢𢎞奏賑恤之民頼以生又陳時政十二條上嘉納之眀年地震又請脩徳弭灾條上七事上亦俞允陞都給事中郡志郭資上杭人成化乙未進士任知縣㢘介勤能擢御史有聲郡志列女曽氏婦汀州寜化人姓晏氏夫死守幼子不嫁宋紹定間寇破寜化晏依山為砦賊遣人索婦女金帛晏召田丁諭曰汝曹衣食我家汝念主母各當用命不勝即殺我因解首飾悉與之田丁感激思奮晏自搥鼓使諸婢鳴金賊退敗鄉人挈家趍砦者甚衆晏助不給者以家粮又析砦為五互相應援賊弗能攻凡存活老幼數萬人事聞封恭人賜冠帔補其子為承信郎吳繼養妻連城人姓丁氏年二十三而寡守節教養其子子亦夭孀居五十餘年氷蘖之操始終如一郡志羅氏沙縣人適清流吕源甫二載而源卒遺腹生子曰文慶亦夭復携其婦以教孫孫至有領宣徳鄉薦者郡志黄節婦上杭人姓丁氏太學生黄友杭妻友杭卒丁年二十乃屏華却飾惟勤女事以養其姑保其孤弱而已郡志頼氏寜化人適李尚質年二十而寡孀居守節奉舅姑生事死𦵏盡禮夀七十三而終郡志葉福妻清流人姓陳氏福舉扵鄉㑹禮部試卒陳誓不再譙以年少恐母家奪其志絶跡不相往返終始一節年至七十而卒郡志張氏武平人陳萬夀妻早寡沙尤賊起張被執賊欲犯之奮罵不從賊怒剖其腹郡志郭氏上杭人適雷廣生二閱月而廣生卒于外時年十八屏華飾謹出入人不敢有異議煢居六十年無少玷缺郡志伊普姑寜化人適謝氏子正統末遭沙寇之亂不屈而死郡志雙節婦上杭人邵縉紳妻陳氏縉纓紿妻黄氏沙尤寇至二婦被執之渡河中流各抱其嬰躍入水死後數日尸浮嬰猶在抱人異之成化中旌表扁曰雙節郡志熊真姑長汀張鱗妻歸張二年鱗卒熊甘貧守志孝養二親𢎞治間旌表郡志仙釋晏仙人樵采本郡山間見一道人食桃餘半顆飼之晏受而食之忽能前知人禍福鄉人目曰晏仙人劉女髙化劉安上女育扵雍熈初九齡與羽人談道得度及笄許妻何氏子劉氏送之忽有一白鵞自空而墮劉女乗之而去陳軒詩白鵝乗去人何在青鳥飛來信已遥若使何郎有仙骨也須同引鳳凰簫黄升長汀人自幼得道法錢沉水中者呼之即出又能内汞於日中運氣錬之即成白金有蔡道人死升為棺殯後遺書與升云在崆山相候升往見之曰吾向時有文字在墻隙間汝歸誦之忽不見升得其文字自是能役鬼神後尸解應定大師鄞江集云初波利尊者自西土來住盤古山古有諺云後五百嵗有白衣菩薩自南方來居此山是定光佛也至是應定大師乃應之伏虎大師寜化人汀苦旱結壇龍潭側云七日不雨願焚幻軀七日炬將舉甘雨傾下有猛虎見師來即逺遁禪鑑名智孜長於詩吟四皓詩曰因秦生白髪為漢出青山興化府東至海岸九十里西至泉州府永春縣界一百二十五里南至海岸四十里北至福州府永福縣界八十里自府治至南京三千一百四十里至京師六千四百里糧六萬石零建置沿革禹貢揚州之域天文牛女分野周為七閩地秦屬閩中郡漢為東冶縣地後為南部都尉地並屬㑹稽郡吳屬建安郡晉屬晉安郡梁屬南安郡陳屬閩州隋始置莆田縣𨽻泉州尋廢唐復置𨽻豐州後𨽻泉州五代時王審知留從效陳洪進相繼據其地宋初屬平海軍尋以泉州㳺洋鎮地置太平軍又改興化軍以莆田仙逰二縣來屬八年始移軍治莆田宋末改為興安州元改為興化路本朝改為興化府領縣二莆田縣附郭本晉晉安縣地隋析置莆田縣尋廢入南安縣屬泉州唐武徳中復置宋元仍舊本朝因之正統十三年省興化縣西南鄉地入焉編户二百五里仙逰縣在府城西七十里本莆田縣地唐聖厯中析置清源縣天寳初以縣有兄弟登仙者更名仙逰宋元仍舊本朝因之正統十三年省興化縣西北鄉地入焉編户一十四里郡名莆中古名形勝介泉福之間海道舟車所㑹宋通判㕔壁記山川之秀甲於閩中北枕陳嵓南揖壺公東薄蘭溪西縈寜海俱莆田志風俗文物之邦宋黄公度學記莆田文物之邦自常衮入閩之後延禮英俊儒風大振有齊魯遺風黄公度學記僻在南隅而習俗好尚有東州齊魯遺風家貧子讀書宋陳俊卿對髙宗語比屋業儒俊造如林郡志詩書禮義為八閩之甲同上山川烏石山在府城中上有東巖寺石浮圖古語云烏石巖前官職聨綿太平山在府城西其山自福之永福延袤而來峯巒峻抜為莆田主山石室山在府城西有石室二皆廣一丈許及有巨人迹石鳳凰山在府城南三里梁時邑儒鄭露書堂在焉福平山在府城北五里一名北平唐歐陽詹讀書扵此陳喦山在府城北五里一名蓮花峯有石洞中有巨人迹石茶竈石碁枰又有琉璃院院側有桃花塢燕子洞仙篆石粘蠔石淘金井宋方翥仙篆石詩蟲文鳥篆不可識如讀岣嶁神禹碑粘蠔石詩乃知此山千載前洶湧猶作海渺瀰蛟龍魚鼈占窟宅不省造化能密移鼓角山在府城南一十五里壺公山在府城南二十里髙聳百餘仭絶頂有泉出石穴中其脈通海視潮盈縮中有雙蠏禱雨見之即應山有盤陀石法流泉濯纓沼石壁峯碧溪灣虎溪巖號五竒舊志昔有人遇老翁扵此忽見官闕似非人間翁曰此壺中日月也後人因名壺公古語云壺公山欲斷莆陽朱紫半唐翁承贊詩井邑斜連北蓬瀛直抵東秋髙巖溜白日出海波紅宋劉克莊詩昔人曽此遇神仙曽見壺中跳入年斫木人多山漸廋結菴僧去石誰眠元盧琦詩六月翠壺山下客凌晨登山如絶壁支笻徑上真淨巖頭上青天纔咫尺龜洋山在府城西二十里昔有僧扵此見一大龜躡四小龜而行因名下有六眸龜洞將軍山在府城南二十里又名將軍巖宋蔡襄詩赤日正停乍解衣巖石下石泉殊甘凉野籟亦瀟洒驚猿度嶺雲遺果墜庭瓦披軒忽永歎幽抱不可寫城山在府城東南二十里前臨國清塘上有松隠岩宋鄭樵詩青嶂廻環畫屏倚晴空倒入春湖水村村叢樹緑如藍㸃㸃行人去如蟻新秧未挿水田平髙低麥隴相縱横黄昏倦客忘歸去孤月亭亭雲外生木蘭山在府城西南二十五里下有木蘭陂金山在府城東南三十五里下有水名金溪山上有石室及馬齒石雞冠石囊山在府城東北四十里中有文殊辟支二巖須彌施蚊二臺山之南有放目亭北有蘸緑亭亭之前各有池又有降龍澗伏虎石唐黄滔詩山有重巖寺門開两徑斜溪聲湍走澗海色月流沙廬外曽馴虎堂中舊雨花不知未卜地一一落誰家嵩山在府城西南四十里山頂有峯名文筆其上石壁有苔紋成文筆峯三字宛