時賊勢已逼或勸避之楷不聽及賊來攻楷力拒守衆争奮咸稱崔公尚不惜百口吾等何愛一身力竭城陷楷持節不屈賊害之唐孔若思衛州刺史故事以宗室為州别駕見刺史驁放不肯致恭若思劾奏之有詔别駕見刺史致恭敬暉衛州刺史時河北經突厥所騷方秋築城暉曰金湯非粟不守奈何捨收穫而事城隍哉縦民歸歛所部利安徐彦伯衛州刺史有善政状聞璽書嘉勞崔𢎞禮衛州刺史以才名稱著於時裴子雲新鄉令邑人王恭戍邊留牸牛六頭於舅李璡家五年産犢三十頭恭還索牛璡曰爾牛已死其半止還三頭恭訴之子雲收入獄捉璡至曰賊盜牛三十頭蔵爾荘内即栲之璡急曰吾牛實外甥牸牛所生於是以五頭酬璡餘盡還恭陸璪新鄉令有惠政邑人立祠祀之崔珏淇縣令水沒民田珏乃設祭河上見巨蛇列水面而死水遂息邑人被其惠歌頌之五代郭進周衛州刺史平河朔之盜民得安居宋李之才獲嘉主簿攝共城令有治行聞邵雍苦學親造其廬而問之授以物理性命之學之才器大難乎識者故乆不調陳貫知衛州簿書筦庫賦租出入皆自檢覆嘗謂僚屬曰視縣官物如己物容有姦乎鄭驤簽書衛州判官有善状轉運使劉從徳表薦之進一官石公弼衛州司法㕘軍淇水監牧馬逸食人稻為田主所傷時牧法至宻郡守韓宗哲欲坐以重辟公弼言但當懲圉者民不可罪卒如其議陳瓘知衛州專以仁慈及民庭無滯訟兩被内除皆辭不就曽有開知衛州時水災人乏食擅貸常平錢粟與之且奏乞蠲其息金王維翰獲嘉令初維翰令永霸縣豪欲嘗試設事陳訴維翰窮竟之遂伏其詐健訟衰息及徙獲嘉佐胥持國治河决有勞遷一階孟奎汲縣令有㢘名時相完顔守禮接士大夫在其門者號冷岩十俊奎其一也元陳祐衛輝路總管㢘介公正惠政及民既去民思之如父母劉秉直衛輝路總管以經術治民更新庶務一郡大治王昌齡守衛輝路起堤坊導水溉田在任八年惠化大行昌齡才行相輔政恕中行人以中行稱之董文用衛輝路總管時有重役妨農文用驅胥校以應民用不困又時議欲通衛河以便漕者文用曰此地最下若通之是無衛也乃止尚文輝州守時河朔大旱輝獨以禱得雨境内大稔懐孟民馬氏宋氏誣伏殺人積歳獄不能决提刑使者命文徃讞推迹究情得獄吏羅織状兩獄皆得李稷淇州判官淇當衝要稷至能理劇嵗大旱告於朝堂以賑之民獲以蘇王珍衛輝路總管以㢘自守及卒囊無遺貲人甚稱之李璋新鄉尹素以㢘明稱為政勤敏案牒鱗集胥吏滿前剖折之後無不敬服去任民立徳政碑杜良知輝州冦侵鄰郡輝民驚擾良曰勿自亂我能庇爾衆俄聞冦潰闔境帖然又能察奸弊之吏時刻杖决使不得逞政教大行姜師望胙城尹有能聲在任百廢俱興積年之獄立為剖折人服其眀本朝張俊洪武末汲縣知縣革吏胥奸弊民有怠於農事者躬督之賦役親驗版籍務得均平暇即綜理學校以勵生徒去任邑人思之牛衡永樂中胙城知縣清慎有為勤於撫字案牘詳明期年之間民無游惰盗賊屏息去任民心不忘李麟永樂中輝縣知縣雙溪橋久圯往来病涉乃以石為之不日而成復建鐘樓興廢舉墜革吏胥侵漁之弊民得其安董愷永樂中淇縣知縣涖事公正賦役均平邢表由進士知獲嘉縣尋陞衛輝知府有惠政及去民脱履遮留省志楊清新鄉知縣以績著省志徐英胙城知縣斷訟明决請托不行卒於官省志流寓邵雍其先范陽人雍幼隨父古徙共城宋天聖中古登蘇門山顧謂雍曰若聞孫登之為人乎吾所尚也遂卜隠於山下雍廬百源之上布裘疏食躬㸑以養父受學李之才覃思於易後遷居洛陽姚樞永平栁城人仕元為行臺郎中以臺長事貨因棄官来輝州作家廟别為室奉孔子及周程朱子像讀書鳴琴若将終身世祖在潜邸以禮聘至敷陳治道數千言世祖竒其才後官至中書左丞昭文舘大學士翰林承㫖許衡本河内人嘗徃来河洛間後從姚樞於蘇門得程朱書遂與竇黙相講習大有所得既而盡室依樞以居慨然以道為己任從之遊者甚衆家貧躬耕處之泰然謳誦之聲聞於戸外如金聲世祖聞之召用焉姚燧樞從子器識豪邁從學許衡以真知實踐為事為文閎肆該洽有西漢風仕元官至翰林學士承㫖有牧菴集行於世人物周太公望汲人姓姜名子牙年八十餘避紂居北海濵聞西伯善養老乃之周文王出獵遇於渭水之陽載歸立為師稱曰尚父佐武王伐紂以安天下授以丹書之戒封于齊寗越衛人苦耕之勞謂友曰何由免此友曰勤學三十年當免曰他食吾不食抱寢吾不寢勤學十五年以當三十年庶乎可免越果博通典籍成王師事之拜為上卿甯戚衛人家貧無資為人挽車至齊國於車下飯牛扣牛角而歌曰南山矸白石爛中有鯉魚長尺半生不逢堯與舜禪短布單衣纔至骭從昏飯牛至夜半長夜漫漫何時旦桓公聞而異之命管仲迎之拜為上卿後遷國相甯俞衛人即武子仕為大夫文公有道之時無事可見成公無道至於失國乃能周旋其間不避艱險卒保其身以濟其君孔子稱之曰邦有道則智邦無道則愚其智可及也其愚不可及也北宫文子衛人相衛侯如楚見令尹圍之威儀言於衛侯曰令尹似君矣將有他志雖獲其志不能終也公曰何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉不可以終公曰善哉公叔文子衛人即公孫枝仕為大夫為人㢘静時稱其不言不笑不取嘗薦家臣僎為大夫同升於公朝卒謚貞惠文子孔子稱其可以為文公子荆衛人仕為大夫其為居室始有曰茍合矣少有曰茍完矣富有曰茍美矣無欲速盡美之心孔子稱其善居室呉季札以為君子人也史魚衛人仕為大夫靈公不用蘧伯玉而任彌子瑕史魚驟諌不從病將卒命其子曰吾生不能正君死無以成禮置屍牖下靈公徃弔怪而問焉其子以父言告之公愕然曰寡人之過也於是進伯玉而退子瑕孔子聞之曰直哉既死猶以尸諌蘧伯玉衛人仕為大夫行年五十而知四十九年之非六十而化孔子至衛主於其家稱之曰君子哉蘧伯玉邦有道則仕邦無道則卷而懐之後世封内黄侯從祀孔子廟庭哀駘它衛人貎惡魯哀公召而觀之果以惡駭天下授以國政朞月而政教大行仲尼聞之曰是必才全而徳不形者也卜商衛人孔子弟子居文學科為人篤實退而老於西河教授門人魏文侯師事之後世封河東公髙柴衛人孔子弟子足不履影啓蟄不殺方長不折執親之喪泣血三年未嘗見齒避難而行不徑不竇孔子稱為愚葢其為人智不足而厚有餘後世封共城侯端木賜衛人孔子弟子居言語科頴悟眀敏料事多中好比方人物智足以知聖人得聞一貫之㫖後世封黎陽公㢘潔衛人孔子弟子後世封莒父伯以上俱從祀孔子廟庭呉起衛人嘗學於曽子好用兵為魯将破齊復為魏将擊秦魏武侯浮西河而下顧謂起曰美哉山河之固起曰在徳不在險武侯善之為西河守大振聲名既而見疑適楚悼王聞其賢以為相於是撫養士卒平越取陳却晋伐秦諸侯畏楚之強漢杜詩河内汲人性至孝初為郡功曹以公平稱光武知其才拜成臯令遷南陽太守政治清平教化大行及卒貧困無田宅喪無所歸事聞詔使治喪郡邸贈絹千疋趙咨東郡南燕人父暢為博士咨少孤有孝行累官燉煌太守又拜東海相在官清簡討日受俸豪宗畏其儉約向長朝歌人隠居不仕性尚中和貧無資給嘗讀易至捐益卦喟然歎曰吾已知富不如貧貴不如賤但未知死何如生耳建武中男女嫁娶既畢遂肆意與同好禽慶俱遊五嶽名山向栩長之後累官侍中每朝廷有大事栩侃然正色無所撓屈百官憚之三國孫登汲郡人於北山為土窟居之好讀易嘗撫一絃琴性無怒人或投之水中欲觀其怒既出大笑人見之與語不應魏司馬昭聞之使阮籍徃觀亦不語嵇康從之三年而别曰先生終不言乎登曰子識火乎生而有光不用其光若子難乎免於今之世果如其言南北朝李彪衛人少有大志好學不倦仕魏官至御史中尉性剛直彈劾不避權幸帝呼為李生而不名謂羣臣曰朕有李生猶漢之有汲黯徐孝肅後魏時汲郡人尚儉約養母至孝母終茹蔬飲水盛冬單纕毁瘠骨立祖禰皆負土成墳廬于墓側四十餘載被髮徒跣遂以終身唐劉政㑹胙城人隋大業間為太原鷹揚府司馬以兵隷髙祖麾下累功封邢國公貞觀初轉洪州都督卒太宗手詔政㑹昔預義舉有殊功葬宜異等於是贈民部尚書謚曰襄子元意襲爵謝偃衛州人貞觀初應詔對策髙第太宗聞其善賦召見帝先為序頗言天下乂安功徳茂盛授偃偃縁帝命為述聖賦甚有規諷之意帝善之時人稱為謝賦尚獻甫衛州汲人善占候為渾儀監令撰方域等篇熒惑犯五諸侯自陳曰臣命納音金也今居太史位火犯之且死武后為遷水衡都尉以厭之竟卒甄濟汲郡人至徳間為安禄山掌書記察禄山有異志詐以風疾舁歸禄山反使蔡希徳引行刑者封刀召之濟引首待刀希徳以實病白禄山得免後賊平濟詣京師肅宗命舘於三司令受偽官爵者列拜以愧其心累遷祕書郎國子司業班宏衛州人天寳中進士累官刑部侍郎京官考使清㓗勤力晨入官署夕而出吏不堪其勞而已益恭徳宗以其熟天下計進位尚書劉崇望政㑹七世孫舉進士累官劍南節度使遷兵部尚書兄崇龜官至靖海軍節度使並有才名髙郢衛州人九嵗能屬文父伯祥為好畤尉安禄山将殺之郢尚幼觧衣請貸賊並貸之寶應初舉進士官至同平章事以右僕射致仕嘗掌制誥家無留稿或問之曰王言不可蔵私家髙定郢之子早辯惠七嵗讀尚書至湯擔跪問父曰奈何以臣伐君郢曰應天順人對曰用命賞于祖不用命戮于社是順人乎郢異之仕至京兆府㕘軍崔寧衛州人世業儒寳應初為利州刺史朱泚亂徳宗出幸奉天寧謂所親曰上從善如轉規但為盧杞惑耳杞聞而譛殺之中外為之稱寃關播汲人舉進士為滁州刺史有善政揚綰常衮皆善之引為都官員外郎徳宗問政治之要播對稱㫖累遷平章政事以太子少師致仕宋魏仁溥衛州汲人幼孤貧世宗時累官樞宻使轉中書平章集賢殿大學士宋初進位右僕射從征太原道卒贈侍中謚宣懿為人謹厚善書計有寛度時稱長者魏咸熈仁溥子性仁孝仕為屯田郎中累遷至太僕少卿嘗㑹賔客家童覆按碎器客皆驚愕咸熈色不變令更設饌具其寛厚若此子昭慶昭文昭素皆仕於時魏咸信咸熈弟初仕為春坊通事舎人選尚公主授駙馬都尉累加至檢校太傅同平章事卒贈中書令子昭亮少能賦詩太宗喜之累官至四方館使弟昭侃官至供偹庫使張昭允衛州人初以父䕃試大理評事端拱初為雄州監軍擊敗契丹景徳中累遷右神武将軍善筆札習射曉音律髙若訥自榆次徙衛州舉進士及第累官判尚書都省為人疆學善記至於申韓老子之書醫厯鍾律之學皆能博究有集二十卷卒贈右僕射謚文荘韓璹汲人舉進士累官至太中大夫判将作監轉正議大夫致仕璹吏事絶人閲案牘終身不􅁯嘗以開封府判官迎契丹使使問南朝不聞打圍何也璹曰我后仁及昆蟲非時不為耳賀鑄衛州人性倜儻有大志喜談當世事元祐中累官泗州通判又倅太平州工詩詞為時輩所推服晚號慶湖遺老有慶湖集林舎共城人早舉進士為大理評事年三十掛冠與蘇軾同年軾有書云先生熈朝及第壮志休官以節志推之賢於淵明逺矣吕蕡汲郡人父通仕為太常博士蕡為比部郎中後知巴西縣致仕因葬通京兆藍田遂家焉蕡有六子五登科大忠大防大鈞大臨皆其子也杜常衛州人昭憲皇后族孫也折節學問無戚里氣習嘗跨驢讀書不覺觸桑木而墮額為之傷登進士第累官至工部尚書崇寧中以龍圖閣學士知河陽會苦旱及境而雨陳顔汲縣人父光調夀陽尉未赴值金兵取汴光病圍城中顔間關渡河徃省其父因扶病北歸光家奴誣告光殺人繫獄不勝拷掠因自誣服顔詣郡請代死帥臣曰此真孝子也遂併釋之金天會間旌其門元慕完新鄉人明敏有大志累官侍御史刑部侍郎持法平允决訟如流為衆所服至順間封魏郡公張思眀自獲嘉徙輝州思明穎悟過人讀書日記千言由侍儀舍人累官中書左丞平生不治産不畜財收書三萬餘卷尤眀於律與謝仲和曹鼎新同稱三絶卒贈清河郡公謚貞敏王惲汲縣人父鐸精律學仕金為戸部主事惲博學有俊才舉進士官至翰林學士承㫖追封太原郡公謚文定所著有秋澗集百餘卷子公孺衛州推官孫苛秘書郎王遜志惲曽孫歴官監察御史出為江西㢘訪副使召簽太常禮儀院元末京城不守公卿争出降遜志獨家居衣冠而坐其友王翼來告曰新朝寛大盍出詣官自言状遜志斥之曰君既自不忠又誘人為不義耶即日投井死本朝楊鏞汲縣人性敏好學修身慎行親近賢者洪武中由太學生歴官山東左布政使張理胙城人性純厚孜孜問學尊師親友接人惟尚謙卑洪武中歴官江西左布政使李炳新鄉人自幼勤學及長噐識過人優於政事洪武中由太學生歴官有能聲仕至四川左布政使尚廸獲嘉人儀度殊常才識越人洪武中由太學生歴官刑部郎中永樂中陞四川左布政使郭堅汲縣人由進士拜監察御史有能聲累陞陕西左布政使省志王宣淇縣人由進士授給事中仕至四川左㕘政省志戚寧新鄉人由進士擢御史尋陞山西副使省志列女共姜衛世子共伯之妻也共伯早死共義守義父母欲奪而嫁之共姜不許作栢舟之詩以死自誓夏侯氏唐胙城人劉寂妻也父長雲為鹽城丞喪眀無子時已生二女求與寂絶歸侍父後五年父亡毁不勝䘮被髪徒跣負土作塜廬其左寒不綿日一食者三年事聞詔賜米帛表其門仙釋劉海蟾白鶴觀知事崔重微忽見道人謁於堂下揖之坐不語但微哂重微起取金相贈未入房已聞弄筆聲急回視已失道人壁間有題字以仙書證乃秦人劉海蟾之筆昶公輝縣人自幼穎悟精勤戒律住持白茅寺一日䇿杖閑遊謂其徒曰寺東山塢間脩篁古栁異於他年乃吾棲真之所竟如其言懐慶府東至衛輝府獲嘉縣界二百四十里西至山西平陽府絳州垣曲縣界二百五十里南至河南府鞏縣界七十里北至山西澤州界六十五里自府治至京師及南京俱一千八百里糧三十三萬六百石零建置沿革禹貢冀州覃懐之地天文室壁分野商為畿内地周初為三監及邶鄘衛地後屬晋戰國時又為魏衛鄭三國秦為三川河南二郡之北境漢初為殷國尋改河内郡晋為河内汲二郡地後魏置懐州兼置河内郡隋初郡罷州存大業初廢州復置河内郡唐初置懐州治野王城天寳初改為河内郡乾元初復為懐州屬河北道宋屬河北西路金改為南懐州又置沁南軍元初復為懐州改懐孟路延祐中又改懐慶路本朝改為懐慶府領縣六河内縣附郭春秋時野王邑漢為野王縣屬河内郡晋河内郡治此隋改為河内縣唐為懐州治以太行紫陵忠義三縣省入五代宋金元仍舊本朝因之編户八十三里濟源縣在府城西七十里周為原地後更名軹東周周為畿内地春秋屬晋戰國屬魏秦漢皆為軹縣地隋析置濟源縣以濟水發源故名唐初置西濟州後省州以縣屬懐州後屬孟州宋金因之元初改縣為原州尋罷州復為縣屬孟州本朝改今屬編户五十里脩武縣在府城東一百二十里商為甯邑周武王伐紂治兵於甯故曰脩武秦更名曰南陽城漢置脩武縣屬河内郡東魏置廣寧郡又置西脩武縣尋省北齊移縣治西脩武故城隋又移治濁鹿故城唐仍徙治西脩武屬懐州宋省入武陟縣尋復置金元仍舊本朝因之編户二十九里武陟縣在府城東一百里本春秋晋之懐邑漢為懐縣隋析置武陟縣屬殷州唐初於此置陟州後州廢以縣屬懐州省懐縣入焉宋金元仍舊本朝因之編户五十六里孟縣在府城南六十里周武王㑹諸侯於孟津即此地東周為畿内地春秋屬晋為河陽戰國屬魏為河雍漢為河陽縣元魏始築城於此北齊置河陽關隋仍為河陽縣屬懐州唐初改大基縣後復為河陽縣屬河南府後又陞為孟州宋置三城節度金仍為孟州元屬懐慶路本朝改州為縣以河陽縣省入編戸三十里溫縣在府城南五十里周為蘇忿生之封邑東周為畿内邑漢為溫縣屬河内郡復廢隋復置屬懐州唐初置平州尋復為縣屬懐州改屬洛州後又屬孟州宋金元仍舊本朝改今屬編戸二十一里郡名覃懐古名河内漢名形勝帶河為固漢書冦恂傳河内帶河為固北通上黨南泊洛陽舟車都會郡志太行北峙沁水東流近帶黄河逺挹伊洛舟車都會號稱陸海山川延袤雄跨衛孟舊圖經北鄰於澤南至於溫元志東帶沁河西連沇水南據虎牢北倚太行溫縣志地勢平曠修武武陟縣志右據河内左聫薊門沁水中流地勢平曠風俗奢儉得中元志風土得四方之正是以習俗好尚奢儉得中好性理崇禮義元志薰染許魯齋道學之化皆好性理崇禮義興淳儉之化息崇侈之習元志人淳事簡修武圖經多好讀書故人淳而事簡山川太行山在府城北二十里山勢綿亘數千里雖各因地立名其實皆名太行禹貢太行恒山至於碣石盖相接也魏武帝苦寒行北上太行山艱哉何巍巍羊腸坂詰屈車輪為之摧金元好問詩太行醲秀在山陽馬頭山在府城西北三十里上有石柱鐡環相傳洪水懐山時民嘗繫舟於此三尖山在府城西北四十里三峯聳列故名方山在府城北四十里周圍方正上可容數百人眀月山在府城東北四十里髙峻舒豁可以登眺孤山在府城北五十里山勢特立碗子城山在府城北五