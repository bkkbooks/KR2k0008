屬慈州清廉廢縣在垣曲縣西五十二里後魏置隋廢後復置唐廢冀氏廢縣在岳陽縣東南一百三十里後魏置冀氏縣及郡高齊郡廢隋縣屬晉州元省入岳陽和川廢縣在岳陽縣東九十里本後魏義寧縣隋改曰和川後廢唐復置屬沁州宋屬晉州元省虞鄉廢縣在臨晉縣南六十五里西魏置縣隋屬蒲州唐因之元省入臨晉樓山廢縣在永和縣南十五里後周置歸化縣隋改曰樓山唐貞觀初廢吕香廢縣在吉州東南一百五十里後魏置平昌縣後廢隋末復置唐更名吕香五代周廢常安廢縣在隰州北三十里唐初置縣貞觀初省入蒲縣高唐廢縣在隰州廢温泉縣東南十五里唐武徳初置北温州及高唐縣貞觀初州廢縣省温泉廢縣在隰州境内本後魏新城縣地唐於縣東南三十里置北温州及温泉縣元省入隰川縣間田在平陸縣西五十里即虞芮二君相讓之地俗呼讓畔城蒲坂在蒲州東五里晉文公以蒲賂秦後秦還蒲魏人喜其反因名其地曰蒲坂漢有蒲反縣反坂古通用哺饑坂在絳州北六里即晉趙盾哺桑間餓夫處虞坂在中條山春秋晉荀息請以屈産之乘垂棘之壁假道於虞以伐虢即此伯樂逢騏驥困鹽車亦此地俗名青石槽金元好問冇虞坂行石門在解州東南白徑嶺踰中條山通陜州道山嶺參天左右壁立間不容軌謂之石門猗頓故居在猗氏縣境頓本魯之窮士問術於陶朱公適西河大畜牛羊十年之間貲擬王公漢名縣取此吕洞賓宅在蒲州東南永樂鎮今為純陽宫二龍窠在大寧縣南世傳唐大厯中有黄龍養子於此西花園在襄陵縣治西南元時縣人楊姓者闢地為之引晉水經流其中蒔以花竹創為堂亭池館本朝洪武間改為按察分司樂安莊在蒲州古城東北宋薛俅以樞宻直學士致仕歸築室以居因其封郡名曰樂安范純仁記云南北分為二園其北曰逸老堂公寄傲宴息之所東曰三經堂公寄懐於簡冊也其西曰無無堂公自以無欲無營又取夫莊生之言而名之也鐵牛在蒲州黄河岸上唐開元中鑄八牛置東西岸各四牛有一人䇿之牛下有山皆鐵也夾岸以維浮橋今西岸缺其一碧落碑在絳州治唐孝子李譔書李陽氷見之嘆其高古石刻絳帖舊在絳州儒學宋淳化間摹勒古名人書於石本朝宣徳初移置晉王府名宦周胡衍秦伐蒲蒲守恐請胡衍為蒲衍謂樗里子曰攻蒲為魏則善為秦則不可為頼矣請釋勿攻以徳衛君於是遂解去漢曹參擊魏王豹於平陽盡定魏地後封列侯食邑平陽周勃封絳侯免相就國文帝時因勃以兵出入有告勃欲反者下廷尉捕勃以薄太后言乃持節赦之復其爵邑季布為河東守文帝欲召為御史大夫弗果用布進陳其所以帝曰河東吾股肱郡故特召君耳田延年河東太守選拔尹翁歸等誅鉏豪强姦邪不敢發鄧禹迎擊更始將樊參放解南遂定河東承制拜李文為守以鎮撫之趙岐為皮氏長㑹河東太守劉祐去郡而中常侍左悺兄代之岐恥即日棄官西歸三國杜畿魏河東守治崇寛惠民有訟者為陳大義遣歸諦思自是少訟又脩戎講武開學宫親自執經教授郡中化之賈逵魏絳邑長郭援急攻河東城將潰絳父老與援約不害逵援捕得逵逵不肯拜援怒促斬之諸將覆䕶乃幽土窖中使人固守有憐其守正危厄乃夜引出折械遣去南北朝柳崇後魏河中太守郡人張明失馬疑執十餘人崇不問賊事但問其親老存否農業多少以察其辭色果獲真盜郡中畏服元淑後魏河東太守俗多商賈罕事農桑淑下車勸課以致家給人足為之謠曰秦州河東杼柚代舂元公至止田疇始理房謨東魏攝行南汾州事先是境接西魏士人多受其害謨撫接殷勤人樂為用増置城戌自是龍門以北西魏戍皆平韋孝寛周晉州刺史移鎮玉壁齊神武以衆來攻連營數十里盡其攻擊之術孝寛咸拒破之神武苦戰六旬智力俱困夜遁去隋韋世康絳州刺史以雅望鎮之闔境清肅在任數年有惠政奏課連最唐劉宏基髙祖舉義兵宏基斬宋老生平霍邑又屯兵平陽由隰州趨河西擊劉武周大破之唐臨武徳初為萬泉丞有輕囚久繫方春臨説令可且出囚使就農畝不許臨曰有所疑丞執其罪令後疾臨悉縱歸與之約囚如期還長孫恕貞觀中龍門令於縣東南鑿石壚渠溉田良沃畆收十石又於縣西鑿馬鞍塢渠蔣儼髙宗時為蒲州刺史户産充夥訴訟悉平號良二千石徐彦伯蒲州司兵參軍時司户韋暠善判司工李昱工書而彦伯善屬辭時稱河東三絶徐有功蒲州司法叅軍為政仁恕不忍杖罰民服其恩更相約曰犯徐叅軍杖者必斥之訖代不辱一人劉齊賢晉州司馬時將軍史興宗從獵苑中言晉中出佳鷂可捕取髙祖曰齊賢豈捕鷂人邪蕭至忠中宗時晉州刺史治有名黙啜遣大臣來朝見至忠風采迻廵畏俯謂人曰是宜相天子何乃居外乎齊澣蒲州司法叅軍有父子連坐論死者澣議貸其父太守不聴固争卒原之天寳初為平陽太守以清静為治王翃河中少尹領節度時悍將謀夜斬閫逐栩栩覺之陰亂漏刻以差其期遂擒其將誅之一軍惕息姜師度元宗時為河中尹安邑鹽池涸廢師度大發卒洫引其流置鹽屯公私收利不貲郭子儀至徳初充闗内河東副元帥又為河中節度行營以平河中之亂馬燧徳宗時為河東行營副元帥與渾瑊駱元光合兵討叛臣李懐光河中平李自良從馬燧攻李懐光於河中數履鋒陷陣功在諸將右後代燧充河東節度使居治九年上下諧附李憲絳州刺史幻人怵民以亂憲執誅之設法轉運以給河中絳民賴其利吕元膺徳宗時為河中節度使時方鎮多姑息獨元膺秉正自將監軍及中人往來者無不嚴憚王起穆宗朝河中節度使方蝗旱粟價騰踴起下令家得儲三十斛斥其餘以市民賴以生王鍔河中節度使河東自范希朝討鎮無功兵馬府庫殘耗鍔補完嗇費以致財用豐餘石雄武宗時為晉絳行營節度使討劉稹於河中積危蹙其將郭誼宻獻欵衆疑其詐雄曰誼為稹謀主今來乃自謀耳遂受誼降王式宣宗時晉州刺史飾郵傳器用畢給會河曲大歉民徙他州不納式勞恤之活數千人以善最稱五代侯仁矩漢隰州刺史至郡决滯訟一日釋繫囚百餘獄為之空民情悦服李謙溥周時攝隰州事濬城隍嚴兵備并人至謙溥登城徐步并人不敢動因夜縋敢死士百餘薄賊營大破之宋初復刺隰州敵人不敢犯境宋李士衡知解州居官亷静不為矯激何灌為河東將與夏人遇鐵騎來追灌射皆徹甲至洞胷出背疊貫後騎羗懼引郤趙尚寛仁宗時知河中府神勇卒苦大校貪虐刋匿名書告變尚寛命焚之曰妄言耳衆乃安已而奏黜校分士卒𨽻他營李周知洪洞縣民有世絶而官録其産者其族晚得遺劵周取以還之縣南有澗支流溢入嵗賦菑楗調徙遏之周始築新堤民不告病程師孟提點河東路刑獄晉地多土山旁接川谷春夏大雨水濁如黄河可灌溉師孟開渠築堰淤良田一萬八千頃孫固知霍邑縣宰相韓琦知其賢諭使來見固不肯往𤦺益器重之杜衍提點河東路刑獄時高繼昇知石州人告其蕃族謀變逮捕繫治久不决衍辨其誣抵告者罪狄棐知河中府有中貴人過郡言將援棐於上棐答以他語退謂所親曰吾湘潭一寒士今官侍從可以老而自汙耶晁補之知河中府脩河橋以便民民畫祠其像弟詠之工於文亦嘗為河中教授宗澤晉州趙城令下車請升縣為軍書聞不盡如所請澤曰承平時固無慮他日有警當知吾言矣郝仲連建炎初金人犯河中守臣席益遁去仲連引兵屯河中就權府事率衆與金人力戰度不能守先自殺其家人城陷不屈及其子皆遇害金楊伯雄皇統中為平陽尹先是張浩治平陽有惠政及伯雄為尹百姓稱之曰前有張後有楊丁暐仁和川令前令罷耎不事事羣小越法干禁無所憚暐仁申明法禁皆屏息凡租賦與百姓前為期率比他邑先辦張萬公明昌中知河中府時軍興謂發叢劇悉為寛假使民力易辦人為繪像於薫風樓又建去思堂胥鼎貞祐中知平陽府事兼河東南路兵馬都總管建言利害十三事若積軍儲備黄河簡將練卒之類多見採用劉徽柔天眷中洪洞令明敏善聴斷縣人楊逺者訴夜雨屋壊壓姪死徽柔熟視笑曰汝利姪財而殺之叱付獄其人立㐲秩滿縣人遮戀為立生祠刻石頌徳正隆中同知河東南路轉運使事廉名第一張元絳州正平令有治績時有韓希甫王兢相繼治河内皆有幹能而元差不及故縣民為之諺曰西山至河岸縣官兩人半元張徳輝河東宣撫使下車擊豪强黜贜吏均賦役耆耋不逺千里來見曰六十年不復見此太平官府矣戴之若神明王惲中統間平陽路總管府判官太平縣有疑獄久不决惲一訊即得其實乃盡出所逮繫者時境内久旱一夕大雨鄭鼎至元初為平陽路總管時大旱下車而雨導分水溉民田千餘頃脩學校勵風俗建横澗故橋以便行旅民徳之本朝霍毅大寧知縣公平忠厚剖决詳明以縣地磽瘠諭民藝桑棗以治生興利除害民安其業周郁襄陵知縣為政廉勤具有成式裁省冗費賦役以平蒲去人咸思之徐彪洪武末臨汾縣丞存心廉恕復流離闢荒蕪均徭役簡詞訟政有成效尋陞本府同知官民信服境内肅清楊睿永樂初平陽知府處事以公化民有法不數月政教興行刑清訟簡民稱其賢明嘗嵗旱睿禱之甘雨隨注歿于官人皆哀之劉濬永樂中知臨汾縣守身亷謹處事詳明政平訟簡吏不上欺邑人愛慕之傅衡洪武中平陸縣典史涖事明敏賛治公勤以績最陞監察御史劉亨洪武末知汾西縣為政公平操守廉潔聲望逺著萬觀正統初知平陽府嘗請新堯廟致芝瑞之應考滿陞山東左布政省志張廉正統初蒲州知州居官務實惠而不近虛名憂去百姓伏闕懇留特賜俞允尋致仕嵗久民懐其惠猶一日焉省志楊志學正統中襄陵縣學教諭操履清慎訓誨勤篤嘗從薛文清講明理學甚得淵源省志王彧正統中知洪洞縣濬導霍泉以廣漑民田至今民受其利省志李真正統間猗氏縣丞以廉幹稱陞髙平知縣滿去民立祠祀之省志劉智正統末知絳縣以公平著績滿九載民乞留増秩六品復任績益著又滿九載自引致仕民遮道泣送省志張翼正統末知靈石縣興學育材築城捍虜具有成績志省朱凱景㤗初為垣曲知縣以興學勸農著績迄今人思其徳省志胡睿成化初為平陽府知府蒞政精宻㢘慎仁恕陞去人多思之省志流寓伯夷叔齊殷孤竹君之二子也讓國而逃周武王伐紂夷齊扣馬而諌武王已平殷亂天下宗周而夷齊耻食周粟隠於首陽山采薇而食之遂餓而死卜商衞人孔子弟子居文學科孔子既没退居西河教授為魏文侯師後世追封河東公劉毅晉東萊掖人幼有孝行少厲清節僑居平陽武帝時累官尚書左僕射子􅚐正直有父風官至左丞陽城定州北平人好學無所不通及進士第乃去隠中條山與弟堦域常易衣出城謙恭簡素唐徳宗時召拜諌議大夫後為國子司業道州刺史穆衍河内人徙河中第進士知淳化縣考課為一路最後累官陜西轉運使加直龍圖閣知慶州徙延安歸䁑汴梁人至順初進士累官集賢學士兼國子祭酒致仕僑居宏州徙蔚州又徙宣徳皆間闗避兵後居解之夏縣人物唐虞后稷堯臣為農師教民稼穡今稷山縣稷神山有墓董父舜時豢龍氏相傳為今聞喜人夏巫咸相殷王大戊保乂王家其子巫賢又相祖乙相傳為今夏縣人闗龍逢以諌桀而死相傳為今安邑人商傅説殷高宗恭黙思道夢帝賚良弼以象求之説築傅巖之野惟肖遂立為相相傳為今平陸人周師服晉人穆侯時為大夫穆侯名太子曰仇次曰成師師服知其兆亂於此仇立是為文侯封成師於曲沃其後逆亂皆如其言荀息春秋晉人獻公時為大夫請假道於虞以伐虢師還襲虞滅之息初輔奚齊奚齊見殺又立卓子輔之卓子亦見殺息遂死焉郤芮晉人獻公時為大夫食邑於冀謂之冀芮輔公子夷吾獻公卒芮因秦齊之師納夷吾於晉是為惠公士蔿晉人獻公時為大夫初桓荘之族偪獻公患之士為謀去其富子盡除游氏之族勸申生為呉太伯為申生夷吾築城不謹退而賦曰一國三公吾誰適從趙夙畢萬俱晉人獻公作二軍自將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿霍魏還賜夙耿賜萬魏以為大夫萬之後傳至裔孫斯遂為諸侯卜偃晉人獻公時為掌卜大夫初盛使荀息伐虢圍上陽問卜偃曰吾其濟乎對曰克之童謠云丙之晨龍尾服辰均服振振取虢之旂鶉之賁賁天策焞焞火中成軍虢公其奔其九月十月之交乎如期㓕之里克晉人獻公時為大夫公使太子申生伐東山臯落氏克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子帥師非太子之事也觧揚晉人奉使如宋使無降楚楚執而厚賂之使反君命卒致君命楚欲殺之以其不屈既而歸之宫之竒虞人仕於虞晉侯欲假道於虞以伐䝞之竒諫虞公不聽遂去之百里奚虞人知虞公不可諫遂去之秦相穆公霸諸侯郤缺苪子臼季使過冀見缺耨其妻饁之敬相待如賓與之歸言於文公以為下軍大夫子克與范叔欒伯三帥讓功卒諡獻子吕飴甥晉人惠公時為大夫食采於陰謂之隂飴甥秦穆公伐晉執惠公飴甥㑹秦伯盟于王城遂奉惠公以歸介之推晉人從文公出亡及還賞從亡者推不言禄禄亦弗及推曰獻公之子九人唯君在矣天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜況貪天之功乎遂與其母偕隠而死文公求之不獲以綿上為之田曰以志吾過且旌善人史蘇晉人文公時太史嘗諫獻公伐驪戎既伐克之曰晉以男戎勝戎戎以女戎勝晉先軫晉人文公時為大夫城濮之役將中軍遂敗楚師文公卒秦師伐鄭襄公從先軫之謀敗秦師于殽子蔑亦為大夫卒諡曰貞欒枝晉人父成號共子初武公伐翼殺哀侯共子戰死之枝事文公為大夫將下軍趙衰讓之為卿荀林父晉人為文公御戎敗楚師於城濮又佐下軍敗秦師景公時代卻缺為政卒謚曰桓其後號中行氏李離晉文公之理也過聴殺人自拘當死文公曰下吏有過非子之罪也李離曰臣居官為長受禄為多今過聴殺人傳其罪下吏非所聞也竟伏劒而死狼瞫晉人事襄公求為右不可襄公縛秦囚使戎右莱駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乗遂以為右及彭衙既陳狼瞫以其屬馳秦師死焉晉師從之大敗秦師士㑹蔿子事文公襄公食邑於隋亦稱隋季城濮之戰幼而與謀靈公時為大夫景公時將中軍王室亂士㑹平之歸而講求典禮以脩晉國之法乃老卒諡武子先且居軫子襄公以其父死敵命將中軍初文公之世諸侯朝晉衞不朝襄公謀伐衞先且居曰效尤禍也請君朝王臣從師晉侯朝王于温先且居胥臣伐衞圍齊取之後又敗秦師於彭衙趙衰夙之孫有深智逺謀重耳安於齊與舅犯謀適楚勸受楚客禮適秦相公子禮既歸勸入定襄王命為卿以讓欒枝文公反國及霸多出其謀子盾代為卿制事典辟獄刑行諸晉為常法卒諡曰宣賈季曰趙衰冬日之日趙盾夏日之日也鉏麑晉之力士也靈公不君趙宣子驟諫公患之使鉏麑賊之晨往寢門闗矣盛服將朝尚早坐而假寢麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信乃觸槐而死祁奚晉人悼公時為中軍尉請老公問代之者稱觧狐其讎也狐卒又問對曰臣之子午也可羊舌職死公問孰可代之者對曰赤也可於是使祁午為中軍尉羊舌赤佐之君子謂奚稱其讎不為諂立其子不為比舉其偏不為黨平公立起奚為公族大夫士爕㑹子代㑹為上軍佐敗齊師于鞌聘魯請伐郯魯賂之不受厲公驕爕知難作不欲與楚戰曰外寧必有内憂使祝宗祈死曰使我速死無及於難六月死冬果難作諡曰文號范文子弟魴事悼公為卿卒諡曰貞魴子弱仕為大夫靈輙晉人趙宣子田于首山舍于翳桑見輙饑食之輙舍其半問之曰請以遺母因與之簞食與肉靈公嘗伏甲攻宣子輙倒㦸以禦公徒而免之問其故對曰翳桑之餓人也問其名居不告而退遂自亡董狐晉史官靈公欲殺趙盾盾出奔已而趙穿弑公盾遂復董狐書曰趙盾弑其君盾曰不然對曰子為正卿亡不越境復不討賊非子而誰孔子曰董狐古之良史也書法不隠郤犨缺從子景公時為大夫食邑於襄陵與郤至郤錡並稱號三郤至冇才辯為使有禮謀事有智臨戎有文羊舌肹晉人博識多文能以禮信為國介聘於楚楚欲敖以所不知而不能鄭鑄刑書責子産以開端治罪不私其親稱為遺直魏顆魏武子犨之子初武子有嬖妾武子疾命顆曰必嫁是疾革則曰必以為殉及卒顆從治命嫁之秦師伐晉顆敗之獲杜回顆見老人結草以亢回故獲之夜夢老人曰余而所嫁婦人之父也爾用先人治命余是以報韓厥晉人景公時為司馬鞌之役大敗齊師能執臣禮於齊君䣕陵之役逐鄭伯不敢速晉遷新田用其謀卒諡曰獻知罃林父之仲孫父荀首景公時佐中軍食於知後因號知氏邲之戰知罃沒於楚首求於楚而歸之迎立悼公脩政施徳晉以復霸代韓厥執政卒諡曰武士匄爕之子厲公時嗣父職悼公立以為卿聘魯拜彤弓之賦使將中軍讓於荀偃而佐之故其下皆讓後代偃執政卒諡曰宣號范宣子吕相晉人父錡邲之役佐知武子獲楚公子榖臣與連尹襄老以免子羽鄢之役射共王中目楚使養由基射死之相事厲公嘗使絶秦悼公時使佐下軍卒諡宣子魏絳顆弟事晉悼公為軍司馬因言和戎有五利公説之使絳盟諸戎勸公脩政息民三駕而諸侯平蕭魚之㑹為下軍佐卒諡曰莊孫舒去車用卒以勝翟人卒諡曰獻趙武衰曽孫父朔為屠岸賈所殺朔妻成公姊遺腹生武賈索之急賴程嬰杵臼以免後立為卿相悼公薄諸侯之幣而重其禮諸侯以是睦於晉卒諡曰文伯瑕晉人世為理官因姓士氏號文伯鄭鑄刑書知其將火日食知魯衛惡之子彌牟號景伯嘗責宋不輸粟於王城成周又責宋不受功張老晉人悼公時為侯奄代魏絳為司馬又立為卿以讓魏絳見趙文子為室礱斵不竭而歸責其忘義子君吕仕為中軍司馬韓起厥子兄曰無忌厥欲以無忌為嗣乃辭以疾請立起悼公以無忌為仁使掌公族大夫起代父為卿平公時使聘于周王使請事所對辭不失情聘魯觀易象春秋聘鄭諸大夫賦之末年代趙武為政卒諡曰宣士鞅匄子晉悼公伐秦鞅與欒黶之弟鍼馳秦師鍼死而鞅返黶欲殺之鞅遂奔秦秦景公問鞅晉大夫其誰先亡對曰其欒氏乎後景公以其知言為請于晉而復之平公立以鞅為卿卒諡獻子師矌晉人為樂師度正音律悼公嘗問曰衛人出其君不亦甚乎對曰良君養民如子葢之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主也而民之望也若百姓絶望社稷無主將安用之絳縣老絳縣人晉悼夫人食城杞者絳縣人或年長往與食使之年曰臣不知紀年臣生嵗正月甲子朔四百四十有五甲子矣師曠曰七十三嵗趙文子召之而謝過焉曰武不才使吾子辱在泥塗久矣使助為政辭以老與之田使為君復陶以為絳縣師荀呉林父曾孫祖庚晉景公時為大夫代荀首佐中軍父偃為晉卿卒諡獻子呉嘗大敗羣狄不受鼓人之叛鼔告力竭而後取之不戮一人平公時為卿卒諡曰穆呉子寅勸勿伐楚卒諡曰文段干木芮城人與卜子夏田子方皆為魏文侯師文侯過其閭必式張儀晉張老之後世居河東始嘗與蘇秦俱學鬼谷子之衛後相秦惠王言聴計從及蘇秦死後遂破從約説六國事秦歸報未至而惠王卒武王立不説儀儀乃脱身相魏藺相如趙城人戰國時仕趙初為舍人奉璧入秦易城秦留趙璧無意償城相如紿取璧持以歸趙王拜為上卿范睢魏人游説諸侯欲事魏家貧無以自資而先事魏中大夫須賈為賈所譖魏相欲殺之脱身入秦為相封應侯公孫衍魏之陰晉人號犀首為秦説齊魏攻趙破蘇秦從約與張儀不善而去秦儀卒復歸秦秦欲相之為甘茂所間復之魏漢紀信趙城人事漢王為將軍項羽攻滎陽急信自請乘漢王車黄屋左纛以誑楚漢王間出信為羽焚死郅都河東楊人漢景帝時為中郎將敢直諫拜濟南太守公廉有勇氣後遷中尉行法不避貴戚時號蒼鷹衞青平陽人本姓鄭武帝時拜太中大夫屢將兵出鴈門雲中伐匈奴立大功封長平侯子伉不疑登皆封侯霍去病平陽人為人少言不泄有氣敢往善騎射武帝朝從衞青為嫖姚校尉凡六出擊匈奴以功封冠軍侯加驃騎大將軍霍光去病異母弟武帝朝為奉車都尉出入禁聞二十餘年未嘗有過受遺詔輔昭帝百姓充實四夷賓服及廢昌邑王立宣帝前後秉政二十年甘露中圖形麒麟閣居第一司馬遷龍門人父談為太史令遷十嵗誦古文弱冠游江淮浮沅湘渉汶泗過梁楚以歸太初中為太史令因論李陵得罪幽而發憤脩史記劉向揚雄皆稱其有良史才尹翁歸平陽人文武兼備清潔亷讓歴宏農都尉地節中徵拜東海太守以髙第入守右扶風治為三輔最三子皆為郡守少子岑歴位九卿張敞平陽人父福光禄大夫宣帝朝敞以察亷為甘泉倉長後為京兆尹九年以經術自輔號稱職坐楊惲免冀有賊起為刺史盗平守太原郡徵為左馮翊會病卒胡建河東人武帝朝守軍正丞時監軍御史為奸建斬之以聞遂顯名當世後為渭城令甚有治聲上官安以私憾捕建建乃自殺裴濳聞喜人仕為代郡守時烏桓驕恣前守不能治潛單車之郡撫以恩威遂皆讋服後為尚書令三國賈逵襄陵人魏文帝時為豫州刺史外脩軍旅内治民事長吏不如法者皆奏免之帝曰真刺史矣通運渠二百里名賈侯渠子充晉元勲仕至尚書闗羽解人事蜀先主稱萬人敵拜前將軍假節鉞威震華夏為世虎臣嘗刺顔良報效曹公有國士風死為神二子平興亦知名衞覬安邑人漢末曹操辟司空掾屬魏初拜侍中與王粲並典制度明帝時封閿鄉侯覬以文章顯好古文鳥篆𨽻草受詔典著作撰述至數千篇毌丘儉聞喜人魏明帝時為尚書郎累遷至荆州刺史及帝欲討遼東以儉有幹策徙刺幽州以定遼功進封安邑侯裴秀潛子兄茂仕魏為侍中尚書秀少好學八嵗能屬文時語曰後進領䄂有裴秀仕魏為黄門侍郎散騎常侍嘗改定官制及作禹貢地圖累封至濟川侯晉裴楷秀從弟容儀俊爽博涉羣書少與王戎齊名武帝時累官㪚騎侍郎後遷中書令終開府儀同三司裴頠秀子宏雅有逺識博學稽古惠帝時為國子祭酒累遷尚書侍中後為趙王倫所害晉俗尚虛無頠著崇有論以矯之韋忠平陽人少慷慨有志年十二喪父號慟服闋廬墓藜藿不充徴辟不就武帝朝為郡功曹會山羗破郡射太守陳楚忠願代死賊義之舍去後以鎮西大將軍討叛者矢盡不屈而死衞瓘覬子蚤以孝稱明識清允弱冠初仕魏歴散騎常侍中轉廷尉監鄧艾軍平蜀進位太保嘗請改九品立鄉舉里選後為賈后所殺衞玠瓘孫父恒歴官黄門侍郎工草𨽻為四體書勢與父瓘同遇害玠風神秀異見者以為玉人好談元理累官太子洗馬後移家建業人士聞其名觀者如堵李矩平陽人勇毅多權畧永嘉初領河東平陽太守時饑疫矩悉心撫恤百姓賴焉後以功累封平陽侯鄧攸襄陵人以孝稱永嘉之亂棄子負姪以避賊元帝時拜呉郡守載米之郡唯飲呉水刑政清明百姓歡悦累遷尚書右僕射郭璞聞喜人博學髙才工詞賦時有郭公者精卜筮璞從之游得青囊中書由是洞知五行卜筮之術占驗甚多撰洞林新林卜韻爾雅註數十篇又注三蒼方言山海經楚辭詩賦數十萬言避地過江元帝重之以為著作佐郎南北朝薛安都汾陽人少以勇聞宋武帝時隨柳景元克闗陜為雍秦二州都統後為左軍將軍單騎斬魯爽人比之關公斬顔良以功進爵為侯薛辯汾陽人父强有大志與王猛齊名辯俶儻有大畧初仕姚秦知其運衰遂棄歸後仕魏立功位平西將軍賜爵汾陰侯孫湖篤志於學為河東太守裴駿聞喜人父雙碩後魏宏農太守駿幼聰慧兵亂襲聞喜駭率鄉豪奔赴太武補中書博士崔浩目為三河領袖後轉中書侍郎卒贈聞喜侯裴敬憲駿從孫學博才清後魏時舉秀才髙第除太學博士工𨽻草解音律世有徳於鄉賊過其宅輒相約不犯弟莊伯有才器博識多聞後魏臨淮王引為記室叅軍敬憲病莊伯晝夜侍側遇病卒世嗟悼之柳崇解人方雅有器量學行後魏時舉秀才髙第歴尚書郎中孝文嘗遣崇檢斷鹽池争訟及經畧荆郢累遷河中太守境内帖然柳蚪解人後魏大統中為洛陽行臺郎中掌文翰後遷中書侍郎時人論文體古今之異蚪謂時有古今文無古今作文質論柳世隆解人晚年以談義自髙喜彈琴古稱柳公雙瑣為士品第一仕劉宋為武威將軍子惔梁僕射惔子明義興太守明子裘駙馬都尉元帝時使魏江陵陷遂入闗中仕周封昌樂公裴松之聞喜人仕劉宋為中書侍郎註三國志其子駰註史記裴延儁聞喜人祖雙彪河東太守父崧行平陽郡事延儁少孤孝事後母渉獵墳典後魏時舉秀才累官至幽州刺史考績為天下最後歴中書令裴佗聞喜人五舉秀才再舉孝亷以髙第除中書博士累遷趙郡守為政有方佗性剛所交皆名勝清白任真不事家産子讓之為北齊清河守裴果聞喜人祖思賢父遵皆刺史果慷慨有志畧為後魏平陽郡丞以征討功授河北郡守後從周文帝戰河橋勇冠當時進爵為公楊􅋆正平人少豪俠仕後魏拜伏波將軍元顥入洛孝莊帝南討至馬渚􅋆具舟以濟王師顥平封肥如縣伯後從孝武入闗進侯爵裴寛聞喜人祖徳歡魏中書侍郎寛弱冠以孝友稱仕西魏歴㪚騎侍郎授都督與東魏戰被擒遁還後封夏陽縣男裴俠解人祖思齊拜議郎父欣西河守俠七嵗始能言聰慧異常從西魏文帝戰沙苑以功進侯爵後為河北郡守清慎奉公號獨立使君後周時進爵為公裴邃河東人徙夀陽仕梁累官廣陵太守徙始安邃深沈有志畧歴北梁秦豫三州刺史為政寛明能得士心居身方正有威重及卒淮肥之間莫不流涕裴文舉聞喜人西魏時為著作郎周孝閔踐祚襲澄城縣子累遷絳州刺史後入為司憲中大夫進爵為伯裴叔業聞喜人少有氣幹以將畧自許仕北齊累遷黄門侍郎封昌縣伯後拜徐州刺史封蘭陵郡公樂遜猗氏人明詩書禮樂春秋大義後周時除秋官府上士轉少師氏下大夫明帝時霖雨遜陳時宜十四條拜太子諫議出為東揚州刺史賜安車衣服儒者榮之薛聰辯孫方正有理識後魏時為治書侍御史彈劾不避彊禦孝文寄以心膂每欲進位苦辭不受魏主曰卿天爵自髙非人爵所能榮也子孝通博學有雋才累官常山太守薛寘汾隂人西魏時領著作佐郎脩國史累遷中書令後仕周以功進爵為侯時改物創制欲行周禮寘等斟酌詳定焉柳遐聞喜人初仕梁蕭詧稱帝辭去讀書詧殂行服後周時累徴不起武帝再徵始起授霍州刺史導人務先以徳子靖歴河南廣德兩郡守人畏愛之張元後周芮城人年十六祖失明元晝夜祈禱一夕夢神人以金箆療祖目越三日祖目癢因䑛之果明後人立祠謂之張府君廟薛憕汾陰人家貧躬耕以養祖母有暇則覽文籍周文帝即位拜中書侍郎大統初儀制多闕周文令憕與盧辨等叅定之柳機觧人父慶後魏僕射機初仕後周為華州刺史隋髙祖欲受禪周臣皆勸機獨義形於色後歴刺華冀兩州俱稱寛惠子述性明敏有幹畧隋仁夀中為兵部尚書參掌機宻薛道衡汾陰人少負才名北齊時為散騎常侍與諸儒脩定五禮待詔文林館後拜中書侍郎柳莊解人博覽文籍仕梁為黄門侍郎隋髙祖在周輔政蕭巋令莊奉書入闗及髙祖踐祚莊又入朝髙祖深慰勉之莊明習舊章雅達政事蘇威稱其兼有世務學業隋柳旦機弟大業初拜龍川守開設學校大變其風徴為太常少卿判黄門侍郎事又柳肅者亦機弟為太子洗馬坐除名煬帝召守禮部侍郎轉工部每征遼東委守涿州裴矩佗孫學渉經史髙祖即位擢給事郎轉吏部侍郎名為稱職煬帝時與聞政事多歴嵗年後雖處危亂未虧亷謹之節柳昻機族凡父敏事後周歴清顯昻在周致位開府及入隋加上開府復出為之潞州刺史乞建學制禮以移風俗髙祖從柳雄亮機從弟父檜周華陽太守為賊所害雄亮年十四哀毀逾禮武帝時賊黄衆寳率所部歸長安雄亮手斬復讐累遷内史中大夫爵汝陽縣子隋初進伯爵裴藴聞喜人隋初平陳超拜開府禮賜優給歴洋真等州刺史考績連最後權御史大夫趙綽河東人開皇初為大理丞處法平允累遷少卿髙祖嘗以刑部侍郎辛亶衣緋禈謂為厭蠱欲斬之綽執不可帝怒命斬綽綽曰執法一心不敢愛死乃釋之及卒帝為流涕韓擒虎河東人容貎魁岸文帝時拜廬州總管委以平陳之任及大舉擒虎以輕騎五百直取金陵陳平進位上柱國王通龍門人幼篤學慨然有濟蒼生之志詣長安奏太平十二策不見用退居河汾教授倣古作經又為中説以擬論語大業初徵不至及卒門人諡曰文中子弟凝子福郊福畤張文詡河東人父琚洹水令有清政教子姪皆明經自達文詡通三禮易詩書春秋三傳家貧灌園為業仁夀中辟舉不應事母至孝以徳化人及卒鄉人立碑頌焉唐裴寂蒲州桑泉人仕隋歴侍御史晉陽宫副監賛唐髙祖起義兵及髙祖即位累遷尚書左僕射拜司空卒贈河東郡公張元素蒲州虞鄉人初仕隋為景城縣户曹竇建徳執將殺之邑人千餘號泣請代釋之唐太宗即位櫂侍御史遷給事中時治洛陽宫上書諌止魏徴嘆其有回天之力歴太子左庶子張志寛安邑人居父喪哀毀嘗為里正忽詣縣稱母疾急求歸令問狀對曰母有疾志寛輙病令疑其妄繫於獄馳驗如言乃慰遣之母終負土成墳髙祖遣使拜㪚騎常侍表其閭柴紹臨汾人尚唐髙祖女平陽公主髙祖即位以功封霍國公貞觀初平梁師都累加至鎮軍大將軍薛大鼎汾陰人髙祖時為山南道副大使開屯田以實倉廩遷滄州刺史浚渠通商民歌曰新溝通舟楫利屬滄海魚鹽至昔徒行今騁駟美哉薛公徳滂被薛收道衡子受學王通唐初為秦王府主簿從討王世充及平劉黒闥收為書檄露布或馬上占辭該敏如素搆後封汾陰縣男子元超九嵗襲父爵髙宗朝拜中書令薛元敬少與從父收族兄徳音齊名世稱河東三鳯唐初為天䇿府記室叅軍又與十八學士之選後除太子舍人専掌文翰王績通之弟隋大業中舉孝悌亷潔授祕書正字還鄉種黍蒔藥釀酒自供自號東臯子武徳初待詔門下省官給酒一斗飲至五斗不亂著五斗先生傳及醉鄉記貞觀中撰隋書薛稷道衡曽孫屬文如良金美玉書畫皆名天下舉進士累官禮部郎中更歴兩省景龍末為諌議大夫昭文館學士睿宗朝封晉國公柳冲蒲州虞鄉人父楚賢隋末為河北縣長歸唐貞觀中歴都督刺史皆有名冲好學多所研綜景龍中修國史及姓系録唐興言譜學者以路敬淳為宗柳冲韋述次之薛仁貴龍門人應募征遼白衣陷陣立竒功太宗曰朕不喜得遼東喜得虓將累官左武衞將軍封河東縣男子訥訥子徴並羽林將軍暢金吾將軍王勃通之孫父福畤為雍州司功叅軍勃六嵗善文麟徳初對䇿髙第授朝散郎後以罪廢官福畤坐勃故左遷交阯令勃徃省父道出洪州為閻都督作滕王閣序衆嘆其天才弟勔勮助皆第進士著才名盧陵龍門人舉進士官至工部尚書讀書龍門山註春秋孝經每以經義决時議裴行儉聞喜人貞觀中舉明經仕為長安令髙宗時累遷吏部侍郎典選有知人之明後拜禮部尚書卒諡曰獻子光庭開元中拜相卒諡忠憲裴琰之聞喜人永徽中為同州司户叅軍年甚少積案數百省决一日畢號霹靂手後為永年令有惠政子漼舉明經遷監察御史睿宗當造金仙玉貞二觀漼諌止開元中拜吏部尚書裴炎聞喜人寛厚有竒節明經及第拜中書令武后廢中宗炎固争請歸政后大怒捕繫獄坐死流嶺南時其從弟伷先為太僕丞求面陳得失太后怒命杖於朝堂長流瀼州中宗復位召還累官五部尚書張嘉貞蒲州人以五經舉坐事免後擢監察御史歴梁秦二州都督政以嚴辦開元中拜中書令弟嘉祐任金吾衞將軍每朝軒葢騶道盈閭巷時號所居坊曰鳴珂里裴敬彞聞喜人曽祖子通隋太中大夫哭母喪明與兄弟八人皆以孝稱被旌表敬彞性警敏七嵗能文唐髙祖時為監察御史後歴太子左庶子武后時為酷吏所陷死嶺南裴守真稷山人舉進士六科連中天授中為司府丞以忤㫖出為汴州司馬後為寧州刺史民懐其政子子餘中明經累官冀州刺史次子耀卿擢童子科累官京兆尹請廣漕運以實闕輔拜同平章事充轉運緍使置河陰集津三門倉省運費三千萬敬暉平陽人累官侍中留守長安以治幹聞誅三張迎復中宗以功封平陽郡王為武三思所搆貶瓊州柳澤解人鯁介寡言笑風度方嚴景雲中為鎧曹叅軍太平公主奏復斜封官澤詣闕上疏不報開元中為殿中侍御史周慶立造竒器進澤諌𤣥宗善之張琇解人父審素以雋州都督被誣為御史楊汪所殺琇徙嶺南久之逃還殺汪吏捕以聞𤣥宗謂孝子不顧命殺之可成其志臨刑琇色自如曰下見先人夫復何恨裴冕河東縣人調渭南尉元宗入蜀拜御史中丞從肅宗至靈武與杜鴻漸等同勸進以功拜左僕射自製巾子人争效之號僕射巾裴寛琰之從子舉拔萃累官河東刺史州久旱寛入境輙雨徙河南尹不屈附權貴拜禮部尚書卒寛兄弟八人皆擢明經任臺省州刺史子諝擢明經代宗時為河東租庸鹽鐵使吕諲河東人第進士開元末歴殿中侍御史趨靈武見肅宗拜御史中丞所陳事皆納後櫂同平章事出為江陵尹治有威惠民歌詠之盧綸河中人徳宗時韋渠牟表其才召見帝有所作輙使賡和綸與吉中孚韓翃錢起司空曙苗發崔峒耿湋夏侯審李端皆龍詩齊名號大厯十才子裴遵慶聞善人强學該綜天寳中代宗朝累官尚書右僕射知選事每薦賢有來謝者輙以為恥諫疏皆削其稿所著有王政記曾孫樞第進士有經世才為朱全忠所害柳芳解人肅宗時與韋述綴緝吳兢所次國史凡百五十篇子冕博學富文詞世為史官父子並居集賢院以議論勁切忤執政出為婺州刺史福建觀察使張延賞嘉貞子博渉經史通吏治大厯初除河南尹治行第一更四鎮所至民頌其愛後拜中書侍郎同平章事子宏靖元和中同平章事繼祖父為相時號三相張家王質通五世孫少孤客夀春力耕養母講學授徒無仕進意年逾四十始擢科累官諫議大夫以直諫出為虢州刺史後為河南尹終宣歙觀察使清白畏慎所至有惠愛樊澤河中人舉賢良方正有將帥器徳宗時累官山南東道節度使威惠著襄漢間後加尚書右僕射子宗師累官絳州刺史政暇留心文事為文竒古為韓愈所稱董晉虞鄉人擢明經拜祠部郎中持節使回紇徳宗立授御史中丞貞元中拜相後封隴西郡公四子全道著作郎溪祕書郎全素太子舍人澥太祝范希朝虞鄉人徳宗幸奉天以戰守功累遷御史中丞復為振武節度使邊人不敢横憲宗時檢校尚書左僕射歴朔方河東節度使時號名將柳晟解人少以孝聞從徳宗幸奉天自請説賊為朱泚捕繫晟毀械夜亡間歸奉天及車駕還京累遷山西南道節度使囘鶻還進公爵柳宗元解人從曾祖奭中書令父鎮殿中侍御史宋元文章卓偉第進士中博學宏詞科拜監察御史坐王叔文黨貶永州司馬徙柳州刺史為文益進與韓愈齊名世號柳柳州有文集傳世薛珏河中人仕為乾陵令以清白聞課第一遷楚州刺史徳宗命使者分諸道黜陟趙贊盧翰等交薦之拜中散大夫賜金紫除司農卿裴潾聞喜人篤學善𨽻書元和初擢左補闗遷起居舍人憲宗喜方士潾舉秦漢事以諫帝怒貶江陵令穆宗立召拜刑部郎中卒諡曰敬裴垍聞喜人器局峻整舉進士四遷考功員外郎翰林學士憲宗朝拜中書侍郎集賢殿大學士垍引李絳崔羣與同列及擢裴度等知制誥裴度聞喜人貞元初進士累官中書侍郎督師討平淮蔡䇿勲封晉國公加中書令卒諡文忠度以身係天下輕重者三十年歴事四朝以全徳終始子識大理卿諗為學士薛存誠寳鼎人中進士第憲宗時累官御史中丞浮屠鑒虛倚宦䜿為姦坐事下獄存誠窮劾得數十萬有詔釋之存誠不敢奉詔鑒虛卒抵死子庭老及進士第讜正有父風文宗時累官翰林學士薛苹寳鼎人七世祖道實隋禮部尚書父禮唐奉天尉苹為長安令歴虢州刺史憲宗時以治行遷御史大夫後封河東郡公吕渭河中人舉進士建中末為禮部侍郎時中書省有古柳枯死徳宗自梁州還復榮茂人以為瑞柳渭令貢士賦之子温有竒表藻翰精好舉進士官至尚書郎嘗作凌煙閣功臣贊薛戎寳鼎人年四十不仕客陽羡山觀察使辟署不就自放江湖間後因藩府交奏為河南令累遷浙東觀察使所部苛禁悉弛之弟放舉進士累官刑部侍郎衞次公河東人建中間進士歴殿中侍御史翰林學士順宗立王叔文等弄威柄次公多所持正後以檢校工部侍郎為淮南節度使崔元亮慈州人擢進士第元和初為駕部員外郎清慎自持大和中改諫議大夫每遷官輙讓形於色文宗時以直諫著名朝廷推為宿望移疾歸東都召為虢州刺史司空圖河中人咸通末擢進士拜諫議大夫不起圖本居中條山王官谷遂隠不出作亭觀素室悉圖唐興節士文人時盗賊所過殘暴獨不入王官谷士人依以避難哀帝弑圖聞不食而卒五代裴迪河東人為人明敏善治財賦精於簿書梁太祖用兵四方留迪以調兵賦太祖自岐還將吏皆賜迎鑾叶賛功臣太祖曰叶賛之功惟裴公有之他人不足當也裴皥河東人仕唐為禮部侍郎每陳朝廷闕失宰相桑維翰皥所放進士維翰過皥皥不迎送人問之曰我見桑公於中書庶寮也桑公見我於私第門生也何迎送之有劉訓永和人仕唐至彰武軍節度丹陽等州觀察制置使後封開國侯贈太尉袁彦河東縣人少以趫勇應募嘗從周世宗討淮南累官彰信軍節度使宋初加檢校太尉宋王繼勲陜州平陸人初仕周歴憲麟等州刺史宋初授道州刺史上南漢可圖狀王師南伐以為賀州道行營都監繼勲有武勇在軍陣常用鐵鞭鐵槊鐵檛軍中目為王三鐵苗訓河中人善天文占候之術周末以散指揮使從宋太祖北征視日上復有一日久相摩盪指謂楚昭輔曰此天命也後累官檢校工部尚書子守信知算造乾元厯累官至司天少監董孝章解州人真宗時十世同居同時又有潞州邢濬八世同居隰州趙友七世同居以所在請加旌表從之仍蠲其課調劉綜虞鄉人雍熙初舉進士累官陜西轉運副使景徳中拜樞宻直學士知并州綜强敏有材所至以幹治稱弟綽舉進士官至刑部郎中薛田河東縣人少師种放與魏野友善進士起家歴知河南府天雄軍益州累遷右諫議大夫知延同二州卒田性和厚初以幹敏數為大臣所稱姚宗明河中永樂人其十世祖栖雲以父死於邊廬墓終四身唐時表其門栖雲生岳岳生君儒君儒生師正世皆廬墓至宗明十世同居慶厯中復其家是後又三世同居孝睦不替王曙河汾人唐東臯子績之後徙居河南中進士第咸平中累官樞宻直學士知益州仁宗時拜同中書門下平章事卒謚文康子益柔少力學通羣書官至龍圖閣直學士知應天府薛奎絳州正平人舉進士第一乃推里人王嚴而處其下仕為隰州推官能辨疑獄累官樞宻直學士知益州仁宗時叅知政事卒諡簡肅奎性剛不茍合遇事敢言尤能知人孫復晉州平陽人舉進士不第退居泰山著春秋尊王發㣲十二篇范仲淹富弼薦擢校書郎國子監直講召為通英説書遷殿中丞卒仁宗命其門人祖無擇就其家得書十五萬言録藏秘閣張觀絳縣人中服勤詞學科第一通判解州仁宗時權御史中丞條上十餘事拜同知樞宻院事後遷尚書左丞卒觀趣尚恬曠持亷少欲仁宗嘗飛白書清字賜之以賞其節薛顔萬泉人舉三禮中第歴河東陜西轉運使河中浮橋嵗為水所敗顔釃上流為支渠以殺水怒因取渠水溉田民頗利之仁宗即位遷給事中司馬池陜川夏縣人少喪父家貲數十萬悉推諸父而自力讀書舉進士知光山縣仁宗朝自知鳯翔府召知諫院表懇免上曰人皆嗜進池獨嗜退官至天章閣待制知晉州長子旦清直敏强累官知安州從子里官至太常少卿劉永一夏縣人孝友廉謹熙寧初巫咸水溢民多溺死永一持竿立門前見他人物流入者輙為擿出之鄉人負債不肯償立焚其券兄太為醫助教居親喪不飲酒食肉終三年司馬光傳之以為今士大夫所難司馬光池次子寳元初進士累官端明殿學士知永興軍上疏極言青苗助役法不便出判西京留臺退居洛十五年哲宗初立召拜左僕射罷青苗法人謂元祐相業有旋乾轉坤之功著述甚多卒贈太師封温國公諡文正子康端謹至孝舉明經累官司諫直集賢院侯仲良河東人父道濟娶程珦女仲良呼二程為舅氏從之游人欲館仲良者仲良見其家壁垂佛像几積佛書即去之朱子稱其學清白勁正薛向顔之孫制置解鹽兼提舉買馬又歴知數州皆有能聲元豐初同知樞宻院事卒諡恭敏向幹局絶人尤善商財計算無遺䇿子紹彭有翰墨名中子嗣昌官至刑部尚書司馬朴光兄旦之孫少育於外祖范純仁紹聖黨事起父宏坐上書論辨得罪責永州病失明後朴以純仁遺恩補官靖康初以兵部侍郎使金握節而死贈兵部尚書諡忠潔趙鼎聞喜人崇寧中進士隨髙宗南渡累官殿中侍御史陳四十事遷御史中丞初鼎薦張浚後並相協心以圖興復之功與秦檜論和議不合罷政謫嶺南在吉陽不食而卒孝宗時贈太傅豐國公諡忠簡孟宗政絳州人父林從岳飛至隨州因家焉宗政有膽畧為京西鈐轄駐劄襄陽屢敗金人代許國為荆鄂都統制置忠順軍威振境外金人呼為孟爺爺宗政好賢樂善於有功者怨必賞有罪者親必罰死之日邊城為罷市慟哭子珙亦為名將金梁襄芮城人性頴悟日記千餘言大定初進士世宗將幸金蓮川襄上疏極諫以直聲聞擢禮部主事累遷保大單節度使卒襄於春秋左傳至於地理氏族無不該貫李革河津人性頴悟讀書一再誦輙記不忘舉進士累官户吏二部尚書貞祐中拜叅知政事後出知平陽府城被圍屢出戰禆將出降革自殺贈尚書右丞段鐸稷山人政隆初與族人段仲珪同登進士人號其里曰雙桂鐸累官中奉大夫華州防禦使䕶軍後以功封武咸郡開國侯李愈絳州正平人慷慨尚志節正隆中進士為監察御史彈劾無所避累遷刑部尚書在朝多所建明後封隴西郡侯卒諡清獻所著有狂愚集李復亨滎州河津人年十八登進士調臨晉主簿貞祐間遷翰林直學士行三司事後拜叅知政事兼脩國史出為安國軍節度使元光初城破自殺李獻甫河中人與其從兄獻卿獻誠獻能皆以文學名相繼擢進士獻甫博學有幹局心所到處人不可及歴鎮南京節度副使死於蔡州之難所著有天倪集馮延登吉鄉人舉進士為詩文皆有律度興定中累官國子祭酒正大末假翰林學士承旨使元被留使招降鳯翔不從髠羈豐州後放還歴禮吏二部侍郎汴京陷投井死元靳和曲沃人居鄉喜周貧乏導人以善金貞祐間兵擾團結鄉人保障後仕元知絳陽軍政治公平子用六嵗從張理之學仕為曲沃翼城令累官僉嶺北湖南亷訪司使以同知晉寧路致仕父子忠藎士林稱之閻忠平陽和州人父衍事金沒於王事忠避兵山東家於髙唐其子復善屬文仕元累官翰林學士承㫖姚天福絳州人父居實徙鴈門天福讀春秋通大義至元中拜監察御史時詔罷各道按察使天福言不可權臣不悦左遷天福衡州路同知不就後拜叅知政事大興尹畿甸大治許國禎曲沃人博通經史尤精醫術金末避地嵩州後寓太原元世祖在潛邸徴至治疾刻期而愈至元中為禮部尚書嘗上疏言事多見施行所薦引皆知名士卒追封薊國公子扆官至大司徒王士元平陽人舉進士歴官風憲遷國子司業以崇文少監致仕士元持身亷正文行政事皆可師法所著有拙菴集賀賁隰州人父種徳徙居京兆賁有材畧善攻戰闗中兵後積尸滿野賁為大塚收瘞之嘗治室得白金七千餘兩乃持五千兩獻世祖以助軍後以賁總管京兆諸軍奥魯卒追封雍國公諡貞獻子仁傑及孫惟一相繼為上都留守王㤗亨平陽人成宗時給事東宫歴太子賓客累遷至中書平章致仕封晉國公卒諡清憲所著有康莊文集邢飛翰霍州人性剛果以薦為内御史巴延専政飛翰面質其非叅議佛嘉律姦邪復廷劾之後以兩淮鹽運司同知致仕元末兵亂被執不屈而死追封工部尚書諡忠義尉遲徳誠絳州人父鼐金潞州知州徳誠累官太子家令司丞得侍仁宗左右數薦士出未嘗語人選為河東山西道宣慰司同知擊姦吏寛税歛延祐中拜遼東廉訪使徐毅趙城人累官監察御史力陳臺省為治之要遷至刑部尚書中書叅議御史中丞能彌綸庶政及卒追封平陽郡公諡文靖張翥襄陵人以詩文知名負大節至正中累官翰林侍讀學士兼國子祭酒勤於誘掖後以學士承旨致仕封潞國公所為詩文甚多僅存律詩及樂府三卷嘗集兵興以來死節死事之人為書曰忠義録李謙亨曲沃人英宗時以儒進歴内臺御史時創西山寺謙亨與御史四人上疏切諫决杖文面安置奴兒干由是海内知名後召還授浙東海右道廉訪使封隴西郡侯卒諡忠肅傅起巖汾西人初為丞相掾歴西臺治書陞中書左丞知經筵事後拜西臺中丞多著勲績卒諡正獻裴居敬蒲州人累官雲南行省叅政居敬積學勵行家蓄書至二萬餘卷郭思貞蒲州人以儒進拜監察御史累遷南臺治書西臺中丞奎章閣大學士卒諡文憲牛光祖襄陵人以才辟總管府掾授户部主事後累遷雲南行中書省叅知政事楊守則翼城人初授翰林院檢閲官遷内臺御史陞户部侍郎再遷大都河間路總管守則同縣有郝温者由太學上舍累官四川行中書省郎中遷䕫州路總管褚君實石樓人沈黙有器局泰定中為嘉興路治中累官淮東廉訪副使汝頴盗起君實極力守淮安多所斬獲城陷力鬬被執為賊所臠守淮安凡五年殆數十百戰精忠大節人比之張巡事聞追封衞國公諡忠肅喬彞晉寧人性髙介為詩文有法自號芸齋至正中賊陷晉寧城中死者十二三彞整衣冠聚妻子家有大井彞坐井上令妻子軰循次投井中而已隨赴之賊平贈彞臨汾縣尹諡純潔本朝袁泰萬泉人洪武四年進士授湖廣􅻜縣丞累官右都御史處心㢘直執法不移理枉伸寃祛除民害一時良善獲安奸邪不得肆志蔡瑄滎河人洪武中以儀禮司序班累官通政使出納以公劾正乖謬百司肅然以養痾還卒於道訃聞禦製文以祭并賜賻鏹復其家三年藺芳夏縣人洪武中舉孝亷授刑部員外郎累官工部右侍郎才能著稱祝春蒲州人洪武中以儒士舉為通政司㕘議累陞詹事府少詹事學行超卓髙鐸絳州人才識明敏登洪武乙丑進士第累官至刑部侍郎暴昭浮山人洪武中進士累官刑部尚書嵗壬午靖難師入金川門昭被執抗罵不少屈死之塞通紀李寅臨汾人才識卓異登洪武庚辰進士第初授陜西安寨知縣有善政愛民累官陜西布政司右叅政賈正儀聞喜人優於文學洪武中舉秀才授河南道試監察御史有直聲累官河南布政司左叅政馬負圖臨汾人洪武末中京闈鄉貢初授户部主事勤能著稱累官河南左布政使王錫翼城人永樂戊子鄉貢授户科給事中累官通政司右通政為人忠厚勤慎不事脩飭僚屬敬愛之薛瑄河津人永樂末登進士官大理寺左少卿以獄事詿誤聞居正綂七年起大理寺丞累陞禮部左侍郎以疾致仕瑄出處大節光明峻潔于富貴利達泊如也為理學名臣時呼為薛夫子卒諡文清名臣録李素安邑人宣徳庚戍進士授户科給事中累官通政司右通政剛直有為敷奏詳雅時論稱之陳浩吉州人宣徳中進士除行在兵科給事中累官四川布政司左叅議省志王約猗氏人父早喪母遘風疾不能動約朝夕扶持躬侍湯藥母亡廬守墓側不御酒肉者三年正綂初旌為孝子省志陶銓絳州人登正統乙丑進士歴官陜西布政司叅議子璽進士累官户部員外琰成化辛卯鄉試第一省志柴良襄陵人由舉人授廣安知州冦至州治左右請避之良不可且曰吾清官冦來何為且郡章將誰属耶獨懐章坐中堂竟過害郡人哀慕立祠祀焉省志馮祥蒲州人輕財重義不事佛老凡冠婚喪祭一遵朱氏家禮鄉里咸取則焉薛文清公嘗贈詩曰誰道今人不古人其異于流俗如此省志韓文洪洞人成化初進士由工科給事中歴官尚書説者謂其愚似寗子而竟保其身老似武公而不弛於學卒贈太保諡忠定略志列女趙姬晉文公女也初文公為公子與趙衷奔狄以狄女叔隗妻衰生盾及返國又以姬妻衰生原同屏括樓嬰姬請迎盾與其母既至姬請立盾為嫡子使三子下之以叔隗為内婦而已下之及盾為正卿請於成公曰㣲君姬氏則臣狄人也遂以中子屏括為公族大夫伯宗妻伯宗晉大夫賢而好以直辨凌人妻曰夫子好直言枉者惡之其危可立待也子何不預結賢大夫以託州犂焉伯宗乃得畢羊而交之未幾宗伯以譛死畢羊乃送州犂于荆遂得免焉叔姬羊舌子之妻也羊舌子好正不客於晉去而之三室之邑邑人相與攘羊而遺之羊舌子不受姬曰不如受而埋之以明不與後攘羊事發都吏至發羊而視之其骨存焉都吏曰君子哉羊舌子不與攘羊之事矣范氏母晉范獻子之妻其三子遊於趙氏簡子乗馬園中園中多株問曰奈何其少子曰可以三悦使民簡子從之少子歸伐其謀母嘆曰終滅范氏者必是子也夫伐功施勞鮮能布仁乘偽行詐莫能久長後智伯滅范氏君子謂范氏母為知難本弓工妻晉繁人之妻平公使繁人為弓三年乃成公引之而射不穿一札公怒將殺弓人其妻請見曰妾夫造弓為之亦勞君不能射反以殺人妾聞射之道左手如拒右手如附枝右手發之左手不知平公以其言而射穿七札繁人立得出而賜金三鎰曲沃負魏大夫如耳母也秦立魏公子政為太子魏哀王使使為太子納妃而美王將自納焉曲沃負因欵王門而上書王然其言勤行自脩勞來國家而齊楚强秦不敢加兵焉敬氏河東人樊㑹仁之母名像子生會仁而夫喪母兄潛許人矯稱母患以召之既至覺之即携會仁遁歸兄追及逼與俱返像子誓以必死兄乃止會仁年十八卒母亦終像子曰夫死子亡老母不幸義無久活不食數日死裴淑英安邑裴矩之女適李徳武方踰嵗徳武坐事徙嶺南矩上表離昏徳武亦謂淑英曰我無還理汝必配他族淑英曰夫天也天可背乎願死無他志後十年矩欲嫁之淑英斷髮不食矩不敢奪其志徳武後赦還遂為夫婦如初衛孝女夏縣人字無忌年六嵗父為鄉人衞長則所殺無忌常懐復讐之志其從父延客長則在坐無忌遂以磚擊死之詣吏請就刑太宗特免其罪賜之田宅以禮嫁之趙氏女平陽人年二十未嫁冦亂被驅迫以行度不能免紿賊曰吾取所藏金以遺汝賊信之遂還投於厠而死柴氏襄陵人夫秦閏夫前妻遺一幼子未幾柴亦有子閏夫死柴辛勤紡績遣二子就學至正末長子被累法當誅柴詣官泣訴曰吾次子性從惡非長子也次子亦自以為罪鞫之至死不易言官訊之得其情義柴之行遂釋其長子而次子亦得不死事聞旌之復其家李氏臨汾張晟之妻元末晟為乾州學正卒時闗中兵起道梗不能還子文瑗甫九嵗李紡績度日兵稍息遂與子負骸骨歸葬守志不易本朝永樂初詔旌其門蕭伯政女平陵人女年十九適舉人姜某未幾而姜卒子一嵗女孀居四十餘年貞潔無玷永樂八年旌表之省志張氏告州人張顗女年十九適郝銘甫三嵗銘卒守節五十餘年始終無玷正綂十二年旌為貞節之門省志崔參妻信氏聞喜人年二十三夫亡舅姑令再適信弗從守節五十六年始終一日天順間事聞詔旌異之省志胡氏洪洞人胡復中女年十六適續慧閲六載而夫亡胡年二十二即矢志紡績貞節不渝成化二年旌表其門省志仙釋馬丹晉狄人文侯時為大夫獻公時為幕正公滅狄殺恭太子丹去至趙宣子時乗安車入晉都侯大夫靈公欲仕之逼不以禮有迅風發丹入迴風中而去北方人尊而祠之王喬河東人漢明帝時為葉令喬有神衛每朔望自縣詣朝帝怪其來數宻令太史伺之言其臨至輙有雙鳬從東南飛來舉羅張之得一舄乃所賜尚書官屬履也後天下玉棺喬沐浴寢其中葬城東南土自成墳百姓廟祀之孫博河東人讀書能屬文晚學道能使草木皆為火光照耀數十里行大水中身不沾濡人有疾指之言愈即愈出入山間石壁如有穴者後入林慮山合神丹仙去曹仙媪不知何許人常擕幼女引一犬息馬鬬闗柳下一日至河將渡舟師拒之媪擕女與犬凌波御風須臾登岸俄又登東岸石龕遂與女及犬俱化龕中土人立廟祀焉張惠明趙郡人結廬中條山遇混元子受髙舉之道行之道學超羣唐太宗詔入内殿致醮有感封妙濟大師尋至西嶽尸解焉羅通㣲臨晉人少時採薪山中遇閻使君宷謂曰子骨相巉可學長生遂冠褐五老山學歩虛絶粒唐貞觀中忽一日謂人曰我歸明日大會士庶萬人俄雷震地下青龍躍出通㣲遂跨而登仙張果隱中條山世傳數百嵗其貌如年六七十者往來汾晉間嘗乗白驢休則疊之如紙置巾箱中乘則以水噀之復成驢矣武后召之即死元宗召之來尋還山號通元先生侯道華芮城人或云自峨嵋山來詣中條道靖觀寺周悟仙恒如風狂人登危立險如履平地又好子史手不釋卷因殿宇壞登梁葺之得小金合中有丹遂吞之後上松樹頂與雲鶴盤旋凌空而去時唐宣宗大中五年也吕嵓蒲州永樂縣人唐㑹昌中兩舉進士不第遇鍾離子傳延命之術已而盡得金丹之妙時游湘潭岳鄂及兩浙汴譙間出入隱顯人莫之識自稱囘道人四月生號純陽真人吕道章垣曲人金大定間為縣吏夜夢神人告以脩道寤即避役居洪慶觀道成治疾疫民間時有竒驗比脩觀宇買木管州山放栰逺近不一皆有道章身董之既訖工乃解衲置黄河水面道章坐其上順流而去不知所之景素陽襄陵道士師事梁古賓居阜山道院元末兵亂鄉人匿山中唯素陽與師不去兵至求財不得欲殺古賓素陽曰師老矣願以身代兵即以刀砍素陽刀忽斷為三兵皆驚異羅拜而去曇延蒲州棲巖寺僧家世豪族宦周齊間延年十六身長九尺餘垂手過膝目光外射初聞講涅槃悟旨隋開皇間旱命延禱之甘雨大注臨終遺啟云法王御世最荷深思䕶持三寳始終莫二言訖而逝金舌和尚趙人脩道中條山唐開成間睿宗三召不至乃截其舌以進睿宗命焚之化為金舌夜哦經如故遂以金舌名之志寛河東人博覽諸經以湼槃地論為心要時以邑多虎暴都督張遜命寛禱之其患遂息唐貞觀中蒲晉旱寛曝烈日中二日須臾大雨合境霑足圓鏡本朝臨縣人早悟諸經宻㫖嘗遊隰州妙樓山石室寺一日至北門瓦窑坡上鑿洞構庵龕坐其中囑其徒曰吾將歸矣衆問其期曰來日耳至期沐浴更衣焚香趺坐説偈而逝明一統志卷二十
