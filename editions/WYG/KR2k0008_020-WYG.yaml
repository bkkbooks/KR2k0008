body:
  text: 明一統志卷二十明李賢等撰平陽府東至澤州沁水縣界一百五十五里南至黄河岸三百六十五里西至黄河岸三百一十里北至汾州孝義縣界三百二十里自府治至京師一千八百里至南京二千四百里糧一百一十萬九千石零建置沿革禹貢冀州之域天文觜參分野堯都平陽即此以其地在平水之陽故名春秋屬晉戰國屬韓後屬趙秦漢皆為河東郡地三國魏始置平陽郡晉仍舊後魏兼置東雍州孝昌中改唐州建義初又改晉州隋改郡曰平河尋廢郡為州大業初改臨汾郡義寧初復改平陽郡唐改為晉州天寳初改平陽郡乾元初復為晉州五代梁置定昌軍節度改建雄軍宋州軍仍舊政和中陞州為平陽府金屬河東南路元初為平陽路大徳中改晉寧路本朝復改平陽府領州六縣二十九臨汾縣附郭木漢舊縣屬河東郡三國魏置平陽郡縣屬焉後魏兼置晉州於此隋改曰臨汾縣為平河郡治後改郡曰臨汾唐分置西河縣尋省入臨汾屬晉州宋金元仍舊本朝因之編户一百四十四里襄陵縣在府城西南三十里本晉大夫郤犨食邑以襄公陵在此因名漢始置襄陵縣屬河東郡魏屬平陽郡後魏分置擒昌縣北齊移擒昌治此隋復為襄陵縣唐徙治於汾水之西五代晉屬絳州改屬河中府宋屬晉州金屬平陽府元仍舊本朝因之編户七十二里洪洞縣在府城北五十五里春秋時揚侯國晉滅之以賜羊舌肹漢置楊縣屬河東郡魏晉屬平陽郡後魏改屬永安郡隋屬臨汾郡後改為洪洞縣以洪洞鎮為名唐屬晉州宋以趙城縣省入金屬平陽府元仍舊本朝因之編户八十九里浮山縣在府城東九十里本漢河東郡襄陵縣地晉屬平陽郡北齊省入擒昌縣唐武徳初始析置浮山縣尋改神山縣屬晉州宋自郭城移治此金復為浮山縣屬平陽府元仍舊本朝因之編户一十八里趙城縣在府城北九十里周穆王封造父之地春秋時趙簡子居之漢為河東郡彘縣地隋為霍邑縣地隋末始分置趙城縣屬霍山郡唐屬吕州後屬晉州宋省入洪洞縣尋復舊政和中陞為慶祚軍金復為趙城縣屬平陽府元割屬霍州本朝洪武三年改今屬編户三十四里太平縣在府城西南九十里本漢河東郡臨汾縣地後魏始置太平縣以在太平故闗城因名屬平陽郡隋初屬晉州尋移於闗東北屬絳州唐復移原治又移敬堡宋金仍舊元屬絳州本朝洪武二年改今屬編户五十三里岳陽縣在府城北一百一十里本漢上黨郡榖逺縣地後魏置安澤縣屬義寧郡隋屬沁州大業初改岳陽縣屬臨汾郡唐屬晉州金屬平陽府元省入冀氏縣尋復置以冀氏省入本朝因之編户一十八里曲沃縣在府城南一百二十里春秋時晉文侯弟成師封曲沃即此漢為河東郡絳縣地晉屬平陽郡後魏始置曲沃縣屬正平郡後周移治樂昌堡隋屬絳州又移治絳邑故城北即今治唐宋金元皆因之本朝洪武二年改今屬編户六十八里翼城縣在府城南一百三十里春秋時晉絳邑後更曰翼漢為絳縣地後魏置北絳郡及北絳縣隋初郡廢又改為翼城縣屬絳州義寧初於縣置翼城郡唐初郡廢置澮州後廢州復屬絳州金改翼州元復為翼城縣屬絳州本朝洪武二年改今屬編户八十四里汾西縣在府城西北一百八十里本漢彘縣地屬河東郡東漢為永安縣地晉屬平陽郡後魏置臨汾縣及汾西郡隋初郡廢改縣曰汾西屬汾州大業初屬臨汾郡義寧初屬霍山郡唐遷縣治於厚義村屬晉州宋歸舊治金屬平陽府元仍舊本朝因之編户一十五里蒲縣在府城西一百四十里春秋時晉蒲城漢為河東郡蒲子縣地後魏置石城縣後周置石城郡周末廢又置蒲子縣隋以蒲子移治縣東北故箕城大業初改為蒲縣屬龍泉郡唐移今治元省入隰川縣尋復置屬隰州本朝洪武二年改今屬編户八里蒲州在府城西南四百五十里古為舜都春秋時屬晉為蒲坂地秦屬河東郡漢為蒲坂縣地後魏置河東郡兼置秦州後周改蒲州隋初郡廢州存大業初改河東郡治河東縣唐改蒲州屬河東道開元中改河中府陞中都尋罷都復為蒲州天寳初改河東郡乾元初復為蒲州尋改河中府五代梁置䕶國軍節度宋仍舊屬陜西路金為蒲州天徳初復為河中府屬河東南路元因之本朝洪武二年復為蒲州以河東縣省入編户八十七里領縣五臨晉縣在州城東北九十里春秋時晉桑泉地秦築壘以臨晉地因名臨晉漢為河東郡解縣地後魏為北解縣地隋置桑泉縣屬蒲州義寧初蒲州徙治此唐分置温泉縣尋省入桑泉天寳中改臨晉縣屬河中府宋金仍舊元以虞鄉縣省入本朝因之編户五十九里榮河縣在州城北一百二十里古綸地為夏后少康邑戰國時為魏汾陰地漢置汾陰縣屬河東郡晉時劉淵省入蒲坂縣後魏復置屬汾陰郡隋屬河東郡唐初屬泰州尋改屬蒲州開元中改寳鼎縣宋真宗祀汾陰改曰榮河縣置慶成軍尋廢以縣屬河中府金置榮州元仍為榮河縣本朝因之編户三十六里猗氏縣在州城東北一百二十五里古郇國地文王子所封後為晉令狐地漢置猗氏縣屬河東郡因猗頓居為名西魏改曰桑泉後周復曰猗氏屬汾陰郡隋屬蒲州自故城徙今治唐屬河中府宋金元仍舊本朝因之編户四十七里萬泉縣在州城東北一百九十里本漢河東郡汾陰縣地隋屬河東郡唐武徳中置萬泉縣屬泰州因縣東谷中多泉故名貞觀初廢泰州以縣屬絳州大順初改屬河中府宋金仍舊元省入猗氏後復置本朝因之編户三十八里河津縣在州城東北二百一十里古耿國殷王祖乙所都春秋時屬晉秦置皮氏縣漢屬河東郡魏晉皆屬平陽郡後魏改龍門縣及置龍門郡隋初郡罷以縣屬蒲州唐置泰州貞觀中州廢以縣屬絳州元和初屬河中府宋宣和初改為河津縣金屬榮州後復屬河中府元仍舊本朝因之編户三十六里解州在府城西南三百四十里春秋為晉之解梁城戰國屬魏漢為解縣屬河東郡後魏析置安定縣西魏改曰南解縣屬綏化郡隋改為虞鄉縣屬蒲州唐初改曰解縣貞觀初省入虞鄉後復置屬河中府五代漢始置解州治解縣宋屬河東路後改屬陜西路金於州置解梁軍後改保昌屬河東南路元仍為解州屬平陽路本朝因之以解縣省入編户三十一里領縣五安邑縣在州城東五十里禹營安邑即此地春秋時為晉境後屬魏秦漢為安邑縣河東郡治此隋置虞州大業初州罷縣屬河東郡後置安邑郡唐初郡罷復置虞州至徳初改虞邑縣屬陜州大厯中復名安邑屬河中府宋屬解州金元仍舊本朝因之編户九十五里夏縣在州城東北一百里本禹所都之地漢為安邑縣境後魏太和中别置南安邑縣改為夏縣以禹舊都故名隋初屬虞州後屬河東郡唐屬絳州乾元初改屬陜州金元屬解州本朝因之編户六十六里聞喜縣在州城東北一百二十里春秋晉曲沃地秦改為左邑屬河東郡漢武帝經邑之桐鄉聞破南粤因置聞喜縣東漢罷左邑移聞喜治此後魏屬正平郡後周移治柏璧隋屬絳州又移治甘谷唐復徙縣於桐鄉故城宋屬解州金元仍舊本朝因之編户六十六里平陸縣在州城東南九十里春秋虞國地戰國屬魏為呉城漢為河東郡大陽縣地東漢置河北縣後魏置河北郡治此隋初罷郡以縣屬蒲州唐貞觀初改屬陜州天寳初因開漕瀆得古刄有篆文曰平陸遂改平陸縣金元屬解州本朝因之編户五十五里芮城縣在州城西南九十里本魏國之附庸春秋時芮伯萬居此舊置安戎縣後周改芮城縣及置永樂郡隋省郡以縣屬蒲州唐置芮州貞觀初廢州以縣屬陜州金元屬解州本朝因之編户四十里絳州在府城南一百五十里春秋時屬晉即故絳與新田之都後屬魏漢為河東郡臨汾縣地魏屬平陽郡後魏置正平郡兼置東雍州治柏壁後周改為絳州徙治玉壁隋初郡廢徙州治東雍州城後改絳郡治正平縣唐復為絳州宋仍舊金置絳陽軍節度後陞晉安府元復為絳州本朝因之以正平縣省入編户五十二里領縣三稷山縣在州城西五十五里春秋晉侯治兵于稷即此漢為河東郡聞喜縣地後魏置髙凉縣屬龍門郡後周移縣治玉壁北齊置勲州隋屬絳州遷治於汾水北改曰稷山縣以山為名唐屬河中府宋金元俱屬絳州本朝因之編户七十七里絳縣在州城東南一百里春秋為晉都新田漢為絳縣屬河東郡晉屬平陽郡後魏置南絳縣及南絳郡後周廢郡改為絳縣因縣有絳山故名隋屬絳州唐改屬澮州後仍屬絳州宋金元仍舊本朝因之編户三十四里垣曲縣在州城東南二百三十里即周召分陜之處漢為垣縣地屬河東郡後魏置邵郡及白水縣後周兼置邵州改縣曰亳城隋改為垣縣屬絳郡義寧初置邵原郡唐改邵州貞觀初州罷以縣屬絳州宋改曰垣曲縣金仍舊元初省入絳縣尋復置本朝因之編户二十七里霍州在府城北一百四十五里禹貢岳陽即此地漢為彘縣屬河東郡東漢改永安縣魏晉屬平陽郡後魏初省後復置兼置永安郡隋初罷郡置汾州又改吕州并改縣曰霍邑以霍山為名大業初州罷以縣屬臨汾郡義寧初置霍山郡唐罷郡置吕州貞觀中州罷以縣屬晉州宋屬平陽府金陞霍州元仍舊本朝以霍邑縣省入編户二十里領縣一靈石縣在州城北一百里本漢太原郡界休縣地隋傍汾水開道得瑞石因置靈石縣屬介州義寧初屬霍山郡唐初屬吕州貞觀中州罷以縣屬汾州宋金仍舊元屬霍州萬厯中改屬汾州府編户二十五里吉州在府城西二百七十里春秋時晉屈邑即公子夷吾所居漢為北屈縣屬河東郡魏屬平陽郡後魏置定陽郡及定陽縣東魏置南汾州後周改汾州後齊改西汾州隋改耿州及改定陽為吉昌縣大業初置文成郡唐為南汾州治吉昌後改慈州復改文成郡又為慈州宋熙寧中州罷以縣屬隰州尋置吉鄉軍復置慈州金改耿州復改吉州元仍舊以吉鄉縣省入本朝因之編户二十四里領縣一鄉寧縣在州城東南六十里本漢河東郡臨汾縣地後魏分置太平縣又分太平置昌寜縣屬定陽郡隋屬汾州唐屬慈州五代唐改鄉寜縣元初省入吉州後復置本朝因之編户一十七里隰州在府城西北二百八十里春秋時晉蒲地戰國時屬魏為西河地秦屬河東郡漢為河東郡蒲子縣晉時劉淵據此後魏改長壽縣後周於此置汾州及龍泉郡隋初廢郡改西汾州尋改隰州及改縣曰隰川大業初復為龍泉郡唐初復為隰州後改大寧郡乾元初復為隰州宋金元仍舊本朝以隰川縣省入編户二十八里領縣三大寧縣在州城西南九十五里漢為河東郡北屈縣地晉屬平陽郡後魏置仵城郡及縣後周始改大寜縣隋初廢郡大業初縣亦廢唐初置中州及大寧縣貞觀初州罷以縣屬隰州宋金仍舊元初省入隰川縣後復置本朝因之編户一十里石樓縣在州城北九十五里本晉屈産泉建地漢為西河郡土軍縣地東漢省後魏太和中置吐京郡治吐京縣隋初廢郡以縣屬西汾州後改石樓縣屬隰州唐初於縣置西徳州貞觀初省州以縣屬東和州後又廢東和以縣屬隰州宋金元仍舊本朝因之編户七里永和縣在州城西一百五里本漢河東郡狐讘縣地魏始置永和縣晉屬平陽郡後魏廢北齊於狐讘城置臨河郡及臨和縣隋初罷郡改縣曰永和屬隰州唐初移治仙芝谷置東和州貞觀中州罷以縣屬隰州宋金元仍舊本朝因之編户一十里郡名河東秦名平河隋名晉寧元名形勝被山帶河天下要地三國志杜畿傳晉之故封唐柳宗元晉問晉之故封太行掎之首陽起之黄河迤之大陸靡之水陸形勢唐元載中都議黄河北來太華南倚總水陸之形勢壯闗河之氣色表裏河山平陽志東距太行西界黄河南接梁宋北連大鹵有表裏河山之固面嶺背