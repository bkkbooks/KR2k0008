備希亮以牢城卒雜山河户得百人日夜部勒聲振山南盗不入境晉騭紹興初知房州適桑仲蹂踐之餘軍士絶糧騭令軍士開墾至秋大熟倉廪富足凡貧民能為工匠者令脩製軍噐農具移州治創州學俾民遣子弟入學免其役稅本朝馬伯庸洪武初鄖縣知縣撫字流民興舉庶務人懐其惠至今猶稱道之譚詮景泰初知鄖縣愛民守己興學作人厯九年刑清政舉民為立碑紀績省志俞藎知鄖陽府時創設府治轉詢民隠寛省征𣲖凡百城池學校廨宇區畫咸宜省志吳逺成化初知鄖陽府時初建邵治㕔事廨舍皆其創脩且勤于撫恤寛和亷静有長者風省志蘇惠和成化中知保康縣開創縣治凡百庶務身親規畫九年滿去士民流涕載道今有餘思省志侯爵成化中知鄖西縣縣治新設庶務創舉在任十二年民立亭祀之省志鄧九容保康令嘗因饑荒設法賑濟所活數十百人時縣治初設一切建置皆手自規畫其諸惠政尤多省志王湜嘉靖初知上津縣檢身清苦臨民愷悌作興善類值流冦犯境詔大兵征討屯津者數萬湜餽餉有方民不為擾省志蘇紳夀靖中知鄖西縣亷恭簡肅清介之守乆而不渝倉庫充盈門堦閴寂脩學課士不以勞民拒公使之横索者遂忤大吏去行李蕭然省志曾槐正德末知上津縣有治才時鄰邑冦起津城故土築乃甃以磚不五月而事集氏不告病邑人勒石紀之省志流寓劉光祖簡州人仕為起居郎韓侂冑擅朝政日士大夫為偽學逆黨光祖撰涪州學記謂好惡出於一時是非定于萬世諫官張釡指為謗訕奪職謫居房州人物周尹吉甫世𫝊為房陵人有文武才相周宣王子伯竒有孝行後母譛而逐之編茭荷為衣採楟花而食清朝履霜自傷援琴鼔之作履霜操又四川瀘州志云吉甫為江陽人本朝周清鄖陽人正德辛未進士清操不樂仕進隠居元和觀隠真洞中教授生徒嘉靖初以父命出授浙江處州府推官以賢能應徴卒于途居鄉有改運竹山之功鄉人至今德之省志朱裒鄖西人嘉靖丁酉領鄉薦歴官知揚州府同知值倭冦掠海壖裒率兵征之力戰死于陣事聞贈布政司㕘議䕃其子立祠祀焉省志溫如玉鄖縣人嘉靖癸丑進士除行人拜監察御史廵醝浙江復廵按蘇松所在綽著風稜時江南當島冦初平之後物産凋耗如玊壹意汰墨鋤强以拊循其民四郡咸被甦息尋擢山東按察司副使以病歸卒如玉平生謹亷隅慎取予敦孝友居鄉不以氣勢加人居顯官二十年故廬不増飾一椽士林頌之省志列女段氏黎仕溫妻上津人年二十八溫卒段以死誓守孀居四十餘年成化中旌省志蕭氏河内峽州人父毋以貧流徙上津成化七年官軍逐流民流中强梁者見女姿色詐稱官軍執而繫之閹于五顯廟聲言欲以為妻蕭氏自度不免竊于旌神香案自縊而死時年一十有九都御史王信奏聞表志省許氏劉顯清妻保康人年十九顯清溺水死許尋骸骨不獲尋亦赴水死成化中旌省志王氏太學生鄧仁妻鄖人仁卒王年二十八矢志守節孀居五十餘年隆慶元年旌省志尤氏楊仁妻竹山人年二十夫亡甚貧矢志撫男楊順髙成立娶媳鄒氏生孫男楊瓊順髙亦故遺媳鄒氏隨姑守節萬厯元年旌省志明一統志卷六十
