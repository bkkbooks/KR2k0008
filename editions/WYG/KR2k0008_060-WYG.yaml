臺因昭烈三顧亮于草盧有三顧門宋孝武宅在府治東南馬鞍山劉宋孝武帝所生處龎德公宅在峴山南廣昌里孟浩然故居在府城東南鹿門山浩然嘗自賦詩云山水觀形勢襄陽美㑹稽唐白居易詩南歴鹿門山藹若有餘香舊隠不知處雲深樹蒼蒼杜甫故里甫􅂞棹詩云清思漢水上凉意峴山巔吾家碑不昧王氏并依然張東之園在府治南五里東之唐相也園址尚存木香村在宜城縣西六十里唐段成式别業也桃林在府城南六里晉桓冲北伐屯軍於此是時食桃至春其核萌生遂成茂林墮淚碑在府治東九里晉羊祜鎮襄陽有功德於人百姓於峴山建碑立廟望其碑者莫不流涕杜預因名墮淚碑唐李白詩空思羊叔子墮淚峴山頭賈島詩若㸔登髙峴㸔碑定涙流晉柏在峴山下有小碑題曰晉柏其柯榦如鐵石名宦漢鄧遐襄陽太守漢水有蛟龍遐入水斬之自是無患王寵守南郡于襄陽鑿蠻水于木里溝灌田六千餘頃襄中遂為天下膏腴胡烈襄陽太守築石堤民歌之曰譬春之陽如冬之日耕者讓畔百姓豊溢惟我胡公恩惠難及劉表荆州刺史治襄陽初江南宗賊大盛又袁術阻兵表乃單騎入宜城請南郡蒯越襄陽蔡瑁與其謀畫誘宗賊斬之而取其衆諸守令聞表威名多觧印綬去三國闗羽蜀漢昭烈以為襄陽太守盪冦將軍羽攻曹仁于樊圍吕常于襄破降于禁威震華夏曹操議徙都以避其銳晉羊祜都督諸軍事鎮襄陽綏懐逺近甚得江漢之心在軍常輕裘緩帶侍衛不過數十人墾田八百頃始至軍無百日之糧季年乃有十年之積杜預都督荆州諸軍事鎮襄陽脩立頖宫又脩召信臣堰開揚口起夏水達巴陵内瀉長江之險外通零桂之漕南士歌曰後世無叛由杜翁孰識智名與勇功山簡征南將軍都督荆州諸軍事鎮襄陽時四方冦亂簡優游卒嵗劉聰逼京師簡遣督䕶赴難及洛陽陷没簡遷夏口招納流亡江漢歸之郗恢雍州刺史領襄陽甚得闗隴之和降附者日以千計陶侃為南蠻長史鎮襄陽勤於吏職以功遷都督荆雍益梁諸軍事楚郢士女莫不相慶庾亮都督諸軍事鎮襄陽之石城并遣諸軍羅布江沔欲恢復中原弟翼以滅賊為巳任有衆四萬師次襄陽其氣十倍桓宣監沔中軍事時石勒戍襄陽陶侃使子斌與宣攻樊城克之使宣鎮焉宣招懐納附勸課農桑深得衆心甚有稱績甘卓梁州刺史督沔北諸軍鎮襄陽為政簡惠善于撫綏桓冲都督荆州等七郡鎮襄陽卒喪下江陵士女老幼皆臨江號哭劉𢎞都督荆襄諸軍事專督江漢威行南服及卒士女嗟痛若失所親南北朝劉道産宋雍州刺史守襄陽政績尤著有襄陽樂歌自道産始及卒郡人衰絰號哭送至沔口張邵宋領雍州刺史治襄陽脩立堤堰闢荒田數千頃公私兖足朱脩之宋雍州刺史為政寛簡士庶恱服南郡王義宣反檄脩之舉兵擁上流脩之不從乃率衆執義宣殺之申徽魏襄州刺史時南方初附舊俗官人皆通餉徽畫楊震像于􅃦室以自戒及代還人吏送者數十里不絶徽因題詠於清水亭長㓜競來讀曰此申使君手跡並冩誦之王茂南齊襄陽太守梁武帝鎮襄陽時即以王佐許之事無大小皆詢焉隋韋世康開皇中將事江南議重方鎮拜襄州刺史為政簡靜百姓愛恱薛道衡襄陽總管髙祖曰朕欲令爾兼撫甿俗今爾之去如斷一臂在任清簡吏民懐惠唐李孝恭以宗室為襄州道行臺尚書時嶺表末平孝恭撫慰四十九州皆來欵附張公謹襄州都督以惠政聞及卒太宗將出次哭之有司奏曰在辰不可帝曰君臣猶父子也情感於内安有避遂哭之韓思復襄州刺史治行名天下及卒孟浩然為立石峴山韓朝宗襄州刺史兼山南東道襄州南楚故城有昭王井傳言汲者死行人雖渴困不敢視朝宗稱書諭神自是飲者無恙人更號韓公井魯景襄陽節度使時安禄山反襄漢數百里蕩然無樵烟賊欲剽亂江湖賴景拒其衝故南夏以完李承山南東道節度使時李希烈據襄陽廹脅萬端承誓以死守不能屈遂大掠而去襄漢蕩然承撫安之一年合境完復樊澤山南東道節度使李絳譔遺愛碑云江漢之濵漸其教化浹于肌膚栁公綽山南東道節度使行部至鄧縣吏有納賄舞文者二人同繫獄縣令意必殺貪者公綽判曰賍吏犯法法在奸吏壊法法亡誅舞文者咸服其明于頔山南東道節度使時呉少誠叛頔率兵自唐州戰吴房朗山取之禽其將請陞襄州為大都督府廣募戰士儲糧械盧鈞山南東道節度使漢水害襄陽築隄六千步以障其暴王起山南東道節度使濵漢塘堰多壊吏弗完治起至部先脩復與民約為水令遂無凶年宋趙延進襄州鈐轄同知州務蜀平專領郡事漢江水嵗壊隄害民田常興工脩䕶延進累石為岸遂絶其患曹翰初征蜀時為均州刺史鑿山開道商旅以濟詔兼轉運使而糧餽不乏王洙知襄州會貝卒叛州郡皆洶洶襄佐史請罷教閱士不聴又請毋給真兵洙曰此正使人不安也命給庫兵教閱如常日人無敢譁者尹洙山南東道掌書記善属文深于春秋後謫官均州監稅周湛知襄州襄人不善陶瓦率為竹屋嵗久侵據官道簷廡相逼火數為害湛至度其所侵悉毁撤之自是無火患歐陽脩貶夷陵令葉清臣上疏得近徙為乾德令馬尋知襄州嵗饑人或羣入富家掠囷粟獄吏鞠以强盗尋曰此脫死爾其情與强盜異奏得减死論著為例劉元瑜知襄州富人子張銳少孤弱同里車氏規取其材乃取銳父妾他姓子養之比長使自訢隂賕吏為助元瑜窮治得姦状黥車竄之人伏其明狄栗知穀城縣時天下學校久廢栗即脩建廟舍訓率子弟自是人知尚文風俗淳美李仲芳知光化軍漢水東至乾德滙而南民居其衝水悍暴而岸善崩仲芳作為石隄民數千家皆恃以安孫永知宜城縣縣舊有白起渠久壊永率民理其壊塞而去其淺隘又與民為約束時其蓄洩而止其侵争民甚便之張逸知襄州鄧城縣有能名知州謝必將薦逸先設几案置章其上望闕再拜曰老臣為朝廷得一良吏矣曾鞏知襄州文章政事並美于時葉康直知光化縣縣多竹民皆編為屋康直教用陶瓦以寧火患凡政皆之務以利民又興學校民多化豐稷知榖城縣有治績與光化令葉康直齊名人歌之曰葉光化豐榖城清如水平如衡王煥知武當縣建安中賊犯均州煥率邑人保山寨賊至或勸之遁煥曰使吾有此心則不能與邑人為此來矣遂舉家死之岳飛荆襄招討使有戰功尋鎮襄陽措置屯田以圖恢復中原威聲大振金人甚惧陳桷紹興中知襄陽府襄漢兵火之餘民物凋瘵桷以賦湏尚多請重行蠲减金房兵叛遣將平之而後以聞漢水决溢漂蕩廬舍躬率兵民捍築隄岸賴以無虞虞允文湖北京西制置使開府襄陽與大將王宣趙樽等㑹議攻守之策時相湯思退欲速和議請棄唐鄧二州允文七上疏争之柴中行京西轉運兼提刑上言襄陽自古必争之地備禦尤宜周宻時天方旱盡捐酒稅斥征官黥務吏廿㴻隨至遂改知襄陽兼京西帥考覈軍實招補虛藉攻績甚著趙方京西湖北制置使知襄陽府招懐忠義之士脩理城壁金兵不敢犯境臥治數年境内無事楊恢知均州建立比干祠以勸忠勵俗金人犯均州甚急恢率官吏盡力固守卒全其城張順襄陽受圍五年順與張貴以都統率死士轉戰抵襄城下及收兵獨失順越數日浮屍遡流而上被甲冑執弓矢直抵浮橋氣勃勃如生諸軍驚以為神殮葬立廟祀之張貴以都統制援襄陽既抵城吕文煥力留共守貴恃其驍勇欲還郢乃募二士使持蠟書赴郢事泄貴發舟破圍進至龍尾洲而來舟皆元兵貴戰已困身被數十鎗見執不屈死之文煥以貴尸祔葬順塜立雙廟祀之范天順荆湖都統襄陽受圍天順日夕守戰及吕文煥出降天順仰天嘆曰生為宋臣死為宋鬼即所守處縊死贈定江軍承宣使元齊珪初以總管鎮棗陽李璮叛於益都徴兵進討棗陽精銳盡行珪時攝萬户府事城守周宻宋兵來攻珪率衆力戰城賴以完吕㳘襄陽路總管為政多切要利民者襄人立碑頌德及去又立去思碑以紀其向慕谷廷珪襄陽縣尹特黙格兵入境官吏皆遁廷珪與主簿張德獨不去被執使降不屈死之富珠哩翀襄陽縣學教諭有德行文章學者仰為表儀于逺為襄陽縣尹賊起逺以忠義自奮募兵與賊戰被害妻亦死之本朝鄧愈初以中書省㕘政鎮襄陽開設公署増築城池撫安兵民恩敷襄漢士庶樂業四境以寧呉禮永樂間均州知州多善政改任貟外郎督太和諸宫事政令嚴明軍民仰慕張㤗宣德初宣城知縣存心慈惠為政嚴明革弊政舉廢墜其規制條畫多存于今袁孟正永樂初知襄陽縣蒞政有方善于撫字革奸弊均賦役時值營造徭役之煩民賴以不擾至今百姓懐之省志何源正統中知襄陽府天性敦朴行已不妄在任脩學築堤百凡建置悉宜于民卒葬于襄之百丈山子孫因家焉省志廖仕正統中宜城知縣逺讒革弊脩塘堰簡詞訟政令日新境内盗息民安既去宜人思之不置志省李人儀天順初以御史謫知襄陽縣任法鋤强不避權要幹濟優長百廢具舉省志于璠成化初知襄陽府首建府學大成殿兩廡齋舍盡規制劉石俶擾兵戈叢脞酬應支柱民賴以安志省胡昻成化中知襄陽府以鋤惡為急時蒼臺苗崔素為盗人莫敢發昻選驍勁夜搗其巢明年劉六等刼殺中原哨至其處幸其黨與逃散倡亂無由亦昻預難于前之功也省志范嵩𢎞治中襄陽府推官行法嚴明立心平恕斷獄多所平反公暇則進諸生講說德義造就良多士民至今稱頌省志黃金正德初知光化縣幹濟優長甃砌磚城脩輯邑志其功甚多省志李傅正德壬申知襄陽府賊劉六刼畧中州延蔓巳及黒龍堰時調土兵萬餘口糧不繼總制方以為憂傅多方區畫日費千金民無兵害繼以荒歉乃蠲租賑濟民甚徳之省志吳昻嘉靖初知宜城縣亷介自持邑民領種官莊者一百畆收三分謂之老畆量出加租昻調停其法萬姓稱便去時父老流涕攀留建祠立石嵗時祀之省志流寓丁蘭河内人乂云梧州人寓居宜城少喪父母刻木為人髣髴親形事之若生諸葛亮琅琊人寓居南陽徃來隆中嘗自比管樂後相漢昭烈以興復漢室為巳任先儒謂三代以下一人而已栁元景其先河東解人家襄陽仕劉宋為雍州刺史初孝武在巴日問元景事平何所欲曰願還鄉里及平定故有此授後廢帝少有凶德元景謀立義恭事覺被誅明帝即位諡忠烈錢徽本吳興人父起唐天寳中進士官至考功郎中徽第進士居榖城觀察使樊澤表署掌書記累遷翰林學士承㫖後以吏部尚書致仕龎蘊夲衡陽人來家襄陽㓗身脩行臨終招刺史于頔謂曰但願空諸所有慎勿實諸所無言訖奄然而化世號龎居士胡旦濵州人宋太平興國初舉進士第一尚氣節以文章名世任秘書省少監致仕居襄州旦喜讀書晚年喪明猶令人誦經史憑几聴之韓維開封人累官資政殿學士元祐中拜門下侍郎有忌之者䜛之出知鄧州以太子少傅致仕紹聖中坐元祐黨均州安置范純粹蘇州人仕宋為户部侍郎厯知河南府滑州尋坐元祐黨籍謫居均州劉彛福州人從胡瑗學瑗稱其善治水宋熙寧中累官直史館知桂州交阯陷欽連邕三州坐貶均州團練副使又除名為民編𨽻襄州米芾呉縣人寓居襄陽為文務竒嶮善書畫好古鍾鼎器皿法書宋時補校書郎累官知淮陽軍子友仁從髙宗南渡仕至列曹侍郎工書法人以大小米帖别之曾紘南豐人家襄陽博學善属文號臨漢居士子思號懐峴居士亦能文俱有集行世孟宗政本絳州人父林從岳飛至棗陽因家焉開禧初金人犯襄郢宗政率義士邀擊補棗陽令轉京西鈐轄金人犯襄陽宗政與統制扈再興陳祥蹀血以戰金兵敗走尋報棗陽圍急宗政午發峴首遲明抵棗陽馳突如神金人大駭遂退宋衜潞州人祖元吉仕金為兵部貟外郎衜善記誦能文避地襄陽後北歸居河内元初趙壁經畧河南聞其名禮聘之其後大兵守襄陽壁行元帥府事衜皆從焉軍中多所咨訪人物周卞和南漳人嘗得璞玊于荆山獻之楚武王王使玉人相之曰石也刖其左足成王即位和又獻之曰石也刖其右足文王即位和乃抱璞哭于荆山下王使玉人理其璞而得寶名和氏之璧漢劉縯南陽蔡陽人光武之長兄性剛毅慷慨有大節自王莽簒漢常憤憤懐復社稷之慮莽末盗起縯自發舂陵子弟誘新市平林兵合軍而進大敗莽兵更始立拜縯大司徒封漢信侯後為更始所害光武即位追封齊武王劉珍南陽蔡陽人少好學永初中為謁者僕射詔校定東觀五經諸子傳記百家藝術及作建武以來名臣𫝊遷侍中拜宗正轉衛尉卒所著誄頌連珠凡七篇又譔釋名三十篇以辨萬物之稱號云王逸南郡宜城人元初中為校書郎順帝時為侍中著楚辭章句及賦誄書論雜文凡二十一篇又作漢詩一百二十三篇王延壽逸子有俊才少游魯國作靈光殿賦後蔡邕亦造此賦未成及見延夀所為甚竒之遂輟翰又因有異夢意惡之乃作夢賦以自厲後溺水死時年三十餘龎德公南郡襄陽人居峴山南未嘗入城府荆州刺史劉表數延請不屈乃就候之龎公耕隴上妻饁于前相敬如賔表問曰先生不肯官禄將何以遺子孫乎公曰人皆遺之以危我獨遺之以安後擕妻子𨼆鹿門山因採藥不返子煥晉太康中拜牂牁太守蔡瑁襄陽人嘗與南郡蒯越共為劉表謀主有應變之才三國馬良襄陽宜城人兄弟五人並有才名良眉中有白毛鄉里諺云馬氏五常白眉最良昭烈領荆州辟為從事即位以為侍中及東征吳遣入武陵招納五溪蠻夷渠帥皆受印號㑹昭烈敗績良遇害乃拜其子秉為騎都尉馬謖良弟仕昭烈為越嶲太守才器過人好論軍計亮深器異之以為參軍與魏將張郃戰于街亭敗績下獄死亮為之流涕司馬徽襄陽人清雅善知人漢昭烈訪士於徽徽因薦諸葛孔明龎士元時龎德公亦善品藻稱徽為水鏡龎統德公從子司馬徽稱為南州士之冠冕蜀漢昭烈使守耒陽不治免官魯肅遺昭烈書曰士元非百里才使處治中别駕始得展其驥足耳昭烈召為治中從事親待亞于諸葛亮從昭烈入蜀率衆攻城為流矢所中卒追賜爵闗内侯謚曰靖子宏剛簡有識仕至涪陵太守統弟剛仕魏為鉅鹿太守楊儀襄陽人昭烈即位以為丞相亮長史亮數出軍儀嘗規畫分部籌度糧榖亮深愛其才後隨亮出屯谷口亮卒儀領軍還又誅討魏延自以當代亮秉政既至拜中軍師楊顒襄陽人為諸葛亮主簿亮自校簿書顒諫曰坐而論道謂之三公今明公親校簿書不亦勞乎及顒死亮泣三日習珎襄陽人為零陵北部都尉孫權殺闗羽諸縣響應珎舉兵權遣潘濬討珎珎謂曰我必為漢鬼不為吳臣月餘糧盡曰受漢恩厚不得不報之以死即仗劍自殺向朗宜城人昭烈定江南吏朗督秭歸夷道巫山夷陵四縣軍民事蜀平為巴西太守累徙左將軍封顯亭侯潛心典藉年踰八十猶手自校書刋定謬誤子條景耀中為御史中丞向寵朗兄子為昭烈牙門將秭歸之敗寵營特完建興初封都亭侯後為中部督典府衛兵丞相亮北征表後主曰將軍向寵性行淑均曉暢軍事營中之事悉以咨之必能使行陣和睦優劣得所遷中領軍征漢嘉蠻夷遇害弟充歴射聲校尉尚書羅憲襄陽人年十三能属文師事譙周性方亮嚴整初仕蜀漢為太子舍人以不附黄皓左遷巴東太守蜀敗持節領武陵太守泰始初入晉武帝問蜀先輩宜時叙用者憲薦常忌杜軫等武帝並召用之晉羅尚憲兄子善属文太康末為梁州刺史時趙嶔反于蜀尚表嶔非雄才計日聴其敗爾乃假尚節為平西將軍益州刺史李特叛蜀尚以計破斬之傳首洛陽羅友襄陽人少有志氣博學能文㑹有得郡者桓溫集僚佐餞之友後至溫問之荅曰中路逢鬼揶榆云只見汝送人作郡不見人送汝作郡温表為襄陽太守習鑿齒襄陽人習郁之後愽學洽聞以文章著稱晉桓温辟為從事甚器遇之累遷别駕溫凱覦非望鑿齒著漢晉春秋以裁正之凡五十四卷其子辟强有父風南北朝栁世隆襄陽人涉獵文史為伯父元景愛賞仕宋累官尚書左僕射世隆少立功名晚專以談義自業善彈琴世稱栁公雙𤨏為士品第一次子惔好學工文與兄恱齊名惔仕梁為征東府司馬栁慶逺世隆從弟事齊為襄陽令梁武帝為雍州刺史辟為别駕及帝即位以功封雲杜侯雍州刺史加都督至州勵清節士庶懐之卒謚忠惠子津為雍州長史津子仲禮勇力兼人有瞻氣官至震威將軍陽泉侯郭租深襄陽人梁武帝溺情内教朝政廢弛祖深輿襯詣闕上封事帝嘉其正直擢鍾陵令改南州雲騎將軍至州公嚴清刻捜檢奸惡所領皆精兵令行禁止威震逺近長江肅清張彪襄陽人仕梁為東揚州刺史陳文帝據震澤彪拒之家口為陳所獲彪還若邪山陳遣兵重購彪彪眠未覺其養犬黃蒼驚吠嚙一人中喉死彪拔刀逐之映火識之曰卿須我者但可取頭誓不生見陳倩遂遇害栁遐襄陽人元景從孫篤好文學動合規矩僕射謝舉曰江漢英靈見於此矣仕後周為霍州刺史導人以德無不感化其父卒于揚州遐奔赴哀感行路母患乳疽遐以口吮之即愈十子有名靖者仕周為大都督唐尹嗣宗襄陽人居喪踰禮子怦侍養彌篤嗣宗卒廬墓産紫芝孫恭先曽孫仁恕皆有孝行俱被旌表於是一門四闕張東之為製碑張東之襄陽人少涉經史舉進士永昌初以賢良召對策第一時年七十餘出為合蜀二州刺史武后嘗求一竒士狄仁傑曰張東之雖老宰相才也即召為洛州司馬轉司刑少卿拜同平章事誅二張復唐社稷以功封漢陽郡王出為襄州刺史卒謚文貞東之剛直不傅會然遂于學論次書數十篇杜審言襄陽人晉杜預之後舉進士為隰城尉才髙傲世與李嶠崔融蘇味道為文章四友後以事免官還東都武后召見令賦歡喜詩歎重其文授著作佐郎入為國子監主簿脩文閣直學士孟浩然襄陽人好節義隠鹿門山年四十遊京師王維私邀入内署俄𤣥宗至維以實對帝曰朕聞其人而未見也召問其詩浩然再拜自誦所為詩至不才明主棄之句帝曰朕未嘗棄卿柰何誣我因放還張九齡辟為荆州從事杜甫審言孫七嵗属辭長遊吳楚齊趙間天寶末奏賦三篇帝深竒之使待制集賢院肅宗即位拜左拾遺坐救房琯出為華州㕘軍尋棄官客秦州流落劍南結廬成都依節度使嚴武武表為㕘謀檢校工部貟外郎甫詩與李白齊名尤善述時事且惓惓於忠君憂國論者謂三百篇後一人而巳皮日休襄陽人能文章有桃花賦九諷七愛諸篇舉進士與孟浩然隠鹿門山自號醉士又曰酒民作酒箴食箴與陸龜蒙為友有松陵倡和詩集孫文粲亦能詩文官至鴻矑少卿席豫襄州人長安中舉制科擢上第遷考功貟外郎進絀清明拜吏部侍郎典選六年拔寒逺士多至臺閣當時推知人清直無欲當官不為勢權所撼帝常登朝元閣賦詩羣臣属和帝以豫詩最工稱為詩人冠冕弟晉亦以文名栁渾襄州人幼時巫言其相夭且賤為浮屠道士可緩死渾曰去聖教為異術不若速死力學愈篤善属文遂舉進士累官左補闕相德宗時渾瑊與吐蕃㑹盟渾曰戎狄人面獸心臣切憂之吐蕃果刼盟德宗驚曰卿儒士乃知軍戎萬里情乎鮑訪襄陽人官至禮部侍郎於詩尤工與謝良弼相友善時號鮑謝馮行襲均州人山南盗孫喜欲襲均州刺史不能禦行襲時為州校乃隂選勇士伏江南誘喜斬之以功授本州刺史朱朴襄陽人以三史舉昭宗時授諫議大夫上書言當世事見唐室浸㣲勸遷都謂襄鄧實惟中原人心質良去秦咫尺而上有洛為之限永無夷狄侵軼之虞不報許巖士言朴有經濟才官至中書門下平章事宋張士遜隂城人為人寛厚不言人過淳化間舉進士調鄖縣主簿累官同中書門下平章事後拜太傅封鄧國公致仕宰相自陳謝事由士遜始卒年八十六謚文懿子友直累官工部郎中知越州友正學書積三十年不輟遂以書名神宗評其草書為當時第一歐慶乾德人以同三禮出身累官彭州推官知永春縣為人忠信孝弟居官亷貧宗族之孤㓜者皆養於家與同邑太傅張士遜屯田郎中戴國忠雖位有崇卑而鄉人稱之無異及卒歐陽脩為表其墓于世英鄧城令世勣舉進士張問襄陽人舉進士通判大名府累遷江東淮南轉運使所部地震河再决議者欲調民二十萬築隄問言勞民非計神宗從之問十年不奏課詔特遷為度支副使熙寧末知滄洲獨不附新法處巳亷㓗官至給事中魏㤗襄陽人崇觀間章惇欲官之竟拂袖還家善文章著臨漢隠居集二十卷又著東軒筆録十五卷嘗賦襄陽形勝識者偉之范宗尹鄧城人舉直言乙科建炎初拜相年三十一宗尹少年秉政欲革崇觀以來濫賞之弊奸倖者多以為不便衆譖之遂策免張嵲襄陽光化人善属文宣和中上舍中第初為張浚從事紹興問召對除秘書省正宇累遷司勲貟外郎兼實録院檢討金人背盟髙宗詔兩省草檄以進獨取嵲所草播之四方擢中書舍人終敷文閣待制所著有文集三十卷孟珙隨州棗陽人宗政子也累功封漢東郡侯兼京湖安撫制置使知江陵府屢敗金師端平初與元將布展共滅金守荆襄二十年朝廷賴之有恢復志未就而卒贈太師吉國公謚忠襄廟曰威愛兄璟弟墇皆有戰功璟為湖北安撫副使知峽州石潨光化人仕為朝散郎愽通古今其詩淡泊時出偉麗仕既不遭晚自晦田里有滄浪集張惟孝襄陽人通春秋工騎射别之傑帥郢州盡隘諸湖不泄水惟孝用計通之後徙江陵宣撫姚希得羅致之乃請空名帖三十以還逾旬與三十騎俱擁甲士五千至部伍嚴肅希得大喜時鼎澧五州危甚於是擊鼔耀兵數日衆至萬人數戰俱㨗江上平制使呂文德招之不就而遁物色之不可得元暢淳夫襄陽人愽學能文仕至翰林學士卒贈文肅子敏仲亦有才名金希說襄陽人仕為内臺御史愽通經史善属文弟希舜亦有才名陶元榦襄陽人淹貫經史嘗註易世稱為陶易本朝蘭以權襄陽人愽學能詩洪武初以才能選授中書省照磨時廣西冦生特遣以權撫安至則宣布德威夷人感化一方遂安朝廷嘉之陞禮部貟外郎未幾進陞應天府尹以端謹稱李文郁襄陽人洪武中任教官尋陞通政司㕘議永樂初陞户部侍郎未幾坐事謫戍遼東洪熙初召復㕘議為人性介直持守堅正久處患難不移其志宣德中引年致仕卒任亨泰襄陽人洪武中舉進士第一授翰林脩撰學行重于士林進陞詹事府詹事官至禮部尚書嘗使交阯其國王曰狀元不可得也當異其禮待之加重楊銘襄陽人永樂乙未進士才識過人授户部主事以勤能著稱尋陞太平知府在任政聲大振康慶襄陽人初以太學生署監察御史改知縣陞和州知州坐事罷復起為御史陞四川㕘政宣德中年老致仕張緝襄陽人永樂中拜監察御史有直聲尋陞廣西副使公亷有威一方肅然宋祐襄陽樊城人六嵗喪父天性至孝及成童痛父不存事母能養友愛二弟勤於治生漸致饒裕母病輒告天刲股以進獲愈泊没水漿不入口者累日􅃦苫枕塊餟粥十有五年子釗亦孝鄉黨稱之艾福襄陽人天順庚辰進士授監察御史按山西浙江並著能聲擢光禄卿以禮部侍郎致仕明習世故通達有識士論歸之省志韓邦問浙江人以父任襄府長史遂家焉舉進士厯官刑部尚書亷謹縝宻未嘗輕出一言所在盡職後歸休于浙卒謚莊僖省志李端宜城人成化辛丑進士拜南道監察御史剛毅不撓屢忤權貴中官汪直憾之逮繫詔獄謫永寧安撫司經厯遷溫州知府省志張纁均州人𢎞治已未進士知原武縣召為監察御史清修耿介與世寡諧有古良吏風省志列女胡烈婦渤海劉平妻至元間平當戍棗陽車載其家以行夜宿沙河旁有虎至啣平去胡抜刀追及虎斫之扶平抵李陽城以傷卒事聞命恤其母子仍旌異之丁氏元棗陽人朱某妻早寡不忍獨生遂以死從其夫事聞褒美之黃氏榖城人尹大中妻至正末為賊所虜欲辱之黃氏不從賊殺之分其屍王氏李謙妻均州人謙為諸生卒時王年二十成化中旌省志潘氏曹文妻襄陽人文為諸生死時潘年二十五無子守節受旌省志張氏孫通妻襄陽䕶衛人孀時年二十五受旌省志胡氏劉鐸妻襄陽人鐸任百户所卒時胡年卞九養姑撫遺誓死不變以貞白終受旌省志仙釋真武净樂國王太子也生而神靈察㣲知逺長而勇猛惟務脩行志除邪魔遇紫虛元君授以道秘遂越東海遊覧又遇天神授以寶劍入武當山脩煉居四十二年功成白日飛昇奉上帝命徃鎮北方被髪跣足躡離坎真精建皂纛𤣥旗統攝𤣥武之位神威赫然歴代顯著本號𤣥武宋避諱改曰真武蔡女仙襄陽人㓜善刺繡忽有父老詣門請繡鳯眼畢功之日自當指點既而繡成老父指視安眼功畢俄雙鳯騰躍飛舞老父與女仙各乘一昇天陳搏亳州真源人始四五歳有青衣媪乳之自是聰悟過人經史一覽無遺肆意山水間遇孫君仿謂武當九室岩可居遂徃棲焉服氣辟穀二十餘年忽夜見金人持劍呼曰子道成矣當有歸成之地又五龍化為老人曰華山乃先生棲真之所遂徙居華山宋太宗召見賜號希夷先生王鼎襄陽人初寄籍醫卜中以養妻子後遇鍾離先生遂得仙術自號王風子人不見其飲食也一日行江干人見其水中有二影怪問其故曰若欲更見之乎須㬰見十影衆皆驚異宋真宗召至禁中長揖不拜後辭去不知所之所著有脩真書張三丰不知何許人洪武初至太和山脩煉結庵玉虛宫五樹邊身長七尺美髯如㦸經書一覽即成誦寒暑惟一箬笠日行千里靜則瞑目旬日所啖斗升輒盡或辟穀數月自若也應顯不測莫知所在時稱張仙云耆域天竺人神竒人莫能測周流華戎晉惠時至襄陽欲寄載過江船人見其衣服敝陋輕而不載船達北岸而域巳度前行見兩虎以手摩其頭虎弭耳而去竺法慧闗中人入嵩山事浮圖宻為師晉建元初至襄陽屢著神異之迹臨死語衆人曰吾死后三日天當暴雨至期果洪注城門水深一丈鄖陽府東至河南鄖陽府浙川縣界一百五十里西至陜西漢中府平利縣界五百六十里南至襄陽府均州界九十里北至陜西漢中府白河縣界二百里自府治至南京一千九百一十里至京師二千三百五十里糧一萬二千四百石零建置沿革禹貢雍梁二州之域天文翼軫分野古麇庸地春秋時曰錫穴為錫之西鄙戰國属楚秦置漢中郡西漢始置錫縣於鄖仍属漢中東漢置房陵上庸二郡三國属魏晉析置長利縣並改属魏興郡五代因之隋更長利為鄖鄉縣属浙陽郡唐初置南豐州尋省州而以縣属浙川尋又更為均州縣属焉宋初属武當軍節度元初復為鄖縣属均州本朝初隨州属襄陽府成化中陞為鄖陽府直𨽻湖廣布政使司領縣七鄖縣附郭本漢錫縣属漢中郡晉属魏興郡隋為鄖鄉縣属浙陽郡唐初於此置南豊州尋省州以縣属浙州又改属均州宋仍舊元改為鄖縣本朝初因之成化中改今属編户四十一里房縣在府城西南三百一十里舜封堯子丹朱于房即此地春秋為房子國秦漢為房陵縣属漢中郡東漢於縣置房陵郡魏改新城郡後周郡縣並改曰光遷兼置遷州隋初郡廢後改州為房陵郡唐改郡為房州乂改縣曰房陵宋置保康軍元廢軍仍為房州属襄陽路本朝省房陵縣改州為房縣属襄陽府成化中改今属編户十五里竹山縣在府城東南三百八十里本周之庸國秦置上庸縣漢属漢中郡晉為上庸郡治梁析置安城縣西魏始改竹山縣隋属房陵郡唐初房州治此後徙治房陵宋以上庸縣省入元仍舊本朝初併入房州後復置縣属襄陽府成化中改今属編户十五里上津縣在府城西北四百八十里古商國也春秋属晉戰國属秦漢為商縣地後魏始置上津縣属上洛郡梁属南洛州西魏属上州隋唐皆属商州宋省入均州元仍舊本朝復置上津縣属襄陽府後改今属編户十八里竹谿縣在府城西二百六十里古庸國地秦属漢中郡漢為上庸縣厯晉迄元皆仍舊本朝初為竹山縣地属襄陽府成化中析竹山尹店社置竹谿縣以縣治竹谿之北故名改属鄖陽府編户九里鄖西縣在府城北二百九十里古麇國地隋為鄖鄉上津二縣地唐為上津縣地宋為均州地元為商州鄖縣地本朝初為鄖鄉上津二縣地属襄陽府成化中析鄖之武陽里上津之津陽里置鄖西縣以縣治鄖之西故名改属鄖陽府編户九里保康縣在府城西北二百里古房國地戰國属楚秦属漢中郡漢為房陵郡地東漢為上庸郡地三國魏為新城郡晉為房陵地隋因之唐為遷州地宋為保康軍元為房縣地本朝初為房縣地属襄陽府成化中析房之宜陽等鄉置縣治潭頭坪以宋保康軍故名改属鄖陽府編户十里郡名房陵古名形勝東通襄鄧西逼秦蜀南接荆澧北控商洛楚紀溪流湍激厓徑險﨑楚紀溪流湍激厓徑險﨑故民好戰尚鬼猶有麇之風焉中原巨鎮楚故略設重臣控制為中原巨鎮楚蜀咽喉之㑹房州譙樓記風俗民多秦竒俗尚楚歌信鬼尚巫務農少學流寓雜處民風未淳古志土薄民淳廣輿圖土薄民淳近亦多訟昔多勁悍决烈之習近知禮義亷恥之風皇輿考朴魯簡嗇楚故畧民性朴魯簡嗇流寓多而土著少酗逞讙競之風不可盡攝山川龍門山在府城南七十里有二崖對峙如門水從中出黎子山在府城東一百里昔人曾置闗於此因呼為黎子闗滄浪山在横山似舟中生倉鬲産古松三株下有聖水寺錫義山在府城一名天