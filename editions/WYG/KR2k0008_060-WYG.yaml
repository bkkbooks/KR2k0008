body:
  text: 明一統志卷六十明李賢等撰興都舊安陸州春秋為鄢郢名都晉為石城重鎮近扼襄鄧逺控黄鄂漢水瀕其西浸匯如襟帶歴潛沔入大江而洞庭建業皆下游也我世宗肅皇帝龍飛於此嘉靖十八年陞承天府遂為興都設留守司如鳯陽中都故事山川環阻封疆雄固龍盤虎踞奠麗陵寢屹乎鞏國家千萬世之基云城池興都城南一門榜曰顯親達孝山陵顯陵獻皇帝陵公署興都留守司在承天府城内嘉靖十八年建領顯陵承天沔陽三衛徳安守禦千户所隨州守禦百户所顯陵衛在綏徳山二里嘉靖十八年建承天府東至徳安府應城縣界一百六十里西至荆州府江陵縣界二百二十里南至岳州府巴陵縣界一百七十里北至襄陽府宜城縣界一百里自府治至南京二千六百八十里至京師六千一百二十五里糧二十一萬一千八百石零建置沿革禹貢荆州之域天文翼軫分野春秋戰國時属楚秦属南郡漢為雲杜縣地属江夏郡宋齊並為竟陵郡地梁為南司北新二州之境西魏改南司州曰安州北新州曰溫州後周分置石城郡兼置郢州隋廢溫州入安陸郡廢郢州入竟陵郡唐復立郢州治長壽及置溫州治京山貞觀初廢郢州以長壽縣𨽻鄀州尋復置郢州以溫鄀二州省入後改富水郡乾元初復為郢州元陞為安陸府𨽻河南行省本朝洪武中改為州以附郭長壽縣省入直𨽻湖廣布政司嘉靖初陞為承天府改沔陽荆門二州縣属焉領州二縣五鍾祥縣附郭西漢雲社竟陵地属江夏郡東漢為新市縣晉為長夀縣宋齊並為竟陵郡梁復置長夀縣属梁寧郡𨽻北新州後周為郢州属石城郡隋廢以長夀縣為竞陵郡治唐復属郢州元為安陸府本朝初為安陸州嘉靖十年陞州為府以府北境置縣賜名鍾祥十八年析荆門北境馬良望鄉諸鄉益焉編户一十一里京山縣在府城東一百一十里本漢之雲社安陸二縣地東漢為雲社新市二縣境梁置新州及新陽縣西魏改縣曰角陵改州曰溫州隋廢州改為京山縣属安陸郡唐復為溫州治尋廢州以縣属郢州宋以富水縣併入焉元属安陸府本朝初属安陸州嘉靖十年改今属編户三十一里潜江縣在府城東北八十里本漢南郡江陵縣地唐大中間置征科巡院于白状宋乾德初陞安逺鎮為潜江縣元仍舊本朝因之初属荆州府嘉靖間改今属編戸二十三里沔陽州在府治南三百二十有五里春秋戰國時属楚秦属南郡漢為江夏之竟陵縣地東晉置竟陵郡梁又置沔陽郡後周兼置復州治建興縣隋初郡廢以州徙治竟陵尋復舊治大業初改為沔州及改建興曰沔陽尋改沔陽郡唐改為復州治竟陵尋移治沔陽天寳初改竟陵郡乾元初復為復州仍治竟陵五代晉改為景陵郡漢周復舊宋廢復州以景陵𨽻安州元祐初復置端平中移治沔陽鎮即今治所元改為復州路又改為沔陽府領王沙景陵二縣本朝洪武九年降為州併玉沙縣入焉直𨽻湖廣布政司嘉靖十年改属承天府編户四十四里領縣一景陵縣在州城北二百一十里楚封大夫鬬辛於此秦白起攻楚拔郢東至竟陵即此地漢始置竟陵縣属江夏郡晉因之西魏改曰霄城後周復曰竟陵隋初於此置復州後徙治沔陽唐初復移復州治竟陵五代晉改曰景陵縣宋𨽻安州又仍𨽻復州端平中縣隨州徙沔陽鎮元仍舊治本朝初因之嘉靖十年隨沔陽属承天府編户二十五里荆門州在府城西南九十里漢為南郡臨沮當陽編三縣地晉隆安中置武寧郡治於編隋属荆州唐初於長林縣東境置基州貞元中析置荆門縣五代時髙氏建為荆門軍治當陽尋省宋時復置軍徙治長林端平間又徙治當陽元陞為府移治古城尋降為荆門州本朝洪武中以長林縣省入属荆州府嘉靖初改今属編户六十一里領縣一當陽縣在州城西一百二十里本漢舊縣属南郡後周於此置平州及漳川郡隋初郡廢改為玉州後廢唐初復置平州又改為玉州尋省五代時髙氏置荆門軍於此宋紹興中以縣省入長林後復置元因之本朝洪武初𨽻荆州府後改属荆門州編户五里郡名郢中古名石城後周名富水唐名形勝西浮江漢東馳京嶺唐劉丹記上接漢江下連湘水郡志舟車徃來水陸之衝風土考古記西阻石城下臨漢江富水志南郢之邑沅湘之間楚辭襟帶隨郢腹背吳楚地窪而卑水漾而瀦宋朱昻賽廣澤廟序地濵江漢之洳復州㕔壁記惟兹七澤之南實在重湖之右輿地紀勝夢澤之南江流漢襄是為景陵東盡滄浪宋張允之焦侯德政頌環城皆水因河為壕宋朱昻序云環城皆水因河為濠古今傳云形若螃蠏川澤之區沔陽州志西控巴峽東連鄢郢荆門軍記西控巴峽扼其咽喉東連鄢郢為之襟帶信荆楚之門户襄漢之藩垣環列重山帶繞大澤荆門軍鼓角樓記居江漢之間為四集之地宋陸九淵荆門軍議風俗民俗朴儉風土記民俗朴儉有西北風聲氣習古風遺事有陽春白雪之美唐劉丹記信巫鬼重􅁋祀郡志民質直少文同上人性淳和圖經地多卑濕人性淳和人淳訟簡宋丁諷詩人自温良化作蠶桑之俗名賢文集民足魚蜃之饒復州㕔壁記務實朴厚圖冊云風俗之所媺者以其務實朴厚之習耳以漁罟耕耨為業而少積聚郡志頗知禮義郡志荆門俗尚緇黄設醮祈福自陸九淵知軍事風俗丕變頗知禮義山川純徳山即顯陵山羣隠隆隆盤礴鬱蔥是奠陵宫錫嘉名是曰純徳仙澤山在府治北百里髙數百仞下有洞獅子山象山俱在府治北百里仙澤口二山對峙若二獸蹲踞水中鎻住水口為郡城之鎻稱竒勝云從岵山即舊邸官墻外之在章山在府治南半里西魏平漢東立基州仍統章山即此樠木山在府治東一名武陵楚武王伐隨出師詣丹陽心蕩至樠木下而卒即此山有楚武王廟龍爬山在府城北二十里山有龍爬痕聊屈山在府城東三十里上有白鹿池黃泉洞山在府城東八十里山有黄泉洞花山在府城東一百里舊傳靈濟祖師過此時百草開花故名城子山在府城東一百四十里上有土城界山在府城東北一百八十里接隨州界張良山在京山縣北八里峯巒髙峻草木秀美峭壁間有一横徑多馬跡山下有鐵彈丸如雞後人多得之相傳漢張良息兵于此因名京源山在京山縣東北一十里山窟下舊有石刻律詩十首以崖枯草莖廋水淸魚影寒為韻今為野火所燬潼泉山在京山縣西六十里以泉出山下故名寳香山在京山縣南九十里石人山在京山縣北九十里半崖間有石𩔖人壽寧山在潜江縣西里許黃蓬山望鄉山俱在沔陽州城南二百里大江之傍二山相近黄蓬山上有魯公魯婆城俗傳蜀漢魯肅嘗屯兵于此五華山在景陵縣北七十里圍九百丈上有伏羲廟相傳伏羲后封于此有古風氏國故城今廢白螺山在景陵縣治西南上有吳王廟龍穴山在景陵縣東北五十里山傍有龍穴坡一名龍尾山天門山在景陵縣西六十里唐陸羽傳負書于火門山從鄒夫子學即此後因俗忌火字改今名青山在景陵縣西北六十里次華山在景陵縣東九十里山嶺連属北接今府境巾戍山在景陵縣境晉元熙間得古銅鍾七枚於此屏風山在荆門州治北絶頂平衍中有兩泉宋開禧間郡守李直丙徙居焉靈鷲山在荆門州治北舊有靈鷲寺有穴曰龍洞深五里石臺甚髙春月水聲如鍾鼔管籥聴者忘倦宋熙寧中山泉溢有髹器車流出誌字曰嘉州葢泉與蜀通也其上有洗心亭郡守陳垓所作荆山在荆門州西北二百里即卞和得玉處東山在荆門州治東上有楚望亭亭側有塔甚髙人多題詠蒙山在荆門州治西兩巒對起如峨眉舊名泉子山山麓有二泉即蒙惠泉上有澄源閣信美浴沂浮香潜玉𠻳玉五亭皆遊憩之所西山在荆門州西三里上有仙人洞及海㑹院荆門山在荆門州南五里張栻記峰巒對峙厥状如門宜都記即楚西塞仙女山在荆門州東南百二十里相傳有七仙女于此圍棋跡存上有梳粧臺廟遺址存内方山在荆門州南一百八十里漢江之上即禹貢内方也一名立章山又名馬仙山許由山在當陽縣東一十里相傳許由隠此下有洗耳溪按許由隠箕山而此亦以許由名不知何據圓臺山在當陽縣東六十里上有燦霞觀故址俗傳唐玉真公主所建有碑乃陳宗遜撰庾逺書紫葢山在當陽縣南八十里道書為第三十三洞天寰宇記紫葢有南北二山頂上四垂若繖狀林石皆紺色下出綵水甘馨異常宋葛立方詩紫葢亭亭秀荆渚股分綵水穿林莾尚想當時老瞞雄鐵騎蛇矛走先主緑林山在當陽縣東南一百一十里即王莽未年録林兵起處張飛山在當陽縣長坂坡西即飛斷橋拒曹處上盤石嶺在府治東四十里上有石路盤廻故名闗王嶺在京山縣治北上平如掌有毬塲及故城壘聖人嶺在京山縣南五十里相傳孔子適楚徑此諸葛嶺在景陵縣南二十里世傳諸葛亮屯兵處天子岡在純德山前太子岡在荆門州北五里元文宗自潜邸歸即位嘗駐此岡後人因名斑竹岡在荆門州北五十里唐韓翊送人赴江陵詩斑竹岡迎山雨暗枇杷門向楚山秋境㑹石初在鼔角樓下碑云大中祥符九年掇刀石在荆門州南二十里蜀漢將闗羽徃來荆襄於此屯兵掇刀石上痕蹟尚存傍有羽廟鐵人谷在當陽縣沮水北山谷間有四石甚巨鐵色人形故名當陽坂在當陽縣縣北一百里曹操入荆州漢昭烈奔江南操追及于當陽長坂昭烈棄妻子走使張飛將二十騎拒後即此空山洞在京山縣南二十五里山間洞口有石鼓擊之有聲中有石仙女石鏡石臺仙女洞在京山縣東南四十里嵓谷競秀泉脉交流峭壁挿天水紋紆石如篆洞有三門中有石床石枕石鏡臺宋時有道者秉燭入游數日而出即隨州也後有繼之者即遇迅雷暴雨不復可入子陵洞在京山縣南六十里相傳漢嚴子陵嘗隠於此傍有井嘗有一星光芒見于中遊學洞在當陽縣南五十里即鬼谷子與張儀蘇秦遊學處漢江在府治西上至襄陽七百里下至沔陽七百里其江自北來經石城西南至沔陽漢陽入于大江潛江在潛江縣爾雅水自江出為沱漢出為潛今潛江漢水循源而下經本縣界入大江漢江在荆門州東九十里源自陜西漢中為漢水至荆山東為滄浪水過潛江為沔水直江在荆門州東南一百六十里南流入潛江界平塘湖達三湖以合沔水沮江在當陽縣北源出房陵縣過臨沮縣界與漳水合流通沱江至枝江縣界入大江漳江在當陽縣北源出臨沮縣南至當陽與沮水合流入大江在傳江漢漳沮楚之望也沱江在當陽縣治南至枝江縣界入大江禹貢岷山導江東别為沱即此龍母湖在府治南三十里水溢通漢江舊傳嘗有龍馳騖千湖名龍騖湖訛騖為母三陽湖在沔陽州西二里東曰朝陽南曰南陽北曰水陽故名復池湖在沔陽州境後周武帝置復州取此為名白鷺湖在沔陽州東一十五里鼉湖在沔陽州東二十里白黿湖在沔陽州境内西湖在沔陽州東南一百五十里黃蓬湖在黃蓬山下馬骨湖在沔陽州東南一百六十里夏秋汎漲淼漫若海春冬涸為平田馬良湖在荆門州馬良村平塘湖在荆門州東南五十里南流入二湖東合沔蒿臺湖在荆門州東南一百八十里晉逺公過此挿蒿為記後蒿極繁盛云直河在府城北一十五里其水直注于大江俗訛直為池故又名池河豐樂河在府城北一百里灌田甚廣歲賴以豐縣河在京山縣治前下流至景陵縣蒿臺湖入漢江撞河在京山縣東北八十里舊傳有白龍撞石開此河故名源發隨州洪山白龍池下流至漢川縣入大江臼河在京山縣一百四十里左傳楚昭奔隨將涉成臼即此蘆茯河在潛江縣東三十里漢水分流處漕河在沔陽州西南江水潛水所入汊河在沔陽州北流入漢陽府界襄河在沔陽西漢水所入義