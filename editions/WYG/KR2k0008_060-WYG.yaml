勞形案牘公正亷潔割斷如流既去民立碑頌德曾三聘知郢州有冶行㑹韓􅇑胄為相指三聘為故相趙汝愚腹心坐追兩官趙文義郢州都統制時呂文煥降元為鄉道元兵水陸並至文義及范興帥精騎數千拒之屢戰多㨗援兵不繼死之初開州之役其兄武亦死義焉施子仁知復州時元兵攻襄陽隋守張龜夀荆門守朱揚祖郢守喬士安皆委郡去惟子仁固守城陷死之元陳天祥郢復州等處招討使經歴從國兵渡江因論軍中事深為行省㕘改賈居貞所噐重張庭珎郢復州守以清慎自守始終如一丞相伯顔甚重之白景亮至正間守沔陽分民户為三等九甲以均徭役濬景陵河造浮橋以利民涉郡人德之張寛至正間守沔陽有亷能聲嘗值嵗澇民不聊生即請於朝給粟賑恤一郡之民賴以生全聶炳至正中知荆門州纔半歳淮漢賊起荆門不守炳出募土兵復荆門及江陵未幾賊復來攻炳晝夜血戰城陷被執罵不絶口遇害俞述祖至正間為沔陽府推官時徐壽輝冦沔陽述祖發民兵捍禦力盡城陷被執不屈罵不絶口遂遇害丑閭至正中知安陸府蘄賊曹法興陷安陸丑閭被執不屈賊義而釋之丑閭歸謂妻侯氏曰我當死國汝何如妻曰生既同生死即同死夫婦即對縊而死賊具衣棺葬于城南新市賈泰亨京山縣尹能振新學校有惠政民皆頌之本朝余彦誠洪武間知安陸州賦役均平勤于撫宇民至今頌之李文秉洪武間知京山縣奬勵學校勸課農桑時稱其亷能應伯和洪武間知荆門州律巳亷介治民仁惠去任惟琴書而已州人懐其德久而不忘陳申洪武末安陸州知州勉勵學校均平賦役以亷能稱王孟永樂中為沔陽知州亷介自持有文學善于撫字民至今稱之李震知沔陽州剛介不阿善于撫字脩飾學校後以老去任民弗忍舍嚴貞景陵知縣亷介有為孜孜愛民從貞安陸衛指揮同知居官清儉出入惟一家僮前導蕭然若寒士領漕運尤愛惜士卒州為之謡雖三尺童子能頌其美省志楊季安永樂中知景陵縣時沔水泛溢城邑俱壊安大脩隄防捍之民免胥溺至今賴焉省志毛祥正統初知京山縣清心蒞政節用愛人時縣丞易緯亦能撫字父老相傳云毛祥在任僚幕得人省志陳詢正統間以侍講學士知安陸州蒞政寛簡篤志古學惠愛在民久而不忘省志張葢景奉初知京山縣興學校治豪猾杜絶私門苞苴不入歳饑積榖萬餘石盡發賑之貧民全活至三萬餘口士民立碑頌徳省志鍾順景泰中知沔陽州㢘慎愛民時劇盜周禮洪侵擾荆沔順計擒之士民安業立生祠于滄浪亭上省志隂子淑知荆門州鯁介不阿保民如子興學惇倫士習丕變州人為立去祠并作循良十詠詩以美之省志姜英成化中知當陽縣蒞事公勤臨民平易惠政甚多去後民歌之曰姜當陽古循良自去後德難忘省志姜綰成化末知景陵縣時制度簡陋蠧弊薦深綰刷剔振作復為規畫興學墾田以文章飾吏事乃民懐吏畏百姓立碑以識遺愛焉省志董傑𢎞治中知沔陽州時大旱蠲租開廩賑乏民賴更生省志陳良玊正徳中知景陵縣事無易劇審發無不竒中時單騎行田間勸課與諸生如家人父子論議日夕不倦一邑翕然稱治脩築城坦民無勞費省志儲洵嘉靖中以兵部郎中謫知沔陽時郡數荒歉民力彫瘵洵專務休息嘗賑饑移粟分給逺近征需不急者皆罷以身任咎無所顧忌後流亡盡復合郡安堵又奏修隄防言甚剴切至今賴之省志范昕嘉靖中同知承天府嚴明剛介清苦自持忤鎮守太監廖斌誣奏謫戍南海堅貞之節始終如一御史包節稱其居官亷㓗應變閑豫人所難及云省志蕭廷達嘉靖初知潛江縣剛介清苦人所難及修學校建倉儲江漢水溢齧學官障以石督民築堤防邑賴以全厥功甚偉省志流寓吕大防藍田人宋元祐初為尚書左僕射與范純仁同心輔政宣仁太后崩出知永興軍未幾言者論其隳壊役法貶秘書監居郢州哲宗問其兄大忠曰大防安否為朕寄聲問之二三年可復相見也張伯常河南人隠而不仕移居郢州司馬光送以詩曰楚江白逶迤楚山碧參差玉炊稻粒長縷切鱠魚肥孫何蔡州人父鏞知荆門軍何與弟僅讀書荆門之東山宋淳化咸平中兄弟相繼皆為状元趙吉甫其先蜀人徙居玉沙與魯齋許衡友善衡至武昌首問吉甫謂人曰吉甫天資聰俊髙某一著則其人可知矣自號拙存以文學名于世易炳文襄陽人元末隨父友旺徙居沔陽父喪炳文廬墓六年哀慕終身時人異之多遣子弟從之游鄉人稱易孝子居前有池産蓮一蔕二花人以為孝所感人物漢漢濵老父桓帝幸竟陵過雲夢百姓聚觀老父獨耕不輟尚書郎張温異之使問焉笑而不答温遂下道與言老父曰請問天下亂而立天子耶理而立天子耶昔聖王宰世茅茨不剪而萬人以寧今子之君勞人自縱何忍觀乎温大慙問其姓名不告而去鄧元起南郡當陽人少有膽斡仕南齊為武寧太守梁武起兵元起率衆與武帝㑹中興初為益州刺史天監初封當陽縣侯後為右衛將軍卒謚忠侯唐陸羽竟陵人為南海帥從事又詔除太子文學皆不就為人髙㓗自稱桑苧翁雅嗜茶嘗著茶經三篇宋張徽景陵人以詩名世所著有滄浪集司馬光范純仁皆與之友善弟徹七持使節八割郡符公清超邁計日受俸其遺表云神雖去幹忠不忘君張迪景陵人元豐間舉進士累官諌議大夫有争臣風烈畢漸潛江人紹聖元年状元為膳部員外郎出知荆南府事以文學致身剛介自立時人以其典鄉郡榮之朱震荆門軍長林人政和中進士為國子博士紹興間選建宗子首開資善堂以震為中書舍人兼翊善累遷翰林學士經學深醇人稱為漢上先生所著有漢上易解弟巽亦富學號為二朱陳嘉言景陵人為郡學諭文行為鄉里所推開禧間金人犯景陵脅衆使降嘉言厲聲辱罵自沉于水同室六人俱死别之傑郢州人嘉定初進士累官知江陵府湖北安撫副使進端明殿學士加兵部尚書淳祐中為㕘知政事寶元初卒特贈少師祝松景陵人舉進士初調長春簿端平初以城誓死守古郢遺民立祠祀之元張淵道景陵人與弟從道文學俱優同舉進士淵道厯官至秘書監都事從道武昌路通城縣達嚕噶齊本朝張從道京山人洪武中鄉舉除廬州府通判勤能有聲永樂初求賢用當道薦陞徽州府知府在任盡心民事有古循吏風後調永平府政聲益振虞信沔陽人永樂間擢監察御史陞四川按察司副使山東按察使吏畏民懐終河南右布政使歐陽謙沔陽人舉明經授耀州學正陞監察御史改編脩轉考功郎中優于文學所著有滄浪集從龍安陸州人領天順乙酉科鄉試授知縣陞知麻哈州時民被髪左袵龍教以冠裳書史遂成衣冠文物之區民生祠祀之以同知致仕鄉人獨稱其剛正云省志王希旦京山人成化中進士授南京大理評事遷廣東僉事徭人懐德畏威時海北討黎軍需不缺班師日軍民遮道頌之省志劉珏沔陽人成化初進士選庶吉士授户部主事嘗督糧九江羡餘悉貯府庫尋守常州亷明勤慎吏民敬憚以憂歸服闋起處州以父喪感疾卒毘陵至今祀之省志郭軒景陵人成化庚子鄉薦授盧氏教諭以師道自任多所造就遷福建連江知縣與丞不合卒于官丞制之不得發縣諸生為扶柩而出軒以剛正見重士類諸生顯者過縣必徃拜其墓省志周憲安陸州人𢎞治癸丑進士歴刑部員外郎上疏言事調兖州通判復職晉郎中擢大理知府轉江西按察司副使正德間征華林寨冦憲策馬先驅援兵不至死之賜祭葬贈按察使謚節愍子幹亦死于難詔旌其門曰孝烈省志魯鐸景陵人𢎞治壬戌舉禮部第一擢進士選庶吉士累遷國子司業南京祭酒改北京屢歴成均其教主于理道不屑章句南北士多所造就謝病歸卒諭祭謚文恪省志沈文華鍾祥人𢎞治中進士授刑部主事嘗上疏直學士程敏政之寃陞員外郎歴官陜西提學副使嚴立科條振作士氣八郡之風翕然以變以忤權貴左遷㕘議遂謝政歸省志夏寵京山人㓜有神觧讀書五行俱下多綜貫執禮論議方嚴正德間麻城賊攻其家父昌捍之力屈呼寵並逃時寵母未葬不去遂衰服迎賊賊義之以無賄竟執以去尋放歸後舉鄉試省志祁杲潛江人正德辛已進士授御史議大禮忤㫖廷杖幾斃疏劾席書憸邪側目巡視鹽法鹺政大舉轉河南僉事擒滅流賊陞雲南副使民夷懐惠進㕘政上疏乞休歸省志童承叙沔陽人正徳半巳進士選庶吉士授編脩晉國子司業訓士以文有成績進左庶子兼侍讀工詩得唐人體文有雅思其材足稱云省志王宗茂京山人嘉靖丁未進士拜南道監察御史侃直信毅志度不羣時柄臣威懾一世宗茂疏擊之被謫未幾卒于謫所省志錢錞顯陵衛人嘉靖庚戌進士知江隂縣性剛果遇事敢為時倭夷冦亂錞與戰死之賜光禄少卿䕃一子立祠江上祀之省志髙岱京山人嘉靖庚戌進士官郎中出為景藩長史好讀先秦古文為唐人詩多論著有鴻猷録樵論楚漢餘談弟􅑸進士嶨鄉薦皆有才名省志商大節鍾祥人歴官都察院右僉都御史平生慷慨負竒氣故所至風裁勛譽卓乎出士人右諡端愍省志歐陽柟潛江人事親篤孝一日羣冦入室獲其父挺以身代賊怒斷指流血父賴兔及官德興郎多善政值巨賊迎祥横嘯江漢率兵俘賊行陣又捐上賜金三百以賑民邑為建亭義之劉垓潛江人隆慶辛未進士授太平司理有聲轉祠部懇救呉趙二太史廷杖忤執政被謫再起雲南學憲得士心謝政歸剏同仁書院講學置義田倉塚賑貧卒祀鄉賢志省列女王氏馬把攬妻沔陽人年二十五夫死力貧守節永樂間旌省志任氏呉景妻沔陽人景卒任年二十有五誓以死守躬自訓子欽十年不出户姑病痿痺抱持左右寢處必偕每夜焚香籲天願以身代有嘔吐則舉盂以侯急或手承姑殁竟絶葷蔬食比葬得二白兎人以為孝感云𢎞治中旌省志熊氏袁子傑妻沔陽人孀居時年二十四𢎞治中旌省志髙氏吳紋妻沔陽人適武昌吳紋紋卒無子髙守節四十餘年正德中旌省志曹氏盧友傑妻當陽人𢎞治十六年夫卒守節嘉靖二十八年奏聞表旌省志胡氏唐與言妻京山人與言為邑諸生胡歸事之才二嵗而與言卒無子胡守節四十餘年嘉靖中旌省志何氏景陵人夫亡守節隆慶二年知縣萬梁以聞于朝旌其門省志仙釋董仲漢董永子母乃天之織女故仲生而靈異數篆符鎮邪怪嘗游京山潼泉以地多蛇毒書二符以鎮之其害遂絶今篆石在京山之隂獨孤摽和尚住潼泉山趺坐而逝偈言未來事後皆騐蕭行美沔州人年九十餘獨行履素常遊對融山遇一老人自稱張先生指草一叢曰移草栽之可煑鐵成銀戒之曰切不可泄行美受教遂移草歸後試之果如其言久之泄其事一夕大風雨漂失其草再入山訪之不復有矣襄陽府東至徳安府隨州界二百一十里西至陜西漢中府平利縣界一千里南至承天府荆門州界一百八十里北至河南南陽府新野縣界九十里自府治至南京三千七百里至京師六千八百六十七里糧六萬三千七百石零建置沿革禹貢荆豫二州之域天文翼軫分野周為榖鄧鄾盧羅鄀之地春秋時属楚秦為南郡南陽郡地漢因之東漢末劉表為荆州刺史徙治襄陽縣三國魏始置襄陽郡治宜城以地在襄水之陽故名晉亦為荆州治所東晉於襄陽僑置雍州梁置南雍州西魏改曰襄州隋初郡廢州存立山南道行臺并總管府煬帝時州府並罷復置襄陽郡治襄陽縣唐初復置襄州山南東道治此後為襄陽郡又為襄陽府復為襄州五代梁唐置忠義軍宋復為襄陽府元改為襄陽路本朝復為襄陽府領州一縣六襄陽縣附郭本漢舊縣属南郡新莽改為相陽東漢復舊建安中置襄陽郡以縣属焉隋唐宋皆為襄州