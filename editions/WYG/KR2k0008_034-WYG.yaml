尚存筀竹園在岐山縣西北一十六里周公廟前李茂貞園在府城北之東宋蘇軾詩我時來周覧問此誰所築云昔李將軍負險乗衰叔又云此亭破千家鬱鬱城之麓將軍竟何事蟣蝨生刀䪅鳳翔八觀宋蘇軾記此府可觀者八謂石皷歌詛楚文秦穆公冡王維呉道子畫維摩塑像李氏園東湖真興寺閣是也軾謂士大夫有觀之不能盡者因作詩以示焉名宦周蹇叔秦上大夫穆公欲襲鄭蹇叔以為不可不聽果為晉軍擊敗於殽子西乞術亦為秦將與孟明視伐晉大敗晉人以報殽之役公孫枝秦穆公大夫能知人舉善君子謂其忠漢尹翁歸右扶風治為三輔最王尊歴虢郿两縣令甚有能名來歙光武初自隴西回中城伐山開道擊斬隗囂将金梁祭遵漢將破隗囂將王元于汧王忳郿縣令首㫁亭長殺過客之寃政教流傳南北朝楊津魏岐州刺史躬親巨細孜孜不倦有武功人齎絹為賊所刼值驛使至以狀白津津乃下教云有人著某色衣乗某色馬者在城東被殺若有家人可速収視有一老母行哭而出云是已子於是遣騎追収并絹俱獲自是闗境畏服隋梁彦光岐州刺史甚有惠政嘉禾連理出于州境課為天下第一唐狄仁傑以大理丞使岐州亡卒數百剽行人道不通官捕繫窮訊而餘曹紛紛不能制仁傑開首原格繫者廩而縦之使相曉皆自縳歸宗楚客岐州刺史有惠政既去而民思之韋湊岐州刺史時方旱欲興工建碑靖陵湊諫止之薛景先陳倉縣令楊國忠敗妻子奔陳倉景先捕誅之後以檢校户部尚書兼鳳翔尹劉晏隴州刺史有惠政楊瑒麟逰令時竇懷貞大營金仙玉真二觀暴歛畿内以佐費瑒拒不應懷貞怒曰縣令而拒大夫命乎瑒曰所論者民寃抑也位高下乎何取懷貞壯其對為止馬燧隴州刺史於西山吐蕃出入處聚石種樹障之及設二門為譙櫓八日而畢虜不能暴李晟鳳翔軍節度使斬亂將王斌等十餘人邢君牙鳳翔觀察使俄領節度劭耕講戰以為備吐蕃不能侵韋臯鳳翔營田判官有幹材後知隴州朱泚反以中丞授臯臯斬其使王承元鳳翔節度使吐蕃數入㓂承元據勝地為障置守兵千詔號臨汧城人乃告安以勞封岐國公史憲誠隴州刺史増置亭障徙客舘于外戎諜無所伺李惟簡鳯翔節度使卒于鎮韓愈銘其墓李愬鳳翔節度使李師中反詔愬代其兄愿帥武寧軍旬日踐父兄两鎮世以為榮弟聦亦為鳳翔節度使一門建節時人榮之令狐綯鳳翔節度使有政績李茂貞鳳翔節度使僖宗朝昌符之亂克平隴州茂貞有功焉鄭畋鳳翔節度使募鋭兵五百號疾雷將境中盜不敢發發輙得宋翟守素知鳳翔府寛仁容衆有治績凡斷大辟必罪狀明白仍偏詢寮寀僉同而後決趙稹知鳳翔府以寛大存心人不敢干以私周審玉咸平初知鳳翔府有桑門乗傳而西以市木為名威動府縣審玉曰此有所倚而為也因按詰之盡得其奸狀杖其背械送闕下杜衍知乾州有治行命權知鳳翔府事二州民爭於境上一曰此我公也汝奪之一曰今我公也汝何有焉温仲舒知鳳翔府時武成鎮巡檢慘刻士卒欲為亂仲舒誅其首謀者而停巡檢官一方肅然冦凖知鳳翔府有善政遇事立决李及知鳳翔府性清介治尚簡嚴喜慰薦下吏而樂道人之善程之邵知鳳翔府民負債無以償自焚其居而紿曰遺火有主藏吏殺四婢人無知者即皆發擿之岐人傳誦其明文彦愽知秦州領鳳翔府有威惠任福知隴州擢秦鳳路馬步軍副總管時詔陜西増城壘噐械福受命四十日而戰守之備皆具司馬池知鳳翔府有疑獄上讞大理輙復下掾屬惶遽引咎池曰長吏者政事所由非諸君過乃獨承其罪有詔勿劾陳希亮知鳳翔府吏事精敏倉粟支十三年主者以腐敗為憂歲饑希亮發十三萬石貸民有司懼為擅發希亮身任之是秋大熟以新易舊官民皆便蘇軾簽書鳳翔府判官闗中自元昊叛民貧役重坡下歲輸南山木栰自渭入河經砥柱之險衙吏踵破家軾訪其利害為修衙規使自擇水工以時進止自是害减半朱景神宗時西方用兵詔侍從舉縣令景預選知汧源縣甚有名李師中知鳳翔府時种諤取綏州師中上疏論牽制之害賈逵秦鳳路鈐轄秦山多巨木與夏人錯壤逵引輕兵徃來伐羗酋馳至畫地立表約决勝負逵引弓連三中的酋下馬拜伏從逵取盈而歸李伸知天興縣金人來攻堅守不下城䧟曰吾豈使敵殺我遂自殺康傑知扶風縣與金將馮宣戰宣愛欲招之傑奮曰吾當死于陣不能降敵宣乃殺之呉玠知鳳翔府屢擊敗金兵人賴以安劉化源知隴州建炎中金人入冦化源不肯降敵驅入河口隠於民間金韓玉鳳翔總管府判官時夏人連䧟邠涇玉募兵得萬人與夏久戰敗之夏人解去元汪福安隴州太守有惠政民為立碑本朝許敬洪武末鳳翔知府寛志亷勤邵民仰慕蔡祥洪武末隴州知州清慎愛民州人稱頌徐永達永樂四年寶雞縣學教諭訓廸有方秩滿諸生乞留復任成就人才甚多復揚清扶風縣典史籍其民為上中下三等憑以差役莫不從令貧無牛耕者即為假貸人甚德之秩滿當去民詣闕乞留乃陞祿復任宋端永樂中知扶風縣公勤亷幹吏弊悉革賦役均平民皆稱頌流寓吕尚初避紂居東海之濱閒西伯善養老乃西入周釣于渭濱西伯出獵遇之載歸立以為師相武王伐紂興周尊為師尚父後封于齊百里奚本虞人知虞公不可諫而去之秦穆公舉以為相號五羖大夫子孟明視為秦將人物周周公旦姬姓文王之子世居岐山生有聖德輔武王伐紂以安天下又輔成王制禮作樂以成周家之治召公奭姬姓世居岐山與周公同輔武王定天下又輔成王以成至治非子伯益之後善養馬為孝王主馬於汧渭之間馬大蕃息分土為附庸邑之秦使續嬴氏之祀三良􅍕息仲行鍼虎三人皆子車氏之子秦之良也穆公卒以三良殉葬國人賦黃鳥詩以哀之白起郿人善用兵秦昭王用為左庶長戰勝攻取凡七十餘城後封武安君漢郭欽隃麋人哀帝時為丞相司直以亷直名王莾居攝欽耻事之以病免官歸鄉里遁迹汧陽之境臥不出户卒於家井丹郿人通五經善談論京師語曰五經紛綸井大春大春丹字丹性高未嘗修刺侯人隠居不仕當世高之法真郿人好學愽通圖典為闗西大儒弟子自逺方至者數百人前後四徵不屈時號𤣥德先生三國法正郿人從漢昭烈平蜀為太守終尚書令昭烈東征敗績諸葛亮嘆曰孝直若在必能制主上東行不至傾危也孝直正之字也魯芝郿人魏時舉孝亷除郎累遷尤水大守曹爽輔政芝屢進讜言不聽及爽下獄芝以直得免後為并州刺史封陰平侯晉蘇愉扶風人以古文尚書授梁柳南北朝魯爽郿人祖彦仁晉南陽太守父軌為後魏荆州刺史爽與弟秀俱仕宋文帝時爽為司州刺史秀為滎陽太守魯悉達郿人㓜以孝聞侯景之亂與弟廣達聚衆保新蔡梁元帝授江州刺史後改呉州刺史封彭澤侯魯廣達悉達弟少慷慨立志功名虛心愛士仕陳為將後入隋以保新蔡功授晉州刺史封中宿縣侯蘇孝慈扶風人父武周兖州刺史孝慈少沉謹有器局為中侍上士以使齊稱㫖遷大都督後以功進位開府爵靈水縣公唐竇威岐州岐山人父幟在周為上柱國入隋為太傅威沉邃有噐局貫覧群言諸兄詆為書癡高祖入闗召輔丞相府司錄參軍武德初授内史令每論政事得失必陳古為諭竇軌威兄子從太宗討平王世充又平蜀盜有大功貞觀初為洛州都督威信大行兄子抗涉見圖史事父孝仕為幽州都督以寛惠聞從太宗平薛軌功第一抗子靜禮部尚書累遷夏州都督誕宗正卿姪孫徳𤣥為左相德𤣥子懷貞為侍中李高遷岐州人高祖初以右三統軍從下霍邑圍長安力戰遷左武衛大將軍江夏郡公劉感岐州鳯泉人武德初以驃騎將軍戍涇州為薛仁杲所圍執感令約城降感紿諾至城下大呼曰賊大饑亡在旦暮秦王兵且至仁杲怒埋感半身土中馳射之至死罵益甚賊平高祖追封平原郡公命其子襲爵王珪郿縣人性沉澹志量純正太宗朝為諫議大夫善諫諍與魏徵齊名遷侍中後為禮部尚書卒諡曰懿李淳風岐州雍人㓜爽秀通群書明步天厯算貞觀初以將仕郎直太史局制渾天儀著法象書七篇上之累遷太史令太宗得䜟欲求武姓者殺之淳風曰天之所命不可去也若殺之復生壮者陛下子孫無遺種矣乃止凡於占候吉凶若節契然意有鬼神相之以勞封昌樂縣男所撰有典章文物志乙巳占等書和逢堯岐州岐山人武后時負鼎詣闕上書自言願助天子和飪百度坐流荘州十餘年乃舉進士突厥請尚主逢堯以御史中丞攝鴻臚卿報可諷以慕義突厥遂稱臣遣子入朝逢堯擢户部侍郎馬璘岐州扶風人武幹絶倫善以少擊衆至德初從李光弼東討有功永㤗初為四鎮行營節度使後吐蕃内冦渾瑊戰不利璘合擊破之進右僕射扶風郡王叚秀實汧陽人㓜號孝童及長舉明經不果從高仙芝等征討有功累拜四鎮涇原節度使朱泚反秀實執泚腕唾罵以笏擊之血流被面遂遇害後贈太尉子伯倫官至太僕卿楊炎鳳翔天興人祖哲以孝行稱父播舉進士拜諫議大夫棄官歸養炎豪爽尚氣父喪廬墓號慕不廢聲有紫芝白雀之祥詔表其閭炎三世以孝行聞至門樹六闕唐德宗時拜相宋張載郿人舉進士為祁州司法歴渭州簽判召為崇文殿校書同知太常禮院為人志氣不羣初喜談兵及釋老書反而求之六經既見二程子盡棄異學而學焉神宗立召問治道以漸復三代為對與執政不合告歸居橫渠危坐一室潜心精思教人以禮闗西之士翕然宗之所著有東銘西銘正䝉擴聖賢所未發卒諡曰明淳祐初封郿伯從祀孔子廟庭張戩載弟篤行不茍為一時師表闗中稱為二張舉進士仕至監察御史裏行累章論王安石亂法出知公安縣徙監司竹監至舉家不食筍閻詢鳳翔天興人少時以學問著聞擢進士第累遷秘書丞為監察御史裏行嘗使契丹頗諳北方疆理契丹人不能欺後官至諫議大夫知同州金王檝鳳翔虢縣人父霆麟遊主簿檝性倜儻舉進士不第乃入終南山讀書涉獵孫呉用元帥高琪薦授副統軍守涿鹿隘元太祖南下檝鏖戰三百兵敗被執将戮之神色不變太祖問之對曰捐軀報國得死為幸遂義而釋之後從征伐累官宣撫使兼行尚書六部事元楊皥扶風人母嘗病劇叩天求代遂痊如是者再後母失明皥登太白山取神泉洗之復如故及母殁哀毁甚葬之日大雨獨皥墓前後數里無雨葬畢廬墓蔬食飲水終喪及父卒亦如之趙榮扶風人母有疾榮割股肉啖之者三復負母登太白山禱于神得聖水飲之疾愈及卒號慟甚葬之日負土成墳廬以終喪本朝甄儀麟遊縣人洪武中舉人累官兵部左侍郎平坦無過以疾卒李敬臣鳳翔縣人以才能卓異薦于朝歴官有聲累遷至刑部右侍郎艾瑛隴州人永樂中人材舉授浙江右布政使才能著稱仙釋馬成子扶風人周秦間慨然有修道之志遂棄家入伯陽川遇一童子授以胎元煉氣法乃入蜀鵠鳴山隠居洞中忽一人策杖而至曰此山鵠鳴子當昇仙矣乃授以神丹曰氣為内丹藥為外丹子授仙童内丹今復受吾外丹不乆列為高真矣言訖乗雲而去成子服之遂白日昇天馬儉扶風人博通經史秦甘露中從孫徹學道授以五符真文㫁穀服水行氣導引遂役使萬靈制御群邪姚萇聞而異之徃召不至乃給香燭一日天神降而言曰法師勤修道業積有日矣必得度世後年九十八返真而白雲舉焉張三丰居寶雞縣東三里金臺觀本朝洪武二十六年九月二十日自言辭世留頌而逝民人楊軌山等置棺殮訖臨葬發視之三丰復生後入蜀見蜀王又入武當山或遊襄鄧間永樂中遣使尋訪不遇為官以待之漢中府東至湖廣襄陽府上津縣界一千四十里西至四川