body:
  text: 明一統志卷三十四明李賢等撰鳳翔府東至西安府武功縣界一百五十五里西至鞏昌府清水縣界三百一十里南至漢中府鳳縣界二百里北至平凉府靈臺縣界二百二十里自府治至京師三千二百里至南京四千八百里糧十九萬石零建置沿革禹貢雍州之域天文井鬼分野周為岐周地春秋戰國為秦地始皇并天下以屬内史漢初更内史名中地郡後復故景帝分屬右内史武帝更曰右扶風與京兆左馮翊為三輔三國魏為扶風郡晋為秦國後魏置秦平郡又於郡東置雍城鎮後改鎮為岐州西魏為岐陽郡隋初為岐州大業初改為扶風郡唐初復為岐州天寶初改扶風郡至德初改鳳翔郡尋改鳳翔府號西京寶應間罷京名屬關内道五代時屬關西道宋仍為府屬秦鳳路金置天興軍屬陜西西路元為鳳翔路本朝為鳳翔府領州一縣七鳳翔縣附郭本召穆公采邑春秋時為故雍秦置雍縣漢屬右扶風後魏為秦平郡治隋為扶風郡治唐至德初改雍曰鳳翔縣仍析置天興縣後省鳳翔入天興金復改為鳳翔縣元仍舊本朝因之編户三十九里岐山縣在府城東五十里古岐周地漢為雍縣地後周割涇州鶉觚縣地置三龍縣屬岐州隋移三龍治岐山南改為岐山縣唐時移治不一後治豬驛南五代宋金元屬鳳翔府本朝因之編户二十九里寶雞縣在府城西南九十里本秦陳倉縣漢屬右扶風三國魏為重鎮晉末縣廢符秦時於縣界置苑川縣後魏移苑川治陳倉復為陳倉縣後周於此置顯州未幾州縣皆廢隋復置陳倉縣屬岐州唐至德初因秦文公獲石雞之異改寶雞縣宋金元仍舊本朝因之編户四十九里扶風縣在府城東一百一卜里周為岐陽鎮漢為羙陽縣地後周於此置燕州以美陽縣省入隋末州廢唐初析岐山縣地置湋川縣貞觀中改為扶風縣五代宋金元並仍舊本朝因之編户二十九里郿縣在府城東南一百四十里本秦縣漢屬右扶風後魏改平陽縣西魏改郿城縣尋廢入周城縣隋置郿城郡唐改郡為郇州尋廢州為郿縣屬魏州後改屬鳳翔府宋因之金初屬恒州後屬京兆府路元初陞為郿州至元初復為縣屬安西路本朝改今屬編户一十八里麟逰縣在府城東北一百二十里本漢右扶風之杜陽地隋置鳳棲郡尋因獲白麟更曰麟逰郡及置麟逰縣唐初廢郡為麟州貞觀初州廢以縣屬岐州後屬鳳翔府五代宋金元並仍舊本朝因之編户一十六里隴州在府城西一百八十里周為岐隴之地春秋屬秦國秦并天下屬内史漢為汧縣屬右扶風晉廢後魏於汧源縣界置隴東郡後改東秦州西魏改隴州因山為名後周省入岐州尋復置隋省入扶風郡復置隴東郡唐改汧陽郡後復為隴州治汧源縣宋屬秦鳳路金屬鳳翔路元屬鞏昌總帥府本朝以汧源縣省入改今屬編户二十八里領縣一汧陽縣在州城東九十里本漢隃縣地屬右扶風晉省隃糜後周置汧陽郡及縣以在汧水之陽故名尋廢郡以縣屬隴州唐宋金元皆仍舊本朝因之編户一十六里郡名扶風漢名岐陽西魏名形勢地形險阻唐志地形險阻原田肥美物産富饒乃成周興王之地五水之會寰宇記汧渭岐漆雍五水皆㑹於郡界三秦之一舊志雍有三秦鳳翔其一也右袤涇原唐王承元傳鳳翔右袤涇原地平少巖阻山如犬牙原如長蛇宋蘇軾詩南望斜谷口三山如犬牙西觀五丈原鬱屈如長蛇隴關阻其西益門扼其南郡志風俗民厚重質直無驕惰之習詩傳雍州土厚水深其民厚重質直無鄭衞驕惰之習以善道之則易以興起而篤於仁義以猛驅之則其强毅果敢之資亦足以禦侮力農而成富庶之風也勤稼穡務本業郡志鳳翔本成周興王之地居民習俗忠厚不好華靡勤稼穡務本業有先王遺風士皆儒雅同上人喜射獵元志人皆尚氣力喜射獵多出名將山川杜陽山在府城東北二十五里杜水所出雍山在府城西北三十里雍水所出蓋四面積高曰雍又四面不見四方故謂之雍此地春秋為故雍山之名以此雞冠山在府城北三十里以形似名靈山在府城西北三十五里岐山在岐山縣東北一十里山有兩岐故名亦曰天柱山其峰高峻狀若柱然禹貢導岍及岐太王邑於岐山之下文王時鳳鳴岐山皆此地俗名鳳凰堆五將山在岐山縣北三十里亦名武將山連亘扶風長安縣界石橋山在岐山縣南三十里耆闍山在岐山縣北四十里梁山在岐山縣東北四十里周太王去邠踰梁山即此秦於此建梁山宫南山在岐山縣南五十里即終南山連亘扶風鄠縣長安藍田縣界西抵大散闗宋蘇軾詩南山連大散益門山在寶雞縣南一十五里古益州境由此而入石鼓山在寶雞縣南二十里山麓舊有石如皷者十相傳周宣王時所鑿唐韓愈宋蘇軾俱有石皷歌石皷今在國子監陳倉山在寶雞縣東南四十里一名雞峰山上有石類山雞晨鳴山頭聲聞三十里又錄異傳雍南山有梓樹秦文公伐之輙大風雨樹生合不㫁有人夜徃山中聞有鬼語樹神曰秦若使人被髪以朱絲繞樹伐汝汝得不憂否明日其人以語文公如其言伐之有一青牛出走入澧水復出使騎擊之不勝騎墜地復上髮解牛畏之不出故置髦頭騎因此也青峰山在寶雞縣東南八十里峰巒蒼翠故名蛇山在寶雞縣西南八十里其山多蛇石樓山在寶雞縣東南一百二十里義會山在扶風縣西北一十里茂陵山在扶風縣東北三十里林壑秀美漢末馬超居此明月山在扶風縣北五十里衙嶺山在郿縣西南一十五里俗呼馬鞍山大白山在郿縣東南四十里上有湫神廟旱禱雨輙應東連武功縣界天台山在麟遊縣西五里唐九成宫之西鳴鳳山在麟遊縣西與天台山相連舊傳嘗有鳳鳴其上石臼山在麟遊縣南一十五里上有石臼青蓮山在麟遊縣西南二十里呉雙山在麟遊縣南二十里有兩峰俗呼呉重山寶玉山在麟遊縣西七十