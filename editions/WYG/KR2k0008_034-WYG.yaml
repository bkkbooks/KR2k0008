寰宇記初在鳳州北六十里本漢故道縣地唐武德初以梁泉縣分置後併入梁泉故道廢縣在鳳縣境漢高祖引兵從故道敗章邯于陳倉即此金牛廢縣在褒城縣西一百八十里本漢葭萌縣唐開元中分置後省入褒城洋源廢縣在西鄉縣南二十里唐武德中置寶厯初廢亷水廢縣在府城南五十里宋紹熙四年置紹定中廢拜將壇在府城内西南漢高祖拜韓信為大將處遺址尚存宋張少愚詩漢用亡臣策登壇授鉞時須知數仞土曽立太平基石牛道在褒城縣境即五丁所開之路東漢永平中司𨽻陽厥又鑿而廣之棧道在褒斜谷中即漢張良説高祖燒絶之處元時有板閣二千八百九十餘間今仍構葺唐人詩梁州秦嶺西棧道與雲齊陳倉道在沔縣東北二十里由百丈坡入山今荒塞蜀漢諸葛亮出散闗圍陳倉曹操自陳倉出散闗即此子午道在洋縣東一百六十里舊道在金州梁時王神念别開此道諺云山水艱阻黄金子午唐涪州貢生荔枝置驛經此三日至長安鐵城戍在黃金廢縣西北八十里城在山上極險峻故名宋元嘉中氐王楊難當遣薛徤據黃金戍為蕭承之所拔蕭坦又攻鐵城戍拔之是也八陣圖在定軍山下蜀漢諸葛亮所作又有督軍壇亦在山下亮嘗督軍於此鄉人言每陰雨時聞有擊鼓聲鬼迷店在鳯縣境宋陸游詩徃者奉蜀間慷慨事征戍猿啼鬼迷店馬噤飛石鋪石鏡在蕭何堰石門之上可燭鬚眉石鼓在城固縣北四十里褒水中擊之有聲名宦漢田叔漢中守給軍饟致名材以立宫室高祖嘉之後事趙王張敖敖得罪被徵叔隨至長安事既白復以為守种暠梁州刺史甚得百姓心及當遷吏民請留復留一年陳禪安帝時羗反拜禪為漢中守禪到矯詔赦之而誅其首亂者天子善之鄭勤安帝時為漢中太守先零羗入冦勤戰死桓宣漢中太守每至農月親載耒耜登臺勸農張光梁州刺史嘗遣叅軍擊賊李邕楊武等為賊所敗光憤激而卒百姓皆悲惜之三國諸葛亮蜀漢丞相建興五年出屯兵漢中築城於城固駐兵于赤阪吕乂蜀漢漢中太守兼領督農供給軍餉為政簡而不煩以清能見稱魏延領漢中太守昭烈問曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為拒之偏將十萬之衆請為吞之衆壯其言桞隠蜀漢黃金督魏鍾㑹入漢川圍戌多下惟隠堅璧不動㑹攻不能克晉吉挹魏興太守符秦兵拔魏興挹被執不言不食而死南北朝蕭思話宋文帝時氐楊難當焚掠漢中引衆西還思話悉収漢中故地徙鎮南鄭劉道真宋梁秦三州刺史與裵方明討楊難當難當奔上邽仇池遂平范栢年宋梁州刺史嘗見明帝帝言廣州貪泉栢年曰梁州惟亷泉讓水又問卿宅何在曰在亷讓之間帝美其對冦雋魏梁州刺史人俗荒獷多為盜賊雋立庠序勸農桑敦禮讓數年之間風俗頗革李崇魏行梁州刺史事氐楊靈珎遣衆萬餘襲武興崇大破之斬俘甚衆靈珎奔漢中孝文聞之嘉其功真拜刺史邢巒魏持節梁秦州刺史開地定境東西七百里南北千里獲郡十四戌邊逼於涪城蕭循梁秦梁二州刺史移風易俗人號慈父時蝗害禾循深自咎責忽飛鳥千羣下食蝗盡賀若敦周金州總管以武烈知名有戰功隋蕭瑀為内史侍郎數言事忤㫖出為河池太守唐薛大鼎高祖時為山南道副大使開屯田以實倉廩以才能遷滄州刺史唐璿聖厯中梁州都督吐蕃入冦璿臨高望之謂麾下曰彼騎雖精不習戰吾為諸君取之乃被甲先登六戰皆克築京觀而還盧獻武后時歴文昌左丞為來俊臣所䧟出為西鄉令盡心邑事不以左遷介意張嘉貞梁州都督政以嚴辯吏下畏之奏事京師𤣥宗善其政數慰勞焉李抱玉山南西道副元帥上言地方二千里虜道不一願擇能臣帥西道當一面臣得專事闗隴許之在鎮十餘年禁暴安民為將臣之良元結肅宗時上時議三篇帝曰卿能破朕憂擢山南西道節度叅謀有討賊功嚴震德宗時興鳳兩州團練使好興利除害建中間燕陟使韋楨上其治狀為山南第一震治鳳十四年號稱清嚴逺近咨美元稹梁州刺史題詠甚多姜公輔永貞初金州刺史有政略嘗奏置石泉縣嚴礪興州刺史後為節度使寛明簡惠嘗疏嘉陵江通漕以饋成州孟郊鄭餘慶鎮興元奏為叅謀富于吟咏李翶金州刺史性峭鯁有丈名見推于時李漢寶厯中入閣奏除授不由中書恐壞紀綱坐忤出為興元從事有文名桞晟帥漢中詔諸征蜀卒還都卒欲謀變晟疾驅徃勞之曉以禍福于是皆從所徙裴瑾金州刺史决高弛隟去水禍渚茭原茅闢成稻粱張仲方金州刺史郡人有田為中人所奪仲方三疏奏聞竟理其寃李德裕文宗時以斥李訓姦邪罷相為興元節度使李綘泰和初興元節度使監軍楊叔元作亂牙將王景延戰殁綘亦遇害温造興元軍亂殺李絳乃授造節度使徃夷其亂斬首八百醢殺綘者以首級祭之令狐楚㤗和中興元尹山南西道節度使以寛及民以威肅吏甚有治最嘗表劉蕡為幕府鄭澣文宗時山南西道節度使始其父餘慶鎮興元創學廬澣嗣完之教育生徒風化大行崔偉金州刺史黃巢亂攻䧟州縣偉保守疆土民賴以安後卒民為立祠李康漢陰令黃巢亂僖宗出幸塗無供頓康獻糗餌數百騾軍始得食五代唐道襲梁山南西道節度使㑹李茂貞冦蜀道襲拒於青泥嶺以死守之茂貞自是無窺山南之意馮行襲唐昭戎軍節度使鎮金州境内旱有蝗飛鳥為食之歲凶田中鹵榖自生王環孟蜀鳳州節度使周世宗攻之為環所敗世宗决意攻之及秦成階三州已降環獨堅守世宗以書招之環不答至力屈乃就擒世宗謂環忠其所事嘉嘆之宋張暉初議伐蜀以為鳳州團練使暉密疏陳山川險易太祖大喜及大軍西下暉督兵開大散闗路躬撫士卒且役且戰人忘其勞程德𤣥淳化中李順冦蜀以德𤣥知鳳州兼領鳳成等州駐泊兵馬事其後入朝真宗命坐撫勞訪以邊事盧士宏知洋州先是圭田多虛籍士宏考校令隨實以輸自部使者而下皆十損七八文彦慱包拯皆薦其亷能魯宗道大中祥符中知城固縣有直名政績顯著薛奎知興州州有錢監歲調兵三百人采鐵而入不償所費奎奏聽民自采而所輸輙倍之韓億真宗時知洋州有李伸者誣其兄子為他姓盡奪其財産億察其寃一日盡召其黨立庭下出乳醫示之衆皆伏罪子縝亦知洋州有惠政後人為建襲美堂陳彭年咸平中知金州以文學餙吏事吏民敬愛之嘗上疏言五事許逖真宗時知興元府躬治木石修山河堰以溉田堰成嵗大豐歐陽脩為記其事張中庸真宗時知洋州政事清明人稱為水晶燈籠楊繪仁宗時知興元府吏請攝穿窬盗庫縑者繪就視之蹤跡不類人所出入乃呼戲沐猴者詰于庭一訊具服人服其明在郡獄無繫囚韓𤦺皇祐間為武康軍節度使剖劇除弊賦均訟簡既去人思慕之种世衡通判鳳州為政公嚴州將王䝉正章獻后婣家也嘗干世衡以私世衡不聽程珦知鳳州政尚慈恕魯有開治平初知金州有蠱獄坐死者數十人有開曰欲殺人衷謀之足矣安得若是衆耶訊之果誣天方旱獄白而雨范純粹知金州有善政明于決事人不能欺文同熈寧中知洋州樂其江山之勝題詠甚多張浚宣和中山南西道士曹叅軍又調褒城令妙齡能政守貳皆以遠噐期之後為宣撫治兵興元邵伯温建炎初為蜀川提刑逆賊史斌據興州守臣向子寵望風遁去伯温遣兵扼劒門以拒之賊懼而去州賴以安王彦建炎中知金州賊桑仲擁衆直犯州境彦麾士死鬬賊大敗追襲二百餘里盧法原紹興初為川陜宣撫副使逆賊史斌據興州諸郡多應者法原與經制使王􅊅及興元統制韋知幾同破斌復興州時巨盜充斥法原極意拊循人心以安王庶紹興初張浚有富平之敗庶勸浚扼隴闗以為後圖浚承制命庶知興元倉卒募兵訓練以空城抗大敵金人懾其威名引去劉子羽紹興中呉玠戌河池王彦戌金州二鎮皆饑興元帥閉闗塞褒斜二鎮病之張浚承制以子羽知興元至之日盡弛其禁通商輸粟二鎮乃安許尹知興元召對言今日莫若重蜀重蜀以興元為本高宗嘉納其說呉玠川陜宣撫副使初為秦鳳等州制置使守仙人闗屢破金人嘗苦逺餉勞民益治屯田修褒城廢堰民知灌溉可恃歸業者數萬家郭浩知興元府屢破金人於和尚原後又知金州招輯流亡開營田他軍仰給朝廷浩獨積贏錢十萬緡以助户部楊政知鳯州金人攻饒風闗政從呉玠戰却之後知興元府六堰乆壞為修復之漢江水決為害築長隄捍之守漢中十八年事有利於民者不敢以軍旅廢呉璘乾道初以川陜宣撫使判興元府時和議方堅而璘治軍經武常如敵至修復褒城古堰溉田數千頃民甚利之未幾卒軍民號哭失聲呉挺金州都統改興州紹興中水暴入城挺振被水者復増築長隄民賴以寧軍中自置互市以來羗馬西路騎兵遂雄天下虞允文紹興中為川陜宣諭使開府興元前後博議經略中原之䇿疆理有守闗河響應兵民歸附日以萬計晁公武乾道初知興元府東吏愛民百廢具舉庭無滯訟稱為良吏唐文若通判洋州西鄉縣産茶山窮險賦不盡括使者韓球將増賦以市寵園户避苛歛轉徙文若力爭之賦訖不増薛可先知城固縣有文學率吏民以拒冦脩水利以溉田民懷其德劉甲嘉定初知興元府兼節制軍馬修武備究心民訟嘗曰太守有一時之閒百姓受一時之害李蘩知興元府漢中乆饑劒外和糴在府境者獨多蘩嘗訪求民瘼有老嫗泣言民所以饑者和糴病之也蘩奏免之民大悦陳咸利東路轉運判官増餽以實金州人皆曰金州地險金人不可向何益之為咸曰敵至而慮無及矣未幾金人犯上津守賴以固高稼通判沔州移知洋州元兵來攻稼極力守禦遂大破之後再知沔州城䧟死節曹友聞知沔州節制屯戍軍馬元兵來攻友聞血戰與弟萬皆死之蹇彛通判金州端平中元兵來攻彛堅守與戰不能敵被擒不屈而死其子永叔復力戰城破舉家死焉元王利用興元路總管减職田租額站户役於他郡者悉除之民甚便焉有婦毒殺其夫問藥所從來吏教婦指為富商所貨獄上利用曰家富而貨毒藥豈人情哉訊之果寃人服其明暢師文漢中道巡行勸農使置義倉教民種藝又上所纂農桑輯要書於朝度宗顯至正間為沔州守政治有聲興廢舉墜風俗一變境内肅然民咸謳歌之為立碑紀其績蒲庸城固縣令治績振舉政聲流聞民為立祠本朝費震洪初初為漢中知府開設府治招撫流民拯救饑饉德及一郡人稱頌之鄒昱永樂初漢中府同知勤慎有為政聲大振朝廷嘉之馬驤洪武末洋縣知縣學問該博有守有為吏民畏服流寓吕希純宋河南人累官起居舍人以上疏論時政閹寺側目章惇既相出知亳州連徙睦歸州及父公著追貶希純亦以屯田員外郎分司南京金州居住希純有賢行杜門讀書不以夷險萦心邵雍宋河南人客游鳳州留三月而去嘗登郡樓賦詩云鳥去林自空雲移山不礙曉角時斷續層崖逓明晦殘陽掛疎紅逺水生微瀨塞月烟岑密都城若天外楊儀宋鳳翔人徙居梁洋由進武校尉封安康郡開國侯人物漢鄧先城固人景帝時為校尉擊呉楚及還帝問七國聞誅晁錯兵罷否曰七國反謀已久發怒削地非為錯也帝曰公言善張騫城固人武帝時為郎應募使月氐開西南夷去十三年始還後封博望侯張猛騫孫為光祿大夫與周堪同心輔政後為石顯所害鄭子真褒中人家于谷口成帝時王鳳備禮聘之不應楊王孫城固人治黃老術家業千金厚自奉養臨終告其子曰我死躶葬以反吾真鍚光西城人哀平時為交阯太守教民夷以禮義王莽簒位據郡不附光武加其忠節拜大將軍李法南鄭人愽通羣書性剛而有節和帝時舉賢良除博士遷光禄大夫上疏言宦官權重椒房寵盛忤㫖免官後徵拜諌議大夫正言極詞不改于舊終汝南太守李郃南鄭人通五經善天文和帝遣二使者觀風俗向益州宿候舍郃時為候吏因問曰君來時寧知二使何時發二人驚問郃指曰有二使星向益部故知之耳李固郃子狀貌有竒表好學負笈從師究覧墳籍陽嘉中公卿舉固對策鯁切順帝拜議郎冲帝拜大尉後為梁冀所害天下痛惜之李爕固子初固知不免禍遣爕歸鄉爕以姊文姬謀僑徐州界獲免尃精經學以赦還召為議郎後遷河南尹祝龜南鄭人劉焉為益州牧辟之後撰漢中耆舊傳晉王遜魏興人郡察孝亷累遷上洛太守私牛馬在郡生駒者悉以付官云是郡中所産張威梁州人時氐楊難敵攻梁州刺史胡子庠棄城去威起兵逐難敵以其地歸李蜀南北朝垣䕶之略陽垣道人少倜儻氣幹强果仕宋為殿中將軍累遷鍾離太守義宣反䕶之率水軍大破賊將封益陽縣侯拜青冀二州刺史尋徵為右衛將軍卒諡壯侯垣崇祖䕶之姪父詢之驍敢有力梁山之役力戰中流矢卒贈冀州刺史崇祖少有幹畧歴琅邪蘭陵太守齊高帝踐阼徙為豫州刺史魏攻壽春立堰塞肥水起小城謂長史曰虜必攻小城即破堰放水豈非小勞而大利耶魏軍果溺死數千退走後進為都督垣榮祖崇祖從兄父諒之仕宋為中郎府叅軍榮祖善騎射建中時為後軍叅軍後歸齊高帝除東海太守見翔鵠雲中曰當生取之乃彈其两翅毛脱墜地旡傷預佐命勲封將樂縣子遷兖州刺史垣閎榮祖從父父遵仕宋為員外常侍閎為員郎叅軍歴三州刺史封樂鄉縣男初齊高帝為子晃求閎女閎曰齊大非偶及即位以有誠心封爵如故子僖伯善射歴巴西梓潼太守閎弟閲為九真郡皆著信南中閲子昙深為羽林監雅有學行李遷哲安康人世為山南豪族遷哲慷慨善謀畫其父仕江左為衡州留遷哲本鄉監統部曲撫馭羣下甚得其情周文掠地山南遷哲軍敗乃降以其信著山南令與賀若敦同徃經畧遂平冦亂巴濮之人降欵相繼授侍中直州刺史隋李襲志安康人仕為安康丞蕭銑林士𢎞屢攻之不下聞煬帝喪與士民縞素三日固守二年力窮寡援為銑所䧟何妥西城人父細胡通商入蜀遂家郫縣妥少機警有才名仕終國子祭酒嘗言蘇威不可信任又上八事以諫威大衘之出為龍州刺史卒諡曰康唐李孝儒安康人高宗時封遂寧郡公辭歸飬親權倕秦州略陽人與席豫蘇源明以藝文相友官至羽林軍叅軍權臯倕子天寶中舉進士為臨清尉安祿山表置幕府臯度其必叛因獻俘京師偽稱病卒未幾祿山果叛𤣥宗擢拜監察御史後客洪州屢徵不就時仰其高節權德輿臯子少以文章稱德宗聞其才召為左補闕累遷禮部尚書同平章事德輿積思經術無不貫綜雖動止無外飾而醖藉風流自然可慕子璩舉進士歴官鄭州刺史崔覲城固人以儒自業躬耕自給老而無子乃以田財分給奴婢自與妻隠南山節度使鄭餘慶辟為叅謀號稱長者文宗時召為起居郎辭疾不至强循梁泉人累官雍州司户叅軍不尚威嚴教華原人通渠溉田一方賴之號强公渠宋楊冲遠興元人張浚試吏興元徃别鄉先生楊用中問興元士有可與遊者用中言楊冲逺可以為師雍冲洋州人太學生方紹聖中大臣變更元祐政事冲上書數其罪乞斬之有㫖移興元府自訟齋其後張浚試吏興元以冲為友焉張珏鳳州人從軍釣魚山以戰功累官中軍都統制人號虓將寶祐末元兵圍合州珏與王堅恊力戰守攻之九月不能下德祐初陞四川制置使糧盡元遣人説降不聽城破巷戰不支東走涪被執至安西自經死珏魁雄有謀善用兵出竒設伏算無遺策元李孟漢中人七歲能文通貫經史家居授徒薦辟皆不就嘗因事至京右丞楊吉薦留輔導仁宗累官至中書平章事翰林學士承㫖卒追封魏國公諡文忠孟字量閎廓材略過人三入中書知無不言士茍賢不進㧞不已子獻為御史中丞本朝呉偉南鄭人領鄉貢歴任四川茂州知州多善政羗人懷服累官四川左布政使梁春鳳縣人以通經舉用歴任有聲官至西淮鹽運使楊洪漢中人有機變累立邊功正統己巳之變京師賴洪以安進昌平侯王永壽南鄭人博學强記言行不茍鄉評推重典畿衡收薛應旂教成均得唐汝楫時稱知人云官至刑部司務列女杜泰姬南鄭人趙宣女生七男七女其教男曰中人性情可上下者若放而不檢則入惡也以故男元珪稚珪皆有望五人皆令德其戒諸女及婦曰吾之孕身在乎正順及其生也恩存於撫愛及其長也威儀以先後之恭敬以監臨之勤恪以勸之忠信以發之是以皆成而無不善文姬漢南鄭趙伯英妻太尉李固女父為梁冀所害姬嘆曰李氏滅矣乃與二兄議匿弟爕於父門生王成亡命徐州遇赦姬勅之曰先公為漢忠臣雖死之日猶生之年慎勿以一言加梁氏加梁氏則連主上是又掇禍也貞女河池人五代時為梁將所得義不汚辱梁將不敢犯及卒葬於縣北號貞女墓後漢王仁裕為撰墓碑仙釋唐公昉漢城固人王莽居攝二年公昉為郡吏忽遇真人授以藥拔宅仙去或云李八百居寒泉山公昉師事之張果唐人夏居豆積冬居鸑鷟𤣥宗聘之不至嘗賜號曰通𤣥先生抱一道士姓趙梁泉人嘗遇一老人篋中取物餌之狀如蘆菔又與之小瓢中有藥如菉豆戒曰遇有疾施之自是絶粒宋真宗東封召見賜名抱一明一統志卷三十四
