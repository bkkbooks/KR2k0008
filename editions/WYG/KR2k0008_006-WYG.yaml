江左旱歉命充昇宣等十州安撫使馬亮知昇州属嵗旱民饑湖湘漕米數十舟適至亮移文守將發以賑貧民因奏瀕江諸郡皆大歉願罷官糴令民轉粟以相賙後再知是州薛暎眞宗時知昇州建言州以牛賦民出租牛死租不得蠲朝廷從其奏因令諸州悉蠲之吕䝉正通判昇州有善譽薛顔知江寕府邏者晝刼人反執平人以吿顔視其色動曰若眞盗也械之果引㐲蘇頌仁宗時知江寕縣時承李氏後税賦無藝頌更定户籍剗剔夙蠧成賦一邑簡而易行諸令視以為法民有忿争者頌諭之徃徃謝去或半途思其言而止馮京知江寕府諸縣公事至即歴䆒之報下㨗疾一無壅滯吕溱知江寕府精識過人辨訟立㫁豪惡歛迹王琪知江寕府先是府多火災或以鬼神人不敢救琪召令廂邏具為作賞捕之法未幾得姦人誅之火患遂息李若谷知江寕府卒挽舟過境寒瘠甚者留養視之須春温遣去民匄於道者以分𨽻僧寺助給舂㸑丘濬景祐中知句容縣嘗讀易悟損益二卦自此能通數知末來興廢李宥知江寕府民有吿人殺其子者曰吾子去家時巾若巾今巾是矣民自誣服宥疑召問卒伸其枉張方平慶厯中知江寕府治有政績先是方平在兩制有道人李仕寕以詩别云異時復與公相見正是江南二月天及知江寕李自矛山來謁適仲春也張奎知江寕府先是李宥知府府􅅟盡焚諌官言宜擇臣繕治之乃以命奎奎簡材料工一循舊志不踰時復完風力精强甚有治跡包拯知江寕府令行禁止凡訴訟者使得至前陳曲直吏不敢欺王隨知江寕府嵗大饑轉運使移府發常平倉計口日給一升隨曰民所以饑者由兼并閉糴以邀高價也乃大出官粟平其價民賴以濟梅摯知上元縣後又知江寕府摯性淳不為矯厲之行政績如其為人朱定國神宗時知六合縣時議開馬昌河通滁州者定國以為不可使者以其首沮所論數移他局以困之定國即致仕歸程顥主上元簿有善政茅山池有小龍得之者奉以為神顥捕而脯之使人不惑始至邑見人持竿以黏飛鳥取竿折之自是鄉民不敢蓄禽鳥又嘗均田塞隄及民之政為多豐稷六合主簿至永定寺有聯句云青林野寺外緑酒小亭中初月天開白浮雲日借紅呉中復知江寕府郵兵苦廵轄官苛刻縶而鞭之獄具法不至死中復以便宜戮首惡流其餘人奏為令王安石知江寕府數月召為翰林學士後以使相判江寕遂居金陵王安禮知江寕府事至立㫁下不敢欺元絳江寕推官攝上元令民有豪占人田者捕寘於法甲與乙被酒相敺甲歸卧夜為盗㫁足妻吿乙執乙至而甲已死絳勅妻曰歸𦵏而夫隂使人迹其後望一僧迎笑私語絳取僧縶之詰妻得姦狀鄭驤元符中知溧陽縣嵗饑民多逃亡漕司按籍督逋賦驤患之盡去其籍使者欲繩以法驤曰著令約二税為定數今不除則逋愈多民愈貧賦愈不辦使者不能屈陸佃知江寕府句容人盗嫂害其兄别誣三人同謀既皆訊服一囚父以寃訴通判以下皆曰獄已成不可變佃為閲實三人皆得生蔣静知江寕府茅山道士劉混康以技進賜號先生其徒倚為姦利詞訟至府吏觀望不敢治静悉抵於法楊邦乂建炎中建康通判金人䧟建康守臣率官属迎拜邦乂不從大書其衣曰寕為趙氏鬼不為他邦臣遂死之吕頥浩建炎中知江寕府苗傅劉正彦為逆逼高宗避位頥浩約諸將討平之後又為江東安撫制置大使兼知建康府權邦彥建炎中知建康府劇盗張琪殘徽州邦彦遣禆將平之政以治辦見稱葉夢得紹興初江東制置大使兼知建康府奏防江措置八事金人入冦至柘臯夢得團結沿江民兵數萬分據江津金兵引去趙鼎紹興中江東安撫大使知建康府高宗嘗謂王庶曰鼎鎮撫建康囘鑾無患他人所不及也張浚紹興末判建康府時金兵猶屯和州浚請高宗亟臨幸建康浚迎拜道左衛士見浚皆以手加額浚風采隐然軍民皆倚以為重虞允文紹興末金主亮南侵朝命樞臣葉義問督江淮軍至建康允文㕘謀軍事招諸將勉以忠義遂擊敗金人葉義問紹興中知江寕縣召秦檜所親役同僚不可義問曰釋是則何以服他人卒役之葛邲上元縣丞金人犯江上元調度百出邲不擾而辦留守張浚王綸皆器重之范成大以端明殿大學士帥金陵㑹嵗旱奏移軍儲米二十萬賑饑民减租米五萬水賊徐五竊發號静江大將軍捕而戮之劉頴紹興末溧陽主簿時張浚留守建康金兵初退府索民租未入者頴白浚言宜先撫摩當盡蠲逋賦浚喜即奏閣免李光紹興間為江東安撫大使知建康府兼宣撫使時太平州卒陸徳囚守臣據城叛光多設方畧盡擒其黨王拱建康府前軍統制從都統邵宏淵収復宿州屢立竒功隆興初與金接戰力戰而死梁克家知建康府在鎮有政績陳俊卿知建康府後十五年命判建康兼江東安撫父老喜其再來為政寛簡罷無名之賦尋除少保判府如故李衡知溧陽縣專以誠意化民民莫不敬夏秋二税以期日榜縣門鄉無吏迹而輸送先他邑辦任歴四年獄户未嘗繫一重囚金人犯淮堧盗蝟起旁境而溧陽靖晏自如葉適知建康府兼沿江制置使金兵大入適募悍少得二百人使將統之夜過江北遇金人蔽茅葦中射之應弦而倒金人皆錯愕不敢進洪遵知建康府兼行宫留守孝宗諭當制舍人范成大褒其治績且許入覲張燾知建康府兼行宫留守金陵積嵗負内庫錢帛鉅萬悉為奏免惠政甚多李稙知建康軍府兼本路安撫使上書極言防江十策皆直指事宜不浮泛孝宗嘉其言朱熹淳熈間為江東轉運張枃知建康府遇事不凝滯多隨宜變通以治稱黃度知建康府兼江淮制置使罷科糴輸送之擾活饑民百萬口除見税二十餘萬擊降盗卞整招歸業者九萬家徐誼知建康府兼江淮制置使時金人攻廬楚不下淮人流江南在建康者以數十萬計誼晝夜拊循益嚴備禦劉珙建康留守值嵗大旱奏蠲租税借發常平米闔境無一人捐瘠者及卒民立祠祀之馬光祖再知建康為政寛猛適冝存大體興學校禮賢才寛飬民力修廢起壊知無不為始終如一紀威惠並行民明愛之如父母敬之如神陸子遹嘉定間知溧陽縣事縣境肅然呉淵江東安撫使兼知建康府興利除害究心軍民列上二十五事詔嘉之危和開禧初為上元主簿大闢祠宇以祀程顥真徳秀為記之史彌鞏嘉定中知漂水縣首嚴庠序之教楊大異通判溧陽攝州事皆有恵政去官之日老弱攀號留之大異易服潛去眞徳秀江東轉運副使時建康旱蝗民饑徳秀發義倉及轉般倉米以賑贍不足則出官錢及私財糴米頼以全活者數十萬人劉宰紹熈中為江寜尉時巫風為盛宰下令保伍互相糾察徃徃改業為農嵗旱賑荒多所全活去官惟篋藏主簿趙師秀酬唱詩而已陳韡知建康府兼行宫留守嘗入奏事理宗稱其平冦功韡頓首言曰仗陛下威靈何功之有姚希得沿江制置使知建康府按行江上慰勞士卒衆皆懽悦溧陽饑發廩勸分全活者衆董槐江東安撫使兼知建康府時軍政㢮弗治乃為賞三等以教射及教坐作進退擊刺之技嵗餘盡為精兵趙善湘知建康府紹定初剏防江軍寕淮軍及平叛冦皆有功遷江淮安撫制置使呉從龍建康綂制紹定兵難被擒使至泰州城下誘䧏終不屈死之詔廟祀揚泰二州趙淮江東轉運判官李全之叛屢立戰功元董士選江南行御史臺中丞亷威素著不嚴而肅凛然有大臣風岳存中統間建康路總管首定救荒之政民立碑以紀遺愛牟應龍溧陽州教授學有淵源於諸經皆有成説以文章大家稱於東南晚以上元主簿致仕髙睿皇慶中為南臺御史中丞務持大體有儒者之風福壽江南行臺御史大夫本朝兵圍集慶福壽督兵出戰城破百司皆奔潰或勸之去福夀曰吾為國家重臣城存則生城破則死尚安徃哉遂遇害治書侍御史賀方逹嚕噶齊塔納逹實亦死之本朝王公亮洪武中應天府治中尋陞府丞宅心公正勤政恤民周是修洪武中周府紀善靖難師至具衣冠詣應天府學拜宣聖像畢自為贊繫衣帶上自縊於尊經閣下南畿志顧佐永樂中應天府尹剛正不撓吏民畏服雖勲豪貴戚為之歛手政聲赫赫議者謂有𩔖於宋包拯之知開封府鄺埜宣徳中應天府尹在政清慎克勤為政精宻宿弊為之一空吏不敢欺而民被其澤鄔璚宣徳中溧陽縣丞在任鋤强扶弱去蠧除弊賦役為之均平𨽻胥不得勾攝於是良善獲安秩滿數千人詣闕保留特陞知縣行事愈勵於前未幾卒於官百姓思慕不㤀周忱宣徳中廵撫南畿均賦税雖恤民隐而國計無損江南之民實頼之南畿志呉雄應天府尹時留臺權䜿横行縣官無所潛避雄一惟憲章以身當之屢抗挫其勢因漸屏息民實賴之南畿志王恕正統末廵撫江南興利去害賍汚吏聞風解綬聲望赫著南畿志張昇正統初以御史知句容縣百廢畢舉而民不勞南畿志王安定由進士第任上元縣知縣得慈祥愷悌之體民至今思之南畿志熊達景泰間由進士知溧陽縣深察民隐崇正黜邪時稱廉吏南畿志羅信景泰間江浦知縣始終誠民心甚孚南畿志一胡謐天順初由進士知江寕縣政務之餘教授生徒擢督學副使南畿志陳選天順末以御史督學南畿首黜浮薄令士子從根夲立學不尚華藻士習一變南畿志彭烈天順間由御史出知江浦廉介端詳政通民和南畿志戴珊天順間督學南畿惟公而恕士服其心南畿志燕壽成化間溧水知縣吏畏民懐以憂去民甚思之南畿志陳琳成化中拜御史督學南畿當嚴霜酷烈之餘而被之以和風甘雨士心感激久而不能㤀南畿志于鳳𢎞治間任高淳學教諭時縣初建廟學未備鳳百凢創制器皆出俸資且誨諭諸生以立新法甚得師道南畿志流寓史崇東漢杜陵人建武中累官青冀二州刺史封溧陽縣侯天下既平詔遣公侯皆就封崇治尚寛簡不威而化卒諡壯侯子孫因家溧陽雷次宗豫章人明三禮毛詩宋元嘉中徵至都開館雞籠山聚徒教授久之還廬山又徵至為築室鍾山西岩下謂之招隐館馬樞扶風人博極經史梁邵郡王鎮南徐州引為學士侯景之亂隐於茅山陳文帝徵為度支尚書辭不應命樞少属離亂凡所居處盗賊不入依託者數百家目睛洞黄能視暗中物有白燕一雙巢其庭樹甚馴狎春來秋去幾三十年劉紆梁人與阮孝緒劉歆為三隐卜築鍾山有終焉之志甞著穀皮冠披衲衣逰山澤風神頴俊意氣彌逺遇者以為神人王端朝宋澶淵人過江愛溧陽風土因家焉少以該洽聞年未弱冠建康鄉舉第一及入太學又為第一再中博學宏詞科歴太學録秘書省正字終知永州劉岑宋呉興人遷居溧陽博學愛士有古君子風登進士第累官户部侍郎以徽猷閣待制致仕李處全宋徐州人遷居溧陽文章閎肆詩體兼衆長字畫遒麗登第由宗正寺簿遷太常丞崔敦禮宋通州静海人與弟敦詩同登紹興中進士愛溧陽山水買田築居敦禮仕至諸王宫大小學教授敦詩仕至中書舍人加侍講直學士院潘彚征寓居溧陽記問博洽宗濂洛諸儒之學宋嘉定間登第廷對剴切宰崑山有能名蔡槐饒州徳興人僑居建康嗜讀書卓犖不覊工相術元至元中召至京詔間休咎多驗授集賢學士辭不拜歸隐鍾山周瑄夲山西陽曲人官尚書卒𦵏江陵黄門山子經亦累官尚書仍居陽曲布政紘以下諸子皆居江寕童軒其先鄱陽人以欽天監家應天登景泰辛未進士官至禮部尚書卒贈少師賜𦵏祭陳鎬其先紹興人以欽天監家南京少與弟欽有文名成化丙午同舉應天鄉貢鎬第一明年同舉進士鎬山東督學副使欽廣東督學使欽先卒鎬官至副都御史廵撫湖廣卒於官蔣達夲江都人以戎籍家南京登進士拜南䑓御史值宸濠叛出軍江上盛暑遇勞以疾卒事聞贈光禄少卿賜諭祭王鑾呉江人以戍籍家南京正徳辛未進士授吏部主事至郎中以諫武皇南廵廷杖至傷踰年而卒何遵呉江人以欽天監家南京正徳甲戌進士授工部主事諫武皇南廵杖死嘉靖初贈光禄少卿廕一人國子生人物漢史茅溧陽人漢溧陽侯崇之孫也元初三年襲爵除尚書遷侍中轉鎮西將軍雍州牧宰治得宜寛猛相濟時人徳之子洽洽子澤澤子鉉世襲侯封皆有名三國史嵩崇裔孫仕呉為平越中郎將蒼梧鬰林太守封撫陵侯族人懿亦仕為征南將軍隴西太守韶為交州属國都尉封陽羡侯唐因句容人修身謹行博通儒術註國語公羊穀梁傳呉黄武間為尚書僕射陶璜呉丹陽秣陵人父基為交州刺史璜亦刺交州周窮好施能得人心晋史光崇裔孫仕為中書侍郎遷侍中子雅陳留太守又有曰爽者累官至五兵尚書王曰憲者累官建安太守封山隂縣侯曰諒者為琅邪府主簿以討蘇峻功封常安侯皆崇裔也陶囘丹陽人父抗呉太子中庶子囘有器幹王導引為司馬蘇峻反王師敗績囘収合義軍與陶侃温嶠并力攻峻以功累遷呉興太守開倉賑饑一郡獲全卒諡曰威四子汪陋隐無忌威有幹用葛洪句容人𤣥之從孫家貧好學䆒覧典籍凡所著撰精覈富贍呉興太守顧秘檄洪為將兵都尉以功遷伏波将軍元帝辟為丞相掾以平賊功賜爵關内侯咸和初選為散騎常侍不就後入羅浮山優游閒養著述不輟紀瞻丹陽秣陵人少以直方知名後舉秀才太安中拜尚書郎與顧榮同赴洛後拜侍中轉尚書右僕射瞻好讀書或手自抄寫才兼文武忠亮雅正明帝稱為社稷臣薛兼丹陽人清素有器宇少與紀瞻閔鴻顧榮賀循齊名號為五雋初入洛張華見而竒之曰皆南金也後領太子少傅自祖綜至兼三世𫝊東宫談者美之許謐句容人少以博學知名仕為郡主薄王導蔡謨辟從事不赴後官至散騎常侍紀少瑜丹陽秣陵人早孤有志節年十三能属文甞夣得青鏤筆管其文因此遒勁王僧孺見而賞之許邁丹陽句容人恬静不慕仕進立精舍於餘抗懸霤山朔望時節還家定省父母而已及父母既終遂通逰名山時南海太守鮑靚隐迹人莫之知邁徃候探其至要後入臨安西山王羲之造之輒彌日􅁯歸相與為世外交南北朝陶季直秣陵人祖愍祖劉宋廣州刺史父景仁中散大夫季直好學淡於榮利仕齊為尚書比部郎累遷給事黄門侍郎素清苦及死家徒四壁子孫無以殯殮所作有京都記劉係宗建康人少精書畫為宋竟陵王誕子景粹侍書元徽初以功封南亭侯周顒建康人其先汝南人也顒於鍾山西立隐舍清貧寡慾終日長蔬後應詔出仕將過北山孔稚圭乃作北山移文以却之後累官國子博士兼著作所著有四聲切韵陶𢎞景秣陵人讀書萬卷齊高帝引為諸王侍讀永明中掛冠神武門去居句曲山立館自號華陽隐居梁武帝早與之逰即位徵之不出有大事無不咨詢時人謂之山中宰相周捨顒子博學精義理齊時弱冠舉秀才除太學博士梁初召拜尚書祠部郎禮儀損益多自捨出累遷吏部郎預機宻二十餘年帝以為有公輔器後與徐勉同㕘國政俱稱賢相張松建康人兄坐罪松與弟各請代其死縣以獻上梁武帝以其孝義特免之淳于量建業人偉姿容有幹畧便弓馬事梁元帝以軍功封廣晋縣男出為都督桂州刺史呉明徹秦郡人陳宣帝時議北征明徹决䇿請行大破齊師於吕梁及秦州𤓰歩等城相繼來降宣帝以秦郡明徹鄉里具太牢令拜祠塜上文武羽儀甚盛鄉人榮之唐張常洧句容人父没廬墓三年墓側産瑞芝十二莖太守表奏旌其門許叔牙句容人邃於詩禮貞觀間遷晋王府㕘軍拜𢎞文館學士獻詩纂義十篇太子寫付司經高智周見之曰欲明詩者宜先讀此許儒叔牙子高宗時為奉常博士初長孫無忌等議祠令及禮用鄭𤣥六天説後罷六天説止祀昊天乾封初詔祀感帝神州以正月祀北郊儒等議請循武徳詔書遂祭昊天上帝及五天帝於明堂史務滋溧陽人累官司賔卿天授初進拜納言武后詔務滋等十人分廵天下後與來俊臣雜治反獄為俊臣所誣自殺劉鄴句容人父三復為浙西觀察使李徳裕掌書記鄴六七歳能属文徳裕嘉之使與子共學後為翰林學士傷徳裕以朋黨抱誣死上疏伸其寃復官爵世高其義五代朱存金陵人讀書具詳六朝興亡成敗之迹仕南唐作覧古詩二百章四句前誌多引為證陸昭符秣陵人開寳間問罪江南後主求緩師以昭符為進奏使以其善計度累加任使嘗為常州刺史有善政一日到郡㕔忽雷電繞庭官吏震懾昭符叱之雷電頓止及舉案幃得大鐵索重數百斤人尤駭之而昭符神色自若命収索付官庫以示後人宋陳承昭金陵人初仕南唐為保義軍節度宋太祖在周時從世宗征淮南與戰擒歸授右領軍衛上將軍後太祖以其習知水利命督治惠民等河及從征太原以功遷右龍虎衛將軍卒贈太子太師盧郢金陵人好學有才藝膂力過人善吹鐵笛江南後主時試賦擢第一嘗代徐鉉為文命筆於吏口授而書之鉉以文進後主白語勢似非卿作鉉以實對郢由是知名後歸宋累官南全守多著治績秦羲江寕人祖父皆仕南唐羲歸宋補殿直督廣濟漕太宗時提點淮南茶鹽歴知數州羲知書好為詩喜賔客頗有士風歴貨財之任凡十餘年精勤練習號為稱職刁衎昇州人父彦能仕南唐為昭武軍節度以為秘書郎從李煜歸宋授太常太祝出知恫廬縣應詔言事上諫刑書累遷殿中丞歴知婺光廬湖州衎在南唐家富服飲極侈靡歸宋以純淡夷雅知名子湛湜渭及湛子繹約俱登進士洪湛昇州上元人曾祖勲南唐崇文館直學士祖壽父慶元皆縣令湛㓜好學五嵗能詩宋舉進士通判夀許州知容郴舒州眞宗時凢五使西北議邉要有文集十卷子鼎中進士官至度支貟外郎直史館盧鑑金陵人受三班奉職監坊州税歴鳳翔秦隴階成等州都廵檢使善于料敵平蕃族屢有功後知慶環丹秦等州遷西上閤門使秦傳序江寕人淳化中充䕫峽廵檢使賊攻夔州傳序督士卒晝夜拒戰久之度刀不支乃為蠟書遣人上報赴火死子奭泝峽求父屍溺死人以為父死於忠子死於孝奏至太宗惻然録傳序子煦為殿直李琮江寕人慶歴間登第調寕國軍推官累遷户部侍郎歴知湘洪杭瀛等州長於吏治與蘓軾黄庭堅逰有詩集卒贈太師子囘登元祐進士紹興初為㕘知政事囘弟耕能詩慕陶淵明去官不仕號臺山居士秦憙溧陽人為人長者嵗収萬斛租鄉民輸粟令自行㮣當熈寕元豐間頻嵗饑饉作粥以飼全者甚衆仇著棠邑人仕至朝散大夫知梓州子博年十三作至樂堂記蘇軾見其文竒之呉思道金陵人以詩為蘇軾劉安世諸人鑒賞官至團練使宣和末致仕後寓新安野服蕭然如雲水人其高逸如此李華溧陽人父没居喪毁瘠盡哀母疾華衣不解帯者十餘年有田十餘頃穀貴平價十其一方大觀政和間蝗數害稼不食其田子朝正累官知平江府俞㮚溧水人崇寕中以上舍賜進士第僉書至南京判官擢秘書正字出知襄州後拜御史中丞陳士風六弊累遷翰林學士兵部尚書後以述古殿學士知江寜府范同建康人政和中進士再中鴻詞科為吏部員外郎紹興中累官翰林學士拜參知政事兼修實録王綸建康人㓜頴悟十嵗能属文紹興初進士授崑山主薄累官同知樞宻院事以資政殿大學士知建康府綸甞建言孔門弟子及後世諸儒有功斯文者皆得從祀先聖卒諡章敏魏良臣溧水人高宗嘗稱其可属大事後累官參知政事良臣每語及天下事奮髯抵掌以為已任朱舜庸建康人好古博雅嘗編金陵遺事積二十年自里巷口傳仙佛之書無不研綜慶元中留守呉琚為之銓次目曰續建康志呉柔勝溧水人舉進士歴官有惠政卒贈少師諡正肅子淵官至參知政事潛舉進士第一官至右丞相為賈似道所排貶循州不食而卒錢戬溧陽人居父憂有少年數人來曰而父逋我金數百萬錢戩與之不吝夜有盗入戬知之呼與一白金使速去終不語人後其子至顯官人以為隂徳之證錢周材溧陽人質重氣和退似不能言七嵗能属文郷試第一登進士第由大理司直累官刑部侍郎終龍圖直學士秦鉅江寕人檜曽孫通判蘄州金人犯郡與郡守李誠之協力捍禦城破以自隨兵巷戰死傷畧盡歸署呼吏火諸倉庫乃自焚死次子浚先徃四祖山兵至亟還與弟澤從父偕死詔贈鉅五官封義烈侯立廟蘄州元樊淵句容人好學善詩至元中奉母避兵茅山兵至欲殺其母淵求以身代兵兩釋之母没哀慕終身䑓憲交薦淵不忍去墳墓終不起皇慶中旌其門楊剛中上元人自㓜勵志操任為江東憲府照磨風采凛然其為文竒奥簡澁動法古人元明善極嘆異之累官翰林待制所著有霜月集李桓上元人剛中甥以鄉舉累官江浙儒學副提舉亦以文鳴江東其文紆餘豐潤學者多傳之夲朝孫炎句容人長身跛一足博學善辨論長於歌詩夲朝初建請延攬英才以圖大業從征浙東以功授處州總制措置有方境内皆服後為賊所執脅使降炎大罵不屈賊怒㧞刀叱解衣炎曰此紫綺裘君所賜者我當服之以死賊遂害之追封丹陽男陳遇江寕人博究經史仕元為温州路學教授元末棄官歸家夲朝初以薦召見與語大悦命為翰林學士中書左丞禮部尚書皆不受然國家事多所獻替非正道不陳眷待雖甚厚而静淡恬退始終一志卒賜𦵏鍾山子恭官至工部尚書偰斯溧陽人呉元年以故官子徴起授尚寳司官嘗兩使高麗國出知河間府累官户禮二部尚書齊泰溧水人仕至兵部尚書靖難師壓境泰被執抗以大義而死南畿志楊勉江陵人風姿俊偉有應變才永樂初登進士第改庶吉士擢刑部主事有能聲累遷刑部侍郎丁璿江寕人立心平易行已安詳永樂初登進士第改庶吉士擢工部主事宣徳中為監察御史歴陞都察院右副都御史劉璉江寕人永樂中進士拜監察御史尋陞山東布政司參議督理宣府邊儲茂著勤能官至户部左侍郎戴慶祖溧陽人讀書史諳禮文洪熈初擢太常贊禮郎累官少卿與修太常儀註正統中没於王事贈太常卿王一居上元人讀書樂善擢太常贊禮郎宣徳初有事南郊朝廷嘉其禮度詳雅歴遷少卿正統中没於王事贈太常􅀸楊能六合人正統中屢立邊功後陞都督鎮守宣府勦殺有功進封武強伯倪謙上元人登正統己未進士及第授翰林院編脩使朝鮮舉國禮辨夷俗海外震懾景泰間入直承顧問又侍講春宫多所啓沃官至南京禮部尚書卒贈太子少保諡文僖南畿志張瑄江浦人正統中進士累官至南京刑部尚書賦性仁厚每讞獄惴惴恐入人罪鄉里有犯惟正其罪而不加扑年七十一致仕南畿志金紳上元人父潤由郷貢起家仕至南安知府為當時所重紳登景泰甲戌進士累官刑部侍郎性狷介嚴毅門無雜賔嘗廵視江西災旱力罷征裁冗減獄境賴以寕子麒夀文學孝友舉進士未仕而卒南畿志盧雍江寕人天順丁丑進士自武庫主事累官湖廣左布政使皆有政績居父䘮廬於墓側三年有産芝之異詔以孝旌其門南畿志倪岳謙子舉進士改庶吉士授編修後為禮部尚書改南京復召為吏部尚書嘗議祧禮以徳祖為始祖又甞議罷加税江南皆得大臣體卒贈少保諡文毅弟阜亦舉進士官至布政畿南志李旻景泰丙子鄉貢拜監察御史擢雲南按察僉事尚氣節名檢居官猶寒士家無餘貲為當時推重南畿志凌傅句容人舉鄉貢以文名授象山知縣興學愛民嘗築隄障水民得粒食卒於官民哀慟如䘮考妣立祠祀之南畿志莊㫤江浦人成化丙戌進士改庶吉士任翰林檢討諫沮鰲山出謫州判尋召還授南京行人司副以内艱歸遂乞休築室定山以道自任與白沙陳獻章友善海内髙其名數被薦出為南京吏部郎中病甚遂致仕去南畿志呉文度江寕人登成化中進士仕至南京户部尚書居第不増廣不治產待諸侄無異已出與故舊處猶布衣居官常求情於法中志南畿張琮江寕人益從孫𢎞治初進士為禮部儀制郎中晋藩有奪王封者時劉瑾受賂琮執不可大忤其意出知濟寕瑾誅擢按察副使累官南京都察院右都御史門可設雀羅乞致仕嵗繼夫廩卒賜𦵏祭南畿志丁沂溧水人𢎞治中進士授南京刑部主事歴郎中門無私謁獄無怨辭擢湖廣按察僉事董造榮府民賴以不擾賑湖襄饑全活甚多進浙副使嘗治水田賦獲利累陞都御史所在吏畏民懐南畿志黄宏六合人𢎞治進士累官江西㕘議時濠不軌殺都御史孫燧及副使許逵以脅迫諸司宏不服以手械向柱蹙項而死濠誅贈宏太常少卿祀於忠烈祠南畿志梁材金吾衛人登𢎞治丙辰進士累官户部尚書所在有聲稱外紀景𤾉上元人正徳初進士及第投翰林編脩轉國子司業以母老請便養改南春坊中允未五十而卒賜心甚光明言行相符精於書為文典雅惜其不竟所施云南畿志列女史氏女溧陽人楚伍子胥奔呉至溧陽見女子撃漂瀨水上子胥乞食女以簞食壺漿與之子胥食訖曰掩子壺漿勿令其露女曰行矣子胥既行還顧女已自沉水中唐李白有貞義女碑尤氏元溧水人曹子英妻年少夫死尤氏嚙指滴血誓不更嫁有司以聞旌表之王氏建康人闞文興妻名醜醜文興從軍漳州為萬户府知事王氏與俱行元至元中陳弔眼作亂文興戰死王氏被掠不受辱紿賊曰俟𦵏夫即從汝遂得積薪焚屍即自投火死至順初贈文興侯爵王氏曰貞烈夫人有司為立廟號雙節云袁氏女元溧水人年十五其母嚴氏孀居極貧病癱瘓卧於床女事母極孝至正中兵火延其里隣婦强携女出避火女泣曰我何忍舍母去乎遂入室抱母共焚而死花山節婦高淳人失其姓氏至元間為兵所逼至崇賢鄉碑亭橋嚙指濡血題詩亭上云遥望花山何處是遂自縊鄉人哀之因名南畿志呉復妻楊氏金陵民家女也復爵安陸侯守黔陽以疾亡楊氏自縊以殉太祖親降手勑封貞烈夫人南畿志石氏句容人朱約妻石歸約甫一嵗約病奉侍湯藥三年不懈約卒守節終其身洪武間旌表南畿志劉彥陽妻女高淳人授平江倉官卒於任兵亂妻孫氏與一子二女守孤櫬城䧟子死於兵孫不從遇害賊脅二女行二女紿賊為埋父母至江濱皆赴水死洪武中旌表南畿志陳忠妻王氏江東人忠為都指揮守交阯王随之㑹黎王叛忠陣亡王與二女登竹篾出交阯東海城進海門潛賂賊徒収忠屍殮之扶柩浮海南歸以𦵏後毁容績紡度朝夕卒與忠歸土焉郷人謂其夫妻忠節兩不愧云南畿志倪氏江寕人十六適張豫豫卒倪年二十六撫二孤益晋稍長遣就學舅姑夀終力䘮事膏沐不施者五十年後益舉進士累官學士贈倪孺人宣徳間詔旌表南畿志魏氏上元人伊端妻年二十一歳守節大學士劉定之為作永貞堂記正統間詔加旌表南畿志鄭瓘妻袁氏六合人年十八受鄭聘而瓘得竒疾不能治袁吿於父母歸鄭侍夫疾二年不懈及殁求自盡家人救之得不死曰我一寡婦耳留此何為聞者感泣太宰蕭山魏驥為作鄭節婦傳南畿志趙和妻孫氏和為府軍千户永樂六年征安南卒於軍孫年二十四守節育孤後子輝為駙馬都尉天順間守臣以聞旌表其門南畿志凌氏女高淳人父許聘里人王純侄早卒純慕其色謀為妾父欲許之女覺即自縊死救之得免誓不適人年六十卒成化間旌表南畿志倪夫人盧氏江寕人布政盧雍女年十八歸倪文毅公岳當文毅編修時與盧歸省文僖家値囘禄文僖不樂盧盡出奩貲搆屋材建大楹以舒其憂生子不育為文毅置妾畧無妬忌能詩復能圖染甚精妙早卒文毅自誌其墓後追贈夫人南畿志任忱妻焦氏江隂衛人忱領應天己夘鄉薦病卒焦時年未三十守節終身𢎞治間事聞旌表南畿志俞氏江浦人呉達妻年二十二守節有求配者叱罵之輒以刀自盡家人覺而止之正徳間旌表志南畿江氏六合人馬鑑妻鑑亡躬紡績以事姑教子年八十餘卒嘉靖間旌表南畿志仙釋三茅君茅濛𤣥孫長曰盈恬心𤣥漢遇王君得道漢初元中入句曲山為太元眞君弟固武威太守𠂻上郡太守聞兄盈得仙皆棄官訪從學道俱成地仙固為定籙眞君衷為保命仙君葛仙公名𤣥丹陽句容人有仙術嘗從呉主至溧州遇大風百官船沉𤣥獨出水上而衣履不濕呉王重之於方山為立觀後傳白日昇舉從孫洪亦好神仙導養之術得其祖法晋元帝時求為勾漏令曰非欲為榮以有丹耳乃止於羅浮山煉丹著内外篇百餘篇號抱朴子後尸解王知逺系夲琅琊父曇選陳楊州刺史母晝夢鳳集其身因有娠浮屠寳誌謂曇選生子當為世方士知逺警敏通書傳事陶𢎞景傳其術為道士後主聞其名召入甚見咨挹隋煬帝亦執弟子禮又嘗識唐太宗於㣲時詔即茅山為觀居之忽謂弟子曰吾今署少室仙伯將行即沐浴衣冠若寢而卒或言其夀葢百二十六嵗云寶誌俗姓朱徃來都邑已五十六年宋齊之交稍顯靈跡飲㗖同於凢俗以鋼鐃剪刀鑷掛杖頭預言未兆齊武帝忿其惑衆収付獄旦日咸見逰行市里既而檢校猶在獄中武帝乃迎入華林園其他靈異甚衆梁天監中無疾而終𦵏鍾山獨龍之阜元天歴間累加號道林真覺慧威慈應普濟禪師杯渡不知姓氏常乗木杯渡水徃來京師神異不可備記宋元嘉三年入東行至赤山死還𦵏覆舟山融禪師俗姓韋本潤州延陵大族從茅山呉法師落髪出家入牛頭山石室脩道有靈異唐貞觀中傳四祖法建寺為一代祖師其寺與山遂號祖堂云明一統志卷六
