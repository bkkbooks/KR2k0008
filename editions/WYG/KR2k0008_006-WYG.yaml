body:
  text: 明一統志卷六明李賢等撰南京古金陵之地自周末時已有王氣秦始皇謂東南有天子氣諸葛亮謂龍蟠虎踞眞帝王都即此地也呉晋宋齊梁陳及南唐雖嘗於此建都然無功徳以當之僅保一隅不能混一天下至我太祖高皇帝功徳隆盛奄有四海乃定鼎於此為京師始足以當形勢之勝永樂中於北平肇建北京正統中以北京為京師遂以此為南京實根夲重地云城池京城舊志六朝舊城近覆舟山去秦淮五里至楊呉時改築跨秦淮南北周廻二十五里本朝益拓而東盡鍾山之麓周廻九十六里立門十三南曰正陽南之西曰通濟又西曰聚寳西南曰三山曰石城北曰太平北之西曰神䇿曰金川曰鍾阜東曰朝陽西曰清凉西之北曰定淮曰儀鳳後塞鍾阜儀鳳二門其外城則因山控江周廻一百八十里别為十六門曰麒麟曰仙鶴曰姚坊曰高橋曰滄波曰䨇橋曰夾江曰上方曰鳳臺曰大馴象曰大安徳曰小安徳曰江東曰佛寧曰上元曰觀音皇城在京城内之東當鍾山之陽以乗王氣殿宇宫闕規模宏壯象法天地經緯隂陽誠足以表四海之觀瞻垂萬年之統緒而為聖子神孫世守之基云舊内城在京城中元為南臺地夲朝既取建康首宫於此比皇城大内宫殿成此稱為舊内云壇廟天地壇在正陽門外之左繚以周垣中為大祀殿殿前丹墀東西列四壇以祀日月星辰前為大祀門門外東西列二十壇以祀嶽鎮海瀆山川太嵗風雲雷雨歴代帝王天下神祗東壇末為具服殿西南百歩為齊宫又西為神樂觀犧牲所其外復繚以崇垣蓋欲致其嚴潔云山川壇在天地壇之西繚以周垣中為殿宇以祀太歳風雲雷雨嶽鎮海瀆鍾山之神東西二廡以祀山川日將城隍之神左為旗纛廟西南為先農壇下皆籍田社稷壇在皇城内南之右四面為門壇垣按五方色南有前門北有行禮殿具服殿祭江壇在金川門外江上洪武初建凡行幸出師及親王之國之類俱於此祭江神太廟在皇城内南之左正殿兩廊楹室崇深昭穆禮制法古從宜功臣配享左有神宫監文廟在國子監彛倫堂之東正為大成殿東西兩廡前有㦸門外為櫺星門有勅建之碑山陵孝陵在外城内鍾山之陽懿文陵附於其側苑囿漆園桐園㯶園以上三園俱在鍾山之陽洪武初以造海運及防倭戰船所用油漆㯶䌫悉出於民為費甚重乃立三園植㯶漆桐樹各千萬株以備用而省民供焉文職公署南京宗人府在長安左門南經歴司附焉南京吏部在宗人府南其属文選驗封稽勳考功四清吏司并司務㕔附焉南京户部在吏部南其属浙江福建江西湖廣四川山東山西廣東廣西河南陕西雲南貴州十三清吏司并照磨所司務㕔附焉南京禮部在户部南其属儀制祠祭主客精膳四清吏司并司務㕔附焉南京兵部在禮部南其属武選車駕職方武庫四清吏司并司務㕔附焉南京工部在兵部南其属營繕都水屯田虞衡四清吏司并司務㕔附焉南京刑部在太平門外貫城坊其属浙江福建江西湖廣四川山東山西廣東廣西河南陜西雲南貴州十三清吏司并照磨所司務㕔附焉南京都察院在刑部西内有浙江福建江西湖廣四川山東山西廣東廣西河南陕西雲南貴州十三道并經歴司照磨所司務㕔附焉南京翰林院在宗人府後南京國子監在京城内鷄鳴山下即劉宋𤣥學故基夲朝洪武十年拓地建國子監中為彛倫堂左右繩愆博士二㕔後重列率性脩道誠心正義崇志廣業六堂典簿㕔附焉南京太常寺在後府南典簿㕔附焉外有神樂觀犧牲所各祠祭署亦𨽻之南京通政使司在中府後經歴司附焉南京大理寺在刑部東其属左寺右寺并司務㕔附焉南京詹事府在翰林院南主簿㕔附焉南京光禄寺在皇城東安門内其属大官珍羞良醖掌醢四署并典簿㕔附焉南京鴻臚寺在長安右門外街南其属司賔司儀二署并主簿㕔附焉南京欽天監在後府後主簿㕔附焉外設司天臺於鷄鳴山上南京大醫院在詹事府南生藥庫附焉外有惠民藥局亦𨽻之南京行人司在長安右門外南京五兵馬司中兵馬司在内橋北東城兵馬司在太醫院南西城兵馬司在三山門外南城兵馬司在聚寳門外北城兵馬司在皷樓北武職公署南京中軍都督府在長安右門南在城留守中神䇿應天廣洋和陽五衛指揮使司牧馬千户所𨽻之南京左軍都督府在中府南在城留守左驍騎右龍虎瀋陽左右水軍左鎮南龍江右英武龍虎左十衛指揮使司𨽻之南京右軍都督府在左府南在城留守右虎賁右武徳廣武水軍右五衛指揮使司𨽻之南京前軍都督府在右府南在城留守前龍驤豹韜天䇿飛熊龍江左豹韜左七衛指揮使司𨽻之南京後軍都督府在前府南在城留守後興武鷹揚江隂横海五衛指揮使司𨽻之南京錦衣衛在通政使司南經歴司鎮撫司并所司附焉南京旗手衛在錦衣衛南南京府軍衛在欽天監後南京府軍左衛在竹橋南南京府軍右衛在長安西街南南京府軍後衛在竹橋南南京羽林左衛在朝陽門内南京羽林右衛在𤣥津橋東北南京羽林前衛在應天府治西南京金吾左衛在大功坊南京金吾右衛在状元坊南南京金吾前衛在太醫院南南京金吾後衛在覆舟山南南京虎賁左衛在朝天宫北南京濟川衛在江東門外南京江淮衛在大江北孝陵衛在朝陽門外應天府東至鎮江府丹徒縣界一百三十里西至和州界八十里南至太平府當塗縣界八十五里北至揚州府儀真縣界一百五十五里自府治至京師三千四百四十五里糧二十萬五千六百石零建置沿革禹貢揚州之域天文斗分野春秋屬吳戰國屬越後屬楚楚威王初置金陵邑因其地有王氣埋金以鎭之故名秦始皇以金陵有都邑之氣改曰秣陵屬鄣郡漢改鄣郡為丹陽郡武帝後揚州刺史治此呉自京口徙都於此改為建業晋平呉改建業為秣陵尋分秣陵北為建業改業為鄴建興初改為建康東晋元帝復都此置丹陽郡宋齊梁陳因之隋平陳廢郡更於石頭城置蔣州唐武徳初置揚州後復為蔣州又為揚州大都督府尋罷至徳初置江寧郡乾元初改為昇州後廢復置五代時呉楊氏建大都督府尋改為金陵府又改為江寧府南唐李氏都之宋復為昇州仁宗陞為江寧府建康軍節度高宗改為建康府建行都置行宫留守元至元中改為建康路元貞初立江南諸道行御史䑓天歴初又改為集慶路夲朝丙申年改為應天府領縣八上元縣附郭夲秦秣陵縣地隋為江寕縣唐上元初改江寧為上元縣因年號為名南唐復析置江寕縣而上元為縣如故宋元仍舊夲朝因之編户一百九十四里江寧縣附郭夲秦秣陵縣地晋分秣陵北置建鄴縣復析建鄴置江寕縣在今縣南七十里隋徙治冶城省秣陵建康同夏三縣入焉唐武徳中改江寧曰歸化尋改歸化曰金陵又改金陵日白下貞觀中改白下曰江寕上元初改江陵為上元南唐復析上元置江寕縣宋元仍舊夲朝因之編户一百三十四里句容縣在府東九十里漢置属丹陽郡以縣有句曲山故名唐武徳中於縣置茅州尋廢州以縣属蔣州尋又属潤州後属昇州宋属建康府元仍舊夲朝因之編户二百一十三里溧陽縣在府東南二百四十里秦置属鄣郡以在溧水之陽故名漢属丹陽郡隋初属蔣州改属潤州後併入溧水縣属宣州唐初復析溧水置溧陽縣上元初属昇州南唐属江寕府宋属建康府元至元中陞為溧陽路後降為縣元貞初又陞為州夲朝洪武二年改為縣編户二百七里溧水縣在府東八十五里本秦漢溧陽縣地隋析置溧水縣属蔣州尋併溧陽入焉唐初属揚州又析置溧陽縣而溧水為縣如故属宣州後属昇州宋属建康府元元貞初陞為州夲朝洪武二年改為縣編户一百十里江浦縣在府西四十里夲楚棠邑地晋為秦郡地隋為六合縣地唐宋元因之夲朝洪武九年始以六合縣及和滁二州地析置江浦縣二十四年仍割江寕縣一郷附之編户三十七里六合縣在府西北一百三十里夲楚之棠邑漢属臨淮郡東漢属廣陵郡晋隆安初於此置秦郡後周改秦郡為六合縣隋以六合属江東唐属揚州南唐於此置雄州周仍為縣宋属真州元因之夲朝洪武三年改属揚州府後改属應天府編户一十九里高淳縣在府東南二百三十五里夲溧水縣地𢎞治四年割立信等七鄉建為縣開治高淳鎮故名編户四十里郡名金陵楚名秣陵秦名建業呉名建康晋名集慶元名形勝鍾山龍蹯石城虎踞漢諸葛亮云經營四方此為根夲晋王𨗳云東以赤山為成臯南以長淮為伊洛北以鍾山為曲阜西以大江為黄河藝文類聚長汪天塹陳孔範䟽長江千里險過湯池南唐書外連江淮内控湖海繫年録東南形勢莫重建康宋張浚云有三呉為東門有荆蜀為西戸有七閩二廣為南府宋胡安定文集風俗人物繁盛隋志丹陽舊都所在人物繁盛人雜五方俗頗相類衣冠萃止通典永嘉之後衣冠萃止藝文儒術斯其為盛君子勤禮恭謹小人盡力耕殖祥符圖經文章取功名金陵古蹟記士以文章取功名者甚衆俗英且毅士清以邁地大而才傑宋楊萬里云風流文物冠暎今古宋汪藻云士林淵藪宋楊演云建業自六代為都邑民物浩繁人材輩出實士林之淵藪山川鍾山在府東北山周廻六十里漢秣陵尉蔣子文逐盗死於此呉大帝為立廟子文祖諱鍾因改蔣山輿地志蒋山古曰金陵山一名北山齊周顒隐此其山磅礴竒秀比諸山特高本朝楊維楨詩鍾山突兀楚天西玉柱曽經御筆題雲擁金陵龍虎壯月明珠樹鳳凰棲氣吞江海三山小勢􅐦乾坤五嶽低華祝聲中人仰止萬年帝業與天齊詹同文應制詩大駕春晴臨寳地鍾山老翠擁金仙瑤花如兩三千界紫氣成龍五百年風送香烟浮衮服池涵樹影拂青天詞臣侍從何多幸安得詩才似湧泉石頭山在府西二里蜀漢諸葛亮云石頭虎踞是也唐朱存詩五城樓堞各相望山水英靈宅帝王此地定由天造險古來長恃作金湯聚寳山在府南聚寳門外雨花臺側上多細碼碯石因名覆舟山在府北七里東連鍾山北臨𤣥武湖劉宋改名眞武山以其北臨𤣥武湖故也陳高祖與北齊兵大戰於此鷄鳴山在府西北七里舊名鷄籠山東連覆舟劉宋名龍山以黒龍常見𤣥武湖故名元嘉中雷次宗開舘於此齊竟陵王子良移居山下集四學之士抄五經百家之書夲朝於此建十廟鳳臺山在府南劉宋元嘉中有鳳凰集此山因築䑓其上故名馬鞍山在府西北一十里西臨大江東接石頭城以形似名隂山在府西南一十二里晋王𨗳至此山神見夣於𨗳以其事聞為立廟因名之曰隂山石灰山在府西北二十里舊名幕府山晋元帝初渡江丞相王𨗳建幕府於此其上有仙人臺虎跑泉宋王安石詩江山空幕府風月自觥船四望山在府西北二十里西臨大江南連石頭北接獅子呉大帝甞與葛𤣥共登焉晋温嶠伐蘇峻亦築壘於此以逼之大壯觀山在府北二十里陳宣帝起大壯觀於此因名帝甞幸此閲武獅子山在府西二十里與馬鞍山接晋元帝初渡江見此山綿延以擬北地盧龍故易名盧龍山牛首山在府南三十里舊名牛頭山有二峯東西相對晋元帝初作宫殿王𨗳指雙峯曰此天闕也故又名天闕山劉宋立郊壇於此梁武帝又於山下建寺山上有石洞洞中有石鼓天欲雨則石鼓自鳴本朝胡廣詩曉從鑾輿出九闗偶尋牛首共躋攀南唐古寺留碑在西竺髙僧度錫還百尺巖龕過島上半空鐘鼓隔人間暫遊已覺塵緣息到此方知佛窟閒東山在府東南三十里一名土山晋謝安舊隐㑹稽東山築此擬之嘗放情遊賞與從子𤣥圍棊至夜始還宋王安石詩定林瞰土山近乃在眉睫朱存詩鎮物髙情濟世才欲随猿鶴老岩隈山花處處紅粧面彷彿如