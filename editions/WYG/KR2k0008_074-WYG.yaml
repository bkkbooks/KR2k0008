永福人蕭國梁魁天下永福在福清西又三年興化鄭僑繼之正在福清之東名宦晉嚴髙太康中為晉安太守以寛惠得人心南北朝虞愿宋晉安太守在郡不事生業立學堂教授海邉有越王石常𨼆雲霧相傳清亷太守乃得見愿往就觀清徹無所𨼆蔽范縝梁初晉安太守在郡清約資公禄而已遷尚書左丞及還雖親戚無所遺唐李茸太和中閩縣令縣瀕海潮水鹹鹵禾苗多死茸築隄及立斗門以禦潮旱則瀦水雨則洩水其地遂成良田常衮建中初為福建觀察使始閩人未知學衮至為設鄉校親加講導由是風俗丕變人才與中州等栁冕貞元中為福建觀察使自安史之亂藩鎮專地冕奏願入觀率先天下徳宗許之閻濟美貞元末為福建觀察使先是觀察使於閩中置監牧馬百姓甚苦濟美至奏罷之宋謝泌景徳初知福州不張權不恃威兄弟相爭者訓之頑狠者責之及代還民懷其愛刻石以紀王平大中祥符中知福州時轉運使王贄言福州官田宜依漳泉例課租平奏贄額外増税乃止民受其惠焉鄭載天聖末知福州以循良稱先是謝泌王臻章頻皆賢故民歌曰前有謝王後有鄭章蔡襄再知福州改福建路轉運使首開古五塘溉民田奏減五代時丁口税之半又以郡士周希孟陳襄鄭穆有義行備禮招延誨諸生以經學俗重凶儀親亡或秘不舉至破産以飯僧襄下令禁止之王陶嘉祐中提點福建路刑獄以滌寃澤物為心日著聲譽元綘嘉祐中知福州以文學為士民師範奏罷錢氏時無名之征程師孟熙寧初知福州為政簡而嚴發擿𨼆伏如神嘗築子城建學舎治行最東南民為立生祠曽鞏熙寧末知福州時郡有盜隂相結附居人慴恐鞏以計羅致之繼自歸者二百輩郡無職田歲鬻園蔬收其直鞏曰太守與民爭利可乎罷之孫覺元豐初知福州民俗厚於婚喪其費無藝覺裁為中法令出嫁娶者以百數埋葬之費亦率減什五葉夢得知福州兼福建安撫使海冦猖獗詔夢得挾御前將士往捕之遂平冦五十餘羣張浚紹興中知福州以前宰相來典藩郡孜孜愛民而奉母盡孝百姓稱歎之胡銓紹興中以論秦檜出為簽書威武軍判官薛弼紹興中帥福州大盜伍黒龍之属甚盛弼選前守家丁千人以捕賊凡四年而賊平時儀門外夾道榕木鷺巢其上弼欲盡伐之是夜㕘議曽悟夢介胃者懇云府主惡鷺穢可去之明日大雨鷺羣悉空汪應辰紹興末知福州寛厚待民奏蠲一切苛征陳俊卿乾道中帥福州政尚寛厚嚴於治盜海道晏然淳熙初再知福州顔師魯知福清縣嘗決水利滯訟闢陂洫綿四千里歳大浸發廪勸分有方而不遏糴價船粟畢湊市糴更平黄度知福州始至訟牒日千餘度隨事裁決日未中而畢趙汝愚紹興初知福州仁厚愷悌持身潔白孫必愿淳祐初亦知福州兼安撫使平易忠信旌退士奬髙年尤留意武事措置海道陳居仁知福州入境有飢民嘯聚部分迓兵遮擊之首惡計窮自經死治宗室之暴横申蠱毒之舊禁臨事毅然有守號為循吏杜杲以鹽塲官攝閩尉民有甲之子死誣乙殺之驗髪申得沙而甲舎榜有池沙類髪中者鞠問之子果溺死傅伯成知連江縣東湖溉田餘二千頃隄壞即下流南港為石隄三百丈民蒙其利楊長孺嘉定中福建安撫使理宗嘗問亷吏真徳秀對曰若楊長孺之帥閩有亷聲真徳秀端平初知福州戒所部無濫刑横斂無徇私黷貨罷市令司属縣里正苦督賦革之苦貴糴便宜發常平振之海道冦縱横次第禽殄之胡巖起嘉定中知閩縣卓行危論竒文瑰句一時士大夫皆自以為不可及陳宜中景定中知福州在官得民心入為刑部尚書馬天驥景定中知福州兼福建安撫使以職事修舉加端明殿大學士楊棟理宗時知福州兼本路安撫使嘗進對帝曰止是正心修身之説乎棟對曰臣所學止此用之事親取友及治凋郡察寃獄至為簡易徐鹿卿福建安撫司幹辨公事㑹汀邵冦作鹿卿賛備禦動機㑹避冦者入城多方振濟全活甚衆洪天錫寳慶中知古田縣行鄉飲酒禮邑劇牒愬猥多剖決無留難有倚王邸勢殺人者誅之不少貸元王惲至元中福建按察使黜官吏貪汙者數十人察繫囚寃繫者決而遣之戒戌兵無得寓民家而創營屋以居之髙興至正中為福建等處副都元帥尋以㕘知政事行福建宣慰使元貞初拜行省平章政事累立戰功有名吕復攝長樂縣尹本朝兵下福州復曰吾世飡君禄今雖攝官若不以死報國則無以見先人於地下引繩自經死本朝楊士英洪武初知福州府持身亷潔為政嚴明興禮讓厚風俗凡百建置俱有條理吏民無不感服清譽大振鄰郡皆取則焉趙圭洪武中為福建都指揮使剛直忠厚訓練士卒號令嚴明能以恩威兼濟在任十年鎮之以静軍民咸賴之鄭思先洪武中為福建布政使學通經史於為政寛嚴適宜務與民同其好惡人皆安之王鈍洪武中為福建恭議陞恭政寛慎亷介民懷其惠蔡喆洪武中為福建㕘政亷明自持政事以正風俗合民心為要民皆慕之陶垕仲洪武中為福建按察使進耆老諮諏民瘼禁豪强戒侵漁與師生講經習射執賓主禮劾布政使薛大昉貪墨大昉亦誣垕仲始垕仲去軍民號泣拜留謡曰陶使若歸天有眼薛公不去地無皮北還迎者數千人歡呼遮道謝肅洪武中為福建僉事質性端謹文詞雄贍與陶垕仲協持風紀聞望烜赫人稱仰之王璉洪武中為按察司副使以激濁揚清為己任深得風憲體尤精於法律凡審獄不持鞭撻必由禮以探其情無有𨼆其慝者劉子敏洪武中由御史左遷侯官縣典史持守不二民服其公嘗自署曰禄薄儉常足官卑亷自髙永樂初復入為御史姚孟璵洪武中為古田主簿時邑人多逃亡户絶賦存艱於徵輸孟璵為覈荒田千頃請于朝蠲其額民至今賴之楊景衡洪武中為福建㕘政亷慎自持識達大體佐閩藩三十餘年終始不渝其美人皆稱之嚴毅洪武中為侯官縣主簿持己清慎邑嘗旱禱雨輒應有盗摽掠毅遣捕之其徒甚衆有一渠魁欲害毅乃詐為武官之任置酒延欵毅悟就席擒之盜遂息沈鎰洪武中由僉事左遷閩縣典史公勤謹慎興學校恤下民永樂中復陞福建僉事持守如一日郭宗文洪武中知羅源縣教民以孝弟忠信禮義亷恥民漸其化及卒民泣慕如父母郭璡洪武末為福建㕘議咨詢民瘼興學勸士立政事處官僚不同而和嘗遇祭祀猪羊已備御史退其小者民訴於璡璡乃大書硃字於頭角曰驗中卒用之王遵道長樂知縣省刑薄斂禮賢下士時稱賢令比秩滿民懇留之房安永樂初為福建㕘政在任莅政有方撫良善紏貪墨郡縣肅然魏谷才永樂初知閩縣平易近民愛好士類事必詳審而後行民得以輸其情邵玘永樂中為福建按察使用法平恕嚴明之政潔亷之操二十餘年始終一致吕昇永樂中為福建僉事篤學勵操獄多平反僕從之類亦訓以論語孝經聲譽大著楊庭芳永樂末知連江縣綽有政聲嘗自題其門曰治已存三省為官畏四知李素宣徳中以副都御史調福建按察使剛方簡重憲度肅然秩滿民遮留之乃進二品禄及致仕去民思之魯穆宣徳中為福建僉事肅清憲度伸理寃抑除害旌善作興人才入為僉都御史鄧安福建都指揮僉事多智計有威望正統沙冦之亂多方警備一城生聚咸倚賴焉省志余珍閩清知縣沙尤冦犯境珍率民兵捍禦之邑賴以保固省志錢輅初為永寧衞指揮同知有才略以薦協輔都指揮殱海冦斬沙賊累功陞福建都指揮僉事且事母孝治家肅然省志孫儼正統間福建按察司僉事剛正有為滛祠與寺觀之私剏者悉毁之凡法所在權貴莫能撓省志王勝福建都指揮僉事累招諭海冦及諸劇賊賜以織金文綺省志孫原貞景泰間以兵部侍郎鎮守福建寛而有制亷而有為士民愛戴之省志許仕達景泰間巡按福建時兵荒之餘乃裁省郡縣冗費民力稍紓省志李顒福建僉事公明有斷風裁凛然陞㕘政善政尤多志省夏塤天順初巡按福建持憲簡重得大體嘗被命考察方面大臣黜陟允協輿論省志吳中福建副使莅官嚴毅而不過於猛所至官吏咸愛敬之時未設提學憲臣中考校諸生黜陟允當人皆服其公明省志伍驥巡按福建時上杭冦起驥不俟調兵先抵其地為備禦計選將練兵扼其險要累戰敗之振旅凱旋竟以勞致疾卒民立祠祀焉省志鄭佑福建副使嘗協御史考察進退甚稱當省志丁泉福建行都指揮僉事上杭冦發泉𢷬其巢穴破石馬岐等三寨與賊遇力戰而死邑人哀慕而祠祀之省志游明福建僉事陞副使兩督學政待諸生有恩義而尤以亷能著稱後卒于家諸生咸設位以哭省志牟俸天順中僉福建按察司事行部所至郡縣肅然人稱其有風力省志胡節成化初知懷安縣懲𨽻卒擾民刻𨽻代之民有以不孝聞者懇懇開諭其人卒感化終任民愛戴之如父母省志楊峻福建兵備副使時杭汀盜起峻備禦有方民恃以無恐省志髙明以僉都御史歸養㑹上杭冦發璽書即其家起用之未至而冦平明乃躬詣其地招流亡撫瘡痍奏立永定縣以相控制至今賴之省志陳𦙍古田教諭秩滿諸生疏留再任二十年間勤于訓迪科目得人視昔為盛省志喻茂堅正徳中福建按察使公恕明直為時所稱朱冕福清知縣亷潔自持政有禆于民者殫心力為之比滿遷民攀轅不忍舎去魏棨福建叅政時古田流賊盤據議者欲屠之棨曰倡亂者馬周良也罪止渠耳民賴全活者數十萬咸像祠祀之流寓韓偓京兆人唐翰林學士朱全忠忌其薄已斥於上前因出為鄧州司馬天祐初復召為學士不敢入朝挈其族南依王審知李韶蘇州人徙連江曽祖彌遜宋禮部侍郎父文饒台州司理叅軍韶與兄寧同舉進士歴官右正言累上封事官至端明殿學士韶資性忠厚簡澹不溺於聲色貨利黙坐一室門無雜賓人物唐林諝閩縣人博學善属文𨼆居不仕作閩中詩十卷歐陽衮閩縣人有文學名仕為監察御史周朴福州人黄巢入福州得朴將用之朴曰我為處士尚不仕天子安能從賊巢怒斬之後人為立廟以祀焉五代林安福清人事母孝母死廬墓旁有石自裂而湧泉閩王異之以其廬為湧泉寺六世孫正華當宋時亦以孝行聞故世稱湧泉大小孝子云沈崧閩人唐乾寧初進士因歸省過臨安錢鏐留為鎮海軍掌書記奏授秘書少監檢校兵部尚書及元瓘襲位拜丞相卒諡文獻當時書檄表奏多崧所撰有集二十卷林無𨼆閩人有詩名寓居明州之慈溪大𨼆村子鼎善属文能書仕吳越官至丞相有文集數十卷謝文節福州人初仕閩為侯官令後入南唐為忠烈都虞侯饒州團練使以驍勇聞周世宗南征文節獨擐甲度大江潜覘敵營壘吳人號為鐵龍後守鄂州拒宋師戰没焉陳貺閩人志操古朴不茍仕進居廬山三十年學者多師事焉南唐主以幣致之貺布裘鹿鞹進止閑雅因獻景陽臺懷古詩南唐主稱善欲授官固辭賜粟帛遣還舊𨼆卒宋謝徳權文節子自南唐歸宋補殿前承㫖咸平初宜州蠻叛從陳堯叟經度單騎入蠻境諭以朝㫖衆咸聽命累遷西染院使知泗州徳權清苦幹事多所經畫見官吏徇私者必面斥之所至整肅黄夷簡福州人父廷樞事王審知夷簡少孤好學有名初事吳越署光禄卿後隨錢俶入朝官終平江軍節度副使夷簡喜談論善属文尤工詩老而不輟太宗以其嘗勸俶入朝加寵遇焉張錫福州閩人初仕周歴監察御史補闕起居以右諌議大夫致仕宋初改給事中宰相范質以其無子館于别墅錫以執政門下不可久處辭去卒於鄧州蔡伯俙福清人祥符中應童子科真宗見而嘉之賜以詩尋賜出身擢官東宫伴讀又有連江人黄鼇如六歳能詩運思敏捷亦應童子科賜進士出身許將閩縣人嘉祐中登進士第一授簽書昭慶軍判官代還當試館職辭曰願以守選餘日讀所未見書後為右正言直舎人院判流内銓皆神宗特命仕至門下侍郎卒諡文定子份龍圖閣學士陳烈侯官人學行端飭動遵古禮御童僕如對賓客仁宗屢詔不起公卿郡守鄉老交章稱其賢以為本州教授召為直講皆不拜後以宣徳郎致仕與陳襄鄭穆周希孟為友閩人號四先生鄭穆侯官人性醇謹好學進退容止必以禮舉進士累官至寳文閣待制國子祭酒神宗嘗稱其徳行宜左右王者年七十力求去太學生數千人請留不從陳襄侯官人逰鄉校講明知天盡性之説舉進士累官知通進銀臺司兼侍讀判尚書都省襄涖官所至務興學校講求民間利病在經筵神宗待之甚厚嘗薦司馬光等三十三人時號古靈先生有文集行世林槩福清人舉進士知長興縣值歲大飢槩出俸粟誘富人以飼飢者歴知連州淮安軍官至太常博士集賢校理著史論百篇辯國語四十篇林希槩子舉進士官至吏部尚書翰林學士同知樞宻院事徽宗立出知揚州徙舒州弟旦舉進士熙寧中為殿中侍御史言事切直又嘗論逐吕惠卿輩官終河東轉運使鄭洙侯官人擢三禮科為虞部郎中號東山先生卒祠于學王囘侯官人父平言事御史回敦行孝友造次必稽古人而不為小亷曲謹舉進士為衞真縣簿稱病自免退居潁州久之薦為忠武軍節度推官知南頓縣命下而卒曽鞏序其文集弟向亦有文名劉康夫侯官人少從周希孟學熙寧中進志述二十七篇其文皆羽翼詩書根柢仁義王祖道福州人第進士又舉制科調韓城尉以龍圖閣學士知桂州開邉置黔南路後以端明殿學士知福州厯兵刑二部尚書鄭俠福清人熙寧間監安上門時久不雨飢民流離於道俠繪圖以獻神宗觀覽長吁數四蠲放新法凡十八事越三日大雨俠以忠勁竟為小人所害屏逐終身紹熙初贈朝奉郎陳祥道閩清人元祐中為太常博士終秘書省正字著禮書一百五十卷弟暘應紹聖制科累官至禮部侍郎著樂書二十卷林攄長樂人父邵顯謨閣直學士攄用䕃累官屯田員外郎徽宗喜其盡言河朔利害賜進士第進翰林學士嘗使遼還除禮部尚書為開封尹後進同知樞宻院尚書左丞中書侍郎劉彛懷安人幼介特從胡瑗學善治水第進士為朐山令恤孤寡平賦役抑奸猾凡所以惠民者無不至邑人紀其事目曰治範官終都水丞著七經中義百七十卷明善集居陽集各三十卷余深羅源人元豐中進士累官至太宰封衛國公加少傅時福建以取花果擾民深為言之徽宗不悦遂請罷出知福州劉詵福清人舉進士崇寧中歴官宗正鴻臚衞尉太常少卿纂續因革禮詵通音律居母之喪盡禮有芝産墓側陸藴侯官人少知名舉進士累官御史中丞嘗上言於徽宗皆中時病後以龍圖閣待制知福州改建州弟藻由列曹侍郎出知泉州辛炳侯官人元符進士累官殿中侍御史以䟽蔡京發運之弊謫監南劒州髙宗朝復為侍御史言事切直遷中丞卒詔以炳操行清修貧無以葬賜銀帛賻其家黄祖舜福清人舉進士仕至同知樞宻院事卒諡莊定祖舜嘗奏奪楊愿恩禠秦熺秩直氣有足尚者著述有易説國風小雅説禮記説歴代史議及遺文十五卷張觷懷安人舉進士為小官不與世詭隨後守南劒州討平建冦以勞累官至直龍圖閣知䖍州又蕩平餘冦進秘閣修撰南劒民思之為立廟黄龜年永福人紹興初為殿中侍御史劾秦檜植黨欺君遂奪檜職初邑簿李朝旌許妻以女既登第而朝旌已死家甚貧或勸其别娶不從子衡仕至胡南提舉陳誠之閩縣人舉進士第一仕至知樞宻院事終端明殿學士朱倬閩縣人紹興末拜尚書右僕射倬長於料事虞允文王淮陳俊卿劉珙之進皆倬所薦孫著嘉定中累官至吏部尚書李樗閩縣人鄉貢士有註毛詩解同邑有任文薦者仕為秘閣修撰作六經章句及卒與樗皆祠于學蕭國梁永福人乾道中進士第一官至禮部郎官又同邑黄定亦乾道中進士第一官至國子祭酒有文集行世林擇之古田人與建安蔡季通齊名朱熹每稱為畏友弟允中從熹逰有草堂集真徳秀為序林之竒侯官人累官宗正丞時朝廷欲學者㕘用王安石三經之竒言三經率為新法地晉人以王衍清談之罪深於桀紂王氏實負王衍之責後以祠禄家居號拙齋吕祖謙嘗師之所著有書經全簡卒祠于學黄洽侯官人隆興初登第累官國子博士諌議大夫以言事為孝宗所重擢㕘知政事以資政殿大學士致仕常言居家不欺親仕不欺君仰不欺天俯不欺人幽不欺鬼神何用求福報哉治質直端重為兩朝名臣有文集奏議八十五卷林栗福清人紹興中進士累官兵部侍郎諡簡肅栗為人强介偏執而論事雄辯可觀陳孔碩侯官人師事朱熹為髙第累官尚書郎卒祠于學同邑葉子儀文章博洽所著有綘毫集易𤣥神契潘柄侯官人年十六有志於道朱熹悉以所學授之平生多著述如易解尚書解之類號𤓰山先生卒祠于三山書院陳貴誼福清人慶元中進士累官㕘知政事兼同知樞宻院事理宗嘗奬其有憂國之言卒贈少保資政殿大學士唐璘古田人舉進士時臺臣有奏對次官不許論邉事者璘對策極詆之後累官廣東經畧安撫使進太常少卿以内艱哀毁卒璘居官大節母教之助為多史稱之曰古之遺直也李琪連江人仕至國子司業著春秋王霸世紀行于世楊宏中侯官人慶元中韓侂胄使李沐論罷趙汝愚祭酒李祥博士楊簡抗疏救之有命補外宏中為太學生與徐範張衜蔣傅周端朝伏闕上言乞竄李沐以謝天下侂胄怒送宏中太平州編管天下號為六君子宏中後登進士通判潭州鄭性之閩清人初名自誠後改今名嘉定四年進士第一嘗以虚心納善勸於上終知樞宻院事兼參知政事觀文殿學士有端平奏議及與陳均同修宋編年備要潘牥閩縣人端平初進士對制策語最直時論偉之調鎮南軍節度推官遷太學正終通判潭州所著有侍集古樂府徐範侯官人少孤刻苦授徒以養母與兄同舉於鄉入太學以明趙汝愚之寃又與兄同編管臨海嘉定初舉進士歴知邵武軍累遷至起居郎兼國史編修實録檢討黄榦閩縣人父瑀髙宗時御史以篤行直道著聞榦師事朱熹熹以女妻之歴官知漢陽軍安慶府皆有善政在位者忌其聲譽羣起擠之榦遂歸里弟子日盛没諡文肅所著有經解文集余隅古田人朱熹髙弟有克齋文集同邑林䕫孫程若中皆朱熹門人䕫孫有䝉谷集書本義若中有槃澗集陳韡孔碩子與弟韔同登開禧進士韡有將帥才歴官工部郎中紹定初知南劒州兼福建提刑招捕使悉平閩廣江浙之冦累拜端明殿學士㕘知政事同知樞宻院事卒贈少師諡忠肅黄師雍福州人少從黄榦學寳慶初進士為婺州教授有文學名知龍溪縣有最行拜監察御史劾罷史嵩之終禮部侍郎簡澹寡欲静厚有守於邪正之辨甚明愛護名節云許應龍閩縣人五歲通經㫖舉進士累官給事中吏部尚書終端明殿學士僉書樞宻院事居官不妄薦士亦無傷人害物事知潮州時治聲甚著趙汝騰宗室子居福州寳慶初舉進士歴官至禮部尚書兼給事中嘗入奏言前後姦䛕興利之臣甚切直拜翰林學士後辭歸累召始至闕復以翰林學士承㫖知泉州知南外宗正事卒贈四官王伯大福州人嘉定進士累官樞宻副都承㫖兼左司郎中進對言甚激切言邉事曲盡事情後為刑部尚書㕘知政事立朝以直諒稱終資政殿學士知建寧府張磻福州人嘉定進士累官國子祭酒後以端明殿學士同知樞宻院事兼參知政事進封長樂郡公致仕卒贈少師常挺連江人嘉禧初進士歴官太學録知漳泉州遷吏部尚書咸淳中授同知樞宻院事封合沙郡公拜參知政事卒贈少保挺有通濟才聲望甚著陳徳一連江人仕為連江太守卒之日家無餘財惟餘所著易傳發徴横舟文集諸書板數千片而已林琦閩人徳祐初元兵迫臨安琦結集忠義捍禦海道以功補宣教郎文天祥開府南劒琦佐之琦外文采内忠實數渉患難無怨懟辭後被執至建康以憂憤死元鄭潛懷安人至正中為海北亷訪司副使晚居鄉邑買田建義學以教育後進又於縣西南立白苗陽岐二渡買田以給操舟者之食人利之至今有石刻曰鄭公渡林興祖羅源人舉進士知鉛山州誅豪民吳友文政聲遂著繼陞道州路總管徭賊以其亷愛三年不犯境蟲食麥禱雨而蟲死又為之罷興作賑貧乏輕徭薄斂郡中大治王都中積翁子以父功授平江路治中時年十七遇事剖析動中肯綮僚吏皆􅌓眙不敢欺累拜浙江行省恭知政事卒諡清獻都中歴仕四十餘年其清白之操得於家傳而治郡之績雖古循吏無以尚之自號本齊有詩集三卷本朝張以寧古田人初仕元歸附洪武初為翰林侍講學士知制誥兼修國史使交阯卒詔歸葬以寧工詩文所著有翠屏集及春秋考胡傳辯疑唐泰侯官人洪武中登進士授行人擢浙江按察僉事永樂中陞陜西按察副使卒泰善聲詩與黄濟輩號閩南十才子所著有善鳴集陳祖長樂人洪武中以明經薦授新繁縣丞道遇一嫗哭甚哀問之嫗曰夫與子俱喪止餘一孫十歲昨為大蛇所吞祖令具狀移牒城隍限日引蛇赴公庭至期果有羣蛇集㕔下祖諭曰無與者退得罪者償命獨一大蛇伏不去即以劒仰地蛇乃就殞其首民以為異政立祠祀之王偁永福人洪武中為國子生永樂初授翰林檢討進講經筵修大典為總裁官為人氣節髙勁議論英發詩有唐人風文章雄偉宏博深為學士解縉所知所著有虚舟集陳仲完長樂人自教官入翰林為編修兼左春坊左賛善為人温厚質實與物無競平居寡言至於論事據理義無所回撓嘗有詔汰在京諸司冗官時仲完長坊事即提筆書某當留某當汰衆皆服其明決馬鐸長樂人永樂壬辰進士第一授翰林修撰鐸為人坦直無崖岸嘗建言國子監分獻十哲宜用翰林院官朝廷從之林誌閩縣人永樂中鄉試㑹試皆第一進士第二授翰林編修累官右春坊右諭徳兼侍講為人簡静不茍交處其學經史諸子及天經地志醫卜之説靡不通曉為文章簡奥不蹈襲舊説詩有唐人風居官十有五年恭勤趍事自奉淡然陳暉閩縣人永樂乙未進士授貴州按察司僉事政績茂著尋陞廣西按察副使引年致仕學識髙逺尤善草書得懷素之妙號存菴林碩閩縣人永樂壬辰進士初授監察御史冇能聲尋陞浙江按察使嚴而不苛郡邑畏服久之拜廣東左布政使未任而卒陳景著閩縣人永樂乙未進士第三授翰林編修預修性理大全書成以母老乞禄便養改福州府教授生徒多所造就李騏長樂人永樂戊戌舉進士第一初名馬文廟親改今名為人耿介有氣節不肯媕婀依隨仕終翰林修撰洪英懷安人永樂中㑹試第一擢進士選為庶吉士學問宏肆歴官吏部考功郎中端謹著稱舉陞山東左布政使有仁恕之政尋陞都察院左副都御史治水有功復陞右都御史致仕卒洪順懷安人舉進士選庶吉士授刑部主事持法不阿與修五經四書性理大全陞山東僉事時兵亂之後撫循凋瘵惟恐不及歲旱蝗發倉儲數萬賑之不俟上報擢按察使卒省志王善侯官人永樂中進士累官雲南㕘議備禦麓川夷民帖服乞致仕歸二十餘年卒省志林元美閩縣人永樂中進士授上猶知縣奏蠲逋負賦感化峽盜尤作興學校科第為之有人擢寧海知州陞撫州知府致仕尋卒省志林文秩懷安人永樂中進士改庶吉士拜御史立朝有直聲巡按南畿風裁凛然擢山西副使進按察使有告平陽王文簡妖言惑衆者連及三百餘家文秩力為分辨存活二千餘人弟文􅮘亦進士省志鄭珞閩縣人永樂進士改庶吉士累官寧波知府黜賍吏抑豪强令行禁止發奸擿伏治績為兩浙最陞㕘政未任卒于家省志陳叔剛閩縣人登進士授御史實録成進修撰以父病歸省卒叔剛性温雅以文行推重于時弟叔紹亦進士官副使子煒進士官布政使俱有聲志省薩琦閩縣人宣徳中進士改翰林庶吉士為人耿介持正學有源委授翰林編修預修仁廟實録後陞禮部右侍郎兼詹事府少詹事卒于官姚銑侯官人進士宣徳初拜給事中正統間遷都給事己巳之難死土木焉時邑人陳鈍懐安人周傑俱進士俱以扈從死事省志髙旭侯官人宣徳中進士授給事中累陞江西僉事平恕明慎其於決獄多所平反省志趙榮閩縣人正統間以善書授中書舎人時北兵臨邊榮往復軍營與之辨論兵竟退景泰中奉使塞外還陞侍郎天順初張秋河決董治有功累陞工部尚書後值曹欽之變榮率子弟徃討陞兼大理寺卿尋卒省志黄鎬侯官人舉進士拜御史正統初巡按貴州削平苗夷寇亂大著勞績累進南京戸部尚書所著輒有風裁尤多善政卒贈太子少保省志何宜福清人正純戊辰進士授主事兵部職方郎中時疆禦多事皆職方主持宜從容區畫人服其得宜遷浙江布政司參議終江西布政使所至以亷潔見稱省志陳煒閩縣人由進士拜監察御史彈劾不避為權貴所忌嘗督兩京學校時稱得人尋陞江西副使按察使威望大著進布政使卒煒操履清平學亦貫串該博宧轍所至一以表名賢正風俗為首務焉省志陳鴻漸連江人景泰辛未進士授刑部主事察獄明允而用法平恕遷郎中所分治多權貴所在鴻漸屹不為動後以親老歸養家居二十餘年確然不易其素守士論髙之省志王克復福清人天順丁丑進士歴官江西右布政使行部風采凛然善發奸伏人目之曰王燈籠終南京吏部侍郎志省林瀚元美子成化初進士歴官祭酒待諸生嚴而有恩數上疏論列皆切機宜進南京兵部尚書嘗以正直忤瑾不少為動卒諡文安林廷選長樂人成化辛丑進士授御史巡按廣東討平夷寇受白金文綺之賜擢浙江僉事轉副使諭解温處鑛徒歸農歴深望重􅆒歴籓臬長入為大理卿鞫讞多所平反以南京工部尚書致仕卒諭祭葬贈太子少保省志林泮閩縣人成化壬辰進士仕終南京户部尚書性亷介俸入取給公私應酬不計盈縮居官三十年無異寒素且其望重齒宿而惓惓然不敢以已先人故所至人多愛而敬之林庭㭿瀚子𢎞治己未進士仕至工部尚書太子太保卒諡康懿弟庭機亦進士官禮部尚書子炫進士官至通政司㕘議煬進士官知府燫進士累官至禮部尚書烴進士官知府俱有聲陳元憲連江人嘗通判臨江府以亷能稱列女劉仝祖妻福清人姓林氏父公遇知名士仝祖為福建招撫使與林空齋起義兵仝祖亡命自經死有司執其妻林具反狀林叱曰林劉二族世為宋臣欲以忠義報國何為反乎汝知以血書壁而死者乎是吾兄也吾與兄忠義之心一也可生為汝等凌辱耶遂遇害柯節婦長樂石梁人姓陳氏元至正海賊刼石梁其夫適在縣郭陳氏被執陳且行且罵賊亂捶之挾以登舟忽振厲自投江明日屍逆流而上止石梁峰傍其夫驗其背有黒子慟哭曰是吾妻也舁歸葬之林以徳妻長樂人姓王氏年二十三而孀時舅姑老子且幼王為養老守孤不易其操後子亦早夭婦戴氏偕其姑以守洪武中詔旌之省志王氏福清人御史郝孟妻也孟死於非命王自経以殉永樂間旌表之志省林氏侯官人適懷安何旻旻卒遺子瓊始生三月撫之成童擇師教之力紡績以資其費瓊既長領鄉薦第一登進士省志余氏懷安人夫黄應早卒子安方二歲余竭力奉舅姑撫孤子家貧甚挈姑依父以居安長俾就學後登進士第省志吳氏侯官人適閩縣趙總總辛吳惡筓垢服不出閨門惟勤女事供三子學長子正領鄉薦次子曽舉明經省志金氏名善觀定海百户旺之女適千户湯全全卒善觀斷髪自矢資蚕桑紡績以養其姑姑病扶持惟謹晨夕籲期以身代及卒殯葬成禮哀慟㡬喪明事聞于上旌表之省志曽縉妻古田人姓趙氏縉卒趙不再醮執婦道終始如一紡績養姑嘗刲股以療姑病正統間事聞旌之省志楊和生妻閩縣人姓王氏和生夭卒王年二十有八子永尚幼家益窘或勸其改適王泣曰夫既早世吾不能守其姑而改適其何以自立於天地之間乎志操愈厲撫教其子後永登進士第拜監察御史有司以其事聞詔旌其門省志陳啓妻閩縣人姓潘氏年二十九而啓卒勵志守節教其子傳底于成立後舉進士為刑科給事中事聞詔旌之省志劉氏名淑聲閩縣人李岳妻也岳卒劉年二十有八家特貧一子甫六歲誓志撫之底于成立有司上其事詔旌表其門省志潘氏懷安人歸于閩清謝瓛年二十七而夫卒三子俱在襁褓舅姑耄老家復貧潘矢志堅守未㡬舅卒姑盲後卒潘養生送死各盡其道躬蚕績以給諸子其後鑛為沾化訓導郡守唐珣以聞旌之省志周氏長樂人歸董姓者甫三歲夫亡未有子舅姑俱存父母欲奪而嫁之周曰吾少讀烈女傳知婦人以不再醮為節善事舅姑為孝吾知有節孝而已他則吾不知也年六十餘事聞詔旌表焉省志林濬妻閩縣人姓黄氏年二十七而寡朝夕號慟幾不能生孀居二十九年事舅姑克盡孝謹撫男女各底成立而復能勤生植業終始不少怠宗黨賢之事聞旌表省志仙釋莊君平夷堅志云福有道人嘗見老叟同室歳餘告之曰吾乃漢莊君平也取一書授之天明叟出不歸視其所書皆修身度世之説今但記其語云事業與功名不直一杯水又云獨立秋江水徐登漢福州人類要云髙盖山在永泰縣昔徐登在此山得仙與東陽趙炳鬪仙術即此處是也義收後梁時僧居萬歲寺時春不雨至五月義收積薪通衢將自焚烟舉而雨降遊洪州將歸民俗遮留乃截左臂付之曰去後不雨出以禱果應本逸閩縣人九歲出家至廬山依開元寺暹禪師入室頓悟宋元豐六年詔住大相國寺賜號正覺禪師紹聖中集衆而逝作頌曰七十四年如掣電臨行為君通一線鐵牛勃跳過新羅撞破虚空七八片明一統志卷七十四
