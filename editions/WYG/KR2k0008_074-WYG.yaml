body:
  text: 明一統志卷七十四明李賢等撰福建布政司福建古閩越地漢以揚州部刺史領之東漢於此置㑹稽南部都尉唐初𨽻江南道復𨽻江南東道採訪處置使大厯中始置福建觀察使治福州宋置福建路安撫使以福州守臣兼領元置福建等處行中書省于泉州尋徙福州置福建道宣慰使司都元帥府及福建閩海道肅政亷訪司于福州本朝置福建等處承宣布政使司領福州泉州興化建寧延平汀州邵武漳州八府置福建都指揮使司領福州左福州右福州中福寧鎮東泉州永寧興化平海漳州鎮海一十一衞又置福建行都指揮使司領建寧左建寧右延平汀州邵武五衞及將樂守禦千户所置福建等處提刑按察司分福寧建寧二道兼察諸府縣衞所三司並治福州府而行都司則分治於建寧云福州府東至海岸一百九十里西至延平府南平縣界二百五十里南至興化府莆田縣界二百三十里北至浙江温州府平陽縣界六百三十里自府治至南京二千八百七十二里至京師六千一百三十三里糧一十六萬六千石零建置沿革禹貢揚州之域天文牛女分野周時為七閩地秦置閩中郡漢初封無諸為閩越王都此武帝滅閩越徙其人於江淮間盡虚其地後立冶縣属㑹稽郡東漢末分冶縣地為㑹稽東南二部置都尉此為南部三國吳属建安郡晉分置晉安郡劉宋改晉平郡尋復故陳兼置閩州後改豐州隋改泉州大業初復為閩州尋改為建安郡治閩縣唐初復為泉州後移治晉江縣而以此為閩州開元中更為福州天寳初改長樂郡乾元初復為福州唐末陞威武軍節度五代時王審知據此陞長樂府改彰武軍宋復為威武軍建炎中陞福州府元至元中為福州路本朝洪武元年改為福州府領縣十閩縣附郭本漢冶縣属㑹稽郡又改名東治縣漢末改曰東侯官吳属建安郡晉析置原豐縣為晉安郡治隋開皇中始改原豐為閩縣五代時閩改長樂縣宋復為閩縣元仍舊本朝因之編戸百二十七里侯官縣附郭漢元鼎中立侯官都尉属㑹稽郡漢末為東侯官縣晉属晉安郡隋省入閩縣唐武徳中於福州城北三十里復置此縣貞元中移於州郭元和初復省入閩縣尋復置宋元仍舊本朝因之編户六十里懷安縣附郭本閩縣地宋太平興國中析置懷安縣属福州元仍舊本朝因之尋省古田縣在府城北二百八十里本漢東侯官縣地晉属晉安郡隋初属泉州後属建安郡唐永泰初始置古田縣属福州宋元仍舊本朝因之編户五十三里閩清縣在府城西北一百二十里本侯官縣地唐置梅溪鎮五代時閩陞為閩清縣宋元仍舊本朝因之編户七里長樂縣在府城東南一百里本隋閩縣地唐武徳中析置新寧縣尋改為長樂縣元和初省入福唐尋復置五代時閩改安昌縣後復為長樂宋元仍舊本朝因之編户一百一十里連江縣在府城東北九十五里初晉武帝以温麻船屯置温麻縣属晉安郡隋省入閩縣唐初復置移於連江之北改名連江縣宋元仍舊本朝因之編户四十四里羅源縣在府城東北一百五十里唐咸通中析連江閩縣地置永貞縣宋天禧中改曰永昌乾興初又改羅源元仍舊本朝因之編户一十六里永福縣在府城西南一百二十里本侯官尤溪二縣地唐永泰中置縣以年號為名宋崇寧初改曰永福元仍舊本朝因之編户九里福清縣在府城東南一百二十里本長樂縣地唐聖厯初析置萬安縣天寳初改福唐縣五代梁時改永昌縣唐仍改福唐晉改南臺閩改福清縣宋因之元陞為福清州本朝洪武二年復為福清縣編戸一百二十里郡名閩中秦名晉安晉名長樂唐名三山九仙烏石越王三山俱在城中故名形勝東帶滄溟百川叢㑹舊記南望交廣北睨淮浙長樂志其地坦夷圖經閩中八郡建劒汀邵號上四州其地多溪山之險福泉漳興號下四州其地坦夷閩越地肥衍唐韓愈文吻海𣲖江唐沈亞之集閩城吻海而𣲖江附山以居無安沼平池游舟娛樂之地長江在其南大海在其東宋魯鞏道山亭記全閩八郡長樂為冠宋蔣之奇文東南都㑹蔡襄學記連山距海邉徼重地元王惲奏云風俗其俗儉嗇喜訟好巫圖經其性紆緩其俗儉嗇爭者喜訟病者好巫女作率登於男同上家庠序人詩書閩俗自晉宋文雅以來教化丕變家庠序而人詩書産懼薄以勤羨用喜嗇以實華俱閩中記嚮學喜講誦好為文辭信鬼尚祀重浮屠之教俱宋史地志民以魚鹽為生君子内文小人畏法俱閩縣記逢兵不亂逢饑不荒晉郭璞遷城記山川九仙山在府城東南隅一名于山世傳何氏兄弟九人於此登仙又九域志越王無諸重九日嘗宴于此大石尊尚存山上有四徹亭千秋堂宋蔡襄詩偶爾尋幽上翠微游人啼鳥似前期花間行印露沾紙山下放衙雲滿旗烏石山在府城西南隅一名閩山與九仙山對峙山有薛老峯鄰霄臺鵶浴池蟠桃塢金蟒穴之類皆自然天成又有唐時所建神光寺宋蔡襄詩低回傾北斗突兀起東閩楊景衡詩鄰霄臺北道山西長嘯憑髙起逺思縱目莫窮登覽興􅆊宫烟草晚離離越王山在府城内北一名平山即閩王無諸舊城處宋曽鞏道山亭記城之中三山西曰閩山東曰九仙山北曰粤王山陳軒詩城裏三山古越都相望樓閣跨蓬壺有時細雨微烟罩便是天然水墨圖丁戊山在府城東舊有安福院占形勝之中鐘山在府城西南二里閩中記梁太守袁士俊居第内有小山時聞鐘聲因名後捨為寺長樂山在府城東三東越王時有神仙騎白馬來亦名白馬山金鷄山在府城東五里閩中記秦始皇時此山有金雞之祥遂􅓯斷山脊以厭王氣龍窟山在金雞山後閩中記山有巨蟒頭有王字人以為龍故名鳳池山在府城北七里五代閩王葬其夫人任氏于此釣臺山在府城南九里臨江昔越王餘善于此釣得白龍因名唐韓偓詩無奈離腸易九迴强舒懷抱立髙臺中華地向城邉盡外國雲從島上來四序有花長見雨一冬無雪却聞雷日宫紫氣生袍冕試望扶桑病眼開臥龍山在府城北一十里唐僧師備自雲峯來居此館徒常十人髙麗日本諸僧亦有至者昇山在府城北一十四里舊名飛來山相傳越王時自㑹稽一夕飛來唐天寳間臨海任敦於此得道昇舉改今名東山在府城東十五里山有唐建大乗寺及獅子峯文殊巖榴花洞龍首澗宋許將讀書於此程師孟詩亭為新成號獅子人曽舊𨼆作龍頭將和詩泉近榴花深洞口亭開獅子舊峯頭八州旗色天邉出三館芸香海上留怡山在府城西一十五里一名雲山梁道士王霸居此唐亷帥李若初登樓望見五雲環其處乃以任敦董奉徐登暨霸立為四仙廟今沖虚宫是鼓山在府城東南二十五里上有石如鼓及有鼓山寺元黄鎮成詩屴崱峯頭萬丈梯上方髙與白雲齊青山盡處海門濶紅日上來天宇低旗山在府城西五十里以形似名故老相傳左皷右旗全閩二絶八郡雄偉白鹿山在府城東南六十里唐元和中道𢎞禪師自晉江領徙居此有白鹿之異因名方山在府城南七十里九鼻東向山頂方平秀拔空碧為一郡壯觀唐天寳中改名甘果山宋王逵詩衆狀皆窮險兹形獨擅方坦夷中砥礪端正外青蒼龍潭山在府城西一百餘里潭在山上嵗旱禱雨輙應雪峯山在府城西一百餘里地勢髙多寒夏月猶有積雪宋劉知玉詩名山第一雪峯山六月山頭雪尚寒荻蘆山在連江縣東南二十里一名九龍山俗傳秦始皇以東南氣王自江而南山秀拔者皆鑿之鑿此山得蘆根一莖長數丈斷之有血因名并名其水曰荻蘆峽香鑪山在連江縣北四十里山頂形勝如香鑪九域志云邑人張夀於此學道得仙有壇存焉四明山在長樂縣西其山屹然如削髙列四峯中有古壇生釣竹有井甘如蜜髙蓋山在永福縣西峯巒秀聳上有紫雲如盖故名昔徐登趙炳常於此山下共飲後皆昇仙金支山即髙盖山别峯秀出挿天有泉金色董奉山在永福縣西北亦名福山山下有董奉宅又圖經在長樂縣山上有神人祼身散髪人見之必獲福玉融山在福清縣南五里上舊有靈寳觀自石竺山移於此金翅山在福清縣西北七里如鳥展兩翅因名石竺山在福清縣西十四里林真君𤣥光嘗鍊丹於此山形峭拔其石上有蛤蜊殻山下有紫雲洞洞前有龜山蛇水鶴影石皆兹山之勝靈石山在福清縣西南二十五里上有靈石聲聞必雨雨久聞則開霽黄蘖山在福清縣西南三十里林巒重􅃨有瀑布龍潭有佛座香鑪數峯唐貞元時沙門貞幹居之海壇山在福清縣東南海上逺望如壇因名鼇頂峯在九仙山舊有嘉福寺宋狀元陳誠之讀書於此王逵詩眼看滄海近身與白雲髙迴影連三島盤根壓六鼇又城南九十里亦有此峯乃二徐真人平閩兵處今靈濟宫在其下小華峯在九仙山之南舊時石上鐫此三字雙髻峯在旗山三峯峭秀崖谷幽逺繚繞迴抱水西之勝處也又福清縣亦有此峯降虎峯在連江縣西五十里嘗有虎為矢所傷至獨覺禪師菴前若有所訴覺為拔箭虎馴伏相随因名觀音巖在府城東南松竹蒼翠泉石清幽有古塑像在其中紫微巖在府城南唐末有紫微公𨼆此宋陳民先詩碧落已驂丹鳳駕紅塵空認紫微巖喝水巖在鼓山昔有僧神晏誦經惡西澗水聲轟叱之西澗乃涸逆流于東澗鴻休巖在福清縣海邉巖竇天成下瞰滄溟杳望無極昔有僧鴻休棲此因名方廣巖在永福縣東北巖髙千仞有玉泉洞宋黄非熊讀書其中嘗有詩烟霞不改古今色山水無閒朝暮聲宿猿洞在烏石山之麓恠石森聳藤蘿蓊鬱昔𨼆者畜一猿于此因名榴花洞在東山唐永泰中樵者藍超逐白鹿入石門内有雞犬人家見一翁謂曰吾避秦人也與超榴花一枝而出既而莫知所在宋蔡襄詩洞裏花開無定期落紅曽見逐泉飛仙人應向青山口管却春風不與歸靈巖洞在鼔山每雷雨作其中簸蕩若鼔聲蔡襄詩孤青浮海山長白掛天瀑芙蓉洞在府城東北洞口縈紆可十餘里遊人秉炬以往玉華洞在連江縣南五里宋洪壯詩妙絶天仙境飛來佛子家壺中閒日月洞裏老烟霞月嶼在府城南百餘里海邉越王石在府城南海邉方輿記云常𨼆雲霧間惟清亷太守乃得見海雷石在府城東南海邉石為波濤所穿其下成竅風蕩激則鍧然有聲龍蹟石在府城西北唐廣徳中有龍從石上飛起著四足蹟雷移石在連江縣西北唐宣宗時僧詮見絶峯有巨石欲移其室而未能因禱於神俄而風雨石移山下因坐禪者四十年太原石在永福縣東閩中記唐泰初中邑宰王君室人題詩云何事潘郎重别筵離情未斷妾心懸太原灘下相思處猿呌青山月滿船今詩磨滅惟太原二字在盧焦石在福清縣西南昭靈廟下海濤潄激為龕巖玲瓏之狀海在府城東南福寧寧徳羅源連江長樂福清六縣皆瀕海有海堤在閩長樂二縣東唐太和中閩令李茸築金鎖江在府城西一十里一名金﨑江昔有漁父垂釣得金鎖引鎖盡見金牛急挽至牛斷猶得鎻長二尺晉康帝詔於此立金﨑廟南臺江在府城南一十五里江滸有越王釣龍臺因名源出建陽分水嶺東流七百里至臺又東南三十里與江東西峽合流入海晉郭璞遷城記南臺沙合河口路通先出狀元後出相公螺江在府城西北三十里捜神記閩人謝端得一大螺如斗畜之家每歸盤餐必具因宻伺乃一姝麗甚問之曰我天漢中白水素女天帝遣我為君具食今去留殻與君端用以居粮其米常滿江以此名連江在連江縣治南東流入海縣名連江以此西湖在府城西南三里相傳此湖舊有山越王無諸時一夕飛往臨海郡東湖在府城東北三里鍾湖在閩清縣輿地廣記云湖中有鍾故名黄龍潭在府城西南五里歲旱則雩昔有巫者妻漚麻潭側見黄龍首藉其上其夫以告縣往祈之俄而大雨鯤潭在永福縣西古語鯤潭生芝