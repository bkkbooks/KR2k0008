孝武遣婁昭討之昭請以五千人行永進曰在速不在衆若星馳電發出其不意精騎五百人足矣帝然之命永代昭以五百騎倍道兼進果討平之韓秀昌黎人父仕魏為宣武将軍都尉秀聰敏才辯有文學累官至青州刺史有政聲屈遵昌黎人博學多才藝仕魏為中書令後以開拓之功賜爵信都侯尋加昌黎公盧魯元昌黎人父副鳩仕魏為中書令魯元寛和雅度工書有文采累官至襄城公卒諡曰孝盧醜昌黎人魏大武監國醜以博學入侍經帷後以師傅舊恩賜爵濟隂公位尚書加散騎常侍竇瑗遼西陽洛人仕魏為太常博士從爾朱榮東平葛榮封容城伯瑗乞以讓兄叔珍叔珍由是積官至廷尉卿孝武時釋奠開講瑗為擿句累遷至大宗正卿官雖通顯貧窘如初清操為時所重韓麒麟昌黎人魏孝武時拜齊州刺史在官不尚刑罰太和中京師大饑麒麟表陳時務甚切為人恭慎恒置律令於坐旁臨卒之日唯有俸絹數十匹其清貧如此追封燕郡公諡曰康韓顯宗麒麟子有才學魏太和初舉秀才對䇿甲科除著作郎後兼中書侍郎性剛直面折廷諍後與崔逸等㕘定朝儀隋豆盧通昌黎人祖長魏柔𤣥鎮大将父寕柱國太保通𢎞厚有器局歴夏洪二州總管所在並稱寛惠卒諡安豆盧勣通之弟聰悟有才識為滑州刺史甚有惠政華夷悦服致有白烏玉漿之瑞民為之謡曰我有丹陽山出玉漿濟我民夷神烏来翔累功封楚國公卒諡襄豆盧毓勣子漢王諒出鎮并州毓以妃兄為長史累功授儀同三司及煬帝即位諒謀不軌苦諌不從語留守朱濤曰王搆逆吾軰豈可孤負國家邪當出兵掠之後為諒所害詔贈大将軍封正縣侯諡愍子願師襲儀同三司唐李惠登營州栁城人為平盧軍禆將安禄山亂従董秦泛海後為隨州刺史興利去害為政清静居二十年田畆闢户口自増人歌舞之累遷御史大夫卒贈洪州都督李光弼營州栁城人郭子儀薦其能授河東節度使後累功進封臨淮郡王卒諡武穆光弼用兵謀定而後戰能以少擊衆唐室中興世推其功云田𢎞正北平盧龍人為人忠孝畏慎為魏博節度使封沂國公元和間詔命韓愈撰其先廟碑銘周寳平州盧龍人曽祖待選為魯城令安禄山反拒戰死之祖光濟左賛善大夫父懐義工部尚書寳仕武宗朝為檢校工部尚書節度涇原務力耕聚糧二十萬斛號良將中和初進同平章事兼天下租庸副使以功封汝南郡王宋郭瓊平州盧龍人初仕契丹後歸漢歴團練防禦周初知宗正少卿事宋初以右領軍衛上将軍致仕歸洛陽瓊雖起卒伍而尊禮儒士孜孜樂善葢武臣之賢者也姚内斌平州盧龍人初仕契丹後歸周為汝州刺史吏民詣闕舉留入宋從平李筠後為慶州刺史在郡十數年西夏不敢犯塞以其武猛號為姚大蟲子承賛為閣門祇候死于陣承鍳殿中丞陳思讓盧龍人初仕後唐及晋以功累官坊州刺史入漢周歴官刺史團練使從世宗北征為關内都部署宋加檢校太傅卒贈侍中陳若拙思讓孫㓜嗜學太宗時舉進士甲科累官殿中侍御史歴四川河東轉運使擢諫議大夫出知永興鳳翔入拜給事中知澶州遼趙思温盧龍人少果鋭膂力兼人仕為干州刺史遷漢軍都團練使伐渤海力戰㧞扶餘城身被数創太祖親為調藥後以功擢檢校太保保静軍節度使卒贈太師衛國公金劉敏行平州人自太子校書郎遷肥鄉令嵗饑盗起民不敢出城耕種敏行白州借軍䕶民日夜躬親廵邏民遂安業九遷為河東路轉運使趙興祥思温六世孫父瑾遼静江軍節度使興祥初以父任入官後仕金天眷初累官同知宣徽院事遷至太子少傅封申國公趙質思温裔大定末舉進士不第隐居燕城南教授章宗甞幸其齊舍見壁間所題詩賞其志趣不凡召至行殿命之官困辭章宗益竒之賜田千畆復之終身趙思文平州人累官至禮部尚書時朝廷多難思文在間闗覊旅中未嘗墮於非禮時人稱之王元粹平州人為南陽酒官有詩名詩見中州集元姚樞平州栁城人有王佐才世祖召至首陳帝王平治大經世祖嘉納自是内脩外攘之政咸委任焉累官至翰林學士承㫖卒諡文獻子煒官至平章政事李彥忠永平人性至孝父䘮廬墓八年不至家至治中旌之姚燧樞之從子少從許衡遊以真知實踐為事為文閎肆該博有西漢風累官至翰林學士承㫖所著有國統離合表牧菴集周宏遷安人為無極寕昌昌黎三縣尹在昌黎時程思中作亂宏率其民赴永平城拒守城䧟被執宏不屈七日不食罵不絶口而死陳顥盧龍人為集賢殿大學士政事無不與聞科舉之行顥賛助之力居多每侍仁宗燕間輒取聖經所載大經大法有切治體者陳之每見嘉納顥先後居集賢署好薦㧞士類有詰之者曰吾寕以謬舉受罰蔽賢誠所不忍卒諡文忠追封薊國公子孝伯敬伯俱仕有名龎遵永平人母病腫三年不能起忽思食魚遵求于市不得歸途嘆恨忽有魚躍入其舟作羮以獻母悦而病瘥夲朝習成盧龍人洪武中以才能擢用歴陞湖廣按察司僉事温原樂亭人洪武中領鄉貢歴職勤能官至都察院左僉都御史史怡樂亭人永樂中以守城有功授户部郎中累官江西布政司左㕘政祖述昌黎人永樂中由太學生擢嘉定知縣在任克謹累遷福建布政司右㕘政李樂樂亭人永樂中由國子生拜監察御史在軄有聲遷山東按察司副使宋禮撫寕人由進士累官工部尚書疏通漕河世受其利立廟祀之才寛遷安人由進士知商河縣平易近民官終都御史李宗商樂亭人登𢎞治庚戌進士蒞官以才能著稱吳吉灤州人舉正徳戊辰進士敭歴中外以廉平著譽士論重之列女陳氏營州人父陘累官司徒陳氏通經義覧詩賦輒能誦年二十以歸應州邢簡孝舅姑閨門和睦有子六人親教以經後二子抱樸抱質皆仕遼位宰相卒贈魯國夫人周氏樂平石城人李伯通妻年十六適伯通生一子名易金