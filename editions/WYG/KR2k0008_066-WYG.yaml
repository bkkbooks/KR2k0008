墓巴公冢在衛城南二里俗傳昔有巴國大柵王世𦵏于此歴年雖多累累尚可辨古蹟廢亭州在衛城東一百七十里後周置以都亭山為名隋併為庸州徙置鹽水縣清江廢縣在衛城東十里後周于此置清江郡隋初郡廢置清江縣後廢鹽水廢縣在衛城東四十里後周置縣并置資田郡隋初郡廢大業初以縣屬清江郡開夷廢縣去衛城六十里後周置飛烏縣隋初改曰開夷唐廢信陵廢縣在衛城南七十里銀山廢縣在衛城西一百八十里施王屯在衛城南一十五里輿地唐記云州有施王之餘址故以為名葢謂此也仙人宅在衛城北七十里硝塲在大田所北一百里懸崖数千丈下有河渡其半崖一孔勢若城門上産硝土仙掌在大田所西三十里懸崖壁立上有白色如掌其下有黒跡如虎形名宦唐南承嗣歴施涪二州别駕栁宗元稱其服忠思孝無替負荷承嗣霽雲之子也張道古景褔中為右拾遺上疏言五危二亂七事責官施州李超庸州清江令治績顯著為當時最及去民間立祠祀之房武為施州刺使有遺愛吏民思之宋侯延賞咸平間為施州廵檢使蠻民懷服真宗嘗召問蠻事延賞言民無他求惟欲鹽耳乃召䕫路轉運使丁謂措置謂即傳告陬落羣蠻感恱因相與盟約不為冦抄且曰天子濟我以食鹽我願輸以兵食自是邉糓有三年之積龎恭孫崇寕中通判施州部蠻叛恭孫說䧏而斬之任伯雨施州清江主簿郡守檄使蒞公庫笑曰里名勝母曽子不入此職何為至我哉拒不受李周通判施州州界羣獠不習服牛之利周為辟田数千畆選知田者市牛使耕軍食頼以足程公許通判施州當兵将潰奔之後盡利佐之節浮費疏利源民不増賦而用足夲朝朱永施州衛指揮僉事洪武初蒞職開創衛治有功人物宋詹邈施州人元祐三年舉進士第一夲朝陳鑛施州衛人父隆樂善好施卒年八十九一日取大麓焚于庭皆負劵也鑛性至孝母夏遘疾慮不起乃陳刀几上旦夕拜禱刀忽躍起自割肋左取肝方寸和粥進母以桑皮線紉其創母疾送愈父母歿哀毁骨立殆無人形逾年而卒省志張森施州衛人生而母目忽盲森常以舌䑛之二十餘年母目復明人以為孝感省志列女周氏施州衛陳瀛妻瀛為監生卒其時周年二十二無子父母欲奪之周誓死守節以終省志永順軍民宣慰使司東至岳州府澧州慈利縣三百九十里西至保靖州宣慰司二百二十里南至辰州府沅陵縣三百一十里北至永定衛二百九十里自司治至南京三千八百里至京師七千三百里建置沿革禹貢荆州之域天文翼軫分野古蠻夷地春秋楚國之境秦屬黔中郡漢以後為武陵郡地隋為辰州地唐天授初析置溪州或為靈溪郡五代時屬楚馬氏宋初為氶順州及上下中溪三州嘉祐中溪州刺史彭仕羲叛臨以大兵仕羲䧏熈寕中築下溪州城賜名㑹溪𨽻辰州元時彭萬潜自改為永順等處軍民安撫司後彭天寳又改宣撫司夲朝洪武二年内附六年陞為永順等處軍民宣慰使司𨽻湖廣都司領州三長官司六南渭州宋為覊縻州元屬新添葛蠻安撫司後廢夲朝洪武二年復置改今屬施溶州宋為溶州元為㑹溪施容等處屬思州軍民安撫司後廢夲朝洪武二年置施溶州改今屬上溪州宋初有上溪中溪下溪三州後廢夲朝洪武二年置上溪州及改今屬臘惹洞長官司麥著黄洞長官司驢遲洞長官司施溶溪長官司以上四長官司俱元置屬思州軍民安撫司夲朝改今屬白崖洞長官司元置屬新添葛蠻安撫司夲朝改今屬田家洞長官司夲朝置郡名靈溪唐名㑹溪宋名形勝依山為郡乃四通八逹之地新志東抵荆湘西通巴蜀南近辰陽北距歸峽新志風俗擊銅鼓以祀神鬼宋史夷獠疾病擊銅鼓沙鑼以祀鬼神漁獵飬生刻木為契新志上民裔出槃瓠身服五色斑衣刀耕火種漁獵飬生不曉文字刻木為契親死則啜粥素食鄉團老少弔而皆泣逾月則釋服矣短裙椎髻常帶刀努同上土産水銀丹砂黄蠟䧏香麝香石英蘭馬野牛猿錦鷄白鷴保靖州軍民宣慰使司東至鎮溪千戸所界一百八十里西至施州大田軍民千户所界三百里南至四川酉陽宣撫司界一百八十里北至永順宣慰司界四十里自司治至南京三千八百里至京師七千三百里建置沿革禹貢荆州之域天文翼軫分野隋為辰州地唐為溪州地宋置保静州屬荆湖北路元為保靖州屬新添葛蠻安撫司夲朝初置保靖州安撫司洪武六年陞保靖州軍民宣慰使司𨽻湖廣都司領長官司二而境内隂隆江杜望滑石江三廵檢司則直𨽻湖廣布政司五寨長官司唐為宋沱洞烏引洞蘆荻洞杜望洞白岩洞五寨命田氏世官斯土以控蠻夷宋元因之夲朝初五寨長官田文歸附置今司筸子坪長官司永樂三年置郡名保静宋名形勝四山環抱澗水中流新志四面山巒崇炭叠聳環抱城郭澗水中流風俗喜食腥膻滛祀邪鬼新志土民服花衣短裙露頂赤脚被髪椎髻好持刀鎗喜食腥膻不知五常嵗時殺牛屠狗滛祀邪鬼刀耕火種為業同上土産丹砂水銀五寨長官司出黄蠟䧏香豹熊猿豺獺竹鷄白鷴宣慰司境出明一統志卷六十六
