棠宣徳中知郴州政聲丕著時沔陽知州李震桂陽知州黄昻陳道生楚中稱四賢守省志林廷賛天順中知永興縣剛正自持勿惮權勢臨民愷悌平易有古循吏風治行為當時第一省志韓宗尭𢎞治中授郴州學正文學優贍遷蒲圻令補安仁縣廉勤足稱丁丑春猺冦破縣帥兵往禦被執不屈以大義諭賊賊不敢害省志程瓊知興寕縣縣故有土城賊易而攻之瓊勵士卒俻守戰之器賊不能犯辛未羣盗又為吕公車攻城七日城中士庶無不泣涕震恐瓊率衆守且飲笑自如賊知城中有偹遂自散去省志流寓秦觀揚州人宋元祐中為秘書省正字兼國史院編修官紹聖初坐黨籍出通判杭州再以御史論其増减實録監䖏州酒稅尋削秩徙郴州安置劉奉世臨江人敞子仕宋為僉書樞宻院事紹聖初知成都府為曽布所譛責光禄少卿分司南京居郴州常云家世事君内省不愧恃士大夫公論而巳得䘮常理也正湏安以䖏之陳瓘沙縣人仕宋權給事中宰相曽布使客餌以官爵瓘不聴乃以一書論其過布見大怒争辯移時至箕踞誶語瓘色不為動崇寕中除名竄袁州後移郴州陳師錫建陽人宋徽宗時為殿中侍御史以言事忤㫖出知穎州後削官安置郴州卒師錫始與陳瓘同論蔡京蔡卞時號二陳曹輔南劍州人仕宋為秘書省正字徽宗多㣲行輔上䟽切諌太宰余深曰爾小官何敢論大事對曰大官不言故小官言之官有大小愛君之心一也少宰王黼奏不重責輔無以息浮言遂編管郴州處郴州六年怡然不介意折彦質雲中人宋紹興中累官至僉書樞宻院事初趙鼎為相累薦彦質後秦檜專相以彦質為鼎所引郴州安置自號葆真居士人物晉谷儉桂陽人少有志行􅀶渉經史元帝時舉秀才試髙第除中郎尋棄官去唐孟琯郴人元和中進士嘗著嶺南異物志韓愈送琯序云今年秋見孟氏子琯于郴年甚少禮甚度手其文一篇甚鉅退披其篇以讀之盡其書無有不能其見重如此劉瞻桂陽人舉進士􅀶學宏詞歴官翰林學士中書平章以同昌公主薨逮繋醫百餘人瞻固争罷為荆南節度使僖宗立復拜中書侍郎為人鯁直廉約俸餘濟親舊之貧家無留儲宋黄觀象夲江夏人曽祖為資興令因家焉觀象居父母䘮哀毁踰禮廬墓六年墓側産芝朝廷賜栗帛蠲徭役以旌之邵􅈌桂陽人袓崇道州録叅父簡連山令􅈌㓜嗜學太平興國巾進為邵陽主簿通判荆南歴知忠郎兖廣諸州所致皆有循良之政宋史列于循吏曹靖郴人性孝友嘉祐中為益陽令有美政去後民思累官尚書比部郎知賔州黄庭堅為作善政頌稱其御吏嚴而不殘使民寛而不弛陳純夫永興人元豊初監舉第一尋以易經魁省試累官通奉大夫後閒居以文自娛卒年八十六杜唐卿宜章人舉進士調浮梁主簿至官興學校未幾芝生于學從之㳺者二百餘人有善政百姓思之後累官司農朱輅郴人紹聖間登第通判邵陽累治疑獄人以不寃後知郴州終任獄無一死罪甘露䧏于州署前之松逾月松下地猶潤人謂其善政所感姚宋佐靖康間其父寓郴生宋佐少嗜學舉進士初調湟州户椽再仕八桂教官以詩名性廉介雖兩仕而家貧自號北湖有文集蔵于家雷應春郴人以詩擅名累官監察御史首䟽時相繼忤權貴出知全州弗就歸隠北湖後知臨江軍安静不擾嘗欲城新淦以俻不虞當路沮之及己未之亂臨江倉卒無偹人始服其先見終江東憲所著有洞庭玉虹日邉盟鷗清江諸集夲朝曹嗣宗郴州人少有志操洪武間第進士授西川逹縣知縣有能名擢陜西按察司僉事何懐輝桂陽人以刑律精通保任大理寺評事遷都督府經歴勤能益著尋陞通政司叅議時論偉之朱光才郴州人永樂初第進士歴官户部郎中綽有休聲陞陜西布政司叅議鄺埜宜章人永樂間進士第授監察御史陞陜西按察司副使風紀振揚擢應天府尹廉公有為民懷其惠累官兵部尚書操履端嚴蒞官勤子慎扈從北征没于軍贈少保録其一朱英桂陽人正統乙丑進士拜監察御史有直聲累官右副都御史掌都察院事所至征討有功安邉固圉具有碩畫卒贈太子少保謚恭簡子守孚進士省志歐陽復桂陽人景㤗辛未進士厯官泉州知府政平刑簡釋囚致雨遘疾郡人禱于神以祈祐者千餘人及卒哭之如喪考妣立祠祀之焉省志曽鑑桂陽人天順甲申進士授刑部主事辨寃獄累官工部尚書諸所營造勞績顯著論功特賜玉帶進階榮禄大夫以病乞休去省志王廷桂宜章人領天順壬午鄉薦授贑州府同知時巨冦流刼州縣廷桂率鄉兵征之死于難事奏聞贈官録其子省志鄧庠宜章人成化壬辰進士授行人拜監察御史䟽陳時事力詆權要累官户部尚書平生謙和冲約不務矯飾故所至輙有實惠及民時稱長者省志何俊郴州人登成化己丑進士授南京户部主事擢雲南按察司僉事兼督雲貴學政隨俗導化濟之以嚴凡所陶鑄多中器使乞休無他嗜蓄古醫方所著有訥稿子説成化中鄉試第一人舉進士河南督學僉事學政修舉子孟春登科説遂歸休省志黄珙永興人成化辛丑進士知萬載縣裁决如流庭無稽訟儲糓備荒修學宫範祭器招撫流亡練兵䋙盗擢刑部主事執法平允如雪王輔之寃辨劉雲之誣衆議韙之陛江西按察僉事以母老乞終飬母卒廬側哭聲振林麓年七十五終省志崔巖郴州人成化辛丑進士歴户部郎中陞山東江西河南布政使轉左都御史擢南京工部左侍郎卒巖平生嚴肅不茍合居官三十餘年田園如故云省志曽䡵永興人成化乙未進士歴刑部員外郎值平陽有訟田乆淹及蘇州衛誣殺人罪者繋十餘年䡵往訊立决出補紹興知府均輸薄賦釐弊補役尋乞休歸年七十四卒子介全念皆進士省志髙𦙍宜章人成化宋進士授行人奉使朝鮮稱職擢御史出按浙江大同嘗疏正武臣罪状發浙中隠漏得數百萬金最多振刷省志何孟春郴州人進士授主事累官吏部右侍郎嘉靖初詔議尊親禮力諍泣諌疏凡萬餘言上諭之再三跪執弗起乃左遷南京工部右侍郎尋歸所著有餘冬録省志喻江郴州百户正徳間峒冦大作江分營宜章之章橋遇敵死之鄉民為立祠以祀之省志范輅桂陽人正徳辛未進士授行人拜監察御史清戎江西忤寕庻人宸濠謫四川宣撫司經歴起擢褔建僉事江西副使適宸濠謀反輅首撻其樂工殺之誣繋獄除名事白復起山東副使陜西叅政輅有氣節歴官有能聲時論多稱之省志列女鄧氏桂陽朱守良妻𢎞治中有強賊歐執欲強凌之鄧呼天罵賊不屈而死省志李氏興寕何冲孚妻嘉靖中猺冦廹之罵賊見殺省志文璋妻朱氏郴人年三十而寡撫子悦娶黄氏亦寡無子家貧姑婦相守世稱雙節省志仙釋蘇眈漢郴人事母以孝聞嘗遇異人授神仙術因侍膳母思鮓即出市鮓以獻問所從來曰便縣母始異之一日忽洒掃庭除母問其故曰仙道已成上帝來召母曰汝仙去吾誰飬乃留一櫃云所需即有又云明年大疫取庭前井水橘葉救之眈仙去巳而果疫母日活百餘人宋元符中賜號冲素真人廖師郴州人唐懿宗召入行道術有驗後乞歸山韓愈為文送之云郴之為州當清㳤之氣意必有魁竒者生其間廖師氣専而容寂多㙯而善逰豈吾所謂魁竒而溺于老氏者耶後于靖褔山白日昇天劉􅝯唐宰相瞻之兄好仙術有道士至其門曰能相師乎曰諾乃隨入羅浮山後四十年瞻被逐至潮臺泊舟有少年冐雨而來乃􅝯也云已列仙矣悲喜不勝一夕不見智儼郴之右姓曹氏子在孕不嗜葷成童不嗜戯生九年為僧抱經笥入岣嵝從名師執業曹王臯鎮湖南請為人師登壇三十八載得度者萬有餘人施州衛軍民指揮使司東至荆州府巴東縣五百里西至酉陽宣撫司九百里南至安定峒六百八十里北至石柱宣撫司七百五十里自衛治至南京三千四百五十五里至京師七千一百五十里建置沿革禹貢荆梁二州之域天文翼分野春秋為巴國之界戰國為楚巫郡地秦屬黔中郡漢屬南郡三國呉及晉屬建平郡後周于此置亭州及清江郡隋初郡廢州存大業初改名庸州治清江縣尋改州為清江郡義寜初改為施州唐以州𨽻江南道開元間改清江郡天寳初改清化郡乾元初復為施州宋屬四川䕫路元以清江縣省入州屬䕫州路夲朝洪武初仍置施州屬䕫州府及置施州衛二十三年省州入衛改置施州衛軍民指揮使司屬湖廣都司編戸三里領軍民千戸所一宣撫司三安撫司八長官司八蠻夷長官司五而容美宣撫司亦在境内焉大田軍民千戸所在衛城西北三百五十里洪武二十三年始置散毛千戸所尋改今名𨽻施州衛施南宣撫司在衛城東一百里洪武二十三年定其地永樂三年置施南長官司尋改宣撫司領東鄉五路忠路忠孝金峒四安撫司𨽻施州衛東鄉五路安撫司領搖把峒上愛茶峒下愛茶峒三長官司鎮逺隆奉二蠻夷官司𨽻施南宣撫司搖把峒長官司上愛茶峒長官司下愛茶峒長官司鎮逺蠻夷官司隆奉蠻夷官司忠路安撫司領劒南長官司𨽻施南宣撫司劒南長官司忠孝安撫司𨽻施南宣撫司金峒安撫司永樂五年置領西泙蠻夷南𨽻施司宣撫司西泙蠻夷官司散毛宣撫司在衛城西二百二十里元為散毛峒置散毛沿邉軍民宣慰使司夲朝洪武四年改為散毛沿邉宣撫司二十三年因洞蠻作亂發兵勦捕軍民閧散後招服永樂九年置為散毛長官司十三年復陞宣撫司領龍潭大旺二安撫司𨽻施州衛龍潭安撫司永樂中置𨽻散毛宣撫司大旺安撫司領東流臘壁洞二蠻官司𨽻散毛宣撫司夷東流蠻夷官司臘壁峒蠻夷官司忠建宣撫司在衛東二百五十里元置忠建軍民都元帥府夲朝洪武六年改置宣撫司尋廢永樂四年復置領忠峒高羅二安撫司𨽻施州衛忠峒安撫司元置湖南鎮邉宣慰司後廢夲朝永樂四年改置今司𨽻忠建宣撫司高羅安撫司元置髙羅宣撫司改安撫司後廢夲朝洪武六年復置尋廢永樂五年復置領木册長官司𨽻忠建宣撫司木册長官司鎮南長官司在衛城南二百五十里元置湖南鎮邉毛嶺峒宣慰司改鎭南宣撫司後廢夲朝洪武四年復置二十三年廢永樂五年改置長官司直𨽻施州衛唐崖長官司永樂四年置直𨽻施州衛容美宣撫司在衛城東南二百一十里夲朝洪武四年置後廢永樂四年復置領椒山瑪瑙等四長官司椒山瑪瑙長官司五峯石寳長官司石梁下峒長官司水盡源通塔平長官司以上四長官司俱洪武六年置至十四年廢永樂五年復置𨽻容美宣撫司郡名清江後周名清化唐名形勝東北入南郡西北入巴郡圖經東北入南郡之巫縣西北入巴郡魚腹胊東入南郡之銀山南入牂牁之夜郎山明水秀圖經五峯環其東客星峙其西衛志巴荆之㑹同上東連荆楚西抵巴蜀地當巴荆之㑹隠然為西南重鎮風俗其俗純朴唐杜甫詩其俗則純朴不知主客民襍夷獠猶近華風衛志地僻山深民襍夷獠伐木燒畬以種五􅂖捕獵漁獸以供庖厨俗尚節儉猶近華風云男不裹頭女衣花布施南等宣撫司志男至老不裹頭女衣花布親䘮宰太牢謂之打𦵏就日而埋不行祥除之禮每嵗春季祭山水神以祈秋實山川囘龍山在衛城内昻然竒秀如龍囘顧山下有圓通寺象耳山在衛城内俗名舵樓山上有脩篁佳木又城内一里有象鼻山山下有流觴曲水飛鳯山在衛城北以形似名宜山在衛城西北與月臺對峙俗名宜娘山文筆山在衛城南二里卓立如筆亦名䨇翠山此山之西又有丹鳯玉女二山翠濤山在文筆山西南山如波濤層擁此山之外有石髙起数十尋有竅南北透明俗號通明山連珠山在衛城東二里五峯相峙如貫珠亦名五峯山宋政和中封山神為嘉惠侯賜廟額永褔與此山相接控清江之口者曰