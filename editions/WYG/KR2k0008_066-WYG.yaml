body:
  text: 明一統志卷六十六明李賢等撰靖州東至寳慶府武岡州界二百六十里西至貴州黎平府界一百六十里南至廣西栁州府融縣界一百八十里北至辰州府沅州黔陽縣界一百八十里自州治至南京三千五百七十里至京師六千一十里建置沿革禹貢冀州之域天文軫分野秦為黔中郡地漢初屬武陵郡武帝時屬牂牁郡唐為溪峒誠州五代時湖南馬希範有其地後周時楊正巖以十洞稱徽誠二州宋太平興國中其酋長楊通藴内附熈寜中收復元豊中仍為誠州移治渠陽縣元祐初改渠陽軍尋廢為寨屬沅州後復置誠州崇寜初改為靖州𨽻荆湖北路元陞為靖州路後䧏為州屬辰州路夲朝洪武初陞靖州府九年復改為州以附郭永平縣省入直𨽻湖廣布政司編户二十二里領縣三㑹同縣在州城東北一百里舊為狼江寨地宋崇寜初置三江縣屬靖州尋改㑹同縣元仍舊夲朝因之編戸二十八里通道縣在州城南一百里夲唐恭水縣屬郎州貞觀中改曰羅䝉後省入遵義縣屬播州宋為羅䝉寨置羅䝉縣崇寕初改為通道縣屬靖州元仍舊夲朝因之編户五里綏寕縣在州城東一百一十里夲唐溪洞徽州之地宋置蒔竹縣屬邵州熈寕中廢崇寕中復置改曰綏寕縣紹興中屬武岡軍元屬武岡路夲朝洪武三年改今屬編户三十五里天柱縣在州城西編户闕里郡名渠陽宋名形勝㨿夷播敘三州之境圖經東通于邵南通于融同上北接武陵東亘長沙郡志山川險阻靖州志漢牂牁武溪之間乃荆楚西南百蠻衿喉之地山川險阻為辰沅寳武之藩籬南距廣西東障湖南宋魏了翁觀亭記風俗嗜好居處頗與巴渝同俗隋志嗜好居處頗與巴渝同俗夲其所出承槃瓠之後服章多以斑布為餙民俗亦醇宋魏了翁云靖為天下窮處其蕞陋又在峽郡下而風土不惡民俗亦醇時嵗豊則物賤如土要約以木鐡為契圖經民皆槃瓠餘種其計嵗月率以甲子其要約以木鐡為契其樂器有愁笛壺笙其兵器有甲胄標牌刀及偏架弩奉約束如中州宋汪藻靖州記與蠻壌犬牙嵗乆聲教所覃去椎髻之習而飾冠巾轉侏􅍣之音而通字畫奉官吏約束一如中州民淳好儉俗尚巫鬼州志山川五老山在州城東五峯相連侍郎山在州城南一百八十里廣西分界處宋侍郎程敦厚言事忤秦檜責居靖州嘗㳺此山因名飛山在州城西北一十五里俗呼勝山比諸山甚高峻突出雙峯四面斗絶其上平廣夷人保險之所宋大觀初于此置飛山堡寳溪山在州城東北山下有溪大抵洞中諸溪多産金故以寳名香爐山在州城北一十五里有石突出山前状若香爐青蘿山在州城南二十里一名大青山烟蘿蒼翠故名九疊山在州城南二十里山勢盤紆九峯相次每日晴烟歛峯巒競翠儼若畫圖崖屋山在㑹同縣治北白社山在㑹同縣東五十里旺溪山在㑹同縣西一百六十里四山相照二十餘里藍溪山在綏寕縣北五十里風門山在綏寕縣東一百二十里褔湖山在通道縣北六十里比諸山最蒼翠中有神祠以祀山神夷人敬畏不敢樵採宋元豊中通道廣西正出是山之間天塘嶺在綏寕縣西三十里菖蒲嶺在綏寕縣去州城東六十里鷺鷥嶺在綏寕縣南一百里以形似名佛子嶺在通道縣東南一百里廣西分界處古城巖在州城西三十里洞穴深廣可六七里土人嵗以正月朔旦㳺焉中洞巖在州城西一百里來威寨中有卯石鑚字巖去綏寕縣六十里元陳敬詩仰面半窺山月小囘頭千里洞雲低郎江在㑹同縣西南一百五十里源出湖耳山即唐之郎江宋郎江寨以此名沅江在㑹同縣西一百五十里源出西南蕃界産九肋鱉多星江在通道縣宋元豊中置多星堡以此為名芙蓉江在通道縣治南來自湖南葢唐之芙蓉縣溪也渠河在州城東源出佛子嶺下合衆流環州城㑹于郎江清陂湖在㑹同縣南一十里有十餘大石可坐葢士夫㳺息之所宋鄭璪倅是州㳺此有題刻于石潩溪在州城南源出古城逹于渠河六王溪在州之廢永平縣貫堡寨若水溪有二一出水州楠木山一自湖南界來宋崇寕初置若溪寨以此為名大金溪在永寕縣治東鑿字溪在通道縣境接廣西界宋元豊間於溪旁得古碑乃唐乆視中遣将王思齊率兵征蠻過此隔礙山險負舟而濟鑱石以記嵗月而夷人以為鑿字溪雄溪在㑹同縣東一百里其名凡九曰郎曰㵲曰雄曰辰曰龍曰敘曰桂曰武曰酋而雄為衆水之㑹故又呼雄溪一名洪江龍井澗源出飛山繞州城逹于渠河玉山潭在㑹同縣其水㑹于渠河入于郎江五虎潭在佛子嶺下潭傍五石相對如虎故名洗馬池在飛山上舊為屯兵之處龍井在飛山上嵗旱禱雨多應安樂井在州城内水清味甘病者飲之多愈故名銅鑼灘在州城西世傳宋楊文廣妹討儂智髙經此墜銅鑼于水因名土産葛布金州縣俱出九肋鱉沅江出烏頭五倍子州境出公署靖州衛在州治東洪武三年建守禦天柱千户所在州城西北二百里洪武二十五年建屯鎮汶溪後千户所在州城西北二百五十里洪武三十年建學校靖州學在州城南宋建于州治後元燬夲朝改建于此㑹同縣學在縣治東綏寜縣學在縣治西南通道縣學在縣治東北俱宋建夲朝重建書院鶴山書院在州治北宋魏了翁建自為記鶴山了翁號也書院今為𤣥妙觀作新書院在州學旁宋黄棨知靖州時建取書作新民之義宫室圍香閣在州治北宋陳謙建潩溪閣在潩溪旁宋守許成之建瀛州亭在州學前許成之建名曰登瀛以寓期望後人之意觀亭在渠河之陽宋侍郎陳敦厚以言事忤秦檜謫居靖州土人為作亭熈春臺在州城西潩溪遶于左飛山峙于右上有一覧亭宋通判陳宿建楚湘臺在州城南夲朝楚王湘王征苖嘗駐軍於此皇華館在州治東宋葉窩倅靖州時建關梁豊山堡在㑹同縣境宋元豊中置屬渠陽縣尋廢崇寕初復置黄石寨在綏寕縣境宋置收溪寨在通道縣南五十里誠州與廣西融州古無道路宋知州周仕隆始遣人由小徑趨廣西觀山川形勢自寨至廣西佛子坡三十里夲朝設廵檢司防守大田堡在州境宋元豊中置五堡曰十家滻村多星天村大田元祐中廢崇寕初復置又増置羊鎮零溪等堡通濟橋在州城南潩溪之上南薫橋在通濟橋南通津橋在綏寕縣治南三江渡在㑹同縣南五里又縣西北四十里有朗江渡西北一百里有江東渡雙溪渡在綏寕縣東五十里寺觀光孝寺在州城南宋建夲朝洪武間重建勝力寺在綏寕縣城西元建夲朝洪武間重修𤣥妙觀在州治北宋建夲朝洪武十五年重修隠真觀在㑹同縣城外祠廟威逺侯廟在州城西侯名再思誠州刺史楊氏之袓宋紹興間封威逺侯立廟祀之淳熈間加號英濟後廟燬夲朝正統十一年重建飛山廟有二一在綏寕縣治西一在通道縣治東忠節祠在州治南州人宋以方死宸濠之難建祠祀焉古蹟馬王城在州城西一十里楚馬氏時飛山洞酋潘全盛遣其黨楊承磊畧武岡馬氏遣吕師周討之援蘿躡石直抵飛山分軍布柵全盛大駭承磊來戰師周破其軍縳降者為鄉𨗳襲飛山擒全盛斬之盡平巢穴今環飛山壕塹遺址尚存廢誠州在州境渠河之陽宋置廢徽州在綏寕縣宋置輿地紀勝云今溪峒猶收得古徽州印及虎符廢鷄翁縣在州境唐武徳中置此縣屬夷州尋廢貞觀中復置永徽中廢宋羅䝉寨去此不數十里廢恭水縣在州境唐置此縣屬播州貞觀中改曰羅䝉後省入遵義廢永平縣在州城内夲沅州貫保寨地宋元豊中改渠陽縣屬誠州尋移縣為州治崇寕初改曰永平屬靖州夲朝省入州諸葛營在州城西蜀漢諸葛亮撫溪峒諸蠻嘗駐軍于此新民學宋紹興中靖州乞依舊置新民學教飬溪洞歸明子弟以三十人為額從之蓮荷壇在綏寕縣唐乾元初道士申㤗芝於蓮荷嶺上築壇三級奏上帝㫁絶猺賊賜號安國太師銅鐘在飛山之陽唐時山有延夀寺後寺廢而銅鐘為夷人取歸潭洞尚存名宦宋孫覧荆湖開疆命覧以員外郎往相其便覧言沅州所招溪洞勿建官置戍以為民困自誠州至融江口可通西廣鹽以省北道餽餉悉從之周士隆知靖州遣人自收溪寨通廣西黄棨知靖州建作新書院講學授徒許成之知靖州有惠政于民朱希顔知永平縣民懷其惠為立生祠夲朝王尚文洪武三年知靖州府撫字有方民皆歸服蔣資洪武間知㑹同縣有善政重建學校人民稱頌張翼永樂五年知通道縣以廉能得民心蘇忞知靖州嵗饑賑貸民頼全活與苗賊戰死程翰天順中知㑹同縣廉公律巳平易近民發奸摘伏無有遁其情者建立學宫公署壇壝倉舍民不告勞而百廢具舉蔣淇天順中知靖州興學校勸農桑均徭役招逃亡平詞訟禁奸宄致民苖順服有詔旌異之省志呉震成化中知靖州時大兵討苖以經理勞瘁卒于官百姓至今悲悼省志汪箎成化中知綏寕縣廉謹公平得為父母之体勤種植興學校禁民作佛事弊絶風清稱良吏焉省志鄧旻靖州衛指揮正徳間賊逼州境旻與遇于䨇魚嶺大戰力盡死之省志流寓程敦厚仕宋為侍郎言事忤秦檜謫居靖州魏了翁仕宋為起居舎人以論事鯁直史彌逺諷御史梁成大李知孝劾之遂謫居靖州築鶴山書院六年閉户讀書著詩書禮易春秋要畧及語孟要義凡百餘卷後奉祠歸蜀人物宋楊通寳誠州人太平興國五年納土來貢命為誠州刺史淳化初其刺史楊正巖復來貢是嵗正巖卒以其子通盈繼知州事楊光富誠州人熈寕史率其族姓二十三州同歸附詔以光富為右班殿直繼有楊昌銜者亦願罷進奉出租賦為漢民亦詔補右班殿直獨光僣頗負固未幾亦䧏乃與其子日儼請于其側建學舍求名士教子孫詔潭州長史朴成為徽誠䓁州教授光僣皇誠使誠州刺史致仕元李燾靖州人延祐中領鄉舉後仕為夲州判官有政聲夲朝鄧旻靖州衛指揮𢎞治末守備黔中有威名尋乞歸正徳間洞㓂大作當道檄旻領兵禦敵死之土人立廟祀之志省曹鵬靖州衛指揮正徳中徳安值流賊劉六等破應山縣總帥令督戰鵬忠勇不避血戰而死事聞賜祭徳安仍立祠祀之省志列女王扆女扆為夲朝靖州衛指揮僉事有女許嫁陶絃未行而絃卒女聞之義不忍他適遂自經死因合塟于城北事聞表其閭墓向氏夲朝靖州衛軍陳均保之妻年及笄歸陳未半載均保以疾卒向氏哀毁既殯後恐父母奪其志遂自經事聞旌表其門薛氏靖州衛武生蔣頴妻年二十二其夫領湖廣巳邜科鄉試赴京溺死于途薛聞訃悲號竟日自經而死天順間聞於朝旌表其門省志劉氏陳儁妻靖人儁任指揮同知陣亡劉以節聞成化中旌之省志方氏王忞妻靖八年二十五忞卒守節五十餘年隆慶六年有司奏聞旌表省志陶氏史斌妻靖州衛人年二十一夫亡守節被旌省志陳氏黄流妻靖人年二十一夫亡撫㓜子以守被旌省志袁氏女伍開衛百户袁傑女也八嵗聘于夲衛指揮王載子王言未婚載犯事病卒言甫七嵗禁追父賍言亦卒袁遂守節節不二至老云省志郴州東至江西吉安府龍泉縣界三百九十里西至衡州府桂陽州界四十里南至廣東韶州府乳源縣界一百九十里北至衡州府來陽縣界一百一十里自州治至南京三千七百里至京師七千三百里建置沿革禹貢荆州之域天文翼軫分野春秋戰國屬楚秦屬長沙郡項羽徙義帝都郴即此漢初於郴置桂陽郡屬荆州三國時呉蜀分荆州以湘水為界桂陽以東屬呉晉仍為桂陽郡初屬江州後屬湘州隋廢郡置郴州大業初復為桂陽郡唐置郴州天寳初改桂陽郡乾元初復為郴州𨽻江南西道五代時晉改為敦州漢復為郴州宋𨽻荆湖南道元置郴州路𨽻湖南道宣慰司夲朝改為郴州以附郭郴陽縣省入直𨽻湖廣布政司編户十二里領縣五永興