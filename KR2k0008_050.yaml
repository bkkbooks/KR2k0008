悠侯澤之流湖水有塞我思侯德相率立生祠祀之鄭選國初以武略將軍守禦饒州相原隰度營基躬立規制曲盡材用於是隊伍整肅士卒效力洪武初逋冦唐丑人等作亂選擊平之民賴以安饒人立廟祀之李寧洪武初知餘干州材敏有斷盜起攻城寧率鄉兵佐官軍擒其首殺之復以土兵搜山澤散匿者三百人正其罪歲大飢移粟賑濟民懷其惠作遺愛文辜臯洪武初知德興縣宣布號令招撫流亡會冦竊發乃聚民兵保障時開山煉銅為民患乃奏請罷之修建學宫橋梁民樂趨事百里之內雞犬相聞皆臯力也馮允洪武中知餘干縣訪民隱戢吏姦政治嚴明舊囚逸獄者數人部檄縣捕甚急械其親識至允釋之佯為不理密遣人察之得於土窖中民有被盜殺者子以疑似告逮捕無辜三十餘人允齋沐禱神果得殺者性甘淡薄去任囊槖蕭然惟琴書而已李琛洪武中知安仁縣長於治民撫慰勞問如家人父子以故民皆感悅詞訟遂息凡縣治廟學橋梁修建一新清譽甚著李益洪武中為饒州通判後知饒州府在任十有八年習知民情性寬大不事苛細以故民愛之如父母永樂初饒境大蝻益遍告神祗忽大雨如注蝻盡死胡儼餘干縣教諭學有所自動必以禮律己正人士心悅服省志任勉洪武末鄱陽知縣首以禮義亷恥教民公暇即詣學宫講授立易見册分上中下户凡户調則撿實以行升知瀘州鄱民如失父母相與詣闕丐留遂調饒州府同知趙濬恭永樂中知德興縣時田疇多蕪乃丁寧告諭民有力能兼作者聽遂無遺利性尤亷介家事寥落卒之日民皆流涕葉砥永樂中知饒州府虛心延訪民間利病而興除之務息詞訟以故訟簡郡有瓷窯勞夫役奏減四分之一民皆稱便黃通理宣德間以户部郎中知饒州府事建今府治善經略有仁聲省志吳讓宣德間以按察副使謫知鄱陽縣有政聲省志王夀正統間為饒州推官發姦摘伏豪猾屏迹考最遷監察御史省志莊典由進士先知安福縣操履端潔為政有體士民咸信服之後升淮府長史以正直輔導宗藩見重省志王佐景泰間知饒州府諒直平易亷介縝密先任徽州同知去則民上章挽車以留之及去饒民惜之如去徽明年饒民聞佐再來趨迎為之罷市謠曰王佐再來天有眼其得民心如此省志吳繹思天順間由進士為德興令心體充實政事光明士守其教民安其令去任十年民思之不已復立碑以記其政迹省志李聰成化間以郎中出守饒州豈弟仁厚愛百姓如家人省志鄧杞成化間進士為德興令民立德政碑以配吳繹思省志劉渙成化間為鄱陽令清慎亷明愛民禮士治為江西最築墟隄以捍水患長數千丈得田數千畝鄱民至今有賴立祠祀之因築隄得暑疾卒民哀痛如失父母省志王悼成化間任餘干知縣精於吏事綜理無遺省志林祥𢎞治間任饒州教授以正律己以恩義結民遇諸生不啻父兄之於子弟貧不能婚喪者倡義周之困而殆者匡之性敏而才者誘掖之多所成就去後懷其德教建碑於學宫覆之以亭顔曰思服省志李俊饒州守禦正千户正德庚午姚源盜據險為亂官兵夾攻次梁山坂時行伍未集賊乘我虛軍士奔北俊獨奮身直前手射賊十餘力屈受執罵不絶口其弟李二逺馳刀助兄遂同遇害時副千户高鈺百户鄭鑑同死於鋒鏑省志流寓歐陽詢本潭州人唐太宗時歷太子率更令有一帖云年二十餘至鄱陽縣喜其地沃土平衆士往往湊聚僑寓甚久戴叔倫潤州人仕唐歷撫州容管所至稱治後於饒州東湖卜居三十年刺史馬載慕其詩為築隄湖上時往訪之有宅今為薦福寺江萬里都昌人宋咸淳間拜左丞相以襄樊為憂屢請益師與賈似道不合力求歸寓居饒州元兵陷城州人悉遁萬里坐守以為民望兵入其第赴水而死其弟萬頃自南康來省之遇兵不屈罵不絶口而死人物漢吳芮鄱陽人秦時為鄱陽令甚得江湖間人心號曰番君天下初叛秦黥布歸芮芮妻以女因舉兵以應諸侯沛公攻南陽遇芮將梅鋗與偕攻析酈降之後項羽立芮為衡山王鋗封十萬户為侯羽死漢高帝以鋗嘗從入武關故德芮徙為長沙王薨諡文陳靖餘汗人幼慷慨有大志王莽篡漢靖忿恨聞王常起曲阿率義兵赴常署為中牙典軍校尉甚得江湖間心光武時拜散騎常侍以母老乞歸封餘汗侯所著有五經勾沉六義引奧秦漢江左碎録雷義鄱陽人初為郡功曹擢舉善人不伐其功嘗免人死罪罪者謝以金義不受乃密置承塵上而去義後得之其人已死乃以付縣後舉孝亷拜尚書侍郎以纍歸又舉茂材讓於陳重鄉里為之語曰膠漆自謂堅不如雷與陳後拜侍御史卒官南頓令張遐餘汗人幼聰明日記萬言舉孝亷補郡功曹不就十九從楊震震語人曰張遐當為天下後世儒宗建寧間召為石經博士尋以疾還教授諸葛瞻陸遜輩皆其門人卒贈族亭侯所著有五經通義易傳筮原龜原吳越春秋等書晉雷煥鄱陽人妙達象緯張華問斗牛間紫氣煥曰寶劒之精耳當在豐城乃補煥為令至縣掘獄得劔二送一與華或曰得兩送一可乎煥曰靈物終當化去華得劔曰乃干將也莫邪可復至否雖然神物終當合耳後華誅失劔煥卒子葉持劔過延平津墮水中使人探之見兩龍蟠縈葉歎曰先君化去之言張公終合之論此其驗乎范逵鄱陽人舉孝亷嘗過陶侃家侃母截髮易酒延之後言侃於廬江太守薦之侃之知名逵薦之也逵仕至會稽太守陶侃鄱陽人徙家尋陽父丹吳揚武將軍侃歷樅揚武岡令有能名後以功封東鄉侯遷江夏太守元帝時纍遷廣州刺史在州無事朝暮運百甓以自勵後平王敦蘇峻皆有功拜太尉封長沙公二子俱死節瞻贈大鴻臚輿贈長沙守南北朝陸襄餘汗人少有大志與鄉里落落不合越州刺史趙政問之襄曰世降道衰人多趨利是以索居政器之梁武帝捨身事佛襄諌曰人之生死豈能超度苐恐禍至佛不能救不聽出為饒州內史以討賊功封餘汗侯唐吉中孚鄱陽人大厯間與盧綸等皆以能詩名號大厯十才子官至户部侍郎李儼餘干人德宗時為左司諌方士桑道茂奏言奉天有天子氣上欲屠其城儼極諫乞殺桑道茂上悟乃止余勤餘干人纍官工部尚書兼御史大夫上柱國張鵬德興人宣宗時為河東節度掌書記吐蕃犯邊鵬率數千騎敗之懿宗立表為瓊管五州招討使入為金吾羽林二將軍屬蠻人渡瀘出為雍州刺史制置使陳饒奴饒州人年十二親併亡窶弱居喪又歲飢或勸其分弟妹可全性命饒奴流涕身丐訴相全養刺史李復給資儲署其門曰孝友童子寧賡鄱陽人廣明中黃巢為亂賡與弟兖統義兵以拒之保饒歙二州積戰功官至御史大夫與金日安至今皆廟食董全禎德興人天祐中為御史兼八寨將首一日賊自浙東來全禎兵寡不能戰乃自斷其首已而雷電晦𡨕如有戈甲甚盛賊大驚潰邑人廟祀之宋馬遵樂平人景祐中進士擢江淮發運判官盡心漕事入為御史論罷宰相梁適出知宣州後為吏部員外郎直龍圖閣卒遵立朝侃侃遇事規切金君卿浮梁人舉進士纍官至度支郎嘗著易説有文集十五卷熊本鄱陽人慶厯間舉進士熙寧間察訪梓夔兩路取擾邊酋領誅之纍遷集賢殿修撰同判司農侍神宗稱其不傷財不病民後入為吏部侍郎出知洪州卒有文集奏議八十卷孫彥詩宣和中第進士為太學録及張邦昌僣號遂乞致仕程節浮梁人嘉祐間進士纍官遷廣西運使帥桂府甚得人心雖交趾亦曰天子使老成撫我邊鄙我小國豈敢自干天討貢賦不絶節官至寶文閣待制所著有竹溪集張綬德興人嘉祐中權將作監丞按實宋用臣事以聞上直之後除太府少卿諫蔡京議置大錢以二當十為不便上驚曰慶厯已行自是歷外任十八年彭汝礪鄱陽人治平初舉進士第一纍遷監察御史裏行首陳十事指摘利害多人所難言者神宗時又論兵不當以付中人哲宗時權吏部尚書出知成都府未行章數上又降寶文閣待制知江州汝礪平生言動取舍必合於義所著易義詩義詩文凡五十卷都隨餘干人元豐初舉進士有節操嘗以太常少卿使遼既還遼使至必問起居卒官宗正少卿張根德興人元豐間進士調遂昌令乞恩封大父母遂致仕徽宗召詣闕上書願陛下清心省欲以窒禍亂之源積官至淮南轉運使屢建言皆指切時弊權幸側目後安置郴州洪彥升樂平人元豐間登進士第纍遷殿中侍御史孤立任言責論蔡京朋姦誤國及論何執中吕惠卿等條托其過後遷給事中嘗謁告一日而張商英復官之旨經門下彥升封駁出知滁州加徽猷閣待制知吉州都頡餘干人少貧苦學元祐間間居作七談述鄱陽人物山川之勝辭豔而意逺後官至司農少卿鍾傳樂平人本書生紹聖中以章惇薦命幹當熙河涇原秦鳯三路公事纍以破夏功僅再歲遂擅帥熙秦尋責監永州稅後復起為龍圖閣直學士歷知數州章公弼餘干人紹聖初舉進士授建寧主簿聞朝廷廢劉摯范純仁託疾不起尋丁母憂廬墓三年宣和間為禮部侍郎以疾歸有文集若干卷金極樂平人紹聖初舉進士纍遷知分宜有能名上書乞斬蔡京以謝天下坐是入元祐黨黨禍解適意間曠以市隱自號紹興初贈太常博士董濬德興人崇寧間舉進士纍遷祕書少監建炎間進所撰興治綱領圖中興四議等書出為江西提刑致仕所著又有五行新書及周官辨疑等書程振樂平人少有軼材靖康中拜刑部侍郎金人冦汴京索金帛無厭振與梅執禮等四人詣金營言比屋盡空無以塞命金人怒遂遇害後贈端明殿學士諡剛愍張朴根弟大觀間第進士纍遷侍御史嘗言朋黨分攻非朝廷福時郎員冗濫徽宗喻朴使論列乃摘其庸謬者疏斥諸外後蔡攸引為道史檢討官召試中書舍人陶節夫鄱陽人侃之裔舉進士纍官至延安府以招降羌有功加集賢殿修撰築石堡等四城得夏人窖粟以千數鋭意邊功纍進樞密直學士後徙知洪州歷青秦二州後為待制知永興軍程瑀浮梁人政和間進士纍官校書郎金人入侵求可使者瑀請往至燕山不屈而還欽宗慰撫備至除右正言高宗時遷給事中條上十四事皆切時務官至兵部尚書所著有周禮義尚書説兩漢索隱李椿年浮梁人政和間進士歷司農丞度支郎中後知婺州致仕初母喪於中都徒步護喪歸葬有甘露之祥所著有易傳十卷文集十卷彭汝方汝礪弟宣和初通判衢州使者疏其治狀擢知州事方臘叛陷歙睦且至衢境無兵可禦衆皆奔潰汝方獨守孤城三日而陷罵賊以死詔諡忠毅官其家七人張燾根子宣和間進士第三高宗時為吏部尚書時與金和燾詣河南修陵寢還言此讐萬世不可忘尋知成都府兼安撫使有惠政蜀人祠之孝宗時遷參知政事辭不拜卒諡忠定平生清修簡靜頗喜大書得顔魯公筆法汪藻德興人登進士纍官起居舍人翰林學士屬時多事詔令類出其手紹興初知湖州上書纂集日厯書成升顯謨閣學士尋知徽州以言者論奪職居永州藻博極羣書老不釋卷工儷語多著述程克俊浮梁人宣和間登進士纍遷給事中時鄱之學宫經兵火或請於朝以為墓有旨可其奏克俊封還制書學得不徙官至權參知政事卒諡章靖許尹樂平人政和初登進士歷知興化永處柳卭五軍州皆有善政高宗時攝蜀帥甚得人心遷司農卿總領川賦以便宜積財穀孝宗即位上疏乞延儒臣講求治道尋以敷文閣待制致仕有文集數十卷向伯奮樂平人靖康時監在京市易務尋聞有偽詔棄官去高宗召知建州帥襄陽皆有功孝宗時拜户部侍郎尋得祠劉權王宣竊發廣西起知靜江伯奮威名素著至則皆約日出降所著有時論十卷奏稿三卷詩十卷洪皓樂平人少負奇節有經略四方志博學強記政和間舉進士建炎初假禮部尚書使金留北十五年不為少屈還除徽猷閣直學士提舉萬夀觀以忤秦檜安置英州後徙袁州卒諡忠宣所著有文集五十卷及金國文具録等書洪適皓長子幼敏悟日誦三千言紹興間與弟遵同中博學宏辭科擢祕書省正字後秦檜惡皓適亦論罷檜死復起嘗總領淮東軍馬錢糧究心調度饋餉無闕官至尚書右僕射兼樞密使卒諡文惠洪遵皓仲子刻志苦學試制科中魁選擢祕書省正字紹興末拜起居舍人後知平江金人由海道窺二浙助副總管李寶禦之成功孝宗時拜同知樞密院事後知建康府有惠政以資政殿學士提舉洞霄宫卒諡文安洪邁皓季子亦中博學宏詞科紹興末假翰林學士使金書用敵國禮金人怒鎖使館後得還孝宗即位拜中書舍人直學士院後知建寧婺州紹興皆有善政以端明殿學士致仕卒諡文敏所著有容齋隨筆夷堅志王克明樂平人徙居湖州初得脾胃疾乃讀難經素問刻意用藥其病遂愈因以術行無不驗張子蓋救海州戰士大疫克明全活者幾萬人不以為功好俠尚義嘗數千里赴人之急纍任醫官紹興中賜金紫王剛中樂平人紹興間進士第二纍官中書舍人言禦敵必先自治高宗韙其言擢知成都府制置四川恩威並著得將士歡心孝宗時纍遷同知樞密院事卒諡恭簡剛中公退惟讀書著文為樂有易説春秋通義等書百餘卷汪徹浮梁人紹興中舉進士纍遷監察御史條具內修外攘二十事後為荆襄宣諭使撫循將士人人感激思奮孝宗時為樞密使尋以觀文殿學士知柳州卒諡莊敏有文集奏議余時言浮梁人紹興間進士贊親征金冦之行隆興初為吏部侍郎後出知漢州值蜀大歉所部獨熟出粟活流民二十餘萬終敷文閣待制趙善應餘干人官終修武郎江西兵馬都監性純孝親病嘗刺血和藥以進父母之喪哭泣毁瘠與諸弟篤友愛聚族百餘口無間言聞四方水旱輒憂形於色及卒丞相陳俊卿題其墓曰篤行趙汝愚善應子乾道中舉進士第一纍官吏部侍郎紹熙間知樞密院事孝宗登遐光宗疾中外洶洶汝愚奮不慮身定大計於頃刻收召明德之士以輔寧宗新政拜右丞相辭不就未幾為韓托胄所搆謫永州卒及托胄誅盡復故官追封沂國公諡忠定趙崇憲汝愚長子淳熙中擢進士甲科監饒州贍軍酒庫歷知江州靜江府所至有惠政纍遷至直祕閣崇憲天性篤孝能守家法居父喪月餘始食食小祥始茹果實終喪不飲酒食肉張文之樂平人隆興初通判濠州金兵至濠守謀夜逸文之提兵出登橫澗山與敵相持十餘日大小二十餘戰力不支遂被執送燕山欲授以官義不屈囚之土窟中淳熙間詔官其一子曹建餘干人乾道間從程逈陸九淵張栻遊學有所見淳熙間朱熹過餘干見建與語大奇之建家貧事母盡孝待弟姪盡友愛其卒也熹表其墓柴中行餘干人叔元祐通五經號強恕先生所著有春秋解中行紹熙初進士官至右文殿修撰立朝直言極諌遇事持正不為勢屈卒諡肅憲所著有易繫集傳書集傳詩講義論語童蒙説劉泌餘干人嘉泰間舉進士歷官郡縣臺省院部後拜參知政事二年攝相事八十日以母老乞致養上從之泌自幼以孝著嘗為母祈夀甘露三降庭梅余安行德興人以經學為里中所宗官至大中大夫所著春秋新傳至言集記等集有詔藏之祕閣劉伯正餘干人聞禧初舉進士纍官監察御史有事明堂雷電忽至執事者多離次伯正儼立殿下聲色不動遷左司諌三上章疏淳祐間拜參知政事卒贈少保時論謂其立朝以靜重鎮浮不求名譽云李伯玉餘干人嘉定間進士纍官至禮部尚書抗直敢言所居有峯曰萬斛故自號斛峯度宗於伯玉為舊學屢欲進用時賈似道柄國伯玉以直言忤其意遂黜於外不果用朱貔孫浮梁人淳祐中進士授臨江軍學教授纍遷少府卿兼右諭德擢華文閣學士遷吏部尚書與李伯玉湯漢俱有時名號稱饒三尚書有文集奏議行世湯漢安仁人介潔有守恬於進取纍官國史校勘淳祐中大水上封事言君心敬肆之分實上天喜怒之由歷知吉福州隆興府纍遷權工部尚書卒諡文清有文集六十卷洪芹適曾孫端平間舉進士為太學博士遷將作少監屬詞臣無可上意者宰相程元鳯薦之兼翰林權直祕書少監纍官禮部侍郎中書舍人立朝慷慨敢言有氣節饒魯餘干人幼從黃幹遊性行端謹學術精明纍薦不起號雙峯及卒門人私諡文元有五經講義語孟紀聞春秋節傳庸學纂述等集馬廷鸞樂平人淳祐間進士纍官翰林權直中書舍人兩制皆出其手度宗立拜右丞相兼樞密使與賈似道不合除觀文殿大學士提舉洞霄宫所著有六經集傳等書鍾季玉樂平人淳祐間進士纍官樞密院編修官知建昌軍有旨和糴值歲旱為請減三之一纍遷江西轉運判官郡大胥以賄敗窮治投嶺表後改都大提點坑治北兵渡江季玉徙寓建陽兵至死之趙必願汝愚孫嘉定中進士知崇安縣歷知全常處泉臺婺等州其所行一循汝愚之政纍遷至權户部尚書後以華文閣學士知福州必願才周器博心平量廣而又蚤聞家庭忠孝之訓故所立卓然可稱趙良淳汝愚曾孫初為泰寧主簿恥事干謁浮沉冗官二十餘年至咸淳末除知安吉州元兵圍城良淳力守援將吳國定開南門納外兵衆潰良淳還府奮筆書其几曰寧為宋朝鬼莫作北廷臣投繯而死陳羍安仁人咸淳初與父詩川同舉進士為朐山主簿德祐時棄官家居謝枋得起兵首拔入幕執安仁令李景數其罪殺之益王立領江東安撫使出上饒應接郡縣戰潰被執至豫章遁去後三年復起兵尋敗入積煙山自剄死所著有鶴心集陳學心安仁人淳祐間登進士歷官高州知府謝枋得起兵使守安仁元兵至戰死時餘干張如旦亦率鄉兵應枋得力戰死之馬端臨廷鸞子年十九潛心學問博極羣書以廕補承事郎宋亡隱居教授鄉里遠近師之與人言論亹亹不倦所著有大學集傳多識録文獻通考等書行世董鼎德興人自幼力學受業於勉齋黃幹得其端緒嘗著書傳纂疏行世同邑余芭舒亦潛心程朱之學所著有書傳解等集元吳仲迂浮梁人號可堂博學明經隱居著書有四書語録經傳發明春秋紀聞數十卷傅立德興人通皇極數學為集賢大學士有文名卒諡文懿子巖卿為祕書少監集賢直學士朱公遷樂平人得雙峯之傳至正間為處州學正兵亂轉徙無定處已而寓婺源鄉邦之擅兵者屢請不就後歸家卒所著有四書通旨四書約説等集周伯琦鄱陽人父應極至大間獻皇元頌後拜集賢待制終池州同知伯琦由國學生纍官翰林直學士兵部尚書改浙西亷訪使至正間招諭張士誠降拜江浙行省左丞伯琦儀觀溫雅粹然如玉博學工文章尤以篆𨽻真草擅名當世許則祖樂平人性剛健至正間亂兵四起則祖倡義兵恢復德興縣後屢戰勝一日追賊馬陷濘泥中遂遇害事聞諡忠顯本朝許瑗樂平人兄琮博學善詩元至正中兩舉於鄉皆第一會試不第放浪吳越間本朝初求賢瑗與宋濓同赴召奏對稱旨授博士留帷幄中參預謀議尋命知太平府瑗至勵士卒修城池撫黎庶陳友諒攻太平拒守彌月城陷被執不屈死之追封高陽郡侯吳宏餘干人以江西行省參政歸本朝命鎮饒州尋遣率兵取撫州南昌諸郡又從征下武昌以功拜中書左丞後左遷親軍指揮宏涉獵經史能詩工書事母至孝見重於士大夫徐旭樂平人洪武中舉進士授監察御史陳六事皆切時政再遷考功郎中無敢干以私者預修太祖實録成拜國子祭酒尋坐事改翰林修撰為人方正簡默清慎不阿始終一志有文集數十卷費震鄱陽人以賢良薦洪武中歷知漢中府時大軍平蜀陜西旱飢漢中尤甚民聚為盜莫能禁戢震乃發倉粟賑民盜多來歸即令占宅自保遂得數千家後以事被逮朝廷以震良吏也釋之以為牧民者勸尋升户部侍郎進位尚書致仕章復鄱陽人初仕元為行省郎中洪武初以儒業應召授全州府同知勸民耕稼歲獲豐稔乃編農事家給一册復興學校創建一新自為記銘兄遇旱潦禱之即應民勒石頌功升知保寧府後乞致仕朝廷惜之俾乘驛還鄉王釐鄱陽人自少頴敏博學能文洪武初以明經授鄱陽教諭多造就人才召為翰林院編修與修國史每備顧問奏對稱旨嘗患頭風上以所御藥酒賜飲之遂愈後乞外補命知南陽府有善政以疾卒所著有羣英雜言詩粹若干卷祝挺鄱陽人攻春秋左傳歷官上海知縣遇錢氏為變挺討平之尋大軍至將屠邑挺力請于將得已民感之立碑後擢户部主事調浙江行省郎中省志胡閏鄱陽人學博行修素以忠直自許太祖討陳友諒經鄱陽謁吳芮祠見壁間題竹詩幽人無俗懷寫此蒼龍骨九天風雨來飛騰作靈物太祖歎賞久之遂召至帳下後官都督府經歷遷右補闕進大理寺少卿太宗靖難死于直言嘉靖二年提學副使邵鋭立祠祀之省志張琬鄱陽人洪武初以貢入大學試高第授給事中轉户部主事上問天下財賦户口琬應對無遺即進本部左侍郎謹身殿災上疏言時政上嘉賜文綺時歲飢請蠲天下民租百萬餘石上嘉納之年二十七卒省志徐爵餘干人登永樂乙未進士授監察御史立朝謇諤風力素徑人不敢干以私太宗常以小徐御史呼之志省吳惠浮梁人登永樂辛丑進士知永興俗鄙以悍惠諄諄諭之俗遂變民疲不能田惠傭工以代耕秋乃大稔民得不飢以薦升解州知州州輸邊儲挽運甚勞立貧富三等法且聽其附載貨物以易粟上倉費煩減半輸亦告足民歌曰吳父母恩何溥昔憔悴今鼓舞乃刻碑頌德省志戴辨浮梁人領鄉薦自崇陽訓導歷兵科給事中奉詔行邊簡士卒嚴戍守邊備整飭升陜西參議城迭烈以禦寇衝屯張掖以助軍餉進調廣東參政適亷雷諸郡徭獞梗化挺身出諭曰我戴參政也爾輩何敢冒死賊曰果我公也公至誠愛民我何敢犯死羅拜而退廣州被圍乏食亟發廪賑之募敢死士焚其攻具遣使間道引援兵入守遣將協謀平之進布政使所著有蒙菴集省志董阜民德興人以明經舉任工部主事質直方毅不為容悅時同官有被譛繫獄者阜民疾篤恐其罹刑置諫疏於懷死都門上憐其死諫命禮葬之遂赦被譛者省志何英鄱陽人性警敏絶人不事詞章往學於王松塢得饒雙峯黃勉齋之傳造詣益深松塢寄以詩有臞梅谷裏先春意句遂號梅谷纍薦不起建玉溪書院以納天下來學所著有四書釋要詩經詳釋易經發明諸書崇祀邑學鄉賢伺省志孟常鄱陽人詔求才守令以常應授蘇州崑山知縣改池州建德建德租重天下逋欠者繫建多常詣闕死爭得如他邑民感而祠之秩滿民上章請留久之調任於淶水省志孫原貞德興人登永樂乙未進士授禮部主事從太宗征北邊俘獲以歸歷遷浙江布政使體恤民隱百姓德之時福浙盜起奉敕參佐謀議軍事督兵深入擒其渠魁福浙以寧遷兵部尚書考察方面允協公論鎮守浙江上邉冦冗兵曠官逃民馬政㩲幸六事皆切時弊天順改元乞致仕歷事五朝始終一節所著有歲寒集奏議省志高峻鄱陽人登宣德庚戌進士授監察御史巡按巴蜀值松藩叛平之明年按畿內屢辨寃獄倭冦犯浙江勑峻以行且假便宜卒成乃迹官卒浙江參政省志胡居仁餘干人幼頴異有大志得鄰遺物還之衆驚嘆以為長必非常人從吳與弼得心學之正退而益加充廣慨然以斯道自任其學以主忠信為本求放心為要以聖學成始成終在於敬因以敬名齋御史高智銘其墓所著有居業録省志王弼鄱陽人宣德癸丑進士授工科給事中上疏蠲逋負人懷其德升順天府丞修飭山海居庸邊務經畫有方進應天府尹有惠政民戴之如父母纍疏乞歸足迹不入城府卒於家省志童軒鄱陽人景泰辛未進士拜南京吏科給事中歷升太常寺卿都察院右副都御史總制松藩軍務奏除松茂戍守之役人甚便之擢南京吏部右侍郎進禮部尚書卒於家工吟詠得唐人體致所著有清風亭稿海嶽涓埃喻蜀藁籌邊録若干卷省志劉城鄱陽人少磊落有大志景泰丙子領順天鄉薦授貴州道監察御史風聲震礱吏民憚之升福建副使剗弊發伏殆盡上杭盜劇城梟渠魁散其脅從患遂熄升本司按察使風紀益厲勢家海販屏迹進廣西右布政使轉都察院右副都御史巡撫河南托諸觸法者立罪之戚宦斂輯閭閻欣樂更生疾作卒於官柩歸之日家設香案舉奠者塞道省志虞訥樂平人五世同居有家範人無間言事上間旌表省志戴琥浮梁人領景泰鄉薦授南道御史風裁凛然嘗因平江路盜起劾罷巡江不職二重臣復陳四事皆弭盜安民之要升紹興知府政教並行民為立德政碑以繫去思擢廣西右參政制馭夷撩區畫邊計皆有成績以疾致仕卒省志戴珊浮梁人登天順甲申進士授監察御史督學南畿以文章占器識士心允服升陜西提學副使修古聖賢祠墓增秩祀典德教風行纍遷按察使左右布政使所至有聲達於治體轉副都御史撫治鄖陽抑諸府豪右蜀盜野王綱猖獗誅其首惡餘黨縱之一方底寧進刑部左右侍郎會勘荆府不法事廷可其議遷南京刑部尚書入為左都御史恪持風紀中外肅清卒賜祭葬贈太子太保諡恭簡省志黎福樂平人登成化丙戌進士授浙江道御史侃侃正色疏天下利病有人所難言者歷升都察院右副都御史提督撫治鄖陽節制三省鎮之以靜民物晏然以南京兵部左侍郎卒福天性亷靜不為崖岸求赫赫聲事至必盡心力故所樹立與衆殊大學士王鏊為之銘墓省志舒清德興人登成化丙戌進士授工部主事自營繕郎中升河南參議歲飢請邀運米百萬分給一省賴以全活升四川參政立遞減法以便民轉右布政時有使者欲取庫藏銅鼓諸物疏節用愛人以止之轉廣西左布政又有取古琴諸物之使復疏不貴異物以止之田州土官承襲緣故習致謝金斥出備軍餉民夷懷附尋以疾乞休致所著有直菴集清操持端恪望重士林省志戴璉浮梁人早有大志力學希古登成化丙戌科人號為五經進士授大理評事以儒術濟法律兩上封事率刑政根本之論未究厥施而卒士論惜之所著有知非集省志程廷珙浮梁人性孝友居母喪三年不御酒肉登成化乙未進士歷郎中秉法嚴正升福建參議開渠建陽以利灌溉民至今賴之時福寧諸路凶亂設法賑濟民之死葬生養咸有賴轉廣西參政進右布政使克桐木渚巢擒渠魁黃鑑成等孝宗以銀牌鏤竒功二字及金繒奬之平賔州八寨之陸梁定東蘭韋祖鋐之跋扈至於銷土官爭長之鋒致謝金二甕不受平生政迹類如此尋以國事卒於粵正德初舉祀府縣鄉賢祠省志祝瀾德興人登成化己丑進士授兵科給事中侃侃剛直轉國子監丞上廟祀議以聖賢像宜從國初定制止祀木主路點鯉以父列於廡淵參伋以子配於殿似非明道正倫之義宜别建一室祀叔梁紇以路點鯉配若公伯寮荀况之徒宜黜其祀為人慷慨尚氣節不以死生福禍為意省志張憲德興人登成化壬辰進士授考功主事歷員外郎郎中在考功者十四年亷慎公勤如一日甄别流品必先志行升山東左參政浙江右布政使中官縱左右虐民而攫之財憲亷得其人置於理至尹順天望讋權豪德孚士庶升工部侍郎理易州山敞省供具損柴薪夫役去蠧完逋國訃賴焉尋兼都御史清閩浙鹽課宿弊以祛歷升南京禮工二部尚書卒於位省志孫需尚書元貞之孫成化壬辰進士歷升推官御史副使按察使浙江左布政𢎞治壬戌升右副都御史纍奉勑巡撫河南陜西鄖陽三省正德丁卯升南京兵部侍郎進禮部尚書銓曹擬改刑部以忤逆瑾遂矯詔令致仕瑾誅復起歷南京吏刑工三部尚書以老疾乞休賜葬祭贈太子太保諡清簡省志張吉餘干人登成化辛丑進士授工部主事時左道李孜省僧繼曉以符水進吉劾之謫判景東士官陶洪以吉空囊無家謀為置妾遺以銀器俱不受遣子受學夷俗化之遷肇慶同知築長隄以防水潦民德之號張公隄知梧州府崇正學飾文廟樂舞政教並行升廣西兵備副使值北兵侵邊陳便宜䇿獻偏架弩隨進正心之説以寓諷諌纍升貴州左布政使卒子俅進士御史屢有論諌論者謂其有父風云省志程楷樂平人性警敏博通經史百家之言為文尚奧古自成一家中成化丁未會元甲魁改翰林庶吉士擢編修與修會典卒於京省志彭程鄱陽人成化丁未進士𢎞治初授御史巡察京城內外先是北敵投降者皆安置畿甸歲日以盛且梟雄莫制每朔風塵起騁騎彎弓掠人道上事泄索急則投戚里閹奴為援程每得其機牙發之奇中人驚為神繼巡浙江鹽法監收光祿寺財賦釐姦革弊風紀肅然時政有無益之費事干宫閫者程抗疏忤旨下詔獄謫戍隆慶明年釋歸時稱為真御史省志俞廷瓉鄱陽人以進士授行人司副正德己卯武宗南巡廷瓉條上十事皆人所不敢言者而極切剴至奮不顧身遂死於諫嘉靖改元遣官諭祭省志列女程烈女德興人唐肅宗時女之父兄為盜所殺因掠女去隱忍十餘年後以計脫告於刺史顔真卿捕獲碟於市女刳其肝心以祭其父兄宋縣丞程逈取春秋復讐之義頌之曰大而得其正者也表之曰英孝程烈女饒娥樂平人字瓊真生小家頗自修整父績漁於江遇風濤舟覆尸不出娥年十四哭水上不食三日死俄大震電水蟲多死父尸浮出鄉人異之具禮葬其父及娥又為立廟後柳宗元為立碑云趙氏樂平王袤妻建炎中袤監上高酒稅金兵犯筠遇金人縳以去繫其夫婦於劉氏門而入剽掠趙宛轉解縳并解袤使速去俄而金人出問袤安在趙他指以誤之金人追之不得怒趙欺已殺之李氏安仁人謝枋得妻通女訓諸書枋得兵敗走閩李擕二子匿貴溪山中元兵至令曰苟不獲李氏屠而墟李聞之出就俘徙囚建康或指曰是當沒入矣李聞之泣左右曰雖沒入將不失為官人妻李曰吾豈可嫁二夫邪是夕自經死獄中陳氏樂平人徐德安妻年二十夫病革謂之曰汝年少無子我死汝更善事他人陳泣曰既為君婦尚忍事二姓乎即割耳剪髮為誓夫死納之棺中終身不改節事聞本朝旌表其門朱氏鄱陽人劉斗鳯妻年二十三守節翰林學士宋濓為之銘曰夫人之節石堅玉貞何不享有祐福而憂患是嬰彼宰物者孰尸其平然而德厚流光如筮斯徴短雖一日長或千齡則夫人之不死者愈遠而愈名史源之山封若斧刑評馴行太史勒銘後數百載當知為鄱陽節婦之塋省志鄭氏浮梁人金添鱗妻舅姑與夫繼殁又遭兵亂鄭終無二心洪武乙亥旌表其門省志戴氏鄧謙妻謙會試罹火災哀毁踰禮守節以自終永樂間旌表省志孫氏浮梁人鄉進士閔鳯妻鳯疾孫籲天以身代既死哀幾絶有司屢欲聞孫屢止之曰此分內事何必乃爾石室潘葵贊其像有百年苦節一掬寒氷不求表暴真節婦之語省志齊氏曹旺七之妻餘干人正德間盜猝至曹氏室齊走匿草莽中賊搜得曳之去齊哭且罵沿途援竹木不行抱樹大罵求死賊刺之仆地而絶夫收其尸創痕不漬血怒氣勃勃如生章昺為之傳其事贊曰曹婦寧玉碎不瓦全有奇男子瓌偉雄傑之節省志吳氏葉梁妻正德間盜起梁被創垂死屢目吳意以吳年若貌必有奪其志者吳知之以爪碎其容又斷二指內捾中後母家欲他遣遂不食而死省志胡烈女諱貴真樂平人父母生欲不舉鄰曽母陳氏鞠為乳子天福配同乳之甫長天福父母與陳氏繼亡家益窶落女父欲奪為富家配女曰我鞠於曾氏婦於曾氏分姑媳恩母子豈可以飢寒去始死依從姑以居雖蓽舍單淺外人未嘗識其面正德丁丑女兄乘其未婚撻拽以歸出示求聘者金銀笄飾卜日以行女知不可免潛浴更服入房縊死時年十八邑大夫張文應禮葬之以其事聞省志張氏樂平人董瑱妻年二十六夫殁以節自礪正德三年姚盜猖獗母懼其為盜所汚隂遣其子諷之改嫁以圖自全張泣曰從一而終婦人之義也麾其弟去之一夕忽自經左布政舒清為傳其事省志張烈女名柱秀浮梁小民張啓明女有殊色聘凌氏子凌日貧落女父母欲解盟會祁門少年鄭天佑以星術止其家未有室父母私許以女妻之懼女素剛不可動乃俱佯出屬天佑逼近女覺紿天佑曰俟沐浴以從浴竟執父所業打綿槌奮擊天佑中其顙昏眩仆地女自縊死既葬其墓不生草棘省志劉氏安仁人李介妻正德九年冦至介家擁之以行劉憤罵曰為婦人而辱於賊生何以見夫沒何以見祖宗於地下乃投於池中賊竟殺之省志仙釋鄭全福浮梁人唐文宗時入靈巖洞修煉後徙居蓮華洞遊桃花溪有老人乘鐵船全福曰願借船還人間老人曰後三年復來時已百餘歲語門人曰死必葬我浮梁白水鄉及舉棺輕發之惟杖履而已王遙鄱陽人得仙術能治病不用符水針藥但以八尺布帊敷之須臾病愈若有邪魅即畫地作獄叩石呼之皆入獄中有一弟子負竹篋隨行嘗冒風雨行衣皆不濕一日兩炬導入石室中有二人曰卿何為久住俗間答曰當來乃還家自負竹篋而去吳全節安仁人年十三學道於龍虎山至元中至京師從張留孫見世祖其後成宗召見授玄教嗣師贈封其祖父母進玄教太宗師玄德真人全節雅好結士大夫推轂善類唯恐不盡其力至於賑窮周乏未嘗以恩怨異其心卒年八十二明一統志卷五十
