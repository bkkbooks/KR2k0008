body:
  text: 明一統志卷五十明李賢等撰饒州府東至浙江衢州府開化縣界三百七十里西至南康府都昌縣界一百六十里南至撫州府臨川縣界二百里北至直𨽻池州府建德縣界一百七十里自府治至南京一千五百八十里至京師五千二十五里糧二十一萬三千石零建置沿革禹貢揚州之域天文斗分野春秋時楚東境後屬吳戰國復屬楚秦置鄱陽縣屬九江郡漢為鄱陽餘汗鄡陽縣地屬豫章郡三國吳分豫章置鄱陽郡晉治廣晉縣梁兼置吳州陳廢隋廢鄱陽郡改置饒州以其物産豐饒故名大業初復為鄱陽郡唐初為饒州屬江南西道天寶初改鄱陽郡乾元初復為饒州五代時南唐置永平軍宋仍為饒州𨽻江南東路元升為饒州路屬江浙行省本朝初改鄱陽府後改饒州府𨽻江西布政司領縣七鄱陽縣附郭史記吳伐楚取番即此秦置鄱陽縣屬九江郡以在鄱水之北故名漢屬豫章郡吳以後屬鄱陽郡隋唐宋饒州治此元仍舊本朝因之編户三百二十一里餘干縣在府城南一百二十里本越之西境為越餘地漢置餘汗縣屬豫章郡吳屬鄱陽郡隋改曰餘干縣屬饒州唐宋因之元升為餘干州本朝改為縣編户二百五十四里樂平縣在府城東一百二十里本漢餘汗縣地東漢析置樂安縣晉屬鄱陽郡劉宋省唐初復置名樂平縣屬饒州宋因之元升為樂平州本朝改為縣編户二百二十里浮梁縣在府城東一百八十里本漢鄱陽縣地唐武德中析置新平縣尋省開元初置為新昌縣天寶初改曰浮梁屬饒州宋因之元升為浮梁州本朝改為縣編户一百一十五里德興縣在府城東一百四十里本樂平縣地唐置德興場南唐升為縣宋屬饒州元仍舊本朝因之編户六十八里安仁縣在府城南二百一十里本漢餘汗縣地晉析置晉興縣後廢陳置安仁縣隋復廢宋開寶末置安仁場端拱初升為縣屬饒州元仍舊本朝因之編户八十一里萬年縣在府城東南一百二十里本鄱陽餘干樂平貴溪四縣之遠鄙正德七年桃源盜平析置萬年縣編户六十四里郡名鄱陽秦名芝城以芝山名形勝彭蠡既瀦禹貢地居淡浦邑帶鄱川唐王德璉饒州記序瀕江之地饒為大唐劉禹錫文集饒為沃野唐元稹饒州刺史制廣谷大川宋黃唐云惟時饒郡昔號奧區廣谷大川政當吳楚之交會流風善政具存顔范之典刑據大江上流宋彭汝礪云吳楚冠冕餘干志江山清絶宋張綬詩江山清絶冠吳頭洪岩鬱蔥叢玉森秀樂平志風俗飲食豐贍唐歐陽詢法帖忠孝繼出唐王德璉鄱陽記忠臣孝子繼踵而出吳芮之遺風難泯語有吳楚之音同上其人喜儒故其俗不鄙宋彭汝礪作夏侯處士志喜事甲於江南宋吳孝中餘干學記江之東西冠帶詩書甲於天下江南既為天下甲而饒人喜事又甲於江南文獻相續輿地記山川最清接吳楚秀氣文獻相續有曽范遺風山川薦福山在府城東三里上有薦福寺魯公亭芝山在府城北四里初名土素山唐刺史薛振於山顛得芝草三莖因改今名山下舊有能仁寺登其閣可見匡廬宋范仲淹詩偶臨西閣望五老夕陽開閣山在府城南一十里上有仙人白子高遺迹宋守毛祐之宿山下夢一人自稱楚王陳涉遂建閣立廟於上因名又名仙閣山風雨山在府城北一十五里古為雩壇禱輒風雨故名馬迹山在府城東北三十里道書為第五十二福地晉王遙煉丹其上有斗壇煉丹井石藥盂遺迹宋范仲淹詩靈壇拱上百神清碧塢紅霞相映明曲徑猶無青草合亂峯時有白雲生元周伯琦詩西晉仙人留舄處桃花流水護青山空壇風撼龍蛇窟絶壁雲通虎豹關堯山在府城西三十里相傳堯時洚水避難者居其上因名初州以堯山為號又以地衍饒遂加食為饒蓮荷山在彭蠡湖中望之如荷葉浮水上表恩山在蓮荷山南十餘里濵彭蠡湖每春水漲則山在湖中白鹿山在府城東五十里唐永徽中張蒙遊獵逐白鹿於此韓山在府城北六十里有韓信祠遺址巍石山在府城北八十里一名獅子山下有龍居寺宋嶽飛詩巍石山前寺林泉勝境幽紫金諸佛相白雪老僧頭潭水寒生月松風夜帶秋我來屬龍語為雨濟民憂鐵籃山在府城東北一百里舊傳列子嘗採藥於此鄱陽山在府城西北一百十五里鄱陽湖中初名力士山唐改今名石步山在府城西北一百四十里有石室如堂殿常有煙靄不可入獨角山在府城西北一百六十里唐王璉記載嘗有獨角獸居此郭璞山在府城東和南鄉根盤五十里崇高百仞峯巒峭拔為鄱陽郡山之冠世傳郭璞嘗旅寓於此羊角山在餘干縣治東兩峯回曲相向狀如羊角故名唐改名餘干山又名冠山山多奇樹怪石山下舊有亭相傳陸羽嘗煮茶於此玉馬山在餘干縣南山下有白石如馬俗號曰白馬山唐改曰玉馬藏山在餘干縣治西雖不甚高而懸崖峭壁為特勝上有梅巖宋趙汝愚讀書其下理宗為書梅巖二字冕山在餘干縣東五里相傳隋末林士𢎞退保餘干敵至市民避居此山得免於難遂名免山後人以邑有冠山又因有吳楚冠冕之名改曰冕山石虹山在餘干縣北一十里有橫石跨水文彩若虹又有一石室甚廣旁列石障如屏風有古篆書八十三字歲久莫能辨洪崖山在餘干縣西北六十里瀕鄱陽湖相傳晉張氲煉丹其上有丹井仙壇觀拍笑亭遺迹萬春山在餘干縣東七十里山有兩峯峭拔中有天池水清而味甘康郎山在餘干縣西北八十里濵鄱陽湖相傳有姓康者居之因名一名抗浪山謂能與風濤抗也訛曰康郎國初大兵與陳友諒戰於山下有死事者故建忠臣廟於其上五彩山在餘干縣西南八十里戰國時吳申自鄱陽徙居之生子芮時山有五彩雲氣故名康山在樂平縣治北蓋縣之主山一名東山樂平山在樂平縣西二十五里山有石似墨舊名石墨山唐改今名乳泉山在樂平縣西北六十里山有石如硯初名石硯嶺西麓出乳泉唐改今名石城山在樂平縣東南六十里一名石城巖又名仙人城怪石縈結十餘里中有空洞宋少卿李常題曰叢玉李伯時畫為圖彭汝礪詩有花開洞府春常在人會瀛州夜未歸之句吳溪山在樂平縣西山有石室室中有石鼠石人之類軍山在樂平縣東六十里山勢崇高唐末鄉軍保山捍冦故名宋張顯詩巨鎮壓坤維層顛沒雲屯上欲看星斗懸崖那可捫仙鶴山在樂平縣南六十里下有一池三阜中阜有靈鶴觀相傳漢張道陵遺迹文山在樂平縣東南七十里山𫝑磅礴亘連廣信之弋陽貴溪二縣多幽險今特設官鎮之鳯遊山在樂平縣東北八十里山勢盤礴為徽饒間一巨鎮舊名濬源唐改今名青峯山在浮梁縣治東古諺云青峯腳下圓浮梁出狀元宋程瑀讀書其上有詩云為問寺前圓也未不應久負壯圖人後果為釋褐魁王師山在浮梁縣東五里宋朱貔孫未顯時居其下有道人云兹山秀拔當出王者師後貔孫授太子諭德為度宗師陽府山在浮梁縣西二十五里景德鎮峭立溪側下有陽府寺泉石幽勝萬户山在浮梁縣西二十五里竒秀聳拔相傳晉郭璞云當有封萬户者宋程節應之石鼓山在浮梁縣北三十里臨溪有石山似鼓金魚山在浮梁縣西三十里宋程節之祖居其下以漁釣為業有異人指其卧榻曰異日葬此子孫當為望族後節與弟子俱顯榮九英山在浮梁縣南五十里唐寧殷居其下殷有九子名皆從山字據此境以禦黃巢後人因呼此山曰九英程山在浮梁縣東六十里初名石山陳時程靈洗之裔居其下族既盛大遂改山名石門山在浮梁縣南六十里宋尚書彭汝礪讀書處旁有龍池水深莫測芭蕉山在浮梁縣東八十里翠巘插空望之如蕉林天門山在德興縣治西山頗崇高歲寒山在德興縣西二里宋周冕隱居此山鐫歲寒二字於石崖故名肯堂山在德興縣東南二里宋邑人余斂持節江南詔許歸侍其親乃構堂山下張商英匾曰繡綵其子瀚復新之朱熹扁曰肯堂因以名山銀山在德興縣東三里一名鄧公山山出銀唐總章初置場至宋天聖間山穴傾摧而銀課未除范仲淹守郡請罷于朝因有詩云三出專城鬢已霜一封奏罷鄧公場大茅山在德興縣東南山最磅礴千峯萬嶂深林邃谷為一邑之冠毛山在德興縣東南八十里紫雲山在安仁縣西北與餘干白雲山相接張古山在安仁縣治東相傳晉張徽學道於此十餘年後仙去華山在安仁縣北七里山最奇秀類池州九華山夕陽嶺在浮梁縣東一百二十里相傳籃采和嘗吹笛於此吳嶺在安仁縣西南六十里相傳漢吳芮與車王嘗戰於此其顛有洗馬池石上有巨人迹芙蓉峯在樂平縣東南六十里狀如芙蓉五花峯在浮梁縣東八十里有五峰亦名蓮花峯洪巖在樂平縣東北九十里縣有天井巖桐木巖風巖而洪巖最著巖在山腰有石室南北相通其中雲氣泉聲不絶山下洪氏居之又名洪源水龍巖在浮梁縣新合都有水潛行地中其南有鳯遊巖有大石室避地者會居之洞靈巗在浮梁縣東有洞四曰慶雲曰蓮花曰含虛曰張公云仙巗在安仁縣東南七十里巖半有穴二十四人不能到下有溪流漁舟人仰視穴中各有杵臼織機紡車床具水桶倉板之類每占其倉板開則歲豐閉則歲歉云鄱江在府城南門外會德興浮梁及徽州廣信諸水流經城南環城流至西北復分為二俱入鄱陽湖亦名雙港水樂安江在樂平縣治南源出徽州府經德興縣會諸水合流經此下流入鄱江錦江一名安仁港源發廣信府流經安仁縣前會白塔河下流經餘干縣入鄱江江有雲錦石故名昌江在浮梁縣南源出縣東八十里西流會諸溪水經此下入鄱江淡津湖在府城內穴城而出流入鄱江東湖在府城東一名督軍湖下流入鄱江相傳鄱令吳芮嘗習水戰於此有督軍臺尚存鄱陽湖在鄱陽縣西四十里即禹貢彭蠡也延袤數百里隋以鄱陽山所接故名宋王安石詩茫茫彭蠡春無地白浪春風濕天際東西捩柁萬舟回千歲老蛟時出戲族亭湖在餘干縣西八十里後漢張逸封族亭侯因此名也康郎湖在餘干縣西七十里即鄱陽湖南涯龍停湖在樂平縣治南四時不竭懷蛟水在府城南江中有蛟五月五日鄉人於此競渡俗呼為懷蛟水唐刺史張栖真嘗幖孝經以示訓又名孝經潭餘水在餘干縣治前會縣之西南諸溪餘水故名以其三道而入又名三餘水或曰吳楚越之餘水也故名三餘雲錦水在安仁縣發源於福建之邵武府光澤縣鄱源水源發浮梁縣東北一百四十里高山下西流百里入昌江建節水在德興縣治西南源出廣信弋陽縣西北流經縣境下入樂安江洎水源出德興縣東南一百二十里高山下亦為鄱水之源龍窟河在餘干縣南一十五里源出廣信之興業溪經此西流入鄱陽湖白塔河在安仁縣東源發廣信龍虎山及撫州金溪縣合流入錦江大溪在德興縣北二十里源出徽州婺源縣至縣境會諸溪水下流入樂安江玉石澗在安仁縣治東烏石澗在安仁縣南二十里源出臨川下入白塔河蠙洲在鄱陽縣西水多蚌唐貞觀中嘗有採珠於此者琵琶洲在餘干縣治南水中擁沙成洲狀如琵琶宋汪洋詩塞外風煙能記否天涯淪落自心知眼前風物參差是只欠江州司馬詩饒魯詩潯陽江上譜無傳化作沙汀越水邊一段遺音人不識夜深幽咽下灘泉汰金洲在樂平縣西一十五里馬塘在府城東北四里唐刺史馬植築因以為名薛塘在樂平縣清泰坊宋嶽飛獄成大理少卿薛仁輔不署奏牘明飛無罪秦檜怒謫饒州仁輔卜居樂平宅傍有一塘後人因名天仙池在樂平縣東北天仙觀前相傳唐貞元中月夜有二羽衣對語橋上久之各駕鶴上升流杯池在府西南千户所後宋范仲淹鑿龍池在冠山顛宋王安石詩老龍天上回峯頂石池開噓浪亂晴旭蟄沙驚凍雷龍泉池在浮梁縣南六十里水深莫測歲旱投以楮