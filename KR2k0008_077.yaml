廢鐔州五代時王延政以延平鎮為鐔州尋廢廢鏞州王延政以將樂縣為鏞州尋廢廢綏城縣在將樂縣西鄉晉隆安三年置隋省唐初復置後併入邵武縣舊沙縣在今沙縣治東一十里隋置尋廢唐復置始徙今治落星穴在將樂縣治北晉義熙中有星墜其處忽成一穴占者謂五百年後當生大賢宋楊時實生于此人以為應髙平苑在將樂縣乃越王校獵之所建安記云越王畋於將樂野岸髙平苑小常村在府境宋時叛卒楊勍寇南劍州道出小常村掠一民婦欲與亂婦誓死不受汚遂遇害棄尸道傍賊退人為收瘞尸所枕藉處迹宛然不滅每雨則乾晴則濕削去即復見覆以他土其迹愈明石龜在順昌縣西四十里石龜捍于水口首尾皆見仙書石在南平縣治東蕭坑之前或指以為仙書名宦宋劉滋開寶中知南劍州有灘名黯淡湍猛多覆舟滋即灘旁别開港遂為安流程慱文皇祐中知南劍州以僧牒募人鑿黯淡灘以通舟楫楊告南劍州判官曉法令而不務苛刻時號能吏葛源知南劍州屬吏嘗有隙于公同進者因讒之源察其旨不聽而以為舉首人服其明宋咸慶厯初知尤溪縣公正亷勤剖決無滯能名冠于一時俞偉元祐初知順昌縣邑民生子多不舉偉集耆老諭以理邑人悔悟賴以活者萬餘人王廷彥元祐中知尤溪縣時有郡都吏負租不輸廷彥呼至縣庭示以斷案杖之能聲大著李綱宣和初起居舍人疏陳時政出監沙縣稅題詠甚多不以黜謫自沮朱松宣和間為尤溪尉榜一室曰韋齋公事之餘力于書無一息少廢子熹生于尉之官舍是為文公葛宫知南劍州遣沙縣尉許抗諭降叛賊並溪山多産銅銀吏挾姦罔利課嵗不登宫一變其法嵗羡餘六百萬謝如意宣和末為南劍州司録恭軍福州兵變擁衆道出延平知州林遹遣如意喻以禍福衆乃縳渠魁至斬之一郡帖然張建炎初知南劍州賊范汝為黨擁衆來冦分州兵為數隊將戰則先食之更迭交戰兵力不乏大敗其衆城賴以全瀕海四郡皆不罹其祻朱倬通判南劍州建冦阿魏衆數千劍鄰于建兵愞不可用倬重賞募卒擒獲境內迄平陳攄知將樂縣政尚寬平初邑民貧困者生子多不舉攄嚴禁止每給官錢周之民賴以存活甚衆立祠祀之徐元杰淳祐初知南劍州會峽陽冦作元杰禽斬其渠魁餘釋不問郡有延平書院會諸生親為講説民訟以理化誨多感恱而去輸苗聽其自槩闔郡德之陳宓嘉定間知南劍州時大旱疫蠲逋負十數萬且弛新輸三之一躬率僚屬持錢粟藥餌户給之倣白鹿洞規創延平書院董洪端平初知南劍州治身嚴奉法令甚謹州始凋弊勤而拊之遂復舊觀陳韡知南劍州兼福建路招捕使親提兵至沙縣順昌將樂清流宣化督捕盜賊所至克捷元劉思禮至順中為順昌尹為政有遺愛民有親屬因財而訟者以理諭之遂悔悟息爭有以偽印逮富民者洞知其詐人以為神曲惠至正間為尤溪尉攝縣事不越月決滯訟六十餘事紅巾冦壓境惠首倡勇敢拒戰行保甲編伍之法發常平振民由是一邑得全魯崇仁至正間為順昌尹為政簡易深得民心興利除害均徭平賦省刑厚俗邑人立石頌德本朝唐鐸洪武初延平知府撫綏凋瘵首建學校不尚苛刻及召還京民不忍舍留一鞾懸于儀門右王克綱洪武中為將樂知縣持身廉潔為政仁眀知民疾苦吏不敢欺由是民獲力農遂致富庶張縉順昌知縣百廢具興刑罰不苛嘗疏渠水以利民至今稱為張公渠胡夀昌延平知府修飾學校躬勵士子建祠祀李願中民皆敬信稱曰胡延平而不名黃采洪武間由御史改尤溪知縣先是縣用市民拘縶里胥以集事采即釋之示以仁義由是事集民安後復召為監察御史朱孟常永樂中南平知縣不尚苛嚴奏蠲纍嵗逋負魚課及購獲強寇置于法民咸德之陳士淵永樂間為尤溪英果寨巡檢剛毅有膂力討平吳十師之亂後餘黨復突起士淵倡勇力戰于羅畬場兵敗死焉省志雷誠宣德間知延平府性亷介不阿不詭撫民以仁為政務植善良而抑強暴興學校修祠宇譽聞燁然省志艾亷宣德間延平府照磨好讀書用儒飾吏有聲于時省志馬文饒正統間延平府經歷勤于贊政務以恤民為先比去民思之不忘省志徐中正統間以進士知南平縣慈惠亷明不事箠楚一毫不茍取於民民心恱服其租賦輸納於官者罔敢或後省志李挺正統間延平府學教授有學行勤訓𨗳雖當沙尤寇發戎事殷擾之時其講誦一如平時不為之少輟省志丁泉正統間任延平衛指揮同知值沙寇猖獗泉為集勇力士嚴紀律設智謀屢與戰屢大敗之甚著勞績敘賞升福建都指揮僉事省志張敏正統間主尤溪簿沙寇稱亂逼犯邑城敏奮力誓師出與賊戰時賊勢甚盛我師多民兵不熟行伍且前後不相援遂力竭而死民痛惜之省志歐陽興景泰間知南平縣性簡靜亷介為政先德化而後鞭朴民以事訟于庭諄諄諭之以理俾之能自悟有古循吏風志省金廣景泰間任延平衛指揮僉事有勇力且多智能值沙寇餘黨弗靖勢亦鋭廣率壯兵追戰身先卒衆勇敢直前大破之搗其巢穴餘寇悉平論功升本衛指揮同知省志沈棨延平知府政尚嚴明吏不敢欺民懷其德孟釗天順間延平知府剛正亷明汀寇起官兵道出延平者相絡繹需餉嚴甚釗區度有方秋毫不取于民民安堵如平時省志劉􅒐天順間南平縣丞寬惠有幹才持身嚴謹遇賢士甚謙創廟學修壇壝條畫有方而百姓不以為病省志人物五代陳陶劍浦人以儒業名家于聲詩厯象無不精究常以台鉉之器自負南唐升元中至南昌將詣建康聞宋齊丘秉政自料與齊丘不合乃築室洪之西山日以詩酒為事有詩數百篇廖居素將樂人仕南唐以剛直見忌驟諫後主不聽服朝衣冠立死井中大書于篋曰吾不忍見國破主辱耳宋陳世卿南平人雍熙初進士知建州真宗知其材幹授福建轉運使規畫銀場嵗增課羡後知廣州郡有計口買鹽之制人多不便世卿奏除之子儼南安主簿張若谷沙縣人淳化間第進士為巴州軍事推官會寇鄰郡若谷率衆備禦賊引去後入見真宗顧曰是嘗在巴州禦賊者耶歷知數州郡所至有循良迹纍官至尚書左丞致仕吳輔劍浦人天聖中進士調道州推官會有傳冦至者郡僚欲毁橋城守輔曰自橋而南者皆吾民也安可棄民以自全邪聞者壯其言民心以安而寇卒不至林積劍浦人嘗入京師至蔡邸席下得一囊北珠數百顆詢之主人知巨商宿此積曰此吾故人令來上庠相訪商後訪積積悉歸之宋慶厯中第進士補循州推官子德新為吏部侍郎周諝尤溪人知新會縣會王安石行新法郡縣風靡諝獨不奉行致書政府力陳其弊因求歸田里所著有孟子解義一時門生稱為周夫子黃裳劍浦人少有大志元豐間郡之譙門一柱忽為迅雷所擊裳聞之口占云風雷昨夜破枯株借問天公有意無莫是卧龍蹤迹困放教頭角入亨衢次年對策果為天下第一陳稱劍浦人嘗知惠州州有豐湖久涸而魚租尚存稱築隄捍江魚鱉蒲蓮之利悉以豫民後知泉州奏置市舶哲宗詔置市舶于泉實稱啓之胡璞劍浦人工于詩嘗經采石渡題詩弔李白云抗議金鑾反見讐一杯蟬蛻此江頭當時醉弄波間月今作寒光萬里流蘇軾見之疑唐人所作嘆賞不置楊時將樂人潛心經史熙寧中登進士從二程遊得河洛之傳浮沉州縣者四十餘年後為諫議大夫僅三越月所論列皆關世道又為國子祭酒髙宗時除工部侍郎直學士世號龜山先生卒諡文肅陳瓘沙縣人登進士甲科徽宗時為右正言以論蔡京連謫通台楚州瓘論京卞皆披擲其處心發露其情慝最所忌恨故得禍最酷後贈諫議大夫諡忠肅自號了翁所著有尊堯集鄧肅南平人徽宗時在大學作詩言守令搜求擾民被斥欽宗時授鴻臚寺簿詣金營留五十日而還尋擢左正言遇事感激凡抗二十疏言皆切當多見采納曹輔沙縣人第進士為祕書正字時徽宗多微行輔上疏極諫太宰余深曰輔小官何敢論大事輔對以大官不言故小官言之官有大小愛君之心則一遂編管彬州靖康初召還纍官簽書樞密院事張邦昌僣位脅輔視事遂奔濟州羅薦可沙縣人為髙郵理曹汴京陷張邦昌以偽赦至髙郵守欲拜之薦可持不可留數日而髙宗赦至事聞命以京秩褒之陳淵瓘兄孫自少頴悟于書無所不讀從楊時學時稱其深識聖賢旨趣且妻以子髙宗朝為監察御史遷右正言其行已立朝忠言讜論為時所重有默堂集三十卷羅從彥本沙縣人徙家南平從學楊時于蕭山既而築室山中絶意仕進充然自得朱熹謂龜山倡道東南士之遊其門者甚衆然思力行任重詣極惟仲素一人而已學者稱為豫章先生卒諡文質廖剛順昌人少從陳瓘楊時學崇寧中登進士髙宗朝為御史中丞知無不言鄭億年與秦檜有連剛疏其惡檜銜之改工部尚書後以徽猷閣直學士致仕子四人遲過遂蘧皆秉麾節時號萬石廖氏廖德眀順昌人少學釋氏得楊時書讀之大悟遂受學朱熹乾道中第進士纍官知潯州有聲諸司交薦之德眀曰今老矣况以道徇人乎固辭後知廣州遷吏部左選郎官有槎溪集行世李侗劍浦人從學羅從彥結茅山田謝絶世故餘四十年食飲或不充而怡然師自得沙縣鄧迪嘗稱其如冰壷秋月瑩徹無瑕朱熹事焉世號延平先生卒諡文靖有延平問答及語録行世子友直信甫皆舉進士信甫仕至監察御史以特立不容于朝出知衢州羅博文沙縣人從學李延平得道學之傳尋以薦參議軍府政卒于嘉州官舍囊無餘資有書數千帙而已同門朱熹狀其行馮初心將樂人自幼篤志嗜學博洽經史歷官給事中纍升禮部尚書黃伯固將樂人為建昌尉纍官四川安撫制置使終兵部侍郎涖官行已為時所重卒諡曰忠簡王必正尤溪人紹定間纍官朝請大夫嘗置義田五百餘畝以資族人冠婚喪祭之費又開義學訓族里子弟子慈恭勤慤皆登進士第元陳君用延平人少負氣勇猛過人元末紅巾賊入閩閩閫授君用南平縣尹給錢募兵君用散家財繼之遂復建陽浦城等縣纍官升權同知副都元帥引兵至連江與賊轉戰而死事聞追封潁川郡侯諡忠毅張升順昌人四嵗時即以潁悟聞年十二除正字纍官奉儀大夫江西等處儒學提學元末陳友諒陷豫章升死之本朝張智順昌人洪武初以明經學授夷陵州學正才識卓異召為禮部右侍郎凡禮樂制度多所建明陳山沙縣人永樂間由舉人授教官遷吏科給事中洪熙元年升左春坊左庶子尋升户部侍郎加本部尚書士兼謹身殿大學楊丹珉尤溪人永樂間由國子生授奉新知縣先是邑有民道宿于鋪鋪長意其有重資謀殺之匿其尸其母訴于縣誣逮者衆丹珉訪得其人遂釋所誣者嘗嵗旱禱雨輒應蝗起不入其境後知漂水縣終泰州同知俱有顯績吳復將樂人永樂間進士除御史升廣東副使風裁凛然深得憲臣之休士論歸之省志葉宜南平人永樂間進士纍官浙江恭政歷官盡職寬嚴適宜務與民同其好惡吏畏而民愛之省志李文殊將樂人永樂中膺楷書薦除工科給事中有直聲纍升廣信府知府敡歷中外持身亷介布素蔬食無異貧寒及退休田里尤確然不易其素守人甚賢之省志黃琛將樂人正統初進士除户部主事升郎中嘗奉詔賑飢淮北區畫條悉全活者十萬餘人擢江西恭政雖政務煩劇而佐理有道化成事集遷本省布政使會洞寇猖獗琛率師直搗其壘俘馘之餘黨悉平升南户部侍郎德威在人為當世所推重後巡撫四川而卒省志吳謙尤溪人以眀經舉除山東道監察御史以言事左遷武昌知縣縣有守禦千户周某者挾勛舊虐民謙劾奏之竟置之于法邑境肅然後卒于官民哀慕之不置省志林同尤溪人天順庚辰舉進士授户部主事出納惟謹歷員